<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개발자 기술 로드맵 - 마인드맵</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
        body {
            font-family: 'Nanum Pen Script', cursive;
            margin: 0;
            overflow: hidden;
            background-color: #fdfdfc;
            background-image:
                linear-gradient(#e4e4e7 1px, transparent 1px),
                linear-gradient(90deg, #e4e4e7 1px, transparent 1px);
            background-size: 30px 30px;
            color: #333;
        }

        header {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            border-bottom: 2px solid #333;
            border-bottom-style: dashed;
        }

        #canvas-container {
            width: 100vw;
            height: calc(100vh - 80px);
            cursor: grab;
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        .text-outline {
            text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff,
                         -2px 0 0 #fff, 2px 0 0 #fff, 0 -2px 0 #fff, 0 2px 0 #fff;
        }

        .btn-sketch {
            background: transparent;
            border: 2px solid #333;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            padding: 8px 16px;
            font-family: 'Nanum Pen Script', cursive;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 2px 2px 0px #333;
        }

        .btn-sketch:hover {
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px #333;
        }

        .clickable-item {
            cursor: pointer;
        }

        .clickable-item:hover rect {
            fill: #dcfce7 !important;
        }

        .clickable-item:hover text {
            fill: #15803d !important;
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="h-20 flex items-center justify-between px-8 z-10 shrink-0">
        <div>
            <h1 class="text-3xl text-gray-900 flex items-center gap-3" style="text-shadow: 2px 2px 0px rgba(0,0,0,0.1);">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                개발자 기술 로드맵
            </h1>
            <p class="text-gray-600 text-xl mt-1">중앙의 '실제 시스템 흐름'을 기준으로, 각 기술이 어디에 쓰이는지 확인하세요. 초록 항목은 클릭하면 학습 자료로 이동합니다.</p>
        </div>
        <button id="reset-btn" class="btn-sketch hover:bg-yellow-100">
            전체 한눈에 보기 🎯
        </button>
    </header>

    <main class="flex-1 relative">
        <div id="canvas-container"></div>
    </main>

    <script>
        // ==========================================
        // 초기 설정: SVG, 줌, 필터, 마커
        // ==========================================
        var container = document.getElementById("canvas-container");
        var width = container.clientWidth;
        var height = container.clientHeight;

        var zoom = d3.zoom()
            .scaleExtent([0.1, 3])
            .on("zoom", function(event) {
                svgGroup.attr("transform", event.transform);
            });

        var svg = d3.select("#canvas-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .call(zoom);

        var defs = svg.append("defs");

        // 손그림 필터
        defs.append("filter")
            .attr("id", "rough-pen")
            .attr("x", "-20%")
            .attr("y", "-20%")
            .attr("width", "140%")
            .attr("height", "140%")
            .html(
                '<feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />' +
                '<feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />'
            );

        // 일반 화살표 마커
        defs.append("marker")
            .attr("id", "arrowhead")
            .attr("viewBox", "-0 -5 10 10")
            .attr("refX", 8)
            .attr("refY", 0)
            .attr("orient", "auto")
            .attr("markerWidth", 8)
            .attr("markerHeight", 8)
            .append("path")
            .attr("d", "M 0,-5 L 10 ,0 L 0,5")
            .attr("fill", "#4b5563")
            .style("stroke", "none");

        // 매핑용 빨간 점선 화살표 마커
        defs.append("marker")
            .attr("id", "arrowhead-red")
            .attr("viewBox", "-0 -5 10 10")
            .attr("refX", 8)
            .attr("refY", 0)
            .attr("orient", "auto")
            .attr("markerWidth", 8)
            .attr("markerHeight", 8)
            .append("path")
            .attr("d", "M 0,-5 L 10 ,0 L 0,5")
            .attr("fill", "#ef4444")
            .style("stroke", "none");

        var svgGroup = svg.append("g");


        // ==========================================
        // 클릭 가능한 항목 데이터
        // ==========================================
        var clickableLinks = {
            "FastAPI": { url: "https://hoyoungparkme.github.io/fastapi-interactive-learning/", status: "ready" },
            "Spring Boot": { url: "https://hoyoungparkme.github.io/springboot-interactive-guide/", status: "ready" },
            "React": { url: "https://hoyoungparkme.github.io/react-interactive-learning/", status: "ready" },
            "PostgreSQL": { url: null, status: "planned" },
            "Git": { url: "https://hoyoungparkme.github.io/git-github-interactive-guide/", status: "ready" },
            "Docker": { url: null, status: "planned" },
            "AWS / GCP": { url: null, status: "planned" }
        };


        // ==========================================
        // 공통 그리기 함수
        // ==========================================

        /**
         * 손그림 느낌 박스를 그린다.
         * lines 배열에서 "---"는 구분선, "   -"로 시작하면 서브 항목.
         * 텍스트 안에 ● 또는 ○ 마커가 있으면 클릭 가능 항목으로 처리한다.
         */
        function drawBox(g, x, y, w, h, title, lines, bgColor, rotation) {
            rotation = rotation || 0;
            var boxGroup = g.append("g")
                .attr("transform", "translate(" + x + ", " + y + ") rotate(" + rotation + ")");

            // 그림자
            boxGroup.append("rect")
                .attr("x", -8).attr("y", 8)
                .attr("width", w).attr("height", h)
                .attr("fill", bgColor).attr("opacity", 0.6)
                .attr("filter", "url(#rough-pen)");

            // 본체
            boxGroup.append("rect")
                .attr("x", 0).attr("y", 0)
                .attr("width", w).attr("height", h)
                .attr("fill", "#fff")
                .attr("stroke", "#333").attr("stroke-width", 2.5)
                .attr("filter", "url(#rough-pen)");

            // 제목
            boxGroup.append("text")
                .attr("x", w / 2).attr("y", 35)
                .attr("text-anchor", "middle")
                .style("font-size", "28px").style("font-weight", "bold")
                .attr("class", "text-outline")
                .text(title);

            // 내용 줄
            var currentY = 75;
            lines.forEach(function(line) {
                if (line === "---") {
                    boxGroup.append("path")
                        .attr("d", "M 20 " + (currentY - 10) + " L " + (w - 20) + " " + (currentY - 10))
                        .attr("stroke", "#9ca3af").attr("stroke-width", 1.5)
                        .attr("stroke-dasharray", "4,4")
                        .attr("filter", "url(#rough-pen)");
                    currentY += 10;
                    return;
                }

                var isSub = line.startsWith("   -");
                var xPos = isSub ? 35 : 20;
                var fontSize = isSub ? "20px" : "23px";
                var fillColor = isSub ? "#4b5563" : "#111";

                // ● (ready) 또는 ○ (planned) 마커가 있는지 확인
                var hasReadyMarker = line.indexOf("\u25cf") !== -1;   // ●
                var hasPlannedMarker = line.indexOf("\u25cb") !== -1;  // ○

                if (hasReadyMarker || hasPlannedMarker) {
                    // 마커 텍스트에서 키워드 추출
                    var marker = hasReadyMarker ? "\u25cf" : "\u25cb";
                    var markerIdx = line.indexOf(marker);
                    var beforeMarker = line.substring(0, markerIdx);
                    var afterMarker = line.substring(markerIdx + 2); // marker + space

                    // 나머지 텍스트에서 쉼표로 분리 (같은 줄에 여러 항목이 있을 수 있음)
                    // beforeMarker 부분은 일반 텍스트로 그린다
                    if (beforeMarker.trim()) {
                        boxGroup.append("text")
                            .attr("x", xPos)
                            .attr("y", currentY)
                            .style("font-size", fontSize)
                            .style("fill", fillColor)
                            .text(beforeMarker);
                    }

                    // 클릭 가능 키워드 텍스트 추출
                    var keyword = afterMarker.trim();
                    var linkInfo = null;

                    // clickableLinks에서 매칭 찾기
                    Object.keys(clickableLinks).forEach(function(key) {
                        if (keyword.indexOf(key) !== -1) {
                            linkInfo = clickableLinks[key];
                        }
                    });

                    var markerXPos = beforeMarker ? xPos + beforeMarker.length * 11 : xPos;

                    if (linkInfo && linkInfo.status === "ready") {
                        // 클릭 가능 (초록 밑줄 + 포인터)
                        var clickUrl = linkInfo.url;
                        var clickGroup = boxGroup.append("g")
                            .attr("class", "clickable-item")
                            .style("cursor", "pointer")
                            .on("click", function(event) {
                                event.stopPropagation();
                                window.open(clickUrl, "_blank");
                            });

                        clickGroup.append("rect")
                            .attr("x", markerXPos - 2)
                            .attr("y", currentY - 18)
                            .attr("width", (marker + " " + keyword).length * 12 + 8)
                            .attr("height", 24)
                            .attr("fill", "#f0fdf4")
                            .attr("rx", 4);

                        // 밑줄
                        clickGroup.append("line")
                            .attr("x1", markerXPos)
                            .attr("y1", currentY + 3)
                            .attr("x2", markerXPos + (marker + " " + keyword).length * 11)
                            .attr("y2", currentY + 3)
                            .attr("stroke", "#16a34a")
                            .attr("stroke-width", 2);

                        clickGroup.append("text")
                            .attr("x", markerXPos)
                            .attr("y", currentY)
                            .style("font-size", fontSize)
                            .style("fill", "#16a34a")
                            .style("font-weight", "bold")
                            .text(marker + " " + keyword);
                    } else {
                        // planned (회색 텍스트 + ○ 마커)
                        boxGroup.append("text")
                            .attr("x", markerXPos)
                            .attr("y", currentY)
                            .style("font-size", fontSize)
                            .style("fill", "#9ca3af")
                            .text(marker + " " + keyword);
                    }
                } else {
                    // 일반 텍스트
                    boxGroup.append("text")
                        .attr("x", xPos)
                        .attr("y", currentY)
                        .style("font-size", fontSize)
                        .style("fill", fillColor)
                        .text(line);
                }

                currentY += 28;
            });

            return boxGroup;
        }

        // 브라우저 아이콘
        function drawBrowser(g, x, y, title) {
            var grp = g.append("g").attr("transform", "translate(" + x + ", " + y + ")").attr("filter", "url(#rough-pen)");
            grp.append("rect").attr("x", -70).attr("y", -60).attr("width", 140).attr("height", 120).attr("fill", "#fff").attr("stroke", "#111").attr("stroke-width", 3);
            grp.append("rect").attr("x", -70).attr("y", -60).attr("width", 140).attr("height", 25).attr("fill", "#e5e7eb").attr("stroke", "#111").attr("stroke-width", 3);
            grp.append("rect").attr("x", -50).attr("y", -52).attr("width", 100).attr("height", 10).attr("fill", "#fff").attr("stroke", "#111").attr("stroke-width", 1.5);
            grp.append("text").attr("x", 0).attr("y", 20).attr("text-anchor", "middle").style("font-size", "28px").style("font-weight", "bold").text(title);
            grp.append("text").attr("x", 0).attr("y", 45).attr("text-anchor", "middle").style("font-size", "20px").style("fill", "#4b5563").text("(Web Browser)");
        }

        // 모바일 폰 아이콘
        function drawPhone(g, x, y, title) {
            var grp = g.append("g").attr("transform", "translate(" + x + ", " + y + ")").attr("filter", "url(#rough-pen)");
            grp.append("rect").attr("x", -50).attr("y", -80).attr("width", 100).attr("height", 160).attr("rx", 15).attr("fill", "#fff").attr("stroke", "#111").attr("stroke-width", 3);
            grp.append("circle").attr("cx", 0).attr("cy", 60).attr("r", 8).attr("stroke", "#111").attr("stroke-width", 2).attr("fill", "none");
            grp.append("rect").attr("x", -40).attr("y", -60).attr("width", 80).attr("height", 100).attr("fill", "#f3f4f6").attr("stroke", "#111").attr("stroke-width", 1.5);
            grp.append("text").attr("x", 0).attr("y", -5).attr("text-anchor", "middle").style("font-size", "28px").style("font-weight", "bold").text(title);
            grp.append("text").attr("x", 0).attr("y", 20).attr("text-anchor", "middle").style("font-size", "20px").style("fill", "#4b5563").text("(Mobile App)");
        }

        // 데이터베이스 아이콘 (원기둥)
        function drawDatabase(g, x, y, title, subtitle) {
            var w = 120, h = 140, ry = 20;
            var grp = g.append("g").attr("transform", "translate(" + x + ", " + y + ")").attr("filter", "url(#rough-pen)");
            grp.append("path").attr("d", "M " + (-w/2) + " " + (-h/2+ry) + " L " + (-w/2) + " " + (h/2-ry) + " A " + (w/2) + " " + ry + " 0 0 0 " + (w/2) + " " + (h/2-ry) + " L " + (w/2) + " " + (-h/2+ry) + " Z").attr("fill", "#fff").attr("stroke", "#111").attr("stroke-width", 3);
            grp.append("path").attr("d", "M " + (-w/2) + " 0 A " + (w/2) + " " + ry + " 0 0 0 " + (w/2) + " 0").attr("fill", "none").attr("stroke", "#111").attr("stroke-width", 3);
            grp.append("ellipse").attr("cx", 0).attr("cy", -h/2+ry).attr("rx", w/2).attr("ry", ry).attr("fill", "#fff").attr("stroke", "#111").attr("stroke-width", 3);

            grp.append("text").attr("x", 0).attr("y", 40).attr("text-anchor", "middle").style("font-size", "28px").style("font-weight", "bold").text(title);
            grp.append("text").attr("x", 0).attr("y", 65).attr("text-anchor", "middle").style("font-size", "20px").style("fill", "#4b5563").text(subtitle);
        }

        // 서버 박스 아이콘
        function drawServerBox(g, x, y, title, type) {
            var grp = g.append("g").attr("transform", "translate(" + x + ", " + y + ")").attr("filter", "url(#rough-pen)");
            grp.append("rect").attr("x", -80).attr("y", -70).attr("width", 160).attr("height", 140).attr("fill", "#fff").attr("stroke", "#111").attr("stroke-width", 3);
            grp.append("line").attr("x1", -60).attr("y1", -40).attr("x2", -40).attr("y2", -40).attr("stroke", "#111").attr("stroke-width", 3);
            grp.append("line").attr("x1", -60).attr("y1", -20).attr("x2", -40).attr("y2", -20).attr("stroke", "#111").attr("stroke-width", 3);
            grp.append("line").attr("x1", -60).attr("y1", 0).attr("x2", -40).attr("y2", 0).attr("stroke", "#111").attr("stroke-width", 3);

            grp.append("rect").attr("x", -20).attr("y", -45).attr("width", 80).attr("height", 60).attr("fill", "none").attr("stroke", "#111").attr("stroke-width", 2);

            grp.append("text").attr("x", 0).attr("y", 45).attr("text-anchor", "middle").style("font-size", "28px").style("font-weight", "bold").text(title);
            grp.append("text").attr("x", 0).attr("y", 65).attr("text-anchor", "middle").style("font-size", "20px").style("fill", "#4b5563").text(type);
        }

        // 일반 화살표
        function drawArrow(g, x1, y1, x2, y2, labelTop, labelBottom) {
            var grp = g.append("g").attr("filter", "url(#rough-pen)");
            grp.append("line").attr("x1", x1).attr("y1", y1).attr("x2", x2).attr("y2", y2)
                .attr("stroke", "#111").attr("stroke-width", 3).attr("marker-end", "url(#arrowhead)");

            var mx = (x1 + x2) / 2;
            var my = (y1 + y2) / 2;

            if (labelTop) {
                grp.append("text").attr("x", mx).attr("y", my - 10).attr("text-anchor", "middle")
                    .style("font-size", "24px").style("font-weight", "bold").attr("class", "text-outline").text(labelTop);
            }
            if (labelBottom) {
                grp.append("text").attr("x", mx).attr("y", my + 25).attr("text-anchor", "middle")
                    .style("font-size", "20px").style("fill", "#4b5563").attr("class", "text-outline").text(labelBottom);
            }
        }

        // 이론 -> 실무 매핑용 빨간 점선 화살표
        function drawMappingArrow(g, x1, y1, x2, y2, bendX, bendY) {
            g.append("path")
                .attr("d", "M " + x1 + " " + y1 + " Q " + bendX + " " + bendY + " " + x2 + " " + y2)
                .attr("stroke", "#ef4444").attr("stroke-width", 2.5)
                .attr("stroke-dasharray", "8,8")
                .attr("fill", "none")
                .attr("marker-end", "url(#arrowhead-red)")
                .attr("filter", "url(#rough-pen)")
                .attr("opacity", 0.7);
        }


        // ==========================================
        // 1. 코어 아키텍처 (중앙 시스템 흐름)
        // ==========================================
        var coreG = svgGroup.append("g");

        // 서버 인프라 영역 (점선 사각형)
        coreG.append("rect")
            .attr("x", 1350).attr("y", 300).attr("width", 950).attr("height", 600)
            .attr("rx", 30).attr("fill", "#f8fafc").attr("stroke", "#94a3b8").attr("stroke-width", 2).attr("stroke-dasharray", "10,10")
            .attr("filter", "url(#rough-pen)");
        coreG.append("text").attr("x", 1825).attr("y", 340).attr("text-anchor", "middle")
            .style("font-size", "30px").style("font-weight", "bold").style("fill", "#64748b").text("Server Infrastructure (AWS / GCP / Docker)");

        // --- Client 영역 (X: 600) ---
        drawBrowser(coreG, 600, 450, "Web");
        drawPhone(coreG, 600, 750, "App");
        coreG.append("text").attr("x", 600).attr("y", 330).attr("text-anchor", "middle")
            .style("font-size", "36px").style("font-weight", "bold").text("Client");

        // --- Server 영역 (X: 1600) ---
        drawServerBox(coreG, 1600, 450, "Web Server", "Nginx (Static)");
        drawServerBox(coreG, 1600, 750, "API Server", "FastAPI / Spring");
        coreG.append("text").attr("x", 1600).attr("y", 390).attr("text-anchor", "middle")
            .style("font-size", "36px").style("font-weight", "bold").text("Server");

        // --- Database 영역 (X: 2100) ---
        drawDatabase(coreG, 2100, 750, "Database", "PostgreSQL / Redis");

        // --- 네트워크 화살표 ---
        // Web Browser -> Web Server
        drawArrow(coreG, 700, 430, 1480, 430, "HTTP 요청", "HTTP / HTTPS");
        drawArrow(coreG, 1480, 470, 700, 470, "HTML/CSS/JS 응답", "정적 파일");

        // Mobile App -> API Server
        drawArrow(coreG, 680, 730, 1480, 730, "API 요청 (GET/POST)", "HTTP / HTTPS");
        drawArrow(coreG, 1480, 770, 680, 770, "JSON 응답", "데이터 송수신");

        // API Server -> Database
        drawArrow(coreG, 1700, 730, 2000, 730, "SQL (CRUD)", "");
        drawArrow(coreG, 2000, 770, 1700, 770, "Query 결과", "");


        // ==========================================
        // 2. 주변 학습 주제 박스
        // ==========================================
        var theoryG = svgGroup.append("g");

        // [좌 최상단] 제1~2장 소프트웨어 개론 - 연보라 (#e9d5ff)
        drawBox(theoryG, 100, -150, 360, 250, "제1~2장. 소프트웨어 개론", [
            "\u2022 개발이란? 전공자 vs 비전공자",
            "\u2022 개발 잘하는 사람?",
            "\u2022 앱 종류 (웹/네이티브/하이브리드)",
            "\u2022 프론트엔드 vs 백엔드",
            "\u2022 웹 앱 vs 네이티브 앱"
        ], "#e9d5ff", -2);

        // [좌상단] CS 기초 (제6장) - 빨강 (#fecaca)
        drawBox(theoryG, 100, 130, 340, 330, "제6장. 컴퓨터 구조 및 OS", [
            "\u2022 컴퓨터 내부 (CPU/디스크/커널)",
            "\u2022 메모리 계층 (L1캐시/주메모리/가상메모리)",
            "\u2022 운영체제 (커널, 멀티스레딩)",
            "\u2022 프로그램 vs 프로세스 vs 프로세서",
            "\u2022 프로세스 vs 스레드",
            "\u2022 자료구조 / 알고리즘"
        ], "#fecaca", -2);

        // [좌하단] 제3장 언어 & 프레임워크 - 노랑 (#fef08a)
        drawBox(theoryG, 100, 920, 380, 420, "제3장. 언어 및 프레임워크", [
            "\u2022 C 언어 → C++ → 객체지향(OOP)",
            "\u2022 Python (20년 역사, 왜 아직 쓰나?)",

        // ==========================================

        // ==========================================
        function centerCanvas() {
            var mapWidth = 2900;
            var mapHeight = 1450;

            var scale = Math.min(width / mapWidth, height / mapHeight) * 0.9;
            var tx = (width - mapWidth * scale) / 2 + 50;
            var ty = (height - mapHeight * scale) / 2 + 50;

            var initialTransform = d3.zoomIdentity.translate(tx, ty).scale(scale);
            svg.transition().duration(1000).call(zoom.transform, initialTransform);
        }

        centerCanvas();

        document.getElementById("reset-btn").addEventListener("click", centerCanvas);

        window.addEventListener("resize", function() {
            width = container.clientWidth;
            height = container.clientHeight;
            svg.attr("width", width).attr("height", height);
