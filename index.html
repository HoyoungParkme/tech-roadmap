<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>개발자 학습 노트</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📓</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
  <style>
    /*
      개발자 학습 노트 — 루트 허브 (필기노트 디자인)
      역할: 30개 주제를 목차 INDEX로 제공, 완료 체크(localStorage)로 진행률 표시.
      토큰: 종이 #fffdf7 / 잉크 #2b2b2b / 형광펜 #fde68a. 빌드 도구 없음(단일 HTML).
    */
    * { box-sizing: border-box; }
    body { margin: 0; background: #e9e4d8; font-family: 'Gaegu', system-ui, sans-serif; color: #2b2b2b; }
    a { color: #2b2b2b; text-decoration: none; }
    a:hover { color: #b45309; }
    .idx-row:hover { background: rgba(253,230,138,.25); }
    .btn-dash:hover { background: #fde68a; }
  </style>
</head>
<body>
  <div style="min-height:100vh;padding:44px 20px 30px">
    <div style="max-width:840px;margin:0 auto;background:#fffdf7;border:1.5px solid #2b2b2b;border-radius:8px;box-shadow:5px 5px 0 rgba(0,0,0,.12);position:relative;overflow:hidden;background-image:repeating-linear-gradient(transparent,transparent 31px,rgba(43,43,43,.05) 32px)">
      <!-- 노트 여백 빨간 세로줄 -->
      <div style="position:absolute;top:0;bottom:0;left:58px;width:1.5px;background:rgba(220,38,38,.22)"></div>
      <div style="padding:34px 46px 36px 84px;position:relative">

        <!-- 헤더 -->
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;border-bottom:2.5px solid #2b2b2b;padding-bottom:14px;flex-wrap:wrap">
          <div>
            <div style="font-family:'Nanum Pen Script',cursive;font-size:46px;line-height:1;color:#2b2b2b">개발자 학습 노트</div>
            <div style="font-size:16px;color:#8a8578;margin-top:6px">30개 주제 · 752+ 시각화 — 필기하듯 배우는 개발 지식</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex:none">
            <div id="today" style="font-size:14px;color:#a09a8c"></div>
            <a href="./mindmap/index.html" class="btn-dash" style="border:1.5px dashed #2b2b2b;border-radius:5px;padding:5px 14px;font-size:15px;background:#fff">☷ 마인드맵으로 보기</a>
          </div>
        </div>

        <!-- 히어로 행: 이어서 보기 + 전체 진행 -->
        <div style="display:flex;gap:14px;margin-top:18px;align-items:stretch;flex-wrap:wrap">
          <a id="resume" href="#" style="flex:1.3;min-width:260px;background:#2b2b2b;color:#fff;border-radius:7px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;box-shadow:3px 3px 0 rgba(0,0,0,.15)">
            <span>
              <span style="display:block;font-size:13px;letter-spacing:1px;color:#fde68a">▶ 이어서 보기</span>
              <span id="resume-label" style="display:block;font-size:20px;font-weight:700;margin-top:2px;color:#fff">학습 시작하기</span>
            </span>
            <span style="font-size:24px">→</span>
          </a>
          <div style="flex:1;min-width:220px;border:1.5px solid #2b2b2b;border-radius:7px;background:#fff;padding:10px 16px;display:flex;flex-direction:column;justify-content:center;gap:4px">
            <div style="display:flex;justify-content:space-between;font-size:14px;color:#8a8578"><span>전체 진행</span><span id="total-label" style="font-weight:700;color:#2b2b2b">0 / 30 주제</span></div>
            <div style="height:11px;border:1.5px solid #2b2b2b;border-radius:6px;position:relative;background:#fffdf7"><div id="total-bar" style="position:absolute;top:1px;bottom:1px;left:1px;border-radius:4px;background:repeating-linear-gradient(-45deg,#2b2b2b,#2b2b2b 2.5px,transparent 2.5px,transparent 6px);width:2%"></div></div>
            <div style="font-size:12px;color:#b5af9f">☐를 눌러 완료 표시 — 브라우저에 저장됩니다</div>
          </div>
        </div>

        <!-- 카테고리 진행률 -->
        <div id="cat-gauges" style="display:flex;gap:14px;flex-wrap:wrap;margin-top:14px"></div>

        <!-- 목차 INDEX -->
        <div style="margin-top:26px">
          <div style="font-family:'Nanum Pen Script',cursive;font-size:26px;color:#2b2b2b;border-bottom:3px double #2b2b2b;padding-bottom:4px;display:flex;justify-content:space-between;align-items:baseline"><span>목차 INDEX</span><span style="font-family:'Gaegu';font-size:13px;color:#b5af9f">이름 클릭 → 학습 페이지(새 탭)</span></div>
          <div id="index-body"></div>
        </div>

        <!-- 풋터 -->
        <div style="margin-top:30px;border-top:1.5px dashed #cfc9ba;padding-top:10px;display:flex;justify-content:space-between;font-size:13px;color:#b5af9f;flex-wrap:wrap;gap:6px">
          <span>빌드 도구 없이 단일 HTML로 동작 · giscus 댓글 유지</span>
          <a href="./mindmap/index.html" style="color:#8a8578">기술 로드맵 마인드맵 →</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 카테고리/주제 데이터: [id, 표시명, 서브키워드, Part수, 시각화수]
    const CATS = [
      { num:'Ⅰ', name:'AI / LLM', items:[
        ['ai-agent','AI Agent','ReAct · MCP · Tool Use',5,26],
        ['rag','RAG 파이프라인','Chunking · Embedding · RAGAS',7,35],
        ['langchain','LangChain','LCEL · LangGraph · LangSmith',6,29],
        ['vector-db','Vector DB','FAISS · pgvector · ANN',5,22],
        ['graphrag','GraphRAG','Neo4j · Cypher · KG',5,21],
        ['llmops','LLMOps','프롬프트 · 평가 · 가드레일',5,20],
      ]},
      { num:'Ⅱ', name:'백엔드', items:[
        ['fastapi','FastAPI','비동기 · Pydantic · CRUD',7,79],
        ['springboot','Spring Boot','DI · JPA · Security',7,49],
        ['postgres','PostgreSQL','SQL · 인덱스 · 트랜잭션',6,33],
        ['graphql','GraphQL','스키마 · Resolver · Federation',5,20],
        ['microservices','Microservices','DDD · Saga · Gateway',5,20],
        ['nginx','Nginx','리버스 프록시 · LB · TLS',5,20],
      ]},
      { num:'Ⅲ', name:'프론트엔드', items:[
        ['react','React','Hooks · 라우팅 · 배포',7,39],
        ['nextjs','Next.js','App Router · SSR/ISR',5,20],
        ['typescript','TypeScript','generic · 고급 타입',5,20],
        ['vue','Vue','Composition API · Pinia',5,20],
      ]},
      { num:'Ⅳ', name:'데이터', items:[
        ['data-engineering','Data Engineering','DW · ETL · Lakehouse',5,20],
        ['kafka','Apache Kafka','Topic · Consumer · ISR',5,20],
        ['redis','Redis','캐시 · Pub/Sub · Cluster',5,20],
        ['elasticsearch','Elasticsearch','역색인 · Query DSL · kNN',5,20],
        ['mongodb','MongoDB','BSON · Aggregation · Sharding',5,20],
        ['mlops','MLOps','MLflow · Kubeflow · 모니터링',5,20],
      ]},
      { num:'Ⅴ', name:'인프라 / DevOps', items:[
        ['docker','Docker','이미지 · Compose · 배포',8,47],
        ['kubernetes','Kubernetes','Pod · Service · Helm',5,20],
        ['terraform','Terraform','HCL · state · module',5,20],
        ['cloud-infra','Cloud Infrastructure','AWS/GCP/Azure · VPC',5,20],
        ['gcp','GCP','Cloud Run · IAM · 네트워킹',13,52],
        ['linux','Linux','쉘 · 프로세스 · systemd',5,20],
        ['github','Git & GitHub','브랜치 · PR · Actions',9,12],
        ['observability','Observability','메트릭 · 로그 · 트레이스',5,20],
      ]},
    ];
    const KEY = 'trn-done';
    const HL = 'linear-gradient(transparent 62%, #fde68a 62%)';

    function getDone() { try { return JSON.parse(localStorage.getItem(KEY) || '{}'); } catch (e) { return {}; } }
    function setDone(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

    function esc(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

    // 날짜
    (function () {
      const d = new Date();
      document.getElementById('today').textContent =
        `${d.getFullYear()}. ${d.getMonth() + 1}. ${d.getDate()} (${'일월화수목금토'[d.getDay()]})`;
    })();

    // "이어서 보기" — 주제 허브가 저장한 trn-last 사용, 없으면 첫 주제로
    (function () {
      let last = null;
      try { last = JSON.parse(localStorage.getItem('trn-last') || 'null'); } catch (e) {}
      const el = document.getElementById('resume');
      const label = document.getElementById('resume-label');
      if (last && last.url) {
        el.href = last.url;
        label.textContent = last.label || '이어서 보기';
      } else {
        el.href = './ai-agent/index.html';
        label.textContent = 'AI Agent · 첫 장부터 시작';
      }
    })();

    function render() {
      const done = getDone();
      let doneN = 0, totalN = 0;
      const gauges = [], index = [];

      CATS.forEach(cat => {
        const dn = cat.items.filter(i => done[i[0]]).length;
        doneN += dn; totalN += cat.items.length;
        const pct = Math.round(dn / cat.items.length * 100);
        const chapSum = cat.items.reduce((s, i) => s + i[4], 0);

        // 미니 게이지
        gauges.push(
          `<div style="flex:1;min-width:120px;display:flex;flex-direction:column;gap:3px">
            <div style="display:flex;justify-content:space-between;font-size:13.5px"><span style="font-weight:700;color:#2b2b2b">${esc(cat.name)}</span><span style="color:#a09a8c">${pct}%</span></div>
            <div style="height:8px;border:1.5px solid #2b2b2b;border-radius:5px;position:relative;background:#fff"><div style="position:absolute;top:1px;bottom:1px;left:1px;border-radius:3px;background:repeating-linear-gradient(-45deg,#2b2b2b,#2b2b2b 2px,transparent 2px,transparent 5px);width:${Math.max(pct, 2)}%"></div></div>
          </div>`
        );

        // 목차 블록
        const rows = cat.items.map(([id, name, sub, parts, cnt]) => {
          const isDone = !!done[id];
          const unit = id === 'gcp' ? '섹션' : '장';
          return (
            `<div class="idx-row" style="display:flex;align-items:baseline;gap:9px;padding:2px 4px;border-radius:4px">
              <span data-toggle="${esc(id)}" title="완료 체크" style="cursor:pointer;font-size:17px;line-height:1;color:${isDone ? '#2b2b2b' : '#b5af9f'};user-select:none">${isDone ? '☑' : '☐'}</span>
              <a href="./${esc(id)}/index.html" target="_blank" rel="noopener" style="font-size:17.5px;font-weight:700">${esc(name)}</a>
              <span style="font-size:13px;color:#b5af9f">${esc(sub)}</span>
              <span style="flex:1;border-bottom:2px dotted #cfc9ba;position:relative;top:-4px"></span>
              <span style="font-size:13.5px;color:#8a8578;flex:none">${parts} Part · ${cnt}${unit}</span>
            </div>`
          );
        }).join('');

        index.push(
          `<div style="margin-top:20px">
            <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:6px;flex-wrap:wrap">
              <span style="font-size:21px;font-weight:700;color:#2b2b2b;padding:0 6px;background:${HL}">${cat.num}. ${esc(cat.name)}</span>
              <span style="font-size:13px;color:#a09a8c">${cat.items.length}개 주제 · ${chapSum}장 — 완료 ${dn}</span>
            </div>
            <div style="display:flex;flex-direction:column;gap:2px;padding-left:6px">${rows}</div>
          </div>`
        );
      });

      document.getElementById('cat-gauges').innerHTML = gauges.join('');
      document.getElementById('index-body').innerHTML = index.join('');

      // 전체 진행
      const totalPct = Math.round(doneN / totalN * 100);
      document.getElementById('total-label').textContent = `${doneN} / ${totalN} 주제`;
      document.getElementById('total-bar').style.width = Math.max(totalPct, 2) + '%';

      // 체크박스 토글 바인딩
      document.querySelectorAll('[data-toggle]').forEach(el => {
        el.addEventListener('click', () => {
          const id = el.getAttribute('data-toggle');
          const d = getDone();
          d[id] = !d[id];
          setDone(d);
          render();
        });
      });
    }

    render();
  </script>
</body>
</html>
