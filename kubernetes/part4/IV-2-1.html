<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — Secret</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-2-1. Secret (비밀값 주입)
    학습 목표: ConfigMap과의 차이, base64 인코딩의 한계, 외부 비밀 관리 연계 필요성.
    핵심 비유: "금고" — base64는 잠금이 아니라 인코딩일 뿐, 진짜 보안은 별도 설정 필요
    구조: 4단계 (Secret 기본 / base64 ≠ 암호화 / encryption-at-rest / sealed-secrets/Vault)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Secret 기본 — ConfigMap과 똑같이 쓰지만 type=Secret',
        desc: 'Secret은 ConfigMap과 거의 동일하게 사용. envFrom으로 환경 변수 주입, volume mount로 파일 마운트. type 필드와 base64 인코딩만 다름. DB 비밀번호, API 키, JWT 시크릿 등에 사용.',
        block: {
          kind: 'yaml',
          code: `apiVersion: v1
kind: Secret
metadata:
  name: db-creds
type: Opaque                # 일반 키-값
data:
  DB_PASSWORD: cGFzc3dvcmQxMjM=    # base64로 인코딩됨
  API_KEY: c2stWFlaQUJDLi4u
---
apiVersion: v1
kind: Pod
spec:
  containers:
    - name: app
      image: myapp:v1
      envFrom:
        - secretRef:
            name: db-creds`,
        },
        focus: 'basic',
      },
      {
        title: 'Step 2. base64 ≠ 암호화 — 누구나 디코딩 가능!',
        desc: 'data 필드의 값이 base64인 것은 보안이 아니라 바이너리 안전 전송용. echo 한 줄로 누구나 디코딩 가능. Secret YAML을 git에 평문으로 커밋하면 사실상 비밀번호를 공개한 셈.',
        block: {
          kind: 'shell',
          code: `# 적힌 값
$ kubectl get secret db-creds -o jsonpath='{.data.DB_PASSWORD}'
cGFzc3dvcmQxMjM=

# 한 줄로 복원
$ echo "cGFzc3dvcmQxMjM=" | base64 -d
password123       # ⚠ 평문 노출

# 즉, Secret YAML을 git에 커밋하면 = 비밀번호 공개
# .gitignore에 secrets.yaml 추가? → 누락 위험
# 더 나은 방법 필요 → 다음 단계 (sealed-secrets, Vault)`,
        },
        focus: 'base64-trap',
      },
      {
        title: 'Step 3. encryption-at-rest — etcd 디스크 암호화',
        desc: 'K8s가 Secret을 etcd에 저장할 때 평문이라는 점도 위험. EncryptionConfiguration으로 etcd 암호화 활성화 — 디스크 도난 시 보호. 클라우드 매니지드 K8s(EKS/GKE)는 대개 기본 활성화.',
        block: {
          kind: 'yaml',
          code: `# /etc/kubernetes/enc/encryption.yaml
apiVersion: apiserver.config.k8s.io/v1
kind: EncryptionConfiguration
resources:
  - resources: [secrets]
    providers:
      - aescbc:                  # AES-256
          keys:
            - name: key1
              secret: <32-byte-base64-key>
      - identity: {}             # fallback (평문)

# kube-apiserver 설정에 적용
# --encryption-provider-config=/etc/kubernetes/enc/encryption.yaml

# 결과
# etcd에 저장될 때 자동 암호화
# 디스크 도난 시 평문 노출 X`,
        },
        focus: 'encryption',
      },
      {
        title: 'Step 4. SealedSecrets / External Secrets — git 커밋 가능한 형태',
        desc: '진짜 운영에서는 Secret YAML을 평문으로 git에 두지 않는다. SealedSecrets는 클러스터의 공개키로 암호화한 SealedSecret 리소스를 git에 커밋 (클러스터만 복호화 가능). External Secrets Operator는 Vault/AWS Secrets Manager에서 동적 주입.',
        block: {
          kind: 'yaml',
          code: `# 1. SealedSecrets (Bitnami)
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: db-creds
spec:
  encryptedData:                # 클러스터 공개키로 암호화
    DB_PASSWORD: AgBy8h4...     # git 커밋 안전
    API_KEY: AgC2k9...
---
# 2. External Secrets Operator + Vault
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-creds
spec:
  secretStoreRef:
    name: vault-backend
  target:
    name: db-creds              # 동적으로 K8s Secret 생성
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: prod/db
        property: password`,
        },
        focus: 'sealed',
      },
    ];

    const KIND_STYLE = {
      yaml:  { label: 'YAML', textColor: '#fde68a' },
      shell: { label: 'Bash', textColor: '#86efac' },
    };

    function VaultDiagram({ focus }) {
      const STAGES = [
        { key: 'basic',        emoji: '🔐', name: 'Secret 기본',  note: 'ConfigMap + base64' },
        { key: 'base64-trap',  emoji: '⚠️',  name: 'base64 함정', note: '인코딩 ≠ 암호화' },
        { key: 'encryption',   emoji: '💾', name: 'etcd 암호화', note: 'encryption-at-rest' },
        { key: 'sealed',       emoji: '🏦', name: 'Sealed/Vault', note: 'git 커밋 안전' },
      ];

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🏦 금고 4단계 (보안 강도)</div>
          <div className="grid grid-cols-4 gap-2">
            {STAGES.map((s) => {
              const isActive = focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-violet-100 border-2 border-violet-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{s.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{s.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{s.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Secret (비밀값 주입)</h1>
                <p className="text-sm text-slate-500 mt-1">금고 — base64는 인코딩일 뿐, 진짜 보안은 별도</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <VaultDiagram focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'sealed' && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 mb-6 text-xs text-violet-900">
                💡 다음(IV-2-2)에서는 Pod의 CPU/메모리 사용량을 안정화하는 Resource Limits & Requests를 본다 — 예약 좌석 비유
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
