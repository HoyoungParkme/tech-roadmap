<body>
  <div id="root"></div>

  <!--
    IV-2-1. Secret — 민감 정보 (DB 비번 / API 키 / TLS 인증서)
    학습 목표: 평문 ConfigMap 안티패턴 → Secret 생성 → Pod env 주입 → volume 마운트 → Vault 외부 연동
    핵심 비유: 자물쇠 금고 — base64는 인코딩, etcd 암호화 + 외부 시크릿 매니저로 진짜 보안
    패턴: fastapi v1 — 좌(LiveDataPane: Secret 박스 + Pod 박스 + Vault 다이어그램) / 우(VSCode CodeViewer 멀티 탭)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 상태 정의 — Secret · Pod · Vault 시각화
    //   secret.state: 'plain'(위험) / 'encoded'(base64) / 'mounted'(주입)
    //   pod.injection: 'none' / 'env' / 'volume'
    //   vault.connected: 외부 시스템 연동 표시
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. 안티패턴 — ConfigMap에 평문 비밀번호',
        desc: 'ConfigMap은 비밀이 아닌 일반 설정용. DB 비번을 ConfigMap에 그대로 쓰면 kubectl get configmap만 해도 누구나 평문 노출. git에 커밋 시 영구 노출. Secret 리소스를 써야 한다.',
        secret: {
          name: 'app-config (ConfigMap)',
          icon: '⚠️',
          state: 'plain',
          rows: [
            { key: 'DB_PASSWORD', plain: 'P@ssw0rd123!', encoded: '' },
            { key: 'API_KEY',     plain: 'sk-XYZABC123', encoded: '' },
          ],
        },
        pod: { name: 'app-pod', injection: 'none', mountPath: null },
        vault: { connected: false },
        showAlert: true,
        alertText: 'kubectl get cm app-config -o yaml → 평문 노출!',
        files: [
          {
            filename: 'configmap-bad.yaml',
            lang: 'yaml',
            lines: [
              '# 안티패턴 — ConfigMap에 비밀번호',
              'apiVersion: v1',
              'kind: ConfigMap',
              'metadata:',
              '  name: app-config',
              'data:',
              '  DB_PASSWORD: "P@ssw0rd123!"   # 평문!',
              '  API_KEY: "sk-XYZABC123"        # 평문!',
              '',
              '# 누구나 즉시 디코딩 (인코딩조차 없다)',
              '$ kubectl get cm app-config -o yaml',
              '  DB_PASSWORD: P@ssw0rd123!',
              '',
              '# git에 커밋되면 영구 노출',
              '# git history에서 못 지운다',
              '',
              '# → Secret 리소스를 써야 한다',
            ],
            highlight: [7, 8, 12],
          },
        ],
      },
      {
        title: 'Step 2. Secret 생성 — kubectl create secret (base64 자동 인코딩)',
        desc: 'kubectl create secret generic으로 평문을 넣으면 자동으로 base64 인코딩되어 etcd에 저장. Opaque type은 일반 키-값. tls type은 TLS 인증서 전용. base64는 암호화가 아닌 바이너리 안전 인코딩 — 진짜 보안은 etcd 암호화 + RBAC.',
        secret: {
          name: 'db-creds (Secret · Opaque)',
          icon: '🔐',
          state: 'encoded',
          rows: [
            { key: 'DB_PASSWORD', plain: 'P@ssw0rd123!', encoded: 'UEBzc3cwcmQxMjMh' },
            { key: 'API_KEY',     plain: 'sk-XYZABC123', encoded: 'c2stWFlaQUJDMTIz' },
          ],
        },
        pod: { name: 'app-pod', injection: 'none', mountPath: null },
        vault: { connected: false },
        showAlert: false,
        alertText: '',
        files: [
          {
            filename: 'create-secret.sh',
            lang: 'bash',
            lines: [
              '# 1) CLI로 즉시 생성 (가장 간단)',
              'kubectl create secret generic db-creds \\',
              '  --from-literal=DB_PASSWORD="P@ssw0rd123!" \\',
              '  --from-literal=API_KEY="sk-XYZABC123"',
              '',
              '# 2) 결과 확인 — base64 인코딩됨',
              'kubectl get secret db-creds -o yaml',
              '#   data:',
              '#     DB_PASSWORD: UEBzc3cwcmQxMjMh',
              '#     API_KEY: c2stWFlaQUJDMTIz',
              '',
              '# 3) 디코딩 — base64 -d 한 줄이면 평문',
              'kubectl get secret db-creds \\',
              '  -o jsonpath="{.data.DB_PASSWORD}" | base64 -d',
              '#   P@ssw0rd123!',
              '',
              '# 즉, base64 ≠ 암호화 (인코딩일 뿐)',
              '# 진짜 보안 = etcd 암호화 + RBAC + 외부 Vault',
            ],
            highlight: [2, 3, 4, 9, 10],
          },
          {
            filename: 'secret.yaml',
            lang: 'yaml',
            lines: [
              '# 선언형으로 작성 — base64를 직접 적어야 함',
              'apiVersion: v1',
              'kind: Secret',
              'metadata:',
              '  name: db-creds',
              'type: Opaque               # 일반 키-값 (default)',
              'data:                      # base64 인코딩 필수',
              '  DB_PASSWORD: UEBzc3cwcmQxMjMh',
              '  API_KEY: c2stWFlaQUJDMTIz',
              '',
              '# stringData를 쓰면 평문 입력 가능 (서버에서 base64)',
              '# stringData:',
              '#   DB_PASSWORD: "P@ssw0rd123!"',
              '',
              '# Secret type 종류',
              '# - Opaque              : 일반 (default)',
              '# - kubernetes.io/tls   : TLS 인증서 (tls.crt + tls.key)',
              '# - kubernetes.io/dockerconfigjson : 이미지 레지스트리 인증',
              '# - kubernetes.io/service-account-token : SA 토큰',
            ],
            highlight: [6, 7, 8, 9],
          },
        ],
      },
      {
        title: 'Step 3. Pod env 주입 — valueFrom.secretKeyRef',
        desc: 'Secret 값을 컨테이너 환경 변수로 주입. valueFrom.secretKeyRef로 특정 키만 골라 쓰거나, envFrom.secretRef로 모든 키를 한 번에 주입. 컨테이너 안에서는 평범한 환경 변수처럼 읽힌다 — process.env.DB_PASSWORD.',
        secret: {
          name: 'db-creds (Secret · Opaque)',
          icon: '🔐',
          state: 'encoded',
          rows: [
            { key: 'DB_PASSWORD', plain: 'P@ssw0rd123!', encoded: 'UEBzc3cwcmQxMjMh' },
            { key: 'API_KEY',     plain: 'sk-XYZABC123', encoded: 'c2stWFlaQUJDMTIz' },
          ],
        },
        pod: {
          name: 'app-pod',
          injection: 'env',
          mountPath: null,
          envVars: [
            { name: 'DB_PASSWORD', value: 'P@ssw0rd123!' },
            { name: 'API_KEY',     value: 'sk-XYZABC123' },
          ],
        },
        vault: { connected: false },
        showAlert: false,
        alertText: '',
        files: [
          {
            filename: 'pod-env-secret.yaml',
            lang: 'yaml',
            lines: [
              '# Pod 환경 변수로 Secret 주입',
              'apiVersion: v1',
              'kind: Pod',
              'metadata:',
              '  name: app-pod',
              'spec:',
              '  containers:',
              '    - name: app',
              '      image: myapp:v1',
              '      env:',
              '        - name: DB_PASSWORD          # 컨테이너 내 env 이름',
              '          valueFrom:',
              '            secretKeyRef:',
              '              name: db-creds         # Secret 이름',
              '              key: DB_PASSWORD       # Secret 안의 키',
              '        - name: API_KEY',
              '          valueFrom:',
              '            secretKeyRef:',
              '              name: db-creds',
              '              key: API_KEY',
              '',
              '      # 모든 키를 한 번에 주입 (대안)',
              '      # envFrom:',
              '      #   - secretRef:',
              '      #       name: db-creds',
              '',
              '# 컨테이너 안에서',
              '# echo $DB_PASSWORD → P@ssw0rd123!',
              '# Node.js: process.env.DB_PASSWORD',
              '# Python : os.environ["DB_PASSWORD"]',
            ],
            highlight: [10, 11, 12, 13, 14, 15],
          },
        ],
      },
      {
        title: 'Step 4. Volume 마운트 — TLS 인증서 파일로 주입',
        desc: 'TLS 인증서(tls.crt + tls.key)나 큰 키 파일은 env 대신 volume으로 마운트. Secret을 volume으로 노출하면 컨테이너 안에서 일반 파일처럼 읽힌다 — /etc/tls/tls.crt. 파일 권한은 defaultMode (0400)으로 root만 읽기 가능. Nginx/Apache가 인증서 파일 경로를 직접 가리킬 때 필수.',
        secret: {
          name: 'tls-cert (Secret · kubernetes.io/tls)',
          icon: '🔐',
          state: 'encoded',
          rows: [
            { key: 'tls.crt', plain: '-----BEGIN CERTIFICATE-----\nMIIDazCCAlOgAwIBAgIU...', encoded: 'LS0tLS1CRUdJTiBDRVJU...' },
            { key: 'tls.key', plain: '-----BEGIN PRIVATE KEY-----\nMIIEvQIBADANBgkqhkiG...', encoded: 'LS0tLS1CRUdJTiBQUklW...' },
          ],
        },
        pod: {
          name: 'nginx-pod',
          injection: 'volume',
          mountPath: '/etc/tls',
          volumeFiles: [
            { path: '/etc/tls/tls.crt', mode: '0400' },
            { path: '/etc/tls/tls.key', mode: '0400' },
          ],
        },
        vault: { connected: false },
        showAlert: false,
        alertText: '',
        files: [
          {
            filename: 'tls-secret.yaml',
            lang: 'yaml',
            lines: [
              '# 1) TLS 전용 Secret 생성',
              'kubectl create secret tls tls-cert \\',
              '  --cert=./server.crt \\',
              '  --key=./server.key',
              '',
              '# 2) 결과 — type=kubernetes.io/tls',
              'apiVersion: v1',
              'kind: Secret',
              'metadata:',
              '  name: tls-cert',
              'type: kubernetes.io/tls',
              'data:',
              '  tls.crt: LS0tLS1CRUdJTiBDRVJU... # base64',
              '  tls.key: LS0tLS1CRUdJTiBQUklW... # base64',
            ],
            highlight: [2, 3, 4, 11, 12, 13, 14],
          },
          {
            filename: 'pod-tls-volume.yaml',
            lang: 'yaml',
            lines: [
              '# TLS 인증서를 volume으로 마운트',
              'apiVersion: v1',
              'kind: Pod',
              'metadata:',
              '  name: nginx-pod',
              'spec:',
              '  containers:',
              '    - name: nginx',
              '      image: nginx:1.27',
              '      ports: [{ containerPort: 443 }]',
              '      volumeMounts:',
              '        - name: tls-volume',
              '          mountPath: /etc/tls    # 컨테이너 내 경로',
              '          readOnly: true',
              '  volumes:',
              '    - name: tls-volume',
              '      secret:',
              '        secretName: tls-cert',
              '        defaultMode: 0400        # root만 읽기',
              '        items:                   # 특정 키만 노출',
              '          - key: tls.crt',
              '            path: tls.crt',
              '          - key: tls.key',
              '            path: tls.key',
              '',
              '# 컨테이너 안에서',
              '# ls /etc/tls/',
              '#   tls.crt  tls.key (각각 0400 권한)',
              '# nginx.conf:',
              '#   ssl_certificate     /etc/tls/tls.crt;',
              '#   ssl_certificate_key /etc/tls/tls.key;',
            ],
            highlight: [11, 12, 13, 16, 17, 18, 19],
          },
        ],
      },
      {
        title: 'Step 5. 외부 Vault / SealedSecrets — etcd 암호화 + 시크릿 매니저',
        desc: 'production에서는 etcd 자체 암호화(EncryptionConfiguration · AES-256) + 외부 시크릿 매니저 권장. SealedSecrets는 클러스터 공개키로 암호화 → git 커밋 안전. External Secrets Operator는 Vault/AWS Secrets Manager에서 Secret을 동적으로 끌어와 K8s Secret으로 자동 생성 + 회전.',
        secret: {
          name: 'db-creds (동적 생성)',
          icon: '🏦',
          state: 'mounted',
          rows: [
            { key: 'DB_PASSWORD', plain: '(Vault에서 fetch)', encoded: '(자동 갱신 1h)' },
            { key: 'API_KEY',     plain: '(Vault에서 fetch)', encoded: '(자동 갱신 1h)' },
          ],
        },
        pod: {
          name: 'app-pod',
          injection: 'env',
          mountPath: null,
          envVars: [
            { name: 'DB_PASSWORD', value: '(rotated)' },
            { name: 'API_KEY',     value: '(rotated)' },
          ],
        },
        vault: { connected: true },
        showAlert: false,
        alertText: '',
        files: [
          {
            filename: 'encryption-at-rest.yaml',
            lang: 'yaml',
            lines: [
              '# 1) etcd 암호화 (encryption-at-rest)',
              '#    /etc/kubernetes/enc/encryption.yaml',
              'apiVersion: apiserver.config.k8s.io/v1',
              'kind: EncryptionConfiguration',
              'resources:',
              '  - resources: [secrets]',
              '    providers:',
              '      - aescbc:                 # AES-256',
              '          keys:',
              '            - name: key1',
              '              secret: <32-byte-base64-key>',
              '      - identity: {}            # fallback',
              '',
              '# kube-apiserver 옵션',
              '# --encryption-provider-config=/etc/kubernetes/enc/encryption.yaml',
              '',
              '# 결과: etcd 디스크에 저장될 때 자동 암호화',
              '# 클라우드 매니지드(EKS/GKE/AKS)는 대개 기본 활성화',
            ],
            highlight: [3, 4, 5, 6, 7, 8],
          },
          {
            filename: 'sealed-secret.yaml',
            lang: 'yaml',
            lines: [
              '# 2) SealedSecrets (Bitnami) — git 커밋 안전',
              'apiVersion: bitnami.com/v1alpha1',
              'kind: SealedSecret',
              'metadata:',
              '  name: db-creds',
              'spec:',
              '  encryptedData:               # 클러스터 공개키로 암호화',
              '    DB_PASSWORD: AgBy8h4FZ9...  # git 커밋 OK',
              '    API_KEY: AgC2k9Xq7M...',
              '',
              '# 흐름',
              '#  1) kubeseal CLI가 클러스터 공개키로 암호화',
              '#  2) SealedSecret YAML을 git 커밋',
              '#  3) 클러스터의 controller가 자동 복호화 → Secret 생성',
              '#  4) 클러스터 외부에서는 복호화 불가',
            ],
            highlight: [2, 3, 7, 8, 9],
          },
          {
            filename: 'external-secret.yaml',
            lang: 'yaml',
            lines: [
              '# 3) External Secrets Operator + Vault',
              'apiVersion: external-secrets.io/v1beta1',
              'kind: ExternalSecret',
              'metadata:',
              '  name: db-creds',
              'spec:',
              '  refreshInterval: 1h          # 자동 회전',
              '  secretStoreRef:',
              '    name: vault-backend',
              '    kind: ClusterSecretStore',
              '  target:',
              '    name: db-creds             # K8s Secret 자동 생성',
              '  data:',
              '    - secretKey: DB_PASSWORD',
              '      remoteRef:',
              '        key: prod/db          # Vault path',
              '        property: password',
              '    - secretKey: API_KEY',
              '      remoteRef:',
              '        key: prod/api',
              '        property: key',
              '',
              '# 흐름',
              '#  Vault → ExternalSecret controller → K8s Secret → Pod',
              '#  1시간마다 fetch → 자동 회전',
              '#  Vault에서 무효화하면 클러스터에서도 즉시 무효화',
            ],
            highlight: [2, 3, 7, 12, 16, 17],
          },
        ],
      },
    ];

    // ─────────────────────────────────────────────────────
    // LiveDataPane — Secret 박스 + Pod 박스 + Vault 다이어그램
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const { secret, pod, vault, showAlert, alertText } = step;

      // Secret 카드 색상 — state별
      const SECRET_STATE_STYLE = {
        plain:    { card: 'bg-red-50 border-red-400',     label: 'bg-red-100 text-red-700',     labelText: '평문 (위험)' },
        encoded:  { card: 'bg-cyan-50 border-cyan-400',   label: 'bg-cyan-100 text-cyan-700',   labelText: 'base64 인코딩' },
        mounted:  { card: 'bg-cyan-50 border-cyan-500',   label: 'bg-cyan-100 text-cyan-800',   labelText: '동적 (Vault)' },
      };
      const sStyle = SECRET_STATE_STYLE[secret.state];

      // 화살표 라벨
      let arrowLabel = '';
      if (pod.injection === 'env')    arrowLabel = 'env: secretKeyRef';
      if (pod.injection === 'volume') arrowLabel = 'volume mount';

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🔐 Secret 흐름</h2>
            <span className="text-[10px] text-slate-400 font-mono">live · k8s.io</span>
          </div>

          {/* Secret 박스 ↔ Pod 박스 (좌 / 우) */}
          <div className="grid grid-cols-[1fr_auto_1fr] items-center gap-2 mb-4">
            {/* Secret 박스 */}
            <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${sStyle.card}`}>
              <div className="flex items-center justify-between mb-2">
                <div className="flex items-center gap-1.5">
                  <span aria-hidden="true" className="text-lg">{secret.icon}</span>
                  <span className="text-[11px] font-bold text-slate-700">{secret.name}</span>
                </div>
                <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${sStyle.label}`}>
                  {sStyle.labelText}
                </span>
              </div>

              <div className="space-y-1.5 font-mono text-[10px]">
                {secret.rows.map((r) => (
                  <div key={r.key} className="bg-white/70 rounded px-2 py-1.5 border border-slate-200">
                    <div className="text-slate-500 font-bold mb-0.5">{r.key}</div>
                    {secret.state === 'plain' && (
                      <div className="text-red-700 break-all">{r.plain}</div>
                    )}
                    {secret.state === 'encoded' && (
                      <>
                        <div className="text-slate-400 line-through break-all">{r.plain.slice(0, 28)}{r.plain.length > 28 ? '…' : ''}</div>
                        <div className="text-cyan-700 break-all">{r.encoded.slice(0, 28)}{r.encoded.length > 28 ? '…' : ''}</div>
                      </>
                    )}
                    {secret.state === 'mounted' && (
                      <div className="text-cyan-700 break-all">{r.encoded}</div>
                    )}
                  </div>
                ))}
              </div>
            </div>

            {/* 화살표 */}
            <div className="flex flex-col items-center justify-center px-1">
              <div className={`text-2xl transition-all ${pod.injection !== 'none' ? 'text-cyan-500' : 'text-slate-300'}`}>
                {pod.injection !== 'none' ? '➜' : '⊘'}
              </div>
              {arrowLabel && (
                <div className="text-[9px] text-cyan-700 font-mono mt-1 text-center leading-tight max-w-[80px]">
                  {arrowLabel}
                </div>
              )}
            </div>

            {/* Pod 박스 */}
            <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${
              pod.injection !== 'none' ? 'bg-cyan-50 border-cyan-400' : 'bg-slate-50 border-slate-300'
            }`}>
              <div className="flex items-center justify-between mb-2">
                <div className="flex items-center gap-1.5">
                  <span aria-hidden="true" className="text-lg">📦</span>
                  <span className="text-[11px] font-bold text-slate-700">{pod.name}</span>
                </div>
                <span className="text-[9px] font-bold px-1.5 py-0.5 rounded bg-slate-100 text-slate-600">
                  Pod
                </span>
              </div>

              {/* env 주입 */}
              {pod.injection === 'env' && pod.envVars && (
                <div className="space-y-1 font-mono text-[10px]">
                  <div className="text-slate-500 font-bold">env:</div>
                  {pod.envVars.map((e) => (
                    <div key={e.name} className="bg-white/70 rounded px-2 py-1 border border-cyan-200">
                      <span className="text-cyan-700">${e.name}</span>
                      <span className="text-slate-400">=</span>
                      <span className="text-slate-700">{e.value}</span>
                    </div>
                  ))}
                </div>
              )}

              {/* volume 주입 */}
              {pod.injection === 'volume' && pod.volumeFiles && (
                <div className="space-y-1 font-mono text-[10px]">
                  <div className="text-slate-500 font-bold">{pod.mountPath}/</div>
                  {pod.volumeFiles.map((f) => (
                    <div key={f.path} className="bg-white/70 rounded px-2 py-1 border border-cyan-200 flex justify-between">
                      <span className="text-cyan-700">{f.path.split('/').pop()}</span>
                      <span className="text-slate-400 text-[9px]">{f.mode}</span>
                    </div>
                  ))}
                </div>
              )}

              {/* 미주입 */}
              {pod.injection === 'none' && (
                <div className="text-[10px] text-slate-400 italic font-mono py-2 text-center">
                  (Secret 미주입)
                </div>
              )}
            </div>
          </div>

          {/* Vault 다이어그램 (Step 5) */}
          {vault.connected && (
            <div className="mt-4 p-3 rounded-lg bg-gradient-to-r from-cyan-50 to-sky-50 border-2 border-cyan-300">
              <div className="text-[11px] font-bold text-slate-700 mb-2 flex items-center gap-1">
                <span>🏦</span>
                <span>외부 시크릿 매니저 연동</span>
              </div>
              <div className="grid grid-cols-[1fr_auto_1fr_auto_1fr] items-center gap-1 text-center">
                <div className="bg-white rounded p-1.5 border border-cyan-300">
                  <div className="text-base">🏦</div>
                  <div className="text-[9px] font-bold text-slate-700">Vault</div>
                  <div className="text-[8px] text-slate-500">prod/db</div>
                </div>
                <div className="text-cyan-600 text-base">➜</div>
                <div className="bg-white rounded p-1.5 border border-cyan-300">
                  <div className="text-base">⚙️</div>
                  <div className="text-[9px] font-bold text-slate-700">ESO</div>
                  <div className="text-[8px] text-slate-500">controller</div>
                </div>
                <div className="text-cyan-600 text-base">➜</div>
                <div className="bg-white rounded p-1.5 border border-cyan-300">
                  <div className="text-base">🔐</div>
                  <div className="text-[9px] font-bold text-slate-700">K8s Secret</div>
                  <div className="text-[8px] text-slate-500">자동 회전 1h</div>
                </div>
              </div>
              <div className="text-[9px] text-cyan-800 mt-2 font-mono text-center">
                etcd 암호화 (AES-256) + RBAC + Vault refresh = 진짜 보안
              </div>
            </div>
          )}

          {/* 안티패턴 알림 (Step 1) */}
          {showAlert && (
            <div className="mt-4 p-3 rounded-lg bg-red-50 border-2 border-red-400 animate-pulse">
              <div className="flex items-center gap-2 text-red-800 font-bold text-sm">
                <span className="text-lg">🚨</span>
                <span>ANTI-PATTERN</span>
              </div>
              <div className="text-[11px] text-red-700 mt-1 font-mono">
                {alertText}
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-red-400"></span>평문 (위험)</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-cyan-400"></span>base64 / 암호화</span>
            <span className="flex items-center gap-1 ml-auto font-mono">step {STEPS.indexOf(step) + 1} / {STEPS.length}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — multi-file 탭 + highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ files, stepIdx, total }) {
      const [tabIdx, setTabIdx] = useState(0);
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      // step 변경 시 탭 0으로 초기화
      useEffect(() => {
        setTabIdx(0);
      }, [stepIdx]);

      const file = files[Math.min(tabIdx, files.length - 1)];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${file.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [file]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일명 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{file.lang}</span>
          </div>

          {/* 탭 (multi-file) */}
          <div className="bg-[#21252b] px-2 pt-1 flex items-end gap-1 border-b border-slate-700 overflow-x-auto">
            {files.map((f, i) => {
              const active = i === tabIdx;
              return (
                <button
                  key={f.filename}
                  onClick={() => setTabIdx(i)}
                  className={`px-3 py-1.5 text-[11px] font-mono rounded-t whitespace-nowrap transition ${
                    active
                      ? 'bg-[#282c34] text-cyan-300 border-t border-x border-cyan-500/40'
                      : 'bg-transparent text-slate-500 hover:text-slate-300'
                  }`}
                >
                  {f.filename}
                </button>
              );
            })}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${file.lang}`}>{file.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || file.lines).map((lineHtml, i) => {
                  const highlighted = file.highlight && file.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-cyan-500/10 border-l-2 border-cyan-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{file.lines.length} lines · {file.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. 운영 &amp; 보안 &gt; Chapter 2. Secret 관리</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Secret — 민감 정보 관리</h1>
                  <p className="text-sm text-slate-500 mt-0.5">자물쇠 금고 — DB 비번 / API 키 / TLS 인증서 (base64 + etcd 암호화 + Vault)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer files={step.files} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-cyan-50 border-2 border-cyan-300 rounded-xl p-3 text-sm text-cyan-900">
                💡 다음(IV-2-2)에서는 <strong>Resource Limits &amp; Requests</strong> — Pod CPU/메모리 예약 좌석 비유로 안정화
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-cyan-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-cyan-600 text-white hover:bg-cyan-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./IV-2-2.html" className="text-cyan-700 hover:text-cyan-900 font-medium">IV-2-2 Resource Limits &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
