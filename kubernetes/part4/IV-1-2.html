<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — ConfigMap</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-1-2. ConfigMap (설정 외부화)
    학습 목표: 설정값을 이미지에서 분리하는 두 방식 (env / volume mount).
    핵심 비유: "공유 메모장" — 코드는 그대로, 메모장 한 장만 갈아끼우면 환경 전환
    구조: 4단계 (이미지에 박힌 설정 / ConfigMap 생성 / env 주입 / volume mount)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 이미지에 설정이 박혀 있으면 — 환경마다 별도 이미지',
        desc: '설정값(DB URL, API endpoint, 로그 레벨)을 이미지 안에 박아두면 dev/staging/production용 이미지를 따로 빌드해야 한다. 같은 코드인데 이미지 3개 — 비효율 + 실수 위험.',
        block: {
          kind: 'shell',
          code: `# Bad: Dockerfile에 환경별 ENV 박기
FROM python:3.11
ENV DB_URL="postgres://prod-db:5432/app"
ENV API_KEY="prod-key-xxx"
ENV LOG_LEVEL="WARN"
COPY . /app

# 환경마다 별도 이미지 필요
$ docker build -t myapp:dev -f Dockerfile.dev .
$ docker build -t myapp:staging -f Dockerfile.staging .
$ docker build -t myapp:prod -f Dockerfile.prod .
# → 3배 빌드 비용 + 코드 변경 시 3배 작업`,
        },
        focus: 'baked-in',
      },
      {
        title: 'Step 2. ConfigMap 생성 — 설정 외부화',
        desc: 'ConfigMap에 환경별 설정을 모아둔다. dev/staging/production 각자 ConfigMap 하나씩. 코드(이미지)는 그대로, ConfigMap만 갈아끼우면 환경 전환 — 공유 메모장에 적힌 페이지를 바꾸는 것과 같다.',
        block: {
          kind: 'yaml',
          code: `apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: production
data:
  DB_URL: "postgres://prod-db:5432/app"
  API_ENDPOINT: "https://api.example.com"
  LOG_LEVEL: "WARN"
  feature_flags.json: |
    {
      "newCheckout": true,
      "experimentalSearch": false
    }

# kubectl create configmap app-config --from-env-file=.env
# kubectl create configmap nginx-conf --from-file=nginx.conf`,
        },
        focus: 'create',
      },
      {
        title: 'Step 3. env 주입 — 환경 변수로 받기',
        desc: 'ConfigMap의 키를 컨테이너 환경 변수로 주입. envFrom으로 통째로, env로 개별 키만. 가장 흔한 패턴. 단점은 Pod 재시작해야 변경값 반영.',
        block: {
          kind: 'yaml',
          code: `apiVersion: v1
kind: Pod
metadata:
  name: web
spec:
  containers:
    - name: app
      image: myapp:v1            # ← 환경 무관, 한 이미지!
      envFrom:
        - configMapRef:
            name: app-config     # 통째로 주입
      env:                       # 또는 개별
        - name: DB_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_URL

# 컨테이너에서
$ env | grep DB_URL
# DB_URL=postgres://prod-db:5432/app`,
        },
        focus: 'env',
      },
      {
        title: 'Step 4. volume mount — 파일로 받기 + Hot Reload',
        desc: 'ConfigMap을 파일로 마운트. nginx.conf 같은 큰 설정 파일에 적합. ConfigMap 변경 시 파일이 (대개 1분 안에) 자동 갱신 — Pod 재시작 없는 hot reload 가능 (단, 앱이 파일 변경 감지해야 함).',
        block: {
          kind: 'yaml',
          code: `apiVersion: v1
kind: Pod
metadata:
  name: nginx
spec:
  containers:
    - name: nginx
      image: nginx:latest
      volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/  # 디렉토리 통째 마운트
  volumes:
    - name: nginx-conf
      configMap:
        name: nginx-conf       # ConfigMap 이름

# 컨테이너에서
$ ls /etc/nginx/conf.d/
default.conf

# ConfigMap 수정 후 (kubectl apply)
# → 1분 안에 마운트된 파일도 갱신됨 (자동!)
# → nginx -s reload 보내면 hot reload 완성`,
        },
        focus: 'mount',
      },
    ];

    const KIND_STYLE = {
      yaml:  { label: 'YAML', textColor: '#fde68a' },
      shell: { label: 'Bash', textColor: '#86efac' },
    };

    function ConfigMapDiagram({ focus }) {
      // 4 단계 정적 매핑
      const SCENARIOS = [
        { key: 'baked-in', emoji: '📦', name: '이미지 박힘', note: '환경마다 빌드' },
        { key: 'create',   emoji: '📝', name: 'ConfigMap',   note: '설정 외부화' },
        { key: 'env',      emoji: '⚙️', name: 'env 주입',    note: '환경변수' },
        { key: 'mount',    emoji: '📂', name: 'volume mount', note: '파일 + hot reload' },
      ];

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">📝 공유 메모장 (ConfigMap)</div>
          <div className="grid grid-cols-4 gap-2">
            {SCENARIOS.map((s) => {
              const isActive = focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-violet-100 border-2 border-violet-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{s.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{s.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{s.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">ConfigMap (설정 외부화)</h1>
                <p className="text-sm text-slate-500 mt-1">공유 메모장 — 코드는 그대로, 설정만 갈아끼우기</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <ConfigMapDiagram focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'mount' && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 mb-6 text-xs text-violet-900">
                💡 다음(IV-2-1)에서는 ConfigMap과 비슷하지만 비밀번호/토큰을 다루는 Secret을 본다 — 금고 비유 (base64 ≠ 보안)
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
