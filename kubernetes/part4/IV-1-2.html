<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — IV-1-2. ConfigMap (설정 분리)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    IV-1-2. ConfigMap — 설정 분리 (코드와 환경 변수/설정 파일 분리)
    학습 목표: 이미지에 박힌 설정을 ConfigMap으로 외부화하고, env 또는 volume 두 방식으로 주입한다.
    핵심 비유: "공유 메모장" — 코드(이미지)는 그대로, 메모장(ConfigMap) 한 장만 갈아끼우면 환경 전환
    패턴: fastapi v1 — 좌(LiveDataPane: ConfigMap 박스 + Pod 박스 + 주입 화살표) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (ConfigMap 시뮬레이션)
    //   configMap   : { name, env, data: [{key, value}], visible }
    //   pod         : { image, env: [{key, value, source}], mounts: [{path, files}] }
    //   injection   : 'none' | 'env' | 'volume'  (좌→우 화살표 종류)
    //   envCompare  : Step 5 — dev/staging/prod 비교 박스 표시
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. 안티패턴 — 이미지에 설정 하드코딩',
        desc: 'Dockerfile에 ENV로 DB URL · API 키 · 로그 레벨을 박으면 dev/staging/prod 이미지를 따로 빌드해야 한다. 같은 코드인데 이미지 3개 — 3배 빌드 시간 + 3배 실수 위험. 운영값이 dev에 흘러가는 사고도 흔하다.',
        configMap: { name: null, env: null, data: [], visible: false },
        pod: {
          image: 'myapp:prod',
          baked: [
            { key: 'DB_URL',    value: 'postgres://prod-db:5432/app' },
            { key: 'API_KEY',   value: 'prod-key-xxxxxx' },
            { key: 'LOG_LEVEL', value: 'WARN' },
          ],
          env: [],
          mounts: [],
        },
        injection: 'none',
        envCompare: false,
        code: {
          lang: 'dockerfile',
          filename: 'Dockerfile.prod',
          lines: [
            '# 안티패턴 — Dockerfile에 환경별 ENV 하드코딩',
            'FROM python:3.11-slim',
            '',
            'WORKDIR /app',
            'COPY requirements.txt .',
            'RUN pip install -r requirements.txt',
            'COPY . .',
            '',
            '# 이미지에 설정값이 박혀버림',
            'ENV DB_URL="postgres://prod-db:5432/app"',
            'ENV API_KEY="prod-key-xxxxxx"',
            'ENV LOG_LEVEL="WARN"',
            'ENV FEATURE_FLAG="true"',
            '',
            'CMD ["python", "main.py"]',
            '',
            '# 환경마다 별도 이미지 필요 — 3배 빌드',
            '$ docker build -t myapp:dev     -f Dockerfile.dev .',
            '$ docker build -t myapp:staging -f Dockerfile.stg .',
            '$ docker build -t myapp:prod    -f Dockerfile.prod .',
            '',
            '# 문제점',
            '#  1) 코드 한 줄 수정 시 3번 빌드 (CI 시간 3배)',
            '#  2) prod 이미지를 dev에 잘못 배포하는 사고',
            '#  3) API_KEY가 이미지 layer에 영구 저장 (보안)',
            '#  4) docker history myapp:prod 로 시크릿 노출',
          ],
          highlight: [9, 10, 11, 12, 13, 17, 18, 19],
        },
      },
      {
        title: 'Step 2. ConfigMap 정의 — key-value 외부화',
        desc: 'kind: ConfigMap에 환경별 설정을 모은다. data 섹션에 LOG_LEVEL=info · FEATURE_FLAG=true 등을 key-value로 적는다. 이미지(코드)와 분리됐기에 같은 이미지로 dev · staging · prod 모두 운영 가능. ConfigMap은 클러스터 안에 저장된 "공유 메모장"이다.',
        configMap: {
          name: 'app-config',
          env: 'dev',
          data: [
            { key: 'LOG_LEVEL',     value: 'info' },
            { key: 'FEATURE_FLAG',  value: 'true' },
            { key: 'DB_URL',        value: 'postgres://dev-db:5432/app' },
            { key: 'API_ENDPOINT',  value: 'https://api-dev.example.com' },
          ],
          visible: true,
        },
        pod: {
          image: 'myapp:v1',
          baked: [],
          env: [],
          mounts: [],
        },
        injection: 'none',
        envCompare: false,
        code: {
          lang: 'yaml',
          filename: 'configmap.yaml',
          lines: [
            '# ConfigMap — 설정값을 key-value로 외부화',
            'apiVersion: v1',
            'kind: ConfigMap',
            'metadata:',
            '  name: app-config',
            '  namespace: dev',
            'data:',
            '  # 평탄한 key=value 쌍 (env 주입용)',
            '  LOG_LEVEL: "info"',
            '  FEATURE_FLAG: "true"',
            '  DB_URL: "postgres://dev-db:5432/app"',
            '  API_ENDPOINT: "https://api-dev.example.com"',
            '',
            '  # 파일 통째로도 저장 가능 (volume mount용)',
            '  app.properties: |',
            '    log.level=info',
            '    feature.flag=true',
            '    cache.ttl=300',
            '',
            '# 생성 명령',
            '$ kubectl apply -f configmap.yaml',
            '$ kubectl get configmap app-config',
            '$ kubectl describe configmap app-config -n dev',
            '',
            '# .env 파일 통째 import도 가능',
            '$ kubectl create configmap app-config \\',
            '    --from-env-file=.env -n dev',
          ],
          highlight: [2, 3, 4, 5, 8, 9, 10, 11, 12],
        },
      },
      {
        title: 'Step 3. env 주입 — 환경 변수로 받기',
        desc: 'Pod spec.containers.env에 valueFrom.configMapKeyRef로 ConfigMap의 키를 환경 변수로 매핑. 컨테이너 안에서 process.env.LOG_LEVEL · os.environ["LOG_LEVEL"]로 읽는다. 가장 흔한 패턴 — envFrom으로 통째 import도 가능. 단점: ConfigMap 변경 시 Pod 재시작해야 반영.',
        configMap: {
          name: 'app-config',
          env: 'dev',
          data: [
            { key: 'LOG_LEVEL',     value: 'info' },
            { key: 'FEATURE_FLAG',  value: 'true' },
            { key: 'DB_URL',        value: 'postgres://dev-db:5432/app' },
            { key: 'API_ENDPOINT',  value: 'https://api-dev.example.com' },
          ],
          visible: true,
        },
        pod: {
          image: 'myapp:v1',
          baked: [],
          env: [
            { key: 'LOG_LEVEL',    value: 'info',                          source: 'configMap' },
            { key: 'FEATURE_FLAG', value: 'true',                          source: 'configMap' },
            { key: 'DB_URL',       value: 'postgres://dev-db:5432/app',    source: 'configMap' },
            { key: 'API_ENDPOINT', value: 'https://api-dev.example.com',   source: 'configMap' },
          ],
          mounts: [],
        },
        injection: 'env',
        envCompare: false,
        code: {
          lang: 'yaml',
          filename: 'pod-env.yaml',
          lines: [
            '# Pod — ConfigMap을 env로 주입',
            'apiVersion: v1',
            'kind: Pod',
            'metadata:',
            '  name: web',
            '  namespace: dev',
            'spec:',
            '  containers:',
            '    - name: app',
            '      image: myapp:v1            # 환경 무관 — 한 이미지!',
            '      ports:',
            '        - containerPort: 8000',
            '',
            '      # (A) 개별 키 매핑',
            '      env:',
            '        - name: LOG_LEVEL',
            '          valueFrom:',
            '            configMapKeyRef:',
            '              name: app-config',
            '              key: LOG_LEVEL',
            '        - name: DB_URL',
            '          valueFrom:',
            '            configMapKeyRef:',
            '              name: app-config',
            '              key: DB_URL',
            '',
            '      # (B) 통째 import — 모든 키를 한번에',
            '      envFrom:',
            '        - configMapRef:',
            '            name: app-config',
            '',
            '# 컨테이너 안에서 확인',
            '$ kubectl exec web -- env | grep LOG_LEVEL',
            '# LOG_LEVEL=info',
            '',
            '# 주의: ConfigMap 변경 → Pod 재시작 필요',
          ],
          highlight: [10, 14, 15, 16, 17, 18, 19, 20, 28, 29, 30],
        },
      },
      {
        title: 'Step 4. volume 마운트 — 파일로 받기',
        desc: 'volumes에 configMap 타입을 정의하고 volumeMounts.mountPath로 컨테이너 경로에 마운트. ConfigMap data의 각 key가 파일명, value가 파일 내용이 된다 — /etc/config/app.properties 로 등장. nginx.conf 같은 큰 설정 파일에 적합. ConfigMap 수정 → 약 1분 안에 파일 자동 갱신 (hot reload 가능, 단 앱이 변경 감지 필요).',
        configMap: {
          name: 'app-config',
          env: 'dev',
          data: [
            { key: 'app.properties', value: 'log.level=info\\nfeature.flag=true\\ncache.ttl=300' },
            { key: 'nginx.conf',     value: 'server { listen 80; ... }' },
          ],
          visible: true,
        },
        pod: {
          image: 'myapp:v1',
          baked: [],
          env: [],
          mounts: [
            { path: '/etc/config/app.properties', source: 'app-config/app.properties' },
            { path: '/etc/config/nginx.conf',     source: 'app-config/nginx.conf' },
          ],
        },
        injection: 'volume',
        envCompare: false,
        code: {
          lang: 'yaml',
          filename: 'pod-volume.yaml',
          lines: [
            '# Pod — ConfigMap을 volume으로 마운트',
            'apiVersion: v1',
            'kind: Pod',
            'metadata:',
            '  name: web',
            '  namespace: dev',
            'spec:',
            '  containers:',
            '    - name: app',
            '      image: myapp:v1',
            '      volumeMounts:',
            '        - name: config-volume',
            '          mountPath: /etc/config   # 디렉토리 통째 마운트',
            '          readOnly: true',
            '',
            '  volumes:',
            '    - name: config-volume',
            '      configMap:',
            '        name: app-config          # ConfigMap 이름',
            '        # 특정 키만 골라 마운트하고 싶다면',
            '        # items:',
            '        #   - key: app.properties',
            '        #     path: app.properties',
            '',
            '# 컨테이너에서 확인',
            '$ kubectl exec web -- ls /etc/config',
            '# app.properties',
            '# nginx.conf',
            '',
            '$ kubectl exec web -- cat /etc/config/app.properties',
            '# log.level=info',
            '# feature.flag=true',
            '# cache.ttl=300',
            '',
            '# Hot Reload — ConfigMap 수정 후',
            '$ kubectl edit configmap app-config',
            '# → 약 1분 안에 마운트된 파일 자동 갱신',
            '# → 앱이 inotify/poll로 감지하면 재시작 없이 반영',
          ],
          highlight: [10, 11, 12, 13, 16, 17, 18, 19],
        },
      },
      {
        title: 'Step 5. 환경별 ConfigMap — 같은 이미지 재사용',
        desc: 'dev / staging / prod namespace 각자 ConfigMap을 두면 myapp:v1 한 이미지로 세 환경 모두 운영. 코드 변경 → 한 번 빌드 → 세 곳 동시 배포. ConfigMap 값만 다르고 Pod spec은 동일 — 진정한 "12-factor app" 의 III. Config 원칙 실천. 운영 사고 가장 큰 원인 "환경별 빌드 차이" 가 사라진다.',
        configMap: {
          name: 'app-config',
          env: 'all',
          data: [
            { key: 'LOG_LEVEL',     value: '환경별 다름' },
            { key: 'FEATURE_FLAG',  value: '환경별 다름' },
            { key: 'DB_URL',        value: '환경별 다름' },
          ],
          visible: true,
        },
        pod: {
          image: 'myapp:v1',
          baked: [],
          env: [
            { key: 'LOG_LEVEL',    value: '(환경별)', source: 'configMap' },
            { key: 'FEATURE_FLAG', value: '(환경별)', source: 'configMap' },
            { key: 'DB_URL',       value: '(환경별)', source: 'configMap' },
          ],
          mounts: [],
        },
        injection: 'env',
        envCompare: true,
        code: {
          lang: 'yaml',
          filename: 'configmap-by-env.yaml',
          lines: [
            '# 같은 이미지 myapp:v1 → 환경별 ConfigMap만 다르게',
            '',
            '---',
            '# dev/configmap.yaml',
            'apiVersion: v1',
            'kind: ConfigMap',
            'metadata: { name: app-config, namespace: dev }',
            'data:',
            '  LOG_LEVEL: "debug"',
            '  FEATURE_FLAG: "true"',
            '  DB_URL: "postgres://dev-db:5432/app"',
            '',
            '---',
            '# staging/configmap.yaml',
            'apiVersion: v1',
            'kind: ConfigMap',
            'metadata: { name: app-config, namespace: staging }',
            'data:',
            '  LOG_LEVEL: "info"',
            '  FEATURE_FLAG: "true"',
            '  DB_URL: "postgres://stg-db:5432/app"',
            '',
            '---',
            '# prod/configmap.yaml',
            'apiVersion: v1',
            'kind: ConfigMap',
            'metadata: { name: app-config, namespace: prod }',
            'data:',
            '  LOG_LEVEL: "warn"',
            '  FEATURE_FLAG: "false"   # prod는 신기능 OFF',
            '  DB_URL: "postgres://prod-db:5432/app"',
            '',
            '# 배포 — Pod spec은 모두 동일',
            '$ kubectl apply -f pod.yaml -n dev',
            '$ kubectl apply -f pod.yaml -n staging',
            '$ kubectl apply -f pod.yaml -n prod',
            '',
            '# → 같은 myapp:v1 이미지가 3 환경에서 다르게 동작',
            '# → 12-factor app III. Config: 코드와 설정 완전 분리',
          ],
          highlight: [9, 10, 11, 19, 20, 21, 29, 30, 31],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 환경별 비교 데이터 (Step 5 전용)
    // ─────────────────────────────────────────────────────
    const ENV_COMPARE = [
      {
        env: 'dev',
        emoji: '🛠️',
        color: 'sky',
        data: [
          { key: 'LOG_LEVEL',    value: 'debug' },
          { key: 'FEATURE_FLAG', value: 'true' },
          { key: 'DB_URL',       value: 'dev-db:5432' },
        ],
      },
      {
        env: 'staging',
        emoji: '🧪',
        color: 'amber',
        data: [
          { key: 'LOG_LEVEL',    value: 'info' },
          { key: 'FEATURE_FLAG', value: 'true' },
          { key: 'DB_URL',       value: 'stg-db:5432' },
        ],
      },
      {
        env: 'prod',
        emoji: '🚀',
        color: 'rose',
        data: [
          { key: 'LOG_LEVEL',    value: 'warn' },
          { key: 'FEATURE_FLAG', value: 'false' },
          { key: 'DB_URL',       value: 'prod-db:5432' },
        ],
      },
    ];

    // 환경별 정적 Tailwind (purge 안전)
    const ENV_STYLE = {
      sky:   { card: 'bg-sky-50 border-sky-300',     title: 'text-sky-800',     badge: 'bg-sky-500 text-white' },
      amber: { card: 'bg-amber-50 border-amber-300', title: 'text-amber-800',   badge: 'bg-amber-500 text-white' },
      rose:  { card: 'bg-rose-50 border-rose-300',   title: 'text-rose-800',    badge: 'bg-rose-500 text-white' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — ConfigMap 박스 + Pod 박스 + 주입 화살표
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const { configMap, pod, injection, envCompare } = step;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">📝 공유 메모장 (ConfigMap) → Pod</h2>
            <span className="text-[10px] text-slate-400 font-mono">cluster · namespace</span>
          </div>

          {/* ConfigMap 박스 + Pod 박스 + 화살표 */}
          <div className="grid grid-cols-[1fr_auto_1fr] gap-2 items-stretch">
            {/* 좌: ConfigMap 박스 */}
            <ConfigMapBox configMap={configMap} />

            {/* 가운데: 화살표 */}
            <InjectionArrow injection={injection} />

            {/* 우: Pod 박스 */}
            <PodBox pod={pod} injection={injection} />
          </div>

          {/* 환경별 비교 (Step 5) */}
          {envCompare && (
            <div className="mt-5 pt-4 border-t border-slate-100">
              <div className="text-xs font-bold text-slate-700 mb-2">🌐 같은 이미지 myapp:v1, ConfigMap만 환경별로</div>
              <div className="grid grid-cols-3 gap-2">
                {ENV_COMPARE.map((e) => {
                  const style = ENV_STYLE[e.color];
                  return (
                    <div key={e.env} className={`rounded-lg border-2 p-2 ${style.card}`}>
                      <div className="flex items-center justify-between mb-1">
                        <div className="flex items-center gap-1">
                          <span>{e.emoji}</span>
                          <span className={`text-[11px] font-bold ${style.title}`}>{e.env}</span>
                        </div>
                        <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${style.badge}`}>ConfigMap</span>
                      </div>
                      <div className="space-y-0.5">
                        {e.data.map((d) => (
                          <div key={d.key} className="flex justify-between text-[9px] font-mono">
                            <span className="text-slate-600 truncate">{d.key}</span>
                            <span className="text-slate-800 font-bold truncate ml-1">{d.value}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
              <div className="mt-2 text-[10px] text-slate-500 text-center">
                Pod spec 동일 · 이미지 동일 · ConfigMap만 다름 → 12-factor app III. Config
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-3 h-0.5 bg-emerald-500"></span>env 주입 (환경 변수)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-0.5 bg-orange-500"></span>volume 마운트 (파일)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-red-300"></span>이미지에 박힘 (안티)
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // ConfigMap 박스 (좌측)
    // ─────────────────────────────────────────────────────
    function ConfigMapBox({ configMap }) {
      if (!configMap.visible) {
        return (
          <div className="rounded-lg border-2 border-dashed border-slate-300 bg-slate-50 p-3 flex items-center justify-center min-h-[200px]">
            <div className="text-center">
              <div className="text-3xl opacity-40">📝</div>
              <div className="text-[10px] text-slate-400 mt-2 font-mono">(ConfigMap 없음)</div>
              <div className="text-[10px] text-slate-400 mt-0.5">설정이 이미지에 박힘</div>
            </div>
          </div>
        );
      }

      return (
        <div className="rounded-lg border-2 border-cyan-400 bg-cyan-50 p-3 transition-all duration-500 shadow-sm">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span>📝</span>
              <span className="text-[11px] font-bold text-cyan-800">ConfigMap</span>
            </div>
            <span className="text-[9px] font-bold px-1.5 py-0.5 rounded bg-cyan-500 text-white">
              {configMap.env || 'ns'}
            </span>
          </div>

          <div className="text-[10px] font-mono text-cyan-700 mb-2 truncate">
            {configMap.name}
          </div>

          {/* key-value 표 */}
          <div className="bg-white rounded border border-cyan-200 overflow-hidden">
            <div className="bg-cyan-100 px-2 py-1 text-[9px] font-bold text-cyan-800 border-b border-cyan-200 flex justify-between">
              <span>data:</span>
              <span>{configMap.data.length} key</span>
            </div>
            <div className="divide-y divide-cyan-100">
              {configMap.data.map((d, i) => (
                <div key={i} className="px-2 py-1 flex justify-between gap-1">
                  <span className="text-[9px] font-mono text-slate-600 truncate flex-shrink-0 max-w-[55%]">
                    {d.key}
                  </span>
                  <span className="text-[9px] font-mono text-slate-800 font-bold truncate text-right">
                    {d.value}
                  </span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 주입 화살표 (가운데)
    // ─────────────────────────────────────────────────────
    function InjectionArrow({ injection }) {
      if (injection === 'none') {
        return (
          <div className="flex items-center justify-center px-1">
            <div className="text-slate-300 text-2xl">⋯</div>
          </div>
        );
      }

      const isEnv = injection === 'env';
      const color = isEnv ? 'emerald' : 'orange';
      const label = isEnv ? 'env' : 'volume';
      const colorMap = {
        emerald: { stroke: '#10b981', bg: 'bg-emerald-100', text: 'text-emerald-700' },
        orange:  { stroke: '#f97316', bg: 'bg-orange-100',  text: 'text-orange-700' },
      };
      const c = colorMap[color];

      return (
        <div className="flex flex-col items-center justify-center px-1 min-w-[60px]">
          <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${c.bg} ${c.text} mb-1`}>
            {label}
          </span>
          <svg width="50" height="40" viewBox="0 0 50 40" className="overflow-visible">
            <defs>
              <marker id={`arrow-${color}`} viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill={c.stroke} />
              </marker>
            </defs>
            <line x1="2" y1="20" x2="42" y2="20"
              stroke={c.stroke} strokeWidth="2.5"
              markerEnd={`url(#arrow-${color})`}>
              <animate attributeName="stroke-dashoffset" from="0" to="-12" dur="1s" repeatCount="indefinite" />
            </line>
            <line x1="2" y1="20" x2="42" y2="20"
              stroke={c.stroke} strokeWidth="2.5"
              strokeDasharray="6 6" opacity="0.4">
              <animate attributeName="stroke-dashoffset" from="0" to="-12" dur="1s" repeatCount="indefinite" />
            </line>
          </svg>
          <span className="text-[9px] text-slate-500 mt-1">주입</span>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Pod 박스 (우측)
    // ─────────────────────────────────────────────────────
    function PodBox({ pod, injection }) {
      const hasBaked = pod.baked && pod.baked.length > 0;
      const hasEnv   = pod.env && pod.env.length > 0;
      const hasMount = pod.mounts && pod.mounts.length > 0;

      return (
        <div className="rounded-lg border-2 border-slate-400 bg-slate-50 p-3 transition-all duration-500 shadow-sm">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span>📦</span>
              <span className="text-[11px] font-bold text-slate-800">Pod</span>
            </div>
            <span className="text-[9px] font-bold px-1.5 py-0.5 rounded bg-slate-600 text-white">
              container
            </span>
          </div>

          <div className="text-[10px] font-mono text-slate-700 mb-2 truncate">
            image: {pod.image}
          </div>

          {/* 이미지에 박힌 설정 (Step 1) */}
          {hasBaked && (
            <div className="bg-red-50 rounded border-2 border-red-300 overflow-hidden mb-2">
              <div className="bg-red-200 px-2 py-1 text-[9px] font-bold text-red-800 border-b border-red-300 flex items-center gap-1">
                <span>🔥</span>
                <span>이미지 ENV (박혀있음)</span>
              </div>
              <div className="divide-y divide-red-100">
                {pod.baked.map((b, i) => (
                  <div key={i} className="px-2 py-1 flex justify-between gap-1">
                    <span className="text-[9px] font-mono text-slate-600 truncate max-w-[40%]">{b.key}</span>
                    <span className="text-[9px] font-mono text-red-700 font-bold truncate text-right">{b.value}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* env 주입 결과 */}
          {hasEnv && (
            <div className="bg-white rounded border border-emerald-300 overflow-hidden mb-2">
              <div className="bg-emerald-100 px-2 py-1 text-[9px] font-bold text-emerald-800 border-b border-emerald-200 flex justify-between">
                <span>env: (process.env)</span>
                <span>{pod.env.length} var</span>
              </div>
              <div className="divide-y divide-emerald-50">
                {pod.env.map((e, i) => (
                  <div key={i} className="px-2 py-1 flex justify-between gap-1">
                    <span className="text-[9px] font-mono text-slate-600 truncate max-w-[45%]">{e.key}</span>
                    <span className="text-[9px] font-mono text-emerald-700 font-bold truncate text-right">{e.value}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* volume 마운트 결과 */}
          {hasMount && (
            <div className="bg-white rounded border border-orange-300 overflow-hidden">
              <div className="bg-orange-100 px-2 py-1 text-[9px] font-bold text-orange-800 border-b border-orange-200 flex justify-between">
                <span>volumeMounts:</span>
                <span>{pod.mounts.length} file</span>
              </div>
              <div className="divide-y divide-orange-50">
                {pod.mounts.map((m, i) => (
                  <div key={i} className="px-2 py-1">
                    <div className="text-[9px] font-mono text-orange-700 font-bold truncate">{m.path}</div>
                    <div className="text-[8px] font-mono text-slate-500 truncate">← {m.source}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* 비어있을 때 */}
          {!hasBaked && !hasEnv && !hasMount && (
            <div className="bg-white rounded border-2 border-dashed border-slate-300 p-3 text-center">
              <div className="text-[10px] text-slate-400">설정 미주입</div>
              <div className="text-[9px] text-slate-400 mt-0.5 font-mono">(ConfigMap 대기)</div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-cyan-500/15 border-l-2 border-cyan-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. 설정 &amp; 시크릿 &gt; Chapter 1. ConfigMap</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">ConfigMap (설정 분리)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">공유 메모장 — 코드(이미지)는 그대로, 설정만 갈아끼우면 환경 전환</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-cyan-50 border-2 border-cyan-300 rounded-xl p-3 text-sm text-cyan-900">
                💡 다음(IV-2-1)에서는 <strong>Secret</strong> — ConfigMap과 비슷하지만 비밀번호 · 토큰 · 인증서 전용 (금고 비유, base64 ≠ 보안)
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-cyan-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-cyan-600 text-white hover:bg-cyan-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; IV-1-1 Namespace</a>
              <a href="./IV-2-1.html" className="text-cyan-700 hover:text-cyan-900 font-medium">IV-2-1 Secret &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
