<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — Resource Limits & Requests</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-2-2. Resource Limits & Requests
    학습 목표: requests/limits로 Pod 스케줄링 안정화 + QoS 클래스.
    핵심 비유: "예약 좌석 + 최대 사용량" — requests=예약(스케줄링 보장), limits=상한(초과 시 OOMKilled)
    구조: 4단계 (설정 없음 / requests / limits / QoS Guaranteed)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 설정 없음 — 무한 사용 가정 → 노드 죽음',
        desc: 'requests/limits 없으면 Pod는 노드 자원을 무제한으로 쓸 수 있다고 가정. 한 Pod의 메모리 누수 → 노드 전체가 OOM → 다른 Pod도 같이 죽음. 운영에서 절대 금지.',
        block: {
          kind: 'yaml',
          code: `apiVersion: v1
kind: Pod
metadata:
  name: web
spec:
  containers:
    - name: app
      image: myapp:v1
      # ❌ resources 없음 — 위험!

# 결과: app이 메모리 누수
# 노드 OOM Killer 작동 → 우선순위 낮은 Pod부터 죽임
# → 다른 정상 Pod까지 같이 죽음
# → 노드 자체가 NotReady 상태로`,
        },
        focus: 'no-resources',
        qos: 'BestEffort',
      },
      {
        title: 'Step 2. requests — "예약 좌석" 보장',
        desc: 'requests는 K8s 스케줄러가 Pod를 어느 노드에 둘지 결정하는 기준. "최소 이만큼 자원이 남는 노드에만 띄워라". 예약 좌석을 잡는 것과 같음 — 행사 시작 시 자기 자리는 확보됨.',
        block: {
          kind: 'yaml',
          code: `spec:
  containers:
    - name: app
      image: myapp:v1
      resources:
        requests:
          cpu: "200m"           # 0.2 코어 예약
          memory: "256Mi"       # 256MB 예약
      # limits 없음 — 노드 여유 시 더 사용 가능

# 스케줄러: "이 노드에 200m + 256Mi 남아 있나?"
# Yes → 배치 / No → 다른 노드

# QoS: Burstable (초과 사용 가능, 노드 부족 시 우선 강등)`,
        },
        focus: 'requests',
        qos: 'Burstable',
      },
      {
        title: 'Step 3. limits — "최대 사용량" 상한',
        desc: 'limits는 Pod가 쓸 수 있는 최대치. 메모리 limits 초과 → 즉시 OOMKilled. CPU limits 초과 → 스로틀링(느려짐, 죽지는 않음). 폭주 Pod가 노드 전체를 잡지 못하게 막는 안전선.',
        block: {
          kind: 'yaml',
          code: `spec:
  containers:
    - name: app
      image: myapp:v1
      resources:
        requests:
          cpu: "200m"
          memory: "256Mi"
        limits:
          cpu: "500m"           # 0.5 코어 상한
          memory: "512Mi"       # 512MB 상한 ← 초과 시 OOMKilled

# 메모리 누수가 생겨도 512Mi에서 멈춤
# Pod만 재시작 → 다른 Pod에 영향 없음

# 확인
# kubectl describe pod web
# State: Running
# Last State: Terminated, Reason: OOMKilled  ← 흔한 신호`,
        },
        focus: 'limits',
        qos: 'Burstable',
      },
      {
        title: 'Step 4. QoS Guaranteed — requests = limits',
        desc: 'requests와 limits를 똑같이 설정하면 QoS 클래스가 Guaranteed로 승격. 노드 자원 부족 시 가장 마지막에 죽음. DB / 핵심 서비스 / 모니터링 등 운영 critical Pod에 권장.',
        block: {
          kind: 'yaml',
          code: `spec:
  containers:
    - name: db
      image: postgres:16
      resources:
        requests:
          cpu: "1"              # 정확히 같게
          memory: "2Gi"
        limits:
          cpu: "1"              # ← requests와 동일
          memory: "2Gi"         # ← QoS = Guaranteed

# 3가지 QoS 클래스 (kubelet eviction 우선순위)
# 1. BestEffort  (resources 없음)      ← 첫 번째로 죽음
# 2. Burstable   (requests만, 또는 ≠)
# 3. Guaranteed  (requests = limits)   ← 마지막에 죽음

# 운영 안정성: critical Pod는 Guaranteed로`,
        },
        focus: 'qos-guaranteed',
        qos: 'Guaranteed',
      },
    ];

    const KIND_STYLE = {
      yaml:  { label: 'YAML', textColor: '#fde68a' },
      shell: { label: 'Bash', textColor: '#86efac' },
    };

    // QoS 클래스 색상 정적 매핑
    const QOS_STYLE = {
      BestEffort:  { bg: 'bg-red-100',     border: 'border-red-400',     text: 'text-red-800',     desc: '첫 번째로 강등' },
      Burstable:   { bg: 'bg-amber-100',   border: 'border-amber-400',   text: 'text-amber-800',   desc: '중간 우선순위' },
      Guaranteed:  { bg: 'bg-emerald-100', border: 'border-emerald-400', text: 'text-emerald-800', desc: '마지막에 죽음' },
    };

    function ResourceDiagram({ focus, qos }) {
      const q = QOS_STYLE[qos];
      // 4 단계 — qos 표기로 Step 2/3 차이 명확화 (W-1 보강)
      const SCENARIOS = [
        { key: 'no-resources',     emoji: '❌', name: '설정 없음',  qosLabel: 'BestEffort' },
        { key: 'requests',          emoji: '🪑', name: 'requests만', qosLabel: 'Burstable' },
        { key: 'limits',            emoji: '🚧', name: '+ limits',   qosLabel: 'Burstable' },
        { key: 'qos-guaranteed',    emoji: '🛡️',  name: 'Guaranteed', qosLabel: 'Guaranteed' },
      ];

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="flex items-center justify-between mb-3">
            <div className="text-xs font-bold text-slate-700">🪑 예약 좌석 + 상한 (Resource)</div>
            <div className={`${q.bg} border ${q.border} rounded-md px-2 py-1 text-[10px] ${q.text}`}>
              QoS: {qos} — {q.desc}
            </div>
          </div>
          <div className="grid grid-cols-4 gap-2">
            {SCENARIOS.map((s) => {
              const isActive = focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-violet-100 border-2 border-violet-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{s.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{s.name}</div>
                  <div className="text-[9px] text-slate-500 mt-1 font-mono">{s.qosLabel}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Resource Limits & Requests</h1>
                <p className="text-sm text-slate-500 mt-1">예약 좌석 + 최대 사용량 — QoS로 안정성 차등화</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <ResourceDiagram focus={step.focus} qos={step.qos} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'qos-guaranteed' && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 mb-6 text-xs text-violet-900">
                💡 Part IV Storage & Config 4/4 완성! K8s 14/20 (70%). 다음(V-1-1)부터는 실전 운영 — kubectl 핵심 명령어부터
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
