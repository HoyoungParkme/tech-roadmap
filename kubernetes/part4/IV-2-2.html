    // ─────────────────────────────────────────────────────
    const QOS_STYLE = {
      Guaranteed: { bg: 'bg-emerald-100', border: 'border-emerald-400', text: 'text-emerald-800', dot: 'bg-emerald-500' },
      Burstable:  { bg: 'bg-amber-100',   border: 'border-amber-400',   text: 'text-amber-800',   dot: 'bg-amber-500'   },
      BestEffort: { bg: 'bg-rose-100',    border: 'border-rose-400',    text: 'text-rose-800',    dot: 'bg-rose-500'    },
    };

    const STATUS_LABEL = {
      'running':     { text: 'Running',     color: 'text-emerald-600' },
      'oomkilled':   { text: 'OOMKilled',   color: 'text-red-600'     },
      'starving':    { text: 'Starving',    color: 'text-amber-600'   },
      'evict-first': { text: 'Evict 1순위', color: 'text-rose-600'    },
    };

    // ─────────────────────────────────────────────────────
    // SVG 막대 차트 — 한 Pod 의 CPU 또는 Memory
    //   width = 100% 기준, request 점선 / limit 실선 / use 채움
    // ─────────────────────────────────────────────────────
    function ResourceBar({ label, unit, req, lim, use, total, color, oom }) {
      // 노드 전체 대비 % 위치
      const pct = (v) => Math.min(100, (v / total) * 100);
      const usePct = pct(use);
      const reqPct = pct(req);
      const limPct = pct(lim);
      const overLimit = lim > 0 && use > lim;

      return (
        <div className="mb-2">
          <div className="flex items-baseline justify-between mb-1">
            <span className="text-[10px] font-mono text-slate-600">{label}</span>
            <span className={`text-[10px] font-mono ${overLimit ? 'text-red-600 font-bold' : 'text-slate-500'}`}>
              {use}{unit}
              {req > 0 && <span className="text-slate-400"> / req {req}</span>}
              {lim > 0 && <span className="text-slate-400"> / lim {lim}</span>}
            </span>
          </div>
          <div className="relative h-5 bg-slate-100 rounded border border-slate-200 overflow-visible">
            {/* usage bar */}
            <div
              className={`absolute top-0 left-0 h-full rounded-l transition-all duration-700 ${overLimit ? 'bg-red-500 animate-pulse' : color}`}
              style={{ width: `${usePct}%` }}
            />
            {/* request 점선 */}
            {req > 0 && (
              <div
                className="absolute top-0 bottom-0 w-0 border-l-2 border-dashed border-cyan-700 z-10"
                style={{ left: `${reqPct}%` }}
                title={`request ${req}${unit}`}
              />
            )}
            {/* limit 실선 */}
            {lim > 0 && (
              <div
                className="absolute top-0 bottom-0 w-0 border-l-2 border-solid border-red-600 z-10"
                style={{ left: `${limPct}%` }}
                title={`limit ${lim}${unit}`}
              />
            )}
            {/* OOM 알람 아이콘 */}
            {oom && (
              <div className="absolute -right-1 -top-1 text-[10px] z-20" aria-hidden="true">🚨</div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — Pod 3개의 CPU/Memory 막대 + Node 합계
    // ─────────────────────────────────────────────────────

      // 노드 합계
      const totalCpuUse = pods.reduce((s, p) => s + p.cpu.use, 0);
      const totalMemUse = pods.reduce((s, p) => s + p.mem.use, 0);
      const totalCpuReq = pods.reduce((s, p) => s + p.cpu.req, 0);
      const totalMemReq = pods.reduce((s, p) => s + p.mem.req, 0);
      const cpuPct = Math.round((totalCpuUse / NODE_CPU_TOTAL) * 100);
      const memPct = Math.round((totalMemUse / NODE_MEM_TOTAL) * 100);

      const isWarning = focus === 'no-limits';
      const isOom = focus === 'limits';

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📊 Node 자원 사용량 (CPU 4 core / Memory 8 GiB)</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* Node 헤더 */}
          <div className={`rounded-lg border-2 p-3 mb-4 ${
            isWarning ? 'border-red-400 bg-red-50' :
            isOom ? 'border-orange-400 bg-orange-50' :
            'border-emerald-300 bg-emerald-50'
          }`}>
            <div className="flex items-center gap-3 mb-2">
              <span className="text-xl">🖥️</span>
              <div className="flex-1">
                <div className="text-xs font-bold text-slate-800">node-1 (allocatable: 4 CPU / 8 GiB)</div>
                <div className="text-[10px] text-slate-500 font-mono mt-0.5">
                  CPU req {totalCpuReq}m use {totalCpuUse}m ({cpuPct}%) ·
                  Mem req {totalMemReq}Mi use {totalMemUse}Mi ({memPct}%)
                </div>
              </div>
            </div>
            <div className={`text-[11px] font-medium ${
              isWarning ? 'text-red-700' :
              isOom ? 'text-orange-700' :
              'text-emerald-700'
            }`}>
              {nodeWarning}
            </div>
          </div>

          {/* Pod 카드 3개 */}
          <div className="space-y-3">
            {pods.map((pod) => {
              const qosStyle = QOS_STYLE[pod.qos];
              const statusStyle = STATUS_LABEL[pod.status] || STATUS_LABEL.running;
              return (
                <div
                  key={pod.name}
                  className={`rounded-lg border-2 p-3 transition-all duration-500 ${qosStyle.bg} ${qosStyle.border} ${pod.oom ? 'animate-pulse' : ''}`}
                >
                  <div className="flex items-center justify-between mb-2">
                    <div className="flex items-center gap-2">
                      <span className={`w-2 h-2 rounded-full ${qosStyle.dot}`}></span>
                      <span className="text-xs font-bold text-slate-800">📦 {pod.name}</span>
                      <span className={`text-[10px] font-mono px-1.5 py-0.5 rounded ${qosStyle.bg} ${qosStyle.text} border ${qosStyle.border}`}>
                        {pod.qos}
                      </span>
                    </div>
                    <span className={`text-[10px] font-bold ${statusStyle.color}`}>
                      {pod.oom ? '🚨 ' : ''}{statusStyle.text}
                    </span>
                  </div>

                  <ResourceBar
                    label="CPU"
                    unit="m"
                    req={pod.cpu.req}
                    lim={pod.cpu.lim}
                    use={pod.cpu.use}
                    total={NODE_CPU_TOTAL}
                    color="bg-cyan-500"
                    oom={false}
                  />
                  <ResourceBar
                    label="Memory"
                    unit="Mi"
                    req={pod.mem.req}
                    lim={pod.mem.lim}
                    use={pod.mem.use}
                    total={NODE_MEM_TOTAL}
                    color="bg-cyan-600"
                    oom={pod.oom}
                  />
                </div>
              );
            })}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-x-4 gap-y-1 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-3 h-2 bg-cyan-500 rounded-sm"></span>사용량
            </span>
            <span className="flex items-center gap-1">
              <span className="w-0 h-3 border-l-2 border-dashed border-cyan-700"></span>request (보장)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-0 h-3 border-l-2 border-solid border-red-600"></span>limit (상한)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-2 bg-red-500 rounded-sm animate-pulse"></span>limit 초과
            </span>
            <span className="flex items-center gap-1 ml-auto">🚨 OOMKilled</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + 라인 번호 + 강조
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        codeRef.current.removeAttribute('data-highlighted');
        codeRef.current.className = `language-${code.lang}`;
        codeRef.current.textContent = code.lines.join('\n');
        window.hljs.highlightElement(codeRef.current);
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-300 ml-2 font-mono bg-[#282c34] px-2 py-0.5 rounded-t border-t border-l border-r border-cyan-600">
              {code.filename}
            </span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 라인 번호 + 강조 라인 렌더링 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-cyan-500/10 border-l-2 border-cyan-400' : 'border-l-2 border-transparent'}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. Storage &amp; Config &gt; Chapter 2. Resource Management</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Resource Limits &amp; Requests</h1>
                  <p className="text-sm text-slate-500 mt-0.5">예약 좌석 + 최대 사용량 — request=보장 / limit=상한 / QoS 클래스</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                pods={step.pods}
                nodeWarning={step.nodeWarning}
                focus={step.focus}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-cyan-50 border-2 border-cyan-300 rounded-xl p-3 text-sm text-cyan-900">
                💡 Part IV Storage &amp; Config 완성! 다음(V-1-1)부터 Part V 실전 운영 — kubectl 핵심 명령어, 디버깅, 트러블슈팅
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-cyan-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-cyan-600 text-white hover:bg-cyan-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-2-1.html" className="text-slate-500 hover:text-slate-700">&larr; IV-2-1 ConfigMap &amp; Secret</a>
              <a href="../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">허브 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
