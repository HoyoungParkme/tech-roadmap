<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — IV-1-1. Volume과 PV/PVC</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    IV-1-1. Volume과 PV/PVC — 스토리지 추상화
    학습 목표: emptyDir 휘발성 → PV 풀 → PVC 클레임 → Pod 마운트 → Pod 재기동에도 데이터 유지의 전 흐름을 익힌다.
    핵심 비유: "사물함 시스템" — 관리자가 사물함 풀(PV)을 미리 마련, 사용자는 신청서(PVC) 한 장으로 자기 사물함 배정받기
    패턴: fastapi v1 — 좌(LiveDataPane: PV 풀 / PVC 풀 / Pod 박스 + 바인딩 화살표) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 — PV 풀 / PVC / Pod 상태 시뮬레이션
    //   pvStatus: 'available' | 'bound' | 'released'
    //   pvcStatus: 'pending' | 'bound'
    //   podStatus: 'none' | 'running' | 'terminated' | 'rescheduled'
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. emptyDir — Pod 종료 시 사라짐 (휘발성)',
        desc: '가장 단순한 볼륨. Pod가 시작되면 빈 디렉토리가 생기고, Pod가 죽으면 데이터도 같이 사라짐. 컨테이너 간 임시 공유엔 충분하지만 영속 저장은 불가 — 책상 서랍은 책상이 옮겨가면 비워진다.',
        pvs: [
          { id: 'pv-a', size: '10Gi', status: 'idle' },
          { id: 'pv-b', size: '100Gi', status: 'idle' },
          { id: 'pv-c', size: '500Gi', status: 'idle' },
        ],
        pvcs: [],
        pod: { status: 'running', volumeKind: 'emptyDir', dataLabel: 'cache (휘발)', dataValue: '0 → 50MB' },
        bindings: [],
        mounts: [],
        showAlert: false,
        code: {
          lang: 'yaml',
          filename: 'pod-emptydir.yaml',
          lines: [
            '# Step 1 — emptyDir: Pod 생애 동안만 존재',
            'apiVersion: v1',
            'kind: Pod',
            'metadata:',
            '  name: web',
            'spec:',
            '  containers:',
            '    - name: app',
            '      image: myapp:v1',
            '      volumeMounts:',
            '        - name: cache',
            '          mountPath: /tmp/cache',
            '  volumes:',
            '    - name: cache',
            '      emptyDir: {}            # ← Pod 죽으면 함께 소멸',
            '',
            '# 특징',
            '#  - Pod 시작 시 빈 디렉토리 생성',
            '#  - 컨테이너 간 공유 OK (sidecar 패턴)',
            '#  - Pod 종료/재기동 → 데이터 0',
            '#  - 노드 재할당 → 당연히 데이터 0',
            '',
            '# 한계: 캐시·임시 파일·sidecar 통신 용도까지만',
            '# → 영속 저장이 필요하면 PV / PVC 로 가야 한다.',
          ],
          highlight: [13, 14, 15, 21, 25],
        },
      },
      {
        title: 'Step 2. PV 풀 등장 — "관리자가 사물함을 미리 마련"',
        desc: '클러스터 관리자가 사전에 PersistentVolume을 정의해 풀(pool)에 등록한다. 10Gi / 100Gi / 500Gi 다양한 용량의 사물함이 Available 상태로 대기. 아직 신청자(PVC)가 없으니 모두 비어있는 상태.',
        pvs: [
          { id: 'pv-a', size: '10Gi', status: 'available' },
          { id: 'pv-b', size: '100Gi', status: 'available' },
          { id: 'pv-c', size: '500Gi', status: 'available' },
        ],
        pvcs: [],
        pod: { status: 'none' },
        bindings: [],
        mounts: [],
        showAlert: false,
        code: {
          lang: 'yaml',
          filename: 'pv.yaml',
          lines: [
            '# Step 2 — 관리자가 PV 3 개를 풀에 등록',
            '---',
            'apiVersion: v1',
            'kind: PersistentVolume',
            'metadata: { name: pv-small-10gi }',
            'spec:',
            '  capacity: { storage: 10Gi }',
            '  accessModes: [ReadWriteOnce]',
            '  storageClassName: standard',
            '  nfs:',
            '    server: nfs.example.com',
            '    path: /exports/small',
            '---',
            'apiVersion: v1',
            'kind: PersistentVolume',
            'metadata: { name: pv-medium-100gi }',
            'spec:',
            '  capacity: { storage: 100Gi }',
            '  accessModes: [ReadWriteOnce]',
            '  storageClassName: standard',
            '  nfs: { server: nfs.example.com, path: /exports/medium }',
            '---',
            'apiVersion: v1',
            'kind: PersistentVolume',
            'metadata: { name: pv-large-500gi }',
            'spec:',
            '  capacity: { storage: 500Gi }',
            '  accessModes: [ReadWriteOnce]',
            '  storageClassName: standard',
            '  nfs: { server: nfs.example.com, path: /exports/large }',
            '',
            '# kubectl get pv',
            '# NAME              CAPACITY   STATUS      STORAGECLASS',
            '# pv-small-10gi     10Gi       Available   standard',
            '# pv-medium-100gi   100Gi      Available   standard',
            '# pv-large-500gi    500Gi      Available   standard',
          ],
          highlight: [7, 8, 9, 33, 34, 35, 36],
        },
      },
      {
        title: 'Step 3. PVC 요청 — "신청서 한 장이면 매칭 자동"',
        desc: '개발자가 50Gi PVC를 만들면 K8s가 풀에서 가장 작지만 충분한 PV를 자동 매칭. accessModes / storageClassName / 용량이 맞아야 바인딩 — 50Gi 요청은 100Gi PV에 Bound, 다른 PV는 Available 유지.',
        pvs: [
          { id: 'pv-a', size: '10Gi', status: 'available' },
          { id: 'pv-b', size: '100Gi', status: 'bound', boundTo: 'pvc-data' },
          { id: 'pv-c', size: '500Gi', status: 'available' },
        ],
        pvcs: [
          { id: 'pvc-data', request: '50Gi', status: 'bound', boundPv: 'pv-b' },
        ],
        pod: { status: 'none' },
        bindings: [{ from: 'pv-b', to: 'pvc-data' }],
        mounts: [],
        showAlert: false,
        code: {
          lang: 'yaml',
          filename: 'pvc.yaml',
          lines: [
            '# Step 3 — 개발자가 50Gi PVC 한 장 작성',
            'apiVersion: v1',
            'kind: PersistentVolumeClaim',
            'metadata:',
            '  name: pvc-data',
            'spec:',
            '  accessModes: [ReadWriteOnce]    # ← PV와 일치해야 함',
            '  storageClassName: standard      # ← 같은 class 안에서 매칭',
            '  resources:',
            '    requests:',
            '      storage: 50Gi               # ← 50Gi 이상인 PV 검색',
            '',
            '# K8s 컨트롤러의 매칭 알고리즘',
            '#  1) storageClassName 일치하는 PV 후보 추림',
            '#  2) accessModes 만족하는 PV 만 남김',
            '#  3) capacity >= requests.storage 인 가장 작은 PV 선택',
            '#  4) 해당 PV.status: Available → Bound 로 전이',
            '',
            '# 결과 → 100Gi PV 가 50Gi 요청에 Bound',
            '# kubectl get pvc',
            '# NAME       STATUS   VOLUME            CAPACITY',
            '# pvc-data   Bound    pv-medium-100gi   100Gi',
            '',
            '# kubectl get pv',
            '# pv-small-10gi     10Gi     Available    ← 부족',
            '# pv-medium-100gi   100Gi    Bound        ← 매칭',
            '# pv-large-500gi    500Gi    Available    ← 더 큰 후보',
          ],
          highlight: [7, 8, 11, 19, 25],
        },
      },
      {
        title: 'Step 4. Pod 마운트 — "사물함 열쇠 받아 데이터 저장"',
        desc: 'Pod가 PVC를 volume으로 참조하면 K8s가 PVC ↔ PV 의 실제 디스크를 컨테이너 mountPath에 연결. 앱이 /data 에 쓰는 모든 파일이 NFS / EBS 등 외부 스토리지에 영속 저장. Pod 자체는 stateless로 유지된다.',
        pvs: [
          { id: 'pv-a', size: '10Gi', status: 'available' },
          { id: 'pv-b', size: '100Gi', status: 'bound', boundTo: 'pvc-data' },
          { id: 'pv-c', size: '500Gi', status: 'available' },
        ],
        pvcs: [
          { id: 'pvc-data', request: '50Gi', status: 'bound', boundPv: 'pv-b' },
        ],
        pod: { status: 'running', volumeKind: 'pvc', dataLabel: '/data (영속)', dataValue: '0 → 12GB' },
        bindings: [{ from: 'pv-b', to: 'pvc-data' }],
        mounts: [{ from: 'pvc-data', to: 'pod' }],
        showAlert: false,
        code: {
          lang: 'yaml',
          filename: 'pod-with-pvc.yaml',
          lines: [
            '# Step 4 — Pod 가 PVC 를 mount',
            'apiVersion: v1',
            'kind: Pod',
            'metadata:',
            '  name: db',
            'spec:',
            '  containers:',
            '    - name: postgres',
            '      image: postgres:16',
            '      env:',
            '        - name: POSTGRES_PASSWORD',
            '          value: secret',
            '      volumeMounts:',
            '        - name: data',
            '          mountPath: /var/lib/postgresql/data',
            '  volumes:',
            '    - name: data',
            '      persistentVolumeClaim:',
            '        claimName: pvc-data           # ← Step 3 의 PVC',
            '',
            '# 동작 순서',
            '#  1) kubelet 이 pvc-data → pv-medium-100gi 해석',
            '#  2) NFS 마운트 / EBS attach 수행',
            '#  3) /var/lib/postgresql/data 에 bind mount',
            '#  4) postgres 가 그 경로에 WAL / data 파일 작성',
            '',
            '# kubectl exec db -- df -h /var/lib/postgresql/data',
            '# Filesystem           Size  Used  Mounted on',
            '# nfs.example.com:/...  100G   12G  /var/lib/postgresql/data',
            '#                       ↑ 실제는 PV 의 NFS 디스크',
          ],
          highlight: [13, 14, 15, 17, 18, 19],
        },
      },
      {
        title: 'Step 5. Pod 재기동에도 데이터 보존 — "PVC 재사용"',
        desc: 'Pod가 죽거나 다른 노드로 재배치돼도 PVC ↔ PV 바인딩은 유지. 새 Pod가 같은 claimName 으로 뜨면 동일 데이터가 그대로 마운트 — 12GB의 /data 가 살아있다. 이것이 stateful 워크로드를 K8s에서 운영할 수 있는 근간.',
        pvs: [
          { id: 'pv-a', size: '10Gi', status: 'available' },
          { id: 'pv-b', size: '100Gi', status: 'bound', boundTo: 'pvc-data' },
          { id: 'pv-c', size: '500Gi', status: 'available' },
        ],
        pvcs: [
          { id: 'pvc-data', request: '50Gi', status: 'bound', boundPv: 'pv-b' },
        ],
        pod: { status: 'rescheduled', volumeKind: 'pvc', dataLabel: '/data (보존)', dataValue: '12GB 유지 ✓' },
        bindings: [{ from: 'pv-b', to: 'pvc-data' }],
        mounts: [{ from: 'pvc-data', to: 'pod' }],
        showAlert: true,
        code: {
          lang: 'shell',
          filename: 'pod-restart.sh',
          lines: [
            '# Step 5 — Pod 가 죽어도 PVC 는 살아있다',
            '',
            '# (1) Pod 종료 — 노드 장애 / 업데이트 / OOM',
            '$ kubectl delete pod db',
            'pod "db" deleted',
            '',
            '# PVC 와 PV 는 그대로 — Bound 유지',
            '$ kubectl get pvc',
            'NAME       STATUS   VOLUME            CAPACITY',
            'pvc-data   Bound    pv-medium-100gi   100Gi',
            '',
            '# (2) 같은 PVC 를 가리키는 새 Pod 생성',
            '$ kubectl apply -f pod-with-pvc.yaml',
            'pod/db created',
            '',
            '# (3) 새 Pod 가 다른 노드에서 떠도 같은 디스크 마운트',
            '$ kubectl exec db -- ls /var/lib/postgresql/data',
            'PG_VERSION  base/  global/  pg_wal/  postgresql.conf',
            '',
            '# (4) 데이터 그대로',
            '$ kubectl exec db -- du -sh /var/lib/postgresql/data',
            '12G   /var/lib/postgresql/data    # ← 죽기 전 그대로',
            '',
            '# 핵심 정리',
            '#  Pod          = stateless (언제든 죽어도 OK)',
            '#  PVC          = 사용자의 디스크 신청서 (계속 살아있음)',
            '#  PV           = 실제 디스크 자원 (Bound 유지)',
            '#  StatefulSet  = Pod + PVC 를 자동 짝지어 관리해줌',
          ],
          highlight: [4, 13, 17, 22, 25, 26, 27, 28],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // PV 상태 → 스타일 (Available / Bound / Released / idle)
    //   cyan 베이스 색상 — 자료 색상 규약
    // ─────────────────────────────────────────────────────
    const PV_STYLE = {
      idle:      { card: 'bg-slate-100 border-slate-300 opacity-50', badge: 'bg-slate-300 text-slate-600',  label: '대기 중' },
      available: { card: 'bg-cyan-50 border-cyan-300',               badge: 'bg-cyan-100 text-cyan-700',    label: 'Available' },
      bound:     { card: 'bg-cyan-200 border-cyan-600 ring-2 ring-cyan-400', badge: 'bg-cyan-600 text-white', label: 'Bound' },
      released:  { card: 'bg-amber-50 border-amber-300',             badge: 'bg-amber-100 text-amber-700',  label: 'Released' },
    };

    const PVC_STYLE = {
      pending: { card: 'bg-yellow-50 border-yellow-300',                       badge: 'bg-yellow-100 text-yellow-700', label: 'Pending' },
      bound:   { card: 'bg-cyan-100 border-cyan-500 ring-2 ring-cyan-300',     badge: 'bg-cyan-600 text-white',        label: 'Bound' },
    };

    const POD_STYLE = {
      none:         { card: 'bg-slate-100 border-slate-300 border-dashed',       badge: 'bg-slate-300 text-slate-600',     label: '미생성' },
      running:      { card: 'bg-emerald-50 border-emerald-400',                  badge: 'bg-emerald-500 text-white',       label: 'Running' },
      terminated:   { card: 'bg-red-50 border-red-400',                          badge: 'bg-red-500 text-white',           label: 'Terminated' },
      rescheduled:  { card: 'bg-emerald-100 border-emerald-500 ring-2 ring-emerald-300 animate-pulse', badge: 'bg-emerald-600 text-white', label: 'Re-scheduled' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — PV 풀 / PVC 풀 / Pod 박스 + 화살표
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ pvs, pvcs, pod, bindings, mounts, showAlert }) {
      const availableCount = pvs.filter((p) => p.status === 'available').length;
      const boundCount     = pvs.filter((p) => p.status === 'bound').length;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🗄️ 스토리지 추상화 (PV → PVC → Pod)</h2>
            <span className="text-[10px] text-slate-400 font-mono">cluster-scope</span>
          </div>

          {/* ──────── PV 풀 ──────── */}
          <div className="mb-4">
            <div className="flex items-center justify-between mb-2">
              <div className="text-xs font-bold text-slate-700">💽 PV 풀 (관리자 정의)</div>
              <div className="flex gap-1.5 text-[10px] font-mono">
                <span className="px-1.5 py-0.5 rounded bg-cyan-100 text-cyan-700 font-bold">
                  Available {availableCount}
                </span>
                <span className="px-1.5 py-0.5 rounded bg-cyan-600 text-white font-bold">
                  Bound {boundCount}
                </span>
              </div>
            </div>
            <div className="grid grid-cols-3 gap-2">
              {pvs.map((pv) => {
                const style = PV_STYLE[pv.status];
                return (
                  <div
                    key={pv.id}
                    className={`rounded-lg border-2 p-2.5 transition-all duration-500 ${style.card}`}
                  >
                    <div className="flex items-center justify-between mb-1">
                      <span className="text-[11px] font-bold text-slate-700 font-mono truncate">{pv.id}</span>
                      <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${style.badge}`}>
                        {style.label}
                      </span>
                    </div>
                    <div className="flex items-center gap-1.5 mt-1">
                      <span className="text-lg" aria-hidden="true">💽</span>
                      <span className="text-base font-extrabold text-slate-800 tabular-nums">{pv.size}</span>
                    </div>
                    {pv.boundTo && (
                      <div className="text-[9px] text-cyan-700 font-mono mt-1 truncate">→ {pv.boundTo}</div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* ──────── 바인딩 화살표 ──────── */}
          <div className="flex items-center justify-center my-2 h-6">
            {bindings.length > 0 ? (
              <div className="flex items-center gap-2 text-cyan-700">
                <span className="text-lg animate-bounce" aria-hidden="true">⬇</span>
                <span className="text-[10px] font-mono font-bold">claimRef bound</span>
                <span className="text-lg animate-bounce" aria-hidden="true">⬇</span>
              </div>
            ) : (
              <span className="text-[10px] text-slate-300 font-mono">— 아직 바인딩 없음 —</span>
            )}
          </div>

          {/* ──────── PVC 풀 ──────── */}
          <div className="mb-4">
            <div className="text-xs font-bold text-slate-700 mb-2">📋 PVC (개발자 신청)</div>
            {pvcs.length === 0 ? (
              <div className="text-[11px] text-slate-400 italic px-3 py-2 rounded border border-dashed border-slate-300 text-center">
                PVC 없음 — 아직 디스크 신청 전
              </div>
            ) : (
              <div className="grid grid-cols-1 gap-2">
                {pvcs.map((pvc) => {
                  const style = PVC_STYLE[pvc.status];
                  return (
                    <div
                      key={pvc.id}
                      className={`rounded-lg border-2 p-2.5 transition-all duration-500 ${style.card}`}
                    >
                      <div className="flex items-center justify-between">
                        <div className="flex items-center gap-2">
                          <span className="text-lg" aria-hidden="true">📋</span>
                          <div>
                            <div className="text-[11px] font-bold text-slate-700 font-mono">{pvc.id}</div>
                            <div className="text-[10px] text-slate-500">request: <span className="font-mono font-bold">{pvc.request}</span></div>
                          </div>
                        </div>
                        <div className="text-right">
                          <span className={`text-[10px] font-bold px-2 py-0.5 rounded ${style.badge}`}>
                            {style.label}
                          </span>
                          {pvc.boundPv && (
                            <div className="text-[9px] text-cyan-700 font-mono mt-1">PV: {pvc.boundPv}</div>
                          )}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* ──────── 마운트 화살표 ──────── */}
          <div className="flex items-center justify-center my-2 h-6">
            {mounts.length > 0 ? (
              <div className="flex items-center gap-2 text-emerald-700">
                <span className="text-lg animate-bounce" aria-hidden="true">⬇</span>
                <span className="text-[10px] font-mono font-bold">volumeMounts</span>
                <span className="text-lg animate-bounce" aria-hidden="true">⬇</span>
              </div>
            ) : (
              <span className="text-[10px] text-slate-300 font-mono">— 마운트 없음 —</span>
            )}
          </div>

          {/* ──────── Pod 박스 ──────── */}
          <div>
            <div className="text-xs font-bold text-slate-700 mb-2">🚢 Pod</div>
            {(() => {
              const style = POD_STYLE[pod.status];
              return (
                <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${style.card}`}>
                  <div className="flex items-center justify-between mb-1.5">
                    <div className="flex items-center gap-2">
                      <span className="text-xl" aria-hidden="true">🚢</span>
                      <span className="text-sm font-bold text-slate-800">db pod</span>
                    </div>
                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded ${style.badge}`}>
                      {style.label}
                    </span>
                  </div>
                  {pod.status !== 'none' && (
                    <div className="mt-2 pt-2 border-t border-slate-200/70 grid grid-cols-2 gap-2 text-[11px]">
                      <div>
                        <div className="text-slate-500">volume kind</div>
                        <div className="font-mono font-bold text-slate-800">
                          {pod.volumeKind === 'emptyDir' ? 'emptyDir' : 'persistentVolumeClaim'}
                        </div>
                      </div>
                      <div>
                        <div className="text-slate-500">{pod.dataLabel}</div>
                        <div className="font-mono font-bold text-slate-800">{pod.dataValue}</div>
                      </div>
                    </div>
                  )}
                </div>
              );
            })()}
          </div>

          {/* ──────── 마지막 단계 알림 박스 ──────── */}
          {showAlert && (
            <div className="mt-4 p-3 rounded-lg bg-cyan-50 border-2 border-cyan-400">
              <div className="flex items-center gap-2 text-cyan-800 font-bold text-sm">
                <span className="text-lg">✓</span>
                <span>Pod 재기동에도 PVC 그대로 — 데이터 영속성 확보</span>
              </div>
              <div className="text-[11px] text-cyan-700 mt-1">
                stateless Pod + persistent PVC = K8s 의 stateful 운영 패턴
              </div>
            </div>
          )}

          {/* ──────── 범례 ──────── */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-cyan-300 border border-cyan-400"></span>Available
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-cyan-600"></span>Bound
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-amber-300"></span>Released
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-emerald-500"></span>Pod Running
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js (atom-one-dark)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[36rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-cyan-500/15 border-l-2 border-cyan-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. 스토리지 &amp; 설정 &gt; Chapter 1. Volume과 PV/PVC</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Volume과 PV/PVC</h1>
                  <p className="text-sm text-slate-500 mt-0.5">사물함 시스템 — PV 풀 → PVC 클레임 → Pod 마운트 → 데이터 영속</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                pvs={step.pvs}
                pvcs={step.pvcs}
                pod={step.pod}
                bindings={step.bindings}
                mounts={step.mounts}
                showAlert={step.showAlert}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-cyan-50 border-2 border-cyan-300 rounded-xl p-3 text-sm text-cyan-900">
                💡 다음(IV-1-2)에서는 <strong>StorageClass + Dynamic Provisioning</strong> — 관리자가 PV 를 미리 만들 필요가 사라진다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-cyan-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-cyan-600 text-white hover:bg-cyan-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./IV-1-2.html" className="text-cyan-700 hover:text-cyan-900 font-medium">IV-1-2 ConfigMap / Secret &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
