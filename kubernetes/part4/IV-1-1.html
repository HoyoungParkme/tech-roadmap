<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — Volume과 PV(Claim)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-1-1. Volume과 PersistentVolume(Claim)
    학습 목표: emptyDir / hostPath / PVC 차이, dynamic provisioning을 안다.
    핵심 비유: "사물함" — Pod=책상, emptyDir=서랍, hostPath=교실 캐비닛, PV=영구 사물함, PVC=신청서
    구조: 4단계 (emptyDir / hostPath / PV+PVC 정적 / Dynamic Provisioning)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. emptyDir — Pod 생애 동안만 존재',
        desc: '가장 단순한 볼륨. Pod가 시작될 때 빈 디렉토리가 만들어지고, Pod가 죽으면 같이 사라짐. Pod 안 컨테이너끼리 공유 디렉토리 용도로 충분 — 책상 서랍처럼 책상이 옮겨가면 같이 사라진다.',
        block: {
          kind: 'yaml',
          code: `apiVersion: v1
kind: Pod
metadata:
  name: web
spec:
  containers:
    - name: app
      image: myapp:v1
      volumeMounts:
        - name: cache
          mountPath: /tmp/cache
  volumes:
    - name: cache
      emptyDir: {}            # Pod 생애 동안만

# Pod 죽으면 cache 데이터도 사라짐
# 컨테이너 간 공유는 OK (sidecar 패턴)`,
        },
        focus: 'emptydir',
      },
      {
        title: 'Step 2. hostPath — 노드의 디렉토리 마운트',
        desc: '노드(Worker 머신) 디스크의 특정 경로를 Pod에 마운트. Pod 죽어도 데이터는 노드에 남음. 단점은 Pod가 다른 노드로 옮겨가면 데이터를 잃는다 — 교실 캐비닛은 교실 안에서만 유효.',
        block: {
          kind: 'yaml',
          code: `apiVersion: v1
kind: Pod
metadata:
  name: log-shipper
spec:
  containers:
    - name: fluentd
      image: fluentd:latest
      volumeMounts:
        - name: varlog
          mountPath: /var/log
  volumes:
    - name: varlog
      hostPath:
        path: /var/log         # 노드의 /var/log
        type: Directory

# DaemonSet과 결합 자주 사용
# 단점: Pod가 다른 노드로 옮겨가면 데이터 X`,
        },
        focus: 'hostpath',
      },
      {
        title: 'Step 3. PV + PVC — "영구 사물함 + 신청서"',
        desc: 'PersistentVolume = 클러스터 자원으로 만든 영구 디스크 (NFS, EBS, Ceph 등). PersistentVolumeClaim = "이만큼 디스크 주세요"라는 신청서. K8s가 PVC와 PV를 매칭해 Pod에 연결. Pod가 죽어도, 다른 노드로 옮겨가도 데이터 유지.',
        block: {
          kind: 'yaml',
          code: `# 1. PV (관리자가 미리 만듦)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-data-10gi
spec:
  capacity:
    storage: 10Gi
  accessModes: [ReadWriteOnce]
  nfs:
    server: nfs.example.com
    path: /exports/data
---
# 2. PVC (사용자가 신청)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
# 3. Pod에서 PVC 사용
volumes:
  - name: data
    persistentVolumeClaim:
      claimName: data`,
        },
        focus: 'pv-pvc',
      },
      {
        title: 'Step 4. Dynamic Provisioning — StorageClass로 자동 발급',
        desc: '관리자가 PV를 미리 만들 필요 없음. PVC에 storageClassName만 적으면 K8s가 자동으로 PV를 만들어서 매칭. 클라우드(AWS EBS, GCP PD)와 결합되면 PVC 한 장으로 디스크가 자동 프로비저닝. 운영 자동화의 핵심.',
        block: {
          kind: 'yaml',
          code: `# StorageClass (한 번만 만들고 재사용)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ssd
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
reclaimPolicy: Delete
---
# PVC만 만들면 PV 자동 생성됨
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-data
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: ssd       # ← 핵심
  resources:
    requests:
      storage: 50Gi

# kubectl get pvc
# NAME       STATUS  VOLUME   CAPACITY  STORAGECLASS
# app-data   Bound   pvc-aa1  50Gi      ssd
#                    ↑ 자동 생성된 PV`,
        },
        focus: 'dynamic',
      },
    ];

    const KIND_STYLE = {
      yaml:  { label: 'YAML', textColor: '#fde68a' },
      shell: { label: 'Bash', textColor: '#86efac' },
    };

    function StorageDiagram({ focus }) {
      // 4가지 스토리지 단계 정적 매핑
      const SCENARIOS = [
        { key: 'emptydir',  emoji: '🗃️', name: 'emptyDir',  scope: 'Pod 생애' },
        { key: 'hostpath',  emoji: '🏫', name: 'hostPath',  scope: '노드 단위' },
        { key: 'pv-pvc',    emoji: '🔐', name: 'PV + PVC',  scope: '클러스터 영구' },
        { key: 'dynamic',   emoji: '⚡', name: 'Dynamic',    scope: '자동 프로비저닝' },
      ];

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🗄️ 사물함 4종 (지속성 단계)</div>
          <div className="grid grid-cols-4 gap-2">
            {SCENARIOS.map((s) => {
              const isActive = focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-violet-100 border-2 border-violet-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{s.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{s.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{s.scope}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Volume과 PersistentVolume(Claim)</h1>
                <p className="text-sm text-slate-500 mt-1">사물함 — Pod 서랍 → 교실 캐비닛 → 영구 사물함 → 자동 발급</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <StorageDiagram focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'dynamic' && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 mb-6 text-xs text-violet-900">
                💡 다음(IV-1-2)에서는 설정값을 이미지에서 분리하는 ConfigMap을 본다 — 공유 메모장 비유
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
