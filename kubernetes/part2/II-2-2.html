    // 영역별 활성 스타일 (focus가 가리키는 영역만 강조)
    const SECTION_STYLE = {
      active:   'border-cyan-400 bg-cyan-50 ring-2 ring-cyan-200',
      inactive: 'border-slate-200 bg-slate-50/50 opacity-60',
    };

    function DaemonSetSection({ data, isActive }) {
      const style = isActive ? SECTION_STYLE.active : SECTION_STYLE.inactive;

        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${style}`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span aria-hidden="true">🧹</span>
              <span className="text-xs font-bold text-slate-700">DaemonSet · 노드 토폴로지</span>
            </div>
            <span className="text-[10px] font-mono px-1.5 py-0.5 rounded bg-cyan-100 text-cyan-700 font-bold">
              노드 {data.nodes.length} = Pod {data.nodes.filter((n) => n.hasPod).length}
            </span>
          </div>

          <div className="grid grid-cols-4 gap-2">
            {data.nodes.map((n) => (
              <div
                key={n.id}
                className={`rounded-md border p-2 text-center transition-all duration-500 ${
                  n.isNew
                    ? 'bg-cyan-100 border-cyan-500 ring-2 ring-cyan-300 scale-105'
                    : 'bg-white border-slate-300'
                }`}
              >
                <div className="text-[10px] font-mono text-slate-500">{n.id}</div>
                <div className="text-lg leading-none my-1">🖥️</div>
                {n.hasPod ? (
                  <div className="inline-flex items-center gap-1 text-[9px] font-bold px-1.5 py-0.5 rounded bg-cyan-500 text-white">
                    <span>📦</span><span>Pod</span>
                  </div>
                ) : (
                  <div className="text-[9px] text-slate-400">no pod</div>
                )}
                {n.isNew && (
                  <div className="mt-1 text-[9px] font-bold text-cyan-700">NEW ✨</div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function JobSection({ data, isActive }) {
      const style = isActive ? SECTION_STYLE.active : SECTION_STYLE.inactive;
      const total = data.completions || 0;
      const done = data.succeeded || 0;
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;

      const slotStyle = {
        succeeded: 'bg-emerald-500 text-white border-emerald-600',
        running:   'bg-cyan-500 text-white border-cyan-600 animate-pulse',
        failed:    'bg-red-500 text-white border-red-600',
        pending:   'bg-slate-200 text-slate-500 border-slate-300',
      };

      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${style}`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span aria-hidden="true">✈️</span>
              <span className="text-xs font-bold text-slate-700">Job · 실행 progress</span>
            </div>
            {total > 0 ? (
              <span className="text-[10px] font-mono px-1.5 py-0.5 rounded bg-cyan-100 text-cyan-700 font-bold">
                {data.name || 'job'} · p={data.parallelism}/c={data.completions}
              </span>
            ) : (
              <span className="text-[10px] font-mono px-1.5 py-0.5 rounded bg-slate-200 text-slate-500">idle</span>
            )}
          </div>

          {total > 0 ? (
            <>
              {/* progress bar */}
              <div className="relative h-3 bg-slate-100 rounded-full overflow-hidden mb-2 border border-slate-200">
                <div
                  className="h-full bg-gradient-to-r from-cyan-400 to-emerald-400 transition-all duration-700"
                  style={{ width: `${pct}%` }}
                />
                <div className="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-slate-700">
                  {done} / {total} ({pct}%)
                </div>
              </div>

              {/* slot grid */}
              <div className="grid grid-cols-6 gap-1.5">
                {data.slots.map((s) => (
                  <div
                    key={s.id}
                    className={`rounded border text-[10px] font-bold py-1.5 text-center ${slotStyle[s.state]}`}
                  >
                    #{s.id}
                  </div>
                ))}
              </div>

              <div className="flex gap-3 text-[10px] mt-2 text-slate-600">
                <span className="font-mono">✓ succeeded {data.succeeded}</span>
                <span className="font-mono">▶ running {data.running}</span>
                <span className="font-mono">✗ failed {data.failed}</span>
              </div>
            </>
          ) : (
            <div className="text-[11px] text-slate-400 text-center py-4">
              Job 미실행 (Step 3, 4 에서 동작)
            </div>
          )}
        </div>
      );
    }

    function CronJobSection({ data, isActive }) {
      const style = isActive ? SECTION_STYLE.active : SECTION_STYLE.inactive;
      const hasSchedule = !!data.schedule;

      const tickStyle = {
        success: 'bg-emerald-500 border-emerald-600 text-white',
        failed:  'bg-red-500 border-red-600 text-white',
        running: 'bg-cyan-500 border-cyan-600 text-white animate-pulse',
        pending: 'bg-slate-200 border-slate-300 text-slate-600',
      };

      const rowStyle = {
        success: 'bg-emerald-50 border-emerald-200',
        failed:  'bg-red-50 border-red-300',
        running: 'bg-cyan-50 border-cyan-300',
      };

      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${style}`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span aria-hidden="true">⏰</span>
              <span className="text-xs font-bold text-slate-700">CronJob · 스케줄 timeline</span>
            </div>
            {hasSchedule ? (
              <span className="text-[10px] font-mono px-1.5 py-0.5 rounded bg-cyan-100 text-cyan-700 font-bold">
                {data.schedule} · {data.scheduleHuman}
              </span>
            ) : (
              <span className="text-[10px] font-mono px-1.5 py-0.5 rounded bg-slate-200 text-slate-500">idle</span>
            )}
          </div>

          {hasSchedule ? (
            <>
              {/* timeline ticks */}
              <div className="bg-white rounded-md border border-slate-200 p-2 mb-2">
                <div className="text-[9px] text-slate-500 font-mono mb-1">
                  ─── 02:00 매일 ───────────────────────→
                </div>
                <div className="flex items-end gap-1.5">
                  {data.timeline.map((t, i) => (
                    <div key={i} className="flex flex-col items-center gap-0.5 flex-1 min-w-0">
                      <div
                        className={`w-full h-7 rounded border flex items-center justify-center text-[9px] font-bold ${tickStyle[t.state]}`}
                        title={`${t.label} ${t.state}`}
                      >
                        {t.state === 'success' && '✓'}
                        {t.state === 'failed' && '✗'}
                        {t.state === 'running' && '▶'}
                        {t.state === 'pending' && '·'}
                      </div>
                      <div className="text-[9px] text-slate-500 font-mono truncate">{t.label}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* history rows */}
              {data.history.length > 0 && (
                <div className="space-y-1">
                  <div className="text-[10px] font-bold text-slate-600 mb-1">📜 Job history</div>
                  {data.history.map((h, i) => (
                    <div
                      key={i}
                      className={`flex items-center justify-between text-[10px] font-mono px-2 py-1 rounded border ${rowStyle[h.state]}`}
                    >
                      <span className="truncate flex-1 text-slate-700">{h.name}</span>
                      <span className="text-slate-500 mx-2">{h.ts}</span>
                      <span className="text-slate-500 mx-1">{h.dur}</span>
                      <span className={`font-bold px-1.5 rounded ${
                        h.state === 'success' ? 'text-emerald-700' :
                        h.state === 'failed' ? 'text-red-700' : 'text-cyan-700'
                      }`}>
                        {h.state === 'success' && '✓ ok'}
                        {h.state === 'failed' && '✗ failed'}
                        {h.state === 'running' && '▶ running'}
                      </span>
                    </div>
                  ))}
                </div>
              )}
            </>
          ) : (
            <div className="text-[11px] text-slate-400 text-center py-4">
              CronJob 미생성 (Step 5, 6 에서 동작)
            </div>
          )}
        </div>
      );
    }

    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📦 3 워크로드 라이브 시뮬레이션</h2>
            <span className="text-[10px] text-slate-400 font-mono">DaemonSet · Job · CronJob</span>
          </div>

          <div className="space-y-3">
            <DaemonSetSection data={step.daemonset} isActive={step.focus === 'daemonset'} />
            <JobSection       data={step.job}       isActive={step.focus === 'job'} />
            <CronJobSection   data={step.cronjob}   isActive={step.focus === 'cronjob'} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-cyan-500"></span>실행/활성</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-500"></span>성공</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-red-500"></span>실패</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-slate-300"></span>대기/idle</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js (atom-one-dark)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code (innerHTML 추출) */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[36rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-cyan-500/15 border-l-2 border-cyan-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 — 라인 수 + 단계 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 워크로드 &gt; Chapter 2. DaemonSet / Job / CronJob</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">DaemonSet &amp; Job &amp; CronJob</h1>
                  <p className="text-sm text-slate-500 mt-0.5">노드별 1개 상주 / 1회성 작업 / 스케줄 작업 — 3 워크로드 라이브 시뮬레이션</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-cyan-50 border-2 border-cyan-300 rounded-xl p-3 text-sm text-cyan-900">
                💡 Part II Workload 끝! 다음(III-1-1)부터는 <strong>Service 4 타입</strong> — Pod에 안정적인 진입점을 만든다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-cyan-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-cyan-600 text-white hover:bg-cyan-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-2-1.html" className="text-slate-500 hover:text-slate-700">&larr; II-2-1 StatefulSet</a>
              <a href="../part3/III-1-1.html" className="text-cyan-700 hover:text-cyan-900 font-medium">III-1-1 Service 4 타입 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
