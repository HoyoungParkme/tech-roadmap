<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — DaemonSet & Job & CronJob</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    II-2-2. DaemonSet & Job & CronJob
    학습 목표: Deployment 외 3가지 워크로드 타입 — 노드별 1개 / 1회성 / 주기.
    핵심 비유: "직무 종류" — 항상 상주(DaemonSet) / 일회 출장(Job) / 매주 반복(CronJob)
    구조: 4단계 (DaemonSet 노드별 / Job 1회 / CronJob 주기 / 비교 종합)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. DaemonSet — 모든 노드에 1개씩',
        desc: '모든 Worker 노드에 정확히 1개씩 Pod를 보장. 노드가 추가되면 자동으로 1개 더 뜸. 로그 수집기(Fluentd), 모니터링 에이전트(Node Exporter), CNI 플러그인 등에 사용. "건물 모든 층에 청소부 1명 상주"와 같다.',
        block: {
          kind: 'yaml',
          code: `apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-shipper
spec:
  selector:
    matchLabels:
      app: log-shipper
  template:
    metadata:
      labels:
        app: log-shipper
    spec:
      containers:
        - name: fluentd
          image: fluentd:latest
          volumeMounts:
            - name: varlog
              mountPath: /var/log
      volumes:
        - name: varlog
          hostPath:
            path: /var/log         # 노드의 /var/log 마운트

# 노드 3개 → Pod 자동 3개 (각 노드에 1개씩)`
        },
        focus: 'daemonset',
      },
      {
        title: 'Step 2. Job — 1회성 작업',
        desc: '한 번 실행하고 끝나는 작업. DB 마이그레이션, 데이터 백업 1회, 배치 계산 등. completions/parallelism으로 병렬도 조절. Pod가 끝나면 status가 Completed로 보존됨(로그 확인용).',
        block: {
          kind: 'yaml',
          code: `apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate-2026-05-06
spec:
  completions: 1           # 1회 성공해야 끝
  parallelism: 1           # 동시 1개 실행
  backoffLimit: 3          # 실패 시 재시도 3회
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: myapp:v1
          command: ["python", "manage.py", "migrate"]

# kubectl get pods
# db-migrate-2026-05-06-aa1   Completed   ← 끝나면 보존

# kubectl logs job/db-migrate-2026-05-06`
        },
        focus: 'job',
      },
      {
        title: 'Step 3. CronJob — 주기 작업',
        desc: 'Job을 cron 표현식으로 주기 실행. 매일 새벽 3시 백업, 매주 월요일 리포트 생성 등. 내부적으로 시간이 되면 Job을 자동 생성. successful/failed Jobs History 보관 정책 설정 가능.',
        block: {
          kind: 'yaml',
          code: `apiVersion: batch/v1
kind: CronJob
metadata:
  name: nightly-backup
spec:
  schedule: "0 3 * * *"    # 매일 03:00 KST
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: backup-tool:v1
              args: ["--target", "s3://backup/db"]

# kubectl get cronjob
# NAME              SCHEDULE      LAST SCHEDULE
# nightly-backup    0 3 * * *     12h ago

# kubectl get jobs        ← 매일 1개씩 자동 생성
# nightly-backup-29234720    Completed`
        },
        focus: 'cronjob',
      },
      {
        title: 'Step 4. 4가지 워크로드 비교',
        desc: '각 워크로드의 사용 시나리오를 한눈에 비교. Deployment(상주, 복제 N) + StatefulSet(상주, 영속 N) + DaemonSet(상주, 노드별 1) + Job(1회) + CronJob(주기). 5가지 표로 정리.',
        block: {
          kind: 'text',
          code: `워크로드        지속성    수량 결정      대표 사용처
─────────────────────────────────────────────────────
Deployment      상주      replicas      웹 서버, API
StatefulSet     상주      replicas+ID   DB, 메시지 큐
DaemonSet       상주      노드 수       로그/모니터링
Job             1회       완료 시 종료   마이그레이션, 배치
CronJob         주기      schedule      백업, 리포트`
        },
        focus: 'compare',
      },
    ];

    const KIND_STYLE = {
      shell: { label: 'Bash', textColor: '#86efac' },   // 파일 간 일관성 — 향후 shell 블록 추가 대비
      yaml:  { label: 'YAML', textColor: '#fde68a' },
      text:  { label: 'Text', textColor: '#fde68a' },
    };

    // 4 워크로드 시각화 — focus에 따라 강조
    const WORKLOAD_TYPES = [
      { key: 'daemonset', emoji: '🧹', name: 'DaemonSet', desc: '노드별 1개' },
      { key: 'job',       emoji: '✈️', name: 'Job',       desc: '1회 출장' },
      { key: 'cronjob',   emoji: '⏰', name: 'CronJob',   desc: '주기 반복' },
      { key: 'compare',   emoji: '📊', name: '종합 비교',  desc: '5가지 표' },
    ];

    function WorkloadCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">📂 4가지 워크로드 타입</div>
          <div className="grid grid-cols-4 gap-2">
            {WORKLOAD_TYPES.map((t) => {
              const isActive = focus === t.key;
              return (
                <div
                  key={t.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-amber-100 border-2 border-amber-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{t.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{t.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{t.desc}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">DaemonSet & Job & CronJob</h1>
                <p className="text-sm text-slate-500 mt-1">3가지 워크로드 — 노드별 상주 / 1회성 / 주기 반복</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <WorkloadCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'compare' && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 mb-6 text-xs text-amber-900">
                💡 Part II Workload 4/4 완성! 다음(III-1-1)부터는 Pod에 안정적인 진입점을 만드는 Service 4가지 타입을 본다
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
