<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — Deployment & ReplicaSet</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    II-1-1. Deployment & ReplicaSet
    학습 목표: Pod를 N개로 복제하고 자동 유지하는 표준 패턴을 안다.
    핵심 비유: "공장 생산라인" — 같은 제품 N개 자동 유지, 1개 결함 시 즉시 새것 투입
    구조: 4단계 (Pod 단독 / ReplicaSet 도입 / Deployment 위임 / replicas 조절)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 4단계
    const STEPS = [
      {
        title: 'Step 1. Pod 단독 — 죽으면 끝',
        desc: 'Pod를 그냥 띄우면 K8s가 다시 살리지 않는다. 공장에서 제품 1개를 손으로 만들어두는 것과 같음 — 떨어뜨리면 그걸로 끝. 운영에서 절대 쓰면 안 되는 형태.',
        block: {
          kind: 'yaml',
          code: `apiVersion: v1
kind: Pod
metadata:
  name: web-only
spec:
  containers:
    - name: app
      image: myapp:v1

# kubectl delete pod web-only
# → 사라짐. 자동 재생성 없음. 사람이 다시 떠야 함`
        },
        focus: 'pod-only',
        replicas: 1,
        alive: true,
      },
      {
        title: 'Step 2. ReplicaSet — "N개 유지" 컨트롤러',
        desc: 'ReplicaSet이 "Pod 3개를 항상 유지"를 보장. 1개가 죽으면 즉시 새것 투입. 공장 라인에 "이 제품은 3개 재고 유지"라고 선언하는 것. 그러나 직접 ReplicaSet을 작성하지 않는다 — 위에 Deployment가 있다.',
        block: {
          kind: 'yaml',
          code: `apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: web-rs
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: app
          image: myapp:v1`
        },
        focus: 'replicaset',
        replicas: 3,
        alive: true,
      },
      {
        title: 'Step 3. Deployment — 표준 진입점',
        desc: 'Deployment는 ReplicaSet을 자동 생성/관리한다. 사용자는 Deployment만 다루면 된다. ReplicaSet은 그 아래에서 자동 생성됨. 새 버전 배포 시 새 ReplicaSet을 띄우고 옛 ReplicaSet의 replicas를 0으로 줄이는 식.',
        block: {
          kind: 'yaml',
          code: `apiVersion: apps/v1
kind: Deployment        # ← 표준 진입점
metadata:
  name: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: app
          image: myapp:v1

# Deployment가 ReplicaSet을 자동으로 만들고 관리함`
        },
        focus: 'deployment',
        replicas: 3,
        alive: true,
      },
      {
        title: 'Step 4. replicas 조절 — 1줄로 5개 → 10개',
        desc: 'kubectl scale 한 줄로 replicas를 변경. ReplicaSet이 차이를 감지해 새 Pod를 띄운다. 트래픽 폭주에 즉각 대응. 다음(II-1-2)에서는 replicas는 그대로 두고 image 버전만 v1 → v2로 점진 교체하는 롤링 업데이트를 본다.',
        block: {
          kind: 'shell',
          code: `# 1줄로 스케일
kubectl scale deployment/web --replicas=10

# 또는 yaml 수정 후 apply
# spec:
#   replicas: 10  ← 변경
# kubectl apply -f deployment.yaml

# 결과
kubectl get pods -l app=web
# web-7d9f8c5b-aa1   Running
# web-7d9f8c5b-aa2   Running
# ...
# web-7d9f8c5b-aa10  Running`
        },
        focus: 'scale',
        replicas: 10,
        alive: true,
      },
    ];

    const KIND_STYLE = {
      shell: { label: 'Bash', textColor: '#86efac' },
      yaml:  { label: 'YAML', textColor: '#fde68a' },
    };

    /**
     * 공장 생산라인 다이어그램 — 컨트롤러(공장장)와 Pod 슬롯 N개
     */
    function FactoryDiagram({ replicas, focus }) {
      // 정적 매핑
      const CONTROLLER_LABEL = {
        'pod-only':   { name: '컨트롤러 없음', color: 'bg-slate-300', text: 'text-slate-700' },
        'replicaset': { name: 'ReplicaSet', color: 'bg-emerald-500', text: 'text-white' },
        'deployment': { name: 'Deployment', color: 'bg-sky-500', text: 'text-white' },
        'scale':      { name: 'Deployment', color: 'bg-sky-500', text: 'text-white' },
      };
      const ctrl = CONTROLLER_LABEL[focus];
      const showCtrl = focus !== 'pod-only';
      const podBoxes = Array.from({ length: replicas }, (_, i) => i);

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🏭 공장 생산라인</div>
          {showCtrl && (
            <div className="flex items-center justify-center mb-3">
              <div className={`${ctrl.color} ${ctrl.text} rounded-lg px-4 py-2 text-xs font-bold shadow`}>
                {ctrl.name} (replicas: {replicas})
              </div>
            </div>
          )}
          <div className="flex items-center justify-center flex-wrap gap-2">
            {podBoxes.map((i) => (
              <div key={i} className="bg-blue-100 border-2 border-blue-300 rounded-md px-2 py-1 text-[10px] text-blue-800 font-mono">
                📦 Pod {i + 1}
              </div>
            ))}
          </div>
          <p className="text-center text-[11px] text-slate-500 mt-3">
            {focus === 'pod-only' && 'Pod 단독 — 죽으면 자동 재생성 없음'}
            {focus === 'replicaset' && 'ReplicaSet 컨트롤러가 항상 N개 유지'}
            {focus === 'deployment' && 'Deployment → ReplicaSet → Pod 위임 구조'}
            {focus === 'scale' && 'replicas 조절로 즉시 N → 10개 확장'}
          </p>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Deployment & ReplicaSet</h1>
                <p className="text-sm text-slate-500 mt-1">공장 생산라인 — replicas N개를 항상 유지하는 표준 패턴</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <FactoryDiagram replicas={step.replicas} focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'scale' && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 mb-6 text-xs text-blue-900">
                💡 다음(II-1-2)에서는 replicas는 그대로 두고 image 버전만 v1 → v2로 무중단 교체하는 롤링 업데이트를 본다 — 교대 근무 비유
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
