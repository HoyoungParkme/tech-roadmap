<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — II-1-1. Deployment &amp; ReplicaSet</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-1-1. Deployment & ReplicaSet — replicas 관리 / 자동 복구 / scale
    학습 목표: Pod를 N개로 복제하고 항상 유지하며 1줄로 scale 하는 표준 패턴 이해
    핵심 비유: 공장 생산라인 — desired N개 자동 유지, 1개 결함 시 즉시 새것 투입
    패턴: fastapi v1 — 좌(LiveDataPane: SVG Pod 박스 + ReplicaSet/Deployment 그룹) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 — Pod 상태(running/dying/spawning) + desired/actual + 컨트롤러 표시
    //   pods 배열의 각 항목: { id, state }
    //     state: 'running' | 'dying' | 'spawning'
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Deployment 생성 — replicas: 3 선언',
        desc: 'Deployment 매니페스트 한 장에 "Pod 3개 유지"를 선언. apply 즉시 ReplicaSet이 생성되고, 그 아래 Pod 3개가 띄워진다. 사용자가 직접 만지는 것은 Deployment 한 곳뿐.',
        showDeployment: true,
        showReplicaSet: true,
        desired: 3,
        pods: [
          { id: 'web-7d9-aa1', state: 'running' },
          { id: 'web-7d9-aa2', state: 'running' },
          { id: 'web-7d9-aa3', state: 'running' },
        ],
        showAlert: false,
        code: {
          lang: 'yaml',
          filename: 'deployment.yaml',
          lines: [
            '# Deployment — 표준 진입점 (replicas 3 선언)',
            'apiVersion: apps/v1',
            'kind: Deployment',
            'metadata:',
            '  name: web',
            '  labels:',
            '    app: web',
            'spec:',
            '  replicas: 3              # ← 항상 3개 유지',
            '  selector:',
            '    matchLabels:',
            '      app: web             # ← 이 라벨의 Pod를 관리',
            '  template:',
            '    metadata:',
            '      labels:',
            '        app: web           # ← Pod에 붙는 라벨',
            '    spec:',
            '      containers:',
            '        - name: app',
            '          image: myapp:v1',
            '          ports:',
            '            - containerPort: 8080',
            '',
            '# 적용',
            '# kubectl apply -f deployment.yaml',
            '# → Deployment 생성 → ReplicaSet 자동 생성 → Pod 3개 생성',
          ],
          highlight: [3, 9, 11, 12, 16],
        },
      },
      {
        title: 'Step 2. ReplicaSet 자동 복구 — 1개 죽으면 즉시 부활',
        desc: 'Pod 1개가 OOM이나 노드 장애로 죽으면 ReplicaSet이 desired(3) vs actual(2) 차이를 즉시 감지. 새 Pod를 띄워 다시 3개를 맞춘다. 사람이 깨어 있을 필요 없음 — 컨트롤러 루프가 끊임없이 비교한다.',
        showDeployment: true,
        showReplicaSet: true,
        desired: 3,
        pods: [
          { id: 'web-7d9-aa1', state: 'running' },
          { id: 'web-7d9-aa2', state: 'dying' },
          { id: 'web-7d9-aa3', state: 'running' },
          { id: 'web-7d9-bb4', state: 'spawning' },
        ],
        showAlert: false,
        code: {
          lang: 'shell',
          filename: 'auto-heal.sh',
          lines: [
            '# 1. 정상 상태 확인',
            'kubectl get pods -l app=web',
            '# NAME              READY   STATUS    AGE',
            '# web-7d9-aa1       1/1     Running   10m',
            '# web-7d9-aa2       1/1     Running   10m',
            '# web-7d9-aa3       1/1     Running   10m',
            '',
            '# 2. Pod 1개 강제 삭제 (장애 시뮬레이션)',
            'kubectl delete pod web-7d9-aa2',
            '# pod "web-7d9-aa2" deleted',
            '',
            '# 3. 몇 초 후 다시 조회 — 새 Pod가 자동 생성됨',
            'kubectl get pods -l app=web',
            '# NAME              READY   STATUS              AGE',
            '# web-7d9-aa1       1/1     Running             10m',
            '# web-7d9-aa3       1/1     Running             10m',
            '# web-7d9-bb4       0/1     ContainerCreating   3s   ← 새 Pod',
            '',
            '# 핵심: Deployment에 손대지 않았는데 actual=3 복원됨',
            '# → ReplicaSet 컨트롤러가 desired vs actual 차이를 감지해 재생성',
          ],
          highlight: [9, 13, 17, 20, 21],
        },
      },
      {
        title: 'Step 3. kubectl scale — replicas 3 → 5 즉시 확장',
        desc: '트래픽 폭주 시 한 줄로 Pod 수를 늘릴 수 있다. kubectl scale 또는 yaml의 replicas 값 수정 후 apply. ReplicaSet이 desired=5와 actual=3의 차이를 감지해 새 Pod 2개를 추가로 띄운다.',
        showDeployment: true,
        showReplicaSet: true,
        desired: 5,
        pods: [
          { id: 'web-7d9-aa1', state: 'running' },
          { id: 'web-7d9-aa2', state: 'running' },
          { id: 'web-7d9-aa3', state: 'running' },
          { id: 'web-7d9-cc5', state: 'spawning' },
          { id: 'web-7d9-cc6', state: 'spawning' },
        ],
        showAlert: false,
        code: {
          lang: 'shell',
          filename: 'kubectl-scale.sh',
          lines: [
            '# 방법 A — kubectl scale 한 줄',
            'kubectl scale deployment/web --replicas=5',
            '# deployment.apps/web scaled',
            '',
            '# 방법 B — yaml 수정 후 apply (권장: GitOps 흐름)',
            '# spec:',
            '#   replicas: 5            ← 3에서 5로 변경',
            'kubectl apply -f deployment.yaml',
            '',
            '# 결과 확인',
            'kubectl get pods -l app=web',
            '# NAME              READY   STATUS              AGE',
            '# web-7d9-aa1       1/1     Running             20m',
            '# web-7d9-aa2       1/1     Running             20m',
            '# web-7d9-aa3       1/1     Running             20m',
            '# web-7d9-cc5       0/1     ContainerCreating   2s   ← 추가',
            '# web-7d9-cc6       0/1     ContainerCreating   2s   ← 추가',
            '',
            '# 축소도 동일: kubectl scale ... --replicas=2',
            '# → 초과분 3개의 Pod를 graceful shutdown',
          ],
          highlight: [2, 7, 8, 16, 17],
        },
      },
      {
        title: 'Step 4. ReplicaSet 동작 원리 — selector 라벨 매칭',
        desc: 'ReplicaSet은 selector(예: app=web)에 매칭되는 Pod 수를 세어 desired와 비교한다. 라벨이 같다면 누가 만든 Pod든 관리 대상. 그래서 selector와 template의 라벨이 정확히 일치해야 한다 — 잘못 쓰면 다른 Pod까지 끌어다 죽이거나 무한 생성.',
        showDeployment: true,
        showReplicaSet: true,
        desired: 5,
        pods: [
          { id: 'web-7d9-aa1', state: 'running' },
          { id: 'web-7d9-aa2', state: 'running' },
          { id: 'web-7d9-aa3', state: 'running' },
          { id: 'web-7d9-cc5', state: 'running' },
          { id: 'web-7d9-cc6', state: 'running' },
        ],
        showAlert: false,
        code: {
          lang: 'yaml',
          filename: 'replicaset-internal.yaml',
          lines: [
            '# Deployment가 자동으로 생성한 ReplicaSet (보통 직접 안 만짐)',
            'apiVersion: apps/v1',
            'kind: ReplicaSet',
            'metadata:',
            '  name: web-7d9f8c5b           # Deployment-hash',
            '  ownerReferences:',
            '    - kind: Deployment',
            '      name: web                # ← Deployment가 부모',
            'spec:',
            '  replicas: 5',
            '  selector:',
            '    matchLabels:',
            '      app: web                 # ← 이 라벨 매칭',
            '  template:',
            '    metadata:',
            '      labels:',
            '        app: web               # ← Pod에 동일 라벨 부여',
            '    spec:',
            '      containers:',
            '        - name: app',
            '          image: myapp:v1',
            '',
            '# 컨트롤 루프 (개념)',
            '#   while True:',
            '#     actual = count(pods where app=web)',
            '#     if   actual < desired: create_pod(template)',
            '#     elif actual > desired: delete_oldest_pod()',
          ],
          highlight: [11, 12, 13, 16, 17, 24, 25, 26],
        },
      },
      {
        title: 'Step 5. Deployment vs ReplicaSet 책임 분리',
        desc: 'Deployment = 버전 관리(rollout/rollback), ReplicaSet = 갯수 관리(replicas 유지). 새 이미지 배포 시 Deployment가 새 ReplicaSet을 만들고 옛 ReplicaSet을 0으로 줄이는 식 — 이는 II-1-2 롤링 업데이트에서 본다. 지금은 "ReplicaSet은 갯수만, Deployment는 그 위 모든 것"으로 기억.',
        showDeployment: true,
        showReplicaSet: true,
        desired: 5,
        pods: [
          { id: 'web-7d9-aa1', state: 'running' },
          { id: 'web-7d9-aa2', state: 'running' },
          { id: 'web-7d9-aa3', state: 'running' },
          { id: 'web-7d9-cc5', state: 'running' },
          { id: 'web-7d9-cc6', state: 'running' },
        ],
        showAlert: true,
        code: {
          lang: 'shell',
          filename: 'responsibility-map.sh',
          lines: [
            '# Deployment vs ReplicaSet 역할 표',
            '',
            '┌──────────────┬──────────────────────────────────────┐',
            '│ Deployment   │ 버전 관리 (이미지 v1 → v2 무중단 교체)  │',
            '│              │ rollout/rollback 히스토리             │',
            '│              │ pause / resume                       │',
            '│              │ strategy: RollingUpdate / Recreate   │',
            '├──────────────┼──────────────────────────────────────┤',
            '│ ReplicaSet   │ 갯수 관리 (replicas N개 유지)          │',
            '│              │ Pod 죽으면 즉시 재생성                 │',
            '│              │ selector로 라벨 매칭                   │',
            '│              │ Deployment가 자동 생성/관리           │',
            '└──────────────┴──────────────────────────────────────┘',
            '',
            '# 사용자가 직접 만질 곳',
            'kubectl apply -f deployment.yaml      # Deployment',
            'kubectl scale deployment/web ...      # 갯수 변경',
            'kubectl rollout undo deployment/web   # 버전 롤백',
            '',
            '# 사용자가 거의 안 만지는 곳',
            'kubectl get rs                        # ReplicaSet은 조회만',
            '',
            '# 다음(II-1-2): replicas는 그대로 두고 image v1 → v2 점진 교체',
            '# → Deployment가 새 ReplicaSet을 띄우고 옛 ReplicaSet을 0으로',
          ],
          highlight: [4, 9, 16, 17, 18, 23, 24],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // Pod 상태별 스타일 (정적 Tailwind 클래스 — purge 안전)
    // ─────────────────────────────────────────────────────
    const POD_STYLE = {
      running:  { fill: '#cffafe', stroke: '#06b6d4', text: '#0e7490', label: 'Running'  },
      dying:    { fill: '#fee2e2', stroke: '#ef4444', text: '#991b1b', label: 'Terminating' },
      spawning: { fill: '#fef3c7', stroke: '#f59e0b', text: '#92400e', label: 'Creating' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — Pod 박스 SVG (Deployment / ReplicaSet 그룹화)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ pods, desired, showDeployment, showReplicaSet, showAlert }) {
      const actual = pods.filter((p) => p.state === 'running').length;
      const matchOk = actual === desired;

      // SVG 좌표 계산 — 한 행에 최대 5개, 박스 크기 고정
      const POD_W = 88;
      const POD_H = 64;
      const POD_GAP = 12;
      const PER_ROW = 5;
      const rowCount = Math.ceil(pods.length / PER_ROW);
      const innerW = PER_ROW * POD_W + (PER_ROW - 1) * POD_GAP;
      const podsAreaH = rowCount * POD_H + (rowCount - 1) * POD_GAP;

      // 그룹 박스 패딩
      const RS_PAD_X = 16, RS_PAD_TOP = 30, RS_PAD_BOTTOM = 16;
      const DEP_PAD_X = 14, DEP_PAD_TOP = 28, DEP_PAD_BOTTOM = 14;

      const rsW = innerW + RS_PAD_X * 2;
      const rsH = podsAreaH + RS_PAD_TOP + RS_PAD_BOTTOM;
      const depW = rsW + DEP_PAD_X * 2;
      const depH = rsH + DEP_PAD_TOP + DEP_PAD_BOTTOM;

      const SVG_PAD = 14;
      const svgW = depW + SVG_PAD * 2;
      const svgH = depH + SVG_PAD * 2;

      const depX = SVG_PAD;
      const depY = SVG_PAD;
      const rsX = depX + DEP_PAD_X;
      const rsY = depY + DEP_PAD_TOP;
      const podsX = rsX + RS_PAD_X;
      const podsY = rsY + RS_PAD_TOP;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          {/* 상단 타이틀 + desired/actual 카운터 */}
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🏭 공장 생산라인 — Pod 자동 유지</h2>
            <div className="flex gap-1.5 text-[10px] font-mono">
              <span className="px-1.5 py-0.5 rounded bg-cyan-100 text-cyan-700 font-bold">
                desired {desired}
              </span>
              <span className={`px-1.5 py-0.5 rounded font-bold ${
                matchOk ? 'bg-emerald-100 text-emerald-700' : 'bg-yellow-100 text-yellow-700'
              }`}>
                actual {actual}
              </span>
            </div>
          </div>

          {/* SVG — Deployment 박스 → ReplicaSet 박스 → Pod 박스들 */}
          <div className="bg-slate-50 rounded-lg border border-slate-200 p-2 overflow-x-auto">
            <svg
              viewBox={`0 0 ${svgW} ${svgH}`}
              width="100%"
              style={{ minWidth: svgW }}
              role="img"
              aria-label="Deployment 안에 ReplicaSet, 그 안에 Pod 박스들"
            >
              {/* Deployment 박스 (sky-500 외곽) */}
              {showDeployment && (
                <g>
                  <rect
                    x={depX} y={depY} width={depW} height={depH}
                    rx="10" ry="10"
                    fill="#f0f9ff"
                    stroke="#0284c7"
                    strokeWidth="2"
                    strokeDasharray="6 3"
                  />
                  <rect
                    x={depX + 8} y={depY - 1}
                    width="118" height="20"
                    rx="4" ry="4"
                    fill="#0284c7"
                  />
                  <text
                    x={depX + 14} y={depY + 13}
                    fontSize="11" fontWeight="bold" fill="white"
                    fontFamily="ui-monospace, monospace"
                  >
                    Deployment / web
                  </text>
                </g>
              )}

              {/* ReplicaSet 박스 (cyan-600 외곽) */}
              {showReplicaSet && (
                <g>
                  <rect
                    x={rsX} y={rsY} width={rsW} height={rsH}
                    rx="8" ry="8"
                    fill="#ecfeff"
                    stroke="#0891b2"
                    strokeWidth="2"
                  />
                  <rect
                    x={rsX + 8} y={rsY - 1}
                    width="170" height="20"
                    rx="4" ry="4"
                    fill="#0891b2"
                  />
                  <text
                    x={rsX + 14} y={rsY + 13}
                    fontSize="11" fontWeight="bold" fill="white"
                    fontFamily="ui-monospace, monospace"
                  >
                    ReplicaSet · selector app=web
                  </text>
                </g>
              )}

              {/* Pod 박스들 */}
              {pods.map((pod, i) => {
                const row = Math.floor(i / PER_ROW);
                const col = i % PER_ROW;
                const x = podsX + col * (POD_W + POD_GAP);
                const y = podsY + row * (POD_H + POD_GAP);
                const s = POD_STYLE[pod.state];
                const isFading = pod.state === 'dying';
                const isSpawning = pod.state === 'spawning';
                return (
                  <g
                    key={pod.id}
                    style={{
                      transition: 'opacity 0.6s, transform 0.6s',
                      transformOrigin: `${x + POD_W / 2}px ${y + POD_H / 2}px`,
                      opacity: isFading ? 0.45 : 1,
                    }}
                  >
                    <rect
                      x={x} y={y} width={POD_W} height={POD_H}
                      rx="6" ry="6"
                      fill={s.fill}
                      stroke={s.stroke}
                      strokeWidth="2"
                      strokeDasharray={isSpawning ? '4 2' : 'none'}
                    >
                      {isSpawning && (
                        <animate
                          attributeName="opacity"
                          values="0.4;1;0.4"
                          dur="1.4s"
                          repeatCount="indefinite"
                        />
                      )}
                    </rect>
                    <text
                      x={x + POD_W / 2} y={y + 22}
                      fontSize="14"
                      textAnchor="middle"
                    >
                      📦
                    </text>
                    <text
                      x={x + POD_W / 2} y={y + 40}
                      fontSize="10" fontWeight="bold" fill={s.text}
                      textAnchor="middle"
                      fontFamily="ui-monospace, monospace"
                    >
                      Pod {i + 1}
                    </text>
                    <text
                      x={x + POD_W / 2} y={y + 54}
                      fontSize="9" fill={s.text}
                      textAnchor="middle"
                      fontFamily="ui-monospace, monospace"
                    >
                      {s.label}
                    </text>
                  </g>
                );
              })}
            </svg>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-3 h-3 rounded border-2" style={{ background: '#cffafe', borderColor: '#06b6d4' }}></span>
              Running
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-3 rounded border-2" style={{ background: '#fef3c7', borderColor: '#f59e0b' }}></span>
              Creating (자동 생성 중)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-3 rounded border-2" style={{ background: '#fee2e2', borderColor: '#ef4444' }}></span>
              Terminating
            </span>
            <span className="ml-auto flex items-center gap-1 font-mono">
              <span className="w-3 h-0.5 bg-sky-600"></span>Deployment
              <span className="w-3 h-0.5 bg-cyan-600 ml-2"></span>ReplicaSet
            </span>
          </div>

          {/* 마지막 단계 알람 박스 */}
          {showAlert && (
            <div className="mt-4 p-3 rounded-lg bg-cyan-50 border-2 border-cyan-400">
              <div className="flex items-center gap-2 text-cyan-800 font-bold text-sm">
                <span className="text-lg">✅</span>
                <span>책임 분리 완성 — Deployment(버전) / ReplicaSet(갯수)</span>
              </div>
              <div className="text-[11px] text-cyan-700 mt-1">
                사용자는 Deployment만 다룬다. ReplicaSet은 자동으로 살아 움직인다.
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-cyan-500/15 border-l-2 border-cyan-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 워크로드 &gt; Chapter 1. Deployment 패턴</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Deployment &amp; ReplicaSet</h1>
                  <p className="text-sm text-slate-500 mt-0.5">공장 생산라인 — replicas N개 자동 유지 / 1개 죽으면 즉시 복구 / 1줄 scale</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                pods={step.pods}
                desired={step.desired}
                showDeployment={step.showDeployment}
                showReplicaSet={step.showReplicaSet}
                showAlert={step.showAlert}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 안내 */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-cyan-50 border-2 border-cyan-300 rounded-xl p-3 text-sm text-cyan-900">
                💡 다음(II-1-2)에서는 replicas는 그대로 두고 <strong>image v1 → v2 무중단 교체</strong> — 롤링 업데이트 / Recreate 전략
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-cyan-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-cyan-600 text-white hover:bg-cyan-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./II-1-2.html" className="text-cyan-700 hover:text-cyan-900 font-medium">II-1-2 롤링 업데이트 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
