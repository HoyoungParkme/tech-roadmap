      'v1':      { fill: '#cffafe', stroke: '#06b6d4', text: '#0e7490', label: 'v1',     dim: false, term: false },
      'v2':      { fill: '#ede9fe', stroke: '#8b5cf6', text: '#5b21b6', label: 'v2',     dim: false, term: false },
      'v1-term': { fill: '#fef3c7', stroke: '#f59e0b', text: '#92400e', label: 'v1 ✕',  dim: true,  term: true  },
      'v2-fail': { fill: '#fee2e2', stroke: '#ef4444', text: '#991b1b', label: 'v2 !',   dim: false, term: false },
    };

    // 이벤트 박스 스타일
    const EVENT_STYLE = {
      info:    { box: 'bg-sky-50 border-sky-300',         text: 'text-sky-800',     detail: 'text-sky-700' },
      warn:    { box: 'bg-amber-50 border-amber-300',     text: 'text-amber-800',   detail: 'text-amber-700' },
      success: { box: 'bg-emerald-50 border-emerald-300', text: 'text-emerald-800', detail: 'text-emerald-700' },
      crit:    { box: 'bg-red-50 border-red-400',         text: 'text-red-800',     detail: 'text-red-700' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — SVG Pod 박스 + 카운터 + ReplicaSet 표
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ pods, counter, rsRows, eventBox }) {
      // SVG 레이아웃 — Pod 박스 한 줄 정렬
      const SVG_W = 540;
      const SVG_H = 130;
      const podW = 64;
      const podH = 76;
      const gap = 10;
      const totalW = pods.length * podW + (pods.length - 1) * gap;
      const startX = (SVG_W - totalW) / 2;
      const podY = 28;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          {/* 카운터 — desired / current / up-to-date / available */}
          <div className="flex items-center justify-between mb-3">
            <div className="text-xs font-bold text-slate-700">📦 Deployment · web</div>
            <span className="text-[10px] text-slate-400 font-mono">live state</span>
          </div>

          <div className="grid grid-cols-4 gap-2 mb-4">
            <CounterCell label="desired"     value={counter.desired}    color="slate" />
            <CounterCell label="current"     value={counter.current}    color={counter.current > counter.desired ? 'cyan' : 'slate'} />
            <CounterCell label="up-to-date"  value={counter.upToDate}   color="violet" />
            <CounterCell label="available"   value={counter.available}  color="emerald" />
          </div>

          {/* SVG Pod 박스 */}
          <div className="rounded-lg bg-slate-50 border border-slate-200 px-2 py-1 mb-3">
            <svg viewBox={`0 0 ${SVG_W} ${SVG_H}`} className="w-full h-auto" aria-label="Pod 상태 시각화">
              {/* 상단 라벨 */}
              <text x={SVG_W / 2} y="16" textAnchor="middle" fontSize="10" fontFamily="ui-monospace, monospace" fill="#64748b">
                kubectl get pods -l app=web · 총 {pods.length}개
              </text>

              {/* Pod 박스들 */}
              {pods.map((p, i) => {
                const s = POD_STYLE[p.v];
                const x = startX + i * (podW + gap);
                return (
                  <g key={i} style={{ transition: 'all 0.6s ease' }}>
                    {/* 종료 중인 Pod에 X 마크 */}
                    {s.term && (
                      <rect
                        x={x - 2} y={podY - 2}
                        width={podW + 4} height={podH + 4}
                        rx="10"
                        fill="none"
                        stroke="#f59e0b"
                        strokeWidth="1.5"
                        strokeDasharray="4 3"
                        opacity="0.7"
                      />
                    )}
                    <rect
                      x={x} y={podY}
                      width={podW} height={podH}
                      rx="8"
                      fill={s.fill}
                      stroke={s.stroke}
                      strokeWidth="2"
                      opacity={s.dim ? 0.55 : 1}
                    />
                    {/* Pod 아이콘 (📦 대신 SVG 박스) */}
                    <g transform={`translate(${x + podW / 2}, ${podY + 22})`}>
                      <rect x="-12" y="-9" width="24" height="18" rx="2" fill={s.stroke} opacity="0.85" />
                      <line x1="-12" y1="-9" x2="12" y2="-9" stroke="white" strokeWidth="1" opacity="0.6" />
                      <line x1="0" y1="-9" x2="0" y2="9" stroke="white" strokeWidth="1" opacity="0.6" />
                    </g>
                    {/* Pod 번호 */}
                    <text
                      x={x + podW / 2} y={podY + 50}
                      textAnchor="middle"
                      fontSize="10"
                      fontWeight="700"
                      fill={s.text}
                      fontFamily="ui-monospace, monospace"
                    >
                      Pod {i + 1}
                    </text>
                    {/* 버전 라벨 */}
                    <text
                      x={x + podW / 2} y={podY + 65}
                      textAnchor="middle"
                      fontSize="11"
                      fontWeight="800"
                      fill={s.text}
                      fontFamily="ui-monospace, monospace"
                    >
                      {s.label}
                    </text>
                  </g>
                );
              })}
            </svg>
          </div>

          {/* ReplicaSet 표 */}
          <div className="text-[11px] font-bold text-slate-700 mb-1.5">🧬 ReplicaSet</div>
          <div className="rounded-lg border border-slate-200 overflow-hidden mb-3">
            <table className="w-full text-[11px] font-mono">
              <thead className="bg-slate-100 text-slate-600">
                <tr>
                  <th className="text-left px-2 py-1 font-medium">name</th>
                  <th className="text-right px-2 py-1 font-medium">desired</th>
                  <th className="text-right px-2 py-1 font-medium">ready</th>
                  <th className="text-left px-2 py-1 font-medium">image</th>
                </tr>
              </thead>
              <tbody>
                {rsRows.map((rs) => {
                  const isV2 = rs.image.includes('v2');
                  const accent = isV2 ? 'text-violet-700' : 'text-cyan-700';
                  const dim = !rs.active ? 'opacity-50' : '';
                  return (
                    <tr key={rs.name} className={`border-t border-slate-100 ${dim}`}>
                      <td className={`px-2 py-1 font-bold ${accent}`}>{rs.name}</td>
                      <td className="px-2 py-1 text-right text-slate-700">{rs.desired}</td>
                      <td className="px-2 py-1 text-right text-slate-700">{rs.ready}</td>
                      <td className={`px-2 py-1 ${accent}`}>{rs.image}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* 이벤트 박스 */}
          {eventBox && (
            <div className={`p-2.5 rounded-lg border-2 ${EVENT_STYLE[eventBox.kind].box} ${eventBox.kind === 'crit' ? 'animate-pulse' : ''}`}>
              <div className={`text-xs font-bold ${EVENT_STYLE[eventBox.kind].text}`}>
                {eventBox.text}
              </div>
              <div className={`text-[10px] mt-0.5 font-mono ${EVENT_STYLE[eventBox.kind].detail}`}>
                {eventBox.detail}
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm border-2 border-cyan-500 bg-cyan-100"></span>v1 (cyan)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm border-2 border-violet-500 bg-violet-100"></span>v2 (violet)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm border-2 border-amber-500 bg-amber-100" style={{ borderStyle: 'dashed' }}></span>Terminating
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // CounterCell — 단일 메트릭 박스
    // ─────────────────────────────────────────────────────
    const COUNTER_COLOR = {
      slate:   { box: 'bg-slate-50 border-slate-200',     value: 'text-slate-800',  label: 'text-slate-500'  },
      cyan:    { box: 'bg-cyan-50 border-cyan-300',       value: 'text-cyan-800',   label: 'text-cyan-700'   },
      violet:  { box: 'bg-violet-50 border-violet-300',   value: 'text-violet-800', label: 'text-violet-700' },
      emerald: { box: 'bg-emerald-50 border-emerald-300', value: 'text-emerald-800',label: 'text-emerald-700'},
    };

    function CounterCell({ label, value, color }) {
      const c = COUNTER_COLOR[color] || COUNTER_COLOR.slate;
      return (
        <div className={`rounded-lg border-2 px-2 py-1.5 text-center transition-all duration-500 ${c.box}`}>
          <div className={`text-[9px] font-mono uppercase tracking-wider ${c.label}`}>{label}</div>
          <div className={`text-xl font-extrabold tabular-nums ${c.value}`}>{value}</div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-cyan-500/15 border-l-2 border-cyan-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. Workload &gt; Chapter 1. Deployment</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">롤링 업데이트와 롤백</h1>
                  <p className="text-sm text-slate-500 mt-0.5">교대 근무 — v1 → v2 점진 교체 (maxSurge / maxUnavailable), 문제 시 즉시 복귀</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                pods={step.pods}
                counter={step.counter}
                rsRows={step.rsRows}
                eventBox={step.eventBox}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-cyan-50 border-2 border-cyan-300 rounded-xl p-3 text-sm text-cyan-900">
                💡 다음(II-2-1)에서는 <strong>StatefulSet</strong> — Deployment와 다르게 고유 ID + 영속 볼륨이 필요한 워크로드 (지정석 비유)
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-cyan-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-cyan-600 text-white hover:bg-cyan-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; II-1-1 Deployment</a>
              <a href="./II-2-1.html" className="text-cyan-700 hover:text-cyan-900 font-medium">II-2-1 StatefulSet &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
