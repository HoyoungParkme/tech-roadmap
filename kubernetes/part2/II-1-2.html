<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — 롤링 업데이트와 롤백</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    II-1-2. 롤링 업데이트와 롤백
    학습 목표: 무중단 배포의 흐름과 문제 발생 시 즉시 롤백하는 방법을 안다.
    핵심 비유: "교대 근무 교체" — v1 직원을 한 명씩 v2 직원으로 교체. 문제 시 즉시 v1로 복귀
    구조: 4단계 (안정 v1 / 점진 교체 / 완료 v2 / 문제 + 롤백)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 4단계 STEPS — 각 단계별 Pod 상태 (v1: green / v2: blue / failing: red)
    const STEPS = [
      {
        title: 'Step 1. 안정 상태 — v1 Pod 4개',
        desc: '롤링 업데이트 시작 전. Deployment가 v1 image의 Pod 4개를 유지 중. 트래픽은 4개에 분산.',
        block: {
          kind: 'shell',
          code: `kubectl get deploy/web -o wide
# NAME   READY   IMAGE         AGE
# web    4/4     myapp:v1      30d

kubectl get pods -l app=web
# web-v1-aa1   Running
# web-v1-aa2   Running
# web-v1-aa3   Running
# web-v1-aa4   Running`
        },
        focus: 'stable',
        pods: ['v1','v1','v1','v1'],
      },
      {
        title: 'Step 2. 점진 교체 — v1 1개 ↓, v2 1개 ↑',
        desc: 'image: myapp:v2로 변경 후 apply. K8s가 한꺼번에 4개를 바꾸지 않고 maxSurge=1, maxUnavailable=1 기본 정책으로 한 번에 1개씩 교체. 사용자는 무중단 경험.',
        block: {
          kind: 'yaml',
          code: `spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1            # 한 번에 1개 추가 가능
      maxUnavailable: 1      # 한 번에 1개 다운 허용
  template:
    spec:
      containers:
        - name: app
          image: myapp:v2     # v1 → v2

# kubectl apply -f deployment.yaml
# kubectl rollout status deployment/web
# Waiting for deployment "web" rollout to finish:
#   2 of 4 updated replicas are available...`
        },
        focus: 'rolling',
        pods: ['v1','v1','v2','v2'],
      },
      {
        title: 'Step 3. 완료 — v2 Pod 4개',
        desc: '4개 Pod 모두 v2로 교체 완료. v1 ReplicaSet은 replicas=0으로 유지(롤백용). v2 ReplicaSet이 활성. 사용자 무중단.',
        block: {
          kind: 'shell',
          code: `kubectl rollout status deployment/web
# deployment "web" successfully rolled out

kubectl get rs -l app=web
# NAME              DESIRED   CURRENT   READY
# web-v2-7d9f8c5b   4         4         4
# web-v1-5b6c8e4d   0         0         0      # 롤백용 보관

kubectl get pods -l app=web
# web-v2-aa1   Running
# web-v2-aa2   Running
# web-v2-aa3   Running
# web-v2-aa4   Running`
        },
        focus: 'done',
        pods: ['v2','v2','v2','v2'],
      },
      {
        title: 'Step 4. 문제 발생 → kubectl rollout undo',
        desc: 'v2가 버그가 있었다? 한 줄로 v1으로 즉시 복귀. v1 ReplicaSet의 replicas를 다시 4로 늘리고 v2 replicas를 0으로. 무중단 롤백.',
        block: {
          kind: 'shell',
          code: `# v2 운영 중 에러 발견 (5xx 급증)
kubectl logs -l app=web --tail=20
# Error: undefined is not a function...

# 즉시 롤백
kubectl rollout undo deployment/web

# 30초 뒤
kubectl get pods -l app=web
# web-v1-bb1   Running    ← v1 복귀!
# web-v1-bb2   Running
# web-v1-bb3   Running
# web-v1-bb4   Running

# 특정 버전으로 복귀
# kubectl rollout undo deployment/web --to-revision=3`
        },
        focus: 'rollback',
        pods: ['v1','v1','v1','v1'],
      },
    ];

    const KIND_STYLE = {
      shell: { label: 'Bash', textColor: '#86efac' },
      yaml:  { label: 'YAML', textColor: '#fde68a' },
    };

    // Pod 색상 정적 매핑 (Tailwind CDN 안전성)
    const VERSION_STYLE = {
      v1: { bg: 'bg-emerald-100', border: 'border-emerald-400', text: 'text-emerald-800', label: 'v1' },
      v2: { bg: 'bg-blue-100',    border: 'border-blue-400',    text: 'text-blue-800',    label: 'v2' },
    };

    function PodLine({ pods, focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">👷 교대 근무 — 한 명씩 교체</div>
          <div className="flex items-center justify-center gap-3">
            {pods.map((v, i) => {
              const s = VERSION_STYLE[v];
              return (
                <div key={i} className={`${s.bg} border-2 ${s.border} rounded-lg px-3 py-2 text-center min-w-[80px]`}>
                  <div className="text-xl">📦</div>
                  <div className={`text-xs font-bold ${s.text} mt-1`}>Pod {i + 1}</div>
                  <div className={`text-[10px] font-mono ${s.text}`}>{s.label}</div>
                </div>
              );
            })}
          </div>
          <p className="text-center text-[11px] text-slate-500 mt-3">
            {focus === 'stable' && 'v1 4개 안정 운영 중'}
            {focus === 'rolling' && 'v1 → v2 점진 교체 중 (maxSurge=1)'}
            {focus === 'done' && 'v2 4개 교체 완료 (v1 ReplicaSet은 replicas=0으로 보관)'}
            {focus === 'rollback' && 'kubectl rollout undo → v1 즉시 복귀 ✅'}
          </p>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">롤링 업데이트와 롤백</h1>
                <p className="text-sm text-slate-500 mt-1">교대 근무 — v1 → v2 한 명씩 교체, 문제 시 즉시 복귀</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <PodLine pods={step.pods} focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'rollback' && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 mb-6 text-xs text-emerald-900">
                💡 다음(II-2-1)에서는 Deployment와 다르게 고유 ID + 영속 볼륨이 필요한 StatefulSet을 본다 — 지정석 비유
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
