<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — StatefulSet</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    II-2-1. StatefulSet
    학습 목표: Deployment와 다르게 StatefulSet이 필요한 이유 (고유 ID + 영속 볼륨 + 순서 보장).
    핵심 비유: "지정석" — 좌석 0/1/2 고정, 각자 자기 사물함, 0번이 먼저 앉아야 1번이 앉음
    구조: 4단계 (Deployment 한계 / StatefulSet ID / 영속 볼륨 / 순서 보장)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Deployment의 한계 — 이름이 매번 다르다',
        desc: 'DB나 메시지 큐 같은 "상태 있는" 워크로드에 Deployment를 쓰면 문제. Pod 이름이 web-7d9f8c5b-aa1, 죽고 새로 뜨면 web-7d9f8c5b-zx9... 매번 달라진다. 다른 Pod가 "어디로 연결해야 하지?" 답을 못 한다.',
        block: {
          kind: 'shell',
          code: `# Deployment의 Pod 이름 (랜덤)
kubectl get pods -l app=mydb
# mydb-7d9f8c5b-aa1   Running
# mydb-7d9f8c5b-bb2   Running
# mydb-7d9f8c5b-cc3   Running

# Pod 1개 죽음 → 새로 뜸
# mydb-7d9f8c5b-aa1   Terminating
# mydb-7d9f8c5b-pq8   ContainerCreating  ← 이름이 바뀜!
#                                          → 클러스터링 깨짐`
        },
        focus: 'deploy-issue',
      },
      {
        title: 'Step 2. StatefulSet — 고유 ID (-0, -1, -2 순서 ID)',
        desc: 'StatefulSet의 Pod 이름은 web-0, web-1, web-2처럼 인덱스 기반. 죽었다 살아도 같은 이름이 유지된다. 다른 Pod는 "web-0에 연결" 같은 안정적 이름을 쓸 수 있다.',
        block: {
          kind: 'yaml',
          code: `apiVersion: apps/v1
kind: StatefulSet         # ← Deployment 아님
metadata:
  name: mydb
spec:
  serviceName: mydb-headless   # headless service 필요
  replicas: 3
  selector:
    matchLabels:
      app: mydb
  template:
    metadata:
      labels:
        app: mydb
    spec:
      containers:
        - name: db
          image: postgres:16

# kubectl get pods -l app=mydb
# mydb-0   Running   ← 인덱스 ID, 영속!
# mydb-1   Running
# mydb-2   Running`
        },
        focus: 'stable-id',
      },
      {
        title: 'Step 3. 영속 볼륨 — 각자 자기 사물함',
        desc: 'volumeClaimTemplates로 Pod별 PersistentVolumeClaim을 자동 생성. mydb-0의 데이터는 항상 같은 볼륨에. Pod가 죽고 새로 떠도 같은 디스크 다시 마운트. 좌석마다 자기 사물함이 있는 것과 같다.',
        block: {
          kind: 'yaml',
          code: `spec:
  # ... 위 설정 ...
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
  template:
    spec:
      containers:
        - name: db
          image: postgres:16
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data

# 자동 생성되는 PVC
# data-mydb-0   Bound   10Gi   → mydb-0 전용
# data-mydb-1   Bound   10Gi   → mydb-1 전용
# data-mydb-2   Bound   10Gi   → mydb-2 전용`
        },
        focus: 'volume',
      },
      {
        title: 'Step 4. 순서 보장 — 0 → 1 → 2 순으로 시작/종료',
        desc: '0번 Pod가 Ready된 후에야 1번이 시작된다. 종료는 역순(2 → 1 → 0). DB 마스터-레플리카 클러스터에 필수 — 마스터가 먼저 떠야 레플리카가 붙을 수 있다. Deployment는 동시 시작이라 이게 안 된다.',
        block: {
          kind: 'shell',
          code: `# 시작 순서 관찰
kubectl get pods -l app=mydb -w
# mydb-0   Pending → ContainerCreating → Running (Ready)
#   ↓ 0번 Ready 후에야
# mydb-1   Pending → ContainerCreating → Running (Ready)
#   ↓ 1번 Ready 후에야
# mydb-2   Pending → ContainerCreating → Running (Ready)

# 종료는 역순 (-2 → -1 → -0)
kubectl scale sts/mydb --replicas=0
# mydb-2 Terminating
# mydb-1 Terminating  (-2 종료 후)
# mydb-0 Terminating  (-1 종료 후)`
        },
        focus: 'order',
      },
    ];

    const KIND_STYLE = {
      shell: { label: 'Bash', textColor: '#86efac' },
      yaml:  { label: 'YAML', textColor: '#fde68a' },
    };

    // Deployment의 "랜덤 ID" 효과를 정적 값으로 표현 (W-1: 매 렌더 새 값 생성 회피, 학습자 일관성 확보)
    const DEPLOY_RANDOM_NAMES = ['?-7d9f', '?-bb2x', '?-cc3z'];

    function SeatDiagram({ focus }) {
      // 정적 매핑 — 좌석 3개 표현
      const seats = [
        { id: 0, label: 'mydb-0', volume: 'data-mydb-0', randomLabel: DEPLOY_RANDOM_NAMES[0] },
        { id: 1, label: 'mydb-1', volume: 'data-mydb-1', randomLabel: DEPLOY_RANDOM_NAMES[1] },
        { id: 2, label: 'mydb-2', volume: 'data-mydb-2', randomLabel: DEPLOY_RANDOM_NAMES[2] },
      ];
      const showStableId = focus !== 'deploy-issue';
      const showVolume = focus === 'volume' || focus === 'order';
      const showOrder = focus === 'order';

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🪑 지정석 (StatefulSet)</div>
          <div className="flex items-center justify-center gap-3">
            {seats.map((s, i) => (
              <div key={s.id} className="flex flex-col items-center">
                <div className={`bg-violet-100 border-2 border-violet-400 rounded-lg px-3 py-2 text-center min-w-[100px] ${showOrder && i > 0 ? 'opacity-50' : ''}`}>
                  <div className="text-2xl">🪑</div>
                  <div className="text-xs font-bold text-violet-800 mt-1">
                    {showStableId ? s.label : s.randomLabel}
                  </div>
                </div>
                {showVolume && (
                  <div className="bg-amber-100 border-2 border-amber-400 rounded-md px-2 py-1 text-[9px] text-amber-800 font-mono mt-2">
                    💾 {s.volume}
                  </div>
                )}
                {showOrder && i < seats.length - 1 && (
                  <div className="text-[10px] text-slate-500 mt-1">↓ 다음</div>
                )}
              </div>
            ))}
          </div>
          <p className="text-center text-[11px] text-slate-500 mt-3">
            {focus === 'deploy-issue' && 'Deployment — Pod 이름 매번 다름 (지정 안 됨)'}
            {focus === 'stable-id' && 'StatefulSet — mydb-0/1/2 ID 영속'}
            {focus === 'volume' && '각 Pod마다 전용 PersistentVolume'}
            {focus === 'order' && '0 → 1 → 2 순서대로 시작 / 역순 종료'}
          </p>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">StatefulSet</h1>
                <p className="text-sm text-slate-500 mt-1">지정석 — 고유 ID + 영속 볼륨 + 순서 보장</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <SeatDiagram focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'order' && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 mb-6 text-xs text-violet-900">
                💡 다음(II-2-2)에서는 노드별 1개(로그수집) / 1회성(마이그레이션) / 주기(백업) 워크로드 — DaemonSet/Job/CronJob을 본다
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
