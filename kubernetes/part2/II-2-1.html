<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — II-2-1. StatefulSet</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-2-1. StatefulSet — 안정적 식별자 + 순서 보장 + 영속 PVC
    학습 목표: Deployment(랜덤 이름)와 다르게 StatefulSet은 pod-0/pod-1/pod-2 고정 ID + 각자 PVC + 순서 보장
    핵심 비유: 지정석 — 좌석 0/1/2 고정, 각자 사물함, 0번이 먼저 앉아야 1번이 앉음
    패턴: fastapi v1 — 좌(LiveDataPane SVG: pod 3개 + PVC + Deployment 비교) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // STEPS — StatefulSet 5단계 시뮬레이션
    //   Step 1: StatefulSet 정의 (replicas: 3 + volumeClaimTemplates) — Pod 아직 없음
    //   Step 2: pod-0 생성 + pvc-0 부착 + DNS app-0.svc
    //   Step 3: pod-0 Ready 대기 후 pod-1 생성 + pvc-1
    //   Step 4: 순서 보장으로 pod-2 생성 + pvc-2
    //   Step 5: pod-1 죽으면 같은 식별자로 복구 (PVC 그대로)
    //
    //   각 pod 상태:
    //     'none'        : 아직 생성 안 됨
    //     'creating'    : 생성 중 (pending/containercreating)
    //     'running'     : Ready
    //     'terminating' : 종료 중 (Step 5에서 일시적)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. StatefulSet 정의 — replicas: 3 + volumeClaimTemplates',
        desc: 'apps/v1 StatefulSet 매니페스트 작성. serviceName(Headless Service) + replicas: 3 + volumeClaimTemplates 3가지 핵심 필드. 아직 Pod는 없고, 컨트롤러가 곧 0번부터 차례로 만들 예정.',
        dataState: {
          pods: [
            { idx: 0, status: 'none', pvc: 'none', dns: 'app-0.svc' },
            { idx: 1, status: 'none', pvc: 'none', dns: 'app-1.svc' },
            { idx: 2, status: 'none', pvc: 'none', dns: 'app-2.svc' },
          ],
          deployment: ['none', 'none', 'none'],
          highlight: 'spec',
        },
        code: {
          lang: 'yaml',
          filename: 'statefulset.yaml',
          lines: [
            '# StatefulSet — 안정적 식별자 + 영속 볼륨 + 순서 보장',
            'apiVersion: apps/v1',
            'kind: StatefulSet              # ← Deployment 아님',
            'metadata:',
            '  name: app',
            'spec:',
            '  serviceName: app-headless    # Headless Service (DNS용)',
            '  replicas: 3                  # pod-0, pod-1, pod-2',
            '  selector:',
            '    matchLabels: { app: app }',
            '  template:',
            '    metadata:',
            '      labels: { app: app }',
            '    spec:',
            '      containers:',
            '        - name: db',
            '          image: postgres:16',
            '          ports:',
            '            - containerPort: 5432',
            '          volumeMounts:',
            '            - name: data',
            '              mountPath: /var/lib/postgresql/data',
            '  # 핵심 — Pod별 PVC를 컨트롤러가 자동 생성',
            '  volumeClaimTemplates:',
            '    - metadata:',
            '        name: data',
            '      spec:',
            '        accessModes: ["ReadWriteOnce"]',
            '        resources:',
            '          requests:',
            '            storage: 10Gi',
            '',
            '# kubectl apply -f statefulset.yaml',
            '# → Controller: "0번부터 만들겠습니다" (아직 Pod 없음)',
          ],
          highlight: [3, 7, 8, 24, 25, 26, 27, 28, 29, 30, 31],
        },
      },
      {
        title: 'Step 2. pod-0 생성 — pvc-0 부착 + 안정적 DNS app-0.svc',
        desc: '컨트롤러가 첫 번째 Pod를 만든다. 이름은 app-0 (인덱스 ID 영속). volumeClaimTemplates에 따라 data-app-0 PVC 자동 생성·바인딩. Headless Service가 app-0.app-headless.default.svc DNS를 만들어준다.',
        dataState: {
          pods: [
            { idx: 0, status: 'running',  pvc: 'data-app-0', dns: 'app-0.svc' },
            { idx: 1, status: 'none',     pvc: 'none',       dns: 'app-1.svc' },
            { idx: 2, status: 'none',     pvc: 'none',       dns: 'app-2.svc' },
          ],
          deployment: ['app-7d9f-aa1', 'none', 'none'],
          highlight: 'pod0',
        },
        code: {
          lang: 'bash',
          filename: 'kubectl-describe.sh',
          lines: [
            '# 0번 Pod 먼저 생성 (인덱스 0 → 1 → 2 순서)',
            '$ kubectl apply -f statefulset.yaml',
            '$ kubectl get pods -l app=app -w',
            '',
            'NAME    READY   STATUS              AGE',
            'app-0   0/1     Pending             1s',
            'app-0   0/1     ContainerCreating   3s',
            'app-0   1/1     Running             8s   ← Ready',
            '',
            '# PVC 자동 생성 — volumeClaimTemplates에서',
            '$ kubectl get pvc',
            'NAME          STATUS   VOLUME       CAPACITY   AGE',
            'data-app-0    Bound    pv-xxx-001   10Gi       8s',
            '',
            '# 안정적 DNS — Headless Service가 만들어준다',
            '$ kubectl exec -it client -- nslookup app-0.app-headless',
            'Name:    app-0.app-headless.default.svc.cluster.local',
            'Address: 10.244.1.5      ← Pod IP',
            '',
            '# 비교 — Deployment였다면 이름 랜덤 (app-7d9f8c5b-aa1)',
            '#         DNS도 안정적이지 않음, PVC도 공유',
          ],
          highlight: [6, 7, 8, 13, 17, 18],
        },
      },
      {
        title: 'Step 3. pod-1 생성 — pod-0 Ready 후에야 시작 + pvc-1',
        desc: 'pod-0이 Ready 상태가 된 다음에야 pod-1이 생성된다(순서 보장). data-app-1 PVC 새로 생성·바인딩, DNS는 app-1.svc. DB 마스터-레플리카처럼 0번이 먼저 떠야 1번이 따라붙을 수 있는 워크로드에 필수.',
        dataState: {
          pods: [
            { idx: 0, status: 'running',  pvc: 'data-app-0', dns: 'app-0.svc' },
            { idx: 1, status: 'running',  pvc: 'data-app-1', dns: 'app-1.svc' },
            { idx: 2, status: 'none',     pvc: 'none',       dns: 'app-2.svc' },
          ],
          deployment: ['app-7d9f-aa1', 'app-7d9f-bb2', 'none'],
          highlight: 'pod1',
        },
        code: {
          lang: 'bash',
          filename: 'kubectl-describe.sh',
          lines: [
            '# pod-0 Ready 확인 후에야 pod-1 시작 (Ordered)',
            '$ kubectl get pods -l app=app -w',
            '',
            'NAME    READY   STATUS              AGE',
            'app-0   1/1     Running             20s   ← 이미 Ready',
            'app-1   0/1     Pending             1s    ← 이제 시작',
            'app-1   0/1     ContainerCreating   3s',
            'app-1   1/1     Running             8s',
            '',
            '# PVC도 차례로 추가',
            '$ kubectl get pvc',
            'NAME          STATUS   VOLUME       CAPACITY   AGE',
            'data-app-0    Bound    pv-xxx-001   10Gi       28s',
            'data-app-1    Bound    pv-xxx-002   10Gi       8s',
            '',
            '# DNS도 차례로',
            '$ nslookup app-1.app-headless',
            'Address: 10.244.1.6',
            '',
            '# 활용 — DB cluster init',
            '#   app-0 = primary (먼저 떠서 cluster 초기화)',
            '#   app-1 = replica (primary에 join)',
            '#   Deployment였다면 동시 시작 → join 실패!',
          ],
          highlight: [5, 6, 7, 8, 14, 21, 22, 23],
        },
      },
      {
        title: 'Step 4. pod-2 생성 — 순서 보장 + pvc-2 (3 replicas 완성)',
        desc: 'pod-1이 Ready가 된 다음에야 pod-2 차례. data-app-2 PVC 자동 생성, DNS app-2.svc. 이로써 안정적 ID 3개·전용 PVC 3개·DNS 3개가 모두 갖춰졌다. 종료는 정확히 역순(2 → 1 → 0).',
        dataState: {
          pods: [
            { idx: 0, status: 'running',  pvc: 'data-app-0', dns: 'app-0.svc' },
            { idx: 1, status: 'running',  pvc: 'data-app-1', dns: 'app-1.svc' },
            { idx: 2, status: 'running',  pvc: 'data-app-2', dns: 'app-2.svc' },
          ],
          deployment: ['app-7d9f-aa1', 'app-7d9f-bb2', 'app-7d9f-cc3'],
          highlight: 'pod2',
        },
        code: {
          lang: 'bash',
          filename: 'kubectl-describe.sh',
          lines: [
            '# pod-1 Ready 확인 후에야 pod-2 시작 — 3개 모두 완성',
            '$ kubectl get pods -l app=app',
            '',
            'NAME    READY   STATUS    AGE',
            'app-0   1/1     Running   45s',
            'app-1   1/1     Running   25s',
            'app-2   1/1     Running   8s    ← 마지막 합류',
            '',
            '$ kubectl get pvc',
            'NAME          STATUS   CAPACITY   AGE',
            'data-app-0    Bound    10Gi       45s',
            'data-app-1    Bound    10Gi       25s',
            'data-app-2    Bound    10Gi       8s',
            '',
            '# StatefulSet 상태 — 3/3',
            '$ kubectl get sts app',
            'NAME   READY   AGE',
            'app    3/3     50s',
            '',
            '# 종료 시에는 정확히 역순 (2 → 1 → 0)',
            '$ kubectl scale sts/app --replicas=0',
            'app-2   Terminating',
            'app-1   Terminating   ← app-2 완전 종료 후에야',
            'app-0   Terminating   ← 마지막',
            '',
            '# 안정적 ID로 다른 Pod가 참조 가능',
            '#   app-0.svc (primary)',
            '#   app-1.svc, app-2.svc (replica)',
          ],
          highlight: [5, 6, 7, 17, 18, 21, 22, 23, 24],
        },
      },
      {
        title: 'Step 5. pod-1 죽음 — 같은 식별자로 복구 + PVC 그대로 부착',
        desc: 'app-1이 노드 장애로 죽어도 컨트롤러가 같은 이름(app-1)으로 다시 만든다. 핵심은 data-app-1 PVC가 그대로 남아 새 Pod에 다시 마운트 — 데이터 손실 없음. Deployment는 새 랜덤 이름이라 클러스터링이 깨졌을 것.',
        dataState: {
          pods: [
            { idx: 0, status: 'running',     pvc: 'data-app-0', dns: 'app-0.svc' },
            { idx: 1, status: 'recovering',  pvc: 'data-app-1', dns: 'app-1.svc' },
            { idx: 2, status: 'running',     pvc: 'data-app-2', dns: 'app-2.svc' },
          ],
          deployment: ['app-7d9f-aa1', 'app-7d9f-zx9', 'app-7d9f-cc3'],
          highlight: 'recover',
        },
        showAlert: true,
        code: {
          lang: 'bash',
          filename: 'kubectl-describe.sh',
          lines: [
            '# 시나리오 — app-1이 있던 노드가 다운',
            '$ kubectl get pods -l app=app -w',
            '',
            'NAME    READY   STATUS         AGE',
            'app-0   1/1     Running        10m',
            'app-1   0/1     Terminating    10m   ← 노드 장애',
            'app-2   1/1     Running        10m',
            '',
            '# 컨트롤러가 같은 이름으로 다시 생성',
            'app-1   0/1     Pending             0s    ← 같은 이름 app-1!',
            'app-1   0/1     ContainerCreating   3s',
            'app-1   1/1     Running             8s',
            '',
            '# PVC는 그대로 — 새 Pod에 같은 디스크 다시 마운트',
            '$ kubectl get pvc data-app-1',
            'NAME          STATUS   VOLUME       CAPACITY   AGE',
            'data-app-1    Bound    pv-xxx-002   10Gi       11m   ← 살아있음',
            '',
            '# 데이터 무손실 확인',
            '$ kubectl exec app-1 -- ls /var/lib/postgresql/data',
            'PG_VERSION  base/  global/  pg_wal/   ← 그대로!',
            '',
            '# DNS도 동일 — 다른 Pod가 코드 변경 없이 계속 참조',
            '$ nslookup app-1.app-headless',
            'Address: 10.244.2.7   (IP는 바뀜, 이름은 동일)',
            '',
            '# 비교 — Deployment였다면',
            '#   app-7d9f-bb2 (Terminating) → app-7d9f-zx9 (new)',
            '#   PVC 공유 → 데이터 일관성 깨짐 / 이름 바뀜 → 클러스터링 깨짐',
          ],
          highlight: [10, 11, 12, 17, 21, 24, 25, 28, 29],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // Pod 상태별 스타일 (정적 Tailwind — purge 안전)
    // ─────────────────────────────────────────────────────
    const POD_STYLE = {
      none: {
        fill: '#f1f5f9',           // slate-100
        stroke: '#cbd5e1',          // slate-300
        strokeDash: '4 3',
        textColor: '#94a3b8',       // slate-400
        label: '미생성',
        emoji: '○',
      },
      creating: {
        fill: '#fef3c7',           // amber-100
        stroke: '#f59e0b',          // amber-500
        strokeDash: 'none',
        textColor: '#92400e',
        label: 'Creating',
        emoji: '◐',
      },
      running: {
        fill: '#cffafe',           // cyan-100
        stroke: '#06b6d4',          // cyan-500
        strokeDash: 'none',
        textColor: '#155e75',       // cyan-800
        label: 'Running',
        emoji: '●',
      },
      recovering: {
        fill: '#fef3c7',           // amber-100
        stroke: '#f59e0b',          // amber-500
        strokeDash: '5 3',
        textColor: '#92400e',
        label: '복구 중',
        emoji: '↻',
      },
      terminating: {
        fill: '#fecaca',           // red-200
        stroke: '#ef4444',          // red-500
        strokeDash: '4 3',
        textColor: '#991b1b',
        label: 'Terminating',
        emoji: '✕',
      },
    };

    const PVC_STYLE = {
      none: { fill: '#f8fafc', stroke: '#cbd5e1', strokeDash: '3 3', text: '#94a3b8' },
      bound: { fill: '#ecfeff', stroke: '#0891b2', strokeDash: 'none', text: '#155e75' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — SVG로 Pod 3개 + PVC + Deployment 비교
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ dataState, showAlert }) {
      const { pods, deployment, highlight } = dataState;
      // Pod 가로 배치 좌표 (SVG viewBox 600 x 360)
      const podWidth = 110;
      const podHeight = 70;
      const pvcWidth = 110;
      const pvcHeight = 50;
      const podY = 60;
      const pvcY = 200;
      const xs = [60, 245, 430];

      const runningCount = pods.filter((p) => p.status === 'running').length;
      const totalReplicas = 3;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          {/* 헤더 */}
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🪑 StatefulSet — 지정석 시각화</h2>
            <span className="text-[10px] text-slate-400 font-mono">
              app · {runningCount}/{totalReplicas} Ready
            </span>
          </div>

          {/* SVG 다이어그램 — Pod 3개 + 점선으로 PVC 연결 */}
          <div className="bg-slate-50 rounded-lg border border-slate-200 p-2">
            <svg viewBox="0 0 600 360" className="w-full h-auto">
              {/* 상단 라벨 */}
              <text x="300" y="20" textAnchor="middle" className="fill-slate-700"
                style={{ fontSize: '12px', fontWeight: 700 }}>
                StatefulSet "app" · serviceName: app-headless
              </text>
              <text x="300" y="38" textAnchor="middle" className="fill-slate-500"
                style={{ fontSize: '10px' }}>
                replicas: 3 · 안정적 인덱스 ID + 전용 PVC + 순서 보장
              </text>

              {/* 각 Pod 그룹 */}
              {pods.map((pod) => {
                const x = xs[pod.idx];
                const style = POD_STYLE[pod.status] || POD_STYLE.none;
                const pvcVisible = pod.pvc !== 'none';
                const pvcStyle = pvcVisible ? PVC_STYLE.bound : PVC_STYLE.none;
                // Highlight 효과
                const isHighlighted =
                  (highlight === 'pod0' && pod.idx === 0) ||
                  (highlight === 'pod1' && pod.idx === 1) ||
                  (highlight === 'pod2' && pod.idx === 2) ||
                  (highlight === 'recover' && pod.status === 'recovering');

                return (
                  <g key={pod.idx}>
                    {/* Highlight 외곽 (등장 효과) */}
                    {isHighlighted && (
                      <rect
                        x={x - 8}
                        y={podY - 8}
                        width={podWidth + 16}
                        height={podHeight + 16}
                        rx="14"
                        fill="none"
                        stroke="#06b6d4"
                        strokeWidth="2"
                        strokeDasharray="3 3"
                        opacity="0.6"
                      >
                        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.4s" repeatCount="indefinite" />
                      </rect>
                    )}

                    {/* Pod 박스 */}
                    <rect
                      x={x}
                      y={podY}
                      width={podWidth}
                      height={podHeight}
                      rx="10"
                      fill={style.fill}
                      stroke={style.stroke}
                      strokeWidth="2"
                      strokeDasharray={style.strokeDash === 'none' ? '0' : style.strokeDash}
                    />
                    {/* Pod 이름 */}
                    <text
                      x={x + podWidth / 2}
                      y={podY + 28}
                      textAnchor="middle"
                      style={{ fontSize: '14px', fontWeight: 800, fill: style.textColor, fontFamily: 'monospace' }}
                    >
                      {pod.status === 'none' ? `(app-${pod.idx})` : `app-${pod.idx}`}
                    </text>
                    {/* 상태 라벨 */}
                    <text
                      x={x + podWidth / 2}
                      y={podY + 47}
                      textAnchor="middle"
                      style={{ fontSize: '10px', fill: style.textColor }}
                    >
                      {style.emoji} {style.label}
                    </text>
                    {/* DNS 이름 */}
                    <text
                      x={x + podWidth / 2}
                      y={podY + 62}
                      textAnchor="middle"
                      style={{ fontSize: '9px', fill: '#64748b', fontFamily: 'monospace' }}
                    >
                      {pod.status !== 'none' ? pod.dns : '—'}
                    </text>

                    {/* Pod ↔ PVC 연결선 */}
                    {pvcVisible && (
                      <line
                        x1={x + podWidth / 2}
                        y1={podY + podHeight}
                        x2={x + podWidth / 2}
                        y2={pvcY}
                        stroke="#0891b2"
                        strokeWidth="1.5"
                        strokeDasharray="2 2"
                      />
                    )}

                    {/* PVC 박스 */}
                    <rect
                      x={x}
                      y={pvcY}
                      width={pvcWidth}
                      height={pvcHeight}
                      rx="6"
                      fill={pvcStyle.fill}
                      stroke={pvcStyle.stroke}
                      strokeWidth="1.5"
                      strokeDasharray={pvcStyle.strokeDash === 'none' ? '0' : pvcStyle.strokeDash}
                    />
                    <text
                      x={x + pvcWidth / 2}
                      y={pvcY + 18}
                      textAnchor="middle"
                      style={{ fontSize: '10px', fontWeight: 700, fill: pvcStyle.text, fontFamily: 'monospace' }}
                    >
                      💾 PVC
                    </text>
                    <text
                      x={x + pvcWidth / 2}
                      y={pvcY + 34}
                      textAnchor="middle"
                      style={{ fontSize: '9px', fill: pvcStyle.text, fontFamily: 'monospace' }}
                    >
                      {pvcVisible ? pod.pvc : '—'}
                    </text>
                    <text
                      x={x + pvcWidth / 2}
                      y={pvcY + 46}
                      textAnchor="middle"
                      style={{ fontSize: '8px', fill: pvcStyle.text }}
                    >
                      {pvcVisible ? '10Gi · Bound' : 'unbound'}
                    </text>
                  </g>
                );
              })}

              {/* 순서 화살표 (start/idx 0 → 1 → 2) */}
              <g opacity={runningCount >= 1 ? 1 : 0.3}>
                <text x="180" y="105" textAnchor="middle" style={{ fontSize: '14px', fill: '#06b6d4', fontWeight: 700 }}>
                  →
                </text>
                <text x="180" y="120" textAnchor="middle" style={{ fontSize: '8px', fill: '#64748b' }}>
                  Ready 후
                </text>
              </g>
              <g opacity={runningCount >= 2 ? 1 : 0.3}>
                <text x="365" y="105" textAnchor="middle" style={{ fontSize: '14px', fill: '#06b6d4', fontWeight: 700 }}>
                  →
                </text>
                <text x="365" y="120" textAnchor="middle" style={{ fontSize: '8px', fill: '#64748b' }}>
                  Ready 후
                </text>
              </g>

              {/* 하단 — Deployment 비교 영역 */}
              <line x1="20" y1="270" x2="580" y2="270" stroke="#cbd5e1" strokeWidth="1" strokeDasharray="3 3" />
              <text x="300" y="290" textAnchor="middle" style={{ fontSize: '11px', fontWeight: 700, fill: '#64748b' }}>
                ↓ 비교: Deployment였다면 (랜덤 이름 + 동시 시작 + PVC 공유)
              </text>

              {deployment.map((name, i) => {
                const x = xs[i];
                const dpY = 305;
                const isNone = name === 'none';
                const isChanged = name && name.includes('zx9'); // 복구 시 새 이름 강조
                return (
                  <g key={`dp-${i}`}>
                    <rect
                      x={x}
                      y={dpY}
                      width={podWidth}
                      height={45}
                      rx="6"
                      fill={isNone ? '#f8fafc' : (isChanged ? '#fef2f2' : '#f1f5f9')}
                      stroke={isNone ? '#cbd5e1' : (isChanged ? '#ef4444' : '#94a3b8')}
                      strokeWidth="1"
                      strokeDasharray={isNone ? '3 3' : '0'}
                    />
                    <text
                      x={x + podWidth / 2}
                      y={dpY + 18}
                      textAnchor="middle"
                      style={{
                        fontSize: '10px',
                        fontWeight: 700,
                        fill: isNone ? '#94a3b8' : (isChanged ? '#dc2626' : '#475569'),
                        fontFamily: 'monospace',
                      }}
                    >
                      {isNone ? '(미생성)' : name}
                    </text>
                    <text
                      x={x + podWidth / 2}
                      y={dpY + 34}
                      textAnchor="middle"
                      style={{ fontSize: '8px', fill: isChanged ? '#dc2626' : '#94a3b8' }}
                    >
                      {isNone ? '—' : (isChanged ? '⚠ 이름 바뀜!' : '랜덤 hash')}
                    </text>
                  </g>
                );
              })}
            </svg>
          </div>

          {/* 카운트 요약 */}
          <div className="flex items-center justify-between mt-3 pt-3 border-t border-slate-100">
            <div className="text-xs text-slate-600 font-mono">
              <span className="px-1.5 py-0.5 rounded bg-cyan-100 text-cyan-700 font-bold">
                Pods Running {runningCount}
              </span>
              <span className="ml-2 px-1.5 py-0.5 rounded bg-cyan-50 text-cyan-700">
                PVC Bound {pods.filter((p) => p.pvc !== 'none').length}
              </span>
            </div>
            <div className="text-[10px] text-slate-500">
              순서 보장: 0 → 1 → 2 / 종료: 2 → 1 → 0
            </div>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-slate-300"></span>미생성
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-cyan-400"></span>Running
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-amber-400"></span>복구 중
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2.5 h-0.5 bg-cyan-600"></span>Pod ↔ PVC 부착
            </span>
          </div>

          {/* 알람 박스 (Step 5 — 복구 시) */}
          {showAlert && (
            <div className="mt-4 p-3 rounded-lg bg-cyan-50 border-2 border-cyan-400">
              <div className="flex items-center gap-2 text-cyan-900 font-bold text-sm">
                <span className="text-lg">♻️</span>
                <span>app-1 동일 식별자로 복구 — PVC + DNS 그대로</span>
              </div>
              <div className="text-[11px] text-cyan-700 mt-1">
                Deployment였다면 이름이 바뀌어 다른 Pod의 참조가 깨졌을 것 (data lock 충돌, 클러스터링 실패)
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js (yaml/bash)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code (innerHTML 추출) */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-cyan-500/15 border-l-2 border-cyan-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 컨트롤 4 버튼 + 키보드 + 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 워크로드 컨트롤러 &gt; Chapter 2. 상태 있는 워크로드</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">StatefulSet</h1>
                  <p className="text-sm text-slate-500 mt-0.5">지정석 — 안정적 ID(pod-0/1/2) + 전용 PVC + 순서 보장 시작·역순 종료</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                dataState={step.dataState}
                showAlert={step.showAlert}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-cyan-50 border-2 border-cyan-300 rounded-xl p-3 text-sm text-cyan-900">
                💡 다음(II-2-2)에서는 <strong>DaemonSet / Job / CronJob</strong> — 노드별 1개(로그수집) / 1회성(마이그레이션) / 주기(백업) 워크로드
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-cyan-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-cyan-600 text-white hover:bg-cyan-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-1-2.html" className="text-slate-500 hover:text-slate-700">&larr; II-1-2 Deployment</a>
              <a href="./II-2-2.html" className="text-cyan-700 hover:text-cyan-900 font-medium">II-2-2 DaemonSet / Job / CronJob &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
