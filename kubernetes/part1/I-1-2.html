<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — I-1-2. Pod와 Container의 관계</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    I-1-2. Pod와 Container의 관계 — Pod = 컨테이너 그룹
    학습 목표: K8s가 컨테이너를 직접 다루지 않고 Pod라는 한 겹을 두는 이유. sidecar / init container / shared volume / network namespace.
    핵심 비유: 도시락통(Pod) 안의 반찬(Container) — 같이 다니고, 같이 죽고, 같은 도시락(IP/Volume)을 공유한다.
    패턴: fastapi v1 — 좌(SVG Pod 다이어그램) / 우(VSCode CodeViewer)
    색상: cyan
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 — Pod 구조 시뮬레이션
    //   containers : 메인 컨테이너 배열 [{name, image, color}]
    //   initContainers : init 컨테이너 배열 (먼저 실행 후 종료)
    //   showSharedVolume : 주황 라인으로 볼륨 공유 표시
    //   showNetwork : 점선으로 같은 network namespace + localhost 표시
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Pod 안 컨테이너 1개 — 가장 흔한 형태',
        desc: 'K8s는 컨테이너를 직접 스케줄하지 않고 Pod라는 한 겹을 둔다. 보통 Pod 1개 = Container 1개. Pod에 IP가 부여되고, Pod 단위로 스케줄/재시작/롤링업데이트 된다. 도시락통(Pod) 안에 반찬(app) 1개.',
        containers: [
          { name: 'app', image: 'myapp:v1', color: 'cyan', emoji: '🟢' },
        ],
        initContainers: [],
        showSharedVolume: false,
        showNetwork: false,
        code: {
          lang: 'yaml',
          filename: 'pod.yaml',
          lines: [
            '# 가장 단순한 Pod — 컨테이너 1개만',
            'apiVersion: v1',
            'kind: Pod',
            'metadata:',
            '  name: web',
            '  labels:',
            '    app: web',
            'spec:',
            '  containers:',
            '    - name: app',
            '      image: myapp:v1',
            '      ports:',
            '        - containerPort: 80',
            '      resources:',
            '        requests: { cpu: "100m", memory: "128Mi" }',
            '        limits:   { cpu: "500m", memory: "512Mi" }',
            '',
            '# 적용',
            '#   kubectl apply -f pod.yaml',
            '#   kubectl get pod web',
            '#   NAME   READY   STATUS    RESTARTS   AGE',
            '#   web    1/1     Running   0          5s',
            '',
            '# 도시락통(Pod) 안에 반찬(app) 1개 — 가장 흔한 형태',
          ],
          highlight: [9, 10, 11],
        },
      },
      {
        title: 'Step 2. Sidecar 추가 — Pod 안 컨테이너 2개',
        desc: '메인 컨테이너 옆에 보조 컨테이너(sidecar)를 함께 묶는다. 예: app + log-shipper(로그 수집), app + envoy(프록시). 항상 같이 떠야 하고 같이 죽어야 하는 짝을 한 Pod에 묶는다 — 별도 Service 없이 협력 가능.',
        containers: [
          { name: 'app', image: 'myapp:v1', color: 'cyan', emoji: '🟢' },
          { name: 'log-shipper', image: 'fluentd:latest', color: 'amber', emoji: '📋' },
        ],
        initContainers: [],
        showSharedVolume: false,
        showNetwork: false,
        code: {
          lang: 'yaml',
          filename: 'pod-sidecar.yaml',
          lines: [
            '# Sidecar 패턴 — 메인 + 보조 컨테이너 한 Pod',
            'apiVersion: v1',
            'kind: Pod',
            'metadata:',
            '  name: web-with-logger',
            'spec:',
            '  containers:',
            '    - name: app                     # 메인',
            '      image: myapp:v1',
            '      ports:',
            '        - containerPort: 80',
            '',
            '    - name: log-shipper             # sidecar',
            '      image: fluentd:latest',
            '      args: ["-c", "/etc/fluent.conf"]',
            '',
            '# Sidecar 활용 사례',
            '#   - Logging: fluentd / filebeat (로그 수집)',
            '#   - Proxy: envoy / linkerd (서비스 메시)',
            '#   - Sync: git-sync (설정 파일 갱신)',
            '#   - Adapter: 메트릭 포맷 변환',
            '',
            '# 메인 컨테이너 죽으면 sidecar도 같이 종료',
            '# → 라이프사이클이 묶이는 짝만 Pod로 합칠 것',
          ],
          highlight: [13, 14, 15],
        },
      },
      {
        title: 'Step 3. Init Container 추가 — 부팅 전 1회 실행',
        desc: 'init container는 메인 컨테이너 시작 전에 순서대로 실행되고 종료된다. DB 마이그레이션, 설정 다운로드, 외부 의존성 대기 같은 "부팅 준비" 작업에 쓴다. 모든 init이 성공해야 메인 컨테이너가 뜬다.',
        containers: [
          { name: 'app', image: 'myapp:v1', color: 'cyan', emoji: '🟢' },
          { name: 'log-shipper', image: 'fluentd:latest', color: 'amber', emoji: '📋' },
        ],
        initContainers: [
          { name: 'wait-db', image: 'busybox', color: 'slate', emoji: '⏳' },
        ],
        showSharedVolume: false,
        showNetwork: false,
        code: {
          lang: 'yaml',
          filename: 'pod-init.yaml',
          lines: [
            '# Init Container — 메인 컨테이너 시작 전 1회 실행',
            'apiVersion: v1',
            'kind: Pod',
            'metadata:',
            '  name: web-with-init',
            'spec:',
            '  initContainers:                   # 순서대로 실행 + 종료',
            '    - name: wait-db',
            '      image: busybox:1.36',
            '      command:',
            '        - sh',
            '        - -c',
            '        - "until nc -z db 5432; do sleep 2; done"',
            '',
            '  containers:                       # init 끝나야 시작',
            '    - name: app',
            '      image: myapp:v1',
            '    - name: log-shipper',
            '      image: fluentd:latest',
            '',
            '# kubectl describe pod web-with-init',
            '#   Init Containers:',
            '#     wait-db:  State: Terminated  Exit Code: 0',
            '#   Containers:',
            '#     app:          State: Running',
            '#     log-shipper:  State: Running',
            '',
            '# 활용: DB 마이그레이션 / 설정 fetch / 의존성 대기',
          ],
          highlight: [7, 8, 9, 10, 11, 12, 13],
        },
      },
      {
        title: 'Step 4. Shared Volume — 컨테이너끼리 디스크 공유',
        desc: '같은 Pod 안 컨테이너는 emptyDir 같은 볼륨을 함께 마운트할 수 있다. app이 /var/log/app/access.log를 쓰면 log-shipper가 같은 경로를 읽어 외부로 전송. 별도 네트워크 호출 없이 파일 시스템으로 데이터 전달.',
        containers: [
          { name: 'app', image: 'myapp:v1', color: 'cyan', emoji: '🟢' },
          { name: 'log-shipper', image: 'fluentd:latest', color: 'amber', emoji: '📋' },
        ],
        initContainers: [
          { name: 'wait-db', image: 'busybox', color: 'slate', emoji: '⏳' },
        ],
        showSharedVolume: true,
        showNetwork: false,
        code: {
          lang: 'yaml',
          filename: 'pod-volume.yaml',
          lines: [
            '# Shared Volume — emptyDir로 컨테이너끼리 공유',
            'apiVersion: v1',
            'kind: Pod',
            'metadata:',
            '  name: web-shared-vol',
            'spec:',
            '  volumes:',
            '    - name: logs',
            '      emptyDir: {}                  # Pod 생명주기 동안 존재',
            '',
            '  containers:',
            '    - name: app',
            '      image: myapp:v1',
            '      volumeMounts:',
            '        - name: logs',
            '          mountPath: /var/log/app   # app이 여기에 로그 write',
            '',
            '    - name: log-shipper',
            '      image: fluentd:latest',
            '      volumeMounts:',
            '        - name: logs',
            '          mountPath: /var/log/app   # log-shipper는 read',
            '',
            '# 동작',
            '#   app           → /var/log/app/access.log 기록',
            '#   log-shipper   → 같은 파일 tail 후 Elasticsearch 전송',
            '#   네트워크 호출 0회 — 파일 시스템 한 번이면 됨',
            '',
            '# emptyDir 외 옵션: hostPath / configMap / PVC',
          ],
          highlight: [7, 8, 9, 14, 15, 16, 20, 21, 22],
        },
      },
      {
        title: 'Step 5. Same Network Namespace — localhost 통신',
        desc: 'Pod 안 모든 컨테이너는 같은 네트워크 네임스페이스를 공유한다. 같은 IP, 같은 포트 공간 — 옆 컨테이너는 localhost로 직접 호출 가능. Service / DNS 거치지 않는다. 단, 같은 포트는 못 쓴다 (포트 충돌 주의).',
        containers: [
          { name: 'app', image: 'myapp:v1', color: 'cyan', emoji: '🟢' },
          { name: 'log-shipper', image: 'fluentd:latest', color: 'amber', emoji: '📋' },
        ],
        initContainers: [
          { name: 'wait-db', image: 'busybox', color: 'slate', emoji: '⏳' },
        ],
        showSharedVolume: true,
        showNetwork: true,
        code: {
          lang: 'shell',
          filename: 'kubectl-describe.sh',
          lines: [
            '# Pod 안 컨테이너는 같은 IP / 같은 localhost',
            '$ kubectl get pod web-shared-vol -o wide',
            'NAME             READY   STATUS    IP           NODE',
            'web-shared-vol   2/2     Running   10.244.1.7   worker-1',
            '',
            '# app 컨테이너 안에서',
            '$ kubectl exec web-shared-vol -c app -- sh',
            '/ # curl http://localhost:24224',
            '{"status":"fluentd ok"}        # 같은 Pod의 log-shipper!',
            '',
            '# log-shipper 컨테이너 안에서',
            '$ kubectl exec web-shared-vol -c log-shipper -- sh',
            '/ # curl http://localhost:80',
            '<html>...myapp...</html>      # 같은 Pod의 app!',
            '',
            '# 그러나 다른 Pod는 localhost 안 통함',
            '/ # curl http://localhost:80   # (다른 Pod에서)',
            'curl: (7) Failed to connect',
            '#   → 다른 Pod는 Service 또는 Pod IP(10.244.x.x) 사용',
            '',
            '# 정리: Pod = 함께 떠야 하는 컨테이너 + 자원 공유 단위',
            '#   - 같은 IP (network namespace)',
            '#   - 같은 볼륨 (mount)',
            '#   - 같은 라이프사이클 (스케줄/재시작)',
          ],
          highlight: [7, 8, 9, 12, 13, 14],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // SVG Pod 다이어그램 — 단계별로 컨테이너 추가/공유 시각화
    // ─────────────────────────────────────────────────────
    const COLOR_MAP = {
      cyan:  { fill: '#cffafe', stroke: '#0891b2', text: '#155e75' },
      amber: { fill: '#fef3c7', stroke: '#d97706', text: '#92400e' },
      slate: { fill: '#e2e8f0', stroke: '#64748b', text: '#334155' },
    };

    function PodDiagram({ containers, initContainers, showSharedVolume, showNetwork }) {
      // 좌측: init containers (있을 때) — 메인 위쪽 박스 외부
      // 우측 안쪽: containers (1~2개)
      // shared volume: containers 아래 주황 라인 + 텍스트
      // network: Pod 박스 점선 테두리 + localhost 표시

      const podBoxX = 40;
      const podBoxY = 70;
      const podBoxW = 380;
      const podBoxH = 240;

      // 컨테이너 배치 — 1개면 가운데, 2개면 좌우
      const containerBoxes = containers.map((c, i) => {
        const boxW = 140;
        const boxH = 80;
        const startX = containers.length === 1
          ? podBoxX + podBoxW / 2 - boxW / 2
          : podBoxX + 30 + i * (boxW + 30);
        const y = podBoxY + 60;
        return { ...c, x: startX, y, w: boxW, h: boxH };
      });

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📦 Pod 구조 — SVG 시각화</h2>
            <span className="text-[10px] text-slate-400 font-mono">live diagram</span>
          </div>

          <svg viewBox="0 0 460 420" className="w-full h-auto" role="img" aria-label="Pod 다이어그램">
            {/* 외부 노드 라벨 */}
            <text x="230" y="20" textAnchor="middle" fontSize="11" fontWeight="bold" fill="#64748b">
              Node (worker-1)
            </text>
            <rect x="10" y="30" width="440" height="380" rx="8" fill="#f8fafc" stroke="#cbd5e1" strokeWidth="1" strokeDasharray="3 3" />

            {/* Init container — Pod 박스 외부 좌측 위 (있으면) */}
            {initContainers.length > 0 && (
              <g>
                <rect
                  x="20"
                  y="40"
                  width="100"
                  height="30"
                  rx="6"
                  fill={COLOR_MAP.slate.fill}
                  stroke={COLOR_MAP.slate.stroke}
                  strokeWidth="2"
                />
                <text x="70" y="58" textAnchor="middle" fontSize="10" fontWeight="bold" fill={COLOR_MAP.slate.text}>
                  ⏳ {initContainers[0].name}
                </text>
                <text x="70" y="80" textAnchor="middle" fontSize="9" fill="#64748b">
                  init (1회 실행 후 종료)
                </text>
                {/* 화살표 init → pod */}
                <line x1="120" y1="55" x2="160" y2="55" stroke="#64748b" strokeWidth="1.5" markerEnd="url(#arrow)" />
              </g>
            )}

            {/* 화살표 마커 */}
            <defs>
              <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
              </marker>
            </defs>

            {/* Pod 박스 */}
            <rect
              x={podBoxX}
              y={podBoxY}
              width={podBoxW}
              height={podBoxH}
              rx="14"
              fill="#ecfeff"
              stroke="#0891b2"
              strokeWidth={showNetwork ? "2.5" : "2"}
              strokeDasharray={showNetwork ? "6 3" : "0"}
            />
            <text x={podBoxX + 12} y={podBoxY + 22} fontSize="12" fontWeight="bold" fill="#155e75">
              📦 Pod (web)
            </text>
            <text x={podBoxX + podBoxW - 12} y={podBoxY + 22} fontSize="10" textAnchor="end" fill="#0891b2" fontFamily="monospace">
              IP: 10.244.1.7
            </text>

            {/* 컨테이너들 */}
            {containerBoxes.map((c, i) => {
              const color = COLOR_MAP[c.color];
              return (
                <g key={i}>
                  <rect
                    x={c.x}
                    y={c.y}
                    width={c.w}
                    height={c.h}
                    rx="8"
                    fill={color.fill}
                    stroke={color.stroke}
                    strokeWidth="2"
                  />
                  <text x={c.x + c.w / 2} y={c.y + 28} textAnchor="middle" fontSize="22">
                    {c.emoji}
                  </text>
                  <text x={c.x + c.w / 2} y={c.y + 52} textAnchor="middle" fontSize="11" fontWeight="bold" fill={color.text}>
                    {c.name}
                  </text>
                  <text x={c.x + c.w / 2} y={c.y + 68} textAnchor="middle" fontSize="9" fill="#64748b" fontFamily="monospace">
                    {c.image}
                  </text>
                </g>
              );
            })}

            {/* Network namespace — localhost 양방향 화살표 (Step 5) */}
            {showNetwork && containerBoxes.length === 2 && (
              <g>
                <line
                  x1={containerBoxes[0].x + containerBoxes[0].w}
                  y1={containerBoxes[0].y + containerBoxes[0].h / 2}
                  x2={containerBoxes[1].x}
                  y2={containerBoxes[1].y + containerBoxes[1].h / 2}
                  stroke="#0891b2"
                  strokeWidth="2"
                  strokeDasharray="4 2"
                  markerEnd="url(#arrow-cyan)"
                  markerStart="url(#arrow-cyan-rev)"
                />
                <defs>
                  <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#0891b2" />
                  </marker>
                  <marker id="arrow-cyan-rev" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                    <path d="M 10 0 L 0 5 L 10 10 z" fill="#0891b2" />
                  </marker>
                </defs>
                <text
                  x={(containerBoxes[0].x + containerBoxes[0].w + containerBoxes[1].x) / 2}
                  y={containerBoxes[0].y + containerBoxes[0].h / 2 - 6}
                  textAnchor="middle"
                  fontSize="9"
                  fill="#0891b2"
                  fontWeight="bold"
                  fontFamily="monospace"
                >
                  localhost
                </text>
              </g>
            )}

            {/* Shared volume — 주황 라인 박스 (Step 4+) */}
            {showSharedVolume && (
              <g>
                <rect
                  x={podBoxX + 30}
                  y={podBoxY + podBoxH - 60}
                  width={podBoxW - 60}
                  height="36"
                  rx="6"
                  fill="#fff7ed"
                  stroke="#ea580c"
                  strokeWidth="2"
                />
                <text
                  x={podBoxX + podBoxW / 2}
                  y={podBoxY + podBoxH - 38}
                  textAnchor="middle"
                  fontSize="11"
                  fontWeight="bold"
                  fill="#9a3412"
                  fontFamily="monospace"
                >
                  📂 emptyDir: /var/log/app (공유 볼륨)
                </text>
                {/* 컨테이너 → 볼륨 라인 */}
                {containerBoxes.map((c, i) => (
                  <line
                    key={`vol-${i}`}
                    x1={c.x + c.w / 2}
                    y1={c.y + c.h}
                    x2={c.x + c.w / 2}
                    y2={podBoxY + podBoxH - 60}
                    stroke="#ea580c"
                    strokeWidth="1.5"
                    strokeDasharray="3 2"
                  />
                ))}
              </g>
            )}

            {/* Pod 박스 푸터 — 라이프사이클 */}
            <text
              x={podBoxX + podBoxW / 2}
              y={podBoxY + podBoxH - 8}
              textAnchor="middle"
              fontSize="9"
              fill="#0891b2"
              fontStyle="italic"
            >
              같이 스케줄, 같이 재시작
            </text>
          </svg>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded border-2 border-cyan-600 bg-cyan-100"></span>Pod (외곽)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-cyan-500"></span>메인 컨테이너
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-amber-500"></span>Sidecar
            </span>
            {initContainers.length > 0 && (
              <span className="flex items-center gap-1">
                <span className="w-2.5 h-2.5 rounded bg-slate-400"></span>Init
              </span>
            )}
            {showSharedVolume && (
              <span className="flex items-center gap-1">
                <span className="w-2.5 h-0.5 bg-orange-500"></span>공유 볼륨
              </span>
            )}
            {showNetwork && (
              <span className="flex items-center gap-1">
                <span className="w-2.5 h-0.5 bg-cyan-600" style={{ borderTop: '1px dashed #0891b2' }}></span>localhost
              </span>
            )}
          </div>

          {/* 카운트 요약 */}
          <div className="mt-3 grid grid-cols-3 gap-2 text-[10px] font-mono">
            <div className="rounded bg-cyan-50 border border-cyan-200 px-2 py-1 text-center">
              <span className="text-cyan-700 font-bold">{containers.length}</span>
              <span className="text-slate-500"> container</span>
            </div>
            <div className="rounded bg-slate-50 border border-slate-200 px-2 py-1 text-center">
              <span className="text-slate-700 font-bold">{initContainers.length}</span>
              <span className="text-slate-500"> init</span>
            </div>
            <div className="rounded bg-orange-50 border border-orange-200 px-2 py-1 text-center">
              <span className="text-orange-700 font-bold">{showSharedVolume ? 1 : 0}</span>
              <span className="text-slate-500"> volume</span>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-cyan-500/15 border-l-2 border-cyan-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-gradient-to-br from-cyan-50 to-cyan-100 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-white px-2 py-1 rounded border border-cyan-200 text-xs">curriculum I-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. Kubernetes 기초 &gt; Chapter 1. Pod</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Pod와 Container의 관계</h1>
                  <p className="text-sm text-slate-500 mt-0.5">도시락 비유 — Pod = 컨테이너 그룹 (sidecar / init / shared volume / localhost)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <PodDiagram
                containers={step.containers}
                initContainers={step.initContainers}
                showSharedVolume={step.showSharedVolume}
                showNetwork={step.showNetwork}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-cyan-50 border-2 border-cyan-300 rounded-xl p-3 text-sm text-cyan-900">
                💡 다음(I-2-1)에서는 Pod 위 단계인 <strong>Cluster / Node / Control Plane</strong> 구조를 본다 — 여러 Pod가 어디서 어떻게 도는지
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-cyan-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-cyan-600 text-white hover:bg-cyan-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; I-1-1 컨테이너에서 Pod로</a>
              <a href="./I-2-1.html" className="text-cyan-700 hover:text-cyan-900 font-medium">I-2-1 Cluster / Node / Control Plane &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
