<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — Pod와 Container의 관계</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    I-1-2. Pod와 Container의 관계
    학습 목표: K8s가 컨테이너를 직접 다루지 않고 Pod라는 한 겹을 두는 이유를 안다.
    핵심 비유: "도시락 통과 반찬" — Pod=도시락통, Container=반찬. 같은 통 안 반찬은 같은 도시락에서 같이 다닌다.
    구조: 4단계 (단독 컨테이너 / Pod 안 1개 / Pod 안 여러 개(sidecar) / 공유 자원)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 단독 컨테이너 — Docker만 있을 때',
        desc: 'docker run으로 컨테이너 1개를 띄우면 그 컨테이너만의 IP, 디스크, 프로세스 공간을 가진다. 옆 컨테이너와는 완전히 격리. 두 컨테이너가 협력하려면 네트워크나 외부 볼륨을 거쳐야 한다.',
        block: {
          kind: 'shell',
          code: `# Docker
docker run -d nginx:latest
docker run -d busybox:latest sleep 3600

# 두 컨테이너는 별도 IP, 별도 디스크
# 협력하려면 docker network 따로 묶어야 함
# K8s는 이걸 한 단계 위에서 묶어준다 → Pod`
        },
        focus: 'container-only',
        diagram: 'container-only',
      },
      {
        title: 'Step 2. Pod 안에 컨테이너 1개 — 가장 흔한 형태',
        desc: 'K8s가 컨테이너를 직접 다루지 않고 Pod라는 한 겹을 둔다. Pod = "함께 떠야 하는 컨테이너 묶음". 보통은 Pod 1개 = Container 1개. Pod에 IP가 부여되고, Pod 단위로 스케줄/재시작된다.',
        block: {
          kind: 'yaml',
          code: `apiVersion: v1
kind: Pod
metadata:
  name: web
spec:
  containers:
    - name: app
      image: myapp:v1
      ports:
        - containerPort: 80

# 도시락통(Pod) 안에 반찬 1개(app)`
        },
        focus: 'pod-one',
        diagram: 'pod-one',
      },
      {
        title: 'Step 3. Pod 안에 컨테이너 여러 개 — Sidecar 패턴',
        desc: '한 Pod 안에 메인 컨테이너 + 보조 컨테이너(sidecar)를 넣는다. 예: 앱 + 로그 수집기 / 앱 + 프록시. 항상 같이 떠야 하고 같이 죽어야 하는 짝을 묶는 용도. 도시락통 안에 밥과 반찬이 함께 든 형태.',
        block: {
          kind: 'yaml',
          code: `apiVersion: v1
kind: Pod
metadata:
  name: web-with-logger
spec:
  containers:
    - name: app                 # 메인
      image: myapp:v1
    - name: log-shipper         # sidecar (로그 수집)
      image: fluentd:latest
      volumeMounts:
        - name: logs
          mountPath: /var/log/app
  volumes:
    - name: logs
      emptyDir: {}              # 두 컨테이너 공유 디렉토리`
        },
        focus: 'pod-many',
        diagram: 'pod-many',
      },
      {
        title: 'Step 4. Pod 안 컨테이너는 "자원 공유" — IP/볼륨/localhost',
        desc: '한 Pod 안 컨테이너들은 같은 IP를 공유한다 (localhost로 통신 가능). 같은 볼륨을 마운트할 수 있다. 이게 Pod의 핵심 가치 — Container 단독으로는 못하는 협력을 Pod가 가능하게 한다.',
        block: {
          kind: 'shell',
          code: `# Pod 안 app 컨테이너에서
$ curl http://localhost:24224
# → 같은 Pod의 fluentd(log-shipper)에 직접 접근!
#   별도 Service 안 거침. localhost로 끝.

# 디스크도 공유
$ ls /var/log/app/
access.log    error.log
# log-shipper도 같은 파일 읽음 (volumeMounts 같음)

# 그러나 별도 Pod의 컨테이너에는 localhost 안 통함
# → Service나 Pod IP를 거쳐야 함`
        },
        focus: 'shared',
        diagram: 'shared',
      },
    ];

    const KIND_STYLE = {
      shell: { label: 'Bash', textColor: '#86efac' },
      yaml:  { label: 'YAML', textColor: '#fde68a' },
    };

    /**
     * Pod 다이어그램 — focus에 따라 단계별 시각 분기
     */
    function PodDiagram({ focus }) {
      // 정적 색상 매핑
      const POD_BORDER = focus === 'container-only' ? 'border-dashed border-slate-300' : 'border-solid border-sky-400';
      const containerCount = focus === 'pod-many' || focus === 'shared' ? 2 : 1;
      const showPodWrapper = focus !== 'container-only';
      const showSharedIP = focus === 'shared';
      const showSharedVolume = focus === 'pod-many' || focus === 'shared';

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">📦 Pod 구조</div>
          <div className="flex items-center justify-center min-h-[180px]">
            {showPodWrapper ? (
              <div className={`relative bg-sky-50 border-2 ${POD_BORDER} rounded-2xl p-6 transition-all`}>
                <div className="absolute -top-3 left-3 bg-white px-2 text-[10px] font-bold text-sky-700 rounded">
                  📦 Pod (web)
                </div>
                <div className="flex items-center gap-3">
                  <div className="bg-white border-2 border-sky-300 rounded-lg p-3 text-center min-w-[100px]">
                    <div className="text-2xl">🟢</div>
                    <div className="text-xs font-bold text-slate-700 mt-1">app</div>
                    <div className="text-[10px] text-slate-500">myapp:v1</div>
                  </div>
                  {containerCount === 2 && (
                    <div className="bg-white border-2 border-amber-300 rounded-lg p-3 text-center min-w-[100px]">
                      <div className="text-2xl">📋</div>
                      <div className="text-xs font-bold text-slate-700 mt-1">log-shipper</div>
                      <div className="text-[10px] text-slate-500">sidecar</div>
                    </div>
                  )}
                </div>
                {showSharedIP && (
                  <div className="mt-3 text-center text-[10px] text-emerald-700 font-mono">
                    공유: 같은 IP (localhost) ↔
                  </div>
                )}
                {showSharedVolume && (
                  <div className="mt-1 text-center text-[10px] text-violet-700 font-mono">
                    공유: 볼륨 /var/log/app
                  </div>
                )}
              </div>
            ) : (
              <div className="flex items-center gap-6">
                <div className="bg-white border-2 border-slate-300 rounded-lg p-3 text-center min-w-[100px]">
                  <div className="text-2xl">🟢</div>
                  <div className="text-xs font-bold text-slate-700 mt-1">nginx</div>
                  <div className="text-[10px] text-slate-500">단독</div>
                </div>
                <div className="bg-white border-2 border-slate-300 rounded-lg p-3 text-center min-w-[100px]">
                  <div className="text-2xl">🟦</div>
                  <div className="text-xs font-bold text-slate-700 mt-1">busybox</div>
                  <div className="text-[10px] text-slate-500">단독</div>
                </div>
              </div>
            )}
          </div>
          <p className="text-center text-[11px] text-slate-500 mt-3">
            {focus === 'container-only' && '단독 컨테이너 — 별도 IP / 별도 디스크'}
            {focus === 'pod-one' && 'Pod 1개 = Container 1개 (가장 흔한 형태)'}
            {focus === 'pod-many' && 'Pod 1개 = Container N개 (sidecar 패턴)'}
            {focus === 'shared' && 'Pod 안 컨테이너는 IP / 볼륨 공유'}
          </p>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Pod와 Container의 관계</h1>
                <p className="text-sm text-slate-500 mt-1">도시락 비유 — Pod가 컨테이너를 묶는 한 겹</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <PodDiagram focus={step.diagram} />

            {/* 코드 블록 */}
            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'shared' && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 mb-6 text-xs text-sky-900">
                💡 다음(I-2-1)에서는 Pod 위 단계인 Cluster / Node / Control Plane 구조를 본다 — 여러 Pod가 어디서 도는지
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
