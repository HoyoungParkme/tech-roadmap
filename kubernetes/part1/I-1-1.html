<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — Kubernetes란 무엇인가</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    I-1-1. Kubernetes란 무엇인가
    학습 목표: 컨테이너가 수십~수백 개일 때 사람이 손으로 못하는 일을 K8s가 어떻게 자동화하는지 이해한다.
    핵심 비유: "택배 물류 센터" — 컨테이너=택배상자, K8s=자동 분류/재배치/스케일하는 물류 시스템
    구조: 4단계 (손수 vs 오케스트레이션 / 선언적 설정 / self-healing / 자동 스케일)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 4단계 STEPS
    const STEPS = [
      {
        title: 'Step 1. 손수 운영의 한계',
        desc: '컨테이너가 1~2개라면 docker run 하나로 충분하다. 그러나 10개, 100개로 늘면 사람이 어떤 컨테이너가 어디서 도는지, 죽었는지 살았는지 일일이 추적하지 못한다. 택배 1박스는 들 수 있지만 1만 박스는 사람 손으로 못 다룬다.',
        block: {
          kind: 'shell',
          code: `# 컨테이너 5개를 손으로 띄우려면
docker run -d --name app-1 myapp:v1
docker run -d --name app-2 myapp:v1
docker run -d --name app-3 myapp:v1
docker run -d --name app-4 myapp:v1
docker run -d --name app-5 myapp:v1

# 그런데... app-3이 죽었다? 누가 알아채나?
# 트래픽 2배가 됐다? 어떻게 5개 더 늘리나?
# 새 버전 배포? 5개 다 stop → run?`
        },
        focus: 'manual',
      },
      {
        title: 'Step 2. 선언적 설정 — "10개 떨어뜨려라"',
        desc: 'K8s는 "현재 어떻게 떠있는지"를 묻지 않고 "이렇게 있어야 한다"를 선언한다. replicas: 10이라고 적으면 K8s가 알아서 10개를 유지. 물류 센터에 "이 상품은 항상 10개 재고 유지"라고 선언하는 것과 같다.',
        block: {
          kind: 'yaml',
          code: `# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 10           # 항상 10개 유지!
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp
          image: myapp:v1

# kubectl apply -f deployment.yaml
# K8s: "10개 떨어뜨릴게요" → 자동 배치`
        },
        focus: 'declarative',
      },
      {
        title: 'Step 3. Self-Healing — 죽으면 자동 재생성',
        desc: '컨테이너 1개가 갑자기 죽었다? K8s가 즉시 감지하고 새로 띄운다. 사람이 알람 받기도 전에 복구. "10개 유지" 선언이 깨지면 K8s 컨트롤러가 차이를 좁히는 방향으로 행동한다.',
        block: {
          kind: 'shell',
          code: `# 의도적으로 Pod 1개 삭제
kubectl delete pod myapp-7d9f8c5b-xk2mp

# 1초 뒤
kubectl get pods
# myapp-7d9f8c5b-xk2mp   Terminating  (사라지는 중)
# myapp-7d9f8c5b-9q4nv   ContainerCreating  (새로 생성!)

# K8s 컨트롤러: "어? 9개네. 1개 더 떨어뜨려야지"
# → 사람이 알람 보기 전에 복구 완료`
        },
        focus: 'healing',
      },
      {
        title: 'Step 4. 자동 스케일링 — 트래픽 따라 N → 2N',
        desc: 'CPU 사용률이 80%를 넘으면 K8s가 자동으로 Pod 수를 늘린다. 새벽에는 다시 줄임. HorizontalPodAutoscaler가 메트릭을 보고 replicas를 동적으로 조절. 물류 센터가 성수기에 인부를 늘리고 비수기에 줄이는 것과 같다.',
        block: {
          kind: 'yaml',
          code: `# hpa.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: myapp-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: myapp
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80   # CPU 80% 넘으면 증설`
        },
        focus: 'scale',
      },
    ];

    const KIND_STYLE = {
      shell: { label: 'Bash', textColor: '#86efac' },
      yaml:  { label: 'YAML', textColor: '#fde68a' },
    };

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Kubernetes란 무엇인가</h1>
                <p className="text-sm text-slate-500 mt-1">택배 물류 센터 — 수많은 컨테이너를 자동으로 배치/복구/스케일</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* 코드 블록 */}
            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {/* 단계별 진행 표시 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-6">
              <div className="text-xs font-bold text-slate-700 mb-3">📍 K8s 핵심 가치 4가지</div>
              <div className="grid grid-cols-4 gap-2">
                {STEPS.map((s, i) => (
                  <div
                    key={s.focus}
                    className={`rounded-lg p-3 text-center transition-all ${i === currentStep ? 'bg-sky-100 border-2 border-sky-400' : 'bg-slate-50 border border-slate-200'}`}
                  >
                    <div className="text-[10px] font-bold text-slate-500 mb-1">Step {i + 1}</div>
                    <div className="text-xs font-bold text-slate-800">{s.focus}</div>
                  </div>
                ))}
              </div>
            </div>

            {step.focus === 'scale' && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 mb-6 text-xs text-sky-900">
                💡 다음(I-1-2)에서는 K8s가 컨테이너를 직접 다루지 않고 왜 Pod라는 한 겹을 두는지 본다 — 도시락 비유
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
