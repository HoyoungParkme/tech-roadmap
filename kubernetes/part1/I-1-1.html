  <!--

              K8s가 어떻게 자동화하는지 5단계로 이해한다.
    핵심 비유: 택배 물류 센터 — 컨테이너=택배상자, 노드=창고, K8s=자동 분류 시스템
    패턴: fastapi v1 — 좌(LiveDataPane: 노드 3개 SVG + 박스 배치) / 우(VSCode CodeViewer)
    색상: kubernetes cyan
  -->

      {

        nodes: [
          {

              { id: 'app-5', color: 'cyan' },

        ],
        trafficPct: 50,

        code: {

          lines: [
            '# 컨테이너 8개를 손으로 띄우려면',
            'docker run -d --name app-1 myapp:v1',
            'docker run -d --name app-2 myapp:v1',
            'docker run -d --name app-3 myapp:v1',
            'docker run -d --name app-4 myapp:v1',
            'docker run -d --name app-5 myapp:v1',
            'docker run -d --name app-6 myapp:v1',
            'docker run -d --name app-7 myapp:v1',
            'docker run -d --name app-8 myapp:v1',
            '',
            '# 그런데... 답할 수 없는 질문들',

      },
      {
        title: 'Step 3. K8s 자동 분류 — "노드 3개에 알아서 배치"',
        desc: 'replicas: 8 한 줄 선언하면 K8s 스케줄러가 노드 3개에 골고루 분산 배치한다. 어느 노드 CPU가 비었는지, 라벨/리소스 요구사항을 보고 결정. 사람은 "8개 있어야 한다"만 말하고 어디 둘지는 K8s가 정한다 — 물류 센터의 자동 분류 컨베이어.',
        nodes: [
          {
            boxes: [
              { id: 'app-1', color: 'cyan' },
              { id: 'app-2', color: 'cyan' },
              { id: 'app-3', color: 'cyan' },
            ],
            down: false,
          },
          {
            boxes: [
              { id: 'app-4', color: 'cyan' },
              { id: 'app-5', color: 'cyan' },
              { id: 'app-6', color: 'cyan' },
            ],
            down: false,
          },
          {
            boxes: [
              { id: 'app-7', color: 'cyan' },
              { id: 'app-8', color: 'cyan' },
            ],
            down: false,
          },
        ],
        trafficPct: 50,
        showAlert: false,
        alertText: null,
        code: {
          lang: 'yaml',
          filename: 'deployment.yaml',
          lines: [
            '# 선언적 — "8개 있어야 한다"만 말한다',
            'apiVersion: apps/v1',
            'kind: Deployment',
            'metadata:',
            '  name: myapp',
            'spec:',
            '  replicas: 8                # 항상 8개 유지',
            '  selector:',
            '    matchLabels: { app: myapp }',
            '  template:',
            '    metadata:',
            '      labels: { app: myapp }',
            '    spec:',
            '      containers:',
            '        - name: myapp',
            '          image: myapp:v1',
            '          resources:',
            '            requests: { cpu: 100m, memory: 128Mi }',
            '',
            '# kubectl apply -f deployment.yaml',
            '# K8s 스케줄러가 한 일',
            '#   node-1 (CPU 60% 여유) → 3 pods',
            '#   node-2 (CPU 70% 여유) → 3 pods',
            '#   node-3 (CPU 40% 여유) → 2 pods',
            '# → 어디 둘지는 K8s가 결정. 우리는 모른다.',
          ],
          highlight: [7, 17, 18, 22, 23, 24],
        },
      },
      {
        title: 'Step 4. Self-Healing — "노드 1개 다운, Pod 자동 재배치"',
        desc: 'node-2가 갑자기 다운됐다. 그 위 Pod 3개가 사라졌다. K8s 컨트롤러: "선언은 8개인데 5개네." 즉시 살아있는 노드에 3개를 새로 생성. 사람이 알람 받기 전에 복구 끝. 물류 센터 창고 1개가 무너져도 다른 창고로 즉시 이동.',
        nodes: [
          {
            boxes: [
              { id: 'app-1', color: 'cyan' },
              { id: 'app-2', color: 'cyan' },
              { id: 'app-3', color: 'cyan' },
              { id: 'app-9', color: 'green' },
              { id: 'app-10', color: 'green' },
            ],
            down: false,
          },
          {
            boxes: [],
            down: true,
          },
          {
            boxes: [
              { id: 'app-7', color: 'cyan' },
              { id: 'app-8', color: 'cyan' },
              { id: 'app-11', color: 'green' },
            ],
            down: false,
          },
        ],
        trafficPct: 50,
        showAlert: true,
        alertText: '🔁 node-2 down → Pod 3개 자동 재배치 (12초 만에 복구)',
        code: {
          lang: 'bash',
          filename: 'self-heal.sh',
          lines: [
            '# node-2 갑자기 다운 (전원 / 디스크 fail / OOM)',
            '$ kubectl get nodes',
            'NAME      STATUS     AGE',
            'node-1    Ready      30d',
            'node-2    NotReady   30d   ← 다운!',
            'node-3    Ready      30d',
            '',
            '# 5초 뒤 — K8s 컨트롤러 자동 감지',
            '$ kubectl get pods -o wide',
            'NAME            STATUS              NODE',
            'myapp-abc123    Terminating         node-2  (사라지는 중)',
            'myapp-def456    Terminating         node-2',
            'myapp-ghi789    Terminating         node-2',
            'myapp-xx111     ContainerCreating   node-1  (새로 생성!)',
            'myapp-xx222     ContainerCreating   node-1',
            'myapp-xx333     ContainerCreating   node-3',
            '',

            '# K8s: "선언은 8개. 5개네 → 3개 새로 떨어뜨림"',
            '# 사람이 알람 보기 전에 복구 완료.',
          ],
          highlight: [5, 14, 15, 16, 18, 19],
        },
      },
      {
        title: 'Step 5. 자동 스케일 — "트래픽 급증, 8 → 16"',
        desc: 'CPU가 80%를 넘었다. HorizontalPodAutoscaler가 메트릭을 읽고 replicas를 8 → 16으로 자동 증설. 새벽엔 다시 줄임. 성수기에 인부 늘리고 비수기에 줄이는 물류 센터처럼 — 부하에 맞춰 동적으로 스케일.',
        nodes: [
          {
            boxes: [
              { id: 'app-1', color: 'cyan' },
              { id: 'app-2', color: 'cyan' },
              { id: 'app-3', color: 'cyan' },
              { id: 'app-9', color: 'amber' },
              { id: 'app-12', color: 'amber' },
              { id: 'app-13', color: 'amber' },
            ],
            down: false,
          },
          {
            boxes: [
              { id: 'app-4', color: 'cyan' },
              { id: 'app-5', color: 'cyan' },
              { id: 'app-6', color: 'cyan' },
              { id: 'app-14', color: 'amber' },
              { id: 'app-15', color: 'amber' },
            ],
            down: false,
          },
          {
            boxes: [
              { id: 'app-7', color: 'cyan' },
              { id: 'app-8', color: 'cyan' },
              { id: 'app-16', color: 'amber' },
              { id: 'app-17', color: 'amber' },
              { id: 'app-18', color: 'amber' },
            ],
            down: false,
          },
        ],
        trafficPct: 95,
        showAlert: true,
        alertText: '📈 CPU 85% 초과 → HPA 발동 → 8 → 16 자동 증설',
        code: {
          lang: 'yaml',
          filename: 'hpa.yaml',
          lines: [
            '# HorizontalPodAutoscaler — CPU 보고 자동 스케일',
            'apiVersion: autoscaling/v2',
            'kind: HorizontalPodAutoscaler',
            'metadata:',
            '  name: myapp-hpa',
            'spec:',
            '  scaleTargetRef:',
            '    apiVersion: apps/v1',
            '    kind: Deployment',
            '    name: myapp',
            '  minReplicas: 3              # 새벽 최소 3개',
            '  maxReplicas: 30             # 성수기 최대 30개',
            '  metrics:',
            '    - type: Resource',
            '      resource:',
            '        name: cpu',
            '        target:',
            '          type: Utilization',
            '          averageUtilization: 80   # 80% 넘으면 증설',
            '',
            '# 실제 발화 로그',
            '# [HPA] cpu=85% > target=80% → scale 8 → 12',
            '# [HPA] cpu=88% > target=80% → scale 12 → 16',
            '# [Scheduler] 새 pod 8개를 3 노드에 분산',
            '# [HPA] 새벽 cpu=15% < target=80% → scale 16 → 4',
            '',
            '# 사람이 한 일: yaml 한 번 적용. 끝.',
          ],
          highlight: [11, 12, 19, 22, 23, 25],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 박스 색상 스타일 (정적 Tailwind — purge 안전)
    //   cyan  : 기존 박스
    //   green : 새로 생성 (self-heal)
    //   amber : 스케일로 추가 (HPA)
    // ─────────────────────────────────────────────────────
    const BOX_COLOR = {
      cyan:  { fill: '#06b6d4', stroke: '#0e7490' },
      green: { fill: '#10b981', stroke: '#047857' },
      amber: { fill: '#f59e0b', stroke: '#b45309' },
    };

    // ─────────────────────────────────────────────────────
    // 노드 1개 SVG — 위쪽에 박스 그리드 배치
    // ─────────────────────────────────────────────────────
    function NodeSvg({ node, nodeIdx, x, y, width, height }) {
      // 박스 8개까지 4×2 그리드, 색상별로 분류
      const boxesPerRow = 4;
      const boxSize = 22;
      const boxGap = 4;
      const gridStartX = x + 10;
      const gridStartY = y + 12;

      return (
        <g>
          {/* 노드 본체 (창고) */}
          <rect
            x={x}
            y={y}
            width={width}
            height={height}
            rx="8"
            fill={node.down ? '#fee2e2' : (node.overload ? '#fef3c7' : '#f8fafc')}
            stroke={node.down ? '#dc2626' : (node.overload ? '#d97706' : '#0e7490')}
            strokeWidth={node.down ? 3 : 2}
            strokeDasharray={node.down ? '6 3' : 'none'}
            className="transition-all duration-700"
          />
          {/* 노드 라벨 */}
          <text
            x={x + width / 2}
            y={y + height - 8}
            textAnchor="middle"
            fontSize="11"
            fontWeight="bold"
            fill={node.down ? '#991b1b' : '#0f172a'}
            fontFamily="monospace"
          >
            {node.down ? `node-${nodeIdx + 1} ✗ DOWN` : `node-${nodeIdx + 1}`}
          </text>
          <text
            x={x + width / 2}
            y={y + height + 8}
            textAnchor="middle"
            fontSize="9"
            fill="#64748b"
            fontFamily="monospace"
          >
            {node.down ? '⚠ NotReady' : `${node.boxes.length} pods`}
          </text>

          {/* 박스 (Pod = 컨테이너) */}
          {!node.down && node.boxes.map((box, i) => {
            const col = i % boxesPerRow;
            const row = Math.floor(i / boxesPerRow);
            const bx = gridStartX + col * (boxSize + boxGap);
            const by = gridStartY + row * (boxSize + boxGap);
            const colors = BOX_COLOR[box.color] || BOX_COLOR.cyan;
            return (
              <g key={box.id}>
                <rect
                  x={bx}
                  y={by}
                  width={boxSize}
                  height={boxSize}
                  rx="3"
                  fill={colors.fill}
                  stroke={colors.stroke}
                  strokeWidth="1.5"
                  className="transition-all duration-500"
                >
                  <animate
                    attributeName="opacity"
                    from="0"
                    to="1"
                    dur="0.4s"
                    fill="freeze"
                  />
                </rect>
                <text
                  x={bx + boxSize / 2}
                  y={by + boxSize / 2 + 3}
                  textAnchor="middle"
                  fontSize="9"
                  fill="white"
                  fontWeight="bold"
                  pointerEvents="none"
                >
                  📦
                </text>
              </g>
            );
          })}

          {/* 다운 표시 */}
          {node.down && (
            <text
              x={x + width / 2}
              y={y + height / 2 + 4}
              textAnchor="middle"
              fontSize="32"
              fill="#dc2626"
              opacity="0.6"
            >
              ✗
            </text>
          )}
        </g>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 노드 3개 SVG + 트래픽 게이지 + 알람
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ nodes, trafficPct, showAlert, alertText, stepIdx }) {
      const totalPods = nodes.reduce((s, n) => s + (n.down ? 0 : n.boxes.length), 0);
      const downCount = nodes.filter((n) => n.down).length;

      // SVG 영역
      const svgW = 560;
      const svgH = 200;
      const nodeW = 160;
      const nodeH = 130;
      const nodeGap = 20;
      const startX = (svgW - (nodeW * 3 + nodeGap * 2)) / 2;
      const nodeY = 30;

      // 트래픽 색상
      let trafficColor = 'bg-emerald-400';
      let trafficLabel = '정상';
      if (trafficPct >= 80) { trafficColor = 'bg-red-500'; trafficLabel = '급증'; }
      else if (trafficPct >= 50) { trafficColor = 'bg-yellow-400'; trafficLabel = '증가'; }

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🏭 택배 물류 센터 — Kubernetes 클러스터</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 요약 카운트 */}
          <div className="grid grid-cols-3 gap-2 mb-3">
            <div className="rounded-lg bg-cyan-50 border border-cyan-300 p-2 text-center">
              <div className="text-[10px] text-cyan-700 font-bold uppercase">Pods</div>
              <div className="text-xl font-extrabold text-cyan-700 tabular-nums">{totalPods}</div>
            </div>
            <div className="rounded-lg bg-slate-50 border border-slate-300 p-2 text-center">
              <div className="text-[10px] text-slate-600 font-bold uppercase">Nodes</div>
              <div className="text-xl font-extrabold text-slate-700 tabular-nums">
                {3 - downCount}<span className="text-xs text-slate-400">/3</span>
              </div>
            </div>
            <div className="rounded-lg bg-slate-50 border border-slate-300 p-2 text-center">
              <div className="text-[10px] text-slate-600 font-bold uppercase">Traffic</div>
              <div className="text-xl font-extrabold text-slate-700 tabular-nums">{trafficPct}%</div>
            </div>
          </div>

          {/* 노드 3개 SVG */}
          <div className="rounded-lg bg-gradient-to-b from-cyan-50 to-cyan-100 border border-cyan-200 p-2 mb-3">
            <svg viewBox={`0 0 ${svgW} ${svgH}`} className="w-full h-auto">
              {/* K8s 컨트롤 플레인 라벨 */}
              <text
                x={svgW / 2}
                y={16}
                textAnchor="middle"
                fontSize="10"
                fontWeight="bold"
                fill="#0e7490"
                fontFamily="monospace"
              >
                ── K8s Control Plane (스케줄러 / 컨트롤러) ──
              </text>

              {/* 노드 3개 */}
              {nodes.map((node, i) => (
                <NodeSvg
                  key={`step${stepIdx}-node${i}`}
                  node={node}
                  nodeIdx={i}
                  x={startX + i * (nodeW + nodeGap)}
                  y={nodeY}
                  width={nodeW}
                  height={nodeH}
                />
              ))}
            </svg>
          </div>

          {/* 트래픽 게이지 */}
          <div className="mb-3">
            <div className="flex items-center justify-between text-[11px] mb-1">
              <span className="text-slate-700 font-bold">📈 트래픽 (CPU 사용률)</span>
              <span className="font-mono text-slate-600">{trafficPct}% · {trafficLabel}</span>
            </div>
            <div className="h-3 bg-slate-100 rounded-full overflow-hidden relative">
              <div
                className={`h-full transition-all duration-700 ${trafficColor}`}
                style={{ width: `${trafficPct}%` }}
              />
              {/* HPA 임계치 라인 (80%) */}
              <div
                className="absolute top-0 bottom-0 w-0.5 bg-red-600"
                style={{ left: '80%' }}
                aria-hidden="true"
              />
            </div>
            <div className="text-[9px] text-red-600 mt-0.5 font-mono text-right">
              ⚠ HPA 임계치 80%
            </div>
          </div>

          {/* 알람 박스 */}
          {showAlert && (
            <div className={`p-3 rounded-lg border-2 ${
              alertText && alertText.startsWith('⚠')
                ? 'bg-red-50 border-red-400 animate-pulse'
                : 'bg-cyan-50 border-cyan-400'
            }`}>
              <div className={`text-sm font-bold ${
                alertText && alertText.startsWith('⚠') ? 'text-red-800' : 'text-cyan-800'
              }`}>
                {alertText}
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm" style={{ background: '#06b6d4' }}></span>기존 Pod
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm" style={{ background: '#10b981' }}></span>self-heal 신규
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm" style={{ background: '#f59e0b' }}></span>HPA 증설
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-0.5 h-3 bg-red-600"></span>임계치
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-cyan-500/15 border-l-2 border-cyan-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. Kubernetes 기초 &gt; Chapter 1. K8s 시작</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Kubernetes란 무엇인가</h1>
                  <p className="text-sm text-slate-500 mt-0.5">택배 물류 센터 — 컨테이너 수십~수백 개 자동 분류 / 재배치 / 스케일</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                nodes={step.nodes}
                trafficPct={step.trafficPct}
                showAlert={step.showAlert}
                alertText={step.alertText}
                stepIdx={stepIdx}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-cyan-50 border-2 border-cyan-300 rounded-xl p-3 text-sm text-cyan-900">
                💡 다음(I-1-2)에서는 K8s가 컨테이너를 직접 다루지 않고 왜 <strong>Pod</strong>라는 한 겹을 두는지 — 도시락 비유
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-cyan-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-cyan-600 text-white hover:bg-cyan-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./I-1-2.html" className="text-cyan-700 hover:text-cyan-900 font-medium">I-1-2 Pod란 무엇인가 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
