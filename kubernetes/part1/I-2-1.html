  <!--
    I-2-1. Cluster, Node, Control Plane
    학습 목표: Kubernetes 클러스터의 토폴로지(Master + Worker N개)와 Control Plane 4 컴포넌트(apiserver/etcd/scheduler/controller-manager) + Worker 3 컴포넌트(kubelet/proxy/runtime)를 단계별로 시각화한다. Pod 배치 흐름과 etcd의 단일 진실 원천 역할까지 추적한다.
    핵심 비유: 시청(Master) + 공장(Worker) — 시청 안에 4개 부서, 공장 안에 작업반장 3개 역할
    패턴: fastapi v1 — 좌(LiveDataPane: SVG 클러스터 토폴로지) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">

    // ─────────────────────────────────────────────────────

      { key: 'apiserver',  name: 'kube-apiserver',          short: 'API Server',  role: '모든 명령의 출입문 / REST API' },
      { key: 'etcd',       name: 'etcd',                    short: 'etcd',        role: '클러스터 상태 키-값 DB (Raft)' },
      { key: 'scheduler',  name: 'kube-scheduler',          short: 'Scheduler',   role: 'Pod를 어느 Worker에 둘지 결정' },
      { key: 'controller', name: 'kube-controller-manager', short: 'Controller',  role: '원하는 상태 vs 현재 상태 차이 좁힘' },
    ];

    const WORKER_COMPONENTS = [
      { key: 'kubelet', name: 'kubelet',          role: 'API Server와 통신, Pod 생성/감시' },
      { key: 'proxy',   name: 'kube-proxy',       role: 'Service IP → Pod IP 라우팅' },
      { key: 'runtime', name: 'container runtime', role: 'containerd / CRI-O — 실제 컨테이너 실행' },

    // ─────────────────────────────────────────────────────

    //   activeWorker:    glow 줄 worker 인덱스 (0~2, null이면 없음)
    //   showWorkerComps: Worker 내부 3 컴포넌트를 보여주는지
    //   pods:            Worker별 Pod 개수 (배치 시뮬레이션)
    //   flow:            그릴 화살표 배열
    //   etcdHighlight:   etcd 박스에 "Single Source of Truth" 라벨
    // ─────────────────────────────────────────────────────

      {

        },
      },
      {
        title: 'Step 2. Control Plane — 4 컴포넌트 등장',
        desc: 'Master 안에는 4개 컴포넌트가 동시에 돈다. kube-apiserver(민원실) / etcd(기록 보관소) / kube-scheduler(배치 부서) / kube-controller-manager(감독). 모두 cyan glow로 강조 — 이 네 개가 협력해서 클러스터 전체를 운영한다.',
        showCp:    { apiserver: true, etcd: true, scheduler: true, controller: true },
        activeCp:  { apiserver: true, etcd: true, scheduler: true, controller: true },
        showWorkers: false,

          lang: 'yaml',

      {

        desc: 'Worker는 실제 Pod가 떠서 일하는 머신. 각 Worker에는 3가지가 돈다. kubelet(작업반장 — apiserver와 통신), kube-proxy(물류 라우팅 — Service IP → Pod IP), container runtime(작업자 — containerd/CRI-O가 실제 컨테이너 실행). Worker-1, 2, 3 모두 동일 구조.',
        showCp:    { apiserver: true, etcd: true, scheduler: true, controller: true },
        activeCp:  {},
        showWorkers: true,

        showWorkerComps: true,
        pods: [0, 0, 0],
        flow: [],

        code: {

          lines: [

        pods: [0, 1, 0],
        flow: [
          { from: 'kubectl',   to: 'apiserver', label: '1. apply' },
          { from: 'apiserver', to: 'scheduler', label: '2. 배치 결정' },

          { from: 'worker1',   to: 'pod1',      label: '4. Pod 생성' },

        code: {
          lang: 'bash',
          filename: 'pod-create-flow.sh',
          lines: [

            '',

            '',
            '# ④ worker-2의 kubelet이 watch로 자기 노드 Pod 변경 감지',
            '#    - PodSpec 다운로드',
            '#    - CRI로 containerd에 컨테이너 생성 요청',
            '',
            '# ⑤ containerd가 image pull → root filesystem 준비',
            '# ⑥ runc로 컨테이너 프로세스 시작',
            '# ⑦ kubelet이 status=Running을 apiserver에 보고',
            '# ⑧ apiserver가 etcd 상태 업데이트',
            '',
            '$ kubectl get pod nginx -o wide',
            'NAME    READY   STATUS    NODE       IP',
            'nginx   1/1     Running   worker-2   10.244.1.7',
          ],

        },
      },
      {
        title: 'Step 5. etcd — 단일 진실 원천(Single Source of Truth)',
        desc: '모든 컴포넌트는 자기 메모리에 상태를 가지지 않는다 — 단지 etcd에 적힌 것을 읽고 따른다. apiserver만 etcd에 직접 접근하고, 나머지는 apiserver를 통해 watch. etcd가 죽으면 클러스터 정지 — 그래서 보통 3/5대 클러스터로 띄우고 정기 스냅샷이 필수.',

        showWorkers: true,
        activeWorker: null,
        showWorkerComps: true,
        pods: [1, 1, 1],
        flow: [
          { from: 'scheduler',  to: 'apiserver', label: 'watch' },
          { from: 'controller', to: 'apiserver', label: 'watch' },
          { from: 'worker0',    to: 'apiserver', label: 'kubelet watch' },
          { from: 'worker1',    to: 'apiserver', label: 'kubelet watch' },
          { from: 'worker2',    to: 'apiserver', label: 'kubelet watch' },

        ],

            '',
            '# 복구',

    // ─────────────────────────────────────────────────────

    function ClusterDiagram({ step }) {
      const { showCp, activeCp, showWorkers, activeWorker, showWorkerComps, pods, flow, etcdHighlight } = step;

      // 좌표 정리
      // viewBox 600 x 460
      // Cluster outer: (10, 10) ~ (590, 450)
      // Master: (60, 40) ~ (540, 180)
      // Worker boxes: y=240, w=160 each, gaps
      const masterBox = { x: 60, y: 40, w: 480, h: 140 };
      const cpPositions = {
        apiserver:  { x: 100,  y: 80, w: 180, h: 36, label: 'kube-apiserver' },
        etcd:       { x: 320,  y: 80, w: 180, h: 36, label: 'etcd' },
        scheduler:  { x: 100,  y: 130, w: 180, h: 36, label: 'kube-scheduler' },
        controller: { x: 320,  y: 130, w: 180, h: 36, label: 'kube-controller-manager' },
      };
      const workerBoxes = [
        { x: 30,  y: 240, w: 170, h: 180, label: 'worker-1' },
        { x: 215, y: 240, w: 170, h: 180, label: 'worker-2' },
        { x: 400, y: 240, w: 170, h: 180, label: 'worker-3' },
      ];

      // 화살표 시작/끝점 lookup
      const anchorOf = (key) => {
        if (key === 'kubectl')    return { x: 30,  y: 30 };
        if (key === 'apiserver')  return { x: cpPositions.apiserver.x + 90,  y: cpPositions.apiserver.y + 18 };
        if (key === 'etcd')       return { x: cpPositions.etcd.x + 90,       y: cpPositions.etcd.y + 18 };
        if (key === 'scheduler')  return { x: cpPositions.scheduler.x + 90,  y: cpPositions.scheduler.y + 18 };
        if (key === 'controller') return { x: cpPositions.controller.x + 90, y: cpPositions.controller.y + 18 };
        if (key === 'worker0')    return { x: workerBoxes[0].x + 85, y: workerBoxes[0].y + 20 };
        if (key === 'worker1')    return { x: workerBoxes[1].x + 85, y: workerBoxes[1].y + 20 };
        if (key === 'worker2')    return { x: workerBoxes[2].x + 85, y: workerBoxes[2].y + 20 };
        if (key === 'pod1')       return { x: workerBoxes[1].x + 85, y: workerBoxes[1].y + 130 };
        return { x: 300, y: 230 };
      };

      const cyan = '#22d3ee';
      const cyanDim = '#0e7490';
      const slate = '#475569';
      const slateLight = '#cbd5e1';

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🏙️ Cluster 토폴로지</h2>
            <span className="text-[10px] text-slate-400 font-mono">SVG · live</span>
          </div>

          <svg viewBox="0 0 600 460" className="w-full" style={{ background: '#f8fafc', borderRadius: 8 }}>
            <defs>
              <marker id="arr-cyan" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill={cyan} />
              </marker>
              <marker id="arr-slate" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill={slate} />
              </marker>
            </defs>

            {/* Cluster 외곽 */}
            <rect x="10" y="10" width="580" height="440" rx="14" ry="14"
                  fill="none" stroke={slateLight} strokeWidth="2" strokeDasharray="6 4" />
            <text x="22" y="28" fontSize="11" fill={slate} fontFamily="monospace" fontWeight="bold">
              Kubernetes Cluster
            </text>

            {/* Master 박스 */}
            <rect x={masterBox.x} y={masterBox.y} width={masterBox.w} height={masterBox.h}
                  rx="10" ry="10"
                  fill="#ecfeff" stroke={cyanDim} strokeWidth="2" />
            <text x={masterBox.x + 12} y={masterBox.y + 18} fontSize="11" fill={cyanDim} fontFamily="monospace" fontWeight="bold">
              🏛️ Master Node (Control Plane)
            </text>

            {/* CP 4 컴포넌트 */}
            {CP_COMPONENTS.map((c) => {
              if (!showCp[c.key]) return null;
              const p = cpPositions[c.key];
              const isActive = activeCp[c.key];
              const isEtcdHL = c.key === 'etcd' && etcdHighlight;
              return (
                <g key={c.key} className={isActive ? 'cyan-glow' : ''}>
                  <rect x={p.x} y={p.y} width={p.w} height={p.h} rx="6" ry="6"
                        fill={isActive ? '#cffafe' : '#ffffff'}
                        stroke={isActive ? cyan : cyanDim}
                        strokeWidth={isActive ? '2.5' : '1.5'} />
                  <text x={p.x + p.w / 2} y={p.y + 16} fontSize="11" fontFamily="monospace"
                        fill={isActive ? '#0e7490' : '#334155'} fontWeight="bold" textAnchor="middle">
                    {c.short}
                  </text>
                  <text x={p.x + p.w / 2} y={p.y + 30} fontSize="9" fontFamily="monospace"
                        fill="#64748b" textAnchor="middle">
                    {c.key === 'apiserver'  && 'REST :6443'}
                    {c.key === 'etcd'       && (isEtcdHL ? '★ Single Source of Truth' : 'kv DB / Raft')}
                    {c.key === 'scheduler'  && 'Pod 배치 결정'}
                    {c.key === 'controller' && 'reconcile loop'}
                  </text>
                </g>
              );
            })}

            {/* Worker 박스 + 컴포넌트 */}
            {showWorkers && workerBoxes.map((w, idx) => {
              const isActive = activeWorker === idx;
              return (
                <g key={idx} className={isActive ? 'cyan-glow' : ''}>
                  <rect x={w.x} y={w.y} width={w.w} height={w.h} rx="10" ry="10"
                        fill={isActive ? '#cffafe' : '#fef3c7'}
                        stroke={isActive ? cyan : '#d97706'}
                        strokeWidth={isActive ? '2.5' : '1.5'} />
                  <text x={w.x + 10} y={w.y + 16} fontSize="11" fill="#92400e" fontFamily="monospace" fontWeight="bold">
                    🏭 {w.label}
                  </text>

                  {showWorkerComps && WORKER_COMPONENTS.map((wc, ci) => {
                    const cy = w.y + 36 + ci * 22;
                    return (
                      <g key={wc.key}>
                        <rect x={w.x + 10} y={cy} width={w.w - 20} height={18} rx="4" ry="4"
                              fill="#ffffff" stroke="#a3a3a3" strokeWidth="1" />
                        <text x={w.x + 16} y={cy + 13} fontSize="9.5" fontFamily="monospace" fill="#334155">
                          {wc.name}
                        </text>
                      </g>
                    );
                  })}

                  {/* Pod 시각화 — 작은 원 */}
                  {Array.from({ length: pods[idx] || 0 }).map((_, pi) => (
                    <g key={`pod-${idx}-${pi}`}>
                      <circle cx={w.x + 30 + pi * 28} cy={w.y + 130} r="9"
                              fill="#22d3ee" stroke="#0e7490" strokeWidth="1.5" className="cyan-glow" />
                      <text x={w.x + 30 + pi * 28} y={w.y + 134} fontSize="8" textAnchor="middle"
                            fill="#0c4a6e" fontFamily="monospace" fontWeight="bold">
                        Pod
                      </text>
                    </g>
                  ))}

                  {showWorkerComps && (
                    <text x={w.x + w.w / 2} y={w.y + w.h - 8} fontSize="8" textAnchor="middle"
                          fill="#92400e" fontFamily="monospace">
                      Pods: {pods[idx] || 0}
                    </text>
                  )}
                </g>
              );
            })}

            {/* 흐름 화살표 */}
            {flow.map((f, i) => {
              const from = anchorOf(f.from);
              const to   = anchorOf(f.to);
              const midX = (from.x + to.x) / 2;
              const midY = (from.y + to.y) / 2;
              return (
                <g key={i}>
                  <line x1={from.x} y1={from.y} x2={to.x} y2={to.y}
                        stroke={cyan} strokeWidth="2"
                        markerEnd="url(#arr-cyan)"
                        className="flow-arrow" />
                  <rect x={midX - 38} y={midY - 9} width="76" height="14" rx="3" ry="3"
                        fill="#0e7490" opacity="0.92" />
                  <text x={midX} y={midY + 1} fontSize="9" fill="#ffffff" fontFamily="monospace"
                        textAnchor="middle" dominantBaseline="middle">
                    {f.label}
                  </text>
                </g>
              );
            })}

            {/* User 입구 (Step 4 흐름이 있을 때) */}
            {flow.some(f => f.from === 'kubectl') && (
              <g>
                <text x="20" y="36" fontSize="11" fontFamily="monospace" fill="#0e7490" fontWeight="bold">
                  💻 kubectl
                </text>
              </g>
            )}
          </svg>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-3 h-3 rounded bg-cyan-100 border border-cyan-500"></span>Master(Control Plane)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-3 rounded bg-amber-100 border border-amber-500"></span>Worker Node
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-3 rounded-full bg-cyan-400"></span>Pod
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-0.5 bg-cyan-400"></span>활성 흐름
            </span>
          </div>

          {/* 하단 카운트 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-3 font-mono">
            <span className="px-2 py-0.5 rounded bg-cyan-100 text-cyan-800 font-bold">
              CP {Object.values(showCp).filter(Boolean).length} / 4
            </span>
            <span className="px-2 py-0.5 rounded bg-amber-100 text-amber-800 font-bold">
              Workers {showWorkers ? 3 : 0}
            </span>
            <span className="px-2 py-0.5 rounded bg-slate-100 text-slate-700 font-bold">
              Pods {pods.reduce((a, b) => a + b, 0)}
            </span>
            {etcdHighlight && (
              <span className="px-2 py-0.5 rounded bg-cyan-700 text-white font-bold">
                ★ etcd = Single Source of Truth
              </span>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-cyan-500/15 border-l-2 border-cyan-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. Kubernetes 기초 &gt; Chapter 2. 클러스터 구성</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Cluster, Node, Control Plane</h1>
                  <p className="text-sm text-slate-500 mt-0.5">시청(Master) + 공장(Worker) — Control Plane 4 컴포넌트와 Pod 배치 흐름</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <ClusterDiagram step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컴포넌트 한눈에 정리 카드 */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl border border-cyan-200 p-4 shadow-sm">
                <div className="flex items-center gap-2 mb-3">
                  <span className="text-lg">🏛️</span>
                  <h3 className="text-sm font-bold text-cyan-800">Control Plane (Master) 4 컴포넌트</h3>
                </div>
                <ul className="space-y-2">
                  {CP_COMPONENTS.map((c) => (
                    <li key={c.key} className="flex flex-col text-xs">
                      <span className="font-mono font-bold text-slate-800">{c.name}</span>
                      <span className="text-slate-500 leading-snug">{c.role}</span>
                    </li>
                  ))}
                </ul>
              </div>
              <div className="bg-white rounded-xl border border-amber-200 p-4 shadow-sm">
                <div className="flex items-center gap-2 mb-3">
                  <span className="text-lg">🏭</span>
                  <h3 className="text-sm font-bold text-amber-800">Worker Node 3 컴포넌트</h3>
                </div>
                <ul className="space-y-2">
                  {WORKER_COMPONENTS.map((wc) => (
                    <li key={wc.key} className="flex flex-col text-xs">
                      <span className="font-mono font-bold text-slate-800">{wc.name}</span>
                      <span className="text-slate-500 leading-snug">{wc.role}</span>
                    </li>
                  ))}
                </ul>
                <div className="mt-3 pt-3 border-t border-slate-100 text-[10px] text-slate-500 leading-snug">
                  통신: <span className="font-mono">kubelet → CRI(gRPC) → containerd → runc → 컨테이너</span>
                </div>
              </div>
            </div>

            {/* 핵심 비유 정리 */}
            <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
              <h3 className="text-sm font-bold text-slate-700 mb-2">🧠 핵심 비유 — "도시"</h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3 text-xs text-slate-600">
                <div>
                  <p className="leading-relaxed">
                    Master = 시청. 안에는 4개 부서가 있다 — 민원실(apiserver) / 기록 보관소(etcd) /
                    배치 부서(scheduler) / 감독실(controller-manager). 시청은 절대 직접 일을 하지 않고
                    공장에 명령만 내린다.
                  </p>
                </div>
                <div>
                  <p className="leading-relaxed">
                    Worker = 공장. 작업반장(kubelet)이 시청 명령을 받아 작업자(container runtime)를 부린다.
                    물류(kube-proxy)는 공장 사이/내부 라우팅을 담당한다. 공장은 시청 없이는 새 일을 시작할 수
                    없지만, 시청이 잠깐 죽어도 이미 돌아가던 작업은 계속된다.
                  </p>
                </div>
              </div>
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-cyan-50 border-2 border-cyan-300 rounded-xl p-3 text-sm text-cyan-900">
                💡 다음(I-2-2)에서는 <strong>YAML 매니페스트 + kubectl apply</strong> — 사용자가 "원하는 상태"를 선언하는 방법과 idempotent 동작을 본다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-cyan-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-cyan-600 text-white hover:bg-cyan-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./I-2-2.html" className="text-cyan-700 hover:text-cyan-900 font-medium">I-2-2 YAML 매니페스트 &amp; kubectl apply &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
