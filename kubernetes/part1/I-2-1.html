<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — Cluster, Node, Control Plane</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    I-2-1. Cluster, Node, Control Plane
    학습 목표: 클러스터의 두 종류 노드(Master/Worker) + 핵심 컴포넌트.
    핵심 비유: "도시" — Master=시청(API/스케줄/기록), Worker=공장(실제 작업)
    구조: 4단계 (Cluster 개관 / Master 컴포넌트 / Worker 컴포넌트 / 흐름)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Cluster — Master + Worker N개',
        desc: '클러스터는 Master 노드(통제) + Worker 노드(실행) 묶음. 사용자는 Master에 명령하고, Master가 Worker에 작업을 분배. 도시에 비유하면 시청(Master) + 공장(Worker N개).',
        block: {
          kind: 'shell',
          code: `$ kubectl get nodes
NAME       STATUS   ROLES           AGE   VERSION
master-1   Ready    control-plane   30d   v1.29.0
worker-1   Ready    <none>          30d   v1.29.0
worker-2   Ready    <none>          30d   v1.29.0
worker-3   Ready    <none>          30d   v1.29.0

# Master 1개 + Worker 3개 = 클러스터
# 사용자: kubectl → API Server → 분배 → Worker 실행`,
        },
        focus: 'cluster',
      },
      {
        title: 'Step 2. Master(Control Plane) — 4 컴포넌트',
        desc: 'Master에는 API Server / Scheduler / Controller Manager / etcd 4개가 돈다. API Server는 모든 명령의 출입문, Scheduler는 Pod 배치 결정, Controller Manager는 차이 좁히기, etcd는 클러스터 상태 영구 저장.',
        block: {
          kind: 'yaml',
          code: `# Master 노드의 핵심 4 컴포넌트

1. kube-apiserver
   - 모든 kubectl 명령의 출입문
   - REST API 제공, 인증/인가
   - "시청 민원실"

2. kube-scheduler
   - 새 Pod를 어느 Worker에 둘지 결정
   - 자원/제약 매칭
   - "공장 배치 부서"

3. kube-controller-manager
   - "원하는 상태 vs 현재 상태" 차이 좁힘
   - Deployment/ReplicaSet/Endpoint 컨트롤러
   - "공장 감독"

4. etcd
   - 클러스터의 모든 상태를 저장하는 키-값 DB
   - 분산 합의(Raft) 기반
   - "시청 기록 보관소"`,
        },
        focus: 'master',
      },
      {
        title: 'Step 3. Worker — kubelet + kube-proxy + Container Runtime',
        desc: '각 Worker 노드는 3개가 돈다. kubelet이 Master 명령 받아 Pod를 띄우고, kube-proxy가 네트워크 라우팅, container runtime(containerd/CRI-O)이 실제 컨테이너 실행. "공장 작업반장 + 운송 + 작업자".',
        block: {
          kind: 'yaml',
          code: `# Worker 노드의 핵심 3 컴포넌트

1. kubelet
   - Master(API Server)와 통신
   - PodSpec 받아서 컨테이너 띄움/감시
   - 헬스체크 보고
   - "공장 작업반장"

2. kube-proxy
   - 노드의 네트워크 규칙 관리
   - Service IP → Pod IP 라우팅 (iptables/IPVS)
   - "물류 라우팅"

3. Container Runtime (containerd, CRI-O 등)
   - 실제 컨테이너 실행 엔진 (Docker 자리)
   - kubelet의 명령으로 컨테이너 생성
   - "공장 작업자"

# kubelet ↔ runtime 사이는 CRI(Container Runtime Interface)`,
        },
        focus: 'worker',
      },
      {
        title: 'Step 4. 명령 → 실행 흐름',
        desc: 'kubectl apply → API Server 검증 → etcd 저장 → Scheduler가 배치 결정 → kubelet이 Pod 생성 → container runtime이 실제 실행. 8단계 안에 한 번 사이클이 돈다.',
        block: {
          kind: 'shell',
          code: `# kubectl apply -f deployment.yaml 흐름

1. kubectl → API Server (인증/인가/검증)
2. API Server → etcd 저장 (원하는 상태)
3. Deployment Controller 감지
4. ReplicaSet 생성 → Pod N개 생성 요청
5. Scheduler가 각 Pod의 노드 선택
   (자원 / NodeSelector / affinity 고려)
6. kubelet이 자기 노드의 Pod 변경 감지
7. kubelet → Container Runtime → 컨테이너 시작
8. 상태 보고 → API Server → etcd 업데이트

# 모든 단계가 declarative loop
# 사용자: "이래야 함" 선언
# K8s: "지금 차이 → 좁힘" 반복`,
        },
        focus: 'flow',
      },
    ];

    const KIND_STYLE = {
      shell: { label: 'Bash', textColor: '#86efac' },
      yaml:  { label: 'YAML', textColor: '#fde68a' },
    };

    const STAGES = [
      { key: 'cluster', emoji: '🏙️', name: 'Cluster',     note: 'Master + Worker N개' },
      { key: 'master',  emoji: '🏛️', name: 'Control Plane', note: 'API/Scheduler/Controller/etcd' },
      { key: 'worker',  emoji: '🏭', name: 'Worker',       note: 'kubelet/proxy/runtime' },
      { key: 'flow',    emoji: '🔄', name: '명령 흐름',     note: '8단계 declarative loop' },
    ];

    function CityDiagram({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🏙️ 도시 구조 (Cluster)</div>
          <div className="grid grid-cols-4 gap-2">
            {STAGES.map((s) => {
              const isActive = focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-sky-100 border-2 border-sky-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{s.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{s.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{s.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Cluster, Node, Control Plane</h1>
                <p className="text-sm text-slate-500 mt-1">도시 구조 — 시청(Master) + 공장(Worker N개)</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <CityDiagram focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'flow' && (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl p-3 mb-6 text-xs text-sky-900">
                💡 다음(I-2-2)에서는 사용자가 "원하는 상태"를 적는 도구 — YAML 매니페스트와 kubectl apply의 idempotent 동작을 본다
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
