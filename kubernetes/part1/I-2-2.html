<body>
  <div id="root"></div>

  <!--
    I-2-2. 선언적 매니페스트 (YAML) — desired vs actual state
    학습 목표: kubectl apply가 어떻게 desired state를 etcd에 반영하고
              controller가 actual state와 비교해 reconcile loop를 도는지 시각화
    핵심 비유: "주문서 한 장" — 완성품 그림을 던지면 K8s가 알아서 도달/유지
    패턴: fastapi v1 — 좌(LiveDataPane: desired YAML | actual cluster topology) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의
    //   desired: YAML이 선언한 Pod 개수 (사용자가 원하는 상태)
    //   actual : 클러스터에 실제로 존재하는 Pod (kubelet이 만든 것)
    //   reconcile: controller가 desired vs actual 차이를 감지/조치 중인지
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. YAML 작성 — desired state 한 장',
        desc: '사용자는 "Pod 1개를 원한다"는 매니페스트(pod.yaml)를 손으로 적는다. 아직 클러스터에 보내지 않았다 — desired는 파일 안에만 있고, 실제 Pod는 없다. 주문서를 식탁에 올려둔 상태.',
        dataState: {
          desired: 1,
          desiredManifests: [
            { name: 'web', kind: 'Pod', state: 'draft', image: 'nginx:1.25' },
          ],
          actualPods:    [],
          submitted:     false,
          stored:        false,
          reconciling:   false,
          flowStage:     'draft',
        },
        code: {
          lang: 'yaml',
          filename: 'pod.yaml',
          lines: [
            '# desired state — "Pod 1개를 원한다"는 선언',
            '# 사용자가 직접 손으로 적는 매니페스트 (이 파일 자체가 진실의 원천)',
            '',
            'apiVersion: v1            # 1. 어느 API 버전?',
            'kind: Pod                 # 2. 무슨 종류 객체?',
            'metadata:                 # 3. 식별 정보',
            '  name: web',
            '  namespace: default',
            '  labels:',
            '    app: web',
            '    tier: frontend',
            'spec:                     # 4. "이렇게 있어야 한다"',
            '  containers:',
            '    - name: nginx',
            '      image: nginx:1.25',
            '      ports:',
            '        - containerPort: 80',
            '      resources:',
            '        requests:',
            '          cpu: 100m',
            '          memory: 128Mi',
            '        limits:',
            '          cpu: 500m',
            '          memory: 512Mi',
            '',
            '# ─ 4 핵심 필드만 알면 모든 K8s 객체 작성 가능 ─',
            '#  apiVersion / kind / metadata / spec',
            '#  spec = 사용자가 원하는 결과 ("어떻게"가 아닌 "무엇이")',
            '#',
            '# ─ 명령형과 다른 점 ─',
            '#  명령형: kubectl run web --image=nginx:1.25 → 한 번 실행되고 끝',
            '#  선언형: pod.yaml = 영구적인 desired state, K8s가 계속 유지',
            '#',
            '# ─ 현재 상태 ─',
            '#  desired = 1 (이 파일 안에서)',
            '#  actual  = 0 (아직 클러스터에 보내지도 않았다)',
            '#  → diff +1, 그러나 controller는 아직 모름',
          ],
          highlight: [4, 5, 7, 12, 14, 15],
        },
      },
      {
        title: 'Step 2. kubectl apply — API server에 전송',
        desc: 'kubectl apply -f pod.yaml 실행. CLI가 YAML을 JSON으로 변환해 kube-apiserver(/api/v1/namespaces/default/pods) POST. apiserver가 인증/인가/스키마 검증 후 받아준다. 아직 etcd에 쓰기 직전.',
        dataState: {
          desired: 1,
          desiredManifests: [
            { name: 'web', kind: 'Pod', state: 'submitted', image: 'nginx:1.25' },
          ],
          actualPods:    [],
          submitted:     true,
          stored:        false,
          reconciling:   false,
          flowStage:     'apiserver',
        },
        code: {
          lang: 'bash',
          filename: 'kubectl-apply.sh',
          lines: [
            '# Step 2. kubectl apply — 클라이언트 → API server 전송',
            '',
            '$ kubectl apply -f pod.yaml',
            '',
            '# ─ 내부에서 일어나는 일 ─',
            '#  1) kubectl이 pod.yaml 읽고 파싱',
            '#  2) YAML → JSON 변환 (apiserver는 JSON으로 받음)',
            '#  3) ~/.kube/config에서 apiserver 주소 + 인증 토큰 로드',
            '#  4) HTTPS POST 요청 빌드',
            '#       URL:  https://<apiserver>:6443/api/v1/namespaces/default/pods',
            '#       Header: Authorization: Bearer <ServiceAccount token>',
            '#               Content-Type: application/json',
            '#       Body:  {"apiVersion":"v1","kind":"Pod", ...}',
            '',
            '# ─ apiserver의 5단계 검증 ─',
            '#  ① 인증 (Authentication)   — 누구냐? 토큰/인증서 확인',
            '#  ② 인가 (Authorization)    — RBAC: 이 사용자가 pods:create 권한?',
            '#  ③ Admission Controller    — 정책 검사 (LimitRange, PodSecurity 등)',
            '#  ④ Mutating Webhook        — 필요 시 객체 변형 (sidecar 주입 등)',
            '#  ⑤ Validating Schema       — OpenAPI 스키마로 필드 검증',
            '',
            '# ─ 응답 ─',
            'pod/web created',
            '',
            '# "created" = 객체가 etcd에 들어갈 자격을 통과했다는 뜻',
            '# 실제 컨테이너 실행은 비동기로 뒤이어 진행 (다음 step)',
            '',
            '# ─ 디버깅용 verbose 모드 ─',
            '$ kubectl apply -f pod.yaml -v=8',
            'I0507  POST https://10.0.0.1:6443/api/v1/.../pods',
            'I0507  Request Headers: Authorization: Bearer ey...',
            'I0507  Response 201 Created in 42ms',
          ],
          highlight: [3, 10, 11, 16, 17, 18, 23],
        },
      },
      {
        title: 'Step 3. etcd 저장 — desired state 영구 반영',
        desc: 'apiserver가 검증 통과한 객체를 etcd에 쓴다. 이제 클러스터의 "원하는 상태"는 영구 기록됨 — 어느 노드가 죽어도 desired는 etcd에 남는다. watch 중이던 controller·scheduler가 이벤트를 받아 깨어난다.',
        dataState: {
          desired: 1,
          desiredManifests: [
            { name: 'web', kind: 'Pod', state: 'stored', image: 'nginx:1.25' },
          ],
          actualPods:    [],
          submitted:     true,
          stored:        true,
          reconciling:   false,
          flowStage:     'etcd',
        },
        code: {
          lang: 'bash',
          filename: 'kubectl-apply.sh',
          lines: [
            '# Step 3. apiserver → etcd 저장 (desired state 영구 반영)',
            '',
            '# ─ apiserver 내부 처리 ─',
            'apiserver.storage.write(',
            '    key="/registry/pods/default/web",',
            '    value=<Pod object JSON>,',
            '    leaseId=...,           # etcd lease 부여',
            ')',
            '',
            '# ─ etcd는 분산 KV (Raft 합의 알고리즘) ─',
            '#  Master 3대가 quorum 합의로 동일한 desired state 유지',
            '#  단일 노드 죽어도 desired는 안 사라짐',
            '',
            '# ─ 실제 etcd 저장 확인 ─',
            '$ etcdctl get /registry/pods/default/web --print-value-only | jq',
            '{',
            '  "kind": "Pod",',
            '  "apiVersion": "v1",',
            '  "metadata": {',
            '    "name": "web",',
            '    "namespace": "default",',
            '    "uid": "8a9c7e1f-...",   ← 새 UID 발급됨',
            '    "resourceVersion": "12345"',
            '  },',
            '  "spec": {',
            '    "containers": [{ "name": "nginx", "image": "nginx:1.25" }]',
            '  },',
            '  "status": {',
            '    "phase": "Pending"        ← 아직 actual = 0',
            '  }',
            '}',
            '',
            '# ─ desired state 이제 영구 보존 ─',
            '#  - Master 노드 재부팅해도 그대로',
            '#  - 사용자가 "원하는 결과"는 etcd가 진실의 원천',
            '#  - apply 한 번에 영원히 유지되는 비결',
            '',
            '# ─ watch 이벤트 발화 ─',
            '#  scheduler / controller-manager / kubelet이 watch 중',
            '#  "Pod web ADDED, status=Pending" 이벤트 수신',
            '#  → 각자 일어나서 reconcile 시작 (다음 step)',
          ],
          highlight: [4, 5, 6, 7, 22, 28, 29, 38],
        },
      },
      {
        title: 'Step 4. controller reconcile — actual을 desired에 맞춘다',
        desc: 'controller manager가 etcd watch로 변화 감지 → desired(1)과 actual(0) 차이를 인지. scheduler가 Pod를 worker-1에 배치 결정 → kubelet이 컨테이너 런타임에 명령 → nginx 컨테이너 기동. actual = 1로 동기화 완료.',
        dataState: {
          desired: 1,
          desiredManifests: [
            { name: 'web', kind: 'Pod', state: 'stored', image: 'nginx:1.25' },
          ],
          actualPods: [
            { name: 'web', node: 'worker-1', phase: 'Running', restartedAt: null },
          ],
          submitted:     true,
          stored:        true,
          reconciling:   true,
          flowStage:     'reconcile',
        },
        code: {
          lang: 'bash',
          filename: 'kubectl-apply.sh',
          lines: [
            '# Step 4. controller reconcile — actual을 desired에 맞춘다',
            '',
            '# ─ 1) controller-manager가 etcd watch 이벤트 수신 ─',
            '#     이벤트: "Pod web ADDED, phase=Pending, nodeName=<empty>"',
            '#     판단: desired = 1, actual = 0 → diff +1',
            '#     "이 Pod가 어디서도 안 돌고 있다"',
            '',
            '# ─ 2) scheduler: 어느 Worker에 둘지 결정 ─',
            '#     필터링 (Filtering)',
            '#       - resources.requests 충족하는 노드 골라냄',
            '#       - taint/toleration / affinity / nodeSelector 체크',
            '#     점수화 (Scoring)',
            '#       - LeastRequested: CPU/Memory 여유 많은 노드 +점수',
            '#       - BalancedResource: CPU vs MEM 균형 +점수',
            '#     결정',
            '#       - worker-1 점수 92 / worker-2 점수 78 / worker-3 점수 65',
            '#       - worker-1 선택 → Pod.spec.nodeName = "worker-1" 패치',
            '',
            '# ─ 3) worker-1의 kubelet이 watch로 자기 Pod 인지 ─',
            '#     "내 노드에 새 Pod web이 배정됐다"',
            '#     → CRI(containerd/cri-o) 호출',
            '#     → 이미지 pull (nginx:1.25)',
            '#     → 네트워크 namespace 생성 (pause container)',
            '#     → nginx 컨테이너 start',
            '#     → readiness probe 통과 → Running',
            '',
            '# ─ 4) kubelet이 status를 apiserver로 patch ─',
            '#     "Pod web phase=Running, podIP=10.244.1.5"',
            '#     apiserver → etcd (status 갱신)',
            '',
            '$ kubectl get pod web -o wide',
            'NAME   READY   STATUS    RESTARTS   AGE   IP            NODE',
            'web    1/1     Running   0          5s    10.244.1.5    worker-1',
            '',
            '# ─ 결과 ─',
            '#  desired = 1, actual = 1 → diff 0 → in sync',
            '#  reconcile loop 한 바퀴 완료',
            '#  controller는 다음 차이가 생길 때까지 idle',
          ],
          highlight: [3, 4, 5, 8, 11, 16, 19, 28, 33, 36],
        },
      },
      {
        title: 'Step 5. Pod 죽으면 자동 재생성 — reconciliation loop',
        desc: 'worker-1의 web Pod가 OOM으로 죽었다 → actual = 0. 그러나 desired(etcd)는 여전히 1. controller가 차이 감지하고 다시 scheduler·kubelet 호출 → 새 Pod 자동 기동. 이게 K8s 자가복구의 본체 — apply 한 번이 영원히 유지된다.',
        dataState: {
          desired: 1,
          desiredManifests: [
            { name: 'web', kind: 'Pod', state: 'stored', image: 'nginx:1.25' },
          ],
          actualPods: [
            { name: 'web', node: 'worker-1', phase: 'Running', restartedAt: 'just now' },
          ],
          submitted:     true,
          stored:        true,
          reconciling:   true,
          flowStage:     'loop',
        },
        code: {
          lang: 'bash',
          filename: 'kubectl-apply.sh',
          lines: [
            '# Step 5. Pod 사망 → 자동 재생성 (reconciliation loop의 본체)',
            '',
            '# ─ 22:13:00 — worker-1의 nginx OOM 사망 ─',
            'kubelet:    "container nginx OOMKilled (137)"',
            'kubelet:    Pod web 종료 → status=Failed 보고',
            'apiserver → etcd:  Pod web status 갱신 (running pod 사라짐)',
            '',
            '# ─ 22:13:01 — 차이 다시 감지 ─',
            'controller: watch 이벤트 수신',
            '            desired = 1 (etcd에 그대로)',
            '            actual  = 0 (Pod 사라짐)',
            '            diff = +1 → "음, 또 부족하군"',
            '            → reconcile 재실행',
            '',
            '# ─ 22:13:02~04 — Step 4와 동일한 흐름 반복 ─',
            'scheduler:  worker-1에 다시 배치 (점수 여전히 최고)',
            'kubelet:    새 컨테이너 기동',
            '            (이미지는 캐시되어 있어 빠름)',
            '',
            '# ─ 22:13:05 — 5초만에 새 Pod Running ─',
            '$ kubectl get pod web',
            'NAME   READY   STATUS    RESTARTS   AGE',
            'web    1/1     Running   1          5s     ← 새로 떴다',
            '#                          ↑',
            '#                  RESTARTS=1: 한 번 죽었다 살아났다는 흔적',
            '',
            '# ─ reconcile loop 의사코드 ─',
            'while True:                            # 영원히 돈다',
            '    desired = etcd.get("pods/web")     # 사용자가 원한 상태',
            '    actual  = list_pods_in_cluster()    # 현재 떠 있는 것',
            '    diff = desired - actual',
            '    if diff > 0:',
            '        scheduler.assign_node()         # 모자라면 만든다',
            '        kubelet.start_container()',
            '    elif diff < 0:',
            '        kubelet.stop_container()        # 남으면 지운다',
            '    sleep(controller_resync_period)',
            '',
            '# ─ 핵심 정리 ─',
            '#  apply 한 번 = 평생 유지 (idempotent + self-healing)',
            '#  desired는 etcd에 박혀있다 (영구)',
            '#  actual은 노드 사정으로 흔들린다 (휘발)',
            '#  controller가 두 값을 끊임없이 비교 → 자동 보정',
            '#  이 무한 루프가 K8s self-healing의 정체',
            '#',
            '#  → 다음 (Part II): Deployment / StatefulSet 등 워크로드',
            '#    같은 패턴이지만 Pod를 N개 단위로 관리',
          ],
          highlight: [3, 4, 8, 9, 10, 11, 12, 21, 23, 28, 32, 33],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // LiveDataPane — desired YAML 박스 | actual 클러스터 토폴로지
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ dataState }) {
      const {
        desired, desiredManifests, actualPods,
        submitted, stored, reconciling, flowStage,
      } = dataState;

      const diff = desired - actualPods.length;
      const inSync = diff === 0 && stored;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">📜 desired vs actual — 주문서와 실제 주방</h2>
            <span className="text-[10px] text-slate-400 font-mono">k8s reconcile loop</span>
          </div>

          {/* desired / actual 카운트 + 동기화 배지 */}
          <div className="grid grid-cols-3 gap-2 mb-4">
            <div className="rounded-lg bg-cyan-50 border-2 border-cyan-300 p-2 text-center">
              <div className="text-[10px] font-bold text-cyan-700 uppercase tracking-wider">desired</div>
              <div className="text-2xl font-extrabold text-cyan-700 tabular-nums">{desired}</div>
              <div className="text-[10px] text-cyan-600">YAML 선언</div>
            </div>
            <div className={`rounded-lg p-2 text-center border-2 transition-all ${inSync ? 'bg-emerald-50 border-emerald-400' : (reconciling ? 'bg-yellow-50 border-yellow-400 animate-pulse' : 'bg-slate-50 border-slate-300')}`}>
              <div className="text-[10px] font-bold uppercase tracking-wider text-slate-600">diff</div>
              <div className={`text-2xl font-extrabold tabular-nums ${inSync ? 'text-emerald-700' : 'text-yellow-700'}`}>
                {diff > 0 ? `+${diff}` : (diff < 0 ? diff : '0')}
              </div>
              <div className="text-[10px] text-slate-500">
                {inSync ? '✓ in sync' : (reconciling ? '↻ reconciling' : '— pending')}
              </div>
            </div>
            <div className="rounded-lg bg-sky-50 border-2 border-sky-300 p-2 text-center">
              <div className="text-[10px] font-bold text-sky-700 uppercase tracking-wider">actual</div>
              <div className="text-2xl font-extrabold text-sky-700 tabular-nums">{actualPods.length}</div>
              <div className="text-[10px] text-sky-600">클러스터 실제</div>
            </div>
          </div>

          {/* 좌: desired YAML 박스 / 우: actual 클러스터 토폴로지 */}
          <div className="grid grid-cols-2 gap-3">

            {/* desired side */}
            <div className="rounded-lg border-2 border-cyan-200 bg-cyan-50/40 p-3 min-h-[180px]">
              <div className="flex items-center justify-between mb-2">
                <span className="text-[11px] font-bold text-cyan-800">📄 desired (YAML)</span>
                <span className={`text-[9px] font-mono px-1.5 py-0.5 rounded ${stored ? 'bg-emerald-200 text-emerald-800' : (submitted ? 'bg-yellow-200 text-yellow-800' : 'bg-slate-200 text-slate-600')}`}>
                  {stored ? 'in etcd' : (submitted ? 'in apiserver' : 'local file')}
                </span>
              </div>
              <div className="space-y-2">
                {desiredManifests.map((m, i) => (
                  <div
                    key={i}
                    className={`rounded border p-2 transition-all ${m.state === 'stored' ? 'bg-white border-cyan-400 shadow-sm' : (m.state === 'submitted' ? 'bg-white border-yellow-400' : 'bg-white border-slate-300 border-dashed')}`}
                  >
                    <div className="flex items-center gap-1.5">
                      <span className="text-base">📦</span>
                      <span className="text-xs font-bold text-slate-800">{m.kind}/{m.name}</span>
                    </div>
                    <div className="text-[10px] text-slate-500 font-mono mt-0.5">image: {m.image}</div>
                    <div className="text-[9px] mt-1 flex items-center gap-1">
                      <span className={`inline-block w-1.5 h-1.5 rounded-full ${m.state === 'stored' ? 'bg-emerald-500' : (m.state === 'submitted' ? 'bg-yellow-500' : 'bg-slate-400')}`}></span>
                      <span className="text-slate-600 font-mono">
                        {m.state === 'stored' ? 'etcd 저장됨' : (m.state === 'submitted' ? 'apiserver 검증중' : 'draft (local)')}
                      </span>
                    </div>
                  </div>
                ))}
              </div>

              {/* flow 단계 표시 */}
              <div className="mt-3 pt-2 border-t border-cyan-200">
                <div className="text-[9px] text-slate-500 mb-1 uppercase tracking-wider font-bold">흐름</div>
                <div className="flex items-center gap-1 text-[9px] font-mono">
                  <span className={flowStage === 'draft' ? 'text-cyan-700 font-bold' : 'text-slate-400'}>local</span>
                  <span className="text-slate-400">→</span>
                  <span className={flowStage === 'apiserver' ? 'text-cyan-700 font-bold' : (submitted ? 'text-slate-500' : 'text-slate-300')}>apiserver</span>
                  <span className="text-slate-400">→</span>
                  <span className={flowStage === 'etcd' ? 'text-cyan-700 font-bold' : (stored ? 'text-slate-500' : 'text-slate-300')}>etcd</span>
                  <span className="text-slate-400">→</span>
                  <span className={(flowStage === 'reconcile' || flowStage === 'loop') ? 'text-cyan-700 font-bold' : 'text-slate-300'}>reconcile</span>
                </div>
              </div>
            </div>

            {/* actual side */}
            <div className="rounded-lg border-2 border-sky-200 bg-sky-50/40 p-3 min-h-[180px]">
              <div className="flex items-center justify-between mb-2">
                <span className="text-[11px] font-bold text-sky-800">🖥️ actual (cluster)</span>
                <span className="text-[9px] font-mono px-1.5 py-0.5 rounded bg-sky-200 text-sky-800">
                  worker pool
                </span>
              </div>

              {/* worker 노드 박스 */}
              <div className="rounded border border-sky-300 bg-white p-2">
                <div className="flex items-center justify-between mb-1.5">
                  <span className="text-[10px] font-bold text-slate-700">🛠️ worker-1</span>
                  <span className="text-[9px] font-mono text-slate-400">kubelet</span>
                </div>

                {actualPods.length === 0 ? (
                  <div className="text-center py-4 text-[10px] text-slate-400 italic border border-dashed border-slate-300 rounded">
                    (no pods running)
                  </div>
                ) : (
                  <div className="space-y-1.5">
                    {actualPods.map((p, i) => (
                      <div
                        key={i}
                        className={`rounded border-2 border-sky-400 bg-sky-50 p-1.5 transition-all ${flowStage === 'loop' ? 'animate-pulse' : ''}`}
                      >
                        <div className="flex items-center justify-between">
                          <div className="flex items-center gap-1">
                            <span className="text-sm">📦</span>
                            <span className="text-[11px] font-bold text-slate-800">{p.name}</span>
                          </div>
                          <span className="text-[9px] font-bold px-1 py-0.5 rounded bg-emerald-200 text-emerald-800">
                            {p.phase}
                          </span>
                        </div>
                        {p.restartedAt && (
                          <div className="text-[9px] text-orange-600 mt-0.5 font-mono">
                            ↻ restarted {p.restartedAt}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* reconciliation loop 화살표 */}
              {reconciling && (
                <div className="mt-3 rounded bg-cyan-100 border border-cyan-400 p-2 text-[10px] text-cyan-900 font-mono">
                  <div className="flex items-center gap-1 font-bold mb-0.5">
                    <span>↻</span>
                    <span>controller reconcile loop</span>
                  </div>
                  <div className="text-cyan-800">
                    desired({desired}) ≠ actual({actualPods.length}) ? → reconcile<br/>
                    desired({desired}) = actual({actualPods.length}) ? → idle
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* 단계별 이벤트 로그 (apiserver / etcd / controller / kubelet 순서) */}
          <div className="mt-4 rounded-lg border border-slate-200 bg-slate-50 p-3">
            <div className="flex items-center justify-between mb-2">
              <span className="text-[10px] font-bold uppercase tracking-wider text-slate-600">📡 component event log</span>
              <span className="text-[9px] text-slate-400 font-mono">stage = {flowStage}</span>
            </div>
            <div className="space-y-1 text-[10px] font-mono">
              <EventRow
                label="kubectl"
                color="slate"
                active={submitted}
                msg={submitted ? 'POST /api/v1/.../pods (sent)' : 'idle (file local only)'}
              />
              <EventRow
                label="apiserver"
                color="cyan"
                active={submitted}
                msg={submitted ? (stored ? 'validated → wrote to etcd' : 'authn / authz / admission') : 'waiting for request'}
              />
              <EventRow
                label="etcd"
                color="emerald"
                active={stored}
                msg={stored ? '/registry/pods/default/web stored (resourceVersion bumped)' : 'no record yet'}
              />
              <EventRow
                label="controller"
                color="amber"
                active={reconciling}
                msg={
                  flowStage === 'loop'
                    ? 'pod gone → diff +1 → reconcile (loop iteration)'
                    : (reconciling ? 'watch event → diff detected → triggering scheduler' : 'idle (waiting for event)')
                }
              />
              <EventRow
                label="kubelet"
                color="sky"
                active={actualPods.length > 0}
                msg={
                  actualPods.length > 0
                    ? `running ${actualPods.length} pod(s) on worker-1${flowStage === 'loop' ? ' (just restarted)' : ''}`
                    : 'no pods assigned'
                }
              />
            </div>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-cyan-300"></span>desired</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-sky-300"></span>actual</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-yellow-300"></span>reconciling</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-400"></span>in sync</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // EventRow — 컴포넌트별 활성/비활성 + 메시지
    // ─────────────────────────────────────────────────────
    function EventRow({ label, color, active, msg }) {
      const colorMap = {
        slate:   { dot: 'bg-slate-400',   text: 'text-slate-600',   tag: 'bg-slate-200 text-slate-700' },
        cyan:    { dot: 'bg-cyan-500',    text: 'text-cyan-800',    tag: 'bg-cyan-200 text-cyan-800' },
        emerald: { dot: 'bg-emerald-500', text: 'text-emerald-800', tag: 'bg-emerald-200 text-emerald-800' },
        amber:   { dot: 'bg-amber-500',   text: 'text-amber-800',   tag: 'bg-amber-200 text-amber-800' },
        sky:     { dot: 'bg-sky-500',     text: 'text-sky-800',     tag: 'bg-sky-200 text-sky-800' },
      };
      const c = colorMap[color];
      return (
        <div className={`flex items-center gap-2 ${active ? '' : 'opacity-40'}`}>
          <span
            className={`inline-block w-2 h-2 rounded-full ${active ? c.dot : 'bg-slate-300'} ${active ? 'animate-pulse' : ''}`}
            aria-hidden="true"
          />
          <span className={`px-1.5 py-0.5 rounded text-[9px] font-bold ${active ? c.tag : 'bg-slate-100 text-slate-400'} w-20 text-center`}>
            {label}
          </span>
          <span className={active ? c.text : 'text-slate-400'}>{msg}</span>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + 라인 번호
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-cyan-500/10 border-l-2 border-cyan-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. K8s 기본기 &gt; Chapter 2. 클러스터 구조</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">선언적 매니페스트 (YAML)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">desired state vs actual state — kubectl apply가 reconciliation loop를 어떻게 돌리나</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane dataState={step.dataState} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-cyan-50 border-2 border-cyan-300 rounded-xl p-3 text-sm text-cyan-900">
                💡 Part I 4/4 완성! 다음 Part II — Pod 위에 쌓는 워크로드(Deployment / StatefulSet / DaemonSet / Job)를 본다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-cyan-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-cyan-600 text-white hover:bg-cyan-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-2-1.html" className="text-slate-500 hover:text-slate-700">&larr; I-2-1 Cluster, Node, Control Plane</a>
              <a href="../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">허브로 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
