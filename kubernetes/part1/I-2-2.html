<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — 선언적 매니페스트 (YAML)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    I-2-2. 선언적 매니페스트 (YAML)
    학습 목표: kubectl apply -f가 왜 강력한지 (idempotent + 차이만 적용).
    핵심 비유: "주문서" — 명령형(매번 새 명령)이 아닌 선언형(완성품 그림 한 장)
    구조: 4단계 (명령형 한계 / YAML 4 핵심 필드 / kubectl apply 흐름 / idempotent + 차이 적용)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 명령형 — 매번 다른 명령',
        desc: 'kubectl run / kubectl scale / kubectl set image처럼 한 번에 하나씩 명령. 매번 "지금 상태"를 외운 후 다음 명령. 환경별 재현이 어렵고, git에 기록도 안 남는다. "주방장에게 조리법을 매번 다시 말하는 식".',
        block: {
          kind: 'shell',
          code: `# 명령형 — 한 번에 하나씩
$ kubectl run web --image=myapp:v1
$ kubectl scale deployment/web --replicas=3
$ kubectl set image deployment/web app=myapp:v2
$ kubectl expose deployment/web --port=80

# 단점
- git에 기록 X (어떤 명령을 쳤는지 흔적 없음)
- 환경 재현 어려움 (3분 동안 친 명령 5개?)
- 협업 불편 — "지금 어떤 상태?"를 매번 확인
- "원하는 상태"가 어디에도 없음

# → 선언적 매니페스트로 (YAML)`,
        },
        focus: 'imperative',
      },
      {
        title: 'Step 2. YAML 매니페스트 — 4 핵심 필드',
        desc: '모든 K8s 리소스 YAML은 4 필드 — apiVersion / kind / metadata / spec. 사용자가 "원하는 상태(spec)"만 선언하면 K8s가 알아서 도달. "주문서에 완성품 그림 한 장 던지기".',
        block: {
          kind: 'yaml',
          code: `apiVersion: apps/v1        # 1. 어느 버전 API
kind: Deployment           # 2. 무슨 종류
metadata:                  # 3. 식별 정보
  name: web
  namespace: default
  labels:
    app: web
spec:                      # 4. 원하는 상태 (핵심!)
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: app
          image: myapp:v1
          ports:
            - containerPort: 8080

# 4 필드만 알면 모든 K8s 리소스 작성 가능
# (Pod, Service, Ingress, ConfigMap... 다 같은 구조)`,
        },
        focus: 'yaml',
      },
      {
        title: 'Step 3. kubectl apply — 차이만 적용',
        desc: 'kubectl apply -f 명령은 매니페스트의 "원하는 상태"와 클러스터의 "현재 상태"를 비교해 차이만 적용. 같은 yaml을 100번 apply해도 결과 동일. 새 환경에서도 한 줄로 재현.',
        block: {
          kind: 'shell',
          code: `# 처음 적용 — 생성
$ kubectl apply -f deployment.yaml
deployment.apps/web created

# 같은 파일 다시 적용 — 변경 없음
$ kubectl apply -f deployment.yaml
deployment.apps/web unchanged

# 파일 수정 (replicas: 3 → 5) 후 다시
$ kubectl apply -f deployment.yaml
deployment.apps/web configured       ← 차이만 적용

# 새 클러스터에서도 한 줄로
$ kubectl apply -f .
deployment.apps/web created
service/web created
configmap/app-config created
ingress.networking.k8s.io/web created`,
        },
        focus: 'apply',
      },
      {
        title: 'Step 4. idempotent + 차이 = 운영 자동화의 핵심',
        desc: 'idempotent(여러 번 적용해도 결과 동일) + diff(변경분만 처리) 두 특성이 GitOps / CI/CD / 클러스터 복구의 기반. yaml 파일을 git에 커밋 → CI/CD가 apply → 일관된 상태 유지. 클러스터를 새로 만들어도 yaml만 있으면 즉시 복구.',
        block: {
          kind: 'shell',
          code: `# GitOps 패턴 (ArgoCD, Flux 등)
git push manifests/         # YAML 변경 push
  ↓
ArgoCD 감지 → kubectl apply 자동 실행
  ↓
클러스터 상태 = git 상태 (selfheal)

# CI/CD 패턴
deploy.yml (GitHub Actions):
  - kubectl apply -f manifests/
  → 같은 명령이 dev/staging/prod에 모두 통함

# 재해 복구
$ kubectl get all -o yaml > backup.yaml   # 백업
# (재해)
$ kubectl apply -f backup.yaml             # 즉시 복구

# 핵심
- 명령형 = "지금 무엇을 해라"  (운영 어려움)
- 선언적 = "이렇게 있어야 한다"  (운영 자동화)`,
        },
        focus: 'idempotent',
      },
    ];

    const KIND_STYLE = {
      shell: { label: 'Bash', textColor: '#86efac' },
      yaml:  { label: 'YAML', textColor: '#fde68a' },
    };

    const STAGES = [
      { key: 'imperative', emoji: '🗣️', name: '명령형',          note: '매번 다른 명령' },
      { key: 'yaml',       emoji: '📜', name: 'YAML 4필드',      note: 'apiVersion/kind/metadata/spec' },
      { key: 'apply',      emoji: '🔧', name: 'kubectl apply',    note: '차이만 적용' },
      { key: 'idempotent', emoji: '🔁', name: 'idempotent',       note: 'GitOps 기반' },
    ];

    function ManifestDiagram({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">📜 주문서 (선언적 매니페스트)</div>
          <div className="grid grid-cols-4 gap-2">
            {STAGES.map((s) => {
              const isActive = focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-sky-100 border-2 border-sky-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{s.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{s.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{s.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">선언적 매니페스트 (YAML)</h1>
                <p className="text-sm text-slate-500 mt-1">주문서 — 명령형 → 선언형 → idempotent → GitOps</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <ManifestDiagram focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'idempotent' && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 mb-6 text-xs text-emerald-900">
                🎉 Part I 4/4 완성! 이제 Part II로 넘어가서 Pod 위에 쌓는 워크로드(Deployment/StatefulSet/DaemonSet/Job)를 본다
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
