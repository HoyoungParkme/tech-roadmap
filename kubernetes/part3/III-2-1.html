    // ─────────────────────────────────────────────────────
    // 노드 색상 매핑 (정적 Tailwind — purge 안전)
    //   SVG는 fill 속성을 직접 받으므로 hex 사용
    // ─────────────────────────────────────────────────────
    const NODE_FILL = {
      sky:    { bg: '#e0f2fe', border: '#0284c7', text: '#075985' },
      cyan:   { bg: '#cffafe', border: '#0891b2', text: '#155e75' },
      violet: { bg: '#ede9fe', border: '#7c3aed', text: '#5b21b6' },
      amber:  { bg: '#fef3c7', border: '#d97706', text: '#92400e' },
      red:    { bg: '#fee2e2', border: '#dc2626', text: '#991b1b' },
    };

    // 배너 스타일
    const BANNER_STYLE = {
      warn: { bg: 'bg-red-50',     border: 'border-red-300',     text: 'text-red-800',     icon: '⚠️' },
      info: { bg: 'bg-slate-50',   border: 'border-slate-300',   text: 'text-slate-700',   icon: '🚧' },
      good: { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-800', icon: '✅' },
    };

    // ─────────────────────────────────────────────────────
    // SVG 화살표 — 두 노드를 잇는 직선 + 화살촉 + 라벨
    //   허용=초록 실선, 차단=빨강 + ✕ 마크
    // ─────────────────────────────────────────────────────
    function EdgeLine({ edge, state }) {
      const from = NODES.find((n) => n.key === edge.from);
      const to   = NODES.find((n) => n.key === edge.to);
      if (!from || !to) return null;

      // Pod 박스 한 면(반지름) 만큼 끝점 안쪽으로 — 박스 R = 36
      const R = 38;
      const dx = to.x - from.x;
      const dy = to.y - from.y;
      const len = Math.sqrt(dx * dx + dy * dy);
      const ux = dx / len;
      const uy = dy / len;
      const x1 = from.x + ux * R;
      const y1 = from.y + uy * R;
      const x2 = to.x   - ux * R;
      const y2 = to.y   - uy * R;

      const mx = (x1 + x2) / 2;
      const my = (y1 + y2) / 2;

      const isAllow = state === 'allow';
      const stroke  = isAllow ? '#10b981' : '#ef4444';
      const opacity = isAllow ? 1 : 0.85;

      return (
        <g opacity={opacity}>
          <line
            x1={x1} y1={y1} x2={x2} y2={y2}
            stroke={stroke}
            strokeWidth={isAllow ? 2.5 : 2}
            strokeDasharray={isAllow ? '0' : '6 4'}
            markerEnd={isAllow ? 'url(#arrow-allow)' : 'url(#arrow-block)'}
          />
          {/* 차단 시 중앙에 X 표시 */}
          {!isAllow && (
            <g transform={`translate(${mx}, ${my})`}>
              <circle r={9} fill="#fee2e2" stroke="#ef4444" strokeWidth={1.5} />
              <text
                x={0} y={0}
                textAnchor="middle" dominantBaseline="central"
                fontSize={11} fontWeight="bold" fill="#dc2626"
              >✕</text>
            </g>
          )}
          {/* 라벨 */}
          <text
            x={mx} y={my - (isAllow ? 8 : 18)}
            textAnchor="middle"
            fontSize={9}
            fontFamily="ui-monospace, monospace"
            fill={isAllow ? '#047857' : '#991b1b'}
            fontWeight="bold"
          >
            {edge.label}
          </text>
        </g>
      );
    }

    // ─────────────────────────────────────────────────────
    // SVG Pod 박스 노드
    // ─────────────────────────────────────────────────────
    function PodNode({ node, dimmed }) {
      const c = NODE_FILL[node.color];
      const w = 76, h = 60;
      return (
        <g transform={`translate(${node.x - w / 2}, ${node.y - h / 2})`} opacity={dimmed ? 0.45 : 1}>
          <rect
            width={w} height={h} rx={10} ry={10}
            fill={c.bg} stroke={c.border} strokeWidth={2}
          />
          <text x={w / 2} y={20} textAnchor="middle" fontSize={16}>{node.emoji}</text>
          <text
            x={w / 2} y={37}
            textAnchor="middle"
            fontSize={11} fontWeight="bold"
            fill={c.text}
            fontFamily="ui-monospace, monospace"
          >{node.label}</text>
          <text
            x={w / 2} y={50}
            textAnchor="middle"
            fontSize={8}
            fill="#64748b"
          >{node.sub}</text>
        </g>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — Pod 그래프 SVG
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const allowCount = Object.values(step.edges).filter((s) => s === 'allow').length;
      const blockCount = Object.values(step.edges).filter((s) => s === 'block').length;
      const banner = BANNER_STYLE[step.bannerKind];

      // 점선 정책 영역 — namespace 전체를 감싸는 박스
      const POLICY_BOX = { x: 30, y: 30, w: 450, h: 200 };

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🛡️ Pod 통신 그래프 (default ns)</h2>
            <div className="flex gap-1.5 text-[10px] font-mono">
              <span className="px-1.5 py-0.5 rounded bg-emerald-100 text-emerald-700 font-bold">
                ✓ 허용 {allowCount}
              </span>
              <span className="px-1.5 py-0.5 rounded bg-red-100 text-red-700 font-bold">
                ✕ 차단 {blockCount}
              </span>
            </div>
          </div>

          {/* SVG 그래프 */}
          <div className="bg-slate-50 rounded-lg border border-slate-200 overflow-hidden">
            <svg
              viewBox="0 0 510 270"
              className="w-full h-auto"
              role="img"
              aria-label="Pod 통신 그래프"
            >
              <defs>
                <marker
                  id="arrow-allow"
                  viewBox="0 0 10 10" refX={8} refY={5}
                  markerWidth={6} markerHeight={6} orient="auto-start-reverse"
                >
                  <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
                </marker>
                <marker
                  id="arrow-block"
                  viewBox="0 0 10 10" refX={8} refY={5}
                  markerWidth={6} markerHeight={6} orient="auto-start-reverse"
                >
                  <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
                </marker>
                <pattern id="grid-bg" width={20} height={20} patternUnits="userSpaceOnUse">
                  <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e2e8f0" strokeWidth={0.5} />
                </pattern>
              </defs>

              {/* 배경 그리드 */}
              <rect width="100%" height="100%" fill="url(#grid-bg)" />

              {/* 점선 NetworkPolicy 영역 */}
              {step.policyArea === 'all' && (
                <g>
                  <rect
                    x={POLICY_BOX.x} y={POLICY_BOX.y}
                    width={POLICY_BOX.w} height={POLICY_BOX.h}
                    fill="rgba(6, 182, 212, 0.05)"
                    stroke="#0891b2"
                    strokeWidth={2}
                    strokeDasharray="8 5"
                    rx={12}
                  />
                  <text
                    x={POLICY_BOX.x + 10} y={POLICY_BOX.y + 18}
                    fontSize={10}
                    fontFamily="ui-monospace, monospace"
                    fontWeight="bold"
                    fill="#0e7490"
                  >
                    🔒 NetworkPolicy 적용 영역 (default-deny + allow rules)
                  </text>
                </g>
              )}

              {/* 엣지 (먼저 — 노드 아래) */}
              {EDGE_LIST.map((edge) => {
                const k = `${edge.from}→${edge.to}`;
                const state = step.edges[k];
                if (!state) return null;
                return <EdgeLine key={k} edge={edge} state={state} />;
              })}

              {/* 노드 */}
              {NODES.map((n) => (
                <PodNode key={n.key} node={n} dimmed={false} />
              ))}
            </svg>
          </div>

          {/* 상태 배너 */}
          <div className={`mt-3 p-2.5 rounded-lg border-2 ${banner.bg} ${banner.border}`}>
            <div className={`flex items-center gap-2 text-sm font-bold ${banner.text}`}>
              <span>{banner.icon}</span>
              <span>{step.warningBanner}</span>
            </div>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="inline-block w-5 h-0.5 bg-emerald-500"></span>
              허용 (실선)
            </span>
            <span className="flex items-center gap-1">
              <span className="inline-block w-5 h-0.5 border-t-2 border-dashed border-red-500"></span>
              차단 (점선 + ✕)
            </span>
            <span className="flex items-center gap-1">
              <span className="inline-block w-3 h-3 rounded border-2 border-dashed border-cyan-600 bg-cyan-50"></span>
              정책 적용 영역
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-300 ml-2 font-mono bg-[#282c34] px-2 py-0.5 rounded-t border-t border-l border-r border-slate-700 -mb-2">
              {code.filename}
            </span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-cyan-500/15 border-l-2 border-cyan-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">
                curriculum III-2-1
              </span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">
                  III
                </div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">
                    Part III. 네트워크 &amp; 보안 &gt; Chapter 2. 클러스터 보안 경계
                  </div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">NetworkPolicy</h1>
                  <p className="text-sm text-slate-500 mt-0.5">
                    방화벽 + 출입증 — default-deny → selector 기반 명시 허용 (제로트러스트)
                  </p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-cyan-50 border-2 border-cyan-300 rounded-xl p-3 text-sm text-cyan-900">
                💡 다음(III-2-2)에서는 <strong>Service 디스커버리 (DNS)</strong> — Service 이름이 어떻게 자동으로 IP로 해석되는지 (사내 전화번호부 비유)
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-cyan-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-cyan-600 text-white hover:bg-cyan-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-1-2.html" className="text-slate-500 hover:text-slate-700">
                &larr; III-1-2 Service
              </a>
              <a href="./III-2-2.html" className="text-cyan-700 hover:text-cyan-900 font-medium">
                III-2-2 Service 디스커버리 (DNS) &rarr;
              </a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
