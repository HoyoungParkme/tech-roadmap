<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — Ingress (HTTP 라우팅)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    III-1-2. Ingress (HTTP 라우팅)
    학습 목표: 도메인/경로 기반 라우팅과 TLS 종료를 한 곳에서 처리하는 패턴.
    핵심 비유: "안내 데스크" — 손님(요청)을 도메인/용건(경로)별 부서로 안내
    구조: 4단계 (LoadBalancer N개 / 안내 데스크 / 경로 분기 / TLS 종료)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. LoadBalancer N개의 한계 — 비용/관리 폭발',
        desc: '서비스마다 LoadBalancer를 두면 N개 클라우드 LB → 비용 N배 + 도메인/TLS 관리도 N개 분산. 100개 서비스면 LB 100개? 안 된다.',
        block: {
          kind: 'shell',
          code: `# 서비스마다 LoadBalancer = 비용 N배
kubectl get svc
# api-svc       LoadBalancer  203.0.113.10  443
# admin-svc     LoadBalancer  203.0.113.11  443
# blog-svc      LoadBalancer  203.0.113.12  443
# ...
# 매번 다른 IP, 다른 인증서, 따로 도메인 연결

# 1개 진입점으로 묶고 싶다 → Ingress`,
        },
        focus: 'lb-many',
      },
      {
        title: 'Step 2. Ingress = 안내 데스크 (도메인 분기)',
        desc: 'LoadBalancer 1개 + Ingress Controller(nginx 등)이 받아서 도메인별로 분기. api.example.com / admin.example.com / blog.example.com 모두 같은 IP, 안내 데스크가 부서 안내.',
        block: {
          kind: 'yaml',
          code: `apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: site-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-svc
                port: { number: 80 }
    - host: admin.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-svc
                port: { number: 80 }`,
        },
        focus: 'host-routing',
      },
      {
        title: 'Step 3. 경로 분기 — /api / /admin 같은 도메인에서',
        desc: '같은 도메인(example.com) 안에서 경로별로 다른 서비스로. example.com/api → api-svc, example.com/admin → admin-svc. 단일 도메인 운영에 유리. 내부 부서 안내처럼 "방번호"로 분기.',
        block: {
          kind: 'yaml',
          code: `spec:
  ingressClassName: nginx
  rules:
    - host: example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-svc
                port: { number: 80 }
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: admin-svc
                port: { number: 80 }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-svc
                port: { number: 80 }`,
        },
        focus: 'path-routing',
      },
      {
        title: 'Step 4. TLS 종료 — 인증서 한 곳에서',
        desc: 'tls 섹션에 Secret 이름을 적으면 Ingress Controller가 HTTPS를 받아서 내부엔 HTTP로 전달(TLS termination). cert-manager + Let\\u0027s Encrypt와 결합하면 자동 갱신까지.',
        block: {
          kind: 'yaml',
          code: `apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: secure-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  ingressClassName: nginx
  tls:                                    # ← 핵심
    - hosts:
        - api.example.com
      secretName: api-tls                 # 인증서 보관 Secret
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-svc
                port: { number: 80 }

# https://api.example.com → Ingress가 TLS 풀고 → api-svc로 HTTP`,
        },
        focus: 'tls',
      },
    ];

    const KIND_STYLE = {
      yaml:  { label: 'YAML', textColor: '#fde68a' },
      shell: { label: 'Bash', textColor: '#86efac' },
    };

    // tone별 정적 Tailwind 클래스 매핑 (CDN 동적 클래스 회피)
    const TONE_STYLE = {
      sky:     { bg: 'bg-sky-50',     border: 'border-sky-300',     text: 'text-sky-800' },
      violet:  { bg: 'bg-violet-50',  border: 'border-violet-300',  text: 'text-violet-800' },
      emerald: { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-800' },
    };

    function IngressDiagram({ focus }) {
      // 정적 구성 — focus에 따른 도식 분기
      const showIngress = focus !== 'lb-many';
      const showHosts   = focus === 'host-routing';
      const showPaths   = focus === 'path-routing';
      const showTLS     = focus === 'tls';
      const showApiOnly = focus === 'tls';

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🛎️ 안내 데스크 (Ingress)</div>
          {!showIngress && (
            <div className="text-center text-xs text-slate-500 py-6">
              <div className="text-3xl mb-2">🌐 🌐 🌐</div>
              <div>LB 3개 따로 운영 — 도메인/인증서 분산</div>
            </div>
          )}
          {showIngress && (
            <div className="flex flex-col items-center gap-3">
              <div className="bg-indigo-100 border-2 border-indigo-400 rounded-lg px-4 py-2 text-xs font-bold text-indigo-800">
                🌐 LoadBalancer (1개) — 203.0.113.42
              </div>
              <div className="text-slate-400 text-sm">↓</div>
              <div className={`bg-amber-100 border-2 ${showTLS ? 'border-amber-500' : 'border-amber-400'} rounded-lg px-4 py-2 text-xs font-bold text-amber-800`}>
                🛎️ Ingress {showTLS && '(TLS 종료 + HTTPS)'}
              </div>
              <div className="text-slate-400 text-sm">↓</div>
              <div className="grid grid-cols-3 gap-2">
                {showHosts && [
                  { name: 'api.example.com → api-svc', tone: 'sky' },
                  { name: 'admin.example.com → admin-svc', tone: 'violet' },
                  { name: 'blog.example.com → blog-svc', tone: 'emerald' },
                ].map((h, i) => {
                  const t = TONE_STYLE[h.tone];
                  return (
                    <div key={i} className={`${t.bg} border ${t.border} rounded-md px-2 py-1 text-[10px] ${t.text}`}>
                      {h.name}
                    </div>
                  );
                })}
                {showPaths && [
                  { name: 'example.com/api → api-svc', tone: 'sky' },
                  { name: 'example.com/admin → admin-svc', tone: 'violet' },
                  { name: 'example.com/ → web-svc', tone: 'emerald' },
                ].map((h, i) => {
                  const t = TONE_STYLE[h.tone];
                  return (
                    <div key={i} className={`${t.bg} border ${t.border} rounded-md px-2 py-1 text-[10px] ${t.text}`}>
                      {h.name}
                    </div>
                  );
                })}
                {showApiOnly && (() => {
                  const t = TONE_STYLE.sky;
                  return (
                    <div className={`col-span-3 ${t.bg} border ${t.border} rounded-md px-2 py-1 text-[10px] ${t.text}`}>
                      🔒 https://api.example.com → api-svc (TLS 종료)
                    </div>
                  );
                })()}
                {!showHosts && !showPaths && !showApiOnly && (
                  <div className="col-span-3 text-center text-[10px] text-slate-500">
                    Ingress 도입 — 도메인/경로 분기는 Step 2/3에서
                  </div>
                )}
              </div>
            </div>
          )}
          <p className="text-center text-[11px] text-slate-500 mt-3">
            {focus === 'lb-many' && 'LoadBalancer N개 → 비용/관리 폭발'}
            {focus === 'host-routing' && '단일 LB + 도메인 라우팅'}
            {focus === 'path-routing' && '단일 도메인 + 경로 라우팅'}
            {focus === 'tls' && 'TLS 종료 — 인증서 1곳 관리'}
          </p>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Ingress (HTTP 라우팅)</h1>
                <p className="text-sm text-slate-500 mt-1">안내 데스크 — 도메인/경로별 분기 + TLS 종료</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <IngressDiagram focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'tls' && (
              <div className="bg-indigo-50 border-2 border-indigo-300 rounded-xl p-3 mb-6 text-xs text-indigo-900">
                💡 다음(III-2-1)에서는 클러스터 안에서 Pod 간 트래픽 통제하는 NetworkPolicy를 본다 — 방화벽 비유
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
