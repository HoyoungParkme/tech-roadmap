  <!--
    III-1-2. Ingress — HTTP 라우팅 / host·path 기반 / TLS 종단
    학습 목표: Service N개 위에 Ingress 1개를 두어 LB 비용을 줄이고, host/path 라우팅과
              TLS 종단을 한 곳에서 처리하는 패턴을 5단계로 시뮬레이션한다.
    핵심 비유: "안내 데스크" — 외부 손님(트래픽)을 도메인/용건(host/path)으로 분기
    패턴: fastapi v1 — 좌(LiveDataPane: 라우팅 트리 + 트래픽 애니메이션) / 우(VSCode CodeViewer)
    색상: cyan
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 (5 STEPS)
    //   각 step의 dataState는 좌측 LiveDataPane이 읽음
    //   lbCount     : 외부 LoadBalancer 개수
    //   ingress     : Ingress Controller 표시 여부
    //   tls         : TLS 종단 여부
    //   routes      : [{ match, kind('host'|'path'|'tls'), service, color }]
    //   trafficPath : [노드 키 시퀀스] — 어느 경로로 흐르는지 애니메이션
    //   services    : [{ key, name, host, color }] — 우측 박스
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Ingress 없으면 — 서비스마다 LoadBalancer = 비용 N배',
        desc: '서비스마다 type=LoadBalancer를 두면 클라우드 LB가 N개 생성된다. 도메인/인증서/IP가 따로 분산되고 월 비용도 LB 단가 × N. 100개 서비스면 LB 100개? 비용·운영 폭발.',
        dataState: {
          lbCount: 3,
          ingress: false,
          tls: false,
          routes: [],
          services: [
            { key: 'api',   name: 'api-svc',   host: '203.0.113.10', color: 'cyan' },
            { key: 'admin', name: 'admin-svc', host: '203.0.113.11', color: 'violet' },
            { key: 'web',   name: 'web-svc',   host: '203.0.113.12', color: 'emerald' },
          ],
          trafficPath: ['client', 'lb-0', 'svc-0'],
          warn: 'LB 3개 → 월 비용 3배 + 도메인/인증서 따로 관리',
        },
        code: {
          lang: 'yaml',
          filename: 'svc-lb-each.yaml',
          lines: [
            '# 서비스마다 type=LoadBalancer — 비용 N배의 함정',
            'apiVersion: v1',
            'kind: Service',
            'metadata: { name: api-svc }',
            'spec:',
            '  type: LoadBalancer        # ← 클라우드 LB 1개 생성',
            '  selector: { app: api }',
            '  ports: [{ port: 80, targetPort: 8080 }]',
            '---',
            'apiVersion: v1',
            'kind: Service',
            'metadata: { name: admin-svc }',
            'spec:',
            '  type: LoadBalancer        # ← 또 1개',
            '  selector: { app: admin }',
            '  ports: [{ port: 80, targetPort: 8080 }]',
            '---',
            'apiVersion: v1',
            'kind: Service',
            'metadata: { name: web-svc }',
            'spec:',
            '  type: LoadBalancer        # ← 또 1개 (총 3개)',
            '  selector: { app: web }',
            '  ports: [{ port: 80, targetPort: 8080 }]',
            '',
            '# kubectl get svc',
            '#  api-svc    LoadBalancer  203.0.113.10  80:31000/TCP',
            '#  admin-svc  LoadBalancer  203.0.113.11  80:31001/TCP',
            '#  web-svc    LoadBalancer  203.0.113.12  80:31002/TCP',
            '#',
            '# 문제:',
            '#  - LB 3개 = 월 청구서 × 3',
            '#  - IP 3개 / 도메인 3개 / 인증서 3개 따로',
            '#  - 100개 서비스면 LB 100개?  안 된다.',
          ],
          highlight: [6, 14, 21, 31, 32, 33],
        },
      },
      {
        title: 'Step 2. Ingress 도입 — LB 1개로 다수 서비스 라우팅',
        desc: 'LoadBalancer는 Ingress Controller(nginx/traefik 등) 1개에만 둔다. 외부 트래픽은 모두 이 1개 진입점으로 들어오고, 안에서 Ingress 규칙에 따라 Service로 분배된다. LB 비용은 1개분.',
        dataState: {
          lbCount: 1,
          ingress: true,
          tls: false,
          routes: [
            { match: '(미설정)', kind: 'host', service: '?', color: 'slate' },
          ],
          services: [
            { key: 'api',   name: 'api-svc',   host: 'ClusterIP', color: 'cyan' },
            { key: 'admin', name: 'admin-svc', host: 'ClusterIP', color: 'violet' },
            { key: 'web',   name: 'web-svc',   host: 'ClusterIP', color: 'emerald' },
          ],
          trafficPath: ['client', 'lb', 'ingress'],
          warn: 'LB 1개로 통일 — 라우팅 규칙은 다음 단계에서',
        },
        code: {
          lang: 'yaml',
          filename: 'ingress.yaml',
          lines: [
            '# Ingress Controller만 LoadBalancer로 노출',
            '# 다른 Service는 모두 ClusterIP (내부 전용)로 변경',
            'apiVersion: v1',
            'kind: Service',
            'metadata: { name: api-svc }',
            'spec:',
            '  type: ClusterIP            # ← 내부 전용으로 변경',
            '  selector: { app: api }',
            '  ports: [{ port: 80, targetPort: 8080 }]',
            '---',
            '# Ingress 자원 — 아직 규칙 없음 (다음 단계에서 채움)',
            'apiVersion: networking.k8s.io/v1',
            'kind: Ingress',
            'metadata:',
            '  name: site-ingress',
            'spec:',
            '  ingressClassName: nginx    # nginx-ingress-controller 사용',
            '  rules: []                  # ← 비어 있음',
            '',
            '# 진입 구조',
            '#  client → 클라우드 LB(1개) → ingress-nginx Pod → ?',
            '#                                                ↑',
            '#                                       라우팅 규칙 필요',
            '',
            '# 핵심 변화',
            '#  before: 서비스마다 LB → 비용 × N',
            '#  after : LB 1개 + Ingress가 분기 → 비용 × 1',
          ],
          highlight: [7, 17, 18],
        },
      },
      {
        title: 'Step 3. host 기반 라우팅 — 도메인별로 다른 Service',
        desc: 'rules[].host에 도메인을 적으면 Ingress가 Host 헤더를 보고 분기한다. api.example.com → api-svc, web.example.com → web-svc. 같은 LB IP를 여러 도메인이 공유 — 가상 호스팅과 같은 패턴.',
        dataState: {
          lbCount: 1,
          ingress: true,
          tls: false,
          routes: [
            { match: 'api.example.com',   kind: 'host', service: 'api-svc',   color: 'cyan' },
            { match: 'admin.example.com', kind: 'host', service: 'admin-svc', color: 'violet' },
            { match: 'web.example.com',   kind: 'host', service: 'web-svc',   color: 'emerald' },
          ],
          services: [
            { key: 'api',   name: 'api-svc',   host: 'api.example.com',   color: 'cyan' },
            { key: 'admin', name: 'admin-svc', host: 'admin.example.com', color: 'violet' },
            { key: 'web',   name: 'web-svc',   host: 'web.example.com',   color: 'emerald' },
          ],
          trafficPath: ['client', 'lb', 'ingress', 'route-0', 'svc-0'],
          warn: 'Host 헤더로 분기 — 도메인 3개가 같은 IP 공유',
        },
        code: {
          lang: 'yaml',
          filename: 'ingress.yaml',
          lines: [
            '# host 기반 라우팅 — 도메인별 Service 매핑',
            'apiVersion: networking.k8s.io/v1',
            'kind: Ingress',
            'metadata:',
            '  name: site-ingress',
            'spec:',
            '  ingressClassName: nginx',
            '  rules:',
            '    - host: api.example.com           # ← 도메인 1',
            '      http:',
            '        paths:',
            '          - path: /',
            '            pathType: Prefix',
            '            backend:',
            '              service:',
            '                name: api-svc',
            '                port: { number: 80 }',
            '    - host: admin.example.com         # ← 도메인 2',
            '      http:',
            '        paths:',
            '          - path: /',
            '            pathType: Prefix',
            '            backend:',
            '              service:',
            '                name: admin-svc',
            '                port: { number: 80 }',
            '    - host: web.example.com           # ← 도메인 3',
            '      http:',
            '        paths:',
            '          - path: /',
            '            pathType: Prefix',
            '            backend:',
            '              service:',
            '                name: web-svc',
            '                port: { number: 80 }',
            '',
            '# DNS는 3개 도메인 모두 같은 LB IP를 가리킴',
            '#   api.example.com    A  203.0.113.42',
            '#   admin.example.com  A  203.0.113.42',
            '#   web.example.com    A  203.0.113.42',
            '#',
            '# Ingress가 Host 헤더로 어디로 보낼지 결정',
          ],
          highlight: [9, 18, 27],
        },
      },
      {
        title: 'Step 4. path 기반 라우팅 — 같은 도메인, 경로별 분기',
        desc: '단일 도메인(example.com) 안에서 path로 분기. /api → api-svc, /web → web-svc, / → web-svc. 모놀리스를 점진적으로 마이크로서비스로 쪼갤 때 흔한 패턴 — URL 구조는 그대로 유지된다.',
        dataState: {
          lbCount: 1,
          ingress: true,
          tls: false,
          routes: [
            { match: 'example.com/api',   kind: 'path', service: 'api-svc',   color: 'cyan' },
            { match: 'example.com/admin', kind: 'path', service: 'admin-svc', color: 'violet' },
            { match: 'example.com/',      kind: 'path', service: 'web-svc',   color: 'emerald' },
          ],
          services: [
            { key: 'api',   name: 'api-svc',   host: '/api/*',   color: 'cyan' },
            { key: 'admin', name: 'admin-svc', host: '/admin/*', color: 'violet' },
            { key: 'web',   name: 'web-svc',   host: '/* (default)', color: 'emerald' },
          ],
          trafficPath: ['client', 'lb', 'ingress', 'route-0', 'svc-0'],
          warn: 'path Prefix 매칭 — 더 긴 경로가 우선',
        },
        code: {
          lang: 'yaml',
          filename: 'ingress.yaml',
          lines: [
            '# path 기반 라우팅 — 단일 도메인 + 경로 분기',
            'apiVersion: networking.k8s.io/v1',
            'kind: Ingress',
            'metadata:',
            '  name: site-ingress',
            '  annotations:',
            '    # /api 호출 시 백엔드에는 /api 떼고 전달 (선택)',
            '    nginx.ingress.kubernetes.io/rewrite-target: /$2',
            'spec:',
            '  ingressClassName: nginx',
            '  rules:',
            '    - host: example.com',
            '      http:',
            '        paths:',
            '          - path: /api(/|$)(.*)         # ← 더 긴 경로 먼저',
            '            pathType: Prefix',
            '            backend:',
            '              service:',
            '                name: api-svc',
            '                port: { number: 80 }',
            '          - path: /admin(/|$)(.*)',
            '            pathType: Prefix',
            '            backend:',
            '              service:',
            '                name: admin-svc',
            '                port: { number: 80 }',
            '          - path: /                     # ← default 경로',
            '            pathType: Prefix',
            '            backend:',
            '              service:',
            '                name: web-svc',
            '                port: { number: 80 }',
            '',
            '# 트래픽 매칭 예시',
            '#   GET example.com/api/users   → api-svc',
            '#   GET example.com/admin/login → admin-svc',
            '#   GET example.com/products    → web-svc (default)',
            '#',
            '# pathType',
            '#   Prefix : 경로 시작이 일치 (대부분 사용)',
            '#   Exact  : 경로가 정확히 일치',
          ],
          highlight: [15, 21, 27],
        },
      },
      {
        title: 'Step 5. TLS 종단 — Ingress가 인증서 처리, 내부는 평문',
        desc: 'tls 섹션에 Secret을 지정하면 Ingress Controller가 HTTPS를 받아 풀고, 내부 Service에는 HTTP로 전달(TLS termination). cert-manager + Let’s Encrypt로 자동 갱신까지. 인증서 관리 1곳으로 집중.',
        dataState: {
          lbCount: 1,
          ingress: true,
          tls: true,
          routes: [
            { match: 'api.example.com',   kind: 'tls',  service: 'api-svc',   color: 'cyan' },
            { match: 'admin.example.com', kind: 'tls',  service: 'admin-svc', color: 'violet' },
            { match: 'web.example.com',   kind: 'tls',  service: 'web-svc',   color: 'emerald' },
          ],
          services: [
            { key: 'api',   name: 'api-svc',   host: 'HTTP 내부', color: 'cyan' },
            { key: 'admin', name: 'admin-svc', host: 'HTTP 내부', color: 'violet' },
            { key: 'web',   name: 'web-svc',   host: 'HTTP 내부', color: 'emerald' },
          ],
          trafficPath: ['client', 'lb', 'ingress', 'route-0', 'svc-0'],
          warn: '🔒 HTTPS 종단 — 외부 TLS / 내부 평문',
        },
        code: {
          lang: 'yaml',
          filename: 'ingress.yaml',
          lines: [
            '# TLS 종단 — Ingress가 인증서 처리, 내부는 HTTP',
            'apiVersion: networking.k8s.io/v1',
            'kind: Ingress',
            'metadata:',
            '  name: site-ingress',
            '  annotations:',
            '    cert-manager.io/cluster-issuer: letsencrypt-prod',
            'spec:',
            '  ingressClassName: nginx',
            '  tls:                            # ← 핵심',
            '    - hosts:',
            '        - api.example.com',
            '        - admin.example.com',
            '        - web.example.com',
            '      secretName: site-tls        # 인증서 보관 Secret',
            '  rules:',
            '    - host: api.example.com',
            '      http:',
            '        paths:',
            '          - path: /',
            '            pathType: Prefix',
            '            backend:',
            '              service:',
            '                name: api-svc',
            '                port: { number: 80 }',
            '    - host: admin.example.com',
            '      http:',
            '        paths:',
            '          - path: /',
            '            pathType: Prefix',
            '            backend:',
            '              service:',
            '                name: admin-svc',
            '                port: { number: 80 }',
            '    - host: web.example.com',
            '      http:',
            '        paths:',
            '          - path: /',
            '            pathType: Prefix',
            '            backend:',
            '              service:',
            '                name: web-svc',
            '                port: { number: 80 }',
            '',
            '# 흐름',
            '#  https://api.example.com',
            '#    ↓  TLS 핸드셰이크 (Ingress가 인증서로 응답)',
            '#  Ingress가 평문 HTTP로 변환',
            '#    ↓  내부 ClusterIP',
            '#  api-svc:80 (평문 HTTP) → Pod',
            '#',
            '# cert-manager가 Let’s Encrypt에서 인증서 자동 발급/갱신',
            '# → 인증서 만료로 새벽에 깨어날 일 없음',
          ],
          highlight: [7, 10, 11, 12, 13, 14, 15],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 색상 스타일 — 정적 Tailwind 클래스 (purge 안전)
    //   서비스 색상 매핑:
    //     cyan    : api-svc   (메인 색상 — III-1-2 base)
    //     violet  : admin-svc
    //     emerald : web-svc
    //     slate   : 미설정 / placeholder
    //   각 토큰(bg/border/text/dot/line)을 정적으로 박아두어
    //   Tailwind CDN의 동적 클래스 누락 이슈를 방지한다.
    // ─────────────────────────────────────────────────────
    const COLOR_STYLE = {
      cyan:    { bg: 'bg-cyan-50',    border: 'border-cyan-400',    text: 'text-cyan-800',    dot: 'bg-cyan-500',    line: 'bg-cyan-400'    },
      violet:  { bg: 'bg-violet-50',  border: 'border-violet-400',  text: 'text-violet-800',  dot: 'bg-violet-500',  line: 'bg-violet-400'  },
      emerald: { bg: 'bg-emerald-50', border: 'border-emerald-400', text: 'text-emerald-800', dot: 'bg-emerald-500', line: 'bg-emerald-400' },
      slate:   { bg: 'bg-slate-50',   border: 'border-slate-300',   text: 'text-slate-600',   dot: 'bg-slate-400',   line: 'bg-slate-300'   },
    };

    // ─────────────────────────────────────────────────────
    // 라우팅 종류 표시용 라벨 — Step별 routes[].kind에서 참조
    //   host : Host 헤더 기반 (가상 호스팅과 동일 패턴)
    //   path : path Prefix 기반 (단일 도메인 분기)
    //   tls  : TLS 종단 + host 매칭 (HTTPS 처리 후 평문 전달)
    // ─────────────────────────────────────────────────────
    const ROUTE_KIND_LABEL = {
      host: 'Host 매칭',
      path: 'Path 매칭',
      tls:  'TLS 종단',
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 라우팅 트리 + 트래픽 흐름 애니메이션
    //   구성: client → LB(s) → Ingress → routes → services
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ state, stepIdx }) {
      // 트래픽 펄스 — 1.5초 주기로 client → ... → svc 순으로 점등
      const [pulseIdx, setPulseIdx] = useState(0);
      useEffect(() => {
        const path = state.trafficPath || [];
        if (path.length === 0) return;
        setPulseIdx(0);
        const t = setInterval(() => {
          setPulseIdx((p) => (p + 1) % path.length);
        }, 600);
        return () => clearInterval(t);
      }, [stepIdx, state.trafficPath]);

      const activeNode = (state.trafficPath || [])[pulseIdx];
      const isActive = (key) => activeNode === key;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🛎️ 안내 데스크 — Ingress 라우팅 트리</h2>
            <span className="text-[10px] text-slate-400 font-mono">live traffic · {state.lbCount} LB</span>
          </div>

          {/* ── 1) 클라이언트 ── */}
          <div className="flex justify-center mb-2">
            <div
              className={`px-3 py-1.5 rounded-lg text-xs font-bold border-2 transition-all duration-300 ${
                isActive('client')
                  ? 'bg-cyan-500 text-white border-cyan-600 scale-110 shadow-lg'
                  : 'bg-slate-100 text-slate-700 border-slate-300'
              }`}
            >
              🌐 client (외부 트래픽)
            </div>
          </div>

          <div className="flex justify-center"><span className="text-slate-300 text-xs">↓</span></div>

          {/* ── 2) LoadBalancer (Step 1: N개 / 그 외: 1개) ── */}
          {!state.ingress ? (
            <div className="grid grid-cols-3 gap-2 mb-2">
              {state.services.map((s, i) => {
                const c = COLOR_STYLE[s.color];
                const active = isActive(`lb-${i}`);
                return (
                  <div
                    key={s.key}
                    className={`rounded-lg border-2 px-2 py-2 text-center transition-all duration-300 ${
                      active ? `${c.bg} ${c.border} scale-105 shadow-md` : 'bg-slate-50 border-slate-200'
                    }`}
                  >
                    <div className={`text-[10px] font-bold ${active ? c.text : 'text-slate-500'}`}>🌐 LB</div>
                    <div className="text-[10px] font-mono text-slate-500 mt-0.5">{s.host}</div>
                  </div>
                );
              })}
            </div>
          ) : (
            <div className="flex justify-center mb-2">
              <div
                className={`px-3 py-1.5 rounded-lg text-xs font-bold border-2 transition-all duration-300 ${
                  isActive('lb')
                    ? 'bg-indigo-500 text-white border-indigo-600 scale-110 shadow-lg'
                    : 'bg-indigo-50 text-indigo-800 border-indigo-300'
                }`}
              >
                🌐 LoadBalancer (1개) · 203.0.113.42
              </div>
            </div>
          )}

          {state.ingress && (
            <>
              <div className="flex justify-center"><span className="text-slate-300 text-xs">↓</span></div>

              {/* ── 3) Ingress Controller ── */}
              <div className="flex justify-center mb-2">
                <div
                  className={`px-3 py-1.5 rounded-lg text-xs font-bold border-2 transition-all duration-300 ${
                    isActive('ingress')
                      ? 'bg-cyan-500 text-white border-cyan-700 scale-110 shadow-lg'
                      : (state.tls
                          ? 'bg-cyan-50 text-cyan-900 border-cyan-500'
                          : 'bg-cyan-50 text-cyan-800 border-cyan-300')
                  }`}
                >
                  {state.tls ? '🔒 ' : '🛎️ '}
                  Ingress Controller (nginx)
                  {state.tls && <span className="ml-1 text-[10px]">· TLS 종단</span>}
                </div>
              </div>

              <div className="flex justify-center"><span className="text-slate-300 text-xs">↓ 라우팅 규칙</span></div>

              {/* ── 4) Routes ── */}
              {state.routes && state.routes.length > 0 && (
                <div className="space-y-1.5 mb-2 px-2">
                  {state.routes.map((r, i) => {
                    const c = COLOR_STYLE[r.color] || COLOR_STYLE.slate;
                    const active = isActive(`route-${i}`) || isActive('route-0');
                    const isFirstActive = i === 0 && isActive('route-0');
                    return (
                      <div
                        key={i}
                        className={`flex items-center gap-2 rounded-md border-2 px-2 py-1.5 transition-all duration-300 ${c.bg} ${c.border} ${
                          isFirstActive ? 'scale-[1.02] shadow-md' : ''
                        }`}
                      >
                        <span className={`w-1.5 h-1.5 rounded-full ${c.dot} ${isFirstActive ? 'animate-ping' : ''}`} />
                        <span className={`text-[11px] font-mono ${c.text} flex-1 truncate`}>
                          {r.kind === 'tls' && '🔒 '}
                          {r.match}
                        </span>
                        <span className="text-slate-400 text-xs">→</span>
                        <span className={`text-[11px] font-bold ${c.text}`}>{r.service}</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </>
          )}

          <div className="flex justify-center"><span className="text-slate-300 text-xs">↓</span></div>

          {/* ── 5) Services & Pods ── */}
          <div className="grid grid-cols-3 gap-2">
            {state.services.map((s, i) => {
              const c = COLOR_STYLE[s.color];
              const active = isActive(`svc-${i}`) || (i === 0 && isActive('svc-0'));
              return (
                <div
                  key={s.key}
                  className={`rounded-lg border-2 p-2 text-center transition-all duration-300 ${c.bg} ${c.border} ${
                    active ? 'scale-105 shadow-md' : ''
                  }`}
                >
                  <div className={`text-[10px] font-bold ${c.text}`}>📦 {s.name}</div>
                  <div className="text-[9px] font-mono text-slate-500 mt-0.5 truncate">{s.host}</div>
                  <div className="flex justify-center gap-0.5 mt-1.5">
                    <span className={`w-1.5 h-1.5 rounded-full ${c.dot}`} />
                    <span className={`w-1.5 h-1.5 rounded-full ${c.dot}`} />
                    <span className={`w-1.5 h-1.5 rounded-full ${c.dot}`} />
                  </div>
                </div>
              );
            })}
          </div>

          {/* ── 경고/요약 ── */}
          <div className="mt-4 pt-3 border-t border-slate-100">
            <div className={`text-[11px] px-2 py-1.5 rounded-md ${
              state.tls ? 'bg-cyan-100 text-cyan-900' :
              state.lbCount > 1 ? 'bg-red-50 text-red-700' :
              'bg-cyan-50 text-cyan-800'
            }`}>
              {state.warn}
            </div>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-3 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-cyan-500"></span>api</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-violet-500"></span>admin</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-emerald-500"></span>web</span>
            <span className="ml-auto">🔵 활성 노드 = 트래픽 경유 중</span>
          </div>

          {/* 라우팅 종류 요약 — routes가 있을 때만 표시 */}
          {state.routes && state.routes.length > 0 && state.routes[0].kind !== 'host' && (
            <div className="mt-2 text-[10px] text-slate-400 font-mono">
              매칭 방식: {ROUTE_KIND_LABEL[state.routes[0].kind] || state.routes[0].kind}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + 라인 번호
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        codeRef.current.removeAttribute('data-highlighted');
        codeRef.current.className = `language-${code.lang}`;
        codeRef.current.textContent = code.lines.join('\n');
        window.hljs.highlightElement(codeRef.current);
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden source */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-cyan-500/10 border-l-2 border-cyan-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 네트워킹 &gt; Chapter 1. 외부 노출</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Ingress (HTTP 라우팅)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">안내 데스크 — host/path 라우팅 + TLS 종단</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane state={step.dataState} stepIdx={stepIdx} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 안내 */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-cyan-50 border-2 border-cyan-300 rounded-xl p-3 text-sm text-cyan-900">
                💡 다음(III-2-1)에서는 클러스터 안에서 Pod 간 트래픽을 통제하는 <strong>NetworkPolicy</strong> — 내부 방화벽 비유
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-cyan-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-cyan-600 text-white hover:bg-cyan-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; III-1-1 Service</a>
              <a href="../part3/III-2-1.html" className="text-cyan-700 hover:text-cyan-900 font-medium">III-2-1 NetworkPolicy &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
