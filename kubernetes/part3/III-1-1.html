<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — Service 4가지 타입</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    III-1-1. Service의 4가지 타입
    학습 목표: ClusterIP / NodePort / LoadBalancer / ExternalName 차이와 선택 기준을 안다.
    핵심 비유: "건물 출입문 4종" — 내부 전용 / 직원용 비상구 / 공식 정문 / 외부 주소표지판
    구조: 4단계 (ClusterIP / NodePort / LoadBalancer / ExternalName)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. ClusterIP — 클러스터 내부 전용 (기본값)',
        desc: 'Pod IP는 동적이라 직접 호출하면 깨진다. ClusterIP는 안정적인 가상 IP를 부여해 같은 클러스터 안 다른 Pod가 호출. 외부에서는 안 보이는 "내부 전용 출입문". Service의 default 타입.',
        block: {
          kind: 'yaml',
          code: `apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  type: ClusterIP        # 생략해도 default
  selector:
    app: web
  ports:
    - port: 80           # Service 노출 포트
      targetPort: 8080   # Pod의 컨테이너 포트

# 클러스터 내부에서만 접근
# curl http://web         (같은 namespace)
# curl http://web.default  (FQDN 단축)`,
        },
        focus: 'clusterip',
      },
      {
        title: 'Step 2. NodePort — 노드의 고정 포트 노출',
        desc: '모든 Worker 노드의 동일 포트(30000~32767)를 열어 외부 트래픽을 받는다. 개발/테스트에는 편하지만 production은 권장 X — IP가 노드별로 흩어지고 LoadBalancer 없이 안정성 떨어짐.',
        block: {
          kind: 'yaml',
          code: `apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080    # 모든 노드의 30080 열림

# 외부 접근
# curl http://<any-node-ip>:30080
# (3개 노드라면 3개 IP 모두 동일하게 응답)`,
        },
        focus: 'nodeport',
      },
      {
        title: 'Step 3. LoadBalancer — 클라우드 LB 연동',
        desc: '클라우드(AWS/GCP/Azure)에 자동으로 LoadBalancer를 프로비저닝하고 외부 IP를 발급. production 표준. 단일 진입점, 헬스체크, 분산까지 클라우드가 처리. 비용은 LB당 과금.',
        block: {
          kind: 'yaml',
          code: `apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  type: LoadBalancer
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 8080

# kubectl get svc
# NAME  TYPE          CLUSTER-IP    EXTERNAL-IP    PORT
# web   LoadBalancer  10.0.5.21     203.0.113.42   80:30080/TCP
#                                   ↑ 클라우드 발급`,
        },
        focus: 'loadbalancer',
      },
      {
        title: 'Step 4. ExternalName — 외부 DNS 별칭',
        desc: '클러스터 안에서 외부 DNS 이름을 부르고 싶을 때. Pod가 db.cluster.local로 호출하면 K8s가 db.example.com으로 해석해 외부 DB에 연결. 문지기 없는 "주소표지판" 역할. selector 없음.',
        block: {
          kind: 'yaml',
          code: `apiVersion: v1
kind: Service
metadata:
  name: legacy-db
spec:
  type: ExternalName
  externalName: db.example.com   # 외부 도메인

# Pod에서
# psql -h legacy-db ...
# → DNS가 db.example.com으로 자동 변환
# → 클라우드 RDS / 사내 레거시 DB 등에 매핑

# 코드 변경 없이 DB 이전 가능 (이름만 바꾸면 됨)`,
        },
        focus: 'externalname',
      },
    ];

    const KIND_STYLE = {
      yaml:  { label: 'YAML', textColor: '#fde68a' },
      shell: { label: 'Bash', textColor: '#86efac' },
    };

    // 4가지 Service 타입 카드 정적 매핑
    const SERVICE_TYPES = [
      { key: 'clusterip',    emoji: '🚪', name: 'ClusterIP',    desc: '내부 전용 (기본)' },
      { key: 'nodeport',     emoji: '🔓', name: 'NodePort',     desc: '노드 고정 포트' },
      { key: 'loadbalancer', emoji: '🌐', name: 'LoadBalancer', desc: '클라우드 LB' },
      { key: 'externalname', emoji: '🔗', name: 'ExternalName', desc: '외부 DNS 별칭' },
    ];

    function ServiceTypeCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🚪 Service 4가지 출입문</div>
          <div className="grid grid-cols-4 gap-2">
            {SERVICE_TYPES.map((t) => {
              const isActive = focus === t.key;
              return (
                <div
                  key={t.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-indigo-100 border-2 border-indigo-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{t.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{t.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{t.desc}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Service 4가지 타입</h1>
                <p className="text-sm text-slate-500 mt-1">건물 출입문 4종 — 내부 / 직원용 / 정문 / 주소표지판</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <ServiceTypeCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'externalname' && (
              <div className="bg-indigo-50 border-2 border-indigo-300 rounded-xl p-3 mb-6 text-xs text-indigo-900">
                💡 다음(III-1-2)에서는 LoadBalancer 위에 도메인/경로 라우팅을 더하는 Ingress를 본다 — 안내 데스크 비유
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
