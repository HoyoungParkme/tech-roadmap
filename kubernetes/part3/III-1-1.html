              {[100, 200, 300].map((cx, i) => (
                <g key={`np-${i}`}>
                  <rect x={cx - 18} y="172" width="36" height="14" rx="3" fill="#0891b2" />
                  <text x={cx} y="183" textAnchor="middle" fontSize="8" fill="white" fontFamily="monospace" fontWeight="bold">
                    :30080
                  </text>
                </g>
              ))}

              {/* 외부 → 모든 노드 화살표 */}
              <line x1="80" y1="66" x2="100" y2="172" stroke="#06b6d4" strokeWidth="2.5" markerEnd="url(#arrow-cyan)" />
              <line x1="80" y1="66" x2="200" y2="172" stroke="#06b6d4" strokeWidth="2.5" strokeDasharray="3 2" markerEnd="url(#arrow-cyan)" />
              <line x1="80" y1="66" x2="300" y2="172" stroke="#06b6d4" strokeWidth="2.5" strokeDasharray="3 2" markerEnd="url(#arrow-cyan)" />
              <text x="50" y="105" fontSize="9" className="fill-cyan-700" fontFamily="monospace" fontWeight="bold">curl :30080</text>

              {/* Service → Pod 화살표 */}
              <line x1="200" y1="164" x2="200" y2="195" stroke="#0891b2" strokeWidth="1.5" strokeDasharray="2 2" />
            </g>
          )}

          {/* ── Step 3: LoadBalancer ── */}
          {focus === 'loadbalancer' && (
            <g>
              {/* 클라우드 LB (클러스터 밖 위) */}
              <rect x="160" y="32" width="160" height="34" rx="6" fill="#fef3c7" stroke="#d97706" strokeWidth="2" />
              <text x="240" y="48" textAnchor="middle" fontSize="10" fill="#78350f" fontWeight="bold">
                ☁ Cloud LoadBalancer
              </text>
              <text x="240" y="60" textAnchor="middle" fontSize="9" fill="#92400e" fontFamily="monospace">
                203.0.113.42:80
              </text>

              {/* Service 박스 (LB → NodePort 묶음) */}
              <rect x="140" y="120" width="120" height="44" rx="8" fill="#06b6d4" stroke="#0e7490" strokeWidth="2" />
              <text x="200" y="138" textAnchor="middle" fontSize="11" fill="white" fontWeight="bold">
                LoadBalancer
              </text>
              <text x="200" y="155" textAnchor="middle" fontSize="9" fill="#ecfeff" fontFamily="monospace">
                NodePort 묶음 :30080
              </text>

              {/* 외부 클라이언트 → LB */}
              <line x1="140" y1="49" x2="160" y2="49" stroke="#0891b2" strokeWidth="2.5" markerEnd="url(#arrow-cyan)" />

              {/* LB → Service */}
              <line x1="240" y1="66" x2="200" y2="120" stroke="#0891b2" strokeWidth="2.5" markerEnd="url(#arrow-cyan)" />
              <text x="248" y="92" fontSize="9" className="fill-cyan-700" fontFamily="monospace" fontWeight="bold">자동 분산</text>

              {/* Service → Pod 3개 분산 */}
              <line x1="170" y1="164" x2="100" y2="195" stroke="#0891b2" strokeWidth="2" strokeDasharray="3 2" markerEnd="url(#arrow-cyan)" />
              <line x1="200" y1="164" x2="200" y2="195" stroke="#0891b2" strokeWidth="2" strokeDasharray="3 2" markerEnd="url(#arrow-cyan)" />
              <line x1="230" y1="164" x2="300" y2="195" stroke="#0891b2" strokeWidth="2" strokeDasharray="3 2" markerEnd="url(#arrow-cyan)" />
            </g>
          )}

          {/* ── Step 4: ExternalName ── */}
          {focus === 'externalname' && (
            <g>
              {/* Service 박스 (이름표 모양) */}
              <rect x="100" y="120" width="200" height="44" rx="8" fill="#06b6d4" stroke="#0e7490" strokeWidth="2" />
              <text x="200" y="138" textAnchor="middle" fontSize="11" fill="white" fontWeight="bold">
                Service: legacy-db (CNAME)
              </text>
              <text x="200" y="155" textAnchor="middle" fontSize="9" fill="#ecfeff" fontFamily="monospace">
                → db.example.com
              </text>

              {/* Pod 1 → Service (CNAME 조회) */}
              <line x1="100" y1="195" x2="140" y2="164" stroke="#0891b2" strokeWidth="2" markerEnd="url(#arrow-cyan)" />
              <text x="40" y="183" fontSize="8" className="fill-cyan-700" fontFamily="monospace" fontWeight="bold">psql -h legacy-db</text>

              {/* Service → 외부 DB (CNAME 응답 후 직접 연결) */}
              <line x1="290" y1="142" x2="320" y2="66" stroke="#d97706" strokeWidth="2.5" strokeDasharray="4 2" markerEnd="url(#arrow-amber)" />
              <text x="300" y="100" fontSize="9" fill="#92400e" fontFamily="monospace" fontWeight="bold">DNS만</text>
            </g>
          )}

          {/* ── Step 5: 비교 종합 ── */}
          {isCompare && (
            <g>
              {/* 4 타입 작은 박스 */}
              {[
                { x: 50,  label: 'ClusterIP',    sub: '내부만',     color: '#06b6d4' },
                { x: 130, label: 'NodePort',     sub: '외부 O 노드',  color: '#06b6d4' },
                { x: 210, label: 'LoadBalancer', sub: '외부 O 클라우드', color: '#06b6d4' },
                { x: 290, label: 'ExternalName', sub: 'DNS 별칭',   color: '#06b6d4' },
              ].map((b, i) => (
                <g key={`cmp-${i}`}>
                  <rect x={b.x} y={120} width="70" height="44" rx="6" fill={b.color} stroke="#0e7490" strokeWidth="1.5" />
                  <text x={b.x + 35} y={138} textAnchor="middle" fontSize="9" fill="white" fontWeight="bold">{b.label}</text>
                  <text x={b.x + 35} y={154} textAnchor="middle" fontSize="8" fill="#ecfeff">{b.sub}</text>
                </g>
              ))}
              <text x="200" y="100" textAnchor="middle" fontSize="11" className="fill-cyan-800" fontWeight="bold">
                4 타입 한눈에 보기
              </text>
            </g>
          )}

          {/* 화살표 마커 정의 */}
          <defs>
            <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
              <path d="M0,0 L10,5 L0,10 Z" fill="#0891b2" />
            </marker>
            <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
              <path d="M0,0 L10,5 L0,10 Z" fill="#d97706" />
            </marker>
          </defs>
        </svg>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — Service 타입 카드 + SVG 다이어그램
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ focus, dataState }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          {/* 4 Service 타입 카드 */}
          <div className="mb-4">
            <div className="text-xs font-bold text-slate-700 mb-2">🚪 Service 4가지 타입</div>
            <div className="grid grid-cols-4 gap-2">
              {SERVICE_TYPES.map((t) => {
                const isActive = focus === t.key;
                return (
                  <div
                    key={t.key}
                    className={`rounded-lg p-2 text-center transition-all duration-300 ${
                      isActive
                        ? 'bg-cyan-100 border-2 border-cyan-500 scale-105 shadow'
                        : 'bg-slate-50 border border-slate-200'
                    }`}
                  >
                    <div className="text-xl">{t.emoji}</div>
                    <div className="text-[11px] font-bold text-slate-800 mt-0.5">{t.name}</div>
                    <div className="text-[9px] text-slate-500 leading-tight mt-0.5">{t.note}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* 클러스터 다이어그램 */}
          <div className="pt-3 border-t border-slate-100">
            <div className="flex items-center justify-between mb-2">
              <div className="text-xs font-bold text-slate-700">📡 트래픽 흐름</div>
              <span className="text-[10px] text-slate-400 font-mono">
                {dataState.trafficLabel}
              </span>
            </div>
            <div className="bg-slate-50 rounded-lg border border-slate-200 p-2">
              <ClusterDiagram focus={focus} dataState={dataState} />
            </div>
          </div>

          {/* 외부 접근 상태 */}
          <div className="mt-3 grid grid-cols-2 gap-2 text-[10px]">
            <div className={`rounded-md border px-2 py-1.5 ${
              dataState.externalAccess
                ? 'bg-emerald-50 border-emerald-300 text-emerald-700'
                : 'bg-slate-50 border-slate-200 text-slate-500'
            }`}>
              <span className="font-bold">외부 접근: </span>
              {dataState.externalAccess ? 'O 가능' : (focus === 'externalname' ? '- (Pod → 외부)' : 'X 불가')}
            </div>
            <div className="rounded-md border border-slate-200 bg-slate-50 px-2 py-1.5 text-slate-600 font-mono">
              <span className="font-bold not-italic font-sans text-slate-700">EXTERNAL-IP: </span>
              {dataState.externalIP || '<none>'}
            </div>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="inline-block w-3 h-3 rounded-sm bg-cyan-500"></span>Service
            </span>
            <span className="flex items-center gap-1">
              <span className="inline-block w-3 h-3 rounded-sm bg-cyan-100 border border-cyan-500"></span>Pod
            </span>
            <span className="flex items-center gap-1">
              <span className="inline-block w-3 h-3 rounded-sm bg-amber-100 border border-amber-500"></span>외부 LB / DB
            </span>
            <span className="flex items-center gap-1 ml-auto text-cyan-700 font-mono">
              ⎈ Cluster
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-cyan-500/15 border-l-2 border-cyan-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 — 단계 번호 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 네트워킹 &gt; Chapter 1. Service &amp; Ingress</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Service 4가지 타입</h1>
                  <p className="text-sm text-slate-500 mt-0.5">건물 출입문 4종 — 내부 / 노드 포트 / 클라우드 LB / 외부 DNS 별칭</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                focus={step.focus}
                dataState={step.dataState}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-cyan-50 border-2 border-cyan-300 rounded-xl p-3 text-sm text-cyan-900">
                💡 다음(III-1-2)에서는 <strong>Ingress</strong> — LB 1개로 도메인/경로 라우팅 (안내 데스크 비유)
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-cyan-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-cyan-600 text-white hover:bg-cyan-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./III-1-2.html" className="text-cyan-700 hover:text-cyan-900 font-medium">III-1-2 Ingress &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
