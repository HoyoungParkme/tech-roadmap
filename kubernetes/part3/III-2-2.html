<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — DNS와 Service 디스커버리</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    III-2-2. DNS와 Service 디스커버리
    학습 목표: <service>.<namespace>.svc.cluster.local 자동 해석 메커니즘.
    핵심 비유: "사내 전화번호부" — 부서명만 알면 내선이 자동 안내
    구조: 4단계 (Service 이름 / FQDN / namespace 분리 / Headless)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Service 이름이 곧 호스트명',
        desc: 'Service를 만들면 자동으로 DNS 레코드가 생긴다. 같은 namespace의 Pod는 그냥 service 이름으로 부르면 끝. CoreDNS가 클러스터 내부 DNS를 담당.',
        block: {
          kind: 'shell',
          code: `# default namespace에서 web Service 생성
$ kubectl create svc clusterip web --tcp=80:8080

# 같은 namespace의 Pod에서
$ kubectl exec frontend-aa1 -- curl http://web
# 200 OK    ← 서비스 이름 그대로 통함!

# 내부 동작
# 1. frontend Pod가 "web" 호스트 조회
# 2. CoreDNS가 web.default.svc.cluster.local로 해석
# 3. ClusterIP 10.0.5.21 반환
# 4. frontend → 10.0.5.21:80 → Pod 중 하나로 분산`,
        },
        focus: 'service-name',
      },
      {
        title: 'Step 2. FQDN — <svc>.<ns>.svc.cluster.local',
        desc: '다른 namespace에 접근할 땐 FQDN. web.production.svc.cluster.local. 일부만 적어도 됨 — web.production이면 같은 클러스터 가정. 개발 환경 분리에 핵심.',
        block: {
          kind: 'shell',
          code: `# Pod의 /etc/resolv.conf
$ cat /etc/resolv.conf
# search default.svc.cluster.local
#        svc.cluster.local
#        cluster.local
# nameserver 10.96.0.10           ← CoreDNS

# 단축 이름 모두 통함
$ curl http://web                          # 같은 namespace
$ curl http://web.production               # 다른 ns
$ curl http://web.production.svc           # 좀 더 명시
$ curl http://web.production.svc.cluster.local  # 풀 FQDN`,
        },
        focus: 'fqdn',
      },
      {
        title: 'Step 3. Namespace = 격리 + 도메인 prefix',
        desc: 'namespace는 환경/팀 격리 도구. dev/staging/production 같은 namespace에 같은 이름의 Service를 두어도 충돌 없다. DNS는 namespace prefix로 구분.',
        block: {
          kind: 'yaml',
          code: `# 같은 이름 "web" Service가 ns별로 따로
# ns: dev        → web.dev.svc.cluster.local
# ns: staging    → web.staging.svc.cluster.local
# ns: production → web.production.svc.cluster.local

# Pod (in dev ns)에서
$ curl http://web                  # 자기 ns의 web (=dev/web)
$ curl http://web.production       # production의 web

# kubectl 컨텍스트
$ kubectl get pods -n production
$ kubectl describe svc web -n staging`,
        },
        focus: 'namespace',
      },
      {
        title: 'Step 4. Headless Service — Pod IP 직접 받기',
        desc: 'clusterIP: None으로 두면 가상 IP 없이 Pod IP들이 직접 DNS에 등록. StatefulSet과 결합해 mydb-0/mydb-1/mydb-2 각자에 직접 연결할 때. 분산 DB 클러스터링 필수.',
        block: {
          kind: 'yaml',
          code: `apiVersion: v1
kind: Service
metadata:
  name: mydb-headless
spec:
  clusterIP: None              # ← 핵심 (가상 IP 없음)
  selector:
    app: mydb
  ports:
    - port: 5432

# DNS 조회 결과
$ nslookup mydb-headless
# Name: mydb-headless.default.svc.cluster.local
# Address 1: 10.244.1.5    ← Pod IP 직접
# Address 2: 10.244.2.7
# Address 3: 10.244.3.9

# StatefulSet과 결합
# mydb-0.mydb-headless → 10.244.1.5 (특정 Pod)
# 클라이언트가 마스터-레플리카를 직접 구분 가능`,
        },
        focus: 'headless',
      },
    ];

    const KIND_STYLE = {
      yaml:  { label: 'YAML', textColor: '#fde68a' },
      shell: { label: 'Bash', textColor: '#86efac' },
    };

    function PhonebookDiagram({ focus }) {
      // focus별 강조 항목 정적 매핑
      const ENTRIES = [
        { key: 'service-name', name: 'web',                          ns: 'default',     ip: '10.0.5.21',   highlight: 'service-name' },
        { key: 'fqdn',         name: 'web.default.svc.cluster.local', ns: 'default',     ip: '10.0.5.21',   highlight: 'fqdn' },
        { key: 'namespace',    name: 'web.production',                ns: 'production',  ip: '10.0.7.42',   highlight: 'namespace' },
        { key: 'headless',     name: 'mydb-0.mydb-headless',          ns: 'default',     ip: '10.244.1.5',  highlight: 'headless' },
      ];

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">📞 사내 전화번호부 (CoreDNS)</div>
          <div className="space-y-1 font-mono text-xs">
            {ENTRIES.map((e) => {
              const isActive = focus === e.highlight;
              return (
                <div
                  key={e.key}
                  className={`grid grid-cols-3 gap-2 px-3 py-2 rounded-md transition-all ${isActive ? 'bg-indigo-100 border-2 border-indigo-400 font-bold text-indigo-900' : 'bg-slate-50 border border-slate-200 text-slate-600'}`}
                >
                  <div className="truncate">{e.name}</div>
                  <div className="text-center">[{e.ns}]</div>
                  <div className="text-right">→ {e.ip}</div>
                </div>
              );
            })}
          </div>
          <p className="text-center text-[11px] text-slate-500 mt-3">
            {focus === 'service-name' && '같은 ns 안 — Service 이름 그대로 호출'}
            {focus === 'fqdn' && 'FQDN — 단축/완전 이름 모두 동작'}
            {focus === 'namespace' && 'namespace prefix로 환경 격리'}
            {focus === 'headless' && 'Headless — 가상 IP 없음, Pod IP 직접 등록'}
          </p>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">DNS와 Service 디스커버리</h1>
                <p className="text-sm text-slate-500 mt-1">사내 전화번호부 — Service 이름이 곧 호스트명</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <PhonebookDiagram focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'headless' && (
              <div className="bg-indigo-50 border-2 border-indigo-300 rounded-xl p-3 mb-6 text-xs text-indigo-900">
                💡 Part III Service & Networking 4/4 완성! 다음(IV-1-1)부터는 Pod 데이터를 영구 보존하는 Volume / PV / PVC를 본다
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
