    // ─────────────────────────────────────────────────────
    const PART_STYLE = {
      cyan:    { text: 'text-cyan-700',    chip: 'bg-cyan-100 text-cyan-800',     bdr: 'border-cyan-300' },
      amber:   { text: 'text-amber-700',   chip: 'bg-amber-100 text-amber-800',   bdr: 'border-amber-300' },
      fuchsia: { text: 'text-fuchsia-700', chip: 'bg-fuchsia-100 text-fuchsia-800', bdr: 'border-fuchsia-300' },
      emerald: { text: 'text-emerald-700', chip: 'bg-emerald-100 text-emerald-800', bdr: 'border-emerald-300' },
      slate:   { text: 'text-slate-500',   chip: 'bg-slate-100 text-slate-600',   bdr: 'border-slate-200' },
      gray:    { text: 'text-slate-400',   chip: 'bg-slate-100 text-slate-500',   bdr: 'border-slate-200' },
    };

    const CORE_DNS_STATE_STYLE = {
      off:       { card: 'bg-slate-100 border-slate-300 opacity-50', label: 'CoreDNS (미사용)', sub: 'IP 직접 호출 — 이름 해석 안 함', emoji: '📵' },
      idle:      { card: 'bg-cyan-50 border-cyan-300',                label: 'CoreDNS',          sub: '대기 중',                       emoji: '📞' },
      resolving: { card: 'bg-cyan-100 border-cyan-500 animate-pulse', label: 'CoreDNS · 조회중', sub: 'name → IP 해석',                emoji: '🔍' },
      resolved:  { card: 'bg-cyan-50 border-cyan-400',                label: 'CoreDNS · 응답',   sub: 'ClusterIP 반환 완료',           emoji: '✅' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — caller → CoreDNS → target 다이어그램
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const dnsStyle = CORE_DNS_STATE_STYLE[step.coreDnsState];

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">📞 사내 전화번호부 (CoreDNS)</h2>
            <span className="text-[10px] text-slate-400 font-mono">caller → CoreDNS → target</span>
          </div>

          {/* 호출 문자열 분해 라벨 (단계마다 길어짐) */}
          <div className="mb-4 p-3 rounded-lg bg-slate-900 border border-slate-700">
            <div className="text-[10px] text-slate-400 font-mono mb-2">호출 문자열 분해</div>
            <div className="font-mono text-base flex flex-wrap items-center">
              <span className="text-slate-400">http://</span>
              {step.parts.map((p, i) => {
                const s = PART_STYLE[p.color] || PART_STYLE.slate;
                return (
                  <span
                    key={i}
                    className={`font-bold ${s.text.replace('text-', 'text-')} ${p.strike ? 'line-through opacity-60' : ''}`}
                    style={{
                      color:
                        p.color === 'cyan' ? '#0e7490' :
                        p.color === 'amber' ? '#b45309' :
                        p.color === 'fuchsia' ? '#a21caf' :
                        p.color === 'emerald' ? '#047857' :
                        p.color === 'gray' ? '#94a3b8' :
                        '#64748b',
                    }}
                  >
                    {p.text}
                  </span>
                );
              })}
            </div>
            {/* 라벨 칩 */}
            <div className="flex flex-wrap gap-1.5 mt-3">
              {step.parts
                .filter((p) => p.label !== '·')
                .map((p, i) => {
                  const s = PART_STYLE[p.color] || PART_STYLE.slate;
                  return (
                    <span
                      key={i}
                      className={`text-[10px] font-mono px-2 py-0.5 rounded border ${s.chip} ${s.bdr}`}
                    >
                      {p.label}
                    </span>
                  );
                })}
            </div>
          </div>

          {/* caller → CoreDNS → target 3단 가로 다이어그램 */}
          <div className="grid grid-cols-7 gap-2 items-center mb-4">
            {/* Caller Pod */}
            <div className="col-span-2 rounded-lg bg-cyan-50 border-2 border-cyan-400 p-2 text-center">
              <div className="text-[10px] text-cyan-600 font-mono">caller Pod</div>
              <div className="text-xs font-bold text-cyan-900 truncate">{step.callerName}</div>
              <div className="text-[10px] text-slate-500 mt-0.5">ns: {step.callerNs}</div>
            </div>

            {/* 화살표 1 */}
            <div className="col-span-1 flex flex-col items-center">
              <div className="text-[9px] text-slate-500 font-mono mb-0.5">name?</div>
              <div className="w-full border-t-2 border-dashed border-cyan-400 relative">
                <span className="absolute -right-1 -top-2 text-cyan-600 text-sm">▶</span>
              </div>
            </div>

            {/* CoreDNS */}
            <div className={`col-span-1 rounded-lg border-2 p-2 text-center transition-all duration-500 ${dnsStyle.card}`}>
              <div className="text-base">{dnsStyle.emoji}</div>
              <div className="text-[10px] font-bold text-slate-800 leading-tight">{dnsStyle.label}</div>
            </div>

            {/* 화살표 2 */}
            <div className="col-span-1 flex flex-col items-center">
              <div className="text-[9px] text-slate-500 font-mono mb-0.5">→ IP</div>
              <div className="w-full border-t-2 border-dashed border-cyan-400 relative">
                <span className="absolute -right-1 -top-2 text-cyan-600 text-sm">▶</span>
              </div>
            </div>

            {/* Target Service */}
            <div className="col-span-2 rounded-lg bg-emerald-50 border-2 border-emerald-400 p-2 text-center">
              <div className="text-[10px] text-emerald-600 font-mono">target Service</div>
              <div className="text-xs font-bold text-emerald-900 truncate">{step.targetName}</div>
              <div className="text-[10px] text-slate-500 mt-0.5">ns: {step.targetNs}</div>
              <div className="text-[10px] font-mono text-emerald-700 mt-0.5">{step.targetIp}</div>
            </div>
          </div>

          {/* CoreDNS 상태 부가 설명 */}
          <div className="text-[11px] text-slate-500 mb-3 px-2">
            <span className="font-mono">CoreDNS:</span> {dnsStyle.sub}
          </div>

          {/* 문제 박스 (Step 1만) */}
          {step.problem && (
            <div className="p-3 rounded-lg bg-red-50 border-2 border-red-300">
              <div className="flex items-center gap-2 text-red-800 font-bold text-sm">
                <span className="text-lg">🚨</span>
                <span>문제</span>
              </div>
              <div className="text-[12px] text-red-700 mt-1 font-mono">{step.problem}</div>
            </div>
          )}

          {/* 단계별 부가 설명 */}
          {!step.problem && (
            <div className="p-3 rounded-lg bg-cyan-50 border border-cyan-200">
              <div className="text-[11px] text-cyan-900 leading-relaxed">
                <span className="font-bold">FQDN 규칙:</span>{' '}
                <span className="font-mono">&lt;service&gt;.&lt;namespace&gt;.svc.cluster.local</span>
                <br />
                <span className="text-slate-600">
                  앞 부분만 적어도 search 도메인이 자동 보완. 풀 FQDN은 명시적이라 디버깅에 유리.
                </span>
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-cyan-400"></span>service</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-amber-400"></span>namespace</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-fuchsia-400"></span>object-kind</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-400"></span>cluster-domain</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code (innerHTML 추출) */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-cyan-500/15 border-l-2 border-cyan-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Service &amp; Networking &gt; Chapter 2. DNS 디스커버리</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">DNS와 Service 디스커버리</h1>
                  <p className="text-sm text-slate-500 mt-0.5">CoreDNS와 FQDN — &lt;service&gt;.&lt;namespace&gt;.svc.cluster.local 분해</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-cyan-50 border-2 border-cyan-300 rounded-xl p-3 text-sm text-cyan-900">
                💡 Part III Service &amp; Networking 완성! 다음(IV-1-1)부터는 <strong>Volume / PV / PVC</strong> — Pod 데이터를 영구 보존하는 스토리지를 본다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-cyan-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-cyan-600 text-white hover:bg-cyan-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-2-1.html" className="text-slate-500 hover:text-slate-700">&larr; III-2-1 Service Type</a>
              <a href="../../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">허브 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
