<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — V-1-2. Helm 패키지 매니저</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    V-1-2. Helm 패키지 매니저 — Chart / values / Release / upgrade / rollback
    학습 목표: yaml 폭증을 Chart 템플릿 + values.yaml 환경 분리로 풀고, helm install / upgrade / rollback 으로 운영한다.
    핵심 비유: 레시피 책 — Chart=레시피, values.yaml=재료 메모, Release=요리한 결과물
    패턴: fastapi v1 — 좌(LiveDataPane: Chart 박스 + helm 엔진 + Release 박스) / 우(VSCode CodeViewer 다중 파일 탭)
    색상: cyan
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 다중 파일 — 단계별 탭 + 강조 라인
    // ─────────────────────────────────────────────────────
    const FILES = {
      'Chart.yaml': {
        lang: 'yaml',
        lines: [
          '# Chart.yaml — Chart의 메타데이터',
          'apiVersion: v2',
          'name: web',
          'description: 사내 표준 웹 앱 차트',
          'type: application',
          'version: 1.0.0          # Chart 자체 버전',
          'appVersion: "v1.5.0"    # 패키징 대상 앱 버전',
          '',
          'maintainers:',
          '  - name: platform-team',
          '    email: platform@example.com',
          '',
          'keywords:',
          '  - web',
          '  - fastapi',
          '',
          '# 의존 차트 (예: redis, postgresql)',
          'dependencies:',
          '  - name: redis',
          '    version: 18.x.x',
          '    repository: https://charts.bitnami.com/bitnami',
        ],
      },
      'values.yaml': {
        lang: 'yaml',
        lines: [
          '# values.yaml — 기본값 (-f 로 환경별 override)',
          'image:',
          '  repository: myapp',
          '  tag: v1.5.0',
          '  pullPolicy: IfNotPresent',
          '',
          'replicas: 3',
          '',
          'service:',
          '  type: ClusterIP',
          '  port: 80',
          '',
          'ingress:',
          '  enabled: true',
          '  host: api.example.com',
          '  tls: true',
          '',
          'resources:',
          '  requests:',
          '    cpu: 100m',
          '    memory: 128Mi',
          '  limits:',
          '    cpu: 500m',
          '    memory: 512Mi',
          '',
          'env:',
          '  LOG_LEVEL: info',
          '  DB_HOST: db.prod.svc',
        ],
      },
      'templates/deployment.yaml': {
        lang: 'yaml',
        lines: [
          '# templates/deployment.yaml — Go 템플릿 매니페스트',
          'apiVersion: apps/v1',
          'kind: Deployment',
          'metadata:',
          '  name: {{ .Release.Name }}-web',
          '  labels:',
          '    app: {{ .Release.Name }}',
          '    chart: {{ .Chart.Name }}-{{ .Chart.Version }}',
          'spec:',
          '  replicas: {{ .Values.replicas }}',
          '  selector:',
          '    matchLabels:',
          '      app: {{ .Release.Name }}',
          '  template:',
          '    metadata:',
          '      labels:',
          '        app: {{ .Release.Name }}',
          '    spec:',
          '      containers:',
          '        - name: web',
          '          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"',
          '          imagePullPolicy: {{ .Values.image.pullPolicy }}',
          '          ports:',
          '            - containerPort: 8080',
          '          resources:',
          '            {{- toYaml .Values.resources | nindent 12 }}',
          '          env:',
          '            {{- range $k, $v := .Values.env }}',
          '            - name: {{ $k }}',
          '              value: "{{ $v }}"',
          '            {{- end }}',
        ],
      },
      'helm-install.sh': {
        lang: 'bash',
        lines: [
          '# helm-install.sh — values 주입 + Release 생성',
          '',
          '# 1) Chart 디렉토리 검증 (lint)',
          'helm lint ./mychart',
          '',
          '# 2) 어떤 yaml이 렌더링 되는지 미리보기 (실제 배포 X)',
          'helm template myrelease ./mychart -f values-prod.yaml',
          '',
          '# 3) 실제 설치 — Release "myrelease" 생성',
          'helm install myrelease ./mychart \\',
          '    -f values-prod.yaml \\',
          '    --namespace production --create-namespace',
          '',
          '# 출력 예시 ───────────────────────────────',
          '# NAME: myrelease',
          '# LAST DEPLOYED: Tue May  7 10:00:00 2026',
          '# NAMESPACE: production',
          '# STATUS: deployed',
          '# REVISION: 1',
          '# ─────────────────────────────────────────',
          '',
          '# 4) 설치된 Release 확인',
          'helm list -n production',
          'helm status myrelease -n production',
          '',
          '# 5) 새 버전 배포 — upgrade',
          'helm upgrade myrelease ./mychart \\',
          '    -f values-prod.yaml \\',
          '    --set image.tag=v1.6.0',
          '# → REVISION: 2 (이전 revision 1은 history에 남음)',
        ],
      },
      'helm-rollback.sh': {
        lang: 'bash',
        lines: [
          '# helm-rollback.sh — 문제 발생 시 즉시 복구',
          '',
          '# 1) 변경 이력 확인',
          'helm history myrelease -n production',
          '# REVISION  STATUS      CHART      APP VERSION  DESCRIPTION',
          '# 1         superseded  web-1.0.0  v1.5.0       Install complete',
          '# 2         deployed    web-1.0.0  v1.6.0       Upgrade complete',
          '',
          '# 2) revision 1 (이전 안정 버전)으로 롤백',
          'helm rollback myrelease 1 -n production',
          '',
          '# 출력 예시 ───────────────────────────────',
          '# Rollback was a success! Happy Helming!',
          '# ─────────────────────────────────────────',
          '',
          '# 3) 롤백 후 상태 — REVISION 3 (내용은 1과 동일)',
          'helm history myrelease -n production',
          '# REVISION  STATUS      CHART      APP VERSION  DESCRIPTION',
          '# 1         superseded  web-1.0.0  v1.5.0       Install complete',
          '# 2         superseded  web-1.0.0  v1.6.0       Upgrade complete',
          '# 3         deployed    web-1.0.0  v1.5.0       Rollback to 1',
          '',
          '# 4) 완전 제거 (필요 시)',
          '# helm uninstall myrelease -n production',
          '',
          '# 핵심: rollback 은 새 revision을 쌓는다 (revision 감소가 아닌 +1)',
          '# 다만 LiveData 시각화에서는 "보이는 버전"이 v1.5.0 으로 되돌아간다',
        ],
      },
    };

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 — Chart / Engine / Release 시뮬레이션
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. 안티패턴 — yaml 수십 개 수동 관리',
        desc: '실전 앱 1개에 Deployment / Service / Ingress / ConfigMap / Secret / HPA / SA 등 매니페스트 7~10개. 환경(dev/staging/prod) 곱하면 30개 이상. 환경마다 sed로 image tag·replicas 치환은 휴먼 에러의 온상.',
        dataState: {
          mode: 'sprawl',
          chartFiles: [],
          values: null,
          engineActive: false,
          engineLabel: '',
          release: null,
          revision: 0,
          deployedTag: null,
          podCount: 0,
          warning: '환경별 yaml 사본 30개 — sed 로 image tag 치환 → 휴먼 에러',
        },
        file: 'helm-install.sh',
        highlight: [],
      },
      {
        title: 'Step 2. Helm Chart 구조 — 템플릿 + 변수',
        desc: 'Chart 디렉토리 하나로 묶는다. Chart.yaml(메타) + values.yaml(기본값) + templates/(Go 템플릿 매니페스트). 매니페스트의 변하는 값은 {{ .Values.image.tag }} 처럼 변수로 빠지고, values.yaml에서 채워진다.',
        dataState: {
          mode: 'chart',
          chartFiles: [
            { name: 'Chart.yaml', kind: 'meta' },
            { name: 'values.yaml', kind: 'values' },
            { name: 'templates/deployment.yaml', kind: 'template' },
            { name: 'templates/service.yaml', kind: 'template' },
            { name: 'templates/ingress.yaml', kind: 'template' },
          ],
          values: { tag: 'v1.5.0', replicas: 3, host: 'api.example.com' },
          engineActive: false,
          engineLabel: '',
          release: null,
          revision: 0,
          deployedTag: null,
          podCount: 0,
          warning: null,
        },
        file: 'templates/deployment.yaml',
        highlight: [10, 21, 22],
      },
      {
        title: 'Step 3. helm install — values 주입 → 렌더링 → Release',
        desc: 'helm install myrelease ./mychart -f values-prod.yaml. helm 엔진이 templates/ 의 {{ .Values.* }} 자리에 values 값을 채워 완전한 yaml로 렌더링하고, 클러스터에 적용해 Release(인스턴스)를 만든다. REVISION: 1.',
        dataState: {
          mode: 'installed',
          chartFiles: [
            { name: 'Chart.yaml', kind: 'meta' },
            { name: 'values.yaml', kind: 'values' },
            { name: 'templates/deployment.yaml', kind: 'template' },
            { name: 'templates/service.yaml', kind: 'template' },
            { name: 'templates/ingress.yaml', kind: 'template' },
          ],
          values: { tag: 'v1.5.0', replicas: 3, host: 'api.example.com' },
          engineActive: true,
          engineLabel: 'helm install',
          release: { name: 'myrelease', status: 'deployed' },
          revision: 1,
          deployedTag: 'v1.5.0',
          podCount: 3,
          warning: null,
        },
        file: 'helm-install.sh',
        highlight: [10, 11, 12, 18, 19],
      },
      {
        title: 'Step 4. helm upgrade — 새 버전 배포 (REVISION: 2)',
        desc: 'helm upgrade myrelease ./mychart --set image.tag=v1.6.0. 같은 Chart에 새 values 만 주입해 새 revision 을 쌓는다. 이전 revision(1)은 history에 그대로 남는다 — 롤백 가능.',
        dataState: {
          mode: 'upgraded',
          chartFiles: [
            { name: 'Chart.yaml', kind: 'meta' },
            { name: 'values.yaml', kind: 'values' },
            { name: 'templates/deployment.yaml', kind: 'template' },
            { name: 'templates/service.yaml', kind: 'template' },
            { name: 'templates/ingress.yaml', kind: 'template' },
          ],
          values: { tag: 'v1.6.0', replicas: 3, host: 'api.example.com' },
          engineActive: true,
          engineLabel: 'helm upgrade',
          release: { name: 'myrelease', status: 'deployed' },
          revision: 2,
          deployedTag: 'v1.6.0',
          podCount: 3,
          warning: null,
        },
        file: 'helm-install.sh',
        highlight: [25, 26, 27, 28, 29],
      },
      {
        title: 'Step 5. helm rollback myrelease 1 — 이전 revision 으로 복구',
        desc: 'v1.6.0 배포 후 장애 발생. helm rollback myrelease 1 한 줄로 revision 1 상태로 복구. helm 은 새 REVISION(3)을 쌓지만, 배포된 앱 버전은 v1.5.0 으로 돌아간다.',
        dataState: {
          mode: 'rolledback',
          chartFiles: [
            { name: 'Chart.yaml', kind: 'meta' },
            { name: 'values.yaml', kind: 'values' },
            { name: 'templates/deployment.yaml', kind: 'template' },
            { name: 'templates/service.yaml', kind: 'template' },
            { name: 'templates/ingress.yaml', kind: 'template' },
          ],
          values: { tag: 'v1.5.0', replicas: 3, host: 'api.example.com' },
          engineActive: true,
          engineLabel: 'helm rollback 1',
          release: { name: 'myrelease', status: 'deployed' },
          revision: 3,
          deployedTag: 'v1.5.0',
          podCount: 3,
          warning: null,
          rolledBack: true,
        },
        file: 'helm-rollback.sh',
        highlight: [10, 11, 18, 19, 20, 21],
      },
    ];

    // ─────────────────────────────────────────────────────
    // 파일 종류별 스타일 (Chart 박스 내부 파일 아이콘)
    // ─────────────────────────────────────────────────────
    const FILE_KIND_STYLE = {
      meta:     { emoji: '📋', color: 'bg-cyan-50 border-cyan-300 text-cyan-800' },
      values:   { emoji: '🧂', color: 'bg-amber-50 border-amber-300 text-amber-800' },
      template: { emoji: '📄', color: 'bg-slate-50 border-slate-300 text-slate-700' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — Chart 박스 + helm 엔진 + Release 박스
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ dataState }) {
      const { mode, chartFiles, values, engineActive, engineLabel,
              release, revision, deployedTag, podCount, warning, rolledBack } = dataState;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">📔 Helm 패키지 흐름</h2>
            <span className="text-[10px] text-slate-400 font-mono">Chart → helm → Release</span>
          </div>

          {/* 안티패턴 모드: yaml 폭증 한 화면 */}
          {mode === 'sprawl' && (
            <div className="space-y-3">
              <div className="grid grid-cols-3 gap-2">
                {['dev', 'staging', 'prod'].map((env) => (
                  <div key={env} className="rounded-lg border-2 border-rose-300 bg-rose-50 p-2">
                    <div className="text-[10px] font-bold text-rose-700 uppercase tracking-wider mb-1.5">
                      {env}/
                    </div>
                    <div className="space-y-1">
                      {['deployment.yaml', 'service.yaml', 'ingress.yaml',
                        'configmap.yaml', 'secret.yaml', 'hpa.yaml', 'sa.yaml'].map((f) => (
                        <div key={f} className="text-[10px] font-mono text-rose-900 bg-white/70 rounded px-1.5 py-0.5 border border-rose-200">
                          📄 {f}
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
              <div className="bg-rose-100 border-2 border-rose-400 rounded-lg p-3 text-xs text-rose-900">
                <div className="font-bold mb-1">🚨 환경별 사본 21개 (3 × 7)</div>
                <div className="font-mono text-[11px]">
                  $ sed -i 's/myapp:dev/myapp:v1.5/' prod/deployment.yaml
                </div>
                <div className="text-[11px] mt-1">→ 환경 늘 때마다 곱셈으로 증가, sed 오타가 prod 장애</div>
              </div>
            </div>
          )}

          {/* Chart / Engine / Release 3-pane (Step 2~5) */}
          {mode !== 'sprawl' && (
            <div className="grid grid-cols-12 gap-2 items-stretch">
              {/* 좌: Chart 박스 (5/12) */}
              <div className="col-span-5">
                <div className="rounded-lg border-2 border-cyan-400 bg-cyan-50 p-3 h-full">
                  <div className="flex items-center gap-1.5 mb-2">
                    <span className="text-base">📦</span>
                    <span className="text-xs font-bold text-cyan-900">Chart (mychart/)</span>
                  </div>

                  {/* templates + values 파일 리스트 */}
                  <div className="space-y-1 mb-3">
                    {chartFiles.map((f) => {
                      const s = FILE_KIND_STYLE[f.kind];
                      return (
                        <div
                          key={f.name}
                          className={`text-[10px] font-mono rounded px-1.5 py-1 border ${s.color}`}
                        >
                          <span className="mr-1">{s.emoji}</span>{f.name}
                        </div>
                      );
                    })}
                  </div>

                  {/* values 박스 — 환경별 주입값 */}
                  {values && (
                    <div className="bg-white border border-amber-300 rounded p-2">
                      <div className="text-[10px] font-bold text-amber-800 mb-1">
                        🧂 values-prod.yaml
                      </div>
                      <div className="font-mono text-[10px] text-slate-700 space-y-0.5">
                        <div>tag: <span className={`font-bold transition-colors duration-500 ${values.tag === 'v1.6.0' ? 'text-cyan-700' : 'text-slate-800'}`}>{values.tag}</span></div>
                        <div>replicas: <span className="text-slate-800">{values.replicas}</span></div>
                        <div>host: <span className="text-slate-800">{values.host}</span></div>
                      </div>
                    </div>
                  )}
                </div>
              </div>

              {/* 중앙: helm 엔진 화살표 (2/12) */}
              <div className="col-span-2 flex flex-col items-center justify-center">
                <div
                  className={`w-full rounded-lg border-2 p-2 text-center transition-all duration-500 ${
                    engineActive
                      ? 'border-cyan-500 bg-cyan-100 shadow-md'
                      : 'border-slate-200 bg-slate-50'
                  } ${engineActive ? 'animate-pulse' : ''}`}
                >
                  <div className="text-2xl">⚙️</div>
                  <div className="text-[10px] font-bold text-cyan-800 mt-1">helm</div>
                  <div className="text-[9px] text-slate-500 leading-tight">
                    template +<br/>render +<br/>apply
                  </div>
                </div>
                <div className="text-cyan-500 text-2xl my-1">→</div>
                <div className="text-[10px] text-slate-500 font-mono text-center min-h-[14px]">
                  {engineLabel}
                </div>
              </div>

              {/* 우: Release 박스 (5/12) */}
              <div className="col-span-5">
                <div className={`rounded-lg border-2 p-3 h-full transition-all duration-500 ${
                  release ? 'border-cyan-500 bg-white' : 'border-slate-200 bg-slate-50 opacity-60'
                }`}>
                  <div className="flex items-center justify-between mb-2">
                    <div className="flex items-center gap-1.5">
                      <span className="text-base">🚀</span>
                      <span className="text-xs font-bold text-cyan-900">Release</span>
                    </div>
                    {release ? (
                      <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-emerald-100 text-emerald-700">
                        {release.status}
                      </span>
                    ) : (
                      <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-slate-200 text-slate-500">
                        not installed
                      </span>
                    )}
                  </div>

                  {/* Release 메타 */}
                  <div className="bg-slate-900 rounded p-2 font-mono text-[10px] text-cyan-300 mb-2">
                    <div>NAME: <span className="text-white">{release ? release.name : '—'}</span></div>
                    <div>
                      REVISION:{' '}
                      <span
                        key={revision}
                        className={`text-2xl font-bold inline-block transition-all duration-500 ${
                          rolledBack ? 'text-amber-300' : 'text-cyan-200'
                        }`}
                      >
                        {revision || '—'}
                      </span>
                    </div>
                    <div>
                      app: <span className={`text-white font-bold ${rolledBack ? 'text-amber-200' : ''}`}>{deployedTag || '—'}</span>
                      {rolledBack && <span className="text-amber-300 text-[9px] ml-1">(rolled back)</span>}
                    </div>
                  </div>

                  {/* 배포된 Pod */}
                  <div className="text-[10px] font-bold text-slate-700 mb-1">배포된 Pod</div>
                  <div className="flex gap-1 flex-wrap">
                    {Array.from({ length: podCount }).map((_, i) => (
                      <div
                        key={i}
                        className={`w-9 h-9 rounded border-2 flex items-center justify-center text-[9px] font-mono transition-all duration-500 ${
                          rolledBack
                            ? 'bg-amber-50 border-amber-400 text-amber-800'
                            : 'bg-cyan-50 border-cyan-400 text-cyan-800'
                        }`}
                      >
                        🟢
                      </div>
                    ))}
                    {podCount === 0 && (
                      <div className="text-[10px] text-slate-400 italic">아직 배포 전</div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 경고 / 알림 박스 */}
          {warning && (
            <div className="mt-3 p-2 rounded-lg bg-rose-50 border border-rose-300 text-[11px] text-rose-800 font-mono">
              ⚠ {warning}
            </div>
          )}

          {/* History 라인 (Step 3 이후) */}
          {revision > 0 && (
            <div className="mt-4 pt-3 border-t border-slate-100">
              <div className="text-[10px] font-bold text-slate-600 mb-1.5">📜 helm history myrelease</div>
              <div className="font-mono text-[10px] space-y-0.5">
                {[1, 2, 3].filter((r) => r <= revision).map((r) => {
                  const isCurrent = r === revision;
                  const desc = r === 1 ? 'Install (v1.5.0)'
                             : r === 2 ? 'Upgrade (v1.6.0)'
                             : 'Rollback to 1 (v1.5.0)';
                  return (
                    <div
                      key={r}
                      className={`flex gap-2 px-2 py-0.5 rounded ${
                        isCurrent ? 'bg-cyan-100 text-cyan-900 font-bold' : 'text-slate-500'
                      }`}
                    >
                      <span className="w-12">REV {r}</span>
                      <span className="w-20">{isCurrent ? 'deployed' : 'superseded'}</span>
                      <span>{desc}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-cyan-400"></span>Chart</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-amber-400"></span>values</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-400"></span>deployed</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-rose-400"></span>안티패턴</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — 다중 파일 탭
    // ─────────────────────────────────────────────────────
    function CodeViewer({ activeFile, setActiveFile, highlight, stepIdx, total }) {
      const codeRef = useRef(null);
      const file = FILES[activeFile];
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${file.lang}`;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [activeFile]);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [activeFile]);

      const fileNames = Object.keys(FILES);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 행 */}
          <div className="bg-[#21252b] border-b border-slate-700">
            <div className="px-4 py-2 flex items-center gap-2">
              <div className="flex gap-1.5">
                <span className="w-3 h-3 rounded-full bg-red-500"></span>
                <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
                <span className="w-3 h-3 rounded-full bg-green-500"></span>
              </div>
              <span className="ml-2 text-[10px] text-slate-500 font-mono uppercase tracking-wider">
                mychart/
              </span>
              <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">
                {file.lang}
              </span>
            </div>
            {/* 파일 탭 */}
            <div className="flex overflow-x-auto border-t border-slate-800">
              {fileNames.map((name) => {
                const isActive = name === activeFile;
                return (
                  <button
                    key={name}
                    onClick={() => setActiveFile(name)}
                    className={`px-3 py-1.5 text-[10px] font-mono whitespace-nowrap border-r border-slate-800 transition ${
                      isActive
                        ? 'bg-[#282c34] text-cyan-300 border-b-2 border-b-cyan-400'
                        : 'bg-[#1d2026] text-slate-400 hover:text-slate-200'
                    }`}
                  >
                    {name}
                  </button>
                );
              })}
            </div>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${file.lang}`}>{file.lines.join('\n')}</code>
          </pre>

          {/* 실제 라인 렌더링 — 라인 번호 + 강조 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || file.lines).map((lineHtml, i) => {
                  const isHi = highlight && highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        isHi ? 'bg-cyan-500/10 border-l-2 border-cyan-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{file.lines.length} lines · {activeFile}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [activeFile, setActiveFile] = useState(STEPS[0].file);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      // step 변경 시 추천 파일을 자동 활성화
      useEffect(() => {
        setActiveFile(step.file);
      }, [stepIdx]);

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. Kubernetes 운영 &gt; Chapter 1. 패키징</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Helm 패키지 매니저</h1>
                  <p className="text-sm text-slate-500 mt-0.5">레시피 책 — Chart=레시피 / values.yaml=재료 메모 / Release=요리 결과 / upgrade·rollback</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane dataState={step.dataState} />
              <CodeViewer
                activeFile={activeFile}
                setActiveFile={setActiveFile}
                highlight={activeFile === step.file ? step.highlight : []}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 마지막 단계 → 다음 자료 안내 */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-cyan-50 border-2 border-cyan-300 rounded-xl p-3 text-sm text-cyan-900">
                💡 다음(V-2-1)에서는 <strong>Prometheus + Grafana</strong> — 운영 클러스터의 건강 상태를 추적하는 모니터링 (건강 검진 비유)
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-cyan-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-cyan-600 text-white hover:bg-cyan-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./V-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; V-1-1 kubectl</a>
              <a href="./V-2-1.html" className="text-cyan-700 hover:text-cyan-900 font-medium">V-2-1 모니터링 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
