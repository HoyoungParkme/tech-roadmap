<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — Helm</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    V-1-2. Helm (패키지 매니저)
    학습 목표: 매니페스트 N개를 묶어 values.yaml로 환경별 배포.
    핵심 비유: "레시피 책" — Chart=레시피, values.yaml=재료 메모, helm install=요리 시작
    구조: 4단계 (yaml 폭증 / Chart 구조 / values 환경별 / install/upgrade/rollback)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. yaml 폭증 — 한 앱에 매니페스트 7~10개',
        desc: '실전 앱은 Deployment + Service + Ingress + ConfigMap + Secret + HPA + ServiceAccount 등 7~10개 매니페스트가 한 묶음. 환경별로 (dev/staging/prod) 곱하면 30개. 이 모두를 손으로 관리? 한계.',
        block: {
          kind: 'shell',
          code: `# 환경별 매니페스트 사본 — 손으로 관리 불가
apps/web/
├── dev/
│   ├── deployment.yaml    (replicas: 1, image: myapp:dev)
│   ├── service.yaml
│   ├── ingress.yaml       (host: dev.example.com)
│   ├── configmap.yaml
│   ├── secret.yaml
│   ├── hpa.yaml
│   └── ...
├── staging/  (위와 거의 동일, 일부 값만 다름)
└── prod/     (위와 거의 동일, 일부 값만 다름)

# → "같은 코드, 환경별로만 다르게" 묶어서 다루는 도구가 필요
# → Helm`,
        },
        focus: 'sprawl',
      },
      {
        title: 'Step 2. Chart 구조 — 템플릿 + 메타',
        desc: 'Helm Chart는 templates/(Go template 매니페스트) + values.yaml(기본값) + Chart.yaml(메타). 매니페스트의 변하는 값을 {{ .Values.image }} 같은 템플릿 변수로 빼고, values.yaml에서 채워넣음.',
        block: {
          kind: 'yaml',
          code: `# 디렉토리 구조
mychart/
├── Chart.yaml          # 메타 (이름, 버전)
├── values.yaml         # 기본값
└── templates/
    ├── deployment.yaml
    ├── service.yaml
    └── _helpers.tpl    # 공통 헬퍼

# Chart.yaml
apiVersion: v2
name: web
version: 1.0.0
description: My web app

# values.yaml (기본값)
image:
  repository: myapp
  tag: v1
replicas: 3

# templates/deployment.yaml (Go template)
apiVersion: apps/v1
kind: Deployment
spec:
  replicas: {{ .Values.replicas }}
  template:
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"`,
        },
        focus: 'chart',
      },
      {
        title: 'Step 3. values 환경별 — 한 Chart, N개 환경',
        desc: 'values-dev.yaml / values-prod.yaml로 환경별 값만 분리. 같은 Chart에 다른 values를 주입해 환경별 배포. dev엔 replicas: 1, prod엔 replicas: 10. 코드(Chart)는 한 곳에서 관리.',
        block: {
          kind: 'yaml',
          code: `# values-dev.yaml
image:
  tag: dev
replicas: 1
ingress:
  host: dev.example.com

---
# values-prod.yaml
image:
  tag: v1.5
replicas: 10
ingress:
  host: api.example.com
  tls: true
hpa:
  minReplicas: 5
  maxReplicas: 30

# 배포
$ helm install web ./mychart -f values-dev.yaml -n dev
$ helm install web ./mychart -f values-prod.yaml -n production`,
        },
        focus: 'values',
      },
      {
        title: 'Step 4. install / upgrade / rollback — 한 줄로 운영',
        desc: 'helm install로 처음 설치, helm upgrade로 변경, helm rollback으로 되돌리기. 모든 변경이 release 단위로 기록되어 history로 추적 가능. ArtifactHub에 공식 Chart(Postgres, Redis, Prometheus)도 많아 오픈소스 도구 설치도 1줄.',
        block: {
          kind: 'shell',
          code: `# 첫 설치
$ helm install web ./mychart -f values-prod.yaml
NAME: web
LAST DEPLOYED: ...
STATUS: deployed
REVISION: 1

# 버전 업
$ helm upgrade web ./mychart -f values-prod.yaml \\
    --set image.tag=v1.6
REVISION: 2

# 문제 발생 → 즉시 롤백
$ helm rollback web 1
REVISION: 3 (== revision 1 상태)

# 히스토리
$ helm history web
REVISION  STATUS      DESCRIPTION
1         superseded  Install
2         failed      Upgrade
3         deployed    Rollback to 1

# 외부 Chart 설치 — 1줄로 Postgres
$ helm repo add bitnami https://charts.bitnami.com/bitnami
$ helm install pg bitnami/postgresql --set auth.postgresPassword=...`,
        },
        focus: 'install',
      },
    ];

    const KIND_STYLE = {
      shell: { label: 'Bash', textColor: '#86efac' },
      yaml:  { label: 'YAML', textColor: '#fde68a' },
    };

    const STAGES = [
      { key: 'sprawl', emoji: '📂', name: 'yaml 폭증',  note: '환경별 사본 N개' },
      { key: 'chart',  emoji: '📔', name: 'Chart 구조', note: '템플릿 + 메타' },
      { key: 'values', emoji: '🧂', name: 'values 환경별', note: '같은 Chart, 다른 값' },
      { key: 'install',emoji: '🚀', name: 'install/upgrade/rollback', note: 'release 단위 운영' },
    ];

    function HelmDiagram({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">📔 레시피 책 (Helm)</div>
          <div className="grid grid-cols-4 gap-2">
            {STAGES.map((s) => {
              const isActive = focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-amber-100 border-2 border-amber-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{s.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{s.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{s.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Helm (패키지 매니저)</h1>
                <p className="text-sm text-slate-500 mt-1">레시피 책 — 같은 Chart, 환경별 values 갈아끼우기</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <HelmDiagram focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'install' && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 mb-6 text-xs text-amber-900">
                💡 다음(V-2-1)에서는 운영 클러스터의 건강 상태를 추적하는 모니터링(Prometheus + Grafana)을 본다 — 건강검진 비유
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
