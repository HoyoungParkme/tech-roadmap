  <!--
    V-2-1. Kubernetes 모니터링 — Prometheus + Grafana + Alertmanager
    학습 목표: 메트릭 수집(Prometheus) → 시각화(Grafana) → 알람(Alertmanager) 3종 세트를 단계적으로 도입.
    핵심 비유: "건강검진" — 측정장비(Prometheus) / 차트(Grafana) / 호출벨(Alertmanager)
    패턴: fastapi v1 — 좌(LiveDataPane: 4 시계열 그래프 + 흐름 다이어그램) / 우(VSCode CodeViewer)
    색상: cyan
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 시계열 데이터 생성 헬퍼
    //   length: 포인트 개수 / base: 기본값 / spike: 후반 급등 강도 / noise: 흔들림
    //   visibility: 'none' | 'collected' — 모니터링 부재 단계는 점선만 표시
    // ─────────────────────────────────────────────────────
    function genSeries(length, base, spike, noise, seed = 1) {
      // 결정론적 의사난수 (시드 기반) — 단계 전환 시 그래프가 깜빡이지 않도록
      let s = seed * 7919;
      const rand = () => {
        s = (s * 9301 + 49297) % 233280;
        return s / 233280;
      };
      const out = [];
      for (let i = 0; i < length; i++) {
        const t = i / (length - 1);
        const spikeBoost = spike * Math.pow(t, 2.2);
        const wobble = (rand() - 0.5) * 2 * noise;
        out.push(Math.max(0, base + spikeBoost + wobble));
      }
      return out;
    }

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (Prometheus 메트릭 시뮬레이션)
    //   metrics: { cpu / mem / rps / err } 각각 series + threshold + state
    //   flow: 'none' | 'prom' | 'svcMonitor' | 'promql' | 'grafana' | 'alert'
    // ─────────────────────────────────────────────────────

            '    - port: metrics          # Service의 named port',

            '',
            '# 매칭 대상 Service 예시',
            '---',
            'apiVersion: v1',
            'kind: Service',
            'metadata:',
            '  name: web',
            '  labels:',
            '    app: web                 # ← 여기 라벨이 일치하면 자동 등록',

      },
      {

        desc: 'raw 메트릭은 누적 카운터. PromQL의 `rate()`로 초당 변화량으로 변환, `sum() by (pod)`로 집계. 5xx 에러율 / Pod CPU / RPS — 모든 그래프가 한 줄짜리 쿼리로 그려진다. 부하 증가가 보이기 시작.',
        metrics: {
          cpu: { series: genSeries(20, 50, 22, 6, 31), threshold: 80, value: 68, unit: '%',  state: 'warn', visibility: 'collected' },
          mem: { series: genSeries(20, 62, 14, 5, 32), threshold: 85, value: 74, unit: '%',  state: 'warn', visibility: 'collected' },
          rps: { series: genSeries(20, 280, 140, 22, 33), threshold: null, value: 410, unit: 'rps', state: 'info', visibility: 'collected' },
          err: { series: genSeries(20, 0.6, 0.5, 0.18, 34), threshold: 1, value: 0.95, unit: '%', state: 'warn', visibility: 'collected' },
        },
        flow: 'promql',
        showAlert: false,
        code: {

            '',

            ')',
            '',

        },

        metrics: {
          cpu: { series: genSeries(20, 60, 28, 7, 41), threshold: 80, value: 82, unit: '%',  state: 'crit', visibility: 'collected' },
          mem: { series: genSeries(20, 70, 18, 5, 42), threshold: 85, value: 86, unit: '%',  state: 'crit', visibility: 'collected' },
          rps: { series: genSeries(20, 380, 220, 28, 43), threshold: null, value: 590, unit: 'rps', state: 'info', visibility: 'collected' },
          err: { series: genSeries(20, 0.8, 1.4, 0.3, 44), threshold: 1, value: 2.1, unit: '%', state: 'crit', visibility: 'collected' },
        },
        flow: 'grafana',
        showAlert: false,
        code: {
          lang: 'json',
          filename: 'grafana-dashboard.json',
          lines: [
            '{',
            '  "title": "K8s Production Overview",',
            '  "refresh": "30s",',

            '    {',
            '      "id": 1, "title": "CPU Usage (%)",',

            '      "targets": [{',

        metrics: {
          cpu: { series: genSeries(20, 70, 32, 8, 51), threshold: 80, value: 94, unit: '%',  state: 'crit', visibility: 'collected' },

          err: { series: genSeries(20, 1.2, 2.6, 0.4, 54), threshold: 1, value: 4.2, unit: '%', state: 'crit', visibility: 'collected' },

            'apiVersion: monitoring.coreos.com/v1',

            '  groups:',
            '    - name: web',

            '# [ALERT] HighCPU · severity=critical',
            '# avg(cpu)=0.94 (threshold 0.8, 5min sustained)',

    // ─────────────────────────────────────────────────────
    // 메트릭 메타 (이름/단위/임계치 표시 형식)
    // ─────────────────────────────────────────────────────
    const METRIC_META = [
      { key: 'cpu', emoji: 'CPU', name: 'CPU 사용률',  sub: 'container_cpu / node', unit: '%',   max: 100 },
      { key: 'mem', emoji: 'MEM', name: '메모리 사용률', sub: 'working_set / limit',  unit: '%',   max: 100 },
      { key: 'rps', emoji: 'RPS', name: '요청 수',      sub: 'rate(http_total[5m])', unit: 'rps', max: 800 },
      { key: 'err', emoji: 'ERR', name: '에러율 (5xx)', sub: 'status=~5..',          unit: '%',   max: 5   },
    ];

    // 상태별 색상 — cyan 베이스 + warn(amber) + crit(red)
    const STATE_STYLE = {
      unknown: { stroke: '#cbd5e1', fill: '#cbd5e1', text: 'text-slate-400', card: 'bg-slate-50 border-slate-200',  badge: 'bg-slate-200 text-slate-500',  label: '모름' },
      good:    { stroke: '#06b6d4', fill: '#06b6d4', text: 'text-cyan-700',  card: 'bg-cyan-50 border-cyan-300',    badge: 'bg-cyan-100 text-cyan-700',    label: '정상' },
      info:    { stroke: '#0891b2', fill: '#0891b2', text: 'text-cyan-700',  card: 'bg-cyan-50 border-cyan-300',    badge: 'bg-cyan-100 text-cyan-700',    label: '정보' },
      warn:    { stroke: '#f59e0b', fill: '#f59e0b', text: 'text-amber-700', card: 'bg-amber-50 border-amber-400',  badge: 'bg-amber-100 text-amber-700',  label: '주의' },
      crit:    { stroke: '#ef4444', fill: '#ef4444', text: 'text-red-700',   card: 'bg-red-50 border-red-500',      badge: 'bg-red-100 text-red-700',      label: '위험' },
    };

    // ─────────────────────────────────────────────────────
    // SparkChart — 한 메트릭의 시계열 SVG 그래프
    //   width=100, height=44 viewBox 비율로 컨테이너에 맞춤
    //   visibility 'none' → 점선 placeholder만, 'collected' → 실제 라인
    // ─────────────────────────────────────────────────────
    function SparkChart({ data, threshold, max, state, visibility }) {
      const W = 100;
      const H = 44;
      const style = STATE_STYLE[state];

      if (visibility === 'none') {
        return (
          <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-12" preserveAspectRatio="none">
            <line x1="0" y1={H / 2} x2={W} y2={H / 2}
                  stroke="#cbd5e1" strokeWidth="0.6" strokeDasharray="2 2" />
            <text x={W / 2} y={H / 2 - 3} textAnchor="middle"
                  fontSize="6" fill="#94a3b8" fontFamily="monospace">no data</text>
          </svg>
        );
      }

      // 정규화 — max 기준으로 좌표 변환
      const yMax = Math.max(max, ...data) * 1.05;
      const stepX = W / (data.length - 1);

      // 라인 폴리라인 좌표
      const points = data.map((v, i) => {
        const x = i * stepX;
        const y = H - (v / yMax) * H;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(' ');

      // 면적 채우기용
      const areaPath = `M 0,${H} L ${points.split(' ').join(' L ')} L ${W},${H} Z`;

      // 임계치 라인 위치
      const thY = threshold != null ? H - (threshold / yMax) * H : null;

      return (
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-12" preserveAspectRatio="none">
          {/* 그리드 */}
          <line x1="0" y1={H * 0.25} x2={W} y2={H * 0.25} stroke="#e2e8f0" strokeWidth="0.3" />
          <line x1="0" y1={H * 0.5}  x2={W} y2={H * 0.5}  stroke="#e2e8f0" strokeWidth="0.3" />
          <line x1="0" y1={H * 0.75} x2={W} y2={H * 0.75} stroke="#e2e8f0" strokeWidth="0.3" />

          {/* 면적 */}
          <path d={areaPath} fill={style.fill} fillOpacity="0.15" />

          {/* 라인 */}
          <polyline points={points} fill="none" stroke={style.stroke} strokeWidth="1.2"
                    strokeLinejoin="round" strokeLinecap="round" />

          {/* 임계치 라인 (빨간 점선) */}
          {thY != null && (
            <line x1="0" y1={thY} x2={W} y2={thY}
                  stroke="#dc2626" strokeWidth="0.5" strokeDasharray="1.5 1.5" />
          )}

          {/* 마지막 점 */}
          <circle cx={W} cy={H - (data[data.length - 1] / yMax) * H}
                  r="1.2" fill={style.stroke} />
        </svg>
      );
    }

    // ─────────────────────────────────────────────────────
    // FlowDiagram — Prometheus → Grafana → Alertmanager 흐름
    // ─────────────────────────────────────────────────────
    const FLOW_STAGES = [
      { key: 'pods',  label: 'App Pods',     sub: '/metrics',        flowKeys: ['prom', 'svcMonitor', 'promql', 'grafana', 'alert'] },
      { key: 'prom',  label: 'Prometheus',   sub: 'TSDB · 15s scrape', flowKeys: ['prom', 'svcMonitor', 'promql', 'grafana', 'alert'] },
      { key: 'graf',  label: 'Grafana',      sub: '대시보드 4 패널',  flowKeys: ['grafana', 'alert'] },
      { key: 'am',    label: 'Alertmanager', sub: 'PagerDuty · Slack', flowKeys: ['alert'] },
    ];

    function FlowDiagram({ flow }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="text-xs font-bold text-slate-700">관측성 데이터 흐름</div>
            <div className="text-[10px] text-slate-400 font-mono">pull → query → notify</div>
          </div>

          <div className="flex items-center gap-1">
            {FLOW_STAGES.map((s, i) => {
              const isActive = s.flowKeys.includes(flow);
              const isAlertCrit = flow === 'alert' && s.key === 'am';
              return (
                <React.Fragment key={s.key}>
                  <div className={`flex-1 rounded-lg p-2 text-center border-2 transition-all duration-500
                    ${isAlertCrit ? 'bg-red-50 border-red-400 animate-pulse'
                      : isActive ? 'bg-cyan-50 border-cyan-400'
                      : 'bg-slate-50 border-slate-200 opacity-50'}`}>
                    <div className={`text-[11px] font-bold ${isAlertCrit ? 'text-red-800' : isActive ? 'text-cyan-800' : 'text-slate-500'}`}>
                      {s.label}
                    </div>
                    <div className={`text-[9px] mt-0.5 ${isAlertCrit ? 'text-red-600' : isActive ? 'text-cyan-600' : 'text-slate-400'} font-mono`}>
                      {s.sub}
                    </div>
                  </div>
                  {i < FLOW_STAGES.length - 1 && (
                    <div className={`text-sm font-bold ${isActive && FLOW_STAGES[i + 1].flowKeys.includes(flow) ? 'text-cyan-500' : 'text-slate-300'}`}>
                      &rarr;
                    </div>
                  )}
                </React.Fragment>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 4 시계열 그래프 + 흐름 다이어그램 + 알람 배지
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ metrics, flow, showAlert }) {
      const anyCrit = Object.values(metrics).some((m) => m.state === 'crit');

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm space-y-3">
          {/* 헤더 */}
          <div className="flex items-center justify-between">
            <h2 className="text-sm font-bold text-slate-700">Grafana — Production Overview</h2>
            <span className={`text-[10px] font-mono px-2 py-0.5 rounded
              ${flow === 'none' ? 'bg-slate-100 text-slate-400'
                : anyCrit ? 'bg-red-100 text-red-700 animate-pulse'
                : 'bg-cyan-100 text-cyan-700'}`}>
              {flow === 'none' ? 'no metrics' : anyCrit ? 'ALERT' : 'live · 15s'}
            </span>
          </div>

          {/* 4 시계열 그래프 */}
          <div className="grid grid-cols-2 gap-2">
            {METRIC_META.map((m) => {
              const d = metrics[m.key];
              const style = STATE_STYLE[d.state];
              const isCrit = d.state === 'crit';
              return (
                <div key={m.key}
                  className={`rounded-lg border-2 p-2 transition-all duration-500
                    ${style.card} ${isCrit ? 'animate-pulse' : ''}`}>
                  <div className="flex items-center justify-between mb-1">
                    <div className="flex items-center gap-1.5">
                      <span className="text-[9px] font-mono font-bold text-slate-500">{m.emoji}</span>
                      <span className="text-[11px] font-bold text-slate-700">{m.name}</span>
                    </div>
                    <span className={`text-[9px] font-bold px-1 py-0.5 rounded ${style.badge}`}>
                      {isCrit ? 'ALERT ' : ''}{style.label}
                    </span>
                  </div>

                  <div className="flex items-baseline gap-1">
                    <span className={`text-xl font-extrabold tabular-nums ${style.text}`}>{d.value}</span>
                    <span className={`text-[10px] ${style.text}`}>{d.unit}</span>
                    {d.threshold != null && (
                      <span className="ml-auto text-[9px] font-mono text-red-600">th &gt; {d.threshold}{m.unit === '%' ? '%' : ''}</span>
                    )}
                  </div>

                  <SparkChart
                    data={d.series}
                    threshold={d.threshold}
                    max={m.max}
                    state={d.state}
                    visibility={d.visibility}
                  />

                  <div className="text-[9px] text-slate-500 font-mono truncate mt-0.5">{m.sub}</div>
                </div>
              );
            })}
          </div>

          {/* 알람 배지 */}
          {showAlert && (
            <div className="p-2 rounded-lg bg-red-50 border-2 border-red-400 animate-pulse">
              <div className="flex items-center gap-2 text-red-800 font-bold text-xs">
                <span className="text-base">!</span>
                <span>ALERT: HighCPU · HighErrorRate</span>
                <span className="ml-auto text-[10px] font-mono text-red-600">PagerDuty 호출됨</span>
              </div>
              <div className="text-[10px] text-red-700 mt-0.5 font-mono">
                #ops-alerts · severity=critical · for: 5m sustained · runbook 링크 첨부
              </div>
            </div>
          )}

          {/* 흐름 다이어그램 */}
          <FlowDiagram flow={flow} />

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] pt-1 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-cyan-400"></span>정상</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-amber-400"></span>주의</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-red-500"></span>위험</span>
            <span className="flex items-center gap-1 ml-auto"><span className="w-3 h-0.5 bg-red-600 inline-block"></span>임계치</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        codeRef.current.removeAttribute('data-highlighted');
        codeRef.current.className = `language-${code.lang}`;
        codeRef.current.textContent = code.lines.join('\n');
        window.hljs.highlightElement(codeRef.current);
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-cyan-500/10 border-l-2 border-cyan-400' : ''}`}>
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                            dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }} />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. Kubernetes 운영 &gt; Chapter 2. 모니터링</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Prometheus + Grafana + Alertmanager</h1>
                  <p className="text-sm text-slate-500 mt-0.5">건강검진 — 메트릭 수집 / 대시보드 / 임계 알람 3종 세트</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                metrics={step.metrics}
                flow={step.flow}
                showAlert={step.showAlert}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 next 안내 */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-cyan-50 border-2 border-cyan-300 rounded-xl p-3 text-sm text-cyan-900">
                다음(V-2-2)에서는 <strong>알림이 왔을 때의 트러블슈팅 흐름</strong> — 응급실 진단 체크리스트
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-cyan-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-cyan-600 text-white hover:bg-cyan-700 transition min-w-[110px]"
              >
                {isPlaying ? '정지' : (stepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./V-1-2.html" className="text-slate-500 hover:text-slate-700">&larr; V-1-2</a>
              <a href="./V-2-2.html" className="text-cyan-700 hover:text-cyan-900 font-medium">V-2-2 트러블슈팅 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
