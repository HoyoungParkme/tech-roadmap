<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kubernetes 학습 — kubectl 핵심 명령어</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    V-1-1. kubectl 핵심 명령어
    학습 목표: get / describe / logs / exec / apply 5개로 일상 운영을 한다.
    핵심 비유: "스위스 군도 5종 도구" — 한 칼로 다 되는 것 같지만 각자 역할이 다름
    구조: 4단계 (조회 / 진단 / 로그 / 변경)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 조회 — kubectl get (전체 상황 파악)',
        desc: '가장 먼저 치는 명령어. Pod / Service / Deployment 등 리소스 상태를 한눈에. 짧은 별칭(`kubectl get po`, `kubectl get svc`)을 외워두면 빠르다.',
        block: {
          kind: 'shell',
          code: `# 기본
$ kubectl get pods
NAME                       READY   STATUS    RESTARTS   AGE
web-7d9f8c5b-aa1           1/1     Running   0          2d
web-7d9f8c5b-bb2           1/1     Running   0          2d

# 자주 쓰는 옵션
$ kubectl get pods -A           # 모든 namespace
$ kubectl get pods -o wide      # 상세 (노드 / IP)
$ kubectl get pods -w           # watch (실시간 변화)
$ kubectl get pods -l app=web   # 라벨 필터
$ kubectl get pod web-aa1 -o yaml   # 한 Pod의 전체 YAML`,
        },
        focus: 'get',
        tool: { emoji: '🔍', name: 'get', use: '리소스 조회' },
      },
      {
        title: 'Step 2. 진단 — kubectl describe (상세 + Events)',
        desc: 'get으로 상태가 이상하면 describe로 깊이 들어간다. 마지막 Events 섹션이 가장 중요 — "왜 안 되나"의 답이 여기 있다. ImagePullBackOff/CrashLoopBackOff 첫 진단 도구.',
        block: {
          kind: 'shell',
          code: `$ kubectl describe pod web-aa1
Name:         web-aa1
Namespace:    default
Status:       Running
Containers:
  app:
    Image:        myapp:v1
    Ports:        8080/TCP
    State:        Running
    Last State:   Terminated
      Reason:     OOMKilled       ← 핵심!
Events:
  Type     Reason     From       Message
  Normal   Scheduled  scheduler  Successfully assigned default/web-aa1 to node-2
  Warning  BackOff    kubelet    Back-off restarting failed container  ← 문제 신호
  Normal   Pulling    kubelet    Pulling image "myapp:v1"`,
        },
        focus: 'describe',
        tool: { emoji: '🩺', name: 'describe', use: '상세 진단 + Events' },
      },
      {
        title: 'Step 3. 로그 — kubectl logs (앱 출력)',
        desc: '앱 자체의 stdout/stderr 확인. -f로 실시간 추적, --previous로 이전 컨테이너(crash 직전) 로그. 멀티 컨테이너 Pod면 -c로 컨테이너 지정.',
        block: {
          kind: 'shell',
          code: `# 기본
$ kubectl logs web-aa1
2026-05-06T08:15:32 INFO  Starting server on :8080
2026-05-06T08:15:33 INFO  DB connected: postgres://prod-db:5432

# 자주 쓰는 옵션
$ kubectl logs -f web-aa1                      # 실시간
$ kubectl logs --previous web-aa1               # crash 직전
$ kubectl logs web-aa1 -c log-shipper           # sidecar
$ kubectl logs -l app=web --tail=20             # 라벨로 모든 Pod
$ kubectl logs deployment/web                   # Deployment의 모든 Pod`,
        },
        focus: 'logs',
        tool: { emoji: '📜', name: 'logs', use: '앱 출력 추적' },
      },
      {
        title: 'Step 4. 변경 — kubectl apply / exec (수정과 침투)',
        desc: 'apply는 yaml 변경을 적용 (idempotent). exec는 실행 중 컨테이너 안에 들어가 직접 명령 — DB 마이그레이션 임시 실행, 디버깅 셸 진입에 사용. 핵심 5종 도구 완성.',
        block: {
          kind: 'shell',
          code: `# 변경 적용 (idempotent — 차이만 적용)
$ kubectl apply -f deployment.yaml
deployment.apps/web configured

# 컨테이너 안에 명령 실행
$ kubectl exec web-aa1 -- ls /app
main.py  requirements.txt

# 셸 진입 (디버깅)
$ kubectl exec -it web-aa1 -- bash
root@web-aa1:/app# echo "안에 들어옴"

# 1회 임시 Pod (디버깅 도구)
$ kubectl run tmp --rm -it --image=busybox -- sh
/ # nslookup db
/ # exit  → Pod 자동 삭제`,
        },
        focus: 'apply-exec',
        tool: { emoji: '✏️', name: 'apply / exec', use: '변경 + 침투' },
      },
    ];

    const KIND_STYLE = {
      shell: { label: 'Bash', textColor: '#86efac' },
      yaml:  { label: 'YAML', textColor: '#fde68a' },
    };

    // 4 카드 정적 매핑 (apply/exec를 한 카드로 묶음 — 변경/침투 카테고리)
    const TOOLS = [
      { key: 'get',        emoji: '🔍', name: 'get',       use: '조회' },
      { key: 'describe',   emoji: '🩺', name: 'describe',  use: '진단' },
      { key: 'logs',       emoji: '📜', name: 'logs',      use: '로그' },
      { key: 'apply-exec', emoji: '✏️', name: 'apply/exec',use: '변경/침투' },
    ];

    function ToolKit({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🔧 스위스 군도 — 일상 운영 4 카테고리 (apply+exec 묶음)</div>
          <div className="grid grid-cols-4 gap-2">
            {TOOLS.map((t) => {
              const isActive = focus === t.key;
              return (
                <div
                  key={t.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-amber-100 border-2 border-amber-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{t.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">kubectl {t.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{t.use}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">kubectl 핵심 명령어</h1>
                <p className="text-sm text-slate-500 mt-1">스위스 군도 — 일상 운영의 90%를 담당하는 5명령어 / 4 카테고리</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <ToolKit focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'apply-exec' && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 mb-6 text-xs text-amber-900">
                💡 다음(V-1-2)에서는 매니페스트를 패키지로 묶는 Helm을 본다 — 레시피 책 비유 (Chart + values.yaml)
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
