            'kubectl delete pod web-aa1',
            '#   pod "web-aa1" deleted',
            '#   → ReplicaSet이 즉시 새 Pod 만들어 self-heal',
            '',
            '# 강제 즉시 삭제 (위험: SIGKILL 직행)',
            'kubectl delete pod web-aa1 --grace-period=0 --force',
            '',
            '# 라벨로 일괄 삭제',
            'kubectl delete pods -l app=web',
            '',
            '# Deployment 통째 (Pod도 따라 사라짐)',
            'kubectl delete deployment web',
            'kubectl delete -f deployment.yaml',
            '',
            '# 종료 흐름 (graceful termination)',
            '#  1) kubectl → API server: DELETE /api/v1/.../pods/web-aa1',
            '#  2) API server → etcd: deletionTimestamp 박고 status=Terminating',
            '#  3) endpoint-controller: Service에서 즉시 IP 제거 (트래픽 차단)',
            '#  4) kubelet: SIGTERM을 PID 1에 전송',
            '#  5) preStop hook 실행 (있을 때만)',
            '#  6) 앱이 in-flight 요청 마무리 (FastAPI lifespan/Spring shutdown)',
            '#  7) terminationGracePeriodSeconds(기본 30s) 만료 → SIGKILL',
            '#  8) etcd에서 Pod 객체 finalize → 완전 삭제',
            '#  9) ReplicaSet/StatefulSet이 desired count 복구',
            '',
            '# 권장',
            '#  - 앱은 SIGTERM 받으면 새 요청 거절 + 진행 중 요청 마무리하게 코딩',
            '#  - --force는 정말 필요한 경우만 (StatefulSet 데이터 손상 위험)',
          ],
          highlight: [7, 12, 22, 23, 24, 25, 26, 27, 28, 29],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 노드 위치 (좌측 LiveDataPane 다이어그램용)
    //   col: 0~2, row: 0~1
    // ─────────────────────────────────────────────────────
    const NODE_POS = {
      kubectl:   { x: 40,  y: 40,  w: 110, h: 60 },
      apiserver: { x: 195, y: 40,  w: 130, h: 60 },
      etcd:      { x: 370, y: 40,  w: 110, h: 60 },
      kubelet:   { x: 195, y: 160, w: 130, h: 60 },
      container: { x: 370, y: 160, w: 110, h: 60 },
    };

    // 엣지 정의 (from-to 노드 키)
    const EDGES = [
      { key: 'kubectl->apiserver', from: 'kubectl',  to: 'apiserver' },
      { key: 'apiserver->kubectl', from: 'apiserver', to: 'kubectl', dashed: true },
      { key: 'apiserver->etcd',    from: 'apiserver', to: 'etcd' },
      { key: 'etcd->apiserver',    from: 'etcd',      to: 'apiserver', dashed: true },
      { key: 'apiserver->kubelet', from: 'apiserver', to: 'kubelet' },
      { key: 'kubelet->apiserver', from: 'kubelet',   to: 'apiserver', dashed: true },
      { key: 'kubelet->container', from: 'kubelet',   to: 'container' },
      { key: 'container->kubelet', from: 'container', to: 'kubelet',   dashed: true },
    ];

    // ─────────────────────────────────────────────────────
    // FlowDiagram — SVG로 노드+엣지 그리기
    // ─────────────────────────────────────────────────────
    function FlowDiagram({ activeNodes, activeEdges }) {
      const W = 520;
      const H = 250;

      const edgeCoords = (e) => {
        const f = NODE_POS[e.from];
        const t = NODE_POS[e.to];
        // 화살표 시작/끝을 박스 가장자리로 잡기
        const fcx = f.x + f.w / 2;
        const fcy = f.y + f.h / 2;
        const tcx = t.x + t.w / 2;
        const tcy = t.y + t.h / 2;
        // 같은 row면 좌우 가장자리, 다른 row면 위/아래
        let x1, y1, x2, y2;
        if (Math.abs(fcy - tcy) < 5) {
          // 같은 row
          if (fcx < tcx) {
            x1 = f.x + f.w; y1 = fcy; x2 = t.x; y2 = tcy;
          } else {
            x1 = f.x; y1 = fcy; x2 = t.x + t.w; y2 = tcy;
          }
        } else {
          // 다른 row
          if (fcy < tcy) {
            x1 = fcx; y1 = f.y + f.h; x2 = tcx; y2 = t.y;
          } else {
            x1 = fcx; y1 = f.y; x2 = tcx; y2 = t.y + t.h;
          }
        }
        return { x1, y1, x2, y2 };
      };

      return (
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{ minHeight: 230 }}>
          <defs>
            <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4" />
            </marker>
            <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#cbd5e1" />
            </marker>
            <filter id="cyan-glow" x="-30%" y="-30%" width="160%" height="160%">
              <feGaussianBlur stdDeviation="3" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>

          {/* 컨트롤 플레인 영역 배경 */}
          <rect x="180" y="20" width="310" height="100" rx="8" fill="#f1f5f9" stroke="#cbd5e1" strokeDasharray="4 3" />
          <text x="335" y="14" textAnchor="middle" className="text-[10px]" fill="#64748b" fontFamily="monospace">control plane</text>

          {/* 노드 영역 배경 */}
          <rect x="180" y="140" width="310" height="100" rx="8" fill="#fefce8" stroke="#eab308" strokeDasharray="4 3" />
          <text x="335" y="134" textAnchor="middle" className="text-[10px]" fill="#a16207" fontFamily="monospace">worker node</text>

          {/* 엣지 */}
          {EDGES.map((e) => {
            const { x1, y1, x2, y2 } = edgeCoords(e);
            const isActive = activeEdges && activeEdges.includes(e.key);
            const stroke = isActive ? '#06b6d4' : '#cbd5e1';
            const marker = isActive ? 'url(#arrow-cyan)' : 'url(#arrow-slate)';
            return (
              <line
                key={e.key}
                x1={x1} y1={y1} x2={x2} y2={y2}
                stroke={stroke}
                strokeWidth={isActive ? 2.5 : 1.5}
                strokeDasharray={e.dashed ? '5 4' : '0'}
                markerEnd={marker}
                style={isActive ? { filter: 'url(#cyan-glow)' } : {}}
              />
            );
          })}

          {/* 노드 박스 */}
          {NODES.map((n) => {
            const p = NODE_POS[n.key];
            const isActive = activeNodes && activeNodes.includes(n.key);
            return (
              <g key={n.key} style={isActive ? { filter: 'url(#cyan-glow)' } : {}}>
                <rect
                  x={p.x} y={p.y} width={p.w} height={p.h}
                  rx="8"
                  fill={isActive ? '#cffafe' : '#ffffff'}
                  stroke={isActive ? '#06b6d4' : '#cbd5e1'}
                  strokeWidth={isActive ? 2.5 : 1.5}
                />
                <text
                  x={p.x + p.w / 2} y={p.y + 24}
                  textAnchor="middle"
                  fontSize="13"
                  fontWeight="bold"
                  fill={isActive ? '#0e7490' : '#334155'}
                  fontFamily="monospace"
                >
                  {n.name}
                </text>
                <text
                  x={p.x + p.w / 2} y={p.y + 42}
                  textAnchor="middle"
                  fontSize="9.5"
                  fill={isActive ? '#0e7490' : '#64748b'}
                >
                  {n.sub}
                </text>
              </g>
            );
          })}
        </svg>
      );
    }

    // ─────────────────────────────────────────────────────
    // OutputBox — step별 출력 내용 (table/describe/logs/shell/apply/delete)
    // ─────────────────────────────────────────────────────
    function OutputBox({ kind, output }) {
      // 1) get pods 표
      if (kind === 'table') {
        return (
          <div className="bg-slate-900 rounded-lg overflow-hidden border border-slate-700">
            <div className="bg-slate-800 px-3 py-1.5 text-[10px] text-slate-400 font-mono flex items-center gap-2">
              <span className="w-2 h-2 rounded-full bg-cyan-400"></span>
              <span>$ kubectl get pods</span>
            </div>
            <div className="p-3 overflow-x-auto">
              <table className="w-full text-[11px] font-mono text-slate-200">
                <thead>
                  <tr className="text-cyan-400 border-b border-slate-700">
                    {output.headers.map((h) => (
                      <th key={h} className="text-left py-1 px-2 font-bold">{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {output.rows.map((row, i) => (
                    <tr key={i} className="border-b border-slate-800 hover:bg-slate-800/50">
                      {row.map((cell, j) => (
                        <td key={j} className="py-1 px-2 whitespace-nowrap">
                          {j === 2 && cell === 'Running' ? (
                            <span className="text-emerald-400">{cell}</span>
                          ) : cell}
                        </td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      }

      // 2) describe pod
      if (kind === 'describe') {
        return (
          <div className="bg-slate-900 rounded-lg overflow-hidden border border-slate-700">
            <div className="bg-slate-800 px-3 py-1.5 text-[10px] text-slate-400 font-mono flex items-center gap-2">
              <span className="w-2 h-2 rounded-full bg-cyan-400"></span>
              <span>$ kubectl describe pod {output.name}</span>
            </div>
            <div className="p-3 text-[11px] font-mono leading-5">
              <div className="text-slate-200">
                <span className="text-cyan-400">Name:</span>      {output.name}
              </div>
              <div className="text-slate-200">
                <span className="text-cyan-400">Status:</span>    <span className="text-emerald-400">{output.status}</span>
              </div>
              <div className="text-slate-200">
                <span className="text-cyan-400">Last Reason:</span> <span className="text-red-400">{output.lastReason}</span>
              </div>
              <div className="text-cyan-400 mt-2 mb-1">Events:</div>
              <div className="space-y-0.5">
                {output.events.map((ev, i) => (
                  <div key={i} className="flex gap-2 text-slate-200">
                    <span className={`w-14 ${ev.type === 'Warning' ? 'text-yellow-400' : 'text-slate-400'}`}>
                      {ev.type}
                    </span>
                    <span className="w-20 text-cyan-300">{ev.reason}</span>
                    <span className="w-16 text-slate-500">{ev.from}</span>
                    <span className={ev.type === 'Warning' ? 'text-yellow-200' : 'text-slate-300'}>
                      {ev.msg}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      // 3) logs -f 스트림
      if (kind === 'logs') {
        const lvlColor = { INFO: 'text-cyan-300', WARN: 'text-yellow-400', ERROR: 'text-red-400' };
        return (
          <div className="bg-slate-900 rounded-lg overflow-hidden border border-slate-700">
            <div className="bg-slate-800 px-3 py-1.5 text-[10px] text-slate-400 font-mono flex items-center justify-between">
              <span className="flex items-center gap-2">
                <span className="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span>
                <span>$ kubectl logs -f web-aa1</span>
              </span>
              <span className="text-cyan-400">▍ live</span>
            </div>
            <div className="p-3 text-[11px] font-mono leading-5 space-y-0.5">
              {output.lines.map((l, i) => (
                <div key={i} className="text-slate-200 flex gap-2">
                  <span className="text-slate-500 whitespace-nowrap">{l.ts}</span>
                  <span className={`font-bold w-12 ${lvlColor[l.lvl]}`}>{l.lvl}</span>
                  <span className="text-slate-200 flex-1">{l.msg}</span>
                </div>
              ))}
              <div className="text-cyan-400 animate-pulse">▍</div>
            </div>
          </div>
        );
      }

      // 4) exec shell 인터랙티브
      if (kind === 'shell') {
        return (
          <div className="bg-slate-900 rounded-lg overflow-hidden border border-slate-700">
            <div className="bg-slate-800 px-3 py-1.5 text-[10px] text-slate-400 font-mono flex items-center gap-2">
              <span className="w-2 h-2 rounded-full bg-cyan-400"></span>
              <span>$ kubectl exec -it web-aa1 -- bash</span>
            </div>
            <div className="p-3 text-[11px] font-mono leading-5">
              {output.history.map((h, i) => {
                if (h.type === 'cmd') {
                  return (
                    <div key={i} className="text-slate-200">
                      <span className="text-cyan-400">{output.prompt}</span> {h.text}
                    </div>
                  );
                }
                return (
                  <div key={i} className="text-slate-300 whitespace-pre-line pl-1">
                    {h.text}
                  </div>
                );
              })}
              <div className="text-cyan-400 mt-1">{output.prompt} <span className="animate-pulse">▍</span></div>
            </div>
          </div>
        );
      }

      // 5) apply cascade
      if (kind === 'apply') {
        const kindColor = {
          cmd:  'text-slate-200',
          ok:   'text-emerald-400',
          info: 'text-slate-500',
          evt:  'text-cyan-300',
        };
        return (
          <div className="bg-slate-900 rounded-lg overflow-hidden border border-slate-700">
            <div className="bg-slate-800 px-3 py-1.5 text-[10px] text-slate-400 font-mono flex items-center gap-2">
              <span className="w-2 h-2 rounded-full bg-cyan-400"></span>
              <span>$ kubectl apply -f deployment.yaml</span>
            </div>
            <div className="p-3 text-[11px] font-mono leading-5 space-y-0.5">
              {output.lines.map((l, i) => (
                <div key={i} className={kindColor[l.kind]}>
                  {l.kind === 'evt' && <span className="text-slate-500 mr-1">›</span>}
                  {l.text}
                </div>
              ))}
            </div>
          </div>
        );
      }

      // 6) delete timeline
      if (kind === 'delete') {
        const stateBadge = {
          cmd:     { color: 'text-slate-200',   label: '명령'   },
          mark:    { color: 'text-cyan-300',    label: '마킹'   },
          sigterm: { color: 'text-yellow-400',  label: 'SIGTERM' },
          hook:    { color: 'text-cyan-300',    label: 'hook'   },
          drain:   { color: 'text-cyan-300',    label: 'drain'  },
          sigkill: { color: 'text-red-400',     label: 'SIGKILL' },
          gone:    { color: 'text-slate-400',   label: '삭제완료' },
          reborn:  { color: 'text-emerald-400', label: '재생성' },
        };
        return (
          <div className="bg-slate-900 rounded-lg overflow-hidden border border-slate-700">
            <div className="bg-slate-800 px-3 py-1.5 text-[10px] text-slate-400 font-mono flex items-center gap-2">
              <span className="w-2 h-2 rounded-full bg-cyan-400"></span>
              <span>$ kubectl delete pod web-aa1   (graceful timeline)</span>
            </div>
            <div className="p-3 text-[11px] font-mono leading-5 space-y-0.5">
              {output.timeline.map((t, i) => {
                const b = stateBadge[t.state];
                return (
                  <div key={i} className="flex gap-2 items-baseline">
                    <span className="w-12 text-slate-500 text-right">{t.t}</span>
                    <span className={`w-16 font-bold ${b.color}`}>[{b.label}]</span>
                    <span className="text-slate-200 flex-1">{t.text}</span>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      return null;
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측: 흐름 다이어그램 + 출력 박스
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🔄 kubectl 트래픽 경로</h2>
            <span className="text-[10px] text-slate-400 font-mono">control plane → node</span>
          </div>

          {/* 흐름 다이어그램 */}
          <div className="bg-slate-50 rounded-lg border border-slate-200 p-2 mb-3">
            <FlowDiagram activeNodes={step.activeNodes} activeEdges={step.activeEdges} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mb-3 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-3 h-0.5 bg-cyan-500"></span>활성 경로
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-0.5 bg-slate-300"></span>비활성
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-3 h-0.5 border-t border-dashed border-slate-400"></span>응답
            </span>
          </div>

          {/* 출력 박스 */}
          <div className="mt-2">
            <div className="text-[10px] text-slate-500 font-mono mb-1.5">▼ 응답 출력</div>
            <OutputBox kind={step.outputKind} output={step.output} />
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js (cyan 강조)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[36rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-cyan-500/15 border-l-2 border-cyan-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-cyan-700 hover:text-cyan-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. Kubernetes 운영 &gt; Chapter 1. kubectl 일상 도구</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">kubectl 핵심 명령어</h1>
                  <p className="text-sm text-slate-500 mt-0.5">스위스 군도 6종 — get / describe / logs / exec / apply / delete가 통과하는 경로</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-cyan-50 border-2 border-cyan-300 rounded-xl p-3 text-sm text-cyan-900">
                💡 다음(V-1-2)에서는 <strong>Helm</strong> — yaml 묶음을 패키지(Chart + values.yaml)로 관리
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-cyan-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-cyan-600 text-white hover:bg-cyan-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./V-1-2.html" className="text-cyan-700 hover:text-cyan-900 font-medium">V-1-2 Helm &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
