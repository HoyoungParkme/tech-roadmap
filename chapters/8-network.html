<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>네트워크 기술 — Chapter 8</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const STEPS = [
      { title: 'Step 1 — 클라이언트-서버 통신', desc: '인터넷에서 모든 통신은 "요청하는 쪽(클라이언트)"과 "응답하는 쪽(서버)"으로 나뉩니다. 브라우저가 클라이언트, 웹 서버가 서버입니다.', metaphor: '전화 통화: 전화 거는 사람(클라이언트)과 받는 사람(서버). 먼저 요청해야 대화가 시작됩니다.', panel: 'cs' },
      { title: 'Step 2 — DNS, IP, Port', desc: 'IP 주소(192.168.0.1)는 컴퓨터의 "주소", Port(443)는 "방 번호", DNS는 도메인 이름(google.com)을 IP로 변환하는 "전화번호부"입니다.', metaphor: 'DNS=114 안내, IP=건물 주소, Port=호수. google.com → DNS 조회 → 142.250.196.46:443', panel: 'dns' },
      { title: 'Step 3 — TCP/IP와 HTTP', desc: 'TCP/IP는 데이터를 안전하게 전달하는 "배송 시스템"이고, HTTP는 그 위에서 웹 데이터를 주고받는 "대화 규칙"입니다. HTTPS는 암호화가 추가된 버전입니다.', metaphor: 'TCP/IP=택배 시스템(주소, 포장, 배송 추적), HTTP=주문서 양식(GET, POST 등).', panel: 'tcp' },
      { title: 'Step 4 — HTTP 요청과 응답', desc: 'HTTP 메서드(GET=조회, POST=생성, PUT=수정, DELETE=삭제)로 요청하고, 상태 코드(200=성공, 404=없음, 500=서버 에러)로 응답합니다.', metaphor: 'GET="메뉴 보여주세요", POST="주문합니다", 200="네 완료!", 404="그 메뉴 없어요", 500="주방에 불났어요"', panel: 'http' },
      { title: 'Step 5 — 웹 서버 vs WAS + 로드밸런서', desc: '웹 서버(Nginx)는 정적 파일을 전달하고, WAS(Tomcat, Uvicorn)는 동적 로직을 처리합니다. 로드밸런서는 여러 서버에 요청을 분산합니다.', metaphor: '웹 서버=안내 데스크(메뉴판 배포), WAS=주방(주문 처리), 로드밸런서=손님을 빈 테이블로 안내하는 매니저.', panel: 'was' },
      { title: 'Step 6 — 세션/쿠키와 JWT', desc: '쿠키는 브라우저에 저장되는 작은 데이터, 세션은 서버에 저장되는 사용자 상태, JWT는 토큰에 정보를 담아 서버 저장 없이 인증하는 방식입니다.', metaphor: '쿠키=식당 스탬프 카드(내가 갖고 있음), 세션=예약 명부(식당이 관리), JWT=신분증(자체 인증 가능).', panel: 'auth' },
    ];

    function VisPanel({ type }) {
      if (type === 'cs') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">클라이언트 — 서버 모델</div>
          <div className="flex items-center justify-center gap-8">
            <div className="text-center p-4 rounded-xl bg-blue-50 border-2 border-blue-300 w-32">
              <div className="text-3xl mb-1">💻</div><div className="font-bold text-blue-700 text-sm">클라이언트</div><div className="text-[10px] text-slate-500">브라우저, 앱</div>
            </div>
            <div className="flex flex-col items-center gap-1">
              <div className="text-xs text-emerald-600 font-bold">요청 →</div>
              <div className="w-16 border-t-2 border-emerald-400 border-dashed"></div>
              <div className="w-16 border-t-2 border-amber-400 border-dashed"></div>
              <div className="text-xs text-amber-600 font-bold">← 응답</div>
            </div>
            <div className="text-center p-4 rounded-xl bg-purple-50 border-2 border-purple-300 w-32">
              <div className="text-3xl mb-1">🖥️</div><div className="font-bold text-purple-700 text-sm">서버</div><div className="text-[10px] text-slate-500">데이터 처리</div>
            </div>
          </div>
          <div className="bg-slate-50 border border-slate-200 rounded-lg p-2 text-center text-xs text-slate-600">항상 클라이언트가 먼저 요청 → 서버가 응답</div>
        </div>
      );
      if (type === 'dns') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">DNS → IP → Port</div>
          {[
            { step: '1', label: 'google.com 입력', detail: '사용자가 브라우저에 도메인 입력', color: 'blue' },
            { step: '2', label: 'DNS 서버에 질의', detail: '"google.com의 IP가 뭐야?"', color: 'indigo' },
            { step: '3', label: 'IP 주소 반환', detail: '142.250.196.46', color: 'purple' },
            { step: '4', label: 'IP:Port로 접속', detail: '142.250.196.46:443 (HTTPS)', color: 'emerald' },
          ].map((s, i) => (
            <div key={i} className={`flex items-center gap-3 p-2 rounded-lg bg-${s.color}-50 border border-${s.color}-200`}>
              <div className={`w-7 h-7 rounded-full bg-${s.color}-500 text-white flex items-center justify-center text-xs font-bold`}>{s.step}</div>
              <div><div className={`text-xs font-bold text-${s.color}-700`}>{s.label}</div><div className="text-[10px] text-slate-500">{s.detail}</div></div>
            </div>
          ))}
        </div>
      );
      if (type === 'tcp') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">네트워크 계층</div>
          {[
            { layer: 'HTTP/HTTPS', role: '웹 데이터 규칙', color: 'emerald' },
            { layer: 'TCP', role: '안정적 전달 보장', color: 'blue' },
            { layer: 'IP', role: '주소 지정 + 라우팅', color: 'indigo' },
            { layer: '물리 계층', role: '전기 신호, 광케이블', color: 'slate' },
          ].map((l, i) => (
            <div key={i} className={`p-3 rounded-lg bg-${l.color}-50 border border-${l.color}-200 flex justify-between items-center`}>
              <span className={`font-bold text-sm text-${l.color}-700`}>{l.layer}</span>
              <span className="text-xs text-slate-600">{l.role}</span>
            </div>
          ))}
        </div>
      );
      if (type === 'http') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">HTTP 메서드 & 상태 코드</div>
          <div className="grid grid-cols-2 gap-3">
            <div><div className="text-xs font-bold text-blue-600 mb-2">메서드 (요청)</div>
              {[{m:'GET',d:'조회'},{m:'POST',d:'생성'},{m:'PUT',d:'수정'},{m:'DELETE',d:'삭제'}].map((r,i)=>(
                <div key={i} className="flex justify-between p-1.5 text-xs bg-blue-50 border border-blue-200 rounded mb-1"><span className="font-bold text-blue-700 font-mono">{r.m}</span><span className="text-slate-500">{r.d}</span></div>
              ))}
            </div>
            <div><div className="text-xs font-bold text-purple-600 mb-2">상태 코드 (응답)</div>
              {[{c:'200',d:'성공',cl:'emerald'},{c:'301',d:'이동됨',cl:'amber'},{c:'404',d:'없음',cl:'red'},{c:'500',d:'서버 에러',cl:'red'}].map((r,i)=>(
                <div key={i} className={`flex justify-between p-1.5 text-xs bg-${r.cl}-50 border border-${r.cl}-200 rounded mb-1`}><span className={`font-bold text-${r.cl}-700 font-mono`}>{r.c}</span><span className="text-slate-500">{r.d}</span></div>
              ))}
            </div>
          </div>
        </div>
      );
      if (type === 'was') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">웹 서버 + WAS + 로드밸런서</div>
          <div className="flex items-start justify-center gap-3">
            <div className="text-center p-2 rounded-lg bg-blue-50 border border-blue-200 w-20"><div className="text-xl">👤</div><div className="text-[10px] text-blue-700 font-bold">사용자</div></div>
            <div className="self-center text-slate-400">→</div>
            <div className="text-center p-2 rounded-lg bg-amber-50 border border-amber-200 w-24"><div className="text-xl">⚖️</div><div className="text-[10px] text-amber-700 font-bold">로드밸런서</div></div>
            <div className="self-center text-slate-400">→</div>
            <div className="space-y-2">
              <div className="text-center p-2 rounded-lg bg-emerald-50 border border-emerald-200"><div className="text-[10px] text-emerald-700 font-bold">Nginx (정적)</div></div>
              <div className="text-center p-2 rounded-lg bg-purple-50 border border-purple-200"><div className="text-[10px] text-purple-700 font-bold">WAS (동적)</div></div>
            </div>
            <div className="self-center text-slate-400">→</div>
            <div className="text-center p-2 rounded-lg bg-slate-50 border border-slate-200 w-16"><div className="text-xl">🗃️</div><div className="text-[10px] text-slate-700 font-bold">DB</div></div>
          </div>
        </div>
      );
      if (type === 'auth') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">인증 방식 비교</div>
          {[
            { name: '쿠키', where: '브라우저', how: '서버가 Set-Cookie 전송', pros: '자동 전송', cons: 'CSRF 공격 위험', color: 'amber' },
            { name: '세션', where: '서버 메모리', how: '세션 ID를 쿠키로 전달', pros: '서버 통제 가능', cons: '서버 부하', color: 'blue' },
            { name: 'JWT', where: '토큰 자체', how: 'Header.Payload.Signature', pros: '서버 저장 불필요', cons: '토큰 크기, 취소 어려움', color: 'emerald' },
          ].map((a, i) => (
            <div key={i} className={`p-3 rounded-lg bg-${a.color}-50 border border-${a.color}-200`}>
              <div className="flex justify-between items-center mb-1"><span className={`font-bold text-sm text-${a.color}-700`}>{a.name}</span><span className="text-[10px] px-2 py-0.5 rounded-full bg-white border border-slate-200">{a.where}</span></div>
              <div className="text-[10px] text-slate-600">{a.how}</div>
              <div className="flex gap-3 mt-1"><span className="text-[10px] text-emerald-600">✓ {a.pros}</span><span className="text-[10px] text-red-600">✕ {a.cons}</span></div>
            </div>
          ))}
        </div>
      );
      return null;
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const step = STEPS[stepIdx];
      useEffect(() => { if (!isPlaying) return; const t = setInterval(() => { setStepIdx(p => { if(p>=STEPS.length-1){setIsPlaying(false);return p;} return p+1; }); }, 4000); return ()=>clearInterval(t); }, [isPlaying]);
      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-indigo-50">
          <header className="bg-white border-b border-slate-200 px-6 py-4"><div className="max-w-6xl mx-auto flex items-center justify-between"><div><h1 className="text-lg font-bold text-slate-800">제8장. 네트워크 기술</h1><p className="text-xs text-slate-500">DNS, TCP/IP, HTTP, 로드밸런서, JWT</p></div><a href="../index.html" className="text-xs text-slate-400 hover:text-slate-600">&larr; 로드맵</a></div></header>
          <main className="max-w-6xl mx-auto px-6 py-6">
            <div className="flex items-center justify-between mb-4">
              <div className="flex gap-1.5">{STEPS.map((_,i)=>(<button key={i} onClick={()=>{setStepIdx(i);setIsPlaying(false);}} className={`w-3 h-3 rounded-full transition-all duration-300 ${i===stepIdx?'bg-indigo-500 scale-125':i<stepIdx?'bg-indigo-300':'bg-slate-200'}`}/>))}</div>
              <div className="flex gap-2">
                <button onClick={()=>{setStepIdx(Math.max(0,stepIdx-1));setIsPlaying(false);}} disabled={stepIdx===0} className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white disabled:opacity-30">이전</button>
                <button onClick={()=>setIsPlaying(!isPlaying)} className="px-3 py-1.5 text-xs rounded-lg font-medium bg-indigo-500 text-white">{isPlaying?'정지':'자동 실행'}</button>
                <button onClick={()=>{setStepIdx(Math.min(STEPS.length-1,stepIdx+1));setIsPlaying(false);}} disabled={stepIdx===STEPS.length-1} className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white disabled:opacity-30">다음</button>
              </div>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 min-h-[400px]"><VisPanel type={step.panel} /></div>
              <div className="space-y-4">
                <div className="bg-indigo-50 border border-indigo-200 rounded-xl p-5"><h2 className="font-bold text-indigo-800 text-lg mb-2">{step.title}</h2><p className="text-sm text-indigo-700 leading-relaxed">{step.desc}</p></div>
                <div className="bg-amber-50 border border-amber-200 rounded-xl p-4"><div className="text-xs font-bold text-amber-600 mb-1">💡 비유로 이해하기</div><p className="text-sm text-amber-800">{step.metaphor}</p></div>
              </div>
            </div>
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
