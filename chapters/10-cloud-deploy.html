<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>클라우드 & 배포 — Chapter 10</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const STEPS = [
      { title: 'Step 1 — 클라우드 컴퓨팅이란?', desc: '내 컴퓨터가 아닌 "인터넷 너머의 컴퓨터"를 빌려 쓰는 것입니다. 서버, 저장소, 네트워크를 직접 사지 않고, AWS/GCP/Azure 같은 업체에서 필요한 만큼만 빌려 씁니다. 초기 비용 없이 사용한 만큼만 지불합니다.', metaphor: '자가용 vs 택시: 서버를 직접 사는 건 차를 구매하는 것, 클라우드는 택시를 타는 것. 필요할 때만 부르고 내린 만큼만 결제합니다.', panel: 'cloud' },
      { title: 'Step 2 — IaaS / PaaS / SaaS', desc: 'IaaS(Infrastructure)는 서버 인프라만 빌림(EC2), PaaS(Platform)는 실행 환경까지 제공(Heroku, Cloud Run), SaaS(Software)는 완성된 소프트웨어를 사용(Gmail, Notion). 아래로 갈수록 관리할 게 줄어듭니다.', metaphor: 'IaaS=빈 주방 임대(요리는 내가), PaaS=밀키트(재료+레시피 제공, 조리만), SaaS=배달 음식(다 됨, 먹기만).', panel: 'xaas' },
      { title: 'Step 3 — 하이브리드 & 멀티 클라우드', desc: '하이브리드 클라우드는 온프레미스(자체 서버) + 퍼블릭 클라우드를 섞어 쓰는 것입니다. 민감한 데이터는 자체 서버, 확장이 필요한 서비스는 클라우드에 배치합니다. 멀티 클라우드는 AWS+GCP처럼 여러 클라우드를 동시에 사용합니다.', metaphor: '하이브리드=집(온프레미스)에서 일하면서, 회의실(클라우드)은 필요할 때 빌림. 멀티=카페도 가고 도서관도 가는 식.', panel: 'hybrid' },
      { title: 'Step 4 — 서버리스 (Serverless)', desc: '서버를 관리하지 않고 "함수 단위"로 코드를 실행합니다. AWS Lambda, Cloud Functions이 대표적입니다. 요청이 올 때만 실행되고, 안 쓰면 비용 0원. 단, Cold Start(첫 호출 지연)과 실행 시간 제한이 있습니다.', metaphor: '주문형 요리사: 요리할 때만 출근하고, 안 하면 인건비 0원. 대신 첫 주문은 준비 시간이 조금 걸립니다.', panel: 'serverless' },
      { title: 'Step 5 — 모니터링 & 로깅', desc: '서비스가 잘 돌아가는지 감시(모니터링)하고, 문제가 생기면 기록(로깅)을 추적합니다. Prometheus+Grafana(메트릭), ELK Stack(로그), Sentry(에러 추적)이 대표적입니다. "관측 가능성(Observability)"이 핵심입니다.', metaphor: 'CCTV(모니터링) + 블랙박스(로깅): 사고가 나면 영상을 돌려보고 원인을 파악합니다. 없으면 "왜 터졌지?" 추적 불가.', panel: 'monitoring' },
    ];

    function VisPanel({ type }) {
      if (type === 'cloud') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">온프레미스 vs 클라우드</div>
          <div className="grid grid-cols-2 gap-4">
            <div className="border-2 border-slate-300 rounded-xl p-4 bg-slate-50 text-center">
              <div className="text-3xl mb-2">🖥️</div>
              <div className="font-bold text-slate-700 text-sm">온프레미스</div>
              <div className="text-[10px] text-slate-500 mt-2">직접 서버 구매/관리</div>
              <div className="mt-2 space-y-1">
                <div className="text-[10px] bg-white rounded p-1 border border-slate-200">초기 비용 높음</div>
                <div className="text-[10px] bg-white rounded p-1 border border-slate-200">확장 시 추가 구매</div>
                <div className="text-[10px] bg-white rounded p-1 border border-slate-200">보안 직접 관리</div>
              </div>
            </div>
            <div className="border-2 border-teal-300 rounded-xl p-4 bg-teal-50 text-center">
              <div className="text-3xl mb-2">☁️</div>
              <div className="font-bold text-teal-700 text-sm">클라우드</div>
              <div className="text-[10px] text-slate-500 mt-2">인터넷으로 빌려 사용</div>
              <div className="mt-2 space-y-1">
                <div className="text-[10px] bg-white rounded p-1 border border-teal-200">초기 비용 없음</div>
                <div className="text-[10px] bg-white rounded p-1 border border-teal-200">클릭 한 번으로 확장</div>
                <div className="text-[10px] bg-white rounded p-1 border border-teal-200">사용량만큼 결제</div>
              </div>
            </div>
          </div>
          <div className="flex justify-center gap-3">{['AWS','GCP','Azure'].map((c,i)=>(<span key={i} className="px-3 py-1 text-xs rounded-full bg-teal-100 text-teal-700 border border-teal-200 font-medium">{c}</span>))}</div>
        </div>
      );
      if (type === 'xaas') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">서비스 모델 비교</div>
          {[
            { model: 'IaaS', full: 'Infrastructure as a Service', manage: '서버, 네트워크 빌림', you: 'OS, 런타임, 앱 직접 관리', ex: 'AWS EC2, GCP Compute', color: 'blue', bar: 30 },
            { model: 'PaaS', full: 'Platform as a Service', manage: '실행 환경까지 제공', you: '코드만 작성하면 됨', ex: 'Heroku, Cloud Run, Vercel', color: 'purple', bar: 60 },
            { model: 'SaaS', full: 'Software as a Service', manage: '완성된 소프트웨어', you: '사용만 하면 됨', ex: 'Gmail, Notion, Slack', color: 'emerald', bar: 90 },
          ].map((m, i) => (
            <div key={i} className={`p-3 rounded-xl bg-${m.color}-50 border-2 border-${m.color}-300`}>
              <div className="flex justify-between items-center mb-1">
                <div className={`font-bold text-${m.color}-700`}>{m.model}</div>
                <div className="text-[9px] text-slate-500">{m.full}</div>
              </div>
              <div className="text-[10px] text-slate-600 mb-1">{m.manage} — {m.you}</div>
              <div className="flex items-center gap-2">
                <div className="flex-1 h-2 bg-slate-200 rounded-full"><div className={`h-full bg-${m.color}-400 rounded-full`} style={{width:`${m.bar}%`}}></div></div>
                <span className="text-[9px] text-slate-400">관리 부담</span>
              </div>
              <div className="text-[9px] text-slate-400 mt-1">{m.ex}</div>
            </div>
          ))}
        </div>
      );
      if (type === 'hybrid') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">하이브리드 & 멀티 클라우드</div>
          <div className="border-2 border-amber-300 rounded-xl p-4 bg-amber-50">
            <div className="font-bold text-amber-700 text-sm text-center mb-3">하이브리드 클라우드</div>
            <div className="flex items-center justify-center gap-3">
              <div className="text-center p-2 rounded-lg bg-white border border-slate-300 w-24"><div className="text-xl">🏢</div><div className="text-[10px] font-bold text-slate-700">온프레미스</div><div className="text-[9px] text-slate-500">민감 데이터</div></div>
              <div className="text-slate-400 text-lg">+</div>
              <div className="text-center p-2 rounded-lg bg-white border border-teal-300 w-24"><div className="text-xl">☁️</div><div className="text-[10px] font-bold text-teal-700">퍼블릭</div><div className="text-[9px] text-slate-500">확장 서비스</div></div>
            </div>
          </div>
          <div className="border-2 border-indigo-300 rounded-xl p-4 bg-indigo-50">
            <div className="font-bold text-indigo-700 text-sm text-center mb-3">멀티 클라우드</div>
            <div className="flex items-center justify-center gap-2">
              {['AWS','GCP','Azure'].map((c,i)=>(<div key={i} className="text-center p-2 rounded-lg bg-white border border-indigo-200 w-20"><div className="text-[10px] font-bold text-indigo-700">{c}</div></div>))}
            </div>
            <div className="text-center text-[10px] text-slate-500 mt-2">벤더 종속 방지 + 장애 대비</div>
          </div>
        </div>
      );
      if (type === 'serverless') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">서버리스 동작 방식</div>
          <div className="space-y-2">
            {[
              { step: '1', label: '코드(함수) 배포', desc: 'Lambda/Cloud Functions에 업로드', color: 'blue' },
              { step: '2', label: '요청 도착', desc: 'HTTP, 이벤트, 스케줄 트리거', color: 'indigo' },
              { step: '3', label: '컨테이너 자동 생성', desc: '클라우드가 실행 환경 준비', color: 'purple' },
              { step: '4', label: '함수 실행 + 응답', desc: '처리 완료 후 결과 반환', color: 'emerald' },
              { step: '5', label: '자동 종료', desc: '유휴 시 컨테이너 해제 → 비용 0', color: 'slate' },
            ].map((s, i) => (
              <div key={i} className={`flex items-center gap-3 p-2 rounded-lg bg-${s.color}-50 border border-${s.color}-200`}>
                <div className={`w-6 h-6 rounded-full bg-${s.color}-500 text-white flex items-center justify-center text-xs font-bold`}>{s.step}</div>
                <div><div className={`text-xs font-bold text-${s.color}-700`}>{s.label}</div><div className="text-[10px] text-slate-500">{s.desc}</div></div>
              </div>
            ))}
          </div>
          <div className="bg-amber-50 border border-amber-200 rounded-lg p-2 text-center text-xs text-amber-700">주의: Cold Start(첫 호출 1~3초 지연) + 실행 시간 제한(15분)</div>
        </div>
      );
      if (type === 'monitoring') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">관측 가능성 3요소</div>
          {[
            { name: '메트릭 (Metrics)', desc: 'CPU, 메모리, 응답 시간 등 숫자 데이터', tool: 'Prometheus + Grafana', icon: '📊', color: 'blue' },
            { name: '로그 (Logs)', desc: '이벤트 기록 — 언제 무슨 일이 있었는지', tool: 'ELK Stack, CloudWatch', icon: '📝', color: 'emerald' },
            { name: '트레이스 (Traces)', desc: '요청이 서비스를 거치는 경로 추적', tool: 'Jaeger, Datadog', icon: '🔍', color: 'purple' },
          ].map((o, i) => (
            <div key={i} className={`p-3 rounded-xl bg-${o.color}-50 border-2 border-${o.color}-200`}>
              <div className="flex items-center gap-2 mb-1"><span className="text-xl">{o.icon}</span><span className={`font-bold text-sm text-${o.color}-700`}>{o.name}</span></div>
              <div className="text-[10px] text-slate-600">{o.desc}</div>
              <div className={`text-[9px] mt-1 px-2 py-0.5 rounded-full bg-${o.color}-200 text-${o.color}-700 inline-block`}>{o.tool}</div>
            </div>
          ))}
          <div className="bg-red-50 border border-red-200 rounded-lg p-2 text-center text-xs text-red-700">장애 발생 시: 알림(PagerDuty) → 대시보드 확인 → 로그 추적 → 원인 파악</div>
        </div>
      );
      return null;
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const step = STEPS[stepIdx];
      useEffect(() => { if (!isPlaying) return; const t = setInterval(() => { setStepIdx(p => { if(p>=STEPS.length-1){setIsPlaying(false);return p;} return p+1; }); }, 4000); return ()=>clearInterval(t); }, [isPlaying]);
      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-teal-50">
          <header className="bg-white border-b border-slate-200 px-6 py-4"><div className="max-w-6xl mx-auto flex items-center justify-between"><div><h1 className="text-lg font-bold text-slate-800">제10장. 클라우드 & 배포</h1><p className="text-xs text-slate-500">IaaS/PaaS/SaaS, 서버리스, 모니터링</p></div><a href="../index.html" className="text-xs text-slate-400 hover:text-slate-600">&larr; 로드맵</a></div></header>
          <main className="max-w-6xl mx-auto px-6 py-6">
            <div className="flex items-center justify-between mb-4">
              <div className="flex gap-1.5">{STEPS.map((_,i)=>(<button key={i} onClick={()=>{setStepIdx(i);setIsPlaying(false);}} className={`w-3 h-3 rounded-full transition-all duration-300 ${i===stepIdx?'bg-teal-500 scale-125':i<stepIdx?'bg-teal-300':'bg-slate-200'}`}/>))}</div>
              <div className="flex gap-2">
                <button onClick={()=>{setStepIdx(Math.max(0,stepIdx-1));setIsPlaying(false);}} disabled={stepIdx===0} className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white disabled:opacity-30">이전</button>
                <button onClick={()=>setIsPlaying(!isPlaying)} className="px-3 py-1.5 text-xs rounded-lg font-medium bg-teal-500 text-white">{isPlaying?'정지':'자동 실행'}</button>
                <button onClick={()=>{setStepIdx(Math.min(STEPS.length-1,stepIdx+1));setIsPlaying(false);}} disabled={stepIdx===STEPS.length-1} className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white disabled:opacity-30">다음</button>
              </div>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 min-h-[400px]"><VisPanel type={step.panel} /></div>
              <div className="space-y-4">
                <div className="bg-teal-50 border border-teal-200 rounded-xl p-5"><h2 className="font-bold text-teal-800 text-lg mb-2">{step.title}</h2><p className="text-sm text-teal-700 leading-relaxed">{step.desc}</p></div>
                <div className="bg-amber-50 border border-amber-200 rounded-xl p-4"><div className="text-xs font-bold text-amber-600 mb-1">💡 비유로 이해하기</div><p className="text-sm text-amber-800">{step.metaphor}</p></div>
              </div>
            </div>
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
