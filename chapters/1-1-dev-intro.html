<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>개발이란? 전공자 vs 비전공자 — Chapter 1-1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    Chapter 1-1 — 개발이란? 전공자 vs 비전공자
    학습 목표: "개발"이 무엇인지, 전공자와 비전공자의 출발점 차이를 이해한다.
    핵심 메시지: 개발은 "문제 해결"이며, 전공 여부보다 꾸준한 학습이 중요하다.
  -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    const STEPS = [
      {
        title: 'Step 1 — "개발"이란 무엇인가?',
        desc: '소프트웨어 개발은 "컴퓨터에게 일을 시키는 것"입니다. 코드를 작성해서 문제를 해결하거나, 사람들이 사용할 서비스를 만드는 활동입니다.',
        metaphor: '요리 비유: 레시피(코드)를 작성해서 재료(데이터)를 가공하고, 요리(서비스)를 만드는 과정입니다.',
        leftPanel: 'definition',
      },
      {
        title: 'Step 2 — 전공자의 출발점',
        desc: '컴퓨터공학 전공자는 자료구조, 알고리즘, 운영체제, 네트워크 같은 "기초 이론"부터 배웁니다. 코드를 작성하기 전에 컴퓨터가 어떻게 동작하는지를 먼저 이해합니다.',
        metaphor: '요리학교 비유: 식재료의 과학적 원리, 칼 쥐는 법, 불 조절 이론부터 배우는 정식 코스입니다.',
        leftPanel: 'major',
      },
      {
        title: 'Step 3 — 비전공자의 출발점',
        desc: '비전공자는 보통 "만들고 싶은 것"에서 출발합니다. 웹사이트, 앱, 자동화 스크립트 등 실제 결과물을 먼저 만들면서 필요한 지식을 쌓아갑니다.',
        metaphor: '독학 요리 비유: 유튜브 보고 먼저 볶음밥을 만들어봅니다. 칼질은 서툴지만 결과물은 바로 나옵니다.',
        leftPanel: 'nonmajor',
      },
      {
        title: 'Step 4 — 둘의 차이는 "순서"',
        desc: '전공자는 이론→실습, 비전공자는 실습→이론 순서가 다를 뿐입니다. 결국 둘 다 "이론+실습" 모두 필요합니다. 어느 쪽이든 빈칸을 채워나가면 됩니다.',
        metaphor: '등산 비유: 정문(전공)과 후문(비전공)으로 출발했을 뿐, 정상은 같습니다.',
        leftPanel: 'compare',
      },
      {
        title: 'Step 5 — 개발을 잘하려면?',
        desc: '전공 여부보다 중요한 3가지: (1) 꾸준히 코드를 작성하는 습관, (2) 모르는 것을 검색하고 학습하는 능력, (3) 만든 것을 개선하는 반복. 개발은 "평생 학습"입니다.',
        metaphor: '운동 비유: 체육학과 졸업보다 매일 운동하는 사람이 더 건강합니다. 개발도 마찬가지입니다.',
        leftPanel: 'conclusion',
      },
    ];

    const NAV_CHAPTERS = [
      { id: '1-1', title: '개발이란?', file: '1-1-dev-intro.html', active: true },
      { id: '1-2', title: '좋은 개발자', file: '1-2-good-developer.html' },
      { id: '1-3', title: '앱 종류', file: '1-3-app-types.html' },
      { id: '1-4', title: '프론트/백엔드', file: '1-4-frontend-backend.html' },
      { id: '2-1', title: '웹 vs 네이티브', file: '2-1-webapp-vs-native.html' },
    ];

    // 시각화 패널 컴포넌트
    function VisPanel({ type, stepIdx }) {
      if (type === 'definition') return (
        <div className="space-y-4">
          <div className="text-center">
            <div className="text-6xl mb-4">{"</>"}</div>
            <div className="text-lg font-bold text-slate-700 mb-2">소프트웨어 개발</div>
          </div>
          <div className="grid grid-cols-3 gap-3">
            {[
              { icon: '🧩', label: '문제 정의', desc: '무엇을 만들지' },
              { icon: '💻', label: '코드 작성', desc: '어떻게 만들지' },
              { icon: '🚀', label: '서비스 배포', desc: '사람들이 쓰도록' },
            ].map((item, i) => (
              <div key={i} className={`p-3 rounded-lg border-2 text-center transition-all duration-500 ${i <= stepIdx ? 'border-blue-400 bg-blue-50 scale-105' : 'border-slate-200 bg-white'}`}>
                <div className="text-2xl mb-1">{item.icon}</div>
                <div className="text-xs font-bold text-slate-700">{item.label}</div>
                <div className="text-[10px] text-slate-500 mt-0.5">{item.desc}</div>
              </div>
            ))}
          </div>
          <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 text-sm text-amber-800 text-center">
            개발 = <strong>문제 해결</strong>을 코드로 표현하는 활동
          </div>
        </div>
      );

      if (type === 'major') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-indigo-600 mb-2">전공자 학습 경로 (이론 → 실습)</div>
          {[
            { year: '1학년', items: ['C언어 기초', '이산수학'], color: 'indigo' },
            { year: '2학년', items: ['자료구조', '알고리즘', '컴퓨터구조'], color: 'indigo' },
            { year: '3학년', items: ['운영체제', '네트워크', '데이터베이스'], color: 'indigo' },
            { year: '4학년', items: ['캡스톤 프로젝트', '실무 인턴'], color: 'emerald' },
          ].map((row, i) => (
            <div key={i} className={`flex items-center gap-3 p-2 rounded-lg transition-all duration-500 ${i <= 3 ? 'opacity-100' : 'opacity-40'}`}>
              <div className={`w-16 text-center py-1 rounded-full text-xs font-bold bg-${row.color}-100 text-${row.color}-700`}>{row.year}</div>
              <div className="flex gap-2 flex-wrap">
                {row.items.map((item, j) => (
                  <span key={j} className={`px-2 py-1 text-xs rounded-full border ${row.color === 'emerald' ? 'bg-emerald-50 border-emerald-300 text-emerald-700' : 'bg-indigo-50 border-indigo-300 text-indigo-700'}`}>{item}</span>
                ))}
              </div>
            </div>
          ))}
          <div className="text-center text-xs text-slate-500 mt-2">4년간 체계적 이론 학습 → 마지막에 실무 프로젝트</div>
        </div>
      );

      if (type === 'nonmajor') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-emerald-600 mb-2">비전공자 학습 경로 (실습 → 이론)</div>
          {[
            { phase: '시작', items: ['HTML/CSS 따라하기', '결과물 바로 확인'], color: 'emerald' },
            { phase: '성장', items: ['JavaScript', '프레임워크(React 등)'], color: 'emerald' },
            { phase: '벽 만남', items: ['에러 해결 막힘', '성능 문제'], color: 'amber' },
            { phase: '보강', items: ['자료구조 학습', 'CS 기초 공부'], color: 'indigo' },
          ].map((row, i) => (
            <div key={i} className="flex items-center gap-3 p-2 rounded-lg transition-all duration-500">
              <div className={`w-16 text-center py-1 rounded-full text-xs font-bold bg-${row.color}-100 text-${row.color}-700`}>{row.phase}</div>
              <div className="flex gap-2 flex-wrap">
                {row.items.map((item, j) => (
                  <span key={j} className={`px-2 py-1 text-xs rounded-full border bg-${row.color}-50 border-${row.color}-300 text-${row.color}-700`}>{item}</span>
                ))}
              </div>
            </div>
          ))}
          <div className="text-center text-xs text-slate-500 mt-2">실제 결과물을 먼저 만들며 → 부족한 이론을 보강</div>
        </div>
      );

      if (type === 'compare') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">둘의 차이는 "순서"일 뿐</div>
          <div className="grid grid-cols-2 gap-4">
            <div className="border-2 border-indigo-300 rounded-xl p-4 bg-indigo-50 text-center">
              <div className="text-2xl mb-2">🎓</div>
              <div className="font-bold text-indigo-700 text-sm mb-2">전공자</div>
              <div className="space-y-1">
                <div className="bg-indigo-200 rounded px-2 py-1 text-xs text-indigo-800">이론 ✅</div>
                <div className="text-slate-400 text-lg">↓</div>
                <div className="bg-white border border-indigo-200 rounded px-2 py-1 text-xs text-indigo-600">실습 보강 필요</div>
              </div>
            </div>
            <div className="border-2 border-emerald-300 rounded-xl p-4 bg-emerald-50 text-center">
              <div className="text-2xl mb-2">🔥</div>
              <div className="font-bold text-emerald-700 text-sm mb-2">비전공자</div>
              <div className="space-y-1">
                <div className="bg-emerald-200 rounded px-2 py-1 text-xs text-emerald-800">실습 ✅</div>
                <div className="text-slate-400 text-lg">↓</div>
                <div className="bg-white border border-emerald-200 rounded px-2 py-1 text-xs text-emerald-600">이론 보강 필요</div>
              </div>
            </div>
          </div>
          <div className="bg-sky-50 border border-sky-200 rounded-lg p-3 text-center text-sm text-sky-800">
            결국 도착지는 같다: <strong>이론 + 실습 모두 갖춘 개발자</strong>
          </div>
        </div>
      );

      if (type === 'conclusion') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">개발을 잘하는 3가지 습관</div>
          {[
            { num: '01', title: '매일 코드 작성', desc: '작은 프로젝트라도 직접 만들어본다', icon: '⌨️', color: 'blue' },
            { num: '02', title: '검색하고 학습', desc: '모르면 찾아보고, 이해하고, 정리한다', icon: '🔍', color: 'purple' },
            { num: '03', title: '반복 개선', desc: '만든 것을 다시 보고 더 나은 방법을 찾는다', icon: '🔄', color: 'emerald' },
          ].map((item, i) => (
            <div key={i} className={`flex items-center gap-4 p-3 rounded-xl border-2 border-${item.color}-200 bg-${item.color}-50 transition-all duration-500`}>
              <div className="text-3xl">{item.icon}</div>
              <div>
                <div className={`text-xs font-bold text-${item.color}-400`}>{item.num}</div>
                <div className={`font-bold text-${item.color}-700`}>{item.title}</div>
                <div className="text-xs text-slate-600">{item.desc}</div>
              </div>
            </div>
          ))}
        </div>
      );

      return null;
    }

    // 메인 앱
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const step = STEPS[stepIdx];

      useEffect(() => {
        if (!isPlaying) return;
        const timer = setInterval(() => {
          setStepIdx(prev => {
            if (prev >= STEPS.length - 1) { setIsPlaying(false); return prev; }
            return prev + 1;
          });
        }, 4000);
        return () => clearInterval(timer);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50">
          {/* 헤더 */}
          <header className="bg-white border-b border-slate-200 px-6 py-4">
            <div className="max-w-6xl mx-auto flex items-center justify-between">
              <div>
                <h1 className="text-lg font-bold text-slate-800">Chapter 1-1. 개발이란? 전공자 vs 비전공자</h1>
                <p className="text-xs text-slate-500">제1~2장. 소프트웨어 개론</p>
              </div>
              <a href="../index.html" className="text-xs text-slate-400 hover:text-slate-600">← 로드맵</a>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-6 py-6">
            {/* 스텝 표시 + 컨트롤 */}
            <div className="flex items-center justify-between mb-4">
              <div className="flex gap-1.5">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStepIdx(i); setIsPlaying(false); }}
                    className={`w-3 h-3 rounded-full transition-all duration-300 ${i === stepIdx ? 'bg-blue-500 scale-125' : i < stepIdx ? 'bg-blue-300' : 'bg-slate-200'}`} />
                ))}
              </div>
              <div className="flex gap-2">
                <button onClick={() => { setStepIdx(Math.max(0, stepIdx - 1)); setIsPlaying(false); }}
                  disabled={stepIdx === 0}
                  className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white hover:bg-slate-50 disabled:opacity-30">이전</button>
                <button onClick={() => setIsPlaying(!isPlaying)}
                  className={`px-3 py-1.5 text-xs rounded-lg font-medium ${isPlaying ? 'bg-red-500 text-white' : 'bg-blue-500 text-white'}`}>
                  {isPlaying ? '정지' : '자동 실행'}
                </button>
                <button onClick={() => { setStepIdx(Math.min(STEPS.length - 1, stepIdx + 1)); setIsPlaying(false); }}
                  disabled={stepIdx === STEPS.length - 1}
                  className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white hover:bg-slate-50 disabled:opacity-30">다음</button>
              </div>
            </div>

            {/* 2단 레이아웃 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              {/* 왼쪽: 시각화 */}
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 min-h-[400px]">
                <VisPanel type={step.leftPanel} stepIdx={stepIdx} />
              </div>

              {/* 오른쪽: 설명 */}
              <div className="space-y-4">
                <div className="bg-blue-50 border border-blue-200 rounded-xl p-5">
                  <h2 className="font-bold text-blue-800 text-lg mb-2">{step.title}</h2>
                  <p className="text-sm text-blue-700 leading-relaxed">{step.desc}</p>
                </div>
                <div className="bg-amber-50 border border-amber-200 rounded-xl p-4">
                  <div className="text-xs font-bold text-amber-600 mb-1">💡 비유로 이해하기</div>
                  <p className="text-sm text-amber-800">{step.metaphor}</p>
                </div>
              </div>
            </div>

            {/* 챕터 네비게이션 */}
            <nav className="mt-8 bg-white rounded-xl shadow-sm border border-slate-200 p-4">
              <div className="text-xs font-bold text-slate-400 mb-3">제1~2장. 소프트웨어 개론</div>
              <div className="flex flex-wrap gap-2">
                {NAV_CHAPTERS.map((ch) => (
                  <a key={ch.id} href={ch.file}
                    className={`px-3 py-1.5 text-xs rounded-lg transition-all ${ch.active ? 'bg-blue-500 text-white font-bold' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                    {ch.id} {ch.title}
                  </a>
                ))}
              </div>
            </nav>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
