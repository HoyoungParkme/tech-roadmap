<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>데이터베이스 — Chapter 7</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const STEPS = [
      { title: 'Step 1 — DBMS와 관계형 모델', desc: 'DBMS(DataBase Management System)는 데이터를 체계적으로 저장/조회/수정/삭제하는 소프트웨어입니다. 관계형 DB는 테이블(행+열)로 데이터를 구조화하고, 테이블 간 관계(외래키)로 연결합니다.', metaphor: '엑셀 시트 비유: 테이블=시트, 행=한 줄 데이터, 열=항목 이름. 다만 DBMS는 동시 접근, 트랜잭션, 인덱싱을 지원합니다.', panel: 'rdb' },
      { title: 'Step 2 — 연동 구조: 드라이버와 커넥션 풀', desc: '애플리케이션이 DB에 접속하려면 드라이버(클라이언트 라이브러리)가 필요합니다. 매번 연결을 새로 만들면 느리므로, 커넥션 풀(미리 만들어둔 연결 묶음)을 사용해 재활용합니다.', metaphor: '전화 교환기: 매 통화마다 전화기를 사지 않고, 교환기(풀)에서 빈 회선을 꺼내 쓰고 반납합니다.', panel: 'pool' },
      { title: 'Step 3 — NoSQL과 Redis', desc: 'NoSQL은 "테이블 구조가 아닌" 데이터베이스입니다. MongoDB(문서형), Redis(키-값 캐시), Cassandra(컬럼형)가 대표적입니다. Redis는 메모리에 저장해 초고속 읽기가 가능해 캐시/세션 저장에 많이 쓰입니다.', metaphor: 'RDB=서류철(정해진 양식), NoSQL=포스트잇(자유 형식), Redis=화이트보드(빠르게 적고 지움, 하지만 끄면 사라짐).', panel: 'nosql' },
      { title: 'Step 4 — ORM (SQLAlchemy)', desc: 'ORM(Object-Relational Mapping)은 SQL을 직접 쓰지 않고 프로그래밍 언어의 객체로 DB를 다루는 도구입니다. Python의 SQLAlchemy, Java의 JPA/Hibernate가 대표적입니다. 생산성은 높지만 복잡한 쿼리는 직접 SQL이 더 효율적일 수 있습니다.', metaphor: '통역사 비유: ORM은 Python↔SQL 사이의 통역사. 일상 대화(CRUD)는 편하지만, 전문 토론(복잡한 쿼리)은 직접 말하는 게 정확합니다.', panel: 'orm' },
      { title: 'Step 5 — 마이그레이션 (Alembic)', desc: 'DB 스키마(테이블 구조)를 버전 관리하는 도구입니다. Git이 코드 변경을 추적하듯, Alembic은 DB 구조 변경을 추적합니다. upgrade(적용), downgrade(롤백)으로 안전하게 스키마를 관리합니다.', metaphor: 'Git for DB: 코드에 git commit이 있듯, DB 스키마에 alembic revision이 있습니다. 실수하면 롤백 가능.', panel: 'migration' },
    ];

    function VisPanel({ type }) {
      if (type === 'rdb') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">관계형 데이터베이스 구조</div>
          <div className="bg-white border-2 border-orange-300 rounded-xl p-3">
            <div className="text-xs font-bold text-orange-700 mb-2">users 테이블</div>
            <table className="w-full text-[10px]"><thead><tr className="bg-orange-100"><th className="p-1 border border-orange-200">id</th><th className="p-1 border border-orange-200">name</th><th className="p-1 border border-orange-200">email</th></tr></thead>
              <tbody><tr><td className="p-1 border border-orange-200 text-center">1</td><td className="p-1 border border-orange-200">김철수</td><td className="p-1 border border-orange-200">kim@mail.com</td></tr>
                <tr className="bg-orange-50"><td className="p-1 border border-orange-200 text-center">2</td><td className="p-1 border border-orange-200">이영희</td><td className="p-1 border border-orange-200">lee@mail.com</td></tr></tbody></table>
          </div>
          <div className="text-center text-slate-400 text-sm">↓ 외래키 (user_id)</div>
          <div className="bg-white border-2 border-blue-300 rounded-xl p-3">
            <div className="text-xs font-bold text-blue-700 mb-2">orders 테이블</div>
            <table className="w-full text-[10px]"><thead><tr className="bg-blue-100"><th className="p-1 border border-blue-200">id</th><th className="p-1 border border-blue-200">user_id</th><th className="p-1 border border-blue-200">product</th></tr></thead>
              <tbody><tr><td className="p-1 border border-blue-200 text-center">1</td><td className="p-1 border border-blue-200 text-center font-bold text-orange-600">1</td><td className="p-1 border border-blue-200">노트북</td></tr></tbody></table>
          </div>
        </div>
      );
      if (type === 'pool') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">커넥션 풀 동작</div>
          <div className="flex items-center justify-center gap-3">
            <div className="space-y-1">{['요청1','요청2','요청3'].map((r,i)=>(<div key={i} className="text-center p-1.5 rounded-lg bg-blue-50 border border-blue-200 text-[10px] text-blue-700 w-16">{r}</div>))}</div>
            <div className="text-slate-400">→</div>
            <div className="border-2 border-emerald-300 rounded-xl p-3 bg-emerald-50 text-center">
              <div className="text-xs font-bold text-emerald-700 mb-2">커넥션 풀</div>
              <div className="grid grid-cols-3 gap-1">{[1,2,3,4,5,6].map(n=>(<div key={n} className={`text-[9px] p-1 rounded ${n<=3?'bg-emerald-200 text-emerald-700':'bg-white text-slate-400 border border-slate-200'}`}>conn{n}</div>))}</div>
              <div className="text-[9px] text-slate-500 mt-1">사용중 3 / 대기 3</div>
            </div>
            <div className="text-slate-400">→</div>
            <div className="text-center p-2 rounded-lg bg-orange-50 border-2 border-orange-300 w-16"><div className="text-xl">🗃️</div><div className="text-[10px] font-bold text-orange-700">DB</div></div>
          </div>
          <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-2 text-center text-xs text-emerald-700">풀 없이: 매번 연결 생성/해제 (느림) → 풀 사용: 미리 만든 연결 재활용 (빠름)</div>
        </div>
      );
      if (type === 'nosql') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">SQL vs NoSQL</div>
          <div className="grid grid-cols-2 gap-3">
            <div className="border-2 border-blue-300 rounded-xl p-3 bg-blue-50">
              <div className="font-bold text-blue-700 text-sm text-center mb-2">SQL (관계형)</div>
              <div className="space-y-1 text-[10px] text-slate-600">
                <div className="bg-white rounded p-1 border border-blue-200">정해진 스키마 (테이블)</div>
                <div className="bg-white rounded p-1 border border-blue-200">ACID 트랜잭션</div>
                <div className="bg-white rounded p-1 border border-blue-200">복잡한 JOIN 가능</div>
              </div>
              <div className="text-[9px] text-blue-600 mt-2 text-center">PostgreSQL, MySQL</div>
            </div>
            <div className="border-2 border-emerald-300 rounded-xl p-3 bg-emerald-50">
              <div className="font-bold text-emerald-700 text-sm text-center mb-2">NoSQL</div>
              <div className="space-y-1 text-[10px] text-slate-600">
                <div className="bg-white rounded p-1 border border-emerald-200">유연한 스키마 (문서)</div>
                <div className="bg-white rounded p-1 border border-emerald-200">수평 확장 용이</div>
                <div className="bg-white rounded p-1 border border-emerald-200">초고속 읽기/쓰기</div>
              </div>
              <div className="text-[9px] text-emerald-600 mt-2 text-center">MongoDB, Redis</div>
            </div>
          </div>
          <div className="bg-red-50 border border-red-200 rounded-lg p-2 text-center text-xs text-red-700">Redis: 메모리 저장 → 캐시/세션에 최적. 단, 서버 재시작 시 데이터 유실 위험</div>
        </div>
      );
      if (type === 'orm') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">SQL 직접 vs ORM</div>
          <div className="grid grid-cols-2 gap-3">
            <div><div className="text-xs font-bold text-blue-600 mb-1">SQL 직접</div>
              <pre className="bg-slate-800 text-blue-400 p-2 rounded-lg text-[10px] overflow-x-auto">{"SELECT *\nFROM users\nWHERE age > 25\nORDER BY name;"}</pre>
            </div>
            <div><div className="text-xs font-bold text-emerald-600 mb-1">ORM (SQLAlchemy)</div>
              <pre className="bg-slate-800 text-emerald-400 p-2 rounded-lg text-[10px] overflow-x-auto">{"db.query(User)\n  .filter(\n    User.age > 25\n  )\n  .order_by(\n    User.name\n  )\n  .all()"}</pre>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-3">
            {[
              { label: 'ORM 장점', items: ['타입 안전', '코드 자동완성', 'DB 변경 용이'], color: 'emerald' },
              { label: 'SQL 직접 장점', items: ['복잡한 쿼리 최적화', '성능 튜닝', '학습 필수'], color: 'blue' },
            ].map((g, i) => (
              <div key={i} className={`p-2 rounded-lg bg-${g.color}-50 border border-${g.color}-200`}>
                <div className={`text-[10px] font-bold text-${g.color}-700 mb-1`}>{g.label}</div>
                {g.items.map((item, j) => (<div key={j} className="text-[10px] text-slate-600">- {item}</div>))}
              </div>
            ))}
          </div>
        </div>
      );
      if (type === 'migration') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">Alembic 마이그레이션 흐름</div>
          {[
            { step: '1', cmd: 'alembic revision --autogenerate', desc: '모델 변경 감지 → 마이그레이션 파일 생성', color: 'blue' },
            { step: '2', cmd: 'alembic upgrade head', desc: '최신 버전으로 DB 스키마 적용', color: 'emerald' },
            { step: '3', cmd: 'alembic downgrade -1', desc: '문제 시 이전 버전으로 롤백', color: 'amber' },
          ].map((s, i) => (
            <div key={i} className={`p-3 rounded-lg bg-${s.color}-50 border border-${s.color}-200`}>
              <div className="flex items-center gap-2 mb-1">
                <div className={`w-6 h-6 rounded-full bg-${s.color}-500 text-white flex items-center justify-center text-xs font-bold`}>{s.step}</div>
                <code className={`text-[10px] font-mono text-${s.color}-700`}>{s.cmd}</code>
              </div>
              <div className="text-[10px] text-slate-600 ml-8">{s.desc}</div>
            </div>
          ))}
          <div className="bg-slate-50 border border-slate-200 rounded-lg p-2">
            <div className="text-[10px] text-slate-600 text-center">버전 이력: v1 (create users) → v2 (add email column) → v3 (add orders table)</div>
          </div>
        </div>
      );
      return null;
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const step = STEPS[stepIdx];
      useEffect(() => { if (!isPlaying) return; const t = setInterval(() => { setStepIdx(p => { if(p>=STEPS.length-1){setIsPlaying(false);return p;} return p+1; }); }, 4000); return ()=>clearInterval(t); }, [isPlaying]);
      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-orange-50">
          <header className="bg-white border-b border-slate-200 px-6 py-4"><div className="max-w-6xl mx-auto flex items-center justify-between"><div><h1 className="text-lg font-bold text-slate-800">제7장. 데이터베이스</h1><p className="text-xs text-slate-500">RDBMS, 커넥션 풀, NoSQL, ORM, 마이그레이션</p></div><a href="../index.html" className="text-xs text-slate-400 hover:text-slate-600">&larr; 로드맵</a></div></header>
          <main className="max-w-6xl mx-auto px-6 py-6">
            <div className="flex items-center justify-between mb-4">
              <div className="flex gap-1.5">{STEPS.map((_,i)=>(<button key={i} onClick={()=>{setStepIdx(i);setIsPlaying(false);}} className={`w-3 h-3 rounded-full transition-all duration-300 ${i===stepIdx?'bg-orange-500 scale-125':i<stepIdx?'bg-orange-300':'bg-slate-200'}`}/>))}</div>
              <div className="flex gap-2">
                <button onClick={()=>{setStepIdx(Math.max(0,stepIdx-1));setIsPlaying(false);}} disabled={stepIdx===0} className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white disabled:opacity-30">이전</button>
                <button onClick={()=>setIsPlaying(!isPlaying)} className="px-3 py-1.5 text-xs rounded-lg font-medium bg-orange-500 text-white">{isPlaying?'정지':'자동 실행'}</button>
                <button onClick={()=>{setStepIdx(Math.min(STEPS.length-1,stepIdx+1));setIsPlaying(false);}} disabled={stepIdx===STEPS.length-1} className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white disabled:opacity-30">다음</button>
              </div>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 min-h-[400px]"><VisPanel type={step.panel} /></div>
              <div className="space-y-4">
                <div className="bg-orange-50 border border-orange-200 rounded-xl p-5"><h2 className="font-bold text-orange-800 text-lg mb-2">{step.title}</h2><p className="text-sm text-orange-700 leading-relaxed">{step.desc}</p></div>
                <div className="bg-amber-50 border border-amber-200 rounded-xl p-4"><div className="text-xs font-bold text-amber-600 mb-1">💡 비유로 이해하기</div><p className="text-sm text-amber-800">{step.metaphor}</p></div>
              </div>
            </div>
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
