<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아키텍처 & 공학 — Chapter 5/9</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const STEPS = [
      { title: 'Step 1 — 설계가 왜 중요한가?', desc: '코드를 바로 작성하기 전에 "어떻게 구조를 잡을지" 설계하는 것이 중요합니다. 스타벅스가 주문→제조→전달 프로세스를 설계하듯, 소프트웨어도 데이터 흐름과 책임 분리를 미리 정해야 유지보수가 쉽습니다.', metaphor: '건축 비유: 설계도 없이 집을 짓으면 나중에 화장실을 추가할 때 벽을 뜯어야 합니다. 소프트웨어도 마찬가지입니다.', panel: 'why' },
      { title: 'Step 2 — 레이어드 아키텍처', desc: '가장 기본적인 구조입니다. Presentation(화면) → Business(로직) → Data(저장) 3계층으로 나눕니다. 각 층은 아래 층만 호출하고, 위로는 호출하지 않습니다. Spring Boot, FastAPI 대부분이 이 구조입니다.', metaphor: '3층 건물: 1층(프론트 접수) → 2층(처리실) → 지하(창고). 손님은 1층만 보고, 2층은 1층 요청을 처리하고, 지하에서 물건을 꺼냅니다.', panel: 'layered' },
      { title: 'Step 3 — 클린 / 헥사고날 아키텍처', desc: '클린 아키텍처는 "비즈니스 로직(도메인)이 중심"이고 외부(DB, UI, API)는 교체 가능한 플러그인입니다. 헥사고날(포트-어댑터)도 같은 철학으로, 도메인이 외부 기술에 의존하지 않습니다.', metaphor: '스마트폰 비유: 핵심 칩(도메인)은 바뀌지 않고, 케이스(UI), 충전기(DB), 이어폰(API)은 자유롭게 교체합니다.', panel: 'clean' },
      { title: 'Step 4 — MSA (마이크로서비스)', desc: '하나의 큰 서비스를 독립적인 작은 서비스들로 분리합니다. 주문 서비스, 결제 서비스, 배송 서비스가 각각 독립 배포됩니다. 장점은 확장성과 독립 배포, 단점은 복잡한 통신과 운영입니다.', metaphor: '대형 마트 vs 전문점 거리: 모놀리스=백화점(한 건물에 모든 매장), MSA=전문점 거리(각 가게가 독립 운영).', panel: 'msa' },
      { title: 'Step 5 — C/S 구조와 통신', desc: '클라이언트-서버 구조는 모든 웹의 기본입니다. 클라이언트(브라우저/앱)가 요청하고 서버가 응답합니다. REST API, GraphQL, gRPC 등 통신 방식이 있고, 동기/비동기 처리를 이해해야 합니다.', metaphor: '식당 주문 시스템: 손님(클라이언트)이 주문서(요청)를 내면, 주방(서버)이 요리(응답)를 만들어 보냅니다.', panel: 'cs' },
      { title: 'Step 6 — 테스트와 CI/CD', desc: '단위 테스트(함수 하나), 통합 테스트(모듈 간), E2E 테스트(전체 흐름)로 품질을 보장합니다. pytest(Python), Jest(JS)가 대표적입니다. CI/CD는 테스트→빌드→배포를 자동화합니다.', metaphor: '자동차 검수 라인: 부품 검사(단위) → 조립 후 검사(통합) → 시운전(E2E) → 출고(배포). 한 단계라도 실패하면 출고하지 않습니다.', panel: 'test' },
    ];

    function VisPanel({ type }) {
      if (type === 'why') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">설계 없이 vs 설계 후 개발</div>
          <div className="grid grid-cols-2 gap-4">
            <div className="border-2 border-red-300 rounded-xl p-4 bg-red-50">
              <div className="text-2xl text-center mb-2">😰</div>
              <div className="font-bold text-red-700 text-sm text-center mb-2">설계 없이</div>
              <div className="space-y-1 text-[10px] text-slate-600">
                <div className="bg-white rounded p-1 border border-red-200">기능 추가할 때마다 전체 수정</div>
                <div className="bg-white rounded p-1 border border-red-200">버그 하나가 전체에 영향</div>
                <div className="bg-white rounded p-1 border border-red-200">새 팀원이 코드 이해 불가</div>
                <div className="bg-white rounded p-1 border border-red-200">6개월 후 본인도 이해 불가</div>
              </div>
            </div>
            <div className="border-2 border-emerald-300 rounded-xl p-4 bg-emerald-50">
              <div className="text-2xl text-center mb-2">😊</div>
              <div className="font-bold text-emerald-700 text-sm text-center mb-2">설계 후</div>
              <div className="space-y-1 text-[10px] text-slate-600">
                <div className="bg-white rounded p-1 border border-emerald-200">기능 추가 = 해당 모듈만 수정</div>
                <div className="bg-white rounded p-1 border border-emerald-200">버그 영향 범위 제한</div>
                <div className="bg-white rounded p-1 border border-emerald-200">구조만 보면 역할 파악</div>
                <div className="bg-white rounded p-1 border border-emerald-200">확장/교체 용이</div>
              </div>
            </div>
          </div>
          <div className="bg-amber-50 border border-amber-200 rounded-lg p-2 text-center text-xs text-amber-800">스타벅스: 주문→제조→전달 프로세스가 명확해서 1분 안에 음료 제공 가능</div>
        </div>
      );
      if (type === 'layered') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">레이어드 아키텍처 (3계층)</div>
          {[
            { layer: 'Presentation', role: '화면/API 엔드포인트', tech: 'Controller, Router', color: 'blue', arrow: true },
            { layer: 'Business', role: '비즈니스 로직', tech: 'Service, UseCase', color: 'purple', arrow: true },
            { layer: 'Data', role: '데이터 저장/조회', tech: 'Repository, ORM', color: 'emerald', arrow: false },
          ].map((l, i) => (
            <div key={i}>
              <div className={`p-4 rounded-xl bg-${l.color}-50 border-2 border-${l.color}-300`}>
                <div className="flex justify-between items-center">
                  <div>
                    <div className={`font-bold text-${l.color}-700`}>{l.layer}</div>
                    <div className="text-xs text-slate-600">{l.role}</div>
                  </div>
                  <div className={`text-[10px] px-2 py-1 rounded-full bg-${l.color}-200 text-${l.color}-700`}>{l.tech}</div>
                </div>
              </div>
              {l.arrow && <div className="text-center text-slate-300 text-lg">↓ 호출</div>}
            </div>
          ))}
          <div className="text-center text-[10px] text-slate-500">규칙: 위 → 아래만 호출 가능. 역방향 금지!</div>
        </div>
      );
      if (type === 'clean') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">클린 아키텍처 — 도메인 중심</div>
          <div className="flex justify-center">
            <div className="relative w-64 h-64">
              <div className="absolute inset-0 rounded-full bg-blue-50 border-2 border-blue-200 flex items-center justify-center"><span className="text-[9px] text-blue-400 absolute top-3">Infrastructure (DB, API)</span></div>
              <div className="absolute inset-8 rounded-full bg-purple-50 border-2 border-purple-200 flex items-center justify-center"><span className="text-[9px] text-purple-400 absolute top-2">Interface Adapters</span></div>
              <div className="absolute inset-16 rounded-full bg-amber-50 border-2 border-amber-200 flex items-center justify-center"><span className="text-[9px] text-amber-400 absolute top-1">Use Cases</span></div>
              <div className="absolute inset-[88px] rounded-full bg-emerald-100 border-2 border-emerald-400 flex items-center justify-center"><span className="text-[10px] font-bold text-emerald-700">Entity</span></div>
            </div>
          </div>
          <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-2 text-center text-xs text-emerald-700">핵심: 의존성은 항상 <strong>안쪽(도메인)</strong>을 향한다</div>
        </div>
      );
      if (type === 'msa') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">모놀리스 vs MSA</div>
          <div className="grid grid-cols-2 gap-4">
            <div className="border-2 border-slate-300 rounded-xl p-3 bg-slate-50 text-center">
              <div className="text-2xl mb-1">🏢</div>
              <div className="font-bold text-slate-700 text-sm">모놀리스</div>
              <div className="mt-2 bg-slate-200 rounded p-2 text-[10px] text-slate-600">주문 + 결제 + 배송 + 회원<br/>= 하나의 서버</div>
              <div className="text-[10px] text-slate-500 mt-1">간단하지만 커지면 복잡</div>
            </div>
            <div className="border-2 border-emerald-300 rounded-xl p-3 bg-emerald-50 text-center">
              <div className="text-2xl mb-1">🏘️</div>
              <div className="font-bold text-emerald-700 text-sm">MSA</div>
              <div className="mt-2 grid grid-cols-2 gap-1">
                {['주문','결제','배송','회원'].map((s,i)=>(<div key={i} className="bg-white rounded p-1 text-[10px] border border-emerald-200 text-emerald-700">{s}</div>))}
              </div>
              <div className="text-[10px] text-slate-500 mt-1">독립 배포, 확장 유연</div>
            </div>
          </div>
          <div className="bg-amber-50 border border-amber-200 rounded-lg p-2 text-center text-xs text-amber-700">주의: MSA는 운영 복잡도가 높아서 팀/서비스 규모가 커야 효과적</div>
        </div>
      );
      if (type === 'cs') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">API 통신 방식 비교</div>
          {[
            { name: 'REST API', how: 'URL + HTTP 메서드', format: 'JSON', use: '대부분의 웹 서비스', color: 'blue' },
            { name: 'GraphQL', how: '단일 엔드포인트 + 쿼리', format: 'JSON', use: '복잡한 데이터 관계', color: 'purple' },
            { name: 'gRPC', how: 'Protocol Buffers', format: 'Binary', use: 'MSA 내부 통신', color: 'emerald' },
            { name: 'WebSocket', how: '양방향 실시간', format: 'Any', use: '채팅, 실시간 알림', color: 'amber' },
          ].map((a, i) => (
            <div key={i} className={`flex items-center gap-3 p-3 rounded-lg bg-${a.color}-50 border border-${a.color}-200`}>
              <div className={`font-bold text-sm text-${a.color}-700 w-24`}>{a.name}</div>
              <div className="flex-1">
                <div className="text-[10px] text-slate-600">{a.how}</div>
                <div className="text-[10px] text-slate-400">{a.use}</div>
              </div>
              <div className={`text-[9px] px-2 py-0.5 rounded-full bg-${a.color}-200 text-${a.color}-700`}>{a.format}</div>
            </div>
          ))}
        </div>
      );
      if (type === 'test') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">테스트 피라미드</div>
          <div className="space-y-2">
            {[
              { type: 'E2E 테스트', desc: '전체 시나리오 (브라우저 자동화)', tool: 'Selenium, Playwright', count: '적게', color: 'red', w: 'w-40' },
              { type: '통합 테스트', desc: '모듈 간 연동', tool: 'pytest, Jest', count: '보통', color: 'amber', w: 'w-52' },
              { type: '단위 테스트', desc: '함수/메서드 하나씩', tool: 'pytest, unittest', count: '많이', color: 'emerald', w: 'w-64' },
            ].map((t, i) => (
              <div key={i} className="flex justify-center">
                <div className={`${t.w} p-3 rounded-lg bg-${t.color}-50 border border-${t.color}-200`}>
                  <div className="flex justify-between items-center">
                    <div><div className={`font-bold text-xs text-${t.color}-700`}>{t.type}</div><div className="text-[10px] text-slate-500">{t.desc}</div></div>
                    <div className="text-right"><div className="text-[9px] text-slate-400">{t.tool}</div><div className={`text-[9px] font-bold text-${t.color}-600`}>{t.count}</div></div>
                  </div>
                </div>
              </div>
            ))}
          </div>
          <div className="bg-blue-50 border border-blue-200 rounded-lg p-2 text-center text-xs text-blue-700">CI/CD: 커밋 → 자동 테스트 → 자동 빌드 → 자동 배포</div>
        </div>
      );
      return null;
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const step = STEPS[stepIdx];
      useEffect(() => { if (!isPlaying) return; const t = setInterval(() => { setStepIdx(p => { if(p>=STEPS.length-1){setIsPlaying(false);return p;} return p+1; }); }, 4000); return ()=>clearInterval(t); }, [isPlaying]);
      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-green-50">
          <header className="bg-white border-b border-slate-200 px-6 py-4"><div className="max-w-6xl mx-auto flex items-center justify-between"><div><h1 className="text-lg font-bold text-slate-800">제5/9장. 아키텍처 & 공학</h1><p className="text-xs text-slate-500">레이어드, 클린, MSA, C/S, 테스트</p></div><a href="../index.html" className="text-xs text-slate-400 hover:text-slate-600">&larr; 로드맵</a></div></header>
          <main className="max-w-6xl mx-auto px-6 py-6">
            <div className="flex items-center justify-between mb-4">
              <div className="flex gap-1.5">{STEPS.map((_,i)=>(<button key={i} onClick={()=>{setStepIdx(i);setIsPlaying(false);}} className={`w-3 h-3 rounded-full transition-all duration-300 ${i===stepIdx?'bg-green-500 scale-125':i<stepIdx?'bg-green-300':'bg-slate-200'}`}/>))}</div>
              <div className="flex gap-2">
                <button onClick={()=>{setStepIdx(Math.max(0,stepIdx-1));setIsPlaying(false);}} disabled={stepIdx===0} className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white disabled:opacity-30">이전</button>
                <button onClick={()=>setIsPlaying(!isPlaying)} className="px-3 py-1.5 text-xs rounded-lg font-medium bg-green-600 text-white">{isPlaying?'정지':'자동 실행'}</button>
                <button onClick={()=>{setStepIdx(Math.min(STEPS.length-1,stepIdx+1));setIsPlaying(false);}} disabled={stepIdx===STEPS.length-1} className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white disabled:opacity-30">다음</button>
              </div>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 min-h-[400px]"><VisPanel type={step.panel} /></div>
              <div className="space-y-4">
                <div className="bg-green-50 border border-green-200 rounded-xl p-5"><h2 className="font-bold text-green-800 text-lg mb-2">{step.title}</h2><p className="text-sm text-green-700 leading-relaxed">{step.desc}</p></div>
                <div className="bg-amber-50 border border-amber-200 rounded-xl p-4"><div className="text-xs font-bold text-amber-600 mb-1">💡 비유로 이해하기</div><p className="text-sm text-amber-800">{step.metaphor}</p></div>
              </div>
            </div>
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
