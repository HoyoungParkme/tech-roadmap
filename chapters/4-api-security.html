<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>필수 지식 & API — Chapter 4</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const STEPS = [
      { title: 'Step 1 — API란 무엇인가?', desc: 'API(Application Programming Interface)는 프로그램끼리 대화하는 "약속된 인터페이스"입니다. 날씨 앱이 기상청 API를 호출해 데이터를 받아오듯, 다른 서비스의 기능을 내 프로그램에서 사용할 수 있게 합니다.', metaphor: '자판기 비유: 버튼(요청)을 누르면 음료(응답)가 나옵니다. 내부 구조를 몰라도 약속된 인터페이스로 사용할 수 있습니다.', panel: 'api' },
      { title: 'Step 2 — REST API 설계', desc: 'REST는 URL(자원) + HTTP 메서드(행위)로 API를 설계하는 규칙입니다. /users(사용자 목록), /users/1(1번 사용자), GET(조회), POST(생성) 같은 식입니다. OpenAPI(Swagger)는 API 명세를 자동 문서화합니다.', metaphor: 'REST = 주소(자원) + 동사(행위). "서울시 강남구 역삼동 123번지(URL)에서 택배를 받아주세요(GET)"', panel: 'rest' },
      { title: 'Step 3 — JSON과 XML', desc: 'API가 주고받는 데이터 형식입니다. JSON은 가볍고 읽기 쉬워서 현재 표준, XML은 구조가 엄격해서 금융/공공 분야에서 사용됩니다. 대부분의 웹 API는 JSON을 사용합니다.', metaphor: 'JSON=카톡 메시지(간결), XML=공문서(정확하지만 길다).', panel: 'json' },
      { title: 'Step 4 — 동기 vs 비동기', desc: '동기(Sync)는 요청 후 응답이 올 때까지 기다리고, 비동기(Async)는 기다리지 않고 다른 일을 합니다. Ajax는 비동기로 API를 호출해서 페이지 새로고침 없이 데이터를 갱신하는 기술입니다.', metaphor: '동기=카페에서 줄 서서 주문 후 받을 때까지 대기. 비동기=진동벨 받고 자리에서 다른 일 하다가 울리면 가져옴.', panel: 'async' },
      { title: 'Step 5 — JWT와 OAuth2', desc: 'JWT(JSON Web Token)는 토큰에 사용자 정보를 담아 서버 저장 없이 인증합니다. OAuth2는 "구글로 로그인" 같은 제3자 인증 표준입니다. 비밀번호를 직접 받지 않고 안전하게 인증합니다.', metaphor: 'JWT=신분증(자체 인증), OAuth2=호텔 프론트에서 여권 확인 후 카드키 발급(제3자 인증).', panel: 'jwt' },
      { title: 'Step 6 — CORS와 Bcrypt', desc: 'CORS는 다른 도메인에서 API를 호출할 수 있게 허용하는 보안 정책입니다. Bcrypt는 비밀번호를 안전하게 "해싱"하는 알고리즘으로, 원본을 복원할 수 없게 단방향 암호화합니다.', metaphor: 'CORS=방문증(다른 회사 사람이 우리 사무실에 들어오려면 허가 필요). Bcrypt=문서 분쇄기(원본으로 되돌릴 수 없는 암호화).', panel: 'cors' },
    ];

    function VisPanel({ type }) {
      if (type === 'api') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">API = 프로그램의 대화 인터페이스</div>
          <div className="flex items-center justify-center gap-4">
            <div className="text-center p-3 rounded-xl bg-blue-50 border-2 border-blue-300 w-28"><div className="text-2xl mb-1">📱</div><div className="text-xs font-bold text-blue-700">내 앱</div></div>
            <div className="flex flex-col items-center"><div className="text-xs text-emerald-600 font-bold">API 호출 →</div><div className="text-xs text-amber-600 font-bold">← 데이터 반환</div></div>
            <div className="text-center p-3 rounded-xl bg-purple-50 border-2 border-purple-300 w-28"><div className="text-2xl mb-1">🌤️</div><div className="text-xs font-bold text-purple-700">기상청 API</div></div>
          </div>
          <div className="bg-slate-50 rounded-lg p-3 font-mono text-xs space-y-1">
            <div className="text-blue-600">GET /api/weather?city=seoul</div>
            <div className="text-emerald-600">{'{"temp": 22, "humidity": 60}'}</div>
          </div>
          <div className="grid grid-cols-3 gap-2">{[{n:'지도 API',e:'Google Maps'},{n:'결제 API',e:'Stripe'},{n:'인증 API',e:'OAuth2'}].map((a,i)=>(<div key={i} className="text-center p-2 rounded-lg bg-emerald-50 border border-emerald-200"><div className="text-xs font-bold text-emerald-700">{a.n}</div><div className="text-[10px] text-slate-500">{a.e}</div></div>))}</div>
        </div>
      );
      if (type === 'rest') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">REST API 설계 원칙</div>
          <table className="w-full text-xs"><thead><tr className="bg-slate-100"><th className="p-2 text-left">메서드</th><th className="p-2 text-left">URL</th><th className="p-2 text-left">의미</th></tr></thead>
            <tbody>{[{m:'GET',u:'/users',d:'전체 사용자 조회'},{m:'GET',u:'/users/1',d:'1번 사용자 조회'},{m:'POST',u:'/users',d:'사용자 생성'},{m:'PUT',u:'/users/1',d:'1번 사용자 수정'},{m:'DELETE',u:'/users/1',d:'1번 사용자 삭제'}].map((r,i)=>(
              <tr key={i} className={i%2===0?'bg-white':'bg-slate-50'}><td className="p-2 font-mono font-bold text-blue-700">{r.m}</td><td className="p-2 font-mono text-slate-600">{r.u}</td><td className="p-2 text-slate-600">{r.d}</td></tr>
            ))}</tbody></table>
          <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-2 text-center text-xs text-emerald-700">핵심: URL은 <strong>명사(자원)</strong>, 메서드는 <strong>동사(행위)</strong></div>
        </div>
      );
      if (type === 'json') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">JSON vs XML</div>
          <div className="grid grid-cols-2 gap-3">
            <div><div className="text-xs font-bold text-emerald-600 mb-1">JSON (현재 표준)</div>
              <pre className="bg-slate-800 text-emerald-400 p-3 rounded-lg text-[11px] overflow-x-auto">{'{\n  "name": "Kim",\n  "age": 28,\n  "skills": ["Python"]\n}'}</pre>
            </div>
            <div><div className="text-xs font-bold text-amber-600 mb-1">XML (공공/금융)</div>
              <pre className="bg-slate-800 text-amber-400 p-3 rounded-lg text-[11px] overflow-x-auto">{'<user>\n  <name>Kim</name>\n  <age>28</age>\n  <skills>\n    <skill>Python</skill>\n  </skills>\n</user>'}</pre>
            </div>
          </div>
          <div className="bg-blue-50 border border-blue-200 rounded-lg p-2 text-center text-xs text-blue-700">웹 API의 90% 이상이 JSON 사용</div>
        </div>
      );
      if (type === 'async') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">동기 vs 비동기</div>
          <div className="grid grid-cols-2 gap-4">
            <div className="border-2 border-slate-300 rounded-xl p-3 bg-slate-50">
              <div className="font-bold text-slate-700 text-sm text-center mb-2">동기 (Sync)</div>
              {['1. 요청 보냄','2. 기다림...','3. 응답 받음','4. 다음 작업'].map((s,i)=>(
                <div key={i} className={`text-xs p-1.5 rounded mb-1 ${i===1?'bg-red-100 text-red-700 font-bold':'bg-white border border-slate-200 text-slate-600'}`}>{s}</div>
              ))}
            </div>
            <div className="border-2 border-emerald-300 rounded-xl p-3 bg-emerald-50">
              <div className="font-bold text-emerald-700 text-sm text-center mb-2">비동기 (Async)</div>
              {['1. 요청 보냄','2. 다른 일 계속!','3. 콜백으로 응답 처리','4. 동시에 여러 작업'].map((s,i)=>(
                <div key={i} className={`text-xs p-1.5 rounded mb-1 ${i===1?'bg-emerald-200 text-emerald-800 font-bold':'bg-white border border-emerald-200 text-slate-600'}`}>{s}</div>
              ))}
            </div>
          </div>
        </div>
      );
      if (type === 'jwt') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">JWT & OAuth2</div>
          <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-3">
            <div className="text-xs font-bold text-emerald-700 mb-1">JWT 구조</div>
            <div className="flex gap-1 font-mono text-[10px]">
              <span className="px-2 py-1 bg-red-200 text-red-800 rounded">Header</span><span className="text-slate-400">.</span>
              <span className="px-2 py-1 bg-purple-200 text-purple-800 rounded">Payload</span><span className="text-slate-400">.</span>
              <span className="px-2 py-1 bg-blue-200 text-blue-800 rounded">Signature</span>
            </div>
            <div className="text-[10px] text-slate-500 mt-1">서버 저장 없이 토큰 자체로 인증</div>
          </div>
          <div className="bg-blue-50 border border-blue-200 rounded-xl p-3">
            <div className="text-xs font-bold text-blue-700 mb-2">OAuth2 흐름 (구글 로그인)</div>
            <div className="space-y-1 text-[10px] text-slate-600">
              {['1. 사용자 → "구글로 로그인" 클릭','2. 구글 → 로그인 화면 표시','3. 사용자 → 구글에 직접 로그인','4. 구글 → 우리 서버에 인증 코드 전달','5. 우리 서버 → 토큰 발급 + 로그인 완료'].map((s,i)=>(
                <div key={i} className="bg-white p-1 rounded border border-blue-100">{s}</div>
              ))}
            </div>
          </div>
        </div>
      );
      if (type === 'cors') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">CORS & 비밀번호 해싱</div>
          <div className="bg-amber-50 border border-amber-200 rounded-xl p-3">
            <div className="text-xs font-bold text-amber-700 mb-2">CORS (Cross-Origin Resource Sharing)</div>
            <div className="flex items-center gap-2 text-xs">
              <span className="px-2 py-1 bg-blue-100 rounded text-blue-700">myapp.com</span>
              <span className="text-slate-400">→ 요청 →</span>
              <span className="px-2 py-1 bg-purple-100 rounded text-purple-700">api.other.com</span>
            </div>
            <div className="text-[10px] text-slate-600 mt-2">다른 도메인이면 브라우저가 차단 → 서버에서 Access-Control-Allow-Origin 헤더로 허용</div>
          </div>
          <div className="bg-red-50 border border-red-200 rounded-xl p-3">
            <div className="text-xs font-bold text-red-700 mb-2">Bcrypt 해싱</div>
            <div className="font-mono text-[10px] space-y-1">
              <div className="text-slate-600">"password123"</div>
              <div className="text-slate-400">&nbsp;&nbsp;↓ bcrypt.hash()</div>
              <div className="text-red-600 break-all">$2b$12$LJ3m4ys.K7s...</div>
            </div>
            <div className="text-[10px] text-slate-600 mt-1">단방향: 해시 → 원본 복원 불가능</div>
          </div>
        </div>
      );
      return null;
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const step = STEPS[stepIdx];
      useEffect(() => { if (!isPlaying) return; const t = setInterval(() => { setStepIdx(p => { if(p>=STEPS.length-1){setIsPlaying(false);return p;} return p+1; }); }, 4000); return ()=>clearInterval(t); }, [isPlaying]);
      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-pink-50">
          <header className="bg-white border-b border-slate-200 px-6 py-4"><div className="max-w-6xl mx-auto flex items-center justify-between"><div><h1 className="text-lg font-bold text-slate-800">제4장. 필수 지식 & API</h1><p className="text-xs text-slate-500">REST, JSON, JWT, OAuth2, CORS</p></div><a href="../index.html" className="text-xs text-slate-400 hover:text-slate-600">&larr; 로드맵</a></div></header>
          <main className="max-w-6xl mx-auto px-6 py-6">
            <div className="flex items-center justify-between mb-4">
              <div className="flex gap-1.5">{STEPS.map((_,i)=>(<button key={i} onClick={()=>{setStepIdx(i);setIsPlaying(false);}} className={`w-3 h-3 rounded-full transition-all duration-300 ${i===stepIdx?'bg-pink-500 scale-125':i<stepIdx?'bg-pink-300':'bg-slate-200'}`}/>))}</div>
              <div className="flex gap-2">
                <button onClick={()=>{setStepIdx(Math.max(0,stepIdx-1));setIsPlaying(false);}} disabled={stepIdx===0} className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white disabled:opacity-30">이전</button>
                <button onClick={()=>setIsPlaying(!isPlaying)} className="px-3 py-1.5 text-xs rounded-lg font-medium bg-pink-500 text-white">{isPlaying?'정지':'자동 실행'}</button>
                <button onClick={()=>{setStepIdx(Math.min(STEPS.length-1,stepIdx+1));setIsPlaying(false);}} disabled={stepIdx===STEPS.length-1} className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white disabled:opacity-30">다음</button>
              </div>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 min-h-[400px]"><VisPanel type={step.panel} /></div>
              <div className="space-y-4">
                <div className="bg-pink-50 border border-pink-200 rounded-xl p-5"><h2 className="font-bold text-pink-800 text-lg mb-2">{step.title}</h2><p className="text-sm text-pink-700 leading-relaxed">{step.desc}</p></div>
                <div className="bg-amber-50 border border-amber-200 rounded-xl p-4"><div className="text-xs font-bold text-amber-600 mb-1">💡 비유로 이해하기</div><p className="text-sm text-amber-800">{step.metaphor}</p></div>
              </div>
            </div>
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
