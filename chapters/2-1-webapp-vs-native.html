<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>웹 앱 vs 네이티브 앱 — Chapter 2-1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const STEPS = [
      {
        title: 'Step 1 — 같은 서비스, 다른 형태',
        desc: '네이버를 브라우저에서 접속하면 "웹 앱"이고, 앱스토어에서 다운받으면 "네이티브 앱"입니다. 같은 서비스도 형태에 따라 사용자 경험이 달라집니다.',
        metaphor: '같은 영화를 극장(네이티브)에서 보는 것과 넷플릭스(웹)로 보는 것의 차이입니다.',
        panel: 'intro',
      },
      {
        title: 'Step 2 — 웹 앱의 장단점',
        desc: '설치 불필요, URL 공유만으로 접근 가능, 업데이트 즉시 반영. 하지만 오프라인 사용 불가, 푸시 알림 제한, 기기 하드웨어 접근 제한 등의 단점이 있습니다.',
        metaphor: '넷플릭스: 인터넷만 있으면 어디서든 즉시 시청. 하지만 와이파이가 없으면 답이 없습니다.',
        panel: 'webPros',
      },
      {
        title: 'Step 3 — 네이티브 앱의 장단점',
        desc: '최고 성능, 기기 기능 100% 활용(카메라, GPS, 센서), 오프라인 동작, 푸시 알림. 하지만 스토어 심사 필요, iOS/Android 각각 개발, 업데이트에 시간이 걸립니다.',
        metaphor: '극장: 몰입감 최고, 대화면+음향. 하지만 극장까지 가야 하고, 시간을 맞춰야 합니다.',
        panel: 'nativePros',
      },
      {
        title: 'Step 4 — PWA: 웹과 네이티브의 중간',
        desc: 'Progressive Web App(PWA)은 웹 기술로 만들지만 앱처럼 동작합니다. 홈 화면에 설치 가능, 오프라인 지원, 푸시 알림까지. 앱스토어 없이 배포할 수 있습니다.',
        metaphor: '넷플릭스 다운로드 기능: 스트리밍(웹)이지만 오프라인(네이티브)도 지원하는 하이브리드 경험.',
        panel: 'pwa',
      },
      {
        title: 'Step 5 — 현실적인 선택 기준',
        desc: '예산이 적으면 웹 앱, 성능이 중요하면 네이티브, 빠르게 양쪽 출시하려면 하이브리드/PWA. 최근에는 PWA와 React Native/Flutter가 경계를 빠르게 허물고 있습니다.',
        metaphor: '정답은 "상황에 따라 다르다"입니다. 중요한 건 각 선택지의 트레이드오프를 이해하는 것.',
        panel: 'decision',
      },
    ];

    const NAV_CHAPTERS = [
      { id: '1-1', title: '개발이란?', file: '1-1-dev-intro.html' },
      { id: '1-2', title: '좋은 개발자', file: '1-2-good-developer.html' },
      { id: '1-3', title: '앱 종류', file: '1-3-app-types.html' },
      { id: '1-4', title: '프론트/백엔드', file: '1-4-frontend-backend.html' },
      { id: '2-1', title: '웹 vs 네이티브', file: '2-1-webapp-vs-native.html', active: true },
    ];

    function VisPanel({ type }) {
      if (type === 'intro') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">같은 서비스, 다른 접근 방식</div>
          <div className="grid grid-cols-2 gap-4">
            <div className="border-2 border-blue-300 rounded-xl p-4 bg-blue-50 text-center">
              <div className="text-4xl mb-2">🌐</div>
              <div className="font-bold text-blue-700">웹 앱</div>
              <div className="text-xs text-slate-600 mt-2">브라우저에서 접속</div>
              <div className="mt-3 bg-white rounded-lg p-2 border border-blue-200">
                <div className="text-[10px] text-slate-500">주소창에 입력</div>
                <div className="text-xs font-mono text-blue-600">naver.com</div>
              </div>
            </div>
            <div className="border-2 border-purple-300 rounded-xl p-4 bg-purple-50 text-center">
              <div className="text-4xl mb-2">📱</div>
              <div className="font-bold text-purple-700">네이티브 앱</div>
              <div className="text-xs text-slate-600 mt-2">앱스토어에서 설치</div>
              <div className="mt-3 bg-white rounded-lg p-2 border border-purple-200">
                <div className="text-[10px] text-slate-500">앱 아이콘 터치</div>
                <div className="text-xs text-purple-600">네이버 앱</div>
              </div>
            </div>
          </div>
          <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 text-center text-xs text-amber-800">
            같은 "네이버"인데 사용 경험이 다르다!
          </div>
        </div>
      );

      if (type === 'webPros') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-blue-600 mb-2">웹 앱 장단점</div>
          <div className="space-y-2">
            <div className="text-xs font-bold text-emerald-600">장점</div>
            {['설치 불필요 — URL만 공유', '업데이트 즉시 반영', '모든 기기에서 동일 접근', '검색 엔진(SEO) 노출'].map((item, i) => (
              <div key={i} className="flex items-center gap-2 p-2 rounded-lg bg-emerald-50 border border-emerald-200">
                <span className="text-emerald-500">✓</span>
                <span className="text-xs text-slate-700">{item}</span>
              </div>
            ))}
          </div>
          <div className="space-y-2 mt-3">
            <div className="text-xs font-bold text-red-600">단점</div>
            {['오프라인 사용 불가', '푸시 알림 제한', '카메라/GPS 접근 제한', '브라우저 성능에 의존'].map((item, i) => (
              <div key={i} className="flex items-center gap-2 p-2 rounded-lg bg-red-50 border border-red-200">
                <span className="text-red-500">✕</span>
                <span className="text-xs text-slate-700">{item}</span>
              </div>
            ))}
          </div>
        </div>
      );

      if (type === 'nativePros') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-purple-600 mb-2">네이티브 앱 장단점</div>
          <div className="space-y-2">
            <div className="text-xs font-bold text-emerald-600">장점</div>
            {['최고 성능 (부드러운 애니메이션)', '기기 기능 100% (카메라, AR, NFC)', '오프라인 완벽 지원', '푸시 알림, 위젯'].map((item, i) => (
              <div key={i} className="flex items-center gap-2 p-2 rounded-lg bg-emerald-50 border border-emerald-200">
                <span className="text-emerald-500">✓</span>
                <span className="text-xs text-slate-700">{item}</span>
              </div>
            ))}
          </div>
          <div className="space-y-2 mt-3">
            <div className="text-xs font-bold text-red-600">단점</div>
            {['iOS/Android 따로 개발 (2배 비용)', '스토어 심사 (1~7일)', '업데이트마다 재설치', '개발 인력 구하기 어려움'].map((item, i) => (
              <div key={i} className="flex items-center gap-2 p-2 rounded-lg bg-red-50 border border-red-200">
                <span className="text-red-500">✕</span>
                <span className="text-xs text-slate-700">{item}</span>
              </div>
            ))}
          </div>
        </div>
      );

      if (type === 'pwa') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-teal-600 mb-2">PWA — 웹의 진화</div>
          <div className="border-2 border-teal-300 rounded-xl p-4 bg-teal-50 text-center">
            <div className="text-4xl mb-2">⚡</div>
            <div className="font-bold text-teal-700">Progressive Web App</div>
            <div className="text-xs text-slate-600 mt-1">웹 기술 + 앱 경험</div>
          </div>
          <div className="grid grid-cols-2 gap-3">
            {[
              { feature: '홈 화면 설치', from: '네이티브' },
              { feature: '오프라인 동작', from: '네이티브' },
              { feature: '푸시 알림', from: '네이티브' },
              { feature: 'URL 공유', from: '웹' },
              { feature: '즉시 업데이트', from: '웹' },
              { feature: '스토어 불필요', from: '웹' },
            ].map((item, i) => (
              <div key={i} className="flex items-center gap-2 p-2 rounded-lg bg-white border border-teal-200">
                <span className={`text-[10px] px-1.5 py-0.5 rounded-full ${item.from === '네이티브' ? 'bg-purple-100 text-purple-600' : 'bg-blue-100 text-blue-600'}`}>{item.from}</span>
                <span className="text-xs text-slate-700">{item.feature}</span>
              </div>
            ))}
          </div>
          <div className="text-center text-xs text-slate-500">대표 사례: Twitter Lite, Starbucks, Pinterest</div>
        </div>
      );

      if (type === 'decision') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">선택 가이드</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="bg-slate-100">
                <th className="p-2 text-left rounded-tl-lg">기준</th>
                <th className="p-2 text-center text-blue-700">웹</th>
                <th className="p-2 text-center text-purple-700">네이티브</th>
                <th className="p-2 text-center rounded-tr-lg text-teal-700">PWA</th>
              </tr>
            </thead>
            <tbody>
              {[
                { label: '개발 비용', web: '낮음', native: '높음', pwa: '중간' },
                { label: '성능', web: '보통', native: '최고', pwa: '좋음' },
                { label: '기기 접근', web: '제한', native: '100%', pwa: '대부분' },
                { label: '배포 속도', web: '즉시', native: '1~7일', pwa: '즉시' },
                { label: '오프라인', web: '불가', native: '가능', pwa: '가능' },
                { label: 'SEO', web: '최고', native: '불가', pwa: '가능' },
              ].map((row, i) => (
                <tr key={i} className={i % 2 === 0 ? 'bg-white' : 'bg-slate-50'}>
                  <td className="p-2 font-medium text-slate-700">{row.label}</td>
                  <td className="p-2 text-center text-blue-600">{row.web}</td>
                  <td className="p-2 text-center text-purple-600">{row.native}</td>
                  <td className="p-2 text-center text-teal-600">{row.pwa}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div className="bg-indigo-50 border border-indigo-200 rounded-lg p-3 text-center text-xs text-indigo-700">
            트렌드: PWA + React Native/Flutter로 <strong>경계가 사라지는 중</strong>
          </div>
        </div>
      );

      return null;
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const step = STEPS[stepIdx];

      useEffect(() => {
        if (!isPlaying) return;
        const timer = setInterval(() => {
          setStepIdx(prev => {
            if (prev >= STEPS.length - 1) { setIsPlaying(false); return prev; }
            return prev + 1;
          });
        }, 4000);
        return () => clearInterval(timer);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-teal-50">
          <header className="bg-white border-b border-slate-200 px-6 py-4">
            <div className="max-w-6xl mx-auto flex items-center justify-between">
              <div>
                <h1 className="text-lg font-bold text-slate-800">Chapter 2-1. 웹 앱 vs 네이티브 앱</h1>
                <p className="text-xs text-slate-500">제1~2장. 소프트웨어 개론</p>
              </div>
              <a href="../index.html" className="text-xs text-slate-400 hover:text-slate-600">&larr; 로드맵</a>
            </div>
          </header>
          <main className="max-w-6xl mx-auto px-6 py-6">
            <div className="flex items-center justify-between mb-4">
              <div className="flex gap-1.5">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStepIdx(i); setIsPlaying(false); }}
                    className={`w-3 h-3 rounded-full transition-all duration-300 ${i === stepIdx ? 'bg-teal-500 scale-125' : i < stepIdx ? 'bg-teal-300' : 'bg-slate-200'}`} />
                ))}
              </div>
              <div className="flex gap-2">
                <button onClick={() => { setStepIdx(Math.max(0, stepIdx - 1)); setIsPlaying(false); }} disabled={stepIdx === 0}
                  className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white hover:bg-slate-50 disabled:opacity-30">이전</button>
                <button onClick={() => setIsPlaying(!isPlaying)}
                  className={`px-3 py-1.5 text-xs rounded-lg font-medium ${isPlaying ? 'bg-red-500 text-white' : 'bg-teal-500 text-white'}`}>
                  {isPlaying ? '정지' : '자동 실행'}</button>
                <button onClick={() => { setStepIdx(Math.min(STEPS.length - 1, stepIdx + 1)); setIsPlaying(false); }} disabled={stepIdx === STEPS.length - 1}
                  className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white hover:bg-slate-50 disabled:opacity-30">다음</button>
              </div>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 min-h-[400px]">
                <VisPanel type={step.panel} />
              </div>
              <div className="space-y-4">
                <div className="bg-teal-50 border border-teal-200 rounded-xl p-5">
                  <h2 className="font-bold text-teal-800 text-lg mb-2">{step.title}</h2>
                  <p className="text-sm text-teal-700 leading-relaxed">{step.desc}</p>
                </div>
                <div className="bg-amber-50 border border-amber-200 rounded-xl p-4">
                  <div className="text-xs font-bold text-amber-600 mb-1">💡 비유로 이해하기</div>
                  <p className="text-sm text-amber-800">{step.metaphor}</p>
                </div>
              </div>
            </div>
            <nav className="mt-8 bg-white rounded-xl shadow-sm border border-slate-200 p-4">
              <div className="text-xs font-bold text-slate-400 mb-3">제1~2장. 소프트웨어 개론</div>
              <div className="flex flex-wrap gap-2">
                {NAV_CHAPTERS.map((ch) => (
                  <a key={ch.id} href={ch.file}
                    className={`px-3 py-1.5 text-xs rounded-lg transition-all ${ch.active ? 'bg-teal-500 text-white font-bold' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                    {ch.id} {ch.title}</a>
                ))}
              </div>
            </nav>
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
