      {
        title: 'Step 2. Showback — "이번 달 부서별 사용량을 보여만 준다"',
        desc: 'Cost Explorer + 부서별 dashboard 로 가시성 확보. 청구는 아직 X — "보여주는" 것이 FinOps 1단계. 보이면 자연히 줄어든다.',
        focus: 'showback',
        viewKind: 'showback',
        showback: {
          totalUsd: 20000,
          bars: [
            { team: 'engineering', usd: 12000, color: 'bg-blue-500',   pct: 60 },
            { team: 'sales',       usd:  5000, color: 'bg-blue-400',   pct: 25 },

          ],
        },
        code: {
          lang: 'shell',

          lines: [
            '# Cost Explorer — 이번 달 팀별 비용 (showback)',

        focus: 'chargeback',
        viewKind: 'chargeback',
        chargeback: {
          period: '2026-05',
          rows: [
            { team: 'engineering', costCenter: 'CC-1042', amount: 12000, status: 'sent' },
            { team: 'sales',       costCenter: 'CC-2003', amount:  5000, status: 'sent' },
            { team: 'marketing',   costCenter: 'CC-3017', amount:  3000, status: 'pending' },
          ],
        },
        code: {
          lang: 'yaml',

          lines: [
            '# Cost & Usage Report (CUR) → S3 → Athena → 부서 청구',

            '    resource_tags_user_cost_center AS cost_center,',

            '  WHERE year = \'2026\' AND month = \'5\'',

            '',

      {

        focus: 'optimization',
        viewKind: 'optimization',
        optimization: {
          totalSavedUsd: 4280,
          rows: [
            { kind: 'EIP idle',       resource: 'eipalloc-0a1b…',  detail: '15일째 미연결',         saveUsd: 540 },
            { kind: 'EBS unattached', resource: 'vol-09c3d…',       detail: '200GB · 30일 orphan',  saveUsd: 1200 },
            { kind: 'RI expiring',    resource: 'ri-7d3e…',         detail: '7일 후 만료',          saveUsd: 1800 },
            { kind: 'Dev night-stop', resource: 'asg-dev-web',     detail: '주말 + 야간 정지',     saveUsd:  740 },
          ],
        },
        showFinaleAlert: true,
        code: {
          lang: 'shell',
          filename: 'optimize.sh',
          lines: [
            '# 미사용 EIP 탐지 (associated 안 된 것은 시간당 과금)',
            'aws ec2 describe-addresses \\',
            '  --query "Addresses[?AssociationId==null].[PublicIp,AllocationId]" \\',
            '  --output table',
            '',
            '# 미사용 EBS 볼륨 (available 상태 = orphan)',
            'aws ec2 describe-volumes \\',
            '  --filters Name=status,Values=available \\',
            '  --query "Volumes[].[VolumeId,Size,CreateTime]" \\',
            '  --output table',
            '',
            '# RI / Savings Plan 만료 30일 전 알람',
            'aws ce get-reservation-utilization \\',

            '# utilization < 80% → 재구매 검토',
            '',
            '# dev/staging 야간 자동 종료 (Lambda + EventBridge)',
            'cron: "0 20 * * MON-FRI"   # 평일 20시 → stop',
            'cron: "0 8  * * MON-FRI"   # 평일 08시 → start',
            '# → 월 40~50% 절감 (16h/24h × 5/7)',

      { key: 'chargeback',   emoji: '💸', name: 'Chargeback',   note: '실제 청구' },
      { key: 'optimization', emoji: '✂️', name: 'Optimization', note: '미사용 정리/RI' },
    ];

    // ─────────────────────────────────────────────────────
    // FinOps 4 카드 — 현재 단계 강조 (blue 테마)
    // ─────────────────────────────────────────────────────
    function FinOpsCards({ focus }) {
      return (
        <div className="grid grid-cols-4 gap-2 mb-4">
          {FINOPS.map((c) => {
            const isActive = focus === c.key;
            return (
              <div
                key={c.key}
                className={`rounded-lg p-2.5 text-center transition-all duration-300 ${
                  isActive
                    ? 'bg-blue-100 border-2 border-blue-500 scale-105 shadow-sm'
                    : 'bg-slate-50 border border-slate-200 opacity-70'
                }`}
              >
                <div className="text-xl">{c.emoji}</div>
                <div className={`text-xs font-bold mt-0.5 ${isActive ? 'text-blue-800' : 'text-slate-700'}`}>
                  {c.name}
                </div>
                <div className="text-[10px] text-slate-500 mt-0.5">{c.note}</div>
              </div>
            );
          })}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 1. Tagging — 리소스 태깅 표 + 100% coverage 게이지

    function TaggingView({ data }) {
      return (
        <div>
          {/* 100% coverage 게이지 */}
          <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 mb-3">
            <div className="flex items-baseline justify-between mb-1.5">

            </div>
            <div className="h-2.5 bg-white rounded-full overflow-hidden border border-blue-200">

              />
            </div>
            <div className="text-[10px] text-blue-700 mt-1">

          </div>

                    <td className="px-2 py-1.5 font-mono text-slate-700">{r.project}</td>

            </div>
            <div className="text-[10px] text-blue-700 mt-1">

            </div>

              CUR → Athena → 부서 청구 (회계 시스템 전송)
            </div>
          </div>

          <div className="rounded-lg border border-slate-200 overflow-hidden bg-white">

                  <th className="text-left px-3 py-2 font-bold">Cost Center</th>

                  <tr key={i} className={i % 2 ? 'bg-slate-50' : 'bg-white'}>

                      {r.status === 'sent' ? (
                        <span className="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded text-[10px] font-bold">

                        <span className="bg-amber-100 text-amber-700 px-2 py-0.5 rounded text-[10px] font-bold">

    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">💰 회사 가계부 + 절약 코치</h2>
            <span className="text-[10px] text-slate-400 font-mono">FinOps · 4 stages</span>
          </div>

          <FinOpsCards focus={step.focus} />

          {step.viewKind === 'tagging'      && <TaggingView      data={step.tagging} />}
          {step.viewKind === 'showback'     && <ShowbackView     data={step.showback} />}
          {step.viewKind === 'chargeback'   && <ChargebackView   data={step.chargeback} />}
          {step.viewKind === 'optimization' && <OptimizationView data={step.optimization} />}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        codeRef.current.removeAttribute('data-highlighted');
        codeRef.current.className = `language-${code.lang}`;
        codeRef.current.textContent = code.lines.join('\n');
        window.hljs.highlightElement(codeRef.current);
        setRenderedLines(codeRef.current.innerHTML.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code (innerHTML 추출 소스) */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-blue-500/10 border-l-2 border-blue-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 — 단계 번호 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-700 hover:text-blue-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. 운영 &amp; 비용 &gt; Chapter 2. FinOps</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">FinOps 기초</h1>
                  <p className="text-sm text-slate-500 mt-0.5">회사 가계부 + 절약 코치 — Tagging / Showback / Chargeback / Optimization</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 text-sm text-blue-900">
                💡 다음(IV-2-2)에서는 <strong>Multi-region &amp; DR</strong> — 두 도시 백업
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-blue-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-blue-600 text-white hover:bg-blue-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./IV-2-2.html" className="text-blue-700 hover:text-blue-900 font-medium">IV-2-2 Multi-region &amp; DR &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
