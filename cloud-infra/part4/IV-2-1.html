<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinOps 기초 — 회사 가계부 + 절약 코치</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>💰</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-2-1. FinOps 기초
    학습 목표: 비용 가시성·책임 분배·절약 실천 4단계 (Tagging / Showback / Chargeback / Optimization)
    핵심 비유: "회사 가계부 + 절약 코치" — 누가·어디에·얼마 썼는지 보고, 부서로 나누고, 줄인다
    구조: FINOPS 4단계 — tagging → showback → chargeback → optimization
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Tagging — "영수증마다 누가·뭐에 썼는지 적어둔다"',
        desc: 'Owner / Project / Env 태그 3종은 100% 강제. IaC default tags 로 자동 부착하면 누락 0. 태깅이 없으면 가계부도 의미가 없다.',
        block: {
          kind: 'yaml',
          code: `# Terraform default_tags — 모든 리소스에 자동 부착
provider "aws" {
  region = "ap-northeast-2"
  default_tags {
    tags = {
      Owner      = "team-payments"
      Project    = "checkout-api"
      Env        = "prod"           # prod | staging | dev
      CostCenter = "CC-1042"
      ManagedBy  = "terraform"
    }
  }
}

# 태깅 정책 (AWS Organizations Tag Policy)
TagPolicy:
  enforce_for:
    - ec2:instance
    - rds:db
    - s3:bucket
  required_keys: [Owner, Project, Env, CostCenter]
  # 누락 시 → AWS Config rule 이 NON_COMPLIANT 표시 + Slack 알람`,
        },
        focus: 'tagging',
      },
      {
        title: 'Step 2. Showback — "이번 달 부서별 사용량을 보여만 준다"',
        desc: 'Cost Explorer + 부서별 dashboard 로 가시성 확보. 청구는 아직 X — 먼저 "보여주는" 것이 FinOps 1단계. 보이면 줄어든다.',
        block: {
          kind: 'shell',
          code: `# Cost Explorer — 이번 달 Project 별 비용 (showback)
aws ce get-cost-and-usage \\
  --time-period Start=2026-05-01,End=2026-06-01 \\
  --granularity MONTHLY \\
  --metrics UnblendedCost \\
  --group-by Type=TAG,Key=Project

# 출력 (예시)
# Project=checkout-api    $4,210
# Project=ml-training     $2,180
# Project=data-platform   $1,640

# 부서별 dashboard (QuickSight / Grafana)
aws ce create-cost-category-definition \\
  --name "TeamShowback" \\
  --rules file://team-rules.json
# → 매주 월요일 Slack #finops 채널에 자동 리포트`,
        },
        focus: 'showback',
      },
      {
        title: 'Step 3. Chargeback — "부서별로 실제 청구한다"',
        desc: 'Cost & Usage Report (CUR) 를 S3 → Athena 로 분석 → 부서 내부 청구. Showback 으로 익숙해진 후 Chargeback 으로 전환. 책임이 명확해진다.',
        block: {
          kind: 'yaml',
          code: `# Cost & Usage Report (CUR) → S3 → Athena → 부서 청구
CostUsageReport:
  name: monthly-cur
  s3_bucket: company-cur-prod
  format: parquet
  granularity: HOURLY
  additional_artifacts: [ATHENA]

# Athena 쿼리 — 부서별 월 청구 금액
SQL: |
  SELECT
    resource_tags_user_cost_center AS cost_center,
    SUM(line_item_unblended_cost)  AS monthly_cost
  FROM cur.monthly_cur
  WHERE year = '2026' AND month = '5'
  GROUP BY 1
  ORDER BY 2 DESC

# 청구 프로세스
Chargeback:
  schedule: 매월 5일
  output:    부서별 invoice PDF + 회계 시스템 전송
  dispute:   3일 내 이의 제기 → finops@ 채널`,
        },
        focus: 'chargeback',
      },
      {
        title: 'Step 4. Optimization — "절약 코치가 매주 잔소리한다"',
        desc: '미사용 EIP / orphan EBS / 만료된 RI / 야간 dev 자원. 자동 스크립트로 매주 정리하면 10~30% 절감. FinOps 의 진짜 성과.',
        block: {
          kind: 'shell',
          code: `# 미사용 EIP 탐지 (associated 안 된 것은 시간당 과금)
aws ec2 describe-addresses \\
  --query "Addresses[?AssociationId==null].[PublicIp,AllocationId]" \\
  --output table

# 미사용 EBS 볼륨 (available 상태 = orphan)
aws ec2 describe-volumes \\
  --filters Name=status,Values=available \\
  --query "Volumes[].[VolumeId,Size,CreateTime]" \\
  --output table

# RI / Savings Plan 만료 30일 전 알람
aws ce get-reservation-utilization \\
  --time-period Start=2026-05-01,End=2026-06-01 \\
  --granularity MONTHLY
# utilization < 80% → 재구매 검토

# dev/staging 야간 자동 종료 (Lambda + EventBridge)
cron: "0 20 * * MON-FRI"   # 평일 20시 → stop
cron: "0 8  * * MON-FRI"   # 평일 08시 → start
# → 월 40~50% 절감 (16h/24h × 5/7)`,
        },
        focus: 'optimization',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const FINOPS = [
      { key: 'tagging',      emoji: '🏷️', name: 'Tagging',      note: 'Owner/Project/Env' },
      { key: 'showback',     emoji: '📊', name: 'Showback',     note: '부서별 가시성' },
      { key: 'chargeback',   emoji: '💸', name: 'Chargeback',   note: '실제 청구' },
      { key: 'optimization', emoji: '✂️', name: 'Optimization', note: '미사용 정리/RI' },
    ];

    function FinOpsCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">💰 회사 가계부 + 절약 코치 (FinOps)</div>
          <div className="grid grid-cols-4 gap-2">
            {FINOPS.map((c) => {
              const isActive = focus === c.key;
              return (
                <div
                  key={c.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-blue-100 border-2 border-blue-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{c.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{c.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{c.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">FinOps 기초</h1>
                <p className="text-sm text-slate-500 mt-1">회사 가계부 + 절약 코치 — Tagging / Showback / Chargeback / Optimization</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <FinOpsCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'optimization' && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 mb-6 text-xs text-blue-900">
                💡 다음(IV-2-2)에서는 Multi-region & DR — 두 도시 백업
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
