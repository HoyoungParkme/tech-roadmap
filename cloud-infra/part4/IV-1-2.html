  <div id="root"></div>

  <!--
    IV-1-2. 비용 최적화 — Reserved / Savings Plans / Spot
    학습 목표: On-Demand 정가에서 벗어나 약정/경매로 30~90% 절감
    핵심 비유: 정기 구독 vs 떨이세일
    패턴: 좌(LiveDataPane: 4 가격 모델 비교 시각화) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (4 가격 모델 시뮬레이션)
    // m6i.large 기준: On-Demand $0.10/hr (예시 단순화)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. On-Demand — 정가, 유연 (시간당 과금)',
        desc: 'On-Demand는 약정 없이 시간(또는 초) 단위로 정가 과금. 트래픽이 들쑥날쑥하거나 단기 PoC, 개발/테스트 환경에 적합. 유연성 최고지만 비용도 가장 높다 — baseline 100%. 항상 켜진 baseline 워크로드는 Reserved/Savings Plans로 옮기는 것이 정석.',
        focus: 'on_demand',
        models: {
          on_demand:    { hourly: 0.10, savePct: 0,  active: true,  state: 'baseline', note: '정가 / 약정 없음', interruptPct: 0 },
          reserved_1y:  { hourly: 0.07, savePct: 30, active: false, state: 'idle',     note: '1년 약정',         interruptPct: 0 },
          reserved_3y:  { hourly: 0.04, savePct: 60, active: false, state: 'idle',     note: '3년 약정',         interruptPct: 0 },
          spot:         { hourly: 0.01, savePct: 90, active: false, state: 'idle',     note: '경매 (회수 가능)',  interruptPct: 0 },
          savings_plan: { hourly: 0.05, savePct: 50, active: false, state: 'idle',     note: '약정 금액',         interruptPct: 0 },
        },
        showInterrupt: false,
        showDecisionTable: false,
        showFinalAlert: false,
        code: {
          lang: 'shell',
          filename: 'on-demand-pricing.sh',
          lines: [
            '# -- AWS EC2 On-Demand 가격표 (ap-northeast-2 / Linux) ----',
            '# 가격은 예시이며 시기/리전에 따라 다름. 항상 공식 페이지 확인.',
            '',
            'INSTANCE        vCPU  MEM   ON-DEMAND $/hr',
            't3.medium       2     4GB   $0.052',
            'm6i.large       2     8GB   $0.100   <- 본 강의 기준',
            'm6i.xlarge      4     16GB  $0.200',
            'c6i.2xlarge     8     16GB  $0.408',
            '',
            '# -- 한 달 비용 (730시간 기준, m6i.large) -----------------',
            'On-Demand : $0.100 * 730 = $73.0 / month',
            '',
            '# -- 언제 On-Demand를 쓰나 --------------------------------',
            '[O] 트래픽 변동 큰 burst 워크로드 (이벤트, 광고)',
            '[O] 단기 PoC / 개발 / QA 환경',
            '[O] 1년 미만 단명 프로젝트',
            '[X] 24/7 항상 켜진 prod (-> Reserved/SP)',
            '[X] batch / fault-tolerant (-> Spot)',
          ],
          highlight: [6, 11],
        },
      },
      {
        title: 'Step 2. Reserved Instance — 1/3년 약정, 30~70% 할인',
        desc: 'RI는 1년 또는 3년 약정으로 인스턴스 타입을 예약하고 정가 대비 30~70% 할인. 1년 약정이면 $0.07/hr (-30%), 3년이면 $0.04/hr (-60%). Standard RI는 더 싸지만 타입 변경 불가, Convertible RI는 비싸지만 패밀리 변경 가능. 24/7 baseline 워크로드의 정답.',
        focus: 'reserved',
        models: {
          on_demand:    { hourly: 0.10, savePct: 0,  active: false, state: 'compare',  note: '정가 비교용',     interruptPct: 0 },
          reserved_1y:  { hourly: 0.07, savePct: 30, active: true,  state: 'highlight', note: '1년 약정 -30%',  interruptPct: 0 },
          reserved_3y:  { hourly: 0.04, savePct: 60, active: true,  state: 'highlight', note: '3년 약정 -60%',  interruptPct: 0 },
          spot:         { hourly: 0.01, savePct: 90, active: false, state: 'idle',      note: '경매',            interruptPct: 0 },
          savings_plan: { hourly: 0.05, savePct: 50, active: false, state: 'idle',      note: '약정 금액',       interruptPct: 0 },
        },
        showInterrupt: false,
        showDecisionTable: false,
        showFinalAlert: false,
        code: {
          lang: 'yaml',
          filename: 'reserved-instance.tf',
          lines: [
            '# Terraform — EC2 Capacity Reservation (Reserved Instance 흐름)',
            'resource "aws_ec2_capacity_reservation" "web_baseline" {',
            '  instance_type     = "m6i.large"',
            '  instance_platform = "Linux/UNIX"',
            '  availability_zone = "ap-northeast-2a"',
            '  instance_count    = 10            # 항상 켜진 baseline 10대',
            '  tenancy           = "default"',
            '  end_date_type     = "unlimited"',
            '  tags = {',
            '    Project = "web-prod"',
            '    Owner   = "platform"',
            '  }',
            '}',
            '',
            '# -- Standard vs Convertible 비교 ---------------------------',
            '# Standard RI    할인율 -72%  변경: AZ/사이즈만   되팔기 O',
            '# Convertible RI 할인율 -54%  변경: 패밀리/OS도   되팔기 X',
            '',
            '# -- 결제 옵션 ----------------------------------------------',
            '# All Upfront      전액 선납  (-72%)  현금 흐름 OK일 때',
            '# Partial Upfront  일부 선납  (-70%)  중간',
            '# No Upfront       월납       (-66%)  현금 보호',
            '',
            '# 미사용 RI 시간은 그냥 소멸 (그래서 baseline만 약정)',
          ],
          highlight: [3, 6, 16, 17],
        },
      },
      {
        title: 'Step 3. Spot — 경매, 최대 90% 할인 (중단 가능)',
        desc: 'Spot은 AWS의 남는 용량을 경매로 싸게 파는 방식. 시간당 $0.01 (-90%) 까지 떨어진다. 단점: 2분 전 알림 후 회수될 수 있음 — 회수율 약 5%. Stateless 워커, 배치, CI/CD, ML training, EKS의 비핵심 노드 그룹에 적합. interruption handler로 graceful shutdown 구현 필수.',
        focus: 'spot',
        models: {
          on_demand:    { hourly: 0.10, savePct: 0,  active: false, state: 'compare',   note: '정가 비교용',     interruptPct: 0 },
          reserved_1y:  { hourly: 0.07, savePct: 30, active: false, state: 'idle',      note: '1년 약정',        interruptPct: 0 },
          reserved_3y:  { hourly: 0.04, savePct: 60, active: false, state: 'idle',      note: '3년 약정',        interruptPct: 0 },
          spot:         { hourly: 0.01, savePct: 90, active: true,  state: 'highlight', note: '경매 -90%',       interruptPct: 5 },
          savings_plan: { hourly: 0.05, savePct: 50, active: false, state: 'idle',      note: '약정 금액',       interruptPct: 0 },
        },
        showInterrupt: true,
        showDecisionTable: false,
        showFinalAlert: false,
        code: {
          lang: 'yaml',
          filename: 'spot-node-group.tf',
          lines: [
            '# EKS Managed Node Group — Spot worker (Terraform)',
            'resource "aws_eks_node_group" "spot_workers" {',
            '  cluster_name    = aws_eks_cluster.main.name',
            '  node_group_name = "spot-batch"',
            '  node_role_arn   = aws_iam_role.node.arn',
            '  subnet_ids      = var.private_subnets',
            '',
            '  capacity_type  = "SPOT"                       # -- 핵심',
            '  instance_types = ["m6i.large", "m5.large", "m5a.large"]',
            '  # 다양화 = 회수 위험 분산',
            '',
            '  scaling_config {',
            '    desired_size = 5',
            '    min_size     = 0',
            '    max_size     = 50',
            '  }',
            '',
            '  # Spot 노드에만 taint -> 핵심 워크로드는 Spot에 안 뜨게',
            '  taint {',
            '    key    = "spot"',
            '    value  = "true"',
            '    effect = "NO_SCHEDULE"',
            '  }',
            '',
            '  labels = { lifecycle = "spot", workload = "batch" }',
            '}',
            '',
            '# -- AWS Node Termination Handler (필수) -------------------',
            '# Helm: aws-node-termination-handler',
            '# - Spot interruption notice를 감지해 cordon + drain',
            '# - SIGTERM 전파, terminationGracePeriodSeconds: 110',
            '# - 평균 spot 회수율: 5% 미만 (다양화 적용 시)',
          ],
          highlight: [8, 9, 18, 19, 20, 21, 22, 30, 31, 32],
        },
      },
      {
        title: 'Step 4. Savings Plans — 약정 금액, 자동 적용 (Compute vs EC2)',
        desc: 'Savings Plans는 "시간당 $X 쓸게"로 금액을 약정하면 RI보다 유연하게 할인. Compute SP는 모든 패밀리/리전/Lambda/Fargate까지 적용(최대 -66%), EC2 Instance SP는 특정 패밀리/리전 한정이지만 더 싸다(최대 -72%). 99%의 회사는 Compute SP가 정답 — 의사결정 표 참고.',
        focus: 'savings_plan',
        models: {
          on_demand:    { hourly: 0.10, savePct: 0,  active: true,  state: 'compare',   note: '변동분 흡수',     interruptPct: 0 },
          reserved_1y:  { hourly: 0.07, savePct: 30, active: false, state: 'idle',      note: '1년 약정',        interruptPct: 0 },
          reserved_3y:  { hourly: 0.04, savePct: 60, active: false, state: 'idle',      note: '3년 약정',        interruptPct: 0 },
          spot:         { hourly: 0.01, savePct: 90, active: true,  state: 'compare',   note: '배치 -90%',       interruptPct: 5 },
          savings_plan: { hourly: 0.05, savePct: 50, active: true,  state: 'highlight', note: '약정 금액 -50%',  interruptPct: 0 },
        },
        showInterrupt: true,
        showDecisionTable: true,
        showFinalAlert: true,
        code: {
          lang: 'shell',
          filename: 'savings-plans.sh',
          lines: [
            '# -- Savings Plans 비교 매트릭스 ---------------------------',
            '',
            '                        Compute SP    EC2 SP        Reserved Inst',
            '약정 단위               $/hr (금액)   $/hr (금액)   인스턴스 개수',
            '최대 할인               -66%          -72%          -72%',
            'EC2 적용                O (모든)      O (지정)      O (지정 타입)',
            'Fargate / Lambda 적용   O             X             X',
            '패밀리 변경             O (자동)      X             △ (Convertible)',
            '리전 변경               O (자동)      X             X',
            '유연성                  ★★★★★         ★★★           ★★',
            '',
            '# -- 추천 ---------------------------------------------------',
            '# 99%의 회사: Compute SP 1Y/3Y로 baseline 80% 커버',
            '#   -> EC2 + Fargate + Lambda 까지 한 번에 할인',
            '#   -> 패밀리 바꿔도(m6i -> c7i) 그대로 할인 적용',
            '',
            '# -- 구매 추천 (AWS Cost Explorer) -------------------------',
            '$ aws ce get-savings-plans-purchase-recommendation \\',
            '    --savings-plans-type COMPUTE_SP \\',
            '    --term-in-years ONE_YEAR \\',
            '    --payment-option ALL_UPFRONT',
            '',
            '# 결과 예시',
            '# Recommended commitment: $4.20/hr',
            '# Estimated savings:      $11,025 / year (-31%)',
            '# Coverage:               87% of baseline',
            '',
            '# -- 황금 조합 (실무 정석) ---------------------------------',
            '# baseline 70~80% : Compute Savings Plans 1Y/3Y',
            '# 변동분          : On-Demand',
            '# 배치/stateless  : Spot (최대 -90%)',
            '# -> 평균 -55% 절감, 유연성 유지',
          ],
          highlight: [13, 14, 15, 28, 29, 30, 31],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 가격 모델 메타 (이름/아이콘/표시 순서 고정)
    // ─────────────────────────────────────────────────────
    const MODEL_META = [
      { key: 'on_demand',    emoji: '💵', name: 'On-Demand',    sub: '정가 / 유연' },
      { key: 'reserved_1y',  emoji: '💎', name: 'Reserved 1Y',  sub: '1년 약정' },
      { key: 'reserved_3y',  emoji: '💠', name: 'Reserved 3Y',  sub: '3년 약정' },
      { key: 'spot',         emoji: '🎰', name: 'Spot',         sub: '경매 (회수)' },
      { key: 'savings_plan', emoji: '📊', name: 'Savings Plan', sub: '약정 금액' },
    ];

    // 정적 Tailwind 클래스 (purge 안전)
    const STATE_STYLE = {
      idle:      { card: 'bg-slate-50 border-slate-200 opacity-60',  bar: 'bg-slate-300', value: 'text-slate-500', badge: 'bg-slate-200 text-slate-500',   label: '대기' },
      compare:   { card: 'bg-slate-100 border-slate-300',             bar: 'bg-slate-400', value: 'text-slate-700', badge: 'bg-slate-200 text-slate-700',   label: '비교' },
      baseline:  { card: 'bg-blue-50 border-blue-400',                bar: 'bg-blue-500',  value: 'text-blue-700',  badge: 'bg-blue-100 text-blue-700',     label: '기준' },
      highlight: { card: 'bg-blue-100 border-blue-500 ring-2 ring-blue-300', bar: 'bg-blue-600', value: 'text-blue-800', badge: 'bg-blue-200 text-blue-800', label: '활성' },
    };

    const HOURLY_BASELINE = 0.10; // On-Demand 기준 ($/hr)
    const HOURS_PER_MONTH = 730;

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 4 가격 모델 비교 시각화
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ models, focus, showInterrupt, showDecisionTable, showFinalAlert }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">💰 정기 구독 vs 떨이세일</h2>
            <span className="text-[10px] text-slate-400 font-mono">5 pricing models · live</span>
          </div>

          {/* 가격 모델 카드 (5개) */}
          <div className="space-y-2 mb-4">
            {MODEL_META.map((m) => {
              const d = models[m.key];
              const style = STATE_STYLE[d.state];
              const widthPct = Math.max(4, (d.hourly / HOURLY_BASELINE) * 100);
              return (
                <div
                  key={m.key}
                  className={`rounded-lg border-2 p-2.5 transition-all duration-500 ${style.card}`}
                >
                  <div className="flex items-center justify-between mb-1.5">
                    <div className="flex items-center gap-1.5">
                      <span aria-hidden="true">{m.emoji}</span>
                      <span className="text-xs font-bold text-slate-700">{m.name}</span>
                      <span className="text-[10px] text-slate-500">— {d.note}</span>
                    </div>
                    <div className="flex items-center gap-1.5">
                      {showInterrupt && d.interruptPct > 0 && (
                        <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-orange-100 text-orange-700">
                          ⚠ 회수 {d.interruptPct}%
                        </span>
                      )}
                      <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${style.badge}`}>
                        {style.label}
                      </span>
                    </div>
                  </div>

                  {/* 시간당 가격 막대 (On-Demand baseline 100%) */}
                  <div className="flex items-center gap-2">
                    <div className="flex-1 relative h-5 bg-slate-100 rounded-full overflow-hidden">
                      <div
                        className={`h-full transition-all duration-700 ${style.bar}`}
                        style={{ width: `${widthPct}%` }}
                      />
                      {/* baseline 100% 기준선 */}
                      <div
                        className="absolute top-0 bottom-0 w-0.5 bg-blue-700 opacity-40"
                        style={{ left: '100%', transform: 'translateX(-2px)' }}
                        aria-hidden="true"
                      />
                    </div>
                    <span className={`text-sm font-extrabold tabular-nums w-20 text-right ${style.value}`}>
                      ${d.hourly.toFixed(2)}/hr
                    </span>
                    <span className={`text-[10px] font-bold w-12 text-right ${d.savePct > 0 ? 'text-blue-700' : 'text-slate-400'}`}>
                      {d.savePct > 0 ? `-${d.savePct}%` : '0%'}
                    </span>
                  </div>
                </div>
              );
            })}
          </div>

          {/* 의사결정 표 (Step 4) */}
          {showDecisionTable && (
            <div className="mb-4 p-3 rounded-lg bg-blue-50 border border-blue-200">
              <div className="text-xs font-bold text-blue-800 mb-2">🎯 의사결정 표 — 워크로드별 정답</div>
              <table className="w-full text-[11px] text-slate-700">
                <thead>
                  <tr className="border-b border-blue-200">
                    <th className="text-left py-1 font-bold">워크로드</th>
                    <th className="text-left py-1 font-bold">추천</th>
                    <th className="text-right py-1 font-bold">절감</th>
                  </tr>
                </thead>
                <tbody>
                  <tr className="border-b border-blue-100">
                    <td className="py-1">24/7 prod baseline</td>
                    <td className="py-1 font-mono text-blue-700">Compute SP 1Y/3Y</td>
                    <td className="py-1 text-right font-bold text-blue-700">-50~66%</td>
                  </tr>
                  <tr className="border-b border-blue-100">
                    <td className="py-1">변동 burst (이벤트)</td>
                    <td className="py-1 font-mono text-slate-700">On-Demand</td>
                    <td className="py-1 text-right font-bold text-slate-500">0%</td>
                  </tr>
                  <tr className="border-b border-blue-100">
                    <td className="py-1">batch / CI / ML train</td>
                    <td className="py-1 font-mono text-blue-700">Spot</td>
                    <td className="py-1 text-right font-bold text-blue-700">-90%</td>
                  </tr>
                  <tr>
                    <td className="py-1">3년 안 바꿀 인스턴스</td>
                    <td className="py-1 font-mono text-blue-700">Reserved 3Y</td>
                    <td className="py-1 text-right font-bold text-blue-700">-60%</td>
                  </tr>
                </tbody>
              </table>
            </div>
          )}

          {/* 좌측 하단 항상 — 월 비용 비교 막대 차트 (4 모델 동시) */}
          <div className="pt-3 border-t border-slate-100">
            <div className="text-xs font-bold text-slate-700 mb-2">📅 월 비용 비교 (730시간 기준)</div>
            <div className="space-y-1.5">
              {MODEL_META.map((m) => {
                const d = models[m.key];
                const monthly = d.hourly * HOURS_PER_MONTH;
                const monthlyBaseline = HOURLY_BASELINE * HOURS_PER_MONTH;
                const widthPct = Math.max(3, (monthly / monthlyBaseline) * 100);
                const isFocus = focus === m.key || (focus === 'reserved' && (m.key === 'reserved_1y' || m.key === 'reserved_3y'));
                return (
                  <div key={m.key} className="flex items-center gap-2">
                    <span className={`text-[10px] w-20 text-right font-medium ${isFocus ? 'text-blue-700 font-bold' : 'text-slate-500'}`}>
                      {m.name}
                    </span>
                    <div className="flex-1 h-4 bg-slate-100 rounded-full overflow-hidden">
                      <div
                        className={`h-full transition-all duration-700 ${isFocus ? 'bg-blue-600' : 'bg-slate-400'}`}
                        style={{ width: `${widthPct}%` }}
                      />
                    </div>
                    <span className={`text-[10px] tabular-nums w-16 text-right font-mono ${isFocus ? 'text-blue-700 font-bold' : 'text-slate-500'}`}>
                      ${monthly.toFixed(1)}/mo
                    </span>
                  </div>
                );
              })}
            </div>
            <div className="text-[10px] text-slate-400 mt-2 text-right">
              * m6i.large 가정 (baseline ${(HOURLY_BASELINE * HOURS_PER_MONTH).toFixed(1)}/mo)
            </div>
          </div>

          {/* 마지막 alert */}
          {showFinalAlert && (
            <div className="mt-4 p-3 rounded-lg bg-blue-100 border-2 border-blue-400 text-blue-900">
              <div className="text-sm font-bold">💡 다음(IV-2-1)에서는 FinOps</div>
              <div className="text-[11px] mt-1">회사 가계부 — 태깅 / Cost Explorer / Budget 알람 / Showback·Chargeback</div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-blue-500/10 border-l-2 border-blue-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-700 hover:text-blue-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. 비용 &amp; 운영 &gt; Chapter 1. 비용 최적화</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">비용 최적화 — Reserved / Spot / Savings Plans</h1>
                  <p className="text-sm text-slate-500 mt-0.5">정기 구독 vs 떨이세일 — 약정/경매로 30~90% 절감</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                models={step.models}
                focus={step.focus}
                showInterrupt={step.showInterrupt}
                showDecisionTable={step.showDecisionTable}
                showFinalAlert={step.showFinalAlert}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-blue-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-blue-600 text-white hover:bg-blue-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; IV-1-1</a>
              <a href="../index.html" className="text-blue-700 hover:text-blue-900 font-medium">허브로 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
