<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Infra 학습 — Multi-region & DR</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🌎</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-2-2. Multi-region & DR (Disaster Recovery)
    학습 목표: region 장애에도 살아남는 4가지 DR 전략과 RTO/RPO 목표.
    핵심 비유: "두 도시 백업" — 한 도시 무너져도 다른 도시가 살림
    구조: 4단계 (Backup&Restore / Pilot Light / Warm Standby / Multi-Active)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Backup & Restore — 백업 후 복구 (RPO 시간 단위)',
        desc: '가장 저렴하고 단순. 평소엔 백업만 떠 있고, 장애 나면 다른 region에 새로 띄운다. RTO 수 시간, RPO 수 시간. 비용 최소지만 복구가 느려서 비핵심 시스템에만. S3 cross-region replication + RDS snapshot 복사가 표준 조합.',
        block: {
          kind: 'yaml',
          code: `# S3 Cross-Region Replication + RDS Snapshot Copy
Resources:
  PrimaryBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: app-data-apne2          # ap-northeast-2 (서울)
      VersioningConfiguration: { Status: Enabled }
      ReplicationConfiguration:
        Role: !GetAtt ReplicationRole.Arn
        Rules:
          - Status: Enabled
            Destination:
              Bucket: arn:aws:s3:::app-data-apne1   # 도쿄로 복제
              StorageClass: STANDARD_IA
              ReplicationTime:
                Status: Enabled
                Time: { Minutes: 15 }     # RPO 15분 보장

# RDS 자동 snapshot을 다른 region으로 복사
$ aws rds copy-db-snapshot \\
    --source-db-snapshot-identifier arn:aws:rds:ap-northeast-2:...:snapshot:daily \\
    --target-db-snapshot-identifier daily-dr \\
    --source-region ap-northeast-2 \\
    --region ap-northeast-1

# 장애 시 흐름 (RTO 2~6시간)
1. DR region에서 snapshot으로 RDS 복원   # 30~60분
2. CloudFormation으로 인프라 재생성        # 30분
3. Route53 record 수동 변경                # 5분
# 총 RPO: 백업 주기만큼 (보통 24시간 ~ 15분)
# 총 RTO: 2~6시간 (사람이 절차 실행)`,
        },
        focus: 'backup_restore',
      },
      {
        title: 'Step 2. Pilot Light — 핵심만 minimal 켜둠 (RTO 10분~1시간)',
        desc: '비행기 시동만 걸어 둔 상태. 핵심 데이터(DB replica)는 항상 동기화, 앱은 꺼 둔다. 장애 시 앱만 빠르게 켜면 됨. Backup&Restore보다 빠르고 Warm Standby보다 저렴. Route53 health check + RDS read replica 조합.',
        block: {
          kind: 'yaml',
          code: `# Route53 failover + RDS cross-region read replica
Resources:
  PrimaryRDS:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: app-primary-apne2
      Engine: postgres
      MultiAZ: true                       # region 안에서는 Multi-AZ

  DRReadReplica:                          # 도쿄에 read replica (불씨)
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: app-replica-apne1
      SourceDBInstanceIdentifier: !Sub
        arn:aws:rds:ap-northeast-2:...:db:app-primary-apne2
      DBInstanceClass: db.t3.medium       # 평소엔 작게 (비용 절감)

  # Route53 — 평소 서울, 장애 시 도쿄로 자동 전환
  PrimaryDNS:
    Type: AWS::Route53::RecordSet
    Properties:
      Name: api.example.com
      Type: A
      SetIdentifier: primary
      Failover: PRIMARY
      HealthCheckId: !Ref ApiHealthCheck   # 30초마다 /health 체크
      AliasTarget: { DNSName: alb-apne2.elb.amazonaws.com }
  DRDns:
    Type: AWS::Route53::RecordSet
    Properties:
      Name: api.example.com
      Failover: SECONDARY
      AliasTarget: { DNSName: alb-apne1.elb.amazonaws.com }

# 장애 시 흐름 (RTO 10~60분, RPO 분 단위)
1. Route53 health check 실패 -> DNS 자동 failover  # 1~3분
2. Read replica를 primary로 promote               # 5~10분
3. 미리 준비한 ASG desired_capacity 0 -> N        # 5~15분`,
        },
        focus: 'pilot_light',
      },
      {
        title: 'Step 3. Warm Standby — 축소 버전 항시 가동 (RTO 분 단위)',
        desc: 'DR region에 작은 사본을 항상 돌린다. 트래픽은 거의 없고 최소 인스턴스만. 장애 시 scale-out + DNS만 전환하면 끝. Aurora Global Database가 핵심 — RPO 1초, 다른 region promote 1분 이내.',
        block: {
          kind: 'yaml',
          code: `# Aurora Global Database + EKS 축소 클러스터
Resources:
  GlobalCluster:
    Type: AWS::RDS::GlobalCluster
    Properties:
      GlobalClusterIdentifier: app-global
      Engine: aurora-postgresql
      # primary: ap-northeast-2 (서울, write)
      # secondary: ap-northeast-1 (도쿄, read, 1초 lag)

  PrimaryCluster:                          # 서울 - full size
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-postgresql
      GlobalClusterIdentifier: !Ref GlobalCluster
      DBClusterInstanceClass: db.r6g.xlarge

  DRCluster:                               # 도쿄 - 축소 read-only
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-postgresql
      GlobalClusterIdentifier: !Ref GlobalCluster
      DBClusterInstanceClass: db.r6g.large  # 작게

# EKS — 도쿄에 축소 nodegroup 항시 가동
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: app-dr
  region: ap-northeast-1
managedNodeGroups:
  - name: warm-pool
    instanceType: t3.medium
    minSize: 2                  # 평소 2대만
    maxSize: 20                 # 장애 시 빠르게 확장

# 장애 시 흐름 (RTO 5~15분, RPO 1초)
1. Route53 failover                       # 1분
2. Aurora Global -> failover-global-db    # 1~2분 (write 전환)
   $ aws rds failover-global-cluster \\
       --global-cluster-identifier app-global \\
       --target-db-cluster-identifier arn:...:cluster:app-dr
3. EKS HPA가 트래픽에 맞춰 scale-out      # 3~10분`,
        },
        focus: 'warm_standby',
      },
      {
        title: 'Step 4. Multi-Active — 두 region 모두 active (RTO 0)',
        desc: '두 region 모두 실제 트래픽 받음. Active-Active. 장애가 나도 사용자는 거의 못 느낌. 가장 비싸고 어렵지만 RTO/RPO 거의 0. DynamoDB Global Table + Route53 latency routing이 정석. 충돌 처리(LWW) 설계가 핵심 난이도.',
        block: {
          kind: 'yaml',
          code: `# DynamoDB Global Table + Route53 latency routing
Resources:
  OrdersTable:
    Type: AWS::DynamoDB::GlobalTable        # 양방향 자동 복제
    Properties:
      TableName: orders
      AttributeDefinitions:
        - { AttributeName: order_id, AttributeType: S }
      KeySchema:
        - { AttributeName: order_id, KeyType: HASH }
      Replicas:
        - Region: ap-northeast-2            # 서울 - active
        - Region: ap-northeast-1            # 도쿄 - active
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      # 충돌 해결: Last Writer Wins (timestamp 기준 자동)

# Route53 — 사용자 가까운 region으로 자동 라우팅
SeoulDNS:
  Type: AWS::Route53::RecordSet
  Properties:
    Name: api.example.com
    SetIdentifier: seoul
    Region: ap-northeast-2                  # latency 기반
    HealthCheckId: !Ref SeoulHealth
    AliasTarget: { DNSName: alb-apne2... }
TokyoDNS:
  Type: AWS::Route53::RecordSet
  Properties:
    Region: ap-northeast-1
    HealthCheckId: !Ref TokyoHealth
    AliasTarget: { DNSName: alb-apne1... }

# DR 4전략 비교표
| 전략            | RTO     | RPO     | 비용 | 쓰임           |
|-----------------|---------|---------|------|----------------|
| Backup&Restore  | 2~6h    | 1~24h   | $    | 비핵심         |
| Pilot Light     | 10~60m  | 분 단위 | $$   | 일반 prod      |
| Warm Standby    | 5~15m   | 1초     | $$$  | 중요 prod      |
| Multi-Active    | ~0      | ~0      | $$$$ | 결제/금융      |

# 충돌 처리 패턴 (Multi-Active 핵심 함정)
- Last Writer Wins (LWW)        # DynamoDB 기본
- CRDT (counter, set 등)        # 합산 가능
- 강한 일관성 필요시 -> Aurora Global (single writer)
# 두 region 동시 write를 만들지 않는 설계가 더 쉬움 (sharding by user_id)`,
        },
        focus: 'multi_active',
      },
    ];

    const KIND_STYLE = {
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      python: { label: 'Python', textColor: '#86efac' },
    };

    const DR_STRATEGIES = [
      { key: 'backup_restore', emoji: '💾', name: 'Backup & Restore', note: 'RPO 시간 단위' },
      { key: 'pilot_light',    emoji: '🔥', name: 'Pilot Light',      note: '핵심만 minimal' },
      { key: 'warm_standby',   emoji: '🌡️', name: 'Warm Standby',     note: '축소 버전 가동' },
      { key: 'multi_active',   emoji: '⚡', name: 'Multi-Active',      note: '두 region active' },
    ];

    function DRCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🌎 두 도시 백업 (Multi-region & DR)</div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
            {DR_STRATEGIES.map((s) => {
              const isActive = focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-blue-100 border-2 border-blue-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{s.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{s.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1 leading-tight">{s.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Multi-region & DR</h1>
                <p className="text-sm text-slate-500 mt-1">두 도시 백업 — 4가지 DR 전략과 RTO/RPO 목표</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <DRCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'multi_active' && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 mb-6 text-xs text-blue-900">
                💡 다음(V-1-1)에서는 Well-Architected Framework — 5축 점검
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
