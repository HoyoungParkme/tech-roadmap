<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Infra 학습 — IV-2-2. Multi-region & DR</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🌎</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    IV-2-2. Multi-region & DR (Disaster Recovery)
    학습 목표: region 장애에도 살아남는 4가지 DR 전략을 RTO/RPO와 함께 이해한다.
    핵심 비유: 두 도시 백업 — us-east-1 무너져도 us-west-2가 받아낸다
    패턴: 좌(LiveDataPane: 두 region 박스 + 복제 화살표) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (4 DR 전략)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Backup & Restore — 백업 후 복구',
        desc: 'primary(us-east-1)는 평소대로 풀가동. secondary(us-west-2)는 snapshot만 떠 있고 인스턴스는 꺼진 상태. 장애가 나면 사람이 절차를 실행해서 새로 띄운다. 가장 저렴하지만 RTO 1~3시간, RPO 24시간으로 느리다.',
        focus: 'backup_restore',
        primary: { app: 'on', db: 'on', label: 'ACTIVE' },
        secondary: { app: 'off', db: 'snapshot', label: 'SNAPSHOT ONLY' },
        replication: { kind: 'snapshot', lag: '24h', speed: 'slow' },
        rto: '1~3h', rpo: '24h', cost: '$',
        code: {
          lang: 'yaml',
          filename: 's3-replication.yml',
          lines: [
            '# S3 Cross-Region Replication + RDS Snapshot Copy',
            'Resources:',
            '  PrimaryBucket:',
            '    Type: AWS::S3::Bucket',
            '    Properties:',
            '      BucketName: app-data-use1          # us-east-1 (primary)',
            '      VersioningConfiguration: { Status: Enabled }',
            '      ReplicationConfiguration:',
            '        Role: !GetAtt ReplicationRole.Arn',
            '        Rules:',
            '          - Status: Enabled',
            '            Destination:',
            '              Bucket: arn:aws:s3:::app-data-usw2   # us-west-2 복제',
            '              StorageClass: STANDARD_IA',
            '',
            '# RDS 자동 snapshot을 다른 region으로 복사',
            '$ aws rds copy-db-snapshot \\',
            '    --source-db-snapshot-identifier arn:aws:rds:us-east-1:...:snapshot:daily \\',
            '    --target-db-snapshot-identifier daily-dr \\',
            '    --source-region us-east-1 \\',
            '    --region us-west-2',
            '',
            '# 장애 시 흐름 (RTO 1~3h, RPO 24h)',
            '# 1) snapshot으로 RDS 복원       (30~60분)',
            '# 2) CloudFormation으로 인프라 생성 (30분)',
            '# 3) Route53 record 수동 변경     (5분)',
          ],
          highlight: [6, 13, 18, 19, 20, 21],
        },
      },
      {
        title: 'Step 2. Pilot Light — 핵심 DB만 minimal 가동',
        desc: 'secondary에 핵심 DB read replica만 항시 가동(불씨). 앱은 꺼져 있다. 장애 시 replica를 promote하고 ASG로 앱만 띄우면 끝. RTO 30분, RPO 5분. Backup&Restore보다 훨씬 빠르고 Warm Standby보다 저렴하다.',
        focus: 'pilot_light',
        primary: { app: 'on', db: 'on', label: 'ACTIVE' },
        secondary: { app: 'off', db: 'replica', label: 'DB ONLY (PILOT)' },
        replication: { kind: 'replica', lag: '5min', speed: 'medium' },
        rto: '30min', rpo: '5min', cost: '$$',
        code: {
          lang: 'yaml',
          filename: 'pilot-light.yml',
          lines: [
            '# Route53 failover + RDS cross-region read replica',
            'Resources:',
            '  PrimaryRDS:',
            '    Type: AWS::RDS::DBInstance',
            '    Properties:',
            '      DBInstanceIdentifier: app-primary-use1   # us-east-1',
            '      Engine: postgres',
            '      MultiAZ: true',
            '',
            '  DRReadReplica:                               # us-west-2 (불씨)',
            '    Type: AWS::RDS::DBInstance',
            '    Properties:',
            '      DBInstanceIdentifier: app-replica-usw2',
            '      SourceDBInstanceIdentifier: !Sub',
            '        arn:aws:rds:us-east-1:...:db:app-primary-use1',
            '      DBInstanceClass: db.t3.medium            # 평소 작게',
            '',
            '  PrimaryDNS:',
            '    Type: AWS::Route53::RecordSet',
            '    Properties:',
            '      Name: api.example.com',
            '      Failover: PRIMARY',
            '      HealthCheckId: !Ref ApiHealthCheck       # 30s health check',
            '      AliasTarget: { DNSName: alb-use1.elb... }',
            '  DRDns:',
            '    Type: AWS::Route53::RecordSet',
            '    Properties:',
            '      Failover: SECONDARY',
            '      AliasTarget: { DNSName: alb-usw2.elb... }',
            '',
            '# 장애 시 (RTO 30min, RPO 5min)',
            '# 1) Route53 자동 failover         (1~3분)',
            '# 2) Replica를 primary로 promote    (5~10분)',
            '# 3) ASG desired 0 → N             (10~15분)',
          ],
          highlight: [10, 13, 14, 15, 22, 23, 28],
        },
      },
      {
        title: 'Step 3. Warm Standby — 축소 버전 항시 가동',
        desc: 'secondary에 작은 사본 풀스택을 항상 돌린다. 트래픽은 거의 없고 최소 인스턴스만 가동. 장애 시 scale-out + DNS만 전환하면 즉시 받을 수 있다. Aurora Global DB가 핵심 — RPO 1초, promote 1분 이내. RTO 5분, RPO 1분.',
        focus: 'warm_standby',
        primary: { app: 'on', db: 'on', label: 'ACTIVE (FULL)' },
        secondary: { app: 'minimal', db: 'replica', label: 'WARM (SMALL)' },
        replication: { kind: 'aurora_global', lag: '1s', speed: 'fast' },
        rto: '5min', rpo: '1min', cost: '$$$',
        code: {
          lang: 'yaml',
          filename: 'warm-standby.yml',
          lines: [
            '# Aurora Global Database + EKS 축소 클러스터',
            'Resources:',
            '  GlobalCluster:',
            '    Type: AWS::RDS::GlobalCluster',
            '    Properties:',
            '      GlobalClusterIdentifier: app-global',
            '      Engine: aurora-postgresql',
            '      # primary: us-east-1 (write)',
            '      # secondary: us-west-2 (read, 1초 lag)',
            '',
            '  PrimaryCluster:                          # us-east-1 - full size',
            '    Type: AWS::RDS::DBCluster',
            '    Properties:',
            '      Engine: aurora-postgresql',
            '      GlobalClusterIdentifier: !Ref GlobalCluster',
            '      DBClusterInstanceClass: db.r6g.xlarge',
            '',
            '  DRCluster:                               # us-west-2 - 축소',
            '    Type: AWS::RDS::DBCluster',
            '    Properties:',
            '      GlobalClusterIdentifier: !Ref GlobalCluster',
            '      DBClusterInstanceClass: db.r6g.large',
            '',
            '# EKS — 축소 nodegroup 항시 가동',
            'managedNodeGroups:',
            '  - name: warm-pool',
            '    instanceType: t3.medium',
            '    minSize: 2                  # 평소 2대만',
            '    maxSize: 20                 # 장애 시 빠르게 확장',
            '',
            '# 장애 시 (RTO 5min, RPO 1min)',
            '# 1) Route53 failover                  (1분)',
            '# 2) failover-global-cluster            (1~2분, write 전환)',
            '# 3) HPA가 트래픽에 맞춰 scale-out      (3~5분)',
          ],
          highlight: [3, 11, 18, 22, 28, 29],
        },
      },
      {
        title: 'Step 4. Multi-Active — 두 region 모두 active',
        desc: '두 region 모두 실제 트래픽 받음. Route53 latency routing이 사용자 가까운 region으로 라우팅. DynamoDB Global Table이 양방향 자동 복제. 장애 시 사용자는 거의 못 느낀다. RTO 0, RPO 0. 가장 비싸고 충돌 처리(LWW) 설계가 핵심 난이도.',
        focus: 'multi_active',
        primary: { app: 'on', db: 'on', label: 'ACTIVE (LIVE)' },
        secondary: { app: 'on', db: 'on', label: 'ACTIVE (LIVE)' },
        replication: { kind: 'dynamodb_global', lag: '<1s', speed: 'instant', bidirectional: true },
        rto: '0', rpo: '0', cost: '$$$$',
        code: {
          lang: 'yaml',
          filename: 'multi-active.yml',
          lines: [
            '# DynamoDB Global Table + Route53 latency routing',
            'Resources:',
            '  OrdersTable:',
            '    Type: AWS::DynamoDB::GlobalTable        # 양방향 자동 복제',
            '    Properties:',
            '      TableName: orders',
            '      AttributeDefinitions:',
            '        - { AttributeName: order_id, AttributeType: S }',
            '      KeySchema:',
            '        - { AttributeName: order_id, KeyType: HASH }',
            '      Replicas:',
            '        - Region: us-east-1                 # active',
            '        - Region: us-west-2                 # active',
            '      StreamSpecification:',
            '        StreamViewType: NEW_AND_OLD_IMAGES',
            '      # 충돌 해결: Last Writer Wins (timestamp)',
            '',
            '# Route53 — 사용자 가까운 region으로 자동 라우팅',
            'EastDNS:',
            '  Type: AWS::Route53::RecordSet',
            '  Properties:',
            '    Name: api.example.com',
            '    SetIdentifier: us-east',
            '    Region: us-east-1                       # latency 기반',
            '    HealthCheckId: !Ref EastHealth',
            '    AliasTarget: { DNSName: alb-use1... }',
            'WestDNS:',
            '  Type: AWS::Route53::RecordSet',
            '  Properties:',
            '    Region: us-west-2',
            '    HealthCheckId: !Ref WestHealth',
            '    AliasTarget: { DNSName: alb-usw2... }',
            '',
            '# DR 4전략 비교',
            '# | 전략            | RTO    | RPO   | 비용 |',
            '# | Backup&Restore  | 1~3h   | 24h   | $    |',
            '# | Pilot Light     | 30min  | 5min  | $$   |',
            '# | Warm Standby    | 5min   | 1min  | $$$  |',
            '# | Multi-Active    | ~0     | ~0    | $$$$ |',
          ],
          highlight: [4, 11, 12, 13, 16, 24, 30],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // DR 전략 카드 메타
    // ─────────────────────────────────────────────────────
    const DR_STRATEGIES = [
      { key: 'backup_restore', emoji: '💾', name: 'Backup & Restore', note: 'snapshot only' },
      { key: 'pilot_light',    emoji: '🔥', name: 'Pilot Light',      note: 'DB minimal' },
      { key: 'warm_standby',   emoji: '🌡️', name: 'Warm Standby',     note: '축소 가동' },
      { key: 'multi_active',   emoji: '⚡', name: 'Multi-Active',     note: '양쪽 active' },
    ];

    // 인스턴스 상태 스타일
    const NODE_STYLE = {
      on:       { bg: 'bg-blue-500',   text: 'text-white',       border: 'border-blue-700',  label: 'ON',       dot: 'bg-emerald-400' },
      off:      { bg: 'bg-slate-200',  text: 'text-slate-400',   border: 'border-slate-300', label: 'OFF',      dot: 'bg-slate-400' },
      minimal:  { bg: 'bg-blue-200',   text: 'text-blue-800',    border: 'border-blue-400',  label: 'MIN',      dot: 'bg-yellow-400' },
      snapshot: { bg: 'bg-slate-100',  text: 'text-slate-500',   border: 'border-slate-300', label: 'SNAP',     dot: 'bg-slate-400' },
      replica:  { bg: 'bg-blue-100',   text: 'text-blue-700',    border: 'border-blue-300',  label: 'REPLICA',  dot: 'bg-yellow-400' },
    };

    const REPLICATION_STYLE = {
      slow:    { color: 'stroke-slate-400',  label: 'snapshot copy', dash: '6,4',  animate: false },
      medium:  { color: 'stroke-blue-400',   label: 'async replica', dash: '4,3',  animate: true  },
      fast:    { color: 'stroke-blue-500',   label: 'aurora global', dash: '0',    animate: true  },
      instant: { color: 'stroke-blue-600',   label: 'global table',  dash: '0',    animate: true  },
    };

    // ─────────────────────────────────────────────────────
    // RegionBox — 단일 region 시각화
    // ─────────────────────────────────────────────────────
    function RegionBox({ name, sub, app, db, label, isPrimary }) {
      const appStyle = NODE_STYLE[app];
      const dbStyle = NODE_STYLE[db];
      const isLive = app === 'on' || app === 'minimal';
      return (
        <div className={`rounded-xl border-2 p-3 transition-all duration-500 ${isLive ? 'bg-blue-50 border-blue-400' : 'bg-slate-50 border-slate-300'}`}>
          <div className="flex items-center justify-between mb-2">
            <div>
              <div className="text-xs font-bold text-slate-800">{name}</div>
              <div className="text-[10px] text-slate-500 font-mono">{sub}</div>
            </div>
            <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${isLive ? 'bg-blue-600 text-white' : 'bg-slate-300 text-slate-600'}`}>
              {label}
            </span>
          </div>

          {/* 앱 노드 */}
          <div className={`rounded-md border p-2 mb-1.5 ${appStyle.bg} ${appStyle.border} flex items-center justify-between`}>
            <div className="flex items-center gap-1.5">
              <span aria-hidden="true">⚙️</span>
              <span className={`text-[11px] font-bold ${appStyle.text}`}>App / EKS</span>
            </div>
            <span className={`w-2 h-2 rounded-full ${appStyle.dot} ${app === 'on' ? 'animate-pulse' : ''}`}></span>
          </div>

          {/* DB 노드 */}
          <div className={`rounded-md border p-2 ${dbStyle.bg} ${dbStyle.border} flex items-center justify-between`}>
            <div className="flex items-center gap-1.5">
              <span aria-hidden="true">🗄️</span>
              <span className={`text-[11px] font-bold ${dbStyle.text}`}>RDS / DDB</span>
            </div>
            <span className="text-[9px] font-mono text-slate-500">{dbStyle.label}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // ReplicationArrow — 두 region 사이 복제 화살표
    // ─────────────────────────────────────────────────────
    function ReplicationArrow({ replication }) {
      const style = REPLICATION_STYLE[replication.speed];
      const bidirectional = replication.bidirectional;
      return (
        <div className="flex flex-col items-center justify-center px-2">
          <svg width="60" height="80" viewBox="0 0 60 80">
            {/* 위쪽 화살표 (primary → secondary) */}
            <line
              x1="30" y1="15" x2="30" y2="65"
              className={style.color}
              strokeWidth="2"
              strokeDasharray={style.dash}
              markerEnd="url(#arrowhead-down)"
            >
              {style.animate && style.dash !== '0' && (
                <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="0.8s" repeatCount="indefinite" />
              )}
            </line>
            {bidirectional && (
              <line
                x1="30" y1="65" x2="30" y2="15"
                className={style.color}
                strokeWidth="2"
                markerEnd="url(#arrowhead-up)"
                transform="translate(8 0)"
              />
            )}
            <defs>
              <marker id="arrowhead-down" markerWidth="8" markerHeight="8" refX="4" refY="6" orient="0">
                <polygon points="0 0, 8 0, 4 6" className={`fill-current ${style.color.replace('stroke-', 'text-')}`} />
              </marker>
              <marker id="arrowhead-up" markerWidth="8" markerHeight="8" refX="4" refY="2" orient="180">
                <polygon points="0 8, 8 8, 4 2" className={`fill-current ${style.color.replace('stroke-', 'text-')}`} />
              </marker>
            </defs>
          </svg>
          <div className="text-[9px] font-mono text-slate-600 text-center leading-tight">
            <div>{style.label}</div>
            <div className="text-blue-600">lag {replication.lag}</div>
            {bidirectional && <div className="text-blue-700 font-bold">↕ both ways</div>}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 두 region + 복제 + DR 전략 카드
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🌎 두 도시 백업 (Multi-region DR)</h2>
            <span className="text-[10px] text-slate-400 font-mono">2 regions · live</span>
          </div>

          {/* 두 region + 복제 화살표 */}
          <div className="grid grid-cols-[1fr_auto_1fr] gap-2 items-stretch mb-4">
            <RegionBox
              name="us-east-1"
              sub="N. Virginia"
              app={step.primary.app}
              db={step.primary.db}
              label={step.primary.label}
              isPrimary={true}
            />
            <ReplicationArrow replication={step.replication} />
            <RegionBox
              name="us-west-2"
              sub="Oregon"
              app={step.secondary.app}
              db={step.secondary.db}
              label={step.secondary.label}
              isPrimary={false}
            />
          </div>

          {/* RTO/RPO/비용 지표 */}
          <div className="grid grid-cols-3 gap-2 mb-4">
            <div className="bg-blue-50 border border-blue-200 rounded-lg p-2 text-center">
              <div className="text-[10px] text-blue-600 font-bold">RTO</div>
              <div className="text-base font-extrabold text-blue-800 tabular-nums">{step.rto}</div>
              <div className="text-[9px] text-slate-500">복구 시간</div>
            </div>
            <div className="bg-blue-50 border border-blue-200 rounded-lg p-2 text-center">
              <div className="text-[10px] text-blue-600 font-bold">RPO</div>
              <div className="text-base font-extrabold text-blue-800 tabular-nums">{step.rpo}</div>
              <div className="text-[9px] text-slate-500">데이터 손실</div>
            </div>
            <div className="bg-blue-50 border border-blue-200 rounded-lg p-2 text-center">
              <div className="text-[10px] text-blue-600 font-bold">Cost</div>
              <div className="text-base font-extrabold text-blue-800 tabular-nums">{step.cost}</div>
              <div className="text-[9px] text-slate-500">월 비용</div>
            </div>
          </div>

          {/* DR 전략 카드 (현재 단계 highlight) */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-2 pt-3 border-t border-slate-100">
            {DR_STRATEGIES.map((s) => {
              const isActive = step.focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-2 text-center transition-all duration-300 ${isActive ? 'bg-blue-100 border-2 border-blue-500 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-lg">{s.emoji}</div>
                  <div className="text-[10px] font-bold text-slate-800 mt-0.5">{s.name}</div>
                  <div className="text-[9px] text-slate-500 leading-tight">{s.note}</div>
                </div>
              );
            })}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-blue-500"></span>풀가동</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-blue-200"></span>축소</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-slate-200"></span>꺼짐</span>
            <span className="flex items-center gap-1 ml-auto"><span className="w-3 h-0.5 bg-blue-500"></span>복제</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        codeRef.current.removeAttribute('data-highlighted');
        codeRef.current.className = `language-${code.lang}`;
        codeRef.current.textContent = code.lines.join('\n');
        window.hljs.highlightElement(codeRef.current);
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-blue-500/10 border-l-2 border-blue-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-700 hover:text-blue-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. 안정성 &amp; 운영 &gt; Chapter 2. Multi-region &amp; DR</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Multi-region & DR</h1>
                  <p className="text-sm text-slate-500 mt-0.5">두 도시 백업 — 4가지 DR 전략 (Backup / Pilot Light / Warm Standby / Multi-Active)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 text-sm text-blue-900">
                💡 Part IV 완성. 다음(V-1-1)에서는 <strong>Well-Architected Framework</strong>
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-blue-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-blue-600 text-white hover:bg-blue-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-2-1.html" className="text-slate-500 hover:text-slate-700">&larr; IV-2-1</a>
              <a href="../part5/V-1-1.html" className="text-blue-700 hover:text-blue-900 font-medium">V-1-1 Well-Architected Framework &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
