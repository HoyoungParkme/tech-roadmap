    // ─────────────────────────────────────────────────────
    // 작은 sparkline SVG
    // ─────────────────────────────────────────────────────
    function Sparkline({ points, stroke = '#2563eb', width = 220, height = 48 }) {
      if (!points || points.length === 0) return null;
      const min = Math.min(...points);
      const max = Math.max(...points);
      const range = max - min || 1;
      const stepX = width / (points.length - 1);
      const path = points
        .map((p, i) => {
          const x = i * stepX;
          const y = height - ((p - min) / range) * (height - 4) - 2;
          return `${i === 0 ? 'M' : 'L'} ${x.toFixed(1)} ${y.toFixed(1)}`;
        })
        .join(' ');
      // area fill
      const areaPath = `${path} L ${width} ${height} L 0 ${height} Z`;
      return (
        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-12" preserveAspectRatio="none">
          <path d={areaPath} fill={stroke} fillOpacity="0.12" />
          <path d={path} fill="none" stroke={stroke} strokeWidth="1.5" />
        </svg>
      );
    }

{LOG_QUERY}

                <thead className="bg-slate-100 text-slate-600">
                  <tr>
                    <th className="text-left px-2 py-1.5 font-mono font-normal">Alarm</th>
                    <th className="text-left px-2 py-1.5 font-mono font-normal">Metric</th>
                    <th className="text-left px-2 py-1.5 font-mono font-normal">Threshold</th>
                    <th className="text-center px-2 py-1.5 font-mono font-normal">State</th>
                    <th className="text-right px-2 py-1.5 font-mono font-normal">Changed</th>
                  </tr>
                </thead>
                <tbody>
                  {ALARMS.map((a) => (
                    <tr key={a.name} className="border-b border-slate-100">
                      <td className="px-2 py-1.5 font-mono text-blue-700">{a.name}</td>
                      <td className="px-2 py-1.5 font-mono text-slate-600">{a.metric}</td>
                      <td className="px-2 py-1.5 font-mono text-slate-500">{a.threshold}</td>
                      <td className="px-2 py-1.5 text-center">
                        <span className={`inline-block px-1.5 py-0.5 rounded border text-[10px] font-bold ${ALARM_BADGE[a.state]}`}>
                          {a.state}
                        </span>
                      </td>
                      <td className="px-2 py-1.5 text-right text-slate-500 tabular-nums">{a.lastChange}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div className="p-2 rounded bg-blue-50 border border-blue-200 text-[11px] text-blue-900">
                <span className="font-bold">SNS Topic:</span> <span className="font-mono">prod-alerts</span> → PagerDuty
              </div>
            </div>
          )}

          {/* Step 4: 4 widget 그리드 (line / number / log / text) */}
          {focus === 'dashboard' && (
            <div className="space-y-3">
              <div className="grid grid-cols-3 gap-3">
                {DASHBOARD_WIDGETS.map((w, i) => (
                  <div key={i} className={`border border-slate-200 rounded-lg p-3 bg-slate-50/60 ${w.span}`}>
                    <div className="flex items-center justify-between mb-2">
                      <span className="text-[10px] font-bold text-slate-600 uppercase">{w.type}</span>
                      <span className="text-[10px] font-mono text-slate-400">{w.title}</span>
                    </div>
                    {w.type === 'line' && (
                      <Sparkline points={w.chart.points} stroke={w.chart.stroke} />
                    )}
                    {w.type === 'number' && (
                      <div className="text-3xl font-extrabold text-blue-700 tabular-nums text-center py-2">
                        {w.value}
                      </div>
                    )}
                    {w.type === 'log' && (
                      <div className="space-y-0.5 text-[10px] font-mono text-slate-700">
                        {w.rows.map((r, j) => (
                          <div key={j} className="truncate text-red-600">{r}</div>
                        ))}
                      </div>
                    )}
                    {w.type === 'text' && (
                      <pre className="text-[10px] font-mono text-slate-600 whitespace-pre-wrap leading-snug">
{w.body}
                      </pre>
                    )}
                  </div>
                ))}
              </div>
              <div className="p-2 rounded bg-blue-50 border border-blue-200 text-[11px] text-blue-900">
                <span className="font-bold">4 Golden Signals</span> — latency · traffic · errors · saturation 한 화면에
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-blue-500/10 border-l-2 border-blue-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-700 hover:text-blue-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. 운영 &amp; 비용 &gt; Chapter 1. 모니터링</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">CloudWatch / Stackdriver / Monitor</h1>
                  <p className="text-sm text-slate-500 mt-0.5">클라우드 건강검진 — 메트릭 + 로그 + 알람 + 대시보드 통합</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane focus={step.focus} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 text-sm text-blue-900">
                💡 다음(IV-1-2)에서는 <strong>비용 최적화</strong> — 정기 구독 vs 떨이세일
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-blue-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-blue-600 text-white hover:bg-blue-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./IV-1-2.html" className="text-blue-700 hover:text-blue-900 font-medium">IV-1-2 비용 최적화 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
