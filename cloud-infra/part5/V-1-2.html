<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Infra 학습 — 보안 체크리스트</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🛡️</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    V-1-2. 보안 체크리스트
    학습 목표: Identity / Network / Data / Audit 4축으로 클라우드 보안 점검
    핵심 비유: "침입자 차단 12 항목"
    구조: 4단계 (IAM / Network / Data / Audit)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Identity — IAM 최소 권한 + MFA + Role 분리',
        desc: '사람(User)과 서비스(Role)를 분리하고, wildcard 없는 정책 + Root/Admin MFA 강제 + 90일 미사용 키 회수. 침입자가 키 1개 훔쳐도 한 자원만 노출되도록 영향 범위(blast radius)를 좁힌다.',
        block: {
          kind: 'shell',
          code: `# -- Identity 체크 3 항목 ----------------------------------------
# | # | 항목                            | 검증 방법                           |
# | 1 | IAM Policy least privilege      | wildcard Action/Resource 0건       |
# | 2 | MFA (Root + Admin 전원)         | aws iam get-account-summary        |
# | 3 | Human / Service Role 분리       | Trust Policy Principal 검사        |

# 1. wildcard 정책 탐지
$ aws accessanalyzer list-findings \\
    --analyzer-arn arn:aws:access-analyzer:ap-northeast-2:...:analyzer/org \\
    --filter '{"resourceType":{"eq":["AWS::IAM::Role"]}}'

# 2. MFA 미적용 사용자
$ aws iam generate-credential-report
$ aws iam get-credential-report --query 'Content' --output text | base64 -d \\
    | awk -F',' 'NR>1 && $4=="true" && $8=="false" {print $1}'  # console + no MFA

# 3. 90일 이상 미사용 액세스 키 비활성화
$ aws iam update-access-key --user-name alice --access-key-id AKIA... --status Inactive`,
        },
        focus: 'identity',
      },
      {
        title: 'Step 2. Network — VPC private subnet + SG explicit allow + WAF',
        desc: 'DB/내부 서비스는 private subnet에 두고 NAT으로만 outbound. Security Group은 explicit allow only(0.0.0.0/0 금지), NACL은 stateless 보조 방어. Public ALB 앞에 WAF로 SQLi/XSS/봇 차단.',
        block: {
          kind: 'shell',
          code: `# -- Network 체크 3 항목 ----------------------------------------
# | # | 항목                            | 검증 방법                           |
# | 4 | VPC private subnet (DB)         | RDS PubliclyAccessible=false       |
# | 5 | SG 0.0.0.0/0:22 ingress 0건     | aws ec2 describe-security-groups   |
# | 6 | WAF SQL injection rule attach   | aws wafv2 list-web-acls            |

# 4. RDS public 노출 검사
$ aws rds describe-db-instances \\
    --query 'DBInstances[?PubliclyAccessible==\`true\`].DBInstanceIdentifier'

# 5. SSH/RDP 전체 개방 SG 탐지
$ aws ec2 describe-security-groups \\
    --filters Name=ip-permission.cidr,Values=0.0.0.0/0 \\
              Name=ip-permission.from-port,Values=22,3389 \\
    --query 'SecurityGroups[].GroupId'

# 6. WAF — ALB에 managed rule 부착
$ aws wafv2 associate-web-acl \\
    --web-acl-arn arn:aws:wafv2:...:webacl/prod-waf/... \\
    --resource-arn arn:aws:elasticloadbalancing:...:loadbalancer/app/prod-alb/...

# Managed Rule: AWSManagedRulesSQLiRuleSet, AWSManagedRulesCommonRuleSet`,
        },
        focus: 'network',
      },
      {
        title: 'Step 3. Data — KMS CMK rotate + S3 SSE-KMS + RDS encryption + TLS 1.2+',
        desc: 'at rest는 KMS Customer Managed Key(자동 회전), in transit는 TLS 1.2 이상 강제. S3는 SSE-KMS 기본 암호화, RDS는 storage encryption + force_ssl=1, ALB는 SecurityPolicy=TLS-1-2-2021 이상.',
        block: {
          kind: 'shell',
          code: `# -- Data 체크 3 항목 -------------------------------------------
# | # | 항목                            | 검증 방법                           |
# | 7 | KMS CMK 자동 회전 enabled       | aws kms get-key-rotation-status    |
# | 8 | S3 SSE-KMS + RDS encryption     | get-bucket-encryption / DescribeDB |
# | 9 | TLS 1.2+ (ALB / RDS in transit) | describe-listeners SSL Policy      |

# 7. KMS 키 자동 회전 (1년 주기)
$ aws kms enable-key-rotation --key-id arn:aws:kms:...:key/abcd-1234

# 8. S3 default encryption + RDS storage encrypted
$ aws s3api get-bucket-encryption --bucket my-app-data \\
    --query 'ServerSideEncryptionConfiguration.Rules[].ApplyServerSideEncryptionByDefault'
# -> { "SSEAlgorithm": "aws:kms", "KMSMasterKeyID": "..." }

$ aws rds describe-db-instances \\
    --query 'DBInstances[?StorageEncrypted==\`false\`].DBInstanceIdentifier'

# 9. ALB TLS Policy
$ aws elbv2 describe-listeners --load-balancer-arn ... \\
    --query 'Listeners[?Protocol==\`HTTPS\`].SslPolicy'
# 권장: ELBSecurityPolicy-TLS13-1-2-2021-06 (TLS 1.2 + 1.3)

# RDS force SSL
$ psql -c "ALTER SYSTEM SET rds.force_ssl=1;"`,
        },
        focus: 'data',
      },
      {
        title: 'Step 4. Audit — CloudTrail all regions + Config rule + GuardDuty + alert',
        desc: 'CloudTrail multi-region trail로 모든 API 변경 기록(WORM 보관), AWS Config rule로 위반 자동 감지, GuardDuty가 위협 ML 탐지 -> EventBridge -> SNS/Slack 즉시 알림. 사고 시 30분 내 파악.',
        block: {
          kind: 'shell',
          code: `# -- Audit 체크 3 항목 ------------------------------------------
# | #  | 항목                           | 검증 방법                          |
# | 10 | CloudTrail multi-region ON     | describe-trails IsMultiRegion      |
# | 11 | Config rule (필수 룰 N개)      | describe-config-rules              |
# | 12 | GuardDuty + Slack alert 연결   | list-detectors / EventBridge rule  |

# 10. CloudTrail — 모든 리전 + 변조 감지
$ aws cloudtrail describe-trails \\
    --query 'trailList[?IsMultiRegionTrail==\`true\` && LogFileValidationEnabled==\`true\`]'

# 11. AWS Config — 필수 규칙 (Conformance Pack 권장)
$ aws configservice describe-config-rules \\
    --query 'ConfigRules[].ConfigRuleName'
# 필수: encrypted-volumes, root-account-mfa-enabled,
#       s3-bucket-public-read-prohibited, iam-password-policy

# 12. GuardDuty 활성화 + Finding -> Slack
$ aws guardduty list-detectors --query 'DetectorIds'

# EventBridge rule: GuardDuty Finding (severity >= 4) -> SNS topic -> Slack webhook
$ aws events put-rule --name guardduty-high \\
    --event-pattern '{"source":["aws.guardduty"],
      "detail-type":["GuardDuty Finding"],
      "detail":{"severity":[{"numeric":[">=",4]}]}}'

# 점검 주기
[ ] 매일  : GuardDuty Finding 검토 (alert 0건이면 OK)
[ ] 매주  : Config 위반 룰 확인
[ ] 매월  : IAM Access Analyzer + 미사용 키 회수
[ ] 분기  : 12 항목 전체 재점검 + 침투 테스트`,
        },
        focus: 'audit',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const SECURITY = [
      { key: 'identity', emoji: '🔐', name: 'Identity', note: 'IAM + MFA' },
      { key: 'network',  emoji: '🌐', name: 'Network',  note: 'SG + WAF'  },
      { key: 'data',     emoji: '🔒', name: 'Data',     note: 'KMS + TLS' },
      { key: 'audit',    emoji: '📜', name: 'Audit',    note: 'Trail + GD'},
    ];

    function SecurityCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🛡️ 침입자 차단 12 항목 (Security Checklist)</div>
          <div className="grid grid-cols-4 gap-2">
            {SECURITY.map((s) => {
              const isActive = focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-blue-100 border-2 border-blue-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{s.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{s.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{s.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">보안 체크리스트</h1>
                <p className="text-sm text-slate-500 mt-1">침입자 차단 12 항목 — Identity / Network / Data / Audit</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <SecurityCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'audit' && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 mb-6 text-xs text-blue-900">
                💡 다음(V-2-1)에서는 운영 자동화 — Runbook / Playbook
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
