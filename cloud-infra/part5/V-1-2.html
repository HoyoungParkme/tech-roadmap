<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Infra 학습 — V-1-2. 보안 체크리스트</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🛡️</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    V-1-2. 보안 체크리스트 — 침입자 차단 12 항목
    학습 목표: Identity / Network / Data / Audit 4축으로 클라우드 보안을 점검하고,
              침입 시나리오를 통해 각 계층의 방어 동작을 시각화한다.
    핵심 비유: "공항 보안 검색대" — 신분증(IAM) → 게이트(SG/WAF) → 짐 잠금(KMS) → CCTV(CloudTrail)
    패턴: fastapi v1 패턴 — 좌(LiveDataPane: 4 보안 카드 + 침입 시나리오) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (4 보안 카테고리 + 침입 시나리오)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Identity — IAM 점검 (MFA + 최소 권한 + Role 분리)',
        desc: '사람(User)과 서비스(Role)를 분리하고, wildcard 없는 정책 + Root/Admin MFA 강제 + 90일 미사용 키 회수. 키 1개 유출돼도 영향 범위(blast radius)를 좁힌다.',
        focus: 'identity',
        identity: {
          rows: [
            { id: 1, label: 'IAM Policy least privilege', detect: 'wildcard Action/Resource 0건', status: 'pass' },
            { id: 2, label: 'MFA (Root + Admin 전원)',     detect: 'aws iam get-account-summary',  status: 'pass' },
            { id: 3, label: 'Human / Service Role 분리',  detect: 'Trust Policy Principal 검사',  status: 'pass' },
          ],
          badges: ['MFA 강제', 'least privilege', 'role 분리'],
        },
        code: {
          lang: 'shell',
          filename: 'identity-check.sh',
          lines: [
            '# -- Identity 체크 3 항목 ---------------------------------',
            '# | # | 항목                       | 검증 방법                   |',
            '# | 1 | IAM Policy least privilege | wildcard Action/Resource 0 |',
            '# | 2 | MFA (Root + Admin 전원)    | get-account-summary        |',
            '# | 3 | Human / Service Role 분리  | Trust Policy Principal     |',
            '',
            '# 1. wildcard 정책 탐지 (Access Analyzer)',
            'aws accessanalyzer list-findings \\',
            '    --analyzer-arn arn:aws:access-analyzer:ap-northeast-2:...:analyzer/org \\',
            '    --filter \'{"resourceType":{"eq":["AWS::IAM::Role"]}}\'',
            '',
            '# 2. MFA 미적용 콘솔 사용자 추출',
            'aws iam generate-credential-report',
            'aws iam get-credential-report --query Content --output text | base64 -d \\',
            '  | awk -F, \'NR>1 && $4=="true" && $8=="false" {print $1}\'',
            '',
            '# 3. 90일 이상 미사용 액세스 키 비활성화',
            'aws iam update-access-key --user-name alice \\',
            '    --access-key-id AKIA... --status Inactive',
          ],
          highlight: [8, 13, 17],
        },
      },
      {
        title: 'Step 2. Network — 침입 시나리오: 외부 → SG block → WAF SQLi 차단',
        desc: 'DB는 private subnet, SG는 explicit allow only(0.0.0.0/0:22 금지), Public ALB 앞에 WAF로 SQLi/XSS/봇 차단. 침입자의 SSH 시도와 SQL injection 시도가 각 계층에서 막히는 흐름을 본다.',
        focus: 'network',
        network: {
          attacker: { ip: '203.0.113.66', label: '🕵️ Attacker' },
          attempts: [
            { kind: 'SSH 22',      target: 'EC2',  blockedAt: 'sg', detail: 'SG ingress 0.0.0.0/0:22 차단' },
            { kind: 'SQL inject',  target: 'ALB',  blockedAt: 'waf', detail: 'AWSManagedRulesSQLiRuleSet' },
          ],
          layers: [
            { id: 'sg',  label: 'Security Group', sub: 'explicit allow' },
            { id: 'waf', label: 'WAF',            sub: 'managed rules' },
            { id: 'app', label: 'App / DB',       sub: 'private subnet' },
          ],
        },
        code: {
          lang: 'shell',
          filename: 'network-defense.sh',
          lines: [
            '# -- Network 체크 3 항목 ---------------------------------',
            '# | # | 항목                       | 검증 방법                   |',
            '# | 4 | VPC private subnet (DB)    | RDS PubliclyAccessible=F   |',
            '# | 5 | SG 0.0.0.0/0:22 ingress 0  | describe-security-groups   |',
            '# | 6 | WAF SQL injection rule     | wafv2 list-web-acls        |',
            '',
            '# 4. RDS public 노출 검사',
            'aws rds describe-db-instances \\',
            '    --query \'DBInstances[?PubliclyAccessible==`true`].DBInstanceIdentifier\'',
            '',
            '# 5. SSH/RDP 전체 개방 SG 탐지 (203.0.113.66 ← 차단 대상)',
            'aws ec2 describe-security-groups \\',
            '    --filters Name=ip-permission.cidr,Values=0.0.0.0/0 \\',
            '              Name=ip-permission.from-port,Values=22,3389 \\',
            '    --query \'SecurityGroups[].GroupId\'',
            '',
            '# 6. WAF — ALB에 managed rule 부착 (SQLi/XSS/CommonRule)',
            'aws wafv2 associate-web-acl \\',
            '    --web-acl-arn arn:aws:wafv2:...:webacl/prod-waf/... \\',
            '    --resource-arn arn:aws:elasticloadbalancing:...:loadbalancer/app/prod-alb/...',
            '# Managed: AWSManagedRulesSQLiRuleSet, AWSManagedRulesCommonRuleSet',
          ],
          highlight: [11, 17, 21],
        },
      },
      {
        title: 'Step 3. Data — KMS 암호화 + RDS encryption + TLS 1.2+ + 키 rotation',
        desc: 'at rest는 KMS Customer Managed Key(자동 회전, 1년 주기), in transit는 TLS 1.2 이상 강제. S3 SSE-KMS, RDS storage encryption + force_ssl=1, ALB SecurityPolicy=TLS-1-2-2021-06.',
        focus: 'data',
        data: {
          rows: [
            { id: 7, label: 'KMS CMK 자동 회전 enabled',   detect: 'get-key-rotation-status',     status: 'pass' },
            { id: 8, label: 'S3 SSE-KMS + RDS encryption', detect: 'get-bucket-encryption',       status: 'pass' },
            { id: 9, label: 'TLS 1.2+ (ALB / RDS)',         detect: 'describe-listeners SslPolicy', status: 'pass' },
          ],
          rotation: { daysSince: 287, daysUntil: 78, lastRotated: '2025-08-01' },
        },
        code: {
          lang: 'shell',
          filename: 'data-encryption.sh',
          lines: [
            '# -- Data 체크 3 항목 ------------------------------------',
            '# | # | 항목                       | 검증 방법                   |',
            '# | 7 | KMS CMK 자동 회전 enabled  | get-key-rotation-status    |',
            '# | 8 | S3 SSE-KMS + RDS encrypt   | get-bucket-encryption      |',
            '# | 9 | TLS 1.2+ (ALB / RDS)       | describe-listeners         |',
            '',
            '# 7. KMS 키 자동 회전 (1년 주기)',
            'aws kms enable-key-rotation \\',
            '    --key-id arn:aws:kms:...:key/abcd-1234',
            '',
            '# 8. S3 default encryption + RDS storage encrypted',
            'aws s3api get-bucket-encryption --bucket my-app-data \\',
            '  --query \'ServerSideEncryptionConfiguration.Rules[].ApplyServerSideEncryptionByDefault\'',
            '# -> { "SSEAlgorithm": "aws:kms", "KMSMasterKeyID": "..." }',
            '',
            'aws rds describe-db-instances \\',
            '    --query \'DBInstances[?StorageEncrypted==`false`].DBInstanceIdentifier\'',
            '',
            '# 9. ALB TLS Policy + RDS force SSL',
            'aws elbv2 describe-listeners --load-balancer-arn ... \\',
            '    --query \'Listeners[?Protocol==`HTTPS`].SslPolicy\'',
            '# 권장: ELBSecurityPolicy-TLS13-1-2-2021-06',
            'psql -c "ALTER SYSTEM SET rds.force_ssl=1;"',
          ],
          highlight: [8, 12, 21],
        },
      },
      {
        title: 'Step 4. Audit — CloudTrail + GuardDuty findings 라이브 알람',
        desc: 'CloudTrail multi-region trail로 모든 API를 WORM 기록, AWS Config rule로 위반 자동 감지, GuardDuty가 위협 ML 탐지 → EventBridge → SNS/Slack 즉시 알림. 사고 인지까지 30분 이내.',
        focus: 'audit',
        audit: {
          rows: [
            { id: 10, label: 'CloudTrail multi-region ON',  detect: 'IsMultiRegionTrail=true',       status: 'pass' },
            { id: 11, label: 'AWS Config 필수 rule N개',     detect: 'describe-config-rules',         status: 'pass' },
            { id: 12, label: 'GuardDuty + Slack alert',      detect: 'list-detectors / EventBridge', status: 'fire' },
          ],
          findings: [
            { sev: 'HIGH',   title: 'UnauthorizedAccess:IAMUser/MaliciousIPCaller',     time: '1m ago' },
            { sev: 'MEDIUM', title: 'Recon:EC2/PortProbeUnprotectedPort',               time: '6m ago' },
            { sev: 'MEDIUM', title: 'CredentialAccess:IAMUser/AnomalousBehavior',       time: '14m ago' },
          ],
        },
        code: {
          lang: 'shell',
          filename: 'audit-alarm.sh',
          lines: [
            '# -- Audit 체크 3 항목 -----------------------------------',
            '# | #  | 항목                       | 검증 방법                  |',
            '# | 10 | CloudTrail multi-region ON | describe-trails           |',
            '# | 11 | Config rule 필수 N개       | describe-config-rules     |',
            '# | 12 | GuardDuty + Slack alert    | list-detectors / Events   |',
            '',
            '# 10. CloudTrail — 모든 리전 + 변조 감지',
            'aws cloudtrail describe-trails \\',
            '    --query \'trailList[?IsMultiRegionTrail==`true` && LogFileValidationEnabled==`true`]\'',
            '',
            '# 11. AWS Config — 필수 규칙 (Conformance Pack)',
            'aws configservice describe-config-rules \\',
            '    --query \'ConfigRules[].ConfigRuleName\'',
            '# 필수: encrypted-volumes, root-account-mfa-enabled,',
            '#       s3-bucket-public-read-prohibited, iam-password-policy',
            '',
            '# 12. GuardDuty 활성화 + Finding -> Slack',
            'aws guardduty list-detectors --query DetectorIds',
            'aws events put-rule --name guardduty-high \\',
            '  --event-pattern \'{"source":["aws.guardduty"],',
            '    "detail-type":["GuardDuty Finding"],',
            '    "detail":{"severity":[{"numeric":[">=",4]}]}}\'',
            '',
            '# 점검 주기',
            '# [ ] 매일  : GuardDuty Finding 검토',
            '# [ ] 매주  : Config 위반 룰 확인',
            '# [ ] 매월  : Access Analyzer + 미사용 키 회수',
            '# [ ] 분기  : 12 항목 전체 재점검 + 침투 테스트',
          ],
          highlight: [18, 19, 22],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 4 보안 카테고리 메타
    // ─────────────────────────────────────────────────────
    const SECURITY = [
      { key: 'identity', emoji: '🔐', name: 'Identity', note: 'IAM + MFA' },
      { key: 'network',  emoji: '🌐', name: 'Network',  note: 'SG + WAF'  },
      { key: 'data',     emoji: '🔒', name: 'Data',     note: 'KMS + TLS' },
      { key: 'audit',    emoji: '📜', name: 'Audit',    note: 'Trail + GD'},
    ];

    const STATUS_STYLE = {
      pass: { badge: 'bg-emerald-100 text-emerald-700', label: '✓ pass' },
      warn: { badge: 'bg-yellow-100 text-yellow-700',   label: '⚠ warn' },
      fire: { badge: 'bg-red-100 text-red-700',          label: '🚨 fire' },
    };

    const SEV_STYLE = {
      HIGH:   'bg-red-100 text-red-700 border-red-300',
      MEDIUM: 'bg-yellow-100 text-yellow-700 border-yellow-300',
      LOW:    'bg-sky-100 text-sky-700 border-sky-300',
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 4 보안 카드 + step 별 세부 표/시나리오
    // ─────────────────────────────────────────────────────
    function SecurityCards({ focus }) {
      return (
        <div className="grid grid-cols-4 gap-2 mb-4">
          {SECURITY.map((s) => {
            const isActive = focus === s.key;
            return (
              <div
                key={s.key}
                className={`rounded-lg p-2.5 text-center transition-all duration-300 ${isActive ? 'bg-blue-100 border-2 border-blue-500 scale-105 shadow' : 'bg-slate-50 border border-slate-200'}`}
              >
                <div className="text-xl">{s.emoji}</div>
                <div className="text-xs font-bold text-slate-800 mt-0.5">{s.name}</div>
                <div className="text-[10px] text-slate-500">{s.note}</div>
              </div>
            );
          })}
        </div>
      );
    }

    function IdentityTable({ data }) {
      return (
        <div className="space-y-3">
          <div className="overflow-hidden rounded-lg border border-slate-200">
            <table className="w-full text-xs">
              <thead className="bg-slate-100 text-slate-600">
                <tr>
                  <th className="px-2 py-1.5 text-left w-8">#</th>
                  <th className="px-2 py-1.5 text-left">항목</th>
                  <th className="px-2 py-1.5 text-left">검증</th>
                  <th className="px-2 py-1.5 text-right w-20">상태</th>
                </tr>
              </thead>
              <tbody>
                {data.rows.map((r) => {
                  const s = STATUS_STYLE[r.status];
                  return (
                    <tr key={r.id} className="border-t border-slate-200">
                      <td className="px-2 py-1.5 font-mono text-slate-500">{r.id}</td>
                      <td className="px-2 py-1.5 font-bold text-slate-800">{r.label}</td>
                      <td className="px-2 py-1.5 text-slate-500 font-mono text-[11px]">{r.detect}</td>
                      <td className="px-2 py-1.5 text-right">
                        <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${s.badge}`}>{s.label}</span>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div className="flex flex-wrap gap-2">
            {data.badges.map((b) => (
              <span key={b} className="text-[11px] font-bold px-2 py-1 rounded-full bg-blue-50 text-blue-700 border border-blue-200">
                ✓ {b}
              </span>
            ))}
          </div>
        </div>
      );
    }

    function NetworkScenario({ data }) {
      return (
        <div className="space-y-3">
          {/* 흐름도 */}
          <div className="rounded-lg border-2 border-slate-200 bg-slate-50 p-3">
            <div className="flex items-center justify-between gap-1">
              {/* Attacker */}
              <div className="flex flex-col items-center min-w-[72px]">
                <div className="rounded-lg bg-red-100 border-2 border-red-400 px-2 py-2 text-center w-full animate-pulse">
                  <div className="text-lg">{data.attacker.label.split(' ')[0]}</div>
                  <div className="text-[10px] font-bold text-red-700">{data.attacker.label.split(' ')[1]}</div>
                  <div className="text-[9px] font-mono text-red-600">{data.attacker.ip}</div>
                </div>
              </div>
              <span className="text-red-500 font-bold">→</span>
              {/* SG */}
              <div className="flex flex-col items-center min-w-[72px]">
                <div className="rounded-lg bg-blue-100 border-2 border-blue-500 px-2 py-2 text-center w-full">
                  <div className="text-lg">🚧</div>
                  <div className="text-[10px] font-bold text-blue-800">{data.layers[0].label}</div>
                  <div className="text-[9px] text-blue-600">{data.layers[0].sub}</div>
                </div>
                <div className="text-[10px] font-bold text-red-600 mt-1">SSH 22 BLOCK</div>
              </div>
              <span className="text-blue-500 font-bold">→</span>
              {/* WAF */}
              <div className="flex flex-col items-center min-w-[72px]">
                <div className="rounded-lg bg-blue-100 border-2 border-blue-500 px-2 py-2 text-center w-full">
                  <div className="text-lg">🛡️</div>
                  <div className="text-[10px] font-bold text-blue-800">{data.layers[1].label}</div>
                  <div className="text-[9px] text-blue-600">{data.layers[1].sub}</div>
                </div>
                <div className="text-[10px] font-bold text-red-600 mt-1">SQLi BLOCK</div>
              </div>
              <span className="text-blue-500 font-bold">→</span>
              {/* App */}
              <div className="flex flex-col items-center min-w-[72px]">
                <div className="rounded-lg bg-emerald-100 border-2 border-emerald-400 px-2 py-2 text-center w-full">
                  <div className="text-lg">🏛️</div>
                  <div className="text-[10px] font-bold text-emerald-800">{data.layers[2].label}</div>
                  <div className="text-[9px] text-emerald-600">{data.layers[2].sub}</div>
                </div>
                <div className="text-[10px] font-bold text-emerald-700 mt-1">SAFE</div>
              </div>
            </div>
          </div>

          {/* 차단 로그 */}
          <div className="rounded-lg border border-slate-200 overflow-hidden">
            <div className="bg-slate-100 text-[11px] font-bold text-slate-600 px-3 py-1.5">차단 로그</div>
            {data.attempts.map((a, i) => (
              <div key={i} className="flex items-center justify-between px-3 py-2 text-xs border-t border-slate-100">
                <div className="flex items-center gap-2">
                  <span className="font-bold text-red-600">[BLOCKED]</span>
                  <span className="font-mono text-slate-700">{a.kind} → {a.target}</span>
                </div>
                <span className="text-[10px] text-slate-500 font-mono">{a.detail}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function DataTable({ data }) {
      return (
        <div className="space-y-3">
          <div className="overflow-hidden rounded-lg border border-slate-200">
            <table className="w-full text-xs">
              <thead className="bg-slate-100 text-slate-600">
                <tr>
                  <th className="px-2 py-1.5 text-left w-8">#</th>
                  <th className="px-2 py-1.5 text-left">암호화 항목</th>
                  <th className="px-2 py-1.5 text-left">검증</th>
                  <th className="px-2 py-1.5 text-right w-20">상태</th>
                </tr>
              </thead>
              <tbody>
                {data.rows.map((r) => {
                  const s = STATUS_STYLE[r.status];
                  return (
                    <tr key={r.id} className="border-t border-slate-200">
                      <td className="px-2 py-1.5 font-mono text-slate-500">{r.id}</td>
                      <td className="px-2 py-1.5 font-bold text-slate-800">{r.label}</td>
                      <td className="px-2 py-1.5 text-slate-500 font-mono text-[11px]">{r.detect}</td>
                      <td className="px-2 py-1.5 text-right">
                        <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${s.badge}`}>{s.label}</span>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* KMS 키 회전 카운터 */}
          <div className="rounded-lg border-2 border-blue-300 bg-blue-50 p-3">
            <div className="flex items-center justify-between mb-2">
              <span className="text-xs font-bold text-blue-800">🔑 KMS CMK 자동 회전 (1년 주기)</span>
              <span className="text-[10px] font-mono text-blue-600">last: {data.rotation.lastRotated}</span>
            </div>
            <div className="grid grid-cols-2 gap-2 mb-2">
              <div className="bg-white rounded p-2 text-center border border-blue-200">
                <div className="text-2xl font-extrabold text-blue-700 tabular-nums">{data.rotation.daysSince}</div>
                <div className="text-[10px] text-blue-600">days since rotation</div>
              </div>
              <div className="bg-white rounded p-2 text-center border border-blue-200">
                <div className="text-2xl font-extrabold text-blue-700 tabular-nums">{data.rotation.daysUntil}</div>
                <div className="text-[10px] text-blue-600">days until next</div>
              </div>
            </div>
            <div className="relative h-2 bg-blue-100 rounded-full overflow-hidden">
              <div
                className="h-full bg-blue-500 transition-all duration-700"
                style={{ width: `${(data.rotation.daysSince / 365) * 100}%` }}
              />
            </div>
          </div>
        </div>
      );
    }

    function AuditPanel({ data }) {
      return (
        <div className="space-y-3">
          <div className="overflow-hidden rounded-lg border border-slate-200">
            <table className="w-full text-xs">
              <thead className="bg-slate-100 text-slate-600">
                <tr>
                  <th className="px-2 py-1.5 text-left w-8">#</th>
                  <th className="px-2 py-1.5 text-left">감사 항목</th>
                  <th className="px-2 py-1.5 text-left">검증</th>
                  <th className="px-2 py-1.5 text-right w-20">상태</th>
                </tr>
              </thead>
              <tbody>
                {data.rows.map((r) => {
                  const s = STATUS_STYLE[r.status];
                  return (
                    <tr key={r.id} className="border-t border-slate-200">
                      <td className="px-2 py-1.5 font-mono text-slate-500">{r.id}</td>
                      <td className="px-2 py-1.5 font-bold text-slate-800">{r.label}</td>
                      <td className="px-2 py-1.5 text-slate-500 font-mono text-[11px]">{r.detect}</td>
                      <td className="px-2 py-1.5 text-right">
                        <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${s.badge}`}>{s.label}</span>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* GuardDuty findings 라이브 알람 */}
          <div className="rounded-lg border-2 border-red-400 bg-red-50 p-3 animate-pulse">
            <div className="flex items-center justify-between mb-2">
              <span className="text-xs font-bold text-red-800 flex items-center gap-1">
                <span className="text-base">🚨</span> GuardDuty Findings — live
              </span>
              <span className="text-[10px] font-mono text-red-600">→ #sec-alerts</span>
            </div>
            <div className="space-y-1.5">
              {data.findings.map((f, i) => (
                <div key={i} className="flex items-center justify-between bg-white rounded px-2 py-1.5 border border-red-200">
                  <div className="flex items-center gap-2">
                    <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded border ${SEV_STYLE[f.sev]}`}>{f.sev}</span>
                    <span className="text-[11px] font-mono text-slate-700">{f.title}</span>
                  </div>
                  <span className="text-[10px] text-slate-400 font-mono">{f.time}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🛡️ 침입자 차단 12 항목</h2>
            <span className="text-[10px] text-slate-400 font-mono">Identity · Network · Data · Audit</span>
          </div>

          <SecurityCards focus={step.focus} />

          {step.focus === 'identity' && <IdentityTable data={step.identity} />}
          {step.focus === 'network'  && <NetworkScenario data={step.network} />}
          {step.focus === 'data'     && <DataTable data={step.data} />}
          {step.focus === 'audit'    && <AuditPanel data={step.audit} />}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-blue-500/10 border-l-2 border-blue-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };
      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-700 hover:text-blue-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. Cloud Infra &gt; Chapter 1. 보안 거버넌스</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">보안 체크리스트</h1>
                  <p className="text-sm text-slate-500 mt-0.5">침입자 차단 12 항목 — Identity / Network / Data / Audit</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 text-sm text-blue-900">
                💡 다음(V-2-1)에서는 운영 자동화 — Runbook / Playbook
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-blue-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-blue-600 text-white hover:bg-blue-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./V-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; V-1-1</a>
              <a href="../part6/V-2-1.html" className="text-blue-700 hover:text-blue-900 font-medium">V-2-1 운영 자동화 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
