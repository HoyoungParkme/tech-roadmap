<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Infra 학습 — AWS Well-Architected Framework</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🏛️</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    V-1-1. AWS Well-Architected Framework
    학습 목표: WAF 5축 (Operational Excellence / Security / Reliability / Performance / Cost) 점검
    핵심 비유: "5축 점검" — 5개 기둥을 손가락으로 짚어가며 균형 확인
    구조: 4단계 (Ops+Security / Reliability / Performance / Cost) — 5축이지만 4 STEPS로 묶기
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Ops + Security — "운영 자동화 + 최소 권한 통합 점검"',
        desc: 'Operational Excellence와 Security를 한 묶음으로. IaC + monitoring + IAM + KMS 4축이 모든 클라우드 운영의 출발점. 사람 손 없이 굴러가고, 권한은 최소로.',
        block: {
          kind: 'shell',
          code: `# Ops + Security 점검표 (WAF Pillar 1+2)
# ───────────────────────────────────────────────
# Operational Excellence — 운영 자동화
# [ ] 모든 인프라 IaC (Terraform / CDK / CloudFormation) 로 관리
# [ ] 수동 콘솔 변경 금지 (drift detection 주기 실행)
# [ ] CloudWatch / CloudTrail / X-Ray 3종 활성화
# [ ] runbook 문서화 + on-call 체계 24/7
# [ ] 배포 파이프라인 자동화 (CodePipeline / GitHub Actions)
#
# Security — 최소 권한 + 암호화
# [ ] root 계정 잠금 + MFA 강제 적용
# [ ] IAM Role 기반 접근 (long-lived access key 금지)
# [ ] least privilege: Action: "*" 금지, Resource 한정
# [ ] S3 / RDS / EBS 모두 KMS 암호화 활성화
# [ ] Secrets Manager / Parameter Store (코드 하드코딩 금지)
# [ ] VPC private subnet + Security Group 0.0.0.0/0 금지
# [ ] GuardDuty / Security Hub 알람 슬랙 연동

# 합격선
# - 12 항목 중 10 개 이상 ✅
# - 분기 1회 IAM Access Analyzer audit`,
        },
        focus: 'ops_security',
      },
      {
        title: 'Step 2. Reliability — "장애가 나도 자동 복구되는가"',
        desc: 'Multi-AZ 다중 가용영역 + health check + auto-recovery 3축. RTO/RPO 정의가 출발점. 장애는 막는 게 아니라 빠르게 회복하는 것.',
        block: {
          kind: 'shell',
          code: `# Reliability 점검표 (WAF Pillar 3)
# ───────────────────────────────────────────────
# Multi-AZ
# [ ] 모든 prod 서비스 최소 2개 AZ 분산 배치
# [ ] RDS / ElastiCache Multi-AZ 옵션 활성화
# [ ] ELB / ALB 가 여러 AZ target 모두 등록
# [ ] AZ 1개 다운 fail-over 모의 훈련 통과
#
# Health Check / Auto-Recovery
# [ ] /healthz / /readyz endpoint 분리 노출
# [ ] ALB target health check 30초 주기 + unhealthy 자동 제거
# [ ] EC2 status check 실패 시 auto-recovery 활성화
# [ ] ASG 가 unhealthy instance 자동 교체
#
# RTO / RPO + Backup
# [ ] tier-1 RTO 1h / RPO 5min 등 서비스별 정의
# [ ] RDS / DynamoDB 자동 백업 + 보존기간 명시
# [ ] backup 의 실제 restore 테스트 분기 1회
# [ ] DR drill (warm-standby / multi-region) 분기 실시

# 합격선
# - 12 항목 중 10 개 이상 ✅
# - DR drill 은 분기마다 실측`,
        },
        focus: 'reliability',
      },
      {
        title: 'Step 3. Performance — "트래픽 따라 자동 확장 + 빠른 응답"',
        desc: 'Instance 타입 적절 선택 + caching 계층 + CDN 3축. p99 latency 와 QPS 가 SLO 안에 있어야. "느린 서비스는 없는 서비스"',
        block: {
          kind: 'shell',
          code: `# Performance 점검표 (WAF Pillar 4)
# ───────────────────────────────────────────────
# Instance / Compute 타입 선택
# [ ] CPU intensive → C 패밀리 / Memory → R / GPU → P, G
# [ ] Graviton (ARM) 검토 (20~40% 가성비 개선)
# [ ] EC2 vs Fargate vs Lambda 워크로드별 선택 근거
# [ ] right-sizing: CloudWatch metric 기반 분기 점검
#
# Caching
# [ ] API 응답 ElastiCache (Redis / Memcached) 캐싱
# [ ] cache hit ratio 모니터링 + TTL 정책 명시
# [ ] cache stampede 방지 (jitter / SWR 패턴)
# [ ] DB level: RDS Proxy / pgBouncer connection pool
#
# CDN / Edge
# [ ] 정적 자산 (이미지/JS/CSS) CloudFront 등 CDN
# [ ] CloudFront origin shield 활성화 (origin 부하 감소)
# [ ] Lambda@Edge / CloudFront Function 으로 edge logic
# [ ] 부하 테스트 (load test) 분기 1회 p99 측정

# 합격선
# - 12 항목 중 10 개 이상 ✅
# - load test 는 분기마다 실측`,
        },
        focus: 'performance',
      },
      {
        title: 'Step 4. Cost — "쓴 만큼만 내고 절약 수단 적극 활용"',
        desc: 'Reserved + Spot + tagging 100% + cleanup 4축. FinOps 문화로 매월 비용 회고. "안 쓰는 자원은 즉시 정리"',
        block: {
          kind: 'shell',
          code: `# Cost 점검표 (WAF Pillar 5)
# ───────────────────────────────────────────────
# Reserved / Savings Plan
# [ ] 1년 이상 안정 워크로드 RI 70% 이상
# [ ] Compute Savings Plan 통합 할인 적용
# [ ] RI utilization 90% 이상 유지
# [ ] RI/SP 만료 30일 전 알람 자동화
#
# Spot / Preemptible
# [ ] stateless / 배치 워크로드 Spot 적극 활용 (50~90% 절감)
# [ ] Spot interruption handler 구현 (graceful shutdown)
# [ ] 다중 instance type / AZ 로 spot 가용성 확보
# [ ] EKS / ECS Spot 노드 그룹 분리
#
# Tagging — 가시성 확보
# [ ] 모든 자원 태깅 100% (Owner / Env / Project / CostCenter)
# [ ] Cost Explorer / CUR 팀별 비용 대시보드
# [ ] Budget Alert 80% / 100% 설정
# [ ] 매월 FinOps 회고 — top spender 3개 분석
#
# Cleanup — 미사용 자원 정리
# [ ] 미연결 EIP / 미사용 EBS 볼륨 매주 자동 정리
# [ ] 60일 미접근 S3 객체 → IA / Glacier 자동 전환
# [ ] dev/staging 야간/주말 자동 종료 스케줄
# [ ] orphan snapshot / AMI 분기 1회 정리

# 합격선
# - 16 항목 중 13 개 이상 ✅
# - FinOps 회고는 매월 정기`,
        },
        focus: 'cost',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const WAF_PILLARS = [
      { key: 'ops_security', emoji: '🛠️', name: 'Ops + Security', note: 'IaC+IAM+KMS' },
      { key: 'reliability',  emoji: '🛡️', name: 'Reliability',    note: 'Multi-AZ+DR' },
      { key: 'performance',  emoji: '⚡', name: 'Performance',    note: 'Scale+Cache+CDN' },
      { key: 'cost',         emoji: '💰', name: 'Cost',           note: 'RI+Spot+Tag' },
    ];

    function WAFCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🏛️ Well-Architected 5축 점검</div>
          <div className="grid grid-cols-4 gap-2">
            {WAF_PILLARS.map((c) => {
              const isActive = focus === c.key;
              return (
                <div
                  key={c.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-blue-100 border-2 border-blue-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{c.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{c.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{c.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">AWS Well-Architected Framework</h1>
                <p className="text-sm text-slate-500 mt-1">5축 점검 — Ops+Security / Reliability / Performance / Cost</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <WAFCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'cost' && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 mb-6 text-xs text-blue-900">
                💡 다음(V-1-2)에서는 보안 체크리스트 — 침입자 차단 12 항목
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
