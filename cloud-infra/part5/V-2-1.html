</head>
<body>
  <div id="root"></div>

  <!--
    V-2-1. 운영 자동화 — Runbook → Playbook → SSM → Chaos
    학습 목표: 사람이 읽는 매뉴얼에서 시작해 코드 자동화 → AWS 자동 복구 → 의도적 장애 주입까지 자동화 진화 4단계를 이해한다.
    핵심 비유: "비상 매뉴얼의 진화" — 종이 매뉴얼 → 자동 스크립트 → 무인 복구 → 의도적 깨뜨리기
    패턴: mlops IV-1-1 패턴 — 좌(LiveDataPane: 자동화 진화 시각화) / 우(VSCode CodeViewer + highlight.js)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 자동화 4단계 메타 (좌측 진화 카드용)
    // ─────────────────────────────────────────────────────
    const AUTOMATION_STAGES = [
      { key: 'runbook',        emoji: '📖', name: 'Runbook',        sub: '사람이 읽는 절차서' },
      { key: 'playbook',       emoji: '🤖', name: 'Playbook',       sub: 'Ansible 자동 스크립트' },
      { key: 'ssm_automation', emoji: '🛠️', name: 'SSM Automation', sub: 'AWS 무인 자동 복구' },
      { key: 'chaos',          emoji: '💥', name: 'Chaos',          sub: '의도적 장애 주입' },
    ];

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (자동화 진화 + 우측 코드)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Runbook — "사람이 읽는 비상 매뉴얼"',
        desc: '5xx 급증 같은 incident 발생 시 새벽에 깨어난 oncall이 5분 안에 첫 조치를 할 수 있어야 한다. Markdown 절차서 — 증상/영향/즉시 조치/진단/에스컬레이션 5단계로 구조화. 모든 alert에는 runbook URL을 annotation으로 링크. 분기마다 리뷰 필수.',
        focus: 'runbook',
        viewMode: 'markdown',
        markdown: {
          title: 'wiki/runbook/HighErrorRate.md',
          frontmatter: [
            { k: 'title',         v: 'HighErrorRate (5xx > 5%)' },
            { k: 'severity',      v: 'critical' },
            { k: 'owner',         v: 'ops-team' },
            { k: 'last_reviewed', v: '2026-04-15' },
          ],
          sections: [
            { num: '1', name: '증상 (Symptom)',         items: ['5xx 에러율 5% 초과 5분 지속', 'Grafana: /d/api-errors'], tone: 'info' },
            { num: '2', name: '영향 (Impact)',          items: ['결제 실패 / 주문 누락', '매출 시간당 ~500만원'],         tone: 'warn' },
            { num: '3', name: '즉시 조치 (5분 내) ⚠️', items: ['Slack #incident /ack', '최근 30분 배포 → rollback', 'No deploy → Step 4'], tone: 'crit' },
            { num: '4', name: '진단 (10~30분)',         items: ['CloudWatch Logs ERROR', 'X-Ray slow endpoint', 'RDS conn pool 포화?'], tone: 'info' },
            { num: '5', name: '에스컬레이션 (30분+)',   items: ['@backend-lead 호출', 'PM 통보', '1시간 → IC 지명'],          tone: 'warn' },
          ],
        },
        code: {
          lang: 'shell',
          filename: 'alert-with-runbook.yaml',
          lines: [
            '# Alertmanager — runbook URL을 annotation으로 link',
            '- alert: HighErrorRate',
            '  expr: rate(http_requests_total{code=~"5.."}[5m])',
            '         / rate(http_requests_total[5m]) > 0.05',
            '  for: 5m',
            '  labels:',
            '    severity: critical',
            '    team: ops',
            '  annotations:',
            '    summary: "5xx 에러율 > 5% (5분 지속)"',
            '    runbook: "https://wiki/runbook/HighErrorRate"',
            '    dashboard: "https://grafana/d/api-errors"',
            '',
            '# 절대 규칙',
            '#  - alert PR에 runbook URL 없으면 reject',
            '#  - 분기마다 runbook 리뷰 (오래된 명령 방지)',
            '#  - oncall 신입은 runbook drill로 입사 첫 주 훈련',
          ],
          highlight: [10, 11, 14, 15, 16],
        },
      },
      {
        title: 'Step 2. Playbook — "Ansible로 코드화한 복구 절차"',
        desc: 'Runbook의 수동 단계를 코드로 옮긴 것이 Playbook. Ansible / SaltStack 등 IaC 도구로 멱등성(idempotent) 있게 작성. 사람이 명령어 외울 필요 없이 ansible-playbook 한 줄. 단, 아직 사람이 트리거 — 다음 단계는 완전 자동화.',
        focus: 'playbook',
        viewMode: 'pipeline',
        pipeline: {
          title: 'ansible-playbook restart-api.yml',
          subtitle: 'serial 30% rolling · idempotent · zero-downtime',
          stages: [
            { name: 'drain',    emoji: '🚪', desc: 'ALB target group에서 제외',    status: 'done' },
            { name: 'restart',  emoji: '🔄', desc: 'docker pull + recreate',         status: 'done' },
            { name: 'verify',   emoji: '🩺', desc: '/healthz 200 (10회 retry · 3s)', status: 'done' },
            { name: 'rejoin',   emoji: '✅', desc: 'ALB target group 재등록',       status: 'done' },
          ],
          metric: { label: '사람 개입', before: '명령어 8개 외움', after: 'ansible-playbook 1줄' },
        },
        code: {
          lang: 'yaml',
          filename: 'ansible/playbooks/restart-api.yml',
          lines: [
            '# 사용: $ ansible-playbook restart-api.yml -e "env=prod"',
            '---',
            '- name: Restart API after high error rate',
            '  hosts: "tag_Service_api:&tag_Env_{{ env }}"',
            '  serial: "30%"           # 한 번에 30%씩 (rolling)',
            '  max_fail_percentage: 10 # 10% 실패 시 중단',
            '  become: true',
            '',
            '  pre_tasks:',
            '    - name: drain instance from ALB',
            '      community.aws.elb_target_group:',
            '        target_group_arn: "{{ tg_arn }}"',
            '        targets: [{ Id: "{{ ansible_ec2_instance_id }}" }]',
            '        state: absent',
            '      delegate_to: localhost',
            '',
            '  tasks:',
            '    - name: restart api container',
            '      community.docker.docker_container:',
            '        name: api',
            '        image: "{{ image_repo }}:{{ image_tag }}"',
            '        state: started',
            '        recreate: yes',
            '',
            '    - name: health check',
            '      ansible.builtin.uri:',
            '        url: "http://localhost:8080/healthz"',
            '        status_code: 200',
            '      retries: 10',
            '      delay: 3',
            '',
            '  post_tasks:',
            '    - name: re-register to ALB',
            '      community.aws.elb_target_group:',
            '        targets: [{ Id: "{{ ansible_ec2_instance_id }}" }]',
            '        state: present',
            '      delegate_to: localhost',
            '',
            '# 핵심: drain → restart → health → rejoin = zero-downtime',
            '# 멱등(idempotent) — 여러 번 실행해도 결과 같음',
          ],
          highlight: [5, 6, 11, 27, 28, 29, 30, 36],
        },
      },
      {
        title: 'Step 3. SSM Automation — "AWS가 알아서 복구한다"',
        desc: 'AWS Systems Manager Automation document를 EventBridge 알람과 연결해 사람 없이 자동 트리거. CPU 95% 5분 → 자동 재시작, EBS 90% → 자동 확장. CloudWatch Alarm → EventBridge → SSM Run Document 체인. 사람은 결과만 Slack으로 받는다.',
        focus: 'ssm_automation',
        viewMode: 'flow',
        flow: {
          title: '자동 복구 flow — 사람 개입 없음',
          nodes: [
            { emoji: '📊', name: 'CloudWatch Alarm',  detail: 'CPU > 95% (5min)',     tone: 'warn' },
            { emoji: '🚦', name: 'EventBridge Rule',  detail: 'detail-type 매칭',     tone: 'info' },
            { emoji: '🛠️', name: 'SSM Document',     detail: 'Restart-Unhealthy',    tone: 'crit' },
            { emoji: '💬', name: 'Slack 통보',         detail: '"Auto-restarted i-xx"', tone: 'good' },
          ],
          stats: [
            { k: '평균 복구 시간', before: '15분 (oncall 호출)', after: '90초 (무인)' },
            { k: '새벽 호출',     before: '주 2회',            after: '0회' },
          ],
        },
        code: {
          lang: 'yaml',
          filename: 'ssm-automation-restart-unhealthy.yaml',
          lines: [
            '# CloudWatch Alarm → EventBridge → SSM Document 자동 실행',
            'schemaVersion: "0.3"',
            'description: "Restart unhealthy EC2 when CPU > 95% for 5min"',
            'assumeRole: "arn:aws:iam::123:role/SSMAutomationRole"',
            '',
            'parameters:',
            '  InstanceId: { type: String }',
            '',
            'mainSteps:',
            '  - name: tagBeforeRestart',
            '    action: "aws:createTags"',
            '    inputs:',
            '      ResourceType: EC2',
            '      ResourceIds: ["{{ InstanceId }}"]',
            '      Tags:',
            '        - { Key: AutoRestart, Value: "{{ global:DATE_TIME }}" }',
            '',
            '  - name: stopInstance',
            '    action: "aws:changeInstanceState"',
            '    inputs:',
            '      InstanceIds: ["{{ InstanceId }}"]',
            '      DesiredState: stopped',
            '',
            '  - name: startInstance',
            '    action: "aws:changeInstanceState"',
            '    inputs:',
            '      InstanceIds: ["{{ InstanceId }}"]',
            '      DesiredState: running',
            '',
            '  - name: notifySlack',
            '    action: "aws:invokeLambdaFunction"',
            '    inputs:',
            '      FunctionName: "slack-incident-notifier"',
            '      Payload: |',
            '        { "text": "🔄 Auto-restarted {{ InstanceId }} (CPU>95%)" }',
            '',
            '# EventBridge Rule (Terraform 발췌)',
            '#   event_pattern = { source: ["aws.cloudwatch"],',
            '#     detail: { state: { value: ["ALARM"] } } }',
            '#   target arn = ssm automation-definition/Restart-Unhealthy',
            '',
            '# 운영 규칙',
            '#  - 자동 복구는 1회만 (loop 방지)',
            '#  - 2회 연속 발생 시 PagerDuty (사람 호출)',
            '#  - 모든 자동 작업은 CloudTrail audit',
          ],
          highlight: [9, 18, 24, 30, 31, 41, 42, 43],
        },
      },
      {
        title: 'Step 4. Chaos Engineering — "의도적으로 장애를 일으켜 본다"',
        desc: '실제 장애 전에 평소 업무 시간에 일부러 깨뜨려 본다. AWS FIS / Gremlin / Chaos Monkey로 EC2 종료, 네트워크 지연, DB 페일오버 등 주입. 분기 1회 game day로 팀 전체 대응 훈련. Runbook/Playbook이 실제로 동작하는지 검증.',
        focus: 'chaos',
        viewMode: 'experiment',
        experiment: {
          title: 'AWS FIS — AZ 장애 시뮬레이션',
          subtitle: 'staging · ap-northeast-2a · 50% terminate',
          timeline: [
            { t: 'T 0',     event: '실험 시작', detail: 'EC2 50% terminate', tone: 'crit' },
            { t: 'T+15s',   event: 'ALB 감지', detail: '5xx 일시 spike',     tone: 'warn' },
            { t: 'T+45s',   event: 'AutoScaling', detail: '신규 instance 기동', tone: 'info' },
            { t: 'T+90s',   event: 'SSM 자동복구', detail: 'Step 3 자동화 작동', tone: 'info' },
            { t: 'T+3m',    event: 'p99 회복',  detail: 'SLO 위반 0건',       tone: 'good' },
          ],
          gauges: [
            { name: 'MTTA',    value: '2m',  ok: true,  goal: '< 5m' },
            { name: 'MTTR',    value: '3m',  ok: true,  goal: '< 30m' },
            { name: 'SLO 위반', value: '0건', ok: true, goal: '0건' },
          ],
        },
        code: {
          lang: 'yaml',
          filename: 'fis-experiment-az-failure.yaml',
          lines: [
            '# AWS Fault Injection Simulator — AZ 장애 시뮬레이션',
            'description: "Simulate AZ failure in ap-northeast-2a"',
            'roleArn: "arn:aws:iam::123:role/FISRole"',
            '',
            'stopConditions:',
            '  - source: "aws:cloudwatch:alarm"',
            '    value: "arn:aws:cloudwatch:...:alarm/p99-latency-breach"',
            '  # SLO 깨지면 즉시 실험 중단 (안전장치)',
            '',
            'targets:',
            '  apiServers:',
            '    resourceType: "aws:ec2:instance"',
            '    resourceTags:',
            '      Service: "api"',
            '      Env: "staging"             # ⚠️ prod 직접 X',
            '    selectionMode: "PERCENT(50)"',
            '    filters:',
            '      - path: "Placement.AvailabilityZone"',
            '        values: ["ap-northeast-2a"]',
            '',
            'actions:',
            '  terminateApi:',
            '    actionId: "aws:ec2:terminate-instances"',
            '    targets: { Instances: "apiServers" }',
            '',
            '  injectNetworkLatency:',
            '    actionId: "aws:ssm:send-command"',
            '    parameters:',
            '      documentArn: "arn:aws:ssm:::document/AWSFIS-Run-Network-Latency"',
            '      duration: "PT5M"',
            '      latencyMilliseconds: "500"',
            '    targets: { Instances: "apiServers" }',
            '',
            '# Game Day 합격 기준',
            '#  - SLO 위반 0건 (또는 stopCondition 자동 중단)',
            '#  - MTTA < 5분, MTTR < 30분',
            '#  - 모든 oncall 멤버가 runbook으로 자력 대응',
            '',
            '# 안티패턴',
            '#  ✗ 시나리오 없이 prod에 즉흥 실험',
            '#  ✗ stopCondition 없는 실험 (무한 장애)',
            '#  ✗ 회고 없는 game day (학습 0)',
          ],
          highlight: [5, 6, 7, 8, 15, 22, 23, 34, 35, 36, 37],
        },
      },
    ];

    // 톤 → Tailwind 매핑 (정적 클래스 — purge 안전)
    const TONE_STYLE = {
      info: { card: 'bg-sky-50 border-sky-300',         text: 'text-sky-800',     bar: 'bg-sky-400'     },
      good: { card: 'bg-emerald-50 border-emerald-300', text: 'text-emerald-800', bar: 'bg-emerald-400' },
      warn: { card: 'bg-yellow-50 border-yellow-400',   text: 'text-yellow-800',  bar: 'bg-yellow-400'  },
      crit: { card: 'bg-red-50 border-red-400',         text: 'text-red-800',     bar: 'bg-red-500'     },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 자동화 진화 시각화 (focus별 다른 뷰)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm space-y-4">
          {/* 자동화 진화 4단계 카드 */}
          <div>
            <div className="flex items-center justify-between mb-3">
              <h2 className="text-sm font-bold text-slate-700">📖 자동화의 진화</h2>
              <span className="text-[10px] text-slate-400 font-mono">runbook → chaos</span>
            </div>
            <div className="grid grid-cols-4 gap-2">
              {AUTOMATION_STAGES.map((s, idx) => {
                const isActive = step.focus === s.key;
                const isPast = AUTOMATION_STAGES.findIndex(x => x.key === step.focus) > idx;
                return (
                  <div
                    key={s.key}
                    className={`rounded-lg p-2 text-center transition-all duration-500 ${
                      isActive
                        ? 'bg-blue-100 border-2 border-blue-500 scale-105 shadow'
                        : isPast
                          ? 'bg-blue-50 border border-blue-200 opacity-70'
                          : 'bg-slate-50 border border-slate-200 opacity-50'
                    }`}
                  >
                    <div className="text-xl">{s.emoji}</div>
                    <div className={`text-[11px] font-bold mt-0.5 ${isActive ? 'text-blue-800' : 'text-slate-700'}`}>
                      {s.name}
                    </div>
                    <div className="text-[9px] text-slate-500 mt-0.5 leading-tight">{s.sub}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* 단계별 본 뷰 */}
          {step.viewMode === 'markdown' && <MarkdownView md={step.markdown} />}
          {step.viewMode === 'pipeline' && <PipelineView pipe={step.pipeline} />}
          {step.viewMode === 'flow'     && <FlowView flow={step.flow} />}
          {step.viewMode === 'experiment' && <ExperimentView exp={step.experiment} />}
        </div>
      );
    }

    // Step 1: Markdown 매뉴얼 페이지 모방
    function MarkdownView({ md }) {
      return (
        <div className="rounded-lg border border-slate-200 overflow-hidden">
          <div className="bg-slate-100 px-3 py-1.5 text-[11px] font-mono text-slate-600 border-b border-slate-200 flex items-center gap-2">
            <span className="text-slate-500">📄</span>
            <span>{md.title}</span>
          </div>
          <div className="p-3 bg-white space-y-2">
            {/* frontmatter */}
            <div className="bg-slate-50 border border-slate-200 rounded p-2 text-[10px] font-mono text-slate-600 space-y-0.5">
              <div className="text-slate-400">---</div>
              {md.frontmatter.map((f) => (
                <div key={f.k}><span className="text-blue-700">{f.k}:</span> <span className="text-slate-700">{f.v}</span></div>
              ))}
              <div className="text-slate-400">---</div>
            </div>
            {/* sections */}
            <div className="space-y-1.5">
              {md.sections.map((sec) => {
                const tone = TONE_STYLE[sec.tone];
                return (
                  <div key={sec.num} className={`rounded border-l-4 ${tone.bar.replace('bg-', 'border-')} ${tone.card} px-2 py-1.5`}>
                    <div className={`text-[11px] font-bold ${tone.text}`}>
                      <span className="font-mono mr-1">## {sec.num}.</span>{sec.name}
                    </div>
                    <ul className="mt-0.5 ml-3 list-disc text-[10px] text-slate-600 space-y-0.5">
                      {sec.items.map((it, i) => (<li key={i}>{it}</li>))}
                    </ul>
                  </div>
                );
              })}
            </div>
            <div className="text-[10px] text-slate-500 italic pt-1 border-t border-slate-100">
              👤 사람이 직접 읽고 따라가는 절차서 (Markdown)
            </div>
          </div>
        </div>
      );
    }

    // Step 2: Ansible playbook pipeline (drain → restart → verify → rejoin)
    function PipelineView({ pipe }) {
      return (
        <div className="rounded-lg border-2 border-blue-200 bg-blue-50/50 p-3 space-y-3">
          <div>
            <div className="text-xs font-bold text-blue-900 font-mono">$ {pipe.title}</div>
            <div className="text-[10px] text-blue-700 mt-0.5">{pipe.subtitle}</div>
          </div>

          <div className="flex items-stretch gap-1">
            {pipe.stages.map((st, i) => (
              <React.Fragment key={st.name}>
                <div className="flex-1 bg-white rounded-lg border-2 border-blue-300 p-2 text-center shadow-sm">
                  <div className="text-xl">{st.emoji}</div>
                  <div className="text-[11px] font-bold text-blue-900 mt-1">{st.name}</div>
                  <div className="text-[9px] text-slate-600 mt-0.5 leading-tight">{st.desc}</div>
                  <div className="text-[9px] text-emerald-700 mt-1 font-bold">✓ done</div>
                </div>
                {i < pipe.stages.length - 1 && (
                  <div className="flex items-center text-blue-400 text-lg font-bold">→</div>
                )}
              </React.Fragment>
            ))}
          </div>

          <div className="bg-white rounded p-2 border border-blue-200">
            <div className="text-[10px] font-bold text-slate-600 mb-1">{pipe.metric.label}</div>
            <div className="grid grid-cols-2 gap-2 text-[11px]">
              <div className="bg-red-50 border border-red-200 rounded px-2 py-1">
                <div className="text-[9px] text-red-600 font-bold">BEFORE</div>
                <div className="text-red-800">{pipe.metric.before}</div>
              </div>
              <div className="bg-emerald-50 border border-emerald-200 rounded px-2 py-1">
                <div className="text-[9px] text-emerald-600 font-bold">AFTER</div>
                <div className="text-emerald-800">{pipe.metric.after}</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Step 3: SSM Automation flow (CW → EventBridge → SSM → Slack)
    function FlowView({ flow }) {
      return (
        <div className="rounded-lg border-2 border-blue-200 bg-blue-50/50 p-3 space-y-3">
          <div className="text-xs font-bold text-blue-900">⚡ {flow.title}</div>

          <div className="space-y-1.5">
            {flow.nodes.map((n, i) => {
              const tone = TONE_STYLE[n.tone];
              return (
                <React.Fragment key={n.name}>
                  <div className={`rounded-lg border-2 ${tone.card} px-3 py-2 flex items-center gap-3`}>
                    <span className="text-2xl">{n.emoji}</span>
                    <div className="flex-1">
                      <div className={`text-xs font-bold ${tone.text}`}>{n.name}</div>
                      <div className="text-[10px] text-slate-600 font-mono">{n.detail}</div>
                    </div>
                    <span className="text-[10px] font-mono text-slate-400">#{i + 1}</span>
                  </div>
                  {i < flow.nodes.length - 1 && (
                    <div className="text-center text-blue-500 text-lg leading-none">↓</div>
                  )}
                </React.Fragment>
              );
            })}
          </div>

          <div className="bg-white rounded p-2 border border-blue-200">
            <div className="text-[10px] font-bold text-slate-600 mb-1">자동화 효과</div>
            {flow.stats.map((s) => (
              <div key={s.k} className="flex items-center justify-between text-[11px] py-0.5">
                <span className="text-slate-600">{s.k}</span>
                <span className="font-mono">
                  <span className="text-red-600 line-through">{s.before}</span>
                  <span className="mx-1 text-slate-400">→</span>
                  <span className="text-emerald-700 font-bold">{s.after}</span>
                </span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // Step 4: AWS FIS chaos experiment (timeline + gauges)
    function ExperimentView({ exp }) {
      return (
        <div className="rounded-lg border-2 border-blue-200 bg-blue-50/50 p-3 space-y-3">
          <div>
            <div className="text-xs font-bold text-blue-900">💥 {exp.title}</div>
            <div className="text-[10px] text-blue-700 mt-0.5 font-mono">{exp.subtitle}</div>
          </div>

          {/* Timeline */}
          <div className="bg-white rounded border border-blue-200 p-2">
            <div className="text-[10px] font-bold text-slate-600 mb-1.5">실험 타임라인</div>
            <div className="space-y-1">
              {exp.timeline.map((t) => {
                const tone = TONE_STYLE[t.tone];
                return (
                  <div key={t.t} className={`flex items-center gap-2 rounded px-2 py-1 border ${tone.card}`}>
                    <span className="font-mono text-[10px] text-slate-500 w-12 flex-shrink-0">{t.t}</span>
                    <span className={`text-[11px] font-bold ${tone.text} w-24 flex-shrink-0`}>{t.event}</span>
                    <span className="text-[10px] text-slate-600 flex-1">{t.detail}</span>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Gauges (합격 기준) */}
          <div className="grid grid-cols-3 gap-2">
            {exp.gauges.map((g) => (
              <div key={g.name} className={`rounded border-2 p-2 text-center ${g.ok ? 'bg-emerald-50 border-emerald-400' : 'bg-red-50 border-red-400'}`}>
                <div className="text-[10px] font-bold text-slate-600">{g.name}</div>
                <div className={`text-lg font-extrabold ${g.ok ? 'text-emerald-700' : 'text-red-700'} tabular-nums`}>{g.value}</div>
                <div className="text-[9px] text-slate-500 font-mono">{g.goal}</div>
                <div className={`text-[10px] font-bold mt-0.5 ${g.ok ? 'text-emerald-600' : 'text-red-600'}`}>
                  {g.ok ? '✓ pass' : '✗ fail'}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        codeRef.current.removeAttribute('data-highlighted');
        codeRef.current.className = `language-${code.lang}`;
        codeRef.current.textContent = code.lines.join('\n');
        window.hljs.highlightElement(codeRef.current);
        setRenderedLines(codeRef.current.innerHTML.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-blue-500/15 border-l-2 border-blue-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-700 hover:text-blue-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. Cloud 운영 &gt; Chapter 2. 운영 자동화</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">운영 자동화 — Runbook → Playbook → SSM → Chaos</h1>
                  <p className="text-sm text-slate-500 mt-0.5">비상 매뉴얼의 진화 — 사람이 읽는 절차서에서 의도적 장애 주입까지</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 text-sm text-blue-900">
                💡 다음(V-2-2)에서는 <strong>실전 체크리스트</strong> — Cloud 출항 점검표
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-blue-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-blue-600 text-white hover:bg-blue-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./V-2-2.html" className="text-blue-700 hover:text-blue-900 font-medium">V-2-2 실전 체크리스트 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
