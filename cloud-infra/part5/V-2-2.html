<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Infra 학습 — 실전 체크리스트</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    V-2-2. Cloud Infra 실전 체크리스트
    학습 목표: AWS Well-Architected 기반 4축 (Reliability/Security/Performance/Cost) 점검표
    핵심 비유: "Cloud 출항 점검표" — 출항 전 4축을 손가락으로 짚으며 확인
    구조: 4단계 (Reliability / Security / Performance / Cost)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Reliability — "장애가 나도 서비스가 살아있는가"',
        desc: 'Multi-AZ 다중 가용영역 + 자동 백업 + DR (Disaster Recovery) 모의 훈련 3축. RTO/RPO 정의가 출발점. Part II/III 의 핵심 회수.',
        block: {
          kind: 'shell',
          code: `# Reliability 체크리스트 (Part II + III)
# ───────────────────────────────────────────────
# Multi-AZ
# [ ] 모든 prod 서비스가 최소 2개 AZ 분산 배치
# [ ] RDS / ElastiCache 모두 Multi-AZ 옵션 활성화
# [ ] ELB / ALB 가 여러 AZ 의 target 을 모두 등록
# [ ] AZ 1개 다운 시 자동 fail-over 시뮬레이션 통과

# RTO / RPO
# [ ] RTO (복구 목표 시간) 서비스별 정의 (예: tier-1 = 1h)
# [ ] RPO (데이터 손실 허용) 서비스별 정의 (예: tier-1 = 5min)
# [ ] 정의된 RTO/RPO 가 실제 모의 훈련에서 달성되는지 측정
# [ ] 미달성 항목은 risk register 등록

# Backup / Restore
# [ ] RDS / DynamoDB 자동 백업 활성화 + 보존기간 명시
# [ ] S3 cross-region replication 으로 재해 대비
# [ ] backup 의 실제 restore 테스트 분기 1회 (백업만 있고 못 살리는 케이스 방지)
# [ ] IaC (Terraform/CDK) 코드도 별도 저장소에 미러

# DR (Disaster Recovery)
# [ ] DR 시나리오 문서화 (warm-standby / pilot-light / multi-region)
# [ ] DR drill (모의 훈련) 분기 1회 실시
# [ ] 장애 대응 runbook + on-call 24/7 체계

# 합격선
# - 위 12 항목 중 9 개 이상 ✅
# - DR drill 은 분기마다 실측`,
        },
        focus: 'reliability',
      },
      {
        title: 'Step 2. Security — "최소 권한 + 모든 데이터 암호화"',
        desc: 'IAM least privilege + MFA + KMS 전 영역 암호화 + VPC private subnet 4축. 보안은 "보여주기" 가 아니라 매일 점검. Part III 의 핵심 회수.',
        block: {
          kind: 'shell',
          code: `# Security 체크리스트 (Part III)
# ───────────────────────────────────────────────
# IAM (최소 권한)
# [ ] root 계정은 사용 금지 (긴급용으로만, MFA 강제)
# [ ] 모든 사용자에게 MFA 강제 적용
# [ ] IAM Role 기반 접근 (long-lived access key 금지)
# [ ] least privilege: 필요한 액션만 허용 (Action: "*" 금지)

# 암호화 (KMS)
# [ ] S3 버킷 모두 SSE-KMS 또는 SSE-S3 활성화
# [ ] RDS / EBS 볼륨 암호화 활성화 (at-rest)
# [ ] 통신 구간 TLS 강제 (HTTP 차단, HTTPS 만 허용)
# [ ] KMS key rotation 자동 활성화 (annual)

# 네트워크 (VPC)
# [ ] DB / 내부 서비스는 private subnet 에 배치
# [ ] public subnet 에는 ALB / NAT 만 노출
# [ ] Security Group 은 0.0.0.0/0 inbound 금지 (필요 시 SSH/22 도 bastion 으로)
# [ ] VPC Flow Log 활성화 + 30일 보관

# 자주 빠뜨리는 항목
# [ ] Secret 은 Secrets Manager / Parameter Store 사용 (코드 하드코딩 금지)
# [ ] CloudTrail 모든 region 활성화 + log integrity validation
# [ ] GuardDuty / Security Hub 알람 슬랙 연동
# [ ] 매월 IAM policy 자동 audit (Access Analyzer)

# 합격선
# - 12 항목 중 10 개 이상 ✅
# - 보안 audit 은 분기마다 외부 점검 권장`,
        },
        focus: 'security',
      },
      {
        title: 'Step 3. Performance — "트래픽 따라 자동 확장 + 빠른 응답"',
        desc: 'Auto-scaling + ELB health check + CDN + RDS read replica 4축. p99 latency / QPS 가 SLO 안에 있어야 한다. Part II 의 핵심 회수.',
        block: {
          kind: 'shell',
          code: `# Performance 체크리스트 (Part II)
# ───────────────────────────────────────────────
# Auto-scaling
# [ ] EC2 / ECS / EKS 모두 Auto Scaling Group 또는 HPA 적용
# [ ] CPU / 메모리 / 커스텀 메트릭(QPS) 기반 정책 설정
# [ ] scale-in 보호 (in-flight 요청 처리 후 종료)
# [ ] scale-out 속도 충분 (트래픽 spike 대응 1~2분 내)

# Load Balancing / Health Check
# [ ] ELB / ALB / NLB 적절한 선택 (L4/L7)
# [ ] Health check 경로 /healthz / /readyz 구분
# [ ] unhealthy instance 자동 제거 + 대체
# [ ] connection draining 활성화

# CDN / Caching
# [ ] 정적 자산 (이미지/JS/CSS) CloudFront 등 CDN 캐싱
# [ ] API 응답 중 캐싱 가능한 것은 ElastiCache (Redis)
# [ ] cache hit ratio 모니터링 + TTL 정책 명시
# [ ] cache stampede 방지 (jitter / SWR)

# Database 성능
# [ ] RDS read replica 활용 (읽기 트래픽 분산)
# [ ] slow query log 활성화 + 주간 리뷰
# [ ] connection pool (RDS Proxy / pgBouncer) 도입
# [ ] DynamoDB on-demand vs provisioned 트래픽에 맞게

# 합격선
# - 12 항목 중 10 개 이상 ✅
# - 부하 테스트 (load test) 분기 1회 실측`,
        },
        focus: 'performance',
      },
      {
        title: 'Step 4. Cost — "쓴 만큼만 내고, 절약 수단을 적극 활용"',
        desc: 'Reserved Instance + Spot + 미사용 자원 정리 + 태깅 100% 4축. FinOps 문화로 매월 비용 회고. Part IV 의 핵심 회수. 17 번째 학습 자료 — Cloud Infra 20/20 마무리 🎉.',
        block: {
          kind: 'shell',
          code: `# Cost 체크리스트 (Part IV)
# ───────────────────────────────────────────────
# Reserved / Savings Plan
# [ ] 1년 이상 안정 워크로드는 Reserved Instance 70% 이상
# [ ] Compute Savings Plan 으로 EC2/Fargate/Lambda 통합 할인
# [ ] RI utilization 90% 이상 유지 (미달 시 재구매 검토)
# [ ] RI/SP 만료 전 30일 알람 자동화

# Spot / Preemptible
# [ ] stateless / 배치 워크로드는 Spot 적극 사용 (50~90% 절감)
# [ ] Spot interruption handler 구현 (graceful shutdown)
# [ ] 다중 instance type / AZ 로 spot 가용성 확보
# [ ] EKS / ECS 의 Spot 노드 그룹 분리

# 미사용 자원 정리 (Cost Cleanup)
# [ ] 미연결 EIP / 미사용 EBS 볼륨 매주 자동 정리
# [ ] 60일 미접근 S3 객체 → IA / Glacier 자동 전환
# [ ] dev/staging 자원 야간/주말 자동 종료 스케줄
# [ ] orphan snapshot / AMI 분기 1회 정리

# 태깅 / 가시성
# [ ] 모든 자원에 태깅 100% (Owner / Env / Project / CostCenter)
# [ ] Cost Explorer / CUR 로 팀별 비용 대시보드
# [ ] 예산 알람 (Budget Alert) 80% / 100% 설정
# [ ] 매월 FinOps 회고 — top spender 3개 분석

# 합격선
# - 12 항목 중 10 개 이상 ✅
# - FinOps 회고는 매월 정기

# ───────────────────────────────────────────────
# Cloud Infrastructure 20 / 20 — 17 번째 학습 자료 완성 🎉
# Part I (4) + Part II (4) + Part III (4) + Part IV (4) + Part V (4) = 20
# 개론·IaC / Compute·Storage·Network / Managed·보안 / 모니터링·비용 / 운영
# graphrag / k8s / mlops / observability / DE 에 이어 100% 완성 — 학습 자료 누적 6 개
# ───────────────────────────────────────────────`,
        },
        focus: 'cost',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const CHECKLIST = [
      { key: 'reliability',  emoji: '🛡️', name: 'Reliability',  note: 'Multi-AZ+DR' },
      { key: 'security',     emoji: '🔐', name: 'Security',     note: 'IAM+KMS' },
      { key: 'performance',  emoji: '⚡', name: 'Performance',  note: 'Scale+Cache' },
      { key: 'cost',         emoji: '💰', name: 'Cost',         note: 'RI+Spot+FinOps' },
    ];

    function ChecklistCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🚀 Cloud 출항 점검표 (Cloud Infra 4축)</div>
          <div className="grid grid-cols-4 gap-2">
            {CHECKLIST.map((c) => {
              const isActive = focus === c.key;
              return (
                <div
                  key={c.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-blue-100 border-2 border-blue-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{c.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{c.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{c.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Cloud Infra 실전 체크리스트</h1>
                <p className="text-sm text-slate-500 mt-1">Cloud 출항 점검표 — Reliability / Security / Performance / Cost</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <ChecklistCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'cost' && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 mb-6 text-xs text-blue-900">
                💡 Cloud Infra 학습 완료. 6번째 100% 자료. 17/17 모든 자료 50%+ 진행
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
