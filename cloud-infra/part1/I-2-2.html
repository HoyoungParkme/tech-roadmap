<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Infra 학습 — I-2-2. Terraform 실전</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    I-2-2. Terraform 실전 (state / module / workspace / CI/CD)
    학습 목표: Terraform을 팀 단위로 안전하게 운영하는 4가지 축 — state · module · workspace · CI/CD
    핵심 비유: "🛠️ Terraform 운영 컨트롤 센터" — 인프라 사진/부품/환경/자동화 라인
    패턴: fastapi v1 패턴 — 좌(LiveDataPane Terraform 운영 시각화) / 우(VSCode CodeViewer · HCL)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (Terraform 운영 4축)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. State — "현재 인프라의 사진"',
        desc: 'terraform.tfstate가 모든 리소스의 현재 상태를 기록한다. 절대 손편집 금지(drift 발생). 팀 협업을 위해 S3 backend + DynamoDB lock을 둔다 — 동시 apply를 잠가서 충돌을 차단한다.',
        focus: 'state',
        stateView: {
          fileName: 'terraform.tfstate',
          backend: 'S3 (myorg-tfstate-prod)',
          lockTable: 'DynamoDB · tfstate-lock',
          lockHeld: true,
          lockHolder: 'alice@team',
          blockedUser: 'bob@team',
        },
        code: {
          lang: 'hcl',
          filename: 'backend.tf',
          lines: [
            '# backend.tf — S3 backend + DynamoDB lock (팀 표준)',
            'terraform {',
            '  backend "s3" {',
            '    bucket         = "myorg-tfstate-prod"',
            '    key            = "platform/network/terraform.tfstate"',
            '    region         = "ap-northeast-2"',
            '    encrypt        = true',
            '    dynamodb_table = "tfstate-lock"   # 동시 apply 차단',
            '    kms_key_id     = "alias/tfstate"  # 암호화 키',
            '  }',
            '}',
            '',
            '# 일상 운영',
            '$ terraform init -backend-config=backend.hcl',
            '$ terraform plan',
            '$ terraform apply           # 다른 사람이 apply 중이면 lock 대기',
            '',
            '# 절대 금지',
            '# - terraform.tfstate 를 git 에 커밋',
            '# - 콘솔에서 직접 리소스 삭제 (drift)',
            '# - state 파일 손편집',
            '',
            '# state 검사/조작은 전용 명령어만',
            '$ terraform state list',
            '$ terraform state show aws_vpc.main',
            '$ terraform state mv aws_instance.old aws_instance.new',
            '$ terraform import aws_s3_bucket.legacy my-existing-bucket',
          ],
          highlight: [3, 8, 9, 16],
        },
      },
      {
        title: 'Step 2. Module — "재사용 가능한 부품"',
        desc: 'VPC / DB / App 같은 반복 패턴을 module로 추상화한다. variables.tf 입력, outputs.tf 출력. 여러 환경/팀이 같은 부품을 호출만 하면 된다 — 표준화 + 보안 베이스라인을 한 곳에 강제.',
        focus: 'module',
        moduleView: [
          { name: 'modules/vpc', emoji: '🌐', inputs: ['cidr', 'azs'], outputs: ['vpc_id', 'subnet_ids'], color: 'sky' },
          { name: 'modules/db',  emoji: '🗄️', inputs: ['vpc_id', 'subnet_ids'], outputs: ['endpoint'], color: 'emerald' },
          { name: 'modules/app', emoji: '🚀', inputs: ['vpc_id', 'db_endpoint'], outputs: ['url'], color: 'amber' },
        ],
        code: {
          lang: 'hcl',
          filename: 'envs/prod/main.tf',
          lines: [
            '# modules/vpc/variables.tf — 입력 명세',
            'variable "name"       { type = string }',
            'variable "cidr"       { type = string }',
            'variable "azs"        { type = list(string) }',
            '',
            '# modules/vpc/main.tf — 본체',
            'resource "aws_vpc" "this" {',
            '  cidr_block           = var.cidr',
            '  enable_dns_hostnames = true',
            '  tags                 = { Name = var.name }',
            '}',
            '',
            '# modules/vpc/outputs.tf — 출력 명세',
            'output "vpc_id"     { value = aws_vpc.this.id }',
            'output "subnet_ids" { value = aws_subnet.private[*].id }',
            '',
            '# ---- 호출부 (envs/prod/main.tf) ----',
            'module "vpc" {',
            '  source = "../../modules/vpc"',
            '  name   = "prod-vpc"',
            '  cidr   = "10.10.0.0/16"',
            '  azs    = ["ap-northeast-2a", "ap-northeast-2c"]',
            '}',
            '',
            'module "db" {',
            '  source     = "../../modules/db"',
            '  vpc_id     = module.vpc.vpc_id        # 출력 → 입력',
            '  subnet_ids = module.vpc.subnet_ids',
            '}',
            '',
            'module "app" {',
            '  source       = "../../modules/app"',
            '  vpc_id       = module.vpc.vpc_id',
            '  db_endpoint  = module.db.endpoint',
            '}',
            '',
            '# 강점 - 표준이 한 곳 (보안/태깅/네이밍)',
            '# 강점 - 버전 핀 (source = "git::...?ref=v1.4.0")',
          ],
          highlight: [18, 25, 27, 32, 34],
        },
      },
      {
        title: 'Step 3. Workspace — "같은 코드, 다른 환경"',
        desc: 'terraform workspace로 dev / staging / prod를 분리한다. 같은 .tf 코드가 workspace별로 다른 state를 갖는다. 환경마다 instance_type · count · multi_az 같은 변수만 다르게.',
        focus: 'workspace',
        workspaceView: [
          { name: 'dev',     active: false, instance: 't3.small',  count: 1, multiAz: false, color: 'sky' },
          { name: 'staging', active: false, instance: 't3.medium', count: 2, multiAz: false, color: 'amber' },
          { name: 'prod',    active: true,  instance: 'm6i.large', count: 4, multiAz: true,  color: 'rose' },
        ],
        code: {
          lang: 'hcl',
          filename: 'workspace.tf',
          lines: [
            '# Workspace 만들기 — 환경마다 별도 state',
            '$ terraform workspace new dev',
            '$ terraform workspace new staging',
            '$ terraform workspace new prod',
            '',
            '$ terraform workspace list',
            '  default',
            '  dev',
            '  staging',
            '* prod',
            '',
            '# 현재 workspace 에 따라 분기',
            'locals {',
            '  env = terraform.workspace',
            '  cfg = {',
            '    dev     = { instance_type = "t3.small",  count = 1, multi_az = false }',
            '    staging = { instance_type = "t3.medium", count = 2, multi_az = false }',
            '    prod    = { instance_type = "m6i.large", count = 4, multi_az = true  }',
            '  }',
            '  c = local.cfg[local.env]',
            '}',
            '',
            'resource "aws_instance" "app" {',
            '  count         = local.c.count',
            '  instance_type = local.c.instance_type',
            '  tags          = { Env = local.env }',
            '}',
            '',
            '# 운영',
            '$ terraform workspace select dev',
            '$ terraform apply        # state: env:/dev/...',
            '',
            '$ terraform workspace select prod',
            '$ terraform apply        # state: env:/prod/...  (완전 분리)',
          ],
          highlight: [16, 17, 18, 30, 33],
        },
      },
      {
        title: 'Step 4. CI/CD — "PR에서 plan, merge에서 apply"',
        desc: 'GitHub Actions가 PR 올라올 때 terraform plan을 자동 실행해 코멘트로 붙인다. 리뷰어가 변경 영향을 확인하고 approve → merge → apply 자동 실행. 콘솔 클릭 0회, 모든 변경이 git 히스토리.',
        focus: 'cicd',
        cicdView: {
          stages: [
            { name: 'PR Open',     icon: '📝', state: 'done',    detail: 'modules/vpc/main.tf 수정' },
            { name: 'plan',        icon: '🔍', state: 'done',    detail: '+2 / ~1 / -0 · PR 코멘트' },
            { name: 'review',      icon: '👀', state: 'done',    detail: 'approve · OPA pass' },
            { name: 'merge',       icon: '🔀', state: 'done',    detail: 'main 브랜치 push' },
            { name: 'apply',       icon: '🚀', state: 'running', detail: '실 인프라 반영 중' },
          ],
        },
        code: {
          lang: 'yaml',
          filename: '.github/workflows/terraform.yml',
          lines: [
            '# GitHub Actions — Terraform PR plan / merge apply',
            'name: terraform',
            'on:',
            '  pull_request:',
            '    paths: ["envs/**", "modules/**"]',
            '  push:',
            '    branches: [main]',
            '',
            'jobs:',
            '  plan:',
            '    if: github.event_name == \'pull_request\'',
            '    runs-on: ubuntu-latest',
            '    steps:',
            '      - uses: actions/checkout@v4',
            '      - uses: hashicorp/setup-terraform@v3',
            '      - run: terraform init',
            '      - run: terraform plan -no-color -out=tfplan',
            '      - uses: actions/github-script@v7   # PR 코멘트',
            '        with:',
            '          script: |',
            '            github.rest.issues.createComment({',
            '              ...context.repo, issue_number: context.issue.number,',
            '              body: "```\\n" + planOutput + "\\n```"',
            '            })',
            '',
            '  apply:',
            '    if: github.event_name == \'push\' && github.ref == \'refs/heads/main\'',
            '    needs: plan',
            '    runs-on: ubuntu-latest',
            '    environment: prod              # GitHub 승인 게이트',
            '    steps:',
            '      - uses: actions/checkout@v4',
            '      - uses: hashicorp/setup-terraform@v3',
            '      - run: terraform init',
            '      - run: terraform apply -auto-approve',
            '',
            '# 흐름:  PR open → plan 자동 코멘트 → review approve',
            '#       → merge → apply (prod environment 승인)',
            '# 강점:  콘솔 0회 · git 히스토리 · OPA 정책 검사 자동',
          ],
          highlight: [10, 17, 26, 30, 35],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 4축 카드 메타
    // ─────────────────────────────────────────────────────
    const TERRAFORM_AXES = [
      { key: 'state',     emoji: '💾', name: 'State',     note: 'tfstate · lock' },
      { key: 'module',    emoji: '📦', name: 'Module',    note: '재사용 단위' },
      { key: 'workspace', emoji: '🔀', name: 'Workspace', note: 'env 분리' },
      { key: 'cicd',      emoji: '🔄', name: 'CI/CD',     note: 'GitHub Actions' },
    ];

    // 정적 색상 (Tailwind purge 안전)
    const MOD_COLOR = {
      sky:     { bg: 'bg-sky-50',     border: 'border-sky-300',     text: 'text-sky-700' },
      emerald: { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-700' },
      amber:   { bg: 'bg-amber-50',   border: 'border-amber-300',   text: 'text-amber-700' },
      rose:    { bg: 'bg-rose-50',    border: 'border-rose-300',    text: 'text-rose-700' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — Terraform 운영 시각화
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🛠️ Terraform 운영 컨트롤</h2>
            <span className="text-[10px] text-slate-400 font-mono">state · module · workspace · ci/cd</span>
          </div>

          {/* 4축 상단 인디케이터 */}
          <div className="grid grid-cols-4 gap-2 mb-5">
            {TERRAFORM_AXES.map((t) => {
              const isActive = step.focus === t.key;
              return (
                <div
                  key={t.key}
                  className={`rounded-lg p-2 text-center transition-all duration-300 ${
                    isActive
                      ? 'bg-blue-100 border-2 border-blue-500 scale-105 shadow-sm'
                      : 'bg-slate-50 border border-slate-200'
                  }`}
                >
                  <div className="text-xl">{t.emoji}</div>
                  <div className={`text-[11px] font-bold mt-0.5 ${isActive ? 'text-blue-800' : 'text-slate-700'}`}>{t.name}</div>
                  <div className="text-[9px] text-slate-500 mt-0.5">{t.note}</div>
                </div>
              );
            })}
          </div>

          {/* 단계별 상세 시각화 */}
          {step.focus === 'state' && <StateView v={step.stateView} />}
          {step.focus === 'module' && <ModuleView v={step.moduleView} />}
          {step.focus === 'workspace' && <WorkspaceView v={step.workspaceView} />}
          {step.focus === 'cicd' && <CicdView v={step.cicdView} />}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 1 — State 시각화
    // ─────────────────────────────────────────────────────
    function StateView({ v }) {
      return (
        <div className="space-y-3">
          {/* tfstate 파일 */}
          <div className="rounded-lg border-2 border-blue-300 bg-blue-50 p-3">
            <div className="flex items-center gap-2 mb-1">
              <span className="text-lg">📄</span>
              <span className="text-xs font-bold text-blue-900 font-mono">{v.fileName}</span>
              <span className="ml-auto text-[10px] bg-blue-200 text-blue-800 px-1.5 py-0.5 rounded font-mono">JSON</span>
            </div>
            <div className="text-[11px] text-blue-700 ml-6">현재 인프라 리소스 전체 스냅샷</div>
          </div>

          {/* S3 backend */}
          <div className="flex items-center gap-2">
            <div className="flex-1 rounded-lg border-2 border-emerald-300 bg-emerald-50 p-2.5">
              <div className="flex items-center gap-2">
                <span className="text-lg">🪣</span>
                <div>
                  <div className="text-xs font-bold text-emerald-900">S3 Backend</div>
                  <div className="text-[10px] text-emerald-700 font-mono">{v.backend}</div>
                </div>
              </div>
            </div>
          </div>

          {/* DynamoDB lock */}
          <div className="rounded-lg border-2 border-amber-400 bg-amber-50 p-3">
            <div className="flex items-center gap-2 mb-2">
              <span className="text-lg">🔒</span>
              <span className="text-xs font-bold text-amber-900">DynamoDB Lock</span>
              <span className="ml-auto text-[10px] font-mono text-amber-700">{v.lockTable}</span>
            </div>
            <div className="grid grid-cols-2 gap-2 text-[11px]">
              <div className="rounded bg-white border border-emerald-300 p-2">
                <div className="font-bold text-emerald-700 flex items-center gap-1">
                  <span>👤</span><span>{v.lockHolder}</span>
                </div>
                <div className="text-emerald-600 mt-0.5">✅ apply 진행 중 (lock 보유)</div>
              </div>
              <div className="rounded bg-white border border-red-300 p-2">
                <div className="font-bold text-red-700 flex items-center gap-1">
                  <span>👤</span><span>{v.blockedUser}</span>
                </div>
                <div className="text-red-600 mt-0.5">⏸ 대기 중 (concurrent 차단)</div>
              </div>
            </div>
          </div>

          <div className="text-[11px] text-slate-500 bg-slate-50 border border-slate-200 rounded p-2">
            💡 동시 apply 시 두 번째 사용자는 자동으로 대기 — drift 방지
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 2 — Module 트리 시각화
    // ─────────────────────────────────────────────────────
    function ModuleView({ v }) {
      return (
        <div className="space-y-3">
          <div className="text-[11px] text-slate-500 mb-1">📁 modules/ — 재사용 가능한 부품</div>
          {v.map((m, idx) => {
            const c = MOD_COLOR[m.color];
            return (
              <div key={m.name} className={`rounded-lg border-2 p-3 ${c.bg} ${c.border}`}>
                <div className="flex items-center gap-2 mb-2">
                  <span className="text-xl">{m.emoji}</span>
                  <span className={`text-sm font-bold font-mono ${c.text}`}>{m.name}</span>
                  <span className="ml-auto text-[10px] bg-white px-1.5 py-0.5 rounded font-mono text-slate-600 border border-slate-200">
                    v1.{idx + 2}.0
                  </span>
                </div>
                <div className="grid grid-cols-2 gap-2 text-[11px]">
                  <div className="rounded bg-white p-1.5 border border-slate-200">
                    <div className="font-bold text-slate-700 mb-0.5">📥 inputs</div>
                    <div className="font-mono text-slate-600">
                      {m.inputs.map((i) => `var.${i}`).join(', ')}
                    </div>
                  </div>
                  <div className="rounded bg-white p-1.5 border border-slate-200">
                    <div className="font-bold text-slate-700 mb-0.5">📤 outputs</div>
                    <div className="font-mono text-slate-600">
                      {m.outputs.join(', ')}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
          <div className="text-[11px] text-slate-500 bg-slate-50 border border-slate-200 rounded p-2">
            🔗 outputs → 다음 모듈의 inputs 로 연결 (vpc.vpc_id → db.vpc_id)
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 3 — Workspace 환경 비교 표
    // ─────────────────────────────────────────────────────
    function WorkspaceView({ v }) {
      return (
        <div className="space-y-3">
          <div className="text-[11px] text-slate-500 mb-1">🔀 같은 코드 · 다른 state · 다른 변수</div>
          <div className="grid grid-cols-3 gap-2">
            {v.map((ws) => {
              const c = MOD_COLOR[ws.color];
              return (
                <div
                  key={ws.name}
                  className={`rounded-lg border-2 p-2.5 transition-all ${c.bg} ${c.border} ${
                    ws.active ? 'ring-2 ring-blue-500 scale-105 shadow-md' : ''
                  }`}
                >
                  <div className="flex items-center justify-between mb-2">
                    <span className={`text-sm font-bold ${c.text}`}>{ws.name}</span>
                    {ws.active && (
                      <span className="text-[9px] font-bold bg-blue-600 text-white px-1.5 py-0.5 rounded">selected</span>
                    )}
                  </div>
                  <div className="text-[10px] text-slate-700 space-y-1 font-mono">
                    <div className="flex justify-between">
                      <span className="text-slate-500">type</span>
                      <span>{ws.instance}</span>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-slate-500">count</span>
                      <span>{ws.count}</span>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-slate-500">multi_az</span>
                      <span className={ws.multiAz ? 'text-emerald-600' : 'text-slate-400'}>
                        {ws.multiAz ? '✅' : '—'}
                      </span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* state 분리 시각화 */}
          <div className="rounded-lg border border-slate-200 bg-slate-50 p-2.5">
            <div className="text-[11px] font-bold text-slate-700 mb-1.5">🪣 S3 Backend — workspace별 state 분리</div>
            <div className="space-y-1 text-[10px] font-mono text-slate-600">
              <div>env:/dev/network/terraform.tfstate</div>
              <div>env:/staging/network/terraform.tfstate</div>
              <div className="text-blue-700 font-bold">env:/prod/network/terraform.tfstate ← 현재</div>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 4 — CI/CD 흐름도
    // ─────────────────────────────────────────────────────
    function CicdView({ v }) {
      const stateStyle = {
        done:    { bg: 'bg-emerald-50', border: 'border-emerald-400', text: 'text-emerald-700', badge: '✅' },
        running: { bg: 'bg-blue-50',    border: 'border-blue-500',    text: 'text-blue-700',    badge: '⏳', pulse: true },
        wait:    { bg: 'bg-slate-50',   border: 'border-slate-300',   text: 'text-slate-500',   badge: '○' },
      };
      return (
        <div className="space-y-2">
          <div className="text-[11px] text-slate-500 mb-1">🔄 GitHub Actions — PR plan · merge apply</div>
          {v.stages.map((s, i) => {
            const st = stateStyle[s.state];
            return (
              <div key={s.name} className="relative">
                <div className={`rounded-lg border-2 p-2.5 transition-all ${st.bg} ${st.border} ${st.pulse ? 'animate-pulse' : ''}`}>
                  <div className="flex items-center gap-2">
                    <span className="text-lg">{s.icon}</span>
                    <div className="flex-1">
                      <div className={`text-xs font-bold ${st.text}`}>{s.name}</div>
                      <div className="text-[10px] text-slate-600 font-mono">{s.detail}</div>
                    </div>
                    <span className={`text-sm ${st.text}`}>{st.badge}</span>
                  </div>
                </div>
                {i < v.stages.length - 1 && (
                  <div className="flex justify-center my-0.5">
                    <span className="text-slate-400 text-xs">↓</span>
                  </div>
                )}
              </div>
            );
          })}
          <div className="text-[11px] text-slate-500 bg-slate-50 border border-slate-200 rounded p-2 mt-2">
            🛡️ apply는 prod environment 승인 게이트로 보호 — 콘솔 클릭 0회
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-blue-500/10 border-l-2 border-blue-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-700 hover:text-blue-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. IaC 기초 &gt; Chapter 2. Terraform 실전</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Terraform 실전 — state · module · workspace · CI/CD</h1>
                  <p className="text-sm text-slate-500 mt-0.5">팀 단위로 안전하게 운영하는 4가지 축</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 text-sm text-blue-900">
                💡 Part I 완성. 다음(II-1-1)에서는 <strong>Compute</strong>
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-blue-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-blue-600 text-white hover:bg-blue-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-2-1.html" className="text-slate-500 hover:text-slate-700">&larr; I-2-1 Terraform 기본</a>
              <a href="../part2/II-1-1.html" className="text-blue-700 hover:text-blue-900 font-medium">II-1-1 Compute &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
