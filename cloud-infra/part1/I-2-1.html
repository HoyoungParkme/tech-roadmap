<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Infra 학습 — IaC (Infrastructure as Code)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    I-2-1. IaC (Infrastructure as Code)
    학습 목표: 콘솔 클릭 대신 코드로 인프라를 정의/관리/재현하는 표준 패턴.
    핵심 비유: "건물 설계도" — 매번 손으로 짓기 vs 설계도(Terraform)에 그려두면 동일하게 재현
    구조: 4단계 (Manual 한계 / Declarative / Version Control / Drift)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Manual — "AWS 콘솔에서 매번 클릭"',
        desc: '콘솔에 들어가 EC2를 띄우고, RDS를 만들고, S3 버킷을 누른다. dev 환경 만들고 나서 staging/prod에 똑같이 만들려면 또 클릭, 또 클릭. 어느 옵션 하나 빠뜨리면 환경마다 미묘하게 다른 인프라가 생긴다. 1년 뒤 "이 리소스 왜 만든 거지?" 누구도 모른다.',
        block: {
          kind: 'shell',
          code: `# 콘솔에서 dev 환경 만들기 (사람이 직접)
# 1. AWS Console 로그인
# 2. EC2 → 인스턴스 시작
#    - AMI 선택: Amazon Linux 2023
#    - 인스턴스 타입: t3.micro
#    - 키 페어: dev-key (어디 갔지?)
#    - 보안 그룹: 새로 만들기 (포트 22, 80, 443)
#    - 스토리지: 기본 8GB (어? prod는 30GB였나?)
# 3. RDS → 데이터베이스 생성
#    - 엔진: PostgreSQL 15.4
#    - 마스터 비밀번호: ******** (메모장에 적어둠...)
# 4. S3 → 버킷 만들기
#    - 이름: my-app-dev-bucket
#    - 퍼블릭 액세스 차단: 체크 (했나?)

# 다음 주: staging 환경 똑같이 만들기
$ # 콘솔 다시 열고 또 클릭...
$ # "어 이번에는 RDS 버전이 뭐였지?"
$ # "보안 그룹 규칙 dev랑 똑같이 했나?"

# 한계
# - 재현 불가 (사람의 기억에 의존)
# - 환경마다 미세한 차이 → "내 환경에선 되는데"
# - 변경 이력 없음 (누가 언제 뭐 바꿨는지 추적 불가)`,
        },
        focus: 'manual',
      },
      {
        title: 'Step 2. Declarative — "원하는 상태를 코드로 기술"',
        desc: 'Terraform HCL이나 CloudFormation YAML로 결과 상태를 선언한다. "EC2 1대, t3.micro, ami-xxx" 라고 적어두면 terraform plan이 현재와 차이를 보여주고 apply가 그대로 만든다. 명령형 스크립트가 아니라 "최종 형태"를 적기 때문에 멱등(idempotent)하다.',
        block: {
          kind: 'yaml',
          code: `# main.tf — Terraform HCL (선언적)
terraform {
  required_providers {
    aws = { source = "hashicorp/aws", version = "~> 5.0" }
  }
}

provider "aws" {
  region = "ap-northeast-2"
}

resource "aws_instance" "web" {
  ami           = "ami-0c9c942bd7bf113a2"   # Amazon Linux 2023
  instance_type = "t3.micro"

  tags = {
    Name        = "web-server"
    Environment = var.environment           # dev / staging / prod
  }
}

resource "aws_db_instance" "app_db" {
  identifier        = "app-db-\${var.environment}"
  engine            = "postgres"
  engine_version    = "15.4"
  instance_class    = "db.t3.micro"
  allocated_storage = 20
  username          = "appuser"
  password          = var.db_password       # 변수로 주입
  skip_final_snapshot = true
}

# 흐름: plan → apply
$ terraform init                # provider 다운로드
$ terraform plan                # 차이 미리보기 (만들 / 변경 / 삭제)
$ terraform apply               # 실제 반영
# 같은 코드 → 어디서 돌려도 같은 인프라`,
        },
        focus: 'declarative',
      },
      {
        title: 'Step 3. Version Control — "git에 인프라 이력"',
        desc: 'main.tf를 git에 commit한다. PR로 변경을 리뷰하고, CI에서 terraform plan을 자동 실행해 PR 코멘트로 diff를 보여준다. 누가 언제 어떤 리소스를 바꿨는지 git log로 모두 추적 가능. 인프라 변경도 코드 리뷰의 대상이 된다.',
        block: {
          kind: 'yaml',
          code: `# .github/workflows/terraform.yml — PR마다 plan 실행
name: Terraform Plan

on:
  pull_request:
    paths: ['terraform/**']

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        working-directory: terraform/
        env:
          AWS_ACCESS_KEY_ID:     \${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: \${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Comment PR with plan
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '```\\n' + \`\${{ steps.plan.outputs.stdout }}\` + '\\n```'
            })

# 결과
# - PR 열면 자동으로 "이 변경이 인프라에 어떻게 반영되는지" 표시
# - 리뷰어가 위험한 변경(DB 삭제 등)을 사전에 발견
# - main에 머지되면 별도 워크플로우가 apply 실행`,
        },
        focus: 'version_control',
      },
      {
        title: 'Step 4. Drift — "코드와 실제가 어긋나는 순간"',
        desc: '누군가 콘솔에 들어가 손으로 보안 그룹 포트를 열어버리면, 코드(원하는 상태)와 실제 클라우드(현재 상태)가 어긋난다. 이걸 drift라고 한다. terraform plan을 정기적으로 돌리면 감지 가능. 정책으로 "콘솔 직접 변경 금지, 모든 변경은 코드 + PR"을 강제해야 한다.',
        block: {
          kind: 'shell',
          code: `# 누군가 콘솔에서 손으로 보안 그룹에 포트 3306 열어버림
# (코드에는 그런 규칙이 없음)

$ terraform plan
# Refreshing state... aws_security_group.web

Terraform detected the following changes made outside of Terraform
since the last "terraform apply" which may have affected this plan:

  # aws_security_group.web has changed
  ~ resource "aws_security_group" "web" {
        id = "sg-0a1b2c3d4e5f"
      ~ ingress = [
          + {
              + from_port   = 3306        ← 손으로 추가된 규칙
              + to_port     = 3306
              + protocol    = "tcp"
              + cidr_blocks = ["0.0.0.0/0"]   ← ⚠️ 전세계 오픈
            },
            # ... (기존 규칙들)
        ]
    }

Plan: 0 to add, 1 to change, 0 to destroy.
# → terraform apply 하면 손으로 추가한 규칙 제거됨

# 운영 정책
# 1. 콘솔 직접 변경 금지 (read-only IAM)
# 2. drift detection 정기 실행 (cron / GitHub Actions schedule)
# 3. drift 발견 시 알림 (Slack)
# 4. 모든 변경은 코드 + PR + apply

# IaC의 약속: "코드 = 진실의 원천 (source of truth)"`,
        },
        focus: 'drift',
      },
    ];

    const KIND_STYLE = {
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },  // cyan — python과 색상 구분
      python: { label: 'Python', textColor: '#86efac' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const IAC = [
      { key: 'manual',          emoji: '🖱️', name: 'Manual',          note: '콘솔 클릭의 한계' },
      { key: 'declarative',     emoji: '📝', name: 'Declarative',     note: '선언적 정의' },
      { key: 'version_control', emoji: '🔄', name: 'Version Control', note: 'git 추적' },
      { key: 'drift',           emoji: '⚠️', name: 'Drift',           note: '손 변경 = 어긋남' },
    ];

    function IaCCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">📐 건물 설계도 (IaC)</div>
          <div className="grid grid-cols-4 gap-2">
            {IAC.map((s) => {
              const isActive = focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-blue-100 border-2 border-blue-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{s.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{s.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{s.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">IaC (Infrastructure as Code)</h1>
                <p className="text-sm text-slate-500 mt-1">건물 설계도 — 코드로 인프라를 정의하면 어디서든 동일하게 재현</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <IaCCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'drift' && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 mb-6 text-xs text-blue-900">
                💡 다음(I-2-2)에서는 Terraform 실전 — state/module/workspace
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
