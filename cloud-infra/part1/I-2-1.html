<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Infra 학습 — I-2-1. IaC (Infrastructure as Code)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    I-2-1. IaC (Infrastructure as Code)
    학습 목표: 콘솔 클릭 대신 코드로 인프라를 정의/재현/추적/감지하는 표준 패턴.
    핵심 비유: 건물 설계도 — 매번 손으로 짓기 vs 설계도(Terraform)로 동일하게 5번 복제
    패턴: mlops v1 — 좌(LiveDataPane: 수동 vs IaC + drift) / 우(VSCode CodeViewer · Terraform HCL)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 — 4 step IaC 여정
    // Step 1 manual_pain    — 콘솔 클릭 흐름도 10 단계 + 5 환경 불일치
    // Step 2 declarative    — Terraform 1 파일 → 5 환경 동일 복제
    // Step 3 version_control— git history 표 (3 commit + diff)
    // Step 4 drift          — 콘솔에서 손으로 변경 → terraform plan 빨간 출력
    // ─────────────────────────────────────────────────────

    // 콘솔 10단계 (Step 1)
    const CONSOLE_STEPS = [
      { n: 1,  label: 'AWS Console 로그인',          icon: '🔑' },
      { n: 2,  label: 'EC2 → 인스턴스 시작',         icon: '🖥️' },
      { n: 3,  label: 'AMI 선택 (Amazon Linux)',     icon: '💿' },
      { n: 4,  label: '인스턴스 타입 (t3.micro)',    icon: '⚙️' },
      { n: 5,  label: '키 페어 생성/선택',            icon: '🗝️' },
      { n: 6,  label: '보안 그룹 (포트 22/80/443)',  icon: '🛡️' },
      { n: 7,  label: '스토리지 8GB 설정',           icon: '💾' },
      { n: 8,  label: 'RDS PostgreSQL 생성',         icon: '🗄️' },
      { n: 9,  label: 'S3 버킷 생성',                icon: '🪣' },
      { n: 10, label: '보안 정책/태깅 마무리',        icon: '🏷️' },
    ];

    // 5개 환경 (Step 1: 모두 다름 / Step 2: 모두 동일)
    const ENV_LIST = ['dev', 'staging', 'qa', 'prod-asia', 'prod-us'];

    // git history (Step 3)
    const GIT_LOG = [
      {
        sha: 'a3f9c1d',
        author: 'sh.hong',
        when: '2 hours ago',
        msg: 'feat: add S3 bucket for log archive',
        diff: [
          { sign: '+', text: 'resource "aws_s3_bucket" "logs" {' },
          { sign: '+', text: '  bucket = "app-logs-${var.environment}"' },
          { sign: '+', text: '}' },
        ],
      },
      {
        sha: '7d2e4ab',
        author: 'jenny.kim',
        when: 'yesterday',
        msg: 'chore: bump RDS to PostgreSQL 15.4',
        diff: [
          { sign: '-', text: '  engine_version = "14.10"' },
          { sign: '+', text: '  engine_version = "15.4"' },
        ],
      },
      {
        sha: '1c5b8f0',
        author: 'sh.hong',
        when: '3 days ago',
        msg: 'feat: initial EC2 + security group',
        diff: [
          { sign: '+', text: 'resource "aws_instance" "web" {' },
          { sign: '+', text: '  instance_type = "t3.micro"' },
          { sign: '+', text: '}' },
        ],
      },
    ];

    // ─────────────────────────────────────────────────────
    // STEPS
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Manual — "콘솔 클릭 10단계 × 5환경 = 지옥"',
        desc: '콘솔에 들어가 10단계를 손으로 누른다. dev 만들고 staging에 똑같이 만들려면 또 클릭. 5환경 동일하게 만들기는 사람의 기억에 의존 — 어느 옵션 하나만 빠뜨려도 환경이 미묘하게 달라진다. "내 환경에선 되는데" 의 시작.',
        view: 'manual_pain',
        envStatus: { dev: 'done', staging: 'partial', qa: 'partial', 'prod-asia': 'mismatch', 'prod-us': 'mismatch' },
        code: {
          lang: 'shell',
          filename: 'manual-checklist.sh',
          lines: [
            '# 콘솔에서 dev 환경 만들기 (사람이 직접 10 단계)',
            '#  1. AWS Console 로그인',
            '#  2. EC2 → 인스턴스 시작',
            '#  3. AMI 선택: Amazon Linux 2023',
            '#  4. 인스턴스 타입: t3.micro',
            '#  5. 키 페어: dev-key (어디 갔지?)',
            '#  6. 보안 그룹: 포트 22, 80, 443',
            '#  7. 스토리지: 8GB (어? prod는 30GB였나?)',
            '#  8. RDS PostgreSQL 15.4 (마스터 비번은 메모장에...)',
            '#  9. S3 버킷: my-app-dev-bucket',
            '# 10. 태그/보안 정책 마무리',
            '',
            '# 다음 주 — staging 환경 똑같이 만들기',
            '$ # 콘솔 다시 열고 또 클릭...',
            '$ # "어 이번엔 RDS 버전이 뭐였지?"',
            '$ # "보안 그룹 규칙 dev랑 똑같이 했나?"',
            '',
            '# 한계',
            '# - 재현 불가 (사람의 기억에 의존)',
            '# - 환경마다 미세한 차이 (dev≠staging≠prod)',
            '# - 변경 이력 없음 (누가 언제 뭘 바꿨는지 추적 불가)',
          ],
          highlight: [3, 7, 8, 18, 19, 20],
        },
      },
      {
        title: 'Step 2. Declarative — "코드 1 파일 → 5환경 동일 복제"',
        desc: 'Terraform HCL로 결과 상태를 선언한다. var.environment만 바꿔 같은 코드를 5번 apply 하면, dev~prod-us까지 정확히 같은 인프라가 만들어진다. 명령형이 아니라 "최종 형태"를 적기 때문에 멱등(idempotent)하다.',
        view: 'declarative',
        envStatus: { dev: 'iac', staging: 'iac', qa: 'iac', 'prod-asia': 'iac', 'prod-us': 'iac' },
        code: {
          lang: 'yaml',
          filename: 'main.tf',
          lines: [
            '# main.tf — Terraform HCL (선언적)',
            'terraform {',
            '  required_providers {',
            '    aws = { source = "hashicorp/aws", version = "~> 5.0" }',
            '  }',
            '}',
            '',
            'provider "aws" {',
            '  region = var.region',
            '}',
            '',
            'resource "aws_instance" "web" {',
            '  ami           = "ami-0c9c942bd7bf113a2"   # Amazon Linux 2023',
            '  instance_type = "t3.micro"',
            '',
            '  tags = {',
            '    Name        = "web-server"',
            '    Environment = var.environment           # dev / staging / qa / prod-*',
            '  }',
            '}',
            '',
            'resource "aws_db_instance" "app_db" {',
            '  identifier        = "app-db-${var.environment}"',
            '  engine            = "postgres"',
            '  engine_version    = "15.4"',
            '  instance_class    = "db.t3.micro"',
            '  allocated_storage = 20',
            '  username          = "appuser"',
            '  password          = var.db_password       # 변수 주입',
            '  skip_final_snapshot = true',
            '}',
            '',
            '# 5 환경 동일 복제',
            '$ terraform workspace new dev        && terraform apply -var environment=dev',
            '$ terraform workspace new staging    && terraform apply -var environment=staging',
            '$ terraform workspace new qa         && terraform apply -var environment=qa',
            '$ terraform workspace new prod-asia  && terraform apply -var environment=prod-asia',
            '$ terraform workspace new prod-us    && terraform apply -var environment=prod-us',
            '# → 같은 코드 → 어디서 돌려도 같은 인프라',
          ],
          highlight: [12, 18, 22, 35, 36, 37, 38, 39],
        },
      },
      {
        title: 'Step 3. Version Control — "git에 인프라 이력"',
        desc: 'main.tf를 git에 commit. PR로 변경을 리뷰하고 CI가 terraform plan을 자동 실행해 PR에 diff를 코멘트로 붙인다. 누가 언제 어떤 리소스를 바꿨는지 git log로 모두 추적 — 인프라 변경도 코드 리뷰의 대상.',
        view: 'version_control',
        envStatus: { dev: 'iac', staging: 'iac', qa: 'iac', 'prod-asia': 'iac', 'prod-us': 'iac' },
        code: {
          lang: 'yaml',
          filename: '.github/workflows/terraform.yml',
          lines: [
            '# PR마다 terraform plan 자동 실행 + diff 코멘트',
            'name: Terraform Plan',
            '',
            'on:',
            '  pull_request:',
            '    paths: ["terraform/**"]',
            '',
            'jobs:',
            '  plan:',
            '    runs-on: ubuntu-latest',
            '    steps:',
            '      - uses: actions/checkout@v4',
            '',
            '      - uses: hashicorp/setup-terraform@v3',
            '        with:',
            '          terraform_version: 1.7.0',
            '',
            '      - name: Terraform Init',
            '        run: terraform init',
            '        working-directory: terraform/',
            '',
            '      - name: Terraform Plan',
            '        id: plan',
            '        run: terraform plan -no-color -out=tfplan',
            '        working-directory: terraform/',
            '        env:',
            '          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}',
            '          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}',
            '',
            '      - name: Comment PR with plan',
            '        uses: actions/github-script@v7',
            '        with:',
            '          script: |',
            '            github.rest.issues.createComment({',
            '              issue_number: context.issue.number,',
            '              owner: context.repo.owner,',
            '              repo: context.repo.repo,',
            '              body: "```\\n" + `${{ steps.plan.outputs.stdout }}` + "\\n```"',
            '            })',
            '',
            '# 결과',
            '# - PR 열면 자동으로 "이 변경이 인프라에 어떻게 반영되는지" 표시',
            '# - 리뷰어가 위험한 변경(DB 삭제 등)을 사전에 발견',
            '# - main 머지되면 별도 워크플로우가 apply 실행',
          ],
          highlight: [22, 23, 24, 30, 31, 38, 39],
        },
      },
      {
        title: 'Step 4. Drift — "콘솔에서 손 댄 순간 = 코드와 어긋남"',
        desc: '누군가 콘솔에서 손으로 보안 그룹 포트 3306을 0.0.0.0/0 으로 열어버렸다. 코드(원하는 상태)와 실제 클라우드(현재 상태)가 어긋난다 — 이걸 drift라고 한다. terraform plan을 정기 실행하면 빨간 diff로 즉시 감지. 정책: "콘솔 직접 변경 금지, 모든 변경은 코드 + PR".',
        view: 'drift',
        envStatus: { dev: 'iac', staging: 'iac', qa: 'iac', 'prod-asia': 'drift', 'prod-us': 'iac' },
        code: {
          lang: 'shell',
          filename: 'terraform-plan-drift.txt',
          lines: [
            '# 누군가 콘솔에서 손으로 보안 그룹에 포트 3306 열어버림',
            '# (코드에는 그런 규칙이 없음)',
            '',
            '$ terraform plan',
            '# Refreshing state... aws_security_group.web',
            '',
            'Terraform detected the following changes made outside of Terraform',
            'since the last "terraform apply" which may have affected this plan:',
            '',
            '  # aws_security_group.web has changed',
            '  ~ resource "aws_security_group" "web" {',
            '        id = "sg-0a1b2c3d4e5f"',
            '      ~ ingress = [',
            '          + {',
            '              + from_port   = 3306        # ← 손으로 추가된 규칙',
            '              + to_port     = 3306',
            '              + protocol    = "tcp"',
            '              + cidr_blocks = ["0.0.0.0/0"]   # ⚠️ 전세계 오픈',
            '            },',
            '            # ... (기존 규칙들)',
            '        ]',
            '    }',
            '',
            'Plan: 0 to add, 1 to change, 0 to destroy.',
            '# → terraform apply 하면 손으로 추가한 규칙 제거됨',
            '',
            '# 운영 정책',
            '# 1. 콘솔 직접 변경 금지 (read-only IAM)',
            '# 2. drift detection 정기 실행 (cron / GitHub Actions schedule)',
            '# 3. drift 발견 시 알림 (Slack)',
            '# 4. 모든 변경은 코드 + PR + apply',
            '',
            '# IaC의 약속: "코드 = 진실의 원천 (source of truth)"',
          ],
          highlight: [7, 8, 14, 15, 16, 17, 18],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 환경 상태 색상
    // ─────────────────────────────────────────────────────
    const ENV_STYLE = {
      done:     { card: 'bg-blue-50 border-blue-300',       label: '수동 완료', badge: 'bg-blue-100 text-blue-700',     mark: '🖱️' },
      partial:  { card: 'bg-yellow-50 border-yellow-400',   label: '부분 일치', badge: 'bg-yellow-100 text-yellow-700', mark: '⚠️' },
      mismatch: { card: 'bg-red-50 border-red-400',         label: '불일치',    badge: 'bg-red-100 text-red-700',       mark: '❌' },
      iac:      { card: 'bg-emerald-50 border-emerald-400', label: 'IaC 동일', badge: 'bg-emerald-100 text-emerald-700', mark: '✅' },
      drift:    { card: 'bg-red-50 border-red-500 animate-pulse', label: 'DRIFT 감지', badge: 'bg-red-100 text-red-700', mark: '🚨' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — view 별 4 가지 시각화 분기
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">📐 건물 설계도 (IaC)</h2>
            <span className="text-[10px] text-slate-400 font-mono">manual vs IaC · live</span>
          </div>

          {step.view === 'manual_pain'   && <ManualPainView envStatus={step.envStatus} />}
          {step.view === 'declarative'   && <DeclarativeView envStatus={step.envStatus} />}
          {step.view === 'version_control' && <VersionControlView />}
          {step.view === 'drift'         && <DriftView envStatus={step.envStatus} />}

          {/* 환경 상태 범례 (공통) */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-blue-300"></span>수동 완료</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-yellow-400"></span>부분 일치</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-red-400"></span>불일치/Drift</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-400"></span>IaC 동일</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // View 1. Manual Pain — 콘솔 10단계 흐름도 + 5환경 미스매치
    // ─────────────────────────────────────────────────────
    function ManualPainView({ envStatus }) {
      return (
        <div className="space-y-4">
          <div>
            <div className="text-xs font-bold text-slate-600 mb-2">콘솔 클릭 흐름도 (10 단계)</div>
            <div className="grid grid-cols-5 gap-1.5">
              {CONSOLE_STEPS.map((s, i) => (
                <div key={s.n} className="flex flex-col items-center">
                  <div className="w-full bg-slate-100 border border-slate-300 rounded-md p-1.5 text-center">
                    <div className="text-base">{s.icon}</div>
                    <div className="text-[9px] text-slate-600 leading-tight mt-0.5">{s.label}</div>
                  </div>
                  {i < CONSOLE_STEPS.length - 1 && i % 5 !== 4 && (
                    <div className="text-[8px] text-slate-400 mt-0.5">▼</div>
                  )}
                </div>
              ))}
            </div>
            <div className="text-[10px] text-slate-500 mt-2">
              ⏱️ 1 환경 = 10 클릭 = ~30 분 · 5 환경 = 50 클릭 + 사람의 기억에 의존
            </div>
          </div>

          <div className="pt-3 border-t border-slate-100">
            <div className="text-xs font-bold text-slate-600 mb-2">5 환경 결과</div>
            <div className="grid grid-cols-5 gap-2">
              {ENV_LIST.map((env) => {
                const st = envStatus[env];
                const style = ENV_STYLE[st];
                return (
                  <div key={env} className={`rounded-md border-2 p-2 text-center ${style.card}`}>
                    <div className="text-base">{style.mark}</div>
                    <div className="text-[10px] font-bold text-slate-700 mt-0.5">{env}</div>
                    <div className={`text-[9px] mt-1 px-1 py-0.5 rounded ${style.badge}`}>{style.label}</div>
                  </div>
                );
              })}
            </div>
            <div className="text-[10px] text-red-600 mt-2 font-medium">
              ⚠️ dev/staging/qa/prod 모두 동일하게 만들 수 없다 — "내 환경에선 되는데"
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // View 2. Declarative — 1 코드 파일 → 5 환경 복제 화살표
    // ─────────────────────────────────────────────────────
    function DeclarativeView({ envStatus }) {
      return (
        <div className="space-y-4">
          <div className="flex items-center gap-3">
            {/* main.tf 카드 */}
            <div className="bg-blue-50 border-2 border-blue-400 rounded-lg p-3 text-center w-28 flex-shrink-0">
              <div className="text-2xl">📄</div>
              <div className="text-xs font-bold text-blue-700 mt-1">main.tf</div>
              <div className="text-[10px] text-slate-500">1 파일</div>
            </div>

            {/* 화살표 */}
            <div className="flex flex-col items-center text-blue-500 px-1">
              <div className="text-xs font-mono">terraform</div>
              <div className="text-2xl">→</div>
              <div className="text-[10px] font-mono">apply ×5</div>
            </div>

            {/* 5 환경 결과 */}
            <div className="grid grid-cols-1 gap-1.5 flex-1">
              {ENV_LIST.map((env) => {
                const st = envStatus[env];
                const style = ENV_STYLE[st];
                return (
                  <div key={env} className={`rounded-md border-2 px-2 py-1 flex items-center justify-between ${style.card}`}>
                    <div className="flex items-center gap-1.5">
                      <span className="text-sm">{style.mark}</span>
                      <span className="text-[11px] font-bold text-slate-700">{env}</span>
                    </div>
                    <span className={`text-[9px] px-1.5 py-0.5 rounded ${style.badge}`}>{style.label}</span>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="pt-3 border-t border-slate-100">
            <div className="text-xs font-bold text-slate-600 mb-2">멱등성 (idempotent)</div>
            <div className="text-[11px] text-slate-600 leading-relaxed bg-slate-50 rounded-md p-2 border border-slate-200">
              같은 코드를 100번 apply 해도 결과는 같다. var.environment 만 바꾸면 5 환경이 정확히 동일한 형상으로 만들어진다.
              사람의 기억 대신 <strong className="text-blue-700">코드가 진실의 원천</strong>.
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // View 3. Version Control — git history 표 + diff
    // ─────────────────────────────────────────────────────
    function VersionControlView() {
      return (
        <div className="space-y-3">
          <div className="text-xs font-bold text-slate-600">git log — main.tf history</div>
          <div className="space-y-2">
            {GIT_LOG.map((c, idx) => (
              <div key={c.sha} className="bg-slate-50 border border-slate-200 rounded-md overflow-hidden">
                <div className="px-2.5 py-1.5 flex items-center justify-between bg-white border-b border-slate-200">
                  <div className="flex items-center gap-2">
                    <span className="font-mono text-[10px] text-blue-700 bg-blue-50 px-1.5 py-0.5 rounded">{c.sha}</span>
                    <span className="text-[11px] font-bold text-slate-700">{c.msg}</span>
                  </div>
                  <div className="text-[10px] text-slate-500">
                    {c.author} · {c.when}
                  </div>
                </div>
                <div className="font-mono text-[10px] leading-tight px-2.5 py-1.5 bg-slate-900">
                  {c.diff.map((line, i) => (
                    <div
                      key={i}
                      className={line.sign === '+' ? 'text-emerald-300' : 'text-red-300'}
                    >
                      <span className="select-none mr-1.5 opacity-70">{line.sign}</span>
                      {line.text}
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
          <div className="text-[10px] text-slate-500 pt-2 border-t border-slate-100">
            🔍 누가 / 언제 / 왜 / 무엇을 바꿨는지 모두 추적 — 인프라도 코드 리뷰 대상
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // View 4. Drift — 5환경 + drift 박스 + plan 빨간 출력
    // ─────────────────────────────────────────────────────
    function DriftView({ envStatus }) {
      return (
        <div className="space-y-4">
          <div>
            <div className="text-xs font-bold text-slate-600 mb-2">5 환경 drift 감지</div>
            <div className="grid grid-cols-5 gap-2">
              {ENV_LIST.map((env) => {
                const st = envStatus[env];
                const style = ENV_STYLE[st];
                return (
                  <div key={env} className={`rounded-md border-2 p-2 text-center ${style.card}`}>
                    <div className="text-base">{style.mark}</div>
                    <div className="text-[10px] font-bold text-slate-700 mt-0.5">{env}</div>
                    <div className={`text-[9px] mt-1 px-1 py-0.5 rounded ${style.badge}`}>{style.label}</div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="bg-red-50 border-2 border-red-400 rounded-lg p-3">
            <div className="flex items-center gap-2 text-red-800 font-bold text-sm mb-2">
              <span className="text-lg">🚨</span>
              <span>DRIFT — prod-asia · aws_security_group.web</span>
            </div>
            <div className="font-mono text-[10px] leading-tight bg-slate-900 rounded p-2 space-y-0.5">
              <div className="text-slate-400"># Terraform plan 결과</div>
              <div className="text-red-300">~ resource "aws_security_group" "web" &#123;</div>
              <div className="text-red-300 pl-2">~ ingress = [</div>
              <div className="text-emerald-300 pl-4">+ &#123; from_port = 3306,</div>
              <div className="text-emerald-300 pl-4">+   cidr_blocks = ["0.0.0.0/0"] &#125;  ← 손으로 추가</div>
              <div className="text-red-300 pl-2">]</div>
              <div className="text-red-300">&#125;</div>
              <div className="text-yellow-300 pt-0.5">Plan: 0 to add, 1 to change, 0 to destroy.</div>
            </div>
            <div className="text-[10px] text-red-700 mt-2 font-medium">
              ⚠️ 콘솔에서 손으로 변경 → 코드와 어긋남 — terraform apply 로 코드 상태 복구
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + 라인 번호 + 강조
    // (HCL 은 hljs 기본 미지원이라 yaml lang 으로 라벨만 override)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      // HCL 파일이면 표기만 HCL 로 보이게 override (highlight.js 는 yaml 로 토큰화)
      const displayLang = code.filename.endsWith('.tf') ? 'hcl' : code.lang;

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{displayLang}</span>
          </div>

          {/* hljs 토큰화 hidden */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-blue-500/10 border-l-2 border-blue-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-700 hover:text-blue-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. 클라우드 기초 &gt; Chapter 2. IaC 개론</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IaC (Infrastructure as Code)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">건물 설계도 — 코드로 인프라를 정의하면 어디서든 동일하게 재현</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 text-sm text-blue-900">
                💡 다음(I-2-2)에서는 <strong>Terraform 실전</strong> — state / module / workspace
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-blue-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-blue-600 text-white hover:bg-blue-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./I-2-2.html" className="text-blue-700 hover:text-blue-900 font-medium">I-2-2 Terraform 실전 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
