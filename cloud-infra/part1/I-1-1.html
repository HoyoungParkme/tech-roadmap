<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Infra 학습 — IaaS / PaaS / SaaS</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    I-1-1. IaaS / PaaS / SaaS
    학습 목표: 클라우드 컴퓨팅 모델 4가지(On-prem/IaaS/PaaS/SaaS) 책임 경계 이해
    핵심 비유: "집·렌트·호텔" — On-prem(집 짓기) / IaaS(렌트) / PaaS(가구 포함) / SaaS(호텔)
    구조: 4단계 (On-prem / IaaS / PaaS / SaaS)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. On-prem — "집 짓기" (전체 책임)',
        desc: '서버 구입부터 네트워크/OS/DB/앱/백업까지 모두 사내에서 책임진다. 초기 비용이 크고 증설/축소가 느리지만 자유도와 데이터 통제력은 최상. 운영 부담이 가장 무겁다.',
        block: {
          kind: 'shell',
          code: `# On-prem 책임 매트릭스 — 모든 레이어가 우리 책임

레이어                   On-prem
──────────────────────────────────
Application (앱 코드)     ✓ 우리
Data (DB/스토리지)        ✓ 우리
Runtime (Node/JVM/Python) ✓ 우리
Middleware (Nginx/Redis)  ✓ 우리
OS (Ubuntu/RHEL)          ✓ 우리
Virtualization (VMware)   ✓ 우리
Servers (물리 장비)        ✓ 우리
Storage (디스크/SAN)      ✓ 우리
Networking (스위치/방화벽) ✓ 우리

# 비용 구조
- CapEx 큼: 서버 구매 수천만~수억
- 감가상각 5년
- 데이터센터 임대료 / 전력 / 냉방
- 운영 인력 (시스템/네트워크/보안 엔지니어)

# 장점: 자유도 ↑, 데이터 통제 ↑, 장기 운영 비용 ↓
# 단점: 초기 비용 ↑, 증설 느림, 장애 대응 24/7 인력 필요`,
        },
        focus: 'onprem',
      },
      {
        title: 'Step 2. IaaS — "렌트" (VM·네트워크 빌림)',
        desc: 'AWS EC2, Google Compute Engine, Azure VM. 하드웨어/가상화는 클라우드가 책임지고, OS 위는 사용자 책임. 시간당 과금이라 필요할 때만 켜고 끈다. 자유도는 높지만 OS 패치/모니터링은 직접.',
        block: {
          kind: 'yaml',
          code: `# Terraform — AWS EC2 인스턴스 한 대 띄우기 (IaaS의 전형)
terraform {
  required_providers {
    aws = { source = "hashicorp/aws", version = "~> 5.0" }
  }
}

provider "aws" {
  region = "ap-northeast-2"   # 서울 리전
}

resource "aws_instance" "web" {
  ami           = "ami-0c9c942bd7bf113a2"   # Ubuntu 22.04
  instance_type = "t3.small"                # 2 vCPU / 2 GiB
  key_name      = "my-keypair"

  tags = {
    Name = "web-server-01"
    Env  = "prod"
  }
}

# 우리가 받는 것: VM, 네트워크, 디스크
# 우리가 해야 할 것:
#   - OS 패치 (apt upgrade)
#   - Nginx/Node/Python 설치
#   - DB 설치 또는 RDS 별도 사용
#   - 모니터링 / 로그 / 백업 설정
#   - 보안 그룹 / IAM 관리

# 가격: t3.small ≈ $0.026/h ≈ 시간당 35원
# 끄면 과금 정지 (스토리지는 별도)`,
        },
        focus: 'iaas',
      },
      {
        title: 'Step 3. PaaS — "가구 포함 렌트" (런타임까지)',
        desc: 'Heroku, Google App Engine, Cloud Run. 코드만 push하면 런타임/스케일링/로드밸런서가 자동. OS는 신경 안 써도 됨. 자유도는 낮아지지만 운영 부담이 극적으로 준다.',
        block: {
          kind: 'yaml',
          code: `# Google App Engine — app.yaml 한 파일로 배포 (PaaS의 전형)
runtime: python311           # 런타임은 Google이 관리
service: api

instance_class: F2           # 자동 스케일링 인스턴스 등급

automatic_scaling:
  min_instances: 1
  max_instances: 10
  target_cpu_utilization: 0.6

env_variables:
  DATABASE_URL: "postgres://..."
  LOG_LEVEL: "info"

handlers:
  - url: /.*
    script: auto             # main.py 자동 진입

# 배포: gcloud app deploy
# → 코드 zip → 빌드 → 컨테이너화 → 무중단 배포 → 로드밸런서 자동 연결
# → 트래픽 0이면 인스턴스 0개로 축소 (Cloud Run의 경우)

# 우리가 받는 것: OS + 런타임 + 스케일링 + LB + HTTPS + 로그 수집
# 우리가 해야 할 것:
#   - 앱 코드 작성 / 환경 변수 / DB 연결
#   - 의존성 (requirements.txt)

# 한계
# - 런타임 버전 / OS 패키지 자유도 ↓
# - 특정 vendor 종속 (lock-in 위험)
# - 장시간 백그라운드 작업 제약`,
        },
        focus: 'paas',
      },
      {
        title: 'Step 4. SaaS — "호텔" (서비스만 사용)',
        desc: 'Gmail, Notion, Slack. 사용자는 회원가입하고 사용만. 서버/DB/앱 모두 vendor가 운영. 가장 편하지만 SLA에 종속되고 데이터 lock-in 위험이 가장 크다.',
        block: {
          kind: 'shell',
          code: `# SaaS — 우리가 코드를 한 줄도 안 짜는 모델

서비스           카테고리         월 사용료(예시)
──────────────────────────────────────────────
Gmail / Workspace 이메일/협업      $6/user
Notion           위키/문서         $10/user
Slack            메신저            $7/user
Salesforce       CRM              $25~/user
Datadog          모니터링          $15~/host
GitHub           코드 저장소       $4/user

# 우리가 받는 것: 거의 전부
✓ 서버 / DB / 백업 / 보안 / 업데이트 모두 vendor 책임
✓ 브라우저만 있으면 즉시 사용
✓ SLA 99.9% 보장 (계약서)

# 우리가 해야 할 것
✓ 회원가입 / 결제 / 사용자 권한 관리

# 의존성 / 위험
✗ vendor 장애 → 우리도 멈춤 (Slack 다운 = 회사 멈춤)
✗ 데이터 lock-in: 마이그레이션 어려움 (Notion → 다른 wiki 옮기기 힘듦)
✗ 가격 인상 → 계약 재협상 필요
✗ 커스터마이징 한계 (우리만의 기능 추가 불가)
✗ 데이터 주권 / 컴플라이언스 (해외 리전 저장 가능성)

# 다음(I-1-2)에서는 AWS / GCP / Azure 3대 vendor 비교`,
        },
        focus: 'saas',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const MODELS = [
      { key: 'onprem', emoji: '🏠',  name: 'On-prem', note: '집 짓기 — 전체 책임' },
      { key: 'iaas',   emoji: '🏢',  name: 'IaaS',    note: '렌트 — VM·네트워크 빌림' },
      { key: 'paas',   emoji: '🏨',  name: 'PaaS',    note: '가구 포함 — 런타임까지' },
      { key: 'saas',   emoji: '🏟️', name: 'SaaS',    note: '호텔 — 서비스만 사용' },
    ];

    function ModelCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🏠 집·렌트·호텔 (Cloud 컴퓨팅 모델)</div>
          <div className="grid grid-cols-4 gap-2">
            {MODELS.map((m) => {
              const isActive = focus === m.key;
              return (
                <div
                  key={m.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-blue-100 border-2 border-blue-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{m.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{m.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1 leading-tight">{m.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">IaaS / PaaS / SaaS</h1>
                <p className="text-sm text-slate-500 mt-1">집·렌트·호텔 — 클라우드 컴퓨팅 모델 4가지</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <ModelCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'saas' && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 mb-6 text-xs text-blue-900">
                💡 다음(I-1-2)에서는 AWS / GCP / Azure 3대 vendor 비교
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
