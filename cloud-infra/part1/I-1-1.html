  <!--
    I-1-1. IaaS / PaaS / SaaS — 9 Layer 책임 분담

    패턴: fastapi v1 — 좌(LiveDataPane: 모델 카드 + 9 layer 표) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">

    // ─────────────────────────────────────────────────────
    // 9 Layer 정의 (위 → 아래: App이 위, Network가 아래)
    // ─────────────────────────────────────────────────────
    const LAYERS = [

      { key: 'runtime', name: 'Runtime',        sub: 'Node / JVM / Python' },
      { key: 'mw',      name: 'Middleware',     sub: 'Nginx / Redis / Tomcat' },
      { key: 'os',      name: 'OS',             sub: 'Ubuntu / RHEL / Windows' },
      { key: 'virt',    name: 'Virtualization', sub: 'VMware / KVM / Hyper-V' },
      { key: 'server',  name: 'Server',         sub: '물리 서버 / CPU / RAM' },
      { key: 'storage', name: 'Storage',        sub: '디스크 / SAN / NAS' },
      { key: 'net',     name: 'Network',        sub: '스위치 / 방화벽 / 회선' },

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 — 9 layer × 4 모델 책임

        },

            '# 우리가 받는 것: OS + 런타임 + 스케일링 + LB + HTTPS + 로그',

            '',
            '# 한계: vendor 종속 / 런타임 자유도 ↓ / 장기 백그라운드 작업 제약',
          ],
          highlight: [2, 7, 8, 9, 25, 26],
        },
      },
      {
        modelKey: 'saas',
        title: 'Step 4. SaaS — "호텔" (서비스만 사용)',
        desc: 'Gmail / Notion / Slack / Salesforce. 9 layer 모두 vendor 책임. 우리는 회원가입하고 사용만. 가장 편하지만 SLA 종속, 데이터 lock-in, 커스터마이징 한계의 대가가 따른다.',

            '# 우리가 해야 할 것',

            '#  ✗ 커스터마이징 한계',

    // ─────────────────────────────────────────────────────
    // 4 모델 메타 (카드 표시용)
    // ─────────────────────────────────────────────────────
    const MODELS = [
      { key: 'onprem', emoji: '🏠',  name: 'On-prem', note: '집 짓기 — 전체 책임' },
      { key: 'iaas',   emoji: '🏢',  name: 'IaaS',    note: '렌트 — VM·네트워크 빌림' },
      { key: 'paas',   emoji: '🏨',  name: 'PaaS',    note: '가구 포함 — 런타임까지' },
      { key: 'saas',   emoji: '🏟️', name: 'SaaS',    note: '호텔 — 서비스만 사용' },
    ];

    // 책임 상태별 스타일 (정적 Tailwind — purge 안전)
    const RESP_STYLE = {
      you:   { row: 'bg-red-50 border-red-300',   badge: 'bg-red-500 text-white',  label: '회사' },
      cloud: { row: 'bg-blue-50 border-blue-300', badge: 'bg-blue-500 text-white', label: '클라우드' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 모델 카드 + 9 layer 책임 표
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ modelKey, responsibility, showAlert }) {
      // 카운트
      const youCount   = Object.values(responsibility).filter((v) => v === 'you').length;
      const cloudCount = Object.values(responsibility).filter((v) => v === 'cloud').length;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          {/* 모델 카드 4개 */}
          <div className="mb-4">
            <div className="text-xs font-bold text-slate-700 mb-2">🏠 4 컴퓨팅 모델</div>
            <div className="grid grid-cols-4 gap-2">
              {MODELS.map((m) => {
                const isActive = modelKey === m.key;
                return (
                  <div
                    key={m.key}
                    className={`rounded-lg p-2 text-center transition-all duration-300 ${
                      isActive
                        ? 'bg-blue-100 border-2 border-blue-500 scale-105 shadow'
                        : 'bg-slate-50 border border-slate-200'
                    }`}
                  >
                    <div className="text-xl">{m.emoji}</div>
                    <div className="text-[11px] font-bold text-slate-800 mt-0.5">{m.name}</div>
                    <div className="text-[9px] text-slate-500 leading-tight mt-0.5">{m.note}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* 카운트 요약 */}
          <div className="flex items-center justify-between mb-3 pt-3 border-t border-slate-100">
            <div className="text-xs font-bold text-slate-700">📊 9 Layer 책임 분담</div>
            <div className="flex gap-1.5 text-[10px] font-mono">
              <span className="px-1.5 py-0.5 rounded bg-red-100 text-red-700 font-bold">
                회사 {youCount}
              </span>
              <span className="px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 font-bold">
                클라우드 {cloudCount}
              </span>
            </div>
          </div>

          {/* 9 Layer 표 */}
          <div className="space-y-1">
            {LAYERS.map((layer) => {
              const resp = responsibility[layer.key];
              const style = RESP_STYLE[resp];
              return (
                <div
                  key={layer.key}
                  className={`flex items-center justify-between rounded-md border px-3 py-1.5 transition-all duration-500 ${style.row}`}
                >
                  <div className="flex flex-col">
                    <span className="text-xs font-bold text-slate-800">{layer.name}</span>
                    <span className="text-[10px] text-slate-500 leading-tight">{layer.sub}</span>
                  </div>
                  <span className={`text-[10px] font-bold px-2 py-0.5 rounded ${style.badge}`}>
                    {style.label}
                  </span>
                </div>
              );
            })}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-red-500"></span>회사가 책임 (운영/패치/장애대응)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-blue-500"></span>클라우드가 책임 (SLA 보장)
            </span>
          </div>

          {/* SaaS 알람 박스 */}
          {showAlert && (
            <div className="mt-4 p-3 rounded-lg bg-blue-50 border-2 border-blue-400">
              <div className="flex items-center gap-2 text-blue-800 font-bold text-sm">
                <span className="text-lg">🎉</span>
                <span>SaaS — 9 layer 전부 vendor 책임</span>
              </div>
              <div className="text-[11px] text-blue-700 mt-1">
                회사는 사용자 관리만. 가장 편한 모델 = 가장 종속적인 모델.

            </div>
          )}
        </div>
      );

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-blue-500/15 border-l-2 border-blue-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-700 hover:text-blue-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. 클라우드 기초 &gt; Chapter 1. 컴퓨팅 모델</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IaaS / PaaS / SaaS</h1>
                  <p className="text-sm text-slate-500 mt-0.5">집·렌트·호텔 — 9 Layer로 보는 책임 분담 (On-prem → IaaS → PaaS → SaaS)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                modelKey={step.modelKey}
                responsibility={step.responsibility}
                showAlert={step.showAlert}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 text-sm text-blue-900">
                💡 다음(I-1-2)에서는 <strong>AWS / GCP / Azure</strong> 비교
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-blue-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-blue-600 text-white hover:bg-blue-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./I-1-2.html" className="text-blue-700 hover:text-blue-900 font-medium">I-1-2 AWS / GCP / Azure 비교 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
