<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Infra 학습 — AWS / GCP / Azure 3대 vendor 비교</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>☁️</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    I-1-2. AWS / GCP / Azure 3대 vendor 비교
    학습 목표: 3대 클라우드 vendor 강점/약점/선택 기준 이해
    핵심 비유: "3대 클라우드" — AWS(시장 1위 백화점), GCP(데이터/AI 전문점), Azure(MS 통합 매장)
    구조: 4단계 (AWS / GCP / Azure / 선택 가이드)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. AWS — "시장 1위 백화점" (서비스 다양)',
        desc: '시장 점유율 1위(약 30%대). 서비스 200+개로 가장 광범위. EC2/S3/RDS/Lambda 등 표준 빌딩 블록. 레퍼런스/인력풀이 가장 풍부하지만, 메뉴가 너무 많아 진입은 다소 복잡.',
        block: {
          kind: 'yaml',
          code: `# AWS 핵심 서비스 표 — "골격이 되는 5종"
compute:
  EC2:      "가상 서버 (Elastic Compute Cloud)"
  Lambda:   "서버리스 함수 (이벤트 기반 실행)"
  ECS/EKS:  "컨테이너 오케스트레이션 (자체/K8s)"

storage:
  S3:       "객체 스토리지 (사실상 표준)"
  EBS:      "EC2 부착 블록 스토리지"
  EFS:      "공유 파일 스토리지 (NFS)"

database:
  RDS:      "관리형 RDB (MySQL/Postgres/...)"
  DynamoDB: "관리형 NoSQL (key-value)"
  Aurora:   "AWS 자체 RDB (성능/HA 강화)"

network:
  VPC:      "가상 네트워크 (격리된 공간)"
  Route53:  "DNS"
  CloudFront: "CDN"

# 강점
- 서비스 수 압도적 (200+)
- 글로벌 리전 33개+ (가장 많음)
- 레퍼런스/커뮤니티 최다
- 스타트업 ~ 엔터프라이즈 모두 채택

# 약점: 메뉴 많아서 처음엔 어디서 시작할지 헷갈림`,
        },
        focus: 'aws',
      },
      {
        title: 'Step 2. GCP — "데이터/AI 전문점" (Google 노하우)',
        desc: 'Google이 검색/유튜브 운영하며 쌓은 데이터·인프라 노하우. BigQuery(서버리스 DW), Spanner(글로벌 RDB), Vertex AI(ML 플랫폼). K8s 종주국이라 GKE가 가장 자연스러움. 데이터·ML 워크로드에 강함.',
        block: {
          kind: 'yaml',
          code: `# GCP 핵심 서비스 + BigQuery 강점
compute:
  GCE:           "Google Compute Engine (VM)"
  Cloud Run:     "서버리스 컨테이너 (간편함 1위)"
  GKE:           "Google Kubernetes Engine (K8s 종주)"

storage:
  GCS:           "Google Cloud Storage (S3 대응)"

database:
  Cloud SQL:     "관리형 RDB"
  Spanner:       "글로벌 분산 RDB (강한 일관성 + 수평 확장)"
  Firestore:     "NoSQL (모바일/웹)"

data_ai:
  BigQuery:      "★ 서버리스 데이터 웨어하우스"
  Dataflow:      "스트리밍/배치 파이프라인 (Apache Beam)"
  Vertex AI:     "ML 학습/배포 통합 플랫폼"

# BigQuery 강점 — "왜 데이터 진영이 GCP를 좋아할까"
- 서버 관리 0 — 쿼리만 던지면 됨
- 스캔한 데이터양만 과금 (사용량 기반)
- 페타바이트(PB) 스케일을 초/분 단위로 처리
- SQL 표준 + ML.PREDICT 같은 SQL 안 ML 연동

# 강점: 데이터·ML, K8s, 네트워크 (글로벌 백본 빠름)
# 약점: 서비스 수는 AWS보다 적음, 한국 리전 일부 서비스 제한`,
        },
        focus: 'gcp',
      },
      {
        title: 'Step 3. Azure — "MS 통합 매장" (엔터프라이즈 친화)',
        desc: 'Microsoft 생태계와 깊게 통합 — Active Directory, Office 365, Windows Server, .NET. 이미 MS 환경 쓰는 대기업/공공이 자연스럽게 선택. AKS(K8s), Azure SQL, Cosmos DB. 엔터프라이즈 영업/지원 강함.',
        block: {
          kind: 'yaml',
          code: `# Azure 핵심 — "AD + AKS"
identity:
  Azure AD:       "★ 기업용 SSO/계정 관리 (Office 365와 통합)"
  RBAC:           "역할 기반 접근 제어"

compute:
  Azure VM:       "가상 서버"
  AKS:            "Azure Kubernetes Service"
  Functions:      "서버리스 함수"
  App Service:    "PaaS — 코드 푸시만 하면 호스팅"

storage:
  Blob Storage:   "객체 스토리지 (S3 대응)"

database:
  Azure SQL:      "관리형 SQL Server (MS 본가)"
  Cosmos DB:      "글로벌 분산 멀티모델 DB"

# AD + AKS 통합 — "엔터프라이즈가 좋아하는 이유"
apiVersion: v1
kind: Pod
metadata:
  name: enterprise-app
  annotations:
    azure.workload.identity/use: "true"   # AD 계정으로 K8s Pod 인증
spec:
  serviceAccountName: app-sa              # AD 그룹 ↔ K8s SA 매핑
  containers:
    - name: app
      image: myacr.azurecr.io/app:v1      # Azure Container Registry

# 강점
- MS 생태계 완전 통합 (AD/Office/Windows)
- 하이브리드 클라우드 (Azure Arc — 온프렘 + 클라우드)
- 엔터프라이즈 계약/지원 노하우

# 약점: MS 색채 강해 비-MS 스택은 다소 어색`,
        },
        focus: 'azure',
      },
      {
        title: 'Step 4. 선택 가이드 — "내 상황엔 어느 vendor?"',
        desc: '"스타트업/광범위한 서비스" → AWS. "데이터 분석·ML 중심" → GCP. "엔터프라이즈/MS 환경" → Azure. 최근엔 한 곳에 lock-in 피하려고 multi-cloud(2개 이상 동시 사용) 추세. 어느 곳을 고르든 IaC로 추상화하면 이전이 한결 수월.',
        block: {
          kind: 'shell',
          code: `# 의사결정 매트릭스
질문                                      → 답
─────────────────────────────────────────────────────
"어디서 시작할지 모르겠다"                → AWS (레퍼런스 풍부)
"데이터 웨어하우스 / ML 파이프라인"       → GCP (BigQuery + Vertex AI)
"K8s를 가장 자연스럽게"                   → GCP (GKE) 또는 AWS (EKS)
"이미 Office 365 / AD 쓰는 회사"          → Azure
"공공/금융 — MS 계약 기반"                → Azure
"서버리스 함수 가장 성숙"                 → AWS (Lambda)
"단순 컨테이너 호스팅"                    → GCP (Cloud Run, 진입 쉬움)
"한 vendor lock-in 피하고 싶다"           → multi-cloud + IaC

# 가격 / 리전 비교 (대략, 2025 기준)
항목              AWS              GCP              Azure
─────────────────────────────────────────────────────────────
시장 점유율       30%대 (1위)       10%대            20%대 (2위)
글로벌 리전 수    33+              40+ (zone)        60+
한국 리전         서울 (ap-ne-2)    서울              한국 중부/남부
무료 등급         12개월 + 항상      $300 크레딧       $200 크레딧
강점              서비스 다양       데이터/AI         엔터프라이즈
대표 서버리스     Lambda            Cloud Run         Functions

# 실무 팁 — "한 곳을 깊게, 나머지는 얕게"
1. 메인 vendor 1개 정해서 깊게 학습 (자격증도 이 곳)
2. 나머지 2개는 핵심 서비스 명칭/매핑만 외우기
   (S3 ↔ GCS ↔ Blob, EC2 ↔ GCE ↔ Azure VM ...)
3. IaC(Terraform) 익혀두면 vendor 전환 부담 ↓

# 다음(I-2-1)에서는 IaC 개론 — 건물 설계도`,
        },
        focus: 'choose',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const VENDORS = [
      { key: 'aws',    emoji: '🟧', name: 'AWS',   note: '시장 1위 (서비스 다양)' },
      { key: 'gcp',    emoji: '🟦', name: 'GCP',   note: '데이터/AI 강세' },
      { key: 'azure',  emoji: '🟪', name: 'Azure', note: '엔터프라이즈/MS 통합' },
      { key: 'choose', emoji: '🎯', name: '선택',  note: '어느 vendor?' },
    ];

    function VendorCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">☁️ 3대 클라우드 (AWS · GCP · Azure)</div>
          <div className="grid grid-cols-4 gap-2">
            {VENDORS.map((v) => {
              const isActive = focus === v.key;
              return (
                <div
                  key={v.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-blue-100 border-2 border-blue-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{v.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{v.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{v.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">AWS / GCP / Azure 3대 vendor 비교</h1>
                <p className="text-sm text-slate-500 mt-1">3대 클라우드 — 시장 1위 백화점 / 데이터·AI 전문점 / MS 통합 매장</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <VendorCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'choose' && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 mb-6 text-xs text-blue-900">
                💡 다음(I-2-1)에서는 IaC 개론 — 건물 설계도
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
