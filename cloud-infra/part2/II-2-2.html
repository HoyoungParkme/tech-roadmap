<body>
  <div id="root"></div>

  <!--
    II-2-2. DNS / CDN / LB / Ingress — 트래픽 라우팅 4 layer
    학습 목표: 요청이 사용자 → DNS → CDN → LB → Ingress → Pod로 흐르는 전체 경로를 단계별로 이해한다.
    핵심 비유: "안내데스크 + 우편 라우팅" — DNS(주소록) / CDN(배달 캐시) / LB(접수처) / Ingress(층별 안내)
    패턴: fastapi v1 패턴 — 좌(LiveDataPane: 라우팅 흐름도) / 우(VSCode CodeViewer: Terraform/yaml)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 (사용자 → DNS → CDN → LB → Ingress → Pod)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. DNS — "도메인을 IP로 해석하는 주소록"',
        desc: 'Route53 / Cloud DNS는 example.com을 IP로 변환. 사용자는 도메인을 외우지만, 네트워크는 IP로 라우팅된다. A record(IPv4 직접) / CNAME(alias) / Alias(AWS 무료 alias). TTL로 클라이언트 캐싱 시간 조정, health check + failover로 장애 시 자동 전환.',
        focus: 'dns',
        flow: {
          user:    { state: 'active' },
          dns:     { state: 'active', detail: 'Route53\napi.example.com\n→ 203.0.113.10' },
          cdn:     { state: 'idle' },
          lb:      { state: 'idle' },
          ingress: { state: 'idle' },
          pod:     { state: 'idle' },
        },
        showCompare: false,
        showFinalNote: false,
        code: {
          lang: 'hcl',
          filename: 'route53.tf',
          lines: [
            '# Terraform — Route53 hosted zone + alias record',
            '# 도메인: api.example.com → ALB로 라우팅',
            '',
            'resource "aws_route53_zone" "main" {',
            '  name = "example.com"',
            '}',
            '',
            '# Alias record — ALB로 무료 alias (AWS 전용)',
            'resource "aws_route53_record" "api" {',
            '  zone_id = aws_route53_zone.main.zone_id',
            '  name    = "api.example.com"',
            '  type    = "A"',
            '',
            '  alias {',
            '    name                   = aws_lb.main.dns_name',
            '    zone_id                = aws_lb.main.zone_id',
            '    evaluate_target_health = true   # health check 결과로 failover',
            '  }',
            '}',
            '',
            '# 일반 A record — TTL 60초 (캐시 짧게 → 빠른 전환)',
            'resource "aws_route53_record" "www" {',
            '  zone_id = aws_route53_zone.main.zone_id',
            '  name    = "www.example.com"',
            '  type    = "A"',
            '  ttl     = 60',
            '  records = ["203.0.113.10"]',
            '}',
            '',
            '# Health check + failover policy',
            'resource "aws_route53_health_check" "api" {',
            '  fqdn              = "api.example.com"',
            '  port              = 443',
            '  type              = "HTTPS"',
            '  resource_path     = "/health"',
            '  failure_threshold = 3',
            '  request_interval  = 30',
            '}',
            '',
            '# 라우팅 정책',
            '# - Simple    : 단일 endpoint',
            '# - Failover  : primary 죽으면 secondary',
            '# - Weighted  : 80/20 트래픽 분배 (canary)',
            '# - Latency   : 가장 가까운 region',
            '# - Geo       : 국가별 분기 (KR → ap-northeast-2)',
          ],
          highlight: [9, 14, 15, 16, 17, 31],
        },
      },
      {
        title: 'Step 2. CDN — "엣지 노드에 캐시해서 origin 부하 ↓"',
        desc: 'CloudFront / Cloud CDN은 전 세계 edge node에 정적 자산(이미지/JS/CSS/비디오)을 캐시. 사용자는 가장 가까운 edge에서 받음 → latency ↓, origin 부하 ↓. cache hit이면 origin까지 안 가고, miss면 origin pull. TLS 종료 + HTTP/2/3 + WAF/Shield 결합으로 DDoS 방어.',
        focus: 'cdn',
        flow: {
          user:    { state: 'done' },
          dns:     { state: 'done' },
          cdn:     { state: 'active', detail: 'CloudFront edge\n95% cache hit\n5% origin pull' },
          lb:      { state: 'idle' },
          ingress: { state: 'idle' },
          pod:     { state: 'idle' },
        },
        showCompare: false,
        showFinalNote: false,
        code: {
          lang: 'hcl',
          filename: 'cloudfront.tf',
          lines: [
            '# Terraform — CloudFront distribution + cache policy',
            'resource "aws_cloudfront_distribution" "cdn" {',
            '  enabled             = true',
            '  is_ipv6_enabled     = true',
            '  default_root_object = "index.html"',
            '  aliases             = ["cdn.example.com"]',
            '  http_version        = "http2and3"      # HTTP/3 지원',
            '',
            '  # origin — S3 또는 ALB',
            '  origin {',
            '    domain_name = aws_s3_bucket.assets.bucket_regional_domain_name',
            '    origin_id   = "s3-assets"',
            '    s3_origin_config {',
            '      origin_access_identity = aws_cloudfront_origin_access_identity.oai.cloudfront_access_identity_path',
            '    }',
            '  }',
            '',
            '  default_cache_behavior {',
            '    target_origin_id       = "s3-assets"',
            '    viewer_protocol_policy = "redirect-to-https"   # TLS 강제',
            '    allowed_methods        = ["GET", "HEAD"]',
            '    cached_methods         = ["GET", "HEAD"]',
            '    cache_policy_id        = aws_cloudfront_cache_policy.long.id',
            '    compress               = true                  # gzip/brotli',
            '  }',
            '',
            '  viewer_certificate {',
            '    acm_certificate_arn      = aws_acm_certificate.cdn.arn',
            '    ssl_support_method       = "sni-only"',
            '    minimum_protocol_version = "TLSv1.2_2021"',
            '  }',
            '',
            '  price_class = "PriceClass_200"   # 북미/유럽/아시아 edge',
            '}',
            '',
            '# Cache policy — 정적 자산은 1년 캐시',
            'resource "aws_cloudfront_cache_policy" "long" {',
            '  name        = "static-1year"',
            '  default_ttl = 31536000   # 1년',
            '  max_ttl     = 31536000',
            '  min_ttl     = 0',
            '}',
            '',
            '# 효과',
            '# - latency : origin(서울) → 미국 200ms → edge 캐시 20ms',
            '# - origin 부하 : 95%+ hit → RPS 1/20',
            '# - 비용 : edge 전송 단가가 origin 직접보다 저렴',
          ],
          highlight: [7, 20, 24, 39],
        },
      },
      {
        title: 'Step 3. LB (L4 vs L7) — "접수처 — 어느 서버로 보낼지"',
        desc: 'L4(NLB)는 TCP/UDP 패스스루 — 빠르고 단순, 게임/gRPC/정적 IP 필요할 때. L7(ALB)은 HTTP 단위로 path/host/header 라우팅 + sticky session + TLS 종료. target group + health check로 죽은 인스턴스 자동 제외. GCP는 GCLB가 L4/L7 통합.',
        focus: 'lb_l4_l7',
        flow: {
          user:    { state: 'done' },
          dns:     { state: 'done' },
          cdn:     { state: 'done' },
          lb:      { state: 'active', detail: 'ALB (L7)\npath /admin/* → tg-admin\npath /* → tg-api' },
          ingress: { state: 'idle' },
          pod:     { state: 'idle' },
        },
        showCompare: true,
        showFinalNote: false,
        code: {
          lang: 'hcl',
          filename: 'alb.tf',
          lines: [
            '# Terraform — ALB (L7) + target group',
            'resource "aws_lb" "main" {',
            '  name               = "api-alb"',
            '  internal           = false',
            '  load_balancer_type = "application"        # L7 (HTTP/HTTPS)',
            '  subnets            = aws_subnet.public[*].id',
            '  security_groups    = [aws_security_group.alb.id]',
            '}',
            '',
            'resource "aws_lb_target_group" "api" {',
            '  name     = "api-tg"',
            '  port     = 8080',
            '  protocol = "HTTP"',
            '  vpc_id   = aws_vpc.main.id',
            '',
            '  health_check {',
            '    path                = "/health"',
            '    interval            = 30',
            '    healthy_threshold   = 2',
            '    unhealthy_threshold = 3',
            '    matcher             = "200"',
            '  }',
            '',
            '  stickiness {',
            '    type            = "lb_cookie"',
            '    cookie_duration = 3600        # 같은 사용자 → 같은 인스턴스 1시간',
            '    enabled         = true',
            '  }',
            '}',
            '',
            'resource "aws_lb_listener" "https" {',
            '  load_balancer_arn = aws_lb.main.arn',
            '  port              = 443',
            '  protocol          = "HTTPS"',
            '  certificate_arn   = aws_acm_certificate.api.arn   # TLS 종료',
            '',
            '  default_action {',
            '    type             = "forward"',
            '    target_group_arn = aws_lb_target_group.api.arn',
            '  }',
            '}',
            '',
            '# host/path 기반 라우팅 rule',
            'resource "aws_lb_listener_rule" "admin" {',
            '  listener_arn = aws_lb_listener.https.arn',
            '  priority     = 100',
            '  action {',
            '    type             = "forward"',
            '    target_group_arn = aws_lb_target_group.admin.arn',
            '  }',
            '  condition {',
            '    path_pattern { values = ["/admin/*"] }',
            '  }',
            '}',
            '',
            '# L4 (NLB) — TCP 그대로 패스스루',
            '# resource "aws_lb" "tcp" {',
            '#   load_balancer_type = "network"',
            '#   # gRPC, 게임 서버, 정적 IP 필요할 때',
            '# }',
          ],
          highlight: [5, 16, 24, 35, 43, 53],
        },
      },
      {
        title: 'Step 4. Ingress — "K8s 안의 층별 안내판"',
        desc: 'K8s Ingress는 클러스터 내부 L7 LB. 외부 트래픽 → Ingress Controller(nginx/traefik/AWS LB Ctrl) → Service → Pod. host(api.example.com) + path(/v1/*)로 라우팅, TLS 종료, cert-manager 연동으로 Let\'s Encrypt 인증서 자동 발급/갱신. AWS LB Controller는 Ingress를 ALB로 자동 생성.',
        focus: 'ingress',
        flow: {
          user:    { state: 'done' },
          dns:     { state: 'done' },
          cdn:     { state: 'done' },
          lb:      { state: 'done' },
          ingress: { state: 'active', detail: 'nginx-ingress\nhost api → /v1 → svc-v1\ncert-manager TLS' },
          pod:     { state: 'active', detail: 'api-v1-svc\n→ Pod (3 replicas)' },
        },
        showCompare: false,
        showFinalNote: true,
        code: {
          lang: 'yaml',
          filename: 'ingress.yaml',
          lines: [
            '# K8s Ingress — host/path 라우팅 + TLS',
            'apiVersion: networking.k8s.io/v1',
            'kind: Ingress',
            'metadata:',
            '  name: api-ingress',
            '  namespace: production',
            '  annotations:',
            '    # AWS Load Balancer Controller — 자동 ALB 생성',
            '    kubernetes.io/ingress.class: alb',
            '    alb.ingress.kubernetes.io/scheme: internet-facing',
            '    alb.ingress.kubernetes.io/target-type: ip',
            '    alb.ingress.kubernetes.io/listen-ports: \'[{"HTTPS":443}]\'',
            '    alb.ingress.kubernetes.io/ssl-redirect: \'443\'',
            '    # cert-manager — Let\'s Encrypt 자동 발급/갱신',
            '    cert-manager.io/cluster-issuer: letsencrypt-prod',
            'spec:',
            '  ingressClassName: alb',
            '  tls:',
            '    - hosts: [api.example.com]',
            '      secretName: api-tls          # cert-manager가 자동 채움',
            '  rules:',
            '    - host: api.example.com',
            '      http:',
            '        paths:',
            '          - path: /v1',
            '            pathType: Prefix',
            '            backend:',
            '              service:',
            '                name: api-v1-svc',
            '                port: { number: 80 }',
            '          - path: /v2',
            '            pathType: Prefix',
            '            backend:',
            '              service:',
            '                name: api-v2-svc',
            '                port: { number: 80 }',
            '    - host: admin.example.com',
            '      http:',
            '        paths:',
            '          - path: /',
            '            pathType: Prefix',
            '            backend:',
            '              service:',
            '                name: admin-svc',
            '                port: { number: 80 }',
            '',
            '# 트래픽 흐름 (전체 4 layer)',
            '# 1) DNS     : api.example.com → ALB IP',
            '# 2) CDN     : 정적 자산 → edge → S3',
            '# 3) LB      : ALB → Ingress Controller pod',
            '# 4) Ingress : host/path 매칭 → api-v1-svc → Pod',
            '',
            '# 주요 Ingress Controller 비교',
            '# - nginx-ingress : 가장 대중적, 거의 모든 기능',
            '# - traefik       : 자동 디스커버리, 대시보드 UI',
            '# - AWS LB Ctrl   : Ingress → ALB 자동 (AWS 네이티브)',
            '# - istio gateway : 서비스 메시 통합 (mTLS/트래픽 분할)',
          ],
          highlight: [9, 15, 18, 25, 47, 48, 49, 50],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 라우팅 흐름 노드 메타
    // ─────────────────────────────────────────────────────
    const FLOW_NODES = [
      { key: 'user',    emoji: '🧑', name: 'User',          sub: '브라우저 / 앱' },
      { key: 'dns',     emoji: '🌐', name: 'DNS',           sub: 'Route53 / Cloud DNS' },
      { key: 'cdn',     emoji: '🚀', name: 'CDN',           sub: 'CloudFront edge' },
      { key: 'lb',      emoji: '⚖️', name: 'LB (L4/L7)',    sub: 'ALB / NLB' },
      { key: 'ingress', emoji: '🔀', name: 'Ingress',       sub: 'K8s Ingress Ctrl' },
      { key: 'pod',     emoji: '📦', name: 'Service / Pod', sub: 'backend' },
    ];

    const NODE_STYLE = {
      idle:   { card: 'bg-slate-50 border-slate-200',     emoji: 'opacity-40',  text: 'text-slate-400', badge: 'bg-slate-100 text-slate-400',  label: '대기' },
      active: { card: 'bg-blue-50 border-blue-500',       emoji: '',            text: 'text-blue-800',  badge: 'bg-blue-600 text-white',       label: '처리 중' },
      done:   { card: 'bg-emerald-50 border-emerald-300', emoji: '',            text: 'text-emerald-700', badge: 'bg-emerald-100 text-emerald-700', label: '통과' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 트래픽 라우팅 흐름도
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ flow, showCompare, showFinalNote }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🚪 트래픽 라우팅 흐름도</h2>
            <span className="text-[10px] text-slate-400 font-mono">user → DNS → CDN → LB → Ingress → Pod</span>
          </div>

          <div className="space-y-2">
            {FLOW_NODES.map((n, i) => {
              const d = flow[n.key];
              const style = NODE_STYLE[d.state];
              const isActive = d.state === 'active';
              return (
                <div key={n.key}>
                  <div
                    className={`rounded-lg border-2 p-3 transition-all duration-500 ${style.card} ${isActive ? 'animate-pulse shadow-md' : ''}`}
                  >
                    <div className="flex items-center justify-between">
                      <div className="flex items-center gap-2">
                        <span className={`text-xl ${style.emoji}`} aria-hidden="true">{n.emoji}</span>
                        <div>
                          <div className={`text-sm font-bold ${style.text}`}>{n.name}</div>
                          <div className="text-[10px] text-slate-500">{n.sub}</div>
                        </div>
                      </div>
                      <span className={`text-[10px] font-bold px-2 py-0.5 rounded ${style.badge}`}>
                        {style.label}
                      </span>
                    </div>
                    {d.detail && d.state !== 'idle' && (
                      <div className={`mt-2 pl-9 text-[11px] font-mono whitespace-pre-line ${style.text}`}>
                        {d.detail}
                      </div>
                    )}
                  </div>

                  {/* 화살표 (마지막 노드 제외) */}
                  {i < FLOW_NODES.length - 1 && (
                    <div className="flex justify-center py-0.5">
                      <span className={`text-lg ${flow[FLOW_NODES[i + 1].key].state !== 'idle' ? 'text-blue-500' : 'text-slate-300'}`}>↓</span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* L4 vs L7 비교표 (Step 3) */}
          {showCompare && (
            <div className="mt-4 p-3 rounded-lg bg-blue-50 border border-blue-200">
              <div className="text-xs font-bold text-blue-900 mb-2">⚖️ L4 (NLB) vs L7 (ALB) 비교</div>
              <div className="grid grid-cols-2 gap-2 text-[11px]">
                <div className="bg-white rounded p-2 border border-slate-200">
                  <div className="font-bold text-slate-700 mb-1">L4 — NLB</div>
                  <div className="text-slate-600">• TCP/UDP 패스스루</div>
                  <div className="text-slate-600">• 빠름, 단순</div>
                  <div className="text-slate-600">• 정적 IP 가능</div>
                  <div className="text-slate-600">• 게임 / gRPC</div>
                </div>
                <div className="bg-white rounded p-2 border border-slate-200">
                  <div className="font-bold text-slate-700 mb-1">L7 — ALB</div>
                  <div className="text-slate-600">• HTTP path/host 라우팅</div>
                  <div className="text-slate-600">• TLS 종료</div>
                  <div className="text-slate-600">• Sticky session</div>
                  <div className="text-slate-600">• 일반 웹 / API</div>
                </div>
              </div>
            </div>
          )}

          {/* 최종 마무리 노트 (Step 4) */}
          {showFinalNote && (
            <div className="mt-4 p-3 rounded-lg bg-blue-50 border-2 border-blue-400">
              <div className="text-xs font-bold text-blue-900 mb-1">🎯 4 layer 완성</div>
              <div className="text-[11px] text-blue-800 leading-relaxed">
                DNS(주소록) → CDN(배달 캐시) → LB(접수처) → Ingress(층별 안내) → Pod(담당자).
                각 layer는 독립적으로 확장 가능 — Cloud Native 트래픽 라우팅의 표준 패턴.
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-slate-200 border border-slate-300"></span>대기</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-blue-500"></span>처리 중</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-300"></span>통과</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-blue-500/10 border-l-2 border-blue-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-700 hover:text-blue-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 컴퓨팅 &amp; 네트워크 &gt; Chapter 2. 트래픽 라우팅</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">DNS / CDN / LB / Ingress</h1>
                  <p className="text-sm text-slate-500 mt-0.5">안내데스크 + 우편 라우팅 — 4 layer로 흐르는 사용자 요청</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                flow={step.flow}
                showCompare={step.showCompare}
                showFinalNote={step.showFinalNote}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 text-sm text-blue-900">
                💡 Part II 완성. 다음(III-1-1)에서는 <strong>Managed DB</strong> — RDS / Cloud SQL / Spanner / DynamoDB
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-blue-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-blue-600 text-white hover:bg-blue-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-2-1.html" className="text-slate-500 hover:text-slate-700">&larr; II-2-1 VPC</a>
              <a href="../part3/III-1-1.html" className="text-blue-700 hover:text-blue-900 font-medium">III-1-1 Managed DB &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
