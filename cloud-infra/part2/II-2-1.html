<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Infra 학습 — II-2-1. VPC + Subnet + SG + NAT/Peering</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🏘️</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">

<body>
  <div id="root"></div>

  <!--
    II-2-1. VPC + Subnet + Security Group + NAT/Peering
    학습 목표: 클라우드 네트워크 격리의 4대 요소 — VPC / Subnet / SG / NAT·Peering 토폴로지를 단계별로 시각화한다.
    핵심 비유: "사설 동네" — VPC(동네 담장) / Subnet(공용·사설 구역) / Security Group(집 출입 규칙) / NAT·Peering(우체국·옆동네 다리)
    패턴: 좌(LiveDataPane VPC 토폴로지) / 우(VSCode CodeViewer Terraform) — 3000ms · 4 컨트롤
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // STEPS — 4 단계 (vpc_concept / subnet / security_group / nat_peering)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        focus: 'vpc_concept',
        title: 'Step 1. VPC — "사설 동네 하나 만들기"',
        desc: 'AWS account 안에 격리된 가상 네트워크 1개를 짓는다. CIDR 10.0.0.0/16 — 65,536개 사설 IP 풀. region 단위라 다른 region·다른 account VPC와 기본 차단된다. 사설 IP 범위(10.x / 172.16-31.x / 192.168.x)에서만 선택 가능.',
        topology: { vpcOnly: true, showSubnets: false, showSG: false, showNat: false, showPeering: false },
        code: {
          lang: 'yaml',
          filename: 'vpc.tf',
          lines: [
            '# Terraform — VPC 정의 (사설 동네 = 10.0.0.0/16)',
            'resource "aws_vpc" "main" {',
            '  cidr_block           = "10.0.0.0/16"   # 65,536개 IP',
            '  enable_dns_support   = true',
            '  enable_dns_hostnames = true',
            '',
            '  tags = {',
            '    Name = "prod-vpc"',
            '    Env  = "production"',
            '  }',
            '}',
            '',
            '# CIDR 선택 가이드 (사설 IP 대역)',
            '#   10.0.0.0/8     → 대규모 (1,600만 IP)',
            '#   172.16.0.0/12  → 중규모 (100만 IP)',
            '#   192.168.0.0/16 → 소규모 (65k IP)',
            '',
            '# region 단위로 격리된다',
            '#  - 다른 region VPC와 기본 차단',
            '#  - 다른 account VPC와도 차단',
            '#  - VPC 안 → 자유 통신 / 밖 → 명시 라우팅 필요',
          ],
          highlight: [3, 13, 14, 15],
        },
      },
      {
        focus: 'subnet',
        title: 'Step 2. Subnet — "공용 구역 / 사설 구역 분리"',
        desc: 'VPC를 더 작은 CIDR로 쪼갠다. public subnet(10.0.1.0/24)은 Internet Gateway 라우팅 → ALB·Bastion 배치. private subnet(10.0.2.0/24)은 외부 직접 접근 불가 → App·RDS 배치. AZ별 분산으로 가용성 확보.',
        topology: { vpcOnly: false, showSubnets: true, showSG: false, showNat: false, showPeering: false },
        code: {
          lang: 'yaml',
          filename: 'subnet.tf',
          lines: [
            '# 공용 subnet — ALB / Bastion 배치',
            'resource "aws_subnet" "public" {',
            '  vpc_id                  = aws_vpc.main.id',
            '  cidr_block              = "10.0.1.0/24"   # 256 IP',
            '  availability_zone       = "ap-northeast-2a"',
            '  map_public_ip_on_launch = true',
            '  tags = { Name = "public", Tier = "public" }',
            '}',
            '',
            '# 사설 subnet — App / RDS 배치',
            'resource "aws_subnet" "private" {',
            '  vpc_id            = aws_vpc.main.id',
            '  cidr_block        = "10.0.2.0/24"',
            '  availability_zone = "ap-northeast-2a"',
            '  tags = { Name = "private", Tier = "private" }',
            '}',
            '',
            '# Internet Gateway — 공용 subnet ↔ 인터넷',
            'resource "aws_internet_gateway" "igw" {',
            '  vpc_id = aws_vpc.main.id',
            '}',
            '',
            'resource "aws_route_table" "public" {',
            '  vpc_id = aws_vpc.main.id',
            '  route {',
            '    cidr_block = "0.0.0.0/0"',
            '    gateway_id = aws_internet_gateway.igw.id',
            '  }',
            '}',
            '',
            '# 배치 원칙',
            '#  ALB / NAT GW / Bastion → public subnet',
            '#  App / DB / Cache       → private subnet',
            '#  같은 tier는 AZ별 분산  → 1개 AZ 장애 시 가용성',
          ],
          highlight: [4, 13, 19, 27],
        },
      },
      {
        focus: 'security_group',
        title: 'Step 3. Security Group — "집 출입 규칙"',
        desc: '인스턴스(EC2/RDS/ELB) 단위 가상 방화벽. inbound·outbound 규칙으로 접근 제어 — 80/443은 전체 허용, SSH 22는 내 IP만. stateful이라 응답은 자동 허용. SG는 인스턴스 단위, NACL은 subnet 단위 + stateless로 다르다.',
        topology: { vpcOnly: false, showSubnets: true, showSG: true, showNat: false, showPeering: false },
        sgRules: [
          { dir: 'IN',  port: 'TCP 80',  src: '0.0.0.0/0',     action: 'ALLOW',  note: 'HTTP 전체 허용' },
          { dir: 'IN',  port: 'TCP 443', src: '0.0.0.0/0',     action: 'ALLOW',  note: 'HTTPS 전체 허용' },
          { dir: 'IN',  port: 'TCP 22',  src: '203.0.113.5/32', action: 'ALLOW', note: 'SSH 내 IP만' },
          { dir: 'IN',  port: '*',       src: '0.0.0.0/0',     action: 'DENY',   note: '나머지 묵시 차단' },
          { dir: 'OUT', port: 'ALL',     src: '0.0.0.0/0',     action: 'ALLOW',  note: '아웃바운드 전체' },
        ],
        code: {
          lang: 'yaml',
          filename: 'security_group.tf',
          lines: [
            '# Web SG — 80 / 443 전체 허용 + SSH 내 IP만',
            'resource "aws_security_group" "web" {',
            '  name   = "web-sg"',
            '  vpc_id = aws_vpc.main.id',
            '',
            '  ingress {                          # HTTP',
            '    from_port   = 80',
            '    to_port     = 80',
            '    protocol    = "tcp"',
            '    cidr_blocks = ["0.0.0.0/0"]',
            '  }',
            '  ingress {                          # HTTPS',
            '    from_port   = 443',
            '    to_port     = 443',
            '    protocol    = "tcp"',
            '    cidr_blocks = ["0.0.0.0/0"]',
            '  }',
            '  ingress {                          # SSH only my IP',
            '    from_port   = 22',
            '    to_port     = 22',
            '    protocol    = "tcp"',
            '    cidr_blocks = ["203.0.113.5/32"]',
            '  }',
            '  egress {                           # 아웃바운드 전체',
            '    from_port   = 0',
            '    to_port     = 0',
            '    protocol    = "-1"',
            '    cidr_blocks = ["0.0.0.0/0"]',
            '  }',
            '}',
            '',
            '# SG vs NACL',
            '#  SG   : 인스턴스 단위 / stateful  / allow only',
            '#  NACL : subnet 단위    / stateless / allow + deny',
          ],
          highlight: [10, 16, 22, 28],
        },
      },
      {
        focus: 'nat_peering',
        title: 'Step 4. NAT Gateway + VPC Peering — "외부 / 다른 VPC 연결"',
        desc: '사설 subnet 인스턴스가 외부(패키지 다운로드)로 나갈 때만 NAT Gateway 통과 — 외부에서 들어오는 건 차단. 다른 VPC와 통신은 VPC Peering(1:1) 또는 Transit Gateway(허브). VPN/Direct Connect는 온프레미스 연결용.',
        topology: { vpcOnly: false, showSubnets: true, showSG: true, showNat: true, showPeering: true },
        code: {
          lang: 'yaml',
          filename: 'nat_peering.tf',
          lines: [
            '# NAT Gateway — 사설 → 인터넷 단방향',
            'resource "aws_eip" "nat" { domain = "vpc" }',
            '',
            'resource "aws_nat_gateway" "main" {',
            '  allocation_id = aws_eip.nat.id',
            '  subnet_id     = aws_subnet.public.id   # 공용에 위치',
            '  tags = { Name = "prod-nat" }',
            '}',
            '',
            'resource "aws_route_table" "private" {',
            '  vpc_id = aws_vpc.main.id',
            '  route {',
            '    cidr_block     = "0.0.0.0/0"',
            '    nat_gateway_id = aws_nat_gateway.main.id',
            '  }',
            '}',
            '',
            '# VPC Peering — 옆동네(다른 VPC)와 1:1 연결',
            'resource "aws_vpc_peering_connection" "to_data" {',
            '  vpc_id      = aws_vpc.main.id',
            '  peer_vpc_id = aws_vpc.data_lake.id   # 10.20.0.0/16',
            '  auto_accept = true',
            '}',
            '',
            'resource "aws_route" "to_data_vpc" {',
            '  route_table_id            = aws_route_table.private.id',
            '  destination_cidr_block    = "10.20.0.0/16"',
            '  vpc_peering_connection_id = aws_vpc_peering_connection.to_data.id',
            '}',
            '',
            '# 연결 옵션 비교',
            '#  NAT Gateway      : 사설 → 인터넷 (단방향, 시간당 과금)',
            '#  Internet Gateway : 공용 ↔ 인터넷 (양방향)',
            '#  VPC Peering      : VPC ↔ VPC (1:1, transitive 불가)',
            '#  Transit Gateway  : 다수 VPC 허브 (mesh, 비싸지만 깔끔)',
            '#  VPN / DX         : 온프레미스 ↔ VPC',
          ],
          highlight: [4, 14, 19, 25],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // LiveDataPane — VPC 네트워크 토폴로지 시각화
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const { topology, sgRules, focus } = step;
      const { vpcOnly, showSubnets, showSG, showNat, showPeering } = topology;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🏘️ VPC 네트워크 토폴로지</h2>
            <span className="text-[10px] text-slate-400 font-mono">ap-northeast-2 · live</span>
          </div>

          {/* 인터넷 구름 */}
          <div className="flex justify-center mb-2">
            <div className="px-4 py-1.5 bg-slate-100 border border-slate-300 rounded-full text-xs text-slate-600 font-mono flex items-center gap-1">
              <span>🌐</span><span>Internet (0.0.0.0/0)</span>
            </div>
          </div>

          {/* 인터넷 → IGW 화살표 */}
          {showSubnets && (
            <div className="flex justify-center text-slate-400 text-xs">↓ IGW</div>
          )}
          {!showSubnets && (
            <div className="flex justify-center text-slate-300 text-xs">↓</div>
          )}

          {/* VPC 큰 박스 */}
          <div
            className={`relative rounded-lg border-2 p-3 transition-all duration-500 ${
              focus === 'vpc_concept'
                ? 'border-blue-500 bg-blue-50 shadow-md'
                : 'border-blue-300 bg-blue-50/40'
            }`}
          >
            <div className="absolute -top-2.5 left-3 bg-white px-2 text-[10px] font-bold text-blue-700 font-mono">
              VPC · 10.0.0.0/16
            </div>

            {/* Step 1 — VPC만 */}
            {vpcOnly && (
              <div className="py-8 text-center">
                <div className="text-3xl mb-1">🏘️</div>
                <div className="text-sm font-bold text-blue-800">prod-vpc</div>
                <div className="text-xs text-blue-600 font-mono mt-1">65,536 사설 IP</div>
                <div className="text-[10px] text-slate-500 mt-2">region 단위 격리 · 다른 VPC 기본 차단</div>
              </div>
            )}

            {/* Step 2~ — Subnets */}
            {showSubnets && (
              <div className="grid grid-cols-2 gap-2 mt-2">
                {/* Public subnet */}
                <div
                  className={`rounded-lg border-2 p-2 transition-all ${
                    focus === 'subnet'
                      ? 'border-emerald-500 bg-emerald-50 shadow'
                      : 'border-emerald-300 bg-emerald-50/60'
                  }`}
                >
                  <div className="text-[10px] font-bold text-emerald-700 font-mono mb-1">
                    🟢 public · 10.0.1.0/24
                  </div>
                  <div className="space-y-1">
                    <div className={`text-[10px] bg-white border rounded px-1.5 py-0.5 font-mono flex items-center gap-1 ${showSG && focus === 'security_group' ? 'border-blue-400 ring-1 ring-blue-300' : 'border-emerald-200'}`}>
                      <span>⚖️</span><span>ALB</span>
                      {showSG && <span className="ml-auto text-[9px] text-blue-600">🔐SG</span>}
                    </div>
                    <div className="text-[10px] bg-white border border-emerald-200 rounded px-1.5 py-0.5 font-mono flex items-center gap-1">
                      <span>🛡️</span><span>Bastion</span>
                    </div>
                    {showNat && (
                      <div className="text-[10px] bg-amber-50 border border-amber-400 rounded px-1.5 py-0.5 font-mono flex items-center gap-1 animate-pulse">
                        <span>📮</span><span>NAT GW</span>
                      </div>
                    )}
                  </div>
                </div>

                {/* Private subnet */}
                <div
                  className={`rounded-lg border-2 p-2 transition-all ${
                    focus === 'subnet'
                      ? 'border-slate-500 bg-slate-100 shadow'
                      : 'border-slate-300 bg-slate-50'
                  }`}
                >
                  <div className="text-[10px] font-bold text-slate-700 font-mono mb-1">
                    🔒 private · 10.0.2.0/24
                  </div>
                  <div className="space-y-1">
                    <div className={`text-[10px] bg-white border rounded px-1.5 py-0.5 font-mono flex items-center gap-1 ${showSG && focus === 'security_group' ? 'border-blue-400 ring-1 ring-blue-300' : 'border-slate-200'}`}>
                      <span>⚙️</span><span>App (EC2)</span>
                      {showSG && <span className="ml-auto text-[9px] text-blue-600">🔐SG</span>}
                    </div>
                    <div className="text-[10px] bg-white border border-slate-200 rounded px-1.5 py-0.5 font-mono flex items-center gap-1">
                      <span>🗄️</span><span>RDS</span>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* Step 2~ — NAT 라우팅 화살표 안내 */}
            {showNat && (
              <div className="mt-2 text-[10px] text-amber-700 bg-amber-50 border border-amber-300 rounded px-2 py-1 font-mono">
                📮 NAT: private → public(NAT GW) → IGW → 🌐 (단방향)
              </div>
            )}
          </div>

          {/* Step 4 — VPC Peering: 옆 VPC */}
          {showPeering && (
            <div className="mt-3 flex items-center gap-2">
              <div className="flex-1 border-t-2 border-dashed border-fuchsia-400 relative">
                <span className="absolute -top-2.5 left-1/2 -translate-x-1/2 bg-white px-1.5 text-[10px] font-bold text-fuchsia-600 font-mono">
                  ↔ VPC Peering
                </span>
              </div>
            </div>
          )}
          {showPeering && (
            <div className="rounded-lg border-2 border-fuchsia-300 bg-fuchsia-50/60 p-3 mt-1">
              <div className="text-[10px] font-bold text-fuchsia-700 font-mono">
                VPC · data-lake · 10.20.0.0/16
              </div>
              <div className="text-[10px] text-fuchsia-600 mt-1">
                다른 VPC — 1:1 직접 연결 (transitive 불가)
              </div>
            </div>
          )}

          {/* Step 3 — Security Group 룰 표 */}
          {showSG && sgRules && (
            <div className="mt-4 rounded-lg border-2 border-blue-300 bg-blue-50/60 p-3">
              <div className="text-[11px] font-bold text-blue-800 mb-2 flex items-center gap-1">
                <span>🔐</span><span>Security Group · web-sg (인스턴스 단위 방화벽)</span>
              </div>
              <div className="overflow-hidden rounded border border-blue-200 bg-white">
                <table className="w-full text-[10px] font-mono">
                  <thead className="bg-blue-100 text-blue-800">
                    <tr>
                      <th className="px-2 py-1 text-left">방향</th>
                      <th className="px-2 py-1 text-left">포트</th>
                      <th className="px-2 py-1 text-left">소스</th>
                      <th className="px-2 py-1 text-left">동작</th>
                      <th className="px-2 py-1 text-left">설명</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-blue-100">
                    {sgRules.map((r, i) => {
                      const isAllow = r.action === 'ALLOW';
                      return (
                        <tr key={i} className={isAllow ? '' : 'bg-rose-50/60'}>
                          <td className="px-2 py-1">
                            <span className={`inline-block px-1 rounded ${r.dir === 'IN' ? 'bg-emerald-100 text-emerald-700' : 'bg-sky-100 text-sky-700'}`}>
                              {r.dir}
                            </span>
                          </td>
                          <td className="px-2 py-1 text-slate-700">{r.port}</td>
                          <td className="px-2 py-1 text-slate-700">{r.src}</td>
                          <td className="px-2 py-1">
                            <span className={`inline-block px-1.5 rounded font-bold ${isAllow ? 'bg-emerald-200 text-emerald-800' : 'bg-rose-200 text-rose-800'}`}>
                              {r.action}
                            </span>
                          </td>
                          <td className="px-2 py-1 text-slate-500">{r.note}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div className="text-[10px] text-blue-700 mt-2">
                stateful — 들어온 응답은 자동 허용. 거부 룰은 묵시(allow 외 전부 차단).
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-blue-300"></span>VPC</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-400"></span>public</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-slate-400"></span>private</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-amber-400"></span>NAT GW</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-fuchsia-400"></span>Peering</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        codeRef.current.removeAttribute('data-highlighted');
        codeRef.current.className = `language-${code.lang}`;
        codeRef.current.textContent = code.lines.join('\n');
        window.hljs.highlightElement(codeRef.current);
        setRenderedLines(codeRef.current.innerHTML.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-blue-500/10 border-l-2 border-blue-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 3000ms · 4 컨트롤
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };
      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-700 hover:text-blue-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 클라우드 네트워크 &gt; Chapter 2. VPC 격리</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VPC + Subnet + Security Group + NAT/Peering</h1>
                  <p className="text-sm text-slate-500 mt-0.5">사설 동네 — VPC(담장) / Subnet(공용·사설) / SG(출입 규칙) / NAT·Peering(우체국·옆동네 다리)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 text-sm text-blue-900">
                💡 다음(II-2-2)에서는 <strong>LB / Ingress / CDN / DNS</strong>
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-blue-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-blue-600 text-white hover:bg-blue-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./II-2-2.html" className="text-blue-700 hover:text-blue-900 font-medium">II-2-2 LB / Ingress / CDN / DNS &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
