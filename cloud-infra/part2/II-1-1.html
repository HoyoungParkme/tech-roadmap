  <!--
    II-1-1. Compute — VM / Container / Serverless
    학습 목표: 워크로드 특성에 맞는 컴퓨트 자원 선택 기준을 이해한다.
    핵심 비유: "일꾼 3종" — VM(정직원, 항상 출근) / Container(계약직, 필요할 때) / Serverless(단발 알바)
    패턴: 좌(LiveDataPane — 3 compute 비교 + 시작시간/비용 시각화) / 우(VSCode CodeViewer)

      },
      {

        focus: 'container',

          vm:         { boot: 60000, idle: '24h 과금',         billing: '시간 단위',     cost: '~$30/월', tone: 'baseline' },

        },
        chartActive: 'container',
        chartLines: [
          { key: 'vm',        label: 'VM (항상 켜짐)',          shape: 'flat-high', color: 'slate' },

        ],
        decisionTable: false,
        code: {
          lang: 'yaml',

            'metadata:',

            '',

      {

        focus: 'serverless',
        models: {
          vm:         { boot: 60000, idle: '24h 과금',         billing: '시간 단위',     cost: '~$30/월',  tone: 'baseline' },
          container:  { boot: 5000,  idle: 'Pod 단위 efficient', billing: 'vCPU·메모리 시간', cost: '~$25/월',  tone: 'baseline' },
          serverless: { boot: 100,    idle: '0원',               billing: '100ms 단위',    cost: '~$0.2/월', tone: 'high'    },
        },
        chartActive: 'serverless',
        chartLines: [
          { key: 'vm',         label: 'VM (항상 켜짐)',         shape: 'flat-high', color: 'slate' },
          { key: 'container',  label: 'Container (HPA)',         shape: 'wave-mid',  color: 'sky'   },
          { key: 'serverless', label: 'Serverless (호출 시만)',   shape: 'spike-low', color: 'blue'  },
        ],
        decisionTable: false,
        code: {
          lang: 'python',
          filename: 'lambda_handler.py',
          lines: [
            '# AWS Lambda 핸들러 (Python 3.12)',
            'import json',
            'import boto3',
            '',
            's3 = boto3.client("s3")',
            '',
            'def lambda_handler(event, context):',
            '    """S3 업로드 이벤트 → 파일 메타 추출."""',
            '    record = event["Records"][0]',
            '    bucket = record["s3"]["bucket"]["name"]',
            '    key    = record["s3"]["object"]["key"]',
            '',
            '    head = s3.head_object(Bucket=bucket, Key=key)',
            '    size = head["ContentLength"]',
            '',
            '    return {',
            '        "statusCode": 200,',
            '        "body": json.dumps({"key": key, "size": size}),',
            '    }',
            '',
            '# 특징',
            '# - cold start ~100ms (warm은 즉시)',
            '# - 호출 0 → 비용 0 (정직원 vs 알바 차이)',
            '# - 100ms 단위 과금: 128MB × 100ms ≈ $0.0000002',
            '# - 인프라 관리 0 (OS / 런타임 / 패치 → AWS)',
            '#',
            '# 한계',
            '# - 최대 실행 15분 (긴 배치 X)',
            '# - 메모리 ~10GB, /tmp 10GB',
            '# - 동시 실행 quota 1000 (폭증 시 throttle)',
          ],
          highlight: [7, 22, 23, 24],
        },
      },
      {
        title: 'Step 4. 어떤 걸 고를까 — 의사결정 매트릭스',
        desc: '"항상 가동 + OS/네트워크 자유도?" → VM. "다양한 마이크로서비스 + 자주 배포?" → Container. "이벤트 기반 + 간헐 트래픽 + 운영 0?" → Serverless. 한 시스템에 섞어 쓰는 게 정석 — API는 EKS, S3 후처리는 Lambda, GPU 학습은 EC2.',
        focus: 'choose',
        models: {
          vm:         { boot: 60000, idle: '24h 과금',         billing: '시간 단위',     cost: '~$30/월',  tone: 'baseline' },
          container:  { boot: 5000,  idle: 'Pod 단위 efficient', billing: 'vCPU·메모리 시간', cost: '~$25/월',  tone: 'baseline' },
          serverless: { boot: 100,    idle: '0원',               billing: '100ms 단위',    cost: '~$0.2/월', tone: 'baseline' },
        },
        chartActive: null,
        chartLines: [
          { key: 'vm',         label: 'VM',         shape: 'flat-high', color: 'slate' },
          { key: 'container',  label: 'Container',  shape: 'wave-mid',  color: 'sky'   },
          { key: 'serverless', label: 'Serverless', shape: 'spike-low', color: 'blue'  },
        ],
        decisionTable: true,
        code: {
          lang: 'bash',
          filename: 'decision.md',
          lines: [
            '# 의사결정 매트릭스',
            '질문                                       → 답',
            '──────────────────────────────────────────────────────',
            '"지속 워크로드 + 특수 OS / GPU?"           → VM',
            '"다양한 서비스 + 자주 배포 + 빠른 스케일?" → Container',
            '"이벤트 기반 + 호출 0이면 비용 0?"         → Serverless',
            '"15분 넘는 배치?"                          → VM 또는 Container',
            '"트래픽 0 → 스파이크 100x?"                → Serverless / Container(HPA)',
            '"운영 부담 최소화?"                        → Serverless > Container > VM',
            '',
            '# 가격 (us-east-1, 대략치)',
            '유형          예시              과금 모델            월 비용',
            'VM            EC2 t3.medium     시간당 $0.0416       ~$30  (24h)',
            'Container     EKS Fargate Pod   vCPU·메모리·시간     ~$25  (0.25vCPU 24h)',
            'Serverless    Lambda 1M 호출    100ms 단위 + GB-초   ~$0.2 (128MB×100ms)',
            '',
            '# 시작 시간 비교',
            'VM         ~60s   (OS 부팅 + cloud-init)',
            'Container  ~5s    (이미지 캐시 시)',
            'Serverless ~100ms (cold) / 즉시 (warm)',
            '',
            '# 실무 패턴 — 섞어쓰기',
            '- API 서버           → EKS/ECS  (자주 배포, 스케일)',
            '- S3 업로드 후처리   → Lambda   (이벤트, 간헐)',
            '- ML 학습 (GPU)      → EC2 p4d  (특수, 자유도)',
            '- 야간 배치 6시간    → ECS Task (15분 제한 회피)',
          ],
          highlight: [4, 5, 6, 18, 19, 20],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // Compute 모델 메타
    // ─────────────────────────────────────────────────────
    const COMPUTE_META = [
      { key: 'vm',         emoji: '💻', name: 'VM',         note: 'EC2 / GCE',          analog: '정직원' },
      { key: 'container',  emoji: '📦', name: 'Container',  note: 'K8s Pod',            analog: '계약직' },
      { key: 'serverless', emoji: '⚡', name: 'Serverless', note: 'Lambda / Functions', analog: '단발 알바' },
    ];

    const TONE_STYLE = {
      dim:      { card: 'bg-slate-50  border-slate-200 opacity-60', value: 'text-slate-400', accent: 'text-slate-400' },
      baseline: { card: 'bg-white     border-slate-300',            value: 'text-slate-700', accent: 'text-slate-500' },
      high:     { card: 'bg-blue-50   border-blue-400',             value: 'text-blue-700',  accent: 'text-blue-600'  },
    };

    function formatBoot(ms) {
      if (ms == null) return '?';
      if (ms < 1000) return `${ms}ms`;
      if (ms < 60000) return `${(ms / 1000).toFixed(0)}s`;
      return `${(ms / 60000).toFixed(0)}m`;
    }

    // ─────────────────────────────────────────────────────
    // 비용 곡선 SVG (24h x축 / 비용 y축)
    // shape: flat-high, wave-mid, spike-low
    // ─────────────────────────────────────────────────────
    function CostChart({ lines, activeKey }) {
      // viewBox: 0..240 (x: 24h × 10), 0..70 (y: 비용)
      const W = 240;
      const H = 70;
      const COLOR = {
        slate: '#94a3b8',
        sky:   '#38bdf8',
        blue:  '#2563eb',
      };

      function pathFor(shape) {
        const pts = [];
        for (let h = 0; h <= 24; h += 1) {
          const x = (h / 24) * W;
          let y;
          if (shape === 'flat-high') {
            y = 12; // y는 위가 0이므로 작은 값일수록 비싸 보임
          } else if (shape === 'wave-mid') {
            // 낮시간 트래픽 곡선
            const phase = (h - 4) / 24 * Math.PI * 2;
            y = 35 - Math.sin(phase) * 12; // 23 ~ 47
            if (y > 55) y = 55;
            if (y < 22) y = 22;
          } else {
            // spike-low: 평소 idle(0), 가끔 spike
            const spikes = [3, 7, 11, 14, 18, 21];
            y = 60;
            const dist = Math.min(...spikes.map((s) => Math.abs(s - h)));
            if (dist === 0) y = 28;
            else if (dist === 1) y = 50;
          }
          pts.push(`${x.toFixed(1)},${y.toFixed(1)}`);
        }
        return 'M ' + pts.join(' L ');
      }

      return (
        <div className="bg-slate-50 border border-slate-200 rounded-lg p-3">
          <div className="flex items-center justify-between mb-2">
            <span className="text-[11px] font-bold text-slate-700">📉 24시간 비용 곡선</span>
            <span className="text-[10px] text-slate-400 font-mono">x: 시각 0–24h · y: 비용</span>
          </div>
          <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-28" preserveAspectRatio="none">
            {/* 격자 */}
            <line x1="0" y1={H - 5} x2={W} y2={H - 5} stroke="#e2e8f0" strokeWidth="0.5" />
            <line x1="0" y1={H / 2} x2={W} y2={H / 2} stroke="#e2e8f0" strokeWidth="0.3" strokeDasharray="2 2" />
            {/* 라인 */}
            {lines.map((ln) => {
              const isActive = activeKey == null || ln.key === activeKey;
              return (
                <path
                  key={ln.key}
                  d={pathFor(ln.shape)}
                  fill="none"
                  stroke={COLOR[ln.color]}
                  strokeWidth={isActive ? 2 : 1}
                  opacity={isActive ? 1 : 0.35}
                  strokeLinecap="round"
                  strokeLinejoin="round"
                />
              );
            })}
          </svg>
          {/* 범례 */}
          <div className="flex flex-wrap gap-3 mt-1 text-[10px]">
            {lines.map((ln) => (
              <span key={ln.key} className="flex items-center gap-1 text-slate-600">
                <span className="w-3 h-0.5 rounded" style={{ backgroundColor: COLOR[ln.color] }} />
                {ln.label}
              </span>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 의사결정 표 (Step 4)
    // ─────────────────────────────────────────────────────
    const DECISION_ROWS = [
      { q: '지속 워크로드 + 자유도',         pick: 'vm',         label: 'VM' },
      { q: '다양한 서비스 + 자주 배포',      pick: 'container',  label: 'Container' },
      { q: '이벤트 기반 + 간헐 트래픽',      pick: 'serverless', label: 'Serverless' },
      { q: '15분 넘는 배치',                 pick: 'vm',         label: 'VM / Container' },
      { q: '운영 부담 최소화',               pick: 'serverless', label: 'Serverless 우선' },
    ];

    function DecisionTable() {
      const PICK_COLOR = {
        vm:         'bg-slate-100 text-slate-700 border-slate-300',
        container:  'bg-sky-100   text-sky-800    border-sky-300',
        serverless: 'bg-blue-100  text-blue-800   border-blue-300',
      };
      return (
        <div className="bg-slate-50 border border-slate-200 rounded-lg p-3">
          <div className="text-[11px] font-bold text-slate-700 mb-2">🎯 의사결정 표</div>
          <div className="space-y-1.5">
            {DECISION_ROWS.map((r, i) => (
              <div key={i} className="flex items-center gap-2 text-xs">
                <span className="flex-1 text-slate-700">{r.q}</span>
                <span className="text-slate-400">→</span>
                <span className={`px-2 py-0.5 rounded border font-bold text-[11px] ${PICK_COLOR[r.pick]}`}>{r.label}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 3 compute 모델 카드 + 비용 차트 (+ 의사결정 표)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">👷 일꾼 3종 — Compute 모델</h2>
            <span className="text-[10px] text-slate-400 font-mono">시작시간 · 비용 · 과금</span>
          </div>

          {/* 3 compute 카드 */}
          <div className="grid grid-cols-3 gap-2 mb-4">
            {COMPUTE_META.map((c) => {
              const m = step.models[c.key];
              const tone = TONE_STYLE[m.tone] || TONE_STYLE.baseline;
              const isActive = step.focus === c.key;
              return (
                <div
                  key={c.key}
                  className={`rounded-lg border-2 p-3 transition-all duration-500 ${tone.card} ${isActive ? 'ring-2 ring-blue-300 scale-[1.02]' : ''}`}
                >
                  <div className="flex items-center gap-1 mb-1">
                    <span aria-hidden="true">{c.emoji}</span>
                    <span className="text-xs font-bold text-slate-800">{c.name}</span>
                  </div>
                  <div className="text-[10px] text-slate-500 mb-2">{c.note} · <em>{c.analog}</em></div>

                  <div className="space-y-1 text-[11px]">
                    <div className="flex justify-between">
                      <span className="text-slate-500">시작</span>
                      <span className={`font-bold tabular-nums ${tone.value}`}>{formatBoot(m.boot)}</span>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-slate-500">idle</span>
                      <span className={`font-medium ${tone.accent}`}>{m.idle ?? '?'}</span>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-slate-500">과금</span>
                      <span className={`font-medium ${tone.accent}`}>{m.billing ?? '?'}</span>
                    </div>
                    <div className="flex justify-between pt-1 border-t border-slate-200">
                      <span className="text-slate-500">월비용</span>
                      <span className={`font-extrabold tabular-nums ${tone.value}`}>{m.cost ?? '?'}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* 비용 곡선 차트 */}
          <CostChart lines={step.chartLines} activeKey={step.chartActive} />

          {/* Step 4: 의사결정 표 */}
          {step.decisionTable && (
            <div className="mt-3">
              <DecisionTable />
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-slate-200 border border-slate-300"></span>비활성</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-white border border-slate-300"></span>비교 baseline</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-blue-100 border border-blue-400"></span>현재 단계 강조</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          setRenderedLines(codeRef.current.innerHTML.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-blue-500/15 border-l-2 border-blue-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };
      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-700 hover:text-blue-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 클라우드 자원 &gt; Chapter 1. Compute</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-1-1. Compute — VM / Container / Serverless</h1>
                  <p className="text-sm text-slate-500 mt-0.5">일꾼 3종 — 정직원(VM) · 계약직(Container) · 단발 알바(Serverless)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 text-sm text-blue-900">
                💡 다음(II-1-2)에서는 <strong>Storage</strong> 3종 — Object / Block / File
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-blue-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-blue-600 text-white hover:bg-blue-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./II-1-2.html" className="text-blue-700 hover:text-blue-900 font-medium">II-1-2 Storage 3종 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
