<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Infra 학습 — Managed DB (RDS / Aurora / Cloud SQL / Spanner / DynamoDB / Cosmos)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    III-1-1. Managed DB (RDS / Aurora / Cloud SQL / Spanner / DynamoDB / Cosmos)
    학습 목표: 클라우드 매니지드 DB 진영 비교 — 언제 SQL, 언제 글로벌, 언제 NoSQL을 고를까
    핵심 비유: "매니저 있는 식당" — DBA가 백업/패치/HA 자동, 사용자는 SQL만 던진다
    구조: 4단계 (RDS·Aurora / Cloud SQL·Spanner / DynamoDB·Cosmos / 선택 가이드)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. RDS / Aurora — "AWS 매니저 식당 (관계형)"',
        desc: 'RDS는 MySQL/PostgreSQL/Oracle/SQL Server를 그대로 감싼 wrapper — 엔진은 표준 그대로. Aurora는 AWS가 다시 만든 자체 엔진(PG/MySQL 호환)이며 스토리지 분리 구조로 표준 대비 최대 5배 빠름. 둘 다 multi-AZ failover, 자동 백업/패치를 매니저가 처리한다.',
        block: {
          kind: 'yaml',
          code: `# Terraform — RDS PostgreSQL (단일 인스턴스 + multi-AZ)
resource "aws_db_instance" "app" {
  identifier              = "app-prod"
  engine                  = "postgres"        # 표준 PG 그대로
  engine_version          = "16.3"
  instance_class          = "db.m6g.large"
  allocated_storage       = 100
  multi_az                = true              # 다른 AZ에 stand-by 자동
  backup_retention_period = 7                 # 7일 PITR
  storage_encrypted       = true
  username                = "admin"
  password                = var.db_password
  skip_final_snapshot     = false
}

# Terraform — Aurora PostgreSQL 클러스터 (writer + reader)
resource "aws_rds_cluster" "aurora" {
  cluster_identifier = "app-aurora"
  engine             = "aurora-postgresql"   # AWS 자체 엔진 (PG 호환)
  engine_version     = "16.2"
  database_name      = "app"
  master_username    = "admin"
  master_password    = var.db_password
  backup_retention_period = 7
}

resource "aws_rds_cluster_instance" "aurora_nodes" {
  count              = 2                     # writer 1 + reader 1
  identifier         = "aurora-\${count.index}"
  cluster_identifier = aws_rds_cluster.aurora.id
  instance_class     = "db.r6g.large"
  engine             = aws_rds_cluster.aurora.engine
}

# 강점
# - 백업/패치/HA/모니터링 자동
# - Aurora: 스토리지-컴퓨트 분리 → reader 최대 15개, 빠른 failover (~30s)
# 약점
# - 비용은 EC2 자체 호스팅보다 비쌈
# - 엔진 마이너 버전 강제 업그레이드 가능`,
        },
        focus: 'rds_aurora',
      },
      {
        title: 'Step 2. Cloud SQL / Spanner — "GCP 매니저 식당 (글로벌까지)"',
        desc: 'Cloud SQL은 GCP의 RDS 격 — MySQL/PostgreSQL/SQL Server 매니지드. Spanner는 차원이 다름. NewSQL로 SQL 인터페이스 + 수평 확장 + 글로벌 강한 일관성(TrueTime). 멀티 리전에서 강한 일관성을 원자적으로 보장하는 거의 유일한 선택지.',
        block: {
          kind: 'yaml',
          code: `# Terraform — Cloud SQL PostgreSQL (단일 리전, HA)
resource "google_sql_database_instance" "app" {
  name             = "app-prod"
  database_version = "POSTGRES_16"
  region           = "asia-northeast3"        # 서울
  settings {
    tier              = "db-custom-2-7680"
    availability_type = "REGIONAL"            # multi-zone HA
    backup_configuration {
      enabled                        = true
      point_in_time_recovery_enabled = true
    }
  }
}

# Terraform — Spanner instance + database (글로벌 강한 일관성)
resource "google_spanner_instance" "global" {
  name             = "ledger-global"
  config           = "nam-eur-asia1"          # 멀티 리전 config
  display_name     = "Global Ledger"
  processing_units = 1000                     # 1 node = 1000 PU
}

resource "google_spanner_database" "ledger" {
  instance = google_spanner_instance.global.name
  name     = "ledger"
  ddl = [
    "CREATE TABLE accounts (id STRING(36) NOT NULL, balance INT64) PRIMARY KEY (id)",
  ]
}

# Spanner 강점
# - SQL + 수평 확장 + 글로벌 강한 일관성 (TrueTime API)
# - "은행 원장"처럼 정합성 절대 필요 + 전 세계 규모
# Spanner 약점
# - 비쌈 (최소 비용 높음)
# - 외래키/조인 제약, 스키마 설계 학습 곡선

# Cloud SQL은 한 리전 내 표준 OLTP에 충분
# 멀티 리전 + 강한 일관성이 필요할 때만 Spanner`,
        },
        focus: 'cloud_sql_spanner',
      },
      {
        title: 'Step 3. DynamoDB / Cosmos — "메뉴판 단순한 패스트푸드 (NoSQL)"',
        desc: 'DynamoDB는 AWS의 KV/Document DB — 한 자리수 ms 레이턴시, 자동 파티셔닝, on-demand로 capacity 무한 확장. Cosmos DB는 Azure의 멀티 모델 — KV/Document/Graph/Column 5가지 API 지원. 둘 다 서버리스 capacity 모드와 글로벌 복제 지원.',
        block: {
          kind: 'python',
          code: `# boto3 — DynamoDB put_item / query
import boto3
from boto3.dynamodb.conditions import Key

dynamodb = boto3.resource("dynamodb", region_name="ap-northeast-2")
orders = dynamodb.Table("orders")

# 쓰기 — partition key (user_id) + sort key (order_id)
orders.put_item(
    Item={
        "user_id": "u-42",          # PK (해시 파티션)
        "order_id": "o-2026-001",   # SK (정렬 키)
        "amount": 19900,
        "status": "PAID",
    }
)

# 읽기 — 같은 user의 모든 주문 (sort key 범위)
resp = orders.query(
    KeyConditionExpression=
        Key("user_id").eq("u-42") &
        Key("order_id").begins_with("o-2026-"),
    Limit=20,
)
for item in resp["Items"]:
    print(item["order_id"], item["amount"])

# 강점
# - 한 자리수 ms 레이턴시 (어떤 규모에서도)
# - on-demand capacity → 트래픽 폭증 자동 흡수
# - Global Tables → 멀티 리전 active-active
# 약점
# - 조인 없음 (액세스 패턴 먼저 설계 필요)
# - 분석 쿼리 부적합 (별도 OLAP로 export)

# Cosmos DB는 같은 컨셉 + 5개 API
# (SQL/MongoDB/Cassandra/Gremlin/Table) 중 골라 쓰는 멀티모델`,
        },
        focus: 'dynamo_cosmos',
      },
      {
        title: 'Step 4. 선택 가이드 — "내 워크로드는 어디?"',
        desc: '표준 SQL + 단일 리전이면 RDS/Cloud SQL이 가장 무난. 글로벌 강한 일관성이 필요하면 Spanner. 단순 KV/Document 패턴 + 초저지연이면 DynamoDB/Cosmos. 분석은 매니지드 DB가 아니라 OLAP(BigQuery/Redshift)로 분리하는 게 정석.',
        block: {
          kind: 'shell',
          code: `# 의사결정 매트릭스
# ─────────────────────────────────────────────────────────
# 워크로드/요구사항                          → 답
# ─────────────────────────────────────────────────────────
# "표준 SQL, 단일 리전, OLTP"                → RDS / Cloud SQL
# "PG/MySQL 호환 + 더 빠르고 reader 많이"    → Aurora
# "멀티 리전 + 강한 일관성 (글로벌 원장)"    → Spanner
# "단순 KV/Document, 초저지연, 트래픽 폭증"  → DynamoDB / Cosmos
# "그래프/문서/컬럼 한 곳에"                 → Cosmos (멀티모델)
# "분석 쿼리, 집계 위주"                     → BigQuery/Redshift (별개)

# 가격 감(서울/도쿄 리전, 24/7, 대략치)
# ─────────────────────────────────────────────────────────
# 항목                          월 비용 체감
# ─────────────────────────────────────────────────────────
# RDS db.m6g.large multi-AZ     ~$280
# Aurora r6g.large 2-node       ~$420 (스토리지 별도)
# Cloud SQL 2vCPU/7.5GB HA      ~$260
# Spanner 1000 PU 멀티 리전     ~$900~ (최소)
# DynamoDB on-demand            트래픽 비례 (idle = 거의 $0)
# Cosmos serverless             트래픽 비례 (RU 단위 과금)

# 한 줄 요약
# RDS/Cloud SQL : "표준 SQL, 가장 무난한 선택"
# Aurora        : "PG/MySQL 호환 + AWS 최적화 엔진"
# Spanner       : "전 세계 한 DB, 절대 정합성"
# DynamoDB/Cosmos: "KV/Document + 무한 확장 + 초저지연"`,
        },
        focus: 'choose',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const MANAGED_DB = [
      { key: 'rds_aurora',        emoji: '🐘', name: 'RDS / Aurora',      note: 'PG/MySQL 호환' },
      { key: 'cloud_sql_spanner', emoji: '🌐', name: 'Cloud SQL / Spanner', note: 'global 일관성' },
      { key: 'dynamo_cosmos',     emoji: '📦', name: 'DynamoDB / Cosmos', note: 'NoSQL (KV/Doc)' },
      { key: 'choose',            emoji: '🎯', name: '선택',              note: '어느 걸?' },
    ];

    function ManagedDBCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🍽️ 매니저 있는 식당 (Managed DB)</div>
          <div className="grid grid-cols-4 gap-2">
            {MANAGED_DB.map((t) => {
              const isActive = focus === t.key;
              return (
                <div
                  key={t.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-blue-100 border-2 border-blue-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{t.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{t.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{t.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Managed DB (RDS / Aurora / Cloud SQL / Spanner / DynamoDB / Cosmos)</h1>
                <p className="text-sm text-slate-500 mt-1">매니저 있는 식당 — DBA가 백업/패치/HA 자동, 사용자는 SQL만</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <ManagedDBCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'choose' && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 mb-6 text-xs text-blue-900">
                💡 다음(III-1-2)에서는 Auth / KMS / Logs (IAM/Secret Manager/CloudWatch)
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
