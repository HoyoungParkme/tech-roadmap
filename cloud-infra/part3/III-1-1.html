<body>
  <div id="root"></div>

  <!--
    III-1-1. Managed DB (RDS / Spanner / DynamoDB)
    학습 목표: 매니지드 DB 3대 진영(RDS·Spanner·DynamoDB)을 4 차원(SQL 표준/글로벌/처리량/비용)으로 비교하고 워크로드별 선택 기준을 익힌다.
    핵심 비유: 매니저 있는 식당 — DBA가 백업/패치/HA를 자동화, 사용자는 SQL/요청만 던진다.
    패턴: mlops IV-1-1 패턴 — 좌(LiveDataPane: DB 비교 카드/매트릭스) / 우(VSCode CodeViewer · highlight.js)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (Managed DB 3진영 + 선택 매트릭스)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. RDS — "AWS 매니저 식당 (관계형 + Multi-AZ)"',
        desc: 'RDS는 PG/MySQL/Oracle/SQL Server를 그대로 감싼 매니지드. Multi-AZ로 다른 AZ에 standby가 동기 복제되고, primary 장애 시 자동 failover(~30s). PITR 백업 7일 기본. 표준 SQL, 단일 리전 OLTP의 가장 무난한 선택.',
        focus: 'rds_aurora',
        scenario: {
          kind: 'rds',
          title: 'RDS Multi-AZ + Auto-Failover 시나리오',
          nodes: [
            { id: 'primary',  label: 'Primary',     sub: 'AZ-a · 쓰기',       state: 'good',  badge: '활성' },
            { id: 'standby',  label: 'Standby',     sub: 'AZ-b · 동기 복제',  state: 'info',  badge: '대기' },
            { id: 'backup',   label: 'Backup S3',   sub: 'PITR 7일 자동',     state: 'info',  badge: '백업' },
          ],
          arrow: '동기 복제 (replica lag ≈ 0)',
          failover: '⚡ AZ-a 장애 → 60초 내 Standby 승격',
        },
        code: {
          lang: 'hcl',
          filename: 'rds.tf',
          lines: [
            '# Terraform — RDS PostgreSQL Multi-AZ + 자동 백업',
            'resource "aws_db_instance" "app" {',
            '  identifier              = "app-prod"',
            '  engine                  = "postgres"          # 표준 PG 엔진',
            '  engine_version          = "16.3"',
            '  instance_class          = "db.m6g.large"',
            '  allocated_storage       = 100',
            '',
            '  multi_az                = true                # 다른 AZ에 standby 자동',
            '  backup_retention_period = 7                   # 7일 PITR',
            '  storage_encrypted       = true',
            '',
            '  username                = "admin"',
            '  password                = var.db_password',
            '  skip_final_snapshot     = false',
            '}',
            '',
            '# 자동화 포인트',
            '#  - primary 장애 시 ~60s 내 standby 승격 (DNS 자동 갱신)',
            '#  - 매일 새벽 자동 스냅샷 + transaction log → PITR',
            '#  - 마이너 패치 자동, 메이저는 사용자 승인',
          ],
          highlight: [9, 10, 19, 20],
        },
      },
      {
        title: 'Step 2. Spanner — "GCP 글로벌 매니저 (5 9s SLA · 수평 확장)"',
        desc: 'NewSQL: SQL 인터페이스 + 수평 확장 + 글로벌 강한 일관성(TrueTime). 멀티 리전 config로 미주·유럽·아시아에 동시 배포. 5 9s(99.999%) SLA — 연간 5분 이내 다운. "은행 원장"처럼 정합성 절대 + 전 세계 규모일 때.',
        focus: 'cloud_sql_spanner',
        scenario: {
          kind: 'spanner',
          title: 'Spanner 글로벌 멀티 리전 (nam-eur-asia1)',
          nodes: [
            { id: 'us',   label: 'us-central',  sub: 'TrueTime · 강한 일관성', state: 'good', badge: 'NA'   },
            { id: 'eu',   label: 'eu-west',     sub: 'TrueTime · 강한 일관성', state: 'good', badge: 'EU'   },
            { id: 'asia', label: 'asia-ne1',    sub: 'TrueTime · 강한 일관성', state: 'good', badge: 'APAC' },
          ],
          arrow: 'Paxos 합의 + 원자 시계 동기화',
          failover: '🌐 SLA 99.999% (연 5분) · 수평 확장 (PU 단위)',
        },
        code: {
          lang: 'hcl',
          filename: 'spanner.tf',
          lines: [
            '# Terraform — Spanner 멀티 리전 + 글로벌 강한 일관성',
            'resource "google_spanner_instance" "global" {',
            '  name             = "ledger-global"',
            '  config           = "nam-eur-asia1"   # 멀티 리전 config (3대륙)',
            '  display_name     = "Global Ledger"',
            '  processing_units = 1000              # 1 node = 1000 PU · 수평 확장',
            '}',
            '',
            'resource "google_spanner_database" "ledger" {',
            '  instance = google_spanner_instance.global.name',
            '  name     = "ledger"',
            '  ddl = [',
            '    "CREATE TABLE accounts (',
            '       id      STRING(36) NOT NULL,',
            '       balance INT64',
            '     ) PRIMARY KEY (id)",',
            '  ]',
            '}',
            '',
            '# Spanner 강점',
            '#  - SQL + 수평 확장 + 글로벌 강한 일관성 (TrueTime API)',
            '#  - SLA 99.999% (5 9s) — 연간 다운타임 5분 이내',
            '#  - 처리량 → PU 추가만으로 선형 확장',
          ],
          highlight: [4, 6, 21, 22],
        },
      },
      {
        title: 'Step 3. DynamoDB — "패스트푸드 (KV · 글로벌 테이블)"',
        desc: 'KV/Document 스토어, 한 자리수 ms 레이턴시. capacity 모드: provisioned(예측 가능 트래픽 · 저렴) vs on-demand(트래픽 폭증 자동 흡수 · idle 시 거의 $0). Global Tables로 멀티 리전 active-active 복제.',
        focus: 'dynamo_cosmos',
        scenario: {
          kind: 'dynamo',
          title: 'DynamoDB capacity 모드 비교 + Global Tables',
          nodes: [
            { id: 'prov',   label: 'Provisioned', sub: 'RCU/WCU 예약 · 예측 트래픽', state: 'info', badge: '저렴'   },
            { id: 'ond',    label: 'On-Demand',   sub: '요청당 과금 · 폭증 자동',    state: 'good', badge: '자동'   },
            { id: 'global', label: 'Global Tbl',  sub: '멀티 리전 active-active',    state: 'good', badge: '복제'   },
          ],
          arrow: 'partition key (해시) + sort key (정렬)',
          failover: '⚡ p99 < 10ms · idle 시 거의 $0 (on-demand)',
        },
        code: {
          lang: 'python',
          filename: 'dynamo_client.py',
          lines: [
            '# boto3 — DynamoDB put / query (KV + sort key)',
            'import boto3',
            'from boto3.dynamodb.conditions import Key',
            '',
            'dynamodb = boto3.resource("dynamodb", region_name="ap-northeast-2")',
            'orders = dynamodb.Table("orders")',
            '',
            '# 쓰기 — partition key (user_id) + sort key (order_id)',
            'orders.put_item(',
            '    Item={',
            '        "user_id":  "u-42",          # PK (해시 파티션)',
            '        "order_id": "o-2026-001",    # SK (정렬 키)',
            '        "amount":   19900,',
            '        "status":   "PAID",',
            '    }',
            ')',
            '',
            '# 읽기 — 같은 user의 주문 범위 (sort key prefix)',
            'resp = orders.query(',
            '    KeyConditionExpression=',
            '        Key("user_id").eq("u-42") &',
            '        Key("order_id").begins_with("o-2026-"),',
            '    Limit=20,',
            ')',
            '',
            '# capacity 모드 선택 가이드',
            '#  - Provisioned : 트래픽 예측 가능 + 비용 최적화',
            '#  - On-Demand   : 폭증 자동 흡수 (idle ≈ $0)',
            '#  - Global Tbl  : 멀티 리전 active-active (last-writer-wins)',
          ],
          highlight: [11, 12, 20, 21, 22],
        },
      },
      {
        title: 'Step 4. 선택 — "4 차원 비교 매트릭스"',
        desc: 'SQL 표준 / 글로벌 일관성 / 처리량 한계 / 비용 — 4 차원으로 비교. 표준 SQL + 단일 리전이면 RDS, 글로벌 강한 일관성이 필수면 Spanner, 단순 KV + 초저지연이면 DynamoDB. 한 줄: "워크로드 모양이 답을 결정한다."',
        focus: 'choose',
        matrix: {
          headers: ['차원',           'RDS (Aurora)',       'Spanner',                 'DynamoDB'],
          rows: [
            { dim: 'SQL 표준',    cells: ['표준 PG/MySQL ✅', 'GoogleSQL (제약 有)', '없음 (KV/Doc)']         , best: 0 },
            { dim: '글로벌 일관성', cells: ['단일 리전',         '강한 일관성 (5 9s) ✅', 'Global Tbl (eventual)'] , best: 1 },
            { dim: '처리량',      cells: ['수직 확장 위주',     '수평 확장 (PU 추가)',   '무한 (auto-shard) ✅']  , best: 2 },
            { dim: '비용',        cells: ['~$280/월 ✅',        '~$900/월~ (최소)',     'idle ≈ $0 (on-demand) ✅'], best: 0 },
          ],
        },
        code: {
          lang: 'shell',
          filename: 'decision-matrix.sh',
          lines: [
            '# 의사결정 매트릭스 — 4 차원 × 3 진영',
            '# ──────────────────────────────────────────────────────────',
            '# 차원                RDS              Spanner           DynamoDB',
            '# ──────────────────────────────────────────────────────────',
            '# SQL 표준           ✅ 표준 그대로     △ GoogleSQL       ❌ 없음',
            '# 글로벌 일관성       ❌ 단일 리전      ✅ 강한 일관성     △ eventual',
            '# 처리량 한계         △ 수직 확장      ○ PU 선형 확장    ✅ 무한',
            '# 비용 (월 최소)      ✅ ~$280         ❌ ~$900~         ✅ idle≈$0',
            '',
            '# 워크로드 → 답',
            '#  "표준 SQL · 단일 리전 OLTP"             → RDS / Aurora',
            '#  "전 세계 원장 · 정합성 절대"            → Spanner',
            '#  "초저지연 KV · 트래픽 폭증 흡수"        → DynamoDB',
            '#  "분석/집계 위주"                        → BigQuery/Redshift (별개)',
            '',
            '# 한 줄 요약',
            '#  RDS      : "표준 SQL, 가장 무난"',
            '#  Spanner  : "전 세계 한 DB, 절대 정합성, 5 9s SLA"',
            '#  DynamoDB : "KV + 무한 확장 + 초저지연"',
          ],
          highlight: [5, 6, 7, 8],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // Managed DB 3진영 + 선택 카드 (focus 전환)
    // ─────────────────────────────────────────────────────
    const MANAGED_DB = [
      { key: 'rds_aurora',        emoji: '🐘', name: 'RDS / Aurora',     note: 'PG/MySQL Multi-AZ' },
      { key: 'cloud_sql_spanner', emoji: '🌐', name: 'Spanner',          note: '글로벌 5 9s'        },
      { key: 'dynamo_cosmos',     emoji: '📦', name: 'DynamoDB',         note: 'KV · 글로벌 테이블' },
      { key: 'choose',            emoji: '🎯', name: '선택',             note: '4 차원 비교'        },
    ];

    // 시나리오 노드 색상 (Tailwind purge 안전 · 정적 클래스)
    const NODE_STYLE = {
      good: { card: 'bg-blue-50 border-blue-400',     value: 'text-blue-800',     badge: 'bg-blue-100 text-blue-800'     },
      info: { card: 'bg-sky-50 border-sky-300',       value: 'text-sky-700',      badge: 'bg-sky-100 text-sky-700'       },
      warn: { card: 'bg-yellow-50 border-yellow-400', value: 'text-yellow-700',   badge: 'bg-yellow-100 text-yellow-700' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — Managed DB 비교 (focus + 시나리오 + 매트릭스)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🍽️ 매니저 있는 식당 (Managed DB)</h2>
            <span className="text-[10px] text-slate-400 font-mono">3 진영 · live</span>
          </div>

          {/* 3 진영 카드 (focus 강조) */}
          <div className="grid grid-cols-4 gap-2 mb-5">
            {MANAGED_DB.map((t) => {
              const isActive = step.focus === t.key;
              return (
                <div
                  key={t.key}
                  className={`rounded-lg p-3 text-center transition-all duration-500 ${
                    isActive
                      ? 'bg-blue-100 border-2 border-blue-500 scale-105 shadow-md'
                      : 'bg-slate-50 border border-slate-200'
                  }`}
                >
                  <div className="text-2xl">{t.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{t.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{t.note}</div>
                </div>
              );
            })}
          </div>

          {/* 시나리오 (Step 1~3) */}
          {step.scenario && (
            <div className="rounded-lg border-2 border-blue-200 bg-blue-50/40 p-4 mb-3">
              <div className="text-xs font-bold text-blue-800 mb-3">{step.scenario.title}</div>
              <div className="grid grid-cols-3 gap-2 mb-3">
                {step.scenario.nodes.map((n) => {
                  const s = NODE_STYLE[n.state];
                  return (
                    <div key={n.id} className={`rounded-lg border-2 p-2.5 ${s.card}`}>
                      <div className="flex items-center justify-between mb-1">
                        <span className={`text-xs font-bold ${s.value}`}>{n.label}</span>
                        <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${s.badge}`}>{n.badge}</span>
                      </div>
                      <div className="text-[10px] text-slate-600 leading-tight">{n.sub}</div>
                    </div>
                  );
                })}
              </div>
              <div className="text-[11px] text-slate-600 font-mono text-center mb-1.5">
                ↕ {step.scenario.arrow}
              </div>
              <div className="text-[11px] font-bold text-blue-900 bg-white border border-blue-300 rounded p-2 text-center">
                {step.scenario.failover}
              </div>
            </div>
          )}

          {/* 4 차원 비교 매트릭스 (Step 4) */}
          {step.matrix && (
            <div className="rounded-lg border-2 border-blue-300 bg-blue-50/40 p-3">
              <div className="text-xs font-bold text-blue-900 mb-2">📊 4 차원 비교 매트릭스</div>
              <table className="w-full text-[11px]">
                <thead>
                  <tr className="bg-blue-100 text-blue-900">
                    {step.matrix.headers.map((h, i) => (
                      <th key={i} className="px-2 py-1.5 text-left font-bold border border-blue-200">{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {step.matrix.rows.map((r, i) => (
                    <tr key={i} className="bg-white">
                      <td className="px-2 py-1.5 font-bold text-slate-700 border border-blue-100">{r.dim}</td>
                      {r.cells.map((c, j) => (
                        <td
                          key={j}
                          className={`px-2 py-1.5 border border-blue-100 ${
                            r.best === j ? 'bg-blue-100 text-blue-900 font-bold' : 'text-slate-600'
                          }`}
                        >
                          {c}
                        </td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
              <div className="text-[10px] text-blue-700 mt-2 italic">
                * 파란색 셀 = 해당 차원의 우수 진영 (워크로드에 따라 우열은 바뀐다)
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-blue-400"></span>활성/우수</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-sky-400"></span>정보</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-slate-300"></span>비활성</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화 + 라인 번호
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          codeRef.current.textContent = code.lines.join('\n');
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화 hidden (innerHTML 추출용) */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-blue-500/10 border-l-2 border-blue-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      // 자동 재생 — 3000ms
      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-700 hover:text-blue-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Cloud Infra &gt; Chapter 1. Managed Service</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Managed DB (RDS / Spanner / DynamoDB)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">매니저 있는 식당 — DBA가 백업/패치/HA 자동, 사용자는 SQL/요청만 던진다</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 text-sm text-blue-900">
                💡 다음(III-1-2)에서는 <strong>Auth / KMS / Logs</strong> (IAM · Secret Manager · CloudWatch)
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-blue-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-blue-600 text-white hover:bg-blue-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./III-1-2.html" className="text-blue-700 hover:text-blue-900 font-medium">III-1-2 Auth / KMS / Logs &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
