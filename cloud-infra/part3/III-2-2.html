  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🏪</text></svg>" />

<body>
  <div id="root"></div>

  <!--
    III-2-2. Cache / CDN 심화
    학습 목표: ElastiCache(Redis) + CloudFront(CDN) + Cache-Aside 패턴 + Invalidation 전략
    핵심 비유: 동네 슈퍼 vs 본사 — 자주 쓰는 데이터를 가까이(Cache) / 전 세계 가장자리 배포(CDN)
    패턴: 좌(LiveDataPane Cache 흐름) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (Cache / CDN 4 단계 시각화)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. In-Memory — ElastiCache (Redis)',
        desc: 'Redis는 메모리 KV 저장소. 디스크 대비 1000배 빠르다. 세션/토큰/리더보드/실시간 카운터에 사용. ElastiCache는 매니지드 Redis — replica + 자동 페일오버 + 스냅샷 제공. TTL을 걸어 메모리 고갈 방지.',
        focus: 'in_memory',
        code: {
          lang: 'yaml',
          filename: 'elasticache.tf',
          lines: [
            '# Terraform — ElastiCache Redis (replica + 자동 페일오버)',
            'resource "aws_elasticache_replication_group" "session_cache" {',
            '  replication_group_id = "app-session-cache"',
            '  engine               = "redis"',
            '  engine_version       = "7.1"',
            '  node_type            = "cache.t4g.small"',
            '  num_cache_clusters   = 2     # primary + replica 1',
            '',
            '  automatic_failover_enabled = true',
            '  multi_az_enabled           = true',
            '',
            '  # 보안 (전송/저장 모두 암호화)',
            '  transit_encryption_enabled = true',
            '  at_rest_encryption_enabled = true',
            '  auth_token                 = var.redis_auth_token',
            '',
            '  subnet_group_name  = aws_elasticache_subnet_group.private.name',
            '  security_group_ids = [aws_security_group.cache.id]',
            '',
            '  # 스냅샷 (운영 권장)',
            '  snapshot_retention_limit = 7   # 7일 보관',
            '  snapshot_window          = "03:00-05:00"',
            '',
            '  tags = { Env = "prod", Service = "session" }',
            '}',
          ],
          highlight: [4, 5, 6, 9, 10, 21],
        },
      },
      {
        title: 'Step 2. CDN — CloudFront 전 세계 Edge 배포',
        desc: 'CDN은 정적 자원(이미지/JS/CSS/영상)을 사용자와 가까운 Edge에 캐싱한다. CloudFront는 400+ PoP. Origin은 S3/ALB. 서울 사용자는 ICN Edge에서 응답 — 본사(Origin)까지 안 간다. 평균 hit ratio 95%면 origin 부하 1/20.',
        focus: 'cdn',
        code: {
          lang: 'yaml',
          filename: 'cloudfront.yml',
          lines: [
            '# CloudFront Distribution + Behavior',
            'Resources:',
            '  CDN:',
            '    Type: AWS::CloudFront::Distribution',
            '    Properties:',
            '      DistributionConfig:',
            '        Enabled: true',
            '        DefaultRootObject: index.html',
            '        PriceClass: PriceClass_200   # 한국/일본/북미',
            '        HttpVersion: http2and3',
            '        IPV6Enabled: true',
            '',
            '        Origins:',
            '          - Id: S3StaticOrigin',
            '            DomainName: !GetAtt StaticBucket.RegionalDomainName',
            '          - Id: AlbApiOrigin',
            '            DomainName: !GetAtt Alb.DNSName',
            '',
            '        DefaultCacheBehavior:',
            '          TargetOriginId: S3StaticOrigin',
            '          ViewerProtocolPolicy: redirect-to-https',
            '          CachePolicyId: 658327ea-...   # CachingOptimized',
            '          Compress: true                # gzip/brotli 자동',
            '',
            '        CacheBehaviors:',
            '          - PathPattern: /api/*',
            '            TargetOriginId: AlbApiOrigin',
            '            CachePolicyId: 4135ea2d-... # CachingDisabled',
          ],
          highlight: [9, 13, 20, 22, 26, 28],
        },
      },
      {
        title: 'Step 3. Cache-Aside — Read-Through 패턴',
        desc: 'Cache-Aside (Lazy Loading) = 1) GET → 2) hit면 반환 / miss면 DB 조회 → 3) 결과를 SET. 가장 흔한 패턴. 단점: 첫 요청은 항상 miss(cold start) + 데이터 stale 가능. 해결: warm-up 스크립트 + 적절한 TTL + Thundering Herd 락.',
        focus: 'cache_aside',
        code: {
          lang: 'python',
          filename: 'cache_aside.py',
          lines: [
            '# Cache-Aside 패턴 — Redis GET → DB miss → SET',
            'import json',
            'import redis',
            '',
            '_redis = redis.Redis(',
            '    host="app-session-cache.xxxx.cache.amazonaws.com",',
            '    port=6379,',
            '    ssl=True,',
            '    decode_responses=True,',
            '    socket_timeout=0.5,    # 캐시 장애 시 빠르게 fallback',
            ')',
            '',
            'CACHE_TTL_SEC = 300  # 5분',
            '',
            'def get_user_profile(user_id: int) -> dict:',
            '    """사용자 프로필 조회 (Cache-Aside)."""',
            '    cache_key = f"user:profile:{user_id}"',
            '',
            '    # 1) 캐시 GET',
            '    try:',
            '        cached = _redis.get(cache_key)',
            '        if cached:',
            '            return json.loads(cached)   # HIT',
            '    except redis.RedisError:',
            '        pass  # 캐시 장애 시 DB로 fallback',
            '',
            '    # 2) MISS → DB 조회',
            '    profile = _fetch_from_db(user_id)',
            '',
            '    # 3) 캐시에 SET (TTL 필수)',
            '    try:',
            '        _redis.setex(cache_key, CACHE_TTL_SEC, json.dumps(profile))',
            '    except redis.RedisError:',
            '        pass',
            '',
            '    return profile',
          ],
          highlight: [19, 20, 21, 22, 27, 31],
        },
      },
      {
        title: 'Step 4. Invalidation — TTL + 강제 무효화 + Versioned Key',
        desc: '캐시 무효화는 컴퓨터 과학 2대 난제. 전략 3가지: 1) TTL(시간 만료) — 단순/안전, 2) 명시적 DELETE(쓰기 시) — 정확하지만 누락 위험, 3) Versioned Key — 신구 공존 가능 + 즉시 롤백. CDN은 versioned URL을 권장 — invalidation API는 비싸고 전파 5~10분.',
        focus: 'invalidation',
        code: {
          lang: 'shell',
          filename: 'invalidation.sh',
          lines: [
            '# 1) Redis TTL 전략 — 데이터 특성별',
            '$ redis-cli SETEX user:profile:1234 300 \'{"name":"alice"}\'',
            '$ redis-cli SETEX product:42      30 \'{"price":12000}\'',
            '$ redis-cli SETEX leaderboard     60 \'[...]\'',
            '',
            '# 2) 쓰기 시 명시적 무효화 (write-through 보완)',
            '$ redis-cli DEL user:profile:1234',
            '$ redis-cli DEL user:settings:1234',
            '',
            '# 3) Pattern 일괄 삭제 (KEYS 대신 SCAN)',
            '$ redis-cli --scan --pattern "user:1234:*" | xargs redis-cli DEL',
            '',
            '# 4) CloudFront 강제 무효화 (월 1000 path 무료)',
            '$ aws cloudfront create-invalidation \\',
            '    --distribution-id E1A2B3C4D5E6F7 \\',
            '    --paths "/static/css/main.css" "/index.html"',
            '',
            '# 5) Versioned URL 패턴 (권장)',
            '#  /static/main.a1b2c3d4.js  ← 캐시 1년 + immutable',
            '#  /static/main.e5f6g7h8.js  ← 새 배포 = 새 해시',
            '#  invalidation API 불필요 + 즉시 롤백 가능',
            '',
            '# 정리 체크리스트',
            '[ ] 모든 캐시 키에 TTL (무한 보관 금지)',
            '[ ] 핫 키는 짧은 TTL + jitter (Thundering Herd 방지)',
            '[ ] CDN은 versioned URL + Cache-Control: immutable',
            '[ ] Invalidation API는 긴급 hotfix 용도로만',
          ],
          highlight: [2, 3, 7, 14, 19, 20],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // Step 1 — In-Memory: Redis 박스 + KV 표 + TTL 카운터
    // ─────────────────────────────────────────────────────
    function InMemoryView() {
      const [ttl, setTtl] = useState(300);

      useEffect(() => {
        const id = setInterval(() => setTtl((t) => (t <= 0 ? 300 : t - 5)), 200);
        return () => clearInterval(id);
      }, []);

      const kvRows = [
        { k: 'user:profile:1234', v: '{"name":"alice"}', ttl: ttl },
        { k: 'session:abc',       v: '{"uid":1234}',     ttl: Math.max(0, ttl - 30) },
        { k: 'cart:9999',         v: '[item1, item2]',   ttl: Math.max(0, ttl - 60) },
        { k: 'leaderboard:top10', v: 'sorted set ...',   ttl: Math.max(0, ttl - 90) },
      ];

      return (
        <div className="space-y-3">
          <div className="rounded-lg border-2 border-blue-400 bg-blue-50 p-4">
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-2">
                <span className="text-2xl">⚡</span>
                <div>
                  <div className="text-sm font-bold text-blue-900">Redis (ElastiCache)</div>
                  <div className="text-[10px] text-blue-600 font-mono">In-Memory · cache.t4g.small · primary + replica</div>
                </div>
              </div>
              <span className="text-[10px] font-bold px-2 py-0.5 rounded bg-blue-200 text-blue-800">RUNNING</span>
            </div>

            {/* KV 표 */}
            <div className="bg-white rounded border border-blue-200 overflow-hidden">
              <div className="grid grid-cols-12 bg-blue-100 text-[10px] font-bold text-blue-800 px-2 py-1">
                <span className="col-span-5">KEY</span>
                <span className="col-span-5">VALUE</span>
                <span className="col-span-2 text-right">TTL</span>
              </div>
              {kvRows.map((row, i) => (
                <div key={i} className="grid grid-cols-12 px-2 py-1.5 text-[11px] font-mono border-t border-blue-50">
                  <span className="col-span-5 text-blue-700 truncate">{row.k}</span>
                  <span className="col-span-5 text-slate-600 truncate">{row.v}</span>
                  <span className={`col-span-2 text-right tabular-nums ${row.ttl < 60 ? 'text-red-600 font-bold' : 'text-slate-500'}`}>
                    {row.ttl}s
                  </span>
                </div>
              ))}
            </div>
          </div>

          <div className="rounded-lg bg-slate-100 border border-slate-200 p-3">
            <div className="text-[10px] font-bold text-slate-600 mb-2">⏱️ TTL 카운트다운 (실시간)</div>
            <div className="relative h-3 bg-white rounded-full overflow-hidden border border-slate-300">
              <div
                className="absolute inset-y-0 left-0 bg-gradient-to-r from-blue-400 to-blue-600 transition-all duration-200"
                style={{ width: `${(ttl / 300) * 100}%` }}
              />
            </div>
            <div className="flex justify-between text-[10px] text-slate-500 mt-1 font-mono">
              <span>0s</span>
              <span className="text-blue-700 font-bold">{ttl}s 남음</span>
              <span>300s (5min)</span>
            </div>
          </div>

          <div className="text-[11px] text-slate-600 bg-blue-50 border border-blue-200 rounded p-2">
            💡 메모리 KV는 디스크 대비 <strong>1000배 빠름</strong>. TTL 만료 = 자동 삭제 → 메모리 고갈 방지.
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 2 — CDN: 5 Edge 노드 + cache hit ratio 95%
    // ─────────────────────────────────────────────────────
    function CdnView() {
      const edges = [
        { city: 'ICN', name: '서울',     dot: 'top-2 left-1/2',       color: 'bg-blue-500' },
        { city: 'NRT', name: '도쿄',     dot: 'top-3 left-[68%]',     color: 'bg-blue-500' },
        { city: 'IAD', name: 'N. Virginia', dot: 'top-1/2 left-[20%]',color: 'bg-blue-500' },
        { city: 'LHR', name: '런던',     dot: 'top-3 left-[42%]',     color: 'bg-blue-500' },
        { city: 'GRU', name: '상파울루',  dot: 'bottom-3 left-[28%]',  color: 'bg-blue-500' },
      ];

      return (
        <div className="space-y-3">
          <div className="rounded-lg bg-blue-50 border-2 border-blue-400 p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-2">
                <span className="text-2xl">🌐</span>
                <div>
                  <div className="text-sm font-bold text-blue-900">CloudFront — 전 세계 Edge</div>
                  <div className="text-[10px] text-blue-600 font-mono">400+ PoP · HTTP/2 + HTTP/3</div>
                </div>
              </div>
              <span className="text-[10px] font-bold px-2 py-0.5 rounded bg-blue-200 text-blue-800">5 EDGE 표시</span>
            </div>

            {/* 세계 지도 (단순 SVG) */}
            <div className="relative bg-white rounded border border-blue-200 h-44 overflow-hidden">
              <svg viewBox="0 0 200 100" className="absolute inset-0 w-full h-full opacity-30">
                <path d="M20,40 Q40,30 60,40 T100,45 T140,40 T180,45 L180,70 Q140,75 100,70 T20,70 Z" fill="#94a3b8" />
                <path d="M30,55 Q50,50 70,55 T110,55 L110,85 Q70,88 30,85 Z" fill="#94a3b8" />
              </svg>
              {edges.map((e, i) => (
                <div key={i} className={`absolute ${e.dot}`}>
                  <div className="relative">
                    <div className={`w-3 h-3 rounded-full ${e.color} animate-pulse`}></div>
                    <div className="absolute top-4 left-1/2 -translate-x-1/2 text-[9px] font-bold text-blue-800 whitespace-nowrap">
                      {e.city}
                    </div>
                    <div className="absolute -inset-2 rounded-full bg-blue-400/30 animate-ping"></div>
                  </div>
                </div>
              ))}
              <div className="absolute bottom-1 right-2 text-[9px] text-slate-400 font-mono">edge → user</div>
            </div>
          </div>

          {/* Hit ratio 게이지 */}
          <div className="rounded-lg bg-white border border-blue-200 p-3">
            <div className="flex items-center justify-between mb-2">
              <span className="text-xs font-bold text-slate-700">Cache Hit Ratio</span>
              <span className="text-2xl font-extrabold text-blue-600 tabular-nums">95%</span>
            </div>
            <div className="relative h-4 bg-slate-100 rounded-full overflow-hidden">
              <div className="absolute inset-y-0 left-0 bg-gradient-to-r from-blue-400 to-blue-600" style={{ width: '95%' }} />
              <div className="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-white drop-shadow">
                95 / 100 요청 = Edge에서 응답
              </div>
            </div>
            <div className="text-[10px] text-slate-500 mt-1">
              Origin 부하 <strong className="text-blue-700">1/20</strong> 감소 · Latency p99 <strong className="text-blue-700">300ms → 30ms</strong>
            </div>
          </div>

          <div className="grid grid-cols-5 gap-1 text-center">
            {edges.map((e, i) => (
              <div key={i} className="rounded bg-blue-100 border border-blue-300 p-1">
                <div className="text-[10px] font-bold text-blue-800">{e.city}</div>
                <div className="text-[9px] text-blue-600">{e.name}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 3 — Cache-Aside: App → Cache miss → DB → SET → 응답
    // ─────────────────────────────────────────────────────
    function CacheAsideView() {
      const [stage, setStage] = useState(0); // 0=GET, 1=MISS, 2=DB, 3=SET, 4=RESP

      useEffect(() => {
        const id = setInterval(() => setStage((s) => (s + 1) % 5), 900);
        return () => clearInterval(id);
      }, []);

      const nodes = [
        { key: 'app',   label: 'App',     icon: '👨‍💻', desc: 'FastAPI', color: 'blue' },
        { key: 'cache', label: 'Redis',   icon: '⚡',  desc: 'Cache',   color: 'blue' },
        { key: 'db',    label: 'DB',      icon: '🗄️', desc: 'Postgres', color: 'slate' },
      ];

      const stageLabels = ['1) GET', '2) MISS', '3) SELECT', '4) SETEX', '5) RESPONSE'];

      return (
        <div className="space-y-3">
          <div className="rounded-lg bg-blue-50 border-2 border-blue-400 p-4">
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-2">
                <span className="text-2xl">🔄</span>
                <div className="text-sm font-bold text-blue-900">Cache-Aside 흐름</div>
              </div>
              <span className="text-[10px] font-bold px-2 py-0.5 rounded bg-blue-200 text-blue-800 font-mono">{stageLabels[stage]}</span>
            </div>

            {/* 3개 박스 (App / Cache / DB) */}
            <div className="grid grid-cols-3 gap-2 mb-3">
              {nodes.map((n) => {
                const active =
                  (n.key === 'app'   && (stage === 0 || stage === 4)) ||
                  (n.key === 'cache' && (stage === 0 || stage === 1 || stage === 3)) ||
                  (n.key === 'db'    && (stage === 2));
                return (
                  <div
                    key={n.key}
                    className={`rounded-lg border-2 p-3 text-center transition-all duration-300 ${
                      active
                        ? 'bg-blue-200 border-blue-600 scale-105 shadow-lg'
                        : 'bg-white border-slate-300'
                    }`}
                  >
                    <div className="text-2xl">{n.icon}</div>
                    <div className="text-xs font-bold text-slate-800 mt-1">{n.label}</div>
                    <div className="text-[10px] text-slate-500">{n.desc}</div>
                  </div>
                );
              })}
            </div>

            {/* 흐름 화살표 */}
            <div className="space-y-1.5 text-[11px] font-mono">
              <FlowLine active={stage === 0} from="App" to="Redis" label="GET user:profile:1234" color="blue" />
              <FlowLine active={stage === 1} from="Redis" to="App" label="(nil) MISS" color="red" />
              <FlowLine active={stage === 2} from="App" to="DB"    label="SELECT * FROM users WHERE id=1234" color="slate" />
              <FlowLine active={stage === 3} from="App" to="Redis" label='SETEX 300 {"name":"alice"}' color="blue" />
              <FlowLine active={stage === 4} from="App" to="User"  label='200 OK {"name":"alice"}' color="emerald" />
            </div>
          </div>

          <div className="grid grid-cols-2 gap-2">
            <div className="rounded bg-emerald-50 border border-emerald-300 p-2 text-[11px]">
              <div className="font-bold text-emerald-800">✅ HIT (정상)</div>
              <div className="text-emerald-700">App → Cache → 즉시 응답 (1ms)</div>
            </div>
            <div className="rounded bg-amber-50 border border-amber-300 p-2 text-[11px]">
              <div className="font-bold text-amber-800">⚠ MISS (cold)</div>
              <div className="text-amber-700">App → Cache → DB → SET → 응답 (50ms)</div>
            </div>
          </div>

          <div className="text-[11px] text-slate-600 bg-blue-50 border border-blue-200 rounded p-2">
            💡 첫 요청은 항상 MISS — <strong>warm-up 스크립트</strong>로 인기 키 미리 채워두기.
            만료 순간 동시 요청 100개가 모두 DB로 가는 <strong>Thundering Herd</strong>는 SETNX 락으로 방지.
          </div>
        </div>
      );
    }

    function FlowLine({ active, from, to, label, color }) {
      const colorMap = {
        blue:    'text-blue-700 bg-blue-100 border-blue-400',
        red:     'text-red-700 bg-red-100 border-red-400',
        slate:   'text-slate-700 bg-slate-100 border-slate-400',
        emerald: 'text-emerald-700 bg-emerald-100 border-emerald-400',
      };
      return (
        <div
          className={`flex items-center gap-2 px-2 py-1 rounded border transition-all ${
            active ? `${colorMap[color]} font-bold scale-[1.02] shadow-sm` : 'text-slate-400 bg-white border-slate-200'
          }`}
        >
          <span className="w-12 text-right">{from}</span>
          <span className="flex-shrink-0">{active ? '━━▶' : '──▷'}</span>
          <span className="w-12">{to}</span>
          <span className="flex-1 text-[10px]">{label}</span>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 4 — Invalidation: TTL 5min + invalidation API + version key
    // ─────────────────────────────────────────────────────
    function InvalidationView() {
      const [version, setVersion] = useState('a1b2c3d4');
      const [invalidating, setInvalidating] = useState(false);

      const triggerInvalidate = () => {
        setInvalidating(true);
        setTimeout(() => {
          const next = Math.random().toString(16).slice(2, 10);
          setVersion(next);
          setInvalidating(false);
        }, 1200);
      };

      return (
        <div className="space-y-3">
          {/* 1) TTL 기본 5min */}
          <div className="rounded-lg bg-blue-50 border-2 border-blue-400 p-3">
            <div className="flex items-center gap-2 mb-2">
              <span className="text-xl">⏰</span>
              <div className="text-sm font-bold text-blue-900">전략 1 — TTL 기본 5분</div>
            </div>
            <div className="bg-white rounded border border-blue-200 p-2 text-[11px] font-mono">
              <div className="grid grid-cols-12 gap-1 text-blue-700">
                <span className="col-span-7">user:profile:1234</span>
                <span className="col-span-3 text-right">TTL</span>
                <span className="col-span-2 text-right">300s</span>
              </div>
              <div className="grid grid-cols-12 gap-1 text-blue-700 mt-0.5">
                <span className="col-span-7">product:42</span>
                <span className="col-span-3 text-right">TTL</span>
                <span className="col-span-2 text-right">30s</span>
              </div>
              <div className="grid grid-cols-12 gap-1 text-blue-700 mt-0.5">
                <span className="col-span-7">leaderboard:top10</span>
                <span className="col-span-3 text-right">TTL</span>
                <span className="col-span-2 text-right">60s</span>
              </div>
            </div>
            <div className="text-[10px] text-blue-700 mt-1">단순 + 안전 — 시간 만료로 자동 갱신</div>
          </div>

          {/* 2) 강제 invalidation API */}
          <div className="rounded-lg bg-blue-50 border-2 border-blue-400 p-3">
            <div className="flex items-center gap-2 mb-2">
              <span className="text-xl">🗑️</span>
              <div className="text-sm font-bold text-blue-900">전략 2 — 강제 Invalidation API</div>
            </div>
            <div className="bg-slate-900 text-blue-200 rounded p-2 text-[11px] font-mono">
              <div>$ aws cloudfront create-invalidation \</div>
              <div>&nbsp;&nbsp;&nbsp;&nbsp;--distribution-id E1A2B3C4 \</div>
              <div>&nbsp;&nbsp;&nbsp;&nbsp;--paths "/index.html"</div>
            </div>
            <button
              onClick={triggerInvalidate}
              disabled={invalidating}
              className="mt-2 w-full px-3 py-1.5 rounded bg-blue-600 hover:bg-blue-700 disabled:bg-slate-400 text-white text-xs font-bold transition"
            >
              {invalidating ? '⏳ 무효화 전파 중 (5~10분)...' : '🚨 강제 Invalidation 발사'}
            </button>
            <div className="text-[10px] text-blue-700 mt-1">월 1000 path 무료 · 이후 path당 $0.005 · 전파 5~10분</div>
          </div>

          {/* 3) Version key */}
          <div className="rounded-lg bg-blue-50 border-2 border-blue-400 p-3">
            <div className="flex items-center gap-2 mb-2">
              <span className="text-xl">🔖</span>
              <div className="text-sm font-bold text-blue-900">전략 3 — Versioned Key (권장)</div>
            </div>
            <div className="bg-white rounded border border-blue-200 p-2 text-[11px] font-mono space-y-0.5">
              <div className="text-slate-400 line-through">/static/main.a1b2c3d4.js  ← 이전 (그대로 살아있음)</div>
              <div className="text-blue-700 font-bold">
                /static/main.<span className={`px-1 rounded ${invalidating ? 'bg-yellow-200' : 'bg-blue-200'}`}>{version}</span>.js  ← 현재
              </div>
              <div className="text-slate-500">Cache-Control: public, max-age=31536000, immutable</div>
            </div>
            <div className="text-[10px] text-blue-700 mt-1">
              빌드 해시 = URL → 새 배포 시 새 URL → invalidation 불필요 + <strong>즉시 롤백</strong>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — focus에 따라 분기
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ focus }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🏪 동네 슈퍼 vs 본사</h2>
            <span className="text-[10px] text-slate-400 font-mono">cache flow · live</span>
          </div>

          {focus === 'in_memory'    && <InMemoryView />}
          {focus === 'cdn'          && <CdnView />}
          {focus === 'cache_aside'  && <CacheAsideView />}
          {focus === 'invalidation' && <InvalidationView />}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-blue-500/10 border-l-2 border-blue-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-700 hover:text-blue-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 분산 &amp; 확장 &gt; Chapter 2. Cache &amp; CDN</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Cache / CDN 심화</h1>
                  <p className="text-sm text-slate-500 mt-0.5">동네 슈퍼 vs 본사 — ElastiCache / CloudFront / Cache-Aside / Invalidation</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane focus={step.focus} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 text-sm text-blue-900">
                💡 Part III 완성. 다음(IV-1-1)에서는 <strong>CloudWatch</strong>
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-blue-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-blue-600 text-white hover:bg-blue-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-2-1.html" className="text-slate-500 hover:text-slate-700">&larr; III-2-1 Auto Scaling</a>
              <a href="../part4/IV-1-1.html" className="text-blue-700 hover:text-blue-900 font-medium">IV-1-1 CloudWatch &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
