<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Infra 학습 — III-2-1. Queue / Pub-Sub</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📬</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<body>
  <div id="root"></div>

  <!--
    III-2-1. Queue / Pub-Sub — SQS / SNS / Pub-Sub / DLQ / FIFO
    학습 목표: 비동기 메시징의 두 패턴 — Queue(1:1) vs Pub-Sub(1:N) + DLQ + FIFO
    핵심 비유: 우편함(특정인에게) vs 라디오(모두에게 동시)
    패턴: fastapi v1 패턴 — 좌(LiveDataPane: 메시지 흐름 시각화) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (Queue / Pub-Sub / DLQ / FIFO)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        focus: 'queue',
        title: 'Step 1. Queue — 우편함 (SQS Standard, 1:1 소비)',
        desc: 'Queue는 한 메시지를 한 Consumer만 받아 처리한다. SQS Standard는 at-least-once + 무순서. ReceiveMessage 시점부터 Visibility Timeout(60s) 동안 다른 워커에게 안 보이게 잠그고, 처리 완료 시 명시적으로 DeleteMessage 해야 큐에서 사라진다.',
        producers: 1,
        messages: [
          { id: 'm1', label: 'msg-1', target: 'A', state: 'inflight', vt: 42 },
          { id: 'm2', label: 'msg-2', target: 'B', state: 'inflight', vt: 18 },
          { id: 'm3', label: 'msg-3', target: 'C', state: 'queued',   vt: null },
          { id: 'm4', label: 'msg-4', target: null, state: 'queued',  vt: null },
        ],
        consumers: [
          { id: 'A', name: 'Worker A', state: 'busy' },
          { id: 'B', name: 'Worker B', state: 'busy' },
          { id: 'C', name: 'Worker C', state: 'idle' },
        ],
        showDLQ: false,
        showFifo: false,
        showAlert: false,
        code: {
          lang: 'hcl',
          filename: 'sqs_queue.tf',
          lines: [
            '# Terraform — SQS Standard Queue (1:1 소비)',
            'resource "aws_sqs_queue" "orders" {',
            '  name                       = "orders-queue"',
            '  visibility_timeout_seconds = 60      # 워커 처리 시간',
            '  message_retention_seconds  = 345600  # 4일 보관',
            '  receive_wait_time_seconds  = 20      # Long polling',
            '}',
            '',
            '# 흐름 — 1 Producer ──► [Queue] ──► 1 Worker (msg마다)',
            '#',
            '#   Producer ──► [SQS] ──► Worker A  (msg-1, VT=60s lock)',
            '#                       ├► Worker B  (msg-2, VT=60s lock)',
            '#                       └► Worker C  (idle, msg-3 대기)',
            '#',
            '# Worker가 처리 도중 죽으면?',
            '#   → VT 만료 후 다른 워커에게 자동 재배달',
            '# 사용처: 주문 처리, 영상 인코딩, 이메일 발송 등',
            '# 특징: 트래픽 스파이크를 큐가 흡수 → 워커는 자기 속도로 소비',
          ],
          highlight: [4, 6, 11, 12, 13],
        },
      },
      {
        focus: 'pubsub',
        title: 'Step 2. Pub-Sub — 라디오 방송 (Topic, 1:N fan-out)',
        desc: '한 메시지를 여러 Subscriber가 동시에 받는다. Topic에 publish → 구독한 모든 Subscription이 각자 사본을 받는다. 주문 한 건 발생 시 결제·재고·알림팀이 동시 처리. Subscriber 추가/제거가 Publisher 코드 변경 없이 가능.',
        producers: 1,
        messages: [
          { id: 'p1', label: 'order.created', target: 'fanout', state: 'fanout', vt: null },
        ],
        consumers: [
          { id: 'B', name: 'billing-sub',   state: 'recv', tag: '결제' },
          { id: 'I', name: 'inventory-sub', state: 'recv', tag: '재고' },
          { id: 'N', name: 'notify-sub',    state: 'recv', tag: '알림' },
        ],
        showDLQ: false,
        showFifo: false,
        showAlert: false,
        code: {
          lang: 'hcl',
          filename: 'pubsub_topic.tf',
          lines: [
            '# GCP Pub/Sub — Topic 1개 + Subscription N개',
            'resource "google_pubsub_topic" "order_events" {',
            '  name = "order-events"',
            '}',
            '',
            'resource "google_pubsub_subscription" "billing_sub" {',
            '  name  = "billing-sub"',
            '  topic = google_pubsub_topic.order_events.name',
            '  ack_deadline_seconds = 30',
            '}',
            '',
            'resource "google_pubsub_subscription" "inventory_sub" {',
            '  name  = "inventory-sub"',
            '  topic = google_pubsub_topic.order_events.name',
            '  ack_deadline_seconds = 30',
            '}',
            '',
            'resource "google_pubsub_subscription" "notify_sub" {',
            '  name  = "notify-sub"',
            '  topic = google_pubsub_topic.order_events.name',
            '  push_config {                         # push 방식',
            '    push_endpoint = "https://notify.run.app/events"',
            '  }',
            '}',
            '',
            '# 흐름 — 1 Publish = N Subscriber 모두 사본 수신',
            '#                   ┌─► billing-sub   ─► 결제',
            '#   Publisher ─► Topic ─► inventory-sub ─► 재고',
            '#                   └─► notify-sub    ─► 알림 (push)',
            '#',
            '# AWS: SNS(Topic) + SQS(Sub) 조합',
            '# Azure: Service Bus Topics',
          ],
          highlight: [2, 6, 12, 18, 21],
        },
      },
      {
        focus: 'dlq',
        title: 'Step 3. DLQ — 실패 메시지 격리 (Dead Letter Queue)',
        desc: '처리 실패가 반복되는 메시지를 본 큐에서 빼서 별도 DLQ로 격리한다. maxReceiveCount(예: 3)를 넘으면 자동 이동. 본 큐를 "독성 메시지" 한 건이 막아버리는 사고를 막는다. DLQ는 별도 알람/조사 후 수동 재처리.',
        producers: 1,
        messages: [
          { id: 'd1', label: 'msg-X (3회 실패)', target: 'dlq', state: 'failing', vt: null, retries: 3 },
          { id: 'd2', label: 'msg-Y',           target: 'A',   state: 'inflight', vt: 30, retries: 0 },
          { id: 'd3', label: 'msg-Z',           target: null,  state: 'queued',   vt: null, retries: 0 },
        ],
        consumers: [
          { id: 'A', name: 'Worker A', state: 'busy' },
          { id: 'B', name: 'Worker B', state: 'idle' },
        ],
        showDLQ: true,
        showFifo: false,
        showAlert: true,
        code: {
          lang: 'hcl',
          filename: 'dlq.tf',
          lines: [
            '# Terraform — 본 큐 + DLQ 한 쌍 (redrive 설정)',
            'resource "aws_sqs_queue" "orders_dlq" {',
            '  name                      = "orders-dlq"',
            '  message_retention_seconds = 1209600  # 14일',
            '}',
            '',
            'resource "aws_sqs_queue" "orders" {',
            '  name                       = "orders-queue"',
            '  visibility_timeout_seconds = 60',
            '',
            '  redrive_policy = jsonencode({',
            '    deadLetterTargetArn = aws_sqs_queue.orders_dlq.arn',
            '    maxReceiveCount     = 3   # 3회 실패 후 DLQ로',
            '  })',
            '}',
            '',
            '# CloudWatch Alarm — DLQ 메시지 발생 시 알람',
            'resource "aws_cloudwatch_metric_alarm" "dlq_alarm" {',
            '  alarm_name          = "orders-dlq-not-empty"',
            '  metric_name         = "ApproximateNumberOfMessagesVisible"',
            '  namespace           = "AWS/SQS"',
            '  threshold           = 1',
            '  comparison_operator = "GreaterThanOrEqualToThreshold"',
            '  alarm_actions       = [aws_sns_topic.oncall.arn]',
            '}',
            '',
            '# 흐름 — 독성 메시지 차단',
            '#   msg-X ─► [orders] ─► Worker (3회 실패)',
            '#                     └► [orders-dlq] (격리) ─► 알람',
          ],
          highlight: [11, 12, 13, 18, 23],
        },
      },
      {
        focus: 'fifo',
        title: 'Step 4. FIFO — 순서 보장 (SQS FIFO + dedup)',
        desc: 'Standard는 무순서·중복 가능. 결제·재고처럼 순서가 중요하면 FIFO Queue. MessageGroupId가 같은 메시지는 발행 순서대로, 한 번씩만 전달됨(exactly-once). 같은 dedup ID는 5분 내 자동 중복 제거. user_id 단위로 그룹을 쪼개면 병렬도 확보.',
        producers: 1,
        messages: [
          { id: 'f1', label: 'created (user-42)', target: 'A', state: 'inflight', vt: 25, group: 'user-42', order: 1 },
          { id: 'f2', label: 'paid    (user-42)', target: null, state: 'queued',   vt: null, group: 'user-42', order: 2 },
          { id: 'f3', label: 'shipped (user-42)', target: null, state: 'queued',   vt: null, group: 'user-42', order: 3 },
          { id: 'f4', label: 'created (user-99)', target: 'B', state: 'inflight', vt: 25, group: 'user-99', order: 1 },
        ],
        consumers: [
          { id: 'A', name: 'Worker A', state: 'busy', tag: 'user-42 그룹' },
          { id: 'B', name: 'Worker B', state: 'busy', tag: 'user-99 그룹' },
        ],
        showDLQ: false,
        showFifo: true,
        showAlert: false,
        code: {
          lang: 'python',
          filename: 'publish_fifo.py',
          lines: [
            '# boto3 — SQS FIFO publish (그룹 ID + dedup ID)',
            'import boto3',
            'import json',
            'import uuid',
            '',
            'sqs = boto3.client("sqs", region_name="ap-northeast-2")',
            'QUEUE_URL = "https://sqs.../orders.fifo"',
            '',
            'def publish_order_event(user_id: str, event: dict) -> None:',
            '    """주문 이벤트를 FIFO 큐에 발행한다.',
            '',
            '    Args:',
            '        user_id: MessageGroupId — 그룹 내 순서 보장',
            '        event:   payload (created/paid/shipped 등)',
            '    """',
            '    sqs.send_message(',
            '        QueueUrl=QUEUE_URL,',
            '        MessageBody=json.dumps(event),',
            '        MessageGroupId=user_id,                   # 순서 단위',
            '        MessageDeduplicationId=str(uuid.uuid4()), # 5분 dedup',
            '    )',
            '',
            '# 같은 user는 created → paid → shipped 순서 보장',
            'publish_order_event("user-42", {"type": "created"})',
            'publish_order_event("user-42", {"type": "paid"})',
            'publish_order_event("user-42", {"type": "shipped"})',
            '',
            '# 다른 user는 다른 그룹 → 병렬 처리 가능',
            'publish_order_event("user-99", {"type": "created"})',
            '',
            '# 그룹 설계 팁',
            '#   - 너무 크게(예: "global") → 병렬도 0',
            '#   - 보통 user_id / order_id / device_id 단위',
          ],
          highlight: [19, 20, 24, 25, 26, 29],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // LiveDataPane — Queue/Pub-Sub 메시지 흐름 시각화
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const isPubSub = step.focus === 'pubsub';
      const isDLQ = step.showDLQ;
      const isFifo = step.showFifo;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">📬 메시지 흐름 — 우편함 vs 라디오</h2>
            <span className="text-[10px] text-slate-400 font-mono">live · {step.focus}</span>
          </div>

          {/* 3-column flow: Producer / Hub / Consumers */}
          <div className="grid grid-cols-12 gap-2 items-center">

            {/* Producer */}
            <div className="col-span-3">
              <div className="rounded-lg border-2 border-blue-300 bg-blue-50 p-3 text-center">
                <div className="text-2xl">📤</div>
                <div className="text-xs font-bold text-blue-800 mt-1">Producer</div>
                <div className="text-[10px] text-slate-500 mt-0.5">{isPubSub ? 'Publisher' : 'Sender'}</div>
              </div>
            </div>

            {/* arrow */}
            <div className="col-span-1 text-center text-blue-500 font-bold text-xl">→</div>

            {/* Hub: Queue or Topic */}
            <div className="col-span-4">
              <div className={`rounded-lg border-2 p-3 ${isPubSub ? 'bg-blue-100 border-blue-500' : 'bg-blue-50 border-blue-400'}`}>
                <div className="flex items-center justify-between mb-2">
                  <span className="text-xs font-bold text-blue-900">
                    {isPubSub ? '📡 SNS Topic' : isFifo ? '🔢 SQS FIFO' : '📬 SQS Queue'}
                  </span>
                  <span className="text-[9px] font-mono text-blue-700">
                    {isPubSub ? 'fan-out' : isFifo ? 'ordered' : 'standard'}
                  </span>
                </div>

                {/* messages stacked */}
                <div className="space-y-1">
                  {step.messages.map((m) => {
                    const stateClr =
                      m.state === 'inflight' ? 'bg-amber-100 border-amber-400 text-amber-800' :
                      m.state === 'failing'  ? 'bg-red-100 border-red-500 text-red-800 animate-pulse' :
                      m.state === 'fanout'   ? 'bg-blue-200 border-blue-500 text-blue-900' :
                                               'bg-white border-slate-300 text-slate-700';
                    return (
                      <div key={m.id} className={`text-[10px] font-mono px-2 py-1 rounded border ${stateClr} flex justify-between items-center`}>
                        <span>{m.label}</span>
                        {m.vt && <span className="text-[9px] text-amber-600">VT {m.vt}s</span>}
                        {m.retries > 0 && <span className="text-[9px] text-red-600">↻{m.retries}/3</span>}
                        {isFifo && m.group && <span className="text-[9px] text-blue-600">#{m.order}</span>}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* arrow */}
            <div className="col-span-1 text-center text-blue-500 font-bold text-xl">
              {isPubSub ? '⇉' : '→'}
            </div>

            {/* Consumers */}
            <div className="col-span-3 space-y-1.5">
              {step.consumers.map((c) => {
                const cClr =
                  c.state === 'busy' ? 'bg-blue-50 border-blue-400 text-blue-800' :
                  c.state === 'recv' ? 'bg-blue-100 border-blue-500 text-blue-900 animate-pulse' :
                                       'bg-slate-50 border-slate-300 text-slate-500';
                return (
                  <div key={c.id} className={`rounded-md border-2 p-1.5 text-center ${cClr}`}>
                    <div className="text-base">👷</div>
                    <div className="text-[10px] font-bold">{c.name}</div>
                    {c.tag && <div className="text-[9px] text-slate-500">{c.tag}</div>}
                    <div className="text-[9px] mt-0.5">
                      {c.state === 'busy' ? '🟡 처리중' : c.state === 'recv' ? '🔵 수신' : '⚪ 대기'}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* DLQ 박스 (Step 3) */}
          {isDLQ && (
            <div className="mt-4 grid grid-cols-12 gap-2 items-center">
              <div className="col-span-4 col-start-5 text-center text-red-500 font-bold text-xs">
                ↓ 3회 실패 시 격리
              </div>
              <div className="col-span-4 col-start-5">
                <div className="rounded-lg border-2 border-red-500 bg-red-50 p-3 animate-pulse">
                  <div className="flex items-center gap-2">
                    <span className="text-xl">💀</span>
                    <div>
                      <div className="text-xs font-bold text-red-800">DLQ — orders-dlq</div>
                      <div className="text-[10px] text-red-600 font-mono">msg-X 격리 · 14일 보관</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* FIFO 그룹 안내 (Step 4) */}
          {isFifo && (
            <div className="mt-4 p-3 rounded-lg bg-blue-50 border border-blue-300">
              <div className="text-xs font-bold text-blue-800 mb-1">🔢 MessageGroupId 기반 순서 보장 + dedup</div>
              <div className="text-[11px] text-blue-700 font-mono space-y-0.5">
                <div>• <span className="text-blue-900 font-bold">user-42</span>: created(1) → paid(2) → shipped(3) <span className="text-emerald-700">✓ 순서 보장</span></div>
                <div>• <span className="text-blue-900 font-bold">user-99</span>: created(1) <span className="text-emerald-700">✓ 다른 그룹 = 병렬</span></div>
                <div>• 같은 dedup ID 5분 내 재전송 → 자동 무시</div>
              </div>
            </div>
          )}

          {/* 알람 박스 (Step 3) */}
          {step.showAlert && !isFifo && (
            <div className="mt-4 p-3 rounded-lg bg-red-50 border-2 border-red-400">
              <div className="flex items-center gap-2 text-red-800 font-bold text-sm">
                <span className="text-lg">🚨</span>
                <span>ALERT: orders-dlq-not-empty</span>
              </div>
              <div className="text-[11px] text-red-700 mt-1 font-mono">
                #ops-alerts · CloudWatch · 수동 조사 필요
              </div>
            </div>
          )}

          {/* 4단계 요약 카드 — 항상 하단 표시 */}
          <div className="grid grid-cols-4 gap-2 mt-4 pt-3 border-t border-slate-100">
            {[
              { key: 'queue',  emoji: '📬', name: 'Queue',   note: '1:1 소비' },
              { key: 'pubsub', emoji: '📻', name: 'Pub-Sub', note: '1:N fan-out' },
              { key: 'dlq',    emoji: '💀', name: 'DLQ',     note: '실패 격리' },
              { key: 'fifo',   emoji: '🔢', name: 'FIFO',    note: '순서 보장' },
            ].map((m) => {
              const active = step.focus === m.key;
              return (
                <div
                  key={m.key}
                  className={`rounded-md p-2 text-center transition-all ${active ? 'bg-blue-100 border-2 border-blue-500 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-lg">{m.emoji}</div>
                  <div className="text-[10px] font-bold text-slate-800 mt-0.5">{m.name}</div>
                  <div className="text-[9px] text-slate-500">{m.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-blue-500/10 border-l-2 border-blue-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-700 hover:text-blue-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Cloud Infra &gt; Chapter 2. 메시징 / 캐시</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Queue / Pub-Sub</h1>
                  <p className="text-sm text-slate-500 mt-0.5">우편함 vs 라디오 방송 — SQS · SNS · Pub/Sub · DLQ · FIFO</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 text-sm text-blue-900">
                💡 다음(III-2-2)에서는 <strong>Cache / CDN 심화</strong>
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-blue-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-blue-600 text-white hover:bg-blue-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./III-2-2.html" className="text-blue-700 hover:text-blue-900 font-medium">III-2-2 Cache / CDN &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
