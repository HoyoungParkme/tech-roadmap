  <div id="root"></div>

  <!--
    III-1-2. Auth / KMS / Logs
    학습 목표: IAM (출입증) / KMS·Secret (금고) / CloudTrail (CCTV) — 3-layer 보안의 토대
    핵심 비유: 출입증 + 금고 + CCTV
    패턴: 좌측 LiveDataPane (3-layer 보안 시각화) / 우측 VSCode CodeViewer
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // STEPS — 4 단계 (iam / kms_secret / logs_audit / least_privilege)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. IAM — "출입증 발급 (User → Role → Policy → Resource)"',
        desc: 'IAM은 "누가(User/Role) 어떤 자원(Resource)에 어떤 행위(Action)를 할 수 있나"를 정의한다. 사람은 User, 서비스는 Role(STS Assume)로 임시 자격을 받는다. Policy는 JSON. 좁히면 좁힐수록 안전 — Action / Resource / Condition 3-축으로 제어한다.',
        focus: 'iam',
        showAlert: false,
        code: {
          lang: 'yaml',
          filename: 'iam-policy.yml',
          lines: [
            '# Terraform — Least Privilege IAM Policy',
            'resource "aws_iam_policy" "s3_read_app_data" {',
            '  name   = "s3-read-app-data"',
            '  policy = jsonencode({',
            '    Version = "2012-10-17"',
            '    Statement = [{',
            '      Sid      = "ReadOnlyMyBucket"',
            '      Effect   = "Allow"',
            '      Action   = ["s3:GetObject", "s3:ListBucket"]',
            '      Resource = [',
            '        "arn:aws:s3:::my-app-data",',
            '        "arn:aws:s3:::my-app-data/*"',
            '      ]',
            '      Condition = {',
            '        IpAddress = { "aws:SourceIp" = "10.0.0.0/16" }',
            '      }',
            '    }]',
            '  })',
            '}',
            '',
            '# Trust Policy — EC2가 이 Role을 Assume',
            'resource "aws_iam_role" "app_role" {',
            '  name = "app-runtime-role"',
            '  assume_role_policy = jsonencode({',
            '    Version = "2012-10-17"',
            '    Statement = [{',
            '      Effect    = "Allow"',
            '      Principal = { Service = "ec2.amazonaws.com" }',
            '      Action    = "sts:AssumeRole"',
            '    }]',
            '  })',
            '}',
            '',
            '# 흐름: EC2 → STS 임시 자격 → SDK 자동 사용',
            '# (액세스 키 코드/Git에 박지 않음)',
          ],
          highlight: [9, 10, 14, 15],
        },
      },
      {
        title: 'Step 2. KMS / Secret Manager — "금고와 마스터키"',
        desc: 'KMS는 암호화 키 관리(HSM 보관, 자동 회전 1년). Secret Manager는 DB 비밀번호/API 키를 KMS로 암호화해 저장 + 30일 자동 회전. 코드에는 SecretId만 적고, 런타임에 fetch해서 메모리에서만 사용. 평문 → KMS 암호문 → S3에 저장된 ciphertext blob.',
        focus: 'kms_secret',
        showAlert: false,
        code: {
          lang: 'yaml',
          filename: 'kms-secret.tf',
          lines: [
            '# Terraform — KMS Customer-Managed Key',
            'resource "aws_kms_key" "app_key" {',
            '  description             = "App master key"',
            '  enable_key_rotation     = true        # 1년마다 자동 회전',
            '  deletion_window_in_days = 30',
            '}',
            '',
            '# Terraform — Secrets Manager + 30일 회전',
            'resource "aws_secretsmanager_secret" "rds_pw" {',
            '  name        = "prod/rds/password"',
            '  kms_key_id  = aws_kms_key.app_key.id    # KMS로 암호화',
            '  rotation_lambda_arn = aws_lambda_function.rotate.arn',
            '  rotation_rules { automatically_after_days = 30 }',
            '}',
            '',
            '# 앱 코드 — 런타임 fetch (평문 하드코딩 금지)',
            'import boto3, json',
            'from functools import lru_cache',
            '',
            '@lru_cache(maxsize=1)',
            'def get_db_credentials() -> dict:',
            '    """RDS 비밀번호 조회 — KMS가 자동 복호화."""',
            '    sm = boto3.client("secretsmanager", region_name="ap-northeast-2")',
            '    resp = sm.get_secret_value(SecretId="prod/rds/password")',
            '    return json.loads(resp["SecretString"])',
            '',
            '# 흐름: SecretId → KMS 복호화 → 평문 JSON (메모리)',
            '# 30일 후 Lambda가 새 비밀번호 생성 → RDS 갱신 → Secret 갱신',
            '# 앱은 fetch만 하면 됨 (재배포 불필요)',
          ],
          highlight: [4, 11, 13, 23, 24],
        },
      },
      {
        title: 'Step 3. Logs / CloudTrail — "CCTV가 모든 API call을 기록"',
        desc: 'CloudTrail은 모든 AWS API call을 시간순 기록 — 누가 언제 무엇을 변경했는지. 변경 추적/감사/포렌식의 핵심. CloudWatch Logs는 앱 로그. S3 + Object Lock으로 변조 불가 보관 → Athena SQL로 분석. 보안 사고 시 "누가 했어요?"의 답.',
        focus: 'logs_audit',
        showAlert: false,
        code: {
          lang: 'yaml',
          filename: 'cloudtrail.yml',
          lines: [
            '# CloudFormation — CloudTrail (모든 리전 + 변조 방지)',
            'Resources:',
            '  AuditTrail:',
            '    Type: AWS::CloudTrail::Trail',
            '    Properties:',
            '      TrailName: org-audit-trail',
            '      S3BucketName: !Ref AuditBucket',
            '      IsLogging: true',
            '      IsMultiRegionTrail: true        # 모든 리전 통합',
            '      EnableLogFileValidation: true   # 변조 감지 (해시 체인)',
            '      IncludeGlobalServiceEvents: true',
            '      EventSelectors:',
            '        - ReadWriteType: All',
            '          IncludeManagementEvents: true',
            '          DataResources:',
            '            - Type: AWS::S3::Object',
            '              Values: ["arn:aws:s3:::my-app-data/"]',
            '',
            '  AuditBucket:',
            '    Type: AWS::S3::Bucket',
            '    Properties:',
            '      BucketName: org-audit-logs-2026',
            '      VersioningConfiguration: { Status: Enabled }',
            '      ObjectLockEnabled: true         # WORM (변경 불가)',
            '',
            '# Athena 분석 예시 — 지난 24시간 IAM Policy 변경자',
            '# SELECT userIdentity.userName, eventName, eventTime',
            '# FROM   cloudtrail_logs',
            '# WHERE  eventName LIKE \'%Policy%\'',
            '#   AND  eventTime > now() - interval \'1\' day',
            '# ORDER BY eventTime DESC;',
          ],
          highlight: [9, 10, 24, 28, 29, 30],
        },
      },
      {
        title: 'Step 4. Least Privilege — "위반 사례 → 수정"',
        desc: 'Action="*" + Resource="*"는 root 권한 수준 — 키 1개 유출이 회사 전체 노출로 번진다. 좁히는 법: Action 명시 + Resource ARN 명시 + Condition (Tag/IP/MFA) 추가. IAM Access Analyzer가 미사용 권한 자동 감지 + CloudTrail 90일 이력으로 정책 자동 생성.',
        focus: 'least_privilege',
        showAlert: true,
        code: {
          lang: 'yaml',
          filename: 'least-privilege.tf',
          lines: [
            '# ❌ 나쁜 정책 (절대 금지) — admin 권한 남용',
            '{',
            '  "Effect":   "Allow",',
            '  "Action":   "*",     # 모든 행위',
            '  "Resource": "*"      # 모든 자원',
            '}',
            '# 사고 시: 키 1개 유출 → 회사 전체 자원 노출',
            '',
            '# ⚠️ 그래도 나쁨 — 서비스만 한정',
            '{',
            '  "Effect":   "Allow",',
            '  "Action":   "s3:*",  # S3 모든 행위 (삭제 포함)',
            '  "Resource": "*"      # 모든 버킷',
            '}',
            '',
            '# ✅ 좋은 정책 — Action + Resource + Condition 모두 좁힘',
            '{',
            '  "Effect": "Allow",',
            '  "Action": [',
            '    "s3:GetObject",',
            '    "s3:ListBucket"',
            '  ],',
            '  "Resource": [',
            '    "arn:aws:s3:::my-app-data",',
            '    "arn:aws:s3:::my-app-data/uploads/*"',
            '  ],',
            '  "Condition": {',
            '    "StringEquals": { "aws:PrincipalTag/team": "data" }',
            '  }',
            '}',
            '',
            '# IAM Access Analyzer — 미사용 권한 감지',
            '$ aws accessanalyzer list-findings --analyzer-arn ...',
            '',
            '# 정기 audit 체크리스트',
            '# [ ] wildcard Action / Resource 없는지',
            '# [ ] 90일 이상 미사용 Role 비활성화',
            '# [ ] MFA 적용 (콘솔 로그인)',
            '# [ ] Root 계정 봉인 + 알람',
          ],
          highlight: [4, 5, 12, 13, 19, 20, 21, 27, 28],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측: LiveDataPane — 3-layer 보안 시각화
    //   focus별로 IAM Tree / KMS+Secret / CloudTrail / Violation 패널 전환
    // ─────────────────────────────────────────────────────

    // Step 1 — IAM 정책 트리 데이터
    const IAM_TREE = {
      user: { icon: '👤', name: 'app-developer (User)', sub: '사람 계정' },
      role: { icon: '🎭', name: 'app-runtime-role (Role)', sub: 'EC2가 Assume' },
      policy: {
        icon: '📜',
        name: 's3-read-app-data',
        statements: [
          { effect: 'Allow', action: 's3:GetObject',  resource: 'my-app-data/*' },
          { effect: 'Allow', action: 's3:ListBucket', resource: 'my-app-data' },
        ],
        condition: 'aws:SourceIp = 10.0.0.0/16',
      },
      resource: { icon: '🪣', name: 'S3 bucket: my-app-data', sub: '실제 자원' },
    };

    function IamTree() {
      return (
        <div>
          <div className="text-xs font-bold text-blue-700 mb-3">🪪 IAM 정책 트리 — Least Privilege 구조</div>
          <div className="space-y-2">
            {/* User */}
            <div className="flex items-center gap-2 p-2.5 rounded-lg bg-blue-50 border-2 border-blue-300">
              <span className="text-xl">{IAM_TREE.user.icon}</span>
              <div className="flex-1 min-w-0">
                <div className="text-xs font-bold text-blue-900 truncate">{IAM_TREE.user.name}</div>
                <div className="text-[10px] text-blue-600">{IAM_TREE.user.sub}</div>
              </div>
              <span className="text-[10px] font-mono text-blue-500">User</span>
            </div>
            <div className="flex justify-center text-blue-300 text-xs leading-none">↓ sts:AssumeRole</div>

            {/* Role */}
            <div className="flex items-center gap-2 p-2.5 rounded-lg bg-blue-100 border-2 border-blue-400">
              <span className="text-xl">{IAM_TREE.role.icon}</span>
              <div className="flex-1 min-w-0">
                <div className="text-xs font-bold text-blue-900 truncate">{IAM_TREE.role.name}</div>
                <div className="text-[10px] text-blue-700">{IAM_TREE.role.sub}</div>
              </div>
              <span className="text-[10px] font-mono text-blue-600">Role</span>
            </div>
            <div className="flex justify-center text-blue-300 text-xs leading-none">↓ attached</div>

            {/* Policy */}
            <div className="p-2.5 rounded-lg bg-sky-50 border-2 border-sky-300">
              <div className="flex items-center gap-2 mb-1.5">
                <span className="text-xl">{IAM_TREE.policy.icon}</span>
                <div className="flex-1 min-w-0">
                  <div className="text-xs font-bold text-sky-900 truncate">{IAM_TREE.policy.name}</div>
                  <div className="text-[10px] text-sky-700">{IAM_TREE.policy.statements.length} statements</div>
                </div>
                <span className="text-[10px] font-mono text-sky-600">Policy</span>
              </div>
              <div className="space-y-1">
                {IAM_TREE.policy.statements.map((s, i) => (
                  <div key={i} className="flex items-center gap-1.5 text-[10px] font-mono bg-white rounded px-2 py-1 border border-sky-200">
                    <span className="text-emerald-700 font-bold">{s.effect}</span>
                    <span className="text-slate-700">{s.action}</span>
                    <span className="text-slate-400">on</span>
                    <span className="text-blue-700 truncate">{s.resource}</span>
                  </div>
                ))}
                <div className="text-[10px] font-mono text-amber-700 bg-amber-50 rounded px-2 py-1 border border-amber-200">
                  if {IAM_TREE.policy.condition}
                </div>
              </div>
            </div>
            <div className="flex justify-center text-blue-300 text-xs leading-none">↓ grants access to</div>

            {/* Resource */}
            <div className="flex items-center gap-2 p-2.5 rounded-lg bg-emerald-50 border-2 border-emerald-300">
              <span className="text-xl">{IAM_TREE.resource.icon}</span>
              <div className="flex-1 min-w-0">
                <div className="text-xs font-bold text-emerald-900 truncate">{IAM_TREE.resource.name}</div>
                <div className="text-[10px] text-emerald-700">{IAM_TREE.resource.sub}</div>
              </div>
              <span className="text-[10px] font-mono text-emerald-600">Resource</span>
            </div>
          </div>
        </div>
      );
    }

    // Step 2 — KMS key + Secret Manager 표
    const SECRETS = [
      { name: 'prod/rds/password',  rotated: '12d ago', next: '18d',  status: 'ok'   },
      { name: 'prod/api/stripe-key', rotated: '3d ago',  next: '27d',  status: 'ok'   },
      { name: 'prod/jwt/signing',    rotated: '88d ago', next: '회전 필요', status: 'warn' },
    ];

    function KmsSecretPane() {
      return (
        <div>
          <div className="text-xs font-bold text-blue-700 mb-3">🔑 KMS Master Key + Secret Manager</div>

          {/* KMS Key 박스 */}
          <div className="p-3 rounded-lg bg-blue-50 border-2 border-blue-400 mb-3">
            <div className="flex items-center gap-2 mb-2">
              <span className="text-2xl">🗝️</span>
              <div className="flex-1">
                <div className="text-xs font-bold text-blue-900">KMS Customer-Managed Key</div>
                <div className="text-[10px] font-mono text-blue-700">arn:aws:kms:ap-northeast-2:...:key/app-master</div>
              </div>
              <span className="text-[10px] font-bold px-2 py-0.5 rounded bg-emerald-100 text-emerald-700">활성</span>
            </div>
            <div className="grid grid-cols-3 gap-2 text-[10px]">
              <div className="bg-white rounded p-1.5 border border-blue-200">
                <div className="text-blue-500">자동 회전</div>
                <div className="font-bold text-blue-900">매년 1회</div>
              </div>
              <div className="bg-white rounded p-1.5 border border-blue-200">
                <div className="text-blue-500">알고리즘</div>
                <div className="font-bold text-blue-900">AES-256</div>
              </div>
              <div className="bg-white rounded p-1.5 border border-blue-200">
                <div className="text-blue-500">보관</div>
                <div className="font-bold text-blue-900">HSM</div>
              </div>
            </div>
          </div>

          {/* 암호화/복호화 흐름 */}
          <div className="flex items-center justify-between gap-1 mb-3 text-[10px] font-mono">
            <div className="flex-1 bg-slate-100 rounded px-2 py-1.5 text-center border border-slate-200">
              <div className="text-slate-500">평문</div>
              <div className="font-bold text-slate-700">"pw=xyz"</div>
            </div>
            <span className="text-blue-500">→ KMS →</span>
            <div className="flex-1 bg-blue-100 rounded px-2 py-1.5 text-center border border-blue-300">
              <div className="text-blue-600">암호문</div>
              <div className="font-bold text-blue-900">AQIDB...</div>
            </div>
            <span className="text-blue-500">→ S3</span>
          </div>

          {/* Secret Manager 표 */}
          <div className="rounded-lg border border-blue-200 overflow-hidden">
            <div className="bg-blue-100 px-2 py-1.5 text-[10px] font-bold text-blue-800 grid grid-cols-12 gap-1">
              <span className="col-span-6">Secret</span>
              <span className="col-span-3">최근 회전</span>
              <span className="col-span-3">다음 회전</span>
            </div>
            {SECRETS.map((s, i) => (
              <div
                key={i}
                className={`px-2 py-1.5 text-[10px] font-mono grid grid-cols-12 gap-1 border-t border-blue-100 ${s.status === 'warn' ? 'bg-amber-50' : 'bg-white'}`}
              >
                <span className="col-span-6 text-slate-800 truncate">{s.name}</span>
                <span className="col-span-3 text-slate-600">{s.rotated}</span>
                <span className={`col-span-3 font-bold ${s.status === 'warn' ? 'text-amber-700' : 'text-emerald-700'}`}>
                  {s.next}
                </span>
              </div>
            ))}
          </div>
          <div className="text-[10px] text-blue-600 mt-2">↻ Rotation Lambda가 30일마다 새 비밀번호를 생성 → RDS·Secret 동시 갱신</div>
        </div>
      );
    }

    // Step 3 — CloudTrail 표
    const CLOUDTRAIL_EVENTS = [
      { time: '14:02:11', user: 'alice@corp',     action: 'GetObject',         resource: 's3:my-app-data/users.csv',     status: 'OK'   },
      { time: '14:08:43', user: 'bob@corp',       action: 'CreateAccessKey',   resource: 'iam:User/intern',              status: 'OK'   },
      { time: '14:12:02', user: 'app-runtime-role', action: 'PutObject',       resource: 's3:my-app-data/uploads/x.png', status: 'OK'   },
      { time: '14:33:55', user: 'unknown',         action: 'AssumeRole',        resource: 'iam:Role/admin',               status: 'DENY' },
      { time: '14:41:09', user: 'carol@corp',     action: 'PutBucketPolicy',   resource: 's3:public-bucket',             status: 'OK'   },
      { time: '15:02:18', user: 'alice@corp',     action: 'DeleteObject',      resource: 's3:my-app-data/old.csv',       status: 'OK'   },
    ];

    function CloudTrailPane() {
      return (
        <div>
          <div className="text-xs font-bold text-blue-700 mb-3">📜 CloudTrail — API call 시간순 기록</div>

          {/* 통계 */}
          <div className="grid grid-cols-3 gap-2 mb-3">
            <div className="bg-blue-50 border border-blue-300 rounded p-2 text-center">
              <div className="text-[10px] text-blue-600">최근 1h</div>
              <div className="text-base font-bold text-blue-900">{CLOUDTRAIL_EVENTS.length} 건</div>
            </div>
            <div className="bg-emerald-50 border border-emerald-300 rounded p-2 text-center">
              <div className="text-[10px] text-emerald-600">성공</div>
              <div className="text-base font-bold text-emerald-700">{CLOUDTRAIL_EVENTS.filter(e=>e.status==='OK').length} 건</div>
            </div>
            <div className="bg-red-50 border border-red-300 rounded p-2 text-center">
              <div className="text-[10px] text-red-600">거부</div>
              <div className="text-base font-bold text-red-700">{CLOUDTRAIL_EVENTS.filter(e=>e.status!=='OK').length} 건</div>
            </div>
          </div>

          {/* 표 */}
          <div className="rounded-lg border border-blue-200 overflow-hidden">
            <div className="bg-blue-100 px-2 py-1.5 text-[10px] font-bold text-blue-800 grid grid-cols-12 gap-1">
              <span className="col-span-3">Time</span>
              <span className="col-span-3">User</span>
              <span className="col-span-3">Action</span>
              <span className="col-span-2">Resource</span>
              <span className="col-span-1">Status</span>
            </div>
            {CLOUDTRAIL_EVENTS.map((e, i) => {
              const denied = e.status !== 'OK';
              return (
                <div
                  key={i}
                  className={`px-2 py-1.5 text-[10px] font-mono grid grid-cols-12 gap-1 border-t border-blue-100 ${denied ? 'bg-red-50' : 'bg-white'}`}
                >
                  <span className="col-span-3 text-slate-500">{e.time}</span>
                  <span className={`col-span-3 truncate ${e.user === 'unknown' ? 'text-red-700 font-bold' : 'text-slate-800'}`}>{e.user}</span>
                  <span className="col-span-3 text-blue-700 truncate">{e.action}</span>
                  <span className="col-span-2 text-slate-600 truncate">{e.resource.split(':')[0]}</span>
                  <span className={`col-span-1 font-bold ${denied ? 'text-red-700' : 'text-emerald-700'}`}>{e.status}</span>
                </div>
              );
            })}
          </div>
          <div className="text-[10px] text-blue-600 mt-2">⛓️ Object Lock으로 변조 불가 보관 → Athena SQL로 시간 범위 검색</div>
        </div>
      );
    }

    // Step 4 — 위반 사례 → 수정
    function ViolationPane() {
      return (
        <div>
          <div className="text-xs font-bold text-blue-700 mb-3">🔒 위반 사례 → Resource-level grant 수정</div>

          {/* 나쁜 정책 */}
          <div className="p-3 rounded-lg bg-red-50 border-2 border-red-400 mb-2">
            <div className="flex items-center gap-2 mb-2">
              <span className="text-lg">❌</span>
              <span className="text-xs font-bold text-red-800">위반 — admin 권한 남용</span>
            </div>
            <div className="bg-white rounded p-2 text-[10px] font-mono space-y-0.5 border border-red-200">
              <div><span className="text-slate-500">"Action":</span>   <span className="text-red-700 font-bold">"*"</span>      <span className="text-slate-400"># 모든 행위</span></div>
              <div><span className="text-slate-500">"Resource":</span> <span className="text-red-700 font-bold">"*"</span>      <span className="text-slate-400"># 모든 자원</span></div>
            </div>
            <div className="text-[10px] text-red-700 mt-2">🚨 키 1개 유출 = 회사 전체 자원 노출 (root 권한 수준)</div>
          </div>

          <div className="text-center text-blue-500 text-xs my-2">↓ 좁히기 (Action + Resource + Condition)</div>

          {/* 좋은 정책 */}
          <div className="p-3 rounded-lg bg-emerald-50 border-2 border-emerald-400 mb-3">
            <div className="flex items-center gap-2 mb-2">
              <span className="text-lg">✅</span>
              <span className="text-xs font-bold text-emerald-800">수정 — Resource-level grant</span>
            </div>
            <div className="bg-white rounded p-2 text-[10px] font-mono space-y-0.5 border border-emerald-200">
              <div><span className="text-slate-500">"Action":</span>   <span className="text-emerald-700">["s3:GetObject", "s3:ListBucket"]</span></div>
              <div><span className="text-slate-500">"Resource":</span> <span className="text-emerald-700">"arn:aws:s3:::my-app-data/*"</span></div>
              <div><span className="text-slate-500">"Condition":</span> <span className="text-amber-700">{`{ "PrincipalTag/team": "data" }`}</span></div>
            </div>
            <div className="text-[10px] text-emerald-700 mt-2">🛡️ data팀 + 특정 버킷 + 읽기만 — 사고 영향 최소화</div>
          </div>

          {/* 체크리스트 */}
          <div className="rounded-lg bg-blue-50 border border-blue-200 p-2.5">
            <div className="text-[10px] font-bold text-blue-800 mb-1">정기 audit 체크리스트</div>
            <ul className="text-[10px] text-blue-700 space-y-0.5">
              <li>✓ wildcard Action / Resource 없는지</li>
              <li>✓ 90일 이상 미사용 Role 비활성화</li>
              <li>✓ MFA 적용 (콘솔 로그인)</li>
              <li>✓ Root 계정 봉인 + 변경 알람</li>
            </ul>
          </div>
        </div>
      );
    }

    // 3-layer 보안 카드 (focus 표시)
    const LAYERS = [
      { key: 'iam',             emoji: '🪪', name: 'IAM',          note: '출입증' },
      { key: 'kms_secret',      emoji: '🔑', name: 'KMS·Secret',   note: '금고' },
      { key: 'logs_audit',      emoji: '📜', name: 'CloudTrail',   note: 'CCTV' },
      { key: 'least_privilege', emoji: '🔒', name: 'Least Priv',   note: '최소 권한' },
    ];

    function LayerCards({ focus }) {
      return (
        <div className="grid grid-cols-4 gap-2 mb-4">
          {LAYERS.map((l) => {
            const active = focus === l.key;
            return (
              <div
                key={l.key}
                className={`rounded-lg p-2 text-center transition-all ${active ? 'bg-blue-100 border-2 border-blue-500 scale-105 shadow' : 'bg-slate-50 border border-slate-200'}`}
              >
                <div className="text-xl">{l.emoji}</div>
                <div className={`text-[11px] font-bold mt-0.5 ${active ? 'text-blue-900' : 'text-slate-700'}`}>{l.name}</div>
                <div className={`text-[9px] mt-0.5 ${active ? 'text-blue-600' : 'text-slate-500'}`}>{l.note}</div>
              </div>
            );
          })}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — focus별 패널 라우팅
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ focus, showAlert }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🛡️ 3-Layer 보안 — 출입증 + 금고 + CCTV</h2>
            <span className="text-[10px] text-slate-400 font-mono">focus: {focus}</span>
          </div>

          <LayerCards focus={focus} />

          {focus === 'iam' && <IamTree />}
          {focus === 'kms_secret' && <KmsSecretPane />}
          {focus === 'logs_audit' && <CloudTrailPane />}
          {focus === 'least_privilege' && <ViolationPane />}

          {showAlert && (
            <div className="mt-4 p-3 rounded-lg bg-blue-50 border-2 border-blue-400">
              <div className="flex items-center gap-2 text-blue-900 font-bold text-sm">
                <span className="text-lg">🛡️</span>
                <span>3-Layer Security 완성: IAM × KMS × CloudTrail × Least Privilege</span>
              </div>
              <div className="text-[11px] text-blue-700 mt-1">권한은 좁히고, 비밀은 금고에, 행위는 모두 기록한다.</div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-blue-500/10 border-l-2 border-blue-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-700 hover:text-blue-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Cloud Services &gt; Chapter 1. Auth · KMS · Logs</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Auth / KMS / Logs</h1>
                  <p className="text-sm text-slate-500 mt-0.5">출입증 + 금고 + CCTV — IAM / Secret Manager / CloudTrail / Least Privilege</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane focus={step.focus} showAlert={step.showAlert} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-blue-50 border-2 border-blue-300 rounded-xl p-3 text-sm text-blue-900">
                💡 다음(III-2-1)에서는 <strong>Queue / Pub-Sub</strong> — 비동기 메시징과 이벤트 기반 아키텍처
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-blue-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-blue-600 text-white hover:bg-blue-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; III-1-1 Managed DB</a>
              <a href="../index.html" className="text-blue-700 hover:text-blue-900 font-medium">III-2-1 Queue / Pub-Sub &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
