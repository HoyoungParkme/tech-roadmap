<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphQL 학습 — II-1-2. Query / Mutation / Subscription</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>◆</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    GraphQL Chapter II-1-2 — Query / Mutation / Subscription
    학습 목표: GraphQL 의 3 root operation 의 역할/동작/규칙을 명확히 구분한다.
    핵심 비유: 메뉴판 = Query(읽기) / 주문서 = Mutation(쓰기) / 알람 = Subscription(실시간)
    패턴: fastapi v1 — 좌(LiveDataPane: 3 operation 카드) / 우(CodeViewer)
    색상: GraphQL magenta (#e10098)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Query — 읽기 전용, 병렬 실행 가능',
        desc: 'Query 는 서버 상태를 변경하지 않는 조회. 같은 query 안의 top-level 필드들은 병렬로 실행돼도 무방하다. REST 의 GET 에 대응. 캐싱·persisted query 의 1순위 대상.',
        focus: 'query',
        verdict: '읽기 / 병렬',
        verdictTone: 'good',
        keyPoint: 'Query 는 사이드 이펙트 없음. 그래서 안전하게 병렬 실행 가능, 캐시도 가능.',
        code: {
          lang: 'graphql',
          filename: 'step1-query.graphql',
          lines: [
            '# Step 1. Query — 조회',
            '',
            'type Query {',
            '  me: User',
            '  user(id: ID!): User',
            '  searchPosts(keyword: String!, first: Int = 10): [Post!]!',
            '}',
            '',
            '# === 클라이언트 ===',
            'query MyDashboard {',
            '  me { name avatarUrl }',
            '  trending: searchPosts(keyword: "graphql") {',
            '    id',
            '    title',
            '  }',
            '}',
            '',
            '# === 서버 실행 ===',
            '# 같은 query 의 top-level 필드(me, trending)는',
            '# Promise.all 로 동시 실행 가능 (사이드 이펙트 없음 보장)',
            '',
            '# === 표기 단축 ===',
            '# query { ... } 와 { ... } 는 같다 (operation 이름 생략)',
            '# 운영에선 항상 이름 붙이는 것 권장 (모니터링 도구가 operation 단위로 집계)',
            '',
            '# === HTTP 측면 ===',
            '# Apollo Server 4: POST 가 기본, GET 도 지원',
            '# persisted query 가 GET 으로 자동 변환되면 HTTP 캐시·CDN 활용 가능',
          ],
          highlight: [3, 4, 5, 6, 7, 10, 11, 12, 13, 14, 15, 16, 18, 19, 20, 22, 23, 24, 26, 27, 28],
        },
      },
      {
        title: 'Step 2. Mutation — 쓰기, 순차 실행 보장',
        desc: 'Mutation 은 서버 상태를 변경한다 — 생성/수정/삭제. 한 mutation block 의 top-level 필드들은 반드시 순차 실행됨이 스펙. 그래서 같은 요청에 의존성 있는 변경을 안전하게 배치할 수 있다.',
        focus: 'mutation',
        verdict: '쓰기 / 순차',
        verdictTone: 'warn',
        keyPoint: 'Mutation top-level 은 순차 실행이 GraphQL 스펙. createX 후 attachY 같은 의존 작업을 한 요청에 배치 가능.',
        code: {
          lang: 'graphql',
          filename: 'step2-mutation.graphql',
          lines: [
            '# Step 2. Mutation — 변경',
            '',
            'type Mutation {',
            '  createPost(input: CreatePostInput!): Post!',
            '  updatePost(id: ID!, input: UpdatePostInput!): Post!',
            '  deletePost(id: ID!): Boolean!',
            '}',
            '',
            'input CreatePostInput {',
            '  title:   String!',
            '  body:    String!',
            '  tagIds:  [ID!]!',
            '}',
            '',
            '# === 클라이언트 ===',
            'mutation PublishWorkflow {',
            '  draft: createPost(input: { title: "..." body: "..." tagIds: [] }) {',
            '    id',
            '  }',
            '  publish: updatePost(id: "abc", input: { status: PUBLISHED }) {',
            '    id',
            '    status',
            '  }',
            '}',
            '',
            '# === 스펙 보장: 순차 실행 ===',
            '# 1) createPost 가 완료된 다음',
            '# 2) updatePost 가 시작된다',
            '# 두 mutation 이 같은 데이터에 영향을 줘도 race 가 안 일어남',
            '',
            '# === 응답 ===',
            '# 응답도 같은 순서로 정렬됨',
            '# { data: { draft: {...}, publish: {...} } }',
          ],
          highlight: [3, 4, 5, 6, 7, 9, 10, 11, 12, 13, 16, 17, 18, 19, 20, 21, 22, 23, 25, 26, 27, 28],
        },
      },
      {
        title: 'Step 3. Subscription — 실시간 이벤트 스트림',
        desc: 'Subscription 은 서버 → 클라이언트 푸시. 보통 WebSocket (graphql-ws) 위에서 동작. 클라이언트가 한 번 구독하면 이벤트가 발생할 때마다 같은 모양의 데이터가 흘러온다.',
        focus: 'subscription',
        verdict: '실시간 / WebSocket',
        verdictTone: 'good',
        keyPoint: 'Subscription 은 long-lived 연결. WebSocket 위 graphql-ws 가 사실상 표준 (이전 subscriptions-transport-ws 는 deprecated).',
        code: {
          lang: 'graphql',
          filename: 'step3-subscription.graphql',
          lines: [
            '# Step 3. Subscription — 실시간',
            '',
            'type Subscription {',
            '  messageAdded(roomId: ID!): Message!',
            '  postCommented(postId: ID!): Comment!',
            '  presenceChanged: Presence!',
            '}',
            '',
            '# === 클라이언트 (graphql-ws) ===',
            '# const client = createClient({ url: "ws://localhost:4000/graphql" });',
            '# client.subscribe({',
            '#   query: `subscription ($room: ID!) {',
            '#     messageAdded(roomId: $room) {',
            '#       id text sender { name }',
            '#     }',
            '#   }`,',
            '#   variables: { room: "r1" }',
            '# }, { next: console.log, error: console.error, complete: () => {} });',
            '',
            '# === 서버 (Apollo Server 4) ===',
            '# • PubSub 백엔드 필요 (인메모리 graphql-subscriptions 또는 Redis)',
            '# • subscribe + resolve 두 함수 구현',
            '# • IV-2-2 챕터에서 자세히',
            '',
            '# === 흔한 사용 ===',
            '# • 채팅, 알림, 라이브 댓글',
            '# • 주문 상태 변화 (PENDING → SHIPPED)',
            '# • 협업 에디터 (Figma/Notion 류)',
            '',
            '# === 대안 ===',
            '# • Server-Sent Events (단방향이면 가벼움)',
            '# • Polling (단순 / 캐시 친화)',
            '# • 다음 챕터 IV-2-2 에서 비교',
          ],
          highlight: [3, 4, 5, 6, 7, 9, 10, 11, 12, 13, 14, 15, 16, 17, 19, 20, 21, 22, 24, 25, 26, 27],
        },
      },
      {
        title: 'Step 4. 3 root type 한 스키마에 — 한눈에',
        desc: '실제 스키마에는 Query, Mutation, Subscription 이 한 번씩 정의된다. 이 셋이 GraphQL 의 "진입점". 다른 모든 type 은 결국 이 셋의 트리 어딘가에서 도달 가능해야 한다.',
        focus: 'all',
        verdict: '3 root',
        verdictTone: 'good',
        keyPoint: '3 root 는 서비스의 "API 계약 한 페이지 요약" 이라고 보면 된다.',
        code: {
          lang: 'graphql',
          filename: 'step4-three-roots.graphql',
          lines: [
            '# Step 4. 3 root type 한 스키마 ',
            '',
            '# ─── 조회 ───',
            'type Query {',
            '  me: User',
            '  room(id: ID!): Room',
            '  messages(roomId: ID!, first: Int = 50): [Message!]!',
            '}',
            '',
            '# ─── 변경 ───',
            'type Mutation {',
            '  sendMessage(input: SendMessageInput!): SendMessagePayload!',
            '  deleteMessage(id: ID!): Boolean!',
            '  joinRoom(id: ID!): Room!',
            '}',
            '',
            '# ─── 실시간 ───',
            'type Subscription {',
            '  messageAdded(roomId: ID!): Message!',
            '  presenceChanged(roomId: ID!): Presence!',
            '}',
            '',
            '# ─── 본체 타입 ───',
            'type User { id: ID! name: String! }',
            'type Room { id: ID! name: String! members: [User!]! }',
            'type Message {',
            '  id:        ID!',
            '  text:      String!',
            '  sender:    User!',
            '  createdAt: DateTime!',
            '}',
            '',
            '# 위 3 root 중 어디서도 도달 불가능한 type 은 사실상 dead schema',
            '# Apollo Studio 의 unused type 체크가 잡아준다',
          ],
          highlight: [3, 4, 5, 6, 7, 8, 10, 11, 12, 13, 14, 15, 17, 18, 19, 20, 21, 23, 24, 25, 26, 27, 28, 29, 30, 31],
        },
      },
      {
        title: 'Step 5. 명명 / 규칙 / 안티패턴',
        desc: '실무 베스트 프랙티스: operation 이름 항상 붙이기, Mutation 은 동사 + 명사 (createPost), 응답은 Payload 타입으로 감싸기 (errors as data — III-2-2), Subscription 은 과거시제 동사 (messageAdded). 안티패턴: get/list 접두사, Query 에 사이드 이펙트, Mutation 한 요청에 너무 많은 변경.',
        focus: 'all',
        verdict: '명명 규칙',
        verdictTone: 'good',
        summary: {
          title: '3 Root Operation 요약',
          rows: [
            { metric: 'Query',        before: '조회',  after: '병렬 실행, 캐시 친화',           delta: '✓' },
            { metric: 'Mutation',     before: '변경',  after: 'top-level 순차, 의존 변경 OK',   delta: '✓' },
            { metric: 'Subscription', before: '실시간', after: 'WebSocket(graphql-ws) + PubSub', delta: '✓' },
            { metric: '명명 규칙',    before: '—',     after: '동사+명사, 과거시제(Sub)',        delta: '✓' },
            { metric: '응답',         before: '엔터티 직반환', after: 'Payload(union/errors)',  delta: '✓' },
          ],
        },
        keyPoint: 'Query=READ, Mutation=WRITE, Subscription=PUSH. 그 외 모든 규칙은 이 셋 위의 컨벤션일 뿐.',
        code: {
          lang: 'graphql',
          filename: 'step5-naming-conventions.graphql',
          lines: [
            '# Step 5. 명명 & 안티패턴',
            '',
            '# ✅ Good — operation 이름과 동사+명사',
            'mutation PublishPost($input: PublishPostInput!) {',
            '  publishPost(input: $input) {',
            '    post { id status }',
            '    userErrors { field message }',
            '  }',
            '}',
            '',
            '# ❌ Bad — 익명 + 잡탕 이름',
            'mutation {',
            '  doStuff(p: "abc") { ok }',
            '}',
            '',
            '# === Query 컨벤션 ===',
            '# • 필드명: getUser ❌ → user ✅  (이미 query 안)',
            '# • 컬렉션: getUsers ❌ → users(filter, first, after) ✅',
            '',
            '# === Mutation 컨벤션 ===',
            '# • 동사 + 명사: createPost, updateUser, deleteOrder',
            '# • 응답은 Payload 타입 (errors as data 패턴)',
            '#   payload {',
            '#     entity:     Post',
            '#     userErrors: [UserError!]!',
            '#   }',
            '',
            '# === Subscription 컨벤션 ===',
            '# • 과거시제: messageAdded, orderShipped, presenceChanged',
            '#   ("이미 일어난 일을 푸시" 라는 의미)',
            '',
            '# === 안티패턴 ===',
            '# 1) Query 에서 DB write (예: logVisit 같은 거)',
            '#    → 캐시/persisted query 가 무력화됨',
            '# 2) Mutation 한 요청에 20개 변경',
            '#    → 부분 실패 추적 어려움. batch endpoint 별도 검토',
            '# 3) Subscription 으로 전체 데이터 풀 동기화',
            '#    → 초기는 Query, 변화분만 Subscription',
          ],
          highlight: [3, 4, 5, 6, 7, 8, 9, 11, 12, 13, 14, 16, 17, 18, 19, 21, 22, 23, 24, 25, 26, 27, 29, 30, 31, 33, 34, 35, 36, 37, 38, 39],
        },
      },
    ];

    const TONE = {
      good:   { bg: 'bg-emerald-50',  border: 'border-emerald-300', badge: 'bg-emerald-200 text-emerald-800' },
      warn:   { bg: 'bg-amber-50',    border: 'border-amber-400',   badge: 'bg-amber-200 text-amber-800' },
      danger: { bg: 'bg-rose-50',     border: 'border-rose-400',    badge: 'bg-rose-200 text-rose-800' },
    };

    const OPS = [
      { id: 'query',        name: 'Query',        icon: '📖', tag: '읽기',    color: '#0ea5e9', bg: 'bg-sky-50',   border: 'border-sky-300',   text: 'text-sky-800' },
      { id: 'mutation',     name: 'Mutation',     icon: '✏️', tag: '쓰기',    color: '#e10098', bg: 'bg-pink-50',  border: 'border-pink-300',  text: 'text-pink-800' },
      { id: 'subscription', name: 'Subscription', icon: '📡', tag: '실시간',  color: '#16a34a', bg: 'bg-green-50', border: 'border-green-300', text: 'text-green-800' },
    ];

    const OP_DETAIL = {
      query:        { exec: '병렬',   transport: 'HTTP POST/GET', cache: '강함',  sideEffect: '없음' },
      mutation:     { exec: '순차',   transport: 'HTTP POST',     cache: '약함',  sideEffect: '있음' },
      subscription: { exec: '스트림', transport: 'WebSocket',     cache: 'N/A',   sideEffect: 'PubSub' },
    };

    function OpCard({ op, active }) {
      const d = OP_DETAIL[op.id];
      return (
        <div className={`rounded-lg border-2 p-3 transition ${active ? op.bg + ' ' + op.border + ' shadow-md' : 'bg-white border-zinc-200 opacity-60'}`}>
          <div className="flex items-center justify-between mb-1">
            <div className="flex items-center gap-2">
              <span className="text-lg">{op.icon}</span>
              <span className={`text-sm font-bold ${active ? op.text : 'text-zinc-600'}`}>{op.name}</span>
            </div>
            <span className="text-[10px] px-1.5 py-0.5 rounded bg-white border border-zinc-300 text-zinc-600">{op.tag}</span>
          </div>
          {active && (
            <div className="mt-2 grid grid-cols-2 gap-1 text-[10px]">
              <div className="bg-white rounded border border-zinc-200 px-1.5 py-1"><div className="text-zinc-500">실행</div><div className={`font-mono ${op.text}`}>{d.exec}</div></div>
              <div className="bg-white rounded border border-zinc-200 px-1.5 py-1"><div className="text-zinc-500">전송</div><div className={`font-mono ${op.text}`}>{d.transport}</div></div>
              <div className="bg-white rounded border border-zinc-200 px-1.5 py-1"><div className="text-zinc-500">캐시</div><div className={`font-mono ${op.text}`}>{d.cache}</div></div>
              <div className="bg-white rounded border border-zinc-200 px-1.5 py-1"><div className="text-zinc-500">사이드</div><div className={`font-mono ${op.text}`}>{d.sideEffect}</div></div>
            </div>
          )}
        </div>
      );
    }

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-pink-400 bg-white p-3">
          <div className="text-sm font-bold mb-2" style={{color:'#e10098'}}>📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-pink-700 border-b border-pink-200">
                <th className="py-1 pr-2">항목</th><th className="py-1 pr-2"></th><th className="py-1 pr-2">설명</th><th className="py-1"></th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-pink-100">
                  <td className="py-1 pr-2 font-medium text-pink-800">{r.metric}</td>
                  <td className="py-1 pr-2 text-zinc-500">{r.before}</td>
                  <td className="py-1 pr-2 text-emerald-700 font-mono text-[11px]">{r.after}</td>
                  <td className="py-1 text-pink-900 font-bold">{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.good;
      return (
        <div className="rounded-xl border border-pink-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold" style={{color:'#e10098'}}>3 Root Operation</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          <div className="grid grid-cols-1 gap-2">
            {OPS.map((op) => (
              <OpCard key={op.id} op={op} active={state.focus === 'all' || state.focus === op.id} />
            ))}
          </div>

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs text-pink-900 bg-pink-100 border border-pink-300 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-zinc-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-zinc-800 border-b border-zinc-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-zinc-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-zinc-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-zinc-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-pink-500/25 border-l-2 border-pink-300 -ml-3 pl-2' : ''}`}>
                    <span className="text-zinc-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-zinc-800 border-t border-zinc-700 flex items-center justify-between text-[10px] text-zinc-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-pink-50 to-fuchsia-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg text-white font-bold" style={{backgroundColor:'#e10098'}}>◆</span>
              <div>
                <h1 className="text-2xl font-bold text-pink-900">Chapter II-1-2. Query / Mutation / Subscription</h1>
                <p className="text-sm text-pink-700/80">3 root operation — 읽기 / 쓰기 / 실시간</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-pink-800 underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition`} style={{backgroundColor: i <= stepIdx ? '#e10098' : '#fce7f3'}} />
              ))}
            </div>

            <div className="mb-4 rounded-xl text-white px-5 py-4 shadow" style={{backgroundColor:'#e10098'}}>
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-pink-50/95 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-800 hover:bg-pink-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-800 hover:bg-pink-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} className={`px-4 py-1.5 text-xs rounded font-bold text-white ${playing ? 'bg-pink-900' : 'bg-pink-700 hover:bg-pink-800'}`}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-800 hover:bg-pink-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-pink-700 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-pink-400 bg-white px-4 py-3 text-sm text-pink-900">
                <div className="font-bold mb-1" style={{color:'#e10098'}}>✅ 핵심 정리</div>
                Query/Mutation/Subscription 의 셋이 GraphQL 의 진입점. Query 는 병렬, Mutation 은 순차, Subscription 은 푸시. 명명은 동사+명사, 응답은 Payload, Sub 는 과거시제.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Query', 'Mutation', 'Subscription', 'graphql-ws', 'Payload', 'naming'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-pink-100 text-pink-800 border border-pink-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-pink-800">
              <a href="./II-1-1.html" className="underline hover:no-underline">← II-1-1 Type System</a>
              <a href="./II-2-1.html" className="underline hover:no-underline">다음: II-2-1 Resolver →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
