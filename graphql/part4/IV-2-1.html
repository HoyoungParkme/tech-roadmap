  -->

    const TONE = {
      good:   { bg: 'bg-emerald-50',  border: 'border-emerald-300', badge: 'bg-emerald-200 text-emerald-800' },
      warn:   { bg: 'bg-amber-50',    border: 'border-amber-400',   badge: 'bg-amber-200 text-amber-800' },

      { id: 'persisted', name: 'Persisted Query',     tag: 'hash → GET',  icon: '🔑' },
      { id: 'server',    name: 'Server (Redis)',      tag: '@cacheControl', icon: '🗄️' },
    ];

    function LayerCard({ l, active }) {
      return (
        <div className={`rounded-lg border-2 p-2 transition ${active ? 'border-pink-400 bg-pink-50 shadow' : 'border-zinc-200 bg-white opacity-60'}`}>
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2">
              <span className="text-base">{l.icon}</span>
              <span className={`text-sm font-bold ${active ? 'text-pink-800' : 'text-zinc-600'}`}>{l.name}</span>
            </div>
            <span className="text-[10px] px-1.5 py-0.5 rounded bg-pink-100 text-pink-800 border border-pink-200">{l.tag}</span>
          </div>
        </div>
      );
    }

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-pink-400 bg-white p-3">
          <div className="text-sm font-bold mb-2" style={{color:'#e10098'}}>📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-pink-700 border-b border-pink-200">
                <th className="py-1 pr-2">레이어</th><th className="py-1 pr-2">Before</th><th className="py-1 pr-2">After</th><th className="py-1"></th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-pink-100">
                  <td className="py-1 pr-2 font-bold text-pink-800">{r.metric}</td>
                  <td className="py-1 pr-2 text-rose-700 font-mono text-[11px]">{r.before}</td>
                  <td className="py-1 pr-2 text-emerald-700 font-mono text-[11px]">{r.after}</td>
                  <td className="py-1 text-pink-900 font-bold">{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.good;
      return (
        <div className="rounded-xl border border-pink-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold" style={{color:'#e10098'}}>캐시 레이어</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          <div className="grid grid-cols-1 gap-2">
            {LAYERS.map((l) => (
              <LayerCard key={l.id} l={l} active={state.layer === 'all' || state.layer === l.id} />
            ))}
          </div>

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs text-pink-900 bg-pink-100 border border-pink-300 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-zinc-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-zinc-800 border-b border-zinc-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-zinc-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-zinc-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-zinc-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-pink-500/25 border-l-2 border-pink-300 -ml-3 pl-2' : ''}`}>
                    <span className="text-zinc-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-zinc-800 border-t border-zinc-700 flex items-center justify-between text-[10px] text-zinc-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-pink-50 to-fuchsia-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg text-white font-bold" style={{backgroundColor:'#e10098'}}>◆</span>
              <div>
                <h1 className="text-2xl font-bold text-pink-900">Chapter IV-2-1. Caching</h1>
                <p className="text-sm text-pink-700/80">HTTP/CDN · Persisted Query · Apollo Cache · Server-side Redis</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-pink-800 underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition`} style={{backgroundColor: i <= stepIdx ? '#e10098' : '#fce7f3'}} />
              ))}
            </div>

            <div className="mb-4 rounded-xl text-white px-5 py-4 shadow" style={{backgroundColor:'#e10098'}}>
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-pink-50/95 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} aria-label="처음으로" className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-800 hover:bg-pink-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-800 hover:bg-pink-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'} className={`px-4 py-1.5 text-xs rounded font-bold text-white ${playing ? 'bg-pink-900' : 'bg-pink-700 hover:bg-pink-800'}`}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} aria-label="다음 단계" className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-800 hover:bg-pink-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-pink-700 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-pink-400 bg-white px-4 py-3 text-sm text-pink-900">
                <div className="font-bold mb-1" style={{color:'#e10098'}}>✅ 핵심 정리</div>
                GraphQL 캐시는 4 레이어. CDN/HTTP (persisted query GET) · Apollo Client (normalized) · Server Redis (@cacheControl) · DataLoader (요청 단위). 단일 레이어로 끝나지 않는다. 인증/scope 함께 고려.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['persisted query', '@cacheControl', 'Apollo Cache', 'Redis', 'CDN', 'normalized'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-pink-100 text-pink-800 border border-pink-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-pink-800">
              <a href="./IV-1-2.html" className="underline hover:no-underline">← IV-1-2 Federation v2</a>
              <a href="./IV-2-2.html" className="underline hover:no-underline">다음: IV-2-2 Subscription →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
