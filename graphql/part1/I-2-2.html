    패턴: fastapi v1 — 좌(LiveDataPane: 설치/실행/응답) / 우(CodeViewer)

  -->

        phase: 'define',
        endpoint: '',
        queryText: '',
        responseText: '',
        verdict: 'Schema + Resolver',
        verdictTone: 'good',
        keyPoint: '스키마는 "무엇을" 제공하는지의 계약. 리졸버는 "어떻게" 가져올지의 구현.',
        code: {

          lines: [
            '// Step 2-1. 가장 작은 typeDefs + resolvers',

            '/**',
            ' * typeDefs — Schema Definition Language (SDL)',
            ' *   Query 는 모든 GraphQL 서버의 root 타입 중 하나(조회용)',
            ' *   hello 는 인자 없는 String! 필드 (느낌표 = non-null)',
            ' */',
            'const typeDefs = `#graphql',
            '  type Query {',
            '    hello: String!',
            '  }',
            '`;',
            '',
            '/**',
            ' * resolvers — 각 필드의 값을 구하는 함수',
            ' *   Query.hello 에 대응하는 함수가 "Hello GraphQL!" 반환',

      {

        desc: 'typeDefs 와 resolvers 를 ApolloServer 에 넘기고, startStandaloneServer 로 4000 번 포트에 띄운다. 기본적으로 localhost:4000/graphql 가 endpoint 가 되고, 같은 URL 을 브라우저로 열면 Apollo Sandbox(GraphiQL 후속) 가 뜬다.',
        phase: 'run',
        endpoint: 'http://localhost:4000/graphql',
        queryText: '',
        responseText: '',
        verdict: '서버 ON',

          filename: 'src/index.js (2/2)',
          lines: [
            '// Step 2-2. Apollo Server 4 standalone 부팅',
            '',
            'import { ApolloServer } from "@apollo/server";',

            '// (위 step 의 typeDefs, resolvers 가 같은 파일에 있다고 가정)',
            '',
            '/** Apollo Server 인스턴스 */',
            'const server = new ApolloServer({',
            '  typeDefs,',
            '  resolvers,',
            '  // 운영에선 introspection 끄거나 별도 환경변수로 토글',

            '});',
            '',
            '/** 4000 번 포트에서 standalone 시작 */',
            'const { url } = await startStandaloneServer(server, {',

            '',
            'console.log(`🚀 GraphQL ready at ${url}`);',
            '// $ node src/index.js',
            '// 🚀 GraphQL ready at http://localhost:4000/',
            '',
            '// === 실제 endpoint ===',
            '// • POST http://localhost:4000/        ← 쿼리 보낼 곳',
            '// • GET  http://localhost:4000/        ← Sandbox UI',
            '//',
            '// (Apollo 4 standalone 은 path 가 / 이며 /graphql 이 아님)',
            '// 운영에선 Express/Fastify 통합으로 /graphql 경로를 직접 정함',
          ],
          highlight: [3, 4, 8, 9, 10, 11, 16, 17, 18, 19, 20, 21],
        },
      },
      {
        title: 'Step 4. 브라우저에서 Sandbox 접속',
        desc: 'http://localhost:4000/ 에 접속하면 Apollo Sandbox 가 뜬다. 좌측에 스키마 explorer (자동 introspection), 가운데에 쿼리 에디터, 우측에 응답. 자동완성, history, variables, headers 패널까지 다 들어 있다. 이게 GraphQL "REPL".',
        phase: 'sandbox',
        endpoint: 'http://localhost:4000/',
        queryText: '# Sandbox 에 자동 추천되는 첫 쿼리\nquery {\n  __typename\n}',
        responseText: '{\n  "data": { "__typename": "Query" }\n}',
        verdict: 'Sandbox 열림',
        verdictTone: 'good',
        keyPoint: 'GraphQL 서버는 introspection 으로 자기 자신을 설명한다. Sandbox 는 그 정보로 자동완성을 제공한다.',
        code: {
          lang: 'markdown',
          filename: 'sandbox-tour.md',
          lines: [
            '# Apollo Sandbox 둘러보기',
            '',
            '## URL',
            '브라우저: http://localhost:4000/  → 자동으로 Sandbox 페이지',
            '',
            '## 화면 구성',
            '```',
            '┌─────────────┬──────────────────────────┬────────────┐',

            '│ Query       │  Variables Headers       │            │',

            '- 여러 operation 을 같은 탭에서 관리',
            '',
            '## Variables 탭',
            '```json',
            '{ "id": "1" }',

            '```',
            'Authorization: Bearer eyJhbGc...',

            '## __typename 은 메타 필드',
            '- 모든 타입에서 사용 가능',

            '- introspection 의 가장 작은 예',
            '',
            '## 자기 자신을 설명하는 GraphQL',

          ],

        },
      },
      {
        title: 'Step 5. { hello } 쿼리 실행 — 200ms 안에 첫 응답',

        phase: 'query',
        endpoint: 'http://localhost:4000/',
        queryText: 'query Hello {\n  hello\n}',
        responseText: '{\n  "data": {\n    "hello": "Hello GraphQL!"\n  }\n}',
        verdict: '첫 응답 ✓',
        verdictTone: 'good',
        summary: {
          title: '첫 GraphQL 서버 핸드쉐이크',
          rows: [
            { metric: '서버 부팅',     before: '—', after: 'startStandaloneServer', delta: '✓' },
            { metric: '엔드포인트',    before: '—', after: 'http://localhost:4000/', delta: '✓' },
            { metric: '쿼리',          before: '—', after: '{ hello }', delta: '✓' },
            { metric: '응답',          before: '—', after: '{ data: { hello: "Hello GraphQL!" } }', delta: '✓' },

            '// === 2) fetch ===',
            'const res = await fetch("http://localhost:4000/", {',
            '  method: "POST",',
            '  headers: { "content-type": "application/json" },',
            '  body: JSON.stringify({ query: "{ hello }" }),',
            '});',
            'const json = await res.json();',
            'console.log(json);',

    const TONE = {
      good:   { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-800', badge: 'bg-emerald-200 text-emerald-800', bar: 'bg-emerald-400' },
      warn:   { bg: 'bg-amber-50',    border: 'border-amber-400',   text: 'text-amber-800',   badge: 'bg-amber-200 text-amber-800',     bar: 'bg-amber-400' },
      danger: { bg: 'bg-rose-50',     border: 'border-rose-400',    text: 'text-rose-800',    badge: 'bg-rose-200 text-rose-800',       bar: 'bg-rose-400' },
    };

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-pink-400 bg-white p-3">
          <div className="text-sm font-bold mb-2" style={{color:'#e10098'}}>📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-pink-700 border-b border-pink-200">
                <th className="py-1 pr-2">단계</th><th className="py-1 pr-2"></th><th className="py-1 pr-2">상태</th><th className="py-1"></th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-pink-100">
                  <td className="py-1 pr-2 font-medium text-pink-800">{r.metric}</td>
                  <td className="py-1 pr-2 text-zinc-500">{r.before}</td>
                  <td className="py-1 pr-2 text-emerald-700 font-mono text-[11px]">{r.after}</td>
                  <td className="py-1 text-pink-900 font-bold">{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function PhaseStrip({ phase }) {
      const steps = [
        { id: 'install',  label: '설치' },
        { id: 'define',   label: '정의' },
        { id: 'run',      label: '실행' },
        { id: 'sandbox',  label: 'Sandbox' },
        { id: 'query',    label: '쿼리' },
      ];
      const idx = steps.findIndex((s) => s.id === phase);
      return (
        <div className="flex items-center justify-between mb-3">
          {steps.map((s, i) => (
            <div key={s.id} className="flex-1 flex items-center">
              <div className={`flex flex-col items-center flex-1 ${i <= idx ? '' : 'opacity-40'}`}>
                <div className="w-6 h-6 rounded-full flex items-center justify-center text-[10px] text-white font-bold" style={{backgroundColor: i <= idx ? '#e10098' : '#fce7f3', color: i <= idx ? '#fff' : '#be185d'}}>{i+1}</div>
                <div className="text-[10px] mt-1" style={{color: i <= idx ? '#9d174d' : '#a1a1aa'}}>{s.label}</div>
              </div>
              {i < steps.length - 1 && <div className="h-0.5 flex-1" style={{backgroundColor: i < idx ? '#e10098' : '#fce7f3'}} />}
            </div>
          ))}
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.good;
      return (
        <div className="rounded-xl border border-pink-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold" style={{color:'#e10098'}}>Apollo Server 부팅 흐름</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          <PhaseStrip phase={state.phase} />

          {state.endpoint && (
            <div className="rounded-lg border border-pink-300 bg-pink-50 p-2 mb-2">
              <div className="text-[10px] text-pink-700 uppercase tracking-wide">Endpoint</div>
              <div className="font-mono text-xs text-pink-900 mt-0.5">{state.endpoint}</div>
            </div>
          )}

          {state.queryText && (
            <div className="rounded-lg border border-pink-200 bg-white p-2 mb-2">
              <div className="text-[10px] text-pink-700 uppercase tracking-wide mb-1">Query</div>
              <pre className="font-mono text-[11px] text-pink-900 whitespace-pre-wrap">{state.queryText}</pre>
            </div>
          )}

          {state.responseText && (
            <div className="rounded-lg border border-emerald-200 bg-emerald-50 p-2 mb-2">
              <div className="text-[10px] text-emerald-700 uppercase tracking-wide mb-1">Response</div>
              <pre className="font-mono text-[11px] text-emerald-900 whitespace-pre-wrap">{state.responseText}</pre>
            </div>
          )}

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs text-pink-900 bg-pink-100 border border-pink-300 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-zinc-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-zinc-800 border-b border-zinc-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-zinc-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-zinc-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-zinc-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-pink-500/25 border-l-2 border-pink-300 -ml-3 pl-2' : ''}`}>
                    <span className="text-zinc-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-zinc-800 border-t border-zinc-700 flex items-center justify-between text-[10px] text-zinc-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-pink-50 to-fuchsia-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg text-white font-bold" style={{backgroundColor:'#e10098'}}>◆</span>
              <div>
                <h1 className="text-2xl font-bold text-pink-900">Chapter I-2-2. Apollo Server 첫 쿼리</h1>
                <p className="text-sm text-pink-700/80">npm i → typeDefs + resolvers → startStandaloneServer → Sandbox → {`{ hello }`}</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-pink-800 underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition`} style={{backgroundColor: i <= stepIdx ? '#e10098' : '#fce7f3'}} />
              ))}
            </div>

            <div className="mb-4 rounded-xl text-white px-5 py-4 shadow" style={{backgroundColor:'#e10098'}}>
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-pink-50/95 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-800 hover:bg-pink-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-800 hover:bg-pink-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} className={`px-4 py-1.5 text-xs rounded font-bold text-white ${playing ? 'bg-pink-900' : 'bg-pink-700 hover:bg-pink-800'}`}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-800 hover:bg-pink-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-pink-700 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-pink-400 bg-white px-4 py-3 text-sm text-pink-900">
                <div className="font-bold mb-1" style={{color:'#e10098'}}>✅ 핵심 정리</div>
                Apollo Server 는 typeDefs + resolvers 두 가지만 있으면 시작한다. startStandaloneServer 한 줄로 HTTP + Sandbox 가 뜨고, 첫 쿼리 {`{ hello }`} 가 성공하면 GraphQL 서버의 모든 기본기가 갖춰진 셈이다.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Apollo Server', 'typeDefs', 'resolvers', 'Sandbox', 'introspection', 'startStandalone'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-pink-100 text-pink-800 border border-pink-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-pink-800">
              <a href="./I-2-1.html" className="underline hover:no-underline">← I-2-1 비교</a>
              <a href="../part2/II-1-1.html" className="underline hover:no-underline">다음: II-1-1 Type System →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
