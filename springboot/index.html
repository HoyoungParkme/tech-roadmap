<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spring Boot 인터랙티브 학습</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .sidebar-link { transition: all 0.15s; }
    .sidebar-link:hover { background: #f0fdf4; }
    .sidebar-link.active { background: #dcfce7; border-left: 3px solid #15803d; font-weight: 700; }
    .part-header { cursor: pointer; user-select: none; }
    .part-header:hover { background: #f8fafc; }
    #sidebar { scrollbar-width: thin; }
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
  </style>
</head>
<body class="bg-slate-50 h-screen overflow-hidden">

  <!-- 모바일 햄버거 -->
  <div id="mobile-bar" class="lg:hidden fixed top-0 left-0 right-0 z-50 bg-white border-b border-slate-200 px-4 py-3 flex items-center gap-3">
    <button id="menu-toggle" class="p-1 rounded hover:bg-slate-100">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#334155" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <div class="w-6 h-6 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-sm">S</div>
    <span class="font-bold text-slate-800 text-sm">Spring Boot 학습</span>
  </div>

  <div class="flex h-screen lg:pt-0 pt-12">

    <!-- 사이드바 -->
    <aside id="sidebar" class="fixed lg:static z-40 top-0 left-0 h-full w-72 bg-white border-r border-slate-200 overflow-y-auto transform -translate-x-full lg:translate-x-0 transition-transform duration-200 pt-0 lg:pt-0">

      <!-- 로고 -->
      <div class="sticky top-0 bg-white z-10 px-4 py-4 border-b border-slate-100">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-lg">S</div>
          <div>
            <div class="font-bold text-slate-800 text-sm">Spring Boot</div>
            <div class="text-[10px] text-slate-400">인터랙티브 완벽 가이드</div>
          </div>
        </div>
      </div>

      <!-- 목차 -->
      <nav class="py-2" id="nav-tree"></nav>

    </aside>

    <!-- 오버레이 (모바일) -->
    <div id="overlay" class="fixed inset-0 bg-black/30 z-30 hidden lg:hidden" ></div>

    <!-- 메인 콘텐츠 -->
    <main class="flex-1 h-full overflow-hidden">
      <iframe id="content-frame" class="w-full h-full border-none" src="chapters/chapter-01-01-what-is-java.html"></iframe>
    </main>

  </div>

  <script>
    // 목차 데이터
    const CHAPTERS = [
      { part: 'Part I. 왜 Java 프레임워크인가', level: '★☆☆', items: [
        { id: 'I-1-1', title: 'Java란 무엇인가', file: 'chapters/chapter-01-01-what-is-java.html' },
        { id: 'I-1-2', title: 'JVM이란', file: 'chapters/chapter-01-02-jvm.html' },
        { id: 'I-1-3', title: 'JRE와 JDK', file: 'chapters/chapter-01-03-jre-jdk.html' },
        { id: 'I-2-1', title: 'Servlet에서 Spring까지', file: 'chapters/chapter-01-04-servlet-to-spring.html' },
        { id: 'I-2-2', title: 'Spring Boot가 해결한 것', file: 'chapters/chapter-01-05-spring-boot-solutions.html' },
        { id: 'I-3-1', title: '라이브러리 vs 프레임워크', file: 'chapters/chapter-01-06-library-vs-framework.html' },
        { id: 'I-3-2', title: 'Spring Boot의 위치', file: 'chapters/chapter-01-07-spring-boot-position.html' },
      ]},
      { part: 'Part II. JVM·Spring 생태계', level: '★☆☆~★★☆', items: [
        { id: 'II-1-1', title: '클래스 로딩과 메모리', file: 'chapters/chapter-02-01-classloader-memory.html' },
        { id: 'II-1-2', title: 'GC와 성능', file: 'chapters/chapter-02-02-gc-performance.html' },
        { id: 'II-2-1', title: '빌드 도구가 필요한 이유', file: 'chapters/chapter-02-03-why-build-tool.html' },
        { id: 'II-2-2', title: 'Maven vs Gradle', file: 'chapters/chapter-02-04-maven-vs-gradle.html' },
        { id: 'II-3-1', title: 'Spring 프로젝트 전체 지도', file: 'chapters/chapter-02-05-spring-ecosystem.html' },
        { id: 'II-3-2', title: '언제 Spring Boot를 선택하나', file: 'chapters/chapter-02-06-when-spring-boot.html' },
      ]},
      { part: 'Part III. Spring Boot 첫 걸음', level: '★★☆', items: [
        { id: 'III-1-1', title: 'JDK 17 설치', file: 'chapters/chapter-03-01-jdk-install.html' },
        { id: 'III-1-2', title: 'IDE 설치 — IntelliJ', file: 'chapters/chapter-03-02-intellij-setup.html' },
        { id: 'III-2-1', title: 'Spring Initializr', file: 'chapters/chapter-03-03-spring-initializr.html' },
        { id: 'III-2-2', title: '프로젝트 구조', file: 'chapters/chapter-03-04-project-structure.html' },
        { id: 'III-3-1', title: '첫 REST 엔드포인트', file: 'chapters/chapter-03-05-first-rest-endpoint.html' },
        { id: 'III-3-2', title: '내장 Tomcat 실행', file: 'chapters/chapter-03-06-embedded-tomcat.html' },
      ]},
      { part: 'Part IV. Spring Boot 코어', level: '★★☆~★★★', items: [
        { id: 'IV-1-1', title: 'HTTP 요청 처리 7계층', file: 'chapters/chapter-04-01-request-flow.html' },
        { id: 'IV-1-2', title: 'DispatcherServlet', file: 'chapters/chapter-04-03-dispatcher-servlet.html' },
        { id: 'IV-2-1', title: 'DI(의존성 주입)', file: 'chapters/chapter-04-04-di-injection.html' },
        { id: 'IV-2-2', title: 'Bean과 IoC 컨테이너', file: 'chapters/chapter-04-02-bean-lifecycle.html' },
        { id: 'IV-3-1', title: 'AOP와 @Transactional', file: 'chapters/chapter-04-05-aop-transaction.html' },
      ]},
      { part: 'Part V. 웹·DB·보안 계층', level: '★★★', items: [
        { id: 'V-1-1', title: 'REST 원칙과 HTTP 메서드', file: 'chapters/chapter-05-01-rest-principles.html' },
        { id: 'V-1-2', title: 'DTO와 응답 구조', file: 'chapters/chapter-05-02-dto-response.html' },
        { id: 'V-2-1', title: 'ORM 개념과 JPA', file: 'chapters/chapter-05-03-orm-jpa.html' },
        { id: 'V-2-2', title: 'JpaRepository', file: 'chapters/chapter-05-04-jpa-repository.html' },
        { id: 'V-3-1', title: '인증과 인가', file: 'chapters/chapter-05-05-security.html' },
      ]},
      { part: 'Part VI. 실전 REST API', level: '★★★', items: [
        { id: 'VI-1-1', title: '엔티티 설계', file: 'chapters/chapter-06-01-entity-design.html' },
        { id: 'VI-2-1', title: '3계층 전체 구현', file: 'chapters/chapter-06-02-three-layer.html' },
        { id: 'VI-2-2', title: '전역 예외 처리', file: 'chapters/chapter-06-03-exception-handling.html' },
        { id: 'VI-3-1', title: '단위 테스트', file: 'chapters/chapter-06-04-unit-test.html' },
      ]},
      { part: 'Part VII. 배포·로깅·모니터링', level: '★★★', items: [
        { id: 'VII-1-1', title: 'JAR 패키징', file: 'chapters/chapter-07-01-executable-jar.html' },
        { id: 'VII-1-2', title: 'Docker 배포', file: 'chapters/chapter-07-02-docker.html' },
        { id: 'VII-2-1', title: 'SLF4J/Logback', file: 'chapters/chapter-07-03-logging.html' },
        { id: 'VII-3-1', title: 'Actuator', file: 'chapters/chapter-07-04-actuator.html' },
      ]},
      { part: 'Part VIII. 실무 설정과 운영', level: '★★★', items: [
        { id: 'VIII-1-1', title: 'properties vs YAML', file: 'chapters/chapter-08-01-properties-yaml.html' },
        { id: 'VIII-1-2', title: '@Value 설정 주입', file: 'chapters/chapter-08-02-value-injection.html' },
        { id: 'VIII-1-3', title: '@ConfigurationProperties', file: 'chapters/chapter-08-03-config-properties.html' },
        { id: 'VIII-1-4', title: '프로파일과 우선순위', file: 'chapters/chapter-08-04-profiles-priority.html' },
        { id: 'VIII-2-1', title: 'Auto Config 원리', file: 'chapters/chapter-08-05-auto-config.html' },
        { id: 'VIII-2-2', title: '@Conditional', file: 'chapters/chapter-08-06-conditional.html' },
        { id: 'VIII-2-3', title: '--debug 디버깅', file: 'chapters/chapter-08-07-debug-autoconfig.html' },
        { id: 'VIII-3-1', title: 'Micrometer', file: 'chapters/chapter-08-08-micrometer.html' },
        { id: 'VIII-3-2', title: 'Prometheus', file: 'chapters/chapter-08-09-prometheus.html' },
        { id: 'VIII-3-3', title: 'Grafana', file: 'chapters/chapter-08-10-grafana.html' },
        { id: 'VIII-3-4', title: '커스텀 메트릭', file: 'chapters/chapter-08-11-custom-metrics.html' },
      ]},
    ];

    // 사이드바 렌더링
    const nav = document.getElementById('nav-tree');
    const frame = document.getElementById('content-frame');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const menuToggle = document.getElementById('menu-toggle');
    let activeLink = null;

    // 전체 챕터를 플랫 배열로 (이전/다음 네비게이션용)
    const allItems = CHAPTERS.flatMap(c => c.items);

    CHAPTERS.forEach((ch, pi) => {
      // Part 헤더
      const header = document.createElement('div');
      header.className = 'part-header flex items-center justify-between px-4 py-2.5 border-b border-slate-50';
      header.innerHTML = `
        <div>
          <div class="text-xs font-bold text-slate-700">${ch.part}</div>
          <div class="text-[10px] text-slate-400">${ch.level} · ${ch.items.length}개</div>
        </div>
        <svg class="chevron w-4 h-4 text-slate-400 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      `;

      // 챕터 링크 리스트
      const list = document.createElement('div');
      list.className = 'overflow-hidden';
      // Part I~III은 기본 열림, 나머지는 닫힘
      if (pi >= 3) {
        list.style.maxHeight = '0';
        list.style.opacity = '0';
      } else {
        list.style.maxHeight = '999px';
        list.style.opacity = '1';
        header.querySelector('.chevron').style.transform = 'rotate(180deg)';
      }
      list.style.transition = 'max-height 0.3s ease, opacity 0.2s ease';

      ch.items.forEach(item => {
        const link = document.createElement('a');
        link.href = '#';
        link.className = 'sidebar-link block px-4 py-1.5 pl-6 text-xs text-slate-600 border-l-3 border-transparent';
        link.innerHTML = `<span class="text-slate-400 font-mono mr-1.5">${item.id}</span>${item.title}`;
        link.dataset.file = item.file;
        link.addEventListener('click', (e) => {
          e.preventDefault();
          loadChapter(item.file, link);
        });
        list.appendChild(link);
      });

      // 토글
      header.addEventListener('click', () => {
        const isOpen = list.style.maxHeight !== '0px';
        list.style.maxHeight = isOpen ? '0' : '999px';
        list.style.opacity = isOpen ? '0' : '1';
        header.querySelector('.chevron').style.transform = isOpen ? '' : 'rotate(180deg)';
      });

      nav.appendChild(header);
      nav.appendChild(list);
    });

    function loadChapter(file, linkEl) {
      frame.src = file;
      if (activeLink) activeLink.classList.remove('active');
      if (linkEl) {
        linkEl.classList.add('active');
        activeLink = linkEl;
        // 스크롤 뷰에 표시
        linkEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
      // 모바일: 사이드바 닫기
      closeSidebar();
    }

    // 모바일 토글
    function openSidebar() {
      sidebar.classList.remove('-translate-x-full');
      overlay.classList.remove('hidden');
    }
    function closeSidebar() {
      sidebar.classList.add('-translate-x-full');
      overlay.classList.add('hidden');
    }
    menuToggle.addEventListener('click', openSidebar);
    overlay.addEventListener('click', closeSidebar);

    // 키보드 네비게이션 (좌우 화살표)
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        const currentFile = frame.src.split('/').pop();
        const currentIdx = allItems.findIndex(i => i.file === currentFile);
        if (currentIdx === -1) return;
        const nextIdx = e.key === 'ArrowRight' ? currentIdx + 1 : currentIdx - 1;
        if (nextIdx >= 0 && nextIdx < allItems.length) {
          const nextItem = allItems[nextIdx];
          const linkEl = nav.querySelector(`[data-file="${nextItem.file}"]`);
          // 부모 Part 열기
          if (linkEl) {
            const parentList = linkEl.parentElement;
            if (parentList.style.maxHeight === '0px') {
              parentList.style.maxHeight = '999px';
              parentList.style.opacity = '1';
              parentList.previousElementSibling.querySelector('.chevron').style.transform = 'rotate(180deg)';
            }
          }
          loadChapter(nextItem.file, linkEl);
        }
      }
    });
  </script>
</body>
</html>
