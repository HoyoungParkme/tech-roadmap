<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spring Boot 인터랙티브 학습</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const SECTIONS = [
      {
        part: 'I', label: 'Part I. 왜 Java 프레임워크인가', color: 'bg-green-600',
        items: [
          { id: 'I-1-1', title: 'Java란 무엇인가', file: './chapters/chapter-01-01-what-is-java.html' },
          { id: 'I-1-2', title: 'JVM이란', file: './chapters/chapter-01-02-jvm.html' },
          { id: 'I-1-3', title: 'JRE와 JDK', file: './chapters/chapter-01-03-jre-jdk.html' },
          { id: 'I-2-1', title: 'Servlet에서 Spring까지', file: './chapters/chapter-01-04-servlet-to-spring.html' },
          { id: 'I-2-2', title: 'Spring Boot가 해결한 것', file: './chapters/chapter-01-05-spring-boot-solutions.html' },
          { id: 'I-3-1', title: '라이브러리 vs 프레임워크', file: './chapters/chapter-01-06-library-vs-framework.html' },
          { id: 'I-3-2', title: 'Spring Boot의 위치', file: './chapters/chapter-01-07-spring-boot-position.html' },
        ],
      },
      {
        part: 'II', label: 'Part II. JVM·Spring 생태계', color: 'bg-teal-600',
        items: [
          { id: 'II-1-1', title: '클래스 로딩과 메모리', file: './chapters/chapter-02-01-classloader-memory.html' },
          { id: 'II-1-2', title: 'GC와 성능', file: './chapters/chapter-02-02-gc-performance.html' },
          { id: 'II-2-1', title: '빌드 도구가 필요한 이유', file: './chapters/chapter-02-03-why-build-tool.html' },
          { id: 'II-2-2', title: 'Maven vs Gradle', file: './chapters/chapter-02-04-maven-vs-gradle.html' },
          { id: 'II-3-1', title: 'Spring 프로젝트 전체 지도', file: './chapters/chapter-02-05-spring-ecosystem.html' },
          { id: 'II-3-2', title: '언제 Spring Boot를 선택하나', file: './chapters/chapter-02-06-when-spring-boot.html' },
        ],
      },
      {
        part: 'III', label: 'Part III. Spring Boot 첫 걸음', color: 'bg-sky-600',
        items: [
          { id: 'III-1-1', title: 'JDK 17 설치', file: './chapters/chapter-03-01-jdk-install.html' },
          { id: 'III-1-2', title: 'IDE 설치 — IntelliJ', file: './chapters/chapter-03-02-intellij-setup.html' },
          { id: 'III-2-1', title: 'Spring Initializr', file: './chapters/chapter-03-03-spring-initializr.html' },
          { id: 'III-2-2', title: '프로젝트 구조', file: './chapters/chapter-03-04-project-structure.html' },
          { id: 'III-3-1', title: '첫 REST 엔드포인트', file: './chapters/chapter-03-05-first-rest-endpoint.html' },
          { id: 'III-3-2', title: '내장 Tomcat 실행', file: './chapters/chapter-03-06-embedded-tomcat.html' },
        ],
      },
      {
        part: 'IV', label: 'Part IV. Spring Boot 코어', color: 'bg-blue-600',
        items: [
          { id: 'IV-1-1', title: 'HTTP 요청 처리 7계층', file: './chapters/chapter-04-01-request-flow.html' },
          { id: 'IV-1-2', title: 'DispatcherServlet', file: './chapters/chapter-04-03-dispatcher-servlet.html' },
          { id: 'IV-2-1', title: 'DI(의존성 주입)', file: './chapters/chapter-04-04-di-injection.html' },
          { id: 'IV-2-2', title: 'Bean과 IoC 컨테이너', file: './chapters/chapter-04-02-bean-lifecycle.html' },
          { id: 'IV-3-1', title: 'AOP와 @Transactional', file: './chapters/chapter-04-05-aop-transaction.html' },
        ],
      },
      {
        part: 'V', label: 'Part V. 웹·DB·보안 계층', color: 'bg-indigo-600',
        items: [
          { id: 'V-1-1', title: 'REST 원칙과 HTTP 메서드', file: './chapters/chapter-05-01-rest-principles.html' },
          { id: 'V-1-2', title: 'DTO와 응답 구조', file: './chapters/chapter-05-02-dto-response.html' },
          { id: 'V-2-1', title: 'ORM 개념과 JPA', file: './chapters/chapter-05-03-orm-jpa.html' },
          { id: 'V-2-2', title: 'JpaRepository', file: './chapters/chapter-05-04-jpa-repository.html' },
          { id: 'V-3-1', title: '인증과 인가', file: './chapters/chapter-05-05-security.html' },
        ],
      },
      {
        part: 'VI', label: 'Part VI. 실전 REST API', color: 'bg-violet-600',
        items: [
          { id: 'VI-1-1', title: '엔티티 설계', file: './chapters/chapter-06-01-entity-design.html' },
          { id: 'VI-2-1', title: '3계층 전체 구현', file: './chapters/chapter-06-02-three-layer.html' },
          { id: 'VI-2-2', title: '전역 예외 처리', file: './chapters/chapter-06-03-exception-handling.html' },
          { id: 'VI-3-1', title: '단위 테스트', file: './chapters/chapter-06-04-unit-test.html' },
        ],
      },
      {
        part: 'VII', label: 'Part VII. 배포·로깅·모니터링', color: 'bg-amber-600',
        items: [
          { id: 'VII-1-1', title: 'JAR 패키징', file: './chapters/chapter-07-01-executable-jar.html' },
          { id: 'VII-1-2', title: 'Docker 배포', file: './chapters/chapter-07-02-docker.html' },
          { id: 'VII-2-1', title: 'SLF4J/Logback', file: './chapters/chapter-07-03-logging.html' },
          { id: 'VII-3-1', title: 'Actuator', file: './chapters/chapter-07-04-actuator.html' },
        ],
      },
      {
        part: 'VIII', label: 'Part VIII. 실무 설정과 운영', color: 'bg-rose-600',
        items: [
          { id: 'VIII-1-1', title: 'properties vs YAML', file: './chapters/chapter-08-01-properties-yaml.html' },
          { id: 'VIII-1-2', title: '@Value 설정 주입', file: './chapters/chapter-08-02-value-injection.html' },
          { id: 'VIII-1-3', title: '@ConfigurationProperties', file: './chapters/chapter-08-03-config-properties.html' },
          { id: 'VIII-1-4', title: '프로파일과 우선순위', file: './chapters/chapter-08-04-profiles-priority.html' },
          { id: 'VIII-2-1', title: 'Auto Config 원리', file: './chapters/chapter-08-05-auto-config.html' },
          { id: 'VIII-2-2', title: '@Conditional', file: './chapters/chapter-08-06-conditional.html' },
          { id: 'VIII-2-3', title: '--debug 디버깅', file: './chapters/chapter-08-07-debug-autoconfig.html' },
          { id: 'VIII-3-1', title: 'Micrometer', file: './chapters/chapter-08-08-micrometer.html' },
          { id: 'VIII-3-2', title: 'Prometheus', file: './chapters/chapter-08-09-prometheus.html' },
          { id: 'VIII-3-3', title: 'Grafana', file: './chapters/chapter-08-10-grafana.html' },
          { id: 'VIII-3-4', title: '커스텀 메트릭', file: './chapters/chapter-08-11-custom-metrics.html' },
        ],
      },
    ];

    const TOTAL = SECTIONS.reduce((sum, s) => sum + s.items.length, 0);

    const PART_BG = {
      I: 'hover:bg-green-50', II: 'hover:bg-teal-50', III: 'hover:bg-sky-50', IV: 'hover:bg-blue-50',
      V: 'hover:bg-indigo-50', VI: 'hover:bg-violet-50', VII: 'hover:bg-amber-50', VIII: 'hover:bg-rose-50',
    };

    const PART_ACTIVE = {
      I: 'bg-green-100 text-green-800 font-bold', II: 'bg-teal-100 text-teal-800 font-bold',
      III: 'bg-sky-100 text-sky-800 font-bold', IV: 'bg-blue-100 text-blue-800 font-bold',
      V: 'bg-indigo-100 text-indigo-800 font-bold', VI: 'bg-violet-100 text-violet-800 font-bold',
      VII: 'bg-amber-100 text-amber-800 font-bold', VIII: 'bg-rose-100 text-rose-800 font-bold',
    };

    function findItemById(id) {
      for (const section of SECTIONS) {
        const found = section.items.find(item => item.id === id);
        if (found) return { ...found, part: section.part };
      }
      return null;
    }

    /**
     * GiscusPanel — 마인드맵의 vanilla JS giscus 패널을 React로 재현.
     */
    function GiscusPanel({ term }) {
      const [open, setOpen] = React.useState(false);
      const [width, setWidth] = React.useState(() => Math.min(480, Math.round(window.innerWidth * 0.9)));
      const bodyRef = React.useRef(null);
      const loadedRef = React.useRef(false);

      React.useEffect(() => {
        if (!open || loadedRef.current || !bodyRef.current) return;
        const s = document.createElement('script');
        s.src = 'https://giscus.app/client.js';
        s.async = true;
        s.crossOrigin = 'anonymous';
        s.setAttribute('data-repo', 'HoyoungParkme/tech-roadmap');
        s.setAttribute('data-repo-id', 'R_kgDOSIZCtg');
        s.setAttribute('data-category', 'General');
        s.setAttribute('data-category-id', 'DIC_kwDOSIZCts4C7lgx');
        s.setAttribute('data-mapping', 'specific');
        s.setAttribute('data-term', term);
        s.setAttribute('data-strict', '0');
        s.setAttribute('data-reactions-enabled', '1');
        s.setAttribute('data-emit-metadata', '0');
        s.setAttribute('data-input-position', 'bottom');
        s.setAttribute('data-theme', 'light');
        s.setAttribute('data-lang', 'ko');
        bodyRef.current.appendChild(s);
        loadedRef.current = true;
      }, [open, term]);

      const onResizeStart = (e) => {
        e.preventDefault();
        const startX = e.clientX;
        const startW = width;
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;cursor:ew-resize;';
        document.body.appendChild(overlay);
        const onMove = (ev) => {
          const newW = Math.max(320, Math.min(window.innerWidth * 0.9, startW + (startX - ev.clientX)));
          setWidth(newW);
        };
        const onUp = () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
          overlay.remove();
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      };

      const buttonRight = open ? Math.min(width, window.innerWidth - 40) + 'px' : 0;

      return (
        <React.Fragment>
          <button
            onClick={() => setOpen(o => !o)}
            aria-expanded={open}
            aria-label={open ? '댓글 패널 닫기' : '댓글 패널 열기'}
            style={{ position: 'fixed', top: '40%', right: buttonRight, zIndex: 51, writingMode: 'vertical-rl', transition: 'right 0.25s ease' }}
            className="bg-slate-800 text-white px-2 py-3 rounded-l-lg text-sm font-medium shadow-md hover:bg-slate-700"
          >
            💬 {open ? '닫기' : '댓글'}
          </button>
          <div
            role="complementary"
            aria-label="댓글 패널"
            style={{ position: 'fixed', top: 0, right: 0, height: '100vh', width: width + 'px', transform: open ? 'translateX(0)' : 'translateX(100%)', transition: 'transform 0.25s ease', zIndex: 50, background: '#fff', boxShadow: '-4px 0 12px rgba(0,0,0,0.08)' }}
          >
            <div onMouseDown={onResizeStart} style={{ position: 'absolute', left: '-4px', top: 0, width: '8px', height: '100%', cursor: 'ew-resize', zIndex: 52 }} aria-hidden="true" />
            <div className="border-b border-slate-200 px-4 py-3 flex items-center justify-between">
              <span className="font-bold text-slate-800">💬 댓글 / 질문</span>
              <button onClick={() => setOpen(false)} aria-label="댓글 패널 닫기" className="text-slate-500 hover:text-slate-800 px-2">✕</button>
            </div>
            <div ref={bodyRef} className="p-4 overflow-y-auto" style={{ height: 'calc(100vh - 56px)' }} />
          </div>
        </React.Fragment>
      );
    }

    function App() {
      const [activeId, setActiveId] = useState(null);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [expandedParts, setExpandedParts] = useState(
        { I: true, II: true, III: true, IV: true, V: true, VI: true, VII: true, VIII: true }
      );

      const activeItem = activeId ? findItemById(activeId) : null;

      const navigate = useCallback((id) => {
        setActiveId(id);
        window.location.hash = id;
        if (window.innerWidth < 1024) setSidebarOpen(false);
      }, []);

      useEffect(() => {
        const hash = window.location.hash.slice(1);
        if (hash && findItemById(hash)) setActiveId(hash);
        const onHash = () => {
          const h = window.location.hash.slice(1);
          if (h && findItemById(h)) setActiveId(h);
        };
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      const togglePart = (part) => {
        setExpandedParts(prev => ({ ...prev, [part]: !prev[part] }));
      };

      return (
        <React.Fragment>
        <div className="h-full flex bg-slate-100">

          {sidebarOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-30 z-30 lg:hidden" onClick={() => setSidebarOpen(false)} />
          )}

          <aside className={`
            fixed lg:static z-40 h-full w-72 bg-white border-r border-slate-200 flex flex-col
            transition-transform duration-200
            ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0 lg:w-72'}
          `}>
            <div className="p-4 border-b border-slate-200 shrink-0">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 bg-green-600 text-white flex items-center justify-center rounded-lg font-bold text-sm">S</div>
                <div>
                  <div className="font-bold text-slate-800 text-sm">Spring Boot 학습</div>
                  <div className="text-[11px] text-slate-500">{TOTAL}개 시각화</div>
                </div>
              </div>
            </div>

            <nav className="flex-1 overflow-y-auto p-2">
              {SECTIONS.map((section) => (
                <div key={section.part} className="mb-1">
                  <button
                    onClick={() => togglePart(section.part)}
                    className="w-full flex items-center gap-2 px-2 py-2 rounded-lg text-left hover:bg-slate-50 transition"
                  >
                    <span className={`w-5 h-5 rounded text-white text-[10px] flex items-center justify-center font-bold ${section.color}`}>
                      {section.part}
                    </span>
                    <span className="text-xs font-bold text-slate-700 flex-1 truncate">{section.label}</span>
                    <span className="text-[10px] text-slate-400">{section.items.length}</span>
                    <span className={`text-slate-400 text-xs transition-transform ${expandedParts[section.part] ? 'rotate-90' : ''}`}>&#9654;</span>
                  </button>

                  {expandedParts[section.part] && (
                    <div className="ml-4 border-l border-slate-100 pl-2 space-y-0.5">
                      {section.items.map((item) => {
                        const isActive = activeId === item.id;
                        return (
                          <button
                            key={item.id}
                            onClick={() => navigate(item.id)}
                            className={`w-full text-left px-2 py-1.5 rounded-md text-xs transition-all truncate
                              ${isActive ? PART_ACTIVE[section.part] : `text-slate-600 ${PART_BG[section.part]}`}
                            `}
                          >
                            <span className="font-mono text-[10px] opacity-60 mr-1">{item.id}</span>
                            {item.title}
                          </button>
                        );
                      })}
                    </div>
                  )}
                </div>
              ))}
            </nav>

            <div className="p-3 border-t border-slate-200 shrink-0 text-[10px] text-slate-400 text-center">
              React + Tailwind + Babel CDN
            </div>
          </aside>

          <main className="flex-1 flex flex-col min-w-0">
            <div className="h-12 bg-white border-b border-slate-200 flex items-center px-4 shrink-0 gap-3">
              <button
                onClick={() => setSidebarOpen(prev => !prev)}
                className="lg:hidden p-1.5 rounded-md hover:bg-slate-100 text-slate-600"
                aria-label="사이드바 토글"
              >
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                  <path fillRule="evenodd" d="M3 5h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2z" />
                </svg>
              </button>

              {activeItem ? (
                <div className="flex items-center gap-2 min-w-0">
                  <span className={`w-5 h-5 rounded text-white text-[10px] flex items-center justify-center font-bold shrink-0 ${
                    SECTIONS.find(s => s.part === activeItem.part)?.color || 'bg-slate-600'
                  }`}>{activeItem.part}</span>
                  <span className="font-mono text-xs text-slate-500 shrink-0">{activeItem.id}</span>
                  <span className="text-sm font-bold text-slate-800 truncate">{activeItem.title}</span>
                </div>
              ) : (
                <span className="text-sm text-slate-500">시각화를 선택하세요</span>
              )}
            </div>

            {activeItem ? (
              <iframe
                key={activeItem.id}
                src={activeItem.file}
                className="flex-1 w-full border-0"
                title={activeItem.title}
              />
            ) : (
              <div className="flex-1 flex items-center justify-center p-8">
                <div className="text-center max-w-md">
                  <div className="w-16 h-16 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl font-bold">S</div>
                  <h2 className="text-2xl font-bold text-slate-800 mb-3">Spring Boot 인터랙티브 학습</h2>
                  <p className="text-slate-600 mb-6 leading-relaxed">
                    왼쪽 사이드바에서 시각화를 선택하세요.<br/>
                    Part I부터 순서대로 보거나, 관심 있는 주제를 바로 클릭할 수 있습니다.
                  </p>
                  <div className="grid grid-cols-4 gap-2 mb-6">
                    {SECTIONS.map(s => (
                      <div key={s.part} className="text-center">
                        <div className={`w-8 h-8 rounded-lg text-white text-xs flex items-center justify-center font-bold mx-auto mb-1 ${s.color}`}>{s.part}</div>
                        <div className="text-[10px] text-slate-500">{s.items.length}개</div>
                      </div>
                    ))}
                  </div>
                  <p className="text-xs text-slate-400">총 {TOTAL}개 시각화 | React + Tailwind CDN | 빌드 도구 없음</p>
                </div>
              </div>
            )}
          </main>
        </div>
        <GiscusPanel term="springboot" />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
