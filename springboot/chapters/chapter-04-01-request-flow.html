    학습 목표 : GET /users/1 한 번의 요청이
               Filter Chain → DispatcherServlet (Front Controller)

    핵심 비유 : 공항 입국 절차.
               Filter(보안검색) → DispatcherServlet(안내데스크)
               → Controller(창구) → Service(업무처리)
               → Repository(자료 조회)

    패턴     : fastapi v1
               좌(LiveDataPane: HTTP 요청 → 5계층 박스 흐름, step별 활성 lime)
               우(VSCode CodeViewer: filter.java / dispatcher.java
                   / controller.java / service.java / repo.java 5 탭)

    색상     : lime
    조작     : 4 버튼(처음/이전/재생/다음) + 키보드 ←/→ + 자동재생 3000ms
    ─────────────────────────────────────────────────────────────
  -->

    // ─────────────────────────────────────────────────────
    // CodeCard — 좌측에 표시하는 작은 코드 카드 (다크)
    // ─────────────────────────────────────────────────────
    function CodeCard({ label, code }) {
      return (
        <div className="rounded-lg border-2 border-lime-300 bg-lime-50 overflow-hidden">
          <div className="px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider bg-lime-100 text-lime-800">

    // ─────────────────────────────────────────────────────
    // LayerStack — 5계층(+client+db) 박스 흐름
    //   activeLayers 에 포함되면 lime 으로 강조한다.
    // ─────────────────────────────────────────────────────
    function LayerStack({ activeLayers }) {
      const isActive = (id) => activeLayers.includes(id);

      const boxClass = (id) => {
        const base = 'px-3 py-1.5 rounded-md border-2 transition-all duration-300 flex items-center justify-between';
        if (isActive(id)) {
          return `${base} bg-lime-100 border-lime-500 ring-2 ring-lime-300 text-lime-900 shadow-sm`;
        }
        return `${base} bg-white border-slate-200 text-slate-400`;
      };

      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">
          <div className="bg-slate-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-slate-600">
            HTTP 요청 처리 5계층
          </div>
          <div className="p-2.5 space-y-1">
            {LAYERS.map((layer, i) => (
              <div key={layer.id}>
                <div className={boxClass(layer.id)}>
                  <div className="flex flex-col">
                    <span className="text-[12px] font-bold leading-tight">{layer.label}</span>
                    <span className="text-[9px] opacity-70 leading-tight">{layer.sub}</span>
                  </div>
                  {isActive(layer.id) && (
                    <span className="text-[8px] font-mono px-1.5 py-0.5 rounded bg-lime-500 text-white font-bold uppercase tracking-wider">
                      active
                    </span>
                  )}
                </div>
                {i < LAYERS.length - 1 && (
                  <div className="flex justify-center my-0.5">
                    <span className={`text-base leading-none ${isActive(layer.id) && isActive(LAYERS[i + 1].id) ? 'text-lime-500' : 'text-slate-300'}`}>↓</span>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // FlowArrow — 단계 간 흐름 화살표

    function FlowArrow({ label }) {

            <div className="text-lime-500 text-lg leading-none">↓</div>

      );

    // ─────────────────────────────────────────────────────

    function PayloadBox({ payload }) {
      return (
        <div className="bg-slate-900 text-lime-300 text-[11px] font-mono p-2.5 rounded-lg border border-slate-700">
          <div className="text-slate-500 mb-1 text-[9px] uppercase tracking-wider">// 전달되는 데이터</div>
          <pre className="m-0 whitespace-pre-wrap break-all">{JSON.stringify(payload, null, 2)}</pre>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    //   상단 : 입력 코드 카드 (HTTP 요청 / 매핑 / SQL 등)
    //   ↓
    //   중간 : 5계층 박스 흐름 (active = lime)
    //   ↓
    //   하단 : 데이터 패킷 미리보기 (JSON)
    //   + 핵심 포인트 박스
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🌿 HTTP 요청 처리 흐름 시각화</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-1">
            {/* 1) 입력 카드 */}
            <CodeCard label={step.leftLabel} code={step.leftCode} />

            <FlowArrow label="요청이 들어옴" />

            {/* 2) 5계층 박스 */}
            <LayerStack activeLayers={step.activeLayers} />

            <FlowArrow label={step.arrowOut} />

            {/* 3) 데이터 패킷 */}
            <PayloadBox payload={step.payload} />
          </div>

          {/* 핵심 포인트 */}

            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-lime-500"></span>active layer
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-300"></span>idle
            </span>

    // ─────────────────────────────────────────────────────
    // CodeViewer — VSCode 스타일 다중 탭 (filter / dispatcher / controller / service / repo)
    //   highlight.js 11.9.0 + atom-one-dark 로 토큰 강조
    //   step 별 highlightByStep 으로 라인 강조
    //   step 변경 시 activeTab 자동 전환
    // ─────────────────────────────────────────────────────
    function CodeViewer({ files, stepIdx, total, activeTab, onTabChange }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      const file = files.find((f) => f.key === activeTab) || files[0];
      const highlightLines = file.highlightByStep?.[stepIdx] || [];

      // 탭 / 코드가 바뀔 때 highlight.js 다시 적용
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${file.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [file.key]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] border-b border-slate-700">
            <div className="px-4 py-2 flex items-center gap-2 border-b border-slate-700/50">
              <div className="flex gap-1.5">
                <span className="w-3 h-3 rounded-full bg-red-500"></span>
                <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
                <span className="w-3 h-3 rounded-full bg-green-500"></span>
              </div>
              <span className="text-xs text-slate-400 ml-2 font-mono">UserApi / src / main / java</span>
              <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{file.lang}</span>
            </div>
            {/* 탭 바 */}
            <div className="flex overflow-x-auto">
              {files.map((f) => {
                const isActive = f.key === activeTab;
                return (
                  <button
                    key={f.key}
                    onClick={() => onTabChange(f.key)}
                    className={`px-3 py-1.5 text-[11px] font-mono border-r border-slate-700/50 transition flex-shrink-0 ${
                      isActive
                        ? 'bg-[#282c34] text-lime-300 border-t-2 border-t-lime-400'
                        : 'bg-[#21252b] text-slate-500 hover:text-slate-300 hover:bg-[#2a2f37] border-t-2 border-t-transparent'
                    }`}
                    aria-pressed={isActive}
                  >
                    {f.filename}
                  </button>
                );
              })}
            </div>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${file.lang}`}>{file.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[44rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || file.lines).map((lineHtml, i) => {
                  const highlighted = highlightLines.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-lime-500/15 border-l-2 border-lime-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>

                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{file.lines.length} lines · {highlightLines.length} highlighted</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→ 으로 이전/다음
    //   - 자동재생 3000ms
    //   - 단계 변경 시 우측 탭 자동 전환 (사용자가 수동으로 바꾸면 잠시 유지됨)
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [activeTab, setActiveTab] = useState(STEPS[0].activeTab);
      const [tabPinned, setTabPinned] = useState(false);

      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      // step 변경 시 자동으로 탭 전환 (수동 선택을 막지 않도록 pin 해제)
      useEffect(() => {
        if (!tabPinned) {
          setActiveTab(step.activeTab);
        }
      }, [stepIdx]);

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
        setTabPinned(false);  // 단계 진행 시 자동 탭 전환 다시 활성화
      };
      const handlePrev = () => {
        setStepIdx((i) => Math.max(0, i - 1));
        setTabPinned(false);
      };
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
        setActiveTab(STEPS[0].activeTab);
        setTabPinned(false);
      };

      const handleTabChange = (key) => {
        setActiveTab(key);
        setTabPinned(true);  // 사용자가 수동 선택하면 자동 전환 잠시 막음
      };

      // 자동 재생 — 3000ms
      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; 챕터 목록</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter IV-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-lime-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. Spring Boot 동작 원리 &gt; Chapter 1. 요청 처리 구조</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-1-1. HTTP 요청 처리 계층</h1>
                  <p className="text-sm text-slate-500 mt-0.5">Filter → DispatcherServlet → Controller → Service → Repository → DB</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                files={FILES}
                stepIdx={stepIdx}
                total={STEPS.length}
                activeTab={activeTab}
                onTabChange={handleTabChange}
              />
            </div>

            {/* 마지막 단계 정리 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-300 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: HTTP 요청은 <strong>Filter → DispatcherServlet → HandlerMapping → Controller → Service → Repository → DB</strong> 순으로 흐른다. 각 계층은 한 가지 책임만 가진다 — Filter는 공통 전처리, Dispatcher는 라우팅, Controller는 HTTP 입출력, Service는 비즈니스 로직, Repository는 DB 경계. 다음(IV-1-2)에서는 Bean Lifecycle을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[110px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
