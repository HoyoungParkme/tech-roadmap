<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter IV-1-1 — HTTP 요청 처리 계층</title>

  <!-- Tailwind CSS Play CDN: 학습 자료용. 프로덕션에서는 PostCSS 빌드를 권장. -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 (development 버전: 학습용이므로 에러 메시지 상세 버전 사용) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel Standalone 7.x: 브라우저에서 JSX를 실시간 변환 (Fragment shorthand `<>` 지원) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    ─────────────────────────────────────────────────────────────
    Chapter IV-1-1 — HTTP 요청 처리 계층 (7 STEPS)
    ─────────────────────────────────────────────────────────────
    학습 목표 : GET /users/1 요청이 Tomcat → DispatcherServlet → HandlerMapping
               → Controller → Service → Repository → DB 까지 7계층을 거쳐
               JSON 응답으로 돌아오는 흐름을 단계별로 체험한다.
    조작법   : "자동 실행" 버튼으로 재생, 이전/다음 버튼으로 수동 전환.
    파일 역할 : 챕터 허브(index.html)에서 진입하는 개별 시각화 페이지.
               같은 구조로 다른 챕터 시각화를 추가하려면 STEPS/JAVA_CODE/NODES를 교체한다.
    ─────────────────────────────────────────────────────────────
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // -----------------------------------------
    // 1. 교육용 Java 코드 (Spring Boot 3계층 구조)
    // -----------------------------------------
    const JAVA_CODE = [
      "// Controller — HTTP 요청 진입점",
      "@RestController",
      "public class UserController {",
      "    private final UserService userService;",
      "",
      "    @GetMapping(\"/users/{id}\")",
      "    public User getUser(@PathVariable Long id) {",
      "        return userService.findById(id);",
      "    }",
      "}",
      "",
      "// Service — 비즈니스 로직",
      "@Service",
      "public class UserService {",
      "    private final UserRepository repo;",
      "",
      "    public User findById(Long id) {",
      "        return repo.findById(id)",
      "            .orElseThrow(RuntimeException::new);",
      "    }",
      "}",
      "",
      "// Repository — DB 접근 (JPA)",
      "@Repository",
      "public interface UserRepository",
      "    extends JpaRepository<User, Long> {",
      "    // JPA가 SQL을 자동 생성한다",
      "}"
    ];

    // -----------------------------------------
    // 2. 시뮬레이션 스텝 정의 (7 STEPS)
    // -----------------------------------------
    const STEPS = [
      {
        id: 'tomcat',
        codeLine: -1,
        label: '① Tomcat',
        desc: "[STEP 1 — 요청 수신] 브라우저가 GET /users/1 을 전송했습니다. 내장 Tomcat(웹 서버)이 TCP 소켓으로 HTTP 패킷을 수신하고 HttpServletRequest 객체를 생성합니다. Spring Boot는 별도 Tomcat 설치 없이 내장 서버를 jar 파일 안에 포함하고 있습니다.",
        activeNodes: ['client', 'tomcat'],
        dataObj: { method: 'GET', path: '/users/1' }
      },
      {
        id: 'dispatcher',
        codeLine: -1,
        label: '② DispatcherServlet',
        desc: "[STEP 2 — DispatcherServlet] 모든 요청이 DispatcherServlet 이라는 '교통 경찰'을 먼저 통과합니다. Front Controller 패턴의 핵심으로, 요청을 어느 Controller로 보낼지 결정하는 중앙 라우터 역할을 합니다.",
        activeNodes: ['client', 'tomcat', 'dispatcher'],
        dataObj: { servlet: 'DispatcherServlet', status: '요청 분석 중' }
      },
      {
        id: 'handler',
        codeLine: 5,
        label: '③ HandlerMapping',
        desc: "[STEP 3 — HandlerMapping] DispatcherServlet이 HandlerMapping에게 'GET /users/1 을 처리할 메서드가 어디 있냐?' 고 묻습니다. HandlerMapping은 @GetMapping(\"/users/{id}\") 애노테이션을 스캔해 UserController.getUser() 를 찾아줍니다.",
        activeNodes: ['client', 'tomcat', 'dispatcher', 'handler'],
        dataObj: { mapping: '@GetMapping("/users/{id}")', matched: 'UserController.getUser' }
      },
      {
        id: 'controller',
        codeLine: 6,
        label: '④ Controller',
        desc: "[STEP 4 — Controller 실행] UserController.getUser(id=1) 가 호출됩니다. @RestController가 붙은 클래스는 반환값을 JSON으로 자동 변환합니다. Controller는 비즈니스 로직을 직접 처리하지 않고 Service에 위임합니다.",
        activeNodes: ['controller'],
        dataObj: { controller: 'UserController', method: 'getUser', id: 1 }
      },
      {
        id: 'service',
        codeLine: 16,
        label: '⑤ Service',
        desc: "[STEP 5 — Service 호출] UserService.findById(1) 가 실행됩니다. @Service 계층은 비즈니스 규칙을 담당합니다. '사용자가 없으면 에러를 던진다'와 같은 도메인 규칙이 여기 모입니다. Repository에 DB 조회를 요청합니다.",
        activeNodes: ['service'],
        dataObj: { service: 'UserService', logic: 'findById(1)', status: '비즈니스 로직 처리 중' }
      },
      {
        id: 'repository',
        codeLine: 23,
        label: '⑥ Repository (JPA)',
        desc: "[STEP 6 — Repository / DB] @Repository + JpaRepository가 SQL을 자동 생성합니다. findById(1) 호출 한 번에 Hibernate가 SELECT * FROM users WHERE id=1 쿼리를 만들어 DB에 전송합니다. 개발자는 SQL을 직접 쓰지 않아도 됩니다.",
        activeNodes: ['repository', 'db'],
        dataObj: { sql: 'SELECT * FROM users WHERE id=1', orm: 'Hibernate/JPA' }
      },
      {
        id: 'response',
        codeLine: 7,
        label: '⑦ 응답 직렬화',
        desc: "[STEP 7 — 응답 반환] DB에서 User 객체가 반환됩니다. @RestController는 Jackson 라이브러리로 User 객체를 JSON으로 자동 변환합니다. Tomcat이 HTTP 200 응답으로 클라이언트에 전송합니다.",
        activeNodes: ['controller', 'tomcat', 'client'],
        dataObj: { id: 1, name: 'Alice', email: 'alice@example.com' }
      }
    ];

    // 다이어그램 노드 정의 (위에서 아래로 흐름)
    const NODES = [
      { id: 'client',     label: 'Client',           sub: 'Browser / App' },
      { id: 'tomcat',     label: 'Tomcat',            sub: '내장 웹 서버' },
      { id: 'dispatcher', label: 'DispatcherServlet', sub: 'Front Controller' },
      { id: 'handler',    label: 'HandlerMapping',    sub: 'URL → 메서드 매핑' },
      { id: 'controller', label: '@RestController',   sub: 'HTTP 입/출력 담당' },
      { id: 'service',    label: '@Service',          sub: '비즈니스 로직' },
      { id: 'repository', label: '@Repository (JPA)', sub: 'DB 접근 / Hibernate' },
      { id: 'db',         label: 'Database',          sub: 'MySQL / H2 등' }
    ];

    // -----------------------------------------
    // 3. 구문 강조(Syntax Highlighting) 헬퍼 — Java 키워드
    // -----------------------------------------
    const KEYWORDS = new Set([
      'public', 'class', 'return', 'void', 'new', 'private', 'final',
      'interface', 'extends', 'implements', 'import', 'package', 'throws'
    ]);
    const ANNOTATIONS = new Set([
      '@RestController', '@Service', '@Repository', '@GetMapping',
      '@PostMapping', '@PathVariable', '@RequestBody', '@Autowired'
    ]);
    const TYPES = new Set([
      'String', 'List', 'Optional', 'Long', 'User', 'void',
      'UserService', 'UserRepository', 'RuntimeException'
    ]);

    const highlightLine = (line) => {
      // 한 줄 주석 처리 (//)
      const commentIdx = line.indexOf('//');
      let codePart = line;
      let commentPart = '';

      if (commentIdx !== -1) {
        codePart = line.slice(0, commentIdx);
        commentPart = line.slice(commentIdx);
      }

      if (!codePart.trim() && commentPart) {
        return <span className="text-slate-500 italic">{commentPart}</span>;
      }

      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|<|>|\.|\{|\}|")/g);

      const highlightedTokens = tokens.map((token, i) => {
        if (ANNOTATIONS.has(token))
          return <span key={i} className="text-yellow-300 font-bold">{token}</span>;
        if (KEYWORDS.has(token))
          return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (TYPES.has(token))
          return <span key={i} className="text-cyan-400">{token}</span>;
        if (token.trim() !== '' && !isNaN(token))
          return <span key={i} className="text-orange-300">{token}</span>;
        if (token === '"' || token === "'")
          return <span key={i} className="text-emerald-400">{token}</span>;
        return <span key={i} className="text-slate-200">{token}</span>;
      });

      return (
        <>
          {highlightedTokens}
          {commentPart && <span className="text-slate-500 italic">{commentPart}</span>}
        </>
      );
    };

    // -----------------------------------------
    // 4. 메인 앱 컴포넌트
    // -----------------------------------------
    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 2800);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      // 노드가 현재 스텝에서 활성화 상태인지 확인
      const isNodeActive = (nodeId) => stepData.activeNodes.includes(nodeId);

      const getNodeClass = (nodeId) => {
        const base = "px-3 py-2 rounded-lg border-2 font-semibold text-center transition-all duration-500";
        if (isNodeActive(nodeId)) {
          if (nodeId === 'db') {
            return `${base} bg-amber-100 border-amber-500 ring-2 ring-amber-300 shadow-lg scale-105 text-amber-800`;
          }
          if (nodeId === 'client') {
            return `${base} bg-sky-100 border-sky-500 ring-2 ring-sky-300 shadow-lg scale-105 text-sky-800`;
          }
          return `${base} bg-emerald-100 border-emerald-500 ring-2 ring-emerald-300 shadow-lg scale-105 text-emerald-800`;
        }
        return `${base} bg-white border-slate-200 text-slate-400`;
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">

            {/* 상단 뒤로가기 */}
            <div className="flex justify-between items-center text-sm">
              <a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a>
              <span className="text-slate-400">Chapter IV-1-1</span>
            </div>

            {/* 헤더 */}
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div>
                <h1 className="text-2xl font-bold text-slate-800">Spring Boot HTTP 요청 처리 계층</h1>
              </div>
              <p className="text-slate-600">
                HTTP 요청이 <b>Tomcat → DispatcherServlet → HandlerMapping → Controller → Service → Repository → DB</b>를
                거쳐 JSON 응답으로 돌아오는 7단계 흐름을 단계별로 시뮬레이션합니다.
              </p>
            </header>

            {/* 현재 단계 설명 */}
            <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm border border-green-800 flex flex-col justify-center min-h-[110px]">
              <h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 처리 계층</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 좌우 레이아웃 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">

              {/* 왼쪽: 계층 다이어그램 */}
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex flex-col gap-2">
                  <div className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">요청 처리 계층 흐름</div>

                  {/* 노드들 — 위에서 아래 */}
                  {NODES.map((node, idx) => (
                    <div key={node.id}>
                      <div className={getNodeClass(node.id)}>
                        <div className="text-sm">{node.label}</div>
                        <div className="text-xs font-normal opacity-60">{node.sub}</div>
                      </div>
                      {idx < NODES.length - 1 && (
                        <div className="flex justify-center my-1">
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2">
                            <path d="M12 5v14M5 12l7 7 7-7"/>
                          </svg>
                        </div>
                      )}
                    </div>
                  ))}

                  {/* 현재 데이터 패킷 */}
                  <div className="mt-3 bg-slate-800 text-emerald-400 text-xs font-mono p-3 rounded-lg">
                    <div className="text-slate-500 mb-1">// 전달 중인 데이터</div>
                    {JSON.stringify(stepData.dataObj, null, 2)}
                  </div>
                </div>

                {/* 컨트롤 바 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button
                      aria-label="이전 단계"
                      onClick={handlePrev}
                      disabled={currentStepIdx === 0}
                      className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"
                    >
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true">
                        <path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/>
                      </svg>
                    </button>
                    <button
                      aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                      onClick={togglePlay}
                      className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center"
                    >
                      {isPlaying ? (
                        <>
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true">
                            <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
                          </svg>
                          정지
                        </>
                      ) : (
                        <>
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                          </svg>
                          자동 실행
                        </>
                      )}
                    </button>
                    <button
                      aria-label="다음 단계"
                      onClick={handleNext}
                      disabled={isEnd}
                      className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"
                    >
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true">
                        <path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/>
                      </svg>
                    </button>
                  </div>
                  <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                    Step: {currentStepIdx + 1} / {STEPS.length} — {stepData.label}
                  </div>
                </div>
              </div>

              {/* 오른쪽: Java 코드 뷰어 */}
              <div className="relative min-h-[480px] lg:min-h-0 rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-slate-900 flex flex-col">
                  <div className="flex items-center gap-2 px-4 py-2 bg-slate-800 border-b border-slate-700">
                    <div className="w-3 h-3 rounded-full bg-red-500"></div>
                    <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <div className="w-3 h-3 rounded-full bg-green-500"></div>
                    <span className="ml-2 text-xs text-slate-400 font-mono">UserController.java / UserService.java / UserRepository.java</span>
                  </div>
                  <div className="p-4 overflow-y-auto flex-1 text-sm font-mono text-slate-300 scroll-smooth leading-relaxed">
                    {JAVA_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div
                          key={idx}
                          className={`flex px-2 py-0.5 rounded transition-colors ${
                            isActive
                              ? 'bg-green-900/60 text-white font-bold border-l-4 border-green-400 shadow-inner'
                              : 'border-l-4 border-transparent'
                          }`}
                        >
                          <span className="text-slate-600 select-none mr-4 w-6 text-right inline-block shrink-0 tabular-nums">
                            {idx + 1}
                          </span>
                          <span className="whitespace-pre">{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    // -----------------------------------------
    // 5. 마운트
    // -----------------------------------------
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
