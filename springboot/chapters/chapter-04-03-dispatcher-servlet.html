<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter IV-1-2 — DispatcherServlet과 Front Controller</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'pattern', label:'① Front Controller 패턴', desc:'[STEP 1] 공항에 비유하면 DispatcherServlet = 중앙 게이트. 모든 승객(HTTP 요청)이 반드시 중앙 게이트를 통과한 뒤 해당 탑승구(Controller)로 안내된다. 요청마다 별도 입구를 만들지 않고 하나의 관문으로 통일하는 것이 Front Controller 패턴이다.', phase:'pattern' },
      { id:'ds', label:'② DispatcherServlet', desc:'[STEP 2] DispatcherServlet은 Spring MVC의 모든 HTTP 요청을 가장 먼저 받는 중앙 컨트롤러다. 요청 URL을 분석하고 어느 Controller 메서드로 보낼지 결정한다.', phase:'ds' },
      { id:'hm', label:'③ HandlerMapping', desc:'[STEP 3] DispatcherServlet이 HandlerMapping에게 "GET /users/1 을 처리할 메서드가 어디 있냐?"고 묻는다. HandlerMapping은 @GetMapping 애노테이션을 스캔해 UserController.getUser()를 찾아준다.', phase:'hm' },
      { id:'ha', label:'④ HandlerAdapter → Controller', desc:'[STEP 4] HandlerAdapter가 찾아낸 Controller 메서드(UserController.getUser())를 실제로 호출한다. 다양한 Controller 형태(REST, MVC, 함수형)를 동일한 방식으로 실행하는 어댑터 패턴이다.', phase:'ha' },
      { id:'mc', label:'⑤ MessageConverter → 응답', desc:'[STEP 5] @RestController가 반환한 Java 객체를 Jackson이 JSON으로 변환해 HTTP 응답에 쓴다. 개발자는 @RestController와 @GetMapping만 선언하면 Spring이 나머지를 자동으로 연결한다.', phase:'mc' },
    ];

    const FLOW = [
      { id:'req', icon:'🌐', name:'HTTP 요청', sub:'GET /users/1' },
      { id:'ds', icon:'🚦', name:'DispatcherServlet', sub:'중앙 게이트 (Front Controller)' },
      { id:'hm', icon:'🗺️', name:'HandlerMapping', sub:'URL → 메서드 매핑 찾기' },
      { id:'ha', icon:'🔌', name:'HandlerAdapter', sub:'메서드 실행 (어댑터 패턴)' },
      { id:'ctrl', icon:'📋', name:'Controller 메서드', sub:'UserController.getUser()' },
      { id:'mc', icon:'📦', name:'MessageConverter', sub:'Java 객체 → JSON (Jackson)' },
      { id:'res', icon:'✅', name:'HTTP 응답', sub:'200 OK + JSON body' },
    ];

    function V({ phase }) {
      const phaseMap = { pattern:0, ds:1, hm:2, ha:4, mc:6 };
      const activeIdx = phaseMap[phase] ?? -1;

      return (
        <div className="space-y-2 max-w-lg mx-auto">
          <div className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">DispatcherServlet 내부 흐름</div>
          {FLOW.map((node, idx) => (
            <div key={node.id}>
              <div className={`flex items-center gap-3 px-4 py-3 rounded-xl border-2 transition-all duration-500 ${
                idx <= activeIdx ? 'bg-emerald-100 border-emerald-400 ring-2 ring-emerald-300 shadow-lg scale-[1.02]'
                : idx === activeIdx + 1 ? 'bg-amber-50 border-amber-300'
                : 'bg-white border-slate-200 opacity-40'
              }`}>
                <span className="text-xl shrink-0">{node.icon}</span>
                <div>
                  <div className="font-bold text-sm">{node.name}</div>
                  <div className="text-xs text-slate-500">{node.sub}</div>
                </div>
                {idx <= activeIdx && <span className="ml-auto text-emerald-500">✓</span>}
              </div>
              {idx < FLOW.length - 1 && (
                <div className="flex justify-center my-0.5">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={idx < activeIdx ? '#10b981' : '#94a3b8'} strokeWidth="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
                </div>
              )}
            </div>
          ))}
          {phase === 'pattern' && (
            <div className="mt-3 bg-amber-50 p-3 rounded-lg border border-amber-200 text-sm text-amber-800">
              <span className="font-bold">✈️ 비유:</span> 공항 중앙 게이트 → 모든 요청이 한 곳을 통과 → 각 탑승구(Controller)로 분배
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),3500);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter IV-1-2</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">DispatcherServlet과 Front Controller</h1><span className="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full">★★☆</span></div><p className="text-slate-600"><b>DispatcherServlet</b>이 요청을 받아 HandlerMapping → HandlerAdapter → MessageConverter를 거치는 내부 흐름을 체험합니다.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><V phase={step.phase}/></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
