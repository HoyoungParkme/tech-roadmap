      { id:'controller', label:'ÔĹí Controller', desc:'[STEP 2] HTTP ýÜöý▓şýŁä Ű░ŤýĽä ServiceŰą╝ ÝśŞýÂťÝĽśŕ│á ŕ▓░ŕ│╝Űą╝ ýŁĹŰőÁýť╝Űíť Ű░śÝÖśÝĽťŰőĄ. @RestController + @GetMapping. Entityŕ░Ç ýĽäŰőî DTOŰą╝ Ű░śÝÖśÝĽśŰŐö ŕ▓âýŁ┤ ýőĄŰČ┤ ÝĹťýĄÇýŁ┤ŰőĄ.', p:'controller' },
      { id:'service', label:'ÔĹó Service', desc:'[STEP 3] Ű╣äýŽłŰőłýŐĄ Űíťýžü(ŕÂîÝĽť ý▓┤ÝüČ, ŰŹ░ýŁ┤Ýä░ ýí░ÝĽę)Űžî Űő┤Űő╣. EntityŰą╝ DTOŰíť Ű│ÇÝÖśÝĽśŰŐö ŕ▓âŰĆä ýŚČŕŞ░ýäť. UserResponse::from ýáĽýáü ÝîęÝćáŰŽČ ŰęöýäťŰôťŰíť Ű│ÇÝÖś ŰíťýžüýŁä ÝĽť ŕ││ýŚÉ Ű¬ĘýŁÇŰőĄ.', p:'service' },
      { id:'repository', label:'ÔĹú Repository', desc:'[STEP 4] DB ýáĹŕĚ╝Űžî Űő┤Űő╣. JpaRepository ýâüýćŹýť╝Űíť findAll() ŕŞ░Ű│Ş ýáťŕ│Á. ŕ│äýŞÁ ŕ░ä ýŁśýí┤ýä▒ýŁÇ ÝĽşýâü ýťäýŚÉýäť ýĽäŰ×śŰíťŰžî ÝŁÉŰąŞŰőĄ ÔÇö Repositoryŕ░Ç ServiceŰą╝ ýĽîŰę┤ ýĽł ŰÉťŰőĄ.', p:'repository' },
      { id:'why', label:'ÔĹĄ ýÖť ŰÂäŰŽČÝĽśŰŐöŕ░Ç', desc:'[STEP 5] 3ŕ│äýŞÁ ŰÂäŰŽČŕ░Ç ŰČ┤ŰäłýžÇŰę┤ ýŻöŰôť ÝĽť ýĄä ŕ│áý╣á ŰĽî ýľ┤Űööŕ╣îýžÇ ýśüÝľąýŁ┤ Ű»Şý╣śŰŐöýžÇ ýÂöýáüÝĽá ýłś ýŚćŰőĄ. ŰÂäŰŽČŕ░Ç ŰÉśýľ┤ý×łýť╝Űę┤ ServiceŰžî ÝůîýŐĄÝŐŞ, ControllerŰžî ŕÁÉý▓┤ ŕ░ÖýŁÇ ý×ĹýŚůýŁ┤ ŕ░ÇŰŐąÝĽśŰőĄ.', p:'why' },

    function V({ p }) {
      const layers = [
        { name:'Controller', icon:'­čîÉ', desc:'HTTP ý×ůýÂťŰáą', color:'sky', code:'@GetMapping("/users")\npublic List<UserResponse> getUsers() {\n    return userService.getAll();\n}' },
        { name:'Service', icon:'ÔÜÖ´ŞĆ', desc:'Ű╣äýŽłŰőłýŐĄ Űíťýžü', color:'emerald', code:'public List<UserResponse> getAll() {\n    return userRepository.findAll()\n        .stream().map(UserResponse::from)\n        .toList();\n}' },

    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;

      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">

        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">ControllerÔćĺServiceÔćĺRepository ýáäý▓┤ ŕÁČÝśä</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">ÔśůÔśůÔśů</span></div><p className="text-slate-600"><b>3ŕ│äýŞÁ ýĽäÝéĄÝůŹý▓ś</b>ýŁś ŕ░ü ŕ│äýŞÁ ýŚşÝĽáŕ│╝ ýőĄýáä ýŻöŰôťŰą╝ ý▓┤ÝŚśÝĽęŰőłŰőĄ.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">Ýśäý×Č ŰőĘŕ│ä</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>

          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>

      </div></div>);
