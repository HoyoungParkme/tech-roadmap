<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter VI-2-1 Рђћ ControllerРєњServiceРєњRepository ВаёВ▓┤ Жхгьўё</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'principle', label:'РЉа 3Ж│ёВИх вХёвдг ВЏљВ╣Ў', desc:'[STEP 1] Controller=HTTP ВџћВ▓Г ьїїВІ▒, Service=в╣ёВдѕвІѕВіц вАюВДЂ, Repository=SQL(JPA). Ж░Ђ Ж│ёВИхВЮ┤ ВъљЖИ░ В▒ЁВъёвДї ВДёвІц. ВЮ┤ вХёвдг вЇЋвХёВЌљ ьЁїВіцьіИвЦ╝ Ж│ёВИх вІеВюёвАю вЈЁвдй ВъЉВё▒ьЋа Вѕў ВъѕвІц.', p:'principle' },
      { id:'controller', label:'РЉА Controller', desc:'[STEP 2] HTTP ВџћВ▓ГВЮё в░ЏВЋё ServiceвЦ╝ ьўИВХюьЋўЖ│а Ж▓░Ж│╝вЦ╝ ВЮЉвІхВю╝вАю в░ўьЎўьЋювІц. @RestController + @GetMapping. EntityЖ░ђ ВЋёвІї DTOвЦ╝ в░ўьЎўьЋўвіћ Ж▓ЃВЮ┤ ВІцвг┤ ьЉюВцђВЮ┤вІц.', p:'controller' },
      { id:'service', label:'РЉб Service', desc:'[STEP 3] в╣ёВдѕвІѕВіц вАюВДЂ(ЖХїьЋю В▓┤ьЂг, вЇ░ВЮ┤ьё░ ВА░ьЋЕ)вДї вІ┤вІ╣. EntityвЦ╝ DTOвАю в│ђьЎўьЋўвіћ Ж▓ЃвЈё ВЌгЖИ░Вёю. UserResponse::from ВаЋВаЂ ьїЕьєавдг вЕћВёювЊювАю в│ђьЎў вАюВДЂВЮё ьЋю Ж││ВЌљ вфеВЮђвІц.', p:'service' },
      { id:'repository', label:'РЉБ Repository', desc:'[STEP 4] DB ВаЉЖи╝вДї вІ┤вІ╣. JpaRepository ВЃЂВєЇВю╝вАю findAll() ЖИ░в│И ВаюЖ│х. Ж│ёВИх Ж░ё ВЮўВА┤Вё▒ВЮђ ьЋГВЃЂ ВюёВЌљВёю ВЋёвъўвАювДї ьЮљвЦИвІц Рђћ RepositoryЖ░ђ ServiceвЦ╝ ВЋївЕ┤ ВЋѕ вљювІц.', p:'repository' },
      { id:'why', label:'РЉц ВЎю вХёвдгьЋўвіћЖ░ђ', desc:'[STEP 5] 3Ж│ёВИх вХёвдгЖ░ђ вг┤вёѕВДђвЕ┤ ВйћвЊю ьЋю Вцё Ж│аВ╣а вЋї Вќ┤вћћЖ╣їВДђ ВўЂьќЦВЮ┤ в»ИВ╣ўвіћВДђ ВХћВаЂьЋа Вѕў ВЌєвІц. вХёвдгЖ░ђ вљўВќ┤ВъѕВю╝вЕ┤ ServiceвДї ьЁїВіцьіИ, ControllerвДї ЖхљВ▓┤ Ж░ЎВЮђ ВъЉВЌЁВЮ┤ Ж░ђвіЦьЋўвІц.', p:'why' },
    ];
    function V({ p }) {
      const layers = [
        { name:'Controller', icon:'­Ъїљ', desc:'HTTP ВъЁВХюваЦ', color:'sky', code:'@GetMapping("/users")\npublic List<UserResponse> getUsers() {\n    return userService.getAll();\n}' },
        { name:'Service', icon:'РџЎ№ИЈ', desc:'в╣ёВдѕвІѕВіц вАюВДЂ', color:'emerald', code:'public List<UserResponse> getAll() {\n    return userRepository.findAll()\n        .stream().map(UserResponse::from)\n        .toList();\n}' },
        { name:'Repository', icon:'­ЪЌё№ИЈ', desc:'DB ВаЉЖи╝', color:'violet', code:'public interface UserRepository\n    extends JpaRepository<User, Long> { }' },
      ];
      const activeMap = { principle:-1, controller:0, service:1, repository:2, why:-1 };
      const activeIdx = activeMap[p];

      return (
        <div className="max-w-lg mx-auto space-y-2">
          {layers.map((l, i) => {
            const active = activeIdx === i || activeIdx === -1;
            const focused = activeIdx === i;
            const c = { sky:'bg-sky-100 border-sky-400 ring-sky-300 text-sky-800', emerald:'bg-emerald-100 border-emerald-400 ring-emerald-300 text-emerald-800', violet:'bg-violet-100 border-violet-400 ring-violet-300 text-violet-800' };
            return (
              <div key={l.name}>
                <div className={`p-3 rounded-xl border-2 transition-all duration-500 ${focused ? `${c[l.color]} ring-2 shadow-lg scale-[1.02]` : active ? `${c[l.color]}` : 'bg-white border-slate-200 opacity-30'}`}>
                  <div className="flex items-center gap-2 mb-1"><span className="text-lg">{l.icon}</span><span className="font-bold text-sm">{l.name}</span><span className="text-xs opacity-60 ml-auto">{l.desc}</span></div>
                  {focused && <div className="bg-slate-900 p-2 rounded text-xs font-mono text-slate-300 mt-2 whitespace-pre">{l.code}</div>}
                </div>
                {i < layers.length - 1 && <div className="flex justify-center my-0.5"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={active ? '#10b981' : '#94a3b8'} strokeWidth="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg></div>}
              </div>
            );
          })}
          {p==='why' && <div className="mt-3 bg-slate-800 p-3 rounded-lg text-center text-sm text-emerald-400 font-bold">3Ж│ёВИх вХёвдг = вЈЁвдй ьЁїВіцьіИ + ВўЂьќЦ в▓ћВюё ВХћВаЂ Ж░ђвіЦ</div>}
        </div>
      );
    }
    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">Рєљ В▒Ћьё░ вфЕвАЮ</a><span className="text-slate-400">Chapter VI-2-1</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">ControllerРєњServiceРєњRepository ВаёВ▓┤ Жхгьўё</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">РўЁРўЁРўЁ</span></div><p className="text-slate-600"><b>3Ж│ёВИх ВЋёьѓцьЁЇВ▓ў</b>ВЮў Ж░Ђ Ж│ёВИх ВЌГьЋаЖ│╝ ВІцВаё ВйћвЊювЦ╝ В▓┤ьЌўьЋЕвІѕвІц.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">ьўёВъг вІеЖ│ё</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[280px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>ВаЋВДђ</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>ВъљвЈЎ ВІцьќЅ</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} Рђћ {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
