<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter I-3-2 — Spring Boot의 위치</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter I-3-2 — Spring Boot의 위치: 프레임워크 생태계 비교 시각화 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const FRAMEWORKS = [
      { id: 'spring', name: 'Spring Boot', lang: 'Java/Kotlin', icon: '🌱', color: 'emerald',
        strengths: ['기업 환경 표준', '방대한 생태계', '강력한 보안(Spring Security)', '마이크로서비스 지원'],
        useCase: '대기업 백엔드, 금융, 공공기관', share: '전 세계 Java 웹 프레임워크 1위' },
      { id: 'django', name: 'Django', lang: 'Python', icon: '🐍', color: 'sky',
        strengths: ['빠른 프로토타이핑', '관리자 페이지 자동 생성', 'ORM 내장', 'AI/ML 연동 용이'],
        useCase: '스타트업, 데이터 분석, AI 서비스', share: 'Python 웹 프레임워크 1위' },
      { id: 'express', name: 'Express.js', lang: 'JavaScript', icon: '⚡', color: 'amber',
        strengths: ['극도로 가벼움', '프론트·백 같은 언어', 'npm 생태계', '실시간 앱에 강함'],
        useCase: '실시간 채팅, API 서버, 풀스택 JS', share: 'Node.js 웹 프레임워크 1위' },
      { id: 'rails', name: 'Ruby on Rails', lang: 'Ruby', icon: '💎', color: 'rose',
        strengths: ['Convention over Configuration', '개발 속도 극대화', '프로토타입 빠름', 'Shopify/GitHub 검증'],
        useCase: '스타트업 MVP, 이커머스', share: 'Ruby 웹 프레임워크 1위' },
    ];

    const STEPS = [
      { id: 'map', label: '① 프레임워크 생태계',
        desc: '[STEP 1 — 전체 지도] 웹 백엔드 프레임워크는 언어마다 대표 주자가 있다. Java의 Spring Boot, Python의 Django, JavaScript의 Express.js, Ruby의 Rails가 각각 해당 언어 생태계의 1위 프레임워크다.',
        focus: 'all' },
      { id: 'spring', label: '② Spring Boot (Java)',
        desc: '[STEP 2 — Spring Boot] 전 세계 기업 백엔드의 표준. 은행, 공공기관, 대기업이 선택하는 이유는 30년 검증된 안정성, 방대한 생태계, Spring Security의 강력한 보안이다. 마이크로서비스 아키텍처(MSA) 지원도 강점이다.',
        focus: 'spring' },
      { id: 'compare', label: '③ 다른 프레임워크와 비교',
        desc: '[STEP 3 — 비교] 빠른 프로토타이핑은 Django나 Rails가 유리하다. 프론트·백 같은 언어를 쓰려면 Express.js가 좋다. 하지만 대규모 팀, 장기 운영, 보안이 중요한 기업 환경에서는 Spring Boot가 압도적이다.',
        focus: 'compare' },
      { id: 'when', label: '④ 언제 Spring Boot를 선택하나',
        desc: '[STEP 4 — 선택 기준] Spring Boot를 선택해야 할 때: ① 기업 백엔드나 B2B 서비스 ② 팀 규모가 크고 장기 유지보수가 필요한 프로젝트 ③ 보안·인증이 핵심인 서비스 ④ Java 생태계(JPA, Kafka 등)를 활용해야 할 때.',
        focus: 'when' },
      { id: 'summary', label: '⑤ 정리',
        desc: '[STEP 5 — 정리] "최고의 프레임워크"는 없다. 프로젝트 특성에 맞는 프레임워크가 최선이다. 이 커리큘럼은 Spring Boot를 기초부터 실무까지 안내하며, 기업 환경에서 가장 수요가 높은 기술을 다룬다.',
        focus: 'summary' },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const colorMap = {
        emerald: { bg: 'bg-emerald-100', border: 'border-emerald-400', ring: 'ring-emerald-300', text: 'text-emerald-800', light: 'bg-emerald-50' },
        sky: { bg: 'bg-sky-100', border: 'border-sky-400', ring: 'ring-sky-300', text: 'text-sky-800', light: 'bg-sky-50' },
        amber: { bg: 'bg-amber-100', border: 'border-amber-400', ring: 'ring-amber-300', text: 'text-amber-800', light: 'bg-amber-50' },
        rose: { bg: 'bg-rose-100', border: 'border-rose-400', ring: 'ring-rose-300', text: 'text-rose-800', light: 'bg-rose-50' },
      };

      const isFrameworkActive = (fwId) => {
        if (stepData.focus === 'all' || stepData.focus === 'compare' || stepData.focus === 'summary') return true;
        if (stepData.focus === 'spring' || stepData.focus === 'when') return fwId === 'spring';
        return false;
      };

      const isFrameworkFocused = (fwId) => {
        if (stepData.focus === 'spring' || stepData.focus === 'when') return fwId === 'spring';
        return false;
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <div className="flex justify-between items-center text-sm">
              <a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a>
              <span className="text-slate-400">Chapter I-3-2</span>
            </div>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div>
                <h1 className="text-2xl font-bold">Spring Boot의 위치 — 다른 프레임워크와 비교</h1>
                <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">★☆☆</span>
              </div>
              <p className="text-slate-600">
                웹 백엔드 프레임워크 생태계에서 <b>Spring Boot가 어디에 위치하는지</b>, 언제 선택해야 하는지 비교합니다.
              </p>
            </header>

            <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 프레임워크 비교 */}
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">웹 백엔드 프레임워크 생태계</div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {FRAMEWORKS.map(fw => {
                  const c = colorMap[fw.color];
                  const active = isFrameworkActive(fw.id);
                  const focused = isFrameworkFocused(fw.id);

                  return (
                    <div key={fw.id} className={`p-4 rounded-xl border-2 transition-all duration-500 ${
                      focused ? `${c.bg} ${c.border} ring-2 ${c.ring} shadow-lg scale-[1.02]`
                      : active ? `${c.light} ${c.border} shadow-sm`
                      : 'bg-slate-50 border-slate-200 opacity-30'
                    }`}>
                      <div className="flex items-center gap-2 mb-2">
                        <span className="text-2xl">{fw.icon}</span>
                        <div>
                          <div className={`font-bold ${active ? c.text : 'text-slate-400'}`}>{fw.name}</div>
                          <div className="text-xs text-slate-500">{fw.lang}</div>
                        </div>
                        {fw.id === 'spring' && active && (
                          <span className="ml-auto text-xs bg-emerald-200 text-emerald-800 px-2 py-0.5 rounded-full font-bold">이 커리큘럼</span>
                        )}
                      </div>

                      {active && (
                        <>
                          <div className="flex flex-wrap gap-1 mb-2">
                            {fw.strengths.map(s => (
                              <span key={s} className={`text-xs px-2 py-0.5 rounded border ${c.light} ${c.border} ${c.text}`}>{s}</span>
                            ))}
                          </div>
                          <div className="text-xs text-slate-600">
                            <span className="font-semibold">주요 사용처:</span> {fw.useCase}
                          </div>
                          <div className="text-xs text-slate-400 mt-1">{fw.share}</div>
                        </>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* 선택 기준 */}
              {stepData.focus === 'when' && (
                <div className="mt-4 bg-emerald-50 p-4 rounded-lg border border-emerald-200">
                  <div className="font-bold text-emerald-800 mb-2">Spring Boot를 선택해야 할 때</div>
                  <div className="grid grid-cols-2 gap-2">
                    {['기업 백엔드 / B2B', '대규모 팀 + 장기 유지보수', '보안·인증이 핵심', 'Java 생태계 활용'].map(item => (
                      <div key={item} className="bg-white px-3 py-2 rounded border border-emerald-200 text-sm text-emerald-700">
                        ✓ {item}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* 정리 */}
              {stepData.focus === 'summary' && (
                <div className="mt-4 bg-slate-800 text-slate-200 p-4 rounded-lg text-center">
                  <div className="text-lg font-bold text-amber-400 mb-2">"최고의 프레임워크"는 없다</div>
                  <div className="text-sm text-slate-400">프로젝트 특성에 맞는 프레임워크가 최선이다.</div>
                  <div className="text-sm text-emerald-400 mt-2 font-semibold">이 커리큘럼은 기업 환경에서 가장 수요가 높은 Spring Boot를 다룬다.</div>
                </div>
              )}
            </div>

            {/* 컨트롤 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length} — {stepData.label}
              </div>
            </div>

            <div className="flex justify-center gap-2">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                  className={`w-3 h-3 rounded-full transition-all ${i === currentStepIdx ? 'bg-green-700 scale-125' : 'bg-slate-300 hover:bg-slate-400'}`} />
              ))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
