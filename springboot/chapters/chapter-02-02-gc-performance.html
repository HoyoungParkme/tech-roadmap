<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter II-1-2 — GC와 성능</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter II-1-2 — GC: 청소 로봇 비유 + Stop-The-World + G1GC vs ZGC -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { id: 'problem', label: '① 왜 GC가 필요한가',
        desc: '[STEP 1 — 문제] Heap 창고에는 프로그램 실행 중 수많은 객체가 생긴다. 쓰이지 않는 데이터도 그대로 남아있으면 창고가 가득 차서 새 데이터를 쌓을 공간이 없어진다. 이 문제를 해결하는 것이 GC(Garbage Collector)다.',
        phase: 'problem' },
      { id: 'robot', label: '② 청소 로봇 비유',
        desc: '[STEP 2 — 비유] GC를 사무실 청소 로봇에 비유하자. 직원들(코드)이 사용 후 버린 종이(참조가 끊긴 객체)를 청소 로봇(GC)이 주기적으로 찾아서 쓰레기통에 버린다. 직원들은 청소를 신경 쓸 필요 없이 일에만 집중할 수 있다.',
        phase: 'robot' },
      { id: 'stw', label: '③ Stop-The-World',
        desc: '[STEP 3 — STW] 문제는 청소 로봇이 청소하는 동안 직원들의 작업이 잠깐 멈춘다는 점이다. 이 멈춤을 Stop-The-World라 한다. 멈추는 시간이 길면 서버가 응답을 못 하는 것처럼 보인다.',
        phase: 'stw' },
      { id: 'g1gc', label: '④ G1GC (기본 GC)',
        desc: '[STEP 4 — G1GC] Java 17 기본 GC. Heap을 작은 구역(Region)으로 나눠 쓰레기가 가장 많은 곳부터 먼저 청소(Garbage-First)한다. 정지 시간을 짧게 유지하면서 전반적인 성능 균형이 좋다.',
        phase: 'g1gc' },
      { id: 'zgc', label: '⑤ ZGC (초저지연)',
        desc: '[STEP 5 — ZGC] 수백 GB 대용량 Heap에서도 정지 시간을 1ms 이하로 줄이는 최신 GC다. 응답 속도가 중요한 대규모 서비스에 적합하다. Spring Boot 서버가 간헐적으로 느려지면 GC 로그 확인이 원인 파악의 첫 단계다.',
        phase: 'zgc' },
    ];

    function GCVisual({ phase }) {
      // 사무실 객체들
      const objects = [
        { id: 1, name: 'User', alive: true },
        { id: 2, name: 'Order', alive: true },
        { id: 3, name: 'temp1', alive: false },
        { id: 4, name: 'Session', alive: true },
        { id: 5, name: 'temp2', alive: false },
        { id: 6, name: 'temp3', alive: false },
        { id: 7, name: 'Config', alive: true },
        { id: 8, name: 'temp4', alive: false },
      ];

      if (phase === 'problem') {
        return (
          <div className="text-center space-y-4">
            <div className="text-xs font-bold text-slate-500 uppercase tracking-widest">Heap (창고)</div>
            <div className="bg-slate-100 p-4 rounded-xl border border-slate-200 flex flex-wrap justify-center gap-2">
              {objects.map(obj => (
                <div key={obj.id} className={`px-3 py-2 rounded-lg border text-sm ${
                  obj.alive ? 'bg-emerald-100 border-emerald-300 text-emerald-800' : 'bg-rose-100 border-rose-300 text-rose-800'
                }`}>
                  {obj.alive ? '✓' : '✗'} {obj.name}
                </div>
              ))}
            </div>
            <div className="bg-rose-50 p-3 rounded-lg border border-rose-200 text-sm text-rose-700">
              ⚠️ 빨간 객체(temp)는 더 이상 쓰이지 않지만 메모리를 차지하고 있다
            </div>
          </div>
        );
      }

      if (phase === 'robot') {
        return (
          <div className="text-center space-y-4">
            <div className="flex items-center justify-center gap-4 flex-wrap">
              <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-200">
                <div className="text-3xl mb-1">👨‍💻</div>
                <div className="text-sm font-semibold text-emerald-800">직원 (코드)</div>
                <div className="text-xs text-emerald-600">일에만 집중</div>
              </div>
              <div className="text-2xl">+</div>
              <div className="bg-amber-50 p-4 rounded-xl border border-amber-200">
                <div className="text-3xl mb-1">🤖</div>
                <div className="text-sm font-semibold text-amber-800">청소 로봇 (GC)</div>
                <div className="text-xs text-amber-600">버린 종이 자동 수거</div>
              </div>
              <div className="text-2xl">=</div>
              <div className="bg-sky-50 p-4 rounded-xl border border-sky-200">
                <div className="text-3xl mb-1">✨</div>
                <div className="text-sm font-semibold text-sky-800">깨끗한 사무실</div>
                <div className="text-xs text-sky-600">메모리 효율적 사용</div>
              </div>
            </div>
          </div>
        );
      }

      if (phase === 'stw') {
        return (
          <div className="space-y-4">
            <div className="grid grid-cols-2 gap-4">
              <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-200 text-center">
                <div className="text-2xl mb-1">🏃‍♂️</div>
                <div className="font-bold text-emerald-800">평소</div>
                <div className="text-sm text-emerald-600">앱이 정상 동작 중</div>
                <div className="mt-2 h-4 bg-emerald-400 rounded-full"></div>
              </div>
              <div className="bg-rose-50 p-4 rounded-xl border border-rose-200 text-center">
                <div className="text-2xl mb-1">⏸️</div>
                <div className="font-bold text-rose-800">Stop-The-World</div>
                <div className="text-sm text-rose-600">GC 작동 → 앱 일시 정지</div>
                <div className="mt-2 h-4 bg-rose-400 rounded-full flex items-center justify-center">
                  <span className="text-white text-xs font-bold">PAUSE</span>
                </div>
              </div>
            </div>
            <div className="bg-amber-50 p-3 rounded-lg border border-amber-200 text-sm text-amber-800 text-center">
              정지 시간이 길면 서버가 응답 못 하는 것처럼 보인다 → GC 알고리즘이 이 시간을 줄이는 데 집중
            </div>
          </div>
        );
      }

      // G1GC / ZGC 비교
      const isG1 = phase === 'g1gc';
      return (
        <div className="space-y-4">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div className={`p-4 rounded-xl border-2 transition-all duration-500 ${
              isG1 ? 'bg-emerald-100 border-emerald-400 ring-2 ring-emerald-300 shadow-lg' : 'bg-white border-slate-200'
            }`}>
              <div className="text-xl mb-1 text-center">🟢</div>
              <div className="font-bold text-center text-emerald-800">G1GC</div>
              <div className="text-xs text-slate-500 text-center mb-2">Java 17 기본</div>
              <ul className="text-sm space-y-1 text-slate-700">
                <li>• Heap을 작은 Region으로 분할</li>
                <li>• 쓰레기 많은 곳부터 청소 (Garbage-First)</li>
                <li>• 정지 시간: 수십ms ~ 수백ms</li>
                <li>• <b>범용 서버에 적합</b></li>
              </ul>
              {/* 시각: Region 그리드 */}
              <div className="mt-3 grid grid-cols-4 gap-1">
                {Array(16).fill(0).map((_, i) => (
                  <div key={i} className={`h-4 rounded text-center text-[8px] leading-4 ${
                    [2,5,9,13].includes(i) ? 'bg-rose-300' : [0,3,7,11].includes(i) ? 'bg-emerald-300' : 'bg-slate-200'
                  }`}>{[2,5,9,13].includes(i) ? 'GC' : ''}</div>
                ))}
              </div>
              <div className="text-[10px] text-slate-400 mt-1 text-center">빨간 Region부터 우선 청소</div>
            </div>

            <div className={`p-4 rounded-xl border-2 transition-all duration-500 ${
              !isG1 ? 'bg-sky-100 border-sky-400 ring-2 ring-sky-300 shadow-lg' : 'bg-white border-slate-200'
            }`}>
              <div className="text-xl mb-1 text-center">⚡</div>
              <div className="font-bold text-center text-sky-800">ZGC</div>
              <div className="text-xs text-slate-500 text-center mb-2">초저지연 GC</div>
              <ul className="text-sm space-y-1 text-slate-700">
                <li>• 수백 GB Heap에서도 동작</li>
                <li>• 정지 시간: <b>1ms 이하</b></li>
                <li>• 대부분 작업을 앱과 동시에 수행</li>
                <li>• <b>대규모 실시간 서비스에 적합</b></li>
              </ul>
              <div className="mt-3 bg-sky-50 p-2 rounded border border-sky-200 text-center">
                <div className="text-xs text-sky-700">정지 시간 비교</div>
                <div className="flex items-end gap-2 justify-center mt-1">
                  <div className="flex flex-col items-center">
                    <div className="w-8 bg-emerald-400 rounded-t" style={{height: '40px'}}></div>
                    <span className="text-[9px] mt-1">G1GC</span>
                  </div>
                  <div className="flex flex-col items-center">
                    <div className="w-8 bg-sky-400 rounded-t" style={{height: '4px'}}></div>
                    <span className="text-[9px] mt-1">ZGC</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div className="bg-slate-800 text-slate-200 p-3 rounded-lg text-sm text-center">
            <span className="text-amber-400 font-bold">실무 팁:</span> Spring Boot 서버가 간헐적으로 느려지면 GC 로그부터 확인하라
          </div>
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <div className="flex justify-between items-center text-sm">
              <a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a>
              <span className="text-slate-400">Chapter II-1-2</span>
            </div>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div>
                <h1 className="text-2xl font-bold">GC(가비지 컬렉션)와 성능</h1>
                <span className="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full">★★☆</span>
              </div>
              <p className="text-slate-600">GC가 메모리를 어떻게 관리하는지, <b>Stop-The-World</b>란 무엇인지, <b>G1GC vs ZGC</b> 차이를 체험합니다.</p>
            </header>
            <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[280px] flex items-center justify-center">
              <div className="w-full"><GCVisual phase={stepData.phase} /></div>
            </div>
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length} — {stepData.label}</div>
            </div>
            <div className="flex justify-center gap-2">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                  className={`w-3 h-3 rounded-full transition-all ${i === currentStepIdx ? 'bg-green-700 scale-125' : 'bg-slate-300 hover:bg-slate-400'}`} />
              ))}
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
