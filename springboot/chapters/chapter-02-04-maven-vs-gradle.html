<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter II-2-2 — Maven과 Gradle 비교</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter II-2-2 — Maven(종이 매뉴얼) vs Gradle(태블릿) 비교 시각화 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { id: 'intro', label: '① 두 가지 선택지',
        desc: '[STEP 1 — 개요] Java 빌드 도구의 양대 산맥: Maven(2004년)과 Gradle(2012년). 둘 다 의존성 관리와 빌드 자동화를 해주지만 방식이 다르다.',
        focus: 'both' },
      { id: 'maven', label: '② Maven (pom.xml)',
        desc: '[STEP 2 — Maven] 2004년 등장. 모든 설정을 pom.xml(XML 형식)에 작성한다. 사람이 읽기는 쉽지만 같은 내용을 반복해서 써야 하는 경우가 많고 길어진다. 10년 이상 쌓인 레퍼런스가 풍부하다.',
        focus: 'maven' },
      { id: 'gradle', label: '③ Gradle (build.gradle)',
        desc: '[STEP 3 — Gradle] 2012년 등장. Groovy 또는 Kotlin DSL로 설정 파일을 작성한다. 코드량이 적고 읽기 쉬우며, 조건에 따라 빌드 흐름을 바꾸는 것도 자유롭다.',
        focus: 'gradle' },
      { id: 'speed', label: '④ 속도 비교',
        desc: '[STEP 4 — 성능] Gradle은 증분 빌드(변경된 파일만 다시 빌드)와 빌드 캐시(이전 결과 재사용)를 지원한다. 수백 개 파일 중 하나만 바꿔도 전부 다시 빌드해야 하는 Maven과 달리 Gradle은 변경된 부분만 처리한다.',
        focus: 'speed' },
      { id: 'choice', label: '⑤ 무엇을 선택할까',
        desc: '[STEP 5 — 결론] 2026년 기준 Spring Initializr에서 Gradle(Kotlin DSL) 선택 비율이 높아지는 추세다. 새 프로젝트를 시작한다면 Gradle Kotlin DSL이 권장 방향이다.',
        focus: 'choice' },
    ];

    const MAVEN_CODE = [
      '<!-- pom.xml -->',
      '<dependencies>',
      '  <dependency>',
      '    <groupId>',
      '      org.springframework.boot</groupId>',
      '    <artifactId>',
      '      spring-boot-starter-web</artifactId>',
      '  </dependency>',
      '  <dependency>',
      '    <groupId>',
      '      org.springframework.boot</groupId>',
      '    <artifactId>',
      '      spring-boot-starter-data-jpa</artifactId>',
      '  </dependency>',
      '</dependencies>',
    ];

    const GRADLE_CODE = [
      '// build.gradle.kts',
      'dependencies {',
      '  implementation(',
      '    "org.springframework.boot:',
      '      spring-boot-starter-web"',
      '  )',
      '  implementation(',
      '    "org.springframework.boot:',
      '      spring-boot-starter-data-jpa"',
      '  )',
      '}',
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const showMaven = ['both', 'maven', 'speed', 'choice'].includes(stepData.focus);
      const showGradle = ['both', 'gradle', 'speed', 'choice'].includes(stepData.focus);
      const highlightMaven = stepData.focus === 'maven';
      const highlightGradle = stepData.focus === 'gradle';

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <div className="flex justify-between items-center text-sm">
              <a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a>
              <span className="text-slate-400">Chapter II-2-2</span>
            </div>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div>
                <h1 className="text-2xl font-bold">Maven과 Gradle 비교</h1>
                <span className="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full">★★☆</span>
              </div>
              <p className="text-slate-600"><b>종이 매뉴얼(pom.xml)</b> vs <b>태블릿 레시피(build.gradle)</b> — 두 빌드 도구의 차이를 비교합니다.</p>
            </header>
            <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              {/* 코드 비교 */}
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div className={`rounded-xl border-2 transition-all duration-500 overflow-hidden ${
                  highlightMaven ? 'border-rose-400 ring-2 ring-rose-300 shadow-lg' : showMaven ? 'border-slate-300' : 'border-slate-200 opacity-30'
                }`}>
                  <div className="bg-rose-50 px-4 py-2 border-b border-rose-200 flex items-center gap-2">
                    <span className="text-lg">📄</span>
                    <span className="font-bold text-rose-800 text-sm">Maven</span>
                    <span className="text-xs text-rose-600">pom.xml · XML · 2004</span>
                  </div>
                  <div className="bg-slate-900 p-3 text-xs font-mono text-slate-300 leading-relaxed">
                    {MAVEN_CODE.map((line, i) => <div key={i}>{line}</div>)}
                  </div>
                  {highlightMaven && (
                    <div className="p-3 bg-rose-50 text-xs text-rose-700">📄 종이 매뉴얼: 상세하지만 반복이 많고 길다</div>
                  )}
                </div>

                <div className={`rounded-xl border-2 transition-all duration-500 overflow-hidden ${
                  highlightGradle ? 'border-emerald-400 ring-2 ring-emerald-300 shadow-lg' : showGradle ? 'border-slate-300' : 'border-slate-200 opacity-30'
                }`}>
                  <div className="bg-emerald-50 px-4 py-2 border-b border-emerald-200 flex items-center gap-2">
                    <span className="text-lg">📱</span>
                    <span className="font-bold text-emerald-800 text-sm">Gradle</span>
                    <span className="text-xs text-emerald-600">build.gradle.kts · Kotlin DSL · 2012</span>
                  </div>
                  <div className="bg-slate-900 p-3 text-xs font-mono text-slate-300 leading-relaxed">
                    {GRADLE_CODE.map((line, i) => <div key={i}>{line}</div>)}
                  </div>
                  {highlightGradle && (
                    <div className="p-3 bg-emerald-50 text-xs text-emerald-700">📱 태블릿: 간결하고 조건 분기도 자유롭다</div>
                  )}
                </div>
              </div>

              {/* 속도 비교 */}
              {stepData.focus === 'speed' && (
                <div className="mt-4 space-y-3">
                  <div className="text-xs font-bold text-slate-500 uppercase tracking-widest">빌드 속도 비교</div>
                  <div className="space-y-2">
                    <div>
                      <div className="flex justify-between text-xs mb-1"><span className="text-rose-700">Maven (전체 빌드)</span><span>100%</span></div>
                      <div className="h-5 bg-rose-200 rounded-full overflow-hidden"><div className="h-full bg-rose-500 rounded-full" style={{width: '100%'}}></div></div>
                    </div>
                    <div>
                      <div className="flex justify-between text-xs mb-1"><span className="text-emerald-700">Gradle (증분 빌드 + 캐시)</span><span>~30%</span></div>
                      <div className="h-5 bg-emerald-200 rounded-full overflow-hidden"><div className="h-full bg-emerald-500 rounded-full" style={{width: '30%'}}></div></div>
                    </div>
                  </div>
                  <div className="text-xs text-slate-500">변경된 파일만 다시 빌드 + 이전 결과 재사용</div>
                </div>
              )}

              {/* 결론 */}
              {stepData.focus === 'choice' && (
                <div className="mt-4 bg-slate-800 text-slate-200 p-4 rounded-lg text-center">
                  <div className="text-lg font-bold text-emerald-400 mb-1">2026년 권장: Gradle Kotlin DSL</div>
                  <div className="text-sm text-slate-400">Spring Initializr 기본 선택 · 간결 · 빠름 · 유연</div>
                </div>
              )}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length} — {stepData.label}</div>
            </div>
            <div className="flex justify-center gap-2">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                  className={`w-3 h-3 rounded-full transition-all ${i === currentStepIdx ? 'bg-green-700 scale-125' : 'bg-slate-300 hover:bg-slate-400'}`} />
              ))}
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
