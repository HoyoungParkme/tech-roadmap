<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>VIII-2-3 — 자동 구성 디버깅</title><script src="https://cdn.tailwindcss.com"></script><script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script><script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script></head>
<body><div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const STEPS=[
  {id:'flag',label:'① --debug 플래그',desc:'[STEP 1] java -jar app.jar --debug 또는 application.properties에 debug=true. 서버 시작 시 ConditionEvaluationReport가 콘솔에 출력된다.',p:'flag'},
  {id:'positive',label:'② Positive matches (등록됨)',desc:'[STEP 2] 조건이 충족되어 등록된 자동 구성 목록. "DataSourceAutoConfiguration matched" — H2 드라이버가 있어서 활성화됐다.',p:'positive'},
  {id:'negative',label:'③ Negative matches (미등록)',desc:'[STEP 3] 조건 불충족으로 미등록된 목록 + 이유. "RedisAutoConfiguration did not match: @ConditionalOnClass did not find required class" — Redis 드라이버가 없으니 비활성.',p:'negative'},
  {id:'trouble',label:'④ 트러블슈팅 패턴',desc:'[STEP 4] "내 Bean이 무시됐다" → Negative matches에서 이유 확인. "원치 않는 Bean이 등록됐다" → Positive matches에서 어떤 조건으로 등록됐는지 확인.',p:'trouble'},
  {id:'exclude',label:'⑤ 자동 구성 제외',desc:'[STEP 5] @SpringBootApplication(exclude = DataSourceAutoConfiguration.class)로 특정 자동 구성을 명시적으로 끌 수 있다. DB 없이 웹 서버만 띄울 때 유용하다.',p:'exclude'},
];
function V({p}){
  if(p==='flag')return(<div className="max-w-md mx-auto space-y-3"><div className="bg-slate-900 p-4 rounded-xl text-sm font-mono"><div className="text-emerald-400">$ java -jar app.jar <span className="text-amber-400">--debug</span></div></div><div className="bg-slate-900 p-3 rounded-xl text-xs font-mono text-slate-300"><div className="text-slate-500"># 또는 application.properties</div><div>debug=<span className="text-amber-400">true</span></div></div></div>);
  if(p==='positive')return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div className="text-emerald-400 font-bold mb-2">====== Positive matches ======</div><div className="text-emerald-300">DataSourceAutoConfiguration</div><div className="text-slate-500">{'  '}matched:</div><div className="text-slate-400">{'    '}@ConditionalOnClass found</div><div className="text-slate-400">{'    '}required class 'javax.sql.DataSource'</div><div className="mt-2 text-emerald-300">WebMvcAutoConfiguration</div><div className="text-slate-500">{'  '}matched:</div><div className="text-slate-400">{'    '}@ConditionalOnClass found 'Servlet'</div></div>);
  if(p==='negative')return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div className="text-rose-400 font-bold mb-2">====== Negative matches ======</div><div className="text-rose-300">RedisAutoConfiguration</div><div className="text-slate-500">{'  '}did not match:</div><div className="text-slate-400">{'    '}@ConditionalOnClass did not find</div><div className="text-slate-400">{'    '}required class 'RedisConnectionFactory'</div><div className="mt-2 text-rose-300">MongoAutoConfiguration</div><div className="text-slate-500">{'  '}did not match:</div><div className="text-slate-400">{'    '}@ConditionalOnClass did not find 'MongoClient'</div></div>);
  if(p==='trouble')return(<div className="max-w-md mx-auto grid grid-cols-1 gap-3">{[{q:'내 Bean이 무시됐다',a:'Negative matches에서 이유 확인',icon:'🔍'},{q:'원치 않는 Bean이 등록됐다',a:'Positive matches에서 조건 확인',icon:'⚠️'},{q:'설정이 안 먹힌다',a:'우선순위 확인 (VIII-1-4)',icon:'⚙️'}].map(x=>(<div key={x.q} className="flex items-center gap-3 px-4 py-3 rounded-lg bg-amber-50 border border-amber-200"><span className="text-xl">{x.icon}</span><div><div className="font-bold text-sm text-amber-800">{x.q}</div><div className="text-xs text-amber-600">{x.a}</div></div></div>))}</div>);
  return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div><span className="text-yellow-300">@SpringBootApplication</span>(</div><div>{'  '}exclude = DataSourceAutoConfiguration.<span className="text-pink-400">class</span></div><div>)</div><div className="mt-2 text-slate-500">// DB 없이 웹 서버만 띄울 때</div></div>);
}
function App(){const[idx,setIdx]=useState(0);const[playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
return(<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6"><div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter VIII-2-3</span></div><header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">자동 구성 디버깅 — --debug</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600"><b>Positive/Negative matches</b>로 Bean 등록/미등록 이유를 추적합니다.</p></header><div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div><div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[260px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div><div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2"><button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button><button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button><button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button></div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1}/{STEPS.length} — {step.label}</div></div><div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div></div></div>);}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
