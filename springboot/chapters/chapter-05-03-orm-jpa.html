          ],
        },
        dbTable: {

            { name: 'id', type: 'BIGINT', key: 'pk' },
            { name: 'name', type: 'VARCHAR(50)' },
            { name: 'email', type: 'VARCHAR(100)' },
          ],
        },
        mapping: { mode: 'annotation', label: '@Entity / @Id 한 줄로 매핑 완료' },
        keyPoint: '@Entity + @Id 두 개만으로 객체 ↔ 테이블 매핑 끝. 나머지는 Hibernate가 알아서 한다.',
        code: {
          lang: 'java',
          filename: 'entity-id.java',
          lines: [
            '// Step 5. @Entity + @Id — 가장 작은 JPA 엔티티',

            '',
            'package com.example.demo.user;',
            '',
            'import jakarta.persistence.Entity;',
            'import jakarta.persistence.GeneratedValue;',
            'import jakarta.persistence.GenerationType;',
            'import jakarta.persistence.Id;',
            'import jakarta.persistence.Column;',
            '',
            '/**',
            ' * users 테이블과 매핑되는 JPA 엔티티.',

            'public class User {',
            '',
            '    @Id                                  // (2) 기본키(PK)',

            '',

            '// (b) 컬럼명을 명시하고 싶다',
            '//    @Column(name = "user_email", length = 100)',
            '//    private String email;',
            '',
            '// (c) ID 생성 전략',
            '//    AUTO     - 구현체에 위임 (기본)',
            '//    IDENTITY - DB AUTO_INCREMENT (MySQL 권장)',
            '//    SEQUENCE - DB 시퀀스 사용 (Postgres/Oracle 권장)',

            '//   //     [Alice, a@x.com]',

            '//  - @Column  : 필드   = 컬럼 (옵션)',
            '//  - 이게 JPA 매핑의 90%. 나머지는 다음 챕터(Repository, 연관관계).',
          ],
          highlight: [16, 17, 19, 20, 21, 23, 24, 26, 27, 30, 32, 33, 34, 35, 38, 39, 40, 41, 56, 57, 58, 59, 60, 64, 65, 66, 67, 68, 69, 70, 71, 73, 74, 75, 76],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // JavaObjectCard — 좌측: Java 객체(클래스) 카드
    //   className 위에 애노테이션, 필드 옆에 @Id 등 강조
    // ─────────────────────────────────────────────────────
    function JavaObjectCard({ obj, highlight }) {
      return (
        <div className="bg-white rounded-lg border-2 border-lime-300 overflow-hidden shadow-sm">
          <div className="bg-lime-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-lime-800 flex items-center justify-between">
            <span>☕ Java 객체</span>
            <span className="text-[9px] font-mono text-lime-600">class</span>
          </div>
          <div className="p-3 font-mono text-[11px] space-y-1">
            {obj.annotations && obj.annotations.map((a) => (
              <div key={a} className="text-amber-600 font-bold">{a}</div>
            ))}
            <div>
              <span className="text-pink-600">public class </span>
              <span className="text-cyan-700 font-bold">{obj.className}</span>
              <span className="text-slate-500"> &#123;</span>
            </div>
            {obj.fields.map((f, i) => (
              <div key={i} className="pl-3 space-y-0.5">
                {f.annotations && f.annotations.map((a) => (
                  <div key={a} className="text-amber-600 font-semibold text-[10px]">{a}</div>
                ))}
                <div className="flex items-center gap-1">
                  <span className="text-pink-600">private </span>
                  <span className="text-violet-700">{f.type}</span>
                  <span className="text-slate-800"> {f.name}</span>
                  <span className="text-slate-500">;</span>
                  {f.key === 'pk' && (
                    <span className="ml-auto text-[8px] font-bold px-1.5 py-0.5 rounded bg-amber-100 text-amber-800 border border-amber-300">PK</span>
                  )}
                </div>
              </div>
            ))}
            <div className="text-slate-500">&#125;</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // DbTableCard — 우측: RDBMS 테이블 카드
    //   상단에 테이블명, 본체에 컬럼 목록 (이름 / 타입 / PK 배지)
    // ─────────────────────────────────────────────────────
    function DbTableCard({ table }) {
      return (
        <div className="bg-white rounded-lg border-2 border-emerald-300 overflow-hidden shadow-sm">
          <div className="bg-emerald-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-emerald-800 flex items-center justify-between">
            <span>🗄️ RDBMS 테이블</span>
            <span className="text-[9px] font-mono text-emerald-600">table</span>
          </div>
          <div className="p-3 font-mono text-[11px]">
            <div className="text-emerald-800 font-bold mb-1.5">
              TABLE <span className="underline">{table.tableName}</span>
            </div>
            <div className="border border-emerald-200 rounded overflow-hidden">
              <div className="grid grid-cols-[1fr_auto_auto] gap-2 bg-emerald-50 px-2 py-1 text-[9px] uppercase font-bold text-emerald-700 tracking-wider">
                <span>column</span>
                <span>type</span>
                <span>key</span>
              </div>
              {table.columns.map((c, i) => (
                <div key={i} className={`grid grid-cols-[1fr_auto_auto] gap-2 px-2 py-1 ${i % 2 ? 'bg-white' : 'bg-emerald-50/30'} border-t border-emerald-100 items-center`}>
                  <span className="text-slate-800">{c.name}</span>
                  <span className="text-violet-700 text-[10px]">{c.type}</span>
                  <span>
                    {c.key === 'pk' ? (
                      <span className="text-[8px] font-bold px-1.5 py-0.5 rounded bg-amber-100 text-amber-800 border border-amber-300">PK</span>
                    ) : (
                      <span className="text-slate-300">·</span>
                    )}
                  </span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // MappingArrow — 가운데 매핑 화살표
    //   mode 별로 색상/라벨 다름 (manual/auto/spec/impl/annotation)
    // ─────────────────────────────────────────────────────
    function MappingArrow({ mapping }) {
      const styleMap = {
        manual:     { bg: 'bg-rose-100',    border: 'border-rose-300',    text: 'text-rose-700',    badge: '👤 manual'   },
        auto:       { bg: 'bg-lime-100',    border: 'border-lime-400',    text: 'text-lime-800',    badge: '⚙️ ORM'       },
        spec:       { bg: 'bg-violet-100',  border: 'border-violet-400',  text: 'text-violet-800',  badge: '📜 JPA spec' },
        impl:       { bg: 'bg-emerald-100', border: 'border-emerald-400', text: 'text-emerald-800', badge: '🔧 Hibernate'},
        annotation: { bg: 'bg-amber-100',   border: 'border-amber-400',   text: 'text-amber-800',   badge: '🏷️ @Entity'   },
      };
      const s = styleMap[mapping.mode] || styleMap.auto;
      return (
        <div className="my-2 flex items-center justify-center">
          <div className={`w-full ${s.bg} ${s.border} ${s.text} border-2 rounded-lg px-3 py-2 flex items-center justify-between gap-3`}>
            <span className="text-2xl">←</span>
            <div className="flex flex-col items-center text-center flex-1">
              <span className="text-[9px] font-bold uppercase tracking-wider">{s.badge}</span>
              <span className="text-[11px] font-medium leading-tight mt-0.5">{mapping.label}</span>
            </div>
            <span className="text-2xl">→</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    //   상단: 좌(Java 객체) / 우(RDBMS 테이블) 2 컬럼
    //   가운데: ORM 매핑 화살표
    //   하단: 핵심 포인트 박스 + 범례
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🔄 Java 객체 ↔ RDBMS 테이블 매핑</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 좌(Java) / 우(DB) 2-pane */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            <JavaObjectCard obj={step.javaObject} />
            <DbTableCard table={step.dbTable} />
          </div>

          {/* 가운데 매핑 화살표 */}
          <MappingArrow mapping={step.mapping} />

          {/* 핵심 포인트 박스 */}
          <div className="mt-2 bg-lime-50 border-l-4 border-lime-500 px-3 py-2 rounded-r">
            <div className="text-[9px] font-bold text-lime-700 uppercase tracking-wider mb-0.5">핵심 포인트</div>
            <p className="text-[11px] text-lime-900 leading-snug">{step.keyPoint}</p>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-400"></span>manual
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-lime-500"></span>ORM auto
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-violet-500"></span>JPA spec
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>Hibernate
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-500"></span>@annotation
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   파일명 탭 + 윈도우 dot + 라인 번호 + 강조 라인
    //   상단에 5개 파일 탭 (Step 별 1개씩) — 선택은 STEP 이동으로
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total, onSelectTab, allFiles }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 5개 */}
          <div className="bg-[#21252b] px-3 py-2 flex items-center gap-2 border-b border-slate-700 flex-wrap">
            <div className="flex gap-1.5 mr-1">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            {allFiles.map((f, i) => (
              <button
                key={f.filename}
                onClick={() => onSelectTab(i)}
                className={`text-[10px] font-mono px-2 py-1 rounded-t border-b-2 transition ${
                  i === stepIdx
                    ? 'bg-[#282c34] text-lime-300 border-lime-400'
                    : 'text-slate-400 border-transparent hover:text-slate-200 hover:bg-slate-800'
                }`}
              >
                {f.filename}
              </button>
            ))}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[44rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-lime-500/15 border-l-2 border-lime-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    //   - 파일 탭 클릭 = 해당 step 으로 이동
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];
      const allFiles = STEPS.map((s) => ({ filename: s.code.filename }));

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      const handleSelectTab = (i) => {
        setStepIdx(i);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; 챕터 목록</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter V-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-lime-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. 데이터 계층 &gt; Chapter 2. ORM과 JPA</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">V-2-1. ORM 개념 + JPA 소개</h1>
                  <p className="text-sm text-slate-500 mt-0.5">SQL 직접 작성의 한계 → ORM/JPA/Hibernate → @Entity 한 줄 매핑</p>
                </div>
                <span className="ml-auto text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full font-bold">★★★</span>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                code={step.code}
                stepIdx={stepIdx}
                total={STEPS.length}
                onSelectTab={handleSelectTab}
                allFiles={allFiles}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-400 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: <strong>JPA = 표준 인터페이스</strong>, <strong>Hibernate = 실제 구현체</strong>. 그리고 우리가 직접 다루는 건 <strong>@Entity / @Id</strong> 단 두 줄뿐. 다음 챕터(V-2-2)에서는 <strong>JpaRepository</strong>로 CRUD를 한 줄로 줄여본다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['JDBC', 'ORM', 'JPA', 'Hibernate', 'Jakarta Persistence', '@Entity', '@Id', '@Column', 'EntityManager'].map((kw) => (
                <span key={kw} className="bg-lime-50 text-lime-700 px-3 py-1 rounded-full text-xs font-medium border border-lime-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-05-02-dto-response.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; V-1-2 DTO와 응답 구조</a>
              <a href="./chapter-05-04-jpa-repository.html" className="text-lime-700 hover:text-lime-900 font-medium">V-2-2 JpaRepository &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
