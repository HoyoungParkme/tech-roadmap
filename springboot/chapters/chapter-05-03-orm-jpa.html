<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter V-2-1 — ORM 개념과 JPA 소개</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'problem', label:'① SQL 직접 작성의 한계', desc:'[STEP 1] JDBC로 SQL을 직접 쓰면 반복 코드가 많고, 테이블 구조가 바뀔 때마다 SQL을 수정해야 한다. Java 객체와 DB 테이블 사이에 변환 코드를 매번 직접 작성해야 한다.', p:'problem' },
      { id:'orm', label:'② ORM이란', desc:'[STEP 2] ORM(Object-Relational Mapping) = Java 객체와 DB 테이블을 자동으로 매핑하는 기술. Java 클래스 필드가 곧 DB 컬럼이 된다. SQL을 직접 쓰지 않아도 객체 조작만으로 DB를 다룰 수 있다.', p:'orm' },
      { id:'jpa', label:'③ JPA = 표준 인터페이스', desc:'[STEP 3] JPA(Jakarta Persistence API)는 ORM의 표준 규약이다. "이렇게 만들면 ORM이 동작한다"는 인터페이스만 정의한다. 실제 구현은 Hibernate(하이버네이트)가 담당한다.', p:'jpa' },
      { id:'entity', label:'④ @Entity 선언', desc:'[STEP 4] Java 클래스에 @Entity를 붙이면 JPA가 이 클래스를 DB 테이블과 매핑한다. @Id는 기본키, @Column은 컬럼을 나타낸다. 클래스명이 테이블명, 필드명이 컬럼명이 된다.', p:'entity' },
      { id:'why', label:'⑤ 왜 JPA인가', desc:'[STEP 5] JPA를 쓰면 DB 종류가 바뀌어도(MySQL→PostgreSQL) Java 코드를 수정하지 않아도 된다. SQL 작성 시간이 줄고 객체지향적으로 데이터를 다룰 수 있다.', p:'why' },
    ];
    function V({ p }) {
      if (p==='problem') return (
        <div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300">
          <div className="text-slate-500">// JDBC — 반복적인 SQL + 변환 코드</div>
          <div>String sql = <span className="text-emerald-400">"SELECT * FROM users WHERE id=?"</span>;</div>
          <div>PreparedStatement ps = conn.prepareStatement(sql);</div>
          <div>ps.setLong(1, id);</div>
          <div>ResultSet rs = ps.executeQuery();</div>
          <div><span className="text-rose-400">// 매 컬럼마다 수동 변환...</span></div>
          <div>User user = <span className="text-pink-400">new</span> User(rs.getLong(<span className="text-emerald-400">"id"</span>), ...);</div>
        </div>
      );
      if (p==='orm') return (
        <div className="max-w-lg mx-auto flex items-center gap-4 flex-wrap justify-center">
          <div className="bg-sky-50 p-4 rounded-xl border border-sky-200 text-center"><div className="text-2xl mb-1">☕</div><div className="font-bold text-sm text-sky-800">Java 객체</div><div className="text-xs text-sky-600">User.class</div></div>
          <div className="text-center"><div className="text-2xl">🔄</div><div className="text-xs text-emerald-600 font-bold">ORM 자동 매핑</div></div>
          <div className="bg-amber-50 p-4 rounded-xl border border-amber-200 text-center"><div className="text-2xl mb-1">🗄️</div><div className="font-bold text-sm text-amber-800">DB 테이블</div><div className="text-xs text-amber-600">users 테이블</div></div>
        </div>
      );
      if (p==='jpa') return (
        <div className="max-w-md mx-auto space-y-2">
          <div className="bg-violet-50 p-3 rounded-xl border border-violet-200 text-center"><div className="font-bold text-violet-800">JPA (Jakarta Persistence API)</div><div className="text-xs text-violet-600">표준 인터페이스 (규약)</div></div>
          <div className="flex justify-center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg></div>
          <div className="bg-emerald-50 p-3 rounded-xl border-2 border-emerald-400 text-center"><div className="font-bold text-emerald-800">Hibernate</div><div className="text-xs text-emerald-600">실제 구현체 (SQL 자동 생성)</div></div>
        </div>
      );
      if (p==='entity') return (
        <div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300">
          <div><span className="text-yellow-300">@Entity</span></div>
          <div><span className="text-pink-400">public class</span> <span className="text-cyan-400">User</span> {'{'}</div>
          <div>{'    '}<span className="text-yellow-300">@Id</span> <span className="text-yellow-300">@GeneratedValue</span></div>
          <div>{'    '}<span className="text-pink-400">private</span> Long id; <span className="text-slate-500">// → id 컬럼 (PK)</span></div>
          <div>{'    '}<span className="text-pink-400">private</span> String name; <span className="text-slate-500">// → name 컬럼</span></div>
          <div>{'    '}<span className="text-pink-400">private</span> String email; <span className="text-slate-500">// → email 컬럼</span></div>
          <div>{'}'}</div>
        </div>
      );
      return (
        <div className="max-w-md mx-auto bg-slate-800 p-5 rounded-xl text-center">
          <div className="text-emerald-400 font-bold text-lg mb-2">DB가 바뀌어도 Java 코드는 그대로</div>
          <div className="text-slate-400 text-sm">MySQL → PostgreSQL 전환 시 설정 파일만 변경</div>
        </div>
      );
    }
    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter V-2-1</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">ORM 개념과 JPA 소개</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600">Java 객체와 DB 테이블을 <b>자동으로 매핑하는 ORM/JPA</b>의 핵심을 체험합니다.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[240px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
