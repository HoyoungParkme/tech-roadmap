<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>VIII-1-4 — 프로파일과 설정 우선순위</title><script src="https://cdn.tailwindcss.com"></script><script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script><script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script></head>
<body><div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const STEPS=[
  {id:'what',label:'① 프로파일이란',desc:'[STEP 1] 개발(dev)/운영(prod) 환경마다 DB 주소, 로그 레벨이 다르다. Spring Profiles로 환경별 설정 파일을 분리하고 실행 시 어떤 프로파일을 활성화할지 지정한다.',p:'what'},
  {id:'files',label:'② 파일 분리',desc:'[STEP 2] application-dev.yml(H2 DB, DEBUG 로그), application-prod.yml(MySQL DB, INFO 로그). 공통 설정은 application.yml에, 환경별 차이만 프로파일 파일에 둔다.',p:'files'},
  {id:'activate',label:'③ 활성화 방법 3가지',desc:'[STEP 3] CLI: --spring.profiles.active=prod. 환경변수: SPRING_PROFILES_ACTIVE=prod. yml: spring.profiles.active: dev.',p:'activate'},
  {id:'priority',label:'④ 설정 우선순위',desc:'[STEP 4] 환경변수 > 커맨드라인 > 프로파일 파일 > 기본 파일. 같은 키가 여러 곳에 있으면 우선순위가 높은 쪽이 이긴다.',p:'priority'},
  {id:'tip',label:'⑤ 실무 팁',desc:'[STEP 5] 비밀번호는 설정 파일에 넣지 말고 환경변수로 주입. CI/CD에서 자동 처리하는 것이 관례다.',p:'tip'},
];
function V({p}){
  if(p==='what')return(<div className="max-w-md mx-auto grid grid-cols-2 gap-3"><div className="bg-sky-50 p-4 rounded-xl border border-sky-200 text-center"><div className="text-2xl mb-1">🛠</div><div className="font-bold text-sky-800">dev</div><div className="text-xs text-sky-600">H2 DB, DEBUG</div></div><div className="bg-rose-50 p-4 rounded-xl border border-rose-200 text-center"><div className="text-2xl mb-1">🚀</div><div className="font-bold text-rose-800">prod</div><div className="text-xs text-rose-600">MySQL, INFO</div></div></div>);
  if(p==='files')return(<div className="max-w-md mx-auto space-y-2">{[{f:'application.yml',d:'공통'},{f:'application-dev.yml',d:'H2, DEBUG'},{f:'application-prod.yml',d:'MySQL, INFO'}].map(x=>(<div key={x.f} className="flex items-center gap-3 px-4 py-2 rounded-lg bg-white border border-slate-200"><span>📄</span><span className="font-mono text-sm font-bold">{x.f}</span><span className="text-xs text-slate-500 ml-auto">{x.d}</span></div>))}</div>);
  if(p==='activate')return(<div className="max-w-md mx-auto space-y-2">{[{m:'CLI',c:'java -jar app.jar --spring.profiles.active=prod'},{m:'ENV',c:'export SPRING_PROFILES_ACTIVE=prod'},{m:'YML',c:'spring.profiles.active: dev'}].map(x=>(<div key={x.m} className="bg-slate-900 p-3 rounded-lg text-xs font-mono text-slate-300"><span className="text-amber-400">#{x.m}: </span>{x.c}</div>))}</div>);
  if(p==='priority')return(<div className="max-w-md mx-auto space-y-1">{[{s:'환경변수',r:1},{s:'커맨드라인',r:2},{s:'프로파일 파일',r:3},{s:'기본 파일',r:4}].map(x=>(<div key={x.r} className={`flex items-center gap-3 px-4 py-2 rounded-lg border ${x.r===1?'bg-emerald-100 border-emerald-400 shadow-lg font-bold':'bg-white border-slate-200'}`}><span className="w-6 h-6 rounded-full bg-emerald-500 text-white text-xs flex items-center justify-center font-bold">{x.r}</span><span className="text-sm">{x.s}</span></div>))}<div className="text-center text-xs text-slate-500 mt-2">1이 가장 높음</div></div>);
  return(<div className="max-w-md mx-auto bg-slate-800 p-5 rounded-xl text-center"><div className="text-emerald-400 font-bold text-lg mb-2">비밀번호 = 환경변수로 주입</div><div className="text-slate-400 text-sm">설정 파일에 넣지 마라</div></div>);
}
function App(){const[idx,setIdx]=useState(0);const[playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
return(<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6"><div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter VIII-1-4</span></div><header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">프로파일과 설정 우선순위</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600"><b>dev/prod 분리 · 활성화 · 우선순위</b>를 체험합니다.</p></header><div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div><div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[240px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div><div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2"><button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button><button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button><button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button></div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1}/{STEPS.length} — {step.label}</div></div><div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div></div></div>);}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
