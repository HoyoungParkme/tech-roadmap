<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>VIII-2-2 — @Conditional 조건부 빈 등록</title><script src="https://cdn.tailwindcss.com"></script><script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script><script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script></head>
<body><div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const STEPS=[
  {id:'why',label:'① 왜 조건부인가',desc:'[STEP 1] 자동 구성은 무조건 다 등록하지 않는다. 특정 조건이 만족될 때만 Bean을 등록한다. 이 조건 판단이 @Conditional 계열 애노테이션이다.',p:'why'},
  {id:'onclass',label:'② @ConditionalOnClass',desc:'[STEP 2] 클래스패스에 특정 클래스가 있을 때만 활성화. 예: @ConditionalOnClass(DataSource.class) — JDBC 드라이버가 있을 때만 DataSource 자동 구성.',p:'onclass'},
  {id:'onprop',label:'③ @ConditionalOnProperty',desc:'[STEP 3] 특정 설정값이 존재하거나 특정 값일 때만 활성화. 예: @ConditionalOnProperty(name="app.cache.enabled", havingValue="true") — cache 기능 ON/OFF.',p:'onprop'},
  {id:'onmissing',label:'④ @ConditionalOnMissingBean',desc:'[STEP 4] 사용자가 직접 등록한 Bean이 없을 때만 자동 구성이 동작. "사용자 설정 우선" 원칙. 직접 DataSource Bean을 만들면 자동 구성이 물러난다.',p:'onmissing'},
  {id:'h2',label:'⑤ H2 자동 연결 흐름',desc:'[STEP 5] H2 dependency 추가 → @ConditionalOnClass(DataSource.class) 통과 → @ConditionalOnMissingBean(DataSource.class) 통과 → 인메모리 DataSource 자동 생성. 이것이 "H2만 추가하면 DB가 되는" 이유다.',p:'h2'},
];
const CONDITIONS=[
  {name:'@ConditionalOnClass',desc:'클래스패스에 있을 때',ex:'DataSource.class',icon:'📦',color:'sky'},
  {name:'@ConditionalOnProperty',desc:'설정값이 맞을 때',ex:'app.cache.enabled=true',icon:'⚙️',color:'amber'},
  {name:'@ConditionalOnMissingBean',desc:'사용자 Bean이 없을 때',ex:'DataSource.class 없으면',icon:'🚫',color:'violet'},
  {name:'@ConditionalOnBean',desc:'특정 Bean이 있을 때',ex:'EntityManager.class 있으면',icon:'✅',color:'emerald'},
];
function V({p}){
  if(p==='why')return(<div className="max-w-md mx-auto text-center space-y-3"><div className="bg-amber-50 p-4 rounded-xl border border-amber-200"><div className="text-2xl mb-1">🤔</div><div className="text-sm">150개 자동 구성이 전부 활성화되면?</div><div className="text-xs text-rose-600 mt-1">충돌 + 불필요한 Bean 범람</div></div><div className="text-2xl">↓</div><div className="bg-emerald-50 p-4 rounded-xl border-2 border-emerald-400"><div className="text-2xl mb-1">🎯</div><div className="text-sm font-bold text-emerald-800">조건이 맞을 때만 활성화</div><div className="text-xs text-emerald-600">= @Conditional</div></div></div>);
  if(p==='onclass'||p==='onprop'||p==='onmissing')return(<div className="max-w-md mx-auto space-y-2">{CONDITIONS.map((c,i)=>{const active=(p==='onclass'&&i===0)||(p==='onprop'&&i===1)||(p==='onmissing'&&i===2);return(<div key={c.name} className={`flex items-center gap-3 px-4 py-3 rounded-lg border-2 transition-all ${active?'bg-emerald-100 border-emerald-400 ring-2 ring-emerald-300 shadow-lg scale-[1.02]':'bg-white border-slate-200 opacity-40'}`}><span className="text-xl">{c.icon}</span><div><div className="font-mono text-xs font-bold">{c.name}</div><div className="text-xs text-slate-500">{c.desc}</div>{active&&<div className="text-xs text-emerald-600 mt-1">예: {c.ex}</div>}</div></div>);})}</div>);
  return(<div className="max-w-md mx-auto space-y-1">{['H2 dependency 추가','@ConditionalOnClass(DataSource) ✓','@ConditionalOnMissingBean(DataSource) ✓','인메모리 DataSource 자동 생성!'].map((s,i)=>(<div key={i} className={`flex items-center gap-3 px-4 py-2 rounded-lg ${i===3?'bg-emerald-100 border-2 border-emerald-400 font-bold':'bg-white border border-slate-200'}`}><span className="w-6 h-6 rounded-full bg-emerald-500 text-white text-xs flex items-center justify-center font-bold">{i+1}</span><span className="text-sm">{s}</span></div>))}</div>);
}
function App(){const[idx,setIdx]=useState(0);const[playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
return(<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6"><div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter VIII-2-2</span></div><header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">@Conditional과 조건부 빈 등록</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600"><b>@ConditionalOnClass · OnProperty · OnMissingBean</b> — H2가 자동 연결되는 이유를 체험합니다.</p></header><div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div><div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[260px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div><div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2"><button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button><button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button><button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button></div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1}/{STEPS.length} — {step.label}</div></div><div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div></div></div>);}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
