<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter I-1-3 — JRE와 JDK</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter I-1-3 — JRE와 JDK: 포함 관계 다이어그램 시각화 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        id: 'jvm',
        label: '① JVM (핵심 엔진)',
        desc: '[STEP 1 — JVM] 가장 안쪽에 있는 것이 JVM이다. 바이트코드를 읽어 기계어로 변환하고 실행하는 핵심 엔진이다. JVM만으로는 Java 프로그램을 실행할 수 없다. 표준 라이브러리가 함께 있어야 한다.',
        highlight: ['jvm'],
      },
      {
        id: 'jre',
        label: '② JRE (실행 환경)',
        desc: '[STEP 2 — JRE] JRE(Java Runtime Environment)는 JVM + Java 표준 라이브러리(기본 도구 모음)를 포함한다. 이미 만들어진 Java 프로그램을 실행하기에 충분하다. 개발하지 않는 직원에게는 JRE만 있으면 된다.',
        highlight: ['jvm', 'jre'],
      },
      {
        id: 'jdk',
        label: '③ JDK (개발 도구)',
        desc: '[STEP 3 — JDK] JDK(Java Development Kit)는 JRE에 컴파일러(javac), 디버거, 개발 유틸리티를 추가한 패키지다. 코드를 작성하고 컴파일하는 개발자는 반드시 JDK를 설치해야 한다. 비유하면 JRE는 "음식을 먹을 수 있는 식당", JDK는 "음식을 직접 만들 수 있는 주방"이다.',
        highlight: ['jvm', 'jre', 'jdk'],
      },
      {
        id: 'version',
        label: '④ Java 버전과 LTS',
        desc: '[STEP 4 — 버전] Java는 버전이 다양하다. LTS(Long Term Support)는 오랫동안 보안 패치를 제공하는 버전이다. 2026년 기준 Spring Boot 3.x는 JDK 17 이상을 요구하며, JDK 21이 최신 LTS다.',
        highlight: ['jvm', 'jre', 'jdk', 'version'],
      },
      {
        id: 'distro',
        label: '⑤ JDK 배포판 선택',
        desc: '[STEP 5 — 배포판] Java는 OpenJDK라는 공개 소스를 기반으로 여러 회사가 각자 배포판을 만든다. Eclipse Temurin과 Amazon Corretto가 가장 널리 쓰이며 둘 다 무료다. 어느 배포판을 써도 Spring Boot 개발에는 문제없다.',
        highlight: ['jvm', 'jre', 'jdk', 'distro'],
      }
    ];

    function NestingDiagram({ highlight }) {
      const isActive = (id) => highlight.includes(id);

      return (
        <div className="flex flex-col items-center gap-4 w-full max-w-lg mx-auto">
          {/* JDK (가장 바깥) */}
          <div className={`w-full p-4 rounded-2xl border-4 transition-all duration-500 ${
            isActive('jdk') ? 'bg-violet-50 border-violet-400 ring-2 ring-violet-300 shadow-lg' : 'bg-slate-50 border-slate-200'
          }`}>
            <div className="flex items-center gap-2 mb-3">
              <span className="text-xl">🔧</span>
              <span className={`font-bold ${isActive('jdk') ? 'text-violet-800' : 'text-slate-400'}`}>JDK (Java Development Kit)</span>
              {isActive('jdk') && <span className="text-xs bg-violet-200 text-violet-700 px-2 py-0.5 rounded-full">개발자용</span>}
            </div>

            {/* JDK 전용 도구 */}
            {isActive('jdk') && (
              <div className="flex gap-2 mb-3 flex-wrap">
                {['javac (컴파일러)', 'jdb (디버거)', 'javadoc', 'jar'].map(tool => (
                  <span key={tool} className="text-xs bg-violet-100 text-violet-700 px-2 py-1 rounded border border-violet-200">{tool}</span>
                ))}
              </div>
            )}

            {/* JRE (중간) */}
            <div className={`w-full p-4 rounded-xl border-2 transition-all duration-500 ${
              isActive('jre') ? 'bg-sky-50 border-sky-400 ring-2 ring-sky-300 shadow-md' : 'bg-white border-slate-200'
            }`}>
              <div className="flex items-center gap-2 mb-3">
                <span className="text-xl">📦</span>
                <span className={`font-bold ${isActive('jre') ? 'text-sky-800' : 'text-slate-400'}`}>JRE (Java Runtime Environment)</span>
                {isActive('jre') && !isActive('jdk') && <span className="text-xs bg-sky-200 text-sky-700 px-2 py-0.5 rounded-full">실행만 가능</span>}
              </div>

              {/* Java 표준 라이브러리 */}
              {isActive('jre') && (
                <div className="flex gap-2 mb-3 flex-wrap">
                  {['java.lang', 'java.util', 'java.io', 'java.net'].map(lib => (
                    <span key={lib} className="text-xs bg-sky-100 text-sky-700 px-2 py-1 rounded border border-sky-200">{lib}</span>
                  ))}
                </div>
              )}

              {/* JVM (가장 안쪽) */}
              <div className={`w-full p-4 rounded-lg border-2 transition-all duration-500 ${
                isActive('jvm') ? 'bg-emerald-50 border-emerald-400 ring-2 ring-emerald-300 shadow' : 'bg-white border-slate-200'
              }`}>
                <div className="flex items-center gap-2">
                  <span className="text-xl">⚡</span>
                  <span className={`font-bold ${isActive('jvm') ? 'text-emerald-800' : 'text-slate-400'}`}>JVM (Java Virtual Machine)</span>
                </div>
                {isActive('jvm') && (
                  <div className="mt-2 text-sm text-emerald-700">
                    바이트코드 → 기계어 변환 · 메모리 관리 · GC · 보안
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* 비유 */}
          <div className="bg-amber-50 p-3 rounded-lg border border-amber-200 text-sm text-amber-800 w-full">
            <span className="font-bold">🍳 비유:</span>
            {' '}JRE = 완성된 음식을 먹을 수 있는 <b>식당</b> · JDK = 음식을 직접 만들 수 있는 <b>주방</b>
          </div>

          {/* 버전/배포판 정보 */}
          {isActive('version') && (
            <div className="w-full bg-slate-800 text-slate-200 p-4 rounded-lg text-sm">
              <div className="font-bold text-amber-400 mb-2">Java 버전 (LTS 기준)</div>
              <div className="grid grid-cols-3 gap-2">
                {[
                  { ver: 'Java 8', year: '2014', status: '레거시' },
                  { ver: 'Java 11', year: '2018', status: '유지보수' },
                  { ver: 'Java 17', year: '2021', status: 'Spring Boot 3 최소' },
                  { ver: 'Java 21', year: '2023', status: '최신 LTS ⭐' },
                ].map(v => (
                  <div key={v.ver} className={`p-2 rounded border ${v.ver === 'Java 21' ? 'border-emerald-500 bg-emerald-900/30' : 'border-slate-600'}`}>
                    <div className="font-bold">{v.ver}</div>
                    <div className="text-xs text-slate-400">{v.year}</div>
                    <div className="text-xs text-slate-300">{v.status}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {isActive('distro') && (
            <div className="w-full grid grid-cols-2 gap-3">
              {[
                { name: 'Eclipse Temurin', org: 'Adoptium', icon: '🌐' },
                { name: 'Amazon Corretto', org: 'AWS', icon: '📦' },
                { name: 'Oracle JDK', org: 'Oracle', icon: '🏢' },
                { name: 'Azul Zulu', org: 'Azul', icon: '🔵' },
              ].map(d => (
                <div key={d.name} className="bg-white p-3 rounded-lg border border-slate-200 text-center">
                  <div className="text-xl">{d.icon}</div>
                  <div className="font-semibold text-sm">{d.name}</div>
                  <div className="text-xs text-slate-500">{d.org}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3500); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <div className="flex justify-between items-center text-sm">
              <a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a>
              <span className="text-slate-400">Chapter I-1-3</span>
            </div>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div>
                <h1 className="text-2xl font-bold">JRE와 JDK — 무엇을 설치해야 하나</h1>
                <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">★☆☆</span>
              </div>
              <p className="text-slate-600">
                <b>JDK ⊃ JRE ⊃ JVM</b> 포함 관계를 시각적으로 이해하고,
                개발자에게 필요한 것이 무엇인지 파악합니다.
              </p>
            </header>

            <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <NestingDiagram highlight={stepData.highlight} />
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length} — {stepData.label}
              </div>
            </div>

            <div className="flex justify-center gap-2">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                  className={`w-3 h-3 rounded-full transition-all ${i === currentStepIdx ? 'bg-green-700 scale-125' : 'bg-slate-300 hover:bg-slate-400'}`} />
              ))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
