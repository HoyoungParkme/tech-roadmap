<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter III-3-1 — 첫 번째 REST 엔드포인트</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'analogy', label:'① 안내 데스크 비유', desc:'[STEP 1] Controller = 건물 안내 데스크 직원. 방문객(HTTP 요청)이 "3층 회의실 어디예요?"라고 물으면 정해진 응답을 돌려준다. 특정 URL로 들어온 요청을 받아서 정해진 응답을 보내는 것이 Controller의 역할이다.', hl:0 },
      { id:'class', label:'② @RestController', desc:'[STEP 2] @RestController는 "이 클래스가 HTTP 요청을 받아 응답 본문을 직접 반환한다"는 선언이다. 이 애노테이션 하나로 Spring이 이 클래스를 HTTP 처리기로 인식한다.', hl:0 },
      { id:'mapping', label:'③ @GetMapping', desc:'[STEP 3] @GetMapping("/hello")은 GET 방식으로 /hello 경로에 들어온 요청을 이 메서드에 연결하는 URL 매핑이다. 경로와 메서드를 연결하는 "지도" 역할을 한다.', hl:3 },
      { id:'json', label:'④ JSON 자동 변환', desc:'[STEP 4] String을 반환하면 텍스트 그대로 응답. Map이나 객체를 반환하면 Spring이 Jackson(자바→JSON 변환 라이브러리)으로 자동 변환한다. 별도 설정 불필요.', hl:5 },
      { id:'pattern', label:'⑤ 기본 패턴 완성', desc:'[STEP 5] 이 패턴 하나가 Spring Boot로 만드는 모든 API의 기본 뼈대다. 이 구조를 이해하면 이후 복잡한 엔드포인트도 같은 방식으로 확장할 수 있다.', hl:-1 },
    ];

    const CODE = [
      { text: '@RestController', type: 'annotation' },
      { text: 'public class HelloController {', type: 'code' },
      { text: '', type: 'empty' },
      { text: '    @GetMapping("/hello")', type: 'annotation' },
      { text: '    public String hello() {', type: 'code' },
      { text: '        return "Hello, Spring Boot!";', type: 'code' },
      { text: '    }', type: 'code' },
      { text: '}', type: 'code' },
    ];

    function V({ hl }) {
      return (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-2xl mx-auto">
          {/* 코드 */}
          <div className="bg-slate-900 p-4 rounded-xl text-sm font-mono">
            <div className="text-xs text-slate-500 mb-2">HelloController.java</div>
            {CODE.map((line, i) => (
              <div key={i} className={`px-2 py-0.5 rounded transition-all duration-500 ${
                hl === i ? 'bg-green-900/60 text-white font-bold border-l-4 border-green-400' : 'border-l-4 border-transparent'
              }`}>
                {line.type === 'annotation' ? <span className="text-yellow-300">{line.text}</span>
                : line.type === 'empty' ? <span>&nbsp;</span>
                : <span className="text-slate-300">{line.text}</span>}
              </div>
            ))}
          </div>
          {/* 설명 */}
          <div className="space-y-3">
            <div className="bg-sky-50 p-3 rounded-lg border border-sky-200">
              <div className="font-bold text-sky-800 text-sm mb-1">요청</div>
              <div className="font-mono text-sm text-sky-700">GET /hello</div>
            </div>
            <div className="flex justify-center"><svg width="16" height="24" viewBox="0 0 24 32" fill="none" stroke="#94a3b8" strokeWidth="2"><path d="M12 4v24M6 22l6 6 6-6"/></svg></div>
            <div className="bg-emerald-50 p-3 rounded-lg border border-emerald-200">
              <div className="font-bold text-emerald-800 text-sm mb-1">응답</div>
              <div className="font-mono text-sm text-emerald-700">"Hello, Spring Boot!"</div>
              <div className="text-xs text-slate-500 mt-1">HTTP 200 OK</div>
            </div>
            {hl === -1 && (
              <div className="bg-slate-800 p-3 rounded-lg text-center">
                <div className="text-emerald-400 font-bold text-sm">이 패턴 = 모든 API의 기본 뼈대</div>
                <div className="text-xs text-slate-400">@RestController + @GetMapping</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),3500);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter III-3-1</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">첫 번째 REST 엔드포인트</h1><span className="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full">★★☆</span></div><p className="text-slate-600"><b>@RestController + @GetMapping</b>으로 첫 API를 만드는 과정을 코드와 함께 체험합니다.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[280px] flex items-center justify-center"><div className="w-full"><V hl={step.hl}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
