          '# 출력 예:',
          '#   HTTP/1.1 200',
          '#   Content-Type: text/plain;charset=UTF-8',
          '#   Content-Length: 19',
          '#   Date: Mon, 11 May 2026 09:00:00 GMT',
          '#',
          '#   Hello, Spring Boot!',
          '',
          '# ─── (4) JSON 응답 확인 (Step 4 의 /hello-json) ───',
          'curl -i http://localhost:8080/hello-json',
          '# 출력 예:',
          '#   HTTP/1.1 200',
          '#   Content-Type: application/json',
          '#',
          '#   {"message":"Hello, Spring Boot!","version":1}',
          '',
          '# ─── (5) 브라우저로 직접 확인도 가능 ───',
          '#    http://localhost:8080/hello',
          '#    → 화면에 "Hello, Spring Boot!" 가 그대로 보인다.',
          '',
          '# ─── (6) 종료 ───',
          '#    Ctrl+C 로 bootRun 중단',
          '',
          '# 💡 트러블슈팅',
          '#    - 8080 이 이미 사용 중이면 application.properties 에',
          '#      server.port=8081  추가 후 재기동',
          '#    - 404 가 나면 @RestController 가 빠졌거나 경로 오타 의심',
          '#    - 500 이 나면 콘솔 스택트레이스부터 확인',
        ],
        highlight: [4, 5, 6, 7, 8, 9, 11, 12, 13, 15, 16, 17, 18, 20, 21, 22, 23, 24, 25, 26, 27, 28, 30, 31, 32, 33, 34, 35, 36],
      },
    ];

    // ─────────────────────────────────────────────────────
    // CodeBox — 좌측 코드 카드 (자바 라인 누적 표시)
    //   라인의 kind 에 따라 색상이 다르고, hi=true 인 라인은 lime 강조
    // ─────────────────────────────────────────────────────
    function CodeBox({ filename, lines }) {
      const colorOf = (kind) => {
        if (kind === 'anno') return 'text-amber-300';
        if (kind === 'class') return 'text-sky-300';
        if (kind === 'method') return 'text-emerald-300';
        if (kind === 'body') return 'text-slate-100';
        if (kind === 'brace') return 'text-slate-400';
        return 'text-slate-500';
      };
      return (
        <div className="bg-slate-900 rounded-lg border-2 border-slate-700 overflow-hidden">
          <div className="bg-slate-800 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-lime-300 flex items-center justify-between">
            <span>{filename}</span>
            <span className="text-[9px] font-mono text-slate-400">java</span>
          </div>
          <div className="p-3 font-mono text-[11.5px] leading-snug">
            {lines.map((line, i) => (
              <div
                key={i}
                className={`px-2 py-0.5 rounded transition-all duration-500 ${
                  line.hi
                    ? 'bg-lime-500/20 border-l-2 border-lime-400'
                    : 'border-l-2 border-transparent'
                }`}
              >
                {line.text === '' ? (
                  <span>&nbsp;</span>
                ) : (
                  <span className={`${colorOf(line.kind)} ${line.hi ? 'font-bold' : ''}`}>
                    {line.text}
                  </span>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // ResponseMock — 좌측 우반: 요청/응답 시각화
    // ─────────────────────────────────────────────────────
    function ResponseMock({ request, response, status }) {
      const hasReq = !!request;
      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden h-full">
          <div className="bg-slate-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-slate-600 flex items-center justify-between">
            <span>HTTP 요청 / 응답</span>
            <span className="text-[9px] font-mono text-slate-400">mock</span>
          </div>
          <div className="p-3 space-y-2">
            {/* 요청 */}
            <div className={`rounded-lg border p-2 ${hasReq ? 'bg-sky-50 border-sky-200' : 'bg-slate-50 border-slate-200 opacity-50'}`}>
              <div className="text-[9px] font-bold uppercase tracking-wider text-sky-700 mb-1">요청</div>
              <div className="font-mono text-[12px] text-sky-800">
                {hasReq ? request : '(아직 매핑이 없음)'}
              </div>
            </div>

            {/* 화살표 */}
            <div className="flex items-center justify-center">
              <div className="flex flex-col items-center">
                <div className="text-[9px] text-lime-600 font-mono font-bold tracking-wider uppercase">
                  Dispatcher → Controller
                </div>
                <div className="text-lime-500 text-lg leading-none">↓</div>
              </div>
            </div>

            {/* 응답 */}
            <div className={`rounded-lg border p-2 ${response ? 'bg-emerald-50 border-emerald-200' : 'bg-slate-50 border-slate-200 opacity-50'}`}>
              <div className="text-[9px] font-bold uppercase tracking-wider text-emerald-700 mb-1">응답</div>
              <div className="font-mono text-[12px] text-emerald-800 break-all">
                {response || '(아직 본문 없음)'}
              </div>
              {status && (
                <div className="text-[10px] font-mono text-slate-500 mt-1">{status}</div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    //   상단 : 코드 박스 + 우측 응답 mock (2 컬럼)
    //   하단 : note + keyPoint
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🌱 HelloController — 코드와 응답</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            <CodeBox filename="HelloController.java" lines={step.codeLines} />
            <ResponseMock request={step.request} response={step.response} status={step.status} />
          </div>

          {/* note 박스 */}
          {step.note && (
            <div className="mt-3 bg-slate-50 border-l-4 border-slate-400 px-3 py-2 rounded-r">
              <div className="text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-0.5">참고</div>
              <p className="text-[11px] text-slate-700 leading-snug">{step.note}</p>
            </div>
          )}

          {/* 핵심 포인트 박스 */}
          <div className="mt-2 bg-lime-50 border-l-4 border-lime-500 px-3 py-2 rounded-r">
            <div className="text-[9px] font-bold text-lime-700 uppercase tracking-wider mb-0.5">핵심 포인트</div>
            <p className="text-[11px] text-lime-900 leading-snug">{step.keyPoint}</p>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-400"></span>annotation
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-400"></span>class
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-400"></span>method
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-lime-400"></span>highlight
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   상단 5개 탭 (controller / restcontroller / getmapping / return / curl)
    //   step 변경 시 step.codeTab 으로 자동 전환되지만, 사용자가 직접 클릭도 가능
    // ─────────────────────────────────────────────────────
    function CodeViewer({ activeKey, onTabChange, stepIdx, total }) {
      const code = CODE_TABS.find((t) => t.key === activeKey) || CODE_TABS[0];
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          codeRef.current.textContent = code.lines.join('\n');
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 탭 바 */}
          <div className="bg-[#21252b] px-3 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5 mr-2">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <div className="flex gap-1 overflow-x-auto flex-1">
              {CODE_TABS.map((t) => {
                const active = t.key === activeKey;
                return (
                  <button
                    key={t.key}
                    onClick={() => onTabChange(t.key)}
                    className={`text-[10.5px] font-mono px-2.5 py-1 rounded-t whitespace-nowrap transition ${
                      active
                        ? 'bg-[#282c34] text-lime-300 border-t-2 border-lime-400'
                        : 'bg-[#1b1f24] text-slate-500 hover:text-slate-300 border-t-2 border-transparent'
                    }`}
                  >
                    {t.filename}
                  </button>
                );
              })}
            </div>
            <span className="text-[10px] text-slate-500 font-mono uppercase ml-2">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-lime-500/15 border-l-2 border-lime-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    //   - step 변경 시 우측 CodeViewer 탭이 자동으로 따라감
    //     (사용자가 직접 탭을 클릭하면 그 탭이 유지됨)
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [activeTab, setActiveTab] = useState(STEPS[0].codeTab);
      const [userPickedTab, setUserPickedTab] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      // step 변경 시 사용자가 별도로 탭을 안 골랐다면 step.codeTab 으로 자동 전환
      useEffect(() => {
        if (!userPickedTab) {
          setActiveTab(STEPS[stepIdx].codeTab);
        }
      }, [stepIdx, userPickedTab]);

      const handleNext = () => {
        setUserPickedTab(false);
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => {
        setUserPickedTab(false);
        setStepIdx((i) => Math.max(0, i - 1));
      };
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) {
          setStepIdx(0);
          setUserPickedTab(false);
        }
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
        setUserPickedTab(false);
      };

      const handleTabChange = (key) => {
        setActiveTab(key);
        setUserPickedTab(true);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; 챕터 목록</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter III-3-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-lime-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Spring Boot 기초 &gt; Chapter 3. 첫 프로젝트</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-3-1. 첫 번째 REST 엔드포인트</h1>
                  <p className="text-sm text-slate-500 mt-0.5">@RestController + @GetMapping — 5분이면 끝나는 첫 API</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                activeKey={activeTab}
                onTabChange={handleTabChange}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-300 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: <strong>@RestController</strong> 한 줄로 클래스를 HTTP 응답기로 만들고,
                <strong> @GetMapping("/hello")</strong> 로 URL 을 메서드에 연결하고,
                <strong> return</strong> 값이 곧 응답 본문이 된다. 이 3개가 모든 REST API 의 뼈대.
                다음(III-3-2)에서는 이 응답을 실제로 클라이언트까지 전달하는 <strong>내장 톰캣</strong>의 동작을 본다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['@RestController', '@GetMapping', 'HelloController', 'return', 'Jackson', 'curl', 'bootRun', 'REST'].map((kw) => (
                <span key={kw} className="bg-lime-50 text-lime-700 px-3 py-1 rounded-full text-xs font-medium border border-lime-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-03-04-project-structure.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; III-3-4 프로젝트 구조</a>
              <a href="./chapter-03-06-embedded-tomcat.html" className="text-lime-700 hover:text-lime-900 font-medium">III-3-6 내장 톰캣 &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
