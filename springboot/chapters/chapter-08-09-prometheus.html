<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>VIII-3-2 — Prometheus 설치와 연동</title><script src="https://cdn.tailwindcss.com"></script><script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script><script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script></head>
<body><div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const STEPS=[
  {id:'dep',label:'① 의존성 추가',desc:'[STEP 1] micrometer-registry-prometheus 의존성을 build.gradle에 추가하면 /actuator/prometheus 엔드포인트가 자동 생성된다.',p:'dep'},
  {id:'endpoint',label:'② /actuator/prometheus',desc:'[STEP 2] 이 엔드포인트는 Prometheus가 이해하는 텍스트 형식으로 모든 메트릭을 노출한다. http_server_requests_seconds_count, jvm_memory_used_bytes 등.',p:'endpoint'},
  {id:'install',label:'③ Prometheus 설치',desc:'[STEP 3] Docker로 설치: docker run -d -p 9090:9090 -v prometheus.yml:/etc/prometheus/prometheus.yml prom/prometheus. localhost:9090에서 UI 접속.',p:'install'},
  {id:'scrape',label:'④ scrape 설정',desc:'[STEP 4] prometheus.yml에 Spring Boot 앱의 /actuator/prometheus 주소를 scrape 대상으로 등록. Prometheus가 15초마다 메트릭을 수집한다.',p:'scrape'},
  {id:'query',label:'⑤ PromQL 쿼리',desc:'[STEP 5] Prometheus UI에서 http_server_requests_seconds_count를 쿼리하면 HTTP 요청 수를 확인할 수 있다. rate()로 초당 요청률, histogram_quantile()로 응답 시간 백분위를 계산한다.',p:'query'},
];
function V({p}){
  if(p==='dep')return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div className="text-slate-500">// build.gradle</div><div>implementation <span className="text-emerald-400">'io.micrometer:micrometer-registry-prometheus'</span></div><div className="mt-2 text-slate-500">// application.properties</div><div>management.endpoints.web.exposure.include=health,prometheus</div></div>);
  if(p==='endpoint')return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div className="text-amber-400">GET /actuator/prometheus</div><div className="mt-2">http_server_requests_seconds_count{'{'}<span className="text-sky-400">method="GET",uri="/users"</span>{'}'} <span className="text-emerald-400">150</span></div><div>jvm_memory_used_bytes{'{'}<span className="text-sky-400">area="heap"</span>{'}'} <span className="text-emerald-400">1.2e8</span></div><div>process_cpu_usage <span className="text-emerald-400">0.15</span></div></div>);
  if(p==='install')return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-sm font-mono"><div className="text-emerald-400">$ docker run -d -p 9090:9090 \</div><div className="text-emerald-400">{'  '}-v ./prometheus.yml:/etc/prometheus/prometheus.yml \</div><div className="text-emerald-400">{'  '}prom/prometheus</div><div className="mt-2 text-sky-400">→ localhost:9090</div></div>);
  if(p==='scrape')return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div className="text-slate-500"># prometheus.yml</div><div>scrape_configs:</div><div>{'  '}- job_name: <span className="text-emerald-400">'spring-boot-app'</span></div><div>{'    '}metrics_path: <span className="text-emerald-400">'/actuator/prometheus'</span></div><div>{'    '}scrape_interval: <span className="text-amber-400">15s</span></div><div>{'    '}static_configs:</div><div>{'      '}- targets: [<span className="text-emerald-400">'host.docker.internal:8080'</span>]</div></div>);
  return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div className="text-amber-400 mb-2">PromQL 예시</div><div><span className="text-emerald-400">rate</span>(http_server_requests_seconds_count[5m])</div><div className="text-slate-500">→ 5분간 초당 요청률</div><div className="mt-2"><span className="text-emerald-400">histogram_quantile</span>(0.99, rate(...))</div><div className="text-slate-500">→ 99번째 백분위 응답 시간</div></div>);
}
function App(){const[idx,setIdx]=useState(0);const[playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
return(<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6"><div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter VIII-3-2</span></div><header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">Prometheus 설치와 연동</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600"><b>의존성 → /actuator/prometheus → Docker → scrape → PromQL</b>을 체험합니다.</p></header><div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div><div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[240px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div><div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2"><button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button><button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button><button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button></div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1}/{STEPS.length} — {step.label}</div></div><div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div></div></div>);}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
