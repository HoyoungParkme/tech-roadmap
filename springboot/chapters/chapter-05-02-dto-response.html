            '/** 모든 API 응답을 감싸는 공통 봉투. @param <T> data 필드의 실제 타입 */',

    // ─────────────────────────────────────────────────────
    // 색상 매핑 — Tailwind JIT 안전하게 명시적으로 (CDN 환경)
    // ─────────────────────────────────────────────────────
    const COLOR = {
      rose:  { bg:'bg-rose-50',  border:'border-rose-300',  head:'bg-rose-100',  headText:'text-rose-700',  badge:'bg-rose-200 text-rose-800',  ring:'ring-rose-200' },
      lime:  { bg:'bg-lime-50',  border:'border-lime-300',  head:'bg-lime-100',  headText:'text-lime-700',  badge:'bg-lime-200 text-lime-800',  ring:'ring-lime-200' },
      sky:   { bg:'bg-sky-50',   border:'border-sky-300',   head:'bg-sky-100',   headText:'text-sky-700',   badge:'bg-sky-200 text-sky-800',   ring:'ring-sky-200' },
      amber: { bg:'bg-amber-50', border:'border-amber-300', head:'bg-amber-100', headText:'text-amber-700', badge:'bg-amber-200 text-amber-800', ring:'ring-amber-200' },
      slate: { bg:'bg-slate-50', border:'border-slate-300', head:'bg-slate-100', headText:'text-slate-600', badge:'bg-slate-200 text-slate-700', ring:'ring-slate-200' },
    };

    // FieldBox — Entity/DTO 박스 (leak=노출표시, mapTo=매핑, anno=검증)
    function FieldBox({ box }) {
      if (!box) return null;
      const c = COLOR[box.color] || COLOR.slate;
      return (
        <div className={`rounded-lg border-2 ${c.border} ${c.bg} overflow-hidden`}>
          <div className={`${c.head} px-3 py-1.5 border-b ${c.border}`}>
            <div className={`text-xs font-bold ${c.headText}`}>{box.name}</div>
            {box.subtitle && (
              <div className="text-[10px] text-slate-500 mt-0.5">{box.subtitle}</div>
            )}
          </div>
          <div className="p-2 space-y-1">
            {box.fields.map((f) => (
              <div key={f.name} className={`flex items-center justify-between gap-2 px-2 py-1 rounded text-[11px] font-mono ${
                f.leak ? 'bg-rose-100 border border-rose-300' :
                f.mapTo === null ? 'bg-slate-100 border border-slate-200 opacity-60' :
                'bg-white border border-slate-200'

                <div className="flex items-center gap-1.5 min-w-0">
                  <span className={`font-bold truncate ${f.leak ? 'text-rose-700' : 'text-slate-700'}`}>{f.name}</span>
                  <span className="text-slate-400 text-[10px]">: {f.type}</span>

                {f.leak && <span className="text-[9px] font-bold text-rose-600 bg-rose-200 px-1.5 py-0.5 rounded flex-shrink-0">노출!</span>}
                {f.anno && <span className="text-[9px] font-bold text-amber-700 bg-amber-100 px-1.5 py-0.5 rounded border border-amber-300 flex-shrink-0">{f.anno}</span>}
                {f.mapTo === null && <span className="text-[9px] font-bold text-slate-500 flex-shrink-0">제외</span>}
                {f.mapTo && f.mapTo !== f.name && <span className="text-[9px] font-mono text-lime-700 flex-shrink-0">→ {f.mapTo}</span>}
                {f.mapTo === f.name && <span className="text-[9px] font-mono text-lime-600 flex-shrink-0">→</span>}

          </div>
        </div>

    }

    // MappingDiagram — Entity/DTO 두 박스 + 화살표 (dto=null 이면 한 칸)
    function MappingDiagram({ entity, dto, note }) {
      const hasDto = dto !== null;
      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">
          <div className="bg-slate-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-slate-600 flex items-center justify-between">
            <span>Entity → DTO 매핑</span>
            <span className="text-[9px] font-mono text-slate-500">diagram</span>
          </div>
          <div className="p-3">
            {hasDto ? (
              <div className="grid grid-cols-[1fr_auto_1fr] gap-2 items-center">
                <FieldBox box={entity} />
                <div className="flex flex-col items-center">
                  <div className="text-[9px] text-lime-600 font-mono font-bold tracking-wider uppercase">변환</div>
                  <div className="text-lime-500 text-2xl leading-none">→</div>
                  <div className="text-[9px] text-slate-400 font-mono mt-0.5">.from()</div>
                </div>
                <FieldBox box={dto} />
              </div>
            ) : (
              <FieldBox box={entity} />
            )}
            {note && (
              <div className="mt-3 text-[10px] text-slate-500 italic text-center px-2">
                {note}
              </div>
            )}
          </div>
        </div>
      );
    }

    // JsonMockCard — 클라이언트가 받는 JSON 응답 mock
    function JsonMockCard({ json }) {
      const c = COLOR[json.color] || COLOR.slate;
      return (
        <div className={`rounded-lg border-2 ${c.border} overflow-hidden`}>
          <div className={`${c.head} px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider ${c.headText} flex items-center justify-between`}>
            <span>{json.label}</span>
            <span className="text-[9px] font-mono opacity-70">json</span>
          </div>
          <pre className="bg-slate-900 text-slate-200 text-[11px] font-mono leading-snug p-3 m-0 whitespace-pre overflow-x-auto">
            {json.lines.map((line, i) => {
              // 간단한 강조 — "노출!" 또는 "<-" 라인은 빨간 강조
              const isLeak = line.includes('노출!') || line.includes('<- ');
              return (
                <div key={i} className={isLeak ? 'text-rose-300 font-bold' : ''}>{line || ' '}</div>
              );
            })}
          </pre>
        </div>
      );
    }

    // LiveDataPane — 좌측 전체 (상단=매핑 다이어그램, 하단=JSON, 푸터=keyPoint)
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📦 Entity ↔ DTO 매핑 + JSON 응답</h2>

          </div>

            <p className="text-[11px] text-lime-900 leading-snug">{step.keyPoint}</p>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">

            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-lime-500"></span>안전한 DTO</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-sky-400"></span>Request DTO</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-amber-400"></span>검증 어노테이션</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-slate-300"></span>Entity 원본</span>
          </div>
        </div>
      );
    }

    // CodeViewer — VSCode 스타일 (highlight.js atom-one-dark + 라인번호 + 강조)
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[44rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-lime-500/15 border-l-2 border-lime-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   4버튼 (처음/이전/재생/다음) + 키보드 ←/→ + 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);
      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) { setIsPlaying(false); return i; }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };
      const handleReset = () => { setStepIdx(0); setIsPlaying(false); };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; 목차로</a>

              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-lime-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. REST API 설계 &gt; Chapter 1. 컨트롤러 & DTO</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">V-1-2. DTO와 응답 구조 설계</h1>
                  <p className="text-sm text-slate-500 mt-0.5">Entity 직접 노출의 위험 → DTO 분리 → @Valid 검증 → 공통 ApiResponse</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-300 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: <strong>Entity 직접 노출 금지</strong> → <strong>Request/Response DTO 분리</strong> → <strong>@Valid 자동 검증</strong> → <strong>ApiResponse&lt;T&gt; 공통 봉투</strong>. 이 4단 구조가 안전하고 일관된 REST API의 기본기다. 다음(V-1-3)에서는 ORM/JPA 로 영속성 계층을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={handleReset} disabled={stepIdx === 0 && !isPlaying} aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={handlePrev} disabled={stepIdx === 0} aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[100px]">
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1} aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['DTO', 'Entity', 'record', '@Valid', '@NotBlank', '@Email', 'ApiResponse', 'RestControllerAdvice'].map((kw) => (
                <span key={kw} className="bg-lime-50 text-lime-700 px-3 py-1 rounded-full text-xs font-medium border border-lime-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-05-01-rest-principles.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; V-1-1 REST 원칙</a>
              <a href="./chapter-05-03-orm-jpa.html" className="text-lime-700 hover:text-lime-900 font-medium">V-1-3 ORM/JPA &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
