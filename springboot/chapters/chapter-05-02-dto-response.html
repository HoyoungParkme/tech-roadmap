<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter V-1-2 — DTO와 응답 구조 설계</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'problem', label:'① Entity 직접 반환의 위험', desc:'[STEP 1] Entity(DB 테이블과 1:1 매핑)를 API 응답으로 직접 반환하면 비밀번호 같은 민감 필드가 노출된다. DB 구조 변경이 API 계약에 바로 영향을 준다.', p:'problem' },
      { id:'dto', label:'② DTO란', desc:'[STEP 2] DTO(Data Transfer Object) = API 입출력 전용 클래스. 화면에 보낼 데이���만 담는다. Java 16+ record를 쓰면 불변 DTO를 간결하게 선언할 수 있다.', p:'dto' },
      { id:'convert', label:'③ Entity → DTO 변환', desc:'[STEP 3] Service 계층에서 Entity를 DTO로 변환해 Controller에 반환한다. 정적 팩토리 메서드 UserResponse.from(entity)으로 변환 로직을 한 곳에 모은다.', p:'convert' },
      { id:'response', label:'④ 응답 구조 설계', desc:'[STEP 4] 성공 응답은 데이터를 직접 반환하거나 공통 래퍼로 감싼다. 에러 응답은 status + message 구조로 일관되게 만든다. 프론트엔드가 에러를 한 가지 방식으로 처리할 수 있다.', p:'response' },
      { id:'why', label:'⑤ 왜 분리하는가', desc:'[STEP 5] Entity와 DTO를 분리하면 DB 구조를 바꿔도 API 응답이 변하지 않는다. 이 분리가 없으면 DB 마이그레이션이 곧 API 호환성 파괴를 의미한다.', p:'why' },
    ];

    function V({ p }) {
      if (p==='problem') return (
        <div className="max-w-md mx-auto">
          <div className="bg-rose-50 p-4 rounded-xl border border-rose-200">
            <div className="font-bold text-rose-800 mb-2">❌ Entity 직접 반환</div>
            <div className="bg-slate-900 p-3 rounded-lg text-xs font-mono text-slate-300">
              <div>{'{ '}<span className="text-cyan-400">"id"</span>: 1,</div>
              <div>{'  '}<span className="text-cyan-400">"name"</span>: <span className="text-emerald-400">"Alice"</span>,</div>
              <div>{'  '}<span className="text-cyan-400">"email"</span>: <span className="text-emerald-400">"alice@..."</span>,</div>
              <div>{'  '}<span className="text-rose-400">"password"</span>: <span className="text-rose-400">"$2a$10$..."</span> <span className="text-rose-500">← 노출!</span></div>
              <div>{'}'}</div>
            </div>
          </div>
        </div>
      );
      if (p==='dto') return (
        <div className="max-w-md mx-auto space-y-3">
          <div className="bg-emerald-50 p-4 rounded-xl border-2 border-emerald-400 ring-2 ring-emerald-300 shadow">
            <div className="font-bold text-emerald-800 mb-2">✅ DTO (record)</div>
            <div className="bg-slate-900 p-3 rounded-lg text-xs font-mono text-slate-300">
              <div><span className="text-pink-400">public record</span> <span className="text-cyan-400">UserResponse</span>(</div>
              <div>{'    '}Long id,</div>
              <div>{'    '}String name,</div>
              <div>{'    '}String email</div>
              <div>{'    '}<span className="text-slate-500">// password 없음!</span></div>
              <div>) {'{}'}</div>
            </div>
          </div>
          <div className="text-center text-xs text-slate-500">화면에 보낼 데이터만 담는 전용 클래스</div>
        </div>
      );
      if (p==='convert') return (
        <div className="max-w-md mx-auto flex items-center gap-3 flex-wrap justify-center">
          <div className="bg-amber-50 p-3 rounded-xl border border-amber-200 text-center"><div className="text-lg">🗄️</div><div className="text-xs font-bold text-amber-800">Entity</div><div className="text-[10px] text-amber-600">id, name, email, <span className="text-rose-500">password</span></div></div>
          <div className="text-center"><svg width="32" height="16" viewBox="0 0 32 16" fill="none" stroke="#10b981" strokeWidth="2"><path d="M0 8h28M22 2l6 6-6 6"/></svg><div className="text-[10px] text-emerald-600">.from(entity)</div></div>
          <div className="bg-emerald-50 p-3 rounded-xl border-2 border-emerald-400 text-center"><div className="text-lg">📋</div><div className="text-xs font-bold text-emerald-800">DTO</div><div className="text-[10px] text-emerald-600">id, name, email</div></div>
          <div className="text-center"><svg width="32" height="16" viewBox="0 0 32 16" fill="none" stroke="#0ea5e9" strokeWidth="2"><path d="M0 8h28M22 2l6 6-6 6"/></svg><div className="text-[10px] text-sky-600">JSON</div></div>
          <div className="bg-sky-50 p-3 rounded-xl border border-sky-200 text-center"><div className="text-lg">🌐</div><div className="text-xs font-bold text-sky-800">API 응답</div></div>
        </div>
      );
      if (p==='response') return (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 max-w-lg mx-auto">
          <div className="bg-emerald-50 p-3 rounded-xl border border-emerald-200">
            <div className="font-bold text-sm text-emerald-800 mb-1">✅ 성공 (200)</div>
            <div className="bg-slate-900 p-2 rounded text-xs font-mono text-emerald-400">{'{ "id":1, "name":"Alice" }'}</div>
          </div>
          <div className="bg-rose-50 p-3 rounded-xl border border-rose-200">
            <div className="font-bold text-sm text-rose-800 mb-1">❌ 에러 (404)</div>
            <div className="bg-slate-900 p-2 rounded text-xs font-mono text-rose-400">{'{ "status":404, "message":"..." }'}</div>
          </div>
        </div>
      );
      return (
        <div className="max-w-md mx-auto bg-slate-800 p-5 rounded-xl text-center">
          <div className="text-emerald-400 font-bold text-lg mb-2">Entity ↔ DTO 분리</div>
          <div className="text-slate-400 text-sm">DB 구조를 바꿔도 API 응답이 변하지 않는다</div>
        </div>
      );
    }

    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter V-1-2</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">DTO와 응답 구조 설계</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600">Entity와 DTO를 분리하고 <b>일관된 API 응답 구조</b>를 설계하는 방법을 체험합니다.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[240px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
