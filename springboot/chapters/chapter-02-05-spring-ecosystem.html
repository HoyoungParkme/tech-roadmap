<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter II-3-1 — Spring 프로젝트 전체 지도</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter II-3-1 — Spring 생태계: 출판사 시리즈 비유 지도 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PROJECTS = [
      { id: 'boot', name: 'Spring Boot', icon: '🚀', role: '시작점 · 자동 설정 · 내장 서버', color: 'emerald',
        desc: '나머지 시리즈를 쉽게 조합할 수 있게 기반을 만들어주는 핵심 프로젝트' },
      { id: 'security', name: 'Spring Security', icon: '🔒', role: '로그인 · 권한 · 암호화', color: 'rose',
        desc: '인증(누구인지 확인)과 인가(무엇을 할 수 있는지 확인)를 담당하는 보안 프로젝트' },
      { id: 'data', name: 'Spring Data', icon: '💾', role: 'DB 접근 추상화 · JPA', color: 'sky',
        desc: 'DB 종류가 달라도 비슷한 방식으로 데이터를 저장하고 조회할 수 있게 해주는 프로젝트' },
      { id: 'cloud', name: 'Spring Cloud', icon: '☁️', role: '마이크로서비스 · 서비스 간 통신', color: 'violet',
        desc: '서비스 간 통신, 로드 밸런싱, 설정 관리 등 분산 시스템을 위한 도구 모음' },
      { id: 'batch', name: 'Spring Batch', icon: '📊', role: '대용량 데이터 일괄 처리', color: 'amber',
        desc: '수백만 건의 데이터를 정해진 시간에 읽고·처리하고·저장하는 배치 작업 프로젝트' },
    ];

    const STEPS = [
      { id: 'analogy', label: '① 출판사 비유',
        desc: '[STEP 1 — 비유] "Spring"은 하나의 프레임워크가 아니라 프로젝트 모음 전체를 가리키는 브랜드다. 출판사 이름이 "Spring"이고, Boot · Security · Data · Cloud는 그 출판사가 내는 서로 다른 분야의 시리즈 책이다.',
        highlight: [] },
      { id: 'boot', label: '② Spring Boot (시작점)',
        desc: '[STEP 2 — Boot] 나머지 모든 시리즈를 쉽게 조합해 쓸 수 있도록 기반을 만들어주는 핵심 프로젝트. 자동 설정, 내장 Tomcat, Starter 의존성이 여기 속한다.',
        highlight: ['boot'] },
      { id: 'security', label: '③ Spring Security (보안)',
        desc: '[STEP 3 — Security] 로그인(인증), 권한(인가), 암호화 같은 보안 기능을 다루는 시리즈. 기업 환경에서 거의 필수적으로 사용된다.',
        highlight: ['boot', 'security'] },
      { id: 'data', label: '④ Spring Data (DB)',
        desc: '[STEP 4 — Data] 데이터 저장소 담당. MySQL이든 MongoDB든 비슷한 방식으로 데이터를 다룰 수 있게 추상화한다. Spring Data JPA가 가장 많이 쓰인다.',
        highlight: ['boot', 'data'] },
      { id: 'grow', label: '⑤ 점진적 확장',
        desc: '[STEP 5 — 확장] 소규모: Boot + Data JPA만으로 충분. 규모가 커지면 Security를 더하고, 더 커지면 Cloud를 붙인다. 처음에는 Boot와 Data JPA 두 가지에 집중하면 된다.',
        highlight: ['boot', 'security', 'data', 'cloud', 'batch'] },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const colorMap = {
        emerald: { bg: 'bg-emerald-100', border: 'border-emerald-400', ring: 'ring-emerald-300', text: 'text-emerald-800' },
        rose: { bg: 'bg-rose-100', border: 'border-rose-400', ring: 'ring-rose-300', text: 'text-rose-800' },
        sky: { bg: 'bg-sky-100', border: 'border-sky-400', ring: 'ring-sky-300', text: 'text-sky-800' },
        violet: { bg: 'bg-violet-100', border: 'border-violet-400', ring: 'ring-violet-300', text: 'text-violet-800' },
        amber: { bg: 'bg-amber-100', border: 'border-amber-400', ring: 'ring-amber-300', text: 'text-amber-800' },
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <div className="flex justify-between items-center text-sm">
              <a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a>
              <span className="text-slate-400">Chapter II-3-1</span>
            </div>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div>
                <h1 className="text-2xl font-bold">Spring 프로젝트 전체 지도</h1>
                <span className="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full">★★☆</span>
              </div>
              <p className="text-slate-600">"Spring" 출판사의 <b>5가지 시리즈</b> — Boot · Security · Data · Cloud · Batch의 역할을 한눈에 파악합니다.</p>
            </header>
            <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Spring 생태계 지도</div>

              {/* 출판사 비유 */}
              {stepData.highlight.length === 0 && (
                <div className="text-center mb-4 p-4 bg-amber-50 rounded-lg border border-amber-200">
                  <div className="text-2xl mb-2">📚</div>
                  <div className="font-bold text-amber-800">"Spring" = 출판사 이름</div>
                  <div className="text-sm text-amber-600">Boot · Security · Data · Cloud · Batch = 각 분야 시리즈</div>
                </div>
              )}

              {/* 프로젝트 카드 그리드 */}
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                {PROJECTS.map(p => {
                  const active = stepData.highlight.includes(p.id) || stepData.highlight.length === 0;
                  const focused = stepData.highlight.length === 1 && stepData.highlight[0] === p.id;
                  const c = colorMap[p.color];
                  return (
                    <div key={p.id} className={`p-4 rounded-xl border-2 transition-all duration-500 ${
                      focused ? `${c.bg} ${c.border} ring-2 ${c.ring} shadow-lg scale-[1.03]`
                      : active ? `${c.bg} ${c.border} shadow-sm`
                      : 'bg-slate-50 border-slate-200 opacity-30'
                    }`}>
                      <div className="text-2xl mb-2 text-center">{p.icon}</div>
                      <div className={`font-bold text-center text-sm ${active ? c.text : 'text-slate-400'}`}>{p.name}</div>
                      <div className="text-xs text-slate-500 text-center mt-1">{p.role}</div>
                      {(focused || (stepData.highlight.length >= 5)) && (
                        <div className="mt-2 text-xs text-slate-600 bg-white bg-opacity-60 p-2 rounded">{p.desc}</div>
                      )}
                      {p.id === 'boot' && active && (
                        <div className="mt-2 text-center"><span className="text-xs bg-emerald-200 text-emerald-800 px-2 py-0.5 rounded-full font-bold">이 커리큘럼의 중심</span></div>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* 점진적 확장 */}
              {stepData.highlight.length >= 5 && (
                <div className="mt-4 space-y-2">
                  <div className="text-xs font-bold text-slate-500">규모별 조합</div>
                  {[
                    { size: '소규모', combo: 'Boot + Data JPA', tag: '지금 집중' },
                    { size: '중규모', combo: '+ Security', tag: '인증/보안 필요 시' },
                    { size: '대규모', combo: '+ Cloud + Batch', tag: 'MSA 전환 시' },
                  ].map(s => (
                    <div key={s.size} className="flex items-center gap-3 bg-slate-50 p-2 rounded-lg border border-slate-200">
                      <span className="text-xs font-bold text-slate-500 w-16">{s.size}</span>
                      <span className="text-sm font-semibold text-slate-700 flex-1">{s.combo}</span>
                      <span className="text-xs text-slate-400">{s.tag}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length} — {stepData.label}</div>
            </div>
            <div className="flex justify-center gap-2">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                  className={`w-3 h-3 rounded-full transition-all ${i === currentStepIdx ? 'bg-green-700 scale-125' : 'bg-slate-300 hover:bg-slate-400'}`} />
              ))}
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
