            </div>
            <div className="border-2 border-lime-400 bg-lime-50 rounded-lg overflow-hidden">
              <div className="bg-lime-200 px-2 py-1 text-[9px] font-bold text-lime-800 uppercase">Lv3 — HATEOAS</div>
              <pre className="text-[9px] font-mono text-lime-900 p-2 m-0 leading-tight">{`{
  "id": 100,
  "status": "PENDING",
  "amount": 25000,
  "_links": { ... }
}`}</pre>
            </div>
          </div>

          {/* 응답 안의 링크 시각화 */}
          <div className="bg-white border-2 border-lime-300 rounded-lg overflow-hidden">
            <div className="bg-lime-100 px-2.5 py-1 text-[10px] font-bold text-lime-800 uppercase tracking-wider">
              GET /orders/100 → 응답
            </div>
            <div className="p-2 space-y-1">
              <div className="text-[10px] font-mono text-slate-700">
                <span className="text-slate-500">id:</span> 100,
                <span className="text-slate-500 ml-2">status:</span> <span className="text-amber-700 font-bold">"PENDING"</span>,
                <span className="text-slate-500 ml-2">amount:</span> 25000
              </div>
              <div className="border-t border-lime-200 pt-1.5 mt-1.5">
                <div className="text-[9px] font-bold text-lime-700 mb-1 uppercase">_links (가능한 다음 행동)</div>
                {Object.entries(HATEOAS_SAMPLE._links).map(([rel, link]) => (
                  <div key={rel} className="flex items-center gap-1.5 mb-0.5">
                    <span className={`text-[8px] font-mono px-1 py-0.5 rounded font-bold ${link.method === 'GET' ? 'bg-sky-100 text-sky-700' : 'bg-emerald-100 text-emerald-700'}`}>
                      {link.method}
                    </span>
                    <span className="text-[10px] font-bold text-lime-800 w-12">{rel}</span>
                    <code className="text-[10px] font-mono text-slate-700">{link.href}</code>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* 상태 머신 */}
          <div className="bg-slate-800 text-slate-200 rounded-lg p-2 text-[10px] font-mono">
            <div className="text-lime-300 font-bold mb-1 text-[9px] uppercase tracking-wider"># 상태별 가능 액션 (응답 _links 가 자동 변경)</div>
            {stateMachine.map((s) => (
              <div key={s.from} className="flex items-center gap-2">
                <span className="text-amber-300 font-bold w-20">{s.from}</span>
                <span className="text-slate-400">→</span>
                <span className="text-emerald-300">
                  {s.actions.length === 0 ? '— (종료 상태)' : s.actions.join(', ')}
                </span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // LiveDataPane — 좌측 (Step 별 시각화 라우팅)
    function LiveDataPane({ step }) {
      const renderViz = () => {
        switch (step.viz) {
          case 'constraints': return <ConstraintsViz />;
          case 'naming':      return <NamingViz />;
          case 'methods':     return <MethodsViz />;
          case 'status':      return <StatusViz />;
          case 'hateoas':     return <HateoasViz />;
          default:            return null;
        }
      };
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🌿 REST 시각화 — Live Data Pane</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>
          {renderViz()}
          <div className="mt-3 bg-lime-50 border-l-4 border-lime-500 px-3 py-2 rounded-r">
            <div className="text-[9px] font-bold text-lime-700 uppercase tracking-wider mb-0.5">핵심 포인트</div>
            <p className="text-[11px] text-lime-900 leading-snug">{step.keyPoint}</p>
          </div>
        </div>
      );
    }

    // CodeViewer — 우측 (5개 탭 + highlight.js + atom-one-dark)
    function CodeViewer({ activeTabId, setActiveTabId, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);
      const tab = CODE_TABS.find((t) => t.id === activeTabId) || CODE_TABS[0];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${tab.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [tab]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 탭 바 */}
          <div className="bg-[#21252b] border-b border-slate-700">
            <div className="px-4 py-2 flex items-center gap-2 border-b border-slate-700/60">
              <div className="flex gap-1.5">
                <span className="w-3 h-3 rounded-full bg-red-500"></span>
                <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
                <span className="w-3 h-3 rounded-full bg-green-500"></span>
              </div>
              <span className="text-[11px] text-slate-400 ml-2 font-mono">REST API Spec — 5 files</span>
              <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{tab.lang}</span>
            </div>
            {/* 탭 5개 */}
            <div className="flex overflow-x-auto">
              {CODE_TABS.map((t) => {
                const active = t.id === activeTabId;
                return (
                  <button
                    key={t.id}
                    onClick={() => setActiveTabId(t.id)}
                    className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                      active
                        ? 'bg-[#282c34] text-lime-300 border-t-2 border-t-lime-400'
                        : 'bg-[#1a1d22] text-slate-500 hover:text-slate-300 hover:bg-[#21252b]'
                    }`}
                  >
                    {t.filename}
                  </button>
                );
              })}
            </div>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${tab.lang}`}>{tab.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[42rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || tab.lines).map((lineHtml, i) => {
                  const highlighted = tab.highlight && tab.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-lime-500/15 border-l-2 border-lime-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{tab.lines.length} lines · {tab.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // App — 메인 컨테이너 (4버튼 + 키보드 ←/→ + 3000ms autoplay + 탭 자동 동기화)
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [activeTabId, setActiveTabId] = useState(CODE_TABS[0].id);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          const next = i + 1;
          setActiveTabId(CODE_TABS[next].id);
          return next;
        });
      };
      const handlePrev = () => setStepIdx((i) => {
        const prev = Math.max(0, i - 1);
        setActiveTabId(CODE_TABS[prev].id);
        return prev;
      });
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) {
          setStepIdx(0);
          setActiveTabId(CODE_TABS[0].id);
        }
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setActiveTabId(CODE_TABS[0].id);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; 목차로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter V-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-lime-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. REST API &gt; Chapter 1. REST 기초</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">V-1-1. REST 원칙 + HTTP 메서드</h1>
                  <p className="text-sm text-slate-500 mt-0.5">자원 명사 + 메서드 동사 → 상태 코드 → HATEOAS 까지</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                activeTabId={activeTabId}
                setActiveTabId={setActiveTabId}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-300 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: REST는 <strong>6 제약</strong>을 지키는 아키텍처 스타일. URL은 <strong>명사</strong>, 메서드는 <strong>동사</strong>, 상태 코드는 <strong>결과 보고서</strong>. HATEOAS까지 가면 응답이 다음 행동을 알려준다. 다음(V-1-2)에서는 FastAPI APIRouter로 실제 CRUD 엔드포인트를 구현한다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-100">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-100">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['REST', 'Resource', 'HTTP Methods', 'Idempotent', '201 Created', '404 Not Found', 'HATEOAS', 'Richardson Lv3'].map((kw) => (
                <span key={kw} className="bg-lime-50 text-lime-700 px-3 py-1 rounded-full text-xs font-medium border border-lime-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-04-04-jpa-best-practices.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; IV-4 JPA Best Practices</a>
              <a href="./chapter-05-02-spring-rest.html" className="text-lime-700 hover:text-lime-900 font-medium">V-1-2 FastAPI APIRouter &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0 (atom-one-dark)
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
