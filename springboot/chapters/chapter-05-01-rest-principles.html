<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter V-1-1 — REST 원칙과 HTTP 메서드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'concept', label:'① REST란', desc:'[STEP 1] REST = URL로 자원(Resource)을 표현하고, HTTP 메서드로 행동을 표현하는 설계 방식. "창고에 무엇이 있느냐"는 URL이 답하고, "무엇을 할 것이냐"는 HTTP 메서드가 답한다.', phase:'concept' },
      { id:'methods', label:'② 5가지 HTTP 메서드', desc:'[STEP 2] GET=조회, POST=생성, PUT=전체 수정, PATCH=부분 수정, DELETE=삭제. URL에 동사를 넣는 것은 안티패턴이다. /getUser가 아니라 GET /users/1로 표현한다.', phase:'methods' },
      { id:'spring', label:'③ Spring 매핑 애노테이션', desc:'[STEP 3] Spring Boot에서 @GetMapping, @PostMapping, @PutMapping, @PatchMapping, @DeleteMapping으로 각 HTTP 메서드를 처리한다. URL 패턴과 메서드를 1:1로 연결한다.', phase:'spring' },
      { id:'anti', label:'④ 안티패턴 vs 올바른 설계', desc:'[STEP 4] /getUser, /createUser, /deleteUser 같은 URL은 REST가 아니다. 자원(users)을 URL에, 행동(CRUD)을 HTTP 메서드에 분리하는 것이 핵심이다.', phase:'anti' },
      { id:'why', label:'⑤ 왜 REST인가', desc:'[STEP 5] REST 규칙을 따르면 API 사용자(프론트엔드, 모바일)가 URL과 메서드만 보고 기능을 예측할 수 있다. 이 예측 가능성이 대규모 팀에서 커뮤니케이션 비용을 줄인다.', phase:'why' },
    ];

    const METHODS = [
      { method:'GET', role:'조회', example:'GET /users/1', color:'sky', icon:'🔍', annotation:'@GetMapping' },
      { method:'POST', role:'생성', example:'POST /users', color:'emerald', icon:'➕', annotation:'@PostMapping' },
      { method:'PUT', role:'전체 수정', example:'PUT /users/1', color:'amber', icon:'📝', annotation:'@PutMapping' },
      { method:'PATCH', role:'부분 수정', example:'PATCH /users/1', color:'violet', icon:'✏️', annotation:'@PatchMapping' },
      { method:'DELETE', role:'삭제', example:'DELETE /users/1', color:'rose', icon:'🗑️', annotation:'@DeleteMapping' },
    ];

    const colorMap = {
      sky:'bg-sky-100 border-sky-300 text-sky-800', emerald:'bg-emerald-100 border-emerald-300 text-emerald-800',
      amber:'bg-amber-100 border-amber-300 text-amber-800', violet:'bg-violet-100 border-violet-300 text-violet-800',
      rose:'bg-rose-100 border-rose-300 text-rose-800'
    };

    function V({ phase }) {
      if (phase==='concept') return (
        <div className="max-w-md mx-auto space-y-3 text-center">
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-sky-50 p-4 rounded-xl border border-sky-200"><div className="text-2xl mb-1">📦</div><div className="font-bold text-sky-800">URL = 자원</div><div className="text-xs text-sky-600">/users, /orders, /products</div></div>
            <div className="bg-amber-50 p-4 rounded-xl border border-amber-200"><div className="text-2xl mb-1">⚡</div><div className="font-bold text-amber-800">HTTP 메서드 = 행동</div><div className="text-xs text-amber-600">GET, POST, PUT, DELETE</div></div>
          </div>
          <div className="bg-slate-800 p-3 rounded-lg text-sm text-slate-200 font-mono">GET /users/1 → "1번 사용자를 <span className="text-emerald-400">조회</span>해라"</div>
        </div>
      );
      if (phase==='methods') return (
        <div className="max-w-lg mx-auto space-y-2">
          {METHODS.map(m => (
            <div key={m.method} className={`flex items-center gap-3 px-4 py-2 rounded-lg border ${colorMap[m.color]}`}>
              <span className="text-lg">{m.icon}</span>
              <span className="font-bold text-sm w-16">{m.method}</span>
              <span className="text-sm flex-1">{m.role}</span>
              <span className="text-xs font-mono opacity-70">{m.example}</span>
            </div>
          ))}
        </div>
      );
      if (phase==='spring') return (
        <div className="max-w-lg mx-auto">
          <div className="bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300 space-y-1">
            {METHODS.map(m => (
              <div key={m.method}><span className="text-yellow-300">{m.annotation}</span>(<span className="text-emerald-400">"/users"</span>) <span className="text-slate-500">// {m.role}</span></div>
            ))}
          </div>
        </div>
      );
      if (phase==='anti') return (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-lg mx-auto">
          <div className="bg-rose-50 p-4 rounded-xl border border-rose-200"><div className="font-bold text-rose-800 mb-2">❌ 안티패턴</div>
            {['/getUser','/createUser','/deleteUser','/updateUser'].map(u=>(<div key={u} className="text-sm text-rose-700 font-mono line-through">{u}</div>))}
          </div>
          <div className="bg-emerald-50 p-4 rounded-xl border-2 border-emerald-400 ring-2 ring-emerald-300 shadow"><div className="font-bold text-emerald-800 mb-2">✅ REST</div>
            {['GET /users/1','POST /users','DELETE /users/1','PUT /users/1'].map(u=>(<div key={u} className="text-sm text-emerald-700 font-mono">{u}</div>))}
          </div>
        </div>
      );
      return (
        <div className="max-w-md mx-auto bg-slate-800 p-5 rounded-xl text-center">
          <div className="text-emerald-400 font-bold text-lg mb-2">URL + 메서드만 보고 기능을 예측 가능</div>
          <div className="text-slate-400 text-sm">= 대규모 팀에서 커뮤니케이션 비용 감소</div>
        </div>
      );
    }

    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter V-1-1</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">REST 원칙과 HTTP 메서드</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600">REST 설계 원칙과 <b>GET/POST/PUT/PATCH/DELETE</b> 5가지 ���서드의 역할을 체험합니다.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[260px] flex items-center justify-center"><div className="w-full"><V phase={step.phase}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
