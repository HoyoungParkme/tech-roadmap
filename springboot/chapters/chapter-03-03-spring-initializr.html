<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter III-2-1 — Spring Initializr 사용하기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'analogy', label:'① 레고 주문서 비유', desc:'[STEP 1] Spring Initializr = 레고 기본 블록 세트 주문서. 필요한 부품을 체크박스로 고르면, 조립된 시작 상태의 프로젝트를 zip으로 내려받는다.', phase:'analogy' },
      { id:'settings', label:'② 기본 설정', desc:'[STEP 2] Project: Gradle · Language: Java · Spring Boot: 최신 안정 버전 · Packaging: Jar · Java: 17. 이 5가지를 선택하면 기본 뼈대가 결정된다.', phase:'settings' },
      { id:'deps', label:'③ 의존성 추가', desc:'[STEP 3] ADD DEPENDENCIES에서 Spring Web을 추가한다. 이것만으로 REST API를 만들기에 충분한 최소 세팅이 완성된다. GENERATE 버튼으로 zip 다운로드.', phase:'deps' },
      { id:'starter', label:'④ Starter란', desc:'[STEP 4] Starter = 세트 메뉴. spring-boot-starter-web 하나를 추가하면 내장 Tomcat + Spring MVC + Jackson이 한꺼번에 들어온다. 버전 충돌 없이 검증된 조합이 자동으로 구성된다.', phase:'starter' },
      { id:'done', label:'⑤ 프로젝트 열기', desc:'[STEP 5] zip 압축 해제 → IntelliJ에서 build.gradle 열기 → 의존성 자동 다운로드 완료. 이제 핵심 코드에만 집중할 수 있다.', phase:'done' },
    ];

    const SETTINGS = [
      { label: 'Project', value: 'Gradle - Groovy', icon: '⚙️' },
      { label: 'Language', value: 'Java', icon: '☕' },
      { label: 'Spring Boot', value: '3.3.x (최신 안정)', icon: '🌱' },
      { label: 'Packaging', value: 'Jar', icon: '📦' },
      { label: 'Java', value: '17', icon: '🔢' },
    ];

    function V({ phase }) {
      if (phase === 'analogy') return (
        <div className="flex items-center justify-center gap-4 flex-wrap">
          <div className="bg-amber-50 p-5 rounded-xl border border-amber-200 text-center"><div className="text-3xl mb-2">🧱</div><div className="font-bold text-amber-800">레고 주문서</div><div className="text-xs text-amber-600">필요한 부품 체크</div></div>
          <div className="text-2xl text-slate-400">→</div>
          <div className="bg-emerald-50 p-5 rounded-xl border border-emerald-200 text-center"><div className="text-3xl mb-2">📦</div><div className="font-bold text-emerald-800">조립된 프로젝트</div><div className="text-xs text-emerald-600">zip 다운로드</div></div>
          <div className="text-2xl text-slate-400">→</div>
          <div className="bg-sky-50 p-5 rounded-xl border border-sky-200 text-center"><div className="text-3xl mb-2">💻</div><div className="font-bold text-sky-800">바로 코딩 시작</div><div className="text-xs text-sky-600">초기 설정 불필요</div></div>
        </div>
      );
      if (phase === 'settings') return (
        <div className="max-w-md mx-auto bg-slate-50 p-4 rounded-xl border border-slate-200">
          <div className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">start.spring.io 설정</div>
          {SETTINGS.map(s => (
            <div key={s.label} className="flex items-center gap-3 py-2 border-b border-slate-100 last:border-0">
              <span className="text-lg">{s.icon}</span>
              <span className="text-sm font-semibold text-slate-700 w-24">{s.label}</span>
              <span className="text-sm bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded">{s.value}</span>
            </div>
          ))}
        </div>
      );
      if (phase === 'deps') return (
        <div className="max-w-md mx-auto space-y-3">
          <div className="bg-emerald-50 p-4 rounded-xl border-2 border-emerald-400 ring-2 ring-emerald-300 shadow-lg text-center">
            <div className="text-xl mb-1">🌐</div>
            <div className="font-bold text-emerald-800">Spring Web</div>
            <div className="text-xs text-emerald-600">REST API의 최소 필수 의존성</div>
          </div>
          <div className="flex justify-center"><div className="bg-green-700 text-white px-6 py-2 rounded-lg font-bold text-sm shadow">GENERATE ↓</div></div>
          <div className="text-center text-xs text-slate-500">zip 파일이 다운로드된다</div>
        </div>
      );
      if (phase === 'starter') return (
        <div className="max-w-md mx-auto">
          <div className="bg-amber-50 p-4 rounded-xl border border-amber-200 text-center mb-3">
            <div className="font-bold text-amber-800 mb-2">🍔 세트 메뉴 = Starter</div>
            <div className="text-sm text-amber-700">spring-boot-starter-web 하나에:</div>
          </div>
          <div className="grid grid-cols-3 gap-2">
            {[{name:'내장 Tomcat',icon:'🖥️'},{name:'Spring MVC',icon:'🔀'},{name:'Jackson',icon:'📋'}].map(i=>(
              <div key={i.name} className="bg-white p-3 rounded-lg border border-slate-200 text-center"><div className="text-xl mb-1">{i.icon}</div><div className="text-xs font-semibold">{i.name}</div></div>
            ))}
          </div>
          <div className="mt-3 text-center text-xs text-slate-500">버전 충돌 없는 검증된 조합이 자동으로 구성된다</div>
        </div>
      );
      return (<div className="text-center space-y-3"><div className="text-4xl">🎉</div><div className="text-lg font-bold text-emerald-800">프로젝트 생성 완료</div><div className="text-sm text-slate-500">zip → IntelliJ → build.gradle → 코딩 시작!</div></div>);
    }

    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),3500);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter III-2-1</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">Spring Initializr 사용하기</h1><span className="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full">★★☆</span></div><p className="text-slate-600"><b>start.spring.io</b>에서 프로젝트를 생성하는 과정을 단계별로 안내합니다.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[240px] flex items-center justify-center"><div className="w-full"><V phase={step.phase}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
