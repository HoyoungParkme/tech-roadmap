          ],

    // ─────────────────────────────────────────────────────
    // CompareCard — 좌측 비교 카드 (Spring vs Boot)
    //   tone: 'red' | 'rose' | 'amber' | 'lime' | 'sky'
    // ─────────────────────────────────────────────────────
    function CompareCard({ side, label, icon, items, isFocus }) {
      const isSpring = side === 'spring';
      const ring = isFocus
        ? (isSpring ? 'border-rose-400 ring-2 ring-rose-200' : 'border-lime-500 ring-2 ring-lime-200')
        : 'border-slate-200';
      const head = isSpring
        ? 'bg-rose-100 text-rose-700'
        : 'bg-lime-100 text-lime-800';
      const toneMap = {
        red:   'bg-red-100 text-red-700 border-red-300',
        rose:  'bg-rose-100 text-rose-700 border-rose-300',
        amber: 'bg-amber-100 text-amber-800 border-amber-300',
        lime:  'bg-lime-100 text-lime-800 border-lime-300',
        sky:   'bg-sky-100 text-sky-800 border-sky-300',
      };
      return (
        <div className={`rounded-lg border-2 ${ring} bg-white overflow-hidden transition`}>
          <div className={`px-2.5 py-1.5 text-[11px] font-bold uppercase tracking-wider ${head} flex items-center justify-between`}>
            <span>{icon} {label}</span>
            <span className="text-[9px] font-mono opacity-70">{isSpring ? '옛날' : '요즘'}</span>
          </div>
          <div className="p-2.5 space-y-1.5">
            {items.map((it, i) => (
              <div key={i} className="flex items-start gap-1.5">
                <span className={`text-[8px] font-mono px-1.5 py-0.5 rounded ${toneMap[it.tone] || toneMap.amber} border font-bold uppercase tracking-wide flex-shrink-0`}>
                  {it.tag}
                </span>
                <span className="text-[11px] text-slate-700 leading-tight">{it.text}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // CodeAmountBars — 코드 양 비교 막대 그래프
    //   side: 'spring' (rose) / 'boot' (lime)
    // ─────────────────────────────────────────────────────
    function CodeAmountBars({ bars }) {
      const max = Math.max(...bars.map((b) => b.lines), 1);
      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">
          <div className="bg-slate-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-slate-600 flex items-center justify-between">
            <span>📊 코드 양 비교 (라인/단계 수)</span>
            <span className="text-[9px] font-mono text-slate-500">lower is better</span>
          </div>
          <div className="p-3 space-y-2">
            {bars.map((b, i) => {
              const pct = Math.max((b.lines / max) * 100, 4);
              const color = b.side === 'spring' ? 'bg-rose-400' : 'bg-lime-500';
              const text  = b.side === 'spring' ? 'text-rose-700' : 'text-lime-700';
              return (
                <div key={i}>
                  <div className="flex justify-between text-[10px] font-mono mb-0.5">
                    <span className={`font-bold ${text}`}>{b.label}</span>
                    <span className="text-slate-500">{b.lines}</span>
                  </div>
                  <div className="h-3 bg-slate-100 rounded-full overflow-hidden">
                    <div className={`h-full ${color} transition-all duration-500 rounded-full`} style={{ width: `${pct}%` }} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // FlowArrow — 변환 흐름 화살표 (수직)
    // ─────────────────────────────────────────────────────
    function FlowArrow({ label }) {
      return (
        <div className="flex items-center justify-center my-1">
          <div className="flex flex-col items-center">
            <div className="text-[9px] text-lime-700 font-mono font-bold tracking-wider uppercase">{label}</div>
            <div className="text-lime-500 text-lg leading-none">↓</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    //   상단 : Spring(좌) ↔ Boot(우) 비교 카드
    //   ↓ Spring Boot 가 해결
    //   하단 : 코드 양 비교 막대
    //   + 핵심 포인트 박스 + 범례
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const focusSpring = step.highlight === 'spring' || step.highlight === 'both';
      const focusBoot   = step.highlight === 'boot'   || step.highlight === 'both';
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🌱 Spring 옛날 ↔ Spring Boot 요즘 — 무엇이 달라졌나</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2">
            {/* 좌/우 비교 카드 */}
            <div className="grid grid-cols-2 gap-2">
              <CompareCard
                side="spring"
                label={step.leftLabel}
                icon={step.leftIcon}
                items={step.leftItems}
                isFocus={focusSpring}
              />
              <CompareCard
                side="boot"
                label={step.rightLabel}
                icon={step.rightIcon}
                items={step.rightItems}
                isFocus={focusBoot}
              />
            </div>

            <FlowArrow label="Spring Boot가 해결" />

            {/* 코드 양 비교 막대 */}
            <CodeAmountBars bars={step.bars} />
          </div>

          {/* 핵심 포인트 박스 */}
          <div className="mt-3 bg-lime-50 border-l-4 border-lime-500 px-3 py-2 rounded-r">
            <div className="text-[9px] font-bold text-lime-700 uppercase tracking-wider mb-0.5">핵심 포인트</div>
            <p className="text-[11px] text-lime-900 leading-snug">{step.keyPoint}</p>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-400"></span>Spring 옛날
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-lime-500"></span>Spring Boot 요즘
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-400"></span>주의
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-400"></span>참고
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   파일명 탭 (5개) + 윈도우 dot + 라인 번호 + 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ stepIdx, total, onTabClick }) {
      const code = STEPS[stepIdx].code;
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 5개 파일 탭 */}
          <div className="bg-[#21252b] px-3 py-2 flex items-center gap-2 border-b border-slate-700 overflow-x-auto">
            <div className="flex gap-1.5 flex-shrink-0">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <div className="flex gap-1 ml-2 flex-shrink-0">
              {STEPS.map((s, i) => {
                const active = i === stepIdx;
                return (
                  <button
                    key={s.code.filename}
                    onClick={() => onTabClick(i)}
                    className={`px-2.5 py-1 text-[10px] font-mono rounded-t border-b-2 transition ${
                      active
                        ? 'bg-[#282c34] text-lime-300 border-lime-400'
                        : 'bg-[#1b1e23] text-slate-400 border-transparent hover:text-slate-200'
                    }`}
                  >
                    {s.code.filename}
                  </button>
                );
              })}
            </div>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase flex-shrink-0">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-lime-500/15 border-l-2 border-lime-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; 목차로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter I-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-lime-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. Java/Spring 기초 &gt; Chapter 2. Spring의 진화</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">I-2-2. Spring Boot가 해결한 것</h1>
                  <p className="text-sm text-slate-500 mt-0.5">XML 설정 지옥 / Tomcat 분리 / 의존성 충돌 — 그리고 해결책</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer stepIdx={stepIdx} total={STEPS.length} onTabClick={(i) => { setStepIdx(i); setIsPlaying(false); }} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-400 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: Spring Boot가 해결한 3대 고통은 <strong>XML 설정 지옥(→ auto-configuration)</strong>,
                <strong> Tomcat 분리 배포(→ embedded Tomcat)</strong>, <strong>의존성 버전 충돌(→ starter + BOM)</strong>이다.
                다음(I-3-1)에서는 그래서 Spring Boot가 "라이브러리"인지 "프레임워크"인지 정리한다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Spring Boot', 'auto-configuration', 'starter', 'BOM', 'embedded Tomcat', 'fat jar', '@SpringBootApplication', 'application.yml'].map((kw) => (
                <span key={kw} className="bg-lime-50 text-lime-700 px-3 py-1 rounded-full text-xs font-medium border border-lime-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-01-04-servlet-to-spring.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; I-2-1 Servlet에서 Spring까지</a>
              <a href="./chapter-01-06-library-vs-framework.html" className="text-lime-700 hover:text-lime-900 font-medium">I-3-1 라이브러리 vs 프레임워크 &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
