<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter I-2-2 — Spring Boot가 해결한 것</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter I-2-2 — Spring Boot가 해결한 것: Before/After 비교 시각화 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { id: 'pain', label: '① 기존의 고통',
        desc: '[STEP 1 — 문제] 기존 Spring Framework로 프로젝트를 시작하려면 XML 설정 수십 줄, Tomcat 별도 설치, 라이브러리 버전 충돌 해결이 필요했다. 코드 한 줄 쓰기 전에 하루를 날릴 수 있었다.',
        focus: 'before' },
      { id: 'auto', label: '② 자동 설정',
        desc: '[STEP 2 — Auto-configuration] Spring Boot는 프로젝트에 어떤 라이브러리가 포함되어 있는지 스스로 파악하고 설정을 자동 적용한다. DB 라이브러리가 있으면 DB 연결 설정을 알아서 만든다. 스마트 가전이 환경을 감지해 온도를 맞추는 것과 같다.',
        focus: 'solution1' },
      { id: 'tomcat', label: '③ 내장 Tomcat',
        desc: '[STEP 3 — 내장 서버] Spring Boot는 Tomcat을 프로젝트 안에 포함시킨다. 별도 서버 설치 없이 빌드된 JAR 파일 하나를 실행하면 서버가 바로 올라온다.',
        focus: 'solution2' },
      { id: 'initializr', label: '④ Spring Initializr',
        desc: '[STEP 4 — Initializr] start.spring.io에서 필요한 기능을 체크박스로 고르면 프로젝트 기본 뼈대를 zip으로 생성해준다. 압축 해제하고 IDE에서 열면 즉시 코딩 시작.',
        focus: 'solution3' },
      { id: 'result', label: '⑤ 결과',
        desc: '[STEP 5 — 효과] 이 세 가지 덕분에 숙련된 개발자도 반나절 걸리던 초기 세팅이 10분 안에 끝난다. Spring Boot의 핵심 편의 기능을 알아야 이후 개발 환경 구축을 이해하고 따라갈 수 있다.',
        focus: 'after' },
    ];

    function BeforeAfter({ focus }) {
      const beforeItems = [
        { icon: '📄', text: 'XML 설정 파일 수십 줄 직접 작성', lines: 12 },
        { icon: '🔧', text: 'Tomcat 별도 다운로드·설치·설정', lines: 8 },
        { icon: '💥', text: '라이브러리 버전 충돌 수동 해결', lines: 6 },
        { icon: '⏰', text: '초기 세팅에 반나절 이상', lines: 0 },
      ];

      const solutions = [
        { id: 'solution1', icon: '⚡', title: '자동 설정', sub: 'Auto-configuration', desc: '라이브러리 감지 → 설정 자동 적용', analogy: '🏠 스마트 가전이 환경을 감지해 온도를 맞추는 것', color: 'emerald' },
        { id: 'solution2', icon: '📦', title: '내장 Tomcat', sub: 'Embedded Server', desc: 'JAR 하나 = 서버 + 앱 모두 포함', analogy: '🎒 캐리어 하나에 모든 짐이 들어있는 것', color: 'sky' },
        { id: 'solution3', icon: '🎯', title: 'Spring Initializr', sub: 'start.spring.io', desc: '체크박스로 고르면 프로젝트 생성', analogy: '🍕 피자 주문처럼 토핑을 고르면 완성', color: 'violet' },
      ];

      const showBefore = focus === 'before' || focus === 'after';
      const showAfter = focus === 'after';

      return (
        <div className="space-y-6">
          {/* Before */}
          {(focus === 'before' || focus === 'after') && (
            <div>
              <div className="text-xs font-bold text-rose-500 uppercase tracking-widest mb-2">
                {focus === 'after' ? '❌ BEFORE (기존)' : '😤 기존 Spring Framework의 고통'}
              </div>
              <div className={`grid grid-cols-2 md:grid-cols-4 gap-2 transition-all duration-500 ${focus === 'after' ? 'opacity-40 scale-95' : ''}`}>
                {beforeItems.map((item, i) => (
                  <div key={i} className="bg-rose-50 p-3 rounded-lg border border-rose-200 text-center">
                    <div className="text-xl mb-1">{item.icon}</div>
                    <div className="text-xs text-rose-700">{item.text}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Solutions */}
          {(focus.startsWith('solution') || focus === 'after') && (
            <div>
              {focus !== 'after' && (
                <div className="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-2">✨ Spring Boot의 해결책</div>
              )}
              {focus === 'after' && (
                <div className="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-2">✅ AFTER (Spring Boot)</div>
              )}
              <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                {solutions.map(s => {
                  const isActive = focus === s.id || focus === 'after';
                  const colorMap = {
                    emerald: { bg: 'bg-emerald-50', border: 'border-emerald-400', ring: 'ring-emerald-300', text: 'text-emerald-800' },
                    sky: { bg: 'bg-sky-50', border: 'border-sky-400', ring: 'ring-sky-300', text: 'text-sky-800' },
                    violet: { bg: 'bg-violet-50', border: 'border-violet-400', ring: 'ring-violet-300', text: 'text-violet-800' },
                  };
                  const c = colorMap[s.color];

                  return (
                    <div key={s.id} className={`p-4 rounded-xl border-2 transition-all duration-500 ${
                      isActive ? `${c.bg} ${c.border} ring-2 ${c.ring} shadow-lg` : 'bg-white border-slate-200 opacity-30'
                    }`}>
                      <div className="text-2xl mb-2 text-center">{s.icon}</div>
                      <div className={`font-bold text-center ${isActive ? c.text : 'text-slate-400'}`}>{s.title}</div>
                      <div className="text-xs text-slate-500 text-center mb-2">{s.sub}</div>
                      {isActive && (
                        <>
                          <div className="text-sm text-slate-700 mb-2">{s.desc}</div>
                          <div className="bg-amber-50 px-2 py-1 rounded text-xs text-amber-700 border border-amber-200">{s.analogy}</div>
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* 결과 */}
          {focus === 'after' && (
            <div className="bg-slate-800 text-slate-200 p-4 rounded-lg text-center">
              <div className="text-2xl mb-2">⏰ → ⚡</div>
              <div className="text-lg font-bold text-emerald-400">반나절 → 10분</div>
              <div className="text-sm text-slate-400 mt-1">초기 세팅 시간이 극적으로 단축되었다</div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <div className="flex justify-between items-center text-sm">
              <a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a>
              <span className="text-slate-400">Chapter I-2-2</span>
            </div>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div>
                <h1 className="text-2xl font-bold">Spring Boot가 해결한 것</h1>
                <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">★☆☆</span>
              </div>
              <p className="text-slate-600">
                기존 Spring의 <b>3가지 고통</b>을 Spring Boot가 어떻게 해결했는지 Before/After로 비교합니다.
              </p>
            </header>

            <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <BeforeAfter focus={stepData.focus} />
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length} — {stepData.label}
              </div>
            </div>

            <div className="flex justify-center gap-2">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                  className={`w-3 h-3 rounded-full transition-all ${i === currentStepIdx ? 'bg-green-700 scale-125' : 'bg-slate-300 hover:bg-slate-400'}`} />
              ))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
