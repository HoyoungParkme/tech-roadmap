<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter II-1-1 — 클래스 로딩과 메모리 구조</title>
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React 18 (development) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel Standalone 7.x -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter II-1-1 — ClassLoader(사서) → JVM 메모리 3영역 배치 시각화 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { id: 'overview', label: '① 두 가지 핵심 작업',
        desc: '[STEP 1 — 개요] Java 프로그램 실행 = 두 가지 일이 일어난다. ① 필요한 코드 조각(클래스)을 메모리로 불러온다. ② 불러온 코드를 정해진 메모리 공간에 배치해서 실행한다. 이 두 과정을 ClassLoader와 JVM 메모리 구조가 담당한다.',
        highlight: [] },
      { id: 'classloader', label: '② ClassLoader (사서)',
        desc: '[STEP 2 — ClassLoader] 도서관 서고(파일 시스템)에 수천 권의 책(.class 파일)이 있다. 사서(ClassLoader)가 프로그램이 필요로 하는 책만 그때그때 꺼내서 열람석(JVM 메모리)으로 가져다 놓는다. 모든 책을 처음부터 다 꺼내지 않으므로 메모리를 효율적으로 쓸 수 있다.',
        highlight: ['loader'] },
      { id: 'method', label: '③ Method Area (설계도)',
        desc: '[STEP 3 — Method Area] 클래스의 설계도 — 어떤 기능이 있는지, 어떤 변수가 있는지 정보를 저장하는 공간이다. "이 책의 목차와 색인"에 해당한다. 모든 스레드가 공유한다.',
        highlight: ['loader', 'method'] },
      { id: 'heap', label: '④ Heap (데이터 창고)',
        desc: '[STEP 4 — Heap] 프로그램이 실행 중에 만들어낸 실제 데이터(객체)가 저장되는 창고다. Spring Bean 대부분이 여기 올라간다. 가장 크고 중요한 영역이며, 여기서 쓰이다 버려진 데이터를 GC가 정리한다.',
        highlight: ['loader', 'method', 'heap'] },
      { id: 'stack', label: '⑤ Stack (작업 기록)',
        desc: '[STEP 5 — Stack] "지금 이 함수를 실행 중이고, 다음에는 저 함수를 실행할 것"이라는 호출 순서와 임시 변수를 기록한다. 각 스레드마다 별도 Stack이 생긴다. 함수 호출이 끝나면 해당 기록은 자동으로 사라진다.',
        highlight: ['loader', 'method', 'heap', 'stack'] },
    ];

    function MemoryDiagram({ highlight }) {
      const isActive = (id) => highlight.includes(id);

      const areas = [
        { id: 'method', icon: '📋', name: 'Method Area', sub: '클래스 설계도 · 목차/색인', color: 'violet' },
        { id: 'heap', icon: '📦', name: 'Heap', sub: '객체(데이터) 창고 · Spring Bean', color: 'emerald' },
        { id: 'stack', icon: '📝', name: 'Stack', sub: '함수 호출 순서 · 임시 변수', color: 'sky' },
      ];

      const colorMap = {
        violet: { bg: 'bg-violet-100', border: 'border-violet-400', ring: 'ring-violet-300', text: 'text-violet-800' },
        emerald: { bg: 'bg-emerald-100', border: 'border-emerald-400', ring: 'ring-emerald-300', text: 'text-emerald-800' },
        sky: { bg: 'bg-sky-100', border: 'border-sky-400', ring: 'ring-sky-300', text: 'text-sky-800' },
      };

      return (
        <div className="space-y-4">
          {/* ClassLoader */}
          <div className={`p-4 rounded-xl border-2 transition-all duration-500 text-center ${
            isActive('loader') ? 'bg-amber-100 border-amber-400 ring-2 ring-amber-300 shadow-lg scale-[1.02]' : 'bg-white border-slate-200'
          }`}>
            <div className="flex items-center justify-center gap-3">
              <span className="text-2xl">📚</span>
              <div>
                <div className={`font-bold ${isActive('loader') ? 'text-amber-800' : 'text-slate-400'}`}>ClassLoader (사서)</div>
                <div className="text-xs text-slate-500">.class 파일을 서고에서 꺼내 메모리로 적재</div>
              </div>
            </div>
            {isActive('loader') && (
              <div className="mt-2 flex justify-center gap-2 text-xs">
                {['UserService.class', 'UserRepository.class', 'Application.class'].map(f => (
                  <span key={f} className="bg-amber-50 px-2 py-1 rounded border border-amber-200 text-amber-700">{f}</span>
                ))}
              </div>
            )}
          </div>

          {/* 화살표 */}
          {isActive('loader') && (
            <div className="flex justify-center">
              <svg width="16" height="24" viewBox="0 0 24 32" fill="none" stroke="#f59e0b" strokeWidth="2">
                <path d="M12 4v24M6 22l6 6 6-6"/>
              </svg>
            </div>
          )}

          {/* JVM 메모리 영역 */}
          <div className={`p-4 rounded-xl border-2 transition-all duration-500 ${
            highlight.length > 1 ? 'bg-slate-50 border-slate-300' : 'bg-white border-slate-200'
          }`}>
            <div className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3 text-center">JVM 메모리 (열람석)</div>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
              {areas.map(area => {
                const c = colorMap[area.color];
                const active = isActive(area.id);
                return (
                  <div key={area.id} className={`p-4 rounded-xl border-2 transition-all duration-500 text-center ${
                    active ? `${c.bg} ${c.border} ring-2 ${c.ring} shadow-lg scale-105` : 'bg-white border-slate-200 opacity-40'
                  }`}>
                    <div className="text-2xl mb-2">{area.icon}</div>
                    <div className={`font-bold text-sm ${active ? c.text : 'text-slate-400'}`}>{area.name}</div>
                    <div className="text-xs text-slate-500 mt-1">{area.sub}</div>
                    {active && area.id === 'heap' && (
                      <div className="mt-2 text-xs bg-emerald-50 px-2 py-1 rounded border border-emerald-200 text-emerald-700">
                        🧹 GC가 여기를 청소
                      </div>
                    )}
                    {active && area.id === 'stack' && (
                      <div className="mt-2 text-xs bg-sky-50 px-2 py-1 rounded border border-sky-200 text-sky-700">
                        스레드마다 별도 생성
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* 비유 요약 */}
          <div className="bg-amber-50 p-3 rounded-lg border border-amber-200 text-sm text-amber-800">
            <span className="font-bold">📖 비유:</span> ClassLoader = 도서관 사서 · Method Area = 목차/색인 · Heap = 데이터 창고 · Stack = 작업 메모
          </div>
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3500); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <div className="flex justify-between items-center text-sm">
              <a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a>
              <span className="text-slate-400">Chapter II-1-1</span>
            </div>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div>
                <h1 className="text-2xl font-bold">클래스 로딩과 메모리 구조</h1>
                <span className="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full">★★☆</span>
              </div>
              <p className="text-slate-600">ClassLoader가 <b>.class 파일을 메모리에 적재</b>하고, JVM이 <b>Method Area · Heap · Stack</b> 세 영역에 배치하는 과정을 체험합니다.</p>
            </header>
            <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <MemoryDiagram highlight={stepData.highlight} />
            </div>
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length} — {stepData.label}</div>
            </div>
            <div className="flex justify-center gap-2">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                  className={`w-3 h-3 rounded-full transition-all ${i === currentStepIdx ? 'bg-green-700 scale-125' : 'bg-slate-300 hover:bg-slate-400'}`} />
              ))}
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
