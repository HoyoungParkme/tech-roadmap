<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter IV-3-1 — AOP와 @Transactional</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'analogy', label:'① CCTV 비유', desc:'[STEP 1] 대형 건물에 보안 CCTV를 설치한다. 각 사무실마다 CCTV를 따로 운영하는 대신, 건물 복도에 통합 CCTV를 설치해 모든 출입을 한 곳에서 관찰한다. AOP가 바로 이 구조다. 로깅, 트랜잭션, 인증 같은 반복 코드를 핵심 로직과 분리한다.', phase:'analogy' },
      { id:'terms', label:'② 핵심 용어', desc:'[STEP 2] Pointcut = "어디에" 적용할지 (예: service 패키지의 모든 메서드). Advice = "언제, 무엇을" 실행할지 (@Before, @After, @Around). Aspect = Pointcut + Advice를 묶은 모듈이다.', phase:'terms' },
      { id:'proxy', label:'③ Proxy 패턴', desc:'[STEP 3] Spring AOP는 Proxy 패턴으로 구현된다. Spring이 원본 Bean 대신 프록시 객체를 생성해서 메서드 호출을 가로채고, Advice 코드를 실행한 뒤 원본 메서드를 호출한다. 호출자는 프록시인지 원본인지 모른다.', phase:'proxy' },
      { id:'transactional', label:'④ @Transactional', desc:'[STEP 4] 실무에서 가장 자주 보는 AOP. @Transactional 하나가 "트랜잭션 시작 → 메서드 실행 → 성공 시 커밋 → 실패 시 롤백" 4단계를 자동 처리한다. 개발자는 트랜잭션 코드를 직접 쓰지 않는다.', phase:'transactional' },
      { id:'caution', label:'⑤ 주의 사항', desc:'[STEP 5] AOP와 Proxy를 모르면 @Transactional이 붙었는데도 롤백이 안 되는 상황(같은 클래스 내 메서드 호출 시 Proxy 우회)을 이해하기 어렵다. 이것이 AOP를 알아야 하는 가장 실무적인 이유다.', phase:'caution' },
    ];

    function V({ phase }) {
      if (phase === 'analogy') return (
        <div className="space-y-4 max-w-lg mx-auto">
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-rose-50 p-4 rounded-xl border border-rose-200 text-center">
              <div className="text-2xl mb-1">📹📹📹</div>
              <div className="font-bold text-sm text-rose-800">각 사무실마다 CCTV</div>
              <div className="text-xs text-rose-600 mt-1">= 모든 메서드에 로깅 코드</div>
              <div className="text-xs text-rose-500">코드 반복 + 유지보수 지옥</div>
            </div>
            <div className="bg-emerald-50 p-4 rounded-xl border-2 border-emerald-400 ring-2 ring-emerald-300 shadow-lg text-center">
              <div className="text-2xl mb-1">📹</div>
              <div className="font-bold text-sm text-emerald-800">복도에 통합 CCTV</div>
              <div className="text-xs text-emerald-600 mt-1">= AOP로 한 곳에서 관리</div>
              <div className="text-xs text-emerald-500">핵심 로직과 분리!</div>
            </div>
          </div>
          <div className="text-center text-xs text-slate-500">횡단 관심사(Cross-cutting Concern) = 여러 클래스에 반복되는 로깅, 트랜잭션, 인증</div>
        </div>
      );

      if (phase === 'terms') return (
        <div className="space-y-3 max-w-md mx-auto">
          {[
            { name:'Pointcut', icon:'🎯', desc:'"어디에" 적용할지', example:'service 패키지의 모든 메서드', color:'sky' },
            { name:'Advice', icon:'⏰', desc:'"언제, 무엇을" 실행할지', example:'@Before · @After · @Around', color:'amber' },
            { name:'Aspect', icon:'📦', desc:'Pointcut + Advice 묶음', example:'LoggingAspect, TransactionAspect', color:'violet' },
          ].map(t => (
            <div key={t.name} className={`flex items-center gap-3 p-3 rounded-xl bg-${t.color}-50 border border-${t.color}-200`}>
              <span className="text-xl shrink-0">{t.icon}</span>
              <div className="flex-1">
                <div className={`font-bold text-sm text-${t.color}-800`}>{t.name}</div>
                <div className="text-xs text-slate-600">{t.desc}</div>
                <div className="text-xs text-slate-400">{t.example}</div>
              </div>
            </div>
          ))}
        </div>
      );

      if (phase === 'proxy') return (
        <div className="max-w-md mx-auto space-y-2">
          <div className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Proxy 패턴 동작</div>
          {[
            { icon:'👤', name:'호출자', sub:'orderService.placeOrder()' },
            { icon:'🛡️', name:'Proxy (Spring 생성)', sub:'Advice 코드 실행 (트랜잭션 시작)' },
            { icon:'📋', name:'원본 Bean', sub:'실제 placeOrder() 로직 실행' },
            { icon:'🛡️', name:'Proxy (돌아옴)', sub:'성공→커밋 / 실패→롤백' },
          ].map((node, i) => (
            <div key={i}>
              <div className={`flex items-center gap-3 px-4 py-2 rounded-lg border transition-all ${
                i===1||i===3 ? 'bg-violet-50 border-violet-300 font-semibold' : 'bg-white border-slate-200'
              }`}>
                <span className="text-lg">{node.icon}</span>
                <div><div className="text-sm">{node.name}</div><div className="text-xs text-slate-500">{node.sub}</div></div>
              </div>
              {i < 3 && <div className="flex justify-center"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg></div>}
            </div>
          ))}
        </div>
      );

      if (phase === 'transactional') return (
        <div className="max-w-md mx-auto space-y-3">
          <div className="bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300">
            <div><span className="text-yellow-300">@Transactional</span></div>
            <div><span className="text-pink-400">public void</span> placeOrder(OrderRequest req) {'{'}</div>
            <div>{'  '}orderRepository.save(req.toOrder());</div>
            <div>{'  '}inventoryRepository.decrease(req.getItemId());</div>
            <div>{'  '}<span className="text-slate-500">// 예외 발생 시 자동 rollback</span></div>
            <div>{'}'}</div>
          </div>
          <div className="flex gap-1">
            {['트랜잭션 시작','메서드 실행','성공→커밋','실패→롤백'].map((s,i) => (
              <div key={i} className={`flex-1 text-center text-xs py-2 rounded ${i===3?'bg-rose-100 text-rose-700 border border-rose-200':'bg-emerald-100 text-emerald-700 border border-emerald-200'}`}>{s}</div>
            ))}
          </div>
          <div className="text-center text-xs text-slate-500">이 4단계를 @Transactional 애노테이션 하나가 자동 처리한다</div>
        </div>
      );

      // caution
      return (
        <div className="max-w-md mx-auto space-y-3">
          <div className="bg-rose-50 p-4 rounded-xl border border-rose-200">
            <div className="font-bold text-rose-800 mb-2">⚠️ 같은 클래스 내 메서드 호출 주의</div>
            <div className="bg-slate-900 p-3 rounded-lg text-xs font-mono text-slate-300">
              <div><span className="text-yellow-300">@Transactional</span></div>
              <div><span className="text-pink-400">public void</span> methodA() {'{ ... }'}</div>
              <div className="mt-1"><span className="text-pink-400">public void</span> methodB() {'{'}</div>
              <div>{'  '}methodA(); <span className="text-rose-400">// Proxy 우회!</span></div>
              <div>{'  '}<span className="text-rose-400">// @Transactional 동작 안 함</span></div>
              <div>{'}'}</div>
            </div>
            <div className="text-xs text-rose-600 mt-2">같은 클래스에서 this.methodA()를 호출하면 Proxy를 거치지 않아 AOP가 동작하지 않는다</div>
          </div>
          <div className="bg-slate-800 p-3 rounded-lg text-center text-sm text-emerald-400 font-bold">
            AOP + Proxy를 알아야 이 함정을 이해하고 피할 수 있다
          </div>
        </div>
      );
    }

    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter IV-3-1</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">AOP(관점 지향 프로그래밍) 개요</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600">AOP가 왜 필요한지, <b>Proxy 패턴</b>과 <b>@Transactional</b>이 어떻게 동작하는지 체험합니다.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[280px] flex items-center justify-center"><div className="w-full"><V phase={step.phase}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
