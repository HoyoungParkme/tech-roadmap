    // ─────────────────────────────────────────────────────
    // CallerCard — 좌측 상단 호출자 카드
    // ─────────────────────────────────────────────────────
    function CallerCard({ caller }) {
      return (
        <div className="inline-flex items-center gap-2 px-3 py-1.5 bg-slate-100 rounded-lg border border-slate-300">
          <span className="text-base">{caller.icon}</span>

        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // ProxyBox — 프록시(Aspect/Interceptor) 표시 박스
    //   status: 'idle' | 'enter' | 'exit' | 'bypass'
    // ─────────────────────────────────────────────────────
    function ProxyBox({ proxy }) {
      if (!proxy?.show) return null;
      const statusClass = proxy.status === 'bypass'
        ? 'border-rose-400 bg-rose-50 text-rose-800'
        : 'border-lime-400 bg-lime-50 text-lime-800';
      return (
        <div className={`rounded-lg border-2 px-3 py-2 ${statusClass} text-center`}>
          <div className="text-[9px] font-bold uppercase tracking-wider opacity-70 mb-0.5">Proxy / Advice</div>
          <div className="text-xs font-bold">{proxy.label}</div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // MethodList — 좌측 중단: 프록시가 감싸는 메서드 카드들
    //   status: 'idle' | 'active' | 'commit' | 'rollback' | 'bypass'
    //   isProxy: 프록시 자체를 표현할 때 true (다른 색)
    //   hasLog/hasTx: 메서드 내부에 직접 박힌 코드 표시 (Step 1 비교용)
    // ─────────────────────────────────────────────────────
    function MethodList({ methods }) {
      const colorMap = {
        idle:     'border-slate-200 bg-white text-slate-700',
        active:   'border-lime-300 bg-lime-50 text-lime-900',
        commit:   'border-emerald-400 bg-emerald-50 text-emerald-900',
        rollback: 'border-rose-400 bg-rose-50 text-rose-900',
        bypass:   'border-rose-400 bg-rose-50 text-rose-900 ring-2 ring-rose-300',
      };
      return (
        <div className="space-y-1.5">
          {methods.map((m) => {
            const isProxy = m.isProxy;
            const cls = isProxy
              ? 'border-fuchsia-400 bg-fuchsia-50 text-fuchsia-900 ring-1 ring-fuchsia-200'
              : (colorMap[m.status] || colorMap.idle);
            return (
              <div key={m.id} className={`rounded-lg border-2 px-3 py-2 flex items-center justify-between gap-2 ${cls}`}>
                <span className="text-[12px] font-mono font-semibold truncate">{m.name}</span>
                <div className="flex items-center gap-1 flex-shrink-0">
                  {m.txAuto && (
                    <span className="text-[9px] font-bold px-1.5 py-0.5 rounded bg-lime-200 text-lime-900 border border-lime-400">@Tx</span>
                  )}
                  {m.hasTx && !m.txAuto && (
                    <span className="text-[9px] font-bold px-1.5 py-0.5 rounded bg-amber-100 text-amber-800 border border-amber-300" title="메서드 내부에 직접 박힌 트랜잭션 코드">tx 코드</span>
                  )}
                  {m.hasLog && (
                    <span className="text-[9px] font-bold px-1.5 py-0.5 rounded bg-amber-100 text-amber-800 border border-amber-300" title="메서드 내부에 직접 박힌 로깅 코드">log 코드</span>
                  )}
                  {m.status === 'bypass' && (
                    <span className="text-[9px] font-bold px-1.5 py-0.5 rounded bg-rose-200 text-rose-900 border border-rose-400">우회</span>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // FlowList — 좌측 하단: 호출 흐름 단계 표시
    //   kind 별 색상
    //     call     → slate
    //     tx       → lime    (트랜잭션/프록시 진입)
    //     logic    → sky     (핵심 비즈니스)
    //     commit   → emerald
    //     rollback → rose
    //     warn     → amber   (Self-invocation 경고)
    // ─────────────────────────────────────────────────────
    function FlowList({ steps }) {
      const kindMap = {
        call:     { bg: 'bg-slate-100',    text: 'text-slate-700',   tag: 'call'   },
        tx:       { bg: 'bg-lime-100',     text: 'text-lime-800',    tag: 'tx'     },
        logic:    { bg: 'bg-sky-50',       text: 'text-sky-800',     tag: 'logic'  },
        commit:   { bg: 'bg-emerald-100',  text: 'text-emerald-800', tag: 'commit' },
        rollback: { bg: 'bg-rose-100',     text: 'text-rose-800',    tag: 'roll'   },
        warn:     { bg: 'bg-amber-100',    text: 'text-amber-800',   tag: '⚠ warn' },
      };
      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">
          <div className="bg-slate-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-slate-600">
            호출 흐름 (Method Invocation Flow)
          </div>
          <div className="p-2.5 space-y-1">
            {steps.map((s) => {
              const c = kindMap[s.kind] || kindMap.call;
              return (
                <div key={s.id} className="flex items-center gap-2">
                  <span className={`text-[8px] font-mono px-1.5 py-0.5 rounded ${c.bg} ${c.text} border border-slate-200 font-bold uppercase tracking-wide flex-shrink-0`}>
                    {c.tag}
                  </span>
                  <span className="text-[11px] font-mono text-slate-700 leading-tight">{s.label}</span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // FlowArrow — 흐름을 잇는 수직 화살표

    function FlowArrow({ label }) {

    // ─────────────────────────────────────────────────────

    function LiveDataPane({ step }) {

          <div className="space-y-1">
            {/* 1) 호출자 */}

              {step.callers.map((c) => <CallerCard key={c.id} caller={c} />)}
            </div>

            <FlowArrow label="invoke" />

            {/* 2) Proxy / Advice (있을 때만) */}
            {step.proxy?.show && (
              <>
                <ProxyBox proxy={step.proxy} />
                <FlowArrow label={step.proxy.status === 'bypass' ? 'bypassed!' : 'delegate'} />
              </>
            )}

            {/* 3) 메서드 카드 */}
            <MethodList methods={step.methods} />

            <FlowArrow label="execute" />

            {/* 4) 흐름 단계 */}
            <FlowList steps={step.flow} />
          </div>

          {/* 핵심 포인트 */}
          <div className="mt-3 bg-lime-50 border-l-4 border-lime-500 px-3 py-2 rounded-r">
            <div className="text-[9px] font-bold text-lime-700 uppercase tracking-wider mb-0.5">핵심 포인트</div>
            <p className="text-[11px] text-lime-900 leading-snug">{step.keyPoint}</p>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-lime-400"></span>tx/proxy</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-sky-400"></span>logic</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-emerald-400"></span>commit</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-rose-400"></span>rollback</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-amber-400"></span>warn</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-fuchsia-400"></span>proxy bean</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   파일명 탭 + 윈도우 dot + 라인 번호 + 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-lime-500/15 border-l-2 border-lime-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; 목차로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter IV-3-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-lime-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. Spring Boot 코어 &gt; Chapter 3. AOP</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-3-1. AOP와 @Transactional</h1>
                  <p className="text-sm text-slate-500 mt-0.5">횡단 관심사를 추출하고, 프록시 한 겹을 거쳐 트랜잭션을 자동화하는 길</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-400 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: <strong>AOP = Pointcut + Advice</strong>로 횡단 관심사를 분리하고, <strong>@Transactional</strong>은 그중 가장 자주 쓰는 Around Advice. <strong>프록시</strong>가 메서드 호출을 가로채는 구조라서 <strong>this. 호출은 우회</strong>한다 — 이 한 가지만 기억하면 90% 안 헤맨다. 다음(V-1-1)부터는 REST API 본격 설계로 들어간다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['AOP', 'Aspect', 'Pointcut', 'Advice', '@Transactional', 'Proxy', 'CGLIB', 'Self-Invocation', 'Cross-cutting'].map((kw) => (
                <span key={kw} className="bg-lime-50 text-lime-700 px-3 py-1 rounded-full text-xs font-medium border border-lime-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-04-02-bean-lifecycle.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; IV-2-2 Bean과 IoC 컨테이너</a>
              <a href="./chapter-05-01-rest-principles.html" className="text-lime-700 hover:text-lime-900 font-medium">V-1-1 REST 원칙 &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
