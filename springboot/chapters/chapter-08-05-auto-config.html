    // ─────────────────────────────────────────────────────
    // CodeCard — 좌측 상단의 짧은 미니 코드 카드
    //   accent: 'in' (lime 강조) | 'out' (slate)
    // ─────────────────────────────────────────────────────
    function CodeCard({ label, code, accent }) {
      return (
        <div className={`rounded-lg border-2 ${accent === 'in' ? 'border-lime-300 bg-lime-50' : 'border-slate-200 bg-slate-50'} overflow-hidden`}>
          <div className={`px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider ${accent === 'in' ? 'bg-lime-100 text-lime-800' : 'bg-slate-100 text-slate-600'}`}>
            {label}
          </div>
          <pre className="text-[11px] font-mono text-slate-800 leading-snug p-2.5 m-0 whitespace-pre overflow-x-auto">{code}</pre>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // BootFlowTree — 부트 시작 → 후보 → 조건 평가 → 활성 빈 흐름
    //   kind 별 색상
    //     start → lime    (부트 시작)
    //     scan  → sky     (스캔/탐색)
    //     cand  → slate   (후보)
    //     eval  → amber   (조건 평가)
    //     bean  → emerald (활성 빈)
    //     skip  → rose    (SKIP)
    // ─────────────────────────────────────────────────────
    function BootFlowTree({ nodes }) {
      const kindMap = {
        start: { bg: 'bg-lime-100',    text: 'text-lime-800',    border: 'border-lime-300',    tag: 'boot' },
        scan:  { bg: 'bg-sky-50',      text: 'text-sky-800',     border: 'border-sky-300',     tag: 'scan' },
        cand:  { bg: 'bg-slate-100',   text: 'text-slate-700',   border: 'border-slate-300',   tag: 'cand' },
        eval:  { bg: 'bg-amber-50',    text: 'text-amber-800',   border: 'border-amber-300',   tag: 'eval' },
        bean:  { bg: 'bg-emerald-50',  text: 'text-emerald-800', border: 'border-emerald-300', tag: 'bean' },
        skip:  { bg: 'bg-rose-50',     text: 'text-rose-700',    border: 'border-rose-300',    tag: 'skip' },
      };
      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">
          <div className="bg-slate-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-slate-600">
            Spring Boot 시동 → 자동 구성 평가 흐름
          </div>
          <div className="p-2.5 space-y-1">
            {nodes.map((n) => {
              const c = kindMap[n.kind] || kindMap.cand;
              return (
                <div key={n.id} className="flex items-center gap-1.5" style={{ marginLeft: `${n.depth * 14}px` }}>
                  <span className={`text-[8px] font-mono px-1.5 py-0.5 rounded ${c.bg} ${c.text} border ${c.border} font-bold uppercase tracking-wide flex-shrink-0`}>
                    {c.tag}
                  </span>
                  <span className="text-[11px] font-mono text-slate-700 leading-tight">{n.label}</span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // BeansResult — 마지막 단계: ApplicationContext 에 등록된 빈
    //   type: active(녹색) / skip(회색) / user(라임) / pending(점선)
    // ─────────────────────────────────────────────────────
    function BeansResult({ beans }) {
      const styleMap = {
        active:  { bg: 'bg-emerald-50',  text: 'text-emerald-800', border: 'border-emerald-300', icon: '✓', tag: 'active' },
        skip:    { bg: 'bg-rose-50',     text: 'text-rose-700',    border: 'border-rose-300',    icon: '✗', tag: 'skip'   },

        pending: { bg: 'bg-slate-50',    text: 'text-slate-500',   border: 'border-slate-200',   icon: '…', tag: 'wait'   },
        comp:    { bg: 'bg-sky-50',      text: 'text-sky-800',     border: 'border-sky-300',     icon: '◆', tag: 'comp'   },

      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 overflow-hidden">

          <div className="p-2.5 space-y-1">

                  <span className="text-[10px] text-slate-500 ml-auto truncate">{b.desc}</span>
                  <span className={`text-[8px] font-mono px-1 py-0.5 rounded ${s.bg} ${s.text} border ${s.border} font-bold uppercase tracking-wide flex-shrink-0`}>
                    {s.tag}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // FlowArrow — 단계 사이 화살표 (수직, lime)
    // ─────────────────────────────────────────────────────
    function FlowArrow({ label }) {
      return (
        <div className="flex items-center justify-center my-1">
          <div className="flex flex-col items-center">
            <div className="text-[9px] text-lime-700 font-mono font-bold tracking-wider uppercase">{label}</div>
            <div className="text-lime-500 text-lg leading-none">↓</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    //   상단 : 짧은 코드 카드 (트리거 코드)
    //   ↓ 메타 애노테이션 펼치기 / 의존성 추가 / ...
    //   중간 : Spring Boot 시동 흐름 트리
    //   ↓ 조건 평가
    //   하단 : ApplicationContext 등록 결과
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🌱 Spring Boot 자동 구성 평가 흐름</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-1">
            {/* 1) 트리거 — 짧은 미니 코드 */}
            <CodeCard label={step.codeLeftLabel} code={step.codeLeft} accent="in" />

            <FlowArrow label={step.arrow.left} />

            {/* 2) 부트 시동 → 자동 구성 평가 흐름 */}
            <BootFlowTree nodes={step.bootFlow} />

            <FlowArrow label={step.arrow.right} />

            {/* 3) ApplicationContext 결과 */}
            <BeansResult beans={step.beans} />
          </div>

          {/* 핵심 포인트 박스 */}
          <div className="mt-3 bg-lime-50 border-l-4 border-lime-500 px-3 py-2 rounded-r">
            <div className="text-[9px] font-bold text-lime-700 uppercase tracking-wider mb-0.5">핵심 포인트</div>
            <p className="text-[11px] text-lime-900 leading-snug">{step.keyPoint}</p>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-lime-400"></span>boot
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-400"></span>scan
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-400"></span>candidate
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-400"></span>conditional
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-400"></span>bean active
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-400"></span>skip
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   파일명 탭 + 윈도우 dot + 라인 번호 + 강조 라인
    //   파일 탭 5개 (Step 별 활성화)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ steps, stepIdx, total, onTabClick }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);
      const code = steps[stepIdx].code;

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">VSCode — Spring Boot Internals</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 파일 탭 — 5개 */}
          <div className="bg-[#21252b] flex items-end overflow-x-auto border-b border-slate-700">
            {steps.map((s, i) => {
              const isActive = i === stepIdx;
              return (
                <button
                  key={s.code.filename}
                  onClick={() => onTabClick(i)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap transition border-r border-slate-700 ${
                    isActive
                      ? 'bg-[#282c34] text-lime-300 border-t-2 border-t-lime-400'
                      : 'bg-[#21252b] text-slate-500 hover:text-slate-300 hover:bg-[#2c313a]'
                  }`}
                >
                  {s.code.filename}
                </button>
              );
            })}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[44rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-lime-500/15 border-l-2 border-lime-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; 챕터 목록</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter VIII-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-lime-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VIII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VIII. Spring Boot &gt; Chapter 2. Auto Configuration 심화</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VIII-2-1. Auto Configuration 동작 원리</h1>
                  <p className="text-sm text-slate-500 mt-0.5">@SpringBootApplication 한 줄 뒤에서 일어나는 모든 일</p>
                </div>
                <span className="ml-auto text-xs bg-rose-100 text-rose-700 px-2 py-0.5 rounded-full font-bold">★★★</span>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                steps={STEPS}
                stepIdx={stepIdx}
                total={STEPS.length}
                onTabClick={(i) => { setStepIdx(i); setIsPlaying(false); }}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-400 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: Auto Configuration = <strong>@EnableAutoConfiguration</strong> + <strong>AutoConfiguration.imports</strong> + <strong>@ConditionalOn...</strong> + <strong>starter 의존성</strong> + <strong>사용자 빈 우선</strong>. 다섯 톱니가 맞물려 "암묵적 컨벤션 + 명시적 오버라이드"라는 Spring Boot 철학을 만든다. 다음(VIII-2-2)에서는 직접 <strong>커스텀 Auto Configuration</strong>을 작성한다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* Step 점프 dots */}
            <div className="flex justify-center gap-2">
              {STEPS.map((s, i) => (
                <button
                  key={i}
                  onClick={() => { setStepIdx(i); setIsPlaying(false); }}
                  aria-label={`Step ${i + 1}`}
                  className={`w-3 h-3 rounded-full transition-all ${
                    i === stepIdx ? 'bg-lime-600 scale-125' : 'bg-slate-300 hover:bg-slate-400'
                  }`}
                />
              ))}
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {[
                '@SpringBootApplication',
                '@EnableAutoConfiguration',
                'AutoConfiguration.imports',
                '@ConditionalOnClass',
                '@ConditionalOnMissingBean',
                'starter',
                'spring.factories',
                '--debug',
                'ConditionEvaluationReport',
              ].map((kw) => (
                <span key={kw} className="bg-lime-50 text-lime-800 px-3 py-1 rounded-full text-xs font-medium border border-lime-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-08-04-spring-boot-intro.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; VIII-1-4 Spring Boot 소개</a>
              <a href="./chapter-08-06-custom-auto-config.html" className="text-lime-700 hover:text-lime-900 font-medium">VIII-2-2 커스텀 Auto Configuration &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0 (atom-one-dark)
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
