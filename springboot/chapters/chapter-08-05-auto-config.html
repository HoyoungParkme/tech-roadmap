<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>VIII-2-1 — Auto Configuration 동작 원리</title><script src="https://cdn.tailwindcss.com"></script><script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script><script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script></head>
<body><div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const STEPS=[
  {id:'magic',label:'① 마법의 정체',desc:'[STEP 1] Spring Boot가 DB 라이브러리만 추가하면 DataSource를 자동 생성하는 이유. @SpringBootApplication 뒤에서 Auto Configuration이 동작하기 때문이다.',p:'magic'},
  {id:'decompose',label:'② @SpringBootApplication 분해',desc:'[STEP 2] @SpringBootApplication = @SpringBootConfiguration + @EnableAutoConfiguration + @ComponentScan. 이 세 애노테이션의 조합이 Spring Boot의 핵심이다.',p:'decompose'},
  {id:'enable',label:'③ @EnableAutoConfiguration',desc:'[STEP 3] META-INF/spring/org.springframework.boot.autoconfigure.AutoConfiguration.imports 파일에 등록된 자동 구성 클래스 목록을 읽어 Bean으로 등록한다.',p:'enable'},
  {id:'example',label:'④ DataSource 자동 구성 예시',desc:'[STEP 4] H2 드라이버가 클래스패스에 있으면 DataSourceAutoConfiguration이 활성화 → 인메모리 DataSource를 자동 생성. 개발자가 직접 DataSource Bean을 등록하면 자동 구성이 비활성화된다.',p:'example'},
  {id:'why',label:'⑤ 왜 알아야 하나',desc:'[STEP 5] 자동 구성을 모르면 "왜 이 Bean이 등록됐지?" "왜 내 설정이 무시되지?"를 해결할 수 없다. --debug 플래그로 어떤 자동 구성이 활성화됐는지 확인할 수 있다.',p:'why'},
];
function V({p}){
  if(p==='magic')return(<div className="max-w-md mx-auto space-y-3 text-center"><div className="bg-amber-50 p-4 rounded-xl border border-amber-200"><div className="text-2xl mb-1">📦</div><div className="text-sm">build.gradle에 <b>spring-boot-starter-data-jpa</b> 추가</div></div><div className="text-2xl">↓ 마법? ↓</div><div className="bg-emerald-50 p-4 rounded-xl border-2 border-emerald-400"><div className="text-2xl mb-1">🗄️</div><div className="text-sm font-bold text-emerald-800">DataSource Bean 자동 생성!</div></div></div>);
  if(p==='decompose')return(<div className="max-w-md mx-auto space-y-2">{[{a:'@SpringBootConfiguration',d:'= @Configuration. 설정 클래스 선언',c:'sky'},{a:'@EnableAutoConfiguration',d:'자동 구성 활성화 (핵심!)',c:'emerald'},{a:'@ComponentScan',d:'현재 패키지 하위 Bean 스캔',c:'violet'}].map(x=>(<div key={x.a} className={`flex items-center gap-3 px-4 py-3 rounded-lg bg-${x.c}-50 border border-${x.c}-200`}><span className="font-mono text-xs font-bold">{x.a}</span><span className="text-xs text-slate-500 ml-auto">{x.d}</span></div>))}</div>);
  if(p==='enable')return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div className="text-slate-500">// Spring Boot 3.x 자동 구성 등록 파일</div><div className="text-amber-400">META-INF/spring/</div><div className="text-amber-400">  org.springframework.boot.autoconfigure</div><div className="text-amber-400">    .AutoConfiguration.imports</div><div className="mt-2 text-slate-500">// 내용 (자동 구성 클래스 목록):</div><div>o.s.b.a.jdbc.DataSourceAutoConfiguration</div><div>o.s.b.a.orm.jpa.HibernateJpaAutoConfiguration</div><div>o.s.b.a.web.servlet.WebMvcAutoConfiguration</div><div className="text-slate-500">... (약 150개)</div></div>);
  if(p==='example')return(<div className="max-w-md mx-auto space-y-2">{[{s:'H2 드라이버가 클래스패스에 있음',i:'🔍',active:true},{s:'DataSourceAutoConfiguration 활성화',i:'⚡',active:true},{s:'인메모리 DataSource Bean 자동 생성',i:'🗄️',active:true},{s:'개발자가 직접 DataSource 등록하면?',i:'🚫',active:false}].map((x,i)=>(<div key={i} className={`flex items-center gap-3 px-4 py-2 rounded-lg border ${x.active?'bg-emerald-50 border-emerald-300':'bg-rose-50 border-rose-300'}`}><span>{x.i}</span><span className="text-sm">{x.s}</span>{!x.active&&<span className="text-xs text-rose-600 ml-auto">자동 구성 비활성화</span>}</div>))}</div>);
  return(<div className="max-w-md mx-auto bg-slate-800 p-5 rounded-xl text-center"><div className="text-emerald-400 font-bold text-lg mb-2">--debug로 자동 구성 확인</div><div className="text-slate-400 text-sm">"왜 이 Bean이 등록됐지?" 의 답</div></div>);
}
function App(){const[idx,setIdx]=useState(0);const[playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
return(<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6"><div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter VIII-2-1</span></div><header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">Auto Configuration 동작 원리</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600"><b>@SpringBootApplication 분해</b>와 자동 구성이 동작하는 메커니즘을 체험합니다.</p></header><div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div><div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[260px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div><div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2"><button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button><button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button><button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button></div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1}/{STEPS.length} — {step.label}</div></div><div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div></div></div>);}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
