    // ─────────────────────────────────────────────────────
    // TimeSeriesChart — Step 5 의 시계열 그래프 mock (SVG)
    //   - 가로축 = 시간 (12 포인트, 5초 간격)
    //   - 세로축 = 값 (0~70)
    //   - 3개 시리즈 동시 표시
    // ─────────────────────────────────────────────────────
    function TimeSeriesChart({ series }) {
      const W = 360, H = 130, PAD = 24;
      const N = series[0].points.length;
      const max = 70;
      const xStep = (W - PAD * 2) / (N - 1);
      const toY = (v) => H - PAD - (v / max) * (H - PAD * 2);
      const toX = (i) => PAD + i * xStep;

      return (
        <div className="bg-white border-2 border-lime-200 rounded-lg overflow-hidden">
          <div className="bg-lime-50 px-3 py-1 border-b border-lime-200 flex items-center justify-between">
            <span className="text-[10px] font-bold uppercase tracking-wider text-lime-700">시계열 그래프 (mock)</span>
            <span className="text-[9px] font-mono text-slate-500">last 60s · 5s interval</span>
          </div>
          <svg width="100%" viewBox={`0 0 ${W} ${H}`} className="block">
            {/* 가로 그리드 */}
            {[0, 1, 2, 3].map((i) => {
              const y = PAD + (i * (H - PAD * 2)) / 3;
              return <line key={i} x1={PAD} x2={W - PAD} y1={y} y2={y} stroke="#e2e8f0" strokeWidth="1" />;
            })}
            {/* 축 */}
            <line x1={PAD} y1={PAD} x2={PAD} y2={H - PAD} stroke="#94a3b8" strokeWidth="1" />
            <line x1={PAD} y1={H - PAD} x2={W - PAD} y2={H - PAD} stroke="#94a3b8" strokeWidth="1" />
            {/* 데이터 라인 */}
            {series.map((s, si) => {
              const d = s.points.map((v, i) => `${i === 0 ? 'M' : 'L'} ${toX(i)} ${toY(v)}`).join(' ');
              return (
                <g key={si}>
                  <path d={d} fill="none" stroke={s.color} strokeWidth="2" />
                  {s.points.map((v, i) => (
                    <circle key={i} cx={toX(i)} cy={toY(v)} r="2" fill={s.color} />
                  ))}
                </g>
              );
            })}
            {/* y 라벨 */}
            <text x={4} y={PAD + 3} fontSize="8" fill="#64748b">{max}</text>
            <text x={4} y={H - PAD + 3} fontSize="8" fill="#64748b">0</text>
          </svg>
          {/* 범례 */}
          <div className="flex flex-wrap gap-2 px-3 py-1.5 bg-slate-50 border-t border-lime-100">
            {series.map((s) => (
              <span key={s.label} className="flex items-center gap-1 text-[10px] font-mono text-slate-600">
                <span className="w-2.5 h-2.5 rounded-sm" style={{ background: s.color }}></span>
                {s.label}
              </span>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // FlowArrow — 변환 흐름 화살표 (수직)
    // ─────────────────────────────────────────────────────
    function FlowArrow({ label }) {
      return (
        <div className="flex items-center justify-center my-1">
          <div className="flex flex-col items-center">
            <div className="text-[9px] text-lime-700 font-mono font-bold tracking-wider uppercase">{label}</div>
            <div className="text-lime-500 text-lg leading-none">↓</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체 (Step 별로 다른 view 를 그린다)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const renderView = () => {
        switch (step.leftView) {
          case 'intro':    return <IntroPane />;
          case 'meters':   return <MetersPane meters={step.meters} />;
          case 'registry': return <RegistryPane />;
          case 'backends': return <BackendsPane />;
          case 'boot':     return <BootPane series={step.series} />;
          default:         return null;
        }
      };
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📊 Micrometer 메트릭 흐름</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {renderView()}

          {/* 핵심 포인트 박스 */}
          <div className="mt-3 bg-lime-50 border-l-4 border-lime-500 px-3 py-2 rounded-r">
            <div className="text-[9px] font-bold text-lime-700 uppercase tracking-wider mb-0.5">핵심 포인트</div>
            <p className="text-[11px] text-lime-900 leading-snug">{step.keyPoint}</p>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   상단에 5개 파일 탭 (현재 step 의 파일이 활성)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total, onTabClick, allTabs }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 줄 */}
          <div className="bg-[#21252b] px-3 py-1.5 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5 flex-shrink-0">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 5개 파일 탭 */}
          <div className="bg-[#21252b] flex items-center border-b border-slate-700 overflow-x-auto">
            {allTabs.map((t, i) => (
              <button
                key={t.filename}
                onClick={() => onTabClick(i)}
                className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                  i === stepIdx
                    ? 'bg-[#282c34] text-lime-300 border-t-2 border-t-lime-400'
                    : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800/50'
                }`}
              >
                {t.filename}
              </button>
            ))}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[44rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-lime-500/15 border-l-2 border-lime-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    //   - 우측 CodeViewer 탭 클릭 = 해당 Step 으로 이동
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      const handleTabClick = (i) => {
        setStepIdx(i);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const allTabs = STEPS.map((s) => s.code);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; 챕터 목록</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter VIII-3-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-lime-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VIII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VIII. 운영/모니터링 &gt; Chapter 3. 메트릭</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VIII-3-1. Micrometer + 메트릭 체계</h1>
                  <p className="text-sm text-slate-500 mt-0.5">JVM 메트릭 수집 facade · Counter/Gauge/Timer/DistributionSummary · Spring Boot 자동 통합</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                code={step.code}
                stepIdx={stepIdx}
                total={STEPS.length}
                onTabClick={handleTabClick}
                allTabs={allTabs}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-300 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: Micrometer 는 <strong>메트릭의 facade</strong>다. <strong>Counter / Gauge / Timer / DistributionSummary</strong> 4 종류를 의미에 맞게 골라
                <strong> MeterRegistry</strong> 에 등록하면, 의존성 한 줄로 정해진 백엔드(Prometheus / Datadog ...)로 흘러간다.
                Spring Boot Actuator 가 JVM/HTTP/Tomcat 메트릭을 자동 수집해 주므로, 우리가 짤 건 도메인 메트릭뿐이다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Micrometer', 'MeterRegistry', 'Counter', 'Gauge', 'Timer', 'DistributionSummary', 'Prometheus', 'Datadog', 'Actuator', 'facade'].map((kw) => (
                <span key={kw} className="bg-lime-50 text-lime-700 px-3 py-1 rounded-full text-xs font-medium border border-lime-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-08-07-debug-autoconfig.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; VIII-2-? Debug AutoConfig</a>
              <a href="./chapter-08-09-prometheus.html" className="text-lime-700 hover:text-lime-900 font-medium">VIII-3-2 Prometheus &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
