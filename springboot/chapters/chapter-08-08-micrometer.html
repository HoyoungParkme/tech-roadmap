<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>VIII-3-1 — Micrometer와 메트릭 체계</title><script src="https://cdn.tailwindcss.com"></script><script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script><script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script></head>
<body><div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const STEPS=[
  {id:'what',label:'① Micrometer란',desc:'[STEP 1] Micrometer = 애플리케이션 메트릭을 수집하는 추상화 계층. SLF4J가 로깅의 추상화라면, Micrometer는 메트릭의 추상화다. Prometheus, Datadog 등 다양한 모니터링 시스템에 연결할 수 있다.',p:'what'},
  {id:'structure',label:'② 메트릭 구조',desc:'[STEP 2] 메트릭 = 이름(name) + 태그(tags) + 값(value). 예: http.server.requests(name), method=GET, uri=/users(tags), count=150(value). 태그로 다차원 필터링이 가능하다.',p:'structure'},
  {id:'counter',label:'③ Counter (누적 카운트)',desc:'[STEP 3] 값이 0부터 증가만 하는 메트릭. 예: 주문 횟수, HTTP 요청 수, 에러 발생 수. counter.increment()로 1씩 올린다.',p:'counter'},
  {id:'timer',label:'④ Timer (시간 측정)',desc:'[STEP 4] 작업의 소요 시간을 측정. 예: API 응답 시간, DB 쿼리 시간. 호출 횟수(count) + 총 시간(total) + 최대 시간(max)을 동시에 기록한다.',p:'timer'},
  {id:'gauge',label:'⑤ Gauge (현재 값)',desc:'[STEP 5] 현재 상태를 나타내는 메트릭. 예: 현재 큐 크기, 활성 스레드 수, 메모리 사용량. 증가/감소 모두 가능. Spring Boot Actuator가 JVM, HTTP, DB 메트릭을 자동 등록한다.',p:'gauge'},
];
function V({p}){
  if(p==='what')return(<div className="max-w-md mx-auto space-y-2"><div className="bg-violet-50 p-3 rounded-xl border border-violet-200 text-center"><div className="font-bold text-violet-800">Micrometer</div><div className="text-xs text-violet-600">메트릭 추상화 (= SLF4J of Metrics)</div></div><div className="flex justify-center"><svg width="12" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg></div><div className="flex gap-2 justify-center">{['Prometheus','Datadog','New Relic'].map(x=>(<div key={x} className="bg-white p-2 rounded-lg border border-slate-200 text-xs text-center">{x}</div>))}</div></div>);
  if(p==='structure')return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div className="text-amber-400 mb-2">메트릭 구조</div><div><span className="text-emerald-400">name</span>: http.server.requests</div><div><span className="text-sky-400">tags</span>: method=GET, uri=/users, status=200</div><div><span className="text-violet-400">value</span>: count=150, totalTime=3.2s</div><div className="mt-2 text-slate-500">// 태그로 다차원 필터링 가능</div><div className="text-slate-500">// method=POST만, status=500만 등</div></div>);
  if(p==='counter')return(<div className="max-w-md mx-auto space-y-3"><div className="bg-sky-50 p-4 rounded-xl border border-sky-200 text-center"><div className="text-2xl mb-1">📈</div><div className="font-bold text-sky-800">Counter = 누적</div><div className="text-xs text-sky-600">0 → 1 → 2 → 3... (증가만)</div></div><div className="text-center text-xs text-slate-500">예: 주문 횟수 · HTTP 요청 수 · 에러 수</div></div>);
  if(p==='timer')return(<div className="max-w-md mx-auto space-y-3"><div className="bg-amber-50 p-4 rounded-xl border border-amber-200 text-center"><div className="text-2xl mb-1">⏱</div><div className="font-bold text-amber-800">Timer = 시간 측정</div><div className="text-xs text-amber-600">count + totalTime + max 동시 기록</div></div><div className="text-center text-xs text-slate-500">예: API 응답 시간 · DB 쿼리 시간</div></div>);
  return(<div className="max-w-md mx-auto space-y-3"><div className="bg-emerald-50 p-4 rounded-xl border border-emerald-200 text-center"><div className="text-2xl mb-1">📊</div><div className="font-bold text-emerald-800">Gauge = 현재 값</div><div className="text-xs text-emerald-600">증가/감소 모두 가능</div></div><div className="text-center text-xs text-slate-500">예: 큐 크기 · 활성 스레드 · 메모리 사용량</div><div className="bg-slate-800 p-3 rounded-lg text-center text-xs text-emerald-400">Actuator가 JVM/HTTP/DB 메트릭을 자동 등록</div></div>);
}
function App(){const[idx,setIdx]=useState(0);const[playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
return(<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6"><div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter VIII-3-1</span></div><header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">Micrometer와 메트릭 체계</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600"><b>Counter · Timer · Gauge</b> — 3대 메트릭 유형과 이름+태그+값 구조를 체험합니다.</p></header><div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div><div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[240px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div><div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2"><button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button><button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button><button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button></div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1}/{STEPS.length} — {step.label}</div></div><div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div></div></div>);}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
