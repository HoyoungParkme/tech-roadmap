<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter III-1-1 — JDK 17 설치</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { id: 'why', label: '① JDK가 필요한 이유',
        desc: '[STEP 1 — 이유] JDK(Java Development Kit)는 Java 코드를 작성하고 실행하기 위한 공구 세트다. 목수에게 톱과 망치가 없으면 가구를 만들 수 없듯, JDK 없이는 Spring Boot를 실행할 수 없다.',
        visual: 'why' },
      { id: 'version', label: '② 버전 선택',
        desc: '[STEP 2 — 버전] Spring Boot 3.x는 JDK 17 이상을 요구한다. JDK 17은 LTS(장기 지원 버전)이므로 안정적으로 오래 쓸 수 있다. Eclipse Temurin 17을 권장한다 — 오픈소스이고 무료다.',
        visual: 'version' },
      { id: 'install', label: '③ 설치 방법',
        desc: '[STEP 3 — 설치] macOS: brew install --cask temurin@17 한 줄이면 끝. Windows: adoptium.net에서 .msi 설치 파일을 다운로드해 실행한다.',
        visual: 'install' },
      { id: 'verify', label: '④ 설치 확인',
        desc: '[STEP 4 — 확인] 터미널에서 java -version 실행. openjdk 17.x.x가 보이면 성공. JAVA_HOME 환경변수는 대부분 자동 설정되지만, 안 됐다면 JDK 설치 경로를 직접 지정한다.',
        visual: 'verify' },
      { id: 'ready', label: '⑤ 준비 완료',
        desc: '[STEP 5 — 완료] JDK가 설치되면 이후 모든 실습의 전제 조건이 충족된다. 다음 단계인 IDE(IntelliJ) 설치로 넘어간다.',
        visual: 'ready' },
    ];

    function Visual({ id }) {
      if (id === 'why') return (
        <div className="flex items-center justify-center gap-6 flex-wrap">
          <div className="bg-amber-50 p-5 rounded-xl border border-amber-200 text-center">
            <div className="text-3xl mb-2">🔧</div>
            <div className="font-bold text-amber-800">JDK = 공구 세트</div>
            <div className="text-xs text-amber-600 mt-1">javac(컴파일러) + JRE(실행환경) + 도구</div>
          </div>
          <div className="text-2xl text-slate-400">→</div>
          <div className="bg-emerald-50 p-5 rounded-xl border border-emerald-200 text-center">
            <div className="text-3xl mb-2">🚀</div>
            <div className="font-bold text-emerald-800">Spring Boot 실행 가능</div>
            <div className="text-xs text-emerald-600 mt-1">이후 모든 실습의 전제 조건</div>
          </div>
        </div>
      );
      if (id === 'version') return (
        <div className="space-y-3 max-w-md mx-auto">
          {[
            { ver: 'JDK 11', lts: true, ok: false, note: 'Spring Boot 2.x까지' },
            { ver: 'JDK 17', lts: true, ok: true, note: 'Spring Boot 3.x 최소 ⭐ 권장' },
            { ver: 'JDK 21', lts: true, ok: true, note: '최신 LTS — 호환됨' },
          ].map(v => (
            <div key={v.ver} className={`flex items-center gap-3 p-3 rounded-lg border ${v.ok ? 'bg-emerald-50 border-emerald-300' : 'bg-slate-50 border-slate-200 opacity-50'}`}>
              <span className={`text-lg ${v.ok ? 'text-emerald-500' : 'text-slate-400'}`}>{v.ok ? '✓' : '✗'}</span>
              <div className="flex-1">
                <span className="font-bold">{v.ver}</span>
                {v.lts && <span className="text-xs bg-sky-100 text-sky-700 px-1 ml-1 rounded">LTS</span>}
              </div>
              <span className="text-xs text-slate-500">{v.note}</span>
            </div>
          ))}
        </div>
      );
      if (id === 'install') return (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-lg mx-auto">
          <div className="bg-slate-900 p-4 rounded-xl text-sm">
            <div className="text-xs text-slate-400 mb-2">🍎 macOS (Homebrew)</div>
            <div className="font-mono text-emerald-400">brew install --cask temurin@17</div>
          </div>
          <div className="bg-slate-900 p-4 rounded-xl text-sm">
            <div className="text-xs text-slate-400 mb-2">🪟 Windows</div>
            <div className="font-mono text-sky-400">adoptium.net → .msi 다운로드 → 실행</div>
          </div>
        </div>
      );
      if (id === 'verify') return (
        <div className="max-w-md mx-auto space-y-3">
          <div className="bg-slate-900 p-4 rounded-xl">
            <div className="text-xs text-slate-400 mb-1">$ 터미널</div>
            <div className="font-mono text-sm">
              <div className="text-emerald-400">$ java -version</div>
              <div className="text-slate-300 mt-1">openjdk version "17.0.10" 2024-01-16</div>
              <div className="text-slate-500">OpenJDK Runtime Environment Temurin-17</div>
            </div>
          </div>
          <div className="bg-emerald-50 p-3 rounded-lg border border-emerald-200 text-sm text-emerald-700 text-center">✓ 이 메시지가 보이면 설치 성공!</div>
        </div>
      );
      return (
        <div className="text-center space-y-3">
          <div className="text-4xl">✅</div>
          <div className="text-lg font-bold text-emerald-800">JDK 17 설치 완료</div>
          <div className="text-sm text-slate-500">다음 단계: IDE(IntelliJ IDEA) 설치</div>
        </div>
      );
    }

    function App() {
      const [idx, setIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const ref = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => { setIdx(p => { if (p < STEPS.length-1) return p+1; setPlaying(false); return p; }); };
      const nextRef = useRef(next); nextRef.current = next;
      const prev = () => { if (idx > 0) { setIdx(p => p-1); setPlaying(false); } };
      const toggle = () => { if (isEnd) setIdx(0); setPlaying(p => !p); };

      useEffect(() => {
        if (playing) { ref.current = setInterval(() => nextRef.current(), 3500); }
        else { clearInterval(ref.current); }
        return () => clearInterval(ref.current);
      }, [playing]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <div className="flex justify-between items-center text-sm">
              <a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a>
              <span className="text-slate-400">Chapter III-1-1</span>
            </div>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div>
                <h1 className="text-2xl font-bold">JDK 17 설치</h1>
                <span className="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full">★★☆</span>
              </div>
              <p className="text-slate-600">Spring Boot 실행의 전제 조건인 <b>JDK 17 설치</b>를 단계별로 안내합니다.</p>
            </header>
            <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-lg font-medium leading-relaxed">{step.desc}</p>
            </div>
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[240px] flex items-center justify-center">
              <div className="w-full"><Visual id={step.visual} /></div>
            </div>
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">
                  {playing ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div>
            </div>
            <div className="flex justify-center gap-2">
              {STEPS.map((s,i) => (<button key={s.id} onClick={() => {setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
