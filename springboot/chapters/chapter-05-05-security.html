<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter V-3-1 — 인증과 인가</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'concept', label:'① 인증 vs 인가', desc:'[STEP 1] 인증(Authentication) = "너 누구야?" — 신분 확인. 인가(Authorization) = "너 이거 해도 돼?" — 권한 확인. 건물 출입에 비유하면 인증 = 신분증 확인, 인가 = 출입 가능 구역 확인.', p:'concept' },
      { id:'filter', label:'② Security Filter Chain', desc:'[STEP 2] Spring Security는 DispatcherServlet 앞단에 필터 체인(Filter Chain)을 설치한다. 모든 HTTP 요청은 이 필터를 먼저 통과해야 한다. 인증 실패 시 401, 인가 실패 시 403을 반환한다.', p:'filter' },
      { id:'config', label:'③ SecurityFilterChain 설정', desc:'[STEP 3] @Bean으로 SecurityFilterChain을 등록하면 어떤 URL을 허용하고 어떤 URL에 인증을 요구할지 선언할 수 있다. /api/public/**은 누구나, 나머지는 인증 필요 같은 규칙을 코드로 정의한다.', p:'config' },
      { id:'password', label:'④ 비밀번호 암호화', desc:'[STEP 4] 비밀번호는 반드시 BCrypt로 해시해서 저장한다. 평문 저장은 절대 금지. PasswordEncoder 빈을 등록하면 Spring Security가 자동으로 비밀번호 검증을 처리한다.', p:'password' },
      { id:'why', label:'⑤ 왜 Spring Security인가', desc:'[STEP 5] CSRF 방어, 세션 관리, OAuth2 연동, JWT 지원이 모두 내장되어 있다. 보안은 직접 구현하면 반드시 구멍이 생기는 영역이므로 검증된 프레임워크를 쓰는 것이 원칙이다.', p:'why' },
    ];

    const FILTERS = [
      { name:'SecurityContextHolderFilter', desc:'보안 컨텍스트 초기화' },
      { name:'CsrfFilter', desc:'CSRF 토큰 검증' },
      { name:'UsernamePasswordFilter', desc:'로그인 폼 인증 처리' },
      { name:'AuthorizationFilter', desc:'URL별 권한 확인' },
    ];

    function V({ p }) {
      if (p==='concept') return (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-lg mx-auto">
          <div className="bg-sky-50 p-4 rounded-xl border-2 border-sky-400 text-center">
            <div className="text-2xl mb-1">🪪</div>
            <div className="font-bold text-sky-800">인증 (Authentication)</div>
            <div className="text-sm text-sky-600 mt-1">"너 누구야?"</div>
            <div className="text-xs text-slate-500 mt-2">신분증 확인 · 로그인</div>
            <div className="text-xs text-rose-500 mt-1">실패 → 401 Unauthorized</div>
          </div>
          <div className="bg-amber-50 p-4 rounded-xl border-2 border-amber-400 text-center">
            <div className="text-2xl mb-1">🔑</div>
            <div className="font-bold text-amber-800">인가 (Authorization)</div>
            <div className="text-sm text-amber-600 mt-1">"너 이거 해도 돼?"</div>
            <div className="text-xs text-slate-500 mt-2">출입 가능 구역 확인</div>
            <div className="text-xs text-rose-500 mt-1">실패 → 403 Forbidden</div>
          </div>
        </div>
      );
      if (p==='filter') return (
        <div className="max-w-md mx-auto space-y-2">
          <div className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Security Filter Chain</div>
          <div className="bg-sky-50 p-2 rounded-lg border border-sky-200 text-center text-sm font-bold text-sky-800">HTTP 요청 →</div>
          {FILTERS.map((f, i) => (
            <div key={f.name}>
              <div className="flex items-center gap-2 px-3 py-2 rounded-lg bg-violet-50 border border-violet-200">
                <span className="w-5 h-5 rounded-full bg-violet-500 text-white text-xs flex items-center justify-center font-bold shrink-0">{i+1}</span>
                <span className="font-mono text-xs font-bold text-violet-800">{f.name}</span>
                <span className="text-xs text-slate-500 ml-auto">{f.desc}</span>
              </div>
              {i < FILTERS.length - 1 && <div className="flex justify-center"><svg width="12" height="10" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" strokeWidth="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg></div>}
            </div>
          ))}
          <div className="bg-emerald-50 p-2 rounded-lg border border-emerald-200 text-center text-sm font-bold text-emerald-800">→ DispatcherServlet</div>
        </div>
      );
      if (p==='config') return (
        <div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300">
          <div><span className="text-yellow-300">@Bean</span></div>
          <div>SecurityFilterChain filterChain(HttpSecurity http) {'{'}</div>
          <div>{'  '}<span className="text-pink-400">return</span> http</div>
          <div>{'    '}.authorizeHttpRequests(auth -&gt; auth</div>
          <div>{'      '}.requestMatchers(<span className="text-emerald-400">"/api/public/**"</span>)</div>
          <div>{'        '}.permitAll() <span className="text-slate-500">// 누구나 OK</span></div>
          <div>{'      '}.anyRequest()</div>
          <div>{'        '}.authenticated() <span className="text-slate-500">// 나머지 인증 필요</span></div>
          <div>{'    '})</div>
          <div>{'    '}.build();</div>
          <div>{'}'}</div>
        </div>
      );
      if (p==='password') return (
        <div className="max-w-md mx-auto space-y-3">
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-rose-50 p-3 rounded-xl border border-rose-200 text-center"><div className="text-xl mb-1">❌</div><div className="text-sm font-bold text-rose-800">평문 저장</div><div className="text-xs text-rose-600 font-mono mt-1">"password123"</div></div>
            <div className="bg-emerald-50 p-3 rounded-xl border-2 border-emerald-400 ring-2 ring-emerald-300 shadow text-center"><div className="text-xl mb-1">✅</div><div className="text-sm font-bold text-emerald-800">BCrypt 해시</div><div className="text-xs text-emerald-600 font-mono mt-1">"$2a$10$xK..."</div></div>
          </div>
          <div className="bg-slate-900 p-3 rounded-lg text-xs font-mono text-slate-300">
            <div><span className="text-yellow-300">@Bean</span></div>
            <div>PasswordEncoder encoder() {'{'}</div>
            <div>{'  '}<span className="text-pink-400">return new</span> BCryptPasswordEncoder();</div>
            <div>{'}'}</div>
          </div>
        </div>
      );
      return (
        <div className="max-w-md mx-auto bg-slate-800 p-5 rounded-xl text-center">
          <div className="text-emerald-400 font-bold text-lg mb-2">보안은 직접 구현하면 반드시 구멍이 생긴다</div>
          <div className="text-slate-400 text-sm">CSRF · 세션 · OAuth2 · JWT → Spring Security가 모두 내장</div>
        </div>
      );
    }
    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter V-3-1</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">인증(Authentication)과 인가(Authorization)</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600"><b>Spring Security</b>의 Filter Chain, SecurityFilterChain 설정, BCrypt 비밀번호 암호화를 체험합니다.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[280px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
