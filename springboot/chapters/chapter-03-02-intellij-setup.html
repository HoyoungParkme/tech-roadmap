<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter III-1-2 — IDE 설치 IntelliJ IDEA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'what', label:'① IDE란', desc:'[STEP 1] IDE(통합 개발 환경) = 코드 편집기 + 실행 버튼 + 디버거를 한 화면에 모아놓은 개발자 전용 작업 공간. 소설가에게 맞춤법 검사·자동 저장·목차 관리가 합쳐진 워드프로세서가 있다면, 개발자에게는 IDE가 그 역할이다.', vis:'what' },
      { id:'pick', label:'② 버전 선택', desc:'[STEP 2] IntelliJ IDEA Community(무료) — Java + Spring Boot 기본 기능 지원, 입문자에게 충분. Ultimate(유료) — Spring 전용 기능(빈 그래프, HTTP 클라이언트 등) 추가. 처음 배우는 단계라면 Community로 시작한다.', vis:'pick' },
      { id:'install', label:'③ 설치와 프로젝트 열기', desc:'[STEP 3] jetbrains.com/idea/download에서 Community 다운로드 → 설치 → File > Open에서 build.gradle 선택 → "Open as Project" 클릭 → 의존성 자동 다운로드.', vis:'install' },
      { id:'features', label:'④ 핵심 기능', desc:'[STEP 4] 자동완성(타이핑하면 후보 목록 표시), 오류 즉시 표시(빨간 밑줄), 소스 이동(Ctrl+B로 정의로 점프). 이 기능들이 없으면 애노테이션이 어디서 무슨 일을 하는지 파악하기 어렵다.', vis:'features' },
      { id:'ready', label:'⑤ 준비 완료', desc:'[STEP 5] JDK + IDE가 갖춰지면 코드를 작성하고 즉시 실행하며 배울 수 있는 피드백 루프가 만들어진다. 다음: Spring Initializr로 프로젝트를 생성한다.', vis:'ready' },
    ];
    function V({ id }) {
      if (id==='what') return (
        <div className="grid grid-cols-1 md:grid-cols-3 gap-3 max-w-lg mx-auto">
          {[{icon:'📝',name:'코드 편집',desc:'구문 강조·자동완성'},{icon:'▶️',name:'실행',desc:'클릭 한 번으로 서버 시작'},{icon:'🔍',name:'디버거',desc:'오류 추적·변수 관찰'}].map(f=>(<div key={f.name} className="bg-sky-50 p-4 rounded-xl border border-sky-200 text-center"><div className="text-2xl mb-1">{f.icon}</div><div className="font-bold text-sm text-sky-800">{f.name}</div><div className="text-xs text-sky-600">{f.desc}</div></div>))}
        </div>
      );
      if (id==='pick') return (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-lg mx-auto">
          <div className="bg-emerald-50 p-4 rounded-xl border-2 border-emerald-400 ring-2 ring-emerald-300 shadow-lg text-center">
            <div className="text-2xl mb-1">🆓</div><div className="font-bold text-emerald-800">Community (무료)</div>
            <div className="text-xs text-emerald-600 mt-1">Java · Spring Boot 기본 · 입문자 충분</div>
            <div className="mt-2"><span className="text-xs bg-emerald-200 text-emerald-800 px-2 py-0.5 rounded-full font-bold">권장</span></div>
          </div>
          <div className="bg-violet-50 p-4 rounded-xl border border-violet-200 text-center">
            <div className="text-2xl mb-1">💎</div><div className="font-bold text-violet-800">Ultimate (유료)</div>
            <div className="text-xs text-violet-600 mt-1">Spring 전용 기능 · 실무팀용</div>
          </div>
        </div>
      );
      if (id==='install') return (
        <div className="max-w-md mx-auto space-y-2">
          {['1. jetbrains.com → Community 다운로드','2. 설치 파일 실행','3. File → Open → build.gradle 선택','4. "Open as Project" 클릭','5. 의존성 자동 다운로드 완료'].map((s,i)=>(<div key={i} className={`flex items-center gap-3 p-2 rounded-lg border ${i<=3?'bg-emerald-50 border-emerald-200':'bg-amber-50 border-amber-200'}`}><span className="w-6 h-6 rounded-full bg-emerald-500 text-white text-xs flex items-center justify-center font-bold shrink-0">{i+1}</span><span className="text-sm">{s.split('. ')[1]}</span></div>))}
        </div>
      );
      if (id==='features') return (
        <div className="space-y-3 max-w-md mx-auto">
          {[{key:'Ctrl+Space',name:'자동완성',desc:'타이핑하면 후보 목록 표시',color:'sky'},{key:'빨간 밑줄',name:'오류 표시',desc:'컴파일 전에 오류 즉시 감지',color:'rose'},{key:'Ctrl+B',name:'소스 이동',desc:'애노테이션/클래스 정의로 점프',color:'violet'}].map(f=>(<div key={f.name} className={`flex items-center gap-3 p-3 rounded-lg bg-${f.color}-50 border border-${f.color}-200`}><span className={`text-xs font-mono bg-${f.color}-200 text-${f.color}-800 px-2 py-1 rounded`}>{f.key}</span><div><div className="font-semibold text-sm">{f.name}</div><div className="text-xs text-slate-500">{f.desc}</div></div></div>))}
        </div>
      );
      return (<div className="text-center space-y-3"><div className="text-4xl">✅</div><div className="text-lg font-bold text-emerald-800">JDK + IDE 준비 완료</div><div className="text-sm text-slate-500">다음: Spring Initializr로 프로젝트 생성</div></div>);
    }
    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),3500);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter III-1-2</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">IDE 설치 — IntelliJ IDEA</h1><span className="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full">★★☆</span></div><p className="text-slate-600">개발자의 작업 공간 <b>IntelliJ IDEA</b> 설치와 핵심 기능을 안내합니다.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[240px] flex items-center justify-center"><div className="w-full"><V id={step.vis}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
