<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter I-1-1 — Java란 무엇인가</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    ─────────────────────────────────────────────────────────────
    Chapter I-1-1 — Java란 무엇인가
    ─────────────────────────────────────────────────────────────
    학습 목표 : Java가 어떤 언어인지, "Write Once, Run Anywhere" 철학과
               객체지향 프로그래밍, 기업 환경에서 선택되는 이유를 체험한다.
    시각화   : 레시피(코드) → 공용 레시피(바이트코드) → 3개 주방(OS)
               비유 중심 다이어그램 + 단계별 설명.
    ─────────────────────────────────────────────────────────────
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // -----------------------------------------
    // 1. 시뮬레이션 스텝 정의
    // -----------------------------------------
    const STEPS = [
      {
        id: 'intro',
        label: '① Java 탄생',
        desc: '[STEP 1 — 탄생] Java는 1995년 Sun Microsystems가 만든 프로그래밍 언어다. 프로그래밍 언어란 컴퓨터에게 일을 시키기 위해 사람이 작성하는 명령어 모음이다. "3시에 커피 한 잔 가져다줘"를 사람에게 말하듯, 컴퓨터에게도 정해진 규칙으로 일을 시켜야 한다. 그 규칙 중 하나가 Java다.',
        visual: 'birth',
      },
      {
        id: 'wora',
        label: '② Write Once, Run Anywhere',
        desc: '[STEP 2 — 핵심 철학] Java의 가장 큰 특징은 "한 번 쓰고 어디서나 실행"이다. 보통 프로그램은 만들어진 운영체제(OS)에서만 실행되지만, Java 프로그램은 Windows에서 만들어도 Linux나 macOS에서 코드 수정 없이 그대로 돌아간다.',
        visual: 'wora',
      },
      {
        id: 'analogy',
        label: '③ 레시피 비유',
        desc: '[STEP 3 — 비유로 이해] 내 집 부엌에서 쓴 레시피(Java 코드)를 어느 나라 주방(운영체제)에서도 그대로 요리할 수 있는 셈이다. 이것이 가능한 이유는 JVM(Java Virtual Machine)이라는 "현지 요리사"가 각 주방(OS)에 맞게 레시피를 해석해주기 때문이다.',
        visual: 'recipe',
      },
      {
        id: 'oop',
        label: '④ 객체지향 프로그래밍',
        desc: '[STEP 4 — OOP] Java는 객체지향 프로그래밍(OOP)을 기반으로 한다. 현실 세계처럼 "사물(객체)"을 중심으로 코드를 구성한다. 예를 들어 "자동차" 객체는 색깔·속도 같은 속성과 "출발"·"정지" 같은 동작을 묶어서 표현한다. 이 방식은 코드를 체계적으로 정리하고 재사용하기 쉽게 만든다.',
        visual: 'oop',
      },
      {
        id: 'why',
        label: '⑤ 왜 Java인가',
        desc: '[STEP 5 — 기업의 선택] 전 세계 은행, 공공기관, 대기업 백엔드에 Java가 많이 쓰이는 이유는 세 가지다. 첫째, 30년 가까운 역사에서 검증된 안정성. 둘째, 수백만 개의 라이브러리로 이루어진 방대한 생태계. 셋째, 정적 타입 덕분에 대규모 팀에서도 실수를 줄일 수 있다.',
        visual: 'why',
      }
    ];

    // -----------------------------------------
    // 2. 시각화 컴포넌트들
    // -----------------------------------------

    // 공통: 애니메이션 박스
    function AnimBox({ children, active, color = 'emerald', className = '' }) {
      const colors = {
        emerald: active ? 'bg-emerald-100 border-emerald-500 ring-2 ring-emerald-300 shadow-lg scale-105' : 'bg-white border-slate-200',
        sky: active ? 'bg-sky-100 border-sky-500 ring-2 ring-sky-300 shadow-lg scale-105' : 'bg-white border-slate-200',
        amber: active ? 'bg-amber-100 border-amber-500 ring-2 ring-amber-300 shadow-lg scale-105' : 'bg-white border-slate-200',
        violet: active ? 'bg-violet-100 border-violet-500 ring-2 ring-violet-300 shadow-lg scale-105' : 'bg-white border-slate-200',
        rose: active ? 'bg-rose-100 border-rose-500 ring-2 ring-rose-300 shadow-lg scale-105' : 'bg-white border-slate-200',
      };
      return (
        <div className={`px-4 py-3 rounded-xl border-2 transition-all duration-500 ${colors[color]} ${className}`}>
          {children}
        </div>
      );
    }

    // 화살표
    function Arrow({ horizontal = false }) {
      if (horizontal) {
        return (
          <div className="flex items-center mx-2">
            <svg width="32" height="16" viewBox="0 0 32 16" fill="none" stroke="#94a3b8" strokeWidth="2">
              <path d="M0 8h28M22 2l6 6-6 6"/>
            </svg>
          </div>
        );
      }
      return (
        <div className="flex justify-center my-1">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2">
            <path d="M12 5v14M5 12l7 7 7-7"/>
          </svg>
        </div>
      );
    }

    // STEP 1: 탄생
    function BirthVisual() {
      return (
        <div className="flex flex-col items-center gap-4">
          <AnimBox active={true} color="amber">
            <div className="text-center">
              <div className="text-3xl mb-2">☕</div>
              <div className="font-bold text-amber-800">Java</div>
              <div className="text-xs text-amber-600">1995년 · Sun Microsystems</div>
            </div>
          </AnimBox>
          <div className="bg-slate-50 rounded-lg p-4 border border-slate-200 max-w-md">
            <div className="text-sm font-mono text-slate-700 space-y-1">
              <div className="text-slate-400">// 사람이 컴퓨터에게 내리는 명령</div>
              <div><span className="text-pink-500 font-bold">public class</span> <span className="text-cyan-600">Hello</span> {'{'}</div>
              <div>{'    '}<span className="text-pink-500 font-bold">public static void</span> main(String[] args) {'{'}</div>
              <div>{'        '}System.out.println(<span className="text-emerald-600">"안녕, Java!"</span>);</div>
              <div>{'    }'}</div>
              <div>{'}'}</div>
            </div>
          </div>
          <p className="text-sm text-slate-500 text-center max-w-sm">프로그래밍 언어 = 컴퓨터에게 일을 시키는 규칙.<br/>Java는 그 규칙 중 하나다.</p>
        </div>
      );
    }

    // STEP 2: WORA
    function WORAVisual() {
      const oses = [
        { name: 'Windows', icon: '🪟', color: 'sky' },
        { name: 'Linux', icon: '🐧', color: 'amber' },
        { name: 'macOS', icon: '🍎', color: 'violet' },
      ];
      return (
        <div className="flex flex-col items-center gap-4">
          <AnimBox active={true} color="emerald">
            <div className="text-center">
              <div className="font-bold text-emerald-800">Java 코드</div>
              <div className="text-xs text-emerald-600 font-mono">Hello.java</div>
            </div>
          </AnimBox>
          <Arrow />
          <div className="bg-slate-800 text-emerald-400 px-4 py-2 rounded-lg text-sm font-mono text-center">
            바이트코드 (.class)
          </div>
          <Arrow />
          <div className="flex gap-3 flex-wrap justify-center">
            {oses.map(os => (
              <AnimBox key={os.name} active={true} color={os.color}>
                <div className="text-center min-w-[80px]">
                  <div className="text-2xl mb-1">{os.icon}</div>
                  <div className="font-semibold text-sm">{os.name}</div>
                  <div className="text-xs text-green-600 mt-1">✓ 실행 성공</div>
                </div>
              </AnimBox>
            ))}
          </div>
          <p className="text-sm text-slate-500 text-center">한 번 작성한 코드가 <b>어떤 운영체제</b>에서든 동작한다</p>
        </div>
      );
    }

    // STEP 3: 레시피 비유
    function RecipeVisual() {
      return (
        <div className="flex flex-col items-center gap-3">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 w-full max-w-lg">
            <AnimBox active={true} color="amber" className="text-center">
              <div className="text-2xl mb-1">📝</div>
              <div className="font-bold text-sm text-amber-800">레시피 원본</div>
              <div className="text-xs text-amber-600 mt-1">= Java 코드</div>
              <div className="text-xs text-slate-500 mt-1">요리사가 작성</div>
            </AnimBox>
            <AnimBox active={true} color="emerald" className="text-center">
              <div className="text-2xl mb-1">🌐</div>
              <div className="font-bold text-sm text-emerald-800">공용 레시피</div>
              <div className="text-xs text-emerald-600 mt-1">= 바이트코드</div>
              <div className="text-xs text-slate-500 mt-1">국제 표준 기호</div>
            </AnimBox>
            <AnimBox active={true} color="violet" className="text-center">
              <div className="text-2xl mb-1">👨‍🍳</div>
              <div className="font-bold text-sm text-violet-800">현지 요리사</div>
              <div className="text-xs text-violet-600 mt-1">= JVM</div>
              <div className="text-xs text-slate-500 mt-1">주방에 맞게 해석</div>
            </AnimBox>
          </div>
          <div className="flex gap-3 flex-wrap justify-center mt-2">
            {['🇰🇷 한국 주방', '🇺🇸 미국 주방', '🇯🇵 일본 주방'].map((k, i) => (
              <div key={i} className="bg-slate-100 px-3 py-2 rounded-lg text-sm border border-slate-200">
                {k} <span className="text-green-600">→ 같은 요리 완성!</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // STEP 4: OOP
    function OOPVisual() {
      return (
        <div className="flex flex-col items-center gap-4">
          <AnimBox active={true} color="sky" className="w-full max-w-sm">
            <div className="text-center mb-3">
              <div className="text-2xl">🚗</div>
              <div className="font-bold text-sky-800">자동차 객체 (Object)</div>
            </div>
            <div className="grid grid-cols-2 gap-2 text-sm">
              <div className="bg-sky-50 p-2 rounded border border-sky-200">
                <div className="font-semibold text-sky-700 text-xs mb-1">속성 (데이터)</div>
                <div className="text-slate-600">색깔: 빨강</div>
                <div className="text-slate-600">속도: 100km/h</div>
                <div className="text-slate-600">연료: 80%</div>
              </div>
              <div className="bg-sky-50 p-2 rounded border border-sky-200">
                <div className="font-semibold text-sky-700 text-xs mb-1">동작 (메서드)</div>
                <div className="text-slate-600">출발()</div>
                <div className="text-slate-600">정지()</div>
                <div className="text-slate-600">가속()</div>
              </div>
            </div>
          </AnimBox>
          <div className="flex gap-2">
            <Arrow horizontal />
            <div className="bg-emerald-50 px-3 py-2 rounded-lg border border-emerald-200 text-sm text-emerald-700">
              속성 + 동작을 하나로 묶어서 관리 = <b>객체지향</b>
            </div>
          </div>
          <p className="text-xs text-slate-500 text-center max-w-sm">현실 세계의 사물처럼 코드를 구성하면<br/>체계적으로 정리하고 재사용하기 쉬워진다</p>
        </div>
      );
    }

    // STEP 5: 왜 Java인가
    function WhyJavaVisual() {
      const reasons = [
        { icon: '🏛️', title: '30년 안정성', desc: '은행·공공기관에서 검증', color: 'amber' },
        { icon: '📚', title: '방대한 생태계', desc: '수백만 개 라이브러리', color: 'emerald' },
        { icon: '🛡️', title: '정적 타입', desc: '실행 전 오류 감지', color: 'sky' },
      ];
      return (
        <div className="flex flex-col items-center gap-4">
          <div className="text-sm font-semibold text-slate-500 uppercase tracking-wider">기업이 Java를 선택하는 3가지 이유</div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 w-full max-w-lg">
            {reasons.map((r, i) => (
              <AnimBox key={i} active={true} color={r.color} className="text-center">
                <div className="text-2xl mb-2">{r.icon}</div>
                <div className="font-bold text-sm">{r.title}</div>
                <div className="text-xs text-slate-500 mt-1">{r.desc}</div>
              </AnimBox>
            ))}
          </div>
          <div className="bg-slate-800 text-slate-200 px-4 py-3 rounded-lg text-sm text-center max-w-md">
            <span className="text-amber-400 font-bold">결론:</span> Java를 이해해야 JVM · Spring Boot · Spring 생태계 전체가 왜 그렇게 설계되었는지 맥락이 연결된다
          </div>
        </div>
      );
    }

    // 시각화 렌더 분기
    function VisualPanel({ visualId }) {
      switch(visualId) {
        case 'birth': return <BirthVisual />;
        case 'wora': return <WORAVisual />;
        case 'recipe': return <RecipeVisual />;
        case 'oop': return <OOPVisual />;
        case 'why': return <WhyJavaVisual />;
        default: return null;
      }
    }

    // -----------------------------------------
    // 3. 메인 앱
    // -----------------------------------------
    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3500);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">

            {/* 상단 네비게이션 */}
            <div className="flex justify-between items-center text-sm">
              <a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a>
              <span className="text-slate-400">Chapter I-1-1</span>
            </div>

            {/* 헤더 */}
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div>
                <h1 className="text-2xl font-bold text-slate-800">Java란 무엇인가</h1>
                <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">★☆☆</span>
              </div>
              <p className="text-slate-600">
                Java가 어떤 언어인지, <b>"Write Once, Run Anywhere"</b> 철학과 객체지향 프로그래밍,
                기업이 Java를 선택하는 이유를 단계별로 알아봅니다.
              </p>
            </header>

            {/* 현재 단계 설명 */}
            <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 시각화 패널 */}
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[320px] flex items-center justify-center">
              <VisualPanel visualId={stepData.visual} />
            </div>

            {/* 컨트롤 바 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0}
                  className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={togglePlay}
                  className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={handleNext} disabled={isEnd}
                  className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length} — {stepData.label}
              </div>
            </div>

            {/* 스텝 인디케이터 */}
            <div className="flex justify-center gap-2">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                  className={`w-3 h-3 rounded-full transition-all ${i === currentStepIdx ? 'bg-green-700 scale-125' : 'bg-slate-300 hover:bg-slate-400'}`}
                />
              ))}
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
