    // ─────────────────────────────────────────────────────
    // CodeCard — 좌측에 표시하는 짧은 코드 카드 (다크/라이트)
    //   accent: 'in'  → lime (입력)
    //          'out' → slate (출력)
    // ─────────────────────────────────────────────────────
    function CodeCard({ label, code, accent, active }) {
      const isIn = accent === 'in';
      const baseBorder = isIn ? 'border-lime-300 bg-lime-50' : 'border-slate-200 bg-slate-50';
      const activeRing = active ? 'ring-2 ring-lime-400 shadow-md' : '';
      const headerBg = isIn ? 'bg-lime-100 text-lime-800' : 'bg-slate-100 text-slate-600';
      return (
        <div className={`rounded-lg border-2 ${baseBorder} ${activeRing} overflow-hidden transition-all duration-300`}>
          <div className={`px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider ${headerBg}`}>
            {label}
          </div>
          <pre className="text-[11px] font-mono text-slate-800 leading-snug p-2.5 m-0 whitespace-pre overflow-x-auto">{code}</pre>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // JvmTriplet — 3개 OS 위 JVM 인스턴스 시각화
    //   각 OS 박스 위에 동일한 JVM 이 올라가 있고,
    //   그 위에 동일한 .class 가 실행되는 모습을 보여준다.
    // ─────────────────────────────────────────────────────
    function JvmTriplet({ active }) {
      const osList = [
        { id: 'win',   name: 'Windows', icon: '🪟', color: 'sky'    },
        { id: 'mac',   name: 'macOS',   icon: '🍎', color: 'slate'  },
        { id: 'linux', name: 'Linux',   icon: '🐧', color: 'amber'  },
      ];
      const colorMap = {
        sky:   { bg: 'bg-sky-50',   border: 'border-sky-300',   text: 'text-sky-800',   ring: 'ring-sky-400'   },
        slate: { bg: 'bg-slate-50', border: 'border-slate-300', text: 'text-slate-800', ring: 'ring-slate-400' },
        amber: { bg: 'bg-amber-50', border: 'border-amber-300', text: 'text-amber-800', ring: 'ring-amber-400' },
      };
      const isAllActive = active === 'all';
      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">
          <div className="bg-slate-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-slate-600 flex items-center justify-between">

          <div className="p-3 grid grid-cols-3 gap-2">

              return (
                <div

                  className={`${c.bg} ${c.border} border-2 rounded-lg p-2 text-center transition-all duration-500 ${on ? `ring-2 ${c.ring} shadow-md scale-105` : 'opacity-70'}`}

                  <div className="text-2xl mb-1">{os.icon}</div>

                  <div className="bg-white rounded border border-slate-300 py-1 px-1 mb-1">

                    {on ? '▶ Hello, Java!' : '대기'}

                </div>

            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // FlowArrow — 변환 흐름 화살표 (수직)
    // ─────────────────────────────────────────────────────
    function FlowArrow({ label, active }) {
      return (
        <div className="flex items-center justify-center my-1">

    // ─────────────────────────────────────────────────────
    // VersionTimeline — Step 5 전용. Java 8/11/17/21 타임라인

    function VersionTimeline() {
      const versions = [
        { ver: '8',  year: 2014, key: '람다 / Stream',     color: 'bg-slate-400' },

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    //   상단 : .java 소스 카드
    //   ↓ javac 컴파일
    //   중간 : .class 바이트코드 카드
    //   ↓ JVM 실행
    //   하단 : 3 OS × JVM 시각화 (또는 Step 5 timeline)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const sourceActive = step.highlight === 'source';
      const compileActive = step.highlight === 'compile';
      const bytecodeActive = step.highlight === 'compile' || step.highlight === 'bytecode';
      const jvmActive = step.highlight === 'jvm';

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">☕ .java → javac → .class → JVM (3 OS)</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-1">
            {/* 1) 입력 — .java 소스 */}
            <CodeCard label={step.sourceLabel} code={step.sourceCode} accent="in" active={sourceActive} />

            <FlowArrow label={step.compileLabel} active={compileActive} />

            {/* 2) 중간 — .class 바이트코드 */}
            <CodeCard label={step.bytecodeLabel} code={step.bytecodeCode} accent="out" active={bytecodeActive} />

            <FlowArrow label="JVM 로딩 + JIT 실행" active={jvmActive} />

            {/* 3) 출력 — Step 5 는 타임라인, 나머지는 3 OS JVM */}
            {step.showTimeline ? (
              <VersionTimeline />
            ) : (
              <JvmTriplet active={step.jvmActiveOs} />
            )}
          </div>

          {/* 핵심 포인트 박스 */}
          <div className="mt-3 bg-lime-50 border-l-4 border-lime-500 px-3 py-2 rounded-r">
            <div className="text-[9px] font-bold text-lime-700 uppercase tracking-wider mb-0.5">핵심 포인트</div>
            <p className="text-[11px] text-lime-900 leading-snug">{step.keyPoint}</p>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-lime-400"></span>.java 소스
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-400"></span>.class 바이트코드
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-400"></span>Windows
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-400"></span>Linux
            </span>

              <span className="w-2 h-2 rounded bg-slate-300"></span>macOS

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   파일 탭 5개 + 윈도우 dot + 라인 번호 + 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total, onTabClick }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      const tabs = STEPS.map((s, i) => ({
        idx: i,
        filename: s.code.filename,
        lang: s.code.lang,
      }));

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">CodeViewer</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 파일 탭 5개 */}
          <div className="flex bg-[#21252b] border-b border-slate-700 overflow-x-auto">
            {tabs.map((t) => {
              const isActive = t.idx === stepIdx;
              return (
                <button
                  key={t.idx}
                  onClick={() => onTabClick(t.idx)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition-colors ${
                    isActive
                      ? 'bg-[#282c34] text-lime-300 border-t-2 border-t-lime-400'
                      : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'
                  }`}
                >
                  {t.filename}
                </button>
              );
            })}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-lime-500/15 border-l-2 border-lime-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>

          </div>
        </div>
      );

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; 목차로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter I-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-lime-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. Java &amp; Spring 의 기초 &gt; Chapter 1. Java 의 정체</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">I-1-1. Java란 무엇인가</h1>
                  <p className="text-sm text-slate-500 mt-0.5">1995 년 탄생부터 25 년의 진화까지 — JVM 과 WORA 로 보는 Java의 정체</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} onTabClick={setStepIdx} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-300 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: Java = <strong>1995 년 탄생 + WORA + JVM(통역사) + OOP·정적 타입 + 25 년의 LTS 진화</strong>. 신규 프로젝트는 <strong>Java 21 + Spring Boot 3</strong>가 표준. 다음(I-1-2)에서는 그 매개체인 <strong>JVM 내부 구조</strong>를 더 깊이 파헤친다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Java', 'JVM', 'WORA', 'javac', '.class', 'bytecode', 'OOP', 'static typing', 'LTS', 'Java 21'].map((kw) => (
                <span key={kw} className="bg-lime-50 text-lime-700 px-3 py-1 rounded-full text-xs font-medium border border-lime-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; 목차</a>
              <a href="./chapter-01-02-jvm.html" className="text-lime-700 hover:text-lime-900 font-medium">I-1-2 JVM이란 &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
