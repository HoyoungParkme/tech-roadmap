<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter VIII-1-1 — properties vs YAML</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'intro', label:'① 두 가지 형식', desc:'[STEP 1] Spring Boot 설정 파일은 .properties(평면 key=value)와 .yml(YAML 계층 구조) 두 가지를 지원한다. 기능 차이는 없지만 표현 방식이 다르다.', p:'intro' },
      { id:'props', label:'② .properties 형식', desc:'[STEP 2] server.port=8080처럼 key=value 한 줄 한 줄. 단순하고 익숙하지만, 계층이 깊어지면 접두사(server.servlet.context-path)가 반복되어 길어진다.', p:'props' },
      { id:'yaml', label:'③ .yml 형식', desc:'[STEP 3] 들여쓰기로 계층을 표현. 같은 접두사를 반복하지 않아 간결하다. 단, 들여쓰기 오류(탭 대신 스페이스 필수)에 민감하다.', p:'yaml' },
      { id:'convert', label:'④ 변환 규칙', desc:'[STEP 4] server.port=8080 ↔ server:\\n  port: 8080. 점(.)이 계층, 등호(=)가 콜론(:)으로 바뀐다. 리스트는 my.list[0]=a ↔ my:\\n  list:\\n    - a.', p:'convert' },
      { id:'choice', label:'⑤ 어느 쪽을 선택하나', desc:'[STEP 5] 팀 컨벤션을 따르되, 신규 프로젝트라면 YAML이 추세다. 계층이 많은 Spring Boot 설정에서 가독성이 좋다. 둘을 섞어 쓸 수도 있지만 혼란을 줄이려면 하나로 통일하는 것이 좋다.', p:'choice' },
    ];
    const PROPS_CODE = ['# application.properties','server.port=8080','server.servlet.context-path=/api','spring.datasource.url=jdbc:mysql://localhost/db','spring.datasource.username=root','spring.datasource.password=secret','spring.jpa.hibernate.ddl-auto=update'];
    const YAML_CODE = ['# application.yml','server:','  port: 8080','  servlet:','    context-path: /api','spring:','  datasource:','    url: jdbc:mysql://localhost/db','    username: root','    password: secret','  jpa:','    hibernate:','      ddl-auto: update'];

    function V({ p }) {
      if (p==='intro') return (
        <div className="grid grid-cols-2 gap-4 max-w-lg mx-auto">
          <div className="bg-amber-50 p-4 rounded-xl border border-amber-200 text-center"><div className="text-2xl mb-1">📄</div><div className="font-bold text-amber-800">.properties</div><div className="text-xs text-amber-600">평면 key=value</div></div>
          <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-200 text-center"><div className="text-2xl mb-1">📋</div><div className="font-bold text-emerald-800">.yml (YAML)</div><div className="text-xs text-emerald-600">계층 구조 (들여쓰기)</div></div>
        </div>
      );
      if (p==='props'||p==='yaml'||p==='convert') {
        const showP = p==='props'||p==='convert';
        const showY = p==='yaml'||p==='convert';
        return (
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3 max-w-2xl mx-auto">
            <div className={`rounded-xl border-2 overflow-hidden transition-all ${showP&&p!=='yaml'?'border-amber-400 ring-2 ring-amber-300 shadow-lg':'border-slate-200 opacity-40'}`}>
              <div className="bg-amber-50 px-3 py-2 text-xs font-bold text-amber-700 border-b border-amber-200">.properties</div>
              <div className="bg-slate-900 p-3 text-xs font-mono text-slate-300">{PROPS_CODE.map((l,i)=><div key={i} className={l.startsWith('#')?'text-slate-500':''}>{l}</div>)}</div>
            </div>
            <div className={`rounded-xl border-2 overflow-hidden transition-all ${showY&&p!=='props'?'border-emerald-400 ring-2 ring-emerald-300 shadow-lg':'border-slate-200 opacity-40'}`}>
              <div className="bg-emerald-50 px-3 py-2 text-xs font-bold text-emerald-700 border-b border-emerald-200">.yml (YAML)</div>
              <div className="bg-slate-900 p-3 text-xs font-mono text-slate-300">{YAML_CODE.map((l,i)=><div key={i} className={l.startsWith('#')?'text-slate-500':''}>{l}</div>)}</div>
            </div>
            {p==='convert'&&<div className="md:col-span-2 text-center text-xs text-slate-500">점(.) → 계층 들여쓰기 · 등호(=) → 콜론(:) · 내용은 동일</div>}
          </div>
        );
      }
      return (<div className="max-w-md mx-auto bg-slate-800 p-5 rounded-xl text-center"><div className="text-emerald-400 font-bold text-lg mb-2">신규 프로젝트 → YAML 추세</div><div className="text-slate-400 text-sm">팀 컨벤션 따르되, 하나로 통일</div></div>);
    }
    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter VIII-1-1</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">application.properties vs application.yml</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600">Spring Boot의 두 가지 설정 형식을 <b>코드로 비교</b>하고 변환 규칙을 체험합니다.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[280px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
