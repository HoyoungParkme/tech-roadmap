<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter I-3-1 — 라이브러리 vs 프레임워크</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter I-3-1 — 라이브러리 vs 프레임워크: 제어의 역전(IoC) 시각화 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { id: 'lib', label: '① 라이브러리란',
        desc: '[STEP 1 — 라이브러리] 라이브러리는 "내가 필요할 때 가져다 쓰는 도구 모음"이다. 내 코드가 주도권을 갖고 필요한 기능을 라이브러리에서 꺼내 쓴다. 마치 공구 세트에서 필요한 드라이버를 골라 쓰는 것과 같다.',
        mode: 'library' },
      { id: 'fw', label: '② 프레임워크란',
        desc: '[STEP 2 — 프레임워크] 프레임워크는 "큰 틀이 이미 짜여 있고, 내 코드가 그 틀 안에 들어가는 구조"다. 프레임워크가 주도권을 갖고 적절한 시점에 내 코드를 호출한다. 마치 프랜차이즈 본사가 정한 매뉴얼대로 내가 일하는 것과 같다.',
        mode: 'framework' },
      { id: 'ioc', label: '③ 제어의 역전 (IoC)',
        desc: '[STEP 3 — IoC] "내가 도구를 호출한다" vs "프레임워크가 나를 호출한다" — 이 차이를 제어의 역전(IoC, Inversion of Control)이라 부른다. 라이브러리에서는 내 코드가 흐름을 제어하지만, 프레임워크에서는 프레임워크가 흐름을 제어하고 필요할 때 내 코드를 부른다.',
        mode: 'ioc' },
      { id: 'example', label: '④ 실제 예시',
        desc: '[STEP 4 — 예시] Java 세상에서: Jackson(JSON 변환)은 라이브러리 — 내가 원할 때 호출한다. Spring Boot는 프레임워크 — HTTP 요청이 오면 Spring이 내 Controller를 호출한다. jQuery는 라이브러리, Next.js는 프레임워크다.',
        mode: 'example' },
      { id: 'why', label: '⑤ 왜 구분이 중요한가',
        desc: '[STEP 5 — 의미] 프레임워크를 쓸 때는 프레임워크의 규칙을 따라야 한다. 라이브러리는 자유롭게 조합할 수 있다. Spring Boot를 배운다는 것은 곧 "Spring의 규칙과 구조를 익힌다"는 뜻이다.',
        mode: 'summary' },
    ];

    function FlowDiagram({ mode }) {
      // 라이브러리: 내 코드 → 라이브러리
      // 프레임워크: 프레임워크 → 내 코드
      const Arrow = ({ direction = 'right', color = '#94a3b8' }) => (
        <svg width="48" height="24" viewBox="0 0 48 24" fill="none" stroke={color} strokeWidth="2.5" className="shrink-0">
          {direction === 'right' ? <path d="M4 12h36M34 6l6 6-6 6"/> : <path d="M44 12H8M14 6l-6 6 6 6"/>}
        </svg>
      );

      if (mode === 'library') {
        return (
          <div className="space-y-6">
            <div className="flex items-center justify-center gap-3 flex-wrap">
              <div className="bg-sky-100 border-2 border-sky-400 px-6 py-4 rounded-xl shadow-lg ring-2 ring-sky-300 text-center">
                <div className="text-2xl mb-1">👤</div>
                <div className="font-bold text-sky-800">내 코드</div>
                <div className="text-xs text-sky-600">(주도권)</div>
              </div>
              <Arrow direction="right" color="#0ea5e9" />
              <div className="bg-amber-100 border-2 border-amber-400 px-6 py-4 rounded-xl shadow ring-2 ring-amber-300 text-center">
                <div className="text-2xl mb-1">🔧</div>
                <div className="font-bold text-amber-800">라이브러리</div>
                <div className="text-xs text-amber-600">(도구)</div>
              </div>
            </div>
            <div className="bg-amber-50 p-3 rounded-lg border border-amber-200 text-sm text-center text-amber-800">
              🔧 공구 세트에서 <b>내가 필요한 도구를 골라 쓴다</b>
            </div>
          </div>
        );
      }

      if (mode === 'framework') {
        return (
          <div className="space-y-6">
            <div className="flex items-center justify-center gap-3 flex-wrap">
              <div className="bg-violet-100 border-2 border-violet-400 px-6 py-4 rounded-xl shadow-lg ring-2 ring-violet-300 text-center">
                <div className="text-2xl mb-1">🏗️</div>
                <div className="font-bold text-violet-800">프레임워크</div>
                <div className="text-xs text-violet-600">(주도권)</div>
              </div>
              <Arrow direction="right" color="#8b5cf6" />
              <div className="bg-sky-100 border-2 border-sky-400 px-6 py-4 rounded-xl shadow ring-2 ring-sky-300 text-center">
                <div className="text-2xl mb-1">👤</div>
                <div className="font-bold text-sky-800">내 코드</div>
                <div className="text-xs text-sky-600">(규칙 따름)</div>
              </div>
            </div>
            <div className="bg-violet-50 p-3 rounded-lg border border-violet-200 text-sm text-center text-violet-800">
              🏢 프랜차이즈 본사 매뉴얼대로 <b>프레임워크가 나를 호출한다</b>
            </div>
          </div>
        );
      }

      if (mode === 'ioc') {
        return (
          <div className="space-y-4">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="p-4 rounded-xl border-2 border-sky-300 bg-sky-50">
                <div className="font-bold text-sky-800 mb-2 text-center">라이브러리</div>
                <div className="flex items-center justify-center gap-2">
                  <span className="text-xl">👤</span>
                  <svg width="32" height="16" viewBox="0 0 32 16" fill="none" stroke="#0ea5e9" strokeWidth="2"><path d="M0 8h28M22 2l6 6-6 6"/></svg>
                  <span className="text-xl">🔧</span>
                </div>
                <div className="text-center text-sm text-sky-700 mt-2">내가 호출한다</div>
              </div>
              <div className="p-4 rounded-xl border-2 border-violet-300 bg-violet-50">
                <div className="font-bold text-violet-800 mb-2 text-center">프레임워크</div>
                <div className="flex items-center justify-center gap-2">
                  <span className="text-xl">🏗️</span>
                  <svg width="32" height="16" viewBox="0 0 32 16" fill="none" stroke="#8b5cf6" strokeWidth="2"><path d="M0 8h28M22 2l6 6-6 6"/></svg>
                  <span className="text-xl">👤</span>
                </div>
                <div className="text-center text-sm text-violet-700 mt-2">프레임워크가 나를 호출한다</div>
              </div>
            </div>
            <div className="bg-emerald-50 p-4 rounded-lg border border-emerald-200 text-center">
              <div className="font-bold text-emerald-800 text-lg mb-1">제어의 역전 (IoC)</div>
              <div className="text-sm text-emerald-700">Inversion of Control — 호출의 방향이 뒤집힌다</div>
            </div>
          </div>
        );
      }

      if (mode === 'example') {
        const examples = [
          { type: '라이브러리', items: [
            { name: 'Jackson', desc: 'JSON 변환 — 내가 원할 때 호출' },
            { name: 'Lombok', desc: '코드 생성 — 내가 애노테이션을 붙임' },
            { name: 'jQuery', desc: 'DOM 조작 — 내가 $() 호출' },
          ], color: 'sky', icon: '🔧' },
          { type: '프레임워크', items: [
            { name: 'Spring Boot', desc: 'HTTP 요청 → Spring이 Controller 호출' },
            { name: 'JUnit', desc: '테스트 실행 → JUnit이 @Test 호출' },
            { name: 'Next.js', desc: '라우팅·렌더링을 프레임워크가 제어' },
          ], color: 'violet', icon: '🏗️' },
        ];

        return (
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {examples.map(ex => (
              <div key={ex.type} className={`p-4 rounded-xl border-2 ${ex.color === 'sky' ? 'border-sky-300 bg-sky-50' : 'border-violet-300 bg-violet-50'}`}>
                <div className="flex items-center gap-2 mb-3">
                  <span className="text-xl">{ex.icon}</span>
                  <span className={`font-bold ${ex.color === 'sky' ? 'text-sky-800' : 'text-violet-800'}`}>{ex.type}</span>
                </div>
                {ex.items.map(item => (
                  <div key={item.name} className="bg-white p-2 rounded-lg border border-slate-200 mb-2">
                    <div className="font-semibold text-sm">{item.name}</div>
                    <div className="text-xs text-slate-500">{item.desc}</div>
                  </div>
                ))}
              </div>
            ))}
          </div>
        );
      }

      // summary
      return (
        <div className="space-y-4">
          <div className="bg-slate-800 text-slate-200 p-5 rounded-xl text-center">
            <div className="text-lg font-bold text-emerald-400 mb-2">Spring Boot를 배운다 = Spring의 규칙을 익힌다</div>
            <div className="text-sm text-slate-400">프레임워크는 자유로운 대신 규칙을 따라야 한다.<br/>그 규칙을 알면 강력한 기능을 쉽게 쓸 수 있다.</div>
          </div>
          <div className="grid grid-cols-2 gap-3 text-center text-sm">
            <div className="bg-sky-50 p-3 rounded-lg border border-sky-200">
              <div className="font-bold text-sky-800">라이브러리</div>
              <div className="text-sky-600">자유롭게 조합</div>
            </div>
            <div className="bg-violet-50 p-3 rounded-lg border border-violet-200">
              <div className="font-bold text-violet-800">프레임워크</div>
              <div className="text-violet-600">규칙을 따르면 강력</div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <div className="flex justify-between items-center text-sm">
              <a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a>
              <span className="text-slate-400">Chapter I-3-1</span>
            </div>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div>
                <h1 className="text-2xl font-bold">라이브러리 vs 프레임워크</h1>
                <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">★☆☆</span>
              </div>
              <p className="text-slate-600">
                <b>"내가 호출한다" vs "프레임워크가 나를 호출한다"</b> — 제어의 역전(IoC) 개념을 시각적으로 이해합니다.
              </p>
            </header>

            <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[280px] flex items-center justify-center">
              <div className="w-full">
                <FlowDiagram mode={stepData.mode} />
              </div>
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length} — {stepData.label}
              </div>
            </div>

            <div className="flex justify-center gap-2">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                  className={`w-3 h-3 rounded-full transition-all ${i === currentStepIdx ? 'bg-green-700 scale-125' : 'bg-slate-300 hover:bg-slate-400'}`} />
              ))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
