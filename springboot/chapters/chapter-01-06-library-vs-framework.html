    // ─────────────────────────────────────────────────────
    // Box — 박스(개발자/라이브러리/프레임워크 등) 공통 카드
    // ─────────────────────────────────────────────────────
    function Box({ icon, title, subtitle, color = 'lime', size = 'md' }) {
      const colorMap = {
        lime:   { bg: 'bg-lime-50',   border: 'border-lime-400',   text: 'text-lime-800',   sub: 'text-lime-700' },
        slate:  { bg: 'bg-slate-50',  border: 'border-slate-400',  text: 'text-slate-800',  sub: 'text-slate-600' },
        emerald:{ bg: 'bg-emerald-50',border: 'border-emerald-400',text: 'text-emerald-800',sub: 'text-emerald-700' },
        amber:  { bg: 'bg-amber-50',  border: 'border-amber-400',  text: 'text-amber-800',  sub: 'text-amber-700' },
        sky:    { bg: 'bg-sky-50',    border: 'border-sky-400',    text: 'text-sky-800',    sub: 'text-sky-700' },
        fuchsia:{ bg: 'bg-fuchsia-50',border: 'border-fuchsia-400',text: 'text-fuchsia-800',sub: 'text-fuchsia-700' },
      };
      const c = colorMap[color] || colorMap.lime;
      const sizing = size === 'lg'
        ? 'px-4 py-3 min-w-[140px]'
        : 'px-3 py-2 min-w-[110px]';
      return (
        <div className={`rounded-lg border-2 ${c.bg} ${c.border} ${sizing} text-center shadow-sm`}>
          <div className="text-2xl leading-none">{icon}</div>
          <div className={`text-xs font-bold ${c.text} mt-1`}>{title}</div>
          {subtitle && <div className={`text-[10px] ${c.sub} mt-0.5`}>{subtitle}</div>}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Arrow — 가로 화살표 (라벨 포함)

        amber:   { stroke: '#d97706', text: 'text-amber-700' },
        emerald: { stroke: '#059669', text: 'text-emerald-700' },

      const c = colorMap[color] || colorMap.lime;
      return (
        <div className="flex flex-col items-center min-w-[80px]">
          {label && <div className={`text-[10px] font-mono font-bold uppercase tracking-wide ${c.text} mb-0.5`}>{label}</div>}

    // ─────────────────────────────────────────────────────

    // ─────────────────────────────────────────────────────

    // ─────────────────────────────────────────────────────

    function HollywoodCard({ active }) {

    // ─────────────────────────────────────────────────────

      const annoActive  = step.mode === 'anno';

        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   파일명 탭 + 윈도우 dot + 라인 번호 + 강조 라인
    //   상단: 5 탭 (Step 별 파일)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ steps, stepIdx, onTabClick }) {
      const code = steps[stepIdx].code;
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 5 탭 */}
          <div className="bg-[#21252b] flex border-b border-slate-700 overflow-x-auto">

              const active = i === stepIdx;
              return (

                  key={s.code.filename}
                  onClick={() => onTabClick(i)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                    active
                      ? 'bg-[#282c34] text-lime-300 border-t-2 border-t-lime-400'
                      : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800/50'
                  }`}
                >
                  {s.code.filename}
                </button>
              );
            })}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[42rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-lime-500/15 border-l-2 border-lime-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {steps.length}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; 챕터 목록</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter I-3-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-lime-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. Java &amp; Spring 기초 &gt; Chapter 3. 라이브러리 vs 프레임워크</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">I-3-1. 라이브러리 vs 프레임워크 — Spring Boot = 프레임워크</h1>
                  <p className="text-sm text-slate-500 mt-0.5">"내가 호출하는가" vs "프레임워크가 나를 호출하는가" (IoC)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer steps={STEPS} stepIdx={stepIdx} onTabClick={setStepIdx} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-300 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: <strong>라이브러리</strong>는 내가 부르는 도구, <strong>프레임워크</strong>는 나를 부르는 큰 틀. 그 차이가 <strong>제어의 역전(IoC)</strong>이다. Spring 의 <strong>@ 어노테이션</strong>은 "프레임워크가 무엇을 해줄지"를 적은 메모. 다음(I-3-2)에서는 Bean / ApplicationContext / DI 같은 Spring 핵심 키워드를 정리한다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Library', 'Framework', 'IoC', 'Hollywood Principle', '@Component', '@RestController', 'DI', 'ApplicationContext'].map((kw) => (
                <span key={kw} className="bg-lime-50 text-lime-700 px-3 py-1 rounded-full text-xs font-medium border border-lime-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-01-05-spring-boot-solutions.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; I-2-2 Spring Boot 가 해결한 것</a>
              <a href="./chapter-01-07-spring-boot-position.html" className="text-lime-700 hover:text-lime-900 font-medium">I-3-2 Spring Boot 의 위치 &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
