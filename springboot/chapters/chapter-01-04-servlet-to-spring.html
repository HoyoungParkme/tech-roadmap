<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter I-2-1 — Servlet에서 Spring까지</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter I-2-1 — Servlet에서 Spring까지: 타임라인 시각화 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TIMELINE = [
      { year: '1997', tech: 'Servlet', icon: '📡', color: 'rose',
        title: 'Servlet 등장',
        desc: 'HTTP 요청을 받아 응답을 만드는 Java 코드 단위. web.xml에 모든 주소를 일일이 등록해야 했고, 반복 코드가 너무 많았다.',
        pain: '설정 파일 지옥 + 반복 코드',
        code: ['@WebServlet("/hello")', 'public class HelloServlet', '    extends HttpServlet {', '  protected void doGet(', '      HttpServletRequest req,', '      HttpServletResponse resp) {', '    resp.getWriter()', '      .println("Hello");', '  }', '}'],
      },
      { year: '2003', tech: 'Spring', icon: '🌱', color: 'emerald',
        title: 'Spring Framework 출시',
        desc: 'Rod Johnson이 만든 프레임워크. 의존성 주입(DI)으로 코드 구조를 깔끔하게 만들고, 반복 코드를 대폭 줄였다. 하지만 XML 설정 파일이 여전히 많았다.',
        pain: 'XML 설정 파일이 많고 초기 세팅 복잡',
        code: ['<!-- applicationContext.xml -->', '<bean id="userService"', '  class="com.example', '    .UserService">', '  <property', '    name="userRepo"', '    ref="userRepository"/>', '</bean>'],
      },
      { year: '2014', tech: 'Spring Boot', icon: '🚀', color: 'sky',
        title: 'Spring Boot 등장',
        desc: '"설정은 내가 알아서 할 테니, 비즈니스 로직에만 집중해라." 자동 설정, 내장 Tomcat, Spring Initializr로 초기 세팅이 10분 안에 끝나게 되었다.',
        pain: '해결! 자동 설정 + 내장 서버',
        code: ['@SpringBootApplication', 'public class MyApp {', '  public static void main(', '      String[] args) {', '    SpringApplication', '      .run(MyApp.class, args);', '  }', '}'],
      },
    ];

    const STEPS = [
      { id: 'overview', label: '① 전체 그림', desc: '[STEP 1 — 개요] Java 서버 개발은 1997년 Servlet → 2003년 Spring Framework → 2014년 Spring Boot 순서로 발전했다. 각 기술은 이전 기술의 불편함을 해결하기 위해 등장했다.', activeIdx: -1 },
      { id: 'servlet', label: '② Servlet (1997)', desc: '[STEP 2 — Servlet] 웹 서버로 들어온 HTTP 요청을 받아 응답을 만드는 Java 코드 단위다. web.xml에 모든 URL을 등록하고, 로그인 확인·예외 처리 같은 공통 작업을 매 요청마다 직접 써야 했다.', activeIdx: 0 },
      { id: 'spring', label: '③ Spring (2003)', desc: '[STEP 3 — Spring Framework] Rod Johnson이 만든 프레임워크. 의존성 주입(DI)으로 객체 관계를 Spring이 관리해줘 코드가 깔끔해졌다. 하지만 XML 설정 파일이 수십 줄이고, Tomcat을 별도 설치해야 했다.', activeIdx: 1 },
      { id: 'boot', label: '④ Spring Boot (2014)', desc: '[STEP 4 — Spring Boot] 자동 설정(Auto-configuration)으로 설정 파일을 거의 없앴고, 내장 Tomcat으로 서버 설치가 불필요해졌다. 지금은 Java 서버 개발의 사실상 표준이다.', activeIdx: 2 },
      { id: 'why', label: '⑤ 왜 역사가 중요한가', desc: '[STEP 5 — 맥락] 역사적 맥락을 알아야 Spring Boot가 왜 이런 구조로 설계됐는지, 어떤 문제를 해결하기 위해 만들어졌는지 이해할 수 있다. Servlet의 고통을 모르면 Spring Boot의 편리함을 체감하기 어렵다.', activeIdx: -1, showSummary: true },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const colors = { rose: { bg: 'bg-rose-100', border: 'border-rose-400', ring: 'ring-rose-300', text: 'text-rose-800', sub: 'text-rose-600', codeBg: 'bg-rose-50' },
        emerald: { bg: 'bg-emerald-100', border: 'border-emerald-400', ring: 'ring-emerald-300', text: 'text-emerald-800', sub: 'text-emerald-600', codeBg: 'bg-emerald-50' },
        sky: { bg: 'bg-sky-100', border: 'border-sky-400', ring: 'ring-sky-300', text: 'text-sky-800', sub: 'text-sky-600', codeBg: 'bg-sky-50' },
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <div className="flex justify-between items-center text-sm">
              <a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a>
              <span className="text-slate-400">Chapter I-2-1</span>
            </div>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div>
                <h1 className="text-2xl font-bold">Servlet에서 Spring까지</h1>
                <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">★☆☆</span>
              </div>
              <p className="text-slate-600">
                <b>1997 Servlet → 2003 Spring → 2014 Spring Boot</b>. 각 기술이 이전의 어떤 고통을 해결했는지 타임라인으로 체험합니다.
              </p>
            </header>

            <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 타임라인 */}
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Java 서버 개발 타임라인</div>

              <div className="space-y-4">
                {TIMELINE.map((item, idx) => {
                  const c = colors[item.color];
                  const isActive = stepData.activeIdx === idx || stepData.activeIdx === -1 || stepData.activeIdx === -2;
                  const isFocused = stepData.activeIdx === idx;

                  return (
                    <div key={item.year} className={`flex gap-4 transition-all duration-500 ${isActive ? 'opacity-100' : 'opacity-30'}`}>
                      {/* 연도 마커 */}
                      <div className="flex flex-col items-center shrink-0 w-16">
                        <div className={`w-10 h-10 rounded-full flex items-center justify-center text-xl transition-all duration-500 ${
                          isFocused ? `${c.bg} ${c.border} border-2 ring-2 ${c.ring} shadow-lg scale-110` : 'bg-slate-100 border border-slate-200'
                        }`}>{item.icon}</div>
                        <div className={`font-bold text-sm mt-1 ${isFocused ? c.text : 'text-slate-400'}`}>{item.year}</div>
                        {idx < TIMELINE.length - 1 && <div className="w-0.5 h-8 bg-slate-200 mt-1"></div>}
                      </div>

                      {/* 내용 카드 */}
                      <div className={`flex-1 p-4 rounded-xl border-2 transition-all duration-500 ${
                        isFocused ? `${c.bg} ${c.border} ring-2 ${c.ring} shadow-lg` : 'bg-white border-slate-200'
                      }`}>
                        <div className={`font-bold text-lg mb-1 ${isFocused ? c.text : 'text-slate-600'}`}>{item.tech}</div>
                        <p className="text-sm text-slate-600 mb-2">{item.title}</p>

                        {isFocused && (
                          <>
                            <div className={`text-xs ${c.sub} mb-2 font-semibold`}>
                              {idx < 2 ? '😤 ' : '✨ '}{item.pain}
                            </div>
                            <div className="bg-slate-800 p-3 rounded-lg text-xs font-mono text-slate-300 mt-2">
                              {item.code.map((line, li) => (
                                <div key={li} className="leading-relaxed">{line}</div>
                              ))}
                            </div>
                          </>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* 전체 요약 */}
              {stepData.showSummary && (
                <div className="mt-4 bg-slate-800 text-slate-200 p-4 rounded-lg text-sm text-center">
                  <span className="text-amber-400 font-bold">핵심:</span> Servlet의 고통 → Spring의 개선 → Spring Boot의 자동화. 이 흐름을 알아야 Spring Boot의 설계 철학이 이해된다.
                </div>
              )}
            </div>

            {/* 컨트롤 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length} — {stepData.label}
              </div>
            </div>

            <div className="flex justify-center gap-2">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                  className={`w-3 h-3 rounded-full transition-all ${i === currentStepIdx ? 'bg-green-700 scale-125' : 'bg-slate-300 hover:bg-slate-400'}`} />
              ))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
