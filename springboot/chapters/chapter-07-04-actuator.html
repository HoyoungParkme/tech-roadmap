    // ─────────────────────────────────────────────────────
    function EndpointCard({ ep, highlighted }) {
      const statusStyle = (() => {
        if (ep.status === 200) return { bg: 'bg-emerald-50', text: 'text-emerald-700', border: 'border-emerald-300', label: 'OK' };
        if (ep.status === 401) return { bg: 'bg-amber-50', text: 'text-amber-700', border: 'border-amber-300', label: 'AUTH' };

        return { bg: 'bg-slate-100', text: 'text-slate-500', border: 'border-slate-200', label: 'OFF' };
      })();
      const isLive = ep.status === 200;
      const ringClass = highlighted ? 'ring-2 ring-lime-400 ring-offset-1' : '';
      return (
        <div className={`rounded-lg border-2 ${statusStyle.border} ${statusStyle.bg} ${ringClass} p-2 flex items-start gap-2 transition-all`}>

    // ─────────────────────────────────────────────────────

      const codeRef = useRef(null);

      useEffect(() => {

          codeRef.current.className = `language-${code.lang}`;

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [activeKey, setActiveKey] = useState(STEPS[0].codeKey);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      // 단계 바뀌면 해당 코드 탭으로 자동 전환
      useEffect(() => {
        setActiveKey(STEPS[stepIdx].codeKey);
      }, [stepIdx]);

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

                  <p className="text-sm text-slate-500 mt-0.5">의존성 한 줄로 켜는 운영용 계기판 — health · info · env · metrics</p>

            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                activeKey={activeKey}
                setActiveKey={setActiveKey}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-300 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: Actuator는 <strong>의존성 한 줄</strong>로 켜고, <strong>exposure.include</strong>로 풀고, <strong>Spring Security</strong>로 잠근다. /health는 K8s 프로브, 나머지는 ADMIN. 다음(VIII-1-1)에서는 <strong>application.properties / yaml</strong> 외부 설정의 우선순위를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Actuator', '/health', '/info', '/env', '/metrics', 'exposure.include', 'Spring Security', 'Authorization', 'K8s Probe'].map((kw) => (
                <span key={kw} className="bg-lime-50 text-lime-700 px-3 py-1 rounded-full text-xs font-medium border border-lime-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-07-03-logging.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; VII-2-3 Logging</a>
              <a href="./chapter-08-01-properties-yaml.html" className="text-lime-700 hover:text-lime-900 font-medium">VIII-1-1 Properties &amp; YAML &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
