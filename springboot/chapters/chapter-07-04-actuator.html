<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter VII-3-1 — Spring Boot Actuator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'what', label:'① Actuator란', desc:'[STEP 1] Spring Boot Actuator = 운영 중인 애플리케이션의 상태를 HTTP로 조회하는 기능. spring-boot-starter-actuator 의존성 하나를 추가하면 /actuator/* 엔드포인트가 자동 생성된다.', p:'what' },
      { id:'endpoints', label:'② 주요 엔드포인트', desc:'[STEP 2] /actuator/health = 서버 생존 여부(UP/DOWN). /actuator/info = 앱 버전/빌드 정보. /actuator/metrics = JVM 메모리, HTTP 요청 수, DB 커넥션. /actuator/loggers = 실행 중 로그 레벨 동적 변경.', p:'endpoints' },
      { id:'config', label:'③ 노출 설정', desc:'[STEP 3] 기본으로 /health와 /info만 노출. 더 많은 엔드포인트를 열려면 management.endpoints.web.exposure.include=health,info,metrics,loggers로 명시한다.', p:'config' },
      { id:'prometheus', label:'④ Prometheus + Grafana', desc:'[STEP 4] micrometer-registry-prometheus 의존성을 추가하면 /actuator/prometheus 엔드포인트가 생기고 Grafana 대시보드로 시각화할 수 있다. Actuator 포트는 내부 망에서만 접근 가능하도록 분리하는 것이 보안 관례.', p:'prometheus' },
      { id:'why', label:'⑤ 왜 모니터링인가', desc:'[STEP 5] 서비스 장애를 사람이 먼저 알아채기 전에 모니터링 시스템이 먼저 감지해야 빠른 대응이 가능하다. /health는 쿠버네티스 Liveness/Readiness 프로브에 그대로 연결할 수 있다.', p:'why' },
    ];
    const ENDPOINTS = [
      { path:'/actuator/health', role:'서버 생존 여부 (UP/DOWN)', icon:'💚', k8s:'Liveness 프로브' },
      { path:'/actuator/info', role:'앱 버전·빌드 정보', icon:'ℹ️', k8s:'' },
      { path:'/actuator/metrics', role:'JVM·HTTP·DB 메트릭', icon:'📊', k8s:'' },
      { path:'/actuator/loggers', role:'로그 레벨 동적 변경', icon:'📝', k8s:'' },
    ];
    function V({ p }) {
      if (p==='what') return (
        <div className="max-w-md mx-auto space-y-3">
          <div className="bg-slate-900 p-3 rounded-xl text-xs font-mono text-slate-300">
            <div className="text-slate-500">// build.gradle</div>
            <div>implementation <span className="text-emerald-400">'org.springframework.boot:spring-boot-starter-actuator'</span></div>
          </div>
          <div className="bg-emerald-50 p-3 rounded-lg border border-emerald-200 text-center text-sm text-emerald-800">이 한 줄이면 <b>/actuator/*</b> 엔드포인트가 자동 생성된다</div>
        </div>
      );
      if (p==='endpoints') return (
        <div className="max-w-md mx-auto space-y-2">
          {ENDPOINTS.map(e => (
            <div key={e.path} className="flex items-center gap-3 px-3 py-2 rounded-lg bg-white border border-slate-200">
              <span className="text-lg">{e.icon}</span>
              <div className="flex-1"><div className="font-mono text-xs font-bold text-slate-700">{e.path}</div><div className="text-xs text-slate-500">{e.role}</div></div>
              {e.k8s && <span className="text-xs bg-sky-100 text-sky-700 px-2 py-0.5 rounded">{e.k8s}</span>}
            </div>
          ))}
        </div>
      );
      if (p==='config') return (
        <div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300">
          <div className="text-slate-500"># application.properties</div>
          <div className="mt-1 text-slate-500"># 노출할 엔드포인트 명시</div>
          <div>management.endpoints.web.exposure.include=</div>
          <div>{'  '}<span className="text-emerald-400">health,info,metrics,loggers</span></div>
          <div className="mt-2 text-slate-500"># /health 상세 정보 표시</div>
          <div>management.endpoint.health.show-details=<span className="text-amber-400">always</span></div>
        </div>
      );
      if (p==='prometheus') return (
        <div className="max-w-md mx-auto space-y-3">
          <div className="flex items-center justify-center gap-3 flex-wrap">
            <div className="bg-emerald-50 p-3 rounded-xl border border-emerald-200 text-center text-xs"><div className="text-lg">📦</div><div className="font-bold">Actuator</div><div>/actuator/prometheus</div></div>
            <div className="text-slate-400">→</div>
            <div className="bg-amber-50 p-3 rounded-xl border border-amber-200 text-center text-xs"><div className="text-lg">📈</div><div className="font-bold">Prometheus</div><div>메트릭 수집</div></div>
            <div className="text-slate-400">→</div>
            <div className="bg-violet-50 p-3 rounded-xl border border-violet-200 text-center text-xs"><div className="text-lg">📊</div><div className="font-bold">Grafana</div><div>시각화 대시보드</div></div>
          </div>
          <div className="bg-rose-50 p-2 rounded-lg border border-rose-200 text-xs text-rose-700 text-center">보안: Actuator 포트는 내부 망에서만 접근 가능하도록 분리</div>
        </div>
      );
      return (<div className="max-w-md mx-auto bg-slate-800 p-5 rounded-xl text-center"><div className="text-emerald-400 font-bold text-lg mb-2">모니터링이 장애보다 먼저 감지</div><div className="text-slate-400 text-sm">/health → K8s 프로브 · /metrics → Prometheus → Grafana</div></div>);
    }
    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter VII-3-1</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">Spring Boot Actuator</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600"><b>/health · /metrics · Prometheus + Grafana</b> 모니터링 체계를 체험합니다.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[240px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
