<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter VI-2-2 — 전역 예외 처리 @ControllerAdvice</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'problem', label:'① 매 Controller마다 try-catch', desc:'[STEP 1] 각 Controller에 try-catch를 넣으면 코드 중복 + 에러 응답 포맷이 들쭉날쭉. 10개 Controller에 같은 예외 처리를 복사하면 유지보수 지옥이 된다.', p:'problem' },
      { id:'custom', label:'② 커스텀 예외 정의', desc:'[STEP 2] UserNotFoundException 같은 도메인 예외 클래스를 직접 만든다. RuntimeException을 상속하고, 생성자에서 메시지를 조합한다. Service에서 throw new UserNotFoundException(id)만 던지면 된다.', p:'custom' },
      { id:'handler', label:'③ @ControllerAdvice + @ExceptionHandler', desc:'[STEP 3] GlobalExceptionHandler 클래스에 @ControllerAdvice를 붙이면 모든 Controller의 예외를 한 곳에서 잡는다. @ExceptionHandler로 예외 타입별 처리 메서드를 정의한다.', p:'handler' },
      { id:'response', label:'④ 일관된 에러 응답', desc:'[STEP 4] ErrorResponse = { "status": 404, "message": "사용자를 찾을 수 없습니다" } 구조. 클라이언트가 항상 같은 형태의 에러 JSON을 받아 예외 처리 로직을 공통화할 수 있다.', p:'response' },
      { id:'why', label:'⑤ 왜 전역 처리인가', desc:'[STEP 5] 에러 응답 포맷이 일관되지 않으면 API를 사용하는 클라이언트 측 오류 처리가 복잡해진다. 전역 핸들러 한 곳만 수정하면 모든 에러 응답이 동시에 바뀐다.', p:'why' },
    ];
    function V({ p }) {
      if (p==='problem') return (
        <div className="max-w-md mx-auto space-y-2">
          {['UserController','OrderController','ProductController'].map(c => (
            <div key={c} className="bg-rose-50 p-2 rounded-lg border border-rose-200 flex items-center gap-2">
              <span className="text-xs font-mono text-rose-700">{c}</span>
              <span className="text-xs text-rose-500 ml-auto">try-catch 중복 ❌</span>
            </div>
          ))}
          <div className="text-center text-xs text-slate-500 mt-2">같은 예외 처리를 모든 Controller에 복사 = 유지보수 지옥</div>
        </div>
      );
      if (p==='custom') return (
        <div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300">
          <div><span className="text-pink-400">public class</span> <span className="text-cyan-400">UserNotFoundException</span></div>
          <div>{'    '}<span className="text-pink-400">extends</span> RuntimeException {'{'}</div>
          <div>{'    '}<span className="text-pink-400">public</span> UserNotFoundException(Long id) {'{'}</div>
          <div>{'        '}<span className="text-pink-400">super</span>(<span className="text-emerald-400">"사용자를 찾을 수 없습니다. id="</span> + id);</div>
          <div>{'    }'}</div>
          <div>{'}'}</div>
        </div>
      );
      if (p==='handler') return (
        <div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300">
          <div><span className="text-yellow-300">@ControllerAdvice</span> <span className="text-slate-500">// 모든 Controller 예외를 한 곳에서</span></div>
          <div><span className="text-pink-400">public class</span> <span className="text-cyan-400">GlobalExceptionHandler</span> {'{'}</div>
          <div className="mt-1">{'    '}<span className="text-yellow-300">@ExceptionHandler</span>(UserNotFoundException.<span className="text-pink-400">class</span>)</div>
          <div>{'    '}<span className="text-pink-400">public</span> ResponseEntity&lt;ErrorResponse&gt;</div>
          <div>{'        '}handleUserNotFound(UserNotFoundException e) {'{'}</div>
          <div>{'        '}<span className="text-pink-400">return</span> ResponseEntity.status(404)</div>
          <div>{'            '}.body(<span className="text-pink-400">new</span> ErrorResponse(404, e.getMessage()));</div>
          <div>{'    }'}</div>
          <div>{'}'}</div>
        </div>
      );
      if (p==='response') return (
        <div className="max-w-md mx-auto grid grid-cols-2 gap-3">
          <div className="bg-emerald-50 p-3 rounded-xl border border-emerald-200"><div className="font-bold text-sm text-emerald-800 mb-1">✅ 성공</div>
            <div className="bg-slate-900 p-2 rounded text-xs font-mono text-emerald-400">{'{ "id":1, "name":"Alice" }'}</div>
            <div className="text-xs text-slate-500 mt-1">200 OK</div>
          </div>
          <div className="bg-rose-50 p-3 rounded-xl border-2 border-rose-400"><div className="font-bold text-sm text-rose-800 mb-1">❌ 에러</div>
            <div className="bg-slate-900 p-2 rounded text-xs font-mono text-rose-400">{'{ "status":404,\n  "message":"사용자를\n  찾을 수 없습니다" }'}</div>
            <div className="text-xs text-slate-500 mt-1">404 Not Found</div>
          </div>
        </div>
      );
      return (<div className="max-w-md mx-auto bg-slate-800 p-5 rounded-xl text-center"><div className="text-emerald-400 font-bold text-lg mb-2">전역 핸들러 1곳 수정 = 모든 에러 응답 동시 변경</div><div className="text-slate-400 text-sm">클라이언트가 일관된 에러 JSON을 항상 받을 수 있다</div></div>);
    }
    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter VI-2-2</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">전역 예외 처리 — @ControllerAdvice</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600"><b>@ControllerAdvice + @ExceptionHandler</b>로 모든 예외를 한 곳에서 처리하는 방법을 체험합니다.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[240px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
