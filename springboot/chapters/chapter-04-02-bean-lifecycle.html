    // ─────────────────────────────────────────────────────
    // 5단계 라이프사이클 메타 데이터 (좌측 상단 박스용)
    //   step 의 activeStage 와 매칭해서 색을 바꾼다.
    // ─────────────────────────────────────────────────────
    const STAGES = [
      { key: 'instantiation', icon: '🏗️',  title: 'Instantiation',  sub: '생성',          employee: '신규 채용' },
      { key: 'inject',        icon: '🔌',  title: 'Property 주입',  sub: 'DI',           employee: '동료 배정' },
      { key: 'post',          icon: '🎉',  title: '@PostConstruct', sub: '입사 인사',     employee: '오리엔테이션' },
      { key: 'use',           icon: '💼',  title: '활성 사용',       sub: 'in-use',       employee: '정상 근무' },
      { key: 'pre',           icon: '👋',  title: '@PreDestroy',    sub: '퇴사 인사',     employee: '인수인계' },
    ];

    // ─────────────────────────────────────────────────────
    // LifecycleStages — 5개 단계 박스 가로 배치
    //   현재 activeStage = active (lime 강조)
    //   이전 단계        = done   (회색 체크)
    //   이후 단계        = pending(연한 회색)
    // ─────────────────────────────────────────────────────
    function LifecycleStages({ activeStage }) {
      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">
          <div className="bg-slate-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-slate-600 flex items-center justify-between">
            <span>Bean Lifecycle (5 stages)</span>
            <span className="text-[9px] font-mono text-slate-500">step {activeStage + 1} / 5</span>
          </div>
          <div className="p-2.5 grid grid-cols-5 gap-1.5">
            {STAGES.map((s, i) => {
              const status = i < activeStage ? 'done' : i === activeStage ? 'active' : 'pending';
              const cls =
                status === 'active'
                  ? 'bg-lime-100 border-lime-500 text-lime-900 shadow-md scale-[1.04]'
                  : status === 'done'
                  ? 'bg-emerald-50 border-emerald-300 text-emerald-700'
                  : 'bg-slate-50 border-slate-200 text-slate-400';
              return (
                <div
                  key={s.key}
                  className={`relative rounded-lg border-2 p-2 text-center transition-all ${cls}`}
                >
                  {status === 'done' && (
                    <span className="absolute top-0.5 right-1 text-[10px] text-emerald-500">✓</span>
                  )}
                  <div className="text-xl leading-none mb-1">{s.icon}</div>
                  <div className="text-[10px] font-bold leading-tight">{s.title}</div>
                  <div className="text-[9px] mt-0.5 opacity-80">{s.sub}</div>
                  <div className="text-[8px] mt-1 font-mono opacity-70 truncate">{s.employee}</div>
                </div>
              );
            })}
          </div>
          {/* 진행 막대 */}
          <div className="px-2.5 pb-2">
            <div className="w-full h-1 bg-slate-100 rounded-full overflow-hidden">
              <div
                className="h-full bg-lime-500 transition-all duration-500"
                style={{ width: `${((activeStage + 1) / 5) * 100}%` }}
              />
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // BeanCard — 빈 상태 + 메모리 슬롯(필드) 시각화
    // ─────────────────────────────────────────────────────
    function BeanCard({ beanState, memorySlots }) {
      return (
        <div className="bg-white rounded-lg border-2 border-lime-200 overflow-hidden">
          <div className="bg-lime-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-lime-700 flex items-center justify-between">
            <span>EmployeeService 빈 — 메모리 스냅샷</span>
            <span className="text-[9px] font-mono text-lime-600">{beanState}</span>

          <div className="p-2.5 space-y-1">

              <div
                key={i}
                className={`flex items-center gap-2 px-2 py-1 rounded border ${
                  slot.accent
                    ? 'bg-lime-50 border-lime-300'

                    : 'bg-slate-50 border-slate-200 border-dashed'

                <span
                  className={`text-[9px] font-mono px-1.5 py-0.5 rounded font-bold uppercase tracking-wide flex-shrink-0 ${
                    slot.accent

                  className={`text-[11px] font-mono leading-tight truncate ${
                    slot.filled ? 'text-slate-800' : 'text-slate-400 italic'

          </div>
        </div>

    }

    // ─────────────────────────────────────────────────────

    function EmployeeAnalogy({ employee, containerLog }) {

        <div className="bg-white rounded-lg border-2 border-amber-200 overflow-hidden">

            <span>👔 직원 비유 ↔ 컨테이너 동작</span>

                직원
              </span>
              <span className="text-[11px] text-slate-800 leading-tight">{employee}</span>
            </div>
            <div className="flex items-start gap-2">
              <span className="text-[9px] font-mono px-1.5 py-0.5 rounded bg-slate-100 text-slate-700 border border-slate-300 font-bold uppercase tracking-wide flex-shrink-0 mt-0.5">

    // ─────────────────────────────────────────────────────
    // FlowArrow — 단계 사이 흐름 화살표
    // ─────────────────────────────────────────────────────
    function FlowArrow({ label }) {
      return (
        <div className="flex items-center justify-center my-1">
          <div className="flex flex-col items-center">
            <div className="text-[9px] text-lime-600 font-mono font-bold tracking-wider uppercase">{label}</div>
            <div className="text-lime-400 text-lg leading-none">↓</div>
          </div>
        </div>

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    //   상단 : 5단계 라이프사이클 박스 (현재 단계 강조)
    //   ↓
    //   중간 : EmployeeService 빈 메모리 스냅샷
    //   ↓
    //   하단 : 직원 비유 + 컨테이너 로그
    //   하단 : 핵심 포인트
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🌱 Bean 생명주기 — 직원의 입사~퇴사</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-1">
            {/* 1) 5단계 박스 */}
            <LifecycleStages activeStage={step.activeStage} />

            <FlowArrow label={step.arrow.left} />

            {/* 2) 빈 메모리 스냅샷 */}
            <BeanCard beanState={step.beanState} memorySlots={step.memorySlots} />

            <FlowArrow label={step.arrow.right} />

            {/* 3) 직원 비유 + 컨테이너 동작 */}
            <EmployeeAnalogy employee={step.employee} containerLog={step.containerLog} />
          </div>

          {/* 핵심 포인트 박스 */}
          <div className="mt-3 bg-lime-50 border-l-4 border-lime-500 px-3 py-2 rounded-r">
            <div className="text-[9px] font-bold text-lime-700 uppercase tracking-wider mb-0.5">핵심 포인트</div>
            <p className="text-[11px] text-lime-900 leading-snug">{step.keyPoint}</p>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-lime-500"></span>현재 단계
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-400"></span>완료
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-300"></span>대기
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-400"></span>비유
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   파일명 탭 + 윈도우 dot + 라인 번호 + 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-lime-500/15 border-l-2 border-lime-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; 목차로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter IV-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-lime-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. Spring 핵심 &gt; Chapter 2. IoC/DI</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-2-1. Bean 생명주기 — 직원의 입사~퇴사</h1>
                  <p className="text-sm text-slate-500 mt-0.5">@Component 빈이 컨테이너에서 어떻게 태어나고, 일하고, 사라지는가</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-300 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: Spring 빈은 <strong>생성 → 주입 → @PostConstruct → 사용 → @PreDestroy</strong>의 5단계 생명주기를 거친다. 기본 스코프는 <strong>singleton</strong>(컨테이너당 1개), 무거운 초기화는 <strong>생성자가 아닌 @PostConstruct</strong>에. 다음(IV-2-2)에서는 DispatcherServlet과 요청 흐름을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['@Component', 'BeanFactory', '@Autowired', '@PostConstruct', '@PreDestroy', 'Singleton', 'IoC', 'DI'].map((kw) => (
                <span key={kw} className="bg-lime-50 text-lime-700 px-3 py-1 rounded-full text-xs font-medium border border-lime-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-04-01-request-flow.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; IV-1 요청 흐름</a>
              <a href="./chapter-04-03-dispatcher-servlet.html" className="text-lime-700 hover:text-lime-900 font-medium">IV-2-2 DispatcherServlet &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
