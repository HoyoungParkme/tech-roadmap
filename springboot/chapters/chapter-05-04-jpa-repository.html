    function ProxyTree({ nodes }) {
      const kindMap = {
        iface:  { bg: 'bg-sky-100',     text: 'text-sky-800',     border: 'border-sky-300',     tag: 'iface'  },

      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">

                  </span>
                  <span className="text-[11px] font-mono text-slate-700 leading-tight">{n.label}</span>
                </div>

            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────

    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);

          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }

                  <div className="text-xs text-slate-500 font-medium">Part V. 데이터 계층 &gt; Chapter 2. Spring Data JPA</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">V-2-2. Spring Data JPA — JpaRepository</h1>
                  <p className="text-sm text-slate-500 mt-0.5">인터페이스 한 줄로 CRUD·쿼리·페이징이 자동 완성되는 원리</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-300 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: <strong>JpaRepository&lt;T, ID&gt;</strong> 한 줄로 기본 CRUD 4종, <strong>메서드 이름</strong>으로 쿼리 자동 생성, 복잡한 건 <strong>@Query JPQL</strong>, 대용량은 <strong>Pageable</strong>. SQL 작성 없이 비즈니스 로직에만 집중하라.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['JpaRepository', 'CRUD', 'findByEmail', '@Query', 'JPQL', 'Pageable', 'Page<T>', 'Sort'].map((kw) => (
                <span key={kw} className="bg-lime-50 text-lime-800 px-3 py-1 rounded-full text-xs font-medium border border-lime-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-05-03-orm-jpa.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; V-2-1 ORM과 JPA</a>
              <a href="./chapter-05-05-security.html" className="text-lime-700 hover:text-lime-900 font-medium">V-3-1 Spring Security &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
