<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter V-2-2 — Spring Data JPA JpaRepository</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'magic', label:'① 인터페이스만 선언하면 끝', desc:'[STEP 1] JpaRepository를 상속하는 인터페이스만 만들면 Spring Data JPA가 구현체를 자동 생성한다. findAll(), findById(), save(), delete() 같은 기본 CRUD 메서드가 공짜로 제공된다.', p:'magic' },
      { id:'crud', label:'② 기본 CRUD 메서드', desc:'[STEP 2] findAll()=전체 조회, findById()=단건 조회, save()=저장/수정, deleteById()=삭제. 이 네 가지로 기본적인 DB 작업이 모두 가능하다.', p:'crud' },
      { id:'query', label:'③ 쿼리 메서드', desc:'[STEP 3] 메서드 이름으로 쿼리를 자동 생성한다. findByEmail(String email) → SELECT * FROM users WHERE email = ?. 이름 규칙만 맞추면 SQL을 직접 쓸 필요가 없다.', p:'query' },
      { id:'paging', label:'④ 페이징과 정렬', desc:'[STEP 4] Pageable 파라미터를 추가하면 페이징 + 정렬이 자동 지원된다. ?page=0&size=10&sort=name,asc 같은 쿼리 파라미터를 Spring이 자동 바인딩한다.', p:'paging' },
      { id:'why', label:'⑤ 생산성 극대화', desc:'[STEP 5] SQL 없이 인터페이스 선언만으로 CRUD + 쿼리 + 페이징이 완성된다. 반복 코드가 사라지고 비즈니스 로직에 집중할 수 있다.', p:'why' },
    ];
    function V({ p }) {
      if (p==='magic') return (
        <div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300">
          <div className="text-slate-500">// 이게 전부! 구현체는 Spring이 자동 생성</div>
          <div><span className="text-pink-400">public interface</span> <span className="text-cyan-400">UserRepository</span></div>
          <div>{'    '}<span className="text-pink-400">extends</span> <span className="text-cyan-400">JpaRepository</span>&lt;User, Long&gt; {'{'}</div>
          <div>{'    '}<span className="text-slate-500">// 기본 CRUD 메서드가 자동 제공됨</span></div>
          <div>{'}'}</div>
        </div>
      );
      if (p==='crud') return (
        <div className="max-w-md mx-auto space-y-2">
          {[
            { method:'findAll()', desc:'전체 조회', sql:'SELECT * FROM users', icon:'📋', color:'sky' },
            { method:'findById(1L)', desc:'단건 조회', sql:'SELECT * FROM users WHERE id=1', icon:'🔍', color:'emerald' },
            { method:'save(user)', desc:'저장/수정', sql:'INSERT or UPDATE', icon:'💾', color:'amber' },
            { method:'deleteById(1L)', desc:'삭제', sql:'DELETE FROM users WHERE id=1', icon:'🗑️', color:'rose' },
          ].map(m => (
            <div key={m.method} className={`flex items-center gap-3 px-3 py-2 rounded-lg bg-${m.color}-50 border border-${m.color}-200`}>
              <span className="text-lg">{m.icon}</span>
              <span className="font-mono text-sm font-bold w-32">{m.method}</span>
              <span className="text-xs text-slate-500 flex-1">{m.sql}</span>
            </div>
          ))}
        </div>
      );
      if (p==='query') return (
        <div className="max-w-md mx-auto space-y-3">
          <div className="bg-slate-900 p-3 rounded-xl text-xs font-mono text-slate-300">
            <div><span className="text-slate-500">// 메서드 이름 → SQL 자동 생성</span></div>
            <div>List&lt;User&gt; <span className="text-emerald-400">findByEmail</span>(String email);</div>
            <div><span className="text-slate-500">// → WHERE email = ?</span></div>
            <div className="mt-1">List&lt;User&gt; <span className="text-emerald-400">findByNameContaining</span>(String keyword);</div>
            <div><span className="text-slate-500">// → WHERE name LIKE '%keyword%'</span></div>
            <div className="mt-1">List&lt;User&gt; <span className="text-emerald-400">findByAgeGreaterThan</span>(int age);</div>
            <div><span className="text-slate-500">// → WHERE age > ?</span></div>
          </div>
          <div className="text-center text-xs text-emerald-600 font-semibold">이름 규칙만 맞추면 SQL 자동 생성!</div>
        </div>
      );
      if (p==='paging') return (
        <div className="max-w-md mx-auto space-y-3">
          <div className="bg-slate-900 p-3 rounded-xl text-xs font-mono text-slate-300">
            <div>Page&lt;User&gt; <span className="text-emerald-400">findAll</span>(<span className="text-cyan-400">Pageable</span> pageable);</div>
          </div>
          <div className="bg-sky-50 p-3 rounded-lg border border-sky-200 text-sm text-sky-800 font-mono text-center">
            ?page=0&size=10&sort=name,asc
          </div>
          <div className="text-center text-xs text-slate-500">Spring이 쿼리 파라미터를 자동 바인딩</div>
        </div>
      );
      return (
        <div className="max-w-md mx-auto bg-slate-800 p-5 rounded-xl text-center">
          <div className="text-emerald-400 font-bold text-lg mb-2">인터페이스 선언 = CRUD + 쿼리 + 페이징 완성</div>
          <div className="text-slate-400 text-sm">반복 코드 제거 → 비즈니스 로직에 집중</div>
        </div>
      );
    }
    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter V-2-2</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">Spring Data JPA — JpaRepository</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600"><b>인터페이스 선언만으로 CRUD가 완성</b>되는 JpaRepository의 마법을 체험합니다.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[240px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
