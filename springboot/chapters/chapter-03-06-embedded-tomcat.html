<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter III-3-2 — 내장 Tomcat으로 실행하기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'before', label:'① 예전 방식', desc:'[STEP 1] 예전에는 Tomcat을 별도로 설치·설정한 뒤 코드를 배포해야 했다. 카페를 열기 전에 주방 공사를 외부 업체에 맡기는 것과 같다. Spring Boot는 이 과정을 없앴다.', phase:'before' },
      { id:'run', label:'② bootRun 실행', desc:'[STEP 2] 프로젝트 루트에서 ./gradlew bootRun 실행. 콘솔에 "Started DemoApplication in X.XXX seconds"가 보이면 서버가 8080 포트에서 시작된 것이다.', phase:'run' },
      { id:'test', label:'③ API 확인', desc:'[STEP 3] 브라우저에 http://localhost:8080/hello 입력하거나, 터미널에서 curl http://localhost:8080/hello 실행. "Hello, Spring Boot!"가 출력되면 성공!', phase:'test' },
      { id:'port', label:'④ 포트 변경', desc:'[STEP 4] application.properties에 server.port=9090 한 줄 추가하면 8080 대신 9090에서 서버가 뜬다. 코드를 바꾸지 않고 동작을 조정하는 "설정 리모컨"이다.', phase:'port' },
      { id:'done', label:'⑤ 첫 실행 완료', desc:'[STEP 5] 내장 서버 방식이 개발 사이클을 크게 단축한다. 내 코드가 동작하는 순간을 직접 눈으로 확인했다. 다음: Part IV에서 Spring Boot 핵심 메커니즘을 배운다.', phase:'done' },
    ];

    function V({ phase }) {
      if (phase==='before') return (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-lg mx-auto">
          <div className="bg-rose-50 p-4 rounded-xl border border-rose-200 text-center"><div className="text-2xl mb-1">😤</div><div className="font-bold text-rose-800 text-sm">예전 (외장 Tomcat)</div><div className="text-xs text-rose-600 mt-1 space-y-1"><div>1. Tomcat 별도 다운로드</div><div>2. server.xml 설정</div><div>3. WAR 파일 배포</div><div>4. Tomcat 재시작</div></div></div>
          <div className="bg-emerald-50 p-4 rounded-xl border-2 border-emerald-400 ring-2 ring-emerald-300 shadow-lg text-center"><div className="text-2xl mb-1">✨</div><div className="font-bold text-emerald-800 text-sm">Spring Boot (내장 Tomcat)</div><div className="text-xs text-emerald-600 mt-1 space-y-1"><div>1. ./gradlew bootRun</div><div>2. 끝!</div></div></div>
        </div>
      );
      if (phase==='run') return (
        <div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-sm font-mono">
          <div className="text-emerald-400">$ ./gradlew bootRun</div>
          <div className="text-slate-500 mt-2">  .   ____          _</div>
          <div className="text-slate-500"> /\\ / ___'_ __ _ _(_)_ __</div>
          <div className="text-slate-500">( ( )\___ | '_ | '_| | '_ \</div>
          <div className="text-slate-500"> \\/  ___)| |_)| | | | | ||</div>
          <div className="text-slate-500">  '  |____| .__|_| |_|_| |_\</div>
          <div className="text-slate-500"> =========|_|==============</div>
          <div className="text-sky-400 mt-1">:: Spring Boot :: (v3.3.x)</div>
          <div className="text-slate-300 mt-2">Started DemoApplication in <span className="text-emerald-400 font-bold">2.341</span> seconds</div>
          <div className="text-slate-300">Tomcat started on port <span className="text-amber-400 font-bold">8080</span></div>
        </div>
      );
      if (phase==='test') return (
        <div className="max-w-md mx-auto space-y-3">
          <div className="bg-slate-900 p-3 rounded-xl text-sm font-mono">
            <div className="text-emerald-400">$ curl http://localhost:8080/hello</div>
            <div className="text-amber-300 mt-1 font-bold">Hello, Spring Boot!</div>
          </div>
          <div className="bg-emerald-50 p-3 rounded-lg border border-emerald-200 text-center">
            <div className="text-2xl mb-1">🎉</div>
            <div className="font-bold text-emerald-800">첫 API 응답 성공!</div>
          </div>
        </div>
      );
      if (phase==='port') return (
        <div className="max-w-md mx-auto space-y-3">
          <div className="bg-slate-900 p-3 rounded-xl text-sm font-mono">
            <div className="text-slate-500"># application.properties</div>
            <div className="text-amber-300">server.port=<span className="text-emerald-400 font-bold">9090</span></div>
          </div>
          <div className="flex items-center justify-center gap-3">
            <div className="bg-slate-100 px-3 py-2 rounded-lg text-sm"><span className="line-through text-slate-400">:8080</span></div>
            <span className="text-slate-400">→</span>
            <div className="bg-emerald-100 px-3 py-2 rounded-lg text-sm text-emerald-800 font-bold">:9090</div>
          </div>
          <div className="text-center text-xs text-slate-500">코드 수정 없이 설정 파일만으로 동작 변경</div>
        </div>
      );
      return (<div className="text-center space-y-3"><div className="text-4xl">🚀</div><div className="text-lg font-bold text-emerald-800">Part III 완료!</div><div className="text-sm text-slate-500">다음: Part IV — Spring Boot 핵심 메커니즘 (DI/AOP)</div></div>);
    }

    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),3500);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter III-3-2</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">내장 Tomcat으로 실행하기</h1><span className="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full">★★☆</span></div><p className="text-slate-600"><b>./gradlew bootRun</b>으로 서버를 시작하고 첫 API 응답을 확인하는 과정을 체험합니다.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[260px] flex items-center justify-center"><div className="w-full"><V phase={step.phase}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
