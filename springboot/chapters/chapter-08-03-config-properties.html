              5단계로 시각화한다.

    패턴: fastapi v1 — 좌(LiveDataPane: yml 계층 → POJO 클래스 매핑)
                       / 우(VSCode CodeViewer)
    색상: lime
  -->

    // ─────────────────────────────────────────────────────
    // YmlCard — 좌측 yml 카드 (들여쓰기 컬러)
    // ─────────────────────────────────────────────────────
    function YmlCard({ label, code }) {
      return (
        <div className="rounded-lg border-2 border-lime-300 bg-lime-50 overflow-hidden">
          <div className="px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider bg-lime-100 text-lime-800 flex items-center justify-between">

    // ─────────────────────────────────────────────────────
    // PojoTree — 우측 POJO/필드 트리
    //   kind 별 색상
    //     class     → lime    (클래스 선언)
    //     field     → emerald (정상 바인딩 필드)
    //     primitive → emerald (값 바인딩)
    //     nested    → sky     (중첩 객체/리스트/맵)
    //     invalid   → rose    (검증 실패 / 안티패턴)
    // ─────────────────────────────────────────────────────
    function PojoTree({ label, nodes }) {
      const kindMap = {
        class:     { bg: 'bg-lime-100',    text: 'text-lime-800',    border: 'border-lime-300',    tag: 'class' },
        field:     { bg: 'bg-emerald-50',  text: 'text-emerald-800', border: 'border-emerald-300', tag: 'field' },
        primitive: { bg: 'bg-emerald-50',  text: 'text-emerald-800', border: 'border-emerald-300', tag: 'val'   },
        nested:    { bg: 'bg-sky-50',      text: 'text-sky-800',     border: 'border-sky-300',     tag: 'nest'  },
        invalid:   { bg: 'bg-rose-100',    text: 'text-rose-800',    border: 'border-rose-400',    tag: '✗ FAIL' },
      };
      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">
          <div className="bg-slate-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-slate-600 flex items-center justify-between">
            <span>{label}</span>
            <span className="text-[9px] font-mono text-slate-500">POJO</span>
          </div>
          <div className="p-2.5 space-y-1">
            {nodes.map((n) => {
              const c = kindMap[n.kind] || kindMap.field;
              const invalid = n.valid === false;
              return (
                <div key={n.id} className="flex items-start gap-1.5" style={{ marginLeft: `${n.depth * 14}px` }}>
                  <span className={`text-[8px] font-mono px-1.5 py-0.5 rounded ${c.bg} ${c.text} border ${c.border} font-bold uppercase tracking-wide flex-shrink-0`}>
                    {c.tag}
                  </span>
                  <div className="flex-1 min-w-0">
                    <div className={`text-[11px] font-mono leading-tight ${invalid ? 'text-rose-700 font-semibold' : 'text-slate-700'}`}>
                      {n.label}
                    </div>
                    {n.value !== undefined && (
                      <div className={`text-[10px] font-mono ${invalid ? 'text-rose-600' : 'text-slate-500'}`}>
                        {invalid ? '❌ ' : '→ '}{n.value}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // FlowArrow — 변환 흐름 화살표 (수직)
    // ─────────────────────────────────────────────────────
    function FlowArrow({ label }) {
      return (
        <div className="flex items-center justify-center my-1">
          <div className="flex flex-col items-center">
            <div className="text-[9px] text-lime-700 font-mono font-bold tracking-wider uppercase">{label}</div>
            <div className="text-lime-500 text-lg leading-none">↓</div>

    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    //   상단 : application.yml 카드
    //   ↓ prefix 매칭
    //   중간 : POJO 트리
    //   ↓ Spring 컨테이너
    //   하단 : 핵심 포인트 박스 + 범례
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🌱 application.yml → POJO 바인딩 흐름</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-1">
            {/* 1) 입력 — yml 카드 */}
            <YmlCard label={step.codeLeftLabel} code={step.codeLeft} />

            <FlowArrow label={step.arrow.left} />

            {/* 2) 출력 — POJO 트리 */}
            <PojoTree label={step.pojoLabel} nodes={step.pojo} />

            <FlowArrow label={step.arrow.right} />

            {/* 3) 결과 카드 */}
            <div className="bg-lime-50 border-l-4 border-lime-400 px-3 py-2 rounded-r">
              <div className="text-[9px] font-bold text-lime-700 uppercase tracking-wider mb-0.5">핵심 포인트</div>
              <p className="text-[11px] text-lime-900 leading-snug">{step.keyPoint}</p>
            </div>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-lime-400"></span>class
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-400"></span>value bind
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-400"></span>nested
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>invalid (✗)
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   파일명 탭 + 윈도우 dot + 라인 번호 + 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-lime-500/15 border-l-2 border-lime-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; 챕터 목록</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter VIII-1-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-lime-600 text-white flex items-center justify-center rounded-full font-bold text-sm">S</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VIII. Spring Boot 설정 &gt; Chapter 1. 외부 설정</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VIII-1-3. @ConfigurationProperties — 그룹화 설정 주입</h1>
                  <p className="text-sm text-slate-500 mt-0.5">yml 계층을 POJO 클래스 그래프로 자석처럼 흡수한다</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-300 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: <strong>@ConfigurationProperties</strong> 는 흩어진 @Value 의 한계를 풀어준다. <strong>같은 prefix 그룹</strong>을 한 record 로 묶고, <strong>@EnableConfigurationProperties</strong> 로 등록, <strong>@Validated + @NotBlank/@Min</strong> 으로 시작 시점 검증, <strong>중첩 record / List / Map</strong> 으로 yml 계층을 그대로 표현한다. 다음(VIII-1-4)에서는 Profile 별 설정 분리를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['@ConfigurationProperties', 'prefix', 'record', '@EnableConfigurationProperties', '@Validated', '@NotBlank', '중첩 객체', 'List/Map'].map((kw) => (
                <span key={kw} className="bg-lime-50 text-lime-700 px-3 py-1 rounded-full text-xs font-medium border border-lime-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-08-02-value-injection.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; VIII-1-2 @Value 주입</a>
              <a href="./chapter-08-04-profiles.html" className="text-lime-700 hover:text-lime-900 font-medium">VIII-1-4 Profile &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
