<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>VIII-1-3 — @ConfigurationProperties</title><script src="https://cdn.tailwindcss.com"></script><script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script><script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script></head>
<body><div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const STEPS=[
  {id:'what',label:'① @ConfigurationProperties란',desc:'[STEP 1] 설정 파일의 특정 접두사(prefix) 아래 값들을 Java 클래스에 자동 바인딩한다. @Value처럼 한 필드씩이 아니라 설정 그룹 전체를 객체로 묶어서 관리한다.',p:'what'},
  {id:'code',label:'② record 바인딩',desc:'[STEP 2] Java record로 불변 설정 클래스를 만들 수 있다. @ConfigurationProperties(prefix="app.datasource")를 붙이면 app.datasource.url, .username 등이 자동 매핑된다.',p:'code'},
  {id:'validate',label:'③ @Validated 검증',desc:'[STEP 3] @Validated를 추가하면 @NotBlank, @Min, @Max 같은 Bean Validation으로 설정값을 검증한다. 잘못된 설정이면 서버 시작 시점에 실패 — 런타임 에러를 방지한다.',p:'validate'},
  {id:'compare',label:'④ @Value vs @ConfigurationProperties',desc:'[STEP 4] @Value: 단일 값, 흩어짐, 타입 안전 없음. @ConfigurationProperties: 그룹 바인딩, 한 곳에 모임, 타입 안전, 검증 지원. 설정이 3개 이상이면 @ConfigurationProperties가 유리하다.',p:'compare'},
  {id:'enable',label:'⑤ 활성화 방법',desc:'[STEP 5] @EnableConfigurationProperties(AppConfig.class) 또는 @ConfigurationPropertiesScan으로 활성화한다. Spring Boot 3.x에서는 record에 자동 생성자 바인딩이 적용된다.',p:'enable'},
];
function V({p}){
  if(p==='what')return(<div className="max-w-md mx-auto flex items-center gap-4 flex-wrap justify-center"><div className="bg-amber-50 p-4 rounded-xl border border-amber-200 text-center"><div className="text-2xl mb-1">📄</div><div className="font-bold text-sm text-amber-800">application.yml</div><div className="text-xs text-amber-600">app.datasource.*</div></div><div className="text-2xl text-emerald-500">→</div><div className="bg-emerald-50 p-4 rounded-xl border-2 border-emerald-400 text-center"><div className="text-2xl mb-1">☕</div><div className="font-bold text-sm text-emerald-800">AppDatasourceConfig</div><div className="text-xs text-emerald-600">Java 객체로 자동 바인딩</div></div></div>);
  if(p==='code')return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div><span className="text-yellow-300">@ConfigurationProperties</span>(prefix = <span className="text-emerald-400">"app.datasource"</span>)</div><div><span className="text-pink-400">public record</span> <span className="text-cyan-400">DatasourceConfig</span>(</div><div>{'    '}String url,</div><div>{'    '}String username,</div><div>{'    '}String password,</div><div>{'    '}<span className="text-pink-400">int</span> maxPoolSize</div><div>) {'{}'}</div><div className="mt-2 text-slate-500">// yml: app.datasource.url=... → 자동 매핑</div></div>);
  if(p==='validate')return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div><span className="text-yellow-300">@Validated</span></div><div><span className="text-yellow-300">@ConfigurationProperties</span>(prefix = <span className="text-emerald-400">"app.datasource"</span>)</div><div><span className="text-pink-400">public record</span> <span className="text-cyan-400">DatasourceConfig</span>(</div><div>{'    '}<span className="text-yellow-300">@NotBlank</span> String url,</div><div>{'    '}<span className="text-yellow-300">@NotBlank</span> String username,</div><div>{'    '}<span className="text-yellow-300">@Min</span>(1) <span className="text-yellow-300">@Max</span>(100) <span className="text-pink-400">int</span> maxPoolSize</div><div>) {'{}'}</div><div className="mt-2 text-rose-400">// 검증 실패 → 서버 시작 즉시 실패 (런타임 에러 방지)</div></div>);
  if(p==='compare')return(<div className="grid grid-cols-2 gap-3 max-w-lg mx-auto"><div className="bg-amber-50 p-3 rounded-xl border border-amber-200"><div className="font-bold text-sm text-amber-800 mb-2">@Value</div><ul className="text-xs text-amber-700 space-y-1"><li>• 단일 값 주입</li><li>• 여기저기 흩어짐</li><li>• 타입 안전 없음</li><li>• 검증 지원 없음</li></ul></div><div className="bg-emerald-50 p-3 rounded-xl border-2 border-emerald-400"><div className="font-bold text-sm text-emerald-800 mb-2">@ConfigurationProperties</div><ul className="text-xs text-emerald-700 space-y-1"><li>• 그룹 바인딩</li><li>• 한 클래스에 모임</li><li>• 타입 안전 ✓</li><li>• @Validated 검증 ✓</li></ul></div></div>);
  return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div><span className="text-yellow-300">@EnableConfigurationProperties</span>(DatasourceConfig.<span className="text-pink-400">class</span>)</div><div className="text-slate-500">// 또는</div><div><span className="text-yellow-300">@ConfigurationPropertiesScan</span></div><div className="mt-2 text-emerald-400">// Spring Boot 3.x: record → 자동 생성자 바인딩</div></div>);
}
function App(){const[idx,setIdx]=useState(0);const[playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
return(<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6"><div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter VIII-1-3</span></div><header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">@ConfigurationProperties — 타입 안전 설정</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600">설정 그룹을 <b>Java 객체로 바인딩</b>하고 검증하는 방법을 체험합니다.</p></header><div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div><div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[240px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div><div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2"><button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button><button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button><button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button></div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1}/{STEPS.length} — {step.label}</div></div><div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div></div></div>);}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
