<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter III-2-2 — 프로젝트 구조 이해하기</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'analogy', label:'① 아파트 배치도', desc:'[STEP 1] Spring Boot 프로젝트 구조 = 새 아파트의 방 배치도. 각 방(폴더)이 무엇을 위한 공간인지 한 번만 이해하면 이후에는 헷갈리지 않는다.', hl:[] },
      { id:'java', label:'② src/main/java', desc:'[STEP 2] 실제 비즈니스 로직이 담긴 Java 코드가 들어가는 폴더. 패키지 이름이 길지만, 코드를 기능별로 분류하는 "서랍장" 역할이다.', hl:['java'] },
      { id:'props', label:'③ application.properties', desc:'[STEP 3] DB 접속 주소, 서버 포트 등 환경 설정값을 모아두는 파일. 코드를 바꾸지 않아도 이 파일만 수정해 동작 방식을 바꿀 수 있다.', hl:['props'] },
      { id:'gradle', label:'④ build.gradle', desc:'[STEP 4] 어떤 외부 라이브러리를 쓸지 선언하는 "장바구니 목록". 여기에 적힌 의존성이 자동으로 다운로드된다.', hl:['gradle'] },
      { id:'main', label:'⑤ 진입점 (@SpringBootApplication)', desc:'[STEP 5] @SpringBootApplication이 붙은 메인 클래스에서 SpringApplication.run()이 호출되면 내장 Tomcat이 시작되고 HTTP 요청을 받을 준비가 된다.', hl:['main'] },
    ];

    const TREE = [
      { id:'root', name:'my-project/', depth:0, type:'dir' },
      { id:'gradle', name:'build.gradle', depth:1, type:'file', desc:'장바구니 (의존성 목록)' },
      { id:'src', name:'src/', depth:1, type:'dir' },
      { id:'main', name:'main/', depth:2, type:'dir' },
      { id:'java', name:'java/com/example/demo/', depth:3, type:'dir', desc:'Java 코드 (서랍장)' },
      { id:'mainclass', name:'DemoApplication.java', depth:4, type:'file', desc:'진입점 @SpringBootApplication', hlId:'main' },
      { id:'res', name:'resources/', depth:3, type:'dir' },
      { id:'props', name:'application.properties', depth:4, type:'file', desc:'설정 리모컨' },
    ];

    function V({ hl }) {
      return (
        <div className="max-w-lg mx-auto space-y-1">
          <div className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">프로젝트 폴더 구조</div>
          {TREE.map(node => {
            const matchId = node.hlId || node.id;
            const active = hl.includes(matchId) || hl.length === 0;
            const indent = node.depth * 20;
            const isDir = node.type === 'dir';
            return (
              <div key={node.id} className={`flex items-center gap-2 py-1.5 px-3 rounded-lg transition-all duration-500 ${
                active && hl.length > 0 ? 'bg-emerald-50 border border-emerald-300 shadow-sm' : hl.length === 0 ? 'bg-white' : 'opacity-30'
              }`} style={{ marginLeft: indent }}>
                <span className="text-sm">{isDir ? '📁' : '📄'}</span>
                <span className={`font-mono text-sm ${isDir ? 'font-bold text-slate-700' : 'text-slate-600'}`}>{node.name}</span>
                {node.desc && active && <span className="text-xs text-emerald-600 ml-auto">{node.desc}</span>}
              </div>
            );
          })}
          {hl.includes('main') && (
            <div className="mt-3 bg-slate-900 p-3 rounded-lg text-xs font-mono text-slate-300">
              <div className="text-yellow-300">@SpringBootApplication</div>
              <div><span className="text-pink-400">public class</span> <span className="text-cyan-400">DemoApplication</span> {'{'}</div>
              <div>{'  '}<span className="text-pink-400">public static void</span> main(String[] args) {'{'}</div>
              <div>{'    '}SpringApplication.run(DemoApplication.<span className="text-pink-400">class</span>, args);</div>
              <div>{'  }'}</div>
              <div>{'}'}</div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),3500);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter III-2-2</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">프로젝트 구조 이해하기</h1><span className="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full">★★☆</span></div><p className="text-slate-600">Spring Boot 기본 <b>폴더 구조</b>와 각 파일의 역할을 시각적으로 파악합니다.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[300px] flex items-center justify-center"><div className="w-full"><V hl={step.hl}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
