    // ─────────────────────────────────────────────────────
    // FolderTree — 좌측 폴더 트리 시각화
    //   step.highlight 에 포함된 노드는 lime 배경 + 우측 desc 표시
    //   포함되지 않은 노드는 흐리게(opacity-30) 처리
    //   highlight 가 빈 배열일 때는 모두 일반 표시
    // ─────────────────────────────────────────────────────
    function FolderTree({ highlight }) {
      const isHighlight = (node) => {
        if (highlight.length === 0) return false;
        if (highlight.includes(node.id)) return true;
        if (node.group && node.group.some((g) => highlight.includes(g))) return true;
        return false;
      };
      const isDimmed = (node) => highlight.length > 0 && !isHighlight(node);

      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">
          <div className="bg-slate-100 px-3 py-1.5 text-[10px] font-bold uppercase tracking-wider text-slate-600 flex items-center justify-between">
            <span>📁 Spring Initializr 생성 구조</span>
            <span className="text-[9px] font-mono text-slate-500">tree</span>
          </div>
          <div className="p-3 space-y-1">
            {TREE.map((node) => {
              const active = isHighlight(node);
              const dimmed = isDimmed(node);
              const isDir = node.type === 'dir';
              return (
                <div
                  key={node.id}
                  className={`flex items-center gap-2 py-1 px-2 rounded transition-all duration-300 ${
                    active
                      ? 'bg-lime-50 border border-lime-300 shadow-sm'
                      : dimmed
                      ? 'opacity-30'
                      : 'bg-white'
                  }`}
                  style={{ marginLeft: `${node.depth * 16}px` }}
                >
                  <span className="text-sm flex-shrink-0">{isDir ? '📁' : '📄'}</span>
                  <span
                    className={`font-mono text-[12px] ${
                      isDir ? 'font-bold text-slate-700' : 'text-slate-600'
                    }`}
                  >
                    {node.name}
                  </span>
                  {node.desc && active && (
                    <span className="text-[10px] text-lime-700 ml-auto font-medium">
                      {node.desc}
                    </span>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   상단 탭 바 : 5개 파일 탭 (활성 탭 표시)
    //   본문      : 파일명 + 라인 번호 + 강조 라인
    //   activeTab 이 step.tab 으로 자동 동기화 — 사용자도 클릭으로 전환 가능
    // ─────────────────────────────────────────────────────
    function CodeViewer({ activeTab, onTabChange, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);
      const code = FILES[activeTab];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [activeTab]);

      const tabKeys = Object.keys(FILES);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일명 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">
              {code.lang}
            </span>
          </div>

          {/* 탭 바 */}
          <div className="bg-[#1e2127] flex border-b border-slate-700 overflow-x-auto">
            {tabKeys.map((key) => {
              const isActive = key === activeTab;
              return (
                <button
                  key={key}
                  onClick={() => onTabChange(key)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                    isActive
                      ? 'bg-[#282c34] text-lime-300 border-t-2 border-t-lime-400'
                      : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'
                  }`}
                >
                  {FILES[key].tabLabel}
                </button>
              );
            })}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>
              {code.lines.join('\n')}
            </code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-lime-500/15 border-l-2 border-lime-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>
              Step {stepIdx + 1} / {total}
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    //   - step 변경 시 우측 탭 자동 전환
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [activeTab, setActiveTab] = useState(STEPS[0].tab);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      // step 이 바뀌면 우측 탭도 함께 전환
      useEffect(() => {
        setActiveTab(STEPS[stepIdx].tab);
      }, [stepIdx]);

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') {
            e.preventDefault();
            nextRef.current();
          }
          if (e.key === 'ArrowLeft') {
            e.preventDefault();
            prevRef.current();
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a
                href="../index.html"
                className="text-lime-700 hover:text-lime-900 font-medium"
              >
                &larr; 챕터 목록
              </a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">
                chapter III-2-2
              </span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-lime-600 text-white flex items-center justify-center rounded-full font-bold text-sm">
                  III
                </div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">
                    Part III. Spring Boot 기초 &gt; Chapter 2. 첫 프로젝트
                  </div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">
                    III-2-2. 프로젝트 구조 이해하기 (생성된 폴더)
                  </h1>
                  <p className="text-sm text-slate-500 mt-0.5">
                    Spring Initializr 가 만들어준 폴더와 파일의 역할을 5단계로 익힌다
                  </p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                activeTab={activeTab}
                onTabChange={setActiveTab}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-300 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: Spring Boot 의 폴더 구조는{' '}
                <strong>Maven 표준 레이아웃</strong>을 그대로 따른다.{' '}
                <strong>java/ 는 코드</strong>, <strong>resources/ 는 그 외 전부</strong>,
                <strong> build.gradle</strong> 은 의존성, <strong>application.properties</strong>
                는 환경 설정, <strong>@SpringBootApplication</strong> 한 줄이 자동 설정과 컴포넌트
                스캔을 모두 켠다. 다음(III-2-3)에서는 첫 컨트롤러를 작성한다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[100px]"
              >
                {isPlaying
                  ? '⏸ 정지'
                  : stepIdx >= STEPS.length - 1
                  ? '↻ 다시보기'
                  : '▶ 자동재생'}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {[
                'src/main/java',
                'src/main/resources',
                'src/test/java',
                'build.gradle',
                'settings.gradle',
                'application.properties',
                '@SpringBootApplication',
                'ComponentScan',
                'AutoConfiguration',
              ].map((kw) => (
                <span
                  key={kw}
                  className="bg-lime-50 text-lime-700 px-3 py-1 rounded-full text-xs font-medium border border-lime-200"
                >
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a
                href="./chapter-03-03-initializr.html"
                className="text-lime-700 hover:text-lime-900 font-medium"
              >
                &larr; III-2-1 Spring Initializr
              </a>
              <a
                href="./chapter-03-05-first-controller.html"
                className="text-lime-700 hover:text-lime-900 font-medium"
              >
                III-2-3 첫 컨트롤러 &rarr;
              </a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
