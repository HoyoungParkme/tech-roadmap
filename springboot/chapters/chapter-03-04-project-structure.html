<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter III-2-2 вҖ” н”„лЎңм қнҠё кө¬мЎ° мқҙн•ҙн•ҳкё°</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'analogy', label:'в‘  м•„нҢҢнҠё л°°м№ҳлҸ„', desc:'[STEP 1] Spring Boot н”„лЎңм қнҠё кө¬мЎ° = мғҲ м•„нҢҢнҠёмқҳ л°© л°°м№ҳлҸ„. к°Ғ л°©(нҸҙлҚ”)мқҙ л¬ҙм—Үмқ„ мң„н•ң кіөк°„мқём§Җ н•ң лІҲл§Ң мқҙн•ҙн•ҳл©ҙ мқҙнӣ„м—җлҠ” н—·к°ҲлҰ¬м§Җ м•ҠлҠ”лӢӨ.', hl:[] },
      { id:'java', label:'в‘Ў src/main/java', desc:'[STEP 2] мӢӨм ң л№„мҰҲлӢҲмҠӨ лЎңм§Ғмқҙ лӢҙкёҙ Java мҪ”л“ңк°Җ л“Өм–ҙк°ҖлҠ” нҸҙлҚ”. нҢЁнӮӨм§Җ мқҙлҰ„мқҙ кёём§Җл§Ң, мҪ”л“ңлҘј кё°лҠҘлі„лЎң л¶„лҘҳн•ҳлҠ” "м„ңлһҚмһҘ" м—ӯн• мқҙлӢӨ.', hl:['java'] },
      { id:'props', label:'в‘ў application.properties', desc:'[STEP 3] DB м ‘мҶҚ мЈјмҶҢ, м„ңлІ„ нҸ¬нҠё л“ұ нҷҳкІҪ м„Өм •к°’мқ„ лӘЁм•„л‘җлҠ” нҢҢмқј. мҪ”л“ңлҘј л°”кҫём§Җ м•Ҡм•„лҸ„ мқҙ нҢҢмқјл§Ң мҲҳм •н•ҙ лҸҷмһ‘ л°©мӢқмқ„ л°”кҝҖ мҲҳ мһҲлӢӨ.', hl:['props'] },
      { id:'gradle', label:'в‘Ј build.gradle', desc:'[STEP 4] м–ҙл–Ө мҷёл¶Җ лқјмқҙлёҢлҹ¬лҰ¬лҘј м“ём§Җ м„ м–ён•ҳлҠ” "мһҘл°”кө¬лӢҲ лӘ©лЎқ". м—¬кё°м—җ м ҒнһҢ мқҳмЎҙм„ұмқҙ мһҗлҸҷмңјлЎң лӢӨмҡҙлЎңл“ңлҗңлӢӨ.', hl:['gradle'] },
      { id:'main', label:'в‘Ө м§„мһ…м җ (@SpringBootApplication)', desc:'[STEP 5] @SpringBootApplicationмқҙ л¶ҷмқҖ л©”мқё нҒҙлһҳмҠӨм—җм„ң SpringApplication.run()мқҙ нҳём¶ңлҗҳл©ҙ лӮҙмһҘ Tomcatмқҙ мӢңмһ‘лҗҳкі  HTTP мҡ”мІӯмқ„ л°ӣмқ„ мӨҖл№„к°Җ лҗңлӢӨ.', hl:['main'] },
    ];

    const TREE = [
      { id:'root', name:'my-project/', depth:0, type:'dir' },
      { id:'gradle', name:'build.gradle', depth:1, type:'file', desc:'мһҘл°”кө¬лӢҲ (мқҳмЎҙм„ұ лӘ©лЎқ)' },
      { id:'src', name:'src/', depth:1, type:'dir' },
      { id:'main', name:'main/', depth:2, type:'dir' },
      { id:'java', name:'java/com/example/demo/', depth:3, type:'dir', desc:'Java мҪ”л“ң (м„ңлһҚмһҘ)' },
      { id:'mainclass', name:'DemoApplication.java', depth:4, type:'file', desc:'м§„мһ…м җ @SpringBootApplication', hlId:'main' },
      { id:'res', name:'resources/', depth:3, type:'dir' },
      { id:'props', name:'application.properties', depth:4, type:'file', desc:'м„Өм • лҰ¬лӘЁм»Ё' },
    ];

    function V({ hl }) {
      return (
        <div className="max-w-lg mx-auto space-y-1">
          <div className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">н”„лЎңм қнҠё нҸҙлҚ” кө¬мЎ°</div>
          {TREE.map(node => {
            const matchId = node.hlId || node.id;
            const active = hl.includes(matchId) || hl.length === 0;
            const indent = node.depth * 20;
            const isDir = node.type === 'dir';
            return (
              <div key={node.id} className={`flex items-center gap-2 py-1.5 px-3 rounded-lg transition-all duration-500 ${
                active && hl.length > 0 ? 'bg-emerald-50 border border-emerald-300 shadow-sm' : hl.length === 0 ? 'bg-white' : 'opacity-30'
              }`} style={{ marginLeft: indent }}>
                <span className="text-sm">{isDir ? 'рҹ“Ғ' : 'рҹ“„'}</span>
                <span className={`font-mono text-sm ${isDir ? 'font-bold text-slate-700' : 'text-slate-600'}`}>{node.name}</span>
                {node.desc && active && <span className="text-xs text-emerald-600 ml-auto">{node.desc}</span>}
              </div>
            );
          })}
          {hl.includes('main') && (
            <div className="mt-3 bg-slate-900 p-3 rounded-lg text-xs font-mono text-slate-300">
              <div className="text-yellow-300">@SpringBootApplication</div>
              <div><span className="text-pink-400">public class</span> <span className="text-cyan-400">DemoApplication</span> {'{'}</div>
              <div>{'  '}<span className="text-pink-400">public static void</span> main(String[] args) {'{'}</div>
              <div>{'    '}SpringApplication.run(DemoApplication.<span className="text-pink-400">class</span>, args);</div>
              <div>{'  }'}</div>
              <div>{'}'}</div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),3500);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">вҶҗ мұ•н„° лӘ©лЎқ</a><span className="text-slate-400">Chapter III-2-2</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">н”„лЎңм қнҠё кө¬мЎ° мқҙн•ҙн•ҳкё°</h1><span className="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full">вҳ…вҳ…вҳҶ</span></div><p className="text-slate-600">Spring Boot кё°ліё <b>нҸҙлҚ” кө¬мЎ°</b>мҷҖ к°Ғ нҢҢмқјмқҳ м—ӯн• мқ„ мӢңк°Ғм ҒмңјлЎң нҢҢм•…н•©лӢҲлӢӨ.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">нҳ„мһ¬ лӢЁкі„</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[300px] flex items-center justify-center"><div className="w-full"><V hl={step.hl}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>м •м§Җ</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>мһҗлҸҷ мӢӨн–ү</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} вҖ” {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
