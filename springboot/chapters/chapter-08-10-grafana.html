<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>VIII-3-3 — Grafana 대시보드 구성</title><script src="https://cdn.tailwindcss.com"></script><script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script><script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script></head>
<body><div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const STEPS=[
  {id:'install',label:'① Grafana 설치',desc:'[STEP 1] Docker로 설치: docker run -d -p 3000:3000 grafana/grafana. localhost:3000 접속. 초기 계정: admin/admin.',p:'install'},
  {id:'datasource',label:'② Data Source 연결',desc:'[STEP 2] Settings → Data Sources → Add Prometheus. URL에 http://prometheus:9090 (또는 host.docker.internal:9090). Save & Test로 연결 확인.',p:'datasource'},
  {id:'dashboard',label:'③ 공유 대시보드 import',desc:'[STEP 3] Dashboards → Import → ID: 4701 입력. "JVM (Micrometer)" 대시보드가 자동 구성된다. Heap 메모리, GC 시간, 스레드 수 등을 바로 볼 수 있다.',p:'dashboard'},
  {id:'panel',label:'④ 커스텀 패널',desc:'[STEP 4] New Panel → PromQL 입력. 예: rate(http_server_requests_seconds_count{status="500"}[5m]) → 5분간 500 에러율. 한 대시보드에 요청 수, 응답 시간, 에러율 3개 패널을 구성하는 것이 기본이다.',p:'panel'},
  {id:'tip',label:'⑤ 실무 팁',desc:'[STEP 5] 대시보드 설계 원칙: RED(Rate, Error, Duration) 또는 USE(Utilization, Saturation, Errors) 방법론. 알림 설정으로 임계치 초과 시 Slack/Email 자동 알림.',p:'tip'},
];
function V({p}){
  if(p==='install')return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-sm font-mono"><div className="text-emerald-400">$ docker run -d -p 3000:3000 grafana/grafana</div><div className="mt-2 text-sky-400">→ localhost:3000</div><div className="text-slate-500">초기: admin / admin</div></div>);
  if(p==='datasource')return(<div className="max-w-md mx-auto space-y-2">{['Settings → Data Sources','Add data source → Prometheus','URL: http://prometheus:9090','Save & Test → ✅ Data source is working'].map((s,i)=>(<div key={i} className="flex items-center gap-3 px-4 py-2 rounded-lg bg-white border border-slate-200"><span className="w-6 h-6 rounded-full bg-emerald-500 text-white text-xs flex items-center justify-center font-bold">{i+1}</span><span className="text-sm">{s}</span></div>))}</div>);
  if(p==='dashboard')return(<div className="max-w-md mx-auto space-y-3"><div className="bg-violet-50 p-4 rounded-xl border border-violet-200 text-center"><div className="text-2xl mb-1">📊</div><div className="font-bold text-violet-800">Import Dashboard ID: 4701</div><div className="text-xs text-violet-600">"JVM (Micrometer)" 대시보드</div></div><div className="grid grid-cols-3 gap-2 text-center text-xs">{['Heap Memory','GC Pause','Thread Count','CPU Usage','HTTP Rate','Logback Events'].map(x=>(<div key={x} className="bg-white p-2 rounded border border-slate-200">{x}</div>))}</div></div>);
  if(p==='panel')return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div className="text-amber-400 mb-2">커스텀 패널 PromQL 예시</div><div className="text-emerald-400">// 요청 수 (Rate)</div><div>rate(http_server_requests_seconds_count[5m])</div><div className="mt-2 text-rose-400">// 에러율 (Error)</div><div>rate(http_server_requests_seconds_count</div><div>{'  '}{'{'}<span className="text-sky-400">status="500"</span>{'}'}[5m])</div><div className="mt-2 text-amber-400">// 응답 시간 (Duration)</div><div>histogram_quantile(0.99, rate(...))</div></div>);
  return(<div className="max-w-md mx-auto space-y-3"><div className="bg-slate-800 p-4 rounded-xl text-center"><div className="text-emerald-400 font-bold text-lg mb-2">RED 방법론</div><div className="grid grid-cols-3 gap-2 text-xs"><div className="bg-sky-900 p-2 rounded"><span className="text-sky-400 font-bold">R</span>ate<br/>초당 요청 수</div><div className="bg-rose-900 p-2 rounded"><span className="text-rose-400 font-bold">E</span>rror<br/>에러율</div><div className="bg-amber-900 p-2 rounded"><span className="text-amber-400 font-bold">D</span>uration<br/>응답 시간</div></div></div><div className="text-center text-xs text-slate-500">알림: 임계치 초과 → Slack/Email 자동 발송</div></div>);
}
function App(){const[idx,setIdx]=useState(0);const[playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
return(<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6"><div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter VIII-3-3</span></div><header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">Grafana 대시보드 구성</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600"><b>설치 → Data Source → Import → 커스텀 패널 → RED 방법론</b>을 체험합니다.</p></header><div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div><div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[240px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div><div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2"><button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button><button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button><button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button></div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1}/{STEPS.length} — {step.label}</div></div><div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div></div></div>);}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
