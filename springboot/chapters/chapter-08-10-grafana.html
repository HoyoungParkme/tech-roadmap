    // ─────────────────────────────────────────────────────
    // PanelGraph — Step 4: 단일 패널 시계열 그래프 mock (PromQL 결과)
    //   인라인 SVG 로 점-선 그래프 그리기
    // ─────────────────────────────────────────────────────
    function PanelGraph({ data }) {
      const colorClass = {
        lime:  '#84cc16',
        amber: '#f59e0b',
        rose:  '#f43f5e',
      };
      const W = 320;
      const H = 110;
      const PAD = 6;
      const allPoints = data.series.flatMap(s => s.points);
      const maxY = Math.max(...allPoints) * 1.1 || 1;
      const xStep = (W - PAD * 2) / (data.series[0].points.length - 1);
      const toPath = (points) => {
        return points.map((v, i) => {
          const x = PAD + i * xStep;
          const y = H - PAD - (v / maxY) * (H - PAD * 2);
          return `${i === 0 ? 'M' : 'L'} ${x.toFixed(1)} ${y.toFixed(1)}`;
        }).join(' ');
      };

      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">
          <div className="bg-lime-100 px-3 py-1.5 flex items-center justify-between border-b border-lime-200">
            <span className="text-[11px] font-bold text-lime-800">📈 {data.panelTitle}</span>
            <span className="text-[9px] font-mono text-lime-700">unit: {data.unit}</span>
          </div>
          <div className="px-3 pt-2 pb-1 bg-slate-900">
            <div className="text-[10px] font-mono text-amber-300 mb-1">PromQL</div>
            <div className="text-[10px] font-mono text-lime-300 break-all">{data.query}</div>
            <div className="text-[9px] font-mono text-slate-500 mt-0.5">Legend: {data.legend}</div>
          </div>
          <div className="p-2 bg-slate-50">
            <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-32">
              {/* Y 축 그리드 */}
              {[0, 1, 2, 3].map(i => (
                <line key={i} x1={PAD} x2={W - PAD} y1={PAD + i * (H - PAD * 2) / 3} y2={PAD + i * (H - PAD * 2) / 3}
                      stroke="#e2e8f0" strokeWidth="0.5" />
              ))}
              {/* 시리즈별 라인 + 점 */}
              {data.series.map((s) => (
                <g key={s.label}>
                  <path d={toPath(s.points)} stroke={colorClass[s.color]} strokeWidth="1.5" fill="none" />
                  {s.points.map((v, i) => {
                    const x = PAD + i * xStep;
                    const y = H - PAD - (v / maxY) * (H - PAD * 2);
                    return <circle key={i} cx={x} cy={y} r="1.8" fill={colorClass[s.color]} />;
                  })}
                </g>
              ))}
            </svg>
          </div>
          {/* Legend */}
          <div className="px-3 pb-2 pt-1 bg-slate-50 flex flex-wrap gap-3 border-t border-slate-100">
            {data.series.map((s) => {
              const last = s.points[s.points.length - 1];
              return (
                <div key={s.label} className="flex items-center gap-1.5 text-[10px] font-mono">
                  <span className="w-2.5 h-2.5 rounded-sm" style={{ backgroundColor: colorClass[s.color] }}></span>
                  <span className="text-slate-700 font-semibold">status={s.label}</span>
                  <span className="text-slate-500">→ {last} {data.unit}</span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   파일명 탭 + 윈도우 dot + 라인 번호 + 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">

            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-lime-500/15 border-l-2 border-lime-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; 챕터 목록</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter VIII-3-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-lime-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VIII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VIII. 운영 &gt; Chapter 3. 모니터링</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VIII-3-3. Grafana 대시보드 구성</h1>
                  <p className="text-sm text-slate-500 mt-0.5">docker run → data source → import 4701 → 커스텀 패널 → Alert</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-300 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: Grafana = <strong>시각화 + 알림 레이어</strong>. Prometheus 가 모은 메트릭을 보여주고(대시보드), 임계치 초과 시 알린다(Alert). 핵심 5단계 — <strong>docker run → data source → import 4701 → RED 패널 → Alert rule</strong>. 다음(VIII-3-4)에서는 커스텀 메트릭을 직접 정의해본다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Grafana', 'Prometheus', 'PromQL', 'Dashboard', 'ID 4701', 'RED', 'p99', 'Alert', 'Slack'].map((kw) => (
                <span key={kw} className="bg-lime-50 text-lime-700 px-3 py-1 rounded-full text-xs font-medium border border-lime-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-08-09-prometheus.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; VIII-3-2 Prometheus</a>
              <a href="./chapter-08-11-custom-metrics.html" className="text-lime-700 hover:text-lime-900 font-medium">VIII-3-4 Custom Metrics &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
