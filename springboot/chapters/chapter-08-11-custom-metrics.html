<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>VIII-3-4 — 커스텀 메트릭</title><script src="https://cdn.tailwindcss.com"></script><script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script><script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script></head>
<body><div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const STEPS=[
  {id:'counted',label:'① @Counted (카운터)',desc:'[STEP 1] @Counted("order.placed")를 메서드에 붙이면 호출될 때마다 order.placed 카운터가 1씩 증가한다. AOP 기반이므로 비즈니스 코드를 건드리지 않는다.',p:'counted'},
  {id:'timed',label:'② @Timed (타이머)',desc:'[STEP 2] @Timed("order.processing")를 붙이면 메서드 실행 시간이 자동 측정된다. count + totalTime + max가 한꺼번에 기록된다.',p:'timed'},
  {id:'gauge',label:'③ Gauge.builder()',desc:'[STEP 3] Gauge.builder("order.queue.size", queue, Queue::size).register(registry). 큐의 현재 크기를 실시간으로 추적한다. 주기적 폴링이 아니라 조회 시점의 값을 반환.',p:'gauge'},
  {id:'naming',label:'④ 메트릭 네이밍 패턴',desc:'[STEP 4] {domain}.{action}.{unit} 패턴 권장. 예: order.placed.count, payment.processing.seconds. 소문자, 점(.) 구분, 단위 명시. Prometheus 변환: order_placed_count.',p:'naming'},
  {id:'tip',label:'⑤ 실무 모니터링 팁',desc:'[STEP 5] 비즈니스 메트릭(주문 수, 결제 금액)과 기술 메트릭(응답 시간, 에러율)을 모두 수집한다. 알림 임계치는 정적 값보다 이동 평균 기반이 오탐이 적다. 메트릭이 너무 많으면 카디널리티 폭발에 주의.',p:'tip'},
];
function V({p}){
  if(p==='counted')return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div><span className="text-yellow-300">@Counted</span>(<span className="text-emerald-400">"order.placed"</span>)</div><div><span className="text-pink-400">public</span> Order placeOrder(OrderRequest req) {'{'}</div><div>{'    '}<span className="text-slate-500">// 비즈니스 로직 — 메트릭 코드 없음!</span></div><div>{'    '}<span className="text-pink-400">return</span> orderRepository.save(req.toOrder());</div><div>{'}'}</div><div className="mt-2 text-emerald-400">// 호출마다 order.placed 카운터 +1</div></div>);
  if(p==='timed')return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div><span className="text-yellow-300">@Timed</span>(value = <span className="text-emerald-400">"order.processing"</span>,</div><div>{'  '}description = <span className="text-emerald-400">"주문 처리 시간"</span>)</div><div><span className="text-pink-400">public</span> Order placeOrder(OrderRequest req) {'{'}</div><div>{'    '}...</div><div>{'}'}</div><div className="mt-2 text-amber-400">// count=150, totalTime=45.2s, max=1.8s</div></div>);
  if(p==='gauge')return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div>Gauge.builder(<span className="text-emerald-400">"order.queue.size"</span>,</div><div>{'    '}orderQueue, Queue::size)</div><div>{'  '}.description(<span className="text-emerald-400">"대기 중인 주문 수"</span>)</div><div>{'  '}.register(meterRegistry);</div><div className="mt-2 text-sky-400">// 현재 큐 크기를 실시간 추적</div><div className="text-slate-500">// 조회 시점의 queue.size() 반환</div></div>);
  if(p==='naming')return(<div className="max-w-md mx-auto space-y-2">{[{m:'order.placed.count',d:'주문 횟수',prom:'order_placed_count'},{m:'payment.processing.seconds',d:'결제 처리 시간',prom:'payment_processing_seconds'},{m:'user.active.gauge',d:'활성 사용자 수',prom:'user_active_gauge'}].map(x=>(<div key={x.m} className="flex items-center gap-3 px-4 py-2 rounded-lg bg-white border border-slate-200"><span className="font-mono text-xs text-emerald-700 flex-1">{x.m}</span><span className="text-xs text-slate-400">→</span><span className="font-mono text-xs text-amber-700 flex-1">{x.prom}</span></div>))}<div className="text-center text-xs text-slate-500">Micrometer 점(.) → Prometheus 밑줄(_)</div></div>);
  return(<div className="max-w-md mx-auto space-y-3"><div className="bg-slate-800 p-4 rounded-xl"><div className="text-emerald-400 font-bold text-center mb-2">실무 모니터링 팁</div><div className="grid grid-cols-2 gap-2 text-xs text-slate-300">{[{t:'비즈니스 메트릭',e:'주문 수 · 결제 금액'},{t:'기술 메트릭',e:'응답 시간 · 에러율'},{t:'알림 기준',e:'이동 평균 > 정적 임계값'},{t:'주의',e:'카디널리티 폭발 방지'}].map(x=>(<div key={x.t} className="bg-slate-700 p-2 rounded"><div className="text-amber-400 font-bold">{x.t}</div><div>{x.e}</div></div>))}</div></div></div>);
}
function App(){const[idx,setIdx]=useState(0);const[playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
return(<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6"><div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter VIII-3-4</span></div><header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">커스텀 메트릭 — @Counted, @Timed, Gauge</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600">비즈니스 <b>커스텀 메트릭</b>을 등록하고 실무 모니터링 팁을 체험합니다.</p></header><div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div><div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[240px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div><div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2"><button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button><button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button><button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button></div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1}/{STEPS.length} — {step.label}</div></div><div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div></div></div>);}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
