    // ─────────────────────────────────────────────────────
    // CounterSim — Step 1: 누적 카운터 (주문 수)
    //   매 tick 마다 0~3 건 추가, 총 누적값과 최근 10초 rate 표시
    // ─────────────────────────────────────────────────────
    function CounterSim() {
      const [count, setCount] = useState(0);
      const [history, setHistory] = useState([]); // 최근 12 tick

      useEffect(() => {
        const id = setInterval(() => {
          const delta = Math.floor(Math.random() * 4); // 0~3
          setCount((c) => c + delta);
          setHistory((h) => [...h.slice(-11), delta]);
        }, 700);
        return () => clearInterval(id);
      }, []);

      const max = Math.max(1, ...history);
      const rate = history.reduce((a, b) => a + b, 0);

      return (
        <div className="bg-white rounded-lg border-2 border-lime-200 overflow-hidden">
          <div className="bg-lime-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-lime-700 flex items-center justify-between">

    // ─────────────────────────────────────────────────────

      const max = Math.max(50, ...history);

    // ─────────────────────────────────────────────────────
    // TimerSim — Step 3: 응답 시간 분포 (count + p50/p95/max)
    //   매 tick 마다 latency 샘플 1개 (대부분 30~80ms, 가끔 spike)
    // ─────────────────────────────────────────────────────
    function TimerSim() {
      const [samples, setSamples] = useState([]); // 최근 30개 ms
      const [count, setCount] = useState(0);

      useEffect(() => {
        const id = setInterval(() => {
          // 평소 30~80ms, 5% 확률로 200~600ms spike
          const isSpike = Math.random() < 0.08;
          const ms = isSpike
            ? 200 + Math.floor(Math.random() * 400)
            : 30 + Math.floor(Math.random() * 50);
          setSamples((s) => [...s.slice(-29), ms]);
          setCount((c) => c + 1);
        }, 500);
        return () => clearInterval(id);
      }, []);

      const stats = useMemo(() => {
        if (samples.length === 0) return { avg: 0, p50: 0, p95: 0, max: 0, sum: 0 };
        const sorted = [...samples].sort((a, b) => a - b);
        const sum = samples.reduce((a, b) => a + b, 0);
        const pct = (p) => sorted[Math.min(sorted.length - 1, Math.floor(sorted.length * p))];
        return {
          avg: Math.round(sum / samples.length),
          p50: pct(0.5),
          p95: pct(0.95),
          max: sorted[sorted.length - 1],
          sum,
        };
      }, [samples]);

      const maxBar = Math.max(100, ...samples);

      return (
        <div className="bg-white rounded-lg border-2 border-lime-200 overflow-hidden">
          <div className="bg-lime-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-lime-700 flex items-center justify-between">
            <span>Timer — payment.processing.time</span>
            <span className="font-mono normal-case text-lime-600">⏱ count + sum + max + p</span>
          </div>
          <div className="p-3">
            <div className="grid grid-cols-4 gap-2 mb-3">

                <div className="font-mono text-sm font-bold text-slate-700 tabular-nums">{count}</div>
              </div>
              <div className="bg-slate-50 rounded border border-slate-200 p-1.5 text-center">
                <div className="text-[9px] text-slate-500 uppercase">avg</div>
                <div className="font-mono text-sm font-bold text-lime-700 tabular-nums">{stats.avg}<span className="text-[9px] text-slate-400">ms</span></div>
              </div>
              <div className="bg-slate-50 rounded border border-slate-200 p-1.5 text-center">
                <div className="text-[9px] text-slate-500 uppercase">p95</div>
                <div className="font-mono text-sm font-bold text-amber-700 tabular-nums">{stats.p95}<span className="text-[9px] text-slate-400">ms</span></div>
              </div>
              <div className="bg-slate-50 rounded border border-slate-200 p-1.5 text-center">
                <div className="text-[9px] text-slate-500 uppercase">max</div>
                <div className="font-mono text-sm font-bold text-rose-700 tabular-nums">{stats.max}<span className="text-[9px] text-slate-400">ms</span></div>
              </div>
            </div>
            <div className="text-[10px] text-slate-500 mb-1">최근 30 샘플 (red = p95 초과 / 꼬리 latency)</div>
            <div className="flex items-end gap-0.5 h-20 bg-slate-50 rounded p-1.5 border border-slate-100">
              {samples.map((v, i) => {
                const isTail = v > stats.p95;
                return (
                  <div
                    key={i}
                    className={`flex-1 rounded-t ${isTail ? 'bg-rose-500' : 'bg-lime-500'} opacity-90`}
                    style={{ height: `${(v / maxBar) * 100}%`, minHeight: '2px' }}
                    title={`${v}ms`}
                  />
                );
              })}
            </div>
            <div className="mt-2 text-[10px] font-mono text-slate-500 flex justify-between">
              <span>p50 = <span className="text-lime-700 font-bold">{stats.p50}ms</span></span>
              <span>sum = {stats.sum}ms</span>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────

    function TaggedSim() {
      const initial = {
        'KR.success': 0, 'KR.fail': 0,
        'US.success': 0, 'US.fail': 0,
        'JP.success': 0, 'JP.fail': 0,

      const [counters, setCounters] = useState(initial);

      useEffect(() => {
        const id = setInterval(() => {
          const regions = ['KR', 'US', 'JP'];
          const region = regions[Math.floor(Math.random() * regions.length)];
          // success 92%, fail 8%
          const status = Math.random() < 0.92 ? 'success' : 'fail';
          const key = `${region}.${status}`;
          setCounters((c) => ({ ...c, [key]: c[key] + 1 }));
          setLast({ region, status });
        }, 600);
        return () => clearInterval(id);
      }, []);

      const total = Object.values(counters).reduce((a, b) => a + b, 0);
      const failTotal = counters['KR.fail'] + counters['US.fail'] + counters['JP.fail'];
      const failRate = total === 0 ? 0 : ((failTotal / total) * 100).toFixed(1);

      const rows = [
        { region: 'KR', flag: '🇰🇷' },
        { region: 'US', flag: '🇺🇸' },
        { region: 'JP', flag: '🇯🇵' },

            <div className="space-y-1.5">

            </div>
            <div className="text-[9px] text-center text-slate-400 -mt-2 mb-2 font-mono">
              call → ⏱ start → invoke → ⏱ stop → record(ms)
            </div>

            {/* 통계 */}
            <div className="grid grid-cols-3 gap-2 mb-2">
              <div className="bg-slate-50 rounded border border-slate-200 p-1.5 text-center">
                <div className="text-[9px] text-slate-500 uppercase">total calls</div>
                <div className="font-mono text-sm font-bold text-slate-700 tabular-nums">{seq}</div>
              </div>
              <div className="bg-slate-50 rounded border border-slate-200 p-1.5 text-center">
                <div className="text-[9px] text-slate-500 uppercase">avg (last 6)</div>
                <div className="font-mono text-sm font-bold text-lime-700 tabular-nums">{avg}<span className="text-[9px] text-slate-400">ms</span></div>
              </div>
              <div className="bg-slate-50 rounded border border-slate-200 p-1.5 text-center">
                <div className="text-[9px] text-slate-500 uppercase">recorded</div>
                <div className="font-mono text-sm font-bold text-amber-700 tabular-nums">{calls.length}</div>
              </div>
            </div>

            {/* 호출 로그 */}
            <div className="text-[10px] text-slate-500 mb-1">최근 호출 로그 (자동 기록됨)</div>
            <div className="bg-slate-900 rounded p-2 font-mono text-[10px] space-y-0.5 min-h-[100px]">
              {calls.length === 0 && <div className="text-slate-500">기다리는 중…</div>}
              {calls.map((c) => (
                <div key={c.id} className="flex items-center gap-2">
                  <span className="text-slate-500">[{c.ts}]</span>
                  <span className="text-amber-400">@Timed</span>
                  <span className="text-slate-300">→ recorded</span>
                  <span className="text-lime-400 font-bold">{c.ms}ms</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // SimSwitch — sim 종류에 맞는 컴포넌트 렌더링
    // ─────────────────────────────────────────────────────
    function SimSwitch({ sim }) {
      if (sim === 'counter')    return <CounterSim />;
      if (sim === 'gauge')      return <GaugeSim />;
      if (sim === 'timer')      return <TimerSim />;
      if (sim === 'tagged')     return <TaggedSim />;
      if (sim === 'annotation') return <AnnotationSim />;
      return null;
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    //   상단 : 메트릭 메타 카드 (이름/타입/단위/prom)
    //   중간 : 실시간 시뮬레이션 (4종)
    //   하단 : 핵심 포인트 박스 + 메트릭 종류 범례
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📈 Micrometer 메트릭 라이브 시뮬</h2>
            <span className="text-[10px] text-slate-400 font-mono">live · scrape interval ≈ 0.5~0.8s</span>
          </div>

          <div className="space-y-3">
            {/* 1) 메트릭 메타 */}
            <MetricBadge metric={step.metric} />

            {/* 2) 라이브 시뮬레이션 */}
            <SimSwitch sim={step.sim} key={step.sim} />
          </div>

          {/* 핵심 포인트 박스 */}
          <div className="mt-3 bg-lime-50 border-l-4 border-lime-400 px-3 py-2 rounded-r">
            <div className="text-[9px] font-bold text-lime-600 uppercase tracking-wider mb-0.5">시니어 한 줄 가이드</div>
            <p className="text-[11px] text-lime-900 leading-snug">{step.keyPoint}</p>
          </div>

          {/* 메트릭 종류 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-lime-500"></span>Counter (↑)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-lime-400"></span>Gauge (↕)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-400"></span>Timer (⏱)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-400"></span>Tagged (×)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-500"></span>@Timed (AOP)
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   파일명 탭 + 윈도우 dot + 라인 번호 + 강조 라인
    //   여러 탭(Step별 1개씩) 중 현재 step 의 코드만 표시
    // ─────────────────────────────────────────────────────
    function CodeViewer({ codes, stepIdx, total, onTabClick }) {
      const code = codes[stepIdx];
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="ml-2 text-[10px] text-slate-500 font-mono uppercase">Java · Spring Boot</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono">{code.lang}</span>
          </div>

          {/* 5개 파일 탭 (클릭 가능) */}
          <div className="bg-[#21252b] px-2 flex border-b border-slate-700 overflow-x-auto">
            {codes.map((c, i) => (
              <button
                key={c.filename}
                onClick={() => onTabClick(i)}
                className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap transition border-t-2 ${
                  i === stepIdx
                    ? 'bg-[#282c34] text-lime-300 border-lime-400'
                    : 'bg-transparent text-slate-500 border-transparent hover:text-slate-300'
                }`}
              >
                {c.filename}
              </button>
            ))}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[44rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-lime-500/15 border-l-2 border-lime-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    //   - 우측 코드뷰어의 5탭 클릭으로 직접 step 이동도 지원
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      const handleTabClick = (i) => {
        setStepIdx(i);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; 챕터 목록</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter VIII-3-4</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-lime-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VIII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VIII. 운영 &amp; 모니터링 &gt; Chapter 3. Actuator + Micrometer</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VIII-3-4. 커스텀 메트릭 (비즈니스 지표)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">Counter · Gauge · Timer · Tags · @Timed — 5가지 패턴으로 비즈니스 메트릭 등록하기</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer codes={CODES} stepIdx={stepIdx} total={STEPS.length} onTabClick={handleTabClick} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-300 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: <strong>Counter</strong>(누적) / <strong>Gauge</strong>(현재값) / <strong>Timer</strong>(분포) / <strong>Tags</strong>(차원) / <strong>@Timed</strong>(자동 측정) — 이 5가지면 실무 95% 커버. 카디널리티 폭발과 self-invocation 함정만 피하면 OK. 다음(VIII-3-5)에서는 Prometheus 스크레이핑과 Grafana 대시보드 연결을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[110px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Micrometer', 'Counter', 'Gauge', 'Timer', 'Tags', '@Timed', 'Prometheus', 'percentile', 'cardinality', 'AOP'].map((kw) => (
                <span key={kw} className="bg-lime-50 text-lime-700 px-3 py-1 rounded-full text-xs font-medium border border-lime-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-08-10-prometheus-grafana.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; VIII-3-3 Prometheus/Grafana</a>
              <a href="./chapter-08-12-distributed-tracing.html" className="text-lime-700 hover:text-lime-900 font-medium">VIII-3-5 분산 트레이싱 &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0 (atom-one-dark)
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
