<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter VII-2-1 — SLF4J와 Logback 설정</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'stack', label:'① SLF4J + Logback', desc:'[STEP 1] Spring Boot 기본 로깅 = SLF4J(로깅 API 추상화) + Logback(실제 로그를 파일/콘솔에 쓰는 구현체). spring-boot-starter에 포함되어 별도 의존성 추가 불필요.', p:'stack' },
      { id:'usage', label:'② 로거 사용법', desc:'[STEP 2] 방법 1: Logger log = LoggerFactory.getLogger(UserService.class) 직접 선언. 방법 2: Lombok @Slf4j 애노테이션으로 선언 생략 (권장). log.info("사용자 조회: id={}", id) 형태로 사용.', p:'usage' },
      { id:'levels', label:'③ 로그 레벨', desc:'[STEP 3] TRACE → DEBUG → INFO → WARN → ERROR 순서. 설정한 레벨 이상만 출력된다. 운영: INFO/WARN, 개발: DEBUG. application.properties에서 패키지 단위로 설정.', p:'levels' },
      { id:'config', label:'④ 설정 방법', desc:'[STEP 4] logging.level.root=INFO (기본), logging.level.com.example.myapp=DEBUG (내 코드 상세). {} 플레이스홀더를 쓰면 문자열 연결 비용 없이 변수를 안전하게 출력한다.', p:'config' },
      { id:'why', label:'⑤ 왜 로깅인가', desc:'[STEP 5] 운영 중 장애가 발생했을 때 로그가 없으면 원인을 추적할 방법이 없다. logback-spring.xml로 롤링 정책, 파일 출력 등 세밀한 제어도 가능하다.', p:'why' },
    ];
    const LEVELS = [
      { name:'TRACE', desc:'가장 상세', color:'slate', bar:100 },
      { name:'DEBUG', desc:'개발 환경', color:'sky', bar:80 },
      { name:'INFO', desc:'일반 정보 (운영 기본)', color:'emerald', bar:60 },
      { name:'WARN', desc:'경고 — 추적 필요', color:'amber', bar:40 },
      { name:'ERROR', desc:'오류 — 즉시 대응', color:'rose', bar:20 },
    ];
    function V({ p }) {
      if (p==='stack') return (
        <div className="max-w-md mx-auto space-y-2">
          <div className="bg-violet-50 p-3 rounded-xl border border-violet-200 text-center"><div className="font-bold text-violet-800">SLF4J</div><div className="text-xs text-violet-600">로깅 API 추상화 (인터페이스)</div></div>
          <div className="flex justify-center"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg></div>
          <div className="bg-emerald-50 p-3 rounded-xl border-2 border-emerald-400 text-center"><div className="font-bold text-emerald-800">Logback</div><div className="text-xs text-emerald-600">실제 구현체 (콘솔/파일에 쓰기)</div></div>
          <div className="text-center text-xs text-slate-500">spring-boot-starter에 기본 포함</div>
        </div>
      );
      if (p==='usage') return (
        <div className="max-w-md mx-auto space-y-3">
          <div className="bg-slate-900 p-3 rounded-xl text-xs font-mono text-slate-300">
            <div className="text-slate-500">// 방법 1: 직접 선언</div>
            <div><span className="text-pink-400">private static final</span> Logger log =</div>
            <div>{'  '}LoggerFactory.getLogger(UserService.<span className="text-pink-400">class</span>);</div>
          </div>
          <div className="bg-slate-900 p-3 rounded-xl text-xs font-mono text-slate-300 border-2 border-emerald-500">
            <div className="text-emerald-400">// 방법 2: @Slf4j (권장)</div>
            <div><span className="text-yellow-300">@Slf4j</span></div>
            <div><span className="text-yellow-300">@Service</span></div>
            <div><span className="text-pink-400">public class</span> <span className="text-cyan-400">UserService</span> {'{'}</div>
            <div>{'  '}log.info(<span className="text-emerald-400">"사용자 조회: id={}"</span>, id);</div>
            <div>{'}'}</div>
          </div>
        </div>
      );
      if (p==='levels') return (
        <div className="max-w-md mx-auto space-y-1">
          {LEVELS.map(l => (
            <div key={l.name} className="flex items-center gap-2">
              <span className="text-xs font-bold w-14 text-right">{l.name}</span>
              <div className="flex-1 h-6 bg-slate-100 rounded-full overflow-hidden"><div className={`h-full bg-${l.color}-400 rounded-full`} style={{width:`${l.bar}%`}}></div></div>
              <span className="text-xs text-slate-500 w-28">{l.desc}</span>
            </div>
          ))}
          <div className="text-center text-xs text-slate-500 mt-2">설정한 레벨 이상만 출력됨</div>
        </div>
      );
      if (p==='config') return (
        <div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300">
          <div className="text-slate-500"># application.properties</div>
          <div>logging.level.root=<span className="text-amber-400">INFO</span></div>
          <div>logging.level.com.example.myapp=<span className="text-emerald-400">DEBUG</span></div>
          <div className="mt-2 text-slate-500">// {} 플레이스홀더 = 안전 + 성능</div>
          <div>log.info(<span className="text-emerald-400">"조회: id={}"</span>, id);</div>
          <div className="text-rose-400">// log.info("조회: id=" + id); ← 비권장</div>
        </div>
      );
      return (<div className="max-w-md mx-auto bg-slate-800 p-5 rounded-xl text-center"><div className="text-emerald-400 font-bold text-lg mb-2">로그 없으면 장애 원인 추적 불가</div><div className="text-slate-400 text-sm">logback-spring.xml로 롤링·파일 출력 세밀 제어 가능</div></div>);
    }
    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter VII-2-1</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">SLF4J와 Logback 설정</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600"><b>로거 선언 → 로그 레벨 → application.properties 설정</b>을 단계별로 체험합니다.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[240px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
