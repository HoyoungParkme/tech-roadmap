<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter VII-1-2 — Docker 컨테이너로 배포</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'simple', label:'① 단순 Dockerfile', desc:'[STEP 1] 가장 단순한 Spring Boot Dockerfile: JDK 이미지 위에 JAR를 복사하고 실행. FROM eclipse-temurin:17-jre → COPY app.jar → ENTRYPOINT java -jar.', p:'simple' },
      { id:'multi', label:'② 멀티스테이지 빌드', desc:'[STEP 2] 실제 운영에서는 멀티스테이지 빌드로 이미지 크기를 줄인다. 1단계(빌드): JDK로 JAR 생성. 2단계(실행): JRE만 있는 경량 이미지에 JAR 복사. 이미지가 50% 이상 작아진다.', p:'multi' },
      { id:'security', label:'③ 보안 관례', desc:'[STEP 3] 루트 유저 대신 별도 사용자(appuser)로 실행하는 것이 보안 관례. RUN useradd -m appuser → USER appuser. 컨테이너가 해킹되어도 호스트 시스템 피해를 최소화한다.', p:'security' },
      { id:'run', label:'④ 빌드와 실행', desc:'[STEP 4] docker build -t my-app . → docker run -p 8080:8080 my-app. 이미지 하나로 어떤 서버에서든 동일한 환경을 재현할 수 있다.', p:'run' },
      { id:'why', label:'⑤ 왜 Docker인가', desc:'[STEP 5] "내 컴퓨터에서는 되는데 서버에서 안 돼" 문제를 해결한다. 이미지 하나에 OS, JRE, JAR가 모두 포함되어 환경 차이가 사라진다.', p:'why' },
    ];
    function V({ p }) {
      if (p==='simple') return (
        <div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300">
          <div className="text-slate-500"># 단순 Dockerfile</div>
          <div><span className="text-sky-400">FROM</span> eclipse-temurin:17-jre</div>
          <div><span className="text-sky-400">WORKDIR</span> /app</div>
          <div><span className="text-sky-400">COPY</span> app.jar /app/app.jar</div>
          <div><span className="text-sky-400">ENTRYPOINT</span> ["java","-jar","/app/app.jar"]</div>
        </div>
      );
      if (p==='multi') return (
        <div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300">
          <div className="text-amber-400"># Stage 1: 빌드</div>
          <div><span className="text-sky-400">FROM</span> eclipse-temurin:17-jdk <span className="text-sky-400">AS</span> build</div>
          <div><span className="text-sky-400">WORKDIR</span> /workspace</div>
          <div><span className="text-sky-400">COPY</span> . .</div>
          <div><span className="text-sky-400">RUN</span> ./gradlew bootJar</div>
          <div className="mt-2 text-emerald-400"># Stage 2: 실행 (JRE만)</div>
          <div><span className="text-sky-400">FROM</span> eclipse-temurin:17-jre</div>
          <div><span className="text-sky-400">WORKDIR</span> /app</div>
          <div><span className="text-sky-400">COPY</span> --from=build /workspace/build/libs/*.jar app.jar</div>
          <div><span className="text-sky-400">ENTRYPOINT</span> ["java","-jar","app.jar"]</div>
        </div>
      );
      if (p==='security') return (
        <div className="max-w-md mx-auto space-y-3">
          <div className="bg-slate-900 p-3 rounded-xl text-xs font-mono text-slate-300">
            <div><span className="text-sky-400">RUN</span> useradd -m appuser</div>
            <div><span className="text-sky-400">USER</span> appuser <span className="text-slate-500"># 루트 대신 일반 유저로 실행</span></div>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-rose-50 p-3 rounded-lg border border-rose-200 text-center text-xs"><div className="text-lg">❌</div><div className="text-rose-700">root 실행</div><div className="text-rose-500">해킹 시 전체 위험</div></div>
            <div className="bg-emerald-50 p-3 rounded-lg border-2 border-emerald-400 text-center text-xs"><div className="text-lg">✅</div><div className="text-emerald-700">appuser 실행</div><div className="text-emerald-500">피해 최소화</div></div>
          </div>
        </div>
      );
      if (p==='run') return (
        <div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-sm font-mono">
          <div className="text-emerald-400">$ docker build -t my-app .</div>
          <div className="text-slate-500 mt-1">Successfully built abc123</div>
          <div className="text-emerald-400 mt-2">$ docker run -p 8080:8080 my-app</div>
          <div className="text-slate-300 mt-1">Started in 2.3 seconds</div>
          <div className="text-slate-300">Tomcat on port <span className="text-amber-400">8080</span></div>
        </div>
      );
      return (<div className="max-w-md mx-auto bg-slate-800 p-5 rounded-xl text-center"><div className="text-emerald-400 font-bold text-lg mb-2">이미지 하나 = 어디서든 동일 환경</div><div className="text-slate-400 text-sm">"내 컴퓨터에서는 되는데" 문제 해결</div></div>);
    }
    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter VII-1-2</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">Docker 컨테이너로 배포</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600"><b>Dockerfile 작성 → 멀티스테이지 빌드 → 보안 관례</b>를 단계별로 체험합니다.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[240px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
