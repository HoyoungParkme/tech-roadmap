        keyPoint: '컨테이너 = 이미지 + 쓰기 가능 레이어 + 격리된 프로세스. 죽이고 다시 띄워도 항상 같은 시작점.',

      {

        desc: '단순 COPY app.jar 방식은 코드 한 줄 바뀔 때마다 50MB짜리 레이어가 통째로 새로 만들어진다. Spring Boot 2.3+의 layered jar 기능은 jar 내부를 4개 레이어(dependencies, loader, snapshot-deps, application)로 쪼개 준다. 변경 빈도가 낮은 의존성 레이어가 그대로 캐시되어 빌드/푸시 속도가 5~10배 빨라진다.',

COPY --from=ext /spring-boot-loader/ ./
COPY --from=ext /snapshot-dependencies/ ./
COPY --from=ext /application/        ./
ENTRYPOINT ["java","org.springframework.boot.loader.JarLauncher"]`,
        layers: [

      {

        layers: [
          { id: 'l5-1', label: '[app] eclipse-temurin:17-jre + layered jar', size: '273 MB', kind: 'base' },

          { id: 'r5-4', label: 'network: backend  ← app와 db가 "db"라는 이름으로 통신', role: 'net' },
        ],
        arrow: { left: 'compose up', right: '서비스 이름 = DNS' },
        keyPoint: 'compose는 multi-container를 "선언적"으로 관리한다. 운영에선 더 큰 무대(Kubernetes)로 가지만 시작은 늘 compose다.',
        activeTab: 4,
      },
    ];

    // ─────────────────────────────────────────────────────
    // CodeCard — 좌측에 표시하는 짧은 코드 카드 (다크)
    // ─────────────────────────────────────────────────────
    function CodeCard({ label, code }) {
      return (
        <div className="rounded-lg border-2 border-lime-300 bg-lime-50 overflow-hidden">
          <div className="px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider bg-lime-100 text-lime-800">
            {label}
          </div>
          <pre className="text-[11px] font-mono text-slate-800 leading-snug p-2.5 m-0 whitespace-pre overflow-x-auto">{code}</pre>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // ImageLayers — 이미지 레이어 시각화
    //   kind 별 색상
    //     base     → slate (베이스 이미지)
    //     sys      → zinc  (WORKDIR 등 메타)
    //     deps     → indigo(의존성 — 무거움)
    //     snapshot → amber (스냅샷 / 자주 바뀜)
    //     classes  → emerald (내 클래스)
    //     app      → lime  (단순 jar 통째)
    //     cmd      → fuchsia (실행 커맨드)
    // ─────────────────────────────────────────────────────
    function ImageLayers({ layers }) {
      const kindMap = {
        base:     { bg: 'bg-slate-100',    text: 'text-slate-700',    border: 'border-slate-300',    tag: 'BASE' },
        sys:      { bg: 'bg-zinc-50',      text: 'text-zinc-700',     border: 'border-zinc-300',     tag: 'SYS'  },
        deps:     { bg: 'bg-indigo-50',    text: 'text-indigo-800',   border: 'border-indigo-300',   tag: 'DEPS' },
        snapshot: { bg: 'bg-amber-50',     text: 'text-amber-800',    border: 'border-amber-300',    tag: 'SNAP' },
        classes:  { bg: 'bg-emerald-50',   text: 'text-emerald-800',  border: 'border-emerald-300',  tag: 'CODE' },
        app:      { bg: 'bg-lime-50',      text: 'text-lime-800',     border: 'border-lime-300',     tag: 'APP'  },
        cmd:      { bg: 'bg-fuchsia-50',   text: 'text-fuchsia-800',  border: 'border-fuchsia-300',  tag: 'CMD'  },
      };
      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">
          <div className="bg-slate-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-slate-600 flex items-center justify-between">
            <span>🧱 image layers (위에서부터 쌓인다)</span>
            <span className="text-[9px] font-mono text-slate-500">read-only</span>
          </div>
          <div className="p-2.5 space-y-1">
            {layers.map((l) => {
              const c = kindMap[l.kind] || kindMap.sys;
              return (
                <div key={l.id} className={`flex items-center justify-between gap-2 px-2 py-1 rounded border ${c.border} ${c.bg}`}>
                  <div className="flex items-center gap-2 min-w-0">
                    <span className={`text-[8px] font-mono px-1.5 py-0.5 rounded ${c.text} bg-white border ${c.border} font-bold tracking-wide flex-shrink-0`}>
                      {c.tag}
                    </span>
                    <span className={`text-[11px] font-mono ${c.text} leading-tight truncate`}>{l.label}</span>
                  </div>
                  <span className="text-[10px] font-mono text-slate-500 flex-shrink-0">{l.size}</span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // RuntimeBoxes — 호스트 / 이미지 / 컨테이너 / DB / 네트워크 시각화
    // ─────────────────────────────────────────────────────
    function RuntimeBoxes({ items }) {
      const roleMap = {
        host:      { bg: 'bg-slate-50',    border: 'border-slate-300',    text: 'text-slate-700',    icon: '🖥️', label: 'HOST' },
        image:     { bg: 'bg-lime-50',     border: 'border-lime-400',     text: 'text-lime-800',     icon: '📦', label: 'IMAGE' },
        container: { bg: 'bg-emerald-50',  border: 'border-emerald-400',  text: 'text-emerald-800',  icon: '🚢', label: 'CONTAINER' },
        db:        { bg: 'bg-sky-50',      border: 'border-sky-400',      text: 'text-sky-800',      icon: '🐘', label: 'DB' },
        net:       { bg: 'bg-fuchsia-50',  border: 'border-fuchsia-300',  text: 'text-fuchsia-800',  icon: '🔗', label: 'NETWORK' },
      };
      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 overflow-hidden">
          <div className="bg-emerald-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-emerald-700 flex items-center justify-between">
            <span>🚢 runtime — image / container / network</span>
            <span className="text-[9px] font-mono text-emerald-600">docker engine</span>
          </div>
          <div className="p-2.5 space-y-1.5">
            {items.map((it) => {
              const r = roleMap[it.role] || roleMap.host;
              return (
                <div
                  key={it.id}
                  className={`flex items-center justify-between gap-2 px-2 py-1.5 rounded border ${r.border} ${r.bg} ${it.dim ? 'opacity-50' : ''}`}
                >
                  <div className="flex items-center gap-2 min-w-0">
                    <span className="text-sm flex-shrink-0">{r.icon}</span>
                    <span className={`text-[8px] font-mono px-1.5 py-0.5 rounded ${r.text} bg-white border ${r.border} font-bold tracking-wide flex-shrink-0`}>
                      {r.label}
                    </span>
                    <span className={`text-[11px] font-mono ${r.text} leading-tight truncate`}>{it.label}</span>
                  </div>
                  {it.port && (
                    <span className="text-[10px] font-mono text-emerald-700 bg-white px-1.5 py-0.5 rounded border border-emerald-300 flex-shrink-0">
                      :{it.port}
                    </span>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // FlowArrow — 변환 흐름 화살표 (수직)
    // ─────────────────────────────────────────────────────
    function FlowArrow({ label }) {
      return (
        <div className="flex items-center justify-center my-1">
          <div className="flex flex-col items-center">
            <div className="text-[9px] text-lime-700 font-mono font-bold tracking-wider uppercase">{label}</div>
            <div className="text-lime-500 text-lg leading-none">↓</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    //   상단 : Dockerfile / 명령 코드 카드
    //   ↓ build / run
    //   중간 : 이미지 레이어 시각화
    //   ↓ docker engine
    //   하단 : 런타임 박스 (호스트/이미지/컨테이너/DB/네트워크)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🐳 Dockerfile → image → container 빌드/실행 흐름</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-1">
            {/* 1) 입력 — Dockerfile / 명령 코드 카드 */}
            <CodeCard label={step.codeLeftLabel} code={step.codeLeft} />

            <FlowArrow label={step.arrow.left} />

            {/* 2) 중간 — 이미지 레이어 시각화 */}
            <ImageLayers layers={step.layers} />

            <FlowArrow label={step.arrow.right} />

            {/* 3) 출력 — 런타임 박스 */}
            <RuntimeBoxes items={step.runtime} />
          </div>

          {/* 핵심 포인트 박스 */}
          <div className="mt-3 bg-lime-50 border-l-4 border-lime-500 px-3 py-2 rounded-r">
            <div className="text-[9px] font-bold text-lime-700 uppercase tracking-wider mb-0.5">핵심 포인트</div>
            <p className="text-[11px] text-lime-900 leading-snug">{step.keyPoint}</p>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-slate-400"></span>base</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-indigo-400"></span>deps</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-amber-400"></span>snapshot</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-emerald-400"></span>code</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-lime-400"></span>app</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-fuchsia-400"></span>cmd</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   파일 탭 5개 + 윈도우 dot + 라인 번호 + 강조 라인
    //   activeTab 은 step 별로 자동 전환되며, 사용자가 다른 탭 클릭 가능
    // ─────────────────────────────────────────────────────
    function CodeViewer({ files, activeTab, onTabChange, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);
      const code = files[activeTab];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 (5개) */}
          <div className="bg-[#21252b] border-b border-slate-700">
            <div className="px-4 py-2 flex items-center gap-2">
              <div className="flex gap-1.5">
                <span className="w-3 h-3 rounded-full bg-red-500"></span>
                <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
                <span className="w-3 h-3 rounded-full bg-green-500"></span>
              </div>
              <span className="ml-2 text-[10px] text-slate-500 font-mono uppercase">VSCode — Spring Boot Docker</span>
            </div>
            <div className="flex overflow-x-auto border-t border-slate-800">
              {files.map((f, i) => (
                <button
                  key={f.filename}
                  onClick={() => onTabChange(i)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap transition border-r border-slate-800 ${
                    i === activeTab
                      ? 'bg-[#282c34] text-lime-300 border-t-2 border-t-lime-400'
                      : 'bg-[#21252b] text-slate-500 hover:text-slate-300'
                  }`}
                >
                  {f.filename}
                </button>
              ))}
            </div>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-lime-500/15 border-l-2 border-lime-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.filename} · {code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    //   - 우측 코드 탭은 step.activeTab 으로 자동 전환,
    //     사용자가 직접 클릭하면 그 탭 유지
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [tabIdx, setTabIdx] = useState(STEPS[0].activeTab);
      const [userOverride, setUserOverride] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      // 스텝 변경 시 탭 자동 전환 (사용자가 수동 클릭한 경우는 그대로 유지하지 않고, 다음 스텝부터 다시 자동)
      useEffect(() => {
        setTabIdx(step.activeTab);
        setUserOverride(false);
      }, [stepIdx]);

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      const handleTabChange = (i) => {
        setTabIdx(i);
        setUserOverride(true);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; 챕터 목록</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter VII-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-lime-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VII. Spring Boot 운영 &gt; Chapter 1. 배포 기초</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VII-1-2. Docker 컨테이너로 배포</h1>
                  <p className="text-sm text-slate-500 mt-0.5">Dockerfile 작성 → 이미지 빌드 → 컨테이너 실행 → layered jar 최적화 → compose로 DB와 함께</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                files={TAB_FILES}
                activeTab={tabIdx}
                onTabChange={handleTabChange}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-300 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: Spring Boot의 Docker 배포는 <strong>Dockerfile → build → run</strong> 3단계가 본질이다.
                실무에선 <strong>layered jar</strong>로 캐시를 살리고, <strong>compose</strong>로 DB·캐시까지 한 번에 띄운다.
                다음(VII-1-3)에서는 운영의 눈, <strong>로깅</strong>을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Dockerfile', 'eclipse-temurin', 'docker build', 'docker run', '-p 8080:8080', 'layered jar', 'JarLauncher', 'compose', 'depends_on', 'volume', 'bridge network'].map((kw) => (
                <span key={kw} className="bg-lime-50 text-lime-700 px-3 py-1 rounded-full text-xs font-medium border border-lime-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-07-01-executable-jar.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; VII-1-1 실행 가능한 JAR</a>
              <a href="./chapter-07-03-logging.html" className="text-lime-700 hover:text-lime-900 font-medium">VII-1-3 로깅 &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
