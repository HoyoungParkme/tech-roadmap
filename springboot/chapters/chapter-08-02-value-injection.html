<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>VIII-1-2 — @Value로 설정 주입</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" /><script src="https://cdn.tailwindcss.com"></script><script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script><script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script></head>
<body><div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const STEPS=[
  {id:'basic',label:'① 기본 사용법',desc:'[STEP 1] @Value("${server.port}")를 필드에 붙이면 application.properties/yml의 값이 자동 주입된다. 가장 간단한 외부 설정 주입 방법이다.',p:'basic'},
  {id:'default',label:'② 기본값 지정',desc:'[STEP 2] @Value("${my.key:defaultValue}") — 콜론 뒤에 기본값을 지정하면 설정 파일에 키가 없을 때 기본값이 사용된다. 필수값이 아닌 설정에 유용하다.',p:'default'},
  {id:'spel',label:'③ SpEL 표현식',desc:'[STEP 3] @Value("#{systemProperties[\'user.name\']}") — SpEL(Spring Expression Language)로 시스템 속성, 환경변수, 계산식을 주입할 수 있다.',p:'spel'},
  {id:'caution',label:'④ 주의사항',desc:'[STEP 4] @Value는 static 필드에 사용 불가. Spring이 관리하는 Bean(@Component, @Service 등)에서만 동작한다. 생성자 주입과 함께 쓸 수도 있다.',p:'caution'},
  {id:'limit',label:'⑤ @Value의 한계',desc:'[STEP 5] 설정이 많아지면 @Value가 여기저기 흩어져 관리가 어렵다. 타입 안전성도 없다(문자열 오타 시 런타임 에러). 이 한계를 해결하는 것이 @ConfigurationProperties다.',p:'limit'},
];
function V({p}){
  if(p==='basic')return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div><span className="text-yellow-300">@Value</span>(<span className="text-emerald-400">"$&#123;server.port&#125;"</span>)</div><div><span className="text-pink-400">private int</span> port; <span className="text-slate-500">// → 8080</span></div><div className="mt-2"><span className="text-yellow-300">@Value</span>(<span className="text-emerald-400">"$&#123;app.name&#125;"</span>)</div><div><span className="text-pink-400">private</span> String appName; <span className="text-slate-500">// → "my-app"</span></div></div>);
  if(p==='default')return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div className="text-slate-500">// 키가 없으면 기본값 사용</div><div><span className="text-yellow-300">@Value</span>(<span className="text-emerald-400">"$&#123;app.timeout:<span className="text-amber-400">5000</span>&#125;"</span>)</div><div><span className="text-pink-400">private int</span> timeout; <span className="text-slate-500">// 없으면 5000</span></div><div className="mt-2"><span className="text-yellow-300">@Value</span>(<span className="text-emerald-400">"$&#123;app.debug:<span className="text-amber-400">false</span>&#125;"</span>)</div><div><span className="text-pink-400">private boolean</span> debug;</div></div>);
  if(p==='spel')return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div className="text-slate-500">// SpEL — 시스템 속성</div><div><span className="text-yellow-300">@Value</span>(<span className="text-emerald-400">"#&#123;systemProperties['user.name']&#125;"</span>)</div><div><span className="text-pink-400">private</span> String osUser;</div><div className="mt-2 text-slate-500">// SpEL — 계산</div><div><span className="text-yellow-300">@Value</span>(<span className="text-emerald-400">"#&#123;$&#123;app.base-price&#125; * 1.1&#125;"</span>)</div><div><span className="text-pink-400">private double</span> taxIncluded;</div></div>);
  if(p==='caution')return(<div className="max-w-md mx-auto space-y-3"><div className="bg-rose-50 p-3 rounded-lg border border-rose-200 text-sm text-rose-700">❌ <code>static</code> 필드에 사용 불가</div><div className="bg-rose-50 p-3 rounded-lg border border-rose-200 text-sm text-rose-700">❌ Spring Bean이 아닌 일반 클래스에서 동작 안 함</div><div className="bg-emerald-50 p-3 rounded-lg border border-emerald-200 text-sm text-emerald-700">✅ @Component, @Service, @Configuration 클래스에서만 사용</div></div>);
  return(<div className="max-w-md mx-auto bg-slate-800 p-5 rounded-xl text-center"><div className="text-amber-400 font-bold text-lg mb-2">@Value의 한계 → @ConfigurationProperties로 해결</div><div className="text-slate-400 text-sm">타입 안전성 없음 · 설정이 흩어짐 · 오타 = 런타임 에러</div></div>);
}
function App(){const[idx,setIdx]=useState(0);const[playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
return(<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6"><div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter VIII-1-2</span></div><header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">@Value로 설정 주입</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600"><b>@Value · 기본값 · SpEL</b> — 가장 간단한 외부 설정 주입을 체험합니다.</p></header><div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div><div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[240px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div><div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2"><button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button><button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button><button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button></div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1}/{STEPS.length} — {step.label}</div></div><div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div></div></div>);}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
