<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>VIII-1-2 вҖ” @ValueлЎң м„Өм • мЈјмһ…</title><script src="https://cdn.tailwindcss.com"></script><script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script><script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script></head>
<body><div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const STEPS=[
  {id:'basic',label:'в‘  кё°ліё мӮ¬мҡ©лІ•',desc:'[STEP 1] @Value("${server.port}")лҘј н•„л“ңм—җ л¶ҷмқҙл©ҙ application.properties/ymlмқҳ к°’мқҙ мһҗлҸҷ мЈјмһ…лҗңлӢӨ. к°ҖмһҘ к°„лӢЁн•ң мҷёл¶Җ м„Өм • мЈјмһ… л°©лІ•мқҙлӢӨ.',p:'basic'},
  {id:'default',label:'в‘Ў кё°ліёк°’ м§Җм •',desc:'[STEP 2] @Value("${my.key:defaultValue}") вҖ” мҪңлЎ  л’Өм—җ кё°ліёк°’мқ„ м§Җм •н•ҳл©ҙ м„Өм • нҢҢмқјм—җ нӮӨк°Җ м—Ҷмқ„ л•Ң кё°ліёк°’мқҙ мӮ¬мҡ©лҗңлӢӨ. н•„мҲҳк°’мқҙ м•„лӢҢ м„Өм •м—җ мң мҡ©н•ҳлӢӨ.',p:'default'},
  {id:'spel',label:'в‘ў SpEL н‘ңнҳ„мӢқ',desc:'[STEP 3] @Value("#{systemProperties[\'user.name\']}") вҖ” SpEL(Spring Expression Language)лЎң мӢңмҠӨн…ң мҶҚм„ұ, нҷҳкІҪліҖмҲҳ, кі„мӮ°мӢқмқ„ мЈјмһ…н•  мҲҳ мһҲлӢӨ.',p:'spel'},
  {id:'caution',label:'в‘Ј мЈјмқҳмӮ¬н•ӯ',desc:'[STEP 4] @ValueлҠ” static н•„л“ңм—җ мӮ¬мҡ© л¶Ҳк°Җ. Springмқҙ кҙҖлҰ¬н•ҳлҠ” Bean(@Component, @Service л“ұ)м—җм„ңл§Ң лҸҷмһ‘н•ңлӢӨ. мғқм„ұмһҗ мЈјмһ…кіј н•Ёк»ҳ м“ё мҲҳлҸ„ мһҲлӢӨ.',p:'caution'},
  {id:'limit',label:'в‘Ө @Valueмқҳ н•ңкі„',desc:'[STEP 5] м„Өм •мқҙ л§Һм•„м§Җл©ҙ @Valueк°Җ м—¬кё°м Җкё° нқ©м–ҙм ё кҙҖлҰ¬к°Җ м–ҙл өлӢӨ. нғҖмһ… м•Ҳм „м„ұлҸ„ м—ҶлӢӨ(л¬ёмһҗм—ҙ мҳӨнғҖ мӢң лҹ°нғҖмһ„ м—җлҹ¬). мқҙ н•ңкі„лҘј н•ҙкІ°н•ҳлҠ” кІғмқҙ @ConfigurationPropertiesлӢӨ.',p:'limit'},
];
function V({p}){
  if(p==='basic')return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div><span className="text-yellow-300">@Value</span>(<span className="text-emerald-400">"$&#123;server.port&#125;"</span>)</div><div><span className="text-pink-400">private int</span> port; <span className="text-slate-500">// вҶ’ 8080</span></div><div className="mt-2"><span className="text-yellow-300">@Value</span>(<span className="text-emerald-400">"$&#123;app.name&#125;"</span>)</div><div><span className="text-pink-400">private</span> String appName; <span className="text-slate-500">// вҶ’ "my-app"</span></div></div>);
  if(p==='default')return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div className="text-slate-500">// нӮӨк°Җ м—Ҷмңјл©ҙ кё°ліёк°’ мӮ¬мҡ©</div><div><span className="text-yellow-300">@Value</span>(<span className="text-emerald-400">"$&#123;app.timeout:<span className="text-amber-400">5000</span>&#125;"</span>)</div><div><span className="text-pink-400">private int</span> timeout; <span className="text-slate-500">// м—Ҷмңјл©ҙ 5000</span></div><div className="mt-2"><span className="text-yellow-300">@Value</span>(<span className="text-emerald-400">"$&#123;app.debug:<span className="text-amber-400">false</span>&#125;"</span>)</div><div><span className="text-pink-400">private boolean</span> debug;</div></div>);
  if(p==='spel')return(<div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300"><div className="text-slate-500">// SpEL вҖ” мӢңмҠӨн…ң мҶҚм„ұ</div><div><span className="text-yellow-300">@Value</span>(<span className="text-emerald-400">"#&#123;systemProperties['user.name']&#125;"</span>)</div><div><span className="text-pink-400">private</span> String osUser;</div><div className="mt-2 text-slate-500">// SpEL вҖ” кі„мӮ°</div><div><span className="text-yellow-300">@Value</span>(<span className="text-emerald-400">"#&#123;$&#123;app.base-price&#125; * 1.1&#125;"</span>)</div><div><span className="text-pink-400">private double</span> taxIncluded;</div></div>);
  if(p==='caution')return(<div className="max-w-md mx-auto space-y-3"><div className="bg-rose-50 p-3 rounded-lg border border-rose-200 text-sm text-rose-700">вқҢ <code>static</code> н•„л“ңм—җ мӮ¬мҡ© л¶Ҳк°Җ</div><div className="bg-rose-50 p-3 rounded-lg border border-rose-200 text-sm text-rose-700">вқҢ Spring Beanмқҙ м•„лӢҢ мқјл°ҳ нҒҙлһҳмҠӨм—җм„ң лҸҷмһ‘ м•Ҳ н•Ё</div><div className="bg-emerald-50 p-3 rounded-lg border border-emerald-200 text-sm text-emerald-700">вң… @Component, @Service, @Configuration нҒҙлһҳмҠӨм—җм„ңл§Ң мӮ¬мҡ©</div></div>);
  return(<div className="max-w-md mx-auto bg-slate-800 p-5 rounded-xl text-center"><div className="text-amber-400 font-bold text-lg mb-2">@Valueмқҳ н•ңкі„ вҶ’ @ConfigurationPropertiesлЎң н•ҙкІ°</div><div className="text-slate-400 text-sm">нғҖмһ… м•Ҳм „м„ұ м—ҶмқҢ В· м„Өм •мқҙ нқ©м–ҙм§җ В· мҳӨнғҖ = лҹ°нғҖмһ„ м—җлҹ¬</div></div>);
}
function App(){const[idx,setIdx]=useState(0);const[playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
return(<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6"><div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">вҶҗ мұ•н„° лӘ©лЎқ</a><span className="text-slate-400">Chapter VIII-1-2</span></div><header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">@ValueлЎң м„Өм • мЈјмһ…</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">вҳ…вҳ…вҳ…</span></div><p className="text-slate-600"><b>@Value В· кё°ліёк°’ В· SpEL</b> вҖ” к°ҖмһҘ к°„лӢЁн•ң мҷёл¶Җ м„Өм • мЈјмһ…мқ„ мІҙн—ҳн•©лӢҲлӢӨ.</p></header><div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">нҳ„мһ¬ лӢЁкі„</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div><div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[240px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div><div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2"><button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button><button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>м •м§Җ</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>мһҗлҸҷ мӢӨн–ү</>)}</button><button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button></div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1}/{STEPS.length} вҖ” {step.label}</div></div><div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div></div></div>);}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
