    // ─────────────────────────────────────────────────────
    // ManualBlock — "수동" 영역에 한 줄씩 표시
    //   type 별 색상
    //     cmd  → slate (검정 터미널 명령)
    //     err  → rose  (빨강 에러)
    //     wait → amber (대기/지연)
    //     ok   → lime  (성공)
    //     log  → sky   (로그/출력)
    // ─────────────────────────────────────────────────────
    function ManualBlock({ block }) {
      const styleMap = {
        cmd:  { bg: 'bg-slate-900',  text: 'text-lime-300', tag: 'CMD',  tagBg: 'bg-slate-700  text-slate-200' },
        err:  { bg: 'bg-rose-50',    text: 'text-rose-800', tag: 'ERR',  tagBg: 'bg-rose-200   text-rose-800'  },
        wait: { bg: 'bg-amber-50',   text: 'text-amber-800',tag: 'WAIT', tagBg: 'bg-amber-200  text-amber-800' },
        ok:   { bg: 'bg-lime-50',    text: 'text-lime-800', tag: 'OK',   tagBg: 'bg-lime-200   text-lime-800'  },
        log:  { bg: 'bg-sky-50',     text: 'text-sky-800',  tag: 'LOG',  tagBg: 'bg-sky-200    text-sky-800'   },
      };
      const s = styleMap[block.type] || styleMap.cmd;
      return (
        <div className={`rounded border ${s.bg} px-2 py-1 flex items-start gap-1.5`}>
          <span className={`text-[8px] font-mono px-1.5 py-0.5 rounded ${s.tagBg} font-bold uppercase tracking-wide flex-shrink-0`}>
            {s.tag}
          </span>
          <div className="flex-1 min-w-0">
            <div className={`text-[11px] font-mono ${s.text} leading-tight truncate`}>{block.text}</div>
            {block.sub && <div className="text-[9px] text-slate-500 mt-0.5 truncate">{block.sub}</div>}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // ToolOutput — 빌드 도구가 한 줄로 처리하는 출력

    function ToolOutput({ items }) {
      return (
        <div className="space-y-1">
          {items.map((it, i) => (
            <div key={i} className="flex items-center gap-2 bg-lime-50 border border-lime-200 rounded px-2 py-1">
              <span className="w-4 h-4 rounded-full bg-lime-500 text-white flex items-center justify-center text-[9px] font-bold flex-shrink-0">
                ✓

              <span className="text-[11px] text-slate-800 font-mono leading-tight flex-1 truncate">{it.label}</span>
              {it.note && <span className="text-[9px] text-lime-700 font-mono flex-shrink-0">{it.note}</span>}
            </div>
          ))}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // DepTree — 의존성 트리 (좌측 하단)
    //   kind 별 색상
    //     app        → slate (앱 자체)
    //     direct     → lime (직접 의존)
    //     transitive → emerald (전이적 의존)
    //     conflict   → rose (버전 충돌)
    //     missing    → amber (누락)
    // ─────────────────────────────────────────────────────
    function DepTree({ nodes }) {
      const kindMap = {
        app:        { bg: 'bg-slate-100',   text: 'text-slate-800',   tag: 'APP'  },
        direct:     { bg: 'bg-lime-100',    text: 'text-lime-800',    tag: 'DIR'  },
        transitive: { bg: 'bg-emerald-100', text: 'text-emerald-800', tag: 'TRA'  },
        conflict:   { bg: 'bg-rose-100',    text: 'text-rose-800',    tag: 'CONF' },
        missing:    { bg: 'bg-amber-100',   text: 'text-amber-800',   tag: 'MISS' },
      };
      return (
        <div className="bg-white rounded-lg border-2 border-lime-200 overflow-hidden">
          <div className="bg-lime-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-lime-800 flex items-center justify-between">
            <span>의존성 트리</span>
            <span className="text-[9px] font-mono text-lime-700">dependency graph</span>
          </div>
          <div className="p-2.5 space-y-1">
            {nodes.map((n) => {
              const c = kindMap[n.kind] || kindMap.direct;
              return (
                <div key={n.id} className="flex items-center gap-1.5" style={{ marginLeft: `${n.depth * 14}px` }}>
                  <span className={`text-[8px] font-mono px-1.5 py-0.5 rounded ${c.bg} ${c.text} font-bold uppercase tracking-wide flex-shrink-0`}>
                    {c.tag}
                  </span>
                  <span className="text-[11px] font-mono text-slate-700 leading-tight">{n.label}</span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VersusBox — 수동 vs 빌드 도구 좌우 비교
    // ─────────────────────────────────────────────────────
    function VersusBox({ step }) {
      const winnerIsTool = step.verdict.winner === 'tool';
      return (
        <div className="grid grid-cols-2 gap-2">
          {/* 좌 — 수동 */}
          <div className={`rounded-lg border-2 overflow-hidden ${winnerIsTool ? 'border-rose-200' : 'border-lime-300'}`}>
            <div className={`px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider ${winnerIsTool ? 'bg-rose-100 text-rose-700' : 'bg-lime-100 text-lime-700'}`}>
              <span className="mr-1">🛠</span>{step.manualLabel}
            </div>
            <div className="p-2 space-y-1 bg-slate-50 max-h-[18rem] overflow-y-auto">
              {step.manualBlocks.map((b) => <ManualBlock key={b.id} block={b} />)}
            </div>
          </div>

          {/* 우 — 빌드 도구 */}
          <div className={`rounded-lg border-2 overflow-hidden ${winnerIsTool ? 'border-lime-300' : 'border-rose-200'}`}>
            <div className={`px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider ${winnerIsTool ? 'bg-lime-100 text-lime-700' : 'bg-rose-100 text-rose-700'}`}>
              <span className="mr-1">⚙️</span>빌드 도구 — 한 줄
            </div>
            <div className="p-2 bg-slate-50 max-h-[18rem] overflow-y-auto">
              <pre className="text-[11px] font-mono text-slate-800 bg-slate-900 text-lime-300 rounded px-2 py-1 mb-2 whitespace-pre-wrap break-all">{step.tooledLine}</pre>
              <ToolOutput items={step.tooledOutput} />
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VerdictBar — 어느 쪽이 이기는지 한 줄
    // ─────────────────────────────────────────────────────
    function VerdictBar({ verdict }) {
      const isTool = verdict.winner === 'tool';
      return (
        <div className={`flex items-center gap-2 rounded-lg px-3 py-2 border-2 ${isTool ? 'border-lime-300 bg-lime-50' : 'border-slate-300 bg-slate-50'}`}>
          <span className={`text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider ${isTool ? 'bg-lime-500 text-white' : 'bg-slate-500 text-white'}`}>
            {isTool ? '🏆 빌드 도구' : '🏆 수동'} 승
          </span>
          <span className="text-[11px] text-slate-700 leading-snug flex-1">{verdict.text}</span>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // FlowArrow — 변환 흐름 화살표 (수직)
    // ─────────────────────────────────────────────────────
    function FlowArrow({ label }) {
      return (
        <div className="flex items-center justify-center my-1">

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    //   상단 : 수동 vs 빌드 도구 비교
    //   ↓ 결론
    //   중간 : Verdict Bar
    //   ↓ 의존성 그래프
    //   하단 : 의존성 트리
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">

          {/* 범례 */}

            <span className="flex items-center gap-1">

            </span>
            <span className="flex items-center gap-1">

            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-400"></span>wait

            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-lime-500"></span>ok
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-400"></span>transitive
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>conflict

          </div>
        </div>

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   - 5 개 탭(파일) 자동 표시
    //   - 파일명 탭 + 윈도우 dot + 라인 번호 + 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ steps, stepIdx, onTabClick }) {
      const code = steps[stepIdx].code;
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">VS Code — chapter II-2-1</span>
          </div>

          {/* 5 개 파일 탭 */}
          <div className="bg-[#21252b] flex items-end border-b border-slate-700 overflow-x-auto">
            {steps.map((s, i) => {
              const active = i === stepIdx;
              return (
                <button
                  key={i}
                  onClick={() => onTabClick(i)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                    active
                      ? 'bg-[#282c34] text-lime-300 border-t-2 border-t-lime-400'
                      : 'bg-[#1c1f24] text-slate-400 hover:text-slate-200 hover:bg-[#21252b]'
                  }`}
                >
                  {s.code.filename}
                </button>
              );
            })}
            <span className="ml-auto px-3 py-1.5 text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[44rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-lime-500/15 border-l-2 border-lime-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {steps.length}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; 챕터 목록</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter II-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-lime-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. JVM 깊이 보기 &gt; Chapter 2. 빌드 도구</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-2-1. 빌드 도구가 필요한 이유</h1>
                  <p className="text-sm text-slate-500 mt-0.5">javac 한 줄로는 절대 못 가는 곳 — 의존성·순서·테스트·패키징의 자동화</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer steps={STEPS} stepIdx={stepIdx} onTabClick={setStepIdx} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-300 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: 자바 프로젝트의 빌드는 <strong>의존성 → 컴파일 → 테스트 → 패키징</strong>의 4 단 자동화. Maven/Gradle 이 이 모두를 한 줄로 묶어줘서 표준이 됐다. 다음(II-2-2)에서는 두 도구를 본격 비교한다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['javac', 'classpath', 'transitive', '의존성 트리', '증분 빌드', '테스트 자동화', 'Maven', 'Gradle'].map((kw) => (
                <span key={kw} className="bg-lime-50 text-lime-700 px-3 py-1 rounded-full text-xs font-medium border border-lime-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-02-02-gc-performance.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; II-1-2 GC와 성능</a>
              <a href="./chapter-02-04-maven-vs-gradle.html" className="text-lime-700 hover:text-lime-900 font-medium">II-2-2 Maven vs Gradle &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
