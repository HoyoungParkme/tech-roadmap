<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter II-2-1 — 빌드 도구가 필요한 이유</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter II-2-1 — 빌드 도구: 주방 매니저 비유 파이프라인 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { id: 'problem', label: '① 의존성 지옥',
        desc: '[STEP 1 — 문제] Spring Boot 프로젝트 하나에 수십~수백 개의 라이브러리가 필요하다. 이를 손으로 관리하면 각 라이브러리를 일일이 찾고, 버전 충돌을 해결해야 한다. 이 작업이 며칠씩 걸릴 수 있다.',
        active: 0 },
      { id: 'manager', label: '② 주방 매니저 비유',
        desc: '[STEP 2 — 비유] 빌드 도구 = 주방 매니저. 요리사(개발자)가 "오늘 메뉴는 파스타"라고 선언하면, 주방 매니저(빌드 도구)가 식재료(라이브러리)를 시장(인터넷)에서 사 오고, 손질하고(컴파일), 조리하고(테스트), 그릇에 담는다(패키징).',
        active: 1 },
      { id: 'deps', label: '③ 의존성 관리',
        desc: '[STEP 3 — 의존성] 빌드 도구의 첫 번째 일: 필요한 라이브러리를 인터넷 중앙 저장소(Maven Central)에서 자동으로 다운로드한다. A가 B를 필요로 하면 B까지 자동으로 가져온다(전이적 의존성).',
        active: 2 },
      { id: 'pipeline', label: '④ 빌드 파이프라인',
        desc: '[STEP 4 — 파이프라인] 의존성 다운로드 → 컴파일(.java→.class) → 테스트 자동 실행 → JAR 패키징. 이 네 단계가 명령어 한 줄로 자동 실행된다. 개발자는 재료 조달 과정에 일절 관여하지 않는다.',
        active: 3 },
      { id: 'jar', label: '⑤ JAR 결과물',
        desc: '[STEP 5 — JAR] 결과물인 JAR(Java ARchive)는 모든 코드와 의존성을 하나의 파일로 압축한 실행 파일이다. Spring Boot는 내장 Tomcat까지 포함시켜서 java -jar 한 줄로 서비스를 시작할 수 있다.',
        active: 4 },
    ];

    const PIPELINE_NODES = [
      { icon: '📋', name: '의존성 선언', sub: 'build.gradle에 목록 작성' },
      { icon: '🛒', name: '자동 다운로드', sub: 'Maven Central에서 가져오기' },
      { icon: '⚙️', name: '컴파일', sub: '.java → .class' },
      { icon: '🧪', name: '테스트 실행', sub: 'JUnit 자동 수행' },
      { icon: '📦', name: 'JAR 패키징', sub: '코드+의존성+Tomcat 하나로' },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;
      const activeNode = stepData.active;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3500); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <div className="flex justify-between items-center text-sm">
              <a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a>
              <span className="text-slate-400">Chapter II-2-1</span>
            </div>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div>
                <h1 className="text-2xl font-bold">빌드 도구가 필요한 이유</h1>
                <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">★☆☆</span>
              </div>
              <p className="text-slate-600">의존성 관리 → 컴파일 → 테스트 → <b>JAR 패키징</b>을 자동화하는 빌드 도구(주방 매니저)의 역할을 체험합니다.</p>
            </header>
            <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 파이프라인 시각화 */}
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">빌드 파이프라인 (주방 매니저의 작업 순서)</div>

              {/* 문제 화면 */}
              {activeNode === 0 && (
                <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4">
                  {['보안 라이브러리', 'DB 연결', '날짜 계산', '이메일', 'JSON 변환', '로깅', '테스트', '... 수백 개'].map(lib => (
                    <div key={lib} className="bg-rose-50 px-2 py-2 rounded border border-rose-200 text-xs text-rose-700 text-center">{lib}</div>
                  ))}
                </div>
              )}

              {/* 비유 화면 */}
              {activeNode === 1 && (
                <div className="flex items-center justify-center gap-4 flex-wrap mb-4">
                  <div className="bg-sky-50 p-4 rounded-xl border border-sky-200 text-center">
                    <div className="text-2xl mb-1">👨‍🍳</div>
                    <div className="text-sm font-bold text-sky-800">요리사 (개발자)</div>
                    <div className="text-xs text-sky-600">"파스타 만들 거야"</div>
                  </div>
                  <svg width="32" height="16" viewBox="0 0 32 16" fill="none" stroke="#94a3b8" strokeWidth="2"><path d="M0 8h28M22 2l6 6-6 6"/></svg>
                  <div className="bg-amber-50 p-4 rounded-xl border border-amber-200 text-center">
                    <div className="text-2xl mb-1">📋</div>
                    <div className="text-sm font-bold text-amber-800">주방 매니저 (빌드 도구)</div>
                    <div className="text-xs text-amber-600">재료 조달 ~ 완성까지 전부 관리</div>
                  </div>
                </div>
              )}

              {/* 파이프라인 노드 */}
              {activeNode >= 2 && (
                <div className="space-y-2">
                  {PIPELINE_NODES.map((node, idx) => (
                    <div key={idx} className="flex items-center gap-3">
                      <div className={`w-10 h-10 rounded-full flex items-center justify-center text-lg shrink-0 transition-all duration-500 ${
                        idx <= (activeNode - 2) ? 'bg-emerald-100 border-2 border-emerald-400 ring-2 ring-emerald-300 shadow' : 'bg-slate-100 border border-slate-200'
                      }`}>{node.icon}</div>
                      <div className={`flex-1 px-4 py-2 rounded-lg border transition-all duration-500 ${
                        idx <= (activeNode - 2) ? 'bg-emerald-50 border-emerald-300' : 'bg-white border-slate-200 opacity-40'
                      }`}>
                        <span className="font-semibold text-sm">{node.name}</span>
                        <span className="text-xs text-slate-500 ml-2">{node.sub}</span>
                      </div>
                      {idx <= (activeNode - 2) && <span className="text-emerald-500 text-lg">✓</span>}
                    </div>
                  ))}
                </div>
              )}

              <div className="mt-4 bg-amber-50 p-3 rounded-lg border border-amber-200 text-sm text-amber-800">
                <span className="font-bold">🍳 비유:</span> 빌드 도구 = 주방 매니저. 식재료 조달(의존성) → 손질(컴파일) → 조리(테스트) → 그릇 담기(JAR)
              </div>
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length} — {stepData.label}</div>
            </div>
            <div className="flex justify-center gap-2">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                  className={`w-3 h-3 rounded-full transition-all ${i === currentStepIdx ? 'bg-green-700 scale-125' : 'bg-slate-300 hover:bg-slate-400'}`} />
              ))}
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
