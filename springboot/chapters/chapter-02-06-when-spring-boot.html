    // ─────────────────────────────────────────────────────
    // ScenarioCard — 시나리오 카드 (Step 1~4)
    //   verdict 별 색상
    //     good → emerald (✓ 적합)
    //     bad  → rose    (✗ 과함)
    // ─────────────────────────────────────────────────────
    function ScenarioCard({ scenario, verdict, verdictLabel }) {
      const isGood = verdict === 'good';
      const headerBg = isGood ? 'bg-emerald-100' : 'bg-rose-100';
      const headerTxt = isGood ? 'text-emerald-700' : 'text-rose-700';

    // ─────────────────────────────────────────────────────
    // DecisionTree — 의사결정 트리 (Step 5)

    //     q    → slate  (질문)
    //     yes  → lime   (YES 분기)
    //     no   → amber  (NO 분기)
    //     good → emerald(권장 결과)
    //     alt  → sky    (대안 결과)
    // ─────────────────────────────────────────────────────
    function DecisionTree({ nodes }) {
      const kindMap = {
        q:    { bg: 'bg-slate-100',   text: 'text-slate-800',   border: 'border-slate-300',   tag: 'Q'    },
        yes:  { bg: 'bg-lime-50',     text: 'text-lime-800',    border: 'border-lime-300',    tag: 'YES'  },
        no:   { bg: 'bg-amber-50',    text: 'text-amber-800',   border: 'border-amber-300',   tag: 'NO'   },
        good: { bg: 'bg-emerald-100', text: 'text-emerald-800', border: 'border-emerald-300', tag: '✓'    },
        alt:  { bg: 'bg-sky-50',      text: 'text-sky-800',     border: 'border-sky-300',     tag: 'ALT'  },
      };
      return (
        <div className="bg-white rounded-lg border-2 border-lime-300 overflow-hidden">
          <div className="bg-lime-100 px-3 py-1.5 flex items-center justify-between">
            <span className="text-[10px] font-bold uppercase tracking-wider text-lime-700">
              Spring Boot 의사결정 트리
            </span>
            <span className="text-[11px] font-bold text-lime-700">○ 종합</span>
          </div>
          <div className="p-3 space-y-1">
            {nodes.map((n) => {
              const c = kindMap[n.kind] || kindMap.q;
              return (
                <div key={n.id} className="flex items-center gap-1.5" style={{ marginLeft: `${n.depth * 12}px` }}>
                  <span className={`text-[8px] font-mono px-1.5 py-0.5 rounded ${c.bg} ${c.text} border ${c.border} font-bold uppercase tracking-wide flex-shrink-0`}>
                    {c.tag}
                  </span>
                  <span className="text-[11px] font-mono text-slate-700 leading-tight">{n.label}</span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VerdictBadge — 좌측 상단 판정 뱃지
    // ─────────────────────────────────────────────────────
    function VerdictBadge({ verdict, verdictLabel }) {
      const map = {
        good: { bg: 'bg-emerald-500', text: 'text-white', label: 'Spring Boot 적합' },
        bad:  { bg: 'bg-rose-500',    text: 'text-white', label: 'Spring Boot 과함' },
        tree: { bg: 'bg-lime-600',    text: 'text-white', label: '의사결정 종합' },
      };
      const v = map[verdict] || map.good;
      return (
        <div className={`${v.bg} ${v.text} px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider flex items-center gap-1`}>
          <span>{verdictLabel}</span>
          <span className="opacity-80">·</span>
          <span>{v.label}</span>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    //   Step 1~4 : ScenarioCard
    //   Step 5   : DecisionTree
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const isTree = step.verdict === 'tree';
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🌱 Spring Boot 의사결정 시나리오</h2>
            <VerdictBadge verdict={step.verdict} verdictLabel={step.verdictLabel} />
          </div>

          <div className="space-y-3">
            {isTree ? (
              <DecisionTree nodes={step.tree} />
            ) : (
              <ScenarioCard
                scenario={step.scenario}
                verdict={step.verdict}
                verdictLabel={step.verdictLabel}
              />
            )}
          </div>

          {/* 핵심 포인트 박스 */}

            <div className="text-[9px] font-bold text-lime-700 uppercase tracking-wider mb-0.5">핵심 포인트</div>
            <p className="text-[11px] text-lime-900 leading-snug">{step.keyPoint}</p>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>적합
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-500"></span>과함
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-lime-500"></span>분기
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-sky-500"></span>대안
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-400"></span>질문
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   파일명 탭 + 윈도우 dot + 라인 번호 + 강조 라인
    //   탭 5개 — 현재 단계 자동 활성
    // ─────────────────────────────────────────────────────
    function CodeViewer({ steps, stepIdx, total }) {
      const code = steps[stepIdx].code;
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 5 탭 */}
          <div className="bg-[#21252b] flex border-b border-slate-700 overflow-x-auto">
            {steps.map((s, i) => {
              const active = i === stepIdx;
              return (
                <div
                  key={i}
                  className={`px-3 py-1.5 text-[11px] font-mono border-r border-slate-700 flex-shrink-0 ${
                    active
                      ? 'bg-[#282c34] text-lime-300 border-t-2 border-t-lime-400'
                      : 'text-slate-500'
                  }`}
                >
                  {s.code.filename}
                </div>
              );
            })}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-lime-500/15 border-l-2 border-lime-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; 챕터 목록</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter II-3-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-lime-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. Spring Boot 의사결정 &gt; Chapter 3. 도입 기준</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-3-2. 언제 Spring Boot를 선택하나</h1>
                  <p className="text-sm text-slate-500 mt-0.5">4가지 시나리오 + 의사결정 트리로 Boot의 적합성을 판단한다</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer steps={STEPS} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-400 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: Spring Boot의 적합성은 <strong>3가지 질문(장기/JVM/분산)</strong>으로 결정된다. 빠른 프로토타입·마이크로서비스·레거시 마이그레이션엔 강력하지만, <strong>단발성 CLI에는 과하다</strong>. 다음 챕터부터 직접 코드를 작성하며 "어떻게"로 넘어간다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Spring Boot', '의사결정', '프로토타입', 'Spring Cloud', '마이크로서비스', '마이그레이션', 'CLI', 'JVM'].map((kw) => (
                <span key={kw} className="bg-lime-50 text-lime-700 px-3 py-1 rounded-full text-xs font-medium border border-lime-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-02-05-boot-vs-framework.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; II-3-1 Boot vs Framework</a>
              <a href="./chapter-03-01-hello-world.html" className="text-lime-700 hover:text-lime-900 font-medium">III-1-1 Hello World &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
