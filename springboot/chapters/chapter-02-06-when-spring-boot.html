<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter II-3-2 — 언제 Spring Boot를 선택하나</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter II-3-2 — 언제 Spring Boot를 선택하나: 선택 기준 매트릭스 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { id: 'question', label: '① 핵심 질문',
        desc: '[STEP 1 — 질문] "나는 Spring Boot를 선택해야 할까?" 정직한 답은 "경우에 따라 다르다". Spring Boot가 모든 상황의 최선은 아니다. 그러나 특정 조건에서는 다른 어떤 선택보다 강력하다.',
        phase: 'question' },
      { id: 'strong', label: '② Spring Boot가 강한 곳',
        desc: '[STEP 2 — 강점] 장기 운영되는 복잡한 비즈니스 시스템이 Spring Boot의 주 무대다. 은행 계좌이체, 대기업 ERP, 정부 포털처럼 수백만 명이 동시에 쓰고 수년간 유지해야 하는 서비스.',
        phase: 'strong' },
      { id: 'overkill', label: '③ Spring Boot가 과한 곳',
        desc: '[STEP 3 — 약점] 이틀 안에 MVP를 만들어야 하거나, 몇 백 줄짜리 단순 API가 전부라면 JVM 초기화 시간조차 불필요한 복잡함이다. 이럴 때는 FastAPI나 Express가 어울린다.',
        phase: 'overkill' },
      { id: 'criteria', label: '④ 선택 기준 한 줄',
        desc: '[STEP 4 — 기준] "지금 만드는 서비스가 3년 후에도 살아있을 가능성이 높고, 팀이 함께 유지보수해야 한다면 Spring Boot를 선택하라." 특히 대규모 트래픽과 트랜잭션 처리가 핵심이라면 검증된 선택이다.',
        phase: 'criteria' },
      { id: 'motivation', label: '⑤ 학습 동기',
        desc: '[STEP 5 — 동기] Spring Boot를 "왜" 배우는지 납득해야 학습 동기가 유지된다. 다른 프레임워크와 비교하는 상황에서 스스로 근거 있는 판단을 내릴 수 있게 된다.',
        phase: 'motivation' },
    ];

    function DecisionMatrix({ phase }) {
      if (phase === 'question') {
        return (
          <div className="text-center space-y-4">
            <div className="text-4xl">🤔</div>
            <div className="text-xl font-bold text-slate-700">Spring Boot를 선택해야 할까?</div>
            <div className="grid grid-cols-3 gap-3 max-w-md mx-auto">
              {[{ q: '규모가 큰가?', icon: '📊' }, { q: '오래 운영하나?', icon: '⏳' }, { q: '보안이 중요한가?', icon: '🔒' }].map(item => (
                <div key={item.q} className="bg-slate-100 p-3 rounded-lg border border-slate-200 text-center">
                  <div className="text-xl">{item.icon}</div>
                  <div className="text-xs text-slate-600 mt-1">{item.q}</div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      if (phase === 'strong') {
        return (
          <div className="space-y-3">
            <div className="text-xs font-bold text-emerald-500 uppercase tracking-widest">Spring Boot가 최적인 환경</div>
            {[
              { icon: '🏦', name: '은행 계좌이체', tag: '트랜잭션 필수' },
              { icon: '🏢', name: '대기업 ERP', tag: '장기 유지보수' },
              { icon: '🏛️', name: '정부 공공 포털', tag: '수백만 동시 접속' },
              { icon: '🛒', name: '대형 이커머스', tag: '결제 보안' },
            ].map(item => (
              <div key={item.name} className="flex items-center gap-3 bg-emerald-50 p-3 rounded-lg border border-emerald-200">
                <span className="text-2xl">{item.icon}</span>
                <div className="flex-1">
                  <span className="font-semibold text-emerald-800">{item.name}</span>
                  <span className="text-xs text-emerald-600 ml-2">{item.tag}</span>
                </div>
                <span className="text-emerald-500 text-lg">✓</span>
              </div>
            ))}
          </div>
        );
      }

      if (phase === 'overkill') {
        return (
          <div className="space-y-3">
            <div className="text-xs font-bold text-rose-500 uppercase tracking-widest">Spring Boot가 과한 경우</div>
            {[
              { icon: '⚡', name: '이틀 MVP', alt: 'FastAPI / Express', reason: '시작 속도가 중요' },
              { icon: '📝', name: '단순 API 100줄', alt: 'Express / Flask', reason: 'JVM 무거움' },
              { icon: '🧪', name: '빠른 프로토타입', alt: 'Python / Node.js', reason: '유연성 우선' },
            ].map(item => (
              <div key={item.name} className="flex items-center gap-3 bg-rose-50 p-3 rounded-lg border border-rose-200">
                <span className="text-2xl">{item.icon}</span>
                <div className="flex-1">
                  <span className="font-semibold text-rose-800">{item.name}</span>
                  <span className="text-xs text-rose-600 ml-2">→ {item.alt}</span>
                </div>
                <span className="text-xs text-slate-500">{item.reason}</span>
              </div>
            ))}
          </div>
        );
      }

      if (phase === 'criteria') {
        return (
          <div className="space-y-4">
            <div className="bg-slate-800 text-slate-200 p-5 rounded-xl text-center">
              <div className="text-lg font-bold text-emerald-400 mb-2">"3년 후에도 살아있을 서비스 + 팀 유지보수"</div>
              <div className="text-sm text-slate-400">이 조건이면 Spring Boot를 선택하라</div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div className="bg-emerald-50 p-3 rounded-lg border border-emerald-200 text-center">
                <div className="font-bold text-emerald-800 text-sm">Spring Boot ✓</div>
                <ul className="text-xs text-emerald-700 mt-2 space-y-1 text-left pl-2">
                  <li>• 5년+ 운영</li>
                  <li>• 팀 규모 5명+</li>
                  <li>• 보안/트랜잭션 핵심</li>
                  <li>• Java 팀 보유</li>
                </ul>
              </div>
              <div className="bg-sky-50 p-3 rounded-lg border border-sky-200 text-center">
                <div className="font-bold text-sky-800 text-sm">다른 선택 ✓</div>
                <ul className="text-xs text-sky-700 mt-2 space-y-1 text-left pl-2">
                  <li>• 수개월 운영</li>
                  <li>• 1~2명 팀</li>
                  <li>• 빠른 프로토타입</li>
                  <li>• 간단한 API</li>
                </ul>
              </div>
            </div>
          </div>
        );
      }

      // motivation
      return (
        <div className="text-center space-y-4">
          <div className="bg-emerald-50 p-6 rounded-xl border border-emerald-200">
            <div className="text-3xl mb-2">🎯</div>
            <div className="text-lg font-bold text-emerald-800">"왜" 배우는지 알면 학습 동기가 유지된다</div>
            <div className="text-sm text-emerald-600 mt-2">기업 환경에서 가장 수요가 높은 기술을 익히는 중이다</div>
          </div>
          <div className="text-sm text-slate-500">
            이 커리큘럼은 Part III부터 직접 코드를 작성하며 Spring Boot를 익힌다.<br/>
            Part I~II에서 "왜"를 이해했으니, 이제 "어떻게"로 넘어갈 차례다.
          </div>
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <div className="flex justify-between items-center text-sm">
              <a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a>
              <span className="text-slate-400">Chapter II-3-2</span>
            </div>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div>
                <h1 className="text-2xl font-bold">언제 Spring Boot를 선택하나</h1>
                <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">★☆☆</span>
              </div>
              <p className="text-slate-600">프로젝트 규모·기간·보안 요구에 따라 <b>Spring Boot가 적합한지</b> 판단하는 기준을 체험합니다.</p>
            </header>
            <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[280px] flex items-center justify-center">
              <div className="w-full"><DecisionMatrix phase={stepData.phase} /></div>
            </div>
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length} — {stepData.label}</div>
            </div>
            <div className="flex justify-center gap-2">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                  className={`w-3 h-3 rounded-full transition-all ${i === currentStepIdx ? 'bg-green-700 scale-125' : 'bg-slate-300 hover:bg-slate-400'}`} />
              ))}
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
