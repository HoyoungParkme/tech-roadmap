<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter VI-1-1 — 요구사항에서 엔티티 설계까지</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'req', label:'① 요구사항 → 관계', desc:'[STEP 1] "사용자는 게시글을 여러 개 쓸 수 있다" → User와 Post 사이에 @OneToMany/@ManyToOne 관계. 요구사항 문장을 JPA 관계로 변환하는 것이 엔티티 설계의 핵심이다.', p:'req' },
      { id:'relation', label:'② @OneToMany/@ManyToOne', desc:'[STEP 2] User: @OneToMany(mappedBy="user") List<Post> posts. Post: @ManyToOne @JoinColumn(name="user_id") User user. FK를 가진 쪽(@ManyToOne)이 연관관계 주인이다.', p:'relation' },
      { id:'base', label:'③ BaseEntity (공통 필드)', desc:'[STEP 3] 모든 테이블에 createdAt, updatedAt를 추가하는 것이 운영 관례. @MappedSuperclass에 두 필드를 모아두고 @EntityListeners(AuditingEntityListener.class)로 자동 채운다.', p:'base' },
      { id:'code', label:'④ 코드 예시', desc:'[STEP 4] BaseEntity를 상속하면 createdAt/updatedAt가 자동으로 물려받아진다. 메인 클래스에 @EnableJpaAuditing을 추가해야 이 기능이 활성화된다.', p:'code' },
      { id:'why', label:'⑤ 왜 중요한가', desc:'[STEP 5] 잘못된 연관관계 설계가 N+1 쿼리 같은 성능 문제로 이어진다. 도메인 관계와 공통 필드를 명확히 잡아야 이후 API 구현과 테스트가 흔들리지 않는다.', p:'why' },
    ];
    function V({ p }) {
      if (p==='req') return (
        <div className="max-w-md mx-auto space-y-3">
          <div className="bg-amber-50 p-3 rounded-lg border border-amber-200 text-sm text-amber-800">"사용자는 게시글을 <b>여러 개</b> 쓸 수 있다"</div>
          <div className="flex justify-center"><svg width="16" height="20" viewBox="0 0 24 28" fill="none" stroke="#10b981" strokeWidth="2"><path d="M12 4v20M6 18l6 6 6-6"/></svg></div>
          <div className="flex items-center justify-center gap-4">
            <div className="bg-sky-50 p-3 rounded-xl border border-sky-200 text-center"><div className="text-xl">👤</div><div className="font-bold text-sm text-sky-800">User</div><div className="text-xs text-sky-600">1</div></div>
            <div className="text-emerald-600 font-bold">→ N</div>
            <div className="bg-violet-50 p-3 rounded-xl border border-violet-200 text-center"><div className="text-xl">📝</div><div className="font-bold text-sm text-violet-800">Post</div><div className="text-xs text-violet-600">N개</div></div>
          </div>
        </div>
      );
      if (p==='relation') return (
        <div className="max-w-lg mx-auto grid grid-cols-2 gap-3">
          <div className="bg-sky-50 p-3 rounded-xl border border-sky-200"><div className="font-bold text-sm text-sky-800 mb-1">User (1쪽)</div>
            <div className="bg-slate-900 p-2 rounded text-xs font-mono text-slate-300"><div><span className="text-yellow-300">@OneToMany</span>(mappedBy=<span className="text-emerald-400">"user"</span>)</div><div>List&lt;Post&gt; posts;</div></div>
          </div>
          <div className="bg-violet-50 p-3 rounded-xl border-2 border-violet-400"><div className="font-bold text-sm text-violet-800 mb-1">Post (N쪽 = 주인)</div>
            <div className="bg-slate-900 p-2 rounded text-xs font-mono text-slate-300"><div><span className="text-yellow-300">@ManyToOne</span></div><div><span className="text-yellow-300">@JoinColumn</span>(name=<span className="text-emerald-400">"user_id"</span>)</div><div>User user;</div></div>
            <div className="text-xs text-violet-600 mt-1">FK를 가진 쪽 = 연관관계 주인</div>
          </div>
        </div>
      );
      if (p==='base') return (
        <div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300">
          <div><span className="text-yellow-300">@MappedSuperclass</span></div>
          <div><span className="text-yellow-300">@EntityListeners</span>(AuditingEntityListener.<span className="text-pink-400">class</span>)</div>
          <div><span className="text-pink-400">public abstract class</span> <span className="text-cyan-400">BaseEntity</span> {'{'}</div>
          <div>{'    '}<span className="text-yellow-300">@CreatedDate</span></div>
          <div>{'    '}<span className="text-pink-400">private</span> LocalDateTime createdAt;</div>
          <div>{'    '}<span className="text-yellow-300">@LastModifiedDate</span></div>
          <div>{'    '}<span className="text-pink-400">private</span> LocalDateTime updatedAt;</div>
          <div>{'}'}</div>
        </div>
      );
      if (p==='code') return (
        <div className="max-w-md mx-auto space-y-3">
          <div className="bg-slate-900 p-3 rounded-xl text-xs font-mono text-slate-300">
            <div><span className="text-yellow-300">@Entity</span></div>
            <div><span className="text-pink-400">public class</span> <span className="text-cyan-400">User</span> <span className="text-pink-400">extends</span> <span className="text-cyan-400">BaseEntity</span> {'{'}</div>
            <div>{'    '}<span className="text-slate-500">// createdAt, updatedAt 자동 상속</span></div>
            <div>{'    '}<span className="text-yellow-300">@Id</span> <span className="text-yellow-300">@GeneratedValue</span></div>
            <div>{'    '}<span className="text-pink-400">private</span> Long id;</div>
            <div>{'    '}<span className="text-pink-400">private</span> String name;</div>
            <div>{'}'}</div>
          </div>
          <div className="bg-amber-50 p-2 rounded-lg border border-amber-200 text-xs text-amber-700 text-center">메인 클래스에 <b>@EnableJpaAuditing</b> 필수</div>
        </div>
      );
      return (<div className="max-w-md mx-auto bg-slate-800 p-5 rounded-xl text-center"><div className="text-emerald-400 font-bold text-lg mb-2">잘못된 연관관계 = N+1 성능 문제</div><div className="text-slate-400 text-sm">도메인 관계를 먼저 잡아야 API와 테스트가 안정된다</div></div>);
    }
    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter VI-1-1</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">요구사항에서 엔티티 설계까지</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600">요구사항 문장을 <b>JPA Entity 관계(@OneToMany)</b>로 변환하고 BaseEntity로 공통 필드를 관리합니다.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[260px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
