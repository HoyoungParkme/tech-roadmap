        desc: '명사와 관계가 정해지면 ERD로 그린다. 박스(테이블) 4개 + 중간 테이블(post_tag) 1개. 박스 안에는 컬럼과 PK/FK 표시, 박스 사이에는 1:N/N:M 선을 그린다. 이 ERD가 곧 @JoinColumn(name="...")의 컬럼명이 된다.',
        view: 'erd',
        keyPoint: 'N:M 관계는 중간 테이블(post_tag)로 풀어 1:N + N:1 두 개로 만든다.',
        erd: [
          { name: 'users', color: 'sky', fields: [
            { c: 'id', t: 'BIGINT', mark: 'PK' },
            { c: 'email', t: 'VARCHAR', mark: 'UQ' },
            { c: 'password', t: 'VARCHAR' },
            { c: 'created_at', t: 'TIMESTAMP' },
            { c: 'updated_at', t: 'TIMESTAMP' },
          ]},
          { name: 'posts', color: 'lime', fields: [
            { c: 'id', t: 'BIGINT', mark: 'PK' },
            { c: 'title', t: 'VARCHAR' },
            { c: 'content', t: 'TEXT' },
            { c: 'user_id', t: 'BIGINT', mark: 'FK→users' },
            { c: 'created_at', t: 'TIMESTAMP' },
          ]},
          { name: 'comments', color: 'amber', fields: [
            { c: 'id', t: 'BIGINT', mark: 'PK' },
            { c: 'content', t: 'VARCHAR' },
            { c: 'post_id', t: 'BIGINT', mark: 'FK→posts' },
            { c: 'user_id', t: 'BIGINT', mark: 'FK→users' },
          ]},
          { name: 'tags', color: 'rose', fields: [
            { c: 'id', t: 'BIGINT', mark: 'PK' },
            { c: 'name', t: 'VARCHAR', mark: 'UQ' },
          ]},
          { name: 'post_tag', color: 'violet', fields: [
            { c: 'post_id', t: 'BIGINT', mark: 'PK,FK' },
            { c: 'tag_id', t: 'BIGINT', mark: 'PK,FK' },
          ]},
        ],
        edges: [
          { from: 'users', to: 'posts', card: '1 : N' },
          { from: 'users', to: 'comments', card: '1 : N' },
          { from: 'posts', to: 'comments', card: '1 : N' },
          { from: 'posts', to: 'post_tag', card: '1 : N' },
          { from: 'tags', to: 'post_tag', card: '1 : N' },
        ],
      },
      {
        title: 'Step 5. @Entity 클래스 작성',
        desc: 'ERD를 자바 코드로 옮긴다. 테이블 = @Entity, PK = @Id, FK = @ManyToOne + @JoinColumn. 모든 엔티티에 들어가는 createdAt/updatedAt는 BaseEntity로 모아 @MappedSuperclass로 상속시킨다. 이 단계에서 이미 ORM 매핑은 끝났다.',
        view: 'entity',
        keyPoint: '@ManyToOne의 기본 fetch는 EAGER. 반드시 LAZY로 바꿔야 N+1을 막을 수 있다.',
        entityPreview: [
          { line: '@Entity @Getter @Table(name = "posts")', kind: 'anno' },
          { line: 'public class Post extends BaseEntity {', kind: 'sig' },
          { line: '  @Id @GeneratedValue(IDENTITY)', kind: 'anno' },
          { line: '  private Long id;', kind: 'field' },
          { line: '  @Column(length = 200) private String title;', kind: 'field' },
          { line: '  @Lob private String content;', kind: 'field' },
          { line: '  @ManyToOne(fetch = LAZY)', kind: 'anno' },
          { line: '  @JoinColumn(name = "user_id")', kind: 'anno' },
          { line: '  private User author;', kind: 'field' },
          { line: '  @ManyToMany @JoinTable(name = "post_tag", ...)', kind: 'anno' },
          { line: '  private List<Tag> tags;', kind: 'field' },
          { line: '}', kind: 'sig' },
        ],
      },
    ];

    // ─────────────────────────────────────────────────────
    // RequirementsView — Step 1
    //   요구사항 문장을 토큰 단위로 색칠
    //     noun  → lime
    //     verb  → amber
    //     card  → rose (카디널리티 키워드)
    //     plain → slate
    // ─────────────────────────────────────────────────────
    function RequirementsView({ sentences }) {
      const kindStyle = {
        noun:  'bg-lime-100 text-lime-800 border border-lime-300 rounded px-1 font-bold',
        verb:  'bg-amber-100 text-amber-800 border border-amber-300 rounded px-1 italic',
        card:  'bg-rose-100 text-rose-800 border border-rose-300 rounded px-1 font-bold',
        plain: 'text-slate-700',
      };
      return (
        <div className="space-y-2">
          <div className="bg-lime-50 border-l-4 border-lime-400 px-3 py-1.5 rounded-r">
            <div className="text-[9px] font-bold text-lime-700 uppercase tracking-wider">요구사항 원문</div>
          </div>
          {sentences.map((s, i) => (
            <div key={i} className="bg-white border-2 border-slate-200 rounded-lg p-3 text-sm leading-relaxed">
              <span className="text-[9px] text-slate-400 font-mono mr-2 align-top">#{i + 1}</span>
              {s.tokens.map((tok, j) => (
                <span key={j} className={kindStyle[tok.kind]}>{tok.t}</span>
              ))}
            </div>
          ))}
          <div className="flex flex-wrap gap-2 text-[10px] pt-1">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-lime-300"></span>명사 (엔티티 후보)</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-amber-300"></span>동사 (관계 후보)</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-rose-300"></span>카디널리티 키워드</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // NounsView — Step 2
    //   명사 박스를 4분류로 표시
    //     entity → lime,    attr → slate,
    //     fk     → violet,  common → amber
    // ─────────────────────────────────────────────────────
    function NounsView({ nouns }) {
      const kindStyle = {
        entity: { bg: 'bg-lime-100',   text: 'text-lime-900',   border: 'border-lime-400',   tag: 'ENTITY' },
        attr:   { bg: 'bg-slate-100',  text: 'text-slate-700',  border: 'border-slate-300',  tag: 'ATTR' },
        fk:     { bg: 'bg-violet-100', text: 'text-violet-800', border: 'border-violet-300', tag: 'FK' },
        common: { bg: 'bg-amber-100',  text: 'text-amber-800',  border: 'border-amber-300',  tag: 'COMMON' },
      };
      return (
        <div className="space-y-3">
          <div className="bg-lime-50 border-l-4 border-lime-400 px-3 py-1.5 rounded-r">
            <div className="text-[9px] font-bold text-lime-700 uppercase tracking-wider">추출된 명사 → 분류</div>
          </div>
          <div className="grid grid-cols-2 gap-2">
            {nouns.map((n) => {
              const c = kindStyle[n.kind];
              return (
                <div key={n.word} className={`${c.bg} ${c.border} border-2 rounded-lg p-2 flex flex-col`}>
                  <div className="flex items-center justify-between mb-0.5">
                    <span className={`${c.text} font-bold text-sm`}>{n.word}</span>
                    <span className={`text-[8px] px-1.5 py-0.5 rounded bg-white/70 ${c.text} font-bold tracking-wide border ${c.border}`}>{c.tag}</span>
                  </div>
                  <span className={`text-[10px] ${c.text} opacity-80`}>{n.reason}</span>
                </div>
              );
            })}
          </div>
          <div className="bg-lime-50 border-2 border-lime-300 rounded-lg p-2.5">
            <div className="text-[10px] font-bold text-lime-700 uppercase mb-1">결과 — 4개의 엔티티 확정</div>
            <div className="flex flex-wrap gap-1.5">
              {nouns.filter(n => n.kind === 'entity').map(n => (
                <span key={n.word} className="bg-white px-2 py-0.5 rounded border border-lime-400 text-lime-800 font-mono text-xs font-bold">
                  {n.word.split(' ')[1] || n.word}
                </span>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // RelationsView — Step 3
    //   동사 → 관계 표
    // ─────────────────────────────────────────────────────
    function RelationsView({ relations }) {
      return (
        <div className="space-y-2">
          <div className="bg-lime-50 border-l-4 border-lime-400 px-3 py-1.5 rounded-r">
            <div className="text-[9px] font-bold text-lime-700 uppercase tracking-wider">동사 → 카디널리티 → JPA 어노테이션</div>
          </div>
          {relations.map((r, i) => (
            <div key={i} className="bg-white border-2 border-slate-200 rounded-lg p-2.5">
              <div className="flex items-center gap-2 mb-1.5">
                <span className="bg-lime-100 text-lime-800 border border-lime-300 rounded px-2 py-0.5 font-bold text-xs">{r.from}</span>
                <span className="bg-amber-100 text-amber-800 border border-amber-300 rounded px-1.5 py-0.5 italic text-xs">{r.verb}</span>
                <span className="text-slate-400 text-xs">→</span>
                <span className="bg-lime-100 text-lime-800 border border-lime-300 rounded px-2 py-0.5 font-bold text-xs">{r.to}</span>
                <span className="ml-auto bg-rose-100 text-rose-800 border border-rose-300 rounded px-2 py-0.5 font-bold text-[10px] font-mono">{r.card}</span>
              </div>
              <div className="bg-slate-900 rounded px-2 py-1 text-[10px] font-mono text-emerald-300">
                {r.anno}
              </div>
            </div>
          ))}
          <div className="bg-amber-50 border border-amber-200 rounded-lg p-2 text-[11px] text-amber-800">
            <b>주인 결정:</b> FK 컬럼을 가진 N쪽 = @ManyToOne = 연관관계 주인. 양방향이면 1쪽에 mappedBy.
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // ErdView — Step 4
    //   박스 + 컬럼 표 + 관계 라인
    // ─────────────────────────────────────────────────────
    function ErdView({ erd, edges }) {
      const colorMap = {
        sky:    { bg: 'bg-sky-50',    border: 'border-sky-400',    head: 'bg-sky-100 text-sky-800' },
        lime:   { bg: 'bg-lime-50',   border: 'border-lime-400',   head: 'bg-lime-100 text-lime-800' },
        amber:  { bg: 'bg-amber-50',  border: 'border-amber-400',  head: 'bg-amber-100 text-amber-800' },
        rose:   { bg: 'bg-rose-50',   border: 'border-rose-400',   head: 'bg-rose-100 text-rose-800' },
        violet: { bg: 'bg-violet-50', border: 'border-violet-400', head: 'bg-violet-100 text-violet-800' },
      };
      return (
        <div className="space-y-2">
          <div className="bg-lime-50 border-l-4 border-lime-400 px-3 py-1.5 rounded-r">
            <div className="text-[9px] font-bold text-lime-700 uppercase tracking-wider">ERD — 5 tables</div>
          </div>
          <div className="grid grid-cols-2 gap-2">
            {erd.map((tbl) => {
              const c = colorMap[tbl.color];
              return (
                <div key={tbl.name} className={`${c.bg} ${c.border} border-2 rounded-lg overflow-hidden`}>
                  <div className={`${c.head} px-2 py-1 text-[11px] font-bold font-mono`}>📋 {tbl.name}</div>
                  <div className="p-1.5 space-y-0.5">
                    {tbl.fields.map((f) => (
                      <div key={f.c} className="flex items-center gap-1 text-[10px] font-mono">
                        <span className="text-slate-700 flex-1">{f.c}</span>
                        <span className="text-slate-400">{f.t}</span>
                        {f.mark && (
                          <span className={`text-[8px] px-1 py-0.5 rounded font-bold ${
                            f.mark.startsWith('PK') ? 'bg-yellow-200 text-yellow-800' :
                            f.mark.startsWith('FK') ? 'bg-violet-200 text-violet-800' :
                            'bg-emerald-200 text-emerald-800'
                          }`}>{f.mark}</span>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
          <div className="bg-white border border-slate-200 rounded-lg p-2 space-y-0.5">
            <div className="text-[9px] font-bold text-slate-500 uppercase mb-1">관계선</div>
            {edges.map((e, i) => (
              <div key={i} className="flex items-center gap-1.5 text-[10px] font-mono">
                <span className="text-lime-700 font-bold">{e.from}</span>
                <span className="text-slate-400">───</span>
                <span className="text-rose-600 font-bold text-[9px] bg-rose-50 px-1 rounded border border-rose-200">{e.card}</span>
                <span className="text-slate-400">───</span>
                <span className="text-lime-700 font-bold">{e.to}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // EntityView — Step 5
    //   @Entity 미리보기 (요약 코드)
    // ─────────────────────────────────────────────────────
    function EntityView({ preview }) {
      const kindStyle = {
        anno:  'text-amber-300',
        sig:   'text-pink-400',
        field: 'text-slate-200',
      };
      return (
        <div className="space-y-2">
          <div className="bg-lime-50 border-l-4 border-lime-400 px-3 py-1.5 rounded-r">
            <div className="text-[9px] font-bold text-lime-700 uppercase tracking-wider">@Entity Post 미리보기</div>
          </div>
          <div className="bg-slate-900 rounded-lg p-3 font-mono text-[11px] leading-relaxed">
            {preview.map((p, i) => (
              <div key={i} className={kindStyle[p.kind]}>
                {p.line}
              </div>
            ))}
          </div>
          <div className="grid grid-cols-3 gap-1.5 text-[10px]">
            <div className="bg-amber-50 border border-amber-200 rounded p-1.5">
              <div className="font-bold text-amber-800">@Entity</div>
              <div className="text-amber-700">테이블 매핑</div>
            </div>
            <div className="bg-violet-50 border border-violet-200 rounded p-1.5">
              <div className="font-bold text-violet-800">@ManyToOne</div>
              <div className="text-violet-700">FK 보유 = 주인</div>
            </div>
            <div className="bg-lime-50 border border-lime-200 rounded p-1.5">
              <div className="font-bold text-lime-800">BaseEntity</div>
              <div className="text-lime-700">공통 필드 상속</div>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    //   상단: 단계 진행 표시 (1→2→3→4→5 중 현재 어디?)
    //   본문: step.view 별 다른 컴포넌트
    //   하단: 핵심 포인트 박스
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step, stepIdx }) {
      const stages = ['요구사항', '명사', '관계', 'ERD', '@Entity'];
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📐 요구사항 → @Entity 변환 파이프라인</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 단계 진행 표시 */}
          <div className="flex items-center justify-between mb-4 px-1">
            {stages.map((s, i) => (
              <React.Fragment key={s}>
                <div className={`flex flex-col items-center ${i === stepIdx ? '' : 'opacity-40'}`}>
                  <div className={`w-7 h-7 rounded-full flex items-center justify-center text-[11px] font-bold border-2 ${
                    i === stepIdx
                      ? 'bg-lime-500 border-lime-600 text-white shadow-md'
                      : i < stepIdx
                      ? 'bg-lime-100 border-lime-300 text-lime-700'
                      : 'bg-slate-100 border-slate-300 text-slate-500'
                  }`}>
                    {i + 1}
                  </div>
                  <span className={`text-[9px] mt-1 font-medium ${i === stepIdx ? 'text-lime-700 font-bold' : 'text-slate-500'}`}>{s}</span>
                </div>
                {i < stages.length - 1 && (
                  <div className={`flex-1 h-0.5 mx-1 ${i < stepIdx ? 'bg-lime-400' : 'bg-slate-200'}`}></div>
                )}
              </React.Fragment>
            ))}
          </div>

          {/* 본문 — view 별 분기 */}
          <div>
            {step.view === 'requirements' && <RequirementsView sentences={step.sentences} />}
            {step.view === 'nouns'        && <NounsView        nouns={step.nouns} />}
            {step.view === 'relations'    && <RelationsView    relations={step.relations} />}
            {step.view === 'erd'          && <ErdView          erd={step.erd} edges={step.edges} />}
            {step.view === 'entity'       && <EntityView       preview={step.entityPreview} />}
          </div>

          {/* 핵심 포인트 박스 */}
          <div className="mt-3 bg-lime-50 border-l-4 border-lime-400 px-3 py-2 rounded-r">
            <div className="text-[9px] font-bold text-lime-700 uppercase tracking-wider mb-0.5">핵심 포인트</div>
            <p className="text-[11px] text-lime-900 leading-snug">{step.keyPoint}</p>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   5 tabs: requirements.md / nouns.md / relations.md / erd.md / entity.java
    //   Step 진행 시 자동으로 해당 tab으로 전환되지만, 사용자가 클릭으로
    //   언제든 다른 탭을 볼 수 있다.
    // ─────────────────────────────────────────────────────
    function CodeViewer({ tabs, activeIdx, onChangeTab, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);
      const tab = tabs[activeIdx];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${tab.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [activeIdx, tab]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{tab.lang}</span>
          </div>

          {/* 5탭 */}
          <div className="bg-[#21252b] flex border-b border-slate-700 overflow-x-auto">
            {tabs.map((t, i) => (
              <button
                key={t.filename}
                onClick={() => onChangeTab(i)}
                className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                  i === activeIdx
                    ? 'bg-[#282c34] text-lime-300 border-t-2 border-t-lime-400'
                    : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800'
                }`}
              >
                {t.filename}
              </button>
            ))}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${tab.lang}`}>{tab.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || tab.lines).map((lineHtml, i) => {
                  const highlighted = tab.highlight && tab.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-lime-500/15 border-l-2 border-lime-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{tab.lines.length} lines · {tab.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    //   - Step 변경 시 우측 코드 탭도 자동으로 함께 이동
    //   - 사용자가 직접 탭 클릭 시 그 탭으로 즉시 전환
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [tabIdx, setTabIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      // Step 변경 시 같은 인덱스의 탭으로 자동 이동
      useEffect(() => {
        setTabIdx(stepIdx);
      }, [stepIdx]);

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; 목차로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter VI-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-lime-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. JPA 실무 &gt; Chapter 1. 엔티티 설계</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VI-1-1. 요구사항에서 엔티티 설계까지</h1>
                  <p className="text-sm text-slate-500 mt-0.5">자연어 요구사항 → 명사 → 관계 → ERD → @Entity 5단 변환</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer
                tabs={CODE_TABS}
                activeIdx={tabIdx}
                onChangeTab={setTabIdx}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-300 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: 엔티티 설계는 <strong>"문장 → 명사 → 관계 → ERD → @Entity"</strong> 5단 파이프라인이다. 카디널리티 키워드(여러/한 명/N개)가 곧 <strong>@OneToMany/@ManyToOne</strong>이 되고, FK를 가진 N쪽이 <strong>연관관계 주인</strong>이다. 다음(VI-1-2)에서는 이 엔티티들로 Repository 패턴을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['요구사항분석', '명사추출', '카디널리티', '@OneToMany', '@ManyToOne', '@JoinColumn', 'BaseEntity', 'ERD'].map((kw) => (
                <span key={kw} className="bg-lime-50 text-lime-700 px-3 py-1 rounded-full text-xs font-medium border border-lime-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-05-04-summary.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; V-4 요약</a>
              <a href="./chapter-06-02-repository.html" className="text-lime-700 hover:text-lime-900 font-medium">VI-1-2 Repository &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
