<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter VII-1-1 — Executable JAR 생성과 실행</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'jar', label:'① JAR란', desc:'[STEP 1] Spring Boot의 큰 장점 = 모든 의존성 + 내장 Tomcat이 포함된 단일 JAR 파일로 패키징. 이 파일 하나를 서버에 복사해 java -jar만 실행하면 서버가 뜬다.', p:'jar' },
      { id:'build', label:'② bootJar 빌드', desc:'[STEP 2] ./gradlew bootJar 실행하면 build/libs/app.jar 파일이 생긴다. Gradle이 컴파일 → 테스트 → 패키징을 한 번에 처리한다.', p:'build' },
      { id:'run', label:'③ java -jar 실행', desc:'[STEP 3] java -jar app.jar 한 줄로 서버 시작. 환경에 따라 다른 설정을 적용하려면 --spring.profiles.active=prod 옵션을 붙이거나 환경변수로 주입한다.', p:'run' },
      { id:'profiles', label:'④ Spring Profiles', desc:'[STEP 4] application-dev.properties(개발), application-prod.properties(운영) 파일을 분리하고, 실행 시 프로파일을 지정하면 해당 설정이 자동 적용된다.', p:'profiles' },
      { id:'why', label:'⑤ CI/CD의 출발점', desc:'[STEP 5] JAR + 프로파일 분리가 CI/CD 파이프라인의 출발점이다. 빌드 서버에서 bootJar → 테스트 → JAR 배포가 자동화되는 구조의 기반이 된다.', p:'why' },
    ];
    function V({ p }) {
      if (p==='jar') return (
        <div className="max-w-md mx-auto flex items-center justify-center gap-4 flex-wrap">
          <div className="bg-sky-50 p-3 rounded-xl border border-sky-200 text-center text-xs"><div>소스코드</div><div>의존성</div><div>Tomcat</div></div>
          <div className="text-slate-400">→</div>
          <div className="bg-emerald-50 p-5 rounded-xl border-2 border-emerald-400 ring-2 ring-emerald-300 shadow-lg text-center"><div className="text-3xl mb-1">📦</div><div className="font-bold text-emerald-800">app.jar</div><div className="text-xs text-emerald-600">하나의 파일에 모두 포함</div></div>
          <div className="text-slate-400">→</div>
          <div className="bg-amber-50 p-3 rounded-xl border border-amber-200 text-center text-xs"><div className="text-lg mb-1">🖥️</div><div>서버에 복사</div><div>java -jar 실행</div></div>
        </div>
      );
      if (p==='build') return (
        <div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-sm font-mono">
          <div className="text-emerald-400">$ ./gradlew bootJar</div>
          <div className="text-slate-500 mt-2">BUILD SUCCESSFUL in 8s</div>
          <div className="text-slate-300 mt-1">build/libs/<span className="text-amber-400 font-bold">demo-0.0.1-SNAPSHOT.jar</span></div>
          <div className="text-slate-500 mt-1">// 약 30~50MB (Tomcat + 의존성 포함)</div>
        </div>
      );
      if (p==='run') return (
        <div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-sm font-mono">
          <div className="text-emerald-400">$ java -jar app.jar</div>
          <div className="text-sky-400 mt-2">:: Spring Boot :: (v3.3.x)</div>
          <div className="text-slate-300 mt-1">Started in <span className="text-emerald-400">2.3</span> seconds</div>
          <div className="text-slate-300">Tomcat on port <span className="text-amber-400">8080</span></div>
          <div className="text-slate-500 mt-2">// 프로파일 지정:</div>
          <div className="text-emerald-400">$ java -jar app.jar --spring.profiles.active=<span className="text-amber-400">prod</span></div>
        </div>
      );
      if (p==='profiles') return (
        <div className="max-w-md mx-auto space-y-2">
          {[
            { env:'dev', file:'application-dev.properties', settings:'H2 DB · 로그 DEBUG', color:'sky' },
            { env:'prod', file:'application-prod.properties', settings:'MySQL DB · 로그 INFO', color:'rose' },
          ].map(e => (
            <div key={e.env} className={`flex items-center gap-3 p-3 rounded-lg bg-${e.color}-50 border border-${e.color}-200`}>
              <span className={`text-xs font-bold bg-${e.color}-200 text-${e.color}-800 px-2 py-1 rounded`}>{e.env}</span>
              <div className="flex-1"><div className="font-mono text-xs">{e.file}</div><div className="text-xs text-slate-500">{e.settings}</div></div>
            </div>
          ))}
        </div>
      );
      return (<div className="max-w-md mx-auto bg-slate-800 p-5 rounded-xl text-center"><div className="text-emerald-400 font-bold text-lg mb-2">JAR + 프로파일 = CI/CD의 출발점</div><div className="text-slate-400 text-sm">빌드 → 테스트 → 배포 자동화의 기반</div></div>);
    }
    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter VII-1-1</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">Executable JAR 생성과 실행</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600"><b>bootJar → java -jar → Spring Profiles</b>로 서버를 패키징하고 실행합니다.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[240px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
