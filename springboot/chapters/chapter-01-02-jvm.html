<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter I-1-2 — JVM(Java Virtual Machine)이란</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    Chapter I-1-2 — JVM이란
    Java 코드 → 바이트코드 → JVM → 기계어 변환 파이프라인 시각화
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        id: 'source',
        label: '① Java 코드 작성',
        desc: '[STEP 1 — 소스 코드] 개발자가 Java 언어로 코드를 작성한다. 이 코드는 사람이 읽을 수 있는 텍스트 파일(.java)이다. 컴퓨터는 이 상태의 코드를 바로 이해하지 못한다.',
        activePhase: 'source',
      },
      {
        id: 'compile',
        label: '② 컴파일 (javac)',
        desc: '[STEP 2 — 컴파일] javac(Java Compiler)가 .java 파일을 바이트코드(Bytecode)로 번역한다. 바이트코드는 사람 말을 컴퓨터가 이해할 수 있는 중간 형태로 번역한 것이다. 결과물은 .class 파일에 저장된다.',
        activePhase: 'compile',
      },
      {
        id: 'bytecode',
        label: '③ 바이트코드 (.class)',
        desc: '[STEP 3 — 중간 형태] 바이트코드는 특정 운영체제에 종속되지 않는 "공용 레시피"다. 어떤 OS의 JVM이든 이 바이트코드를 읽을 수 있다. 이것이 "Write Once, Run Anywhere"를 가능하게 하는 핵심이다.',
        activePhase: 'bytecode',
      },
      {
        id: 'jvm',
        label: '④ JVM 실행',
        desc: '[STEP 4 — JVM] JVM(Java Virtual Machine)이 바이트코드를 읽어서 현재 운영체제에 맞는 기계어(0과 1)로 변환해 실행한다. Windows용 JVM, Linux용 JVM, macOS용 JVM이 각각 있어서, 같은 바이트코드가 어디서든 돌아간다.',
        activePhase: 'jvm',
      },
      {
        id: 'extra',
        label: '⑤ JVM의 추가 역할',
        desc: '[STEP 5 — 부가 기능] JVM은 번역 외에도 메모리 관리, 가비지 컬렉션(더 이상 쓰지 않는 데이터를 자동 청소), 보안 검사를 담당한다. Java 프로그램이 안전하고 안정적으로 실행되는 환경 전체를 JVM이 책임진다.',
        activePhase: 'extra',
      }
    ];

    const PIPELINE = [
      { id: 'source', icon: '📝', label: 'Hello.java', sub: '사람이 읽는 코드' },
      { id: 'compile', icon: '⚙️', label: 'javac', sub: '컴파일러 (번역기)' },
      { id: 'bytecode', icon: '📦', label: 'Hello.class', sub: '바이트코드 (공용 레시피)' },
      { id: 'jvm', icon: '🖥️', label: 'JVM', sub: '가상 머신 (현지 요리사)' },
      { id: 'machine', icon: '💻', label: '기계어 실행', sub: '0과 1 → 화면 출력' },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); }
      };

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3500);
        } else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      // 파이프라인에서 현재 활성화된 위치 계산
      const getActiveIndex = () => {
        const map = { source: 0, compile: 1, bytecode: 2, jvm: 3, extra: 3 };
        return map[stepData.activePhase] ?? -1;
      };
      const activeIdx = getActiveIndex();

      // JVM 추가 역할 표시 여부
      const showExtra = stepData.activePhase === 'extra';

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">

            <div className="flex justify-between items-center text-sm">
              <a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a>
              <span className="text-slate-400">Chapter I-1-2</span>
            </div>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div>
                <h1 className="text-2xl font-bold text-slate-800">JVM(Java Virtual Machine)이란</h1>
                <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">★☆☆</span>
              </div>
              <p className="text-slate-600">
                Java 코드가 <b>.java → 바이트코드(.class) → JVM → 기계어</b>로 변환되어 실행되는 과정을 단계별로 체험합니다.
              </p>
            </header>

            <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 파이프라인 시각화 */}
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Java 실행 파이프라인</div>

              {/* 가로 파이프라인 (데스크톱) */}
              <div className="hidden md:flex items-center justify-between gap-1">
                {PIPELINE.map((node, idx) => (
                  <React.Fragment key={node.id}>
                    <div className={`flex-1 px-3 py-4 rounded-xl border-2 text-center transition-all duration-500 ${
                      idx <= activeIdx
                        ? 'bg-emerald-100 border-emerald-500 ring-2 ring-emerald-300 shadow-lg scale-105'
                        : 'bg-white border-slate-200'
                    }`}>
                      <div className="text-2xl mb-1">{node.icon}</div>
                      <div className="font-bold text-sm">{node.label}</div>
                      <div className="text-xs text-slate-500 mt-1">{node.sub}</div>
                    </div>
                    {idx < PIPELINE.length - 1 && (
                      <svg width="24" height="16" viewBox="0 0 24 16" fill="none" stroke={idx < activeIdx ? '#10b981' : '#94a3b8'} strokeWidth="2" className="shrink-0">
                        <path d="M0 8h20M16 3l4 5-4 5"/>
                      </svg>
                    )}
                  </React.Fragment>
                ))}
              </div>

              {/* 세로 파이프라인 (모바일) */}
              <div className="md:hidden flex flex-col items-center gap-1">
                {PIPELINE.map((node, idx) => (
                  <React.Fragment key={node.id}>
                    <div className={`w-full px-3 py-3 rounded-xl border-2 text-center transition-all duration-500 ${
                      idx <= activeIdx
                        ? 'bg-emerald-100 border-emerald-500 ring-2 ring-emerald-300 shadow-lg'
                        : 'bg-white border-slate-200'
                    }`}>
                      <span className="text-xl mr-2">{node.icon}</span>
                      <span className="font-bold text-sm">{node.label}</span>
                      <span className="text-xs text-slate-500 ml-2">{node.sub}</span>
                    </div>
                    {idx < PIPELINE.length - 1 && (
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={idx < activeIdx ? '#10b981' : '#94a3b8'} strokeWidth="2">
                        <path d="M12 5v14M5 12l7 7 7-7"/>
                      </svg>
                    )}
                  </React.Fragment>
                ))}
              </div>

              {/* JVM 추가 역할 패널 */}
              {showExtra && (
                <div className="mt-6 grid grid-cols-1 md:grid-cols-3 gap-3">
                  {[
                    { icon: '🧠', title: '메모리 관리', desc: '객체 생성·해제를 JVM이 관리' },
                    { icon: '🧹', title: '가비지 컬렉션', desc: '안 쓰는 데이터 자동 청소' },
                    { icon: '🔒', title: '보안 검사', desc: '위험한 코드 실행 차단' },
                  ].map((item, i) => (
                    <div key={i} className="bg-violet-50 p-3 rounded-lg border border-violet-200 text-center">
                      <div className="text-xl mb-1">{item.icon}</div>
                      <div className="font-semibold text-sm text-violet-800">{item.title}</div>
                      <div className="text-xs text-violet-600 mt-1">{item.desc}</div>
                    </div>
                  ))}
                </div>
              )}

              {/* 비유 요약 */}
              <div className="mt-4 bg-amber-50 p-3 rounded-lg border border-amber-200 text-sm text-amber-800">
                <span className="font-bold">🍳 비유:</span> Java 코드 = 레시피 원본 → 바이트코드 = 공용 레시피 → JVM = 현지 요리사 (각 주방에 맞게 해석)
              </div>
            </div>

            {/* 컨트롤 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length} — {stepData.label}
              </div>
            </div>

            <div className="flex justify-center gap-2">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                  className={`w-3 h-3 rounded-full transition-all ${i === currentStepIdx ? 'bg-green-700 scale-125' : 'bg-slate-300 hover:bg-slate-400'}`} />
              ))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
