<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter VI-3-1 — 단위 테스트 JUnit5와 Mockito</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'tools', label:'① JUnit5 + Mockito', desc:'[STEP 1] Spring Boot 테스트 표준 = JUnit5(테스트 프레임워크) + Mockito(가짜 객체 라이브러리). spring-boot-starter-test 의존성 하나에 둘 다 포함된다.', p:'tools' },
      { id:'mock', label:'② @Mock과 @InjectMocks', desc:'[STEP 2] @Mock으로 UserRepository를 가짜로 만든다. @InjectMocks로 가짜를 주입한 실제 UserService를 만든다. DB 없이 Service 로직만 검증하는 것이 단위 테스트다.', p:'mock' },
      { id:'given', label:'③ given-when-then 패턴', desc:'[STEP 3] given: when(repo.findById(1L)).thenReturn(user) — 가짜 동작 설정. when: userService.getOne(1L) — 테스트 대상 실행. then: assertThat(result.name()).isEqualTo("alice") — 결과 검증.', p:'given' },
      { id:'exception', label:'④ 예외 테스트', desc:'[STEP 4] when(repo.findById(99L)).thenReturn(Optional.empty()) → assertThatThrownBy(() -> service.getOne(99L)).isInstanceOf(UserNotFoundException.class). 예외가 올바르게 던져지는지 검증한다.', p:'exception' },
      { id:'why', label:'⑤ 왜 단위 테스트인가', desc:'[STEP 5] DB 없이 빠르게 비즈니스 로직 버그를 잡아야 CI(지속적 통합) 파이프라인 속도를 유지할 수 있다. 테스트가 느리면 개발자가 테스트를 건너뛰게 된다.', p:'why' },
    ];
    function V({ p }) {
      if (p==='tools') return (
        <div className="max-w-md mx-auto flex items-center justify-center gap-4 flex-wrap">
          <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-200 text-center"><div className="text-2xl mb-1">🧪</div><div className="font-bold text-sm text-emerald-800">JUnit5</div><div className="text-xs text-emerald-600">테스트 프레임워크</div></div>
          <div className="text-xl text-slate-400">+</div>
          <div className="bg-sky-50 p-4 rounded-xl border border-sky-200 text-center"><div className="text-2xl mb-1">🎭</div><div className="font-bold text-sm text-sky-800">Mockito</div><div className="text-xs text-sky-600">가짜 객체(Mock) 라이브러리</div></div>
          <div className="text-xl text-slate-400">=</div>
          <div className="bg-amber-50 p-4 rounded-xl border border-amber-200 text-center"><div className="text-2xl mb-1">📦</div><div className="font-bold text-sm text-amber-800">starter-test</div><div className="text-xs text-amber-600">하나에 모두 포함</div></div>
        </div>
      );
      if (p==='mock') return (
        <div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300">
          <div><span className="text-yellow-300">@ExtendWith</span>(MockitoExtension.<span className="text-pink-400">class</span>)</div>
          <div><span className="text-pink-400">class</span> <span className="text-cyan-400">UserServiceTest</span> {'{'}</div>
          <div className="mt-1">{'    '}<span className="text-yellow-300">@Mock</span> <span className="text-slate-500">// 가짜 Repository</span></div>
          <div>{'    '}UserRepository userRepository;</div>
          <div className="mt-1">{'    '}<span className="text-yellow-300">@InjectMocks</span> <span className="text-slate-500">// 가짜를 주입한 실제 Service</span></div>
          <div>{'    '}UserService userService;</div>
          <div>{'}'}</div>
        </div>
      );
      if (p==='given') return (
        <div className="max-w-md mx-auto space-y-2">
          {[
            { phase:'given', label:'Given — 가짜 동작 설정', code:'when(repo.findById(1L))\n  .thenReturn(Optional.of(user));', color:'sky' },
            { phase:'when', label:'When — 테스트 대상 실행', code:'UserResponse result =\n  userService.getOne(1L);', color:'amber' },
            { phase:'then', label:'Then — 결과 검증', code:'assertThat(result.name())\n  .isEqualTo("alice");', color:'emerald' },
          ].map(s => (
            <div key={s.phase} className={`p-3 rounded-xl bg-${s.color}-50 border border-${s.color}-200`}>
              <div className={`font-bold text-sm text-${s.color}-800 mb-1`}>{s.label}</div>
              <div className="bg-slate-900 p-2 rounded text-xs font-mono text-slate-300 whitespace-pre">{s.code}</div>
            </div>
          ))}
        </div>
      );
      if (p==='exception') return (
        <div className="max-w-md mx-auto bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300">
          <div><span className="text-yellow-300">@Test</span></div>
          <div><span className="text-pink-400">void</span> getOne_없는_사용자는_예외() {'{'}</div>
          <div>{'    '}<span className="text-slate-500">// given</span></div>
          <div>{'    '}when(repo.findById(99L))</div>
          <div>{'        '}.thenReturn(Optional.empty());</div>
          <div className="mt-1">{'    '}<span className="text-slate-500">// when & then</span></div>
          <div>{'    '}assertThatThrownBy(</div>
          <div>{'        '}() -&gt; service.getOne(99L))</div>
          <div>{'      '}.isInstanceOf(</div>
          <div>{'        '}<span className="text-rose-400">UserNotFoundException</span>.<span className="text-pink-400">class</span>);</div>
          <div>{'}'}</div>
        </div>
      );
      return (<div className="max-w-md mx-auto bg-slate-800 p-5 rounded-xl text-center"><div className="text-emerald-400 font-bold text-lg mb-2">DB 없이 빠른 버그 감지 = CI 속도 유지</div><div className="text-slate-400 text-sm">테스트가 느리면 개발자가 테스트를 건너뛴다</div></div>);
    }
    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter VI-3-1</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">단위 테스트 — JUnit5와 Mockito</h1><span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">★★★</span></div><p className="text-slate-600"><b>@Mock + @InjectMocks + given/when/then</b> 패턴으로 DB 없이 Service를 테스트합니다.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[260px] flex items-center justify-center"><div className="w-full"><V p={step.p}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
