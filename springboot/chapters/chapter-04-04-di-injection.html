<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter IV-2-1 — DI(의존성 주입)란</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { id:'analogy', label:'① 레고 비유', desc:'[STEP 1] 레고를 조립할 때 부품을 직접 공장에서 만들지 않는다. 이미 만들어진 블록을 받아서 끼워 맞출 뿐이다. DI(의존성 주입)도 같다 — "내가 쓸 객체를 직접 만들지 않고, 외부(Spring)에서 받아 쓴다."', phase:'analogy' },
      { id:'bad', label:'② 직접 생성 (강한 결합)', desc:'[STEP 2] new UserService()로 직접 생성하면 UserController가 UserService 구현체에 강하게 묶인다. UserService를 교체하려면 UserController 코드도 수정해야 한다.', phase:'bad' },
      { id:'good', label:'③ 생성자 주입 (느슨한 결합)', desc:'[STEP 3] 생성자로 주입받으면 UserController는 어떤 구현체가 오는지 알 필요가 없다. Spring이 알맞은 객체를 골라 넘겨준다. 교체해도 Controller 코드를 수정하지 않아도 된다.', phase:'good' },
      { id:'test', label:'④ 테스트 용이성', desc:'[STEP 4] 생성자 주입 방식에서는 테스트 코드에서 가짜 객체(Mock)를 직접 주입할 수 있어 DB 연결 없이도 단위 테스트가 가능하다. 이것이 DI의 가장 큰 실무적 이점이다.', phase:'test' },
      { id:'auto', label:'⑤ Spring Boot 자동 주입', desc:'[STEP 5] @Service 애노테이션 + 생성자가 하나뿐이면 @Autowired 없이도 자동 주입된다. DI를 이해하지 못하면 Spring의 거의 모든 기능(AOP, Security, Transaction)이 어떻게 동작하는지 파악할 수 없다.', phase:'auto' },
    ];

    const BAD_CODE = [
      '// 직접 생성 — 강한 결합',
      'public class UserController {',
      '  private UserService service',
      '    = new UserService();',
      '  // UserService를 교체하려면',
      '  // 이 코드도 수정해야 함',
      '}',
    ];
    const GOOD_CODE = [
      '// 생성자 주입 — 느슨한 결합',
      'public class UserController {',
      '  private final UserService service;',
      '',
      '  // Spring이 주입해줌',
      '  public UserController(',
      '      UserService service) {',
      '    this.service = service;',
      '  }',
      '}',
    ];

    function V({ phase }) {
      if (phase === 'analogy') return (
        <div className="flex items-center justify-center gap-4 flex-wrap">
          <div className="bg-rose-50 p-5 rounded-xl border border-rose-200 text-center">
            <div className="text-3xl mb-2">🏭</div>
            <div className="font-bold text-rose-800">직접 공장에서 생산</div>
            <div className="text-xs text-rose-600 mt-1">new 키워드로 직접 생성</div>
          </div>
          <div className="text-2xl text-slate-400">vs</div>
          <div className="bg-emerald-50 p-5 rounded-xl border-2 border-emerald-400 ring-2 ring-emerald-300 shadow-lg text-center">
            <div className="text-3xl mb-2">🧱</div>
            <div className="font-bold text-emerald-800">완성된 블록을 받아 조립</div>
            <div className="text-xs text-emerald-600 mt-1">Spring이 주입 = DI</div>
          </div>
        </div>
      );

      if (phase === 'bad' || phase === 'good') {
        const showBad = phase === 'bad';
        return (
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-2xl mx-auto">
            <div className={`rounded-xl border-2 overflow-hidden transition-all duration-500 ${showBad ? 'border-rose-400 ring-2 ring-rose-300 shadow-lg' : 'border-slate-200 opacity-50'}`}>
              <div className="bg-rose-50 px-3 py-2 text-xs font-bold text-rose-700 border-b border-rose-200">❌ 직접 생성 (강한 결합)</div>
              <div className="bg-slate-900 p-3 text-xs font-mono text-slate-300">{BAD_CODE.map((l,i)=><div key={i}>{l||'\u00A0'}</div>)}</div>
            </div>
            <div className={`rounded-xl border-2 overflow-hidden transition-all duration-500 ${!showBad ? 'border-emerald-400 ring-2 ring-emerald-300 shadow-lg' : 'border-slate-200 opacity-50'}`}>
              <div className="bg-emerald-50 px-3 py-2 text-xs font-bold text-emerald-700 border-b border-emerald-200">✅ 생성자 주입 (느슨한 결합)</div>
              <div className="bg-slate-900 p-3 text-xs font-mono text-slate-300">{GOOD_CODE.map((l,i)=><div key={i}>{l||'\u00A0'}</div>)}</div>
            </div>
          </div>
        );
      }

      if (phase === 'test') return (
        <div className="max-w-md mx-auto space-y-3">
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-rose-50 p-3 rounded-xl border border-rose-200 text-center">
              <div className="text-xl mb-1">🔗</div>
              <div className="font-bold text-sm text-rose-800">직접 생성</div>
              <div className="text-xs text-rose-600">테스트 시 실제 DB 필요</div>
            </div>
            <div className="bg-emerald-50 p-3 rounded-xl border-2 border-emerald-400 ring-2 ring-emerald-300 shadow text-center">
              <div className="text-xl mb-1">🧪</div>
              <div className="font-bold text-sm text-emerald-800">생성자 주입</div>
              <div className="text-xs text-emerald-600">Mock 주입 → DB 불필요</div>
            </div>
          </div>
          <div className="bg-slate-800 p-3 rounded-lg text-xs font-mono text-slate-300">
            <div className="text-slate-500">// 테스트 코드</div>
            <div>UserService <span className="text-cyan-400">mock</span> = Mockito.mock(...);</div>
            <div><span className="text-pink-400">new</span> UserController(<span className="text-cyan-400">mock</span>);</div>
            <div className="text-slate-500">// DB 없이 Controller 테스트 가능!</div>
          </div>
        </div>
      );

      // auto
      return (
        <div className="max-w-md mx-auto space-y-3">
          <div className="bg-slate-900 p-4 rounded-xl text-xs font-mono text-slate-300">
            <div><span className="text-yellow-300">@Service</span></div>
            <div><span className="text-pink-400">public class</span> <span className="text-cyan-400">UserService</span> {'{ ... }'}</div>
            <div className="mt-2 text-slate-500">// 생성자가 하나뿐이면</div>
            <div className="text-slate-500">// @Autowired 없이 자동 주입!</div>
          </div>
          <div className="bg-emerald-50 p-3 rounded-lg border border-emerald-200 text-center text-sm text-emerald-800">
            <span className="font-bold">핵심:</span> DI를 모르면 Spring의 거의 모든 기능을 이해할 수 없다
          </div>
        </div>
      );
    }

    function App() {
      const [idx,setIdx]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);const step=STEPS[idx];const isEnd=idx===STEPS.length-1;
      const next=()=>{setIdx(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};const nextRef=useRef(next);nextRef.current=next;
      const prev=()=>{if(idx>0){setIdx(p=>p-1);setPlaying(false);}};const toggle=()=>{if(isEnd)setIdx(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing){ref.current=setInterval(()=>nextRef.current(),4000);}else{clearInterval(ref.current);}return()=>clearInterval(ref.current);},[playing]);
      return (<div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800"><div className="max-w-4xl mx-auto space-y-6">
        <div className="flex justify-between items-center text-sm"><a href="../index.html" className="text-slate-500 hover:text-green-700 transition">← 챕터 목록</a><span className="text-slate-400">Chapter IV-2-1</span></div>
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200"><div className="flex items-center gap-3 mb-2"><div className="w-8 h-8 bg-green-700 text-white flex items-center justify-center rounded-full font-bold text-xl">S</div><h1 className="text-2xl font-bold">DI(의존성 주입)란</h1><span className="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full">★★☆</span></div><p className="text-slate-600"><b>직접 생성(new)</b> vs <b>생성자 주입(DI)</b> — 왜 느슨한 결합이 중요한지 코드로 비교합니다.</p></header>
        <div className="bg-green-700 text-white p-5 rounded-xl shadow-sm min-h-[100px] flex flex-col justify-center"><h3 className="text-xs font-bold text-green-200 mb-2 uppercase tracking-wider">현재 단계</h3><p className="text-lg font-medium leading-relaxed">{step.desc}</p></div>
        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[260px] flex items-center justify-center"><div className="w-full"><V phase={step.phase}/></div></div>
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"><div className="flex items-center space-x-2">
          <button onClick={prev} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
          <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-green-700 hover:bg-green-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
          <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        </div><div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {idx+1} / {STEPS.length} — {step.label}</div></div>
        <div className="flex justify-center gap-2">{STEPS.map((s,i)=>(<button key={s.id} onClick={()=>{setIdx(i);setPlaying(false);}} className={`w-3 h-3 rounded-full transition-all ${i===idx?'bg-green-700 scale-125':'bg-slate-300 hover:bg-slate-400'}`}/>))}</div>
      </div></div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
