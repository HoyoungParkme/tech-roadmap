    const TAB_ORDER = [

    // ─────────────────────────────────────────────────────

    const KIND_STYLE = {

      service:    { bg: 'bg-emerald-100', border: 'border-emerald-400', text: 'text-emerald-900', tag: 'SVC'  },

    // ─────────────────────────────────────────────────────
    // DependencyGraph — SVG 기반 의존성 그래프
    //   nodes: { id, label, kind, x(0~100), y(0~250), sub? }
    //   edges: { from, to, label?, style? }
    //   x: 좌측 0% ~ 우측 100%(패널 너비 기준의 가로 좌표 — 노드 왼쪽 끝 기준)
    //   y: 상단 ~ 하단 px (SVG 좌표)
    // ─────────────────────────────────────────────────────
    function DependencyGraph({ graph }) {
      const W = 360;   // 그래프 가상 너비
      const H = 250;   // 그래프 가상 높이
      const NODE_W = 150;
      const NODE_H = 44;

      // 노드 중심 좌표 계산
      const nodeMap = {};
      graph.nodes.forEach((n) => {
        const cx = (n.x / 100) * W + NODE_W / 2;
        const cy = n.y + NODE_H / 2;
        nodeMap[n.id] = { ...n, cx, cy };
      });

      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">
          <div className="bg-lime-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-lime-800 flex items-center justify-between">
            <span>{graph.title}</span>
            <span className="text-[9px] font-mono text-lime-700">dependency graph</span>
          </div>

          <div className="relative" style={{ width: '100%', height: `${H + 50}px` }}>
            {/* SVG 화살표 (엣지) */}
            <svg className="absolute inset-0 w-full h-full" viewBox={`0 0 ${W} ${H + 40}`} preserveAspectRatio="xMidYMin meet">
              <defs>
                <marker id="arrow-solid" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
                  <path d="M0,0 L0,8 L8,4 z" fill="#0f766e" />
                </marker>
                <marker id="arrow-dashed" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
                  <path d="M0,0 L0,8 L8,4 z" fill="#ca8a04" />
                </marker>
                <marker id="arrow-inject" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
                  <path d="M0,0 L0,10 L10,5 z" fill="#65a30d" />
                </marker>
              </defs>
              {graph.edges.map((e, i) => {
                const a = nodeMap[e.from];
                const b = nodeMap[e.to];
                if (!a || !b) return null;
                const stroke = e.style === 'inject' ? '#65a30d'
                  : e.style === 'dashed' ? '#ca8a04' : '#0f766e';
                const dash = e.style === 'dashed' ? '4 3' : (e.style === 'inject' ? '0' : '0');
                const marker = e.style === 'inject' ? 'url(#arrow-inject)'
                  : e.style === 'dashed' ? 'url(#arrow-dashed)' : 'url(#arrow-solid)';
                const midX = (a.cx + b.cx) / 2;
                const midY = (a.cy + b.cy) / 2;
                return (
                  <g key={i}>
                    <line
                      x1={a.cx} y1={a.cy + (b.cy > a.cy ? NODE_H / 2 : -NODE_H / 2)}
                      x2={b.cx} y2={b.cy + (a.cy > b.cy ? NODE_H / 2 : -NODE_H / 2)}
                      stroke={stroke}
                      strokeWidth={e.style === 'inject' ? 2.5 : 1.5}
                      strokeDasharray={dash}
                      markerEnd={marker}
                    />
                    {e.label && (
                      <g>
                        <rect x={midX - 18} y={midY - 7} width="36" height="14" rx="3" fill="white" stroke={stroke} strokeWidth="0.5" />
                        <text x={midX} y={midY + 3} textAnchor="middle" fontSize="9" fill={stroke} fontFamily="monospace" fontWeight="bold">{e.label}</text>
                      </g>
                    )}
                  </g>
                );
              })}
            </svg>

            {/* 노드(HTML 박스 — 가독성) */}
            {graph.nodes.map((n) => {
              const style = KIND_STYLE[n.kind] || KIND_STYLE.service;
              const leftPct = `${n.x}%`;
              const top = `${n.y}px`;
              const isContainer = n.kind === 'container';
              return (
                <div
                  key={n.id}
                  className={`absolute ${style.bg} ${style.border} ${style.text} ${isContainer ? 'border-2 border-dashed' : 'border-2'} rounded-lg shadow-sm`}
                  style={{
                    left: leftPct,
                    top,
                    width: isContainer ? '94%' : `${NODE_W}px`,
                    minHeight: `${NODE_H}px`,
                    padding: '4px 8px',
                    zIndex: isContainer ? 0 : 2,
                  }}
                >
                  <div className="flex items-center justify-between gap-1">
                    <span className={`text-[8px] font-bold uppercase tracking-wider ${style.text} opacity-80`}>{style.tag}</span>
                    {n.sub && <span className="text-[8px] font-mono text-slate-500 truncate">{n.sub}</span>}
                  </div>
                  <div className="text-[12px] font-bold leading-tight mt-0.5 truncate">{n.label}</div>
                </div>
              );
            })}
          </div>

          {/* 범례 텍스트 */}
          <div className="px-3 py-1.5 bg-slate-50 border-t border-slate-200 text-[10px] text-slate-600 leading-snug">
            {graph.legend}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    //   - 의존성 그래프
    //   - 핵심 포인트 박스
    //   - 범례 (kind별 색)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📦 의존성 그래프 — Service → Repository</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <DependencyGraph graph={step.graph} />

          {/* 핵심 포인트 박스 */}
          <div className="mt-3 bg-lime-50 border-l-4 border-lime-400 px-3 py-2 rounded-r">

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-lime-400"></span>controller
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-400"></span>service
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-teal-400"></span>repository
            </span>

              <span className="w-2 h-2 rounded bg-amber-400"></span>interface
            </span>

            </span>
            <span className="ml-auto flex items-center gap-2">
              <span className="flex items-center gap-1">
                <span className="inline-block w-4 h-0.5 bg-teal-700"></span>강한
              </span>

                <span className="inline-block w-4 border-t border-dashed border-amber-600"></span>약한

      );

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   - 5개 파일 탭 (TAB_ORDER)
    //   - 활성 탭은 step.tabFile로 자동 동기화 (Step 변화 시)
    //   - 사용자가 탭 클릭하면 자유 탐색 가능
    // ─────────────────────────────────────────────────────
    function CodeViewer({ activeFile, onSelectFile, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);
      const file = FILES[activeFile];

      useEffect(() => {
        if (codeRef.current && window.hljs && file) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${file.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [activeFile]);

      if (!file) return null;

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 탭 바 */}
          <div className="bg-[#21252b] border-b border-slate-700">
            <div className="px-4 py-2 flex items-center gap-2">
              <div className="flex gap-1.5">
                <span className="w-3 h-3 rounded-full bg-red-500"></span>
                <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
                <span className="w-3 h-3 rounded-full bg-green-500"></span>
              </div>
              <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{file.lang}</span>
            </div>
            {/* 파일 탭 */}
            <div className="flex overflow-x-auto border-t border-slate-800">
              {TAB_ORDER.map((name) => {
                const active = name === activeFile;
                return (
                  <button
                    key={name}
                    onClick={() => onSelectFile(name)}
                    className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-800 transition ${
                      active
                        ? 'bg-[#282c34] text-lime-300 border-t-2 border-t-lime-400'

                    }`}
                  >
                    {name}
                  </button>
                );
              })}
            </div>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${file.lang}`}>{file.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[42rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || file.lines).map((lineHtml, i) => {
                  const highlighted = file.highlight && file.highlight.includes(i + 1);
                  return (

            <span>{file.lines.length} lines · {activeFile}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너

    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    //   - Step 변경 시 우측 탭 자동 전환 (사용자가 다른 탭 누르면 그대로 둠 — 단순화)
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [activeFile, setActiveFile] = useState(STEPS[0].tabFile);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      // Step 바뀌면 해당 단계의 권장 탭으로 동기화
      useEffect(() => {
        setActiveFile(step.tabFile);
      }, [stepIdx]);

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; 목차로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter IV-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-lime-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. Spring 핵심 &gt; Chapter 2. IoC/DI</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-2-2. DI(의존성 주입) — Spring 컨테이너가 객체를 주입하는 원리</h1>
                  <p className="text-sm text-slate-500 mt-0.5">new로 직접 생성하는 강한 결합부터 인터페이스 추상화·컨테이너 주입·생성자 주입까지</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                activeFile={activeFile}
                onSelectFile={setActiveFile}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-lime-50 border-2 border-lime-300 rounded-xl p-3 text-sm text-lime-900">
                💡 정리: DI는 <strong>"객체를 직접 만들지 말고 받아 써라"</strong>. 인터페이스로 약속을 잡고, <strong>Spring IoC 컨테이너</strong>가 알맞은 Bean을 골라 <strong>생성자로 주입</strong>한다. 필드 주입은 안티패턴이고, <strong>final + @RequiredArgsConstructor</strong>가 실무 표준. 다음(IV-2-3)에서는 AOP/트랜잭션이 어떻게 DI 위에서 동작하는지 본다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-lime-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-lime-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-lime-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-lime-600 text-white hover:bg-lime-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['DI', 'IoC', '@Service', '@Repository', '@Autowired', 'Constructor Injection', 'final', 'Lombok', 'DIP'].map((kw) => (
                <span key={kw} className="bg-lime-50 text-lime-700 px-3 py-1 rounded-full text-xs font-medium border border-lime-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-04-03-dispatcher-servlet.html" className="text-lime-700 hover:text-lime-900 font-medium">&larr; IV-2-1 DispatcherServlet</a>
              <a href="./chapter-04-05-aop-transaction.html" className="text-lime-700 hover:text-lime-900 font-medium">IV-2-3 AOP &amp; Transaction &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
