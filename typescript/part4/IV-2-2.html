<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeScript 학습 — IV-2-2. DDD value object — readonly + factory</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>💎</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const BRAND = '#3178C6';


    const STEPS = [
      {
        title:'Step 1. 문제 — 원시값 그대로 쓰면 의미가 흩어진다',
        desc:'price: number 라고 적으면 음수도, NaN 도, 너무 큰 값도 들어올 수 있다. 호출자마다 검증을 반복하면 일관성도 깨진다. 도메인 의미가 코드 곳곳에 흩어진다.',
        rows:[
          {name:'price: number', desc:'음수도 NaN 도 통과'},
          {name:'검증 곳곳 반복', desc:'잊으면 사고'},
          {name:'의미 분산', desc:'유지보수 ↓'},
        ],
        alert:{tone:'warn', text:'원시값만으로는 도메인 규칙을 강제할 수 없다.'},
        code:{lang:'typescript', filename:'primitive.ts', lines:[
          'function applyDiscount(price: number, percent: number): number {',
          '  return price * (1 - percent / 100);',
          '}',
          '',
          '// 잘못된 값도 모두 통과',
          'applyDiscount(-100, 200);  // 음수 가격, 200% 할인',
          'applyDiscount(NaN, 0);     // NaN',
          'applyDiscount(0, -10);     // 음수 할인',
        ], highlight:[1,2,3,5,6,7,8]},
      },
      {
        title:'Step 2. value object — class + readonly + factory',
        desc:'Money 클래스를 만들고 constructor 를 private 로 닫고, 정적 factory create 만 노출. 모든 검증은 factory 한 곳에. 인스턴스는 readonly.',
        rows:[
          {name:'class Money', desc:'amount, currency'},
          {name:'private constructor', desc:'외부 new 차단'},
          {name:'static create()', desc:'검증 + 생성'},
          {name:'readonly fields', desc:'불변'},
        ],
        alert:{tone:'good', text:'인스턴스가 존재한다는 것 = 검증 통과의 증거.'},
        code:{lang:'typescript', filename:'money.ts', lines:[
          'class Money {',
          '  private constructor(',
          '    public readonly amount: number,',
          '    public readonly currency: "KRW" | "USD",',
          '  ) {}',
          '',
          '  static create(amount: number, currency: "KRW" | "USD"): Money {',
          '    if (!Number.isFinite(amount) || amount < 0) {',
          '      throw new Error("invalid amount");',
          '    }',
          '    return new Money(amount, currency);',
          '  }',
          '',
          '  add(other: Money): Money {',
          '    if (other.currency !== this.currency) throw new Error("currency mismatch");',
          '    return Money.create(this.amount + other.amount, this.currency);',
          '  }',
          '}',
        ], highlight:[1,2,3,4,5,7,8,9,10,11,12,14,15,16,17,18]},
      },
      {
        title:'Step 3. equals — 동등성은 값 기반',
        desc:'value object 는 reference 가 아닌 "값" 으로 동등하다. equals 메서드로 정의. 1000원 객체 두 개는 다른 인스턴스라도 같다고 간주.',
        rows:[
          {name:'a.equals(b)', desc:'값 비교'},
          {name:'a === b', desc:'reference (의미 다름)'},
          {name:'Map key', desc:'문자열 키 생성 후 사용'},
        ],
        alert:{tone:'info', text:'value 동등성 정의가 핵심 — 컬렉션 비교, 중복 제거 등'},
        code:{lang:'typescript', filename:'equals.ts', lines:[
          'class Money {',
          '  // …',
          '  equals(other: Money): boolean {',
          '    return this.amount === other.amount',
          '        && this.currency === other.currency;',
          '  }',
          '  toString(): string { return `${this.amount} ${this.currency}`; }',
          '}',
          '',
          'const a = Money.create(1000, "KRW");',
          'const b = Money.create(1000, "KRW");',
          'a === b;        // false (다른 인스턴스)',
          'a.equals(b);    // true  (같은 값)',
        ], highlight:[3,4,5,6,7,11,12,13,14]},
      },
      {
        title:'Step 4. Result 와 합 — 검증 실패를 값으로',
        desc:'create 가 throw 하는 대신 Result<Money, string> 을 반환하면, 호출자가 분기를 컴파일러로 강제받는다. IV-2-1 과 자연스럽게 합쳐진다.',
        rows:[
          {name:'create(): Result', desc:'예외 던지지 않음'},
          {name:'분기 강제', desc:'컴파일러가'},
          {name:'폼 검증', desc:'에러 메시지 누적'},
        ],
        alert:{tone:'good', text:'예외 던지지 말고 봉투에 담아 돌려준다.'},
        code:{lang:'typescript', filename:'with-result.ts', lines:[
          'type Result<T, E> = { ok: true; value: T } | { ok: false; error: E };',
          '',
          'class Money {',
          '  private constructor(public readonly amount: number, public readonly currency: "KRW" | "USD") {}',
          '',
          '  static create(amount: number, currency: "KRW" | "USD"): Result<Money, string> {',
          '    if (!Number.isFinite(amount)) return { ok: false, error: "not finite" };',
          '    if (amount < 0)               return { ok: false, error: "negative" };',
          '    return { ok: true, value: new Money(amount, currency) };',
          '  }',
          '}',
          '',
          'const r = Money.create(1000, "KRW");',
          'if (r.ok) console.log(r.value.amount);',
          'else      console.error(r.error);',
        ], highlight:[1,3,4,5,6,7,8,9,10,11,13,14,15]},
      },
      {
        title:'Step 5. 어디까지 만들어야 하나 — 실무 균형',
        desc:'모든 원시값을 value object 로 만들면 코드가 비대해진다. "비즈니스 규칙이 붙는 것" 만 (Money, Email, Phone, Quantity, Coordinate 등). 단순 식별자는 Brand 로 충분.',
        rows:[
          {name:'Money / Email / Phone', desc:'value object'},
          {name:'UserId / OrderId', desc:'Brand 면 충분'},
          {name:'name / description', desc:'그냥 string'},
        ],
        wins:[
          'readonly + factory + 검증',
          'equals 로 값 기반 동등성',
          'Result 와 합쳐 안전한 생성',
          '비즈니스 규칙 있는 값만 value object',
          '단순 id 는 Brand 로 충분',
        ],
        alert:{tone:'good', text:'도메인 규칙이 있는 것 = 보석. 나머지는 가볍게.'},
        code:{lang:'typescript', filename:'where.ts', lines:[
          '// value object 가 어울리는 곳',
          'class Email { /* 형식 검증 */ }',
          'class Phone { /* 국가 코드 검증 */ }',
          'class Money { /* 통화/음수 검증 */ }',
          'class Quantity { /* 0 이상 정수 */ }',
          '',
          '// Brand 면 충분',
          'type UserId  = Brand<number, "User">;',
          'type OrderId = Brand<number, "Order">;',
          '',
          '// 그냥 원시',
          'type Description = string;',
        ], highlight:[1,2,3,4,5,7,8,9,11,12]},
      },
    ];

    function Rows({ rows }) {
      return (
        <div className="rounded-lg overflow-hidden bg-white" style={{border:`2px solid ${BRAND}`}}>
          <div className="px-3 py-1.5 text-xs font-bold text-white" style={{background:BRAND}}>💎 value object 시뮬레이션</div>
          <div className="p-3 space-y-2">
            {rows.map((r, i) => (
              <div key={i} className="flex items-center gap-2 text-xs">
                <span className="w-44 font-mono font-bold" style={{color:BRAND}}>{r.name}</span>
                <span className="flex-1 px-2 py-0.5 rounded font-mono" style={{background:'#eef4fb', color:'#1e4a78'}}>{r.desc}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }
    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl bg-white p-4 h-full flex flex-col" style={{border:`1px solid ${BRAND}`}}>
          <div className="mb-3 text-sm font-bold" style={{color:'#1e4a78'}}>불변 + 검증 + 동등성</div>
          <Rows rows={state.rows} />
          <WinsBox wins={state.wins} />
          <AlertBox alert={state.alert} />
        </div>
      );
    }

    function WinsBox({ wins, title }) {
      if (!wins) return null;
      return (
        <div className="mt-3 rounded-xl p-4" style={{border:`2px solid ${BRAND}`, background:'#eef4fb'}}>
          <div className="text-lg font-bold mb-2" style={{color:'#1e4a78'}}>🔷 {title || '핵심 정리'}</div>
          <ul className="space-y-1.5">
            {wins.map((w, i) => (
              <li key={i} className="text-sm flex gap-2" style={{color:'#1e4a78'}}><span style={{color:BRAND}}>✓</span><span>{w}</span></li>
            ))}
          </ul>
        </div>
      );
    }

    const ALERT_STYLE = {
      info:{bg:'#eef4fb', bd:'#bcd3ec', tx:'#1e4a78', icon:'💡'},
      warn:{bg:'#fef3c7', bd:'#fde68a', tx:'#92400e', icon:'⚠️'},
      danger:{bg:'#fee2e2', bd:'#fecaca', tx:'#991b1b', icon:'🚨'},
      good:{bg:'#dbf3e6', bd:'#86efac', tx:'#166534', icon:'✅'},
    };
    function AlertBox({ alert }) {
      if (!alert) return null;
      const s = ALERT_STYLE[alert.tone] || ALERT_STYLE.info;
      return <div className="mt-3 rounded-lg p-2 text-xs flex gap-2" style={{background:s.bg, border:`1px solid ${s.bd}`, color:s.tx}}><span>{s.icon}</span><span>{alert.text}</span></div>;
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => { if (codeRef.current && window.hljs) { codeRef.current.removeAttribute('data-highlighted'); window.hljs.highlightElement(codeRef.current); } }, [code]);
      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();
      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span><span className="w-3 h-3 rounded-full bg-yellow-400"></span><span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? '-ml-3 pl-2' : ''}`} style={isHi ? {background:'rgba(49,120,198,0.18)', borderLeft:`2px solid ${BRAND}`} : {}}>
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span><span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);
      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen px-4 py-6" style={{background:'linear-gradient(135deg,#eef4fb 0%,#dbeafe 100%)'}}>
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg text-white font-bold" style={{background:BRAND}}>TS</span>
              <div>
                <h1 className="text-2xl font-bold" style={{color:'#1e4a78'}}>IV-2-2. DDD value object — readonly + factory</h1>
                <p className="text-sm" style={{color:'#3178C6'}}>비유: 다이아몬드 — 한 번 깎으면 못 바꾸지만 등급이 보장된다</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs underline hover:no-underline" style={{color:BRAND}}>← 챕터 목록</a>
            </header>
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className="h-1.5 flex-1 rounded-full transition" style={{background: i <= stepIdx ? BRAND : '#bcd3ec'}} />
              ))}
            </div>
            <div className="mb-4 rounded-xl px-5 py-4 shadow text-white" style={{background:BRAND}}>
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>
            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} aria-label="처음으로" className="px-3 py-1.5 text-xs rounded bg-white" style={{border:`1px solid ${BRAND}`, color:BRAND}}>처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 text-xs rounded bg-white disabled:opacity-40" style={{border:`1px solid ${BRAND}`, color:BRAND}}>← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'} className="px-4 py-1.5 text-xs rounded font-bold text-white" style={{background:BRAND}}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} aria-label="다음 단계" className="px-3 py-1.5 text-xs rounded bg-white disabled:opacity-40" style={{border:`1px solid ${BRAND}`, color:BRAND}}>다음 →</button>
            </div>
            <div className="text-center text-[10px] mt-2" style={{color:'#3178C6aa'}}>키보드 ←/→ · 자동재생 3초/단계</div>
            {isLast && (
              <div className="mt-5 rounded-lg bg-white px-4 py-3 text-sm" style={{border:`2px solid ${BRAND}`, color:'#1e4a78'}}>
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                readonly + factory + equals — 작은 도메인 보석.
              </div>
            )}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {["value-object","readonly","factory","immutable","DDD"].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full" style={{background:'#eef4fb', color:'#1e4a78', border:'1px solid #bcd3ec'}}>#{k}</span>
              ))}
            </div>
            <nav className="mt-6 flex items-center justify-between text-xs" style={{color:BRAND}}>
              <a href="./IV-2-1.html" className="underline hover:no-underline">← 이전</a>
              <a href="../part5/V-1-1.html" className="underline hover:no-underline">다음 →</a>
            </nav>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
