<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeScript 학습 — IV-2-1. Result / Either 패턴</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>⚖️</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const BRAND = '#3178C6';


    const STEPS = [
      {
        title:'Step 1. 예외 문제 — 시그니처가 거짓말한다',
        desc:'function fetchUser(): Promise<User> 라는 시그니처는 "성공만 한다" 처럼 보인다. 실제로는 throw 가능. 호출자는 try/catch 를 깜빡하기 쉽고, 어떤 예외가 가능한지도 시그니처에 없다.',
        rows:[
          {name:'Promise<User>', desc:'성공 같은 모습'},
          {name:'실제론 throw 가능', desc:'시그니처가 거짓말'},
          {name:'try/catch 누락', desc:'운영 사고'},
        ],
        alert:{tone:'warn', text:'예외는 시그니처에 안 나타난다 = 호출자 책임 모호.'},
        code:{lang:'typescript', filename:'exception.ts', lines:[
          'async function fetchUser(id: number): Promise<User> {',
          '  const res = await fetch(`/u/${id}`);',
          '  if (!res.ok) throw new Error(`HTTP ${res.status}`);',
          '  return res.json();',
          '}',
          '',
          '// 호출자',
          'const u = await fetchUser(1);  // 성공 분기만 신경 쓰기 쉬움',
          'console.log(u.name);            // 만약 throw 면? 윗 줄에서 멈춤',
        ], highlight:[1,2,3,4,5,8,9]},
      },
      {
        title:'Step 2. Result<T, E> — 성공/실패 봉투',
        desc:'성공이면 {ok:true, value}, 실패면 {ok:false, error}. 시그니처에 "실패할 수 있다" 가 명시된다. 호출자가 result.ok 분기를 깜빡하면 컴파일 에러.',
        rows:[
          {name:'{ok:true, value:T}', desc:'성공'},
          {name:'{ok:false, error:E}', desc:'실패'},
          {name:'호출자 분기 강제', desc:'TS 가 강제'},
        ],
        alert:{tone:'good', text:'실패 가능성이 시그니처에 명시된다.'},
        code:{lang:'typescript', filename:'result.ts', lines:[
          'type Result<T, E = Error> =',
          '  | { ok: true;  value: T }',
          '  | { ok: false; error: E };',
          '',
          'const ok = <T>(value: T): Result<T> => ({ ok: true, value });',
          'const err = <E>(error: E): Result<never, E> => ({ ok: false, error });',
          '',
          'async function fetchUser(id: number): Promise<Result<User, string>> {',
          '  const res = await fetch(`/u/${id}`);',
          '  if (!res.ok) return err(`HTTP ${res.status}`);',
          '  return ok(await res.json());',
          '}',
        ], highlight:[1,2,3,5,6,8,9,10,11,12]},
      },
      {
        title:'Step 3. 호출자 — 분기를 컴파일러가 강제',
        desc:'r.ok 가 true 인 분기 안에서만 r.value 가 보이고, false 분기에선 r.error 만 보인다. discriminated union 의 자연스러운 활용. 분기를 잊으면 컴파일 에러.',
        rows:[
          {name:'r.ok === true', desc:'value 노출'},
          {name:'r.ok === false', desc:'error 노출'},
          {name:'r.value (no check)', desc:'컴파일 에러'},
        ],
        alert:{tone:'good', text:'호출자가 "성공만" 가정할 수 없다.'},
        code:{lang:'typescript', filename:'consumer.ts', lines:[
          'const r = await fetchUser(1);',
          '',
          'if (r.ok) {',
          '  console.log(r.value.name);  // r.value: User',
          '} else {',
          '  console.error(r.error);     // r.error: string',
          '}',
          '',
          '// 분기 안 하면 → r.value 자체가 안 보임',
          '// console.log(r.value.name);  // ✗',
        ], highlight:[1,3,4,5,6,7,9,10]},
      },
      {
        title:'Step 4. 합성 — map / flatMap 같은 헬퍼',
        desc:'Result 가 체이닝되면 if 가 중첩된다. map / flatMap (or chain) 헬퍼로 평탄화. 함수형 라이브러리 (neverthrow, fp-ts) 가 이미 갖고 있다.',
        rows:[
          {name:'map(r, f)', desc:'성공일 때 변환'},
          {name:'flatMap(r, f)', desc:'중첩 Result 평탄화'},
          {name:'unwrap(r, fallback)', desc:'기본값 사용'},
        ],
        alert:{tone:'info', text:'중첩이 깊어지면 헬퍼 함수로 평탄화.'},
        code:{lang:'typescript', filename:'helpers.ts', lines:[
          'function map<T, U, E>(r: Result<T, E>, f: (x: T) => U): Result<U, E> {',
          '  return r.ok ? ok(f(r.value)) : r;',
          '}',
          'function flatMap<T, U, E>(r: Result<T, E>, f: (x: T) => Result<U, E>): Result<U, E> {',
          '  return r.ok ? f(r.value) : r;',
          '}',
          '',
          '// 체이닝',
          'const result = map(',
          '  await fetchUser(1),',
          '  (u) => u.name.toUpperCase(),',
          ');',
          '',
          '// 라이브러리: neverthrow / fp-ts / ts-results',
        ], highlight:[1,2,3,4,5,6,8,9,10,11,12,14]},
      },
      {
        title:'Step 5. 언제 예외를 쓰고 언제 Result?',
        desc:'예측 가능한 실패 (네트워크 / 검증 / 비즈니스 룰 위반) = Result. 예측 불가능한 버그 (배열 인덱스 범위 초과, 잘못된 상태) = throw (그리고 ErrorBoundary / 글로벌 핸들러). 둘이 섞이는 게 정상.',
        rows:[
          {name:'예측 가능 실패', desc:'Result'},
          {name:'예측 불가능 버그', desc:'throw'},
          {name:'외부 시스템', desc:'Result + 재시도'},
        ],
        wins:[
          'Result = 실패를 값으로',
          'discriminated union 으로 분기 강제',
          'map / flatMap 으로 합성',
          '예측 가능 실패만 Result, 버그는 throw',
          '라이브러리: neverthrow / ts-results',
        ],
        alert:{tone:'good', text:'예외는 흐름 제어가 아니다 — Result 가 정답.'},
        code:{lang:'typescript', filename:'guideline.ts', lines:[
          '// 예측 가능한 실패 → Result',
          'async function validateInput(x: string): Promise<Result<Email, string>> {',
          '  if (!x.includes("@")) return err("not email");',
          '  return ok(x as Email);',
          '}',
          '',
          '// 예측 불가능한 버그 → throw (어디서든)',
          'function divide(a: number, b: number): number {',
          '  if (b === 0) throw new Error("divide by zero");  // 호출자 버그',
          '  return a / b;',
          '}',
          '',
          '// 외부 시스템 (네트워크 / DB) → Result + 재시도',
          'async function callApi<T>(url: string): Promise<Result<T, string>> { /* … */ }',
        ], highlight:[1,2,3,4,5,7,8,9,10,11,13,14]},
      },
    ];

    function Rows({ rows }) {
      return (
        <div className="rounded-lg overflow-hidden bg-white" style={{border:`2px solid ${BRAND}`}}>
          <div className="px-3 py-1.5 text-xs font-bold text-white" style={{background:BRAND}}>⚖️ Result 봉투</div>
          <div className="p-3 space-y-2">
            {rows.map((r, i) => (
              <div key={i} className="flex items-center gap-2 text-xs">
                <span className="w-44 font-mono font-bold" style={{color:BRAND}}>{r.name}</span>
                <span className="flex-1 px-2 py-0.5 rounded font-mono" style={{background:'#eef4fb', color:'#1e4a78'}}>{r.desc}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }
    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl bg-white p-4 h-full flex flex-col" style={{border:`1px solid ${BRAND}`}}>
          <div className="mb-3 text-sm font-bold" style={{color:'#1e4a78'}}>성공/실패를 값으로</div>
          <Rows rows={state.rows} />
          <WinsBox wins={state.wins} />
          <AlertBox alert={state.alert} />
        </div>
      );
    }

    function WinsBox({ wins, title }) {
      if (!wins) return null;
      return (
        <div className="mt-3 rounded-xl p-4" style={{border:`2px solid ${BRAND}`, background:'#eef4fb'}}>
          <div className="text-lg font-bold mb-2" style={{color:'#1e4a78'}}>🔷 {title || '핵심 정리'}</div>
          <ul className="space-y-1.5">
            {wins.map((w, i) => (
              <li key={i} className="text-sm flex gap-2" style={{color:'#1e4a78'}}><span style={{color:BRAND}}>✓</span><span>{w}</span></li>
            ))}
          </ul>
        </div>
      );
    }

    const ALERT_STYLE = {
      info:{bg:'#eef4fb', bd:'#bcd3ec', tx:'#1e4a78', icon:'💡'},
      warn:{bg:'#fef3c7', bd:'#fde68a', tx:'#92400e', icon:'⚠️'},
      danger:{bg:'#fee2e2', bd:'#fecaca', tx:'#991b1b', icon:'🚨'},
      good:{bg:'#dbf3e6', bd:'#86efac', tx:'#166534', icon:'✅'},
    };
    function AlertBox({ alert }) {
      if (!alert) return null;
      const s = ALERT_STYLE[alert.tone] || ALERT_STYLE.info;
      return <div className="mt-3 rounded-lg p-2 text-xs flex gap-2" style={{background:s.bg, border:`1px solid ${s.bd}`, color:s.tx}}><span>{s.icon}</span><span>{alert.text}</span></div>;
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => { if (codeRef.current && window.hljs) { codeRef.current.removeAttribute('data-highlighted'); window.hljs.highlightElement(codeRef.current); } }, [code]);
      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();
      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span><span className="w-3 h-3 rounded-full bg-yellow-400"></span><span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? '-ml-3 pl-2' : ''}`} style={isHi ? {background:'rgba(49,120,198,0.18)', borderLeft:`2px solid ${BRAND}`} : {}}>
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span><span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);
      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen px-4 py-6" style={{background:'linear-gradient(135deg,#eef4fb 0%,#dbeafe 100%)'}}>
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg text-white font-bold" style={{background:BRAND}}>TS</span>
              <div>
                <h1 className="text-2xl font-bold" style={{color:'#1e4a78'}}>IV-2-1. Result / Either 패턴</h1>
                <p className="text-sm" style={{color:'#3178C6'}}>비유: 예외 던지지 말고 봉투에 담아 돌려준다</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs underline hover:no-underline" style={{color:BRAND}}>← 챕터 목록</a>
            </header>
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className="h-1.5 flex-1 rounded-full transition" style={{background: i <= stepIdx ? BRAND : '#bcd3ec'}} />
              ))}
            </div>
            <div className="mb-4 rounded-xl px-5 py-4 shadow text-white" style={{background:BRAND}}>
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>
            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} aria-label="처음으로" className="px-3 py-1.5 text-xs rounded bg-white" style={{border:`1px solid ${BRAND}`, color:BRAND}}>처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 text-xs rounded bg-white disabled:opacity-40" style={{border:`1px solid ${BRAND}`, color:BRAND}}>← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'} className="px-4 py-1.5 text-xs rounded font-bold text-white" style={{background:BRAND}}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} aria-label="다음 단계" className="px-3 py-1.5 text-xs rounded bg-white disabled:opacity-40" style={{border:`1px solid ${BRAND}`, color:BRAND}}>다음 →</button>
            </div>
            <div className="text-center text-[10px] mt-2" style={{color:'#3178C6aa'}}>키보드 ←/→ · 자동재생 3초/단계</div>
            {isLast && (
              <div className="mt-5 rounded-lg bg-white px-4 py-3 text-sm" style={{border:`2px solid ${BRAND}`, color:'#1e4a78'}}>
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                예외는 흐름 제어가 아니다. Result<T,E> 로 결과를 값으로 다룬다.
              </div>
            )}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {["result","either","errors-as-values","functional"].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full" style={{background:'#eef4fb', color:'#1e4a78', border:'1px solid #bcd3ec'}}>#{k}</span>
              ))}
            </div>
            <nav className="mt-6 flex items-center justify-between text-xs" style={{color:BRAND}}>
              <a href="./IV-1-2.html" className="underline hover:no-underline">← 이전</a>
              <a href="./IV-2-2.html" className="underline hover:no-underline">다음 →</a>
            </nav>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
