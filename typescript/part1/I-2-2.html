<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeScript 학습 — I-2-2. utility type</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🛠</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const BRAND = '#3178C6';


    const STEPS = [
      {
        title: 'Step 1. Partial<T> — 모든 필드 옵셔널',
        desc: 'Partial<T> 는 T 의 모든 필드를 선택적으로 만든다. "수정 API 의 body — 필드 중 일부만 보낼 수 있다" 같은 곳에 쓴다. 새 함수를 만들지 않고도 "옵셔널 버전" 을 얻는다.',
        ops: [{name:'User', desc:'{id, name, email}'}, {name:'Partial<User>', desc:'{id?, name?, email?}'}],
        alert:{tone:'info', text:'수정 API · 폼 진행상태 · 부분 업데이트 ← 표준'},
        code:{lang:'typescript', filename:'partial.ts', lines:[
          'interface User { id: number; name: string; email: string }',
          '',
          'type UserPatch = Partial<User>;',
          '// → { id?: number; name?: string; email?: string }',
          '',
          'function updateUser(id: number, patch: UserPatch) {',
          '  return db.users.update({ where: { id }, data: patch });',
          '}',
          '',
          'updateUser(1, { name: "Bob" });           // ✓',
          'updateUser(1, { email: "b@x.com" });      // ✓',
          'updateUser(1, {});                        // ✓ (모두 옵셔널)',
        ], highlight:[1,3,4,6,7,8,10,11,12]},
      },
      {
        title: 'Step 2. Required<T> — 모든 필드 필수',
        desc: 'Partial 의 반대. ? 가 붙은 필드를 모두 필수로 바꾼다. "내부적으로는 일부 옵셔널이지만, 이 시점에는 반드시 모두 있어야 한다" 인 곳에 쓴다.',
        ops: [{name:'User?', desc:'{id?, name?, email?}'}, {name:'Required<User>', desc:'{id, name, email}'}],
        alert:{tone:'info', text:'폼 제출 직전 검증 후 = Required'},
        code:{lang:'typescript', filename:'required.ts', lines:[
          'interface DraftUser { id?: number; name?: string; email?: string }',
          '',
          'type FinalUser = Required<DraftUser>;',
          '// → { id: number; name: string; email: string }',
          '',
          'function submit(u: FinalUser) {',
          '  return api.create(u);',
          '}',
          '',
          'submit({ id: 1, name: "A" });            // ✗ email 누락',
          'submit({ id: 1, name: "A", email: "a@x" }); // ✓',
        ], highlight:[1,3,4,6,7,8,10,11]},
      },
      {
        title: 'Step 3. Pick<T, K> / Omit<T, K> — 필요한 필드만 / 빼고',
        desc: 'Pick 은 골라내고 Omit 은 제외한다. API 응답에서 비밀번호 같은 민감 필드를 빼거나, 작성 폼에서 일부 필드만 노출할 때 사용. 매번 새 type 을 손으로 적지 말고 도구를 쓰자.',
        ops: [
          {name:'Pick<User,"id"|"name">', desc:'{id, name}'},
          {name:'Omit<User,"password">', desc:'{id, name, email}'},
        ],
        alert:{tone:'good', text:'민감 필드 제거 / 일부 필드 선택의 표준'},
        code:{lang:'typescript', filename:'pick-omit.ts', lines:[
          'interface User {',
          '  id: number;',
          '  name: string;',
          '  email: string;',
          '  password: string;',
          '}',
          '',
          '// 1) Pick — 필요한 것만',
          'type UserListItem = Pick<User, "id" | "name">;',
          '// → { id: number; name: string }',
          '',
          '// 2) Omit — 빼고 싶은 것 제외 (응답에서 비밀번호 제거 표준)',
          'type PublicUser = Omit<User, "password">;',
          '// → { id; name; email }',
          '',
          'function getUsers(): PublicUser[] { /* … */ return [] }',
        ], highlight:[1,2,3,4,5,6,8,9,10,11,13,14,15,16]},
      },
      {
        title: 'Step 4. Record<K, V> — key 가 K, value 가 V 인 객체',
        desc: '맵(딕셔너리) 타입. enum 값마다 메타데이터를 붙이거나, status → 색상 같은 매핑에 쓴다. 모든 key 가 빠짐없이 채워졌는지 컴파일러가 검사한다.',
        ops: [
          {name:'Record<"red"|"blue", string>', desc:'{red, blue}'},
          {name:'Record<Status, Color>', desc:'각 status 마다 색'},
        ],
        alert:{tone:'good', text:'enum/literal → 무엇 매핑은 Record 가 표준'},
        code:{lang:'typescript', filename:'record.ts', lines:[
          'type Status = "idle" | "loading" | "done" | "error";',
          '',
          'const STATUS_COLOR: Record<Status, string> = {',
          '  idle: "gray",',
          '  loading: "blue",',
          '  done: "green",',
          '  error: "red",',
          '  // 한 키라도 빠지면 컴파일 에러',
          '};',
          '',
          '// React 컴포넌트에서 lookup',
          'function Badge({ status }: { status: Status }) {',
          '  return <span style={{ color: STATUS_COLOR[status] }}>{status}</span>;',
          '}',
        ], highlight:[1,3,4,5,6,7,8,9,11,12,13,14]},
      },
      {
        title: 'Step 5. 합쳐 쓰기 + ReturnType/Parameters',
        desc: '실무에선 여러 유틸리티를 조합한다. 사용자 응답에서 비밀번호를 빼고(Omit), 일부 필드만 옵셔널로(Partial) 같은 식. ReturnType / Parameters 로 함수 시그니처에서 타입을 뽑을 수도 있다.',
        ops: [
          {name:'Combo1', desc:'Partial<Omit<User,"id">>'},
          {name:'Combo2', desc:'Pick<User,"id"> & Partial<User>'},
          {name:'ReturnType', desc:'함수 반환 타입 추출'},
        ],
        wins:[
          'Partial/Required: 옵셔널 토글',
          'Pick/Omit: 필드 선택/제외',
          'Record: key→value 매핑',
          'ReturnType/Parameters: 함수에서 타입 뽑기',
          'Awaited<T>: Promise unwrap',
        ],
        alert:{tone:'good', text:'외워서 쓰면 type 작성 시간이 절반.'},
        code:{lang:'typescript', filename:'combo.ts', lines:[
          'interface User { id: number; name: string; email: string; password: string }',
          '',
          '// 1) 응답에서 비밀번호 빼고, 일부 필드만 옵셔널',
          'type UpdateBody = Partial<Omit<User, "id" | "password">>;',
          '// → { name?: string; email?: string }',
          '',
          '// 2) 함수에서 타입 뽑기',
          'function createUser(input: Omit<User, "id">): User { /*...*/ return {} as User }',
          '',
          'type CreateInput  = Parameters<typeof createUser>[0]; // Omit<User,"id">',
          'type CreateResult = ReturnType<typeof createUser>;    // User',
          '',
          '// 3) Promise unwrap',
          'async function fetchUser(): Promise<User> { /*...*/ return {} as User }',
          'type FetchUserResult = Awaited<ReturnType<typeof fetchUser>>; // User',
        ], highlight:[1,3,4,5,7,8,9,10,11,13,14,15]},
      },
    ];

    function OpList({ ops }) {
      return (
        <div className="rounded-lg overflow-hidden bg-white" style={{border:`2px solid ${BRAND}`}}>
          <div className="px-3 py-1.5 text-xs font-bold text-white" style={{background:BRAND}}>🛠 utility type 변환표</div>
          <table className="w-full text-xs">
            <thead><tr style={{background:'#eef4fb'}}><th className="text-left px-2 py-1" style={{color:'#1e4a78'}}>도구</th><th className="text-left px-2 py-1" style={{color:'#1e4a78'}}>결과</th></tr></thead>
            <tbody>
              {ops.map((o, i) => (
                <tr key={i} className="border-t" style={{borderColor:'#dbeafe'}}>
                  <td className="px-2 py-1 font-mono font-bold" style={{color:BRAND}}>{o.name}</td>
                  <td className="px-2 py-1 font-mono text-slate-700">{o.desc}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }
    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl bg-white p-4 h-full flex flex-col" style={{border:`1px solid ${BRAND}`}}>
          <div className="flex items-center justify-between mb-3"><h3 className="text-sm font-bold" style={{color:'#1e4a78'}}>utility type 시뮬레이션</h3></div>
          <OpList ops={state.ops} />
          <WinsBox wins={state.wins} />
          <AlertBox alert={state.alert} />
        </div>
      );
    }
  

    function WinsBox({ wins, title }) {
      if (!wins) return null;
      return (
        <div className="mt-3 rounded-xl p-4" style={{border:`2px solid ${BRAND}`, background:'#eef4fb'}}>
          <div className="text-lg font-bold mb-2" style={{color:'#1e4a78'}}>🔷 {title || '핵심 정리'}</div>
          <ul className="space-y-1.5">
            {wins.map((w, i) => (
              <li key={i} className="text-sm flex gap-2" style={{color:'#1e4a78'}}><span style={{color:BRAND}}>✓</span><span>{w}</span></li>
            ))}
          </ul>
        </div>
      );
    }

    const ALERT_STYLE = {
      info:{bg:'#eef4fb', bd:'#bcd3ec', tx:'#1e4a78', icon:'💡'},
      warn:{bg:'#fef3c7', bd:'#fde68a', tx:'#92400e', icon:'⚠️'},
      danger:{bg:'#fee2e2', bd:'#fecaca', tx:'#991b1b', icon:'🚨'},
      good:{bg:'#dbf3e6', bd:'#86efac', tx:'#166534', icon:'✅'},
    };
    function AlertBox({ alert }) {
      if (!alert) return null;
      const s = ALERT_STYLE[alert.tone] || ALERT_STYLE.info;
      return <div className="mt-3 rounded-lg p-2 text-xs flex gap-2" style={{background:s.bg, border:`1px solid ${s.bd}`, color:s.tx}}><span>{s.icon}</span><span>{alert.text}</span></div>;
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => { if (codeRef.current && window.hljs) { codeRef.current.removeAttribute('data-highlighted'); window.hljs.highlightElement(codeRef.current); } }, [code]);
      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();
      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span><span className="w-3 h-3 rounded-full bg-yellow-400"></span><span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? '-ml-3 pl-2' : ''}`} style={isHi ? {background:'rgba(49,120,198,0.18)', borderLeft:`2px solid ${BRAND}`} : {}}>
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span><span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);
      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen px-4 py-6" style={{background:'linear-gradient(135deg,#eef4fb 0%,#dbeafe 100%)'}}>
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg text-white font-bold" style={{background:BRAND}}>TS</span>
              <div>
                <h1 className="text-2xl font-bold" style={{color:'#1e4a78'}}>I-2-2. utility type</h1>
                <p className="text-sm" style={{color:'#3178C6'}}>비유: 도면 변형 도구 — Partial/Pick/Omit/Record</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs underline hover:no-underline" style={{color:BRAND}}>← 챕터 목록</a>
            </header>
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className="h-1.5 flex-1 rounded-full transition" style={{background: i <= stepIdx ? BRAND : '#bcd3ec'}} />
              ))}
            </div>
            <div className="mb-4 rounded-xl px-5 py-4 shadow text-white" style={{background:BRAND}}>
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>
            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} aria-label="처음으로" className="px-3 py-1.5 text-xs rounded bg-white" style={{border:`1px solid ${BRAND}`, color:BRAND}}>처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 text-xs rounded bg-white disabled:opacity-40" style={{border:`1px solid ${BRAND}`, color:BRAND}}>← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'} className="px-4 py-1.5 text-xs rounded font-bold text-white" style={{background:BRAND}}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} aria-label="다음 단계" className="px-3 py-1.5 text-xs rounded bg-white disabled:opacity-40" style={{border:`1px solid ${BRAND}`, color:BRAND}}>다음 →</button>
            </div>
            <div className="text-center text-[10px] mt-2" style={{color:'#3178C6aa'}}>키보드 ←/→ · 자동재생 3초/단계</div>
            {isLast && (
              <div className="mt-5 rounded-lg bg-white px-4 py-3 text-sm" style={{border:`2px solid ${BRAND}`, color:'#1e4a78'}}>
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                Partial/Pick/Omit/Record 는 표준 도구함. 외운다.
              </div>
            )}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {["Partial","Pick","Omit","Record","utility"].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full" style={{background:'#eef4fb', color:'#1e4a78', border:'1px solid #bcd3ec'}}>#{k}</span>
              ))}
            </div>
            <nav className="mt-6 flex items-center justify-between text-xs" style={{color:BRAND}}>
              <a href="./I-2-1.html" className="underline hover:no-underline">← 이전</a>
              <a href="../part2/II-1-1.html" className="underline hover:no-underline">다음 →</a>
            </nav>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
