<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeScript 학습 — I-1-2. type vs interface</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🔷</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <!-- I-1-2 — type vs interface (비유: 도장 vs 레고) -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const BRAND = '#3178C6';

    const STEPS = [
      {
        title: 'Step 1. 둘 다 객체 모양을 정의한다',
        desc: 'type 과 interface 는 둘 다 "객체의 모양을 이름으로 부르는" 도구다. 같은 User 를 type 으로도, interface 로도 표현할 수 있다. 컴파일 결과는 거의 동일하다. 그래서 입문자는 "그러면 어느 걸 써야 해요?" 라고 묻는다. 답은 "용도가 다른 도구"다.',
        rows: [
          { feat: '객체 모양 정의', t: 'O', i: 'O' },
          { feat: '함수 시그니처', t: 'O', i: 'O' },
          { feat: 'union (|)', t: 'O', i: '✗' },
          { feat: 'tuple', t: 'O', i: '✗' },
        ],
        alert: { tone: 'info', text: '둘 다 객체 모양을 정의한다. 차이는 "이후 어떻게 확장하는가" 에 있다.' },
        code: {
          lang: 'typescript', filename: 'same-shape.ts',
          lines: [
            '// 두 방법 — 같은 User',
            'type UserT = {',
            '  id: number;',
            '  name: string;',
            '};',
            '',
            'interface UserI {',
            '  id: number;',
            '  name: string;',
            '}',
            '',
            'const a: UserT = { id: 1, name: "A" };',
            'const b: UserI = { id: 2, name: "B" };',
            '// 사용 측면에서는 거의 같다',
          ],
          highlight: [1,2,3,4,5,7,8,9,10],
        },
      },
      {
        title: 'Step 2. interface — 레고 블록처럼 합친다',
        desc: 'interface 의 강점은 선언 병합(declaration merging). 같은 이름을 여러 번 선언하면 자동으로 합쳐진다. extends 로 상속도 자연스럽다. 라이브러리 타입을 외부에서 확장하는 패턴 — 예: Express Request 에 user 추가 — 의 표준 도구다.',
        rows: [
          { feat: 'extends 상속', t: '교차로(&) 모방', i: '자연스러움' },
          { feat: '선언 병합', t: '✗', i: 'O' },
          { feat: '구현(implements)', t: '제한적', i: 'O' },
        ],
        alert: { tone: 'good', text: '확장이 잦은 객체 모양은 interface 가 자연스럽다.' },
        code: {
          lang: 'typescript', filename: 'interface-extend.ts',
          lines: [
            '// 1) extends — 상속',
            'interface Animal { name: string }',
            'interface Dog extends Animal { breed: string }',
            '',
            'const d: Dog = { name: "Rex", breed: "Mix" };',
            '',
            '// 2) 선언 병합 — 라이브러리 타입 확장',
            'interface Window { myApp: { version: string } }',
            'interface Window { debug: boolean }',
            '// → 같은 Window 에 두 필드 모두 추가',
            '',
            '// 3) Express Request 확장 (실무 표준)',
            'declare global {',
            '  namespace Express {',
            '    interface Request { user?: { id: number } }',
            '  }',
            '}',
          ],
          highlight: [1,2,3,7,8,9,12,13,14,15,16],
        },
      },
      {
        title: 'Step 3. type — union, tuple, mapped 까지 표현한다',
        desc: 'type 의 강점은 표현력. union (A | B), intersection (A & B), tuple, mapped type, conditional type 모두 type 으로만 쓸 수 있다. "객체 모양" 을 넘어서는 "타입 식" 을 만들고 싶다면 type 이다.',
        rows: [
          { feat: 'union (string|number)', t: 'O', i: '✗' },
          { feat: 'tuple [string, number]', t: 'O', i: '✗' },
          { feat: 'mapped { [K in …]: … }', t: 'O', i: '제한' },
          { feat: 'conditional T extends U ? X : Y', t: 'O', i: '✗' },
        ],
        alert: { tone: 'info', text: '식(expression)을 합성하는 작업은 type 이다.' },
        code: {
          lang: 'typescript', filename: 'type-power.ts',
          lines: [
            '// 1) union',
            'type Id = string | number;',
            '',
            '// 2) tuple',
            'type Point = [number, number];',
            '',
            '// 3) intersection (객체 합치기)',
            'type WithId = { id: number };',
            'type WithTime = { createdAt: Date };',
            'type Entity = WithId & WithTime;',
            '',
            '// 4) mapped type',
            'type Readonlyfy<T> = { readonly [K in keyof T]: T[K] };',
            '',
            '// 5) conditional + infer',
            'type Unwrap<T> = T extends Promise<infer U> ? U : T;',
            'type X = Unwrap<Promise<string>>; // → string',
          ],
          highlight: [1,2,4,5,7,8,9,10,12,13,15,16,17],
        },
      },
      {
        title: 'Step 4. 헷갈리기 쉬운 차이 — implements & 성능',
        desc: 'class 가 implements 로 받을 때는 둘 다 가능하지만, union 을 가진 type 은 implements 불가. 또 TS 컴파일러는 interface 의 동일성 비교를 더 빠르게 한다(레퍼런스 비교). 객체 모양만 표현한다면 interface 가 약간 유리하다.',
        rows: [
          { feat: 'class implements', t: '비-union 만', i: 'O' },
          { feat: '에러 메시지', t: '확장된 형태로 표시', i: '이름 유지' },
          { feat: '컴파일 성능', t: '약간 느림', i: '약간 빠름' },
        ],
        alert: { tone: 'warn', text: '대형 코드베이스에서는 interface 가 에러 메시지·성능 둘 다 약간 우위.' },
        code: {
          lang: 'typescript', filename: 'gotcha.ts',
          lines: [
            '// 1) implements — union type 은 불가',
            'type Shape = { area(): number } | { perimeter(): number };',
            '// class Sq implements Shape {} // ✗ union 은 implements 불가',
            '',
            'interface Shaped { area(): number }',
            'class Sq implements Shaped { area() { return 4 } } // ✓',
            '',
            '// 2) 에러 메시지 비교',
            'type Big = A & B & C;   // → Big 이 펼쳐져 보임',
            'interface BigI extends A, B, C {}  // → "BigI" 이름 유지',
            '',
            '// 3) 컴파일 성능 — interface 는 캐싱이 잘 됨',
            '//    (Microsoft 가 자체 TS 코드에서 interface 권장하는 이유)',
          ],
          highlight: [1,2,3,5,6,8,9,10,12],
        },
      },
      {
        title: 'Step 5. 실무 선택 가이드 — 단순 규칙',
        desc: '"객체 모양 / 확장 / 라이브러리 확장 → interface", "union / tuple / 식 합성 → type". 둘이 섞이는 영역은 팀 컨벤션을 정해서 일관성을 우선. ESLint 의 @typescript-eslint/consistent-type-definitions 룰로 강제할 수 있다.',
        wins: [
          '객체 모양 + 확장 잦음 → interface',
          'union / tuple / mapped / conditional → type',
          '라이브러리 타입 확장 (declaration merging) → interface',
          '제네릭 헬퍼 타입 (Unwrap, Pick 응용 등) → type',
          '팀 컨벤션은 ESLint 룰로 자동 강제',
        ],
        rows: [
          { feat: '결론', t: '식 합성', i: '객체 + 확장' },
        ],
        alert: { tone: 'good', text: '용도가 다르다. 한쪽만 쓰지 말고 도구를 골라 쓰자.' },
        code: {
          lang: 'typescript', filename: 'rule-of-thumb.ts',
          lines: [
            '// ─── interface ───────────────',
            '// 객체 모양 + extends/병합',
            'interface User { id: number; name: string }',
            'interface AdminUser extends User { role: "admin" }',
            '',
            '// ─── type ────────────────────',
            '// union / tuple / 식 합성',
            'type Status = "idle" | "loading" | "done";',
            'type Point = [number, number];',
            'type Pair<T> = [T, T];',
            'type Nullable<T> = T | null;',
            '',
            '// ─── 팀 컨벤션 (ESLint) ──────',
            '// .eslintrc',
            '// "@typescript-eslint/consistent-type-definitions":',
            '//   ["error", "interface"]    // 객체 모양은 interface 강제',
            '',
            '// 한 줄 요약:',
            '//   객체 = interface, 식 = type',
          ],
          highlight: [1,2,3,4,6,7,8,9,10,11,13,14,15,16,17,19,20],
        },
      },
    ];

    function CompareTable({ rows }) {
      return (
        <div className="rounded-lg overflow-hidden bg-white" style={{border:`2px solid ${BRAND}`}}>
          <div className="px-3 py-1.5 text-xs font-bold text-white" style={{background:BRAND}}>type ↔ interface 비교</div>
          <table className="w-full text-xs">
            <thead>
              <tr style={{background:'#eef4fb'}}>
                <th className="text-left px-2 py-1" style={{color:'#1e4a78'}}>항목</th>
                <th className="text-left px-2 py-1" style={{color:'#1e4a78'}}>type</th>
                <th className="text-left px-2 py-1" style={{color:'#1e4a78'}}>interface</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r, i) => (
                <tr key={i} className="border-t" style={{borderColor:'#dbeafe'}}>
                  <td className="px-2 py-1 font-bold" style={{color:'#1e4a78'}}>{r.feat}</td>
                  <td className="px-2 py-1 font-mono">{r.t}</td>
                  <td className="px-2 py-1 font-mono">{r.i}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function WinsBox({ wins }) {
      if (!wins) return null;
      return (
        <div className="mt-3 rounded-xl p-4" style={{border:`2px solid ${BRAND}`, background:'#eef4fb'}}>
          <div className="text-lg font-bold mb-2" style={{color:'#1e4a78'}}>🔷 실무 선택 가이드</div>
          <ul className="space-y-1.5">
            {wins.map((w, i) => (
              <li key={i} className="text-sm flex gap-2" style={{color:'#1e4a78'}}>
                <span style={{color:BRAND}}>✓</span><span>{w}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    const ALERT_STYLE = {
      info:   { bg:'#eef4fb', bd:'#bcd3ec', tx:'#1e4a78', icon:'💡' },
      warn:   { bg:'#fef3c7', bd:'#fde68a', tx:'#92400e', icon:'⚠️' },
      danger: { bg:'#fee2e2', bd:'#fecaca', tx:'#991b1b', icon:'🚨' },
      good:   { bg:'#dbf3e6', bd:'#86efac', tx:'#166534', icon:'✅' },
    };
    function AlertBox({ alert }) {
      if (!alert) return null;
      const s = ALERT_STYLE[alert.tone] || ALERT_STYLE.info;
      return <div className="mt-3 rounded-lg p-2 text-xs flex gap-2" style={{background:s.bg, border:`1px solid ${s.bd}`, color:s.tx}}><span>{s.icon}</span><span>{alert.text}</span></div>;
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl bg-white p-4 h-full flex flex-col" style={{border:`1px solid ${BRAND}`}}>
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold" style={{color:'#1e4a78'}}>type 도장 · interface 레고 블록</h3>
          </div>
          <CompareTable rows={state.rows} />
          <WinsBox wins={state.wins} />
          <AlertBox alert={state.alert} />
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => { if (codeRef.current && window.hljs) { codeRef.current.removeAttribute('data-highlighted'); window.hljs.highlightElement(codeRef.current); } }, [code]);
      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();
      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? '-ml-3 pl-2' : ''}`} style={isHi ? {background:'rgba(49,120,198,0.18)', borderLeft:`2px solid ${BRAND}`} : {}}>
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);
      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen px-4 py-6" style={{background:'linear-gradient(135deg,#eef4fb 0%,#dbeafe 100%)'}}>
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg text-white font-bold" style={{background:BRAND}}>TS</span>
              <div>
                <h1 className="text-2xl font-bold" style={{color:'#1e4a78'}}>I-1-2. type vs interface</h1>
                <p className="text-sm" style={{color:'#3178C6'}}>비유: type 도장(식) vs interface 레고(블록 합치기)</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs underline hover:no-underline" style={{color:BRAND}}>← 챕터 목록</a>
            </header>
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className="h-1.5 flex-1 rounded-full transition" style={{background: i <= stepIdx ? BRAND : '#bcd3ec'}} />
              ))}
            </div>
            <div className="mb-4 rounded-xl px-5 py-4 shadow text-white" style={{background:BRAND}}>
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>
            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} aria-label="처음으로" className="px-3 py-1.5 text-xs rounded bg-white" style={{border:`1px solid ${BRAND}`, color:BRAND}}>처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 text-xs rounded bg-white disabled:opacity-40" style={{border:`1px solid ${BRAND}`, color:BRAND}}>← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'} className="px-4 py-1.5 text-xs rounded font-bold text-white" style={{background:BRAND}}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} aria-label="다음 단계" className="px-3 py-1.5 text-xs rounded bg-white disabled:opacity-40" style={{border:`1px solid ${BRAND}`, color:BRAND}}>다음 →</button>
            </div>
            <div className="text-center text-[10px] mt-2" style={{color:'#3178C6aa'}}>키보드 ←/→ · 자동재생 3초/단계</div>
            {isLast && (
              <div className="mt-5 rounded-lg bg-white px-4 py-3 text-sm" style={{border:`2px solid ${BRAND}`, color:'#1e4a78'}}>
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                객체 모양 + 확장 잦은 도메인 = interface. 표현식(union/tuple/conditional) = type. 일관성은 ESLint 가 강제한다.
              </div>
            )}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['type', 'interface', 'declaration-merging', 'union', '컨벤션'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full" style={{background:'#eef4fb', color:'#1e4a78', border:'1px solid #bcd3ec'}}>#{k}</span>
              ))}
            </div>
            <nav className="mt-6 flex items-center justify-between text-xs" style={{color:BRAND}}>
              <a href="./I-1-1.html" className="underline hover:no-underline">← I-1-1</a>
              <a href="./I-2-1.html" className="underline hover:no-underline">다음: I-2-1 →</a>
            </nav>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
