<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeScript 학습 — II-2-1. conditional type + infer</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🧪</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const BRAND = '#3178C6';


    const STEPS = [
      {
        title:'Step 1. conditional 의 모양',
        desc:'타입 자리에서 if 를 쓰는 문법. T extends U ? X : Y. T 가 U 의 부분집합이면 X, 아니면 Y. 함수의 if 처럼 타입에 분기를 만든다.',
        rows:[
          {name:'string extends string|number ? Y : N', desc:'→ Y'},
          {name:'boolean extends string|number ? Y : N', desc:'→ N'},
          {name:'IsString<T>', desc:'T extends string ? true : false'},
        ],
        alert:{tone:'info', text:'타입 레벨의 if-else.'},
        code:{lang:'typescript', filename:'conditional-basic.ts', lines:[
          'type IsString<T> = T extends string ? true : false;',
          '',
          'type A = IsString<"hello">;  // true',
          'type B = IsString<42>;       // false',
          'type C = IsString<string>;   // true',
          '',
          '// boolean 으로 자주 사용',
          'type NonNull<T> = T extends null | undefined ? never : T;',
          'type D = NonNull<string | null>;  // string',
        ], highlight:[1,3,4,5,7,8,9]},
      },
      {
        title:'Step 2. distributive — union 에 자동 분배',
        desc:'T 가 union 일 때 conditional 은 각 멤버에 자동으로 분배된다. (A|B) extends X ? Y : Z 는 (A extends X ? Y : Z) | (B extends X ? Y : Z) 와 같다. 자주 사용되지만 함정도 있다.',
        rows:[
          {name:'string|number extends string ? "Y":"N"', desc:'→ "Y" | "N"'},
          {name:'분배 막기', desc:'[T] extends [X] ? …'},
        ],
        alert:{tone:'warn', text:'union 에 자동 분배. 분배를 막으려면 [T] extends [X] 패턴.'},
        code:{lang:'typescript', filename:'distributive.ts', lines:[
          'type Test<T> = T extends string ? "Y" : "N";',
          '',
          'type X = Test<string | number>;',
          '// → "Y" | "N"  (분배됨)',
          '',
          '// 분배를 막고 싶으면 tuple 로 감싼다',
          'type Test2<T> = [T] extends [string] ? "Y" : "N";',
          '',
          'type Y = Test2<string | number>;  // "N" (string|number 는 string 의 부분집합이 아님)',
        ], highlight:[1,3,4,6,7,8,9]},
      },
      {
        title:'Step 3. infer — 타입의 일부를 변수로 빼낸다',
        desc:'정규식의 capture group 처럼, conditional 안에서 infer U 라고 적으면 그 자리에 매치된 타입을 U 로 빼낸다. ReturnType, Parameters 같은 표준 유틸리티의 본체가 모두 infer 다.',
        rows:[
          {name:'Promise<T> → T', desc:'Awaited<T> 의 본체'},
          {name:'(...a:A)=>R → R', desc:'ReturnType<F>'},
          {name:'(...a:A)=>R → A', desc:'Parameters<F>'},
        ],
        alert:{tone:'good', text:'infer = 패턴 매칭의 변수.'},
        code:{lang:'typescript', filename:'infer.ts', lines:[
          '// 1) Promise unwrap (Awaited 의 본체)',
          'type Unwrap<T> = T extends Promise<infer U> ? U : T;',
          'type A = Unwrap<Promise<string>>;  // string',
          'type B = Unwrap<number>;           // number',
          '',
          '// 2) ReturnType 의 본체',
          'type Ret<F> = F extends (...a: any[]) => infer R ? R : never;',
          'type C = Ret<() => User>;           // User',
          '',
          '// 3) Parameters 의 본체',
          'type Params<F> = F extends (...a: infer A) => any ? A : never;',
          'type D = Params<(a:number, b:string)=>void>;  // [number, string]',
        ], highlight:[1,2,3,4,6,7,8,10,11,12]},
      },
      {
        title:'Step 4. 실전 — 객체의 키별 타입 매핑',
        desc:'API 응답에서 status 별 데이터 모양이 다른 경우, 키로 매핑된 conditional 을 만들어 응답을 자동 좁히기. 한 번 만들면 새 status 가 추가되어도 매핑만 늘리면 된다.',
        rows:[
          {name:'ApiByStatus["ok"]', desc:'{data:User}'},
          {name:'ApiByStatus["error"]', desc:'{message:string}'},
        ],
        alert:{tone:'good', text:'키 매핑 + conditional 로 응답 안전 분기.'},
        code:{lang:'typescript', filename:'api-map.ts', lines:[
          'type ApiByStatus = {',
          '  ok:    { data: User };',
          '  error: { message: string };',
          '};',
          '',
          'type ApiResponse<S extends keyof ApiByStatus> =',
          '  { status: S } & ApiByStatus[S];',
          '',
          'function handle<S extends keyof ApiByStatus>(r: ApiResponse<S>) {',
          '  if (r.status === "ok")    return r.data;     // r.data: User',
          '  if (r.status === "error") return r.message;  // r.message: string',
          '}',
        ], highlight:[1,2,3,4,6,7,9,10,11,12]},
      },
      {
        title:'Step 5. 한계와 가이드',
        desc:'conditional/infer 는 강력하지만 복잡한 타입은 IDE 가 느려지고 에러 메시지가 어려워진다. 라이브러리 작성자 영역. 앱 코드에선 표준 유틸리티(Awaited/ReturnType/Parameters)만 능숙해도 충분.',
        rows:[
          {name:'장점', desc:'표현력 극강'},
          {name:'단점', desc:'에러 메시지 난해'},
          {name:'권장', desc:'표준 유틸리티 우선'},
        ],
        wins:[
          'extends ? : = 타입 if',
          'union 은 자동 분배 (막으려면 [T])',
          'infer = 패턴 매칭의 변수',
          'Awaited / ReturnType / Parameters 의 본체',
          '앱 코드는 표준 유틸리티만으로 90%',
        ],
        alert:{tone:'good', text:'표준 유틸리티만 익혀도 실무 90% 커버.'},
        code:{lang:'typescript', filename:'guideline.ts', lines:[
          '// 라이브러리 작성자: 자유롭게',
          'type DeepReadonly<T> =',
          '  T extends (infer U)[] ? readonly DeepReadonly<U>[]',
          '  : T extends object ? { readonly [K in keyof T]: DeepReadonly<T[K]> }',
          '  : T;',
          '',
          '// 앱 코드: 표준 유틸리티 활용',
          'type FetchResult = Awaited<ReturnType<typeof fetchUser>>;',
          '',
          '// 너무 복잡하면 → 함수로 빼서 시그니처로 표현',
          '// (타입의 가독성도 코드의 가독성이다)',
        ], highlight:[1,2,3,4,5,7,8,10,11]},
      },
    ];

    function Rows({ rows }) {
      return (
        <div className="rounded-lg overflow-hidden bg-white" style={{border:`2px solid ${BRAND}`}}>
          <div className="px-3 py-1.5 text-xs font-bold text-white" style={{background:BRAND}}>🧪 conditional/infer 추론표</div>
          <div className="p-3 space-y-2">
            {rows.map((r, i) => (
              <div key={i} className="flex items-center gap-2 text-xs">
                <span className="w-44 font-mono font-bold" style={{color:BRAND}}>{r.name}</span>
                <span className="flex-1 px-2 py-0.5 rounded font-mono" style={{background:'#eef4fb', color:'#1e4a78'}}>{r.desc}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }
    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl bg-white p-4 h-full flex flex-col" style={{border:`1px solid ${BRAND}`}}>
          <div className="mb-3 text-sm font-bold" style={{color:'#1e4a78'}}>T extends U ? X : Y · infer 로 부분 추출</div>
          <Rows rows={state.rows} />
          <WinsBox wins={state.wins} />
          <AlertBox alert={state.alert} />
        </div>
      );
    }

    function WinsBox({ wins, title }) {
      if (!wins) return null;
      return (
        <div className="mt-3 rounded-xl p-4" style={{border:`2px solid ${BRAND}`, background:'#eef4fb'}}>
          <div className="text-lg font-bold mb-2" style={{color:'#1e4a78'}}>🔷 {title || '핵심 정리'}</div>
          <ul className="space-y-1.5">
            {wins.map((w, i) => (
              <li key={i} className="text-sm flex gap-2" style={{color:'#1e4a78'}}><span style={{color:BRAND}}>✓</span><span>{w}</span></li>
            ))}
          </ul>
        </div>
      );
    }

    const ALERT_STYLE = {
      info:{bg:'#eef4fb', bd:'#bcd3ec', tx:'#1e4a78', icon:'💡'},
      warn:{bg:'#fef3c7', bd:'#fde68a', tx:'#92400e', icon:'⚠️'},
      danger:{bg:'#fee2e2', bd:'#fecaca', tx:'#991b1b', icon:'🚨'},
      good:{bg:'#dbf3e6', bd:'#86efac', tx:'#166534', icon:'✅'},
    };
    function AlertBox({ alert }) {
      if (!alert) return null;
      const s = ALERT_STYLE[alert.tone] || ALERT_STYLE.info;
      return <div className="mt-3 rounded-lg p-2 text-xs flex gap-2" style={{background:s.bg, border:`1px solid ${s.bd}`, color:s.tx}}><span>{s.icon}</span><span>{alert.text}</span></div>;
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => { if (codeRef.current && window.hljs) { codeRef.current.removeAttribute('data-highlighted'); window.hljs.highlightElement(codeRef.current); } }, [code]);
      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();
      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span><span className="w-3 h-3 rounded-full bg-yellow-400"></span><span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? '-ml-3 pl-2' : ''}`} style={isHi ? {background:'rgba(49,120,198,0.18)', borderLeft:`2px solid ${BRAND}`} : {}}>
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span><span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);
      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen px-4 py-6" style={{background:'linear-gradient(135deg,#eef4fb 0%,#dbeafe 100%)'}}>
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg text-white font-bold" style={{background:BRAND}}>TS</span>
              <div>
                <h1 className="text-2xl font-bold" style={{color:'#1e4a78'}}>II-2-1. conditional type + infer</h1>
                <p className="text-sm" style={{color:'#3178C6'}}>비유: 타입 if문 — T extends U ? X : Y</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs underline hover:no-underline" style={{color:BRAND}}>← 챕터 목록</a>
            </header>
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className="h-1.5 flex-1 rounded-full transition" style={{background: i <= stepIdx ? BRAND : '#bcd3ec'}} />
              ))}
            </div>
            <div className="mb-4 rounded-xl px-5 py-4 shadow text-white" style={{background:BRAND}}>
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>
            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} aria-label="처음으로" className="px-3 py-1.5 text-xs rounded bg-white" style={{border:`1px solid ${BRAND}`, color:BRAND}}>처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 text-xs rounded bg-white disabled:opacity-40" style={{border:`1px solid ${BRAND}`, color:BRAND}}>← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'} className="px-4 py-1.5 text-xs rounded font-bold text-white" style={{background:BRAND}}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} aria-label="다음 단계" className="px-3 py-1.5 text-xs rounded bg-white disabled:opacity-40" style={{border:`1px solid ${BRAND}`, color:BRAND}}>다음 →</button>
            </div>
            <div className="text-center text-[10px] mt-2" style={{color:'#3178C6aa'}}>키보드 ←/→ · 자동재생 3초/단계</div>
            {isLast && (
              <div className="mt-5 rounded-lg bg-white px-4 py-3 text-sm" style={{border:`2px solid ${BRAND}`, color:'#1e4a78'}}>
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                extends ? : 는 타입 레벨 if. infer 로 한 부분을 변수로 빼낸다.
              </div>
            )}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {["conditional","infer","Awaited","ReturnType"].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full" style={{background:'#eef4fb', color:'#1e4a78', border:'1px solid #bcd3ec'}}>#{k}</span>
              ))}
            </div>
            <nav className="mt-6 flex items-center justify-between text-xs" style={{color:BRAND}}>
              <a href="./II-1-2.html" className="underline hover:no-underline">← 이전</a>
              <a href="./II-2-2.html" className="underline hover:no-underline">다음 →</a>
            </nav>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
