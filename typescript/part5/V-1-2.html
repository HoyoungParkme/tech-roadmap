<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeScript 학습 — V-1-2. eslint + @typescript-eslint</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🚓</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const BRAND = '#3178C6';


    const STEPS = [
      {
        title:'Step 1. 왜 ESLint 도 필요한가',
        desc:'tsc 는 타입을 본다. ESLint 는 스타일, 안티패턴, 사용 규칙을 본다. console.log 남기기, 안 쓴 변수, await 깜빡 등은 tsc 가 안 잡는다.',
        rows:[
          {name:'tsc', desc:'타입 검사'},
          {name:'ESLint', desc:'스타일·안티패턴'},
          {name:'prettier', desc:'포맷'},
        ],
        alert:{tone:'info', text:'tsc + ESLint = 두 단계 방어선.'},
        code:{lang:'json', filename:'eslint.json', lines:[
          '{',
          '  "extends": [',
          '    "eslint:recommended",',
          '    "plugin:@typescript-eslint/recommended",',
          '    "plugin:@typescript-eslint/recommended-requiring-type-checking"',
          '  ],',
          '  "parser": "@typescript-eslint/parser",',
          '  "parserOptions": { "project": "./tsconfig.json" }',
          '}',
        ], highlight:[1,2,3,4,5,6,7,8,9]},
      },
      {
        title:'Step 2. 핵심 룰 — no-floating-promises, no-misused-promises',
        desc:'await 깜빡한 Promise 는 조용히 실패한다. no-floating-promises 가 잡는다. 또 if(promise) 같은 잘못된 사용은 no-misused-promises 가 잡는다. 둘 다 필수.',
        rows:[
          {name:'no-floating-promises', desc:'await/.catch 깜빡 방지'},
          {name:'no-misused-promises', desc:'잘못된 Promise 사용'},
          {name:'no-unused-vars', desc:'안 쓴 변수'},
        ],
        alert:{tone:'good', text:'운영 사고의 큰 한 줄기를 끊는다.'},
        code:{lang:'typescript', filename:'promises.ts', lines:[
          '// ✗ no-floating-promises 가 잡음',
          'async function bad() {',
          '  fetch("/x");        // await/.catch 없음 → 깜빡한 Promise',
          '}',
          '',
          '// ✓',
          'async function good() {',
          '  await fetch("/x");',
          '  // 또는',
          '  void fetch("/x");   // 의도적이라면 void 로 표시',
          '}',
          '',
          '// ✗ no-misused-promises',
          'if (asyncFn()) {}      // Promise 는 항상 truthy',
        ], highlight:[1,2,3,4,6,7,8,9,10,11,13,14]},
      },
      {
        title:'Step 3. consistent-type-imports / consistent-type-definitions',
        desc:'import type 으로 타입만 import 하면 번들에 포함되지 않는다. type vs interface 도 팀 컨벤션으로 강제할 수 있다.',
        rows:[
          {name:'consistent-type-imports', desc:'import type {…}'},
          {name:'consistent-type-definitions', desc:'interface or type'},
          {name:'사이드이펙트 없는 import', desc:'트리쉐이킹'},
        ],
        alert:{tone:'good', text:'번들 크기와 일관성을 동시에.'},
        code:{lang:'typescript', filename:'imports.ts', lines:[
          '// ✗ 값 + 타입 섞임 — type 도 번들로',
          'import { User, createUser } from "./user";',
          '',
          '// ✓ 타입만 분리',
          'import type { User } from "./user";',
          'import { createUser } from "./user";',
          '',
          '// .eslintrc',
          '// "@typescript-eslint/consistent-type-imports": "error"',
          '// "@typescript-eslint/consistent-type-definitions": ["error", "interface"]',
        ], highlight:[1,2,4,5,6,8,9,10]},
      },
      {
        title:'Step 4. 안전 룰 — strict-boolean-expressions, no-explicit-any',
        desc:'if (val) 같은 truthy 검사를 막아서 0, "", null 등의 의도하지 않은 처리 방지. any 사용도 막는다(필요하면 unknown 권장).',
        rows:[
          {name:'strict-boolean-expressions', desc:'명시적 비교 강제'},
          {name:'no-explicit-any', desc:'any 금지'},
          {name:'no-unsafe-*', desc:'any 통한 조작 금지'},
        ],
        alert:{tone:'info', text:'any 의 점진적 제거가 운영 안정의 핵심.'},
        code:{lang:'typescript', filename:'safe.ts', lines:[
          '// ✗',
          'if (count) { /* 0 이면 false … 의도? */ }',
          '',
          '// ✓',
          'if (count > 0) { /* 명시적 */ }',
          'if (str.length > 0) { /* 빈 문자열 처리 명시 */ }',
          '',
          '// any 대신 unknown',
          'function parse(s: string): unknown {',
          '  return JSON.parse(s);',
          '}',
          'const data = parse(input);',
          '// data 는 unknown 이므로 검증 후 사용 강제',
        ], highlight:[1,2,4,5,6,8,9,10,11,12,13]},
      },
      {
        title:'Step 5. 도입 전략 + autofix + CI',
        desc:'레거시에 모든 룰 한 번에 켜면 수천 개 경고. 새 코드에만 적용 (--max-warnings 0 + 변경 파일만) 또는 단계적 도입. autofix 로 절반은 자동. CI 에서 fail 처리.',
        rows:[
          {name:'recommended 부터', desc:'점진'},
          {name:'autofix', desc:'eslint --fix'},
          {name:'lint-staged', desc:'변경 파일만'},
          {name:'CI 차단', desc:'주요 룰은 error'},
        ],
        wins:[
          '핵심 룰: no-floating-promises, consistent-type-imports',
          'autofix 로 절반 이상 자동',
          'lint-staged + husky 로 PR 단계 차단',
          'CI 에서 tsc --noEmit + eslint 둘 다',
          '레거시는 변경 파일만 점진 적용',
        ],
        alert:{tone:'good', text:'정책은 자동화. 손으로 강제하지 않는다.'},
        code:{lang:'bash', filename:'ci.sh', lines:[
          '#!/usr/bin/env bash',
          '# CI 두 단계',
          'pnpm tsc --noEmit',
          'pnpm eslint . --ext .ts,.tsx --max-warnings 0',
          '',
          '# pre-commit (husky + lint-staged)',
          '# *.{ts,tsx}: eslint --fix; prettier --write',
        ], highlight:[1,2,3,4,6,7]},
      },
    ];

    function Rows({ rows }) {
      return (
        <div className="rounded-lg overflow-hidden bg-white" style={{border:`2px solid ${BRAND}`}}>
          <div className="px-3 py-1.5 text-xs font-bold text-white" style={{background:BRAND}}>🚓 핵심 ESLint 룰</div>
          <div className="p-3 space-y-2">
            {rows.map((r, i) => (
              <div key={i} className="flex items-center gap-2 text-xs">
                <span className="w-44 font-mono font-bold" style={{color:BRAND}}>{r.name}</span>
                <span className="flex-1 px-2 py-0.5 rounded font-mono" style={{background:'#eef4fb', color:'#1e4a78'}}>{r.desc}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }
    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl bg-white p-4 h-full flex flex-col" style={{border:`1px solid ${BRAND}`}}>
          <div className="mb-3 text-sm font-bold" style={{color:'#1e4a78'}}>tsc 가 못 잡는 안티패턴</div>
          <Rows rows={state.rows} />
          <WinsBox wins={state.wins} />
          <AlertBox alert={state.alert} />
        </div>
      );
    }

    function WinsBox({ wins, title }) {
      if (!wins) return null;
      return (
        <div className="mt-3 rounded-xl p-4" style={{border:`2px solid ${BRAND}`, background:'#eef4fb'}}>
          <div className="text-lg font-bold mb-2" style={{color:'#1e4a78'}}>🔷 {title || '핵심 정리'}</div>
          <ul className="space-y-1.5">
            {wins.map((w, i) => (
              <li key={i} className="text-sm flex gap-2" style={{color:'#1e4a78'}}><span style={{color:BRAND}}>✓</span><span>{w}</span></li>
            ))}
          </ul>
        </div>
      );
    }

    const ALERT_STYLE = {
      info:{bg:'#eef4fb', bd:'#bcd3ec', tx:'#1e4a78', icon:'💡'},
      warn:{bg:'#fef3c7', bd:'#fde68a', tx:'#92400e', icon:'⚠️'},
      danger:{bg:'#fee2e2', bd:'#fecaca', tx:'#991b1b', icon:'🚨'},
      good:{bg:'#dbf3e6', bd:'#86efac', tx:'#166534', icon:'✅'},
    };
    function AlertBox({ alert }) {
      if (!alert) return null;
      const s = ALERT_STYLE[alert.tone] || ALERT_STYLE.info;
      return <div className="mt-3 rounded-lg p-2 text-xs flex gap-2" style={{background:s.bg, border:`1px solid ${s.bd}`, color:s.tx}}><span>{s.icon}</span><span>{alert.text}</span></div>;
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => { if (codeRef.current && window.hljs) { codeRef.current.removeAttribute('data-highlighted'); window.hljs.highlightElement(codeRef.current); } }, [code]);
      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();
      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span><span className="w-3 h-3 rounded-full bg-yellow-400"></span><span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? '-ml-3 pl-2' : ''}`} style={isHi ? {background:'rgba(49,120,198,0.18)', borderLeft:`2px solid ${BRAND}`} : {}}>
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span><span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);
      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen px-4 py-6" style={{background:'linear-gradient(135deg,#eef4fb 0%,#dbeafe 100%)'}}>
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg text-white font-bold" style={{background:BRAND}}>TS</span>
              <div>
                <h1 className="text-2xl font-bold" style={{color:'#1e4a78'}}>V-1-2. eslint + @typescript-eslint</h1>
                <p className="text-sm" style={{color:'#3178C6'}}>비유: 교통경찰 — 컴파일러가 못 잡는 스타일/안티패턴 단속</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs underline hover:no-underline" style={{color:BRAND}}>← 챕터 목록</a>
            </header>
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className="h-1.5 flex-1 rounded-full transition" style={{background: i <= stepIdx ? BRAND : '#bcd3ec'}} />
              ))}
            </div>
            <div className="mb-4 rounded-xl px-5 py-4 shadow text-white" style={{background:BRAND}}>
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>
            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} aria-label="처음으로" className="px-3 py-1.5 text-xs rounded bg-white" style={{border:`1px solid ${BRAND}`, color:BRAND}}>처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 text-xs rounded bg-white disabled:opacity-40" style={{border:`1px solid ${BRAND}`, color:BRAND}}>← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'} className="px-4 py-1.5 text-xs rounded font-bold text-white" style={{background:BRAND}}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} aria-label="다음 단계" className="px-3 py-1.5 text-xs rounded bg-white disabled:opacity-40" style={{border:`1px solid ${BRAND}`, color:BRAND}}>다음 →</button>
            </div>
            <div className="text-center text-[10px] mt-2" style={{color:'#3178C6aa'}}>키보드 ←/→ · 자동재생 3초/단계</div>
            {isLast && (
              <div className="mt-5 rounded-lg bg-white px-4 py-3 text-sm" style={{border:`2px solid ${BRAND}`, color:'#1e4a78'}}>
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                tsc + eslint 두 단계 방어선. 룰은 점진적으로.
              </div>
            )}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {["eslint","typescript-eslint","rules","autofix"].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full" style={{background:'#eef4fb', color:'#1e4a78', border:'1px solid #bcd3ec'}}>#{k}</span>
              ))}
            </div>
            <nav className="mt-6 flex items-center justify-between text-xs" style={{color:BRAND}}>
              <a href="./V-1-1.html" className="underline hover:no-underline">← 이전</a>
              <a href="./V-2-1.html" className="underline hover:no-underline">다음 →</a>
            </nav>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
