<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — RAG vs GraphRAG 비교</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    I-1-2. RAG vs GraphRAG 비교 매트릭스
    학습 목표: 4개 축(검색/답변/정확도/비용)으로 두 방식의 차이를 안다.
    핵심 비유: "퍼즐 조각" (RAG) vs "완성된 지도" (GraphRAG)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 비교 데이터 — 4개 축
    const COMPARE = [
      {
        axis: 'search',
        label: '검색 방식',
        rag:       { icon: '🔎', title: '키워드/임베딩 유사도', detail: '"스티브 잡스" 단어와 비슷한 청크 top-K' },
        graphrag:  { icon: '🕸️', title: '엔티티 매칭 + 관계 탐색', detail: '"스티브 잡스" 노드 → 인접 노드 따라가기' },
      },
      {
        axis: 'answer',
        label: '답변 형태',
        rag:       { icon: '🧩', title: '청크 조각 모음', detail: '독립된 문장 3~5개 → LLM이 짜집기' },
        graphrag:  { icon: '🗺️', title: '경로(path) + 청크', detail: '관계가 명시된 경로 + 추가 컨텍스트' },
      },
      {
        axis: 'accuracy',
        label: '정확도 (멀티홉 질문)',
        rag:       { icon: '😐', title: '단편 정보엔 강하지만', detail: '여러 단계 추론 필요한 질문은 약함', score: '60%' },
        graphrag:  { icon: '🎯', title: '관계 따라 정확', detail: '"A의 멘토의 직업?" 같은 다단계 OK', score: '85%' },
      },
      {
        axis: 'cost',
        label: '비용 (구축 + 운영)',
        rag:       { icon: '💰', title: '낮음', detail: '임베딩만 만들면 끝. 인덱싱 1회', score: '저렴' },
        graphrag:  { icon: '💸', title: '높음', detail: '엔티티 추출 + 관계 추론 LLM 비용', score: '비쌈' },
      },
    ];

    const STEPS = [
      {
        title: 'Step 1. 검색 방식',
        desc: 'RAG는 텍스트 유사도로 청크 top-K를 가져온다. GraphRAG는 그래프에서 엔티티 노드를 찾고 관계를 따라간다. 비유: RAG는 "비슷한 페이지 펼쳐 보기", GraphRAG는 "지도에서 길 따라가기".',
        focus: 'search',
      },
      {
        title: 'Step 2. 답변 형태',
        desc: 'RAG는 흩어진 청크 조각들을 LLM이 짜집기 → 가끔 비논리적. GraphRAG는 노드 사이의 경로를 명시적으로 가져와 LLM에 줌 → 추론 사슬이 보존됨.',
        focus: 'answer',
      },
      {
        title: 'Step 3. 정확도 — 멀티홉 질문',
        desc: '"잡스의 멘토의 출신 종교는?" 같은 2~3단계 질문에서 차이가 명확. RAG는 직접 명시되지 않으면 "모름". GraphRAG는 노드 사이를 따라가 답을 찾을 수 있음.',
        focus: 'accuracy',
      },
      {
        title: 'Step 4. 비용 트레이드오프',
        desc: '구축 비용: GraphRAG는 엔티티 추출/관계 추론에 LLM을 많이 호출 (수백 달러~수천 달러 단위 인덱싱). 운영 비용: 비슷. 결정 기준: 데이터가 자주 멀티홉 질문을 받는다면 GraphRAG, 단순 FAQ면 RAG.',
        focus: 'cost',
      },
    ];

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 3200);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const focus = step.focus;

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">RAG vs GraphRAG 비교</h1>
                <p className="text-sm text-slate-500 mt-1">퍼즐 조각(RAG) vs 완성된 지도(GraphRAG) — 4축 비교</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* 4축 비교 카드 — focus 활성화 */}
            <div className="space-y-3 mb-6">
              {COMPARE.map((c) => {
                const isActive = c.axis === focus;
                return (
                  <div
                    key={c.axis}
                    className={`grid grid-cols-1 md:grid-cols-12 gap-3 transition-all ${isActive ? '' : 'opacity-40'}`}
                  >
                    <div className="md:col-span-2 flex items-center font-bold text-sm text-slate-700">
                      {isActive && <span className="text-amber-500 mr-1">▶</span>}
                      {c.label}
                    </div>
                    <div className={`md:col-span-5 bg-white rounded-xl border-2 p-3 ${isActive ? 'border-sky-400' : 'border-slate-200'}`}>
                      <div className="flex items-center gap-2 mb-1">
                        <span className="text-xl">{c.rag.icon}</span>
                        <span className="text-xs font-bold text-sky-700">RAG</span>
                        {c.rag.score && <span className="ml-auto text-[10px] text-slate-500">{c.rag.score}</span>}
                      </div>
                      <div className="text-xs font-bold text-slate-800">{c.rag.title}</div>
                      <div className="text-[11px] text-slate-600 mt-1">{c.rag.detail}</div>
                    </div>
                    <div className={`md:col-span-5 bg-white rounded-xl border-2 p-3 ${isActive ? 'border-violet-400' : 'border-slate-200'}`}>
                      <div className="flex items-center gap-2 mb-1">
                        <span className="text-xl">{c.graphrag.icon}</span>
                        <span className="text-xs font-bold text-violet-700">GraphRAG</span>
                        {c.graphrag.score && <span className="ml-auto text-[10px] text-slate-500">{c.graphrag.score}</span>}
                      </div>
                      <div className="text-xs font-bold text-slate-800">{c.graphrag.title}</div>
                      <div className="text-[11px] text-slate-600 mt-1">{c.graphrag.detail}</div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Step 4 추가: 결정 가이드 */}
            {focus === 'cost' && (
              <div className="bg-slate-800 text-white rounded-xl p-4 mb-6 text-sm">
                💡 <strong className="text-amber-300">언제 GraphRAG?</strong> 멀티홉 질문 많음 / 도메인 전문 / 계층형 요약 필요<br/>
                💡 <strong className="text-amber-300">언제 RAG?</strong> FAQ / 단순 검색 / 비용 민감 / 데이터 소규모
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
