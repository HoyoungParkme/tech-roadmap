    // 노드 종류별 색상
    // ─────────────────────────────────────────────────────
    const NODE_STYLE = {
      org:    { bg: 'bg-violet-100',  border: 'border-violet-400',  text: 'text-violet-800',  icon: '🏢' },
      city:   { bg: 'bg-amber-100',   border: 'border-amber-400',   text: 'text-amber-800',   icon: '🏙️' },
      person: { bg: 'bg-emerald-100', border: 'border-emerald-400', text: 'text-emerald-800', icon: '👤' },
      pending:{ bg: 'bg-slate-100',   border: 'border-slate-300 border-dashed', text: 'text-slate-400', icon: '❓' },
    };

    // 상태별 색상
    const STATUS_STYLE = {
      ok:       { card: 'bg-emerald-50 border-emerald-300', badge: 'bg-emerald-100 text-emerald-700', label: '✓ 성공' },
      thinking: { card: 'bg-yellow-50 border-yellow-300',   badge: 'bg-yellow-100 text-yellow-700',   label: '⋯ 진행중' },
      fail:     { card: 'bg-red-50 border-red-300',         badge: 'bg-red-100 text-red-700',         label: '✗ 실패' },
    };

    // ─────────────────────────────────────────────────────
    // RAG 시각화 — 청크 카드 + 선택 표시
    // ─────────────────────────────────────────────────────
    function RagPanel({ question, ragState }) {
      if (!ragState) return null;
      const status = STATUS_STYLE[ragState.status] || STATUS_STYLE.thinking;

      return (
        <div className={`rounded-lg border-2 p-3 transition-all ${status.card}`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🔎</span>
              <span className="text-xs font-bold text-slate-700">RAG · 청크 검색</span>
            </div>
            <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${status.badge}`}>{status.label}</span>
          </div>

          <div className="bg-white rounded px-2 py-1 mb-2 text-[11px] font-mono border border-slate-200">
            <span className="text-slate-400">Q:</span> {question}
          </div>

          <div className="text-[10px] text-slate-500 mb-1">top-3 청크 (cosine 유사도)</div>
          <div className="space-y-1 mb-2">
            {ragState.chunks.map((c) => (
              <div
                key={c.id}
                className={`flex items-center gap-2 text-[11px] rounded px-2 py-1 border transition-all ${
                  c.picked ? 'bg-violet-50 border-violet-300' : 'bg-white border-slate-200 opacity-60'
                }`}
              >
                <span className={`font-mono font-bold w-10 text-right ${c.picked ? 'text-violet-700' : 'text-slate-400'}`}>
                  {c.score.toFixed(2)}
                </span>
                <span className="flex-1 truncate text-slate-700">{c.text}</span>
                {c.picked && <span className="text-[10px] text-violet-600">✓ 선정</span>}
              </div>
            ))}
          </div>

          {ragState.missing && (
            <div className="text-[10px] text-red-600 italic mb-1">⚠ {ragState.missing}</div>
          )}

          <div className="bg-slate-800 text-white rounded px-2 py-1.5 mt-1">
            <div className="text-[9px] text-slate-400 uppercase tracking-wider mb-0.5">LLM 응답</div>
            <div className="text-[11px] font-mono leading-relaxed">{ragState.answer}</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // GraphRAG 시각화 — 노드 chain (traverse 경로)
    // ─────────────────────────────────────────────────────

      if (!graphState) return null;
      const status = STATUS_STYLE[graphState.status] || STATUS_STYLE.thinking;

      return (
        <div className={`rounded-lg border-2 p-3 transition-all ${status.card}`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🕸️</span>
              <span className="text-xs font-bold text-slate-700">GraphRAG · 그래프 traverse</span>
            </div>
            <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${status.badge}`}>{status.label}</span>
          </div>

          <div className="bg-white rounded px-2 py-1 mb-2 text-[11px] font-mono border border-slate-200">
            <span className="text-slate-400">Q:</span> {question}
          </div>

          <div className="text-[10px] text-slate-500 mb-1">노드 → 관계 → 노드 traverse 경로</div>

          {/* 노드 체인 (수평 흐름) */}
          <div className="bg-white rounded border border-slate-200 p-2 mb-2 overflow-x-auto">
            <div className="flex items-center gap-1 min-w-max">
              {graphState.path.map((p, i) => {
                if (p.kind === 'edge') {
                  return (
                    <div key={p.id} className="flex flex-col items-center px-1">
                      <span className={`text-[9px] font-mono px-1 ${p.active ? 'text-violet-700 font-bold' : 'text-slate-400'}`}>
                        {p.label}
                      </span>
                      <span className={`text-base ${p.active ? 'text-violet-600' : 'text-slate-300'}`}>
                        {p.active ? '→' : '⇢'}
                      </span>
                    </div>
                  );
                }
                const style = p.pending ? NODE_STYLE.pending : (NODE_STYLE[p.kind] || NODE_STYLE.org);
                return (
                  <div
                    key={p.id}
                    className={`flex flex-col items-center rounded-lg border-2 px-2 py-1.5 transition-all ${style.bg} ${style.border} ${
                      p.active ? '' : 'opacity-50'
                    } ${p.active && !p.pending ? 'shadow' : ''}`}
                  >
                    <span className="text-lg leading-none">{style.icon}</span>
                    <span className={`text-[10px] font-bold mt-0.5 whitespace-nowrap ${style.text}`}>{p.label}</span>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="bg-slate-800 text-white rounded px-2 py-1.5 mt-1">
            <div className="text-[9px] text-slate-400 uppercase tracking-wider mb-0.5">LLM 응답</div>
            <div className="text-[11px] font-mono leading-relaxed">{graphState.answer}</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 비교 테이블 (Step 5 전용)
    // ─────────────────────────────────────────────────────
    const COL_STYLE = {
      good: 'text-emerald-700',
      warn: 'text-yellow-700',
      crit: 'text-red-700 font-bold',
    };

    function CompareTablePanel({ rows }) {
      return (
        <div className="rounded-lg border-2 border-violet-300 bg-white p-3">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">⚖️</span>
            <span className="text-xs font-bold text-slate-700">RAG vs GraphRAG · 트레이드오프</span>
          </div>
          <table className="w-full text-[11px]">
            <thead>
              <tr className="border-b border-slate-200">
                <th className="text-left py-1.5 px-2 font-bold text-slate-600">지표</th>
                <th className="text-left py-1.5 px-2 font-bold text-sky-700">🔎 RAG</th>
                <th className="text-left py-1.5 px-2 font-bold text-violet-700">🕸️ GraphRAG</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r, i) => (
                <tr key={i} className="border-b border-slate-100 hover:bg-slate-50">
                  <td className="py-1.5 px-2 font-medium text-slate-700">{r.metric}</td>
                  <td className={`py-1.5 px-2 font-mono ${COL_STYLE[r.raglabel] || ''}`}>{r.rag}</td>
                  <td className={`py-1.5 px-2 font-mono ${COL_STYLE[r.glabel] || ''}`}>{r.graph}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div className="mt-2 text-[10px] text-slate-500 italic">
            * 정확도 수치는 도메인별 차이가 크다 — 사내 KG 품질에 좌우됨
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 상단 RAG / 하단 GraphRAG (Step 5는 비교 테이블)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📊 두 시스템 동시 비교</h2>
            <span className="text-[10px] text-slate-400 font-mono">
              {step.hopCount ? `${step.hopCount}-hop · live` : 'summary'}
            </span>
          </div>

          {step.compareTable ? (
            <CompareTablePanel rows={step.compareTable} />
          ) : (
            <div className="space-y-3">
              <RagPanel question={step.question} ragState={step.ragState} />
              <div className="flex items-center justify-center text-[10px] text-slate-400 font-mono">
                ── 같은 질문, 다른 동작 ──
              </div>
              <GraphPanel question={step.question} graphState={step.graphState} />
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        codeRef.current.removeAttribute('data-highlighted');
        codeRef.current.className = `language-${code.lang}`;
        codeRef.current.textContent = code.lines.join('\n');
        window.hljs.highlightElement(codeRef.current);
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-violet-500/15 border-l-2 border-violet-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-violet-700 hover:text-violet-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. GraphRAG 입문 &gt; Chapter 1. RAG와의 비교</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">RAG vs GraphRAG — 다중 hop 질문에서의 차이</h1>
                  <p className="text-sm text-slate-500 mt-0.5">청크 검색 vs 그래프 traverse — "본사 도시의 시장은?" 같은 2-hop을 어떻게 처리하나</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 추천 */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 text-sm text-violet-900">
                💡 다음(I-2-1)에서는 <strong>지식 그래프 자체</strong>를 어떻게 만드는지 — 엔티티/관계 추출 파이프라인을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-violet-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-violet-600 text-white hover:bg-violet-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; I-1-1 GraphRAG란</a>
              <a href="./I-2-1.html" className="text-violet-700 hover:text-violet-900 font-medium">I-2-1 지식 그래프 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
