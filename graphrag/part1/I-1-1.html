<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — GraphRAG란 무엇인가</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    I-1-1. GraphRAG란 무엇인가
    학습 목표: 일반 RAG와 GraphRAG가 같은 질문에 다르게 동작하는 이유를 안다.
    핵심 비유: "도서관 사서" — 키워드만 보는 사서(RAG) vs 책 사이 관계까지 보는 사서(GraphRAG)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 일반 RAG의 동작',
        desc: '학습자가 "스티브 잡스의 멘토는 누구였나?" 질문. RAG는 임베딩(키워드/의미 유사도) 기반으로 비슷한 문장을 찾는다. "스티브 잡스" 단어가 들어간 문장을 그대로 들고 와 LLM에 전달.',
        view: 'rag',
      },
      {
        title: 'Step 2. RAG의 한계 — 단편 정보',
        desc: '문제는 답이 한 문장에 직접 적혀 있어야 한다는 것. "잡스의 멘토는 X다"라고 명시된 문서가 없으면 RAG는 답을 모른다. 멀티홉(여러 단계 추론) 질문에 약하다.',
        view: 'limit',
      },
      {
        title: 'Step 3. 관계를 더하면 — Knowledge Graph',
        desc: '같은 자료를 그래프로 만들면: "스티브 잡스 → 가르침 받음 → 로버트 프리들랜드", "로버트 → 영적 멘토". 노드 사이의 관계가 명시되어 있어 한 노드에서 다른 노드로 따라갈 수 있다.',
        view: 'graph',
      },
      {
        title: 'Step 4. GraphRAG의 답변',
        desc: 'GraphRAG는 질문을 받으면 (1) 관련 노드 찾기 → (2) 관계 따라가며 컨텍스트 확장 → (3) LLM에 그래프 경로 + 텍스트 함께 제공. 결과: "스티브 잡스의 멘토는 로버트 프리들랜드입니다(영적 멘토). 인도 여행도 함께 했습니다." 같은 다단계 답변.',
        view: 'graphrag',
      },
    ];

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 3200);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const view = step.view;

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">GraphRAG란 무엇인가</h1>
                <p className="text-sm text-slate-500 mt-1">도서관 사서 비유 — 키워드만 보는 RAG vs 책 사이 관계까지 보는 GraphRAG</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* 질문 카드 (모든 step 공통) */}
            <div className="bg-slate-800 text-white rounded-xl p-4 mb-4 text-sm">
              <span className="text-amber-300 font-bold">❓ 질문:</span> "스티브 잡스의 멘토는 누구였나?"
            </div>

            {/* Step 1: RAG 흐름 */}
            {view === 'rag' && (
              <div className="bg-white rounded-xl border-2 border-sky-300 p-5 mb-6">
                <div className="font-bold text-sky-800 text-sm mb-3">📚 일반 RAG (키워드 유사도 검색)</div>
                <div className="space-y-2">
                  <div className="flex items-center gap-2 p-2 bg-sky-50 rounded text-xs">
                    <span className="text-lg">🔍</span>
                    <span className="text-slate-700"><strong>1.</strong> "스티브 잡스" 임베딩 → 벡터 DB 검색</span>
                  </div>
                  <div className="flex items-center gap-2 p-2 bg-sky-50 rounded text-xs">
                    <span className="text-lg">📄</span>
                    <span className="text-slate-700"><strong>2.</strong> 유사도 높은 문서 청크 3개 가져오기</span>
                  </div>
                  <div className="flex items-center gap-2 p-2 bg-sky-50 rounded text-xs">
                    <span className="text-lg">🤖</span>
                    <span className="text-slate-700"><strong>3.</strong> LLM에 청크 + 질문 → 답변 생성</span>
                  </div>
                </div>
              </div>
            )}

            {/* Step 2: 한계 */}
            {view === 'limit' && (
              <div className="bg-white rounded-xl border-2 border-rose-300 p-5 mb-6">
                <div className="font-bold text-rose-700 text-sm mb-3">⚠️ RAG의 한계</div>
                <div className="space-y-2">
                  <div className="p-3 bg-rose-50 rounded text-xs text-slate-700 leading-relaxed">
                    <strong>가져온 청크:</strong><br/>
                    📄 "스티브 잡스는 1955년 출생했다."<br/>
                    📄 "잡스는 애플의 창업자다."<br/>
                    📄 "잡스는 1974년 인도 여행을 떠났다."
                  </div>
                  <div className="p-3 bg-rose-100 border-l-4 border-rose-500 rounded text-xs text-rose-900">
                    <strong>LLM 답변:</strong> "정보가 부족해 잡스의 멘토를 알 수 없습니다."<br/>
                    → 멘토 관계가 한 문장에 명시되지 않으면 답을 못 함 (멀티홉 약점)
                  </div>
                </div>
              </div>
            )}

            {/* Step 3: Knowledge Graph */}
            {view === 'graph' && (
              <div className="bg-white rounded-xl border-2 border-emerald-300 p-5 mb-6">
                <div className="font-bold text-emerald-800 text-sm mb-3">🕸️ Knowledge Graph (관계 명시)</div>
                <div className="bg-slate-50 p-4 rounded">
                  <div className="flex flex-col items-center gap-2 text-xs">
                    <div className="flex items-center gap-3">
                      <div className="px-3 py-2 bg-violet-600 text-white rounded-full font-bold">스티브 잡스</div>
                    </div>
                    <div className="text-slate-500 text-[10px]">↓ 가르침 받음</div>
                    <div className="flex items-center gap-3">
                      <div className="px-3 py-2 bg-emerald-600 text-white rounded-full font-bold">로버트 프리들랜드</div>
                    </div>
                    <div className="text-slate-500 text-[10px]">↓ 멘토 관계</div>
                    <div className="flex items-center gap-3">
                      <div className="px-3 py-2 bg-amber-600 text-white rounded-full font-bold">영적 가르침 (인도, 1974)</div>
                    </div>
                  </div>
                </div>
                <div className="mt-3 p-3 bg-emerald-50 rounded text-[11px] text-emerald-900">
                  같은 정보가 노드(사람/사건)와 엣지(관계)로 분리되어 있다 → 한 노드에서 출발해 관계를 따라갈 수 있다.
                </div>
              </div>
            )}

            {/* Step 4: GraphRAG 답변 */}
            {view === 'graphrag' && (
              <div className="bg-white rounded-xl border-2 border-violet-400 p-5 mb-6">
                <div className="font-bold text-violet-800 text-sm mb-3">✨ GraphRAG (그래프 + LLM)</div>
                <div className="space-y-2">
                  <div className="flex items-center gap-2 p-2 bg-violet-50 rounded text-xs">
                    <span className="text-lg">📍</span>
                    <span className="text-slate-700"><strong>1.</strong> "스티브 잡스" 노드 찾기</span>
                  </div>
                  <div className="flex items-center gap-2 p-2 bg-violet-50 rounded text-xs">
                    <span className="text-lg">🔗</span>
                    <span className="text-slate-700"><strong>2.</strong> "가르침 받음" 관계 따라가기 → 로버트</span>
                  </div>
                  <div className="flex items-center gap-2 p-2 bg-violet-50 rounded text-xs">
                    <span className="text-lg">🔗</span>
                    <span className="text-slate-700"><strong>3.</strong> 인접 노드 추가 → "영적 가르침", "인도 여행"</span>
                  </div>
                  <div className="flex items-center gap-2 p-2 bg-violet-50 rounded text-xs">
                    <span className="text-lg">🤖</span>
                    <span className="text-slate-700"><strong>4.</strong> LLM에 그래프 경로 + 컨텍스트 → 풍부한 답변</span>
                  </div>
                  <div className="p-3 bg-emerald-50 border-l-4 border-emerald-500 rounded text-xs text-emerald-900 mt-2">
                    <strong>답변:</strong> "스티브 잡스의 영적 멘토는 로버트 프리들랜드입니다. 1974년 인도 여행도 함께 했습니다."
                  </div>
                </div>
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
