            <rect width={w} height={h} fill="url(#grid-vec)" />

            {/* 청크 점들 */}
            {chunks && chunks.map((c) => {
              const fill = c.hit ? '#7c3aed' : (c.faded ? '#cbd5e1' : '#a78bfa');
              const stroke = c.hit ? '#5b21b6' : (c.faded ? '#94a3b8' : '#7c3aed');
              const r = c.hit ? 12 : 8;
              return (
                <g key={c.id} className="transition-all duration-700">
                  {c.hit && (
                    <circle
                      cx={c.x}
                      cy={c.y}
                      r={20}
                      fill="none"
                      stroke="#7c3aed"
                      strokeWidth="2"
                      opacity="0.4"
                    >
                      <animate attributeName="r" from="14" to="24" dur="1.4s" repeatCount="indefinite" />
                      <animate attributeName="opacity" from="0.6" to="0" dur="1.4s" repeatCount="indefinite" />
                    </circle>
                  )}
                  <circle
                    cx={c.x}
                    cy={c.y}
                    r={r}
                    fill={fill}
                    stroke={stroke}
                    strokeWidth="2"
                    opacity={c.faded ? 0.35 : 1}
                  />
                  <text
                    x={c.x}
                    y={c.y - r - 4}
                    textAnchor="middle"
                    fontSize="9"
                    fontWeight={c.hit ? 'bold' : 'normal'}
                    fill={c.faded ? '#94a3b8' : '#4c1d95'}
                    fontFamily="monospace"
                  >
                    {c.label}
                  </text>
                </g>
              );
            })}

            {!chunks && (
              <text x={w / 2} y={h / 2} textAnchor="middle" fontSize="11" fill="#a78bfa" fontFamily="monospace">
                (청크 표현 사용 안 함)
              </text>
            )}
          </svg>
          <div className="text-[9px] text-violet-700 mt-1 text-center font-mono">
            {chunks ? '점 = 청크 임베딩 · 가까울수록 의미 유사' : '벡터 RAG 미사용'}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 SVG: 그래프 (노드 + 엣지)
    // ─────────────────────────────────────────────────────
    function GraphSpace({ graph }) {
      const w = 380;
      const h = 260;
      const nodeMap = buildNodeMap(graph);

      return (
        <div className="rounded-lg bg-gradient-to-br from-violet-50 to-violet-100 border border-violet-200 p-2">
          <div className="text-[11px] font-bold text-violet-800 mb-1 flex items-center gap-1">
            <span>🕸️</span>
            <span>지식 그래프 (엔티티 + 관계)</span>
          </div>
          <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
            {/* 격자 배경 */}
            <defs>
              <pattern id="grid-graph" width="30" height="30" patternUnits="userSpaceOnUse">
                <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e9d5ff" strokeWidth="0.5" />
              </pattern>
              <marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
                <path d="M0,0 L8,4 L0,8 Z" fill="#7c3aed" />
              </marker>
              <marker id="arrow-hit" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
                <path d="M0,0 L9,4.5 L0,9 Z" fill="#dc2626" />
              </marker>
            </defs>
            <rect width={w} height={h} fill="url(#grid-graph)" />

            {/* 엣지 먼저 그려야 노드 위로 안 가림 */}
            {graph && graph.edges.map((e, i) => {
              const a = nodeMap[e.from];
              const b = nodeMap[e.to];
              if (!a || !b) return null;
              const stroke = e.hit ? '#dc2626' : '#a78bfa';
              const strokeW = e.hit ? 2.5 : 1.5;
              const opacity = e.hit ? 1 : 0.5;
              const midX = (a.x + b.x) / 2;
              const midY = (a.y + b.y) / 2;
              return (
                <g key={`e${i}`} className="transition-all duration-700">
                  <line
                    x1={a.x}
                    y1={a.y}
                    x2={b.x}
                    y2={b.y}
                    stroke={stroke}
                    strokeWidth={strokeW}
                    opacity={opacity}
                    markerEnd={e.hit ? 'url(#arrow-hit)' : 'url(#arrow)'}
                  />
                  <text
                    x={midX}
                    y={midY - 3}
                    textAnchor="middle"
                    fontSize="8"
                    fontWeight={e.hit ? 'bold' : 'normal'}
                    fill={e.hit ? '#991b1b' : '#6d28d9'}
                    fontFamily="monospace"
                    opacity={e.hit ? 1 : 0.7}
                  >
                    {e.label}
                  </text>
                </g>
              );
            })}

            {/* 노드 */}
            {graph && graph.nodes.map((n) => {
              const fill = n.hit ? '#7c3aed' : '#ddd6fe';
              const stroke = n.hit ? '#4c1d95' : '#7c3aed';
              const textColor = n.hit ? 'white' : '#4c1d95';
              const r = n.hit ? 22 : 18;
              return (
                <g key={n.id} className="transition-all duration-700">
                  {n.hit && (
                    <circle
                      cx={n.x}
                      cy={n.y}
                      r={r + 6}
                      fill="none"
                      stroke="#7c3aed"
                      strokeWidth="2"
                      opacity="0.5"
                    >
                      <animate attributeName="r" from={r + 2} to={r + 12} dur="1.4s" repeatCount="indefinite" />
                      <animate attributeName="opacity" from="0.6" to="0" dur="1.4s" repeatCount="indefinite" />
                    </circle>
                  )}
                  <circle
                    cx={n.x}
                    cy={n.y}
                    r={r}
                    fill={fill}
                    stroke={stroke}
                    strokeWidth="2"
                  />
                  <text
                    x={n.x}
                    y={n.y + 3}
                    textAnchor="middle"
                    fontSize="10"
                    fontWeight="bold"
                    fill={textColor}
                    fontFamily="monospace"
                    pointerEvents="none"
                  >
                    {n.label}
                  </text>
                </g>
              );
            })}

            {!graph && (
              <text x={w / 2} y={h / 2} textAnchor="middle" fontSize="11" fill="#a78bfa" fontFamily="monospace">
                (Step 3에서 그래프 생성)
              </text>
            )}
          </svg>
          <div className="text-[9px] text-violet-700 mt-1 text-center font-mono">
            {graph ? '노드 = 엔티티 · 선 = 관계 (엣지 타입)' : '아직 그래프 없음'}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 비교 표 (Step 5)
    // ─────────────────────────────────────────────────────
    function CompareTable() {
      const rows = [
        { k: '데이터 표현',  rag: '벡터 점(point)',     graph: '엔티티 노드 + 관계 엣지' },
        { k: '검색 단계',    rag: '1단계 (top-k)',      graph: '다중 hop traverse' },
        { k: '관계 보존',    rag: '✗ 청크 단위 단편',    graph: '✓ 명시적 엣지' },
        { k: '다중 hop',     rag: '✗ 약함',             graph: '✓ 강함' },
        { k: '인덱싱 비용',  rag: '낮음 (임베딩만)',    graph: '높음 (LLM 추출 추가)' },
        { k: '질의 비용',    rag: '낮음',               graph: '중간~높음' },
        { k: '적합 질문',    rag: '"X 알려줘"',          graph: '"X와 Y의 관계?"' },
      ];

      return (
        <div className="rounded-lg bg-white border-2 border-violet-300 overflow-hidden">
          <div className="bg-violet-100 px-3 py-2 border-b border-violet-200">
            <div className="text-xs font-bold text-violet-900">📊 벡터 RAG vs GraphRAG</div>
          </div>
          <table className="w-full text-[11px]">
            <thead>
              <tr className="bg-violet-50 text-left">
                <th className="px-3 py-2 font-bold text-violet-700 w-1/4">기준</th>
                <th className="px-3 py-2 font-bold text-slate-700">벡터 RAG</th>
                <th className="px-3 py-2 font-bold text-violet-700">GraphRAG</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r, i) => (
                <tr key={r.k} className={i % 2 === 0 ? 'bg-white' : 'bg-violet-50/40'}>
                  <td className="px-3 py-1.5 font-bold text-slate-700 border-r border-slate-100">{r.k}</td>
                  <td className="px-3 py-1.5 text-slate-700 font-mono">{r.rag}</td>
                  <td className="px-3 py-1.5 text-violet-800 font-mono font-semibold">{r.graph}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌(벡터공간) + 우(그래프) + 질문/답
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const ansStyle = {
        unknown: 'bg-slate-50 border-slate-300 text-slate-600',
        fail:    'bg-red-50 border-red-400 text-red-800',
        success: 'bg-emerald-50 border-emerald-400 text-emerald-800',
      };

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 도서관 사서 — 벡터 vs 그래프</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 비교 표 (Step 5에서만) */}
          {step.showCompare ? (
            <CompareTable />
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mb-3">
              <VectorSpace chunks={step.chunks} />
              <GraphSpace graph={step.graph} />
            </div>
          )}

          {/* 질문 + 답 박스 */}
          {!step.showCompare && step.question && (
            <div className="mt-3 space-y-2">
              <div className="rounded-lg bg-violet-600 text-white p-3 flex items-start gap-2 shadow-sm">
                <span className="text-lg leading-none">❓</span>
                <div className="flex-1">
                  <div className="text-[10px] uppercase tracking-wider text-violet-200 font-bold">사용자 질문</div>
                  <div className="text-sm font-bold mt-0.5">{step.question}</div>
                </div>
              </div>

              {step.answer && (
                <div className={`rounded-lg border-2 p-3 flex items-start gap-2 ${ansStyle[step.answerType]}`}>
                  <span className="text-lg leading-none">
                    {step.answerType === 'success' ? '✅' : step.answerType === 'fail' ? '⚠️' : '💬'}
                  </span>
                  <div className="flex-1">
                    <div className="text-[10px] uppercase tracking-wider font-bold opacity-70">시스템 응답</div>
                    <div className="text-sm font-medium mt-0.5">{step.answer}</div>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* 범례 */}
          {!step.showCompare && (
            <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
              <span className="flex items-center gap-1">
                <span className="w-2.5 h-2.5 rounded-full" style={{ background: '#a78bfa' }}></span>
                일반 청크/노드
              </span>
              <span className="flex items-center gap-1">
                <span className="w-2.5 h-2.5 rounded-full" style={{ background: '#7c3aed' }}></span>
                검색 매칭
              </span>
              <span className="flex items-center gap-1">
                <span className="w-3 h-0.5" style={{ background: '#dc2626' }}></span>
                traverse 경로
              </span>
              <span className="flex items-center gap-1 ml-auto">
                <span className="w-2.5 h-2.5 rounded-full bg-slate-300"></span>
                미사용
              </span>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-violet-500/15 border-l-2 border-violet-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-violet-700 hover:text-violet-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. GraphRAG 기초 &gt; Chapter 1. RAG에서 GraphRAG로</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">GraphRAG란 무엇인가</h1>
                  <p className="text-sm text-slate-500 mt-0.5">도서관 사서 — 벡터 RAG의 한계와 그래프로 관계 보존</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 text-sm text-violet-900">
                💡 다음(I-1-2)에서는 <strong>지식 그래프</strong>의 구성 요소(엔티티/관계/속성)와 모델링 원칙을 자세히 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-violet-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-violet-600 text-white hover:bg-violet-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./I-1-2.html" className="text-violet-700 hover:text-violet-900 font-medium">I-1-2 지식 그래프 구성요소 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
