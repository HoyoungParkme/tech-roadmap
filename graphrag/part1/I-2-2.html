<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — 한계와 비용</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    I-2-2. GraphRAG의 한계와 비용
    학습 목표: GraphRAG 도입 전 검토할 비용/복잡도 요소를 안다.
    핵심 비유: "맞춤정장 vs 기성복" — 정확하지만 비싸다.
    구조: 4단계 (인덱싱 비용 / 구축 시간 / 유지보수 / 결정 체크리스트)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 비용 비교 — 4축 (RAG 대비 GraphRAG 배수)
    const COSTS = [
      {
        key: 'index',
        emoji: '💰',
        label: '인덱싱 비용',
        rag: { value: 1, text: '$10~50 (임베딩 1회)' },
        graphrag: { value: 50, text: '$500~5,000 (LLM 호출 수만 회)' },
      },
      {
        key: 'time',
        emoji: '⏱️',
        label: '구축 시간',
        rag: { value: 1, text: '수 분~수십 분' },
        graphrag: { value: 30, text: '수 시간~수일 (100MB 기준)' },
      },
      {
        key: 'maintain',
        emoji: '🔧',
        label: '유지보수',
        rag: { value: 1, text: '청크 추가만' },
        graphrag: { value: 10, text: '관계 재계산 + 정합성 모니터링' },
      },
    ];

    const CHECKLIST = [
      { id: 'q1', text: '단일 질문에 대부분 답할 수 있다 (멀티홉 거의 없음)' },
      { id: 'q2', text: '데이터가 자주 추가/수정된다 (실시간성 중요)' },
      { id: 'q3', text: '월 인덱싱 비용 $100 이내로 묶고 싶다' },
      { id: 'q4', text: '도메인이 일반 상식 범위 (전문 지식 X)' },
      { id: 'q5', text: '청크 단위 답변으로 사용자가 만족한다' },
    ];

    const STEPS = [
      {
        title: 'Step 1. 인덱싱 비용 — 한 번에 수백~수천 달러',
        desc: 'GraphRAG 인덱싱은 텍스트 → 엔티티 추출 → 관계 추론을 모두 LLM으로 한다. 100MB 책 한 권에 LLM 호출이 수만 회. GPT-4 기준 $500~$5,000 단위가 흔하다. RAG는 임베딩만 하므로 같은 분량에 $10~$50.',
        focus: 'index',
      },
      {
        title: 'Step 2. 구축 시간 — 수 시간~수일',
        desc: '비용뿐 아니라 시간도 길다. 100MB 텍스트가 LLM API 응답 대기로 수 시간~수일 걸린다. RAG는 GPU/임베딩 모델로 분 단위. 데이터가 자주 바뀌면 GraphRAG 재인덱싱이 부담.',
        focus: 'time',
      },
      {
        title: 'Step 3. 유지보수 — 정합성 관리가 일이다',
        desc: '관계가 잘못 추출됐는지 모니터링해야 한다. 데이터 갱신 시 영향받는 노드/엣지만 부분 재계산하는 전략이 필요. 그래프가 커질수록 schema drift / orphan node 같은 문제가 누적된다. RAG는 청크 추가만 하면 끝.',
        focus: 'maintain',
      },
      {
        title: 'Step 4. 결정 체크리스트 — "RAG로 충분한가?"',
        desc: '아래 5개 중 3개 이상 ✅면 RAG가 합리적. GraphRAG는 비용/시간/유지보수가 RAG의 10~50배라는 사실을 직시한다. "맞춤정장이 필요한가, 기성복으로 충분한가"의 문제.',
        focus: 'checklist',
      },
    ];

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [checked, setChecked] = useState({});
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 3500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const toggleCheck = (id) => {
        setChecked((prev) => ({ ...prev, [id]: !prev[id] }));
      };

      const checkedCount = CHECKLIST.filter((c) => checked[c.id]).length;
      const ragRecommended = checkedCount >= 3;

      const step = STEPS[currentStep];
      const focus = step.focus;

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">GraphRAG의 한계와 비용</h1>
                <p className="text-sm text-slate-500 mt-1">맞춤정장 vs 기성복 — 정확하지만 비싸다</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* 비용 비교 막대 */}
            <div className="space-y-3 mb-6">
              {COSTS.map((c) => {
                const isActive = c.key === focus;
                const ragWidth = Math.min(100, c.rag.value * 2);
                const graphragWidth = Math.min(100, c.graphrag.value * 2);
                return (
                  <div
                    key={c.key}
                    className={`bg-white rounded-xl border-2 p-4 transition-all ${
                      isActive ? 'border-violet-400 shadow-md' : 'border-slate-200 opacity-40'
                    }`}
                  >
                    <div className="flex items-center gap-2 mb-3">
                      {isActive && <span className="text-amber-500">▶</span>}
                      <span className="text-xl">{c.emoji}</span>
                      <span className="font-bold text-slate-800 text-sm">{c.label}</span>
                      <span className="ml-auto text-[11px] text-slate-500">RAG 대비 ×{c.graphrag.value / c.rag.value}</span>
                    </div>
                    <div className="space-y-2">
                      <div>
                        <div className="flex items-center gap-2 mb-1">
                          <span className="text-[10px] font-bold text-sky-700 w-20">RAG</span>
                          <span className="text-[11px] text-slate-600">{c.rag.text}</span>
                        </div>
                        <div className="h-3 bg-slate-100 rounded-full overflow-hidden">
                          <div className="h-full bg-sky-400 rounded-full" style={{ width: ragWidth + '%' }} />
                        </div>
                      </div>
                      <div>
                        <div className="flex items-center gap-2 mb-1">
                          <span className="text-[10px] font-bold text-violet-700 w-20">GraphRAG</span>
                          <span className="text-[11px] text-slate-600">{c.graphrag.text}</span>
                        </div>
                        <div className="h-3 bg-slate-100 rounded-full overflow-hidden">
                          <div className="h-full bg-violet-500 rounded-full" style={{ width: graphragWidth + '%' }} />
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Step 4: 결정 체크리스트 */}
            {focus === 'checklist' && (
              <div className="bg-white rounded-xl shadow-sm border-2 border-violet-300 p-4 mb-6">
                <div className="flex items-center gap-2 mb-3">
                  <span className="text-2xl">✍️</span>
                  <span className="font-bold text-slate-800">RAG로 충분한지 체크 (3개 이상 ✅면 RAG 권장)</span>
                  <span className="ml-auto text-xs font-bold text-slate-700">{checkedCount} / {CHECKLIST.length}</span>
                </div>
                <div className="space-y-2">
                  {CHECKLIST.map((q) => (
                    <label key={q.id} className="flex items-start gap-2 p-2 rounded-md hover:bg-slate-50 cursor-pointer">
                      <input
                        type="checkbox"
                        checked={!!checked[q.id]}
                        onChange={() => toggleCheck(q.id)}
                        className="mt-0.5 w-4 h-4 accent-violet-600"
                        aria-label={q.text}
                      />
                      <span className="text-xs text-slate-700">{q.text}</span>
                    </label>
                  ))}
                </div>
                <div className={`mt-3 rounded-lg p-3 text-sm font-bold ${
                  ragRecommended
                    ? 'bg-sky-50 border border-sky-200 text-sky-800'
                    : 'bg-violet-50 border border-violet-200 text-violet-800'
                }`}>
                  {ragRecommended ? '🔎 RAG로 충분합니다 — 비용 대비 효율이 좋습니다.' : '🕸️ GraphRAG 도입을 검토할 만합니다 — 비용을 감수할 가치가 있습니다.'}
                </div>
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
