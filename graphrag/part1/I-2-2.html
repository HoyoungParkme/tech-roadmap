          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">📊 비용/경로/결정 시뮬레이션</h2>
            <span className="text-[10px] text-slate-400 font-mono">RAG vs GraphRAG · live</span>
          </div>

          {/* focus = build / maintain / compare → 막대 그래프 */}
          {bars && (
            <div className="space-y-3">
              {BAR_META.map((m) => {
                const b = bars[m.key];
                const ragPct = Math.min(100, b.rag * 8);
                const grPct  = Math.min(100, b.graphrag * 2);
                const ratio  = (b.graphrag / b.rag).toFixed(1);
                return (
                  <div key={m.key} className="rounded-lg border-2 border-violet-200 bg-violet-50/30 p-3">
                    <div className="flex items-center gap-2 mb-2">
                      <span aria-hidden="true">{m.emoji}</span>
                      <span className="font-bold text-slate-800 text-sm">{m.name}</span>
                      <span className="ml-auto text-[10px] font-bold px-1.5 py-0.5 rounded bg-violet-100 text-violet-700">
                        × {ratio}
                      </span>
                    </div>

                    {/* RAG 막대 */}
                    <div className="mb-1.5">
                      <div className="flex items-center gap-2 mb-0.5">
                        <span className="text-[10px] font-bold text-sky-700 w-20">RAG</span>
                        <span className="text-[11px] text-slate-600 tabular-nums">{b.ragText}</span>
                      </div>
                      <div className="h-3 bg-slate-100 rounded-full overflow-hidden">
                        <div
                          className="h-full bg-sky-400 rounded-full transition-all duration-700"
                          style={{ width: ragPct + '%' }}
                        />
                      </div>
                    </div>

                    {/* GraphRAG 막대 */}
                    <div>
                      <div className="flex items-center gap-2 mb-0.5">
                        <span className="text-[10px] font-bold text-violet-700 w-20">GraphRAG</span>
                        <span className="text-[11px] text-slate-600 tabular-nums">{b.graphragText}</span>
                      </div>
                      <div className="h-3 bg-slate-100 rounded-full overflow-hidden">
                        <div
                          className="h-full bg-violet-500 rounded-full transition-all duration-700"
                          style={{ width: grPct + '%' }}
                        />
                      </div>
                    </div>

                    <div className="text-[10px] text-slate-500 mt-1.5">{m.sub}</div>
                  </div>
                );
              })}
            </div>
          )}

          {/* focus = inference → 다중 hop path 폭증 */}
          {paths && (
            <div className="space-y-2">
              <div className="text-[11px] text-slate-500 mb-2">
                노드당 평균 이웃 5개라고 가정 — depth 깊어질수록 경로가 지수 증가.
              </div>
              {paths.map((p) => {
                const style = PATH_LEVEL_STYLE[p.level];
                // 로그 스케일 — 5 ~ 3125 사이를 0~100% 로
                const pct = Math.min(100, (Math.log10(p.count) / Math.log10(3125)) * 100);
                return (
                  <div key={p.depth} className="rounded-lg border-2 border-violet-200 bg-violet-50/30 p-3">
                    <div className="flex items-center gap-2 mb-2">
                      <span className="font-mono text-xs font-bold text-slate-700 w-16">depth = {p.depth}</span>
                      <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${style.badge}`}>
                        {p.label}
                      </span>
                      <span className="ml-auto text-[10px] text-slate-500 font-mono">5 ^ {p.depth}</span>
                    </div>
                    <div className="h-3 bg-slate-100 rounded-full overflow-hidden">
                      <div
                        className={`h-full transition-all duration-700 ${style.bar}`}
                        style={{ width: pct + '%' }}
                      />
                    </div>
                    <div className={`text-[10px] mt-1 font-mono ${style.text}`}>
                      {p.count.toLocaleString()} paths · 25ms/path → {(p.count * 25).toLocaleString()} ms
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* focus = decide → 의사결정 트리 */}
          {decision && (
            <div className="space-y-3">
              <div className="text-center bg-violet-700 text-white rounded-lg py-3 px-4 font-bold shadow">
                ❓ {decision.question}
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                {decision.branches.map((b) => {
                  const isViolet = b.tone === 'violet';
                  return (
                    <div
                      key={b.answer}
                      className={`rounded-lg border-2 p-3 ${
                        isViolet
                          ? 'border-violet-400 bg-violet-50'
                          : 'border-sky-400 bg-sky-50'
                      }`}
                    >
                      <div className="flex items-center gap-2 mb-2">
                        <span
                          className={`text-xs font-bold px-2 py-0.5 rounded ${
                            isViolet ? 'bg-violet-200 text-violet-800' : 'bg-sky-200 text-sky-800'
                          }`}
                        >
                          {b.answer}
                        </span>
                        <span className={`text-sm font-bold ${isViolet ? 'text-violet-800' : 'text-sky-800'}`}>
                          {b.verdict}
                        </span>
                      </div>
                      <ul className="text-[11px] text-slate-700 space-y-1 mb-2">
                        {b.examples.map((ex, i) => (
                          <li key={i} className="flex gap-1">
                            <span className="text-slate-400">•</span>
                            <span>{ex}</span>
                          </li>
                        ))}
                      </ul>
                      <div
                        className={`text-[11px] font-medium ${
                          isViolet ? 'text-violet-700' : 'text-sky-700'
                        }`}
                      >
                        {b.hint}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* alert 박스 */}
          {showAlert && alertText && (
            <div className="mt-4 p-3 rounded-lg bg-rose-50 border-2 border-rose-400">
              <div className="flex items-center gap-2 text-rose-800 font-bold text-sm">
                <span>{alertText}</span>
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-sky-400"></span>RAG
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-violet-500"></span>GraphRAG
            </span>
            {paths && (
              <>
                <span className="flex items-center gap-1">
                  <span className="w-2.5 h-2.5 rounded bg-emerald-400"></span>안전
                </span>
                <span className="flex items-center gap-1">
                  <span className="w-2.5 h-2.5 rounded bg-amber-400"></span>주의
                </span>
                <span className="flex items-center gap-1">
                  <span className="w-2.5 h-2.5 rounded bg-rose-500"></span>위험
                </span>
              </>
            )}
            <span className="ml-auto font-mono">focus = {focus}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js (python/markdown)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          codeRef.current.textContent = code.lines.join('\n');
          window.hljs.highlightElement(codeRef.current);
          setRenderedLines(codeRef.current.innerHTML.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-violet-500/10 border-l-2 border-violet-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 4 버튼 컨트롤 + 키보드 + 3000ms 자동재생
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-violet-700 hover:text-violet-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">
                curriculum I-2-2
              </span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">
                  I
                </div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">
                    Part I. GraphRAG 기초 &gt; Chapter 2. 도입 의사결정
                  </div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">한계와 비용</h1>
                  <p className="text-sm text-slate-500 mt-0.5">
                    맞춤정장 vs 기성복 — 그래프 구축 비용 · 유지보수 부담 · 추론 시간 폭증
                  </p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 hint */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 text-sm text-violet-900">
                💡 다음 챕터(Part II)부터는 GraphRAG가 실제로 어떻게 만들어지는지 — 엔티티 추출 / 그래프 구축 / 검색 / 응답 4단계를 차례대로 본다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-violet-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-violet-600 text-white hover:bg-violet-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-2-1.html" className="text-slate-500 hover:text-slate-700">
                &larr; I-2-1 빛나는 시나리오
              </a>
              <a href="../index.html" className="text-violet-700 hover:text-violet-900 font-medium">
                허브로 &rarr;
              </a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
