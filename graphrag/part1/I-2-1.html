            </pattern>
            <marker id="arrow-violet" viewBox="0 0 10 10" refX="9" refY="5"
              markerWidth="6" markerHeight="6" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
            </marker>
            <marker id="arrow-ghost" viewBox="0 0 10 10" refX="9" refY="5"
              markerWidth="6" markerHeight="6" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#cbd5e1"/>
            </marker>
          </defs>
          <rect width={svgW} height={svgH} fill="url(#grid)"/>

          {/* 엣지 (노선) */}
          {TRANSIT_EDGES.map((e) => {
            const from = TRANSIT_NODES.find((n) => n.id === e.from);
            const to = TRANSIT_NODES.find((n) => n.id === e.to);
            const active = isEdgeActive(e.from, e.to);
            const color = active ? LINE_COLOR[e.kind] : LINE_COLOR.ghost;
            const midX = (from.x + to.x) / 2;
            const midY = (from.y + to.y) / 2;

            return (
              <g key={`${e.from}-${e.to}`}>
                <line
                  x1={from.x + 24}
                  y1={from.y}
                  x2={to.x - 24}
                  y2={to.y}
                  stroke={color.stroke}
                  strokeWidth={active ? 4 : 2}
                  strokeDasharray={color.dash}
                  markerEnd={active ? 'url(#arrow-violet)' : 'url(#arrow-ghost)'}
                  className="transition-all duration-700"
                />
                <rect
                  x={midX - 38}
                  y={midY - 22}
                  width="76"
                  height="16"
                  rx="3"
                  fill={active ? '#ede9fe' : '#f8fafc'}
                  stroke={active ? '#7c3aed' : '#cbd5e1'}
                  strokeWidth="1"
                />
                <text
                  x={midX}
                  y={midY - 11}
                  textAnchor="middle"
                  fontSize="9"
                  fill={active ? '#5b21b6' : '#94a3b8'}
                  fontFamily="monospace"
                  fontWeight={active ? 'bold' : 'normal'}
                >
                  {e.label}
                </text>
              </g>
            );
          })}

          {/* 노드 (역) */}
          {TRANSIT_NODES.map((n) => {
            const active = isNodeActive(n.id);
            const r = active ? 26 : 22;
            return (
              <g key={n.id} className="transition-all duration-500">
                <circle
                  cx={n.x}
                  cy={n.y}
                  r={r}
                  fill={active ? '#8b5cf6' : '#e2e8f0'}
                  stroke={active ? '#6d28d9' : '#94a3b8'}
                  strokeWidth={active ? 3 : 2}
                  className={active ? 'drop-shadow-md' : ''}
                />
                {active && (
                  <circle
                    cx={n.x}
                    cy={n.y}
                    r={r + 4}
                    fill="none"
                    stroke="#a78bfa"
                    strokeWidth="2"
                    opacity="0.5"
                  >
                    <animate attributeName="r" from={r + 4} to={r + 12} dur="1.5s" repeatCount="indefinite"/>
                    <animate attributeName="opacity" from="0.5" to="0" dur="1.5s" repeatCount="indefinite"/>
                  </circle>
                )}
                <text
                  x={n.x}
                  y={n.y + 4}
                  textAnchor="middle"
                  fontSize="14"
                  fontWeight="bold"
                  fill={active ? '#ffffff' : '#475569'}
                >
                  {n.emoji}
                </text>
                <text
                  x={n.x}
                  y={n.y + r + 14}
                  textAnchor="middle"
                  fontSize="11"
                  fontWeight="bold"
                  fill={active ? '#5b21b6' : '#64748b'}
                  fontFamily="monospace"
                >
                  {n.label}
                </text>
              </g>
            );
          })}
        </svg>
      );
    }

    // ─────────────────────────────────────────────────────
    // 도메인 mini 그래프 SVG (Step 4~5)
    // ─────────────────────────────────────────────────────
    function DomainMiniGraph({ graph }) {
      const svgW = 340;
      const svgH = 160;

      return (
        <svg viewBox={`0 0 ${svgW} ${svgH}`} className="w-full h-auto">
          {/* 엣지 */}
          {graph.edges.map((e, i) => {
            const from = graph.nodes.find((n) => n.id === e.from);
            const to = graph.nodes.find((n) => n.id === e.to);
            const midX = (from.x + to.x) / 2;
            const midY = (from.y + to.y) / 2;
            return (
              <g key={i}>
                <line
                  x1={from.x}
                  y1={from.y}
                  x2={to.x}
                  y2={to.y}
                  stroke="#a78bfa"
                  strokeWidth="1.5"
                  opacity="0.7"
                />
                <text
                  x={midX}
                  y={midY - 3}
                  textAnchor="middle"
                  fontSize="8"
                  fill="#7c3aed"
                  fontFamily="monospace"
                  opacity="0.8"
                >
                  {e.label}
                </text>
              </g>
            );
          })}

          {/* 노드 */}
          {graph.nodes.map((n) => {
            const c = NODE_COLOR[n.color] || NODE_COLOR.violet;
            return (
              <g key={n.id}>
                <circle
                  cx={n.x}
                  cy={n.y}
                  r="20"
                  fill={c.fill}
                  stroke={c.stroke}
                  strokeWidth="2"
                />
                <text
                  x={n.x}
                  y={n.y + 4}
                  textAnchor="middle"
                  fontSize="9"
                  fontWeight="bold"
                  fill={c.text}
                  fontFamily="sans-serif"
                >
                  {n.label.length > 5 ? n.label.slice(0, 5) : n.label}
                </text>
              </g>
            );
          })}
        </svg>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 시각화
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const isTransit = step.mode === 'transit';

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">
              {isTransit ? '🗺️ 환승 경로 그래프 — 강남 → 해운대' : '🌐 도메인별 그래프 — 4가지 시나리오'}
            </h2>
            <span className="text-[10px] text-slate-400 font-mono">
              {isTransit ? 'transit-graph · live' : '4 domains · grid'}
            </span>
          </div>

          {/* 질문 / 답변 박스 (transit 모드) */}
          {isTransit && step.showQuery && (
            <div className="mb-3 p-2.5 rounded-lg bg-violet-50 border border-violet-200">
              <div className="text-xs font-bold text-violet-700 mb-0.5">질문</div>
              <div className="text-sm text-violet-900 font-mono">{step.queryLine}</div>
            </div>
          )}

          {/* 그래프 본체 */}
          {isTransit ? (
            <div className="rounded-lg bg-gradient-to-b from-violet-50 to-violet-100 border border-violet-200 p-2">
              <TransitGraph activeNodes={step.activeNodes} activeEdges={step.activeEdges}/>
            </div>
          ) : (
            <div className="grid grid-cols-2 gap-2">
              {DOMAIN_GRAPHS.map((g) => (
                <div
                  key={g.key}
                  className="rounded-lg bg-gradient-to-b from-violet-50 to-white border border-violet-200 p-2"
                >
                  <div className="flex items-center gap-1.5 mb-1">
                    <span>{g.emoji}</span>
                    <span className="text-xs font-bold text-violet-800">{g.name}</span>
                    <span className="text-[10px] text-slate-500 ml-auto">{g.gist}</span>
                  </div>
                  <DomainMiniGraph graph={g}/>
                  <div className="text-[10px] text-slate-600 mt-1 font-mono leading-tight">
                    {g.question}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* 답변 박스 (transit 모드) */}
          {isTransit && step.showAnswer && (
            <div className={`mt-3 p-3 rounded-lg border-2 ${
              step.answerKind === 'rag-fail'
                ? 'bg-rose-50 border-rose-300'
                : 'bg-emerald-50 border-emerald-300 animate-pulse-slow'
            }`}>
              <div className={`text-xs font-bold mb-1 ${
                step.answerKind === 'rag-fail' ? 'text-rose-700' : 'text-emerald-700'
              }`}>
                {step.answerKind === 'rag-fail' ? 'RAG 결과' : 'GraphRAG 결과'}
              </div>
              <div className={`text-sm font-mono ${
                step.answerKind === 'rag-fail' ? 'text-rose-900' : 'text-emerald-900'
              }`}>
                {step.answerText}
              </div>
            </div>
          )}

          {/* 의사결정 매트릭스 (Step 5) */}
          {step.showDecision && (
            <div className="mt-3 grid grid-cols-2 gap-2">
              <div className="rounded-lg bg-violet-50 border-2 border-violet-300 p-2.5">
                <div className="text-xs font-bold text-violet-800 mb-1.5">✅ GraphRAG 권장</div>
                <ul className="text-[10px] text-violet-900 space-y-0.5">
                  <li>• 멀티홉 추론 / 환승형 질문</li>
                  <li>• 의료·법률 — 누락 위험 높음</li>
                  <li>• 인용·계보·네트워크 분석</li>
                  <li>• 책 한 권 통째 요약</li>
                </ul>
              </div>
              <div className="rounded-lg bg-sky-50 border-2 border-sky-300 p-2.5">
                <div className="text-xs font-bold text-sky-800 mb-1.5">🔎 RAG로 충분</div>
                <ul className="text-[10px] text-sky-900 space-y-0.5">
                  <li>• 단순 FAQ / 단발 질문</li>
                  <li>• 자주 갱신되는 콘텐츠</li>
                  <li>• 데이터셋이 작다</li>
                  <li>• 비용·복잡도 최소화</li>
                </ul>
              </div>
            </div>
          )}

          {/* 범례 */}
          {isTransit && (
            <div className="flex flex-wrap gap-2 text-[10px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
              <span className="flex items-center gap-1">
                <span className="w-3 h-3 rounded-full bg-violet-500"></span>활성 노드
              </span>
              <span className="flex items-center gap-1">
                <span className="w-3 h-3 rounded-full bg-slate-300"></span>비활성
              </span>
              <span className="flex items-center gap-1 ml-auto">
                <span className="w-4 h-0.5 bg-violet-700"></span>traverse 경로
              </span>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js (cypher)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          // cypher는 hljs 기본 언어가 아닐 수 있음 → sql로 대체 highlight
          const lang = code.lang === 'cypher' ? 'sql' : code.lang;
          codeRef.current.className = `language-${lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden */}
          <pre className="hidden">
            <code ref={codeRef}>{code.lines.join('\n')}</code>
          </pre>

          {/* 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-violet-500/10 border-l-2 border-violet-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.lang}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-violet-700 hover:text-violet-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. GraphRAG 입문 &gt; Chapter 2. 언제 GraphRAG?</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">GraphRAG가 빛나는 시나리오</h1>
                  <p className="text-sm text-slate-500 mt-0.5">멀티홉 추론 = 환승 경로 찾기 — 시나리오·도메인 4종·의사결정</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step}/>
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length}/>
            </div>

            {/* 마지막 단계 hint */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 text-sm text-violet-900">
                💡 다음(I-2-2)에서는 <strong>GraphRAG 비용 vs 효과</strong> — 인덱싱 비용·정확도·복잡도를 정량 비교
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-violet-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-violet-600 text-white hover:bg-violet-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-1-2.html" className="text-slate-500 hover:text-slate-700">&larr; I-1-2 GraphRAG vs RAG</a>
              <a href="./I-2-2.html" className="text-violet-700 hover:text-violet-900 font-medium">I-2-2 비용 vs 효과 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
