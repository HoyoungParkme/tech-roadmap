<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — 빛나는 시나리오</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    I-2-1. GraphRAG가 빛나는 시나리오
    학습 목표: GraphRAG가 RAG보다 명확히 우월한 3가지 시나리오를 안다.
    핵심 비유: 멀티홉 추론 = "지도에서 환승 경로 찾기"
    구조: 4단계 (멀티홉 질문 / 도메인 지식 / 계층형 요약 / 의사결정 매트릭스)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SCENARIOS = [
      {
        key: 'multihop',
        emoji: '🗺️',
        title: '멀티홉(multi-hop) 질문',
        gist: '여러 단계 추론이 필요한 질문',
        rag: { result: '"명시되지 않음" / 부정확', tone: 'red' },
        graphrag: { result: '관계를 따라 정확히 도달', tone: 'emerald' },
      },
      {
        key: 'domain',
        emoji: '🏥',
        title: '도메인 전문 지식',
        gist: '의료/법률/연구 — 엔티티 관계가 정밀해야 하는 분야',
        rag: { result: '키워드 일치만 → 위험한 누락', tone: 'red' },
        graphrag: { result: '엔티티 간 정확한 관계 보존', tone: 'emerald' },
      },
      {
        key: 'summary',
        emoji: '📚',
        title: '계층형(hierarchical) 요약',
        gist: '책 한 권 → 챕터 → 인물 관계망 → 통합 요약',
        rag: { result: '청크 단위 요약 — 맥락 단절', tone: 'red' },
        graphrag: { result: 'Community Detection으로 계층 자동', tone: 'emerald' },
      },
    ];

    const SCENARIO_BORDER = {
      multihop: 'border-violet-400',
      domain:   'border-violet-400',
      summary:  'border-violet-400',
    };

    const TONE_BG = {
      red:     'bg-rose-50 border-rose-200 text-rose-800',
      emerald: 'bg-emerald-50 border-emerald-200 text-emerald-800',
    };

    const STEPS = [
      {
        title: 'Step 1. 멀티홉 질문 — "스티브 잡스의 멘토가 졸업한 학교는?"',
        desc: 'RAG는 한 번의 검색으로 "잡스 + 멘토 + 학교" 전부 들어간 청크를 찾아야 한다. 그런 청크가 텍스트에 직접 없으면 "모름". GraphRAG는 (잡스)→[:HAD_MENTOR]→(멘토)→[:GRADUATED_FROM]→(학교)로 두 번 따라가면 답을 찾는다. 비유: "지도에서 환승 경로 찾기" — 직항이 없어도 갈 수 있다.',
        focus: 'multihop',
      },
      {
        title: 'Step 2. 도메인 전문 지식 — 약물 상호작용',
        desc: '"약 A와 약 B를 같이 먹어도 되나?" 의료 RAG는 키워드 매칭으로 답하다 위험할 수 있다. GraphRAG는 (약 A)-[:INTERACTS_WITH]-(약 B) 관계를 명시적으로 가져와 "함께 복용 금지"를 정확히 답한다. 법률(판례 인용 관계), 연구(논문 인용 그래프)도 동일.',
        focus: 'domain',
      },
      {
        title: 'Step 3. 계층형 요약 — 책 한 권 통째로 이해',
        desc: 'RAG는 책을 청크 1000개로 잘라 검색 → 일부 페이지만 본 답. GraphRAG는 인물/사건 관계망 → 챕터별 클러스터 → 책 전체 요약을 만든다. Microsoft GraphRAG 논문의 핵심 — "From Local to Global" 검색이 가능해진다.',
        focus: 'summary',
      },
      {
        title: 'Step 4. 의사결정 — 언제 GraphRAG를 쓸까?',
        desc: '비용을 감수할 가치가 있는 시나리오 = 멀티홉 / 도메인 / 계층 요약. 단순 FAQ, 단발 질문, 데이터가 작으면 RAG로 충분. 다음 시각화(I-2-2)에서 비용을 자세히 본다.',
        focus: 'decision',
      },
    ];

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 3500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const focus = step.focus;

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">GraphRAG가 빛나는 시나리오</h1>
                <p className="text-sm text-slate-500 mt-1">멀티홉 추론 = 지도에서 환승 경로 찾기 — 3가지 시나리오 + 의사결정</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* 3가지 시나리오 카드 */}
            <div className="space-y-3 mb-6">
              {SCENARIOS.map((s) => {
                const isActive = s.key === focus;
                return (
                  <div
                    key={s.key}
                    className={`bg-white rounded-xl border-2 p-4 transition-all ${
                      isActive ? `${SCENARIO_BORDER[s.key]} shadow-md` : 'border-slate-200 opacity-40'
                    }`}
                  >
                    <div className="flex items-center gap-2 mb-2">
                      {isActive && <span className="text-amber-500">▶</span>}
                      <span className="text-2xl">{s.emoji}</span>
                      <span className="font-bold text-slate-800">{s.title}</span>
                      <span className="text-xs text-slate-500 ml-auto">{s.gist}</span>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mt-3">
                      <div className={`rounded-lg border p-2 text-xs ${TONE_BG[s.rag.tone]}`}>
                        <span className="font-bold mr-1">RAG:</span>{s.rag.result}
                      </div>
                      <div className={`rounded-lg border p-2 text-xs ${TONE_BG[s.graphrag.tone]}`}>
                        <span className="font-bold mr-1">GraphRAG:</span>{s.graphrag.result}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Step 4: 의사결정 매트릭스 */}
            {focus === 'decision' && (
              <div className="bg-white rounded-xl shadow-sm border-2 border-violet-300 p-4 mb-6">
                <div className="flex items-center gap-2 mb-3">
                  <span className="text-2xl">🧭</span>
                  <span className="font-bold text-slate-800">의사결정 매트릭스 — 언제 GraphRAG?</span>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                  <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3">
                    <div className="text-xs font-bold text-emerald-800 mb-2">✅ GraphRAG 권장</div>
                    <ul className="text-[11px] text-emerald-900 space-y-1">
                      <li>• 멀티홉 질문이 잦다</li>
                      <li>• 도메인 정확도가 중요하다 (의료/법률)</li>
                      <li>• 책/문서 전체를 통째로 이해해야 한다</li>
                      <li>• 비용/시간 여유가 있다</li>
                    </ul>
                  </div>
                  <div className="bg-sky-50 border border-sky-200 rounded-lg p-3">
                    <div className="text-xs font-bold text-sky-800 mb-2">🔎 RAG로 충분</div>
                    <ul className="text-[11px] text-sky-900 space-y-1">
                      <li>• 단순 FAQ / 단발 질문</li>
                      <li>• 데이터가 작거나 자주 갱신된다</li>
                      <li>• 비용을 최대한 줄여야 한다</li>
                      <li>• 청크 단위 답으로 충분하다</li>
                    </ul>
                  </div>
                </div>
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
