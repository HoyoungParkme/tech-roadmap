<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — Neo4j 개론</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    III-1-1. Neo4j 개론
    학습 목표: Neo4j를 RDB와 비교해 언제 쓰는지 안다.
    핵심 비유: "친구의 친구를 7번 거치는 질문" — RDB는 JOIN 7번 vs Neo4j 인덱스 무관 횡단
    구조: 4단계 (RDB 한계 / 인덱스 무관 / 언제 / 생태계)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 비교 데이터 — RDB vs Neo4j 7-홉 친구 관계
    const PERFORMANCE = [
      { hops: 1, rdb: '0.01s',  neo4j: '0.001s', rdbWidth: 1,  neo4jWidth: 1  },
      { hops: 3, rdb: '0.5s',   neo4j: '0.003s', rdbWidth: 15, neo4jWidth: 1  },
      { hops: 5, rdb: '12s',    neo4j: '0.005s', rdbWidth: 50, neo4jWidth: 1  },
      { hops: 7, rdb: '5분+',   neo4j: '0.01s',  rdbWidth: 90, neo4jWidth: 2  },
    ];

    // 사용 시나리오
    const USE_CASES = [
      { fit: 'good', icon: '✅', title: '추천 시스템', desc: '"내 친구가 좋아한 상품" 다단계 횡단' },
      { fit: 'good', icon: '✅', title: '사기 탐지',   desc: '계좌→이체→계좌 패턴 탐색' },
      { fit: 'good', icon: '✅', title: '지식 그래프', desc: 'GraphRAG, 위키데이터형 데이터' },
      { fit: 'bad',  icon: '❌', title: '단순 CRUD',  desc: '한 테이블 INSERT/SELECT만이라면 RDB' },
      { fit: 'bad',  icon: '❌', title: '대용량 집계', desc: '수억 행 합계/평균은 분석 DB(BigQuery 등)' },
    ];

    // 생태계
    const ECOSYSTEM = [
      { name: 'Neo4j Desktop', role: '로컬 개발',  note: '무료, 로컬 인스턴스 + 브라우저 UI' },
      { name: 'Neo4j Aura',    role: '클라우드',   note: 'Free Tier(50K 노드), 빠른 시작' },
      { name: 'Bolt 프로토콜', role: '연결',       note: '바이너리 프로토콜, 드라이버 8개+ 언어' },
      { name: 'Cypher',        role: '쿼리 언어',  note: 'ASCII art 패턴 매칭 (다음 시각화)' },
      { name: 'APOC',          role: '확장 함수',  note: '500+ 유틸리티 (CSV import, JSON 등)' },
      { name: 'GDS',           role: 'ML/그래프',  note: 'Graph Data Science — Louvain, PageRank' },
    ];

    const FIT_STYLE = {
      good: 'bg-emerald-50 border-emerald-200',
      bad:  'bg-rose-50 border-rose-200',
    };

    const STEPS = [
      {
        title: 'Step 1. RDB의 한계 — 7-홉 친구 질문',
        desc: '"내 친구의 친구의 친구의 ... (7번) 친구는?" 질문에 RDB는 friends 테이블을 7번 JOIN해야 한다. 데이터가 1만 명만 되어도 7번째 JOIN이 분 단위. 인덱스가 도와도 한계 명확.',
        focus: 'rdb',
      },
      {
        title: 'Step 2. Neo4j — 인덱스 무관 횡단',
        desc: 'Neo4j는 각 노드가 인접 리스트(이웃 노드 포인터)를 직접 들고 있다. 한 hop = 포인터 한 번 따라가기 = O(1). 7-홉도 0.01초 안에 끝난다. 성능 차이가 hop 수에 따라 기하급수적으로 벌어진다.',
        focus: 'neo4j',
      },
      {
        title: 'Step 3. 언제 Neo4j? 언제 RDB?',
        desc: '관계 횡단이 핵심이면 Neo4j (추천/사기 탐지/지식 그래프). 단일 행 CRUD나 대용량 집계는 RDB나 분석 DB가 더 적합. GraphRAG는 관계 중심이라 Neo4j가 사실상 표준.',
        focus: 'fit',
      },
      {
        title: 'Step 4. Neo4j 생태계',
        desc: 'Neo4j Desktop(로컬)·Aura(클라우드)로 시작. Bolt 프로토콜로 연결, Cypher로 쿼리. APOC로 유틸 확장, GDS로 그래프 머신러닝. 다음 시각화에서 Cypher 직접 작성을 시작한다.',
        focus: 'ecosystem',
      },
    ];

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 3500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const focus = step.focus;
      // 성능 막대는 Step 1~3에서 노출, Step 4(ecosystem)에서는 생태계 패널만 보여줌
      const showPerformance = focus !== 'ecosystem';
      const showNeo = focus === 'neo4j' || focus === 'fit';

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Neo4j 개론</h1>
                <p className="text-sm text-slate-500 mt-1">7-홉 친구의 친구 — RDB JOIN 분 단위 vs Neo4j 0.01초</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* Step 1~3: 성능 비교 막대 (Step 4 ecosystem에서는 숨김) */}
            {showPerformance && (
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-6">
                <div className="text-xs font-bold text-slate-700 mb-3">⏱ "친구의 친구..." N-hop 응답 시간</div>
                <div className="space-y-3">
                  {PERFORMANCE.map((p) => (
                    <div key={p.hops}>
                      <div className="flex items-baseline gap-2 text-xs mb-1">
                        <span className="font-mono font-bold text-slate-700 w-12">{p.hops}-hop</span>
                      </div>
                      <div className="space-y-1">
                        <div className="flex items-center gap-2">
                          <span className="text-[10px] font-bold text-rose-700 w-16 shrink-0">RDB JOIN</span>
                          <div className="flex-1 h-3 bg-slate-100 rounded-full overflow-hidden">
                            <div className="h-full bg-rose-400 rounded-full transition-all" style={{ width: p.rdbWidth + '%' }} />
                          </div>
                          <span className="text-[10px] font-mono text-slate-600 w-12 text-right">{p.rdb}</span>
                        </div>
                        {showNeo && (
                          <div className="flex items-center gap-2">
                            <span className="text-[10px] font-bold text-blue-700 w-16 shrink-0">Neo4j</span>
                            <div className="flex-1 h-3 bg-slate-100 rounded-full overflow-hidden">
                              <div className="h-full bg-blue-500 rounded-full transition-all" style={{ width: p.neo4jWidth + '%' }} />
                            </div>
                            <span className="text-[10px] font-mono text-slate-600 w-12 text-right">{p.neo4j}</span>
                          </div>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
                <div className="text-[10px] text-slate-500 mt-3">※ 데이터 1만 명 친구 관계 그래프 기준 추정. RDB는 hop마다 인덱스 룩업 + 중복 제거.</div>
              </div>
            )}

            {/* Step 3: 사용 시나리오 */}
            {focus === 'fit' && (
              <div className="bg-white rounded-xl shadow-sm border-2 border-blue-300 p-4 mb-6">
                <div className="text-xs font-bold text-blue-700 mb-3">🎯 언제 Neo4j?</div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                  {USE_CASES.map((u) => (
                    <div key={u.title} className={`rounded-lg border p-3 ${FIT_STYLE[u.fit]}`}>
                      <div className="flex items-center gap-2 mb-1">
                        <span>{u.icon}</span>
                        <span className="font-bold text-sm text-slate-800">{u.title}</span>
                      </div>
                      <div className="text-[11px] text-slate-600">{u.desc}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Step 4: 생태계 */}
            {focus === 'ecosystem' && (
              <div className="bg-white rounded-xl shadow-sm border-2 border-blue-300 p-4 mb-6">
                <div className="text-xs font-bold text-blue-700 mb-3">🛠 Neo4j 생태계</div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                  {ECOSYSTEM.map((e) => (
                    <div key={e.name} className="bg-blue-50 border border-blue-200 rounded-lg p-3">
                      <div className="flex items-baseline gap-2 mb-1">
                        <span className="font-bold text-blue-900 text-sm">{e.name}</span>
                        <span className="text-[10px] bg-blue-200 text-blue-900 px-1.5 py-0.5 rounded">{e.role}</span>
                      </div>
                      <div className="text-[11px] text-slate-600">{e.note}</div>
                    </div>
                  ))}
                </div>
                <div className="bg-slate-900 rounded-md mt-4 p-3 font-mono text-xs text-blue-300">
                  → 다음 시각화(III-1-2)에서 Cypher로 노드/관계 직접 만들기 시작
                </div>
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
