    function GraphPreview({ graph }) {
      if (!graph) {
        return (
          <div className="h-28 flex items-center justify-center text-[11px] text-slate-400 italic font-mono bg-slate-50 rounded border border-dashed border-slate-300">
            그래프 결과가 여기에 표시됩니다 (Step 3+)
          </div>
        );
      }
      const w = 360;
      const h = 180;
      const radius = 22;
      return (
        <div className="bg-slate-50 rounded border border-slate-200 p-1">
          <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
            {/* 관계 (먼저 그려야 노드 아래로) */}
            {graph.edges.map((e, i) => {
              const a = graph.nodes.find((n) => n.id === e.from);
              const b = graph.nodes.find((n) => n.id === e.to);
              if (!a || !b) return null;
              const mx = (a.x + b.x) / 2;
              const my = (a.y + b.y) / 2 - 6;
              return (
                <g key={`e${i}`}>
                  <defs>
                    <marker id={`arrow-${i}`} viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                      <path d="M0,0 L10,5 L0,10 z" fill="#64748b" />
                    </marker>
                  </defs>
                  <line
                    x1={a.x} y1={a.y}
                    x2={b.x} y2={b.y}
                    stroke="#64748b" strokeWidth="1.5"
                    markerEnd={`url(#arrow-${i})`}
                  />
                  <text x={mx} y={my} textAnchor="middle" fontSize="9" fill="#475569" fontFamily="monospace">
                    :{e.label}
                  </text>
                </g>
              );
            })}
            {/* 노드 */}
            {graph.nodes.map((n) => (
              <g key={n.id}>
                <circle cx={n.x} cy={n.y} r={radius} fill={n.color} stroke="#4c1d95" strokeWidth="2" />
                <text x={n.x} y={n.y + 3} textAnchor="middle" fontSize="9" fill="white" fontWeight="bold">
                  {n.name}
                </text>
                <text x={n.x} y={n.y + radius + 11} textAnchor="middle" fontSize="8" fill="#64748b" fontFamily="monospace">
                  :{n.label}
                </text>
              </g>
            ))}
          </svg>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // ClusterView — Step 5 클러스터 토폴로지 SVG
    // ─────────────────────────────────────────────────────
    function ClusterView({ cluster }) {
      if (!cluster) return null;
      const w = 420;
      const h = 160;
      const coreY = 50;
      const replicaY = 130;
      const coreSpacing = w / (cluster.cores.length + 1);
      const replicaSpacing = w / (cluster.replicas.length + 1);
      return (
        <div className="bg-gradient-to-b from-violet-50 to-violet-100 rounded-lg border border-violet-200 p-2 mt-2">
          <div className="text-[10px] text-violet-700 font-bold mb-1">
            🌐 Causal Cluster — Core 3 (Raft) + Read Replicas
          </div>
          <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
            {/* 점선 그룹 박스 */}
            <rect x="8" y="22" width={w - 16} height="56" rx="6"
                  fill="none" stroke="#a78bfa" strokeWidth="1" strokeDasharray="3 2" />
            <text x={w / 2} y="20" textAnchor="middle" fontSize="9" fill="#6d28d9" fontFamily="monospace">
              Core Servers (Raft 쿼럼)
            </text>
            {/* Cores */}
            {cluster.cores.map((c, i) => {
              const x = coreSpacing * (i + 1);
              const isLeader = c.role === 'LEADER';
              return (
                <g key={c.id}>
                  <rect
                    x={x - 50} y={coreY - 14} width="100" height="34" rx="6"
                    fill={isLeader ? '#7c3aed' : '#ede9fe'}
                    stroke={isLeader ? '#4c1d95' : '#a78bfa'}
                    strokeWidth={isLeader ? 2.5 : 1.5}
                  />
                  <text x={x} y={coreY - 1} textAnchor="middle" fontSize="9.5" fontWeight="bold"
                        fill={isLeader ? 'white' : '#4c1d95'} fontFamily="monospace">
                    {isLeader ? '★ ' : ''}{c.label}
                  </text>
                  <text x={x} y={coreY + 12} textAnchor="middle" fontSize="8.5"
                        fill={isLeader ? '#ddd6fe' : '#6d28d9'} fontFamily="monospace">
                    {c.role}
                  </text>
                </g>
              );
            })}
            {/* Core 사이 Raft 연결선 */}
            <line x1={coreSpacing} y1={coreY + 8} x2={coreSpacing * cluster.cores.length} y2={coreY + 8}
                  stroke="#a78bfa" strokeWidth="1" strokeDasharray="2 2" />

            {/* Replicas */}
            <rect x="8" y={replicaY - 18} width={w - 16} height="40" rx="6"
                  fill="none" stroke="#86efac" strokeWidth="1" strokeDasharray="3 2" />
            <text x={w / 2} y={replicaY - 22} textAnchor="middle" fontSize="9" fill="#15803d" fontFamily="monospace">
              Read Replicas (수평 확장)
            </text>
            {cluster.replicas.map((r, i) => {
              const x = replicaSpacing * (i + 1);
              return (
                <g key={r.id}>
                  <rect x={x - 45} y={replicaY - 10} width="90" height="24" rx="6"
                        fill="#dcfce7" stroke="#22c55e" strokeWidth="1.5" />
                  <text x={x} y={replicaY + 5} textAnchor="middle" fontSize="9.5" fontWeight="bold"
                        fill="#15803d" fontFamily="monospace">
                    {r.label}
                  </text>
                </g>
              );
            })}

            {/* Leader → Replica 복제 화살표 */}
            <defs>
              <marker id="repl-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
                <path d="M0,0 L10,5 L0,10 z" fill="#22c55e" />
              </marker>
            </defs>
            {cluster.replicas.map((r, i) => {
              const x = replicaSpacing * (i + 1);
              const leaderX = coreSpacing;
              return (
                <line key={`repl${i}`}
                      x1={leaderX} y1={coreY + 20}
                      x2={x} y2={replicaY - 10}
                      stroke="#22c55e" strokeWidth="1.2" strokeDasharray="2 2"
                      markerEnd="url(#repl-arrow)" opacity="0.6" />
              );
            })}
          </svg>
          <div className="text-[9.5px] text-slate-600 mt-1 font-mono leading-snug">
            <span className="text-violet-700 font-bold">★ Leader</span> = 쓰기 ·
            <span className="text-violet-700 font-bold"> Follower</span> = Raft 합의 ·
            <span className="text-emerald-700 font-bold"> Replica</span> = 읽기 부하 분산
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — Neo4j 컨테이너 박스 + 외부 클라이언트 + Cypher 입력 + 그래프 결과
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📓 Neo4j 컨테이너</h2>
            <span className="text-[10px] text-slate-400 font-mono">live · violet</span>
          </div>

          {/* 외부 클라이언트 */}
          <div className="grid grid-cols-2 gap-2 mb-3">
            {step.external.length === 0 ? (
              <div className="col-span-2 rounded-lg bg-slate-50 border border-dashed border-slate-300 p-2 text-center text-[11px] text-slate-400 italic">
                외부 클라이언트는 Step 2부터 연결됩니다
              </div>
            ) : (
              step.external.map((c) => (
                <div key={c.id} className="rounded-lg bg-slate-50 border border-slate-300 p-2 flex items-center gap-2">
                  <span className="text-lg">{c.kind === 'browser' ? '🌐' : '🐍'}</span>
                  <div className="flex-1">
                    <div className="text-xs font-bold text-slate-800">{c.label}</div>
                    <div className="text-[10px] text-slate-500 font-mono">→ {c.via}</div>
                  </div>
                  <span className="text-violet-500 text-lg animate-pulse">↓</span>
                </div>
              ))
            )}
          </div>

          {/* Neo4j 컨테이너 박스 */}
          <div className="relative rounded-xl border-2 border-violet-500 bg-gradient-to-br from-violet-50 via-white to-violet-50 p-3 shadow-inner">
            <div className="absolute -top-2.5 left-3 bg-white px-2 text-[10px] font-mono text-violet-700 font-bold">
              container: neo4j:5
            </div>

            {/* 포트 표시 */}
            <div className="flex flex-wrap gap-2 mb-3 mt-1">
              {step.ports.map((p) => (
                <div
                  key={p.num}
                  className={`text-[10px] font-mono px-2 py-1 rounded border transition-all ${
                    p.hot
                      ? 'bg-violet-600 text-white border-violet-700 shadow-md animate-pulse'
                      : 'bg-white text-violet-700 border-violet-300'
                  }`}
                >
                  :{p.num} <span className="opacity-80">· {p.label}</span>
                </div>
              ))}
            </div>

            {/* 내부 컴포넌트 그리드 */}
            <div className="grid grid-cols-2 gap-2">
              {step.components.map((c) => {
                const s = COMP_STYLE[c.color] || COMP_STYLE.violet;
                return (
                  <div
                    key={c.id}
                    className={`rounded-lg border-2 p-2.5 transition-all duration-500 ${s.bg} ${s.border} ${
                      c.hot ? 'ring-2 ring-offset-1 ring-violet-400' : ''
                    }`}
                  >
                    <div className="flex items-center gap-2 mb-0.5">
                      <span className={`w-2 h-2 rounded-full ${s.dot} ${c.hot ? 'animate-pulse' : ''}`}></span>
                      <span className={`text-xs font-bold ${s.text}`}>{c.label}</span>
                    </div>
                    <div className="text-[10px] text-slate-600 font-mono ml-4">{c.sub}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Cypher 입력 박스 + 결과 미리보기 */}
          <div className="mt-3 rounded-lg border border-slate-300 overflow-hidden">
            <div className="bg-slate-800 text-violet-300 text-[11px] font-mono px-3 py-1.5 flex items-center gap-2">
              <span className="text-violet-400">cypher&gt;</span>
              <span className="text-slate-100 truncate">{step.cypher}</span>
              {step.cypherStatus === 'success' && (
                <span className="ml-auto text-[9px] text-emerald-400 font-bold">✓ OK</span>
              )}
              {step.cypherStatus === 'idle' && (
                <span className="ml-auto text-[9px] text-slate-500 font-bold">idle</span>
              )}
            </div>
            <div className="p-2 bg-white">
              <GraphPreview graph={step.graph} />
            </div>
          </div>

          {/* Step 5 클러스터 뷰 */}
          {step.showCluster && <ClusterView cluster={step.cluster} />}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-violet-500"></span>Neo4j 코어</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-sky-500"></span>HTTP/Browser</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-fuchsia-500"></span>Bolt</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-500"></span>Storage</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-amber-500"></span>TX/Raft</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-violet-500/15 border-l-2 border-violet-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-violet-700 hover:text-violet-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Neo4j &amp; Cypher &gt; Chapter 1. Neo4j 시작</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Neo4j 개론</h1>
                  <p className="text-sm text-slate-500 mt-0.5">대표 Property Graph DB — 컨테이너 1개에서 클러스터까지</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 text-sm text-violet-900">
                💡 다음(III-1-2)에서는 <strong>Cypher 기본 문법</strong> — CREATE / MATCH / WHERE / RETURN을 직접 작성해본다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-violet-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-violet-600 text-white hover:bg-violet-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./III-1-2.html" className="text-violet-700 hover:text-violet-900 font-medium">III-1-2 Cypher 기본 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
