<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — III-2-1. Cypher 고급 (다중 hop · OPTIONAL · WITH · 집계 · UNION)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    III-2-1. Cypher 고급 — 다중 hop · OPTIONAL MATCH · WITH · 집계 · UNION
    학습 목표: GraphRAG 검색을 떠받치는 Cypher 5대 무기를 단계별 시뮬레이션으로 익힌다.
    핵심 비유: 지하철 환승도(노선) — 여러 정거장을 한 번에, 환승역에서 흐름을 갈아탄다
    패턴: fastapi v1 — 좌(LiveDataPane: SVG 그래프 + 결과 표) / 우(VSCode CodeViewer)
    색상: graphrag violet
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 그래프 데이터 (사람 5명 + 회사 2개)
    //   사람 노드: Alice → Bob → Carol → Dave → Eve (KNOWS 체인)
    //   회사 노드: Acme, Globex (WORKS_AT 관계)
    //   Eve는 친구가 없는 외톨이 (OPTIONAL MATCH 시연용)
    // ─────────────────────────────────────────────────────
    const NODES = [
      // 사람 (위쪽 줄)
      { id: 'alice', label: 'Alice', kind: 'Person', cx: 110, cy: 80,  age: 30 },
      { id: 'bob',   label: 'Bob',   kind: 'Person', cx: 260, cy: 80,  age: 28 },
      { id: 'carol', label: 'Carol', kind: 'Person', cx: 410, cy: 80,  age: 35 },
      { id: 'dave',  label: 'Dave',  kind: 'Person', cx: 560, cy: 80,  age: 41 },
      { id: 'eve',   label: 'Eve',   kind: 'Person', cx: 710, cy: 80,  age: 26 },
      // 회사 (아래쪽 줄)
      { id: 'acme',   label: 'Acme',   kind: 'Company', cx: 220, cy: 220 },
      { id: 'globex', label: 'Globex', kind: 'Company', cx: 520, cy: 220 },
    ];

    // 엣지 (KNOWS = 친구, WORKS_AT = 직장)
    const EDGES = [
      // KNOWS 체인 (가변 길이 hop 시연용)
      { id: 'k1', from: 'alice', to: 'bob',   type: 'KNOWS' },
      { id: 'k2', from: 'bob',   to: 'carol', type: 'KNOWS' },
      { id: 'k3', from: 'carol', to: 'dave',  type: 'KNOWS' },
      { id: 'k4', from: 'dave',  to: 'eve',   type: 'KNOWS' },
      // WORKS_AT (Eve는 직장 없음 → OPTIONAL MATCH NULL)
      { id: 'w1', from: 'alice', to: 'acme',   type: 'WORKS_AT' },
      { id: 'w2', from: 'bob',   to: 'acme',   type: 'WORKS_AT' },
      { id: 'w3', from: 'carol', to: 'globex', type: 'WORKS_AT' },
      { id: 'w4', from: 'dave',  to: 'globex', type: 'WORKS_AT' },
    ];

    // ─────────────────────────────────────────────────────
    // STEPS — 5단계 시뮬레이션
    //   highlightNodes: 강조할 노드 id 목록
    //   highlightEdges: 강조할 엣지 id 목록 (path traverse)
    //   pathColors: edge id → 단계별 색상 (다중 hop 1/2/3 hop 그라데이션)
    //   resultRows: 우측 결과 표 (header + rows)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      // ── Step 1: 다중 hop ──────────────────────────────────
      {
        title: 'Step 1. 다중 hop — `[*1..3]` 한 줄로 1~3 정거장',
        desc: '`-[:KNOWS*1..3]->`는 1홉부터 3홉까지의 모든 친구를 한 번에 가져온다. SQL이라면 self-JOIN을 3번 풀어야 한다. Alice 기준 Bob(1홉), Carol(2홉), Dave(3홉)까지 한꺼번에 매치 — 색이 진해질수록 멀다.',
        focus: 'multi-hop',
        startNode: 'alice',
        highlightNodes: ['alice', 'bob', 'carol', 'dave'],
        highlightEdges: ['k1', 'k2', 'k3'],
        pathColors: { k1: '#a78bfa', k2: '#8b5cf6', k3: '#6d28d9' }, // violet 그라데이션
        resultTitle: 'RETURN friend.name, length(p)',
        resultHeader: ['friend', 'hops'],
        resultRows: [
          ['Bob',   '1'],
          ['Carol', '2'],
          ['Dave',  '3'],
        ],
        code: {
          lang: 'cypher',
          filename: 'multi-hop.cypher',
          lines: [
            '// 다중 hop 탐색 — Alice 기준 1~3홉 친구 모두',
            '// `*1..3`은 "1번~3번 환승까지" 라는 뜻',
            '',
            'MATCH p = (a:Person {name: "Alice"})',
            '          -[:KNOWS*1..3]->(friend:Person)',
            'RETURN friend.name AS friend,',
            '       length(p)  AS hops',
            'ORDER BY hops',
            '',
            '// 결과:',
            '//   Bob   | 1   ← 직접 친구',
            '//   Carol | 2   ← 친구의 친구',
            '//   Dave  | 3   ← 친구의 친구의 친구',
            '',
            '// SQL 등가:',
            '//   FROM friends f1',
            '//   LEFT JOIN friends f2 ON f1.to = f2.from',
            '//   LEFT JOIN friends f3 ON f2.to = f3.from   ← 3중 JOIN',
            '//   ... 4홉이면 4중 JOIN. 가변길이는 SQL로 거의 불가능.',
          ],
          highlight: [4, 5, 6, 7],
        },
      },

      // ── Step 2: OPTIONAL MATCH ────────────────────────────
      {
        title: 'Step 2. OPTIONAL MATCH — 좌측 외부 조인 (없어도 NULL로 살린다)',
        desc: 'Eve는 친구는 있지만 직장이 없다. `MATCH (p)-[:WORKS_AT]->(c)`로 잡으면 Eve는 결과에서 사라진다. `OPTIONAL MATCH`로 바꾸면 Eve가 살아남고 회사는 NULL. SQL의 LEFT JOIN과 동일한 의미.',
        focus: 'optional',
        highlightNodes: ['alice', 'bob', 'carol', 'dave', 'eve', 'acme', 'globex'],
        highlightEdges: ['w1', 'w2', 'w3', 'w4'],
        pathColors: { w1: '#8b5cf6', w2: '#8b5cf6', w3: '#8b5cf6', w4: '#8b5cf6' },
        nullNode: 'eve', // Eve는 회사 없음 표시
        resultTitle: 'Person OPTIONAL → Company',
        resultHeader: ['person', 'company'],
        resultRows: [
          ['Alice', 'Acme'],
          ['Bob',   'Acme'],
          ['Carol', 'Globex'],
          ['Dave',  'Globex'],
          ['Eve',   'NULL'],   // 외톨이도 살아남음
        ],
        code: {
          lang: 'cypher',
          filename: 'optional-match.cypher',
          lines: [
            '// OPTIONAL MATCH — 매치 못 해도 행을 살린다 (LEFT JOIN)',
            '',
            '// ❌ 일반 MATCH — Eve는 결과에서 사라짐',
            'MATCH (p:Person)-[:WORKS_AT]->(c:Company)',
            'RETURN p.name, c.name',
            '// → Alice, Bob, Carol, Dave 만 (Eve 누락)',
            '',
            '// ✅ OPTIONAL MATCH — Eve도 NULL로 살아남음',
            'MATCH (p:Person)',
            'OPTIONAL MATCH (p)-[:WORKS_AT]->(c:Company)',
            'RETURN p.name AS person,',
            '       c.name AS company',
            'ORDER BY person',
            '',
            '// 결과:',
            '//   Alice | Acme',
            '//   Bob   | Acme',
            '//   Carol | Globex',
            '//   Dave  | Globex',
            '//   Eve   | NULL    ← 직장 없어도 살아남음',
            '',
            '// 언제 쓰나: "필수 정보 + 부가 정보(있으면)" 패턴',
            '//   GraphRAG에서 "엔티티 + 별칭(없을 수도)" 같은 케이스',
          ],
          highlight: [9, 10, 11, 12],
        },
      },

      // ── Step 3: WITH (파이프라인) ───────────────────────────
      {
        title: 'Step 3. WITH — 파이프라인 변수 전달 (중간 결과를 다음 단계로)',
        desc: '`WITH`는 "지금까지 결과를 정리해서 다음 절로 넘긴다"는 의미. 1단계에서 Acme 직원만 추리고, 2단계에서 그 사람들의 친구를 다시 찾는다. 한 쿼리 안에 작은 쿼리 두 개를 이어 붙이는 셈 — 중간 필터 / 정렬 / 집계의 핵심.',
        focus: 'with',
        highlightNodes: ['alice', 'bob', 'carol', 'acme'],
        highlightEdges: ['w1', 'w2', 'k1', 'k2'],
        pathColors: {
          w1: '#a78bfa', // 1단계 (Acme 직원)
          w2: '#a78bfa',
          k1: '#6d28d9', // 2단계 (그들의 친구)
          k2: '#6d28d9',
        },
        resultTitle: 'WITH 파이프라인 — Acme 직원 → 그들의 친구',
        resultHeader: ['acme_emp', 'friend'],
        resultRows: [
          ['Alice', 'Bob'],
          ['Bob',   'Carol'],
        ],
        code: {
          lang: 'cypher',
          filename: 'with-pipeline.cypher',
          lines: [
            '// WITH — 중간 결과를 다음 절로 흘려보내는 파이프라인',
            '',
            'MATCH (p:Person)-[:WORKS_AT]->(c:Company {name: "Acme"})',
            'WITH p              // ← 여기까지 결과(Acme 직원)를 변수 p로 넘김',
            'WHERE p.age >= 25',
            'MATCH (p)-[:KNOWS]->(friend:Person)',
            'RETURN p.name      AS acme_emp,',
            '       friend.name AS friend',
            '',
            '// 흐름 (좌→우):',
            '//   ① Acme 직원 찾기      → [Alice, Bob]',
            '//   ② WITH p (전달)',
            '//   ③ 나이 25 이상 필터  → [Alice, Bob]',
            '//   ④ 그들의 친구 매치    → Alice→Bob, Bob→Carol',
            '',
            '// 결과:',
            '//   Alice | Bob',
            '//   Bob   | Carol',
            '',
            '// WITH는 SQL의 서브쿼리/CTE 역할:',
            '//   WITH acme_emp AS (SELECT ...) SELECT ... FROM acme_emp ...',
            '// 집계/정렬/LIMIT 결과를 다음 절에서 또 쓰고 싶을 때 필수',
          ],
          highlight: [3, 4, 5, 6],
        },
      },

      // ── Step 4: 집계 (count / collect) ────────────────────
      {
        title: 'Step 4. 집계 — `count(p)`, `collect(p.name)` (행을 한 줄로 압축)',
        desc: '회사별 직원 수와 직원 이름 목록을 한 번에. `count()`는 행 개수, `collect()`는 같은 그룹을 리스트로 묶는다. SQL의 `GROUP BY company` + `COUNT(*)` + `STRING_AGG`을 한 줄로. GraphRAG에서 "엔티티별 인용 문서 수" 같은 통계에 필수.',
        focus: 'aggregate',
        highlightNodes: ['alice', 'bob', 'carol', 'dave', 'acme', 'globex'],
        highlightEdges: ['w1', 'w2', 'w3', 'w4'],
        pathColors: { w1: '#8b5cf6', w2: '#8b5cf6', w3: '#a78bfa', w4: '#a78bfa' },
        resultTitle: 'Company GROUP — count + collect',
        resultHeader: ['company', 'emp_count', 'emp_names'],
        resultRows: [
          ['Acme',   '2', '["Alice", "Bob"]'],
          ['Globex', '2', '["Carol", "Dave"]'],
        ],
        code: {
          lang: 'cypher',
          filename: 'aggregate.cypher',
          lines: [
            '// 집계 함수 — count, sum, collect, avg, min, max',
            '//   GROUP BY는 RETURN의 비-집계 컬럼이 자동으로 됨 (Cypher 규칙)',
            '',
            'MATCH (p:Person)-[:WORKS_AT]->(c:Company)',
            'RETURN c.name              AS company,',
            '       count(p)            AS emp_count,   // 직원 수',
            '       collect(p.name)     AS emp_names    // 이름 리스트',
            'ORDER BY emp_count DESC',
            '',
            '// 결과:',
            '//   Acme   | 2 | ["Alice", "Bob"]',
            '//   Globex | 2 | ["Carol", "Dave"]',
            '',
            '// 자주 쓰는 집계:',
            '//   count(*)     → 전체 행 수',
            '//   count(x)     → x가 NULL 아닌 행 수',
            '//   sum(x.age)   → 합계',
            '//   avg(x.age)   → 평균',
            '//   collect(x)   → 리스트로 묶기 (GraphRAG 인용 모음 핵심)',
            '//   min/max(x)   → 최소/최대',
            '',
            '// 응용: 친구 많은 사람 TOP 3',
            'MATCH (p:Person)-[:KNOWS]->(f)',
            'RETURN p.name, count(f) AS friend_count',
            'ORDER BY friend_count DESC LIMIT 3',
          ],
          highlight: [4, 5, 6, 7],
        },
      },

      // ── Step 5: UNION ───────────────────────────────────
      {
        title: 'Step 5. UNION — 두 결과 합치기 (서로 다른 패턴을 한 표로)',
        desc: '"Alice의 친구"와 "Acme 직원"을 한 번에 보고 싶다. `UNION`은 컬럼 수/이름이 같은 두 결과를 위아래로 붙인다. `UNION`은 중복 제거, `UNION ALL`은 그대로. SQL 동등. 다양한 경로의 후보를 한 결과 셋으로 모을 때.',
        focus: 'union',
        highlightNodes: ['alice', 'bob', 'carol', 'acme'],
        highlightEdges: ['k1', 'w1', 'w2'],
        pathColors: {
          k1: '#a78bfa', // 친구 쪽 (1번 쿼리)
          w1: '#6d28d9', // 직장 쪽 (2번 쿼리)
          w2: '#6d28d9',
        },
        resultTitle: 'UNION — Alice 친구 ∪ Acme 직원',
        resultHeader: ['name', 'source'],
        resultRows: [
          ['Bob',   'friend_of_alice'],
          ['Alice', 'works_at_acme'],
          ['Bob',   'works_at_acme'],   // 중복: UNION ALL일 경우 살아남음
        ],
        code: {
          lang: 'cypher',
          filename: 'union.cypher',
          lines: [
            '// UNION — 서로 다른 두 패턴의 결과를 한 표로 합치기',
            '//   조건: 컬럼 수와 별칭이 양쪽 동일해야 함',
            '',
            '// 쿼리 ① Alice의 친구',
            'MATCH (a:Person {name: "Alice"})-[:KNOWS]->(x:Person)',
            'RETURN x.name AS name,',
            '       "friend_of_alice" AS source',
            '',
            'UNION ALL    // ALL 빼면 중복 제거',
            '',
            '// 쿼리 ② Acme 직원',
            'MATCH (x:Person)-[:WORKS_AT]->(:Company {name: "Acme"})',
            'RETURN x.name AS name,',
            '       "works_at_acme" AS source',
            '',
            '// 결과 (UNION ALL):',
            '//   Bob   | friend_of_alice',
            '//   Alice | works_at_acme',
            '//   Bob   | works_at_acme    ← 중복 그대로',
            '',
            '// UNION (중복 제거) 결과:',
            '//   Bob   | friend_of_alice',
            '//   Alice | works_at_acme',
            '//   (Bob | works_at_acme 은 (Bob, friend_of_alice)와 다른 행이라 살아남음.',
            '//    완전히 똑같은 행만 제거됨)',
            '',
            '// GraphRAG 활용: "키워드 검색 결과 ∪ 임베딩 검색 결과" 같이',
            '//                서로 다른 검색 경로를 합쳐 후보 풀을 넓힐 때',
          ],
          highlight: [5, 6, 7, 9, 12, 13, 14],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // LiveDataPane — SVG 그래프 + 결과 표
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step, stepIdx }) {
      const highlightNodes = new Set(step.highlightNodes || []);
      const highlightEdges = new Set(step.highlightEdges || []);
      const pathColors = step.pathColors || {};
      const nullNodeId = step.nullNode;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📊 그래프 traverse 시각화</h2>
            <span className="text-[10px] text-slate-400 font-mono">violet path · live</span>
          </div>

          <svg viewBox="0 0 820 280" className="w-full" style={{ maxHeight: '320px' }}>
            <defs>
              {/* 회색 화살표 (비매치) */}
              <marker id="ahDim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                <path d="M0,0 L10,5 L0,10 z" fill="#cbd5e1" />
              </marker>
              {/* violet 농도별 화살표 */}
              <marker id="ahV1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa" />
              </marker>
              <marker id="ahV2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                <path d="M0,0 L10,5 L0,10 z" fill="#8b5cf6" />
              </marker>
              <marker id="ahV3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                <path d="M0,0 L10,5 L0,10 z" fill="#6d28d9" />
              </marker>
            </defs>

            {/* 엣지 먼저 그리기 (노드 뒤에) */}
            {EDGES.map((e) => {
              const fromN = NODES.find((n) => n.id === e.from);
              const toN = NODES.find((n) => n.id === e.to);
              const isHighlighted = highlightEdges.has(e.id);
              const color = pathColors[e.id] || (isHighlighted ? '#8b5cf6' : '#cbd5e1');
              const stroke = isHighlighted ? color : '#cbd5e1';
              const width = isHighlighted ? 3.5 : 1.8;
              const markerEnd =
                color === '#a78bfa' ? 'url(#ahV1)' :
                color === '#8b5cf6' ? 'url(#ahV2)' :
                color === '#6d28d9' ? 'url(#ahV3)' :
                'url(#ahDim)';

              // 시작/끝점은 노드 원 가장자리(반지름 ~26)에 맞춰 약간 안쪽으로
              const dx = toN.cx - fromN.cx;
              const dy = toN.cy - fromN.cy;
              const dist = Math.sqrt(dx * dx + dy * dy) || 1;
              const r = 28;
              const x1 = fromN.cx + (dx / dist) * r;
              const y1 = fromN.cy + (dy / dist) * r;
              const x2 = toN.cx - (dx / dist) * r;
              const y2 = toN.cy - (dy / dist) * r;

              const midX = (fromN.cx + toN.cx) / 2;
              const midY = (fromN.cy + toN.cy) / 2 - 6;

              return (
                <g key={e.id}>
                  <line
                    x1={x1} y1={y1} x2={x2} y2={y2}
                    stroke={stroke}
                    strokeWidth={width}
                    markerEnd={markerEnd}
                    className="transition-all duration-500"
                  />
                  <text
                    x={midX}
                    y={midY}
                    textAnchor="middle"
                    fontSize="9"
                    fontFamily="monospace"
                    fill={isHighlighted ? '#5b21b6' : '#94a3b8'}
                    style={{ paintOrder: 'stroke', stroke: '#fff', strokeWidth: 2 }}
                  >
                    :{e.type}
                  </text>
                </g>
              );
            })}

            {/* 노드 */}
            {NODES.map((n) => {
              const isHighlighted = highlightNodes.has(n.id);
              const isNullCase = n.id === nullNodeId;
              const isCompany = n.kind === 'Company';

              const fill = isHighlighted
                ? (isCompany ? '#7c3aed' : '#8b5cf6')
                : '#cbd5e1';
              const stroke = isHighlighted
                ? (isCompany ? '#5b21b6' : '#6d28d9')
                : '#94a3b8';

              return (
                <g key={n.id} className="transition-all duration-500">
                  {isCompany ? (
                    <rect
                      x={n.cx - 32} y={n.cy - 22}
                      width="64" height="44" rx="6"
                      fill={fill} stroke={stroke} strokeWidth="2"
                    />
                  ) : (
                    <circle
                      cx={n.cx} cy={n.cy} r="26"
                      fill={fill} stroke={stroke} strokeWidth="2"
                    />
                  )}
                  <text
                    x={n.cx}
                    y={n.cy + (isCompany ? 4 : 4)}
                    textAnchor="middle"
                    fontSize={isCompany ? 11 : 11}
                    fontWeight="bold"
                    fill="#fff"
                  >
                    {n.label}
                  </text>
                  {!isCompany && (
                    <text
                      x={n.cx} y={n.cy - 36}
                      textAnchor="middle"
                      fontSize="8"
                      fill="#64748b"
                      fontFamily="monospace"
                    >
                      :Person
                    </text>
                  )}
                  {isCompany && (
                    <text
                      x={n.cx} y={n.cy - 28}
                      textAnchor="middle"
                      fontSize="8"
                      fill="#64748b"
                      fontFamily="monospace"
                    >
                      :Company
                    </text>
                  )}
                  {isNullCase && (
                    <text
                      x={n.cx} y={n.cy + 50}
                      textAnchor="middle"
                      fontSize="9"
                      fill="#dc2626"
                      fontWeight="bold"
                    >
                      ⚠ WORKS_AT 없음 → NULL
                    </text>
                  )}
                </g>
              );
            })}
          </svg>

          {/* 범례 */}
          <div className="flex flex-wrap items-center gap-3 text-[10px] mt-2 text-slate-500 border-t border-slate-100 pt-2">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-violet-300"></span>1-hop
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-violet-500"></span>2-hop
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-violet-800"></span>3-hop / 깊음
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2.5 h-2.5 rounded-full bg-slate-300"></span>비매치
            </span>
          </div>

          {/* 결과 표 */}
          <div className="mt-4 rounded-lg border-2 border-violet-200 overflow-hidden">
            <div className="bg-violet-50 px-3 py-1.5 text-[11px] font-bold text-violet-800 font-mono">
              📋 {step.resultTitle}
            </div>
            <table className="w-full text-xs font-mono">
              <thead>
                <tr className="bg-violet-100/50">
                  {step.resultHeader.map((h, i) => (
                    <th key={i} className="text-left px-3 py-1.5 text-violet-900 border-b border-violet-200">
                      {h}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {step.resultRows.map((row, ri) => (
                  <tr key={ri} className="border-t border-violet-100 hover:bg-violet-50/50">
                    {row.map((cell, ci) => (
                      <td
                        key={ci}
                        className={`px-3 py-1.5 ${cell === 'NULL' ? 'text-red-600 font-bold' : 'text-slate-700'}`}
                      >
                        {cell}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
            <div className="bg-violet-50/40 px-3 py-1 text-[10px] text-violet-700 font-mono">
              {step.resultRows.length} row(s) returned
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js (cypher)
    //   highlight.js는 cypher 기본 미지원이라 간이 정규식으로 토큰화
    // ─────────────────────────────────────────────────────
    const CYPHER_KEYWORDS = [
      'MATCH', 'OPTIONAL', 'WHERE', 'RETURN', 'WITH', 'UNION', 'ALL',
      'CREATE', 'MERGE', 'DELETE', 'SET', 'REMOVE', 'AS', 'ORDER', 'BY',
      'LIMIT', 'SKIP', 'DESC', 'ASC', 'AND', 'OR', 'NOT', 'IN', 'IS', 'NULL',
      'CASE', 'WHEN', 'THEN', 'ELSE', 'END', 'EXISTS', 'COUNT', 'SUM', 'AVG',
      'MIN', 'MAX', 'COLLECT', 'DISTINCT',
    ];
    const CYPHER_FUNCS = [
      'count', 'sum', 'avg', 'min', 'max', 'collect', 'length',
      'nodes', 'relationships', 'shortestPath', 'size', 'type', 'id',
      'labels', 'keys', 'properties', 'toLower', 'toUpper',
    ];

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    /**
     * 간이 cypher syntax 하이라이터 — atom-one-dark 팔레트와 맞춤
     * 우선순위: 주석 → 문자열 → 키워드 → 함수 → 라벨 → 관계 → 숫자
     */
    function highlightCypher(line) {
      // 1) 주석 (// ...)
      const commentIdx = line.indexOf('//');
      let head = line, tail = '';
      if (commentIdx >= 0) {
        head = line.slice(0, commentIdx);
        tail = `<span style="color:#7f848e;font-style:italic">${escapeHtml(line.slice(commentIdx))}</span>`;
      }

      let out = escapeHtml(head);

      // 2) 문자열 ("...")
      out = out.replace(/&quot;([^&]*?)&quot;/g, '<span style="color:#98c379">&quot;$1&quot;</span>');

      // 3) 키워드 (대문자 단어 매치)
      const kwRe = new RegExp('\\b(' + CYPHER_KEYWORDS.join('|') + ')\\b', 'g');
      out = out.replace(kwRe, '<span style="color:#c678dd;font-weight:600">$1</span>');

      // 4) 함수 (소문자)
      const fnRe = new RegExp('\\b(' + CYPHER_FUNCS.join('|') + ')\\b(?=\\()', 'g');
      out = out.replace(fnRe, '<span style="color:#61afef">$1</span>');

      // 5) 노드 라벨 (:Label) / 관계 ([:REL])
      out = out.replace(/:([A-Z][A-Za-z0-9_]*)/g, ':<span style="color:#e5c07b">$1</span>');

      // 6) 숫자
      out = out.replace(/\b(\d+(\.\d+)?)\b/g, '<span style="color:#d19a66">$1</span>');

      // 7) 변수 in MATCH (a:Label) → a 강조 (간소화: 생략)

      return out + tail;
    }

    function CodeViewer({ code, stepIdx, total }) {
      // cypher는 자체 하이라이터, 그 외 언어는 highlight.js
      const isCypher = code.lang === 'cypher';
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (isCypher) {
          setRenderedLines(code.lines.map(highlightCypher));
          return;
        }
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일명 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화 hidden 영역 (cypher가 아닐 때만 사용) */}
          {!isCypher && (
            <pre className="hidden">
              <code ref={codeRef} className={`language-${code.lang}`}>
                {code.lines.join('\n')}
              </code>
            </pre>
          )}

          {/* 실제 렌더링 영역 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-violet-500/15 border-l-2 border-violet-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-violet-700 hover:text-violet-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">
                curriculum III-2-1
              </span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">
                    Part III. GraphRAG 쿼리 &gt; Chapter 2. Cypher 고급
                  </div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">
                    Cypher 고급 — 다중 hop · OPTIONAL · WITH · 집계 · UNION
                  </h1>
                  <p className="text-sm text-slate-500 mt-0.5">
                    지하철 환승도 — 여러 정거장을 한 번에, 환승역에서 흐름을 갈아탄다
                  </p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 안내 */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 text-sm text-violet-900">
                💡 다음(III-2-2)에서는 <strong>Cypher 성능 최적화</strong> — 인덱스 / EXPLAIN / PROFILE
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-violet-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-violet-600 text-white hover:bg-violet-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-1-2.html" className="text-slate-500 hover:text-slate-700">
                &larr; III-1-2 Cypher 기초
              </a>
              <a href="./III-2-2.html" className="text-violet-700 hover:text-violet-900 font-medium">
                III-2-2 성능 최적화 &rarr;
              </a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
