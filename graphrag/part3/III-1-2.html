<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — Cypher 기본</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    III-1-2. Cypher 기본 (CREATE / MATCH)
    학습 목표: 노드/관계 생성과 기본 조회 쿼리를 작성할 수 있다.
    핵심 비유: "ASCII art 패턴" — (노드)-[:관계]->(노드) 모양 그대로 코드가 됨
    구조: 4단계 (CREATE 노드 / CREATE 관계 / MATCH RETURN / WHERE 필터)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const LABEL_STYLE = {
      Person:  { fill: '#a78bfa', stroke: '#7c3aed' },
      Company: { fill: '#34d399', stroke: '#059669' },
    };

    const STEPS = [
      {
        title: 'Step 1. CREATE — 노드 만들기',
        desc: 'Cypher의 가장 작은 단위. 괄호 안에 변수와 라벨, 중괄호 안에 속성. ASCII art처럼 모양이 그대로 코드가 된다. 잡스라는 동그라미 하나가 그래프에 추가된다.',
        code: 'CREATE (p:Person {name: "잡스", born: 1955})',
        focus: 'createNode',
      },
      {
        title: 'Step 2. CREATE — 관계로 연결',
        desc: '노드 사이에 화살표를 그리려면 -[:관계]-> 모양을 코드로 적는다. 두 노드를 한 번에 만들고 그 사이에 관계까지 연결할 수 있다. 그래프에 화살표와 새 노드가 동시에 등장.',
        code: 'CREATE (p:Person {name:"잡스"})\n      -[:CO_FOUNDED {since: 1976}]->\n      (c:Company {name:"애플"})',
        focus: 'createEdge',
      },
      {
        title: 'Step 3. MATCH — 패턴으로 조회',
        desc: '조회는 CREATE를 MATCH로 바꾸기만 하면 된다. 같은 ASCII art 모양에 맞는 노드들을 찾는다. RETURN으로 원하는 속성만 골라 가져온다. SQL의 SELECT FROM JOIN을 한 줄로 압축한 셈.',
        code: 'MATCH (p:Person)-[:CO_FOUNDED]->(c:Company)\nRETURN p.name, c.name',
        focus: 'match',
      },
      {
        title: 'Step 4. WHERE — 속성 필터',
        desc: 'SQL과 똑같이 WHERE 절을 추가해 조건을 건다. 1960년 이전 출생한 Person 노드만 가져온다. 다음(III-2-1)은 가변 길이 경로 — `[r:KNOWS*1..5]`로 1~5홉 친구 모두 찾기.',
        code: 'MATCH (p:Person)\nWHERE p.born < 1960\nRETURN p.name, p.born',
        focus: 'where',
      },
    ];

    function NodeCircle({ cx, cy, label, name, born }) {
      const style = LABEL_STYLE[label] || { fill: '#94a3b8', stroke: '#475569' };
      return (
        <g>
          <circle cx={cx} cy={cy} r="44" fill={style.fill} stroke={style.stroke} strokeWidth="3" />
          <text x={cx} y={cy - 4} textAnchor="middle" fontSize="11" fontWeight="bold" fill="#fff">{name}</text>
          <text x={cx} y={cy + 12} textAnchor="middle" fontSize="9" fill="#fff" fillOpacity="0.85">:{label}</text>
          {born && <text x={cx} y={cy + 24} textAnchor="middle" fontSize="8" fill="#fff" fillOpacity="0.7">born: {born}</text>}
        </g>
      );
    }

    function Edge({ x1, y1, x2, y2, label, prop }) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const len = Math.sqrt(dx * dx + dy * dy);
      const ux = dx / len;
      const uy = dy / len;
      const sx = x1 + ux * 44;
      const sy = y1 + uy * 44;
      const ex = x2 - ux * 50;
      const ey = y2 - uy * 50;
      const mx = (sx + ex) / 2;
      const my = (sy + ey) / 2 - 8;
      return (
        <g>
          <line x1={sx} y1={sy} x2={ex} y2={ey} stroke="#475569" strokeWidth="2" markerEnd="url(#arrowHead)" />
          <rect x={mx - 60} y={my - 9} width="120" height="16" rx="3" fill="#fff" stroke="#cbd5e1" />
          <text x={mx} y={my + 3} textAnchor="middle" fontSize="10" fontWeight="bold" fill="#334155">:{label}</text>
          {prop && (
            <text x={mx} y={my + 22} textAnchor="middle" fontSize="9" fill="#92400e" fontFamily="monospace">{prop}</text>
          )}
        </g>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const focus = step.focus;
      const showJobs = focus === 'createNode' || focus === 'createEdge' || focus === 'match' || focus === 'where';
      const showApple = focus === 'createEdge' || focus === 'match' || focus === 'where';
      const showEdge = focus === 'createEdge' || focus === 'match' || focus === 'where';
      const highlightMatch = focus === 'match' || focus === 'where';
      const showResult = focus === 'match' || focus === 'where';

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Cypher 기본 (CREATE / MATCH)</h1>
                <p className="text-sm text-slate-500 mt-1">ASCII art 패턴 — 그림 모양이 그대로 코드</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* Cypher 코드 */}
            <div className="bg-slate-900 rounded-xl p-4 mb-4">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">Cypher</span>
                <span className="text-[10px] text-slate-500">— Neo4j 쿼리 언어</span>
              </div>
              <pre className="text-emerald-300 font-mono text-sm overflow-x-auto whitespace-pre">
{step.code}
              </pre>
            </div>

            {/* SVG 그래프 — 단계별 점진 표현 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-6">
              <div className="text-xs font-bold text-slate-700 mb-2">📊 그래프 상태</div>
              <svg viewBox="0 0 800 220" className="w-full" style={{ maxHeight: '260px' }}>
                <defs>
                  <marker id="arrowHead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M0,0 L10,5 L0,10 z" fill="#475569" />
                  </marker>
                </defs>
                {showEdge && <Edge x1={200} y1={110} x2={550} y2={110} label="CO_FOUNDED" prop={focus === 'createEdge' ? '{since: 1976}' : null} />}
                {showJobs && (
                  <g opacity={highlightMatch ? 1 : 1}>
                    <NodeCircle cx={200} cy={110} label="Person" name="잡스" born={focus === 'createNode' || focus === 'where' ? 1955 : null} />
                    {highlightMatch && (
                      <circle cx={200} cy={110} r="52" fill="none" stroke="#f59e0b" strokeWidth="3" strokeDasharray="6 4" />
                    )}
                  </g>
                )}
                {showApple && (
                  <g>
                    <NodeCircle cx={550} cy={110} label="Company" name="애플" />
                    {highlightMatch && (
                      <circle cx={550} cy={110} r="52" fill="none" stroke="#f59e0b" strokeWidth="3" strokeDasharray="6 4" />
                    )}
                  </g>
                )}
                {!showJobs && (
                  <text x="400" y="110" textAnchor="middle" fontSize="14" fill="#94a3b8">CREATE 실행 전 — 빈 그래프</text>
                )}
              </svg>
              {highlightMatch && (
                <div className="text-[10px] text-amber-700 mt-2 text-center">🔍 점선 = MATCH가 패턴에 매치한 노드</div>
              )}
            </div>

            {/* Step 3, 4: RETURN 결과 */}
            {showResult && (
              <div className="bg-white rounded-xl shadow-sm border-2 border-emerald-300 p-4 mb-6">
                <div className="text-xs font-bold text-emerald-700 mb-3">📋 RETURN 결과</div>
                {focus === 'match' && (
                  <table className="w-full text-xs font-mono">
                    <thead>
                      <tr className="bg-emerald-50">
                        <th className="text-left p-2 text-emerald-900">p.name</th>
                        <th className="text-left p-2 text-emerald-900">c.name</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr className="border-t border-emerald-100">
                        <td className="p-2 text-slate-700">"잡스"</td>
                        <td className="p-2 text-slate-700">"애플"</td>
                      </tr>
                    </tbody>
                  </table>
                )}
                {focus === 'where' && (
                  <table className="w-full text-xs font-mono">
                    <thead>
                      <tr className="bg-emerald-50">
                        <th className="text-left p-2 text-emerald-900">p.name</th>
                        <th className="text-left p-2 text-emerald-900">p.born</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr className="border-t border-emerald-100">
                        <td className="p-2 text-slate-700">"잡스"</td>
                        <td className="p-2 text-slate-700">1955</td>
                      </tr>
                    </tbody>
                  </table>
                )}
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
