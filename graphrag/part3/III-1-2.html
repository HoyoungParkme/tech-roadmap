<!DOCTYPE html>

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — III-1-2. Cypher 기본 (CREATE/MATCH/RETURN/WHERE/MERGE)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">

<body>
  <div id="root"></div>

  <!--
    III-1-2. Cypher 기본 — CREATE / MATCH / RETURN / WHERE / 패턴 매칭 / MERGE / DELETE / SET
    학습 목표: Cypher의 핵심 6개 키워드를 누적 그래프 위에서 단계별로 익힌다.
    핵심 비유: "ASCII art 패턴 매칭" — 그림 모양 (a)-[:R]->(b)이 그대로 코드가 된다.
    패턴: fastapi v1 — 좌(LiveDataPane: 누적 그래프 SVG + 결과 테이블) / 우(VSCode CodeViewer)
    색상: graphrag violet
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 라벨별 노드 색상 (violet 계열 + 보색)
    // ─────────────────────────────────────────────────────
    const LABEL_STYLE = {
      Person:  { fill: '#a78bfa', stroke: '#7c3aed', text: '#ffffff' }, // violet-400 / violet-600
      Company: { fill: '#22d3ee', stroke: '#0891b2', text: '#ffffff' }, // cyan-400 / cyan-600
    };

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 — 누적되는 그래프 + 매칭 하이라이트 + RETURN 결과
    //   nodes[i]   = { id, label, x, y, props, glow? }
    //   edges[i]   = { from, to, type, props?, glow? }
    //   resultRows = [{ ... }] — RETURN 결과 표
    //   resultCols = ['p.name', 'c.name'] — 표 컬럼
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. CREATE — 노드/엣지 만들기',
        desc: 'Cypher의 가장 작은 단위. 괄호 안에 변수와 라벨, 중괄호 안에 속성. ASCII art처럼 그림이 그대로 코드가 된다. Person 두 명과 Company 한 곳, 그리고 두 사람이 함께 회사를 창업한 관계까지 한 쿼리로 만든다.',
        nodes: [
          { id: 'a', label: 'Person',  x: 160, y: 110, props: { name: 'Alice', age: 30 }, glow: true },
          { id: 'b', label: 'Person',  x: 160, y: 250, props: { name: 'Bob',   age: 22 }, glow: true },
          { id: 'c', label: 'Company', x: 560, y: 180, props: { name: 'Acme'           }, glow: true },
        ],
        edges: [
          { from: 'a', to: 'c', type: 'WORKS_AT', props: { since: 2018 }, glow: true },
          { from: 'b', to: 'c', type: 'WORKS_AT', props: { since: 2021 }, glow: true },
        ],
        resultCols: null,
        resultRows: null,
        emptyMsg: null,
        code: {
          lang: 'cypher',
          filename: 'create.cypher',
          lines: [
            '// Step 1. CREATE — 노드/엣지 동시 생성',
            '// 패턴: (변수:라벨 {속성})-[:관계 {속성}]->(변수:라벨 {속성})',
            '',
            'CREATE (a:Person  {name: "Alice", age: 30}),',
            '       (b:Person  {name: "Bob",   age: 22}),',
            '       (c:Company {name: "Acme"}),',
            '       (a)-[:WORKS_AT {since: 2018}]->(c),',
            '       (b)-[:WORKS_AT {since: 2021}]->(c);',
            '',
            '// 결과: 노드 3개 + 관계 2개가 그래프에 추가됨',
            '// - Person:Alice (age 30) → Acme (since 2018)',
            '// - Person:Bob   (age 22) → Acme (since 2021)',
            '',
            '// 핵심',
            '//  - 변수(a, b, c)는 같은 쿼리 안에서만 유효',
            '//  - 라벨(Person/Company)은 카테고리 — 인덱스 단위',
            '//  - 속성은 자유 키-값 (스키마리스)',
          ],
          highlight: [4, 5, 6, 7, 8],
        },
      },
      {
        title: 'Step 2. MATCH … RETURN — 패턴으로 조회',
        desc: 'CREATE를 MATCH로 바꾸기만 하면 그게 바로 조회다. 같은 ASCII art 모양에 맞는 노드를 찾아 RETURN으로 원하는 속성만 가져온다. SQL의 SELECT FROM JOIN을 한 줄로 압축한 셈. 매칭된 모든 Person 노드가 cyan glow로 강조된다.',
        nodes: [
          { id: 'a', label: 'Person',  x: 160, y: 110, props: { name: 'Alice', age: 30 }, glow: true },
          { id: 'b', label: 'Person',  x: 160, y: 250, props: { name: 'Bob',   age: 22 }, glow: true },
          { id: 'c', label: 'Company', x: 560, y: 180, props: { name: 'Acme'           } },
        ],
        edges: [
          { from: 'a', to: 'c', type: 'WORKS_AT', props: { since: 2018 } },
          { from: 'b', to: 'c', type: 'WORKS_AT', props: { since: 2021 } },
        ],
        resultCols: ['p.name', 'p.age'],
        resultRows: [
          { 'p.name': '"Alice"', 'p.age': 30 },
          { 'p.name': '"Bob"',   'p.age': 22 },
        ],
        emptyMsg: null,
        code: {
          lang: 'cypher',
          filename: 'match.cypher',
          lines: [
            '// Step 2. MATCH ... RETURN — 패턴 일치 조회',
            '// 패턴: MATCH (변수:라벨) RETURN 속성들',
            '',
            'MATCH (p:Person)',
            'RETURN p.name, p.age;',
            '',
            '// 결과 (2 rows)',
            '//  ┌──────────┬───────┐',
            '//  │ p.name   │ p.age │',
            '//  ├──────────┼───────┤',
            '//  │ "Alice"  │ 30    │',
            '//  │ "Bob"    │ 22    │',
            '//  └──────────┴───────┘',
            '',
            '// 핵심',
            '//  - 변수 p에 매칭된 노드 전체가 바인딩',
            '//  - RETURN은 SELECT — 필요한 속성만 추림',
            '//  - 노드 자체를 RETURN p 하면 모든 속성',
          ],
          highlight: [4, 5],
        },
      },
      {
        title: 'Step 3. WHERE — 속성 필터',
        desc: 'SQL과 똑같이 WHERE 절을 추가해 조건을 건다. age > 25 인 Person 만 가져오면 Alice 한 명만 매칭된다. Bob 은 22 라 탈락. 매칭된 Alice 노드 하나만 cyan glow.',
        nodes: [
          { id: 'a', label: 'Person',  x: 160, y: 110, props: { name: 'Alice', age: 30 }, glow: true },
          { id: 'b', label: 'Person',  x: 160, y: 250, props: { name: 'Bob',   age: 22 }, dim: true },
          { id: 'c', label: 'Company', x: 560, y: 180, props: { name: 'Acme'           } },
        ],
        edges: [
          { from: 'a', to: 'c', type: 'WORKS_AT', props: { since: 2018 } },
          { from: 'b', to: 'c', type: 'WORKS_AT', props: { since: 2021 }, dim: true },
        ],
        resultCols: ['p.name', 'p.age'],
        resultRows: [
          { 'p.name': '"Alice"', 'p.age': 30 },
        ],
        emptyMsg: null,
        code: {
          lang: 'cypher',
          filename: 'where.cypher',
          lines: [
            '// Step 3. WHERE — 조건 필터',
            '// SQL의 WHERE 와 동일. AND/OR/NOT/비교/IN 등',
            '',
            'MATCH (p:Person)',
            'WHERE p.age > 25',
            'RETURN p.name, p.age;',
            '',
            '// 결과 (1 row)',
            '//  ┌──────────┬───────┐',
            '//  │ p.name   │ p.age │',
            '//  ├──────────┼───────┤',
            '//  │ "Alice"  │ 30    │',
            '//  └──────────┴───────┘',
            '',
            '// 자주 쓰는 WHERE 패턴',
            '//  WHERE p.age >= 25 AND p.age < 40',
            '//  WHERE p.name STARTS WITH "A"',
            '//  WHERE p.name IN ["Alice", "Bob"]',
            '//  WHERE NOT p.age IS NULL',
          ],
          highlight: [4, 5, 6],
        },
      },
      {
        title: 'Step 4. 패턴 매칭 — 관계 traverse',
        desc: 'Cypher의 진짜 힘. (p:Person)-[:WORKS_AT]->(c:Company) 처럼 ASCII art 화살표가 그대로 traverse 가 된다. RDB JOIN 없이 두 사람과 그들이 일하는 회사를 한 번에 가져온다. 매칭된 노드와 엣지 모두 cyan glow.',
        nodes: [
          { id: 'a', label: 'Person',  x: 160, y: 110, props: { name: 'Alice', age: 30 }, glow: true },
          { id: 'b', label: 'Person',  x: 160, y: 250, props: { name: 'Bob',   age: 22 }, glow: true },
          { id: 'c', label: 'Company', x: 560, y: 180, props: { name: 'Acme'           }, glow: true },
        ],
        edges: [
          { from: 'a', to: 'c', type: 'WORKS_AT', props: { since: 2018 }, glow: true },
          { from: 'b', to: 'c', type: 'WORKS_AT', props: { since: 2021 }, glow: true },
        ],
        resultCols: ['p.name', 'r.since', 'c.name'],
        resultRows: [
          { 'p.name': '"Alice"', 'r.since': 2018, 'c.name': '"Acme"' },
          { 'p.name': '"Bob"',   'r.since': 2021, 'c.name': '"Acme"' },
        ],
        emptyMsg: null,
        code: {
          lang: 'cypher',
          filename: 'pattern.cypher',
          lines: [
            '// Step 4. 패턴 매칭 — 관계 traverse',
            '// 그림이 그대로 코드 — (a)-[:R]->(b)',
            '',
            'MATCH (p:Person)-[r:WORKS_AT]->(c:Company)',
            'RETURN p.name, r.since, c.name;',
            '',
            '// 결과 (2 rows)',
            '//  ┌──────────┬─────────┬──────────┐',
            '//  │ p.name   │ r.since │ c.name   │',
            '//  ├──────────┼─────────┼──────────┤',
            '//  │ "Alice"  │ 2018    │ "Acme"   │',
            '//  │ "Bob"    │ 2021    │ "Acme"   │',
            '//  └──────────┴─────────┴──────────┘',
            '',
            '// 변형',
            '//  (a)-[:R]-(b)        // 방향 무시',
            '//  (a)-[:R*1..3]->(b)  // 1~3 홉 가변 길이',
            '//  (a)-[:KNOWS|WORKS_AT]->(b) // OR 관계 타입',
            '//  RDB라면 JOIN 2번 + 인덱스 — Cypher는 한 줄',
          ],
          highlight: [4, 5],
        },
      },
      {
        title: 'Step 5. MERGE — upsert (없으면 생성, 있으면 매칭)',
        desc: '"있으면 가져오고 없으면 만든다"가 한 키워드로 끝. 중복 노드를 피하면서 데이터 적재. Carol 은 처음 보니 새로 만들고 Acme 회사는 이미 있으니 매칭만. 새로 만들어진 Carol 과 새 WORKS_AT 엣지가 cyan glow.',
        nodes: [
          { id: 'a', label: 'Person',  x: 160, y: 80,  props: { name: 'Alice',  age: 30 } },
          { id: 'b', label: 'Person',  x: 160, y: 200, props: { name: 'Bob',    age: 22 } },
          { id: 'd', label: 'Person',  x: 160, y: 320, props: { name: 'Carol',  age: 28 }, glow: true, isNew: true },
          { id: 'c', label: 'Company', x: 560, y: 200, props: { name: 'Acme' } },
        ],
        edges: [
          { from: 'a', to: 'c', type: 'WORKS_AT', props: { since: 2018 } },
          { from: 'b', to: 'c', type: 'WORKS_AT', props: { since: 2021 } },
          { from: 'd', to: 'c', type: 'WORKS_AT', props: { since: 2024 }, glow: true, isNew: true },
        ],
        resultCols: ['p.name', 'created'],
        resultRows: [
          { 'p.name': '"Carol"', 'created': 'true (신규)' },
        ],
        emptyMsg: null,
        code: {
          lang: 'cypher',
          filename: 'merge.cypher',
          lines: [
            '// Step 5. MERGE — upsert 패턴',
            '// 있으면 매칭 / 없으면 CREATE — 한 키워드',
            '',
            'MERGE (c:Company {name: "Acme"})        // 이미 있음 → 매칭',
            'MERGE (p:Person  {name: "Carol"})       // 없음 → 생성',
            '  ON CREATE SET p.age = 28,             // 신규일 때만',
            '                p.created_at = datetime()',
            '  ON MATCH  SET p.last_seen = datetime() // 기존일 때만',
            'MERGE (p)-[r:WORKS_AT]->(c)             // 엣지도 upsert',
            '  ON CREATE SET r.since = 2024',
            'RETURN p.name, "true (신규)" AS created;',
            '',
            '// 핵심 주의점',
            '//  - MERGE 매칭 키는 unique 제약 추천',
            '//    CREATE CONSTRAINT FOR (p:Person)',
            '//      REQUIRE p.name IS UNIQUE',
            '//  - 키 없이 MERGE 하면 "전체 속성 일치"라',
            '//    의도치 않은 중복 생성 가능',
          ],
          highlight: [4, 5, 6, 9, 10],
        },
      },
      {
        title: 'Step 6. DELETE / SET — 삭제 / 업데이트',
        desc: '관리의 마지막. SET 으로 속성 갱신, DELETE 로 노드/엣지 제거. 노드를 지우려면 연결된 엣지부터 — DETACH DELETE 한 번에 정리. Bob 의 WORKS_AT 엣지가 사라지고 Bob 자신도 그래프에서 제거된다.',
        nodes: [
          { id: 'a', label: 'Person',  x: 160, y: 80,  props: { name: 'Alice',  age: 31 }, glow: true, isUpdated: true },
          { id: 'd', label: 'Person',  x: 160, y: 320, props: { name: 'Carol',  age: 28 } },
          { id: 'c', label: 'Company', x: 560, y: 200, props: { name: 'Acme' } },
          // Bob 은 삭제됨 → 표시 안 함
        ],
        edges: [
          { from: 'a', to: 'c', type: 'WORKS_AT', props: { since: 2018 } },
          { from: 'd', to: 'c', type: 'WORKS_AT', props: { since: 2024 } },
          // Bob 의 WORKS_AT 엣지도 함께 삭제됨
        ],
        resultCols: ['action', 'count'],
        resultRows: [
          { 'action': 'SET p.age = 31',         'count': '1 node' },
          { 'action': 'DETACH DELETE Bob',      'count': '1 node + 1 rel' },
        ],
        emptyMsg: null,
        code: {
          lang: 'cypher',
          filename: 'delete-set.cypher',
          lines: [
            '// Step 6. SET (업데이트) + DELETE (삭제)',
            '',
            '// 1) SET — 속성 갱신',
            'MATCH (p:Person {name: "Alice"})',
            'SET p.age = 31                      // 단일 속성',
            'RETURN p.name, p.age;',
            '',
            '// 여러 속성 한 번에 (+= 는 merge, = 는 replace)',
            '//   SET p += {age: 31, city: "Seoul"}',
            '//   SET p:VIP                       // 라벨 추가',
            '',
            '// 2) DELETE — 노드/관계 제거',
            'MATCH (p:Person {name: "Bob"})',
            'DETACH DELETE p;                    // 엣지까지 한 번에',
            '',
            '// 그냥 DELETE 만 쓰면 엣지가 남아있을 때 에러',
            '//   "Cannot delete node, has connected relationships"',
            '//   → DETACH DELETE 가 안전',
            '',
            '// 3) 관계만 삭제',
            '//   MATCH (:Person {name:"Alice"})-[r:WORKS_AT]->()',
            '//   DELETE r;',
          ],
          highlight: [4, 5, 6, 13, 14],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // GraphSVG — 누적 그래프 + glow 강조
    // ─────────────────────────────────────────────────────
    function GraphSVG({ nodes, edges }) {
      // node id → 좌표 빠른 조회
      const nodeMap = {};
      nodes.forEach((n) => { nodeMap[n.id] = n; });

      return (
        <svg viewBox="0 0 720 400" className="w-full" style={{ maxHeight: '400px' }}>
          <defs>
            <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 z" fill="#64748b" />
            </marker>
            <marker id="arrowHeadGlow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 z" fill="#06b6d4" />
            </marker>
            <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="4" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>

          {/* 엣지 먼저 그려서 노드 뒤로 깔림 */}
          {edges.map((e, i) => {
            const a = nodeMap[e.from];
            const b = nodeMap[e.to];
            if (!a || !b) return null;
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const len = Math.sqrt(dx * dx + dy * dy) || 1;
            const ux = dx / len;
            const uy = dy / len;
            const r = 38; // 노드 반지름 + 약간 여백
            const sx = a.x + ux * r;
            const sy = a.y + uy * r;
            const ex = b.x - ux * (r + 6);
            const ey = b.y - uy * (r + 6);
            const mx = (sx + ex) / 2;
            const my = (sy + ey) / 2;
            const stroke = e.glow ? '#06b6d4' : (e.dim ? '#cbd5e1' : '#64748b');
            const strokeW = e.glow ? 3 : 2;
            const opacity = e.dim ? 0.4 : 1;
            const propText = e.props
              ? '{' + Object.entries(e.props).map(([k, v]) => `${k}: ${v}`).join(', ') + '}'
              : null;
            return (
              <g key={`e-${i}`} opacity={opacity} filter={e.glow ? 'url(#cyanGlow)' : undefined}>
                <line
                  x1={sx} y1={sy} x2={ex} y2={ey}
                  stroke={stroke} strokeWidth={strokeW}
                  markerEnd={e.glow ? 'url(#arrowHeadGlow)' : 'url(#arrowHead)'}
                />
                {/* 관계 타입 라벨 */}
                <rect
                  x={mx - 50} y={my - 22} width="100" height="16" rx="3"
                  fill="#ffffff" stroke={e.glow ? '#06b6d4' : '#cbd5e1'} strokeWidth="1"
                />
                <text x={mx} y={my - 10} textAnchor="middle" fontSize="10" fontWeight="bold" fill={e.glow ? '#0891b2' : '#475569'}>
                  :{e.type}
                </text>
                {propText && (
                  <text x={mx} y={my + 14} textAnchor="middle" fontSize="9" fill="#92400e" fontFamily="monospace">
                    {propText}
                  </text>
                )}
                {e.isNew && (
                  <text x={mx + 60} y={my - 12} fontSize="9" fontWeight="bold" fill="#06b6d4">+ NEW</text>
                )}
              </g>
            );
          })}

          {/* 노드 */}
          {nodes.map((n) => {
            const style = LABEL_STYLE[n.label] || { fill: '#94a3b8', stroke: '#475569', text: '#fff' };
            const opacity = n.dim ? 0.35 : 1;
            const filter = n.glow ? 'url(#cyanGlow)' : undefined;
            return (
              <g key={n.id} opacity={opacity} filter={filter}>
                {n.glow && (
                  <circle cx={n.x} cy={n.y} r="42" fill="none" stroke="#06b6d4" strokeWidth="3" strokeDasharray="5 4" />
                )}
                <circle cx={n.x} cy={n.y} r="34" fill={style.fill} stroke={style.stroke} strokeWidth="3" />
                <text x={n.x} y={n.y - 6} textAnchor="middle" fontSize="11" fontWeight="bold" fill={style.text}>
                  {n.props.name}
                </text>
                <text x={n.x} y={n.y + 8} textAnchor="middle" fontSize="9" fill={style.text} fillOpacity="0.85">
                  :{n.label}
                </text>
                {n.props.age !== undefined && (
                  <text x={n.x} y={n.y + 22} textAnchor="middle" fontSize="9" fill={style.text} fillOpacity="0.75">
                    age: {n.props.age}
                  </text>
                )}
                {n.isNew && (
                  <text x={n.x + 38} y={n.y - 30} fontSize="10" fontWeight="bold" fill="#06b6d4">+ NEW</text>
                )}
                {n.isUpdated && (
                  <text x={n.x + 38} y={n.y - 30} fontSize="10" fontWeight="bold" fill="#f59e0b">~ UPDATED</text>
                )}
              </g>
            );
          })}
        </svg>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 그래프 + 결과 테이블
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🕸️ Neo4j 그래프 상태</h2>
            <span className="text-[10px] text-slate-400 font-mono">live · cyan glow = 매칭</span>
          </div>

          {/* 그래프 SVG */}
          <div className="bg-gradient-to-br from-slate-50 to-violet-50 rounded-lg border border-slate-200 p-2">
            {step.nodes && step.nodes.length > 0 ? (
              <GraphSVG nodes={step.nodes} edges={step.edges || []} />
            ) : (
              <div className="text-center text-slate-400 text-sm py-12">
                {step.emptyMsg || 'CREATE 실행 전 — 빈 그래프'}
              </div>
            )}
          </div>

          {/* 노드 라벨 범례 */}
          <div className="flex flex-wrap gap-3 text-[11px] mt-3 text-slate-600">
            <span className="flex items-center gap-1">
              <span className="w-3 h-3 rounded-full" style={{ background: '#a78bfa', border: '2px solid #7c3aed' }}></span>
              :Person
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-3 rounded-full" style={{ background: '#22d3ee', border: '2px solid #0891b2' }}></span>
              :Company
            </span>
            <span className="flex items-center gap-1 ml-auto text-cyan-700">
              <span className="w-3 h-3 rounded-full border-2 border-cyan-500 border-dashed"></span>
              매칭(glow)
            </span>
          </div>

          {/* RETURN 결과 테이블 */}
          {step.resultCols && step.resultRows && (
            <div className="mt-4 rounded-lg border-2 border-violet-300 overflow-hidden">
              <div className="bg-violet-50 px-3 py-1.5 text-[11px] font-bold text-violet-800 border-b border-violet-200 flex justify-between">
                <span>📋 RETURN 결과</span>
                <span className="font-mono text-violet-600">{step.resultRows.length} row{step.resultRows.length !== 1 ? 's' : ''}</span>
              </div>
              <table className="w-full text-xs font-mono">
                <thead>
                  <tr className="bg-violet-50/50">
                    {step.resultCols.map((col) => (
                      <th key={col} className="text-left p-2 text-violet-900 border-b border-violet-200">{col}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {step.resultRows.map((row, i) => (
                    <tr key={i} className="border-t border-violet-100 hover:bg-violet-50/30">
                      {step.resultCols.map((col) => (
                        <td key={col} className="p-2 text-slate-700">{String(row[col])}</td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js (cypher → sql 폴백)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      // highlight.js는 기본 cypher 미지원 → sql 로 highlight 후 표시
      const hlLang = code.lang === 'cypher' ? 'sql' : code.lang;

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${hlLang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-300 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-violet-400 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${hlLang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 라인 번호 + 강조 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-violet-500/10 border-l-2 border-violet-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-violet-700 hover:text-violet-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. GraphRAG &amp; Neo4j &gt; Chapter 1. Neo4j 기초</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Cypher 기본 — CREATE / MATCH / WHERE / 패턴 / MERGE / DELETE</h1>
                  <p className="text-sm text-slate-500 mt-0.5">ASCII art 패턴 매칭 — 그림이 그대로 코드</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 안내 */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 text-sm text-violet-900">
                💡 다음(III-2-1)에서는 <strong>가변 길이 경로</strong> — <code className="bg-white px-1 py-0.5 rounded text-xs">[r:KNOWS*1..5]</code>로 1~5 홉 친구 모두 찾기
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-violet-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-violet-600 text-white hover:bg-violet-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; III-1-1 Neo4j 개론</a>
              <a href="./III-2-1.html" className="text-violet-700 hover:text-violet-900 font-medium">III-2-1 가변 길이 경로 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
