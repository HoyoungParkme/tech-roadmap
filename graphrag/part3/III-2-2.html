<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — 인덱스와 성능</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    III-2-2. 인덱스와 성능
    학습 목표: Neo4j 인덱스 종류와 성능 최적화를 안다.
    핵심 비유: "전화번호부의 ㄱㄴㄷ 색인" — 인덱스 없으면 처음부터 훑기
    구조: 4단계 (풀스캔 / 단일 인덱스 / 유니크 제약 / EXPLAIN/PROFILE)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 데이터 규모별 응답 시간
    const PERFORMANCE = [
      { rows: '1만',    scan: '0.05s',  index: '0.001s', scanWidth: 5,  indexWidth: 1 },
      { rows: '10만',   scan: '0.5s',   index: '0.001s', scanWidth: 25, indexWidth: 1 },
      { rows: '100만',  scan: '5s',     index: '0.002s', scanWidth: 80, indexWidth: 1 },
    ];

    // 쿼리 플랜 비교
    const PLANS = {
      noIndex: [
        { op: 'NodeByLabelScan', cost: '높음 (모든 :Person 노드 스캔)', tone: 'red' },
        { op: 'Filter',           cost: '중간 (email 속성 비교)',       tone: 'amber' },
      ],
      withIndex: [
        { op: 'NodeIndexSeek',    cost: '낮음 (B-Tree 인덱스 직접 조회)', tone: 'emerald' },
      ],
    };

    const TONE_BG = {
      red:     'bg-rose-50 border-rose-200 text-rose-800',
      amber:   'bg-amber-50 border-amber-200 text-amber-800',
      emerald: 'bg-emerald-50 border-emerald-200 text-emerald-800',
    };

    const STEPS = [
      {
        title: 'Step 1. 풀스캔 — 인덱스 없으면',
        desc: 'Cypher 쿼리는 항상 "시작 노드"를 찾는 데서 출발한다. 인덱스가 없으면 :Person 라벨 모든 노드를 훑어 email 속성이 일치하는 것을 찾는다 (NodeByLabelScan + Filter). 100만 노드라면 5초+.',
        code: 'MATCH (p:Person {email: "alice@x.com"})\nRETURN p',
        focus: 'noIndex',
      },
      {
        title: 'Step 2. 단일 속성 인덱스',
        desc: '`CREATE INDEX`로 email 속성에 인덱스를 만들면 NodeIndexSeek로 즉시 찾는다. B-Tree 기반이라 O(log n). 100만 노드도 0.002초.',
        code: 'CREATE INDEX person_email_idx\nFOR (p:Person) ON (p.email)',
        focus: 'singleIndex',
      },
      {
        title: 'Step 3. 유니크 제약 = 인덱스 + 검증',
        desc: '`CREATE CONSTRAINT`는 인덱스를 자동 생성하고 중복까지 차단한다. email은 사용자 식별자이므로 유니크 제약이 더 적합. 인덱스 단독 vs 제약 — 제약이 더 강한 보장.',
        code: 'CREATE CONSTRAINT person_email_unique\nFOR (p:Person)\nREQUIRE p.email IS UNIQUE',
        focus: 'constraint',
      },
      {
        title: 'Step 4. EXPLAIN / PROFILE — 쿼리 플랜 분석',
        desc: '`EXPLAIN`은 플랜만 보여주고, `PROFILE`은 실제 실행 + 비용까지. NodeByLabelScan이 보이면 인덱스 미사용. NodeIndexSeek가 보이면 정상. 느린 쿼리 진단의 1번 도구.',
        code: 'PROFILE\nMATCH (p:Person {email: "alice@x.com"})\nRETURN p',
        focus: 'profile',
      },
    ];

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const focus = step.focus;
      const showIndex = focus === 'singleIndex' || focus === 'constraint' || focus === 'profile';

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">인덱스와 성능</h1>
                <p className="text-sm text-slate-500 mt-1">전화번호부 ㄱㄴㄷ 색인 — 풀스캔 vs 인덱스 시크</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* Cypher 코드 */}
            <div className="bg-slate-900 rounded-xl p-4 mb-4">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">Cypher</span>
              </div>
              <pre className="text-emerald-300 font-mono text-sm overflow-x-auto whitespace-pre">
{step.code}
              </pre>
            </div>

            {/* 성능 비교 막대 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-4">
              <div className="text-xs font-bold text-slate-700 mb-3">⏱ 시작 노드 찾기 — 데이터 규모별 응답 시간</div>
              <div className="space-y-3">
                {PERFORMANCE.map((p) => (
                  <div key={p.rows}>
                    <div className="text-xs font-mono font-bold text-slate-700 mb-1">:Person {p.rows} 노드</div>
                    <div className="space-y-1">
                      <div className="flex items-center gap-2">
                        <span className="text-[10px] font-bold text-rose-700 w-20 shrink-0">풀스캔</span>
                        <div className="flex-1 h-3 bg-slate-100 rounded-full overflow-hidden">
                          <div className="h-full bg-rose-400 rounded-full transition-all" style={{ width: p.scanWidth + '%' }} />
                        </div>
                        <span className="text-[10px] font-mono text-slate-600 w-14 text-right">{p.scan}</span>
                      </div>
                      {showIndex && (
                        <div className="flex items-center gap-2">
                          <span className="text-[10px] font-bold text-emerald-700 w-20 shrink-0">인덱스 시크</span>
                          <div className="flex-1 h-3 bg-slate-100 rounded-full overflow-hidden">
                            <div className="h-full bg-emerald-500 rounded-full transition-all" style={{ width: p.indexWidth + '%' }} />
                          </div>
                          <span className="text-[10px] font-mono text-slate-600 w-14 text-right">{p.index}</span>
                        </div>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Step 4 PROFILE 결과 */}
            {focus === 'profile' && (
              <div className="bg-white rounded-xl shadow-sm border-2 border-blue-300 p-4 mb-6">
                <div className="text-xs font-bold text-blue-700 mb-3">🔍 PROFILE 쿼리 플랜</div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                  <div>
                    <div className="text-[11px] font-bold text-slate-700 mb-2">❌ 인덱스 없음</div>
                    <div className="space-y-1.5">
                      {PLANS.noIndex.map((p) => (
                        <div key={p.op} className={`rounded border p-2 text-[11px] ${TONE_BG[p.tone]}`}>
                          <div className="font-mono font-bold">{p.op}</div>
                          <div className="text-[10px] mt-0.5">{p.cost}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div>
                    <div className="text-[11px] font-bold text-slate-700 mb-2">✅ 인덱스/제약 있음</div>
                    <div className="space-y-1.5">
                      {PLANS.withIndex.map((p) => (
                        <div key={p.op} className={`rounded border p-2 text-[11px] ${TONE_BG[p.tone]}`}>
                          <div className="font-mono font-bold">{p.op}</div>
                          <div className="text-[10px] mt-0.5">{p.cost}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
                <div className="text-[10px] text-slate-500 mt-3">→ 느린 쿼리는 PROFILE에서 NodeByLabelScan을 찾아 인덱스 추가</div>
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
