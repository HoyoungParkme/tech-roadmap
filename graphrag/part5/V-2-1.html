<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — 비용·성능 튜닝</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    V-2-1. 비용·성능 튜닝
    학습 목표: 비용을 줄이는 캐싱/배치/요약 분리 전략을 안다.
    핵심 비유: "카페 운영 최적화" — 자주 시키는 음료 미리(캐싱), 한꺼번에 갈기(배치), 사장님 일은 사장님만(요약 분리)
    구조: 4단계 (캐싱 / 배치 추론 / 요약 단계 분리 / 종합 비용 비교)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 비용 단위는 데모용 상대값 ($/1000 호출 기준 가공치). 실제 가격 아님 — 비율 학습용
    const STEPS = [
      {
        title: 'Step 1. 캐싱 — 자주 묻는 질문은 한 번만',
        desc: '같은 질문이 반복되면 LLM 호출 결과를 키 기반으로 저장. 캐시 히트 시 LLM은 0번 호출 → 비용 0. LangChain `set_llm_cache(SQLiteCache(...))` 한 줄로 적용.',
        block: {
          kind: 'python',
          code: `from langchain.globals import set_llm_cache
from langchain_community.cache import SQLiteCache

set_llm_cache(SQLiteCache(database_path=".cache.db"))

# 첫 호출: LLM 호출 (비용 발생)
llm.invoke("톰 행크스가 출연한 영화는?")  # $0.002

# 같은 질문 재호출: 캐시 히트 (비용 0)
llm.invoke("톰 행크스가 출연한 영화는?")  # $0.000`,
        },
        bars: [
          { label: '캐시 OFF (1000 동일 질문)', cost: 100, tone: 'red' },
          { label: '캐시 ON (1000 동일 질문)',  cost: 1,   tone: 'green' },
        ],
        focus: 'cache',
      },
      {
        title: 'Step 2. 배치 추론 — 한꺼번에 갈기',
        desc: '엔티티 1만 개를 추출할 때 1만 번 호출하지 말고 한 번에 50~100개씩 묶어 호출. 모델 호출 오버헤드(네트워크 + 시스템 프롬프트)가 N분의 1로. OpenAI Batch API는 50% 추가 할인.',
        block: {
          kind: 'python',
          code: `# Bad — 1만 번 호출
for chunk in chunks:                   # 10,000회
    extract_entities(chunk)            # 매번 시스템 프롬프트 재전송

# Good — 100개씩 배치
for batch in chunked(chunks, 100):     # 100회 (1/100)
    extract_entities_batch(batch)      # 한 호출에 100개 청크`,
        },
        bars: [
          { label: '단일 호출 ×10,000',   cost: 100, tone: 'red' },
          { label: '배치 100 묶음 ×100', cost: 12,  tone: 'amber' },
          { label: 'Batch API (50%)',    cost: 6,   tone: 'green' },
        ],
        focus: 'batch',
      },
      {
        title: 'Step 3. 요약 단계 분리 — 비싼 일은 한 번만',
        desc: 'Community 요약(IV-2-1)은 비싼 모델로 한 번만 생성하고 저장. 사용자 질의(IV-2-2)는 저장된 요약을 가져다 쓰며 작은 모델로 가공. 비싼 모델 호출 횟수가 큰 비용 차이를 만든다.',
        block: {
          kind: 'python',
          code: `# 인덱싱 시 (비싼 모델, 1회만)
for community in communities:
    summary = gpt4o.invoke(prompt(community))
    db.save(community.id, summary)     # 영구 저장

# 질의 시 (싼 모델, N회)
def query(question):
    summaries = db.load_relevant(question)   # 그대로 사용
    return gpt4o_mini.invoke(             # 싼 모델로 답변 합성
        f"{summaries}\\n\\nQ: {question}"
    )`,
        },
        bars: [
          { label: '매 질의마다 요약 재생성', cost: 100, tone: 'red' },
          { label: '인덱싱 1회 + 답변 N회',  cost: 18,  tone: 'green' },
        ],
        focus: 'split',
      },
      {
        title: 'Step 4. 종합 — 셋 다 적용한 결과',
        desc: '캐싱 + 배치 + 요약 분리를 누적 적용하면 동일 워크로드에서 비용을 한 자릿수 % 수준으로 압축할 수 있다. 실제 절감률은 데이터/질문 분포에 따라 다르므로 측정 필수.',
        block: {
          kind: 'text',
          code: `# 동일 워크로드 (10K 인덱싱 + 1K 질의 / 30% 캐시 히트 가정)

튜닝 전        ████████████████████████████████  $1,000
캐싱만 적용    ██████████████████████            $700
+ 배치 추론    ████████                          $250
+ 요약 분리    ███                               $90  ← 셋 다`,
        },
        bars: [
          { label: '튜닝 전',                cost: 100, tone: 'red' },
          { label: '+ 캐싱',                 cost: 70,  tone: 'amber' },
          { label: '+ 배치 추론',            cost: 25,  tone: 'amber' },
          { label: '+ 요약 분리 (셋 다)',    cost: 9,   tone: 'green' },
        ],
        focus: 'combine',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      text:   { label: 'Text',   textColor: '#fde68a' },
    };

    // 정적 색상 매핑 (Tailwind Play CDN 안정성)
    const TONE_BAR = {
      red:   'bg-red-500',
      amber: 'bg-amber-500',
      green: 'bg-emerald-500',
    };
    const TONE_LABEL = {
      red:   'text-red-700',
      amber: 'text-amber-700',
      green: 'text-emerald-700',
    };

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">비용·성능 튜닝</h1>
                <p className="text-sm text-slate-500 mt-1">카페 운영 최적화 — 캐싱 · 배치 · 요약 분리</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* 비용 비교 막대 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-6">
              <div className="text-xs font-bold text-slate-700 mb-3">📊 상대 비용 (튜닝 전 = 100)</div>
              <div className="space-y-2">
                {step.bars.map((bar, i) => (
                  <div key={i} className="flex items-center gap-3">
                    <div className={`w-56 text-xs font-bold ${TONE_LABEL[bar.tone]} text-right shrink-0`}>{bar.label}</div>
                    <div className="flex-1 bg-slate-100 rounded-md h-6 overflow-hidden">
                      <div
                        className={`h-full ${TONE_BAR[bar.tone]} transition-all duration-500 flex items-center justify-end pr-2 text-[10px] font-bold text-white`}
                        style={{ width: `${bar.cost}%` }}
                      >
                        {bar.cost}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* 코드 블록 */}
            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {/* 단계별 진행 표시 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-6">
              <div className="text-xs font-bold text-slate-700 mb-3">📍 튜닝 누적</div>
              <div className="grid grid-cols-4 gap-2">
                {STEPS.map((s, i) => (
                  <div
                    key={s.focus}
                    className={`rounded-lg p-3 text-center transition-all ${i === currentStep ? 'bg-amber-100 border-2 border-amber-400' : 'bg-slate-50 border border-slate-200'}`}
                  >
                    <div className="text-[10px] font-bold text-slate-500 mb-1">Step {i + 1}</div>
                    <div className="text-xs font-bold text-slate-800">{s.focus}</div>
                  </div>
                ))}
              </div>
            </div>

            {step.focus === 'combine' && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 mb-6 text-xs text-amber-900">
                💡 다음(V-2-2)에서는 운영 단계에서 점검할 체크리스트(데이터 갱신 / 정합성 / 비용 알림)를 본다 — 비용 튜닝이 끝났어도 운영 모니터링 없이는 어느 날 청구서가 폭발한다
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
