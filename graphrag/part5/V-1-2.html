            'class HybridResponse(BaseModel):',
            '    answer: str',
            '    vector_chunks: list[dict]   # [{chunk_id, score, snippet}]',
            '    cited_nodes: list[CitedNode]',
            '    cited_edges: list[CitedEdge]',
            '',
            'def to_response(result: dict) -> HybridResponse:',
            '    cited = result["cited"][0]["context"]   # cypher chain row',
            '    nodes, edges = parse_cypher_rows(cited)  # row → 노드/엣지 추출',
            '',
            '    return HybridResponse(',
            '        answer=result["answer"],',
            '        vector_chunks=[',
            '            {"chunk_id": d.metadata["chunk_id"],',
            '             "score":    d.metadata.get("score", 0.0),',
            '             "snippet":  d.page_content[:120]}',
            '            for d in result["vec_docs"]',
            '        ],',
            '        cited_nodes=nodes,',
            '        cited_edges=edges,',
            '    )',
            '',
            '# → 사용자는 답뿐 아니라 인용된 청크/노드/관계까지 검증 가능',
            '# → 운영에서 "이 답 어디서 왔어?" 질문에 즉답',
          ],
          highlight: [14, 15, 16, 17, 26, 32, 33, 36, 37],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // LiveDataPane — LangChain 흐름 박스 + 출력 박스
    // ─────────────────────────────────────────────────────
    function FlowBox({ node, isActive }) {
      const colStart = `col-start-${node.col}`;
      const colSpan  = `col-span-${node.span}`;
      const base = 'rounded-lg border-2 p-2 text-center transition-all duration-500';
      const active = isActive
        ? 'bg-violet-100 border-violet-500 shadow-md scale-105'
        : 'bg-slate-50 border-slate-200 opacity-50';
      return (
        <div className={`${colStart} ${colSpan} ${base} ${active}`}>
          <div className="text-xl">{node.emoji}</div>
          <div className={`text-[11px] font-bold mt-0.5 ${isActive ? 'text-violet-800' : 'text-slate-600'}`}>{node.label}</div>
          <div className="text-[9px] text-slate-500 leading-tight mt-0.5">{node.sub}</div>
        </div>
      );
    }

    function FlowDiagram({ activeKeys }) {
      // FLOW_NODES를 row별로 그룹화
      const rows = {};
      FLOW_NODES.forEach((n) => {
        if (!rows[n.row]) rows[n.row] = [];
        rows[n.row].push(n);
      });
      const rowKeys = Object.keys(rows).map(Number).sort((a, b) => a - b);

      return (
        <div className="space-y-1">
          {rowKeys.map((rowIdx) => (
            <React.Fragment key={rowIdx}>
              <div className="grid grid-cols-4 gap-2">
                {rows[rowIdx].map((n) => (
                  <FlowBox key={n.key} node={n} isActive={activeKeys.includes(n.key)} />
                ))}
              </div>
              {rowIdx < rowKeys.length && (
                <div className="grid grid-cols-4 gap-2 h-3">
                  {rowIdx === 1 && (
                    <>
                      <div className="col-start-2 col-span-1 flex justify-center"><span className="text-violet-400 text-xs">↘</span></div>
                      <div className="col-start-3 col-span-1 flex justify-center"><span className="text-violet-400 text-xs">↙</span></div>
                    </>
                  )}
                  {rowIdx === 2 && (
                    <>
                      <div className="col-start-2 col-span-1 flex justify-end pr-1"><span className="text-violet-400 text-xs">↘</span></div>
                      <div className="col-start-3 col-span-1 flex justify-start pl-1"><span className="text-violet-400 text-xs">↙</span></div>
                    </>
                  )}
                  {rowIdx === 3 && (
                    <div className="col-start-2 col-span-2 flex justify-center"><span className="text-violet-400 text-xs">↓</span></div>
                  )}
                  {rowIdx === 4 && (
                    <div className="col-start-2 col-span-2 flex justify-center"><span className="text-violet-400 text-xs">↓</span></div>
                  )}
                </div>
              )}
            </React.Fragment>
          ))}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // OutputBox — 단계별 출력 (청크 / 노드·엣지 / 최종답)
    // ─────────────────────────────────────────────────────
    function OutputBox({ box }) {
      return (
        <div className="mt-4 border-2 border-violet-200 bg-violet-50/50 rounded-lg p-3">
          <div className="text-[11px] font-bold text-violet-700 uppercase tracking-wider mb-2">
            📤 {box.title}
          </div>

          {/* 벡터 청크 */}
          {box.chunks && box.chunks.length > 0 && (
            <div className="mb-3">
              <div className="text-[10px] font-bold text-slate-600 mb-1">Vector chunks</div>
              <div className="space-y-1">
                {box.chunks.map((c) => (
                  <div key={c.id} className="bg-white border border-slate-200 rounded px-2 py-1.5 text-[10px] flex gap-2">
                    <span className="font-mono text-violet-700 flex-shrink-0">{c.id}</span>
                    <span className="font-mono text-emerald-600 flex-shrink-0">{c.score.toFixed(2)}</span>
                    <span className="text-slate-700 truncate">{c.text}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* 생성된 Cypher (Step 3 전용) */}
          {box.generatedCypher && (
            <div className="mb-3">
              <div className="text-[10px] font-bold text-slate-600 mb-1">Generated Cypher (LLM)</div>
              <pre className="bg-slate-900 text-emerald-300 text-[10px] font-mono p-2 rounded whitespace-pre-wrap">
{box.generatedCypher}
              </pre>
            </div>
          )}

          {/* 인용된 노드·엣지 (그래프 미니뷰) */}
          {box.citedNodes && box.citedNodes.length > 0 && (
            <div className="mb-3">
              <div className="text-[10px] font-bold text-slate-600 mb-1">Cited graph ({box.citedNodes.length} nodes · {box.citedEdges.length} edges)</div>
              <CitedGraph nodes={box.citedNodes} edges={box.citedEdges} />
            </div>
          )}

          {/* 한계 메시지 (Step 2) */}
          {box.missing && (
            <div className="bg-amber-50 border border-amber-300 rounded p-2 text-[10px] text-amber-900">
              <div className="font-bold mb-1">⚠ 벡터만으로 부족한 점</div>
              <ul className="list-disc pl-4 space-y-0.5">
                {box.missing.map((m, i) => <li key={i}>{m}</li>)}
              </ul>
            </div>
          )}

          {/* 최종 답변 (Step 5) */}
          {box.answer && (
            <div className="bg-violet-700 text-white rounded p-2 text-[11px] leading-relaxed">
              <div className="font-bold text-violet-200 mb-1">💬 Answer</div>
              <p>{box.answer}</p>
            </div>
          )}
        </div>
      );
    }

    // 인용된 노드/엣지를 간단 SVG로 보여주는 미니 그래프
    function CitedGraph({ nodes, edges }) {
      // 간단 layout — Person 좌측 / Movie 우측
      const persons = nodes.filter((n) => n.label === 'Person');
      const movies  = nodes.filter((n) => n.label === 'Movie');
      const W = 460, H = 140;
      const personX = 70, movieX = 380;
      const positions = {};
      persons.forEach((p, i) => {
        positions[p.id] = { x: personX, y: 30 + i * (H - 60) / Math.max(persons.length - 1, 1) };
      });
      movies.forEach((m, i) => {
        positions[m.id] = { x: movieX, y: 20 + i * (H - 40) / Math.max(movies.length - 1, 1) };
      });

      const edgeColor = { DIRECTED: '#8b5cf6', ACTED_IN: '#10b981' };

      return (
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full bg-white border border-slate-200 rounded" style={{ maxHeight: '170px' }}>
          {edges.map((e, i) => {
            const src = positions[e.from];
            const dst = positions[e.to];
            if (!src || !dst) return null;
            return (
              <g key={i}>
                <line x1={src.x + 18} y1={src.y} x2={dst.x - 18} y2={dst.y}
                      stroke={edgeColor[e.type] || '#94a3b8'} strokeWidth="1.2" />
                <text x={(src.x + dst.x) / 2} y={(src.y + dst.y) / 2 - 3}
                      fontSize="7" fill={edgeColor[e.type] || '#475569'} textAnchor="middle">
                  {e.type}
                </text>
              </g>
            );
          })}
          {nodes.map((n) => {
            const p = positions[n.id];
            if (!p) return null;
            const fill = n.label === 'Person' ? '#a78bfa' : '#fbbf24';
            return (
              <g key={n.id}>
                <circle cx={p.x} cy={p.y} r="14" fill={fill} stroke="#1e293b" strokeWidth="0.8" />
                <text x={p.x} y={p.y + 3} fontSize="8" textAnchor="middle" fill="#1e293b" fontWeight="bold">
                  {n.label === 'Person' ? '👤' : '🎬'}
                </text>
                <text x={p.x} y={p.y + 28} fontSize="8" textAnchor="middle" fill="#334155">
                  {n.name.length > 18 ? n.name.slice(0, 17) + '…' : n.name}
                </text>
              </g>
            );
          })}
        </svg>
      );
    }

    function LiveDataPane({ stepIdx, outputBox }) {
      const activeKeys = ACTIVE_NODES_BY_STEP[stepIdx];
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🔗 LangChain Hybrid 흐름</h2>
            <span className="text-[10px] text-slate-400 font-mono">vector + graph · live</span>
          </div>

          <FlowDiagram activeKeys={activeKeys} />

          <OutputBox box={outputBox} />
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // CodeViewer — VSCode 스타일 + highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      // 4 파일 탭 (현재 파일 강조)
      const TAB_FILES = ['vector-only.py', 'cypher-chain.py', 'hybrid.py', 'output-format.py'];

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 라인 */}
          <div className="bg-[#21252b] px-3 pt-2 border-b border-slate-700">
            <div className="flex items-center gap-2 mb-2">
              <div className="flex gap-1.5">
                <span className="w-3 h-3 rounded-full bg-red-500"></span>
                <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
                <span className="w-3 h-3 rounded-full bg-green-500"></span>
              </div>
              <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
            </div>
            <div className="flex gap-0.5 overflow-x-auto">
              {TAB_FILES.map((fn) => {
                const isActive = fn === code.filename;
                return (
                  <div
                    key={fn}
                    className={`px-3 py-1.5 text-[11px] font-mono rounded-t border-t border-l border-r ${
                      isActive
                        ? 'bg-[#282c34] text-violet-300 border-slate-600'
                        : 'bg-[#1c1f24] text-slate-500 border-transparent hover:text-slate-300'
                    }`}
                  >
                    {fn}
                  </div>
                );
              })}
            </div>
          </div>

          {/* hljs 토큰화용 hidden source */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 라인 번호 + 강조 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/40 ${highlighted ? 'bg-violet-500/10 border-l-2 border-violet-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-violet-700 hover:text-violet-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. 통합 &amp; 운영 &gt; Chapter 1. 프레임워크 통합</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">LangChain GraphRAG 통합</h1>
                  <p className="text-sm text-slate-500 mt-0.5">Neo4j Vector + Graph 하이브리드 — 답 + 인용 노드/엣지를 한번에</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane stepIdx={stepIdx} outputBox={step.outputBox} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 text-sm text-violet-900">
                💡 다음(V-2-1)에서는 <strong>운영 체크리스트</strong> — 데이터 갱신·정합성 모니터링·비용 알림
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-violet-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-violet-600 text-white hover:bg-violet-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./V-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; V-1-1 Microsoft GraphRAG</a>
              <a href="./V-2-1.html" className="text-violet-700 hover:text-violet-900 font-medium">V-2-1 운영 체크리스트 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
