<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — LangChain GraphRAG 통합</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    V-1-2. LangChain GraphRAG 통합
    학습 목표: LangChain의 Graph 모듈로 Neo4j와 LLM을 연결한다.
    핵심 비유: "통역사 체인" — 자연어 질문을 Cypher로 통역, 결과를 다시 자연어 답변으로 통역
    구조: 4단계 (Neo4jGraph 연결 / 스키마 자동 추출 / GraphCypherQAChain 자연어→Cypher / LLM 답변 생성)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 통역사 체인 4-stage 파이프라인 (사용자 → Cypher 통역 → DB → 답변 통역)
    const STAGES = [
      { key: 'user',    label: '사용자',     emoji: '🧑',   role: '자연어 질문' },
      { key: 'cypher',  label: 'Cypher 통역사', emoji: '🌀', role: 'LLM이 Cypher 생성' },
      { key: 'neo4j',   label: 'Neo4j DB',  emoji: '🗃️',  role: '쿼리 실행' },
      { key: 'answer',  label: '답변 통역사', emoji: '💬', role: 'LLM이 자연어 답변 생성' },
    ];

    const STEPS = [
      {
        title: 'Step 1. Neo4jGraph 연결 — bolt URI + 자격 증명',
        desc: 'LangChain의 `Neo4jGraph` 래퍼로 실행 중인 Neo4j 인스턴스에 연결. 이후 모든 Cypher 호출은 이 객체로 위임된다.',
        block: {
          kind: 'python',
          code: `from langchain_community.graphs import Neo4jGraph

graph = Neo4jGraph(
    url="bolt://localhost:7687",
    username="neo4j",
    password="password",
)`,
        },
        focus: 'connect',
      },
      {
        title: 'Step 2. 스키마 자동 추출 — refresh_schema()',
        desc: '연결된 그래프의 노드 라벨/관계 타입/속성 키를 자동 수집해 텍스트 스키마로 변환. LLM이 Cypher를 짤 때 이 스키마를 컨텍스트로 받는다.',
        block: {
          kind: 'text',
          code: `# graph.schema (자동 추출)

Node properties:
Person {name: STRING, born: INTEGER}
Movie {title: STRING, released: INTEGER, tagline: STRING}

Relationship properties:
ACTED_IN {roles: LIST}
DIRECTED {}

Relationships:
(:Person)-[:ACTED_IN]->(:Movie)
(:Person)-[:DIRECTED]->(:Movie)`,
        },
        focus: 'schema',
      },
      {
        title: 'Step 3. GraphCypherQAChain — 자연어 → Cypher 생성',
        desc: '자연어 질문을 받으면 LLM이 Step 2의 스키마를 보고 Cypher를 생성. 체인이 그 Cypher를 Neo4j에 실행해 결과를 가져온다.',
        block: {
          kind: 'python',
          code: `from langchain.chains import GraphCypherQAChain
from langchain_openai import ChatOpenAI

chain = GraphCypherQAChain.from_llm(
    llm=ChatOpenAI(model="gpt-4o-mini", temperature=0),
    graph=graph,
    verbose=True,
)

result = chain.invoke({"query": "톰 행크스가 출연한 영화는?"})

# verbose 로그 — LLM이 생성한 Cypher
# > Generated Cypher:
# > MATCH (p:Person {name: "Tom Hanks"})-[:ACTED_IN]->(m:Movie)
# > RETURN m.title`,
        },
        focus: 'cypher',
      },
      {
        title: 'Step 4. 결과 → 자연어 답변',
        desc: 'Cypher 결과(Row 묶음)를 같은 LLM이 다시 자연어로 가공해 사용자에게 답변. 한 체인 안에서 두 번의 LLM 호출이 일어난다(Cypher 생성 + 답변 생성).',
        block: {
          kind: 'text',
          code: `# Neo4j 결과 (Row 리스트)
[
  {"m.title": "Forrest Gump"},
  {"m.title": "Cast Away"},
  {"m.title": "The Green Mile"},
]

# 최종 답변 (LLM이 자연어로 가공)
"톰 행크스는 'Forrest Gump', 'Cast Away',
 'The Green Mile' 등에 출연했습니다."`,
        },
        focus: 'answer',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      text:   { label: 'Text',   textColor: '#fde68a' },
    };

    // Step별 파이프라인 강조 노드 — 4 STEP이 4 STAGE를 순서대로 통과하도록 매핑
    const ACTIVE_STAGE_BY_FOCUS = {
      connect: 'user',    // Step1: 사용자(연결 진입점)
      schema:  'neo4j',   // Step2: DB 스키마 추출
      cypher:  'cypher',  // Step3: Cypher 통역사
      answer:  'answer',  // Step4: 답변 통역사
    };

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];
      const activeStage = ACTIVE_STAGE_BY_FOCUS[step.focus];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">LangChain GraphRAG 통합</h1>
                <p className="text-sm text-slate-500 mt-1">통역사 체인 — 자연어를 Cypher로, 결과를 다시 자연어로</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* 통역사 체인 파이프라인 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-6">
              <div className="text-xs font-bold text-slate-700 mb-3">🔗 통역사 체인 (LangChain GraphCypherQAChain 내부)</div>
              <div className="grid grid-cols-7 gap-1 items-center">
                {STAGES.map((stage, i) => {
                  const isActive = activeStage === stage.key;
                  return (
                    <React.Fragment key={stage.key}>
                      <div className={`col-span-1 rounded-lg p-2 text-center transition-all ${isActive ? 'bg-amber-100 border-2 border-amber-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}>
                        <div className="text-xl">{stage.emoji}</div>
                        <div className="text-[10px] font-bold text-slate-700 mt-1">{stage.label}</div>
                        <div className="text-[9px] text-slate-500 leading-tight mt-1">{stage.role}</div>
                      </div>
                      {i < STAGES.length - 1 && (
                        <div className="col-span-1 text-center text-slate-400 text-lg">→</div>
                      )}
                    </React.Fragment>
                  );
                })}
              </div>
            </div>

            {/* 코드 블록 */}
            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'answer' && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 mb-6 text-xs text-amber-900">
                💡 LangChain은 V-1-1(Microsoft GraphRAG)보다 단계 통제가 자세하다. 단점은 인덱싱·요약·Community Detection을 직접 짜야 한다는 점 — 라이브러리 한 줄로 끝나지 않는다
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
