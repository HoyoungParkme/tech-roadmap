    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 5 stage 파이프라인 + progress bar + 쿼리 결과
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ stages, progressPct, queryResult }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🏭 GraphRAG 인덱싱 파이프라인</h2>
            <span className="text-[10px] text-slate-400 font-mono">5 stages · live</span>
          </div>

          {/* 전체 진행률 bar */}
          <div className="mb-4">
            <div className="flex items-center justify-between text-[10px] text-slate-500 mb-1 font-mono">
              <span>전체 진행률</span>
              <span className="text-violet-700 font-bold">{progressPct}%</span>
            </div>
            <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
              <div
                className="h-full bg-gradient-to-r from-violet-400 to-violet-600 transition-all duration-700"
                style={{ width: `${progressPct}%` }}
              />
            </div>
          </div>

          {/* 5 stage 박스 + 화살표 (세로 흐름) */}
          <div className="space-y-2">
            {stages.map((s, i) => {
              const meta = STAGE_META.find((m) => m.key === s.key);
              const style = STAGE_STYLE[s.state];
              const isActive = s.state === 'active';
              return (
                <React.Fragment key={s.key}>
                  <div
                    className={`rounded-lg border-2 px-3 py-2 transition-all duration-500 ${style.box} ${isActive ? 'shadow-md scale-[1.02]' : ''}`}
                  >
                    <div className="flex items-center gap-3">
                      {/* 단계 번호 dot */}
                      <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold text-white flex-shrink-0 ${style.dot} ${isActive ? 'animate-pulse' : ''}`}>
                        {i + 1}
                      </div>

                      {/* 이름 + 부제 */}
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-1.5">
                          <span aria-hidden="true">{meta.emoji}</span>
                          <span className={`text-sm font-bold ${style.text}`}>{meta.name}</span>
                          <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${style.badge}`}>
                            {style.label}
                          </span>
                        </div>
                        <div className="text-[10px] text-slate-500 mt-0.5 font-mono truncate">
                          {s.metric}
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* 화살표 (마지막 단계 제외) */}
                  {i < stages.length - 1 && (
                    <div className="flex justify-center">
                      <span className={`text-base ${stages[i].state === 'done' ? 'text-emerald-400' : 'text-slate-300'}`}>
                        ↓
                      </span>
                    </div>
                  )}
                </React.Fragment>
              );
            })}
          </div>

          {/* 쿼리 결과 박스 (Step 4 / 5) */}
          {queryResult && (
            <div className="mt-4 p-3 rounded-lg bg-violet-50 border-2 border-violet-300 animate-pulse-once">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] font-bold px-2 py-0.5 rounded bg-violet-600 text-white font-mono">
                  {queryResult.mode}
                </span>
                <span className="text-xs font-bold text-violet-900">쿼리 결과</span>
              </div>
              <div className="text-[11px] text-violet-700 font-mono mb-1">
                Q: {queryResult.q}
              </div>
              <div className="text-xs text-slate-800 leading-relaxed mb-2">
                A: {queryResult.a}
              </div>
              <div className="flex flex-wrap gap-1">
                {queryResult.sources.map((src) => (
                  <span key={src} className="text-[9px] font-mono bg-white border border-violet-200 text-violet-700 px-1.5 py-0.5 rounded">
                    {src}
                  </span>
                ))}
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-slate-300"></span>대기</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-violet-500"></span>진행 중</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-emerald-400"></span>완료</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + 라인 번호 + 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          // hljs가 토큰화한 innerHTML을 \n 단위로 split
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-300 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 파일명 탭 5개 — 현재 단계 강조 */}
          <div className="bg-[#21252b] px-2 py-1 flex items-center gap-1 border-b border-slate-700 overflow-x-auto">
            {STEPS.map((s, i) => (
              <span
                key={s.code.filename}
                className={`text-[10px] font-mono px-2 py-1 rounded-t whitespace-nowrap ${
                  i === stepIdx
                    ? 'bg-[#282c34] text-violet-300 border-t border-x border-slate-700'
                    : 'text-slate-500'
                }`}
              >
                {s.code.filename}
              </span>
            ))}
          </div>

          {/* hljs 토큰화용 hidden code (innerHTML 추출) */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-violet-500/10 border-l-2 border-violet-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.lang}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — fastapi v1 패턴
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-violet-700 hover:text-violet-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. 라이브러리 &amp; 도구 &gt; Chapter 1. 공식 라이브러리</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Microsoft GraphRAG</h1>
                  <p className="text-sm text-slate-500 mt-0.5">조립 키트 — 설치 → settings.yaml → 인덱싱 → Local/Global 쿼리</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                stages={step.stages}
                progressPct={step.progressPct}
                queryResult={step.queryResult}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 text-sm text-violet-900">
                💡 다음(V-1-2)에서는 <strong>LangChain + Neo4j</strong> 직접 연결 — Microsoft GraphRAG보다 세밀한 통제가 필요할 때 선택지
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-violet-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-violet-600 text-white hover:bg-violet-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./V-1-2.html" className="text-violet-700 hover:text-violet-900 font-medium">V-1-2 LangChain + Neo4j &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
