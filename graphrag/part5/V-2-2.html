<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — 운영 체크리스트</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    V-2-2. 운영 체크리스트
    학습 목표: 프로덕션에 GraphRAG를 올릴 때 점검할 항목을 안다.
    핵심 비유: "비행 전 체크리스트" — 항목별 점검을 마쳐야 이륙
    구조: 4단계 (데이터 갱신 / 정합성 모니터링 / 비용 알림 / 종합)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 4개 카테고리 × 항목 — 단계가 진행되면 누적 체크
    const CATEGORIES = [
      {
        key: 'refresh',
        title: '① 데이터 갱신',
        emoji: '🔄',
        items: [
          { id: 'r1', text: '재인덱싱 주기 결정 (전체 vs 증분)' },
          { id: 'r2', text: '신규 문서 워치 파이프라인' },
          { id: 'r3', text: '오래된 청크 만료 정책' },
        ],
      },
      {
        key: 'integrity',
        title: '② 정합성 모니터링',
        emoji: '🩺',
        items: [
          { id: 'i1', text: '중복 엔티티 탐지 (별칭 / 표기 흔들림)' },
          { id: 'i2', text: '고립 노드 / 끊긴 관계 알림' },
          { id: 'i3', text: 'Community 분포 변화 추적' },
        ],
      },
      {
        key: 'cost',
        title: '③ 비용 알림',
        emoji: '💰',
        items: [
          { id: 'c1', text: '일일 토큰 한도 + 임계치 80% 알림' },
          { id: 'c2', text: '캐시 히트율 대시보드 (V-2-1)' },
          { id: 'c3', text: '예산 초과 시 자동 차단' },
        ],
      },
      {
        key: 'safety',
        title: '④ 보안 / 권한',
        emoji: '🔐',
        items: [
          { id: 's1', text: '사용자별 그래프 노출 범위' },
          { id: 's2', text: 'PII 마스킹 / 감사 로그' },
          { id: 's3', text: 'API Key 회전 정책' },
        ],
      },
    ];

    const STEPS = [
      {
        title: 'Step 1. 데이터 갱신 — 그래프는 살아 있는 자산',
        desc: '문서가 추가/수정되면 그래프도 갱신돼야 한다. 전체 재인덱싱은 비싸므로 변경분만 처리하는 증분 파이프라인을 둔다. 갱신 주기를 정해두지 않으면 답변이 점점 낡는다.',
        block: {
          kind: 'yaml',
          code: `refresh:
  mode: incremental          # full(주 1회) / incremental(매일)
  schedule: "0 3 * * *"      # 매일 03:00 KST
  watch:
    - source: s3://docs/
      on_event: [created, updated]
  expire:
    chunk_max_age_days: 90`,
        },
        checked: ['r1', 'r2', 'r3'],
        focus: 'refresh',
      },
      {
        title: 'Step 2. 정합성 모니터링 — 그래프 건강 검진',
        desc: '엔티티 중복("Tom Hanks" / "톰 행크스" / "T. Hanks")은 답변을 갈라놓는다. 고립 노드와 끊긴 관계는 검색이 못 닿는 사각지대. Community 분포가 갑자기 흔들리면 데이터 품질 신호.',
        block: {
          kind: 'cypher',
          code: `// 매일 실행하는 정합성 쿼리

// 1. 고립 노드 (관계 0개)
MATCH (n:Entity) WHERE NOT (n)--()
RETURN count(n) AS isolated;

// 2. 의심 중복 (이름 유사 + 같은 타입)
MATCH (a:Entity), (b:Entity)
WHERE a.id < b.id AND a.type = b.type
  AND apoc.text.sorensenDiceSimilarity(a.name, b.name) > 0.85
RETURN a.name, b.name LIMIT 50;`,
        },
        checked: ['r1', 'r2', 'r3', 'i1', 'i2', 'i3'],
        focus: 'integrity',
      },
      {
        title: 'Step 3. 비용 알림 — 청구서 폭발 방지',
        desc: 'V-2-1 튜닝이 끝나도 트래픽이 늘면 비용은 다시 오른다. 일일 토큰 한도 + 80% 임계치 알림 + 예산 초과 시 자동 차단을 운영 시작 전에 연결한다. 캐시 히트율은 비용 건강의 1차 지표.',
        block: {
          kind: 'yaml',
          code: `cost:
  daily_token_limit: 10_000_000
  alerts:
    - threshold: 0.8         # 80% 도달 시 Slack
      channel: "#graphrag-ops"
    - threshold: 1.0         # 100% 즉시 차단
      action: block_new_calls
  metrics:
    cache_hit_rate_target: 0.6
    track_per_route: true`,
        },
        checked: ['r1', 'r2', 'r3', 'i1', 'i2', 'i3', 'c1', 'c2', 'c3'],
        focus: 'cost',
      },
      {
        title: 'Step 4. 보안·권한 — 마지막 점검 후 이륙',
        desc: '회사 내부 그래프라면 사용자별 노출 범위(부서 / 보안 등급)를 Cypher 단에서 필터. PII는 마스킹하고 모든 질의를 감사 로그로. API Key는 회전 정책. 4개 카테고리 모두 체크되면 운영 준비 완료.',
        // 의도: "비행 체크리스트 완료 선언" 비유의 텍스트 표현. 위 체크리스트 UI와 같은 정보를 텍스트로 한 번 더 강조해 마무리 신호를 만든다
        block: {
          kind: 'text',
          code: `[비행 전 체크리스트 — 12/12 완료]

✅ 데이터 갱신 (3/3)
✅ 정합성 모니터링 (3/3)
✅ 비용 알림 (3/3)
✅ 보안 / 권한 (3/3)

────────────────────
🛫 GraphRAG 운영 준비 완료`,
        },
        checked: ['r1','r2','r3','i1','i2','i3','c1','c2','c3','s1','s2','s3'],
        focus: 'safety',
      },
    ];

    const KIND_STYLE = {
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
      cypher: { label: 'Cypher', textColor: '#a5f3fc' },
      text:   { label: 'Text',   textColor: '#fde68a' },
    };

    const TOTAL_ITEMS = CATEGORIES.reduce((s, c) => s + c.items.length, 0);

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];
      const checkedSet = new Set(step.checked);
      const checkedCount = step.checked.length;

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">운영 체크리스트</h1>
                <p className="text-sm text-slate-500 mt-1">비행 전 체크리스트 — 12개 항목을 모두 점검해야 이륙</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* 체크리스트 — 4 카테고리 × 3 항목 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-6">
              <div className="flex items-center justify-between mb-3">
                <div className="text-xs font-bold text-slate-700">📋 운영 체크리스트</div>
                <div className="text-xs text-slate-500">{checkedCount} / {TOTAL_ITEMS}</div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                {CATEGORIES.map((cat) => {
                  const isFocused = step.focus === cat.key;
                  return (
                    <div
                      key={cat.key}
                      className={`rounded-lg p-3 border transition-all ${isFocused ? 'bg-amber-50 border-amber-300' : 'bg-slate-50 border-slate-200'}`}
                    >
                      <div className="text-xs font-bold text-slate-800 mb-2">
                        {cat.emoji} {cat.title}
                      </div>
                      <ul className="space-y-1">
                        {cat.items.map((item) => {
                          const isChecked = checkedSet.has(item.id);
                          return (
                            <li
                              key={item.id}
                              className={`text-[11px] flex items-start gap-2 transition-all ${isChecked ? 'text-slate-700' : 'text-slate-400'}`}
                            >
                              <span className={`shrink-0 w-4 h-4 rounded border flex items-center justify-center text-[10px] font-bold ${
                                isChecked ? 'bg-emerald-500 border-emerald-500 text-white' : 'bg-white border-slate-300 text-transparent'
                              }`}>✓</span>
                              <span className={isChecked ? '' : 'line-through opacity-60'}>{item.text}</span>
                            </li>
                          );
                        })}
                      </ul>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* 코드/텍스트 블록 */}
            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'safety' && (
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 mb-6 text-xs text-emerald-900">
                🎉 GraphRAG 학습 21/21 완성! Part I 개론 → V 운영까지 한 사이클을 본 것이다. 이제 실제 데이터로 직접 한 번 돌려보는 것이 다음 단계
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
