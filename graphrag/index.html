<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 인터랙티브 학습</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <!--
    GraphRAG 인터랙티브 학습 — 사이드바 + iframe 레이아웃 (ai-agent 표준 패턴)
    역할: 5 Parts × 21 sections, Part I 2개 ready / 나머지 planned
  -->
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const SECTIONS = [
      {
        part: 'I',
        label: 'Part I. GraphRAG 개론',
        color: 'bg-violet-600',
        items: [
          { id: 'I-1-1', title: 'GraphRAG란 무엇인가', file: './part1/I-1-1.html' },
          { id: 'I-1-2', title: 'RAG vs GraphRAG 비교', file: './part1/I-1-2.html' },
          { id: 'I-2-1', title: 'GraphRAG가 빛나는 시나리오', file: './part1/I-2-1.html' },
          { id: 'I-2-2', title: '한계와 비용', file: './part1/I-2-2.html' },
        ],
      },
      {
        part: 'II',
        label: 'Part II. Knowledge Graph 기초',
        color: 'bg-indigo-600',
        items: [
          { id: 'II-1-1', title: '노드와 엣지', file: './part2/II-1-1.html' },
          { id: 'II-1-2', title: '속성과 라벨', file: './part2/II-1-2.html' },
          { id: 'II-2-1', title: '온톨로지', file: null },
          { id: 'II-2-2', title: 'RDF vs Property Graph', file: null },
        ],
      },
      {
        part: 'III',
        label: 'Part III. Neo4j & Cypher',
        color: 'bg-blue-600',
        items: [
          { id: 'III-1-1', title: 'Neo4j 개론', file: null },
          { id: 'III-1-2', title: 'Cypher 기본 (CREATE/MATCH)', file: null },
          { id: 'III-2-1', title: 'Cypher 고급 (관계 탐색)', file: null },
          { id: 'III-2-2', title: '인덱스와 성능', file: null },
        ],
      },
      {
        part: 'IV',
        label: 'Part IV. GraphRAG 파이프라인',
        color: 'bg-emerald-600',
        items: [
          { id: 'IV-1-1', title: '엔티티 추출 (NER + LLM)', file: null },
          { id: 'IV-1-2', title: '관계 구축', file: null },
          { id: 'IV-2-1', title: 'Community Detection', file: null },
          { id: 'IV-2-2', title: '질의 응답 (Local vs Global)', file: null },
          { id: 'IV-3-1', title: '평가 지표', file: null },
        ],
      },
      {
        part: 'V',
        label: 'Part V. 실전 사용',
        color: 'bg-amber-600',
        items: [
          { id: 'V-1-1', title: 'Microsoft GraphRAG', file: null },
          { id: 'V-1-2', title: 'LangChain GraphRAG 통합', file: null },
          { id: 'V-2-1', title: '비용·성능 튜닝', file: null },
          { id: 'V-2-2', title: '운영 체크리스트', file: null },
        ],
      },
    ];

    const TOTAL = SECTIONS.reduce((s, sec) => s + sec.items.length, 0);
    const READY = SECTIONS.reduce((s, sec) => s + sec.items.filter(i => i.file).length, 0);

    const PART_BG = {
      I:   'hover:bg-violet-50',
      II:  'hover:bg-indigo-50',
      III: 'hover:bg-blue-50',
      IV:  'hover:bg-emerald-50',
      V:   'hover:bg-amber-50',
    };

    const PART_ACTIVE = {
      I:   'bg-violet-100 text-violet-800 font-bold',
      II:  'bg-indigo-100 text-indigo-800 font-bold',
      III: 'bg-blue-100 text-blue-800 font-bold',
      IV:  'bg-emerald-100 text-emerald-800 font-bold',
      V:   'bg-amber-100 text-amber-800 font-bold',
    };

    function findItemById(id) {
      for (const section of SECTIONS) {
        const found = section.items.find(item => item.id === id);
        if (found) return { ...found, part: section.part };
      }
      return null;
    }

    /**
     * GiscusPanel — 마인드맵 패턴 React 이식 (Sprint 35 표준).
     */
    function GiscusPanel({ term }) {
      const [open, setOpen] = React.useState(false);
      const [width, setWidth] = React.useState(() => Math.min(480, Math.round(window.innerWidth * 0.9)));
      const bodyRef = React.useRef(null);
      const loadedRef = React.useRef(false);

      React.useEffect(() => {
        if (!open || loadedRef.current || !bodyRef.current) return;
        const s = document.createElement('script');
        s.src = 'https://giscus.app/client.js';
        s.async = true;
        s.crossOrigin = 'anonymous';
        s.setAttribute('data-repo', 'HoyoungParkme/tech-roadmap');
        s.setAttribute('data-repo-id', 'R_kgDOSIZCtg');
        s.setAttribute('data-category', 'General');
        s.setAttribute('data-category-id', 'DIC_kwDOSIZCts4C7lgx');
        s.setAttribute('data-mapping', 'specific');
        s.setAttribute('data-term', term);
        s.setAttribute('data-strict', '0');
        s.setAttribute('data-reactions-enabled', '1');
        s.setAttribute('data-emit-metadata', '0');
        s.setAttribute('data-input-position', 'bottom');
        s.setAttribute('data-theme', 'light');
        s.setAttribute('data-lang', 'ko');
        bodyRef.current.appendChild(s);
        loadedRef.current = true;
      }, [open, term]);

      const onResizeStart = (e) => {
        e.preventDefault();
        const startX = e.clientX;
        const startW = width;
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;cursor:ew-resize;';
        document.body.appendChild(overlay);
        const onMove = (ev) => {
          const newW = Math.max(320, Math.min(window.innerWidth * 0.9, startW + (startX - ev.clientX)));
          setWidth(newW);
        };
        const onUp = () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
          overlay.remove();
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      };

      const buttonRight = open ? Math.min(width, window.innerWidth - 40) + 'px' : 0;

      return (
        <React.Fragment>
          <button
            onClick={() => setOpen(o => !o)}
            aria-expanded={open}
            aria-label={open ? '댓글 패널 닫기' : '댓글 패널 열기'}
            style={{ position: 'fixed', top: '40%', right: buttonRight, zIndex: 51, writingMode: 'vertical-rl', transition: 'right 0.25s ease' }}
            className="bg-slate-800 text-white px-2 py-3 rounded-l-lg text-sm font-medium shadow-md hover:bg-slate-700"
          >
            💬 {open ? '닫기' : '댓글'}
          </button>
          <div
            role="complementary"
            aria-label="댓글 패널"
            style={{ position: 'fixed', top: 0, right: 0, height: '100vh', width: width + 'px', transform: open ? 'translateX(0)' : 'translateX(100%)', transition: 'transform 0.25s ease', zIndex: 50, background: '#fff', boxShadow: '-4px 0 12px rgba(0,0,0,0.08)' }}
          >
            <div onMouseDown={onResizeStart} style={{ position: 'absolute', left: '-4px', top: 0, width: '8px', height: '100%', cursor: 'ew-resize', zIndex: 52 }} aria-hidden="true" />
            <div className="border-b border-slate-200 px-4 py-3 flex items-center justify-between">
              <span className="font-bold text-slate-800">💬 댓글 / 질문</span>
              <button onClick={() => setOpen(false)} aria-label="댓글 패널 닫기" className="text-slate-500 hover:text-slate-800 px-2">✕</button>
            </div>
            <div ref={bodyRef} className="p-4 overflow-y-auto" style={{ height: 'calc(100vh - 56px)' }} />
          </div>
        </React.Fragment>
      );
    }

    function App() {
      const [activeId, setActiveId] = useState(null);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [expandedParts, setExpandedParts] = useState({ I: true, II: true, III: true, IV: true, V: true });

      const activeItem = activeId ? findItemById(activeId) : null;

      const navigate = useCallback((id, file) => {
        if (!file) return; // planned는 클릭 무시
        setActiveId(id);
        window.location.hash = id;
        if (window.innerWidth < 1024) setSidebarOpen(false);
      }, []);

      useEffect(() => {
        const hash = window.location.hash.slice(1);
        if (hash) {
          const it = findItemById(hash);
          if (it && it.file) setActiveId(hash);
        }
        const onHash = () => {
          const h = window.location.hash.slice(1);
          const it = findItemById(h);
          if (it && it.file) setActiveId(h);
        };
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      const togglePart = (part) => {
        setExpandedParts(prev => ({ ...prev, [part]: !prev[part] }));
      };

      return (
        <React.Fragment>
        <div className="h-full flex bg-slate-100">
          {sidebarOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-30 z-30 lg:hidden" onClick={() => setSidebarOpen(false)} />
          )}
          <aside className={`fixed lg:static z-40 h-full w-72 bg-white border-r border-slate-200 flex flex-col transition-transform duration-200 ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0 lg:w-72'}`}>
            <div className="p-4 border-b border-slate-200 shrink-0">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 bg-violet-600 text-white flex items-center justify-center rounded-lg font-bold text-sm">G</div>
                <div>
                  <div className="font-bold text-slate-800 text-sm">GraphRAG 학습</div>
                  <div className="text-[11px] text-slate-500">{READY}/{TOTAL} 시각화 (Part I/II 진행 중)</div>
                </div>
              </div>
            </div>
            <nav className="flex-1 overflow-y-auto p-2">
              {SECTIONS.map((section) => (
                <div key={section.part} className="mb-1">
                  <button
                    onClick={() => togglePart(section.part)}
                    className="w-full flex items-center gap-2 px-2 py-2 rounded-lg text-left hover:bg-slate-50 transition"
                  >
                    <span className={`w-5 h-5 rounded text-white text-[10px] flex items-center justify-center font-bold ${section.color}`}>
                      {section.part}
                    </span>
                    <span className="text-xs font-bold text-slate-700 flex-1 truncate">{section.label}</span>
                    <span className="text-[10px] text-slate-400">{section.items.filter(i => i.file).length}/{section.items.length}</span>
                    <span className={`text-slate-400 text-xs transition-transform ${expandedParts[section.part] ? 'rotate-90' : ''}`}>&#9654;</span>
                  </button>
                  {expandedParts[section.part] && (
                    <div className="ml-4 border-l border-slate-100 pl-2 space-y-0.5">
                      {section.items.map((item) => {
                        const isActive = activeId === item.id;
                        const isPlanned = !item.file;
                        return (
                          <button
                            key={item.id}
                            onClick={() => navigate(item.id, item.file)}
                            disabled={isPlanned}
                            className={`w-full text-left px-2 py-1.5 rounded-md text-xs transition-all truncate ${
                              isActive ? PART_ACTIVE[section.part] : `text-slate-600 ${isPlanned ? 'opacity-40 cursor-not-allowed' : PART_BG[section.part]}`
                            }`}
                          >
                            <span className="font-mono text-[10px] opacity-60 mr-1">{item.id}</span>
                            {item.title}
                            {isPlanned && <span className="ml-1 text-[9px] text-slate-400">(예정)</span>}
                          </button>
                        );
                      })}
                    </div>
                  )}
                </div>
              ))}
            </nav>
            <div className="p-3 border-t border-slate-200 shrink-0 text-[10px] text-slate-400 text-center">
              React + Tailwind + Babel CDN
            </div>
          </aside>
          <main className="flex-1 flex flex-col min-w-0">
            <div className="h-12 bg-white border-b border-slate-200 flex items-center px-4 shrink-0 gap-3">
              <button
                onClick={() => setSidebarOpen(prev => !prev)}
                className="lg:hidden p-1.5 rounded-md hover:bg-slate-100 text-slate-600"
                aria-label="사이드바 토글"
              >
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                  <path fillRule="evenodd" d="M3 5h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2z" />
                </svg>
              </button>
              {activeItem ? (
                <div className="flex items-center gap-2 min-w-0">
                  <span className={`w-5 h-5 rounded text-white text-[10px] flex items-center justify-center font-bold shrink-0 ${
                    SECTIONS.find(s => s.part === activeItem.part)?.color || 'bg-slate-600'
                  }`}>{activeItem.part}</span>
                  <span className="font-mono text-xs text-slate-500 shrink-0">{activeItem.id}</span>
                  <span className="text-sm font-bold text-slate-800 truncate">{activeItem.title}</span>
                </div>
              ) : (
                <span className="text-sm text-slate-500">시각화를 선택하세요</span>
              )}
            </div>
            {activeItem ? (
              <iframe
                key={activeItem.id}
                src={activeItem.file}
                className="flex-1 w-full border-0"
                title={activeItem.title}
              />
            ) : (
              <div className="flex-1 flex items-center justify-center p-8">
                <div className="text-center max-w-md">
                  <div className="w-16 h-16 bg-violet-100 text-violet-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl font-bold">G</div>
                  <h2 className="text-2xl font-bold text-slate-800 mb-3">GraphRAG 인터랙티브 학습</h2>
                  <p className="text-slate-600 mb-6 leading-relaxed">
                    엔티티 사이의 <strong>관계</strong>를 활용하는 차세대 RAG.<br/>
                    Part I부터 시작해 Knowledge Graph, Neo4j, GraphRAG 파이프라인까지.
                  </p>
                  <div className="grid grid-cols-5 gap-2 mb-6">
                    {SECTIONS.map(s => (
                      <div key={s.part} className="text-center">
                        <div className={`w-8 h-8 rounded-lg text-white text-xs flex items-center justify-center font-bold mx-auto mb-1 ${s.color}`}>{s.part}</div>
                        <div className="text-[10px] text-slate-500">{s.items.filter(i => i.file).length}/{s.items.length}</div>
                      </div>
                    ))}
                  </div>
                  <p className="text-xs text-slate-400">{READY}/{TOTAL} 시각화 ready · Part I/II 진행 중</p>
                </div>
              </div>
            )}
          </main>
        </div>
        <GiscusPanel term="graphrag" />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
