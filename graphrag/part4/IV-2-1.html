<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — Community Detection</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-2-1. Community Detection (계층 요약)
    학습 목표: 노드 군집을 찾아 단계별 요약을 만든다.
    핵심 비유: "별자리 찾기" — 흩어진 노드 중 서로 가까운 군집 발견
    구조: 4단계 (밀도 차이 / Louvain / 계층 요약 / Leiden 비교)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 8명 인물 — 두 군집 (color hex 정적, Tailwind 정적 클래스로 표현 어려워 style prop 예외)
    const NODES = [
      { id: 'jobs',    name: 'Jobs',    cx: 130, cy: 80,  community: 'apple' },
      { id: 'woz',     name: 'Wozniak', cx: 230, cy: 130, community: 'apple' },
      { id: 'cook',    name: 'Cook',    cx: 130, cy: 200, community: 'apple' },
      { id: 'ive',     name: 'Ive',     cx: 230, cy: 250, community: 'apple' },
      { id: 'gates',   name: 'Gates',   cx: 570, cy: 80,  community: 'ms' },
      { id: 'allen',   name: 'Allen',   cx: 670, cy: 130, community: 'ms' },
      { id: 'nadella', name: 'Nadella', cx: 570, cy: 200, community: 'ms' },
      { id: 'ballmer', name: 'Ballmer', cx: 670, cy: 250, community: 'ms' },
    ];

    // 군집 내부 친밀 엣지 + 군집 간 약한 엣지
    const EDGES = [
      { from: 'jobs',   to: 'woz',     intra: true },
      { from: 'jobs',   to: 'cook',    intra: true },
      { from: 'cook',   to: 'ive',     intra: true },
      { from: 'woz',    to: 'ive',     intra: true },
      { from: 'gates',  to: 'allen',   intra: true },
      { from: 'gates',  to: 'nadella', intra: true },
      { from: 'nadella',to: 'ballmer', intra: true },
      { from: 'allen',  to: 'ballmer', intra: true },
      { from: 'jobs',   to: 'gates',   intra: false }, // 군집 간 약한 연결
    ];

    const COMMUNITY_COLOR = {
      apple: { fill: '#a78bfa', stroke: '#7c3aed', label: '애플 창업자 그룹', summary: '잡스/워즈니악이 1976년 창업, 쿡이 CEO 승계, 아이브가 디자인 주도' },
      ms:    { fill: '#34d399', stroke: '#059669', label: '마이크로소프트 그룹', summary: '게이츠/앨런이 1975년 창업, 발머와 나델라가 후속 CEO' },
      none:  { fill: '#94a3b8', stroke: '#64748b', label: '미분류', summary: '' },
    };

    // 알고리즘 비교
    const ALGO_COMPARE = [
      {
        name: 'Louvain',
        year: 2008,
        pros: '빠르고 메모리 효율',
        cons: '드물게 분리된 군집(disconnected) 생성',
        adoption: '초기 표준',
      },
      {
        name: 'Leiden',
        year: 2019,
        pros: 'Louvain 개선판. 항상 connected 군집 보장. 안정적 결과',
        cons: '약간 느림 (실용 충분)',
        adoption: 'Microsoft GraphRAG 기본',
      },
    ];

    const STEPS = [
      {
        title: 'Step 1. 밀도 차이 — 사람 눈엔 보이는 군집',
        desc: '8명의 인물이 친구 관계(엣지)로 연결돼 있다. 사람 눈엔 두 그룹(애플/마이크로소프트)이 자연스럽게 보인다 — 군집 안에서는 빽빽하고, 군집 사이는 듬성듬성. 그래프 알고리즘이 이 패턴을 자동 발견하는 게 Community Detection.',
        focus: 'density',
      },
      {
        title: 'Step 2. Louvain 알고리즘 — 모듈러리티 최대화',
        desc: '"군집 안 엣지는 많고, 군집 사이 엣지는 적다"는 모듈러리티 점수를 최대화하도록 노드를 점진 병합한다. 결과: 두 군집이 서로 다른 색으로 분리. 군집 간 약한 연결(점선)은 분리 경계를 가로지르는 엣지.',
        focus: 'louvain',
      },
      {
        title: 'Step 3. 계층(Hierarchical) 요약 — Local에서 Global로',
        desc: 'Microsoft GraphRAG의 핵심 아이디어. Level 0(노드 자체) → Level 1(군집별 요약) → Level 2(전체 요약). 각 군집을 LLM으로 한 문단 요약. 책 한 권을 인덱싱하면 챕터별 → 책 전체 요약을 자동으로.',
        focus: 'hierarchy',
      },
      {
        title: 'Step 4. Leiden vs Louvain',
        desc: 'Louvain은 빠르지만 드물게 분리된(disconnected) 군집을 만들 수 있다. Leiden은 그 결함을 수정한 개선판. Microsoft GraphRAG는 Leiden을 기본 채택. 보통 Leiden이면 충분.',
        focus: 'algo',
      },
    ];

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const focus = step.focus;
      // 군집 색상 적용 여부 — Step 1(density)에서는 회색 균일, Step 2 이후 두 색으로 분리
      const isCommunityColored = focus !== 'density';

      const getNode = (id) => NODES.find(n => n.id === id);

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Community Detection (계층 요약)</h1>
                <p className="text-sm text-slate-500 mt-1">별자리 찾기 — 군집 발견 + 단계별 요약</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* SVG 그래프 — 8명 인물 + 군집 색상 분기 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-4">
              <div className="text-xs font-bold text-slate-700 mb-2">📊 인물 친구 그래프</div>
              <svg viewBox="0 0 800 320" className="w-full" style={{ maxHeight: '360px' }}>
                {/* 엣지 */}
                {EDGES.map((e, i) => {
                  const f = getNode(e.from);
                  const t = getNode(e.to);
                  return (
                    <line
                      key={'e-' + i}
                      x1={f.cx} y1={f.cy}
                      x2={t.cx} y2={t.cy}
                      stroke={e.intra ? '#94a3b8' : '#cbd5e1'}
                      strokeWidth={e.intra ? '2' : '1'}
                      strokeDasharray={e.intra ? '0' : '4 4'}
                    />
                  );
                })}
                {/* 노드 */}
                {NODES.map((n) => {
                  const c = isCommunityColored ? COMMUNITY_COLOR[n.community] : COMMUNITY_COLOR.none;
                  return (
                    <g key={n.id}>
                      <circle cx={n.cx} cy={n.cy} r="26" fill={c.fill} stroke={c.stroke} strokeWidth="2" />
                      <text x={n.cx} y={n.cy + 3} textAnchor="middle" fontSize="10" fontWeight="bold" fill="#fff">{n.name}</text>
                    </g>
                  );
                })}
                {/* 군집 라벨 (Step 2 이상) */}
                {isCommunityColored && (
                  <g>
                    <text x="180" y="305" textAnchor="middle" fontSize="11" fontWeight="bold" fill="#7c3aed">애플 창업자 그룹</text>
                    <text x="620" y="305" textAnchor="middle" fontSize="11" fontWeight="bold" fill="#059669">마이크로소프트 그룹</text>
                  </g>
                )}
              </svg>
              <div className="text-[10px] text-slate-500 text-center mt-1">
                {focus === 'density' && '회색 노드 = 군집 미분류 (사람 눈엔 두 그룹 보임)'}
                {focus === 'louvain' && '두 색상 = Louvain이 발견한 군집. 점선 = 군집 간 약한 연결'}
                {(focus === 'hierarchy' || focus === 'algo') && '두 군집 식별 완료 — 군집별 요약으로 진행'}
              </div>
            </div>

            {/* Step 3 계층 요약 */}
            {focus === 'hierarchy' && (
              <div className="bg-white rounded-xl shadow-sm border-2 border-emerald-300 p-4 mb-6">
                <div className="text-xs font-bold text-emerald-700 mb-3">📚 계층 요약</div>
                <div className="space-y-2">
                  <div className="bg-slate-100 rounded p-2">
                    <div className="text-[10px] font-bold text-slate-600">Level 0 — 노드 (8명)</div>
                    <div className="text-[11px] text-slate-700">Jobs, Wozniak, Cook, Ive, Gates, Allen, Nadella, Ballmer</div>
                  </div>
                  {Object.entries(COMMUNITY_COLOR).filter(([k]) => k !== 'none').map(([key, c]) => (
                    <div key={key} className="rounded p-2" style={{ background: c.fill + '20', border: `1px solid ${c.stroke}` }}>
                      <div className="text-[10px] font-bold" style={{ color: c.stroke }}>Level 1 — {c.label}</div>
                      <div className="text-[11px] text-slate-700">{c.summary}</div>
                    </div>
                  ))}
                  <div className="bg-amber-50 border border-amber-300 rounded p-2">
                    <div className="text-[10px] font-bold text-amber-800">Level 2 — 전체 요약</div>
                    <div className="text-[11px] text-slate-700">1970년대 PC 산업의 두 거대 인물 그룹 — 애플과 마이크로소프트</div>
                  </div>
                </div>
              </div>
            )}

            {/* Step 4 알고리즘 비교 */}
            {focus === 'algo' && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">
                {ALGO_COMPARE.map((a) => (
                  <div key={a.name} className={`bg-white rounded-xl shadow-sm border-2 p-4 ${a.name === 'Leiden' ? 'border-emerald-400' : 'border-slate-200'}`}>
                    <div className="flex items-baseline justify-between mb-2">
                      <span className="font-bold text-slate-800 text-base">{a.name}</span>
                      <span className="text-[10px] text-slate-500">{a.year}</span>
                    </div>
                    <div className="text-[11px] space-y-1">
                      <div><span className="font-bold text-emerald-700">장점:</span> <span className="text-slate-700">{a.pros}</span></div>
                      <div><span className="font-bold text-rose-700">단점:</span> <span className="text-slate-700">{a.cons}</span></div>
                      <div className="mt-2 text-[10px] bg-slate-100 rounded px-2 py-1 inline-block">{a.adoption}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
