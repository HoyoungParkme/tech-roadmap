<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — Local vs Global</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-2-2. 질의 응답 (Local vs Global)
    학습 목표: 두 가지 GraphRAG 검색 모드를 구분해 사용한다.
    핵심 비유: "동네 검색 vs 책 전체 요약" — 두 종류 쿼리
    구조: 4단계 (Local / Global / 컨텍스트 / 선택 가이드)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 두 모드 비교 (4축)
    const COMPARE = [
      { axis: '범위',    local: '특정 엔티티 주변 1~2hop',           global: '전체 Community 요약 모음' },
      { axis: '컨텍스트', local: '엔티티 + 인접 노드 + 관계',         global: '군집별 Level 1/2 요약 청크' },
      { axis: '비용',     local: '낮음 (작은 쿼리)',                  global: '중간 (여러 청크 종합)' },
      { axis: '예시 질문', local: '"잡스의 친구는?", "잡스 어디 출신?"', global: '"이 책의 핵심 주제는?", "주요 인물군은?"' },
    ];

    // 컨텍스트 청크 예시
    const LOCAL_CONTEXT = [
      '엔티티: Jobs (Person)',
      '인접 노드: Wozniak, Cook, Ive (KNOWS 관계)',
      '속성: born=1955, role=CEO',
      '관계: -[:CO_FOUNDED]-> Apple',
    ];

    const GLOBAL_CONTEXT = [
      'Community 1 요약: "잡스/워즈가 1976년 애플 창업, 쿡 승계, 아이브 디자인 주도"',
      'Community 2 요약: "게이츠/앨런이 1975년 MS 창업, 발머/나델라 후속 CEO"',
      'Community 3 요약: "Bezos가 1994년 아마존 창업, 클라우드/이커머스 주도"',
      'Level 2 요약: "1970-90년대 미국 IT 거인 인물망"',
    ];

    const STEPS = [
      {
        title: 'Step 1. Local 검색 — 동네 산책',
        desc: '특정 엔티티 주변(1~2hop)을 가져와 LLM 컨텍스트에 넣는다. "잡스의 친구는 누구?", "잡스가 다닌 학교는?" 같은 좁고 구체적인 질문에 적합. 빠르고 저렴.',
        focus: 'local',
        question: '잡스의 친구는 누구?',
        answer: 'Wozniak, Cook, Ive — 모두 :KNOWS 관계로 연결된 인물',
      },
      {
        title: 'Step 2. Global 검색 — 책 전체 요약',
        desc: 'Community Detection으로 만든 모든 군집 요약(Level 1/2)을 가져와 LLM이 종합. "이 책의 핵심 인물망은?" 같은 통합/주제 질문에 적합. Microsoft GraphRAG 논문의 시그니처.',
        focus: 'global',
        question: '이 책의 핵심 인물 그룹은?',
        answer: 'IT 산업의 세 거대 그룹 — 애플(잡스 외 3명), 마이크로소프트(게이츠 외 3명), 아마존(베조스 외)',
      },
      {
        title: 'Step 3. 컨텍스트 조립 차이',
        desc: 'Local과 Global은 LLM에 넣어주는 컨텍스트의 종류가 완전히 다르다. Local은 노드/엣지 raw. Global은 LLM이 미리 만든 요약 청크. 결과적으로 LLM이 받는 prompt 모양이 다름.',
        focus: 'context',
      },
      {
        title: 'Step 4. 선택 가이드 — 자동 라우팅',
        desc: '좁은 사실 질문 → Local. 통합/주제/요약 질문 → Global. Microsoft GraphRAG는 두 모드 자동 라우팅 옵션 제공 (질문 유형 분류 → 모드 선택). 사용자는 모드 신경 쓸 필요 없음.',
        focus: 'guide',
      },
    ];

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const focus = step.focus;
      // 카드 활성 상태 — local 단계는 Local만, global 단계는 Global만, context/guide는 양쪽 모두
      const isLocalActive = focus === 'local' || focus === 'context' || focus === 'guide';
      const isGlobalActive = focus === 'global' || focus === 'context' || focus === 'guide';

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">질의 응답 (Local vs Global)</h1>
                <p className="text-sm text-slate-500 mt-1">동네 산책 vs 책 전체 요약 — 두 가지 GraphRAG 검색 모드</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* Step 1, 2: 질문/답변 시연 */}
            {step.question && (
              <div className="bg-white rounded-xl shadow-sm border-2 border-emerald-300 p-4 mb-4">
                <div className="text-[10px] font-bold text-emerald-700 mb-2">{focus === 'local' ? '🏘 Local 검색 시연' : '📚 Global 검색 시연'}</div>
                <div className="bg-slate-100 rounded p-3 mb-2">
                  <div className="text-[10px] text-slate-500 mb-1">질문</div>
                  <div className="text-sm font-bold text-slate-800">"{step.question}"</div>
                </div>
                <div className="bg-emerald-50 rounded p-3">
                  <div className="text-[10px] text-emerald-700 mb-1">답변</div>
                  <div className="text-sm text-slate-700">{step.answer}</div>
                </div>
              </div>
            )}

            {/* 두 모드 카드 (Step 3, 4 모두 표시) */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
              <div className={`bg-white rounded-xl shadow-sm border-2 p-4 transition-opacity ${isLocalActive ? 'border-sky-400' : 'border-slate-200 opacity-30'}`}>
                <div className="flex items-center gap-2 mb-3">
                  <span className="text-2xl">🏘</span>
                  <span className="font-bold text-sky-800">Local 검색</span>
                </div>
                <div className="text-[10px] font-bold text-slate-600 mb-2">컨텍스트 청크</div>
                <ul className="text-[11px] text-slate-700 space-y-1">
                  {LOCAL_CONTEXT.map((c, i) => (
                    <li key={i} className="bg-sky-50 rounded px-2 py-1 font-mono">{c}</li>
                  ))}
                </ul>
              </div>

              <div className={`bg-white rounded-xl shadow-sm border-2 p-4 transition-opacity ${isGlobalActive ? 'border-violet-400' : 'border-slate-200 opacity-30'}`}>
                <div className="flex items-center gap-2 mb-3">
                  <span className="text-2xl">📚</span>
                  <span className="font-bold text-violet-800">Global 검색</span>
                </div>
                <div className="text-[10px] font-bold text-slate-600 mb-2">컨텍스트 청크</div>
                <ul className="text-[11px] text-slate-700 space-y-1">
                  {GLOBAL_CONTEXT.map((c, i) => (
                    <li key={i} className="bg-violet-50 rounded px-2 py-1">{c}</li>
                  ))}
                </ul>
              </div>
            </div>

            {/* Step 4 비교 표 */}
            {focus === 'guide' && (
              <div className="bg-white rounded-xl shadow-sm border-2 border-slate-300 p-4 mb-6">
                <div className="text-xs font-bold text-slate-700 mb-3">⚖ 4축 비교</div>
                <div className="space-y-2">
                  {COMPARE.map((c) => (
                    <div key={c.axis} className="grid grid-cols-1 md:grid-cols-12 gap-2">
                      <div className="md:col-span-2 text-xs font-bold text-slate-700 flex items-center">{c.axis}</div>
                      <div className="md:col-span-5 bg-sky-50 border border-sky-200 rounded p-2 text-[11px] text-slate-700"><span className="font-bold text-sky-800 mr-1">Local:</span>{c.local}</div>
                      <div className="md:col-span-5 bg-violet-50 border border-violet-200 rounded p-2 text-[11px] text-slate-700"><span className="font-bold text-violet-800 mr-1">Global:</span>{c.global}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
