<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — IV-2-2. Local vs Global query</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    IV-2-2. Local vs Global query — 한 노드 주변 vs 전체 그래프
    학습 목표: GraphRAG 두 검색 모드의 차이를 시각적으로 비교하고
              질문 종류에 따라 라우팅하는 패턴을 익힌다.
    핵심 비유: 동네 산책(Local) vs 책 전체 요약(Global)
    패턴: fastapi v1 — 좌(LiveDataPane: Local 서브그래프 + Global 전체그래프 비교) / 우(VSCode CodeViewer)
    색상: graphrag violet
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 그래프 데이터 — 8명 인물 + 3 community
    // ─────────────────────────────────────────────────────
    const NODES = [
      // Apple 그룹
      { id: 'Alice',   cx: 120, cy: 80,  community: 'apple' },
      { id: 'Bob',     cx: 60,  cy: 150, community: 'apple' },
      { id: 'Carol',   cx: 180, cy: 150, community: 'apple' },
      { id: 'Dave',    cx: 120, cy: 220, community: 'apple' },
      // Microsoft 그룹
      { id: 'Eve',     cx: 380, cy: 80,  community: 'msft' },
      { id: 'Frank',   cx: 320, cy: 150, community: 'msft' },
      { id: 'Grace',   cx: 440, cy: 150, community: 'msft' },
      // Amazon 그룹
      { id: 'Henry',   cx: 380, cy: 230, community: 'amzn' },
    ];

    const EDGES = [
      // Apple 내부 엣지 (Alice 중심)
      { from: 'Alice',  to: 'Bob',    intra: true },
      { from: 'Alice',  to: 'Carol',  intra: true },
      { from: 'Alice',  to: 'Dave',   intra: true },
      { from: 'Bob',    to: 'Carol',  intra: true },
      { from: 'Carol',  to: 'Dave',   intra: true },
      // Microsoft 내부
      { from: 'Eve',    to: 'Frank',  intra: true },
      { from: 'Eve',    to: 'Grace',  intra: true },
      { from: 'Frank',  to: 'Grace',  intra: true },
      // Amazon 단독
      { from: 'Henry',  to: 'Frank',  intra: false }, // 약한 연결
      // 군집 간 약한 연결
      { from: 'Carol',  to: 'Frank',  intra: false },
    ];

    const COMMUNITY = {
      apple: { fill: '#a78bfa', stroke: '#7c3aed', label: 'Apple팀',     summary: '4명 협업 강한 코어 그룹' },
      msft:  { fill: '#22d3ee', stroke: '#0891b2', label: 'Microsoft팀',  summary: '3명 안정 협업 그룹' },
      amzn:  { fill: '#fb923c', stroke: '#c2410c', label: 'Amazon팀',     summary: '1명 외곽 노드' },
    };

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (Local vs Global 비교)
    //   focus: 'local' | 'localProc' | 'global' | 'globalProc' | 'router'
    //   localHi: 강조할 Local 노드 id 배열 (start node + neighbors)
    //   globalActive: Global 모드 시 community 박스 활성 여부
    //   routerQuery: Step 5에서 라우터에 들어갈 질문
    //   routerDecision: 'local' | 'global'
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Local query — "Alice의 친구는?"',
        desc: '특정 노드(Alice) 주변 1~2hop만 탐색하면 답이 나오는 좁은 사실 질문이다. 전체 그래프를 다 볼 필요가 없다 — 동네 산책 한 번이면 충분.',
        focus: 'local',
        question: 'Alice의 친구는 누구?',
        answer: 'Bob, Carol, Dave (1-hop 이웃)',
        localHi: ['Alice'],
        globalActive: false,
        code: {
          lang: 'python',
          filename: 'local-query.py',
          lines: [
            '# Local query — 시작 노드 주변만 탐색',
            'from neo4j import GraphDatabase',
            '',
            'def find_start_entity(question: str) -> str:',
            '    """질문에서 시작 엔티티 추출 (NER + 임베딩 매칭)"""',
            '    # "Alice의 친구는?" → "Alice"',
            '    return extract_entity(question)',
            '',
            'def local_search(driver, question: str, hops: int = 1):',
            '    """Local 검색 — 시작 노드 1~2 hop만 가져옴"""',
            '    start = find_start_entity(question)',
            '',
            '    cypher = """',
            '    MATCH (n:Person {name: $start})-[r*1..%d]-(m)',
            '    RETURN n, r, m',
            '    """ % hops',
            '',
            '    with driver.session() as s:',
            '        result = s.run(cypher, start=start)',
            '        return list(result)',
            '',
            '# 예시',
            '# question = "Alice의 친구는?"',
            '# → start = "Alice"',
            '# → 1-hop 이웃: Bob, Carol, Dave',
          ],
          highlight: [9, 13, 14, 15],
        },
      },
      {
        title: 'Step 2. Local 처리 — 작은 서브그래프만 LLM에게',
        desc: '추출한 1~2hop 서브그래프(노드/엣지/속성)를 그대로 LLM 컨텍스트에 넣어 답을 생성한다. 토큰 수 적음 → 빠르고 저렴. 좁은 사실 질문에 정확하다.',
        focus: 'localProc',
        question: 'Alice의 친구는 누구?',
        answer: 'Bob, Carol, Dave — 모두 :KNOWS 관계로 연결된 친구입니다.',
        localHi: ['Alice', 'Bob', 'Carol', 'Dave'],
        globalActive: false,
        code: {
          lang: 'python',
          filename: 'local-query.py',
          lines: [
            '# Local 컨텍스트 조립 + LLM 호출',
            'from openai import OpenAI',
            '',
            'def build_local_context(subgraph) -> str:',
            '    """서브그래프 → 텍스트 컨텍스트"""',
            '    lines = []',
            '    for record in subgraph:',
            '        n, rels, m = record["n"], record["r"], record["m"]',
            '        lines.append(f"{n[\'name\']} -[{rels[0].type}]-> {m[\'name\']}")',
            '    return "\\n".join(lines)',
            '',
            'def answer_local(driver, question: str) -> str:',
            '    subgraph = local_search(driver, question, hops=1)',
            '    context = build_local_context(subgraph)',
            '',
            '    prompt = f"""',
            '    그래프 컨텍스트:',
            '    {context}',
            '',
            '    질문: {question}',
            '    답변:',
            '    """',
            '    return OpenAI().chat.completions.create(',
            '        model="gpt-4o-mini",   # 작은 컨텍스트 — 저렴 모델 OK',
            '        messages=[{"role": "user", "content": prompt}],',
            '    ).choices[0].message.content',
            '',
            '# 토큰: ~200 input · ~50 output → $0.0001',
            '# 응답 시간: ~0.8s',
          ],
          highlight: [4, 13, 14, 24],
        },
      },
      {
        title: 'Step 3. Global query — "전체 조직에서 가장 협업이 많은 팀은?"',
        desc: '특정 노드가 아니라 전체 그래프에 대한 종합/주제 질문이다. Local로 풀 수 없다 — 모든 community를 봐야 답이 나온다. 책 한 권 전체를 요약하는 질문.',
        focus: 'global',
        question: '전체 조직에서 가장 협업이 많은 팀은?',
        answer: '(아직 컨텍스트 조립 전 — Step 4에서 처리)',
        localHi: [],
        globalActive: true,
        code: {
          lang: 'python',
          filename: 'global-query.py',
          lines: [
            '# Global query — 전체 그래프가 컨텍스트',
            '# Local과 다르게 시작 노드가 없다',
            '',
            'def is_global_query(question: str) -> bool:',
            '    """전 그래프 종합이 필요한 질문인지 판별"""',
            '    keywords = ["전체", "가장", "주요", "핵심", "통합", "비교"]',
            '    return any(k in question for k in keywords)',
            '',
            '# 예시 질문들 (모두 Global)',
            '# - "전체 조직에서 가장 협업이 많은 팀은?"',
            '# - "이 책의 핵심 인물 그룹은?"',
            '# - "주요 협업 패턴은 무엇인가?"',
            '',
            '# 문제: 노드 100만 개 그래프를 다 LLM에 넣을 수 없다',
            '# → Community Summary (IV-2-1)에서 만들어둔 요약 청크 활용',
            '#   각 community 요약 → LLM이 종합 → 최종 답변',
            '',
            'def global_search(driver, question: str):',
            '    """Global 검색 — community 요약을 모아 LLM에 전달"""',
            '    summaries = fetch_community_summaries(driver)',
            '    return map_reduce_answer(summaries, question)',
          ],
          highlight: [4, 5, 6, 14, 15, 19],
        },
      },
      {
        title: 'Step 4. Global 처리 — Community Summary로 종합',
        desc: 'IV-2-1에서 만든 community별 요약을 모두 가져와 map-reduce 방식으로 LLM에게 전달한다. 각 community 부분 답변 → 최종 종합 답변. 토큰 많음 → 비싸지만 전 그래프 시야 확보.',
        focus: 'globalProc',
        question: '전체 조직에서 가장 협업이 많은 팀은?',
        answer: 'Apple팀 (4명, 내부 엣지 5개)이 가장 협업 밀도가 높습니다. Microsoft팀(3명, 3엣지)과 Amazon팀(1명)이 뒤를 잇습니다.',
        localHi: [],
        globalActive: true,
        code: {
          lang: 'python',
          filename: 'community-summary.py',
          lines: [
            '# Map-Reduce: community 요약 → 부분 답변 → 종합',
            'from openai import OpenAI',
            '',
            'def fetch_community_summaries(driver):',
            '    """각 community 요약 청크 모두 로드"""',
            '    cypher = "MATCH (c:Community) RETURN c.id, c.summary"',
            '    return list(driver.session().run(cypher))',
            '',
            'def map_reduce_answer(summaries, question: str) -> str:',
            '    """Map: 각 요약별 부분답변 → Reduce: 종합"""',
            '    client = OpenAI()',
            '',
            '    # Map — 각 community별 부분 답변 생성',
            '    partials = []',
            '    for s in summaries:',
            '        prompt = f"요약: {s[\'summary\']}\\n질문: {question}\\n부분 답변:"',
            '        resp = client.chat.completions.create(',
            '            model="gpt-4o", messages=[{"role": "user", "content": prompt}],',
            '        )',
            '        partials.append(resp.choices[0].message.content)',
            '',
            '    # Reduce — 부분 답변 종합',
            '    reduce_prompt = f"부분 답변들:\\n{chr(10).join(partials)}\\n최종 답변:"',
            '    final = client.chat.completions.create(',
            '        model="gpt-4o", messages=[{"role": "user", "content": reduce_prompt}],',
            '    )',
            '    return final.choices[0].message.content',
            '',
            '# 토큰: ~5000 input · ~500 output → $0.05',
            '# 응답 시간: ~6s (community 수 N + 1번 호출)',
          ],
          highlight: [13, 14, 15, 22, 23, 24],
        },
      },
      {
        title: 'Step 5. 라우터 — 질문 종류 자동 판별',
        desc: '사용자는 모드를 신경 쓸 필요 없다. 라우터가 질문을 분석해 Local/Global을 자동 선택한다. 시작 엔티티가 잡히면 Local, "전체/가장/주요" 같은 종합 키워드면 Global.',
        focus: 'router',
        question: null,
        answer: null,
        localHi: ['Alice', 'Bob', 'Carol', 'Dave'],
        globalActive: true,
        routerExamples: [
          { q: 'Alice의 친구는?',           decision: 'local',  reason: '시작 엔티티(Alice) 추출 성공' },
          { q: '전체 핵심 협업 그룹은?',    decision: 'global', reason: '"전체/핵심" 종합 키워드' },
          { q: 'Bob이 속한 팀은?',          decision: 'local',  reason: '시작 엔티티(Bob) 추출 성공' },
          { q: '가장 큰 community는?',      decision: 'global', reason: '"가장/큰" 비교 키워드' },
        ],
        code: {
          lang: 'python',
          filename: 'router.py',
          lines: [
            '# Query Router — Local vs Global 자동 분기',
            'from typing import Literal',
            '',
            'Mode = Literal["local", "global"]',
            '',
            'GLOBAL_KEYWORDS = ["전체", "가장", "주요", "핵심", "통합", "비교"]',
            '',
            'def route_query(question: str) -> Mode:',
            '    """질문 → 검색 모드 결정"""',
            '    # 1) Global 키워드 우선 검사',
            '    if any(k in question for k in GLOBAL_KEYWORDS):',
            '        return "global"',
            '',
            '    # 2) 시작 엔티티 추출 시도',
            '    entity = try_extract_entity(question)',
            '    if entity is not None:',
            '        return "local"',
            '',
            '    # 3) 둘 다 모호하면 Global이 안전 (전체 시야)',
            '    return "global"',
            '',
            'def graphrag_qa(driver, question: str) -> str:',
            '    """단일 진입점 — 사용자는 모드 몰라도 됨"""',
            '    mode = route_query(question)',
            '    if mode == "local":',
            '        return answer_local(driver, question)',
            '    else:',
            '        return global_search(driver, question)',
            '',
            '# Microsoft GraphRAG 공식 라이브러리도 같은 패턴',
            '# (LLM 분류기로 좀 더 정교하게 — 본 예시는 규칙 기반)',
          ],
          highlight: [8, 9, 10, 11, 14, 15, 16, 22, 23],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 Local 서브그래프 + 우측 Global 전체그래프
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const { focus, localHi, globalActive, routerExamples } = step;
      const isLocalHi = (id) => localHi && localHi.includes(id);
      const getNode = (id) => NODES.find((n) => n.id === id);

      // Local 패널은 Alice 주변만 (Apple 4명) 강조 표시
      const LOCAL_NODES = NODES.filter((n) => n.community === 'apple');
      const LOCAL_EDGES = EDGES.filter(
        (e) => LOCAL_NODES.some((n) => n.id === e.from) && LOCAL_NODES.some((n) => n.id === e.to)
      );

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🗺 Local vs Global 시각화</h2>
            <span className="text-[10px] text-slate-400 font-mono">2-pane comparison</span>
          </div>

          {/* 라우터가 아닌 단계 — 좌(Local) 우(Global) 2분할 */}
          {focus !== 'router' && (
            <div className="grid grid-cols-2 gap-3 mb-3">
              {/* 좌: Local 서브그래프 */}
              <div
                className={`rounded-lg border-2 p-2 transition-all ${
                  focus === 'local' || focus === 'localProc'
                    ? 'border-violet-500 bg-violet-50/40 shadow-md'
                    : 'border-slate-200 bg-slate-50 opacity-60'
                }`}
              >
                <div className="flex items-center justify-between mb-1">
                  <span className="text-[10px] font-bold text-violet-700">🏘 Local — Alice 주변</span>
                  {(focus === 'local' || focus === 'localProc') && (
                    <span className="text-[9px] bg-violet-200 text-violet-800 px-1 rounded">ACTIVE</span>
                  )}
                </div>
                <svg viewBox="0 0 240 280" className="w-full" style={{ maxHeight: '230px' }}>
                  {LOCAL_EDGES.map((e, i) => {
                    const f = getNode(e.from);
                    const t = getNode(e.to);
                    return (
                      <line
                        key={'le-' + i}
                        x1={f.cx} y1={f.cy}
                        x2={t.cx} y2={t.cy}
                        stroke="#a78bfa" strokeWidth="2"
                      />
                    );
                  })}
                  {LOCAL_NODES.map((n) => {
                    const hi = isLocalHi(n.id);
                    const isStart = n.id === 'Alice';
                    return (
                      <g key={'ln-' + n.id}>
                        <circle
                          cx={n.cx} cy={n.cy} r={isStart ? 24 : 20}
                          fill={hi ? '#7c3aed' : '#cbd5e1'}
                          stroke={isStart ? '#4c1d95' : (hi ? '#5b21b6' : '#94a3b8')}
                          strokeWidth={isStart ? '3' : '2'}
                        />
                        <text x={n.cx} y={n.cy + 3} textAnchor="middle" fontSize="9" fontWeight="bold" fill="#fff">
                          {n.id}
                        </text>
                      </g>
                    );
                  })}
                </svg>
                <div className="text-[9px] text-slate-500 text-center">
                  {focus === 'local' && '시작 노드(Alice) 1-hop 탐색 시작'}
                  {focus === 'localProc' && '서브그래프 4노드 → LLM 컨텍스트'}
                  {(focus === 'global' || focus === 'globalProc') && '비활성 (Global 모드)'}
                </div>
              </div>

              {/* 우: Global 전체 그래프 */}
              <div
                className={`rounded-lg border-2 p-2 transition-all ${
                  focus === 'global' || focus === 'globalProc'
                    ? 'border-violet-500 bg-violet-50/40 shadow-md'
                    : 'border-slate-200 bg-slate-50 opacity-60'
                }`}
              >
                <div className="flex items-center justify-between mb-1">
                  <span className="text-[10px] font-bold text-violet-700">📚 Global — 전체 그래프</span>
                  {(focus === 'global' || focus === 'globalProc') && (
                    <span className="text-[9px] bg-violet-200 text-violet-800 px-1 rounded">ACTIVE</span>
                  )}
                </div>
                <svg viewBox="0 0 500 280" className="w-full" style={{ maxHeight: '230px' }}>
                  {EDGES.map((e, i) => {
                    const f = getNode(e.from);
                    const t = getNode(e.to);
                    return (
                      <line
                        key={'ge-' + i}
                        x1={f.cx} y1={f.cy}
                        x2={t.cx} y2={t.cy}
                        stroke={e.intra ? '#94a3b8' : '#cbd5e1'}
                        strokeWidth={e.intra ? '2' : '1'}
                        strokeDasharray={e.intra ? '0' : '4 4'}
                      />
                    );
                  })}
                  {NODES.map((n) => {
                    const c = COMMUNITY[n.community];
                    return (
                      <g key={'gn-' + n.id}>
                        <circle cx={n.cx} cy={n.cy} r="16" fill={c.fill} stroke={c.stroke} strokeWidth="2" />
                        <text x={n.cx} y={n.cy + 3} textAnchor="middle" fontSize="8" fontWeight="bold" fill="#fff">
                          {n.id.slice(0, 4)}
                        </text>
                      </g>
                    );
                  })}
                </svg>
                <div className="text-[9px] text-slate-500 text-center">
                  {(focus === 'local' || focus === 'localProc') && '비활성 (Local 모드)'}
                  {focus === 'global' && '전체 8노드 — community 3개 식별'}
                  {focus === 'globalProc' && 'Community 요약 청크 → map-reduce'}
                </div>
              </div>
            </div>
          )}

          {/* Global 모드일 때 community 요약 박스 */}
          {globalActive && focus !== 'router' && (
            <div className="bg-violet-50 rounded-lg border border-violet-200 p-2 mb-2">
              <div className="text-[10px] font-bold text-violet-800 mb-1">
                📦 Community Summary (Level 1 chunks)
              </div>
              <div className="grid grid-cols-3 gap-1">
                {Object.entries(COMMUNITY).map(([key, c]) => (
                  <div
                    key={key}
                    className="rounded p-1.5 text-[9px]"
                    style={{ background: c.fill + '30', border: `1px solid ${c.stroke}` }}
                  >
                    <div className="font-bold" style={{ color: c.stroke }}>{c.label}</div>
                    <div className="text-slate-700">{c.summary}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* 질문/답변 영역 */}
          {step.question && (
            <div className="bg-emerald-50 border border-emerald-300 rounded-lg p-2 mb-2">
              <div className="text-[9px] font-bold text-emerald-800">Q</div>
              <div className="text-[11px] font-bold text-slate-800">"{step.question}"</div>
              {step.answer && (
                <>
                  <div className="text-[9px] font-bold text-emerald-800 mt-1.5">A</div>
                  <div className="text-[11px] text-slate-700">{step.answer}</div>
                </>
              )}
            </div>
          )}

          {/* Step 5 — 라우터 다이어그램 */}
          {focus === 'router' && (
            <div className="bg-slate-50 rounded-lg border-2 border-violet-300 p-3">
              <div className="text-[10px] font-bold text-violet-800 mb-2">🚦 Query Router 다이어그램</div>

              {/* 다이어그램 */}
              <svg viewBox="0 0 500 200" className="w-full mb-3" style={{ maxHeight: '200px' }}>
                {/* 입력 박스 */}
                <rect x="20" y="80" width="100" height="40" rx="6" fill="#fef3c7" stroke="#f59e0b" strokeWidth="2" />
                <text x="70" y="105" textAnchor="middle" fontSize="11" fontWeight="bold" fill="#78350f">사용자 질문</text>

                {/* 라우터 (마름모) */}
                <polygon points="220,80 290,100 220,140 150,100" fill="#ddd6fe" stroke="#7c3aed" strokeWidth="2" />
                <text x="220" y="105" textAnchor="middle" fontSize="10" fontWeight="bold" fill="#4c1d95">route_query()</text>
                <text x="220" y="120" textAnchor="middle" fontSize="9" fill="#4c1d95">엔티티? 키워드?</text>

                {/* Local 박스 */}
                <rect x="350" y="40" width="120" height="40" rx="6" fill="#a78bfa" stroke="#5b21b6" strokeWidth="2" />
                <text x="410" y="65" textAnchor="middle" fontSize="11" fontWeight="bold" fill="#fff">🏘 Local 모드</text>

                {/* Global 박스 */}
                <rect x="350" y="140" width="120" height="40" rx="6" fill="#7c3aed" stroke="#4c1d95" strokeWidth="2" />
                <text x="410" y="165" textAnchor="middle" fontSize="11" fontWeight="bold" fill="#fff">📚 Global 모드</text>

                {/* 화살표 */}
                <line x1="120" y1="100" x2="150" y2="100" stroke="#64748b" strokeWidth="2" markerEnd="url(#arrow)" />
                <line x1="290" y1="95" x2="350" y2="65" stroke="#64748b" strokeWidth="2" markerEnd="url(#arrow)" />
                <line x1="290" y1="115" x2="350" y2="155" stroke="#64748b" strokeWidth="2" markerEnd="url(#arrow)" />
                <text x="320" y="75" fontSize="9" fill="#5b21b6" fontWeight="bold">엔티티 ✓</text>
                <text x="320" y="145" fontSize="9" fill="#5b21b6" fontWeight="bold">키워드 ✓</text>

                <defs>
                  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                    <polygon points="0 0, 10 3, 0 6" fill="#64748b" />
                  </marker>
                </defs>
              </svg>

              {/* 예시 */}
              <div className="text-[10px] font-bold text-slate-700 mb-1">예시 분기</div>
              <div className="space-y-1">
                {routerExamples.map((ex, i) => (
                  <div
                    key={i}
                    className={`rounded p-1.5 flex items-center gap-2 ${
                      ex.decision === 'local'
                        ? 'bg-violet-100 border border-violet-300'
                        : 'bg-purple-100 border border-purple-400'
                    }`}
                  >
                    <span
                      className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${
                        ex.decision === 'local' ? 'bg-violet-500 text-white' : 'bg-purple-700 text-white'
                      }`}
                    >
                      {ex.decision === 'local' ? '🏘 LOCAL' : '📚 GLOBAL'}
                    </span>
                    <span className="text-[10px] text-slate-800 font-medium">"{ex.q}"</span>
                    <span className="text-[9px] text-slate-500 ml-auto">{ex.reason}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: '#a78bfa' }}></span>Apple
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: '#22d3ee' }}></span>Microsoft
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: '#fb923c' }}></span>Amazon
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-3 h-0.5 bg-slate-400"></span>community 내부
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-0.5 bg-slate-300" style={{ borderTop: '1px dashed #cbd5e1' }}></span>약한 연결
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-violet-500/15 border-l-2 border-violet-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-violet-700 hover:text-violet-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. 활용 &gt; Chapter 2. Query 모드</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Local vs Global query</h1>
                  <p className="text-sm text-slate-500 mt-0.5">한 노드 주변 vs 전체 그래프 — 두 검색 모드 + 자동 라우팅</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 text-sm text-violet-900">
                💡 다음(IV-3-1)에서는 GraphRAG의 한계와 대안 — 비용/지연/정확도 trade-off
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-violet-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-violet-600 text-white hover:bg-violet-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-2-1.html" className="text-slate-500 hover:text-slate-700">&larr; IV-2-1 Community Detection</a>
              <a href="./IV-3-1.html" className="text-violet-700 hover:text-violet-900 font-medium">IV-3-1 한계와 대안 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
