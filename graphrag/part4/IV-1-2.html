<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — 관계 구축</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-1-2. 관계 구축
    학습 목표: 추출된 엔티티 간 관계를 LLM이 추정해 그래프로 만든다.
    핵심 비유: "엔티티 사이 선 긋기" — 동시 출현 → LLM 추론 → 정합성 검증
    구조: 4단계 (엔티티만 / co-occurrence / LLM 추론 / 정합성 검증)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 6개 엔티티 (IV-1-1 결과) — 색상 hex (Tailwind 정적 클래스로 표현 어려워 style prop 예외 허용)
    const NODES = [
      { id: 'jobs',  name: 'Jobs',     label: 'Person',   cx: 130, cy: 80,  bg: '#a78bfa', stroke: '#7c3aed' },
      { id: 'woz',   name: 'Wozniak',  label: 'Person',   cx: 130, cy: 220, bg: '#a78bfa', stroke: '#7c3aed' },
      { id: 'apple', name: 'Apple',    label: 'Company',  cx: 400, cy: 150, bg: '#34d399', stroke: '#059669' },
      { id: 'year',  name: '1976',     label: 'Year',     cx: 670, cy: 80,  bg: '#fbbf24', stroke: '#d97706' },
      { id: 'cup',   name: 'Cupertino',label: 'Location', cx: 670, cy: 220, bg: '#60a5fa', stroke: '#2563eb' },
      { id: 'cal',   name: 'CA',       label: 'Location', cx: 400, cy: 290, bg: '#60a5fa', stroke: '#2563eb' },
    ];

    // Step 2 co-occurrence 약한 엣지 (선택적 페어만 — 핵심 5개)
    const COOCCUR_EDGES = [
      { from: 'jobs',  to: 'apple' },
      { from: 'woz',   to: 'apple' },
      { from: 'apple', to: 'year'  },
      { from: 'apple', to: 'cup'   },
      { from: 'cup',   to: 'cal'   },
    ];

    // Step 3 LLM 정확한 관계 (라벨 부여)
    const LLM_EDGES = [
      { from: 'jobs',  to: 'apple', label: 'CO_FOUNDED' },
      { from: 'woz',   to: 'apple', label: 'CO_FOUNDED' },
      { from: 'apple', to: 'year',  label: 'FOUNDED_IN' },
      { from: 'apple', to: 'cup',   label: 'HQ_LOCATION' },
      { from: 'cup',   to: 'cal',   label: 'LOCATED_IN' },
    ];

    // Step 4 정합성 이슈 → 정리 결과
    const VALIDATION = [
      { issue: '중복 엣지', detail: '(Jobs)-[:KNOWS]->(Wozniak) 두 번 등장', action: '하나로 병합' },
      { issue: '모순 관계', detail: '(A)-[:HATES]-(B) 양방향 + (A)-[:LOVES]-(B)', action: '신뢰도 높은 것만 채택' },
      { issue: '도메인 위반', detail: '(Year)-[:WORKS_AT]->(Person) 같은 비논리', action: '온톨로지로 사전 차단' },
    ];

    const STEPS = [
      {
        title: 'Step 1. 엔티티만 흩어진 상태',
        desc: 'IV-1-1로 추출된 노드 6개. 라벨과 속성은 있지만 노드 사이가 끊겨 있다. 이 상태로는 멀티홉 추론 불가능 — 그래프가 아니라 "노드 집합"일 뿐. 다음 단계에서 엣지를 만든다.',
        focus: 'isolated',
      },
      {
        title: 'Step 2. 동시 출현(co-occurrence) — 약한 신호',
        desc: '가장 단순한 방식: 같은 문장/문단에 등장한 노드 쌍에 :RELATED 약한 엣지를 만든다. 빠르고 쉽지만 라벨이 없어 정밀도 낮음. "왜 관련 있는지"를 모른다.',
        focus: 'cooccur',
      },
      {
        title: 'Step 3. LLM 관계 추론 — 라벨 부여',
        desc: 'LLM에 "위 엔티티들의 관계와 라벨을 추론해라" 프롬프트로 던지면 정확한 라벨이 붙는다. (Jobs)-[:CO_FOUNDED]->(Apple) 같이 의미가 명확. GPT-4 기준 정밀도 80~90%.',
        focus: 'llm',
      },
      {
        title: 'Step 4. 정합성 검증 — 중복/모순 정리',
        desc: 'LLM 추론은 완벽하지 않다. 같은 엣지 중복, 모순 관계, 도메인 위반을 검사한다. 온톨로지(II-2-1)를 기준으로 사전 차단하면 가장 깔끔. 다음(IV-2-1)은 만들어진 그래프에서 군집 찾기.',
        focus: 'validate',
      },
    ];

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const focus = step.focus;
      const showCooccur = focus === 'cooccur';
      const showLLM = focus === 'llm' || focus === 'validate';

      const getNode = (id) => NODES.find(n => n.id === id);

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">관계 구축</h1>
                <p className="text-sm text-slate-500 mt-1">엔티티 사이 선 긋기 — 그래프 인덱싱의 두 번째 단계</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* SVG 그래프 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-4">
              <div className="text-xs font-bold text-slate-700 mb-2">📊 그래프 구축 단계</div>
              <svg viewBox="0 0 800 360" className="w-full" style={{ maxHeight: '380px' }}>
                <defs>
                  <marker id="arrowHead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M0,0 L10,5 L0,10 z" fill="#475569" />
                  </marker>
                  <marker id="arrowHeadGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M0,0 L10,5 L0,10 z" fill="#cbd5e1" />
                  </marker>
                </defs>
                {/* Step 2: co-occurrence 약한 엣지 */}
                {showCooccur && COOCCUR_EDGES.map((e, i) => {
                  const f = getNode(e.from);
                  const t = getNode(e.to);
                  const mx = (f.cx + t.cx) / 2;
                  const my = (f.cy + t.cy) / 2;
                  return (
                    <g key={'co-' + i}>
                      <line x1={f.cx} y1={f.cy} x2={t.cx} y2={t.cy} stroke="#cbd5e1" strokeWidth="2" strokeDasharray="6 4" />
                      <text x={mx} y={my - 4} textAnchor="middle" fontSize="9" fill="#94a3b8" fontFamily="monospace">:RELATED</text>
                    </g>
                  );
                })}
                {/* Step 3, 4: LLM 정확한 엣지 */}
                {showLLM && LLM_EDGES.map((e, i) => {
                  const f = getNode(e.from);
                  const t = getNode(e.to);
                  const dx = t.cx - f.cx, dy = t.cy - f.cy;
                  const len = Math.sqrt(dx * dx + dy * dy);
                  const ux = dx / len, uy = dy / len;
                  const sx = f.cx + ux * 32, sy = f.cy + uy * 32;
                  const ex = t.cx - ux * 38, ey = t.cy - uy * 38;
                  const mx = (sx + ex) / 2, my = (sy + ey) / 2 - 6;
                  return (
                    <g key={'llm-' + i}>
                      <line x1={sx} y1={sy} x2={ex} y2={ey} stroke="#475569" strokeWidth="2" markerEnd="url(#arrowHead)" />
                      <rect x={mx - 50} y={my - 9} width="100" height="16" rx="3" fill="#fff" stroke="#cbd5e1" />
                      <text x={mx} y={my + 3} textAnchor="middle" fontSize="9" fontFamily="monospace" fontWeight="bold" fill="#334155">:{e.label}</text>
                    </g>
                  );
                })}
                {/* 노드 (항상 표시) */}
                {NODES.map((n) => (
                  <g key={n.id}>
                    <circle cx={n.cx} cy={n.cy} r="32" fill={n.bg} stroke={n.stroke} strokeWidth="2" />
                    <text x={n.cx} y={n.cy - 1} textAnchor="middle" fontSize="10" fontWeight="bold" fill="#fff">{n.name}</text>
                    <text x={n.cx} y={n.cy + 12} textAnchor="middle" fontSize="8" fill="#fff" fillOpacity="0.85">:{n.label}</text>
                  </g>
                ))}
                {focus === 'isolated' && (
                  <text x="400" y="350" textAnchor="middle" fontSize="11" fill="#94a3b8" fontStyle="italic">엣지 없음 — 그래프가 아닌 노드 집합</text>
                )}
              </svg>
            </div>

            {/* Step 4 정합성 검증 표 */}
            {focus === 'validate' && (
              <div className="bg-white rounded-xl shadow-sm border-2 border-rose-300 p-4 mb-6">
                <div className="text-xs font-bold text-rose-700 mb-3">🛡 정합성 검증 — LLM 추론 후 점검</div>
                <table className="w-full text-xs">
                  <thead>
                    <tr className="bg-rose-50">
                      <th className="text-left p-2 text-rose-900">이슈</th>
                      <th className="text-left p-2 text-rose-900">예시</th>
                      <th className="text-left p-2 text-rose-900">처리</th>
                    </tr>
                  </thead>
                  <tbody>
                    {VALIDATION.map((v, i) => (
                      <tr key={i} className="border-t border-rose-100">
                        <td className="p-2 font-bold text-slate-800">{v.issue}</td>
                        <td className="p-2 text-slate-600 font-mono text-[11px]">{v.detail}</td>
                        <td className="p-2 text-emerald-700">{v.action}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <div className="text-[10px] text-slate-500 mt-3">→ 다음(IV-2-1)에서 만들어진 그래프에 Community Detection으로 군집 찾기</div>
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
