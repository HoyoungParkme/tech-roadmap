        edges: [

            '"""',
            'IV-1-2 / Step 4. coreference 해결',

            'def resolve_coref(text: str) -> str:',

            '    doc = nlp(text, component_cfg={"fastcoref": {"resolve_text": True}})',

        code: {
          lang: 'python',
          filename: 'validate.py',
          lines: [
            '"""',
            'IV-1-2 / Step 5. 온톨로지 기반 관계 검증',
            '  - LLM 추론은 80~90% 정확 — 나머지 10~20%는 거짓',
            '  - 도메인(subject 타입) / 레인지(object 타입) 규칙으로 차단',
            '"""',
            'from typing import Literal',
            '',
            '# 온톨로지 정의 — II-2-1 산출물',
            'ONTOLOGY = {',
            '    "WORKS_AT":   { "domain": ["Person"],  "range": ["Company"] },',
            '    "LOCATED_IN": { "domain": ["Company"], "range": ["City"]    },',
            '    "LIVES_IN":   { "domain": ["Person"],  "range": ["City"]    },',
            '    "KNOWS":      { "domain": ["Person"],  "range": ["Person"]  },',
            '}',
            '',
            'def validate(triple: dict, nodes: dict) -> Literal["ok", "invalid"]:',
            '    """triple 한 개를 온톨로지에 비춰 검증"""',
            '    rule = ONTOLOGY.get(triple["predicate"])',
            '    if rule is None:',
            '        return "invalid"            # 정의되지 않은 라벨',
            '',
            '    s_label = nodes[triple["subject"]["id"]]["label"]',
            '    o_label = nodes[triple["object"]["id"]]["label"]',
            '',
            '    if s_label not in rule["domain"]:',
            '        return "invalid"            # subject 타입 위반',
            '    if o_label not in rule["range"]:',
            '        return "invalid"            # object 타입 위반',
            '    return "ok"',
            '',
            '# 검증 결과',
            '#   (Alice:Person)-[WORKS_AT]->(Acme:Company)   ✓ ok',
            '#   (서울:City)  -[WORKS_AT]->(Alice:Person)    ✗ invalid',
            '#                                                domain=Person 위반',
            '#',
            '# → 통과한 triple만 MERGE, 위반은 reject.log 로 따로 모은다.',

    // ─────────────────────────────────────────────────────

      'Alice는 Acme에서 일한다.',
      'Acme는 서울에 있다.',
      'Bob은 Globex 소속이다.',
      'Globex 본사는 부산이다.',

      '서울이 Alice에서 일한다(?)',    // 온톨로지 위반 hallucination — Step 5
    ];

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌(원문 + triples) / 우(그래프)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const { edges, triples, sentenceHi, corefMatch, showInvalidPanel } = step;
      const getNode = (id) => NODES.find((n) => n.id === id);

      // coreference 매칭 애니메이션용 — mention 좌표는 원문 패널 우측 모서리(고정 가상점)
      // 실제 SVG에서는 그래프 노드 사이에 점선 + 펄스 만으로 충분히 표현
      const corefTarget = corefMatch ? getNode(corefMatch.target) : null;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">관계 그래프 빌더</h2>
            <span className="text-[10px] text-slate-400 font-mono">live · violet</span>
          </div>

          {/* 원문 + triple 리스트 (상단) */}
          <div className="grid grid-cols-2 gap-3 mb-3">
            {/* 좌: 원문 문장 */}
            <div className="bg-slate-50 rounded-lg border border-slate-200 p-2.5">
              <div className="text-[10px] font-bold text-slate-500 mb-1.5 uppercase">원문</div>
              <div className="space-y-1">
                {SENTENCES.map((s, i) => {
                  const isHi = sentenceHi === i;
                  const isCoref = corefMatch && i === 4;
                  const isInvalid = showInvalidPanel && i === 5;
                  return (
                    <div
                      key={i}
                      className={`text-[11px] px-2 py-1 rounded transition-all duration-500 ${
                        isInvalid
                          ? 'bg-red-100 border border-red-400 text-red-800 line-through'
                          : isCoref
                          ? 'bg-amber-100 border border-amber-400 text-amber-900'
                          : isHi
                          ? 'bg-violet-100 border border-violet-400 text-violet-900'
                          : 'bg-white border border-slate-200 text-slate-600'
                      }`}
                    >
                      <span className="font-mono text-[9px] text-slate-400 mr-1">[{i + 1}]</span>
                      {s}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* 우: 추출된 triple 리스트 */}
            <div className="bg-slate-50 rounded-lg border border-slate-200 p-2.5">
              <div className="text-[10px] font-bold text-slate-500 mb-1.5 uppercase">추출된 Triple</div>
              {triples.length === 0 ? (
                <div className="text-[11px] text-slate-400 italic py-3 text-center">
                  아직 추출 전 — 노드만 있음
                </div>
              ) : (
                <div className="space-y-1">
                  {triples.map((t, i) => {
                    const cls =
                      t.status === 'invalid'
                        ? 'bg-red-50 border-red-400 text-red-800'
                        : t.status === 'coref'
                        ? 'bg-amber-50 border-amber-400 text-amber-900'
                        : t.status === 'pending'
                        ? 'bg-slate-50 border-slate-300 text-slate-700'
                        : 'bg-emerald-50 border-emerald-400 text-emerald-900';
                    const icon =
                      t.status === 'invalid'
                        ? '✗'
                        : t.status === 'coref'
                        ? '↩'
                        : t.status === 'pending'
                        ? '…'
                        : '✓';
                    return (
                      <div
                        key={i}
                        className={`text-[10px] px-2 py-1 rounded border font-mono flex items-center gap-1.5 ${cls}`}
                      >
                        <span className="font-bold w-3 text-center">{icon}</span>
                        <span className="truncate">
                          ({t.s})-[:{t.p}]-&gt;({t.o})
                        </span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>

          {/* SVG 그래프 (하단) */}
          <div className="bg-slate-50 rounded-lg border border-slate-200 p-2">
            <div className="text-[10px] font-bold text-slate-500 mb-1 uppercase">그래프</div>
            <svg viewBox="0 0 760 320" className="w-full" style={{ maxHeight: '320px' }}>
              <defs>
                <marker
                  id="arrowOk"
                  viewBox="0 0 10 10"
                  refX="8"
                  refY="5"
                  markerWidth="6"
                  markerHeight="6"
                  orient="auto-start-reverse"
                >
                  <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed" />
                </marker>
                <marker
                  id="arrowCoref"
                  viewBox="0 0 10 10"
                  refX="8"
                  refY="5"
                  markerWidth="6"
                  markerHeight="6"
                  orient="auto-start-reverse"
                >
                  <path d="M0,0 L10,5 L0,10 z" fill="#d97706" />
                </marker>
                <marker
                  id="arrowInvalid"
                  viewBox="0 0 10 10"
                  refX="8"
                  refY="5"
                  markerWidth="6"
                  markerHeight="6"
                  orient="auto-start-reverse"
                >
                  <path d="M0,0 L10,5 L0,10 z" fill="#dc2626" />
                </marker>
              </defs>

              {/* 엣지 */}
              {edges.map((e, i) => {
                const f = getNode(e.from);
                const t = getNode(e.to);
                const dx = t.cx - f.cx, dy = t.cy - f.cy;
                const len = Math.sqrt(dx * dx + dy * dy);
                const ux = dx / len, uy = dy / len;
                const sx = f.cx + ux * 32, sy = f.cy + uy * 32;
                const ex = t.cx - ux * 36, ey = t.cy - uy * 36;
                const mx = (sx + ex) / 2, my = (sy + ey) / 2 - 7;

                const isInvalid = e.kind === 'invalid';
                const isCoref = e.kind === 'coref';
                const stroke = isInvalid ? '#dc2626' : isCoref ? '#d97706' : '#7c3aed';
                const marker = isInvalid ? 'url(#arrowInvalid)' : isCoref ? 'url(#arrowCoref)' : 'url(#arrowOk)';
                const dash = isCoref ? '6 4' : isInvalid ? '4 3' : '0';
                const labelBg = isInvalid ? '#fee2e2' : isCoref ? '#fef3c7' : '#ede9fe';
                const labelStroke = isInvalid ? '#dc2626' : isCoref ? '#d97706' : '#a78bfa';
                const labelTextColor = isInvalid ? '#991b1b' : isCoref ? '#92400e' : '#5b21b6';

                return (
                  <g key={'edge-' + i} className={isInvalid ? 'animate-pulse' : ''}>
                    <line x1={sx} y1={sy} x2={ex} y2={ey} stroke={stroke} strokeWidth="2"
                          strokeDasharray={dash} markerEnd={marker} />
                    <rect x={mx - 52} y={my - 9} width="104" height="16" rx="3"
                          fill={labelBg} stroke={labelStroke} />
                    <text x={mx} y={my + 3} textAnchor="middle" fontSize="9"
                          fontFamily="monospace" fontWeight="bold" fill={labelTextColor}>
                      :{e.label}
                    </text>
                    {isInvalid && (
                      <text x={mx + 60} y={my + 4} fontSize="14" fontWeight="bold" fill="#dc2626">✗</text>
                    )}
                  </g>
                );
              })}

              {/* coreference 매칭 점선 */}
              {corefMatch && corefTarget && (
                <g className="animate-pulse">
                  <line x1="20" y1="20" x2={corefTarget.cx} y2={corefTarget.cy}
                        stroke="#d97706" strokeWidth="1.5" strokeDasharray="3 3" opacity="0.7" />
                  <circle cx={corefTarget.cx} cy={corefTarget.cy} r="40"
                          fill="none" stroke="#d97706" strokeWidth="2" strokeDasharray="4 3" />
                  <text x="22" y="14" fontSize="9" fontFamily="monospace" fontWeight="bold" fill="#92400e">
                    "그녀" ≡ Alice
                  </text>
                </g>
              )}

              {/* 노드 (항상 표시) */}
              {NODES.map((n) => (
                <g key={n.id}>
                  <circle cx={n.cx} cy={n.cy} r="32" fill={n.bg} stroke={n.stroke} strokeWidth="2" />
                  <text x={n.cx} y={n.cy - 1} textAnchor="middle" fontSize="10" fontWeight="bold" fill="#fff">
                    {n.name}
                  </text>
                  <text x={n.cx} y={n.cy + 12} textAnchor="middle" fontSize="8" fill="#fff" fillOpacity="0.85">
                    :{n.label}
                  </text>
                </g>
              ))}

              {/* Step 1 안내문 */}
              {edges.length === 0 && (
                <text x="380" y="305" textAnchor="middle" fontSize="11" fill="#94a3b8" fontStyle="italic">
                  엣지 없음 — 점만 찍힌 노드 집합
                </text>
              )}
            </svg>
          </div>

          {/* Step 5 검증 위반 패널 */}
          {showInvalidPanel && (
            <div className="mt-3 p-2.5 rounded-lg bg-red-50 border-2 border-red-400">
              <div className="flex items-center gap-2 text-red-800 font-bold text-xs">
                <span className="text-base">🛡</span>
                <span>온톨로지 위반 차단</span>
              </div>
              <div className="text-[10px] text-red-700 mt-1 font-mono">
                (서울:City)-[WORKS_AT]-&gt;(Alice:Person) — domain=Person 규칙 위반 →
                reject.log
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-violet-400"></span>관계 (ok)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-amber-400"></span>coref 해결
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-red-500"></span>온톨로지 위반
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2.5 h-2.5 rounded-full bg-violet-400"></span>Person
              <span className="w-2.5 h-2.5 rounded-full bg-emerald-400 ml-1"></span>Company
              <span className="w-2.5 h-2.5 rounded-full bg-blue-400 ml-1"></span>City
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode CodeViewer — highlight.js 토큰화 후 라인별 분할
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        codeRef.current.removeAttribute('data-highlighted');
        codeRef.current.className = `language-${code.lang}`;
        codeRef.current.textContent = code.lines.join('\n');
        window.hljs.highlightElement(codeRef.current);
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">
              {code.lang}
            </span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>
              {code.lines.join('\n')}
            </code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-violet-500/15 border-l-2 border-violet-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>
              Step {stepIdx + 1} / {total}
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') {
            e.preventDefault();
            nextRef.current();
          }
          if (e.key === 'ArrowLeft') {
            e.preventDefault();
            prevRef.current();
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a
                href="../index.html"
                className="text-violet-700 hover:text-violet-900 font-medium"
              >
                &larr; 허브로
              </a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">
                curriculum IV-1-2
              </span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">
                  IV
                </div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">
                    Part IV. 그래프 인덱싱 &gt; Chapter 1. 엔티티 &amp; 관계 추출
                  </div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">관계 구축</h1>
                  <p className="text-sm text-slate-500 mt-0.5">
                    엔티티 간 엣지 추출 — 누가 누구와 어떤 관계 (LLM triple → coref →
                    온톨로지 검증)
                  </p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 next-link */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 text-sm text-violet-900">
                💡 다음(IV-2-1)에서는 <strong>Community Detection</strong> — 만들어진 그래프에서
                군집(클러스터) 찾기
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-violet-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-violet-600 text-white hover:bg-violet-700 transition min-w-[110px]"
              >
                {isPlaying
                  ? '⏸ 정지'
                  : stepIdx >= STEPS.length - 1
                  ? '↻ 다시보기'
                  : '▶ 자동재생'}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a
                href="./IV-1-1.html"
                className="text-slate-500 hover:text-slate-700"
              >
                &larr; IV-1-1 엔티티 추출
              </a>
              <a
                href="./IV-2-1.html"
                className="text-violet-700 hover:text-violet-900 font-medium"
              >
                IV-2-1 Community Detection &rarr;
              </a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
