<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — 엔티티 추출</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-1-1. 엔티티 추출 (NER + LLM)
    학습 목표: 텍스트에서 인물/장소/사건을 자동 추출한다.
    핵심 비유: "텍스트에 빨간 펜으로 인물/장소 동그라미"
    구조: 4단계 (원본 / 전통 NER / LLM 함수 호출 / 온톨로지 조합)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 엔티티 라벨 정적 매핑 (Tailwind 정적 클래스로 표현 어려운 hex — style prop 예외 허용)
    const LABEL_STYLE = {
      Person:   { bg: '#a78bfa', stroke: '#7c3aed' },
      Year:     { bg: '#fbbf24', stroke: '#d97706' },
      Location: { bg: '#60a5fa', stroke: '#2563eb' },
      Company:  { bg: '#34d399', stroke: '#059669' },
    };

    // 토큰 명시 배열 — split() 금지
    const TOKENS = [
      { text: '스티브 잡스',   type: 'Person' },
      { text: '는 ',           type: null },
      { text: '1976년',        type: 'Year' },
      { text: ' ',             type: null },
      { text: '캘리포니아',    type: 'Location' },
      { text: ' ',             type: null },
      { text: '쿠퍼티노',      type: 'Location' },
      { text: '에서 ',         type: null },
      { text: '스티브 워즈니악', type: 'Person' },
      { text: '과 함께 ',      type: null },
      { text: '애플',          type: 'Company' },
      { text: '을 공동 창업했다.', type: null },
    ];

    // 전통 NER이 잘 잡는 라벨 (PERSON/LOC/ORG)만
    const NER_LABELS = new Set(['Person', 'Location', 'Company']);
    // LLM/온톨로지 단계는 모든 라벨 (Year 포함 + 도메인 자유)

    // LLM 함수 호출 결과 (JSON Schema 강제) — 객체로 보관 후 JSON.stringify로 안전 직렬화
    const LLM_RESULT = [
      { entity: '스티브 잡스',     label: 'Person',   properties: { role: 'CEO', born: 1955 } },
      { entity: '스티브 워즈니악', label: 'Person',   properties: { role: 'Engineer' } },
      { entity: '애플',            label: 'Company',  properties: { founded: 1976, hq: 'Cupertino' } },
      { entity: '캘리포니아',      label: 'Location', properties: { type: 'State', country: 'USA' } },
      { entity: '쿠퍼티노',        label: 'Location', properties: { type: 'City' } },
      { entity: '1976년',          label: 'Year',     properties: { value: 1976 } },
    ];

    const LLM_RESULT_JSON = JSON.stringify(LLM_RESULT, null, 2);

    const STEPS = [
      {
        title: 'Step 1. 원본 텍스트 — 평범한 한 문장',
        desc: '"스티브 잡스는 1976년 캘리포니아 쿠퍼티노에서 스티브 워즈니악과 함께 애플을 공동 창업했다." 인물 2명, 장소 2개, 회사 1개, 연도 1개가 섞여 있다. 사람은 바로 보이지만, 컴퓨터에게는 단순 글자 나열일 뿐.',
        focus: 'raw',
      },
      {
        title: 'Step 2. 전통 NER — spaCy / HuggingFace',
        desc: 'NER(Named Entity Recognition) 모델은 토큰을 PERSON / LOC / ORG 같은 표준 라벨로 분류한다. 정확하지만 사전에 학습된 라벨만 잡는다 — "1976년" 같은 시간이나 도메인 특화 라벨(:Drug, :Symptom)은 약함.',
        focus: 'ner',
      },
      {
        title: 'Step 3. LLM 함수 호출 — 자유로운 라벨 + 속성',
        desc: 'LLM에 JSON Schema를 함수로 던지면 그 형식대로 추출한다. 라벨도 도메인에 맞춰 자유롭게 정의 가능하고, 속성까지 한 번에 뽑는다. 예시 몇 개만 주면 학습됨 — few-shot 강력.',
        focus: 'llm',
      },
      {
        title: 'Step 4. 온톨로지 + LLM — 일관된 라벨',
        desc: 'LLM은 강력하지만 같은 의미를 다른 라벨로 뽑을 위험(II-2-1의 혼란). 프롬프트에 II-2-1 온톨로지를 주입하면 라벨이 표준화된다. GraphRAG 인덱싱 표준 패턴 — 다음(IV-1-2)에서 관계 구축.',
        focus: 'onto',
      },
    ];

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const focus = step.focus;
      const showLLM = focus === 'llm' || focus === 'onto';

      // 토큰 하이라이트 결정
      const isTokenHighlighted = (type) => {
        if (!type) return false;
        if (focus === 'raw') return false;
        if (focus === 'ner') return NER_LABELS.has(type); // Year 제외
        return true; // llm/onto: 모두
      };

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">엔티티 추출 (NER + LLM)</h1>
                <p className="text-sm text-slate-500 mt-1">텍스트에 빨간 펜으로 인물/장소 동그라미 — 그래프 인덱싱의 첫 단계</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* 원본 텍스트 + 토큰 하이라이트 */}
            <div className="bg-white rounded-xl shadow-sm border-2 border-emerald-200 p-5 mb-4">
              <div className="text-[11px] font-bold text-slate-500 mb-2">원본 텍스트</div>
              <p className="text-base leading-loose">
                {TOKENS.map((t, i) => {
                  if (!t.type) return <span key={i} className="text-slate-700">{t.text}</span>;
                  const highlight = isTokenHighlighted(t.type);
                  const style = LABEL_STYLE[t.type];
                  return (
                    <span
                      key={i}
                      className="inline-block px-1.5 py-0.5 mx-0.5 rounded font-bold transition-all"
                      style={{
                        background: highlight ? style.bg : 'transparent',
                        color: highlight ? '#fff' : '#334155',
                        outline: highlight ? `2px solid ${style.stroke}` : 'none',
                      }}
                    >
                      {t.text}
                      {highlight && (
                        <span className="text-[8px] ml-1 opacity-90">:{t.type}</span>
                      )}
                    </span>
                  );
                })}
              </p>
              {focus === 'ner' && (
                <div className="text-[11px] text-rose-700 mt-3">⚠ 전통 NER은 PERSON/LOC/ORG 같은 표준 라벨만 — "1976년" 누락</div>
              )}
            </div>

            {/* Step 3, 4: LLM JSON 결과 */}
            {showLLM && (
              <div className="bg-slate-900 rounded-xl p-4 mb-4">
                <div className="text-[10px] text-slate-400 mb-2">{focus === 'onto' ? 'LLM 함수 호출 + 온톨로지 주입 결과' : 'LLM 함수 호출 결과 (JSON Schema 강제)'}</div>
                <pre className="text-emerald-300 font-mono text-xs overflow-x-auto whitespace-pre">{LLM_RESULT_JSON}</pre>
              </div>
            )}

            {/* Step 4: 온톨로지 강조 */}
            {focus === 'onto' && (
              <div className="bg-white rounded-xl shadow-sm border-2 border-violet-300 p-4 mb-6">
                <div className="text-xs font-bold text-violet-700 mb-2">📜 LLM 프롬프트 — 온톨로지 주입</div>
                <div className="bg-slate-100 rounded p-3 text-xs font-mono text-slate-700">
                  허용 라벨: {Object.keys(LABEL_STYLE).join(', ')}<br/>
                  → LLM은 이 라벨 안에서만 추출 → 일관성 보장
                </div>
                <div className="text-[10px] text-slate-500 mt-3">→ 다음(IV-1-2)에서 추출된 엔티티 사이의 관계를 LLM이 추론</div>
              </div>
            )}

            {/* 라벨 범례 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-3 mb-6">
              <div className="text-[10px] font-bold text-slate-500 mb-2">라벨 색상</div>
              <div className="flex flex-wrap gap-3 text-[10px]">
                {Object.entries(LABEL_STYLE).map(([label, s]) => (
                  <div key={label} className="flex items-center gap-1.5">
                    <span className="w-3 h-3 rounded" style={{ background: s.bg }} />
                    <span className="text-slate-600 font-mono">:{label}</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
