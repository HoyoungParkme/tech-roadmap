  <!--
    IV-3-1. 평가 지표 — RAGAS 4축
    학습 목표: GraphRAG 답변 품질을 4 지표(Faithfulness / Answer Relevancy / Context Recall / Context Precision)로 측정한다.
    핵심 비유: "성적표" — 답이 사실에 충실한가, 질문에 부합하는가, 빠진 정보 없는가, 노이즈 적은가
    패턴: fastapi v1 패턴 — 좌(LiveDataPane 4 metric bar chart) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 메트릭 메타 (이름/아이콘 고정)
    // ─────────────────────────────────────────────────────
    const METRIC_META = [
      { key: 'faith',     emoji: '🎯', name: 'Faithfulness',      sub: '그래프 사실과 일치' },
      { key: 'relevancy', emoji: '🧭', name: 'Answer Relevancy',  sub: '질문에 부합' },
      { key: 'recall',    emoji: '📥', name: 'Context Recall',    sub: 'ground truth 포함률' },
      { key: 'precision', emoji: '✂️', name: 'Context Precision', sub: '노이즈 적은 정도' },
    ];

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의
    // dataState.metrics[key] = { score: 0~1, state: 'good'|'warn'|'crit'|'unknown', focus: bool }
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Faithfulness — 답이 그래프 사실과 일치하는가? (hallucination 측정)',

        sample: {
          question: 'Q: "잡스가 공동 창업한 회사는?"',

          verdict: 'hallucination — 마이크로소프트는 빌 게이츠가 창업. 그래프에 (Jobs)-[founded]->(Microsoft) 엣지 없음.',

        },
        dataState: {
          metrics: {

          },
          overall: 0.69,
          alert: { kind: 'hallucination', text: '🚨 Faithfulness 0.40 — 답에 그래프 외 사실(Microsoft 창업) 포함' },
        },
        code: {
          lang: 'python',
          filename: 'evaluate.py',
          lines: [
            '"""Faithfulness 측정 — RAGAS 표준 메트릭"""',

            'from ragas.metrics import faithfulness',
            'from datasets import Dataset',

            '# GraphRAG 결과 1건 평가용 데이터셋',

            '        "(Wozniak)-[co_founded]->(Apple)",',

            '    "ground_truth": "잡스는 워즈니악과 함께 애플을 공동 창업했다.",',

            '',
            '# 내부 동작:',
            '#   1) 답변을 claims로 분해 ["잡스가 애플 창업", "MS도 창업"]',
            '#   2) 각 claim을 contexts와 LLM이 NLI 비교',
            '#   3) supported / total = 1/2 = 0.50 → 보정 후 0.40',
          ],
          highlight: [3, 19, 20, 25],
        },
      },
      {
        title: 'Step 2. Answer Relevancy — 답이 질문에 부합하는가?',
        desc: '답변이 정확하더라도 질문과 동떨어지면 0점. 답변 → LLM이 역으로 가능한 질문 N개 생성 → 원래 질문과 cosine 유사도. 0.85면 질문 의도에 충실. 0.30이면 동문서답.',
        focusMetric: 'relevancy',
        sample: {
          question: 'Q: "애플의 창업자는 누구인가?"',
          answer: 'A: "애플은 1976년에 캘리포니아에서 만들어진 회사이다." (창업자 미언급)',
          verdict: '동문서답 — 회사 위치/연도만 답하고 핵심 "누구"가 빠짐.',

        },
        dataState: {
          metrics: {
            faith:     { score: 0.92, state: 'good', focus: false },
            relevancy: { score: 0.30, state: 'crit', focus: true },

            precision: { score: 0.70, state: 'good', focus: false },
          },
          overall: 0.67,
          alert: { kind: 'off-topic', text: '⚠ Answer Relevancy 0.30 — 답이 질문 의도와 어긋남' },
        },
        code: {
          lang: 'python',
          filename: 'evaluate.py',
          lines: [
            '"""Answer Relevancy 측정"""',
            'from ragas.metrics import answer_relevancy',
            '',
            'sample = {',
            '    "question": "애플의 창업자는 누구인가?",',
            '    "answer":   "애플은 1976년에 캘리포니아에서 만들어진 회사이다.",',

            '        "(Jobs)-[founded]->(Apple)",',

            '}',
            '',
            'result = evaluate(ds, metrics=[answer_relevancy])',

            '',
            '# 내부 동작:',
            '#   1) LLM이 답변에서 역으로 질문 N개 생성',
            '#      → ["애플은 언제 창업?", "애플 위치는?", ...]',
            '#   2) 생성 질문 ↔ 원래 질문 embedding cosine 유사도',
            '#   3) 평균값이 relevancy score',
            '',
            '# 실무 팁: faithfulness 높아도 relevancy 낮으면',
            '#   → 모델이 "안전하게 일반론으로 회피"하는 패턴',
            '#   → 프롬프트에 "질문에 직접 답하라" 추가',
          ],
          highlight: [2, 13, 14, 17, 18, 19],
        },
      },
      {
        title: 'Step 3. Context Recall — 답에 필요한 ground truth가 traverse 결과에 다 있는가?',
        desc: 'ground truth를 문장 단위로 분해 후, 각각이 traverse한 contexts에서 추론 가능한지 확인. 0.40이면 정답에 필요한 정보 60%가 그래프 traverse에서 누락. → 검색 단계 개선 필요(hop 늘리거나 community 확장).',
        focusMetric: 'recall',
        sample: {
          question: 'Q: "애플 창업자 4명을 모두 알려줘"',
          answer: 'A: "잡스, 워즈니악이 공동 창업했다."',
          verdict: 'recall 부족 — ground truth는 4명(잡스/워즈/웨인/마쿨라)인데 traverse가 2명만 가져옴.',
          isBad: true,
        },
        dataState: {
          metrics: {
            faith:     { score: 0.95, state: 'good', focus: false },

            precision: { score: 0.88, state: 'good', focus: false },
          },
          overall: 0.76,
          alert: { kind: 'missing-context', text: '⚠ Context Recall 0.40 — ground truth 60% 누락 (traverse 부족)' },
        },
        code: {
          lang: 'python',
          filename: 'evaluate.py',
          lines: [
            '"""Context Recall — ground truth 포함률"""',
            'from ragas.metrics import context_recall',
            '',
            'sample = {',
            '    "question": "애플 창업자 4명을 모두 알려줘",',
            '    "answer":   "잡스, 워즈니악이 공동 창업했다.",',
            '    "contexts": [  # 1-hop만 가져옴',

            '        "(Wozniak)-[co_founded]->(Apple)",',
            '    ],',

            '        "마쿨라 4명이 공동 창업했다."',
            '    ),',
            '}',
            '',

            '',

            '#   1) ground_truth를 sentence 분해',

            '#       community summary를 함께 retrieve',

        },
      },
      {
        title: 'Step 4. Context Precision — traverse 결과에 노이즈가 적은가?',
        desc: '가져온 context 중 답에 실제로 쓰인 비율. 0.50이면 절반이 무관한 노이즈 — LLM 토큰만 낭비. precision 낮으면 ranking 단계 추가하거나 traverse 가지치기. recall ↑ + precision ↓ trade-off는 RAG의 영원한 숙제.',

        sample: {
          question: 'Q: "잡스의 출생지는?"',
          answer: 'A: "잡스는 샌프란시스코에서 태어났다."',

        },
        dataState: {
          metrics: {
            faith:     { score: 0.93, state: 'good', focus: false },
            relevancy: { score: 0.88, state: 'good', focus: false },
            recall:    { score: 0.85, state: 'good', focus: false },
            precision: { score: 0.50, state: 'warn', focus: true },
          },
          overall: 0.79,
          alert: { kind: 'noisy-context', text: '⚠ Context Precision 0.50 — traverse 결과의 절반이 노이즈' },
        },
        code: {
          lang: 'python',
          filename: 'evaluate.py',
          lines: [
            '"""Context Precision — 노이즈 측정"""',
            'from ragas.metrics import context_precision',
            '',
            'sample = {',
            '    "question": "잡스의 출생지는?",',
            '    "answer":   "잡스는 샌프란시스코에서 태어났다.",',
            '    "contexts": [  # 10개 가져왔지만 1개만 유용',
            '        "(Jobs)-[born_in]->(SanFrancisco)",  # ✅',
            '        "(Jobs)-[founded]->(Apple)",         # 무관',
            '        "(Jobs)-[hired]->(Cook)",            # 무관',
            '        "(Apple)-[released]->(iPhone)",      # 무관',
            '        # ... 6개 더',
            '    ],',
            '    "ground_truth": "잡스는 샌프란시스코에서 태어났다.",',
            '}',
            '',
            'result = evaluate(ds, metrics=[context_precision])',
            'print(result["context_precision"])  # → 0.50',
            '',
            '# 내부 동작:',
            '#   각 context가 answer에 기여했는지 LLM 판단',
            '#   useful / total → precision',
            '',
            '# trade-off:',
            '#   recall ↑ 위해 hop 넓히면 precision ↓',
            '#   → 해결: traverse 후 reranker로 top-k 추출',
          ],
          highlight: [2, 8, 9, 10, 11, 17, 18, 24, 25],
        },
      },
      {
        title: 'Step 5. 종합 점수 — RAGAS / TruLens / DeepEval 자동 측정',
        desc: '4 지표를 한 번에 돌리고 dashboard에 기록. RAGAS는 metric 조합, TruLens는 trace 통합, DeepEval은 pytest 호환. CI에 endpoint 회귀 테스트로 매 배포마다 4지표 추적. 이번 케이스는 4 지표 모두 양호 → 전체 평균 0.89.',
        focusMetric: 'overall',
        sample: {
          question: 'Q: "잡스가 공동 창업한 회사는?"',
          answer: 'A: "잡스는 1976년 워즈니악과 함께 애플을 공동 창업했다."',
          verdict: '✅ 4지표 모두 양호 — Faithfulness 0.95 / Relevancy 0.92 / Recall 0.88 / Precision 0.82',

          metrics: {
            faith:     { score: 0.95, state: 'good', focus: true },
            relevancy: { score: 0.92, state: 'good', focus: true },
            recall:    { score: 0.88, state: 'good', focus: true },
            precision: { score: 0.82, state: 'good', focus: true },
          },
          overall: 0.89,
          alert: null,
        },
        code: {
          lang: 'yaml',
          filename: 'ragas-config.yaml',
          lines: [
            '# RAGAS 평가 파이프라인 — CI에서 매 PR마다 실행',
            'evaluator: ragas',
            'llm:',
            '  provider: openai',
            '  model: gpt-4o-mini      # judge LLM (cheap & fast)',
            'embeddings:',
            '  provider: openai',
            '  model: text-embedding-3-small',
            '',
            'metrics:',
            '  - faithfulness          # 그래프 사실 일치',
            '  - answer_relevancy      # 질문 부합',
            '  - context_recall        # ground truth 포함률',
            '  - context_precision     # 노이즈 정도',
            '',
            'dataset:',
            '  source: ./tests/golden_qa.jsonl   # 50문항 golden set',
            '  fields:',
            '    question: question',
            '    answer:   graphrag_answer',
            '    contexts: traverse_contexts',
            '    ground_truth: human_answer',
            '',
            'thresholds:                # 회귀 차단 임계치',
            '  faithfulness:      0.85',
            '  answer_relevancy:  0.80',
            '  context_recall:    0.75',
            '  context_precision: 0.70',
            '',
            'output:',
            '  format: json',
            '  path: ./reports/metrics.json',
            '',
            '# 대안 도구:',
            '#   TruLens — trace 통합, dashboard UI 강함',
            '#   DeepEval — pytest 호환, assert로 회귀 테스트',
          ],
          highlight: [10, 11, 12, 13, 14, 24, 25, 26, 27, 28],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 정적 Tailwind 클래스 (purge 안전)
    // ─────────────────────────────────────────────────────
    const STATE_STYLE = {
      unknown: { card: 'bg-slate-100 border-slate-300', value: 'text-slate-400', bar: 'bg-slate-300', badge: 'bg-slate-200 text-slate-500', label: '—' },
      good:    { card: 'bg-emerald-50 border-emerald-300', value: 'text-emerald-700', bar: 'bg-emerald-400', badge: 'bg-emerald-100 text-emerald-700', label: 'OK' },
      warn:    { card: 'bg-yellow-50 border-yellow-400',   value: 'text-yellow-700',  bar: 'bg-yellow-400',  badge: 'bg-yellow-100 text-yellow-700',   label: '주의' },
      crit:    { card: 'bg-red-50 border-red-500',         value: 'text-red-700',     bar: 'bg-red-500',     badge: 'bg-red-100 text-red-700',         label: '위험' },
    };

    const FOCUS_RING = 'ring-2 ring-violet-500 ring-offset-2 ring-offset-white shadow-lg scale-[1.02]';

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 4 지표 막대 그래프 + 종합 점수 카드
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ dataState, sample, focusMetric }) {
      const { metrics, overall, alert } = dataState;

      // 종합 점수 색상
      const overallState =
        overall >= 0.85 ? 'good' :
        overall >= 0.70 ? 'warn' : 'crit';
      const overallStyle = STATE_STYLE[overallState];

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">📊 RAGAS 평가 대시보드</h2>
            <span className="text-[10px] text-slate-400 font-mono">4 metrics · 0~1 scale</span>
          </div>

          {/* 4 지표 막대 그래프 */}
          <div className="space-y-2.5 mb-4">
            {METRIC_META.map((m) => {
              const d = metrics[m.key];
              const style = STATE_STYLE[d.state];
              const isFocused = d.focus;
              const pct = Math.round(d.score * 100);
              const isCrit = d.state === 'crit';

              return (
                <div
                  key={m.key}
                  className={`rounded-lg border-2 p-2.5 transition-all duration-500 ${style.card} ${isFocused ? FOCUS_RING : 'opacity-70'} ${isCrit && isFocused ? 'animate-pulse' : ''}`}
                >
                  <div className="flex items-center justify-between mb-1">
                    <div className="flex items-center gap-1.5">
                      <span aria-hidden="true">{m.emoji}</span>
                      <span className="text-xs font-bold text-slate-700">{m.name}</span>
                      {isFocused && <span className="text-[9px] text-violet-700 font-mono bg-violet-100 px-1.5 py-0.5 rounded">FOCUS</span>}
                    </div>
                    <div className="flex items-center gap-1.5">
                      <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${style.badge}`}>
                        {isCrit ? '🚨 ' : ''}{style.label}
                      </span>
                      <span className={`text-base font-extrabold tabular-nums ${style.value} w-12 text-right`}>
                        {d.score.toFixed(2)}
                      </span>
                    </div>
                  </div>

                  {/* 막대 그래프 */}
                  <div className="relative h-2.5 bg-slate-100 rounded-full overflow-hidden">
                    <div
                      className={`h-full transition-all duration-700 ${style.bar}`}
                      style={{ width: `${pct}%` }}
                    />
                    {/* 임계치 라인 (0.75 표시) */}
                    <div
                      className="absolute top-0 bottom-0 w-px bg-slate-400"
                      style={{ left: '75%' }}
                      aria-hidden="true"
                      title="임계치 0.75"
                    />
                  </div>

                  <div className="text-[10px] text-slate-500 mt-1">{m.sub}</div>
                </div>
              );
            })}
          </div>

          {/* 알람 박스 (위험 케이스) */}
          {alert && (
            <div className="mb-4 p-3 rounded-lg bg-red-50 border-2 border-red-400 animate-pulse">
              <div className="flex items-center gap-2 text-red-800 font-bold text-sm">
                <span>{alert.text}</span>
              </div>
              <div className="text-[10px] text-red-700 mt-1 font-mono uppercase">
                kind = {alert.kind}
              </div>
            </div>
          )}

          {/* 종합 점수 카드 */}
          <div className={`rounded-lg border-2 p-3 ${overallStyle.card} ${focusMetric === 'overall' ? FOCUS_RING : ''}`}>
            <div className="flex items-center justify-between mb-1">
              <span className="text-xs font-bold text-slate-700">📈 종합 점수 (4 metrics 평균)</span>
              <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${overallStyle.badge}`}>
                {overallStyle.label}
              </span>
            </div>
            <div className="flex items-end gap-2">
              <span className={`text-3xl font-extrabold tabular-nums ${overallStyle.value}`}>{overall.toFixed(2)}</span>
              <span className="text-xs text-slate-500 mb-1">/ 1.00</span>
            </div>
            <div className="relative h-2 bg-slate-100 rounded-full overflow-hidden mt-1.5">
              <div
                className={`h-full transition-all duration-700 ${overallStyle.bar}`}
                style={{ width: `${Math.round(overall * 100)}%` }}
              />
            </div>
          </div>

          {/* 샘플 케이스 (Q&A + 평가) */}
          <div className={`mt-4 p-3 rounded-lg border ${sample.isBad ? 'bg-rose-50 border-rose-200' : 'bg-emerald-50 border-emerald-200'}`}>
            <div className="text-[10px] font-bold text-slate-600 mb-1 uppercase tracking-wider">샘플 평가</div>
            <div className="text-[11px] text-slate-700 mb-1"><span className="font-mono">{sample.question}</span></div>
            <div className="text-[11px] text-slate-700 mb-2"><span className="font-mono">{sample.answer}</span></div>
            <div className={`text-[10px] font-medium ${sample.isBad ? 'text-rose-700' : 'text-emerald-700'}`}>
              {sample.isBad ? '❌ ' : '✅ '}{sample.verdict}
            </div>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-400"></span>OK (≥0.85)</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-yellow-400"></span>주의 (0.70~0.85)</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-red-500"></span>위험 (&lt;0.70)</span>
            <span className="flex items-center gap-1 ml-auto"><span className="w-px h-3 bg-slate-400"></span>임계치 0.75</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // 파일명 탭 (evaluate.py / ragas-config.yaml / metrics.json)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      // 파일명 탭 — 현재 step의 filename + 다른 lang 표시
      const FILE_TABS = [
        { name: 'evaluate.py',       lang: 'python' },
        { name: 'ragas-config.yaml', lang: 'yaml' },
        { name: 'metrics.json',      lang: 'json' },
      ];

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 (활성 탭 강조) */}
          <div className="bg-[#21252b] border-b border-slate-700">
            <div className="px-4 py-2 flex items-center gap-2">
              <div className="flex gap-1.5">
                <span className="w-3 h-3 rounded-full bg-red-500"></span>
                <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
                <span className="w-3 h-3 rounded-full bg-green-500"></span>
              </div>
              <span className="ml-2 text-[10px] text-slate-500 font-mono uppercase">RAGAS evaluator</span>
              <span className="ml-auto text-[10px] text-slate-500 font-mono">{code.lang}</span>
            </div>
            <div className="flex border-t border-slate-700">
              {FILE_TABS.map((t) => {
                const active = t.name === code.filename;
                return (
                  <div
                    key={t.name}
                    className={`px-3 py-1.5 text-xs font-mono border-r border-slate-700 ${active
                      ? 'bg-[#282c34] text-violet-300 border-t-2 border-t-violet-500'
                      : 'bg-[#21252b] text-slate-500'}`}
                  >
                    {t.name}
                  </div>
                );
              })}
            </div>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-violet-500/15 border-l-2 border-violet-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-violet-700 hover:text-violet-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-3-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. 평가 &amp; 운영 &gt; Chapter 3. 품질 측정</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">평가 지표</h1>
                  <p className="text-sm text-slate-500 mt-0.5">성적표 — Faithfulness / Answer Relevancy / Context Recall / Context Precision</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                dataState={step.dataState}
                sample={step.sample}
                focusMetric={step.focusMetric}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 안내 */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 text-sm text-violet-900">
                💡 다음 학습은 <strong>허브에서</strong> — 4 지표를 CI에 붙여 회귀 테스트 자동화하면 GraphRAG가 production-ready
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-violet-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-violet-600 text-white hover:bg-violet-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-2-2.html" className="text-slate-500 hover:text-slate-700">&larr; IV-2-2</a>
              <a href="../index.html" className="text-violet-700 hover:text-violet-900 font-medium">허브로 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
