<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — 평가 지표</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-3-1. 평가 지표
    학습 목표: GraphRAG 답변 품질을 측정하는 지표를 안다.
    핵심 비유: "성적표" — 정확도 + 포괄성 + 다양성 3축 평가
    구조: 4단계 (정확도 / 포괄성 / 다양성 / RAGAS + LLM Judge)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 3개 메트릭 정적 매핑
    const METRICS = [
      {
        key: 'faith',
        emoji: '🎯',
        name: 'Faithfulness (정확도)',
        desc: '답변이 그래프 근거에 충실한가 — 환각(hallucination) 차단',
        good: { score: 0.92, sample: '"잡스는 1976년 애플을 공동 창업했다" — 그래프 노드/엣지 명시' },
        bad:  { score: 0.40, sample: '"잡스는 마이크로소프트도 공동 창업했다" — 그래프에 없는 사실' },
      },
      {
        key: 'comp',
        emoji: '📦',
        name: 'Comprehensiveness (포괄성)',
        desc: '답변이 핵심 측면을 모두 다루는가 — Global 검색 평가에 핵심',
        good: { score: 0.88, sample: '인물/창업/제품/철학 4개 측면 모두 언급' },
        bad:  { score: 0.35, sample: '인물 한 명만 언급, 창업 배경 누락' },
      },
      {
        key: 'div',
        emoji: '🌈',
        name: 'Diversity (다양성)',
        desc: '여러 관점/엔티티가 들어왔는가 — 단조로움 차단',
        good: { score: 0.85, sample: '4개 인물 + 2개 회사 + 시간 흐름까지 종합' },
        bad:  { score: 0.30, sample: '잡스만 반복 언급, 다른 창업자 누락' },
      },
    ];

    const TOOLS = [
      { name: 'RAGAS',         desc: 'RAG 평가 표준 라이브러리 — Python pip로 설치, 5+ 메트릭', graphRagFit: 'GraphRAG로 확장 적용 가능' },
      { name: 'LLM-as-Judge', desc: 'GPT-4가 채점관 역할 — 룰 기반 평가의 한계 극복', graphRagFit: 'Microsoft GraphRAG 논문 채점 방식' },
      { name: 'HumanEval',     desc: '소수 샘플 사람 평가 — 가장 정확하지만 비용 큼', graphRagFit: '최종 검증용으로 병행' },
    ];

    const STEPS = [
      {
        title: 'Step 1. Faithfulness (정확도) — 환각 차단',
        desc: '답변에 그래프에 없는 사실이 섞이면 환각. RAGAS Faithfulness는 답변 문장을 분해해 각각이 컨텍스트(그래프 청크)에서 추론 가능한지 채점. 0~1 점수.',
        focus: 'faith',
      },
      {
        title: 'Step 2. Comprehensiveness (포괄성)',
        desc: '특히 Global 검색에서 중요. "이 책의 핵심 인물망은?" 같은 질문에 한 측면만 답하면 점수 낮음. 모든 군집/관점이 답변에 들어왔는지 측정.',
        focus: 'comp',
      },
      {
        title: 'Step 3. Diversity (다양성)',
        desc: '같은 측면을 반복하지 않고, 여러 관점을 균형 있게 다루는가. "잡스, 잡스, 잡스" 답변은 다양성 0. "잡스/워즈/쿡/아이브" 답변은 높음.',
        focus: 'div',
      },
      {
        title: 'Step 4. RAGAS 확장 + LLM-as-Judge',
        desc: '실무에서는 RAGAS 라이브러리에 GraphRAG 메트릭을 추가하거나, LLM-as-Judge(GPT-4가 채점관)로 자동화. Microsoft GraphRAG 논문도 LLM Judge 채점 방식 채택. 비용은 답변당 $0.05~0.20.',
        focus: 'ragas',
      },
    ];

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const focus = step.focus;

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">평가 지표</h1>
                <p className="text-sm text-slate-500 mt-1">성적표 — 정확도/포괄성/다양성 3축</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* 3개 메트릭 카드 */}
            <div className="space-y-3 mb-6">
              {METRICS.map((m) => {
                // Step 4(ragas)에서는 모든 메트릭 카드를 활성 상태로 — "이 도구로 위 3개 모두 측정"
                const isActive = m.key === focus || focus === 'ragas';
                return (
                  <div
                    key={m.key}
                    className={`bg-white rounded-xl shadow-sm border-2 p-4 transition-all ${isActive ? 'border-emerald-400 shadow-md' : 'border-slate-200 opacity-50'}`}
                  >
                    <div className="flex items-center gap-2 mb-2">
                      {isActive && <span className="text-amber-500">▶</span>}
                      <span className="text-2xl">{m.emoji}</span>
                      <span className="font-bold text-slate-800">{m.name}</span>
                    </div>
                    <div className="text-[11px] text-slate-600 mb-3">{m.desc}</div>
                    {isActive && (
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mt-2">
                        <div className="bg-emerald-50 border border-emerald-200 rounded p-2">
                          <div className="flex items-center justify-between mb-1">
                            <span className="text-[10px] font-bold text-emerald-800">✅ 좋은 답변</span>
                            <span className="text-[10px] font-mono text-emerald-700">{m.good.score.toFixed(2)}</span>
                          </div>
                          <div className="h-2 bg-slate-100 rounded-full overflow-hidden mb-2">
                            <div className="h-full bg-emerald-500 rounded-full" style={{ width: (m.good.score * 100) + '%' }} />
                          </div>
                          <div className="text-[10px] text-slate-700 italic">{m.good.sample}</div>
                        </div>
                        <div className="bg-rose-50 border border-rose-200 rounded p-2">
                          <div className="flex items-center justify-between mb-1">
                            <span className="text-[10px] font-bold text-rose-800">❌ 나쁜 답변</span>
                            <span className="text-[10px] font-mono text-rose-700">{m.bad.score.toFixed(2)}</span>
                          </div>
                          <div className="h-2 bg-slate-100 rounded-full overflow-hidden mb-2">
                            <div className="h-full bg-rose-400 rounded-full" style={{ width: (m.bad.score * 100) + '%' }} />
                          </div>
                          <div className="text-[10px] text-slate-700 italic">{m.bad.sample}</div>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Step 4 도구 */}
            {focus === 'ragas' && (
              <div className="bg-white rounded-xl shadow-sm border-2 border-emerald-300 p-4 mb-6">
                <div className="text-xs font-bold text-emerald-700 mb-3">🛠 평가 도구</div>
                <div className="space-y-2">
                  {TOOLS.map((t) => (
                    <div key={t.name} className="bg-emerald-50 border border-emerald-200 rounded p-3">
                      <div className="flex items-baseline gap-2 mb-1">
                        <span className="font-bold text-emerald-900 text-sm">{t.name}</span>
                      </div>
                      <div className="text-[11px] text-slate-700">{t.desc}</div>
                      <div className="text-[10px] text-emerald-700 mt-1">→ {t.graphRagFit}</div>
                    </div>
                  ))}
                </div>
                <div className="bg-slate-900 rounded-md mt-4 p-3 font-mono text-xs text-emerald-300 whitespace-pre">
{`from ragas import evaluate
from ragas.metrics import faithfulness, answer_relevancy
result = evaluate(dataset, [faithfulness, answer_relevancy])`}
                </div>
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
