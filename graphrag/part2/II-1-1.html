<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — 노드와 엣지</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    II-1-1. 노드(Node)와 엣지(Edge)
    학습 목표: 현실의 정보를 노드와 엣지로 분해할 수 있다.
    핵심 비유: "지하철 노선도" — 역(노드) + 노선(엣지)
    구조: 4단계 (원본 텍스트 / 엔티티→노드 / 관계→엣지 / 다중 관계 SVG)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 노드 라벨별 색상 (정적 매핑 — 회귀 방지)
    const LABEL_STYLE = {
      Person:  { fill: '#a78bfa', stroke: '#7c3aed', text: 'Person' },   // violet
      Company: { fill: '#34d399', stroke: '#059669', text: 'Company' }, // emerald
      Year:    { fill: '#fbbf24', stroke: '#d97706', text: 'Year' },    // amber
    };

    // 텍스트의 토큰 분해 (split 금지 — 명시 배열)
    const TOKENS = [
      { text: '스티브 잡스', type: 'Person' },
      { text: '는 ', type: null },
      { text: '1976년', type: 'Year' },
      { text: ' ', type: null },
      { text: '애플', type: 'Company' },
      { text: '을 공동 창업했다.', type: null },
    ];

    const STEPS = [
      {
        title: 'Step 1. 원본 텍스트 — 평범한 한 문장',
        desc: '"스티브 잡스는 1976년 애플을 공동 창업했다." 사람이 읽으면 누가/언제/뭘 했는지 바로 안다. 그래프 DB는 이 정보를 **노드와 엣지**로 분해해 저장한다.',
        focus: 'text',
      },
      {
        title: 'Step 2. 엔티티 추출 → 노드(Node)',
        desc: '문장 속 "스티브 잡스"는 사람(Person), "애플"은 회사(Company)다. 각 엔티티는 하나의 동그라미(노드)가 된다. 라벨로 분류하면 (:Person), (:Company)처럼 표기한다.',
        focus: 'nodes',
      },
      {
        title: 'Step 3. 관계 추출 → 엣지(Edge)',
        desc: '"공동 창업했다"는 잡스와 애플 사이의 관계다. 화살표로 표현하면 (스티브 잡스)-[:CO_FOUNDED]→(애플). 엣지에는 방향과 라벨이 있다. 비유: 지하철 노선 — 역(노드) 사이를 잇는 노선(엣지).',
        focus: 'edge',
      },
      {
        title: 'Step 4. 다중 관계 — "1976년"까지 그래프로',
        desc: '"1976년"도 별도 노드(:Year)로 만들면 (잡스)-[:CO_FOUNDED]→(애플), (애플)-[:FOUNDED_IN]→(1976) 두 엣지가 생긴다. 한 문장에서 노드 3개 + 엣지 2개. GraphRAG는 이런 그래프를 텍스트 수만 문장에서 추출해 모은다.',
        focus: 'multi',
      },
    ];

    function NodeCircle({ cx, cy, label, name }) {
      const style = LABEL_STYLE[label] || { fill: '#94a3b8', stroke: '#475569' };
      return (
        <g style={{ transition: 'opacity 0.4s' }}>
          <circle cx={cx} cy={cy} r="44" fill={style.fill} stroke={style.stroke} strokeWidth="3" />
          <text x={cx} y={cy - 4} textAnchor="middle" fontSize="11" fontWeight="bold" fill="#fff">{name}</text>
          <text x={cx} y={cy + 12} textAnchor="middle" fontSize="9" fill="#fff" fillOpacity="0.85">:{label}</text>
        </g>
      );
    }

    function Edge({ x1, y1, x2, y2, label }) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const len = Math.sqrt(dx * dx + dy * dy);
      const ux = dx / len;
      const uy = dy / len;
      const sx = x1 + ux * 44;
      const sy = y1 + uy * 44;
      const ex = x2 - ux * 50;
      const ey = y2 - uy * 50;
      const mx = (sx + ex) / 2;
      const my = (sy + ey) / 2 - 8;
      return (
        <g style={{ transition: 'opacity 0.4s' }}>
          <line x1={sx} y1={sy} x2={ex} y2={ey} stroke="#475569" strokeWidth="2" markerEnd="url(#arrowHead)" />
          <rect x={mx - 50} y={my - 9} width="100" height="16" rx="3" fill="#fff" stroke="#cbd5e1" />
          <text x={mx} y={my + 3} textAnchor="middle" fontSize="10" fontWeight="bold" fill="#334155">:{label}</text>
        </g>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 3500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const focus = step.focus;

      // 그래프 노출 단계
      const showJobs = focus === 'nodes' || focus === 'edge' || focus === 'multi';
      const showApple = focus === 'nodes' || focus === 'edge' || focus === 'multi';
      const showYear = focus === 'multi';
      const showCofounded = focus === 'edge' || focus === 'multi';
      const showFoundedIn = focus === 'multi';

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">노드와 엣지</h1>
                <p className="text-sm text-slate-500 mt-1">지하철 노선도 — 역(노드) + 노선(엣지)으로 정보를 분해한다</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* 원본 텍스트 — 토큰 하이라이트 */}
            <div className="bg-white rounded-xl shadow-sm border-2 border-indigo-200 p-5 mb-6">
              <div className="text-[11px] font-bold text-slate-500 mb-2">원본 텍스트</div>
              <p className="text-base leading-relaxed">
                {TOKENS.map((t, i) => {
                  if (!t.type) return <span key={i} className="text-slate-700">{t.text}</span>;
                  const style = LABEL_STYLE[t.type];
                  const highlight = focus === 'text'
                    ? false
                    : (focus === 'nodes' && (t.type === 'Person' || t.type === 'Company'))
                      || (focus === 'edge' && (t.type === 'Person' || t.type === 'Company'))
                      || (focus === 'multi');
                  return (
                    <span
                      key={i}
                      className="inline-block px-1.5 py-0.5 rounded font-bold transition-all"
                      style={{
                        background: highlight ? style.fill : 'transparent',
                        color: highlight ? '#fff' : '#334155',
                        outline: highlight ? `2px solid ${style.stroke}` : 'none',
                      }}
                    >
                      {t.text}
                    </span>
                  );
                })}
              </p>
            </div>

            {/* SVG 그래프 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-6">
              <div className="text-[11px] font-bold text-slate-500 mb-2">Knowledge Graph 표현</div>
              <svg viewBox="0 0 800 280" className="w-full" style={{ maxHeight: '320px' }}>
                <defs>
                  <marker id="arrowHead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M0,0 L10,5 L0,10 z" fill="#475569" />
                  </marker>
                </defs>
                {/* 엣지 먼저 그려야 노드가 위로 */}
                {showCofounded && (
                  <Edge x1={170} y1={140} x2={500} y2={140} label="CO_FOUNDED" />
                )}
                {showFoundedIn && (
                  <Edge x1={500} y1={140} x2={680} y2={220} label="FOUNDED_IN" />
                )}
                {/* 노드 */}
                {showJobs && <NodeCircle cx={170} cy={140} label="Person" name="스티브 잡스" />}
                {showApple && <NodeCircle cx={500} cy={140} label="Company" name="애플" />}
                {showYear && <NodeCircle cx={680} cy={220} label="Year" name="1976" />}
                {!showJobs && !showApple && !showYear && (
                  <text x="400" y="140" textAnchor="middle" fontSize="14" fill="#94a3b8">
                    텍스트 분석 전 — 그래프 비어 있음
                  </text>
                )}
              </svg>
              <div className="grid grid-cols-3 gap-2 mt-3 text-[10px]">
                {Object.entries(LABEL_STYLE).map(([label, style]) => (
                  <div key={label} className="flex items-center gap-2">
                    <span className="w-3 h-3 rounded-full" style={{ background: style.fill, border: `2px solid ${style.stroke}` }} />
                    <span className="text-slate-600">:{label}</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
