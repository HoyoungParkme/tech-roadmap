<!DOCTYPE html>

<head>

  <title>GraphRAG 학습 — II-1-1. 노드와 엣지</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />

</head>
<body>
  <div id="root"></div>

  <!--
    II-1-1. 노드(Node)와 엣지(Edge) — 그래프 기본 단위
    학습 목표: 그래프 DB의 두 가지 원시 단위(노드 = 사물/개념, 엣지 = 관계)를 이해하고,
              방향성 / 다중 엣지 개념까지 5단계로 익혀 작은 KG를 직접 구성할 수 있다.
    핵심 비유: 지하철 노선도 — 역(노드) + 노선(엣지). 환승역에는 여러 노선이 모인다(다중 엣지).
    패턴: fastapi v1 — 좌(LiveDataPane: SVG 그래프) / 우(VSCode CodeViewer cypher)
    색상: graphrag violet
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 노드 라벨별 색상 — Tailwind purge 안전을 위해 정적 hex 매핑
    //   Person  = violet (보라)
    //   Company = amber  (주황/노랑)
    //   City    = teal   (청록)
    // ─────────────────────────────────────────────────────
    const LABEL_STYLE = {
      Person:  { fill: '#a78bfa', stroke: '#7c3aed', name: 'Person',  badge: 'bg-violet-100 text-violet-700' },
      Company: { fill: '#fbbf24', stroke: '#d97706', name: 'Company', badge: 'bg-amber-100 text-amber-700' },
      City:    { fill: '#2dd4bf', stroke: '#0d9488', name: 'City',    badge: 'bg-teal-100 text-teal-700' },
    };

    // ─────────────────────────────────────────────────────
    // 단계별 그래프 상태
    //   nodes : 표시할 노드 [{ id, label, name, x, y }]
    //   edges : 표시할 엣지 [{ from, to, type, directed, curve }]
    //     directed=true  → 화살표(WORKS_AT, FOUNDED_IN 등)
    //     directed=false → 양방향(LIVES_WITH, FRIEND 등)
    //     curve(선택)    → 다중 엣지 시 라인 휘어짐 (+1, -1)
    //   highlight : 강조할 요소 ('node:Alice', 'edge:Alice-WORKS_AT-Acme')
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. 노드(Node) — 사물/개념 한 덩어리',
        desc: '그래프의 가장 작은 단위는 "노드"다. 사람, 회사, 도시처럼 세상에 존재하는 사물/개념 하나가 노드 하나가 된다. 라벨(:Person)로 종류를 표시하고, 속성({name: "Alice"})으로 세부 정보를 담는다. 비유: 지하철 노선도의 역.',
        nodes: [
          { id: 'Alice', label: 'Person', name: 'Alice', x: 180, y: 150 },
          { id: 'Bob',   label: 'Person', name: 'Bob',   x: 380, y: 150 },
          { id: 'Acme',  label: 'Company', name: 'Acme', x: 580, y: 150 },
        ],
        edges: [],
        highlight: { nodes: ['Alice', 'Bob', 'Acme'], edges: [] },
        legend: '노드 3개. 아직 관계는 없다 — 각 노드는 독립적으로 떠 있다.',
        code: {
          lang: 'cypher',
          filename: 'nodes-edges.cypher',
          lines: [
            '// Step 1. 노드(Node) 만들기',
            '// 사물/개념 한 덩어리 = 노드 한 개',
            '',
            'CREATE (a:Person  {name: "Alice", age: 30});',
            'CREATE (b:Person  {name: "Bob",   age: 27});',
            'CREATE (c:Company {name: "Acme",  founded: 2010});',
            '',
            '// 문법 해설',
            '//   ( )         → 노드 표기',
            '//   :Person     → 라벨(분류)',
            '//   {name: ...} → 속성',
            '',
            '// 확인',
            'MATCH (n) RETURN n;',
            '// → Alice, Bob, Acme 세 점이 화면에 뜬다.',

          highlight: [4, 5, 6],
        },
      },
      {
        title: 'Step 2. 엣지(Edge) — 노드 사이를 잇는 관계',

        nodes: [
          { id: 'Alice', label: 'Person', name: 'Alice', x: 180, y: 150 },
          { id: 'Bob',   label: 'Person', name: 'Bob',   x: 380, y: 150 },
          { id: 'Acme',  label: 'Company', name: 'Acme', x: 580, y: 150 },
        ],
        edges: [
          { from: 'Alice', to: 'Acme', type: 'WORKS_AT', directed: true },
        ],
        highlight: { nodes: ['Alice', 'Acme'], edges: ['Alice-WORKS_AT-Acme'] },
        legend: '첫 엣지 등장. 노드 사이에 "관계"가 생겼다 — 이제 정보가 연결된다.',
        code: {
          lang: 'cypher',
          filename: 'create-relationship.cypher',
          lines: [
            '// Step 2. 엣지(Edge) — 두 노드 사이 관계',
            '// 문법: (from)-[:TYPE]->(to)',
            '',
            'MATCH (a:Person {name: "Alice"})',
            'MATCH (c:Company {name: "Acme"})',
            'CREATE (a)-[:WORKS_AT {since: 2020}]->(c);',
            '',
            '// 해설',
            '//   -[:WORKS_AT]->   → 화살표 + 관계 타입',
            '//   {since: 2020}    → 엣지에도 속성 가능',
            '',
            '// 확인 — Alice가 어디서 일하는가?',
            'MATCH (a:Person {name: "Alice"})-[:WORKS_AT]->(c)',

          ],
          highlight: [4, 5, 6, 13, 14],
        },
      },
      {
        title: 'Step 3. 방향성 — directed (->) vs undirected (-)',
        desc: '엣지는 방향이 있다. (Alice)-[:WORKS_AT]->(Acme)는 의미가 한쪽으로만 흐른다 — Acme가 Alice에서 일하는 것이 아니다. 반면 (Alice)-[:LIVES_WITH]-(Bob)처럼 양방향(대칭) 관계는 화살표 없이 표현한다. Cypher는 항상 저장은 directed지만 MATCH 시 `-[:R]-` 패턴으로 방향 무시도 가능.',
        nodes: [
          { id: 'Alice', label: 'Person',  name: 'Alice', x: 180, y: 130 },
          { id: 'Bob',   label: 'Person',  name: 'Bob',   x: 380, y: 130 },
          { id: 'Acme',  label: 'Company', name: 'Acme',  x: 580, y: 130 },
        ],
        edges: [
          { from: 'Alice', to: 'Acme', type: 'WORKS_AT', directed: true },
          { from: 'Alice', to: 'Bob',  type: 'LIVES_WITH', directed: false },
        ],
        highlight: { nodes: [], edges: ['Alice-WORKS_AT-Acme', 'Alice-LIVES_WITH-Bob'] },
        legend: '화살표(→)는 비대칭 관계. 양 끝 선(—)은 대칭 관계. 의미가 일방인지 쌍방인지로 결정.',
        code: {
          lang: 'cypher',
          filename: 'create-relationship.cypher',
          lines: [
            '// Step 3. 방향성 (directed vs undirected)',
            '',
            '// 비대칭 관계 — 화살표 의미가 명확',
            'MATCH (a:Person {name: "Alice"}), (c:Company {name: "Acme"})',
            'CREATE (a)-[:WORKS_AT]->(c);   // Alice → Acme',
            '',
            '// 대칭 관계 — 양쪽 다 의미가 같음',
            'MATCH (a:Person {name: "Alice"}), (b:Person {name: "Bob"})',
            'CREATE (a)-[:LIVES_WITH]->(b); // 저장은 한 방향이지만',
            '                               // 의미는 쌍방',
            '',
            '// 조회 시 방향 무시하기',
            'MATCH (a)-[:LIVES_WITH]-(b)    // 양방향 매칭',
            'WHERE a.name = "Alice"',
            'RETURN b.name;',
            '// → "Bob"  (저장된 방향과 무관)',
          ],
          highlight: [5, 9, 13],
        },
      },
      {
        title: 'Step 4. 다중 엣지 — 같은 두 노드 사이 여러 관계',
        desc: '두 노드 사이에 엣지가 하나만 있어야 할 이유는 없다. Alice와 Bob은 친구(:FRIEND)이면서 동시에 직장 동료(:CO_WORKER)일 수 있다. 그래프 DB는 같은 두 노드 쌍 사이에 서로 다른 타입의 엣지를 자유롭게 둔다. 비유: 환승역 — 한 역에 여러 노선이 모인다.',
        nodes: [
          { id: 'Alice', label: 'Person',  name: 'Alice', x: 180, y: 140 },
          { id: 'Bob',   label: 'Person',  name: 'Bob',   x: 380, y: 140 },
          { id: 'Acme',  label: 'Company', name: 'Acme',  x: 580, y: 140 },
        ],
        edges: [
          { from: 'Alice', to: 'Acme', type: 'WORKS_AT',  directed: true },
          { from: 'Alice', to: 'Bob',  type: 'FRIEND',    directed: false, curve: -1 },
          { from: 'Alice', to: 'Bob',  type: 'CO_WORKER', directed: false, curve: 1 },
        ],
        highlight: { nodes: ['Alice', 'Bob'], edges: ['Alice-FRIEND-Bob', 'Alice-CO_WORKER-Bob'] },
        legend: 'Alice—Bob 사이 두 개의 엣지. FRIEND(개인)와 CO_WORKER(업무) — 다른 의미는 다른 엣지로.',
        code: {
          lang: 'cypher',
          filename: 'create-relationship.cypher',
          lines: [
            '// Step 4. 다중 엣지 (multi-edge)',
            '// 같은 두 노드 사이에 서로 다른 타입의 관계 OK',
            '',
            'MATCH (a:Person {name: "Alice"}), (b:Person {name: "Bob"})',
            'CREATE (a)-[:FRIEND    {since: 2015}]->(b),',
            '       (a)-[:CO_WORKER {team: "data"}]->(b);',
            '',
            '// 둘 사이 모든 관계 한 번에 보기',
            'MATCH (a:Person {name: "Alice"})-[r]->(b:Person {name: "Bob"})',
            'RETURN type(r), r;',
            '// → FRIEND     {since: 2015}',
            '// → CO_WORKER  {team: "data"}',
            '',
            '// 의미 분리 원칙',
            '//   같은 두 사람도 "친구로서"와 "동료로서" 맥락이 다름',
            '//   → 엣지 타입을 합치지 말고 분리',
          ],
          highlight: [5, 6, 9, 10],
        },
      },
      {
        title: 'Step 5. 작은 KG 예시 — 5 노드 + 7 엣지',
        desc: '지금까지 배운 노드/엣지/방향성/다중 엣지를 모아 작은 Knowledge Graph 한 장을 그린다. 사람 3명(Alice/Bob/Carol) + 회사 2곳(Acme/Beta) + 도시(Seoul) → 노드 5개. WORKS_AT 3개, LIVES_IN 2개, FRIEND 1개, CO_WORKER 1개 → 엣지 7개. 이게 GraphRAG가 텍스트 코퍼스에서 추출해내는 결과물의 가장 작은 형태다.',
        nodes: [
          { id: 'Alice',  label: 'Person',  name: 'Alice', x: 130, y: 90 },
          { id: 'Bob',    label: 'Person',  name: 'Bob',   x: 130, y: 230 },
          { id: 'Carol',  label: 'Person',  name: 'Carol', x: 410, y: 50 },
          { id: 'Acme',   label: 'Company', name: 'Acme',  x: 410, y: 200 },
          { id: 'Beta',   label: 'Company', name: 'Beta',  x: 670, y: 90 },
          { id: 'Seoul',  label: 'City',    name: 'Seoul', x: 670, y: 230 },
        ],
        edges: [
          { from: 'Alice', to: 'Acme',  type: 'WORKS_AT',  directed: true },
          { from: 'Bob',   to: 'Acme',  type: 'WORKS_AT',  directed: true },
          { from: 'Carol', to: 'Beta',  type: 'WORKS_AT',  directed: true },
          { from: 'Alice', to: 'Bob',   type: 'FRIEND',    directed: false, curve: -1 },
          { from: 'Alice', to: 'Bob',   type: 'CO_WORKER', directed: false, curve: 1 },
          { from: 'Alice', to: 'Seoul', type: 'LIVES_IN',  directed: true },
          { from: 'Bob',   to: 'Seoul', type: 'LIVES_IN',  directed: true },
        ],
        highlight: { nodes: [], edges: [] },
        legend: '5 노드 + 7 엣지. 사람 3 + 회사 2 + 도시 1. WORKS_AT 3 / LIVES_IN 2 / FRIEND 1 / CO_WORKER 1.',
        code: {
          lang: 'cypher',
          filename: 'nodes-edges.cypher',
          lines: [
            '// Step 5. 작은 KG — 사람 3 + 회사 2 + 도시 1',
            '// 노드 5개 + 엣지 7개로 한 회사 단면을 표현',
            '',
            '// (1) 노드 6개 한꺼번에 생성',
            'CREATE (alice:Person  {name: "Alice"}),',
            '       (bob:Person    {name: "Bob"}),',
            '       (carol:Person  {name: "Carol"}),',
            '       (acme:Company  {name: "Acme"}),',
            '       (beta:Company  {name: "Beta"}),',
            '       (seoul:City    {name: "Seoul"}),',
            '',
            '// (2) 엣지 7개',
            '       (alice)-[:WORKS_AT]->(acme),',
            '       (bob)-[:WORKS_AT]->(acme),',
            '       (carol)-[:WORKS_AT]->(beta),',
            '       (alice)-[:FRIEND]->(bob),',
            '       (alice)-[:CO_WORKER]->(bob),',
            '       (alice)-[:LIVES_IN]->(seoul),',
            '       (bob)-[:LIVES_IN]->(seoul);',
            '',
            '// (3) 검증 — Acme에서 일하는 Seoul 거주자 찾기',
            'MATCH (p:Person)-[:WORKS_AT]->(c:Company {name: "Acme"})',
            'MATCH (p)-[:LIVES_IN]->(:City {name: "Seoul"})',
            'RETURN p.name;',
            '// → "Alice", "Bob"',
          ],
          highlight: [13, 14, 15, 16, 17, 18, 19, 22, 23, 24],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // Node 컴포넌트 — SVG 원 + 라벨
    // ─────────────────────────────────────────────────────
    function GraphNode({ node, highlighted }) {
      const style = LABEL_STYLE[node.label] || { fill: '#94a3b8', stroke: '#475569' };
      const r = 38;
      return (
        <g style={{ transition: 'all 0.5s ease' }}>
          {highlighted && (
            <circle
              cx={node.x}
              cy={node.y}
              r={r + 6}
              fill="none"
              stroke={style.stroke}
              strokeWidth="3"
              strokeDasharray="4 3"
              opacity="0.7"
            >
              <animate attributeName="r" values={`${r + 4};${r + 9};${r + 4}`} dur="1.6s" repeatCount="indefinite" />
            </circle>
          )}
          <circle
            cx={node.x}
            cy={node.y}
            r={r}
            fill={style.fill}
            stroke={style.stroke}
            strokeWidth="3"
          />
          <text
            x={node.x}
            y={node.y - 2}
            textAnchor="middle"
            fontSize="12"
            fontWeight="bold"
            fill="#fff"
            style={{ pointerEvents: 'none' }}
          >
            {node.name}
          </text>
          <text
            x={node.x}
            y={node.y + 13}
            textAnchor="middle"
            fontSize="9"
            fill="#fff"
            fillOpacity="0.85"
            style={{ pointerEvents: 'none' }}
          >
            :{node.label}
          </text>
        </g>
      );
    }

    // ─────────────────────────────────────────────────────
    // Edge 컴포넌트 — 직선 또는 휜 곡선 + 라벨
    //   directed=true : 화살표
    //   directed=false: 양 끝 점선
    //   curve         : -1(위) / +1(아래)로 같은 두 노드 사이 다중 엣지 분리
    // ─────────────────────────────────────────────────────
    function GraphEdge({ edge, nodeMap, highlighted }) {
      const a = nodeMap[edge.from];
      const b = nodeMap[edge.to];
      if (!a || !b) return null;

      const r = 38;
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;
      const ux = dx / len;
      const uy = dy / len;
      const sx = a.x + ux * r;
      const sy = a.y + uy * r;
      const ex = b.x - ux * r;
      const ey = b.y - uy * r;

      // 곡선 처리 (다중 엣지 분리용)
      const curve = edge.curve || 0;
      const mx = (sx + ex) / 2;
      const my = (sy + ey) / 2;
      // 수직 방향 벡터 (선에 직각)
      const px = -uy;
      const py = ux;
      const offset = curve * 36;
      const cx = mx + px * offset;
      const cy = my + py * offset;

      const path = curve === 0
        ? `M ${sx} ${sy} L ${ex} ${ey}`
        : `M ${sx} ${sy} Q ${cx} ${cy}, ${ex} ${ey}`;

      // 라벨 위치
      const labelX = curve === 0 ? mx : cx;
      const labelY = curve === 0 ? my - 8 : cy;
      const labelW = Math.max(60, edge.type.length * 7 + 14);

      const stroke = highlighted ? '#7c3aed' : '#64748b';
      const strokeW = highlighted ? 3 : 2;
      const labelBg = highlighted ? '#ede9fe' : '#fff';
      const labelStroke = highlighted ? '#a78bfa' : '#cbd5e1';
      const labelText = highlighted ? '#5b21b6' : '#334155';

      return (
        <g style={{ transition: 'all 0.4s ease' }}>
          <path
            d={path}
            fill="none"
            stroke={stroke}
            strokeWidth={strokeW}
            strokeDasharray={edge.directed ? 'none' : '6 4'}
            markerEnd={edge.directed ? (highlighted ? 'url(#arrowHi)' : 'url(#arrow)') : undefined}
          />
          <rect
            x={labelX - labelW / 2}
            y={labelY - 9}
            width={labelW}
            height={16}
            rx={3}
            fill={labelBg}
            stroke={labelStroke}
            strokeWidth="1"
          />
          <text
            x={labelX}
            y={labelY + 3}
            textAnchor="middle"
            fontSize="10"
            fontWeight="bold"
            fill={labelText}
            style={{ pointerEvents: 'none' }}
          >
            :{edge.type}
          </text>
        </g>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 그래프 캔버스
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step, stepIdx }) {
      const { nodes, edges, highlight, legend } = step;
      const nodeMap = {};
      nodes.forEach((n) => { nodeMap[n.id] = n; });

      const isNodeHi = (id) => highlight && highlight.nodes && highlight.nodes.includes(id);
      const edgeKey = (e) => `${e.from}-${e.type}-${e.to}`;
      const isEdgeHi = (e) => highlight && highlight.edges && highlight.edges.includes(edgeKey(e));

      // 라벨별 노드/엣지 카운트 (요약 표시용)
      const labelCount = {};
      nodes.forEach((n) => { labelCount[n.label] = (labelCount[n.label] || 0) + 1; });
      const typeCount = {};
      edges.forEach((e) => { typeCount[e.type] = (typeCount[e.type] || 0) + 1; });

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🚇 Knowledge Graph 캔버스</h2>
            <span className="text-[10px] text-slate-400 font-mono">
              nodes {nodes.length} · edges {edges.length}
            </span>
          </div>

          {/* SVG 그래프 */}
          <div className="bg-slate-50 rounded-lg border border-slate-200 overflow-hidden">
            <svg viewBox="0 0 800 300" className="w-full" style={{ minHeight: '260px', maxHeight: '320px' }}>
              <defs>
                <marker
                  id="arrow"
                  viewBox="0 0 10 10"
                  refX="9"
                  refY="5"
                  markerWidth="6"
                  markerHeight="6"
                  orient="auto-start-reverse"
                >
                  <path d="M0,0 L10,5 L0,10 z" fill="#64748b" />
                </marker>
                <marker
                  id="arrowHi"
                  viewBox="0 0 10 10"
                  refX="9"
                  refY="5"
                  markerWidth="7"
                  markerHeight="7"
                  orient="auto-start-reverse"
                >
                  <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed" />
                </marker>
              </defs>

              {/* 빈 그래프 placeholder */}
              {nodes.length === 0 && (
                <text x="400" y="150" textAnchor="middle" fontSize="14" fill="#94a3b8">
                  텍스트 분석 전 — 그래프 비어 있음
                </text>
              )}

              {/* 엣지를 먼저 그려야 노드가 위로 올라옴 */}
              {edges.map((e) => (
                <GraphEdge
                  key={edgeKey(e)}
                  edge={e}
                  nodeMap={nodeMap}
                  highlighted={isEdgeHi(e)}
                />
              ))}
              {nodes.map((n) => (
                <GraphNode key={n.id} node={n} highlighted={isNodeHi(n.id)} />
              ))}
            </svg>
          </div>

          {/* 요약 라벨 / 타입 카운트 */}
          <div className="mt-4 grid grid-cols-2 gap-3 text-[11px]">
            <div className="rounded-lg bg-slate-50 border border-slate-200 p-2">
              <div className="font-bold text-slate-600 mb-1.5">노드 라벨</div>
              <div className="flex flex-wrap gap-1.5">
                {Object.entries(LABEL_STYLE).map(([label, style]) => (
                  <span
                    key={label}
                    className={`flex items-center gap-1 px-2 py-0.5 rounded ${style.badge}`}
                  >
                    <span
                      className="w-2 h-2 rounded-full"
                      style={{ background: style.fill, border: `1.5px solid ${style.stroke}` }}
                    />
                    :{label} <span className="font-mono">×{labelCount[label] || 0}</span>
                  </span>
                ))}
              </div>
            </div>
            <div className="rounded-lg bg-slate-50 border border-slate-200 p-2">
              <div className="font-bold text-slate-600 mb-1.5">엣지 타입</div>
              <div className="flex flex-wrap gap-1.5">
                {Object.keys(typeCount).length === 0 ? (
                  <span className="text-slate-400">없음</span>
                ) : (
                  Object.entries(typeCount).map(([type, n]) => (
                    <span
                      key={type}
                      className="px-2 py-0.5 rounded bg-violet-100 text-violet-700 font-mono"
                    >
                      :{type} ×{n}
                    </span>
                  ))
                )}
              </div>
            </div>
          </div>

          {/* legend / 단계별 한 줄 메모 */}
          <div className="mt-3 text-[11px] text-slate-600 bg-violet-50 border border-violet-200 rounded-lg px-3 py-2">
            <span className="font-bold text-violet-700">메모 · </span>{legend}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js (cypher 우선)
    //   Tip: highlight.js core가 cypher를 기본 지원하지 않을 수 있다.
    //   안전하게 fallback 처리: 토큰 강조는 키워드 기반 정규식으로 추가 보강.
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        codeRef.current.removeAttribute('data-highlighted');
        // cypher가 미지원이면 sql 문법으로 fallback (CREATE/MATCH/RETURN 키워드 매칭됨)
        const lang = window.hljs.getLanguage(code.lang) ? code.lang : 'sql';
        codeRef.current.className = `language-${lang}`;
        try {
          window.hljs.highlightElement(codeRef.current);
        } catch (e) {
          // 무시 — plain text fallback
        }
      }, [code]);

      useEffect(() => {
        if (!codeRef.current) return;
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일명 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-300 ml-2 font-mono bg-[#282c34] px-2 py-0.5 rounded-t border-t border-l border-r border-slate-700 -mb-2">
              {code.filename}
            </span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code (innerHTML 추출) */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>
              {code.lines.join('\n')}
            </code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-violet-500/10 border-l-2 border-violet-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 — 라인 수 + 단계 번호 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · cypher</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컴포넌트
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      // 자동재생 3000ms
      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-violet-700 hover:text-violet-900 font-medium">
                &larr; 허브로
              </a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">
                curriculum II-1-1
              </span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">
                  II
                </div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">
                    Part II. 그래프 기초 &gt; Chapter 1. 노드와 엣지
                  </div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">노드와 엣지 (Node &amp; Edge)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">
                    지하철 노선도 — 역(노드) + 노선(엣지). 그래프 DB의 두 가지 원시 단위.
                  </p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 다음 자료 안내 */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 text-sm text-violet-900">
                💡 다음(II-1-2)에서는 <strong>속성 그래프(Property Graph)</strong> — 노드/엣지에 자유로운 key-value 속성을 붙이는 방법
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-violet-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-violet-600 text-white hover:bg-violet-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 하단 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./II-1-2.html" className="text-violet-700 hover:text-violet-900 font-medium">
                II-1-2 속성 그래프 &rarr;
              </a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
