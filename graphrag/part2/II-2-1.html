    // 클래스 계층 트리 (재귀 렌더, highlightClasses는 배경 강조)
    function ClassTreeNode({ node, depth, highlightClasses }) {
      const isHighlighted = highlightClasses && highlightClasses.includes(node.name);
      return (
        <div className="relative">
          <div className="flex items-center gap-1" style={{ marginLeft: depth * 14 }}>
            {depth > 0 && <span className="text-violet-400 select-none">└▸</span>}
            <div
              className={`rounded-md px-2 py-1 border text-[11px] font-mono font-bold transition-all duration-500 ${
                isHighlighted
                  ? 'bg-violet-200 border-violet-500 text-violet-900 shadow-sm'
                  : 'bg-violet-50 border-violet-200 text-violet-700'
              }`}
            >
              :{node.name}
            </div>
          </div>
          {node.children && node.children.length > 0 && (
            <div className="mt-1 space-y-1">
              {node.children.map((child) => (
                <ClassTreeNode
                  key={child.name}
                  node={child}
                  depth={depth + 1}
                  highlightClasses={highlightClasses}
                />
              ))}
            </div>
          )}
        </div>
      );
    }

    function ClassTreePane({ tree, highlightClasses, ontologyDefined }) {
      if (!ontologyDefined || !tree) {
        return (
          <div className="bg-rose-50 border-2 border-rose-300 rounded-lg p-3 h-full flex flex-col items-center justify-center text-center">
            <div className="text-3xl mb-2">❓</div>
            <div className="text-xs font-bold text-rose-700 mb-1">온톨로지 없음</div>
            <div className="text-[10px] text-rose-600 leading-relaxed px-2">
              클래스 정의 X<br />
              아무 라벨이나 등장
            </div>
          </div>
        );
      }
      return (
        <div className="bg-violet-50 border border-violet-200 rounded-lg p-2 h-full overflow-auto">
          <div className="text-[10px] font-bold text-violet-700 mb-2 flex items-center gap-1">
            🌳 클래스 계층
          </div>
          <div className="space-y-1">
            <ClassTreeNode node={tree} depth={0} highlightClasses={highlightClasses} />
          </div>
        </div>
      );
    }

    // 인스턴스 그래프 SVG — 노드 + 엣지 (정상/위반/추론)
    function InstanceGraphSvg({ instances, edges, showViolation, showInference, hasDomainRange }) {
      const svgW = 560;
      const svgH = 290;

      // 노드 ID로 인스턴스 찾기
      const findById = (id) => instances.find((n) => n.id === id);

      const NODE_W = 110;
      const NODE_H = 44;

      return (
        <svg viewBox={`0 0 ${svgW} ${svgH}`} className="w-full h-auto">
          {/* SVG 화살표 마커 (정상 violet / 위반 red / 추론 emerald) */}
          <defs>
            {[
              { id: 'arrow-violet',  fill: '#7c3aed' },
              { id: 'arrow-red',     fill: '#dc2626' },
              { id: 'arrow-emerald', fill: '#059669' },
            ].map((m) => (
              <marker key={m.id} id={m.id} viewBox="0 0 10 10" refX="9" refY="5"
                      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill={m.fill} />
              </marker>
            ))}
          </defs>

          {/* 엣지 먼저 (노드 뒤에 깔리도록) */}
          {edges.map((edge, idx) => {
            const from = findById(edge.from);
            const to = findById(edge.to);
            if (!from || !to) return null;

            // 노드 중심 좌표 + 박스 가장자리에서 시작/끝
            const fromCx = from.x + NODE_W / 2;
            const fromCy = from.y + NODE_H / 2;
            const toCx = to.x + NODE_W / 2;
            const toCy = to.y + NODE_H / 2;

            // 단순화: 박스 가장자리 근사 (수평 우선)
            const dx = toCx - fromCx;
            const dy = toCy - fromCy;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);
            let x1 = fromCx, y1 = fromCy, x2 = toCx, y2 = toCy;
            if (absDx > absDy) {
              const sign = dx > 0 ? 1 : -1;
              x1 = fromCx + (NODE_W / 2) * sign;
              x2 = toCx - (NODE_W / 2) * sign;
            } else {
              const sign = dy > 0 ? 1 : -1;
              y1 = fromCy + (NODE_H / 2) * sign;
              y2 = toCy - (NODE_H / 2) * sign;
            }

            // 색상 / 스타일 결정
            let stroke = '#7c3aed';
            let marker = 'url(#arrow-violet)';
            let strokeDasharray = 'none';
            let labelBg = '#ede9fe';
            let labelText = '#6d28d9';

            if (edge.ok === false) {
              stroke = '#dc2626';
              marker = 'url(#arrow-red)';
              labelBg = '#fee2e2';
              labelText = '#991b1b';
            } else if (edge.isInferred) {
              stroke = '#059669';
              marker = 'url(#arrow-emerald)';
              strokeDasharray = '6 4';
              labelBg = '#d1fae5';
              labelText = '#065f46';
            }

            // 라벨 위치 (선 중앙)
            const labelX = (x1 + x2) / 2;
            const labelY = (y1 + y2) / 2;
            const labelW = Math.max(70, edge.type.length * 7 + 10);

            return (
              <g key={`edge-${idx}`}>
                <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={stroke}
                      strokeWidth={edge.ok === false ? 2.5 : 2}
                      strokeDasharray={strokeDasharray} markerEnd={marker}
                      className="transition-all duration-700" />
                {/* 라벨 박스 */}
                <rect x={labelX - labelW / 2} y={labelY - 9} width={labelW} height={18}
                      rx={4} fill={labelBg} stroke={stroke} strokeWidth={1} />
                <text x={labelX} y={labelY + 4} textAnchor="middle" fontSize={10}
                      fontFamily="monospace" fontWeight="bold" fill={labelText}>
                  {edge.isInferred ? '⤳ ' : ''}:{edge.type}
                </text>

                {/* 위반 시 빨간 X 표시 (선 중앙 위쪽) */}
                {showViolation && edge.ok === false && (
                  <g>
                    <circle cx={labelX} cy={labelY - 24} r={11} fill="#dc2626" stroke="#7f1d1d" strokeWidth={1.5} />
                    <text x={labelX} y={labelY - 20} textAnchor="middle" fontSize={14} fontWeight="bold" fill="#ffffff">✗</text>
                  </g>
                )}
              </g>
            );
          })}

          {/* 노드 — mixed(Step1)는 색상 직접, typed는 NODE_COLOR 매핑 */}
          {instances.map((node) => {
            const isMixed = node.kind === 'mixed';
            const fill = isMixed ? node.mixedColor : (NODE_COLOR[node.color] || NODE_COLOR.violet).fill;
            const stroke = isMixed ? '#1e293b' : (NODE_COLOR[node.color] || NODE_COLOR.violet).stroke;
            const inferred = showInference && node.inferredLabels;
            return (
              <g key={node.id}>
                <rect x={node.x} y={node.y} width={NODE_W} height={NODE_H} rx={8}
                      fill={fill} stroke={stroke} strokeWidth={isMixed ? 1 : 2}
                      opacity={isMixed ? 0.85 : 1} className="transition-all duration-500" />
                <text x={node.x + NODE_W / 2} y={node.y + 16} textAnchor="middle"
                      fontSize={9} fontFamily="monospace" fontWeight="bold" fill="#ffffff">
                  :{node.label}
                </text>
                <text x={node.x + NODE_W / 2} y={node.y + 32} textAnchor="middle"
                      fontSize={11} fontWeight="bold" fill="#ffffff">
                  {node.name}
                </text>
                {/* 추론된 상위 라벨 */}
                {inferred && (
                  <text x={node.x + NODE_W / 2} y={node.y + NODE_H + 12} textAnchor="middle"
                        fontSize={9} fontFamily="monospace" fill="#059669" fontWeight="bold">
                    ⤳ :{node.inferredLabels.join(', :')}
                  </text>
                )}
              </g>
            );
          })}
        </svg>
      );
    }

    // LiveDataPane — 좌(클래스 트리) / 우(인스턴스 그래프)
    function LiveDataPane({ step }) {
      const totalNodes = step.instances.length;
      const distinctLabels = new Set(step.instances.map((n) => n.label)).size;
      const totalEdges = step.edges.length;
      const violationCount = step.edges.filter((e) => e.ok === false).length;
      const inferredCount = step.edges.filter((e) => e.isInferred).length;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 도메인 온톨로지 — 클래스 ↔ 인스턴스</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 요약 카운트 */}
          <div className="grid grid-cols-4 gap-2 mb-3">
            <div className="rounded-lg bg-violet-50 border border-violet-300 p-2 text-center">
              <div className="text-[9px] text-violet-700 font-bold uppercase">Nodes</div>
              <div className="text-lg font-extrabold text-violet-700 tabular-nums">{totalNodes}</div>
            </div>
            <div className="rounded-lg bg-slate-50 border border-slate-300 p-2 text-center">
              <div className="text-[9px] text-slate-600 font-bold uppercase">Labels</div>
              <div className="text-lg font-extrabold text-slate-700 tabular-nums">
                {distinctLabels}
                {!step.ontologyDefined && (
                  <span className="text-[9px] text-rose-600 ml-0.5">⚠</span>
                )}
              </div>
            </div>
            <div className="rounded-lg bg-slate-50 border border-slate-300 p-2 text-center">
              <div className="text-[9px] text-slate-600 font-bold uppercase">Edges</div>
              <div className="text-lg font-extrabold text-slate-700 tabular-nums">{totalEdges}</div>
            </div>
            <div className="rounded-lg bg-slate-50 border border-slate-300 p-2 text-center">
              <div className="text-[9px] text-slate-600 font-bold uppercase">
                {step.showViolation ? 'Violation' : (step.showInference ? 'Inferred' : 'Status')}
              </div>
              <div className={`text-lg font-extrabold tabular-nums ${
                violationCount > 0 ? 'text-red-600' :
                inferredCount > 0 ? 'text-emerald-600' : 'text-slate-700'
              }`}>
                {step.showViolation
                  ? violationCount
                  : step.showInference
                    ? inferredCount
                    : (step.ontologyDefined ? '✓' : '?')}
              </div>
            </div>
          </div>

          {/* 좌(트리) / 우(그래프) 분할 — 트리는 너비 비율 작게 */}
          <div className="grid grid-cols-5 gap-2 mb-3">
            {/* 좌측: 클래스 계층 트리 */}
            <div className="col-span-2 min-h-[290px]">
              <ClassTreePane
                tree={step.classTree}
                highlightClasses={step.highlightClasses}
                ontologyDefined={step.ontologyDefined}
              />
            </div>
            {/* 우측: 인스턴스 그래프 SVG */}
            <div className="col-span-3 rounded-lg bg-gradient-to-br from-violet-50 via-white to-amber-50 border border-violet-200 p-1">
              <InstanceGraphSvg
                instances={step.instances}
                edges={step.edges}
                showViolation={step.showViolation}
                showInference={step.showInference}
                hasDomainRange={step.hasDomainRange}
              />
            </div>
          </div>

          {/* 단계별 상태 배너 */}
          {!step.ontologyDefined && (
            <div className="p-2.5 rounded-lg bg-rose-50 border-2 border-rose-300 text-rose-800 text-xs font-bold animate-pulse mb-2">
              ⚠ 라벨 표준 없음 — 같은 인물이 {distinctLabels}개 라벨로 분리됨
            </div>
          )}
          {step.ontologyDefined && !step.hasDomainRange && (
            <div className="p-2.5 rounded-lg bg-violet-50 border-2 border-violet-300 text-violet-900 text-xs font-bold mb-2">
              📜 클래스 계층 정의됨 — 다음: 관계의 domain/range 선언
            </div>
          )}
          {step.hasDomainRange && !step.showViolation && !step.showInference && (
            <div className="p-2.5 rounded-lg bg-violet-50 border-2 border-violet-300 text-violet-900 text-xs font-bold mb-2">
              ✅ WORKS_AT: Person → Company — 도메인/레인지 적용
            </div>
          )}
          {step.showViolation && (
            <div className="p-2.5 rounded-lg bg-red-50 border-2 border-red-400 text-red-800 text-xs font-bold animate-pulse mb-2">
              🚨 위반 검출 — Company → WORKS_AT → City (domain은 Person이어야 함) → 적재 거부
            </div>
          )}
          {step.showInference && (
            <div className="p-2.5 rounded-lg bg-emerald-50 border-2 border-emerald-400 text-emerald-900 text-xs font-bold mb-2">
              💡 추론 활성 — Employee → Person/Entity 자동 부여, EMPLOYS 역관계 자동 생성 (점선)
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm" style={{ background: '#8b5cf6' }}></span>Person 계열
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm" style={{ background: '#f59e0b' }}></span>Company 계열
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-0.5" style={{ background: '#7c3aed' }}></span>정상 관계
            </span>
            {step.showInference && (
              <span className="flex items-center gap-1">
                <span className="w-3 border-t-2 border-dashed" style={{ borderColor: '#059669' }}></span>추론 관계
              </span>
            )}
            {step.showViolation && (
              <span className="flex items-center gap-1 ml-auto">
                <span className="w-2.5 h-2.5 rounded-full bg-red-600 text-white text-[8px] flex items-center justify-center font-bold">✗</span>위반
              </span>
            )}
          </div>
        </div>
      );
    }

    // VSCode 스타일 CodeViewer — highlight.js
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-violet-500/15 border-l-2 border-violet-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // App 메인
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-violet-700 hover:text-violet-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 그래프 인덱싱 &gt; Chapter 2. 도메인 모델링</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">온톨로지 — 도메인 스키마 (클래스/관계 정의)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">조직의 직무 사양서 — 라벨 표준 + 관계 도메인/레인지 + 일관성 검증 + 추론</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 text-sm text-violet-900">
                💡 다음(II-2-2)에서는 <strong>스키마 vs 자유 그래프</strong> — 사양서 강제 정도와 유연성의 trade-off
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-violet-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={handleReset} disabled={stepIdx === 0 && !isPlaying} aria-label="처음으로"
                      className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={handlePrev} disabled={stepIdx === 0} aria-label="이전 단계"
                      className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                      className="px-4 py-1.5 rounded-lg text-sm font-bold bg-violet-600 text-white hover:bg-violet-700 transition min-w-[100px]">
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1} aria-label="다음 단계"
                      className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./II-2-2.html" className="text-violet-700 hover:text-violet-900 font-medium">II-2-2 스키마 vs 자유 그래프 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
