<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — 온톨로지</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    II-2-1. 온톨로지(Ontology)
    학습 목표: 도메인의 어휘와 관계 규칙을 정의하는 온톨로지의 역할을 안다.
    핵심 비유: "쇼핑몰 카테고리 사양서" — 어떤 라벨/관계가 허용되는지 미리 정의
    구조: 4단계 (자유 입력 혼란 / 사양서 표준화 / 계층 구조 / 실전 도메인)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 자유 입력의 혼란 — 같은 의미 다른 라벨
    // 색상은 임의 hex (Tailwind 정적 클래스로 5색 표현 어려워 style prop 예외 허용)
    const CHAOTIC_LABELS = [
      { label: 'Person',   color: '#a78bfa' },
      { label: 'person',   color: '#c4b5fd' },
      { label: 'User',     color: '#a5b4fc' },
      { label: 'Customer', color: '#93c5fd' },
      { label: 'Member',   color: '#86efac' },
    ];

    // 표준 온톨로지
    const STANDARD = {
      entities: [
        { name: 'Person',   desc: '사람' },
        { name: 'Company',  desc: '회사/조직' },
        { name: 'Product',  desc: '상품/서비스' },
      ],
      relations: [
        { name: 'WORKS_AT', from: 'Person',  to: 'Company' },
        { name: 'BUYS',     from: 'Person',  to: 'Product' },
        { name: 'SELLS',    from: 'Company', to: 'Product' },
      ],
    };

    // 계층 구조
    const HIERARCHY = [
      { level: 0, label: 'Animal',  desc: '동물 — 최상위' },
      { level: 1, label: 'Mammal',  desc: '포유류 — Animal 하위' },
      { level: 2, label: 'Person',  desc: '사람 — Mammal 하위 (잡스도 사람이다)' },
    ];

    // 실전 도메인 온톨로지
    const REAL_WORLD = [
      { name: 'SNOMED-CT', domain: '의료',   note: '질병/증상/약물 30만+ 용어 표준화' },
      { name: 'Schema.org', domain: '웹',     note: 'Google/Microsoft 등 공동 운영. 검색엔진이 이해하는 어휘' },
      { name: 'FOAF',      domain: '소셜',   note: 'Friend Of A Friend — 사람/관계 표준' },
      { name: 'GO',         domain: '생물학', note: 'Gene Ontology — 유전자 기능 분류' },
    ];

    const STEPS = [
      {
        title: 'Step 1. 자유 입력의 혼란',
        desc: '여러 사람이 텍스트에서 그래프를 만들면 같은 의미가 라벨이 제각각이 된다. (:Person), (:person), (:User), (:Customer), (:Member) — 모두 "사람"인데 다섯 개 노드로 분리된다. 검색·집계가 다 깨진다.',
        focus: 'chaos',
      },
      {
        title: 'Step 2. 온톨로지 = 사양서',
        desc: '온톨로지는 "이 도메인에서 허용되는 라벨과 관계"의 표준 사양서다. 쇼핑몰 카테고리 사양처럼: 라벨 = {Person, Company, Product}, 관계 = {WORKS_AT, BUYS, SELLS}. 모든 파이프라인이 이 어휘만 쓰면 일관성이 보장된다.',
        focus: 'spec',
      },
      {
        title: 'Step 3. 계층 구조 — 추론의 시작',
        desc: '온톨로지는 라벨 사이의 상하 관계도 정의한다. Person ⊂ Mammal ⊂ Animal. 그러면 "잡스는 사람이다" → "잡스는 동물이다"가 자동 추론된다. SNOMED-CT처럼 의료 분류는 수만 단계 깊이.',
        focus: 'hierarchy',
      },
      {
        title: 'Step 4. 실전 — 표준 도메인 온톨로지',
        desc: '실무에서는 처음부터 만들지 않고 표준을 빌려 쓴다. 의료 SNOMED-CT, 웹 Schema.org, 생물학 Gene Ontology. LLM에 온톨로지를 프롬프트로 주면 엔티티 추출이 일관된다 — GraphRAG 인덱싱 품질의 핵심.',
        focus: 'real',
      },
    ];

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 3500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const focus = step.focus;

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">온톨로지(Ontology)</h1>
                <p className="text-sm text-slate-500 mt-1">쇼핑몰 카테고리 사양서 — 도메인의 어휘/관계 규칙을 표준화</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* Step 1: 자유 입력의 혼란 */}
            {focus === 'chaos' && (
              <div className="bg-white rounded-xl shadow-sm border-2 border-rose-300 p-5 mb-6">
                <div className="text-xs font-bold text-rose-700 mb-3">⚠ 같은 의미 ≠ 같은 라벨</div>
                <div className="flex flex-wrap gap-3">
                  {CHAOTIC_LABELS.map((c) => (
                    <div
                      key={c.label}
                      className="rounded-full px-4 py-2 text-white font-bold text-sm shadow"
                      style={{ background: c.color }}
                    >
                      :{c.label}
                    </div>
                  ))}
                </div>
                <div className="text-[11px] text-slate-500 mt-3">→ 검색 / 집계 / 추론 모두 깨짐 — 같은 사람이 5개 노드로 분리</div>
              </div>
            )}

            {/* Step 2: 온톨로지 사양서 */}
            {focus === 'spec' && (
              <div className="bg-white rounded-xl shadow-sm border-2 border-indigo-300 p-5 mb-6">
                <div className="text-xs font-bold text-indigo-700 mb-3">📜 도메인 온톨로지 사양서</div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                    <div className="text-[11px] font-bold text-slate-700 mb-2">허용 라벨 (엔티티)</div>
                    <div className="space-y-1.5">
                      {STANDARD.entities.map((e) => (
                        <div key={e.name} className="flex items-baseline gap-2 bg-indigo-50 rounded px-2 py-1.5">
                          <span className="font-mono text-xs font-bold text-indigo-800">:{e.name}</span>
                          <span className="text-[11px] text-slate-600">{e.desc}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div>
                    <div className="text-[11px] font-bold text-slate-700 mb-2">허용 관계</div>
                    <div className="space-y-1.5">
                      {STANDARD.relations.map((r) => (
                        <div key={r.name} className="bg-amber-50 rounded px-2 py-1.5">
                          <span className="font-mono text-xs font-bold text-amber-800">:{r.name}</span>
                          <span className="text-[10px] text-slate-500 ml-2">({r.from} → {r.to})</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
                <div className="text-[11px] text-slate-500 mt-3">→ 모든 파이프라인이 이 어휘만 사용 → 일관성 보장</div>
              </div>
            )}

            {/* Step 3: 계층 구조 */}
            {focus === 'hierarchy' && (
              <div className="bg-white rounded-xl shadow-sm border-2 border-emerald-300 p-5 mb-6">
                <div className="text-xs font-bold text-emerald-700 mb-3">🌳 라벨 계층 — 추론 가능</div>
                <div className="space-y-2">
                  {HIERARCHY.map((h) => (
                    <div key={h.label} className="flex items-center gap-3" style={{ marginLeft: h.level * 24 + 'px' }}>
                      {h.level > 0 && <span className="text-emerald-500">└→</span>}
                      <div className="bg-emerald-100 rounded-lg px-3 py-2 border border-emerald-300">
                        <span className="font-mono font-bold text-emerald-800 text-sm">:{h.label}</span>
                      </div>
                      <span className="text-[11px] text-slate-600">{h.desc}</span>
                    </div>
                  ))}
                </div>
                <div className="bg-slate-900 rounded-md mt-4 p-3 font-mono text-xs">
                  <div className="text-emerald-300">잡스 :Person  →  자동 추론  →  잡스 :Mammal, :Animal</div>
                </div>
              </div>
            )}

            {/* Step 4: 실전 도메인 */}
            {focus === 'real' && (
              <div className="bg-white rounded-xl shadow-sm border-2 border-violet-300 p-5 mb-6">
                <div className="text-xs font-bold text-violet-700 mb-3">🏛 실전 도메인 온톨로지 — 빌려 쓰기</div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                  {REAL_WORLD.map((o) => (
                    <div key={o.name} className="bg-violet-50 rounded-lg border border-violet-200 p-3">
                      <div className="flex items-baseline gap-2 mb-1">
                        <span className="font-bold text-violet-800 text-sm">{o.name}</span>
                        <span className="text-[10px] bg-violet-200 text-violet-800 px-1.5 py-0.5 rounded">{o.domain}</span>
                      </div>
                      <div className="text-[11px] text-slate-600">{o.note}</div>
                    </div>
                  ))}
                </div>
                <div className="bg-slate-900 rounded-md mt-4 p-3 font-mono text-xs text-amber-300">
                  💡 LLM 프롬프트에 온톨로지를 주입 → 엔티티 추출이 일관됨 → GraphRAG 품질의 핵심
                </div>
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
