<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — RDF vs Property Graph</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    II-2-2. RDF vs Property Graph
    학습 목표: 두 그래프 모델의 차이와 사용처를 안다.
    핵심 비유: 문장 카드(RDF Triple) vs 명함(Property Graph) — 같은 정보, 두 표기법
    구조: 4단계 (RDF Triple / PG / 차이점 / 선택 가이드)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // RDF Triple — (주어, 술어, 목적어)
    const TRIPLES = [
      { subject: '잡스', predicate: 'foundedIn',  object: '1976' },
      { subject: '잡스', predicate: 'coFounded',  object: '애플' },
      { subject: '애플', predicate: 'industry',   object: '"Tech"' },
    ];

    // 차이점 비교 표 (4축)
    const COMPARE = [
      {
        axis: '단위',
        rdf: { icon: '📜', text: 'Triple — (주어, 술어, 목적어) 한 줄' },
        pg:  { icon: '🟣', text: '노드와 엣지에 속성 포함' },
      },
      {
        axis: '쿼리 언어',
        rdf: { icon: '🔍', text: 'SPARQL — 패턴 매칭 기반' },
        pg:  { icon: '🔍', text: 'Cypher — ASCII art 기반' },
      },
      {
        axis: '강점',
        rdf: { icon: '🌐', text: '국제 표준, 추론(OWL), 시맨틱 호환' },
        pg:  { icon: '⚡', text: '속성 풍부, 구현 단순, 빠른 횡단' },
      },
      {
        axis: '주요 사용처',
        rdf: { icon: '📚', text: '시맨틱 웹, 위키데이터, SNOMED-CT' },
        pg:  { icon: '🏢', text: '비즈니스 그래프 DB, GraphRAG 실전' },
      },
    ];

    const STEPS = [
      {
        title: 'Step 1. RDF 모델 — 문장 카드 묶음',
        desc: 'RDF는 모든 정보를 (주어, 술어, 목적어) 3개로 된 Triple 한 줄로 표현한다. "잡스가 1976년에 창업했다" → 두 줄: (잡스, foundedIn, 1976), (잡스, coFounded, 애플). W3C 국제 표준이고 추론(OWL)·교환(JSON-LD)이 강점.',
        focus: 'rdf',
      },
      {
        title: 'Step 2. Property Graph 모델 — 명함처럼',
        desc: '같은 정보를 노드와 엣지에 속성으로 직접 붙인다. (잡스 {born:1955})-[:CO_FOUNDED {since:1976}]->(애플 {industry:"Tech"}). Triple보다 표현이 압축적이고 속성 검색이 즉시 가능. Neo4j가 대표 구현.',
        focus: 'pg',
      },
      {
        title: 'Step 3. 차이점 — 같은 정보, 다른 강점',
        desc: 'RDF는 표준/추론/호환에 강하고, PG는 속성/구현/속도에 강하다. 정보량은 동등하지만 PG가 같은 사실을 더 적은 단위로 표현한다. SPARQL은 시맨틱 표현력이, Cypher는 직관성이 우수.',
        focus: 'compare',
      },
      {
        title: 'Step 4. 선택 가이드 — GraphRAG 실전은 PG',
        desc: 'GraphRAG 실전 도구(Neo4j, Microsoft GraphRAG, LangChain Graph)는 거의 모두 Property Graph. RDF는 외부 표준 어휘 호환이 필요할 때(의료/학술) 채택. 우선 PG부터 익히고 필요 시 RDF로 확장.',
        focus: 'choose',
      },
    ];

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 3500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const focus = step.focus;
      const showRdf = focus === 'rdf' || focus === 'compare' || focus === 'choose';
      const showPg = focus === 'pg' || focus === 'compare' || focus === 'choose';

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">RDF vs Property Graph</h1>
                <p className="text-sm text-slate-500 mt-1">문장 카드(Triple) vs 명함(PG) — 같은 정보, 두 표기법</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* RDF + PG 두 모델 표현 */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
              {/* RDF Triple 카드 */}
              <div className={`bg-white rounded-xl shadow-sm border-2 p-4 transition-opacity ${showRdf ? 'border-amber-300' : 'border-slate-200 opacity-30'}`}>
                <div className="text-xs font-bold text-amber-700 mb-3">📜 RDF — Triple 카드</div>
                <div className="space-y-2">
                  {TRIPLES.map((t, i) => (
                    <div key={i} className="bg-amber-50 rounded-lg border border-amber-200 px-3 py-2">
                      <div className="flex items-baseline gap-2 font-mono text-xs">
                        <span className="font-bold text-amber-900">{t.subject}</span>
                        <span className="text-slate-400">—</span>
                        <span className="text-amber-700">{t.predicate}</span>
                        <span className="text-slate-400">—</span>
                        <span className="font-bold text-amber-900">{t.object}</span>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="text-[10px] text-slate-500 mt-3">3개 Triple = 같은 정보의 풀어쓰기</div>
              </div>

              {/* Property Graph 노드 */}
              <div className={`bg-white rounded-xl shadow-sm border-2 p-4 transition-opacity ${showPg ? 'border-indigo-300' : 'border-slate-200 opacity-30'}`}>
                <div className="text-xs font-bold text-indigo-700 mb-3">🟣 Property Graph — 노드/엣지에 속성</div>
                <div className="flex items-center justify-around mt-6 mb-4">
                  <div className="text-center">
                    <div className="w-20 h-20 rounded-full bg-violet-500 text-white flex items-center justify-center font-bold shadow-lg mx-auto">
                      잡스
                    </div>
                    <div className="text-[10px] mt-1 font-mono text-slate-700">:Person</div>
                    <div className="text-[10px] font-mono text-violet-700">{'{born: 1955}'}</div>
                  </div>
                  <div className="flex flex-col items-center">
                    <div className="text-[10px] font-mono font-bold text-slate-700">:CO_FOUNDED</div>
                    <div className="w-16 h-1 bg-slate-400 my-1 relative">
                      <div className="absolute -right-2 top-1/2 -translate-y-1/2 w-0 h-0 border-l-8 border-l-slate-400 border-t-4 border-t-transparent border-b-4 border-b-transparent" />
                    </div>
                    <div className="text-[9px] font-mono bg-amber-50 border border-amber-200 px-1 rounded text-amber-800">since: 1976</div>
                  </div>
                  <div className="text-center">
                    <div className="w-20 h-20 rounded-full bg-emerald-500 text-white flex items-center justify-center font-bold shadow-lg mx-auto">
                      애플
                    </div>
                    <div className="text-[10px] mt-1 font-mono text-slate-700">:Company</div>
                    <div className="text-[10px] font-mono text-emerald-700">{'{industry: "Tech"}'}</div>
                  </div>
                </div>
                <div className="text-[10px] text-slate-500 mt-2 text-center">노드 2 + 엣지 1 = 같은 정보의 압축</div>
              </div>
            </div>

            {/* Step 3: 차이점 비교 */}
            {focus === 'compare' && (
              <div className="bg-white rounded-xl shadow-sm border-2 border-slate-300 p-4 mb-6">
                <div className="text-xs font-bold text-slate-700 mb-3">⚖ 4축 비교</div>
                <div className="space-y-2">
                  {COMPARE.map((c) => (
                    <div key={c.axis} className="grid grid-cols-1 md:grid-cols-12 gap-2">
                      <div className="md:col-span-2 text-xs font-bold text-slate-700 flex items-center">{c.axis}</div>
                      <div className="md:col-span-5 bg-amber-50 border border-amber-200 rounded p-2 text-[11px]">
                        <span className="mr-1">{c.rdf.icon}</span>
                        <span className="font-bold text-amber-900 mr-1">RDF:</span>
                        <span className="text-slate-700">{c.rdf.text}</span>
                      </div>
                      <div className="md:col-span-5 bg-indigo-50 border border-indigo-200 rounded p-2 text-[11px]">
                        <span className="mr-1">{c.pg.icon}</span>
                        <span className="font-bold text-indigo-900 mr-1">PG:</span>
                        <span className="text-slate-700">{c.pg.text}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Step 4: 선택 가이드 */}
            {focus === 'choose' && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">
                <div className="bg-indigo-50 border-2 border-indigo-300 rounded-xl p-4">
                  <div className="font-bold text-indigo-800 text-sm mb-2">🟣 Property Graph 권장</div>
                  <ul className="text-[11px] text-indigo-900 space-y-1">
                    <li>• GraphRAG 실전 (Neo4j / MS GraphRAG / LangChain Graph)</li>
                    <li>• 비즈니스 도메인 (사기 탐지, 추천, 지식 그래프)</li>
                    <li>• 빠른 시작이 중요할 때</li>
                  </ul>
                </div>
                <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-4">
                  <div className="font-bold text-amber-800 text-sm mb-2">📜 RDF 권장</div>
                  <ul className="text-[11px] text-amber-900 space-y-1">
                    <li>• 시맨틱 웹 / 위키데이터 / 학술 인용</li>
                    <li>• 외부 표준 어휘 호환 (SNOMED-CT, Schema.org)</li>
                    <li>• 추론(OWL)이 핵심일 때</li>
                  </ul>
                </div>
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
