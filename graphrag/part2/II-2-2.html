                          <td className="px-2 py-1.5 text-amber-700">{t.p}</td>
                          <td className={`px-2 py-1.5 ${t.literal ? 'text-emerald-700' : 'text-violet-700 font-bold'}`}>
                            {t.o}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}

              <div className="text-[10px] text-slate-500 mt-2 leading-relaxed">
                <span className="inline-flex items-center gap-1 mr-2">
                  <span className="w-2 h-2 rounded bg-violet-500"></span>URI
                </span>
                <span className="inline-flex items-center gap-1">
                  <span className="w-2 h-2 rounded bg-emerald-500"></span>리터럴
                </span>
              </div>
            </div>

            {/* ── 우측: Property Graph 시각화 ── */}
            <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${showPgStrong ? 'bg-violet-50 border-violet-300' : 'bg-slate-50 border-slate-200 opacity-60'}`}>
              <div className="flex items-center justify-between mb-2">
                <div className="flex items-center gap-1.5">
                  <span aria-hidden="true">🟣</span>
                  <span className="text-xs font-bold text-violet-800">Property Graph</span>
                </div>
                <span className="text-[10px] font-mono text-violet-700 bg-violet-100 px-1.5 py-0.5 rounded">
                  {pg.nodes.length} nodes · {pg.edges.length} edges
                </span>
              </div>

              {pg.nodes.length === 0 ? (
                <div className="h-48 flex items-center justify-center text-[11px] text-slate-400">
                  (아직 노드 없음 — Step 3에서 추가)
                </div>
              ) : (
                <div className="relative">
                  <svg viewBox="0 0 320 270" className="w-full h-56">
                    {/* 엣지 먼저 (노드 뒤로 가도록) */}
                    {pg.edges.map((e, i) => {
                      const a = NODE_POS[e.from];
                      const b = NODE_POS[e.to];
                      if (!a || !b) return null;
                      const midX = (a.x + b.x) / 2;
                      const midY = (a.y + b.y) / 2;
                      // 화살표 방향 (단위벡터)
                      const dx = b.x - a.x;
                      const dy = b.y - a.y;
                      const len = Math.sqrt(dx * dx + dy * dy);
                      const ux = dx / len;
                      const uy = dy / len;
                      const r = 26; // 노드 반지름
                      const x1 = a.x + ux * r;
                      const y1 = a.y + uy * r;
                      const x2 = b.x - ux * r;
                      const y2 = b.y - uy * r;
                      return (
                        <g key={i}>
                          <line
                            x1={x1} y1={y1} x2={x2} y2={y2}
                            stroke="#7c3aed" strokeWidth="2"
                            markerEnd="url(#arrow)"
                          />
                          <rect
                            x={midX - 38} y={midY - 16}
                            width="76" height="14" rx="3"
                            fill="white" stroke="#a78bfa" strokeWidth="1"
                          />
                          <text
                            x={midX} y={midY - 6}
                            textAnchor="middle"
                            fontSize="8" fontFamily="monospace"
                            fill="#6d28d9" fontWeight="bold"
                          >
                            :{e.type}
                          </text>
                          {Object.keys(e.props).length > 0 && (
                            <>
                              <rect
                                x={midX - 38} y={midY + 2}
                                width="76" height="12" rx="3"
                                fill="#fef3c7" stroke="#fbbf24" strokeWidth="1"
                              />
                              <text
                                x={midX} y={midY + 11}
                                textAnchor="middle"
                                fontSize="7" fontFamily="monospace"
                                fill="#92400e"
                              >
                                {Object.entries(e.props).map(([k, v]) => `${k}: ${v}`).join(', ')}
                              </text>
                            </>
                          )}
                        </g>
                      );
                    })}

                    {/* 노드 */}
                    {pg.nodes.map((n) => {
                      const pos = NODE_POS[n.id];
                      if (!pos) return null;
                      const color = NODE_COLOR[n.label] || NODE_COLOR.Person;
                      return (
                        <g key={n.id}>
                          <circle
                            cx={pos.x} cy={pos.y} r="26"
                            className={color.bg.replace('bg-', 'fill-')}
                            stroke="white" strokeWidth="3"
                          />
                          <text
                            x={pos.x} y={pos.y + 4}
                            textAnchor="middle"
                            fontSize="11" fontWeight="bold"
                            fill="white"
                          >
                            {n.display}
                          </text>
                          {/* 라벨 */}
                          <text
                            x={pos.x} y={pos.y + 42}
                            textAnchor="middle"
                            fontSize="9" fontFamily="monospace"
                            fill="#475569"
                          >
                            :{n.label}
                          </text>
                          {/* 속성 (있을 때만) */}
                          {Object.keys(n.props).length > 0 && (
                            <text
                              x={pos.x} y={pos.y + 54}
                              textAnchor="middle"
                              fontSize="8" fontFamily="monospace"
                              fill="#7c3aed"
                            >
                              {`{${Object.entries(n.props).map(([k, v]) => `${k}: ${v}`).join(', ')}}`}
                            </text>
                          )}
                        </g>
                      );
                    })}

                    {/* 화살표 정의 */}
                    <defs>
                      <marker
                        id="arrow"
                        viewBox="0 0 10 10"
                        refX="9" refY="5"
                        markerWidth="6" markerHeight="6"
                        orient="auto-start-reverse"
                      >
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed" />
                      </marker>
                    </defs>
                  </svg>
                </div>
              )}

              <div className="text-[10px] text-slate-500 mt-1 leading-relaxed">
                <span className="inline-flex items-center gap-1 mr-2">
                  <span className="w-2 h-2 rounded-full bg-violet-500"></span>:Person
                </span>
                <span className="inline-flex items-center gap-1 mr-2">
                  <span className="w-2 h-2 rounded-full bg-fuchsia-500"></span>:Company
                </span>
                <span className="inline-flex items-center gap-1">
                  <span className="w-2 h-2 rounded-full bg-sky-500"></span>:City
                </span>
              </div>
            </div>
          </div>

          {/* Step 5: 비교 표 추가 노출 */}
          {focus === 'compare' && (
            <div className="mt-4 rounded-lg border-2 border-violet-300 bg-violet-50 p-3">
              <div className="text-xs font-bold text-violet-800 mb-2">⚖ 핵심 차이 4축</div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-2 text-[11px]">
                <div className="bg-amber-50 border border-amber-300 rounded p-2">
                  <div className="font-bold text-amber-900 mb-1">📜 RDF</div>
                  <div className="text-slate-700 leading-relaxed">
                    표준화 · 추론(OWL) · 외부 어휘 호환 ·<br />
                    엣지 속성에 reification 필요
                  </div>
                  <div className="mt-1 font-mono text-[10px] text-amber-700">
                    Apache Jena · GraphDB · Stardog
                  </div>
                </div>
                <div className="bg-violet-100 border border-violet-300 rounded p-2">
                  <div className="font-bold text-violet-900 mb-1">🟣 Property Graph</div>
                  <div className="text-slate-700 leading-relaxed">
                    직관적 · 속성 풍부 · 빠른 구현 ·<br />
                    엣지에도 속성 직접 부착
                  </div>
                  <div className="mt-1 font-mono text-[10px] text-violet-700">
                    Neo4j · Memgraph · Amazon Neptune
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + 3 파일 탭
    // ─────────────────────────────────────────────────────
    function CodeViewer({ codeMap, activeTab, stepIdx, total }) {
      const [tab, setTab] = useState(activeTab);
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      // step 변경 시 활성 탭을 step의 추천 탭으로 자동 전환
      useEffect(() => {
        setTab(activeTab);
      }, [activeTab]);

      const code = codeMap[tab];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      const tabs = ['data.ttl', 'data.cypher', 'compare.md'];

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 묶음 */}
          <div className="bg-[#21252b] border-b border-slate-700">
            <div className="px-4 pt-2 pb-0 flex items-center gap-2">
              <div className="flex gap-1.5">
                <span className="w-3 h-3 rounded-full bg-red-500"></span>
                <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
                <span className="w-3 h-3 rounded-full bg-green-500"></span>
              </div>
              <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
            </div>
            <div className="px-3 flex items-end gap-1 mt-1">
              {tabs.map((name) => {
                const isActive = name === tab;
                return (
                  <button
                    key={name}
                    onClick={() => setTab(name)}
                    className={`text-[11px] font-mono px-3 py-1.5 rounded-t border-b-2 transition ${
                      isActive
                        ? 'bg-[#282c34] text-violet-300 border-violet-400'
                        : 'bg-[#1c1f24] text-slate-400 border-transparent hover:text-slate-200'
                    }`}
                  >
                    {name}
                  </button>
                );
              })}
            </div>
          </div>

          {/* hljs 토큰화용 hidden */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-violet-500/10 border-l-2 border-violet-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 — 단계 번호 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {tab}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-violet-700 hover:text-violet-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 그래프 모델 &gt; Chapter 2. 모델 비교</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">RDF vs Property Graph</h1>
                  <p className="text-sm text-slate-500 mt-0.5">같은 사실, 두 표기법 — Triple 표 vs 노드/엣지 그래프</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                triples={step.triples}
                pg={step.pg}
                focus={step.focus}
              />
              <CodeViewer
                codeMap={step.code}
                activeTab={step.activeTab}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 text-sm text-violet-900">
                💡 다음 Chapter에서는 <strong>그래프 스키마 설계</strong> — 라벨/관계/속성을 어떻게 모델링하는지
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-violet-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-violet-600 text-white hover:bg-violet-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-2-1.html" className="text-slate-500 hover:text-slate-700">&larr; II-2-1</a>
              <a href="../index.html" className="text-violet-700 hover:text-violet-900 font-medium">허브로 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
