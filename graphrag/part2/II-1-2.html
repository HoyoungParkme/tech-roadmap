<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — 속성과 라벨</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    II-1-2. 속성(Property)과 라벨(Label)
    학습 목표: 노드와 엣지에 의미 있는 속성을 붙일 수 있다.
    핵심 비유: "주민등록증" — 라벨(시민/외국인 = 분류) + 속성(이름/생년월일 = 키-값)
    구조: 4단계 (라벨 / 노드 속성 / 엣지 속성 / Cypher 미리보기)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 라벨 정적 매핑 (II-1-1과 동일)
    const LABEL_STYLE = {
      Person:  { fill: '#a78bfa', stroke: '#7c3aed', text: 'Person', desc: '사람 — 실명/생년월일 같은 정체성' },
      Company: { fill: '#34d399', stroke: '#059669', text: 'Company', desc: '회사 — 설립일/업종 같은 조직' },
    };

    // 노드 속성
    const PERSON_PROPS = [
      { key: 'name', value: '"스티브 잡스"' },
      { key: 'born', value: '1955' },
      { key: 'role', value: '"CEO"' },
    ];

    const COMPANY_PROPS = [
      { key: 'name', value: '"애플"' },
      { key: 'industry', value: '"Tech"' },
    ];

    // 엣지 속성
    const EDGE_PROPS = [
      { key: 'since', value: '1976' },
      { key: 'role', value: '"CEO"' },
    ];

    const STEPS = [
      {
        title: 'Step 1. 라벨(Label) — 노드의 분류',
        desc: '주민등록증으로 비유하면 라벨은 "한국 시민 / 외국인"처럼 큰 분류다. 노드 위에 (:Person), (:Company)처럼 콜론으로 붙는다. 한 노드에 라벨이 여러 개 가능 — (:Person:Founder)처럼 복수 라벨도 흔하다.',
        focus: 'label',
      },
      {
        title: 'Step 2. 노드 속성(Property) — 키-값 데이터',
        desc: '라벨로 분류를 정했으면, 구체적인 데이터는 속성으로 붙인다. 잡스 노드에 name="스티브 잡스", born=1955, role="CEO". 주민등록증의 이름/생년월일/주소에 해당. 속성은 검색/필터의 기반이 된다.',
        focus: 'props',
      },
      {
        title: 'Step 3. 엣지에도 속성 — 관계의 메타데이터',
        desc: '엣지(관계)에도 속성을 붙일 수 있다. (잡스)-[:CO_FOUNDED {since: 1976, role: "CEO"}]→(애플). "언제부터", "어떤 역할로" 같은 관계의 디테일을 보존. RDB의 JOIN 테이블이 갖는 정보를 엣지가 직접 들고 있는 셈.',
        focus: 'edge',
      },
      {
        title: 'Step 4. Cypher 미리보기 — 라벨/속성으로 검색',
        desc: '`MATCH (p:Person {name: "잡스"})-[r:CO_FOUNDED]->(c:Company) RETURN p, r, c` — 라벨로 노드를 찾고, 속성으로 필터링하고, 엣지로 연결. Part III에서 본격적으로 다룬다.',
        focus: 'cypher',
      },
    ];

    function NodeBox({ label, name, props, focus }) {
      const style = LABEL_STYLE[label];
      const showLabel = focus === 'label' || focus === 'props' || focus === 'edge' || focus === 'cypher';
      const showProps = focus === 'props' || focus === 'edge' || focus === 'cypher';
      return (
        <div className="rounded-xl overflow-hidden shadow-sm border-2" style={{ borderColor: style.stroke }}>
          {/* 노드 헤더 = 라벨 */}
          <div className="px-4 py-3 text-white" style={{ background: style.fill }}>
            <div className="flex items-center gap-2">
              <div className="w-8 h-8 rounded-full bg-white bg-opacity-30 flex items-center justify-center text-xs font-bold">
                {showLabel ? ':' : '?'}
              </div>
              <div>
                <div className="text-xs opacity-90">{showLabel ? `라벨` : '라벨 없음'}</div>
                <div className="font-bold text-base">{showLabel ? `:${style.text}` : '???'}</div>
              </div>
            </div>
            <div className="text-[10px] opacity-90 mt-1">{name}</div>
          </div>
          {/* 속성 */}
          <div className="bg-white px-4 py-3">
            <div className="text-[10px] font-bold text-slate-500 mb-2">속성 (key: value)</div>
            {showProps ? (
              <div className="space-y-1">
                {props.map((p) => (
                  <div key={p.key} className="flex items-baseline text-xs font-mono">
                    <span className="text-slate-700 font-bold w-20 shrink-0">{p.key}:</span>
                    <span className="text-violet-700">{p.value}</span>
                  </div>
                ))}
              </div>
            ) : (
              <div className="text-[11px] text-slate-400 italic">속성 미설정</div>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 3500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const focus = step.focus;
      const showEdge = focus === 'edge' || focus === 'cypher';

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">속성과 라벨</h1>
                <p className="text-sm text-slate-500 mt-1">주민등록증 — 라벨(분류) + 속성(키-값)으로 노드를 정의한다</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* 라벨 가이드 카드 (Step 1 강조) */}
            <div className={`grid grid-cols-1 md:grid-cols-2 gap-3 mb-6 transition-opacity ${focus === 'label' ? '' : 'opacity-60'}`}>
              {Object.entries(LABEL_STYLE).map(([key, s]) => (
                <div key={key} className="bg-white rounded-xl border-2 p-3" style={{ borderColor: s.stroke }}>
                  <div className="flex items-center gap-2">
                    <span className="w-5 h-5 rounded-full" style={{ background: s.fill }} />
                    <span className="font-mono font-bold text-sm" style={{ color: s.stroke }}>:{s.text}</span>
                  </div>
                  <div className="text-[11px] text-slate-600 mt-1">{s.desc}</div>
                </div>
              ))}
            </div>

            {/* 노드 박스 + 엣지 */}
            <div className="grid grid-cols-1 md:grid-cols-[1fr_auto_1fr] gap-4 items-stretch mb-6">
              <NodeBox label="Person" name="스티브 잡스" props={PERSON_PROPS} focus={focus} />
              <div className={`flex flex-col items-center justify-center transition-opacity ${showEdge ? '' : 'opacity-25'}`}>
                <div className="text-[11px] font-bold text-slate-500 mb-1">엣지</div>
                <div className="w-full md:w-32 h-1 bg-slate-400 rounded relative">
                  <div className="absolute -right-2 top-1/2 -translate-y-1/2 w-0 h-0 border-l-8 border-l-slate-400 border-t-4 border-t-transparent border-b-4 border-b-transparent" />
                </div>
                <div className="font-mono font-bold text-xs text-slate-700 mt-1">:CO_FOUNDED</div>
                {showEdge && (
                  <div className="bg-amber-50 border border-amber-200 rounded-lg px-2 py-1 mt-2 font-mono text-[10px] text-amber-800">
                    {EDGE_PROPS.map((p) => `${p.key}: ${p.value}`).join(', ')}
                  </div>
                )}
              </div>
              <NodeBox label="Company" name="애플" props={COMPANY_PROPS} focus={focus} />
            </div>

            {/* Step 4: Cypher 미리보기 */}
            {focus === 'cypher' && (
              <div className="bg-slate-900 rounded-xl p-4 mb-6 font-mono text-xs">
                <div className="text-[10px] text-slate-400 mb-2">Cypher 쿼리 (Part III에서 자세히)</div>
                <pre className="text-emerald-300 overflow-x-auto">
{`MATCH (p:Person {name: "스티브 잡스"})
      -[r:CO_FOUNDED]->
      (c:Company)
RETURN p.name, r.since, c.name`}
                </pre>
                <div className="text-[10px] text-slate-400 mt-3">
                  → 라벨(:Person, :Company)로 종류 매칭 / 속성({'{name: ...}'})으로 필터 / 엣지(-[:CO_FOUNDED]-)로 연결
                </div>
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
