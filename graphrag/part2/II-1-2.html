<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG 학습 — II-1-2. 속성과 라벨</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-1-2. 속성(Property)과 라벨(Label)
    학습 목표:
      - 라벨(Label) = 노드 타입 분류  (예: :Person, :Company)
      - 속성(Property) = 노드/엣지의 key-value 데이터 (예: {name: "Alice", age: 30})
      - 다중 라벨, 인덱스까지 5단계로 익힌다.
    핵심 비유: 주민등록증 — 라벨(시민/외국인 같은 분류) + 속성(이름/생년월일 키-값)
    패턴: fastapi v1 — 좌(LiveDataPane: 그래프 SVG + 속성 패널) / 우(VSCode CodeViewer)
    색상: violet (graphrag base)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 5단계 — 라벨/속성/엣지 속성/다중 라벨/인덱스
    //   nodes[i] = {
    //     id, x, y,
    //     labels: ['Person', 'Engineer'],   // 라벨 배열 (다중 라벨 가능)
    //     name: 'Alice',                    // 표시용
    //     props: { name: '"Alice"', age: 30 },
    //     indexed: false,                   // 인덱스 노드 = 두꺼운 외곽
    //   }
    //   edges[i] = { from, to, type: 'WORKS_AT', props: {...} }
    //   selected = { kind: 'node'|'edge', id }   // 속성 패널 열린 대상
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. 라벨(Label) — 노드 타입 분류',
        desc: '주민등록증에서 라벨은 "한국 시민 / 외국인" 같은 큰 분류다. 노드 위에 콜론으로 :Person, :Company처럼 붙여 타입을 표시한다. 라벨이 같은 노드끼리 같은 그룹 — Cypher 쿼리에서 (p:Person)으로 한 번에 잡는다.',
        nodes: [
          { id: 'alice',  x: 110, y: 130, labels: ['Person'],  name: 'Alice', props: {}, indexed: false },
          { id: 'bob',    x: 110, y: 250, labels: ['Person'],  name: 'Bob',   props: {}, indexed: false },
          { id: 'apple',  x: 410, y: 190, labels: ['Company'], name: 'Apple', props: {}, indexed: false },
        ],
        edges: [],
        selected: { kind: 'node', id: 'alice' },
        showCount: false,
        showIndexBadge: false,
        code: {
          lang: 'cypher',
          filename: 'properties.cypher',
          lines: [
            '// Step 1. 라벨 — 노드의 분류',
            '// :Person, :Company처럼 콜론으로 붙는다.',
            '// 같은 라벨 = 같은 타입 (RDB의 테이블 같은 역할)',
            '',
            'CREATE (alice:Person)',
            'CREATE (bob:Person)',
            'CREATE (apple:Company)',
            '',
            '// 라벨로 한 번에 조회',
            'MATCH (p:Person)   RETURN p   // Alice, Bob',
            'MATCH (c:Company)  RETURN c   // Apple',
            '',
            '// 라벨이 없는 노드는 type 없는 데이터 — 위험',
            'CREATE (x)   // 가능은 하지만 비추천',
          ],
          highlight: [5, 6, 7, 10, 11],
        },
      },
      {
        title: 'Step 2. 노드 속성(Property) — key-value 데이터',
        desc: '라벨로 분류를 정했으면, 구체적인 값은 속성(Property)으로 붙인다. {name: "Alice", age: 30}처럼 key-value. 속성은 검색/필터의 기반 — Cypher에서 {name: "Alice"} 형태로 매칭한다. 클릭하면 우측 SVG에서 속성 패널이 펼쳐진다.',
        nodes: [
          { id: 'alice', x: 110, y: 130, labels: ['Person'],  name: 'Alice',
            props: { name: '"Alice"', age: '30' }, indexed: false },
          { id: 'bob',   x: 110, y: 250, labels: ['Person'],  name: 'Bob',
            props: { name: '"Bob"',   age: '28' }, indexed: false },
          { id: 'apple', x: 410, y: 190, labels: ['Company'], name: 'Apple',
            props: { name: '"Apple"', founded: '1976' }, indexed: false },
        ],
        edges: [],
        selected: { kind: 'node', id: 'alice' },
        showCount: false,
        showIndexBadge: false,
        code: {
          lang: 'cypher',
          filename: 'properties.cypher',
          lines: [
            '// Step 2. 노드 속성 — key-value 데이터',
            '// 라벨이 분류라면, 속성은 그 안의 구체적인 값.',
            '',
            'CREATE (alice:Person {name: "Alice", age: 30})',
            'CREATE (bob:Person   {name: "Bob",   age: 28})',
            'CREATE (apple:Company {name: "Apple", founded: 1976})',
            '',
            '// 속성으로 필터링 — Cypher의 핵심',
            'MATCH (p:Person {name: "Alice"}) RETURN p',
            'MATCH (p:Person) WHERE p.age > 29 RETURN p.name',
            '',
            '// 타입: string / number / boolean / list',
            '// (객체 중첩은 불가 — 정규화 필요)',
            'CREATE (c:Company {',
            '  name: "Apple",',
            '  tags: ["Tech", "Hardware"],   // list OK',
            '  active: true                   // boolean OK',
            '})',
          ],
          highlight: [4, 5, 6, 9, 10],
        },
      },
      {
        title: 'Step 3. 엣지에도 속성 — 관계의 메타데이터',
        desc: '엣지(관계)에도 {since: 2020, role: "engineer"}처럼 속성을 붙일 수 있다. "언제부터", "어떤 역할로" 같은 관계의 디테일을 엣지가 직접 들고 있다 — RDB의 JOIN 테이블이 갖는 정보를 엣지가 직접 보존한다. 엣지를 클릭하면 우측 SVG에서 엣지 속성 패널이 열린다.',
        nodes: [
          { id: 'alice', x: 110, y: 130, labels: ['Person'],  name: 'Alice',
            props: { name: '"Alice"', age: '30' }, indexed: false },
          { id: 'bob',   x: 110, y: 250, labels: ['Person'],  name: 'Bob',
            props: { name: '"Bob"',   age: '28' }, indexed: false },
          { id: 'apple', x: 410, y: 190, labels: ['Company'], name: 'Apple',
            props: { name: '"Apple"', founded: '1976' }, indexed: false },
        ],
        edges: [
          { id: 'e1', from: 'alice', to: 'apple', type: 'WORKS_AT',
            props: { since: '2020', role: '"engineer"' } },
          { id: 'e2', from: 'bob',   to: 'apple', type: 'WORKS_AT',
            props: { since: '2022', role: '"designer"' } },
        ],
        selected: { kind: 'edge', id: 'e1' },
        showCount: false,
        showIndexBadge: false,
        code: {
          lang: 'cypher',
          filename: 'properties.cypher',
          lines: [
            '// Step 3. 엣지 속성 — 관계 자체에 데이터를 붙인다',
            '// (RDB의 JOIN 테이블 컬럼이 엣지에 그대로 들어가는 셈)',
            '',
            'MATCH (a:Person {name: "Alice"}), (c:Company {name: "Apple"})',
            'CREATE (a)-[:WORKS_AT {since: 2020, role: "engineer"}]->(c)',
            '',
            'MATCH (b:Person {name: "Bob"}),   (c:Company {name: "Apple"})',
            'CREATE (b)-[:WORKS_AT {since: 2022, role: "designer"}]->(c)',
            '',
            '// 엣지 속성으로 필터',
            'MATCH (p:Person)-[r:WORKS_AT]->(c:Company)',
            'WHERE r.since >= 2021',
            'RETURN p.name, r.role, c.name',
            '',
            '// 결과:',
            '//   Bob | "designer" | Apple',
          ],
          highlight: [4, 5, 7, 8, 11, 12, 13],
        },
      },
      {
        title: 'Step 4. 다중 라벨 — 한 노드에 여러 라벨',
        desc: '한 노드는 라벨을 여러 개 가질 수 있다. Alice는 사람이면서 엔지니어 → :Person:Engineer. Bob은 사람이면서 디자이너 → :Person:Designer. 다중 라벨은 다중 분류 — :Engineer만 골라도 잡히고 :Person만 골라도 잡힌다.',
        nodes: [
          { id: 'alice', x: 110, y: 130, labels: ['Person', 'Engineer'], name: 'Alice',
            props: { name: '"Alice"', age: '30' }, indexed: false },
          { id: 'bob',   x: 110, y: 250, labels: ['Person', 'Designer'], name: 'Bob',
            props: { name: '"Bob"',   age: '28' }, indexed: false },
          { id: 'apple', x: 410, y: 190, labels: ['Company'], name: 'Apple',
            props: { name: '"Apple"', founded: '1976' }, indexed: false },
        ],
        edges: [
          { id: 'e1', from: 'alice', to: 'apple', type: 'WORKS_AT',
            props: { since: '2020', role: '"engineer"' } },
          { id: 'e2', from: 'bob',   to: 'apple', type: 'WORKS_AT',
            props: { since: '2022', role: '"designer"' } },
        ],
        selected: { kind: 'node', id: 'alice' },
        showCount: true,
        showIndexBadge: false,
        code: {
          lang: 'cypher',
          filename: 'multi-label.cypher',
          lines: [
            '// Step 4. 다중 라벨 — 한 노드에 여러 라벨',
            '// :Person 이면서 :Engineer 가능. 콜론으로 이어 붙인다.',
            '',
            '// 새로 만들 때',
            'CREATE (alice:Person:Engineer {name: "Alice", age: 30})',
            'CREATE (bob:Person:Designer  {name: "Bob",   age: 28})',
            '',
            '// 기존 노드에 라벨 추가',
            'MATCH (p:Person {name: "Alice"})',
            'SET p:Engineer',
            '',
            '// 라벨 별로 조회 — 둘 다 가능',
            'MATCH (e:Engineer) RETURN e.name   // Alice',
            'MATCH (p:Person)   RETURN p.name   // Alice, Bob',
            '',
            '// 라벨 둘 다 있는 노드만',
            'MATCH (p:Person:Engineer) RETURN p.name   // Alice',
            '',
            '// 라벨 제거',
            'MATCH (p:Person {name: "Alice"})',
            'REMOVE p:Engineer',
          ],
          highlight: [5, 6, 9, 10, 16],
        },
      },
      {
        title: 'Step 5. 인덱스 — 자주 쿼리하는 속성에',
        desc: '노드가 100만 개가 되면 (p:Person {name: "Alice"})를 매번 풀 스캔할 수 없다. 자주 검색하는 속성에 인덱스를 만들면 O(N) → O(log N). 좌측 SVG에서 인덱스가 걸린 노드는 두꺼운 외곽선 + 🔎 뱃지로 표시된다.',
        nodes: [
          { id: 'alice', x: 110, y: 130, labels: ['Person', 'Engineer'], name: 'Alice',
            props: { name: '"Alice"', age: '30' }, indexed: true },
          { id: 'bob',   x: 110, y: 250, labels: ['Person', 'Designer'], name: 'Bob',
            props: { name: '"Bob"',   age: '28' }, indexed: true },
          { id: 'apple', x: 410, y: 190, labels: ['Company'], name: 'Apple',
            props: { name: '"Apple"', founded: '1976' }, indexed: true },
        ],
        edges: [
          { id: 'e1', from: 'alice', to: 'apple', type: 'WORKS_AT',
            props: { since: '2020', role: '"engineer"' } },
          { id: 'e2', from: 'bob',   to: 'apple', type: 'WORKS_AT',
            props: { since: '2022', role: '"designer"' } },
        ],
        selected: { kind: 'node', id: 'alice' },
        showCount: true,
        showIndexBadge: true,
        code: {
          lang: 'cypher',
          filename: 'create-index.cypher',
          lines: [
            '// Step 5. 인덱스 — 자주 쿼리하는 속성에',
            '// 노드 100만 개 풀 스캔(O(N)) → 인덱스 검색(O(log N))',
            '',
            '// :Person 라벨의 name 속성에 인덱스 생성',
            'CREATE INDEX person_name FOR (p:Person) ON (p.name)',
            '',
            '// :Company 라벨의 name 속성에도',
            'CREATE INDEX company_name FOR (c:Company) ON (c.name)',
            '',
            '// 복합 인덱스 (여러 속성)',
            'CREATE INDEX person_name_age',
            '  FOR (p:Person) ON (p.name, p.age)',
            '',
            '// 유일성 보장 (UNIQUE 제약 + 자동 인덱스)',
            'CREATE CONSTRAINT person_id_unique',
            '  FOR (p:Person) REQUIRE p.id IS UNIQUE',
            '',
            '// 인덱스 목록 확인',
            'SHOW INDEXES',
            '',
            '// 인덱스 적용 — 같은 쿼리지만 빠름',
            'MATCH (p:Person {name: "Alice"}) RETURN p',
            '// 실행 계획: NodeIndexSeek (NodeByLabelScan 아님!)',
          ],
          highlight: [5, 8, 11, 12, 15, 16, 22],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 라벨 → 색상 매핑 (정적 — Tailwind purge 안전 + SVG 인라인)
    // ─────────────────────────────────────────────────────
    const LABEL_COLOR = {
      Person:   { fill: '#a78bfa', stroke: '#7c3aed', text: '#ffffff' },  // violet
      Company:  { fill: '#34d399', stroke: '#059669', text: '#ffffff' },  // emerald
      Engineer: { fill: '#fb923c', stroke: '#c2410c', text: '#ffffff' },  // orange
      Designer: { fill: '#f472b6', stroke: '#be185d', text: '#ffffff' },  // pink
    };

    function getNodeColor(node) {
      // 첫 라벨 기준 — 다중 라벨이라도 1차 분류는 첫 라벨
      const primary = node.labels[0] || 'Person';
      return LABEL_COLOR[primary] || LABEL_COLOR.Person;
    }

    // ─────────────────────────────────────────────────────
    // 노드 SVG — 라벨, 다중 라벨 칩, 인덱스 외곽선
    // ─────────────────────────────────────────────────────
    function NodeSvg({ node, isSelected, onClick, showIndexBadge }) {
      const color = getNodeColor(node);
      const r = 36;
      const isMulti = node.labels.length > 1;

      return (
        <g
          onClick={() => onClick({ kind: 'node', id: node.id })}
          style={{ cursor: 'pointer' }}
        >
          {/* 인덱스 외곽 (두꺼운 violet 링) */}
          {node.indexed && showIndexBadge && (
            <circle cx={node.x} cy={node.y} r={r + 6} fill="none"
              stroke="#7c3aed" strokeWidth="3" strokeDasharray="4 3" opacity="0.7" />
          )}

          {/* 선택 하이라이트 */}
          {isSelected && (
            <circle cx={node.x} cy={node.y} r={r + 3} fill="none"
              stroke="#facc15" strokeWidth="3" />
          )}

          {/* 노드 본체 */}
          <circle cx={node.x} cy={node.y} r={r} fill={color.fill}
            stroke={color.stroke} strokeWidth="2" className="transition-all duration-500" />

          {/* 노드 이름 */}
          <text x={node.x} y={node.y + 4} textAnchor="middle" fontSize="12"
            fontWeight="bold" fill={color.text} pointerEvents="none">
            {node.name}
          </text>

          {/* 라벨 칩 (위쪽) — 다중 라벨이면 여러 개 */}
          {node.labels.map((label, idx) => {
            const c = LABEL_COLOR[label] || LABEL_COLOR.Person;
            const chipY = node.y - r - 10 - idx * 14;
            return (
              <g key={label} pointerEvents="none">
                <rect x={node.x - 32} y={chipY - 9} width="64" height="14"
                  rx="3" fill={c.stroke} opacity="0.95" />
                <text x={node.x} y={chipY + 1} textAnchor="middle" fontSize="9"
                  fontFamily="monospace" fontWeight="bold" fill="#ffffff">
                  :{label}
                </text>
              </g>
            );
          })}

          {/* 인덱스 뱃지 */}
          {node.indexed && showIndexBadge && (
            <g pointerEvents="none">
              <circle cx={node.x + r - 4} cy={node.y - r + 4} r={9}
                fill="#7c3aed" stroke="#ffffff" strokeWidth="2" />
              <text x={node.x + r - 4} y={node.y - r + 7} textAnchor="middle"
                fontSize="10" fill="#ffffff">🔎</text>
            </g>
          )}

          {/* 다중 라벨 카운트 */}
          {isMulti && (
            <g pointerEvents="none">
              <circle cx={node.x - r + 4} cy={node.y - r + 4} r={8}
                fill="#facc15" stroke="#ca8a04" strokeWidth="1.5" />
              <text x={node.x - r + 4} y={node.y - r + 7} textAnchor="middle"
                fontSize="9" fontWeight="bold" fill="#78350f">
                {node.labels.length}
              </text>
            </g>
          )}
        </g>
      );
    }

    // ─────────────────────────────────────────────────────
    // 엣지 SVG — 화살표 + type 라벨 + 속성 칩
    // ─────────────────────────────────────────────────────
    function EdgeSvg({ edge, fromNode, toNode, isSelected, onClick, hasProps }) {
      const dx = toNode.x - fromNode.x;
      const dy = toNode.y - fromNode.y;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;
      const ux = dx / len;
      const uy = dy / len;
      const r = 36;
      const x1 = fromNode.x + ux * r;
      const y1 = fromNode.y + uy * r;
      const x2 = toNode.x - ux * r;
      const y2 = toNode.y - uy * r;
      const mx = (x1 + x2) / 2;
      const my = (y1 + y2) / 2;

      return (
        <g onClick={() => onClick({ kind: 'edge', id: edge.id })} style={{ cursor: 'pointer' }}>
          {/* 클릭 영역 (투명, 두꺼운) */}
          <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="transparent" strokeWidth="14" />

          {/* 본 화살표 */}
          <line x1={x1} y1={y1} x2={x2} y2={y2}
            stroke={isSelected ? '#facc15' : '#64748b'}
            strokeWidth={isSelected ? 3 : 2}
            markerEnd={isSelected ? 'url(#arrow-active)' : 'url(#arrow)'}
            className="transition-all duration-300" />

          {/* type 라벨 */}
          <g pointerEvents="none">
            <rect x={mx - 42} y={my - 9} width="84" height="16" rx="3"
              fill="#1e293b" opacity="0.9" />
            <text x={mx} y={my + 2} textAnchor="middle" fontSize="10"
              fontFamily="monospace" fontWeight="bold" fill="#ffffff">
              :{edge.type}
            </text>
          </g>

          {/* 엣지 속성 표시 */}
          {hasProps && Object.keys(edge.props || {}).length > 0 && (
            <g pointerEvents="none">
              <rect
                x={mx - 56}
                y={my + 10}
                width="112"
                height="16"
                rx="3"
                fill="#fef3c7"
                stroke="#d97706"
                strokeWidth="1"
              />
              <text
                x={mx}
                y={my + 21}
                textAnchor="middle"
                fontSize="9"
                fontFamily="monospace"
                fill="#92400e"
              >
                {Object.entries(edge.props)
                  .map(([k, v]) => `${k}: ${v}`)
                  .join(', ')}
              </text>
            </g>
          )}
        </g>
      );
    }

    // ─────────────────────────────────────────────────────
    // 속성 패널 — 우측에 펼쳐지는 카드
    // ─────────────────────────────────────────────────────
    function PropPanel({ selected, nodes, edges }) {
      if (!selected) {
        return (
          <div className="rounded-lg bg-slate-50 border border-dashed border-slate-300 p-3 text-center text-xs text-slate-400 italic">
            노드 또는 엣지를 클릭하면 속성이 여기에 표시됩니다
          </div>
        );
      }

      if (selected.kind === 'node') {
        const node = nodes.find((n) => n.id === selected.id);
        if (!node) return null;
        const propEntries = Object.entries(node.props || {});
        return (
          <div className="rounded-lg bg-violet-50 border-2 border-violet-300 p-3 shadow-sm">
            <div className="flex items-center justify-between mb-2">
              <span className="text-[10px] font-bold uppercase tracking-wider text-violet-700">
                Node 속성
              </span>
              {node.indexed && (
                <span className="text-[10px] font-mono bg-violet-700 text-white px-1.5 py-0.5 rounded">
                  🔎 INDEXED
                </span>
              )}
            </div>

            {/* 라벨 칩들 */}
            <div className="flex flex-wrap gap-1 mb-2">
              {node.labels.map((label) => {
                const c = LABEL_COLOR[label] || LABEL_COLOR.Person;
                return (
                  <span key={label}
                    className="text-[10px] font-mono font-bold px-2 py-0.5 rounded"
                    style={{ background: c.stroke, color: c.text }}>:{label}</span>
                );
              })}
            </div>

            {/* 속성 key:value */}
            {propEntries.length === 0 ? (
              <div className="text-[11px] text-slate-400 italic">속성 없음</div>
            ) : (
              <div className="space-y-1 font-mono text-[11px] bg-white rounded p-2 border border-violet-200">
                <div className="text-slate-400 text-[10px]">{`{`}</div>
                {propEntries.map(([k, v], i) => (
                  <div key={k} className="flex pl-3">
                    <span className="text-slate-700 font-bold">{k}</span>
                    <span className="text-slate-500 mx-1">:</span>
                    <span className="text-violet-700">{v}</span>
                    {i < propEntries.length - 1 && <span className="text-slate-400">,</span>}
                  </div>
                ))}
                <div className="text-slate-400 text-[10px]">{`}`}</div>
              </div>
            )}
          </div>
        );
      }

      // 엣지
      const edge = edges.find((e) => e.id === selected.id);
      if (!edge) return null;
      const propEntries = Object.entries(edge.props || {});
      const fromNode = nodes.find((n) => n.id === edge.from);
      const toNode = nodes.find((n) => n.id === edge.to);

      return (
        <div className="rounded-lg bg-amber-50 border-2 border-amber-400 p-3 shadow-sm">
          <div className="flex items-center justify-between mb-2">
            <span className="text-[10px] font-bold uppercase tracking-wider text-amber-700">Edge 속성</span>
            <span className="text-[10px] font-mono bg-amber-700 text-white px-1.5 py-0.5 rounded">:{edge.type}</span>
          </div>
          <div className="text-[11px] text-slate-600 mb-2 font-mono">
            ({fromNode?.name}) → ({toNode?.name})
          </div>
          {propEntries.length === 0 ? (
            <div className="text-[11px] text-slate-400 italic">속성 없음</div>
          ) : (
            <div className="space-y-1 font-mono text-[11px] bg-white rounded p-2 border border-amber-200">
              <div className="text-slate-400 text-[10px]">{`{`}</div>
              {propEntries.map(([k, v], i) => (
                <div key={k} className="flex pl-3">
                  <span className="text-slate-700 font-bold">{k}</span>
                  <span className="text-slate-500 mx-1">:</span>
                  <span className="text-amber-700">{v}</span>
                  {i < propEntries.length - 1 && <span className="text-slate-400">,</span>}
                </div>
              ))}
              <div className="text-slate-400 text-[10px]">{`}`}</div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 그래프 SVG + 속성 패널
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step, stepIdx, localSelected, setLocalSelected }) {
      const { nodes, edges, showIndexBadge, showCount } = step;

      // 노드/엣지 카운트
      const labelSet = new Set();
      nodes.forEach((n) => n.labels.forEach((l) => labelSet.add(l)));
      const indexedCount = nodes.filter((n) => n.indexed).length;

      // SVG 영역
      const svgW = 540;
      const svgH = 360;

      // 클릭 핸들러
      const handleSelect = (sel) => setLocalSelected(sel);

      // 현재 step의 selected (로컬 우선, 없으면 step 기본값)
      const currentSelected = localSelected || step.selected;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📇 그래프 — 라벨 + 속성</h2>
            <span className="text-[10px] text-slate-400 font-mono">
              클릭으로 속성 보기
            </span>
          </div>

          {/* 카운트 카드 */}
          <div className="grid grid-cols-3 gap-2 mb-3">
            <div className="rounded-lg bg-violet-50 border border-violet-300 p-2 text-center">
              <div className="text-[10px] text-violet-700 font-bold uppercase">Nodes</div>
              <div className="text-xl font-extrabold text-violet-700 tabular-nums">
                {nodes.length}
              </div>
            </div>
            <div className="rounded-lg bg-slate-50 border border-slate-300 p-2 text-center">
              <div className="text-[10px] text-slate-600 font-bold uppercase">Labels</div>
              <div className="text-xl font-extrabold text-slate-700 tabular-nums">
                {labelSet.size}
                {showCount && (
                  <span className="text-[10px] text-amber-700 ml-1">+multi</span>
                )}
              </div>
            </div>
            <div className="rounded-lg bg-slate-50 border border-slate-300 p-2 text-center">
              <div className="text-[10px] text-slate-600 font-bold uppercase">Indexes</div>
              <div className="text-xl font-extrabold text-slate-700 tabular-nums">
                {showIndexBadge ? indexedCount : 0}
              </div>
            </div>
          </div>

          {/* 그래프 SVG */}
          <div className="rounded-lg bg-gradient-to-b from-violet-50 to-violet-100 border border-violet-200 p-2 mb-3">
            <svg viewBox={`0 0 ${svgW} ${svgH}`} className="w-full h-auto">
              <defs>
                <marker
                  id="arrow"
                  viewBox="0 0 10 10"
                  refX="9"
                  refY="5"
                  markerWidth="6"
                  markerHeight="6"
                  orient="auto"
                >
                  <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
                </marker>
                <marker
                  id="arrow-active"
                  viewBox="0 0 10 10"
                  refX="9"
                  refY="5"
                  markerWidth="6"
                  markerHeight="6"
                  orient="auto"
                >
                  <path d="M 0 0 L 10 5 L 0 10 z" fill="#facc15" />
                </marker>
              </defs>

              {/* 엣지 먼저 (노드 아래에 깔리게) */}
              {edges.map((edge) => {
                const fromNode = nodes.find((n) => n.id === edge.from);
                const toNode = nodes.find((n) => n.id === edge.to);
                if (!fromNode || !toNode) return null;
                const isSelected = currentSelected && currentSelected.kind === 'edge' && currentSelected.id === edge.id;
                return (
                  <EdgeSvg key={edge.id} edge={edge} fromNode={fromNode} toNode={toNode}
                    isSelected={isSelected} onClick={handleSelect} hasProps={true} />
                );
              })}

              {/* 노드 */}
              {nodes.map((node) => {
                const isSelected = currentSelected && currentSelected.kind === 'node' && currentSelected.id === node.id;
                return (
                  <NodeSvg key={`${stepIdx}-${node.id}`} node={node}
                    isSelected={isSelected} onClick={handleSelect} showIndexBadge={showIndexBadge} />
                );
              })}
            </svg>
          </div>

          {/* 속성 패널 */}
          <PropPanel selected={currentSelected} nodes={nodes} edges={edges} />

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full" style={{ background: '#a78bfa' }}></span>:Person</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full" style={{ background: '#34d399' }}></span>:Company</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full" style={{ background: '#fb923c' }}></span>:Engineer</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full" style={{ background: '#f472b6' }}></span>:Designer</span>
            {showIndexBadge && (
              <span className="flex items-center gap-1 ml-auto"><span className="text-[12px]">🔎</span>인덱스</span>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js (cypher 등)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          // cypher는 hljs 기본 미지원 → sql 폴백 (라벨/속성 syntax 비슷)
          const langClass =
            code.lang === 'cypher' ? 'language-sql' : `language-${code.lang}`;
          codeRef.current.className = langClass;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      const langClass = code.lang === 'cypher' ? 'language-sql' : `language-${code.lang}`;
      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code (innerHTML 추출) */}
          <pre className="hidden">
            <code ref={codeRef} className={langClass}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-violet-500/15 border-l-2 border-violet-400' : ''}`}>
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">{i + 1}</span>
                      <span className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }} />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 — 단계 번호 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · cypher</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      // step 변경 시 localSelected는 초기화 — step.selected가 기본
      const [localSelected, setLocalSelected] = useState(null);

      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
        setLocalSelected(null);
      };

      // step 바뀌면 클릭 선택 초기화
      useEffect(() => {
        setLocalSelected(null);
      }, [stepIdx]);

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-violet-700 hover:text-violet-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 그래프 기초 &gt; Chapter 1. 노드와 엣지</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">속성과 라벨</h1>
                  <p className="text-sm text-slate-500 mt-0.5">주민등록증 — Label(타입 분류) + Property(key-value 데이터)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx}
                localSelected={localSelected} setLocalSelected={setLocalSelected} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 text-sm text-violet-900">
                💡 다음(II-2-1)에서는 <strong>그래프 모델 vs RDB</strong> — 같은 도메인을 두 모델로 표현했을 때의 차이
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-violet-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={handleReset} disabled={stepIdx === 0 && !isPlaying} aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                처음
              </button>
              <button onClick={handlePrev} disabled={stepIdx === 0} aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                &larr; 이전
              </button>
              <button onClick={togglePlay} aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-violet-600 text-white hover:bg-violet-700 transition min-w-[100px]">
                {isPlaying ? '⏸ 정지' : stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생'}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1} aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; II-1-1 노드와 엣지</a>
              <a href="./II-2-1.html" className="text-violet-700 hover:text-violet-900 font-medium">II-2-1 그래프 vs RDB &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
