<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLOps 학습 — MLOps란 무엇인가</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    I-1-1. MLOps란 무엇인가
    학습 목표: ML 모델을 production에 두는 데 데이터/학습/배포/모니터링 4축 자동화가 왜 필요한지.
    핵심 비유: "수술실 안전수칙" — 노트북 실험 vs 운영 환경의 무게 차이
    구조: 4단계 (노트북 실험 / 운영 충격 / 4축 자동화 / 재현성+모니터링)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 노트북 실험 — "내 컴퓨터에서는 잘 됨"',
        desc: '데이터 사이언티스트가 Jupyter 노트북에서 88% 정확도 모델을 만든다. 셀을 위에서 아래로 한 번 돌리면 결과가 좋다. 그러나 이건 "1회 동작 증거"일 뿐 — 운영에는 한참 모자라다.',
        block: {
          kind: 'python',
          code: `# Jupyter Notebook (research/exploration.ipynb)
import pandas as pd
from sklearn.ensemble import RandomForestClassifier
from sklearn.metrics import accuracy_score

df = pd.read_csv('~/Downloads/data_2026_05_06.csv')   # ← 어떤 데이터?
df = df.dropna()                                       # ← 어떻게 처리?
X, y = df.drop('label', axis=1), df['label']

model = RandomForestClassifier(n_estimators=100)       # ← 하이퍼파라미터?
model.fit(X, y)
print(accuracy_score(y, model.predict(X)))             # ← train으로 예측? 누수!
# 0.88

# 노트북의 한계 (실행 코드 아님 — 설명)
# - 데이터 출처 / 버전 불명
# - 전처리 단계 재현 어려움
# - 평가 방식 잘못됨 (overfit 위험)
# - 모델 어디 저장? 어떻게 다시 로드?
# - production은 어떻게?`,
        },
        focus: 'notebook',
      },
      {
        title: 'Step 2. 운영의 충격 — "다음날엔 70%로 떨어짐"',
        desc: '모델을 production에 올렸는데 며칠 뒤 정확도가 70%로 추락. 데이터 분포가 바뀌었나? 모델이 잘못 배포됐나? 누가 마지막에 학습했는지도 모름. 노트북 시절 자신감의 대가.',
        block: {
          kind: 'shell',
          code: `# 운영 환경에서 흔한 사고

✗ "어제까지 88%였는데 오늘 70%네요" — 데이터 드리프트
✗ "이 모델 누가 학습한 거지?" — 추적 불가
✗ "노트북 다시 돌리니 결과가 다른데?" — 재현 불가
✗ "모델 v3와 v2 어떤 차이?" — 비교 불가
✗ "롤백 어떻게?" — 이전 모델 어디?
✗ "왜 5xx 오류 폭증?" — 리소스 한계 모름

# 노트북 ≠ Production
# 갭을 메우는 게 MLOps`,
        },
        focus: 'shock',
      },
      {
        title: 'Step 3. MLOps 4축 자동화',
        desc: 'MLOps는 ML 라이프사이클을 4축으로 자동화한다. 데이터 / 학습 / 배포 / 모니터링 각각이 코드+CI/CD로 묶여 있다. 사람이 손으로 하던 일을 파이프라인이 대신.',
        block: {
          kind: 'yaml',
          code: `# 4축 자동화

1. Data
   - 데이터 버전(DVC) + Feature Store
   - 학습/평가 split 일관성
   - "어떤 데이터로 학습?" 답을 저장

2. Training
   - 학습 파이프라인 자동 실행 (Airflow/Kubeflow)
   - 하이퍼파라미터 / 메트릭 추적 (MLflow)
   - 학습 환경 컨테이너화

3. Deployment
   - 모델 레지스트리 (MLflow Registry)
   - Canary/Shadow/A/B 배포 전략
   - Triton/KServe로 표준 서빙

4. Monitoring
   - 추론 지연 / 정확도 / 드리프트 추적
   - 임계 초과 시 자동 알림
   - Retraining 트리거 자동 실행`,
        },
        focus: 'automation',
      },
      {
        title: 'Step 4. 재현성 + 모니터링 = 안심하고 배포',
        desc: '4축이 갖춰지면 "어제 학습한 모델 그대로 다시 학습 가능", "어떤 모델이 떠 있는지 확인 가능", "문제 시 즉시 롤백" 모두 가능. ML이 SW처럼 운영 가능한 자산이 된다.',
        block: {
          kind: 'shell',
          code: `# MLOps가 갖춰진 후

✓ 재현성: git commit + DVC tag → 같은 모델 재학습
✓ 추적성: MLflow run → 어떤 데이터/파라미터/메트릭
✓ 자동화: PR merge → CI 학습 → Canary 배포 → 검증 → 100%
✓ 모니터링: 정확도 drop 감지 → Slack 알림 → 자동 롤백
✓ 거버넌스: 어떤 모델이 어떤 데이터로 학습됐는지 감사 로그
✓ 협업: 데이터 사이언티스트 ↔ MLOps 엔지니어 분리 가능

# 이 학습 자료의 길
Part I 개론 → II 데이터+학습 → III 배포 → IV 모니터링 → V 도구
# 다음(I-1-2)에서는 ML이 일반 SW와 무엇이 본질적으로 다른지 본다`,
        },
        focus: 'safety',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#86efac' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const STAGES = [
      { key: 'notebook',   emoji: '📓', name: '노트북 실험',  note: '"내 컴퓨터에선 됨"' },
      { key: 'shock',      emoji: '💥', name: '운영 충격',    note: '추적/재현 불가' },
      { key: 'automation', emoji: '⚙️', name: '4축 자동화',  note: '데이터/학습/배포/모니터링' },
      { key: 'safety',     emoji: '🛡️', name: '안전한 운영', note: '재현성 + 모니터링' },
    ];

    function StageCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🏥 수술실 안전수칙 (MLOps 필요성)</div>
          <div className="grid grid-cols-4 gap-2">
            {STAGES.map((s) => {
              const isActive = focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-fuchsia-100 border-2 border-fuchsia-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{s.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{s.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1 leading-tight">{s.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">MLOps란 무엇인가</h1>
                <p className="text-sm text-slate-500 mt-1">수술실 안전수칙 — 노트북 실험 vs 운영의 무게 차이</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <StageCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'safety' && (
              <div className="bg-fuchsia-50 border-2 border-fuchsia-300 rounded-xl p-3 mb-6 text-xs text-fuchsia-900">
                💡 다음(I-1-2)에서는 ML이 일반 SW와 본질적으로 다른 이유를 본다 — 키우는 식물 vs 가전제품 비유
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
