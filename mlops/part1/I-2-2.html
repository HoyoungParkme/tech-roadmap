<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLOps 학습 — 성숙도 모델 (Level 0~2)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    I-2-2. 성숙도 모델 (Google MLOps Maturity Level 0~2)
    학습 목표: 조직의 ML 자동화 수준 — Level 0(수동) / Level 1(ML 파이프라인) / Level 2(CI/CD/CT)
    핵심 비유: "걷기 → 자전거 → 자동차" 자동화 진화
    구조: 4 카드 (level0 / level1 / level2 / compare)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Level 0 — "걷기" (수동 프로세스)',
        desc: '데이터 사이언티스트가 노트북에서 학습 → .pkl 저장 → 운영팀에 메일 → 운영팀이 손으로 배포. 빠른 PoC엔 OK지만 모델 갱신이 분기에 한 번. drift 발생 시 한참 후 알아챈다.',
        block: {
          kind: 'shell',
          code: `# Level 0 — 수동 프로세스의 일과
# ───────────────────────────────────────
# 월요일: 데이터 사이언티스트
$ jupyter notebook research/fraud_v2.ipynb
# - 노트북 셀 위에서 아래로 한 번 돌림
# - "정확도 0.91 좋네" → 만족

# 화요일: 모델 파일 공유
$ aws s3 cp model.pkl s3://team/fraud_v2_2026_04_29.pkl
$ slack-cli post "@ops 새 모델 올렸음, 배포 부탁"

# 수요일: 운영팀이 손으로 배포
- pkl 다운로드 → docker 이미지에 COPY → 빌드 → push
- Kubernetes deployment.yaml 수정 → kubectl apply
- "잘 떴는지" curl 한번 때려보고 끝

# 한계 — 사고 시나리오
✗ 학습 환경 != 운영 환경 (sklearn 버전 차이)
✗ 어떤 데이터로 학습? → 노트북 cell 어디 적혀있더라
✗ 6개월 후 재학습? → 그때 데이터 사이언티스트 퇴사
✗ drift 발생? → 다음 분기 회의에서 "어 정확도가..."

# Level 0의 진단
- 학습 / 배포가 사람 손에 묶여 있다
- 한 사람이 빠지면 전체가 멈춘다
- 운영 사고는 사용자 불만 → 사후 발견`,
        },
        focus: 'level0',
      },
      {
        title: 'Step 2. Level 1 — "자전거" (ML Pipeline 자동화)',
        desc: '학습 자체를 파이프라인화 → Airflow DAG로 매주 자동 실행. 데이터 도착 → 자동 학습 → 평가 통과 시 Registry 등록까지. 사람 개입은 Stage 전환(검증 게이트) 한 군데로 줄어든다.',
        block: {
          kind: 'python',
          code: `# Level 1 — Airflow DAG로 학습 자동화
from airflow import DAG
from airflow.operators.python import PythonOperator
from datetime import datetime, timedelta

with DAG(
    "fraud_retrain_weekly",
    schedule="0 3 * * MON",          # 매주 월요일 새벽 3시
    start_date=datetime(2026, 1, 1),
    catchup=False,
) as dag:

    # 1. 신규 데이터 도착 확인 + DVC pull
    fetch = PythonOperator(
        task_id="fetch_data",
        python_callable=lambda: dvc_pull("data/raw"),
    )

    # 2. 전처리 (Feature Store materialize)
    prepare = PythonOperator(
        task_id="prepare",
        python_callable=run_feature_pipeline,
    )

    # 3. 학습 + MLflow 기록
    train = PythonOperator(
        task_id="train",
        python_callable=train_with_mlflow,
    )

    # 4. 평가 게이트 — holdout AUC > 0.88 통과 시만 등록
    evaluate = PythonOperator(
        task_id="evaluate_and_register",
        python_callable=evaluate_then_register,
    )

    fetch >> prepare >> train >> evaluate

# 사람 개입은 단 1군데
# - Staging 모델 검토 후 Production 전환 버튼 클릭
# - 그 외 모든 단계는 자동
# 모델 갱신 주기: 분기 -> 주`,
        },
        focus: 'level1',
      },
      {
        title: 'Step 3. Level 2 — "자동차" (CI/CD/CT 완전 자동)',
        desc: '코드 push → CI 빌드 → 학습 → 평가 → Canary 배포 → 자동 검증 → 100% rollout. CT(Continuous Training)는 데이터/drift 트리거. 사람 개입 없이 모델이 코드와 같은 속도로 흐른다.',
        block: {
          kind: 'yaml',
          code: `# .github/workflows/ml-pipeline.yml
name: ML CI/CD/CT
on:
  push:
    branches: [main]
    paths: ["src/**", "configs/**"]
  schedule:
    - cron: "0 3 * * MON"             # CT: 주간 자동 재학습
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install -r requirements.txt
      - run: pytest tests/             # 코드 단위 테스트

  train:
    needs: build
    runs-on: [self-hosted, gpu]
    steps:
      - run: dvc pull
      - run: python -m src.train       # MLflow run 자동 생성
      - run: python -m src.evaluate    # 평가 게이트
        env:
          MIN_AUC: "0.88"

  deploy:
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Canary 5%
        run: kubectl apply -f k8s/canary-5pct.yaml
      - name: Wait + verify metrics
        run: python scripts/check_canary.py --threshold 0.01
      - name: Promote 100%
        run: kubectl apply -f k8s/prod-100pct.yaml
      - name: Auto rollback on failure
        if: failure()
        run: kubectl rollout undo deployment/fraud-detector

# 결과
# - 코드 push -> 30분 후 production에 새 모델
# - 사람 개입 0 (단, model card 검토만 분기 1회)
# - drift 발생 -> CT 자동 트리거 -> 재학습 -> 자동 배포`,
        },
        focus: 'level2',
      },
      {
        title: 'Step 4. 비교 — "어디부터 시작할까"',
        desc: '모든 팀이 Level 2부터 시작할 필요 없다. 모델 1~2개 / 갱신 분기 1회 → Level 0 OK. 모델 3+개 / 주간 갱신 → Level 1. 일/시간 단위 갱신 + 다수 모델 → Level 2 필수. 단계적 진화.',
        block: {
          kind: 'shell',
          code: `# Level별 트레이드오프 비교표
# ───────────────────────────────────────────────────
# 항목           Level 0       Level 1        Level 2
# ───────────────────────────────────────────────────
# 모델 갱신 주기  분기/년       주              일/시간
# 갱신 비용      8시간 사람일   30분 자동       즉시
# 사고 발견      사용자 불만   모니터링 알람   자동 롤백
# 재현성         낮음          중간 (DVC+ML)   높음 (전 자산)
# 초기 구축 비용  매우 낮음     중간 (Airflow)  높음 (CI/CD)
# 운영 비용      높음(사람)    중간            낮음
# 적합 규모     모델 1-2개    모델 3-10개    모델 10+개

# "어디부터?" 가이드
# ───────────────────────────────────────────────────
[ ] 모델이 1-2개이고 갱신이 분기 미만인가?
    -> Level 0 유지하되 git + MLflow Tracking은 도입

[ ] 모델이 3개 이상이고 주 단위 갱신이 필요한가?
    -> Level 1: Airflow + Feature Store + Registry

[ ] 모델이 10개 이상 또는 시간 단위 갱신이 필요한가?
    -> Level 2: GitHub Actions + Canary + 자동 롤백

# 흔한 실수
✗ Level 0에서 곧장 Level 2로 점프 (도구만 깔고 운영 X)
✗ Level 1을 "임시"로 두고 영원히 머무르기
✗ 비즈니스 임팩트가 작은 모델에 Level 2 과투자

# 권장 진화 경로
Level 0 (PoC 1-2개월)
  -> Level 1 (모델 안정화 + 주간 갱신, 6-12개월)
  -> Level 2 (실시간/다중 모델 단계, 12개월+)`,
        },
        focus: 'compare',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const MATURITY = [
      { key: 'level0',  emoji: '🚶', name: 'Level 0',  note: '수동 (notebook)' },
      { key: 'level1',  emoji: '🚲', name: 'Level 1',  note: 'ML Pipeline (Airflow)' },
      { key: 'level2',  emoji: '🚗', name: 'Level 2',  note: 'CI/CD/CT (자동)' },
      { key: 'compare', emoji: '📊', name: '비교',     note: '어디부터 시작?' },
    ];

    function MaturityCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🚗 걷기 → 자전거 → 자동차 (자동화 진화)</div>
          <div className="grid grid-cols-4 gap-2">
            {MATURITY.map((m) => {
              const isActive = focus === m.key;
              return (
                <div
                  key={m.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-fuchsia-100 border-2 border-fuchsia-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{m.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{m.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1 leading-tight">{m.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">성숙도 모델 (Level 0~2)</h1>
                <p className="text-sm text-slate-500 mt-1">걷기 → 자전거 → 자동차 — 조직의 ML 자동화 수준</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <MaturityCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'compare' && (
              <div className="bg-fuchsia-50 border-2 border-fuchsia-300 rounded-xl p-3 mb-6 text-xs text-fuchsia-900">
                💡 Part I 완성. 다음(Part II)에서는 데이터 & 학습 파이프라인 — DVC, Feature Store, Airflow, MLflow
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
