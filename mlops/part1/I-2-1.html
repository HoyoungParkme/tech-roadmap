<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLOps 학습 — I-2-1. ML 라이프사이클 6단계</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    I-2-1. ML 라이프사이클 6단계
    학습 목표: ML 사이클(수집→전처리→학습→평가→배포→모니터링)을 시각적 노드 그래프로 이해
    핵심 비유: 식물 키우기 — 씨앗(수집) → 흙 다지기(전처리) → 자라기(학습) → 수확(평가) → 출하(배포) → 관찰(모니터링) → 다시 씨앗
    패턴: fastapi v1 패턴 — 좌(LiveDataPane: 6 노드 파이프라인 그래프) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 6 노드 파이프라인 메타 (고정)
    // ─────────────────────────────────────────────────────
    const PIPELINE = [
      { key: 'collect',  emoji: '📥', name: 'Collect',  sub: '씨앗 모으기' },
      { key: 'prepare',  emoji: '🧹', name: 'Prepare',  sub: '흙 다지기' },
      { key: 'train',    emoji: '🎓', name: 'Train',    sub: '자라기' },
      { key: 'eval',     emoji: '🔍', name: 'Eval',     sub: '수확 검사' },
      { key: 'deploy',   emoji: '🚀', name: 'Deploy',   sub: '출하' },
      { key: 'monitor',  emoji: '📡', name: 'Monitor',  sub: '관찰 → 다시 씨앗' },
    ];

    // ─────────────────────────────────────────────────────
    // STEPS — 4 카테고리 진행
    //  Step1: collect/prepare 활성
    //  Step2: train/eval 활성
    //  Step3: deploy/monitor 활성
    //  Step4: loop — monitor → collect 다시 (사이클)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Collect → Prepare — "씨앗 모으기 + 흙 다지기"',
        desc: '사이클의 시작. DB / 외부 API / 이벤트 로그에서 raw 데이터를 모으고 라벨을 단다(DVC로 sha 추적). 결측·이상치를 정리하고 Feature Store에 등록 — 학습/서빙 동일 정의로 "training-serving skew" 사고를 막는다.',
        active: ['collect', 'prepare'],
        done:   [],
        focus:  'prepare',
        loop:   false,
        code: {
          lang: 'python',
          filename: 'pipeline/01_collect_prepare.py',
          lines: [
            '# Step 1. 데이터 수집 + 전처리 + Feature Store 등록',
            'import pandas as pd',
            'from sklearn.preprocessing import StandardScaler',
            'from feast import FeatureStore',
            '',
            '# 1) 수집 — DB + 외부 API + 라벨 (DVC로 sha 추적)',
            '#    $ dvc add data/raw/  →  data/raw.dvc  hash: 7c9d4b8f...',
            'df = pd.read_csv("data/raw/tx_2026_04.csv")',
            'labels = pd.read_csv("data/raw/labels.csv")',
            '',
            '# 2) 결측치 / 이상치 처리',
            'df = df[df["amount"] > 0]                       # 음수 금액 제거',
            'df["device"] = df["device"].fillna("unknown")    # 범주형 결측',
            '',
            '# 3) Feature engineering (도메인 지식)',
            'df["hour"]       = pd.to_datetime(df["created_at"]).dt.hour',
            'df["amount_log"] = (df["amount"] + 1).apply("log")',
            'df["is_night"]   = df["hour"].between(0, 5).astype(int)',
            '',
            '# 4) 스케일링 + Feature Store 등록 (학습/서빙 동일 정의)',
            'scaler = StandardScaler()',
            'df[["amount_log", "hour"]] = scaler.fit_transform(df[["amount_log", "hour"]])',
            '',
            'fs = FeatureStore(repo_path="feature_repo/")',
            'fs.apply([fraud_feature_view])',
            'fs.materialize_incremental(end_date=pd.Timestamp.now())',
          ],
          highlight: [6, 12, 13, 23, 24],
        },
      },
      {
        title: 'Step 2. Train → Eval — "자라기 + 수확 검사"',
        desc: 'sklearn / xgboost로 모델을 fit하고 시간 기반 cross-validation + holdout으로 평가. holdout은 마지막에 단 한 번만 사용 — 반복 사용 시 누수. MLflow로 파라미터 / 메트릭 / 아티팩트 자동 기록.',
        active: ['train', 'eval'],
        done:   ['collect', 'prepare'],
        focus:  'eval',
        loop:   false,
        code: {
          lang: 'python',
          filename: 'pipeline/02_train_eval.py',
          lines: [
            '# Step 2. 모델 학습 + Holdout 평가 (MLflow 추적)',
            'import mlflow',
            'from sklearn.ensemble import GradientBoostingClassifier',
            'from sklearn.model_selection import TimeSeriesSplit, cross_val_score',
            'from sklearn.metrics import roc_auc_score',
            '',
            'X_train, y_train     = load_features(period="2026-01..2026-03")',
            'X_holdout, y_holdout = load_features(period="2026-04")  # 시간 기반 split',
            '',
            'with mlflow.start_run(run_name="fraud-2026-04"):',
            '    mlflow.log_params({"max_depth": 5, "n_estimators": 200})',
            '    model = GradientBoostingClassifier(max_depth=5, n_estimators=200)',
            '',
            '    # 1) Cross-validation (시간 순서 유지)',
            '    cv = TimeSeriesSplit(n_splits=5)',
            '    cv_scores = cross_val_score(model, X_train, y_train, cv=cv, scoring="roc_auc")',
            '    mlflow.log_metric("cv_auc_mean", cv_scores.mean())',
            '',
            '    # 2) 최종 학습 + Holdout 평가 — 단 한 번만!',
            '    model.fit(X_train, y_train)',
            '    y_pred = model.predict_proba(X_holdout)[:, 1]',
            '    holdout_auc = roc_auc_score(y_holdout, y_pred)',
            '    mlflow.log_metric("holdout_auc", holdout_auc)',
            '    mlflow.sklearn.log_model(model, "model")',
            '',
            '# CV AUC: 0.913 ± 0.012 / Holdout AUC: 0.907 → 일관됨, 통과',
          ],
          highlight: [15, 16, 19, 20, 21],
        },
      },
      {
        title: 'Step 3. Deploy → Monitor — "출하 + 관찰"',
        desc: '평가 통과 모델을 Registry에 Production으로 등록 → 서빙. 운영 코드는 alias만 참조(버전 하드코딩 금지). Prometheus로 latency / error / accuracy를 실시간 추적, drift 감지 시 알람.',
        active: ['deploy', 'monitor'],
        done:   ['collect', 'prepare', 'train', 'eval'],
        focus:  'monitor',
        loop:   false,
        code: {
          lang: 'python',
          filename: 'pipeline/03_deploy_monitor.py',
          lines: [
            '# Step 3. Registry 등록 + 서빙 + 모니터링',
            'import mlflow',
            'from mlflow import MlflowClient',
            'from prometheus_client import Counter, Histogram',
            '',
            '# 1) Registry 등록 + Production stage 전환',
            'client = MlflowClient()',
            'mv = mlflow.register_model("runs:/abc123/model", "fraud-detector")',
            'client.transition_model_version_stage(',
            '    name="fraud-detector", version=mv.version,',
            '    stage="Production", archive_existing_versions=True,',
            ')',
            '',
            '# 2) 운영 — alias만 참조 (버전 하드코딩 금지)',
            'model = mlflow.pyfunc.load_model("models:/fraud-detector/Production")',
            '',
            '# 3) 추론 + 메트릭 수집 (Prometheus)',
            'predictions = Counter("ml_predictions_total", "Total", ["model"])',
            'latency     = Histogram("ml_latency_seconds", "Latency", ["model"])',
            '',
            '@app.post("/predict")',
            'def predict(payload: dict):',
            '    start = time.time()',
            '    score = model.predict([payload])[0]',
            '    predictions.labels(model="fraud").inc()',
            '    latency.labels(model="fraud").observe(time.time() - start)',
            '    return {"fraud_score": float(score)}',
          ],
          highlight: [9, 10, 11, 14, 15, 24, 25],
        },
      },
      {
        title: 'Step 4. Loop — "다시 씨앗" (사이클은 끊임없이 돈다)',
        desc: 'Monitor가 drift를 감지하면 Airflow DAG으로 재학습 자동 트리거 — Monitor → Collect로 화살표가 다시 이어진다. 일반 SW는 "출시 = 끝", ML은 "출시 = 새 사이클의 시작". 6단계 무한 루프가 MLOps의 본질.',
        active: ['monitor', 'collect'],
        done:   ['collect', 'prepare', 'train', 'eval', 'deploy', 'monitor'],
        focus:  'loop',
        loop:   true,
        code: {
          lang: 'python',
          filename: 'pipeline/04_drift_retrain.py',
          lines: [
            '# Step 4. Drift 감지 → 재학습 자동 트리거 (Monitor → Collect 루프)',
            'from evidently.metrics import DataDriftPreset',
            'from evidently.report import Report',
            'from airflow_client import trigger_dag',
            '',
            '# 1) 입력 분포 변화(drift) 자동 감지',
            'report = Report(metrics=[DataDriftPreset()])',
            'report.run(reference_data=X_train_ref, current_data=X_recent_prod)',
            '',
            'if report.as_dict()["metrics"][0]["result"]["dataset_drift"]:',
            '    # 2) 재학습 DAG 자동 실행 — Collect 단계로 다시!',
            '    trigger_dag("retrain_fraud_model")',
            '    notify_slack("#ml-ops", "drift detected -> retrain triggered")',
            '',
            '# ─────────────────────────────────────────────',
            '#   Collect → Prepare → Train → Eval → Deploy → Monitor',
            '#      ▲                                            │',
            '#      └────────  drift / 신규 데이터  ──────────────┘',
            '# ─────────────────────────────────────────────',
            '',
            '# 핵심 — 일반 SW vs ML',
            '#   일반 SW: 출시 = 끝',
            '#   ML    : 출시 = 새 사이클의 시작 (무한 루프)',
            '',
            '# 그래서 "MLOps"는 코드/모델/데이터 3축을 동시에 운영하는 학문',
          ],
          highlight: [10, 11, 12, 13, 17, 18, 22, 23],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 노드 상태별 스타일 (정적 Tailwind — purge 안전)
    // ─────────────────────────────────────────────────────
    const NODE_STYLE = {
      idle:   { box: 'bg-slate-50 border-slate-300',           text: 'text-slate-500',     ring: '' },
      done:   { box: 'bg-emerald-50 border-emerald-400',       text: 'text-emerald-700',   ring: '' },
      active: { box: 'bg-fuchsia-100 border-fuchsia-500',      text: 'text-fuchsia-800',   ring: 'ring-4 ring-fuchsia-300 scale-105' },
    };

    function nodeState(key, step) {
      if (step.active.includes(key)) return 'active';
      if (step.done.includes(key))   return 'done';
      return 'idle';
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 6 노드 파이프라인 그래프 (3x2 grid + 화살표)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🌱 ML 라이프사이클 파이프라인</h2>
            <span className="text-[10px] text-slate-400 font-mono">6 stages · cyclic</span>
          </div>

          {/* 3 x 2 노드 그리드 */}
          <div className="grid grid-cols-3 gap-x-2 gap-y-3">
            {PIPELINE.map((node, i) => {
              const state = nodeState(node.key, step);
              const style = NODE_STYLE[state];
              const isActive = state === 'active';
              const isDone   = state === 'done';
              return (
                <div key={node.key} className="relative">
                  <div
                    className={`rounded-lg border-2 p-3 text-center transition-all duration-500 ${style.box} ${style.ring}`}
                  >
                    <div className="flex items-center justify-center gap-1">
                      <span className="text-xl" aria-hidden="true">{node.emoji}</span>
                      {isDone && (
                        <span className="text-emerald-600 font-bold text-xs" aria-label="완료">✓</span>
                      )}
                    </div>
                    <div className={`text-xs font-bold mt-1 ${style.text}`}>{node.name}</div>
                    <div className={`text-[10px] mt-0.5 ${style.text} opacity-75`}>{node.sub}</div>
                    <div className="text-[9px] font-mono mt-1 text-slate-400">stage {i + 1}</div>
                  </div>

                  {/* 가로 화살표 — 같은 행의 다음 노드로 (i=0,1,3,4) */}
                  {i % 3 !== 2 && (
                    <div
                      className="absolute top-1/2 -translate-y-1/2 right-[-12px] z-10 text-slate-400 text-lg font-bold"
                      aria-hidden="true"
                    >
                      →
                    </div>
                  )}

                  {/* 행 끝(i=2)에서 다음 행으로 내려가는 ↓ 화살표 */}
                  {i === 2 && (
                    <div
                      className="absolute -bottom-3 right-2 text-slate-400 text-sm font-bold"
                      aria-hidden="true"
                    >
                      ↓
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* 루프 화살표 — Step 4에서 강조 (Monitor → Collect) */}
          <div className={`mt-4 rounded-lg border-2 border-dashed p-3 transition-all duration-500 ${step.loop ? 'border-fuchsia-500 bg-fuchsia-50' : 'border-slate-200 bg-slate-50'}`}>
            <div className={`flex items-center justify-center gap-2 text-xs font-mono ${step.loop ? 'text-fuchsia-800 font-bold' : 'text-slate-500'}`}>
              <span>📡 Monitor</span>
              <span className={`${step.loop ? 'animate-pulse' : ''} text-base`}>↺</span>
              <span>📥 Collect</span>
              <span className="ml-2 text-[10px]">— drift / 신규 데이터로 다시 사이클 시작</span>
            </div>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-slate-200 border border-slate-300"></span>대기
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-fuchsia-300 border border-fuchsia-500"></span>진행 중
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-emerald-300 border border-emerald-400"></span>완료 ✓
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        codeRef.current.removeAttribute('data-highlighted');
        codeRef.current.className = `language-${code.lang}`;
        codeRef.current.textContent = code.lines.join('\n');
        window.hljs.highlightElement(codeRef.current);
        setRenderedLines(codeRef.current.innerHTML.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code (innerHTML 추출) */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-fuchsia-500/10 border-l-2 border-fuchsia-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 — 단계 번호 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-fuchsia-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. MLOps 개론 &gt; Chapter 2. ML 워크플로</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">ML 라이프사이클 6단계</h1>
                  <p className="text-sm text-slate-500 mt-0.5">식물 키우기 사이클 — 수집 → 전처리 → 학습 → 평가 → 배포 → 모니터링 (그리고 다시 수집)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-fuchsia-50 border-2 border-fuchsia-300 rounded-xl p-3 text-sm text-fuchsia-900">
                💡 다음(I-2-2)에서는 <strong>성숙도 모델 Level 0~2</strong>
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-fuchsia-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-fuchsia-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-fuchsia-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-fuchsia-600 text-white hover:bg-fuchsia-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./I-2-2.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">I-2-2 성숙도 모델 Level 0~2 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
