<head>
  <meta charset="UTF-8" />

  <title>MLOps 학습 — I-1-2. ML vs 일반 SW의 차이</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>

<body>
  <div id="root"></div>

  <!--
    I-1-2. ML vs 일반 SW의 차이
    학습 목표: 코드 외에 데이터/모델까지 버전 관리해야 하는 이유와 데이터 드리프트의 본질 이해.
    핵심 비유: 가전제품(고정) vs 키우는 식물(데이터에 따라 변함, 시들 수 있음)
    패턴: fastapi v1 패턴 — 좌(LiveDataPane: 정확도 시계열 + 분포 막대) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. 일반 SW — "가전제품"',
        desc: '코드 = 사양서. 같은 입력 → 같은 출력. 1년 후에도 같은 결과. 정확도 95%가 평행선처럼 일정하다. 운영 = 코드(git)만 버전 관리하면 충분 — 가전제품처럼 사양이 고정되어 있다.',
        mode: 'appliance',
        // 정확도 시계열: 12개월 95% 평행선
        accuracySeries: [95, 95, 95, 95, 95, 95, 95, 95, 95, 95, 95, 95],
        // 분포 막대: 학습 시점 vs 현재 (동일)

          ref:     [20, 25, 30, 15, 10],
          current: [20, 25, 30, 15, 10],
          drifted: false,
        },
        retrainAt: null,
        // 3축 카드 (Step 3 전용)
        axisCards: null,
        code: {
          lang: 'python',
          filename: 'tax_calc.py',
          lines: [

            '',
            '# 1년 전:  calculate_tax(1000) → 150',
            '# 오늘:    calculate_tax(1000) → 150',

            '#                                   ↑ 변하지 않는다',
            '',
            '# 운영 = 코드 버전 관리만으로 충분',

            'a3f8e21  fix: tax calc rounding',
            '7c9d4b2  feat: add country code',
            '5e1a209  initial',
            '',
            '# git commit 하나면 모든 동작이 재현된다.',
            '# → 입력이 같으면 출력도 같다 (deterministic)',
          ],
          highlight: [2, 3, 4, 11, 17],
        },
      },
      {
        title: 'Step 2. ML — "키우는 식물"',
        desc: '같은 모델 코드라도 다른 데이터로 학습하면 다른 모델이 나온다. 시간이 지나면 정확도가 95→90→80%로 하강한다 — 사용자 행동 변화, 새 트렌드 등으로 데이터 분포가 바뀌기 때문. 코드만 git에 두면 모델을 재현할 수 없다.',
        mode: 'plant',
        accuracySeries: [95, 95, 94, 93, 92, 90, 88, 85, 83, 82, 81, 80],
        distribution: {
          ref:     [20, 25, 30, 15, 10],
          current: [20, 25, 30, 15, 10],
          drifted: false,
        },
        retrainAt: null,
        axisCards: null,
        code: {
          lang: 'python',
          filename: 'fraud_model.py',
          lines: [
            '# ML 모델 — 키우는 식물처럼 데이터에 따라 자란다',
            'from sklearn.ensemble import RandomForestClassifier',
            '',
            'model = RandomForestClassifier()',
            'model.fit(X_train, y_train)   # ← 어떤 X_train?',
            '',
            '# 같은 코드, 다른 데이터 → 다른 모델',
            '# 1월 학습 (X_train_jan):  predict("user-A") → "spam"',
            '# 6월 학습 (X_train_jun):  predict("user-A") → "ham"',
            '#                                 ↑ 같은 입력, 다른 결과',
            '',
            '# 시간이 지나면 정확도가 하강한다',
            '#   1개월차:  95%',
            '#   3개월차:  92%',
            '#   6개월차:  88%',
            '#   12개월차: 80%  ← 식물이 시들고 있다',
            '',
            '# 데이터 분포가 변하기 때문',
            '#  · 사용자 행동 변화 (계절성)',
            '#  · 세상의 변화 (새 트렌드, 사건)',
            '#  · 시스템 변화 (UI 변경 → 입력 분포 바뀜)',
            '',
            '# → 코드만 git에 두면 모델을 재현할 수 없다',
          ],
          highlight: [4, 5, 8, 9, 14, 15, 22],
        },
      },
      {
        title: 'Step 3. 3축 버전 관리 — 코드 + 데이터 + 모델',
        desc: 'ML 운영은 3가지를 함께 버전 관리해야 모델을 재현할 수 있다. 코드(git) + 데이터(DVC) + 모델(MLflow Registry). 이 셋이 한 묶음(commit hash + data hash + model id)으로 추적되어야 1년 후에도 정확히 재현 가능하다.',
        mode: 'three-axis',
        accuracySeries: [95, 95, 94, 93, 92, 90, 88, 85, 83, 82, 81, 80],
        distribution: {
          ref:     [20, 25, 30, 15, 10],
          current: [20, 25, 30, 15, 10],
          drifted: false,
        },
        retrainAt: null,
        // 3축 카드 표시
        axisCards: [
          { key: 'code',  emoji: '💻', name: '코드',   tool: 'git',             hash: 'a3f8e21',     note: 'commit hash' },
          { key: 'data',  emoji: '📊', name: '데이터', tool: 'DVC + S3',        hash: '7c9d4b...',  note: 'data hash' },
          { key: 'model', emoji: '🧠', name: '모델',   tool: 'MLflow Registry', hash: 'run/abc123', note: 'model id' },
        ],
        code: {
          lang: 'shell',
          filename: 'three_axis_versioning.sh',
          lines: [
            '# 3축 버전 관리 — 코드 + 데이터 + 모델',
            '',
            '# 1) 코드 (git)',
            '$ git commit -m "feat: add tx_amount feature"',
            'commit a3f8e21',
            '',
            '# 2) 데이터 (DVC + S3)',
            '$ dvc add data/train.csv',
            '$ git add data/train.csv.dvc',
            'data hash: 7c9d4b...        # ← 어떤 데이터로 학습?',
            '',
            '# 3) 모델 (MLflow Registry)',
            'mlflow.sklearn.log_model(model, "fraud-v3")',
            'model_uri: runs:/abc123/model',
            'metrics: { accuracy: 0.91 }',
            '',
            '# 한 묶음으로 추적 (재현 가능한 fingerprint)',
            '{',
            '  "code":       "a3f8e21",',
            '  "data":       "7c9d4b...",',
            '  "model":      "abc123",',
            '  "trained_at": "2026-05-06"',
            '}',
            '',
            '# → 1년 후에도 정확히 같은 모델을 다시 만들 수 있다',
          ],
          highlight: [3, 4, 7, 8, 12, 13, 17, 18, 19, 20, 21, 22],
        },
      },
      {
        title: 'Step 4. Drift 감지 — "식물이 시들기 전에 알아채기"',
        desc: 'production 데이터 분포를 끊임없이 추적해 학습 시 분포(reference)와 비교한다. PSI / KS test로 차이가 임계 초과 = drift 발생 → retrain 자동 트리거. 분포 막대가 변하고 6개월 시점에 retraining 마커가 표시된다.',
        mode: 'drift',
        // retraining 후 정확도 회복: 12개월차에 다시 95%
        accuracySeries: [95, 95, 94, 93, 92, 90, 95, 94, 93, 93, 94, 95],
        distribution: {
          ref:     [20, 25, 30, 15, 10],
          current: [8,  15, 22, 30, 25],   // 분포가 오른쪽으로 이동 (drift)
          drifted: true,
        },
        retrainAt: 6, // 6개월차 retraining 마커
        axisCards: null,
        code: {
          lang: 'python',
          filename: 'drift_detect.py',
          lines: [
            '# Evidently로 데이터 드리프트 감지',
            'from evidently.metrics import DataDriftPreset',
            'from evidently.report import Report',
            '',
            'report = Report(metrics=[DataDriftPreset()])',
            'report.run(',
            '    reference_data=X_train,           # 학습 시 분포',
            '    current_data=X_production_recent  # 최근 production 분포',
            ')',
            '',
            '# 결과 — PSI 값으로 임계치 비교',
            '{',
            '  "drift_detected": True,',
            '  "drifted_features": [',
            '    {"name": "user_age",    "psi": 0.31},  # 임계 0.25 초과',
            '    {"name": "device_type", "psi": 0.42}',
            '  ]',
            '}',
            '',
            '# 자동 트리거 — Slack 알람 + Airflow 재학습 DAG',
            'if drift_detected:',
            '    notify_slack("#ml-ops", "drift detected")',
            '    trigger_airflow_dag("retrain_fraud_v4")',
            '',
            '# 핵심: ML 모델은 시들 수 있다',
            '# → 모니터링 + retraining 자동화는 선택이 아닌 필수',
          ],
          highlight: [4, 5, 6, 7, 8, 14, 15, 20, 21, 22],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 정확도 시계열 그래프 + 분포 막대 + 3축 카드
    // ─────────────────────────────────────────────────────
    function AccuracyChart({ series, retrainAt, mode }) {
      // SVG viewport: 280 x 100
      const W = 280, H = 100, PAD_L = 22, PAD_R = 8, PAD_T = 8, PAD_B = 18;
      const innerW = W - PAD_L - PAD_R;
      const innerH = H - PAD_T - PAD_B;
      const minY = 70, maxY = 100;

      const xAt = (i) => PAD_L + (i / (series.length - 1)) * innerW;
      const yAt = (v) => PAD_T + (1 - (v - minY) / (maxY - minY)) * innerH;

      // path
      const d = series.map((v, i) => `${i === 0 ? 'M' : 'L'} ${xAt(i).toFixed(1)} ${yAt(v).toFixed(1)}`).join(' ');

      // 색상 — mode별
      const stroke =
        mode === 'appliance' ? '#10b981' :     // 평행선: 녹색
        mode === 'plant'     ? '#ef4444' :     // 하강: 빨강
        mode === 'drift'     ? '#a855f7' :     // 회복: 보라
                               '#a855f7';      // three-axis: 보라

      return (
        <div className="bg-slate-900 rounded-lg p-3 border border-slate-700">
          <div className="flex items-center justify-between mb-2">
            <span className="text-xs font-bold text-fuchsia-300">📈 모델 정확도 (12개월)</span>
            <span className="text-[10px] text-slate-400 font-mono">accuracy %</span>
          </div>
          <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto">
            {/* y축 그리드 */}
            {[70, 80, 90, 100].map((v) => (
              <g key={v}>
                <line x1={PAD_L} y1={yAt(v)} x2={W - PAD_R} y2={yAt(v)} stroke="#334155" strokeWidth="0.4" strokeDasharray="2 2" />
                <text x={PAD_L - 3} y={yAt(v) + 3} textAnchor="end" fontSize="7" fill="#64748b">{v}</text>
              </g>
            ))}
            {/* x축 라벨 */}
            <text x={PAD_L} y={H - 4} fontSize="7" fill="#64748b">1m</text>
            <text x={PAD_L + innerW / 2} y={H - 4} fontSize="7" fill="#64748b" textAnchor="middle">6m</text>
            <text x={W - PAD_R} y={H - 4} fontSize="7" fill="#64748b" textAnchor="end">12m</text>

            {/* retraining 마커 */}
            {retrainAt !== null && retrainAt !== undefined && (
              <g>
                <line
                  x1={xAt(retrainAt)} y1={PAD_T}
                  x2={xAt(retrainAt)} y2={H - PAD_B}
                  stroke="#fbbf24" strokeWidth="1" strokeDasharray="2 2"
                />
                <text x={xAt(retrainAt)} y={PAD_T + 8} fontSize="7" fill="#fbbf24" textAnchor="middle" fontWeight="bold">
                  ⚙ retrain
                </text>
              </g>
            )}

            {/* line */}
            <path d={d} fill="none" stroke={stroke} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />

            {/* 점 */}
            {series.map((v, i) => (
              <circle key={i} cx={xAt(i)} cy={yAt(v)} r="1.5" fill={stroke} />
            ))}
          </svg>
          <div className="text-[10px] text-slate-400 mt-1 text-center">
            {mode === 'appliance' && '95% 평행선 — 가전제품처럼 변하지 않는다'}
            {mode === 'plant'     && '95→80% 하강 — 식물이 시들고 있다'}
            {mode === 'three-axis' && '하강 중 — 코드+데이터+모델 추적 필요'}
            {mode === 'drift'     && '6개월차 retrain → 정확도 회복'}
          </div>
        </div>
      );
    }

    function DistributionBars({ ref: refDist, current, drifted }) {
      const labels = ['10–20', '20–30', '30–40', '40–50', '50+'];
      return (
        <div className="bg-slate-900 rounded-lg p-3 border border-slate-700 mt-3">
          <div className="flex items-center justify-between mb-2">
            <span className="text-xs font-bold text-fuchsia-300">📊 user_age 분포</span>
            <span className={`text-[10px] font-bold font-mono px-1.5 py-0.5 rounded ${drifted ? 'bg-red-500/20 text-red-300' : 'bg-emerald-500/20 text-emerald-300'}`}>
              {drifted ? '⚠ DRIFT' : '✓ STABLE'}
            </span>
          </div>
          <div className="space-y-1.5">
            {labels.map((label, i) => {
              const refV = refDist[i];
              const curV = current[i];
              const maxV = Math.max(...refDist, ...current);
              return (
                <div key={label} className="flex items-center gap-2">
                  <span className="text-[9px] text-slate-400 w-10 text-right font-mono">{label}</span>
                  <div className="flex-1 relative h-4 bg-slate-800 rounded">
                    {/* reference (학습 시) */}
                    <div
                      className="absolute top-0 bottom-0 left-0 bg-emerald-500/40 rounded transition-all duration-700"
                      style={{ width: `${(refV / maxV) * 100}%` }}
                    />
                    {/* current (production) */}
                    <div
                      className={`absolute top-0 bottom-0 left-0 ${drifted ? 'bg-fuchsia-500/80' : 'bg-emerald-500/80'} rounded transition-all duration-700`}
                      style={{ width: `${(curV / maxV) * 100}%`, height: '50%' }}
                    />
                  </div>
                  <span className="text-[9px] text-slate-400 w-12 font-mono">
                    {refV}→{curV}%
                  </span>
                </div>
              );
            })}
          </div>
          <div className="flex gap-3 text-[9px] text-slate-400 mt-2 pt-2 border-t border-slate-700">
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-emerald-500/40"></span>학습 시 (ref)</span>
            <span className="flex items-center gap-1"><span className={`w-2 h-2 rounded ${drifted ? 'bg-fuchsia-500/80' : 'bg-emerald-500/80'}`}></span>현재</span>
          </div>
        </div>
      );
    }

    function AxisCards({ cards }) {
      return (
        <div className="bg-slate-900 rounded-lg p-3 border border-slate-700 mt-3">
          <div className="flex items-center justify-between mb-2">
            <span className="text-xs font-bold text-fuchsia-300">📦 3축 버전 관리 (모두 버전 관리)</span>
            <span className="text-[10px] text-slate-400 font-mono">code + data + model</span>
          </div>
          <div className="grid grid-cols-3 gap-2">
            {cards.map((c) => (
              <div key={c.key} className="bg-fuchsia-500/10 border border-fuchsia-500/40 rounded-md p-2">
                <div className="flex items-center gap-1 mb-1">
                  <span>{c.emoji}</span>
                  <span className="text-xs font-bold text-fuchsia-200">{c.name}</span>
                </div>
                <div className="text-[10px] text-slate-300 font-mono">{c.tool}</div>
                <div className="text-[10px] text-emerald-300 font-mono mt-1 truncate">{c.hash}</div>
                <div className="text-[9px] text-slate-500 mt-0.5">{c.note}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🌱 가전제품 vs 키우는 식물</h2>
            <span className="text-[10px] text-slate-400 font-mono">live observation</span>
          </div>

          <AccuracyChart series={step.accuracySeries} retrainAt={step.retrainAt} mode={step.mode} />
          <DistributionBars ref={step.distribution.ref} current={step.distribution.current} drifted={step.distribution.drifted} />
          {step.axisCards && <AxisCards cards={step.axisCards} />}

          {/* mode 요약 박스 */}
          <div className={`mt-4 p-3 rounded-lg text-xs ${
            step.mode === 'appliance' ? 'bg-emerald-50 border border-emerald-300 text-emerald-800' :
            step.mode === 'plant'     ? 'bg-red-50 border border-red-300 text-red-800' :
            step.mode === 'three-axis' ? 'bg-fuchsia-50 border border-fuchsia-300 text-fuchsia-800' :
                                         'bg-fuchsia-50 border-2 border-fuchsia-400 text-fuchsia-900 animate-pulse'
          }`}>
            {step.mode === 'appliance' && (
              <><span className="font-bold">📺 가전제품:</span> 사양 고정 · 입력=출력 일정 · 코드 git만 관리</>
            )}
            {step.mode === 'plant' && (
              <><span className="font-bold">🌱 식물:</span> 데이터에 따라 자라남 · 시간 지나면 시듦 · 코드만으로는 부족</>
            )}
            {step.mode === 'three-axis' && (
              <><span className="font-bold">📦 3축:</span> code(git) + data(DVC) + model(MLflow) 동시 관리</>
            )}
            {step.mode === 'drift' && (
              <><span className="font-bold">⚠ DRIFT:</span> 분포 변화 감지 → retrain 자동 트리거 · 시들기 전에 다시 키운다</>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hidden code (hljs 토큰화용) */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-fuchsia-500/10 border-l-2 border-fuchsia-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-fuchsia-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. MLOps 기초 &gt; Chapter 1. ML이란 무엇인가</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">ML vs 일반 SW의 차이</h1>
                  <p className="text-sm text-slate-500 mt-0.5">키우는 식물 — 데이터에 따라 자라고, 시들 수 있는 모델</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-fuchsia-50 border-2 border-fuchsia-300 rounded-xl p-3 text-sm text-fuchsia-900">
                💡 다음(I-2-1)에서는 <strong>ML 라이프사이클 6단계</strong> — 데이터 수집부터 모니터링까지 한 사이클을 본다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-fuchsia-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-fuchsia-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-fuchsia-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-fuchsia-600 text-white hover:bg-fuchsia-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; I-1-1 MLOps란</a>
              <a href="./I-2-1.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">I-2-1 ML 라이프사이클 6단계 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
