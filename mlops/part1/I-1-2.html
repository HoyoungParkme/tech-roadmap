<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLOps 학습 — ML vs 일반 SW의 차이</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    I-1-2. ML vs 일반 SW의 차이
    학습 목표: 코드 외에 데이터/모델/하이퍼파라미터까지 버전 관리해야 하는 이유, 데이터 드리프트의 본질.
    핵심 비유: "키우는 식물 vs 가전제품"
      - 가전제품(일반 SW): 사양이 고정. 매장에서 산 그대로 동작.
      - 키우는 식물(ML): 데이터(햇빛/물)에 따라 자라남, 시간이 지나면 변함, 시들 수도 있음.
    구조: 4단계 (가전제품 / 식물 / 3축 버전 관리 / 드리프트 감지)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 일반 SW — "가전제품"',
        desc: '코드 = 사양서. 같은 입력에는 같은 출력. 1년 후에도 같은 결과. 버전 관리 = 코드(git)만 하면 충분. 가전제품이 시간이 지나도 같은 동작을 하는 것과 같다.',
        block: {
          kind: 'shell',
          code: `# 일반 SW
def calculate_tax(income):
    return income * 0.15

# 1년 전: tax(1000) → 150
# 오늘:    tax(1000) → 150  (변함 없음)
# 1년 후:  tax(1000) → 150  (변함 없음)

# 운영 = 코드 버전 관리
$ git log --oneline
v1.5.2  fix tax calc  ← 명확한 코드 변경
v1.5.1  add country
v1.5.0  initial`,
        },
        focus: 'appliance',
      },
      {
        title: 'Step 2. ML — "키우는 식물"',
        desc: '같은 모델 코드라도 다른 데이터로 학습하면 다른 모델. 1년 후 같은 입력에도 다른 결과 (데이터 분포 변화 → drift). 코드만 git에 두면 부족 — 데이터+모델 함께 관리 필수.',
        block: {
          kind: 'python',
          code: `# ML 모델
model = RandomForestClassifier()
model.fit(X_train, y_train)        # ← 어떤 X_train?

# 같은 코드, 다른 데이터 → 다른 모델
1월 학습 (X_train_jan):  predict("user-A") → "spam"
6월 학습 (X_train_jun):  predict("user-A") → "ham"
                                              ↑ 같은 입력, 다른 결과!

# 데이터 분포가 변하기 때문 (예시)
- 사용자 행동 변화 (계절성)
- 세상의 변화 (코로나, 새 트렌드)
- 시스템 변화 (UI 변경 → 입력 분포 바뀜)

# → 코드만 git에 두면 모델을 재현할 수 없다`,
        },
        focus: 'plant',
      },
      {
        title: 'Step 3. 3축 버전 관리 — 코드 + 데이터 + 모델',
        desc: 'ML 운영은 3가지를 함께 버전 관리해야 모델을 재현할 수 있다. 코드(git) + 데이터(DVC) + 모델(MLflow Registry). 이 셋이 한 묶음(commit hash + data hash + model id)으로 관리.',
        block: {
          kind: 'shell',
          code: `# 3축 버전 관리

1. 코드 (git)
   $ git commit -m "feat: add new feature engineering"
   commit a3f8e21

2. 데이터 (DVC + S3)
   $ dvc add data/train.csv
   $ git add data/train.csv.dvc
   data hash: 7c9d4b...        ← 어떤 데이터로 학습?

3. 모델 (MLflow Registry)
   model = mlflow.sklearn.log_model(...)
   model_uri: runs:/abc123.../model
   metrics: accuracy=0.91

# 한 묶음으로 추적
{
  "code": "a3f8e21",
  "data": "7c9d4b...",
  "model": "abc123",
  "trained_at": "2026-05-06"
}
# → 1년 후에도 정확히 재현 가능`,
        },
        focus: 'three-axis',
      },
      {
        title: 'Step 4. Drift 감지 — "식물이 시들기 전에 알아채기"',
        desc: 'production 데이터 분포를 끊임없이 추적해 학습 시 분포와 비교. 차이 임계 초과 = drift 발생 → retrain 트리거. PSI / KS test 같은 통계 검정 + 모니터링 도구(Evidently, WhyLabs).',
        block: {
          kind: 'python',
          code: `# 데이터 드리프트 감지 예시 (Evidently)

from evidently.metrics import DataDriftPreset
from evidently.report import Report

report = Report(metrics=[DataDriftPreset()])
report.run(
    reference_data=X_train,        # 학습 시 분포
    current_data=X_production_recent  # 최근 production 분포
)

# 결과
{
  "drift_detected": True,
  "drifted_features": [
    {"name": "user_age", "psi": 0.31},      # ← 임계 0.25 초과
    {"name": "device_type", "psi": 0.42}
  ]
}

# 자동 트리거
if drift.detected:
    notify_slack("#ml-ops", "drift detected")
    trigger_airflow_dag("retrain_model")    # 자동 재학습

# 핵심: ML 모델은 시들 수 있다
# → 모니터링 + retraining 자동화는 선택이 아닌 필수`,
        },
        focus: 'drift',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#86efac' },
    };

    const STAGES = [
      { key: 'appliance',  emoji: '📺', name: '가전제품',     note: '일반 SW: 사양 고정' },
      { key: 'plant',      emoji: '🌱', name: '키우는 식물', note: 'ML: 데이터 따라 변함' },
      { key: 'three-axis', emoji: '📦', name: '3축 버전',     note: '코드+데이터+모델' },
      { key: 'drift',      emoji: '📉', name: 'Drift 감지',    note: '시들기 전 알아채기' },
    ];

    function StageCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🌱 키우는 식물 vs 가전제품</div>
          <div className="grid grid-cols-4 gap-2">
            {STAGES.map((s) => {
              const isActive = focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-fuchsia-100 border-2 border-fuchsia-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{s.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{s.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1 leading-tight">{s.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">ML vs 일반 SW의 차이</h1>
                <p className="text-sm text-slate-500 mt-1">키우는 식물 — 데이터에 따라 자라고 시드는 모델</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <StageCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'drift' && (
              <div className="bg-fuchsia-50 border-2 border-fuchsia-300 rounded-xl p-3 mb-6 text-xs text-fuchsia-900">
                💡 다음(I-2-1)에서는 ML 라이프사이클 6단계 — 데이터 수집부터 모니터링까지 한 사이클을 본다
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
