<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

</head>
<body>
  <div id="root"></div>

  <!--
    V-1-1. MLflow 한 사이클
    학습 목표: MLflow의 4 컴포넌트(Tracking / Projects / Models / Registry)가 한 도구로 묶이는 흐름을 이해
    핵심 비유: 원스톱 실험실 — 기록/패키징/표준 포장/창고 관리가 한 건물 안에서
    패턴: fastapi v1 패턴 — 좌(LiveDataPane: MLflow UI 모방) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (MLflow UI 모방 — 탭/실험표/모델버전)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        focus: 'track',
        title: 'Step 1. Tracking — "실험실 노트에 모든 걸 기록"',
        desc: 'mlflow.start_run() 컨텍스트 안에서 파라미터/메트릭/아티팩트를 자동 기록. 노트북 손글씨 "lr=0.01, acc=0.87"이 사라짐. 표 형태로 비교/검색.',
        runs: [
          { id: 'a3f1...e2', name: 'rf-baseline',   status: 'FINISHED', params: { n_est: 200, max_depth: 8 },  metrics: { acc: 0.91, prec: 0.85 } },
          { id: 'b8c2...91', name: 'rf-deep',       status: 'FINISHED', params: { n_est: 200, max_depth: 16 }, metrics: { acc: 0.93, prec: 0.88 } },
          { id: 'c1d4...77', name: 'rf-tuned',      status: 'RUNNING',  params: { n_est: 400, max_depth: 12 }, metrics: { acc: 0.94, prec: 0.90 } },
        ],
        project: null,
        modelFlavors: [],
        registryStage: null,
        code: {
          lang: 'python',
          filename: 'train.py',
          lines: [
            '# MLflow Tracking — 실험을 자동 기록',
            'import mlflow',
            'from sklearn.ensemble import RandomForestClassifier',
            '',
            'mlflow.set_tracking_uri("http://mlflow-server:5000")',
            'mlflow.set_experiment("fraud-detector")',
            '',
            'with mlflow.start_run(run_name="rf-tuned") as run:',
            '    # 1. 파라미터 (하이퍼파라미터)',
            '    mlflow.log_param("n_estimators", 400)',
            '    mlflow.log_param("max_depth", 12)',
            '    mlflow.log_param("data_version", "v25.3")',
            '',
            '    # 2. 학습',
            '    model = RandomForestClassifier(n_estimators=400, max_depth=12)',
            '    model.fit(X_train, y_train)',
            '',
            '    # 3. 메트릭 (성능 지표)',
            '    mlflow.log_metric("accuracy", 0.94)',
            '    mlflow.log_metric("precision", 0.90)',
            '    mlflow.log_metric("recall", 0.83)',
            '',
            '    # 4. 아티팩트 (그래프, 혼동행렬)',
            '    mlflow.log_artifact("confusion_matrix.png")',
            '',
            '    print(f"Run ID: {run.info.run_id}")',
            '',
            '# UI(http://localhost:5000) 에서 자동 비교',
            '# - 100개 run 표 형태로 한눈에',
            '# - "accuracy 가장 높은 5개" 정렬/필터',
          ],
          highlight: [10, 11, 19, 20, 21, 24],
        },
      },
      {
        focus: 'project',
        title: 'Step 2. Projects — "재현 가능 패키징"',
        desc: 'MLproject YAML에 의존성/엔트리포인트/파라미터 명세. mlflow run . 한 번이면 어디서나 동일 환경(conda/docker)에서 학습. "내 노트북에선 됐는데"가 사라짐.',
        runs: [
          { id: 'a3f1...e2', name: 'rf-baseline',   status: 'FINISHED', params: { n_est: 200, max_depth: 8 },  metrics: { acc: 0.91, prec: 0.85 } },
          { id: 'b8c2...91', name: 'rf-deep',       status: 'FINISHED', params: { n_est: 200, max_depth: 16 }, metrics: { acc: 0.93, prec: 0.88 } },
          { id: 'c1d4...77', name: 'rf-tuned',      status: 'FINISHED', params: { n_est: 400, max_depth: 12 }, metrics: { acc: 0.94, prec: 0.90 } },
        ],
        project: {
          name: 'fraud-detector',
          env: 'conda.yaml',
          entryPoints: [
            { name: 'main',     params: 'data_path, n_estimators, max_depth, lr', cmd: 'python train.py …' },
            { name: 'evaluate', params: 'run_id',                                  cmd: 'python evaluate.py --run-id {run_id}' },
          ],
        },
        modelFlavors: [],
        registryStage: null,
        code: {
          lang: 'yaml',
          filename: 'MLproject',
          lines: [
            '# MLproject — 프로젝트 표준 명세 (저장소 루트)',
            'name: fraud-detector',
            '',
            'conda_env: conda.yaml         # or docker_env: { image: ... }',
            '',
            'entry_points:',
            '  main:',
            '    parameters:',
            '      data_path:    { type: string, default: "data/transactions.csv" }',
            '      n_estimators: { type: int,    default: 200 }',
            '      max_depth:    { type: int,    default: 8 }',
            '      lr:           { type: float,  default: 0.01 }',
            '    command: >',
            '      python train.py',
            '        --data {data_path}',
            '        --n-estimators {n_estimators}',
            '        --max-depth {max_depth}',
            '        --lr {lr}',
            '',
            '  evaluate:',
            '    parameters:',
            '      run_id: string',
            '    command: "python evaluate.py --run-id {run_id}"',
            '',
            '# 실행 — Git URL 직접 또는 로컬 폴더',
            '# $ mlflow run . -P n_estimators=300',
            '# $ mlflow run https://github.com/team/fraud-detector.git -v main',
            '# 어디서 돌려도 동일한 환경 + 동일한 결과',
          ],
          highlight: [4, 6, 7, 13, 20],
        },
      },
      {
        focus: 'model',
        title: 'Step 3. Models — "표준 포장으로 어디든 배달"',
        desc: 'mlflow.<flavor>.log_model 한 줄로 모델을 표준 포맷(pyfunc)으로 저장. 라이브러리(sklearn/xgboost/pytorch)와 무관하게 mlflow.pyfunc.load_model().predict()로 통일된 인터페이스.',
        runs: [
          { id: 'a3f1...e2', name: 'rf-baseline',   status: 'FINISHED', params: { n_est: 200, max_depth: 8 },  metrics: { acc: 0.91, prec: 0.85 } },
          { id: 'b8c2...91', name: 'rf-deep',       status: 'FINISHED', params: { n_est: 200, max_depth: 16 }, metrics: { acc: 0.93, prec: 0.88 } },
          { id: 'c1d4...77', name: 'rf-tuned',      status: 'FINISHED', params: { n_est: 400, max_depth: 12 }, metrics: { acc: 0.94, prec: 0.90 } },
        ],
        project: {
          name: 'fraud-detector',
          env: 'conda.yaml',
          entryPoints: [
            { name: 'main',     params: 'data_path, n_estimators, max_depth, lr', cmd: 'python train.py …' },
            { name: 'evaluate', params: 'run_id',                                  cmd: 'python evaluate.py --run-id {run_id}' },
          ],
        },
        modelFlavors: [
          { key: 'pyfunc',  label: 'pyfunc',  note: '표준 인터페이스 (모든 라이브러리 공통)', primary: true },
          { key: 'sklearn', label: 'sklearn', note: 'model.pkl + sklearn loader',           primary: false },
          { key: 'sig',     label: 'signature', note: 'input/output 스키마 (자동 추론)',     primary: false },
        ],
        registryStage: null,
        code: {
          lang: 'python',
          filename: 'log_model.py',
          lines: [
            '# MLflow Models — 표준 포맷으로 저장/로드',
            'import mlflow',
            'import mlflow.sklearn',
            '',
            'with mlflow.start_run() as run:',
            '    model.fit(X, y)',
            '',
            '    # 라이브러리별 flavor + pyfunc 자동 같이 저장',
            '    mlflow.sklearn.log_model(',
            '        sk_model=model,',
            '        artifact_path="model",',
            '        signature=mlflow.models.infer_signature(X, model.predict(X)),',
            '        input_example=X.iloc[:3],',
            '    )',
            '',
            '# 저장 디렉터리 구조 (자동 생성)',
            '# model/',
            '#   ├─ MLmodel              ← 메타 (flavor, signature)',
            '#   ├─ model.pkl            ← sklearn pickle',
            '#   ├─ conda.yaml           ← 환경 재현용',
            '#   └─ requirements.txt',
            '',
            '# 로드 — 어떤 라이브러리든 동일 인터페이스',
            'loaded = mlflow.pyfunc.load_model(f"runs:/{run.info.run_id}/model")',
            'preds  = loaded.predict(X_new)        # XGBoost/PyTorch도 동일',
            '',
            '# 표준 포맷이라 어디든 배포',
            '# $ mlflow models serve -m runs:/<id>/model -p 5001',
            '# $ mlflow models build-docker -m runs:/<id>/model -n fraud-api',
          ],
          highlight: [9, 12, 24, 25],
        },
      },
      {
        focus: 'registry',
        title: 'Step 4. Registry — "창고 + 단계 관리"',
        desc: 'register_model로 이름(fraud-detector) 부여 → version 자동 증가 → Stage(None/Staging/Production/Archived) 전환으로 운영. 운영 코드는 models:/fraud-detector/Production만 참조.',
        runs: [
          { id: 'a3f1...e2', name: 'rf-baseline',   status: 'FINISHED', params: { n_est: 200, max_depth: 8 },  metrics: { acc: 0.91, prec: 0.85 } },
          { id: 'b8c2...91', name: 'rf-deep',       status: 'FINISHED', params: { n_est: 200, max_depth: 16 }, metrics: { acc: 0.93, prec: 0.88 } },
          { id: 'c1d4...77', name: 'rf-tuned',      status: 'FINISHED', params: { n_est: 400, max_depth: 12 }, metrics: { acc: 0.94, prec: 0.90 } },
        ],
        project: {
          name: 'fraud-detector',
          env: 'conda.yaml',
          entryPoints: [
            { name: 'main',     params: 'data_path, n_estimators, max_depth, lr', cmd: 'python train.py …' },
            { name: 'evaluate', params: 'run_id',                                  cmd: 'python evaluate.py --run-id {run_id}' },
          ],
        },
        modelFlavors: [
          { key: 'pyfunc',  label: 'pyfunc',  note: '표준 인터페이스 (모든 라이브러리 공통)', primary: true },
          { key: 'sklearn', label: 'sklearn', note: 'model.pkl + sklearn loader',           primary: false },
          { key: 'sig',     label: 'signature', note: 'input/output 스키마 (자동 추론)',     primary: false },
        ],
        registryStage: {
          modelName: 'fraud-detector',
          versions: [
            { v: 1, runId: 'a3f1...e2', stage: 'Archived',   acc: 0.91 },
            { v: 2, runId: 'b8c2...91', stage: 'Archived',   acc: 0.93 },
            { v: 3, runId: 'c1d4...77', stage: 'Production', acc: 0.94 },
          ],
          activeStage: 'Production',
        },
        code: {
          lang: 'python',
          filename: 'register.py',
          lines: [
            '# MLflow Model Registry — 이름/버전/Stage 관리',
            'import mlflow',
            'from mlflow import MlflowClient',
            '',
            'client = MlflowClient()',
            '',
            '# 1. 등록 — runs:/<run_id>/model → "fraud-detector" v3',
            'result = mlflow.register_model(',
            '    model_uri=f"runs:/{run_id}/model",',
            '    name="fraud-detector",',
            ')',
            'print(f"Registered v{result.version}")  # v3',
            '',
            '# 2. Staging 으로 승격 (검증용)',
            'client.transition_model_version_stage(',
            '    name="fraud-detector",',
            '    version=3,',
            '    stage="Staging",',
            ')',
            '',
            '# 3. 검증 통과 후 Production + 이전 버전 Archive',
            'client.transition_model_version_stage(',
            '    name="fraud-detector",',
            '    version=3,',
            '    stage="Production",',
            '    archive_existing_versions=True,    # v2 자동 Archive',
            ')',
            '',
            '# 4. 운영 코드 — Stage 만 참조 (버전 하드코딩 금지)',
            'prod = mlflow.pyfunc.load_model("models:/fraud-detector/Production")',
            'score = prod.predict(payload)',
            '',
            '# Stage 흐름',
            '# None → Staging(검증) → Production(서빙) → Archived(롤백 대비)',
            '# v3 등록/승격 → 코드 수정 0줄로 자동 v3 사용',
          ],
          highlight: [8, 22, 25, 26, 30],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // MLflow UI 좌측 탭 메타
    // ─────────────────────────────────────────────────────
    const TABS = [
      { key: 'track',    emoji: '🔬', label: 'Tracking' },
      { key: 'project',  emoji: '📦', label: 'Projects' },
      { key: 'model',    emoji: '🤖', label: 'Models' },
      { key: 'registry', emoji: '📚', label: 'Registry' },
    ];

    const STAGES = ['None', 'Staging', 'Production', 'Archived'];
    const STAGE_STYLE = {
      None:       { bg: 'bg-slate-100', text: 'text-slate-500', border: 'border-slate-300' },
      Staging:    { bg: 'bg-amber-100', text: 'text-amber-800', border: 'border-amber-400' },
      Production: { bg: 'bg-emerald-100', text: 'text-emerald-800', border: 'border-emerald-500' },
      Archived:   { bg: 'bg-slate-200', text: 'text-slate-500', border: 'border-slate-400' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — MLflow UI 모방 (탭 + 실험 표 + 모델 버전)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const focus = step.focus;

      return (
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
          {/* 상단 브랜드 바 */}
          <div className="bg-gradient-to-r from-fuchsia-600 to-fuchsia-500 px-4 py-2.5 flex items-center justify-between">
            <div className="flex items-center gap-2 text-white">
              <span className="text-lg">🌊</span>
              <span className="text-sm font-bold tracking-wide">MLflow</span>
              <span className="text-[10px] text-fuchsia-100 ml-1 font-mono">localhost:5000</span>
            </div>
            <span className="text-[10px] text-fuchsia-100 font-mono">원스톱 실험실</span>
          </div>

          {/* 탭 — 4 컴포넌트 */}
          <div className="flex border-b border-slate-200 bg-slate-50">
            {TABS.map((t) => {
              const isActive = focus === t.key;
              return (
                <div
                  key={t.key}
                  className={`flex-1 px-3 py-2 text-center text-xs font-bold transition-all border-b-2 ${
                    isActive
                      ? 'border-fuchsia-600 text-fuchsia-700 bg-white'
                      : 'border-transparent text-slate-500'
                  }`}
                >
                  <span className="mr-1">{t.emoji}</span>{t.label}
                </div>
              );
            })}
          </div>

          {/* 본문 */}
          <div className="p-4 space-y-4">

            {/* (Step 1+) 실험 Run 표 */}
            <div>
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold text-slate-700">🔬 Experiment: fraud-detector</h3>
                <span className="text-[10px] text-slate-400 font-mono">{step.runs.length} runs</span>
              </div>
              <div className="overflow-hidden rounded-lg border border-slate-200">
                <table className="w-full text-[11px]">
                  <thead className="bg-slate-100 text-slate-600">
                    <tr>
                      <th className="px-2 py-1.5 text-left font-bold">run_id</th>
                      <th className="px-2 py-1.5 text-left font-bold">name</th>
                      <th className="px-2 py-1.5 text-right font-bold">n_est</th>
                      <th className="px-2 py-1.5 text-right font-bold">depth</th>
                      <th className="px-2 py-1.5 text-right font-bold">acc</th>
                      <th className="px-2 py-1.5 text-center font-bold">status</th>
                    </tr>
                  </thead>
                  <tbody>
                    {step.runs.map((r, i) => {
                      const isLatest = i === step.runs.length - 1;
                      const isRunning = r.status === 'RUNNING';
                      return (
                        <tr
                          key={r.id}
                          className={`border-t border-slate-100 transition-all ${
                            isLatest && focus === 'track' ? 'bg-fuchsia-50' : 'bg-white'
                          }`}
                        >
                          <td className="px-2 py-1.5 font-mono text-slate-500">{r.id}</td>
                          <td className="px-2 py-1.5 text-slate-700">{r.name}</td>
                          <td className="px-2 py-1.5 text-right tabular-nums">{r.params.n_est}</td>
                          <td className="px-2 py-1.5 text-right tabular-nums">{r.params.max_depth}</td>
                          <td className="px-2 py-1.5 text-right tabular-nums font-bold text-emerald-700">
                            {r.metrics.acc.toFixed(2)}
                          </td>
                          <td className="px-2 py-1.5 text-center">
                            <span className={`px-1.5 py-0.5 rounded text-[10px] font-bold ${
                              isRunning
                                ? 'bg-amber-100 text-amber-700 animate-pulse'
                                : 'bg-emerald-100 text-emerald-700'
                            }`}>
                              {r.status}
                            </span>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>

            {/* (Step 2+) MLproject YAML + entry points */}
            {step.project && (
              <div>
                <h3 className="text-xs font-bold text-slate-700 mb-2">📦 MLproject — {step.project.name}</h3>
                <div className="rounded-lg border-2 border-slate-200 bg-slate-50 p-3 space-y-2">
                  <div className="flex items-center gap-2 text-[11px]">
                    <span className="font-mono bg-white px-1.5 py-0.5 rounded border border-slate-200 text-slate-600">env</span>
                    <span className="text-slate-700">{step.project.env}</span>
                  </div>
                  <div className="text-[11px] text-slate-600 font-bold mt-2">entry_points:</div>
                  <div className="space-y-1.5">
                    {step.project.entryPoints.map((ep) => (
                      <div
                        key={ep.name}
                        className={`rounded border p-2 ${
                          focus === 'project' && ep.name === 'main'
                            ? 'bg-fuchsia-50 border-fuchsia-300'
                            : 'bg-white border-slate-200'
                        }`}
                      >
                        <div className="flex items-center gap-2">
                          <span className="text-[10px] font-bold text-fuchsia-700 bg-fuchsia-100 px-1.5 py-0.5 rounded font-mono">
                            {ep.name}
                          </span>
                          <span className="text-[10px] text-slate-500 font-mono">params: {ep.params}</span>
                        </div>
                        <div className="text-[10px] text-slate-600 font-mono mt-1 truncate">{ep.cmd}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* (Step 3+) pyfunc 표준 형식 + flavor */}
            {step.modelFlavors.length > 0 && (
              <div>
                <h3 className="text-xs font-bold text-slate-700 mb-2">🤖 Model — pyfunc 표준 포맷</h3>
                <div className="rounded-lg border-2 border-slate-200 bg-slate-50 p-3">
                  <div className="text-[10px] font-mono text-slate-500 mb-2">model/MLmodel</div>
                  <div className="grid grid-cols-3 gap-2">
                    {step.modelFlavors.map((f) => (
                      <div
                        key={f.key}
                        className={`rounded border-2 p-2 text-center transition-all ${
                          f.primary
                            ? 'bg-fuchsia-50 border-fuchsia-400 scale-105'
                            : 'bg-white border-slate-200'
                        }`}
                      >
                        <div className={`text-[10px] font-bold uppercase tracking-wide ${
                          f.primary ? 'text-fuchsia-700' : 'text-slate-600'
                        }`}>
                          {f.label}
                        </div>
                        <div className="text-[9px] text-slate-500 mt-1 leading-tight">{f.note}</div>
                      </div>
                    ))}
                  </div>
                  <div className="mt-2 text-[10px] text-slate-600 font-mono bg-white rounded border border-slate-200 p-1.5">
                    mlflow.pyfunc.load_model(uri).predict(X)
                  </div>
                </div>
              </div>
            )}

            {/* (Step 4) Registry — Stage 진행 + 버전 */}
            {step.registryStage && (
              <div>
                <h3 className="text-xs font-bold text-slate-700 mb-2">
                  📚 Registry — {step.registryStage.modelName}
                </h3>

                {/* Stage 진행 라벨 */}
                <div className="flex items-center gap-1 mb-3">
                  {STAGES.map((s, i) => {
                    const isActive = s === step.registryStage.activeStage;
                    const sty = STAGE_STYLE[s];
                    return (
                      <React.Fragment key={s}>
                        <div
                          className={`flex-1 text-center text-[10px] font-bold py-1.5 rounded border-2 transition-all ${sty.bg} ${sty.text} ${sty.border} ${
                            isActive ? 'scale-105 ring-2 ring-fuchsia-300' : 'opacity-70'
                          }`}
                        >
                          {s}
                        </div>
                        {i < STAGES.length - 1 && (
                          <span className="text-slate-400 text-[10px]">→</span>
                        )}
                      </React.Fragment>
                    );
                  })}
                </div>

                {/* 모델 버전 표 */}
                <div className="overflow-hidden rounded-lg border border-slate-200">
                  <table className="w-full text-[11px]">
                    <thead className="bg-slate-100 text-slate-600">
                      <tr>
                        <th className="px-2 py-1.5 text-left font-bold">version</th>
                        <th className="px-2 py-1.5 text-left font-bold">run_id</th>
                        <th className="px-2 py-1.5 text-right font-bold">acc</th>
                        <th className="px-2 py-1.5 text-center font-bold">stage</th>
                      </tr>
                    </thead>
                    <tbody>
                      {step.registryStage.versions.map((v) => {
                        const sty = STAGE_STYLE[v.stage];
                        const isProd = v.stage === 'Production';
                        return (
                          <tr key={v.v} className={`border-t border-slate-100 ${isProd ? 'bg-fuchsia-50' : 'bg-white'}`}>
                            <td className="px-2 py-1.5 font-bold text-slate-700">v{v.v}</td>
                            <td className="px-2 py-1.5 font-mono text-slate-500">{v.runId}</td>
                            <td className="px-2 py-1.5 text-right tabular-nums">{v.acc.toFixed(2)}</td>
                            <td className="px-2 py-1.5 text-center">
                              <span className={`px-1.5 py-0.5 rounded text-[10px] font-bold border ${sty.bg} ${sty.text} ${sty.border}`}>
                                {v.stage}
                              </span>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>

                <div className="mt-2 text-[10px] text-slate-600 font-mono bg-slate-100 rounded p-1.5">
                  models:/{step.registryStage.modelName}/Production
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-fuchsia-500/10 border-l-2 border-fuchsia-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-fuchsia-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. ML 플랫폼 &gt; Chapter 1. MLflow</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">MLflow 한 사이클</h1>
                  <p className="text-sm text-slate-500 mt-0.5">원스톱 실험실 — Track / Project / Model / Registry</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-fuchsia-50 border-2 border-fuchsia-300 rounded-xl p-3 text-sm text-fuchsia-900">
                💡 다음(V-1-2)에서는 <strong>Kubeflow Pipelines</strong> — K8s 위 ML 파이프라인 오케스트레이션
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-fuchsia-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-fuchsia-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-fuchsia-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-fuchsia-600 text-white hover:bg-fuchsia-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./V-1-2.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">V-1-2 Kubeflow Pipelines &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
