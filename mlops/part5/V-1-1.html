<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLOps 학습 — MLflow 한 사이클</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    V-1-1. MLflow 한 사이클
    학습 목표: MLflow가 어떻게 Tracking + Projects + Models + Registry를 한 도구로 묶는가
    핵심 비유: "원스톱 실험실" — 기록/패키징/표준 포장/창고 관리가 한 건물 안에서
    구조: 4단계 (Track / Project / Model / Registry)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Tracking — "실험실 노트에 모든 걸 기록"',
        desc: 'mlflow.start_run() 컨텍스트 안에서 파라미터/메트릭/아티팩트를 자동 기록. 노트북에 손으로 적던 "lr=0.01, acc=0.87"이 사라짐. UI(http://localhost:5000)에서 run 비교/검색.',
        block: {
          kind: 'python',
          code: `# MLflow Tracking — 실험을 자동 기록
import mlflow
from sklearn.ensemble import RandomForestClassifier

mlflow.set_tracking_uri("http://mlflow-server:5000")
mlflow.set_experiment("fraud-detector")

with mlflow.start_run(run_name="rf-baseline") as run:
    # 1. 파라미터 기록 (하이퍼파라미터)
    mlflow.log_param("n_estimators", 200)
    mlflow.log_param("max_depth", 8)
    mlflow.log_param("data_version", "v25.3")

    # 2. 모델 학습
    model = RandomForestClassifier(n_estimators=200, max_depth=8)
    model.fit(X_train, y_train)

    # 3. 메트릭 기록 (성능 지표)
    mlflow.log_metric("accuracy", 0.91)
    mlflow.log_metric("precision", 0.85)
    mlflow.log_metric("recall", 0.78)

    # 4. 아티팩트 기록 (그래프, 혼동행렬 등)
    mlflow.log_artifact("confusion_matrix.png")
    mlflow.log_artifact("feature_importance.csv")

    print(f"Run ID: {run.info.run_id}")

# UI 에서 자동 비교
# - 100개 run을 표 형태로 한눈에
# - "accuracy 가장 높은 5개 run" 정렬/필터
# - 두 run 의 파라미터 차이 diff 보기`,
        },
        focus: 'track',
      },
      {
        title: 'Step 2. Projects — "재현 가능 패키징"',
        desc: 'MLproject YAML에 의존성/엔트리포인트/파라미터 명세. mlflow run . 한 번이면 어디서나 동일 환경(conda/docker)에서 학습. "내 노트북에선 됐는데"가 사라짐. Git 저장소 그대로 실행.',
        block: {
          kind: 'yaml',
          code: `# MLproject — 프로젝트 표준 명세 (저장소 루트)
name: fraud-detector

conda_env: conda.yaml         # or docker_env: { image: ... }

entry_points:
  main:
    parameters:
      data_path:    { type: string, default: "data/transactions.csv" }
      n_estimators: { type: int,    default: 200 }
      max_depth:    { type: int,    default: 8 }
      lr:           { type: float,  default: 0.01 }
    command: >
      python train.py
        --data {data_path}
        --n-estimators {n_estimators}
        --max-depth {max_depth}
        --lr {lr}

  evaluate:
    parameters:
      run_id: string
    command: "python evaluate.py --run-id {run_id}"

# conda.yaml — 의존성 명세
name: fraud-env
channels: [conda-forge]
dependencies:
  - python=3.11
  - scikit-learn=1.4
  - pandas=2.2
  - mlflow=2.10

# 실행 — Git URL 직접 또는 로컬 폴더
# $ mlflow run . -P n_estimators=300
# $ mlflow run https://github.com/team/fraud-detector.git -v main
# 어디서 돌려도 동일한 환경 + 동일한 결과`,
        },
        focus: 'project',
      },
      {
        title: 'Step 3. Models — "표준 포장으로 어디든 배달"',
        desc: 'mlflow.sklearn.log_model 한 줄로 모델을 표준 포맷(pyfunc) 으로 저장. 라이브러리(sklearn/xgboost/pytorch)와 무관하게 mlflow.pyfunc.load_model().predict() 로 통일된 인터페이스. SageMaker/Docker로 1초 변환.',
        block: {
          kind: 'python',
          code: `# MLflow Models — 표준 포맷으로 모델 저장/로드
import mlflow
import mlflow.sklearn

# 저장 (학습 run 안에서)
with mlflow.start_run() as run:
    model.fit(X, y)

    # 라이브러리별 flavor + pyfunc 자동 같이 저장
    mlflow.sklearn.log_model(
        sk_model=model,
        artifact_path="model",
        signature=mlflow.models.infer_signature(X, model.predict(X)),
        input_example=X.iloc[:3],   # API 문서/검증용 샘플
    )

# 저장 디렉터리 구조 (자동 생성)
# model/
#   ├─ MLmodel              ← 메타 (flavor, signature)
#   ├─ model.pkl            ← sklearn pickle
#   ├─ conda.yaml           ← 환경 재현용
#   └─ requirements.txt

# 로드 — 어떤 라이브러리든 동일 인터페이스
loaded = mlflow.pyfunc.load_model(f"runs:/{run.info.run_id}/model")
preds  = loaded.predict(X_new)        # XGBoost/PyTorch도 동일

# 표준 포맷이라 어디든 배포
# $ mlflow models serve -m runs:/<id>/model -p 5001
# $ mlflow models build-docker -m runs:/<id>/model -n fraud-api
# $ mlflow deployments create --target sagemaker ...
# 같은 모델을 REST/Docker/SageMaker 형태로 1줄 변환`,
        },
        focus: 'model',
      },
      {
        title: 'Step 4. Registry — "창고 + 단계 관리"',
        desc: 'register_model 로 이름(fraud-detector) 부여 → version 자동 증가 → Stage(None/Staging/Production/Archived) 전환으로 운영. 운영 코드는 models:/fraud-detector/Production 만 참조 → 새 버전 승격 시 코드 수정 0.',
        block: {
          kind: 'python',
          code: `# MLflow Model Registry — 이름/버전/Stage 관리
import mlflow
from mlflow import MlflowClient

client = MlflowClient()

# 1. 등록 — runs:/<run_id>/model → "fraud-detector" v3
result = mlflow.register_model(
    model_uri=f"runs:/{run_id}/model",
    name="fraud-detector",
)
print(f"Registered v{result.version}")  # v3

# 2. Stage 전환 — Staging 으로 승격 (검증용)
client.transition_model_version_stage(
    name="fraud-detector",
    version=3,
    stage="Staging",
)

# 3. 검증 통과 후 Production 승격 + 이전 버전 Archive
client.transition_model_version_stage(
    name="fraud-detector",
    version=3,
    stage="Production",
    archive_existing_versions=True,    # v2 자동 Archive
)

# 4. 운영 코드 — Stage 만 참조 (버전 하드코딩 금지)
prod = mlflow.pyfunc.load_model("models:/fraud-detector/Production")
score = prod.predict(payload)

# Stage 흐름
# None → Staging(검증) → Production(서빙) → Archived(롤백 대비)
# 운영은 항상 "Production" alias 만 바라봄
# v3 등록/승격 → 코드 수정 0줄로 자동 v3 사용

# 강점 — Tracking + Projects + Models + Registry 한 도구
# 강점 - 런/실험/패키징/배포 전부 같은 UI 와 API
# 강점 - 라이브러리/클라우드 lock-in 없음 (오픈소스)`,
        },
        focus: 'registry',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const LIFECYCLE = [
      { key: 'track',    emoji: '🔬', name: 'Track',    note: '실험 기록' },
      { key: 'project',  emoji: '📦', name: 'Project',  note: '재현 패키징' },
      { key: 'model',    emoji: '🤖', name: 'Model',    note: '표준 포맷' },
      { key: 'registry', emoji: '📚', name: 'Registry', note: '단계 관리' },
    ];

    function LifecycleCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🔬 원스톱 실험실 (MLflow 한 사이클)</div>
          <div className="grid grid-cols-4 gap-2">
            {LIFECYCLE.map((l) => {
              const isActive = focus === l.key;
              return (
                <div
                  key={l.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-amber-100 border-2 border-amber-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{l.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{l.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{l.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">MLflow 한 사이클</h1>
                <p className="text-sm text-slate-500 mt-1">원스톱 실험실 — Track / Project / Model / Registry</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <LifecycleCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'registry' && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 mb-6 text-xs text-amber-900">
                💡 다음(V-1-2)에서는 Kubeflow Pipelines — K8s 위 ML 파이프라인
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
