<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLOps 학습 — V-2-1. Airflow ML DAG</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    V-2-1. Airflow ML DAG
    학습 목표: 일반 워크플로우 엔진 Airflow를 ML 재학습 파이프라인에 적용한다.
    핵심 비유: 공장 컨베이어 — sensor(원료 도착 감지) → extract → train → evaluate(검수) → deploy(출하)
    패턴: fastapi v1 패턴 — 좌(LiveDataPane: Airflow DAG 5-task 그래프) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // DAG 5 task 메타 (좌측 그래프 고정 노드)
    // ─────────────────────────────────────────────────────
    const TASKS = [
      { key: 'sensor',   emoji: '👁️', name: 'sensor',   sub: 'S3KeySensor' },
      { key: 'extract',  emoji: '📦', name: 'extract',  sub: 'fetch_data' },
      { key: 'train',    emoji: '🏗️', name: 'train',    sub: 'XGB + MLflow' },
      { key: 'evaluate', emoji: '✅', name: 'evaluate', sub: 'Branch gate' },
      { key: 'deploy',   emoji: '🚀', name: 'deploy',   sub: 'Registry+Slack' },
    ];

    // 단계별 상태 (각 task 별 상태 + 부가 정보)
    // taskStates: { key: 'idle' | 'waiting' | 'running' | 'success' | 'failed' }
    const STEPS = [
      {
        title: 'Step 1. Sensor — "데이터 도착 컨베이어 감지"',
        desc: 'S3KeySensor / ExternalTaskSensor 로 "어제 데이터가 S3 에 도착했나" 감지. 도착해야 다음 task 시작 → 데이터 누락된 채 학습되는 사고 방지. poke_interval 로 폴링.',
        taskStates: {
          sensor:   'waiting',
          extract:  'idle',
          train:    'idle',
          evaluate: 'idle',
          deploy:   'idle',
        },
        showSensorPanel: true,
        showEvalGate: false,
        showDeployBoard: false,
        sensorLog: [
          { t: '03:00:00', msg: 'poke s3://fraud-data-prod/transactions/2026-05-06/data.parquet', ok: false },
          { t: '03:01:00', msg: 'poke ... still missing', ok: false },
          { t: '03:02:00', msg: 'poke ... ✓ object found (12.4 MB)', ok: true },
        ],
        code: {
          lang: 'python',
          filename: 'sensor.py',
          lines: [
            '# Airflow Sensor — 데이터 도착 대기',
            'from airflow.decorators import dag',
            'from airflow.providers.amazon.aws.sensors.s3 import S3KeySensor',
            'from airflow.sensors.external_task import ExternalTaskSensor',
            'from datetime import datetime, timedelta',
            '',
            '@dag(',
            '    dag_id="fraud_retrain_daily",',
            '    schedule="0 3 * * *",                  # 매일 03:00',
            '    start_date=datetime(2026, 1, 1),',
            '    catchup=False,',
            '    default_args={"retries": 2, "retry_delay": timedelta(minutes=5)},',
            ')',
            'def fraud_retrain():',
            '',
            '    # 1. 어제 거래 데이터가 S3 에 도착했나?',
            '    wait_data = S3KeySensor(',
            '        task_id="wait_for_data",',
            '        bucket_name="fraud-data-prod",',
            '        bucket_key="transactions/{{ ds }}/data.parquet",',
            '        aws_conn_id="aws_default",',
            '        poke_interval=60,                  # 1분마다 확인',
            '        timeout=60 * 60 * 2,               # 2시간 timeout',
            '        mode="reschedule",                 # worker slot 점유 안 함',
            '    )',
            '',
            '    # 2. 업스트림 ETL DAG 가 끝났나?',
            '    wait_etl = ExternalTaskSensor(',
            '        task_id="wait_for_etl",',
            '        external_dag_id="raw_to_feature_etl",',
            '        external_task_id="export_features",',
            '        execution_delta=timedelta(0),',
            '        mode="reschedule",',
            '    )',
            '',
            '# 강점 - 데이터 안 오면 학습 자동 skip + 알람',
            '# 강점 - 사람이 새벽에 깰 일 없음',
          ],
          highlight: [17, 18, 19, 20, 21, 22, 23],
        },
      },
      {
        title: 'Step 2. Extract + Train — "원료 받아 모델 가공"',
        desc: '@task decorator 로 데이터 fetch + 학습. TaskFlow API 가 자동으로 직렬화/의존성 처리. MLflow autolog 로 학습 결과 자동 등록. KubernetesExecutor 로 GPU Pod 실행 가능.',
        taskStates: {
          sensor:   'success',
          extract:  'success',
          train:    'running',
          evaluate: 'idle',
          deploy:   'idle',
        },
        showSensorPanel: false,
        showEvalGate: false,
        showDeployBoard: false,
        trainProgress: 64,
        code: {
          lang: 'python',
          filename: 'extract_train.py',
          lines: [
            '# Extract + Train task',
            'from airflow.decorators import task',
            'import mlflow',
            '',
            '@task',
            'def fetch_data(ds: str) -> dict:',
            '    """ds (실행 날짜) 기준 최근 7일 데이터 로드"""',
            '    import pandas as pd',
            '    df = pd.read_parquet(f"s3://fraud-data-prod/features/{ds}/")',
            '    return {',
            '        "rows": len(df),',
            '        "path": f"/tmp/train-{ds}.parquet",',
            '        "saved_at": ds,',
            '    }',
            '',
            '@task(executor_config={',
            '    "pod_override": {                      # KubernetesExecutor + GPU',
            '        "spec": {"containers": [{',
            '            "name": "base",',
            '            "resources": {"limits": {"nvidia.com/gpu": "1"}},',
            '        }]}',
            '    }',
            '})',
            'def train_model(meta: dict) -> str:',
            '    """학습 + MLflow 자동 로깅 → run_id 반환"""',
            '    import pandas as pd',
            '    from xgboost import XGBClassifier',
            '    df = pd.read_parquet(meta["path"])',
            '    X, y = df.drop("label", axis=1), df["label"]',
            '',
            '    mlflow.set_tracking_uri("http://mlflow:5000")',
            '    with mlflow.start_run(run_name=f"airflow-{meta[\'saved_at\']}") as run:',
            '        model = XGBClassifier(n_estimators=300, max_depth=8)',
            '        model.fit(X, y)',
            '        mlflow.log_metric("train_accuracy", model.score(X, y))',
            '        mlflow.xgboost.log_model(model, "model")',
            '        return run.info.run_id',
            '',
            '# TaskFlow 자동 의존성 — 출력이 다음 task 입력으로',
            'data_meta = fetch_data()',
            'run_id    = train_model(data_meta)',
          ],
          highlight: [24, 33, 34, 35, 36],
        },
      },
      {
        title: 'Step 3. Evaluate — "검수 게이트가 라인을 막는다"',
        desc: 'BranchPythonOperator 로 정확도 체크 → 임계 미달이면 deploy 건너뛰고 abort. 나쁜 모델이 production 에 올라가는 사고 방지. accuracy 0.91 → 통과 / 0.7 → 빨간 abort.',
        taskStates: {
          sensor:   'success',
          extract:  'success',
          train:    'success',
          evaluate: 'running',
          deploy:   'idle',
        },
        showSensorPanel: false,
        showEvalGate: true,
        showDeployBoard: false,
        evalGate: {
          accuracyPass: 0.91,
          accuracyFail: 0.70,
          threshold: 0.85,
        },
        code: {
          lang: 'python',
          filename: 'evaluate.py',
          lines: [
            '# Evaluate + 분기 — 임계 미달이면 배포 차단',
            'from airflow.operators.python import BranchPythonOperator',
            'from airflow.operators.empty import EmptyOperator',
            'import mlflow',
            '',
            '@task',
            'def evaluate(run_id: str) -> dict:',
            '    """holdout set 으로 검증 → metric dict 반환"""',
            '    import pandas as pd',
            '    holdout = pd.read_parquet("s3://fraud-data-prod/holdout/")',
            '    model = mlflow.pyfunc.load_model(f"runs:/{run_id}/model")',
            '    preds = model.predict(holdout.drop("label", axis=1))',
            '    accuracy  = (preds == holdout["label"]).mean()',
            '    return {',
            '        "run_id": run_id,',
            '        "accuracy": float(accuracy),',
            '    }',
            '',
            'def decide_deploy(metrics: dict) -> str:',
            '    """임계 통과 여부에 따라 다음 task 결정"""',
            '    # 임계: accuracy >= 0.85',
            '    if metrics["accuracy"] >= 0.85:',
            '        return "deploy_to_registry"     # 통과 → 출하',
            '    return "alert_low_quality"          # 미달 → abort',
            '',
            'decide = BranchPythonOperator(',
            '    task_id="decide",',
            '    python_callable=decide_deploy,',
            '    op_args=["{{ ti.xcom_pull(task_ids=\'evaluate\') }}"],',
            ')',
            '',
            'skip_alert = EmptyOperator(task_id="alert_low_quality")',
            '',
            '# 강점 - 자동 게이팅, 운영팀이 quality 대시보드 안 봐도 안전',
            '# 한계 - 라벨 지연 도메인은 holdout 대신 backtest 필요',
          ],
          highlight: [19, 22, 23, 24, 26],
        },
      },
      {
        title: 'Step 4. Deploy — "Registry 등록 + 출하 알림"',
        desc: '검수 통과 시 MLflow Registry 등록 → Stage Staging→Production 전환 → 이전 버전 Archive → Slack 으로 출하 알림. canary 와 결합해 점진 롤아웃 가능. 5 task 모두 ✓ 녹색.',
        taskStates: {
          sensor:   'success',
          extract:  'success',
          train:    'success',
          evaluate: 'success',
          deploy:   'success',
        },
        showSensorPanel: false,
        showEvalGate: false,
        showDeployBoard: true,
        deployBoard: {
          version: 47,
          stage: 'Production',
          archived: 46,
          accuracy: 0.91,
          slackChannel: '#ml-fraud-deploys',
        },
        code: {
          lang: 'python',
          filename: 'deploy.py',
          lines: [
            '# Deploy task — Registry + Stage + Slack',
            'from airflow.providers.slack.operators.slack import SlackAPIPostOperator',
            'from mlflow import MlflowClient',
            '',
            '@task(task_id="deploy_to_registry")',
            'def deploy(metrics: dict):',
            '    """Registry 등록 + Stage 전환 + 이전 버전 Archive"""',
            '    client = MlflowClient()',
            '',
            '    # 1. Registry 등록',
            '    result = mlflow.register_model(',
            '        model_uri=f"runs:/{metrics[\'run_id\']}/model",',
            '        name="fraud-detector",',
            '    )',
            '',
            '    # 2. Staging → Production (이전 버전 자동 Archive)',
            '    client.transition_model_version_stage(',
            '        name="fraud-detector",',
            '        version=result.version,',
            '        stage="Production",',
            '        archive_existing_versions=True,',
            '    )',
            '',
            '    # 3. tag 로 평가 메트릭 첨부',
            '    client.set_model_version_tag(',
            '        name="fraud-detector", version=result.version,',
            '        key="accuracy", value=str(metrics["accuracy"]),',
            '    )',
            '    return {"version": result.version, "accuracy": metrics["accuracy"]}',
            '',
            '# Slack 알림 — 출하 보고',
            'notify = SlackAPIPostOperator(',
            '    task_id="notify_slack",',
            '    channel="#ml-fraud-deploys",',
            '    text=(',
            '        "🚀 fraud-detector v{{ ti.xcom_pull(task_ids=\'deploy_to_registry\')[\'version\'] }} "',
            '        "Production deployed"',
            '    ),',
            ')',
            '',
            '# DAG 의존성 (TaskFlow 자동 연결)',
            '# wait_data >> fetch_data >> train_model >> evaluate >> decide',
            '# decide >> [deploy_to_registry, alert_low_quality]',
            '# deploy_to_registry >> notify_slack',
          ],
          highlight: [11, 17, 21, 33, 34],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // Task 노드 색상 (정적 Tailwind 클래스 — purge 안전)
    // ─────────────────────────────────────────────────────
    const TASK_STYLE = {
      idle:    { bg: 'bg-slate-100',    border: 'border-slate-300',    text: 'text-slate-400',   badge: 'bg-slate-200 text-slate-500',   label: '대기',   pulse: '' },
      waiting: { bg: 'bg-amber-50',     border: 'border-amber-400',    text: 'text-amber-700',   badge: 'bg-amber-100 text-amber-700',   label: '⏳ 감지중', pulse: 'animate-pulse' },
      running: { bg: 'bg-fuchsia-50',   border: 'border-fuchsia-400',  text: 'text-fuchsia-700', badge: 'bg-fuchsia-100 text-fuchsia-700', label: '▶ 실행중', pulse: 'animate-pulse' },
      success: { bg: 'bg-emerald-50',   border: 'border-emerald-400',  text: 'text-emerald-700', badge: 'bg-emerald-100 text-emerald-700', label: '✓ 완료',   pulse: '' },
      failed:  { bg: 'bg-red-50',       border: 'border-red-500',      text: 'text-red-700',     badge: 'bg-red-100 text-red-700',         label: '✗ 실패',   pulse: 'animate-pulse' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — Airflow DAG 5-task 그래프 + 단계별 패널
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🏭 Airflow DAG · fraud_retrain_daily</h2>
            <span className="text-[10px] text-slate-400 font-mono">5 tasks · live</span>
          </div>

          {/* DAG 5-node 그래프 (가로 화살표) */}
          <div className="flex items-stretch gap-1 mb-4">
            {TASKS.map((t, i) => {
              const state = step.taskStates[t.key];
              const style = TASK_STYLE[state];
              return (
                <React.Fragment key={t.key}>
                  <div className={`flex-1 rounded-lg border-2 p-2 transition-all duration-500 ${style.bg} ${style.border} ${style.pulse}`}>
                    <div className="text-center">
                      <div className="text-xl">{t.emoji}</div>
                      <div className={`text-[11px] font-bold mt-0.5 ${style.text}`}>{t.name}</div>
                      <div className="text-[9px] text-slate-500 mt-0.5 font-mono truncate">{t.sub}</div>
                      <div className={`mt-1 text-[9px] font-bold px-1 py-0.5 rounded ${style.badge}`}>
                        {style.label}
                      </div>
                    </div>
                  </div>
                  {i < TASKS.length - 1 && (
                    <div className="flex items-center text-slate-400 text-lg" aria-hidden="true">→</div>
                  )}
                </React.Fragment>
              );
            })}
          </div>

          {/* Step 1 — Sensor 모니터 패널 */}
          {step.showSensorPanel && (
            <div className="rounded-lg bg-slate-900 border border-slate-700 p-3 font-mono text-[11px]">
              <div className="text-amber-300 mb-1">[S3KeySensor] poke_interval=60s · mode=reschedule</div>
              {step.sensorLog.map((l, i) => (
                <div key={i} className={l.ok ? 'text-emerald-300' : 'text-slate-400'}>
                  <span className="text-slate-500">{l.t}</span> · {l.msg}
                </div>
              ))}
              <div className="text-fuchsia-300 mt-1">→ sensor PASS, downstream task 트리거</div>
            </div>
          )}

          {/* Step 3 — Evaluate 분기 게이트 */}
          {step.showEvalGate && (
            <div className="space-y-2">
              <div className="rounded-lg border-2 border-emerald-400 bg-emerald-50 p-3">
                <div className="flex items-center justify-between">
                  <div>
                    <div className="text-[11px] font-bold text-emerald-800">case A · accuracy = 0.91</div>
                    <div className="text-[10px] text-emerald-700">≥ threshold 0.85 → branch <strong>deploy_to_registry</strong></div>
                  </div>
                  <span className="text-2xl">✅</span>
                </div>
              </div>
              <div className="rounded-lg border-2 border-red-500 bg-red-50 p-3 animate-pulse">
                <div className="flex items-center justify-between">
                  <div>
                    <div className="text-[11px] font-bold text-red-800">case B · accuracy = 0.70</div>
                    <div className="text-[10px] text-red-700">&lt; threshold 0.85 → branch <strong>alert_low_quality</strong> · 배포 abort</div>
                  </div>
                  <span className="text-2xl">🚫</span>
                </div>
              </div>
              <div className="text-[10px] text-slate-500 text-center pt-1">
                BranchPythonOperator — 검수 실패 시 라인 정지
              </div>
            </div>
          )}

          {/* Step 4 — Deploy Registry 보드 */}
          {step.showDeployBoard && (
            <div className="space-y-2">
              <div className="rounded-lg border-2 border-emerald-400 bg-emerald-50 p-3">
                <div className="text-[11px] font-bold text-emerald-800 mb-1">📒 MLflow Registry · fraud-detector</div>
                <div className="grid grid-cols-3 gap-2 text-[10px]">
                  <div className="bg-white rounded p-1.5 border border-emerald-200">
                    <div className="text-slate-500">version</div>
                    <div className="font-bold text-emerald-700 text-base">v{step.deployBoard.version}</div>
                  </div>
                  <div className="bg-white rounded p-1.5 border border-emerald-200">
                    <div className="text-slate-500">stage</div>
                    <div className="font-bold text-emerald-700 text-base">{step.deployBoard.stage}</div>
                  </div>
                  <div className="bg-white rounded p-1.5 border border-slate-200">
                    <div className="text-slate-500">archived</div>
                    <div className="font-bold text-slate-500 text-base line-through">v{step.deployBoard.archived}</div>
                  </div>
                </div>
                <div className="text-[10px] text-emerald-700 mt-2">
                  tag: accuracy={step.deployBoard.accuracy}
                </div>
              </div>
              <div className="rounded-lg border-2 border-fuchsia-300 bg-fuchsia-50 p-2.5">
                <div className="text-[11px] text-fuchsia-900">
                  <strong>💬 Slack {step.deployBoard.slackChannel}</strong>
                </div>
                <div className="text-[10px] text-fuchsia-800 font-mono mt-0.5">
                  🚀 fraud-detector v{step.deployBoard.version} Production deployed (accuracy {step.deployBoard.accuracy})
                </div>
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-slate-300"></span>대기</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-amber-400"></span>감지중</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-fuchsia-400"></span>실행중</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-400"></span>완료</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-red-500"></span>실패</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-fuchsia-500/10 border-l-2 border-fuchsia-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-fuchsia-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. 파이프라인 자동화 &gt; Chapter 2. Airflow 적용</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Airflow ML DAG</h1>
                  <p className="text-sm text-slate-500 mt-0.5">공장 컨베이어 패턴 — sensor → extract → train → evaluate → deploy</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-fuchsia-50 border-2 border-fuchsia-300 rounded-xl p-3 text-sm text-fuchsia-900">
                💡 다음(V-2-2)에서는 <strong>실전 체크리스트</strong>
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-fuchsia-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-fuchsia-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-fuchsia-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-fuchsia-600 text-white hover:bg-fuchsia-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./V-2-2.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">V-2-2 실전 체크리스트 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
