<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLOps 학습 — 실전 체크리스트</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    V-2-2. 실전 체크리스트
    학습 목표: 실무 도입 시 4 축 (데이터/학습/배포/거버넌스) 점검표
    핵심 비유: "비행 전 체크리스트" — 이륙 전 4 축을 손가락으로 짚으며 확인
    구조: 4단계 (Data / Train / Deploy / Govern)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Data — "원료가 신선하고 추적 가능한가"',
        desc: 'DVC 로 데이터 버전 + Feature Store 로 학습/서빙 일관성 + 드리프트 모니터링 3종이 갖춰져야 모델이 안정적으로 작동. Part I 의 핵심 회수.',
        block: {
          kind: 'shell',
          code: `# Data 체크리스트 (Part I)
# ───────────────────────────────────────────────
# [ ] DVC 로 학습 데이터 버전 관리 (Git 처럼 sha 추적)
# [ ] 각 학습 run 에 data_version 태그 자동 기록
# [ ] PII 마스킹 / 익명화 파이프라인이 있다
# [ ] 데이터셋 메타: 출처 / 수집 기간 / 라이선스 명시
#
# Feature Store
# [ ] Feast 등으로 학습/서빙 동일 feature 정의
# [ ] 학습-서빙 skew 검사 (training-serving skew test)
# [ ] feature lineage: 어떤 raw → 어떤 feature
# [ ] online/offline store 동기화 SLA 정의
#
# 데이터 품질 / 드리프트
# [ ] 매일 입력 분포 통계 (mean/std/null ratio) 모니터링
# [ ] PSI / KS-test 로 드리프트 알람 (PSI > 0.25)
# [ ] 라벨 지연(label lag) 측정 — 평가가 며칠 늦는지
# [ ] 라벨 노이즈 검사 — 라벨링 가이드 준수율
#
# 자주 빠뜨리는 항목
# [ ] 학습 데이터에 미래 정보 누수 (data leakage) 없는가
# [ ] 시간 기반 split 했는가 (random split 금지)
# [ ] 클래스 불균형 → resampling 또는 weight 적용
# [ ] 테스트 셋이 production 분포를 대표하는가

# 합격선
# - 위 12 항목 중 9 개 이상 ✅
# - 미충족 항목은 risk register 에 기록 + 분기 내 보강 계획`,
        },
        focus: 'data',
      },
      {
        title: 'Step 2. Train — "학습이 재현 가능하고 평가가 신뢰되는가"',
        desc: 'MLflow Tracking + 코드/환경 버전 + 평가 프로토콜 3 축이 학습 신뢰를 만든다. "내 노트북에선 됐는데" 가 사라지고 6 개월 후 재현 가능.',
        block: {
          kind: 'shell',
          code: `# Train 체크리스트 (Part II + III)
# ───────────────────────────────────────────────
# Tracking
# [ ] 모든 학습이 MLflow run 으로 기록 (수동 학습 금지)
# [ ] 파라미터 / 메트릭 / 아티팩트 자동 로깅 활성화
# [ ] run 에 git_sha / data_version / docker_image 태그
# [ ] 실험 비교 UI 가 팀원 모두에게 공유됨
#
# 재현성
# [ ] requirements.txt 또는 conda.yaml 버전 고정 (==)
# [ ] random seed 명시 (numpy / torch / sklearn)
# [ ] Docker 이미지 또는 MLproject 로 환경 캡슐화
# [ ] 동일 입력 → 동일 결과 (재현 테스트 통과)
#
# 평가
# [ ] holdout set 은 학습 후 한 번만 사용 (반복 사용 금지)
# [ ] 비즈니스 메트릭 (sales, fraud loss) 까지 측정
# [ ] 공정성 지표 (parity by gender/region) 점검
# [ ] confusion matrix / ROC / PR curve 시각화
# [ ] 실패 케이스(error analysis) 샘플 50 개 검토
#
# 자주 빠뜨리는 항목
# [ ] feature engineering 코드도 함께 버전 관리
# [ ] 학습 시간 / 추론 latency / 모델 크기 기록
# [ ] HP tuning 결과 모두 기록 (best 만 X)

# 합격선
# - 12 항목 중 10 개 이상 ✅
# - 재현 테스트는 분기마다 실측`,
        },
        focus: 'train',
      },
      {
        title: 'Step 3. Deploy — "안전하게 출하하고 빠르게 회수하는가"',
        desc: 'Registry 단계 관리 + 서빙 스택 + Canary/Shadow + 롤백 절차 4 축. Part II 의 Registry 와 Part III 의 서빙 패턴이 만나는 지점.',
        block: {
          kind: 'shell',
          code: `# Deploy 체크리스트 (Part II + III)
# ───────────────────────────────────────────────
# Registry & Stage
# [ ] MLflow Registry 또는 동등 도구로 모델 이름/버전 관리
# [ ] Stage 흐름 (None → Staging → Production → Archived) 표준화
# [ ] 운영 코드는 Stage alias 만 참조 (버전 하드코딩 X)
# [ ] Stage 전환 시 자동 평가 게이트 통과 필수
#
# 서빙
# [ ] FastAPI / TorchServe / Triton 중 적절한 선택
# [ ] /healthz / /readyz / /metrics 3 종 endpoint 노출
# [ ] HPA 로 트래픽 따라 자동 scale (CPU 또는 QPS 기준)
# [ ] p99 latency / QPS / error rate Prometheus 수집
#
# 점진 배포
# [ ] Canary (5% → 25% → 100%) 또는 Shadow 적용
# [ ] 비교 메트릭: business KPI + ML metric 모두
# [ ] 자동 abort 조건 정의 (error rate > X 면 즉시 회수)
# [ ] A/B 테스트 통계 검정 절차 표준화
#
# 롤백 / 회수
# [ ] 1 분 이내 이전 버전으로 롤백 가능 (자동 또는 1-click)
# [ ] 롤백 절차가 runbook 으로 문서화 + 분기별 모의 훈련
# [ ] on-call 체계 (Slack/PagerDuty) 24/7 운영

# 합격선
# - 12 항목 중 10 개 이상 ✅
# - 롤백 모의 훈련은 분기마다 실시간 측정`,
        },
        focus: 'deploy',
      },
      {
        title: 'Step 4. Govern — "누가 무엇을 왜 책임지는가"',
        desc: 'Model Card + Lineage + Audit log 3 축으로 책임 추적 가능한 거버넌스 완성. Part IV 의 종합. 14 번째 학습 자료 — MLOps 20/20 마무리 🎉.',
        block: {
          kind: 'shell',
          code: `# Govern 체크리스트 (Part IV)
# ───────────────────────────────────────────────
# Model Card
# [ ] 모든 production 모델에 표준 Model Card YAML
# [ ] 의도 / 한계 / 학습 데이터 / 평가 / 공정성 명시
# [ ] 새 버전 등록 시 Model Card 갱신 의무화
# [ ] 운영팀 / on-call / runbook 링크 포함
#
# Lineage
# [ ] data_version + git_sha + docker_image 자동 로깅
# [ ] feature_view 버전 추적 (Feast/etc)
# [ ] 모델 → run → data → feature 거꾸로 추적 가능
# [ ] "거래 X 가 왜 사기로 분류됐나" 5분 안에 답변 가능
#
# Audit Log
# [ ] 모든 Stage 전환 / 배포 / 롤백 이벤트 기록
# [ ] 누가 / 언제 / 무엇을 / 왜 4 항목 필수
# [ ] write-once append-only (수정 불가)
# [ ] CloudTrail / GCP Audit / Slack 채널 자동 포스팅
#
# 규제 / 리스크
# [ ] GDPR / AI Act / 금융권 보고 의무 점검
# [ ] 분기별 거버넌스 리뷰 미팅
# [ ] 모델 폐기 절차 (decommission) 문서화

# 합격선
# - 12 항목 중 10 개 이상 ✅
# - 외부 감사 시 30 분 안에 모든 답변 제공 가능

# ───────────────────────────────────────────────
# MLOps 20 / 20 — 14 번째 학습 자료 완성 🎉
# Part I (4) + Part II (4) + Part III (4) + Part IV (4) + Part V (4) = 20
# 개론 / 데이터·학습 / 배포·서빙 / 모니터링·거버넌스 / 실전 도구 종합
# graphrag / k8s 처럼 100% 완성 — 학습 자료 14 개 누적
# ───────────────────────────────────────────────`,
        },
        focus: 'govern',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const CHECKLIST_AXES = [
      { key: 'data',   emoji: '💾', name: 'Data',   note: 'DVC+Feature' },
      { key: 'train',  emoji: '🎓', name: 'Train',  note: 'Tracking+재현' },
      { key: 'deploy', emoji: '🚀', name: 'Deploy', note: 'Registry+Canary' },
      { key: 'govern', emoji: '📜', name: 'Govern', note: 'Card+Audit' },
    ];

    function ChecklistCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">✈️ 비행 전 체크리스트 (실전 4축 점검표)</div>
          <div className="grid grid-cols-4 gap-2">
            {CHECKLIST_AXES.map((c) => {
              const isActive = focus === c.key;
              return (
                <div
                  key={c.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-amber-100 border-2 border-amber-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{c.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{c.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{c.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">실전 체크리스트</h1>
                <p className="text-sm text-slate-500 mt-1">비행 전 체크리스트 — Data / Train / Deploy / Govern</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <ChecklistCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'govern' && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 mb-6 text-xs text-amber-900">
                💡 MLOps 학습 완료. graphrag/k8s 처럼 100% 완성. 학습 자료 14개 누적
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
