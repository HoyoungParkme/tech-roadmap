<body>
  <div id="root"></div>

  <!--
    V-2-2. 실전 체크리스트 — 비행 전 4축 점검표
    학습 목표: 실무 도입 시 4 축 (Data / Train / Deploy / Govern) 12 항목씩 총 48 항목 점검 → 100% 완성
    핵심 비유: 비행 전 체크리스트 — 4개 축 손가락으로 짚으며 누적 진행률 만들어 가기
    패턴: fastapi v1 패턴 — 좌(LiveDataPane 4 progress cards) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 — 4축 누적 진행률
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Data — "원료가 신선하고 추적 가능한가"',
        desc: 'DVC 로 데이터 버전 + Feature Store 로 학습/서빙 일관성 + 드리프트 모니터링 3종이 갖춰져야 모델이 안정적으로 작동. Part I 의 핵심 회수. 12 항목 체크 — Data 카드 100%.',
        axes: {
          data:   { checked: 12, state: 'done' },
          train:  { checked: 0,  state: 'pending' },
          deploy: { checked: 0,  state: 'pending' },
          govern: { checked: 0,  state: 'pending' },
        },
        cumulative: 12,
        showFinale: false,
        code: {
          lang: 'shell',
          filename: 'data-checklist.sh',
          lines: [
            '# Data 체크리스트 (Part I) — 12 항목',

            '# [x] DVC 로 학습 데이터 버전 관리 (Git 처럼 sha 추적)',
            '# [x] 각 학습 run 에 data_version 태그 자동 기록',
            '# [x] PII 마스킹 / 익명화 파이프라인이 있다',
            '# [x] 데이터셋 메타: 출처 / 수집 기간 / 라이선스 명시',
            '',
            '# Feature Store',
            '# [x] Feast 등으로 학습/서빙 동일 feature 정의',
            '# [x] 학습-서빙 skew 검사 (training-serving skew test)',
            '# [x] feature lineage: 어떤 raw → 어떤 feature',
            '# [x] online/offline store 동기화 SLA 정의',
            '',
            '# 데이터 품질 / 드리프트',
            '# [x] 매일 입력 분포 통계 (mean/std/null ratio) 모니터링',
            '# [x] PSI / KS-test 로 드리프트 알람 (PSI > 0.25)',
            '# [x] 라벨 지연(label lag) 측정 — 평가가 며칠 늦는지',
            '# [x] 라벨 노이즈 검사 — 라벨링 가이드 준수율',
            '',
            '# 합격선: 12/12 ✓ → Data 100%',
            '# 누적 진행률: 12 / 48 (25%)',
          ],
          highlight: [4, 5, 10, 11, 16, 17],
        },
      },
      {
        title: 'Step 2. Train — "학습이 재현 가능하고 평가가 신뢰되는가"',
        desc: 'MLflow Tracking + 코드/환경 버전 + 평가 프로토콜 3 축이 학습 신뢰를 만든다. "내 노트북에선 됐는데" 가 사라지고 6 개월 후 재현 가능. Train 카드 12/12 — 누적 24/48.',
        axes: {
          data:   { checked: 12, state: 'done' },
          train:  { checked: 12, state: 'done' },
          deploy: { checked: 0,  state: 'pending' },
          govern: { checked: 0,  state: 'pending' },
        },
        cumulative: 24,
        showFinale: false,
        code: {
          lang: 'shell',
          filename: 'train-checklist.sh',
          lines: [
            '# Train 체크리스트 (Part II + III) — 12 항목',
            '# ───────────────────────────────────────────────',
            '# Tracking',
            '# [x] 모든 학습이 MLflow run 으로 기록 (수동 학습 금지)',
            '# [x] 파라미터 / 메트릭 / 아티팩트 자동 로깅 활성화',

            '# [x] 실험 비교 UI 가 팀원 모두에게 공유됨',
            '',
            '# 재현성',
            '# [x] requirements.txt 또는 conda.yaml 버전 고정 (==)',
            '# [x] random seed 명시 (numpy / torch / sklearn)',
            '# [x] Docker 이미지 또는 MLproject 로 환경 캡슐화',
            '# [x] 동일 입력 → 동일 결과 (재현 테스트 통과)',
            '',
            '# 평가',
            '# [x] holdout set 은 학습 후 한 번만 사용 (반복 사용 금지)',
            '# [x] 비즈니스 메트릭 (sales, fraud loss) 까지 측정',
            '# [x] 공정성 지표 (parity by gender/region) 점검',
            '# [x] 실패 케이스(error analysis) 샘플 50 개 검토',
            '',
            '# 합격선: 12/12 ✓ → Train 100%',
            '# 누적 진행률: 24 / 48 (50%)',
          ],
          highlight: [4, 5, 10, 11, 16, 17],
        },
      },
      {
        title: 'Step 3. Deploy — "안전하게 출하하고 빠르게 회수하는가"',
        desc: 'Registry 단계 관리 + 서빙 스택 + Canary/Shadow + 롤백 절차 4 축. Part II 의 Registry 와 Part III 의 서빙 패턴이 만나는 지점. Deploy 카드 12/12 — 누적 36/48.',
        axes: {
          data:   { checked: 12, state: 'done' },
          train:  { checked: 12, state: 'done' },
          deploy: { checked: 12, state: 'done' },
          govern: { checked: 0,  state: 'pending' },
        },
        cumulative: 36,
        showFinale: false,
        code: {
          lang: 'shell',
          filename: 'deploy-checklist.sh',
          lines: [
            '# Deploy 체크리스트 (Part II + III) — 12 항목',
            '# ───────────────────────────────────────────────',
            '# Registry & Stage',
            '# [x] MLflow Registry 또는 동등 도구로 모델 이름/버전 관리',
            '# [x] Stage 흐름 (None → Staging → Production → Archived)',
            '# [x] 운영 코드는 Stage alias 만 참조 (버전 하드코딩 X)',
            '# [x] Stage 전환 시 자동 평가 게이트 통과 필수',
            '',
            '# 서빙',
            '# [x] FastAPI / TorchServe / Triton 중 적절한 선택',
            '# [x] /healthz / /readyz / /metrics 3 종 endpoint 노출',
            '# [x] HPA 로 트래픽 따라 자동 scale (CPU 또는 QPS 기준)',
            '# [x] p99 latency / QPS / error rate Prometheus 수집',
            '',
            '# 점진 배포 + 롤백',
            '# [x] Canary (5% → 25% → 100%) 또는 Shadow 적용',
            '# [x] 자동 abort 조건 정의 (error rate > X 면 즉시 회수)',
            '# [x] 1 분 이내 이전 버전으로 롤백 가능 (자동 또는 1-click)',
            '# [x] on-call 체계 (Slack/PagerDuty) 24/7 운영',
            '',
            '# 합격선: 12/12 ✓ → Deploy 100%',
            '# 누적 진행률: 36 / 48 (75%)',
          ],
          highlight: [4, 5, 10, 11, 16, 17],
        },
      },
      {
        title: 'Step 4. Govern — "누가 무엇을 왜 책임지는가" 🎉',
        desc: 'Model Card + Lineage + Audit log 3 축으로 책임 추적 가능한 거버넌스 완성. Part IV 의 종합. 4 카드 모두 ✓ — 100% 완성! MLOps 20/20 — 14 번째 학습 자료 마무리.',
        axes: {
          data:   { checked: 12, state: 'done' },
          train:  { checked: 12, state: 'done' },
          deploy: { checked: 12, state: 'done' },
          govern: { checked: 12, state: 'done' },
        },
        cumulative: 48,
        showFinale: true,
        code: {
          lang: 'shell',
          filename: 'govern-checklist.sh',
          lines: [
            '# Govern 체크리스트 (Part IV) — 12 항목',
            '# ───────────────────────────────────────────────',
            '# Model Card',
            '# [x] 모든 production 모델에 표준 Model Card YAML',
            '# [x] 의도 / 한계 / 학습 데이터 / 평가 / 공정성 명시',
            '# [x] 새 버전 등록 시 Model Card 갱신 의무화',
            '# [x] 운영팀 / on-call / runbook 링크 포함',
            '',
            '# Lineage',
            '# [x] data_version + git_sha + docker_image 자동 로깅',
            '# [x] feature_view 버전 추적 (Feast/etc)',
            '# [x] 모델 → run → data → feature 거꾸로 추적 가능',
            '# [x] "거래 X 가 왜 사기로 분류됐나" 5분 안에 답변 가능',
            '',
            '# Audit Log + 규제',
            '# [x] 모든 Stage 전환 / 배포 / 롤백 이벤트 기록',
            '# [x] 누가 / 언제 / 무엇을 / 왜 4 항목 필수',
            '# [x] write-once append-only (수정 불가)',
            '# [x] GDPR / AI Act / 금융권 보고 의무 점검',
            '',
            '# ───────────────────────────────────────────────',
            '# MLOps 20 / 20 — 14 번째 학습 자료 100% 완성 🎉',
            '# Part I (4) + II (4) + III (4) + IV (4) + V (4) = 20',
            '# 누적 진행률: 48 / 48 (100%) ✓',
            '# ───────────────────────────────────────────────',
          ],
          highlight: [4, 5, 10, 11, 16, 17, 22, 23, 24],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 4축 메타 (이름/아이콘 고정)
    // ─────────────────────────────────────────────────────
    const AXIS_META = [
      { key: 'data',   emoji: '💾', name: 'Data',   sub: 'DVC + Feature Store',     total: 12 },
      { key: 'train',  emoji: '🎓', name: 'Train',  sub: 'Tracking + 재현',         total: 12 },
      { key: 'deploy', emoji: '🚀', name: 'Deploy', sub: 'Registry + Canary',       total: 12 },
      { key: 'govern', emoji: '📜', name: 'Govern', sub: 'Card + Lineage + Audit',  total: 12 },
    ];

    // 정적 Tailwind 클래스 (purge 안전)
    const STATE_STYLE = {
      pending: { card: 'bg-slate-100 border-slate-300', value: 'text-slate-400', bar: 'bg-slate-300', badge: 'bg-slate-200 text-slate-500', label: '대기' },
      done:    { card: 'bg-emerald-50 border-emerald-400', value: 'text-emerald-700', bar: 'bg-emerald-500', badge: 'bg-emerald-100 text-emerald-700', label: '✓ 완료' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 4축 체크리스트 진행률 카드
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ axes, cumulative, showFinale }) {
      const totalPct = Math.round((cumulative / 48) * 100);

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">✈️ 비행 전 체크리스트</h2>
            <span className="text-[10px] text-slate-400 font-mono">4 축 · 48 항목</span>
          </div>

          {/* 누적 진행률 게이지 */}
          <div className="mb-5 p-3 rounded-lg bg-fuchsia-50 border-2 border-fuchsia-200">
            <div className="flex items-center justify-between mb-1.5">
              <span className="text-xs font-bold text-fuchsia-800">누적 진행률</span>
              <span className="text-2xl font-extrabold text-fuchsia-700 tabular-nums">{totalPct}%</span>
            </div>
            <div className="relative h-3 bg-white rounded-full overflow-hidden border border-fuchsia-200">
              <div
                className="h-full bg-gradient-to-r from-fuchsia-500 to-fuchsia-600 transition-all duration-700"
                style={{ width: `${totalPct}%` }}
              />
            </div>
            <div className="text-[11px] text-fuchsia-700 mt-1.5 font-mono text-right">
              {cumulative} / 48 항목
            </div>
          </div>

          {/* 4 축 카드 */}
          <div className="grid grid-cols-2 gap-3">
            {AXIS_META.map((m) => {
              const a = axes[m.key];
              const style = STATE_STYLE[a.state];
              const pct = Math.round((a.checked / m.total) * 100);
              const isDone = a.state === 'done';
              return (
                <div
                  key={m.key}
                  className={`rounded-lg border-2 p-3 transition-all duration-500 ${style.card}`}
                >
                  <div className="flex items-center justify-between mb-1">
                    <div className="flex items-center gap-1.5">
                      <span aria-hidden="true">{m.emoji}</span>
                      <span className="text-xs font-bold text-slate-700">{m.name}</span>
                    </div>
                    <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${style.badge}`}>
                      {style.label}
                    </span>
                  </div>

                  <div className="flex items-baseline gap-1 mb-2">
                    <span className={`text-2xl font-extrabold tabular-nums ${style.value}`}>{a.checked}</span>
                    <span className={`text-xs ${style.value}`}>/ {m.total}</span>
                  </div>

                  <div className="relative h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div
                      className={`h-full transition-all duration-700 ${style.bar}`}
                      style={{ width: `${pct}%` }}
                    />
                  </div>

                  <div className="text-[10px] text-slate-500 mt-1.5 flex justify-between">
                    <span>{m.sub}</span>
                    {isDone && <span className="font-bold text-emerald-700">100%</span>}
                  </div>
                </div>
              );
            })}
          </div>

          {/* 100% 완성 메시지 (Step 4) */}
          {showFinale && (
            <div className="mt-4 p-3 rounded-lg bg-fuchsia-100 border-2 border-fuchsia-400">
              <div className="flex items-center gap-2 text-fuchsia-900 font-bold text-sm">
                <span className="text-lg">🎉</span>
                <span>100% 완성! MLOps 20 / 20</span>
              </div>
              <div className="text-[11px] text-fuchsia-800 mt-1 font-mono">
                Part I (4) + II (4) + III (4) + IV (4) + V (4) = 20 자료 마무리
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-slate-300"></span>대기</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-500"></span>완료</span>
            <span className="flex items-center gap-1 ml-auto"><span className="w-2.5 h-2.5 rounded bg-fuchsia-600"></span>누적 진행률</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-fuchsia-500/10 border-l-2 border-fuchsia-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-fuchsia-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. 실전 도구 종합 &gt; Chapter 2. 도입 체크리스트</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">실전 체크리스트</h1>
                  <p className="text-sm text-slate-500 mt-0.5">비행 전 체크리스트 — Data / Train / Deploy / Govern (4축 × 12항목 = 48)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                axes={step.axes}
                cumulative={step.cumulative}
                showFinale={step.showFinale}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-fuchsia-50 border-2 border-fuchsia-300 rounded-xl p-3 text-sm text-fuchsia-900">
                💡 MLOps 학습 완료. 14번째 학습 자료 100% 🎉
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-fuchsia-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-fuchsia-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-fuchsia-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-fuchsia-600 text-white hover:bg-fuchsia-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./V-2-1.html" className="text-slate-500 hover:text-slate-700">&larr; V-2-1</a>
              <a href="../index.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">허브로 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
