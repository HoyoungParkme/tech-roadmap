<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />

<body>
  <div id="root"></div>

  <!--
    V-1-2. Kubeflow Pipelines (KFP)
    학습 목표: KFP가 ML 파이프라인을 K8s 컨테이너 DAG로 어떻게 만드는가
    핵심 비유: K8s 컨테이너 조립 라인 — 각 단계가 컨테이너, 컨베이어가 DAG
    패턴: fastapi v1 패턴 — 좌(LiveDataPane: KFP DAG) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (KFP 4 Phase)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        focus: 'component',
        title: 'Step 1. Component — "컨테이너 1개 = 1단계"',
        desc: '@dsl.component 데코레이터로 일반 파이썬 함수를 K8s 컨테이너 단위로 변환. 입력/출력 타입 명시 → KFP가 의존성/직렬화 처리. preprocess 만 단독 컨테이너로 격리되어 있는 상태.',
        nodes: [
          { id: 'preprocess', label: 'preprocess', state: 'highlight', icon: '🧱', sub: 'container' },
        ],
        showEdges: false,
        showLineage: false,
        showRunProgress: false,
        code: {
          lang: 'python',
          filename: 'components.py',
          lines: [
            '# KFP Component — 함수를 K8s 컨테이너로',
            'from kfp import dsl',
            'from kfp.dsl import Input, Output, Dataset, Model, Metrics',
            '',
            '@dsl.component(',
            '    base_image="python:3.11-slim",',
            '    packages_to_install=["pandas==2.2", "scikit-learn==1.4"],',
            ')',
            'def preprocess(',
            '    raw: Input[Dataset],',
            '    processed: Output[Dataset],',
            '):',
            '    """원본 데이터셋을 학습용으로 정제"""',
            '    import pandas as pd',
            '    df = pd.read_csv(raw.path)',
            '    df = df.dropna().drop_duplicates()',
            '    df.to_csv(processed.path, index=False)',
            '',
            '@dsl.component(',
            '    base_image="python:3.11-slim",',
            '    packages_to_install=["scikit-learn==1.4", "joblib"],',
            ')',
            'def train(',
            '    data: Input[Dataset],',
            '    model: Output[Model],',
            '    metrics: Output[Metrics],',
            '    n_estimators: int = 200,',
            '):',
            '    """RandomForest 학습 + 메트릭 기록"""',
            '    from sklearn.ensemble import RandomForestClassifier',
            '    import joblib, pandas as pd',
            '    df = pd.read_csv(data.path)',
            '    X, y = df.drop("label", axis=1), df["label"]',
            '    clf = RandomForestClassifier(n_estimators=n_estimators)',
            '    clf.fit(X, y)',
            '    metrics.log_metric("accuracy", clf.score(X, y))',
            '    joblib.dump(clf, model.path)',
            '',
            '# 각 component → 1 컨테이너 → 독립 Pod 에서 실행',
            '# 강점 - 단계별 자원(GPU/CPU) 다르게 할당 가능',
            '# 강점 - 한 단계 실패해도 그 단계만 재실행',
          ],
          highlight: [5, 6, 7, 8, 20, 21, 22],
        },
      },
      {
        focus: 'pipeline',
        title: 'Step 2. Pipeline — "DSL로 컨베이어 조립"',
        desc: '@dsl.pipeline 안에서 component 들을 함수처럼 호출 → 출력을 다음 component 입력으로 연결 → KFP가 DAG 자동 빌드. preprocess → train → evaluate → deploy 4단계가 화살표로 연결되어 K8s 위에서 순서대로 실행.',
        nodes: [
          { id: 'preprocess', label: 'preprocess', state: 'pipeline', icon: '🧱', sub: 'CPU' },
          { id: 'train',      label: 'train',      state: 'pipeline', icon: '🧠', sub: 'GPU t4' },
          { id: 'evaluate',   label: 'evaluate',   state: 'pipeline', icon: '🧪', sub: 'CPU' },
          { id: 'deploy',     label: 'deploy',     state: 'pipeline', icon: '🚀', sub: 'CPU' },
        ],
        showEdges: true,
        showLineage: false,
        showRunProgress: false,
        code: {
          lang: 'python',
          filename: 'pipeline.py',
          lines: [
            '# KFP Pipeline — component 들을 DAG 로 연결',
            'from kfp import dsl, compiler',
            '',
            '@dsl.pipeline(',
            '    name="fraud-detector-pipeline",',
            '    description="전처리 → 학습 → 평가 → 배포",',
            ')',
            'def fraud_pipeline(',
            '    data_path: str = "gs://bucket/transactions.csv",',
            '    n_estimators: int = 200,',
            '    accuracy_threshold: float = 0.85,',
            '):',
            '    # 1. 전처리',
            '    pre = preprocess(raw=import_data(data_path).outputs["dataset"])',
            '',
            '    # 2. 학습',
            '    tr = train(',
            '        data=pre.outputs["processed"],',
            '        n_estimators=n_estimators,',
            '    )',
            '    tr.set_cpu_limit("4").set_memory_limit("8Gi")',
            '    tr.set_accelerator_type("nvidia-tesla-t4").set_accelerator_limit(1)',
            '',
            '    # 3. 평가 + 분기',
            '    ev = evaluate(model=tr.outputs["model"], data=pre.outputs["processed"])',
            '',
            '    with dsl.If(ev.outputs["accuracy"] >= accuracy_threshold):',
            '        deploy(model=tr.outputs["model"])     # 통과 시만 배포',
            '',
            '# Pipeline 컴파일 → YAML (Argo Workflow)',
            'compiler.Compiler().compile(fraud_pipeline, "fraud_pipeline.yaml")',
            '',
            '# 강점 - 의존성 자동 추론 (출력→입력 연결만 보면 DAG 완성)',
            '# 강점 - dsl.If/ParallelFor 같은 제어 흐름 지원',
          ],
          highlight: [4, 14, 17, 18, 25, 27, 28],
        },
      },
      {
        focus: 'run',
        title: 'Step 3. Run — "실행 + 추적"',
        desc: 'kfp.Client().create_run_from_pipeline_func 로 실행 시작 → KFP UI 에서 실시간 그래프/로그/메트릭 확인. preprocess ✓ 완료 (45s), train 진행 중 (4분째 GPU Pod), evaluate / deploy 는 pending. 같은 pipeline 을 다른 파라미터로 100번 돌려 비교 가능.',
        nodes: [
          { id: 'preprocess', label: 'preprocess', state: 'done',    icon: '🧱', sub: '✓ 45s' },
          { id: 'train',      label: 'train',      state: 'running', icon: '🧠', sub: '⏳ 4m' },
          { id: 'evaluate',   label: 'evaluate',   state: 'pending', icon: '🧪', sub: 'pending' },
          { id: 'deploy',     label: 'deploy',     state: 'pending', icon: '🚀', sub: 'pending' },
        ],
        showEdges: true,
        showLineage: false,
        showRunProgress: true,
        code: {
          lang: 'shell',
          filename: 'run.sh',
          lines: [
            '# Run 제출 — Python SDK',
            '$ python -c "',
            'from kfp import Client',
            'client = Client(host=\'https://kfp.example.com\')',
            'run = client.create_run_from_pipeline_func(',
            '    fraud_pipeline,',
            '    arguments={\'n_estimators\': 300, \'accuracy_threshold\': 0.88},',
            '    experiment_name=\'fraud-detector\',',
            ')',
            'print(run.run_id)',
            '"',
            '> abc-123-def-456',
            '',
            '# UI 에서 실시간 모니터링',
            '# https://kfp.example.com/#/runs/details/abc-123-def-456',
            '#',
            '#   ┌─ preprocess   ✅ 45s   (out: 1.2GB processed)',
            '#   ↓',
            '#   ├─ train        ⏳ running ... (GPU Pod, 4분째)',
            '#   │     └ metrics: accuracy=0.83 (live)',
            '#   ↓',
            '#   ├─ evaluate     ⏸ pending',
            '#   ↓',
            '#   └─ deploy       ⏸ pending',
            '',
            '# CLI 도구로 비교',
            '$ kfp run list --experiment fraud-detector',
            'RUN_ID    PARAMS                  STATUS    ACCURACY',
            'abc-123   n_est=300, thr=0.88     RUNNING   -',
            'def-456   n_est=200, thr=0.85     SUCCESS   0.87',
            'ghi-789   n_est=500, thr=0.85     FAILED    -',
            '',
            '# 같은 pipeline → 파라미터만 바꿔 100 run → 베스트 자동 선정',
          ],
          highlight: [5, 6, 7, 8, 17, 19, 20],
        },
      },
      {
        focus: 'artifact',
        title: 'Step 4. Artifact — "입출력 메타데이터로 lineage"',
        desc: 'KFP 의 Input/Output[Dataset|Model|Metrics] 타입은 단순 파일이 아니라 lineage 자동 기록 객체. 어떤 데이터셋이 어떤 모델로 갔는지 KFP UI 에서 거꾸로 추적. ML Metadata(MLMD) 백엔드에 저장. 트리로 모델의 출처를 한눈에 확인.',
        nodes: [
          { id: 'preprocess', label: 'preprocess', state: 'done',    icon: '🧱', sub: '✓ 45s' },
          { id: 'train',      label: 'train',      state: 'done',    icon: '🧠', sub: '✓ 6m' },
          { id: 'evaluate',   label: 'evaluate',   state: 'done',    icon: '🧪', sub: '✓ 12s' },
          { id: 'deploy',     label: 'deploy',     state: 'done',    icon: '🚀', sub: '✓ 8s' },
        ],
        showEdges: true,
        showLineage: true,
        showRunProgress: false,
        code: {
          lang: 'yaml',
          filename: 'artifact-metadata.yaml',
          lines: [
            '# Artifact 메타데이터 — KFP가 자동 기록',
            'artifact:',
            '  name: fraud_model',
            '  type: system.Model',
            '  uri: gs://kfp-artifacts/runs/abc-123/train/model',
            '  created_at: 2026-05-04T10:23:11Z',
            '  producer:',
            '    pipeline: fraud-detector-pipeline',
            '    run_id: abc-123-def-456',
            '    component: train',
            '  metadata:',
            '    framework: scikit-learn',
            '    framework_version: "1.4"',
            '    model_format: joblib',
            '    accuracy: 0.91',
            '',
            '  # lineage — 이 모델이 만들어진 과정 (자동 추적)',
            '  inputs:',
            '    - name: processed',
            '      type: system.Dataset',
            '      uri: gs://kfp-artifacts/runs/abc-123/preprocess/processed',
            '      producer: preprocess',
            '      derived_from:',
            '        - name: raw',
            '          uri: gs://bucket/transactions.csv',
            '          version: v25.3',
            '',
            '# 거꾸로 추적 (KFP UI)',
            '# fraud_model (v3 in Registry)',
            '#   ← train run abc-123 (n_estimators=300)',
            '#       ← preprocess run abc-123 (output: processed)',
            '#           ← raw dataset v25.3',
            '#               ← producer: airflow-ingest-dag run-789',
            '#',
            '# "이 모델 어떻게 만들어졌어?" → 클릭 한 번에 답',
          ],
          highlight: [3, 4, 17, 18, 19, 23, 24, 25, 26],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 노드 상태 스타일
    // ─────────────────────────────────────────────────────
    const NODE_STYLE = {
      idle:      { card: 'bg-slate-50 border-slate-300',           label: 'text-slate-600', sub: 'text-slate-400', badge: '대기' },
      highlight: { card: 'bg-fuchsia-50 border-fuchsia-500 ring-2 ring-fuchsia-300', label: 'text-fuchsia-800', sub: 'text-fuchsia-600', badge: '컨테이너' },
      pipeline:  { card: 'bg-violet-50 border-violet-400',         label: 'text-violet-800', sub: 'text-violet-600', badge: 'DAG' },
      pending:   { card: 'bg-slate-100 border-slate-300',          label: 'text-slate-500', sub: 'text-slate-400', badge: '⏸ pending' },
      running:   { card: 'bg-amber-50 border-amber-400 animate-pulse', label: 'text-amber-800', sub: 'text-amber-700', badge: '⏳ running' },
      done:      { card: 'bg-emerald-50 border-emerald-400',       label: 'text-emerald-800', sub: 'text-emerald-700', badge: '✓ done' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — KFP DAG 그래프
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const { focus, nodes, showEdges, showLineage, showRunProgress } = step;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🏭 K8s 컨테이너 조립 라인 (KFP DAG)</h2>
            <span className="text-[10px] text-slate-400 font-mono">{focus} phase</span>
          </div>

          {/* DAG 영역 */}
          <div className="bg-slate-50 rounded-lg border border-slate-200 p-4 mb-4">
            {focus === 'component' ? (
              // Step 1: 단일 컨테이너 박스
              <div className="flex items-center justify-center min-h-[160px]">
                <div className={`rounded-lg border-2 p-4 text-center w-44 transition-all ${NODE_STYLE.highlight.card}`}>
                  <div className="text-3xl mb-1">{nodes[0].icon}</div>
                  <div className={`font-bold text-sm ${NODE_STYLE.highlight.label}`}>{nodes[0].label}</div>
                  <div className={`text-[10px] mt-0.5 ${NODE_STYLE.highlight.sub}`}>{nodes[0].sub}</div>
                  <div className="mt-2 text-[10px] font-mono inline-block px-2 py-0.5 rounded bg-fuchsia-100 text-fuchsia-700">
                    {NODE_STYLE.highlight.badge}
                  </div>
                </div>
              </div>
            ) : (
              // Step 2~4: 4-노드 DAG (가로 화살표)
              <div className="flex items-center justify-between gap-1 overflow-x-auto py-2">
                {nodes.map((n, i) => {
                  const style = NODE_STYLE[n.state] || NODE_STYLE.idle;
                  return (
                    <React.Fragment key={n.id}>
                      <div className={`rounded-lg border-2 p-2 text-center flex-shrink-0 w-24 transition-all ${style.card}`}>
                        <div className="text-xl">{n.icon}</div>
                        <div className={`font-bold text-[11px] mt-0.5 ${style.label}`}>{n.label}</div>
                        <div className={`text-[9px] mt-0.5 ${style.sub}`}>{n.sub}</div>
                        <div className="mt-1 text-[9px] font-mono inline-block px-1 py-0.5 rounded bg-white/70 border border-current/20">
                          {style.badge}
                        </div>
                      </div>
                      {showEdges && i < nodes.length - 1 && (
                        <div className="flex-shrink-0 text-fuchsia-500 text-2xl font-bold" aria-hidden="true">→</div>
                      )}
                    </React.Fragment>
                  );
                })}
              </div>
            )}
          </div>

          {/* Step 3: Run 진행률 */}
          {showRunProgress && (
            <div className="mb-4 p-3 rounded-lg bg-amber-50 border border-amber-200">
              <div className="flex items-center justify-between mb-2">
                <span className="text-xs font-bold text-amber-800">▶ Run abc-123-def-456</span>
                <span className="text-[10px] font-mono text-amber-700">2 / 4 단계 (50%)</span>
              </div>
              <div className="h-2 bg-amber-100 rounded-full overflow-hidden">
                <div className="h-full bg-amber-500 transition-all duration-700" style={{ width: '50%' }} />
              </div>
              <div className="text-[10px] text-amber-700 mt-2 font-mono">
                preprocess ✅ 45s · train ⏳ accuracy=0.83 (live)
              </div>
            </div>
          )}

          {/* Step 4: Artifact lineage 트리 */}
          {showLineage && (
            <div className="mb-4 p-3 rounded-lg bg-fuchsia-50 border border-fuchsia-200">
              <div className="text-xs font-bold text-fuchsia-800 mb-2">📁 Artifact lineage (역추적)</div>
              <div className="font-mono text-[11px] text-fuchsia-900 leading-relaxed">
                <div>📦 <span className="font-bold">fraud_model</span> <span className="text-fuchsia-600">(system.Model · v3)</span></div>
                <div className="pl-4">↑ produced by</div>
                <div className="pl-4">⚙️ train · run abc-123 <span className="text-fuchsia-600">(n_estimators=300)</span></div>
                <div className="pl-8">↑ input</div>
                <div className="pl-8">📊 processed <span className="text-fuchsia-600">(system.Dataset)</span></div>
                <div className="pl-12">↑ produced by</div>
                <div className="pl-12">⚙️ preprocess · run abc-123</div>
                <div className="pl-16">↑ input</div>
                <div className="pl-16">📥 raw v25.3 <span className="text-fuchsia-600">(gs://bucket/transactions.csv)</span></div>
              </div>
            </div>
          )}

          {/* 4-Phase 카드 (focus 강조) */}
          <div className="grid grid-cols-4 gap-2 pt-3 border-t border-slate-100">
            {[
              { key: 'component', emoji: '🧱', name: 'Component', note: '컨테이너' },
              { key: 'pipeline',  emoji: '🔗', name: 'Pipeline',  note: 'DAG' },
              { key: 'run',       emoji: '▶️', name: 'Run',       note: '실행' },
              { key: 'artifact',  emoji: '📁', name: 'Artifact',  note: 'lineage' },
            ].map((p) => {
              const isActive = focus === p.key;
              return (
                <div
                  key={p.key}
                  className={`rounded-lg p-2 text-center transition-all ${isActive ? 'bg-fuchsia-100 border-2 border-fuchsia-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-lg">{p.emoji}</div>
                  <div className="text-[10px] font-bold text-slate-800 mt-0.5">{p.name}</div>
                  <div className="text-[9px] text-slate-500">{p.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-fuchsia-500/10 border-l-2 border-fuchsia-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-fuchsia-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. ML 워크플로우 &gt; Chapter 1. Kubeflow Pipelines</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Kubeflow Pipelines</h1>
                  <p className="text-sm text-slate-500 mt-0.5">K8s 컨테이너 조립 라인 — Component / Pipeline / Run / Artifact</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-fuchsia-50 border-2 border-fuchsia-300 rounded-xl p-3 text-sm text-fuchsia-900">
                💡 다음(V-2-1)에서는 <strong>Airflow ML DAG</strong> — 표준 워크플로우 엔진으로 ML 파이프라인 짜기
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-fuchsia-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-fuchsia-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-fuchsia-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-fuchsia-600 text-white hover:bg-fuchsia-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./V-2-1.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">V-2-1 Airflow ML DAG &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
