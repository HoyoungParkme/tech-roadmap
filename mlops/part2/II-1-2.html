<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLOps 학습 — Feature Store</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    II-1-2. Feature Store
    학습 목표: 학습/추론에서 같은 feature를 재사용해 train-serving skew를 막는다.
    핵심 비유: "공유 부엌 식재료 창고" — 모든 요리(학습/추론)가 같은 재료 사용
    구조: 4단계 (중복+불일치 / Feast 등록 / 학습-서빙 일관 / online store)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. feature 중복 — train-serving skew 발생',
        desc: '데이터 사이언티스트가 학습 노트북에서 만든 feature 코드와 백엔드 엔지니어가 서빙 코드에서 만든 feature 코드가 미묘하게 달라 다른 결과 → train-serving skew. 정확도 추락의 흔한 원인.',
        block: {
          kind: 'python',
          code: `# 학습 노트북 (data scientist)
def avg_purchase_30d(user_id):
    return df.filter(date >= today - 30).groupby('user').mean()
# pandas 기반, 어제까지 데이터로 학습

# 서빙 백엔드 (engineer)
def avg_purchase_30d(user_id):
    return redis.get(f"avg_purchase:{user_id}")
# Redis에 미리 계산된 값 가져오기
# ⚠ 30일 vs 31일 / NaN 처리 / 시간대 차이 미묘하게 다름

# 결과: 학습 88% → 서빙 70%
# train-serving skew 발생!

# 원인: 같은 의미의 feature를 두 곳에서 따로 구현`,
        },
        focus: 'skew',
      },
      {
        title: 'Step 2. Feast 등록 — feature 정의를 한 곳에',
        desc: 'Feast (오픈소스 Feature Store)에 feature를 한 번만 정의 등록. 학습/서빙 모두 같은 정의 사용. 변경 시 한 곳만 수정하면 양쪽에 반영. "공유 부엌 식재료 창고에 등록".',
        block: {
          kind: 'python',
          code: `# feature_repo/features.py (한 곳에서만 정의)
from feast import FeatureView, Field, FileSource
from feast.types import Float32, Int64

user = Entity(name="user_id", join_keys=["user_id"])

user_purchases = FeatureView(
    name="user_purchases",
    entities=[user],
    schema=[
        Field(name="avg_30d", dtype=Float32),
        Field(name="count_30d", dtype=Int64),
        Field(name="last_amount", dtype=Float32),
    ],
    source=FileSource(path="s3://data/purchases.parquet"),
    ttl=timedelta(days=30),
)

# Apply
$ feast apply
Created entity: user_id
Created feature view: user_purchases`,
        },
        focus: 'register',
      },
      {
        title: 'Step 3. 학습 - get_historical_features',
        desc: '학습 시 "user_id + timestamp" 묶음으로 그 시점의 feature 값을 가져옴(point-in-time correct). 미래 데이터 누수 방지. 같은 feature view를 학습/서빙 양쪽에서 재사용.',
        block: {
          kind: 'python',
          code: `# 학습 데이터 만들기 (Feast 사용)
from feast import FeatureStore

store = FeatureStore("./feature_repo")

entity_df = pd.DataFrame({
    "user_id": [1001, 1002, 1003],
    "event_timestamp": ["2026-04-01", "2026-04-02", "2026-04-03"],
})

training_df = store.get_historical_features(
    entity_df=entity_df,
    features=[
        "user_purchases:avg_30d",
        "user_purchases:count_30d",
    ],
).to_df()

# Point-in-time correct:
# 2026-04-01 이전 데이터만 사용 → 미래 누수 방지
# 학습/서빙 동일한 feature 정의 사용 (skew 0)`,
        },
        focus: 'training',
      },
      {
        title: 'Step 4. 서빙 - get_online_features (Redis/DynamoDB)',
        desc: '서빙 시에는 ms 단위 응답이 필요. Online Store(Redis 등)에 최신 feature 값 미리 저장. get_online_features로 즉시 조회. 학습 시 정의와 100% 일치 — skew 0.',
        block: {
          kind: 'python',
          code: `# 1. Materialize (배치로 online store 채움)
$ feast materialize 2026-04-01 2026-05-06
Materializing user_purchases to redis (10ms latency)

# 2. 서빙 시점 - 추론 API
features = store.get_online_features(
    features=[
        "user_purchases:avg_30d",
        "user_purchases:count_30d",
    ],
    entity_rows=[{"user_id": 1001}],
).to_dict()

# {avg_30d: 124.5, count_30d: 8}
# ↑ 학습 시와 정의 100% 동일 → skew 0

# 모델 추론
prediction = model.predict([features['avg_30d'], features['count_30d']])

# 효과
✓ 학습-서빙 일관성 (skew 제거)
✓ feature 재사용 (다른 모델에도)
✓ feature 카탈로그 (어떤 feature가 있는지 한눈에)`,
        },
        focus: 'serving',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },  // cyan — python(초록)과 색상 구분
    };

    const STAGES = [
      { key: 'skew',     emoji: '⚠️', name: 'Skew 발생',     note: '학습 ≠ 서빙' },
      { key: 'register', emoji: '📝', name: 'Feast 등록',    note: '정의 한 곳에' },
      { key: 'training', emoji: '📚', name: '학습 시',        note: 'point-in-time' },
      { key: 'serving',  emoji: '⚡', name: '서빙 시',        note: 'online store' },
    ];

    function StageCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🍳 공유 부엌 (Feature Store)</div>
          <div className="grid grid-cols-4 gap-2">
            {STAGES.map((s) => {
              const isActive = focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-pink-100 border-2 border-pink-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{s.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{s.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{s.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Feature Store</h1>
                <p className="text-sm text-slate-500 mt-1">공유 부엌 — 학습/서빙 같은 feature 사용 (train-serving skew 제거)</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <StageCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'serving' && (
              <div className="bg-pink-50 border-2 border-pink-300 rounded-xl p-3 mb-6 text-xs text-pink-900">
                💡 다음(II-2-1)에서는 학습 단계들을 자동화하는 학습 파이프라인 (Airflow / Kubeflow)을 본다 — 공장 자동화 비유
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
