<!DOCTYPE html>
<html lang="ko">
<head>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />

<body>
  <div id="root"></div>

  <!--
    II-1-2. Feature Store
    학습 목표: 학습/추론에서 같은 feature를 재사용해 train-serving skew를 막는다.
    핵심 비유: 공유 부엌 식재료 창고 — 같은 재료(feature)를 학습/서빙이 함께 쓴다.
    패턴: fastapi v1 패턴 — 좌(LiveDataPane: feature 표 + Train/Serving 박스) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (Feature Store 시뮬레이션)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. 중복 구현 — train-serving skew 발생',
        desc: '학습 노트북(데이터 사이언티스트)과 서빙 백엔드(엔지니어)가 같은 의미의 feature를 따로 구현. 30일 vs 31일 / NaN 처리 / 시간대 차이로 값이 미묘하게 어긋난다. 학습 88% → 서빙 70%, 빨간색 mismatch.',
        offline: { rows: [], visible: false, label: 'Offline Store (대량 / 학습용)', empty: '아직 등록된 feature 없음' },
        online:  { rows: [], visible: false, label: 'Online Store (저지연 / 서빙용)', empty: '아직 등록된 feature 없음' },
        train:   { source: 'pandas (df.groupby)', value: '124.5', count: '8', skew: true,  label: '학습 (Train)' },
        serving: { source: 'redis.get(...)',     value: '131.2', count: '7', skew: true,  label: '서빙 (Serving)' },
        consistency: { ok: false, text: '🚨 Skew 발생 — 학습 ≠ 서빙' },
        code: {
          lang: 'python',
          filename: 'before_feature_store.py',
          lines: [
            '# 🧑‍🔬 학습 노트북 (data scientist)',
            'def avg_purchase_30d(user_id):',
            '    return (df.filter(date >= today - 30)',
            '              .groupby("user").mean())',
            '# pandas 기반, 어제까지 데이터로 학습',
            '',
            '# 🧑‍💻 서빙 백엔드 (engineer)',
            'def avg_purchase_30d(user_id):',
            '    return redis.get(f"avg_purchase:{user_id}")',
            '# Redis에 미리 계산된 값 가져오기',
            '# ⚠ 30일 vs 31일 / NaN 처리 / 시간대 차이',
            '',
            '# 결과: 학습 88% → 서빙 70%',
            '# train-serving skew 발생!',
            '',
            '# 원인: 같은 의미 feature를 두 곳에서 따로 구현',
          ],
          highlight: [2, 8, 13, 14],
        },
      },
      {
        title: 'Step 2. Feast 등록 — feature 정의를 한 곳에',
        desc: 'Feast(오픈소스 Feature Store)에 feature view를 한 번만 정의해 등록. 학습/서빙 모두 같은 정의를 공유. 변경은 한 곳만 수정하면 양쪽에 반영. "공유 부엌 식재료 창고에 등록".',
        offline: {
          visible: true,
          label: 'Offline Store (대량 / 학습용)',
          rows: [
            { name: 'avg_30d',     dtype: 'Float32', source: 's3://purchases.parquet' },
            { name: 'count_30d',   dtype: 'Int64',   source: 's3://purchases.parquet' },
            { name: 'last_amount', dtype: 'Float32', source: 's3://purchases.parquet' },
          ],
        },
        online: { rows: [], visible: false, label: 'Online Store (저지연 / 서빙용)', empty: '아직 비어있음 (materialize 전)' },
        train:   { source: '대기 중', value: '—', count: '—', skew: false, idle: true, label: '학습 (Train)' },
        serving: { source: '대기 중', value: '—', count: '—', skew: false, idle: true, label: '서빙 (Serving)' },
        consistency: { ok: null, text: '📝 feature view 등록됨 — 학습/서빙 공유 준비' },
        code: {
          lang: 'python',
          filename: 'feature_repo/features.py',
          lines: [
            '# Feast — feature 정의를 한 곳에서만',
            'from feast import FeatureView, Field, FileSource, Entity',
            'from feast.types import Float32, Int64',
            'from datetime import timedelta',
            '',
            'user = Entity(name="user_id", join_keys=["user_id"])',
            '',
            'user_purchases = FeatureView(',
            '    name="user_purchases",',
            '    entities=[user],',
            '    schema=[',
            '        Field(name="avg_30d",     dtype=Float32),',
            '        Field(name="count_30d",   dtype=Int64),',
            '        Field(name="last_amount", dtype=Float32),',
            '    ],',
            '    source=FileSource(path="s3://data/purchases.parquet"),',
            '    ttl=timedelta(days=30),',
            ')',
            '',
            '# $ feast apply',
            '# Created entity: user_id',
            '# Created feature view: user_purchases',
          ],
          highlight: [8, 9, 11, 12, 13, 16],
        },
      },
      {
        title: 'Step 3. 학습 — get_historical_features (offline)',
        desc: 'Offline Store에서 "user_id + timestamp"로 그 시점의 feature를 추출(point-in-time correct). 미래 데이터 누수 방지. 학습 데이터프레임 생성. 학습/서빙이 같은 feature view를 재사용한다.',
        offline: {
          visible: true,
          active: true,
          label: 'Offline Store (대량 / 학습용)',
          rows: [
            { name: 'avg_30d',     dtype: 'Float32', source: 's3://purchases.parquet', value: '124.5' },
            { name: 'count_30d',   dtype: 'Int64',   source: 's3://purchases.parquet', value: '8' },
            { name: 'last_amount', dtype: 'Float32', source: 's3://purchases.parquet', value: '49.0' },
          ],
        },
        online: { rows: [], visible: false, label: 'Online Store (저지연 / 서빙용)', empty: '아직 비어있음 (materialize 전)' },
        train:   { source: 'get_historical_features', value: '124.5', count: '8', skew: false, label: '학습 (Train)' },
        serving: { source: '대기 중', value: '—', count: '—', skew: false, idle: true, label: '서빙 (Serving)' },
        consistency: { ok: true, text: '📚 학습 feature 추출 — point-in-time correct' },
        code: {
          lang: 'python',
          filename: 'train.py',
          lines: [
            '# 학습 데이터 생성 — Feast offline store',
            'import pandas as pd',
            'from feast import FeatureStore',
            '',
            'store = FeatureStore(repo_path="./feature_repo")',
            '',
            'entity_df = pd.DataFrame({',
            '    "user_id":         [1001, 1002, 1003],',
            '    "event_timestamp": ["2026-04-01", "2026-04-02", "2026-04-03"],',
            '})',
            '',
            'training_df = store.get_historical_features(',
            '    entity_df=entity_df,',
            '    features=[',
            '        "user_purchases:avg_30d",',
            '        "user_purchases:count_30d",',
            '    ],',
            ').to_df()',
            '',
            '# Point-in-time correct:',
            '# 2026-04-01 이전 데이터만 사용 → 미래 누수 방지',
            '# 학습/서빙 동일 feature 정의 → skew 0',
          ],
          highlight: [12, 15, 16, 20, 21],
        },
      },
      {
        title: 'Step 4. 서빙 — get_online_features (online, ms)',
        desc: 'feast materialize로 online store(Redis 등)를 채운 뒤, 서빙은 ms 단위로 즉시 조회. 학습 시점과 동일한 feature 정의 → skew 0, 일관성 확인(녹색). 다른 모델도 같은 feature 재사용.',
        offline: {
          visible: true,
          label: 'Offline Store (대량 / 학습용)',
          rows: [
            { name: 'avg_30d',     dtype: 'Float32', source: 's3://purchases.parquet', value: '124.5' },
            { name: 'count_30d',   dtype: 'Int64',   source: 's3://purchases.parquet', value: '8' },
            { name: 'last_amount', dtype: 'Float32', source: 's3://purchases.parquet', value: '49.0' },
          ],
        },
        online: {
          visible: true,
          active: true,
          label: 'Online Store (저지연 / 서빙용)',
          rows: [
            { name: 'avg_30d',     dtype: 'Float32', source: 'redis (10ms)', value: '124.5' },
            { name: 'count_30d',   dtype: 'Int64',   source: 'redis (10ms)', value: '8' },
            { name: 'last_amount', dtype: 'Float32', source: 'redis (10ms)', value: '49.0' },
          ],
        },
        train:   { source: 'get_historical_features', value: '124.5', count: '8', skew: false, label: '학습 (Train)' },
        serving: { source: 'get_online_features',     value: '124.5', count: '8', skew: false, label: '서빙 (Serving)' },
        consistency: { ok: true, text: '✅ 학습 = 서빙 (skew 0) — feature 정의 100% 일치' },
        code: {
          lang: 'python',
          filename: 'serve.py',
          lines: [
            '# 1) Materialize — offline → online 동기화',
            '# $ feast materialize 2026-04-01 2026-05-06',
            '# Materializing user_purchases to redis (10ms latency)',

            '# 2) 서빙 시점 — 추론 API',
            'from feast import FeatureStore',
            'store = FeatureStore(repo_path="./feature_repo")',
            '',
            'features = store.get_online_features(',
            '    features=[',
            '        "user_purchases:avg_30d",',
            '        "user_purchases:count_30d",',
            '    ],',
            '    entity_rows=[{"user_id": 1001}],',
            ').to_dict()',
            '# {avg_30d: 124.5, count_30d: 8}',
            '# ↑ 학습 시 정의와 100% 동일 → skew 0',
            '',
            'prediction = model.predict([',
            '    features["avg_30d"], features["count_30d"]',
            '])',
            '# ✓ 학습-서빙 일관성  ✓ feature 재사용  ✓ 카탈로그',
          ],
          highlight: [9, 11, 12, 16, 17, 22],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // LiveDataPane — Feature 표 (offline / online) + Train / Serving 박스
    // ─────────────────────────────────────────────────────
    function FeatureTable({ side }) {
      if (!side.visible) {
        return (
          <div className={`rounded-lg border-2 border-dashed border-slate-300 bg-slate-50 p-3`}>
            <div className="text-[11px] font-bold text-slate-600 mb-1">{side.label}</div>
            <div className="text-[10px] text-slate-400 italic">{side.empty}</div>
          </div>
        );
      }
      const activeRing = side.active ? 'ring-2 ring-fuchsia-400' : '';
      return (
        <div className={`rounded-lg border-2 border-fuchsia-300 bg-fuchsia-50 p-3 ${activeRing}`}>
          <div className="flex items-center justify-between mb-2">
            <div className="text-[11px] font-bold text-fuchsia-800">{side.label}</div>
            {side.active && <span className="text-[9px] font-mono text-fuchsia-700 bg-fuchsia-100 px-1.5 py-0.5 rounded">read</span>}
          </div>
          <table className="w-full text-[10px] font-mono">
            <thead>
              <tr className="text-fuchsia-900 border-b border-fuchsia-200">
                <th className="text-left py-1">name</th>
                <th className="text-left py-1">dtype</th>
                <th className="text-left py-1">source</th>
                <th className="text-right py-1">value</th>
              </tr>
            </thead>
            <tbody>
              {side.rows.map((r) => (
                <tr key={r.name} className="border-b border-fuchsia-100 last:border-0">
                  <td className="py-1 text-slate-800 font-bold">{r.name}</td>
                  <td className="py-1 text-slate-600">{r.dtype}</td>
                  <td className="py-1 text-slate-500 truncate max-w-[110px]">{r.source}</td>
                  <td className="py-1 text-right text-fuchsia-700 font-bold tabular-nums">{r.value || '—'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function EnvBox({ env }) {
      if (env.idle) {
        return (
          <div className="rounded-lg border-2 border-dashed border-slate-300 bg-slate-50 p-3">
            <div className="text-[11px] font-bold text-slate-600 mb-1">{env.label}</div>
            <div className="text-[10px] text-slate-400 italic">{env.source}</div>
            <div className="mt-2 grid grid-cols-2 gap-1 text-[10px] font-mono text-slate-400">
              <div>avg_30d: —</div>
              <div>count_30d: —</div>
            </div>
          </div>
        );
      }
      const tone = env.skew
        ? { box: 'bg-red-50 border-red-400', tag: 'bg-red-100 text-red-700', src: 'text-red-700', val: 'text-red-700' }
        : { box: 'bg-emerald-50 border-emerald-400', tag: 'bg-emerald-100 text-emerald-700', src: 'text-emerald-700', val: 'text-emerald-700' };

      return (
        <div className={`rounded-lg border-2 p-3 ${tone.box}`}>
          <div className="flex items-center justify-between mb-1">
            <div className="text-[11px] font-bold text-slate-800">{env.label}</div>
            <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${tone.tag}`}>
              {env.skew ? '🚨 mismatch' : '✓ aligned'}
            </span>
          </div>
          <div className={`text-[10px] font-mono mb-2 ${tone.src} truncate`}>src: {env.source}</div>
          <div className="grid grid-cols-2 gap-2 text-[11px] font-mono">
            <div className="bg-white/60 rounded px-1.5 py-1">
              <div className="text-[9px] text-slate-500">avg_30d</div>
              <div className={`font-bold tabular-nums ${tone.val}`}>{env.value}</div>
            </div>
            <div className="bg-white/60 rounded px-1.5 py-1">
              <div className="text-[9px] text-slate-500">count_30d</div>
              <div className={`font-bold tabular-nums ${tone.val}`}>{env.count}</div>
            </div>
          </div>
        </div>
      );
    }

    function LiveDataPane({ step }) {
      const c = step.consistency;
      const consistencyTone = c.ok === true
        ? 'bg-emerald-50 border-emerald-400 text-emerald-800'
        : c.ok === false
          ? 'bg-red-50 border-red-400 text-red-800'
          : 'bg-slate-50 border-slate-300 text-slate-700';

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🍳 공유 부엌 (Feature Store)</h2>
            <span className="text-[10px] text-slate-400 font-mono">Feast · offline + online</span>
          </div>

          {/* Feature 표 — offline / online 두 칸 */}
          <div className="grid grid-cols-1 gap-3 mb-4">
            <FeatureTable side={step.offline} />
            <FeatureTable side={step.online} />
          </div>

          {/* Train / Serving 두 환경 박스 */}
          <div className="grid grid-cols-2 gap-3 mb-3">
            <EnvBox env={step.train} />
            <EnvBox env={step.serving} />
          </div>

          {/* 일관성 상태 박스 */}
          <div className={`rounded-lg border-2 px-3 py-2 text-xs font-bold ${consistencyTone}`}>
            {c.text}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-red-400"></span>skew (불일치)</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-400"></span>aligned (일치)</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-fuchsia-400"></span>feature store</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-fuchsia-500/10 border-l-2 border-fuchsia-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-fuchsia-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 데이터 &amp; 피처 &gt; Chapter 1. Feature Store</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Feature Store</h1>
                  <p className="text-sm text-slate-500 mt-0.5">공유 부엌 — 학습/서빙 같은 feature 사용 (train-serving skew 제거)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-fuchsia-50 border-2 border-fuchsia-300 rounded-xl p-3 text-sm text-fuchsia-900">
                💡 다음(II-2-1)에서는 학습 파이프라인 — Airflow/Kubeflow
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-fuchsia-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-fuchsia-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-fuchsia-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-fuchsia-600 text-white hover:bg-fuchsia-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; II-1-1</a>
              <a href="./II-2-1.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">II-2-1 학습 파이프라인 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
