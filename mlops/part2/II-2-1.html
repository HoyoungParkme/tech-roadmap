<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLOps 학습 — II-2-1. 학습 파이프라인 (Airflow / Kubeflow)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-2-1. 학습 파이프라인 (Airflow / Kubeflow)
    학습 목표: ML 단계들을 DAG로 묶어 자동 실행 / 의존성 / 병렬 / 재시도 / 스케줄.
    핵심 비유: "공장 자동화 라인" — 단계마다 사람이 옮기는 게 아니라 컨베이어 벨트로 연결
    패턴: fastapi v1 패턴 — 좌(LiveDataPane: DAG 노드 그래프) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (DAG 노드 그래프 시뮬레이션)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. 수동 실행 — 사람이 단계마다 클릭',
        desc: '5단계(fetch → preprocess → train → evaluate → register)를 사람이 매번 손으로 실행. 의존선 없이 노드만 회색. 실패 시 어디서 재시작? 새벽 자동 학습 불가능. 공장에 컨베이어 벨트가 없는 상황.',
        mode: 'manual',
        showEdges: false,
        showParallel: false,
        showRetry: false,
        showSchedule: false,
        runCount: 0,
        retryCount: 0,
        code: {
          lang: 'shell',
          filename: 'manual_run.sh',
          lines: [
            '# 매주 월요일 새벽 학습 (수동)',
            '$ python fetch_data.py        # 1. 데이터 수집 (10분)',
            '                              #    실패 시: ?',
            '$ python preprocess.py        # 2. 전처리 (5분)',
            '$ python train.py             # 3. 학습 (2시간)',
            '$ python evaluate.py          # 4. 평가',
            '$ python register.py          # 5. 모델 등록',
            '',
            '# 문제',
            '# - 사람이 항상 대기? 새벽 1시?',
            '# - 3번에서 실패 → 어디서 재시작? 1번부터?',
            '# - 어떤 데이터로 학습됐는지 기록 어디?',
            '# - 다른 팀원이 같은 학습을 어떻게 재현?',
            '# → 자동화 도구 필요 (Airflow / Kubeflow)',
          ],
          highlight: [9, 10, 11, 12, 13, 14],
        },
      },
      {
        title: 'Step 2. DAG 정의 — 단계와 의존성을 코드로',
        desc: 'Airflow DAG는 Task와 의존성(>>)을 Python으로 정의. "공장 라인 설계도". 노드 사이에 화살표 — 앞 단계가 끝나야 다음 단계 실행. 단계 단위로 재시작 / 모니터링 / 로그 분리.',
        mode: 'dag',
        showEdges: true,
        showParallel: false,
        showRetry: false,
        showSchedule: false,
        runCount: 0,
        retryCount: 0,
        code: {
          lang: 'python',
          filename: 'dags/ml_pipeline.py',
          lines: [
            '# Airflow DAG — 단계와 의존성을 코드로',
            'from airflow import DAG',
            'from airflow.operators.python import PythonOperator',
            'from datetime import datetime',
            '',
            'with DAG(',
            '    "ml_training_pipeline",',
            '    start_date=datetime(2026, 1, 1),',
            '    catchup=False,',
            ') as dag:',
            '',
            '    fetch      = PythonOperator(task_id="fetch",      python_callable=run_fetch)',
            '    preprocess = PythonOperator(task_id="preprocess", python_callable=run_preprocess)',
            '    train      = PythonOperator(task_id="train",      python_callable=run_train)',
            '    evaluate   = PythonOperator(task_id="evaluate",   python_callable=run_evaluate)',
            '    register   = PythonOperator(task_id="register",   python_callable=run_register)',
            '',
            '    # 의존성 — fetch가 끝나야 preprocess, …',
            '    fetch >> preprocess >> train >> evaluate >> register',
          ],
          highlight: [12, 13, 14, 15, 16, 19],
        },
      },
      {
        title: 'Step 3. 병렬 + 재시도 — 그래프 구조',
        desc: 'DAG는 단순 직선이 아닌 그래프. preprocess는 3개 샤드를 병렬 실행 — 처리 시간 1/3. train은 자동 재시도 3회 (현재 2회 시도 중). 효율 + 안정성 둘 다.',
        mode: 'graph',
        showEdges: true,
        showParallel: true,
        showRetry: true,
        showSchedule: false,
        runCount: 0,
        retryCount: 2,
        code: {
          lang: 'python',
          filename: 'dags/ml_pipeline.py',
          lines: [
            '# 병렬 + 재시도 — 그래프 의존성',
            'from datetime import timedelta',
            '',
            'fetch = PythonOperator(task_id="fetch", python_callable=run_fetch)',
            '',
            '# preprocess를 3개 샤드로 병렬 분할',
            'preprocess_shards = [',
            '    PythonOperator(task_id=f"preprocess_{i}",',
            '                   python_callable=run_preprocess,',
            '                   op_kwargs={"shard": i})',
            '    for i in range(3)',
            ']',
            '',
            '# train은 실패 시 자동 재시도 3회',
            'train = PythonOperator(',
            '    task_id="train",',
            '    python_callable=run_train,',
            '    retries=3,',
            '    retry_delay=timedelta(minutes=5),',
            ')',
            '',
            'evaluate = PythonOperator(task_id="evaluate", python_callable=run_evaluate)',
            'register = PythonOperator(task_id="register", python_callable=run_register)',
            '',
            '# 그래프: fetch → [3개 병렬] → train(retry) → evaluate → register',
            'fetch >> preprocess_shards >> train >> evaluate >> register',
          ],
          highlight: [7, 8, 9, 10, 11, 12, 18, 19, 26],
        },
      },
      {
        title: 'Step 4. 스케줄 — 매일 새벽 자동 실행',
        desc: 'cron 표현식으로 스케줄(매일 02시) + 알림(Slack) + 타임아웃. 운영 자동화 풀세트. 사람은 알림 받을 때만 개입. 지금까지 자동 실행 누적 카운터 7회. Kubeflow도 같은 개념을 K8s 네이티브로.',
        mode: 'schedule',
        showEdges: true,
        showParallel: true,
        showRetry: true,
        showSchedule: true,
        runCount: 7,
        retryCount: 0,
        code: {
          lang: 'python',
          filename: 'dags/ml_pipeline.py',
          lines: [
            '# 운영 자동화 풀세트',
            'with DAG(',
            '    "ml_training_pipeline",',
            '    schedule="0 2 * * *",                       # 매일 02:00 (cron)',
            '    start_date=datetime(2026, 1, 1),',
            '    catchup=False,',
            '    default_args={',
            '        "retries": 3,',
            '        "retry_delay": timedelta(minutes=5),',
            '        "execution_timeout": timedelta(hours=4),',
            '        "on_failure_callback": notify_slack,    # 실패 시 알림',
            '    },',
            ') as dag:',
            '    fetch >> preprocess_shards >> train >> evaluate >> register',
            '',
            '# Airflow UI',
            '# - 매 실행마다 그래프 색상 (green/red/skipped)',
            '# - 단계별 로그 클릭 한 번으로 확인',
            '# - 실패한 단계만 재실행 가능',
            '# - 과거 실행 이력 1년치 보관',
            '',
            '# Kubeflow Pipelines — 같은 개념, K8s 네이티브',
            '# - 각 Task가 Pod, 컴포넌트 재사용성',
            '# - Notebook 통합 (학습 특화)',
          ],
          highlight: [4, 7, 8, 9, 10, 11],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // DAG 노드 메타 (5 task 고정)
    // ─────────────────────────────────────────────────────
    const NODES = [
      { id: 'fetch',      emoji: '📥', name: 'fetch',      sub: '데이터 수집' },
      { id: 'preprocess', emoji: '🧹', name: 'preprocess', sub: '전처리' },
      { id: 'train',      emoji: '🧠', name: 'train',      sub: '학습' },
      { id: 'evaluate',   emoji: '📊', name: 'evaluate',   sub: '평가' },
      { id: 'register',   emoji: '📦', name: 'register',   sub: '모델 등록' },
    ];

    // 모드별 노드 색상 (정적 Tailwind — purge 안전)
    const NODE_STYLE = {
      manual:   { box: 'bg-slate-100 border-slate-300', text: 'text-slate-500', badge: 'bg-slate-200 text-slate-600', label: '수동' },
      dag:      { box: 'bg-fuchsia-50 border-fuchsia-300', text: 'text-fuchsia-700', badge: 'bg-fuchsia-100 text-fuchsia-700', label: '연결' },
      graph:    { box: 'bg-fuchsia-50 border-fuchsia-400', text: 'text-fuchsia-800', badge: 'bg-fuchsia-100 text-fuchsia-700', label: '의존' },
      schedule: { box: 'bg-emerald-50 border-emerald-400', text: 'text-emerald-800', badge: 'bg-emerald-100 text-emerald-700', label: '실행됨' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — DAG 노드 그래프
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const { mode, showEdges, showParallel, showRetry, showSchedule, runCount, retryCount } = step;
      const style = NODE_STYLE[mode];

      // 단일 노드 박스 렌더 헬퍼
      const NodeBox = ({ node, sizeClass = '' }) => (
        <div className={`rounded-lg border-2 p-2 transition-all duration-500 ${style.box} ${sizeClass}`}>
          <div className="flex items-center justify-between mb-1">
            <div className="flex items-center gap-1">
              <span aria-hidden="true">{node.emoji}</span>
              <span className={`text-xs font-bold ${style.text}`}>{node.name}</span>
            </div>
            <span className={`text-[9px] font-bold px-1 rounded ${style.badge}`}>{style.label}</span>
          </div>
          <div className="text-[10px] text-slate-500">{node.sub}</div>
        </div>
      );

      // 화살표 (▶) — showEdges true일 때만 색 입히기
      const Arrow = () => (
        <div className="flex items-center justify-center text-lg font-bold transition-colors duration-500"
             style={{ color: showEdges ? '#c026d3' : '#cbd5e1' }}>
          ▶
        </div>
      );

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🏭 학습 파이프라인 DAG</h2>
            <span className="text-[10px] text-slate-400 font-mono">5 tasks · {showSchedule ? 'scheduled' : showEdges ? 'wired' : 'idle'}</span>
          </div>

          {/* 스케줄 + 실행 카운터 (Step 4) */}
          {showSchedule && (
            <div className="mb-4 p-3 rounded-lg bg-emerald-50 border-2 border-emerald-300">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2 text-emerald-800 text-sm font-bold">
                  <span className="text-lg">⏰</span>
                  <span>cron: <span className="font-mono">0 2 * * *</span> (매일 02:00)</span>
                </div>
                <div className="text-right">
                  <div className="text-[10px] text-emerald-700 font-bold uppercase">자동 실행</div>
                  <div className="text-2xl font-extrabold text-emerald-700 tabular-nums">{runCount}회</div>
                </div>
              </div>
              <div className="text-[11px] text-emerald-700 mt-1 font-mono">
                next: 내일 02:00 · 실패 시 Slack #ml-alerts
              </div>
            </div>
          )}

          {/* 그래프: fetch → preprocess(병렬?) → train(retry?) → evaluate → register */}
          <div className="space-y-3">
            {/* 1행: fetch → preprocess */}
            <div className="grid grid-cols-[1fr_auto_2fr] gap-2 items-center">
              <NodeBox node={NODES[0]} />
              <Arrow />
              {/* preprocess: 병렬 모드면 3개 샤드, 아니면 단일 */}
              {showParallel ? (
                <div className="grid grid-cols-3 gap-1">
                  {[0, 1, 2].map((i) => (
                    <div key={i} className={`rounded-md border-2 p-1.5 ${style.box} text-center`}>
                      <div className={`text-[10px] font-bold ${style.text}`}>🧹 shard_{i}</div>
                      <div className="text-[9px] text-slate-500">병렬</div>
                    </div>
                  ))}
                </div>
              ) : (
                <NodeBox node={NODES[1]} />
              )}
            </div>

            {/* 2행: → train (retry 카운트) → evaluate → register */}
            <div className="grid grid-cols-[1fr_auto_1fr_auto_1fr] gap-2 items-center">
              <Arrow />
              <div className="relative">
                <NodeBox node={NODES[2]} />
                {showRetry && retryCount > 0 && (
                  <div className="absolute -top-2 -right-2 bg-amber-500 text-white text-[10px] font-extrabold rounded-full w-7 h-7 flex items-center justify-center border-2 border-white shadow animate-pulse"
                       title="자동 재시도 카운트">
                    ↻{retryCount}
                  </div>
                )}
              </div>
              <Arrow />
              <NodeBox node={NODES[3]} />
              <Arrow />
            </div>

            {/* 3행: register (오른쪽 정렬) */}
            <div className="flex justify-end">
              <div className="w-1/3"><NodeBox node={NODES[4]} /></div>
            </div>
          </div>

          {/* 모드별 안내 */}
          <div className="mt-4 pt-3 border-t border-slate-100 text-[11px] text-slate-600">
            {mode === 'manual'   && <span>🖐️ <strong>수동 모드</strong> — 노드 사이 연결 없음. 사람이 차례로 직접 실행.</span>}
            {mode === 'dag'      && <span>📋 <strong>DAG 정의</strong> — 화살표(의존성)로 단계 연결. 앞이 끝나야 다음.</span>}
            {mode === 'graph'    && <span>🕸️ <strong>그래프 + 재시도</strong> — preprocess 병렬 3개. train 재시도 {retryCount}/3회 진행 중.</span>}
            {mode === 'schedule' && <span>⏰ <strong>자동 스케줄</strong> — 매일 02시 cron 발화. 누적 {runCount}회 실행 완료.</span>}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-3 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-slate-300"></span>수동</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-fuchsia-300"></span>DAG 연결</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-amber-500"></span>재시도</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-400"></span>스케줄 실행</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code (innerHTML 추출) */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-fuchsia-500/10 border-l-2 border-fuchsia-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 — 단계 번호 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-fuchsia-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. ML 자동화 &gt; Chapter 2. 학습 파이프라인</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">학습 파이프라인 (Airflow / Kubeflow)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">공장 자동화 — 5단계(fetch → preprocess → train → evaluate → register)를 DAG로 묶어 자동 실행</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-fuchsia-50 border-2 border-fuchsia-300 rounded-xl p-3 text-sm text-fuchsia-900">
                💡 다음(II-2-2)에서는 <strong>MLflow Tracking</strong> — 실험 노트북
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-fuchsia-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-fuchsia-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-fuchsia-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-fuchsia-600 text-white hover:bg-fuchsia-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./II-2-2.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">II-2-2 MLflow Tracking &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
