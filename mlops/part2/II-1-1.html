<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLOps 학습 — 데이터 버전 관리 (DVC)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    II-1-1. 데이터 버전 관리 (DVC)
    학습 목표: 코드(git)와 데이터(DVC)를 분리해서 버전 관리하는 표준 패턴.
    핵심 비유: "사진 앨범 버전" — 같은 코드라도 어떤 사진(데이터)으로 학습했는지 태그
    구조: 4단계 (대용량 데이터 git 한계 / dvc add / 원격 push / 재현)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 대용량 데이터 git 한계 — "data 100GB git push?"',
        desc: 'git은 코드(텍스트, 작은 binary) 추적용. 100GB 학습 데이터를 push하면 repo 폭파, GitHub 거부(파일당 100MB 한도). 그렇다고 .gitignore에 두면 누가 어떤 데이터로 학습했는지 추적 불가.',
        block: {
          kind: 'shell',
          code: `# 흔한 시도
$ git add data/train.csv     # 1.5 GB
$ git commit -m "add data"
$ git push origin main
remote: error: File data/train.csv is 1.5 GB; this exceeds GitHub's file size limit of 100 MB
# ✗ 푸시 거부

# 대안 1: .gitignore + 외부 저장
$ echo "data/" >> .gitignore
$ git commit -am "ignore data"
# 단점: 어떤 데이터로 학습했는지 추적 불가
# "그때 그 모델 만든 데이터 어디?" → 답 없음`,
        },
        focus: 'git-fail',
      },
      {
        title: 'Step 2. dvc add — "데이터 해시만 git에"',
        desc: 'DVC가 데이터를 추적해 .dvc 파일(작은 메타) 만든다. git에는 .dvc 파일만 commit, 실제 데이터는 외부 저장(S3, GCS)에. 코드와 데이터 버전을 함께 관리 가능.',
        block: {
          kind: 'shell',
          code: `# DVC 초기화
$ dvc init
$ git commit -m "Initialize DVC"

# 데이터 추적
$ dvc add data/train.csv
# 결과:
# - data/train.csv      → .gitignore에 자동 추가
# - data/train.csv.dvc  → 메타 파일 (작음, ~1KB)

# git에 메타만 commit
$ cat data/train.csv.dvc
outs:
  - md5: 7c9d4b3f...        ← 데이터 해시
    size: 1503892740
    path: train.csv

$ git add data/train.csv.dvc data/.gitignore
$ git commit -m "add training data v1"`,
        },
        focus: 'dvc-add',
      },
      {
        title: 'Step 3. dvc push — 원격 저장소 (S3/GCS)',
        desc: '실제 큰 데이터는 dvc remote(S3 등)로 push. 팀원은 git pull로 .dvc 파일 받고 dvc pull로 데이터 받음. 코드 1MB + 데이터 100GB가 같은 repo처럼 동작.',
        block: {
          kind: 'shell',
          code: `# 원격 설정 (한 번만)
$ dvc remote add -d storage s3://my-bucket/dvc-data

# push
$ dvc push
Pushing 1 file to s3://my-bucket/dvc-data
data/train.csv    [############] 100%

# 다른 팀원
$ git clone repo
$ git pull            # .dvc 파일 받음
$ dvc pull            # 실제 데이터 자동 다운로드
# → 같은 데이터로 동기화

# 새 데이터 버전
$ # data/train.csv 갱신
$ dvc add data/train.csv
$ git commit -m "data v2: add 10k more samples"
$ dvc push`,
        },
        focus: 'dvc-push',
      },
      {
        title: 'Step 4. 재현 — "그때 그 모델"',
        desc: 'git checkout으로 과거 commit으로 돌아가면, .dvc 파일도 그 시점 버전. dvc checkout/pull로 그 시점 데이터를 가져옴. 코드+데이터 1년 전 상태로 완벽 재현. 모델 디버깅 / 감사 / 비교에 필수.',
        block: {
          kind: 'shell',
          code: `# 6개월 전 모델을 재현하고 싶다
$ git log --oneline
abc123  feat: improve features
7d9f8e  data v3 (3M samples)
3c8a2b  data v2 (1M samples)        ← 이때 만든 모델
1a4f5e  data v1 (100k samples)

$ git checkout 3c8a2b
$ dvc checkout                     # 그 시점 데이터 자동 복원
# 또는
$ dvc pull                         # 원격에서 받기

# 학습 재실행
$ python train.py
# → 6개월 전과 정확히 같은 데이터 + 코드 → 같은 모델

# 모델 비교 / 디버깅 / 감사 모두 가능
# Code(git) + Data(DVC) = ML 재현성의 핵심`,
        },
        focus: 'reproduce',
      },
    ];

    const KIND_STYLE = {
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },  // cyan — python과 색상 구분
      python: { label: 'Python', textColor: '#86efac' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const STAGES = [
      { key: 'git-fail',   emoji: '❌', name: 'git 한계',    note: '대용량 push 거부' },
      { key: 'dvc-add',    emoji: '📸', name: 'dvc add',     note: '.dvc 메타만 git' },
      { key: 'dvc-push',   emoji: '☁️', name: 'dvc push',    note: 'S3에 데이터' },
      { key: 'reproduce',  emoji: '🔁', name: '재현',        note: '6개월 전 모델 복원' },
    ];

    function StageCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">📸 사진 앨범 버전 (DVC)</div>
          <div className="grid grid-cols-4 gap-2">
            {STAGES.map((s) => {
              const isActive = focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-pink-100 border-2 border-pink-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{s.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{s.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{s.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">데이터 버전 관리 (DVC)</h1>
                <p className="text-sm text-slate-500 mt-1">사진 앨범 버전 — 같은 코드, 다른 데이터를 정확히 추적</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <StageCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'reproduce' && (
              <div className="bg-pink-50 border-2 border-pink-300 rounded-xl p-3 mb-6 text-xs text-pink-900">
                💡 다음(II-1-2)에서는 학습/추론 양쪽에서 같은 feature를 재사용하는 Feature Store를 본다 — 공유 부엌 비유
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
