<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLOps 학습 — II-1-1. 데이터 버전 관리 (DVC)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-1-1. 데이터 버전 관리 (DVC)
    학습 목표: 코드(git)와 데이터(DVC)를 분리해서 버전 관리하는 표준 패턴.
    핵심 비유: "사진 앨범 버전" — 같은 코드라도 어떤 사진(데이터)으로 학습했는지 태그
    패턴: fastapi v1 패턴 — 좌(LiveDataPane: 파일 카드 + Git/DVC 표) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (DVC 4 단계 시뮬레이션)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. git 한계 — "200MB 데이터 push 거부"',
        desc: 'git은 코드(텍스트, 작은 binary)용. 200MB 학습 데이터를 push하면 GitHub가 100MB 한도 넘었다고 거부한다. 그렇다고 .gitignore에 두면 누가 어떤 데이터로 학습했는지 추적 불가.',
        files: [
          { name: 'data.csv',  size: '200 MB', hash: '—',          status: 'rejected', loc: 'local' },
          { name: 'model.pkl', size: '120 MB', hash: '—',          status: 'rejected', loc: 'local' },
          { name: 'train.py',  size: '4 KB',   hash: 'a1b2c3 (git)', status: 'tracked',  loc: 'git' },
        ],
        table: {
          rows: [
            { what: '코드 (작은 텍스트)', git: 'ok',   dvc: '—' },
            { what: '대용량 데이터 (>100MB)', git: 'fail', dvc: '—' },
            { what: '모델 파일 (>100MB)',     git: 'fail', dvc: '—' },
            { what: '데이터-코드 버전 매칭',  git: 'fail', dvc: '—' },
          ],
        },
        showRemote: false,
        showReproduce: false,
        code: {
          lang: 'shell',
          filename: 'git-fail.sh',
          lines: [
            '# 흔한 시도 — git에 통째로',
            '$ git add data.csv         # 200 MB',
            '$ git add model.pkl        # 120 MB',
            '$ git commit -m "add training set"',
            '$ git push origin main',
            'remote: error: File data.csv is 200 MB;',
            'remote: this exceeds GitHub\'s file size limit of 100 MB',
            '! [remote rejected] main -> main (pre-receive hook declined)',
            '✗ 푸시 거부',
            '',
            '# 대안: .gitignore에 넣고 외부 어딘가에 둔다?',
            '$ echo "data.csv" >> .gitignore',
            '$ echo "model.pkl" >> .gitignore',
            '# 단점: "그때 그 모델 만든 데이터 어디?" → 답 없음',
            '#       코드는 v1.2인데 데이터는 어떤 버전이었는지 추적 불가',
          ],
          highlight: [5, 6, 7, 8, 9],
        },
      },
      {
        title: 'Step 2. dvc add — "해시만 git에, 실제 파일은 .dvc/cache로"',
        desc: 'DVC가 데이터를 추적해 .dvc 파일(작은 메타)을 만든다. git에는 .dvc 파일만 commit, 실제 데이터는 외부 저장으로 분리. 큰 파일은 빠지고 해시만 코드와 함께 버전 관리된다.',
        files: [
          { name: 'data.csv',     size: '200 MB', hash: '7c9d4b3f',     status: 'tracked-dvc', loc: 'dvc-cache' },
          { name: 'data.csv.dvc', size: '1 KB',   hash: 'e4f5a6 (git)', status: 'tracked',     loc: 'git' },
          { name: 'model.pkl',    size: '120 MB', hash: '9a2c1e8d',     status: 'tracked-dvc', loc: 'dvc-cache' },
          { name: 'model.pkl.dvc',size: '1 KB',   hash: 'b7d8c9 (git)', status: 'tracked',     loc: 'git' },
        ],
        table: {
          rows: [
            { what: '코드 (작은 텍스트)',      git: 'ok',  dvc: '—' },
            { what: '대용량 데이터 (>100MB)', git: '—',   dvc: 'ok' },
            { what: '모델 파일 (>100MB)',     git: '—',   dvc: 'ok' },
            { what: '데이터-코드 버전 매칭',  git: 'ok',  dvc: 'ok' },
          ],
        },
        showRemote: false,
        showReproduce: false,
        code: {
          lang: 'shell',
          filename: 'dvc-add.sh',
          lines: [
            '# DVC 초기화 (한 번만)',
            '$ dvc init',
            '$ git commit -m "Initialize DVC"',
            '',
            '# 데이터 추적 — 큰 파일은 .dvc/cache로 이동, 메타 파일만 남김',
            '$ dvc add data.csv',
            '$ dvc add model.pkl',
            '',
            '# 결과 — 실제 파일은 .gitignore에 자동 추가됨',
            '$ cat data.csv.dvc',
            'outs:',
            '  - md5: 7c9d4b3f...        ← 데이터 해시',
            '    size: 209715200',
            '    path: data.csv',
            '',
            '# git에는 .dvc 메타 파일만 commit',
            '$ git add data.csv.dvc model.pkl.dvc .gitignore',
            '$ git commit -m "track data v1 + model v1"',
          ],
          highlight: [6, 7, 11, 12],
        },
      },
      {
        title: 'Step 3. dvc push — 원격 저장소(S3) 동기화',
        desc: '실제 큰 데이터를 dvc remote(S3 등)로 push. 이제 git repo는 작게 유지되고, 데이터는 S3에 해시 키로 저장된다. 팀원은 git pull로 .dvc 받고, dvc pull로 데이터를 받을 수 있다.',
        files: [
          { name: 'data.csv',     size: '200 MB', hash: '7c9d4b3f',     status: 'pushed',  loc: 's3' },
          { name: 'data.csv.dvc', size: '1 KB',   hash: 'e4f5a6 (git)', status: 'tracked', loc: 'git' },
          { name: 'model.pkl',    size: '120 MB', hash: '9a2c1e8d',     status: 'pushed',  loc: 's3' },
          { name: 'model.pkl.dvc',size: '1 KB',   hash: 'b7d8c9 (git)', status: 'tracked', loc: 'git' },
        ],
        table: {
          rows: [
            { what: '코드 (작은 텍스트)',      git: 'ok', dvc: '—' },
            { what: '대용량 데이터 (>100MB)', git: '—',  dvc: 'ok' },
            { what: '원격 저장 (S3 동기화)',  git: 'ok', dvc: 'ok' },
            { what: '데이터-코드 버전 매칭',  git: 'ok', dvc: 'ok' },
          ],
        },
        showRemote: true,
        showReproduce: false,
        code: {
          lang: 'shell',
          filename: 'dvc-push.sh',
          lines: [
            '# 원격 저장소 등록 (한 번만)',
            '$ dvc remote add -d storage s3://my-bucket/dvc-data',
            '$ git add .dvc/config',
            '$ git commit -m "configure dvc remote"',
            '',
            '# 실제 데이터를 S3로 push',
            '$ dvc push',
            'Collecting                  |2.00 [00:00, 4.16kit/s]',
            'Pushing',
            '2 files pushed',
            '✓ data.csv      (200 MB) → s3://my-bucket/dvc-data/7c/9d4b3f...',
            '✓ model.pkl     (120 MB) → s3://my-bucket/dvc-data/9a/2c1e8d...',
            '',
            '# git push는 평소처럼 — 메타만 작게',
            '$ git push origin main',
            '✓ pushed (코드 + .dvc 메타 파일만, 8 KB)',
          ],
          highlight: [6, 10, 11],
        },
      },
      {
        title: 'Step 4. 재현 — 다른 머신에서 dvc pull → 동일 hash 검증',
        desc: '동료가 새 노트북에서 git clone 후 dvc pull. S3에서 데이터를 받고, 해시를 다시 검증한다. 같은 코드 + 같은 데이터 → 같은 모델 학습 가능. "그때 그 실험" 100% 재현.',
        files: [
          { name: 'data.csv',     size: '200 MB', hash: '7c9d4b3f ✓', status: 'verified', loc: 'reproduced' },
          { name: 'data.csv.dvc', size: '1 KB',   hash: 'e4f5a6 (git)', status: 'tracked',  loc: 'git' },
          { name: 'model.pkl',    size: '120 MB', hash: '9a2c1e8d ✓', status: 'verified', loc: 'reproduced' },
          { name: 'model.pkl.dvc',size: '1 KB',   hash: 'b7d8c9 (git)', status: 'tracked',  loc: 'git' },
        ],
        table: {
          rows: [
            { what: '코드 (작은 텍스트)',      git: 'ok', dvc: '—' },
            { what: '대용량 데이터 (>100MB)', git: '—',  dvc: 'ok' },
            { what: '원격 저장 (S3 동기화)',  git: 'ok', dvc: 'ok' },
            { what: '재현 가능 (해시 검증)',  git: 'ok', dvc: 'ok' },
          ],
        },
        showRemote: true,
        showReproduce: true,
        code: {
          lang: 'shell',
          filename: 'reproduce.sh',
          lines: [
            '# 동료의 새 노트북에서',
            '$ git clone git@github.com:team/ml-project.git',
            '$ cd ml-project',
            '',
            '# 코드만 받음 — 데이터는 아직 .dvc 메타만 있음',
            '$ ls data.csv',
            'ls: data.csv: No such file or directory',
            '$ cat data.csv.dvc',
            'outs:',
            '  - md5: 7c9d4b3f...        ← 어떤 데이터인지 해시로 명시',
            '',
            '# DVC가 S3에서 해시로 데이터를 받아옴 + 검증',
            '$ dvc pull',
            'A  data.csv      (md5 7c9d4b3f ✓ 검증 통과)',
            'A  model.pkl     (md5 9a2c1e8d ✓ 검증 통과)',
            '',
            '# 같은 코드 + 같은 데이터 → 100% 재현',
            '$ python train.py',
            '✓ accuracy: 0.913 (원본 실험과 동일)',
          ],
          highlight: [12, 13, 14, 17, 18],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 파일 상태 스타일 (Tailwind 정적 — purge 안전)
    // ─────────────────────────────────────────────────────
    const STATUS_STYLE = {
      rejected:    { card: 'bg-red-50 border-red-400',         badge: 'bg-red-100 text-red-700',         label: '✗ git reject (>100MB)', pulse: true  },
      tracked:     { card: 'bg-slate-50 border-slate-300',     badge: 'bg-slate-200 text-slate-700',     label: '🔖 git 추적',           pulse: false },
      'tracked-dvc': { card: 'bg-fuchsia-50 border-fuchsia-300', badge: 'bg-fuchsia-100 text-fuchsia-700', label: '📦 dvc add (cache)',    pulse: false },
      pushed:      { card: 'bg-sky-50 border-sky-300',         badge: 'bg-sky-100 text-sky-700',         label: '☁️ S3 push 완료',       pulse: false },
      verified:    { card: 'bg-emerald-50 border-emerald-400', badge: 'bg-emerald-100 text-emerald-700', label: '✓ hash 검증 OK',        pulse: false },
    };

    const LOC_BADGE = {
      local:       { color: 'bg-slate-200 text-slate-600',   label: 'local' },
      git:         { color: 'bg-slate-700 text-white',       label: 'git' },
      'dvc-cache': { color: 'bg-fuchsia-600 text-white',     label: '.dvc/cache' },
      s3:          { color: 'bg-sky-600 text-white',         label: 's3 remote' },
      reproduced:  { color: 'bg-emerald-600 text-white',     label: '재현 머신' },
    };

    const TABLE_CELL = {
      ok:   { cls: 'bg-emerald-100 text-emerald-700 border-emerald-300', text: '✓' },
      fail: { cls: 'bg-red-100 text-red-700 border-red-300',             text: '✗' },
      '—':  { cls: 'bg-slate-50 text-slate-400 border-slate-200',        text: '—' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 파일 카드 + Git/DVC 비교 표
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ files, table, showRemote, showReproduce }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">📚 사진 앨범 버전 관리</h2>
            <span className="text-[10px] text-slate-400 font-mono">git + dvc · live</span>
          </div>

          {/* 파일 카드 그리드 */}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-2.5 mb-4">
            {files.map((f) => {
              const style = STATUS_STYLE[f.status];
              const loc = LOC_BADGE[f.loc];
              return (
                <div
                  key={f.name}
                  className={`rounded-lg border-2 p-2.5 transition-all duration-500 ${style.card} ${style.pulse ? 'animate-pulse' : ''}`}
                >
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-xs font-bold text-slate-800 font-mono truncate">{f.name}</span>
                    <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${loc.color}`}>{loc.label}</span>
                  </div>
                  <div className="flex items-baseline gap-2 text-[11px] text-slate-600 mb-1.5">
                    <span className="font-mono">{f.size}</span>
                    <span className="text-slate-400">·</span>
                    <span className="font-mono text-fuchsia-700 truncate">{f.hash}</span>
                  </div>
                  <div className={`text-[10px] font-bold px-1.5 py-0.5 rounded inline-block ${style.badge}`}>
                    {style.label}
                  </div>
                </div>
              );
            })}
          </div>

          {/* 원격 저장소 시각화 (Step 3+) */}
          {showRemote && (
            <div className="mb-4 p-2.5 rounded-lg bg-sky-50 border-2 border-sky-300">
              <div className="flex items-center gap-2 text-sky-800 font-bold text-xs mb-1">
                <span>☁️</span>
                <span>s3://my-bucket/dvc-data/</span>
              </div>
              <div className="text-[10px] font-mono text-sky-700 space-y-0.5">
                <div>├── 7c/9d4b3f...      (data.csv 200MB) ✓</div>
                <div>└── 9a/2c1e8d...      (model.pkl 120MB) ✓</div>
              </div>
            </div>
          )}

          {/* 재현 머신 (Step 4) */}
          {showReproduce && (
            <div className="mb-4 p-2.5 rounded-lg bg-emerald-50 border-2 border-emerald-400">
              <div className="flex items-center gap-2 text-emerald-800 font-bold text-xs mb-1">
                <span>💻</span>
                <span>동료의 노트북 — dvc pull 후 hash 검증</span>
              </div>
              <div className="text-[10px] font-mono text-emerald-700">
                accuracy 0.913 → 원본 실험과 100% 일치 ✓
              </div>
            </div>
          )}

          {/* Git vs DVC 비교 표 */}
          <div className="border-t border-slate-100 pt-3">
            <div className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2">git vs dvc 책임 분담</div>
            <table className="w-full text-xs border-collapse">
              <thead>
                <tr className="text-[10px] text-slate-500">
                  <th className="text-left font-medium pb-1.5 pr-2">항목</th>
                  <th className="font-medium pb-1.5 px-1 w-12 text-center">git</th>
                  <th className="font-medium pb-1.5 px-1 w-12 text-center">dvc</th>
                </tr>
              </thead>
              <tbody>
                {table.rows.map((r, i) => (
                  <tr key={i} className="border-t border-slate-100">
                    <td className="text-slate-700 py-1.5 pr-2">{r.what}</td>
                    <td className="py-1 px-0.5">
                      <span className={`block text-center font-bold border rounded text-[11px] py-0.5 ${TABLE_CELL[r.git].cls}`}>
                        {TABLE_CELL[r.git].text}
                      </span>
                    </td>
                    <td className="py-1 px-0.5">
                      <span className={`block text-center font-bold border rounded text-[11px] py-0.5 ${TABLE_CELL[r.dvc].cls}`}>
                        {TABLE_CELL[r.dvc].text}
                      </span>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-red-400"></span>git reject</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-fuchsia-400"></span>dvc cache</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-sky-400"></span>S3 push</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-400"></span>검증 OK</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code (innerHTML 추출) */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-fuchsia-500/10 border-l-2 border-fuchsia-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 — 단계 번호 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-fuchsia-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 데이터 &amp; 실험 &gt; Chapter 1. 데이터/모델 버전 관리</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">데이터 버전 관리 (DVC)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">사진 앨범 비유 — 코드는 git, 데이터는 DVC. 4단계로 재현성 확보</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                files={step.files}
                table={step.table}
                showRemote={step.showRemote}
                showReproduce={step.showReproduce}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-fuchsia-50 border-2 border-fuchsia-300 rounded-xl p-3 text-sm text-fuchsia-900">
                💡 다음(II-1-2)에서는 <strong>Feature Store</strong> — 학습/서빙에서 같은 피처를 재사용하는 중앙 저장소
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-fuchsia-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-fuchsia-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-fuchsia-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-fuchsia-600 text-white hover:bg-fuchsia-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./II-1-2.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">II-1-2 Feature Store &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
