<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLOps 학습 — MLflow Tracking</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    II-2-2. 실험 추적 (MLflow Tracking)
    학습 목표: 매 학습 실행의 파라미터/메트릭/모델을 자동 기록.
    핵심 비유: "실험 노트북" — 모든 시도를 자동으로 적어주는 노트
    구조: 4단계 (기록 누락 / log_param·log_metric / UI 비교 / Registry)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 기록 누락 — "5번 돌렸는데 어떤 게 best?"',
        desc: '하이퍼파라미터를 바꿔가며 5번 학습. notebook 화면에 메트릭 출력만. 어느 조합이 best였는지 기억 안남. 30분 전의 자기 실험을 재현 못함.',
        block: {
          kind: 'python',
          code: `# 흔한 노트북 시나리오
model = RandomForestClassifier(n_estimators=100, max_depth=5)
model.fit(X, y)
print(accuracy_score(...))   # 0.87

# 다시 시도
model = RandomForestClassifier(n_estimators=200, max_depth=10)
model.fit(X, y)
print(accuracy_score(...))   # 0.89

# 또
model = RandomForestClassifier(n_estimators=300, max_depth=8)
print(...)                   # 0.91

# 5번째 시도... 어떤 파라미터?
# 노트북 끄고 일주일 뒤
# "best 조합이 뭐였지?" → 답 없음
# → MLflow Tracking 필요`,
        },
        focus: 'no-track',
      },
      {
        title: 'Step 2. log_param + log_metric — 자동 기록',
        desc: 'mlflow.start_run() 안에서 log_param/log_metric/log_model 호출. 매 실행 정보를 자동 저장. 5번 돌리면 5개 run 자동 생성. autolog()는 sklearn/pytorch 등에서 더 자동.',
        block: {
          kind: 'python',
          code: `import mlflow

mlflow.set_experiment("rf_tuning")

for n in [100, 200, 300]:
    for d in [5, 8, 10]:
        with mlflow.start_run():
            mlflow.log_param("n_estimators", n)
            mlflow.log_param("max_depth", d)

            model = RandomForestClassifier(n_estimators=n, max_depth=d)
            model.fit(X_train, y_train)

            acc = accuracy_score(y_test, model.predict(X_test))
            mlflow.log_metric("accuracy", acc)
            mlflow.log_model(model, "model")

# 9개 run 자동 기록 (각각 파라미터+메트릭+모델 저장)
# 또는 더 간단히
mlflow.sklearn.autolog()       # ← 자동 기록 ON
model.fit(X, y)                # 알아서 모든 것 log`,
        },
        focus: 'log',
      },
      {
        title: 'Step 3. MLflow UI — 9개 실험 한눈에 비교',
        desc: 'mlflow ui로 웹 대시보드 실행. 모든 run을 표/그래프로 비교. accuracy 기준 정렬, 파라미터 차이 한눈에. "어떤 조합이 best?" 답이 즉시 보임. 협업/공유에도 좋음.',
        block: {
          kind: 'shell',
          code: `# UI 실행
$ mlflow ui --host 0.0.0.0 --port 5000

# 브라우저에서 http://localhost:5000

# UI 화면 (개념)
┌──────────┬───────┬──────────┬──────────┐
│ Run name │ acc   │ n_estim. │ max_depth │
├──────────┼───────┼──────────┼──────────┤
│ run-007  │ 0.913 │ 200      │ 8         │ ← best!
│ run-005  │ 0.911 │ 300      │ 5         │
│ run-008  │ 0.908 │ 200      │ 10        │
│ run-002  │ 0.892 │ 100      │ 8         │
│ ...      │       │          │           │
└──────────┴───────┴──────────┴──────────┘

# 그래프로도 — accuracy vs n_estimators 산점도
# 운영팀: "어떤 모델이 production?" 답을 1초에`,
        },
        focus: 'ui',
      },
      {
        title: 'Step 4. Model Registry — Staging → Production',
        desc: '베스트 run의 모델을 Model Registry에 등록 → 단계 전환(Staging → Production). 운영팀은 "production 단계 모델"만 가져다 씀. 코드/팀 분리에 핵심. 다음 Part III 배포의 기반.',
        block: {
          kind: 'python',
          code: `# Best run 모델을 Registry에 등록
import mlflow

run_id = "abc123def..."   # best run ID
model_uri = f"runs:/{run_id}/model"

mlflow.register_model(model_uri, "fraud-detector")
# Registered model 'fraud-detector' version 5

# 단계 전환 (수동 또는 API)
client = mlflow.MlflowClient()
client.transition_model_version_stage(
    name="fraud-detector",
    version=5,
    stage="Staging"
)

# 검증 통과 후
client.transition_model_version_stage(
    name="fraud-detector",
    version=5,
    stage="Production"
)

# 운영팀
production_model = mlflow.pyfunc.load_model(
    model_uri="models:/fraud-detector/Production"
)
# → 항상 production 단계 모델만 로드 (단계 전환되면 자동 갱신)

# Part II 데이터+학습 4/4 완성 — 다음 Part III 배포로`,
        },
        focus: 'registry',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },  // cyan — python(초록)과 색상 구분
    };

    const STAGES = [
      { key: 'no-track', emoji: '❓', name: '기록 누락',     note: '"best가 뭐였지?"' },
      { key: 'log',      emoji: '📝', name: 'log_param',    note: '자동 저장' },
      { key: 'ui',       emoji: '📊', name: 'MLflow UI',    note: '한눈에 비교' },
      { key: 'registry', emoji: '🏷️', name: 'Registry',     note: 'Staging→Production' },
    ];

    function StageCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">📓 실험 노트북 (MLflow Tracking)</div>
          <div className="grid grid-cols-4 gap-2">
            {STAGES.map((s) => {
              const isActive = focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-pink-100 border-2 border-pink-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{s.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{s.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{s.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">실험 추적 (MLflow Tracking)</h1>
                <p className="text-sm text-slate-500 mt-1">실험 노트북 — 매 학습 실행을 자동 기록</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <StageCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'registry' && (
              <div className="bg-pink-50 border-2 border-pink-300 rounded-xl p-3 mb-6 text-xs text-pink-900">
                💡 Part II 데이터 & 학습 4/4 완성! MLOps 6/20. 다음(III-1-1)부터는 Model Registry → 실제 서빙으로 가는 Part III 배포 흐름
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
