<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLOps 학습 — II-2-2. 실험 추적 (MLflow Tracking)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-2-2. 실험 추적 (MLflow Tracking)
    학습 목표: 매 학습 실행의 파라미터/메트릭/모델을 자동 기록하고 비교 → Registry 등록한다.
    핵심 비유: 실험 노트북 — 모든 시도를 자동으로 적어주는 노트
    패턴: fastapi v1 패턴 — 좌(LiveDataPane: 실험 비교 표) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (실험 비교 표 시뮬레이션)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. 기록 누락 — "5번 돌렸는데 어떤 게 best?"',
        desc: '하이퍼파라미터 바꿔가며 학습 N회. notebook 화면엔 print만. 어떤 조합이 best였는지 기억 안 남. 30분 전 자기 실험 재현 못 함. 표는 텅 비어 있고 "?"만.',
        rows: [
          { id: '?', n: '?', d: '?', acc: '?', state: 'unknown' },
          { id: '?', n: '?', d: '?', acc: '?', state: 'unknown' },
          { id: '?', n: '?', d: '?', acc: '?', state: 'unknown' },
          { id: '?', n: '?', d: '?', acc: '?', state: 'unknown' },
          { id: '?', n: '?', d: '?', acc: '?', state: 'unknown' },
        ],
        showRegistry: false,
        focus: 'no-track',
        code: {
          lang: 'python',
          filename: 'notebook_no_track.py',
          lines: [
            '# 흔한 노트북 시나리오 — 기록 없음',
            'model = RandomForestClassifier(n_estimators=100, max_depth=5)',
            'model.fit(X_train, y_train)',
            'print(accuracy_score(y_test, model.predict(X_test)))   # 0.87',
            '',
            '# 다시 시도',
            'model = RandomForestClassifier(n_estimators=200, max_depth=10)',
            'model.fit(X_train, y_train)',
            'print(accuracy_score(...))   # 0.89',
            '',
            '# 또',
            'model = RandomForestClassifier(n_estimators=300, max_depth=8)',
            'print(...)                   # 0.91',
            '',
            '# 5번째 시도... 어떤 파라미터?',
            '# 노트북 끄고 일주일 뒤',
            '# "best 조합이 뭐였지?" → 답 없음',
            '# → MLflow Tracking 필요',
          ],
          highlight: [4, 9, 13, 17],
        },
      },
      {
        title: 'Step 2. log_param + log_metric — 자동 기록 시작',
        desc: 'mlflow.start_run() 안에서 log_param/log_metric/log_model 호출. 첫 실행이 즉시 표에 기록된다 — run_001, n=100, d=5, acc=0.85. autolog()를 쓰면 더 자동.',
        rows: [
          { id: 'run_001', n: 100, d: 5, acc: 0.85, state: 'logged' },
          { id: '...',     n: '?', d: '?', acc: '?', state: 'pending' },
          { id: '...',     n: '?', d: '?', acc: '?', state: 'pending' },
          { id: '...',     n: '?', d: '?', acc: '?', state: 'pending' },
          { id: '...',     n: '?', d: '?', acc: '?', state: 'pending' },
        ],
        showRegistry: false,
        focus: 'log',
        code: {
          lang: 'python',
          filename: 'train_with_mlflow.py',
          lines: [
            '# MLflow Tracking — 매 실행 자동 기록',
            'import mlflow',
            'from sklearn.ensemble import RandomForestClassifier',
            'from sklearn.metrics import accuracy_score',
            '',
            'mlflow.set_experiment("rf_tuning")',
            '',
            'with mlflow.start_run() as run:',
            '    mlflow.log_param("n_estimators", 100)',
            '    mlflow.log_param("max_depth", 5)',
            '',
            '    model = RandomForestClassifier(n_estimators=100, max_depth=5)',
            '    model.fit(X_train, y_train)',
            '',
            '    acc = accuracy_score(y_test, model.predict(X_test))',
            '    mlflow.log_metric("accuracy", acc)        # 0.85',
            '    mlflow.sklearn.log_model(model, "model")',
            '',
            '    print(run.info.run_id)   # run_001 (자동 발급)',
            '',
            '# 또는 한 줄로 — 전부 자동',
            'mlflow.sklearn.autolog()',
            'model.fit(X_train, y_train)   # param/metric/model 자동 log',
          ],
          highlight: [9, 10, 16, 17, 22],
        },
      },
      {
        title: 'Step 3. MLflow UI — 5개 실험 한눈에 비교',
        desc: 'mlflow ui로 웹 대시보드 실행. 5개 run을 표/그래프로 비교. accuracy 정렬 — best run이 즉시 보인다 (run_004, n=300, d=8, acc=0.91 녹색 강조). 협업/공유에도 좋음.',
        rows: [
          { id: 'run_001', n: 100, d: 5,  acc: 0.85, state: 'logged' },
          { id: 'run_002', n: 200, d: 10, acc: 0.89, state: 'logged' },
          { id: 'run_003', n: 300, d: 5,  acc: 0.88, state: 'logged' },
          { id: 'run_004', n: 300, d: 8,  acc: 0.91, state: 'best'   },
          { id: 'run_005', n: 200, d: 8,  acc: 0.87, state: 'logged' },
        ],
        showRegistry: false,
        focus: 'ui',
        code: {
          lang: 'shell',
          filename: 'mlflow_ui.sh',
          lines: [
            '# MLflow UI 실행',
            '$ mlflow ui --host 0.0.0.0 --port 5000',
            '',
            '# 브라우저: http://localhost:5000',
            '# Experiment: rf_tuning',
            '',
            '# Runs 비교 표 (accuracy 내림차순)',
            '#  run_id   | n_estim. | max_depth | accuracy',
            '#  ---------+----------+-----------+---------',
            '#  run_004  | 300      | 8         | 0.91   ← best',
            '#  run_002  | 200      | 10        | 0.89',
            '#  run_003  | 300      | 5         | 0.88',
            '#  run_005  | 200      | 8         | 0.87',
            '#  run_001  | 100      | 5         | 0.85',
            '',
            '# 그래프: accuracy vs n_estimators 산점도',
            '# Parallel coordinates: 파라미터 차이 한눈에',
            '# 운영팀: "어떤 모델이 best?" → 1초에 답',
          ],
          highlight: [10, 11, 12, 13, 14],
        },
      },
      {
        title: 'Step 4. Model Registry — Best run을 Production으로',
        desc: 'Best run (run_004)을 Model Registry에 등록 → Stage 라벨 (None → Staging → Production). 운영팀은 "Production 단계 모델"만 가져다 쓴다. 다음 Part III 배포의 기반.',
        rows: [
          { id: 'run_001', n: 100, d: 5,  acc: 0.85, state: 'logged' },
          { id: 'run_002', n: 200, d: 10, acc: 0.89, state: 'logged' },
          { id: 'run_003', n: 300, d: 5,  acc: 0.88, state: 'logged' },
          { id: 'run_004', n: 300, d: 8,  acc: 0.91, state: 'registered' },
          { id: 'run_005', n: 200, d: 8,  acc: 0.87, state: 'logged' },
        ],
        showRegistry: true,
        focus: 'registry',
        code: {
          lang: 'python',
          filename: 'register_model.py',
          lines: [
            '# Best run 모델을 Registry에 등록 + Stage 전환',
            'import mlflow',
            'from mlflow import MlflowClient',
            '',
            'best_run_id = "run_004"',
            'model_uri   = f"runs:/{best_run_id}/model"',
            '',
            '# 1) Registry에 등록 — version 자동 발급',
            'mlflow.register_model(model_uri, "fraud-detector")',
            '# Registered model "fraud-detector" version 1',
            '',
            'client = MlflowClient()',
            '',
            '# 2) Staging 전환 (검증 단계)',
            'client.transition_model_version_stage(',
            '    name="fraud-detector", version=1, stage="Staging"',
            ')',
            '',
            '# 3) 검증 통과 후 Production',
            'client.transition_model_version_stage(',
            '    name="fraud-detector", version=1, stage="Production"',
            ')',
            '',
            '# 운영팀 — 항상 Production 모델만 로드',
            'prod_model = mlflow.pyfunc.load_model(',
            '    model_uri="models:/fraud-detector/Production"',
            ')',
          ],
          highlight: [9, 16, 21, 25, 26],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 행 상태별 스타일 (정적 Tailwind — purge 안전)
    // ─────────────────────────────────────────────────────
    const ROW_STYLE = {
      unknown:    { row: 'bg-slate-50 text-slate-400',           badge: '' },
      pending:    { row: 'bg-slate-50 text-slate-400',           badge: '' },
      logged:     { row: 'bg-white text-slate-700',              badge: '' },
      best:       { row: 'bg-emerald-50 text-emerald-800 font-bold border-l-4 border-emerald-500', badge: '🏆 BEST' },
      registered: { row: 'bg-fuchsia-50 text-fuchsia-800 font-bold border-l-4 border-fuchsia-500', badge: '🏷️ REGISTERED' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 실험 비교 표 + Registry 박스
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ rows, showRegistry, focus }) {
      const total = rows.filter((r) => r.state === 'logged' || r.state === 'best' || r.state === 'registered').length;
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">📓 MLflow Experiment: <span className="font-mono text-fuchsia-700">rf_tuning</span></h2>
            <span className="text-[10px] text-slate-400 font-mono">{total} run · live</span>
          </div>

          {/* 실험 비교 표 */}
          <div className="border border-slate-200 rounded-lg overflow-hidden">
            <table className="w-full text-xs">
              <thead className="bg-slate-100">
                <tr className="text-slate-600">
                  <th className="px-2 py-2 text-left font-bold">run_id</th>
                  <th className="px-2 py-2 text-right font-bold">n_estim.</th>
                  <th className="px-2 py-2 text-right font-bold">max_depth</th>
                  <th className="px-2 py-2 text-right font-bold">accuracy</th>
                  <th className="px-2 py-2 text-center font-bold w-24">badge</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r, i) => {
                  const style = ROW_STYLE[r.state];
                  return (
                    <tr
                      key={i}
                      className={`border-t border-slate-200 transition-all duration-500 ${style.row}`}
                    >
                      <td className="px-2 py-2 font-mono">{r.id}</td>
                      <td className="px-2 py-2 text-right tabular-nums">{r.n}</td>
                      <td className="px-2 py-2 text-right tabular-nums">{r.d}</td>
                      <td className="px-2 py-2 text-right tabular-nums">
                        {typeof r.acc === 'number' ? r.acc.toFixed(2) : r.acc}
                      </td>
                      <td className="px-2 py-2 text-center text-[10px]">{style.badge}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* Registry 박스 (Step 4) */}
          {showRegistry && (
            <div className="mt-4 p-3 rounded-lg bg-fuchsia-50 border-2 border-fuchsia-300">
              <div className="text-xs font-bold text-fuchsia-900 mb-2">
                🏷️ Model Registry · <span className="font-mono">fraud-detector v1</span>
              </div>
              <div className="flex items-center gap-2 text-[11px]">
                <span className="px-2 py-0.5 rounded bg-slate-200 text-slate-600 font-mono">None</span>
                <span className="text-slate-400">→</span>
                <span className="px-2 py-0.5 rounded bg-yellow-200 text-yellow-800 font-mono">Staging</span>
                <span className="text-slate-400">→</span>
                <span className="px-2 py-0.5 rounded bg-fuchsia-600 text-white font-mono font-bold">Production</span>
                <span className="ml-auto text-[10px] text-fuchsia-700 font-mono">from run_004</span>
              </div>
              <div className="text-[10px] text-fuchsia-700 mt-2 font-mono">
                models:/fraud-detector/Production → 운영 서빙으로
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-slate-300"></span>미기록</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-white border border-slate-300"></span>logged</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-500"></span>best run</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-fuchsia-500"></span>registered</span>
            <span className="ml-auto font-mono text-slate-400">focus: {focus}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-fuchsia-500/10 border-l-2 border-fuchsia-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-fuchsia-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 데이터 &amp; 학습 &gt; Chapter 2. 실험 추적</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">실험 추적 (MLflow Tracking)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">실험 노트북 — 매 학습 실행을 자동 기록 → UI 비교 → Registry 등록</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                rows={step.rows}
                showRegistry={step.showRegistry}
                focus={step.focus}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-fuchsia-50 border-2 border-fuchsia-300 rounded-xl p-3 text-sm text-fuchsia-900">
                💡 Part II 완성. 다음(III-1-1)에서는 <strong>Model Registry</strong>
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-fuchsia-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-fuchsia-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-fuchsia-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-fuchsia-600 text-white hover:bg-fuchsia-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-2-1.html" className="text-slate-500 hover:text-slate-700">&larr; II-2-1</a>
              <a href="../part3/III-1-1.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">III-1-1 Model Registry &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
