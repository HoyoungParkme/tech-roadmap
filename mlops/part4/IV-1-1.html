<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLOps 학습 — IV-1-1. 모델 성능 모니터링</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    IV-1-1. 모델 성능 모니터링 — 4 Golden Signals
    학습 목표: production 모델의 품질을 4 지표(Latency p99 / Error / Accuracy / Traffic)로 추적하고 임계치 + 알람으로 자동화한다.
    핵심 비유: 건강 검진 대시보드 — 혈압/심박/혈당/체온을 모니터에 띄우고 임계치 알람
    패턴: fastapi v1 패턴 — 좌(LiveDataPane 4 metric cards) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의 (4 Golden Signals 시뮬레이션)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. 모니터링 부재 — "사고가 나야 안다"',
        desc: '배포 후 "잘 돌고 있겠지" 가정. 사용자 컴플레인이 들어와야 문제 발견. ML 모델은 일반 SW와 달리 "느리게 망가진다" — 즉각 표시 안 남는다. 4지표 모두 "?".',
        dataState: {
          latency:  { value: '?', unit: '',    state: 'unknown', threshold: null, fillPct: 0 },
          error:    { value: '?', unit: '',    state: 'unknown', threshold: null, fillPct: 0 },
          accuracy: { value: '?', unit: '',    state: 'unknown', threshold: null, fillPct: 0 },
          traffic:  { value: '?', unit: '',    state: 'unknown', threshold: null, fillPct: 0 },
        },
        showThresholdLine: false,
        showAlert: false,
        code: {
          lang: 'shell',
          filename: 'incident-report.sh',
          lines: [
            '# 운영 4주차 — 갑자기 들어온 컴플레인',
            '사용자 A: "추천 결과가 이상해요"',
            '사용자 B: "사기 탐지가 멀쩡한 결제를 막아요"',
            'PM: "어? 언제부터?" → 학습팀 확인',
            'ML팀: "2주 전부터 정확도 80→62%였습니다..."',
            '',
            '# 우리가 놓친 것 (4 Golden Signals)',
            '#  1) Latency p99   — 모델이 느려졌나?',
            '#  2) Error rate    — 입력 이상으로 fail?',
            '#  3) Accuracy      — 진짜 맞히고 있나?',
            '#  4) Traffic (RPM) — 부하 증가했나?',
            '',
            '# 깨달음: production 모델은 살아있는 시스템',
            '# → 4 지표를 실시간 추적해야 한다.',
          ],
          highlight: [7, 8, 9, 10, 11],
        },
      },
      {
        title: 'Step 2. 4 지표 추적 — "건강 검진 4가지 수치"',
        desc: 'Prometheus FastAPI middleware로 latency/error/traffic 즉시 수집. accuracy는 라벨 들어오는 만큼 지연. 평소 정상값을 baseline으로 기록한다 — latency 80ms, error 0.1%, accuracy 91%, 1200 RPM.',
        dataState: {
          latency:  { value: 80,   unit: 'ms',  state: 'good', threshold: null, fillPct: 28 },
          error:    { value: 0.1,  unit: '%',   state: 'good', threshold: null, fillPct: 8 },
          accuracy: { value: 91,   unit: '%',   state: 'good', threshold: null, fillPct: 91 },
          traffic:  { value: 1200, unit: 'rpm', state: 'info', threshold: null, fillPct: 50 },
        },
        showThresholdLine: false,
        showAlert: false,
        code: {
          lang: 'python',
          filename: 'serving.py',
          lines: [
            '# FastAPI 서빙 + Prometheus 4 Golden Signals',
            'from prometheus_client import Counter, Histogram',
            'import time',
            '',
            'predictions = Counter("ml_predictions_total", "Total", ["model"])',
            'errors      = Counter("ml_errors_total", "Errors", ["model", "kind"])',
            'latency     = Histogram("ml_latency_seconds", "Latency", ["model"])',
            '',
            '@app.post("/predict")',
            'def predict(payload: dict):',
            '    start = time.time()',
            '    try:',
            '        score = model.predict([payload])[0]',
            '        predictions.labels(model="fraud").inc()',
            '        latency.labels(model="fraud").observe(time.time() - start)',
            '        return {"fraud_score": float(score)}',
            '    except Exception as e:',
            '        errors.labels(model="fraud", kind=type(e).__name__).inc()',
            '        raise',
            '',
            '# accuracy는 label 지연 → 별도 batch (매일 새벽)',
            '# eval_yesterday.py: 어제 예측 vs 실제 라벨 → accuracy DB',
          ],
          highlight: [5, 6, 7, 14, 15, 18],
        },
      },
      {
        title: 'Step 3. 임계치 정의 — "정상 범위와 위험 신호"',
        desc: '"이 값 이상이면 위험"을 baseline 측정 후 결정. Latency 200ms, Error 1%, Accuracy 1주 대비 -5%p. 이번 주 latency 180ms / accuracy 81% — 임계치 근접. 노란색 주의 상태.',
        dataState: {
          latency:  { value: 180,  unit: 'ms',  state: 'warn',   threshold: '> 200ms',     fillPct: 60 },
          error:    { value: 0.4,  unit: '%',   state: 'good',   threshold: '> 1%',        fillPct: 28 },
          accuracy: { value: 81,   unit: '%',   state: 'warn',   threshold: '−5%p drop',   fillPct: 81 },
          traffic:  { value: 1850, unit: 'rpm', state: 'info',   threshold: 'baseline',    fillPct: 75 },
        },
        showThresholdLine: true,
        showAlert: false,
        code: {
          lang: 'yaml',
          filename: 'alert.yml',
          lines: [
            '# Prometheus AlertRule — 4 Golden Signals 임계치',
            'groups:',
            '- name: ml-fraud-detector',
            '  rules:',
            '  - alert: HighLatency',
            '    expr: histogram_quantile(0.99, ml_latency_seconds_bucket) > 0.2',
            '    for: 5m              # 5분간 지속되면 발화',
            '    annotations: { summary: "추론 p99 latency > 200ms" }',
            '',
            '  - alert: HighErrorRate',
            '    expr: rate(ml_errors_total[5m]) / rate(ml_predictions_total[5m]) > 0.01',
            '    for: 3m',
            '    annotations: { summary: "에러율 > 1%" }',
            '',
            '  - alert: AccuracyDrop',
            '    expr: ml_accuracy_daily - ml_accuracy_baseline < -0.05',
            '    for: 1h',
            '    annotations: { summary: "정확도 1주 대비 5%p 이상 하락" }',
            '',
            '# baseline: 운영 1~2주 정상 분포 측정 후 임계치 결정',
            '# - p99 latency: 평소 80ms → 임계 200ms (2.5x)',
            '# - 에러율: 평소 0.1% → 임계 1.0% (10x)',
          ],
          highlight: [6, 11, 16],
        },
      },
      {
        title: 'Step 4. 알람 자동화 — "위험 즉시 통보"',
        desc: 'Alertmanager → Slack / PagerDuty / Email로 자동 라우팅. severity별 채널 분기 — critical은 새벽이라도 호출. latency 320ms, error 1.5% — 빨간색 알람 발화. runbook 링크로 조치 안내.',
        dataState: {
          latency:  { value: 320,  unit: 'ms',  state: 'crit',   threshold: '> 200ms',   fillPct: 95 },
          error:    { value: 1.5,  unit: '%',   state: 'crit',   threshold: '> 1%',      fillPct: 80 },
          accuracy: { value: 78,   unit: '%',   state: 'warn',   threshold: '−5%p drop', fillPct: 78 },
          traffic:  { value: 2100, unit: 'rpm', state: 'info',   threshold: 'baseline',  fillPct: 85 },
        },
        showThresholdLine: true,
        showAlert: true,
        code: {
          lang: 'yaml',
          filename: 'alertmanager.yml',
          lines: [
            '# Alertmanager 라우팅 + Slack 알람',
            'route:',
            '  receiver: default',
            '  routes:',
            '  - match: { severity: critical }',
            '    receiver: pagerduty            # 새벽이라도 호출',
            '  - match: { severity: warning, team: ml }',
            '    receiver: slack-ml             # ML팀 채널',
            '  - match: { team: ops }',
            '    receiver: slack-ops            # 운영팀 채널',
            '',
            'receivers:',
            '- name: slack-ml',
            '  slack_configs:',
            '  - channel: "#ml-alerts"',
            '    title: "{{ .CommonAnnotations.summary }}"',
            '    text: |',
            '      Severity: {{ .CommonLabels.severity }}',
            '      Runbook: https://wiki/ml-runbook#{{ .CommonLabels.alertname }}',
            '',
            '# 🚨 실제 발화 예시',
            '# [ML-ALERT] HighLatency · severity=critical',
            '# p99=0.32s (threshold 0.2s, 5min sustained)',
            '# Runbook: https://wiki/ml-runbook#HighLatency',
          ],
          highlight: [5, 6, 22, 23, 24],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 메트릭 카드 메타 (이름/아이콘 고정, 값/색은 dataState에서)
    // ─────────────────────────────────────────────────────
    const METRIC_META = [
      { key: 'latency',  emoji: '⏱️', name: 'Latency p99', sub: '추론 응답 시간' },
      { key: 'error',    emoji: '🔥', name: 'Error rate',  sub: '실패율' },
      { key: 'accuracy', emoji: '🎯', name: 'Accuracy',    sub: '정답률 (지연)' },
      { key: 'traffic',  emoji: '📈', name: 'Traffic',     sub: '분당 요청 수' },
    ];

    // 정적 Tailwind 클래스 (purge 안전)
    const STATE_STYLE = {
      unknown: { card: 'bg-slate-100 border-slate-300', value: 'text-slate-400', bar: 'bg-slate-300', badge: 'bg-slate-200 text-slate-500', label: '모름' },
      good:    { card: 'bg-emerald-50 border-emerald-300', value: 'text-emerald-700', bar: 'bg-emerald-400', badge: 'bg-emerald-100 text-emerald-700', label: '정상' },
      info:    { card: 'bg-sky-50 border-sky-300',         value: 'text-sky-700',     bar: 'bg-sky-400',     badge: 'bg-sky-100 text-sky-700',         label: '정보' },
      warn:    { card: 'bg-yellow-50 border-yellow-400',   value: 'text-yellow-700',  bar: 'bg-yellow-400',  badge: 'bg-yellow-100 text-yellow-700',   label: '주의' },
      crit:    { card: 'bg-red-50 border-red-500',         value: 'text-red-700',     bar: 'bg-red-500',     badge: 'bg-red-100 text-red-700',         label: '위험' },
    };

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 4 Golden Signals 카드
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ dataState, showThresholdLine, showAlert }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-slate-700">🩺 건강 검진 대시보드</h2>
            <span className="text-[10px] text-slate-400 font-mono">4 Golden Signals · live</span>
          </div>

          <div className="grid grid-cols-2 gap-3">
            {METRIC_META.map((m) => {
              const d = dataState[m.key];
              const style = STATE_STYLE[d.state];
              const isCrit = d.state === 'crit';
              return (
                <div
                  key={m.key}
                  className={`rounded-lg border-2 p-3 transition-all duration-500 ${style.card} ${isCrit ? 'animate-pulse' : ''}`}
                >
                  <div className="flex items-center justify-between mb-1">
                    <div className="flex items-center gap-1.5">
                      <span aria-hidden="true">{m.emoji}</span>
                      <span className="text-xs font-bold text-slate-700">{m.name}</span>
                    </div>
                    <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${style.badge}`}>
                      {isCrit ? '🚨 ' : ''}{style.label}
                    </span>
                  </div>

                  <div className="flex items-baseline gap-1 mb-2">
                    <span className={`text-2xl font-extrabold tabular-nums ${style.value}`}>{d.value}</span>
                    <span className={`text-xs ${style.value}`}>{d.unit}</span>
                  </div>

                  {/* 바 + 임계치 라인 */}
                  <div className="relative h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div
                      className={`h-full transition-all duration-700 ${style.bar}`}
                      style={{ width: `${d.fillPct}%` }}
                    />
                    {showThresholdLine && d.threshold && (
                      <div
                        className="absolute top-0 bottom-0 w-0.5 bg-red-600"
                        style={{ left: '70%' }}
                        aria-hidden="true"
                      />
                    )}
                  </div>

                  <div className="text-[10px] text-slate-500 mt-1.5 flex justify-between">
                    <span>{m.sub}</span>
                    {showThresholdLine && d.threshold && (
                      <span className="font-mono text-red-600">⚠ {d.threshold}</span>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          {/* 알람 박스 (Step 4) */}
          {showAlert && (
            <div className="mt-4 p-3 rounded-lg bg-red-50 border-2 border-red-400 animate-pulse">
              <div className="flex items-center gap-2 text-red-800 font-bold text-sm">
                <span className="text-lg">🚨</span>
                <span>ALERT: HighLatency · HighErrorRate</span>
              </div>
              <div className="text-[11px] text-red-700 mt-1 font-mono">
                #ml-alerts · severity=critical · PagerDuty 호출됨
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-slate-300"></span>모름</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-400"></span>정상</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-yellow-400"></span>주의</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-red-500"></span>위험</span>
            {showThresholdLine && (
              <span className="flex items-center gap-1 ml-auto"><span className="w-0.5 h-3 bg-red-600"></span>임계치</span>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          // 기존 highlighted 마커 제거 후 재적용
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      // 최종적으로 highlight.js가 토큰화한 HTML을 라인별로 분할 렌더링하기 위해
      // 1) plain text를 source로 두고, 2) hljs가 한 번 칠한 결과 HTML을 line split
      // 단순화: hljs 결과는 codeRef innerHTML이 줄바꿈 포함이라 useEffect 후 분할
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        const html = codeRef.current.innerHTML;
        // hljs가 줄단위 token을 유지 — \n으로 split
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code (innerHTML 추출) */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-fuchsia-500/10 border-l-2 border-fuchsia-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 — 단계 번호 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-fuchsia-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. 모니터링 &amp; 운영 &gt; Chapter 1. 모델 헬스체크</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">모델 성능 모니터링</h1>
                  <p className="text-sm text-slate-500 mt-0.5">건강 검진 대시보드 — 4 Golden Signals (Latency p99 / Error / Accuracy / Traffic)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                dataState={step.dataState}
                showThresholdLine={step.showThresholdLine}
                showAlert={step.showAlert}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-fuchsia-50 border-2 border-fuchsia-300 rounded-xl p-3 text-sm text-fuchsia-900">
                💡 다음(IV-1-2)에서는 <strong>데이터 드리프트</strong> — 입력 분포 변화 자체를 감지
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-fuchsia-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-fuchsia-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-fuchsia-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-fuchsia-600 text-white hover:bg-fuchsia-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./IV-1-2.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">IV-1-2 데이터 드리프트 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
