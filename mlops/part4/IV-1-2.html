<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLOps 학습 — 데이터 드리프트 감지</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-1-2. 데이터 드리프트 감지
    학습 목표: 라벨이 늦게 들어와 정확도가 보이기 전에 입력 분포 변화로 모델 위험을 조기 감지
    핵심 비유: "기상 캐스터" — 어제와 오늘의 기온/습도 분포 비교, 이상하면 경보
    구조: 4단계 (드리프트 정의 / PSI 계산 / 시각화 / 알람 자동화)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 드리프트란? — "입력 환경이 변했다"',
        desc: '학습 시점 데이터 분포(reference)와 production 입력 분포(current)가 달라지는 현상. 코로나로 결제 패턴이 바뀌면 사기 탐지가 못 따라감. 정확도 하락보다 먼저 보임 → 조기 신호.',
        block: {
          kind: 'shell',
          code: `# 학습 데이터 (2025년 봄, reference)
거래 금액 분포: 평균 $50, p99 $300
시간대 분포: 평일 낮 80%, 새벽 5%
지역 분포: 서울 50%, 경기 25%, 기타 25%

# Production 입력 (2026년 5월, current)
거래 금액 분포: 평균 $80 ↑, p99 $600 ↑
시간대 분포: 평일 낮 60% ↓, 새벽 20% ↑   ← 변화!
지역 분포: 서울 30%, 경기 25%, 기타 45% ↑

# 결과
- 모델은 "새벽 거래는 사기" 패턴을 학습 안 함
- 정상 새벽 거래 → 사기로 잘못 분류
- 정확도 떨어짐 (라벨 들어오면 발견)
- 그러나 입력 분포만 보면 즉시 감지 가능
→ "드리프트 = 라벨 없이도 위험 알림"`,
        },
        focus: 'concept',
      },
      {
        title: 'Step 2. PSI 계산 — "분포 차이를 숫자로"',
        desc: 'Population Stability Index. reference와 current를 같은 bin으로 나눠 비율 차이를 계산. PSI < 0.1 = 정상, 0.1~0.25 = 주의, > 0.25 = 위험. KS test, Wasserstein 거리도 흔히 사용.',
        block: {
          kind: 'python',
          code: `import numpy as np

def calculate_psi(reference, current, bins=10):
    """
    PSI = sum( (current% - reference%) * ln(current% / reference%) )
    """
    # 1. reference 분포로 bin 경계 잡기
    breakpoints = np.percentile(reference, np.arange(0, 101, 100/bins))

    # 2. 양쪽을 같은 bin으로 분할
    ref_pct, _ = np.histogram(reference, breakpoints)
    cur_pct, _ = np.histogram(current, breakpoints)
    ref_pct = ref_pct / sum(ref_pct) + 1e-6
    cur_pct = cur_pct / sum(cur_pct) + 1e-6

    # 3. PSI 계산
    psi = np.sum((cur_pct - ref_pct) * np.log(cur_pct / ref_pct))
    return psi

# 일별 PSI 추적
ref = load("training_2025_spring.parquet")["amount"]
for date in last_7_days:
    cur = load_production(date)["amount"]
    psi = calculate_psi(ref, cur)
    print(f"{date}  amount PSI = {psi:.3f}")

# 출력
2026-05-01  amount PSI = 0.05  (정상)
2026-05-02  amount PSI = 0.08
2026-05-03  amount PSI = 0.18  ← 주의
2026-05-04  amount PSI = 0.31  ← 위험!
2026-05-05  amount PSI = 0.34  ← 지속`,
        },
        focus: 'psi',
      },
      {
        title: 'Step 3. EvidentlyAI 대시보드 — "드리프트 시각화"',
        desc: 'EvidentlyAI/WhyLabs/Arize 같은 ML 전용 모니터링 도구. PSI/KS/MMD 등 자동 계산 + HTML 리포트로 분포 비교 시각화. feature별 드리프트 점수 표시 → 어떤 입력이 변했는지 한눈에.',
        block: {
          kind: 'python',
          code: `# evidently로 한 줄 리포트
from evidently.report import Report
from evidently.metric_preset import DataDriftPreset

report = Report(metrics=[DataDriftPreset()])
report.run(reference_data=ref_df, current_data=cur_df)
report.save_html("drift_report.html")

# 리포트 결과 (HTML)
─────────────────────────────────
Data Drift Summary
─────────────────────────────────
Drift detected: 3 / 12 features

Feature           Type    Drift Score   Drifted?
─────────────────────────────────────────────────
amount            num     0.34 (PSI)    ✅ Yes
time_of_day       cat     0.41 (Chi²)   ✅ Yes
region            cat     0.28 (Chi²)   ✅ Yes
device            cat     0.05          —
user_age          num     0.07          —
...

# Airflow DAG로 매일 자동 실행 → S3에 리포트 저장
@task
def daily_drift_check():
    report = Report(metrics=[DataDriftPreset()])
    report.run(reference_data=ref, current_data=load_yesterday())
    report.save_html(f"s3://drift-reports/{today}.html")
    return report.as_dict()`,
        },
        focus: 'tool',
      },
      {
        title: 'Step 4. 알람 + 자동 재학습 트리거 — "비 오면 우산"',
        desc: 'PSI > 0.25 지속 N일 → Slack 알람 + Airflow retraining DAG 자동 발동. 사람이 매일 리포트 보지 않아도 됨. 임계치 튜닝 (너무 민감하면 false alarm, 너무 둔하면 늦음).',
        block: {
          kind: 'python',
          code: `# Airflow에서 드리프트 감지 → 자동 알람 + 트리거
from airflow.decorators import task
from airflow.operators.trigger_dagrun import TriggerDagRunOperator

@task
def check_drift_and_alert():
    psi = calculate_psi(ref, load_yesterday())

    if psi > 0.25:
        # 1. Slack 알람
        slack.post(
            "#ml-alerts",
            f"🚨 fraud-detector PSI={psi:.2f} > 0.25 (3일 연속)"
        )
        # 2. 재학습 DAG 자동 트리거
        return "trigger_retrain"
    return "ok"

# 임계치 튜닝
- PSI > 0.10 (주의)  → 슬랙 채널 알림만 (사람이 봄)
- PSI > 0.25 (위험)  → 재학습 DAG 자동 트리거
- 3일 연속 위험      → 모델 자동 staging 강등 + on-call 호출

# 트레이드오프
# - 너무 민감(0.10) → false alarm 빈번, 알람 피로
# - 너무 둔감(0.40) → 모델 망가진 후에 알람

# 다음(IV-2-1)에서는 Retraining 트리거 — 어떤 신호로 재학습할까`,
        },
        focus: 'auto',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const PHASES = [
      { key: 'concept', emoji: '🌦️', name: '드리프트',  note: '입력 환경 변화' },
      { key: 'psi',     emoji: '🧮', name: 'PSI 계산',   note: '분포 차이 수치화' },
      { key: 'tool',    emoji: '📈', name: 'Evidently',   note: '자동 리포트' },
      { key: 'auto',    emoji: '🔔', name: '알람+트리거', note: '재학습 자동' },
    ];

    function PhaseCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🌦️ 기상 캐스터 (드리프트 감지)</div>
          <div className="grid grid-cols-4 gap-2">
            {PHASES.map((p) => {
              const isActive = focus === p.key;
              return (
                <div
                  key={p.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-purple-100 border-2 border-purple-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{p.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{p.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{p.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">데이터 드리프트 감지</h1>
                <p className="text-sm text-slate-500 mt-1">기상 캐스터 — 입력 분포 변화 조기 신호</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <PhaseCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'auto' && (
              <div className="bg-purple-50 border-2 border-purple-300 rounded-xl p-3 mb-6 text-xs text-purple-900">
                💡 다음(IV-2-1)에서는 Retraining 트리거 — 스케줄/임계치/이벤트 3종 비교
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
