<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLOps 학습 — 거버넌스 & 감사 로그</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-2-2. 거버넌스 & 감사 로그
    학습 목표: 모델이 어떤 데이터로 어떻게 학습됐고 누가 배포했는지 추적
    핵심 비유: "의료 진료기록" — 모델 카드 / 리니지 / 감사 / 책임
    구조: 4단계 (책임 부재 / 모델 카드 / 리니지 / 감사 로그)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. "이 모델 누가 만들었어요?" — 책임 부재',
        desc: '6개월 후 컴플라이언스: "이 결제가 왜 사기로 분류됐죠?". 학습팀: "당시 모델 v3인데... 어떤 데이터로 학습됐는지 모르겠어요". 리니지/감사 없으면 책임 추적 불가 + 법적 리스크.',
        block: {
          kind: 'shell',
          code: `# 시나리오 — 6개월 후 감사 요청
컴플라이언스: "2026-03-15 거래 #ABC123이 사기로 분류된 근거는?"

ML 엔지니어:
- "당시 모델은 v3였던 것 같은데..."
- "학습 데이터는... 누가 만들었더라?"
- "feature는 30개였는데 정확히 뭐였지?"
- "v3 학습 코드는 누가 머지했더라?"

→ 답을 못 함

# 법적/규제 리스크
- GDPR: 자동 의사결정에 대한 설명 권한
- 금융권: 모델 의사결정 근거 보고 의무
- AI Act: 고위험 AI는 transparency 필수

# 거버넌스 부재 = 사고 시 회사 위험
"무엇을, 누가, 어떻게, 왜" 4가지 추적 필요`,
        },
        focus: 'absent',
      },
      {
        title: 'Step 2. Model Card — "모델 진료기록"',
        desc: '모델마다 표준 메타데이터 문서 (Google Model Cards). 의도/한계/학습 데이터/평가/공정성 명시. 모델 등록 시 의무화. 새 모델 운영 시 운영팀이 가장 먼저 읽는 문서.',
        block: {
          kind: 'yaml',
          code: `# fraud-detector-v3 — Model Card
model:
  name: fraud-detector
  version: v3
  trained_at: 2026-04-15
  trained_by: ml-team@company.com

intent:
  primary: "결제 거래 사기 분류 (이진)"
  out_of_scope: "신용 평가, 추천에 사용 금지"

training_data:
  source: "transactions_2025_2026 (5M rows)"
  date_range: 2025-01-01 ~ 2026-04-01
  preprocessing: "PII 마스킹, 이상치 IQR 제거"
  bias_check: "지역별 분포 OK, 성별 1.2x 균형"

evaluation:
  test_set: 500K rows (2026-04 holdout)
  metrics:
    accuracy: 0.91
    precision: 0.85
    recall: 0.78
    auc: 0.94
  fairness:
    parity_gender: 0.96     # 1에 가까울수록 공정
    parity_region: 0.92

limitations:
  - "야간 거래(00-06) 데이터 부족 → 정확도 낮음"
  - "신규 결제수단 미반영 (가상화폐)"
  - "고액 거래 (>$10K) 표본 적음"

contact:
  owner: ml-team
  on_call: "#ml-fraud-oncall"
  runbook: https://wiki/fraud-runbook`,
        },
        focus: 'card',
      },
      {
        title: 'Step 3. 리니지 — "이 모델은 어떤 재료로?"',
        desc: '데이터셋 → feature → 학습 run → 모델 → 배포 추적. MLflow + DVC + Feast 조합으로 자동 기록. "어제 사기로 분류된 거래의 근거 데이터셋"까지 거꾸로 추적 가능.',
        block: {
          kind: 'python',
          code: `# MLflow + DVC + Feast 자동 리니지
import mlflow

with mlflow.start_run() as run:
    # 1. 데이터셋 버전 (DVC)
    mlflow.log_param("data_version", "v25.3")  # DVC tag
    mlflow.log_param("data_hash", "sha256:abc...")

    # 2. Feature Store 버전 (Feast)
    mlflow.log_param("feature_view", "transaction_features:v4")

    # 3. 학습 코드 commit (Git)
    mlflow.log_param("git_sha", "a1b2c3d")

    # 4. 모델 학습
    model.fit(X, y)

    # 5. 모델 아티팩트 저장
    mlflow.log_metric("accuracy", 0.91)
    mlflow.sklearn.log_model(model, "model")
    mlflow.register_model(f"runs:/{run.info.run_id}/model", "fraud-detector")

# 리니지 그래프 (자동)
─────────────────────────────────────────
fraud-detector v3
  ← MLflow run abc123
       ← code: git sha a1b2c3d
       ← data: DVC v25.3 (sha256:...)
       ← features: feature_view v4
       ← env: docker image fraud-train:2026.04
       ← trained_by: alice@company

# 거꾸로 추적
질문: "거래 #XYZ가 왜 사기로?"
→ 추론 로그 → 모델 v3 → run abc123 → data v25.3
→ 학습 데이터 + feature 값 + 모델 가중치 모두 복원 가능`,
        },
        focus: 'lineage',
      },
      {
        title: 'Step 4. 감사 로그 — "누가, 언제, 무엇을"',
        desc: '모든 모델 변경 이벤트(등록/Stage 전환/배포/롤백/삭제)를 변경 불가 로그로 저장. 누가 승인, 누가 실행, 어떤 근거. 사고 시 분석 + 정기 감사. SOX/PCI/GDPR 준수.',
        block: {
          kind: 'yaml',
          code: `# 감사 로그 (변경 불가 append-only)
2026-04-15 09:12 [REGISTER]
  user: alice
  action: register_model
  model: fraud-detector
  version: 3
  run_id: abc123
  data: v25.3

2026-04-15 14:30 [STAGE_CHANGE]
  user: bob (reviewer)
  action: transition_stage
  from: None → Staging
  evaluation_run_id: eval-456
  approval_ticket: JIRA-789

2026-04-22 10:00 [STAGE_CHANGE]
  user: charlie (release-mgr)
  action: transition_stage
  from: Staging → Production
  archive: v2 → Archived
  approval_ticket: JIRA-810
  canary_metric: ok

2026-04-22 14:00 [DEPLOYED]
  user: github-actions
  action: kubectl apply
  cluster: prod-us-east
  pods_replaced: 8

2026-05-03 11:22 [ROLLBACK]
  user: alice (on-call)
  action: rollback
  from: v3 → v2
  reason: "PSI > 0.31 sustained"
  incident: INC-2026-051

# 감사 채널 (write-once)
- AWS CloudTrail / GCP Audit Logs
- MLflow API 로그 (JSON)
- Git 이력 (코드 + Model Card 변경)
- Slack 채널 #ml-prod-changes (자동 포스트)

# Part IV 완성 — 다음(Part V)에서는 실전 도구 종합`,
        },
        focus: 'audit',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const ASPECTS = [
      { key: 'absent',  emoji: '❓', name: '책임 부재',  note: '추적 불가' },
      { key: 'card',    emoji: '📇', name: 'Model Card', note: '진료기록' },
      { key: 'lineage', emoji: '🧬', name: '리니지',     note: '재료→모델' },
      { key: 'audit',   emoji: '📜', name: '감사 로그',  note: '누가 언제' },
    ];

    function AspectCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🏥 의료 진료기록 (거버넌스 & 감사)</div>
          <div className="grid grid-cols-4 gap-2">
            {ASPECTS.map((a) => {
              const isActive = focus === a.key;
              return (
                <div
                  key={a.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-purple-100 border-2 border-purple-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{a.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{a.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{a.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">거버넌스 & 감사 로그</h1>
                <p className="text-sm text-slate-500 mt-1">의료 진료기록 — 모델 카드 / 리니지 / 감사</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <AspectCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'audit' && (
              <div className="bg-purple-50 border-2 border-purple-300 rounded-xl p-3 mb-6 text-xs text-purple-900">
                💡 Part IV 완성. 다음(Part V)에서는 실전 도구 종합 — MLflow / Kubeflow / Airflow 한 사이클
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
