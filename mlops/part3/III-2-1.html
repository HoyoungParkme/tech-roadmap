<body>
  <div id="root"></div>

  <!--
    III-2-1. 서빙 도구 (Triton / TorchServe / KServe)
    학습 목표: 모델 서빙 도구 3종을 비교하고 상황에 맞게 선택할 수 있다.
    핵심 비유: 주방 도구 3종 — 만능 컴비(Triton), 전용 팬(TorchServe), 주방 시스템(KServe)
    패턴: fastapi v1 패턴 — 좌(LiveDataPane: 도구 비교 표 + 모델 storage 시각화) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 도구 메타 (3종 비교 표 — 4 차원)
    // ─────────────────────────────────────────────────────
    const TOOLS = [
      { key: 'triton',     emoji: '🔧', name: 'Triton',     tagline: '만능 컴비 (NVIDIA)' },
      { key: 'torchserve', emoji: '🍳', name: 'TorchServe', tagline: 'PyTorch 전용 팬' },
      { key: 'kserve',     emoji: '🏗️', name: 'KServe',     tagline: 'K8s 주방 시스템' },
    ];

    // 4 차원 비교: multi-framework / GPU 효율 / K8s native / 진입 난이도
    // 점수 0~3 (0=없음, 1=낮음, 2=중간, 3=높음). 진입 난이도는 낮을수록 쉬움(쉬움=3).
    const COMPARE_DIMS = [
      { key: 'mf',    label: 'Multi-framework', sub: 'PT/TF/ONNX 동시' },
      { key: 'gpu',   label: 'GPU 효율',        sub: 'dynamic batching' },
      { key: 'k8s',   label: 'K8s native',      sub: 'CRD/오토스케일' },
      { key: 'easy',  label: '진입 쉬움',        sub: '학습 곡선' },
    ];

    // ─────────────────────────────────────────────────────
    // STEPS
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Triton — 만능 컴비 (NVIDIA, 멀티 프레임워크)',
        desc: 'PyTorch / TensorFlow / ONNX / TensorRT를 한 서버에 동시 탑재. dynamic batching 큐가 짧은 시간 모아서 한 번에 GPU로 — latency vs throughput 자동 균형. 모델 디렉터리 + config.pbtxt만 만들면 끝.',
        focus: 'triton',
        // 단계별로 보여줄 컴포넌트 토글
        showStorage: true,
        showBatching: true,
        showHandler: false,
        showCanary: false,
        showMatrix: false,
        // 비교 표에서 이 단계의 강조 행
        highlightTool: 'triton',
        // 점수 (해당 행만 노출 — 누적 채움)
        scoresVisible: { triton: true, torchserve: false, kserve: false },
        scores: {
          triton:     { mf: 3, gpu: 3, k8s: 1, easy: 2 },
          torchserve: { mf: 1, gpu: 2, k8s: 1, easy: 3 },
          kserve:     { mf: 3, gpu: 2, k8s: 3, easy: 1 },
        },
        code: {
          lang: 'plaintext',
          filename: 'triton/models/config.pbtxt',
          lines: [
            '# Triton 모델 저장소 구조',
            '# models/',
            '# └── fraud-detector/',
            '#     ├── config.pbtxt        ← 모델 메타',
            '#     └── 1/                  ← 버전 폴더',
            '#         └── model.onnx      ← 실제 모델',
            '',
            'name: "fraud-detector"',
            'platform: "onnxruntime_onnx"',
            'max_batch_size: 32',
            'input  [{ name: "features" data_type: TYPE_FP32 dims: [128] }]',
            'output [{ name: "score"    data_type: TYPE_FP32 dims: [1]   }]',
            'instance_group [{ kind: KIND_GPU count: 2 }]',
            '',
            '# 동적 배치 — 100µs 동안 들어온 요청을 모아 한 번에 추론',
            'dynamic_batching {',
            '  max_queue_delay_microseconds: 100',
            '  preferred_batch_size: [ 8, 16, 32 ]',
            '}',
            '',
            '# 실행',
            '# $ docker run --gpus all -p 8000:8000 \\',
            '#     -v ./models:/models \\',
            '#     nvcr.io/nvidia/tritonserver:24.03 \\',
            '#     tritonserver --model-repository=/models',
          ],
          highlight: [9, 10, 13, 16, 17, 18],
        },
      },
      {
        title: 'Step 2. TorchServe — PyTorch 전용 프라이팬',
        desc: 'Meta가 만든 PyTorch 전용 서버. 학습 코드 그대로 이식 가능. .mar(Model Archive) 파일에 model.pt + handler.py를 묶어 패키징. 가볍고 진입 쉬움. 단점: PyTorch 외 프레임워크는 어렵고 dynamic batching이 제한적.',
        focus: 'torchserve',
        showStorage: false,
        showBatching: false,
        showHandler: true,
        showCanary: false,
        showMatrix: false,
        highlightTool: 'torchserve',
        scoresVisible: { triton: true, torchserve: true, kserve: false },
        scores: {
          triton:     { mf: 3, gpu: 3, k8s: 1, easy: 2 },
          torchserve: { mf: 1, gpu: 2, k8s: 1, easy: 3 },
          kserve:     { mf: 3, gpu: 2, k8s: 3, easy: 1 },
        },
        code: {
          lang: 'python',
          filename: 'handler.py',
          lines: [
            '# TorchServe handler — 전/후처리 직접 작성',
            'from ts.torch_handler.base_handler import BaseHandler',
            'import torch',
            '',
            'class FraudHandler(BaseHandler):',
            '    def preprocess(self, data):',
            '        # 입력 JSON → tensor',
            '        inputs = [d.get("features") for d in data]',
            '        return torch.tensor(inputs, dtype=torch.float32)',
            '',
            '    def inference(self, x):',
            '        with torch.no_grad():',
            '            return self.model(x)',
            '',
            '    def postprocess(self, output):',
            '        return [{"score": float(s)} for s in output]',
            '',
            '# 모델 패키징 — .mar 파일 생성',
            '# $ torch-model-archiver --model-name fraud \\',
            '#     --version 1.0 \\',
            '#     --serialized-file model.pt \\',
            '#     --handler handler.py \\',
            '#     --export-path model-store',
            '',
            '# 서버 실행',
            '# $ torchserve --start \\',
            '#     --model-store model-store \\',
            '#     --models fraud=fraud.mar',
          ],
          highlight: [5, 6, 11, 15, 18],
        },
      },
      {
        title: 'Step 3. KServe — 주방 전체 시스템 (K8s 네이티브)',
        desc: 'K8s 위 InferenceService CRD로 Triton/TorchServe/Sklearn 등을 추상화. Knative 기반 0→N 오토스케일, Istio 트래픽 분할로 카나리/A-B가 내장. canary 90/10 — 새 모델에 10%만 흘려보고 안전 확인 후 100% 승격.',
        focus: 'kserve',
        showStorage: false,
        showBatching: false,
        showHandler: false,
        showCanary: true,
        showMatrix: false,
        highlightTool: 'kserve',
        scoresVisible: { triton: true, torchserve: true, kserve: true },
        scores: {
          triton:     { mf: 3, gpu: 3, k8s: 1, easy: 2 },
          torchserve: { mf: 1, gpu: 2, k8s: 1, easy: 3 },
          kserve:     { mf: 3, gpu: 2, k8s: 3, easy: 1 },
        },
        code: {
          lang: 'yaml',
          filename: 'inference-service.yaml',
          lines: [
            '# KServe — K8s에 한 번에 배포',
            'apiVersion: serving.kserve.io/v1beta1',
            'kind: InferenceService',
            'metadata:',
            '  name: fraud-detector',
            'spec:',
            '  predictor:',
            '    minReplicas: 0           # 트래픽 0 → Pod 0 (비용 절감)',
            '    maxReplicas: 10',
            '    triton:                  # 내부적으로 Triton 사용',
            '      storageUri: s3://models/fraud-detector',
            '      resources:',
            '        limits:',
            '          nvidia.com/gpu: 1',
            '  # 카나리 — 새 모델에 10% 트래픽',
            '  canaryTrafficPercent: 10',
            '',
            '# $ kubectl apply -f inference-service.yaml',
            '# NAME             URL                                    PREV  LATEST',
            '# fraud-detector   http://fraud.default.svc.cluster.local  90    10',
            '',
            '# 강점',
            '# - Knative 0→N 오토스케일',
            '# - 카나리/A-B 트래픽 분할 내장',
            '# - Explainer/Transformer 파이프라인',
          ],
          highlight: [8, 10, 16, 20],
        },
      },
      {
        title: 'Step 4. 선택 가이드 — 4 차원 비교 매트릭스',
        desc: 'multi-framework / GPU 효율 / K8s native / 진입 난이도 — 4 축에서 도구별 점수를 비교. 보통 "KServe + 내부 Triton" 조합이 실무 표준 — K8s 카나리 + GPU 효율을 둘 다 챙긴다.',
        focus: 'choose',
        showStorage: false,
        showBatching: false,
        showHandler: false,
        showCanary: false,
        showMatrix: true,
        highlightTool: null,
        scoresVisible: { triton: true, torchserve: true, kserve: true },
        scores: {
          triton:     { mf: 3, gpu: 3, k8s: 1, easy: 2 },
          torchserve: { mf: 1, gpu: 2, k8s: 1, easy: 3 },
          kserve:     { mf: 3, gpu: 2, k8s: 3, easy: 1 },
        },
        code: {
          lang: 'plaintext',
          filename: 'decision-guide.txt',
          lines: [
            '# 의사결정 — 내 상황은?',
            '',
            '질문                              → 답',
            '─────────────────────────────────────────────────',
            '"PyTorch만 쓰는 작은 팀"          → TorchServe',
            '"여러 프레임워크 (TF/PT/ONNX)"    → Triton',
            '"GPU 효율, dynamic batching"      → Triton',
            '"K8s 카나리/오토스케일"           → KServe',
            '"Knative 0→N 비용 절감"           → KServe',
            '"단일 VM에 빠르게 배포"           → TorchServe / Triton',
            '',
            '# 실무 표준 조합',
            '#   KServe (오케스트레이션)',
            '#      └─ Triton (실제 추론 엔진)',
            '#   = K8s 카나리 + GPU 효율 둘 다',
            '',
            '# 한 줄 요약',
            '#   Triton     : 프레임워크 무관 + GPU 최적화 단일 서버',
            '#   TorchServe : PyTorch 전용, 진입 쉬움',
            '#   KServe     : K8s 위 표준 추상화, 트래픽 제어 내장',
            '',
            '# 다음(III-2-2): Canary / Shadow / A-B 배포 전략',
          ],
          highlight: [12, 13, 14, 15],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측: 비교 표 + 모델 storage 시각화
    // ─────────────────────────────────────────────────────
    function ScorePips({ score }) {
      // 0~3 점수를 4개의 점으로 표시
      return (
        <div className="flex gap-0.5">
          {[0, 1, 2, 3].map((i) => (
            <span
              key={i}
              className={`w-2 h-2 rounded-full ${i < score ? 'bg-fuchsia-500' : 'bg-slate-200'}`}
              aria-hidden="true"
            />
          ))}
        </div>
      );
    }

    function CompareTable({ scoresVisible, scores, highlightTool, showMatrix }) {
      return (
        <div className="rounded-lg border border-slate-200 overflow-hidden">
          <div className="grid grid-cols-5 bg-slate-50 text-[10px] font-bold text-slate-600 px-2 py-1.5 border-b border-slate-200">
            <div className="col-span-1">도구</div>
            {COMPARE_DIMS.map((d) => (
              <div key={d.key} className="text-center">
                <div>{d.label}</div>
                <div className="text-[9px] text-slate-400 font-normal">{d.sub}</div>
              </div>
            ))}
          </div>
          {TOOLS.map((t) => {
            const visible = scoresVisible[t.key];
            const isHi = highlightTool === t.key;
            const s = scores[t.key];
            return (
              <div
                key={t.key}
                className={`grid grid-cols-5 items-center px-2 py-2 border-b border-slate-100 last:border-b-0 transition-all duration-500 ${
                  isHi ? 'bg-fuchsia-50 border-l-4 border-l-fuchsia-500' : ''
                } ${visible ? 'opacity-100' : 'opacity-30'}`}
              >
                <div className="col-span-1 flex items-center gap-1.5">
                  <span aria-hidden="true">{t.emoji}</span>
                  <div>
                    <div className="text-xs font-bold text-slate-800">{t.name}</div>
                    <div className="text-[9px] text-slate-500">{t.tagline}</div>
                  </div>
                </div>
                {COMPARE_DIMS.map((d) => (
                  <div key={d.key} className="flex justify-center">
                    {visible ? <ScorePips score={s[d.key]} /> : <span className="text-slate-300 text-xs">·</span>}
                  </div>
                ))}
              </div>
            );
          })}
          {showMatrix && (
            <div className="bg-fuchsia-50 px-2 py-1.5 text-[10px] text-fuchsia-800 font-medium border-t border-fuchsia-200">
              💡 점수 ●●●● = 최강 / ●○○○ = 약함 — KServe + Triton 조합이 실무 표준
            </div>
          )}
        </div>
      );
    }

    function StorageDiagram() {
      // Triton 모델 저장소 구조 (트리)
      return (
        <div className="rounded-lg bg-slate-900 p-3 font-mono text-[11px] leading-5 text-slate-300">
          <div className="text-emerald-400 mb-1">📂 models/ <span className="text-slate-500"># Triton 저장소</span></div>
          <div className="pl-3">
            <div>└── <span className="text-fuchsia-300 font-bold">fraud-detector/</span></div>
            <div className="pl-6">
              <div>├── <span className="text-yellow-300">config.pbtxt</span> <span className="text-slate-500"># 메타</span></div>
              <div>└── <span className="text-sky-300">1/</span> <span className="text-slate-500"># 버전</span></div>
              <div className="pl-6">
                <div>└── <span className="text-emerald-300">model.onnx</span></div>
              </div>
            </div>
          </div>
          <div className="mt-2 flex flex-wrap gap-1 text-[10px]">
            <span className="bg-blue-900/50 text-blue-300 px-1.5 rounded">PyTorch</span>
            <span className="bg-orange-900/50 text-orange-300 px-1.5 rounded">TensorFlow</span>
            <span className="bg-purple-900/50 text-purple-300 px-1.5 rounded">ONNX</span>
            <span className="bg-emerald-900/50 text-emerald-300 px-1.5 rounded">TensorRT</span>
            <span className="text-slate-400 ml-1">← 한 서버 동시 탑재</span>
          </div>
        </div>
      );
    }

    function BatchingQueue() {
      // dynamic batching 큐 시각화 — 5개 요청이 100µs 동안 모여 한 배치로
      const requests = [
        { color: 'bg-fuchsia-400', delay: 0 },
        { color: 'bg-fuchsia-400', delay: 100 },
        { color: 'bg-fuchsia-400', delay: 200 },
        { color: 'bg-fuchsia-400', delay: 300 },
        { color: 'bg-fuchsia-400', delay: 400 },
      ];
      return (
        <div className="rounded-lg border border-slate-200 p-3 bg-slate-50">
          <div className="text-[10px] font-bold text-slate-600 mb-2">⚡ Dynamic Batching — 100µs 큐</div>
          <div className="flex items-center gap-2">
            <div className="text-[10px] text-slate-500 w-12">요청 →</div>
            <div className="flex gap-1 flex-1">
              {requests.map((r, i) => (
                <div
                  key={i}
                  className={`h-5 flex-1 rounded ${r.color} animate-pulse`}
                  style={{ animationDelay: `${r.delay}ms`, opacity: 0.5 + i * 0.1 }}
                />
              ))}
            </div>
            <div className="text-slate-400">→</div>
            <div className="text-[10px] font-bold bg-fuchsia-100 text-fuchsia-700 px-1.5 py-0.5 rounded border border-fuchsia-300">
              GPU batch=5
            </div>
          </div>
          <div className="text-[10px] text-slate-500 mt-1.5">짧은 시간 모아 한 번에 추론 → throughput ↑</div>
        </div>
      );
    }

    function HandlerMar() {
      // .mar 파일 + handler.py 시각화
      return (
        <div className="rounded-lg border border-slate-200 p-3 bg-slate-50">
          <div className="text-[10px] font-bold text-slate-600 mb-2">📦 .mar — Model Archive</div>
          <div className="flex items-center justify-center gap-2">
            <div className="rounded bg-white border border-slate-300 p-2 text-center">
              <div className="text-2xl">🔥</div>
              <div className="text-[10px] font-bold text-slate-700">model.pt</div>
              <div className="text-[9px] text-slate-500">학습된 가중치</div>
            </div>
            <div className="text-slate-400 text-lg">+</div>
            <div className="rounded bg-white border border-slate-300 p-2 text-center">
              <div className="text-2xl">🐍</div>
              <div className="text-[10px] font-bold text-slate-700">handler.py</div>
              <div className="text-[9px] text-slate-500">전/후처리</div>
            </div>
            <div className="text-slate-400 text-lg">→</div>
            <div className="rounded bg-fuchsia-100 border-2 border-fuchsia-400 p-2 text-center">
              <div className="text-2xl">📦</div>
              <div className="text-[10px] font-bold text-fuchsia-800">fraud.mar</div>
              <div className="text-[9px] text-fuchsia-600">패키지</div>
            </div>
          </div>
          <div className="text-[10px] text-slate-500 mt-2 text-center">
            torch-model-archiver 가 두 파일을 묶어서 배포 단위 .mar 생성
          </div>
        </div>
      );
    }

    function CanaryBar() {
      // canary 트래픽 분할 — 90/10
      return (
        <div className="rounded-lg border border-slate-200 p-3 bg-slate-50">
          <div className="text-[10px] font-bold text-slate-600 mb-2">🚦 카나리 트래픽 분할</div>
          <div className="flex h-7 rounded overflow-hidden border border-slate-300">
            <div
              className="bg-emerald-400 flex items-center justify-center text-[11px] font-bold text-white transition-all duration-700"
              style={{ width: '90%' }}
            >
              v1 · 90%
            </div>
            <div
              className="bg-fuchsia-500 flex items-center justify-center text-[11px] font-bold text-white transition-all duration-700"
              style={{ width: '10%' }}
            >
              v2 · 10%
            </div>
          </div>
          <div className="flex justify-between text-[10px] text-slate-500 mt-1.5">
            <span>안정 모델 (PREV)</span>
            <span>새 모델 (LATEST)</span>
          </div>
          <div className="text-[10px] text-fuchsia-700 mt-1 font-medium">
            → 10%만 흘려보고 메트릭 OK 시 100%로 승격
          </div>
        </div>
      );
    }

    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm space-y-3">
          <div className="flex items-center justify-between">
            <h2 className="text-sm font-bold text-slate-700">🍳 서빙 도구 비교</h2>
            <span className="text-[10px] text-slate-400 font-mono">3 tools · 4 dims</span>
          </div>

          {/* 비교 표 */}
          <CompareTable
            scoresVisible={step.scoresVisible}
            scores={step.scores}
            highlightTool={step.highlightTool}
            showMatrix={step.showMatrix}
          />

          {/* 단계별 시각화 */}
          {step.showStorage && <StorageDiagram />}
          {step.showBatching && <BatchingQueue />}
          {step.showHandler && <HandlerMar />}
          {step.showCanary && <CanaryBar />}

          {/* 매트릭스 단계 — 최종 메시지 */}
          {step.showMatrix && (
            <div className="rounded-lg p-3 bg-fuchsia-50 border border-fuchsia-200">
              <div className="text-xs font-bold text-fuchsia-800 mb-1">🎯 실무 표준 조합</div>
              <div className="text-[11px] text-fuchsia-900 font-mono">
                KServe (오케스트레이션) <br />
                <span className="pl-3">└─ Triton (추론 엔진)</span>
              </div>
              <div className="text-[10px] text-fuchsia-700 mt-1">= K8s 카나리 + GPU 효율 둘 다 챙김</div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode CodeViewer (highlight.js + atom-one-dark)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        codeRef.current.removeAttribute('data-highlighted');
        codeRef.current.className = `language-${code.lang}`;
        codeRef.current.textContent = code.lines.join('\n');
        window.hljs.highlightElement(codeRef.current);
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hidden hljs source */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 라인 번호 + 강조 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-fuchsia-500/10 border-l-2 border-fuchsia-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-fuchsia-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 모델 서빙 &gt; Chapter 2. 서빙 도구</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">서빙 도구 (Triton / TorchServe / KServe)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">주방 도구 3종 — 만능 컴비 / 전용 팬 / 주방 시스템</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-fuchsia-50 border-2 border-fuchsia-300 rounded-xl p-3 text-sm text-fuchsia-900">
                💡 다음(III-2-2)에서는 배포 전략 — Canary/Shadow/A-B
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-fuchsia-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-fuchsia-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-fuchsia-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-fuchsia-600 text-white hover:bg-fuchsia-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./III-2-2.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">III-2-2 배포 전략 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
