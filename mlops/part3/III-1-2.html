  <!--
    III-1-2. 서빙 패턴 (Online / Batch / Streaming)
    학습 목표: 모델을 어떻게 노출하느냐 — 요청 방식에 따른 3종 패턴 선택 기준
    핵심 비유: "주문 방식 3종" — 즉석(Online) / 포장 도시락(Batch) / 구독 배달(Streaming)
    패턴: fastapi v1 패턴 — 좌(LiveDataPane 요청/응답 흐름) / 우(VSCode CodeViewer)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────

    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Online 서빙 — "즉석 주문" (REST/gRPC)',

        focus: 'online',
        flow: {
          online:  { user: 'active',  api: 'active',  model: 'active',  latency: '50ms',  arrows: 'sync' },
          batch:   { state: 'idle' },
          stream:  { state: 'idle' },
        },
        code: {
          lang: 'python',
          filename: 'online_serving.py',
          lines: [
            '# Online 서빙 — FastAPI + REST',
            'from fastapi import FastAPI',
            'import mlflow',
            '',
            'app = FastAPI()',
            'model = mlflow.pyfunc.load_model(',
            '    "models:/fraud-detector/Production"',
            ')',
            '',
            '@app.post("/predict")',
            'def predict(payload: dict):',
            '    # 한 건씩 즉시 추론 (목표 p99 < 100ms)',
            '    score = model.predict([payload])[0]',
            '    return {"fraud_score": float(score)}',
            '',
            '# 특징',
            '# - 동기 REST/gRPC (요청 → 응답)',

            '',
            '# 한계',
            '# - 모델이 무거우면 latency 부담',
            '# - 부하 급증 시 비용 폭증',

          highlight: [10, 11, 12, 13, 14],

        focus: 'batch',
        flow: {
          online:  { state: 'idle' },
          batch:   { cron: 'active', table: 'active', db: 'active', latency: '0 (조회)', schedule: '0 2 * * *' },
          stream:  { state: 'idle' },
        },
        code: {
          lang: 'python',
          filename: 'batch_serving.py',
          lines: [
            '# Batch 서빙 — Airflow + 일괄 추론',
            'from airflow.decorators import dag, task',
            'from datetime import datetime',
            'import mlflow, pandas as pd',
            '',
            '@dag(schedule="0 2 * * *",         # 매일 새벽 2시',
            '     start_date=datetime(2026,1,1))',
            'def daily_churn_score():',
            '',
            '    @task',
            '    def score_all_users():',
            '        # 1. 모든 사용자 데이터 (수백만 행)',
            '        users = pd.read_sql(',
            '            "SELECT * FROM users_features", conn',
            '        )',
            '',
            '        # 2. 한 번에 추론 — 벡터화로 GPU 효율 최대',
            '        model = mlflow.pyfunc.load_model(',
            '            "models:/churn/Production"',
            '        )',
            '        users["churn_score"] = model.predict(users)',
            '',
            '        # 3. DB 저장 → 운영 앱은 DB만 조회',
            '        users[["user_id", "churn_score"]].to_sql(',
            '            "churn_scores", conn, if_exists="replace"',
            '        )',
            '',
            '    score_all_users()',
            '',
            '# 특징: latency 0 (조회만), 처리량 최대',
            '# 한계: 신선도(어제 score), 즉시 응답 불가',
          ],
          highlight: [6, 13, 17, 21, 24],
        },
      },

        title: 'Step 3. Streaming 서빙 — "구독 배달" (이벤트 기반)',
        desc: 'Kafka 토픽에 이벤트가 들어오면 consumer가 즉시 추론해 결과를 다른 토픽으로 전송. 실시간 이상 탐지, 광고 입찰처럼 "끊임없이 흐르는 데이터"에 적합. push 방식.',
        focus: 'stream',
        flow: {
          online:  { state: 'idle' },
          batch:   { state: 'idle' },
          stream:  { topicIn: 'active', consumer: 'active', topicOut: 'active', latency: '~10ms' },
        },
        code: {
          lang: 'python',
          filename: 'streaming_serving.py',
          lines: [
            '# Streaming 서빙 — Kafka Consumer + 모델',
            'from kafka import KafkaConsumer, KafkaProducer',
            'import mlflow, json',
            '',
            'model = mlflow.pyfunc.load_model(',
            '    "models:/anomaly/Production"',
            ')',
            '',
            'consumer = KafkaConsumer(',
            '    "sensor.metrics", group_id="anomaly-svc"',
            ')',
            'producer = KafkaProducer(bootstrap_servers="kafka:9092")',
            '',
            'for msg in consumer:                 # 이벤트가 올 때마다',
            '    event = json.loads(msg.value)',
            '',
            '    # 즉시 추론',
            '    score = model.predict([event["features"]])[0]',
            '',
            '    if score > 0.9:                  # 이상치 → 알람 토픽',
            '        producer.send("anomaly.alerts", json.dumps({',
            '            "device_id": event["device_id"],',
            '            "score": float(score),',
            '            "ts": event["ts"]',
            '        }).encode())',
            '',
            '# 특징',
            '# - push 모델 (요청 없이 이벤트가 오면 처리)',
            '# - 처리량 + 저지연 둘 다 챙김',
            '# - Flink/Spark Streaming으로 윈도우 집계도',
            '#',
            '# 사용처: 실시간 이상 탐지, 광고 RTB, IoT 센서',

        },

        desc: '"사용자가 결과를 기다리나?" → Online. "주기적으로 모든 데이터?" → Batch. "이벤트 스트림?" → Streaming. 실무에서는 섞어서도 쓴다(Online + 야간 Batch 백필).',
        focus: 'choose',
        flow: { showCompare: true },
        code: {
          lang: 'shell',
          filename: 'choose-pattern.sh',
          lines: [
            '# 선택 기준 — 4가지 질문으로 결정',
            '',
            '"사용자가 결과를 기다리나?"             → Online',
            '"하루 1회로 충분한가?"                  → Batch',
            '"이벤트가 끊임없이 들어오나?"           → Streaming',
            '"latency p99 < 100ms?"                  → Online',
            '"처리량 수백만/일, GPU 효율 최대?"      → Batch',
            '"이상 탐지 / 실시간 알람?"              → Streaming',
            '',
            '# 비교표',
            '패턴       latency     처리량      비용     인프라 복잡도',
            '─────────────────────────────────────────────────────────',
            'Online     ms 단위     중          높음     중 (HPA)',
            'Batch      h/일 단위   매우 높음   낮음     낮 (스케줄러)',
            'Streaming  ms 단위     높음        중       높 (Kafka 운영)',
            '',
            '# 실무 — 섞어서 쓰는 경우',
            '- 추천:    Online (현재 클릭) + Batch (야간 사전계산)',
            '- 사기탐지: Streaming (실시간) + Batch (재학습용 라벨)',
            '- 검색:    Online (질의)     + Batch (인덱스 갱신)',
            '',
            '# 다음(III-2-1)에서는 서빙 도구 — Triton / TorchServe / KServe',
          ],
          highlight: [3, 4, 5, 13, 14, 15],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 패턴 메타 (헤더 카드용)
    // ─────────────────────────────────────────────────────
    const PATTERNS = [
      { key: 'online', emoji: '⚡', name: 'Online',    note: '즉석 (REST/gRPC)' },
      { key: 'batch',  emoji: '📦', name: 'Batch',     note: '포장 (스케줄 일괄)' },
      { key: 'stream', emoji: '🔄', name: 'Streaming', note: '구독 (이벤트)' },
    ];

    // ─────────────────────────────────────────────────────
    // 화살표 컴포넌트 (sync 흐름 강조)
    // ─────────────────────────────────────────────────────
    function Arrow({ active, label }) {
      return (
        <div className="flex flex-col items-center justify-center px-1">
          <div className={`text-lg ${active ? 'text-fuchsia-600 animate-pulse' : 'text-slate-300'}`}>→</div>
          {label && (
            <div className={`text-[9px] font-mono mt-0.5 ${active ? 'text-fuchsia-700' : 'text-slate-400'}`}>{label}</div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 패턴별 흐름 시각화
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ focus, flow }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">

            <span className="text-[10px] text-slate-400 font-mono">serving patterns · live</span>
          </div>

          {/* 패턴 카드 헤더 */}
          <div className="grid grid-cols-3 gap-2 mb-5">
            {PATTERNS.map((p) => {
              const isActive = focus === p.key;
              return (
                <div
                  key={p.key}
                  className={`rounded-lg p-2 text-center transition-all duration-300 ${
                    isActive
                      ? 'bg-fuchsia-100 border-2 border-fuchsia-500 scale-105 shadow'
                      : 'bg-slate-50 border border-slate-200 opacity-60'

                >
                  <div className="text-xl">{p.emoji}</div>
                  <div className={`text-xs font-bold mt-0.5 ${isActive ? 'text-fuchsia-800' : 'text-slate-700'}`}>{p.name}</div>

                </div>
              );
            })}
          </div>

          {/* Online 흐름 — user → API → model (sync, latency 50ms) */}
          {focus === 'online' && (
            <div className="rounded-lg bg-gradient-to-br from-fuchsia-50 to-white border-2 border-fuchsia-300 p-4">
              <div className="text-[11px] font-bold text-fuchsia-800 mb-3">⚡ Online — 동기 REST</div>
              <div className="flex items-center justify-between">

                  <div className="text-[10px] font-bold text-slate-700 mt-1">FastAPI</div>

                  <div className="text-[10px] font-bold text-slate-700 mt-1">model</div>
                  <div className="text-[9px] text-slate-400">predict</div>

          {/* Batch 흐름 — cron + table → DB */}
          {focus === 'batch' && (

              <div className="text-[11px] font-bold text-fuchsia-800 mb-3">📦 Batch — 스케줄 일괄</div>

              <div className="flex items-center justify-center mb-3">
                <div className="bg-white border-2 border-fuchsia-400 rounded-full w-16 h-16 flex flex-col items-center justify-center shadow-sm">
                  <div className="text-2xl">⏰</div>
                  <div className="text-[8px] font-mono text-fuchsia-700">{flow.batch?.schedule || '0 2 * * *'}</div>
                </div>
              </div>

              <div className="bg-white border border-slate-200 rounded-lg p-2 mb-3">

                <table className="w-full text-[10px] font-mono">
                  <thead className="text-slate-500">
                    <tr className="border-b border-slate-200">
                      <th className="text-left py-0.5">user_id</th>

                      <th className="text-left">f2</th>
                      <th className="text-left">→ score</th>
                    </tr>

          {focus === 'stream' && (
            <div className="rounded-lg bg-gradient-to-br from-fuchsia-50 to-white border-2 border-fuchsia-300 p-4">

              <div className="space-y-2">
                {/* 입력 토픽 */}
                <div className="bg-white border-2 border-fuchsia-400 rounded-lg px-3 py-2 shadow-sm">
                  <div className="flex items-center justify-between mb-1">
                    <div className="flex items-center gap-2">
                      <span className="text-lg">📥</span>
                      <span className="text-[10px] font-bold text-slate-700">topic: sensor.metrics</span>
                    </div>
                    <span className="text-[9px] font-mono bg-fuchsia-100 text-fuchsia-700 px-1 rounded">in</span>
                  </div>
                  <div className="flex gap-1 text-[9px] font-mono">
                    <span className="bg-fuchsia-200 text-fuchsia-900 px-1.5 py-0.5 rounded animate-pulse">evt#42</span>
                    <span className="bg-fuchsia-200 text-fuchsia-900 px-1.5 py-0.5 rounded">evt#43</span>
                    <span className="bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded">evt#44</span>

                      <div className="text-2xl">📡</div>
                      <div className="text-[10px] font-bold text-slate-700">consumer</div>
                      <div className="text-[9px] text-slate-400">anomaly-svc</div>
                    </div>
                    <span className="text-fuchsia-500 text-lg">+</span>
                    <div className="text-center">
                      <div className="text-2xl">🧠</div>
                      <div className="text-[10px] font-bold text-slate-700">model</div>
                      <div className="text-[9px] text-slate-400">predict</div>
                    </div>
                  </div>
                </div>

                <div className="flex justify-center"><Arrow active label="if score > 0.9" /></div>

                {/* 출력 토픽 */}
                <div className="bg-white border-2 border-fuchsia-400 rounded-lg px-3 py-2 shadow-sm">
                  <div className="flex items-center justify-between mb-1">
                    <div className="flex items-center gap-2">
                      <span className="text-lg">📤</span>
                      <span className="text-[10px] font-bold text-slate-700">topic: anomaly.alerts</span>
                    </div>
                    <span className="text-[9px] font-mono bg-fuchsia-100 text-fuchsia-700 px-1 rounded">out</span>
                  </div>
                  <div className="flex gap-1 text-[9px] font-mono">
                    <span className="bg-red-100 text-red-700 px-1.5 py-0.5 rounded animate-pulse">🚨 alert#42</span>
                  </div>
                </div>
              </div>

              <div className="mt-3 flex items-center justify-between text-[11px]">
                <span className="bg-fuchsia-600 text-white px-2 py-1 rounded font-bold">PUSH</span>
                <span className="font-mono text-slate-700">latency ≈ <strong className="text-fuchsia-700">{flow.stream?.latency || '~10ms'}</strong></span>
                <span className="text-slate-500">→ 토픽 전송</span>
              </div>
            </div>

          {/* 선택 기준 비교표 */}
          {focus === 'choose' && (
            <div className="rounded-lg bg-gradient-to-br from-fuchsia-50 to-white border-2 border-fuchsia-300 p-4">
              <div className="text-[11px] font-bold text-fuchsia-800 mb-3">🎯 3 패턴 비교 — latency / 처리량 / 비용</div>

              <table className="w-full text-[11px]">
                <thead>
                  <tr className="border-b-2 border-fuchsia-300 text-slate-600">
                    <th className="text-left py-1.5 font-bold">패턴</th>
                    <th className="text-center font-bold">Latency</th>
                    <th className="text-center font-bold">처리량</th>
                    <th className="text-center font-bold">비용</th>
                  </tr>
                </thead>
                <tbody>
                  <tr className="border-b border-slate-200">
                    <td className="py-2">
                      <div className="font-bold text-slate-800">⚡ Online</div>
                      <div className="text-[9px] text-slate-500">REST/gRPC</div>
                    </td>
                    <td className="text-center">
                      <span className="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded font-bold text-[10px]">ms 단위</span>
                    </td>
                    <td className="text-center">
                      <span className="bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded text-[10px]">중</span>
                    </td>
                    <td className="text-center">
                      <span className="bg-red-100 text-red-700 px-2 py-0.5 rounded text-[10px]">높음</span>
                    </td>
                  </tr>
                  <tr className="border-b border-slate-200">
                    <td className="py-2">
                      <div className="font-bold text-slate-800">📦 Batch</div>
                      <div className="text-[9px] text-slate-500">cron 일괄</div>
                    </td>
                    <td className="text-center">
                      <span className="bg-red-100 text-red-700 px-2 py-0.5 rounded text-[10px]">h/일</span>
                    </td>
                    <td className="text-center">
                      <span className="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded font-bold text-[10px]">매우 높음</span>
                    </td>
                    <td className="text-center">
                      <span className="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded font-bold text-[10px]">낮음</span>
                    </td>
                  </tr>
                  <tr>
                    <td className="py-2">
                      <div className="font-bold text-slate-800">🔄 Streaming</div>
                      <div className="text-[9px] text-slate-500">Kafka 이벤트</div>
                    </td>
                    <td className="text-center">
                      <span className="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded font-bold text-[10px]">ms 단위</span>
                    </td>
                    <td className="text-center">
                      <span className="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded text-[10px]">높음</span>
                    </td>
                    <td className="text-center">
                      <span className="bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded text-[10px]">중</span>
                    </td>
                  </tr>
                </tbody>
              </table>

              <div className="mt-4 p-2 rounded bg-fuchsia-100 border border-fuchsia-300 text-[10px] text-fuchsia-900">
                <strong>실무 팁:</strong> 한 모델이 두 패턴으로 나가기도 함 — 추천(Online + 야간 Batch 백필), 사기탐지(Streaming + 재학습용 Batch).
              </div>
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="text-fuchsia-600">→</span>활성 흐름</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-fuchsia-400"></span>현재 패턴</span>
            <span className="flex items-center gap-1 ml-auto font-mono">step focus: <strong className="text-fuchsia-700">{focus}</strong></span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-fuchsia-500/10 border-l-2 border-fuchsia-400' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-fuchsia-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 서빙 &amp; 배포 &gt; Chapter 1. 서빙 패턴</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">서빙 패턴 (Online / Batch / Streaming)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">주문 방식 3종 — 즉석(Online) / 포장(Batch) / 구독(Streaming)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane focus={step.focus} flow={step.flow} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-fuchsia-50 border-2 border-fuchsia-300 rounded-xl p-3 text-sm text-fuchsia-900">
                💡 다음(III-2-1)에서는 서빙 도구 — <strong>Triton / TorchServe / KServe</strong>
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-fuchsia-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-fuchsia-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-fuchsia-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-fuchsia-600 text-white hover:bg-fuchsia-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; III-1-1</a>
              <a href="./III-2-1.html" className="text-fuchsia-700 hover:text-fuchsia-900 font-medium">III-2-1 서빙 도구 (Triton/TorchServe/KServe) &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
