<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLOps 학습 — 서빙 패턴 (Online / Batch / Streaming)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    III-1-2. 서빙 패턴 (Online / Batch / Streaming)
    학습 목표: 모델을 어떻게 노출하느냐 — 요청 방식에 따른 3종 패턴 선택
    핵심 비유: "주문 방식 3종" — 즉석(Online) / 포장 도시락(Batch) / 구독 배달(Streaming)
    구조: 4단계 (Online 즉석 / Batch 포장 / Streaming 구독 / 선택 기준)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Online 서빙 — "즉석 주문" (REST API)',
        desc: '사용자가 요청 → 모델이 즉시 추론 → 응답. 카드 결제 사기 탐지처럼 "지금 당장" 답이 필요할 때. p99 100ms 이내가 목표. FastAPI/Triton 위에 모델을 띄워 HTTP/gRPC로 노출.',
        block: {
          kind: 'python',
          code: `# Online 서빙 (FastAPI 예시)
from fastapi import FastAPI
import mlflow

app = FastAPI()
model = mlflow.pyfunc.load_model("models:/fraud-detector/Production")

@app.post("/predict")
def predict(payload: dict):
    # 한 건씩 즉시 추론 (1~30ms 목표)
    score = model.predict([payload])[0]
    return {"fraud_score": float(score)}

# 특징
# - 동기 REST/gRPC (요청 → 응답)
# - p99 latency가 핵심 (예: < 100ms)
# - 트래픽 따라 오토스케일 (HPA)
# - 사용처: 결제 사기, 추천, 검색 랭킹

# 한계
# - 모델이 무거우면 latency 부담
# - 부하 급증 시 비용 폭증
# - 단순 배치보다 GPU 활용률 낮음`,
        },
        focus: 'online',
      },
      {
        title: 'Step 2. Batch 서빙 — "포장 도시락" (스케줄 일괄)',
        desc: '하루 1회 모든 사용자에 대해 추론을 돌려 결과를 DB에 저장. 추천 메일, 이탈 예측처럼 "실시간이 아니어도 OK"인 경우. Airflow 스케줄로 새벽에 한 번에 처리. GPU 활용률 최고.',
        block: {
          kind: 'python',
          code: `# Batch 서빙 (Airflow + Spark/Pandas)
from airflow.decorators import dag, task
from datetime import datetime
import mlflow, pandas as pd

@dag(schedule="0 2 * * *", start_date=datetime(2026,1,1))
def daily_churn_score():

    @task
    def score_all_users():
        # 1. 모든 사용자 데이터 로드 (수백만 행)
        users = pd.read_sql("SELECT * FROM users_features", conn)

        # 2. 한 번에 추론 (벡터화로 GPU 효율 최대)
        model = mlflow.pyfunc.load_model("models:/churn/Production")
        users["churn_score"] = model.predict(users)

        # 3. DB에 저장 → 운영 앱은 DB만 조회
        users[["user_id", "churn_score"]].to_sql(
            "churn_scores", conn, if_exists="replace"
        )

    score_all_users()

# 특징: latency 0 (조회만 하면 됨), 처리량 최대
# 한계: 신선도(어제 score), 즉시 응답 불가
# 사용처: 이탈 예측, 일일 추천 메일, 신용 평가`,
        },
        focus: 'batch',
      },
      {
        title: 'Step 3. Streaming 서빙 — "구독 배달" (이벤트 기반)',
        desc: 'Kafka/Pulsar 토픽에 이벤트가 흐르면 모델이 즉시 처리해 다른 토픽으로 결과 전송. 실시간 이상 탐지, 광고 입찰처럼 "끊임없이 들어오는 데이터"에 적합. Online과 달리 push 방식.',
        block: {
          kind: 'python',
          code: `# Streaming 서빙 (Kafka Consumer + 모델)
from kafka import KafkaConsumer, KafkaProducer
import mlflow, json

model = mlflow.pyfunc.load_model("models:/anomaly/Production")

consumer = KafkaConsumer("sensor.metrics", group_id="anomaly-svc")
producer = KafkaProducer(bootstrap_servers="kafka:9092")

for msg in consumer:
    event = json.loads(msg.value)

    # 들어오는 즉시 추론
    score = model.predict([event["features"]])[0]

    if score > 0.9:
        # 이상치 → 알람 토픽으로 전송
        producer.send("anomaly.alerts", json.dumps({
            "device_id": event["device_id"],
            "score": float(score),
            "ts": event["ts"]
        }).encode())

# 특징
# - push 모델 (요청 없음, 이벤트가 와서 처리)
# - 처리량 + 저지연 둘 다 챙김
# - Flink/Spark Streaming + 모델로 윈도우 집계도

# 사용처: 실시간 이상 탐지, 광고 RTB, IoT 센서`,
        },
        focus: 'stream',
      },
      {
        title: 'Step 4. 어떤 패턴을 고를까? — 의사결정 표',
        desc: '"실시간 응답 필요?" → Online. "주기적으로 모든 데이터?" → Batch. "이벤트 스트림?" → Streaming. 같은 모델이 두 패턴으로 나가기도 함 (Online + 야간 Batch 백필).',
        block: {
          kind: 'shell',
          code: `# 선택 기준
질문                                    → 답
─────────────────────────────────────────────────
"사용자가 결과를 기다리나?"             → Online
"하루 1회로 충분한가?"                  → Batch
"이벤트가 끊임없이 들어오나?"           → Streaming
"latency p99 < 100ms?"                  → Online
"처리량 수백만/일, GPU 효율 최대?"      → Batch
"이상 탐지/실시간 알람?"                → Streaming

# 실무에서는 섞어서 씀
- 추천: Online (현재 클릭) + Batch (야간 사전계산)
- 사기탐지: Streaming (실시간) + Batch (재학습용 라벨)
- 검색: Online (질의) + Batch (인덱스 갱신)

# 비용/운영 비교
패턴       latency    비용    오토스케일    인프라 복잡도
Online     ms 단위    높음    HPA            중
Batch      h/일 단위  낮음    스케줄러       낮
Streaming  ms 단위    중      파티션         높(Kafka 운영)

# 다음(III-2-1)에서는 서빙 도구 비교 — Triton / TorchServe / KServe`,
        },
        focus: 'choose',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
    };

    const PATTERNS = [
      { key: 'online', emoji: '⚡', name: 'Online',    note: '즉석 (REST/gRPC)' },
      { key: 'batch',  emoji: '📦', name: 'Batch',     note: '포장 (스케줄 일괄)' },
      { key: 'stream', emoji: '🔄', name: 'Streaming', note: '구독 (이벤트)' },
      { key: 'choose', emoji: '🎯', name: '선택 기준',  note: '응답 vs 처리량' },
    ];

    function PatternCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🍱 주문 방식 3종 (서빙 패턴)</div>
          <div className="grid grid-cols-4 gap-2">
            {PATTERNS.map((p) => {
              const isActive = focus === p.key;
              return (
                <div
                  key={p.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-rose-100 border-2 border-rose-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{p.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{p.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{p.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">서빙 패턴 (Online / Batch / Streaming)</h1>
                <p className="text-sm text-slate-500 mt-1">주문 방식 3종 — 즉석 / 포장 / 구독</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <PatternCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'choose' && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 mb-6 text-xs text-rose-900">
                💡 다음(III-2-1)에서는 서빙 도구 — Triton / TorchServe / KServe 비교
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
