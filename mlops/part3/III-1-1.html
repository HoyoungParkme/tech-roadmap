<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLOps 학습 — 모델 레지스트리 (MLflow Registry)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    III-1-1. 모델 레지스트리 (MLflow Model Registry)
    학습 목표: 모델에 단계 라벨(Staging/Production)을 붙여 운영팀이 안전하게 가져다 쓰도록.
    핵심 비유: "도서관 카탈로그 + 단계 라벨" — 운영팀은 "Production 단계" 라벨만 보고 가져다 씀
    구조: 4단계 (파일로 모델 공유 한계 / Registry 등록 / 단계 전환 / 운영 로드)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 파일로 공유 — "어떤 모델이 production?"',
        desc: 'pickle 파일을 S3에 두고 운영팀에 "이거 쓰세요" 알려주면 끝? 운영팀: "여러 .pkl 파일 중 어떤 게 최신?", "버전 1.5 vs 1.6 차이는?", "롤백은 어떻게?". 답이 흐려진다.',
        block: {
          kind: 'shell',
          code: `# 학습팀 산출물
$ ls s3://models/
fraud-detector-2026-04-15.pkl
fraud-detector-2026-04-22.pkl   ← v1.5
fraud-detector-2026-04-29.pkl   ← v1.6
fraud-detector-2026-05-06.pkl   ← v1.7? 어떤 게 production?
fraud-detector-best.pkl         ← 가장 좋은 거?

# 운영팀의 질문
- "이 중 어떤 게 production?"
- "v1.6과 v1.7 차이는?"
- "롤백 어떻게?" → 또 다른 .pkl 찾아 헤매기
- "어떤 데이터로 학습됐지?"
→ Model Registry 필요`,
        },
        focus: 'file',
      },
      {
        title: 'Step 2. Registry 등록 — 이름 + 버전 자동',
        desc: 'register_model(model_uri, "fraud-detector") 한 번이면 자동 버전 부여. version 1, 2, 3... 이름은 그대로. 운영팀은 이름만 알면 됨. "도서관 책 등록".',
        block: {
          kind: 'python',
          code: `import mlflow

# best run의 모델을 등록
run_id = "abc123def..."
model_uri = f"runs:/{run_id}/model"

mlflow.register_model(model_uri, name="fraud-detector")
# Registered: fraud-detector version 1

# 다음 학습 후 같은 이름으로 등록
mlflow.register_model(another_uri, "fraud-detector")
# Registered: fraud-detector version 2

# 자동 버전 부여
$ mlflow models list
NAME             VERSION  STAGE
fraud-detector   1        None
fraud-detector   2        None
fraud-detector   3        None

# 단계 라벨은 아직 없음 (Step 3에서)`,
        },
        focus: 'register',
      },
      {
        title: 'Step 3. 단계 전환 — None → Staging → Production',
        desc: '버전마다 Stage 라벨 부여 (None / Staging / Production / Archived). 학습팀이 Staging 등록 → 검증팀이 통과시키면 Production. 운영팀은 "Production 단계 모델"만 가져다 씀.',
        block: {
          kind: 'python',
          code: `from mlflow import MlflowClient
client = MlflowClient()

# v3을 Staging으로 (검증 시작)
client.transition_model_version_stage(
    name="fraud-detector",
    version=3,
    stage="Staging"
)

# 검증 통과 → Production
client.transition_model_version_stage(
    name="fraud-detector",
    version=3,
    stage="Production",
    archive_existing_versions=True   # 이전 Production은 자동 Archived
)

# 결과
$ mlflow models list -n fraud-detector
NAME             VERSION  STAGE
fraud-detector   1        Archived
fraud-detector   2        Archived           ← 이전 Production
fraud-detector   3        Production         ← 새 모델
fraud-detector   4        Staging            ← 다음 후보`,
        },
        focus: 'stage',
      },
      {
        title: 'Step 4. 운영 로드 — "Production만 가져다 써"',
        desc: '운영 코드는 항상 "models:/fraud-detector/Production" URI로 로드. Stage 전환되면 자동으로 새 모델이 사용됨. 운영팀은 코드 변경 없이 모델 갱신. 롤백도 한 줄 (Stage 되돌리기).',
        block: {
          kind: 'python',
          code: `# 운영 코드 (Production 단계만)
import mlflow

model = mlflow.pyfunc.load_model(
    "models:/fraud-detector/Production"
)
prediction = model.predict(input_df)

# 학습팀이 v4를 Production으로 전환하면
# → 운영 코드는 그대로, 다음 추론부터 새 모델 사용
# (Pod 재시작 또는 폴링으로 갱신)

# 롤백
client.transition_model_version_stage(
    name="fraud-detector",
    version=2,                          # 이전 안정 버전
    stage="Production",
    archive_existing_versions=True
)
# → 운영팀 알림: "v3 문제 발견 → v2 롤백 완료"

# 다음(III-1-2)에서는 모델을 어떻게 노출하는지 — 서빙 패턴 3종`,
        },
        focus: 'serve',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
    };

    const STAGES = [
      { key: 'file',     emoji: '📁', name: '파일 공유',    note: '"어떤 게 production?"' },
      { key: 'register', emoji: '📚', name: 'Registry 등록', note: '이름 + 자동 버전' },
      { key: 'stage',    emoji: '🏷️', name: '단계 라벨',    note: 'Staging → Production' },
      { key: 'serve',    emoji: '🚀', name: '운영 로드',    note: '"Production만"' },
    ];

    function StageCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">📚 도서관 카탈로그 (Model Registry)</div>
          <div className="grid grid-cols-4 gap-2">
            {STAGES.map((s) => {
              const isActive = focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-rose-100 border-2 border-rose-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{s.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{s.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{s.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">모델 레지스트리 (MLflow Registry)</h1>
                <p className="text-sm text-slate-500 mt-1">도서관 카탈로그 — 단계 라벨로 운영팀 안전 로드</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <StageCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'serve' && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-3 mb-6 text-xs text-rose-900">
                💡 다음(III-1-2)에서는 모델을 어떻게 노출하는지 — Online / Batch / Streaming 서빙 패턴 3종
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
