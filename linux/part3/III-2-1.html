<body>
  <div id="root"></div>

  <!--
    Linux Chapter III-2-1 — 백그라운드 실행
    학습 목표: 셸이 닫혀도 살아남는 프로세스를 만드는 5가지 방법을 직관적으로 비교한다.
    핵심 비유: 가게 점원에게 "지금 일 시작하고 나 나가도 계속 해" 라고 시키는 여러 가지 방법
    패턴: fastapi v1 — 좌(LiveDataPane: 프로세스 생존 상태) / 우(VSCode CodeViewer)
    색상: Tux yellow (#fcc624) + amber
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. cmd & — 가장 단순한 백그라운드',
        desc: '명령 뒤에 `&` 만 붙이면 백그라운드로 실행된다. 셸이 다음 프롬프트를 바로 돌려주고, 프로세스는 별도로 돈다. 하지만 한 가지 결정적인 약점이 있다 — 터미널(셸)을 닫는 순간 SIGHUP 시그널이 전달되어 같이 죽는다.',
        sshOpen: true,
        jobAlive: true,
        keyPoint: '`&` 는 셸이 살아있을 때만 유효한 백그라운드. 터미널 닫으면 같이 죽는다.',
        scenario: { tool: '& 단독', shellState: '연결됨', afterLogout: '☠️ 종료됨' },

            '',
            '# 백그라운드 (셸이 즉시 돌아옴)',
            'python long_task.py &',
            '# [1] 12345     ← 잡 번호 [1], PID 12345',
            '',
            '# 출력은 그대로 터미널에 섞여 나옴 → 로그로 빼는 게 보통',
            'python long_task.py > app.log 2>&1 &',
            '',
            '# 현재 잡 확인',
            'jobs',
            '# [1]+  Running   python long_task.py > app.log 2>&1 &',
            '',
            '# ⚠️ 약점: 셸을 닫으면 (exit / Ctrl+D / SSH 끊김)',

      },
      {
        title: 'Step 2. nohup + & — SIGHUP 무시',
        desc: 'nohup 은 "no hangup" — SIGHUP 시그널을 무시하라고 알려주는 래퍼다. nohup 으로 감싸면 부모 셸이 SIGHUP 을 보내도 자식은 죽지 않는다. 표준 출력은 자동으로 `nohup.out` 으로 리다이렉트된다. 가장 흔하게 쓰이는 조합이 `nohup ... &`.',
        sshOpen: false,
        jobAlive: true,
        keyPoint: 'nohup = SIGHUP 무시. 터미널이 죽어도 프로세스는 살아남는다.',

        code: {
          lang: 'bash',
          filename: 'step2-nohup.sh',
          lines: [
            '# Step 2. nohup 으로 SIGHUP 무시',
            '',
            '# 기본 사용',
            'nohup python train.py &',
            '# nohup: ignoring input and appending output to \'nohup.out\'',
            '# [1] 23456',
            '',
            '# stdout/stderr 를 따로 지정',
            'nohup python train.py > train.log 2>&1 &',

            'tail -f nohup.out',
            '',
            '# 언제 쓰나',
            '#  • SSH 로 접속해서 긴 학습/배치 돌릴 때',

          highlight: [3, 4, 8, 11, 14, 15, 16, 19],

      },
      {
        title: 'Step 3. disown — 이미 띄운 잡을 셸에서 분리',
        desc: 'nohup 을 깜빡하고 그냥 `&` 로 띄웠는데, 이제 와서 SSH 를 끊어야 한다면? `disown` 명령으로 현재 셸의 jobs 테이블에서 해당 잡을 제거하면 된다. 셸이 종료 시 더 이상 자식 목록을 보지 않으므로 SIGHUP 이 가지 않는다.',
        sshOpen: false,
        jobAlive: true,
        keyPoint: 'disown 은 "이미 띄운 잡을 사후 분리" 할 때 쓴다. 잡 번호로 지정.',
        scenario: { tool: 'disown -h', shellState: '끊김', afterLogout: '✅ 생존' },
        code: {
          lang: 'bash',
          filename: 'step3-disown.sh',
          lines: [
            '# Step 3. disown 으로 사후 분리',

            'python heavy_task.py &',
            '# [1] 34567',

            '# 잡 확인',

            '',
            '# 옵션 ① 잡을 잡 테이블에서 제거 (가장 흔함)',
            'disown %1',
            '#     ↑ 잡 번호. 안 적으면 가장 최근 잡',
            '',
            '# 옵션 ② SIGHUP 만 안 받게 표시 (잡 테이블엔 유지)',
            'disown -h %1',
            '',
            '# 확인 — 더 이상 jobs 에 안 보임',
            'jobs',
            '# (empty)',
            '',
            '# 하지만 프로세스는 살아있음',
            'ps -p 34567',
            '#   PID TTY   TIME CMD',
            '# 34567 ?     00:00:05 python',
            '',
            '# 이제 exit 해도 안전',
            'exit',
            '',
            '# 한계: 이미 띄운 프로세스의 stdout 은 여전히 원래 터미널을 가리킴',
            '# → 터미널 닫히면 stdout 쓰기에서 EPIPE 가능',
            '# 가장 안전한 건 처음부터 nohup + 로그 리다이렉트',
          ],
          highlight: [3, 11, 15, 17, 21, 26],
        },
      },
      {
        title: 'Step 4. jobs / fg / bg — 잡 컨트롤 3종 세트',
        desc: '이미 포어그라운드로 띄운 명령을 Ctrl+Z 로 일시 정지하고, `bg` 로 백그라운드로 보내고, `fg` 로 다시 포어그라운드로 가져오는 흐름. 잡 번호 `%1`, `%2` 로 지정한다. 한 셸에서 여러 작업을 손쉽게 토글할 때 쓴다.',
        sshOpen: true,
        jobAlive: true,
        keyPoint: 'Ctrl+Z → bg → fg 사이클로 한 셸에서 여러 잡을 토글한다.',
        scenario: { tool: 'jobs/fg/bg', shellState: '연결됨', afterLogout: '⚠️ 종료 (nohup 같이)' },
        code: {
          lang: 'bash',
          filename: 'step4-jobs.sh',
          lines: [
            '# Step 4. 잡 컨트롤',
            '',
            '# 포어그라운드로 명령 실행 중...',
            'vim notes.txt',
            '# (편집 중에 잠깐 쉘로 나가고 싶다)',
            '',
            '# Ctrl+Z 누르면 SIGTSTP 가 전달돼 "일시 정지"',
            '# [1]+  Stopped   vim notes.txt',
            '',
            '# 백그라운드로 보내기 (vim 같은 대화형은 적합하지 않지만 예시)',
            'bg %1',
            '# [1]+  vim notes.txt &',
            '',
            '# 잡 목록',
            'jobs',
            '# [1]+  Running   python long.py &',
            '# [2]-  Stopped   vim notes.txt',
            '',
            '# 다시 포어그라운드로',
            'fg %2',
            '# (vim 화면으로 돌아옴)',
            '',
            '# 잡 번호 없이 fg / bg 하면 가장 최근(%+) 잡',
            'fg',
            '',
            '# 잡 죽이기',
            'kill %1',
            '# = kill 12345',
            '',
            '# 핵심 표기',
            '#  %1, %2   — 잡 번호',
            '#  %+ 또는 %% — current job (jobs 에서 + 표시)',
            '#  %- — previous job',
            '#  %?text — 명령에 text 가 포함된 잡',
          ],
          highlight: [3, 6, 7, 10, 11, 14, 19, 20, 26, 27],
        },
      },
      {
        title: 'Step 5. tmux / screen — 지속 세션 (정석)',
        desc: 'nohup/disown 은 "셸이 닫혀도 프로세스가 살아남는다" 까지만 해결한다. 다시 접속해서 그 작업의 화면을 보고 싶다면 답이 없다. tmux/screen 은 가상 터미널 세션을 서버 안에 만든 뒤 "붙였다 떼었다" 한다. SSH 끊겨도 세션은 살아있고, 다시 attach 하면 그 화면으로 돌아간다.',
        sshOpen: false,
        jobAlive: true,
        keyPoint: 'tmux = "서버 안의 가상 터미널". detach 후 SSH 끊겨도 화면이 보존된다.',
        scenario: { tool: 'tmux session', shellState: '끊김', afterLogout: '✅ 화면까지 보존' },
        summary: {
          title: '5가지 백그라운드 기법 비교',
          rows: [
            { metric: '&', before: '간단', after: 'SSH 끊기면 죽음', delta: '☠️' },
            { metric: 'nohup &', before: 'SIGHUP 무시', after: '화면 못 봄', delta: '✅' },
            { metric: 'disown', before: '사후 분리', after: '화면 못 봄', delta: '✅' },
            { metric: 'jobs/fg/bg', before: '한 셸 내 토글', after: '셸 닫히면 죽음', delta: '⚠️' },
            { metric: 'tmux', before: '세션 분리/재접속', after: '화면까지 보존', delta: '🏆' },
          ],
        },
        code: {
          lang: 'bash',
          filename: 'step5-tmux.sh',
          lines: [
            '# Step 5. tmux — 서버 안의 가상 터미널',
            '',
            '# 새 세션 만들고 들어가기',
            'tmux new -s train',
            '#         ↑ 세션 이름',
            '',
            '# 안에서 학습 돌리기',
            'python train.py',
            '# (출력이 실시간으로 보임)',
            '',
            '# Ctrl+B, D  → detach (세션은 살아남고 셸로 빠져나옴)',
            '# [detached (from session train)]',
            '',
            '# 이 상태에서 SSH 끊겨도 OK',
            'exit  # ← SSH 끊김',
            '',
            '# 다시 접속해서 세션 목록 확인',
            'tmux ls',
            '# train: 1 windows (created Wed May 19 14:00:00 2026)',
            '',
            '# 다시 붙이기',
            'tmux attach -t train',
            '# (train.py 가 돌고 있는 화면으로 돌아옴)',
            '',
            '# 자주 쓰는 단축키 (prefix = Ctrl+B 기본)',
            '# C-b d     detach',
            '# C-b "     수평 분할',
            '# C-b %     수직 분할',
            '# C-b 화살표  panel 이동',
            '# C-b c     새 window',
            '# C-b n/p   다음/이전 window',
            '# C-b [     스크롤 모드 (q 로 빠져나옴)',
            '',
            '# 세션 죽이기',
            'tmux kill-session -t train',
            '',
            '# screen 도 같은 개념',
            '#  screen -S train    새 세션',
            '#  Ctrl+A, D          detach',
            '#  screen -r train    재접속',
          ],
          highlight: [3, 4, 10, 17, 21, 22, 25, 26, 27, 28, 29, 30, 31, 32, 36, 37, 38],
        },
      },
    ];

    const TONE = {
      good:   { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-800', badge: 'bg-emerald-200 text-emerald-800' },
      warn:   { bg: 'bg-amber-50',    border: 'border-amber-400',   text: 'text-amber-800',   badge: 'bg-amber-200 text-amber-800' },
      danger: { bg: 'bg-rose-50',     border: 'border-rose-400',    text: 'text-rose-800',    badge: 'bg-rose-200 text-rose-800' },
    };

    function ScenarioBox({ scenario, sshOpen, jobAlive }) {
      const shellTone = sshOpen ? TONE.good : TONE.danger;
      const jobTone = jobAlive ? TONE.good : TONE.danger;
      return (
        <div className="rounded-lg border border-amber-300 bg-amber-50 p-3">
          <div className="text-xs font-bold text-amber-900 mb-2">🔧 사용 방식: <span className="font-mono">{scenario.tool}</span></div>
          <div className="grid grid-cols-2 gap-2">
            <div className={`rounded ${shellTone.bg} ${shellTone.border} border px-2 py-1.5`}>
              <div className={`text-[10px] ${shellTone.text}`}>SSH/셸 상태</div>
              <div className={`text-sm font-bold ${shellTone.text}`}>{scenario.shellState}</div>
            </div>
            <div className={`rounded ${jobTone.bg} ${jobTone.border} border px-2 py-1.5`}>
              <div className={`text-[10px] ${jobTone.text}`}>로그아웃 후</div>
              <div className={`text-sm font-bold ${jobTone.text}`}>{scenario.afterLogout}</div>
            </div>
          </div>
        </div>
      );
    }

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-amber-400 bg-white p-3">
          <div className="text-sm font-bold text-amber-900 mb-2">📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-amber-700 border-b border-amber-200">
                <th className="py-1 pr-2">기법</th><th className="py-1 pr-2">장점</th><th className="py-1 pr-2">한계</th><th className="py-1">평가</th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-amber-50">
                  <td className="py-1 pr-2 font-medium text-amber-900 font-mono">{r.metric}</td>
                  <td className="py-1 pr-2 text-emerald-700">{r.before}</td>
                  <td className="py-1 pr-2 text-rose-700">{r.after}</td>
                  <td className="py-1 font-bold">{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-amber-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-amber-900">백그라운드 프로세스 생존 시뮬레이션</h3>
            <span className="text-[10px] px-2 py-0.5 rounded bg-amber-200 text-amber-900">Step {state.title.match(/Step (\d+)/)[1]}</span>
          </div>

          <ScenarioBox scenario={state.scenario} sshOpen={state.sshOpen} jobAlive={state.jobAlive} />

          {/* 프로세스 트리 다이어그램 */}
          <div className="mt-3 rounded-lg bg-amber-50 border border-amber-200 p-3">
            <div className="text-[11px] font-bold text-amber-900 mb-2">프로세스 부모-자식 관계</div>
            <div className="flex items-center justify-between text-xs font-mono">
              <span className={`px-2 py-1 rounded text-white ${state.sshOpen ? 'bg-amber-500' : 'bg-rose-500 line-through opacity-70'}`}>🖥️ SSH/Shell</span>
              <span className="text-amber-700">→</span>
              <span className={`px-2 py-1 rounded text-white ${state.jobAlive ? 'bg-emerald-600' : 'bg-rose-600'}`}>
                {state.jobAlive ? '✅ 작업 생존' : '☠️ 작업 종료'}
              </span>
            </div>
            <div className="mt-2 text-[10px] text-amber-800">
              {state.sshOpen
                ? '셸이 살아있어 모든 자식 프로세스가 정상 동작'
                : '셸이 종료된 후에도 자식이 살아남아야 진정한 백그라운드'}
            </div>
          </div>

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs text-amber-900 bg-amber-100 border border-amber-300 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-zinc-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-zinc-800 border-b border-zinc-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-zinc-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-zinc-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-zinc-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-amber-500/25 border-l-2 border-amber-400 -ml-3 pl-2' : ''}`}>
                    <span className="text-zinc-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-zinc-800 border-t border-zinc-700 flex items-center justify-between text-[10px] text-zinc-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-amber-50 to-yellow-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap rounded-xl px-4 py-3" style={{ backgroundColor: '#fcc624', color: '#1f2937' }}>
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-zinc-900 text-amber-400 font-bold">🐧</span>
              <div>
                <h1 className="text-2xl font-bold">Chapter III-2-1. 백그라운드 실행</h1>
                <p className="text-sm opacity-90">& / nohup / disown / jobs / tmux — 셸이 닫혀도 살아남는 5가지 방법</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-amber-500' : 'bg-amber-100'}`} />
              ))}
            </div>

            <div className="mb-4 rounded-xl bg-zinc-800 text-amber-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-amber-100/90 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} className="px-3 py-1.5 text-xs rounded border border-amber-300 bg-white text-amber-800 hover:bg-amber-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} className="px-3 py-1.5 text-xs rounded border border-amber-300 bg-white text-amber-800 hover:bg-amber-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-amber-700 text-white' : 'bg-amber-600 text-white hover:bg-amber-700'}`}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} className="px-3 py-1.5 text-xs rounded border border-amber-300 bg-white text-amber-800 hover:bg-amber-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-amber-700 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-amber-400 bg-white px-4 py-3 text-sm text-zinc-900">
                <div className="font-bold mb-1 text-amber-900">✅ 핵심 정리</div>
                실무 권장: 1회성 긴 작업은 <code className="px-1 bg-amber-100 rounded">nohup ... &gt; log 2&gt;&amp;1 &amp;</code>, 작업 화면을 다시 보고 싶으면 <code className="px-1 bg-amber-100 rounded">tmux</code>, 운영 데몬은 다음 챕터의 <code className="px-1 bg-amber-100 rounded">systemd unit</code>.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['&', 'nohup', 'disown', 'jobs', 'fg/bg', 'tmux', 'SIGHUP'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-amber-100 text-amber-900 border border-amber-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-amber-800">
              <a href="../index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./III-2-2.html" className="underline hover:no-underline">다음: III-2-2 cron / systemd timer →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
