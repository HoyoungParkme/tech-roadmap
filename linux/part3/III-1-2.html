        desc: 'PID 찾고 → kill 하는 게 번거롭다. pkill 과 killall 이 그걸 한 번에. pkill -f "python.*worker" 는 패턴 매칭. killall nginx 는 이름이 정확히 일치하는 모든 인스턴스. -9 옵션도 그대로 사용. 강력하지만 잘못된 패턴으로 엉뚱한 거 죽일 수 있어 주의.',
        active: 'pkill',
        sigNum: 9,
        cmd: 'pkill -9 -f "python worker"',
        behavior: '패턴 매칭 일괄 종료',
        verdict: 'pkill / killall',
        verdictTone: 'good',
        summary: {
          title: '시그널 + kill 종합',
          rows: [
            { metric: 'SIGTERM (15)', before: '?', after: '정상 종료 (기본)',  delta: 'graceful' },
            { metric: 'SIGKILL (9)',  before: '?', after: '강제 종료',          delta: '최후 수단' },
            { metric: 'SIGHUP (1)',   before: '?', after: '재로딩 (관례)',     delta: 'nginx reload' },
            { metric: 'SIGINT (2)',   before: '?', after: 'Ctrl+C',             delta: '인터럽트' },
            { metric: 'kill',         before: '?', after: 'PID 로',             delta: 'ps/pgrep 먼저' },
            { metric: 'pkill / killall', before: '?', after: '이름/패턴으로', delta: '편하지만 위험' },
          ],
        },
        keyPoint: 'pkill -f 가 가장 자주. SIGTERM → 안 되면 SIGKILL. SIGHUP 는 reload.',
        code: {
          lang: 'bash',
          filename: 'pkill-killall.sh',
          lines: [
            '# Step 5. pkill / killall — 이름으로 죽이기',
            '',
            '## pkill — 패턴 매칭',
            '$ pkill nginx                   # 이름이 nginx 로 시작하는 프로세스',
            '$ pkill -9 nginx                # 강제',
            '$ pkill -HUP nginx              # SIGHUP (reload)',
            '',
            '## pkill -f — 전체 명령 라인 매칭 (가장 자주)',
            '$ pkill -f "python.*worker"     # python ... worker ...',
            '$ pkill -f "uvicorn app:app"',
            '$ pkill -9 -f "node.*dev-server"',
            '',
            '#   -f 가 강력한 이유',
            '#   $ ps aux',
            '#   edgar 1234 ... python /opt/app/worker.py --queue email',
            '#   edgar 5678 ... python /opt/app/worker.py --queue sms',
            '#',
            '#   $ pkill python              # 둘 다 죽음',
            '#   $ pkill -f "queue email"    # 1234 만 죽음 ✅',
            '',
            '## pkill 옵션',
            '$ pkill -u edgar                # 특정 사용자 프로세스만',
            '$ pkill -G developers           # 특정 그룹',
            '$ pkill -P 1000                 # 특정 부모 PID 의 자식들',
            '$ pkill -n nginx                # newest 하나만',
            '$ pkill -o nginx                # oldest 하나만',
            '$ pkill -e -f "worker"          # echo (어떤 PID 죽였는지 표시)',
            '',
            '## killall — 이름 정확히 일치',
            '$ killall nginx                 # 모든 nginx 프로세스',
            '$ killall -9 chrome             # 강제',
            '$ killall -HUP nginx            # reload',
            '',
            '#   pkill 과 차이',
            '#   pkill nginx       : 이름이 "nginx*" 인 모든 프로세스',
            '#   killall nginx     : 이름이 정확히 "nginx" 인 것만',
            '',
            '## ⚠️ 위험 — 와일드카드/패턴 잘못 쓰면',
            '$ pkill -9 -f "py"',
            '#   → python, pylint, pyenv, mypy ... 다 죽음',
            '#   → 항상 ps 먼저 확인',
            '',
            '## 안전 패턴 — 먼저 확인',
            '$ pgrep -af "python worker"     # -a 는 명령 라인 표시',
            '$ pkill -f "python worker"',
            '',
            '## 시그널 + kill 명령 패밀리 정리',
            '#',
            '#   kill <PID>             ← PID 로',
            '#   kill -9 <PID>',
            '#   kill -HUP <PID>',
            '#',
            '#   pkill <name>           ← 이름으로 (포함 매칭)',
            '#   pkill -f <pattern>     ← 전체 명령 라인',
            '#   pkill -9 -f <pattern>',
            '#',
            '#   killall <name>         ← 이름 정확 일치',
            '#   killall -9 <name>',
            '',
            '## 실무 시나리오 정리',
            '',
            '# (1) 좀비 worker 다 죽이기',
            '$ pkill -9 -f "worker.*old-version"',
            '',
            '# (2) 특정 사용자의 모든 프로세스',
            '$ sudo pkill -9 -u baduser',
            '',
            '# (3) nginx 부드럽게 재로딩',
            '$ sudo killall -HUP nginx',
            '# (또는) $ sudo systemctl reload nginx',
            '',
            '# (4) Docker / k8s 환경에서는 docker stop / kubectl delete pod 가 더 안전',
            '#     (시그널 + 타임아웃 + 강제까지 한 번에)',
            '',
            '## 마지막 — 진단/종료 한 줄 콤보',
            '$ ps aux | grep myapp | awk \'{print $2}\' | xargs kill -9',
            '$ pgrep -f myapp | xargs kill -9',
            '$ pkill -9 -f myapp                 # 셋 다 동일 효과',
            '',
            '## 핵심 규칙',
            '#  ✅ 먼저 SIGTERM (kill or pkill 기본)',
            '#  ✅ 안 죽으면 SIGKILL (-9)',
            '#  ✅ reload 는 SIGHUP',
            '#  ✅ 패턴 사용 전 pgrep -af 로 확인',
            '#  ✅ 운영은 systemctl / docker / kubectl 우선',
          ],
          highlight: [2, 3, 4, 5, 6, 8, 9, 10, 11, 13, 14, 15, 16, 17, 18, 19, 21, 22, 23, 24, 25, 26, 28, 29, 30, 31, 33, 34, 35, 38, 39, 40, 41, 44, 45, 48, 49, 50, 51, 52, 53, 55, 56, 57, 62, 63, 64, 65, 66, 67, 68, 73, 74, 75, 78, 79, 80, 81, 82],
        },
      },
    ];

    const TONE = {
      good:   { bg: 'bg-amber-50',  border: 'border-amber-400', text: 'text-amber-900', badge: 'bg-amber-200 text-amber-900' },
      warn:   { bg: 'bg-orange-50', border: 'border-orange-400', text: 'text-orange-900', badge: 'bg-orange-200 text-orange-900' },
      info:   { bg: 'bg-yellow-50', border: 'border-yellow-400', text: 'text-yellow-900', badge: 'bg-yellow-200 text-yellow-900' },
      danger: { bg: 'bg-rose-50',   border: 'border-rose-400',  text: 'text-rose-800',  badge: 'bg-rose-200 text-rose-800' },
    };

    function SignalCard({ num, name, active, desc, blockable }) {
      const isOn = active === name;
      return (
        <div className={`rounded-lg border-2 px-3 py-2 transition ${isOn ? 'bg-amber-50 border-amber-500 shadow' : 'bg-white border-gray-200 opacity-75'}`}>
          <div className="flex items-center justify-between">
            <span className={`font-bold ${isOn ? 'text-amber-900' : 'text-gray-500'}`}>
              <span className="font-mono text-xs mr-1">[{num}]</span>{name}
            </span>
            {!blockable && <span className="text-[9px] px-1.5 rounded bg-rose-500 text-white">막을 수 없음</span>}
          </div>
          <div className={`text-[10px] mt-1 ${isOn ? 'text-amber-800' : 'text-gray-400'}`}>{desc}</div>
        </div>
      );
    }

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-amber-400 bg-white p-3">
          <div className="text-sm font-bold text-amber-900 mb-2">📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-gray-500 border-b border-gray-200">
                <th className="py-1 pr-2">시그널/명령</th><th className="py-1 pr-2"></th><th className="py-1 pr-2">의미</th><th className="py-1">메모</th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-gray-100">
                  <td className="py-1 pr-2 font-mono font-bold text-amber-900">{r.metric}</td>
                  <td className="py-1 pr-2 text-gray-300">→</td>
                  <td className="py-1 pr-2 text-emerald-700">{r.after}</td>
                  <td className="py-1 text-gray-700 font-mono text-[10px]">{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.info;
      return (
        <div className="rounded-xl border border-amber-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-amber-900">📡 시그널 + kill</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          <div className="grid grid-cols-1 gap-2">
            <SignalCard num={1}  name="SIGHUP"  active={state.active} desc="reload (관례)" blockable={true} />
            <SignalCard num={2}  name="SIGINT"  active={state.active} desc="Ctrl+C 인터럽트" blockable={true} />
            <SignalCard num={9}  name="SIGKILL" active={state.active} desc="강제 종료" blockable={false} />
            <SignalCard num={15} name="SIGTERM" active={state.active} desc="정상 종료 (기본)" blockable={true} />
          </div>

          <div className="mt-3 rounded-lg bg-gray-900 text-amber-50 p-3">
            <div className="text-[10px] text-amber-300 mb-1">$ {state.cmd}</div>
            <div className="text-[11px] font-mono text-amber-100">{state.behavior}</div>
            <div className="mt-1 text-[10px] text-amber-400">시그널 번호: {state.sigNum}</div>
          </div>

          <SummaryTable summary={state.summary} />

          <div className={`mt-3 text-xs rounded p-2 ${state.verdictTone === 'danger' ? 'bg-rose-50 text-rose-900 border border-rose-300' : 'bg-amber-100 text-amber-900 border border-amber-300'}`}>
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-gray-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-gray-800 border-b border-gray-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-gray-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-gray-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-gray-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-amber-500/25 border-l-2 border-amber-400 -ml-3 pl-2' : ''}`}>
                    <span className="text-gray-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-gray-800 border-t border-gray-700 flex items-center justify-between text-[10px] text-gray-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-amber-50 to-yellow-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap rounded-xl px-4 py-3" style={{backgroundColor:'#fcc624', color:'#1f2937'}}>
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-gray-900 text-amber-300 font-bold">📡</span>
              <div>
                <h1 className="text-2xl font-bold">Chapter III-1-2. 시그널 + kill</h1>
                <p className="text-sm opacity-80">SIGTERM / SIGKILL / SIGHUP — kill, pkill, killall</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-amber-500' : 'bg-amber-100'}`} />
              ))}
            </div>

            <div className="mb-4 rounded-xl bg-gray-900 text-amber-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-amber-100/90 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} className="px-3 py-1.5 text-xs rounded border border-amber-300 bg-white text-amber-900 hover:bg-amber-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} className="px-3 py-1.5 text-xs rounded border border-amber-300 bg-white text-amber-900 hover:bg-amber-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-gray-900 text-amber-300' : 'bg-amber-500 text-gray-900 hover:bg-amber-600'}`}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} className="px-3 py-1.5 text-xs rounded border border-amber-300 bg-white text-amber-900 hover:bg-amber-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-amber-800 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-amber-400 bg-white px-4 py-3 text-sm text-gray-900">
                <div className="font-bold mb-1 text-amber-900">✅ 핵심 정리</div>
                SIGTERM (15) 기본 정상 종료. SIGKILL (9) 강제 (최후의 수단). SIGHUP (1) reload 관례. kill PID, pkill -f 패턴, killall 이름 정확.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['SIGTERM', 'SIGKILL', 'SIGHUP', 'kill', 'pkill', 'killall'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-amber-100 text-amber-900 border border-amber-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-amber-900">
              <a href="./III-1-1.html" className="underline hover:no-underline">← III-1-1 ps/top/htop</a>
              <a href="../index.html" className="underline hover:no-underline">챕터 목록 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
