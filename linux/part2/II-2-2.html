            '[',
            '  {"name": "edgar", "age": 30},',
            '  {"name": "alice", "age": 25}',
            ']',
            '',
            '$ jq -r \'.[].name\' users.json',
            'edgar',
            'alice',
            '',
            '$ jq -r \'.[0].name\' users.json     # 첫 번째만',
            'edgar',
            '',
            '## select — 필터',
            '$ jq \'.[] | select(.age > 28)\' users.json',
            '{"name": "edgar", "age": 30}',
            '',
            '## 변형',
            '$ jq \'.[] | {fullname: .name, year: (2026 - .age)}\' users.json',
            '{"fullname": "edgar", "year": 1996}',
            '',
            '## 실무 — kubectl',
            '$ kubectl get pods -o json | jq -r \'.items[].metadata.name\'',
            'nginx-abc',
            'api-xyz',
            '',
            '$ kubectl get pods -o json | \\',
            '    jq -r \'.items[] | select(.status.phase=="Running") | .metadata.name\'',
            '',
            '## 실무 — docker',
            '$ docker inspect mycontainer | jq \'.[0].NetworkSettings.IPAddress\'',
            '',
            '## 실무 — AWS CLI',
            '$ aws ec2 describe-instances | \\',
            '    jq -r \'.Reservations[].Instances[] | [.InstanceId, .State.Name] | @tsv\'',
            'i-abc  running',
            'i-xyz  stopped',
            '',
            '## 실무 — GitHub API',
            '$ curl -s https://api.github.com/repos/torvalds/linux/issues | \\',
            '    jq -r \'.[] | "\\(.number) \\(.title)"\' | head',
            '',
            '## yq — YAML 의 jq (Kubernetes 설정 다룰 때)',
            '$ yq \'.spec.containers[0].image\' deployment.yaml',
            '',
            '## 한 줄 정리',
            '#   cut/awk  : 표/공백 데이터',
            '#   jq       : JSON',
            '#   yq       : YAML',
            '#   xq       : XML (yq -p xml)',
            '',
            '# 다음 파트(III): 프로세스 — ps / top / htop',
          ],
          highlight: [2, 3, 4, 5, 7, 8, 9, 10, 11, 12, 14, 15, 16, 17, 19, 20, 21, 22, 23, 25, 26, 27, 28, 29, 30, 31, 32, 33, 35, 36, 37, 38, 41, 42, 43, 45, 46, 47, 49, 50, 51, 52, 54, 55, 56, 57],
        },
      },
    ];

    const TONE = {
      good:   { bg: 'bg-amber-50',  border: 'border-amber-400', text: 'text-amber-900', badge: 'bg-amber-200 text-amber-900' },
      warn:   { bg: 'bg-orange-50', border: 'border-orange-400', text: 'text-orange-900', badge: 'bg-orange-200 text-orange-900' },
      info:   { bg: 'bg-yellow-50', border: 'border-yellow-400', text: 'text-yellow-900', badge: 'bg-yellow-200 text-yellow-900' },
    };

    function PipeDemo({ input, cmd, output }) {
      return (
        <div className="rounded-lg bg-gray-900 text-amber-50 p-3 font-mono text-xs">
          <div className="mb-1.5">
            <span className="text-amber-300 text-[10px]">input:</span>
            <div className="text-amber-100 whitespace-pre-wrap break-all">{input}</div>
          </div>
          <div className="my-2 text-amber-400">│  $ {cmd}</div>
          <div>
            <span className="text-amber-300 text-[10px]">output:</span>
            <div className="text-amber-200 whitespace-pre-wrap break-all">{output}</div>
          </div>
        </div>
      );
    }

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-amber-400 bg-white p-3">
          <div className="text-sm font-bold text-amber-900 mb-2">📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-gray-500 border-b border-gray-200">
                <th className="py-1 pr-2">명령</th><th className="py-1 pr-2"></th><th className="py-1 pr-2">역할</th><th className="py-1">관용구</th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-gray-100">
                  <td className="py-1 pr-2 font-mono font-bold text-amber-900">{r.metric}</td>
                  <td className="py-1 pr-2 text-gray-300">→</td>
                  <td className="py-1 pr-2 text-emerald-700">{r.after}</td>
                  <td className="py-1 text-gray-700 font-mono text-[10px]">{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.info;
      return (
        <div className="rounded-xl border border-amber-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-amber-900">✂️ 텍스트 파이프</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          <PipeDemo input={state.input} cmd={state.cmd} output={state.output} />

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs text-amber-900 bg-amber-100 border border-amber-300 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-gray-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-gray-800 border-b border-gray-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-gray-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-gray-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-gray-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-amber-500/25 border-l-2 border-amber-400 -ml-3 pl-2' : ''}`}>
                    <span className="text-gray-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-gray-800 border-t border-gray-700 flex items-center justify-between text-[10px] text-gray-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-amber-50 to-yellow-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap rounded-xl px-4 py-3" style={{backgroundColor:'#fcc624', color:'#1f2937'}}>
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-gray-900 text-amber-300 font-bold">✂️</span>
              <div>
                <h1 className="text-2xl font-bold">Chapter II-2-2. 텍스트 처리 — sed / awk / cut</h1>
                <p className="text-sm opacity-80">cut · sed · awk · sort · uniq · jq — 텍스트 파이프라인 6대 도구</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-amber-500' : 'bg-amber-100'}`} />
              ))}
            </div>

            <div className="mb-4 rounded-xl bg-gray-900 text-amber-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-amber-100/90 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} aria-label="처음으로" className="px-3 py-1.5 text-xs rounded border border-amber-300 bg-white text-amber-900 hover:bg-amber-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 text-xs rounded border border-amber-300 bg-white text-amber-900 hover:bg-amber-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'} className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-gray-900 text-amber-300' : 'bg-amber-500 text-gray-900 hover:bg-amber-600'}`}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} aria-label="다음 단계" className="px-3 py-1.5 text-xs rounded border border-amber-300 bg-white text-amber-900 hover:bg-amber-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-amber-800 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-amber-400 bg-white px-4 py-3 text-sm text-gray-900">
                <div className="font-bold mb-1 text-amber-900">✅ 핵심 정리</div>
                cut (컬럼) · sed (치환) · awk (조건+합산) · sort+uniq (집계) · jq (JSON). 파이프로 엮으면 어떤 텍스트 데이터도 한 줄에 처리.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['cut', 'sed', 'awk', 'sort', 'uniq', 'jq'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-amber-100 text-amber-900 border border-amber-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-amber-900">
              <a href="./II-2-1.html" className="underline hover:no-underline">← II-2-1 링크</a>
              <a href="../part3/III-1-1.html" className="underline hover:no-underline">다음: III-1-1 ps/top/htop →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
