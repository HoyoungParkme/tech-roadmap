          lang: 'bash',

            '# C 코드',
            '#   printf("hi\\n");',
            '# → libc 의 printf',
            '# → libc 의 write(stdout, "hi\\n", 3)',
            '# → write syscall (시스템 콜 번호 1)',

            '#   - getdents: 디렉토리 항목 읽기',

    const TONE = {
      good:   { bg: 'bg-amber-50',  border: 'border-amber-400', text: 'text-amber-900', badge: 'bg-amber-200 text-amber-900' },
      warn:   { bg: 'bg-orange-50', border: 'border-orange-400', text: 'text-orange-900', badge: 'bg-orange-200 text-orange-900' },
      info:   { bg: 'bg-yellow-50', border: 'border-yellow-400', text: 'text-yellow-900', badge: 'bg-yellow-200 text-yellow-900' },
      danger: { bg: 'bg-rose-50',   border: 'border-rose-400',  text: 'text-rose-800',  badge: 'bg-rose-200 text-rose-800' },
    };

    function LayerDiagram({ active }) {
      const layer = (id, label, sub, tone) => {
        const isOn = active === id || (active === 'overview' && id === 'kernel');
        const t = TONE[tone] || TONE.info;
        return (
          <div className={`rounded-lg border-2 px-3 py-2 transition ${isOn ? `${t.bg} ${t.border} shadow` : 'bg-white border-gray-200 opacity-80'}`}>
            <div className={`text-xs font-bold ${isOn ? t.text : 'text-gray-500'}`}>{label}</div>
            <div className={`text-[10px] mt-0.5 ${isOn ? t.text : 'text-gray-400'}`}>{sub}</div>
          </div>
        );
      };
      return (
        <div className="space-y-1.5">
          {layer('shell',  '👤 User / Shell',     'bash, zsh — 명령 입력',                  'good')}
          <div className="text-center text-[10px] text-gray-500">↕ syscall</div>
          {layer('syscall','🔗 System Call API',  'open, read, write, fork, execve …',     'info')}
          <div className="text-center text-[10px] text-gray-500">↕ mode switch</div>
          {layer('kernel', '⚙️ Kernel space',     '프로세스 · 메모리 · I/O · FS',            'warn')}
          <div className="text-center text-[10px] text-gray-500">↕ driver</div>
          {layer('spaces', '🔌 Hardware',         'CPU · RAM · Disk · NIC',                'danger')}
        </div>
      );
    }

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-amber-400 bg-white p-3">
          <div className="text-sm font-bold text-amber-900 mb-2">📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-gray-500 border-b border-gray-200">
                <th className="py-1 pr-2">지표</th><th className="py-1 pr-2">Before</th><th className="py-1 pr-2">After</th><th className="py-1">변화</th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-gray-100">
                  <td className="py-1 pr-2 font-medium text-gray-700">{r.metric}</td>
                  <td className="py-1 pr-2 text-rose-700 font-mono">{r.before}</td>
                  <td className="py-1 pr-2 text-emerald-700 font-mono">{r.after}</td>
                  <td className="py-1 text-amber-900 font-bold">{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.info;
      return (
        <div className="rounded-xl border border-amber-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-amber-900">🐧 Linux 구조 다이어그램</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          <LayerDiagram active={state.layer} />

          <div className="mt-3 rounded-lg bg-amber-500/25 border border-amber-400 p-3">
            <div className="text-[10px] text-amber-900 mb-1 font-bold">현재 흐름</div>
            <div className="flex items-center gap-2 text-xs font-mono flex-wrap">
              <span className="px-2 py-1 rounded bg-white border border-amber-300">⌨️ {state.userInput}</span>
              <span className="text-amber-700">→</span>
              <span className="px-2 py-1 rounded bg-amber-600 text-white">{state.kernelOut}</span>
            </div>
          </div>

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs text-amber-900 bg-amber-100 border border-amber-300 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-gray-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-gray-800 border-b border-gray-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-gray-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-gray-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-gray-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-amber-500/25 border-l-2 border-amber-400 -ml-3 pl-2' : ''}`}>
                    <span className="text-gray-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-gray-800 border-t border-gray-700 flex items-center justify-between text-[10px] text-gray-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-amber-50 to-yellow-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap rounded-xl px-4 py-3" style={{backgroundColor:'#fcc624', color:'#1f2937'}}>
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-gray-900 text-amber-300 font-bold">🐧</span>
              <div>
                <h1 className="text-2xl font-bold">Chapter I-1-1. Linux란 / kernel vs shell</h1>
                <p className="text-sm opacity-80">커널, 셸, user/kernel space, syscall — Linux 큰 그림 한 번에</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-amber-500' : 'bg-amber-100'}`} />
              ))}
            </div>

            <div className="mb-4 rounded-xl bg-gray-900 text-amber-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-amber-100/90 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} className="px-3 py-1.5 text-xs rounded border border-amber-300 bg-white text-amber-900 hover:bg-amber-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} className="px-3 py-1.5 text-xs rounded border border-amber-300 bg-white text-amber-900 hover:bg-amber-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-gray-900 text-amber-300' : 'bg-amber-500 text-gray-900 hover:bg-amber-600'}`}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} className="px-3 py-1.5 text-xs rounded border border-amber-300 bg-white text-amber-900 hover:bg-amber-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-amber-800 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-amber-400 bg-white px-4 py-3 text-sm text-gray-900">
                <div className="font-bold mb-1 text-amber-900">✅ 핵심 정리</div>
                Linux 는 OS 가 아니라 OS "커널"이다. 사용자는 셸로 명령을 입력하고, 셸은 그것을 syscall 로 변환해 커널에 전달한다. user space 와 kernel space 는 격리되어 있고, 약 380개의 syscall 이 유일한 다리다.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Linux', 'Kernel', 'Shell', 'User space', 'Kernel space', 'Syscall'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-amber-100 text-amber-900 border border-amber-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-amber-900">
              <a href="../index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./I-1-2.html" className="underline hover:no-underline">다음: I-1-2 파일 시스템 계층 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
