            'ls -la /opt/myapp-current && echo "심볼릭 링크 OK"',
            '',
            '# ─── 축 2. 프로세스 ───',
            'echo "[2/4] 프로세스"',
            'ps -ef | grep -v grep | grep myapp && echo "이미 도는 중"',
            'systemctl is-active myapp || true',
            'crontab -l | grep myapp || echo "cron 등록 없음"',
            'systemctl list-timers | grep myapp || true',
            '',
            '# ─── 축 3. 네트워크 + I/O ───',
            'echo "[3/4] 네트워크/I/O"',
            'ip addr show eth0 | grep inet',
            'ss -tunlp | grep :8000 && echo "8000 점유! lsof 로 확인"',
            'nc -zv db.internal 5432',
            'nc -zv redis.internal 6379',
            'curl -sf https://api.example.com/health > /dev/null && echo "외부 API OK"',
            'tar -czvf /tmp/myapp-pre-deploy.tar.gz /opt/myapp-current/ 2>/dev/null',
            'df -h /var/log /opt | tail -2  # 디스크 여유',
            '',
            '# ─── 축 4. 자동화 ───',
            'echo "[4/4] 자동화"',
            'systemd-analyze verify /etc/systemd/system/myapp.service',
            '[[ -f /etc/logrotate.d/myapp ]] || echo "⚠ logrotate 설정 누락"',
            'shellcheck /opt/myapp/scripts/*.sh',
            'sudo systemctl daemon-reload',
            'sudo systemctl enable --now myapp',
            'sleep 3',
            'systemctl status myapp --no-pager',
            'journalctl -u myapp -n 30 --no-pager',
            '',
            '# ─── 사후 검증 ───',
            'curl -sf http://localhost:8000/health || { echo "헬스체크 실패!"; exit 1; }',
            'echo "════════════════════════════"',
            'echo "✅ 출항 OK — 정상 배포 완료"',
            'echo "════════════════════════════"',
            '',
            '# ─── 마지막 ─',
            '# 사고가 나면 무엇을 봐야 하나?',
            '#  1. journalctl -u myapp -fn 200',
            '#  2. ss -tunlp | grep :8000',
            '#  3. ps aux --sort=-%mem | head',
            '#  4. df -h && du -sh /var/log/* | sort -rh',
            '#  5. dmesg -T | tail -50  (OOM/디스크/네트워크)',
          ],
          highlight: [1, 2, 4, 5, 8, 9, 10, 11, 12, 13, 14, 15, 17, 18, 19, 20, 21, 22, 24, 25, 26, 27, 28, 29, 30, 31, 32, 34, 35, 36, 37, 38, 39, 40, 41, 42, 44, 45, 46, 47, 48],
        },
      },
    ];

    function ChecklistGrid({ items }) {
      return (
        <div className="grid grid-cols-2 gap-1">
          {items.map((it, i) => (
            <div key={i} className="flex items-center gap-1.5 px-1.5 py-1 rounded bg-amber-50 border border-amber-200 text-[10px]">
              <span className={`w-3 h-3 rounded flex items-center justify-center ${it.ok ? 'bg-emerald-500 text-white' : 'bg-zinc-300'}`}>
                {it.ok ? '✓' : ''}
              </span>
              <code className="font-mono font-bold text-amber-900 whitespace-nowrap">{it.name}</code>
              <span className="text-zinc-600 truncate">{it.sample}</span>
            </div>
          ))}
        </div>
      );
    }

    function ProgressBar({ progress }) {
      const pct = Math.round(progress * 100);
      return (
        <div className="rounded-lg border border-amber-400 bg-gradient-to-br from-amber-50 to-yellow-50 p-3">
          <div className="flex items-center justify-between text-[11px] mb-1">
            <span className="font-bold text-amber-900">48개 체크리스트 진행</span>
            <span className="font-mono font-bold text-amber-900">{Math.round(48 * progress)} / 48</span>
          </div>
          <div className="h-3 bg-white rounded overflow-hidden border border-amber-200">
            <div className="h-full bg-gradient-to-r from-amber-400 to-yellow-400 transition-all" style={{ width: `${pct}%` }} />
          </div>
          <div className="text-[10px] text-amber-700 mt-1 text-right">{pct}%</div>
        </div>
      );
    }

    function CapstoneTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-amber-500 bg-gradient-to-br from-amber-50 to-yellow-50 p-3">
          <div className="text-sm font-bold text-amber-900 mb-2">{summary.title}</div>
          <table className="w-full text-xs">
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-amber-200">
                  <td className="py-1 pr-2 font-bold text-amber-900 whitespace-nowrap align-top">{r.metric}</td>
                  <td className="py-1 font-mono text-[10px] text-zinc-700">{r.cmd}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-amber-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-amber-900">운영 체크리스트</h3>
            <span className="text-[10px] px-2 py-0.5 rounded bg-amber-200 text-amber-900 font-bold">{state.category}</span>
          </div>

          <ProgressBar progress={state.progress} />

          <div className="mt-3">
            <div className="text-[11px] font-bold text-amber-900 mb-2">이 축의 12개 항목</div>
            <ChecklistGrid items={state.items} />
          </div>

          <CapstoneTable summary={state.summary} />

          <div className="mt-3 text-xs text-amber-900 bg-amber-100 border border-amber-300 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-zinc-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-zinc-800 border-b border-zinc-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-zinc-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-zinc-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-zinc-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-amber-500/25 border-l-2 border-amber-400 -ml-3 pl-2' : ''}`}>
                    <span className="text-zinc-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-zinc-800 border-t border-zinc-700 flex items-center justify-between text-[10px] text-zinc-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-amber-50 to-yellow-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap rounded-xl px-4 py-3" style={{ backgroundColor: '#fcc624', color: '#1f2937' }}>
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-zinc-900 text-amber-400 font-bold">✅</span>
              <div>
                <h1 className="text-2xl font-bold">Chapter V-2-2. 운영 체크리스트 48 (Capstone)</h1>
                <p className="text-sm opacity-90">4축 × 12 = 48 항목 — 신규 서비스 배포 출항 점검표</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-amber-500' : 'bg-amber-100'}`} />
              ))}
            </div>

            <div className="mb-4 rounded-xl bg-zinc-800 text-amber-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-amber-100/90 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} className="px-3 py-1.5 text-xs rounded border border-amber-300 bg-white text-amber-800 hover:bg-amber-50" aria-label="처음으로">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} className="px-3 py-1.5 text-xs rounded border border-amber-300 bg-white text-amber-800 hover:bg-amber-50 disabled:opacity-40" aria-label="이전 단계">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-amber-700 text-white' : 'bg-amber-600 text-white hover:bg-amber-700'}`} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} className="px-3 py-1.5 text-xs rounded border border-amber-300 bg-white text-amber-800 hover:bg-amber-50 disabled:opacity-40" aria-label="다음 단계">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-amber-700 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-amber-500 bg-gradient-to-br from-amber-50 to-yellow-50 px-4 py-4 text-sm text-zinc-900">
                <div className="font-bold text-base mb-2 text-amber-900">🎉 Linux 학습 완주!</div>
                Part I (기초) → Part II (파일/권한) → Part III (프로세스) → Part IV (네트워크/IO) → Part V (자동화). 48개 항목으로 신규 서비스 배포 전 점검까지 끝. 이제 새 서버를 받았을 때 1시간 안에 안정적인 서비스 운영 환경을 구축할 수 있다.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Capstone', '48 items', '4 축', 'Production', 'Checklist'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-amber-100 text-amber-900 border border-amber-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-amber-800">
              <a href="./V-2-1.html" className="underline hover:no-underline">← 이전: V-2-1 bash 스크립트</a>
              <a href="../index.html" className="underline hover:no-underline">챕터 목록 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
