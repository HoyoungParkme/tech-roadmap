  <!-- MongoDB Chapter I-2-2 — 설치 + mongosh 첫 명령 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [

        status: 'started',
        port: 27017,
        verdict: 'OK',
        verdictTone: 'good',
        keyPoint: 'Docker 한 줄이면 30초 안에 MongoDB 가 뜬다. 운영은 Atlas 또는 별도 설정.',
        code: {

            '# 인증 + 데이터 영속화',
            'docker run -d \\',
            '  --name mongo \\',
            '  -p 27017:27017 \\',
            '  -e MONGO_INITDB_ROOT_USERNAME=root \\',

            '  -v mongo-data:/data/db \\',

            '',
            '# 확인',
            'docker ps',
            '# CONTAINER ID   IMAGE     STATUS         PORTS',
            '# abc123def...   mongo:7   Up 5 seconds   0.0.0.0:27017->27017/tcp',
            '',
            '# 로그',
            'docker logs -f mongo',
            '# {"t":...,"msg":"Waiting for connections","attr":{"port":27017}}',

          ],

      },
      {

        desc: 'mongosh 는 차세대 MongoDB Shell. JavaScript 런타임이라 변수/함수/await 다 된다. 옛 mongo shell 대체. brew/apt/npm 어디서든 설치 가능.',
        status: 'connected',
        port: 27017,
        verdict: '연결',
        verdictTone: 'good',
        keyPoint: 'mongosh = MongoDB 의 psql. JavaScript 런타임이 들어있어 스크립트로도 쓸 수 있다.',
        code: {

          filename: '02-mongosh-connect.sh',
          lines: [
            '# Step 2. mongosh 설치 + 접속',

            'npm install -g mongosh',
            '',
            '# 접속 — 로컬',
            'mongosh',
            '# Current Mongosh Log ID: ...',
            '# Connecting to:          mongodb://127.0.0.1:27017/',
            '# Using MongoDB:          7.0.5',
            '# Using Mongosh:          2.1.0',
            '# test>',
            '',
            '# 접속 — 인증 + 원격',
            'mongosh "mongodb://root:secret@127.0.0.1:27017/?authSource=admin"',
            '',
            '# 접속 — Atlas SRV',
            'mongosh "mongodb+srv://user:pass@cluster.xxxxx.mongodb.net/"',
            '',
            '# 첫 명령',
            '# > show dbs',
            '# admin   40 KiB',
            '# config  12 KiB',
            '# local   72 KiB',
            '',
            '# > help',
            '# 각종 명령 안내',
            '',
            '# mongosh = JavaScript 런타임',
            '# > [1,2,3].map(x => x*2)',
            '# [ 2, 4, 6 ]',
          ],
          highlight: [4, 7, 13, 16, 17, 18, 19, 20, 24, 27, 30, 31, 32, 33],
        },
      },
      {
        title: 'Step 3. use mydb — 데이터베이스 전환',
        desc: 'use 명령으로 작업할 DB 를 지정한다. MongoDB 는 DB 가 존재하지 않아도 use 가 통과 — 첫 insert 시 자동 생성. 가볍게 시작할 수 있는 설계.',
        status: 'use mydb',
        port: 27017,
        verdict: 'DB 선택',
        verdictTone: 'good',
        keyPoint: 'use X 는 lazy 하다. 실제 DB/collection 은 첫 insert 때 생성된다.',
        code: {
          lang: 'javascript',
          filename: '03-use-db.js',
          lines: [
            '// Step 3. DB 전환 — use',
            '',
            '// 현재 DB',
            'db.getName();   // "test"',
            '',
            '// DB 전환',
            'use mydb',
            '// 출력: switched to db mydb',
            '',
            '// 아직 mydb 는 실제로 없다 (lazy)',
            'show dbs        // mydb 는 안 보임',
            '',
            '// 첫 insert 가 일어나면 DB + collection 모두 자동 생성',
            'db.users.insertOne({ name: "Alice" });',
            '',
            'show dbs',
            '// admin   ...',
            '// config  ...',
            '// local   ...',
            '// mydb    40 KiB    ← 생성됨',
            '',
            'show collections',
            '// users',
            '',
            '// DB 객체 직접',
            'const otherDb = db.getSiblingDB("anotherdb");',
            'otherDb.products.insertOne({ name: "Pen" });',
            '',
            '// 자주 쓰는 헬퍼',
            'db                       // 현재 DB 객체',
            'db.users                 // collection 객체',
            'db.users.stats()         // 통계',
            'db.users.drop()          // 삭제',
            'db.dropDatabase()        // 현재 DB 통째 삭제',
            '',
            '// DB 명명 규칙',
            '//  - 길이 1-64 byte',
            '//  - 영문/숫자/_/- 만',
            '//  - 공백/특수문자 X',
            '//  - admin/local/config 는 시스템 예약',
          ],
          highlight: [4, 7, 8, 11, 14, 16, 17, 18, 19, 20, 22, 23, 30, 31, 32, 33, 34],
        },
      },
      {
        title: 'Step 4. insertOne / insertMany — 첫 쓰기',
        desc: 'insertOne 으로 문서 하나, insertMany 로 여러 개. _id 자동 부여. 결과 객체에 acknowledged + insertedId(s) 가 돌아온다.',
        status: 'inserted',
        port: 27017,
        verdict: '쓰기',
        verdictTone: 'good',
        keyPoint: '문서를 그냥 JS 객체로 넘기면 끝. _id 는 자동.',
        code: {
          lang: 'javascript',
          filename: '04-insert.js',
          lines: [
            '// Step 4. 첫 쓰기',
            '',
            '// 한 건',
            'db.users.insertOne({',
            '  name: "Alice",',
            '  age: 30,',
            '  email: "alice@example.com",',
            '  tags: ["admin", "vip"]',
            '});',
            '',
            '// 결과',
            '// {',
            '//   acknowledged: true,',
            '//   insertedId: ObjectId("664a8e2a...")',
            '// }',
            '',
            '// 여러 건',
            'db.users.insertMany([',
            '  { name: "Bob",   age: 25 },',
            '  { name: "Carol", age: 28 },',
            '  { name: "Dave",  age: 41 }',
            ']);',
            '',
            '// 결과',
            '// {',
            '//   acknowledged: true,',
            '//   insertedIds: { "0": ObjectId(...), "1": ObjectId(...), ... }',
            '// }',
            '',
            '// _id 직접 지정',
            'db.users.insertOne({',
            '  _id: "u-001",',
            '  name: "Eve"',
            '});',
            '// _id 중복 시 → DuplicateKey 에러',
            '',
            '// 옵션',
            'db.users.insertMany(',
            '  [/*...*/],',
            '  { ordered: false }   // 한 건 실패해도 나머지 진행',
            ');',
            '',
            '// writeConcern 지정',
            'db.users.insertOne(',
            '  { name: "Frank" },',
            '  { writeConcern: { w: "majority" } }',
            ');',
          ],
          highlight: [4, 5, 6, 7, 8, 9, 11, 12, 13, 14, 17, 18, 19, 20, 21, 22, 30, 31, 32, 33],
        },
      },
      {
        title: 'Step 5. find — 첫 조회',
        desc: 'find() 로 모든 문서, find({...}) 로 조건. mongosh 는 cursor 를 자동 iterate. 처음에는 단순 매칭만 — 다음 챕터에서 풍부한 연산자.',
        status: 'queried',
        port: 27017,
        verdict: '조회',
        verdictTone: 'good',
        summary: {
          title: '5단계 setup-to-query 흐름',
          rows: [
            { metric: 'Step 1', before: 'docker run', after: '27017 노출', delta: '✓' },
            { metric: 'Step 2', before: 'mongosh', after: '접속', delta: '✓' },
            { metric: 'Step 3', before: 'use mydb', after: 'DB 선택', delta: '✓' },
            { metric: 'Step 4', before: 'insertOne', after: '문서 저장', delta: '✓' },
            { metric: 'Step 5', before: 'find', after: '조회', delta: '✓' },
          ],
        },
        keyPoint: '컨테이너 → mongosh → use → insert → find. 5단계로 첫 사이클 완성.',
        code: {
          lang: 'javascript',
          filename: '05-find.js',
          lines: [
            '// Step 5. 첫 조회',
            '',
            '// 전체',
            'db.users.find();',
            '// [',
            '//   { _id: ObjectId(...), name: "Alice", age: 30, ... },',
            '//   { _id: ObjectId(...), name: "Bob",   age: 25 },',
            '//   ...',
            '// ]',
            '',
            '// 보기 좋게',
            'db.users.find().pretty();',
            '',
            '// 조건 — equality',
            'db.users.find({ name: "Alice" });',
            '',
            '// 한 건만',
            'db.users.findOne({ name: "Alice" });',
            '',
            '// 카운트',
            'db.users.countDocuments({ age: { $gte: 30 } });',
            '',
            '// projection — 일부 필드만',
            'db.users.find(',
            '  { age: { $gte: 28 } },',
            '  { name: 1, age: 1, _id: 0 }    // name, age 만, _id 숨김',
            ');',
            '',
            '// 정렬 + 제한',
            'db.users.find()',
            '  .sort({ age: -1 })   // 나이 내림차순',
            '  .limit(2);           // 상위 2명',
            '',
            '// 다음',
            '//   II-1-1 Collection/Document/_id 깊이',
            '//   III-1-2 find 의 풍부한 연산자 ($gt/$in/$regex/$or)',
            '',
            '// 정리',
            '//   docker → mongosh → use → insert → find',
            '//   5단계로 MongoDB 첫 사이클 완성',
          ],
          highlight: [4, 12, 15, 18, 21, 24, 25, 26, 30, 31, 32],
        },
      },
    ];

    const TONE = {
      good:   { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-800', badge: 'bg-emerald-200 text-emerald-800' },
      warn:   { bg: 'bg-amber-50',    border: 'border-amber-400',   text: 'text-amber-800',   badge: 'bg-amber-200 text-amber-800' },
      danger: { bg: 'bg-rose-50',     border: 'border-rose-400',    text: 'text-rose-800',    badge: 'bg-rose-200 text-rose-800' },
    };

    function StatusCard({ status, port }) {
      return (
        <div className="rounded-lg border p-3 bg-zinc-900 text-emerald-300 font-mono text-xs">
          <div className="flex items-center gap-2 mb-2">
            <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
            <span className="text-zinc-300">mongo container</span>
          </div>
          <div>$ docker ps</div>
          <div className="text-zinc-400">mongo:7 — {status} :{port}</div>
        </div>
      );
    }

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 p-3 bg-white" style={{ borderColor: '#13aa52' }}>
          <div className="text-sm font-bold mb-2" style={{ color: '#13aa52' }}>📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-zinc-500 border-b border-zinc-200">
                <th className="py-1 pr-2">단계</th><th className="py-1 pr-2">명령</th><th className="py-1 pr-2">결과</th><th className="py-1">OK</th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-zinc-100">
                  <td className="py-1 pr-2 font-medium text-zinc-700">{r.metric}</td>
                  <td className="py-1 pr-2 text-emerald-700 font-mono">{r.before}</td>
                  <td className="py-1 pr-2 text-zinc-700">{r.after}</td>
                  <td className="py-1 font-bold" style={{ color: '#13aa52' }}>{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.warn;
      return (
        <div className="rounded-xl border bg-white p-4 h-full flex flex-col" style={{ borderColor: '#13aa5240' }}>
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold" style={{ color: '#13aa52' }}>설치/접속 데모</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          <StatusCard status={state.status} port={state.port} />

          <div className="mt-3 rounded-lg border p-3 bg-emerald-50 border-emerald-200 text-xs">
            <div className="font-bold mb-1" style={{ color: '#13aa52' }}>현재 단계</div>
            <div className="text-zinc-700">상태: <b>{state.status}</b></div>
            <div className="text-zinc-700">포트: <b>{state.port}</b></div>
          </div>

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs rounded p-2 border bg-emerald-50 border-emerald-200" style={{ color: '#0f7a3a' }}>
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-zinc-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-zinc-800 border-b border-zinc-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-zinc-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-zinc-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-zinc-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-emerald-500/25 border-l-2 border-emerald-300 -ml-3 pl-2' : ''}`}>
                    <span className="text-zinc-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-zinc-800 border-t border-zinc-700 flex items-center justify-between text-[10px] text-zinc-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen px-4 py-6 bg-gradient-to-br from-emerald-50 to-green-50">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap p-4 rounded-xl text-white shadow" style={{ backgroundColor: '#13aa52' }}>
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-white font-bold" style={{ color: '#13aa52' }}>🍃</span>
              <div>
                <h1 className="text-2xl font-bold">Chapter I-2-2. 설치 + mongosh 첫 명령</h1>
                <p className="text-sm text-emerald-50">docker run → mongosh → use → insert → find</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-white underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? '' : 'bg-emerald-100'}`} style={i <= stepIdx ? { backgroundColor: '#13aa52' } : {}} />
              ))}
            </div>

            <div className="mb-4 rounded-xl bg-emerald-800 text-white px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-emerald-50 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} className="px-3 py-1.5 text-xs rounded border border-emerald-300 bg-white text-emerald-700 hover:bg-emerald-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} className="px-3 py-1.5 text-xs rounded border border-emerald-300 bg-white text-emerald-700 hover:bg-emerald-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} className="px-4 py-1.5 text-xs rounded font-bold text-white" style={{ backgroundColor: playing ? '#0f7a3a' : '#13aa52' }}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} className="px-3 py-1.5 text-xs rounded border border-emerald-300 bg-white text-emerald-700 hover:bg-emerald-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-emerald-700 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 px-4 py-3 text-sm bg-white" style={{ borderColor: '#13aa52', color: '#0f7a3a' }}>
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                docker run mongo → mongosh → use mydb → insertOne → find. 5단계면 첫 사이클 완성. 본격적인 모델링은 Part II 부터.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Docker', 'mongosh', 'use db', 'insertOne', 'find', 'Setup'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full border bg-emerald-50 border-emerald-300" style={{ color: '#13aa52' }}>#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs" style={{ color: '#13aa52' }}>
              <a href="./I-2-1.html" className="underline hover:no-underline">← 이전: I-2-1 NoSQL 비교</a>
              <a href="../part2/II-1-1.html" className="underline hover:no-underline">다음: II-1-1 Collection/Document/_id →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
