<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MongoDB 학습 — III-1-2. find</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🍃</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. equality $eq — 가장 단순',
        desc: '필드: 값 형태는 equality 매칭. 명시적으로는 $eq. find({age: 30}) = find({age: {$eq: 30}}). 가장 흔한 쿼리.',
        op: '$eq',
        matched: 1,
        verdict: '동등',
        verdictTone: 'good',
        keyPoint: 'find({age: 30}) 형태가 가장 자연스러운 쿼리. 내부적으로 $eq 와 동일.',
        code: {
          lang: 'javascript',
          filename: '01-equality.js',
          lines: [
            '// Step 1. equality $eq',
            '',
            '// 데이터',
            '// { _id:1, name:"Alice", age:30, role:"admin" }',
            '// { _id:2, name:"Bob",   age:25, role:"user" }',
            '// { _id:3, name:"Carol", age:30, role:"user" }',
            '',
            '// 단순 equality',
            'db.users.find({ age: 30 });',
            '// → Alice, Carol',
            '',
            '// 명시적 $eq (위와 동일)',
            'db.users.find({ age: { $eq: 30 } });',
            '',
            '// 중첩 필드 — dot notation',
            'db.users.find({ "address.city": "Seoul" });',
            '',
            '// 배열 안 매칭',
            'db.users.find({ tags: "vip" });',
            '// tags 배열에 "vip" 가 있는 문서',
            '',
            '// 배열 정확히 매칭 — 순서까지',
            'db.users.find({ tags: ["vip", "admin"] });',
            '// → 순서까지 정확히 ["vip","admin"]',
            '',
            '// 여러 조건 AND',
            'db.users.find({ age: 30, role: "admin" });',
            '// → Alice 만',
            '',
            '// findOne — 첫 한 건',
            'db.users.findOne({ age: 30 });',
            '',
            '// countDocuments',
            'db.users.countDocuments({ role: "admin" });',
            '',
            '// distinct — 고유 값',
            'db.users.distinct("role");',
            '// → ["admin", "user"]',
            '',
            '// 인덱스',
            '//  - { age: 1 } 단일 필드 인덱스로 가속',
            '//  - { age: 1, role: 1 } compound 로 두 조건 같이',
          ],
          highlight: [10, 11, 14, 17, 20, 21, 24, 25, 28, 29, 32, 35, 38, 39, 42, 43],
        },
      },
      {
        title: 'Step 2. 비교 — $gt $lt $gte $lte $ne',
        desc: '범위 조건. 숫자/날짜/문자열 모두 사용. 인덱스가 있으면 range scan 으로 매우 빠름. 페이지네이션 기본.',
        op: '$gt/$lt',
        matched: 2,
        verdict: '범위',
        verdictTone: 'good',
        keyPoint: '$gt/$lt 는 인덱스에서 range scan. 시간/가격/연령 같은 비교 핵심.',
        code: {
          lang: 'javascript',
          filename: '02-comparison.js',
          lines: [
            '// Step 2. 비교 연산자',
            '',
            '// 30세 이상',
            'db.users.find({ age: { $gte: 30 } });',
            '',
            '// 25 < age < 35',
            'db.users.find({ age: { $gt: 25, $lt: 35 } });',
            '',
            '// 28세 아닌 사람',
            'db.users.find({ age: { $ne: 28 } });',
            '',
            '// 날짜',
            'db.orders.find({',
            '  createdAt: { $gte: ISODate("2026-01-01") }',
            '});',
            '',
            '// 가격대 검색',
            'db.products.find({',
            '  price: { $gte: 10000, $lte: 50000 }',
            '});',
            '',
            '// 문자열 lexicographic 비교',
            'db.users.find({ name: { $gte: "A", $lt: "C" } });',
            '// A 로 시작 ~ B 로 시작',
            '',
            '// 인덱스 활용',
            'db.products.createIndex({ price: 1 });',
            '// 위 가격대 검색이 IXSCAN range 로 빠름',
            '',
            '// 페이지네이션 (cursor pagination)',
            '// 최근 만들어진 게시글 페이지',
            'const lastId = ObjectId("664a..."); // 직전 페이지 마지막',
            'db.posts.find({ _id: { $lt: lastId } })',
            '  .sort({ _id: -1 })',
            '  .limit(20);',
            '',
            '// skip 보다 cursor pagination 권장',
            '//  - skip 은 깊을수록 느려짐',
            '//  - cursor 는 일정한 비용',
            '',
            '// 비교 가능 타입',
            '//  - Int / Long / Double / Decimal128',
            '//  - Date',
            '//  - String',
            '//  - ObjectId',
            '//  - Array (사전순)',
          ],
          highlight: [4, 7, 10, 13, 14, 18, 19, 23, 27, 28, 31, 32, 33, 34, 35],
        },
      },
      {
        title: 'Step 3. $in / $nin — 다중 매칭',
        desc: '여러 값 중 하나라도 매칭이면 $in. 어디에도 없으면 $nin. SQL 의 IN 과 동일. OR 의 가장 효율적 형태.',
        op: '$in',
        matched: 3,
        verdict: '다중',
        verdictTone: 'good',
        keyPoint: '$in 은 OR 의 빠른 형태. 인덱스 활용 좋음. SQL IN 과 동등.',
        code: {
          lang: 'javascript',
          filename: '03-in.js',
          lines: [
            '// Step 3. $in / $nin',
            '',
            '// 데이터',
            '// { _id:1, name:"Alice", role:"admin" }',
            '// { _id:2, name:"Bob",   role:"user" }',
            '// { _id:3, name:"Carol", role:"guest" }',
            '',
            '// admin 또는 guest',
            'db.users.find({ role: { $in: ["admin", "guest"] } });',
            '// → Alice, Carol',
            '',
            '// admin/guest 아님',
            'db.users.find({ role: { $nin: ["admin", "guest"] } });',
            '// → Bob',
            '',
            '// _id 여러 개 조회',
            'db.users.find({ _id: { $in: [1, 2, 3] } });',
            '',
            '// 배열 필드 + $in',
            '// tags 배열에 "vip" 또는 "admin" 중 하나라도',
            'db.users.find({ tags: { $in: ["vip", "admin"] } });',
            '',
            '// $or 와 차이',
            'db.users.find({ $or: [',
            '  { role: "admin" },',
            '  { role: "guest" }',
            ']});',
            '// 위 두 코드는 같은 결과. 단순할 때 $in 이 더 빠름.',
            '',
            '// $or 는 서로 다른 필드 조합에 씀',
            'db.users.find({ $or: [',
            '  { age: { $lt: 18 } },',
            '  { role: "premium" }',
            ']});',
            '// 18세 미만 OR 프리미엄 회원',
            '',
            '// 성능 비교',
            '//  - $in [a,b,c]  → 1 IXSCAN 가능',
            '//  - $or [{f:a},{f:b}] → 인덱스 별로 따로 스캔',
            '//  - 같은 필드의 OR 는 $in 이 정답',
            '',
            '// 큰 $in 리스트 주의',
            '//  - 수천 개 ID → 한 번에 보내면 메시지 16MB 한계',
            '//  - 청크로 나누거나 다른 전략 필요',
          ],
          highlight: [9, 10, 13, 14, 17, 20, 21, 24, 25, 26, 27, 28, 31, 32, 33, 34, 35, 38, 39, 40],
        },
      },
      {
        title: 'Step 4. $regex — 부분 문자열/패턴',
        desc: '문자열 패턴 매칭. /^abc/ 같은 prefix 는 인덱스 잘 씀. 양쪽 와일드카드 /xxx/ 는 풀스캔. 가벼운 검색용 — 본격 검색은 Atlas Search.',
        op: '$regex',
        matched: 2,
        verdict: 'Pattern',
        verdictTone: 'warn',
        keyPoint: '$regex 는 가벼운 패턴 매칭. prefix 정규식만 인덱스 활용. 본격 검색은 text/Atlas Search.',
        code: {
          lang: 'javascript',
          filename: '04-regex.js',
          lines: [
            '// Step 4. $regex',
            '',
            '// 이름에 "li" 들어가는 사용자',
            'db.users.find({ name: { $regex: "li" } });',
            '// → Alice 등',
            '',
            '// 또는 정규식 리터럴',
            'db.users.find({ name: /li/ });',
            '',
            '// 대소문자 무시',
            'db.users.find({ name: { $regex: "alice", $options: "i" } });',
            '// 또는 /alice/i',
            '',
            '// prefix (인덱스 잘 씀)',
            'db.users.find({ name: /^A/ });',
            '// A 로 시작 — IXSCAN',
            '',
            '// 양쪽 와일드카드 (인덱스 못 씀)',
            'db.users.find({ name: /li/ });',
            '// → COLLSCAN',
            '',
            '// 이메일 도메인',
            'db.users.find({ email: /@example\\.com$/ });',
            '// suffix 도 인덱스 못 씀',
            '',
            '// 사용 가이드',
            '//  - 자동완성 ("Al" 입력) → /^Al/ + 인덱스 OK',
            '//  - 본문 키워드 검색 → text index 또는 Atlas Search',
            '//  - 정규식이 복잡할수록 느려짐',
            '',
            '// text 인덱스 대안',
            'db.posts.createIndex({ title: "text", body: "text" });',
            'db.posts.find({ $text: { $search: "mongodb" } });',
            '// 형태소 처리 + 점수 — 본격 검색',
            '',
            '// 보안 — RegExp 직접 입력 받지 말기',
            '//  사용자 입력을 그대로 정규식으로 쓰면 ReDoS 위험',
            '//  → escape 또는 검증 후 사용',
            'function escape(s){return s.replace(/[.*+?^${}()|[\\]\\\\]/g,"\\\\$&");}',
            'db.users.find({ name: new RegExp(escape(input), "i") });',
          ],
          highlight: [4, 5, 8, 11, 12, 15, 16, 19, 20, 23, 24, 32, 33, 34, 39, 40],
        },
      },
      {
        title: 'Step 5. projection + sort + limit + skip',
        desc: 'find 의 결과 다듬기. projection 으로 필요한 필드만, sort 로 정렬, limit/skip 으로 페이지. 항상 한 세트로 함께 등장.',
        op: 'projection',
        matched: 2,
        verdict: '결합',
        verdictTone: 'good',
        summary: {
          title: 'find 도구 정리',
          rows: [
            { metric: 'equality', before: '{age:30}', after: '$eq', delta: '단순' },
            { metric: 'comparison', before: '$gt/$lt', after: '범위', delta: 'IXSCAN' },
            { metric: '$in', before: '다중 값', after: 'OR 최적', delta: '인덱스' },
            { metric: '$regex', before: '패턴', after: 'prefix 만 빠름', delta: '주의' },
            { metric: 'projection', before: '필드 선택', after: '+sort+limit', delta: '필수 묶음' },
          ],
        },
        keyPoint: 'find = 매칭 + 결과 다듬기. projection/sort/limit/skip 을 한 묶음으로 사용.',
        code: {
          lang: 'javascript',
          filename: '05-projection-sort.js',
          lines: [
            '// Step 5. projection + sort + limit + skip',
            '',
            '// projection — 일부 필드만',
            'db.users.find(',
            '  { age: { $gte: 25 } },',
            '  { name: 1, age: 1, _id: 0 }   // include name/age, exclude _id',
            ');',
            '// 결과: { name, age } 만 돌아옴 — 네트워크 절약',
            '',
            '// 제외 형태',
            'db.users.find(',
            '  {},',
            '  { password: 0, ssn: 0 }       // 민감 필드 제외',
            ');',
            '',
            '// sort — 정렬',
            'db.users.find().sort({ age: -1 });',
            '// 나이 내림차순. 1 = ASC, -1 = DESC',
            '',
            '// 복합 정렬',
            'db.users.find().sort({ role: 1, age: -1 });',
            '// role 오름차 → 같은 role 내에서 age 내림차',
            '',
            '// limit + skip — 페이지네이션',
            'db.users.find()',
            '  .sort({ _id: 1 })',
            '  .skip(20)',
            '  .limit(10);',
            '// 21번째부터 10건',
            '',
            '// skip 의 함정',
            '//  - skip(10000) 은 10000건 읽고 버림',
            '//  - 깊은 페이지에서 느려짐',
            '//  - 대안: cursor pagination ($gt: lastId)',
            '',
            '// 한 줄 체이닝',
            'db.products.find(',
            '  { category: "book", price: { $lte: 30000 } },',
            '  { title: 1, price: 1 }',
            ').sort({ price: 1 }).limit(20);',
            '',
            '// explain — 어떻게 실행되는지',
            'db.products.find({ price: { $lte: 30000 } })',
            '  .sort({ price: 1 })',
            '  .explain("executionStats");',
            '// IXSCAN 인지 COLLSCAN 인지 확인',
            '',
            '// Node.js driver — cursor',
            '// const cursor = users.find({...}).sort({...}).limit(10);',
            '// for await (const doc of cursor) { ... }',
          ],
          highlight: [4, 5, 6, 7, 11, 12, 13, 17, 21, 25, 26, 27, 28, 38, 39, 40, 41, 44, 45, 46],
        },
      },
    ];

    const TONE = {
      good:   { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-800', badge: 'bg-emerald-200 text-emerald-800' },
      warn:   { bg: 'bg-amber-50',    border: 'border-amber-400',   text: 'text-amber-800',   badge: 'bg-amber-200 text-amber-800' },
      danger: { bg: 'bg-rose-50',     border: 'border-rose-400',    text: 'text-rose-800',    badge: 'bg-rose-200 text-rose-800' },
    };

    function OpCard({ op, matched }) {
      return (
        <div className="rounded-lg border p-3 bg-emerald-50 border-emerald-200 text-xs">
          <div className="font-bold mb-1" style={{ color: '#13aa52' }}>현재 연산자</div>
          <div className="text-zinc-700">연산: <code className="font-mono bg-white px-1 rounded">{op}</code></div>
          <div className="text-zinc-700">매칭 문서 (예시): <b>{matched}</b></div>
        </div>
      );
    }

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 p-3 bg-white" style={{ borderColor: '#13aa52' }}>
          <div className="text-sm font-bold mb-2" style={{ color: '#13aa52' }}>📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-zinc-500 border-b border-zinc-200">
                <th className="py-1 pr-2">도구</th><th className="py-1 pr-2">형태</th><th className="py-1 pr-2">결과</th><th className="py-1">특징</th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-zinc-100">
                  <td className="py-1 pr-2 font-medium text-zinc-700">{r.metric}</td>
                  <td className="py-1 pr-2 text-emerald-700 font-mono">{r.before}</td>
                  <td className="py-1 pr-2 text-zinc-700">{r.after}</td>
                  <td className="py-1 font-bold" style={{ color: '#13aa52' }}>{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.warn;
      return (
        <div className="rounded-xl border bg-white p-4 h-full flex flex-col" style={{ borderColor: '#13aa5240' }}>
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold" style={{ color: '#13aa52' }}>find 연산자</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          <OpCard op={state.op} matched={state.matched} />

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs rounded p-2 border bg-emerald-50 border-emerald-200" style={{ color: '#0f7a3a' }}>
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-zinc-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-zinc-800 border-b border-zinc-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-zinc-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-zinc-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-zinc-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-emerald-500/25 border-l-2 border-emerald-300 -ml-3 pl-2' : ''}`}>
                    <span className="text-zinc-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-zinc-800 border-t border-zinc-700 flex items-center justify-between text-[10px] text-zinc-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen px-4 py-6 bg-gradient-to-br from-emerald-50 to-green-50">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap p-4 rounded-xl text-white shadow" style={{ backgroundColor: '#13aa52' }}>
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-white font-bold" style={{ color: '#13aa52' }}>🍃</span>
              <div>
                <h1 className="text-2xl font-bold">Chapter III-1-2. find</h1>
                <p className="text-sm text-emerald-50">$eq · $gt/$lt · $in · $regex · projection/sort/limit/skip</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-white underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? '' : 'bg-emerald-100'}`} style={i <= stepIdx ? { backgroundColor: '#13aa52' } : {}} />
              ))}
            </div>

            <div className="mb-4 rounded-xl bg-emerald-800 text-white px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-emerald-50 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} className="px-3 py-1.5 text-xs rounded border border-emerald-300 bg-white text-emerald-700 hover:bg-emerald-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} className="px-3 py-1.5 text-xs rounded border border-emerald-300 bg-white text-emerald-700 hover:bg-emerald-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} className="px-4 py-1.5 text-xs rounded font-bold text-white" style={{ backgroundColor: playing ? '#0f7a3a' : '#13aa52' }}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} className="px-3 py-1.5 text-xs rounded border border-emerald-300 bg-white text-emerald-700 hover:bg-emerald-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-emerald-700 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 px-4 py-3 text-sm bg-white" style={{ borderColor: '#13aa52', color: '#0f7a3a' }}>
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                find = 매칭 + 결과 다듬기. equality/$gt/$in/$regex 으로 조건, projection/sort/limit/skip 으로 결과 정리.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['$eq', '$gt', '$lt', '$in', '$regex', 'projection', 'sort'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full border bg-emerald-50 border-emerald-300" style={{ color: '#13aa52' }}>#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs" style={{ color: '#13aa52' }}>
              <a href="./III-1-1.html" className="underline hover:no-underline">← 이전: III-1-1 insert + Bulk</a>
              <a href="./III-2-1.html" className="underline hover:no-underline">다음: III-2-1 update + upsert →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
