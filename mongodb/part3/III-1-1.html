<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MongoDB 학습 — III-1-1. insert + Bulk</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🍃</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. insertOne — 한 건씩',
        desc: '가장 단순한 쓰기. 한 건만 들어간다. 자동 _id 부여, acknowledged true 반환. 단건 회원가입/주문 같은 케이스에 자연스럽다.',
        op: 'insertOne',
        rows: 1,
        verdict: '단건',
        verdictTone: 'good',
        keyPoint: 'insertOne — 단건. ACK + insertedId 돌아옴. 회원가입처럼 한 행 케이스에 적합.',
        code: {
          lang: 'javascript',
          filename: '01-insert-one.js',
          lines: [
            '// Step 1. insertOne — 단건',
            '',
            'const result = db.users.insertOne({',
            '  name: "Alice",',
            '  email: "alice@example.com",',
            '  age: 30,',
            '  tags: ["vip"]',
            '});',
            '',
            '// 결과',
            '// {',
            '//   acknowledged: true,',
            '//   insertedId: ObjectId("664a8e2a...")',
            '// }',
            '',
            '// _id 직접 지정',
            'db.users.insertOne({ _id: "u-001", name: "Bob" });',
            '',
            '// 중복 시 에러',
            'db.users.insertOne({ _id: "u-001", name: "Carol" });',
            '// → MongoServerError: E11000 duplicate key error',
            '',
            '// 옵션 — writeConcern',
            'db.users.insertOne(',
            '  { name: "Dave" },',
            '  { writeConcern: { w: "majority" } }',
            ');',
            '// w:"majority" → 과반수 secondary 까지 복제 후 ACK',
            '// w:1 → primary 만 (기본, 빠름)',
            '// w:0 → fire-and-forget (위험, 거의 안 씀)',
            '',
            '// Node.js driver',
            '// const r = await users.insertOne({name:"Alice"});',
            '// console.log(r.insertedId);',
            '',
            '// Python pymongo',
            '// r = users.insert_one({"name":"Alice"})',
            '// print(r.inserted_id)',
            '',
            '// 트랜잭션 안에서도 사용 가능 (v4.0+)',
            '//   session.startTransaction()',
            '//   users.insertOne({...}, {session})',
            '//   session.commitTransaction()',
          ],
          highlight: [3, 4, 5, 6, 7, 8, 11, 12, 13, 14, 17, 20, 21, 24, 25, 26, 27],
        },
      },
      {
        title: 'Step 2. insertMany — 여러 건 한 번에',
        desc: '배열을 통째로 넘기면 일괄 삽입. 한 건씩 보낼 때보다 네트워크 round trip 절감. 1000건 묶음이면 10~50배 빠름.',
        op: 'insertMany',
        rows: 1000,
        verdict: '일괄',
        verdictTone: 'good',
        keyPoint: 'insertMany 는 N 건을 한 번에. 단건 insert 반복 대비 10~50배 빠름.',
        code: {
          lang: 'javascript',
          filename: '02-insert-many.js',
          lines: [
            '// Step 2. insertMany — 일괄',
            '',
            'const docs = [',
            '  { name: "Alice", age: 30 },',
            '  { name: "Bob",   age: 25 },',
            '  { name: "Carol", age: 28 },',
            '];',
            '',
            'const result = db.users.insertMany(docs);',
            '',
            '// 결과',
            '// {',
            '//   acknowledged: true,',
            '//   insertedIds: {',
            '//     "0": ObjectId(...),',
            '//     "1": ObjectId(...),',
            '//     "2": ObjectId(...)',
            '//   }',
            '// }',
            '',
            '// 대량 삽입 — 배치 처리',
            'const BATCH = 1000;',
            'for (let i = 0; i < bigArray.length; i += BATCH) {',
            '  await users.insertMany(bigArray.slice(i, i + BATCH));',
            '}',
            '',
            '// 성능 비교 (10000건)',
            '// insertOne × 10000      → 약 60초 (네트워크 RTT 누적)',
            '// insertMany 1000 × 10   → 약 2초',
            '// 30배 차이',
            '',
            '// 메모리 주의',
            '//  - 너무 큰 배치 (10만+) → 메모리 부담',
            '//  - 적당: 1000~5000',
            '',
            '// 옵션',
            'db.users.insertMany(docs, {',
            '  ordered: true,                       // 기본',
            '  writeConcern: { w: "majority" }',
            '});',
            '',
            '// MongoDB 단일 BSON 메시지 제한',
            '//  - 16 MB 문서 한계',
            '//  - 한 insertMany 도 48 MB 정도까지',
            '//  - 그 이상은 알아서 나눠야 함',
          ],
          highlight: [3, 4, 5, 6, 7, 9, 11, 12, 13, 14, 15, 16, 17, 18, 19, 22, 23, 24, 25, 28, 29, 30],
        },
      },
      {
        title: 'Step 3. ordered vs unordered — 실패 시 동작',
        desc: 'ordered: true (기본) — 한 건 실패하면 그 시점에 중단. unordered: false — 한 건 실패해도 나머지 진행. 부분 성공 허용할지 결정.',
        op: 'unordered',
        rows: 5,
        verdict: '부분 성공',
        verdictTone: 'warn',
        keyPoint: 'ordered=true → 실패 시 중단. ordered=false → 나머지 진행. 비즈니스에 따라 선택.',
        code: {
          lang: 'javascript',
          filename: '03-ordered.js',
          lines: [
            '// Step 3. ordered vs unordered',
            '',
            '// 문서 5건 중 3번째가 _id 중복',
            'const docs = [',
            '  { _id: 1, name: "Alice" },',
            '  { _id: 2, name: "Bob" },',
            '  { _id: 1, name: "Carol" },   // ← 중복',
            '  { _id: 3, name: "Dave" },',
            '  { _id: 4, name: "Eve" }',
            '];',
            '',
            '// (1) ordered: true (기본)',
            'db.users.insertMany(docs);',
            '// 결과: 1,2 까지 삽입 → 3에서 에러 → 4,5 진행 안 됨',
            '',
            '// (2) ordered: false',
            'db.users.insertMany(docs, { ordered: false });',
            '// 결과: 1,2,4,5 삽입 → 3은 에러 로그만',
            '// 4건 들어가고 1건 실패',
            '',
            '// 선택 기준',
            '// ordered: true',
            '//  - 순서가 의미 (시계열 로그)',
            '//  - 첫 실패에서 모두 중단 (트랜잭션처럼)',
            '',
            '// ordered: false',
            '//  - 독립 문서 (사용자 일괄 import)',
            '//  - 부분 성공 OK',
            '//  - 빠름 (병렬 처리 가능)',
            '',
            '// 에러 처리',
            'try {',
            '  await users.insertMany(docs, { ordered: false });',
            '} catch (err) {',
            '  // BulkWriteError',
            '  console.log(err.result.insertedCount);   // 성공 건수',
            '  console.log(err.result.writeErrors);     // 실패 정보',
            '}',
            '',
            '// 실무 가이드',
            '//  - 일괄 import (CSV 변환 등) → unordered',
            '//  - 트랜잭션 의도 → 진짜 트랜잭션 사용',
          ],
          highlight: [4, 5, 6, 7, 8, 9, 10, 13, 14, 17, 18, 19, 22, 23, 24, 27, 28, 29, 33, 34, 35, 36, 37, 38],
        },
      },
      {
        title: 'Step 4. bulkWrite — insert/update/delete 섞기',
        desc: 'bulkWrite 는 insertOne/updateOne/deleteOne/replaceOne 을 한 번에 섞어 보낸다. 복잡한 데이터 정리/마이그레이션에서 핵심.',
        op: 'bulkWrite',
        rows: 4,
        verdict: 'Mixed',
        verdictTone: 'good',
        keyPoint: 'bulkWrite = 여러 종류 작업 한 번에. import/마이그레이션/정기 정리에 필수.',
        code: {
          lang: 'javascript',
          filename: '04-bulk-write.js',
          lines: [
            '// Step 4. bulkWrite — 혼합 작업',
            '',
            'const ops = [',
            '  // 신규 사용자',
            '  { insertOne: { document: { name: "Alice", age: 30 } } },',
            '',
            '  // 기존 사용자 갱신',
            '  { updateOne: {',
            '      filter: { _id: 1 },',
            '      update: { $set: { age: 31 } }',
            '  }},',
            '',
            '  // upsert',
            '  { updateOne: {',
            '      filter: { email: "bob@x.com" },',
            '      update: { $setOnInsert: { name: "Bob" }, $set: { active: true } },',
            '      upsert: true',
            '  }},',
            '',
            '  // 삭제',
            '  { deleteOne: { filter: { _id: 99 } } },',
            '',
            '  // 통째 교체',
            '  { replaceOne: {',
            '      filter: { _id: 2 },',
            '      replacement: { _id: 2, name: "Bob", age: 26 }',
            '  }}',
            '];',
            '',
            'const result = db.users.bulkWrite(ops, { ordered: false });',
            '',
            '// 결과',
            '// {',
            '//   acknowledged: true,',
            '//   insertedCount: 1,',
            '//   matchedCount: 2,',
            '//   modifiedCount: 2,',
            '//   deletedCount: 1,',
            '//   upsertedCount: 1,',
            '//   upsertedIds: { ... }',
            '// }',
            '',
            '// 활용 예 — 일괄 동기화',
            'const incoming = [/* CSV 에서 읽어온 사용자 */];',
            'const ops = incoming.map(u => ({',
            '  updateOne: {',
            '    filter: { email: u.email },',
            '    update: { $set: u },',
            '    upsert: true',
            '  }',
            '}));',
            'await users.bulkWrite(ops, { ordered: false });',
            '// 같은 이메일은 갱신, 없으면 추가',
          ],
          highlight: [3, 4, 5, 7, 8, 9, 10, 11, 13, 14, 15, 16, 17, 18, 20, 21, 23, 24, 25, 26, 27, 30, 33, 34, 35, 36, 37, 38, 39, 40],
        },
      },
      {
        title: 'Step 5. writeConcern — 안전 vs 속도',
        desc: '쓰기를 어디까지 보장할지. w:1 (primary 만) = 기본, 빠름. w:"majority" = 과반수 secondary 까지 복제, 안전. w:0 = fire-and-forget, 위험.',
        op: 'writeConcern',
        rows: 0,
        verdict: '균형',
        verdictTone: 'good',
        summary: {
          title: 'insert 종류와 writeConcern',
          rows: [
            { metric: 'insertOne', before: '단건', after: 'ACK + _id', delta: '1 RTT' },
            { metric: 'insertMany', before: '배열', after: '일괄', delta: 'N RTT 절감' },
            { metric: 'ordered', before: 'true/false', after: '실패 시 동작', delta: '비즈니스 결정' },
            { metric: 'bulkWrite', before: '혼합', after: 'I/U/D 한 번에', delta: '복잡 작업' },
            { metric: 'writeConcern', before: 'w:1/majority', after: '안전 vs 속도', delta: '운영 정책' },
          ],
        },
        keyPoint: '안전이 중요하면 w:"majority", 속도가 중요하면 w:1. 금융/예약은 majority.',
        code: {
          lang: 'javascript',
          filename: '05-write-concern.js',
          lines: [
            '// Step 5. writeConcern — 어디까지 보장할지',
            '',
            '// w: 1 (기본)',
            '//  - primary 가 받았다 → ACK',
            '//  - 가장 빠름',
            '//  - primary 가 죽으면 데이터 손실 위험',
            'db.users.insertOne({ name: "A" }, { writeConcern: { w: 1 } });',
            '',
            '// w: "majority"',
            '//  - 과반수 secondary 까지 복제됐다 → ACK',
            '//  - 안전 — primary 가 죽어도 복구 가능',
            '//  - 느림 — 네트워크 + 복제 대기',
            'db.users.insertOne(',
            '  { name: "B" },',
            '  { writeConcern: { w: "majority" } }',
            ');',
            '',
            '// w: 0 — fire-and-forget',
            '//  - ACK 안 기다림',
            '//  - 가장 빠름',
            '//  - 에러도 모름',
            '//  - 로그/메트릭 같은 손실 OK 한 데이터에만',
            '',
            '// j: true — journal 까지 안전',
            '//  - 디스크 journal flush 까지 보장',
            '//  - 서버 크래시 시에도 안전',
            'db.users.insertOne(',
            '  { name: "C" },',
            '  { writeConcern: { w: "majority", j: true } }',
            ');',
            '',
            '// wtimeout',
            'db.users.insertOne(',
            '  { name: "D" },',
            '  { writeConcern: { w: "majority", wtimeout: 5000 } }',
            ');',
            '// 5초 안에 majority 응답 못 받으면 에러',
            '',
            '// 운영 가이드',
            '//  - 결제/주문/예약 → w:"majority" + j:true',
            '//  - 일반 사용자 데이터 → w:"majority"',
            '//  - 로그/메트릭 → w:1 (또는 w:0)',
            '',
            '// readConcern 도 비슷한 개념 (읽기 안전성)',
            '//  - local (기본)',
            '//  - majority (커밋된 것만)',
            '//  - linearizable (강한 일관성)',
          ],
          highlight: [3, 4, 5, 6, 7, 9, 10, 11, 12, 13, 14, 15, 16, 18, 19, 20, 21, 22, 24, 25, 26, 27, 28, 29, 30, 38, 39, 40, 41],
        },
      },
    ];

    const TONE = {
      good:   { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-800', badge: 'bg-emerald-200 text-emerald-800' },
      warn:   { bg: 'bg-amber-50',    border: 'border-amber-400',   text: 'text-amber-800',   badge: 'bg-amber-200 text-amber-800' },
      danger: { bg: 'bg-rose-50',     border: 'border-rose-400',    text: 'text-rose-800',    badge: 'bg-rose-200 text-rose-800' },
    };

    function OpCard({ op, rows }) {
      return (
        <div className="rounded-lg border p-3 bg-emerald-50 border-emerald-200 text-xs">
          <div className="font-bold mb-1" style={{ color: '#13aa52' }}>현재 작업</div>
          <div className="text-zinc-700">연산: <code className="font-mono bg-white px-1 rounded">{op}</code></div>
          <div className="text-zinc-700">건수: <b>{rows}</b></div>
        </div>
      );
    }

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 p-3 bg-white" style={{ borderColor: '#13aa52' }}>
          <div className="text-sm font-bold mb-2" style={{ color: '#13aa52' }}>📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-zinc-500 border-b border-zinc-200">
                <th className="py-1 pr-2">연산</th><th className="py-1 pr-2">대상</th><th className="py-1 pr-2">결과</th><th className="py-1">특징</th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-zinc-100">
                  <td className="py-1 pr-2 font-medium text-zinc-700">{r.metric}</td>
                  <td className="py-1 pr-2 text-emerald-700 font-mono">{r.before}</td>
                  <td className="py-1 pr-2 text-zinc-700">{r.after}</td>
                  <td className="py-1 font-bold" style={{ color: '#13aa52' }}>{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.warn;
      return (
        <div className="rounded-xl border bg-white p-4 h-full flex flex-col" style={{ borderColor: '#13aa5240' }}>
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold" style={{ color: '#13aa52' }}>Insert / Bulk 시각화</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          <OpCard op={state.op} rows={state.rows} />

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs rounded p-2 border bg-emerald-50 border-emerald-200" style={{ color: '#0f7a3a' }}>
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-zinc-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-zinc-800 border-b border-zinc-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-zinc-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-zinc-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-zinc-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-emerald-500/25 border-l-2 border-emerald-300 -ml-3 pl-2' : ''}`}>
                    <span className="text-zinc-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-zinc-800 border-t border-zinc-700 flex items-center justify-between text-[10px] text-zinc-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen px-4 py-6 bg-gradient-to-br from-emerald-50 to-green-50">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap p-4 rounded-xl text-white shadow" style={{ backgroundColor: '#13aa52' }}>
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-white font-bold" style={{ color: '#13aa52' }}>🍃</span>
              <div>
                <h1 className="text-2xl font-bold">Chapter III-1-1. insert + Bulk</h1>
                <p className="text-sm text-emerald-50">insertOne · insertMany · ordered · bulkWrite · writeConcern</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-white underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? '' : 'bg-emerald-100'}`} style={i <= stepIdx ? { backgroundColor: '#13aa52' } : {}} />
              ))}
            </div>

            <div className="mb-4 rounded-xl bg-emerald-800 text-white px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-emerald-50 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} className="px-3 py-1.5 text-xs rounded border border-emerald-300 bg-white text-emerald-700 hover:bg-emerald-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} className="px-3 py-1.5 text-xs rounded border border-emerald-300 bg-white text-emerald-700 hover:bg-emerald-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} className="px-4 py-1.5 text-xs rounded font-bold text-white" style={{ backgroundColor: playing ? '#0f7a3a' : '#13aa52' }}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} className="px-3 py-1.5 text-xs rounded border border-emerald-300 bg-white text-emerald-700 hover:bg-emerald-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-emerald-700 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 px-4 py-3 text-sm bg-white" style={{ borderColor: '#13aa52', color: '#0f7a3a' }}>
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                단건은 insertOne, 일괄은 insertMany, 혼합은 bulkWrite. ordered + writeConcern 으로 안전 vs 속도 균형.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['insertOne', 'insertMany', 'bulkWrite', 'ordered', 'writeConcern'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full border bg-emerald-50 border-emerald-300" style={{ color: '#13aa52' }}>#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs" style={{ color: '#13aa52' }}>
              <a href="../part2/II-2-2.html" className="underline hover:no-underline">← 이전: II-2-2 Schema Validation</a>
              <a href="./III-1-2.html" className="underline hover:no-underline">다음: III-1-2 find →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
