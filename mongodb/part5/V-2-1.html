    const TONE = {
      good:   { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-800', badge: 'bg-emerald-200 text-emerald-800' },
      warn:   { bg: 'bg-amber-50',    border: 'border-amber-400',   text: 'text-amber-800',   badge: 'bg-amber-200 text-amber-800' },
      danger: { bg: 'bg-rose-50',     border: 'border-rose-400',    text: 'text-rose-800',    badge: 'bg-rose-200 text-rose-800' },
    };

    function LayerCard({ layer, coverage }) {
      const labels = {
        auth: '🔐 인증',
        rbac: '👥 권한',
        tls: '🔒 전송',
        encryption: '🗄️ 저장',
        backup: '💾 백업',
      };
      return (
        <div className="rounded-lg border p-3 bg-emerald-50 border-emerald-200 text-xs">
          <div className="font-bold mb-2" style={{ color: '#13aa52' }}>보안 레이어</div>
          <div className="flex items-center gap-2">
            <span className="px-2 py-1 rounded bg-white border border-emerald-300 font-bold" style={{ color: '#13aa52' }}>{labels[layer] || layer}</span>
            <span className="text-zinc-700">범위: <b>{coverage}</b></span>
          </div>
        </div>
      );
    }

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 p-3 bg-white" style={{ borderColor: '#13aa52' }}>
          <div className="text-sm font-bold mb-2" style={{ color: '#13aa52' }}>📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-zinc-500 border-b border-zinc-200">
                <th className="py-1 pr-2">축</th><th className="py-1 pr-2">방법</th><th className="py-1 pr-2">목적</th><th className="py-1">메모</th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-zinc-100">
                  <td className="py-1 pr-2 font-medium text-zinc-700">{r.metric}</td>
                  <td className="py-1 pr-2 text-emerald-700 font-mono">{r.before}</td>
                  <td className="py-1 pr-2 text-zinc-700">{r.after}</td>
                  <td className="py-1 font-bold" style={{ color: '#13aa52' }}>{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.warn;
      return (
        <div className="rounded-xl border bg-white p-4 h-full flex flex-col" style={{ borderColor: '#13aa5240' }}>
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold" style={{ color: '#13aa52' }}>보안 + 백업</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          <LayerCard layer={state.layer} coverage={state.coverage} />

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs rounded p-2 border bg-emerald-50 border-emerald-200" style={{ color: '#0f7a3a' }}>
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-zinc-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-zinc-800 border-b border-zinc-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-zinc-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-zinc-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-zinc-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-emerald-500/25 border-l-2 border-emerald-300 -ml-3 pl-2' : ''}`}>
                    <span className="text-zinc-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-zinc-800 border-t border-zinc-700 flex items-center justify-between text-[10px] text-zinc-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen px-4 py-6 bg-gradient-to-br from-emerald-50 to-green-50">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap p-4 rounded-xl text-white shadow" style={{ backgroundColor: '#13aa52' }}>
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-white font-bold" style={{ color: '#13aa52' }}>🍃</span>
              <div>
                <h1 className="text-2xl font-bold">Chapter V-2-1. 보안 + 백업</h1>
                <p className="text-sm text-emerald-50">auth · RBAC · TLS · encryption-at-rest · mongodump/PITR</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-white underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? '' : 'bg-emerald-100'}`} style={i <= stepIdx ? { backgroundColor: '#13aa52' } : {}} />
              ))}
            </div>

            <div className="mb-4 rounded-xl bg-emerald-800 text-white px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-emerald-50 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} aria-label="처음으로" className="px-3 py-1.5 text-xs rounded border border-emerald-300 bg-white text-emerald-700 hover:bg-emerald-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 text-xs rounded border border-emerald-300 bg-white text-emerald-700 hover:bg-emerald-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'} className="px-4 py-1.5 text-xs rounded font-bold text-white" style={{ backgroundColor: playing ? '#0f7a3a' : '#13aa52' }}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} aria-label="다음 단계" className="px-3 py-1.5 text-xs rounded border border-emerald-300 bg-white text-emerald-700 hover:bg-emerald-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-emerald-700 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 px-4 py-3 text-sm bg-white" style={{ borderColor: '#13aa52', color: '#0f7a3a' }}>
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                보안은 5층 — auth/RBAC/TLS/at-rest/backup. 어느 한 층이라도 빠지면 위험. 백업은 정기 복원 검증 필수.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['auth', 'RBAC', 'TLS', 'encryption', 'mongodump', 'PITR'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full border bg-emerald-50 border-emerald-300" style={{ color: '#13aa52' }}>#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs" style={{ color: '#13aa52' }}>
              <a href="./V-1-2.html" className="underline hover:no-underline">← 이전: V-1-2 Sharding</a>
              <a href="./V-2-2.html" className="underline hover:no-underline">다음: V-2-2 운영 체크리스트 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
