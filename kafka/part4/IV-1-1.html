    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — Source → Connect → Topic → Connect → Sink 흐름
    // ─────────────────────────────────────────────────────
    const NODE_STATE_STYLE = {
      idle:   'bg-slate-100 border-slate-300 text-slate-500',
      active: 'bg-yellow-100 border-yellow-500 text-yellow-900 ring-4 ring-yellow-200',
      done:   'bg-yellow-50 border-yellow-400 text-yellow-800',

    function FlowNode({ icon, title, sub, state }) {
      const cls = NODE_STATE_STYLE[state] || NODE_STATE_STYLE.idle;
      return (
        <div className={`rounded-lg border-2 px-2 py-2 text-center transition ${cls}`}>
          <div className="text-2xl">{icon}</div>
          <div className="text-[11px] font-bold mt-1">{title}</div>

        </div>
      );
    }

    function Arrow({ active, label }) {

        <div className="flex flex-col items-center justify-center px-1">

        </div>
      );
    }

    function FlowDiagram({ flow }) {
      const arrowSrc = flow.connectSrc !== 'idle';
      const arrowTopic = flow.topic !== 'idle';
      const arrowSink = flow.connectSink !== 'idle';
      const arrowOut = flow.sink !== 'idle';
      return (
        <div className="rounded-lg border-2 border-yellow-300 bg-white overflow-hidden">
          <div className="bg-gradient-to-r from-yellow-500 to-amber-500 text-white px-3 py-1.5 text-xs font-bold flex items-center gap-2">

            <div className="grid grid-cols-[1fr_auto_1fr_auto_1fr_auto_1fr_auto_1fr] items-center gap-1">
              <FlowNode icon="🗄️" title="MySQL" sub="orders 테이블" state={flow.source} />
              <Arrow active={arrowSrc} label="binlog" />
              <FlowNode icon="📥" title="Source Connector" sub="Debezium" state={flow.connectSrc} />
              <Arrow active={arrowTopic} label="produce" />
              <FlowNode icon="📨" title="Kafka Topic" sub="shop.shop.orders" state={flow.topic} />
              <Arrow active={arrowSink} label="consume" />

    // ─────────────────────────────────────────────────────

        <div className="mt-3 grid grid-cols-2 gap-2">

            <div key={i} className="rounded-lg border border-yellow-200 bg-yellow-50 px-3 py-2">

    // ─────────────────────────────────────────────────────

    function SmtChainBox({ smtChain }) {
      if (!smtChain) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-yellow-400 bg-gradient-to-br from-yellow-50 to-amber-50 p-3">

          <div className="space-y-1.5">

    const ALERT_STYLE = {

    // ─────────────────────────────────────────────────────

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-yellow-200 bg-white p-4 h-full flex flex-col">

      );

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-yellow-500/15 border-l-2 border-yellow-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-yellow-50 to-amber-50 px-4 py-6">

            <div className="mb-4 flex gap-1.5">

                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-yellow-600' : 'bg-yellow-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}

              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}

              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);

                aria-pressed={playing}
                aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-yellow-700 text-white' : 'bg-yellow-600 text-white hover:bg-yellow-700'}`}
