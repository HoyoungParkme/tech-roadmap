            '# Schema 호환성 — 운영에서 진짜 중요한 부분',
            '',
            '## 왜 호환성이 필요한가?',
            'Producer / Consumer 는 따로 배포된다.',
            '"옛 Consumer + 새 메시지" / "새 Consumer + 옛 메시지" 가',
            '잠깐이라도 반드시 공존한다. 깨지지 않으려면 스키마가 규칙을 지켜야 한다.',
            '',
            '## 3가지 호환성 모드',
            '',
            '### 1) BACKWARD (가장 흔함, 기본 추천)',
            '- 의미: 새 스키마로 옛 메시지를 읽을 수 있다',
            '- 허용: 필드 추가(default 필수) / 삭제(default 있던 것만)',
            '- 배포: Consumer 먼저 → Producer 뒤에',
            '',
            '### 2) FORWARD',
            '- 의미: 옛 스키마로 새 메시지를 읽을 수 있다',
            '- 허용: 필드 추가(default 없어도 됨) / 삭제(default 필수)',
            '- 배포: Producer 먼저 → Consumer 뒤에',
            '',
            '### 3) FULL',
            '- 의미: BACKWARD + FORWARD 둘 다 만족',
            '- 허용: default 있는 필드만 추가/삭제',
            '- 배포: 자유. 가장 안전 (큰 시스템 / 다수 팀)',
            '',
            '## 깨지는 변경 예시',
            '```diff',
            '  "fields": [',
            '    { "name": "id",    "type": "long"   },',
            '-   { "name": "age",   "type": "int"    },   // ❌ 삭제(default 없음)',
            '+   { "name": "age",   "type": "string" },   // ❌ 타입 변경',
            '+   { "name": "phone", "type": "string" }    // ❌ 추가(default 없음)',
            '  ]',
            '```',
            '',
            '## 실무 가이드',
            '1. BACKWARD 로 시작 (Consumer 보호)',
            '2. 새 필드는 항상 default 와 함께 추가',
            '3. 필드 삭제는 1~2 릴리즈 deprecated 후',
            '4. 타입 변경 금지 — 새 필드 만들고 옛것 deprecated',
            '5. CI 에서 호환성 검증 강제',
            '',
            '> 스키마는 코드처럼 PR / 리뷰 / CI 로 관리한다.',
            '> Schema Registry 는 그 규칙을 강제하는 마지막 게이트다.',
          ],
          highlight: [9, 10, 11, 12, 13, 15, 16, 17, 18, 20, 21, 22, 23, 25, 26, 27, 28, 29, 30, 31, 32, 33, 35, 36, 37, 38, 39, 40, 42, 43],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 박스 톤 → tailwind class
    // ─────────────────────────────────────────────────────
    const TONE = {
      good:   { border: 'border-yellow-400', bg: 'bg-yellow-50',  title: 'text-yellow-800', accent: 'bg-yellow-400' },
      info:   { border: 'border-amber-300',  bg: 'bg-amber-50',   title: 'text-amber-800',  accent: 'bg-amber-300' },
      warn:   { border: 'border-orange-400', bg: 'bg-orange-50',  title: 'text-orange-800', accent: 'bg-orange-400' },
      danger: { border: 'border-red-400',    bg: 'bg-red-50',     title: 'text-red-800',    accent: 'bg-red-400' },
      gray:   { border: 'border-slate-300',  bg: 'bg-slate-50',   title: 'text-slate-600',  accent: 'bg-slate-300' },
    };

    // ─────────────────────────────────────────────────────
    // Producer / Broker / Consumer 등 공용 박스
    // ─────────────────────────────────────────────────────
    function FlowBox({ icon, title, tone, lines, hint }) {
      const t = TONE[tone] || TONE.info;
      return (
        <div className={`rounded-lg border-2 ${t.border} ${t.bg} p-2.5 flex flex-col gap-1`}>
          <div className={`text-[11px] font-bold ${t.title} flex items-center gap-1`}>
            <span>{icon}</span>
            <span>{title}</span>
          </div>
          {lines.map((line, i) => (
            <div key={i} className="text-[10px] font-mono text-slate-800 break-all">{line}</div>
          ))}
          {hint && (
            <div className="text-[10px] text-slate-600 italic mt-0.5">{hint}</div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 화살표 (Producer → Broker, Broker → Consumer)
    // ─────────────────────────────────────────────────────
    function Arrow({ label }) {
      return (
        <div className="flex flex-col items-center justify-center py-1">
          <span className="text-[10px] text-yellow-700 font-bold">{label}</span>
          <span className="text-yellow-600 text-lg leading-none">▼</span>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Schema Registry 박스 (subjects 리스트 표시)
    // ─────────────────────────────────────────────────────
    function RegistryBox({ registry }) {
      const t = TONE[registry.tone] || TONE.info;
      return (
        <div className={`rounded-lg border-2 ${t.border} ${t.bg} p-2.5`}>
          <div className={`text-[11px] font-bold ${t.title} flex items-center gap-1 mb-1`}>
            <span>📋</span>
            <span>{registry.label}</span>
            <span className="ml-auto text-[9px] bg-white/70 px-1.5 py-0.5 rounded">{registry.state}</span>
          </div>
          {registry.subjects.length === 0 ? (
            <div className="text-[10px] text-slate-500 italic">(등록된 스키마 없음)</div>
          ) : (
            <ul className="space-y-0.5">
              {registry.subjects.map((s, i) => (
                <li key={i} className="text-[10px] font-mono text-slate-800 flex gap-1">
                  <span className="text-yellow-600">›</span>
                  <span>{s}</span>
                </li>
              ))}
            </ul>
          )}
          {registry.hint && (
            <div className="text-[10px] text-slate-600 italic mt-1">{registry.hint}</div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 호환성 매트릭스 (Step 5)
    // ─────────────────────────────────────────────────────
    function EvolutionBox({ evolution }) {
      if (!evolution) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-yellow-500 bg-gradient-to-br from-yellow-50 to-amber-50 p-3">
          <div className="text-sm font-bold text-yellow-800 mb-2 flex items-center gap-2">
            <span>🔁</span>
            <span>{evolution.title}</span>
          </div>
          <div className="space-y-1.5">
            {evolution.rules.map((r, i) => (
              <div key={i} className="text-[11px] flex flex-col gap-0.5 bg-white/70 rounded p-1.5 border border-yellow-200">
                <div className="flex items-center gap-2">
                  <span className="font-bold text-yellow-900 w-20">{r.mode}</span>
                  <span className="text-slate-800">{r.desc}</span>
                </div>
                <div className="text-[10px] text-yellow-700 italic ml-20">→ {r.use}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 경고/완료 박스
    // ─────────────────────────────────────────────────────
    const ALERT_STYLE = {
      info:   { bg: 'bg-amber-50',   border: 'border-amber-300',  text: 'text-amber-900',  icon: '💡' },
      warn:   { bg: 'bg-orange-50',  border: 'border-orange-300', text: 'text-orange-900', icon: '⚠️' },
      danger: { bg: 'bg-red-50',     border: 'border-red-300',    text: 'text-red-900',    icon: '🚨' },
      good:   { bg: 'bg-yellow-50',  border: 'border-yellow-400', text: 'text-yellow-900', icon: '✅' },
    };

    function AlertBox({ alert }) {
      if (!alert) return null;
      const s = ALERT_STYLE[alert.tone] || ALERT_STYLE.info;
      return (
        <div className={`mt-3 rounded-lg border ${s.bg} ${s.border} ${s.text} p-2 text-xs flex gap-2`}>
          <span>{s.icon}</span>
          <span>{alert.text}</span>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — yellow 톤
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-yellow-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-yellow-800">Producer → Schema Registry → Broker → Consumer</h3>
            <span className="text-[10px] text-slate-500">스키마 진화 흐름</span>
          </div>

          <FlowBox
            icon="📤"
            title={state.producer.label}
            tone={state.producer.tone}
            lines={[`payload: ${state.producer.payload}`, `encoded: ${state.producer.encoded}`]}
            hint={state.producer.hint}
          />

          <Arrow label="① 스키마 조회 / 등록" />

          <RegistryBox registry={state.registry} />

          <Arrow label="② schema id 로 직렬화 → 발행" />

          <FlowBox
            icon="🗄️"
            title={state.broker.label}
            tone={state.broker.tone}
            lines={[`topic: ${state.broker.topic}`, `bytes: ${state.broker.message}`]}
            hint={state.broker.hint}
          />

          <Arrow label="③ Consume → id 로 스키마 조회 → 역직렬화" />

          <FlowBox
            icon="📥"
            title={state.consumer.label}
            tone={state.consumer.tone}
            lines={[`decoded: ${state.consumer.decoded}`, `status: ${state.consumer.status}`]}
            hint={state.consumer.hint}
          />

          <EvolutionBox evolution={state.evolution} />
          <AlertBox alert={state.alert} />
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-yellow-500/15 border-l-2 border-yellow-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-yellow-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-yellow-500 text-white font-bold">K</span>
              <div>
                <h1 className="text-2xl font-bold text-yellow-900">IV-2-1. Schema Registry + Avro/Protobuf</h1>
                <p className="text-sm text-yellow-800/80">JSON 의 한계 → Avro 정의 → Registry 등록 → id 기반 직렬화 → 호환성 진화</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-yellow-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-yellow-500' : 'bg-yellow-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-yellow-600 text-yellow-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-yellow-100/95 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-yellow-400 bg-white text-yellow-700 hover:bg-yellow-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-yellow-400 bg-white text-yellow-700 hover:bg-yellow-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-yellow-700 text-white' : 'bg-yellow-500 text-white hover:bg-yellow-600'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-yellow-400 bg-white text-yellow-700 hover:bg-yellow-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-yellow-700/70 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-yellow-500 bg-white px-4 py-3 text-sm text-yellow-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                JSON 직렬화의 3대 문제 — 스키마 부재 / 호환성 무보장 / 비효율 — 은 Schema Registry + Avro 로 한 번에 풀린다.
                Producer 와 Consumer 는 글로벌 schema id 한 단어로 약속을 공유하고, BACKWARD / FORWARD / FULL 호환성 규칙이 깨지지 않는 진화를 강제한다.
                다음 챕터에서는 Avro 외 대안인 Protobuf 와 JSON Schema 의 트레이드오프를 비교한다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['SchemaRegistry', 'Avro', 'Protobuf', '직렬화', '역직렬화', 'BACKWARD', 'FORWARD', 'FULL', 'schemaEvolution', 'confluent'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-800 border border-yellow-300">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-yellow-700">
              <a href="../index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./IV-2-2.html" className="underline hover:no-underline">다음: IV-2-2 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
