            '  Leader:   broker-1   ← 곧 죽음',

            '  Replicas: 1, 2, 3',
            '',
            '## T+0초: broker-1 다운',
            '',
            '  Controller 가 ZooKeeper/KRaft 세션 만료로 감지',
            '  Producer 의 write 요청이 broker-1 에 도달 못함',
            '',
            '## T+수 ms: Controller 의 새 Leader 선출',
            '',
            '  1) ISR 멤버 확인 → [1(죽음), 2, 3]',
            '  2) ISR 우선순위로 선택 → broker-2',
            '  3) 새 메타데이터 발행',
            '       Leader:   broker-2',
            '       Isr:      2, 3   (← 1 제거됨)',
            '       Replicas: 1, 2, 3',
            '',
            '## T+1~3초: 클라이언트 재연결',
            '',
            '  Producer 가 broker-1 응답 없음 → metadata 재요청',
            '  새 metadata 응답: "Leader 는 broker-2"',
            '  Producer 가 broker-2 에 write 재개',
            '  Consumer 도 동일하게 broker-2 에 read 재개',
            '',
            '## 메시지 손실은? → 0',
            '',
            '  broker-2 는 ISR 멤버였으므로',
            '  → broker-1 이 알고 있던 모든 commit 메시지 보유',
            '  → 새 Leader 가 그대로 이어받음',
            '  → 클라이언트는 끊김 외 차이를 느끼지 못함',
            '',
            '## broker-1 복구 후',
            '',
            '  broker-1 이 다시 켜지면:',
            '    1) follower 로 시작',
            '    2) broker-2 에서 누락분 fetch',
            '    3) 따라잡으면 ISR 재합류',
            '    4) 추후 리밸런싱으로 Leader 복귀 가능',
            '',
            '## 위험 옵션 (절대 켜지 말 것)',
            '',
            '  unclean.leader.election.enable = true',
            '    → ISR 밖 follower 도 Leader 후보로 허용',
            '    → 메시지 손실 가능 (뒤처진 데이터로 덮어쓰기)',
            '    → 실무 default = false 유지',
            '',
            '## 핵심 정리',
            '',
            '  ✓ 자동: Controller 가 알아서 선출',
            '  ✓ 빠름: 보통 수 초 이내 페일오버',
            '  ✓ 안전: ISR 안에서만 뽑아서 손실 0',
            '  ✓ 투명: 클라이언트는 metadata 갱신만',
            '',
            '# → 다음 챕터: Producer / Consumer 의 보장 옵션 (acks, idempotence)',
          ],
          highlight: [3, 4, 5, 6, 9, 10, 11, 12, 15, 16, 17, 18, 19, 20, 21, 22, 30, 31, 32, 33, 34, 51, 52, 53, 54, 55],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // Broker 상태 색상 / 라벨 매핑
    // ─────────────────────────────────────────────────────
    const ROLE_LABEL = {
      replica: { text: 'Replica', color: 'bg-yellow-100 text-yellow-800 border-yellow-300' },
      leader: { text: '👑 LEADER', color: 'bg-yellow-500 text-white border-yellow-700' },
      follower: { text: 'Follower', color: 'bg-amber-100 text-amber-800 border-amber-300' },
      'follower-isr': { text: 'Follower (ISR)', color: 'bg-emerald-100 text-emerald-800 border-emerald-300' },
      'follower-outsync': { text: 'Follower (OUT)', color: 'bg-red-100 text-red-800 border-red-300' },
      dead: { text: '💀 DOWN', color: 'bg-slate-300 text-slate-700 border-slate-500' },
    };

    const STATUS_DOT = {
      online: 'bg-emerald-500',
      syncing: 'bg-blue-500 animate-pulse',
      lagging: 'bg-red-500 animate-pulse',
      down: 'bg-slate-500',
      promoted: 'bg-yellow-500 animate-pulse',
    };

    // ─────────────────────────────────────────────────────
    // 단일 Broker 카드
    // ─────────────────────────────────────────────────────
    function BrokerCard({ broker, isHighlight }) {
      const role = ROLE_LABEL[broker.role] || ROLE_LABEL.replica;
      const dot = STATUS_DOT[broker.status] || STATUS_DOT.online;
      const isDead = broker.status === 'down';
      const ringClass = isHighlight ? 'ring-2 ring-yellow-500 ring-offset-2' : '';
      const bgClass = isDead ? 'bg-slate-100 opacity-70' : 'bg-white';
      return (
        <div className={`rounded-lg border-2 ${role.color.includes('border-') ? '' : 'border-yellow-200'} ${bgClass} p-2.5 ${ringClass} transition-all`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className={`w-2 h-2 rounded-full ${dot}`}></span>
              <span className="text-xs font-bold text-slate-700">broker-{broker.id}</span>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded border font-bold ${role.color}`}>
              {role.text}
            </span>
          </div>
          <div className="text-[10px] text-slate-500 mb-1">
            lag: <span className="font-mono font-bold text-slate-700">{broker.lag}</span>
          </div>
          <div className="space-y-0.5">
            {broker.messages.length === 0 ? (
              <div className="text-[10px] text-slate-400 italic">(no data)</div>
            ) : (
              broker.messages.map((m, i) => (
                <div
                  key={i}
                  className="text-[10px] font-mono px-1.5 py-0.5 rounded bg-yellow-50 border border-yellow-200 text-yellow-900"
                >
                  {m}
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 복제 흐름 화살표 박스
    // ─────────────────────────────────────────────────────
    function FlowBox({ flow }) {
      if (!flow) return null;
      const styles = {
        producer: { bg: 'bg-yellow-100', border: 'border-yellow-400', text: 'text-yellow-900', icon: '📥' },
        replicate: { bg: 'bg-blue-100', border: 'border-blue-400', text: 'text-blue-900', icon: '🔄' },
        failover: { bg: 'bg-emerald-100', border: 'border-emerald-400', text: 'text-emerald-900', icon: '🚨' },
      };
      const s = styles[flow.type] || styles.replicate;
      return (
        <div className={`mt-3 rounded-lg border-2 ${s.bg} ${s.border} ${s.text} p-2 text-xs flex items-center gap-2`}>
          <span>{s.icon}</span>
          <span className="font-bold">{flow.label}</span>
          <span className="ml-auto text-[10px] font-mono">
            {flow.type === 'producer' && `→ broker-${flow.to}`}
            {flow.type === 'replicate' && `broker-${flow.from} → [${flow.to.map((t) => 'broker-' + t).join(', ')}]`}
            {flow.type === 'failover' && `broker-${flow.from} ✗ → broker-${flow.to} 👑`}
          </span>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 요약 박스 (Step 5)
    // ─────────────────────────────────────────────────────
    function SummaryBox({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-yellow-500 bg-gradient-to-br from-yellow-50 to-amber-50 p-3">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-xl">🟡</span>
            <span className="text-sm font-bold text-yellow-900">{summary.title}</span>
          </div>
          <ul className="space-y-1">
            {summary.features.map((f, i) => (
              <li key={i} className="text-xs text-yellow-900 flex gap-2">
                <span className="text-yellow-600 mt-0.5">✓</span>
                <span>{f}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 경고/알림 박스
    // ─────────────────────────────────────────────────────
    const ALERT_STYLE = {
      info:   { bg: 'bg-yellow-50',  border: 'border-yellow-300',  text: 'text-yellow-900',  icon: '💡' },
      warn:   { bg: 'bg-amber-50',   border: 'border-amber-300',   text: 'text-amber-900',   icon: '⚠️' },
      danger: { bg: 'bg-red-50',     border: 'border-red-300',     text: 'text-red-900',     icon: '🚨' },
      good:   { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-900', icon: '✅' },
    };

    function AlertBox({ alert }) {
      if (!alert) return null;
      const s = ALERT_STYLE[alert.tone] || ALERT_STYLE.info;
      return (
        <div className={`mt-3 rounded-lg border ${s.bg} ${s.border} ${s.text} p-2 text-xs flex gap-2`}>
          <span>{s.icon}</span>
          <span>{alert.text}</span>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — yellow 톤, 3 broker 박스
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ state }) {
      const highlightSet = new Set(state.highlight || []);
      return (
        <div className="rounded-xl border border-yellow-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-yellow-900">Kafka Cluster — 3 brokers (RF=3)</h3>
            <span className="text-[10px] text-slate-500">노란 테두리 = 강조 대상</span>
          </div>
          <div className="rounded-lg border-2 border-yellow-300 bg-yellow-50/40 p-2">
            <div className="bg-gradient-to-r from-yellow-500 to-amber-500 text-white px-3 py-1.5 text-xs font-bold flex items-center gap-2 rounded mb-2">
              <span>🟡</span>
              <span>Topic: orders / Partition: 0</span>
              <span className="ml-auto text-[10px] bg-white/20 px-2 py-0.5 rounded">{state.actor}</span>
            </div>
            <div className="grid grid-cols-3 gap-2">
              {state.brokers.map((b) => (
                <BrokerCard key={b.id} broker={b} isHighlight={highlightSet.has(b.id)} />
              ))}
            </div>
          </div>
          <FlowBox flow={state.flow} />
          <SummaryBox summary={state.summary} />
          <AlertBox alert={state.alert} />
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-yellow-500/15 border-l-2 border-yellow-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-yellow-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-yellow-600 text-white font-bold">K</span>
              <div>
                <h1 className="text-2xl font-bold text-yellow-900">II-2-2. Replication & Leader/Follower</h1>
                <p className="text-sm text-yellow-800/80">RF=3 → Leader → Follower 복제 → ISR → 장애 시 자동 승격</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-yellow-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-yellow-600' : 'bg-yellow-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-yellow-700 text-yellow-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-yellow-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-yellow-300 bg-white text-yellow-700 hover:bg-yellow-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-yellow-300 bg-white text-yellow-700 hover:bg-yellow-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-yellow-700 text-white' : 'bg-yellow-600 text-white hover:bg-yellow-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-yellow-300 bg-white text-yellow-700 hover:bg-yellow-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-yellow-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-yellow-400 bg-white px-4 py-3 text-sm text-yellow-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                Kafka 의 Replication 은 "사본을 여러 broker 에 두고(RF), 그 중 하나만 읽기/쓰기를 책임지며(Leader),
                나머지는 비동기로 따라가고(Follower), 진짜 동기화된 것만 인정하며(ISR), 죽으면 자동으로 승격(Failover)"
                하는 5단계 메커니즘이다. 이 구조 덕분에 broker 일부가 죽어도 메시지 손실 없이 운영이 계속된다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Kafka', 'Replication', 'Leader', 'Follower', 'ISR', 'Failover', 'replication.factor', 'min.insync.replicas', 'KRaft'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-800 border border-yellow-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-yellow-700">
              <a href="./II-2-1.html" className="underline hover:no-underline">← 이전: II-2-1</a>
              <a href="./II-2-3.html" className="underline hover:no-underline">다음: II-2-3 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
