            '',
            '# 남은 문제: "app-prod" 가 모든 토픽을 다 만질 수 있어도 되는가?',
            '# → Step 5: ACL 로 리소스별 권한 분리',
          ],
          highlight: [9, 10, 11, 12, 13, 16, 17, 18, 20, 21, 22, 25, 26, 27, 30, 31, 32, 33, 34, 35, 36, 37, 38, 41, 42, 43],
        },
      },
      {
        title: 'Step 5. ACL — 리소스별 최소 권한',
        desc: '마지막은 인가(Authorization)다. SCRAM으로 "app-prod 가 맞는지" 는 확인했지만, app-prod 가 admin API로 토픽을 삭제하는 건 막아야 한다. ACL은 (Principal, Resource, Operation) 단위로 권한을 정의한다. app-prod 는 orders 토픽에 WRITE만, etl-job 은 orders / user-events 토픽에 READ만, admin 은 모두. 이로써 보안 4계층(TLS + 인증 + 최소권한 + 감사로그)이 완성된다. 보안 없는 평문 클러스터에서 출발해 운영급 보안에 도달했다.',
        actor: '🔒 ACL로 리소스별 최소 권한 적용',
        layers: { tls: true, auth: 'SCRAM-SHA-512', acl: true },
        listener: 'SASL_SSL://0.0.0.0:9094 + AclAuthorizer',
        clients: [
          { name: '✓ app-prod', detail: 'orders 토픽 produce',               status: 'ok',      reason: 'ACL: User:app-prod → WRITE orders' },
          { name: '✓ etl-job',  detail: 'orders / user-events consume',     status: 'ok',      reason: 'ACL: User:etl-job → READ + group etl-cg' },
          { name: '✗ app-prod', detail: 'orders 토픽 삭제 시도 → 거절',     status: 'blocked', reason: 'ACL: DELETE 권한 없음' },
          { name: '✗ etl-job',  detail: 'orders 토픽에 produce 시도 → 거절', status: 'blocked', reason: 'ACL: WRITE 권한 없음' },
        ],
        finalBox: {
          title: '완성된 4계층 보안',
          features: [
            'TLS  — 채널 암호화로 도청 차단',
            'SASL/SCRAM — 해시 기반 클라이언트 인증',
            'ACL — 토픽 / 그룹 / 클러스터 별 read/write/delete 권한',
            '감사 로그 — authorizer.logger.name으로 거부/허용 모두 기록',
            '원칙 — Deny by default, Least Privilege',
          ],
        },
        alert: { tone: 'good', text: '완성. 평문 클러스터에서 출발해 TLS + SASL/SCRAM + ACL 까지 4계층 보안에 도달했다.' },
        code: {
          lang: 'bash',
          filename: 'acl.sh',
          lines: [
            '#!/usr/bin/env bash',
            '# Step 5. ACL — 리소스별 최소 권한 부여',
            '# 전제: Step 2~4 적용 완료 (TLS + SASL/SCRAM-SHA-512)',
            '',
            '# 1) broker authorizer 활성화',
            'cat >> /etc/kafka/server.properties <<EOF',
            'authorizer.class.name=org.apache.kafka.metadata.authorizer.StandardAuthorizer',
            'super.users=User:admin',
            'allow.everyone.if.no.acl.found=false   # Deny by default',
            'EOF',
            '#   super.users                          : ACL 검사 없이 모두 허용',
            '#   allow.everyone.if.no.acl.found=false : ACL 없으면 거부 (안전)',
            '',
            '# 2) app-prod : orders 토픽에 WRITE 만',
            'kafka-acls.sh --bootstrap-server broker.internal:9094 \\',
            '  --add --allow-principal User:app-prod \\',
            '  --operation Write --operation Describe \\',
            '  --topic orders',
            '# Describe 도 같이 줘야 producer 가 토픽 메타 조회 가능',
            '',
            '# 3) etl-job : orders / user-events READ + consumer group',
            'kafka-acls.sh --bootstrap-server broker.internal:9094 \\',
            '  --add --allow-principal User:etl-job \\',
            '  --operation Read --operation Describe \\',
            '  --topic orders --topic user-events',
            '',
            'kafka-acls.sh --bootstrap-server broker.internal:9094 \\',
            '  --add --allow-principal User:etl-job \\',
            '  --operation Read --group etl-cg',
            '# consumer 는 토픽 READ 외에 group READ 도 필요',
            '',
            '# 4) 적용 결과 확인',
            'kafka-acls.sh --bootstrap-server broker.internal:9094 \\',
            '  --list --topic orders',
            '# → User:app-prod : Allow Write,Describe',
            '#   User:etl-job  : Allow Read,Describe',
            '',
            '# 거부 시나리오 → TopicAuthorizationException',
            '#  (a) app-prod 가 orders 삭제 시도   (b) etl-job 이 orders produce',
            '',
            '# 운영 팁: super.users 별도 관리 / prefix ACL / 거부 로그 모니터링',
            '',
            '# 최종 점검 — 4계층 보안 완성',
            '#   1. TLS                : 채널 암호화 (도청 차단)',
            '#   2. SASL/SCRAM-SHA-512 : 클라이언트 인증 (누구인지)',
            '#   3. ACL                : 리소스별 권한 (무엇을 할 수 있는지)',
            '#   4. 감사 로그          : 모든 허용/거부 기록',
            '# → 평문 9092 클러스터에서 출발해 운영급 보안에 도달했다.',
          ],
          highlight: [6, 7, 8, 9, 10, 15, 16, 17, 18, 22, 23, 24, 25, 27, 28, 29, 43, 44, 45, 46, 47],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 보안 계층 시각화 — TLS / AUTH / ACL 누적 표시
    // ─────────────────────────────────────────────────────
    function LayerStack({ layers }) {
      const items = [
        { key: 'tls',  label: 'TLS (채널 암호화)',    on: !!layers.tls,           detail: layers.tls ? '✓ SSL 핸드셰이크 + 암호화' : '✗ 평문 전송' },
        { key: 'auth', label: '인증 (Authentication)', on: layers.auth !== 'none', detail: layers.auth === 'none' ? '✗ 누구나 접속' : `✓ SASL/${layers.auth}` },
        { key: 'acl',  label: '인가 (Authorization)',  on: !!layers.acl,           detail: layers.acl ? '✓ 리소스별 ACL' : '✗ 전부 허용' },
      ];
      return (
        <div className="rounded-lg border-2 border-yellow-300 bg-white p-2">
          <div className="text-[10px] font-bold text-yellow-800 mb-1.5">🛡️ 보안 계층 (누적)</div>
          <div className="space-y-1">
            {items.map((it) => (
              <div
                key={it.key}
                className={`flex items-center gap-2 px-2 py-1 rounded text-xs border ${
                  it.on
                    ? 'bg-yellow-50 border-yellow-400 text-yellow-900'
                    : 'bg-slate-50 border-slate-200 text-slate-400 line-through'
                }`}
              >
                <span className={`w-2 h-2 rounded-full ${it.on ? 'bg-yellow-500' : 'bg-slate-300'}`}></span>
                <span className="font-semibold w-40">{it.label}</span>
                <span className="font-mono text-[10px]">{it.detail}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Broker listener 표시
    // ─────────────────────────────────────────────────────
    function ListenerBox({ actor, listener }) {
      return (
        <div className="rounded-lg border-2 border-yellow-400 bg-white overflow-hidden">
          <div className="bg-gradient-to-r from-yellow-500 to-amber-500 text-white px-3 py-1.5 text-xs font-bold flex items-center gap-2">
            <span>🟡</span>
            <span>Kafka Broker (mock)</span>
            <span className="ml-auto text-[10px] bg-white/20 px-2 py-0.5 rounded">{actor}</span>
          </div>
          <div className="p-2 text-xs font-mono text-slate-700">
            <span className="text-[10px] text-yellow-700 font-bold mr-2">listener:</span>
            <span>{listener}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 클라이언트 접근 결과 표
    // ─────────────────────────────────────────────────────
    const CLIENT_STATUS = {
      ok:      { row: 'bg-emerald-50 border-emerald-200', icon: '✅', text: 'text-emerald-800' },
      warn:    { row: 'bg-amber-50 border-amber-300',     icon: '⚠️', text: 'text-amber-800'    },
      leak:    { row: 'bg-red-50 border-red-300',         icon: '🚨', text: 'text-red-800'      },
      blocked: { row: 'bg-slate-100 border-slate-300',    icon: '⛔', text: 'text-slate-700'    },
    };

    function ClientRow({ c }) {
      const s = CLIENT_STATUS[c.status] || CLIENT_STATUS.ok;
      return (
        <div className={`flex items-start gap-2 px-2 py-1.5 rounded border ${s.row}`}>
          <span className="text-sm leading-5">{s.icon}</span>
          <div className="flex-1 min-w-0">
            <div className={`text-xs font-bold font-mono ${s.text}`}>{c.name}</div>
            <div className="text-[10px] text-slate-700">{c.detail}</div>
            <div className={`text-[10px] mt-0.5 ${s.text}`}>↳ {c.reason}</div>
          </div>
        </div>
      );
    }

    function ClientList({ clients }) {
      return (
        <div className="mt-2 rounded-lg border-2 border-yellow-200 bg-white p-2">
          <div className="text-[10px] font-bold text-yellow-800 mb-1.5">👥 클라이언트 접근 결과</div>
          <div className="space-y-1">
            {clients.map((c, i) => (
              <ClientRow key={i} c={c} />
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 최종 완성 박스 (Step 5)
    // ─────────────────────────────────────────────────────
    function FinalBox({ box }) {
      if (!box) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-yellow-500 bg-gradient-to-br from-yellow-50 to-amber-50 p-4">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl">🔒</span>
            <span className="text-lg font-bold text-yellow-800">{box.title}</span>
          </div>
          <ul className="space-y-1.5">
            {box.features.map((f, i) => (
              <li key={i} className="text-sm text-yellow-900 flex gap-2">
                <span className="text-yellow-600 mt-0.5">✓</span>
                <span>{f}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 경고/알림 박스
    // ─────────────────────────────────────────────────────
    const ALERT_STYLE = {
      info:   { bg: 'bg-yellow-50',  border: 'border-yellow-300',  text: 'text-yellow-900',  icon: '💡' },
      warn:   { bg: 'bg-amber-50',   border: 'border-amber-300',   text: 'text-amber-900',   icon: '⚠️' },
      danger: { bg: 'bg-red-50',     border: 'border-red-300',     text: 'text-red-900',     icon: '🚨' },
      good:   { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-900', icon: '✅' },
    };

    function AlertBox({ alert }) {
      if (!alert) return null;
      const s = ALERT_STYLE[alert.tone] || ALERT_STYLE.info;
      return (
        <div className={`mt-3 rounded-lg border ${s.bg} ${s.border} ${s.text} p-2 text-xs flex gap-2`}>
          <span>{s.icon}</span>
          <span>{alert.text}</span>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — yellow 톤
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-yellow-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-yellow-800">Kafka 보안 — 계층 누적 + 접근 차단</h3>
            <span className="text-[10px] text-slate-500">계층이 쌓일수록 차단이 늘어난다</span>
          </div>
          <ListenerBox actor={state.actor} listener={state.listener} />
          <div className="mt-3">
            <LayerStack layers={state.layers} />
          </div>
          <ClientList clients={state.clients} />
          <FinalBox box={state.finalBox} />
          <AlertBox alert={state.alert} />
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-yellow-500/15 border-l-2 border-yellow-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-yellow-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-yellow-600 text-white font-bold">K</span>
              <div>
                <h1 className="text-2xl font-bold text-yellow-900">V-1-2. 보안 — SASL / TLS / ACL</h1>
                <p className="text-sm text-yellow-800/80">평문 → TLS → SASL/PLAIN → SASL/SCRAM → ACL : 4계층 보안 누적</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-yellow-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-yellow-600' : 'bg-yellow-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-yellow-700 text-yellow-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-yellow-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-yellow-300 bg-white text-yellow-700 hover:bg-yellow-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-yellow-300 bg-white text-yellow-700 hover:bg-yellow-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-yellow-700 text-white' : 'bg-yellow-600 text-white hover:bg-yellow-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-yellow-300 bg-white text-yellow-700 hover:bg-yellow-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-yellow-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-yellow-400 bg-white px-4 py-3 text-sm text-yellow-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                Kafka 보안은 "한 번에 다 켜는 한 줄 옵션" 이 아니라 <b>TLS(채널)</b> → <b>SASL(인증)</b> → <b>ACL(인가)</b> 의 누적 계층이다.
                평문 9092 클러스터로 시작해도, 인증과 권한이 비어 있으면 "사내라서 괜찮다" 는 가정에 의존하게 된다.
                운영에서는 <code>SASL_SSL + SCRAM-SHA-512 + AclAuthorizer</code> 조합을 기본값으로 두고,
                <code>allow.everyone.if.no.acl.found=false</code> 로 "기본 차단 + 명시적 허용" 정책을 적용한다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Kafka', '보안', 'TLS', 'SASL', 'PLAIN', 'SCRAM', 'ACL', 'AclAuthorizer', '최소권한', '감사로그'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-800 border border-yellow-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-yellow-700">
              <a href="../index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./V-1-3.html" className="underline hover:no-underline">다음: V-1-3 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
