        code: {
          lang: 'markdown',
          filename: 'summary.md',
          lines: [
            '# Step 5. 운영 출항 점검표 — 48 항목 종합 요약',
            '',
            '## 4축 점수표',
            '',
            '| 축 | 항목 수 | 통과 | 책임자 | 검증 도구 |',
            '|:--|:--:|:--:|:--|:--|',
            '| Reliability   | 12 | 12 / 12 | 플랫폼팀 | server.properties, producer/consumer 설정 |',
            '| Throughput    | 12 | 12 / 12 | 플랫폼팀 | jstat, iostat, kafka-producer-perf-test |',
            '| Observability | 12 | 12 / 12 | SRE     | JMX exporter, Prometheus, Grafana |',
            '| Security      | 12 | 12 / 12 | SecOps  | TLS, SASL, ACL, audit log |',
            '| **합계**      | **48** | **48 / 48** | — | — |',
            '',
            '## 사용 방법',
            '',
            '1. 토픽 생성 PR — 변경된 축에 대해 해당 항목 다시 체크',
            '2. 분기마다 — 4축 전체 항목 회고 (lag / 보안 / 비용 / 안정성)',
            '3. 사고 후 — 어떤 항목이 막을 수 있었는지 root cause 추가',
            '4. 새 broker 투입 / 버전 업그레이드 시 — 전체 항목 재검토',
            '',
            '## 누적 점검 시 주의',
            '',
            '- 한 번에 48개 모두 통과시키려 하지 말 것',
            '- "지금 띄울 클러스터"의 우선순위 항목부터',
            '- 통과 못한 항목은 "TBD"가 아니라 "Owner + Due"로 명시',
            '- 체크리스트 자체를 git으로 버전 관리 (markdown + PR review)',
            '',
            '## 4축의 우선순위',
            '',
            '> Reliability > Security > Observability > Throughput',
            '> 처리량은 늘릴 수 있어도, 잃은 메시지는 못 되찾는다.',
            '> 안 보이는 시스템은 잘못된 시스템보다 위험하다.',
            '',
            '## 다음 단계 (V-2-3)',
            '',
            '운영 단계로 넘어가면:',
            '- 멀티 데이터센터 복제 (MirrorMaker 2, Cluster Linking)',
            '- KRaft 전환 (ZooKeeper 제거)',
            '- Tiered Storage (장기 보관 비용 절감)',
            '- 토픽 자동화 / GitOps (Strimzi, KafkaTopic CR)',
            '',
            '## 마지막으로',
            '',
            '> Kafka 운영은 정답이 하나가 아니다.',
            '> 다만 "체크하지 않은 항목"이 곧 사고 시나리오가 된다.',
            '> 출항 전 48 항목은 우리 팀의 "최소 기준선"일 뿐,',
            '> 운영하면서 항목은 늘어나야 하고, 가끔은 줄어야 한다.',
          ],
          highlight: [4, 5, 6, 7, 8, 9, 10, 11, 14, 15, 16, 17, 18, 23, 24, 25, 26, 30, 31, 32, 37, 38, 39, 40, 45, 46, 47, 48],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — yellow 톤
    //   4축 카드 + 각 축마다 12 항목 누적 체크 표시
    // ─────────────────────────────────────────────────────
    const AXIS_COLORS = {
      reliability:   { bg: 'bg-yellow-50', border: 'border-yellow-400', text: 'text-yellow-800', bar: 'bg-yellow-500' },
      throughput:    { bg: 'bg-amber-50',  border: 'border-amber-400',  text: 'text-amber-800',  bar: 'bg-amber-500' },
      observability: { bg: 'bg-yellow-50', border: 'border-yellow-500', text: 'text-yellow-900', bar: 'bg-yellow-600' },
      security:      { bg: 'bg-amber-50',  border: 'border-amber-500',  text: 'text-amber-900',  bar: 'bg-amber-600' },
    };

    function AxisCard({ axis, isActive, isDone }) {
      const c = AXIS_COLORS[axis.id];
      const stateLabel = isDone ? '12/12 ✓' : isActive ? '체크중...' : '대기';
      return (
        <div className={`rounded-lg border-2 ${c.border} ${isActive ? c.bg : 'bg-white'} p-3 transition`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-2">
              <span className="text-xl">{axis.icon}</span>
              <span className={`text-sm font-bold ${c.text}`}>{axis.title}</span>
            </div>
            <span className={`text-[10px] px-2 py-0.5 rounded font-mono ${isDone ? 'bg-yellow-600 text-white' : isActive ? 'bg-yellow-200 text-yellow-900' : 'bg-slate-100 text-slate-500'}`}>
              {stateLabel}
            </span>
          </div>
          <div className="text-[10px] text-slate-500 mb-2">{axis.desc}</div>
          <ul className="space-y-0.5 max-h-44 overflow-y-auto pr-1">
            {axis.items.map((it, i) => {
              const checked = isDone || isActive;
              return (
                <li key={i} className="text-[10px] flex items-start gap-1.5">
                  <span className={`mt-0.5 ${checked ? 'text-yellow-600' : 'text-slate-300'}`}>
                    {checked ? '✓' : '○'}
                  </span>
                  <span className={checked ? c.text : 'text-slate-400'}>{it}</span>
                </li>
              );
            })}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ step, stepIdx }) {
      // 누적 통과 항목 진행률
      const total = AXES.length * 12; // 48
      const accumulated = step.accumulated;
      const percent = Math.round((accumulated / total) * 100);

      // 어떤 축이 활성/완료 상태인지 계산
      // Step 1~4 : 해당 축이 "이번 단계 활성", 이전 축들은 "완료"
      // Step 5   : 모든 축 완료
      const axisStatus = AXES.map((ax) => {
        if (step.activeAxis === 'all') return { isActive: false, isDone: true };
        if (ax.id === step.activeAxis) return { isActive: true, isDone: false };
        // 이전 단계에서 이미 통과한 축인지 확인
        const idxInSteps = STEPS.findIndex((s) => s.activeAxis === ax.id);
        return { isActive: false, isDone: idxInSteps !== -1 && idxInSteps < stepIdx };
      });

      return (
        <div className="rounded-xl border border-yellow-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-yellow-800">Kafka 운영 출항 점검표 — 4축 × 12 항목</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 누적 체크 상태</span>
          </div>

          {/* 누적 진행률 */}
          <div className="mb-3 rounded-lg border border-yellow-300 bg-yellow-50 p-2">
            <div className="flex items-center justify-between text-xs font-bold text-yellow-800 mb-1">
              <span>누적 통과</span>
              <span>{accumulated} / {total} ({percent}%)</span>
            </div>
            <div className="h-2 w-full rounded-full bg-yellow-100 overflow-hidden">
              <div
                className="h-full bg-gradient-to-r from-yellow-500 to-amber-500 transition-all duration-500"
                style={{ width: `${percent}%` }}
              />
            </div>
          </div>

          {/* 4축 카드 그리드 */}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 flex-1 overflow-auto">
            {AXES.map((ax, i) => (
              <AxisCard
                key={ax.id}
                axis={ax}
                isActive={axisStatus[i].isActive}
                isDone={axisStatus[i].isDone}
              />
            ))}
          </div>

          <div className="mt-3 text-xs text-yellow-900 bg-yellow-50 border border-yellow-200 rounded p-2">
            💡 {step.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    //   5탭 — reliability / throughput / observability / security / summary
    // ─────────────────────────────────────────────────────
    function CodeViewer({ stepIdx, total }) {
      const codeRef = useRef(null);
      const code = STEPS[stepIdx].code;

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 5탭 헤더 */}
          <div className="flex items-center gap-0 bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {STEPS.map((s, i) => {
              const isActive = i === stepIdx;
              return (
                <div
                  key={i}
                  className={`px-3 py-2 text-[10px] font-mono whitespace-nowrap border-r border-slate-700 ${
                    isActive
                      ? 'bg-[#282c34] text-yellow-300 border-t-2 border-t-yellow-400'
                      : 'bg-slate-900 text-slate-500'
                  }`}
                >
                  {s.code.filename}
                </div>
              );
            })}
          </div>

          {/* 파일명 바 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>

          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-yellow-500/15 border-l-2 border-yellow-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>

          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동재생 3초/단계
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-yellow-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-yellow-600 text-white font-bold">V</span>
              <div>
                <h1 className="text-2xl font-bold text-yellow-900">V-2-2. 실전 체크리스트 — 운영 출항 점검표</h1>
                <p className="text-sm text-yellow-800/80">Reliability / Throughput / Observability / Security — 4축 × 12 = 48 항목</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-yellow-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-yellow-600' : 'bg-yellow-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-yellow-700 text-yellow-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-yellow-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 — 4버튼 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-yellow-300 bg-white text-yellow-700 hover:bg-yellow-50"
                aria-label="처음으로"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-yellow-300 bg-white text-yellow-700 hover:bg-yellow-50 disabled:opacity-40"
                aria-label="이전 단계"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-yellow-700 text-white' : 'bg-yellow-600 text-white hover:bg-yellow-700'}`}
                aria-pressed={playing}
                aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-yellow-300 bg-white text-yellow-700 hover:bg-yellow-50 disabled:opacity-40"
                aria-label="다음 단계"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-yellow-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-yellow-400 bg-white px-4 py-3 text-sm text-yellow-900">
                <div className="font-bold mb-1">✅ 출항 준비 완료 — 48 / 48</div>
                Reliability · Throughput · Observability · Security 4축의 48개 항목을 모두 점검했다. 이 체크리스트는 토픽 생성 PR마다, 분기 회고마다, 사고 회고마다 갱신되는 살아있는 문서로 운영해야 한다. 다음 챕터(V-2-3)에서는 멀티 DC 복제(MirrorMaker 2 / Cluster Linking), KRaft 전환, Tiered Storage, GitOps 운영을 다룬다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Kafka', '체크리스트', 'replication', 'min.insync', 'acks', 'idempotence', 'batch', 'linger', 'snappy', 'lz4', 'JMX', 'lag', 'TLS', 'SASL', 'ACL', 'runbook'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-800 border border-yellow-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-yellow-700">
              <a href="../index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="../index.html" className="underline hover:no-underline">↻ Kafka 학습 완료. 챕터 목록으로 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
