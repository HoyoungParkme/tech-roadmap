            '## 시나리오',
            '- 4-broker → 3-broker 로 축소 (broker 3 회수)',
            '- broker 3 위의 모든 partition 을 1, 2, 4 로 이동',
            '- 무중단, replication factor 유지',
            '',
            '## 절대 하면 안 되는 것',
            '- ❌ broker 3 process 를 바로 kill',
            '  → 그 broker 가 leader 였던 partition 은 자동으로 다른 replica 가 승격되지만',
            '  → broker 3 에만 있는 replica 가 있었다면 under-replicated 발생',
            '  → RF 가 임시로 줄어들어 데이터 손실 위험',
            '',
            '## 올바른 순서',
            '',
            '### 1) topic 목록 추출',
            '',
            '    bin/kafka-topics.sh --bootstrap-server kafka-1:9092 --list',
            '',
            '### 2) reassign 계획 생성 (broker-list 에 3 제외)',
            '',
            '    cat > all-topics.json <<EOF',
            '    {',
            '      "topics": [',
            '        { "topic": "topic-A" },',
            '        { "topic": "topic-B" },',
            '        { "topic": "topic-C" }',
            '      ],',
            '      "version": 1',
            '    }',
            '    EOF',
            '',
            '    bin/kafka-reassign-partitions.sh \\',
            '      --bootstrap-server kafka-1:9092 \\',
            '      --topics-to-move-json-file all-topics.json \\',
            '      --broker-list "1,2,4" \\',
            '      --generate > drain-broker-3.txt',
            '',
            '### 3) 실행 + throttle + verify',
            '',
            '    bin/kafka-reassign-partitions.sh \\',
            '      --bootstrap-server kafka-1:9092 \\',
            '      --reassignment-json-file drain-broker-3.json \\',
            '      --throttle 52428800 --execute',
            '',
            '    # 모든 partition 이동 완료까지 --verify 반복',
            '',
            '### 4) broker 3 에 replica 가 0 인지 최종 확인',
            '',
            '    bin/kafka-topics.sh --bootstrap-server kafka-1:9092 \\',
            '      --describe | grep "Replicas:.*3"',
            '    # 결과가 없으면 안전',
            '',
            '### 5) broker 3 process 안전 종료',
            '',
            '    ssh kafka-3 "bin/kafka-server-stop.sh"',
            '',
            '### 6) cluster 메타에서 제거 (KRaft)',
            '',
            '    bin/kafka-metadata-quorum.sh \\',
            '      --bootstrap-server kafka-1:9092 \\',
            '      --command-config admin.properties \\',
            '      describe --status',
            '    # broker 3 이 사라졌는지 확인',
            '',
            '## 운영 체크리스트',
            '- [ ] reassign --verify 통과',
            '- [ ] under-replicated partitions = 0',
            '- [ ] consumer lag 비정상 증가 없음',
            '- [ ] disk usage / network 정상 복귀',
            '- [ ] throttle 자동 해제 확인',
            '',
            '# → 다음: V-2-2 Consumer Group 운영 (offset 관리, lag 모니터링)',
          ],
          highlight: [7, 8, 9, 10, 11, 12, 14, 15, 16, 17, 19, 20, 21, 31, 32, 33, 34, 35, 36, 38, 39, 40, 41, 42, 43, 44, 51, 52, 53, 54, 55, 56, 57, 58, 62, 63, 64, 65, 66, 67, 68],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // Broker 상태 색상
    // ─────────────────────────────────────────────────────
    const BROKER_STATUS = {
      online:    { color: 'bg-emerald-500', text: 'text-emerald-50', label: 'online' },
      joining:   { color: 'bg-yellow-400',  text: 'text-yellow-900', label: 'joining' },
      busy:      { color: 'bg-red-500',     text: 'text-red-50',     label: 'busy 🔥' },
      idle:      { color: 'bg-slate-400',   text: 'text-slate-50',   label: 'idle' },
      moving:    { color: 'bg-amber-500',   text: 'text-amber-50',   label: 'moving →' },
      receiving: { color: 'bg-yellow-500',  text: 'text-yellow-900', label: '← receiving' },
    };

    // ─────────────────────────────────────────────────────
    // Cluster 박스 — broker 카드 + partition 라벨
    // ─────────────────────────────────────────────────────
    function BrokerCard({ broker }) {
      const s = BROKER_STATUS[broker.status] || BROKER_STATUS.online;
      return (
        <div className={`rounded-lg border-2 border-yellow-400 ${s.color} ${s.text} p-2 min-h-[88px] flex flex-col`}>
          <div className="flex items-center justify-between mb-1">
            <span className="text-xs font-bold">broker {broker.id}</span>
            <span className="text-[9px] bg-black/20 px-1.5 py-0.5 rounded">{s.label}</span>
          </div>
          <div className="flex flex-wrap gap-1 mt-1">
            {broker.partitions.length === 0 ? (
              <span className="text-[10px] italic opacity-80">(partition 없음)</span>
            ) : (
              broker.partitions.map((p, i) => (
                <span
                  key={i}
                  className="text-[10px] font-mono bg-white/90 text-slate-800 px-1.5 py-0.5 rounded border border-white"
                >{p}</span>
              ))
            )}
          </div>
        </div>
      );
    }

    function ClusterBox({ brokers, actor, removedBroker }) {
      return (
        <div className="rounded-lg border-2 border-yellow-400 bg-white overflow-hidden">
          <div className="bg-gradient-to-r from-yellow-500 to-amber-500 text-white px-3 py-1.5 text-xs font-bold flex items-center gap-2">
            <span>🌽</span>
            <span>Kafka Cluster (topic-A · 6 partitions · RF=2)</span>
            <span className="ml-auto text-[10px] bg-white/20 px-2 py-0.5 rounded">{actor}</span>
          </div>
          <div className="p-3 bg-yellow-50/50">
            <div className="grid grid-cols-2 gap-2">
              {brokers.map((b) => <BrokerCard key={b.id} broker={b} />)}
            </div>
            {removedBroker && (
              <div className="mt-2 rounded border border-slate-300 bg-slate-100 p-2 text-xs text-slate-600 flex items-center gap-2">
                <span className="line-through font-mono">broker {removedBroker.id}</span>
                <span className="text-emerald-700">{removedBroker.note}</span>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Reassign 계획 표 (Step 3)
    // ─────────────────────────────────────────────────────
    function PlanBox({ plan }) {
      if (!plan) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-amber-300 bg-amber-50 p-3">
          <div className="text-xs font-bold text-amber-800 mb-2">{plan.title}</div>
          <table className="w-full border-collapse">
            <thead>
              <tr className="text-[10px] text-amber-900">
                <th className="text-left py-1 px-2 border border-amber-200 bg-amber-100">partition</th>
                <th className="text-left py-1 px-2 border border-amber-200 bg-amber-100">현재 replica</th>
                <th className="text-left py-1 px-2 border border-amber-200 bg-amber-100">제안 replica</th>
              </tr>
            </thead>
            <tbody>
              {plan.rows.map((r, i) => {
                const changed = r.from !== r.to;
                return (
                  <tr key={i}>
                    <td className="text-[10px] font-mono font-bold text-amber-900 px-2 py-1 border border-amber-100">{r.p}</td>
                    <td className={`text-[10px] font-mono px-2 py-1 border border-amber-100 ${changed ? 'text-slate-500 line-through' : 'text-slate-700'}`}>{r.from}</td>
                    <td className={`text-[10px] font-mono px-2 py-1 border border-amber-100 font-bold ${changed ? 'text-emerald-700 bg-emerald-50' : 'text-slate-700'}`}>{r.to}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 진행률 바 (Step 4)
    // ─────────────────────────────────────────────────────
    function ProgressBox({ progress }) {
      if (!progress) return null;
      const pct = Math.round((progress.current / progress.total) * 100);
      return (
        <div className="mt-3 rounded-lg border-2 border-amber-400 bg-amber-50 p-3">
          <div className="flex items-center justify-between mb-1.5">
            <span className="text-xs font-bold text-amber-800">{progress.label}</span>
            <span className="text-[11px] font-mono text-amber-700">{pct}%</span>
          </div>
          <div className="w-full bg-white rounded-full h-2.5 overflow-hidden border border-amber-200">
            <div
              className="bg-gradient-to-r from-yellow-400 to-amber-500 h-2.5 transition-all"
              style={{ width: `${pct}%` }}
            />
          </div>
          <div className="text-[10px] text-amber-700 mt-1.5">throttle = 50 MB/s · URP 모니터링 중</div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 운영 원칙 박스 (Step 5)
    // ─────────────────────────────────────────────────────
    function OpsSummaryBox({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-yellow-500 bg-gradient-to-br from-yellow-50 to-amber-50 p-4">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl">🌽</span>
            <span className="text-lg font-bold text-yellow-800">{summary.title}</span>
          </div>
          <ul className="space-y-1.5">
            {summary.items.map((f, i) => (
              <li key={i} className="text-sm text-yellow-900 flex gap-2">
                <span className="text-yellow-500 mt-0.5">✓</span>
                <span>{f}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 경고/알림 박스
    // ─────────────────────────────────────────────────────
    const ALERT_STYLE = {
      info:   { bg: 'bg-yellow-50',  border: 'border-yellow-300',  text: 'text-yellow-900',  icon: '💡' },
      warn:   { bg: 'bg-amber-50',   border: 'border-amber-300',   text: 'text-amber-900',   icon: '⚠️' },
      danger: { bg: 'bg-red-50',     border: 'border-red-300',     text: 'text-red-900',     icon: '🚨' },
      good:   { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-900', icon: '✅' },
    };

    function AlertBox({ alert }) {
      if (!alert) return null;
      const s = ALERT_STYLE[alert.tone] || ALERT_STYLE.info;
      return (
        <div className={`mt-3 rounded-lg border ${s.bg} ${s.border} ${s.text} p-2 text-xs flex gap-2`}>
          <span>{s.icon}</span>
          <span>{alert.text}</span>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — yellow 톤
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-yellow-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-yellow-800">Kafka Cluster — broker / partition 분포</h3>
            <span className="text-[10px] text-slate-500">색상 = 상태</span>
          </div>
          <ClusterBox
            brokers={state.brokers}
            actor={state.actor}
            removedBroker={state.removedBroker}
          />
          <PlanBox plan={state.plan} />
          <ProgressBox progress={state.progress} />
          <OpsSummaryBox summary={state.opsSummary} />
          <AlertBox alert={state.alert} />
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-yellow-500/20 border-l-2 border-yellow-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-yellow-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-yellow-600 text-white font-bold">K</span>
              <div>
                <h1 className="text-2xl font-bold text-yellow-900">V-2-1. Cluster 운영 — broker 추가/제거 + 파티션 재분배</h1>
                <p className="text-sm text-yellow-800/80">broker 추가 → 자동 재분배 안 됨 → reassign 계획 → throttle 실행 → broker 제거</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-yellow-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-yellow-600' : 'bg-yellow-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-yellow-700 text-yellow-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-yellow-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                aria-label="처음으로"
                className="px-3 py-1.5 text-xs rounded border border-yellow-300 bg-white text-yellow-700 hover:bg-yellow-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 text-xs rounded border border-yellow-300 bg-white text-yellow-700 hover:bg-yellow-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                aria-pressed={playing}
                aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-yellow-700 text-white' : 'bg-yellow-600 text-white hover:bg-yellow-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                aria-label="다음 단계"
                className="px-3 py-1.5 text-xs rounded border border-yellow-300 bg-white text-yellow-700 hover:bg-yellow-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-yellow-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-yellow-400 bg-white px-4 py-3 text-sm text-yellow-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                Kafka cluster 의 broker 토폴로지 변경은 "추가/제거"만 본다고 끝나지 않는다. 핵심은 partition 재분배 — Kafka 는 자동으로 옮기지 않으므로,
                <span className="font-mono">kafka-reassign-partitions.sh</span> 로 generate → 검토 → execute(+throttle) → verify 순서를 반드시 지킨다.
                broker 제거 시에는 데이터를 먼저 옮긴 뒤 process 를 종료해야 무중단/무손실이 보장된다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Kafka', 'Cluster운영', 'broker', 'partition재분배', 'reassign', 'throttle', 'KRaft', '운영자동화'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-800 border border-yellow-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-yellow-700">
              <a href="../index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./V-2-2.html" className="underline hover:no-underline">다음: V-2-2 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
