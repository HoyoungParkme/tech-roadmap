              {consumer.lost.length > 0 && (
                <div className="text-[9px] text-red-700 mt-1">손실: {consumer.lost.join(', ')}</div>
              )}
              {consumer.duplicated.length > 0 && (
                <div className="text-[9px] text-amber-700 mt-1">중복: {consumer.duplicated.join(', ')}</div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 비교 표 박스 (Step 3)
    // ─────────────────────────────────────────────────────
    function CompareBox({ compare }) {
      if (!compare) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-yellow-400 bg-white overflow-hidden">
          <div className="bg-yellow-100 text-yellow-900 px-3 py-1 text-xs font-bold">📊 At-most-once vs At-least-once</div>
          <table className="w-full border-collapse text-xs">
            <thead>
              <tr className="bg-yellow-50">
                <th className="text-left py-1 px-2 border border-yellow-200 text-yellow-800">지표</th>
                <th className="text-left py-1 px-2 border border-yellow-200 text-orange-800">At-most-once</th>
                <th className="text-left py-1 px-2 border border-yellow-200 text-blue-800">At-least-once</th>
              </tr>
            </thead>
            <tbody>
              {compare.rows.map((r, i) => (
                <tr key={i}>
                  <td className="py-1 px-2 border border-yellow-100 font-bold text-yellow-800">{r.metric}</td>
                  <td className="py-1 px-2 border border-yellow-100 font-mono text-orange-900">{r.amo}</td>
                  <td className="py-1 px-2 border border-yellow-100 font-mono text-blue-900">{r.alo}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // EOS 해결 박스 (Step 4)
    // ─────────────────────────────────────────────────────
    function EosBox({ eos }) {
      if (!eos) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-yellow-500 bg-gradient-to-br from-yellow-50 to-amber-50 p-3">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl">🎯</span>
            <span className="text-base font-bold text-yellow-800">{eos.title}</span>
          </div>
          <ul className="space-y-1">
            {eos.features.map((f, i) => (
              <li key={i} className="text-xs text-yellow-900 flex gap-2">
                <span className="text-yellow-600 mt-0.5">★</span>
                <span>{f}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 도메인 매핑 박스 (Step 5)
    // ─────────────────────────────────────────────────────
    function ChooseBox({ choose }) {
      if (!choose) return null;
      const LEVEL_COLOR = {
        'At-most-once': 'bg-orange-100 text-orange-800 border-orange-300',
        'At-least-once + 멱등': 'bg-blue-100 text-blue-800 border-blue-300',
        'Exactly-once': 'bg-yellow-100 text-yellow-800 border-yellow-400',
      };
      return (
        <div className="mt-3 rounded-xl border-2 border-yellow-500 bg-white overflow-hidden">
          <div className="bg-gradient-to-r from-yellow-500 to-amber-500 text-white px-3 py-1.5 text-xs font-bold flex items-center gap-2">
            <span>🧭</span>
            <span>{choose.title}</span>
          </div>
          <table className="w-full border-collapse text-xs">
            <thead>
              <tr className="bg-yellow-50">
                <th className="text-left py-1 px-2 border border-yellow-200 text-yellow-800">도메인</th>
                <th className="text-left py-1 px-2 border border-yellow-200 text-yellow-800">보장 수준</th>
                <th className="text-left py-1 px-2 border border-yellow-200 text-yellow-800">이유</th>
              </tr>
            </thead>
            <tbody>
              {choose.rows.map((r, i) => (
                <tr key={i}>
                  <td className="py-1 px-2 border border-yellow-100 text-yellow-900 font-medium">{r.domain}</td>
                  <td className="py-1 px-2 border border-yellow-100">
                    <span className={`inline-block text-[10px] px-2 py-0.5 rounded border ${LEVEL_COLOR[r.level] || 'bg-slate-100 border-slate-300'}`}>{r.level}</span>
                  </td>
                  <td className="py-1 px-2 border border-yellow-100 text-yellow-800 text-[11px]">{r.why}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 경고/알림 박스
    // ─────────────────────────────────────────────────────
    const ALERT_STYLE = {
      info:   { bg: 'bg-yellow-50',  border: 'border-yellow-300',  text: 'text-yellow-900',  icon: '💡' },
      warn:   { bg: 'bg-amber-50',   border: 'border-amber-300',   text: 'text-amber-900',   icon: '⚠️' },
      danger: { bg: 'bg-red-50',     border: 'border-red-300',     text: 'text-red-900',     icon: '🚨' },
      good:   { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-900', icon: '✅' },
    };

    function AlertBox({ alert }) {
      if (!alert) return null;
      const s = ALERT_STYLE[alert.tone] || ALERT_STYLE.info;
      return (
        <div className={`mt-3 rounded-lg border ${s.bg} ${s.border} ${s.text} p-2 text-xs flex gap-2`}>
          <span>{s.icon}</span>
          <span>{alert.text}</span>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — yellow 톤
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-yellow-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-yellow-800">메시지 전달 보장 흐름</h3>
            <span className="text-[10px] text-slate-500">손실 / 중복 / 정확히 한 번</span>
          </div>
          <FlowBox producer={state.producer} broker={state.broker} consumer={state.consumer} />
          <div className="mt-3 flex-1 overflow-auto">
            <div className="text-[10px] font-bold text-yellow-700 mb-1.5">메시지 단위 흐름</div>
            <ul className="space-y-1.5">
              {state.timeline.map((t) => <TimelineItem key={t.id} item={t} />)}
            </ul>
          </div>
          <CompareBox compare={state.compare} />
          <EosBox eos={state.eosBox} />
          <ChooseBox choose={state.chooseBox} />
          <AlertBox alert={state.alert} />
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-yellow-500/15 border-l-2 border-yellow-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-yellow-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-yellow-600 text-white font-bold">K</span>
              <div>
                <h1 className="text-2xl font-bold text-yellow-900">III-1-1. At-most-once / At-least-once / Exactly-once</h1>
                <p className="text-sm text-yellow-800/80">손실 / 중복 / 정확히 한 번 — 3가지 메시지 전달 보장 수준과 도메인별 선택</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-yellow-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-yellow-600' : 'bg-yellow-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-yellow-700 text-yellow-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-yellow-100/90 leading-relaxed">{step.desc}</p>
              <div className="mt-2 text-[11px] text-yellow-200/90 italic">{step.actor}</div>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                aria-label="처음으로"
                className="px-3 py-1.5 text-xs rounded border border-yellow-300 bg-white text-yellow-700 hover:bg-yellow-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 text-xs rounded border border-yellow-300 bg-white text-yellow-700 hover:bg-yellow-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                aria-pressed={playing}
                aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-yellow-700 text-white' : 'bg-yellow-600 text-white hover:bg-yellow-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                aria-label="다음 단계"
                className="px-3 py-1.5 text-xs rounded border border-yellow-300 bg-white text-yellow-700 hover:bg-yellow-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-yellow-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-yellow-400 bg-white px-4 py-3 text-sm text-yellow-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                Kafka 의 메시지 전달 보장은 도메인 요구사항이 결정한다. 메트릭/로그는 at-most-once, 대부분의 비즈니스 이벤트는 at-least-once + 멱등 컨슈머, 결제/정산처럼 정확성이 결정적일 때만 exactly-once 를 쓴다. 의심되면 ALO 부터 시작하라 — 진짜 필요할 때만 EOS, 메트릭만 AMO 가 베스트 프랙티스다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Kafka', 'DeliverySemantics', 'AtMostOnce', 'AtLeastOnce', 'ExactlyOnce', 'Idempotence', 'Transactions', 'Acks', 'Retries', 'Offset', 'ReadCommitted'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-800 border border-yellow-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-yellow-700">
              <a href="../index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./III-1-2.html" className="underline hover:no-underline">다음: III-1-2 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
