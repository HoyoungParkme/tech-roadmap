        desc: 'Producer가 트랜잭션을 묶어도 Consumer 쪽에서 안 받쳐주면 의미가 없다. 기본값 read_uncommitted Consumer는 아직 commit 안 된 트랜잭션 메시지도 그냥 본다 → 도중에 abort되면 "유령 메시지"가 된다. isolation.level=read_committed로 바꾸면 Broker가 "commit된 트랜잭션의 메시지만" 흘려준다. 이제 Producer + Consumer 양쪽이 합쳐져 진정한 Exactly-Once Semantics가 완성된다.',
        producerCfg: {
          'transactional.id': 'order-producer-1',
          'phase': 'COMMITTED',
        },
        pipeline: [
          { id: 'r1', key: 'orders → A1',    seq: 1, status: 'committed', note: 'read_committed Consumer 에게 보임' },
          { id: 'r2', key: 'orders → A2',    seq: 2, status: 'pending',   note: '아직 미커밋 → 안 보임' },
          { id: 'r3', key: 'orders → A3',    seq: 3, status: 'aborted',   note: 'abort 됨 → 평생 안 보임' },
        ],
        txnState: { phase: 'eos', label: 'Exactly-Once Semantics 활성 — Producer ⊕ Consumer 동시 보장' },
        consumerCfg: {
          'isolation.level': 'read_committed',
          'group.id': 'orders-processor',
          'enable.auto.commit': 'false',
        },
        eosBox: {
          title: 'Exactly-Once Semantics — 3가지가 동시에 켜져야 한다',
          features: [
            'Producer: enable.idempotence=true (재시도 중복 차단)',
            'Producer: transactional.id 부여 (여러 토픽 원자적 묶기)',
            'Consumer: isolation.level=read_committed (미커밋/abort 메시지 차단)',
            'Consumer: enable.auto.commit=false + sendOffsetsToTransaction (consume→produce 패턴)',
            '결과: 메시지가 "정확히 한 번" 처리되고, 절반 상태는 절대 노출되지 않는다',
          ],
        },
        alert: { tone: 'good', text: 'EOS 완성. read_committed Consumer 는 abort 된 메시지를 평생 보지 못한다.' },
        code: {
          lang: 'python',
          filename: 'read-committed.py',
          lines: [
            '"""',
            'kafka/read-committed.py',
            '',
            '목적: Consumer 측에서 트랜잭션 메시지만 읽도록 격리 수준 설정',
            '',
            '핵심 설정:',
            '    isolation.level=read_committed 이면',
            '    - commit 된 트랜잭션 메시지만 받는다',
            '    - 아직 진행 중인 트랜잭션 메시지는 건너뛴다',
            '    - abort 된 트랜잭션 메시지는 절대 보이지 않는다',
            '',
            '주요 의존성:',
            '    - confluent-kafka-python >= 2.0',
            '"""',
            'from confluent_kafka import Consumer',
            '',
            '',
            'consumer_config = {',
            '    "bootstrap.servers": "localhost:9092",',
            '    "group.id": "orders-processor",',
            '',
            '    # 핵심: 트랜잭션이 commit 된 메시지만 받는다',
            '    # 기본값은 "read_uncommitted" 이라 abort 된 메시지까지 본다 → 위험',
            '    "isolation.level": "read_committed",',
            '',
            '    # EOS 패턴에서는 수동 commit 이 정석',
            '    "enable.auto.commit": False,',
            '',
            '    "auto.offset.reset": "earliest",',
            '}',
            '',
            'consumer = Consumer(consumer_config)',
            'consumer.subscribe(["orders"])',
            '',
            '',
            'def process_committed_orders() -> None:',
            '    """commit 된 주문만 처리한다 — 절반 상태는 결코 보이지 않는다"""',
            '    try:',
            '        while True:',
            '            msg = consumer.poll(timeout=1.0)',
            '            if msg is None:',
            '                continue',
            '            if msg.error():',
            '                print(f"[에러] {msg.error()}")',
            '                continue',
            '',
            '            # 이 시점에서 받은 msg 는 반드시',
            '            #   - Producer 가 commit_transaction() 을 호출한 메시지',
            '            #   - 또는 트랜잭션 없이 보낸 일반 메시지',
            '            # abort 된 메시지는 절대 여기까지 오지 않는다',
            '            print(',
            '                f"[처리] partition={msg.partition()} "',
            '                f"offset={msg.offset()} key={msg.key()} value={msg.value()}"',
            '            )',
            '',
            '            # 비즈니스 로직 처리 후 수동 commit',
            '            consumer.commit(msg, asynchronous=False)',
            '',
            '    finally:',
            '        consumer.close()',
            '',
            '',
            'if __name__ == "__main__":',
            '    process_committed_orders()',
            '    # → Producer 가 abort 한 메시지는 이 Consumer 로 절대 들어오지 않는다',
            '    # → Producer + Consumer 양쪽 설정이 합쳐져 EOS 가 완성된다',
          ],
          highlight: [22, 23, 24, 26, 27, 46, 47, 48, 49, 50, 51, 52, 53, 56, 57],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 메시지 상태별 색상
    // ─────────────────────────────────────────────────────
    const STATUS_STYLE = {
      pending:   { bg: 'bg-yellow-50',   border: 'border-yellow-300',  text: 'text-yellow-800',  icon: '⏳', label: 'PENDING' },
      sent:      { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-800', icon: '✓',  label: 'SENT' },
      duplicate: { bg: 'bg-red-50',      border: 'border-red-300',     text: 'text-red-800',     icon: '🚫', label: 'DUPLICATE BLOCKED' },
      committed: { bg: 'bg-emerald-50',  border: 'border-emerald-400', text: 'text-emerald-900', icon: '✓',  label: 'COMMITTED' },
      aborted:   { bg: 'bg-slate-100',   border: 'border-slate-400',   text: 'text-slate-600',   icon: '✗',  label: 'ABORTED (hidden)' },
    };

    // ─────────────────────────────────────────────────────
    // Producer → Broker 파이프라인 mock
    // ─────────────────────────────────────────────────────
    function MessageRow({ msg }) {
      const s = STATUS_STYLE[msg.status] || STATUS_STYLE.pending;
      return (
        <div className={`flex items-center gap-2 rounded border ${s.bg} ${s.border} px-2 py-1.5`}>
          <span className="text-base">{s.icon}</span>
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2">
              <span className={`text-xs font-mono font-bold ${s.text}`}>{msg.key}</span>
              <span className="text-[10px] text-slate-500 font-mono">seq={msg.seq}</span>
            </div>
            <div className="text-[10px] text-slate-600 truncate">{msg.note}</div>
          </div>
          <span className={`text-[10px] font-bold ${s.text} whitespace-nowrap`}>{s.label}</span>
        </div>
      );
    }

    function PipelineBox({ producerCfg, pipeline }) {
      return (
        <div className="rounded-lg border-2 border-yellow-400 bg-white overflow-hidden">
          <div className="bg-gradient-to-r from-yellow-500 to-amber-500 text-white px-3 py-1.5 text-xs font-bold flex items-center gap-2">
            <span>🟡</span>
            <span>Producer → Broker (mock)</span>
            <span className="ml-auto text-[10px] bg-white/20 px-2 py-0.5 rounded">메시지 흐름</span>
          </div>

          {/* Producer 설정 */}
          {producerCfg && (
            <div className="px-3 py-2 bg-yellow-50 border-b border-yellow-200">
              <div className="text-[10px] font-bold text-yellow-800 mb-1">Producer 설정</div>
              <div className="grid grid-cols-2 gap-x-3 gap-y-0.5">
                {Object.entries(producerCfg).map(([k, v]) => (
                  <div key={k} className="text-[10px] font-mono flex gap-1">
                    <span className="text-yellow-700">{k}:</span>
                    <span className="text-slate-800 font-bold truncate">{String(v)}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* 파이프라인 */}
          <div className="p-2 space-y-1">
            {pipeline.map((m) => (
              <MessageRow key={m.id} msg={m} />
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 트랜잭션 상태 박스
    // ─────────────────────────────────────────────────────
    const TXN_STYLE = {
      ready:     { bg: 'bg-yellow-50',  border: 'border-yellow-400',  text: 'text-yellow-900',  icon: '🟡' },
      started:   { bg: 'bg-amber-50',   border: 'border-amber-400',   text: 'text-amber-900',   icon: '⚙️' },
      committed: { bg: 'bg-emerald-50', border: 'border-emerald-400', text: 'text-emerald-900', icon: '✅' },
      aborted:   { bg: 'bg-red-50',     border: 'border-red-400',     text: 'text-red-900',     icon: '⛔' },
      eos:       { bg: 'bg-emerald-50', border: 'border-emerald-500', text: 'text-emerald-900', icon: '🛡️' },
    };

    function TxnStateBox({ txnState }) {
      if (!txnState) return null;
      const s = TXN_STYLE[txnState.phase] || TXN_STYLE.ready;
      return (
        <div className={`mt-3 rounded-lg border-2 ${s.bg} ${s.border} px-3 py-2 flex items-center gap-2`}>
          <span className="text-xl">{s.icon}</span>
          <span className={`text-xs font-bold ${s.text}`}>{txnState.label}</span>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Consumer 설정 박스 (Step 5)
    // ─────────────────────────────────────────────────────
    function ConsumerBox({ consumerCfg }) {
      if (!consumerCfg) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-amber-400 bg-white overflow-hidden">
          <div className="bg-gradient-to-r from-amber-500 to-yellow-500 text-white px-3 py-1.5 text-xs font-bold flex items-center gap-2">
            <span>📥</span>
            <span>Consumer 설정</span>
          </div>
          <div className="p-2 grid grid-cols-1 gap-y-0.5">
            {Object.entries(consumerCfg).map(([k, v]) => (
              <div key={k} className="text-[11px] font-mono flex gap-2">
                <span className="text-amber-700 font-bold">{k}:</span>
                <span className="text-slate-800">{String(v)}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // EOS 정리 박스 (Step 5)
    // ─────────────────────────────────────────────────────
    function EosBox({ eos }) {
      if (!eos) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-yellow-500 bg-gradient-to-br from-yellow-50 to-amber-50 p-4">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl">🟡</span>
            <span className="text-lg font-bold text-amber-900">{eos.title}</span>
          </div>
          <ul className="space-y-1.5">
            {eos.features.map((f, i) => (
              <li key={i} className="text-sm text-amber-900 flex gap-2">
                <span className="text-yellow-600 mt-0.5">✓</span>
                <span>{f}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 경고/알림 박스
    // ─────────────────────────────────────────────────────
    const ALERT_STYLE = {
      info:   { bg: 'bg-yellow-50',  border: 'border-yellow-300',  text: 'text-yellow-900',  icon: '💡' },
      warn:   { bg: 'bg-amber-50',   border: 'border-amber-300',   text: 'text-amber-900',   icon: '⚠️' },
      danger: { bg: 'bg-red-50',     border: 'border-red-300',     text: 'text-red-900',     icon: '🚨' },
      good:   { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-900', icon: '✅' },
    };

    function AlertBox({ alert }) {
      if (!alert) return null;
      const s = ALERT_STYLE[alert.tone] || ALERT_STYLE.info;
      return (
        <div className={`mt-3 rounded-lg border ${s.bg} ${s.border} ${s.text} p-2 text-xs flex gap-2`}>
          <span>{s.icon}</span>
          <span>{alert.text}</span>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — yellow 톤
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-yellow-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-amber-900">Producer → Broker — 중복 차단 & 트랜잭션</h3>
            <span className="text-[10px] text-slate-500">초록=커밋 · 빨강=중복 · 회색=abort</span>
          </div>
          <PipelineBox producerCfg={state.producerCfg} pipeline={state.pipeline} />
          <TxnStateBox txnState={state.txnState} />
          <ConsumerBox consumerCfg={state.consumerCfg} />
          <EosBox eos={state.eosBox} />
          <AlertBox alert={state.alert} />
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-yellow-500/15 border-l-2 border-yellow-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-yellow-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-yellow-500 text-white font-bold">K</span>
              <div>
                <h1 className="text-2xl font-bold text-amber-900">III-1-2. Idempotent Producer + Transactions</h1>
                <p className="text-sm text-amber-800/80">중복 차단(PID+seq) → 트랜잭션(transactional.id) → commit/abort → read_committed</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-amber-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-yellow-500' : 'bg-yellow-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-amber-700 text-yellow-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-yellow-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                aria-label="처음으로"
                className="px-3 py-1.5 text-xs rounded border border-yellow-400 bg-white text-amber-800 hover:bg-yellow-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 text-xs rounded border border-yellow-400 bg-white text-amber-800 hover:bg-yellow-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                aria-pressed={playing}
                aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-amber-700 text-white' : 'bg-yellow-500 text-white hover:bg-amber-600'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                aria-label="다음 단계"
                className="px-3 py-1.5 text-xs rounded border border-yellow-400 bg-white text-amber-800 hover:bg-yellow-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-amber-700/70 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-yellow-500 bg-white px-4 py-3 text-sm text-amber-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                Kafka의 Exactly-Once Semantics 는 한 번에 켜지는 마법이 아니다 — <b>Idempotent Producer(중복 차단)</b> + <b>Transactional Producer(원자성)</b> + <b>read_committed Consumer(격리)</b> 세 가지가 합쳐져야 한다.
                Producer 한쪽만 켜면 Consumer가 중간 상태를 보고, Consumer만 켜면 Producer가 중복을 만든다. 다음 절에서는 이 패턴이 실패할 수 있는 시나리오와 트레이드오프를 다룬다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Kafka', 'EOS', 'ExactlyOnce', 'Idempotent', 'Transactions', 'PID', 'SequenceNumber', 'TransactionalId', 'ReadCommitted', 'Fencing'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-yellow-100 text-amber-800 border border-yellow-300">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-amber-700">
              <a href="../index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./III-1-3.html" className="underline hover:no-underline">다음: III-1-3 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
