    // ─────────────────────────────────────────────────────
    // 4 서비스 체인 박스 — 좌측 LiveDataPane 의 핵심

    const STATUS_STYLE = {
      ok:      { bg: 'bg-emerald-50', border: 'border-emerald-400', text: 'text-emerald-800', icon: '✓', label: 'OK' },
      slow:    { bg: 'bg-amber-50',   border: 'border-amber-400',   text: 'text-amber-800',   icon: '⏱', label: 'SLOW' },
      fail:    { bg: 'bg-red-50',     border: 'border-red-500',     text: 'text-red-800',     icon: '✗', label: 'FAIL' },
      queued:  { bg: 'bg-yellow-50',  border: 'border-yellow-500',  text: 'text-yellow-900',  icon: '📥', label: 'QUEUED' },
      pending: { bg: 'bg-slate-50',   border: 'border-slate-300',   text: 'text-slate-700',   icon: '⏳', label: 'PENDING' },

    function ServiceBox({ svc }) {
      const s = STATUS_STYLE[svc.status] || STATUS_STYLE.ok;
      return (
        <div className={`rounded-lg border-2 ${s.bg} ${s.border} px-2 py-1.5 flex-1 min-w-0`}>
          <div className={`text-[10px] font-bold ${s.text} flex items-center gap-1`}>

          </div>
          <div className="text-[10px] text-slate-600 truncate mt-0.5">{svc.role}</div>
          {svc.latencyMs > 0 && (
            <div className={`text-[10px] font-mono mt-0.5 ${svc.latencyMs > 1000 ? 'text-red-700 font-bold' : 'text-slate-700'}`}>
              {svc.latencyMs} ms
            </div>
          )}
        </div>
      );
    }

    function ChainArrow({ mode, broken }) {
      const color = broken ? 'text-red-500' : mode === 'async' ? 'text-yellow-600' : 'text-yellow-700';
      return (
        <div className={`flex flex-col items-center justify-center px-1 ${color}`}>
          <span className="text-lg leading-none">{broken ? '✗' : '→'}</span>
          <span className="text-[8px] mt-0.5">{mode === 'async' ? 'pub' : 'HTTP'}</span>
        </div>
      );
    }

    function ChainBox({ services, chainMode, totalLatency }) {
      // fail 인 서비스 다음 화살표를 끊긴 것으로 표시
      const failIdx = services.findIndex((s) => s.status === 'fail');
      return (
        <div className="rounded-lg border-2 border-yellow-400 bg-white overflow-hidden">
          <div className="bg-gradient-to-r from-yellow-500 to-amber-500 text-white px-3 py-1.5 text-xs font-bold flex items-center gap-2">
            <span>{chainMode === 'async' ? '📬' : '🔗'}</span>
            <span>{chainMode === 'async' ? 'Kafka 토픽 기반 비동기' : '동기 REST 체인'}</span>
            <span className="ml-auto text-[10px] bg-white/20 px-2 py-0.5 rounded font-mono">
              총 {totalLatency} ms
            </span>
          </div>
          <div className="p-2 flex items-stretch gap-0">
            {services.map((svc, i) => (
              <React.Fragment key={svc.name}>
                <ServiceBox svc={svc} />
                {i < services.length - 1 && (
                  <ChainArrow
                    mode={chainMode}
                    broken={failIdx !== -1 && i >= failIdx}
                  />
                )}
              </React.Fragment>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 회복력 해결 박스 (Step 5)

    function ResilienceBox({ box }) {

    const ALERT_STYLE = {

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — yellow 톤
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-yellow-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-yellow-900">서비스 체인 — {state.chainMode === 'async' ? '비동기 (Kafka)' : '동기 (REST)'}</h3>

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-yellow-400/15 border-l-2 border-yellow-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);

      const step = STEPS[stepIdx];

        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));

      }, []);

          });

                aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-yellow-700 text-white' : 'bg-yellow-500 text-white hover:bg-yellow-600'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>

                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}

            {/* 네비 */}
