        scenarios: [
          { tag: '고처리량 로그/이벤트 파이프라인', pick: 'Kafka',    why: '영속 로그 + 재처리 + 처리량' },
          { tag: '비동기 작업 큐 + 복잡 라우팅',     pick: 'RabbitMQ', why: 'AMQP exchange, ack, DLQ, 우선순위' },
          { tag: 'AWS 서버리스 (Lambda) 환경',       pick: 'SQS',      why: '관리형 + Lambda native 연동' },
          { tag: '멀티 리전 글로벌 + 큐+스트림 동시', pick: 'Pulsar',   why: 'geo-replication + 멀티테넌시' },
        ],
        alert: { tone: 'good', text: '정답은 하나가 아니다. 시나리오 → 도구. 위 4개 매칭표를 자기 시스템에 대입해보자.' },
        code: {
          lang: 'markdown',
          filename: 'choose.md',
          lines: [
            '# 시나리오별 메시지 시스템 선택 가이드',
            '',
            '## 한 줄 정리',
            '- Kafka    : 고처리량 영속 로그 — 데이터 파이프라인의 척추',
            '- RabbitMQ : 라우팅 강한 전통 큐 — 작업 큐 + 복잡 라우팅',
            '- SQS      : 가장 단순한 관리형 큐 — AWS 서버리스의 기본값',
            '- Pulsar   : 멀티테넌시 + 멀티리전 — Kafka 의 차세대 대안',
            '',
            '## 시나리오 → 도구 매칭',
            '- 초당 50만 건 이벤트 로그 수집 → Kafka (대안: Pulsar=멀티 리전 시)',
            '- 이메일/PDF/썸네일 작업 큐 → RabbitMQ (ack/DLQ/우선순위)',
            '- AWS Lambda 비동기 작업 → SQS (native 트리거, 운영 0)',
            '- 마이크로서비스 이벤트 통신 → Kafka(이벤트 소싱) / RabbitMQ(라우팅 복잡)',
            '- 멀티 리전 글로벌 → Pulsar (geo-replication 빌트인)',
            '- 멀티테넌시 SaaS → Pulsar (tenant/namespace 1급)',
            '',
            '## 안티패턴 (하지 말 것)',
            '- Kafka 를 "비동기 작업 큐" 로 → 라우팅/ack/우선순위 약함',
            '- RabbitMQ 를 "이벤트 로그 저장소" 로 → 보존/재처리 약함',
            '- SQS 를 "고처리량 스트림" 으로 → 14일 보존 한계',
            '- Pulsar 를 "단일 리전 작은 서비스" 에 → 운영 오버헤드 과함',
            '',
            '## 결정 트리 (간단 버전)',
            '```',
            '"스트림 + 재처리" 필요?',
            '  yes → 멀티 리전? yes → Pulsar / no → Kafka',
            '  no  → 라우팅 복잡?',
            '          yes → RabbitMQ',
            '          no  → AWS 환경? yes → SQS / no → RabbitMQ',
            '```',
            '',
            '# 끝 — 자기 시나리오를 위 매칭표에 대입해보자',
          ],
          highlight: [4, 5, 6, 7, 10, 11, 12, 13, 14, 15, 18, 19, 20, 21, 24, 25, 26, 27, 28, 29, 30],
        },
      },
    ];

    // 별점 표시 — 1~5 를 ★/☆ 로
    function Stars({ score }) {
      const full = '★'.repeat(score);
      const empty = '☆'.repeat(5 - score);
      return <span className="font-mono text-yellow-700">{full}<span className="text-yellow-300">{empty}</span></span>;
    }

    // 4 도구 카드 그리드 — focus 된 도구 강조
    function ToolCard({ tool, focused, dimmed }) {
      const base = 'rounded-lg border-2 p-2 transition';
      const cls = focused
        ? `${base} border-yellow-500 bg-yellow-50 shadow-md scale-[1.02]`
        : dimmed
        ? `${base} border-yellow-100 bg-white opacity-50`
        : `${base} border-yellow-200 bg-white`;
      return (
        <div className={cls}>
          <div className="flex items-center gap-1.5 mb-1">
            <span className="text-lg">{tool.logo}</span>
            <span className={`text-xs font-bold ${focused ? 'text-yellow-900' : 'text-slate-800'}`}>{tool.name}</span>
          </div>
          <div className={`text-[10px] leading-tight ${focused ? 'text-yellow-800' : 'text-slate-600'}`}>{tool.tag}</div>
        </div>
      );
    }

    function ToolCardGrid({ focus }) {
      const ids = ['kafka', 'rabbitmq', 'sqs', 'pulsar'];
      return (
        <div className="grid grid-cols-2 gap-2">
          {ids.map((id) => (
            <ToolCard
              key={id}
              tool={TOOLS[id]}
              focused={focus === id}
              dimmed={focus !== null && focus !== id}
            />
          ))}
        </div>
      );
    }

    // 비교 매트릭스 — 처리량 / 지연 / 내구성 / 생태계
    const METRIC_LABEL = {
      throughput: '처리량',
      latency: '지연(낮을수록 ★ 많음)',
      durability: '내구성',
      ecosystem: '생태계',
    };

    function MatrixTable({ highlights }) {
      const ids = ['kafka', 'rabbitmq', 'sqs', 'pulsar'];
      const metrics = ['throughput', 'latency', 'durability', 'ecosystem'];
      const set = new Set(highlights || []);
      return (
        <table className="w-full border-collapse text-xs">
          <thead>
            <tr>
              <th className="text-left py-1 px-2 bg-yellow-100 border border-yellow-300 text-yellow-900 text-[11px]">항목</th>
              {ids.map((id) => (
                <th
                  key={id}
                  className={`text-left py-1 px-2 border text-[11px] ${set.has(id) ? 'bg-yellow-200 border-yellow-400 text-yellow-900' : 'bg-yellow-50 border-yellow-200 text-yellow-800'}`}
                >
                  {TOOLS[id].name.replace('Apache ', '').replace('AWS ', '')}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {metrics.map((m) => (
              <tr key={m}>
                <td className="py-1 px-2 border border-yellow-200 bg-white text-slate-700 text-[11px] font-bold">{METRIC_LABEL[m]}</td>
                {ids.map((id) => (
                  <td
                    key={id}
                    className={`py-1 px-2 border text-[11px] ${set.has(id) ? 'bg-yellow-50 border-yellow-400' : 'bg-white border-yellow-200'}`}
                  >
                    <Stars score={TOOLS[id][m]} />
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      );
    }

    // 시나리오 → 도구 매칭표 (Step 5)
    function ScenarioBox({ scenarios }) {
      if (!scenarios) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-yellow-500 bg-gradient-to-br from-yellow-50 to-amber-50 p-3">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-xl">🎯</span>
            <span className="text-sm font-bold text-yellow-900">시나리오 → 도구 매칭</span>
          </div>
          <ul className="space-y-1.5">
            {scenarios.map((s, i) => (
              <li key={i} className="text-[11px] text-yellow-900 flex gap-2 items-start">
                <span className="px-1.5 py-0.5 rounded bg-yellow-600 text-white text-[10px] font-bold whitespace-nowrap">{s.pick}</span>
                <div>
                  <div className="font-bold">{s.tag}</div>
                  <div className="text-yellow-800/80">{s.why}</div>
                </div>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    const ALERT_STYLE = {
      info:   { bg: 'bg-yellow-50',  border: 'border-yellow-300',  text: 'text-yellow-900',  icon: '💡' },
      warn:   { bg: 'bg-amber-50',   border: 'border-amber-300',   text: 'text-amber-900',   icon: '⚠️' },
      danger: { bg: 'bg-red-50',     border: 'border-red-300',     text: 'text-red-900',     icon: '🚨' },
      good:   { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-900', icon: '✅' },
    };

    function AlertBox({ alert }) {
      if (!alert) return null;
      const s = ALERT_STYLE[alert.tone] || ALERT_STYLE.info;
      return (
        <div className={`mt-3 rounded-lg border ${s.bg} ${s.border} ${s.text} p-2 text-xs flex gap-2`}>
          <span>{s.icon}</span>
          <span>{alert.text}</span>
        </div>
      );
    }

    // 좌측 LiveDataPane — yellow 톤
    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-yellow-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-yellow-800">메시지 시스템 4종 비교</h3>
            <span className="text-[10px] text-slate-500">강조 = 현재 단계</span>
          </div>

          {/* 4 도구 카드 그리드 */}
          <ToolCardGrid focus={state.focus} />

          {/* 매트릭스 */}
          <div className="mt-3 rounded-lg border-2 border-yellow-300 overflow-hidden">
            <div className="bg-gradient-to-r from-yellow-500 to-amber-500 text-white px-3 py-1.5 text-xs font-bold flex items-center gap-2">
              <span>📊</span>
              <span>처리량 / 지연 / 내구성 / 생태계 매트릭스</span>
            </div>
            <div className="p-2 bg-white">
              <MatrixTable highlights={state.highlights} />
              {state.matrixNote && (
                <div className="mt-2 text-[10px] text-yellow-800 leading-relaxed">{state.matrixNote}</div>
              )}
            </div>
          </div>

          <ScenarioBox scenarios={state.scenarios} />
          <AlertBox alert={state.alert} />
        </div>
      );
    }

    // 우측 VSCode CodeViewer (highlight.js) — 5탭 자동 전환
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      // 5개 탭 (파일명) — 현재 step 의 filename 과 일치하는 탭이 활성화
      const tabs = STEPS.map((s) => s.code.filename);

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 탭 바 */}
          <div className="flex items-center bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {tabs.map((t, i) => {
              const active = i === stepIdx;
              return (
                <div
                  key={t}
                  className={`px-3 py-1.5 text-[11px] font-mono border-r border-slate-700 whitespace-nowrap ${
                    active ? 'bg-[#282c34] text-yellow-300 border-t-2 border-t-yellow-400' : 'bg-slate-900 text-slate-400'
                  }`}
                >
                  {t}
                </div>
              );
            })}
          </div>
          {/* 신호등 + 파일명 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-yellow-500/15 border-l-2 border-yellow-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // App
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-yellow-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-yellow-600 text-white font-bold">K</span>
              <div>
                <h1 className="text-2xl font-bold text-yellow-900">I-2-1. Kafka vs RabbitMQ vs SQS vs Pulsar</h1>
                <p className="text-sm text-yellow-800/80">메시지 시스템 4종을 비교하고, 시나리오별로 무엇을 고를지 판단한다</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-yellow-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-yellow-600' : 'bg-yellow-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-yellow-700 text-yellow-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-yellow-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                aria-label="처음으로"
                className="px-3 py-1.5 text-xs rounded border border-yellow-300 bg-white text-yellow-700 hover:bg-yellow-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 text-xs rounded border border-yellow-300 bg-white text-yellow-700 hover:bg-yellow-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                aria-pressed={playing}
                aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-yellow-700 text-white' : 'bg-yellow-600 text-white hover:bg-yellow-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                aria-label="다음 단계"
                className="px-3 py-1.5 text-xs rounded border border-yellow-300 bg-white text-yellow-700 hover:bg-yellow-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-yellow-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-yellow-400 bg-white px-4 py-3 text-sm text-yellow-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                Kafka / RabbitMQ / SQS / Pulsar — 같은 "메시지" 카테고리지만 강점이 다르다. Kafka 는 로그 기반 고처리량 스트림, RabbitMQ 는 라우팅 강한 전통 큐,
                SQS 는 AWS 환경의 가장 단순한 관리형 큐, Pulsar 는 멀티 리전/멀티테넌시까지 커버하는 차세대 옵션이다. "최고" 가 아니라 "내 시나리오에 맞는" 도구를 고른다.
                다음 챕터부터는 Kafka 를 직접 깊이 파본다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Kafka', 'RabbitMQ', 'SQS', 'Pulsar', '메시지큐', '스트리밍', 'AMQP', '서버리스', 'GeoReplication', '멀티테넌시'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-800 border border-yellow-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-yellow-700">
              <a href="../index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./I-2-2.html" className="underline hover:no-underline">다음: I-2-2 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
