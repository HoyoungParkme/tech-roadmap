            '| 시나리오 | 직접 호출 | 메시지 큐 |',
            '|:--|:--|:--|',
            '| Consumer 다운 | Producer 에러 폭증 | Producer 정상, 큐만 증가 |',
            '| Consumer 배포  | 다운타임 = 장애     | 무중단, 메시지는 쌓임  |',
            '| Consumer 부활  | 손실분 복구 어려움  | offset 부터 자동 재생  |',
            '| 트래픽 폭주    | Consumer 폭사       | 큐가 흡수, Consumer 무사 |',
            '',
            '## "Decoupling(결합 해제)" 의 진짜 의미',
            '',
            '  시간 결합 해제 → 둘이 동시에 살아있을 필요 없음',
            '  위치 결합 해제 → 서로의 주소를 알 필요 없음',
            '  속도 결합 해제 → 각자의 페이스로 동작',
            '  실패 결합 해제 → 한쪽 실패가 다른 쪽으로 전염 X',
            '',
            '## 한 줄 결론',
            '  → 메시지 큐는 "둘 사이에 시간/공간/속도/실패 라는 4개 결합을 끊는다"',
            '  → 그 결과 = 시스템이 작은 충격에 무너지지 않는다 (회복탄력성)',
            '',
            '# 다음 챕터: 그래서 Kafka 는 다른 큐(RabbitMQ 등)와 뭐가 다른가?',
          ],
          highlight: [6, 8, 9, 10, 11, 14, 16, 18, 19, 20, 21, 26, 27, 28, 29, 30, 33, 34, 35, 36, 40, 41],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 박스 — Producer / Consumer 상태 표시
    // ─────────────────────────────────────────────────────
    const STATUS_BADGE = {
      running:   { label: 'RUNNING',   color: 'bg-emerald-100 text-emerald-800 border-emerald-300' },
      idle:      { label: 'IDLE',      color: 'bg-slate-100 text-slate-700 border-slate-300' },
      consuming: { label: 'CONSUMING', color: 'bg-yellow-100 text-yellow-800 border-yellow-300' },
      burst:     { label: 'BURST',     color: 'bg-red-100 text-red-800 border-red-300' },
      down:      { label: 'DOWN',      color: 'bg-red-100 text-red-800 border-red-300 line-through' },
    };

    function ActorBox({ role, icon, info, accent }) {
      const badge = STATUS_BADGE[info.status] || STATUS_BADGE.idle;
      const isDown = info.status === 'down';
      return (
        <div className={`rounded-lg border-2 ${accent} bg-white overflow-hidden ${isDown ? 'opacity-60' : ''}`}>
          <div className={`px-3 py-1.5 text-xs font-bold flex items-center gap-2 ${accent === 'border-yellow-400' ? 'bg-yellow-100 text-yellow-900' : 'bg-amber-100 text-amber-900'}`}>
            <span className="text-base">{icon}</span>
            <span>{role}</span>
            <span className={`ml-auto text-[10px] px-2 py-0.5 rounded border ${badge.color}`}>{badge.label}</span>
          </div>
          <div className="p-2 space-y-1">
            <div className="text-[11px] text-slate-600">
              <span className="font-semibold text-slate-700">name:</span>{' '}
              <span className="font-mono">{info.name}</span>
            </div>
            <div className="text-[11px] text-slate-600">
              <span className="font-semibold text-slate-700">rate:</span>{' '}
              <span className="font-mono">{info.rate}</span>
            </div>
            <div className="text-[11px] text-slate-600">
              <span className="font-semibold text-slate-700">total:</span>{' '}
              <span className="font-mono">{info.total} msg</span>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Broker 박스 — 큐 시각화 (메시지 누적)
    // ─────────────────────────────────────────────────────
    function BrokerBox({ broker, messages }) {
      const fillPct = Math.min(100, Math.round((broker.queued / broker.capacity) * 100));
      const fillColor =
        fillPct > 80 ? 'bg-red-500' :
        fillPct > 50 ? 'bg-amber-500' :
        'bg-yellow-500';
      return (
        <div className="rounded-lg border-2 border-yellow-500 bg-white overflow-hidden">
          <div className="bg-gradient-to-r from-yellow-500 to-amber-500 text-white px-3 py-1.5 text-xs font-bold flex items-center gap-2">
            <span>📦</span>
            <span>Kafka Broker (Queue)</span>
            <span className="ml-auto text-[10px] bg-white/25 px-2 py-0.5 rounded font-mono">
              {broker.queued} / {broker.capacity}
            </span>
          </div>
          <div className="p-2">
            <div className="text-[11px] text-slate-700 mb-1">
              <span className="font-semibold">topic:</span>{' '}
              <span className="font-mono">{broker.name}</span>
            </div>
            {/* 큐 게이지 */}
            <div className="h-3 w-full rounded bg-slate-200 overflow-hidden">
              <div
                className={`h-full ${fillColor} transition-all duration-500`}
                style={{ width: `${fillPct}%` }}
              />
            </div>
            <div className="text-[10px] text-slate-500 mt-1 mb-2">
              대기 메시지: {broker.queued} 건 ({fillPct}% full)
            </div>
            {/* 메시지 칩 */}
            <div className="flex flex-wrap gap-1 mt-2 max-h-20 overflow-hidden">
              {messages.map((m, i) => (
                <span
                  key={i}
                  className="inline-block text-[10px] font-mono px-1.5 py-0.5 rounded border border-yellow-300 bg-yellow-50 text-yellow-900"
                >
                  {m}
                </span>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 흐름 화살표
    // ─────────────────────────────────────────────────────
    function FlowArrow({ label, broken }) {
      return (
        <div className="flex flex-col items-center justify-center py-1">
          <div className="text-[10px] text-yellow-700 mb-0.5">{label}</div>
          <div className={`text-xl ${broken ? 'text-red-400 line-through' : 'text-yellow-600'}`}>
            ↓
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Decouple 효과 박스 (Step 5)
    // ─────────────────────────────────────────────────────
    function DecoupleBox({ box }) {
      if (!box) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-yellow-500 bg-gradient-to-br from-yellow-50 to-amber-50 p-4">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl">📬</span>
            <span className="text-lg font-bold text-yellow-900">{box.title}</span>
          </div>
          <ul className="space-y-1.5">
            {box.features.map((f, i) => (
              <li key={i} className="text-sm text-yellow-900 flex gap-2">
                <span className="text-yellow-600 mt-0.5">✓</span>
                <span>{f}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 알림/경고 박스
    // ─────────────────────────────────────────────────────
    const ALERT_STYLE = {
      info:   { bg: 'bg-yellow-50',  border: 'border-yellow-300',  text: 'text-yellow-900',  icon: '💡' },
      warn:   { bg: 'bg-amber-50',   border: 'border-amber-300',   text: 'text-amber-900',   icon: '⚠️' },
      danger: { bg: 'bg-red-50',     border: 'border-red-300',     text: 'text-red-900',     icon: '🚨' },
      good:   { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-900', icon: '✅' },
    };

    function AlertBox({ alert }) {
      if (!alert) return null;
      const s = ALERT_STYLE[alert.tone] || ALERT_STYLE.info;
      return (
        <div className={`mt-3 rounded-lg border ${s.bg} ${s.border} ${s.text} p-2 text-xs flex gap-2`}>
          <span>{s.icon}</span>
          <span>{alert.text}</span>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — yellow 톤
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ state }) {
      const consumerDown = state.consumer.status === 'down';
      return (
        <div className="rounded-xl border border-yellow-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-yellow-900">Producer → Broker → Consumer 흐름</h3>
            <span className="text-[10px] text-slate-500">{state.actor}</span>
          </div>
          <ActorBox
            role="Producer (생산자)"
            icon="📤"
            info={state.producer}
            accent="border-yellow-400"
          />
          <FlowArrow label="publish" broken={false} />
          <BrokerBox broker={state.broker} messages={state.messages} />
          <FlowArrow label={consumerDown ? 'subscribe (다운)' : 'subscribe'} broken={consumerDown} />
          <ActorBox
            role="Consumer (소비자)"
            icon="📥"
            info={state.consumer}
            accent="border-amber-400"
          />
          <DecoupleBox box={state.decoupleBox} />
          <AlertBox alert={state.alert} />
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-yellow-500/15 border-l-2 border-yellow-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-yellow-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-yellow-600 text-white font-bold">K</span>
              <div>
                <h1 className="text-2xl font-bold text-yellow-900">I-1-2. 메시지 큐란 — 생산자/소비자 분리</h1>
                <p className="text-sm text-yellow-800/80">Producer → Broker(큐) → Consumer · 비동기 + 버퍼로 트래픽 흡수 · 한쪽 다운돼도 계속</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-yellow-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-yellow-600' : 'bg-yellow-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-yellow-700 text-yellow-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-yellow-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                aria-label="처음으로"
                className="px-3 py-1.5 text-xs rounded border border-yellow-400 bg-white text-yellow-800 hover:bg-yellow-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 text-xs rounded border border-yellow-400 bg-white text-yellow-800 hover:bg-yellow-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                aria-pressed={playing}
                aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-yellow-800 text-white' : 'bg-yellow-600 text-white hover:bg-yellow-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                aria-label="다음 단계"
                className="px-3 py-1.5 text-xs rounded border border-yellow-400 bg-white text-yellow-800 hover:bg-yellow-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-yellow-700/70 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-yellow-500 bg-white px-4 py-3 text-sm text-yellow-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                메시지 큐는 Producer 와 Consumer 사이에 broker 라는 "버퍼"를 둬서 시간/위치/속도/실패 4가지 결합을 끊는다.
                덕분에 트래픽 폭주를 흡수하고, 한쪽이 죽어도 다른 쪽은 살아남는다. 다음 챕터에서는 Kafka 가 다른 메시지 큐(RabbitMQ 등) 와 어떻게 다른지 살펴본다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Kafka', '메시지큐', 'Producer', 'Consumer', 'Broker', '비동기', '버퍼', 'Decoupling', '장애격리'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-900 border border-yellow-300">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-yellow-800">
              <a href="../index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./I-1-3.html" className="underline hover:no-underline">다음: I-1-3 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
