<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB — V-1-1. FAISS vs Chroma vs pgvector 기능 비교</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const DBS = {
      faiss: { name: 'FAISS', color: 'text-orange-700', bg: 'bg-orange-50', border: 'border-orange-200', badge: 'bg-orange-500' },
      chroma: { name: 'Chroma', color: 'text-green-700', bg: 'bg-green-50', border: 'border-green-200', badge: 'bg-green-500' },
      pgvector: { name: 'pgvector', color: 'text-blue-700', bg: 'bg-blue-50', border: 'border-blue-200', badge: 'bg-blue-500' },
    };

    const RADAR_CATEGORIES = ['검색 속도', '메모리 효율', '기능 풍부함', '운영 편의성', '생태계'];
    const RADAR_SCORES = {
      faiss:    [95, 60, 30, 20, 70],
      chroma:   [60, 70, 75, 90, 80],
      pgvector: [70, 65, 85, 60, 75],
    };

    const STEPS = [
      {
        desc: "FAISS, Chroma, pgvector — 세 벡터 DB를 5가지 기준으로 비교합니다. 정답은 없습니다. 프로젝트 상황에 따라 최적의 선택이 달라집니다. 각 기준을 하나씩 분석해봅시다.",
        left: 'overview',
        right: 'radar',
        highlight: null,
      },
      {
        desc: "검색 속도: FAISS가 압도적입니다. 메모리 기반 + GPU 가속으로 10억 벡터도 밀리초 단위 검색. pgvector는 SQL 오버헤드가 있지만 HNSW로 충분히 빠릅니다. Chroma는 소규모에서 양호합니다.",
        left: 'speed-detail',
        right: 'radar',
        highlight: 0,
      },
      {
        desc: "기능 풍부함: pgvector가 리드합니다. SQL JOIN, 트랜잭션, 메타데이터 필터가 네이티브입니다. Chroma는 메타데이터 필터와 임베딩 함수 내장. FAISS는 순수 벡터 검색에만 집중합니다.",
        left: 'feature-detail',
        right: 'radar',
        highlight: 2,
      },
      {
        desc: "운영 편의성: Chroma가 가장 쉽습니다. pip install 한 줄이면 끝. pgvector는 PostgreSQL 운영 지식이 필요하고, FAISS는 영속성, 메타데이터를 직접 구현해야 합니다.",
        left: 'ops-detail',
        right: 'radar',
        highlight: 3,
      },
      {
        desc: "생태계와 통합: LangChain/LlamaIndex 모두 3개 DB를 지원하지만, Chroma가 가장 깔끔한 통합을 제공합니다. FAISS는 Python 중심, pgvector는 SQL 생태계와 연결됩니다.",
        left: 'ecosystem-detail',
        right: 'radar',
        highlight: 4,
      },
      {
        desc: "최종 비교 매트릭스. 한 눈에 보는 3종 벡터 DB 비교표입니다. 다음 시각화(V-1-2)에서 '내 프로젝트에 어떤 DB를 써야 하는가' 의사결정 플로우차트를 다룹니다.",
        left: 'full-table',
        right: 'summary',
        highlight: null,
      },
    ];

    function RadarChart({ highlight }) {
      const cx = 140, cy = 130, r = 100;
      const n = RADAR_CATEGORIES.length;
      const angleStep = (2 * Math.PI) / n;

      const getPoint = (index, value) => {
        const angle = angleStep * index - Math.PI / 2;
        const dist = (value / 100) * r;
        return { x: cx + dist * Math.cos(angle), y: cy + dist * Math.sin(angle) };
      };

      const makePolygon = (scores) => {
        return scores.map((score, i) => {
          const p = getPoint(i, score);
          return `${p.x},${p.y}`;
        }).join(' ');
      };

      const gridLevels = [20, 40, 60, 80, 100];

      return (
        <svg viewBox="0 0 280 280" className="w-full max-w-[280px] mx-auto">
          {gridLevels.map(level => (
            <polygon key={level} points={Array.from({length: n}, (_, i) => {
              const p = getPoint(i, level);
              return `${p.x},${p.y}`;
            }).join(' ')} fill="none" stroke="#e2e8f0" strokeWidth="1"/>
          ))}
          {RADAR_CATEGORIES.map((_, i) => {
            const p = getPoint(i, 100);
            return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#e2e8f0" strokeWidth="1"/>;
          })}
          <polygon points={makePolygon(RADAR_SCORES.faiss)} fill="rgba(249,115,22,0.15)" stroke="#f97316" strokeWidth="2"/>
          <polygon points={makePolygon(RADAR_SCORES.chroma)} fill="rgba(34,197,94,0.15)" stroke="#22c55e" strokeWidth="2"/>
          <polygon points={makePolygon(RADAR_SCORES.pgvector)} fill="rgba(59,130,246,0.15)" stroke="#3b82f6" strokeWidth="2"/>
          {RADAR_CATEGORIES.map((cat, i) => {
            const p = getPoint(i, 115);
            const isHighlighted = highlight === i;
            return (
              <text key={i} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle"
                className={`text-[11px] ${isHighlighted ? 'font-bold fill-rose-600' : 'fill-slate-600'}`}>
                {cat}
              </text>
            );
          })}
          {highlight !== null && RADAR_CATEGORIES.map((_, i) => {
            if (i !== highlight) return null;
            return Object.entries(RADAR_SCORES).map(([key, scores]) => {
              const p = getPoint(i, scores[i]);
              const colors = { faiss: '#f97316', chroma: '#22c55e', pgvector: '#3b82f6' };
              return <circle key={key} cx={p.x} cy={p.y} r={5} fill={colors[key]} stroke="white" strokeWidth="2"/>;
            });
          })}
          <g transform="translate(40, 265)">
            <rect x="0" y="0" width="10" height="10" fill="#f97316" rx="2"/>
            <text x="14" y="9" className="text-[10px] fill-slate-600">FAISS</text>
            <rect x="60" y="0" width="10" height="10" fill="#22c55e" rx="2"/>
            <text x="74" y="9" className="text-[10px] fill-slate-600">Chroma</text>
            <rect x="130" y="0" width="10" height="10" fill="#3b82f6" rx="2"/>
            <text x="144" y="9" className="text-[10px] fill-slate-600">pgvector</text>
          </g>
        </svg>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderLeft = () => {
        switch (s.left) {
          case 'overview':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">5가지 비교 기준</div>
                <div className="space-y-2">
                  {RADAR_CATEGORIES.map((cat, i) => (
                    <div key={i} className="flex items-center gap-3 p-3 bg-slate-50 border border-slate-200 rounded-lg">
                      <div className="w-6 h-6 bg-rose-500 text-white rounded-full flex items-center justify-center text-xs font-bold">{i+1}</div>
                      <div className="font-medium text-sm text-slate-800">{cat}</div>
                    </div>
                  ))}
                </div>
                <div className="mt-3 space-y-1">
                  {Object.entries(DBS).map(([key, db]) => (
                    <div key={key} className="flex items-center gap-2">
                      <div className={`w-3 h-3 rounded ${db.badge}`}></div>
                      <span className={`text-sm font-medium ${db.color}`}>{db.name}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          case 'speed-detail':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">검색 속도 비교 (100만 벡터, k=10)</div>
                <div className="space-y-3">
                  {[
                    { name: 'FAISS', time: '~1ms', bar: 'w-1/12', color: 'bg-orange-500', note: 'GPU: ~0.1ms' },
                    { name: 'pgvector', time: '~5ms', bar: 'w-3/12', color: 'bg-blue-500', note: 'HNSW 인덱스' },
                    { name: 'Chroma', time: '~15ms', bar: 'w-6/12', color: 'bg-green-500', note: 'HNSW 내장' },
                  ].map((db, i) => (
                    <div key={i} className="p-3 bg-slate-50 border border-slate-200 rounded-lg">
                      <div className="flex items-center justify-between mb-1">
                        <span className="font-bold text-sm">{db.name}</span>
                        <span className="font-mono text-sm font-bold">{db.time}</span>
                      </div>
                      <div className="bg-slate-200 rounded-full h-3 mb-1">
                        <div className={`${db.color} h-3 rounded-full ${db.bar}`}></div>
                      </div>
                      <div className="text-xs text-slate-500">{db.note}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          case 'feature-detail':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">기능 비교</div>
                <div className="overflow-x-auto">
                  <table className="w-full text-xs border-collapse">
                    <thead>
                      <tr className="bg-slate-100">
                        <th className="p-2 text-left border border-slate-200">기능</th>
                        <th className="p-2 text-center border border-slate-200 text-orange-700">FAISS</th>
                        <th className="p-2 text-center border border-slate-200 text-green-700">Chroma</th>
                        <th className="p-2 text-center border border-slate-200 text-blue-700">pgvector</th>
                      </tr>
                    </thead>
                    <tbody>
                      {[
                        ['메타데이터 필터', 'X', 'O', 'O (SQL)'],
                        ['트랜잭션', 'X', 'X', 'O (ACID)'],
                        ['JOIN', 'X', 'X', 'O (SQL)'],
                        ['영속성', '수동', 'O', 'O'],
                        ['임베딩 함수 내장', 'X', 'O', 'X'],
                        ['CRUD', '제한적', 'O', 'O (SQL)'],
                        ['분산 처리', 'X', 'X', '가능'],
                      ].map(([feature, faiss, chroma, pgvector], i) => (
                        <tr key={i} className={i % 2 === 0 ? 'bg-white' : 'bg-slate-50'}>
                          <td className="p-2 border border-slate-200 font-medium">{feature}</td>
                          <td className={`p-2 border border-slate-200 text-center ${faiss === 'X' ? 'text-red-400' : 'text-emerald-600 font-bold'}`}>{faiss}</td>
                          <td className={`p-2 border border-slate-200 text-center ${chroma === 'X' ? 'text-red-400' : 'text-emerald-600 font-bold'}`}>{chroma}</td>
                          <td className={`p-2 border border-slate-200 text-center ${pgvector === 'X' ? 'text-red-400' : 'text-emerald-600 font-bold'}`}>{pgvector}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          case 'ops-detail':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">운영 편의성</div>
                <div className="space-y-3">
                  {[
                    { db: DBS.chroma, score: '90/100', items: ['pip install chromadb', 'Python 3줄로 시작', '서버 모드 전환 쉬움'] },
                    { db: DBS.pgvector, score: '60/100', items: ['PostgreSQL 설치/운영 필요', 'VACUUM, REINDEX 관리', 'SQL 지식 필수'] },
                    { db: DBS.faiss, score: '20/100', items: ['영속성 직접 구현', '메타데이터 별도 관리', 'ID 매핑 직접 구현'] },
                  ].map((item, i) => (
                    <div key={i} className={`p-3 rounded-lg border ${item.db.bg} ${item.db.border}`}>
                      <div className="flex items-center justify-between mb-1">
                        <span className={`font-bold text-sm ${item.db.color}`}>{item.db.name}</span>
                        <span className="text-xs font-mono font-bold">{item.score}</span>
                      </div>
                      <div className="space-y-0.5">
                        {item.items.map((it, j) => (
                          <div key={j} className="text-xs text-slate-600">- {it}</div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          case 'ecosystem-detail':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">생태계 통합</div>
                <div className="space-y-3">
                  {[
                    { framework: 'LangChain', faiss: 'FAISS()', chroma: 'Chroma()', pgvector: 'PGVector()' },
                    { framework: 'LlamaIndex', faiss: 'FaissVectorStore', chroma: 'ChromaVectorStore', pgvector: 'PGVectorStore' },
                  ].map((fw, i) => (
                    <div key={i} className="p-3 bg-slate-50 border border-slate-200 rounded-lg">
                      <div className="font-bold text-sm text-slate-800 mb-2">{fw.framework}</div>
                      <div className="space-y-1">
                        <div className="flex items-center gap-2 text-xs"><span className="w-3 h-3 rounded bg-orange-500"></span><span className="font-mono">{fw.faiss}</span></div>
                        <div className="flex items-center gap-2 text-xs"><span className="w-3 h-3 rounded bg-green-500"></span><span className="font-mono">{fw.chroma}</span></div>
                        <div className="flex items-center gap-2 text-xs"><span className="w-3 h-3 rounded bg-blue-500"></span><span className="font-mono">{fw.pgvector}</span></div>
                      </div>
                    </div>
                  ))}
                  <div className="p-3 bg-rose-50 border border-rose-200 rounded-lg text-xs text-rose-700">
                    <b>Chroma</b>가 가장 간결한 통합 코드를 제공. FAISS는 Python 전용. pgvector는 SQL 드라이버가 필요.
                  </div>
                </div>
              </div>
            );
          case 'full-table':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">종합 비교 매트릭스</div>
                <div className="overflow-x-auto">
                  <table className="w-full text-xs border-collapse">
                    <thead>
                      <tr className="bg-slate-100">
                        <th className="p-2 text-left border border-slate-200">항목</th>
                        <th className="p-2 text-center border border-slate-200 text-orange-700">FAISS</th>
                        <th className="p-2 text-center border border-slate-200 text-green-700">Chroma</th>
                        <th className="p-2 text-center border border-slate-200 text-blue-700">pgvector</th>
                      </tr>
                    </thead>
                    <tbody>
                      {[
                        ['유형', '라이브러리', '경량 서버', 'DB 확장'],
                        ['검색 속도', '최고', '보통', '양호'],
                        ['GPU 지원', 'O', 'X', 'X'],
                        ['메타데이터', 'X', 'O', 'O (SQL)'],
                        ['트랜잭션', 'X', 'X', 'ACID'],
                        ['영속성', '수동', '자동', '자동'],
                        ['최대 규모', '10억+', '100만', '1000만+'],
                        ['러닝커브', '중간', '낮음', '높음'],
                        ['최적 용도', '초고속 검색', '프로토타입', 'SQL 통합'],
                      ].map(([item, faiss, chroma, pgvector], i) => (
                        <tr key={i} className={i % 2 === 0 ? 'bg-white' : 'bg-slate-50'}>
                          <td className="p-1.5 border border-slate-200 font-medium">{item}</td>
                          <td className="p-1.5 border border-slate-200 text-center">{faiss}</td>
                          <td className="p-1.5 border border-slate-200 text-center">{chroma}</td>
                          <td className="p-1.5 border border-slate-200 text-center">{pgvector}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          default: return null;
        }
      };

      const renderRight = () => {
        if (s.right === 'radar') {
          return (
            <div>
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">레이더 차트</div>
              <RadarChart highlight={s.highlight} />
              {s.highlight !== null && (
                <div className="mt-2 p-2 bg-rose-50 border border-rose-200 rounded-lg text-xs text-rose-700 text-center">
                  <b>{RADAR_CATEGORIES[s.highlight]}</b> 항목 비교 중
                </div>
              )}
            </div>
          );
        }
        if (s.right === 'summary') {
          return (
            <div>
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">한줄 요약</div>
              <div className="space-y-3">
                <div className="p-3 bg-orange-50 border border-orange-200 rounded-lg">
                  <div className="font-bold text-sm text-orange-800">FAISS</div>
                  <div className="text-xs text-orange-700 mt-1">"최고 속도가 필요하고, 나머지는 직접 만들겠다"</div>
                </div>
                <div className="p-3 bg-green-50 border border-green-200 rounded-lg">
                  <div className="font-bold text-sm text-green-800">Chroma</div>
                  <div className="text-xs text-green-700 mt-1">"빠르게 시작하고, 편하게 개발하고 싶다"</div>
                </div>
                <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg">
                  <div className="font-bold text-sm text-blue-800">pgvector</div>
                  <div className="text-xs text-blue-700 mt-1">"이미 PostgreSQL을 쓰고, SQL로 통합하고 싶다"</div>
                </div>
              </div>
              <div className="mt-3 p-3 bg-rose-50 border border-rose-200 rounded-lg text-xs text-rose-700">
                다음: V-1-2에서 <b>의사결정 플로우차트</b>로 구체적 선택을 안내합니다
              </div>
            </div>
          );
        }
        return null;
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-rose-700 hover:text-rose-900 font-medium">
                <span>&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. 비교와 선택 가이드 &gt; Chapter 1. 비교 분석</div>
                  <h1 className="text-2xl font-bold text-slate-800">V-1-1. FAISS vs Chroma vs pgvector — 기능 비교 매트릭스</h1>
                </div>
              </div>
              <p className="text-slate-600">속도, 메모리, 기능 풍부함, 운영 편의성, 생태계 — <b>5가지 기준으로 3개 벡터 DB를 레이더 차트와 비교 테이블</b>로 분석합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-rose-700 border-rose-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">3종 비교 매트릭스</h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {renderLeft()}
              </div>
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {renderRight()}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['비교', '트레이드오프', '레이더 차트', '선택 기준'].map(kw => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-sm font-medium border border-rose-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-rose-600 hover:bg-rose-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="../part4/IV-2-3.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; IV-2-3. pgvector 운영</a>
              <a href="./V-1-2.html" className="text-rose-600 hover:text-rose-800 font-medium">V-1-2. 의사결정 플로우차트 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
