<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB — V-2-1. 벡터 DB 조합 패턴 — 하이브리드 아키텍처</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PATTERNS = [
      {
        name: '개발 → 프로덕션 마이그레이션',
        icon: '1',
        from: { name: 'Chroma', color: 'green' },
        to: { name: 'pgvector', color: 'blue' },
        desc: '개발 시 Chroma로 빠르게 프로토타이핑, 프로덕션에서 pgvector로 전환',
      },
      {
        name: 'FAISS 캐시 + pgvector 저장소',
        icon: '2',
        from: { name: 'FAISS', color: 'orange' },
        to: { name: 'pgvector', color: 'blue' },
        desc: 'FAISS가 인메모리 캐시로 빠른 검색, pgvector가 영속 저장소 역할',
      },
      {
        name: '읽기/쓰기 분리',
        icon: '3',
        from: { name: 'FAISS (읽기)', color: 'orange' },
        to: { name: 'pgvector (쓰기)', color: 'blue' },
        desc: '쓰기는 pgvector(ACID 보장), 읽기는 FAISS(초고속) — 주기적 동기화',
      },
      {
        name: '멀티 벡터 DB 파이프라인',
        icon: '4',
        from: { name: 'Chroma (1차)', color: 'green' },
        to: { name: 'FAISS (2차 리랭킹)', color: 'orange' },
        desc: 'Chroma로 1차 후보 추출(메타데이터 필터), FAISS로 2차 정밀 리랭킹',
      },
    ];

    const STEPS = [
      {
        desc: "벡터 DB를 하나만 쓸 필요는 없습니다. 각 DB의 강점을 조합하면 단일 DB의 한계를 극복할 수 있습니다. 실전에서 자주 쓰이는 4가지 하이브리드 패턴을 살펴봅니다.",
        left: 'overview',
        right: 'why-hybrid',
      },
      {
        desc: "패턴 1: 개발 → 프로덕션 마이그레이션. Chroma로 빠르게 개발하고, 검증이 끝나면 pgvector로 전환합니다. 인터페이스가 유사하므로 마이그레이션 비용이 낮습니다.",
        left: 'pattern-1',
        right: 'pattern-1-detail',
      },
      {
        desc: "패턴 2: FAISS 캐시 + pgvector 저장소. 자주 검색되는 벡터를 FAISS에 인메모리 캐시하고, 전체 데이터는 pgvector에 영속 저장합니다. 캐시 히트 시 10배 빠른 응답.",
        left: 'pattern-2',
        right: 'pattern-2-detail',
      },
      {
        desc: "패턴 3: 읽기/쓰기 분리. 새 데이터는 pgvector에 쓰고(ACID 보장), 검색은 FAISS에서 수행(초고속). 주기적으로 pgvector에서 FAISS로 동기화합니다.",
        left: 'pattern-3',
        right: 'pattern-3-detail',
      },
      {
        desc: "패턴 4: 멀티 벡터 DB 파이프라인. Chroma로 메타데이터 필터 + 1차 검색, FAISS로 2차 정밀 리랭킹. 각 단계에서 최적의 DB를 사용하는 파이프라인 구성입니다.",
        left: 'pattern-4',
        right: 'pattern-4-detail',
      },
      {
        desc: "4가지 패턴을 정리합니다. 핵심은 '각 DB의 강점'을 살리는 것입니다. Chroma(편의성), FAISS(속도), pgvector(SQL/영속성). 다음 시각화(V-2-2)에서 프로덕션 운영 전략을 다룹니다.",
        left: 'summary-table',
        right: 'next-steps',
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const colorMap = { green: { bg: 'bg-green-100', border: 'border-green-300', text: 'text-green-800' }, blue: { bg: 'bg-blue-100', border: 'border-blue-300', text: 'text-blue-800' }, orange: { bg: 'bg-orange-100', border: 'border-orange-300', text: 'text-orange-800' } };

      const renderLeft = () => {
        switch (s.left) {
          case 'overview':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">4가지 조합 패턴</div>
                <div className="space-y-2">
                  {PATTERNS.map((p, i) => (
                    <div key={i} className="flex items-start gap-3 p-3 bg-slate-50 border border-slate-200 rounded-lg">
                      <div className="w-6 h-6 bg-rose-500 text-white rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0">{p.icon}</div>
                      <div>
                        <div className="font-bold text-sm text-slate-800">{p.name}</div>
                        <div className="flex items-center gap-2 mt-1">
                          <span className={`px-2 py-0.5 rounded text-xs font-bold ${colorMap[p.from.color].bg} ${colorMap[p.from.color].text}`}>{p.from.name}</span>
                          <span className="text-slate-400">+</span>
                          <span className={`px-2 py-0.5 rounded text-xs font-bold ${colorMap[p.to.color].bg} ${colorMap[p.to.color].text}`}>{p.to.name}</span>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          case 'pattern-1':
          case 'pattern-2':
          case 'pattern-3':
          case 'pattern-4': {
            const idx = parseInt(s.left.split('-')[1]) - 1;
            const p = PATTERNS[idx];
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">패턴 {p.icon}: {p.name}</div>
                <div className="space-y-3">
                  <div className={`p-4 rounded-lg border-2 ${colorMap[p.from.color].bg} ${colorMap[p.from.color].border}`}>
                    <div className={`font-bold text-lg ${colorMap[p.from.color].text}`}>{p.from.name}</div>
                    <div className={`text-xs mt-1 ${colorMap[p.from.color].text} opacity-80`}>
                      {idx === 0 ? '개발/프로토타입 환경' : idx === 1 ? '인메모리 캐시 (빠른 검색)' : idx === 2 ? '읽기 전용 (초고속 검색)' : '1차 검색 (메타데이터 필터)'}
                    </div>
                  </div>
                  <div className="flex justify-center">
                    <div className="flex flex-col items-center">
                      <svg width="24" height="40" viewBox="0 0 24 40" fill="none" stroke="#94a3b8" strokeWidth="2"><path d="M12 0v32m-6-6l6 6 6-6"/></svg>
                      <span className="text-xs text-slate-500 font-medium">
                        {idx === 0 ? '마이그레이션' : idx === 1 ? '캐시 미스 시 조회' : idx === 2 ? '주기적 동기화' : '후보 전달'}
                      </span>
                    </div>
                  </div>
                  <div className={`p-4 rounded-lg border-2 ${colorMap[p.to.color].bg} ${colorMap[p.to.color].border}`}>
                    <div className={`font-bold text-lg ${colorMap[p.to.color].text}`}>{p.to.name}</div>
                    <div className={`text-xs mt-1 ${colorMap[p.to.color].text} opacity-80`}>
                      {idx === 0 ? '프로덕션 환경 (SQL + ACID)' : idx === 1 ? '영속 저장소 (전체 데이터)' : idx === 2 ? '쓰기 전용 (ACID 보장)' : '2차 리랭킹 (정밀 검색)'}
                    </div>
                  </div>
                </div>
                <div className="mt-3 text-xs text-slate-500">{p.desc}</div>
              </div>
            );
          }
          case 'summary-table':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">패턴별 비교</div>
                <div className="overflow-x-auto">
                  <table className="w-full text-xs border-collapse">
                    <thead>
                      <tr className="bg-slate-100">
                        <th className="p-2 text-left border border-slate-200">패턴</th>
                        <th className="p-2 text-center border border-slate-200">조합</th>
                        <th className="p-2 text-center border border-slate-200">복잡도</th>
                        <th className="p-2 text-center border border-slate-200">적합 규모</th>
                      </tr>
                    </thead>
                    <tbody>
                      {[
                        ['마이그레이션', 'Chroma→pgvector', '낮음', '소→중'],
                        ['캐시+저장', 'FAISS+pgvector', '중간', '중→대'],
                        ['읽기/쓰기 분리', 'FAISS+pgvector', '높음', '대규모'],
                        ['파이프라인', 'Chroma+FAISS', '중간', '중→대'],
                      ].map(([pattern, combo, complexity, scale], i) => (
                        <tr key={i} className={i % 2 === 0 ? 'bg-white' : 'bg-slate-50'}>
                          <td className="p-2 border border-slate-200 font-medium">{pattern}</td>
                          <td className="p-2 border border-slate-200 text-center">{combo}</td>
                          <td className="p-2 border border-slate-200 text-center">{complexity}</td>
                          <td className="p-2 border border-slate-200 text-center">{scale}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div className="mt-3 p-3 bg-rose-50 border border-rose-200 rounded-lg text-xs text-rose-700">
                  <b>원칙:</b> 단순한 것부터 시작하고, 필요할 때 조합으로 진화
                </div>
              </div>
            );
          default: return null;
        }
      };

      const renderRight = () => {
        switch (s.right) {
          case 'why-hybrid':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">왜 하이브리드인가?</div>
                <div className="space-y-3">
                  <div className="p-3 bg-orange-50 border border-orange-200 rounded-lg">
                    <div className="font-bold text-sm text-orange-800">FAISS의 강점</div>
                    <div className="text-xs text-orange-700 mt-1">초고속 검색, GPU 가속</div>
                    <div className="text-xs text-red-500 mt-1">약점: 영속성, 메타데이터 없음</div>
                  </div>
                  <div className="p-3 bg-green-50 border border-green-200 rounded-lg">
                    <div className="font-bold text-sm text-green-800">Chroma의 강점</div>
                    <div className="text-xs text-green-700 mt-1">쉬운 사용, 빠른 개발</div>
                    <div className="text-xs text-red-500 mt-1">약점: 대규모 성능, 분산 처리</div>
                  </div>
                  <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg">
                    <div className="font-bold text-sm text-blue-800">pgvector의 강점</div>
                    <div className="text-xs text-blue-700 mt-1">SQL 통합, ACID, 영속성</div>
                    <div className="text-xs text-red-500 mt-1">약점: FAISS만큼 빠르지 않음</div>
                  </div>
                  <div className="p-3 bg-rose-50 border border-rose-200 rounded-lg text-xs text-rose-700">
                    <b>조합 = 강점 극대화 + 약점 보완</b>
                  </div>
                </div>
              </div>
            );
          case 'pattern-1-detail':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">마이그레이션 코드 패턴</div>
                <pre className="bg-slate-800 text-slate-100 rounded-lg p-4 text-xs font-mono whitespace-pre-wrap mb-3">{`# 개발: Chroma
import chromadb
client = chromadb.PersistentClient("./dev_db")
col = client.get_collection("docs")
results = col.query(query_texts=["..."])

# ──────────────────────────────
# 프로덕션: pgvector
import psycopg2
conn = psycopg2.connect(DB_URL)
cur = conn.cursor()
cur.execute("""
  SELECT id, content,
    1 - (embedding <=> %s) AS sim
  FROM documents
  ORDER BY embedding <=> %s
  LIMIT 10
""", [query_vec, query_vec])`}</pre>
                <div className="p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-xs text-emerald-700">
                  <b>마이그레이션 체크리스트:</b><br/>
                  1. Chroma 데이터 export (get 메서드)<br/>
                  2. pgvector 테이블 생성 + 인덱스<br/>
                  3. 배치 INSERT<br/>
                  4. 검색 코드 교체
                </div>
              </div>
            );
          case 'pattern-2-detail':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">캐시 패턴 아키텍처</div>
                <div className="space-y-3">
                  <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg">
                    <div className="font-bold text-xs text-slate-600 mb-2">요청 흐름</div>
                    <div className="space-y-1.5">
                      {[
                        { step: '1', text: '검색 요청 도착', color: 'bg-slate-200' },
                        { step: '2', text: 'FAISS 캐시에서 검색', color: 'bg-orange-200' },
                        { step: '3a', text: '캐시 HIT → 즉시 반환 (~1ms)', color: 'bg-emerald-200' },
                        { step: '3b', text: '캐시 MISS → pgvector 조회 (~10ms)', color: 'bg-blue-200' },
                        { step: '4', text: '결과를 FAISS 캐시에 추가', color: 'bg-orange-200' },
                      ].map((item, i) => (
                        <div key={i} className={`flex items-center gap-2 p-2 rounded ${item.color}`}>
                          <span className="font-bold text-xs">{item.step}</span>
                          <span className="text-xs">{item.text}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="p-3 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-700">
                    <b>캐시 전략:</b> 최근 1시간 or 상위 10만 벡터를 FAISS에 유지.<br/>
                    LRU/TTL 기반으로 캐시 갱신
                  </div>
                </div>
              </div>
            );
          case 'pattern-3-detail':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">읽기/쓰기 분리 구성</div>
                <div className="space-y-3">
                  <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg">
                    <div className="font-bold text-xs text-blue-800 mb-1">쓰기 경로 (pgvector)</div>
                    <div className="text-xs text-blue-700">
                      App → pgvector INSERT<br/>
                      - ACID 트랜잭션 보장<br/>
                      - 메타데이터와 함께 저장<br/>
                      - WAL 기반 복구 가능
                    </div>
                  </div>
                  <div className="p-3 bg-orange-50 border border-orange-200 rounded-lg">
                    <div className="font-bold text-xs text-orange-800 mb-1">읽기 경로 (FAISS)</div>
                    <div className="text-xs text-orange-700">
                      App → FAISS search<br/>
                      - 인메모리 초고속 검색<br/>
                      - GPU 가속 가능<br/>
                      - ~1ms 응답 시간
                    </div>
                  </div>
                  <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg">
                    <div className="font-bold text-xs text-slate-600 mb-1">동기화 (Sync Job)</div>
                    <div className="text-xs text-slate-500">
                      Cron 또는 CDC로 주기적 동기화<br/>
                      - 5분~1시간 간격<br/>
                      - pgvector → FAISS 인덱스 재빌드<br/>
                      - 약간의 데이터 지연 허용 필요
                    </div>
                  </div>
                </div>
              </div>
            );
          case 'pattern-4-detail':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">파이프라인 구성</div>
                <div className="space-y-3">
                  <div className="p-3 bg-green-50 border border-green-200 rounded-lg">
                    <div className="font-bold text-xs text-green-800">Stage 1: Chroma (1차 검색)</div>
                    <div className="text-xs text-green-700 mt-1">
                      메타데이터 필터: category, date, author<br/>
                      100만건 → 후보 100개 추출 (~15ms)
                    </div>
                  </div>
                  <div className="flex justify-center text-slate-300">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14m-7-7l7 7 7-7"/></svg>
                  </div>
                  <div className="p-3 bg-orange-50 border border-orange-200 rounded-lg">
                    <div className="font-bold text-xs text-orange-800">Stage 2: FAISS (2차 리랭킹)</div>
                    <div className="text-xs text-orange-700 mt-1">
                      후보 100개를 정밀 벡터 비교<br/>
                      최종 상위 10개 선택 (~0.5ms)
                    </div>
                  </div>
                  <div className="flex justify-center text-slate-300">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14m-7-7l7 7 7-7"/></svg>
                  </div>
                  <div className="p-3 bg-emerald-50 border border-emerald-200 rounded-lg">
                    <div className="font-bold text-xs text-emerald-800">최종 결과</div>
                    <div className="text-xs text-emerald-700 mt-1">
                      메타데이터 필터 + 정밀 벡터 유사도<br/>
                      총 소요 시간: ~16ms
                    </div>
                  </div>
                </div>
              </div>
            );
          case 'next-steps':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">패턴 선택 가이드</div>
                <div className="space-y-3">
                  <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg">
                    <div className="font-bold text-sm text-slate-700 mb-2">프로젝트 단계별 추천</div>
                    <div className="space-y-2">
                      <div className="flex items-center gap-2 p-2 bg-green-50 rounded border border-green-200">
                        <span className="font-bold text-xs text-green-800">MVP</span>
                        <span className="text-xs text-green-700">→ Chroma 단독</span>
                      </div>
                      <div className="flex items-center gap-2 p-2 bg-blue-50 rounded border border-blue-200">
                        <span className="font-bold text-xs text-blue-800">프로덕션 v1</span>
                        <span className="text-xs text-blue-700">→ pgvector 단독 or Chroma→pgvector 마이그레이션</span>
                      </div>
                      <div className="flex items-center gap-2 p-2 bg-orange-50 rounded border border-orange-200">
                        <span className="font-bold text-xs text-orange-800">프로덕션 v2</span>
                        <span className="text-xs text-orange-700">→ FAISS+pgvector 캐시 패턴</span>
                      </div>
                      <div className="flex items-center gap-2 p-2 bg-rose-50 rounded border border-rose-200">
                        <span className="font-bold text-xs text-rose-800">대규모</span>
                        <span className="text-xs text-rose-700">→ 읽기/쓰기 분리 or 파이프라인</span>
                      </div>
                    </div>
                  </div>
                  <div className="p-3 bg-rose-50 border border-rose-200 rounded-lg text-xs text-rose-700">
