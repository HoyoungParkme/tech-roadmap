<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB — V-2-2. 프로덕션 벡터 DB 운영 — 모니터링, 백업, 스케일링</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CHECKLIST_AREAS = [
      {
        title: '모니터링',
        icon: '1',
        items: [
          { metric: '검색 레이턴시 (p50/p95/p99)', target: 'p99 < 50ms', alert: '> 100ms' },
          { metric: '인덱스 크기 / 메모리 사용', target: '전체 RAM 70% 이내', alert: '> 85%' },
          { metric: '쿼리 처리량 (QPS)', target: '서비스 SLA 기준', alert: '목표 대비 -20%' },
          { metric: 'Recall@K', target: '> 95%', alert: '< 90%' },
        ],
      },
      {
        title: '백업',
        icon: '2',
        items: [
          { metric: 'DB 스냅샷', target: '매일 1회', alert: '24시간 미백업' },
          { metric: 'WAL 아카이빙 (pgvector)', target: '실시간', alert: 'WAL 파일 누적' },
          { metric: 'FAISS 인덱스 파일 백업', target: '인덱스 재빌드 후', alert: '파일 유실' },
          { metric: '복구 테스트', target: '월 1회', alert: '3개월 미실시' },
        ],
      },
      {
        title: '스케일링',
        icon: '3',
        items: [
          { metric: '수직 스케일링 (RAM/CPU)', target: '사용률 60% 시 업그레이드', alert: '> 80%' },
          { metric: '읽기 복제본', target: 'QPS > 200 시 도입', alert: '단일 인스턴스 병목' },
          { metric: '파티셔닝/샤딩', target: '500만건 이상 시', alert: '검색 > 50ms' },
          { metric: 'FAISS 캐시 레이어', target: '반복 검색 > 30%', alert: '캐시 미적용' },
        ],
      },
      {
        title: '보안',
        icon: '4',
        items: [
          { metric: '접근 제어 (RBAC)', target: '서비스별 권한 분리', alert: '공용 계정 사용' },
          { metric: '전송 암호화 (TLS)', target: 'TLS 1.3', alert: '평문 통신' },
          { metric: '저장 암호화', target: 'at-rest encryption', alert: '미암호화' },
          { metric: '감사 로그', target: '쿼리 로그 90일 보관', alert: '로그 미설정' },
        ],
      },
    ];

    const STEPS = [
      {
        desc: "벡터 DB를 프로덕션에 배포한 후가 진짜 시작입니다. 자동차 정기 점검처럼 모니터링, 백업, 스케일링, 보안 — 4가지 운영 영역을 체크리스트로 관리해야 합니다.",
        activeArea: -1,
        left: 'overview',
        right: 'analogy',
      },
      {
        desc: "1. 모니터링: 검색 레이턴시, 인덱스 크기, QPS, Recall을 실시간 추적합니다. Grafana + Prometheus 조합이 일반적입니다. p99 레이턴시가 100ms를 넘으면 인덱스 튜닝이 필요합니다.",
        activeArea: 0,
        left: 'monitoring',
        right: 'monitoring-tools',
      },
      {
        desc: "2. 백업: pgvector는 PostgreSQL 표준 백업(pg_dump, WAL)을 사용합니다. FAISS는 인덱스 파일을 직접 백업합니다. Chroma는 persist_directory를 통째로 복사합니다. 복구 테스트를 정기적으로 수행하세요.",
        activeArea: 1,
        left: 'backup',
        right: 'backup-commands',
      },
      {
        desc: "3. 스케일링: 수직 스케일링(RAM/CPU 업그레이드), 수평 스케일링(읽기 복제본), 파티셔닝, 캐시 레이어 순으로 도입합니다. 각 단계마다 비용 대비 효과를 측정하세요.",
        activeArea: 2,
        left: 'scaling',
        right: 'scaling-roadmap',
      },
      {
        desc: "4. 보안: 접근 제어, 전송/저장 암호화, 감사 로그를 설정합니다. 벡터 데이터도 원본 데이터를 복원할 수 있으므로 보안 관리가 중요합니다. 이것으로 벡터 DB 학습 커리큘럼이 완성됩니다!",
        activeArea: 3,
        left: 'security',
        right: 'final-summary',
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderLeft = () => {
        if (s.left === 'overview') {
          return (
            <div>
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">4가지 운영 영역</div>
              <div className="space-y-2">
                {CHECKLIST_AREAS.map((area, i) => (
                  <div key={i} className={`flex items-start gap-3 p-3 rounded-lg border transition-all ${
                    s.activeArea === i ? 'bg-rose-50 border-rose-300 shadow-sm' : 'bg-slate-50 border-slate-200'
                  }`}>
                    <div className="w-6 h-6 bg-rose-500 text-white rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0">{area.icon}</div>
                    <div>
                      <div className="font-bold text-sm text-slate-800">{area.title}</div>
                      <div className="text-xs text-slate-500">{area.items.length}개 체크 항목</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        }

        const areaIdx = s.activeArea;
        if (areaIdx < 0 || areaIdx >= CHECKLIST_AREAS.length) return null;
        const area = CHECKLIST_AREAS[areaIdx];

        return (
          <div>
            <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">{area.title} 체크리스트</div>
            <div className="space-y-2">
              {area.items.map((item, i) => (
                <div key={i} className="p-3 bg-slate-50 border border-slate-200 rounded-lg">
                  <div className="font-bold text-sm text-slate-800 mb-1">{item.metric}</div>
                  <div className="flex gap-2">
                    <div className="flex-1 p-2 bg-emerald-50 border border-emerald-200 rounded text-xs text-emerald-700">
                      <span className="font-bold">목표:</span> {item.target}
                    </div>
                    <div className="flex-1 p-2 bg-red-50 border border-red-200 rounded text-xs text-red-700">
                      <span className="font-bold">경고:</span> {item.alert}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      };

      const renderRight = () => {
        switch (s.right) {
          case 'analogy':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">자동차 정기 점검 비유</div>
                <div className="space-y-3">
                  {[
                    { car: '계기판 확인', db: '모니터링', desc: '속도(레이턴시), 연료(메모리), RPM(QPS)' },
                    { car: '오일 교환', db: '백업', desc: '정기 스냅샷, WAL 아카이빙, 복구 테스트' },
                    { car: '엔진 업그레이드', db: '스케일링', desc: 'RAM 추가, 복제본, 파티셔닝' },
                    { car: '잠금장치', db: '보안', desc: '접근 제어, 암호화, 감사 로그' },
                  ].map((item, i) => (
                    <div key={i} className="p-3 bg-rose-50 border border-rose-200 rounded-lg">
                      <div className="flex items-center gap-2 mb-1">
                        <span className="text-xs bg-rose-200 text-rose-800 px-2 py-0.5 rounded font-bold">{item.car}</span>
                        <span className="text-xs text-slate-400">=</span>
                        <span className="text-xs bg-slate-200 text-slate-800 px-2 py-0.5 rounded font-bold">{item.db}</span>
                      </div>
                      <div className="text-xs text-rose-700">{item.desc}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          case 'monitoring-tools':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">모니터링 도구 스택</div>
                <div className="space-y-3">
                  <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg">
                    <div className="font-bold text-xs text-blue-800">pgvector 모니터링</div>
                    <pre className="mt-2 bg-white rounded p-2 text-xs font-mono border border-blue-100">{`-- 검색 레이턴시 확인
EXPLAIN ANALYZE
SELECT * FROM docs
ORDER BY embedding <=> $1
LIMIT 10;

-- 인덱스 크기 확인
SELECT pg_size_pretty(
  pg_relation_size('idx_docs_hnsw')
);`}</pre>
                  </div>
                  <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg">
                    <div className="font-bold text-xs text-slate-600">추천 스택</div>
                    <div className="space-y-1 mt-1">
                      <div className="text-xs text-slate-500">- <b>Prometheus</b> + pg_stat_statements</div>
                      <div className="text-xs text-slate-500">- <b>Grafana</b> 대시보드</div>
                      <div className="text-xs text-slate-500">- <b>PgHero</b> 쿼리 분석</div>
                      <div className="text-xs text-slate-500">- <b>커스텀</b> recall 측정 스크립트</div>
                    </div>
                  </div>
                </div>
              </div>
            );
          case 'backup-commands':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">DB별 백업 명령</div>
                <div className="space-y-3">
                  <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg">
                    <div className="font-bold text-xs text-blue-800">pgvector</div>
                    <pre className="mt-1 bg-white rounded p-2 text-xs font-mono border border-blue-100 whitespace-pre-wrap">{`# 논리 백업
pg_dump -Fc vectordb > backup.dump

# WAL 아카이빙 (postgresql.conf)
archive_mode = on
archive_command = 'cp %p /backups/wal/%f'

# 복구
pg_restore -d vectordb backup.dump`}</pre>
                  </div>
                  <div className="p-3 bg-orange-50 border border-orange-200 rounded-lg">
                    <div className="font-bold text-xs text-orange-800">FAISS</div>
                    <pre className="mt-1 bg-white rounded p-2 text-xs font-mono border border-orange-100 whitespace-pre-wrap">{`# 저장
faiss.write_index(index, "index.faiss")
# 복원
index = faiss.read_index("index.faiss")`}</pre>
                  </div>
                  <div className="p-3 bg-green-50 border border-green-200 rounded-lg">
                    <div className="font-bold text-xs text-green-800">Chroma</div>
                    <pre className="mt-1 bg-white rounded p-2 text-xs font-mono border border-green-100 whitespace-pre-wrap">{`# persist_directory 통째로 백업
cp -r ./chroma_db ./backup/chroma_db`}</pre>
                  </div>
                </div>
              </div>
            );
          case 'scaling-roadmap':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">스케일링 로드맵</div>
                <div className="space-y-2">
                  {[
                    { stage: 'Stage 0', range: '0 ~ 10만', action: '기본 설정, 단일 인스턴스', color: 'bg-emerald-50 border-emerald-200' },
                    { stage: 'Stage 1', range: '10만 ~ 100만', action: 'HNSW 인덱스, 메모리 튜닝', color: 'bg-blue-50 border-blue-200' },
                    { stage: 'Stage 2', range: '100만 ~ 500만', action: '읽기 복제본, PgBouncer', color: 'bg-purple-50 border-purple-200' },
                    { stage: 'Stage 3', range: '500만 ~ 1000만', action: '파티셔닝, 캐시 레이어', color: 'bg-amber-50 border-amber-200' },
                    { stage: 'Stage 4', range: '1000만+', action: '샤딩, 하이브리드 아키텍처', color: 'bg-red-50 border-red-200' },
                  ].map((item, i) => (
                    <div key={i} className={`p-3 rounded-lg border ${item.color}`}>
                      <div className="flex items-center justify-between mb-0.5">
                        <span className="font-bold text-sm">{item.stage}</span>
                        <span className="text-xs font-mono">{item.range}건</span>
                      </div>
                      <div className="text-xs text-slate-600">{item.action}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          case 'final-summary':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">커리큘럼 완성!</div>
                <div className="space-y-3">
                  <div className="p-4 bg-rose-50 border border-rose-300 rounded-lg">
                    <div className="font-bold text-sm text-rose-800 mb-2">학습 완료 체크리스트</div>
                    <div className="space-y-1.5">
                      {[
                        'Part I: 벡터 DB 기초 — 왜 필요한가, 핵심 개념',
                        'Part II: FAISS — 초고속 라이브러리 검색',
                        'Part III: Chroma — 개발자 친화적 임베딩 DB',
                        'Part IV: pgvector — PostgreSQL 벡터 확장',
                        'Part V: 비교, 선택, 조합, 운영',
                      ].map((item, i) => (
                        <div key={i} className="flex items-center gap-2 text-xs text-rose-700">
                          <span className="w-4 h-4 bg-emerald-500 text-white rounded flex items-center justify-center text-[10px]">&#10003;</span>
                          {item}
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="p-3 bg-emerald-50 border border-emerald-200 rounded-lg">
                    <div className="font-bold text-xs text-emerald-800 mb-1">다음 단계 추천</div>
                    <div className="space-y-1 text-xs text-emerald-700">
                      <div>1. 실제 프로젝트에 벡터 DB 적용</div>
                      <div>2. RAG 파이프라인 구축</div>
                      <div>3. 성능 벤치마크 측정</div>
                      <div>4. 프로덕션 운영 체크리스트 적용</div>
                    </div>
                  </div>
                  <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg text-xs text-slate-600 text-center">
                    <b>축하합니다!</b> 벡터 DB 학습 커리큘럼 전체를 완료했습니다.
                  </div>
                </div>
              </div>
            );
          default: return null;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-rose-700 hover:text-rose-900 font-medium">
                <span>&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. 비교와 선택 가이드 &gt; Chapter 2. 실전 아키텍처</div>
                  <h1 className="text-2xl font-bold text-slate-800">V-2-2. 프로덕션 벡터 DB 운영 — 모니터링, 백업, 스케일링</h1>
                </div>
              </div>
              <p className="text-slate-600">자동차 정기 점검처럼 — <b>모니터링, 백업, 스케일링, 보안</b> 4가지 운영 체크리스트로 벡터 DB를 안정적으로 운영합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-rose-700 border-rose-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">프로덕션 운영 체크리스트</h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {renderLeft()}
              </div>
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {renderRight()}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['모니터링', '백업', '스케일링', '샤딩', '보안', '운영 체크리스트'].map(kw => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-sm font-medium border border-rose-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-rose-600 hover:bg-rose-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-start text-sm text-slate-500">
              <a href="./V-2-1.html" className="text-rose-600 hover:text-rose-800 font-medium">&larr; V-2-1. 하이브리드 아키텍처</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
