            '인프라/샤딩/백업/스케일을 SaaS가 책임지므로 운영 부담이 가장 작다.',
            '대신 비용이 가장 비싸므로 "엔터프라이즈/멀티테넌시"라는 분기에서',
            '도달했을 때만 정당화된다.',
            '"""',
            'import os',
            'from pinecone import Pinecone, ServerlessSpec',
            '',
            '# 1) 클라이언트 — API 키만 있으면 됨',
            'pc = Pinecone(api_key=os.environ["PINECONE_API_KEY"])',
            '',
            '# 2) 인덱스 생성 — 서버리스/리전/메트릭만 지정',
            'INDEX = "products"',
            'if INDEX not in [i.name for i in pc.list_indexes()]:',
            '    pc.create_index(',
            '        name=INDEX,',
            '        dimension=1536,',
            '        metric="cosine",',
            '        spec=ServerlessSpec(cloud="aws", region="us-east-1"),',
            '    )',
            '',
            'index = pc.Index(INDEX)',
            '',
            '# 3) 멀티테넌시 — namespace로 테넌트 격리',
            '#    같은 인덱스에 tenant_a / tenant_b를 분리해 쓰는 패턴',
            'index.upsert(',
            '    vectors=[',
            '        {"id": "p1", "values": [0.12] * 1536, "metadata": {"sku": "A1"}},',
            '        {"id": "p2", "values": [0.34] * 1536, "metadata": {"sku": "B2"}},',
            '    ],',
            '    namespace="tenant_a",',
            ')',
            '',
            '# 4) 검색 — 메타데이터 필터까지 한 번에',
            'res = index.query(',
            '    vector=[0.12] * 1536,',
            '    top_k=10,',
            '    include_metadata=True,',
            '    namespace="tenant_a",',
            '    filter={"sku": {"$in": ["A1", "B2"]}},',
            ')',
            '',
            'for m in res.matches:',
            '    print(f"{m.score:.3f}  {m.id}  {m.metadata}")',
            '',
            '# 핵심 장점',
            '#   * 99.9%+ SLA, 자동 샤딩/백업/스케일',
            '#   * namespace로 멀티테넌시 자연스럽게 처리',
            '#   * 글로벌 리전 / 서버리스 / 인덱싱 자동화',
            '',
            '# 트레이드오프',
            '#   * 비용이 가장 비싸다 (벡터 100만 기준 월 수십~수백 USD)',
            '#   * 데이터 소버린티/보안 검토가 추가로 필요',
            '#   * 그러므로 "엔터프라이즈" 분기에서만 정당화된다',
          ],
          highlight: [11, 16, 17, 18, 19, 20, 21, 26, 27, 28, 29, 30, 31, 32, 35, 36, 37, 38, 39, 40, 41],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 색상 팔레트 — 결과 박스용
    // ─────────────────────────────────────────────────────
    const RESULT_COLORS = {
      blue:   { fill: '#dbeafe', stroke: '#2563eb', text: '#1e3a8a', fillActive: '#2563eb', textActive: '#ffffff' },
      green:  { fill: '#d1fae5', stroke: '#059669', text: '#064e3b', fillActive: '#059669', textActive: '#ffffff' },
      orange: { fill: '#fed7aa', stroke: '#ea580c', text: '#7c2d12', fillActive: '#ea580c', textActive: '#ffffff' },
      pink:   { fill: '#fce7f3', stroke: '#db2777', text: '#831843', fillActive: '#db2777', textActive: '#ffffff' },
    };

    // ─────────────────────────────────────────────────────
    // 노드 렌더링 — type 별로 모양이 다름
    //   start    : 둥근 박스
    //   question : 마름모 (rotated rect)
    //   result   : 사각형 박스
    // ─────────────────────────────────────────────────────
    function FlowNode({ node, isActive, isResult }) {
      const x = node.x;
      const y = node.y;

      if (node.type === 'start') {
        const fill = isActive ? '#7c3aed' : '#ddd6fe';
        const stroke = isActive ? '#5b21b6' : '#a78bfa';
        const textColor = isActive ? 'white' : '#5b21b6';
        return (
          <g className="transition-all duration-700">
            <rect x={x - 60} y={y - 22} width={120} height={44} rx={22} ry={22} fill={fill} stroke={stroke} strokeWidth={2} />
            <text x={x} y={y - 2} textAnchor="middle" fontSize="12" fontWeight="bold" fill={textColor} fontFamily="monospace">{node.label}</text>
            <text x={x} y={y + 12} textAnchor="middle" fontSize="9" fill={textColor} opacity="0.85" fontFamily="monospace">{node.sub}</text>
          </g>
        );
      }

      if (node.type === 'question') {
        const fill = isActive ? '#a78bfa' : '#f5f3ff';
        const stroke = isActive ? '#7c3aed' : '#c4b5fd';
        const textColor = isActive ? 'white' : '#6d28d9';
        // 마름모 — 가로 140 / 세로 56
        const points = `${x},${y - 30} ${x + 80},${y} ${x},${y + 30} ${x - 80},${y}`;
        return (
          <g className="transition-all duration-700">
            {isActive && (
              <polygon points={points} fill="none" stroke="#7c3aed" strokeWidth={2} opacity={0.45}>
                <animate attributeName="opacity" from="0.6" to="0" dur="1.4s" repeatCount="indefinite" />
              </polygon>
            )}
            <polygon points={points} fill={fill} stroke={stroke} strokeWidth={2} />
            <text x={x} y={y - 4} textAnchor="middle" fontSize="11" fontWeight="bold" fill={textColor} fontFamily="monospace">{node.label}</text>
            <text x={x} y={y + 10} textAnchor="middle" fontSize="9" fill={textColor} opacity="0.8" fontFamily="monospace">{node.sub}</text>
          </g>
        );
      }

      // result
      const palette = RESULT_COLORS[node.color] || RESULT_COLORS.blue;
      const isHighlighted = isResult; // 마지막 결과 박스는 더 강조
      const fill = isActive ? palette.fillActive : palette.fill;
      const stroke = palette.stroke;
      const textColor = isActive ? palette.textActive : palette.text;
      const w = 130;
      const h = 50;
      return (
        <g className="transition-all duration-700">
          {isHighlighted && (
            <rect
              x={x - w / 2 - 4}
              y={y - h / 2 - 4}
              width={w + 8}
              height={h + 8}
              rx={10}
              ry={10}
              fill="none"
              stroke={palette.stroke}
              strokeWidth={3}
              opacity={0.7}
            >
              <animate attributeName="opacity" from="0.85" to="0.2" dur="1.2s" repeatCount="indefinite" />
            </rect>
          )}
          <rect x={x - w / 2} y={y - h / 2} width={w} height={h} rx={8} ry={8} fill={fill} stroke={stroke} strokeWidth={isHighlighted ? 3 : 2} />
          <text x={x} y={y - 4} textAnchor="middle" fontSize="12" fontWeight="bold" fill={textColor} fontFamily="monospace">{node.label}</text>
          <text x={x} y={y + 12} textAnchor="middle" fontSize="9" fill={textColor} opacity="0.85" fontFamily="monospace">{node.sub}</text>
        </g>
      );
    }

    // ─────────────────────────────────────────────────────
    // 엣지 (직선/꺾인 선) — branch 'yes' 면 왼쪽으로, 'no' 면 아래쪽으로
    //   q? → r_? 는 왼쪽으로 꺾는 L 자
    //   q? → q? 는 아래로 직선
    // ─────────────────────────────────────────────────────
    function FlowEdge({ from, to, isActive, label, branch }) {
      const a = NODES[from];
      const b = NODES[to];
      if (!a || !b) return null;

      const stroke = isActive ? '#7c3aed' : '#cbd5e1';
      const strokeW = isActive ? 2.5 : 1.5;
      const opacity = isActive ? 1 : 0.55;

      // 왼쪽으로 꺾어 결과 박스로 — q?(x=240, y=Y) → r?(x=80, y=Y) 동일한 y 라서 직선
      const isLeftBranch = b.x < a.x;

      let pathD;
      let labelX, labelY;
      if (isLeftBranch) {
        // 마름모 왼쪽 점에서 결과 박스 오른쪽으로 직선
        pathD = `M ${a.x - 80} ${a.y} L ${b.x + 65} ${b.y}`;
        labelX = (a.x - 80 + b.x + 65) / 2;
        labelY = a.y - 6;
      } else {
        // 아래로 직선 — 위 노드의 아래변 → 아래 노드의 위변
        const aBottom = a.type === 'start' ? a.y + 22 : (a.type === 'question' ? a.y + 30 : a.y + 25);
        const bTop = b.type === 'question' ? b.y - 30 : (b.type === 'result' ? b.y - 25 : b.y - 22);
        pathD = `M ${a.x} ${aBottom} L ${b.x} ${bTop}`;
        labelX = a.x + 14;
        labelY = (aBottom + bTop) / 2;
      }

      return (
        <g className="transition-all duration-700">
          <path d={pathD} fill="none" stroke={stroke} strokeWidth={strokeW} opacity={opacity} markerEnd={isActive ? 'url(#arrow-active)' : 'url(#arrow-mute)'} />
          {label && (
            <g>
              <rect x={labelX - 18} y={labelY - 9} width={36} height={16} rx={3} fill={isActive ? '#7c3aed' : '#e2e8f0'} opacity={isActive ? 0.95 : 0.7} />
              <text x={labelX} y={labelY + 3} textAnchor="middle" fontSize="10" fontWeight="bold" fill={isActive ? 'white' : '#64748b'} fontFamily="monospace">
                {label}
              </text>
            </g>
          )}
        </g>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — 의사결정 플로우차트 SVG
    // ─────────────────────────────────────────────────────
    function FlowChart({ step }) {
      const w = 480;
      const h = 520;
      const activeNodeSet = new Set(step.activeNodes);
      const activeEdgeSet = new Set(step.activeEdges);

      const ansStyle = {
        thinking: 'bg-slate-50 border-slate-300 text-slate-700',
        success:  'bg-purple-50 border-purple-400 text-purple-900',
      };

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🗺️ 의사결정 플로우차트</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="rounded-lg bg-gradient-to-br from-purple-50 to-violet-100 border border-purple-200 p-2">
            <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
              <defs>
                <pattern id="grid-flow" width="30" height="30" patternUnits="userSpaceOnUse">
                  <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e9d5ff" strokeWidth="0.5" />
                </pattern>
                <marker id="arrow-active" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
                  <path d="M0,0 L9,4.5 L0,9 Z" fill="#7c3aed" />
                </marker>
                <marker id="arrow-mute" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
                  <path d="M0,0 L8,4 L0,8 Z" fill="#cbd5e1" />
                </marker>
              </defs>
              <rect width={w} height={h} fill="url(#grid-flow)" />

              {/* 엣지 먼저 */}
              {EDGES.map((e) => (
                <FlowEdge
                  key={`${e.from}-${e.to}`}
                  from={e.from}
                  to={e.to}
                  label={e.label}
                  branch={e.branch}
                  isActive={activeEdgeSet.has(`${e.from}-${e.to}`)}
                />
              ))}

              {/* 노드 */}
              {Object.values(NODES).map((n) => (
                <FlowNode
                  key={n.id}
                  node={n}
                  isActive={activeNodeSet.has(n.id)}
                  isResult={step.resultId === n.id}
                />
              ))}
            </svg>
          </div>

          {/* 질문 + 결정 박스 */}
          <div className="mt-4 space-y-2">
            <div className="rounded-lg bg-purple-600 text-white p-3 flex items-start gap-2 shadow-sm">
              <span className="text-lg leading-none">❓</span>
              <div className="flex-1">
                <div className="text-[10px] uppercase tracking-wider text-purple-200 font-bold">현재 분기</div>
                <div className="text-sm font-bold mt-0.5">{step.question}</div>
              </div>
            </div>

            <div className={`rounded-lg border-2 p-3 flex items-start gap-2 ${ansStyle[step.answerType]}`}>
              <span className="text-lg leading-none">{step.answerType === 'success' ? '✅' : '🤔'}</span>
              <div className="flex-1">
                <div className="text-[10px] uppercase tracking-wider font-bold opacity-70">결정</div>
                <div className="text-sm font-medium mt-0.5">{step.answer}</div>
              </div>
            </div>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: '#a78bfa' }}></span>
              마름모 = 분기 질문
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm" style={{ background: '#2563eb' }}></span>
              결과 = 추천 DB
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-0.5" style={{ background: '#7c3aed' }}></span>
              현재 경로
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[36rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-purple-500/15 border-l-2 border-purple-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-purple-700 hover:text-purple-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. 비교와 선택 가이드 &gt; Chapter 1. 비교 분석</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">의사결정 플로우차트 — 상황별 선택 가이드</h1>
                  <p className="text-sm text-slate-500 mt-0.5">5단계 분기로 pgvector / Chroma / FAISS / 관리형 중 하나에 도달</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <FlowChart step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-purple-50 border-2 border-purple-300 rounded-xl p-3 text-sm text-purple-900">
                💡 다음(V-2-1)에서는 <strong>하이브리드 아키텍처</strong> — pgvector + FAISS, Chroma + 관리형 같은 조합 패턴을 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-purple-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-purple-600 text-white hover:bg-purple-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./V-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; V-1-1 기능 비교 매트릭스</a>
              <a href="./V-2-1.html" className="text-purple-700 hover:text-purple-900 font-medium">V-2-1 하이브리드 아키텍처 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
