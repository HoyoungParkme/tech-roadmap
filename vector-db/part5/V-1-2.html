<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB — V-1-2. 의사결정 플로우차트 — 상황별 선택 가이드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const FLOW_NODES = [
      { id: 'start', label: '벡터 DB 선택 시작', type: 'start' },
      { id: 'q1', label: '이미 PostgreSQL을\n사용하고 있는가?', type: 'question' },
      { id: 'q2', label: 'SQL로 메타데이터\n필터링이 필요한가?', type: 'question' },
      { id: 'q3', label: '프로토타입/MVP\n단계인가?', type: 'question' },
      { id: 'q4', label: '데이터가\n100만건 이상인가?', type: 'question' },
      { id: 'q5', label: 'GPU 환경이\n있는가?', type: 'question' },
      { id: 'pgvector', label: 'pgvector', type: 'result', color: 'blue' },
      { id: 'chroma', label: 'Chroma', type: 'result', color: 'green' },
      { id: 'faiss', label: 'FAISS', type: 'result', color: 'orange' },
    ];

    const STEPS = [
      {
        desc: "어떤 벡터 DB를 선택해야 할까요? 의사결정 플로우차트를 따라가면 프로젝트에 적합한 벡터 DB에 도달합니다. 5가지 핵심 질문으로 분기합니다.",
        activeNodes: ['start'],
        left: 'flowchart-full',
        right: 'questions',
      },
      {
        desc: "첫 번째 질문: \"이미 PostgreSQL을 사용하고 있는가?\" YES라면 pgvector가 강력한 후보입니다. 새 인프라를 도입할 필요 없이 CREATE EXTENSION vector; 한 줄로 벡터 검색을 추가할 수 있습니다.",
        activeNodes: ['start', 'q1', 'pgvector'],
        left: 'flowchart-q1',
        right: 'pgvector-case',
      },
      {
        desc: "두 번째 분기: \"프로토타입인가?\" + \"SQL 메타데이터 필터가 필요한가?\" 빠른 프로토타이핑이 목표라면 Chroma가 최적입니다. SQL 통합이 필요하면 pgvector를 고려하세요.",
        activeNodes: ['start', 'q1', 'q2', 'q3', 'chroma', 'pgvector'],
        left: 'flowchart-q2q3',
        right: 'chroma-case',
      },
      {
        desc: "세 번째 분기: \"데이터가 100만건 이상인가?\" + \"GPU가 있는가?\" 대규모 데이터에서 초고속 검색이 필요하다면 FAISS가 압도적입니다. 특히 GPU가 있으면 10억 벡터도 밀리초 단위로 검색 가능합니다.",
        activeNodes: ['start', 'q1', 'q3', 'q4', 'q5', 'faiss', 'chroma'],
        left: 'flowchart-q4q5',
        right: 'faiss-case',
      },
      {
        desc: "전체 플로우차트를 정리합니다. 핵심은 '기존 인프라 → 데이터 규모 → 개발 단계' 순으로 판단하는 것입니다. 하나만 쓸 필요는 없습니다 — 다음 시각화(V-2-1)에서 조합 패턴을 다룹니다.",
        activeNodes: FLOW_NODES.map(n => n.id),
        left: 'flowchart-full',
        right: 'decision-summary',
      },
    ];

    function FlowNode({ node, isActive, x, y }) {
      const colors = {
        start: { bg: 'bg-slate-600', text: 'text-white', border: 'border-slate-700' },
        question: { bg: isActive ? 'bg-rose-100' : 'bg-slate-50', text: isActive ? 'text-rose-800' : 'text-slate-400', border: isActive ? 'border-rose-300' : 'border-slate-200' },
        result: {
          blue: { bg: isActive ? 'bg-blue-100' : 'bg-slate-50', text: isActive ? 'text-blue-800' : 'text-slate-400', border: isActive ? 'border-blue-300' : 'border-slate-200' },
          green: { bg: isActive ? 'bg-green-100' : 'bg-slate-50', text: isActive ? 'text-green-800' : 'text-slate-400', border: isActive ? 'border-green-300' : 'border-slate-200' },
          orange: { bg: isActive ? 'bg-orange-100' : 'bg-slate-50', text: isActive ? 'text-orange-800' : 'text-slate-400', border: isActive ? 'border-orange-300' : 'border-slate-200' },
        },
      };

      let style = colors[node.type];
      if (node.type === 'result') style = colors.result[node.color];

      return (
        <div className={`absolute p-2 rounded-lg border-2 text-center transition-all duration-500 ${style.bg} ${style.border} ${isActive ? 'shadow-md scale-105' : 'opacity-40'}`}
          style={{ left: x, top: y, width: node.type === 'start' ? '140px' : '130px', minHeight: '40px' }}>
          <div className={`text-xs font-bold ${style.text} whitespace-pre-line leading-tight`}>{node.label}</div>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderLeft = () => {
        const flowData = [
          { q: '이미 PostgreSQL을 쓰는가?', yes: 'pgvector 강력 추천', no: '다음 질문으로', color: 'blue' },
          { q: 'SQL 메타데이터 필터 필요?', yes: 'pgvector 고려', no: '다음 질문으로', color: 'blue' },
          { q: '프로토타입/MVP 단계?', yes: 'Chroma 추천', no: '다음 질문으로', color: 'green' },
          { q: '데이터 100만건 이상?', yes: 'FAISS 고려', no: 'Chroma도 충분', color: 'orange' },
          { q: 'GPU 환경이 있는가?', yes: 'FAISS + GPU', no: 'FAISS CPU or pgvector', color: 'orange' },
        ];

        const activeRange = {
          'flowchart-full': [0, 1, 2, 3, 4],
          'flowchart-q1': [0],
          'flowchart-q2q3': [1, 2],
          'flowchart-q4q5': [3, 4],
        };

        const activeIndices = activeRange[s.left] || [];

        return (
          <div>
            <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">의사결정 플로우차트</div>
            <div className="space-y-2">
              {flowData.map((item, i) => {
                const isActive = activeIndices.includes(i);
                return (
                  <div key={i} className={`p-3 rounded-lg border transition-all duration-300 ${
                    isActive ? 'bg-rose-50 border-rose-300 shadow-sm' : 'bg-slate-50 border-slate-200 opacity-50'
                  }`}>
                    <div className={`font-bold text-sm mb-2 ${isActive ? 'text-rose-800' : 'text-slate-400'}`}>
                      Q{i+1}. {item.q}
                    </div>
                    <div className="flex gap-2">
                      <div className={`flex-1 p-2 rounded text-xs text-center border ${
                        isActive ? 'bg-emerald-50 border-emerald-200 text-emerald-700 font-bold' : 'bg-slate-50 border-slate-100 text-slate-400'
                      }`}>
                        YES → {item.yes}
                      </div>
                      <div className={`flex-1 p-2 rounded text-xs text-center border ${
                        isActive ? 'bg-slate-100 border-slate-200 text-slate-600' : 'bg-slate-50 border-slate-100 text-slate-400'
                      }`}>
                        NO → {item.no}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      const renderRight = () => {
        switch (s.right) {
          case 'questions':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">5가지 핵심 질문</div>
                <div className="space-y-2">
                  {[
                    { q: '이미 PostgreSQL을 쓰는가?', hint: '기존 인프라 활용 가능성' },
                    { q: 'SQL 메타데이터 필터가 필요한가?', hint: 'JOIN, WHERE, 트랜잭션 필요성' },
                    { q: '프로토타입/MVP 단계인가?', hint: '개발 속도 vs 프로덕션 안정성' },
                    { q: '데이터가 100만건 이상인가?', hint: '규모에 따른 성능 요구사항' },
                    { q: 'GPU 환경이 있는가?', hint: '하드웨어 가속 가능성' },
                  ].map((item, i) => (
                    <div key={i} className="flex items-start gap-3 p-3 bg-rose-50 border border-rose-200 rounded-lg">
                      <div className="w-6 h-6 bg-rose-500 text-white rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0">{i+1}</div>
                      <div>
                        <div className="font-bold text-sm text-rose-800">{item.q}</div>
                        <div className="text-xs text-rose-600 mt-0.5">{item.hint}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          case 'pgvector-case':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">pgvector 추천 시나리오</div>
                <div className="space-y-3">
                  <div className="p-4 bg-blue-50 border border-blue-200 rounded-lg">
                    <div className="font-bold text-sm text-blue-800 mb-2">이런 경우 pgvector</div>
                    <div className="space-y-1.5 text-xs text-blue-700">
                      <div>- 이미 PostgreSQL 인프라가 있다</div>
                      <div>- 벡터 검색 + SQL 조건을 결합해야 한다</div>
                      <div>- ACID 트랜잭션이 필요하다</div>
                      <div>- 새 DB 도입 비용을 줄이고 싶다</div>
                      <div>- DBA가 PostgreSQL에 익숙하다</div>
                    </div>
                  </div>
                  <div className="p-3 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-700">
                    <b>주의:</b> 10억 벡터 이상 초대규모에서는 FAISS가 더 적합할 수 있음
                  </div>
                  <pre className="bg-slate-800 text-slate-100 rounded-lg p-3 text-xs font-mono whitespace-pre-wrap">{`-- 한 줄로 벡터 DB 추가
CREATE EXTENSION vector;

-- 기존 테이블에 벡터 컬럼 추가
ALTER TABLE products
  ADD COLUMN embedding vector(1536);`}</pre>
                </div>
              </div>
            );
          case 'chroma-case':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Chroma 추천 시나리오</div>
                <div className="space-y-3">
                  <div className="p-4 bg-green-50 border border-green-200 rounded-lg">
                    <div className="font-bold text-sm text-green-800 mb-2">이런 경우 Chroma</div>
                    <div className="space-y-1.5 text-xs text-green-700">
                      <div>- 빠르게 프로토타입을 만들어야 한다</div>
                      <div>- RAG 파이프라인을 테스트 중이다</div>
                      <div>- LangChain/LlamaIndex를 사용한다</div>
                      <div>- 데이터가 100만건 이하이다</div>
                      <div>- 최소한의 코드로 시작하고 싶다</div>
                    </div>
                  </div>
                  <div className="p-3 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-700">
                    <b>주의:</b> 프로덕션 규모로 성장 시 pgvector나 FAISS로 마이그레이션 고려
                  </div>
                  <pre className="bg-slate-800 text-slate-100 rounded-lg p-3 text-xs font-mono whitespace-pre-wrap">{`import chromadb
client = chromadb.Client()
col = client.create_collection("docs")
col.add(documents=["..."], ids=["1"])
results = col.query(
  query_texts=["질문"], n_results=5
)`}</pre>
                </div>
              </div>
            );
          case 'faiss-case':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">FAISS 추천 시나리오</div>
                <div className="space-y-3">
                  <div className="p-4 bg-orange-50 border border-orange-200 rounded-lg">
                    <div className="font-bold text-sm text-orange-800 mb-2">이런 경우 FAISS</div>
                    <div className="space-y-1.5 text-xs text-orange-700">
                      <div>- 100만~10억 벡터의 대규모 검색</div>
                      <div>- 밀리초 미만의 응답 속도가 필수</div>
                      <div>- GPU 인프라를 활용할 수 있다</div>
                      <div>- 메타데이터 필터링이 불필요하다</div>
                      <div>- 배치 처리 위주의 워크로드</div>
                    </div>
                  </div>
                  <div className="p-3 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-700">
                    <b>주의:</b> 영속성, 메타데이터, CRUD는 직접 구현 필요
                  </div>
                  <pre className="bg-slate-800 text-slate-100 rounded-lg p-3 text-xs font-mono whitespace-pre-wrap">{`import faiss
index = faiss.IndexHNSWFlat(768, 32)
index.add(vectors)  # 100만 벡터
D, I = index.search(query, k=10)
# ~1ms (CPU), ~0.1ms (GPU)`}</pre>
                </div>
              </div>
            );
          case 'decision-summary':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">의사결정 요약</div>
                <div className="space-y-3">
                  <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg">
                    <div className="font-bold text-sm text-blue-800">PostgreSQL 있음</div>
                    <div className="text-xs text-blue-700 mt-1">→ pgvector (기존 인프라 활용)</div>
                  </div>
                  <div className="p-3 bg-green-50 border border-green-200 rounded-lg">
                    <div className="font-bold text-sm text-green-800">프로토타입/소규모</div>
                    <div className="text-xs text-green-700 mt-1">→ Chroma (빠른 시작)</div>
                  </div>
                  <div className="p-3 bg-orange-50 border border-orange-200 rounded-lg">
                    <div className="font-bold text-sm text-orange-800">대규모 + 고성능</div>
                    <div className="text-xs text-orange-700 mt-1">→ FAISS (초고속 검색)</div>
                  </div>
                  <div className="p-3 bg-rose-50 border border-rose-200 rounded-lg">
                    <div className="font-bold text-sm text-rose-800">조합도 가능!</div>
                    <div className="text-xs text-rose-700 mt-1">Chroma(개발) → pgvector(프로덕션), FAISS(캐시) + pgvector(저장) 등</div>
                  </div>
                </div>
                <div className="mt-3 p-3 bg-slate-50 border border-slate-200 rounded-lg text-xs text-slate-600">
                  다음: V-2-1에서 <b>하이브리드 아키텍처 패턴</b>을 다룹니다
                </div>
              </div>
            );
          default: return null;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-rose-700 hover:text-rose-900 font-medium">
                <span>&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. 비교와 선택 가이드 &gt; Chapter 1. 비교 분석</div>
                  <h1 className="text-2xl font-bold text-slate-800">V-1-2. 의사결정 플로우차트 — 상황별 선택 가이드</h1>
                </div>
              </div>
              <p className="text-slate-600">5가지 핵심 질문에 YES/NO로 답하면 <b>프로젝트에 최적인 벡터 DB</b>에 도달합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-rose-700 border-rose-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">선택 플로우차트</h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {renderLeft()}
              </div>
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {renderRight()}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['의사결정', '플로우차트', '프로토타입', '프로덕션', '마이그레이션'].map(kw => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-sm font-medium border border-rose-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-rose-600 hover:bg-rose-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./V-1-1.html" className="text-rose-600 hover:text-rose-800 font-medium">&larr; V-1-1. 기능 비교 매트릭스</a>
              <a href="./V-2-1.html" className="text-rose-600 hover:text-rose-800 font-medium">V-2-1. 하이브리드 아키텍처 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
