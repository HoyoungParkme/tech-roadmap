<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB 인터랙티브 학습</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <style>html, body, #root { height: 100%; margin: 0; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const SECTIONS = [
      { part: 'I', label: 'Part I. 벡터 DB 기초', color: 'bg-cyan-600', items: [
        { id: 'I-1-1', title: '전통 DB vs 벡터 DB', file: './part1/I-1-1.html' },
        { id: 'I-1-2', title: '벡터 DB 핵심 개념', file: './part1/I-1-2.html' },
        { id: 'I-2-1', title: '벡터 DB 아키텍처 전체 지도', file: './part1/I-2-1.html' },
        { id: 'I-2-2', title: '벡터 DB 종류와 분류', file: './part1/I-2-2.html' },
      ]},
      { part: 'II', label: 'Part II. FAISS', color: 'bg-orange-600', items: [
        { id: 'II-1-1', title: 'FAISS란', file: './part2/II-1-1.html' },
        { id: 'II-1-2', title: 'FAISS 인덱스 종류', file: './part2/II-1-2.html' },
        { id: 'II-2-1', title: 'FAISS 실전 워크플로우', file: './part2/II-2-1.html' },
        { id: 'II-2-2', title: 'FAISS 최적화', file: './part2/II-2-2.html' },
        { id: 'II-2-3', title: 'FAISS 한계와 보완', file: './part2/II-2-3.html' },
      ]},
      { part: 'III', label: 'Part III. Chroma', color: 'bg-green-600', items: [
        { id: 'III-1-1', title: 'Chroma란', file: './part3/III-1-1.html' },
        { id: 'III-1-2', title: 'Chroma 핵심 기능', file: './part3/III-1-2.html' },
        { id: 'III-2-1', title: 'Chroma 아키텍처', file: './part3/III-2-1.html' },
        { id: 'III-2-2', title: 'Chroma + 프레임워크 통합', file: './part3/III-2-2.html' },
      ]},
      { part: 'IV', label: 'Part IV. pgvector', color: 'bg-blue-600', items: [
        { id: 'IV-1-1', title: 'pgvector란', file: './part4/IV-1-1.html' },
        { id: 'IV-1-2', title: 'pgvector 데이터 모델', file: './part4/IV-1-2.html' },
        { id: 'IV-2-1', title: 'pgvector 인덱싱', file: './part4/IV-2-1.html' },
        { id: 'IV-2-2', title: 'pgvector 실전', file: './part4/IV-2-2.html' },
        { id: 'IV-2-3', title: 'pgvector 운영', file: './part4/IV-2-3.html' },
      ]},
      { part: 'V', label: 'Part V. 비교와 선택', color: 'bg-rose-600', items: [
        { id: 'V-1-1', title: '3종 비교 매트릭스', file: './part5/V-1-1.html' },
        { id: 'V-1-2', title: '의사결정 플로우차트', file: './part5/V-1-2.html' },
        { id: 'V-2-1', title: '하이브리드 아키텍처', file: './part5/V-2-1.html' },
        { id: 'V-2-2', title: '프로덕션 운영', file: './part5/V-2-2.html' },
      ]},
    ];
    const TOTAL = SECTIONS.reduce((s, sec) => s + sec.items.length, 0);
    const PART_BG = { I:'hover:bg-cyan-50', II:'hover:bg-orange-50', III:'hover:bg-green-50', IV:'hover:bg-blue-50', V:'hover:bg-rose-50' };
    const PART_ACTIVE = { I:'bg-cyan-100 text-cyan-800 font-bold', II:'bg-orange-100 text-orange-800 font-bold', III:'bg-green-100 text-green-800 font-bold', IV:'bg-blue-100 text-blue-800 font-bold', V:'bg-rose-100 text-rose-800 font-bold' };

    function findItemById(id) { for (const s of SECTIONS) { const f = s.items.find(i => i.id === id); if (f) return {...f, part: s.part}; } return null; }

    function App() {
      const [activeId, setActiveId] = useState(null);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [expandedParts, setExpandedParts] = useState({I:true,II:true,III:true,IV:true,V:true});
      const activeItem = activeId ? findItemById(activeId) : null;
      const navigate = useCallback((id) => { setActiveId(id); window.location.hash = id; if (window.innerWidth < 1024) setSidebarOpen(false); }, []);
      useEffect(() => { const h = window.location.hash.slice(1); if (h && findItemById(h)) setActiveId(h); const onHash = () => { const hh = window.location.hash.slice(1); if (hh && findItemById(hh)) setActiveId(hh); }; window.addEventListener('hashchange', onHash); return () => window.removeEventListener('hashchange', onHash); }, []);

      return (
        <div className="h-full flex bg-slate-100">
          {sidebarOpen && <div className="fixed inset-0 bg-black bg-opacity-30 z-30 lg:hidden" onClick={() => setSidebarOpen(false)} />}
          <aside className={`fixed lg:static z-40 h-full w-72 bg-white border-r border-slate-200 flex flex-col transition-transform duration-200 ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0 lg:w-72'}`}>
            <div className="p-4 border-b border-slate-200 shrink-0">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 bg-cyan-600 text-white flex items-center justify-center rounded-lg font-bold text-sm">V</div>
                <div><div className="font-bold text-slate-800 text-sm">Vector DB 학습</div><div className="text-[11px] text-slate-500">{TOTAL}개 시각화</div></div>
              </div>
            </div>
            <nav className="flex-1 overflow-y-auto p-2">
              {SECTIONS.map(s => (
                <div key={s.part} className="mb-1">
                  <button onClick={() => setExpandedParts(p => ({...p,[s.part]:!p[s.part]}))} className="w-full flex items-center gap-2 px-2 py-2 rounded-lg text-left hover:bg-slate-50 transition">
                    <span className={`w-5 h-5 rounded text-white text-[10px] flex items-center justify-center font-bold ${s.color}`}>{s.part}</span>
                    <span className="text-xs font-bold text-slate-700 flex-1 truncate">{s.label}</span>
                    <span className="text-[10px] text-slate-400">{s.items.length}</span>
                    <span className={`text-slate-400 text-xs transition-transform ${expandedParts[s.part] ? 'rotate-90' : ''}`}>&#9654;</span>
                  </button>
                  {expandedParts[s.part] && <div className="ml-4 border-l border-slate-100 pl-2 space-y-0.5">
                    {s.items.map(item => <button key={item.id} onClick={() => navigate(item.id)} className={`w-full text-left px-2 py-1.5 rounded-md text-xs transition-all truncate ${activeId === item.id ? PART_ACTIVE[s.part] : `text-slate-600 ${PART_BG[s.part]}`}`}><span className="font-mono text-[10px] opacity-60 mr-1">{item.id}</span>{item.title}</button>)}
                  </div>}
                </div>
              ))}
            </nav>
            <div className="p-3 border-t border-slate-200 shrink-0 text-[10px] text-slate-400 text-center">React + Tailwind + Babel CDN</div>
          </aside>
          <main className="flex-1 flex flex-col min-w-0">
            <div className="h-12 bg-white border-b border-slate-200 flex items-center px-4 shrink-0 gap-3">
              <button onClick={() => setSidebarOpen(p => !p)} className="lg:hidden p-1.5 rounded-md hover:bg-slate-100 text-slate-600"><svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M3 5h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2z"/></svg></button>
              {activeItem ? <div className="flex items-center gap-2 min-w-0"><span className={`w-5 h-5 rounded text-white text-[10px] flex items-center justify-center font-bold shrink-0 ${SECTIONS.find(s=>s.part===activeItem.part)?.color}`}>{activeItem.part}</span><span className="font-mono text-xs text-slate-500 shrink-0">{activeItem.id}</span><span className="text-sm font-bold text-slate-800 truncate">{activeItem.title}</span></div> : <span className="text-sm text-slate-500">시각화를 선택하세요</span>}
            </div>
            {activeItem ? <iframe key={activeItem.id} src={activeItem.file} className="flex-1 w-full border-0" title={activeItem.title} /> : (
              <div className="flex-1 flex items-center justify-center p-8"><div className="text-center max-w-md">
                <div className="w-16 h-16 bg-cyan-100 text-cyan-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl font-bold">V</div>
                <h2 className="text-2xl font-bold text-slate-800 mb-3">Vector DB 학습</h2>
                <p className="text-slate-600 mb-6 leading-relaxed">왼쪽 사이드바에서 시각화를 선택하세요.<br/>Part I부터 순서대로 보거나, 관심 있는 DB를 바로 클릭할 수 있습니다.</p>
                <div className="grid grid-cols-5 gap-2 mb-6">{SECTIONS.map(s => <div key={s.part} className="text-center"><div className={`w-8 h-8 rounded-lg text-white text-xs flex items-center justify-center font-bold mx-auto mb-1 ${s.color}`}>{s.part}</div><div className="text-[10px] text-slate-500">{s.items.length}개</div></div>)}</div>
                <p className="text-xs text-slate-400">총 {TOTAL}개 시각화 | React + Tailwind CDN</p>
              </div></div>
            )}
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
