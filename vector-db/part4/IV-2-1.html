<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB — IV-2-1. pgvector 인덱싱 — IVFFlat vs HNSW</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "pgvector에서 인덱스 없이 검색하면 Seq Scan — 모든 벡터를 하나씩 비교합니다. 10만 건이면 10만 번 거리 계산. 도서관에서 모든 책을 처음부터 끝까지 넘기는 것과 같습니다. 인덱스가 필요한 이유입니다.",
        left: 'noindex',
        right: 'problem',
      },
      {
        desc: "첫 번째 분류 체계: IVFFlat (Inverted File Flat). 벡터를 여러 '구역(list)'으로 미리 나눕니다. 도서관 층별 분류와 같습니다 — 1층은 소설, 2층은 과학. 검색 시 관련 구역만 탐색합니다.",
        left: 'ivfflat-concept',
        right: 'ivfflat-code',
      },
      {
        desc: "IVFFlat의 핵심 파라미터: lists(구역 수)와 probes(검색할 구역 수). lists가 많으면 구역이 작아져 빠르지만 recall이 떨어질 수 있고, probes를 늘리면 정확도가 올라가지만 느려집니다.",
        left: 'ivfflat-params',
        right: 'ivfflat-tradeoff',
      },
      {
        desc: "두 번째 분류 체계: HNSW (Hierarchical Navigable Small World). 벡터를 그래프로 연결합니다. '친구의 친구를 따라가면 원하는 사람을 찾는다'는 원리. 상위 레이어에서 큰 점프, 하위 레이어에서 정밀 탐색합니다.",
        left: 'hnsw-concept',
        right: 'hnsw-code',
      },
      {
        desc: "HNSW의 핵심 파라미터: m(각 노드의 연결 수)과 ef_construction(빌드 시 탐색 범위). m이 크면 그래프가 촘촘해져 정확하지만 메모리를 많이 쓰고, ef_construction이 크면 빌드는 느리지만 품질이 좋습니다.",
        left: 'hnsw-params',
        right: 'hnsw-tradeoff',
      },
      {
        desc: "IVFFlat vs HNSW 최종 비교. IVFFlat은 빌드가 빠르고 메모리가 적지만 train이 필요합니다. HNSW는 recall이 높고 train 불필요하지만 메모리를 많이 씁니다. 데이터 크기와 정확도 요구에 따라 선택하세요.",
        left: 'compare-table',
        right: 'recommend',
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderLeft = () => {
        switch (s.left) {
          case 'noindex':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">인덱스 없는 검색</div>
                <pre className="bg-slate-800 text-slate-100 rounded-lg p-4 text-sm font-mono whitespace-pre-wrap mb-3">{`-- 인덱스 없이 검색 (Seq Scan)
SELECT id, content,
  embedding <=> '[0.1,0.2,...]' AS dist
FROM documents
ORDER BY embedding <=> '[0.1,0.2,...]'
LIMIT 5;

-- EXPLAIN 결과:
-- Seq Scan on documents
-- (cost=0.00..25000.00 rows=100000)`}</pre>
                <div className="p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">100,000건 기준: 약 500ms ~ 2초 소요</div>
              </div>
            );
          case 'ivfflat-concept':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">IVFFlat 개념도</div>
                <div className="space-y-2">
                  {[
                    { label: '구역 1 (소설)', items: ['벡터 A', '벡터 B', '벡터 C'], color: 'bg-blue-50 border-blue-200' },
                    { label: '구역 2 (과학)', items: ['벡터 D', '벡터 E'], color: 'bg-emerald-50 border-emerald-200' },
                    { label: '구역 3 (역사)', items: ['벡터 F', '벡터 G', '벡터 H'], color: 'bg-amber-50 border-amber-200' },
                    { label: '구역 4 (예술)', items: ['벡터 I', '벡터 J'], color: 'bg-purple-50 border-purple-200' },
                  ].map((zone, i) => (
                    <div key={i} className={`p-3 rounded-lg border ${zone.color}`}>
                      <div className="font-bold text-xs mb-1">{zone.label}</div>
                      <div className="flex gap-1">
                        {zone.items.map((v, j) => (
                          <span key={j} className="bg-white px-2 py-0.5 rounded text-xs border">{v}</span>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
                <div className="mt-2 text-xs text-slate-500">쿼리 벡터와 가장 가까운 구역 중심을 찾고, 해당 구역만 검색</div>
              </div>
            );
          case 'ivfflat-params':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">IVFFlat 파라미터</div>
                <div className="space-y-3">
                  <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg">
                    <div className="font-bold text-sm text-blue-800 mb-1">lists (구역 수)</div>
                    <div className="text-xs text-blue-700 mb-2">권장: sqrt(전체 행 수). 100만 건이면 lists = 1000</div>
                    <pre className="bg-white rounded p-2 text-xs font-mono border border-blue-100">{`CREATE INDEX ON docs USING ivfflat
  (embedding vector_cosine_ops)
  WITH (lists = 1000);`}</pre>
                  </div>
                  <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg">
                    <div className="font-bold text-sm text-blue-800 mb-1">probes (검색 구역 수)</div>
                    <div className="text-xs text-blue-700 mb-2">기본값 1. 높이면 recall 증가, 속도 감소</div>
                    <pre className="bg-white rounded p-2 text-xs font-mono border border-blue-100">{`SET ivfflat.probes = 10;
-- 1000개 구역 중 10개만 검색
-- recall ~95%, 속도 ~10배 향상`}</pre>
                  </div>
                </div>
              </div>
            );
          case 'hnsw-concept':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">HNSW 개념도</div>
                <div className="space-y-2">
                  <div className="p-3 bg-purple-50 border border-purple-200 rounded-lg">
                    <div className="font-bold text-xs text-purple-800 mb-1">Layer 2 (상위 - 큰 점프)</div>
                    <div className="flex items-center gap-2 text-xs text-purple-700">
                      <span className="bg-purple-200 px-2 py-1 rounded">A</span>
                      <span>---</span>
                      <span className="bg-purple-200 px-2 py-1 rounded">F</span>
                      <span>---</span>
                      <span className="bg-purple-200 px-2 py-1 rounded">K</span>
                    </div>
                  </div>
                  <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg">
                    <div className="font-bold text-xs text-blue-800 mb-1">Layer 1 (중간 - 중간 점프)</div>
                    <div className="flex items-center gap-2 text-xs text-blue-700">
                      <span className="bg-blue-200 px-2 py-1 rounded">A</span>
                      <span>-</span>
                      <span className="bg-blue-200 px-2 py-1 rounded">C</span>
                      <span>-</span>
                      <span className="bg-blue-200 px-2 py-1 rounded">F</span>
                      <span>-</span>
                      <span className="bg-blue-200 px-2 py-1 rounded">H</span>
                      <span>-</span>
                      <span className="bg-blue-200 px-2 py-1 rounded">K</span>
                    </div>
                  </div>
                  <div className="p-3 bg-emerald-50 border border-emerald-200 rounded-lg">
                    <div className="font-bold text-xs text-emerald-800 mb-1">Layer 0 (하위 - 정밀 탐색)</div>
                    <div className="flex items-center gap-1 text-xs text-emerald-700 flex-wrap">
                      {['A','B','C','D','E','F','G','H','I','J','K'].map(n => (
                        <span key={n} className="bg-emerald-200 px-1.5 py-0.5 rounded">{n}</span>
                      ))}
                    </div>
                  </div>
                </div>
                <div className="mt-2 text-xs text-slate-500">상위 레이어에서 대략적 위치를 잡고, 하위로 내려가며 정밀 탐색</div>
              </div>
            );
          case 'hnsw-params':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">HNSW 파라미터</div>
                <div className="space-y-3">
                  <div className="p-3 bg-purple-50 border border-purple-200 rounded-lg">
                    <div className="font-bold text-sm text-purple-800 mb-1">m (연결 수)</div>
                    <div className="text-xs text-purple-700 mb-2">기본 16. 높이면 recall 증가, 메모리 증가</div>
                    <pre className="bg-white rounded p-2 text-xs font-mono border border-purple-100">{`CREATE INDEX ON docs USING hnsw
  (embedding vector_cosine_ops)
  WITH (m = 16, ef_construction = 64);`}</pre>
                  </div>
                  <div className="p-3 bg-purple-50 border border-purple-200 rounded-lg">
                    <div className="font-bold text-sm text-purple-800 mb-1">ef_search (검색 시 탐색 범위)</div>
                    <div className="text-xs text-purple-700 mb-2">기본 40. 높이면 recall 증가, 속도 감소</div>
                    <pre className="bg-white rounded p-2 text-xs font-mono border border-purple-100">{`SET hnsw.ef_search = 100;
-- recall ~99%, Seq Scan 대비 50배 빠름`}</pre>
                  </div>
                </div>
              </div>
            );
          case 'compare-table':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">IVFFlat vs HNSW 비교</div>
                <div className="overflow-x-auto">
                  <table className="w-full text-sm border-collapse">
                    <thead>
                      <tr className="bg-slate-100">
                        <th className="p-2 text-left border border-slate-200">항목</th>
                        <th className="p-2 text-center border border-slate-200 text-blue-700">IVFFlat</th>
                        <th className="p-2 text-center border border-slate-200 text-purple-700">HNSW</th>
                      </tr>
                    </thead>
                    <tbody>
                      {[
                        ['빌드 속도', '빠름', '느림'],
                        ['검색 속도', '보통', '빠름'],
                        ['Recall', '보통 (90~95%)', '높음 (95~99%)'],
                        ['메모리 사용', '적음', '많음 (2~3배)'],
                        ['Train 필요', '필요 (데이터 선행)', '불필요'],
                        ['동적 추가', '가능 (rebuild 권장)', '바로 가능'],
                      ].map(([item, ivf, hnsw], i) => (
                        <tr key={i} className={i % 2 === 0 ? 'bg-white' : 'bg-slate-50'}>
                          <td className="p-2 border border-slate-200 font-medium">{item}</td>
                          <td className="p-2 border border-slate-200 text-center text-blue-700">{ivf}</td>
                          <td className="p-2 border border-slate-200 text-center text-purple-700">{hnsw}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          default: return null;
        }
      };

      const renderRight = () => {
        switch (s.right) {
          case 'problem':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">왜 인덱스가 필요한가</div>
                <div className="space-y-3">
                  {[
                    { rows: '10,000', time: '~50ms', status: 'ok', label: '소규모' },
                    { rows: '100,000', time: '~500ms', status: 'warn', label: '중규모' },
                    { rows: '1,000,000', time: '~5초', status: 'bad', label: '대규모' },
                    { rows: '10,000,000', time: '~50초', status: 'bad', label: '초대규모' },
                  ].map((r, i) => (
                    <div key={i} className={`p-3 rounded-lg border flex justify-between items-center ${
                      r.status === 'ok' ? 'bg-emerald-50 border-emerald-200' :
                      r.status === 'warn' ? 'bg-amber-50 border-amber-200' : 'bg-red-50 border-red-200'
                    }`}>
                      <div>
                        <div className="font-bold text-sm">{r.label} ({r.rows}건)</div>
                      </div>
                      <div className={`font-mono text-sm font-bold ${
                        r.status === 'ok' ? 'text-emerald-700' : r.status === 'warn' ? 'text-amber-700' : 'text-red-700'
                      }`}>{r.time}</div>
                    </div>
                  ))}
                </div>
                <div className="mt-3 p-3 bg-blue-50 border border-blue-200 rounded-lg text-xs text-blue-700">
                  pgvector는 <b>IVFFlat</b>과 <b>HNSW</b> 두 가지 인덱스를 지원합니다
                </div>
              </div>
            );
          case 'ivfflat-code':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">IVFFlat 생성 SQL</div>
                <pre className="bg-slate-800 text-slate-100 rounded-lg p-4 text-sm font-mono whitespace-pre-wrap mb-3">{`-- 1. 인덱스 생성 (데이터가 먼저 있어야 함)
CREATE INDEX idx_docs_ivfflat
  ON documents
  USING ivfflat (embedding vector_cosine_ops)
  WITH (lists = 100);

-- 2. 검색 시 probes 설정
SET ivfflat.probes = 10;

-- 3. 검색 실행
SELECT id, content,
  1 - (embedding <=> $1) AS similarity
FROM documents
ORDER BY embedding <=> $1
LIMIT 10;`}</pre>
                <div className="p-3 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-700">
                  IVFFlat은 데이터를 먼저 넣은 뒤 인덱스를 생성해야 합니다 (train 과정 포함)
                </div>
              </div>
            );
          case 'ivfflat-tradeoff':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">lists / probes 트레이드오프</div>
                <div className="space-y-3">
                  <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg">
                    <div className="font-bold text-sm text-slate-700 mb-2">probes 값에 따른 변화</div>
                    {[
                      { probes: 1, recall: '70%', speed: '매우 빠름', bar: 'w-2/12' },
                      { probes: 5, recall: '88%', speed: '빠름', bar: 'w-5/12' },
                      { probes: 10, recall: '95%', speed: '보통', bar: 'w-8/12' },
                      { probes: 50, recall: '99%', speed: '느림', bar: 'w-11/12' },
                    ].map((p, i) => (
                      <div key={i} className="flex items-center gap-2 mb-1">
                        <span className="text-xs font-mono w-16 text-slate-600">probes={p.probes}</span>
                        <div className="flex-1 bg-slate-200 rounded-full h-3">
                          <div className={`bg-blue-500 h-3 rounded-full ${p.bar}`}></div>
                        </div>
                        <span className="text-xs font-medium w-10 text-right">{p.recall}</span>
                      </div>
                    ))}
                  </div>
                  <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg text-xs text-blue-700">
                    <b>권장 공식:</b> lists = sqrt(N), probes = sqrt(lists)<br/>
                    100만 건: lists=1000, probes=~32
                  </div>
                </div>
              </div>
            );
          case 'hnsw-code':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">HNSW 생성 SQL</div>
                <pre className="bg-slate-800 text-slate-100 rounded-lg p-4 text-sm font-mono whitespace-pre-wrap mb-3">{`-- 1. 인덱스 생성 (빈 테이블에도 가능)
CREATE INDEX idx_docs_hnsw
  ON documents
  USING hnsw (embedding vector_cosine_ops)
  WITH (m = 16, ef_construction = 64);

-- 2. 검색 시 ef_search 설정
SET hnsw.ef_search = 100;

-- 3. 검색 실행
SELECT id, content,
  1 - (embedding <=> $1) AS similarity
FROM documents
ORDER BY embedding <=> $1
LIMIT 10;`}</pre>
                <div className="p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-xs text-emerald-700">
                  HNSW는 train 불필요 — 데이터가 없어도 인덱스 생성 가능, 추가 시 자동 반영
                </div>
              </div>
            );
          case 'hnsw-tradeoff':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">m / ef_construction 트레이드오프</div>
                <div className="space-y-3">
                  <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg">
                    <div className="font-bold text-sm text-slate-700 mb-2">m 값에 따른 변화</div>
                    {[
                      { m: 4, recall: '85%', mem: '적음', bar: 'w-3/12' },
                      { m: 16, recall: '95%', mem: '보통', bar: 'w-7/12' },
                      { m: 32, recall: '98%', mem: '많음', bar: 'w-9/12' },
                      { m: 64, recall: '99%', mem: '매우 많음', bar: 'w-11/12' },
                    ].map((p, i) => (
                      <div key={i} className="flex items-center gap-2 mb-1">
                        <span className="text-xs font-mono w-12 text-slate-600">m={p.m}</span>
                        <div className="flex-1 bg-slate-200 rounded-full h-3">
                          <div className={`bg-purple-500 h-3 rounded-full ${p.bar}`}></div>
                        </div>
                        <span className="text-xs font-medium w-10 text-right">{p.recall}</span>
                      </div>
                    ))}
                  </div>
                  <div className="p-3 bg-purple-50 border border-purple-200 rounded-lg text-xs text-purple-700">
                    <b>권장값:</b> m=16, ef_construction=64 (기본값)<br/>
                    높은 recall 필요 시: m=32, ef_construction=128
                  </div>
                </div>
              </div>
            );
          case 'recommend':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">상황별 추천</div>
                <div className="space-y-3">
                  <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg">
                    <div className="font-bold text-sm text-blue-800">IVFFlat 추천 상황</div>
                    <ul className="text-xs text-blue-700 mt-1 space-y-1">
                      <li>- 메모리가 제한적인 환경</li>
                      <li>- 데이터가 대량이고 배치 빌드 가능</li>
                      <li>- recall 90~95%면 충분한 경우</li>
                    </ul>
                  </div>
                  <div className="p-3 bg-purple-50 border border-purple-200 rounded-lg">
                    <div className="font-bold text-sm text-purple-800">HNSW 추천 상황</div>
                    <ul className="text-xs text-purple-700 mt-1 space-y-1">
                      <li>- 높은 recall(99%)이 필요한 경우</li>
                      <li>- 실시간 데이터 추가가 빈번한 경우</li>
                      <li>- 메모리 여유가 있는 환경</li>
                    </ul>
                  </div>
                  <div className="p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-xs text-emerald-700">
                    <b>pgvector 0.5+ 기준:</b> HNSW가 기본 추천. IVFFlat은 메모리 절약이 필요할 때
                  </div>
                </div>
              </div>
            );
          default: return null;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-blue-700 hover:text-blue-900 font-medium">

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. pgvector &gt; Chapter 2. pgvector 실전</div>
                  <h1 className="text-2xl font-bold text-slate-800">IV-2-1. pgvector 인덱싱 — IVFFlat vs HNSW</h1>
                </div>
              </div>
              <p className="text-slate-600">도서관의 두 가지 분류 체계: <b>층별 분류</b>(IVFFlat)와 <b>추천 네트워크</b>(HNSW). 각각의 원리, 파라미터, 적합한 상황을 비교합니다.</p>

                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {renderLeft()}
              </div>
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {renderRight()}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['ivfflat', 'hnsw', 'lists', 'probes', 'm', 'ef_construction', 'CREATE INDEX'].map(kw => (
                <span key={kw} className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-sm font-medium border border-blue-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-blue-600 hover:bg-blue-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
