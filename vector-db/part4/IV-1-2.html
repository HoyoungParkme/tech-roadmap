<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB — IV-1-2. pgvector 데이터 모델 — vector 타입과 연산자</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "pgvector의 거리 연산자를 거리 측정 도구에 비유합니다. 세 가지 도구가 있습니다: <-> (줄자 — 직선 거리), <=> (각도기 — 방향 차이), <#> (저울 — 크기와 방향의 곱). 용도에 따라 도구를 선택합니다.",
        left: 'overview',
        right: 'analogy',
      },
      {
        desc: "vector(N) 타입: N차원 벡터를 저장합니다. OpenAI text-embedding-3-small은 1536차원, text-embedding-3-large는 3072차원입니다. 차원 수를 미리 지정해야 하며, 모든 벡터의 차원이 동일해야 합니다.",
        left: 'code-type',
        right: 'dimension-guide',
      },
      {
        desc: "<-> 연산자: L2 거리(유클리드 거리)를 계산합니다. 두 점 사이의 직선 거리. 값이 0이면 완전 동일, 클수록 멀리 떨어져 있습니다. 가장 직관적이고 범용적인 거리 측정 방법입니다.",
        left: 'code-l2',
        right: 'l2-detail',
      },
      {
        desc: "<=> 연산자: 코사인 거리를 계산합니다. 두 벡터의 방향 차이. 0이면 같은 방향, 1이면 반대 방향. 벡터의 크기(길이)를 무시하고 방향만 비교하므로, 텍스트 임베딩에서 가장 널리 사용됩니다.",
        left: 'code-cosine',
        right: 'cosine-detail',
      },
      {
        desc: "핵심 정리: 텍스트 임베딩 → <=> (코사인 거리), 이미지/범용 → <-> (L2 거리), 특수 목적 → <#> (내적). 인덱스 생성 시에도 연산자에 맞는 ops 클래스를 지정해야 최적 성능이 나옵니다.",
        left: 'comparison',
        right: 'keywords',
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderLeft = () => {
        switch (s.left) {
          case 'overview':
            return (
              <div className="space-y-3">
                {[
                  { op: '<->', name: 'L2 거리 (유클리드)', desc: '직선 거리. 값이 작을수록 가까움', icon: '&#128207;' },
                  { op: '<=>', name: '코사인 거리', desc: '방향 차이. 0 = 같은 방향, 1 = 반대', icon: '&#128208;' },
                  { op: '<#>', name: '내적 (부호 반전)', desc: '크기 x 방향. 값이 작을수록 유사', icon: '&#9878;' },
                ].map((item, i) => (
                  <div key={i} className="p-4 bg-blue-50 border border-blue-200 rounded-lg">
                    <div className="flex items-center gap-3 mb-1">
                      <span className="text-2xl" dangerouslySetInnerHTML={{__html: item.icon}} />
                      <div>
                        <span className="font-mono font-bold text-blue-800 text-lg">{item.op}</span>
                        <span className="text-sm text-blue-600 ml-2">{item.name}</span>
                      </div>
                    </div>
                    <div className="text-xs text-slate-600 ml-11">{item.desc}</div>
                  </div>
                ))}
              </div>
            );
          case 'code-type':
            return (
              <pre className="rounded-lg p-4 text-sm whitespace-pre-wrap font-mono border bg-blue-50 border-blue-200 text-blue-800">
{`-- vector(N) — N차원 벡터 타입
CREATE TABLE items (
    id    SERIAL PRIMARY KEY,
    name  TEXT,
    -- OpenAI text-embedding-3-small
    embedding vector(1536)
);

-- 벡터 삽입
INSERT INTO items (name, embedding)
VALUES ('AI 문서', '[0.1, 0.2, ..., 0.05]');

-- 차원 수 확인
SELECT vector_dims(embedding)
FROM items LIMIT 1;
-- 결과: 1536

-- 벡터 노름(크기) 확인
SELECT vector_norm(embedding)
FROM items LIMIT 1;`}
              </pre>
            );
          case 'code-l2':
            return (
              <pre className="rounded-lg p-4 text-sm whitespace-pre-wrap font-mono border bg-blue-50 border-blue-200 text-blue-800">
{`-- <-> : L2 거리 (유클리드 거리)
-- 두 점 사이의 직선 거리

-- 기본 사용
SELECT name,
       embedding <-> '[0.1, 0.2, ...]' AS l2_dist
FROM items
ORDER BY embedding <-> '[0.1, 0.2, ...]'
LIMIT 5;

-- L2 거리 인덱스 생성
CREATE INDEX ON items
USING ivfflat (embedding vector_l2_ops)
WITH (lists = 100);

-- 또는 HNSW 인덱스
CREATE INDEX ON items
USING hnsw (embedding vector_l2_ops);`}
              </pre>
            );
          case 'code-cosine':
            return (
              <pre className="rounded-lg p-4 text-sm whitespace-pre-wrap font-mono border bg-blue-50 border-blue-200 text-blue-800">
{`-- <=> : 코사인 거리
-- 두 벡터의 방향 차이 (0~2)
-- 0 = 같은 방향, 1 = 직교, 2 = 반대

SELECT name,
       embedding <=> '[0.1, 0.2, ...]' AS cos_dist
FROM items
ORDER BY embedding <=> '[0.1, 0.2, ...]'
LIMIT 5;

-- 코사인 거리 인덱스 생성
CREATE INDEX ON items
USING hnsw (embedding vector_cosine_ops);

-- 텍스트 임베딩에서 가장 많이 사용!
-- 벡터 크기(길이)를 무시하고
-- 순수 방향(의미) 차이만 비교`}
              </pre>
            );
          case 'comparison':
            return (
              <div className="space-y-3">
                <div className="overflow-hidden rounded-lg border border-slate-200">
                  <table className="w-full text-sm">
                    <thead className="bg-blue-50">
                      <tr>
                        <th className="px-3 py-2 text-left text-xs text-blue-800">연산자</th>
                        <th className="px-3 py-2 text-left text-xs text-blue-800">인덱스 ops</th>
                        <th className="px-3 py-2 text-left text-xs text-blue-800">추천 용도</th>
                      </tr>
                    </thead>
                    <tbody>
                      {[
                        { op: '<->', ops: 'vector_l2_ops', use: '이미지, 범용' },
                        { op: '<=>', ops: 'vector_cosine_ops', use: '텍스트 임베딩 (추천)' },
                        { op: '<#>', ops: 'vector_ip_ops', use: '정규화된 벡터, 특수 목적' },
                      ].map((row, i) => (
                        <tr key={i} className={i % 2 === 0 ? 'bg-white' : 'bg-slate-50'}>
                          <td className="px-3 py-2 font-mono text-sm font-bold text-blue-700">{row.op}</td>
                          <td className="px-3 py-2 font-mono text-xs text-slate-700">{row.ops}</td>
                          <td className="px-3 py-2 text-xs text-slate-600">{row.use}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div className="p-4 bg-blue-50 border border-blue-200 rounded-lg">
                  <div className="font-bold text-blue-800 mb-1">실전 팁</div>
                  <div className="text-sm text-blue-700">텍스트 임베딩(OpenAI, Sentence-Transformers)을 사용한다면 <b>&lt;=&gt; (코사인 거리)</b>를 기본으로 선택하세요. 인덱스도 vector_cosine_ops로 생성합니다.</div>
                </div>
              </div>
            );
          default:
            return null;
        }
      };

      const renderRight = () => {
        switch (s.right) {
          case 'analogy':
            return (
              <div className="space-y-3">
                <div className="p-4 bg-slate-50 border border-slate-200 rounded-lg text-center">
                  <div className="text-4xl mb-2">&#128207;&#128208;&#9878;&#65039;</div>
                  <div className="font-bold text-slate-800 mb-2">거리 측정 도구 비유</div>
                  <div className="text-sm text-slate-600 space-y-2">
                    <p><b>줄자</b> (&lt;-&gt;) = 두 점의 직선 거리</p>
                    <p><b>각도기</b> (&lt;=&gt;) = 두 화살표의 방향 차이</p>
                    <p><b>저울</b> (&lt;#&gt;) = 크기와 방향의 곱</p>
                  </div>
                </div>
                <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg">
                  <div className="text-xs text-blue-700">세 도구 모두 "가까운 것"을 찾지만, 측정 방식이 다릅니다. 데이터 특성에 맞는 도구를 선택하는 것이 중요합니다.</div>
                </div>
              </div>
            );
          case 'dimension-guide':
            return (
              <div className="space-y-2">
                <div className="text-xs font-bold text-slate-500 mb-1">주요 임베딩 모델별 차원</div>
                {[
                  { model: 'text-embedding-3-small', dim: '1536', provider: 'OpenAI' },
                  { model: 'text-embedding-3-large', dim: '3072', provider: 'OpenAI' },
                  { model: 'all-MiniLM-L6-v2', dim: '384', provider: 'Sentence-T.' },
                  { model: 'bge-large-en', dim: '1024', provider: 'BAAI' },
                  { model: 'nomic-embed-text', dim: '768', provider: 'Nomic' },
                ].map((item, i) => (
                  <div key={i} className="flex items-center justify-between p-3 rounded-lg border bg-slate-50 border-slate-200">
                    <div>
                      <span className="text-xs font-mono font-bold text-slate-800">{item.model}</span>
                      <span className="text-xs text-slate-400 ml-1">({item.provider})</span>
                    </div>
                    <span className="text-xs font-bold text-blue-600">vector({item.dim})</span>
                  </div>
                ))}
                <div className="p-3 bg-amber-50 border border-amber-200 rounded-lg">
                  <div className="text-xs text-amber-700">주의: 테이블의 vector(N)과 실제 임베딩 차원이 반드시 일치해야 합니다!</div>
                </div>
              </div>
            );
          case 'l2-detail':
            return (
              <div className="space-y-3">
                <div className="p-4 bg-blue-50 border border-blue-200 rounded-lg">
                  <div className="font-bold text-blue-800 mb-2">L2 거리 (유클리드)</div>
                  <div className="text-sm text-blue-700 space-y-1">
                    <p>수식: sqrt(sum((a_i - b_i)^2))</p>
                    <p>범위: 0 ~ 무한대</p>
                    <p>0 = 완전 동일</p>
                  </div>
                </div>
                <div className="p-4 bg-green-50 border border-green-200 rounded-lg">
                  <div className="font-bold text-green-800 mb-1">장점</div>
                  <div className="text-xs text-green-700">직관적, 벡터 크기(길이) 차이도 반영</div>
                </div>
                <div className="p-4 bg-amber-50 border border-amber-200 rounded-lg">
                  <div className="font-bold text-amber-800 mb-1">단점</div>
                  <div className="text-xs text-amber-700">차원이 높을수록 거리 차이가 줄어드는 "차원의 저주" 영향</div>
                </div>
                <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg">
                  <div className="text-xs text-slate-600">인덱스: <span className="font-mono">vector_l2_ops</span></div>
                </div>
              </div>
            );
          case 'cosine-detail':
            return (
              <div className="space-y-3">
                <div className="p-4 bg-blue-50 border border-blue-200 rounded-lg">
                  <div className="font-bold text-blue-800 mb-2">코사인 거리</div>
                  <div className="text-sm text-blue-700 space-y-1">
                    <p>수식: 1 - cos(a, b)</p>
                    <p>범위: 0 ~ 2</p>
                    <p>0 = 같은 방향, 1 = 직교, 2 = 반대</p>
                  </div>
                </div>
                <div className="p-4 bg-green-50 border border-green-200 rounded-lg">
                  <div className="font-bold text-green-800 mb-1">장점</div>
                  <div className="text-xs text-green-700">벡터 크기 무시, 순수 의미(방향) 비교. 텍스트 임베딩에 최적.</div>
                </div>
                <div className="p-4 bg-amber-50 border border-amber-200 rounded-lg">
                  <div className="font-bold text-amber-800 mb-1">참고</div>
                  <div className="text-xs text-amber-700">코사인 유사도 = 1 - 코사인 거리. 유사도가 높을수록 비슷하고, 거리가 낮을수록 비슷합니다.</div>
                </div>
                <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg">
                  <div className="text-xs text-slate-600">인덱스: <span className="font-mono">vector_cosine_ops</span></div>
                </div>
              </div>
            );
          case 'keywords':
            return (
              <div className="space-y-4">
                <div className="flex flex-wrap gap-2">
                  {['vector(N)', '<->', '<=>', '<#>', 'L2', 'Cosine', 'Inner Product'].map(kw => (
                    <span key={kw} className="bg-blue-50 text-blue-700 px-3 py-1.5 rounded-full text-sm font-medium border border-blue-200">{kw}</span>
                  ))}
                </div>
                <div className="p-4 bg-blue-50 border border-blue-200 rounded-lg">
                  <div className="font-bold text-blue-800 mb-2">다음 시각화에서 배울 것</div>
                  <div className="text-sm text-blue-700">pgvector 인덱싱 — IVFFlat vs HNSW. 도서관의 두 가지 분류 체계로 비유하여 인덱스 선택 전략을 알아봅니다.</div>
                </div>
              </div>
            );
          default:
            return null;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-blue-700 hover:text-blue-900 font-medium">
                <span>&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. pgvector &gt; Chapter 1. pgvector 기초</div>
                  <h1 className="text-2xl font-bold text-slate-800">IV-1-2. pgvector 데이터 모델 — vector 타입과 연산자</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>거리 측정 도구</b> 비유. <code className="bg-blue-100 px-1 rounded text-blue-800">&lt;-&gt;</code> (줄자), <code className="bg-blue-100 px-1 rounded text-blue-800">&lt;=&gt;</code> (각도기), <code className="bg-blue-100 px-1 rounded text-blue-800">&lt;#&gt;</code> (저울) — 세 가지 연산자의 차이를 알아봅니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-blue-700 border-blue-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">벡터 연산자 비교</h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
                  {s.left === 'overview' ? '3가지 연산자' : s.left === 'comparison' ? '비교 요약' : 'SQL 코드'}
                </div>
                {renderLeft()}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
                  {s.right === 'analogy' ? '거리 측정 도구 비유' : s.right === 'dimension-guide' ? '임베딩 모델별 차원' : s.right === 'keywords' ? '핵심 키워드' : '상세 설명'}
                </div>
                {renderRight()}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['vector(N)', '<->', '<=>', '<#>', 'L2', 'Cosine', 'Inner Product'].map(kw => (
                <span key={kw} className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-sm font-medium border border-blue-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-blue-600 hover:bg-blue-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./IV-1-1.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; IV-1-1. pgvector란</a>
              <a href="./IV-2-1.html" className="text-blue-600 hover:text-blue-800 font-medium">IV-2-1. pgvector 인덱싱 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
