      if (!row) return null;

        <div className="rounded-lg bg-gradient-to-br from-violet-50 to-purple-100 border border-violet-200 p-3">
          <div className="text-[11px] font-bold text-violet-800 mb-2 flex items-center gap-1">
            <span>🗂</span>
            <span>{row.title}</span>
          </div>

          {/* 컬럼 헤더 + 값 — 가로 스크롤 가능 */}
          <div className="overflow-hidden rounded-lg border border-violet-200 bg-white">
            <table className="w-full text-[11px] font-mono">
              <thead>
                <tr className="bg-violet-50">
                  {row.columns.map((c) => (
                    <th
                      key={c.name}
                      className={`px-3 py-2 text-left border-b border-violet-100 ${
                        c.active ? 'bg-violet-200 text-violet-900' : 'text-violet-700'
                      }`}
                    >
                      <div className="font-bold">{c.name}</div>
                      <div className="text-[9px] text-violet-500 normal-case">{c.type}</div>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                <tr>
                  {row.columns.map((c) => (
                    <td
                      key={c.name}
                      className={`px-3 py-2 border-r border-violet-50 last:border-r-0 ${
                        c.active ? 'bg-violet-100/70 text-violet-900 font-bold' : 'text-slate-700'
                      }`}
                    >
                      {c.value}
                    </td>
                  ))}
                </tr>
              </tbody>
            </table>
          </div>

          {row.highlight && (
            <div className="mt-2 text-[11px] text-violet-700 bg-white/60 border border-violet-200 rounded px-2 py-1">
              <span className="font-bold mr-1">→</span>{row.highlight}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // DistanceDiagram — 두 벡터 + 결과 거리 SVG
    // ─────────────────────────────────────────────────────
    function DistanceDiagram({ distance }) {
      if (!distance) return null;
      const w = 380;
      const h = 240;
      const { a, b, ops } = distance;

      return (
        <div className="rounded-lg bg-gradient-to-br from-violet-50 to-purple-100 border border-violet-200 p-3">
          <div className="text-[11px] font-bold text-violet-800 mb-2 flex items-center gap-1">
            <span>📐</span>
            <span>두 벡터 사이 거리 — 3가지 측정 방식</span>
          </div>

          <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto bg-white rounded border border-violet-200">
            <defs>
              <pattern id="grid-vec-iv12" width="30" height="30" patternUnits="userSpaceOnUse">
                <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e9d5ff" strokeWidth="0.5" />
              </pattern>
              <marker id="vec-arrow" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
                <path d="M0,0 L9,4.5 L0,9 Z" fill="#7c3aed" />
              </marker>
            </defs>
            <rect width={w} height={h} fill="url(#grid-vec-iv12)" />

            {/* 원점 표시 */}
            <circle cx={40} cy={210} r={3} fill="#7c3aed" />
            <text x={42} y={222} fontSize="9" fill="#6d28d9" fontFamily="monospace">origin</text>

            {/* 벡터 a (원점 → a) */}
            <line x1={40} y1={210} x2={a.x} y2={a.y} stroke="#a78bfa" strokeWidth="1.5" strokeDasharray="3,3" markerEnd="url(#vec-arrow)" opacity="0.6" />
            {/* 벡터 b (원점 → b) */}
            <line x1={40} y1={210} x2={b.x} y2={b.y} stroke="#a78bfa" strokeWidth="1.5" strokeDasharray="3,3" markerEnd="url(#vec-arrow)" opacity="0.6" />

            {/* 거리 — a~b 직선 (L2 강조) */}
            <line x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke="#7c3aed" strokeWidth="2.5" />
            <text x={(a.x + b.x) / 2 + 6} y={(a.y + b.y) / 2 - 6} fontSize="10" fill="#5b21b6" fontFamily="monospace" fontWeight="bold">
              &lt;-&gt; = 5.0
            </text>

            {/* 점 a */}
            <circle cx={a.x} cy={a.y} r={9} fill="#7c3aed" stroke="#4c1d95" strokeWidth="2" />
            <text x={a.x} y={a.y - 14} textAnchor="middle" fontSize="10" fill="#4c1d95" fontFamily="monospace" fontWeight="bold">{a.label}</text>

            {/* 점 b */}
            <circle cx={b.x} cy={b.y} r={9} fill="#a855f7" stroke="#581c87" strokeWidth="2" />
            <text x={b.x} y={b.y - 14} textAnchor="middle" fontSize="10" fill="#581c87" fontFamily="monospace" fontWeight="bold">{b.label}</text>

            {/* 코사인 각도 표시 */}
            <text x={70} y={185} fontSize="9" fill="#9333ea" fontFamily="monospace">θ ≈ 11° (cos≈0.98)</text>
          </svg>

          {/* 3가지 연산자 결과 카드 */}
          <div className="mt-2 grid grid-cols-1 gap-1.5">
            {ops.map((o) => (
              <div key={o.op} className="flex items-center gap-2 bg-white border border-violet-200 rounded px-2 py-1.5 text-[11px]">
                <span className="font-mono font-bold text-base w-12 text-center" style={{ color: o.color }}>{o.op}</span>
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-violet-900">{o.name}</div>
                  <div className="text-[9px] text-slate-500 font-mono truncate">{o.formula} · {o.range}</div>
                </div>
                <div className="text-right">
                  <div className="font-mono font-bold text-violet-700">{o.result}</div>
                  <div className="text-[9px] text-slate-500 font-mono">{o.ops_class}</div>
                </div>
              </div>
            ))}
          </div>
          <div className="mt-1 text-[10px] text-violet-700 text-center font-mono">
            모두 "값 작을수록 가까움" → ORDER BY ... LIMIT k 로 KNN
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // FuncsTable — 함수 표
    // ─────────────────────────────────────────────────────
    function FuncsTable({ funcs }) {
      if (!funcs) return null;
      return (
        <div className="rounded-lg bg-gradient-to-br from-violet-50 to-purple-100 border border-violet-200 p-3">
          <div className="text-[11px] font-bold text-violet-800 mb-2 flex items-center gap-1">
            <span>🧮</span>
            <span>벡터 유틸 함수 — 입력/출력 예시</span>
          </div>

          <div className="overflow-hidden rounded-lg border border-violet-200 bg-white">
            <table className="w-full text-[11px]">
              <thead>
                <tr className="bg-violet-50 text-left">
                  <th className="px-2 py-2 font-bold text-violet-700 w-1/4">함수</th>
                  <th className="px-2 py-2 font-bold text-violet-700">입력 예</th>
                  <th className="px-2 py-2 font-bold text-violet-700 w-1/5">출력</th>
                </tr>
              </thead>
              <tbody>
                {funcs.rows.map((r, i) => (
                  <tr key={r.fn} className={i % 2 === 0 ? 'bg-white' : 'bg-violet-50/40'}>
                    <td className="px-2 py-1.5 font-mono font-bold text-violet-800 border-r border-slate-100">
                      <div className="flex items-center gap-1">
                        <span className="inline-block w-5 text-center text-violet-400">{r.emoji}</span>
                        <span>{r.fn}</span>
                      </div>
                      <div className="text-[9px] text-slate-500 font-sans font-normal mt-0.5">{r.note}</div>
                    </td>
                    <td className="px-2 py-1.5 text-slate-700 font-mono text-[10px] break-all">{r.input}</td>
                    <td className="px-2 py-1.5 font-mono font-bold text-violet-700 text-[10px]">{r.output}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div className="mt-2 text-[10px] text-violet-700 bg-white/60 border border-violet-200 rounded px-2 py-1">
            <span className="font-bold">팁:</span> 함수형(<span className="font-mono">l2_distance</span> 등)은 인덱스를 못 타므로 KNN 쿼리는 연산자(<span className="font-mono">&lt;-&gt;</span>, <span className="font-mono">&lt;=&gt;</span>, <span className="font-mono">&lt;#&gt;</span>)를 쓰자.
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LimitsCards — 제약 카드
    // ─────────────────────────────────────────────────────
    function LimitsCards({ limits }) {
      if (!limits) return null;
      return (
        <div className="rounded-lg bg-gradient-to-br from-violet-50 to-purple-100 border border-violet-200 p-3">
          <div className="text-[11px] font-bold text-violet-800 mb-2 flex items-center gap-1">
            <span>⚠️</span>
            <span>vector(N) 제약 & 비용</span>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-3 gap-1.5">
            {limits.items.map((it) => (
              <div key={it.label} className={`rounded-lg border-2 px-2 py-2 ${it.color}`}>
                <div className="text-[9px] font-semibold opacity-80 leading-tight">{it.label}</div>
                <div className="flex items-baseline gap-1 mt-0.5">
                  <span className="font-mono font-bold text-lg leading-none">{it.value}</span>
                  <span className="font-mono text-[9px] opacity-70">{it.unit}</span>
                </div>
              </div>
            ))}
          </div>

          <div className="mt-2 bg-white/70 border border-violet-200 rounded p-2">
            <div className="text-[10px] font-bold text-violet-800 mb-1">💡 절약 전략</div>
            <ul className="space-y-0.5">
              {limits.tactics.map((t, i) => (
                <li key={i} className="text-[10px] text-slate-700 flex items-start gap-1.5">
                  <span className="text-violet-600">{t.icon}</span>
                  <span>{t.text}</span>
                </li>
              ))}
            </ul>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 단계별 시각화 라우터
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step, stepIdx }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📐 pgvector — vector 타입 모델</h2>
            <span className="text-[10px] text-slate-400 font-mono">step {stepIdx + 1} live</span>
          </div>

          <div className="space-y-3">
            {step.row      && <VectorRow row={step.row} />}
            {step.distance && <DistanceDiagram distance={step.distance} />}
            {step.funcs    && <FuncsTable funcs={step.funcs} />}
            {step.limits   && <LimitsCards limits={step.limits} />}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: '#7c3aed' }}></span>
              vector 컬럼
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: '#a855f7' }}></span>
              연산 결과
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-0.5" style={{ background: '#7c3aed' }}></span>
              거리 (작을수록 가까움)
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="text-slate-400">⌨</span>
              ←/→
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-violet-500/15 border-l-2 border-violet-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-violet-700 hover:text-violet-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. pgvector &gt; Chapter 1. pgvector 기초</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">pgvector 데이터 모델 — vector 타입과 연산자</h1>
                  <p className="text-sm text-slate-500 mt-0.5">vector(N) 정의 / 입력 / 거리 연산자 / 함수 / 제약을 5단계로</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 text-sm text-violet-900">
                💡 다음(IV-2-1)에서는 <strong>인덱싱</strong> — IVFFlat vs HNSW 트레이드오프와 파라미터 튜닝을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-violet-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-violet-600 text-white hover:bg-violet-700 transition min-w-[110px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 칩 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['vector(N)', '<->', '<=>', '<#>', 'vector_dims', 'vector_norm', 'avg(vector)', '16,000 dims', 'TOAST', 'halfvec'].map(kw => (
                <span key={kw} className="bg-violet-50 text-violet-700 px-3 py-1 rounded-full text-xs font-mono font-medium border border-violet-200">{kw}</span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-1-1.html" className="text-violet-700 hover:text-violet-900 font-medium">&larr; IV-1-1 pgvector란</a>
              <a href="./IV-2-1.html" className="text-violet-700 hover:text-violet-900 font-medium">IV-2-1 pgvector 인덱싱 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
