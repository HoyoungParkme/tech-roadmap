<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB — IV-2-2. pgvector 실전 — SQL 벡터 검색 + 메타데이터 필터</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "pgvector의 최대 강점: SQL 하나로 벡터 유사도 검색과 메타데이터 필터를 결합할 수 있습니다. WHERE category = 'tech' AND ORDER BY embedding <=> query_vec. 기존 SQL 지식을 그대로 활용하는 하이브리드 검색입니다.",
        left: 'intro',
        right: 'advantage',
      },
      {
        desc: "기본 벡터 검색: ORDER BY embedding <=> query_vec LIMIT 10. 코사인 거리(<=>)로 정렬하고 상위 10개를 반환합니다. 이것만으로도 시맨틱 검색이 완성됩니다.",
        left: 'basic-query',
        right: 'basic-result',
      },
      {
        desc: "하이브리드 검색: WHERE 절로 메타데이터를 먼저 필터링한 뒤, 벡터 유사도로 정렬합니다. '기술 카테고리에서 AI 관련 문서를 찾아줘'처럼 조건 + 의미 검색을 동시에 수행합니다.",
        left: 'hybrid-query',
        right: 'hybrid-result',
      },
      {
        desc: "고급 패턴 1: CTE(WITH)를 사용해 벡터 검색 결과를 다른 테이블과 JOIN합니다. 벡터 검색으로 관련 문서를 찾고, 저자 정보나 태그를 함께 조회하는 실전 패턴입니다.",
        left: 'cte-query',
        right: 'cte-explain',
      },
      {
        desc: "고급 패턴 2: 키워드 검색(pg_trgm) + 벡터 검색을 결합하는 풀 하이브리드 검색. 키워드 매칭 점수와 벡터 유사도를 가중 합산하여 최종 순위를 매깁니다. 키워드와 의미를 모두 고려하는 가장 강력한 패턴입니다.",
        left: 'fullhybrid-query',
        right: 'fullhybrid-explain',
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderLeft = () => {
        switch (s.left) {
          case 'intro':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">하이브리드 검색 개념</div>
                <div className="space-y-3">
                  <div className="p-4 bg-amber-50 border border-amber-200 rounded-lg">
                    <div className="font-bold text-sm text-amber-800 mb-1">일반 SQL (키워드 검색)</div>
                    <pre className="text-xs font-mono text-amber-700 bg-white rounded p-2 border border-amber-100">{`WHERE title LIKE '%AI%'
  AND category = 'tech'`}</pre>
                    <div className="text-xs text-amber-600 mt-1">글자가 같은 것만 찾음</div>
                  </div>
                  <div className="flex justify-center text-slate-400 font-bold text-lg">+</div>
                  <div className="p-4 bg-blue-50 border border-blue-200 rounded-lg">
                    <div className="font-bold text-sm text-blue-800 mb-1">벡터 검색 (의미 검색)</div>
                    <pre className="text-xs font-mono text-blue-700 bg-white rounded p-2 border border-blue-100">{`ORDER BY embedding <=> query_vec
LIMIT 10`}</pre>
                    <div className="text-xs text-blue-600 mt-1">의미가 비슷한 것을 찾음</div>
                  </div>
                  <div className="flex justify-center text-slate-400 font-bold text-lg">=</div>
                  <div className="p-4 bg-emerald-50 border border-emerald-200 rounded-lg">
                    <div className="font-bold text-sm text-emerald-800">하이브리드 검색</div>
                    <div className="text-xs text-emerald-600 mt-1">SQL 조건 + 벡터 유사도를 한 쿼리에!</div>
                  </div>
                </div>
              </div>
            );
          case 'basic-query':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">기본 벡터 검색 SQL</div>
                <pre className="bg-slate-800 text-slate-100 rounded-lg p-4 text-sm font-mono whitespace-pre-wrap">{`-- 쿼리 벡터로 유사 문서 검색
SELECT
  id,
  title,
  content,
  1 - (embedding <=> $1) AS similarity
FROM documents
ORDER BY embedding <=> $1
LIMIT 10;

-- $1 = 사용자 쿼리의 임베딩 벡터
-- <=> = 코사인 거리 (작을수록 유사)
-- 1 - distance = 유사도 (클수록 유사)`}</pre>
              </div>
            );
          case 'hybrid-query':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">하이브리드 검색 SQL</div>
                <pre className="bg-slate-800 text-slate-100 rounded-lg p-4 text-sm font-mono whitespace-pre-wrap">{`-- 메타데이터 필터 + 벡터 검색
SELECT
  id, title, category,
  1 - (embedding <=> $1) AS similarity
FROM documents
WHERE category = 'tech'
  AND created_at > '2024-01-01'
  AND is_published = true
ORDER BY embedding <=> $1
LIMIT 10;

-- WHERE로 후보를 줄인 뒤
-- 벡터 유사도로 정렬`}</pre>
                <div className="mt-3 p-3 bg-blue-50 border border-blue-200 rounded-lg text-xs text-blue-700">
                  <b>팁:</b> WHERE 조건에 일반 B-tree 인덱스를 걸면 필터링이 더 빨라집니다
                </div>
              </div>
            );
          case 'cte-query':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">CTE + JOIN 패턴</div>
                <pre className="bg-slate-800 text-slate-100 rounded-lg p-4 text-sm font-mono whitespace-pre-wrap">{`-- CTE로 벡터 검색 후 JOIN
WITH similar_docs AS (
  SELECT id, title,
    1 - (embedding <=> $1) AS sim
  FROM documents
  WHERE category = 'tech'
  ORDER BY embedding <=> $1
  LIMIT 20
)
SELECT
  sd.id, sd.title, sd.sim,
  a.name AS author,
  array_agg(t.tag) AS tags
FROM similar_docs sd
  JOIN authors a ON sd.author_id = a.id
  LEFT JOIN doc_tags t ON sd.id = t.doc_id
GROUP BY sd.id, sd.title, sd.sim, a.name
ORDER BY sd.sim DESC;`}</pre>
              </div>
            );
          case 'fullhybrid-query':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">키워드 + 벡터 하이브리드</div>
                <pre className="bg-slate-800 text-slate-100 rounded-lg p-4 text-sm font-mono whitespace-pre-wrap">{`-- pg_trgm + pgvector 결합
SELECT id, title,
  -- 키워드 유사도 (0~1)
  similarity(title, '인공지능') AS kw_score,
  -- 벡터 유사도 (0~1)
  1 - (embedding <=> $1) AS vec_score,
  -- 가중 합산 (키워드 30% + 벡터 70%)
  0.3 * similarity(title, '인공지능')
  + 0.7 * (1 - (embedding <=> $1))
    AS final_score
FROM documents
WHERE similarity(title, '인공지능') > 0.1
   OR (embedding <=> $1) < 0.5
ORDER BY final_score DESC
LIMIT 10;`}</pre>
              </div>
            );
          default: return null;
        }
      };

      const renderRight = () => {
        switch (s.right) {
          case 'advantage':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">pgvector 하이브리드의 이점</div>
                <div className="space-y-3">
                  {[
                    { title: 'SQL 하나로 완결', desc: '벡터 검색 후 별도 메타 필터링 코드 불필요', icon: '1' },
                    { title: 'ACID 트랜잭션', desc: '메타데이터 업데이트와 벡터 업데이트가 원자적', icon: '2' },
                    { title: 'JOIN 가능', desc: '벡터 검색 결과를 다른 테이블과 즉시 결합', icon: '3' },
                    { title: 'B-tree + HNSW', desc: '메타 필터는 B-tree, 벡터는 HNSW — 둘 다 인덱스 활용', icon: '4' },
                  ].map((item, i) => (
                    <div key={i} className="flex items-start gap-3 p-3 bg-blue-50 border border-blue-200 rounded-lg">
                      <div className="w-6 h-6 bg-blue-600 text-white rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0">{item.icon}</div>
                      <div>
                        <div className="font-bold text-sm text-blue-800">{item.title}</div>
                        <div className="text-xs text-blue-700 mt-0.5">{item.desc}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          case 'basic-result':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">검색 결과 예시</div>
                <div className="space-y-2">
                  {[
                    { id: 42, title: 'AI 에이전트 설계 패턴', sim: 0.94 },
                    { id: 17, title: 'LLM 기반 챗봇 구축', sim: 0.91 },
                    { id: 85, title: '자연어 처리 입문', sim: 0.87 },
                    { id: 33, title: '딥러닝 모델 최적화', sim: 0.82 },
                    { id: 61, title: '벡터 검색 엔진 비교', sim: 0.78 },
                  ].map((r, i) => (
                    <div key={i} className="flex items-center justify-between p-3 bg-blue-50 border border-blue-200 rounded-lg">
                      <div className="flex items-center gap-2">
                        <span className="text-xs font-mono text-slate-400">#{r.id}</span>
                        <span className="text-sm font-medium text-slate-800">{r.title}</span>
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="w-16 bg-slate-200 rounded-full h-2">
                          <div className="bg-blue-500 h-2 rounded-full" style={{width: `${r.sim * 100}%`}}></div>
                        </div>
                        <span className="text-xs font-mono text-blue-700 w-10 text-right">{r.sim.toFixed(2)}</span>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="mt-3 p-3 bg-slate-50 border border-slate-200 rounded-lg text-xs text-slate-600">
                  similarity = 1 - cosine_distance. 1에 가까울수록 의미가 유사
                </div>
              </div>
            );
          case 'hybrid-result':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">하이브리드 검색 흐름</div>
                <div className="space-y-3">
                  <div className="p-3 bg-amber-50 border border-amber-200 rounded-lg">
                    <div className="font-bold text-xs text-amber-800">Step 1: WHERE 필터</div>
                    <div className="text-xs text-amber-700 mt-1">전체 100,000건 중 category='tech' AND 2024년 이후 → <b>8,500건</b></div>
                  </div>
                  <div className="flex justify-center text-slate-300">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14m-7-7l7 7 7-7"/></svg>
                  </div>
                  <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg">
                    <div className="font-bold text-xs text-blue-800">Step 2: 벡터 유사도 정렬</div>
                    <div className="text-xs text-blue-700 mt-1">8,500건을 코사인 거리로 정렬 → HNSW 인덱스 활용</div>
                  </div>
                  <div className="flex justify-center text-slate-300">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14m-7-7l7 7 7-7"/></svg>
                  </div>
                  <div className="p-3 bg-emerald-50 border border-emerald-200 rounded-lg">
                    <div className="font-bold text-xs text-emerald-800">Step 3: LIMIT 10</div>
                    <div className="text-xs text-emerald-700 mt-1">상위 10개 결과 반환. 전체 시간: <b>~15ms</b></div>
                  </div>
                </div>
                <div className="mt-3 p-3 bg-blue-50 border border-blue-200 rounded-lg text-xs text-blue-700">
                  <b>인덱스 조합:</b> category에 B-tree + embedding에 HNSW = 최적 성능
                </div>
              </div>
            );
          case 'cte-explain':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">CTE 패턴 설명</div>
                <div className="space-y-3">
                  <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg">
                    <div className="font-bold text-xs text-blue-800">WITH similar_docs AS (...)</div>
                    <div className="text-xs text-blue-700 mt-1">벡터 검색을 CTE로 분리 → 가독성 향상</div>
                  </div>
                  <div className="p-3 bg-purple-50 border border-purple-200 rounded-lg">
                    <div className="font-bold text-xs text-purple-800">JOIN authors, doc_tags</div>
                    <div className="text-xs text-purple-700 mt-1">벡터 검색 결과에 저자 정보, 태그를 즉시 결합</div>
                  </div>
                  <div className="p-3 bg-emerald-50 border border-emerald-200 rounded-lg">
                    <div className="font-bold text-xs text-emerald-800">결과 예시</div>
                    <div className="mt-2 overflow-x-auto">
                      <table className="w-full text-xs border-collapse">
                        <thead>
                          <tr className="bg-emerald-100">
                            <th className="p-1 border text-left">title</th>
                            <th className="p-1 border text-center">sim</th>
                            <th className="p-1 border text-left">author</th>
                            <th className="p-1 border text-left">tags</th>
                          </tr>
                        </thead>
                        <tbody>
                          <tr><td className="p-1 border">AI 에이전트 설계</td><td className="p-1 border text-center">0.94</td><td className="p-1 border">김철수</td><td className="p-1 border">AI, Agent</td></tr>
                          <tr><td className="p-1 border">LLM 챗봇 구축</td><td className="p-1 border text-center">0.91</td><td className="p-1 border">이영희</td><td className="p-1 border">LLM, Chat</td></tr>
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
                <div className="mt-3 p-3 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-700">
                  <b>주의:</b> CTE 내부 LIMIT을 넉넉히 잡고, 외부에서 최종 필터링 권장
                </div>
              </div>
            );
          case 'fullhybrid-explain':
            return (
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">풀 하이브리드 검색 구조</div>
                <div className="space-y-3">
                  <div className="p-3 bg-amber-50 border border-amber-200 rounded-lg">
                    <div className="font-bold text-xs text-amber-800">키워드 검색 (pg_trgm)</div>
                    <div className="text-xs text-amber-700 mt-1">trigram 유사도로 '인공지능' ↔ 'AI 인공지능 기술' 매칭</div>
                    <div className="text-xs text-amber-600 mt-1">가중치: <b>30%</b></div>
                  </div>
                  <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg">
                    <div className="font-bold text-xs text-blue-800">벡터 검색 (pgvector)</div>
                    <div className="text-xs text-blue-700 mt-1">임베딩 유사도로 의미적 관련성 측정</div>
                    <div className="text-xs text-blue-600 mt-1">가중치: <b>70%</b></div>
                  </div>
                  <div className="p-3 bg-emerald-50 border border-emerald-200 rounded-lg">
                    <div className="font-bold text-xs text-emerald-800">최종 점수 = 0.3 * kw + 0.7 * vec</div>
                    <div className="text-xs text-emerald-700 mt-1">두 점수를 합산해 최종 순위 결정</div>
                  </div>
                </div>
                <div className="mt-3 p-3 bg-purple-50 border border-purple-200 rounded-lg text-xs text-purple-700">
                  <b>사전 설정:</b>
                  <pre className="mt-1 bg-white rounded p-2 font-mono border border-purple-100">{`CREATE EXTENSION pg_trgm;
CREATE INDEX idx_title_trgm
  ON documents
  USING gin (title gin_trgm_ops);`}</pre>
                </div>
              </div>
            );
          default: return null;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-blue-700 hover:text-blue-900 font-medium">
                <span>&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. pgvector &gt; Chapter 2. pgvector 실전</div>
                  <h1 className="text-2xl font-bold text-slate-800">IV-2-2. pgvector 실전 — SQL 벡터 검색 + 메타데이터 필터</h1>
                </div>
              </div>
              <p className="text-slate-600">pgvector의 최대 강점 — <b>SQL 하나로 벡터 유사도 검색과 메타데이터 필터를 결합</b>하는 하이브리드 검색을 마스터합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-blue-700 border-blue-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">하이브리드 SQL 검색</h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {renderLeft()}
              </div>
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {renderRight()}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['WHERE + ORDER BY <=>', 'hybrid query', 'JOIN', 'CTE', 'pg_trgm'].map(kw => (
                <span key={kw} className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-sm font-medium border border-blue-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-blue-600 hover:bg-blue-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./IV-2-1.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; IV-2-1. pgvector 인덱싱</a>
              <a href="./IV-2-3.html" className="text-blue-600 hover:text-blue-800 font-medium">IV-2-3. pgvector 운영 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
