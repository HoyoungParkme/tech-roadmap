<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB — IV-1-1. pgvector란 — PostgreSQL에 벡터 검색 추가</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "pgvector는 PostgreSQL에 벡터 검색 기능을 추가하는 확장(extension)입니다. 기존 집에 방 하나를 증축하는 것과 같습니다. 새 건물을 지을 필요 없이, CREATE EXTENSION vector; 한 줄이면 PostgreSQL이 벡터 DB로 변신합니다.",
        left: 'overview',
        right: 'analogy',
      },
      {
        desc: "설치는 간단합니다. PostgreSQL에 pgvector 확장을 설치하고, CREATE EXTENSION vector;를 실행합니다. Docker를 사용하면 pgvector가 이미 포함된 이미지로 바로 시작할 수 있습니다.",
        left: 'code-install',
        right: 'install-options',
      },
      {
        desc: "테이블에 vector 타입 컬럼을 추가합니다. vector(1536)은 1536차원 벡터를 의미합니다. 기존 테이블의 일반 컬럼(id, title, category)과 함께 벡터 컬럼이 공존합니다. 이것이 pgvector의 최대 강점입니다.",
        left: 'code-table',
        right: 'table-detail',
      },
      {
        desc: "INSERT로 데이터를 넣고, SELECT ... ORDER BY embedding <-> query_vec으로 유사도 검색합니다. 기존 SQL 문법 그대로! WHERE 조건으로 메타데이터 필터링도 한 쿼리에 가능합니다.",
        left: 'code-query',
        right: 'query-results',
      },
      {
        desc: "핵심 정리: pgvector = PostgreSQL + 벡터 검색. 기존 인프라 활용, SQL 문법 그대로, 벡터 + 일반 데이터 한 테이블에 공존. 이미 PostgreSQL을 쓰고 있다면 가장 자연스러운 선택입니다.",
        left: 'summary',
        right: 'keywords',
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderLeft = () => {
        switch (s.left) {
          case 'overview':
            return (
              <div className="space-y-3">
                <div className="p-4 bg-blue-50 border border-blue-200 rounded-lg">
                  <div className="font-bold text-blue-800 mb-2">pgvector란?</div>
                  <div className="text-sm text-blue-700 space-y-2">
                    <p>PostgreSQL용 오픈소스 벡터 확장</p>
                    <p>vector 타입 + 거리 연산자 + 인덱스 제공</p>
                    <p>SQL로 벡터 검색 + 일반 쿼리를 함께 사용</p>
                  </div>
                </div>
                <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg">
                  <div className="text-xs text-slate-600">FAISS = 라이브러리(직접 코딩), Chroma = 임베딩 DB(독립 서버), <b>pgvector = 기존 DB 확장</b>(SQL 그대로)</div>
                </div>
              </div>
            );
          case 'code-install':
            return (
              <pre className="rounded-lg p-4 text-sm whitespace-pre-wrap font-mono border bg-blue-50 border-blue-200 text-blue-800">
{`-- PostgreSQL에서 확장 활성화
CREATE EXTENSION vector;

-- 확인
SELECT * FROM pg_extension
WHERE extname = 'vector';

-- Docker로 바로 시작하기
-- docker run -d --name pgvector \\
--   -e POSTGRES_PASSWORD=secret \\
--   -p 5432:5432 \\
--   pgvector/pgvector:pg16

-- Python에서 접속
-- pip install psycopg2-binary
import psycopg2
conn = psycopg2.connect(
    "postgresql://user:secret@localhost/mydb"
)`}
              </pre>
            );
          case 'code-table':
            return (
              <pre className="rounded-lg p-4 text-sm whitespace-pre-wrap font-mono border bg-blue-50 border-blue-200 text-blue-800">
{`-- 벡터 컬럼이 포함된 테이블 생성
CREATE TABLE documents (
    id    SERIAL PRIMARY KEY,
    title TEXT NOT NULL,
    category TEXT,
    content  TEXT,
    embedding vector(1536)  -- 1536차원 벡터
);

-- 일반 컬럼 + 벡터 컬럼이 공존!
-- id, title, category = 일반 데이터
-- embedding = 벡터 데이터`}
              </pre>
            );
          case 'code-query':
            return (
              <pre className="rounded-lg p-4 text-sm whitespace-pre-wrap font-mono border bg-blue-50 border-blue-200 text-blue-800">
{`-- 데이터 삽입
INSERT INTO documents (title, category, embedding)
VALUES (
    'AI 기초 가이드',
    'AI',
    '[0.1, 0.2, ...]'::vector  -- 1536차원
);

-- 유사도 검색 (L2 거리)
SELECT title, category,
       embedding <-> '[0.15, 0.25, ...]' AS dist
FROM documents
ORDER BY embedding <-> '[0.15, 0.25, ...]'
LIMIT 5;

-- 메타데이터 필터 + 벡터 검색
SELECT title, category
FROM documents
WHERE category = 'AI'
ORDER BY embedding <-> '[0.15, 0.25, ...]'
LIMIT 5;`}
              </pre>
            );
          case 'summary':
            return (
              <div className="space-y-3">
                {[
                  { step: '1', label: 'CREATE EXTENSION vector', desc: '확장 활성화' },
                  { step: '2', label: 'vector(N) 컬럼', desc: '테이블에 벡터 컬럼 추가' },
                  { step: '3', label: 'INSERT ... ::vector', desc: '벡터 데이터 삽입' },
                  { step: '4', label: 'ORDER BY <->', desc: '유사도 검색 (SQL)' },
                  { step: '5', label: 'WHERE + ORDER BY', desc: '필터 + 벡터 검색 결합' },
                ].map((item) => (
                  <div key={item.step} className="flex items-center gap-3 p-3 bg-blue-50 rounded-lg border border-blue-200">
                    <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm flex-shrink-0">{item.step}</div>
                    <div>
                      <div className="font-bold text-sm text-blue-800 font-mono">{item.label}</div>
                      <div className="text-xs text-blue-600">{item.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
            );
          default:
            return null;
        }
      };

      const renderRight = () => {
        switch (s.right) {
          case 'analogy':
            return (
              <div className="space-y-3">
                <div className="p-4 bg-slate-50 border border-slate-200 rounded-lg text-center">
                  <div className="text-4xl mb-2">&#127968;</div>
                  <div className="font-bold text-slate-800 mb-2">집에 방 증축 비유</div>
                  <div className="text-sm text-slate-600 space-y-2">
                    <p><b>기존 집</b> = PostgreSQL (이미 운영 중)</p>
                    <p><b>방 증축</b> = CREATE EXTENSION vector</p>
                    <p><b>새 건물 필요 없음</b> = 새 DB 도입 불필요</p>
                    <p><b>기존 가구 그대로</b> = SQL, 인덱스, 트랜잭션 유지</p>
                  </div>
                </div>
                <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg">
                  <div className="text-xs text-blue-700">PostgreSQL의 ACID 트랜잭션, 백업, 복제, 보안 기능을 그대로 활용할 수 있습니다.</div>
                </div>
              </div>
            );
          case 'install-options':
            return (
              <div className="space-y-2">
                {[
                  { method: 'Docker (추천)', cmd: 'pgvector/pgvector:pg16', desc: '가장 간편, 1분 안에 시작', good: true },
                  { method: 'apt/yum', cmd: 'apt install postgresql-16-pgvector', desc: 'Linux 서버 직접 설치', good: true },
                  { method: 'brew (macOS)', cmd: 'brew install pgvector', desc: 'Mac 로컬 개발', good: true },
                  { method: '클라우드 DB', cmd: 'RDS, Supabase, Neon...', desc: 'pgvector 기본 포함', good: true },
                ].map((item, i) => (
                  <div key={i} className="p-3 rounded-lg border bg-slate-50 border-slate-200">
                    <div className="flex items-center justify-between mb-1">
                      <span className="font-bold text-sm text-slate-800">{item.method}</span>
                      <span className="text-xs text-green-600">{item.good ? '&#10003;' : ''}</span>
                    </div>
                    <div className="text-xs font-mono text-blue-700">{item.cmd}</div>
                    <div className="text-xs text-slate-500 mt-1">{item.desc}</div>
                  </div>
                ))}
              </div>
            );
          case 'table-detail':
            return (
              <div className="space-y-3">
                <div className="text-xs font-bold text-slate-500 mb-1">테이블 구조</div>
                <div className="overflow-hidden rounded-lg border border-slate-200">
                  <table className="w-full text-sm">
                    <thead className="bg-blue-50">
                      <tr>
                        <th className="px-3 py-2 text-left text-xs text-blue-800">컬럼</th>
                        <th className="px-3 py-2 text-left text-xs text-blue-800">타입</th>
                        <th className="px-3 py-2 text-left text-xs text-blue-800">역할</th>
                      </tr>
                    </thead>
                    <tbody>
                      {[
                        { col: 'id', type: 'SERIAL', role: '기본 키' },
                        { col: 'title', type: 'TEXT', role: '일반 데이터' },
                        { col: 'category', type: 'TEXT', role: '필터링용 메타데이터' },
                        { col: 'content', type: 'TEXT', role: '원본 텍스트' },
                        { col: 'embedding', type: 'vector(1536)', role: '벡터 데이터' },
                      ].map((row, i) => (
                        <tr key={i} className={i % 2 === 0 ? 'bg-white' : 'bg-slate-50'}>
                          <td className="px-3 py-2 font-mono text-xs font-bold text-slate-800">{row.col}</td>
                          <td className="px-3 py-2 font-mono text-xs text-blue-700">{row.type}</td>
                          <td className="px-3 py-2 text-xs text-slate-600">{row.role}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg">
                  <div className="text-xs text-blue-700">핵심: 벡터와 일반 데이터가 <b>같은 테이블</b>에 존재. JOIN이나 별도 매핑 불필요!</div>
                </div>
              </div>
            );
          case 'query-results':
            return (
              <div className="space-y-2">
                <div className="text-xs font-bold text-slate-500 mb-1">검색 결과 예시</div>
                {[
                  { title: 'AI 기초 가이드', category: 'AI', dist: '0.12', match: true },
                  { title: '딥러닝 입문', category: 'AI', dist: '0.25', match: true },
                  { title: 'ML 실전 가이드', category: 'ML', dist: '0.38', match: true },
                  { title: '데이터 분석 기초', category: 'Data', dist: '0.52', match: true },
                  { title: '웹 개발 튜토리얼', category: 'Web', dist: '0.89', match: false },
                ].map((r, i) => (
                  <div key={i} className={`flex items-center justify-between p-3 rounded-lg border transition-all ${
                    r.match ? 'bg-blue-50 border-blue-200' : 'bg-slate-50 border-slate-200 opacity-50'
                  }`}>
                    <div className="flex items-center gap-2">
                      <span className={`w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold ${r.match ? 'bg-blue-500 text-white' : 'bg-slate-300 text-white'}`}>
                        {r.match ? '&#10003;' : '&#10007;'}
                      </span>
                      <span className="text-sm font-medium text-slate-800">{r.title}</span>
                    </div>
                    <div className="text-right">
                      <div className="text-xs text-blue-600">거리: {r.dist}</div>
                      <div className="text-xs text-slate-400">{r.category}</div>
                    </div>
                  </div>
                ))}
              </div>
            );
          case 'keywords':
            return (
              <div className="space-y-4">
                <div className="flex flex-wrap gap-2">
                  {['CREATE EXTENSION vector', 'vector(1536)', 'INSERT', 'SELECT', 'ORDER BY'].map(kw => (
                    <span key={kw} className="bg-blue-50 text-blue-700 px-3 py-1.5 rounded-full text-sm font-medium border border-blue-200">{kw}</span>
                  ))}
                </div>
                <div className="p-4 bg-blue-50 border border-blue-200 rounded-lg">
                  <div className="font-bold text-blue-800 mb-2">다음 시각화에서 배울 것</div>
                  <div className="text-sm text-blue-700">pgvector의 데이터 타입(vector)과 거리 연산자(&lt;-&gt;, &lt;=&gt;, &lt;#&gt;) — 거리 측정 도구 비유로 알아봅니다.</div>
                </div>
              </div>
            );
          default:
            return null;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-blue-700 hover:text-blue-900 font-medium">
                <span>&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. pgvector &gt; Chapter 1. pgvector 기초</div>
                  <h1 className="text-2xl font-bold text-slate-800">IV-1-1. pgvector란 — PostgreSQL에 벡터 검색 추가</h1>
                </div>
              </div>
              <p className="text-slate-600">기존 <b>집에 방 하나를 증축</b>하는 비유. <code className="bg-blue-100 px-1 rounded text-blue-800">CREATE EXTENSION vector;</code> 한 줄이면 PostgreSQL이 벡터 DB로 변신합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-blue-700 border-blue-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">pgvector 설치와 기본 사용</h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
                  {s.left === 'overview' ? 'pgvector 개요' : s.left === 'summary' ? '5단계 요약' : 'SQL 코드'}
                </div>
                {renderLeft()}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
                  {s.right === 'analogy' ? '집 증축 비유' : s.right === 'install-options' ? '설치 방법' : s.right === 'table-detail' ? '테이블 구조' : s.right === 'query-results' ? '검색 결과' : '핵심 키워드'}
                </div>
                {renderRight()}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['CREATE EXTENSION vector', 'vector(1536)', 'INSERT', 'SELECT', 'ORDER BY'].map(kw => (
                <span key={kw} className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-sm font-medium border border-blue-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-blue-600 hover:bg-blue-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="../part3/III-2-2.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; III-2-2. Chroma + LangChain/LlamaIndex</a>
              <a href="./IV-1-2.html" className="text-blue-600 hover:text-blue-800 font-medium">IV-1-2. pgvector 데이터 모델 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
