      const p = palette[col.role] || palette.data;
      const newBadge = col.isNew ? 'ring-2 ring-violet-500 ring-offset-1 animate-pulse' : '';
      const searchRing = col.searching ? 'ring-2 ring-violet-600 ring-offset-1' : '';
      const joinRing = col.joinKey ? 'ring-2 ring-orange-400 ring-offset-1' : '';

      return (
        <div className={`flex items-center gap-1.5 px-2 py-1 rounded ${p.bg} ${p.border} border ${newBadge} ${searchRing} ${joinRing}`}>
          <span className="text-[10px]">{p.icon}</span>
          <span className={`text-[11px] font-mono font-bold ${p.text}`}>{col.name}</span>
          <span className={`text-[9px] font-mono ${p.text} opacity-70`}>{col.type}</span>
          {col.isNew && (
            <span className="text-[8px] bg-violet-600 text-white px-1 rounded font-bold">NEW</span>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 테이블 박스 — 헤더 + 컬럼 리스트 + 인덱스 배지 + 행 미리보기
    // ─────────────────────────────────────────────────────
    function TableBox({ table }) {
      const headerColor = table.hit
        ? 'bg-violet-600 text-white'
        : 'bg-slate-200 text-slate-600';
      const borderColor = table.hit ? 'border-violet-400' : 'border-slate-300';

      return (
        <div className={`bg-white border-2 ${borderColor} rounded-lg overflow-hidden shadow-sm`} id={`tbl-${table.name}`}>
          {/* 헤더 */}
          <div className={`${headerColor} px-3 py-1.5 flex items-center justify-between`}>
            <div className="flex items-center gap-1.5">
              <span className="text-xs">📋</span>
              <span className="font-mono font-bold text-xs">{table.name}</span>
            </div>
            {table.indexBadge && (
              <span className="text-[9px] font-mono bg-white/90 text-slate-700 px-1.5 py-0.5 rounded">
                {table.indexBadge}
              </span>
            )}
          </div>

          {/* 컬럼 리스트 */}
          <div className="px-2 py-2 flex flex-wrap gap-1 bg-slate-50/50 border-b border-slate-200">
            {table.columns.map((c) => (
              <ColumnPill key={c.name} col={c} />
            ))}
          </div>

          {/* 행 미리보기 */}
          <div className="overflow-auto">
            <table className="w-full text-[10px] font-mono">
              <thead className="bg-slate-100 text-slate-600">
                <tr>
                  {table.columns.map((c) => (
                    <th key={c.name} className="px-2 py-1 text-left whitespace-nowrap">
                      {c.name}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {table.rows.map((row, i) => (
                  <tr key={i} className={i % 2 === 0 ? 'bg-white' : 'bg-slate-50'}>
                    {table.columns.map((c) => {
                      const val = row[c.name];
                      const isVector = c.role === 'vector';
                      return (
                        <td
                          key={c.name}
                          className={`px-2 py-1 whitespace-nowrap ${
                            isVector ? 'bg-violet-50 text-violet-800 font-bold' : 'text-slate-700'
                          }`}
                        >
                          {val === undefined || val === null ? (
                            <span className="text-slate-300">—</span>
                          ) : isVector ? (
                            <span className="truncate inline-block max-w-[180px]" title={String(val)}>
                              {val}
                            </span>
                          ) : (
                            String(val)
                          )}
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // PostgreSQL 컨테이너 — 두 테이블 + JOIN 화살표 + 확장 배지
    // ─────────────────────────────────────────────────────
    function PostgresPane({ step }) {
      const hasCategories = step.tables.some((t) => t.name === 'categories');

      return (
        <div className="rounded-lg bg-gradient-to-br from-violet-50 to-purple-50 border-2 border-violet-200 p-3 relative">
          {/* 컨테이너 헤더: PostgreSQL 로고 + 확장 배지 */}
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-2">
              <span className="text-lg">🐘</span>
              <span className="font-bold text-violet-900 text-sm">PostgreSQL</span>
              <span className="text-[10px] font-mono text-violet-700 bg-white border border-violet-200 px-1.5 py-0.5 rounded">
                v16
              </span>
            </div>
            {step.extensionInstalled && (
              <div className="flex items-center gap-1 bg-violet-600 text-white px-2 py-0.5 rounded-full shadow-sm">
                <span className="text-[10px]">🧩</span>
                <span className="text-[10px] font-mono font-bold">pgvector ✓</span>
              </div>
            )}
          </div>

          {/* 테이블들 */}
          <div className="space-y-3">
            {step.tables.map((t) => (
              <TableBox key={t.name} table={t} />
            ))}
          </div>

          {/* JOIN 시각화 — categories ↔ documents */}
          {step.joinActive && hasCategories && (
            <div className="mt-3 flex items-center justify-center gap-2 bg-orange-50 border border-orange-300 rounded-lg p-2">
              <span className="text-xs font-mono text-orange-700">documents.category_id</span>
              <span className="text-orange-600 font-bold text-base">⇄</span>
              <span className="text-xs font-mono text-orange-700">categories.id</span>
              <span className="ml-2 bg-orange-500 text-white text-[10px] px-1.5 py-0.5 rounded font-bold">
                JOIN
              </span>
            </div>
          )}

          {/* 확장 설치 안내 (Step 2) */}
          {step.extensionInstalled && !step.joinActive && step.tables.length === 2 && (
            <div className="mt-3 bg-violet-100 border border-violet-300 rounded-lg p-2 text-center">
              <div className="text-[11px] text-violet-800">
                <span className="font-bold">CREATE EXTENSION vector;</span> 실행 완료 — 이제
                <span className="font-mono font-bold"> vector(N)</span> 타입 사용 가능
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 결과 표 — Step 4, 5 검색 결과
    // ─────────────────────────────────────────────────────
    function ResultsTable({ rows }) {
      return (
        <div className="rounded-lg bg-white border-2 border-violet-300 overflow-hidden shadow-sm">
          <div className="bg-violet-100 px-3 py-1.5 border-b border-violet-200 flex items-center justify-between">
            <div className="text-xs font-bold text-violet-900">📊 ORDER BY embedding &lt;-&gt; $1 LIMIT 5</div>
            <span className="text-[10px] font-mono text-violet-600">결과 행</span>
          </div>
          <table className="w-full text-[11px]">
            <thead>
              <tr className="bg-violet-50">
                <th className="px-2 py-1.5 text-left font-bold text-violet-700 w-6">#</th>
                <th className="px-2 py-1.5 text-left font-bold text-violet-700">title</th>
                <th className="px-2 py-1.5 text-left font-bold text-violet-700 w-20">category</th>
                <th className="px-2 py-1.5 text-right font-bold text-violet-700 w-20">dist</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r, i) => (
                <tr
                  key={i}
                  className={`border-t border-violet-50 ${
                    r.match ? 'bg-white' : 'bg-slate-50 opacity-60'
                  }`}
                >
                  <td className="px-2 py-1.5 font-mono text-slate-500">{i + 1}</td>
                  <td className={`px-2 py-1.5 font-medium ${r.match ? 'text-slate-800' : 'text-slate-500'}`}>
                    {r.title}
                  </td>
                  <td className="px-2 py-1.5">
                    <span className={`text-[10px] font-mono px-1.5 py-0.5 rounded ${
                      r.match ? 'bg-violet-100 text-violet-700' : 'bg-slate-200 text-slate-500'
                    }`}>
                      {r.category}
                    </span>
                  </td>
                  <td className={`px-2 py-1.5 text-right font-mono font-bold ${
                    r.match ? 'text-violet-700' : 'text-slate-400'
                  }`}>
                    {r.dist}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — PostgreSQL 박스 + (있으면) 결과 표
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🐘 PostgreSQL — 컬럼이 자라는 모습</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <PostgresPane step={step} />

          {step.queryResult && (
            <div className="mt-4">
              <ResultsTable rows={step.queryResult} />
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="text-[11px]">🔑</span>
              <span>PK</span>
            </span>
            <span className="flex items-center gap-1">
              <span className="text-[11px]">🔗</span>
              <span>FK</span>
            </span>
            <span className="flex items-center gap-1">
              <span className="text-[11px]">📝</span>
              <span>일반 컬럼</span>
            </span>
            <span className="flex items-center gap-1">
              <span className="text-[11px]">🧮</span>
              <span>vector 컬럼</span>
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2.5 h-2.5 rounded-full bg-violet-600"></span>
              <span>활성 테이블</span>
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-violet-500/15 border-l-2 border-violet-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-violet-700 hover:text-violet-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. pgvector &gt; Chapter 1. pgvector 기초</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">pgvector란 — PostgreSQL 확장으로 벡터 검색</h1>
                  <p className="text-sm text-slate-500 mt-0.5">기존 집에 방 한 칸 증축 — 새 DB 없이 PostgreSQL 그대로 활용</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 text-sm text-violet-900">
                💡 다음(IV-1-2)에서는 <strong>pgvector 데이터 모델</strong> — vector 타입과 거리 연산자(&lt;-&gt;, &lt;=&gt;, &lt;#&gt;)를 자세히 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-violet-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-violet-600 text-white hover:bg-violet-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../../part3/III-2-2.html" className="text-slate-500 hover:text-slate-700">&larr; III-2-2 Chroma + LangChain/LlamaIndex</a>
              <a href="./IV-1-2.html" className="text-violet-700 hover:text-violet-900 font-medium">IV-1-2 pgvector 데이터 모델 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
