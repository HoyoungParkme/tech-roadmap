    // ─────────────────────────────────────────────────────
    // 시계열 latency 데이터 생성기 (단계별)
    //   t = 0..19 (20 포인트), 단위 ms
    // ─────────────────────────────────────────────────────
    function makeLatency(stage) {
      const pts = [];
      for (let t = 0; t < 20; t++) {
        let base = 200 + Math.sin(t * 0.7) * 25 + (t % 5 === 0 ? 30 : 0);
        let tuned;
        switch (stage) {
          case 'baseline':
            tuned = base; // 같음
            break;
          case 'memory':
            tuned = 35 + Math.sin(t * 0.7) * 6 + (t % 5 === 0 ? 8 : 0);
            break;
          case 'index':
            tuned = 15 + Math.sin(t * 0.5) * 3 + (t % 7 === 0 ? 4 : 0);
            break;
          case 'replica':
            tuned = 12 + Math.sin(t * 0.5) * 2 + (t % 8 === 0 ? 3 : 0);
            break;
          case 'limit':
            // 1억 행 가정 — 다시 튀기 시작
            tuned = 80 + Math.sin(t * 0.4) * 30 + (t % 4 === 0 ? 50 : 0);
            break;
          default:
            tuned = base;
        }
        pts.push({ t, base: Math.max(1, base), tuned: Math.max(1, tuned) });
      }
      return pts;
    }

    // ─────────────────────────────────────────────────────
    // LatencyChart — 튜닝 전(red) vs 튜닝 후(purple) 시계열
    // ─────────────────────────────────────────────────────
    function LatencyChart({ data, stepIdx }) {
      const w = 380;
      const h = 140;
      const padL = 32, padR = 8, padT = 10, padB = 22;
      const innerW = w - padL - padR;
      const innerH = h - padT - padB;
      // 동적 max — 최대 270ms 까지 표시
      const maxY = 270;
      const xStep = innerW / (data.length - 1);

      const path = (key, color) => {
        const d = data
          .map((p, i) => {
            const x = padL + i * xStep;
            const y = padT + innerH - (Math.min(p[key], maxY) / maxY) * innerH;
            return `${i === 0 ? 'M' : 'L'} ${x.toFixed(1)} ${y.toFixed(1)}`;
          })
          .join(' ');
        return d;
      };

      const yTicks = [0, 50, 100, 200];

      return (
        <div className="rounded-lg bg-gradient-to-br from-purple-50 to-purple-100 border border-purple-200 p-3">
          <div className="flex items-center justify-between mb-1">
            <div className="text-[11px] font-bold text-purple-800 flex items-center gap-1">
              <span>📈</span><span>검색 latency (p99, ms)</span>
            </div>
            <div className="flex gap-2 text-[9px] font-mono">
              <span className="flex items-center gap-1 text-red-700">
                <span className="inline-block w-3 h-0.5 bg-red-500"></span>튜닝 전
              </span>
              <span className="flex items-center gap-1 text-purple-700">
                <span className="inline-block w-3 h-0.5 bg-purple-600"></span>현재 단계
              </span>
            </div>
          </div>
          <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
            {/* y축 격자 + 라벨 */}
            {yTicks.map((v) => {
              const y = padT + innerH - (v / maxY) * innerH;
              return (
                <g key={v}>
                  <line x1={padL} y1={y} x2={w - padR} y2={y} stroke="#e9d5ff" strokeWidth="0.5" strokeDasharray="2 2" />
                  <text x={padL - 4} y={y + 3} textAnchor="end" fontSize="8" fill="#7e22ce" fontFamily="monospace">{v}</text>
                </g>
              );
            })}

            {/* 임계치 라인 (50ms = SLO 가정) */}
            {(() => {
              const sy = padT + innerH - (50 / maxY) * innerH;
              return (
                <g>
                  <line x1={padL} y1={sy} x2={w - padR} y2={sy} stroke="#22c55e" strokeWidth="0.8" strokeDasharray="3 2" opacity="0.6" />
                  <text x={w - padR - 2} y={sy - 2} textAnchor="end" fontSize="8" fill="#15803d" fontFamily="monospace">SLO 50ms</text>
                </g>
              );
            })()}

            {/* baseline (튜닝 전) — 빨간 점선 */}
            <path d={path('base', '#ef4444')} fill="none" stroke="#ef4444" strokeWidth="1.5" strokeDasharray="3 2" opacity="0.7" />

            {/* tuned (현재 단계) — 보라 굵게 */}
            <path d={path('tuned', '#7c3aed')} fill="none" stroke="#7c3aed" strokeWidth="2" />

            {/* 마지막 포인트 강조 */}
            {(() => {
              const last = data[data.length - 1];
              const lx = padL + (data.length - 1) * xStep;
              const ly = padT + innerH - (Math.min(last.tuned, maxY) / maxY) * innerH;
              return (
                <g>
                  <circle cx={lx} cy={ly} r={3.5} fill="#7c3aed" stroke="white" strokeWidth="1" />
                  <text x={lx - 6} y={ly - 6} textAnchor="end" fontSize="9" fontWeight="bold" fill="#5b21b6" fontFamily="monospace">{last.tuned.toFixed(0)}ms</text>
                </g>
              );
            })()}

            {/* x축 */}
            <line x1={padL} y1={padT + innerH} x2={w - padR} y2={padT + innerH} stroke="#a78bfa" strokeWidth="0.5" />
            <text x={padL} y={h - 6} fontSize="8" fill="#7e22ce" fontFamily="monospace">t=0</text>
            <text x={w - padR} y={h - 6} textAnchor="end" fontSize="8" fill="#7e22ce" fontFamily="monospace">t=20s</text>
          </svg>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // MemoryGauge — shared_buffers + maintenance_work_mem 게이지
    // ─────────────────────────────────────────────────────
    function MemoryGauge({ memory }) {
      const { sharedBuffersPct, maintWorkMemPct, totalRam, label } = memory;
      const sharedGB = (totalRam * sharedBuffersPct / 100).toFixed(1);
      const maintGB = (totalRam * maintWorkMemPct / 100).toFixed(1);

      const Bar = ({ name, pct, gb, color }) => (
        <div className="mb-2">
          <div className="flex items-center justify-between text-[10px] font-mono mb-0.5">
            <span className="text-purple-800 font-bold">{name}</span>
            <span className="text-purple-600">{gb} GB ({pct.toFixed(1)}%)</span>
          </div>
          <div className="h-3 bg-purple-100 rounded-full overflow-hidden border border-purple-200">
            <div
              className="h-full rounded-full transition-all duration-700"
              style={{ width: `${Math.min(100, pct * 4)}%`, background: color }}
            />
          </div>
        </div>
      );

      return (
        <div className="rounded-lg bg-gradient-to-br from-purple-50 to-purple-100 border border-purple-200 p-3">
          <div className="text-[11px] font-bold text-purple-800 mb-2 flex items-center gap-1">
            <span>🧠</span>
            <span>메모리 사용 — {label}</span>
          </div>
          <Bar name="shared_buffers" pct={sharedBuffersPct} gb={sharedGB} color="#7c3aed" />
          <Bar name="maintenance_work_mem" pct={maintWorkMemPct} gb={maintGB} color="#a78bfa" />
          <div className="text-[9px] text-purple-700 font-mono mt-1">
            전체 RAM {totalRam}GB · 25% 권장선
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // ReplicaTopology — Primary + N Replica 토폴로지
    // ─────────────────────────────────────────────────────
    function ReplicaTopology({ topology }) {
      const { primary, replicas, qpsTotal } = topology;

      return (
        <div className="rounded-lg bg-gradient-to-br from-purple-50 to-purple-100 border border-purple-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="text-[11px] font-bold text-purple-800 flex items-center gap-1">
              <span>🗄️</span>
              <span>Primary + Replica 토폴로지</span>
            </div>
            <span className="text-[10px] font-mono bg-purple-700 text-white px-1.5 py-0.5 rounded">
              총 {qpsTotal} qps
            </span>
          </div>

          <svg viewBox="0 0 360 130" className="w-full h-auto">
            {/* Primary */}
            <g>
              <rect x="140" y="10" width="80" height="36" rx="6" fill="#7c3aed" stroke="#5b21b6" strokeWidth="1.5" />
              <text x="180" y="25" textAnchor="middle" fontSize="10" fontWeight="bold" fill="white" fontFamily="monospace">PRIMARY</text>
              <text x="180" y="38" textAnchor="middle" fontSize="9" fill="#ddd6fe" fontFamily="monospace">쓰기 {primary.qps} qps</text>
            </g>

            {/* 복제 화살표 + Replicas */}
            {replicas.length === 0 ? (
              <text x="180" y="90" textAnchor="middle" fontSize="10" fill="#a78bfa" fontFamily="monospace">(Replica 없음 — 단일 인스턴스)</text>
            ) : (
              replicas.map((r, i) => {
                const xs = [60, 180, 300];
                const x = xs[i] || 180;
                const y = 80;
                return (
                  <g key={r.id}>
                    <line x1="180" y1="46" x2={x + 30} y2={y} stroke="#a78bfa" strokeWidth="1.5" strokeDasharray="3 2" />
                    <rect x={x} y={y} width="60" height="34" rx="5" fill="#ddd6fe" stroke="#7c3aed" strokeWidth="1.5" />
                    <text x={x + 30} y={y + 14} textAnchor="middle" fontSize="9" fontWeight="bold" fill="#4c1d95" fontFamily="monospace">Replica {i + 1}</text>
                    <text x={x + 30} y={y + 26} textAnchor="middle" fontSize="8" fill="#6d28d9" fontFamily="monospace">읽기 {r.qps} qps</text>
                  </g>
                );
              })
            )}

            {/* PgBouncer 표시 */}
            {replicas.length > 0 && (
              <g>
                <rect x="20" y="10" width="80" height="20" rx="4" fill="#fff" stroke="#7c3aed" strokeWidth="1" strokeDasharray="2 2" />
                <text x="60" y="24" textAnchor="middle" fontSize="9" fill="#5b21b6" fontFamily="monospace">PgBouncer</text>
              </g>
            )}
          </svg>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // IndexParamsCard — Step 3 보조: lists/probes/m/ef
    // ─────────────────────────────────────────────────────
    function IndexParamsCard({ params }) {
      if (!params) return null;
      const { ivfflat, hnsw } = params;
      return (
        <div className="rounded-lg bg-white border-2 border-purple-300 p-3">
          <div className="text-[11px] font-bold text-purple-800 mb-2 flex items-center gap-1">
            <span>🎛️</span>
            <span>현재 인덱스 파라미터 (100만 행 기준)</span>
          </div>
          <div className="grid grid-cols-2 gap-2 text-[10px]">
            <div className="bg-purple-50 border border-purple-200 rounded p-2">
              <div className="font-bold text-purple-900 mb-1">IVFFlat</div>
              <div className="font-mono text-slate-700">lists = <b>{ivfflat.lists}</b></div>
              <div className="font-mono text-slate-700">probes = <b>{ivfflat.probes}</b></div>
              <div className="text-purple-700 mt-1">recall {ivfflat.recall}%</div>
            </div>
            <div className="bg-purple-50 border border-purple-200 rounded p-2">
              <div className="font-bold text-purple-900 mb-1">HNSW</div>
              <div className="font-mono text-slate-700">m = <b>{hnsw.m}</b>, ef_cons = <b>{hnsw.ef}</b></div>
              <div className="font-mono text-slate-700">ef_search = <b>{hnsw.efSearch}</b></div>
              <div className="text-purple-700 mt-1">recall {hnsw.recall}%</div>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // SolutionMatrix — 행 수별 권장 솔루션 매트릭스 (Step 5)
    // ─────────────────────────────────────────────────────
    function SolutionMatrix() {
      const rows = [
        { range: '~ 100만',     sol: 'pgvector 단일 + HNSW',          color: 'bg-emerald-50 border-emerald-300', tone: 'text-emerald-800' },
        { range: '100만~1000만', sol: '+ 메모리 튜닝 + Replica 2~3대', color: 'bg-purple-50 border-purple-300',   tone: 'text-purple-800' },
        { range: '1000만~1억',  sol: '+ 파티셔닝 + Replica 5대+',     color: 'bg-amber-50 border-amber-300',     tone: 'text-amber-800' },
        { range: '1억 ~ 10억',  sol: 'Citus 샤딩 / 전용 vector DB',   color: 'bg-orange-50 border-orange-300',   tone: 'text-orange-800' },
        { range: '10억 +',      sol: 'Milvus / Qdrant + FAISS GPU',   color: 'bg-rose-50 border-rose-300',       tone: 'text-rose-800' },
      ];
      return (
        <div className="rounded-lg bg-white border-2 border-purple-300 overflow-hidden">
          <div className="bg-purple-100 px-3 py-2 border-b border-purple-200">
            <div className="text-xs font-bold text-purple-900">📐 행 수별 권장 솔루션 매트릭스</div>
          </div>
          <div className="p-2 space-y-1.5">
            {rows.map((r) => (
              <div
                key={r.range}
                className={`flex items-center gap-3 px-3 py-2 rounded border ${r.color}`}
              >
                <span className={`font-mono text-xs font-bold w-28 ${r.tone}`}>{r.range}</span>
                <span className={`text-xs flex-1 ${r.tone}`}>{r.sol}</span>
              </div>
            ))}
          </div>
          <div className="bg-purple-50 px-3 py-2 border-t border-purple-200 text-[10px] text-purple-700">
            💡 1억 행 이상부터는 단일 PostgreSQL 한계 — 갈아탈 시점
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 통합 시각화
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step, stepIdx }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🏎️ 자동차 엔진 튜닝 — pgvector 운영</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 매트릭스만 표시 (Step 5) */}
          {step.matrix ? (
            <div className="space-y-3">
              <LatencyChart data={step.latency} stepIdx={stepIdx} />
              <SolutionMatrix />
            </div>
          ) : (
            <div className="space-y-3">
              {/* 1) latency 시계열 */}
              <LatencyChart data={step.latency} stepIdx={stepIdx} />

              {/* 2) 메모리 게이지 */}
              <MemoryGauge memory={step.memory} />

              {/* 3) 토폴로지 */}
              <ReplicaTopology topology={step.topology} />

              {/* 4) 인덱스 파라미터 (Step 3에서만) */}
              {step.indexParams && <IndexParamsCard params={step.indexParams} />}
            </div>
          )}

          {/* verdict — 단계별 한 줄 요약 */}
          <div className="mt-3 rounded-lg bg-purple-700 text-white p-3 flex items-start gap-2 shadow-sm">
            <span className="text-base leading-none">✅</span>
            <div className="flex-1">
              <div className="text-[10px] uppercase tracking-wider text-purple-200 font-bold">이번 단계 효과</div>
              <div className="text-xs font-medium mt-0.5">{step.verdict}</div>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[36rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-purple-500/15 border-l-2 border-purple-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-purple-700 hover:text-purple-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-2-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. pgvector &gt; Chapter 2. pgvector 실전</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">pgvector 운영 — 성능 튜닝과 스케일링</h1>
                  <p className="text-sm text-slate-500 mt-0.5">자동차 엔진 튜닝 — 메모리, 인덱스 파라미터, Read Replica, 한계까지</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-purple-50 border-2 border-purple-300 rounded-xl p-3 text-sm text-purple-900">
                💡 다음(Part V)에서는 <strong>벡터 DB 비교와 선택</strong> — pgvector / Milvus / Qdrant / Pinecone을 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-purple-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-purple-600 text-white hover:bg-purple-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-2-2.html" className="text-purple-700 hover:text-purple-900 font-medium">&larr; IV-2-2. pgvector 실전</a>
              <a href="../part5/V-1-1.html" className="text-rose-700 hover:text-rose-900 font-medium">Part V. 비교와 선택 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
