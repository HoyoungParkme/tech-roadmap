    // 좌측 패널 2: 벡터 공간 (2D 점 + 쿼리 + top-k 원 + 코사인 각도)
    // ─────────────────────────────────────────────────────
    function VectorSpacePane({ points, query, topK, showCosine }) {
      const w = 380;
      const h = 260;

      // 코사인 각도 시각화 — 원점 (200,200)에서 apple, orange로 선
      const origin = { x: 200, y: 220 };
      const apple  = points && points.find((p) => p.id === 'apple');
      const orange = points && points.find((p) => p.id === 'orange');

      return (
        <div className="rounded-lg bg-gradient-to-br from-purple-50 to-purple-100 border border-purple-200 p-2">
          <div className="text-[11px] font-bold text-purple-800 mb-1 flex items-center gap-1">
            <span>📐</span>
            <span>벡터 공간 (1536차원 → 2D 투영)</span>
          </div>
          <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
            <defs>
              <pattern id="grid-vec-db" width="30" height="30" patternUnits="userSpaceOnUse">
                <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e9d5ff" strokeWidth="0.5" />
              </pattern>
              <radialGradient id="topk-grad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stopColor="#a855f7" stopOpacity="0.05" />
                <stop offset="80%" stopColor="#a855f7" stopOpacity="0.18" />
                <stop offset="100%" stopColor="#a855f7" stopOpacity="0" />
              </radialGradient>
            </defs>
            <rect width={w} height={h} fill="url(#grid-vec-db)" />

            {/* top-k 원 (Step 4) */}
            {points && query && topK > 0 && (
              <g>
                <circle cx={query.x} cy={query.y} r={topK} fill="url(#topk-grad)" stroke="#9333ea" strokeWidth="1.5" strokeDasharray="4 3" opacity="0.85">
                  <animate attributeName="r" from={topK - 4} to={topK + 4} dur="2s" repeatCount="indefinite" />
                </circle>
                <text x={query.x + topK + 4} y={query.y - topK + 6} fontSize="9" fill="#7e22ce" fontFamily="monospace" fontWeight="bold">top-k 영역</text>
              </g>
            )}

            {/* 코사인 각도 시각화 (Step 3) */}
            {showCosine && apple && orange && (
              <g>
                <line x1={origin.x} y1={origin.y} x2={apple.x} y2={apple.y} stroke="#9333ea" strokeWidth="2" opacity="0.85" markerEnd="url(#arr-purple)" />
                <line x1={origin.x} y1={origin.y} x2={orange.x} y2={orange.y} stroke="#9333ea" strokeWidth="2" opacity="0.85" markerEnd="url(#arr-purple)" />
                {/* 각도 호 */}
                <path d={`M ${origin.x - 32} ${origin.y - 8} A 34 34 0 0 1 ${origin.x - 18} ${origin.y - 28}`} fill="none" stroke="#dc2626" strokeWidth="2" />
                <text x={origin.x - 36} y={origin.y - 18} fontSize="10" fontWeight="bold" fill="#dc2626" fontFamily="monospace">θ</text>
                <circle cx={origin.x} cy={origin.y} r={3} fill="#7e22ce" />
                <text x={origin.x + 6} y={origin.y + 11} fontSize="8" fill="#7e22ce" fontFamily="monospace">origin</text>
                <text x={origin.x + 60} y={origin.y - 4} fontSize="9" fontWeight="bold" fill="#dc2626" fontFamily="monospace">cos θ = 0.85</text>
              </g>
            )}

            {/* 마커 정의 — 화살표 */}
            <defs>
              <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
                <path d="M0,0 L8,4 L0,8 Z" fill="#9333ea" />
              </marker>
            </defs>

            {/* 쿼리 점 */}
            {query && (
              <g>
                <circle cx={query.x} cy={query.y} r={9} fill="#dc2626" stroke="#7f1d1d" strokeWidth="2.5" />
                <circle cx={query.x} cy={query.y} r={14} fill="none" stroke="#dc2626" strokeWidth="2" opacity="0.5">
                  <animate attributeName="r" from="10" to="20" dur="1.4s" repeatCount="indefinite" />
                  <animate attributeName="opacity" from="0.7" to="0" dur="1.4s" repeatCount="indefinite" />
                </circle>
                <text x={query.x} y={query.y + 22} textAnchor="middle" fontSize="10" fontWeight="bold" fill="#7f1d1d" fontFamily="monospace">
                  query: {query.label}
                </text>
              </g>
            )}

            {/* 벡터 점들 */}
            {points && points.map((p) => {
              const fill = p.hit ? '#9333ea' : '#d8b4fe';
              const stroke = p.hit ? '#581c87' : '#9333ea';
              const r = p.hit ? 11 : 8;
              return (
                <g key={p.id} className="transition-all duration-700">
                  {p.hit && (
                    <circle cx={p.x} cy={p.y} r={r + 6} fill="none" stroke="#9333ea" strokeWidth="2" opacity="0.5">
                      <animate attributeName="r" from={r + 2} to={r + 10} dur="1.4s" repeatCount="indefinite" />
                      <animate attributeName="opacity" from="0.6" to="0" dur="1.4s" repeatCount="indefinite" />
                    </circle>
                  )}
                  <circle cx={p.x} cy={p.y} r={r} fill={fill} stroke={stroke} strokeWidth="2" />
                  <text x={p.x} y={p.y - r - 4} textAnchor="middle" fontSize="9" fontWeight={p.hit ? 'bold' : 'normal'} fill="#581c87" fontFamily="monospace">
                    {p.label}
                  </text>
                </g>
              );
            })}

            {!points && (
              <text x={w / 2} y={h / 2} textAnchor="middle" fontSize="11" fill="#a78bfa" fontFamily="monospace">
                (Step 2부터 벡터 공간 등장)
              </text>
            )}
          </svg>
          <div className="text-[9px] text-purple-700 mt-1 text-center font-mono">
            {!points
              ? '벡터화 전 — 단어는 글자일 뿐'
              : query
                ? '점 거리 = 의미 거리 · 빨강 = 쿼리 · 보라원 = top-k'
                : showCosine
                  ? 'cos θ가 작을수록 1에 가까움 (의미 유사)'
                  : '점이 가까울수록 의미가 비슷'}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 비교 표 (Step 5)
    // ─────────────────────────────────────────────────────
    function CompareTable() {
      const rows = [
        { k: '검색 방식',     trad: '"글자가 같은가?"',         vec: '"의미가 비슷한가?"' },
        { k: '쿼리 형태',     trad: 'WHERE name = \'apple\'',  vec: 'similarity(q_vec, k=5)' },
        { k: '데이터 표현',   trad: '행(row) — 스칼라',        vec: '점(point) — 1536d float' },
        { k: '인덱스 종류',   trad: 'B-Tree · Hash · GIN',     vec: 'HNSW · IVF · PQ' },
        { k: '정확도',        trad: '100% (정확 매칭)',         vec: '~99% (Approximate)' },
        { k: '대표 제품',     trad: 'PostgreSQL · MySQL',       vec: 'Pinecone · Milvus · pgvector' },
        { k: '사용처',        trad: '회원/주문/결제',          vec: 'RAG · 추천 · 이미지 검색' },
      ];

      return (
        <div className="rounded-lg bg-white border-2 border-purple-300 overflow-hidden">
          <div className="bg-purple-100 px-3 py-2 border-b border-purple-200">
            <div className="text-xs font-bold text-purple-900">📊 전통 DB vs 벡터 DB</div>
          </div>
          <table className="w-full text-[11px]">
            <thead>
              <tr className="bg-purple-50 text-left">
                <th className="px-3 py-2 font-bold text-purple-700 w-1/4">기준</th>
                <th className="px-3 py-2 font-bold text-slate-700">전통 DB</th>
                <th className="px-3 py-2 font-bold text-purple-700">벡터 DB</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r, i) => (
                <tr key={r.k} className={i % 2 === 0 ? 'bg-white' : 'bg-purple-50/40'}>
                  <td className="px-3 py-1.5 font-bold text-slate-700 border-r border-slate-100">{r.k}</td>
                  <td className="px-3 py-1.5 text-slate-700 font-mono">{r.trad}</td>
                  <td className="px-3 py-1.5 text-purple-800 font-mono font-semibold">{r.vec}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌(SQL 테이블) + 우(벡터 공간) + 답
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const ansStyle = {
        unknown: 'bg-slate-50 border-slate-300 text-slate-600',
        fail:    'bg-red-50 border-red-400 text-red-800',
        success: 'bg-emerald-50 border-emerald-400 text-emerald-800',
      };

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 도서관 사서 — 색인 카드 vs 의미 추천</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {step.showCompare ? (
            <CompareTable />
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mb-3">
              <SqlTablePane
                rows={step.rows}
                sqlQuery={step.sqlQuery}
                sqlNote={step.sqlNote}
              />
              <VectorSpacePane
                points={step.points}
                query={step.query}
                topK={step.topK}
                showCosine={step.showCosine}
              />
            </div>
          )}

          {/* 답 박스 */}
          {!step.showCompare && step.answer && (
            <div className="mt-3">
              <div className={`rounded-lg border-2 p-3 flex items-start gap-2 ${ansStyle[step.answerType]}`}>
                <span className="text-lg leading-none">
                  {step.answerType === 'success' ? '✅' : step.answerType === 'fail' ? '⚠️' : '💬'}
                </span>
                <div className="flex-1">
                  <div className="text-[10px] uppercase tracking-wider font-bold opacity-70">검색 결과</div>
                  <div className="text-sm font-medium mt-0.5">{step.answer}</div>
                </div>
              </div>
            </div>
          )}

          {/* 범례 */}
          {!step.showCompare && (
            <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
              <span className="flex items-center gap-1">
                <span className="w-2.5 h-2.5 rounded-full" style={{ background: '#d8b4fe' }}></span>
                일반 데이터
              </span>
              <span className="flex items-center gap-1">
                <span className="w-2.5 h-2.5 rounded-full" style={{ background: '#9333ea' }}></span>
                매칭/유사
              </span>
              <span className="flex items-center gap-1">
                <span className="w-2.5 h-2.5 rounded-full" style={{ background: '#dc2626' }}></span>
                쿼리 점
              </span>
              <span className="flex items-center gap-1 ml-auto">
                <span className="w-2.5 h-2.5 rounded-full bg-slate-300"></span>
                미사용
              </span>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-purple-500/15 border-l-2 border-purple-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-purple-700 hover:text-purple-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. 벡터 DB 기초 &gt; Chapter 1. 벡터 DB의 필요성</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">전통 DB vs 벡터 DB — 정확 매칭에서 의미 검색으로</h1>
                  <p className="text-sm text-slate-500 mt-0.5">도서관 사서 — 색인 카드(전통 DB)와 의미를 아는 사서(벡터 DB)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-purple-50 border-2 border-purple-300 rounded-xl p-3 text-sm text-purple-900">
                💡 다음(I-1-2)에서는 <strong>벡터 DB 핵심 개념</strong> — Embedding(저장), Index(인덱싱), Query(검색)의 동작 원리를 자세히 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-purple-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-purple-600 text-white hover:bg-purple-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./I-1-2.html" className="text-purple-700 hover:text-purple-900 font-medium">I-1-2 벡터 DB 핵심 개념 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
