<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB — I-1-1. 전통 DB vs 벡터 DB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "전통 DB에서 \"강아지\"를 검색합니다. SQL은 WHERE title = '강아지'처럼 정확히 일치하는 항목만 찾습니다. 색인 카드에서 제목이 정확히 같은 책만 꺼내는 것과 같습니다.",
        mode: 'traditional',
        query: "SELECT * FROM articles WHERE title = '강아지'",
        results: [
          { title: '강아지 키우기 가이드', match: true, score: '정확 일치' },
          { title: '퍼피 훈련법', match: false, score: '불일치 (제목 다름)' },
          { title: '반려견 건강 관리', match: false, score: '불일치 (제목 다름)' },
          { title: '고양이 vs 강아지', match: false, score: '불일치 (부분 일치 무시)' },
        ],
      },
      {
        desc: "문제가 보이나요? \"퍼피\", \"반려견\"은 강아지와 같은 의미인데, 전통 DB는 글자가 다르면 찾지 못합니다. WHERE LIKE '%강아지%'를 써도 \"퍼피\"는 못 찾습니다.",
        mode: 'traditional-problem',
        query: "SELECT * FROM articles WHERE title LIKE '%강아지%'",
        results: [
          { title: '강아지 키우기 가이드', match: true, score: 'LIKE 일치' },
          { title: '퍼피 훈련법', match: false, score: '\"퍼피\" ≠ \"강아지\"' },
          { title: '반려견 건강 관리', match: false, score: '\"반려견\" ≠ \"강아지\"' },
          { title: '고양이 vs 강아지', match: true, score: 'LIKE 일치 (문맥 무시)' },
        ],
      },
      {
        desc: "벡터 DB는 다릅니다. \"강아지\"를 벡터(숫자 배열)로 변환한 뒤, 의미가 가까운 벡터를 찾습니다. 사서에게 \"강아지 관련 책 추천해주세요\"라고 요청하는 것과 같습니다.",
        mode: 'vector',
        query: "query_vec = embed('강아지')\ndb.search(query_vec, k=4)",
        results: [
          { title: '강아지 키우기 가이드', match: true, score: '유사도: 0.95' },
          { title: '퍼피 훈련법', match: true, score: '유사도: 0.91' },
          { title: '반려견 건강 관리', match: true, score: '유사도: 0.88' },
          { title: '고양이 vs 강아지', match: true, score: '유사도: 0.72' },
        ],
      },
      {
        desc: "핵심 차이를 정리합니다. 전통 DB는 \"글자가 같은가?\"를 묻고, 벡터 DB는 \"의미가 비슷한가?\"를 묻습니다. 이것이 Semantic Search(의미 검색)입니다.",
        mode: 'compare',
        query: null,
        results: null,
      },
      {
        desc: "벡터 DB가 필요한 대표적 상황: (1) RAG — LLM에 관련 문서를 검색해 전달, (2) 추천 시스템 — 비슷한 상품/콘텐츠 추천, (3) 이미지/음성 검색 — 비정형 데이터를 벡터로 변환해 검색.",
        mode: 'usecases',
        query: null,
        results: null,
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-cyan-700 hover:text-cyan-900 font-medium">
                <span>&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. 벡터 DB 기초 &gt; Chapter 1. 벡터 DB의 필요성</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-1-1. 전통 DB vs 벡터 DB — 왜 새로운 DB가 필요한가</h1>
                </div>
              </div>
              <p className="text-slate-600">도서관에서 책을 찾는 두 가지 방법: <b>색인 카드</b>(제목이 정확히 같은 책)와 <b>사서 추천</b>("이런 느낌의 책 있나요?"). 전통 DB가 색인 카드라면, 벡터 DB는 사서입니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-cyan-700 border-cyan-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">전통 DB vs 벡터 DB</h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
                  {s.mode === 'compare' ? '비교 요약' : s.mode === 'usecases' ? '벡터 DB 활용 사례' : '쿼리'}
                </div>
                {s.query ? (
                  <pre className={`rounded-lg p-4 text-sm whitespace-pre-wrap font-mono border ${
                    s.mode.startsWith('traditional') ? 'bg-amber-50 border-amber-200 text-amber-800' : 'bg-cyan-50 border-cyan-200 text-cyan-800'
                  }`}>{s.query}</pre>
                ) : s.mode === 'compare' ? (
                  <div className="space-y-3">
                    <div className="p-4 bg-amber-50 border border-amber-200 rounded-lg">
                      <div className="font-bold text-amber-800 mb-1">전통 DB (SQL)</div>
                      <div className="text-sm text-amber-700">WHERE title = '강아지' — 글자가 같은가?</div>
                      <div className="text-xs text-amber-600 mt-1">정확 매칭만 가능. 동의어, 유사어 검색 불가</div>
                    </div>
                    <div className="flex justify-center text-slate-400 font-bold text-lg">VS</div>
                    <div className="p-4 bg-cyan-50 border border-cyan-200 rounded-lg">
                      <div className="font-bold text-cyan-800 mb-1">벡터 DB</div>
                      <div className="text-sm text-cyan-700">search(embed('강아지'), k=4) — 의미가 비슷한가?</div>
                      <div className="text-xs text-cyan-600 mt-1">Semantic Search. 동의어, 유사 개념 모두 검색</div>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-3">
                    {[
                      { icon: '🔍', title: 'RAG (검색 증강 생성)', desc: 'LLM에 관련 문서를 검색해 전달 → 정확한 답변' },
                      { icon: '🎯', title: '추천 시스템', desc: '비슷한 상품/콘텐츠를 벡터 유사도로 추천' },
                      { icon: '🖼️', title: '이미지/음성 검색', desc: '비정형 데이터를 벡터로 변환해 유사 검색' },
                    ].map((uc, i) => (
                      <div key={i} className="flex items-start gap-3 p-3 bg-slate-50 rounded-lg border border-slate-200">
                        <div className="text-2xl">{uc.icon}</div>
                        <div>
                          <div className="font-bold text-sm text-slate-800">{uc.title}</div>
                          <div className="text-xs text-slate-600 mt-0.5">{uc.desc}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
                  {s.results ? '검색 결과' : s.mode === 'compare' ? '핵심 키워드' : '다음 학습'}
                </div>
                {s.results ? (
                  <div className="space-y-2">
                    {s.results.map((r, i) => (
                      <div key={i} className={`flex items-center justify-between p-3 rounded-lg border transition-all duration-500 ${
                        r.match
                          ? (s.mode === 'vector' ? 'bg-cyan-50 border-cyan-200' : 'bg-emerald-50 border-emerald-200')
                          : 'bg-slate-50 border-slate-200 opacity-50'
                      }`}>
                        <div className="flex items-center gap-2">
                          <span className={`w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold ${r.match ? 'bg-emerald-500 text-white' : 'bg-slate-300 text-white'}`}>
                            {r.match ? '✓' : '✗'}
                          </span>
                          <span className="text-sm font-medium text-slate-800">{r.title}</span>
                        </div>
                        <span className={`text-xs ${r.match ? 'text-emerald-600' : 'text-slate-400'}`}>{r.score}</span>
                      </div>
                    ))}
                  </div>
                ) : s.mode === 'compare' ? (
                  <div className="flex flex-wrap gap-2">
                    {['정확 매칭', '의미 검색', 'Semantic Search', '벡터 유사도', 'Embedding', 'k-NN'].map(kw => (
                      <span key={kw} className="bg-cyan-50 text-cyan-700 px-3 py-1.5 rounded-full text-sm font-medium border border-cyan-200">{kw}</span>
                    ))}
                  </div>
                ) : (
                  <div className="p-4 bg-cyan-50 border border-cyan-200 rounded-lg">
                    <div className="font-bold text-cyan-800 mb-2">다음 시각화에서 배울 것</div>
                    <div className="text-sm text-cyan-700">벡터 DB의 3대 작업 — Embedding(저장), Index(인덱싱), Query(검색)의 동작 원리를 물류 창고에 비유해 알아봅니다.</div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['정확 매칭', '의미 검색', 'Semantic Search', '벡터 유사도'].map(kw => (
                <span key={kw} className="bg-cyan-50 text-cyan-700 px-3 py-1 rounded-full text-sm font-medium border border-cyan-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-cyan-600 hover:bg-cyan-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-end text-sm text-slate-500">
              <a href="./I-1-2.html" className="text-cyan-600 hover:text-cyan-800 font-medium">I-1-2. 벡터 DB 핵심 개념 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
