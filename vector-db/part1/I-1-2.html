<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB — I-1-2. 벡터 DB 핵심 개념</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PHASES = [
      { icon: '📦', label: '입고 (Embedding)', color: 'bg-blue-500', lightBg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-800' },
      { icon: '🗂️', label: '정리 (Indexing)', color: 'bg-amber-500', lightBg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-800' },
      { icon: '🔍', label: '출고 (Query)', color: 'bg-emerald-500', lightBg: 'bg-emerald-50', border: 'border-emerald-200', text: 'text-emerald-800' },
    ];

    const STEPS = [
      {
        desc: "벡터 DB의 첫 번째 작업: 입고(Embedding). 텍스트를 숫자 배열(벡터)로 변환합니다. \"강아지는 귀엽다\" → [0.12, 0.85, -0.34, ...]. 이것이 임베딩입니다.",
        activePhase: 0,
        detail: {
          title: '텍스트 → 벡터 변환',
          input: '"강아지는 귀엽다"',
          process: 'Embedding Model (OpenAI, Sentence-BERT...)',
          output: '[0.12, 0.85, -0.34, 0.67, ...]',
          note: '의미가 비슷한 문장은 비슷한 벡터가 됩니다',
        },
      },
      {
        desc: "물류 창고에서 물건을 아무렇게나 쌓아두면 나중에 찾기 어렵습니다. 인덱싱은 벡터를 체계적으로 분류하는 작업입니다. 비슷한 벡터끼리 가까이 배치합니다.",
        activePhase: 1,
        detail: {
          title: '벡터 인덱싱',
          items: [
            { label: 'Flat (전수 검색)', desc: '모든 벡터를 하나하나 비교. 느리지만 100% 정확' },
            { label: 'IVF (군집 분할)', desc: '벡터를 그룹으로 나눠 해당 그룹만 검색. 빠름' },
            { label: 'HNSW (그래프)', desc: '벡터를 그래프로 연결해 탐색. 빠르고 정확' },
          ],
          note: '인덱스 없이도 검색은 가능하지만, 데이터가 많아지면 인덱스가 필수',
        },
      },
      {
        desc: "마지막 단계: 출고(Query). 검색할 텍스트도 벡터로 변환한 뒤, 인덱스에서 가장 가까운 k개의 벡터를 찾습니다. 이것이 k-NN(k-Nearest Neighbors) 검색입니다.",
        activePhase: 2,
        detail: {
          title: '유사도 검색 (k-NN)',
          input: '쿼리: "반려동물 돌봄" → [0.15, 0.82, -0.28, ...]',
          results: [
            { text: '강아지는 귀엽다', score: 0.95 },
            { text: '고양이 건강 관리', score: 0.87 },
            { text: '햄스터 사육법', score: 0.81 },
          ],
          note: 'k=3이면 가장 가까운 3개를 반환',
        },
      },
      {
        desc: "세 단계를 종합합니다. (1) 입고 — 텍스트를 벡터로 변환해 저장, (2) 정리 — 인덱스를 빌드해 빠르게 찾도록 분류, (3) 출고 — 쿼리 벡터와 유사한 벡터를 검색. 이 흐름이 모든 벡터 DB의 공통 구조입니다.",
        activePhase: -1,
        detail: null,
      },
      {
        desc: "실제 코드로 보면 이렇게 간단합니다. embed → store → index → search 4줄이면 벡터 검색이 완성됩니다. 다음 시각화에서 내부 아키텍처를 더 자세히 들여다봅니다.",
        activePhase: -1,
        detail: {
          title: '벡터 DB 4줄 요약 (의사 코드)',
          code: `# 1. 임베딩\nvectors = embed(["강아지는 귀엽다", "고양이 건강 관리", ...])\n\n# 2. 저장\ndb.add(vectors, metadata=[...])\n\n# 3. 인덱스 (자동 또는 수동)\ndb.build_index()\n\n# 4. 검색\nresults = db.search(embed("반려동물 돌봄"), k=3)`,
        },
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-cyan-700 hover:text-cyan-900 font-medium">
                <span>&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. 벡터 DB 기초 &gt; Chapter 1. 벡터 DB의 필요성</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-1-2. 벡터 DB 핵심 개념 — Embedding, Index, Query</h1>
                </div>
              </div>
              <p className="text-slate-600">물류 창고를 떠올려보세요. <b>입고</b>(임베딩) → <b>정리</b>(인덱싱) → <b>출고</b>(검색). 이 세 단계가 모든 벡터 DB의 공통 작업입니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-cyan-700 border-cyan-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">벡터 DB 3대 작업</h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="space-y-3">
                {s.activePhase >= 0 ? (
                  PHASES.map((ph, i) => (
                    <div key={i} className={`flex items-center gap-4 p-4 rounded-xl border-2 transition-all duration-500 ${
                      i === s.activePhase ? `${ph.lightBg} ${ph.border} scale-105 shadow-md` : 'bg-white border-slate-100 opacity-40'
                    }`}>
                      <div className={`w-12 h-12 ${ph.color} text-white rounded-xl flex items-center justify-center text-2xl`}>{ph.icon}</div>
                      <div>
                        <div className={`font-bold text-sm ${i === s.activePhase ? ph.text : 'text-slate-500'}`}>{ph.label}</div>
                        <div className="text-xs text-slate-500 mt-0.5">
                          {i === 0 && '텍스트 → 벡터로 변환'}
                          {i === 1 && '벡터를 체계적으로 분류'}
                          {i === 2 && '유사한 벡터를 검색'}
                        </div>
                      </div>
                    </div>
                  ))
                ) : (
                  <div className="bg-white rounded-xl border border-slate-200 p-5">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">전체 파이프라인</div>
                    <div className="space-y-3">
                      {PHASES.map((ph, i) => (
                        <div key={i} className={`flex items-center gap-3 p-3 ${ph.lightBg} rounded-lg border ${ph.border}`}>
                          <div className="text-2xl">{ph.icon}</div>
                          <div>
                            <div className={`font-bold text-sm ${ph.text}`}>{ph.label}</div>
                            <div className="text-xs text-slate-600">
                              {i === 0 && '텍스트 → 벡터 (숫자 배열)'}
                              {i === 1 && '벡터 분류 → 빠른 검색 가능'}
                              {i === 2 && '쿼리 벡터 → k개 유사 벡터 반환'}
                            </div>
                          </div>
                          {i < 2 && <div className="ml-auto text-slate-300 font-bold">→</div>}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {s.detail ? (
                  <>
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">{s.detail.title}</div>
                    {s.detail.input && s.detail.process && (
                      <div className="space-y-3 mb-4">
                        <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-sm text-blue-800 font-mono">{s.detail.input}</div>
                        <div className="text-center text-slate-400 text-xs font-bold">↓ {s.detail.process}</div>
                        <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-sm text-emerald-800 font-mono">{s.detail.output}</div>
                      </div>
                    )}
                    {s.detail.items && (
                      <div className="space-y-2 mb-3">
                        {s.detail.items.map((item, i) => (
                          <div key={i} className="p-3 bg-amber-50 border border-amber-200 rounded-lg">
                            <div className="font-bold text-sm text-amber-800">{item.label}</div>
                            <div className="text-xs text-amber-700 mt-0.5">{item.desc}</div>
                          </div>
                        ))}
                      </div>
                    )}
                    {s.detail.results && (
                      <div className="space-y-2 mb-3">
                        <div className="bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm text-slate-700 font-mono">{s.detail.input}</div>
                        {s.detail.results.map((r, i) => (
                          <div key={i} className="flex items-center justify-between p-3 bg-emerald-50 border border-emerald-200 rounded-lg">
                            <span className="text-sm text-emerald-800">{r.text}</span>
                            <span className="text-xs font-bold text-emerald-600">유사도: {r.score}</span>
                          </div>
                        ))}
                      </div>
                    )}
                    {s.detail.code && (
                      <pre className="bg-slate-800 text-slate-100 rounded-lg p-4 text-sm font-mono whitespace-pre-wrap overflow-x-auto">{s.detail.code}</pre>
                    )}
                    {s.detail.note && <div className="text-xs text-slate-500 mt-3 p-2 bg-slate-50 rounded-lg">{s.detail.note}</div>}
                  </>
                ) : (
                  <div className="flex items-center justify-center h-full text-slate-400 text-sm">
                    종합 정리 — 왼쪽 패널의 전체 파이프라인을 확인하세요
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Embedding', 'Index', 'Query', 'k-NN', '유사도'].map(kw => (
                <span key={kw} className="bg-cyan-50 text-cyan-700 px-3 py-1 rounded-full text-sm font-medium border border-cyan-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-cyan-600 hover:bg-cyan-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./I-1-1.html" className="text-cyan-600 hover:text-cyan-800 font-medium">&larr; I-1-1. 전통 DB vs 벡터 DB</a>
              <a href="./I-2-1.html" className="text-cyan-600 hover:text-cyan-800 font-medium">I-2-1. 벡터 DB 아키텍처 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
