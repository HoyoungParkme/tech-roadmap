       (5) 종합        — 4개 개념이 모여서 벡터 DB 한 사이클을 만든다

            '## 4. ANN (Approximate Nearest Neighbor)',
            '- 정확한 top-k 대신 "거의 정확한" top-k를 빠르게',
            '- 핵심 지표: Recall@k (정확도) · QPS (속도)',
            '- 튜닝 파라미터: efSearch (HNSW), nprobe (IVF)',
            '- 프로덕션은 Recall 95~99% 구간이 표준',
            '',
            '## 4개가 한 사이클을 만든다',
            '```',
            '입력 텍스트 ──[Embedding]──▶ 벡터',
            '                                │',
            '                       [Distance + Index + ANN]',
            '                                │',
            '                                ▼',
            '                          top-k 유사 결과',
            '```',
            '',
            '## 다음 자료',
            '- I-2-1 벡터 DB 아키텍처 — 4개념을 실제 시스템 컴포넌트로 풀기',
            '- I-2-2 메타데이터 필터 + 하이브리드 검색',
          ],
          highlight: [3, 4, 5, 8, 9, 10, 14, 15, 16, 17, 22, 23, 24, 25],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 시뮬레이션 — Embedding 카드 활성화 시
    // 텍스트 → 벡터 변환을 시각적으로 보여줌
    // ─────────────────────────────────────────────────────
    function EmbeddingSim({ data }) {
      if (!data) return null;
      return (
        <div className="rounded-lg bg-gradient-to-br from-purple-50 to-purple-100 border border-purple-200 p-3 space-y-2">
          <div className="text-[11px] font-bold text-purple-800 mb-1">🧮 Embedding 시뮬레이션</div>
          <div className="bg-white rounded p-2 border border-purple-200">
            <div className="text-[9px] text-purple-600 font-bold uppercase tracking-wider">입력 텍스트</div>
            <div className="text-sm font-mono text-slate-800 mt-0.5">{data.input}</div>
          </div>
          <div className="text-center text-[10px] text-purple-700 font-bold">
            ↓ {data.model} ({data.dim}d)
          </div>
          <div className="bg-purple-700 text-white rounded p-2">
            <div className="text-[9px] text-purple-200 font-bold uppercase tracking-wider">출력 벡터 (앞 8d)</div>
            <div className="text-xs font-mono mt-1 break-all">
              [{data.vector.map((v) => v.toFixed(2)).join(', ')}, ...]
            </div>
          </div>
          {/* 차원 막대 시각화 */}
          <div className="bg-white rounded p-2 border border-purple-200">
            <div className="text-[9px] text-purple-600 font-bold uppercase tracking-wider mb-1">벡터 차원 (절대값 막대)</div>
            <div className="flex items-end gap-1 h-10">
              {data.vector.map((v, i) => (
                <div key={i} className="flex-1 flex flex-col justify-end">
                  <div className={`w-full ${v >= 0 ? 'bg-purple-500' : 'bg-purple-300'}`} style={{ height: `${Math.abs(v) * 100}%` }} title={`d${i}: ${v.toFixed(2)}`} />
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Distance 카드 활성화 시 — 거리 측정 시각화
    // 벡터 공간 위 두 점 + 3가지 metric 결과
    // ─────────────────────────────────────────────────────
    function DistanceSim({ data }) {
      if (!data) return null;
      const w = 380;
      const h = 160;
      const a = { x: 110, y: 95 };
      const b = { x: 240, y: 70 };

      return (
        <div className="rounded-lg bg-gradient-to-br from-purple-50 to-purple-100 border border-purple-200 p-3 space-y-2">
          <div className="text-[11px] font-bold text-purple-800">📏 Distance Metric 시뮬레이션</div>

          <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto bg-white rounded border border-purple-200">
            <defs>
              <pattern id="grid-dist" width="20" height="20" patternUnits="userSpaceOnUse">
                <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e9d5ff" strokeWidth="0.5" />
              </pattern>
            </defs>
            <rect width={w} height={h} fill="url(#grid-dist)" />
            {/* 원점 */}
            <line x1="20" y1="140" x2={w - 10} y2="140" stroke="#a78bfa" strokeWidth="1" opacity="0.5" />
            <line x1="20" y1="140" x2="20" y2="20" stroke="#a78bfa" strokeWidth="1" opacity="0.5" />
            <text x="22" y="152" fontSize="8" fill="#7c3aed" fontFamily="monospace">0</text>

            {/* L2 직선 거리 */}
            <line x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke="#dc2626" strokeWidth="2" strokeDasharray="4 2" />
            <text x={(a.x + b.x) / 2 + 6} y={(a.y + b.y) / 2 - 6} fontSize="9" fill="#dc2626" fontFamily="monospace" fontWeight="bold">L2 = 0.41</text>

            {/* Cosine: 두 벡터 (원점에서 각 점) */}
            <defs>
              <marker id="arr-vec" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                <path d="M0,0 L6,3 L0,6 Z" fill="#7c3aed" />
              </marker>
            </defs>
            <line x1="20" y1="140" x2={a.x} y2={a.y} stroke="#7c3aed" strokeWidth="2" markerEnd="url(#arr-vec)" />
            <line x1="20" y1="140" x2={b.x} y2={b.y} stroke="#7c3aed" strokeWidth="2" markerEnd="url(#arr-vec)" />
            {/* 사이각 표시 */}
            <path d="M 50 140 A 30 30 0 0 0 50 130" fill="none" stroke="#059669" strokeWidth="1.5" />
            <text x="56" y="135" fontSize="9" fill="#059669" fontFamily="monospace" fontWeight="bold">θ → cos = 0.92</text>

            {/* 점 a, b */}
            <circle cx={a.x} cy={a.y} r="6" fill="#7c3aed" stroke="#4c1d95" strokeWidth="2" />
            <text x={a.x - 12} y={a.y + 14} fontSize="9" fill="#4c1d95" fontFamily="monospace" fontWeight="bold">a</text>
            <circle cx={b.x} cy={b.y} r="6" fill="#7c3aed" stroke="#4c1d95" strokeWidth="2" />
            <text x={b.x + 8} y={b.y - 4} fontSize="9" fill="#4c1d95" fontFamily="monospace" fontWeight="bold">b</text>
          </svg>

          <div className="text-[10px] text-slate-600 font-mono text-center">
            <span className="text-slate-700 font-semibold">a:</span> {data.queryLabel}
            <span className="mx-2 text-purple-400">vs</span>
            <span className="text-slate-700 font-semibold">b:</span> {data.targetLabel}
          </div>

          <div className="space-y-1.5">
            {data.metrics.map((m, i) => (
              <div key={i} className={`flex items-center gap-2 p-2 rounded border-2 transition-all ${m.hit ? 'bg-purple-100 border-purple-500 shadow' : 'bg-white border-purple-100 opacity-70'}`}>
                <div className={`w-12 text-xs font-bold ${m.hit ? 'text-purple-800' : 'text-slate-500'}`}>{m.name}</div>
                <div className="flex-1 text-[10px] font-mono text-slate-600">{m.formula}</div>
                <div className={`text-sm font-bold font-mono ${m.hit ? 'text-purple-700' : 'text-slate-400'}`}>{m.val}</div>
              </div>
            ))}
          </div>
          <div className="text-[10px] text-purple-700 italic">{data.metrics.find((m) => m.hit)?.note}</div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Index 카드 활성화 시 — HNSW 다층 그래프 + 쿼리 경로
    // ─────────────────────────────────────────────────────
    function IndexSim({ data }) {
      if (!data) return null;
      const w = 360;
      const h = 250;

      return (
        <div className="rounded-lg bg-gradient-to-br from-purple-50 to-purple-100 border border-purple-200 p-3 space-y-2">
          <div className="text-[11px] font-bold text-purple-800">🗂️ HNSW Index 시뮬레이션</div>
          <div className="text-[10px] text-purple-700 font-mono">{data.description}</div>

          <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto bg-white rounded border border-purple-200">
            <defs>
              <pattern id="grid-idx" width="20" height="20" patternUnits="userSpaceOnUse">
                <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e9d5ff" strokeWidth="0.5" />
              </pattern>
            </defs>
            <rect width={w} height={h} fill="url(#grid-idx)" />

            {/* 층별 가로선 + 라벨 */}
            {data.layers.map((layer, li) => (
              <g key={li}>
                <line
                  x1="10"
                  y1={layer.y}
                  x2={w - 10}
                  y2={layer.y}
                  stroke="#c4b5fd"
                  strokeWidth="1"
                  strokeDasharray="3 3"
                />
                <text x={w - 8} y={layer.y - 3} fontSize="8" fill="#7c3aed" fontFamily="monospace" textAnchor="end" fontWeight="bold">
                  {layer.label}
                </text>
              </g>
            ))}

            {/* 같은 층 내 연결선 (수평) */}
            {data.layers.map((layer, li) => {
              const lines = [];
              for (let j = 0; j < layer.nodes.length - 1; j++) {
                const n1 = layer.nodes[j];
                const n2 = layer.nodes[j + 1];
                lines.push(
                  <line
                    key={`hl-${li}-${j}`}
                    x1={n1.x}
                    y1={layer.y}
                    x2={n2.x}
                    y2={layer.y}
                    stroke="#c4b5fd"
                    strokeWidth="1"
                  />
                );
              }
              return <g key={`h-${li}`}>{lines}</g>;
            })}

            {/* 층간 hop 경로 (hit 노드 연결) */}
            {data.layers.slice(0, -1).map((layer, i) => {
              const up = layer.nodes.find((n) => n.hit);
              const down = data.layers[i + 1].nodes.find((n) => n.hit);
              if (!up || !down) return null;
              return <line key={`hop-${i}`} x1={up.x} y1={layer.y} x2={down.x} y2={data.layers[i + 1].y} stroke="#dc2626" strokeWidth="2.5" />;
            })}

            {/* 쿼리 → 최하위 hit 경로 */}
            {(() => {
              const bottom = data.layers[data.layers.length - 1];
              const hit = bottom.nodes.find((n) => n.hit);
              if (!hit) return null;
              return <line x1={data.query.x} y1={data.query.y} x2={hit.x} y2={bottom.y} stroke="#dc2626" strokeWidth="2.5" strokeDasharray="4 2" />;
            })()}

            {/* 노드 */}
            {data.layers.map((layer, li) =>
              layer.nodes.map((n) => (
                <g key={`n-${li}-${n.id}`}>
                  {n.hit && (
                    <circle cx={n.x} cy={layer.y} r="11" fill="none" stroke="#dc2626" strokeWidth="2" opacity="0.5">
                      <animate attributeName="r" from="8" to="16" dur="1.4s" repeatCount="indefinite" />
                      <animate attributeName="opacity" from="0.6" to="0" dur="1.4s" repeatCount="indefinite" />
                    </circle>
                  )}
                  <circle cx={n.x} cy={layer.y} r={n.hit ? 7 : 5} fill={n.hit ? '#dc2626' : '#a78bfa'} stroke={n.hit ? '#7f1d1d' : '#7c3aed'} strokeWidth="1.5" />
                </g>
              ))
            )}

            {/* 쿼리 점 */}
            <circle cx={data.query.x} cy={data.query.y} r="8" fill="#fbbf24" stroke="#b45309" strokeWidth="2" />
            <text x={data.query.x} y={data.query.y + 22} textAnchor="middle" fontSize="9" fill="#92400e" fontFamily="monospace" fontWeight="bold">query</text>
          </svg>

          <div className="flex flex-wrap gap-2 text-[9px] text-slate-600">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-purple-400"></span>일반 노드
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-red-600"></span>탐색 경로
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-amber-400"></span>쿼리
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // ANN 카드 활성화 시 — 검색 시간 + Recall 비교 막대
    // ─────────────────────────────────────────────────────
    function AnnSim({ data }) {
      if (!data) return null;
      const maxTime = data.baselineMs;

      return (
        <div className="rounded-lg bg-gradient-to-br from-purple-50 to-purple-100 border border-purple-200 p-3 space-y-2">
          <div className="text-[11px] font-bold text-purple-800">⚡ ANN 알고리즘 비교 (1M 벡터, top-10)</div>

          <div className="space-y-2">
            {data.compare.map((row, i) => {
              const tw = Math.max(2, (row.time / maxTime) * 100);
              return (
                <div key={i} className={`p-2 rounded border-2 transition-all ${row.hit ? 'bg-purple-100 border-purple-500 shadow' : 'bg-white border-purple-100 opacity-80'}`}>
                  <div className="flex items-center justify-between mb-1">
                    <span className={`text-xs font-bold ${row.hit ? 'text-purple-900' : 'text-slate-700'}`}>{row.name}</span>
                    <span className={`text-[10px] font-mono ${row.hit ? 'text-purple-700' : 'text-slate-500'}`}>
                      {row.time}ms · QPS {row.qps} · Recall {row.recall}%
                    </span>
                  </div>
                  {/* 시간 막대 (작을수록 좋음) */}
                  <div className="bg-slate-100 rounded h-3 overflow-hidden">
                    <div className={`h-full ${row.hit ? 'bg-purple-600' : 'bg-purple-300'}`} style={{ width: `${tw}%` }} />
                  </div>
                  <div className="flex items-center justify-between mt-1">
                    <span className="text-[9px] text-slate-500 italic">{row.note}</span>
                    <div className="flex items-center gap-1">
                      <span className="text-[9px] text-emerald-700 font-mono">recall</span>
                      <div className="w-16 bg-slate-100 rounded h-2 overflow-hidden">
                        <div className="h-full bg-emerald-500" style={{ width: `${row.recall}%` }} />
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          <div className="text-[10px] text-purple-800 bg-purple-50 border border-purple-200 rounded p-2 leading-relaxed">
            <span className="font-bold">트레이드오프 한 줄</span> — 막대가 짧을수록 빠르고, 초록 막대가 길수록 정확하다.
            HNSW는 두 축 모두 우수해 가장 인기 있는 ANN.
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 5 종합 — 4개 개념을 사이클로 보여줌
    // ─────────────────────────────────────────────────────
    function PipelineSim({ data }) {
      if (!data) return null;
      return (
        <div className="rounded-lg bg-gradient-to-br from-purple-50 to-purple-100 border border-purple-200 p-3 space-y-2">
          <div className="text-[11px] font-bold text-purple-800">🔄 4개념 한 사이클</div>
          <div className="space-y-2">
            {data.pipeline.map((p, i) => (
              <div key={i} className="relative">
                <div className="flex items-start gap-3 p-3 bg-white border-2 border-purple-300 rounded-lg shadow-sm">
                  <div className="w-9 h-9 rounded-full bg-purple-600 text-white flex items-center justify-center text-lg shrink-0">{p.icon}</div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-baseline gap-2">
                      <span className="text-[10px] text-purple-500 font-bold">STEP {p.step}</span>
                      <span className="text-sm font-bold text-purple-900">{p.label}</span>
                    </div>
                    <div className="text-[11px] text-slate-600 font-mono mt-0.5 break-all">{p.desc}</div>
                  </div>
                </div>
                {i < data.pipeline.length - 1 && <div className="flex justify-center text-purple-400 text-lg leading-none my-0.5">↓</div>}
              </div>
            ))}
          </div>
          <div className="text-[10px] text-purple-700 bg-purple-100 border border-purple-200 rounded p-2 italic">
            어떤 벡터 DB(Pinecone, Milvus, Weaviate, pgvector)도 결국 이 4개념의 조합이다.
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 4개 개념 카드 그리드 — 항상 표시, active만 강조
    // ─────────────────────────────────────────────────────
    function ConceptCards({ active }) {
      return (
        <div className="grid grid-cols-2 gap-2 mb-3">
          {CONCEPTS.map((c) => {
            const isActive = active === c.key || active === 'all';
            return (
              <div key={c.key} className={`p-2 rounded-lg border-2 transition-all duration-500 ${isActive ? 'bg-purple-600 border-purple-800 text-white shadow-md scale-105' : 'bg-white border-slate-200 text-slate-500 opacity-60'}`}>
                <div className="flex items-center gap-2">
                  <span className="text-lg leading-none">{c.icon}</span>
                  <div className="min-w-0">
                    <div className={`text-xs font-bold ${isActive ? 'text-white' : 'text-slate-700'}`}>{c.label}</div>
                    <div className={`text-[9px] mt-0.5 font-mono truncate ${isActive ? 'text-purple-100' : 'text-slate-400'}`}>{c.tag}</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 4 카드 + active 카드별 시뮬레이션
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const renderSim = () => {
        if (step.active === 'embedding') return <EmbeddingSim data={step.sim?.embedding} />;
        if (step.active === 'distance')  return <DistanceSim data={step.sim?.distance} />;
        if (step.active === 'index')     return <IndexSim data={step.sim?.index} />;
        if (step.active === 'ann')       return <AnnSim data={step.sim?.ann} />;
        if (step.active === 'all')       return <PipelineSim data={step.sim?.all} />;
        return null;
      };

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 도서관 카드 시스템 — 4개 핵심 개념</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 4개 개념 카드 — 항상 표시 */}
          <ConceptCards active={step.active} />

          {/* 활성 카드별 시뮬레이션 */}
          {renderSim()}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 파일명 탭 (5개 파일) */}
          <div className="bg-[#21252b] px-2 py-1 flex gap-1 border-b border-slate-700 overflow-x-auto">
            {STEPS.map((s, i) => (
              <span key={i} className={`px-2 py-1 text-[10px] font-mono rounded-t whitespace-nowrap transition ${i === stepIdx ? 'bg-[#282c34] text-purple-300 border-t-2 border-purple-500' : 'text-slate-500'}`}>
                {s.code.filename}
              </span>
            ))}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div key={i} className={`flex hover:bg-slate-800/50 ${highlighted ? 'bg-purple-500/15 border-l-2 border-purple-400' : ''}`}>
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">{i + 1}</span>
                      <span className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1" dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }} />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-purple-700 hover:text-purple-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. 벡터 DB 기초 &gt; Chapter 1. 벡터 DB의 필요성</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">벡터 DB 핵심 개념 — Embedding · Distance · Index · ANN</h1>
                  <p className="text-sm text-slate-500 mt-0.5">도서관 카드 시스템 — 4개 핵심 개념이 한 사이클을 이룬다</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-purple-50 border-2 border-purple-300 rounded-xl p-3 text-sm text-purple-900">
                💡 다음(I-2-1)에서는 4개념을 <strong>실제 벡터 DB 아키텍처</strong>(Coordinator/Worker/Storage)로 풀어본다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-purple-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={handleReset} disabled={stepIdx === 0 && !isPlaying} aria-label="처음으로" className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                처음
              </button>
              <button onClick={handlePrev} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                &larr; 이전
              </button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-purple-600 text-white hover:bg-purple-700 transition min-w-[100px]">
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1} aria-label="다음 단계" className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; I-1-1 전통 DB vs 벡터 DB</a>
              <a href="./I-2-1.html" className="text-purple-700 hover:text-purple-900 font-medium">I-2-1 벡터 DB 아키텍처 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
