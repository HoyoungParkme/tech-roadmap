            '### 4) 글로벌 SaaS RAG / 엔터프라이즈',
            '→ **Pinecone** (Managed)',
            '   - 멀티테넌시 namespace 필수',
            '   - 99.9% SLA + 자동 샤딩',
            '   - 비용 감수 가능 시',
            '',
            '## 안티패턴',
            '- ❌ PoC에 Pinecone — 비용 낭비',
            '- ❌ 프로덕션에 FAISS만 — 영속성/HA 부재',
            '- ❌ 모든 데이터를 pgvector에 — 5천만 벡터부터 느려짐',
            '',
            '## 결론',
            '- 규모 + 운영 능력 + 비용을 함께 봐야 한다',
            '- 시작은 좌하단(Chroma), 성장하면 우상단(Managed)',
            '- 한 번에 큰 도구로 가지 말고 단계적으로 이동',
          ],
          highlight: [10, 11, 12, 13, 18, 19, 20, 21, 24, 25, 26, 27, 30, 31, 32, 35, 36, 37],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 4 카테고리 카드 (좌측 LiveDataPane 메인)
    //   active 카테고리만 강조, 나머지는 dim
    // ─────────────────────────────────────────────────────
    function CategoryCard({ cat, isActive, isDim }) {
      const accent = {
        library:  { bg: 'from-orange-50 to-orange-100', border: 'border-orange-300', ring: 'ring-orange-400', text: 'text-orange-800', dot: 'bg-orange-500' },
        embedded: { bg: 'from-emerald-50 to-emerald-100', border: 'border-emerald-300', ring: 'ring-emerald-400', text: 'text-emerald-800', dot: 'bg-emerald-500' },
        sql:      { bg: 'from-blue-50 to-blue-100', border: 'border-blue-300', ring: 'ring-blue-400', text: 'text-blue-800', dot: 'bg-blue-500' },
        managed:  { bg: 'from-purple-50 to-purple-100', border: 'border-purple-300', ring: 'ring-purple-400', text: 'text-purple-800', dot: 'bg-purple-500' },
      }[cat.key];

      return (
        <div
          className={`relative rounded-lg border-2 p-3 transition-all duration-500 bg-gradient-to-br ${accent.bg} ${
            isActive
              ? `${accent.border} ring-2 ${accent.ring} scale-[1.03] shadow-md`
              : isDim
              ? 'opacity-35 border-slate-200 grayscale-[40%]'
              : `${accent.border} opacity-90`
          }`}
        >
          {/* 헤더: 아이콘 + 제목 */}
          <div className="flex items-start gap-2 mb-2">
            <div className={`w-8 h-8 ${accent.dot} text-white rounded-lg flex items-center justify-center text-base shrink-0`}>
              {cat.icon}
            </div>
            <div className="flex-1 min-w-0">
              <div className={`text-[11px] font-bold ${accent.text} leading-tight`}>{cat.title}</div>
              <div className="text-[10px] text-slate-500 font-mono truncate">{cat.tools}</div>
            </div>
            {isActive && (
              <span className="absolute -top-2 -right-2 bg-purple-600 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full shadow">
                ACTIVE
              </span>
            )}
          </div>

          {/* 비유 */}
          <div className="text-[10px] text-slate-600 mb-1.5 italic">
            🏷️ {cat.analogy}
          </div>

          {/* 특징 chip */}
          <div className="flex flex-wrap gap-1 mb-2">
            {cat.traits.map((t, i) => (
              <span
                key={i}
                className={`text-[9px] px-1.5 py-0.5 rounded-full bg-white/70 border ${accent.border} ${accent.text} font-mono`}
              >
                {t}
              </span>
            ))}
          </div>

          {/* 규모 / 운영 */}
          <div className="grid grid-cols-2 gap-1 text-[10px] pt-1.5 border-t border-white/60">
            <div>
              <div className="text-slate-500 text-[9px] uppercase font-bold">규모</div>
              <div className={`${accent.text} font-mono font-semibold`}>{cat.scale}</div>
            </div>
            <div>
              <div className="text-slate-500 text-[9px] uppercase font-bold">운영</div>
              <div className={`${accent.text} font-mono font-semibold`}>{cat.ops}</div>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 의사결정 매트릭스 SVG (Step 5)
    //   X축: 데이터 규모, Y축: 운영 복잡도
    // ─────────────────────────────────────────────────────
    function DecisionMatrix({ points }) {
      const w = 460;
      const h = 320;
      const pad = { top: 20, right: 20, bottom: 50, left: 60 };
      const innerW = w - pad.left - pad.right;
      const innerH = h - pad.top - pad.bottom;

      // 좌표 변환: (0~100, 0~100) → SVG 좌표
      // y는 위로 갈수록 운영 복잡도 high → SVG 좌표는 위쪽이 작은 값이므로 invert
      const toX = (x) => pad.left + (x / 100) * innerW;
      const toY = (y) => pad.top + ((100 - y) / 100) * innerH;

      const sizeMap = { sm: 14, md: 18, lg: 22 };

      return (
        <div className="rounded-lg bg-gradient-to-br from-purple-50 to-purple-100 border-2 border-purple-300 p-3">
          <div className="text-xs font-bold text-purple-800 mb-2 flex items-center gap-1">
            <span>🗺️</span>
            <span>의사결정 매트릭스 — 데이터 규모 vs 운영 복잡도</span>
          </div>

          <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
            {/* 격자 */}
            <defs>
              <pattern id="matrix-grid" width="40" height="32" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 32" fill="none" stroke="#e9d5ff" strokeWidth="0.5" />
              </pattern>
              <marker id="axis-arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
                <path d="M0,0 L8,4 L0,8 Z" fill="#7c3aed" />
              </marker>
            </defs>
            <rect
              x={pad.left}
              y={pad.top}
              width={innerW}
              height={innerH}
              fill="url(#matrix-grid)"
              stroke="#c4b5fd"
              strokeWidth="1"
            />

            {/* 4분면 라벨 (배경 영역) */}
            <text x={toX(20)} y={toY(85)} fontSize="9" fill="#a78bfa" fontFamily="monospace" opacity="0.6">소규모/직접</text>
            <text x={toX(78)} y={toY(85)} fontSize="9" fill="#a78bfa" fontFamily="monospace" opacity="0.6">대규모/관리형</text>
            <text x={toX(20)} y={toY(15)} fontSize="9" fill="#a78bfa" fontFamily="monospace" opacity="0.6">PoC/프로토타입</text>
            <text x={toX(78)} y={toY(15)} fontSize="9" fill="#a78bfa" fontFamily="monospace" opacity="0.6">사내 서비스</text>

            {/* 진화 화살표 (좌하 → 우상) */}
            <path
              d={`M ${toX(32)} ${toY(28)} Q ${toX(45)} ${toY(35)} ${toX(58)} ${toY(50)} T ${toX(82)} ${toY(78)}`}
              fill="none"
              stroke="#c4b5fd"
              strokeWidth="2"
              strokeDasharray="4 3"
              opacity="0.7"
            />
            <text x={toX(50)} y={toY(45) - 6} fontSize="9" fill="#7c3aed" fontFamily="monospace" fontWeight="bold">
              성장 경로 →
            </text>

            {/* X축 */}
            <line
              x1={pad.left}
              y1={h - pad.bottom}
              x2={w - pad.right}
              y2={h - pad.bottom}
              stroke="#7c3aed"
              strokeWidth="1.5"
              markerEnd="url(#axis-arrow)"
            />
            {/* Y축 */}
            <line
              x1={pad.left}
              y1={h - pad.bottom}
              x2={pad.left}
              y2={pad.top}
              stroke="#7c3aed"
              strokeWidth="1.5"
              markerEnd="url(#axis-arrow)"
            />

            {/* X축 라벨 */}
            <text x={pad.left + innerW / 2} y={h - 18} textAnchor="middle" fontSize="11" fontWeight="bold" fill="#4c1d95">
              데이터 규모 (벡터 개수) →
            </text>
            <text x={toX(0)} y={h - pad.bottom + 14} fontSize="9" textAnchor="middle" fill="#7c3aed" fontFamily="monospace">~10만</text>
            <text x={toX(50)} y={h - pad.bottom + 14} fontSize="9" textAnchor="middle" fill="#7c3aed" fontFamily="monospace">~1천만</text>
            <text x={toX(100)} y={h - pad.bottom + 14} fontSize="9" textAnchor="middle" fill="#7c3aed" fontFamily="monospace">10억+</text>

            {/* Y축 라벨 */}
            <text
              x={18}
              y={pad.top + innerH / 2}
              textAnchor="middle"
              fontSize="11"
              fontWeight="bold"
              fill="#4c1d95"
              transform={`rotate(-90, 18, ${pad.top + innerH / 2})`}
            >
              운영 복잡도 →
            </text>
            <text x={pad.left - 8} y={toY(0) + 3} fontSize="9" textAnchor="end" fill="#7c3aed" fontFamily="monospace">낮음</text>
            <text x={pad.left - 8} y={toY(50) + 3} fontSize="9" textAnchor="end" fill="#7c3aed" fontFamily="monospace">중간</text>
            <text x={pad.left - 8} y={toY(100) + 3} fontSize="9" textAnchor="end" fill="#7c3aed" fontFamily="monospace">높음</text>

            {/* 도구 점 */}
            {points.map((p, i) => {
              const r = sizeMap[p.size] || 16;
              return (
                <g key={p.key} className="transition-all duration-700">
                  {/* 펄스 링 */}
                  <circle cx={toX(p.x)} cy={toY(p.y)} r={r + 4} fill="none" stroke={p.color} strokeWidth="2" opacity="0.4">
                    <animate attributeName="r" from={r} to={r + 12} dur="1.6s" repeatCount="indefinite" />
                    <animate attributeName="opacity" from="0.5" to="0" dur="1.6s" repeatCount="indefinite" />
                  </circle>
                  {/* 본체 */}
                  <circle cx={toX(p.x)} cy={toY(p.y)} r={r} fill={p.color} stroke="white" strokeWidth="2.5" opacity="0.95" />
                  <text
                    x={toX(p.x)}
                    y={toY(p.y) + 3}
                    textAnchor="middle"
                    fontSize="10"
                    fontWeight="bold"
                    fill="white"
                    fontFamily="monospace"
                    pointerEvents="none"
                  >
                    {p.label}
                  </text>
                </g>
              );
            })}
          </svg>

          {/* 설명 footer */}
          <div className="mt-2 grid grid-cols-2 gap-2 text-[10px]">
            <div className="bg-white/70 border border-purple-200 rounded p-1.5">
              <span className="font-bold text-purple-800">좌하단 시작</span>
              <span className="text-slate-600"> · PoC는 Chroma · 작은 운영비</span>
            </div>
            <div className="bg-white/70 border border-purple-200 rounded p-1.5">
              <span className="font-bold text-purple-800">우상단 이동</span>
              <span className="text-slate-600"> · 글로벌 SaaS는 Pinecone</span>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 4 카테고리 카드 + (Step 5에서) 매트릭스
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const cats = CATEGORIES_BASE;

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🗂️ 벡터 DB 4 카테고리</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* Step 5: 매트릭스 / 그 외: 4 카드 그리드 */}
          {step.showMatrix ? (
            <DecisionMatrix points={step.matrix} />
          ) : (
            <div className="grid grid-cols-2 gap-2.5">
              {cats.map((cat) => (
                <CategoryCard
                  key={cat.key}
                  cat={cat}
                  isActive={step.activeKey === cat.key}
                  isDim={step.activeKey !== null && step.activeKey !== cat.key}
                />
              ))}
            </div>
          )}

          {/* 하단 진행 인디케이터 */}
          <div className="mt-4 pt-3 border-t border-slate-100">
            <div className="flex items-center justify-between text-[10px] text-slate-500 font-mono">
              <span>카테고리 진행</span>
              <span>
                {step.showMatrix
                  ? '매트릭스 종합'
                  : step.activeKey
                  ? `${cats.findIndex((c) => c.key === step.activeKey) + 1} / 4`
                  : '대기'}
              </span>
            </div>
            <div className="flex gap-1 mt-1.5">
              {cats.map((cat) => {
                const active = step.activeKey === cat.key;
                const passed =
                  step.showMatrix ||
                  cats.findIndex((c) => c.key === step.activeKey) >
                    cats.findIndex((c) => c.key === cat.key);
                return (
                  <div
                    key={cat.key}
                    className={`flex-1 h-1.5 rounded-full transition-all duration-500 ${
                      active ? 'bg-purple-600' : passed ? 'bg-purple-300' : 'bg-slate-200'
                    }`}
                  />
                );
              })}
            </div>
          </div>

          {/* 범례 (매트릭스 모드 외) */}
          {!step.showMatrix && (
            <div className="flex flex-wrap gap-3 text-[10px] mt-3 text-slate-500">
              <span className="flex items-center gap-1">
                <span className="w-2.5 h-2.5 rounded-full bg-orange-500"></span>Library
              </span>
              <span className="flex items-center gap-1">
                <span className="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>Embedded
              </span>
              <span className="flex items-center gap-1">
                <span className="w-2.5 h-2.5 rounded-full bg-blue-500"></span>SQL
              </span>
              <span className="flex items-center gap-1">
                <span className="w-2.5 h-2.5 rounded-full bg-purple-500"></span>Managed
              </span>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>
              {code.lines.join('\n')}
            </code>
          </pre>

          {/* 실제 렌더링 — 라인번호 + 강조 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-purple-500/15 border-l-2 border-purple-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-purple-700 hover:text-purple-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. 벡터 DB 기초 &gt; Chapter 2. 아키텍처와 분류</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">벡터 DB 종류와 분류</h1>
                  <p className="text-sm text-slate-500 mt-0.5">라이브러리 / 임베디드 / SQL 확장 / 관리형 — 4 카테고리와 의사결정 매트릭스</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-purple-50 border-2 border-purple-300 rounded-xl p-3 text-sm text-purple-900">
                💡 다음 챕터(Part II)에서는 <strong>FAISS</strong>를 깊이 들어가 인덱스 종류(Flat/IVF/HNSW)와 GPU 가속을 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-purple-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-purple-600 text-white hover:bg-purple-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-2-1.html" className="text-slate-500 hover:text-slate-700">&larr; I-2-1 벡터 DB 아키텍처</a>
              <a href="../part2/II-1-1.html" className="text-purple-700 hover:text-purple-900 font-medium">Part II. FAISS &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
