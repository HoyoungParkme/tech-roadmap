<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB — I-2-2. 벡터 DB 종류와 분류</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const DBS = [
      {
        type: '라이브러리',
        icon: '🧰',
        name: 'FAISS',
        color: 'bg-orange-500',
        lightBg: 'bg-orange-50',
        border: 'border-orange-200',
        text: 'text-orange-800',
        analogy: '도구함',
        desc: '코드에 직접 import해서 쓴다. 서버 불필요.',
        pros: ['초고속 검색 (메모리 기반)', 'GPU 가속 지원', '10억 벡터까지 검색 가능'],
        cons: ['서버/API 없음', '메타데이터 필터 미지원', '영속성 직접 관리'],
        code: 'import faiss\nindex = faiss.IndexFlatL2(768)\nindex.add(vectors)\nD, I = index.search(query, k=5)',
      },
      {
        type: '경량 서버',
        icon: '🧊',
        name: 'Chroma',
        color: 'bg-green-500',
        lightBg: 'bg-green-50',
        border: 'border-green-200',
        text: 'text-green-800',
        analogy: '미니 냉장고',
        desc: '독립 실행 가능한 임베딩 DB. 개발/프로토타입에 최적.',
        pros: ['메타데이터 필터 내장', 'LangChain 통합 쉬움', '인메모리/서버 모드 전환'],
        cons: ['대규모 데이터에 FAISS보다 느림', '분산 처리 미지원', '상대적으로 새로운 프로젝트'],
        code: 'import chromadb\nclient = chromadb.Client()\ncol = client.create_collection("docs")\ncol.add(ids=["1"], documents=["..."])\nresults = col.query(query_texts=["..."], n_results=5)',
      },
      {
        type: 'DB 확장',
        icon: '🐘',
        name: 'pgvector',
        color: 'bg-blue-500',
        lightBg: 'bg-blue-50',
        border: 'border-blue-200',
        text: 'text-blue-800',
        analogy: '대형 냉장고 확장',
        desc: 'PostgreSQL에 벡터 기능 추가. SQL로 벡터 검색.',
        pros: ['기존 PostgreSQL 인프라 활용', 'SQL + 벡터 검색 결합', 'ACID 트랜잭션 보장'],
        cons: ['FAISS만큼 빠르지 않음', 'PostgreSQL 운영 지식 필요', '임베딩 모델은 별도 관리'],
        code: "CREATE EXTENSION vector;\nCREATE TABLE docs (\n  id serial, content text,\n  embedding vector(768)\n);\nSELECT * FROM docs\n  ORDER BY embedding <=> '[0.1,0.2,...]'\n  LIMIT 5;",
      },
    ];

    const STEPS = [
      {
        desc: "벡터 DB는 3가지 유형으로 분류됩니다. (1) 라이브러리 — 코드에 import, (2) 경량 서버 — 독립 실행 가능, (3) DB 확장 — 기존 DB에 벡터 기능 추가. 각각 도구함, 미니 냉장고, 대형 냉장고에 비유할 수 있습니다.",
        activeDb: -1,
      },
      {
        desc: "첫 번째 유형: FAISS (라이브러리). Facebook이 만든 벡터 검색 라이브러리입니다. pip install하면 끝. 서버가 필요 없고, 메모리에서 초고속 검색이 가능합니다. 도구함에서 필요한 도구를 꺼내 쓰는 것처럼.",
        activeDb: 0,
      },
      {
        desc: "두 번째 유형: Chroma (경량 서버). 임베딩에 특화된 독립 DB입니다. 메타데이터 필터가 내장되어 있고, LangChain과의 통합이 쉽습니다. 미니 냉장고처럼 꽂으면 바로 사용 가능.",
        activeDb: 1,
      },
      {
        desc: "세 번째 유형: pgvector (DB 확장). PostgreSQL에 CREATE EXTENSION vector; 한 줄이면 벡터 검색이 추가됩니다. 기존 SQL 쿼리와 벡터 검색을 한 쿼리에 섞을 수 있는 것이 최대 강점입니다.",
        activeDb: 2,
      },
      {
        desc: "어떤 유형을 선택해야 할까요? 빠른 프로토타입 → Chroma, 대규모 검색 성능 → FAISS, 기존 PostgreSQL 활용 → pgvector. Part V에서 상세한 선택 가이드를 다룹니다. 다음은 Part II에서 FAISS를 깊이 살펴봅니다.",
        activeDb: -1,
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-cyan-700 hover:text-cyan-900 font-medium">
                <span>&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. 벡터 DB 기초 &gt; Chapter 2. 벡터 DB 아키텍처</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-2-2. 벡터 DB 종류와 분류 — 라이브러리 vs 서버 vs 확장</h1>
                </div>
              </div>
              <p className="text-slate-600">세 가지 도구: <b>도구함</b>(FAISS), <b>미니 냉장고</b>(Chroma), <b>대형 냉장고 확장</b>(pgvector). 각각의 특성과 적합한 상황을 알아봅니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-cyan-700 border-cyan-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">벡터 DB 3분류</h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="space-y-3">
                {DBS.map((db, i) => (
                  <div key={i} className={`p-4 rounded-xl border-2 transition-all duration-500 ${
                    s.activeDb === i ? `${db.lightBg} ${db.border} scale-[1.02] shadow-md` :
                    s.activeDb === -1 ? `${db.lightBg} ${db.border}` : 'bg-white border-slate-100 opacity-40'
                  }`}>
                    <div className="flex items-center gap-3 mb-2">
                      <div className={`w-10 h-10 ${db.color} text-white rounded-xl flex items-center justify-center text-xl`}>{db.icon}</div>
                      <div>
                        <div className={`font-bold text-sm ${db.text}`}>{db.name}</div>
                        <div className="text-xs text-slate-500">{db.type} — {db.analogy}</div>
                      </div>
                    </div>
                    <div className="text-xs text-slate-600">{db.desc}</div>
                  </div>
                ))}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {s.activeDb >= 0 ? (
                  <>
                    <div className="flex items-center gap-2 mb-4">
                      <span className={`w-6 h-6 ${DBS[s.activeDb].color} text-white rounded-lg flex items-center justify-center text-sm`}>{DBS[s.activeDb].icon}</span>
                      <span className={`font-bold text-sm ${DBS[s.activeDb].text}`}>{DBS[s.activeDb].name} 상세</span>
                    </div>
                    <div className="mb-4">
                      <div className="text-xs font-bold text-emerald-600 mb-2">장점</div>
                      <div className="space-y-1">
                        {DBS[s.activeDb].pros.map((p, i) => (
                          <div key={i} className="flex items-center gap-2 text-sm text-emerald-700">
                            <span className="text-emerald-500">✓</span> {p}
                          </div>
                        ))}
                      </div>
                    </div>
                    <div className="mb-4">
                      <div className="text-xs font-bold text-red-600 mb-2">한계</div>
                      <div className="space-y-1">
                        {DBS[s.activeDb].cons.map((c, i) => (
                          <div key={i} className="flex items-center gap-2 text-sm text-red-700">
                            <span className="text-red-500">✗</span> {c}
                          </div>
                        ))}
                      </div>
                    </div>
                    <div>
                      <div className="text-xs font-bold text-slate-500 mb-2">코드 예시</div>
                      <pre className="bg-slate-800 text-slate-100 rounded-lg p-3 text-xs font-mono whitespace-pre-wrap overflow-x-auto">{DBS[s.activeDb].code}</pre>
                    </div>
                  </>
                ) : s.activeDb === -1 && step === 0 ? (
                  <div className="flex flex-col items-center justify-center h-full text-center">
                    <div className="text-4xl mb-3">🏗️</div>
                    <div className="font-bold text-slate-700 mb-2">벡터 DB 3분류</div>
                    <div className="text-sm text-slate-500">각 유형을 하나씩 살펴봅니다</div>
                  </div>
                ) : (
                  <>
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">선택 가이드 요약</div>
                    <div className="space-y-3">
                      {[
                        { label: '빠른 프로토타입', rec: 'Chroma', reason: '설치 간편, 메타데이터 내장, LangChain 통합', color: 'bg-green-50 border-green-200 text-green-800' },
                        { label: '대규모 검색 성능', rec: 'FAISS', reason: '10억 벡터, GPU 가속, 초고속 검색', color: 'bg-orange-50 border-orange-200 text-orange-800' },
                        { label: '기존 PostgreSQL 활용', rec: 'pgvector', reason: 'SQL + 벡터, ACID, 기존 인프라 재사용', color: 'bg-blue-50 border-blue-200 text-blue-800' },
                      ].map((item, i) => (
                        <div key={i} className={`p-3 rounded-lg border ${item.color}`}>
                          <div className="font-bold text-sm">{item.label} → {item.rec}</div>
                          <div className="text-xs mt-0.5 opacity-80">{item.reason}</div>
                        </div>
                      ))}
                    </div>
                    <div className="mt-4 p-3 bg-cyan-50 border border-cyan-200 rounded-lg">
                      <div className="text-xs text-cyan-700">상세 비교는 <b>Part V. 비교와 선택 가이드</b>에서 다룹니다</div>
                    </div>
                  </>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['라이브러리', '독립 서버', 'DB 확장', 'FAISS', 'Chroma', 'pgvector'].map(kw => (
                <span key={kw} className="bg-cyan-50 text-cyan-700 px-3 py-1 rounded-full text-sm font-medium border border-cyan-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-cyan-600 hover:bg-cyan-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./I-2-1.html" className="text-cyan-600 hover:text-cyan-800 font-medium">&larr; I-2-1. 벡터 DB 아키텍처</a>
              <a href="../part2/II-1-1.html" className="text-orange-600 hover:text-orange-800 font-medium">Part II. FAISS → II-1-1 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
