            ')',
            '',
            'qdrant = QdrantClient(path="./qdrant_store")',
            '',
            '',
            'def build_hnsw_index(',
            '    collection_name: str,',
            '    dim: int = 1536,',
            ') -> None:',

            '    """',
            '    qdrant.recreate_collection(',

            '        vectors_config=VectorParams(',

            '',
            '',

          input: '"비동기 웹 프레임워크?"',
          output: 'top-3 docs (by cosine sim)',
          model: 'k=3, ef=64',
        },
        index: { type: 'HNSW', layers: 4, mEdges: 16, buildTime: '2.4s' },
        query: {
          q: '"비동기 웹 프레임워크?"',

            { id: 'd1', score: 0.91, text: 'FastAPI는 비동기 웹 프레임워크다' },

            '"""',

            '    - RRF       : 두 랭킹을 융합 (Reciprocal Rank Fusion)',
            '"""',
            'from qdrant_client.models import Filter, FieldCondition, MatchValue',
            'from rank_bm25 import BM25Okapi',
            'from ingest import embed_text',
            'from index import qdrant',
            '',
            '',

            '        collection_name=collection_name,',
            '        query_vector=q_vec,',
            '        query_filter=meta_filter,',
            '        limit=k * 2,',
            '    )',
            '',
            '    # (3) BM25 키워드 검색 (간이 구현)',
            '    docs = [h.payload["text"] for h in vec_hits]',
            '    bm25 = BM25Okapi([d.split() for d in docs])',
            '    kw_scores = bm25.get_scores(query_text.split())',
            '',
            '    # (4) RRF 융합 — 랭크 기반 가중 합산',
            '    def rrf(rank: int, k: int = 60) -> float:',
            '        return 1.0 / (k + rank)',

            '            key=lambda i: -kw_scores[i],',
            '        ).index(rank_v)',
            '        score = rrf(rank_v) + rrf(rank_k)',
            '        fused.append({"id": h.id, "score": score})',
            '',
            '    fused.sort(key=lambda x: -x["score"])',
            '    return fused[:k]',

    function FlowDiagram({ activeIds, arrows }) {
      const w = 720;
      const h = 150;
      const boxW = 110;
      const boxH = 70;
      const gap = (w - boxW * 5) / 6;
      const boxes = STAGES.map((s, i) => ({
        ...s,
        x: gap + i * (boxW + gap),
        y: (h - boxH) / 2,
      }));
      const boxMap = Object.fromEntries(boxes.map((b) => [b.id, b]));

      return (
        <div className="rounded-lg bg-gradient-to-br from-purple-50 to-purple-100 border border-purple-200 p-2">
          <div className="text-[11px] font-bold text-purple-800 mb-1 flex items-center gap-1">
            <span>🏭</span>
            <span>벡터 DB 파이프라인 (Ingest → Result)</span>
          </div>
          <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
            <defs>
              <marker id="arrow-on" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
                <path d="M0,0 L9,4.5 L0,9 Z" fill="#7e22ce" />
              </marker>
              <marker id="arrow-off" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
                <path d="M0,0 L8,4 L0,8 Z" fill="#cbd5e1" />
              </marker>
            </defs>

            {/* 박스 사이 배경 화살표 (전부 회색) */}
            {boxes.slice(0, -1).map((b, i) => {
              const next = boxes[i + 1];
              const isActive = arrows.some(
                ([f, t]) => f === b.id && t === next.id,
              );
              const stroke = isActive ? '#7e22ce' : '#cbd5e1';
              const strokeW = isActive ? 2.5 : 1.5;
              return (
                <g key={`a${i}`}>
                  <line
                    x1={b.x + boxW}
                    y1={b.y + boxH / 2}
                    x2={next.x - 2}
                    y2={next.y + boxH / 2}
                    stroke={stroke}
                    strokeWidth={strokeW}
                    markerEnd={isActive ? 'url(#arrow-on)' : 'url(#arrow-off)'}
                  />
                  {isActive && (
                    <circle r="4" fill="#a855f7">
                      <animateMotion
                        dur="1.5s"
                        repeatCount="indefinite"
                        path={`M${b.x + boxW},${b.y + boxH / 2} L${next.x - 2},${next.y + boxH / 2}`}
                      />
                    </circle>
                  )}
                </g>
              );
            })}

            {/* 5 stage 박스 */}
            {boxes.map((b) => {
              const active = activeIds.includes(b.id);
              const fill = active ? '#7e22ce' : '#f5f3ff';
              const stroke = active ? '#581c87' : '#c4b5fd';
              const labelColor = active ? 'white' : '#6b21a8';
              const subColor = active ? '#e9d5ff' : '#a78bfa';
              return (
                <g key={b.id} className="transition-all duration-700">
                  {active && (
                    <rect
                      x={b.x - 4}
                      y={b.y - 4}
                      width={boxW + 8}
                      height={boxH + 8}
                      rx="10"
                      fill="none"
                      stroke="#a855f7"
                      strokeWidth="2"
                      opacity="0.5"
                    >
                      <animate attributeName="opacity" from="0.7" to="0.1" dur="1.4s" repeatCount="indefinite" />
                    </rect>
                  )}
                  <rect
                    x={b.x}
                    y={b.y}
                    width={boxW}
                    height={boxH}
                    rx="8"
                    fill={fill}
                    stroke={stroke}
                    strokeWidth="2"
                  />
                  <text
                    x={b.x + boxW / 2}
                    y={b.y + 22}
                    textAnchor="middle"
                    fontSize="16"
                    fill={labelColor}
                  >
                    {b.icon}
                  </text>
                  <text
                    x={b.x + boxW / 2}
                    y={b.y + 42}
                    textAnchor="middle"
                    fontSize="12"
                    fontWeight="bold"
                    fill={labelColor}
                    fontFamily="monospace"
                  >
                    {b.label}
                  </text>
                  <text
                    x={b.x + boxW / 2}
                    y={b.y + 58}
                    textAnchor="middle"
                    fontSize="9"
                    fill={subColor}
                    fontFamily="monospace"
                  >
                    {b.sub}
                  </text>
                </g>
              );
            })}
          </svg>
          <div className="text-[9px] text-purple-700 mt-1 text-center font-mono">
            왼쪽에서 오른쪽으로 흐르는 단방향 파이프라인 · 활성 단계와 화살표가 강조됨
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Sample 데이터 박스 (input → model → output)
    // ─────────────────────────────────────────────────────
    function SamplePane({ sample, index, query }) {
      return (
        <div className="rounded-lg bg-white border-2 border-purple-200 p-3 space-y-2">
          <div className="text-[11px] font-bold text-purple-800 flex items-center gap-1">
            <span>🧪</span>
            <span>현재 단계 데이터 흐름</span>
          </div>

          {sample && (
            <div className="space-y-1.5">
              <div className="rounded bg-slate-50 border border-slate-200 px-2 py-1.5">
                <div className="text-[9px] uppercase tracking-wider text-slate-500 font-bold">input</div>
                <div className="text-[11px] font-mono text-slate-800 break-all">{sample.input}</div>
              </div>
              <div className="text-center text-[10px] text-purple-600 font-mono">
                ↓ {sample.model} ↓
              </div>
              <div className="rounded bg-purple-50 border border-purple-300 px-2 py-1.5">
                <div className="text-[9px] uppercase tracking-wider text-purple-700 font-bold">output</div>
                <div className="text-[11px] font-mono text-purple-900 break-all">{sample.output}</div>
              </div>
            </div>
          )}

          {/* 인덱스 상태 */}
          {index && (
            <div className="rounded bg-amber-50 border border-amber-200 px-2 py-1.5">
              <div className="text-[9px] uppercase tracking-wider text-amber-700 font-bold">index built</div>
              <div className="text-[11px] font-mono text-amber-900">
                {index.type} · {index.layers} layers · M={index.mEdges} · {index.buildTime}
              </div>
            </div>
          )}

          {/* 쿼리 결과 */}
          {query && (
            <div className="rounded bg-emerald-50 border border-emerald-300 px-2 py-1.5">
              <div className="text-[9px] uppercase tracking-wider text-emerald-700 font-bold flex items-center gap-1">
                <span>top-k results</span>
                {query.filtered && (
                  <span className="bg-emerald-600 text-white px-1.5 rounded text-[8px] font-mono">
                    filtered
                  </span>
                )}
              </div>
              <div className="text-[10px] font-mono text-emerald-900 mt-1 space-y-0.5">
                <div className="text-[9px] text-emerald-700">q: {query.q}</div>
                {query.hits.map((h, i) => (
                  <div key={h.id} className="flex gap-2 items-baseline">
                    <span className="text-emerald-700">#{i + 1}</span>
                    <span className="font-bold">{h.id}</span>
                    <span className="text-emerald-600">{h.score.toFixed(2)}</span>
                    <span className="text-slate-700 truncate">{h.text}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 흐름 다이어그램 + 샘플 박스
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🏭 벡터 DB — 5단계 조립 라인</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <FlowDiagram activeIds={step.active} arrows={step.arrows} />
            <SamplePane
              sample={step.sample}
              index={step.index}
              query={step.query}
            />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm border-2" style={{ borderColor: '#c4b5fd', background: '#f5f3ff' }}></span>
              비활성 stage
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm" style={{ background: '#7e22ce' }}></span>
              활성 stage
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-0.5" style={{ background: '#7e22ce' }}></span>
              활성 화살표
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2.5 h-2.5 rounded-full bg-purple-400"></span>
              데이터 패킷
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + 라인 번호
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-purple-500/15 border-l-2 border-purple-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-purple-700 hover:text-purple-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. 벡터 DB 기초 &gt; Chapter 2. 아키텍처</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">벡터 DB 아키텍처 전체 지도</h1>
                  <p className="text-sm text-slate-500 mt-0.5">Ingest → Storage → Index → Query → Hybrid 5단계 파이프라인</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-purple-50 border-2 border-purple-300 rounded-xl p-3 text-sm text-purple-900">
                💡 다음(I-2-2)에서는 <strong>벡터 DB 종류와 분류</strong>(Chroma, Qdrant, Weaviate, Pinecone, Milvus)를 비교한다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-purple-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-purple-600 text-white hover:bg-purple-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-1-2.html" className="text-slate-500 hover:text-slate-700">&larr; I-1-2 벡터 DB 핵심 개념</a>
              <a href="./I-2-2.html" className="text-purple-700 hover:text-purple-900 font-medium">I-2-2 벡터 DB 종류와 분류 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
