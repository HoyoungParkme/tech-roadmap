<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB — I-2-1. 벡터 DB 아키텍처 전체 지도</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const COMPONENTS = [
      { id: 'embed', icon: '🔄', label: 'Embedding Engine', color: 'bg-blue-500', lightBg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-800', desc: '텍스트/이미지를 벡터로 변환' },
      { id: 'storage', icon: '💾', label: 'Storage Engine', color: 'bg-slate-500', lightBg: 'bg-slate-50', border: 'border-slate-300', text: 'text-slate-800', desc: '벡터와 원본 데이터를 저장' },
      { id: 'index', icon: '🗂️', label: 'Index Engine', color: 'bg-amber-500', lightBg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-800', desc: '벡터를 인덱싱해 빠른 검색 준비' },
      { id: 'query', icon: '🔍', label: 'Query Engine', color: 'bg-emerald-500', lightBg: 'bg-emerald-50', border: 'border-emerald-200', text: 'text-emerald-800', desc: '유사도 계산 + 결과 랭킹' },
      { id: 'meta', icon: '🏷️', label: 'Metadata Store', color: 'bg-purple-500', lightBg: 'bg-purple-50', border: 'border-purple-200', text: 'text-purple-800', desc: '메타데이터 저장 + 필터링' },
    ];

    const STEPS = [
      {
        desc: "벡터 DB 내부를 공장 조립 라인에 비유합니다. 원료(텍스트)가 들어와서 완제품(검색 결과)이 나가기까지, 5개의 엔진이 협력합니다.",
        active: [],
        flow: null,
      },
      {
        desc: "첫 번째 엔진: Embedding Engine. 텍스트나 이미지를 받아 고차원 벡터(숫자 배열)로 변환합니다. OpenAI, Sentence-BERT 등의 모델을 사용합니다.",
        active: ['embed'],
        flow: { from: '원본 텍스트', arrow: 'Embedding Engine', to: 'vector [0.12, 0.85, ...]' },
      },
      {
        desc: "두 번째 엔진: Storage Engine. 변환된 벡터와 원본 데이터를 디스크/메모리에 저장합니다. 세 번째: Metadata Store. 벡터와 함께 메타데이터(날짜, 카테고리 등)도 저장합니다.",
        active: ['storage', 'meta'],
        flow: { from: 'vector + 원본', arrow: 'Storage + Metadata', to: '영속 저장소 (디스크/메모리)' },
      },
      {
        desc: "네 번째 엔진: Index Engine. 저장된 벡터를 인덱싱합니다. IVF, HNSW, PQ 등의 알고리즘으로 벡터를 분류해 검색 속도를 수천 배 높입니다.",
        active: ['index'],
        flow: { from: '저장된 벡터들', arrow: 'Index Engine (IVF, HNSW, PQ)', to: '인덱스 구조 (빠른 검색 준비 완료)' },
      },
      {
        desc: "다섯 번째 엔진: Query Engine. 쿼리 벡터를 받아 인덱스에서 유사한 벡터를 찾고, 메타데이터 필터를 적용한 뒤, 유사도 순으로 정렬해 반환합니다.",
        active: ['query'],
        flow: { from: '쿼리 벡터 + 필터 조건', arrow: 'Query Engine', to: 'Top-k 결과 (유사도 순)' },
      },
      {
        desc: "전체 데이터 흐름을 정리합니다. 입력 → Embedding → Storage/Metadata → Index 빌드. 검색 시 → Query → Index 탐색 → Metadata 필터 → 결과 반환. 이것이 벡터 DB의 아키텍처입니다.",
        active: ['embed', 'storage', 'meta', 'index', 'query'],
        flow: null,
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const isActive = (id) => s.active.includes(id);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-cyan-700 hover:text-cyan-900 font-medium">
                <span>&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. 벡터 DB 기초 &gt; Chapter 2. 벡터 DB 아키텍처</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-2-1. 벡터 DB 아키텍처 전체 지도</h1>
                </div>
              </div>
              <p className="text-slate-600">벡터 DB 내부는 <b>5개의 엔진</b>이 협력하는 공장입니다. 원료(텍스트)가 들어와서 완제품(검색 결과)이 나갈 때까지의 조립 라인을 살펴봅니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-cyan-700 border-cyan-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-cyan-200">벡터 DB 내부 아키텍처</h3>
                <span className="text-xs text-cyan-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="space-y-2">
                {COMPONENTS.map((comp) => (
                  <div key={comp.id} className={`flex items-center gap-4 p-4 rounded-xl border-2 transition-all duration-500 ${
                    isActive(comp.id) ? `${comp.lightBg} ${comp.border} scale-[1.02] shadow-md` : 'bg-white border-slate-100 opacity-40'
                  }`}>
                    <div className={`w-11 h-11 ${comp.color} text-white rounded-xl flex items-center justify-center text-xl shrink-0`}>{comp.icon}</div>
                    <div className="min-w-0">
                      <div className={`font-bold text-sm ${isActive(comp.id) ? comp.text : 'text-slate-500'}`}>{comp.label}</div>
                      <div className="text-xs text-slate-500 truncate">{comp.desc}</div>
                    </div>
                  </div>
                ))}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {s.flow ? (
                  <>
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">데이터 흐름</div>
                    <div className="space-y-3">
                      <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-sm text-blue-800 font-mono">{s.flow.from}</div>
                      <div className="text-center text-slate-400 text-xs font-bold">↓ {s.flow.arrow}</div>
                      <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-sm text-emerald-800 font-mono">{s.flow.to}</div>
                    </div>
                  </>
                ) : s.active.length === 0 ? (
                  <div className="flex flex-col items-center justify-center h-full text-center">
                    <div className="text-4xl mb-3">🏭</div>
                    <div className="font-bold text-slate-700 mb-2">벡터 DB = 5개 엔진의 공장</div>
                    <div className="text-sm text-slate-500">각 단계를 하나씩 살펴봅니다</div>
                  </div>
                ) : (
                  <>
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">전체 아키텍처 흐름</div>
                    <div className="space-y-2">
                      {[
                        { label: '1. 입력', desc: '텍스트/이미지 → Embedding Engine → 벡터', color: 'bg-blue-50 border-blue-200 text-blue-800' },
                        { label: '2. 저장', desc: '벡터 + 원본 → Storage Engine + Metadata Store', color: 'bg-slate-50 border-slate-300 text-slate-800' },
                        { label: '3. 인덱싱', desc: '저장된 벡터 → Index Engine → 인덱스 구조', color: 'bg-amber-50 border-amber-200 text-amber-800' },
                        { label: '4. 검색', desc: '쿼리 벡터 → Query Engine → 인덱스 탐색', color: 'bg-emerald-50 border-emerald-200 text-emerald-800' },
                        { label: '5. 결과', desc: 'Metadata 필터 → 유사도 순 정렬 → Top-k 반환', color: 'bg-purple-50 border-purple-200 text-purple-800' },
                      ].map((item, i) => (
                        <div key={i} className={`p-3 rounded-lg border ${item.color}`}>
                          <span className="font-bold text-sm">{item.label}</span>
                          <span className="text-xs ml-2">{item.desc}</span>
                        </div>
                      ))}
                    </div>
                  </>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Storage Engine', 'Index Engine', 'Query Engine', 'Metadata', 'Pipeline'].map(kw => (
                <span key={kw} className="bg-cyan-50 text-cyan-700 px-3 py-1 rounded-full text-sm font-medium border border-cyan-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-cyan-600 hover:bg-cyan-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./I-1-2.html" className="text-cyan-600 hover:text-cyan-800 font-medium">&larr; I-1-2. 벡터 DB 핵심 개념</a>
              <a href="./I-2-2.html" className="text-cyan-600 hover:text-cyan-800 font-medium">I-2-2. 벡터 DB 종류와 분류 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
