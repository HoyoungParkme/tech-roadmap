  <!--
    II-1-1. FAISS란 무엇인가 — Facebook AI Similarity Search 라이브러리, 인메모리
    학습 목표: pip 한 줄로 설치되는 인메모리 벡터 검색 라이브러리 FAISS의 기본
              사용법과 한계를 5단계로 이해한다.
    핵심: 인덱스 생성(Flat) → add → search → 메모리 사용량 → 영속성/메타데이터 한계
    패턴: fastapi v1 — 좌(LiveDataPane: FAISS 인덱스 박스 + 메모리 게이지)
                    / 우(VSCode CodeViewer)
    색상: vector-db purple
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의
    //   indexBox  : FAISS 인덱스 박스 상태 { created, dim, ntotal, type }
    //   query     : 검색 입력 { active, vec }
    //   results   : top-k 결과 [{ rank, idx, dist }]
    //   memory    : 메모리 게이지 { used_gb, total_gb, vectors, dim, bytes_per }
    //   limits    : 한계 표시 [{ icon, label, hit }]
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. 설치 — pip install faiss-cpu 한 줄',
        desc: 'FAISS(Facebook AI Similarity Search)는 Meta가 만든 인메모리 벡터 검색 라이브러리다. 서버가 아니라 Python 패키지 — pip install faiss-cpu 한 줄이면 끝. C++ 코어 + Python 바인딩 구조라 단일 머신에서 매우 빠르다. GPU 가속이 필요하면 faiss-gpu를 쓴다.',
        indexBox: { created: false, dim: null, ntotal: 0, type: null },
        query: { active: false, vec: null },
        results: [],
        memory: { used_gb: 0, total_gb: 16, vectors: 0, dim: 0, bytes_per: 0 },
        limits: [],
        code: {

            '# 1) 서버가 아니다 — 그냥 Python 패키지',
            '#    Pinecone/Qdrant 같은 별도 서버 띄울 필요 없음',
            '#    프로세스 안에서 직접 호출',
            '#',
            '# 2) C++ 코어 + Python 바인딩',
            '#    내부는 C++/AVX 최적화 → 매우 빠름',
            '#    Python에서 호출만 하면 됨',
            '#',
            '# 3) 의존성',
            '#    numpy 만 있으면 됨 (벡터는 float32 ndarray)',
            '#',
            '# 4) Meta가 2017년 오픈소스로 공개',
            '#    Instagram/Facebook 추천 시스템 백본',
          ],

      {

        desc: '가장 단순한 인덱스 IndexFlatL2를 생성한다. Flat은 "모든 벡터를 그대로 저장"하는 brute-force 인덱스 — 100% 정확하지만 느리다. 768차원 벡터 1만 개를 add()로 넣는다. ntotal 카운터가 0 → 10,000으로 올라간다. 이 시점에 메모리에 30MB 정도가 적재된다.',

        query: { active: false, vec: null },
        results: [],
        memory: { used_gb: 0.029, total_gb: 16, vectors: 10000, dim: 768, bytes_per: 4 },
        limits: [],
        code: {
          lang: 'python',
          filename: 'build-index.py',
          lines: [
            '"""FAISS 인덱스 생성 + 벡터 적재 — 가장 단순한 Flat 패턴."""',
            'import numpy as np',
            'import faiss',
            '',
            '# 1) 차원 결정 — 임베딩 모델에 맞춰서',
            '#    OpenAI text-embedding-3-small = 1536',
            '#    sentence-transformers all-mpnet = 768',
            'dim = 768',
            '',
            '# 2) Flat 인덱스 생성 (L2 거리 = 유클리드)',
            '#    Flat = 전수 검색, 가장 단순/정확',
            'index = faiss.IndexFlatL2(dim)',
            'print(index.is_trained)   # True (Flat은 학습 불필요)',
            'print(index.ntotal)       # 0 (아직 비어있음)',
            '',
            '# 3) 1만 개 더미 벡터 — float32 필수',
            '#    실제로는 임베딩 모델에서 받은 벡터를 넣음',
            'np.random.seed(42)',
            'vectors = np.random.random((10_000, dim)).astype("float32")',
            '',
            '# 4) add() — 인덱스에 벡터 적재',
            '#    내부적으로 행렬 그대로 메모리에 복사',
            'index.add(vectors)',
            'print(index.ntotal)       # 10000',
            '',
            '# 메모리 사용량 확인',
            '#   10,000 × 768 × 4 byte ≈ 29.3 MB',
            'print(f"메모리: {10_000 * 768 * 4 / 1024**2:.1f} MB")',
          ],
          highlight: [8, 12, 13, 14, 19, 22, 23],
        },
      },
      {
        title: 'Step 3. 검색 — search()로 top-5 → distance + ids 반환',
        desc: '쿼리 벡터 1개를 만들고 index.search(query, k=5)를 호출한다. 반환은 (D, I) 튜플 — D는 거리 행렬, I는 인덱스 행렬이다. shape는 둘 다 (n_queries, k)이다. 거리가 작을수록 유사하다. FAISS는 ID만 반환하므로 원본 문서 매핑은 직접 관리해야 한다.',
        indexBox: { created: true, dim: 768, ntotal: 10000, type: 'IndexFlatL2', searching: true },
        query: { active: true, vec: 'q (1×768 float32)' },
        results: [
          { rank: 1, idx: 4283, dist: 0.0421 },
          { rank: 2, idx:  127, dist: 0.0588 },
          { rank: 3, idx: 7891, dist: 0.0612 },
          { rank: 4, idx: 3024, dist: 0.0734 },
          { rank: 5, idx: 9156, dist: 0.0801 },
        ],
        memory: { used_gb: 0.029, total_gb: 16, vectors: 10000, dim: 768, bytes_per: 4 },
        limits: [],
        code: {
          lang: 'python',
          filename: 'search.py',
          lines: [
            '"""FAISS top-k 검색 — query 벡터 → (distances, indices) 반환."""',
            'import numpy as np',
            'import faiss',
            '',
            '# index는 Step 2에서 만든 IndexFlatL2 (10,000개 적재)',
            '# 실제로는 디스크 로드 또는 동일 프로세스에서 재사용',
            '',
            '# 1) 쿼리 벡터 — 같은 임베딩 모델로 만든 1×768',
            '#    예: "강아지 훈련법" 문장 임베딩',
            'query = np.random.random((1, 768)).astype("float32")',
            '',
            '# 2) top-5 검색 — 가장 가까운 5개',
            'k = 5',
            'D, I = index.search(query, k)',
            '',
            '# D: 거리 행렬 (1, 5) — 작을수록 유사',
            '# I: 인덱스 행렬 (1, 5) — index.add 때 순서대로 매겨진 ID',
            'print("distances:", D)',
            '#  [[0.0421 0.0588 0.0612 0.0734 0.0801]]',
            'print("indices:  ", I)',
            '#  [[4283  127 7891 3024 9156]]',
            '',
            '# 3) 원본 문서로 매핑 — FAISS는 ID만 반환!',
            '#    docs 리스트는 직접 관리해야 함',
            'docs = load_documents()  # 사용자가 별도 보관',
            'for rank, (idx, dist) in enumerate(zip(I[0], D[0]), 1):',
            '    print(f"{rank}위 [idx={idx}] dist={dist:.4f}")',
            '    print(f"    {docs[idx][:50]}...")',
            '',
            '# 핵심: FAISS = 벡터 → ID 매핑 검색기',
            '#       원본 텍스트/메타데이터 저장은 사용자 책임',
          ],
          highlight: [10, 13, 14, 17, 18, 19, 20, 25, 26, 27, 30],
        },
      },
      {
        title: 'Step 4. 메모리 사용량 — 1M × 768d × float32 = ~3GB',
        desc: 'Flat 인덱스의 메모리 = N × d × 4 byte. 100만 벡터 × 768차원 × float32 = 약 2.93 GB. 1억 개면 293 GB라 단일 노드에 안 들어간다. 그래서 FAISS는 IVF/PQ 같은 압축 인덱스를 제공한다(II-1-2에서 다룸). 인메모리이므로 프로세스 종료 시 모든 데이터가 사라진다.',
        indexBox: { created: true, dim: 768, ntotal: 1000000, type: 'IndexFlatL2', big: true },
        query: { active: false, vec: null },
        results: [],
        memory: { used_gb: 2.93, total_gb: 16, vectors: 1000000, dim: 768, bytes_per: 4 },
        limits: [],
        code: {
          lang: 'python',
          filename: 'memory-calc.py',
          lines: [
            '"""FAISS Flat 인덱스 메모리 계산 — 단순한 곱셈 공식."""',
            '',
            '# ─────────────────────────────────────────',
            '# 메모리 공식 (Flat 인덱스)',
            '#   total_bytes = n_vectors × dim × bytes_per_value',
            '#   float32 = 4 byte / float16 = 2 byte',
            '# ─────────────────────────────────────────',
            '',
            'def flat_memory(n: int, dim: int, dtype: str = "float32") -> float:',
            '    """Flat 인덱스의 메모리(GB)를 계산한다."""',
            '    bytes_per = 4 if dtype == "float32" else 2',
            '    total_bytes = n * dim * bytes_per',
            '    return total_bytes / 1024**3   # GB 환산',
            '',
            '# 시나리오별 비교',
            'for n, dim in [(10_000, 768),',
            '               (100_000, 768),',
            '               (1_000_000, 768),     # ← 1M = 약 2.93 GB',
            '               (10_000_000, 768),    # ← 10M = 약 29.3 GB',
            '               (100_000_000, 768)]:  # ← 100M = 약 293 GB!',
            '    gb = flat_memory(n, dim)',
            '    print(f"N={n:>11,} → {gb:>7.2f} GB")',
            '',
            '# 출력:',
            '# N=     10,000 →    0.03 GB',
            '# N=    100,000 →    0.29 GB',
            '# N=  1,000,000 →    2.93 GB   ← 단일 노드 OK',
            '# N= 10,000,000 →   29.30 GB   ← RAM 이슈 시작',
            '# N=100,000,000 →  293.00 GB   ← 단일 노드 불가능',
            '',
            '# 해결책 (다음 자료에서 다룸):',
            '#   IVF   — 클러스터링 후 일부만 검색 (속도)',
            '#   PQ    — 벡터 압축 (메모리 1/8 ~ 1/32)',
            '#   IVFPQ — 두 기법 결합 (대규모 표준)',
          ],
          highlight: [9, 10, 11, 12, 13, 18, 19, 20, 27, 28, 29, 32, 33, 34],
        },
      },
      {
        title: 'Step 5. 한계 — 영속성 없음, 메타데이터 없음',
        desc: 'FAISS의 두 가지 큰 한계: (1) 영속성 없음 — 인메모리이므로 프로세스 종료 시 사라진다. faiss.write_index()로 디스크 저장은 가능하지만 동기화/락은 직접 관리해야 한다. (2) 메타데이터 없음 — ID만 반환하고, "user_id=42 AND date>2024 AND vector~q" 같은 필터링이 불가능하다. 이 두 한계를 해결한 것이 다음 자료에서 다룰 Pinecone/Qdrant 같은 벡터 DB 서버다.',
        indexBox: { created: true, dim: 768, ntotal: 1000000, type: 'IndexFlatL2', big: true, dying: true },
        query: { active: false, vec: null },
        results: [],
        memory: { used_gb: 2.93, total_gb: 16, vectors: 1000000, dim: 768, bytes_per: 4 },
        limits: [
          { icon: '💾', label: '영속성 없음 — 프로세스 종료 시 데이터 휘발', hit: true },
          { icon: '🏷️', label: '메타데이터 없음 — ID만 반환, 필터 검색 불가', hit: true },
          { icon: '🔄', label: 'CRUD 제한 — update/delete 비효율', hit: true },
          { icon: '🌐', label: 'REST API 없음 — 단일 프로세스 안에서만', hit: true },
        ],
        code: {
          lang: 'python',
          filename: 'limits-and-next.py',
          lines: [
            '"""FAISS의 두 핵심 한계와 다음 단계 — 벡터 DB 서버."""',
            'import faiss',
            '',
            '# ─────────────────────────────────────────',
            '# 한계 1: 영속성(persistence) 없음',
            '# ─────────────────────────────────────────',
            '#   인메모리 라이브러리 → 프로세스 종료 시 모든 벡터 휘발',
            '#   다음 호출에 다시 add()로 적재해야 함',
            '',
            '# 임시 보완책: write_index / read_index',
            'faiss.write_index(index, "my_index.faiss")  # 디스크 저장',
            'index = faiss.read_index("my_index.faiss")  # 다시 로드',
            '',
            '#   문제점:',
            '#     • 동기화/락 직접 관리',
            '#     • 멀티 프로세스 동시 쓰기 불가',
            '#     • 백업/복제는 OS 파일 복사로',
            '',
            '# ─────────────────────────────────────────',
            '# 한계 2: 메타데이터(metadata) 필터링 없음',
            '# ─────────────────────────────────────────',
            '#   FAISS가 반환하는 것: 벡터 ID + 거리 — 그게 끝',
            '#',
            '# 하고 싶은 것 (벡터 DB 서버는 가능):',
            '#   results = db.search(',
            '#       query_vec,',
            '#       k=10,',
            '#       filter={"user_id": 42, "date": {"$gt": "2024-01"}}',
            '#   )',
            '#',
            '# FAISS로는 불가 → 검색 후 코드에서 직접 필터링',
            '#   1) FAISS로 top-1000 가져오고',
            '#   2) Python에서 메타데이터 조건으로 후처리',
            '#   3) k=10이 채워질 때까지 추리기 (비효율적)',
            '',
            '# ─────────────────────────────────────────',
            '# 다음 단계 — 벡터 DB 서버',
            '# ─────────────────────────────────────────',
            '#   Pinecone   — 완전 매니지드 SaaS',
            '#   Qdrant     — 오픈소스 + Rust 코어',
            '#   Weaviate   — GraphQL + 메타데이터 강력',
            '#   Milvus     — 대규모 클러스터 분산',
            '#',
            '#   공통점: FAISS 위에 영속성 + 메타데이터 + REST API',
          ],
          highlight: [11, 12, 15, 16, 17, 22, 26, 27, 28, 29, 33, 34, 35, 41, 42, 43, 44],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // FAISS 인덱스 박스 시각화
    // ─────────────────────────────────────────────────────
    function IndexBox({ indexBox, query }) {
      const { created, dim, ntotal, type, searching, big, dying } = indexBox;
      const w = 380;
      const h = 200;
      // ntotal 카운터를 시각적 막대 비율(최대 1M)
      const fillPct = created ? Math.min(100, Math.log10((ntotal || 1) + 1) / 6 * 100) : 0;

      return (
        <div className="rounded-lg bg-gradient-to-br from-purple-50 to-purple-100 border border-purple-200 p-2">
          <div className="text-[11px] font-bold text-purple-800 mb-1 flex items-center gap-1">
            <span>🗄️</span>
            <span>FAISS 인덱스 (인메모리 박스)</span>
          </div>

          <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
            <defs>
              <pattern id="grid-faiss" width="30" height="30" patternUnits="userSpaceOnUse">
                <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e9d5ff" strokeWidth="0.5" />
              </pattern>
              <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#a78bfa" />
                <stop offset="100%" stopColor="#7c3aed" />
              </linearGradient>
              <marker id="arrow-q" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
                <path d="M0,0 L10,5 L0,10 Z" fill="#dc2626" />
              </marker>
            </defs>
            <rect width={w} height={h} fill="url(#grid-faiss)" />

            {/* 인덱스 박스 */}
            {created ? (
              <g className="transition-all duration-700">
                {/* 박스 본체 */}
                <rect
                  x={120} y={40} width={180} height={120}
                  fill="url(#boxGrad)"
                  stroke={dying ? '#dc2626' : '#5b21b6'}
                  strokeWidth={dying ? 3 : 2}
                  strokeDasharray={dying ? '6 4' : '0'}
                  rx={8}
                  opacity={dying ? 0.5 : 1}
                />
                {/* 박스 라벨 */}
                <text x={210} y={62} textAnchor="middle" fontSize="11" fontWeight="bold" fill="white" fontFamily="monospace">
                  {type || 'FAISS'}
                </text>
                <text x={210} y={78} textAnchor="middle" fontSize="9" fill="#ddd6fe" fontFamily="monospace">
                  dim = {dim}
                </text>

                {/* ntotal 카운터 */}
                <rect x={140} y={92} width={140} height={36} fill="#1e1b4b" rx={4} opacity="0.85" />
                <text x={210} y={108} textAnchor="middle" fontSize="9" fill="#c4b5fd" fontFamily="monospace">
                  ntotal
                </text>
                <text x={210} y={123} textAnchor="middle" fontSize="14" fontWeight="bold" fill="#fde047" fontFamily="monospace">
                  {ntotal != null ? ntotal.toLocaleString() : '0'}
                </text>

                {/* 적재 비율 막대 */}
                <rect x={140} y={138} width={140} height={8} fill="#1e1b4b" rx={2} opacity="0.5" />
                <rect x={140} y={138} width={140 * fillPct / 100} height={8} fill="#fde047" rx={2}>
                  <animate attributeName="width" from="0" to={140 * fillPct / 100} dur="0.8s" fill="freeze" />
                </rect>
                <text x={210} y={156} textAnchor="middle" fontSize="8" fill="#7c3aed" fontFamily="monospace">
                  {big ? '⚠ 대규모 — RAM 압박' : '적재 OK'}
                </text>

                {/* dying 표시 */}
                {dying && (
                  <text x={210} y={32} textAnchor="middle" fontSize="11" fontWeight="bold" fill="#dc2626" fontFamily="monospace">
                    💨 프로세스 종료 시 휘발
                  </text>
                )}
              </g>
            ) : (
              <g>
                <rect x={120} y={40} width={180} height={120} fill="white" stroke="#cbd5e1" strokeWidth="2" strokeDasharray="6 4" rx={8} />
                <text x={210} y={105} textAnchor="middle" fontSize="11" fill="#94a3b8" fontFamily="monospace">
                  (아직 인덱스 없음)
                </text>
                <text x={210} y={122} textAnchor="middle" fontSize="9" fill="#94a3b8" fontFamily="monospace">
                  Step 2에서 생성
                </text>
              </g>
            )}

            {/* 쿼리 화살표 */}
            {query && query.active && (
              <g className="transition-all duration-700">
                <rect x={20} y={85} width={86} height={30} fill="#dc2626" rx={4}>
                  <animate attributeName="opacity" from="0.4" to="1" dur="1.2s" repeatCount="indefinite" />
                </rect>
                <text x={63} y={97} textAnchor="middle" fontSize="9" fontWeight="bold" fill="white" fontFamily="monospace">
                  query
                </text>
                <text x={63} y={109} textAnchor="middle" fontSize="7" fill="#fecaca" fontFamily="monospace">
                  {query.vec}
                </text>
                <line x1={108} y1={100} x2={120} y2={100} stroke="#dc2626" strokeWidth={2.5} markerEnd="url(#arrow-q)" />
                {searching && (
                  <text x={113} y={92} fontSize="8" fill="#dc2626" fontFamily="monospace">search()</text>
                )}
              </g>
            )}
          </svg>

          <div className="text-[9px] text-purple-700 mt-1 text-center font-mono">
            {created ? `${type} · ${ntotal?.toLocaleString() || 0} vectors × ${dim}d` : 'pip install faiss-cpu 후 IndexFlatL2(d) 호출'}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // top-k 결과 박스
    // ─────────────────────────────────────────────────────
    function ResultsBox({ results }) {
      return (
        <div className="rounded-lg bg-gradient-to-br from-purple-50 to-purple-100 border border-purple-200 p-2">
          <div className="text-[11px] font-bold text-purple-800 mb-1 flex items-center gap-1">
            <span>🎯</span>
            <span>top-k 검색 결과 (D, I)</span>
          </div>
          {results && results.length > 0 ? (
            <div className="space-y-1">
              {results.map((r) => (
                <div key={r.rank} className="flex items-center justify-between bg-white rounded border border-purple-200 px-2 py-1.5 text-[11px] font-mono">
                  <div className="flex items-center gap-2">
                    <span className="w-5 h-5 bg-purple-600 text-white rounded-full flex items-center justify-center text-[10px] font-bold">{r.rank}</span>
                    <span className="text-purple-900">idx = {r.idx}</span>
                  </div>
                  <span className="text-purple-700 font-semibold">dist = {r.dist.toFixed(4)}</span>
                </div>
              ))}
              <div className="text-[9px] text-purple-700 mt-1 text-center font-mono">
                D, I = index.search(q, k=5) — 거리 작을수록 유사
              </div>
            </div>
          ) : (
            <div className="bg-white/60 rounded border border-purple-200 px-3 py-6 text-center">
              <div className="text-[11px] text-purple-400 font-mono">(아직 검색 안 함)</div>
              <div className="text-[9px] text-purple-400 font-mono mt-1">Step 3에서 search() 호출</div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 메모리 게이지
    // ─────────────────────────────────────────────────────
    function MemoryGauge({ memory }) {
      const { used_gb, total_gb, vectors, dim, bytes_per } = memory;
      const pct = total_gb > 0 ? Math.min(100, (used_gb / total_gb) * 100) : 0;
      const danger = pct > 80;
      const warn = pct > 50;

      const barColor = danger ? '#dc2626' : (warn ? '#f59e0b' : '#7c3aed');

      return (
        <div className="rounded-lg bg-gradient-to-br from-purple-50 to-purple-100 border border-purple-200 p-2">
          <div className="text-[11px] font-bold text-purple-800 mb-1 flex items-center gap-1">
            <span>📏</span>
            <span>메모리 사용량 ( N × d × {bytes_per || 4}byte )</span>
          </div>
          <div className="bg-white rounded border border-purple-200 p-2">
            <div className="flex justify-between text-[10px] font-mono text-purple-900 mb-1">
              <span>0 GB</span>
              <span className="font-bold">{used_gb.toFixed(3)} GB / {total_gb} GB</span>
              <span>{total_gb} GB</span>
            </div>
            <div className="w-full h-5 bg-slate-100 rounded overflow-hidden border border-slate-200">
              <div
                className="h-full transition-all duration-700 flex items-center justify-end pr-2"
                style={{ width: `${pct}%`, background: barColor }}
              >
                {pct > 14 && (
                  <span className="text-[9px] font-bold text-white font-mono">{pct.toFixed(1)}%</span>
                )}
              </div>
            </div>
            <div className="grid grid-cols-3 gap-1 mt-2 text-[9px] font-mono">
              <div className="bg-purple-50 border border-purple-200 rounded px-1.5 py-1 text-center">
                <div className="text-purple-500">N</div>
                <div className="font-bold text-purple-900">{vectors > 0 ? vectors.toLocaleString() : '—'}</div>
              </div>
              <div className="bg-purple-50 border border-purple-200 rounded px-1.5 py-1 text-center">
                <div className="text-purple-500">dim</div>
                <div className="font-bold text-purple-900">{dim || '—'}</div>
              </div>
              <div className="bg-purple-50 border border-purple-200 rounded px-1.5 py-1 text-center">
                <div className="text-purple-500">dtype</div>
                <div className="font-bold text-purple-900">{bytes_per === 4 ? 'float32' : (bytes_per === 2 ? 'float16' : '—')}</div>
              </div>
            </div>
            {danger && (
              <div className="mt-2 text-[10px] text-red-700 font-mono bg-red-50 border border-red-300 rounded px-2 py-1">
                ⚠ 단일 노드 RAM 한계 근접 — IVF/PQ 압축 인덱스 고려
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 한계 표시 박스 (Step 5)
    // ─────────────────────────────────────────────────────
    function LimitsBox({ limits }) {
      if (!limits || limits.length === 0) return null;
      return (
        <div className="rounded-lg bg-red-50 border-2 border-red-300 p-3">
          <div className="text-[11px] font-bold text-red-800 mb-2 flex items-center gap-1">
            <span>🚧</span>
            <span>FAISS 한계 — 다음 자료(벡터 DB 서버)가 보완</span>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
            {limits.map((l, i) => (
              <div key={i} className="flex items-start gap-2 bg-white rounded border border-red-200 px-2 py-1.5">
                <span className="text-base leading-none">{l.icon}</span>
                <span className="text-[11px] text-red-900 font-medium leading-tight">{l.label}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 인덱스 박스 + 결과 + 메모리 게이지 + 한계
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🧰 FAISS 인메모리 시뮬레이션</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 인덱스 박스 (좌) + 결과 (우) */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mb-3">
            <IndexBox indexBox={step.indexBox} query={step.query} />
            <ResultsBox results={step.results} />
          </div>

          {/* 메모리 게이지 */}
          <div className="mb-3">
            <MemoryGauge memory={step.memory} />
          </div>

          {/* 한계 (Step 5) */}
          <LimitsBox limits={step.limits} />

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-3 h-3 rounded" style={{ background: 'linear-gradient(180deg,#a78bfa,#7c3aed)' }}></span>
              인덱스 적재
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-3 rounded bg-red-500"></span>
              query/한계
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-3 rounded bg-yellow-400"></span>
              ntotal 카운터
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-3 h-3 rounded bg-slate-300"></span>
              미사용
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + 라인 번호
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 파일 탭 (5개 step의 파일명 표시) */}
          <div className="bg-[#21252b] px-3 py-1 flex items-center gap-1 border-b border-slate-700 overflow-x-auto">
            {STEPS.map((s, i) => {
              const active = i === stepIdx;
              return (
                <span
                  key={i}
                  className={`text-[10px] px-2 py-0.5 rounded-sm font-mono whitespace-nowrap ${
                    active
                      ? 'bg-[#282c34] text-purple-300 border-t-2 border-purple-400'
                      : 'text-slate-500'
                  }`}
                >
                  {s.code.filename}
                </span>
              );
            })}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-purple-500/15 border-l-2 border-purple-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 컨트롤 + 자동재생 + 키보드
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-purple-700 hover:text-purple-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. FAISS &gt; Chapter 1. FAISS 기초</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">FAISS란 무엇인가</h1>
                  <p className="text-sm text-slate-500 mt-0.5">Facebook AI Similarity Search — pip 한 줄로 쓰는 인메모리 벡터 검색</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-purple-50 border-2 border-purple-300 rounded-xl p-3 text-sm text-purple-900">
                💡 다음(II-1-2)에서는 <strong>FAISS 인덱스 종류</strong>(Flat / IVF / HNSW / PQ / IVFPQ)를 비교하고, 1억 벡터급 대규모 검색에서 메모리/속도/정확도 트레이드오프를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-purple-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-purple-600 text-white hover:bg-purple-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['faiss-cpu', 'IndexFlatL2', 'add()', 'search()', 'ntotal', 'float32', 'L2 distance', 'in-memory'].map(kw => (
                <span key={kw} className="bg-purple-50 text-purple-700 px-3 py-1 rounded-full text-xs font-mono border border-purple-200">{kw}</span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../part1/I-2-2.html" className="text-slate-500 hover:text-slate-700">&larr; I-2-2 벡터 DB 종류</a>
              <a href="./II-1-2.html" className="text-purple-700 hover:text-purple-900 font-medium">II-1-2 FAISS 인덱스 종류 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
