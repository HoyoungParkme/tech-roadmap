<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB — II-1-1. FAISS란 — 라이브러리 기반 벡터 검색</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "FAISS(Facebook AI Similarity Search)는 Meta가 만든 벡터 검색 라이브러리입니다. 서버가 아니라 Python 패키지 — pip install faiss-cpu 한 줄이면 설치 끝. 레고 세트를 사서 조립하듯, 필요한 부품(인덱스)을 골라 직접 조립합니다.",
        left: 'analogy',
        right: 'info',
        analogyData: {
          title: '레고 조립 비유',
          items: [
            { label: '레고 상자 구매', mapped: 'pip install faiss-cpu', icon: '1' },
            { label: '설명서 확인', mapped: 'import faiss', icon: '2' },
            { label: '블록 선택', mapped: '인덱스 타입 선택', icon: '3' },
            { label: '조립 완성', mapped: '검색 시스템 완성', icon: '4' },
          ],
        },
        infoData: {
          title: 'FAISS 핵심 정보',
          items: [
            { label: '개발사', value: 'Meta (Facebook AI Research)' },
            { label: '유형', value: '라이브러리 (서버 아님)' },
            { label: '언어', value: 'C++ 코어 + Python 바인딩' },
            { label: '설치', value: 'pip install faiss-cpu / faiss-gpu' },
            { label: '규모', value: '10억 벡터까지 검색 가능' },
          ],
        },
      },
      {
        desc: "FAISS의 기본 워크플로우는 딱 4단계입니다. import → 인덱스 생성 → 벡터 추가(add) → 검색(search). 레고를 조립하듯 순서대로 블록을 끼우면 됩니다. 복잡한 서버 설정이 전혀 없습니다.",
        left: 'code',
        right: 'flow',
        codeData: {
          title: 'FAISS 기본 4단계 코드',
          lang: 'python',
          code: `import numpy as np\nimport faiss\n\n# 1. 차원 설정\nd = 128  # 벡터 차원\n\n# 2. 인덱스 생성 (L2 거리 기반)\nindex = faiss.IndexFlatL2(d)\n\n# 3. 벡터 추가\nvectors = np.random.random((1000, d)).astype('float32')\nindex.add(vectors)\nprint(f"저장된 벡터 수: {index.ntotal}")\n\n# 4. 검색\nquery = np.random.random((1, d)).astype('float32')\nD, I = index.search(query, k=5)\nprint(f"거리: {D}")\nprint(f"인덱스: {I}")`,
        },
        flowData: {
          title: '4단계 흐름',
          steps: [
            { num: '1', label: 'import faiss', detail: '라이브러리 불러오기' },
            { num: '2', label: 'IndexFlatL2(d)', detail: '인덱스 객체 생성' },
            { num: '3', label: 'index.add(vectors)', detail: '벡터 데이터 추가' },
            { num: '4', label: 'index.search(q, k)', detail: '유사 벡터 검색' },
          ],
        },
      },
      {
        desc: "IndexFlatL2는 가장 기본적인 인덱스입니다. 모든 벡터를 하나씩 비교하는 전수 검색(brute-force)으로, 100% 정확하지만 데이터가 많아지면 느려집니다. 도서관의 모든 책을 한 권씩 확인하는 것과 같습니다.",
        left: 'concept',
        right: 'code',
        conceptData: {
          title: 'IndexFlatL2 동작 원리',
          points: [
            { icon: 'Q', text: '쿼리 벡터 q가 들어온다' },
            { icon: 'D', text: '저장된 모든 벡터와 L2 거리를 계산한다' },
            { icon: 'S', text: '거리가 가까운 순서로 정렬한다' },
            { icon: 'K', text: '상위 k개를 반환한다' },
          ],
          note: 'L2 거리 = 유클리드 거리 = 두 점 사이의 직선 거리',
        },
        codeData: {
          title: 'IndexFlatL2 사용법',
          lang: 'python',
          code: `import faiss\nimport numpy as np\n\nd = 768  # OpenAI 임베딩 차원\nindex = faiss.IndexFlatL2(d)\n\n# 1000개 문서의 임베딩 벡터\nvectors = np.random.random((1000, d)).astype('float32')\nindex.add(vectors)\n\n# 쿼리 — "강아지 훈련법"\nquery = np.random.random((1, d)).astype('float32')\n\n# k=5: 가장 가까운 5개 반환\nD, I = index.search(query, k=5)\n# D = 거리 배열 [[0.12, 0.34, ...]]\n# I = 인덱스 배열 [[42, 7, ...]]`,
        },
      },
      {
        desc: "search()가 반환하는 D와 I를 이해합시다. D는 Distance(거리) 배열 — 값이 작을수록 유사합니다. I는 Index(인덱스) 배열 — 원본 데이터에서의 위치입니다. 이 두 배열로 \"어떤 문서가 얼마나 유사한지\"를 알 수 있습니다.",
        left: 'result',
        right: 'code',
        resultData: {
          title: 'search() 반환값 해석',
          query: '쿼리: "강아지 훈련법"',
          table: [
            { rank: 1, idx: 42, dist: 0.12, doc: '퍼피 기본 훈련 가이드' },
            { rank: 2, idx: 7, dist: 0.34, doc: '반려견 행동 교정' },
            { rank: 3, idx: 156, dist: 0.41, doc: '강아지 사회화 방법' },
            { rank: 4, idx: 89, dist: 0.58, doc: '반려동물 건강 관리' },
            { rank: 5, idx: 203, dist: 0.72, doc: '고양이 vs 강아지' },
          ],
        },
        codeData: {
          title: '결과 활용 코드',
          lang: 'python',
          code: `D, I = index.search(query, k=5)\n\n# D = [[0.12, 0.34, 0.41, 0.58, 0.72]]\n# I = [[42, 7, 156, 89, 203]]\n\n# 결과를 원본 문서와 매핑\ndocuments = [...]  # 원본 문서 리스트\nfor rank, (idx, dist) in enumerate(zip(I[0], D[0])):\n    print(f"{rank+1}위: {documents[idx]}")\n    print(f"   거리: {dist:.4f}")\n\n# 주의: FAISS는 ID만 반환\n# 원본 데이터 매핑은 직접 관리해야 함`,
        },
      },
      {
        desc: "정리: FAISS는 '벡터 검색 전용 레고 키트'입니다. 설치가 간편하고, 검색이 빠르고, 대규모 데이터를 처리할 수 있습니다. 단, 서버/API가 없고, 메타데이터 필터링이 없으며, 영속성(저장)은 직접 관리해야 합니다. 다음 시각화에서 FAISS의 다양한 인덱스 종류를 비교합니다.",
        left: 'summary',
        right: 'next',
        summaryData: {
          pros: [
            'pip install 한 줄로 설치',
            '메모리 기반 초고속 검색',
            'GPU 가속 지원 (faiss-gpu)',
            '10억 벡터까지 처리 가능',
            '다양한 인덱스 타입 제공',
          ],
          cons: [
            '서버/REST API 없음',
            '메타데이터 필터링 미지원',
            '영속성(persistence) 직접 관리',
            'CRUD(수정/삭제) 제한적',
          ],
        },
        nextData: {
          title: '다음에 배울 것',
          desc: 'FAISS에는 Flat 외에도 IVF, HNSW, PQ 등 다양한 인덱스가 있습니다. 각각의 속도, 메모리, 정확도 트레이드오프를 레이더 차트로 비교합니다.',
        },
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderLeft = () => {
        if (s.left === 'analogy') {
          const d = s.analogyData;
          return (
            <div>
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">{d.title}</div>
              <div className="space-y-3">
                {d.items.map((item, i) => (
                  <div key={i} className="flex items-center gap-3 p-3 bg-orange-50 rounded-lg border border-orange-200">
                    <div className="w-8 h-8 bg-orange-600 text-white rounded-full flex items-center justify-center font-bold text-sm">{item.icon}</div>
                    <div>
                      <div className="font-bold text-sm text-orange-800">{item.label}</div>
                      <div className="text-xs text-orange-600 mt-0.5">= {item.mapped}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        }
        if (s.left === 'code') {
          const d = s.codeData;
          return (
            <div>
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">{d.title}</div>
              <pre className="bg-slate-800 text-slate-100 rounded-lg p-4 text-xs font-mono whitespace-pre-wrap overflow-x-auto leading-relaxed">{d.code}</pre>
            </div>
          );
        }
        if (s.left === 'concept') {
          const d = s.conceptData;
          return (
            <div>
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">{d.title}</div>
              <div className="space-y-3">
                {d.points.map((p, i) => (
                  <div key={i} className="flex items-center gap-3">
                    <div className="w-8 h-8 bg-orange-100 text-orange-700 rounded-lg flex items-center justify-center font-bold text-sm border border-orange-200">{p.icon}</div>
                    <div className="text-sm text-slate-700">{p.text}</div>
                  </div>
                ))}
              </div>
              <div className="mt-4 p-3 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-700">{d.note}</div>
            </div>
          );
        }
        if (s.left === 'result') {
          const d = s.resultData;
          return (
            <div>
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">{d.title}</div>
              <div className="text-sm font-medium text-orange-700 mb-3 p-2 bg-orange-50 rounded-lg border border-orange-200">{d.query}</div>
              <div className="space-y-2">
                {d.table.map((r, i) => (
                  <div key={i} className="flex items-center justify-between p-2.5 rounded-lg border bg-white border-slate-200 hover:border-orange-300 transition">
                    <div className="flex items-center gap-2">
                      <span className="w-6 h-6 bg-orange-600 text-white rounded-full flex items-center justify-center text-xs font-bold">{r.rank}</span>
                      <span className="text-sm font-medium text-slate-800">{r.doc}</span>
                    </div>
                    <div className="text-right">
                      <div className="text-xs text-slate-400">idx={r.idx}</div>
                      <div className="text-xs text-orange-600 font-medium">dist={r.dist}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        }
        if (s.left === 'summary') {
          const d = s.summaryData;
          return (
            <div>
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">FAISS 장단점 정리</div>
              <div className="mb-4">
                <div className="text-xs font-bold text-emerald-600 mb-2">장점</div>
                <div className="space-y-1.5">
                  {d.pros.map((p, i) => (
                    <div key={i} className="flex items-center gap-2 text-sm text-emerald-700">
                      <span className="text-emerald-500">&#10003;</span> {p}
                    </div>
                  ))}
                </div>
              </div>
              <div>
                <div className="text-xs font-bold text-red-600 mb-2">한계</div>
                <div className="space-y-1.5">
                  {d.cons.map((c, i) => (
                    <div key={i} className="flex items-center gap-2 text-sm text-red-700">
                      <span className="text-red-500">&#10007;</span> {c}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        }
        return null;
      };

      const renderRight = () => {
        if (s.right === 'info') {
          const d = s.infoData;
          return (
            <div>
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">{d.title}</div>
              <div className="space-y-2">
                {d.items.map((item, i) => (
                  <div key={i} className="flex justify-between p-3 bg-slate-50 rounded-lg border border-slate-200">
                    <span className="text-sm font-medium text-slate-600">{item.label}</span>
                    <span className="text-sm font-bold text-slate-800">{item.value}</span>
                  </div>
                ))}
              </div>
            </div>
          );
        }
        if (s.right === 'flow') {
          const d = s.flowData;
          return (
            <div>
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">{d.title}</div>
              <div className="space-y-2">
                {d.steps.map((st, i) => (
                  <div key={i}>
                    <div className="flex items-center gap-3 p-3 bg-orange-50 rounded-lg border border-orange-200">
                      <div className="w-8 h-8 bg-orange-600 text-white rounded-full flex items-center justify-center font-bold text-sm">{st.num}</div>
                      <div>
                        <div className="font-mono font-bold text-sm text-orange-800">{st.label}</div>
                        <div className="text-xs text-orange-600">{st.detail}</div>
                      </div>
                    </div>
                    {i < d.steps.length - 1 && (
                      <div className="flex justify-center my-1">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c2410c" strokeWidth="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          );
        }
        if (s.right === 'code') {
          const d = s.codeData;
          return (
            <div>
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">{d.title}</div>
              <pre className="bg-slate-800 text-slate-100 rounded-lg p-4 text-xs font-mono whitespace-pre-wrap overflow-x-auto leading-relaxed">{d.code}</pre>
            </div>
          );
        }
        if (s.right === 'next') {
          const d = s.nextData;
          return (
            <div>
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">다음 학습</div>
              <div className="p-4 bg-orange-50 border border-orange-200 rounded-lg">
                <div className="font-bold text-orange-800 mb-2">{d.title}</div>
                <div className="text-sm text-orange-700">{d.desc}</div>
              </div>
              <div className="mt-4 p-3 bg-slate-50 border border-slate-200 rounded-lg">
                <div className="text-xs font-bold text-slate-500 mb-2">FAISS 4단계 요약</div>
                <div className="font-mono text-xs text-slate-600 space-y-1">
                  <div>1. import faiss</div>
                  <div>2. index = faiss.IndexFlatL2(d)</div>
                  <div>3. index.add(vectors)</div>
                  <div>4. D, I = index.search(query, k)</div>
                </div>
              </div>
            </div>
          );
        }
        return null;
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-orange-700 hover:text-orange-900 font-medium">
                <span>&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. FAISS &gt; Chapter 1. FAISS 기초</div>
                  <h1 className="text-2xl font-bold text-slate-800">II-1-1. FAISS란 — 라이브러리 기반 벡터 검색</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>레고 조립</b> 비유: pip install 한 줄이면 설치 완료. import → 인덱스 생성 → add → search, 4단계로 벡터 검색이 완성됩니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-orange-700 border-orange-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">FAISS 기본 워크플로우</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {renderLeft()}
              </div>
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {renderRight()}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['faiss-cpu', 'faiss-gpu', 'IndexFlatL2', 'add()', 'search()'].map(kw => (
                <span key={kw} className="bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-sm font-medium border border-orange-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-orange-600 hover:bg-orange-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
