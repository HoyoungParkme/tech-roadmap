            '- "pgvector + Postgres"              ← 기존 RDB 인프라 재활용',
            '- "FAISS(GPU 캐시) + pgvector(원본)" ← 고급 하이브리드',
            '',
            '## 결론',
            '- FAISS 한계 4종(메타/영속/필터/CRUD)을 직접 짜야 한다면',
            '  통합 벡터 DB로 가는 것이 코드/운영 모두 단순.',
            '- Part III(Chroma) → Part IV(pgvector) 순으로 학습 권장.',
          ],
          highlight: [3, 4, 5, 6, 7, 9, 10, 11, 12, 13, 27, 28, 29, 30, 31, 32],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // FAISS 박스 — 벡터 ID 카드 그리드
    // ─────────────────────────────────────────────────────
    function FaissBox({ faiss }) {
      if (!faiss) {
        return (
          <div className="rounded-lg bg-slate-50 border border-dashed border-slate-300 p-3 text-center text-[11px] text-slate-400 font-mono">
            (FAISS 박스 — 이 단계에서 사용 안 함)
          </div>
        );
      }
      return (
        <div className="rounded-lg bg-gradient-to-br from-purple-50 to-purple-100 border-2 border-purple-300 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="text-[11px] font-bold text-purple-800 flex items-center gap-1">
              <span>📦</span><span>FAISS 인덱스 (in-memory)</span>
            </div>
            <span className="text-[9px] font-mono text-purple-600">IndexIDMap(IndexFlatL2(768))</span>
          </div>
          <div className="grid grid-cols-3 gap-2">
            {faiss.vectors.map((v) => (
              <div
                key={v.id}
                className={`rounded-md border-2 p-2 text-center transition-all duration-500 ${
                  v.hit
                    ? 'bg-purple-600 border-purple-800 text-white shadow-md scale-105'
                    : 'bg-white border-purple-200 text-purple-700'
                }`}
              >
                <div className={`text-[10px] uppercase ${v.hit ? 'text-purple-200' : 'text-purple-400'}`}>id</div>
                <div className="text-base font-mono font-bold">{v.id}</div>
                <div className={`text-[9px] font-mono ${v.hit ? 'text-purple-100' : 'text-slate-500'}`}>
                  {v.label}
                </div>
              </div>
            ))}
          </div>
          {faiss.searchHit && (
            <div className="mt-2 px-2 py-1 rounded bg-purple-700 text-white text-[10px] font-mono flex justify-between">
              <span>검색 결과</span>
              <span>id={faiss.searchHit.id}, dist={faiss.searchHit.dist}</span>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 메타데이터 SQLite 테이블 박스
    // ─────────────────────────────────────────────────────
    function MetaDbBox({ metaDb, showLink }) {
      if (!metaDb) {
        return (
          <div className="rounded-lg bg-slate-50 border border-dashed border-slate-300 p-3 text-center text-[11px] text-slate-400 font-mono">
            (외부 메타데이터 DB — 아직 연결되지 않음)
          </div>
        );
      }
      return (
        <div className="rounded-lg bg-gradient-to-br from-emerald-50 to-emerald-100 border-2 border-emerald-300 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="text-[11px] font-bold text-emerald-800 flex items-center gap-1">
              <span>🗄️</span><span>SQLite metadata.db</span>
            </div>
            {showLink && (
              <span className="text-[9px] font-mono text-emerald-700 bg-white px-1.5 py-0.5 rounded">
                ← FAISS id로 join
              </span>
            )}
          </div>
          <table className="w-full text-[10px] font-mono">
            <thead>
              <tr className="bg-emerald-200/50 text-emerald-900">
                <th className="px-2 py-1 text-left">id</th>
                <th className="px-2 py-1 text-left">title</th>
                <th className="px-2 py-1 text-left">category</th>
              </tr>
            </thead>
            <tbody>
              {metaDb.rows.map((r) => (
                <tr
                  key={r.id}
                  className={`transition-all duration-500 ${
                    r.hit ? 'bg-emerald-300/60 font-bold text-emerald-900' : 'odd:bg-white even:bg-emerald-50/50 text-slate-700'
                  }`}
                >
                  <td className="px-2 py-1">{r.id}</td>
                  <td className="px-2 py-1">{r.title}</td>
                  <td className="px-2 py-1">{r.category}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 영속성 다이어그램 (저장 → 재시작 → 로드 → add → 리빌드)
    // ─────────────────────────────────────────────────────
    function PersistDiagram({ persist }) {
      if (!persist) return null;
      const colorOf = (k) => {
        if (k === 'mem')     return 'from-purple-100 to-purple-50 border-purple-300 text-purple-800';
        if (k === 'save')    return 'from-emerald-100 to-emerald-50 border-emerald-300 text-emerald-800';
        if (k === 'restart') return 'from-amber-100 to-amber-50 border-amber-300 text-amber-800';
        if (k === 'load')    return 'from-sky-100 to-sky-50 border-sky-300 text-sky-800';
        if (k === 'add')     return 'from-rose-100 to-rose-50 border-rose-300 text-rose-800';
        return 'from-fuchsia-100 to-fuchsia-50 border-fuchsia-300 text-fuchsia-800';
      };
      const iconOf = (k) => ({
        mem: '🧠', save: '💾', restart: '⟲', load: '📂', add: '➕', rebuild: '🔁',
      }[k] || '•');
      return (
        <div className="rounded-lg bg-gradient-to-br from-purple-50 to-purple-100 border-2 border-purple-300 p-3">
          <div className="text-[11px] font-bold text-purple-800 mb-2 flex items-center gap-1">
            <span>💾</span><span>FAISS 영속성 흐름 — write_index / read_index</span>
          </div>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
            {persist.steps.map((s, i) => (
              <div
                key={i}
                className={`rounded-md border-2 bg-gradient-to-br p-2 text-center transition-all duration-500 ${colorOf(s.kind)}`}
              >
                <div className="text-base">{iconOf(s.kind)}</div>
                <div className="text-[11px] font-bold mt-0.5">{s.label}</div>
                <div className="text-[9px] mt-0.5 font-mono opacity-80">{s.detail}</div>
              </div>
            ))}
          </div>
          <div className="text-[9px] text-purple-700 mt-2 text-center font-mono">
            저장·로드는 OK · 새 add는 다시 write 필요 · 학습형 인덱스는 주기적 리빌드가 안전
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 필터링 시나리오 (pre vs post 나란히 비교)
    // ─────────────────────────────────────────────────────
    function FilterScenario({ filter }) {
      if (!filter) return null;
      const renderCol = (col, accent) => (
        <div className={`rounded-lg border-2 ${accent.border} ${accent.bg} p-3`}>
          <div className={`text-[11px] font-bold mb-2 ${accent.text}`}>
            {col.label}
          </div>
          <ol className="space-y-1.5">
            {col.steps.map((s, i) => (
              <li
                key={i}
                className={`rounded-md border px-2 py-1.5 text-[10px] flex flex-col gap-0.5 ${
                  s.warn
                    ? 'bg-amber-50 border-amber-300 text-amber-900'
                    : 'bg-white border-slate-200 text-slate-700'
                }`}
              >
                <div className="font-bold font-mono">
                  <span className="opacity-60 mr-1">{i + 1}.</span>{s.t}
                </div>
                <div className="text-[9px] font-mono opacity-80">{s.detail}</div>
              </li>
            ))}
          </ol>
        </div>
      );
      return (
        <div className="rounded-lg bg-purple-50/50 border-2 border-purple-300 p-3">
          <div className="text-[11px] font-bold text-purple-800 mb-2 flex items-center justify-between">
            <span>🔍 필터링 시나리오 — {filter.query}</span>
            <span className="text-[9px] font-mono text-purple-600">pre vs post 비교</span>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
            {renderCol(filter.pre, {
              border: 'border-sky-300', bg: 'bg-sky-50/60', text: 'text-sky-800',
            })}
            {renderCol(filter.post, {
              border: 'border-rose-300', bg: 'bg-rose-50/60', text: 'text-rose-800',
            })}
          </div>
          <div className="text-[9px] text-purple-700 mt-2 text-center font-mono">
            pre = 정확하지만 후보 클수록 느림 · post = 빠르지만 결과 누락 위험
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 결론 박스 (Step 5)
    // ─────────────────────────────────────────────────────
    function ConclusionBox() {
      const rows = [
        { k: '메타데이터',  faiss: 'ID만 — 외부 DB 직접',         alt: '✓ 내장 (필드 schema)' },
        { k: '영속성',      faiss: 'write/read_index 수동',       alt: '✓ 자동 + WAL/스냅샷' },
        { k: '필터링',      faiss: 'pre/post 직접',                alt: '✓ where 절 내장' },
        { k: 'CRUD',        faiss: 'IndexIDMap만 부분',           alt: '✓ upsert/delete' },
        { k: '운영 부담',   faiss: '높음 (인프라 직접)',           alt: '낮음 (관리 기능 포함)' },
        { k: '추천 상황',   faiss: 'GPU·대규모·검색 최우선',      alt: '대다수 RAG' },
      ];
      return (
        <div className="rounded-lg bg-white border-2 border-purple-400 overflow-hidden shadow-sm">
          <div className="bg-purple-100 px-3 py-2 border-b border-purple-200 flex items-center justify-between">
            <div className="text-xs font-bold text-purple-900">📊 FAISS vs 통합 벡터 DB (Chroma · pgvector)</div>
            <span className="text-[10px] font-mono text-purple-700">결론</span>
          </div>
          <table className="w-full text-[11px]">
            <thead>
              <tr className="bg-purple-50 text-left">
                <th className="px-3 py-2 font-bold text-purple-700 w-1/5">항목</th>
                <th className="px-3 py-2 font-bold text-slate-700">FAISS 단독</th>
                <th className="px-3 py-2 font-bold text-purple-700">Chroma / pgvector</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r, i) => (
                <tr key={r.k} className={i % 2 === 0 ? 'bg-white' : 'bg-purple-50/40'}>
                  <td className="px-3 py-1.5 font-bold text-slate-700 border-r border-slate-100">{r.k}</td>
                  <td className="px-3 py-1.5 text-slate-700 font-mono">{r.faiss}</td>
                  <td className="px-3 py-1.5 text-purple-800 font-mono font-semibold">{r.alt}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div className="bg-purple-50 px-3 py-2 border-t border-purple-200 text-[11px] text-purple-900 leading-relaxed">
            <strong>결론.</strong> FAISS 한계 4종을 모두 직접 보완해야 한다면 도메인 코드가
            인프라 코드에 잠식된다. 일반 RAG는 <strong>Chroma (Part III)</strong> 또는
            <strong> pgvector (Part IV)</strong>로 가는 것이 합리적이다.
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — Step에 따라 적절한 패널을 보여줌
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 도서관 사서 — FAISS는 책장만, 카탈로그는 따로</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* Step 1, 2 — FAISS + (조건부) 메타DB + 화살표 */}
          {(step.faiss || step.metaDb) && (
            <div className="space-y-2">
              <FaissBox faiss={step.faiss} />
              {step.showLink && (
                <div className="flex items-center justify-center gap-1 text-[10px] font-mono text-slate-500 py-0.5">
                  <span>id 화살표</span>
                  <span className="text-purple-500 text-base leading-none">↓</span>
                  <span>같은 정수 ID로 join</span>
                </div>
              )}
              <MetaDbBox metaDb={step.metaDb} showLink={step.showLink} />
            </div>
          )}

          {/* Step 3 — 영속성 다이어그램 */}
          {step.persist && <PersistDiagram persist={step.persist} />}

          {/* Step 4 — 필터링 시나리오 */}
          {step.filter && <FilterScenario filter={step.filter} />}

          {/* Step 5 — 결론 */}
          {step.conclusion && <ConclusionBox />}

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm" style={{ background: '#a78bfa' }}></span>
              FAISS 박스
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm" style={{ background: '#34d399' }}></span>
              SQLite 메타
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm" style={{ background: '#fbbf24' }}></span>
              주의/제약
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2.5 h-2.5 rounded-full bg-slate-300"></span>
              미사용
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + 파일 탭
    //   step.code 외에 step.codeAlt 가 있으면 탭으로 토글
    // ─────────────────────────────────────────────────────
    function CodeViewer({ step, stepIdx, total }) {
      const tabs = step.codeAlt ? [step.code, step.codeAlt] : [step.code];
      const [activeTab, setActiveTab] = useState(0);
      const code = tabs[Math.min(activeTab, tabs.length - 1)];
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      // 새 단계로 이동하면 첫 탭으로
      useEffect(() => { setActiveTab(0); }, [stepIdx]);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭들 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <div className="flex gap-1 ml-2">
              {tabs.map((t, i) => (
                <button
                  key={i}
                  onClick={() => setActiveTab(i)}
                  className={`px-2 py-0.5 text-[11px] font-mono rounded-t transition ${
                    i === activeTab
                      ? 'bg-[#282c34] text-purple-200 border-t border-l border-r border-purple-500/40'
                      : 'bg-[#1e2127] text-slate-500 hover:text-slate-300'
                  }`}
                >
                  {t.filename}
                </button>
              ))}
            </div>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 숨김 코드 */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-purple-500/15 border-l-2 border-purple-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}{tabs.length > 1 ? ` · tab ${activeTab + 1}/${tabs.length}` : ''}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-purple-700 hover:text-purple-900 font-medium">&larr; Vector DB 허브</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-2-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. FAISS &gt; Chapter 2. FAISS 실전</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">FAISS 한계와 보완 — 메타데이터, 영속성, 필터링</h1>
                  <p className="text-sm text-slate-500 mt-0.5">FAISS는 책장(검색)만 잘한다 — 카탈로그(메타)와 자동 동기화는 외부 도구로</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer step={step} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-purple-50 border-2 border-purple-300 rounded-xl p-3 text-sm text-purple-900">
                💡 다음 Part(III)에서는 <strong>Chroma</strong>로 메타데이터·영속성·필터·CRUD가 한 패키지에 통합된 모습을 직접 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-purple-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-purple-600 text-white hover:bg-purple-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-2-2.html" className="text-slate-500 hover:text-slate-700">&larr; II-2-2 IVF/PQ 인덱스</a>
              <a href="../index.html" className="text-purple-700 hover:text-purple-900 font-medium">Vector DB 허브 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
