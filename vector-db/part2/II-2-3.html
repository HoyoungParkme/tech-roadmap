<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB — II-2-3. FAISS 한계와 보완 — 메타데이터, 영속성, 필터링</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const LIMITS = [
      {
        name: '메타데이터 필터링',
        icon: 'M',
        problem: 'FAISS는 벡터만 저장 — "카테고리=tech인 문서 중에서 검색"이 불가능',
        solution: 'SQLite/PostgreSQL에 메타데이터를 별도 저장하고, pre-filter 또는 post-filter로 결합',
        color: 'bg-red-500',
        lightBg: 'bg-red-50',
        border: 'border-red-200',
        text: 'text-red-800',
      },
      {
        name: '자동 영속성',
        icon: 'P',
        problem: 'FAISS 인덱스는 메모리에만 존재 — 프로세스 종료 시 사라짐',
        solution: 'write_index() / read_index()로 수동 저장/로드. 자동 저장은 직접 구현',
        color: 'bg-amber-500',
        lightBg: 'bg-amber-50',
        border: 'border-amber-200',
        text: 'text-amber-800',
      },
      {
        name: 'CRUD 업데이트',
        icon: 'U',
        problem: '벡터 수정/삭제가 제한적 — remove_ids()는 IndexIDMap에서만 지원',
        solution: 'IndexIDMap으로 감싸서 ID 기반 삭제 지원. 또는 주기적 전체 리빌드',
        color: 'bg-purple-500',
        lightBg: 'bg-purple-50',
        border: 'border-purple-200',
        text: 'text-purple-800',
      },
      {
        name: '분산 처리',
        icon: 'D',
        problem: '단일 머신 전용 — 여러 서버에 분산 배치 불가',
        solution: '샤딩(데이터 분할) + 각 샤드에 독립 FAISS 인덱스 + 결과 병합 로직 직접 구현',
        color: 'bg-blue-500',
        lightBg: 'bg-blue-50',
        border: 'border-blue-200',
        text: 'text-blue-800',
      },
    ];

    const STEPS = [
      {
        desc: "스위스 아미 나이프에도 없는 도구가 있듯, FAISS에도 없는 기능이 있습니다. (1) 메타데이터 필터링, (2) 자동 영속성, (3) CRUD 업데이트, (4) 분산 처리 — 이 4가지는 외부 도구로 보완해야 합니다.",
        activeLimit: -1,
        code: null,
        codeTitle: null,
      },
      {
        desc: "한계 1: 메타데이터 필터링. FAISS는 벡터만 저장합니다. \"카테고리가 tech인 문서 중에서 유사한 것\"을 찾으려면, SQLite에 메타데이터를 별도 저장하고 pre-filter(먼저 필터 → 검색) 또는 post-filter(검색 → 필터) 패턴을 사용합니다.",
        activeLimit: 0,
        codeTitle: '메타데이터 필터링 보완 코드',
        code: `import faiss\nimport sqlite3\nimport numpy as np\n\n# 1. 메타데이터를 SQLite에 저장\nconn = sqlite3.connect("metadata.db")\nconn.execute("""CREATE TABLE IF NOT EXISTS docs (\n    id INTEGER PRIMARY KEY,\n    title TEXT,\n    category TEXT,\n    created_at TEXT\n)""")\n\n# 2. FAISS에는 벡터만 저장\nindex = faiss.IndexIDMap(faiss.IndexFlatL2(768))\nindex.add_with_ids(vectors, ids)\n\n# 3. Post-filter 패턴\n#    (먼저 넉넉히 검색 → 메타데이터로 필터)\nD, I = index.search(query, k=50)  # 넉넉히\nfiltered = []\nfor idx, dist in zip(I[0], D[0]):\n    if idx == -1: continue\n    row = conn.execute(\n        "SELECT * FROM docs WHERE id=? AND category=?",\n        (int(idx), "tech")\n    ).fetchone()\n    if row:\n        filtered.append((idx, dist, row))\n    if len(filtered) >= 5: break  # 최종 k=5`,
      },
      {
        desc: "한계 2: 자동 영속성. FAISS 인덱스는 메모리에만 있어서, 프로세스가 종료되면 사라집니다. write_index()로 파일에 저장하고, 앱 시작 시 read_index()로 로드하는 패턴을 반드시 구현해야 합니다.",
        activeLimit: 1,
        codeTitle: '영속성 보완 코드',
        code: `import faiss\nimport os\n\nINDEX_PATH = "my_index.faiss"\nCHUNKS_PATH = "chunks.pkl"\n\ndef save_index(index, chunks):\n    \"\"\"인덱스와 원본 데이터를 함께 저장\"\"\"\n    faiss.write_index(index, INDEX_PATH)\n    import pickle\n    with open(CHUNKS_PATH, "wb") as f:\n        pickle.dump(chunks, f)\n    print(f"저장 완료: {index.ntotal}개 벡터")\n\ndef load_index():\n    \"\"\"저장된 인덱스와 원본 데이터를 로드\"\"\"\n    if not os.path.exists(INDEX_PATH):\n        return None, None\n    index = faiss.read_index(INDEX_PATH)\n    import pickle\n    with open(CHUNKS_PATH, "rb") as f:\n        chunks = pickle.load(f)\n    print(f"로드 완료: {index.ntotal}개 벡터")\n    return index, chunks\n\n# 앱 시작 시\nindex, chunks = load_index()\nif index is None:\n    index = build_new_index()  # 새로 빌드\n    save_index(index, chunks)`,
      },
      {
        desc: "한계 3: CRUD 업데이트. 기본 FAISS 인덱스는 벡터 삭제/수정이 안 됩니다. IndexIDMap으로 감싸면 remove_ids()로 삭제가 가능합니다. 수정은 삭제 → 재추가로 구현합니다. 대규모에서는 주기적 전체 리빌드가 현실적입니다.",
        activeLimit: 2,
        codeTitle: 'CRUD 보완 코드',
        code: `import faiss\nimport numpy as np\n\n# IndexIDMap으로 감싸면 ID 기반 관리 가능\nbase_index = faiss.IndexFlatL2(768)\nindex = faiss.IndexIDMap(base_index)\n\n# Create: ID 지정하여 추가\nids = np.array([100, 101, 102], dtype=np.int64)\nindex.add_with_ids(vectors, ids)\n\n# Delete: ID로 삭제\nids_to_remove = np.array([101], dtype=np.int64)\nindex.remove_ids(ids_to_remove)\nprint(f"남은 벡터: {index.ntotal}")  # 2\n\n# Update: 삭제 → 재추가\ndef update_vector(index, vec_id, new_vector):\n    # 1. 기존 삭제\n    index.remove_ids(\n        np.array([vec_id], dtype=np.int64)\n    )\n    # 2. 새 벡터 추가\n    index.add_with_ids(\n        new_vector.reshape(1, -1),\n        np.array([vec_id], dtype=np.int64)\n    )\n\n# 주의: IVF 인덱스는 remove_ids 후\n# 클러스터 불균형 → 주기적 리빌드 권장`,
      },
      {
        desc: "정리: FAISS는 '벡터 검색 전문 도구'입니다. 메타데이터는 SQLite, 영속성은 write_index, CRUD는 IndexIDMap, 분산은 샤딩으로 보완합니다. 이런 보완이 번거롭다면 Chroma(Part III)나 pgvector(Part IV)가 대안입니다.",
        activeLimit: -1,
        codeTitle: 'FAISS vs 대안 — 언제 FAISS를 쓸까?',
        code: `# FAISS를 선택해야 하는 경우\n# - 검색 속도가 최우선\n# - 대규모 데이터 (100만+ 벡터)\n# - GPU 가속이 필요한 경우\n# - 라이브러리 레벨 제어가 필요한 경우\n\n# 대안을 고려해야 하는 경우\n# - 메타데이터 필터링이 핵심 → Chroma\n# - SQL과 벡터 검색 결합 → pgvector\n# - 빠른 프로토타이핑 → Chroma\n# - ACID 트랜잭션 필요 → pgvector\n\n# 조합 패턴 (실전에서 자주 사용)\n# - FAISS (실시간 검색) + PostgreSQL (메타데이터)\n# - Chroma (개발) → pgvector (프로덕션)\n# - FAISS (캐시) + pgvector (영속 저장)`,
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-orange-700 hover:text-orange-900 font-medium">
                <span>&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. FAISS &gt; Chapter 2. FAISS 실전</div>
                  <h1 className="text-2xl font-bold text-slate-800">II-2-3. FAISS 한계와 보완 — 메타데이터, 영속성, 필터링</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>스위스 아미 나이프</b>에도 없는 도구가 있듯, FAISS에도 없는 4가지 기능과 그 보완 방법을 알아봅니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-orange-700 border-orange-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">FAISS 한계와 보완</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="space-y-3">
                {LIMITS.map((lim, i) => (
                  <div key={i} className={`p-4 rounded-xl border-2 transition-all duration-500 ${
                    s.activeLimit === i ? `${lim.lightBg} ${lim.border} scale-[1.02] shadow-md` :
                    s.activeLimit === -1 ? `${lim.lightBg} ${lim.border}` :
                    (s.activeLimit > i) ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-slate-100 opacity-40'
                  }`}>
                    <div className="flex items-center gap-3 mb-2">
                      <div className={`w-8 h-8 ${s.activeLimit > i ? 'bg-emerald-500' : lim.color} text-white rounded-lg flex items-center justify-center font-bold text-sm transition-colors`}>
                        {s.activeLimit > i ? '\u2713' : lim.icon}
                      </div>
                      <div className={`font-bold text-sm ${s.activeLimit === i ? lim.text : 'text-slate-700'}`}>{lim.name}</div>
                    </div>
                    <div className="text-xs text-slate-600 mb-1"><span className="font-bold text-red-500">문제:</span> {lim.problem}</div>
                    <div className="text-xs text-slate-600"><span className="font-bold text-emerald-500">보완:</span> {lim.solution}</div>
                  </div>
                ))}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {s.code ? (
                  <div>
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">{s.codeTitle}</div>
                    <pre className="bg-slate-800 text-slate-100 rounded-lg p-4 text-xs font-mono whitespace-pre-wrap overflow-x-auto leading-relaxed">{s.code}</pre>
                  </div>
                ) : (
                  <div className="flex flex-col items-center justify-center h-full text-center py-8">
                    <div className="text-4xl mb-3">&#x1F52C;</div>
                    <div className="font-bold text-slate-700 mb-2">FAISS의 4가지 한계</div>
                    <div className="text-sm text-slate-500 mb-4">각 한계와 보완 코드를<br/>하나씩 살펴봅니다</div>
                    <div className="space-y-2 text-left w-full max-w-xs">
                      {LIMITS.map((lim, i) => (
                        <div key={i} className="flex items-center gap-2 text-sm">
                          <div className={`w-6 h-6 ${lim.color} text-white rounded flex items-center justify-center font-bold text-xs`}>{lim.icon}</div>
                          <span className="text-slate-600">{lim.name}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['메타데이터', 'persistence', 'ID 매핑', 'pre-filter', 'post-filter'].map(kw => (
                <span key={kw} className="bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-sm font-medium border border-orange-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-orange-600 hover:bg-orange-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./II-2-2.html" className="text-orange-600 hover:text-orange-800 font-medium">&larr; II-2-2. FAISS 최적화</a>
              <a href="../part3/III-1-1.html" className="text-green-600 hover:text-green-800 font-medium">Part III. Chroma &rarr; III-1-1 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
