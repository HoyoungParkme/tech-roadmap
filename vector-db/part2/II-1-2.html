<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB — II-1-2. FAISS 인덱스 종류 — Flat/IVF/HNSW/PQ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const INDEXES = [
      {
        name: 'IndexFlatL2',
        short: 'Flat',
        color: 'bg-blue-500',
        lightBg: 'bg-blue-50',
        border: 'border-blue-200',
        text: 'text-blue-800',
        speed: 2, memory: 2, accuracy: 5,
        analogy: '모든 책을 한 권씩 확인',
        desc: '전수 검색(brute-force). 가장 느리지만 100% 정확.',
        code: 'index = faiss.IndexFlatL2(d)',
      },
      {
        name: 'IndexIVFFlat',
        short: 'IVF',
        color: 'bg-green-500',
        lightBg: 'bg-green-50',
        border: 'border-green-200',
        text: 'text-green-800',
        speed: 4, memory: 3, accuracy: 4,
        analogy: '층별로 분류 후 해당 층만 검색',
        desc: '벡터를 군집(클러스터)으로 분류한 뒤, 쿼리와 가까운 군집만 탐색.',
        code: 'quantizer = faiss.IndexFlatL2(d)\nindex = faiss.IndexIVFFlat(\n    quantizer, d, nlist=100\n)\nindex.train(vectors)\nindex.nprobe = 10  # 탐색할 군집 수',
      },
      {
        name: 'IndexHNSWFlat',
        short: 'HNSW',
        color: 'bg-purple-500',
        lightBg: 'bg-purple-50',
        border: 'border-purple-200',
        text: 'text-purple-800',
        speed: 5, memory: 1, accuracy: 4,
        analogy: '친구의 친구를 따라가며 탐색',
        desc: '그래프 기반 탐색. 매우 빠르지만 메모리를 많이 사용.',
        code: 'index = faiss.IndexHNSWFlat(d, M=32)\n# M: 각 노드의 연결 수\n# efConstruction: 빌드 시 탐색 폭\n# efSearch: 검색 시 탐색 폭\nindex.hnsw.efConstruction = 40\nindex.hnsw.efSearch = 16',
      },
      {
        name: 'IndexPQ',
        short: 'PQ',
        color: 'bg-amber-500',
        lightBg: 'bg-amber-50',
        border: 'border-amber-200',
        text: 'text-amber-800',
        speed: 4, memory: 5, accuracy: 3,
        analogy: '벡터를 압축해서 작은 공간에 저장',
        desc: 'Product Quantization. 벡터를 압축해 메모리를 크게 절약하지만 정확도 손실.',
        code: 'index = faiss.IndexPQ(\n    d,       # 차원\n    m=8,     # 서브벡터 수\n    nbits=8  # 코드북 비트 수\n)\nindex.train(vectors)\nindex.add(vectors)',
      },
    ];

    const STEPS = [
      {
        desc: "FAISS에는 4가지 대표 인덱스가 있습니다. 각각 속도, 메모리, 정확도의 트레이드오프가 다릅니다. 도서관 검색에 비유하면: Flat(모든 책 확인), IVF(층별 분류), HNSW(추천 네트워크), PQ(축약본 검색).",
        activeIdx: -1,
        showRadar: false,
      },
      {
        desc: "Flat (IndexFlatL2): 전수 검색입니다. 모든 벡터를 하나씩 비교해 100% 정확한 결과를 보장합니다. 하지만 데이터가 많아지면 선형으로 느려집니다. 10만 건 이하에서 추천.",
        activeIdx: 0,
        showRadar: false,
      },
      {
        desc: "IVF (IndexIVFFlat): 벡터를 nlist개의 군집(클러스터)으로 미리 분류합니다. 검색 시 nprobe개의 가장 가까운 군집만 탐색. nprobe를 높이면 정확도 증가, 속도 감소. 균형 잡힌 선택.",
        activeIdx: 1,
        showRadar: false,
      },
      {
        desc: "HNSW (IndexHNSWFlat): Hierarchical Navigable Small World 그래프. 각 벡터가 M개의 이웃과 연결된 그래프를 만들어, 친구의 친구를 따라가며 빠르게 탐색합니다. 매우 빠르지만 그래프 저장에 메모리를 많이 사용.",
        activeIdx: 2,
        showRadar: false,
      },
      {
        desc: "PQ (IndexPQ): Product Quantization. 768차원 벡터를 8개의 서브벡터로 쪼개고, 각각을 256개 코드 중 하나로 대체합니다. 메모리를 10~100배 절약하지만 정확도가 떨어집니다. 10억 벡터급에서 필수.",
        activeIdx: 3,
        showRadar: false,
      },
      {
        desc: "레이더 차트로 비교합니다. 정확도가 중요하면 Flat, 속도와 정확도의 균형이면 IVF, 최고 속도가 필요하면 HNSW, 메모리 제약이 심하면 PQ. 실전에서는 IVF + PQ 조합(IndexIVFPQ)도 자주 사용합니다.",
        activeIdx: -1,
        showRadar: true,
      },
    ];

    function RadarChart({ indexes }) {
      const metrics = ['속도', '메모리 효율', '정확도'];
      const cx = 150, cy = 130, r = 90;
      const angles = metrics.map((_, i) => (Math.PI * 2 * i / metrics.length) - Math.PI / 2);
      const colors = ['#3b82f6', '#22c55e', '#a855f7', '#f59e0b'];

      const getPoint = (angle, value) => ({
        x: cx + r * (value / 5) * Math.cos(angle),
        y: cy + r * (value / 5) * Math.sin(angle),
      });

      return (
        <svg viewBox="0 0 300 280" className="w-full max-w-sm mx-auto">
          {[1,2,3,4,5].map(level => (
            <polygon key={level}
              points={angles.map(a => `${cx + r * (level/5) * Math.cos(a)},${cy + r * (level/5) * Math.sin(a)}`).join(' ')}
              fill="none" stroke="#e2e8f0" strokeWidth="1" />
          ))}
          {angles.map((a, i) => (
            <g key={i}>
              <line x1={cx} y1={cy} x2={cx + r * Math.cos(a)} y2={cy + r * Math.sin(a)} stroke="#cbd5e1" strokeWidth="1" />
              <text x={cx + (r + 18) * Math.cos(a)} y={cy + (r + 18) * Math.sin(a)} textAnchor="middle" dominantBaseline="middle" className="text-xs fill-slate-500" fontSize="11">{metrics[i]}</text>
            </g>
          ))}
          {indexes.map((idx, ii) => {
            const values = [idx.speed, idx.memory, idx.accuracy];
            const points = values.map((v, i) => getPoint(angles[i], v));
            return (
              <g key={ii}>
                <polygon
                  points={points.map(p => `${p.x},${p.y}`).join(' ')}
                  fill={colors[ii]} fillOpacity="0.15" stroke={colors[ii]} strokeWidth="2" />
                {points.map((p, i) => (
                  <circle key={i} cx={p.x} cy={p.y} r="3" fill={colors[ii]} />
                ))}
              </g>
            );
          })}
          <g transform="translate(10, 250)">
            {indexes.map((idx, i) => (
              <g key={i} transform={`translate(${i * 72}, 0)`}>
                <rect width="10" height="10" rx="2" fill={colors[i]} />
                <text x="14" y="9" fontSize="10" className="fill-slate-600">{idx.short}</text>
              </g>
            ))}
          </g>
        </svg>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-orange-700 hover:text-orange-900 font-medium">
                <span>&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. FAISS &gt; Chapter 1. FAISS 기초</div>
                  <h1 className="text-2xl font-bold text-slate-800">II-1-2. FAISS 인덱스 종류 — Flat, IVF, HNSW, PQ</h1>
                </div>
              </div>
              <p className="text-slate-600">4가지 인덱스의 <b>속도/메모리/정확도</b> 트레이드오프를 레이더 차트로 비교합니다. 도서관 검색 방식에 비유하면 각각의 특성이 명확해집니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-orange-700 border-orange-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">FAISS 인덱스 4종 비교</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="space-y-3">
                {INDEXES.map((idx, i) => (
                  <div key={i} className={`p-4 rounded-xl border-2 transition-all duration-500 ${
                    s.activeIdx === i ? `${idx.lightBg} ${idx.border} scale-[1.02] shadow-md` :
                    s.activeIdx === -1 ? `${idx.lightBg} ${idx.border}` : 'bg-white border-slate-100 opacity-40'
                  }`}>
                    <div className="flex items-center justify-between mb-1">
                      <div className="flex items-center gap-2">
                        <div className={`w-8 h-8 ${idx.color} text-white rounded-lg flex items-center justify-center font-bold text-xs`}>{idx.short}</div>
                        <div>
                          <div className={`font-bold text-sm ${idx.text}`}>{idx.name}</div>
                          <div className="text-xs text-slate-500">{idx.analogy}</div>
                        </div>
                      </div>
                    </div>
                    <div className="text-xs text-slate-600 mt-1">{idx.desc}</div>
                    <div className="flex gap-3 mt-2">
                      <div className="text-xs"><span className="text-slate-400">속도</span> <span className="font-bold">{'*'.repeat(idx.speed)}{'*'.repeat(0)}</span></div>
                      <div className="text-xs"><span className="text-slate-400">메모리</span> <span className="font-bold">{'*'.repeat(idx.memory)}</span></div>
                      <div className="text-xs"><span className="text-slate-400">정확도</span> <span className="font-bold">{'*'.repeat(idx.accuracy)}</span></div>
                    </div>
                  </div>
                ))}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {s.activeIdx >= 0 ? (
                  <>
                    <div className="flex items-center gap-2 mb-4">
                      <div className={`w-8 h-8 ${INDEXES[s.activeIdx].color} text-white rounded-lg flex items-center justify-center font-bold text-xs`}>{INDEXES[s.activeIdx].short}</div>
                      <span className={`font-bold text-sm ${INDEXES[s.activeIdx].text}`}>{INDEXES[s.activeIdx].name} 상세</span>
                    </div>
                    <div className="mb-4">
                      <div className="text-xs font-bold text-slate-500 mb-2">성능 지표 (5점 만점)</div>
                      <div className="space-y-2">
                        {[
                          { label: '검색 속도', value: INDEXES[s.activeIdx].speed },
                          { label: '메모리 효율', value: INDEXES[s.activeIdx].memory },
                          { label: '검색 정확도', value: INDEXES[s.activeIdx].accuracy },
                        ].map((m, i) => (
                          <div key={i} className="flex items-center gap-3">
                            <span className="text-xs text-slate-500 w-20">{m.label}</span>
                            <div className="flex-1 bg-slate-100 rounded-full h-3">
                              <div className={`h-3 rounded-full ${INDEXES[s.activeIdx].color} transition-all duration-500`} style={{width: `${m.value * 20}%`}} />
                            </div>
                            <span className="text-xs font-bold text-slate-600">{m.value}/5</span>
                          </div>
                        ))}
                      </div>
                    </div>
                    <div>
                      <div className="text-xs font-bold text-slate-500 mb-2">코드 예시</div>
                      <pre className="bg-slate-800 text-slate-100 rounded-lg p-3 text-xs font-mono whitespace-pre-wrap overflow-x-auto">{INDEXES[s.activeIdx].code}</pre>
                    </div>
                  </>
                ) : s.showRadar ? (
                  <>
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">4종 레이더 차트 비교</div>
                    <RadarChart indexes={INDEXES} />
                    <div className="mt-4 space-y-2">
                      {[
                        { label: '정확도 우선', rec: 'Flat', tip: '10만 건 이하 소규모' },
                        { label: '균형 잡힌 선택', rec: 'IVF', tip: 'nprobe로 속도/정확도 조절' },
                        { label: '최고 속도', rec: 'HNSW', tip: '메모리 여유 있을 때' },
                        { label: '메모리 절약', rec: 'PQ', tip: '10억 벡터급 대규모' },
                      ].map((item, i) => (
                        <div key={i} className="flex items-center justify-between p-2 rounded-lg bg-slate-50 border border-slate-200">
                          <span className="text-xs font-medium text-slate-700">{item.label}</span>
                          <span className="text-xs text-orange-600 font-bold">{item.rec}</span>
                          <span className="text-xs text-slate-400">{item.tip}</span>
                        </div>
                      ))}
                    </div>
                  </>
                ) : (
                  <div className="flex flex-col items-center justify-center h-full text-center py-8">
                    <div className="text-4xl mb-3">&#x1F4CA;</div>
                    <div className="font-bold text-slate-700 mb-2">4가지 인덱스 비교</div>
                    <div className="text-sm text-slate-500">각 인덱스를 하나씩 살펴본 뒤<br/>레이더 차트로 비교합니다</div>
                  </div>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['IndexFlatL2', 'IndexIVFFlat', 'IndexHNSWFlat', 'IndexPQ', 'nprobe', 'recall'].map(kw => (
                <span key={kw} className="bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-sm font-medium border border-orange-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-orange-600 hover:bg-orange-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./II-1-1.html" className="text-orange-600 hover:text-orange-800 font-medium">&larr; II-1-1. FAISS란</a>
              <a href="./II-2-1.html" className="text-orange-600 hover:text-orange-800 font-medium">II-2-1. FAISS 실전 워크플로우 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
