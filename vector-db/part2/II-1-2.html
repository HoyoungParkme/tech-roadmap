  <title>Vector DB — II-1-2. FAISS 인덱스 종류 (Flat/IVF/HNSW/PQ)</title>

</head>
<body>
  <div id="root"></div>

  <!--
    II-1-2. FAISS 인덱스 종류 — Flat / IVF / HNSW / PQ
    학습 목표: 4가지 대표 인덱스의 알고리즘 동작 방식을 시각화로 이해하고,
              정확도/메모리/속도 트레이드오프를 비교 표로 정리한다.
    핵심 비유: 도서관 사서 — 책장 전체 훑기(Flat) vs 분류 후 한 칸만(IVF)
                          vs 친구의 친구 따라가기(HNSW) vs 책 압축본(PQ)
    패턴: fastapi v1 — 좌(LiveDataPane: 4 인덱스 카드 + 알고리즘 SVG) / 우(VSCode CodeViewer)
    색상: vector-db purple
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 4가지 인덱스 메타 정보 (카드용)
    //   activeStep : 어느 step에서 active 카드로 강조될지
    // ─────────────────────────────────────────────────────
    const INDEXES = [
      {
        id: 'flat',
        name: 'IndexFlatL2',
        short: 'Flat',
        analogy: '책 한 권씩 다 펼쳐 보기',
        accuracy: 5, memory: 1, speed: 1,
        activeStep: 1,
      },
      {
        id: 'ivf',
        name: 'IndexIVFFlat',
        short: 'IVF',
        analogy: '책장 분류 → 가까운 칸만',
        accuracy: 4, memory: 3, speed: 4,
        activeStep: 2,
      },
      {
        id: 'hnsw',
        name: 'IndexHNSWFlat',
        short: 'HNSW',
        analogy: '친구의 친구 따라가기',
        accuracy: 4, memory: 1, speed: 5,
        activeStep: 3,
      },
      {
        id: 'pq',
        name: 'IndexPQ',
        short: 'PQ',
        analogy: '책 축약본만 보관',
        accuracy: 3, memory: 5, speed: 4,
        activeStep: 4,
      },
    ];

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의
    //   activeId   : 활성화될 인덱스 카드 id ('flat'/'ivf'/'hnsw'/'pq')
    //   viz        : 알고리즘 시각화 종류 ('flat'/'ivf'/'hnsw'/'pq'/'compare')
    //   query      : 검색 쿼리 좌표 (x, y) — viz가 알고리즘일 때 사용
    //   metric     : 카드 위쪽에 보여줄 한 줄 핵심 메시지
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Flat — 모든 벡터를 brute force',
        desc: '가장 단순한 인덱스. 쿼리 벡터와 저장된 모든 벡터의 거리를 일일이 계산한다(brute force). 100% 정확하지만 N에 비례해 느려진다 — 10만 건이 한계. 도서관에서 책을 한 권씩 다 펼쳐 보는 것.',

        viz: 'flat',

            'import numpy as np',

            '# 차원 d=128, 벡터 50,000개',

            '',
            '# Flat 인덱스 — train 불필요, 그냥 add',
            'index = faiss.IndexFlatL2(d)   # L2 거리',
            'index.add(vectors)',
            '',
            '# top-5 검색',
            'query = np.random.random((1, d)).astype("float32")',
            'D, I = index.search(query, k=5)   # 거리, 인덱스',
            '',
            '# 핵심:',
            '#   - 모든 50,000 벡터와 쿼리 거리 일일이 계산',
            '#   - O(N * d) 시간, recall 100% (exact)',
            '#   - 10만 건 이상이면 너무 느림 → IVF/HNSW',
          ],
          highlight: [11, 12, 16, 19, 20, 21, 22],
        },
      },
      {
        title: 'Step 2. IVF — k-means 클러스터링 후 nearest cluster만',
        desc: 'Inverted File. 벡터를 k-means로 nlist개 군집(예: 100개)으로 미리 묶어둔다. 검색 시 쿼리와 가까운 nprobe개 군집만 탐색 → N개에서 N/nlist개로 검색 범위 축소. nprobe를 키우면 정확도 ↑ 속도 ↓.',
        activeId: 'ivf',
        viz: 'ivf',
        query: { x: 200, y: 130 },
        metric: 'O(N/nlist) — nearest 군집만 검색',
        code: {
          lang: 'python',
          filename: 'ivf.py',
          lines: [
            '"""IVF — k-means 군집화 후 nearest cluster만 탐색."""',
            'import faiss',
            'import numpy as np',
            '',
            'd, n = 128, 50_000',
            'vectors = np.random.random((n, d)).astype("float32")',
            '',
            '# 양자화기(quantizer) — 군집 중심 찾는 데 사용',
            'quantizer = faiss.IndexFlatL2(d)',
            '',
            '# IVF 인덱스 — nlist개 군집으로 분할',
            'nlist = 100   # 50,000 → 100 군집',
            'index = faiss.IndexIVFFlat(quantizer, d, nlist)',

            '# train 필수 — k-means로 군집 중심 학습',
            'index.train(vectors)',
            'index.add(vectors)',
            '',
            '# 검색 — nprobe로 탐색 군집 수 조절',
            'index.nprobe = 10   # 100개 중 10개만',
            'query = np.random.random((1, d)).astype("float32")',
            'D, I = index.search(query, k=5)',
            '',
            '# 핵심:',
            '#   - 검색 범위: 50,000 → 5,000 (10배 빠름)',

            '#   - 권장: nprobe ≈ sqrt(nlist)',
          ],
          highlight: [12, 13, 16, 17, 20, 24, 25, 26, 27],
        },
      },
      {
        title: 'Step 3. HNSW — 다층 그래프 (top: sparse, bottom: dense)',
        desc: 'Hierarchical Navigable Small World. 벡터를 다층 그래프로 만든다. 위층은 노드가 적고 멀리 점프(고속도로), 아래층은 dense하게 연결. top에서 시작 → 가까운 이웃으로 greedy하게 이동 → 한 층 내려가서 더 정밀하게. log(N) 시간 — 매우 빠름. 단점: 메모리 많이 먹음.',
        activeId: 'hnsw',
        viz: 'hnsw',
        query: { x: 290, y: 130 },
        metric: 'O(log N) — 다층 그래프 traverse',
        code: {
          lang: 'python',
          filename: 'hnsw.py',
          lines: [
            '"""HNSW — 다층 그래프 기반 ANN, log(N) 탐색."""',
            'import faiss',
            'import numpy as np',
            '',
            'd, n = 128, 50_000',
            'vectors = np.random.random((n, d)).astype("float32")',
            '',
            '# HNSW — M: 각 노드의 이웃 연결 수',
            'M = 32   # ↑일수록 dense, 메모리 ↑, 정확도 ↑',
            'index = faiss.IndexHNSWFlat(d, M)',
            '',
            '# 빌드/검색 시 탐색 폭',

            '',
            '# train 불필요 (구조 자체가 학습 결과)',
            'index.add(vectors)',
            '',
            '# 검색 — top층에서 greedy → 아래층 정밀',
            'query = np.random.random((1, d)).astype("float32")',
            'D, I = index.search(query, k=5)',
            '',
            '# 핵심:',
            '#   - top층 sparse(고속도로) → bottom dense(지방도)',
            '#   - 시간 O(log N) — 매우 빠름',
            '#   - 메모리: 그래프 엣지 저장으로 ~1.5x raw',
            '#   - Pinecone/Milvus/Qdrant 상용 DB 기본 알고리즘',
          ],
          highlight: [9, 10, 13, 14, 24, 25, 26, 27, 28],
        },
      },
      {
        title: 'Step 4. PQ — 차원 분할 후 k-means 코드북 (메모리 1/8)',
        desc: 'Product Quantization. 128차원 벡터를 m=8개 서브벡터(각 16차원)로 쪼갠다. 각 서브공간에서 k-means로 256개 코드북 생성 → 16차원 float(64B)을 8bit ID(1B)로 압축. 전체 벡터: 128*4=512B → 8*1=8B (1/64). 정확도는 좀 떨어지지만 10억 벡터 메모리 적재 가능.',
        activeId: 'pq',
        viz: 'pq',
        query: { x: 200, y: 130 },
        metric: '메모리 1/8 ~ 1/64 — 압축 표현',
        code: {
          lang: 'python',
          filename: 'pq.py',
          lines: [
            '"""PQ — Product Quantization, 메모리 대폭 절약."""',
            'import faiss',
            'import numpy as np',
            '',
            'd, n = 128, 50_000',
            'vectors = np.random.random((n, d)).astype("float32")',
            '',
            '# PQ — m: 서브벡터 수, nbits: 코드북 비트',
            'm = 8       # 128차원 → 8개 서브공간 (각 16차원)',
            'nbits = 8   # 각 서브공간 256 코드북 (2^8)',
            'index = faiss.IndexPQ(d, m, nbits)',
            '',
            '# train — 서브공간마다 k-means 256 중심 학습',
            'index.train(vectors)',
            'index.add(vectors)',
            '',
            '# 메모리 비교',
            '#   raw    : 128 * 4 byte = 512 byte/벡터',
            '#   PQ(8,8): 8   * 1 byte =   8 byte/벡터  (1/64)',
            '#   50,000 벡터: 25 MB → 0.4 MB',
            '',
            'query = np.random.random((1, d)).astype("float32")',
            'D, I = index.search(query, k=5)',
            '',
            '# 핵심:',
            '#   - 손실 압축: recall 10~30% 손실',
            '#   - 압축 코드 ID로 거리 근사 계산',
            '#   - 10억 벡터급 필수 (raw로 RAM 적재 불가)',
            '#   - 실전: IndexIVFPQ — 군집화 + 압축 조합',
          ],
          highlight: [9, 10, 11, 14, 15, 18, 19, 20, 27, 28, 29, 30],
        },
      },
      {
        title: 'Step 5. 비교 표 — 정확도 / 메모리 / 속도',
        desc: '4가지 인덱스의 트레이드오프 정리. 정확도가 최우선이면 Flat, 균형이면 IVF, 최고 속도면 HNSW, 메모리 제약이 심하면 PQ. 실전에서는 IVF + PQ 조합(IndexIVFPQ)이 가장 자주 쓰인다 — 군집으로 검색 좁히고, 압축으로 RAM 절약.',
        activeId: null,
        viz: 'compare',
        query: null,
        metric: null,
        code: {
          lang: 'markdown',
          filename: 'compare.md',
          lines: [
            '# FAISS 4 인덱스 비교 — 어떤 걸 언제 쓸까',
            '',

            '- Flat : 모든 벡터와 거리 계산 (brute force)',
            '- IVF  : k-means 군집화 → nearest 군집만 탐색',
            '- HNSW : 다층 그래프 → log(N) 시간',
            '- PQ   : 벡터 압축 (서브공간 코드북)',
            '',
            '## 2. 정확도 (recall@10)',
            '- Flat : 100% (exact)',
            '- IVF  : 95~99% (nprobe로 조절)',
            '- HNSW : 95~99% (efSearch로 조절)',
            '- PQ   : 70~90% (압축 손실)',
            '',
            '## 3. 메모리 (50,000 x 128차원 float32 기준)',

            '- IVF  : 25 MB + 군집 중심 (작음)',
            '- HNSW : ~37 MB (그래프 엣지 추가)',

            '',
            '## 4. 검색 속도 (10만 건, top-10)',
            '- Flat : 100ms (선형)',
            '- IVF  : 10ms (10배 ↑)',
            '- HNSW : 1ms  (100배 ↑)',
            '- PQ   : 5ms  (압축 거리 근사)',
            '',
            '## 5. 사용 권장',
            '- 10만 건 이하 + 정확도 100%   → Flat',
            '- 100만 건 + 균형              → IVF',
            '- 1000만 건 + 최고 속도        → HNSW',
            '- 1억 건 이상 + RAM 제약       → IVF + PQ',
            '',
            '## 6. 실전 조합',
            '- IndexIVFPQ : IVF로 검색 좁히고 PQ로 압축',
            '- IndexIVFFlat + GPU : 큰 데이터 + GPU 가속',
            '- HNSW : Pinecone/Milvus/Qdrant 등 상용 DB 기본',
          ],
          highlight: [4, 5, 6, 7, 10, 11, 12, 13, 28, 29, 30, 31, 36, 37],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 공통: 격자 배경 + 쿼리 점 (Q)
    // ─────────────────────────────────────────────────────
    function GridBg({ id, w, h }) {
      return (
        <>
          <defs>
            <pattern id={id} width="30" height="30" patternUnits="userSpaceOnUse">
              <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e9d5ff" strokeWidth="0.5" />
            </pattern>
          </defs>
          <rect width={w} height={h} fill={`url(#${id})`} />
        </>
      );
    }

    function QueryDot({ x, y, r = 10 }) {
      return (
        <g>
          <circle cx={x} cy={y} r={20} fill="none" stroke="#f59e0b" strokeWidth="2" opacity="0.5">
            <animate attributeName="r" from="14" to="24" dur="1.4s" repeatCount="indefinite" />
            <animate attributeName="opacity" from="0.7" to="0" dur="1.4s" repeatCount="indefinite" />
          </circle>
          <circle cx={x} cy={y} r={r} fill="#f59e0b" stroke="#b45309" strokeWidth="2" />
          <text x={x} y={y + 3} textAnchor="middle" fontSize="11" fontWeight="bold" fill="white">Q</text>
        </g>
      );
    }

    // ─────────────────────────────────────────────────────
    // SVG 1. Flat — 모든 점 검사 (펄스 애니메이션)
    // ─────────────────────────────────────────────────────
    function FlatViz({ query }) {
      const w = 380, h = 240;
      const points = React.useMemo(() => Array.from({ length: 50 }, (_, i) => ({
        x: 30 + (i % 10) * 35 + Math.random() * 10,
        y: 25 + Math.floor(i / 10) * 40 + Math.random() * 10,
        id: i,
      })), []);

      return (
        <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
          <GridBg id="grid-flat" w={w} h={h} />
          {points.map((p) => (
            <g key={p.id}>
              <circle cx={p.x} cy={p.y} r={5} fill="#a78bfa" stroke="#7c3aed" strokeWidth="1" opacity="0.85" />
              <circle cx={p.x} cy={p.y} r={5} fill="none" stroke="#dc2626" strokeWidth="1.5" opacity="0.8">
                <animate attributeName="r" from="5" to="11" dur="1.5s" repeatCount="indefinite" begin={`${(p.id % 10) * 0.1}s`} />
                <animate attributeName="opacity" from="0.8" to="0" dur="1.5s" repeatCount="indefinite" begin={`${(p.id % 10) * 0.1}s`} />
              </circle>
            </g>
          ))}
          <QueryDot x={query.x} y={query.y} />
          <text x={w / 2} y={h - 8} textAnchor="middle" fontSize="10" fill="#7c3aed" fontFamily="monospace">
            모든 50개 점 일일이 거리 계산 (brute force)
          </text>
        </svg>
      );
    }

    // ─────────────────────────────────────────────────────
    // SVG 2. IVF — 군집 + nearest cluster만
    // ─────────────────────────────────────────────────────
    function IvfViz({ query }) {
      const w = 380, h = 240;
      const clusters = [
        { cx: 80,  cy: 70,  color: '#3b82f6', label: 'C1' },
        { cx: 260, cy: 60,  color: '#10b981', label: 'C2' },
        { cx: 90,  cy: 170, color: '#f59e0b', label: 'C3' },
        { cx: 280, cy: 170, color: '#ec4899', label: 'C4' },
      ];
      const dists = clusters.map((c) => Math.hypot(c.cx - query.x, c.cy - query.y));
      const nearestIdx = dists.indexOf(Math.min(...dists));
      const points = React.useMemo(() => clusters.flatMap((c, ci) =>
        Array.from({ length: 12 }, (_, i) => {
          const angle = (i / 12) * Math.PI * 2;
          const radius = 18 + Math.random() * 22;
          return { x: c.cx + Math.cos(angle) * radius, y: c.cy + Math.sin(angle) * radius, cluster: ci, id: `${ci}-${i}` };
        })
      ), []);

      return (
        <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
          <GridBg id="grid-ivf" w={w} h={h} />
          {clusters.map((c, i) => {
            const active = i === nearestIdx;
            return (
              <g key={`cl${i}`}>
                <circle cx={c.cx} cy={c.cy} r={45} fill={c.color}
                  fillOpacity={active ? 0.18 : 0.06} stroke={c.color}
                  strokeWidth={active ? 2.5 : 1} strokeDasharray={active ? '0' : '4 3'}
                  opacity={active ? 1 : 0.5} />
                <text x={c.cx} y={c.cy - 50} textAnchor="middle" fontSize="11"
                  fontWeight="bold" fill={c.color} fontFamily="monospace">{c.label}</text>
              </g>
            );
          })}
          {points.map((p) => {
            const active = p.cluster === nearestIdx;
            const c = clusters[p.cluster];
            return (
              <circle key={p.id} cx={p.x} cy={p.y} r={active ? 4 : 3}
                fill={active ? c.color : '#cbd5e1'} stroke={active ? c.color : '#94a3b8'}
                strokeWidth="1" opacity={active ? 1 : 0.4} />
            );
          })}
          <line x1={query.x} y1={query.y} x2={clusters[nearestIdx].cx} y2={clusters[nearestIdx].cy}
            stroke="#dc2626" strokeWidth="2" strokeDasharray="5 3" opacity="0.7" />
          <QueryDot x={query.x} y={query.y} />
          <text x={w / 2} y={h - 8} textAnchor="middle" fontSize="10" fill="#7c3aed" fontFamily="monospace">
            nprobe=1 → 가장 가까운 군집({clusters[nearestIdx].label})만 검색
          </text>
        </svg>
      );
    }

    // ─────────────────────────────────────────────────────
    // SVG 3. HNSW — 다층 그래프 traverse
    // ─────────────────────────────────────────────────────
    function HnswViz({ query }) {
      const w = 380, h = 240;

      // 3개 층 — top: 4, mid: 8, bottom: 16 노드
      const layers = [
        { y: 50,  label: 'L2 (sparse)', nodes: [60, 150, 240, 330].map((x, i) => ({ x, id: `t${i}` })) },
        { y: 120, label: 'L1',          nodes: [50, 100, 145, 195, 240, 285, 320, 350].map((x, i) => ({ x, id: `m${i}` })) },
        { y: 200, label: 'L0 (dense)',  nodes: Array.from({ length: 16 }, (_, i) => ({ x: 30 + i * 22, id: `b${i}` })) },
      ];

      // traverse 경로: t2(240) → m5(285) → b12(294) → query
      const path = ['t2', 'm5', 'b12'];

      // 같은 층 인접 엣지
      const intraEdges = [];
      layers.forEach((layer) => {
        for (let i = 0; i < layer.nodes.length - 1; i++) {
          intraEdges.push({ x1: layer.nodes[i].x, y1: layer.y, x2: layer.nodes[i + 1].x, y2: layer.y });
        }
      });

      // 층 간 대표 엣지
      const interPairs = [[0, 0, 1, 1], [0, 1, 1, 2], [0, 2, 1, 5], [0, 3, 1, 7],
                         [1, 1, 2, 2], [1, 2, 2, 5], [1, 5, 2, 12], [1, 7, 2, 15]];
      const interEdges = interPairs.map(([la, na, lb, nb]) => ({
        from: layers[la].nodes[na], fromY: layers[la].y,
        to:   layers[lb].nodes[nb], toY:   layers[lb].y,
      }));

      // path 좌표 추출
      const pathCoords = path.map((id) => {
        for (const layer of layers) {
          const n = layer.nodes.find((nn) => nn.id === id);
          if (n) return { x: n.x, y: layer.y, id };
        }
        return null;
      });

      const isOnPath = (id) => path.includes(id);

      const lastP = pathCoords[pathCoords.length - 1];
      return (
        <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
          <defs>
            <marker id="hnsw-arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
              <path d="M0,0 L8,4 L0,8 Z" fill="#dc2626" />
            </marker>
          </defs>
          {/* 층 라벨 */}
          {layers.map((l, i) => (
            <text key={`lbl${i}`} x={5} y={l.y + 4} fontSize="9" fill="#7c3aed" fontFamily="monospace" opacity="0.8">{l.label}</text>
          ))}
          {/* 같은 층 / 층 간 엣지 */}
          {intraEdges.map((e, i) => (
            <line key={`ie${i}`} x1={e.x1} y1={e.y1} x2={e.x2} y2={e.y2} stroke="#cbd5e1" strokeWidth="1" opacity="0.6" />
          ))}
          {interEdges.map((e, i) => (
            <line key={`xe${i}`} x1={e.from.x} y1={e.fromY} x2={e.to.x} y2={e.toY} stroke="#cbd5e1" strokeWidth="1" opacity="0.5" strokeDasharray="3 2" />
          ))}
          {/* traverse 경로 (빨간 화살표) */}
          {pathCoords.slice(0, -1).map((from, i) => {
            const to = pathCoords[i + 1];
            return <line key={`pe${i}`} x1={from.x} y1={from.y} x2={to.x} y2={to.y} stroke="#dc2626" strokeWidth="2.5" opacity="0.9" markerEnd="url(#hnsw-arrow)" />;
          })}
          {lastP && (
            <line x1={lastP.x} y1={lastP.y} x2={query.x} y2={query.y} stroke="#dc2626" strokeWidth="2.5" opacity="0.9" strokeDasharray="3 2" markerEnd="url(#hnsw-arrow)" />
          )}
          {/* 노드 */}
          {layers.map((layer) => layer.nodes.map((n) => {
            const active = isOnPath(n.id);
            return (
              <g key={n.id}>
                {active && (
                  <circle cx={n.x} cy={layer.y} r={11} fill="none" stroke="#dc2626" strokeWidth="2" opacity="0.5">
                    <animate attributeName="r" from="9" to="15" dur="1.4s" repeatCount="indefinite" />
                    <animate attributeName="opacity" from="0.7" to="0" dur="1.4s" repeatCount="indefinite" />
                  </circle>
                )}
                <circle cx={n.x} cy={layer.y} r={active ? 6 : 4} fill={active ? '#dc2626' : '#a78bfa'} stroke={active ? '#991b1b' : '#7c3aed'} strokeWidth="1.5" />
              </g>
            );
          }))}
          <QueryDot x={query.x} y={query.y} r={9} />
          <text x={w / 2} y={h - 5} textAnchor="middle" fontSize="9" fill="#7c3aed" fontFamily="monospace">
            top → mid → bottom traverse · 빨간 경로 = greedy 탐색
          </text>
        </svg>
      );
    }

    // ─────────────────────────────────────────────────────
    // SVG 4. PQ — 벡터 압축 (서브공간 코드북)
    // ─────────────────────────────────────────────────────
    function PqViz() {
      const w = 380, h = 240;
      const cellW = 18, startX = 30, startY = 35;
      const subColors = ['#3b82f6', '#10b981', '#f59e0b', '#ec4899'];
      const codebookIds = [2, 0, 3, 1];   // 각 서브공간 코드북 ID
      const subCenter = (i) => startX + i * 4 * cellW + 2 * cellW - 0.5;

      return (
        <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
          <defs>
            <pattern id="grid-pq" width="30" height="30" patternUnits="userSpaceOnUse">
              <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e9d5ff" strokeWidth="0.5" />
            </pattern>
            {subColors.map((c, i) => (
              <marker key={`m${i}`} id={`pq-arr-${i}`} markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
                <path d="M0,0 L6,3 L0,6 Z" fill={c} />
              </marker>
            ))}
          </defs>
          <rect width={w} height={h} fill="url(#grid-pq)" />

          {/* 원본 벡터 16 float */}
          <text x={startX} y={startY - 8} fontSize="10" fontWeight="bold" fill="#7c3aed" fontFamily="monospace">원본 벡터: 16 float (64 byte)</text>
          {Array.from({ length: 16 }).map((_, i) => {
            const subIdx = Math.floor(i / 4);
            return (
              <g key={`raw${i}`}>
                <rect x={startX + i * cellW} y={startY} width={cellW - 1} height={cellW} fill={subColors[subIdx]} fillOpacity="0.25" stroke={subColors[subIdx]} strokeWidth="1" />
                <text x={startX + i * cellW + cellW / 2 - 0.5} y={startY + cellW / 2 + 3} textAnchor="middle" fontSize="7" fill="#475569" fontFamily="monospace">{(((i * 37) % 9) / 10 + 0.1).toFixed(1)}</text>
              </g>
            );
          })}

          {/* 서브공간 라벨 + split 화살표 */}
          {[0, 1, 2, 3].map((i) => (
            <g key={`sl${i}`}>
              <text x={subCenter(i)} y={startY + cellW + 12} textAnchor="middle" fontSize="8" fill={subColors[i]} fontWeight="bold" fontFamily="monospace">sub{i + 1}</text>
              <path d={`M ${subCenter(i)},${startY + cellW + 16} L ${subCenter(i)},${startY + cellW + 32}`}
                stroke={subColors[i]} strokeWidth="1.5" markerEnd={`url(#pq-arr-${i})`} />
            </g>
          ))}

          {/* 코드북 lookup */}
          <text x={startX} y={startY + cellW + 50} fontSize="10" fontWeight="bold" fill="#7c3aed" fontFamily="monospace">k-means 코드북 lookup (각 256개 중 1개)</text>
          {codebookIds.map((id, i) => {
            const cx = subCenter(i), cy = startY + cellW + 70;
            return (
              <g key={`cb${i}`}>
                <rect x={cx - 22} y={cy} width={44} height={26} rx="4"
                  fill={subColors[i]} fillOpacity="0.15" stroke={subColors[i]} strokeWidth="1.5" />
                <text x={cx} y={cy + 12} textAnchor="middle" fontSize="8" fill={subColors[i]} fontFamily="monospace" fontWeight="bold">ID</text>
                <text x={cx} y={cy + 22} textAnchor="middle" fontSize="11" fill={subColors[i]} fontFamily="monospace" fontWeight="bold">{id.toString().padStart(2, '0')}</text>
                <path d={`M ${cx},${cy + 30} L ${cx},${cy + 46}`} stroke={subColors[i]} strokeWidth="1.5" markerEnd={`url(#pq-arr-${i})`} />
              </g>
            );
          })}
          {/* 압축 결과 4 byte */}
          <text x={startX} y={startY + cellW + 132} fontSize="10" fontWeight="bold" fill="#dc2626" fontFamily="monospace">압축 결과: 4 byte (1/16 메모리!)</text>
          {codebookIds.map((id, i) => {
            const cx = subCenter(i), cy = startY + cellW + 140;
            return (
              <g key={`cmp${i}`}>
                <rect x={cx - 16} y={cy} width={32} height={20} rx="2" fill={subColors[i]} stroke={subColors[i]} strokeWidth="2" />
                <text x={cx} y={cy + 14} textAnchor="middle" fontSize="11" fill="white" fontFamily="monospace" fontWeight="bold">{id.toString().padStart(2, '0')}</text>
              </g>
            );
          })}
        </svg>
      );
    }

    // ─────────────────────────────────────────────────────
    // 비교 표 (Step 5)
    // ─────────────────────────────────────────────────────
    function CompareTable() {
      const rows = [
        ['알고리즘',     'brute force', 'k-means 군집',  '다층 그래프',     '서브공간 코드북'],
        ['시간 복잡도',  'O(N)',        'O(N/nlist)',    'O(log N)',        'O(N) (작은 상수)'],
        ['정확도',       '100%',        '95~99%',        '95~99%',          '70~90%'],
        ['메모리',       '1x (raw)',    '1x + α',        '~1.5x',           '1/8 ~ 1/64'],
        ['속도',         '⭐',          '⭐⭐⭐⭐',       '⭐⭐⭐⭐⭐',        '⭐⭐⭐⭐'],
        ['train 필요',   '✗',           '✓ (k-means)',   '✗',               '✓ (k-means)'],
        ['추천 규모',    '~10만',       '~1000만',       '~1000만',         '~10억'],
        ['튜닝 파라미터', '없음',        'nlist, nprobe', 'M, efSearch',     'm, nbits'],
      ];
      const headColors = ['text-blue-700', 'text-emerald-700', 'text-purple-700', 'text-amber-700'];
      return (
        <div className="rounded-lg bg-white border-2 border-purple-300 overflow-hidden">
          <div className="bg-purple-100 px-3 py-2 border-b border-purple-200">
            <div className="text-xs font-bold text-purple-900">📊 4 인덱스 트레이드오프 비교</div>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-[11px]">
              <thead>
                <tr className="bg-purple-50 text-left">
                  <th className="px-2 py-2 font-bold text-purple-700">기준</th>
                  {['Flat', 'IVF', 'HNSW', 'PQ'].map((n, i) => (
                    <th key={n} className={`px-2 py-2 font-bold ${headColors[i]}`}>{n}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map((r, i) => (
                  <tr key={r[0]} className={i % 2 === 0 ? 'bg-white' : 'bg-purple-50/40'}>
                    <td className="px-2 py-1.5 font-bold text-slate-700 border-r border-slate-100">{r[0]}</td>
                    {r.slice(1).map((c, j) => (
                      <td key={j} className="px-2 py-1.5 text-slate-700 font-mono">{c}</td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

      );

    // ─────────────────────────────────────────────────────
    // 인덱스 카드 (4개 가로 grid)
    // ─────────────────────────────────────────────────────
    function IndexCards({ activeId }) {
      const styles = {
        flat: { bg: 'bg-blue-50',     border: 'border-blue-300',     text: 'text-blue-800',     dot: 'bg-blue-500' },
        ivf:  { bg: 'bg-emerald-50',  border: 'border-emerald-300',  text: 'text-emerald-800',  dot: 'bg-emerald-500' },
        hnsw: { bg: 'bg-purple-50',   border: 'border-purple-300',   text: 'text-purple-800',   dot: 'bg-purple-500' },
        pq:   { bg: 'bg-amber-50',    border: 'border-amber-300',    text: 'text-amber-800',    dot: 'bg-amber-500' },
      };

      return (
        <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
          {INDEXES.map((idx) => {
            const s = styles[idx.id];
            const isActive = activeId === idx.id;
            const isDimmed = activeId && !isActive;
            return (
              <div key={idx.id}
                className={`p-2 rounded-lg border-2 transition-all duration-500 ${s.bg} ${s.border} ${
                  isActive ? 'scale-105 shadow-lg ring-2 ring-offset-1 ring-purple-400' : ''
                } ${isDimmed ? 'opacity-40' : ''}`}>
                <div className="flex items-center gap-1.5 mb-1">
                  <div className={`w-6 h-6 ${s.dot} text-white rounded flex items-center justify-center font-bold text-[10px]`}>{idx.short}</div>
                  <div className={`text-[10px] font-bold ${s.text} font-mono`}>{idx.name}</div>
                </div>
                <div className="text-[9px] text-slate-600 mb-1">{idx.analogy}</div>
                <div className="text-[8px] text-slate-500 leading-tight">
                  정확 <span className="font-bold text-slate-700">{'★'.repeat(idx.accuracy)}</span><br/>
                  메모 <span className="font-bold text-slate-700">{'★'.repeat(idx.memory)}</span><br/>
                  속도 <span className="font-bold text-slate-700">{'★'.repeat(idx.speed)}</span>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 4 카드 + 알고리즘 시각화
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const VizComponent = {
        flat: <FlatViz query={step.query} />,
        ivf:  <IvfViz query={step.query} />,
        hnsw: <HnswViz query={step.query} />,
        pq:   <PqViz />,
      }[step.viz];

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 도서관 사서 — FAISS 4 인덱스</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>
          <IndexCards activeId={step.activeId} />
          <div className="mt-4">
            {step.viz === 'compare' ? <CompareTable /> : (
              <div className="rounded-lg bg-gradient-to-br from-purple-50 to-purple-100 border border-purple-200 p-2">
                <div className="text-[11px] font-bold text-purple-800 mb-1 flex items-center gap-1"><span>🔍</span><span>알고리즘 동작 시각화</span></div>
                {VizComponent}
              </div>
            )}
          </div>
          {step.metric && (
            <div className="mt-3 rounded-lg bg-purple-600 text-white p-3 flex items-center gap-2 shadow-sm">
              <span className="text-lg leading-none">⚡</span>
              <div className="flex-1">
                <div className="text-[10px] uppercase tracking-wider text-purple-200 font-bold">핵심</div>
                <div className="text-sm font-bold mt-0.5 font-mono">{step.metric}</div>
              </div>
            </div>
          )}

          {/* 범례 */}
          {step.viz !== 'compare' && (
            <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
              <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full" style={{ background: '#a78bfa' }}></span>데이터 벡터</span>
              <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full" style={{ background: '#f59e0b' }}></span>쿼리(Q)</span>
              <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full" style={{ background: '#dc2626' }}></span>활성 검색</span>
              <span className="flex items-center gap-1 ml-auto"><span className="w-2.5 h-2.5 rounded-full bg-slate-300"></span>미검색</span>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[36rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-purple-500/15 border-l-2 border-purple-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);
      const step = STEPS[stepIdx];

      const handleNext = () => setStepIdx((i) => {
        if (i >= STEPS.length - 1) { setIsPlaying(false); return i; }
        return i + 1;
      });
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;
      const togglePlay = () => { if (stepIdx >= STEPS.length - 1) setStepIdx(0); setIsPlaying((p) => !p); };
      const handleReset = () => { setStepIdx(0); setIsPlaying(false); };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-purple-700 hover:text-purple-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. FAISS &gt; Chapter 1. FAISS 기초</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">FAISS 인덱스 종류 — Flat / IVF / HNSW / PQ</h1>
                  <p className="text-sm text-slate-500 mt-0.5">4가지 인덱스의 알고리즘 시각화 + 트레이드오프 비교</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-purple-50 border-2 border-purple-300 rounded-xl p-3 text-sm text-purple-900">
                💡 다음(II-2-1)에서는 <strong>FAISS 실전 워크플로우</strong> — 데이터 준비 → 인덱스 빌드 → 저장/로드 → 쿼리를 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-purple-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={handleReset} disabled={stepIdx === 0 && !isPlaying} aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={handlePrev} disabled={stepIdx === 0} aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-purple-600 text-white hover:bg-purple-700 transition min-w-[100px]">
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1} aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; II-1-1 FAISS란</a>
              <a href="./II-2-1.html" className="text-purple-700 hover:text-purple-900 font-medium">II-2-1 FAISS 실전 워크플로우 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
