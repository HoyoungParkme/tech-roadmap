<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB — II-2-1. FAISS 실전 워크플로우 — 빌드부터 검색까지</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PIPELINE = [
      { num: '1', label: '데이터 준비', icon: 'D', color: 'bg-slate-500' },
      { num: '2', label: '임베딩 생성', icon: 'E', color: 'bg-blue-500' },
      { num: '3', label: '인덱스 빌드', icon: 'I', color: 'bg-orange-500' },
      { num: '4', label: '학습 (train)', icon: 'T', color: 'bg-green-500' },
      { num: '5', label: '검색 (search)', icon: 'S', color: 'bg-purple-500' },
      { num: '6', label: '저장/로드', icon: 'P', color: 'bg-amber-500' },
    ];

    const STEPS = [
      {
        desc: "FAISS 실전 프로젝트는 6단계 파이프라인을 따릅니다. 데이터 준비 → 임베딩 생성 → 인덱스 빌드 → 학습(train) → 검색(search) → 저장/로드. 공장 조립 라인처럼 순서대로 진행하면 됩니다.",
        activeStep: -1,
        code: `# FAISS 실전 파이프라인 전체 흐름\n\n# 1. 데이터 준비\ntexts = load_documents("data/")\n\n# 2. 임베딩 생성\nembeddings = embed_model.encode(texts)\n\n# 3. 인덱스 빌드\nindex = faiss.IndexIVFFlat(quantizer, d, nlist)\n\n# 4. 학습\nindex.train(embeddings)\nindex.add(embeddings)\n\n# 5. 검색\nD, I = index.search(query_vec, k=5)\n\n# 6. 저장\nfaiss.write_index(index, "my_index.faiss")`,
        tip: '각 단계를 하나씩 자세히 살펴봅시다',
      },
      {
        desc: "1단계: 데이터 준비. 원본 텍스트를 청크(chunk)로 분할합니다. 보통 500~1000자 단위로 나누고, 50~100자의 오버랩(overlap)을 줍니다. 오버랩이 없으면 문맥이 잘리는 문제가 생깁니다.",
        activeStep: 0,
        code: `# 1. 데이터 준비 — 텍스트 청킹\nfrom langchain.text_splitter import (\n    RecursiveCharacterTextSplitter\n)\n\n# 원본 문서 로드\nwith open("document.txt", "r") as f:\n    text = f.read()\n\n# 청크 분할\nsplitter = RecursiveCharacterTextSplitter(\n    chunk_size=500,     # 500자 단위\n    chunk_overlap=50,   # 50자 오버랩\n    separators=["\\n\\n", "\\n", " ", ""]\n)\nchunks = splitter.split_text(text)\nprint(f"총 {len(chunks)}개 청크 생성")`,
        tip: 'chunk_size는 임베딩 모델의 max_tokens에 맞춰 조절합니다',
      },
      {
        desc: "2단계: 임베딩 생성. 각 청크를 벡터(숫자 배열)로 변환합니다. OpenAI, Sentence-Transformers, Cohere 등 다양한 모델을 사용할 수 있습니다. 벡터 차원(d)은 모델마다 다릅니다.",
        activeStep: 1,
        code: `# 2. 임베딩 생성\nimport numpy as np\nfrom sentence_transformers import SentenceTransformer\n\n# 임베딩 모델 로드\nmodel = SentenceTransformer(\n    "all-MiniLM-L6-v2"  # 384차원\n)\n\n# 배치 단위로 임베딩 생성\nembeddings = model.encode(\n    chunks,\n    batch_size=64,\n    show_progress_bar=True,\n    normalize_embeddings=True\n)\n\n# numpy float32로 변환 (FAISS 요구사항)\nembeddings = np.array(embeddings).astype("float32")\nprint(f"Shape: {embeddings.shape}")  \n# (N, 384) — N개 문서, 384차원`,
        tip: 'FAISS는 float32만 지원합니다. astype("float32") 필수!',
      },
      {
        desc: "3단계: 인덱스 선택과 빌드. 데이터 규모에 따라 인덱스를 선택합니다. 10만 건 이하면 Flat, 10만~1000만이면 IVF, 속도 최우선이면 HNSW. IVF 사용 시 train()이 필수입니다.",
        activeStep: 2,
        code: `# 3. 인덱스 빌드 — 규모별 선택\nimport faiss\n\nd = embeddings.shape[1]  # 384\nn = embeddings.shape[0]  # 벡터 수\n\n# 규모별 인덱스 선택\nif n < 100_000:\n    # 소규모: Flat (전수 검색)\n    index = faiss.IndexFlatL2(d)\n\nelif n < 10_000_000:\n    # 중규모: IVF\n    nlist = int(np.sqrt(n))  # 클러스터 수\n    quantizer = faiss.IndexFlatL2(d)\n    index = faiss.IndexIVFFlat(\n        quantizer, d, nlist\n    )\n\nelse:\n    # 대규모: IVF + PQ\n    nlist = 4096\n    m = 48  # 서브벡터 수\n    quantizer = faiss.IndexFlatL2(d)\n    index = faiss.IndexIVFPQ(\n        quantizer, d, nlist, m, 8\n    )`,
        tip: 'nlist(클러스터 수)는 보통 sqrt(N)으로 설정합니다',
      },
      {
        desc: "4단계: 학습(train)과 벡터 추가(add). IVF 계열 인덱스는 반드시 train()을 먼저 호출해야 합니다. train()은 클러스터 중심점을 학습하는 과정입니다. Flat 인덱스는 train 불필요.",
        activeStep: 3,
        code: `# 4. 학습 + 벡터 추가\n\n# IVF 인덱스는 train() 필수\nif not index.is_trained:\n    print("인덱스 학습 중...")\n    index.train(embeddings)\n    print("학습 완료!")\n\n# 벡터 추가\nindex.add(embeddings)\nprint(f"저장된 벡터: {index.ntotal}")\n\n# 배치 추가 (대규모 데이터)\nbatch_size = 10_000\nfor i in range(0, n, batch_size):\n    batch = embeddings[i:i+batch_size]\n    index.add(batch)\n    print(f"  {i+len(batch)}/{n} 추가 완료")\n\n# ID를 직접 지정하려면:\n# index = faiss.IndexIDMap(index)\n# index.add_with_ids(embeddings, ids)`,
        tip: 'train()은 전체 데이터 중 일부로도 가능합니다 (대규모 시 샘플링)',
      },
      {
        desc: "5단계: 검색. 쿼리 벡터를 만들고 search()를 호출합니다. IVF 인덱스는 nprobe(탐색할 클러스터 수)를 조절해 속도와 정확도의 균형을 맞춥니다.",
        activeStep: 4,
        code: `# 5. 검색\n\n# 쿼리 임베딩 생성\nquery_text = "강아지 훈련 방법"\nquery_vec = model.encode([query_text])\nquery_vec = np.array(query_vec).astype("float32")\n\n# IVF 인덱스: nprobe 설정\nif hasattr(index, 'nprobe'):\n    index.nprobe = 10  # 기본값 1, 높일수록 정확\n\n# 검색 실행\nk = 5  # 상위 5개\nD, I = index.search(query_vec, k)\n\n# 결과 출력\nfor rank, (idx, dist) in enumerate(zip(I[0], D[0])):\n    if idx == -1:  # 결과 없음\n        continue\n    print(f"{rank+1}위: {chunks[idx][:80]}...")\n    print(f"   거리: {dist:.4f}")`,
        tip: 'nprobe를 높이면 정확도 증가, 속도 감소. 보통 1~20 범위에서 조절',
      },
      {
        desc: "6단계: 인덱스 저장과 로드. write_index()로 파일에 저장하고, read_index()로 불러옵니다. 인덱스 빌드는 시간이 오래 걸릴 수 있으므로, 한 번 빌드 후 저장해두는 것이 필수입니다.",
        activeStep: 5,
        code: `# 6. 인덱스 저장/로드\n\n# 인덱스 저장\nfaiss.write_index(index, "my_index.faiss")\nprint("인덱스 저장 완료!")\n\n# 인덱스 로드\nindex = faiss.read_index("my_index.faiss")\nprint(f"로드 완료: {index.ntotal}개 벡터")\n\n# 주의: 원본 문서는 별도 저장 필요!\nimport pickle\nwith open("chunks.pkl", "wb") as f:\n    pickle.dump(chunks, f)\n\n# 로드 시\nwith open("chunks.pkl", "rb") as f:\n    chunks = pickle.load(f)\n\n# FAISS는 벡터만 저장!\n# 원본 데이터 매핑은 직접 관리해야 함`,
        tip: 'FAISS 인덱스 파일 + 원본 데이터 파일을 함께 관리하세요',
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-orange-700 hover:text-orange-900 font-medium">
                <span>&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. FAISS &gt; Chapter 2. FAISS 실전</div>
                  <h1 className="text-2xl font-bold text-slate-800">II-2-1. FAISS 실전 워크플로우 — 빌드부터 검색까지</h1>
                </div>
              </div>
              <p className="text-slate-600">데이터 준비부터 인덱스 저장까지, 실전 FAISS 프로젝트의 <b>6단계 파이프라인</b>을 코드와 함께 따라갑니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-orange-700 border-orange-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">FAISS 실전 파이프라인</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">파이프라인 단계</div>
                <div className="space-y-2">
                  {PIPELINE.map((p, i) => (
                    <div key={i}>
                      <div className={`flex items-center gap-3 p-3 rounded-xl border-2 transition-all duration-500 ${
                        s.activeStep === i ? 'bg-orange-50 border-orange-300 scale-[1.02] shadow-md' :
                        s.activeStep === -1 ? 'bg-white border-slate-200' :
                        s.activeStep > i ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-slate-100 opacity-50'
                      }`}>
                        <div className={`w-8 h-8 ${s.activeStep === i ? 'bg-orange-600' : s.activeStep > i ? 'bg-emerald-500' : p.color} text-white rounded-full flex items-center justify-center font-bold text-sm transition-colors`}>
                          {s.activeStep > i ? '\u2713' : p.num}
                        </div>
                        <div>
                          <div className={`font-bold text-sm ${s.activeStep === i ? 'text-orange-800' : 'text-slate-700'}`}>{p.label}</div>
                        </div>
                      </div>
                      {i < PIPELINE.length - 1 && (
                        <div className="flex justify-center my-0.5">
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={s.activeStep > i ? '#22c55e' : '#cbd5e1'} strokeWidth="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
                  {s.activeStep >= 0 ? `${PIPELINE[s.activeStep].num}단계: ${PIPELINE[s.activeStep].label} 코드` : '전체 파이프라인 코드'}
                </div>
                <pre className="bg-slate-800 text-slate-100 rounded-lg p-4 text-xs font-mono whitespace-pre-wrap overflow-x-auto leading-relaxed mb-4">{s.code}</pre>
                <div className="p-3 bg-amber-50 border border-amber-200 rounded-lg">
                  <div className="text-xs font-bold text-amber-700 mb-1">실전 팁</div>
                  <div className="text-xs text-amber-600">{s.tip}</div>
                </div>
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['train()', 'add()', 'search()', 'write_index()', 'read_index()', 'batch'].map(kw => (
                <span key={kw} className="bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-sm font-medium border border-orange-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-orange-600 hover:bg-orange-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./II-1-2.html" className="text-orange-600 hover:text-orange-800 font-medium">&larr; II-1-2. FAISS 인덱스 종류</a>
              <a href="./II-2-2.html" className="text-orange-600 hover:text-orange-800 font-medium">II-2-2. FAISS 최적화 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
