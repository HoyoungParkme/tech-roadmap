<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB — II-2-2. FAISS 최적화 — GPU 가속과 양자화</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "FAISS 최적화의 두 축: GPU 가속(속도)과 양자화(메모리). 일반 도로(CPU)에서 고속도로(GPU)로 바꾸면 속도가 10~100배 빨라지고, 트럭 적재 최적화(양자화)를 하면 메모리를 10~100배 절약합니다.",
        left: 'analogy',
        right: 'overview',
        analogyData: {
          title: '고속도로 비유',
          items: [
            { label: '일반 도로', mapped: 'CPU 검색', detail: '안정적이지만 느림', icon: 'C' },
            { label: '고속도로', mapped: 'GPU 검색', detail: '10~100배 빠름', icon: 'G' },
            { label: '일반 트럭', mapped: '원본 벡터 (float32)', detail: '메모리 많이 사용', icon: 'F' },
            { label: '압축 트럭', mapped: '양자화 벡터 (int8)', detail: '메모리 10배 절약', icon: 'Q' },
          ],
        },
        overviewData: {
          title: '최적화 전략 요약',
          items: [
            { strategy: 'GPU 가속', effect: '속도 10~100x 향상', cost: 'GPU 하드웨어 필요' },
            { strategy: 'PQ (Product Quantization)', effect: '메모리 10~100x 절약', cost: '정확도 약간 손실' },
            { strategy: 'SQ (Scalar Quantization)', effect: '메모리 4x 절약', cost: '정확도 거의 유지' },
            { strategy: 'OPQ (Optimized PQ)', effect: 'PQ보다 정확도 개선', cost: '학습 시간 증가' },
          ],
        },
      },
      {
        desc: "GPU 가속: faiss-gpu를 설치하면 CPU 인덱스를 GPU로 옮길 수 있습니다. 100만 벡터 검색 시 CPU는 ~50ms, GPU는 ~0.5ms. 멀티 GPU 환경에서는 더 큰 차이가 납니다.",
        left: 'benchmark',
        right: 'code',
        benchmarkData: {
          title: 'CPU vs GPU 성능 비교 (100만 벡터, 128차원)',
          bars: [
            { label: 'CPU (IndexFlatL2)', value: 50, max: 50, unit: 'ms', color: 'bg-slate-400' },
            { label: 'GPU (GpuIndexFlatL2)', value: 0.5, max: 50, unit: 'ms', color: 'bg-green-500' },
            { label: 'CPU (IVF, nprobe=10)', value: 5, max: 50, unit: 'ms', color: 'bg-slate-400' },
            { label: 'GPU (IVF, nprobe=10)', value: 0.1, max: 50, unit: 'ms', color: 'bg-green-500' },
          ],
        },
        codeData: {
          title: 'GPU 가속 코드',
          code: `# GPU 가속 — faiss-gpu 필요\n# pip install faiss-gpu\nimport faiss\n\n# CPU 인덱스 생성\ncpu_index = faiss.IndexFlatL2(128)\ncpu_index.add(vectors)  # 100만 벡터\n\n# GPU 리소스 설정\nres = faiss.StandardGpuResources()\n\n# CPU → GPU 전송\ngpu_index = faiss.index_cpu_to_gpu(\n    res,      # GPU 리소스\n    0,        # GPU 디바이스 번호\n    cpu_index # CPU 인덱스\n)\n\n# GPU에서 검색 (10~100x 빠름)\nD, I = gpu_index.search(query, k=5)\n\n# 멀티 GPU 사용\n# gpu_index = faiss.index_cpu_to_all_gpus(\n#     cpu_index\n# )`,
        },
      },
      {
        desc: "양자화(Quantization): 벡터를 압축해 메모리를 절약합니다. float32(4바이트) 벡터를 int8(1바이트)이나 더 작은 코드로 변환합니다. 768차원 float32 벡터 1개 = 3KB → PQ 적용 시 ~96바이트로 줄어듭니다.",
        left: 'memory',
        right: 'code',
        memoryData: {
          title: '메모리 비교 (100만 벡터, 768차원)',
          items: [
            { label: 'IndexFlatL2 (원본)', size: '3.0 GB', ratio: '1x', color: 'bg-red-400', width: '100%' },
            { label: 'SQ8 (Scalar)', size: '768 MB', ratio: '4x 절약', color: 'bg-amber-400', width: '25%' },
            { label: 'PQ (m=96)', size: '96 MB', ratio: '32x 절약', color: 'bg-green-400', width: '3.2%' },
            { label: 'PQ (m=48)', size: '48 MB', ratio: '64x 절약', color: 'bg-emerald-400', width: '1.6%' },
          ],
        },
        codeData: {
          title: 'SQ (Scalar Quantization) 코드',
          code: `# SQ8 — float32 → uint8 (4배 절약)\nimport faiss\n\nd = 768\nindex = faiss.IndexScalarQuantizer(\n    d,\n    faiss.ScalarQuantizer.QT_8bit  # 8비트\n)\nindex.train(vectors)\nindex.add(vectors)\n\n# IVF + SQ 조합\nnlist = 1024\nquantizer = faiss.IndexFlatL2(d)\nindex = faiss.IndexIVFScalarQuantizer(\n    quantizer, d, nlist,\n    faiss.ScalarQuantizer.QT_8bit\n)\nindex.train(vectors)\nindex.add(vectors)\nindex.nprobe = 10\nD, I = index.search(query, k=5)`,
        },
      },
      {
        desc: "PQ(Product Quantization)는 벡터를 m개의 서브벡터로 쪼개고, 각각을 256개 코드 중 하나로 대체합니다. 768차원을 96개 서브벡터로 나누면, 벡터 하나가 96바이트로 압축됩니다. OPQ는 PQ 전에 회전 변환을 적용해 정확도를 개선합니다.",
        left: 'concept',
        right: 'code',
        conceptData: {
          title: 'PQ 동작 원리',
          steps: [
            { num: '1', label: '벡터 분할', detail: '768차원 → 96개의 8차원 서브벡터' },
            { num: '2', label: '코드북 학습', detail: '각 서브벡터 공간에서 256개 클러스터 학습' },
            { num: '3', label: '코드 할당', detail: '각 서브벡터를 가장 가까운 클러스터 번호(0~255)로 대체' },
            { num: '4', label: '압축 완료', detail: '96 x 1바이트 = 96바이트 (원본 3072바이트의 1/32)' },
          ],
          note: 'OPQ: PQ 전에 직교 변환을 적용해 서브벡터 간 독립성을 높임',
        },
        codeData: {
          title: 'PQ / OPQ 코드',
          code: `# PQ — Product Quantization\nimport faiss\n\nd = 768\nm = 96    # 서브벡터 수 (d % m == 0 필수)\nnbits = 8 # 코드북 비트 (256개 코드)\n\nindex = faiss.IndexPQ(d, m, nbits)\nindex.train(vectors)\nindex.add(vectors)\nD, I = index.search(query, k=5)\n\n# OPQ — Optimized PQ (더 정확)\nopq_matrix = faiss.OPQMatrix(d, m)\nopq_index = faiss.IndexPQ(d, m, nbits)\nindex = faiss.IndexPreTransform(\n    opq_matrix, opq_index\n)\nindex.train(vectors)\nindex.add(vectors)\n\n# IVF + PQ 조합 (실전 추천)\nnlist = 1024\nquantizer = faiss.IndexFlatL2(d)\nindex = faiss.IndexIVFPQ(\n    quantizer, d, nlist, m, nbits\n)\nindex.train(vectors)\nindex.add(vectors)`,
        },
      },
      {
        desc: "정리: GPU 가속은 '속도', 양자화는 '메모리'를 최적화합니다. 실전에서는 IVF + PQ + GPU 조합이 가장 많이 쓰입니다. 10억 벡터급에서는 양자화 없이는 메모리에 올릴 수 없습니다. 다음 시각화에서 FAISS의 한계와 보완 방법을 알아봅니다.",
        left: 'summary',
        right: 'recommend',
        summaryData: {
          title: '최적화 전략 정리',
          rows: [
            { scenario: '10만 건 이하', strategy: 'IndexFlatL2', reason: '최적화 불필요, 충분히 빠름' },
            { scenario: '100만 건, 속도 필요', strategy: 'GPU + IVFFlat', reason: 'GPU로 속도 확보' },
            { scenario: '1000만 건, 메모리 제약', strategy: 'IVF + PQ', reason: '메모리 절약 + 속도 균형' },
            { scenario: '10억 건, 프로덕션', strategy: 'GPU + IVF + OPQ', reason: '전체 최적화 필수' },
          ],
        },
        recommendData: {
          title: '다음에 배울 것',
          desc: 'FAISS는 빠르고 강력하지만, 메타데이터 필터링, 자동 영속성, CRUD, 분산 처리가 없습니다. 이 한계를 어떻게 보완하는지 알아봅니다.',
          keywords: ['메타데이터', 'persistence', 'ID 매핑', 'pre-filter'],
        },
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderLeft = () => {
        if (s.left === 'analogy') {
          const d = s.analogyData;
          return (
            <div>
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">{d.title}</div>
              <div className="space-y-3">
                {d.items.map((item, i) => (
                  <div key={i} className="flex items-center gap-3 p-3 bg-orange-50 rounded-lg border border-orange-200">
                    <div className="w-8 h-8 bg-orange-600 text-white rounded-full flex items-center justify-center font-bold text-sm">{item.icon}</div>
                    <div>
                      <div className="font-bold text-sm text-orange-800">{item.label} = {item.mapped}</div>
                      <div className="text-xs text-orange-600">{item.detail}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        }
        if (s.left === 'benchmark') {
          const d = s.benchmarkData;
          return (
            <div>
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">{d.title}</div>
              <div className="space-y-3">
                {d.bars.map((bar, i) => (
                  <div key={i}>
                    <div className="flex justify-between text-xs mb-1">
                      <span className="text-slate-600 font-medium">{bar.label}</span>
                      <span className="font-bold text-slate-800">{bar.value}{bar.unit}</span>
                    </div>
                    <div className="bg-slate-100 rounded-full h-4">
                      <div className={`h-4 rounded-full ${bar.color} transition-all duration-700`}
                        style={{width: `${Math.max((bar.value / bar.max) * 100, 2)}%`}} />
                    </div>
                  </div>
                ))}
              </div>
              <div className="mt-4 p-3 bg-green-50 border border-green-200 rounded-lg text-xs text-green-700">
                GPU는 CPU 대비 <b>10~100배</b> 빠른 검색 속도를 제공합니다
              </div>
            </div>
          );
        }
        if (s.left === 'memory') {
          const d = s.memoryData;
          return (
            <div>
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">{d.title}</div>
              <div className="space-y-3">
                {d.items.map((item, i) => (
                  <div key={i}>
                    <div className="flex justify-between text-xs mb-1">
                      <span className="text-slate-600 font-medium">{item.label}</span>
                      <div className="text-right">
                        <span className="font-bold text-slate-800">{item.size}</span>
                        <span className="text-slate-400 ml-2">({item.ratio})</span>
                      </div>
                    </div>
                    <div className="bg-slate-100 rounded-full h-4">
                      <div className={`h-4 rounded-full ${item.color} transition-all duration-700`} style={{width: item.width}} />
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        }
        if (s.left === 'concept') {
          const d = s.conceptData;
          return (
            <div>
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">{d.title}</div>
              <div className="space-y-2">
                {d.steps.map((st, i) => (
                  <div key={i}>
                    <div className="flex items-center gap-3 p-3 bg-orange-50 rounded-lg border border-orange-200">
                      <div className="w-7 h-7 bg-orange-600 text-white rounded-full flex items-center justify-center font-bold text-xs">{st.num}</div>
                      <div>
                        <div className="font-bold text-sm text-orange-800">{st.label}</div>
                        <div className="text-xs text-orange-600">{st.detail}</div>
                      </div>
                    </div>
                    {i < d.steps.length - 1 && (
                      <div className="flex justify-center my-0.5">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#c2410c" strokeWidth="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
                      </div>
                    )}
                  </div>
                ))}
              </div>
              <div className="mt-3 p-2 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-700">{d.note}</div>
            </div>
          );
        }
        if (s.left === 'summary') {
          const d = s.summaryData;
          return (
            <div>
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">{d.title}</div>
              <div className="space-y-2">
                {d.rows.map((row, i) => (
                  <div key={i} className="p-3 bg-white rounded-lg border border-slate-200">
                    <div className="flex justify-between items-center mb-1">
                      <span className="text-xs font-bold text-slate-700">{row.scenario}</span>
                      <span className="text-xs font-bold text-orange-600 bg-orange-50 px-2 py-0.5 rounded">{row.strategy}</span>
                    </div>
                    <div className="text-xs text-slate-500">{row.reason}</div>
                  </div>
                ))}
              </div>
            </div>
          );
        }
        return null;
      };

      const renderRight = () => {
        if (s.right === 'overview') {
          const d = s.overviewData;
          return (
            <div>
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">{d.title}</div>
              <div className="space-y-2">
                {d.items.map((item, i) => (
                  <div key={i} className="p-3 bg-slate-50 rounded-lg border border-slate-200">
                    <div className="font-bold text-sm text-slate-700 mb-1">{item.strategy}</div>
                    <div className="flex justify-between text-xs">
                      <span className="text-emerald-600">{item.effect}</span>
                      <span className="text-slate-400">{item.cost}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        }
        if (s.right === 'code') {
          const d = s.codeData;
          return (
            <div>
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">{d.title}</div>
              <pre className="bg-slate-800 text-slate-100 rounded-lg p-4 text-xs font-mono whitespace-pre-wrap overflow-x-auto leading-relaxed">{d.code}</pre>
            </div>
          );
        }
        if (s.right === 'recommend') {
          const d = s.recommendData;
          return (
            <div>
              <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">다음 학습</div>
              <div className="p-4 bg-orange-50 border border-orange-200 rounded-lg mb-4">
                <div className="font-bold text-orange-800 mb-2">{d.title}</div>
                <div className="text-sm text-orange-700">{d.desc}</div>
              </div>
              <div className="flex flex-wrap gap-2">
                {d.keywords.map(kw => (
                  <span key={kw} className="bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-sm font-medium border border-orange-200">{kw}</span>
                ))}
              </div>
            </div>
          );
        }
        return null;
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-orange-700 hover:text-orange-900 font-medium">
                <span>&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. FAISS &gt; Chapter 2. FAISS 실전</div>
                  <h1 className="text-2xl font-bold text-slate-800">II-2-2. FAISS 최적화 — GPU 가속과 양자화</h1>
                </div>
              </div>
              <p className="text-slate-600">일반 도로(CPU)에서 <b>고속도로(GPU)</b>로 바꾸면 속도 10~100배. <b>트럭 적재 최적화(양자화)</b>로 메모리 10~100배 절약.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-orange-700 border-orange-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">FAISS 최적화</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {renderLeft()}
              </div>
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                {renderRight()}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['faiss-gpu', 'GpuIndexFlat', 'OPQ', 'SQ8', '메모리 절약', 'throughput'].map(kw => (
                <span key={kw} className="bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-sm font-medium border border-orange-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-orange-600 hover:bg-orange-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>

      );
