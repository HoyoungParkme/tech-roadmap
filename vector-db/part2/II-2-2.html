            <span>검색 속도 (100만 × 128d, ms / query · 낮을수록 좋음)</span>
          </div>
          <div className="space-y-2">
            {bars.map((b, i) => {
              const measured = b.value !== null && b.value !== undefined;
              const widthPct = measured ? Math.max((b.value / b.max) * 100, 1.5) : 0;
              return (
                <div key={i}>
                  <div className="flex justify-between text-[10px] mb-0.5">
                    <span className={`font-mono ${b.highlight ? 'text-violet-900 font-bold' : 'text-slate-600'}`}>
                      {b.label}
                    </span>
                    <span className={`font-mono ${b.highlight ? 'text-violet-900 font-bold' : 'text-slate-500'}`}>
                      {measured ? `${b.value} ms` : '—'}
                    </span>
                  </div>
                  <div className="bg-white/70 rounded-full h-3 border border-violet-200 overflow-hidden">
                    {measured ? (
                      <div
                        className={`h-full rounded-full ${b.color} transition-all duration-700`}
                        style={{ width: `${widthPct}%` }}
                      />
                    ) : (
                      <div className="h-full w-full flex items-center justify-center">
                        <span className="text-[9px] text-slate-400 font-mono">측정 전</span>
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // MemoryGauge — VRAM 사용량 게이지 (overflow 시 빨강)
    // ─────────────────────────────────────────────────────
    function MemoryGauge({ gauge }) {
      const pct = Math.min((gauge.used / gauge.total) * 100, 100);
      const overflowPct = gauge.overflow ? Math.max((gauge.used / gauge.total - 1) * 100, 0) : 0;

      return (
        <div className="rounded-lg bg-gradient-to-br from-violet-50 to-violet-100 border border-violet-200 p-3">
          <div className="text-[11px] font-bold text-violet-800 mb-2 flex items-center gap-1">
            <span>💾</span>
            <span>{gauge.label}</span>
          </div>
          <div className="bg-white/70 rounded-lg h-8 border border-violet-200 overflow-hidden relative">
            <div
              className={`h-full ${gauge.barColor} transition-all duration-700`}
              style={{ width: `${pct}%` }}
            />
            {gauge.overflow && (
              <div className="absolute top-0 left-0 w-full h-full flex items-center justify-center">
                <span className="text-xs font-bold text-red-700 font-mono">
                  ⚠ {gauge.used.toFixed(0)} GB &gt; 한계 {gauge.total} GB
                </span>
              </div>
            )}
            {!gauge.overflow && (
              <div className="absolute top-0 left-0 w-full h-full flex items-center justify-center">
                <span className="text-xs font-bold text-slate-700 font-mono">
                  {gauge.used} GB / {gauge.total} GB ({pct.toFixed(1)}%)
                </span>
              </div>
            )}
          </div>
          <div className="flex justify-between text-[9px] text-violet-600 font-mono mt-1">
            <span>0</span>
            <span>VRAM 한계 ({gauge.total} GB)</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // CompressViz — 원본 vs PQ 압축 시각화
    // ─────────────────────────────────────────────────────
    function CompressViz({ data }) {
      const renderBlocks = (count, color, max = 32) => {
        const blocks = Array.from({ length: max }, (_, i) => i < count);
        return (
          <div className="grid grid-cols-16 gap-0.5">
            {blocks.map((on, i) => (
              <div
                key={i}
                className={`h-2 rounded-sm transition-all duration-700 ${on ? color : 'bg-slate-200'}`}
              />
            ))}
          </div>
        );
      };

      return (
        <div className="rounded-lg bg-gradient-to-br from-violet-50 to-violet-100 border border-violet-200 p-3">
          <div className="text-[11px] font-bold text-violet-800 mb-2 flex items-center gap-1">
            <span>📦</span>
            <span>PQ 압축 시각화 — 벡터 1개 기준</span>
          </div>

          {/* 원본 */}
          <div className="mb-3">
            <div className="flex justify-between text-[10px] mb-1">
              <span className="font-mono text-slate-600">{data.original.label}</span>
              <span className="font-mono text-slate-700 font-bold">{data.original.size} ({data.original.dim}d)</span>
            </div>
            <div className="grid gap-0.5" style={{ gridTemplateColumns: 'repeat(32, minmax(0, 1fr))' }}>
              {Array.from({ length: 32 }).map((_, i) => (
                <div key={i} className="h-3 rounded-sm bg-slate-400" />
              ))}
            </div>
            <div className="text-[9px] text-slate-500 mt-0.5 font-mono text-center">
              32 × 96byte 청크 (3,072 byte)
            </div>
          </div>

          {/* 화살표 + 비율 */}
          <div className="flex items-center justify-center gap-2 my-2">
            <span className="text-[10px] text-violet-600 font-mono">PQ (m=96, nbits=8)</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" strokeWidth="2">
              <path d="M12 5v14M5 12l7 7 7-7" />
            </svg>
            <span className="px-2 py-0.5 bg-violet-600 text-white rounded text-[10px] font-bold font-mono">
              {data.ratio} 압축
            </span>
          </div>

          {/* 압축 후 */}
          <div>
            <div className="flex justify-between text-[10px] mb-1">
              <span className="font-mono text-violet-800 font-bold">{data.compressed.label}</span>
              <span className="font-mono text-violet-900 font-bold">{data.compressed.size} ({data.compressed.dim}코드)</span>
            </div>
            <div className="grid gap-0.5" style={{ gridTemplateColumns: 'repeat(32, minmax(0, 1fr))' }}>
              <div className="h-3 rounded-sm bg-violet-600" />
              {Array.from({ length: 31 }).map((_, i) => (
                <div key={i} className="h-3 rounded-sm bg-slate-200" />
              ))}
            </div>
            <div className="text-[9px] text-violet-600 mt-0.5 font-mono text-center">
              1개 청크 (96 byte) — 256 코드 중 하나로 표현
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // TradeoffChart — 정확도 vs 속도 산점도
    // ─────────────────────────────────────────────────────
    function TradeoffChart({ tradeoff }) {
      const w = 380;
      const h = 240;
      const padL = 50;
      const padR = 12;
      const padT = 12;
      const padB = 36;
      const plotW = w - padL - padR;
      const plotH = h - padT - padB;

      // x: log10(speed ms), y: recall (0.7~1.0)
      const xMin = Math.log10(0.04);
      const xMax = Math.log10(60);
      const yMin = 0.80;
      const yMax = 1.00;

      const xPos = (speed) => padL + ((Math.log10(speed) - xMin) / (xMax - xMin)) * plotW;
      const yPos = (recall) => padT + plotH - ((recall - yMin) / (yMax - yMin)) * plotH;

      return (
        <div className="rounded-lg bg-gradient-to-br from-violet-50 to-violet-100 border border-violet-200 p-3">
          <div className="text-[11px] font-bold text-violet-800 mb-2 flex items-center gap-1">
            <span>🎯</span>
            <span>{tradeoff.title}</span>
          </div>
          <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
            {/* y axis */}
            <line x1={padL} y1={padT} x2={padL} y2={padT + plotH} stroke="#a78bfa" strokeWidth="1" />
            {/* x axis */}
            <line x1={padL} y1={padT + plotH} x2={padL + plotW} y2={padT + plotH} stroke="#a78bfa" strokeWidth="1" />

            {/* y grid + labels */}
            {[0.80, 0.85, 0.90, 0.95, 1.00].map((v, i) => (
              <g key={`y${i}`}>
                <line
                  x1={padL}
                  y1={yPos(v)}
                  x2={padL + plotW}
                  y2={yPos(v)}
                  stroke="#e9d5ff"
                  strokeWidth="0.5"
                  strokeDasharray="2,2"
                />
                <text x={padL - 4} y={yPos(v) + 3} textAnchor="end" fontSize="9" fill="#7c3aed" fontFamily="monospace">
                  {v.toFixed(2)}
                </text>
              </g>
            ))}

            {/* x grid + labels (log scale) */}
            {[0.05, 0.1, 0.5, 1, 5, 50].map((v, i) => (
              <g key={`x${i}`}>
                <line
                  x1={xPos(v)}
                  y1={padT}
                  x2={xPos(v)}
                  y2={padT + plotH}
                  stroke="#e9d5ff"
                  strokeWidth="0.5"
                  strokeDasharray="2,2"
                />
                <text x={xPos(v)} y={padT + plotH + 12} textAnchor="middle" fontSize="9" fill="#7c3aed" fontFamily="monospace">
                  {v}
                </text>
              </g>
            ))}

            {/* axis titles */}
            <text x={padL + plotW / 2} y={h - 4} textAnchor="middle" fontSize="10" fill="#5b21b6" fontFamily="monospace">
              검색 속도 (ms, log scale, 작을수록 빠름) →
            </text>
            <text
              x={12}
              y={padT + plotH / 2}
              textAnchor="middle"
              fontSize="10"
              fill="#5b21b6"
              fontFamily="monospace"
              transform={`rotate(-90, 12, ${padT + plotH / 2})`}
            >
              ↑ recall@10
            </text>

            {/* points */}
            {tradeoff.points.map((p, i) => {
              const cx = xPos(p.speed);
              const cy = yPos(p.recall);
              const r = p.active ? 8 : 5;
              return (
                <g key={i}>
                  {p.active && (
                    <circle cx={cx} cy={cy} r={14} fill="none" stroke={p.color} strokeWidth="2" opacity="0.4">
                      <animate attributeName="r" from="10" to="18" dur="1.4s" repeatCount="indefinite" />
                      <animate attributeName="opacity" from="0.6" to="0" dur="1.4s" repeatCount="indefinite" />
                    </circle>
                  )}
                  <circle cx={cx} cy={cy} r={r} fill={p.color} stroke="white" strokeWidth="1.5" />
                  <text
                    x={cx + 10}
                    y={cy + 3}
                    fontSize="9"
                    fontWeight={p.active ? 'bold' : 'normal'}
                    fill={p.color}
                    fontFamily="monospace"
                  >
                    {p.label}
                  </text>
                </g>
              );
            })}
          </svg>
          <div className="text-[9px] text-violet-700 mt-1 text-center font-mono">
            우상단(빠르고 정확)이 이상 · 보라 = PQ 강조 · 회색 = 비교군
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Verdict 박스 — 단계 결론
    // ─────────────────────────────────────────────────────
    function Verdict({ verdict }) {
      const styles = {
        good: 'bg-emerald-50 border-emerald-400 text-emerald-800',
        warn: 'bg-amber-50 border-amber-400 text-amber-800',
        fail: 'bg-red-50 border-red-400 text-red-800',
      };
      const icons = { good: '✅', warn: '⚠️', fail: '❌' };

      return (
        <div className={`rounded-lg border-2 p-3 flex items-start gap-2 ${styles[verdict.type]}`}>
          <span className="text-lg leading-none">{icons[verdict.type]}</span>
          <div className="flex-1">
            <div className="text-[10px] uppercase tracking-wider font-bold opacity-70">결론</div>
            <div className="text-sm font-medium mt-0.5">{verdict.text}</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 통합
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">⚡ FAISS 최적화 실측 — 속도 / 메모리 / 정확도</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            {/* 속도 막대 (모든 단계 공통) */}
            <SpeedBars bars={step.speedBars} />

            {/* 메모리 게이지 (1, 2, 3, 4단계) */}
            {step.memGauge && <MemoryGauge gauge={step.memGauge} />}

            {/* 압축 시각화 (4단계) */}
            {step.compress && <CompressViz data={step.compress} />}

            {/* trade-off 산점도 (5단계) */}
            {step.tradeoff && <TradeoffChart tradeoff={step.tradeoff} />}

            {/* 결론 */}
            {step.verdict && <Verdict verdict={step.verdict} />}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-slate-400"></span>CPU
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-violet-600"></span>GPU / 활성
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-emerald-500"></span>여유
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2.5 h-2.5 rounded bg-red-500"></span>한계 초과
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-violet-500/15 border-l-2 border-violet-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-violet-700 hover:text-violet-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. FAISS &gt; Chapter 2. FAISS 실전</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">FAISS 최적화 — GPU 가속과 Quantization</h1>
                  <p className="text-sm text-slate-500 mt-0.5">CPU 50ms → GPU 0.5ms → PQ로 1억 벡터 압축 → recall trade-off</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-3 text-sm text-violet-900">
                💡 다음(II-2-3)에서는 <strong>FAISS의 한계</strong>(메타데이터 필터, persistence, CRUD, 분산)와 보완 전략을 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-violet-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-violet-600 text-white hover:bg-violet-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-2-1.html" className="text-violet-700 hover:text-violet-900 font-medium">&larr; II-2-1. FAISS 실전 워크플로우</a>
              <a href="./II-2-3.html" className="text-violet-700 hover:text-violet-900 font-medium">II-2-3. FAISS 한계와 보완 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
