                >
                  <span className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold flex-shrink-0 ${
                    f.active ? 'bg-rose-500 text-white' : 'bg-slate-300 text-slate-500'
                  }`}>
                    {i + 1}
                  </span>
                  <div className="flex-1 min-w-0">
                    <div className={`font-mono font-bold truncate ${f.active ? 'text-rose-900' : 'text-slate-500'}`}>
                      {f.label}
                    </div>
                    <div className={`font-mono text-[9px] truncate ${f.active ? 'text-rose-600' : 'text-slate-400'}`}>
                      {f.lib} · {f.payload}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <div className="text-[11px] text-slate-500 italic font-mono py-4 text-center">
              (이 단계는 추상화 경로만)
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 박스: 추상화 흐름 (LangChain or LlamaIndex)
    // ─────────────────────────────────────────────────────
    function AbstractFlowBox({ flow, framework }) {
      const isLI = framework === 'llamaindex';
      const isOff = !flow || flow.every((f) => !f.active);
      const titleLabel = isLI ? '🦙 LlamaIndex 추상화' : '🦜 LangChain 추상화';
      const palette = isLI
        ? 'bg-gradient-to-br from-amber-50 to-amber-100 border-amber-300'
        : 'bg-gradient-to-br from-purple-50 to-purple-100 border-purple-300';
      const rowActive = isLI ? 'bg-white border-amber-400 shadow-sm' : 'bg-white border-purple-400 shadow-sm';
      const badgeActive = isLI ? 'bg-amber-500 text-white' : 'bg-purple-600 text-white';
      const fontMain = isLI ? 'text-amber-900' : 'text-purple-900';
      const fontSub = isLI ? 'text-amber-600' : 'text-purple-600';
      const titleColor = isLI ? 'text-amber-800' : 'text-purple-800';

      return (
        <div className={`rounded-lg border-2 p-3 transition-all ${
          isOff ? 'bg-slate-50 border-slate-200 opacity-60' : palette
        }`}>
          <div className={`text-[11px] font-bold mb-2 flex items-center gap-1.5 ${isOff ? 'text-slate-500' : titleColor}`}>
            <span>{titleLabel}</span>
          </div>
          {flow ? (
            <div className="space-y-1.5">
              {flow.map((f, i) => (
                <div
                  key={i}
                  className={`flex items-center gap-2 px-2 py-1.5 rounded border text-[11px] transition ${
                    f.active
                      ? rowActive
                      : 'bg-slate-50 border-slate-200 opacity-50'
                  }`}
                >
                  <span className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold flex-shrink-0 ${
                    f.active ? badgeActive : 'bg-slate-300 text-slate-500'
                  }`}>
                    {i + 1}
                  </span>
                  <div className="flex-1 min-w-0">
                    <div className={`font-mono font-bold truncate ${f.active ? fontMain : 'text-slate-500'}`}>
                      {f.label}
                    </div>
                    <div className={`font-mono text-[9px] truncate ${f.active ? fontSub : 'text-slate-400'}`}>
                      {f.lib} · {f.payload}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <div className="text-[11px] text-slate-500 italic font-mono py-4 text-center">
              (Step 1은 직접 호출만)
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 코드 라인 수 비교 막대
    // ─────────────────────────────────────────────────────
    function LineCompareBar({ direct, abstract }) {
      if (direct == null && abstract == null) return null;
      const max = Math.max(direct || 0, abstract || 0, 1);
      const dPct = ((direct || 0) / max) * 100;
      const aPct = ((abstract || 0) / max) * 100;

      return (
        <div className="rounded-lg bg-white border-2 border-purple-200 p-3">
          <div className="text-[11px] font-bold text-purple-800 mb-2 flex items-center gap-1.5">
            <span>📏</span>
            <span>코드 라인 수 비교</span>
          </div>
          <div className="space-y-2">
            {/* 직접 호출 */}
            <div>
              <div className="flex justify-between text-[10px] font-mono mb-0.5">
                <span className="text-rose-700 font-bold">직접 호출</span>
                <span className="text-rose-700 font-bold">{direct != null ? `${direct}줄` : '—'}</span>
              </div>
              <div className="h-3 bg-slate-100 rounded overflow-hidden">
                <div
                  className="h-full bg-gradient-to-r from-rose-400 to-rose-500 transition-all duration-700"
                  style={{ width: direct != null ? `${dPct}%` : '0%' }}
                />
              </div>
            </div>
            {/* 추상화 */}
            <div>
              <div className="flex justify-between text-[10px] font-mono mb-0.5">
                <span className="text-purple-700 font-bold">추상화 (LangChain/LlamaIndex)</span>
                <span className="text-purple-700 font-bold">{abstract != null ? `${abstract}줄` : '—'}</span>
              </div>
              <div className="h-3 bg-slate-100 rounded overflow-hidden">
                <div
                  className="h-full bg-gradient-to-r from-purple-500 to-purple-600 transition-all duration-700"
                  style={{ width: abstract != null ? `${aPct}%` : '0%' }}
                />
              </div>
            </div>
          </div>
          {direct != null && abstract != null && (
            <div className="mt-2 text-center text-[10px] font-mono text-purple-700">
              감소율 ≈ <span className="font-bold">{Math.round((1 - abstract / direct) * 100)}%</span>
              <span className="text-slate-500"> · {direct}줄 → {abstract}줄</span>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 임베딩 모델 선택 박스 (Step 5)
    // ─────────────────────────────────────────────────────
    function EmbedModelBox({ selected, onSelect }) {
      return (
        <div className="rounded-lg bg-white border-2 border-purple-300 p-3">
          <div className="text-[11px] font-bold text-purple-800 mb-2 flex items-center gap-1.5">
            <span>🔌</span>
            <span>Embedding Model — 클릭해서 교체</span>
          </div>
          <div className="grid grid-cols-3 gap-2">
            {EMBED_MODELS.map((m) => {
              const active = selected === m.id;
              return (
                <button
                  key={m.id}
                  onClick={() => onSelect(m.id)}
                  className={`p-2 rounded-lg border-2 text-left transition ${
                    active
                      ? 'bg-purple-600 border-purple-700 text-white shadow-md scale-[1.02]'
                      : 'bg-white border-slate-200 hover:border-purple-300 hover:bg-purple-50'
                  }`}
                >
                  <div className="flex items-center gap-1 mb-1">
                    <span className="text-sm">{m.emoji}</span>
                    <span className={`text-[11px] font-bold ${active ? 'text-white' : 'text-slate-800'}`}>
                      {m.name}
                    </span>
                  </div>
                  <div className={`text-[9px] font-mono leading-tight ${active ? 'text-purple-100' : 'text-slate-500'}`}>
                    {m.sub}
                  </div>
                  <div className={`text-[9px] font-mono mt-0.5 ${active ? 'text-purple-100' : 'text-slate-400'}`}>
                    dim={m.dim} · {m.cost}
                  </div>
                  <div className={`text-[9px] mt-1 font-medium ${active ? 'text-white' : 'text-purple-700'}`}>
                    {m.tag}
                  </div>
                </button>
              );
            })}
          </div>
          <div className="mt-2 px-2 py-1.5 rounded bg-purple-50 border border-purple-200">
            <div className="text-[10px] font-mono text-purple-800">
              <span className="font-bold">교체 비용:</span> vectorstore / retriever / chain 코드 <span className="font-bold text-purple-900">0줄 변경</span>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌(직접 호출) + 우(추상화) + 라인 비교 + 모델 선택
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step, embedModel, setEmbedModel }) {
      const ansStyle = {
        unknown: 'bg-slate-50 border-slate-300 text-slate-600',
        fail:    'bg-rose-50 border-rose-400 text-rose-800',
        success: 'bg-purple-50 border-purple-400 text-purple-800',
      };

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">☕ 직접 호출 vs 프레임워크 추상화</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 좌(직접) / 우(추상화) 흐름 */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mb-3">
            <DirectFlowBox flow={step.directFlow} />
            <AbstractFlowBox flow={step.abstractFlow} framework={step.framework} />
          </div>

          {/* 라인 수 비교 막대 */}
          <div className="mb-3">
            <LineCompareBar direct={step.directLines} abstract={step.abstractLines} />
          </div>

          {/* 모델 선택 박스 (Step 5) */}
          {step.showModelBox && (
            <div className="mb-3">
              <EmbedModelBox selected={embedModel} onSelect={setEmbedModel} />
            </div>
          )}

          {/* 질문 + 답 */}
          {step.question && (
            <div className="space-y-2">
              <div className="rounded-lg bg-purple-600 text-white p-3 flex items-start gap-2 shadow-sm">
                <span className="text-lg leading-none">❓</span>
                <div className="flex-1">
                  <div className="text-[10px] uppercase tracking-wider text-purple-200 font-bold">핵심 질문</div>
                  <div className="text-sm font-bold mt-0.5">{step.question}</div>
                </div>
              </div>
              {step.answer && (
                <div className={`rounded-lg border-2 p-3 flex items-start gap-2 ${ansStyle[step.answerType]}`}>
                  <span className="text-lg leading-none">
                    {step.answerType === 'success' ? '✅' : step.answerType === 'fail' ? '⚠️' : '💬'}
                  </span>
                  <div className="flex-1">
                    <div className="text-[10px] uppercase tracking-wider font-bold opacity-70">결론</div>
                    <div className="text-sm font-medium mt-0.5">{step.answer}</div>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-rose-500"></span>
              직접 호출 (raw)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-purple-600"></span>
              LangChain
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-amber-500"></span>
              LlamaIndex
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2.5 h-2.5 rounded-full bg-slate-300"></span>
              비활성
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 라인 번호 + 강조 */}
          <div className="overflow-auto max-h-[36rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-purple-500/15 border-l-2 border-purple-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [embedModel, setEmbedModel] = useState('openai');
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-purple-700 hover:text-purple-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Chroma &gt; Chapter 2. Chroma 실전</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Chroma + LangChain / LlamaIndex 통합</h1>
                  <p className="text-sm text-slate-500 mt-0.5">직접 호출 → 추상화 → 임베딩 교체까지 — 라인 수로 보는 추상화의 보상</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} embedModel={embedModel} setEmbedModel={setEmbedModel} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-purple-50 border-2 border-purple-300 rounded-xl p-3 text-sm text-purple-900">
                💡 다음(IV-1-1)에서는 <strong>pgvector</strong> — PostgreSQL에 벡터 검색을 더하는 확장으로 넘어간다 (기존 집에 방을 증축하는 비유)
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-purple-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-purple-600 text-white hover:bg-purple-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 칩 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {[
                'Chroma.from_documents()',
                'as_retriever(search_kwargs)',
                'ChromaVectorStore',
                'VectorStoreIndex',
                'RetrievalQA',
                'embed_documents/embed_query',
              ].map((kw) => (
                <span key={kw} className="bg-purple-50 text-purple-700 px-3 py-1 rounded-full text-xs font-medium border border-purple-200 font-mono">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-2-1.html" className="text-purple-600 hover:text-purple-800 font-medium">&larr; III-2-1. Chroma 아키텍처</a>
              <a href="../part4/IV-1-1.html" className="text-blue-600 hover:text-blue-800 font-medium">IV-1-1. pgvector란 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
