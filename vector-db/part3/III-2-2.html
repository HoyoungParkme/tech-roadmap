<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB — III-2-2. Chroma + LangChain/LlamaIndex 통합</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "Chroma를 단독으로 쓸 수도 있지만, LangChain이나 LlamaIndex 같은 RAG 프레임워크와 함께 쓰면 더 강력해집니다. 어댑터(변환 플러그)처럼, 프레임워크가 Chroma를 감싸서 통일된 인터페이스를 제공합니다.",
        left: 'overview',
        right: 'analogy',
      },
      {
        desc: "LangChain + Chroma: Chroma.from_documents()로 문서 리스트를 한 번에 벡터 스토어에 저장합니다. Document 객체에 page_content와 metadata가 포함되어, Chroma의 add()를 자동으로 호출합니다.",
        left: 'code-langchain',
        right: 'langchain-flow',
      },
      {
        desc: "LangChain의 as_retriever()를 호출하면 RAG 체인에 바로 연결할 수 있습니다. retriever.invoke()로 검색하거나, RetrievalQA 체인에 넣어서 LLM과 함께 질의응답을 수행합니다.",
        left: 'code-retriever',
        right: 'rag-chain',
      },
      {
        desc: "LlamaIndex + Chroma: ChromaVectorStore를 만들고 VectorStoreIndex.from_vector_store()로 인덱스를 구성합니다. query_engine = index.as_query_engine()으로 바로 질의가 가능합니다.",
        left: 'code-llamaindex',
        right: 'llamaindex-flow',
      },
      {
        desc: "핵심 정리: LangChain은 Chroma.from_documents() + as_retriever() 패턴, LlamaIndex는 ChromaVectorStore + as_query_engine() 패턴입니다. 두 프레임워크 모두 Chroma를 감싸서 RAG 파이프라인에 통합합니다.",
        left: 'comparison',
        right: 'keywords',
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderLeft = () => {
        switch (s.left) {
          case 'overview':
            return (
              <div className="space-y-3">
                <div className="p-4 bg-green-50 border border-green-200 rounded-lg">
                  <div className="font-bold text-green-800 mb-2">왜 프레임워크와 통합하는가?</div>
                  <div className="text-sm text-green-700 space-y-2">
                    <p>Chroma 단독: 벡터 저장 + 검색</p>
                    <p>+ LangChain/LlamaIndex: 문서 로딩 → 청킹 → 임베딩 → 저장 → 검색 → LLM 답변까지 <b>한 파이프라인</b>으로 연결</p>
                  </div>
                </div>
                <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg">
                  <div className="text-xs text-slate-600 font-mono">
                    문서 로딩 → 텍스트 분할 → 임베딩 → <b>Chroma 저장</b> → <b>Chroma 검색</b> → LLM 답변
                  </div>
                </div>
              </div>
            );
          case 'code-langchain':
            return (
              <pre className="rounded-lg p-4 text-sm whitespace-pre-wrap font-mono border bg-green-50 border-green-200 text-green-800">
{`from langchain_community.vectorstores import Chroma
from langchain_openai import OpenAIEmbeddings
from langchain.schema import Document

# 문서 준비
docs = [
    Document(
        page_content="AI 기초 가이드",
        metadata={"category": "AI"}
    ),
    Document(
        page_content="ML 실전 튜토리얼",
        metadata={"category": "ML"}
    ),
]

# Chroma에 한 번에 저장
vectorstore = Chroma.from_documents(
    documents=docs,
    embedding=OpenAIEmbeddings(),
    persist_directory="./chroma_langchain"
)`}
              </pre>
            );
          case 'code-retriever':
            return (
              <pre className="rounded-lg p-4 text-sm whitespace-pre-wrap font-mono border bg-green-50 border-green-200 text-green-800">
{`# Retriever로 변환
retriever = vectorstore.as_retriever(
    search_kwargs={"k": 3}
)

# 단독 검색
results = retriever.invoke("딥러닝 입문")

# RAG 체인에 연결
from langchain.chains import RetrievalQA
from langchain_openai import ChatOpenAI

qa_chain = RetrievalQA.from_chain_type(
    llm=ChatOpenAI(model="gpt-4o-mini"),
    retriever=retriever,
)

answer = qa_chain.invoke(
    "AI 기초에 대해 설명해줘"
)`}
              </pre>
            );
          case 'code-llamaindex':
            return (
              <pre className="rounded-lg p-4 text-sm whitespace-pre-wrap font-mono border bg-green-50 border-green-200 text-green-800">
{`import chromadb
from llama_index.vector_stores.chroma import (
    ChromaVectorStore
)
from llama_index.core import (
    VectorStoreIndex,
    StorageContext,
)

# Chroma 클라이언트 + Collection
chroma_client = chromadb.PersistentClient(
    path="./chroma_llama"
)
collection = chroma_client.get_or_create_collection(
    "my_docs"
)

# LlamaIndex용 벡터 스토어
vector_store = ChromaVectorStore(
    chroma_collection=collection
)
storage_ctx = StorageContext.from_defaults(
    vector_store=vector_store
)

# 인덱스 + 쿼리 엔진
index = VectorStoreIndex.from_documents(
    documents, storage_context=storage_ctx
)
engine = index.as_query_engine()
response = engine.query("AI 기초 설명")`}
              </pre>
            );
          case 'comparison':
            return (
              <div className="space-y-3">
                <div className="p-4 bg-purple-50 border border-purple-200 rounded-lg">
                  <div className="font-bold text-purple-800 mb-2">LangChain 패턴</div>
                  <div className="text-xs text-purple-700 font-mono space-y-1">
                    <p>1. Chroma.from_documents(docs, embedding)</p>
                    <p>2. vectorstore.as_retriever()</p>
                    <p>3. RetrievalQA.from_chain_type(llm, retriever)</p>
                  </div>
                </div>
                <div className="flex justify-center text-slate-400 font-bold text-lg">VS</div>
                <div className="p-4 bg-orange-50 border border-orange-200 rounded-lg">
                  <div className="font-bold text-orange-800 mb-2">LlamaIndex 패턴</div>
                  <div className="text-xs text-orange-700 font-mono space-y-1">
                    <p>1. ChromaVectorStore(chroma_collection)</p>
                    <p>2. VectorStoreIndex.from_documents(docs)</p>
                    <p>3. index.as_query_engine()</p>
                  </div>
                </div>
              </div>
            );
          default:
            return null;
        }
      };

      const renderRight = () => {
        switch (s.right) {
          case 'analogy':
            return (
              <div className="space-y-3">
                <div className="p-4 bg-slate-50 border border-slate-200 rounded-lg text-center">
                  <div className="text-4xl mb-2">&#128268;</div>
                  <div className="font-bold text-slate-800 mb-2">어댑터(변환 플러그) 비유</div>
                  <div className="text-sm text-slate-600 space-y-2">
                    <p>Chroma = 가전제품 (벡터 DB)</p>
                    <p>LangChain = 110V 어댑터</p>
                    <p>LlamaIndex = 220V 어댑터</p>
                    <p>어댑터가 달라도 <b>같은 가전</b>을 사용</p>
                  </div>
                </div>
                <div className="p-3 bg-green-50 border border-green-200 rounded-lg">
                  <div className="text-xs text-green-700">프레임워크가 바뀌어도 Chroma의 데이터는 동일합니다. 어댑터(래퍼)만 교체하면 됩니다.</div>
                </div>
              </div>
            );
          case 'langchain-flow':
            return (
              <div className="space-y-2">
                {[
                  { step: '1', label: 'Document 객체 생성', desc: 'page_content + metadata' },
                  { step: '2', label: 'Chroma.from_documents()', desc: '자동 임베딩 + Chroma 저장' },
                  { step: '3', label: 'persist_directory 지정', desc: '디스크에 영속 저장' },
                  { step: '4', label: 'as_retriever()', desc: 'RAG 체인 연결 준비' },
                ].map((item) => (
                  <div key={item.step} className="flex items-center gap-3 p-3 bg-purple-50 rounded-lg border border-purple-200">
                    <div className="w-7 h-7 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-xs flex-shrink-0">{item.step}</div>
                    <div>
                      <div className="font-bold text-xs text-purple-800 font-mono">{item.label}</div>
                      <div className="text-xs text-purple-600">{item.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
            );
          case 'rag-chain':
            return (
              <div className="space-y-3">
                <div className="text-xs font-bold text-slate-500 mb-1">RAG 파이프라인 흐름</div>
                {[
                  { label: '사용자 질문', arrow: true },
                  { label: 'Retriever가 Chroma에서 관련 문서 검색', arrow: true },
                  { label: '검색된 문서 + 질문 → LLM에 전달', arrow: true },
                  { label: 'LLM이 문서 기반 답변 생성', arrow: false },
                ].map((item, i) => (
                  <div key={i}>
                    <div className="p-3 bg-green-50 border border-green-200 rounded-lg">
                      <div className="text-sm text-green-800">{item.label}</div>
                    </div>
                    {item.arrow && (
                      <div className="text-center text-green-400 font-bold">&#8595;</div>
                    )}
                  </div>
                ))}
              </div>
            );
          case 'llamaindex-flow':
            return (
              <div className="space-y-2">
                {[
                  { step: '1', label: 'chromadb.PersistentClient()', desc: 'Chroma 클라이언트 생성' },
                  { step: '2', label: 'ChromaVectorStore()', desc: 'LlamaIndex 래퍼로 감싸기' },
                  { step: '3', label: 'VectorStoreIndex.from_documents()', desc: '문서 인덱싱' },
                  { step: '4', label: 'index.as_query_engine()', desc: '쿼리 엔진으로 변환' },
                  { step: '5', label: 'engine.query()', desc: '질의 → 답변' },
                ].map((item) => (
                  <div key={item.step} className="flex items-center gap-3 p-3 bg-orange-50 rounded-lg border border-orange-200">
                    <div className="w-7 h-7 bg-orange-500 text-white flex items-center justify-center rounded-full font-bold text-xs flex-shrink-0">{item.step}</div>
                    <div>
                      <div className="font-bold text-xs text-orange-800 font-mono">{item.label}</div>
                      <div className="text-xs text-orange-600">{item.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
            );
          case 'keywords':
            return (
              <div className="space-y-4">
                <div className="flex flex-wrap gap-2">
                  {['Chroma.from_documents()', 'ChromaVectorStore', 'VectorStoreIndex', 'as_retriever()'].map(kw => (
                    <span key={kw} className="bg-green-50 text-green-700 px-3 py-1.5 rounded-full text-sm font-medium border border-green-200">{kw}</span>
                  ))}
                </div>
                <div className="p-4 bg-green-50 border border-green-200 rounded-lg">
                  <div className="font-bold text-green-800 mb-2">다음 시각화에서 배울 것</div>
                  <div className="text-sm text-green-700">Part IV로 넘어갑니다. pgvector — PostgreSQL에 벡터 검색을 추가하는 확장. 기존 집에 방을 증축하는 비유로 시작합니다.</div>
                </div>
              </div>
            );
          default:
            return null;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-green-700 hover:text-green-900 font-medium">
                <span>&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-green-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Chroma &gt; Chapter 2. Chroma 실전</div>
                  <h1 className="text-2xl font-bold text-slate-800">III-2-2. Chroma + LangChain/LlamaIndex 통합</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>어댑터(변환 플러그)</b> 비유. LangChain과 LlamaIndex가 각각 Chroma를 감싸서 RAG 파이프라인에 통합하는 패턴을 비교합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-green-700 border-green-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-green-200">프레임워크 통합 패턴</h3>
                <span className="text-xs text-green-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
                  {s.left === 'overview' ? '통합 개요' : s.left === 'comparison' ? '패턴 비교' : '코드'}
                </div>
                {renderLeft()}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
                  {s.right === 'analogy' ? '어댑터 비유' : s.right === 'keywords' ? '핵심 키워드' : s.right === 'rag-chain' ? 'RAG 파이프라인' : '통합 흐름'}
                </div>
                {renderRight()}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Chroma.from_documents()', 'ChromaVectorStore', 'VectorStoreIndex', 'as_retriever()'].map(kw => (
                <span key={kw} className="bg-green-50 text-green-700 px-3 py-1 rounded-full text-sm font-medium border border-green-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-green-600 hover:bg-green-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./III-2-1.html" className="text-green-600 hover:text-green-800 font-medium">&larr; III-2-1. Chroma 아키텍처</a>
              <a href="../part4/IV-1-1.html" className="text-blue-600 hover:text-blue-800 font-medium">IV-1-1. pgvector란 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
