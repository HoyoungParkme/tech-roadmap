<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB 학습 — III-1-1. Chroma란 (설치에서 첫 검색까지)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    III-1-1. Chroma란 — 설치에서 첫 검색까지
    학습 목표: pip install부터 첫 query 호출까지 5단계로 Chroma의 전체 사용 흐름을 이해한다.
    핵심 비유: 작은 책장 — 설치(책장 조립) → 클라이언트(사서 부르기) → 컬렉션(선반 만들기)
              → 문서 추가(책 꽂기) → 검색(필요한 책 꺼내기). 임베딩은 책장이 알아서 한다.
    패턴: fastapi v1 — 좌(LiveDataPane: ChromaDB/Client/Collection/Docs/Results 박스) /
                       우(VSCode CodeViewer + 파일 탭)
    색상: vector-db purple
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의
    //   active     : 단계마다 어떤 박스가 활성화되는지 ('install'|'client'|'collection'|'add'|'query')
    //   installed  : Chroma 패키지 설치 여부
    //   clientUp   : 클라이언트 객체 생성 여부
    //   collection : { name, exists }
    //   docs       : Collection에 들어 있는 문서 [{ id, text, embedded }]
    //   queryText  : 검색어
    //   results    : [{ id, text, distance, hit }]
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. 설치 — pip install chromadb',
        desc: 'Chroma는 "임베딩에 특화된 벡터 DB"다. 첫 줄 pip install chromadb 한 줄이면 SQLite 백엔드 + 기본 임베딩 모델(all-MiniLM-L6-v2)까지 함께 설치된다. 별도 서버 띄울 필요 없이 바로 import해서 쓸 수 있다.',
        active: 'install',
        installed: true,
        clientUp: false,
        collection: null,
        docs: [],
        queryText: null,
        results: [],
        code: {
          lang: 'bash',
          filename: 'install.sh',
          lines: [
            '# Chroma 설치 — Python 3.8 이상 권장',
            '# 한 줄로 끝난다 (네이티브 의존성도 자동 설치)',
            '',
            'pip install chromadb',
            '',
            '# 설치 확인 — 버전 출력',
            'python -c "import chromadb; print(chromadb.__version__)"',
            '# → 0.5.x',
            '',
            '# 함께 설치되는 것들:',
            '#   - SQLite 기반 영속 스토리지',
            '#   - onnxruntime (기본 임베딩 모델 추론)',
            '#   - all-MiniLM-L6-v2 (384차원 sentence transformer)',
            '#   - HNSW 인덱스 (근사 최근접 검색)',
            '',
            '# 별도 서버를 띄우지 않아도',
            '# 첫 import 순간 임베디드 모드로 동작한다',
            '# (운영 환경에선 chroma run --host 0.0.0.0 으로 서버 모드 가능)',
          ],
          highlight: [4, 7, 11, 12, 13, 14],
        },
      },
      {
        title: 'Step 2. Client 생성 — chromadb.Client()',
        desc: 'chromadb.Client()로 인메모리 클라이언트를 만든다. 이 객체가 모든 Collection을 관리한다. 영속 저장이 필요하면 PersistentClient(path="./chroma_db")로 바꾸면 된다 — 같은 API, 다른 백엔드.',
        active: 'client',
        installed: true,
        clientUp: true,
        collection: null,
        docs: [],
        queryText: null,
        results: [],
        code: {
          lang: 'python',
          filename: 'client.py',
          lines: [
            '"""',
            'Chroma 클라이언트 생성 — 인메모리 vs 영속',
            '클라이언트 1개가 여러 Collection을 관리한다.',
            '"""',
            'import chromadb',
            '',
            '# 1) 인메모리 (개발 / 테스트용)',
            '#    프로세스 종료되면 데이터 사라짐',
            'client = chromadb.Client()',
            '',
            '# 2) 영속 (디스크 저장)',
            '#    같은 path를 다시 열면 데이터 복원',
            '# client = chromadb.PersistentClient(path="./chroma_db")',
            '',
            '# 3) 원격 서버 모드',
            '# client = chromadb.HttpClient(host="localhost", port=8000)',
            '',
            '# 클라이언트 상태 확인',
            'print(client.heartbeat())',
            '# → nanosecond timestamp (서버 살아있다는 뜻)',
            '',
            'print(client.list_collections())',
            '# → []  (아직 Collection이 없음)',
          ],
          highlight: [5, 9, 19, 20, 22, 23],
        },
      },
      {
        title: 'Step 3. Collection 생성 — get_or_create_collection("docs")',
        desc: 'Collection은 "한 종류의 문서를 모아두는 선반"이다. get_or_create_collection은 이미 있으면 가져오고 없으면 만든다 — 멱등(idempotent)해서 스크립트를 여러 번 돌려도 안전. Collection마다 별도의 임베딩 함수와 메타데이터 스키마를 가질 수 있다.',
        active: 'collection',
        installed: true,
        clientUp: true,
        collection: { name: 'docs', exists: true },
        docs: [],
        queryText: null,
        results: [],
        code: {
          lang: 'python',
          filename: 'collection.py',
          lines: [
            '"""',
            'Collection 생성 — 한 그룹의 문서 + 인덱스 + 임베딩 함수',
            '"""',
            'import chromadb',
            '',
            'client = chromadb.Client()',
            '',
            '# 권장: get_or_create_collection (멱등)',
            '#   이미 있으면 가져오고, 없으면 만든다',
            '#   → 스크립트 재실행에 안전',
            'collection = client.get_or_create_collection(',
            '    name="docs",',
            ')',
            '',
            '# 참고: 다른 메서드들',
            '#   create_collection      → 이미 있으면 에러',
            '#   get_collection         → 없으면 에러',
            '#   delete_collection      → 통째 삭제',
            '',
            '# Collection 메타정보',
            'print(collection.name)   # "docs"',
            'print(collection.count())  # 0  (아직 문서 없음)',
            '',
            '# 임베딩 함수는 명시 안 하면 기본값 사용',
            '#   → all-MiniLM-L6-v2 (384차원, 영/한 모두 OK)',
            '# 커스텀 모델은 embedding_function= 인자로 주입',
          ],
          highlight: [11, 12, 13, 21, 22, 24, 25],
        },
      },
      {
        title: 'Step 4. 데이터 add — collection.add(documents=[...], ids=[...])',
        desc: 'collection.add()에 documents 리스트와 ids만 주면 끝. Chroma가 내부 임베딩 함수를 호출해서 텍스트 → 384차원 벡터 변환을 자동으로 해준다. 사용자는 "벡터"라는 단어를 한 번도 쓸 필요가 없다 — 텍스트만 넣으면 된다.',
        active: 'add',
        installed: true,
        clientUp: true,
        collection: { name: 'docs', exists: true },
        docs: [
          { id: 'd1', text: '강아지 훈련 방법', embedded: true },
          { id: 'd2', text: '고양이 건강 관리', embedded: true },
          { id: 'd3', text: '반려동물 영양 가이드', embedded: true },
          { id: 'd4', text: '수족관 물고기 키우기', embedded: true },
        ],
        queryText: null,
        results: [],
        code: {
          lang: 'python',
          filename: 'add.py',
          lines: [
            '"""',
            '문서 추가 — 텍스트만 주면 임베딩은 Chroma가 알아서',
            '"""',
            '# documents : 원본 텍스트 리스트',
            '# ids       : 문서 식별자 (중복 불가, 문자열)',
            '# metadatas : 선택, 필터/정렬용 부가 정보',
            'collection.add(',
            '    documents=[',
            '        "강아지 훈련 방법",',
            '        "고양이 건강 관리",',
            '        "반려동물 영양 가이드",',
            '        "수족관 물고기 키우기",',
            '    ],',
            '    ids=["d1", "d2", "d3", "d4"],',
            '    metadatas=[',
            '        {"category": "dog"},',
            '        {"category": "cat"},',
            '        {"category": "general"},',
            '        {"category": "fish"},',
            '    ],',
            ')',
            '',
            '# 내부에서 자동으로 일어나는 일:',
            '#   1) embedding_function(documents) → 384차원 벡터 4개',
            '#   2) HNSW 인덱스에 벡터 + id 등록',
            '#   3) SQLite에 documents/metadatas 저장',
            '',
            'print(collection.count())  # 4',
          ],
          highlight: [7, 8, 9, 10, 11, 12, 13, 14, 23, 24, 25, 26],
        },
      },
      {
        title: 'Step 5. 검색 — collection.query(query_texts=[...], n_results=5)',
        desc: 'query_texts에 검색어를 넣으면 Chroma가 (1) 검색어를 같은 임베딩 함수로 벡터화하고 (2) HNSW 인덱스에서 최근접 n_results개를 찾아 (3) 원본 문서 + 거리 + 메타데이터를 한 번에 돌려준다. 코드 한 호출에 인덱스 + 텍스트 + 메타데이터가 모두 응답으로 묶여 나오는 게 Chroma의 강점이다.',
        active: 'query',
        installed: true,
        clientUp: true,
        collection: { name: 'docs', exists: true },
        docs: [
          { id: 'd1', text: '강아지 훈련 방법', embedded: true },
          { id: 'd2', text: '고양이 건강 관리', embedded: true },
          { id: 'd3', text: '반려동물 영양 가이드', embedded: true },
          { id: 'd4', text: '수족관 물고기 키우기', embedded: true },
        ],
        queryText: '퍼피 교육법',
        results: [
          { id: 'd1', text: '강아지 훈련 방법', distance: 0.31, hit: true },
          { id: 'd3', text: '반려동물 영양 가이드', distance: 0.62, hit: true },
          { id: 'd2', text: '고양이 건강 관리', distance: 0.78, hit: false },
        ],
        code: {
          lang: 'python',
          filename: 'query.py',
          lines: [
            '"""',
            '유사 문서 검색 — query_texts 한 번이면 임베딩 + 검색 동시',
            '"""',
            'results = collection.query(',
            '    query_texts=["퍼피 교육법"],',
            '    n_results=3,',
            '    # where={"category": "dog"},  # 메타데이터 필터 (선택)',
            ')',
            '',
            '# 반환 구조 — 모든 키는 길이 1 리스트의 리스트',
            '# (query_texts가 N개면 바깥 리스트도 N개)',
            'print(results["ids"])',
            '#   [["d1", "d3", "d2"]]',
            '',
            'print(results["documents"])',
            '#   [["강아지 훈련 방법",',
            '#     "반려동물 영양 가이드",',
            '#     "고양이 건강 관리"]]',
            '',
            'print(results["distances"])',
            '#   [[0.31, 0.62, 0.78]]   ← 낮을수록 유사',
            '',
            'print(results["metadatas"])',
            '#   [[{"category": "dog"}, ...]]',
            '',
            '# 핵심:',
            '#   - 검색어도 자동 임베딩 (같은 함수 보장)',
            '#   - 문서 + 거리 + 메타데이터를 한 번에 반환',
            '#   - FAISS는 인덱스만 → 원본 텍스트 별도 관리 필요',
          ],
          highlight: [4, 5, 6, 12, 13, 15, 17, 18, 20, 21, 26, 27, 28],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 박스 한 개 — Chroma 파이프라인의 한 노드 시각화
    //   active 단계에서는 강조(테두리/그림자/펄스), 이전 완료 단계는 옅은 채움.
    // ─────────────────────────────────────────────────────
    function StageBox({ stageKey, currentActive, completedSet, icon, title, sub, children }) {
      const isActive = stageKey === currentActive;
      const isDone = completedSet.has(stageKey) && !isActive;

      let cls = 'border-slate-200 bg-slate-50';
      if (isActive) cls = 'border-purple-500 bg-purple-50 shadow-md ring-2 ring-purple-300';
      else if (isDone) cls = 'border-purple-200 bg-purple-50/60';

      return (
        <div className={`relative rounded-xl border-2 p-3 transition-all duration-500 ${cls}`}>
          {isActive && (
            <span className="absolute -top-2 -right-2 px-2 py-0.5 rounded-full text-[10px] font-bold bg-purple-600 text-white shadow">
              ACTIVE
            </span>
          )}
          {isDone && (
            <span className="absolute -top-2 -right-2 px-2 py-0.5 rounded-full text-[10px] font-bold bg-purple-300 text-purple-900 shadow">
              DONE
            </span>
          )}
          <div className="flex items-center gap-2 mb-1.5">
            <span className="text-lg leading-none">{icon}</span>
            <div className="flex-1 min-w-0">
              <div className={`text-xs font-bold ${isActive ? 'text-purple-900' : isDone ? 'text-purple-700' : 'text-slate-500'}`}>
                {title}
              </div>
              {sub && (
                <div className="text-[10px] text-slate-500 font-mono truncate">{sub}</div>
              )}
            </div>
          </div>
          <div className="text-[11px] text-slate-700">{children}</div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 임베딩 변환 시각화 — 텍스트 → 벡터 화살표
    // ─────────────────────────────────────────────────────
    function EmbedArrow({ active }) {
      return (
        <div className={`relative flex items-center justify-center my-1.5 transition-opacity duration-500 ${active ? 'opacity-100' : 'opacity-30'}`}>
          <svg viewBox="0 0 220 36" className="w-full max-w-[220px] h-7">
            <defs>
              <marker id="ea-arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
                <path d="M0,0 L8,4 L0,8 Z" fill="#9333ea" />
              </marker>
            </defs>
            <line x1="10" y1="18" x2="200" y2="18" stroke="#9333ea" strokeWidth="2" strokeDasharray="4,3" markerEnd="url(#ea-arrow)">
              {active && (
                <animate attributeName="stroke-dashoffset" from="14" to="0" dur="0.9s" repeatCount="indefinite" />
              )}
            </line>
            <text x="110" y="13" textAnchor="middle" fontSize="9" fontFamily="monospace" fill="#7e22ce" fontWeight="bold">
              embedding_function()
            </text>
            <text x="110" y="32" textAnchor="middle" fontSize="8" fontFamily="monospace" fill="#a855f7">
              text → 384-dim vector (자동)
            </text>
          </svg>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — Chroma 파이프라인 박스 5개 + 임베딩 화살표 + 검색 결과
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      // 단계 진행에 따라 완료 표시 누적
      const order = ['install', 'client', 'collection', 'add', 'query'];
      const activeIdx = order.indexOf(step.active);
      const completedSet = new Set(order.slice(0, activeIdx));

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 Chroma 파이프라인 — 설치에서 첫 검색까지</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 1) 설치 */}
          <StageBox
            stageKey="install"
            currentActive={step.active}
            completedSet={completedSet}
            icon="📦"
            title="1. 설치"
            sub="pip install chromadb"
          >
            {step.installed ? (
              <div className="flex items-center gap-2">
                <span className="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold bg-emerald-100 text-emerald-700 border border-emerald-300">
                  ✓ chromadb 설치됨
                </span>
                <span className="text-[10px] text-slate-500 font-mono">v0.5.x · SQLite + HNSW + MiniLM-L6</span>
              </div>
            ) : (
              <span className="text-[10px] text-slate-400 font-mono">미설치</span>
            )}
          </StageBox>

          {/* 2) Client */}
          <div className="mt-2">
            <StageBox
              stageKey="client"
              currentActive={step.active}
              completedSet={completedSet}
              icon="🧑‍💻"
              title="2. Client 객체"
              sub="chromadb.Client()"
            >
              {step.clientUp ? (
                <div className="flex flex-wrap items-center gap-2">
                  <code className="text-[10px] bg-purple-100 text-purple-800 px-1.5 py-0.5 rounded border border-purple-200">
                    client
                  </code>
                  <span className="text-[10px] text-slate-600">↓ heartbeat OK · in-memory</span>
                </div>
              ) : (
                <span className="text-[10px] text-slate-400 font-mono">아직 없음</span>
              )}
            </StageBox>
          </div>

          {/* 3) Collection */}
          <div className="mt-2">
            <StageBox
              stageKey="collection"
              currentActive={step.active}
              completedSet={completedSet}
              icon="🗄️"
              title="3. Collection"
              sub='get_or_create_collection("docs")'
            >
              {step.collection ? (
                <div className="flex items-center gap-2 flex-wrap">
                  <code className="text-[10px] bg-purple-100 text-purple-800 px-1.5 py-0.5 rounded border border-purple-200">
                    name = "{step.collection.name}"
                  </code>
                  <span className="text-[10px] text-slate-600">
                    embedding = all-MiniLM-L6-v2 (default)
                  </span>
                  <span className="text-[10px] text-slate-500 font-mono ml-auto">
                    count = {step.docs.length}
                  </span>
                </div>
              ) : (
                <span className="text-[10px] text-slate-400 font-mono">아직 생성 안 됨</span>
              )}
            </StageBox>
          </div>

          {/* 임베딩 화살표 (add 단계에서 강조) */}
          <EmbedArrow active={step.active === 'add'} />

          {/* 4) 문서 추가 */}
          <StageBox
            stageKey="add"
            currentActive={step.active}
            completedSet={completedSet}
            icon="📄"
            title="4. 문서 add"
            sub="documents=[...], ids=[...]"
          >
            {step.docs.length === 0 ? (
              <span className="text-[10px] text-slate-400 font-mono">컬렉션이 비어있음</span>
            ) : (
              <div className="grid grid-cols-2 gap-1.5 mt-1">
                {step.docs.map((d) => (
                  <div
                    key={d.id}
                    className="flex items-center gap-1.5 bg-white border border-purple-200 rounded px-1.5 py-1"
                  >
                    <span className="text-[9px] font-mono bg-purple-100 text-purple-700 px-1 rounded">
                      {d.id}
                    </span>
                    <span className="text-[10px] text-slate-700 truncate flex-1">{d.text}</span>
                    {d.embedded && (
                      <span className="text-[9px] text-emerald-600" title="임베딩 완료">✓vec</span>
                    )}
                  </div>
                ))}
              </div>
            )}
          </StageBox>

          {/* 5) 검색 */}
          <div className="mt-2">
            <StageBox
              stageKey="query"
              currentActive={step.active}
              completedSet={completedSet}
              icon="🔍"
              title="5. query"
              sub="query_texts=[...], n_results=5"
            >
              {!step.queryText ? (
                <span className="text-[10px] text-slate-400 font-mono">아직 검색 안 함</span>
              ) : (
                <div className="space-y-2 mt-1">
                  {/* 검색어 */}
                  <div className="rounded-md bg-purple-600 text-white px-2 py-1.5 flex items-center gap-1.5 shadow-sm">
                    <span className="text-xs">❓</span>
                    <span className="text-[10px] uppercase tracking-wider font-bold opacity-80">query</span>
                    <code className="text-[11px] font-mono font-bold">"{step.queryText}"</code>
                  </div>

                  {/* 결과 리스트 */}
                  <div className="space-y-1">
                    {step.results.map((r, i) => (
                      <div
                        key={r.id}
                        className={`flex items-center gap-2 rounded-md border px-2 py-1 ${
                          r.hit
                            ? 'bg-emerald-50 border-emerald-300'
                            : 'bg-slate-50 border-slate-200 opacity-70'
                        }`}
                      >
                        <span className="text-[10px] font-mono w-5 text-slate-500">#{i + 1}</span>
                        <span className="text-[9px] font-mono bg-white border border-slate-200 px-1 rounded text-slate-600">
                          {r.id}
                        </span>
                        <span className={`text-[11px] flex-1 truncate ${r.hit ? 'font-semibold text-emerald-900' : 'text-slate-600'}`}>
                          {r.text}
                        </span>
                        <span className={`text-[10px] font-mono ${r.hit ? 'text-emerald-700' : 'text-slate-500'}`}>
                          d={r.distance.toFixed(2)}
                        </span>
                      </div>
                    ))}
                  </div>

                  <div className="text-[9px] text-slate-500 italic">
                    낮은 distance = 더 유사. 임베딩은 검색어도 자동 변환.
                  </div>
                </div>
              )}
            </StageBox>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-purple-500"></span>
              현재 단계
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-purple-200 border border-purple-300"></span>
              완료
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-emerald-200 border border-emerald-400"></span>
              유사 매칭
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2.5 h-2.5 rounded bg-slate-100 border border-slate-200"></span>
              대기
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + 파일 탭
    //   탭은 STEPS의 모든 filename을 노출하되 현재 step만 활성화 (네비도 가능)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total, onSelectTab }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      const tabs = STEPS.map((s, i) => ({
        idx: i,
        filename: s.code.filename,
        lang: s.code.lang,
      }));

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">VS Code · chroma-quickstart</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">
              {code.lang}
            </span>
          </div>

          {/* 파일 탭 */}
          <div className="bg-[#21252b] flex items-center gap-0 border-b border-slate-700 overflow-x-auto">
            {tabs.map((t) => {
              const active = t.idx === stepIdx;
              return (
                <button
                  key={t.filename}
                  onClick={() => onSelectTab(t.idx)}
                  className={`px-3 py-1.5 text-[11px] font-mono border-r border-slate-700 transition whitespace-nowrap ${
                    active
                      ? 'bg-[#282c34] text-purple-300 border-t-2 border-t-purple-400'
                      : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800'
                  }`}
                  title={`Step ${t.idx + 1}: ${t.filename}`}
                >
                  {t.filename}
                </button>
              );
            })}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-purple-500/15 border-l-2 border-purple-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      const handleSelectTab = (idx) => {
        setStepIdx(idx);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-purple-700 hover:text-purple-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Chroma &gt; Chapter 1. Chroma 기초</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Chroma란 — 설치에서 첫 검색까지</h1>
                  <p className="text-sm text-slate-500 mt-0.5">pip install부터 첫 query() 호출까지 5단계로 따라가기</p>
                </div>
              </div>
              <p className="text-xs text-slate-500 leading-relaxed mt-2">
                Chroma는 임베딩 함수가 내장된 임베디드 벡터 DB다. 사용자는 텍스트만 넣고 빼면 된다 —
                벡터 차원, 인덱스 설정, 임베딩 모델 호출은 모두 라이브러리가 알아서 해준다.
                FAISS와 비교하면 같은 일을 코드 절반 이하로 끝낼 수 있다.
              </p>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                code={step.code}
                stepIdx={stepIdx}
                total={STEPS.length}
                onSelectTab={handleSelectTab}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-purple-50 border-2 border-purple-300 rounded-xl p-3 text-sm text-purple-900">
                💡 다음(III-1-2)에서는 <strong>Chroma 핵심 기능</strong>(Collection 옵션, 메타데이터 필터, 영속성)을 파일 캐비닛 비유로 자세히 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-purple-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-purple-600 text-white hover:bg-purple-700 transition min-w-[110px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 칩 */}
            <div className="flex flex-wrap justify-center gap-2 pt-1">
              {['chromadb', 'Client', 'Collection', 'add()', 'query()', 'embedding_function'].map((kw) => (
                <span
                  key={kw}
                  className="bg-purple-50 text-purple-700 px-3 py-1 rounded-full text-xs font-medium border border-purple-200"
                >
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../part2/II-2-3.html" className="text-slate-500 hover:text-slate-700">&larr; II-2-3. FAISS 한계와 보완</a>
              <a href="./III-1-2.html" className="text-purple-700 hover:text-purple-900 font-medium">III-1-2. Chroma 핵심 기능 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
