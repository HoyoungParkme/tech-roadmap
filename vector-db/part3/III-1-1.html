<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB — III-1-1. Chroma란 — 설치에서 첫 검색까지</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "Chroma는 \"임베딩에 특화된 DB\"입니다. 커피 머신에 비유하면, 원두(텍스트)를 넣고 버튼(query)만 누르면 커피(유사 문서)가 나옵니다. pip install chromadb 한 줄이면 설치 완료입니다.",
        left: 'install',
        right: 'analogy',
      },
      {
        desc: "1단계: 원두 넣기 — Chroma 클라이언트를 생성합니다. chromadb.Client()로 인메모리 DB가 즉시 시작됩니다. FAISS와 달리 별도 인덱스 설정이 필요 없습니다.",
        left: 'code-client',
        right: 'faiss-compare',
      },
      {
        desc: "2단계: 추출 — Collection을 만들고 문서를 추가합니다. collection.add()에 documents, ids, metadatas를 전달하면 자동으로 임베딩이 생성됩니다. 임베딩 함수를 직접 호출할 필요가 없습니다!",
        left: 'code-add',
        right: 'auto-embed',
      },
      {
        desc: "3단계: 서빙 — query_texts에 검색어를 넣으면 유사 문서가 반환됩니다. n_results로 결과 수를 지정합니다. 메타데이터, 거리(distance), 문서 원문이 함께 반환됩니다.",
        left: 'code-query',
        right: 'results',
      },
      {
        desc: "핵심 정리: Chroma는 설치(pip install) → 클라이언트 생성 → Collection 생성 → 문서 추가(add) → 검색(query) 5단계로 완성됩니다. FAISS 대비 코드가 절반 이하이고, 메타데이터가 내장되어 있습니다.",
        left: 'summary',
        right: 'keywords',
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderLeft = () => {
        switch (s.left) {
          case 'install':
            return (
              <pre className="rounded-lg p-4 text-sm whitespace-pre-wrap font-mono border bg-green-50 border-green-200 text-green-800">
{`# 설치 (한 줄이면 끝)
pip install chromadb

# 클라이언트 생성
import chromadb
client = chromadb.Client()

# 이게 전부입니다!`}
              </pre>
            );
          case 'code-client':
            return (
              <pre className="rounded-lg p-4 text-sm whitespace-pre-wrap font-mono border bg-green-50 border-green-200 text-green-800">
{`import chromadb

# 인메모리 클라이언트 (개발용)
client = chromadb.Client()

# 영속 클라이언트 (데이터 유지)
client = chromadb.PersistentClient(
    path="./chroma_db"
)

# Collection 생성
collection = client.create_collection(
    name="my_docs"
)`}
              </pre>
            );
          case 'code-add':
            return (
              <pre className="rounded-lg p-4 text-sm whitespace-pre-wrap font-mono border bg-green-50 border-green-200 text-green-800">
{`# 문서 추가 — 임베딩 자동 생성!
collection.add(
    documents=[
        "강아지 훈련 방법",
        "고양이 건강 관리",
        "반려동물 영양 가이드",
    ],
    metadatas=[
        {"category": "dog"},
        {"category": "cat"},
        {"category": "general"},
    ],
    ids=["doc1", "doc2", "doc3"]
)`}
              </pre>
            );
          case 'code-query':
            return (
              <pre className="rounded-lg p-4 text-sm whitespace-pre-wrap font-mono border bg-green-50 border-green-200 text-green-800">
{`# 유사 문서 검색
results = collection.query(
    query_texts=["퍼피 교육"],
    n_results=2
)

print(results['documents'])
# [['강아지 훈련 방법',
#   '반려동물 영양 가이드']]

print(results['distances'])
# [[0.32, 0.67]]`}
              </pre>
            );
          case 'summary':
            return (
              <div className="space-y-3">
                {[
                  { step: '1', label: 'pip install chromadb', desc: '설치' },
                  { step: '2', label: 'chromadb.Client()', desc: '클라이언트 생성' },
                  { step: '3', label: 'create_collection()', desc: 'Collection 생성' },
                  { step: '4', label: 'collection.add()', desc: '문서 추가 (자동 임베딩)' },
                  { step: '5', label: 'collection.query()', desc: '유사 검색' },
                ].map((item) => (
                  <div key={item.step} className="flex items-center gap-3 p-3 bg-green-50 rounded-lg border border-green-200">
                    <div className="w-8 h-8 bg-green-600 text-white flex items-center justify-center rounded-full font-bold text-sm flex-shrink-0">{item.step}</div>
                    <div>
                      <div className="font-bold text-sm text-green-800 font-mono">{item.label}</div>
                      <div className="text-xs text-green-600">{item.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
            );
          default:
            return null;
        }
      };

      const renderRight = () => {
        switch (s.right) {
          case 'analogy':
            return (
              <div className="space-y-3">
                {[
                  { icon: '1', title: '원두 넣기', desc: 'pip install chromadb → 설치' },
                  { icon: '2', title: '머신 세팅', desc: 'Client() → 클라이언트 생성' },
                  { icon: '3', title: '원두 갈기', desc: 'add() → 문서 추가 + 자동 임베딩' },
                  { icon: '4', title: '추출 버튼', desc: 'query() → 유사 문서 검색' },
                  { icon: '5', title: '커피 완성', desc: '결과: 문서 + 거리 + 메타데이터' },
                ].map((item, i) => (
                  <div key={i} className="flex items-start gap-3 p-3 bg-slate-50 rounded-lg border border-slate-200">
                    <div className="w-7 h-7 bg-green-600 text-white flex items-center justify-center rounded-full font-bold text-xs flex-shrink-0">{item.icon}</div>
                    <div>
                      <div className="font-bold text-sm text-slate-800">{item.title}</div>
                      <div className="text-xs text-slate-600 mt-0.5">{item.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
            );
          case 'faiss-compare':
            return (
              <div className="space-y-3">
                <div className="p-4 bg-amber-50 border border-amber-200 rounded-lg">
                  <div className="font-bold text-amber-800 mb-1">FAISS (이전)</div>
                  <div className="text-xs text-amber-700 font-mono whitespace-pre-wrap">{`import faiss
import numpy as np
# 차원 설정 필요
d = 384
index = faiss.IndexFlatL2(d)
# 직접 벡터 변환 필요
vectors = embed(texts)
index.add(vectors)`}</div>
                </div>
                <div className="flex justify-center text-slate-400 font-bold text-lg">VS</div>
                <div className="p-4 bg-green-50 border border-green-200 rounded-lg">
                  <div className="font-bold text-green-800 mb-1">Chroma (지금)</div>
                  <div className="text-xs text-green-700 font-mono whitespace-pre-wrap">{`import chromadb
client = chromadb.Client()
col = client.create_collection("docs")
# 텍스트만 넣으면 자동 임베딩!
col.add(documents=texts, ids=ids)`}</div>
                </div>
              </div>
            );
          case 'auto-embed':
            return (
              <div className="space-y-3">
                <div className="p-4 bg-green-50 border border-green-200 rounded-lg">
                  <div className="font-bold text-green-800 mb-2">자동 임베딩이란?</div>
                  <div className="text-sm text-green-700 space-y-2">
                    <p>Chroma는 기본 임베딩 함수(all-MiniLM-L6-v2)가 내장되어 있습니다.</p>
                    <p>documents에 텍스트를 넣으면 자동으로 벡터로 변환합니다.</p>
                  </div>
                </div>
                <div className="p-4 bg-slate-50 border border-slate-200 rounded-lg">
                  <div className="font-bold text-slate-800 mb-2">커스텀 임베딩도 가능</div>
                  <pre className="text-xs text-slate-700 font-mono whitespace-pre-wrap">{`# OpenAI 임베딩 사용
from chromadb.utils import embedding_functions
ef = embedding_functions.OpenAIEmbeddingFunction(
    api_key="sk-..."
)
col = client.create_collection(
    name="docs",
    embedding_function=ef
)`}</pre>
                </div>
              </div>
            );
          case 'results':
            return (
              <div className="space-y-2">
                <div className="text-xs font-bold text-slate-500 mb-2">검색 결과 구조</div>
                {[
                  { field: 'documents', value: '원본 텍스트 반환', match: true },
                  { field: 'distances', value: '유사도 거리 (낮을수록 유사)', match: true },
                  { field: 'metadatas', value: '메타데이터 함께 반환', match: true },
                  { field: 'ids', value: '문서 ID 반환', match: true },
                ].map((r, i) => (
                  <div key={i} className="flex items-center justify-between p-3 rounded-lg border bg-green-50 border-green-200">
                    <div className="flex items-center gap-2">
                      <span className="w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold bg-green-500 text-white">&#10003;</span>
                      <span className="text-sm font-medium text-slate-800 font-mono">{r.field}</span>
                    </div>
                    <span className="text-xs text-green-600">{r.value}</span>
                  </div>
                ))}
                <div className="mt-3 p-3 bg-amber-50 border border-amber-200 rounded-lg">
                  <div className="text-xs text-amber-700">FAISS는 벡터 인덱스만 반환 → 원본 텍스트는 별도 관리 필요</div>
                  <div className="text-xs text-green-700 mt-1 font-bold">Chroma는 문서 + 메타데이터 + 거리 모두 한 번에 반환!</div>
                </div>
              </div>
            );
          case 'keywords':
            return (
              <div className="space-y-4">
                <div className="flex flex-wrap gap-2">
                  {['chromadb', 'Collection', 'add()', 'query()', 'embedding_function'].map(kw => (
                    <span key={kw} className="bg-green-50 text-green-700 px-3 py-1.5 rounded-full text-sm font-medium border border-green-200">{kw}</span>
                  ))}
                </div>
                <div className="p-4 bg-green-50 border border-green-200 rounded-lg">
                  <div className="font-bold text-green-800 mb-2">다음 시각화에서 배울 것</div>
                  <div className="text-sm text-green-700">Collection, 메타데이터 필터, 영속성 — Chroma의 3대 핵심 기능을 파일 캐비닛 비유로 알아봅니다.</div>
                </div>
              </div>
            );
          default:
            return null;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-green-700 hover:text-green-900 font-medium">
                <span>&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-green-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Chroma &gt; Chapter 1. Chroma 기초</div>
                  <h1 className="text-2xl font-bold text-slate-800">III-1-1. Chroma란 — 설치에서 첫 검색까지</h1>
                </div>
              </div>
              <p className="text-slate-600">커피 머신에 비유합니다. <b>원두 넣기</b>(pip install) → <b>추출</b>(add) → <b>서빙</b>(query). FAISS보다 직관적이고 메타데이터가 내장된 임베딩 DB입니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-green-700 border-green-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-green-200">Chroma 기본 워크플로우</h3>
                <span className="text-xs text-green-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
                  {s.left === 'summary' ? '5단계 요약' : '코드'}
                </div>
                {renderLeft()}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
                  {s.right === 'analogy' ? '커피 머신 비유' : s.right === 'faiss-compare' ? 'FAISS vs Chroma' : s.right === 'auto-embed' ? '자동 임베딩' : s.right === 'results' ? '반환 구조' : '핵심 키워드'}
                </div>
                {renderRight()}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['chromadb', 'Collection', 'add()', 'query()', 'embedding_function'].map(kw => (
                <span key={kw} className="bg-green-50 text-green-700 px-3 py-1 rounded-full text-sm font-medium border border-green-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-green-600 hover:bg-green-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="../part2/II-2-3.html" className="text-green-600 hover:text-green-800 font-medium">&larr; II-2-3. FAISS 한계와 보완</a>
              <a href="./III-1-2.html" className="text-green-600 hover:text-green-800 font-medium">III-1-2. Chroma 핵심 기능 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
