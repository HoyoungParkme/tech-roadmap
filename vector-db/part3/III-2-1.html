<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB — III-2-1. Chroma 아키텍처 — 인메모리 vs Client-Server</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "Chroma는 두 가지 모드로 운영할 수 있습니다. 1인 카페(인메모리) — 주인이 직접 커피를 내리고 서빙, 빠르지만 혼자 감당. 프랜차이즈(Client-Server) — 본사 서버가 관리하고 여러 매장(클라이언트)이 접속.",
        left: 'overview',
        right: 'analogy',
      },
      {
        desc: "인메모리 모드(EphemeralClient): 프로세스 내에서 동작합니다. 별도 서버 없이 Python 코드에서 바로 사용. 노트북이나 스크립트에서 빠르게 프로토타이핑할 때 최적입니다. 단, 프로세스 종료 시 데이터가 사라집니다.",
        left: 'code-ephemeral',
        right: 'ephemeral-detail',
      },
      {
        desc: "영속 모드(PersistentClient): 인메모리와 동일하게 프로세스 내에서 동작하지만, 디스크에 데이터를 저장합니다. 단일 애플리케이션에서 데이터를 유지해야 할 때 사용합니다.",
        left: 'code-persistent',
        right: 'persistent-detail',
      },
      {
        desc: "Client-Server 모드(HttpClient): Chroma 서버를 별도 프로세스/컨테이너로 실행하고, 클라이언트가 HTTP로 접속합니다. 여러 애플리케이션이 동시에 같은 데이터에 접근할 수 있습니다. Docker로 쉽게 배포 가능합니다.",
        left: 'code-http',
        right: 'http-detail',
      },
      {
        desc: "핵심 정리: 프로토타입 → EphemeralClient, 단일 앱 + 데이터 유지 → PersistentClient, 멀티 앱 + 프로덕션 → HttpClient(Client-Server). 코드 변경은 클라이언트 생성 부분 한 줄뿐, 나머지 API는 동일합니다.",
        left: 'decision',
        right: 'keywords',
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderLeft = () => {
        switch (s.left) {
          case 'overview':
            return (
              <div className="space-y-3">
                <div className="p-4 bg-green-50 border border-green-200 rounded-lg">
                  <div className="font-bold text-green-800 mb-2">3가지 클라이언트 모드</div>
                  <div className="space-y-2">
                    {[
                      { mode: 'EphemeralClient()', desc: '인메모리, 데이터 휘발' },
                      { mode: 'PersistentClient()', desc: '인메모리 + 디스크 영속' },
                      { mode: 'HttpClient()', desc: '별도 서버 접속 (HTTP)' },
                    ].map((item, i) => (
                      <div key={i} className="flex items-center gap-2 p-2 bg-white rounded border border-green-100">
                        <span className="text-xs font-mono font-bold text-green-700">{item.mode}</span>
                        <span className="text-xs text-slate-500">{item.desc}</span>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg">
                  <div className="text-xs text-slate-600">핵심: 어떤 클라이언트를 선택하든 collection.add(), collection.query() 등의 API는 완전히 동일합니다.</div>
                </div>
              </div>
            );
          case 'code-ephemeral':
            return (
              <pre className="rounded-lg p-4 text-sm whitespace-pre-wrap font-mono border bg-green-50 border-green-200 text-green-800">
{`import chromadb

# 인메모리 클라이언트 (휘발)
client = chromadb.EphemeralClient()

# 또는 단축형
client = chromadb.Client()

# 사용법은 동일
col = client.create_collection("test")
col.add(
    documents=["테스트 문서"],
    ids=["d1"]
)
results = col.query(
    query_texts=["검색어"],
    n_results=1
)

# 프로세스 종료 → 데이터 소멸`}
              </pre>
            );
          case 'code-persistent':
            return (
              <pre className="rounded-lg p-4 text-sm whitespace-pre-wrap font-mono border bg-green-50 border-green-200 text-green-800">
{`import chromadb

# 영속 클라이언트
client = chromadb.PersistentClient(
    path="./chroma_data"
)

# API는 완전히 동일!
col = client.get_or_create_collection("docs")
col.add(
    documents=["영속 문서"],
    ids=["d1"]
)

# 프로세스 종료 후 재시작
client = chromadb.PersistentClient(
    path="./chroma_data"
)
col = client.get_collection("docs")
print(col.count())  # 1 — 데이터 유지`}
              </pre>
            );
          case 'code-http':
            return (
              <pre className="rounded-lg p-4 text-sm whitespace-pre-wrap font-mono border bg-green-50 border-green-200 text-green-800">
{`# 1) 서버 실행 (터미널)
# chroma run --host 0.0.0.0 --port 8000

# 또는 Docker로 실행
# docker run -p 8000:8000 chromadb/chroma

# 2) 클라이언트에서 접속
import chromadb

client = chromadb.HttpClient(
    host="localhost",
    port=8000
)

# API는 완전히 동일!
col = client.get_or_create_collection("docs")
col.add(
    documents=["서버 문서"],
    ids=["d1"]
)
results = col.query(
    query_texts=["검색어"],
    n_results=1
)`}
              </pre>
            );
          case 'decision':
            return (
              <div className="space-y-3">
                {[
                  { scenario: '노트북/스크립트 프로토타입', client: 'EphemeralClient()', color: 'bg-slate-50 border-slate-200' },
                  { scenario: '단일 앱 + 데이터 유지', client: 'PersistentClient(path=...)', color: 'bg-green-50 border-green-200' },
                  { scenario: '멀티 앱 / 팀 공유 / 프로덕션', client: 'HttpClient(host=..., port=...)', color: 'bg-emerald-50 border-emerald-200' },
                ].map((item, i) => (
                  <div key={i} className={`p-4 rounded-lg border ${item.color}`}>
                    <div className="font-bold text-sm text-slate-800 mb-1">{item.scenario}</div>
                    <div className="text-xs font-mono text-green-700">{item.client}</div>
                  </div>
                ))}
                <div className="p-3 bg-amber-50 border border-amber-200 rounded-lg">
                  <div className="text-xs text-amber-700 font-bold">모드 전환 시 바꿀 코드는 클라이언트 생성 1줄뿐!</div>
                  <div className="text-xs text-amber-600 mt-1">collection.add(), query() 등 나머지 코드는 수정할 필요 없습니다.</div>
                </div>
              </div>
            );
          default:
            return null;
        }
      };

      const renderRight = () => {
        switch (s.right) {
          case 'analogy':
            return (
              <div className="space-y-3">
                <div className="p-4 bg-green-50 border border-green-200 rounded-lg">
                  <div className="font-bold text-green-800 mb-2">1인 카페 (인메모리)</div>
                  <div className="text-sm text-green-700 space-y-1">
                    <p>주인이 직접 원두 갈고, 추출하고, 서빙</p>
                    <p>빠르고 간편하지만 주인이 퇴근하면 끝</p>
                    <p>= EphemeralClient / PersistentClient</p>
                  </div>
                </div>
                <div className="flex justify-center text-slate-400 font-bold text-lg">VS</div>
                <div className="p-4 bg-emerald-50 border border-emerald-200 rounded-lg">
                  <div className="font-bold text-emerald-800 mb-2">프랜차이즈 (Client-Server)</div>
                  <div className="text-sm text-emerald-700 space-y-1">
                    <p>본사 서버가 레시피/재고를 중앙 관리</p>
                    <p>여러 매장(클라이언트)이 동시에 접속</p>
                    <p>= HttpClient + Chroma Server</p>
                  </div>
                </div>
              </div>
            );
          case 'ephemeral-detail':
            return (
              <div className="space-y-2">
                {[
                  { label: '서버 필요', value: '불필요', good: true },
                  { label: '설치', value: 'pip install chromadb만', good: true },
                  { label: '속도', value: '매우 빠름 (프로세스 내)', good: true },
                  { label: '데이터 영속', value: '프로세스 종료 시 소멸', good: false },
                  { label: '동시 접근', value: '단일 프로세스만', good: false },
                  { label: '적합 용도', value: '노트북, 테스트, PoC', good: true },
                ].map((item, i) => (
                  <div key={i} className="flex items-center justify-between p-3 rounded-lg border bg-slate-50 border-slate-200">
                    <span className="text-sm font-medium text-slate-700">{item.label}</span>
                    <span className={`text-xs font-medium ${item.good ? 'text-green-600' : 'text-amber-600'}`}>{item.value}</span>
                  </div>
                ))}
              </div>
            );
          case 'persistent-detail':
            return (
              <div className="space-y-2">
                {[
                  { label: '서버 필요', value: '불필요', good: true },
                  { label: '저장 위치', value: 'path 인자 디렉토리', good: true },
                  { label: '저장 형식', value: 'SQLite + Parquet', good: true },
                  { label: '데이터 영속', value: '프로세스 종료해도 유지', good: true },
                  { label: '동시 접근', value: '단일 프로세스만', good: false },
                  { label: '적합 용도', value: '단일 앱, 배치 파이프라인', good: true },
                ].map((item, i) => (
                  <div key={i} className="flex items-center justify-between p-3 rounded-lg border bg-slate-50 border-slate-200">
                    <span className="text-sm font-medium text-slate-700">{item.label}</span>
                    <span className={`text-xs font-medium ${item.good ? 'text-green-600' : 'text-amber-600'}`}>{item.value}</span>
                  </div>
                ))}
              </div>
            );
          case 'http-detail':
            return (
              <div className="space-y-2">
                {[
                  { label: '서버 필요', value: 'Chroma Server (별도 프로세스)', good: false },
                  { label: '배포', value: 'Docker / chroma run', good: true },
                  { label: '통신', value: 'HTTP REST API', good: true },
                  { label: '동시 접근', value: '멀티 클라이언트 지원', good: true },
                  { label: '확장성', value: '수평 확장 가능', good: true },
                  { label: '적합 용도', value: '프로덕션, 팀 공유', good: true },
                ].map((item, i) => (
                  <div key={i} className="flex items-center justify-between p-3 rounded-lg border bg-slate-50 border-slate-200">
                    <span className="text-sm font-medium text-slate-700">{item.label}</span>
                    <span className={`text-xs font-medium ${item.good ? 'text-green-600' : 'text-amber-600'}`}>{item.value}</span>
                  </div>
                ))}
              </div>
            );
          case 'keywords':
            return (
              <div className="space-y-4">
                <div className="flex flex-wrap gap-2">
                  {['EphemeralClient', 'PersistentClient', 'HttpClient', 'ChromaDB Server', 'Docker'].map(kw => (
                    <span key={kw} className="bg-green-50 text-green-700 px-3 py-1.5 rounded-full text-sm font-medium border border-green-200">{kw}</span>
                  ))}
                </div>
                <div className="p-4 bg-green-50 border border-green-200 rounded-lg">
                  <div className="font-bold text-green-800 mb-2">다음 시각화에서 배울 것</div>
                  <div className="text-sm text-green-700">Chroma를 LangChain, LlamaIndex와 통합하는 방법 — 어댑터 패턴으로 RAG 프레임워크와 연동합니다.</div>
                </div>
              </div>
            );
          default:
            return null;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-green-700 hover:text-green-900 font-medium">
                <span>&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-green-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Chroma &gt; Chapter 2. Chroma 실전</div>
                  <h1 className="text-2xl font-bold text-slate-800">III-2-1. Chroma 아키텍처 — 인메모리 vs Client-Server</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>1인 카페</b>(인메모리 모드)와 <b>프랜차이즈</b>(Client-Server 모드). 상황에 맞는 운영 모드를 선택하는 방법을 알아봅니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-green-700 border-green-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-green-200">Chroma 운영 모드 비교</h3>
                <span className="text-xs text-green-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
                  {s.left === 'overview' ? '운영 모드 개요' : s.left === 'decision' ? '선택 가이드' : '코드'}
                </div>
                {renderLeft()}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
                  {s.right === 'analogy' ? '카페 비유' : s.right === 'keywords' ? '핵심 키워드' : '상세 스펙'}
                </div>
                {renderRight()}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['EphemeralClient', 'PersistentClient', 'HttpClient', 'ChromaDB Server', 'Docker'].map(kw => (
                <span key={kw} className="bg-green-50 text-green-700 px-3 py-1 rounded-full text-sm font-medium border border-green-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-green-600 hover:bg-green-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./III-1-2.html" className="text-green-600 hover:text-green-800 font-medium">&larr; III-1-2. Chroma 핵심 기능</a>
              <a href="./III-2-2.html" className="text-green-600 hover:text-green-800 font-medium">III-2-2. Chroma + LangChain/LlamaIndex &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
