    ];

    // ─────────────────────────────────────────────────────
    // 메타데이터 한 줄 표시 헬퍼
    // ─────────────────────────────────────────────────────
    function MetaTags({ meta }) {
      if (!meta) return null;
      const entries = Object.entries(meta);
      return (
        <div className="flex flex-wrap gap-1 mt-1">
          {entries.map(([k, v]) => (
            <span
              key={k}
              className="text-[9px] font-mono bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded border border-purple-200"
            >
              {k}={String(v)}
            </span>
          ))}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 한 컬렉션 박스 (products / blogs / users 각각)
    // ─────────────────────────────────────────────────────
    function CollectionBox({ collection, isMatched }) {
      const ringCls = isMatched
        ? 'border-purple-500 bg-purple-50 shadow-md'
        : 'border-slate-200 bg-white';
      return (
        <div className={`rounded-lg border-2 ${ringCls} transition-all duration-500`}>
          <div
            className={`px-3 py-1.5 border-b flex items-center justify-between ${
              isMatched ? 'bg-purple-600 text-white border-purple-700' : 'bg-slate-100 text-slate-700 border-slate-200'
            }`}
          >
            <div className="flex items-center gap-1.5">
              <span className="text-base leading-none">{collection.icon}</span>
              <span className="text-xs font-bold font-mono">{collection.name}</span>
            </div>
            <span className={`text-[10px] font-mono ${isMatched ? 'text-purple-100' : 'text-slate-500'}`}>
              n={collection.count}
            </span>
          </div>
          <div className="p-2 space-y-1.5">
            {collection.items.map((it) => {
              const base = 'rounded-md border p-1.5 text-[11px] transition-all duration-500';
              let cls;
              if (it.deleted) {
                cls = `${base} bg-red-50 border-red-300 line-through opacity-50`;
              } else if (it.updated) {
                cls = `${base} bg-amber-50 border-amber-400 shadow-sm`;
              } else if (it.hit) {
                cls = `${base} bg-purple-100 border-purple-500 shadow-sm`;
              } else if (it.faded) {
                cls = `${base} bg-slate-50 border-slate-200 opacity-40`;
              } else {
                cls = `${base} bg-white border-slate-200`;
              }
              return (
                <div key={it.id} className={cls}>
                  <div className="flex items-start justify-between gap-1">
                    <div className="flex-1">
                      <div className="text-[9px] font-mono text-slate-400">id={it.id}</div>
                      <div className={`font-medium leading-snug ${it.hit ? 'text-purple-900' : 'text-slate-700'}`}>
                        {it.doc}
                      </div>
                    </div>
                    {it.updated && (
                      <span className="text-[9px] bg-amber-500 text-white px-1.5 py-0.5 rounded font-bold flex-shrink-0">UPDATED</span>
                    )}
                    {it.deleted && (
                      <span className="text-[9px] bg-red-500 text-white px-1.5 py-0.5 rounded font-bold flex-shrink-0">DELETED</span>
                    )}
                    {it.hit && !it.updated && !it.deleted && (
                      <span className="text-[9px] bg-purple-600 text-white px-1.5 py-0.5 rounded font-bold flex-shrink-0">HIT</span>
                    )}
                  </div>
                  <MetaTags meta={it.meta} />
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 디스크 박스 + 저장 화살표 (Step 4 / 5)
    // ─────────────────────────────────────────────────────
    function DiskPanel({ persisted }) {
      if (!persisted) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-purple-300 bg-gradient-to-br from-purple-50 to-purple-100 p-3">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-base">💾</span>
            <span className="text-xs font-bold text-purple-900 font-mono">PersistentClient(path="./db")</span>
            <span className="ml-auto text-[10px] text-emerald-700 font-mono font-bold">
              ● SAVED
            </span>
          </div>

          {/* 저장 화살표 시각화 */}
          <div className="flex items-center gap-2 text-[10px] font-mono text-purple-700 mb-2">
            <span className="bg-white px-2 py-1 rounded border border-purple-200">메모리 (3 컬렉션)</span>
            <span className="flex-1 flex items-center justify-center">
              <svg width="60" height="14" viewBox="0 0 60 14">
                <line x1="2" y1="7" x2="48" y2="7" stroke="#7c3aed" strokeWidth="2" strokeDasharray="3 2">
                  <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1s" repeatCount="indefinite" />
                </line>
                <polygon points="48,2 58,7 48,12" fill="#7c3aed" />
              </svg>
            </span>
            <span className="bg-white px-2 py-1 rounded border border-purple-200">./db/chroma.sqlite3</span>
          </div>

          <div className="text-[10px] text-purple-700 font-mono leading-relaxed">
            ./db/ ├ chroma.sqlite3 (메타) ├ &lt;uuid&gt;/ (HNSW + parquet)
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // query 박스 (Step 3에서만 표시)
    // ─────────────────────────────────────────────────────
    function QueryBox({ query }) {
      if (!query) return null;
      return (
        <div className="mt-3 rounded-lg bg-purple-700 text-white p-3 shadow-sm">
          <div className="text-[10px] uppercase tracking-wider text-purple-200 font-bold mb-1">
            collection.query()
          </div>
          <div className="font-mono text-xs space-y-0.5">
            <div>query_texts=["{query.text}"]</div>
            {query.where && (
              <div>
                where=
                <span className="bg-purple-900 px-1.5 py-0.5 rounded ml-1">
                  {JSON.stringify(query.where)}
                </span>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // CRUD 액션 박스 (Step 5)
    // ─────────────────────────────────────────────────────
    function CrudBadge({ crud }) {
      if (!crud) return null;
      return (
        <div className="mt-3 grid grid-cols-2 gap-2">
          <div className="rounded-lg bg-amber-50 border-2 border-amber-400 p-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">✏️</span>
              <span className="text-xs font-bold text-amber-800">collection.update()</span>
            </div>
            <div className="text-[10px] text-amber-700 mt-0.5 font-mono">b2 → 텍스트/메타 갱신</div>
          </div>
          <div className="rounded-lg bg-red-50 border-2 border-red-400 p-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🗑️</span>
              <span className="text-xs font-bold text-red-800">collection.delete()</span>
            </div>
            <div className="text-[10px] text-red-700 mt-0.5 font-mono">b3 → 컬렉션에서 제거</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 메인 패널
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🗄️ Chroma Database — 3 Collections</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-2">
            {step.collections.map((c) => (
              <CollectionBox
                key={c.name}
                collection={c}
                isMatched={step.matchedFrom === c.name}
              />
            ))}
          </div>

          <QueryBox query={step.query} />
          <CrudBadge crud={step.crud} />
          <DiskPanel persisted={step.persisted} />

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm bg-white border border-slate-300"></span>
              일반 문서
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm bg-purple-100 border border-purple-500"></span>
              where 매칭
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm bg-amber-100 border border-amber-400"></span>
              UPDATED
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm bg-red-100 border border-red-400"></span>
              DELETED
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2.5 h-2.5 rounded-sm bg-slate-50 border border-slate-200 opacity-40"></span>
              filter 미매칭
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-purple-500/15 border-l-2 border-purple-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-purple-700 hover:text-purple-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Chroma &gt; Chapter 1. Chroma 기초</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Chroma 핵심 기능 — Collection · 메타데이터 · 영속성</h1>
                  <p className="text-sm text-slate-500 mt-0.5">한 DB에 3개 서랍, 각 문서엔 태그, PersistentClient 로 디스크 보존</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-purple-50 border-2 border-purple-300 rounded-xl p-3 text-sm text-purple-900">
                💡 다음(III-2-1)에서는 <strong>Chroma 아키텍처</strong> — 인메모리 / Client-Server 모드와 SQLite + Parquet 저장 구조를 자세히 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-purple-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-purple-600 text-white hover:bg-purple-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; III-1-1 Chroma란</a>
              <a href="./III-2-1.html" className="text-purple-700 hover:text-purple-900 font-medium">III-2-1 Chroma 아키텍처 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
