<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector DB — III-1-2. Chroma 핵심 기능 — Collection, 메타데이터, 영속성</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "Chroma의 3대 핵심 기능을 파일 캐비닛에 비유합니다. Collection(서랍) — 주제별로 문서를 분류, 메타데이터 필터(태그) — 날짜/카테고리로 좁히기, 영속성(잠금장치) — 나갔다 와도 데이터 그대로.",
        left: 'overview',
        right: 'analogy',
      },
      {
        desc: "Collection은 파일 캐비닛의 서랍입니다. 주제별로 문서를 분리하면 검색이 빨라지고 관리가 쉬워집니다. get_or_create_collection()으로 중복 생성을 방지할 수 있습니다.",
        left: 'code-collection',
        right: 'collection-ops',
      },
      {
        desc: "메타데이터 필터는 서랍 속 태그입니다. where 조건으로 카테고리, 날짜, 작성자 등을 필터링할 수 있습니다. where_document로 문서 내용 자체를 필터링할 수도 있습니다.",
        left: 'code-metadata',
        right: 'filter-examples',
      },
      {
        desc: "영속성은 파일 캐비닛의 잠금장치입니다. PersistentClient를 사용하면 프로그램을 종료해도 데이터가 디스크에 유지됩니다. 다시 시작할 때 같은 경로를 지정하면 이전 데이터를 그대로 사용합니다.",
        left: 'code-persist',
        right: 'persist-compare',
      },
      {
        desc: "CRUD 전체를 지원합니다. add(생성), get/query(읽기), update/upsert(수정), delete(삭제). FAISS에서 불가능했던 업데이트와 삭제가 Chroma에서는 기본 제공됩니다.",
        left: 'code-crud',
        right: 'crud-summary',
      },
      {
        desc: "핵심 정리: Collection으로 문서를 분류하고, 메타데이터 필터로 검색 범위를 좁히고, PersistentClient로 데이터를 영속적으로 유지합니다. 이 세 기능이 Chroma를 FAISS보다 실전에서 편리하게 만드는 핵심입니다.",
        left: 'summary',
        right: 'keywords',
      },
    ];

    function App() {
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const s = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => setStep(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      const prev = () => { if (step > 0) { setStep(p => p - 1); setIsPlaying(false); } };
      const nextRef = useRef(next); nextRef.current = next;
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => nextRef.current(), 3000); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const renderLeft = () => {
        switch (s.left) {
          case 'overview':
            return (
              <div className="space-y-3">
                {[
                  { num: '1', title: 'Collection (서랍)', desc: '주제별로 문서를 분류하는 논리적 단위', color: 'bg-green-100 border-green-300' },
                  { num: '2', title: '메타데이터 필터 (태그)', desc: 'where 조건으로 검색 범위를 좁히는 기능', color: 'bg-emerald-100 border-emerald-300' },
                  { num: '3', title: '영속성 (잠금장치)', desc: 'PersistentClient로 디스크에 데이터 유지', color: 'bg-teal-100 border-teal-300' },
                ].map((item) => (
                  <div key={item.num} className={`p-4 rounded-lg border ${item.color}`}>
                    <div className="flex items-center gap-2 mb-1">
                      <div className="w-6 h-6 bg-green-600 text-white flex items-center justify-center rounded-full font-bold text-xs">{item.num}</div>
                      <div className="font-bold text-sm text-slate-800">{item.title}</div>
                    </div>
                    <div className="text-xs text-slate-600 ml-8">{item.desc}</div>
                  </div>
                ))}
              </div>
            );
          case 'code-collection':
            return (
              <pre className="rounded-lg p-4 text-sm whitespace-pre-wrap font-mono border bg-green-50 border-green-200 text-green-800">
{`# Collection 생성
col = client.create_collection("articles")

# 이미 있으면 가져오고, 없으면 생성
col = client.get_or_create_collection(
    name="articles"
)

# Collection 목록 조회
collections = client.list_collections()

# Collection 삭제
client.delete_collection("articles")

# 다른 Collection 생성
faq = client.create_collection("faq")
reviews = client.create_collection("reviews")`}
              </pre>
            );
          case 'code-metadata':
            return (
              <pre className="rounded-lg p-4 text-sm whitespace-pre-wrap font-mono border bg-green-50 border-green-200 text-green-800">
{`# 메타데이터와 함께 문서 추가
col.add(
    documents=["AI 기초 가이드", "ML 실전 튜토리얼"],
    metadatas=[
        {"category": "AI", "year": 2024},
        {"category": "ML", "year": 2025},
    ],
    ids=["d1", "d2"]
)

# where: 메타데이터 필터
results = col.query(
    query_texts=["딥러닝 입문"],
    where={"category": "AI"},
    n_results=5
)

# where_document: 문서 내용 필터
results = col.query(
    query_texts=["딥러닝"],
    where_document={"$contains": "가이드"},
    n_results=5
)`}
              </pre>
            );
          case 'code-persist':
            return (
              <pre className="rounded-lg p-4 text-sm whitespace-pre-wrap font-mono border bg-green-50 border-green-200 text-green-800">
{`# 영속 클라이언트 — 디스크에 자동 저장
client = chromadb.PersistentClient(
    path="./chroma_data"
)

# 데이터 추가 → 자동으로 디스크 저장
col = client.get_or_create_collection("docs")
col.add(
    documents=["중요한 문서"],
    ids=["doc1"]
)

# 프로그램 종료 후 재시작해도...
client = chromadb.PersistentClient(
    path="./chroma_data"  # 같은 경로
)
col = client.get_collection("docs")
print(col.count())  # 1 — 데이터 유지!`}
              </pre>
            );
          case 'code-crud':
            return (
              <pre className="rounded-lg p-4 text-sm whitespace-pre-wrap font-mono border bg-green-50 border-green-200 text-green-800">
{`# Create — 문서 추가
col.add(documents=["텍스트"], ids=["id1"])

# Read — ID로 조회
col.get(ids=["id1"])

# Read — 유사도 검색
col.query(query_texts=["검색어"], n_results=3)

# Update — 문서 수정
col.update(
    ids=["id1"],
    documents=["수정된 텍스트"]
)

# Upsert — 있으면 수정, 없으면 추가
col.upsert(
    ids=["id1"],
    documents=["최신 텍스트"]
)

# Delete — 문서 삭제
col.delete(ids=["id1"])`}
              </pre>
            );
          case 'summary':
            return (
              <div className="space-y-3">
                <div className="p-4 bg-green-50 border border-green-200 rounded-lg">
                  <div className="font-bold text-green-800 mb-2">Collection</div>
                  <div className="text-sm text-green-700">주제별 서랍. create_collection / get_or_create_collection으로 관리</div>
                </div>
                <div className="p-4 bg-emerald-50 border border-emerald-200 rounded-lg">
                  <div className="font-bold text-emerald-800 mb-2">메타데이터 필터</div>
                  <div className="text-sm text-emerald-700">where(메타데이터), where_document(문서 내용)으로 검색 범위 축소</div>
                </div>
                <div className="p-4 bg-teal-50 border border-teal-200 rounded-lg">
                  <div className="font-bold text-teal-800 mb-2">영속성</div>
                  <div className="text-sm text-teal-700">PersistentClient(path=...) → 종료해도 데이터 유지</div>
                </div>
              </div>
            );
          default:
            return null;
        }
      };

      const renderRight = () => {
        switch (s.right) {
          case 'analogy':
            return (
              <div className="space-y-3">
                <div className="p-4 bg-slate-50 border border-slate-200 rounded-lg text-center">
                  <div className="text-4xl mb-2">&#128452;</div>
                  <div className="font-bold text-slate-800 mb-2">파일 캐비닛 비유</div>
                  <div className="text-sm text-slate-600 space-y-1">
                    <p><b>서랍</b> = Collection (주제별 분류)</p>
                    <p><b>태그/라벨</b> = 메타데이터 (필터링)</p>
                    <p><b>잠금장치</b> = 영속성 (데이터 보존)</p>
                  </div>
                </div>
                <div className="p-3 bg-amber-50 border border-amber-200 rounded-lg">
                  <div className="text-xs text-amber-700">FAISS에는 이 세 기능이 모두 없어서 직접 구현해야 했습니다. Chroma는 모두 내장!</div>
                </div>
              </div>
            );
          case 'collection-ops':
            return (
              <div className="space-y-2">
                {[
                  { op: 'create_collection()', desc: '새 서랍 만들기', status: 'success' },
                  { op: 'get_or_create_collection()', desc: '있으면 열고, 없으면 만들기', status: 'success' },
                  { op: 'get_collection()', desc: '기존 서랍 열기', status: 'success' },
                  { op: 'list_collections()', desc: '모든 서랍 목록 보기', status: 'success' },
                  { op: 'delete_collection()', desc: '서랍 삭제', status: 'warning' },
                ].map((item, i) => (
                  <div key={i} className={`flex items-center justify-between p-3 rounded-lg border ${item.status === 'warning' ? 'bg-amber-50 border-amber-200' : 'bg-green-50 border-green-200'}`}>
                    <span className="text-sm font-mono font-medium text-slate-800">{item.op}</span>
                    <span className={`text-xs ${item.status === 'warning' ? 'text-amber-600' : 'text-green-600'}`}>{item.desc}</span>
                  </div>
                ))}
              </div>
            );
          case 'filter-examples':
            return (
              <div className="space-y-3">
                <div className="text-xs font-bold text-slate-500 mb-1">필터 연산자</div>
                {[
                  { op: '$eq', example: '{"year": {"$eq": 2024}}', desc: '같음' },
                  { op: '$ne', example: '{"cat": {"$ne": "spam"}}', desc: '같지 않음' },
                  { op: '$gt / $gte', example: '{"year": {"$gt": 2023}}', desc: '초과 / 이상' },
                  { op: '$lt / $lte', example: '{"year": {"$lt": 2025}}', desc: '미만 / 이하' },
                  { op: '$in', example: '{"cat": {"$in": ["A","B"]}}', desc: '포함' },
                  { op: '$contains', example: 'where_document 전용', desc: '문서 내 텍스트 포함' },
                ].map((item, i) => (
                  <div key={i} className="flex items-center justify-between p-2 rounded border bg-slate-50 border-slate-200">
                    <span className="text-xs font-mono font-bold text-green-700">{item.op}</span>
                    <span className="text-xs text-slate-500">{item.desc}</span>
                  </div>
                ))}
              </div>
            );
          case 'persist-compare':
            return (
              <div className="space-y-3">
                <div className="p-4 bg-amber-50 border border-amber-200 rounded-lg">
                  <div className="font-bold text-amber-800 mb-1">Client() — 인메모리</div>
                  <div className="text-sm text-amber-700">프로그램 종료 시 데이터 소멸</div>
                  <div className="text-xs text-amber-600 mt-1">개발/테스트 용도</div>
                </div>
                <div className="flex justify-center text-slate-400 font-bold text-lg">VS</div>
                <div className="p-4 bg-green-50 border border-green-200 rounded-lg">
                  <div className="font-bold text-green-800 mb-1">PersistentClient() — 영속</div>
                  <div className="text-sm text-green-700">프로그램 종료해도 데이터 유지</div>
                  <div className="text-xs text-green-600 mt-1">프로덕션 / 반복 실행 용도</div>
                </div>
                <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg">
                  <div className="text-xs text-slate-600">디스크 저장 위치: path 인자에 지정한 디렉토리. SQLite + Parquet 형식으로 저장됩니다.</div>
                </div>
              </div>
            );
          case 'crud-summary':
            return (
              <div className="space-y-2">
                {[
                  { op: 'Create', method: 'add()', chroma: true, faiss: false },
                  { op: 'Read', method: 'get() / query()', chroma: true, faiss: true },
                  { op: 'Update', method: 'update() / upsert()', chroma: true, faiss: false },
                  { op: 'Delete', method: 'delete()', chroma: true, faiss: false },
                ].map((item, i) => (
                  <div key={i} className="flex items-center justify-between p-3 rounded-lg border bg-slate-50 border-slate-200">
                    <div>
                      <span className="font-bold text-sm text-slate-800">{item.op}</span>
                      <span className="text-xs text-slate-500 ml-2 font-mono">{item.method}</span>
                    </div>
                    <div className="flex gap-3">
                      <span className={`text-xs font-bold ${item.chroma ? 'text-green-600' : 'text-red-400'}`}>Chroma {item.chroma ? '&#10003;' : '&#10007;'}</span>
                      <span className={`text-xs font-bold ${item.faiss ? 'text-green-600' : 'text-red-400'}`}>FAISS {item.faiss ? '&#10003;' : '&#10007;'}</span>
                    </div>
                  </div>
                ))}
              </div>
            );
          case 'keywords':
            return (
              <div className="space-y-4">
                <div className="flex flex-wrap gap-2">
                  {['Collection', 'where', 'where_document', 'persist_directory', 'PersistentClient'].map(kw => (
                    <span key={kw} className="bg-green-50 text-green-700 px-3 py-1.5 rounded-full text-sm font-medium border border-green-200">{kw}</span>
                  ))}
                </div>
                <div className="p-4 bg-green-50 border border-green-200 rounded-lg">
                  <div className="font-bold text-green-800 mb-2">다음 시각화에서 배울 것</div>
                  <div className="text-sm text-green-700">Chroma의 두 가지 운영 모드 — 인메모리(1인 카페)와 Client-Server(프랜차이즈)의 차이를 알아봅니다.</div>
                </div>
              </div>
            );
          default:
            return null;
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-green-700 hover:text-green-900 font-medium">
                <span>&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-green-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Chroma &gt; Chapter 1. Chroma 기초</div>
                  <h1 className="text-2xl font-bold text-slate-800">III-1-2. Chroma 핵심 기능 — Collection, 메타데이터, 영속성</h1>
                </div>
              </div>
              <p className="text-slate-600">정리된 <b>파일 캐비닛</b>에 비유합니다. <b>서랍</b>(Collection)으로 분류하고, <b>태그</b>(메타데이터)로 찾고, <b>잠금장치</b>(영속성)로 보존합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-green-700 border-green-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-green-200">Chroma 핵심 3기능</h3>
                <span className="text-xs text-green-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
                  {s.left === 'overview' ? '3대 핵심 기능' : s.left === 'summary' ? '요약' : '코드'}
                </div>
                {renderLeft()}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
                  {s.right === 'analogy' ? '파일 캐비닛 비유' : s.right === 'collection-ops' ? 'Collection 연산' : s.right === 'filter-examples' ? '필터 연산자' : s.right === 'persist-compare' ? '인메모리 vs 영속' : s.right === 'crud-summary' ? 'CRUD 비교' : '핵심 키워드'}
                </div>
                {renderRight()}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Collection', 'where', 'where_document', 'persist_directory', 'PersistentClient'].map(kw => (
                <span key={kw} className="bg-green-50 text-green-700 px-3 py-1 rounded-full text-sm font-medium border border-green-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-green-600 hover:bg-green-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./III-1-1.html" className="text-green-600 hover:text-green-800 font-medium">&larr; III-1-1. Chroma란</a>
