<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Git & GitHub 인터랙티브 학습 — 완벽 가이드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeInUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .fade-in-up { animation: fadeInUp 0.5s ease-out both; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!--
    ─────────────────────────────────────────────────────────────
    Git & GitHub 인터랙티브 학습 — 허브 페이지
    ─────────────────────────────────────────────────────────────
    전체 Part 네비게이션 + 학습 진행 현황
    각 Part 클릭 시 visualizations/part-N.html로 이동
    ─────────────────────────────────────────────────────────────
  -->
  <script type="text/babel">
    const { useState } = React;

    const PARTS = [
      {
        num: "I",
        title: "왜 버전 관리인가",
        desc: "코드가 아니라 '변화'를 관리한다는 발상이 왜 필요한지 이해한다.",
        level: "★☆☆",
        levelLabel: "비개발자",
        sections: 4,
        color: "orange",
        bgClass: "bg-orange-50 border-orange-200 hover:border-orange-400 hover:shadow-md",
        iconBg: "bg-orange-600",
        badgeClass: "bg-orange-100 text-orange-700",
        link: "visualizations/part-1.html",
        status: "ready",
      },
      {
        num: "II",
        title: "VCS 지도 — Git/SVN/Mercurial 비교",
        desc: "Git을 선택하는 이유를 다른 도구들과 비교해 이해한다.",
        level: "★☆☆~★★☆",
        levelLabel: "비개발자~입문",
        sections: 3,
        color: "indigo",
        bgClass: "bg-indigo-50 border-indigo-200 hover:border-indigo-400 hover:shadow-md",
        iconBg: "bg-indigo-600",
        badgeClass: "bg-indigo-100 text-indigo-700",
        link: "visualizations/part-2.html",
        status: "ready",
      },
      {
        num: "III",
        title: "깃 첫 걸음",
        desc: "터미널을 열고 첫 저장소를 만들어 실제로 손을 움직인다.",
        level: "★★☆",
        levelLabel: "코딩 입문",
        sections: 11,
        color: "emerald",
        bgClass: "bg-emerald-50 border-emerald-200 hover:border-emerald-400 hover:shadow-md",
        iconBg: "bg-emerald-600",
        badgeClass: "bg-emerald-100 text-emerald-700",
        link: "visualizations/part-3.html",
        status: "ready",
      },
      {
        num: "IV",
        title: "브랜치·머지·리베이스",
        desc: "병렬 작업의 핵심인 브랜치를 이해하고, 변경사항이 팀 코드베이스에 합쳐지는 전 과정을 체험한다.",
        level: "★★☆~★★★",
        levelLabel: "입문~주니어",
        sections: 8,
        color: "purple",
        bgClass: "bg-purple-50 border-purple-200 hover:border-purple-400 hover:shadow-md",
        iconBg: "bg-purple-600",
        badgeClass: "bg-purple-100 text-purple-700",
        link: "visualizations/part-4.html",
        status: "ready",
      },
      {
        num: "V",
        title: "PR·리뷰·Issue",
        desc: "코드 품질의 게이트, Pull Request와 팀 협업 도구를 마스터한다.",
        level: "★★★",
        levelLabel: "주니어",
        sections: 5,
        color: "blue",
        bgClass: "bg-blue-50 border-blue-200 hover:border-blue-400 hover:shadow-md",
        iconBg: "bg-blue-600",
        badgeClass: "bg-blue-100 text-blue-700",
        link: "visualizations/part-5.html",
        status: "ready",
      },
      {
        num: "VI",
        title: "실전 팀 워크플로우",
        desc: "개인 학습에서 팀 협업으로 전환하는 실전 패턴과 트러블슈팅.",
        level: "★★★",
        levelLabel: "주니어",
        sections: 7,
        color: "teal",
        bgClass: "bg-teal-50 border-teal-200 hover:border-teal-400 hover:shadow-md",
        iconBg: "bg-teal-600",
        badgeClass: "bg-teal-100 text-teal-700",
        link: "visualizations/part-6.html",
        status: "ready",
      },
      {
        num: "VII",
        title: "CI/CD — GitHub Actions",
        desc: "코드 품질 자동화와 배포 파이프라인 구축. Git과 GitHub의 세 번째 축.",
        level: "★★★",
        levelLabel: "주니어",
        sections: 6,
        color: "rose",
        bgClass: "bg-rose-50 border-rose-200 hover:border-rose-400 hover:shadow-md",
        iconBg: "bg-rose-600",
        badgeClass: "bg-rose-100 text-rose-700",
        link: "visualizations/part-7.html",
        status: "ready",
      },
      {
        num: "VIII",
        title: "태그·릴리즈·분석·디버깅",
        desc: "버전 태그로 릴리즈를 관리하고, Git의 분석·디버깅 도구로 문제를 추적한다.",
        level: "★★★",
        levelLabel: "주니어",
        sections: 5,
        color: "amber",
        bgClass: "bg-amber-50 border-amber-200 hover:border-amber-400 hover:shadow-md",
        iconBg: "bg-amber-600",
        badgeClass: "bg-amber-100 text-amber-700",
        link: "visualizations/part-8.html",
        status: "ready",
      },
      {
        num: "IX",
        title: "보안·GitHub 서비스·고급 도구",
        desc: "SSH/GPG로 보안을 강화하고, GitHub Pages·README·CLI·Hook·worktree로 생산성을 높인다.",
        level: "★★☆~★★★",
        levelLabel: "입문~주니어",
        sections: 7,
        color: "cyan",
        bgClass: "bg-cyan-50 border-cyan-200 hover:border-cyan-400 hover:shadow-md",
        iconBg: "bg-cyan-600",
        badgeClass: "bg-cyan-100 text-cyan-700",
        link: "visualizations/part-9.html",
        status: "ready",
      },
    ];

    const totalSections = PARTS.reduce((sum, p) => sum + p.sections, 0);
    const readySections = PARTS.filter(p => p.status === 'ready').reduce((sum, p) => sum + p.sections, 0);

    function App() {
      return (
        <div className="min-h-screen bg-gradient-to-b from-slate-50 to-slate-100 font-sans p-4 md:p-8 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-8">

            {/* 히어로 헤더 */}
            <header className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 text-center">
              <div className="flex items-center justify-center gap-3 mb-4">
                <div className="w-12 h-12 bg-orange-600 text-white flex items-center justify-center rounded-2xl font-bold text-2xl shadow-md">G</div>
                <h1 className="text-3xl md:text-4xl font-bold text-slate-800">Git & GitHub</h1>
              </div>
              <p className="text-lg text-slate-600 mb-4">
                기초부터 실무까지 — <b>인터랙티브 완벽 가이드</b>
              </p>
              <p className="text-sm text-slate-500 max-w-2xl mx-auto leading-relaxed">
                파일 이름에 <code className="bg-slate-100 px-1 rounded text-xs">_v2_최종_진짜최종</code>을 붙이던 시절부터
                GitHub Actions CI/CD까지. 움직이는 시각화와 함께 단계별로 올라간다.
              </p>

              {/* 진행률 */}
              <div className="mt-6 max-w-md mx-auto">
                <div className="flex items-center justify-between text-xs text-slate-500 mb-1">
                  <span>학습 진행</span>
                  <span>{readySections} / {totalSections} Section</span>
                </div>
                <div className="w-full bg-slate-100 rounded-full h-2">
                  <div className="bg-orange-500 h-2 rounded-full transition-all duration-500"
                       style={{ width: `${(readySections / totalSections * 100).toFixed(0)}%` }}></div>
                </div>
              </div>
            </header>

            {/* 독자별 추천 경로 */}
            <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h2 className="font-bold text-sm text-slate-700 mb-3">🗺️ 독자별 추천 경로</h2>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                <div className="bg-orange-50 rounded-lg p-3 border border-orange-100">
                  <div className="font-bold text-xs text-orange-700 mb-1">Git이 처음인 분</div>
                  <div className="text-[10px] text-orange-600">Part I → II → III → IV</div>
                </div>
                <div className="bg-blue-50 rounded-lg p-3 border border-blue-100">
                  <div className="font-bold text-xs text-blue-700 mb-1">협업이 서툰 분</div>
                  <div className="text-[10px] text-blue-600">Part IV → V → VI</div>
                </div>
                <div className="bg-rose-50 rounded-lg p-3 border border-rose-100">
                  <div className="font-bold text-xs text-rose-700 mb-1">자동화까지 갖추고 싶은 분</div>
                  <div className="text-[10px] text-rose-600">Part V → VI → VII</div>
                </div>
              </div>
            </div>

            {/* Part 카드 그리드 */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {PARTS.map((part, i) => (
                <a
                  key={part.num}
                  href={part.status === 'ready' ? part.link : undefined}
                  onClick={part.status !== 'ready' ? (e) => e.preventDefault() : undefined}
                  className={`fade-in-up block border-2 rounded-xl p-5 transition-all duration-300 ${part.bgClass}
                    ${part.status !== 'ready' ? 'opacity-60 cursor-not-allowed' : 'cursor-pointer'}`}
                  style={{ animationDelay: `${i * 0.08}s` }}
                >
                  <div className="flex items-start gap-4">
                    {/* Part 번호 아이콘 */}
                    <div className={`w-12 h-12 ${part.iconBg} text-white flex items-center justify-center rounded-xl font-bold text-lg shrink-0 shadow-sm`}>
                      {part.num}
                    </div>

                    <div className="flex-1 min-w-0">
                      {/* 제목 */}
                      <div className="flex items-center gap-2 flex-wrap">
                        <h3 className="font-bold text-slate-800 text-sm">Part {part.num}. {part.title}</h3>
                        {part.status === 'ready' && (
                          <span className="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-bold">
                            시각화 준비됨
                          </span>
                        )}
                        {part.status === 'coming' && (
                          <span className="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">
                            준비 중
                          </span>
                        )}
                      </div>

                      {/* 설명 */}
                      <p className="text-xs text-slate-600 mt-1 leading-relaxed">{part.desc}</p>

                      {/* 메타 */}
                      <div className="flex items-center gap-3 mt-2 flex-wrap">
                        <span className={`text-[10px] px-2 py-0.5 rounded-full font-medium ${part.badgeClass}`}>
                          {part.level} {part.levelLabel}
                        </span>
                        <span className="text-[10px] text-slate-400">
                          {part.sections} Section
                        </span>
                      </div>
                    </div>

                    {/* 화살표 */}
                    {part.status === 'ready' && (
                      <div className="text-slate-400 self-center shrink-0">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                          <path d="M9 18l6-6-6-6"/>
                        </svg>
                      </div>
                    )}
                  </div>
                </a>
              ))}
            </div>

            {/* 부록 링크 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 text-center">
              <div className="text-sm text-slate-500">
                📖 <a href="curriculum.md" className="text-orange-600 hover:underline font-medium">상세 커리큘럼 (Markdown)</a>
                <span className="mx-2 text-slate-300">|</span>
                용어집 · FAQ · 참고자료는 커리큘럼 하단 부록 참고
              </div>
            </div>

            {/* 푸터 */}
            <footer className="text-center text-xs text-slate-400 py-4">
              Git & GitHub 사다리형 학습 커리큘럼 — 인터랙티브 완벽 가이드
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
