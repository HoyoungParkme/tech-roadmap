<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Git & GitHub 인터랙티브 학습</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const SECTIONS = [
      {
        part: 'I', label: 'Part I. 왜 버전 관리인가', color: 'bg-orange-600',
        items: [
          { id: 'I', title: '왜 버전 관리인가 (4개 섹션)', file: './visualizations/part-1.html' },
        ],
      },
      {
        part: 'II', label: 'Part II. VCS 지도', color: 'bg-indigo-600',
        items: [
          { id: 'II', title: 'Git/SVN/Mercurial 비교 (3개 섹션)', file: './visualizations/part-2.html' },
        ],
      },
      {
        part: 'III', label: 'Part III. 깃 첫 걸음', color: 'bg-emerald-600',
        items: [
          { id: 'III', title: '첫 저장소 만들기 (11개 섹션)', file: './visualizations/part-3.html' },
        ],
      },
      {
        part: 'IV', label: 'Part IV. 브랜치·머지·리베이스', color: 'bg-purple-600',
        items: [
          { id: 'IV', title: '병렬 작업과 합치기 (8개 섹션)', file: './visualizations/part-4.html' },
        ],
      },
      {
        part: 'V', label: 'Part V. PR·리뷰·Issue', color: 'bg-blue-600',
        items: [
          { id: 'V', title: 'Pull Request와 협업 (5개 섹션)', file: './visualizations/part-5.html' },
        ],
      },
      {
        part: 'VI', label: 'Part VI. 실전 팀 워크플로우', color: 'bg-teal-600',
        items: [
          { id: 'VI', title: '팀 협업 패턴 (7개 섹션)', file: './visualizations/part-6.html' },
        ],
      },
      {
        part: 'VII', label: 'Part VII. CI/CD — GitHub Actions', color: 'bg-sky-600',
        items: [
          { id: 'VII', title: '자동화 파이프라인 (6개 섹션)', file: './visualizations/part-7.html' },
        ],
      },
      {
        part: 'VIII', label: 'Part VIII. 태그·릴리즈·분석·디버깅', color: 'bg-amber-600',
        items: [
          { id: 'VIII', title: '버전 관리와 디버깅 (5개 섹션)', file: './visualizations/part-8.html' },
        ],
      },
      {
        part: 'IX', label: 'Part IX. 보안·GitHub 서비스·고급 도구', color: 'bg-rose-600',
        items: [
          { id: 'IX', title: 'SSH/GPG·Pages·CLI (7개 섹션)', file: './visualizations/part-9.html' },
        ],
      },
    ];

    const TOTAL = SECTIONS.length;

    const PART_BG = {
      I: 'hover:bg-orange-50', II: 'hover:bg-indigo-50', III: 'hover:bg-emerald-50',
      IV: 'hover:bg-purple-50', V: 'hover:bg-blue-50', VI: 'hover:bg-teal-50',
      VII: 'hover:bg-sky-50', VIII: 'hover:bg-amber-50', IX: 'hover:bg-rose-50',
    };

    const PART_ACTIVE = {
      I: 'bg-orange-100 text-orange-800 font-bold', II: 'bg-indigo-100 text-indigo-800 font-bold',
      III: 'bg-emerald-100 text-emerald-800 font-bold', IV: 'bg-purple-100 text-purple-800 font-bold',
      V: 'bg-blue-100 text-blue-800 font-bold', VI: 'bg-teal-100 text-teal-800 font-bold',
      VII: 'bg-sky-100 text-sky-800 font-bold', VIII: 'bg-amber-100 text-amber-800 font-bold',
      IX: 'bg-rose-100 text-rose-800 font-bold',
    };

    function findItemById(id) {
      for (const section of SECTIONS) {
        const found = section.items.find(item => item.id === id);
        if (found) return { ...found, part: section.part };
      }
      return null;
    }

    function App() {
      const [activeId, setActiveId] = useState(null);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [expandedParts, setExpandedParts] = useState(
        { I: true, II: true, III: true, IV: true, V: true, VI: true, VII: true, VIII: true, IX: true }
      );

      const activeItem = activeId ? findItemById(activeId) : null;

      const navigate = useCallback((id) => {
        setActiveId(id);
        window.location.hash = id;
        if (window.innerWidth < 1024) setSidebarOpen(false);
      }, []);

      useEffect(() => {
        const hash = window.location.hash.slice(1);
        if (hash && findItemById(hash)) setActiveId(hash);
        const onHash = () => {
          const h = window.location.hash.slice(1);
          if (h && findItemById(h)) setActiveId(h);
        };
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      const togglePart = (part) => {
        setExpandedParts(prev => ({ ...prev, [part]: !prev[part] }));
      };

      return (
        <div className="h-full flex bg-slate-100">

          {sidebarOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-30 z-30 lg:hidden" onClick={() => setSidebarOpen(false)} />
          )}

          <aside className={`
            fixed lg:static z-40 h-full w-72 bg-white border-r border-slate-200 flex flex-col
            transition-transform duration-200
            ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0 lg:w-72'}
          `}>
            <div className="p-4 border-b border-slate-200 shrink-0">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 bg-slate-800 text-white flex items-center justify-center rounded-lg font-bold text-sm">G</div>
                <div>
                  <div className="font-bold text-slate-800 text-sm">Git & GitHub 학습</div>
                  <div className="text-[11px] text-slate-500">{TOTAL} Parts (56개 섹션)</div>
                </div>
              </div>
            </div>

            <nav className="flex-1 overflow-y-auto p-2">
              {SECTIONS.map((section) => (
                <div key={section.part} className="mb-1">
                  <button
                    onClick={() => togglePart(section.part)}
                    className="w-full flex items-center gap-2 px-2 py-2 rounded-lg text-left hover:bg-slate-50 transition"
                  >
                    <span className={`w-5 h-5 rounded text-white text-[10px] flex items-center justify-center font-bold ${section.color}`}>
                      {section.part}
                    </span>
                    <span className="text-xs font-bold text-slate-700 flex-1 truncate">{section.label}</span>
                    <span className={`text-slate-400 text-xs transition-transform ${expandedParts[section.part] ? 'rotate-90' : ''}`}>&#9654;</span>
                  </button>

                  {expandedParts[section.part] && (
                    <div className="ml-4 border-l border-slate-100 pl-2 space-y-0.5">
                      {section.items.map((item) => {
                        const isActive = activeId === item.id;
                        return (
                          <button
                            key={item.id}
                            onClick={() => navigate(item.id)}
                            className={`w-full text-left px-2 py-1.5 rounded-md text-xs transition-all truncate
                              ${isActive ? PART_ACTIVE[section.part] : `text-slate-600 ${PART_BG[section.part]}`}
                            `}
                          >
                            {item.title}
                          </button>
                        );
                      })}
                    </div>
                  )}
                </div>
              ))}
            </nav>

            <div className="p-3 border-t border-slate-200 shrink-0 text-[10px] text-slate-400 text-center">
              React + Tailwind + Babel CDN
            </div>
          </aside>

          <main className="flex-1 flex flex-col min-w-0">
            <div className="h-12 bg-white border-b border-slate-200 flex items-center px-4 shrink-0 gap-3">
              <button
                onClick={() => setSidebarOpen(prev => !prev)}
                className="lg:hidden p-1.5 rounded-md hover:bg-slate-100 text-slate-600"
                aria-label="사이드바 토글"
              >
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                  <path fillRule="evenodd" d="M3 5h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2z" />
                </svg>
              </button>

              {activeItem ? (
                <div className="flex items-center gap-2 min-w-0">
                  <span className={`w-5 h-5 rounded text-white text-[10px] flex items-center justify-center font-bold shrink-0 ${
                    SECTIONS.find(s => s.part === activeItem.part)?.color || 'bg-slate-600'
                  }`}>{activeItem.part}</span>
                  <span className="text-sm font-bold text-slate-800 truncate">{activeItem.title}</span>
                </div>
              ) : (
                <span className="text-sm text-slate-500">Part를 선택하세요</span>
              )}
            </div>

            {activeItem ? (
              <iframe
                key={activeItem.id}
                src={activeItem.file}
                className="flex-1 w-full border-0"
                title={activeItem.title}
                onLoad={(e) => {
                  setTimeout(() => {
                    try {
                      const doc = e.target.contentDocument;
                      const h = doc.querySelector('#root > div > div > header');
                      const t = doc.querySelector('#root > div > div > div:nth-child(2)');
                      const f = doc.querySelector('#root > div > div > footer');
                      if (h) h.style.display = 'none';
                      if (t) t.style.display = 'none';
                      if (f) f.style.display = 'none';
                    } catch(err) {}
                  }, 1500);
                }}
              />
            ) : (
              <div className="flex-1 flex items-center justify-center p-8">
                <div className="text-center max-w-md">
                  <div className="w-16 h-16 bg-slate-100 text-slate-800 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl font-bold">G</div>
                  <h2 className="text-2xl font-bold text-slate-800 mb-3">Git & GitHub 인터랙티브 학습</h2>
                  <p className="text-slate-600 mb-6 leading-relaxed">
                    왼쪽 사이드바에서 Part를 선택하세요.<br/>
                    Part I부터 순서대로 보거나, 관심 있는 주제를 바로 클릭할 수 있습니다.
                  </p>
                  <div className="grid grid-cols-3 gap-2 mb-6">
                    {SECTIONS.map(s => (
                      <div key={s.part} className="text-center">
                        <div className={`w-8 h-8 rounded-lg text-white text-xs flex items-center justify-center font-bold mx-auto mb-1 ${s.color}`}>{s.part}</div>
                        <div className="text-[10px] text-slate-500">{s.items[0].title.match(/\d+/)?.[0] || 1}개 섹션</div>
                      </div>
                    ))}
                  </div>
                  <p className="text-xs text-slate-400">9 Parts · 56개 섹션 | React + Tailwind CDN | 빌드 도구 없음</p>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
