            'Magic Link 방식이 어떨까 싶어요.',
            '',
            '@minji 프론트 작업량 어느 정도일까요?',
            '@security-team 보안 리스크 검토 부탁드립니다.',
            '',
            '관련: 이슈 #42 / PR #87 / 다음 #49',
            '',
            '## 멘션 / 참조 문법',
            '```',
            '@username       → 사용자 멘션 (알림 발송)',
            '@org/team-name  → 팀 전체 멘션',
            '#42             → 같은 저장소 이슈/PR',
            'owner/repo#42   → 다른 저장소 이슈/PR',
            'a1b2c3d         → 커밋 SHA (앞 7자)',
            '```',
            '',
            '## 코드 위치 참조 (PR 리뷰)',
            '- 라인 번호 클릭 → "Copy permalink"',
            '- `.../blob/<sha>/src/Login.tsx#L42`',
            '- 댓글에 붙여넣으면 코드 미리보기가 펼쳐짐',
            '',
            '<!-- ─── 핵심 ─── -->',
            '<!-- • Issue = 작업, Discussion = 대화 -->',
            '<!-- • @멘션 = 사람, #N = 이슈 -->',
            '<!-- • 멘션받은 사람은 즉시 알림 도달 -->',
          ],
          highlight: [16, 18, 21, 22, 28, 29, 30, 31, 32],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // IssueCard — 좌측 상단: GitHub 이슈 페이지 mock
    // ─────────────────────────────────────────────────────
    function LabelChip({ name }) {
      const tone = name.startsWith('priority')
        ? 'bg-orange-100 text-orange-700 border-orange-300'
        : name === 'bug'
          ? 'bg-rose-100 text-rose-700 border-rose-300'
          : name === 'feature'
            ? 'bg-emerald-100 text-emerald-700 border-emerald-300'
            : 'bg-slate-100 text-slate-700 border-slate-300';
      return (
        <span className={`inline-flex items-center text-[10px] font-mono px-1.5 py-0.5 rounded-full border ${tone}`}>
          {name}
        </span>
      );
    }

    function IssueCard({ issue, focus }) {
      const stateOpen = issue.state === 'open';
      const focusedAssignee = focus === 'assignee';
      const focusedPR = focus === 'pr';

      return (
        <div className={`bg-white rounded-lg border-2 p-3 transition-all duration-500 ${
          focus === 'issue' ? 'border-slate-500 ring-2 ring-slate-200 shadow-md' : 'border-slate-200'
        }`}>
          <div className="flex items-center gap-2 mb-2">
            <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold ${
              stateOpen ? 'bg-emerald-600 text-white' : 'bg-purple-600 text-white'
            }`}>
              <span>{stateOpen ? '◉' : '✓'}</span>
              {stateOpen ? 'Open' : 'Closed'}
            </span>
            <span className="text-[10px] text-slate-500 font-mono">#{issue.number}</span>
            <span className="ml-auto text-[10px] text-slate-400 font-mono">issues/{issue.number}</span>
          </div>

          <div className="font-bold text-sm text-slate-800 leading-snug mb-2">
            {issue.title}
          </div>

          <div className="bg-slate-50 border border-slate-200 rounded p-2 text-[10px] text-slate-600 font-mono whitespace-pre-line max-h-20 overflow-hidden">
            {issue.body}
          </div>

          <div className="grid grid-cols-2 gap-2 mt-3 text-[10px]">
            <div className={`rounded border p-2 transition-all duration-500 ${focusedAssignee && issue.assignees.length > 0 ? 'bg-blue-50 border-blue-400 ring-2 ring-blue-200' : 'bg-white border-slate-200'}`}>
              <div className="text-slate-500 font-bold mb-1">Assignees</div>
              {issue.assignees.length === 0
                ? <span className="text-slate-300 italic">no one</span>
                : issue.assignees.map((a) => (
                    <span key={a} className="inline-flex items-center gap-1 mr-1 mb-0.5">
                      <span className="w-4 h-4 rounded-full bg-slate-300 inline-flex items-center justify-center text-[8px] text-white">{a[1]?.toUpperCase()}</span>
                      <span className="font-mono text-slate-700">{a}</span>
                    </span>
                  ))}
            </div>
            <div className={`rounded border p-2 transition-all duration-500 ${focusedAssignee && issue.milestone ? 'bg-blue-50 border-blue-400 ring-2 ring-blue-200' : 'bg-white border-slate-200'}`}>
              <div className="text-slate-500 font-bold mb-1">Milestone</div>
              {issue.milestone
                ? <span className="font-mono text-slate-700">{issue.milestone}</span>
                : <span className="text-slate-300 italic">none</span>}
            </div>
          </div>

          <div className="mt-2 rounded border bg-white border-slate-200 p-2">
            <div className="text-[10px] text-slate-500 font-bold mb-1">Labels</div>
            {issue.labels.length === 0
              ? <span className="text-slate-300 italic text-[10px]">none</span>
              : <div className="flex gap-1 flex-wrap">{issue.labels.map((l) => <LabelChip key={l} name={l} />)}</div>}
          </div>

          {issue.linkedPR && (
            <div className={`mt-2 rounded border p-2 transition-all duration-500 ${focusedPR ? 'bg-purple-50 border-purple-400 ring-2 ring-purple-200' : 'bg-slate-50 border-slate-200'}`}>
              <div className="text-[10px] text-slate-500 font-bold mb-1">Linked pull request</div>
              <div className="flex items-center gap-2 text-[11px]">
                <span className={`px-1.5 py-0.5 rounded text-[9px] font-bold text-white ${issue.linkedPR.state === 'merged' ? 'bg-purple-600' : 'bg-emerald-600'}`}>
                  {issue.linkedPR.state === 'merged' ? '✓ Merged' : '◉ Open'}
                </span>
                <span className="font-mono text-slate-600">#{issue.linkedPR.number}</span>
                <span className="text-slate-700 truncate">{issue.linkedPR.title}</span>
              </div>
              {focusedPR && (
                <div className="text-[9px] text-purple-700 font-mono mt-1 fade-in-up">
                  → PR 본문에 "Closes #{issue.number}" 한 줄 → 머지 시 자동 close
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // BoardCard — 보드 칸 안의 카드 한 장
    // ─────────────────────────────────────────────────────
    function BoardCard({ card, accent }) {
      const tone = card.justMoved ? 'border-emerald-400 ring-2 ring-emerald-200 fade-in-up'
                 : card.new       ? 'border-slate-400 ring-2 ring-slate-200 fade-in-up'
                 : 'border-slate-200';
      return (
        <div className={`rounded border bg-white p-2 text-[10px] shadow-sm ${tone}`}>
          <div className="flex items-center gap-1.5 mb-1">
            <span className="font-mono text-slate-500">#{card.n}</span>
            {card.label && <LabelChip name={card.label} />}
          </div>
          <div className="text-slate-800 font-medium leading-tight mb-1">{card.title}</div>
          <div className="flex items-center gap-1 text-[9px]">
            {card.assignee
              ? <span className="font-mono text-slate-600">{card.assignee}</span>
              : <span className="italic text-slate-300">unassigned</span>}
            {card.pr && <span className="ml-auto bg-purple-100 text-purple-700 px-1 rounded font-mono">PR #{card.pr}</span>}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // ProjectBoard — 좌측 하단: 칸반 보드 mock
    // ─────────────────────────────────────────────────────
    function ProjectBoard({ board, focus }) {
      const focused = focus === 'board';
      const cols = [
        { key: 'todo',       label: 'Todo',        cards: board.todo,       tone: 'border-slate-300 bg-slate-50' },
        { key: 'inProgress', label: 'In Progress', cards: board.inProgress, tone: 'border-blue-300 bg-blue-50' },
        { key: 'done',       label: 'Done',        cards: board.done,       tone: 'border-emerald-300 bg-emerald-50' },
      ];
      const total = board.todo.length + board.inProgress.length + board.done.length;
      return (
        <div className={`rounded-lg border-2 transition-all duration-500 ${focused ? 'border-slate-500 ring-2 ring-slate-200 shadow-md' : 'border-slate-200'}`}>
          <div className="bg-slate-100 border-b border-slate-200 px-3 py-1.5 flex items-center gap-2">
            <span className="text-xs font-bold text-slate-700">📋 v1.2.0 Project Board</span>
            <span className="text-[10px] text-slate-500 font-mono ml-auto">{total} item{total !== 1 ? 's' : ''}</span>
          </div>
          <div className="grid grid-cols-3 gap-2 p-2 bg-white">
            {cols.map((col) => (
              <div key={col.key} className={`rounded border ${col.tone} p-1.5 min-h-[140px]`}>
                <div className="flex items-center justify-between text-[10px] font-bold text-slate-700 mb-1.5 pb-1 border-b border-slate-200">
                  <span>{col.label}</span>
                  <span className="bg-white border border-slate-200 rounded-full px-1.5 text-[9px] text-slate-500 font-mono">{col.cards.length}</span>
                </div>
                <div className="space-y-1.5">
                  {col.cards.length === 0
                    ? <div className="text-[9px] text-slate-300 italic text-center py-3">empty</div>
                    : col.cards.map((c) => <BoardCard key={c.n} card={c} accent={col.key} />)}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // DiscussionPanel — Step 5 전용: 좌측 하단을 토론 패널로 교체
    // ─────────────────────────────────────────────────────
    function DiscussionPanel({ discussion, focus }) {
      const focused = focus === 'discussion';
      const replies = [
        { user: '@minji', initial: 'M', color: 'bg-blue-300', time: '1h', text: '프론트는 3일이면 가능. 이메일 템플릿만 합의되면 OK.' },
        { user: '@security-team', initial: 'S', color: 'bg-rose-300', time: '30m', text: '토큰 TTL 15분, 1회용 — 검토 OK.' },
      ];
      return (
        <div className={`rounded-lg border-2 transition-all duration-500 ${focused ? 'border-slate-500 ring-2 ring-slate-200 shadow-md' : 'border-slate-200'}`}>
          <div className="bg-slate-100 border-b border-slate-200 px-3 py-1.5 flex items-center gap-2">
            <span className="text-xs font-bold text-slate-700">💬 Discussions</span>
            <span className="text-[10px] text-slate-500 font-mono ml-auto">general / Q&A</span>
          </div>
          <div className="bg-white p-3 space-y-2">
            <div className="bg-slate-50 border border-slate-200 rounded p-2">
              <div className="flex items-center gap-2 mb-1">
                <span className="bg-slate-700 text-white px-1.5 py-0.5 rounded text-[9px] font-bold">🗣️ General</span>
                <span className="text-[10px] text-slate-500 font-mono">started by @hoyoung · 2h ago</span>
              </div>
              <div className="font-bold text-sm text-slate-800 mb-1">{discussion.title || 'Q3 인증 정책 — Magic Link 도입할까?'}</div>
              <div className="text-[11px] text-slate-600 leading-relaxed">
                <span className="bg-blue-100 text-blue-700 px-1 rounded font-mono">@hoyoung</span> 가{' '}
                <span className="bg-amber-100 text-amber-700 px-1 rounded font-mono">#42</span> 마무리 김에, Magic Link 어떨까요?
              </div>
            </div>
            <div className="border-l-2 border-slate-200 pl-2 space-y-2">
              {replies.map((r) => (
                <div key={r.user} className="text-[10px]">
                  <div className="flex items-center gap-1.5 mb-0.5">
                    <span className={`w-4 h-4 rounded-full ${r.color} inline-flex items-center justify-center text-[8px] text-white`}>{r.initial}</span>
                    <span className="font-mono font-bold text-slate-700">{r.user}</span>
                    <span className="text-slate-400 text-[9px]">{r.time}</span>
                  </div>
                  <div className="text-slate-600">{r.text}</div>
                </div>
              ))}
            </div>
            <div className="bg-blue-50 border border-blue-200 rounded p-2">
              <div className="text-[10px] text-slate-500 font-bold mb-1">Mentions in this thread</div>
              <div className="flex gap-1 flex-wrap">
                {(discussion.mentions || []).map((m) => (
                  <span key={m} className="bg-white border border-blue-300 text-blue-700 px-1.5 py-0.5 rounded font-mono text-[10px]">{m}</span>
                ))}
              </div>
              <div className="text-[9px] text-slate-500 font-mono mt-1.5">@ → 사람 / #42 → 이슈 / a1b2c3d → 커밋</div>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체 (Issue + Board / Discussion)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 Issue 카드 + Project 보드</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <IssueCard issue={step.issue} focus={step.focus} />

            {step.focus === 'discussion' ? (
              <DiscussionPanel discussion={step.discussion} focus={step.focus} />
            ) : (
              <ProjectBoard board={step.board} focus={step.focus} />
            )}
          </div>

          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-emerald-500"></span>open / done</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-blue-500"></span>in progress</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-purple-600"></span>merged</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-rose-500"></span>bug</span>
            <span className="ml-auto font-mono">focus: {step.focus}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   파일명 탭, 윈도우 dot, 라인 번호, 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-slate-500/20 border-l-2 border-slate-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // FileTabs — 우측 상단의 파일명 탭 (Step 직접 점프)
    // ─────────────────────────────────────────────────────
    function FileTabs({ stepIdx, setStepIdx }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-1 flex gap-1 overflow-x-auto">
          {STEPS.map((s, i) => {
            const active = i === stepIdx;
            return (
              <button
                key={i}
                onClick={() => setStepIdx(i)}
                className={`flex-1 min-w-[110px] px-2 py-2 rounded-lg text-xs transition-all ${
                  active ? 'bg-slate-700 text-white shadow-sm' : 'text-slate-500 hover:bg-slate-100'
                }`}
              >
                <div className="font-mono font-bold">{s.code.filename}</div>
                <div className={`mt-0.5 text-[10px] ${active ? 'text-slate-300' : 'text-slate-400'}`}>
                  Step {i + 1}
                </div>
              </button>
            );
          })}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생 3000ms, 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-4">

            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-slate-700 hover:text-slate-900 font-medium">&larr; 전체 목차</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">
                curriculum VII — Issue / Project
              </span>
            </nav>

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-1">
                <div className="w-9 h-9 bg-slate-700 text-white flex items-center justify-center rounded-full font-bold text-sm">VII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VII. GitHub 협업 &gt; 이슈 관리</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">
                    Part VII. Issue / Project — 이슈 관리
                  </h1>
                  <p className="text-sm text-slate-500 mt-0.5">
                    Issue 생성 → assignee/milestone → PR 연결 → Project 보드 → discussions/mentions
                  </p>
                </div>
              </div>
            </header>

            <FileTabs stepIdx={stepIdx} setStepIdx={setStepIdx} />

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {stepIdx === STEPS.length - 1 && (
              <div className="bg-slate-100 border-2 border-slate-300 rounded-xl p-3 text-sm text-slate-700">
                💡 정리: <strong>create-issue.md</strong>(작업 카드) → <strong>assignee.md</strong>(누가/언제) → <strong>link-pr.md</strong>(자동 클로즈) → <strong>project-board.md</strong>(칸반) → <strong>discussion.md</strong>(대화/멘션) — 이 5장이 GitHub 이슈 관리의 표준 흐름이다.
              </div>
            )}

            <div className="p-4 rounded-xl bg-slate-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-slate-300">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-slate-300">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={handleReset} disabled={stepIdx === 0 && !isPlaying} aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={handlePrev} disabled={stepIdx === 0} aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-slate-700 text-white hover:bg-slate-800 transition min-w-[110px]">
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1} aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <div className="flex items-center justify-center gap-2">
              {STEPS.map((_, i) => (
                <button key={i} onClick={() => setStepIdx(i)} aria-label={`Step ${i + 1} 로 이동`}
                  className={`w-2.5 h-2.5 rounded-full transition-all ${i === stepIdx ? 'bg-slate-700 scale-125' : i < stepIdx ? 'bg-slate-400' : 'bg-slate-200'}`} />
              ))}
            </div>

            <div className="flex flex-wrap gap-2 justify-center">
              {['Issue', 'Label', 'Assignee', 'Milestone', 'Closes #N', 'Project Board', 'Todo / In Progress / Done', 'Discussions', '@mention'].map((kw) => (
                <span key={kw} className="bg-slate-100 text-slate-700 px-3 py-1 rounded-full text-xs font-medium border border-slate-200">
                  {kw}
                </span>
              ))}
            </div>

            <footer className="text-center text-xs text-slate-400 py-2">
              Git &amp; GitHub 사다리형 학습 커리큘럼 — Part VII 시각화 (fastapi pattern)
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  <\/script>
<script src="sidebar.js"></script>
</body>
</html>
