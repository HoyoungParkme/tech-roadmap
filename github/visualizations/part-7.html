<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Part VII. CI/CD — GitHub Actions — 인터랙티브 시각화</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}.fade-in-up{animation:fadeInUp .5s ease-out both}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // VII-1-1: GitHub Actions란 무엇인가
    const STEPS_1_1 = [
      { label:"Workflow", desc:"[STEP 1] .github/workflows/ 폴더에 YAML 파일을 넣으면 push나 PR 같은 이벤트에 반응해 자동으로 작업을 실행한다.",
        level:'workflow' },
      { label:"Job", desc:"[STEP 2] Workflow는 여러 Job으로 구성된다. 각 Job은 독립적인 Runner(가상 머신)에서 실행된다.",
        level:'job' },
      { label:"Step", desc:"[STEP 3] 각 Job은 Step을 순서대로 실행한다. Step은 명령어 실행(run) 또는 재사용 가능한 Action(uses)이다.",
        level:'step' },
      { label:"Runner", desc:"[STEP 4] Runner는 Job이 실행되는 가상 머신이다. GitHub이 제공하는 Ubuntu/macOS/Windows Runner를 무료로 쓸 수 있다.",
        level:'runner' },
    ];

    // VII-1-2: 첫 번째 Workflow — 자동 테스트
    const STEPS_1_2 = [
      { label:"트리거 설정", desc:"[STEP 1] on: pull_request — PR이 생성·업데이트될 때마다 자동으로 실행된다.",
        yaml:'on: pull_request' },
      { label:"코드 가져오기", desc:"[STEP 2] uses: actions/checkout@v4 — 저장소 코드를 Runner에 가져온다.",
        yaml:'uses: actions/checkout@v4' },
      { label:"환경 설정", desc:"[STEP 3] uses: actions/setup-python@v5 — Python 환경을 설정한다.",
        yaml:'uses: actions/setup-python@v5' },
      { label:"테스트 실행", desc:"[STEP 4] run: pytest — 테스트를 실행한다. 실패하면 PR에 빨간 X가 표시된다.",
        yaml:'run: pytest' },
    ];

    // VII-2-1: Actions 마켓플레이스
    const STEPS_2_1 = [
      { label:"마켓플레이스", desc:"[STEP 1] GitHub Actions Marketplace에 수천 개의 오픈소스 Action이 있다. uses: 키워드로 불러다 쓴다.",
        phase:'marketplace' },
      { label:"버전 고정", desc:"[STEP 2] Action의 버전을 @v3처럼 태그로 고정하면 업스트림 변경으로 인한 파이프라인 브레이크를 방지한다.",
        phase:'versioning' },
      { label:"재사용 가능", desc:"[STEP 3] 자주 쓰는 조합은 Composite Action이나 Reusable Workflow로 패키징해 여러 저장소에서 공유한다.",
        phase:'reusable' },
    ];

    // VII-2-2: GitHub Secrets
    const STEPS_2_2 = [
      { label:"Secret 등록", desc:"[STEP 1] Settings → Secrets and variables → Actions에서 API 키, DB 비밀번호 등을 등록한다. YAML에 직접 쓰면 안 된다.",
        phase:'register' },
      { label:"참조 방법", desc:"[STEP 2] ${{ secrets.MY_API_KEY }}로 workflow에서 참조한다. 로그에 자동으로 마스킹(***) 처리된다.",
        phase:'reference', code:'${{ secrets.MY_API_KEY }}' },
      { label:"Environment 분리", desc:"[STEP 3] staging, production 등 Environment별로 Secret을 분리하면 환경별로 다른 값을 쓸 수 있다.",
        phase:'environment' },
    ];

    // VII-3-1: 자동 배포
    const STEPS_3_1 = [
      { label:"배포 트리거", desc:"[STEP 1] on: push: branches: [main] — PR이 main에 머지될 때마다 자동 배포가 실행된다.",
        target:'trigger' },
      { label:"GitHub Pages", desc:"[STEP 2] actions/deploy-pages@v4로 정적 사이트를 GitHub Pages에 자동 배포한다.",
        target:'pages' },
      { label:"Cloud 배포", desc:"[STEP 3] AWS, GCP, Azure 등 클라우드에 자동 배포. staging 검증 후 production 배포가 안전하다.",
        target:'cloud' },
      { label:"CD vs CD", desc:"[STEP 4] Continuous Deployment(자동 배포) vs Continuous Delivery(수동 승인 후 배포). 팀 상황에 맞게 선택한다.",
        target:'cdvscd' },
    ];

    // VII-3-2: 실전 파이프라인 설계
    const STEPS_3_2 = [
      { label:"Lint", desc:"[STEP 1] 코드 스타일 검사. ESLint, Flake8 등으로 규칙 위반을 자동 탐지한다.",
        stage:'lint', icon:'🔍' },
      { label:"Test", desc:"[STEP 2] 자동 테스트 실행. Lint가 통과해야 Test가 시작된다 (needs: [lint]).",
        stage:'test', icon:'🧪' },
      { label:"Build", desc:"[STEP 3] 빌드. Test가 통과해야 Build가 시작된다 (needs: [test]).",
        stage:'build', icon:'🏗️' },
      { label:"Deploy", desc:"[STEP 4] 배포. main 브랜치에서만 실행된다 (if: github.ref == 'refs/heads/main'). Build가 통과해야 시작.",
        stage:'deploy', icon:'🚀' },
      { label:"파이프라인 완성", desc:"[STEP 5] Lint → Test → Build → Deploy. 각 단계가 이전 단계의 성공에 의존한다. 실패하면 이후 단계가 자동 취소된다.",
        stage:'complete', icon:'✅' },
    ];

    // 렌더러들
    function Viz_1_1({step}) {
      const levels = [{name:'Workflow',desc:'.yml 파일',color:'rose'},{name:'Job',desc:'독립 실행 단위',color:'rose'},{name:'Step',desc:'run / uses',color:'rose'},{name:'Runner',desc:'가상 머신',color:'rose'}];
      const activeIdx = step.level==='workflow'?0:step.level==='job'?1:step.level==='step'?2:3;
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 gap-2">
          {levels.map((l,i)=>(<React.Fragment key={i}>
            <div className={`w-full max-w-xs border-2 rounded-lg px-3 py-2 text-center text-xs font-bold transition-all duration-500
              ${i===activeIdx?'bg-rose-100 border-rose-500 ring-2 ring-rose-300 scale-105 shadow-lg text-rose-700':
                i<activeIdx?'bg-emerald-50 border-emerald-400 text-emerald-700':'bg-white border-slate-200 text-slate-400'}`}>
              {l.name}<span className="font-normal ml-1 text-[10px]">({l.desc})</span>
            </div>
            {i<levels.length-1&&<div className="text-slate-300 text-xs">↓</div>}
          </React.Fragment>))}
        </div>
      );
    }

    function Viz_1_2({step}) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-6">
          <div className="bg-slate-900 rounded-xl p-5 max-w-sm w-full">
            <div className="text-xs text-slate-400 mb-2 font-mono">.github/workflows/test.yml</div>
            <div className="text-rose-400 font-mono text-sm font-bold">{step.yaml}</div>
          </div>
        </div>
      );
    }

    function Viz_2_1({step}) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-4">
          {step.phase==='marketplace'&&(
            <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-5 text-center max-w-sm">
              <div className="text-3xl mb-2">🏪</div>
              <div className="font-bold text-rose-700">Actions Marketplace</div>
              <div className="text-xs text-rose-600 mt-2">수천 개의 오픈소스 Action</div>
              <div className="font-mono text-[10px] text-slate-500 mt-2">uses: docker/login-action@v3</div>
            </div>
          )}
          {step.phase==='versioning'&&(
            <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-5 text-center max-w-sm">
              <div className="text-2xl mb-2">📌</div>
              <div className="font-bold text-amber-700">버전 고정</div>
              <div className="font-mono text-xs text-amber-600 mt-2">uses: actions/checkout@v4</div>
              <div className="text-[10px] text-slate-500 mt-1">@v4 태그로 고정 → 안정성 보장</div>
            </div>
          )}
          {step.phase==='reusable'&&(
            <div className="flex gap-3">
              <div className="bg-rose-50 border border-rose-300 rounded-lg px-3 py-2 text-xs font-bold text-rose-700">Composite Action</div>
              <div className="bg-rose-50 border border-rose-300 rounded-lg px-3 py-2 text-xs font-bold text-rose-700">Reusable Workflow</div>
            </div>
          )}
        </div>
      );
    }

    function Viz_2_2({step}) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-4">
          {step.phase==='register'&&(
            <div className="bg-slate-800 rounded-xl p-5 text-center max-w-sm">
              <div className="text-xs text-slate-400 mb-2">Settings → Secrets → Actions</div>
              <div className="flex gap-2 justify-center flex-wrap">
                <span className="bg-rose-900/50 text-rose-300 text-xs px-2 py-1 rounded font-mono">MY_API_KEY</span>
                <span className="bg-rose-900/50 text-rose-300 text-xs px-2 py-1 rounded font-mono">DB_PASSWORD</span>
              </div>
              <div className="text-[10px] text-slate-500 mt-2">YAML에 직접 쓰면 안 된다!</div>
            </div>
          )}
          {step.code&&(
            <div className="bg-slate-900 rounded-xl p-5 max-w-sm w-full text-center">
              <div className="font-mono text-rose-400 text-sm">{step.code}</div>
              <div className="text-[10px] text-slate-500 mt-2">로그에 ***으로 마스킹됨</div>
            </div>
          )}
          {step.phase==='environment'&&(
            <div className="flex gap-3">
              <div className="bg-amber-50 border-2 border-amber-300 rounded-lg px-3 py-2 text-xs font-bold text-amber-700">staging</div>
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-lg px-3 py-2 text-xs font-bold text-emerald-700">production</div>
            </div>
          )}
        </div>
      );
    }

    function Viz_3_1({step}) {
      const targets = {trigger:'on: push → main',pages:'GitHub Pages',cloud:'AWS / GCP / Azure',cdvscd:'Deployment vs Delivery'};
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-4">
          <div className="bg-rose-50 border-2 border-rose-400 rounded-xl p-5 text-center max-w-sm">
            <div className="text-2xl mb-2">🚀</div>
            <div className="font-bold text-rose-700">{targets[step.target]}</div>
          </div>
        </div>
      );
    }

    function Viz_3_2({step}) {
      const stages = [{name:'Lint',icon:'🔍'},{name:'Test',icon:'🧪'},{name:'Build',icon:'🏗️'},{name:'Deploy',icon:'🚀'}];
      const activeIdx = step.stage==='lint'?0:step.stage==='test'?1:step.stage==='build'?2:step.stage==='deploy'?3:4;
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 gap-2">
          {stages.map((s,i)=>(<React.Fragment key={i}>
            <div className={`w-full max-w-xs border-2 rounded-lg px-3 py-2 text-center text-xs font-bold transition-all duration-500
              ${i===activeIdx?'bg-rose-100 border-rose-500 ring-2 ring-rose-300 scale-105 shadow-lg text-rose-700':
                i<activeIdx||activeIdx===4?'bg-emerald-50 border-emerald-400 text-emerald-700':'bg-white border-slate-200 text-slate-400'}`}>
              {s.icon} {s.name}
              {i===activeIdx&&i<4&&<span className="ml-1 text-[10px] font-normal">(needs: [{i>0?stages[i-1].name.toLowerCase():'—'}])</span>}
            </div>
            {i<stages.length-1&&<div className="text-slate-300 text-xs">↓</div>}
          </React.Fragment>))}
          {activeIdx===4&&<div className="fade-in-up text-emerald-600 font-bold text-xs mt-2">파이프라인 완성!</div>}
        </div>
      );
    }

    const SECTIONS = [
      {id:"1-1",label:"VII-1-1",title:"GitHub Actions란",steps:STEPS_1_1,Renderer:Viz_1_1},
      {id:"1-2",label:"VII-1-2",title:"첫 Workflow",steps:STEPS_1_2,Renderer:Viz_1_2},
      {id:"2-1",label:"VII-2-1",title:"마켓플레이스",steps:STEPS_2_1,Renderer:Viz_2_1},
      {id:"2-2",label:"VII-2-2",title:"Secrets",steps:STEPS_2_2,Renderer:Viz_2_2},
      {id:"3-1",label:"VII-3-1",title:"자동 배포",steps:STEPS_3_1,Renderer:Viz_3_1},
      {id:"3-2",label:"VII-3-2",title:"파이프라인 설계",steps:STEPS_3_2,Renderer:Viz_3_2},
    ];

    function App() {
      const [sectionIdx,setSectionIdx]=useState(0);const [stepIdx,setStepIdx]=useState(0);const [isPlaying,setIsPlaying]=useState(false);const playRef=useRef(null);
      const section=SECTIONS[sectionIdx];const step=section.steps[stepIdx];const isEnd=stepIdx===section.steps.length-1;const Renderer=section.Renderer;
      const handleTabChange=(idx)=>{setSectionIdx(idx);setStepIdx(0);setIsPlaying(false);};
      const handleNext=()=>{setStepIdx(prev=>{if(prev<section.steps.length-1)return prev+1;setIsPlaying(false);return prev;});};
      const handleNextRef=useRef(handleNext);handleNextRef.current=handleNext;
      const handlePrev=()=>{if(stepIdx>0){setStepIdx(prev=>prev-1);setIsPlaying(false);}};
      const togglePlay=()=>{if(isEnd)setStepIdx(0);setIsPlaying(prev=>!prev);};
      useEffect(()=>{if(isPlaying){playRef.current=setInterval(()=>handleNextRef.current(),2800);}else{clearInterval(playRef.current);}return()=>clearInterval(playRef.current);},[isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-4">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between flex-wrap gap-2">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-xs">VII</div>
                  <div><h1 className="text-xl font-bold text-slate-800">Part VII. CI/CD — GitHub Actions</h1>
                  <p className="text-xs text-slate-500">코드 품질 자동화와 배포 파이프라인 구축.</p></div>
                </div>
                <a href="../index.html" className="text-xs text-rose-600 hover:underline font-medium">← 전체 목차</a>
              </div>
            </header>
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-1 flex gap-1 overflow-x-auto">
              {SECTIONS.map((s,i)=>(<button key={s.id} onClick={()=>handleTabChange(i)} aria-label={`${s.label} — ${s.title} 섹션으로 이동`}
                className={`flex-1 min-w-[90px] px-2 py-2 rounded-lg text-xs font-medium transition-all ${i===sectionIdx?'bg-rose-600 text-white shadow-sm':'text-slate-500 hover:bg-slate-100'}`}>
                <div className="font-bold">{s.label}</div><div className={`mt-0.5 text-[10px] ${i===sectionIdx?'text-rose-200':'text-slate-400'}`}>{s.title}</div>
              </button>))}
            </div>
            <div className="bg-rose-700 text-white p-4 rounded-xl shadow-sm border border-rose-800 min-h-[80px] flex flex-col justify-center">
              <h3 className="text-[10px] font-bold text-rose-200 uppercase tracking-wider mb-1">{section.label} — {step.label}</h3>
              <p className="text-sm md:text-base font-medium leading-relaxed">{step.desc}</p>
            </div>
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 min-h-[320px] md:min-h-[380px]"><Renderer step={step}/></div>
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={stepIdx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button aria-label={isPlaying?'정지':'자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-rose-600 hover:bg-rose-700 text-white font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="flex items-center gap-3">
                <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step {stepIdx+1}/{section.steps.length}</div>
                <div className="flex gap-1">{section.steps.map((_,i)=>(<button key={i} onClick={()=>{setStepIdx(i);setIsPlaying(false);}} aria-label={`Step ${i+1}로 이동`} className={`w-2.5 h-2.5 rounded-full transition-all ${i===stepIdx?'bg-rose-500 scale-125':i<stepIdx?'bg-rose-300':'bg-slate-200'}`}/>))}</div>
              </div>
            </div>
            <footer className="text-center text-xs text-slate-400 py-2">Git & GitHub 사다리형 학습 커리큘럼 — Part VII 시각화</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
<script src="sidebar.js"></script>
</body>
</html>
