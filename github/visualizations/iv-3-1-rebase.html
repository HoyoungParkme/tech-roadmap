<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Git & GitHub 학습 — Rebase (히스토리 재정렬)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-3-1. Rebase — 히스토리 재정렬
    학습 목표: merge와 rebase의 차이를 히스토리 그래프로 이해하고, SHA 변경의 의미를 안다.
    핵심 비유: "내 커밋들을 main 최신 위로 옮겨붙이기" — 합류점 없는 직선 히스토리
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 시작 상황 — 분기',
        desc: 'feature 브랜치가 main의 옛날 커밋(C2)에서 분기되어 F1, F2 두 커밋이 있다. 그 사이 main은 C3, C4가 추가로 진행됐다. 두 줄기로 갈라진 상태.',
        view: 'split',
      },
      {
        title: 'Step 2. merge 했을 때 — 합류점 발생',
        desc: '`git merge feature` 실행 → 새 merge commit M이 생기고 두 줄기가 합쳐진다. 히스토리 그래프에 분기·합류 흔적이 그대로 남는다. 정직하지만 그래프가 복잡.',
        view: 'merge',
      },
      {
        title: 'Step 3. rebase 했을 때 — 직선 히스토리',
        desc: '`git rebase main` 실행 → feature의 F1, F2 커밋이 잠시 떼어져서 main의 최신 끝(C4)에 다시 붙는다. 새 커밋 F1\', F2\'가 만들어지고 분기 흔적은 사라진다. 직선 히스토리 → 깨끗.',
        view: 'rebase',
      },
      {
        title: 'Step 4. SHA 변경 경고',
        desc: 'rebase는 기존 commit을 옮기는 게 아니라 **새로 만든다**. F1, F2의 SHA(해시)는 사라지고 F1\', F2\'가 새로 생긴다. 이미 push했던 브랜치를 rebase하면 다른 사람이 받았던 기록과 충돌 → 강제 push 필요 → 협업 깨짐.',
        view: 'sha',
      },
      {
        title: 'Step 5. merge vs rebase 가이드',
        desc: '개인 브랜치(아직 push 안 함, 또는 나만 씀): rebase로 깨끗한 히스토리 추천. 공유 브랜치(여러 사람이 쓰는 main, develop): merge만 사용 — rebase하면 협업자 히스토리가 깨진다. 황금 규칙: "공유된 commit은 절대 rebase하지 말 것".',
        view: 'guide',
      },
    ];

    // Tailwind 정적 매핑 — Play CDN의 클래스 감지 안정성을 위해 명시적 객체로
    const COMMIT_COLOR = {
      main:    'bg-emerald-600',
      feature: 'bg-violet-600',
      merge:   'bg-amber-500',
    };

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 3200);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const view = step.view;

      // 커밋 노드 그리기 도우미
      const Commit = ({ label, color, sha, isNew }) => (
        <div className="flex flex-col items-center">
          <div className={`w-12 h-12 rounded-full text-white font-bold text-xs flex items-center justify-center ${color} ${isNew ? 'ring-4 ring-yellow-300' : ''}`}>
            {label}
          </div>
          {sha && <div className="text-[9px] text-slate-500 font-mono mt-1">{sha}</div>}
        </div>
      );

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Rebase — 히스토리 재정렬</h1>
                <p className="text-sm text-slate-500 mt-1">"내 커밋들을 main 최신 위로 옮겨붙이기" — merge와 어떻게 다른가</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* Step 1~3: 히스토리 그래프 */}
            {(view === 'split' || view === 'merge' || view === 'rebase') && (
              <div className="bg-white rounded-xl border-2 border-slate-300 p-6 mb-6">
                {view === 'split' && (
                  <>
                    <div className="text-xs font-bold text-slate-500 mb-3">분기 상태 (rebase/merge 전)</div>
                    <div className="space-y-6">
                      <div className="flex items-center gap-2 text-emerald-700 font-bold text-sm">main:</div>
                      <div className="flex items-center gap-3 ml-8">
                        <Commit label="C1" color={COMMIT_COLOR.main} sha="a1b2c3d" />
                        <span className="text-slate-400">→</span>
                        <Commit label="C2" color={COMMIT_COLOR.main} sha="b2c3d4e" />
                        <span className="text-slate-400">→</span>
                        <Commit label="C3" color={COMMIT_COLOR.main} sha="c3d4e5f" />
                        <span className="text-slate-400">→</span>
                        <Commit label="C4" color={COMMIT_COLOR.main} sha="d4e5f6g" />
                      </div>
                      <div className="flex items-center gap-2 text-violet-700 font-bold text-sm mt-4">feature (C2에서 분기):</div>
                      <div className="flex items-center gap-3 ml-32">
                        <Commit label="F1" color={COMMIT_COLOR.feature} sha="e5f6g7h" />
                        <span className="text-slate-400">→</span>
                        <Commit label="F2" color={COMMIT_COLOR.feature} sha="f6g7h8i" />
                      </div>
                    </div>
                  </>
                )}

                {view === 'merge' && (
                  <>
                    <div className="text-xs font-bold text-slate-500 mb-3">git merge feature → 합류점 M 생성</div>
                    <div className="flex items-center gap-3 flex-wrap">
                      <Commit label="C1" color={COMMIT_COLOR.main} sha="a1b2c3d" />
                      <span className="text-slate-400">→</span>
                      <Commit label="C2" color={COMMIT_COLOR.main} sha="b2c3d4e" />
                      <span className="text-slate-400">→</span>
                      <Commit label="C3" color={COMMIT_COLOR.main} sha="c3d4e5f" />
                      <span className="text-slate-400">→</span>
                      <Commit label="C4" color={COMMIT_COLOR.main} sha="d4e5f6g" />
                      <span className="text-slate-400">→</span>
                      <Commit label="M" color={COMMIT_COLOR.merge} sha="m1m2m3m" isNew />
                    </div>
                    <div className="flex items-center gap-3 ml-32 mt-3">
                      <Commit label="F1" color={COMMIT_COLOR.feature} sha="e5f6g7h" />
                      <span className="text-slate-400">→</span>
                      <Commit label="F2" color={COMMIT_COLOR.feature} sha="f6g7h8i" />
                      <span className="text-amber-600 ml-12">↗ M에 합류</span>
                    </div>
                    <div className="mt-4 p-3 bg-amber-50 border border-amber-200 rounded text-[11px] text-amber-900">
                      ✅ 두 부모(C4 + F2)를 가진 merge commit M 생성. 분기·합류가 그래프에 그대로 남음
                    </div>
                  </>
                )}

                {view === 'rebase' && (
                  <>
                    <div className="text-xs font-bold text-slate-500 mb-3">git rebase main → 직선 히스토리</div>
                    <div className="flex items-center gap-3 flex-wrap">
                      <Commit label="C1" color={COMMIT_COLOR.main} sha="a1b2c3d" />
                      <span className="text-slate-400">→</span>
                      <Commit label="C2" color={COMMIT_COLOR.main} sha="b2c3d4e" />
                      <span className="text-slate-400">→</span>
                      <Commit label="C3" color={COMMIT_COLOR.main} sha="c3d4e5f" />
                      <span className="text-slate-400">→</span>
                      <Commit label="C4" color={COMMIT_COLOR.main} sha="d4e5f6g" />
                      <span className="text-slate-400">→</span>
                      <Commit label="F1'" color={COMMIT_COLOR.feature} sha="x1y2z3a" isNew />
                      <span className="text-slate-400">→</span>
                      <Commit label="F2'" color={COMMIT_COLOR.feature} sha="x2y3z4b" isNew />
                    </div>
                    <div className="mt-4 p-3 bg-violet-50 border border-violet-200 rounded text-[11px] text-violet-900">
                      ✨ 분기 흔적 사라짐. F1, F2가 새 SHA(F1', F2')로 main 끝에 다시 붙었다. 깨끗한 직선 히스토리
                    </div>
                  </>
                )}
              </div>
            )}

            {/* Step 4: SHA 변경 경고 */}
            {view === 'sha' && (
              <div className="bg-white rounded-xl border-2 border-rose-400 p-5 mb-6">
                <div className="font-bold text-rose-700 text-sm mb-3">⚠️ rebase 전후 SHA 비교</div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                  <div className="p-3 bg-slate-50 rounded">
                    <div className="text-[11px] font-bold text-slate-500 mb-1">rebase 전</div>
                    <div className="font-mono text-xs space-y-1">
                      <div>F1 = <span className="text-rose-600">e5f6g7h</span></div>
                      <div>F2 = <span className="text-rose-600">f6g7h8i</span></div>
                    </div>
                  </div>
                  <div className="p-3 bg-rose-50 rounded">
                    <div className="text-[11px] font-bold text-rose-700 mb-1">rebase 후 — 새 SHA</div>
                    <div className="font-mono text-xs space-y-1">
                      <div>F1' = <span className="text-rose-700 font-bold">x1y2z3a</span></div>
                      <div>F2' = <span className="text-rose-700 font-bold">x2y3z4b</span></div>
                    </div>
                  </div>
                </div>
                <div className="p-3 bg-rose-50 border border-rose-200 rounded text-[11px] text-rose-900 leading-relaxed">
                  <div className="font-bold mb-1">⚠️ 위험 시나리오</div>
                  <div>이미 origin/feature에 push했던 F1, F2를 rebase하면, 다른 협업자가 받았던 SHA와 다른 새 SHA가 생긴다. push 시 거부됨 → `--force` 강제 push 필요 → 협업자의 로컬 히스토리 깨짐.</div>
                </div>
              </div>
            )}

            {/* Step 5: 가이드 */}
            {view === 'guide' && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div className="bg-white rounded-xl border-2 border-emerald-400 p-5">
                  <div className="font-bold text-emerald-700 text-sm mb-2">✅ rebase OK</div>
                  <ul className="text-[12px] text-slate-700 space-y-1.5 leading-relaxed">
                    <li>• 아직 push 안 한 로컬 브랜치</li>
                    <li>• 나 혼자만 쓰는 개인 feature 브랜치</li>
                    <li>• PR 보내기 전 main 최신을 따라가고 싶을 때</li>
                  </ul>
                </div>
                <div className="bg-white rounded-xl border-2 border-rose-400 p-5">
                  <div className="font-bold text-rose-700 text-sm mb-2">❌ rebase 금지</div>
                  <ul className="text-[12px] text-slate-700 space-y-1.5 leading-relaxed">
                    <li>• main, develop 같은 공유 브랜치</li>
                    <li>• 다른 사람도 작업하는 feature</li>
                    <li>• 이미 PR 보낸 후 (리뷰 진행 중)</li>
                  </ul>
                </div>
                <div className="md:col-span-2 p-4 bg-slate-800 text-white rounded-xl text-sm">
                  💡 황금 규칙: <span className="font-bold text-amber-300">"공유된 commit은 절대 rebase하지 말 것"</span>
                </div>
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
