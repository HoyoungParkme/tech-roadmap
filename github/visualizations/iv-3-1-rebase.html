    // ============================================================
    // CodeViewer — VSCode 스타일 + highlight.js
    // ============================================================
    function CodeViewer({ code }) {
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          // 재하이라이트를 위해 data-highlighted 제거
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang} block`;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일명 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="text-[10px] text-slate-500 ml-auto uppercase">{code.lang}</span>
          </div>
          {/* 코드 + 라인 번호 */}
          <div className="overflow-auto max-h-[32rem] text-xs">
            <pre className="p-0 m-0">
              <code ref={codeRef} className={`language-${code.lang} block`}>
{code.lines.join('\n')}

            </pre>
          </div>
          {/* 라인 번호 오버레이 대신, 별도 라인 표시 */}
          <div className="bg-[#21252b] px-4 py-1 text-[10px] text-slate-500 border-t border-slate-700 font-mono">
            총 {code.lines.length} 라인 · 강조: {code.highlight ? code.highlight.join(', ') : '없음'}
          </div>
        </div>
      );
    }

    // ============================================================
    // CommitNode — 단일 commit 동그라미
    // ============================================================
    function CommitNode({ commit, color, size = 'md' }) {
      const sizeClass = size === 'sm' ? 'w-9 h-9 text-[10px]' : 'w-11 h-11 text-[11px]';
      const ringClass = commit.isNew ? 'ring-4 ring-amber-300' : '';
      const orphanClass = commit.orphan ? 'opacity-40 line-through' : '';
      const headBadge = commit.isHead ? (
        <div className="absolute -top-2 -right-2 bg-rose-500 text-white text-[8px] px-1 rounded font-bold">HEAD</div>
      ) : null;
      const branchBadge = commit.branchPoint ? (
        <div className="absolute -bottom-3 left-1/2 -translate-x-1/2 text-[8px] text-violet-600 whitespace-nowrap">⤴ 분기</div>
      ) : null;

      return (
        <div className="flex flex-col items-center relative">
          <div className={`${sizeClass} rounded-full ${color} text-white font-bold flex items-center justify-center shadow ${ringClass} ${orphanClass} relative`}>
            {commit.id}
            {headBadge}
            {branchBadge}
          </div>
          <div className={`text-[8.5px] text-slate-500 font-mono mt-1 ${commit.orphan ? 'line-through opacity-50' : ''}`}>{commit.sha}</div>
          {commit.label && <div className={`text-[9px] text-slate-600 mt-0.5 ${commit.orphan ? 'opacity-50' : ''}`}>{commit.label}</div>}
          {commit.oldSha && <div className="text-[8px] text-slate-400 line-through font-mono">{commit.oldSha}</div>}
        </div>
      );
    }

    // ============================================================
    // BranchGraph — 좌측 그래프 (rebase 전/후 commit 이동)
    // ============================================================
    function BranchGraph({ state }) {
      const phase = state.phase;
      const arrow = <span className="text-slate-400 self-center">→</span>;

      return (
        <div className="bg-white rounded-xl border-2 border-slate-300 p-5 shadow-sm h-full">
          <div className="flex items-center justify-between mb-4">
            <div className="text-xs font-bold text-slate-600 uppercase tracking-wide">브랜치 그래프</div>
            <div className="text-[10px] text-slate-500 font-mono px-2 py-1 bg-slate-100 rounded">
              phase: {phase}
            </div>
          </div>

          {/* main 브랜치 라인 */}
          <div className="mb-2">
            <div className="flex items-center gap-1 text-emerald-700 font-bold text-xs mb-2">
              <span className="w-2 h-2 rounded-full bg-emerald-600"></span>
              main
            </div>
            <div className="flex items-end gap-2 flex-wrap pl-3 pb-2">
              {state.mainCommits.map((c, i) => (
                <React.Fragment key={c.id}>
                  <CommitNode commit={c} color="bg-emerald-600" />
                  {i < state.mainCommits.length - 1 && arrow}
                </React.Fragment>
              ))}
            </div>
          </div>

          {/* 직선 history (Step 4, 5) */}
          {state.straightLine && state.rebasedFeatureCommits && (
            <>
              <div className="text-center text-xs text-emerald-600 my-1">↓ rebase로 main 위에 연결됨 ↓</div>
              <div className="mb-3">
                <div className="flex items-center gap-1 text-violet-700 font-bold text-xs mb-2">
                  <span className="w-2 h-2 rounded-full bg-violet-600"></span>
                  feature (직선)
                </div>
                <div className="flex items-end gap-2 flex-wrap pl-3 pb-2">
                  <span className="text-slate-400 self-center text-xs italic">...C4</span>
                  {arrow}
                  {state.rebasedFeatureCommits.map((c, i) => (
                    <React.Fragment key={c.id}>
                      <CommitNode commit={c} color="bg-violet-600" />
                      {i < state.rebasedFeatureCommits.length - 1 && arrow}
                    </React.Fragment>
                  ))}
                </div>
              </div>
            </>
          )}

          {/* interactive squash 결과 (Step 5) */}
          {phase === 'interactive' && state.interactiveResult && (
            <div className="mt-2 p-3 bg-amber-50 border border-amber-300 rounded">
              <div className="text-[10px] font-bold text-amber-800 mb-2">interactive rebase 결과 — F1' + F2' → 1개로 squash</div>
              <div className="flex items-end gap-2 pl-3">
                <span className="text-slate-400 self-center text-xs italic">...C4</span>
                {arrow}
                {state.interactiveResult.map((c) => (
                  <CommitNode key={c.id} commit={c} color="bg-amber-600" />
                ))}
              </div>
            </div>
          )}

          {/* feature 분기 라인 (Step 1, 2) */}
          {state.featureCommits && (
            <div className="mt-3 pt-3 border-t border-dashed border-slate-300">
              <div className="flex items-center gap-1 text-violet-700 font-bold text-xs mb-2">
                <span className="w-2 h-2 rounded-full bg-violet-600"></span>
                feature (C2에서 분기 ↗)
              </div>
              <div className="flex items-end gap-2 flex-wrap pl-20 pb-2">
                {state.featureCommits.map((c, i) => (
                  <React.Fragment key={c.id}>
                    <CommitNode commit={c} color="bg-violet-600" />
                    {i < state.featureCommits.length - 1 && arrow}
                  </React.Fragment>
                ))}
              </div>
            </div>
          )}

          {/* rebase 중 — 옛 commit이 떨어져나감 (Step 3) */}
          {phase === 'rebasing' && (
            <>
              <div className="mt-3 pt-3 border-t border-dashed border-slate-300">
                <div className="flex items-center gap-1 text-rose-600 font-bold text-xs mb-2">
                  ⚠️ 옛 commit (orphan, reflog에만 남음)
                </div>
                <div className="flex items-end gap-2 pl-20">
                  {state.orphanCommits.map((c, i) => (
                    <React.Fragment key={c.id}>
                      <CommitNode commit={c} color="bg-slate-500" size="sm" />
                      {i < state.orphanCommits.length - 1 && arrow}
                    </React.Fragment>
                  ))}
                </div>
              </div>
              <div className="mt-3 p-3 bg-violet-50 border border-violet-200 rounded text-[10.5px] text-violet-900">
                <span className="font-bold">✨ 새 commit 생성:</span> F1' (x1y2z3a), F2' (x2y3z4b) — 옛 SHA는 사라지고 새 SHA로 main C4 위에 다시 적용됨.
              </div>
            </>
          )}

          {/* 분기 상태 박스 (Step 2) */}
          {phase === 'diverged' && (
            <div className="mt-3 p-3 bg-amber-50 border border-amber-300 rounded text-[10.5px] text-amber-900">
              <span className="font-bold">⚠️ 두 줄기 분기:</span> main이 C3, C4로 앞서감. feature는 여전히 C2 시점. 이대로 PR하면 main 최신을 반영 못 함.
            </div>
          )}

          {/* 시작 박스 (Step 1) */}
          {phase === 'branch-created' && (
            <div className="mt-3 p-3 bg-emerald-50 border border-emerald-200 rounded text-[10.5px] text-emerald-900">
              <span className="font-bold">✅ 분기 완료:</span> feature 브랜치가 C2에서 시작. F1, F2 commit이 C2 위에 쌓임. main은 C2가 끝.
            </div>
          )}

          {/* 완료 박스 (Step 4) */}
          {phase === 'clean' && (
            <div className="mt-3 p-3 bg-emerald-50 border border-emerald-300 rounded text-[10.5px] text-emerald-900">
              <span className="font-bold">✨ 직선 history 완성:</span> C1 → C2 → C3 → C4 → F1' → F2'. 분기·합류 흔적 없음. PR 보내기 좋은 상태.
            </div>
          )}

          {/* 경고 박스 (Step 5) */}
          {phase === 'interactive' && state.warning && (
            <div className="mt-3 p-3 bg-rose-50 border-2 border-rose-400 rounded text-[10.5px] text-rose-900">
              <span className="font-bold">🚨 황금 규칙:</span> "공유된 commit은 절대 rebase하지 말 것" — main, develop 같은 공유 브랜치는 절대 금지.
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // App — 메인 컴포넌트
    // ============================================================
    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);

      const handleNext = () => {
        setCurrentStep((c) => {
          if (c < STEPS.length - 1) return c + 1;
          setIsPlaying(false);
          return c;
        });
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      const handleFirst = () => setCurrentStep(0);

      // 자동재생 — 3000ms
      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => {
          setCurrentStep((c) => {
            if (c < STEPS.length - 1) return c + 1;
            setIsPlaying(false);
            return c;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNext();
          if (e.key === 'ArrowLeft') handlePrev();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <div className="mb-5 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">IV-3-1. Rebase — commit 재배치</h1>
                <p className="text-sm text-slate-500 mt-1">"내 commit들을 main 최신 위로 다시 쌓기" — 직선 history와 SHA 변경의 메커니즘</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            {/* 단계 설명 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-4">
              <div className="font-bold text-slate-800 text-base mb-1">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
              <BranchGraph state={step.dataState} />
              <CodeViewer code={step.code} />
            </div>

            {/* 컨트롤 — 4버튼 */}
            <div className="grid grid-cols-4 gap-2 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button
                onClick={handleFirst}
                disabled={currentStep === 0}
                className="px-3 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed"
              >
                ⏮ 처음
              </button>
              <button
                onClick={handlePrev}
                disabled={currentStep === 0}
                className="px-3 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed"
              >
                ← 이전
              </button>
              <button
                onClick={togglePlay}
                className="px-3 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700"
              >
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={currentStep === STEPS.length - 1}
                className="px-3 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed"
              >
                다음 →
              </button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">
              키보드 ←/→ 로 단계 이동 가능 · 자동재생 3000ms · highlight.js 11.9.0 atom-one-dark
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
