<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Part V. PR·리뷰·Issue — 인터랙티브 시각화</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeInUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .fade-in-up { animation: fadeInUp 0.5s ease-out both; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // V-1-1: Pull Request의 역할과 구조
    const STEPS_1_1 = [
      { label: "PR이란", desc: "[STEP 1] Pull Request는 '내 브랜치의 변경사항을 main에 통합해달라'는 공식 요청이다. 코드 리뷰와 CI의 통합 지점이다.",
        elements: [{name:'feature 브랜치',status:'ready'},{name:'Pull Request',status:'idle'},{name:'Code Review',status:'idle'},{name:'CI 체크',status:'idle'},{name:'Merge',status:'idle'}] },
      { label: "PR 생성", desc: "[STEP 2] feature 브랜치에서 작업을 마치고 GitHub에서 PR을 연다. 제목, 설명, 리뷰어를 지정한다.",
        elements: [{name:'feature 브랜치',status:'done'},{name:'Pull Request',status:'active'},{name:'Code Review',status:'idle'},{name:'CI 체크',status:'idle'},{name:'Merge',status:'idle'}] },
      { label: "리뷰 + CI", desc: "[STEP 3] 팀원이 코드를 줄 단위로 검토한다. 동시에 GitHub Actions가 자동으로 테스트를 실행한다.",
        elements: [{name:'feature 브랜치',status:'done'},{name:'Pull Request',status:'done'},{name:'Code Review',status:'active'},{name:'CI 체���',status:'active'},{name:'Merge',status:'idle'}] },
      { label: "Approve + Merge", desc: "[STEP 4] 리뷰어가 Approve하고 CI가 통과하면 Merge 버튼이 활성화된다. 클릭하면 main에 통합 완료.",
        elements: [{name:'feature 브랜���',status:'done'},{name:'Pull Request',status:'done'},{name:'Code Review',status:'done'},{name:'CI 체크',status:'done'},{name:'Merge',status:'active'}] },
    ];

    // V-1-2: 좋은 PR 작성법
    const STEPS_1_2 = [
      { label: "작은 PR", desc: "[STEP 1] 좋은 PR은 작다. 500줄 이상이면 리뷰어가 집중력을 잃어 버그를 놓치기 쉽다. 하나의 기능 = 하나의 PR.",
        tip: "규칙: 500줄 이하", icon: "📏" },
      { label: "PR 설명", desc: "[STEP 2] '무엇을 왜 바꿨는지', '어떻게 테스트했는지', '리뷰어가 봐야 할 부분'을 적는다.",
        tip: "What · Why · How to test", icon: "📝" },
      { label: "PR 템플릿", desc: "[STEP 3] .github/pull_request_template.md에 템플릿을 저장하면 팀 전체가 동일한 양식을 쓴다.",
        tip: ".github/pull_request_template.md", icon: "📋" },
      { label: "스크린샷", desc: "[STEP 4] UI 변경 사항은 스크린샷이나 GIF를 첨부하면 리뷰 효율이 크게 오른다.",
        tip: "Before / After 스크린샷", icon: "📸" },
    ];

    // V-2-1: 코드 리뷰 에티켓
    const STEPS_2_1 = [
      { label: "리뷰어 원칙", desc: "[STEP 1] 코드에 집중하고 사람을 비난하지 않는다. '이 함수는 길다'보다 '두 개로 나누면 테스트하기 쉬울 것 같아요'처럼 대안을 제시한다.",
        role: "reviewer", rules: ["코드에 집중, 사람 비난 금지","대안 제시","Suggestion 기능 활용"] },
      { label: "Suggestion 기능", desc: "[STEP 2] GitHub의 Suggestion 기능으로 리뷰어가 직접 코드를 제안하고, 작성자가 클릭 한 번으로 적용할 수 ��다.",
        role: "suggestion" },
      { label: "작성자 원칙", desc: "[STEP 3] 리뷰 댓글마다 Resolve(해결)나 답글로 응답한다. 모든 대화를 완성하는 것이 예의다.",
        role: "author", rules: ["댓글마다 응답","Resolve 처리","감사 표현"] },
      { label: "Nitpick 문화", desc: "[STEP 4] 사소한 제안에는 'nit:' 접두어를 붙인다. 필수 수정이 아님을 명시하는 관례다.",
        role: "nit" },
    ];

    // V-2-2: GitHub Issue
    const STEPS_2_2 = [
      { label: "Issue란", desc: "[STEP 1] Issue는 GitHub에서 작업 단위를 추적하는 도구다. 버그 리포트, 새 기능 요청, 기술 부채 기록 모두 Issue로 관리한다.",
        items: [{type:'🐛',label:'Bug'},{type:'✨',label:'Feature'},{type:'📝',label:'Docs'},{type:'🔧',label:'Chore'}] },
      { label: "Fixes #N", desc: "[STEP 2] PR 설명에 'Fixes #42'를 쓰면 해당 PR이 머지될 때 Issue #42가 자동으로 닫힌다.",
        autoClose: true },
      { label: "레이블 + 마일스톤", desc: "[STEP 3] 레이블(bug, enhancement)과 마일스톤(v1.0)을 붙이면 로드맵 관리가 쉬워진다.",
        labels: ['bug','enhancement','documentation','good first issue'] },
      { label: "GitHub Projects", desc: "[STEP 4] GitHub Projects(칸반 보드)와 연동하면 이슈를 시각적으로 관리할 수 있다. Todo → In Progress → Done.",
        kanban: ['Todo','In Progress','Done'] },
    ];

    // V-3-1: Branch Protection
    const STEPS_3_1 = [
      { label: "왜 보호가 필요한가", desc: "[STEP 1] 아무나 main에 직접 git push하면 코드 품질 보장이 불가능하다. Branch Protection Rules가 방어선이다.",
        phase: 'problem' },
      { label: "PR 필수", desc: "[STEP 2] 'Require a pull request before merging'을 활성화하면 PR 없이는 main 머지가 불가능해진다.",
        phase: 'rule1', rule: 'Require Pull Request' },
      { label: "CI 통과 필수", desc: "[STEP 3] 'Require status checks to pass'를 활성화하면 CI 테스트가 실패한 PR의 Merge를 자동으로 차단한다.",
        phase: 'rule2', rule: 'Require Status Checks' },
      { label: "리뷰 필수", desc: "[STEP 4] 'Require approvals'를 활성화하면 최소 N명의 리��어가 Approve해야 Merge가 가능하다. 팀 규모가 커질수록 이 설정이 중요하다.",
        phase: 'rule3', rule: 'Require Approvals' },
    ];

    // ═══════════════════════════════════════════════
    // 렌더러들
    // ═══════���═══════════════════════════════════════
    function Viz_1_1({ step }) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 gap-2">
          {step.elements.map((e, i) => (
            <React.Fragment key={i}>
              <div className={`w-full max-w-xs border-2 rounded-lg px-3 py-2 text-center text-xs font-bold transition-all duration-500
                ${e.status === 'active' ? 'bg-blue-100 border-blue-500 ring-2 ring-blue-300 scale-105 shadow-lg text-blue-700' :
                  e.status === 'done' ? 'bg-emerald-50 border-emerald-400 text-emerald-700' :
                  'bg-white border-slate-200 text-slate-400'}`}>{e.name}</div>
              {i < step.elements.length - 1 && <div className="text-slate-300 text-xs">↓</div>}
            </React.Fragment>
          ))}
        </div>
      );
    }

    function Viz_1_2({ step }) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-6">
          <div className="fade-in-up bg-blue-50 border-2 border-blue-300 rounded-xl p-6 text-center max-w-sm">
            <div className="text-4xl mb-3">{step.icon}</div>
            <div className="font-bold text-blue-700 text-lg mb-2">{step.tip}</div>
            <div className="text-xs text-blue-600">{step.desc.split(']')[1]?.trim()}</div>
          </div>
        </div>
      );
    }

    function Viz_2_1({ step }) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-4">
          {step.role === 'suggestion' ? (
            <div className="fade-in-up bg-slate-900 rounded-xl p-5 max-w-sm w-full">
              <div className="text-xs text-slate-400 mb-2">💡 Suggested change</div>
              <div className="bg-red-900/30 text-red-300 text-xs font-mono px-2 py-1 rounded">- console.log("debug")</div>
              <div className="bg-green-900/30 text-green-300 text-xs font-mono px-2 py-1 rounded mt-1">+ // debug 로그 제거</div>
              <div className="mt-3 text-center">
                <span className="bg-emerald-600 text-white text-xs px-3 py-1 rounded font-bold">Apply suggestion</span>
              </div>
            </div>
          ) : step.role === 'nit' ? (
            <div className="fade-in-up bg-amber-50 border-2 border-amber-300 rounded-xl p-5 max-w-sm text-center">
              <div className="text-sm font-mono text-amber-700 mb-2">nit: 변수명 camelCase로 통일하면 좋겠습니다</div>
              <div className="text-[10px] text-amber-600">= "사소한 제안, 필수 수정 아님"</div>
            </div>
          ) : (
            <div className="fade-in-up border-2 border-blue-300 rounded-xl p-5 max-w-sm">
              <div className="font-bold text-blue-700 text-sm mb-3">{step.role === 'reviewer' ? '리뷰어 원칙' : '작성자 원칙'}</div>
              <div className="space-y-2">
                {step.rules?.map((r, i) => (
                  <div key={i} className="flex items-center gap-2 text-xs text-slate-700">
                    <div className="w-5 h-5 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold text-[10px]">{i+1}</div>
                    {r}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    function Viz_2_2({ step }) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-4">
          {step.items && (
            <div className="flex gap-3 flex-wrap justify-center">
              {step.items.map((it, i) => (
                <div key={i} className="fade-in-up bg-white border-2 border-slate-200 rounded-lg p-3 text-center w-24" style={{animationDelay:`${i*0.1}s`}}>
                  <div className="text-2xl mb-1">{it.type}</div>
                  <div className="text-xs font-bold text-slate-700">{it.label}</div>
                </div>
              ))}
            </div>
          )}
          {step.autoClose && (
            <div className="fade-in-up bg-emerald-50 border-2 border-emerald-400 rounded-xl p-5 text-center max-w-sm">
              <div className="font-mono text-sm text-emerald-700 mb-2">Fixes #42</div>
              <div className="text-xs text-emerald-600">PR 머지 시 Issue #42 자동 닫힘</div>
            </div>
          )}
          {step.labels && (
            <div className="flex gap-2 flex-wrap justify-center">
              {step.labels.map((l, i) => (
                <span key={i} className={`fade-in-up text-xs px-2 py-1 rounded-full font-bold
                  ${l==='bug'?'bg-red-100 text-red-700':l==='enhancement'?'bg-blue-100 text-blue-700':
                    l==='documentation'?'bg-purple-100 text-purple-700':'bg-emerald-100 text-emerald-700'}`}
                  style={{animationDelay:`${i*0.1}s`}}>{l}</span>
              ))}
            </div>
          )}
          {step.kanban && (
            <div className="flex gap-3">
              {step.kanban.map((col, i) => (
                <div key={i} className={`fade-in-up border-2 rounded-lg p-3 w-28 text-center text-xs font-bold
                  ${i===0?'border-slate-300 bg-slate-50 text-slate-600':
                    i===1?'border-blue-300 bg-blue-50 text-blue-700':
                    'border-emerald-300 bg-emerald-50 text-emerald-700'}`}
                  style={{animationDelay:`${i*0.15}s`}}>{col}</div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function Viz_3_1({ step }) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-4">
          {step.phase === 'problem' && (
            <div className="bg-red-50 border-2 border-red-400 rounded-xl p-5 text-center max-w-sm">
              <div className="text-3xl mb-2">🚨</div>
              <div className="text-red-700 font-bold">아무나 main에 직접 push!</div>
              <div className="text-xs text-red-600 mt-2">→ 코드 품질 보장 불가</div>
            </div>
          )}
          {step.rule && (
            <div className="fade-in-up bg-blue-50 border-2 border-blue-400 rounded-xl p-5 text-center max-w-sm">
              <div className="text-2xl mb-2">🛡️</div>
              <div className="font-bold text-blue-700">{step.rule}</div>
              <div className="text-xs text-blue-600 mt-2">{
                step.phase === 'rule1' ? 'PR 없이는 main 머지 불가' :
                step.phase === 'rule2' ? 'CI 실패 시 Merge 버튼 비활성화' :
                '최소 N명 Approve 필요'
              }</div>
              <div className="mt-3 text-emerald-600 font-bold text-xs">✓ 활성화</div>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    const SECTIONS = [
      { id:"1-1", label:"V-1-1", title:"PR의 역할과 구조", steps:STEPS_1_1, Renderer:Viz_1_1 },
      { id:"1-2", label:"V-1-2", title:"좋은 PR 작성법", steps:STEPS_1_2, Renderer:Viz_1_2 },
      { id:"2-1", label:"V-2-1", title:"코드 리뷰 에티켓", steps:STEPS_2_1, Renderer:Viz_2_1 },
      { id:"2-2", label:"V-2-2", title:"GitHub Issue", steps:STEPS_2_2, Renderer:Viz_2_2 },
      { id:"3-1", label:"V-3-1", title:"Branch Protection", steps:STEPS_3_1, Renderer:Viz_3_1 },
    ];

    // 메인 앱 (테마: blue)
    function App() {
      const [sectionIdx, setSectionIdx] = useState(0);
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const section = SECTIONS[sectionIdx];
      const step = section.steps[stepIdx];
      const isEnd = stepIdx === section.steps.length - 1;
      const Renderer = section.Renderer;

      const handleTabChange = (idx) => { setSectionIdx(idx); setStepIdx(0); setIsPlaying(false); };
      const handleNext = () => { setStepIdx(prev => { if (prev < section.steps.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (stepIdx > 0) { setStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setStepIdx(0); setIsPlaying(prev => !prev); };
      useEffect(() => { if (isPlaying) { playRef.current = setInterval(() => handleNextRef.current(), 2800); } else { clearInterval(playRef.current); } return () => clearInterval(playRef.current); }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-4">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between flex-wrap gap-2">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xs">V</div>
                  <div>
                    <h1 className="text-xl font-bold text-slate-800">Part V. PR·리뷰·Issue</h1>
                    <p className="text-xs text-slate-500">코드 품질의 게이트, Pull Request와 팀 협업 도구를 마스터한다.</p>
                  </div>
                </div>
                <a href="../index.html" className="text-xs text-blue-600 hover:underline font-medium">← 전체 목차</a>
              </div>
            </header>
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-1 flex gap-1 overflow-x-auto">
              {SECTIONS.map((s, i) => (
                <button key={s.id} onClick={() => handleTabChange(i)} aria-label={`${s.label} — ${s.title} 섹션으로 ��동`}
                  className={`flex-1 min-w-[100px] px-2 py-2 rounded-lg text-xs font-medium transition-all ${i === sectionIdx ? 'bg-blue-600 text-white shadow-sm' : 'text-slate-500 hover:bg-slate-100'}`}>
                  <div className="font-bold">{s.label}</div>
                  <div className={`mt-0.5 text-[10px] ${i === sectionIdx ? 'text-blue-200' : 'text-slate-400'}`}>{s.title}</div>
                </button>
              ))}
            </div>
            <div className="bg-blue-700 text-white p-4 rounded-xl shadow-sm border border-blue-800 min-h-[80px] flex flex-col justify-center">
              <h3 className="text-[10px] font-bold text-blue-200 uppercase tracking-wider mb-1">{section.label} — {step.label}</h3>
              <p className="text-sm md:text-base font-medium leading-relaxed">{step.desc}</p>
            </div>
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 min-h-[320px] md:min-h-[380px]">
              <Renderer step={step} />
            </div>
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={stepIdx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button aria-label={isPlaying?'정지':'자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="flex items-center gap-3">
                <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step {stepIdx+1} / {section.steps.length}</div>
                <div className="flex gap-1">
                  {section.steps.map((_,i)=>(<button key={i} onClick={()=>{setStepIdx(i);setIsPlaying(false);}} aria-label={`Step ${i+1}로 이동`} className={`w-2.5 h-2.5 rounded-full transition-all ${i===stepIdx?'bg-blue-500 scale-125':i<stepIdx?'bg-blue-300':'bg-slate-200'}`}/>))}
                </div>
              </div>
            </div>
            <footer className="text-center text-xs text-slate-400 py-2">Git & GitHub 사다리형 학습 커리큘럼 — Part V 시각화</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
<script src="sidebar.js"></script>
</body>
</html>
