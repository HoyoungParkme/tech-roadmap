            <div className="mt-1.5 text-sm font-bold text-slate-800 truncate">
              {pr.title}

            {pr.base && (
              <div className="mt-1 text-[11px] text-slate-500 font-mono">
                <span className="bg-slate-200 px-1.5 py-0.5 rounded">{pr.base}</span>
                <span className="mx-1">←</span>
                <span className="bg-slate-200 px-1.5 py-0.5 rounded">{pr.compare}</span>
              </div>

          {pr.reviewers && pr.reviewers.length > 0 && (

                  <span key={i} className={`text-[11px] px-2 py-0.5 rounded-full font-mono border
                    ${r.state === 'approved' ? 'bg-emerald-50 border-emerald-300 text-emerald-700' :
                      r.state === 'requested-changes' ? 'bg-amber-50 border-amber-300 text-amber-700' :
                      'bg-slate-50 border-slate-300 text-slate-600'}`}>
                    {r.state === 'approved' && '✓ '}
                    {r.state === 'requested-changes' && '⚠ '}
                    {r.state === 'pending' && '⏳ '}
                    {r.name}
                  </span>
                ))}
              </div>
            </div>
          )}

            {pr.diffLines.map((d, i) => (
              <div key={i} className={`px-2 py-0.5 rounded
                ${d.type === 'add' ? 'bg-emerald-900/30 text-emerald-300' :
                  d.type === 'del' ? 'bg-red-900/30 text-red-300' :
                  'text-slate-400'}
                ${d.highlight ? 'ring-1 ring-yellow-400/50' : ''}`}>
                {d.text}
              </div>
            ))}
          </div>

          {/* Comments */}
          {pr.comments && pr.comments.length > 0 && (
            <div className="border-t border-slate-200 bg-slate-50 px-3 py-2 space-y-1.5 max-h-[140px] overflow-y-auto">

                <div key={i} className={`fade-in-up text-[11px] rounded p-2 border
                  ${c.kind === 'change'   ? 'bg-amber-50 border-amber-200 text-amber-800' :
                    c.kind === 'reply'    ? 'bg-white border-slate-200 text-slate-700' :
                    c.kind === 'approve'  ? 'bg-emerald-50 border-emerald-200 text-emerald-800' :
                    c.kind === 'resolved' ? 'bg-slate-100 border-slate-200 text-slate-500 line-through' :
                    c.kind === 'merged'   ? 'bg-violet-50 border-violet-200 text-violet-800' :

                    {c.author}

              <div className="flex flex-wrap gap-2 mb-2">
                {pr.checks.map((c, i) => (
                  <span key={i} className={`text-[10px] px-2 py-0.5 rounded font-mono border
                    ${c.status === 'success' ? 'bg-emerald-50 border-emerald-300 text-emerald-700' :
                      c.status === 'pending' ? 'bg-amber-50 border-amber-300 text-amber-700 pulse-ring' :
                      'bg-red-50 border-red-300 text-red-700'}`}>
                    {c.status === 'success' && '✓ '}
                    {c.status === 'pending' && '⏳ '}
                    {c.name}
                  </span>
                ))}
              </div>
            )}
            <button disabled={phase !== 'approved'} className={`w-full text-xs font-bold py-2 rounded transition-all
              ${phase === 'approved' ? 'bg-emerald-600 hover:bg-emerald-700 text-white shadow' :
                phase === 'merged'   ? 'bg-violet-600 text-white' :
                'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
              {phase === 'merged' ? '✓ Merged' :
               phase === 'approved' ? 'Merge pull request' :
               phase === 'pushed' ? 'Open a pull request first' :
               'Merge pull request (대기)'}
            </button>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // 우측 — VSCode 스타일 CodeViewer (5개 파일 탭)
    // ═══════════════════════════════════════════════
    function CodeViewer({ files, activeIdx, onSelect }) {
      const codeRef = useRef(null);
      const file = files[activeIdx];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [activeIdx]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg flex flex-col h-full">
          {/* macOS dot + 파일 탭 */}
          <div className="bg-[#21252b] px-3 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5 mr-2">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <div className="flex gap-1 overflow-x-auto">
              {files.map((f, i) => (
                <button key={i} onClick={() => onSelect(i)}
                  className={`text-[10px] px-2 py-1 rounded-t font-mono whitespace-nowrap transition-all
                    ${i === activeIdx
                      ? 'bg-[#282c34] text-slate-100 border-t border-x border-slate-600'
                      : 'bg-[#1c1f25] text-slate-500 hover:text-slate-300'}`}>
                  {f.name}
                </button>
              ))}
            </div>
          </div>

          {/* 코드 + 라인 번호 */}
          <div className="overflow-auto text-xs flex-1 min-h-[260px] max-h-[28rem]">
            <pre className="p-0 m-0">
              <code ref={codeRef} className={`language-${file.lang} block`}>
{file.lines.map((line, i) => {
  const highlighted = file.highlight && file.highlight.includes(i + 1);
  return (
    <div key={i} className={`flex ${highlighted ? 'bg-yellow-500/10' : ''}`}>
      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 shrink-0">{i + 1}</span>
      <span className="pl-3 pr-3 whitespace-pre">{line || ' '}</span>
    </div>
  );
})}
              </code>
            </pre>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // 메인 App
    // ═══════════════════════════════════════════════
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [activeFile, setActiveFile] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);

      const step = STEPS[stepIdx];
      const isEnd = stepIdx === STEPS.length - 1;

      // step 변경 시 자동 파일 탭 전환
      useEffect(() => {
        setActiveFile(STEPS[stepIdx].activeFile);
      }, [stepIdx]);

      const handleNext = () => {
        setStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;
      const handlePrev = () => {
        if (stepIdx > 0) { setStepIdx(prev => prev - 1); setIsPlaying(false); }
      };
      const handleFirst = () => { setStepIdx(0); setIsPlaying(false); };
      const togglePlay = () => {
        if (isEnd) setStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      // 자동 재생 3000ms
      useEffect(() => {
        if (isPlaying) {
          playRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playRef.current);
        }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNext();
          else if (e.key === 'ArrowLeft') handlePrev();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [stepIdx]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-4">
            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between flex-wrap gap-2">
                <div className="flex items-center gap-3">
                  <div className="w-9 h-9 bg-slate-700 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                  <div>
                    <h1 className="text-xl font-bold text-slate-800">Part V. Pull Request &amp; Code Review</h1>
                    <p className="text-xs text-slate-500">feature 브랜치 → PR 생성 → 리뷰 → 변경 반영 → Merge 까지 5 단계 시뮬레이션</p>
                  </div>
                </div>
                <a href="../index.html" className="text-xs text-slate-600 hover:underline font-medium">← 전체 목차</a>
              </div>
            </header>

            {/* 단계 인디케이터 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-1 flex gap-1 overflow-x-auto">
              {STEPS.map((s, i) => (
                <button key={i} onClick={() => { setStepIdx(i); setIsPlaying(false); }}
                  aria-label={`Step ${i + 1} — ${s.label} 로 이동`}
                  className={`flex-1 min-w-[120px] px-2 py-2 rounded-lg text-xs font-medium transition-all
                    ${i === stepIdx
                      ? 'bg-slate-700 text-white shadow-sm'
                      : i < stepIdx
                        ? 'text-slate-700 bg-slate-100 hover:bg-slate-200'
                        : 'text-slate-500 hover:bg-slate-100'}`}>
                  <div className="font-bold">Step {i + 1}</div>
                  <div className={`mt-0.5 text-[10px] ${i === stepIdx ? 'text-slate-300' : 'text-slate-400'}`}>
                    {s.label}
                  </div>
                </button>
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="bg-slate-700 text-white p-4 rounded-xl shadow-sm border border-slate-800 min-h-[80px] flex flex-col justify-center">
              <h3 className="text-[10px] font-bold text-slate-300 uppercase tracking-wider mb-1">
                {step.title}
              </h3>
              <p className="text-sm md:text-base font-medium leading-relaxed">{step.desc}</p>
            </div>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              {/* 좌 — GitHub PR UI mock */}
              <div className="min-h-[480px]">
                <div className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">
                  GitHub Pull Request UI
                </div>
                <PrUiMock pr={step.pr} phase={step.pr.phase} />
              </div>

              {/* 우 — VSCode 코드 뷰어 (파일 5개 탭) */}
              <div className="min-h-[480px]">
                <div className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">
                  파일 — feature-push.sh / create-pr.md / review.md / address-changes.sh / merge.md
                </div>
                <CodeViewer files={FILES} activeIdx={activeFile} onSelect={setActiveFile} />
              </div>
            </div>

            {/* 컨트롤 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                {/* 처음 */}
                <button aria-label="처음으로" onClick={handleFirst} disabled={stepIdx === 0}
                  className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/>
                  </svg>
                </button>
                {/* 이전 */}
                <button aria-label="이전 단계" onClick={handlePrev} disabled={stepIdx === 0}
                  className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <polygon points="15 18 9 12 15 6 15 18"/>
                  </svg>
                </button>
                {/* 자동 재생 */}
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay}
                  className="flex items-center px-4 py-2 rounded bg-slate-700 hover:bg-slate-800 text-white font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2">
                      <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
                    </svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2">
                      <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>자동 실행</>
                  )}
                </button>
                {/* 다음 */}
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd}
                  className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <polygon points="9 18 15 12 9 6 9 18"/>
                  </svg>
                </button>
              </div>
              <div className="flex items-center gap-3">
                <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                  Step {stepIdx + 1} / {STEPS.length}
                </div>
                <div className="flex gap-1">
                  {STEPS.map((_, i) => (
                    <button key={i} onClick={() => { setStepIdx(i); setIsPlaying(false); }}
                      aria-label={`Step ${i + 1} 로 이동`}
                      className={`w-2.5 h-2.5 rounded-full transition-all
                        ${i === stepIdx ? 'bg-slate-700 scale-125' :
                          i < stepIdx ? 'bg-slate-400' : 'bg-slate-200'}`}/>
                  ))}
                </div>
              </div>
            </div>

            <footer className="text-center text-xs text-slate-400 py-2">
              Git &amp; GitHub 사다리형 학습 커리큘럼 — Part V · PR &amp; Code Review · 키보드 ← → 로 단계 이동
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script src="sidebar.js"></script>
</body>
</html>
