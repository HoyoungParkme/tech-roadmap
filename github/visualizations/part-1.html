<body>
  <div id="root"></div>

  <!--
    Part 1. Git 기본 — init / add / commit
    학습 목표: 빈 폴더 → git init → 파일 작성 → git add (staging) →
              git commit (repository 기록) → status / log → .gitignore.
              파일이 working dir → staging → repository 로 이동하는
              "3 영역" 모델을 실제 박스 이동으로 본다.
    핵심 비유: 사진관 — 작업실(working) → 촬영 부스(staging) → 앨범(repository)
    패턴: fastapi v1 — 좌(LiveDataPane: 3 영역 + 파일 박스) / 우(VSCode CodeViewer)
    색상: github slate
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 — LiveDataPane이 읽는 dataState
    //   phase           : 'init' | 'add' | 'commit' | 'status' | 'gitignore'
    //   gitInited       : .git 폴더 존재 여부
    //   working         : 작업 디렉토리 파일 [{name, status, untracked, modified}]
    //   staging         : staging area 파일 [{name}]
    //   repository      : 커밋들 [{hash, msg, files}]
    //   ignored         : .gitignore 로 제외된 파일 [{name}]
    //   moveLit         : 'add' | 'commit' | null — 어느 화살표를 강조할지
    //   activeFile      : 현재 강조할 파일명
    //   commands        : [{cmd, output}] 명령 실행 로그
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. git init — 빈 저장소 생성',
        desc: '아무것도 없던 폴더에 git init 한 줄을 치면 .git 폴더가 생기고 그 폴더가 곧 "Git 저장소(repository)"가 된다. 워킹 디렉토리(작업 공간)는 그대로지만 이제부터 이 폴더의 모든 변화를 Git이 추적할 준비가 된 것이다. README.md 파일이 하나 있다고 해도 아직 untracked — 한 번도 추적된 적 없는 상태다.',
        phase: 'init',
        gitInited: true,
        working: [
          { name: 'README.md', status: 'untracked' },
        ],
        staging: [],
        repository: [],
        ignored: [],
        moveLit: null,
        activeFile: null,
        commands: [
          { cmd: '$ git init', output: 'Initialized empty Git repository in /myproject/.git/' },
          { cmd: '$ ls -la', output: 'drwx  .git/    -rw-  README.md' },
        ],
        code: {
          lang: 'bash',
          filename: 'init.sh',
          lines: [
            '# Step 1. git init — 빈 저장소 만들기',
            '',
            '# 1) 새 프로젝트 폴더로 들어간다',
            'mkdir myproject',
            'cd myproject',
            '',
            '# 2) Git 저장소로 초기화 — 한 줄이면 끝',
            'git init',
            '#  → Initialized empty Git repository in /myproject/.git/',
            '',
            '# 3) 무엇이 생겼는지 확인 — 숨김 폴더 .git 이 핵심',
            'ls -la       #  drwx .git/ (저장소 본체)   -rw- README.md (untracked)',
            '',
            '# 4) 첫 파일을 만든다 (메모장이든 vi 든 상관없음)',
            'echo "# My Project" > README.md',
            '',
            '# 5) 현재 상태 확인',
            'git status',
            '#  On branch main',
            '#  No commits yet',
            '#  Untracked files:',
            '#    README.md          ← Git이 "본 적 없는" 파일',
            '#  nothing added to commit but untracked files present',
            '',
            '# ─── 핵심 ───',
            '#  • git init = .git 폴더 생성 = 저장소 탄생 (워킹 디렉토리는 그대로)',
            '#  • untracked: Git이 아직 신경 쓰지 않는 파일 / 한 폴더 = 한 저장소',
          ],
          highlight: [4, 5, 7, 8, 11, 12, 17, 18],
        },
      },
      {
        title: 'Step 2. git add — staging area 에 올리기',
        desc: 'git add 는 워킹 디렉토리의 파일을 staging area(준비 영역)에 올리는 명령이다. staging은 "다음 커밋에 포함할 변경사항을 미리 모아두는 바구니"다. add 한다고 커밋되는 것이 아니라, "이 변경은 다음 커밋에 들어간다"고 표시하는 것이다. 한 번에 여러 파일을 골라 담은 뒤 한 번에 커밋할 수 있게 해주는 중간 단계가 핵심이다.',
        phase: 'add',
        gitInited: true,
        working: [
          { name: 'README.md', status: 'tracked', modified: false, dimmed: true },
          { name: 'app.py', status: 'untracked' },
        ],
        staging: [
          { name: 'README.md' },
        ],
        repository: [],
        ignored: [],
        moveLit: 'add',
        activeFile: 'README.md',
        commands: [
          { cmd: '$ git add README.md', output: '' },
          { cmd: '$ git status', output: 'Changes to be committed:\n  new file: README.md\nUntracked files:\n  app.py' },
        ],
        code: {
          lang: 'bash',
          filename: 'add.sh',
          lines: [
            '# Step 2. git add — 다음 커밋에 들어갈 파일을 골라 담기',
            '',
            '# 0) 파일 하나 더 만들어 본다',
            'echo "print(\'hello\')" > app.py',
            '',
            '# 1) 가장 일반적인 방식 — 파일 하나만 staging 에 올리기',
            'git add README.md',
            '',
            '# 2) 상태 확인 — staging 에 들어간 파일 vs 아직 untracked',

            '#  Changes to be committed:   new file: README.md   ← staging',
            '#  Untracked files:           app.py                ← 아직 밖',
            '',
            '# 3) 한 번에 여러 개 / 패턴으로 골라 담기',

            'git add "*.py"       # 파이썬 파일만',
            'git add src/         # src 폴더 전체',
            '',
            '# 4) 실수로 올렸으면 빼기 (unstage)',
            'git restore --staged app.py     # app.py 가 다시 untracked 로',
            '',
            '# ─── 왜 staging 이 따로 있나 ───',
            '#  → 의미 있는 단위로 골라 담아 커밋 직전 검토하는 "예비 영역"',
          ],
          highlight: [3, 4, 6, 7, 9, 10, 11, 12, 14, 15, 16, 17, 19, 20],
        },
      },
      {
        title: 'Step 3. git commit — 변경을 영구 기록',
        desc: 'git commit 은 staging 에 모아둔 변경사항을 repository 에 박제한다. 한 번 커밋되면 SHA 해시(고유 ID), 작성자, 시각, 메시지가 영구히 남는다. 이 시점부터 "그 상태로 되돌아갈 수 있는 안전 지점"이 된다. -m 옵션으로 한 줄 메시지를 붙이는 게 가장 흔한 형태고, 메시지는 "왜 이 변경을 했는가"를 적어야 한다. 커밋 이후 staging 은 비워진다.',
        phase: 'commit',
        gitInited: true,
        working: [
          { name: 'README.md', status: 'tracked', modified: false, dimmed: true },
          { name: 'app.py', status: 'tracked', modified: false, dimmed: true },
        ],
        staging: [],
        repository: [
          { hash: 'a3f9c21', msg: 'Initial commit: README + app', files: ['README.md', 'app.py'] },
        ],
        ignored: [],
        moveLit: 'commit',
        activeFile: 'README.md',
        commands: [
          { cmd: '$ git add .', output: '' },
          { cmd: '$ git commit -m "Initial commit: README + app"', output: '[main (root-commit) a3f9c21] Initial commit\n 2 files changed, 2 insertions(+)' },
        ],
        code: {
          lang: 'bash',
          filename: 'commit.sh',
          lines: [
            '# Step 3. git commit — staging 의 변경을 저장소에 박제',
            '',
            '# 1) 일단 모든 변경을 staging 에 올린다',
            'git add .',
            '',
            '# 2) 커밋 — 한 줄 메시지(-m) 가 가장 흔한 형태',
            'git commit -m "Initial commit: README + app"',
            '#  → [main (root-commit) a3f9c21] Initial commit: README + app',
            '#       2 files changed, 2 insertions(+)',
            '',
            '# 3) 커밋 메시지 컨벤션 (Conventional Commits)',
            '#  feat / fix / docs / refactor / test / chore — 타입을 앞에 붙인다',
            '',
            '# 4) 좋은 메시지 예시',
            'git commit -m "feat: add user login API"',
            'git commit -m "fix: correct timezone in created_at"',
            '',
            '# 5) 메시지 길게 쓰고 싶으면 -m 없이 (에디터 열림: 요약→빈줄→본문)',
            'git commit',
            '',
            '# 6) 방금 커밋 메시지 수정 (push 전에만!)',
            'git commit --amend -m "feat: add user login API endpoint"',
            '',
            '# ─── 커밋 = 안전 지점 ───',
            '#  • SHA 해시(a3f9c21...) + 작성자/시각/메시지 자동 기록 = 영구 ID',
            '#  • 언제든 이 시점으로 복원 가능 (Part 2) / 커밋 후 staging 은 비워짐',
          ],
          highlight: [3, 4, 6, 7, 8, 9, 14, 15, 16, 21, 22],
        },
      },
      {
        title: 'Step 4. git status / git log — 상태와 히스토리 확인',
        desc: 'git status 는 "지금 이 순간" 워킹 디렉토리와 staging 의 상태를 보여준다 — 어느 파일이 modified, untracked, staged 인지. git log 는 "지금까지 쌓인" 커밋 히스토리를 시간 역순으로 보여준다. 둘 다 절대 코드를 바꾸지 않는 안전한 read-only 명령이라, 헷갈릴 때마다 마구 쳐도 된다. 실무에선 status 를 가장 자주, log 를 두번째로 자주 친다.',
        phase: 'status',
        gitInited: true,
        working: [
          { name: 'README.md', status: 'tracked', modified: true },
          { name: 'app.py', status: 'tracked', modified: false, dimmed: true },
          { name: 'utils.py', status: 'untracked' },
        ],
        staging: [
          { name: 'utils.py' },
        ],
        repository: [
          { hash: 'a3f9c21', msg: 'Initial commit: README + app', files: ['README.md', 'app.py'] },
          { hash: 'b7e2d44', msg: 'feat: add login endpoint', files: ['app.py'] },
        ],
        ignored: [],
        moveLit: null,
        activeFile: null,
        commands: [
          { cmd: '$ git status', output: 'Changes not staged:\n  modified: README.md\nChanges to be committed:\n  new file: utils.py' },
          { cmd: '$ git log --oneline', output: 'b7e2d44 feat: add login endpoint\na3f9c21 Initial commit: README + app' },
        ],
        code: {
          lang: 'bash',
          filename: 'status-log.sh',
          lines: [
            '# Step 4. git status / git log — 현재 상태와 히스토리',
            '',
            '# ━━━ status: 지금 이 순간의 상태 ━━━',
            'git status',
            '#  On branch main',
            '#  Changes to be committed:           ← staging 에 있음 (초록)',
            '#    new file:   utils.py',
            '#  Changes not staged for commit:     ← 워킹은 변했지만 add 전 (빨강)',
            '#    modified:   README.md',
            '#  Untracked files:',
            '#    (없음)',
            '',
            '# 짧게 보기 — 한 줄 한 파일',
            'git status -s     #   M README.md  /  A  utils.py',
            '',
            '# ━━━ log: 지금까지의 히스토리 ━━━',
            'git log',
            '#  commit b7e2d44... (HEAD -> main)   Author: 김개발   Date: 14:32',
            '#      feat: add login endpoint',
            '#  commit a3f9c21...                  Author: 김개발   Date: 14:00',
            '#      Initial commit: README + app',
            '',
            '# 한 줄로 보기 — 가장 자주 씀',
            'git log --oneline',
            '#  b7e2d44 feat: add login endpoint',
            '#  a3f9c21 Initial commit: README + app',
            '',
            '# 그래프·특정 파일 — Part 2 에서 자주 씀',
            'git log --oneline --graph --all',
            'git log --oneline app.py',
            '',
            '# ─── 셋이 다른 점 ───',
            '#  • status: 아직 커밋 안 된 변경 (working/staging)  ← read-only',
            '#  • log:    이미 커밋된 히스토리 (repository)         ← read-only',
          ],
          highlight: [3, 4, 5, 6, 7, 8, 9, 10, 11, 16, 17, 18, 19, 20, 21, 23, 24, 25, 26],
        },
      },
      {
        title: 'Step 5. .gitignore — 추적 제외',
        desc: '.gitignore 는 "이 파일들은 절대 staging 에 올리지 마라" 라고 Git 에게 알려주는 텍스트 파일이다. node_modules/, __pycache__/, .env, *.log, .DS_Store 같이 빌드 산출물 · 비밀 키 · OS 부산물 등은 절대 커밋하면 안 된다. .gitignore 는 프로젝트 루트에 두고 가장 먼저 커밋하는 게 정석이다. 한번 커밋된 파일은 .gitignore 에 추가해도 계속 추적되니, 처음에 잘 챙기는 게 핵심이다.',
        phase: 'gitignore',
        gitInited: true,
        working: [
          { name: 'README.md', status: 'tracked', modified: false, dimmed: true },
          { name: 'app.py', status: 'tracked', modified: false, dimmed: true },
          { name: '.gitignore', status: 'tracked', modified: false, dimmed: true },
        ],
        staging: [],
        repository: [
          { hash: 'a3f9c21', msg: 'Initial commit: README + app', files: ['README.md', 'app.py'] },
          { hash: 'b7e2d44', msg: 'feat: add login endpoint', files: ['app.py'] },
          { hash: 'c1d8e93', msg: 'chore: add .gitignore', files: ['.gitignore'] },
        ],
        ignored: [
          { name: '.env' },
          { name: '__pycache__/' },
          { name: '*.log' },
          { name: '.DS_Store' },
        ],
        moveLit: null,
        activeFile: null,
        commands: [
          { cmd: '$ cat .gitignore', output: '.env\n__pycache__/\n*.log\n.DS_Store' },
          { cmd: '$ git status', output: 'nothing to commit, working tree clean' },
        ],
        code: {
          lang: 'gitignore',
          filename: '.gitignore',
          lines: [
            '# Step 5. .gitignore — 추적에서 제외할 파일 패턴',
            '# (이 파일 자체는 커밋해야 한다 — 팀 전체에 공유되는 규칙)',
            '',
            '# ━━━ 1) 비밀 키 / 환경 변수 (절대 커밋 금지) ━━━',
            '.env',
            '.env.local',
            '*.pem',
            'secrets.json',
            '',
            '# ━━━ 2) 의존성 — 설치하면 다시 생기므로 ━━━',
            'node_modules/',
            'venv/',
            '.venv/',
            '',
            '# ━━━ 3) 빌드 산출물 / 캐시 ━━━',
            '__pycache__/',
            '*.pyc',
            'dist/',
            'build/',
            '.next/',
            '',
            '# ━━━ 4) OS / 에디터 부산물 ━━━',
            '.DS_Store        # macOS',
            'Thumbs.db        # Windows',
            '.vscode/         # VSCode (팀에 따라 다름)',
            '',
            '# ━━━ 5) 로그 / 임시 파일 ━━━',
            '*.log',
            'tmp/',
            '',
            '# ━━━ 예외 — 무시 패턴에 걸렸지만 포함하고 싶을 때 ! ━━━',
            '!.env.example       # 예시 환경 파일은 공유',
            '',
            '# ─── 주의사항 ───',
            '#  • 한 번 커밋된 파일은 .gitignore 추가해도 추적됨 → git rm --cached',
            '#  • 첫 커밋과 함께 두는 게 정석 / 템플릿: github.com/github/gitignore',
            '',
            '# ─── 다음 ─── Part 2: 브랜치 / 머지 / 충돌 해결',
          ],
          highlight: [4, 5, 6, 7, 8, 10, 11, 12, 13, 15, 16, 17, 18, 19, 20, 22, 23, 24, 25, 27, 28, 29],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 상단: 작업 디렉토리 (working directory)
    //   - 파일 박스 모음
    //   - status 별 색상: untracked(rose) / modified(amber) / tracked(slate)
    //   - activeFile 강조
    //   - dimmed 파일은 회색 처리
    // ─────────────────────────────────────────────────────
    function WorkingDirBox({ working, gitInited, activeFile }) {
      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${
          gitInited ? 'bg-slate-50 border-slate-300' : 'bg-slate-50 border-dashed border-slate-200'
        }`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📁</span>
              <span className="text-[11px] font-bold text-slate-700">
                Working Directory
              </span>
            </div>
            <span className="text-[9px] px-1.5 py-0.5 rounded font-mono bg-slate-200 text-slate-600">
              myproject/
            </span>
          </div>

          {/* .git 폴더 표시 */}
          {gitInited && (
            <div className="mb-1.5 bg-white rounded border border-slate-300 px-2 py-1 flex items-center gap-1.5">
              <span className="text-xs">📂</span>
              <span className="text-[10px] font-mono font-bold text-slate-700">.git/</span>
              <span className="ml-auto text-[8px] bg-slate-700 text-white px-1 py-0.5 rounded font-mono">
                repository
              </span>
            </div>
          )}

          {/* 파일 목록 */}
          <div className="grid grid-cols-3 gap-1.5">
            {working.length === 0 ? (
              <div className="col-span-3 text-center text-[10px] text-slate-400 py-2 italic">
                (빈 폴더)
              </div>
            ) : (
              working.map((f, i) => {
                const isActive = activeFile === f.name;
                const cls = f.dimmed
                  ? 'bg-slate-50 border-slate-200 text-slate-400 opacity-60'
                  : f.status === 'untracked'
                  ? 'bg-rose-50 border-rose-300 text-rose-800'
                  : f.modified
                  ? 'bg-amber-50 border-amber-300 text-amber-800'
                  : 'bg-emerald-50 border-emerald-300 text-emerald-800';
                return (
                  <div
                    key={i}
                    className={`rounded border-2 p-1.5 text-center transition-all duration-300 ${cls} ${
                      isActive ? 'ring-2 ring-slate-700 scale-105 shadow-md' : ''
                    }`}
                  >
                    <div className="text-base leading-none">📄</div>
                    <div className="text-[9px] font-mono font-bold mt-0.5 break-all leading-tight">
                      {f.name}
                    </div>
                    <div className="text-[8px] mt-0.5 leading-tight">
                      {f.dimmed
                        ? '(unchanged)'
                        : f.status === 'untracked'
                        ? 'untracked'
                        : f.modified
                        ? 'modified'
                        : 'tracked'}
                    </div>
                  </div>
                );
              })
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 중앙: Staging Area
    //   git add 로 올라온 파일들이 잠시 머무는 곳
    // ─────────────────────────────────────────────────────
    function StagingBox({ staging, activeFile, lit }) {
      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${
          lit ? 'bg-slate-100 border-slate-500 shadow-md' : 'bg-slate-50 border-slate-300'
        }`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">📋</span>
              <span className="text-[11px] font-bold text-slate-700">
                Staging Area
              </span>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
              lit ? 'bg-slate-700 text-white' : 'bg-slate-300 text-slate-600'
            }`}>
              index
            </span>
          </div>

          <div className="grid grid-cols-3 gap-1.5 min-h-[3.5rem]">
            {staging.length === 0 ? (
              <div className="col-span-3 text-center text-[10px] text-slate-400 py-3 italic border border-dashed border-slate-300 rounded">
                (비어 있음 — git add 대기)
              </div>
            ) : (
              staging.map((f, i) => {
                const isActive = activeFile === f.name;
                return (
                  <div
                    key={i}
                    className={`rounded border-2 p-1.5 text-center bg-white border-slate-500 text-slate-800 transition-all duration-300 ${
                      isActive ? 'ring-2 ring-slate-700 scale-105 shadow-md' : ''
                    }`}
                  >
                    <div className="text-base leading-none">📄</div>
                    <div className="text-[9px] font-mono font-bold mt-0.5 break-all leading-tight">
                      {f.name}
                    </div>
                    <div className="text-[8px] mt-0.5 text-slate-600 leading-tight">staged</div>
                  </div>
                );
              })
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: Repository (.git 안의 커밋들)
    //   각 커밋이 SHA + 메시지 형태로 쌓인다
    // ─────────────────────────────────────────────────────
    function RepositoryBox({ repository, lit }) {
      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${
          lit ? 'bg-slate-700 border-slate-800 shadow-md' : 'bg-slate-100 border-slate-300'
        }`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5">
              <span className="text-base">🗄️</span>
              <span className={`text-[11px] font-bold ${lit ? 'text-slate-100' : 'text-slate-700'}`}>
                Repository (.git/)
              </span>
            </div>
            <span className={`text-[9px] px-1.5 py-0.5 rounded font-mono font-bold ${
              lit ? 'bg-emerald-500 text-white animate-pulse' : 'bg-slate-300 text-slate-600'
            }`}>
              {repository.length} commits
            </span>
          </div>

          <div className="space-y-1 min-h-[3.5rem]">
            {repository.length === 0 ? (
              <div className="text-center text-[10px] text-slate-400 py-3 italic border border-dashed border-slate-300 rounded">
                (커밋 없음 — git commit 대기)
              </div>
            ) : (
              repository.map((c, i) => {
                const isLatest = i === repository.length - 1;
                return (
                  <div
                    key={i}
                    className={`rounded border-2 px-2 py-1.5 transition-all duration-300 ${
                      isLatest && lit
                        ? 'bg-white border-emerald-400 ring-2 ring-emerald-400'
                        : lit
                        ? 'bg-slate-600 border-slate-500'
                        : 'bg-white border-slate-300'
                    }`}
                  >
                    <div className="flex items-center gap-2">
                      <span className={`text-[9px] font-mono font-bold px-1.5 py-0.5 rounded ${
                        isLatest && lit ? 'bg-emerald-500 text-white' : lit ? 'bg-slate-800 text-slate-200' : 'bg-slate-700 text-white'
                      }`}>
                        {c.hash}
                      </span>
                      <span className={`text-[10px] font-mono flex-1 truncate ${
                        isLatest && lit ? 'text-slate-800 font-bold' : lit ? 'text-slate-200' : 'text-slate-700'
                      }`}>
                        {c.msg}
                      </span>
                      {isLatest && (
                        <span className={`text-[8px] px-1 py-0.5 rounded font-mono font-bold ${
                          lit ? 'bg-emerald-500 text-white' : 'bg-slate-700 text-white'
                        }`}>
                          HEAD
                        </span>
                      )}
                    </div>
                    <div className={`text-[8px] mt-0.5 ml-1 font-mono ${
                      lit ? (isLatest ? 'text-slate-500' : 'text-slate-400') : 'text-slate-500'
                    }`}>
                      {c.files.join(' · ')}
                    </div>
                  </div>
                );
              })
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // .gitignore 박스 — 무시 패턴 시각화 (Step 5 에서만 의미)
    // ─────────────────────────────────────────────────────
    function IgnoredBox({ ignored }) {
      if (ignored.length === 0) return null;
      return (
        <div className="rounded-lg border-2 border-rose-300 bg-rose-50 p-2.5">
          <div className="flex items-center gap-1.5 mb-1.5">
            <span className="text-base">🚫</span>
            <span className="text-[11px] font-bold text-rose-800">.gitignore — 추적 제외</span>
            <span className="ml-auto text-[8px] bg-rose-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">
              ignored
            </span>
          </div>
          <div className="grid grid-cols-2 gap-1">
            {ignored.map((f, i) => (
              <div
                key={i}
                className="bg-white rounded border border-rose-200 px-1.5 py-1 text-center"
              >
                <span className="text-[9px] font-mono text-rose-700 font-bold">{f.name}</span>
              </div>
            ))}
          </div>
          <div className="text-[9px] text-rose-700 mt-1.5 leading-tight">
            ✗ Git 이 보지 않음 — staging / commit 대상에서 영원히 제외
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 화살표 (working ↓ staging ↓ repository) — moveLit 으로 강조
    // ─────────────────────────────────────────────────────
    function FlowArrow({ active, label }) {
      return (
        <div className="text-center">
          <div className={`inline-block text-[11px] font-mono ${
            active ? 'text-slate-800 font-bold' : 'text-slate-300'
          }`}>
            ↓ {label}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 패널 전체
    //   상단: Working Directory (파일 박스들)
    //   ↓ git add
    //   중앙: Staging Area
    //   ↓ git commit
    //   하단: Repository (커밋들)
    //   + (Step 5) .gitignore 박스
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 Working → Staging → Repository</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2">
            <WorkingDirBox
              working={step.working}
              gitInited={step.gitInited}
              activeFile={step.activeFile}
            />

            <FlowArrow active={step.moveLit === 'add'} label="git add" />

            <StagingBox
              staging={step.staging}
              activeFile={step.activeFile}
              lit={step.moveLit === 'add'}
            />

            <FlowArrow active={step.moveLit === 'commit'} label="git commit" />

            <RepositoryBox
              repository={step.repository}
              lit={step.moveLit === 'commit'}
            />

            <IgnoredBox ignored={step.ignored} />
          </div>

          {/* 명령 실행 로그 (mini terminal) */}
          {step.commands && step.commands.length > 0 && (
            <div className="mt-3 bg-slate-900 rounded-lg p-2 font-mono text-[9px] leading-snug">
              {step.commands.map((c, i) => (
                <div key={i} className="mb-1 last:mb-0">
                  <div className="text-emerald-400">{c.cmd}</div>
                  {c.output && (
                    <div className="text-slate-300 whitespace-pre-line pl-2">{c.output}</div>
                  )}
                </div>
              ))}
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-400"></span>untracked
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-400"></span>modified
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-700"></span>staged
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-500"></span>committed
            </span>
            <span className="ml-auto font-mono">phase: {step.phase}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js 토큰화
    //   파일명 탭, 윈도우 dot, 라인 번호, 강조 라인 (slate)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-slate-500/20 border-l-2 border-slate-300' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인 — 상태 관리, 자동재생(3000ms), 키보드 단축키
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-slate-700 hover:text-slate-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-300 text-xs">curriculum Part 1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-slate-700 text-white flex items-center justify-center rounded-full font-bold text-sm">G</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part 1. Git 기본 &gt; init / add / commit</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Part 1. Git 기본 — Working / Staging / Repository</h1>
                  <p className="text-sm text-slate-500 mt-0.5">빈 폴더 → init → add → commit → status/log → .gitignore. 파일이 3 영역을 어떻게 이동하는지 본다.</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-slate-100 border-2 border-slate-300 rounded-xl p-3 text-sm text-slate-800">
                💡 정리: <strong>working</strong>(작업) → <strong>add</strong> → <strong>staging</strong>(준비) → <strong>commit</strong> → <strong>repository</strong>(기록). 그리고 <strong>.gitignore</strong>로 추적에서 빼고 싶은 것은 미리 빼둔다. 다음(Part 2)에서는 브랜치와 머지를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-slate-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-slate-300">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-slate-300">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-slate-700 text-white hover:bg-slate-800 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['git init', 'git add', 'git commit', 'git status', 'git log', '.gitignore', 'staging area', 'repository', 'working directory'].map((kw) => (
                <span key={kw} className="bg-slate-50 text-slate-700 px-3 py-1 rounded-full text-xs font-medium border border-slate-300">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-700 hover:text-slate-900 font-medium">&larr; 목차</a>
              <a href="./part-2.html" className="text-slate-700 hover:text-slate-900 font-medium">Part 2 브랜치 / 머지 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
