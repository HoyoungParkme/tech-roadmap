    function Viz_1_1({ step }) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-4">
          {/* 파일 목록 */}
          <div className="flex flex-wrap gap-3 justify-center max-w-lg">

                <div className="text-2xl mb-1">📄</div>
                <div className="text-xs font-bold text-slate-700 break-all">{f.name}</div>
                {f.status && <div className="text-[10px] text-slate-500 mt-1">{f.status}</div>}
                {f.editor && (
                  <div className={`text-[10px] font-bold mt-1 ${f.editor === 'A' ? 'text-orange-600' : 'text-purple-600'}`}>

                )}
              </div>
            ))}
          </div>

          {step.showConflict && (
            <div className="fade-in-up bg-red-50 border-2 border-red-400 rounded-lg p-4 text-center max-w-sm">

              <div className="text-red-700 font-bold text-sm">덮어쓰기 충돌!</div>

          {step.showChaos && (
            <div className="fade-in-up bg-orange-50 border-2 border-orange-400 rounded-lg p-4 text-center max-w-sm">

            </div>
          )}

      );

                  p.done ? 'bg-emerald-50 border-emerald-400' : 'bg-white border-slate-200 text-slate-400'}`}>

                <div className={`font-bold text-sm ${p.active ? 'text-orange-700' : p.done ? 'text-emerald-700' : 'text-slate-400'}`}>
                  {p.name}
                </div>
                {p.detail && (
                  <div className={`text-[10px] mt-2 ${p.active ? 'text-orange-600' : 'text-emerald-600'}`}>
                    {p.detail}
                  </div>
                )}
                {p.done && !p.active && <div className="text-emerald-500 text-lg mt-1">✓</div>}
              </div>
            ))}
          </div>

          {/* 히스토리 타임라인 */}
          {step.timeline && (
            <div className="fade-in-up bg-slate-50 rounded-lg p-4 w-full max-w-sm border border-slate-200">

                <div key={i} className="flex items-center gap-2 text-xs py-1 border-b border-slate-100 last:border-0">

          {step.restoreTarget && (
            <div className="fade-in-up bg-amber-50 rounded-lg p-4 text-center max-w-sm border border-amber-300">
              <div className="text-2xl mb-2">⏪</div>
              <div className="text-xs text-amber-700">되돌아갈 지점</div>
              <div className="font-bold text-sm text-amber-800 mt-1">{step.restoreTarget}</div>
            </div>
          )}

          {/* 병합 데모 */}
          {step.mergeDemo && (
            <div className="fade-in-up flex items-center gap-3 max-w-sm">
              <div className="bg-orange-100 border border-orange-300 rounded-lg p-3 text-center flex-1">
                <div className="text-lg">👤 A</div>
                <div className="text-[10px] text-orange-600">1장 수정</div>
              </div>
              <div className="text-2xl text-emerald-500">+</div>
              <div className="bg-purple-100 border border-purple-300 rounded-lg p-3 text-center flex-1">
                <div className="text-lg">👤 B</div>
                <div className="text-[10px] text-purple-600">2장 수정</div>
              </div>
              <div className="text-2xl text-emerald-500">=</div>
              <div className="bg-emerald-100 border border-emerald-400 rounded-lg p-3 text-center flex-1">
                <div className="text-lg">📄</div>
                <div className="text-[10px] text-emerald-700 font-bold">안전 병합!</div>
              </div>
            </div>
          )}

          {/* 전체 완성 */}
          {step.allDone && (
            <div className="fade-in-up text-center">
              <div className="text-emerald-600 font-bold text-sm">VCS의 세 가지 약속 → 파일 이름 관리의 종말</div>
            </div>
          )}
        </div>
      );
    }

    // --- I-1-3 렌더러: 중앙 vs 분산 ---
    function Viz_1_3({ step }) {
      const isDistributed = step.mode === 'distributed';
      const serverDown = step.serverStatus === 'offline';
      const isGitHub = step.serverStatus === 'github';

      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-4">
          {/* 서버 */}
          <div className={`border-2 rounded-xl p-4 text-center w-48 transition-all duration-500
            ${serverDown ? 'bg-red-100 border-red-500 shake' :
              isGitHub ? 'bg-slate-800 border-slate-600' :
              'bg-blue-100 border-blue-500'}`}>
            <div className="text-3xl mb-1">
              {serverDown ? '💀' : isGitHub ? '🐙' : '🖥️'}
            </div>
            <div className={`font-bold text-sm ${serverDown ? 'text-red-700' : isGitHub ? 'text-white' : 'text-blue-700'}`}>
              {isGitHub ? 'GitHub' : serverDown ? '서버 다운!' : isDistributed ? '공유 허브' : '중앙 서버'}
            </div>
            {!isDistributed && !serverDown && (
              <div className="text-[10px] text-blue-600 mt-1">모든 히스토리 독점</div>
            )}
            {isDistributed && !serverDown && !isGitHub && (
              <div className="text-[10px] text-blue-600 mt-1">동기화 역할만</div>
            )}
            {isGitHub && (
              <div className="text-[10px] text-slate-300 mt-1">자발적 중앙 허브</div>
            )}
          </div>

          {/* 연결선 */}
          <div className="flex flex-col items-center">
            <div className={`w-0.5 h-6 ${serverDown ? 'bg-red-300' : 'bg-slate-300'}`}></div>
            {serverDown && <div className="text-red-500 text-lg font-bold">✕</div>}
            {!serverDown && (
              <svg width="12" height="8" viewBox="0 0 12 8" fill="none">
                <path d="M6 8L0 0h12L6 8z" fill="#cbd5e1" />
              </svg>
            )}
          </div>

          {/* 클라이언트들 */}
          <div className="flex gap-4 justify-center flex-wrap">
            {step.clients.map((c, i) => (
              <div key={i} className={`border-2 rounded-lg p-3 text-center w-32 transition-all duration-500
                ${c.status.includes('불가') ? 'bg-red-50 border-red-300' :
                  c.hasHistory ? 'bg-emerald-50 border-emerald-400' :
                  'bg-white border-slate-200'}`}>
                <div className="text-xl mb-1">💻</div>
                <div className="font-bold text-xs text-slate-700">{c.name}</div>
                <div className={`text-[10px] mt-1 ${c.status.includes('불가') ? 'text-red-600 font-bold' :
                  c.hasHistory ? 'text-emerald-600' : 'text-slate-500'}`}>
                  {c.status}
                </div>
                {c.hasHistory && (
                  <div className="text-[10px] mt-1 bg-emerald-100 rounded px-1 text-emerald-700">📋 전체 히스토리</div>
                )}
              </div>
            ))}
          </div>

          {/* 모드 라벨 */}
          <div className={`text-xs font-bold px-3 py-1 rounded-full ${isDistributed ? 'bg-emerald-100 text-emerald-700' : 'bg-blue-100 text-blue-700'}`}>
            {isDistributed ? '분산형 (Distributed)' : '중앙집중형 (Centralized)'}
          </div>
        </div>
      );
    }

    // --- I-2-1 렌더러: Git vs GitHub ---
    function Viz_2_1({ step }) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-4">
          <div className="flex gap-6 justify-center items-start flex-wrap">
            {/* Git 영역 */}
            <div className={`border-2 rounded-xl p-4 w-52 transition-all duration-500
              ${step.focus === 'git' ? 'bg-orange-50 border-orange-500 ring-2 ring-orange-300 shadow-lg scale-105' :
                'bg-orange-50 border-orange-300'}`}>
              <div className="text-center mb-3">
                <div className="text-3xl mb-1">⚙️</div>
                <div className="font-bold text-orange-700">Git</div>
                <div className="text-[10px] text-orange-500">로컬 도구 (소프트웨어)</div>
              </div>
              <div className="space-y-1">
                {step.gitFeatures.map((f, i) => (
                  <div key={i} className="text-xs bg-orange-100 rounded px-2 py-1 text-orange-700">
                    {f}
                  </div>
                ))}
              </div>
              {step.relationship === 'git-independent' && (
                <div className="mt-2 text-[10px] text-emerald-600 font-bold text-center bg-emerald-50 rounded p-1">
                  ✓ GitHub 없이 동작 가능
                </div>
              )}
            </div>

            {/* 관계 표시 */}
            {step.focus !== 'git' && (
              <div className="flex flex-col items-center justify-center self-center">
                {step.focus === 'relationship' ? (
                  <div className="text-center">
                    <div className="text-xs text-slate-500 mb-1">Git 위에 구축</div>
                    <div className="text-2xl">→</div>
                    <div className="text-xs text-red-500 mt-1">Git 없이 불가</div>
                  </div>
                ) : (
                  <div className="text-2xl text-slate-300">↔</div>
                )}
              </div>
            )}

            {/* GitHub 영역 */}
            {step.focus !== 'git' && (
              <div className={`border-2 rounded-xl p-4 w-52 transition-all duration-500
                ${step.focus === 'github' || step.focus === 'github-extras' ? 'bg-slate-800 border-slate-600 ring-2 ring-slate-400 shadow-lg scale-105' :
                  'bg-slate-100 border-slate-300'}`}>
                <div className="text-center mb-3">
                  <div className="text-3xl mb-1">🐙</div>
                  <div className={`font-bold ${step.focus === 'github' || step.focus === 'github-extras' ? 'text-white' : 'text-slate-700'}`}>GitHub</div>
                  <div className={`text-[10px] ${step.focus === 'github' || step.focus === 'github-extras' ? 'text-slate-400' : 'text-slate-500'}`}>웹 플랫폼 (서비스)</div>
                </div>
                <div className="space-y-1">
                  {step.githubFeatures.map((f, i) => (
                    <div key={i} className={`text-xs rounded px-2 py-1 fade-in-up
                      ${step.focus === 'github' || step.focus === 'github-extras' ? 'bg-slate-700 text-slate-200' : 'bg-slate-200 text-slate-600'}`}
                         style={{ animationDelay: `${i * 0.08}s` }}>
                      {f}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* 대안 플랫폼 */}
          {step.alternatives && (
            <div className="fade-in-up flex gap-3 items-center">
              <span className="text-xs text-slate-400">같은 원리:</span>
              {step.alternatives.map((a, i) => (
                <div key={i} className="bg-slate-100 border border-slate-300 rounded-lg px-3 py-1 text-xs text-slate-600 font-bold">
                  {a}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // 섹션 목록 (탭 정의)
    // ═══════════════════════════════════════════════
    const SECTIONS = [
      { id: "1-1", label: "I-1-1", title: "파일 이름으로 버전 관리하던 시절", steps: STEPS_1_1, Renderer: Viz_1_1 },
      { id: "1-2", label: "I-1-2", title: "버전 관리 시스템의 세 가지 약속", steps: STEPS_1_2, Renderer: Viz_1_2 },
      { id: "1-3", label: "I-1-3", title: "Git이 세상을 바꾼 이유", steps: STEPS_1_3, Renderer: Viz_1_3 },
      { id: "2-1", label: "I-2-1", title: "Git과 GitHub는 다르다", steps: STEPS_2_1, Renderer: Viz_2_1 },
    ];

    // ═══════════════════════════════════════════════
    // 메인 앱
    // ═══════════════════════════════════════════════
    function App() {
      const [sectionIdx, setSectionIdx] = useState(0);
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);

      const section = SECTIONS[sectionIdx];
      const step = section.steps[stepIdx];
      const isEnd = stepIdx === section.steps.length - 1;
      const Renderer = section.Renderer;

      // 탭 전환 시 스텝 초기화
      const handleTabChange = (idx) => {
        setSectionIdx(idx);
        setStepIdx(0);
        setIsPlaying(false);
      };

      const handleNext = () => {
        setStepIdx(prev => {
          if (prev < section.steps.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (stepIdx > 0) {
          setStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const togglePlay = () => {
        if (isEnd) setStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playRef.current = setInterval(() => handleNextRef.current(), 2800);
        } else {
          clearInterval(playRef.current);
        }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      // sectionIdx 변경 시 handleNext ref 업데이트를 위해 section을 의존성에서 제외
      // (handleNextRef가 항상 최신 handleNext를 참조하므로 안전)

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-4">

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between flex-wrap gap-2">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                  <div>
                    <h1 className="text-xl font-bold text-slate-800">Part I. 왜 버전 관리인가</h1>
                    <p className="text-xs text-slate-500">코드가 아니라 "변화"를 관리한다는 발상이 왜 필요한지 이해한다.</p>
                  </div>
                </div>
                <a href="../index.html" className="text-xs text-orange-600 hover:underline font-medium">← 전체 목차</a>
              </div>
            </header>

            {/* 탭 바 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-1 flex gap-1 overflow-x-auto">
              {SECTIONS.map((s, i) => (
                <button
                  key={s.id}
                  onClick={() => handleTabChange(i)}
                  aria-label={`${s.label} — ${s.title} 섹션으로 이동`}
                  className={`flex-1 min-w-[120px] px-3 py-2 rounded-lg text-xs font-medium transition-all
                    ${i === sectionIdx ? 'bg-orange-600 text-white shadow-sm' : 'text-slate-500 hover:bg-slate-100'}`}
                >
                  <div className="font-bold">{s.label}</div>
                  <div className={`mt-0.5 ${i === sectionIdx ? 'text-orange-200' : 'text-slate-400'}`}>{s.title}</div>
                </button>
              ))}
            </div>

            {/* 현재 단계 설명 배너 */}
            <div className="bg-orange-700 text-white p-4 rounded-xl shadow-sm border border-orange-800 min-h-[80px] flex flex-col justify-center">
              <h3 className="text-[10px] font-bold text-orange-200 uppercase tracking-wider mb-1">
                {section.label} — {step.label}
              </h3>
              <p className="text-sm md:text-base font-medium leading-relaxed">{step.desc}</p>
            </div>

            {/* 시각화 영역 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 min-h-[360px] md:min-h-[420px] flex items-center justify-center">
              <Renderer step={step} />
            </div>

            {/* 컨트롤 바 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button
                  aria-label="이전 단계"
                  onClick={handlePrev}
                  disabled={stepIdx === 0}
                  className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"
                >
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/>
                  </svg>
                </button>
                <button
                  aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                  onClick={togglePlay}
                  className="flex items-center px-4 py-2 rounded bg-orange-600 hover:bg-orange-700 text-white font-medium transition shadow-sm w-32 justify-center"
                >
                  {isPlaying ? (
                    <>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2">
                        <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
                      </svg>
                      정지
                    </>
                  ) : (
                    <>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                      </svg>
                      자동 실행
                    </>
                  )}
                </button>
                <button
                  aria-label="다음 단계"
                  onClick={handleNext}
                  disabled={isEnd}
                  className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"
                >
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/>
                  </svg>
                </button>
              </div>
              <div className="flex items-center gap-3">
                <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                  Step {stepIdx + 1} / {section.steps.length}
                </div>
                {/* 스텝 프로그레스 도트 */}
                <div className="flex gap-1">
                  {section.steps.map((_, i) => (
                    <button
                      key={i}
                      onClick={() => { setStepIdx(i); setIsPlaying(false); }}
                      aria-label={`Step ${i + 1}로 이동`}
                      className={`w-2.5 h-2.5 rounded-full transition-all ${
                        i === stepIdx ? 'bg-orange-500 scale-125' :
                        i < stepIdx ? 'bg-emerald-400' : 'bg-slate-200'
                      }`}
                    />
                  ))}
                </div>
              </div>
            </div>

            {/* 푸터 */}
            <footer className="text-center text-xs text-slate-400 py-2">
              Git & GitHub 사다리형 학습 커리큘럼 — Part I 시각화
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
<script src="sidebar.js"></script>
</body>
</html>
