      {

    /**
     * RepoCard — 단일 저장소 박스 (upstream / origin / local)
     * dataState.repos[name]을 읽어 commits, branches, status, highlight를 표시한다.
     */
    function RepoCard({ name, repo, icon, label, sublabel }) {
      const isHi = repo.highlight;
      const baseColor = name === 'upstream' ? 'violet' : name === 'origin' ? 'emerald' : 'sky';
      const borderClass = isHi
        ? `border-${baseColor}-400 bg-${baseColor}-50 shadow-md`
        : 'border-slate-200 bg-white opacity-60';
      // tailwind JIT 안전장치 — 동적 클래스 풀네임을 미리 매핑
      const hiMap = {
        violet:  'border-violet-400 bg-violet-50 shadow-md',
        emerald: 'border-emerald-400 bg-emerald-50 shadow-md',
        sky:     'border-sky-400 bg-sky-50 shadow-md',
      };
      const dotMap = {
        violet:  'bg-violet-500',
        emerald: 'bg-emerald-500',
        sky:     'bg-sky-500',
      };
      const finalBorder = isHi ? hiMap[baseColor] : 'border-slate-200 bg-white opacity-60';

      return (
        <div className={`rounded-xl border-2 p-3 transition-all ${finalBorder}`}>
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl">{icon}</span>
            <div className="flex-1">
              <div className="font-bold text-slate-800 text-sm">{label}</div>
              <div className="text-[10px] text-slate-500">{sublabel}</div>
            </div>
            <span className={`w-2 h-2 rounded-full ${isHi ? dotMap[baseColor] : 'bg-slate-300'}`}></span>
          </div>
          <div className="border-t border-slate-200 pt-2 space-y-1">
            <div className="flex items-center justify-between text-[11px]">
              <span className="text-slate-500">commits</span>
              <span className="font-mono font-bold text-slate-700">{repo.commits}</span>
            </div>
            <div className="text-[11px]">
              <div className="text-slate-500 mb-1">branches</div>
              <div className="flex flex-wrap gap-1">
                {repo.branches.length === 0 && <span className="text-slate-400 italic">(none)</span>}
                {repo.branches.map((b) => {
                  const isFeature = b.includes('feature');
                  const isCurrent = b.endsWith('*');
                  const cleanName = b.replace('*', '');
                  return (
                    <span key={b}
                      className={`px-1.5 py-0.5 rounded text-[10px] font-mono ${
                        isCurrent ? 'bg-amber-200 text-amber-900 ring-1 ring-amber-400' :
                        isFeature ? 'bg-amber-100 text-amber-800' :
                        'bg-slate-100 text-slate-700'
                      }`}>
                      {isCurrent ? '→ ' : ''}{cleanName}
                    </span>
                  );
                })}
              </div>
            </div>
            {repo.remotes && (
              <div className="text-[11px] mt-2 pt-2 border-t border-slate-200">
                <div className="text-slate-500 mb-1">remotes</div>
                <div className="flex flex-wrap gap-1">
                  {repo.remotes.map((r) => (
                    <span key={r} className="px-1.5 py-0.5 rounded bg-slate-100 text-slate-700 text-[10px] font-mono">
                      {r}
                    </span>
                  ))}
                </div>
              </div>
            )}
            <div className="pt-1">
              <span className="inline-block px-2 py-0.5 rounded-full bg-slate-100 text-slate-600 text-[10px]">
                {repo.status}
              </span>
            </div>
          </div>
        </div>
      );
    }

    /**
     * FlowArrow — 두 저장소 사이의 트래픽 흐름 화살표
     * step별 push / clone / PR / merge 방향과 색상을 시각화한다.
     */
    function FlowArrow({ flow }) {
      if (!flow) {
        return (
          <div className="text-center text-[11px] text-slate-400 italic py-2">
            (이 단계에서는 저장소 간 트래픽 없음)
          </div>
        );
      }
      const colorMap = {
        emerald: 'border-emerald-400 bg-emerald-50 text-emerald-700',
        sky:     'border-sky-400 bg-sky-50 text-sky-700',
        amber:   'border-amber-400 bg-amber-50 text-amber-700',
        violet:  'border-violet-400 bg-violet-50 text-violet-700',
      };
      const cls = colorMap[flow.color] || colorMap.amber;
      const fromIcon = flow.from === 'upstream' ? '🌍' : flow.from === 'origin' ? '🍴' : '💻';
      const toIcon   = flow.to   === 'upstream' ? '🌍' : flow.to   === 'origin' ? '🍴' : '💻';
      const arrow = flow.dashed ? '╌╌╌▶' : '────▶';

      return (
        <div className={`rounded-lg border-2 ${cls} p-3 flex items-center justify-center gap-3 text-sm`}>
          <span className="text-xl">{fromIcon}</span>
          <span className="font-mono text-xs font-bold">{flow.from}</span>
          <span className="font-mono text-base font-bold">{arrow}</span>
          <span className="font-mono text-xs font-bold">{flow.to}</span>
          <span className="text-xl">{toIcon}</span>
          <span className="ml-2 px-2 py-0.5 rounded bg-white/60 text-[11px] font-medium">
            {flow.label}
          </span>
        </div>
      );
    }

    /**
     * LiveDataPane — 좌측 패널 (upstream / fork / 로컬 3 저장소 다이어그램 + 트래픽)
     */
    function LiveDataPane({ state }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <div className="text-xs font-bold text-slate-700 uppercase tracking-wider">
              저장소 상태 다이어그램
            </div>
            <div className="text-[10px] text-slate-400">3 repos</div>
          </div>

          <div className="space-y-2 mb-3">
            <RepoCard
              name="upstream"
              repo={state.repos.upstream}
              icon="🌍"
              label="upstream"
              sublabel="facebook/react (원본)"
            />
            <RepoCard
              name="origin"
              repo={state.repos.origin}
              icon="🍴"
              label="origin (fork)"
              sublabel="HoyoungParkme/react"
            />
            <RepoCard
              name="local"
              repo={state.repos.local}
              icon="💻"
              label="local"
              sublabel="내 노트북 작업 디렉토리"
            />
          </div>

          <div className="border-t border-slate-200 pt-3">
            <div className="text-[10px] font-bold text-slate-500 uppercase mb-2">트래픽 흐름</div>
            <FlowArrow flow={state.flow} />
            {state.contributed && (
              <div className="mt-3 rounded-lg bg-emerald-100 border-2 border-emerald-400 p-2 text-center">
                <div className="text-emerald-800 font-bold text-sm">
                  🎉 오픈소스 기여 완료!
                </div>
                <div className="text-[10px] text-emerald-700 mt-1">
                  내 commit이 upstream/main에 들어갔다
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    /**
     * CodeViewer — 우측 패널 (VSCode 스타일, highlight.js atom-one-dark)
     * code.filename / code.lang / code.lines / code.highlight 를 받아 렌더한다.
     * 하나의 <code> 블록에 전체 텍스트를 넣어 highlight.js가 일괄 처리하게 두고,
     * 라인 번호 컬럼과 강조 라인 배경은 별도 absolute overlay로 그린다.
     */
    function CodeViewer({ code }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          codeRef.current.textContent = code.lines.join('\n');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg flex flex-col">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-300 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 uppercase font-mono">{code.lang}</span>
          </div>

          <div className="relative flex text-xs" style={{ maxHeight: '32rem' }}>
            <div className="select-none text-slate-500 text-right py-3 border-r border-slate-700 bg-[#21252b] font-mono shrink-0">
              {code.lines.map((_, i) => {
                const hi = code.highlight && code.highlight.includes(i + 1);
                return (
                  <div key={i} className={`px-3 leading-5 ${hi ? 'bg-yellow-500/15 text-yellow-300 font-bold' : ''}`}>
                    {i + 1}
                  </div>
                );
              })}
            </div>

            <div className="flex-1 overflow-auto">
              <div className="absolute pointer-events-none" style={{ left: '3.25rem', right: 0, top: '0.75rem' }}>
                {code.lines.map((_, i) => {
                  const hi = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div key={i} className={`leading-5 ${hi ? 'bg-yellow-500/10' : ''}`} style={{ height: '1.25rem' }}>
                      &nbsp;
                    </div>
                  );
                })}
              </div>
              <pre className="m-0 py-3 px-3 leading-5 font-mono">
                <code ref={codeRef} className={`language-${code.lang}`}>
                  {code.lines.join('\n')}
                </code>
              </pre>
            </div>
          </div>
        </div>
      );
    }

    /**
     * Header — 상단 타이틀 + 진행도
     */
    function Header({ stepIdx, total }) {
      return (
        <div className="mb-5 flex items-start justify-between gap-4">
          <div>
            <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
            <h1 className="text-2xl font-bold text-slate-800 mt-1">
              VI-1-1. Fork & Pull Request 워크플로우
            </h1>
            <p className="text-sm text-slate-500 mt-1">
              오픈소스 기여 표준 흐름: upstream → fork → local → PR → merge
            </p>
          </div>
          <div className="text-right">
            <div className="text-[11px] text-slate-400 uppercase tracking-wider">Step</div>
            <div className="text-2xl font-bold text-slate-700">
              {stepIdx + 1} <span className="text-slate-400 text-base">/ {total}</span>
            </div>
          </div>
        </div>
      );
    }

    /**
     * DescPanel — 현재 step의 제목 + 설명 + 진행 바
     */
    function DescPanel({ step, stepIdx, total }) {
      const pct = ((stepIdx + 1) / total) * 100;
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-4">
          <div className="flex items-center gap-2 mb-2">
            <span className="px-2 py-0.5 rounded-full bg-slate-800 text-white text-[10px] font-bold uppercase tracking-wider">
              Step {stepIdx + 1}
            </span>
            <div className="font-bold text-slate-800 text-base">{step.title}</div>
          </div>
          <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
          <div className="mt-3 h-1.5 bg-slate-100 rounded-full overflow-hidden">
            <div
              className="h-full bg-slate-700 transition-all duration-500"
              style={{ width: `${pct}%` }}
            />
          </div>
        </div>
      );
    }

    /**
     * Controls — 4 버튼 (처음 / 이전 / 재생 / 다음)
     */
    function Controls({ stepIdx, setStepIdx, isPlaying, setIsPlaying, total }) {
      const goFirst = () => { setIsPlaying(false); setStepIdx(0); };
      const goPrev  = () => setStepIdx(Math.max(0, stepIdx - 1));
      const goNext  = () => setStepIdx(Math.min(total - 1, stepIdx + 1));
      const togglePlay = () => {
        if (stepIdx === total - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };
      const atStart = stepIdx === 0;
      const atEnd   = stepIdx === total - 1;

      return (
        <div className="flex items-center justify-between gap-2 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
          <button
            onClick={goFirst}
            disabled={atStart}
            aria-label="처음으로"
            className="px-3 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">
            ⏮ 처음
          </button>
          <button
            onClick={goPrev}
            disabled={atStart}
            aria-label="이전 단계"
            className="px-3 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">
            ← 이전
          </button>
          <button
            onClick={togglePlay}
            aria-pressed={isPlaying}
            aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
            className="flex-1 px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
            {isPlaying ? '⏸ 정지' : (atEnd ? '↻ 처음부터 자동재생' : '▶ 자동 재생 (3초)')}
          </button>
          <button
            onClick={goNext}
            disabled={atEnd}
            aria-label="다음 단계"
            className="px-3 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">
            다음 →
          </button>
        </div>
      );
    }

    /**
     * App — 루트 컴포넌트
     * stepIdx 상태 + isPlaying 상태 + 키보드/타이머 이펙트를 관리한다.
     */
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const step = STEPS[stepIdx];

      // 자동재생 — 3000ms 간격으로 다음 단계 이동, 마지막에서 정지
      useEffect(() => {
        if (!isPlaying) return;
        const t = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setIsPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(t);
      }, [isPlaying]);

      // 키보드 ←/→ 단계 이동
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') {
            setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          }
          if (e.key === 'ArrowLeft') {
            setStepIdx((i) => Math.max(0, i - 1));
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <Header stepIdx={stepIdx} total={STEPS.length} />

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
              <LiveDataPane state={step.dataState} />
              <CodeViewer code={step.code} />
            </div>

            <DescPanel step={step} stepIdx={stepIdx} total={STEPS.length} />
            <Controls
              stepIdx={stepIdx}
              setStepIdx={setStepIdx}
              isPlaying={isPlaying}
              setIsPlaying={setIsPlaying}
              total={STEPS.length}
            />

            <p className="text-center text-[11px] text-slate-400 mt-3">
              키보드 ← / → 로 단계 이동 · 자동재생 3000ms · highlight.js atom-one-dark
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
