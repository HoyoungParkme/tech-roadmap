<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Git & GitHub 학습 — Fork & Pull Request 워크플로우</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    VI-1-1. Fork & Pull Request 워크플로우
    학습 목표: 오픈소스 기여의 표준 흐름(upstream → fork → local → PR → merge)을 안다.
    핵심 비유: "남의 집 = upstream / 내가 복사한 집 = origin / 내 노트북 = local"
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 원본 저장소(upstream) — 직접 push 불가',
        desc: '오픈소스 저장소(예: facebook/react)는 내가 직접 push할 권한이 없다. 원작자만 main에 commit할 수 있다. 비유: 남의 집 — 마음대로 못 들어감.',
        active: ['upstream'],
      },
      {
        title: 'Step 2. Fork — 내 계정으로 복제본 생성',
        desc: 'GitHub의 Fork 버튼 클릭 → 원본 저장소가 내 계정에 복사된다(나의 origin). 이제 내 fork에는 push 권한이 있다. 비유: 남의 집을 그대로 본뜬 집을 내 마당에 짓는다.',
        active: ['upstream', 'origin'],
      },
      {
        title: 'Step 3. Clone + branch 생성 — 로컬에서 안전하게',
        desc: 'origin을 로컬로 clone, feature 브랜치를 만들어 작업. main은 원본 동기화 용도로 두고 별도 브랜치에서 수정해야 PR 보내기 깨끗하다.',
        active: ['origin', 'local'],
      },
      {
        title: 'Step 4. Commit + push → 내 fork에 반영',
        desc: 'feature 브랜치에서 commit한 내용을 origin/feature로 push. 이 시점에서 내 fork(GitHub)에 변경이 올라가지만 upstream(원본)은 아직 그대로.',
        active: ['origin', 'local'],
        flow: 'push',
      },
      {
        title: 'Step 5. Pull Request 생성',
        desc: 'GitHub UI에서 "New Pull Request" → origin/feature → upstream/main 방향으로 요청. PR 본문에 변경 내용/이유/테스트 방법을 적는다. 원작자/리뷰어가 검토할 수 있게.',
        active: ['upstream', 'origin'],
        flow: 'pr',
      },
      {
        title: 'Step 6. Review → Merge → 기여 완료',
        desc: '리뷰어가 코멘트 → 필요 시 추가 commit으로 origin/feature에 push (PR이 자동 갱신). 최종 승인 후 원작자가 Merge → upstream/main에 반영. 내 변경이 오픈소스에 들어갔다.',
        active: ['upstream', 'origin', 'local'],
        flow: 'merge',
      },
    ];

    // 3-zone 정보
    const ZONES = {
      upstream: { emoji: '🌍', label: 'upstream', detail: '원본 (예: facebook/react)', subtitle: '쓰기 권한 X' },
      origin:   { emoji: '🍴', label: 'origin',   detail: '내 fork (HoyoungParkme/react)', subtitle: '쓰기 권한 O' },
      local:    { emoji: '💻', label: 'local',    detail: '내 노트북 clone', subtitle: '자유롭게 작업' },
    };

    const ZONE_COLOR = {
      upstream: 'border-violet-500 bg-violet-50',
      origin:   'border-emerald-500 bg-emerald-50',
      local:    'border-sky-500 bg-sky-50',
    };

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const activeSet = new Set(step.active);

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Fork & Pull Request 워크플로우</h1>
                <p className="text-sm text-slate-500 mt-1">남의 집 = upstream / 복사한 집 = origin / 내 노트북 = local</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* 3-zone 다이어그램 */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-6">
              {['upstream', 'origin', 'local'].map((z) => {
                const isActive = activeSet.has(z);
                const zone = ZONES[z];
                return (
                  <div key={z} className={`bg-white rounded-xl border-2 p-4 transition-all ${
                    isActive ? ZONE_COLOR[z] : 'border-slate-200 opacity-50'
                  }`}>
                    <div className="text-3xl mb-2">{zone.emoji}</div>
                    <div className="font-bold text-slate-800 text-sm">{zone.label}</div>
                    <div className="text-[11px] text-slate-600 mt-1">{zone.detail}</div>
                    <div className="text-[10px] text-slate-500 mt-2 italic">{zone.subtitle}</div>
                  </div>
                );
              })}
            </div>

            {/* 플로우 표시 */}
            {step.flow && (
              <div className="bg-white rounded-xl border-2 border-amber-300 p-4 mb-6">
                {step.flow === 'push' && (
                  <div className="flex items-center justify-center gap-3 text-sm">
                    <span className="text-2xl">💻</span>
                    <span className="text-slate-700">local/feature</span>
                    <span className="text-2xl text-amber-600">─push─→</span>
                    <span className="text-2xl">🍴</span>
                    <span className="text-slate-700">origin/feature</span>
                  </div>
                )}
                {step.flow === 'pr' && (
                  <div className="flex items-center justify-center gap-3 text-sm">
                    <span className="text-2xl">🍴</span>
                    <span className="text-slate-700">origin/feature</span>
                    <span className="text-2xl text-amber-600">─PR 요청─→</span>
                    <span className="text-2xl">🌍</span>
                    <span className="text-slate-700">upstream/main</span>
                  </div>
                )}
                {step.flow === 'merge' && (
                  <div className="flex items-center justify-center gap-3 text-sm">
                    <span className="text-2xl">🍴</span>
                    <span className="text-slate-700">origin/feature</span>
                    <span className="text-2xl text-emerald-600">─Merge─→</span>
                    <span className="text-2xl">🌍</span>
                    <span className="text-slate-700">upstream/main</span>
                    <span className="text-emerald-600 font-bold ml-2">✅ 기여 완료</span>
                  </div>
                )}
              </div>
            )}

            {/* 단계별 명령어 */}
            <div className="bg-slate-900 text-white rounded-xl p-4 mb-6 font-mono text-sm">
              {currentStep === 0 && (
                <div className="text-slate-400"># upstream/main — 직접 push 권한 없음</div>
              )}
              {currentStep === 1 && (
                <div className="text-amber-300"># GitHub UI에서 Fork 버튼 클릭 → origin 생성</div>
              )}
              {currentStep === 2 && (
                <>
                  <div>$ git clone https://github.com/HoyoungParkme/react.git</div>
                  <div>$ cd react</div>
                  <div>$ git checkout -b feature/my-fix</div>
                </>
              )}
              {currentStep === 3 && (
                <>
                  <div>$ git add .</div>
                  <div>$ git commit -m "fix: 버그 수정"</div>
                  <div>$ git push origin feature/my-fix</div>
                </>
              )}
              {currentStep === 4 && (
                <div className="text-amber-300"># GitHub UI: New Pull Request → origin/feature → upstream/main</div>
              )}
              {currentStep === 5 && (
                <div className="text-emerald-300"># 리뷰 통과 → 원작자가 Merge 버튼 클릭 → upstream/main에 반영</div>
              )}
            </div>

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
