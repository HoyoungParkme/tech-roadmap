      },

          { id: "c3", label: "커밋 3", content: ["A→", "E", "C", "D"], type: "snapshot" },
        ],
      },

        label: "브랜치 비용 = 0",

        gitBranch: { cost: "~0ms", size: "41 bytes", desc: "포인터 1개" },

        mode: "summary",
        advantages: ["스냅샷 → 빠른 버전 접근", "포인터 브랜치 → 0비용 분기", "로컬 히스토리 → 오프라인 작업", "SHA-1 해시 → 데이터 무결성"],

    // --- II-1-1: VCS 비교 카드 ---
    function Viz_1_1({ step }) {
      return (

                <div className="text-2xl mb-2">{t.name === 'Git' ? '🔶' : t.name === 'SVN' ? '🟦' : '🟣'}</div>

                  {t.type}
                </div>
                {t.share && (
                  <div className={`text-xs mt-2 font-bold ${t.active ? 'text-indigo-600' : 'text-slate-400'}`}>

                {t.winner && <div className="text-emerald-500 text-lg mt-1">👑</div>}
              </div>
            ))}
          </div>

    // --- II-1-2: 스냅샷 vs 델타 ---
    function Viz_1_2({ step }) {
      if (step.mode === 'intro') {

          <div className="flex flex-col items-center justify-center h-full p-6 space-y-6">

              <div className="text-2xl text-slate-400 font-bold">VS</div>
              <div className="bg-indigo-50 border-2 border-indigo-300 rounded-xl p-6 text-center w-40">

                <div className="font-bold text-indigo-700">Git</div>
                <div className="text-xs text-indigo-600 mt-1">스냅샷 저장</div>
              </div>
            </div>
          </div>
        );
      }

      if (step.mode === 'delta') {
        return (
          <div className="flex flex-col items-center justify-center h-full p-4 space-y-4">
            <div className="text-xs font-bold text-amber-600 bg-amber-50 px-3 py-1 rounded-full">SVN — 델타 방식</div>
            <div className="flex items-center gap-3">
              {step.commits.map((c, i) => (
                <React.Fragment key={i}>
                  <div className={`fade-in-up border-2 rounded-lg p-3 text-center w-28
                    ${c.type === 'full' ? 'bg-amber-100 border-amber-400' : 'bg-amber-50 border-amber-300'}`}
                       style={{ animationDelay: `${i * 0.2}s` }}>
                    <div className="text-xs font-bold text-amber-700">{c.label}</div>
                    <div className="mt-2 space-y-1">
                      {c.content.map((item, j) => (
                        <div key={j} className={`text-[10px] px-1 rounded ${
                          item.startsWith('+') ? 'bg-green-100 text-green-700' :
                          item.startsWith('-') ? 'bg-red-100 text-red-700 line-through' :
                          'bg-white text-slate-600'}`}>
                          {item}
                        </div>
                      ))}
                    </div>
                  </div>
                  {i < step.commits.length - 1 && (
                    <div className="text-amber-400">→</div>
                  )}
                </React.Fragment>
              ))}
            </div>
            <div className="text-xs text-amber-600 bg-amber-50 rounded-lg p-2 max-w-xs text-center">
              v3을 보려면 v1 → 변경1 → 변경2 순서대로 적용해야 한다
            </div>
          </div>
        );
      }

      if (step.mode === 'snapshot') {
        return (
          <div className="flex flex-col items-center justify-center h-full p-4 space-y-4">
            <div className="text-xs font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">Git — 스냅샷 방식</div>
            <div className="flex items-center gap-3">
              {step.commits.map((c, i) => (
                <React.Fragment key={i}>
                  <div className="fade-in-up border-2 border-indigo-400 bg-indigo-50 rounded-lg p-3 text-center w-28"
                       style={{ animationDelay: `${i * 0.2}s` }}>
                    <div className="text-xs font-bold text-indigo-700">{c.label}</div>
                    <div className="mt-2 space-y-1">
                      {c.content.map((item, j) => (
                        <div key={j} className={`text-[10px] px-1 rounded ${
                          item.includes('→') ? 'bg-slate-200 text-slate-400' : 'bg-indigo-100 text-indigo-700'}`}>
                          {item.includes('→') ? `${item.replace('→','')} (포인터)` : item}
                        </div>
                      ))}
                    </div>
                  </div>
                  {i < step.commits.length - 1 && (
                    <div className="text-indigo-400">→</div>
                  )}
                </React.Fragment>
              ))}
            </div>
            <div className="text-xs text-indigo-600 bg-indigo-50 rounded-lg p-2 max-w-xs text-center">
              어떤 커밋이든 바로 접근 가능 (순서 의존 없음)
            </div>
          </div>
        );
      }

      if (step.mode === 'branch') {
        return (
          <div className="flex flex-col items-center justify-center h-full p-4 space-y-6">
            <div className="text-xs font-bold text-slate-500">브랜치 생성 비용 비교</div>
            <div className="flex gap-6 items-stretch">
              <div className="bg-indigo-50 border-2 border-indigo-400 rounded-xl p-5 text-center w-44">

                <div className="font-bold text-indigo-700">Git</div>
                <div className="text-xs text-indigo-600 mt-2">{step.gitBranch.desc}</div>
                <div className="mt-3 bg-indigo-100 rounded-lg p-2">
                  <div className="text-[10px] text-indigo-500">비용</div>
                  <div className="font-bold text-indigo-700">{step.gitBranch.cost}</div>
                  <div className="text-[10px] text-indigo-500 mt-1">{step.gitBranch.size}</div>
                </div>
              </div>
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-5 text-center w-44">
                <div className="text-2xl mb-2">🐢</div>
                <div className="font-bold text-amber-700">SVN</div>
                <div className="text-xs text-amber-600 mt-2">{step.svnBranch.desc}</div>
                <div className="mt-3 bg-amber-100 rounded-lg p-2">
                  <div className="text-[10px] text-amber-500">비용</div>
                  <div className="font-bold text-amber-700">{step.svnBranch.cost}</div>
                  <div className="text-[10px] text-amber-500 mt-1">{step.svnBranch.size}</div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // summary
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-4">
          <div className="text-xs font-bold text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full">Git이 표준이 된 이유</div>
          <div className="grid grid-cols-2 gap-3 max-w-sm">
            {step.advantages.map((a, i) => (
              <div key={i} className="fade-in-up bg-indigo-50 border border-indigo-200 rounded-lg p-3 text-center"
                   style={{ animationDelay: `${i * 0.15}s` }}>
                <div className="text-xs font-bold text-indigo-700">{a}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // --- II-2-1: 플랫폼 비교 ---
    function Viz_2_1({ step }) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-4">
          <div className="flex gap-4 justify-center flex-wrap">
            {step.platforms.map((p, i) => (
              <div key={i} className={`fade-in-up border-2 rounded-xl p-4 w-48 transition-all duration-500
                ${p.active ? 'ring-2 ring-indigo-300 scale-105 shadow-lg border-indigo-500' :
                  p.faded ? 'opacity-40 border-slate-200' : 'border-slate-200'}
                ${p.active ? 'bg-white' : p.faded ? 'bg-slate-50' : 'bg-white'}`}
                   style={{ animationDelay: `${i * 0.1}s` }}>
                <div className={`w-12 h-12 ${p.color} rounded-xl flex items-center justify-center text-xl mx-auto mb-2`}>
                  {p.icon}
                </div>
                <div className="font-bold text-sm text-center text-slate-700">{p.name}</div>
                {p.strength && (
                  <div className="text-[10px] text-center text-indigo-600 mt-1 font-medium">{p.strength}</div>
                )}
                {p.features && (
                  <div className="mt-3 space-y-1">
                    {p.features.map((f, j) => (
                      <div key={j} className="slide-right text-[10px] bg-indigo-50 text-indigo-700 rounded px-2 py-0.5"
                           style={{ animationDelay: `${j * 0.08}s` }}>
                        {f}
                      </div>
                    ))}
                  </div>
                )}
                {p.recommended && (
                  <div className="mt-2 text-center">
                    <span className="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-bold">
                      ✓ 추천
                    </span>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // 섹션 목록
    // ═══════════════════════════════════════════════
    const SECTIONS = [
      { id: "1-1", label: "II-1-1", title: "주요 VCS 한눈에 보기", steps: STEPS_1_1, Renderer: Viz_1_1 },
      { id: "1-2", label: "II-1-2", title: "왜 Git이 표준이 됐는가", steps: STEPS_1_2, Renderer: Viz_1_2 },
      { id: "2-1", label: "II-2-1", title: "GitHub vs GitLab vs Bitbucket", steps: STEPS_2_1, Renderer: Viz_2_1 },
    ];

    // ═══════════════════════════════════════════════
    // 메인 앱 (Part I과 동일 구조, 테마 컬러만 indigo)
    // ═══════════════════════════════════════════════
    function App() {
      const [sectionIdx, setSectionIdx] = useState(0);
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);

      const section = SECTIONS[sectionIdx];
      const step = section.steps[stepIdx];
      const isEnd = stepIdx === section.steps.length - 1;
      const Renderer = section.Renderer;

      const handleTabChange = (idx) => {
        setSectionIdx(idx);
        setStepIdx(0);
        setIsPlaying(false);
      };

      const handleNext = () => {
        setStepIdx(prev => {
          if (prev < section.steps.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (stepIdx > 0) {
          setStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const togglePlay = () => {
        if (isEnd) setStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playRef.current = setInterval(() => handleNextRef.current(), 2800);
        } else {
          clearInterval(playRef.current);
        }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-4">

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between flex-wrap gap-2">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                  <div>
                    <h1 className="text-xl font-bold text-slate-800">Part II. VCS 지도 — Git/SVN/Mercurial 비교</h1>
                    <p className="text-xs text-slate-500">Git을 선택하는 이유를 다른 도구들과 비교해 이해한다.</p>
                  </div>
                </div>
                <a href="../index.html" className="text-xs text-indigo-600 hover:underline font-medium">← 전체 목차</a>
              </div>
            </header>

            {/* 탭 바 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-1 flex gap-1 overflow-x-auto">
              {SECTIONS.map((s, i) => (
                <button
                  key={s.id}
                  onClick={() => handleTabChange(i)}
                  aria-label={`${s.label} — ${s.title} 섹션으로 이동`}
                  className={`flex-1 min-w-[120px] px-3 py-2 rounded-lg text-xs font-medium transition-all
                    ${i === sectionIdx ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-500 hover:bg-slate-100'}`}
                >
                  <div className="font-bold">{s.label}</div>
                  <div className={`mt-0.5 ${i === sectionIdx ? 'text-indigo-200' : 'text-slate-400'}`}>{s.title}</div>
                </button>
              ))}
            </div>

            {/* 현재 단계 설명 배너 */}
            <div className="bg-indigo-700 text-white p-4 rounded-xl shadow-sm border border-indigo-800 min-h-[80px] flex flex-col justify-center">
              <h3 className="text-[10px] font-bold text-indigo-200 uppercase tracking-wider mb-1">
                {section.label} — {step.label}
              </h3>
              <p className="text-sm md:text-base font-medium leading-relaxed">{step.desc}</p>
            </div>

            {/* 시각화 영역 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 min-h-[360px] md:min-h-[420px] flex items-center justify-center">
              <Renderer step={step} />
            </div>

            {/* 컨트롤 바 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={stepIdx === 0}
                  className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/>
                  </svg>
                </button>
                <button aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'} onClick={togglePlay}
                  className="flex items-center px-4 py-2 rounded bg-indigo-600 hover:bg-indigo-700 text-white font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying ? (
                    <>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2">
                        <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
                      </svg>
                      정지
                    </>
                  ) : (
                    <>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                      </svg>
                      자동 실행
                    </>
                  )}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd}
                  className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/>
                  </svg>
                </button>
              </div>
              <div className="flex items-center gap-3">
                <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                  Step {stepIdx + 1} / {section.steps.length}
                </div>
                <div className="flex gap-1">
                  {section.steps.map((_, i) => (
                    <button key={i} onClick={() => { setStepIdx(i); setIsPlaying(false); }}
                      aria-label={`Step ${i + 1}로 이동`}
                      className={`w-2.5 h-2.5 rounded-full transition-all ${
                        i === stepIdx ? 'bg-indigo-500 scale-125' :
                        i < stepIdx ? 'bg-emerald-400' : 'bg-slate-200'}`} />
                  ))}
                </div>
              </div>
            </div>

            <footer className="text-center text-xs text-slate-400 py-2">
              Git & GitHub 사다리형 학습 커리큘럼 — Part II 시각화
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
<script src="sidebar.js"></script>
</body>
</html>
