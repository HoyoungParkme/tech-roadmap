<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Part II. Branch — checkout / branch / switch — 인터랙티브 시각화</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🌿</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <style>
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseRing { 0% { box-shadow: 0 0 0 0 rgba(100,116,139,0.55); } 70% { box-shadow: 0 0 0 12px rgba(100,116,139,0); } 100% { box-shadow: 0 0 0 0 rgba(100,116,139,0); } }
    @keyframes drawLine { from { stroke-dashoffset: 200; } to { stroke-dashoffset: 0; } }
    .fade-in-up { animation: fadeInUp 0.5s ease-out both; }
    .pulse-ring { animation: pulseRing 1.6s ease-out infinite; }
    .draw-line { stroke-dasharray: 200; animation: drawLine 0.8s ease-out forwards; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!--
    ─────────────────────────────────────────────────────────────
    Part II — Branch: checkout / branch / switch (5 STEP 시뮬레이션)
    ─────────────────────────────────────────────────────────────
    Step 1: 브랜치 생성   — git branch feature
    Step 2: 브랜치 전환   — git switch / checkout
    Step 3: 작업 + commit — feature 브랜치에서 커밋
    Step 4: 그래프 보기   — git log --graph
    Step 5: 브랜치 삭제   — git branch -d
    ─────────────────────────────────────────────────────────────
    레이아웃: lg:grid-cols-2
      좌 — LiveDataPane: 커밋 노드 + 브랜치 라벨 + HEAD 표시
      우 — CodeViewer: 5개 .sh 파일 (highlight.js bash)
    색상: slate (base) + emerald(main) / sky(feature) accent
  -->

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ═══════════════════════════════════════════════
    // STEPS — 5단계 시뮬레이션
    //   commits: 표시할 커밋 노드 목록
    //   branches: 각 브랜치가 가리키는 커밋 id
    //   head: 현재 HEAD가 붙은 브랜치 이름
    //   active: 강조할 브랜치 라벨
    // ═══════════════════════════════════════════════
    const STEPS = [
      {
        title: 'Step 1 — 브랜치 생성',
        desc: 'git branch feature 명령으로 새 브랜치를 만든다. 현재 HEAD가 가리키는 커밋(C2) 위에 feature 라벨이 붙는다. 단, HEAD는 여전히 main에 있어 이 시점에 작업하면 main에 커밋된다.',
        dataState: {
          commits: [
            { id: 'C1', x: 80, y: 140, msg: 'init' },
            { id: 'C2', x: 200, y: 140, msg: 'add README' },
          ],
          edges: [['C1', 'C2']],
          branches: [
            { name: 'main', commitId: 'C2', color: 'emerald', offsetY: -34, head: true },
            { name: 'feature', commitId: 'C2', color: 'sky', offsetY: 34, head: false, justCreated: true },
          ],
        },
        code: {
          filename: 'branch-create.sh',
          lang: 'bash',
          highlight: [11],
          lines: [
            '#!/usr/bin/env bash',
            '# ─────────────────────────────────────────────',
            '# branch-create.sh — 새 브랜치 생성',
            '#   git branch <name> 은 "라벨만 만든다"',
            '#   HEAD는 옮기지 않으므로 작업은 여전히 main에서 진행됨',
            '# ─────────────────────────────────────────────',
            '',
            '# 1) 현재 어느 브랜치에 있는지 확인',
            'git branch',
            '#   * main          ← 별표(*)가 HEAD',
            '',
            '# 2) main의 현재 커밋 위에 feature 라벨을 새로 단다',
            'git branch feature',
            '',
            '# 3) 다시 보면 라벨 두 개. HEAD는 그대로 main',
            'git branch',
            '#   * main',
            '#     feature',
            '',
            '# 4) 특정 커밋에서 가지를 따고 싶으면 SHA 지정',
            '# git branch hotfix 8b2e0f1',
            '',
            '# 5) 원격 브랜치 추적용 로컬 브랜치 만들기',
            '# git branch --track release origin/release',
          ],
        },
      },
      {
        title: 'Step 2 — 브랜치 전환',
        desc: 'git switch feature(또는 git checkout feature)로 HEAD를 feature 브랜치로 옮긴다. switch는 Git 2.23부터 도입된 명령어로 브랜치 전환만 담당해 checkout보다 의도가 명확하다.',
        dataState: {
          commits: [
            { id: 'C1', x: 80, y: 140, msg: 'init' },
            { id: 'C2', x: 200, y: 140, msg: 'add README' },
          ],
          edges: [['C1', 'C2']],
          branches: [
            { name: 'main', commitId: 'C2', color: 'emerald', offsetY: -34, head: false },
            { name: 'feature', commitId: 'C2', color: 'sky', offsetY: 34, head: true, justSwitched: true },
          ],
        },
        code: {
          filename: 'switch.sh',
          lang: 'bash',
          highlight: [9, 18],
          lines: [
            '#!/usr/bin/env bash',
            '# ─────────────────────────────────────────────',
            '# switch.sh — 브랜치 전환 (HEAD 이동)',
            '#   switch: Git 2.23+ 도입. "전환만" 담당해 의도가 명확',
            '#   checkout: 전환 + 파일 복원이 섞여 헷갈림 (레거시)',
            '# ─────────────────────────────────────────────',
            '',
            '# 1) feature 브랜치로 HEAD 이동',
            'git switch feature',
            '#   Switched to branch \'feature\'',
            '',
            '# 2) 같은 효과 (구식 명령)',
            '# git checkout feature',
            '',
            '# 3) 직전 브랜치로 빠르게 돌아가기 (- 한 글자!)',
            '# git switch -',
            '',
            '# 4) 새 브랜치를 만들면서 바로 전환',
            'git switch -c hotfix   # = git checkout -b hotfix',
            '',
            '# 5) 현재 HEAD 확인',
            'git branch',
            '#     main',
            '#   * feature      ← HEAD가 feature로 이동',
          ],
        },
      },
      {
        title: 'Step 3 — 작업 + commit',
        desc: 'feature 브랜치에서 파일을 수정하고 커밋한다. 새 커밋 C3는 feature 라벨만 끌고 가고, main은 C2에 그대로 머문다. 두 브랜치가 갈라지는 분기가 만들어졌다.',
        dataState: {
          commits: [
            { id: 'C1', x: 80, y: 140, msg: 'init' },
            { id: 'C2', x: 200, y: 140, msg: 'add README' },
            { id: 'C3', x: 320, y: 200, msg: 'feat: login', highlight: true },
          ],
          edges: [['C1', 'C2'], ['C2', 'C3']],
          branches: [
            { name: 'main', commitId: 'C2', color: 'emerald', offsetY: -34, head: false },
            { name: 'feature', commitId: 'C3', color: 'sky', offsetY: 34, head: true, justMoved: true },
          ],
        },
        code: {
          filename: 'commit-on-branch.sh',
          lang: 'bash',
          highlight: [11, 12],
          lines: [
            '#!/usr/bin/env bash',
            '# ─────────────────────────────────────────────',
            '# commit-on-branch.sh — feature 브랜치에서 커밋',
            '#   현재 브랜치 라벨이 새 커밋을 따라간다',
            '#   main은 그대로 머물러 → 분기(divergence) 발생',
            '# ─────────────────────────────────────────────',
            '',
            '# 1) 파일 수정',
            'echo "function login() { /* ... */ }" >> src/auth.js',
            '',
            '# 2) 스테이징 + 커밋',
            'git add src/auth.js',
            'git commit -m "feat: login"',
            '#   [feature 7a3f1c2] feat: login',
            '#    1 file changed, 1 insertion(+)',
            '',
            '# 3) 현재 브랜치 위치 확인',
            'git log --oneline -n 3',
            '#   7a3f1c2 (HEAD -> feature) feat: login',
            '#   8b2e0f1 (main) add README',
            '#   3c1a4d9 init',
            '',
            '# 4) main은 영향을 받지 않았는지 확인',
            'git log --oneline main',
            '#   8b2e0f1 add README',
            '#   3c1a4d9 init',
          ],
        },
      },
      {
        title: 'Step 4 — git log --graph',
        desc: 'git log --oneline --graph --all 로 브랜치 분기 구조를 ASCII 그래프로 본다. main은 C2에 머물러 있고 feature가 C3까지 한 발 앞서 있는 모습이 한눈에 보인다.',
        dataState: {
          commits: [
            { id: 'C1', x: 80, y: 140, msg: 'init' },
            { id: 'C2', x: 200, y: 140, msg: 'add README', highlight: true },
            { id: 'C3', x: 320, y: 200, msg: 'feat: login', highlight: true },
          ],
          edges: [['C1', 'C2'], ['C2', 'C3']],
          branches: [
            { name: 'main', commitId: 'C2', color: 'emerald', offsetY: -34, head: false },
            { name: 'feature', commitId: 'C3', color: 'sky', offsetY: 34, head: true },
          ],
          showGraph: true,
        },
        code: {
          filename: 'log-graph.sh',
          lang: 'bash',
          highlight: [9],
          lines: [
            '#!/usr/bin/env bash',
            '# ─────────────────────────────────────────────',
            '# log-graph.sh — 브랜치 분기 ASCII 시각화',
            '#   --graph : 가지 그림 그리기',
            '#   --all   : 모든 브랜치 포함',
            '#   --decorate : 브랜치/태그 라벨 표시',
            '# ─────────────────────────────────────────────',
            '',
            'git log --oneline --graph --all --decorate',
            '#   * 7a3f1c2 (HEAD -> feature) feat: login',
            '#   * 8b2e0f1 (main) add README',
            '#   * 3c1a4d9 init',
            '',
            '# 자주 쓰는 별칭으로 등록하면 편하다',
            'git config --global alias.lg \\',
            '  "log --oneline --graph --all --decorate"',
            '',
            '# 이제는 한 단어로',
            'git lg',
            '',
            '# 보너스: 작성자 + 시간 함께 보기',
            '# git log --graph --pretty=format:\'%h %an %ar %s\' --all',
          ],
        },
      },
      {
        title: 'Step 5 — 브랜치 삭제',
        desc: 'feature 브랜치 작업이 main에 병합되어 더 이상 필요 없으면 git branch -d feature 로 삭제한다. 커밋 자체가 사라지는 게 아니라 라벨만 떨어진다. 병합 안 된 브랜치는 -D(대문자)로 강제 삭제한다.',
        dataState: {
          commits: [
            { id: 'C1', x: 80, y: 140, msg: 'init' },
            { id: 'C2', x: 200, y: 140, msg: 'add README' },
            { id: 'C3', x: 320, y: 140, msg: 'feat: login (merged)' },
          ],
          edges: [['C1', 'C2'], ['C2', 'C3']],
          branches: [
            { name: 'main', commitId: 'C3', color: 'emerald', offsetY: -34, head: true },
          ],
          deletedBranch: { name: 'feature', x: 320, y: 200 },
        },
        code: {
          filename: 'delete.sh',
          lang: 'bash',
          highlight: [11, 18],
          lines: [
            '#!/usr/bin/env bash',
            '# ─────────────────────────────────────────────',
            '# delete.sh — 다 쓴 브랜치 정리',
            '#   -d : safe delete (병합된 브랜치만)',
            '#   -D : force delete (병합 안 됐어도 강제)',
            '#   주의: 커밋 자체가 사라지는 건 아니고 라벨만 떨어짐',
            '# ─────────────────────────────────────────────',
            '',
            '# 1) 삭제할 브랜치에 머무르면 지울 수 없으니 main으로 이동',
            'git switch main',
            '',
            '# 2) 병합된 브랜치 안전하게 삭제',
            'git branch -d feature',
            '#   Deleted branch feature (was 7a3f1c2).',
            '',
            '# 3) 병합 안 된 브랜치를 강제 삭제',
            '#    (정말 버려도 되는지 한 번 더 생각하자)',
            '# git branch -D feature',
            '',
            '# 4) 원격 저장소의 브랜치까지 지우려면',
            'git push origin --delete feature',
            '',
            '# 5) 삭제 후 정리 — 사라진 원격 브랜치 참조 청소',
            'git fetch --prune',
          ],
        },
      },
    ];

    // ═══════════════════════════════════════════════
    // LiveDataPane — 좌측 브랜치 트리 그래프
    //   SVG로 커밋 노드 + edge + 브랜치 라벨을 그린다.
    //   props.state = STEPS[i].dataState
    // ═══════════════════════════════════════════════
    function LiveDataPane({ state }) {
      const { commits, edges, branches, deletedBranch, showGraph } = state;
      const commitMap = Object.fromEntries(commits.map((c) => [c.id, c]));

      const colorClass = (c) => {
        if (c === 'emerald') return { bg: 'bg-emerald-500', text: 'text-emerald-700', border: 'border-emerald-500', soft: 'bg-emerald-50' };
        if (c === 'sky') return { bg: 'bg-sky-500', text: 'text-sky-700', border: 'border-sky-500', soft: 'bg-sky-50' };
        return { bg: 'bg-slate-500', text: 'text-slate-700', border: 'border-slate-500', soft: 'bg-slate-50' };
      };

      return (
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-xs font-bold text-slate-600 uppercase tracking-wider">Branch Tree</h3>
            <span className="text-[10px] text-slate-400 font-mono">.git/refs/heads</span>
          </div>

          <div className="flex-1 relative">
            <svg viewBox="0 0 420 280" className="w-full h-full">
              {/* edge — 커밋 사이 연결선 */}
              {edges.map(([from, to], i) => {
                const a = commitMap[from];
                const b = commitMap[to];
                if (!a || !b) return null;
                return (
                  <line
                    key={`edge-${i}`}
                    x1={a.x} y1={a.y} x2={b.x} y2={b.y}
                    stroke="#94a3b8" strokeWidth="2"
                    className="draw-line"
                  />
                );
              })}

              {/* 커밋 노드 */}
              {commits.map((c, i) => (
                <g key={c.id} className="fade-in-up" style={{ animationDelay: `${i * 0.1}s` }}>
                  <circle
                    cx={c.x} cy={c.y} r={c.highlight ? 14 : 12}
                    fill={c.highlight ? '#0ea5e9' : '#475569'}
                    stroke="#fff" strokeWidth="3"
                  />
                  <text x={c.x} y={c.y + 4} textAnchor="middle" fill="#fff" fontSize="10" fontWeight="bold">
                    {c.id}
                  </text>
                  <text x={c.x} y={c.y + 32} textAnchor="middle" fill="#475569" fontSize="9">
                    {c.msg}
                  </text>
                </g>
              ))}

              {/* 브랜치 라벨 */}
              {branches.map((b, i) => {
                const c = commitMap[b.commitId];
                if (!c) return null;
                const cls = colorClass(b.color);
                const labelY = c.y + b.offsetY;
                const fillColor = b.color === 'emerald' ? '#10b981' : b.color === 'sky' ? '#0ea5e9' : '#64748b';
                const animClass = b.justCreated || b.justSwitched || b.justMoved ? 'fade-in-up' : '';

                return (
                  <g key={b.name} className={animClass} style={{ animationDelay: `${0.4 + i * 0.15}s` }}>
                    {/* 라벨 → 커밋 연결선 */}
                    <line
                      x1={c.x} y1={c.y} x2={c.x} y2={labelY}
                      stroke={fillColor} strokeWidth="2" strokeDasharray="3,3" opacity="0.5"
                    />
                    {/* 라벨 박스 */}
                    <rect
                      x={c.x - 32} y={labelY - 10} width="64" height="20" rx="10"
                      fill={fillColor}
                      className={b.head ? 'pulse-ring' : ''}
                    />
                    <text x={c.x} y={labelY + 4} textAnchor="middle" fill="#fff" fontSize="10" fontWeight="bold">
                      {b.name}
                    </text>
                    {/* HEAD 마커 */}
                    {b.head && (
                      <text x={c.x + 40} y={labelY + 4} fill={fillColor} fontSize="10" fontWeight="bold">
                        ← HEAD
                      </text>
                    )}
                  </g>
                );
              })}

              {/* 삭제된 브랜치 — X 표시 */}
              {deletedBranch && (
                <g className="fade-in-up">
                  <rect
                    x={deletedBranch.x - 32} y={deletedBranch.y - 10} width="64" height="20" rx="10"
                    fill="#cbd5e1" opacity="0.4"
                  />
                  <text x={deletedBranch.x} y={deletedBranch.y + 4} textAnchor="middle" fill="#64748b" fontSize="10" textDecoration="line-through">
                    {deletedBranch.name}
                  </text>
                  <line x1={deletedBranch.x - 36} y1={deletedBranch.y - 14} x2={deletedBranch.x + 36} y2={deletedBranch.y + 14} stroke="#dc2626" strokeWidth="2" />
                  <line x1={deletedBranch.x + 36} y1={deletedBranch.y - 14} x2={deletedBranch.x - 36} y2={deletedBranch.y + 14} stroke="#dc2626" strokeWidth="2" />
                </g>
              )}
            </svg>
          </div>

          {/* 하단 — git log --graph 출력 미리보기 */}
          {showGraph && (
            <div className="mt-3 bg-slate-900 rounded-lg p-3 font-mono text-[11px] text-slate-200 fade-in-up">
              <div><span className="text-sky-400">*</span> 7a3f1c2 <span className="text-amber-400">(HEAD -&gt; feature)</span> feat: login</div>
              <div><span className="text-emerald-400">*</span> 8b2e0f1 <span className="text-amber-400">(main)</span> add README</div>
              <div><span className="text-slate-400">*</span> 3c1a4d9 init</div>
            </div>
          )}

          {/* 범례 */}
          <div className="mt-3 flex items-center gap-4 text-[10px] text-slate-500 flex-wrap">
            <span className="flex items-center gap-1.5">
              <span className="w-2.5 h-2.5 rounded-full bg-emerald-500"></span> main
            </span>
            <span className="flex items-center gap-1.5">
              <span className="w-2.5 h-2.5 rounded-full bg-sky-500"></span> feature
            </span>
            <span className="flex items-center gap-1.5">
              <span className="w-2.5 h-2.5 rounded-full bg-slate-500"></span> commit
            </span>
            <span className="flex items-center gap-1.5">
              <span className="w-2.5 h-2.5 rounded-full bg-amber-400"></span> HEAD
            </span>
            <span className="flex items-center gap-1.5">
              <span className="text-red-500 font-bold">×</span> 삭제됨
            </span>
          </div>

          {/* 브랜치 명령 치트시트 */}
          <div className="mt-3 pt-3 border-t border-slate-100">
            <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">
              핵심 명령 치트시트
            </div>
            <div className="grid grid-cols-2 gap-1 text-[10px] text-slate-600 font-mono">
              <span className="bg-slate-50 px-2 py-0.5 rounded">git branch &lt;n&gt;</span>
              <span className="text-slate-400">라벨 생성</span>
              <span className="bg-slate-50 px-2 py-0.5 rounded">git switch &lt;n&gt;</span>
              <span className="text-slate-400">HEAD 이동</span>
              <span className="bg-slate-50 px-2 py-0.5 rounded">git switch -c &lt;n&gt;</span>
              <span className="text-slate-400">생성+이동</span>
              <span className="bg-slate-50 px-2 py-0.5 rounded">git branch -d &lt;n&gt;</span>
              <span className="text-slate-400">안전 삭제</span>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // CodeViewer — VSCode 스타일 코드 패널
    //   highlight.js + 라인 번호 + 강조 라인
    // ═══════════════════════════════════════════════
    function CodeViewer({ code }) {
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          // re-highlight: 기존 데이터 속성 제거 후 다시 적용
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const fullCode = code.lines.join('\n');

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg flex flex-col">
          {/* 상단 — dot + 파일명 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700 flex-shrink-0">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-300 ml-2 font-mono">{code.filename}</span>
            <span className="text-[10px] text-slate-500 ml-auto uppercase">{code.lang}</span>
          </div>

          {/* 코드 영역 */}
          <div className="overflow-auto text-xs flex-1" style={{ maxHeight: '28rem' }}>
            <table className="w-full border-collapse">
              <tbody>
                {code.lines.map((line, i) => {
                  const isHighlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <tr key={i} className={isHighlighted ? 'bg-yellow-500/10' : ''}>
                      <td className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 align-top w-10 font-mono">
                        {i + 1}
                      </td>
                      <td className="pl-3 pr-3 font-mono whitespace-pre">
                        <span className={`hljs language-${code.lang}`} dangerouslySetInnerHTML={{
                          __html: window.hljs ? window.hljs.highlight(line || ' ', { language: code.lang, ignoreIllegals: true }).value : (line || ' ')
                        }} />
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // App — 메인 컨테이너
    //   STEPS 인덱스 + 자동재생(3000ms) + 키보드 ←/→
    // ═══════════════════════════════════════════════
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const step = STEPS[stepIdx];
      const isEnd = stepIdx === STEPS.length - 1;

      const handleNext = () => {
        setStepIdx((prev) => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (stepIdx > 0) {
          setStepIdx((prev) => prev - 1);
          setIsPlaying(false);
        }
      };

      const handleFirst = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      const togglePlay = () => {
        if (isEnd) setStepIdx(0);
        setIsPlaying((prev) => !prev);
      };

      // 자동재생 — 3000ms 인터벌
      useEffect(() => {
        if (isPlaying) {
          playRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playRef.current);
        }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      // 키보드 — ← / → 화살표
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight' && stepIdx < STEPS.length - 1) {
            setStepIdx(stepIdx + 1);
            setIsPlaying(false);
          }
          if (e.key === 'ArrowLeft' && stepIdx > 0) {
            setStepIdx(stepIdx - 1);
            setIsPlaying(false);
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [stepIdx]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-4">

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between flex-wrap gap-2">
                <div className="flex items-center gap-3">
                  <div className="w-9 h-9 bg-slate-700 text-white flex items-center justify-center rounded-full font-bold text-sm">
                    II
                  </div>
                  <div>
                    <h1 className="text-xl font-bold text-slate-800">
                      Part II. Branch — checkout / branch / switch
                    </h1>
                    <p className="text-xs text-slate-500">
                      Git 브랜치를 만들고, 전환하고, 작업하고, 그래프로 보고, 삭제하는 5단계 흐름.
                    </p>
                  </div>
                </div>
                <a href="../index.html" className="text-xs text-slate-600 hover:text-slate-800 hover:underline font-medium">
                  ← 전체 목차
                </a>
              </div>
            </header>

            {/* 현재 단계 설명 배너 */}
            <div className="bg-slate-700 text-white p-4 rounded-xl shadow-sm border border-slate-800 min-h-[88px] flex flex-col justify-center">
              <h3 className="text-[10px] font-bold text-slate-300 uppercase tracking-wider mb-1">
                {step.title}
              </h3>
              <p className="text-sm md:text-base font-medium leading-relaxed">{step.desc}</p>
            </div>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <div className="min-h-[420px]">
                <LiveDataPane state={step.dataState} />
              </div>
              <div>
                <CodeViewer code={step.code} />
              </div>
            </div>

            {/* 컨트롤 바 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button
                  aria-label="처음으로"
                  onClick={handleFirst}
                  disabled={stepIdx === 0}
                  className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"
                >
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <polygon points="19 20 9 12 19 4 19 20" />
                    <line x1="5" y1="19" x2="5" y2="5" />
                  </svg>
                </button>
                <button
                  aria-label="이전 단계"
                  onClick={handlePrev}
                  disabled={stepIdx === 0}
                  className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"
                >
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <polyline points="15 18 9 12 15 6" />
                  </svg>
                </button>
                <button
                  aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                  onClick={togglePlay}
                  className="flex items-center px-4 py-2 rounded bg-slate-700 hover:bg-slate-800 text-white font-medium transition shadow-sm w-32 justify-center"
                >
                  {isPlaying ? (
                    <>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2">
                        <rect x="6" y="4" width="4" height="16" />
                        <rect x="14" y="4" width="4" height="16" />
                      </svg>
                      정지
                    </>
                  ) : (
                    <>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2">
                        <polygon points="5 3 19 12 5 21 5 3" />
                      </svg>
                      자동 실행
                    </>
                  )}
                </button>
                <button
                  aria-label="다음 단계"
                  onClick={handleNext}
                  disabled={isEnd}
                  className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"
                >
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <polyline points="9 18 15 12 9 6" />
                  </svg>
                </button>
              </div>
              <div className="flex items-center gap-3">
                <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                  Step {stepIdx + 1} / {STEPS.length}
                </div>
                <div className="flex gap-1">
                  {STEPS.map((_, i) => (
                    <button
                      key={i}
                      onClick={() => { setStepIdx(i); setIsPlaying(false); }}
                      aria-label={`Step ${i + 1}로 이동`}
                      className={`w-2.5 h-2.5 rounded-full transition-all ${
                        i === stepIdx ? 'bg-slate-700 scale-125' :
                        i < stepIdx ? 'bg-emerald-400' : 'bg-slate-200'
                      }`}
                    />
                  ))}
                </div>
              </div>
            </div>

            {/* 키보드 안내 */}
            <div className="text-center text-[11px] text-slate-400">
              키보드 <kbd className="px-1.5 py-0.5 bg-slate-100 border border-slate-300 rounded text-slate-600 font-mono">←</kbd> /
              <kbd className="px-1.5 py-0.5 bg-slate-100 border border-slate-300 rounded text-slate-600 font-mono ml-1">→</kbd> 로 단계 이동
            </div>

            <footer className="text-center text-xs text-slate-400 py-2">
              Git &amp; GitHub 사다리형 학습 커리큘럼 — Part II. Branch
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  <\/script>
  <script src="sidebar.js"></script>
</body>
</html>
