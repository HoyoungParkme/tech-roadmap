<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Part IX. 보안·GitHub 서비스·고급 도구 — 인터랙티브 시각화</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeInUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .fade-in-up { animation: fadeInUp 0.5s ease-out both; }
  </style>
</head>
<body>
  <div id="root"></div>
  <!--
    Part IX — 보안·GitHub 서비스·고급 도구 (7 Section 시각화)
    IX-1-1. SSH 키 생성과 GitHub 등록
    IX-1-2. GPG 서명 — 커밋 인증
    IX-2-1. GitHub Pages
    IX-2-2. README.md
    IX-3-1. GitHub CLI (gh)
    IX-3-2. Git Hook
    IX-3-3. git worktree
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // IX-1-1: SSH 키 생성과 GitHub 등록
    const STEPS_1_1 = [
      { label:"HTTPS vs SSH", desc:"[STEP 1] HTTPS는 push/pull 할 때마다 인증이 필요하다. SSH는 키를 한 번 등록하면 이후 자동 인증된다.",
        phase:'compare' },
      { label:"키 생성", desc:"[STEP 2] ssh-keygen -t ed25519 -C '이메일'로 키 쌍(공개 키 + 비밀 키)을 생성한다. ed25519는 현재 가장 권장되는 알고리즘이다.",
        phase:'keygen', cmd:'ssh-keygen -t ed25519 -C "hong@example.com"' },
      { label:"GitHub에 등록", desc:"[STEP 3] ~/.ssh/id_ed25519.pub 내용을 GitHub → Settings → SSH and GPG keys에 붙여넣는다.",
        phase:'register' },
      { label:"연결 테스트", desc:"[STEP 4] ssh -T git@github.com으로 연결을 테스트한다. 'Hi username!' 메시지가 나오면 성공이다.",
        phase:'test', cmd:'ssh -T git@github.com' },
    ];

    // IX-1-2: GPG 서명
    const STEPS_1_2 = [
      { label:"커밋 사칭 문제", desc:"[STEP 1] git config user.email은 아무 값이나 넣을 수 있다. 다른 사람인 척 커밋할 수 있다는 뜻이다.",
        phase:'problem' },
      { label:"GPG 키 생성", desc:"[STEP 2] gpg --gen-key로 키를 만들고, git config --global user.signingkey로 등록한다.",
        phase:'keygen', cmd:'gpg --gen-key' },
      { label:"자동 서명 활성화", desc:"[STEP 3] git config --global commit.gpgsign true로 모든 커밋에 자동으로 서명한다.",
        phase:'enable', cmd:'git config --global commit.gpgsign true' },
      { label:"Verified 배지", desc:"[STEP 4] GitHub에 GPG 공개 키를 등록하면, 서명된 커밋 옆에 초록색 'Verified' 배지가 붙는다.",
        phase:'verified' },
    ];

    // IX-2-1: GitHub Pages
    const STEPS_2_1 = [
      { label:"Pages 활성화", desc:"[STEP 1] Settings → Pages에서 소스 브랜치(main 또는 gh-pages)와 폴더(/ 또는 /docs)를 선택한다.",
        phase:'setup' },
      { label:"자동 배포", desc:"[STEP 2] 선택한 브랜치에 push하면 자동으로 사이트가 빌드·배포된다. URL: https://[유저].github.io/[저장소]",
        phase:'deploy' },
      { label:"Jekyll 활용", desc:"[STEP 3] Jekyll(정적 사이트 생성기)이 내장되어 Markdown으로 블로그를 만들 수 있다. 테마도 선택 가능.",
        phase:'jekyll' },
      { label:"커스텀 도메인", desc:"[STEP 4] 자신의 도메인을 연결할 수 있다. CNAME 파일을 추가하고 DNS를 설정하면 무료 HTTPS까지 제공된다.",
        phase:'domain' },
    ];

    // IX-2-2: README.md
    const STEPS_2_2 = [
      { label:"README 구성 요소", desc:"[STEP 1] 프로젝트 이름, 한 줄 설명, 스크린샷, 설치 방법, 사용법, 기여 가이드, 라이선스가 좋은 README의 핵심이다.",
        phase:'structure' },
      { label:"Shields.io 배지", desc:"[STEP 2] CI 상태, 라이선스, 버전 정보를 시각적 배지로 보여준다. ![Build](https://img.shields.io/...) 형식.",
        phase:'badges' },
      { label:"CONTRIBUTING.md", desc:"[STEP 3] 기여 가이드를 별도 파일로 만들면 외부 개발자가 참여하기 쉬워진다. 코드 스타일, PR 규칙 등을 명시한다.",
        phase:'contributing' },
      { label:"좋은 README의 효과", desc:"[STEP 4] README가 잘 작성된 프로젝트는 Star와 기여자가 더 많이 모인다. 프로젝트의 첫인상이다.",
        phase:'impact' },
    ];

    // IX-3-1: GitHub CLI (gh)
    const STEPS_3_1 = [
      { label:"gh auth login", desc:"[STEP 1] gh auth login으로 GitHub 계정을 인증한다. 브라우저가 열리고 권한을 승인하면 터미널에서 바로 GitHub을 사용할 수 있다.",
        phase:'auth', cmd:'gh auth login' },
      { label:"gh issue / gh pr", desc:"[STEP 2] gh issue create, gh pr create로 브라우저 없이 Issue와 PR을 생성한다. gh pr checkout 42로 PR 브랜치를 바로 체크아웃한다.",
        phase:'commands' },
      { label:"gh repo", desc:"[STEP 3] gh repo create로 저장소를 만들고, gh repo clone으로 복제한다. 저장소 관리가 터미널에서 끝난다.",
        phase:'repo', cmd:'gh repo create my-app --public' },
      { label:"gh api", desc:"[STEP 4] gh api로 GitHub REST/GraphQL API를 직접 호출한다. 자동화 스크립트에서 특히 강력하다.",
        phase:'api', cmd:'gh api repos/{owner}/{repo}/pulls' },
    ];

    // IX-3-2: Git Hook
    const STEPS_3_2 = [
      { label:".git/hooks/ 구조", desc:"[STEP 1] Git Hook은 .git/hooks/ 폴더에 저장된 스크립트다. 커밋·푸시 등 이벤트 전후에 자동으로 실행된다.",
        phase:'structure' },
      { label:"pre-commit", desc:"[STEP 2] pre-commit 훅은 커밋 직전에 실행된다. lint, 포맷팅, 테스트를 자동으로 돌려 품질을 강제한다.",
        phase:'precommit' },
      { label:"commit-msg", desc:"[STEP 3] commit-msg 훅은 커밋 메시지를 검사한다. commitlint로 Conventional Commits 형식을 강제할 수 있다.",
        phase:'commitmsg' },
      { label:"Husky로 팀 공유", desc:"[STEP 4] Husky(npm 패키지)를 쓰면 .husky/ 폴더에 훅을 저장소에 포함시켜 팀 전체가 같은 훅을 공유한다.",
        phase:'husky' },
    ];

    // IX-3-3: git worktree
    const STEPS_3_3 = [
      { label:"문제 상황", desc:"[STEP 1] 서버가 실행 중인데 다른 브랜치를 봐야 한다. git switch를 하면 파일이 바뀌어서 서버가 멈춘다.",
        phase:'problem' },
      { label:"worktree add", desc:"[STEP 2] git worktree add ../hotfix hotfix/urgent — 같은 저장소의 다른 브랜치를 별도 폴더에 체크아웃한다.",
        phase:'add', cmd:'git worktree add ../hotfix hotfix/urgent' },
      { label:"동시 작업", desc:"[STEP 3] 원래 폴더에서 서버를 유지하면서, ../hotfix 폴더에서 긴급 수정을 한다. 두 디렉토리가 같은 .git을 공유한다.",
        phase:'parallel' },
      { label:"정리", desc:"[STEP 4] 작업이 끝나면 git worktree remove ../hotfix로 정리한다. git worktree list로 현재 worktree 목록을 확인한다.",
        phase:'cleanup', cmd:'git worktree remove ../hotfix' },
    ];

    // 렌더러들
    function TermViz({step}) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-6">
          <div className="bg-slate-900 rounded-xl p-5 max-w-sm w-full">
            <div className="text-xs text-slate-400 mb-2 font-mono">bash</div>
            <div className="text-emerald-400 font-mono text-sm font-bold">$ {step.cmd}</div>
          </div>
        </div>
      );
    }

    function Viz_1_1({step}) {
      if(step.phase==='compare') return (
        <div className="flex flex-col items-center justify-center h-full p-4 gap-3">
          <div className="flex gap-4">
            <div className="bg-red-50 border-2 border-red-300 rounded-xl p-3 text-center w-36">
              <div className="text-xs font-bold text-red-700">HTTPS</div>
              <div className="text-[10px] text-red-600 mt-1">매번 인증 필요</div>
            </div>
            <div className="bg-emerald-50 border-2 border-emerald-400 rounded-xl p-3 text-center w-36">
              <div className="text-xs font-bold text-emerald-700">SSH</div>
              <div className="text-[10px] text-emerald-600 mt-1">한 번 등록, 자동 인증</div>
            </div>
          </div>
        </div>
      );
      if(step.phase==='register') return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-3">
          <div className="border-2 border-cyan-300 bg-cyan-50 rounded-xl p-4 max-w-xs w-full">
            <div className="text-sm font-bold text-cyan-700 mb-2 text-center">GitHub Settings</div>
            <div className="space-y-1 text-xs">
              <div className="bg-white border border-slate-200 rounded px-2 py-1 font-mono text-slate-600">SSH and GPG keys</div>
              <div className="bg-white border border-slate-200 rounded px-2 py-1 font-mono text-slate-600">→ New SSH key</div>
              <div className="bg-white border border-slate-200 rounded px-2 py-1 font-mono text-slate-600">→ Paste ~/.ssh/id_ed25519.pub</div>
            </div>
          </div>
        </div>
      );
      return <TermViz step={step} />;
    }

    function Viz_1_2({step}) {
      if(step.phase==='problem') return (
        <div className="flex flex-col items-center justify-center h-full p-4">
          <div className="bg-red-50 border-2 border-red-300 rounded-xl p-4 text-center max-w-sm">
            <div className="text-xl mb-1">⚠️</div>
            <div className="font-bold text-red-700 text-sm">커밋 사칭 가능</div>
            <div className="text-xs text-red-600 mt-2 font-mono">git config user.email "anyone@fake.com"</div>
            <div className="text-[10px] text-red-500 mt-1">아무 이메일이나 넣을 수 있다</div>
          </div>
        </div>
      );
      if(step.phase==='verified') return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-3">
          <div className="bg-emerald-50 border-2 border-emerald-400 rounded-xl p-4 text-center max-w-sm">
            <div className="text-xl mb-1">✅</div>
            <div className="font-bold text-emerald-700 text-sm">Verified</div>
            <div className="text-xs text-emerald-600 mt-2">이 커밋은 정말 내가 작성했다</div>
            <div className="text-[10px] text-emerald-500 mt-1">암호학적으로 증명됨</div>
          </div>
        </div>
      );
      return <TermViz step={step} />;
    }

    function Viz_2_1({step}) {
      const panels = {
        setup:{icon:'⚙️',title:'Settings → Pages',items:['Source: main / /docs','Branch: main ▾','Folder: / (root) ▾','[Save]']},
        deploy:{icon:'🚀',title:'자동 배포',items:['push → 자동 빌드','https://hong.github.io/my-app','약 1~2분 소요','✅ 배포 완료']},
        jekyll:{icon:'💎',title:'Jekyll',items:['Markdown → HTML 변환','_config.yml로 설정','테마 선택 가능','블로그·문서 사이트']},
        domain:{icon:'🌐',title:'커스텀 도메인',items:['CNAME 파일 추가','DNS: A 레코드 설정','무료 HTTPS 제공','예: www.mysite.com']},
      };
      const p=panels[step.phase];
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-3">
          <div className="text-3xl">{p.icon}</div>
          <div className="border-2 border-cyan-300 bg-cyan-50 rounded-xl p-4 max-w-xs w-full">
            <div className="text-sm font-bold text-cyan-700 mb-2 text-center">{p.title}</div>
            <div className="space-y-1">
              {p.items.map((item,i)=>(<div key={i} className="text-xs px-2 py-1 bg-white border border-slate-200 rounded text-slate-700">{item}</div>))}
            </div>
          </div>
        </div>
      );
    }

    function Viz_2_2({step}) {
      const panels = {
        structure:{icon:'📋',items:['# Project Name','One-line description','📸 Screenshot','## Installation','## Usage','## Contributing','## License']},
        badges:{icon:'🏷️',items:['![Build](https://img.shields.io/...)','![License: MIT](...)','![Version](...)','![PRs Welcome](...)']},
        contributing:{icon:'🤝',items:['## How to Contribute','1. Fork this repo','2. Create feature branch','3. Follow code style','4. Submit PR']},
        impact:{icon:'⭐',items:['좋은 README = 더 많은 Star','첫인상이 프로젝트를 결정','기여자가 모이는 핵심','포트폴리오의 핵심 요소']},
      };
      const p=panels[step.phase];
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-3">
          <div className="text-3xl">{p.icon}</div>
          <div className="border-2 border-cyan-300 bg-cyan-50 rounded-xl p-4 max-w-xs w-full">
            <div className="space-y-1">
              {p.items.map((item,i)=>(<div key={i} className="fade-in-up text-xs px-2 py-1 bg-white border border-slate-200 rounded font-mono text-slate-700" style={{animationDelay:`${i*0.08}s`}}>{item}</div>))}
            </div>
          </div>
        </div>
      );
    }

    function Viz_3_1({step}) {
      if(step.phase==='commands') return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-2">
          {['gh issue create','gh pr create','gh pr checkout 42','gh pr list'].map((c,i)=>(
            <div key={i} className="fade-in-up bg-slate-900 rounded-lg px-4 py-2 max-w-xs w-full" style={{animationDelay:`${i*0.12}s`}}>
              <span className="text-emerald-400 font-mono text-sm font-bold">$ {c}</span>
            </div>
          ))}
        </div>
      );
      return <TermViz step={step} />;
    }

    function Viz_3_2({step}) {
      const panels = {
        structure:{icon:'📁',title:'.git/hooks/',items:['pre-commit','commit-msg','pre-push','post-merge','...']},
        precommit:{icon:'✅',title:'pre-commit',items:['커밋 직전 실행','eslint --fix','prettier --check','테스트 실행']},
        commitmsg:{icon:'📝',title:'commit-msg',items:['메시지 형식 검사','commitlint','feat: / fix: / docs:','규칙 위반 시 커밋 거부']},
        husky:{icon:'🐶',title:'Husky',items:['.husky/ 폴더 생성','npx husky init','팀 전체 훅 공유','npm install 시 자동 설정']},
      };
      const p=panels[step.phase];
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-3">
          <div className="text-3xl">{p.icon}</div>
          <div className="border-2 border-cyan-300 bg-cyan-50 rounded-xl p-4 max-w-xs w-full">
            <div className="text-sm font-bold text-cyan-700 mb-2 text-center">{p.title}</div>
            <div className="space-y-1">
              {p.items.map((item,i)=>(<div key={i} className="fade-in-up text-xs px-2 py-1 bg-white border border-slate-200 rounded text-slate-700" style={{animationDelay:`${i*0.08}s`}}>{item}</div>))}
            </div>
          </div>
        </div>
      );
    }

    function Viz_3_3({step}) {
      if(step.phase==='problem') return (
        <div className="flex flex-col items-center justify-center h-full p-4">
          <div className="bg-red-50 border-2 border-red-300 rounded-xl p-4 text-center max-w-sm">
            <div className="text-xl mb-1">🔄</div>
            <div className="font-bold text-red-700 text-sm">서버 실행 중 + 브랜치 전환 필요</div>
            <div className="text-xs text-red-600 mt-2">git switch → 파일 변경 → 서버 중단</div>
          </div>
        </div>
      );
      if(step.phase==='parallel') return (
        <div className="flex flex-col items-center justify-center h-full p-4 gap-3">
          <div className="flex gap-4">
            <div className="bg-cyan-50 border-2 border-cyan-400 rounded-xl p-3 text-center w-36">
              <div className="text-xs font-bold text-cyan-700">./my-project</div>
              <div className="text-[10px] text-cyan-600 mt-1">main 브랜치</div>
              <div className="text-[10px] text-cyan-500">서버 실행 중 🟢</div>
            </div>
            <div className="bg-amber-50 border-2 border-amber-400 rounded-xl p-3 text-center w-36">
              <div className="text-xs font-bold text-amber-700">../hotfix</div>
              <div className="text-[10px] text-amber-600 mt-1">hotfix/urgent</div>
              <div className="text-[10px] text-amber-500">긴급 수정 중 🔧</div>
            </div>
          </div>
          <div className="text-[10px] text-slate-500">같은 .git 데이터 공유</div>
        </div>
      );
      return <TermViz step={step} />;
    }

    const SECTIONS = [
      {id:"1-1",label:"IX-1-1",title:"SSH 키",steps:STEPS_1_1,Renderer:Viz_1_1},
      {id:"1-2",label:"IX-1-2",title:"GPG 서명",steps:STEPS_1_2,Renderer:Viz_1_2},
      {id:"2-1",label:"IX-2-1",title:"GitHub Pages",steps:STEPS_2_1,Renderer:Viz_2_1},
      {id:"2-2",label:"IX-2-2",title:"README.md",steps:STEPS_2_2,Renderer:Viz_2_2},
      {id:"3-1",label:"IX-3-1",title:"GitHub CLI",steps:STEPS_3_1,Renderer:Viz_3_1},
      {id:"3-2",label:"IX-3-2",title:"Git Hook",steps:STEPS_3_2,Renderer:Viz_3_2},
      {id:"3-3",label:"IX-3-3",title:"git worktree",steps:STEPS_3_3,Renderer:Viz_3_3},
    ];

    function App() {
      const [sectionIdx,setSectionIdx]=useState(0);const [stepIdx,setStepIdx]=useState(0);const [isPlaying,setIsPlaying]=useState(false);const playRef=useRef(null);
      const section=SECTIONS[sectionIdx];const step=section.steps[stepIdx];const isEnd=stepIdx===section.steps.length-1;const Renderer=section.Renderer;

      const handleTabChange=(idx)=>{setSectionIdx(idx);setStepIdx(0);setIsPlaying(false);};
      const handleNext=()=>{setStepIdx(prev=>{if(prev<section.steps.length-1)return prev+1;setIsPlaying(false);return prev;});};
      const handleNextRef=useRef(handleNext);handleNextRef.current=handleNext;
      const handlePrev=()=>{if(stepIdx>0){setStepIdx(prev=>prev-1);setIsPlaying(false);}};
      const togglePlay=()=>{if(isEnd)setStepIdx(0);setIsPlaying(prev=>!prev);};

      useEffect(()=>{
        if(isPlaying){playRef.current=setInterval(()=>handleNextRef.current(),2800);}
        else{clearInterval(playRef.current);}
        return()=>clearInterval(playRef.current);
      },[isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-4">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between flex-wrap gap-2">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 bg-cyan-600 text-white flex items-center justify-center rounded-full font-bold text-[10px]">IX</div>
                  <div>
                    <h1 className="text-xl font-bold text-slate-800">Part IX. 보안·GitHub 서비스·고급 도구</h1>
                    <p className="text-xs text-slate-500">SSH/GPG로 보안을 강화하고, GitHub Pages·README·CLI·Hook·worktree로 생산성을 높인다.</p>
                  </div>
                </div>
                <a href="../index.html" className="text-xs text-cyan-600 hover:underline font-medium">← 전체 목차</a>
              </div>
            </header>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-1 flex gap-1 overflow-x-auto">
              {SECTIONS.map((s,i)=>(
                <button key={s.id} onClick={()=>handleTabChange(i)} aria-label={`${s.label} — ${s.title} 섹션으로 이동`}
                  className={`flex-1 min-w-[80px] px-2 py-2 rounded-lg text-xs font-medium transition-all
                    ${i===sectionIdx?'bg-cyan-600 text-white shadow-sm':'text-slate-500 hover:bg-slate-100'}`}>
                  <div className="font-bold">{s.label}</div>
                  <div className="text-[10px] mt-0.5 opacity-80 truncate">{s.title}</div>
                </button>
              ))}
            </div>

            <div className="rounded-xl p-4 text-white text-sm bg-cyan-600">
              <div className="font-bold">{step.label}</div>
              <div className="text-xs mt-1 opacity-90">{step.desc}</div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 min-h-[320px] flex items-stretch">
              <div className="flex-1"><Renderer step={step} /></div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-3 flex items-center justify-between">
              <button onClick={handlePrev} disabled={stepIdx===0} aria-label="이전 단계"
                className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-colors ${stepIdx===0?'text-slate-300 cursor-not-allowed':'text-cyan-600 hover:bg-cyan-50'}`}>← 이전</button>
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} aria-label={isPlaying?'정지':'자동 재생'}
                  className="w-8 h-8 rounded-full bg-cyan-600 text-white flex items-center justify-center text-xs hover:bg-cyan-700 transition-colors">
                  {isPlaying?'⏸':'▶'}
                </button>
                <span className="text-xs text-slate-500 font-medium">Step {stepIdx+1}/{section.steps.length}</span>
              </div>
              <button onClick={handleNext} disabled={isEnd} aria-label="다음 단계"
                className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-colors ${isEnd?'text-slate-300 cursor-not-allowed':'text-cyan-600 hover:bg-cyan-50'}`}>다음 →</button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
<script src="sidebar.js"></script>
</body>
</html>
