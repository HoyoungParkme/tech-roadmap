<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Part VI. GitHub Actions — CI/CD 인터랙티브 시각화</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>⚙️</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <style>
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in-up { animation: fadeInUp .45s ease-out both; }
    @keyframes pulseRing { 0% { box-shadow: 0 0 0 0 rgba(20, 184, 166, .45); } 70% { box-shadow: 0 0 0 8px rgba(20, 184, 166, 0); } 100% { box-shadow: 0 0 0 0 rgba(20, 184, 166, 0); } }
    .pulse-ring { animation: pulseRing 1.4s ease-out infinite; }
    @keyframes runningBar { 0% { width: 0%; } 100% { width: 100%; } }
    .running-bar { animation: runningBar 2.4s linear forwards; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /**
     * Part VI. GitHub Actions — CI/CD 시각화
     *
     * 5단계 워크플로우:
     * 1) .github/workflows/ci.yml 파일 생성
     * 2) on: push 트리거 정의
     * 3) jobs / steps (test → build → deploy) 정의
     * 4) secrets / env 사용
     * 5) matrix build (Node 18/20, OS)
     *
     * 좌: workflow YAML 진행 상태 + job 실행 시각화
     * 우: VSCode 스타일 코드 뷰어 (5개 파일 탭)
     */

    // STEPS 데이터 — 단계별 좌측 시각화 + 우측 코드 변화
    const STEPS = [
      {
        title: 'Step 1 · ci.yml 파일 생성',
        desc: '.github/workflows/ci.yml 파일을 만든다. GitHub은 이 경로를 자동 인식해 워크플로우로 등록한다.',
        activeFile: 'ci.yml',
        tree: { active: 'ci' },
        jobs: [],
        trigger: null,
        envBadge: false,
        matrix: null,
      },
      {
        title: 'Step 2 · on: push 트리거 등록',
        desc: 'on: push로 main/develop 브랜치 push 시 자동 실행. pull_request도 함께 등록해 PR 검증을 트리거한다.',
        activeFile: 'trigger',
        tree: { active: 'trigger' },
        jobs: [],
        trigger: { events: ['push:main', 'push:develop', 'pull_request:main'] },
        envBadge: false,
        matrix: null,
      },
      {
        title: 'Step 3 · jobs / steps 정의 (test → build → deploy)',
        desc: 'test → build → deploy 3개 job을 needs로 연결한다. steps는 actions/checkout, setup-node, npm test 같은 액션을 순차 실행한다.',
        activeFile: 'jobs',
        tree: { active: 'jobs' },
        jobs: [
          { id: 'test', name: 'test', state: 'success', steps: ['checkout', 'setup-node', 'npm ci', 'npm test'] },
          { id: 'build', name: 'build', state: 'running', steps: ['checkout', 'npm run build', 'upload-artifact'] },
          { id: 'deploy', name: 'deploy', state: 'pending', steps: ['download-artifact', 'deploy:prod'] },
        ],
        trigger: { events: ['push:main'] },
        envBadge: false,
        matrix: null,
      },
      {
        title: 'Step 4 · secrets와 env로 비밀값 전달',
        desc: '${{ secrets.AWS_ACCESS_KEY }} 형태로 GitHub Secrets를 주입한다. env로 환경변수도 함께 전달. 코드/로그에 절대 노출되지 않는다.',
        activeFile: 'secrets',
        tree: { active: 'secrets' },
        jobs: [
          { id: 'test', name: 'test', state: 'success', steps: ['checkout', 'npm test'] },
          { id: 'build', name: 'build', state: 'success', steps: ['npm run build'] },
          { id: 'deploy', name: 'deploy', state: 'running', steps: ['inject secrets', 'aws s3 sync'] },
        ],
        trigger: { events: ['push:main'] },
        envBadge: true,
        matrix: null,
      },
      {
        title: 'Step 5 · matrix build (Node 18/20 × OS)',
        desc: 'strategy.matrix로 Node 버전 × OS 조합을 병렬 실행한다. 4개 조합이 동시 빌드되며, 하나라도 실패 시 전체 fail (fail-fast).',
        activeFile: 'matrix',
        tree: { active: 'matrix' },
        jobs: [],
        trigger: { events: ['push:main'] },
        envBadge: false,
        matrix: {
          combos: [
            { node: '18', os: 'ubuntu-latest', state: 'success' },
            { node: '18', os: 'macos-latest', state: 'success' },
            { node: '20', os: 'ubuntu-latest', state: 'running' },
            { node: '20', os: 'macos-latest', state: 'running' },
          ],
        },
      },
    ];

    // 5개 파일 코드 — 탭 전환용
    const FILES = {
      'ci.yml': {
        filename: '.github/workflows/ci.yml',
        lang: 'yaml',
        lines: [
          'name: CI Pipeline',
          '',
          '# 가장 단순한 시작 — 파일만 만들어도 GitHub이 인식한다',
          '# 경로 규칙: .github/workflows/*.yml',
          '',
          '# 다음 단계에서 on / jobs를 채운다',
        ],
        highlight: [1, 4],
      },
      'trigger': {
        filename: 'trigger.md',
        lang: 'yaml',
        lines: [
          'name: CI Pipeline',
          '',
          'on:',
          '  push:',
          '    branches: [main, develop]',
          '  pull_request:',
          '    branches: [main]',
          '',
          '# push 또는 PR 발생 시 자동 트리거',
          '# workflow_dispatch를 추가하면 수동 실행도 가능',
        ],
        highlight: [3, 4, 5, 6, 7],
      },
      'jobs': {
        filename: 'jobs.yml',
        lang: 'yaml',
        lines: [
          'jobs:',
          '  test:',
          '    runs-on: ubuntu-latest',
          '    steps:',
          '      - uses: actions/checkout@v4',
          '      - uses: actions/setup-node@v4',
          '        with:',
          '          node-version: 20',
          '      - run: npm ci',
          '      - run: npm test',
          '',
          '  build:',
          '    needs: test',
          '    runs-on: ubuntu-latest',
          '    steps:',
          '      - uses: actions/checkout@v4',
          '      - run: npm run build',
          '      - uses: actions/upload-artifact@v4',
          '        with:',
          '          name: dist',
          '          path: dist/',
          '',
          '  deploy:',
          '    needs: build',
          '    runs-on: ubuntu-latest',
          '    steps:',
          '      - uses: actions/download-artifact@v4',
          '      - run: ./scripts/deploy.sh',
        ],
        highlight: [2, 12, 13, 23, 24],
      },
      'secrets': {
        filename: 'secrets.md',
        lang: 'yaml',
        lines: [
          '# GitHub Repository Settings → Secrets and variables',
          '#   AWS_ACCESS_KEY_ID',
          '#   AWS_SECRET_ACCESS_KEY',
          '#   DEPLOY_TOKEN',
          '',
          'jobs:',
          '  deploy:',
          '    runs-on: ubuntu-latest',
          '    env:',
          '      NODE_ENV: production',
          '      APP_VERSION: ${{ github.sha }}',
          '    steps:',
          '      - name: Configure AWS credentials',
          '        uses: aws-actions/configure-aws-credentials@v4',
          '        with:',
          '          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}',
          '          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}',
          '          aws-region: ap-northeast-2',
          '',
          '      - name: Deploy to S3',
          '        run: aws s3 sync dist/ s3://my-app',
          '        env:',
          '          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}',
        ],
        highlight: [9, 10, 11, 16, 17, 23],
      },
      'matrix': {
        filename: 'matrix.yml',
        lang: 'yaml',
        lines: [
          'jobs:',
          '  test:',
          '    runs-on: ${{ matrix.os }}',
          '    strategy:',
          '      fail-fast: true',
          '      matrix:',
          '        node: [18, 20]',
          '        os: [ubuntu-latest, macos-latest]',
          '        # 결과: 2 × 2 = 4개 병렬 job',
          '        # exclude로 특정 조합 제외 가능',
          '        # include로 추가 조합 삽입 가능',
          '    steps:',
          '      - uses: actions/checkout@v4',
          '      - uses: actions/setup-node@v4',
          '        with:',
          '          node-version: ${{ matrix.node }}',
          '      - run: npm ci',
          '      - run: npm test',
        ],
        highlight: [3, 4, 5, 6, 7, 8, 16],
      },
    };

    // 우측: VSCode 스타일 코드 뷰어 + 파일 탭
    function CodeViewer({ activeFile, onTabChange }) {
      const codeRef = useRef(null);
      const file = FILES[activeFile];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          delete codeRef.current.dataset.highlighted;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [activeFile]);

      const tabs = ['ci.yml', 'trigger', 'jobs', 'secrets', 'matrix'];
      const tabLabels = {
        'ci.yml': 'ci.yml',
        'trigger': 'trigger.md',
        'jobs': 'jobs.yml',
        'secrets': 'secrets.md',
        'matrix': 'matrix.yml',
      };

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg flex flex-col h-full">
          {/* 윈도우 dot */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{file.filename}</span>
          </div>

          {/* 파일 탭 */}
          <div className="bg-[#21252b] flex border-b border-slate-700 overflow-x-auto">
            {tabs.map((t) => (
              <button
                key={t}
                onClick={() => onTabChange(t)}
                className={`px-3 py-2 text-xs font-mono whitespace-nowrap border-r border-slate-700 transition
                  ${activeFile === t
                    ? 'bg-[#282c34] text-slate-100 border-t-2 border-t-teal-400'
                    : 'text-slate-400 hover:bg-[#2c313a] hover:text-slate-200'}`}
              >
                {tabLabels[t]}
              </button>
            ))}
          </div>

          {/* 코드 + 라인 번호 */}
          <div className="overflow-auto flex-1 text-xs" style={{ minHeight: '24rem' }}>
            <pre className="p-0 m-0">
              <code ref={codeRef} className={`language-${file.lang} block`}>
{file.lines.map((line, i) => {
  const highlighted = file.highlight && file.highlight.includes(i + 1);
  return (
    <div key={`${activeFile}-${i}`} className={`flex ${highlighted ? 'bg-yellow-500/10' : ''}`}>
      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
        {i + 1}
      </span>
      <span className="pl-3 pr-3 whitespace-pre">{line || ' '}</span>
    </div>
  );
})}
              </code>
            </pre>
          </div>
        </div>
      );
    }

    // 좌측: workflow 진행 시각화 (job pipeline + trigger + matrix)
    function WorkflowPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-4 flex flex-col h-full">
          {/* 파일 트리 */}
          <FileTreeBox active={step.tree.active} />

          {/* Trigger 박스 */}
          {step.trigger && <TriggerBox events={step.trigger.events} />}

          {/* Jobs 파이프라인 */}
          {step.jobs.length > 0 && <JobPipeline jobs={step.jobs} />}

          {/* Secrets / env 배지 */}
          {step.envBadge && <SecretsBox />}

          {/* Matrix grid */}
          {step.matrix && <MatrixGrid combos={step.matrix.combos} />}

          {/* 빈 영역 채움 — Step 1 첫 등장 안내 */}
          {step.jobs.length === 0 && !step.matrix && !step.trigger && (
            <div className="flex-1 flex items-center justify-center mt-4">
              <div className="bg-slate-50 border-2 border-dashed border-slate-300 rounded-xl p-6 text-center max-w-xs">
                <div className="text-3xl mb-2">⚙️</div>
                <div className="text-xs text-slate-500 leading-relaxed">
                  파일이 생성되었다.<br/>
                  아직 트리거도 job도 없다.<br/>
                  다음 단계에서 채워나간다.
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function FileTreeBox({ active }) {
      const items = [
        { id: 'ci', icon: '📁', name: '.github/' },
        { id: 'ci', icon: '  📁', name: 'workflows/' },
        { id: 'ci', icon: '    📄', name: 'ci.yml', isFile: true, key: 'ci' },
      ];
      return (
        <div className="bg-slate-900 rounded-lg p-3 mb-3 font-mono text-xs">
          <div className="text-slate-400 mb-2 text-[10px] uppercase tracking-wider">Repository Tree</div>
          <div className="space-y-0.5">
            <div className="text-slate-300">📁 my-app/</div>
            <div className="pl-3 text-slate-300">📁 .github/</div>
            <div className="pl-6 text-slate-300">📁 workflows/</div>
            <div className={`pl-9 transition-all ${active === 'ci' || active === 'trigger' || active === 'jobs' || active === 'secrets' || active === 'matrix'
                ? 'text-teal-300 font-bold'
                : 'text-slate-500'}`}>
              📄 ci.yml
              {(active === 'ci' || active === 'trigger' || active === 'jobs' || active === 'secrets' || active === 'matrix') &&
                <span className="ml-2 text-[9px] bg-teal-500/20 text-teal-300 px-1.5 py-0.5 rounded">active</span>}
            </div>
            <div className="pl-3 text-slate-500">📄 package.json</div>
            <div className="pl-3 text-slate-500">📁 src/</div>
          </div>
        </div>
      );
    }

    function TriggerBox({ events }) {
      return (
        <div className="bg-teal-50 border-2 border-teal-300 rounded-lg p-3 mb-3 fade-in-up">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-lg">🎯</span>
            <span className="text-xs font-bold text-teal-700 uppercase tracking-wider">on: trigger</span>
          </div>
          <div className="flex flex-wrap gap-1.5">
            {events.map((e, i) => (
              <div
                key={i}
                className="fade-in-up bg-white border border-teal-400 rounded-md px-2 py-1 text-[11px] font-mono text-teal-700 font-bold"
                style={{ animationDelay: `${i * 0.12}s` }}
              >
                {e}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function JobPipeline({ jobs }) {
      const stateClass = (s) => {
        if (s === 'success') return 'bg-emerald-50 border-emerald-400 text-emerald-700';
        if (s === 'running') return 'bg-amber-50 border-amber-400 text-amber-700 pulse-ring';
        if (s === 'pending') return 'bg-slate-50 border-slate-300 text-slate-400';
        return 'bg-white border-slate-200 text-slate-500';
      };
      const stateIcon = (s) => {
        if (s === 'success') return '✅';
        if (s === 'running') return '⏳';
        if (s === 'pending') return '⏸️';
        return '·';
      };
      const stateLabel = (s) => {
        if (s === 'success') return 'success';
        if (s === 'running') return 'running';
        if (s === 'pending') return 'pending';
        return s;
      };

      return (
        <div className="space-y-2 mb-3">
          <div className="text-xs font-bold text-slate-600 uppercase tracking-wider">Jobs Pipeline</div>
          {jobs.map((job, idx) => (
            <React.Fragment key={job.id}>
              <div className={`fade-in-up border-2 rounded-lg p-3 ${stateClass(job.state)}`} style={{ animationDelay: `${idx * 0.15}s` }}>
                <div className="flex items-center justify-between mb-1.5">
                  <div className="flex items-center gap-2">
                    <span className="text-base">{stateIcon(job.state)}</span>
                    <span className="font-mono text-sm font-bold">{job.name}</span>
                  </div>
                  <span className="text-[10px] uppercase tracking-wider font-bold">{stateLabel(job.state)}</span>
                </div>
                <div className="flex flex-wrap gap-1">
                  {job.steps.map((s, i) => (
                    <span key={i} className="text-[10px] bg-white/60 border border-current/30 rounded px-1.5 py-0.5 font-mono">
                      {s}
                    </span>
                  ))}
                </div>
                {job.state === 'running' && (
                  <div className="mt-2 h-1 bg-amber-200 rounded overflow-hidden">
                    <div className="h-full bg-amber-500 running-bar"></div>
                  </div>
                )}
              </div>
              {idx < jobs.length - 1 && (
                <div className="flex justify-center text-slate-400 text-xs">↓ needs</div>
              )}
            </React.Fragment>
          ))}
        </div>
      );
    }

    function SecretsBox() {
      const secrets = ['AWS_ACCESS_KEY_ID', 'AWS_SECRET_ACCESS_KEY', 'DEPLOY_TOKEN'];
      const envs = [{ k: 'NODE_ENV', v: 'production' }, { k: 'APP_VERSION', v: '${{ github.sha }}' }];
      return (
        <div className="bg-slate-50 border-2 border-slate-300 rounded-lg p-3 mb-3 fade-in-up">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-lg">🔐</span>
            <span className="text-xs font-bold text-slate-700 uppercase tracking-wider">secrets &amp; env</span>
          </div>
          <div className="grid grid-cols-1 gap-1.5 mb-2">
            {secrets.map((s, i) => (
              <div key={i} className="fade-in-up bg-amber-50 border border-amber-400 rounded px-2 py-1 flex items-center justify-between" style={{ animationDelay: `${i * 0.1}s` }}>
                <span className="text-[11px] font-mono text-amber-800 font-bold">{s}</span>
                <span className="text-[10px] text-amber-600 font-mono">●●●●●●</span>
              </div>
            ))}
          </div>
          <div className="border-t border-slate-200 pt-2 grid grid-cols-1 gap-1">
            {envs.map((e, i) => (
              <div key={i} className="fade-in-up text-[11px] font-mono flex justify-between" style={{ animationDelay: `${(i + 3) * 0.1}s` }}>
                <span className="text-slate-700 font-bold">env.{e.k}</span>
                <span className="text-slate-500">{e.v}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function MatrixGrid({ combos }) {
      const stateClass = (s) => {
        if (s === 'success') return 'bg-emerald-50 border-emerald-400 text-emerald-700';
        if (s === 'running') return 'bg-amber-50 border-amber-400 text-amber-700 pulse-ring';
        return 'bg-slate-50 border-slate-300 text-slate-500';
      };
      const stateIcon = (s) => (s === 'success' ? '✅' : s === 'running' ? '⏳' : '·');

      return (
        <div className="mb-3">
          <div className="text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Matrix · Node × OS (병렬)</div>
          <div className="grid grid-cols-2 gap-2">
            {combos.map((c, i) => (
              <div
                key={i}
                className={`fade-in-up border-2 rounded-lg p-2 ${stateClass(c.state)}`}
                style={{ animationDelay: `${i * 0.12}s` }}
              >
                <div className="flex items-center justify-between mb-1">
                  <span className="text-base">{stateIcon(c.state)}</span>
                  <span className="text-[9px] uppercase font-bold tracking-wider">{c.state}</span>
                </div>
                <div className="text-[11px] font-mono font-bold">node {c.node}</div>
                <div className="text-[10px] font-mono opacity-80">{c.os}</div>
                {c.state === 'running' && (
                  <div className="mt-1 h-0.5 bg-amber-200 rounded overflow-hidden">
                    <div className="h-full bg-amber-500 running-bar"></div>
                  </div>
                )}
              </div>
            ))}
          </div>
          <div className="text-[10px] text-slate-500 mt-2 italic">
            strategy.matrix → 2 × 2 = 4개 병렬 실행. fail-fast로 첫 실패 시 전체 취소.
          </div>
        </div>
      );
    }

    // 헤더
    function Header() {
      return (
        <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 mb-4">
          <div className="flex items-center justify-between flex-wrap gap-2">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-slate-700 text-white flex items-center justify-center rounded-lg font-bold text-sm">
                VI
              </div>
              <div>
                <h1 className="text-xl font-bold text-slate-800">Part VI · GitHub Actions — CI/CD</h1>
                <p className="text-xs text-slate-500">
                  .github/workflows/ci.yml로 시작해 trigger → jobs → secrets → matrix까지 5단계로 구축한다.
                </p>
              </div>
            </div>
            <a href="../index.html" className="text-xs text-slate-600 hover:text-slate-900 hover:underline font-medium">
              ← 전체 목차
            </a>
          </div>
        </header>
      );
    }

    // 설명 패널
    function DescPanel({ step, stepIdx, total }) {
      return (
        <div className="bg-slate-700 text-white p-4 rounded-xl shadow-sm border border-slate-800 mb-4">
          <div className="flex items-center justify-between mb-1">
            <h3 className="text-[10px] font-bold text-slate-300 uppercase tracking-wider">
              Step {stepIdx + 1} / {total} · {step.title}
            </h3>
            <span className="text-[10px] bg-slate-600 px-2 py-0.5 rounded text-slate-200 font-mono">
              {step.activeFile}
            </span>
          </div>
          <p className="text-sm md:text-base font-medium leading-relaxed">{step.desc}</p>
        </div>
      );
    }

    // 컨트롤 (4 버튼)
    function Controls({ stepIdx, setStepIdx, isPlaying, setIsPlaying, total }) {
      const isEnd = stepIdx === total - 1;
      const handleHome = () => { setStepIdx(0); setIsPlaying(false); };
      const handlePrev = () => { if (stepIdx > 0) { setStepIdx(stepIdx - 1); setIsPlaying(false); } };
      const handleNext = () => { if (stepIdx < total - 1) setStepIdx(stepIdx + 1); else setIsPlaying(false); };
      const togglePlay = () => { if (isEnd) setStepIdx(0); setIsPlaying((p) => !p); };

      return (
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
          <div className="flex items-center gap-2">
            <button
              aria-label="처음으로"
              onClick={handleHome}
              className="p-2 rounded bg-slate-100 hover:bg-slate-200 text-slate-700 transition"
              title="처음으로"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polygon points="11 19 2 12 11 5 11 19" />
                <polygon points="22 19 13 12 22 5 22 19" />
              </svg>
            </button>
            <button
              aria-label="이전 단계"
              onClick={handlePrev}
              disabled={stepIdx === 0}
              className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"
              title="이전 단계"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M19 20L9 12l10-8v16z" />
                <line x1="5" y1="19" x2="5" y2="5" />
              </svg>
            </button>
            <button
              aria-label={isPlaying ? '정지' : '자동 실행'}
              onClick={togglePlay}
              className="flex items-center px-4 py-2 rounded bg-slate-700 hover:bg-slate-800 text-white font-medium transition shadow-sm w-32 justify-center"
            >
              {isPlaying ? (
                <>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" className="mr-2">
                    <rect x="6" y="4" width="4" height="16" />
                    <rect x="14" y="4" width="4" height="16" />
                  </svg>
                  정지
                </>
              ) : (
                <>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" className="mr-2">
                    <polygon points="5 3 19 12 5 21 5 3" />
                  </svg>
                  자동 실행
                </>
              )}
            </button>
            <button
              aria-label="다음 단계"
              onClick={handleNext}
              disabled={isEnd}
              className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"
              title="다음 단계"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M5 4l10 8-10 8V4z" />
                <line x1="19" y1="5" x2="19" y2="19" />
              </svg>
            </button>
          </div>

          <div className="flex items-center gap-3">
            <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
              Step {stepIdx + 1} / {total}
            </div>
            <div className="flex gap-1">
              {Array.from({ length: total }).map((_, i) => (
                <button
                  key={i}
                  onClick={() => { setStepIdx(i); setIsPlaying(false); }}
                  aria-label={`Step ${i + 1}로 이동`}
                  className={`w-2.5 h-2.5 rounded-full transition-all ${
                    i === stepIdx ? 'bg-slate-700 scale-125' : i < stepIdx ? 'bg-slate-400' : 'bg-slate-200'
                  }`}
                />
              ))}
            </div>
            <div className="text-[10px] text-slate-400 hidden md:block">←/→ 키로 이동</div>
          </div>
        </div>
      );
    }

    // 메인 App
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [activeFile, setActiveFile] = useState(STEPS[0].activeFile);

      const step = STEPS[stepIdx];

      // step 변경 시 우측 코드 탭도 자동 동기화
      useEffect(() => {
        setActiveFile(step.activeFile);
      }, [stepIdx]);

      // 자동재생 — 3000ms
      useEffect(() => {
        if (!isPlaying) return;
        const t = setInterval(() => {
          setStepIdx((i) => {
            if (i < STEPS.length - 1) return i + 1;
            setIsPlaying(false);
            return i;
          });
        }, 3000);
        return () => clearInterval(t);
      }, [isPlaying]);

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight' && stepIdx < STEPS.length - 1) setStepIdx(stepIdx + 1);
          if (e.key === 'ArrowLeft' && stepIdx > 0) setStepIdx(stepIdx - 1);
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [stepIdx]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto">
            <Header />
            <DescPanel step={step} stepIdx={stepIdx} total={STEPS.length} />

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
              <WorkflowPane step={step} />
              <CodeViewer activeFile={activeFile} onTabChange={setActiveFile} />
            </div>

            <Controls
              stepIdx={stepIdx}
              setStepIdx={setStepIdx}
              isPlaying={isPlaying}
              setIsPlaying={setIsPlaying}
              total={STEPS.length}
            />

            <footer className="text-center text-xs text-slate-400 py-3 mt-2">
              Git &amp; GitHub 사다리형 학습 커리큘럼 — Part VI · GitHub Actions CI/CD
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script src="sidebar.js"></script>
</body>
</html>
