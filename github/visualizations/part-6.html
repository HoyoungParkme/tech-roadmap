<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Part VI. 실전 팀 워크플로우 — 인터랙티브 시각화</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}.fade-in-up{animation:fadeInUp .5s ease-out both}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // VI-1-1: Fork & PR 워크플로우
    const STEPS_1_1 = [
      { label:"Fork", desc:"[STEP 1] 외부 저장소에 push 권한이 없을 때 Fork(내 계정에 복사)를 먼저 한다.", phase:'fork' },
      { label:"Clone + 수정", desc:"[STEP 2] Fork한 저장소를 로컬에 Clone하고 feature 브랜치에서 수정한다.", phase:'clone' },
      { label:"PR 보내기", desc:"[STEP 3] 원본 저장소로 PR을 보낸다. 오픈소스 기여의 표준 워크플로우다.", phase:'pr' },
      { label:"upstream 동기화", desc:"[STEP 4] 원본 저장소(upstream)에서 최신 변경사항을 가져오려면 git remote add upstream + git pull upstream main을 쓴다.", phase:'sync' },
    ];

    // VI-1-2: Squash Merge와 히스토리 관리
    const STEPS_1_2 = [
      { label:"Merge Commit", desc:"[STEP 1] Create a merge commit — feature의 모든 커밋 + Merge Commit이 기록된다. 히스토리 완전 보존.", type:'merge',
        commits:['C1','C2','C3','C4','C5','M'] },
      { label:"Squash Merge", desc:"[STEP 2] Squash and merge — feature의 여러 커밋을 하나로 합쳐 main에 커밋한다. main 히스토리가 깔끔해진다.", type:'squash',
        commits:['C1','C2','C3','S'] },
      { label:"Rebase Merge", desc:"[STEP 3] Rebase and merge — feature 커밋을 선형으로 main에 붙인다. Merge Commit 없이 선형 히스토리.", type:'rebase',
        commits:['C1','C2','C3','C4','C5'] },
      { label:"팀 합의", desc:"[STEP 4] 팀 전체가 같은 방식을 쓰기로 합의하는 게 중요하다. 일관성이 핵심이다.", type:'consensus' },
    ];

    // VI-2-1: Conventional Commits
    const STEPS_2_1 = [
      { label:"형식", desc:"[STEP 1] type(scope): 설명 — Conventional Commits의 표준 형식이다.", format:'type(scope): 설명',
        types:['feat','fix','docs','chore','refactor','test'] },
      { label:"예시", desc:"[STEP 2] feat: 로그인 기능 추가, fix: 토큰 만료 버그 수정, docs: README 갱신.",
        examples:[{t:'feat',m:'로그인 기능 추가'},{t:'fix',m:'토큰 만료 버그 수정'},{t:'docs',m:'README 갱신'}] },
      { label:"자동화", desc:"[STEP 3] 이 규칙을 따르면 semantic-release 같은 도구가 자동으로 버전을 올리고 CHANGELOG를 생성한다.",
        tools:['semantic-release','commitlint','Husky'] },
    ];

    // VI-2-2: Git Stash
    const STEPS_2_2 = [
      { label:"git stash", desc:"[STEP 1] 작업 도중 다른 브랜치로 전환해야 할 때, 커밋하기엔 이른 상태면 git stash로 임시 저장한다.", cmd:'git stash' },
      { label:"stash list", desc:"[STEP 2] git stash list로 저장된 stash 목록을 확인한다. 여러 개 쌓일 수 있다.", cmd:'git stash list' },
      { label:"stash pop", desc:"[STEP 3] git stash pop으로 가장 최근 stash를 꺼내 적용한다. 스택에서 제거된다.", cmd:'git stash pop' },
      { label:"stash apply", desc:"[STEP 4] git stash apply stash@{N}으로 특정 stash를 적용하되 스택에서 제거하지 않는다.", cmd:'git stash apply stash@{0}' },
    ];

    // VI-3-1: 트러블슈팅
    const STEPS_3_1 = [
      { label:"detached HEAD", desc:"[STEP 1] git checkout <SHA>로 특정 커밋으로 이동하면 HEAD가 브랜치를 가리키지 않는 detached HEAD 상태. git checkout main으로 복귀한다.",
        problem:'detached HEAD', solution:'git checkout main' },
      { label:"git revert", desc:"[STEP 2] 공유 브랜치에 잘못 push했을 때 git revert <SHA>로 새 커밋을 추가해 효과를 되돌린다. reset --hard + force push는 금지.",
        problem:'잘못된 push', solution:'git revert <SHA>' },
      { label:"git reflog", desc:"[STEP 3] reflog는 HEAD가 이동한 모든 기록을 보여준다. 실수를 복구하는 마지막 수단이다.",
        problem:'커밋 잃어버림', solution:'git reflog → git checkout <SHA>' },
      { label:"force push 금지", desc:"[STEP 4] --force push는 팀원 히스토리를 망가뜨린다. 꼭 필요하면 --force-with-lease를 쓴다.",
        problem:'force push 필요', solution:'git push --force-with-lease' },
    ];

    // 렌더러들
    function Viz_1_1({step}) {
      const phases = [{name:'원본 저장소',icon:'📦'},{name:'Fork (내 계정)',icon:'🍴'},{name:'로컬 Clone',icon:'💻'},{name:'PR →원본',icon:'📮'}];
      const active = step.phase==='fork'?0:step.phase==='clone'?2:step.phase==='pr'?3:null;
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 gap-2">
          {phases.map((p,i)=>(<React.Fragment key={i}>
            <div className={`w-full max-w-xs border-2 rounded-lg px-3 py-2 text-center text-xs font-bold transition-all duration-500
              ${i===active?'bg-teal-100 border-teal-500 ring-2 ring-teal-300 scale-105 shadow-lg text-teal-700':
                (active!==null&&i<active)?'bg-emerald-50 border-emerald-400 text-emerald-700':'bg-white border-slate-200 text-slate-400'}`}>
              <span className="mr-1">{p.icon}</span>{p.name}
            </div>
            {i<phases.length-1&&<div className="text-slate-300 text-xs">↓</div>}
          </React.Fragment>))}
          {step.phase==='sync'&&(
            <div className="fade-in-up bg-teal-50 border-2 border-teal-400 rounded-xl p-3 text-center max-w-xs mt-2">
              <div className="text-xs font-mono text-teal-700">git pull upstream main</div>
              <div className="text-[10px] text-teal-600 mt-1">원본 최신 변경사항 동기화</div>
            </div>
          )}
        </div>
      );
    }

    function Viz_1_2({step}) {
      if(step.type==='consensus') return (
        <div className="flex flex-col items-center justify-center h-full p-6">
          <div className="bg-teal-50 border-2 border-teal-400 rounded-xl p-5 text-center max-w-sm">
            <div className="text-2xl mb-2">🤝</div>
            <div className="font-bold text-teal-700">팀 합의가 핵심</div>
            <div className="text-xs text-teal-600 mt-2">세 방식 중 하나를 팀 전체가 통일해서 사용</div>
          </div>
        </div>
      );
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-3">
          <div className={`text-xs font-bold px-3 py-1 rounded-full ${step.type==='merge'?'bg-purple-100 text-purple-700':step.type==='squash'?'bg-amber-100 text-amber-700':'bg-cyan-100 text-cyan-700'}`}>
            {step.type==='merge'?'Merge Commit':step.type==='squash'?'Squash Merge':'Rebase Merge'}
          </div>
          <div className="flex gap-1 flex-wrap justify-center">
            {step.commits.map((c,i)=>(<div key={i} className={`fade-in-up text-[10px] px-2 py-0.5 rounded font-mono
              ${c==='M'?'bg-purple-200 text-purple-800':c==='S'?'bg-amber-200 text-amber-800':'bg-slate-100 text-slate-700'}`}
              style={{animationDelay:`${i*0.1}s`}}>{c}</div>))}
          </div>
        </div>
      );
    }

    function Viz_2_1({step}) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-4">
          {step.types&&(<div className="flex gap-2 flex-wrap justify-center">
            {step.types.map((t,i)=>(<div key={i} className="fade-in-up bg-teal-50 border border-teal-300 rounded-lg px-3 py-1 text-xs font-mono text-teal-700 font-bold" style={{animationDelay:`${i*0.08}s`}}>{t}:</div>))}
          </div>)}
          {step.examples&&(<div className="space-y-2 max-w-sm">
            {step.examples.map((e,i)=>(<div key={i} className="fade-in-up bg-slate-900 rounded-lg px-3 py-2 font-mono text-sm" style={{animationDelay:`${i*0.15}s`}}>
              <span className="text-pink-400">{e.t}</span><span className="text-slate-400">: </span><span className="text-emerald-300">{e.m}</span>
            </div>))}
          </div>)}
          {step.tools&&(<div className="flex gap-3">
            {step.tools.map((t,i)=>(<div key={i} className="fade-in-up bg-teal-50 border-2 border-teal-300 rounded-lg px-3 py-2 text-xs font-bold text-teal-700" style={{animationDelay:`${i*0.1}s`}}>{t}</div>))}
          </div>)}
        </div>
      );
    }

    function Viz_2_2({step}) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-6">
          <div className="bg-slate-900 rounded-xl p-5 max-w-sm w-full">
            <div className="text-xs text-slate-400 mb-2 font-mono">bash</div>
            <div className="text-emerald-400 font-mono text-sm font-bold">$ {step.cmd}</div>
          </div>
        </div>
      );
    }

    function Viz_3_1({step}) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-4">
          <div className="bg-red-50 border-2 border-red-300 rounded-xl p-4 text-center max-w-sm">
            <div className="text-xl mb-1">🚨</div>
            <div className="font-bold text-red-700 text-sm">{step.problem}</div>
          </div>
          <div className="text-teal-500 text-lg">↓</div>
          <div className="bg-emerald-50 border-2 border-emerald-400 rounded-xl p-4 text-center max-w-sm">
            <div className="text-xl mb-1">✅</div>
            <div className="font-mono text-sm text-emerald-700 font-bold">{step.solution}</div>
          </div>
        </div>
      );
    }

    // VI-4-1: git add -p — 부분 스테이징
    const STEPS_4_1 = [
      { label:"하나의 파일, 두 변경", desc:"[STEP 1] 하나의 파일에 버그 수정과 새 기능 코드가 섞여 있다. 전부 git add하면 두 변경이 한 커밋에 들어간다.",
        phase:'problem' },
      { label:"git add -p 실행", desc:"[STEP 2] git add -p(또는 --patch)를 실행하면 변경 블록(hunk) 단위로 '이건 올릴까?' 물어본다.",
        phase:'run', cmd:'git add -p' },
      { label:"hunk 선택 — y/n/s", desc:"[STEP 3] y(올림), n(건너뜀), s(더 잘게 나눔). 버그 수정 hunk만 y로 올리고, 새 기능 hunk는 n으로 남긴다.",
        phase:'select', options:['y — 이 hunk 스테이지','n — 건너뛰기','s — 더 잘게 나누기','q — 종료'] },
      { label:"두 개의 깔끔한 커밋", desc:"[STEP 4] 첫 번째 커밋: 버그 수정만. 두 번째 커밋: 새 기능만. '커밋은 하나의 논리적 변경만 담는다' 원칙을 지킨다.",
        phase:'result' },
    ];

    // VI-4-2: git clean — 추적되지 않는 파일 정리
    const STEPS_4_2 = [
      { label:"지저분한 Working Directory", desc:"[STEP 1] 빌드 산출물, 임시 파일, 실험 코드가 쌓이면 git status가 지저분해진다.",
        phase:'dirty' },
      { label:"git clean -n (dry run)", desc:"[STEP 2] -n 옵션으로 먼저 뭘 지울지 확인한다. 실제로 삭제하지 않는 안전 모드다.",
        phase:'dryrun', cmd:'git clean -n' },
      { label:"git clean -f (실행)", desc:"[STEP 3] -f(force)로 실제 삭제를 실행한다. -d를 추가하면 untracked 디렉토리도 함께 삭제한다.",
        phase:'force', cmd:'git clean -fd' },
      { label:"-x 주의", desc:"[STEP 4] -x를 쓰면 .gitignore에 등록된 파일까지 삭제한다. node_modules/, .env도 사라질 수 있으므로 주의!",
        phase:'caution' },
    ];

    function Viz_4_1({step}) {
      if(step.phase==='problem') return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-3">
          <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-4 text-center max-w-sm">
            <div className="text-lg mb-1">📄</div>
            <div className="text-xs font-bold text-amber-700">app.js — 두 변경이 섞임</div>
            <div className="mt-2 space-y-1">
              <div className="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded">+ 버그 수정 (line 15-20)</div>
              <div className="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded">+ 새 기능 (line 45-60)</div>
            </div>
          </div>
        </div>
      );
      if(step.phase==='run') return (
        <div className="flex flex-col items-center justify-center h-full p-6">
          <div className="bg-slate-900 rounded-xl p-5 max-w-sm w-full">
            <div className="text-xs text-slate-400 mb-2 font-mono">bash</div>
            <div className="text-emerald-400 font-mono text-sm font-bold">$ {step.cmd}</div>
            <div className="text-slate-400 text-xs mt-2 font-mono">Stage this hunk [y,n,q,a,d,s,e,?]?</div>
          </div>
        </div>
      );
      if(step.phase==='select') return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-2">
          {step.options.map((o,i)=>(<div key={i} className={`fade-in-up max-w-xs w-full border-2 rounded-lg px-3 py-2 text-xs font-mono transition-all
            ${i===0?'bg-emerald-50 border-emerald-400 text-emerald-700 font-bold':
              i===1?'bg-slate-50 border-slate-300 text-slate-600':
              'bg-white border-slate-200 text-slate-500'}`}
            style={{animationDelay:`${i*0.12}s`}}>{o}</div>))}
        </div>
      );
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-3">
          <div className="flex gap-4">
            <div className="bg-emerald-50 border-2 border-emerald-400 rounded-xl p-3 text-center">
              <div className="text-xs font-bold text-emerald-700">커밋 1</div>
              <div className="text-[10px] text-emerald-600 mt-1">fix: 버그 수정</div>
            </div>
            <div className="bg-blue-50 border-2 border-blue-400 rounded-xl p-3 text-center">
              <div className="text-xs font-bold text-blue-700">커밋 2</div>
              <div className="text-[10px] text-blue-600 mt-1">feat: 새 기능</div>
            </div>
          </div>
          <div className="text-[10px] text-teal-600 font-bold">✅ 원자적 커밋 완성!</div>
        </div>
      );
    }

    function Viz_4_2({step}) {
      if(step.phase==='dirty') return (
        <div className="flex flex-col items-center justify-center h-full p-4">
          <div className="bg-red-50 border-2 border-red-300 rounded-xl p-4 text-center max-w-sm">
            <div className="text-lg mb-2">🗑️</div>
            <div className="text-xs font-bold text-red-700 mb-2">Untracked files 쌓임</div>
            <div className="space-y-1 text-[10px] text-red-600 font-mono">
              <div>temp_debug.js</div><div>build/output.min.js</div><div>experiment/</div><div>*.log</div>
            </div>
          </div>
        </div>
      );
      if(step.phase==='caution') return (
        <div className="flex flex-col items-center justify-center h-full p-4">
          <div className="bg-amber-50 border-2 border-amber-400 rounded-xl p-5 text-center max-w-sm">
            <div className="text-2xl mb-2">⚠️</div>
            <div className="font-bold text-amber-700 text-sm">-x 는 위험!</div>
            <div className="text-xs text-amber-600 mt-2">.gitignore에 등록된 파일도 삭제</div>
            <div className="text-[10px] text-amber-500 mt-1">node_modules/, .env 사라질 수 있음</div>
          </div>
        </div>
      );
      return (
        <div className="flex flex-col items-center justify-center h-full p-6">
          <div className="bg-slate-900 rounded-xl p-5 max-w-sm w-full">
            <div className="text-xs text-slate-400 mb-2 font-mono">bash</div>
            <div className="text-emerald-400 font-mono text-sm font-bold">$ {step.cmd}</div>
            {step.phase==='dryrun'&&<div className="text-slate-400 text-xs mt-2 font-mono">Would remove temp_debug.js<br/>Would remove build/</div>}
            {step.phase==='force'&&<div className="text-slate-400 text-xs mt-2 font-mono">Removing temp_debug.js<br/>Removing build/<br/>Removing experiment/</div>}
          </div>
        </div>
      );
    }

    const SECTIONS = [
      {id:"1-1",label:"VI-1-1",title:"Fork & PR",steps:STEPS_1_1,Renderer:Viz_1_1},
      {id:"1-2",label:"VI-1-2",title:"Squash Merge",steps:STEPS_1_2,Renderer:Viz_1_2},
      {id:"2-1",label:"VI-2-1",title:"Conventional Commits",steps:STEPS_2_1,Renderer:Viz_2_1},
      {id:"2-2",label:"VI-2-2",title:"Git Stash",steps:STEPS_2_2,Renderer:Viz_2_2},
      {id:"3-1",label:"VI-3-1",title:"트러블슈팅",steps:STEPS_3_1,Renderer:Viz_3_1},
      {id:"4-1",label:"VI-4-1",title:"git add -p",steps:STEPS_4_1,Renderer:Viz_4_1},
      {id:"4-2",label:"VI-4-2",title:"git clean",steps:STEPS_4_2,Renderer:Viz_4_2},
    ];

    function App() {
      const [sectionIdx,setSectionIdx]=useState(0);const [stepIdx,setStepIdx]=useState(0);const [isPlaying,setIsPlaying]=useState(false);const playRef=useRef(null);
      const section=SECTIONS[sectionIdx];const step=section.steps[stepIdx];const isEnd=stepIdx===section.steps.length-1;const Renderer=section.Renderer;
      const handleTabChange=(idx)=>{setSectionIdx(idx);setStepIdx(0);setIsPlaying(false);};
      const handleNext=()=>{setStepIdx(prev=>{if(prev<section.steps.length-1)return prev+1;setIsPlaying(false);return prev;});};
      const handleNextRef=useRef(handleNext);handleNextRef.current=handleNext;
      const handlePrev=()=>{if(stepIdx>0){setStepIdx(prev=>prev-1);setIsPlaying(false);}};
      const togglePlay=()=>{if(isEnd)setStepIdx(0);setIsPlaying(prev=>!prev);};
      useEffect(()=>{if(isPlaying){playRef.current=setInterval(()=>handleNextRef.current(),2800);}else{clearInterval(playRef.current);}return()=>clearInterval(playRef.current);},[isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-4">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between flex-wrap gap-2">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-xs">VI</div>
                  <div><h1 className="text-xl font-bold text-slate-800">Part VI. 실전 팀 워크플로우</h1>
                  <p className="text-xs text-slate-500">개인 학습에서 팀 협업으로 전환하는 실전 패턴과 트러블슈팅.</p></div>
                </div>
                <a href="../index.html" className="text-xs text-teal-600 hover:underline font-medium">← 전체 목차</a>
              </div>
            </header>
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-1 flex gap-1 overflow-x-auto">
              {SECTIONS.map((s,i)=>(<button key={s.id} onClick={()=>handleTabChange(i)} aria-label={`${s.label} — ${s.title} 섹션으로 이동`}
                className={`flex-1 min-w-[100px] px-2 py-2 rounded-lg text-xs font-medium transition-all ${i===sectionIdx?'bg-teal-600 text-white shadow-sm':'text-slate-500 hover:bg-slate-100'}`}>
                <div className="font-bold">{s.label}</div><div className={`mt-0.5 text-[10px] ${i===sectionIdx?'text-teal-200':'text-slate-400'}`}>{s.title}</div>
              </button>))}
            </div>
            <div className="bg-teal-700 text-white p-4 rounded-xl shadow-sm border border-teal-800 min-h-[80px] flex flex-col justify-center">
              <h3 className="text-[10px] font-bold text-teal-200 uppercase tracking-wider mb-1">{section.label} — {step.label}</h3>
              <p className="text-sm md:text-base font-medium leading-relaxed">{step.desc}</p>
            </div>
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 min-h-[320px] md:min-h-[380px]"><Renderer step={step}/></div>
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={stepIdx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button aria-label={isPlaying?'정지':'자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-teal-600 hover:bg-teal-700 text-white font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="flex items-center gap-3">
                <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step {stepIdx+1}/{section.steps.length}</div>
                <div className="flex gap-1">{section.steps.map((_,i)=>(<button key={i} onClick={()=>{setStepIdx(i);setIsPlaying(false);}} aria-label={`Step ${i+1}로 이동`} className={`w-2.5 h-2.5 rounded-full transition-all ${i===stepIdx?'bg-teal-500 scale-125':i<stepIdx?'bg-teal-300':'bg-slate-200'}`}/>))}</div>
              </div>
            </div>
            <footer className="text-center text-xs text-slate-400 py-2">Git & GitHub 사다리형 학습 커리큘럼 — Part VI 시각화</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
<script src="sidebar.js"></script>
</body>
</html>
