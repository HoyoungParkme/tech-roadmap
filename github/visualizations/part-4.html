<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Part IV. 브랜치·머지·리베이스 — 인터랙티브 시각화</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeInUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .fade-in-up { animation: fadeInUp 0.5s ease-out both; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ═══════════════════════════════════════════════
    // IV-1-1: Git 변경사항의 여행 (6단계)
    // ═══════════════════════════════════════════════
    const STEPS_1_1 = [
      { label: "Working Directory", desc: "[STEP 1 — 파일 수정] 텍스트 에디터로 파일을 수정한다. 변경된 파일은 아직 Git이 추적하지 않는 Working Directory 상태다.",
        stages: ['active','idle','idle','idle','idle','idle'] },
      { label: "Staging Area", desc: "[STEP 2 — git add] git add로 변경사항을 Staging Area에 올린다. 커밋할 내용을 미리 모아두는 장바구니다.",
        stages: ['done','active','idle','idle','idle','idle'] },
      { label: "Local Repository", desc: "[STEP 3 — git commit] git commit으로 스테이지 내용을 영구 스냅샷으로 로컬 히스토리에 저장한다.",
        stages: ['done','done','active','idle','idle','idle'] },
      { label: "Remote", desc: "[STEP 4 — git push] git push로 로컬 커밋을 원격 저장소(GitHub)에 전송한다. 팀원들이 볼 수 있게 된다.",
        stages: ['done','done','done','active','idle','idle'] },
      { label: "PR / Review", desc: "[STEP 5 — Pull Request] GitHub에서 PR을 생성한다. 팀원이 코드를 검토하고 댓글을 남긴다.",
        stages: ['done','done','done','done','active','idle'] },
      { label: "Merge", desc: "[STEP 6 — Merge] 리뷰 승인 후 feature 브랜치를 main에 통합한다. 변경사항의 여행이 완성된다.",
        stages: ['done','done','done','done','done','active'] },
    ];

    // IV-1-2: 브랜치란 무엇인가
    const STEPS_1_2 = [
      { label: "main 브랜치", desc: "[STEP 1] 모든 저장소는 기본 브랜치(main)에서 시작한다. main은 가장 최근 커밋을 가리키는 포인터다.",
        branches: [{name:'main',commits:['C1','C2','C3'],color:'purple',active:true}], head: 'main' },
      { label: "새 브랜치 생성", desc: "[STEP 2] git branch feature/login을 실행하면 현재 커밋을 가리키는 새 포인터가 생긴다. 파일 복사가 아니라 포인터 하나 추가다.",
        branches: [{name:'main',commits:['C1','C2','C3'],color:'purple',active:false},{name:'feature/login',commits:[],color:'cyan',active:true}], head: 'main' },
      { label: "브랜치 전환", desc: "[STEP 3] git switch feature/login으로 이동하면 HEAD가 feature/login을 가리킨다. 이제 여기서 커밋하면 feature/login만 전진한다.",
        branches: [{name:'main',commits:['C1','C2','C3'],color:'purple',active:false},{name:'feature/login',commits:[],color:'cyan',active:true}], head: 'feature/login' },
      { label: "독립 커밋", desc: "[STEP 4] feature/login에서 커밋하면 이 브랜치만 앞으로 간다. main은 그대로다. 두 줄기가 독립적으로 진행된다.",
        branches: [{name:'main',commits:['C1','C2','C3'],color:'purple',active:false},{name:'feature/login',commits:['C4','C5'],color:'cyan',active:true}], head: 'feature/login' },
    ];

    // IV-1-3: 브랜치 전략
    const STEPS_1_3 = [
      { label: "Git Flow", desc: "[STEP 1] Git Flow는 main, develop, feature/*, release/*, hotfix/* 5가지 브랜치를 사용한다. 릴리스 주기가 긴 프로젝트에 적합하다.",
        strategy: 'gitflow', lines: ['main','develop','feature/*','release/*','hotfix/*'] },
      { label: "GitHub Flow", desc: "[STEP 2] GitHub Flow는 main + feature/* 만 쓰는 단순한 방식이다. 웹 서비스처럼 자주 배포하는 팀에 적합하다.",
        strategy: 'githubflow', lines: ['main','feature/*'] },
      { label: "어떤 걸 선택할까?", desc: "[STEP 3] 팀 규모와 배포 빈도를 고려한다. 소규모 팀 + 자주 배포 = GitHub Flow. 대규모 + 긴 릴리스 주기 = Git Flow.",
        strategy: 'comparison' },
    ];

    // IV-2-1: 머지 방식
    const STEPS_2_1 = [
      { label: "Fast-forward Merge", desc: "[STEP 1] main이 분기 이후 새 커밋이 없으면 단순히 포인터를 앞으로 옮긴다. 히스토리가 선형으로 유지된다.",
        mergeType: 'ff', mainCommits: ['C1','C2','C3'], featureCommits: ['C4','C5'], result: 'C1→C2→C3→C4→C5' },
      { label: "3-way Merge", desc: "[STEP 2] 양쪽 브랜치에 각자 커밋이 있으면 공통 조상을 찾아 세 버전을 비교한다. Merge Commit이 생성된다.",
        mergeType: '3way', mainCommits: ['C1','C2','C3','C6'], featureCommits: ['C4','C5'], result: 'main(C6) + feature(C4,C5) → Merge Commit' },
      { label: "--no-ff 옵션", desc: "[STEP 3] --no-ff 옵션을 쓰면 Fast-forward 상황에서도 Merge Commit을 만들어 브랜치 흔적을 남긴다.",
        mergeType: 'noff' },
    ];

    // IV-2-2: 충돌 해결
    const STEPS_2_2 = [
      { label: "충돌 발생", desc: "[STEP 1] 두 브랜치가 같은 파일의 같은 줄을 다르게 수정하면 Git은 자동으로 합칠 수 없다. Conflict를 알린다.",
        phase: 'conflict' },
      { label: "충돌 마커", desc: "[STEP 2] 파일에 <<<<<<< HEAD, =======, >>>>>>> feature 마커가 생긴다. 윗부분이 현재 브랜치, 아랫부분이 머지 대상이다.",
        phase: 'markers', code: ['<<<<<<< HEAD','console.log("hello");','=======','console.log("안녕");','>>>>>>> feature/ko'] },
      { label: "수동 해결", desc: "[STEP 3] 에디터에서 원하는 내용을 남기고 마커를 삭제한다. VS Code의 Merge Editor를 사용하면 시각적으로 쉽다.",
        phase: 'resolve', code: ['console.log("안녕하세요");'] },
      { label: "커밋으로 완료", desc: "[STEP 4] 수정한 파일을 git add하고 git commit으로 충돌 해결을 완료한다. 충돌은 '사람이 판단해야 한다'는 Git의 신호다.",
        phase: 'commit' },
    ];

    // IV-3-1: 리베이스
    const STEPS_3_1 = [
      { label: "리베이스란", desc: "[STEP 1] git rebase main은 현재 브랜치의 커밋들을 main의 최신 커밋 위로 '다시 붙인다'. 히스토리가 일직선이 된다.",
        phase: 'before' },
      { label: "리베이스 후", desc: "[STEP 2] 커밋 C4, C5가 main의 C6 뒤로 이동한다. SHA가 변경되므로 새로운 커밋 C4', C5'가 된다.",
        phase: 'after' },
      { label: "Golden Rule", desc: "[STEP 3] 공유된 브랜치(main, develop)에는 rebase하지 않는다. 로컬 feature 브랜치에서만 쓴다. 팀원 히스토리가 꼬일 수 있다.",
        phase: 'rule' },
    ];

    // IV-3-2: 체리픽
    const STEPS_3_2 = [
      { label: "체리픽이란", desc: "[STEP 1] git cherry-pick <SHA>는 다른 브랜치의 특정 커밋 하나만 현재 브랜치에 적용한다. 브랜치 전체를 머지하지 않는다.",
        phase: 'pick' },
      { label: "사용 사례", desc: "[STEP 2] 긴급 버그 수정(hotfix)을 main에만 적용해야 할 때 유용하다. feature 브랜치 전체를 머지하면 아직 미완성 코드가 딸려온다.",
        phase: 'usecase' },
      { label: "주의사항", desc: "[STEP 3] 남용하면 히스토리가 복잡해진다. '브랜치 전체 머지가 불가능한 상황'에서만 쓴다.",
        phase: 'caution' },
    ];

    // ═══════════════════════════════════════════════
    // 렌더러들
    // ═══════════════════════════════════════════════

    const STAGE_NAMES = ['Working\nDirectory','Staging\nArea','Local\nRepo','Remote\n(GitHub)','PR /\nReview','Merge\n(main)'];
    const STAGE_COLORS = ['orange','blue','purple','green','pink','teal'];

    function Viz_1_1({ step }) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 gap-2">
          {step.stages.map((s, i) => (
            <React.Fragment key={i}>
              <div className={`w-full max-w-xs border-2 rounded-lg px-3 py-2 text-center text-xs font-bold transition-all duration-500
                ${s === 'active' ? 'bg-purple-100 border-purple-500 ring-2 ring-purple-300 scale-105 shadow-lg text-purple-700' :
                  s === 'done' ? 'bg-emerald-50 border-emerald-400 text-emerald-700' :
                  'bg-white border-slate-200 text-slate-400'}`}>
                <div className="whitespace-pre-line">{STAGE_NAMES[i]}</div>
              </div>
              {i < 5 && <div className="text-slate-300 text-xs">↓</div>}
            </React.Fragment>
          ))}
        </div>
      );
    }

    function Viz_1_2({ step }) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-4">
          <div className="text-xs font-bold text-purple-600 bg-purple-50 px-3 py-1 rounded-full">HEAD → {step.head}</div>
          <div className="space-y-3 w-full max-w-md">
            {step.branches.map((b, i) => (
              <div key={i} className={`fade-in-up border-2 rounded-lg p-3 transition-all duration-500
                ${b.active ? 'border-purple-500 bg-purple-50 ring-1 ring-purple-300' : 'border-slate-200 bg-white'}`}>
                <div className="flex items-center gap-2 mb-2">
                  <div className={`w-6 h-6 rounded-full text-white text-[10px] font-bold flex items-center justify-center
                    ${b.color === 'purple' ? 'bg-purple-500' : 'bg-cyan-500'}`}>{b.name[0].toUpperCase()}</div>
                  <span className="text-xs font-bold text-slate-700">{b.name}</span>
                  {step.head === b.name && <span className="text-[10px] bg-yellow-100 text-yellow-700 px-1 rounded">HEAD</span>}
                </div>
                <div className="flex gap-1 flex-wrap">
                  {b.commits.map((c, j) => (
                    <div key={j} className={`text-[10px] px-2 py-0.5 rounded font-mono
                      ${b.color === 'purple' ? 'bg-purple-100 text-purple-700' : 'bg-cyan-100 text-cyan-700'}`}>{c}</div>
                  ))}
                  {b.commits.length === 0 && <span className="text-[10px] text-slate-400">(같은 커밋을 가리킴)</span>}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function Viz_1_3({ step }) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-4">
          {step.strategy === 'comparison' ? (
            <div className="flex gap-4">
              <div className="bg-purple-50 border-2 border-purple-300 rounded-xl p-4 w-44 text-center">
                <div className="font-bold text-sm text-purple-700">Git Flow</div>
                <div className="text-[10px] text-purple-600 mt-2">5가지 브랜치</div>
                <div className="text-[10px] text-slate-500 mt-1">대규모 · 긴 릴리스</div>
              </div>
              <div className="bg-cyan-50 border-2 border-cyan-300 rounded-xl p-4 w-44 text-center">
                <div className="font-bold text-sm text-cyan-700">GitHub Flow</div>
                <div className="text-[10px] text-cyan-600 mt-2">2가지 브랜치</div>
                <div className="text-[10px] text-slate-500 mt-1">소규모 · 자주 배포</div>
              </div>
            </div>
          ) : (
            <div className="space-y-2 max-w-sm">
              <div className="text-xs font-bold text-center text-purple-600 bg-purple-50 px-3 py-1 rounded-full">
                {step.strategy === 'gitflow' ? 'Git Flow' : 'GitHub Flow'}
              </div>
              {step.lines.map((l, i) => (
                <div key={i} className="fade-in-up flex items-center gap-2" style={{animationDelay:`${i*0.1}s`}}>
                  <div className={`w-3 h-3 rounded-full ${i === 0 ? 'bg-purple-500' : i === 1 ? 'bg-blue-500' : 'bg-emerald-500'}`}></div>
                  <div className="text-xs font-mono text-slate-700 bg-slate-50 rounded px-2 py-1 flex-1">{l}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function Viz_2_1({ step }) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-4">
          <div className="text-xs font-bold text-purple-600 bg-purple-50 px-3 py-1 rounded-full">{step.mergeType === 'ff' ? 'Fast-forward' : step.mergeType === '3way' ? '3-way Merge' : '--no-ff'}</div>
          {step.mergeType === 'noff' ? (
            <div className="text-center max-w-sm">
              <div className="text-sm text-slate-600">Fast-forward 상황에서도</div>
              <div className="text-lg font-bold text-purple-700 my-2">git merge --no-ff feature</div>
              <div className="text-sm text-slate-600">→ Merge Commit 생성 → 브랜치 흔적 보존</div>
            </div>
          ) : (
            <div className="space-y-2 max-w-md">
              <div className="flex items-center gap-1">
                <span className="text-[10px] text-slate-500">main:</span>
                {step.mainCommits.map((c, i) => (
                  <div key={i} className="text-[10px] bg-purple-100 text-purple-700 px-2 py-0.5 rounded font-mono">{c}</div>
                ))}
              </div>
              <div className="flex items-center gap-1">
                <span className="text-[10px] text-slate-500">feature:</span>
                {step.featureCommits.map((c, i) => (
                  <div key={i} className="text-[10px] bg-cyan-100 text-cyan-700 px-2 py-0.5 rounded font-mono">{c}</div>
                ))}
              </div>
              <div className="text-xs text-center text-slate-600 bg-slate-50 rounded p-2">결과: {step.result}</div>
            </div>
          )}
        </div>
      );
    }

    function Viz_2_2({ step }) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-4">
          {step.phase === 'conflict' && (
            <div className="bg-red-50 border-2 border-red-400 rounded-xl p-6 text-center max-w-sm">
              <div className="text-3xl mb-2">💥</div>
              <div className="text-red-700 font-bold">CONFLICT!</div>
              <div className="text-xs text-red-600 mt-2">같은 파일의 같은 줄을 다르게 수정</div>
            </div>
          )}
          {step.code && (
            <div className="bg-slate-900 rounded-lg p-4 text-sm font-mono max-w-sm w-full">
              {step.code.map((l, i) => (
                <div key={i} className={`py-0.5 ${
                  l.startsWith('<') ? 'text-red-400' :
                  l.startsWith('=') ? 'text-yellow-400' :
                  l.startsWith('>') ? 'text-blue-400' :
                  'text-emerald-300'}`}>{l}</div>
              ))}
            </div>
          )}
          {step.phase === 'commit' && (
            <div className="bg-emerald-50 border-2 border-emerald-400 rounded-xl p-4 text-center max-w-sm">
              <div className="text-xl mb-1">✓</div>
              <div className="text-emerald-700 font-bold text-sm">git add + git commit</div>
              <div className="text-[10px] text-emerald-600 mt-1">충돌 해결 완료</div>
            </div>
          )}
        </div>
      );
    }

    function Viz_3_1({ step }) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-4">
          {step.phase === 'before' && (
            <div className="space-y-2 max-w-sm text-center">
              <div className="text-xs text-slate-500">리베이스 전</div>
              <div className="flex gap-1 justify-center"><span className="text-[10px] text-purple-700 bg-purple-100 px-2 py-0.5 rounded">C1</span><span className="text-[10px] text-purple-700 bg-purple-100 px-2 py-0.5 rounded">C2</span><span className="text-[10px] text-purple-700 bg-purple-100 px-2 py-0.5 rounded">C3</span><span className="text-[10px] text-purple-700 bg-purple-100 px-2 py-0.5 rounded">C6</span><span className="text-xs text-slate-400">← main</span></div>
              <div className="text-slate-300">↗</div>
              <div className="flex gap-1 justify-center"><span className="text-[10px] text-cyan-700 bg-cyan-100 px-2 py-0.5 rounded">C4</span><span className="text-[10px] text-cyan-700 bg-cyan-100 px-2 py-0.5 rounded">C5</span><span className="text-xs text-slate-400">← feature</span></div>
            </div>
          )}
          {step.phase === 'after' && (
            <div className="space-y-2 max-w-sm text-center">
              <div className="text-xs text-emerald-500">리베이스 후 (선형 히스토리)</div>
              <div className="flex gap-1 justify-center flex-wrap">
                <span className="text-[10px] text-purple-700 bg-purple-100 px-2 py-0.5 rounded">C1</span>
                <span className="text-[10px] text-purple-700 bg-purple-100 px-2 py-0.5 rounded">C2</span>
                <span className="text-[10px] text-purple-700 bg-purple-100 px-2 py-0.5 rounded">C3</span>
                <span className="text-[10px] text-purple-700 bg-purple-100 px-2 py-0.5 rounded">C6</span>
                <span className="text-[10px] text-cyan-700 bg-cyan-100 px-2 py-0.5 rounded">C4'</span>
                <span className="text-[10px] text-cyan-700 bg-cyan-100 px-2 py-0.5 rounded">C5'</span>
              </div>
              <div className="text-[10px] text-slate-500">SHA가 변경됨 (C4→C4', C5→C5')</div>
            </div>
          )}
          {step.phase === 'rule' && (
            <div className="bg-red-50 border-2 border-red-400 rounded-xl p-5 text-center max-w-sm">
              <div className="text-xl mb-2">⚠️</div>
              <div className="text-red-700 font-bold text-sm">Golden Rule of Rebase</div>
              <div className="text-xs text-red-600 mt-2">공유된 브랜치(main, develop)에는<br/>절대 rebase하지 않는다</div>
              <div className="text-[10px] text-slate-500 mt-2">로컬 feature 브랜치에서만 사용</div>
            </div>
          )}
        </div>
      );
    }

    function Viz_3_2({ step }) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-4">
          {step.phase === 'pick' && (
            <div className="space-y-3 max-w-sm text-center">
              <div className="text-xs text-slate-500">feature 브랜치에서 C4만 가져오기</div>
              <div className="flex gap-1 justify-center">
                <span className="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded">C3</span>
                <span className="text-[10px] bg-cyan-200 text-cyan-800 px-2 py-0.5 rounded ring-2 ring-cyan-400">C4</span>
                <span className="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded">C5</span>
              </div>
              <div className="text-purple-500">↓ cherry-pick</div>
              <div className="flex gap-1 justify-center">
                <span className="text-[10px] bg-purple-100 text-purple-700 px-2 py-0.5 rounded">C1</span>
                <span className="text-[10px] bg-purple-100 text-purple-700 px-2 py-0.5 rounded">C2</span>
                <span className="text-[10px] bg-cyan-200 text-cyan-800 px-2 py-0.5 rounded ring-2 ring-cyan-400">C4'</span>
                <span className="text-xs text-slate-400">← main</span>
              </div>
            </div>
          )}
          {step.phase === 'usecase' && (
            <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-5 text-center max-w-sm">
              <div className="text-xl mb-2">🔥</div>
              <div className="text-amber-700 font-bold text-sm">긴급 버그 수정 (hotfix)</div>
              <div className="text-xs text-amber-600 mt-2">feature 전체 머지 → 미완성 코드 딸려옴</div>
              <div className="text-xs text-emerald-600 mt-1">cherry-pick → 수정 커밋만 깔끔하게 적용</div>
            </div>
          )}
          {step.phase === 'caution' && (
            <div className="bg-slate-50 border-2 border-slate-300 rounded-xl p-5 text-center max-w-sm">
              <div className="text-xl mb-2">⚠️</div>
              <div className="text-slate-700 font-bold text-sm">남용 금지</div>
              <div className="text-xs text-slate-600 mt-2">"브랜치 전체 머지가 불가능한 상황"에서만</div>
              <div className="text-xs text-slate-500 mt-1">남용하면 히스토리가 복잡해진다</div>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // IV-4-1: GUI로 브랜치·머지 따라하기
    // ═══════════════════════════════════════════════
    const STEPS_4_1 = [
      { label: "브랜치 생성 (GUI)", desc: "[STEP 1] GitHub Desktop: 상단 'Current Branch' 드롭다운 → 'New Branch' → 이름 입력. VS Code: 하단 상태 바의 브랜치 이름 클릭 → 'Create new branch'. CLI의 git switch -c와 동일하다.",
        phase: 'create' },
      { label: "브랜치 전환 (GUI)", desc: "[STEP 2] GitHub Desktop: 'Current Branch' 드롭다운에서 전환할 브랜치 클릭. VS Code: 하단 상태 바 브랜치 이름 클릭 → 목록에서 선택. CLI의 git switch와 동일하다.",
        phase: 'switch' },
      { label: "수정 후 커밋 (GUI)", desc: "[STEP 3] feature 브랜치에서 파일을 수정하고 GUI로 커밋한다. III-4-1에서 배운 것과 동일한 과정이다.",
        phase: 'commit' },
      { label: "머지 (GUI)", desc: "[STEP 4] GitHub Desktop: main으로 전환 → Branch 메뉴 → 'Merge into current branch' → feature 브랜치 선택. VS Code: Command Palette(Ctrl+Shift+P) → 'Git: Merge Branch' → 브랜치 선택.",
        phase: 'merge' },
      { label: "충돌 해결 (GUI)", desc: "[STEP 5] 충돌이 발생하면 GUI가 충돌 파일을 알려준다. VS Code에서는 충돌 마커 위에 'Accept Current | Accept Incoming | Accept Both' 버튼이 나타난다. 선택 후 커밋하면 충돌 해결 완료.",
        phase: 'conflict' },
    ];

    function Viz_4_1({ step }) {
      const panels = {
        create: { icon: '🌿', title: 'New Branch', items: ['Current Branch ▾', '→ New Branch...', '이름: feature/signup', '[Create Branch]'], color: 'purple' },
        switch: { icon: '🔀', title: 'Switch Branch', items: ['Current Branch ▾', '  main', '  develop', '✓ feature/signup'], color: 'cyan' },
        commit: { icon: '💾', title: 'Commit (feature)', items: ['☑ signup.js  [+]', '☑ style.css  [M]', 'Summary: 회원가입 UI 추가', '[Commit to feature/signup]'], color: 'emerald' },
        merge: { icon: '🔗', title: 'Merge into main', items: ['현재: main', 'Merge: feature/signup', '→ 1 commit will be merged', '[Merge branch]'], color: 'amber' },
        conflict: { icon: '⚠️', title: 'Conflict Resolve', items: ['<<<<<<< HEAD (Current)', 'Accept Current Change', 'Accept Incoming Change', 'Accept Both Changes'], color: 'rose' },
      };
      const p = panels[step.phase];
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-3">
          <div className="text-3xl">{p.icon}</div>
          <div className={`border-2 rounded-xl p-5 max-w-xs w-full bg-${p.color}-50 border-${p.color}-300`}>
            <div className={`text-sm font-bold text-${p.color}-700 mb-3 text-center`}>{p.title}</div>
            <div className="space-y-2">
              {p.items.map((item, i) => (
                <div key={i} className={`text-xs px-3 py-1.5 rounded ${
                  i === p.items.length - 1 ? `bg-${p.color}-200 text-${p.color}-800 font-bold text-center` : 'bg-white border border-slate-200 text-slate-700'
                }`}>{item}</div>
              ))}
            </div>
          </div>
          <div className="text-[10px] text-slate-400 mt-2">
            {step.phase === 'create' && '= git switch -c feature/signup'}
            {step.phase === 'switch' && '= git switch feature/signup'}
            {step.phase === 'commit' && '= git add . && git commit'}
            {step.phase === 'merge' && '= git merge feature/signup'}
            {step.phase === 'conflict' && '→ 충돌 마커를 GUI에서 해결'}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // 섹션 목록
    // ═══════════════════════════════════════════════
    const SECTIONS = [
      { id:"1-1", label:"IV-1-1", title:"변경사항의 여행", steps:STEPS_1_1, Renderer:Viz_1_1 },
      { id:"1-2", label:"IV-1-2", title:"브랜치란 무엇인가", steps:STEPS_1_2, Renderer:Viz_1_2 },
      { id:"1-3", label:"IV-1-3", title:"브랜치 전략", steps:STEPS_1_3, Renderer:Viz_1_3 },
      { id:"2-1", label:"IV-2-1", title:"머지 방식", steps:STEPS_2_1, Renderer:Viz_2_1 },
      { id:"2-2", label:"IV-2-2", title:"충돌 해결", steps:STEPS_2_2, Renderer:Viz_2_2 },
      { id:"3-1", label:"IV-3-1", title:"리베이스", steps:STEPS_3_1, Renderer:Viz_3_1 },
      { id:"3-2", label:"IV-3-2", title:"체리픽", steps:STEPS_3_2, Renderer:Viz_3_2 },
      { id:"4-1", label:"IV-4-1", title:"GUI 브랜치·머지", steps:STEPS_4_1, Renderer:Viz_4_1 },
    ];

    // ═══════════════════════════════════════════════
    // 메인 앱 (테마: purple)
    // ═══════════════════════════════════════════════
    function App() {
      const [sectionIdx, setSectionIdx] = useState(0);
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const section = SECTIONS[sectionIdx];
      const step = section.steps[stepIdx];
      const isEnd = stepIdx === section.steps.length - 1;
      const Renderer = section.Renderer;

      const handleTabChange = (idx) => { setSectionIdx(idx); setStepIdx(0); setIsPlaying(false); };
      const handleNext = () => { setStepIdx(prev => { if (prev < section.steps.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (stepIdx > 0) { setStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => handleNextRef.current(), 2800); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-4">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between flex-wrap gap-2">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-xs">IV</div>
                  <div>
                    <h1 className="text-xl font-bold text-slate-800">Part IV. 브랜치·머지·리베이스</h1>
                    <p className="text-xs text-slate-500">병렬 작업의 핵심인 브랜치를 이해하고 변경사항이 합쳐지는 과정을 체험한다.</p>
                  </div>
                </div>
                <a href="../index.html" className="text-xs text-purple-600 hover:underline font-medium">← 전체 목차</a>
              </div>
            </header>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-1 flex gap-1 overflow-x-auto">
              {SECTIONS.map((s, i) => (
                <button key={s.id} onClick={() => handleTabChange(i)} aria-label={`${s.label} — ${s.title} 섹션으로 이동`}
                  className={`flex-1 min-w-[90px] px-2 py-2 rounded-lg text-xs font-medium transition-all
                    ${i === sectionIdx ? 'bg-purple-600 text-white shadow-sm' : 'text-slate-500 hover:bg-slate-100'}`}>
                  <div className="font-bold">{s.label}</div>
                  <div className={`mt-0.5 text-[10px] ${i === sectionIdx ? 'text-purple-200' : 'text-slate-400'}`}>{s.title}</div>
                </button>
              ))}
            </div>

            <div className="bg-purple-700 text-white p-4 rounded-xl shadow-sm border border-purple-800 min-h-[80px] flex flex-col justify-center">
              <h3 className="text-[10px] font-bold text-purple-200 uppercase tracking-wider mb-1">{section.label} — {step.label}</h3>
              <p className="text-sm md:text-base font-medium leading-relaxed">{step.desc}</p>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 min-h-[320px] md:min-h-[380px]">
              <Renderer step={step} />
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={stepIdx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button aria-label={isPlaying?'정지':'자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-purple-600 hover:bg-purple-700 text-white font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="flex items-center gap-3">
                <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step {stepIdx+1} / {section.steps.length}</div>
                <div className="flex gap-1">
                  {section.steps.map((_,i)=>(
                    <button key={i} onClick={()=>{setStepIdx(i);setIsPlaying(false);}} aria-label={`Step ${i+1}로 이동`}
                      className={`w-2.5 h-2.5 rounded-full transition-all ${i===stepIdx?'bg-purple-500 scale-125':i<stepIdx?'bg-purple-300':'bg-slate-200'}`}/>
                  ))}
                </div>
              </div>
            </div>
            <footer className="text-center text-xs text-slate-400 py-2">Git & GitHub 사다리형 학습 커리큘럼 — Part IV 시각화</footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
<script src="sidebar.js"></script>
</body>
</html>
