            '| 3-way        |      O       | лӢӨмқҙм•„лӘ¬л“ң | м–‘мӘҪм—җ м»Өл°Ӣ вҖ” gitмқҳ кё°ліё мһҗлҸҷ лҸҷмһ‘ |',
            '| Squash       |  O (1к°ң)     | мқјм§Ғм„      | feature м»Өл°Ӣмқҙ м§Җм Җл¶„н•  л•Ң         |',
            '| --no-ff      |      O       | лӢӨмқҙм•„лӘ¬л“ң | нҢҖ м •мұ… вҖ” лёҢлһңм№ҳ нқ”м Ғ н•ӯмғҒ лӮЁкё°кё°  |',
            '',
            '## мқҳмӮ¬кІ°м • нқҗлҰ„',
            '',
            '1. **к°ңмқё нҶ мқҙ н”„лЎңм қнҠё** вҶ’ Fast-forward (лӢЁмҲңн•Ё)',
            '2. **нҡҢмӮ¬ PR лЁём§Җ** вҶ’ Squash лҳҗлҠ” --no-ff мӨ‘ нҢҖ м •мұ… л”°лҘҙкё°',
            '3. **лҰҙлҰ¬мҠӨ лёҢлһңм№ҳ нҶөн•©** вҶ’ --no-ff (лЎӨл°ұ лӢЁмң„ м¶”м Ғ)',
            '4. **WIP м»Өл°Ӣ л§ҺмқҖ feature** вҶ’ Squash (main нһҲмҠӨнҶ лҰ¬ к№”лҒ”)',
            '',
            '## GitHub PR м„Өм •кіјмқҳ л§Өн•‘',
            '',
            '- Create a merge commit  вҶ’ `git merge --no-ff`',
            '- Squash and merge       вҶ’ `git merge --squash` + commit',
            '- Rebase and merge       вҶ’ `git rebase` + fast-forward',
            '',
            '## нҢҖм—җм„ң н•ң к°Җм§Җ кіЁлқјлқј',
            '',
            '> к°ҖмһҘ нҒ° мӢӨмҲҳлҠ” "мӮ¬лһҢл§ҲлӢӨ лӢӨлҘё м „лһөмқ„ м“°лҠ” кІғ"мқҙлӢӨ.',
            '> Repo м •мұ…мңјлЎң н•ң к°Җм§ҖлҘј к°•м ңн•ҳкі , GitHub Settings вҶ’ Branchesм—җм„ң мһ к·јлӢӨ.',
          ],
        },
      },
    ];

    // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
    // BranchGraph вҖ” мўҢмёЎ лёҢлһңм№ҳ к·ёлһҳн”„ мӢңк°Ғнҷ”
    // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
    /**
     * лёҢлһңм№ҳ к·ёлһҳн”„ SVG мӢңк°Ғнҷ”
     * modeм—җ л”°лқј ff / 3way / squash / noff / compare л ҢлҚ” л¶„кё°
     * Args: graph (нҳ„мһ¬ stepмқҳ к·ёлһҳн”„ лҚ°мқҙн„°)
     */
    function BranchGraph({ graph }) {
      if (graph.mode === 'compare') {
        return <CompareTable />;
      }

      const { mode, mainBeforeMerge, featureCommits, mergeCommit, headLabel } = graph;

      // мўҢн‘ң кі„мӮ°: main лқјмқё y=80, feature лқјмқё y=160
      const dotSize = 18;
      const stepX = 70;
      const startX = 60;
      const mainY = 80;
      const featureY = 170;

      // modeлі„ мўҢн‘ң кІ°м •
      let mainNodes = [];
      let featureNodes = [];
      let mergeNode = null;
      let mergeFromMainIdx = null;
      let mergeFromFeatureIdx = null;

      if (mode === 'ff') {
        // main C1 C2 C3 вҖ” featureлҠ” C3 л¶„кё° нӣ„ F1 F2, merge нӣ„ mainмқҙ F2лҘј к°ҖлҰ¬нӮҙ
        mainNodes = mainBeforeMerge.map((c, i) => ({ label: c, x: startX + i * stepX, y: mainY }));
        const branchStartIdx = mainBeforeMerge.length - 1;
        featureNodes = featureCommits.map((c, i) => ({
          label: c,
          x: startX + (branchStartIdx + 1 + i) * stepX,
          y: mainY,  // ffлҠ” мқјм§Ғм„  вҖ” featureлҸ„ main лқјмқё мң„лЎң н•©міҗм§җ
        }));
      } else if (mode === '3way' || mode === 'noff') {
        // main: C1 C2 C3 [M1] вҖ” featureлҠ” C3м—җм„ң л¶„кё°
        mainNodes = mainBeforeMerge.map((c, i) => ({ label: c, x: startX + i * stepX, y: mainY }));
        const branchOriginIdx = (mode === '3way') ? 2 : 2; // C3м—җм„ң л¶„кё°
        featureNodes = featureCommits.map((c, i) => ({
          label: c,
          x: startX + (branchOriginIdx + 1 + i) * stepX,
          y: featureY,
        }));
        // merge commitмқҖ main лқјмқё мң„, feature лҒқ лӢӨмқҢ м№ё
        const mergeX = startX + (mainNodes.length + featureNodes.length) * stepX - stepX;
        mergeNode = { label: mergeCommit, x: mergeX + stepX, y: mainY };
        mergeFromMainIdx = mainNodes.length - 1;
        mergeFromFeatureIdx = featureNodes.length - 1;
      } else if (mode === 'squash') {
        // main: C1 C2 C3 M1 вҖ” feature C3м—җм„ң л¶„кё° вҖ” squashлҠ” main лҒқм—җ SQ 1к°ңл§Ң м¶”к°Җ, feature лқјмқёмқҖ mainм—җ лҜём—°кІ°
        mainNodes = mainBeforeMerge.map((c, i) => ({ label: c, x: startX + i * stepX, y: mainY }));
        featureNodes = featureCommits.map((c, i) => ({
          label: c,
          x: startX + (3 + i) * stepX,
          y: featureY,
        }));
        const sqX = startX + mainNodes.length * stepX;
        mergeNode = { label: mergeCommit, x: sqX, y: mainY };
        mergeFromMainIdx = mainNodes.length - 1;
        mergeFromFeatureIdx = null; // squashлҠ” featureмҷҖ л¶ҖлӘЁ кҙҖкі„ м—ҶмқҢ
      }

      const colorByMode = {
        ff: { main: '#64748b', feature: '#0ea5e9', merge: '#10b981' },
        '3way': { main: '#64748b', feature: '#0ea5e9', merge: '#f59e0b' },
        squash: { main: '#64748b', feature: '#94a3b8', merge: '#8b5cf6' },
        noff: { main: '#64748b', feature: '#0ea5e9', merge: '#f43f5e' },
      };
      const colors = colorByMode[mode];

      const svgWidth = Math.max(560, startX + (mainNodes.length + featureNodes.length + 2) * stepX);
      const svgHeight = 240;

      const modeTitle = {
        ff: 'Fast-forward',
        '3way': '3-way Merge',
        squash: 'Squash Merge',
        noff: '--no-ff (к°•м ң Merge Commit)',
      }[mode];

      return (
        <div className="flex flex-col h-full p-4">
          <div className="flex items-center justify-between mb-3">
            <div className="text-xs font-bold text-slate-700 bg-slate-100 px-3 py-1 rounded-full">
              {modeTitle}
            </div>
            <div className="text-[10px] text-slate-500 font-mono">HEAD: {headLabel}</div>
          </div>

          <div className="flex-1 overflow-auto bg-gradient-to-br from-slate-50 to-slate-100 rounded-lg border border-slate-200">
            <svg width={svgWidth} height={svgHeight} className="block min-w-full">
              {/* main лқјлІЁ */}
              <text x="10" y={mainY + 4} className="text-[10px]" fill="#475569" fontFamily="monospace">main</text>
              {mode !== 'squash' && featureNodes.length > 0 && (
                <text x="10" y={featureY + 4} className="text-[10px]" fill="#0284c7" fontFamily="monospace">feature</text>
              )}
              {mode === 'squash' && (
                <text x="10" y={featureY + 4} className="text-[10px]" fill="#64748b" fontFamily="monospace">feature</text>
              )}

              {/* main лқјмқё м—°кІ° */}
              {mainNodes.length > 1 && (
                <line x1={mainNodes[0].x} y1={mainY} x2={mainNodes[mainNodes.length - 1].x} y2={mainY}
                      stroke={colors.main} strokeWidth="2" />
              )}

              {/* ff: feature л…ёл“ңлҸ„ main лқјмқё мң„ вҖ” к·ёлҢҖлЎң м§Ғм„  м—°мһҘ */}
              {mode === 'ff' && featureNodes.length > 0 && (
                <line x1={mainNodes[mainNodes.length - 1].x} y1={mainY}
                      x2={featureNodes[featureNodes.length - 1].x} y2={mainY}
                      stroke={colors.feature} strokeWidth="2" className="draw-line" />
              )}

              {/* 3way / noff: л¶„кё° кіЎм„  */}
              {(mode === '3way' || mode === 'noff') && featureNodes.length > 0 && (
                <>
                  {/* л¶„кё°м җ вҶ’ мІ« feature л…ёл“ң */}
                  <path d={`M ${mainNodes[2].x} ${mainY} Q ${mainNodes[2].x + 30} ${(mainY + featureY) / 2} ${featureNodes[0].x} ${featureY}`}
                        stroke={colors.feature} strokeWidth="2" fill="none" className="draw-line" />
                  {/* feature лқјмқё */}
                  {featureNodes.length > 1 && (
                    <line x1={featureNodes[0].x} y1={featureY}
                          x2={featureNodes[featureNodes.length - 1].x} y2={featureY}
                          stroke={colors.feature} strokeWidth="2" />
                  )}
                  {/* feature лҒқ вҶ’ merge */}
                  {mergeNode && (
                    <path d={`M ${featureNodes[featureNodes.length - 1].x} ${featureY} Q ${mergeNode.x - 30} ${(mainY + featureY) / 2} ${mergeNode.x} ${mainY}`}
                          stroke={colors.merge} strokeWidth="2" fill="none" className="draw-line" />
                  )}
                  {/* main лҒқ вҶ’ merge */}
                  {mergeNode && (
                    <line x1={mainNodes[mainNodes.length - 1].x} y1={mainY}
                          x2={mergeNode.x} y2={mainY}
                          stroke={colors.merge} strokeWidth="2" />
                  )}
                </>
              )}

              {/* squash: feature лқјмқё л¶„лҰ¬ + main лҒқм—җ SQ м¶”к°Җ, м җм„ мңјлЎң squash н‘ңмӢң */}
              {mode === 'squash' && (
                <>
                  {/* feature л¶„кё° кіЎм„  */}
                  <path d={`M ${mainNodes[2].x} ${mainY} Q ${mainNodes[2].x + 30} ${(mainY + featureY) / 2} ${featureNodes[0].x} ${featureY}`}
                        stroke={colors.feature} strokeWidth="2" fill="none" strokeDasharray="4,3" />
                  <line x1={featureNodes[0].x} y1={featureY}
                        x2={featureNodes[featureNodes.length - 1].x} y2={featureY}
                        stroke={colors.feature} strokeWidth="2" strokeDasharray="4,3" />
                  {/* main лҒқ вҶ’ SQ */}
                  {mergeNode && (
                    <line x1={mainNodes[mainNodes.length - 1].x} y1={mainY}
                          x2={mergeNode.x} y2={mainY}
                          stroke={colors.merge} strokeWidth="2" />
                  )}
                  {/* squash нҷ”мӮҙн‘ң вҖ” feature лҒқм—җм„ң SQлЎң м җм„  */}
                  {mergeNode && (
                    <path d={`M ${featureNodes[featureNodes.length - 1].x} ${featureY} L ${mergeNode.x} ${mainY + 10}`}
                          stroke={colors.merge} strokeWidth="1.5" fill="none" strokeDasharray="2,2"
                          markerEnd="url(#arrowSq)" />
                  )}
                  <defs>
                    <marker id="arrowSq" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                      <path d="M 0 0 L 10 5 L 0 10 z" fill={colors.merge} />
                    </marker>
                  </defs>
                </>
              )}

              {/* main л…ёл“ңл“Ө */}
              {mainNodes.map((n, i) => (
                <g key={`m-${i}`} className="fade-in-up">
                  <circle cx={n.x} cy={n.y} r={dotSize / 2} fill={colors.main} stroke="white" strokeWidth="2" />
                  <text x={n.x} y={n.y + 4} textAnchor="middle" fill="white" fontSize="9" fontFamily="monospace" fontWeight="bold">{n.label}</text>
                </g>
              ))}

              {/* feature л…ёл“ңл“Ө */}
              {featureNodes.map((n, i) => (
                <g key={`f-${i}`} className="fade-in-up">
                  <circle cx={n.x} cy={n.y} r={dotSize / 2}
                          fill={mode === 'squash' ? '#cbd5e1' : colors.feature}
                          stroke="white" strokeWidth="2" />
                  <text x={n.x} y={n.y + 4} textAnchor="middle"
                        fill={mode === 'squash' ? '#475569' : 'white'}
                        fontSize="9" fontFamily="monospace" fontWeight="bold">{n.label}</text>
                </g>
              ))}

              {/* merge л…ёл“ң вҖ” к°•мЎ° */}
              {mergeNode && (
                <g className="fade-in-up">
                  <circle cx={mergeNode.x} cy={mergeNode.y} r={dotSize / 2 + 2}
                          fill={colors.merge} stroke="white" strokeWidth="3" className="pulse-dot" />
                  <text x={mergeNode.x} y={mergeNode.y + 4} textAnchor="middle" fill="white" fontSize="9" fontFamily="monospace" fontWeight="bold">{mergeNode.label}</text>
                </g>
              )}

              {/* HEAD нҸ¬мқён„° */}
              {mergeNode ? (
                <g>
                  <rect x={mergeNode.x - 22} y={mergeNode.y - 35} width="44" height="14" rx="3" fill="#1e293b" />
                  <text x={mergeNode.x} y={mergeNode.y - 25} textAnchor="middle" fill="white" fontSize="9" fontFamily="monospace" fontWeight="bold">HEAD</text>
                  <line x1={mergeNode.x} y1={mergeNode.y - 21} x2={mergeNode.x} y2={mergeNode.y - 12}
                        stroke="#1e293b" strokeWidth="1.5" />
                </g>
              ) : (mode === 'ff' && featureNodes.length > 0 ? (
                <g>
                  <rect x={featureNodes[featureNodes.length - 1].x - 22} y={mainY - 35} width="44" height="14" rx="3" fill="#1e293b" />
                  <text x={featureNodes[featureNodes.length - 1].x} y={mainY - 25} textAnchor="middle" fill="white" fontSize="9" fontFamily="monospace" fontWeight="bold">HEAD</text>
                  <line x1={featureNodes[featureNodes.length - 1].x} y1={mainY - 21} x2={featureNodes[featureNodes.length - 1].x} y2={mainY - 12}
                        stroke="#1e293b" strokeWidth="1.5" />
                </g>
              ) : null)}
            </svg>
          </div>

          {/* лІ”лЎҖ */}
          <div className="mt-3 flex flex-wrap gap-3 text-[11px] text-slate-600">
            <div className="flex items-center gap-1.5">
              <span className="w-3 h-3 rounded-full inline-block" style={{ background: colors.main }}></span>
              <span>main м»Өл°Ӣ</span>
            </div>
            {featureNodes.length > 0 && (
              <div className="flex items-center gap-1.5">
                <span className="w-3 h-3 rounded-full inline-block" style={{ background: mode === 'squash' ? '#cbd5e1' : colors.feature }}></span>
                <span>feature м»Өл°Ӣ</span>
              </div>
            )}
            {mergeNode && (
              <div className="flex items-center gap-1.5">
                <span className="w-3 h-3 rounded-full inline-block pulse-dot" style={{ background: colors.merge }}></span>
                <span>{mode === 'squash' ? 'Squash м»Өл°Ӣ (м••м¶• 1к°ң)' : 'Merge Commit'}</span>
              </div>
            )}
          </div>
        </div>
      );
    }

    // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
    // CompareTable вҖ” Step 5 л№„көҗн‘ң
    // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
    /**
     * 4к°Җм§Җ м „лһө л№„көҗн‘ң м»ҙнҸ¬л„ҢнҠё
     */
    function CompareTable() {
      const rows = [
        { name: 'Fast-forward', mc: 'X', shape: 'мқјм§Ғм„ ', when: 'к°ңмқё лёҢлһңм№ҳ, main ліҖкІҪ м—ҶмқҢ', color: 'emerald' },
        { name: '3-way', mc: 'O', shape: 'лӢӨмқҙм•„лӘ¬л“ң', when: 'м–‘мӘҪ м»Өл°Ӣ мһҲмқҢ (кё°ліё)', color: 'amber' },
        { name: 'Squash', mc: 'O (1к°ң)', shape: 'мқјм§Ғм„ ', when: 'feature м»Өл°Ӣ м§Җм Җл¶„н•  л•Ң', color: 'violet' },
        { name: '--no-ff', mc: 'O', shape: 'лӢӨмқҙм•„лӘ¬л“ң', when: 'нҢҖ м •мұ… вҖ” нқ”м Ғ н•ӯмғҒ лӮЁкё°кё°', color: 'rose' },
      ];
      return (
        <div className="flex flex-col h-full p-4">
          <div className="text-xs font-bold text-slate-700 bg-slate-100 px-3 py-1 rounded-full self-start mb-3">
            м „лһө л№„көҗ вҖ” м–ҙлҠҗ кІғмқ„ м–ём ң
          </div>
          <div className="flex-1 overflow-auto bg-gradient-to-br from-slate-50 to-slate-100 rounded-lg border border-slate-200 p-3">
            <table className="w-full text-xs border-collapse">
              <thead>
                <tr className="bg-slate-200 text-slate-700">
                  <th className="px-2 py-2 text-left font-bold">м „лһө</th>
                  <th className="px-2 py-2 text-center font-bold">Merge Commit</th>
                  <th className="px-2 py-2 text-left font-bold">нһҲмҠӨнҶ лҰ¬</th>
                  <th className="px-2 py-2 text-left font-bold">м–ём ң м“°лӮҳ</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r, i) => (
                  <tr key={i} className={`fade-in-up bg-${r.color}-50 border-b border-slate-200`}
                      style={{ animationDelay: `${i * 0.1}s` }}>
                    <td className={`px-2 py-2 font-bold text-${r.color}-700`}>{r.name}</td>
                    <td className="px-2 py-2 text-center font-mono">{r.mc}</td>
                    <td className="px-2 py-2 text-slate-700">{r.shape}</td>
                    <td className={`px-2 py-2 text-${r.color}-800 text-[11px]`}>{r.when}</td>
                  </tr>
                ))}
              </tbody>
            </table>

            <div className="mt-4 bg-white rounded-lg border border-slate-200 p-3 text-[11px] text-slate-700 leading-relaxed">
              <div className="font-bold text-slate-800 mb-1">мқҳмӮ¬кІ°м • н•ң мӨ„ мҡ”м•Ҫ</div>
              <div className="space-y-1">
                <div><span className="font-mono text-emerald-700">к°ңмқё мһ‘м—…</span> вҶ’ Fast-forward</div>
                <div><span className="font-mono text-violet-700">PR + WIP м»Өл°Ӣ л§ҺмқҢ</span> вҶ’ Squash</div>
                <div><span className="font-mono text-rose-700">нҢҖ нҳ‘м—… + нқ”м Ғ ліҙмЎҙ</span> вҶ’ --no-ff</div>
                <div><span className="font-mono text-amber-700">м–‘мӘҪ м»Өл°Ӣ мһҲмқҢ (кё°ліё лҸҷмһ‘)</span> вҶ’ 3-way</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
    // CodeViewer вҖ” VSCode мҠӨнғҖмқј мҪ”л“ң (highlight.js)
    // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
    /**
     * мҡ°мёЎ мҪ”л“ң л·°м–ҙ (VSCode лӢӨнҒ¬ н…Ңл§Ҳ + лқјмқё лІҲнҳё + highlight.js)
     */
    function CodeViewer({ code }) {
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          // мқҙм „ highlight кІ°кіј мҙҲкё°нҷ”
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const fullText = code.lines.join('\n');

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg flex flex-col h-full">
          {/* мңҲлҸ„мҡ° dot + нҢҢмқјлӘ… нғӯ */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700 flex-shrink-0">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-300 ml-2 font-mono bg-[#282c34] px-3 py-0.5 rounded-t border-t border-l border-r border-slate-600">
              {code.filename}
            </span>
            <span className="text-[10px] text-slate-500 ml-auto font-mono">{code.lang}</span>
          </div>

          {/* мҪ”л“ң + лқјмқё лІҲнҳё вҖ” highlight.jsлЎң н•ң лІҲм—җ к°•мЎ°н•ң л’Ө лқјмқёлі„ л¶„лҰ¬ */}
          <div className="overflow-auto text-xs flex-1" style={{ maxHeight: '32rem' }}>
            <pre className="p-0 m-0 hidden">
              <code ref={codeRef} className={`language-${code.lang}`}>{fullText}</code>
            </pre>
            <CodeLines code={code} highlightedRef={codeRef} />
          </div>
        </div>
      );
    }

    /**
     * лқјмқёлі„ л¶„лҰ¬ л ҢлҚ”л§Ғ вҖ” highlight.jsк°Җ мҪ”л“ңлҘј к°•мЎ°н•ң нӣ„ innerHTMLмқ„ лқјмқё лӢЁмң„лЎң мһҳлқј н‘ңмӢң
     */
    function CodeLines({ code, highlightedRef }) {
      const [linesHtml, setLinesHtml] = useState(code.lines);

      useEffect(() => {
        // highlight.js мІҳлҰ¬ нӣ„ лқјмқёлі„ HTML м¶”м¶ң
        const tick = setTimeout(() => {
          if (highlightedRef.current) {
            const html = highlightedRef.current.innerHTML;
            // <span class="hljs-..."></span>мқҙ мӨ„л°”кҝҲмқ„ к°ҖлЎңм§ҖлҘј мҲҳ мһҲм–ҙм„ң мӨ„лі„ splitмқҙ лӢЁмҲң \nмңјлЎңлҠ” к№Ём§Ҳ мҲҳ мһҲлӢӨ вҶ’ м•Ҳм „н•ң fallback
            const split = html.split('\n');
            if (split.length === code.lines.length) {
              setLinesHtml(split);
            } else {
              setLinesHtml(code.lines);
            }
          }
        }, 30);
        return () => clearTimeout(tick);
      }, [code]);

      return (
        <pre className="p-0 m-0">
          <code className={`language-${code.lang} block hljs`}>
            {linesHtml.map((line, i) => {
              const highlighted = code.highlight && code.highlight.includes(i + 1);
              const isHtml = typeof linesHtml[0] !== 'undefined' && linesHtml !== code.lines;
              return (
                <div key={i} className={`flex ${highlighted ? 'bg-yellow-500/15 border-l-2 border-yellow-400' : ''}`}>
                  <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0 font-mono">
                    {i + 1}
                  </span>
                  {isHtml ? (
                    <span className="pl-3 pr-3 whitespace-pre" dangerouslySetInnerHTML={{ __html: line || '&nbsp;' }} />
                  ) : (
                    <span className="pl-3 pr-3 whitespace-pre">{line || 'В '}</span>
                  )}
                </div>
              );
            })}
          </code>
        </pre>
      );
    }

    // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
    // App вҖ” л©”мқё м»ҙнҸ¬л„ҢнҠё
    // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const step = STEPS[stepIdx];
      const isEnd = stepIdx === STEPS.length - 1;

      // мһҗлҸҷмһ¬мғқ вҖ” 3000ms к°„кІ©
      useEffect(() => {
        if (isPlaying) {
          playRef.current = setInterval(() => {
            setStepIdx(prev => {
              if (prev < STEPS.length - 1) return prev + 1;
              setIsPlaying(false);
              return prev;
            });
          }, 3000);
        } else {
          clearInterval(playRef.current);
        }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      // нӮӨліҙл“ң вҶҗ/вҶ’ л„Өл№„кІҢмқҙм…ҳ
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight' && stepIdx < STEPS.length - 1) {
            setStepIdx(stepIdx + 1);
            setIsPlaying(false);
          }
          if (e.key === 'ArrowLeft' && stepIdx > 0) {
            setStepIdx(stepIdx - 1);
            setIsPlaying(false);
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [stepIdx]);

      const handleFirst = () => { setStepIdx(0); setIsPlaying(false); };
      const handlePrev = () => { if (stepIdx > 0) { setStepIdx(stepIdx - 1); setIsPlaying(false); } };
      const handleNext = () => { if (stepIdx < STEPS.length - 1) { setStepIdx(stepIdx + 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setStepIdx(0); setIsPlaying(p => !p); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-7xl mx-auto space-y-4">

            {/* Header */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between flex-wrap gap-2">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-slate-700 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                  <div>
                    <h1 className="text-xl font-bold text-slate-800">Part IV. Merge м „лһө</h1>
                    <p className="text-xs text-slate-500">Fast-forward / 3-way / Squash / --no-ff вҖ” к·ёлһҳн”„ ліҖнҷ”лЎң н•ңлҲҲм—җ л№„көҗ</p>
                  </div>
                </div>
                <a href="../index.html" className="text-xs text-slate-600 hover:text-slate-900 hover:underline font-medium">вҶҗ м „мІҙ лӘ©м°Ё</a>
              </div>
            </header>

            {/* Description Panel */}
            <div className="bg-slate-700 text-white p-4 rounded-xl shadow-sm border border-slate-800">
              <div className="flex items-baseline gap-3 mb-1">
                <span className="text-[10px] font-bold text-slate-300 uppercase tracking-wider bg-slate-600 px-2 py-0.5 rounded">
                  STEP {stepIdx + 1} / {STEPS.length}
                </span>
                <h3 className="text-sm font-bold text-white">{step.title}</h3>
              </div>
              <p className="text-sm font-medium leading-relaxed text-slate-100">{step.desc}</p>
            </div>

            {/* мўҢ/мҡ° 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              {/* мўҢ: лёҢлһңм№ҳ к·ёлһҳн”„ */}
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 min-h-[460px]">
                <BranchGraph graph={step.graph} />
              </div>
              {/* мҡ°: мҪ”л“ң */}
              <div className="min-h-[460px]">
                <CodeViewer code={step.code} />
              </div>
            </div>

            {/* Controls вҖ” 4 лІ„нҠј */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handleFirst} aria-label="мІҳмқҢмңјлЎң"
                        className="px-3 py-2 rounded bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-medium transition disabled:opacity-50"
                        disabled={stepIdx === 0}>
                  мІҳмқҢ
                </button>
                <button onClick={handlePrev} aria-label="мқҙм „ лӢЁкі„"
                        className="px-3 py-2 rounded bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-medium transition disabled:opacity-50"
                        disabled={stepIdx === 0}>
                  вҶҗ мқҙм „
                </button>
                <button onClick={togglePlay} aria-label={isPlaying ? 'м •м§Җ' : 'мһҗлҸҷмһ¬мғқ'}
                        className="flex items-center px-4 py-2 rounded bg-slate-700 hover:bg-slate-800 text-white text-xs font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying ? (
                    <>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2">
                        <rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" />
                      </svg>
                      м •м§Җ
                    </>
                  ) : (
                    <>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2">
                        <polygon points="5 3 19 12 5 21 5 3" />
                      </svg>
                      мһҗлҸҷмһ¬мғқ
                    </>
                  )}
                </button>
                <button onClick={handleNext} aria-label="лӢӨмқҢ лӢЁкі„"
                        className="px-3 py-2 rounded bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-medium transition disabled:opacity-50"
                        disabled={isEnd}>
                  лӢӨмқҢ вҶ’
                </button>
              </div>
              <div className="flex items-center gap-3">
                <div className="text-xs font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-200">
                  Step {stepIdx + 1} / {STEPS.length}
                </div>
                <div className="flex gap-1">
                  {STEPS.map((_, i) => (
                    <button key={i} onClick={() => { setStepIdx(i); setIsPlaying(false); }}
                            aria-label={`Step ${i + 1}лЎң мқҙлҸҷ`}
                            className={`w-2.5 h-2.5 rounded-full transition-all
                              ${i === stepIdx ? 'bg-slate-700 scale-125'
                                : i < stepIdx ? 'bg-slate-400'
                                : 'bg-slate-200'}`} />
                  ))}
                </div>
              </div>
            </div>

            {/* нӮӨліҙл“ң нһҢнҠё */}
            <div className="text-center text-[11px] text-slate-400">
              нӮӨліҙл“ң вҶҗ / вҶ’ лЎң лӢЁкі„лҘј мқҙлҸҷн•  мҲҳ мһҲлӢӨ
            </div>

            <footer className="text-center text-xs text-slate-400 py-2">
              Git &amp; GitHub мӮ¬лӢӨлҰ¬нҳ• н•ҷмҠө м»ӨлҰ¬нҒҳлҹј вҖ” Part IV: Merge м „лһө
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script src="sidebar.js"></script>
</body>
</html>
