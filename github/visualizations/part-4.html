<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Part IV. Merge 전략 — Fast-forward / 3-way / Squash 인터랙티브 시각화</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🔀</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <style>
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseDot { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
    @keyframes drawLine { from { stroke-dashoffset: 200; } to { stroke-dashoffset: 0; } }
    .fade-in-up { animation: fadeInUp 0.5s ease-out both; }
    .pulse-dot { animation: pulseDot 1.6s ease-in-out infinite; }
    .draw-line { stroke-dasharray: 200; animation: drawLine 0.9s ease-out forwards; }
    .hljs { background: #282c34 !important; padding: 0 !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    /**
     * Part IV. Merge 전략 시각화
     * 파일 경로: github/visualizations/part-4.html
     * 목적: 5단계로 git merge의 세 전략(ff / 3-way / squash / no-ff)을 비교 학습
     * 패턴: docs/design/pattern-fastapi.md 준수 (좌 그래프 + 우 코드)
     */
    const { useState, useEffect, useRef } = React;

    // ═══════════════════════════════════════════════
    // STEPS — 5단계 시나리오
    // ═══════════════════════════════════════════════
    const STEPS = [
      // ───────────────────────────────────────────
      // Step 1: Fast-forward Merge — 그래프 일직선
      // ───────────────────────────────────────────
      {
        title: 'Fast-forward Merge — 일직선 히스토리',
        desc: '[STEP 1] main이 분기 후 새 커밋을 쌓지 않았다면 git은 단순히 main 포인터를 feature의 끝으로 옮긴다. Merge Commit이 생기지 않고 그래프가 일직선으로 유지된다.',
        graph: {
          mode: 'ff',
          mainBeforeMerge: ['C1', 'C2', 'C3'],
          featureCommits: ['F1', 'F2'],
          mergeCommit: null,
          mainAfterMerge: ['C1', 'C2', 'C3', 'F1', 'F2'],
          headLabel: 'main → F2',
        },
        code: {
          filename: 'ff.sh',
          lang: 'bash',
          highlight: [9, 10, 11],
          lines: [
            '#!/bin/bash',
            '# Fast-forward merge — 그래프가 일직선으로 유지되는 가장 단순한 머지',
            '',
            '# 1) main 분기 시점에서 feature 브랜치 생성',
            'git switch -c feature/login',
            'echo "login" > login.js && git add . && git commit -m "F1"',
            'echo "auth"  > auth.js  && git add . && git commit -m "F2"',
            '',
            '# 2) main으로 돌아가서 merge — main에는 새 커밋이 없으므로 fast-forward',
            'git switch main',
            'git merge feature/login   # Fast-forward로 자동 진행',
            '',
            '# 결과: main이 F2를 가리키게 됨, Merge Commit 없음',
            'git log --oneline --graph',
            '# * F2',
            '# * F1',
            '# * C3',
            '# * C2',
            '# * C1',
          ],
        },
      },
      // ───────────────────────────────────────────
      // Step 2: 3-way Merge — Merge Commit 생성
      // ───────────────────────────────────────────
      {
        title: '3-way Merge — Merge Commit 생성',
        desc: '[STEP 2] 양쪽 브랜치 모두 새 커밋이 쌓였다면 git은 공통 조상(C3)과 양쪽 끝(M1, F2) 세 지점을 비교해 Merge Commit(MC)을 생성한다. 그래프가 다이아몬드 모양으로 갈라졌다 합쳐진다.',
        graph: {
          mode: '3way',
          mainBeforeMerge: ['C1', 'C2', 'C3', 'M1'],
          featureCommits: ['F1', 'F2'],
          mergeCommit: 'MC',
          mainAfterMerge: ['C1', 'C2', 'C3', 'M1', 'F1', 'F2', 'MC'],
          headLabel: 'main → MC',
        },
        code: {
          filename: 'three-way.sh',
          lang: 'bash',
          highlight: [11, 12],
          lines: [
            '#!/bin/bash',
            '# 3-way merge — main과 feature 양쪽에 커밋이 있을 때 자동 생성되는 Merge Commit',
            '',
            '# 1) feature에서 작업',
            'git switch -c feature/signup',
            'echo "signup" > signup.js && git add . && git commit -m "F1"',
            'echo "form"   > form.js   && git add . && git commit -m "F2"',
            '',
            '# 2) 동시에 main에도 다른 커밋이 들어왔다고 가정',
            'git switch main',
            'echo "fix" > bugfix.js && git add . && git commit -m "M1"',
            '',
            '# 3) merge 시도 — fast-forward 불가능 → 3-way merge로 자동 전환',
            'git merge feature/signup',
            '# Merge made by the recursive strategy.',
            '',
            '# 결과: 다이아몬드 그래프, MC(Merge Commit)가 두 부모(M1, F2)를 가짐',
            'git log --oneline --graph',
            '# *   MC  Merge branch feature/signup',
            '# |\\',
            '# | * F2',
            '# | * F1',
            '# * | M1',
            '# |/',
            '# * C3',
          ],
        },
      },
      // ───────────────────────────────────────────
      // Step 3: Squash Merge — 모든 커밋을 1개로 압축
      // ───────────────────────────────────────────
      {
        title: 'Squash Merge — 여러 커밋을 1개로 압축',
        desc: '[STEP 3] git merge --squash는 feature의 모든 커밋(F1, F2)을 합쳐 main에 단 하나의 새 커밋(SQ)으로 추가한다. feature 히스토리는 main에 보존되지 않고, main 히스토리는 평평하게 유지된다.',
        graph: {
          mode: 'squash',
          mainBeforeMerge: ['C1', 'C2', 'C3', 'M1'],
          featureCommits: ['F1', 'F2'],
          mergeCommit: 'SQ',
          mainAfterMerge: ['C1', 'C2', 'C3', 'M1', 'SQ'],
          headLabel: 'main → SQ',
        },
        code: {
          filename: 'squash.sh',
          lang: 'bash',
          highlight: [9, 10, 11, 12],
          lines: [
            '#!/bin/bash',
            '# Squash merge — feature의 여러 커밋을 1개로 압축해서 main에 적용',
            '',
            '# 1) feature 브랜치에 작업 커밋 여러 개',
            'git switch feature/signup',
            '# F1 "WIP signup", F2 "fix typo", F3 "add validation" ... 지저분한 히스토리',
            '',
            '# 2) main으로 돌아가 squash merge',
            'git switch main',
            'git merge --squash feature/signup',
            '# Squash commit -- not updating HEAD',
            'git commit -m "feat(signup): 회원가입 기능 추가"   # 새 단일 커밋 생성',
            '',
            '# 결과: main에는 깔끔한 1개 커밋만 추가됨',
            '# feature의 F1/F2/F3는 main 히스토리에 노출되지 않음',
            'git log --oneline --graph',
            '# * SQ  feat(signup): 회원가입 기능 추가',
            '# * M1  fix something',
            '# * C3',
            '',
            '# 주의: feature 브랜치는 자동 삭제되지 않으므로 별도 정리 필요',
            'git branch -d feature/signup',
          ],
        },
      },
      // ───────────────────────────────────────────
      // Step 4: --no-ff — 강제 Merge Commit
      // ───────────────────────────────────────────
      {
        title: '--no-ff — Fast-forward여도 Merge Commit 강제',
        desc: '[STEP 4] --no-ff 옵션은 fast-forward 가능한 상황에서도 일부러 Merge Commit(NF)을 만든다. 브랜치가 언제 시작했고 언제 합쳐졌는지 흔적이 남아 코드 리뷰/롤백/배포 단위 추적에 유리하다.',
        graph: {
          mode: 'noff',
          mainBeforeMerge: ['C1', 'C2', 'C3'],
          featureCommits: ['F1', 'F2'],
          mergeCommit: 'NF',
          mainAfterMerge: ['C1', 'C2', 'C3', 'F1', 'F2', 'NF'],
          headLabel: 'main → NF',
        },
        code: {
          filename: 'no-ff.sh',
          lang: 'bash',
          highlight: [10, 11],
          lines: [
            '#!/bin/bash',
            '# --no-ff merge — fast-forward 가능해도 Merge Commit을 강제 생성',
            '',
            '# 1) feature 브랜치 작업',
            'git switch -c feature/payment',
            'echo "pay" > pay.js && git add . && git commit -m "F1"',
            'echo "card" > card.js && git add . && git commit -m "F2"',
            '',
            '# 2) main으로 돌아가서 --no-ff 옵션으로 merge',
            'git switch main',
            'git merge --no-ff feature/payment -m "Merge feature/payment"',
            '# Merge made by the \'ort\' strategy.',
            '',
            '# 결과: 그래프에 분기/병합이 명시적으로 보임',
            'git log --oneline --graph',
            '# *   NF  Merge feature/payment',
            '# |\\',
            '# | * F2',
            '# | * F1',
            '# |/',
            '# * C3',
            '',
            '# 활용: 팀 정책으로 "PR merge는 항상 --no-ff" 강제하는 회사 많음',
            '#       GitHub PR 설정에서 "Create a merge commit"이 동일',
          ],
        },
      },
      // ───────────────────────────────────────────
      // Step 5: 비교 — 어느 전략을 언제
      // ───────────────────────────────────────────
      {
        title: '비교 — 어느 전략을 언제 쓸까',
        desc: '[STEP 5] 세 전략은 "히스토리에 무엇을 남길 것인가"의 선택이다. 개인 작업 → ff, 팀 협업 + 흔적 보존 → --no-ff, PR 단위 깔끔한 main → squash. 정답은 팀 규칙으로 정한다.',
        graph: {
          mode: 'compare',
          mainBeforeMerge: [],
          featureCommits: [],
          mergeCommit: null,
          mainAfterMerge: [],
          headLabel: '비교표',
        },
        code: {
          filename: 'compare.md',
          lang: 'markdown',
          highlight: [3, 4, 5],
          lines: [
            '# Merge 전략 비교 가이드',
            '',
            '| 전략         | Merge Commit | 히스토리   | 언제 쓰나                          |',
            '|:-------------|:------------:|:-----------|:-----------------------------------|',
            '| Fast-forward |      X       | 일직선     | 개인 브랜치, main 변경 없을 때     |',
            '| 3-way        |      O       | 다이아몬드 | 양쪽에 커밋 — git의 기본 자동 동작 |',
            '| Squash       |  O (1개)     | 일직선     | feature 커밋이 지저분할 때         |',
            '| --no-ff      |      O       | 다이아몬드 | 팀 정책 — 브랜치 흔적 항상 남기기  |',
            '',
            '## 의사결정 흐름',
            '',
            '1. **개인 토이 프로젝트** → Fast-forward (단순함)',
            '2. **회사 PR 머지** → Squash 또는 --no-ff 중 팀 정책 따르기',
            '3. **릴리스 브랜치 통합** → --no-ff (롤백 단위 추적)',
            '4. **WIP 커밋 많은 feature** → Squash (main 히스토리 깔끔)',
            '',
            '## GitHub PR 설정과의 매핑',
            '',
            '- Create a merge commit  → `git merge --no-ff`',
            '- Squash and merge       → `git merge --squash` + commit',
            '- Rebase and merge       → `git rebase` + fast-forward',
            '',
            '## 팀에서 한 가지 골라라',
            '',
            '> 가장 큰 실수는 "사람마다 다른 전략을 쓰는 것"이다.',
            '> Repo 정책으로 한 가지를 강제하고, GitHub Settings → Branches에서 잠근다.',
          ],
        },
      },
    ];

    // ═══════════════════════════════════════════════
    // BranchGraph — 좌측 브랜치 그래프 시각화
    // ═══════════════════════════════════════════════
    /**
     * 브랜치 그래프 SVG 시각화
     * mode에 따라 ff / 3way / squash / noff / compare 렌더 분기
     * Args: graph (현재 step의 그래프 데이터)
     */
    function BranchGraph({ graph }) {
      if (graph.mode === 'compare') {
        return <CompareTable />;
      }

      const { mode, mainBeforeMerge, featureCommits, mergeCommit, headLabel } = graph;

      // 좌표 계산: main 라인 y=80, feature 라인 y=160
      const dotSize = 18;
      const stepX = 70;
      const startX = 60;
      const mainY = 80;
      const featureY = 170;

      // mode별 좌표 결정
      let mainNodes = [];
      let featureNodes = [];
      let mergeNode = null;
      let mergeFromMainIdx = null;
      let mergeFromFeatureIdx = null;

      if (mode === 'ff') {
        // main C1 C2 C3 — feature는 C3 분기 후 F1 F2, merge 후 main이 F2를 가리킴
        mainNodes = mainBeforeMerge.map((c, i) => ({ label: c, x: startX + i * stepX, y: mainY }));
        const branchStartIdx = mainBeforeMerge.length - 1;
        featureNodes = featureCommits.map((c, i) => ({
          label: c,
          x: startX + (branchStartIdx + 1 + i) * stepX,
          y: mainY,  // ff는 일직선 — feature도 main 라인 위로 합쳐짐
        }));
      } else if (mode === '3way' || mode === 'noff') {
        // main: C1 C2 C3 [M1] — feature는 C3에서 분기
        mainNodes = mainBeforeMerge.map((c, i) => ({ label: c, x: startX + i * stepX, y: mainY }));
        const branchOriginIdx = (mode === '3way') ? 2 : 2; // C3에서 분기
        featureNodes = featureCommits.map((c, i) => ({
          label: c,
          x: startX + (branchOriginIdx + 1 + i) * stepX,
          y: featureY,
        }));
        // merge commit은 main 라인 위, feature 끝 다음 칸
        const mergeX = startX + (mainNodes.length + featureNodes.length) * stepX - stepX;
        mergeNode = { label: mergeCommit, x: mergeX + stepX, y: mainY };
        mergeFromMainIdx = mainNodes.length - 1;
        mergeFromFeatureIdx = featureNodes.length - 1;
      } else if (mode === 'squash') {
        // main: C1 C2 C3 M1 — feature C3에서 분기 — squash는 main 끝에 SQ 1개만 추가, feature 라인은 main에 미연결
        mainNodes = mainBeforeMerge.map((c, i) => ({ label: c, x: startX + i * stepX, y: mainY }));
        featureNodes = featureCommits.map((c, i) => ({
          label: c,
          x: startX + (3 + i) * stepX,
          y: featureY,
        }));
        const sqX = startX + mainNodes.length * stepX;
        mergeNode = { label: mergeCommit, x: sqX, y: mainY };
        mergeFromMainIdx = mainNodes.length - 1;
        mergeFromFeatureIdx = null; // squash는 feature와 부모 관계 없음
      }

      const colorByMode = {
        ff: { main: '#64748b', feature: '#0ea5e9', merge: '#10b981' },
        '3way': { main: '#64748b', feature: '#0ea5e9', merge: '#f59e0b' },
        squash: { main: '#64748b', feature: '#94a3b8', merge: '#8b5cf6' },
        noff: { main: '#64748b', feature: '#0ea5e9', merge: '#f43f5e' },
      };
      const colors = colorByMode[mode];

      const svgWidth = Math.max(560, startX + (mainNodes.length + featureNodes.length + 2) * stepX);
      const svgHeight = 240;

      const modeTitle = {
        ff: 'Fast-forward',
        '3way': '3-way Merge',
        squash: 'Squash Merge',
        noff: '--no-ff (강제 Merge Commit)',
      }[mode];

      return (
        <div className="flex flex-col h-full p-4">
          <div className="flex items-center justify-between mb-3">
            <div className="text-xs font-bold text-slate-700 bg-slate-100 px-3 py-1 rounded-full">
              {modeTitle}
            </div>
            <div className="text-[10px] text-slate-500 font-mono">HEAD: {headLabel}</div>
          </div>

          <div className="flex-1 overflow-auto bg-gradient-to-br from-slate-50 to-slate-100 rounded-lg border border-slate-200">
            <svg width={svgWidth} height={svgHeight} className="block min-w-full">
              {/* main 라벨 */}
              <text x="10" y={mainY + 4} className="text-[10px]" fill="#475569" fontFamily="monospace">main</text>
              {mode !== 'squash' && featureNodes.length > 0 && (
                <text x="10" y={featureY + 4} className="text-[10px]" fill="#0284c7" fontFamily="monospace">feature</text>
              )}
              {mode === 'squash' && (
                <text x="10" y={featureY + 4} className="text-[10px]" fill="#64748b" fontFamily="monospace">feature</text>
              )}

              {/* main 라인 연결 */}
              {mainNodes.length > 1 && (
                <line x1={mainNodes[0].x} y1={mainY} x2={mainNodes[mainNodes.length - 1].x} y2={mainY}
                      stroke={colors.main} strokeWidth="2" />
              )}

              {/* ff: feature 노드도 main 라인 위 — 그대로 직선 연장 */}
              {mode === 'ff' && featureNodes.length > 0 && (
                <line x1={mainNodes[mainNodes.length - 1].x} y1={mainY}
                      x2={featureNodes[featureNodes.length - 1].x} y2={mainY}
                      stroke={colors.feature} strokeWidth="2" className="draw-line" />
              )}

              {/* 3way / noff: 분기 곡선 */}
              {(mode === '3way' || mode === 'noff') && featureNodes.length > 0 && (
                <>
                  {/* 분기점 → 첫 feature 노드 */}
                  <path d={`M ${mainNodes[2].x} ${mainY} Q ${mainNodes[2].x + 30} ${(mainY + featureY) / 2} ${featureNodes[0].x} ${featureY}`}
                        stroke={colors.feature} strokeWidth="2" fill="none" className="draw-line" />
                  {/* feature 라인 */}
                  {featureNodes.length > 1 && (
                    <line x1={featureNodes[0].x} y1={featureY}
                          x2={featureNodes[featureNodes.length - 1].x} y2={featureY}
                          stroke={colors.feature} strokeWidth="2" />
                  )}
                  {/* feature 끝 → merge */}
                  {mergeNode && (
                    <path d={`M ${featureNodes[featureNodes.length - 1].x} ${featureY} Q ${mergeNode.x - 30} ${(mainY + featureY) / 2} ${mergeNode.x} ${mainY}`}
                          stroke={colors.merge} strokeWidth="2" fill="none" className="draw-line" />
                  )}
                  {/* main 끝 → merge */}
                  {mergeNode && (
                    <line x1={mainNodes[mainNodes.length - 1].x} y1={mainY}
                          x2={mergeNode.x} y2={mainY}
                          stroke={colors.merge} strokeWidth="2" />
                  )}
                </>
              )}

              {/* squash: feature 라인 분리 + main 끝에 SQ 추가, 점선으로 squash 표시 */}
              {mode === 'squash' && (
                <>
                  {/* feature 분기 곡선 */}
                  <path d={`M ${mainNodes[2].x} ${mainY} Q ${mainNodes[2].x + 30} ${(mainY + featureY) / 2} ${featureNodes[0].x} ${featureY}`}
                        stroke={colors.feature} strokeWidth="2" fill="none" strokeDasharray="4,3" />
                  <line x1={featureNodes[0].x} y1={featureY}
                        x2={featureNodes[featureNodes.length - 1].x} y2={featureY}
                        stroke={colors.feature} strokeWidth="2" strokeDasharray="4,3" />
                  {/* main 끝 → SQ */}
                  {mergeNode && (
                    <line x1={mainNodes[mainNodes.length - 1].x} y1={mainY}
                          x2={mergeNode.x} y2={mainY}
                          stroke={colors.merge} strokeWidth="2" />
                  )}
                  {/* squash 화살표 — feature 끝에서 SQ로 점선 */}
                  {mergeNode && (
                    <path d={`M ${featureNodes[featureNodes.length - 1].x} ${featureY} L ${mergeNode.x} ${mainY + 10}`}
                          stroke={colors.merge} strokeWidth="1.5" fill="none" strokeDasharray="2,2"
                          markerEnd="url(#arrowSq)" />
                  )}
                  <defs>
                    <marker id="arrowSq" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                      <path d="M 0 0 L 10 5 L 0 10 z" fill={colors.merge} />
                    </marker>
                  </defs>
                </>
              )}

              {/* main 노드들 */}
              {mainNodes.map((n, i) => (
                <g key={`m-${i}`} className="fade-in-up">
                  <circle cx={n.x} cy={n.y} r={dotSize / 2} fill={colors.main} stroke="white" strokeWidth="2" />
                  <text x={n.x} y={n.y + 4} textAnchor="middle" fill="white" fontSize="9" fontFamily="monospace" fontWeight="bold">{n.label}</text>
                </g>
              ))}

              {/* feature 노드들 */}
              {featureNodes.map((n, i) => (
                <g key={`f-${i}`} className="fade-in-up">
                  <circle cx={n.x} cy={n.y} r={dotSize / 2}
                          fill={mode === 'squash' ? '#cbd5e1' : colors.feature}
                          stroke="white" strokeWidth="2" />
                  <text x={n.x} y={n.y + 4} textAnchor="middle"
                        fill={mode === 'squash' ? '#475569' : 'white'}
                        fontSize="9" fontFamily="monospace" fontWeight="bold">{n.label}</text>
                </g>
              ))}

              {/* merge 노드 — 강조 */}
              {mergeNode && (
                <g className="fade-in-up">
                  <circle cx={mergeNode.x} cy={mergeNode.y} r={dotSize / 2 + 2}
                          fill={colors.merge} stroke="white" strokeWidth="3" className="pulse-dot" />
                  <text x={mergeNode.x} y={mergeNode.y + 4} textAnchor="middle" fill="white" fontSize="9" fontFamily="monospace" fontWeight="bold">{mergeNode.label}</text>
                </g>
              )}

              {/* HEAD 포인터 */}
              {mergeNode ? (
                <g>
                  <rect x={mergeNode.x - 22} y={mergeNode.y - 35} width="44" height="14" rx="3" fill="#1e293b" />
                  <text x={mergeNode.x} y={mergeNode.y - 25} textAnchor="middle" fill="white" fontSize="9" fontFamily="monospace" fontWeight="bold">HEAD</text>
                  <line x1={mergeNode.x} y1={mergeNode.y - 21} x2={mergeNode.x} y2={mergeNode.y - 12}
                        stroke="#1e293b" strokeWidth="1.5" />
                </g>
              ) : (mode === 'ff' && featureNodes.length > 0 ? (
                <g>
                  <rect x={featureNodes[featureNodes.length - 1].x - 22} y={mainY - 35} width="44" height="14" rx="3" fill="#1e293b" />
                  <text x={featureNodes[featureNodes.length - 1].x} y={mainY - 25} textAnchor="middle" fill="white" fontSize="9" fontFamily="monospace" fontWeight="bold">HEAD</text>
                  <line x1={featureNodes[featureNodes.length - 1].x} y1={mainY - 21} x2={featureNodes[featureNodes.length - 1].x} y2={mainY - 12}
                        stroke="#1e293b" strokeWidth="1.5" />
                </g>
              ) : null)}
            </svg>
          </div>

          {/* 범례 */}
          <div className="mt-3 flex flex-wrap gap-3 text-[11px] text-slate-600">
            <div className="flex items-center gap-1.5">
              <span className="w-3 h-3 rounded-full inline-block" style={{ background: colors.main }}></span>
              <span>main 커밋</span>
            </div>
            {featureNodes.length > 0 && (
              <div className="flex items-center gap-1.5">
                <span className="w-3 h-3 rounded-full inline-block" style={{ background: mode === 'squash' ? '#cbd5e1' : colors.feature }}></span>
                <span>feature 커밋</span>
              </div>
            )}
            {mergeNode && (
              <div className="flex items-center gap-1.5">
                <span className="w-3 h-3 rounded-full inline-block pulse-dot" style={{ background: colors.merge }}></span>
                <span>{mode === 'squash' ? 'Squash 커밋 (압축 1개)' : 'Merge Commit'}</span>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // CompareTable — Step 5 비교표
    // ═══════════════════════════════════════════════
    /**
     * 4가지 전략 비교표 컴포넌트
     */
    function CompareTable() {
      const rows = [
        { name: 'Fast-forward', mc: 'X', shape: '일직선', when: '개인 브랜치, main 변경 없음', color: 'emerald' },
        { name: '3-way', mc: 'O', shape: '다이아몬드', when: '양쪽 커밋 있음 (기본)', color: 'amber' },
        { name: 'Squash', mc: 'O (1개)', shape: '일직선', when: 'feature 커밋 지저분할 때', color: 'violet' },
        { name: '--no-ff', mc: 'O', shape: '다이아몬드', when: '팀 정책 — 흔적 항상 남기기', color: 'rose' },
      ];
      return (
        <div className="flex flex-col h-full p-4">
          <div className="text-xs font-bold text-slate-700 bg-slate-100 px-3 py-1 rounded-full self-start mb-3">
            전략 비교 — 어느 것을 언제
          </div>
          <div className="flex-1 overflow-auto bg-gradient-to-br from-slate-50 to-slate-100 rounded-lg border border-slate-200 p-3">
            <table className="w-full text-xs border-collapse">
              <thead>
                <tr className="bg-slate-200 text-slate-700">
                  <th className="px-2 py-2 text-left font-bold">전략</th>
                  <th className="px-2 py-2 text-center font-bold">Merge Commit</th>
                  <th className="px-2 py-2 text-left font-bold">히스토리</th>
                  <th className="px-2 py-2 text-left font-bold">언제 쓰나</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r, i) => (
                  <tr key={i} className={`fade-in-up bg-${r.color}-50 border-b border-slate-200`}
                      style={{ animationDelay: `${i * 0.1}s` }}>
                    <td className={`px-2 py-2 font-bold text-${r.color}-700`}>{r.name}</td>
                    <td className="px-2 py-2 text-center font-mono">{r.mc}</td>
                    <td className="px-2 py-2 text-slate-700">{r.shape}</td>
                    <td className={`px-2 py-2 text-${r.color}-800 text-[11px]`}>{r.when}</td>
                  </tr>
                ))}
              </tbody>
            </table>

            <div className="mt-4 bg-white rounded-lg border border-slate-200 p-3 text-[11px] text-slate-700 leading-relaxed">
              <div className="font-bold text-slate-800 mb-1">의사결정 한 줄 요약</div>
              <div className="space-y-1">
                <div><span className="font-mono text-emerald-700">개인 작업</span> → Fast-forward</div>
                <div><span className="font-mono text-violet-700">PR + WIP 커밋 많음</span> → Squash</div>
                <div><span className="font-mono text-rose-700">팀 협업 + 흔적 보존</span> → --no-ff</div>
                <div><span className="font-mono text-amber-700">양쪽 커밋 있음 (기본 동작)</span> → 3-way</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // CodeViewer — VSCode 스타일 코드 (highlight.js)
    // ═══════════════════════════════════════════════
    /**
     * 우측 코드 뷰어 (VSCode 다크 테마 + 라인 번호 + highlight.js)
     */
    function CodeViewer({ code }) {
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          // 이전 highlight 결과 초기화
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const fullText = code.lines.join('\n');

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg flex flex-col h-full">
          {/* 윈도우 dot + 파일명 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700 flex-shrink-0">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-300 ml-2 font-mono bg-[#282c34] px-3 py-0.5 rounded-t border-t border-l border-r border-slate-600">
              {code.filename}
            </span>
            <span className="text-[10px] text-slate-500 ml-auto font-mono">{code.lang}</span>
          </div>

          {/* 코드 + 라인 번호 — highlight.js로 한 번에 강조한 뒤 라인별 분리 */}
          <div className="overflow-auto text-xs flex-1" style={{ maxHeight: '32rem' }}>
            <pre className="p-0 m-0 hidden">
              <code ref={codeRef} className={`language-${code.lang}`}>{fullText}</code>
            </pre>
            <CodeLines code={code} highlightedRef={codeRef} />
          </div>
        </div>
      );
    }

    /**
     * 라인별 분리 렌더링 — highlight.js가 코드를 강조한 후 innerHTML을 라인 단위로 잘라 표시
     */
    function CodeLines({ code, highlightedRef }) {
      const [linesHtml, setLinesHtml] = useState(code.lines);

      useEffect(() => {
        // highlight.js 처리 후 라인별 HTML 추출
        const tick = setTimeout(() => {
          if (highlightedRef.current) {
            const html = highlightedRef.current.innerHTML;
            // <span class="hljs-..."></span>이 줄바꿈을 가로지를 수 있어서 줄별 split이 단순 \n으로는 깨질 수 있다 → 안전한 fallback
            const split = html.split('\n');
            if (split.length === code.lines.length) {
              setLinesHtml(split);
            } else {
              setLinesHtml(code.lines);
            }
          }
        }, 30);
        return () => clearTimeout(tick);
      }, [code]);

      return (
        <pre className="p-0 m-0">
          <code className={`language-${code.lang} block hljs`}>
            {linesHtml.map((line, i) => {
              const highlighted = code.highlight && code.highlight.includes(i + 1);
              const isHtml = typeof linesHtml[0] !== 'undefined' && linesHtml !== code.lines;
              return (
                <div key={i} className={`flex ${highlighted ? 'bg-yellow-500/15 border-l-2 border-yellow-400' : ''}`}>
                  <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0 font-mono">
                    {i + 1}
                  </span>
                  {isHtml ? (
                    <span className="pl-3 pr-3 whitespace-pre" dangerouslySetInnerHTML={{ __html: line || '&nbsp;' }} />
                  ) : (
                    <span className="pl-3 pr-3 whitespace-pre">{line || ' '}</span>
                  )}
                </div>
              );
            })}
          </code>
        </pre>
      );
    }

    // ═══════════════════════════════════════════════
    // App — 메인 컴포넌트
    // ═══════════════════════════════════════════════
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);
      const step = STEPS[stepIdx];
      const isEnd = stepIdx === STEPS.length - 1;

      // 자동재생 — 3000ms 간격
      useEffect(() => {
        if (isPlaying) {
          playRef.current = setInterval(() => {
            setStepIdx(prev => {
              if (prev < STEPS.length - 1) return prev + 1;
              setIsPlaying(false);
              return prev;
            });
          }, 3000);
        } else {
          clearInterval(playRef.current);
        }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      // 키보드 ←/→ 네비게이션
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight' && stepIdx < STEPS.length - 1) {
            setStepIdx(stepIdx + 1);
            setIsPlaying(false);
          }
          if (e.key === 'ArrowLeft' && stepIdx > 0) {
            setStepIdx(stepIdx - 1);
            setIsPlaying(false);
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [stepIdx]);

      const handleFirst = () => { setStepIdx(0); setIsPlaying(false); };
      const handlePrev = () => { if (stepIdx > 0) { setStepIdx(stepIdx - 1); setIsPlaying(false); } };
      const handleNext = () => { if (stepIdx < STEPS.length - 1) { setStepIdx(stepIdx + 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setStepIdx(0); setIsPlaying(p => !p); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-7xl mx-auto space-y-4">

            {/* Header */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between flex-wrap gap-2">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-slate-700 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                  <div>
                    <h1 className="text-xl font-bold text-slate-800">Part IV. Merge 전략</h1>
                    <p className="text-xs text-slate-500">Fast-forward / 3-way / Squash / --no-ff — 그래프 변화로 한눈에 비교</p>
                  </div>
                </div>
                <a href="../index.html" className="text-xs text-slate-600 hover:text-slate-900 hover:underline font-medium">← 전체 목차</a>
              </div>
            </header>

            {/* Description Panel */}
            <div className="bg-slate-700 text-white p-4 rounded-xl shadow-sm border border-slate-800">
              <div className="flex items-baseline gap-3 mb-1">
                <span className="text-[10px] font-bold text-slate-300 uppercase tracking-wider bg-slate-600 px-2 py-0.5 rounded">
                  STEP {stepIdx + 1} / {STEPS.length}
                </span>
                <h3 className="text-sm font-bold text-white">{step.title}</h3>
              </div>
              <p className="text-sm font-medium leading-relaxed text-slate-100">{step.desc}</p>
            </div>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              {/* 좌: 브랜치 그래프 */}
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 min-h-[460px]">
                <BranchGraph graph={step.graph} />
              </div>
              {/* 우: 코드 */}
              <div className="min-h-[460px]">
                <CodeViewer code={step.code} />
              </div>
            </div>

            {/* Controls — 4 버튼 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handleFirst} aria-label="처음으로"
                        className="px-3 py-2 rounded bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-medium transition disabled:opacity-50"
                        disabled={stepIdx === 0}>
                  처음
                </button>
                <button onClick={handlePrev} aria-label="이전 단계"
                        className="px-3 py-2 rounded bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-medium transition disabled:opacity-50"
                        disabled={stepIdx === 0}>
                  ← 이전
                </button>
                <button onClick={togglePlay} aria-label={isPlaying ? '정지' : '자동재생'}
                        className="flex items-center px-4 py-2 rounded bg-slate-700 hover:bg-slate-800 text-white text-xs font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying ? (
                    <>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2">
                        <rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" />
                      </svg>
                      정지
                    </>
                  ) : (
                    <>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2">
                        <polygon points="5 3 19 12 5 21 5 3" />
                      </svg>
                      자동재생
                    </>
                  )}
                </button>
                <button onClick={handleNext} aria-label="다음 단계"
                        className="px-3 py-2 rounded bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-medium transition disabled:opacity-50"
                        disabled={isEnd}>
                  다음 →
                </button>
              </div>
              <div className="flex items-center gap-3">
                <div className="text-xs font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-200">
                  Step {stepIdx + 1} / {STEPS.length}
                </div>
                <div className="flex gap-1">
                  {STEPS.map((_, i) => (
                    <button key={i} onClick={() => { setStepIdx(i); setIsPlaying(false); }}
                            aria-label={`Step ${i + 1}로 이동`}
                            className={`w-2.5 h-2.5 rounded-full transition-all
                              ${i === stepIdx ? 'bg-slate-700 scale-125'
                                : i < stepIdx ? 'bg-slate-400'
                                : 'bg-slate-200'}`} />
                  ))}
                </div>
              </div>
            </div>

            {/* 키보드 힌트 */}
            <div className="text-center text-[11px] text-slate-400">
              키보드 ← / → 로 단계를 이동할 수 있다
            </div>

            <footer className="text-center text-xs text-slate-400 py-2">
              Git &amp; GitHub 사다리형 학습 커리큘럼 — Part IV: Merge 전략
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script src="sidebar.js"></script>
</body>
</html>
