    // CodeViewer — VSCode 스타일 (highlight.js 적용)
    // ═══════════════════════════════════════════════
    function CodeViewer({ code }) {
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          // 라인별 span 안의 텍스트를 한 번에 하이라이트하기 어렵기 때문에
          // 각 라인을 개별적으로 highlightElement 처리한다.
          const lineSpans = codeRef.current.querySelectorAll('.code-line');
          lineSpans.forEach((el) => {
            // 이미 하이라이트된 경우 원본 텍스트로 되돌린 뒤 다시 처리
            const original = el.getAttribute('data-original');
            if (original !== null) el.textContent = original;
            else el.setAttribute('data-original', el.textContent);
            el.removeAttribute('data-highlighted');
            try {
              window.hljs.highlightElement(el);
            } catch (e) { /* noop */ }
          });
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg flex flex-col h-full fade-in-up">
          {/* 윈도우 dot + 파일명 탭 */}
          <div className="bg-[#21252b] px-3 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">

              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            {/* 5개 파일명 탭 */}
            <div className="flex gap-1 ml-3 overflow-x-auto">
              {STEPS.map((s, i) => {
                const active = s.code.filename === code.filename;
                return (
                  <span
                    key={i}
                    className={`px-2 py-0.5 text-[11px] font-mono rounded whitespace-nowrap transition ${
                      active
                        ? 'bg-[#282c34] text-slate-100 border-t-2 border-emerald-400'
                        : 'text-slate-500'
                    }`}
                  >
                    {s.code.filename}
                  </span>
                );
              })}
            </div>
          </div>

          {/* 코드 본문 */}
          <div className="overflow-auto flex-1 text-[12.5px] leading-[1.7] font-mono">
            <pre className="p-0 m-0">
              <code ref={codeRef} className={`language-${code.lang} block`}>
                {code.lines.map((line, i) => {
                  const lineNo = i + 1;
                  const isHi = code.highlight && code.highlight.includes(lineNo);
                  return (
                    <div
                      key={i}
                      className={`flex ${isHi ? 'bg-yellow-400/10' : ''}`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {lineNo}
                      </span>
                      <span
                        className={`code-line language-${code.lang} pl-3 pr-3 flex-1`}
                      >
                        {line || ' '}
                      </span>
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>
        </div>
      );

      // accent: 'slate' | 'emerald'  (로컬=slate, 원격=emerald 톤)
      const accentClasses = accent === 'emerald'
        ? {
            border: highlight ? 'border-emerald-400 ring-2 ring-emerald-300' : 'border-slate-300',
            badge: 'bg-emerald-100 text-emerald-700',
            dot: 'bg-emerald-400',
          }
        : {
            border: highlight ? 'border-slate-700 ring-2 ring-slate-400' : 'border-slate-300',
            badge: 'bg-slate-200 text-slate-700',
            dot: 'bg-slate-500',
          };

      return (
        <div
          className={`flex-1 bg-white rounded-xl border-2 ${accentClasses.border} p-3 flex flex-col transition-all duration-300`}
        >
          <div className="flex items-center gap-2 mb-2">
            <span className="text-lg">{icon}</span>
            <div className="flex-1 min-w-0">
              <div className="text-[11px] font-bold text-slate-800 truncate">{title}</div>
              <div className="text-[10px] text-slate-500 truncate">{subtitle}</div>
            </div>
            <span className={`text-[10px] px-1.5 py-0.5 rounded ${accentClasses.badge} font-mono`}>
              {commits.length} commits
            </span>
          </div>

          <div className="flex flex-col-reverse gap-1 overflow-y-auto flex-1 min-h-0">
            {commits.map((c, idx) => {
              const isHead = idx === commits.length - 1;
              return (
                <div
                  key={c.id + '-' + idx}
                  className={`flex items-center gap-2 px-2 py-1 rounded text-[11px] border ${
                    c.isNew
                      ? 'bg-yellow-50 border-yellow-300 fade-in-up'
                      : 'bg-slate-50 border-slate-200'
                  }`}
                >
                  <span className={`w-2 h-2 rounded-full flex-shrink-0 ${accentClasses.dot} ${isHead ? 'pulse-dot' : ''}`}></span>
                  <span className="font-mono text-slate-500 flex-shrink-0">{c.id}</span>
                  <span className="text-slate-700 truncate">{c.msg}</span>
                  {isHead && (
                    <span className="ml-auto text-[9px] font-bold text-emerald-600 bg-emerald-50 px-1 rounded flex-shrink-0">HEAD</span>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // TrafficArrow — 로컬↔원격 트래픽 화살표
    // ═══════════════════════════════════════════════
    function TrafficArrow({ dir, label }) {
      // dir: 'none' | 'clone' | 'push' | 'pull' | 'fetch'
      // 방향:
      //   clone, pull, fetch  : 원격(우) → 로컬(좌)   = 좌측 방향 화살표
      //   push                : 로컬(좌) → 원격(우)   = 우측 방향 화살표
      //   none                : 양방향 점선

      const config = {
        clone:  { color: 'text-emerald-600', bg: 'bg-emerald-500',  direction: 'left',  flowClass: 'flow-left'  },
        pull:   { color: 'text-emerald-600', bg: 'bg-emerald-500',  direction: 'left',  flowClass: 'flow-left'  },
        fetch:  { color: 'text-cyan-600',    bg: 'bg-cyan-500',     direction: 'left',  flowClass: 'flow-left'  },
        push:   { color: 'text-rose-600',    bg: 'bg-rose-500',     direction: 'right', flowClass: 'flow-right' },
        none:   { color: 'text-slate-500',   bg: 'bg-slate-400',    direction: 'none',  flowClass: ''            },
      }[dir] || { color: 'text-slate-500', bg: 'bg-slate-400', direction: 'none', flowClass: '' };

      return (
        <div className="flex flex-col items-center justify-center px-2 py-2 min-w-[110px]">
          <div className={`text-[10px] font-bold ${config.color} mb-1 text-center leading-tight`}>
            {label}
          </div>

          <div className="relative w-full h-8 flex items-center justify-center">
            {/* 트랙 */}
            <div className="absolute left-0 right-0 h-0.5 bg-slate-200 rounded"></div>

            {/* 흐름 패킷 (none 일 때는 안 보임) */}
            {config.direction !== 'none' && (
              <>
                <div className={`absolute left-0 ${config.flowClass}`}>
                  <span className={`block w-2 h-2 rounded-full ${config.bg}`}></span>
                </div>
                <div className={`absolute left-0 ${config.flowClass}`} style={{ animationDelay: '0.4s' }}>
                  <span className={`block w-2 h-2 rounded-full ${config.bg}`}></span>
                </div>
                <div className={`absolute left-0 ${config.flowClass}`} style={{ animationDelay: '0.8s' }}>
                  <span className={`block w-2 h-2 rounded-full ${config.bg}`}></span>
                </div>
              </>
            )}

            {/* 화살촉 — 방향에 따라 좌/우/양쪽 */}
            {config.direction === 'right' && (
              <span className={`absolute right-0 ${config.color} text-lg leading-none`}>▶</span>
            )}
            {config.direction === 'left' && (
              <span className={`absolute left-0 ${config.color} text-lg leading-none`}>◀</span>
            )}
            {config.direction === 'none' && (
              <>
                <span className="absolute left-0 text-slate-400 text-base leading-none">◀</span>
                <span className="absolute right-0 text-slate-400 text-base leading-none">▶</span>
              </>
            )}
          </div>

          <div className="text-[9px] text-slate-400 mt-1 font-mono">
            {dir === 'none' ? '— idle —' : dir}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // CommandSimulator — step마다 실행 명령 1줄 미리보기
    // ═══════════════════════════════════════════════
    function CommandSimulator({ filename, dir }) {
      const cmd = {
        'clone.sh':       'git clone https://github.com/hong/my-project.git',
        'remote.sh':      'git remote -v',
        'push.sh':        'git push -u origin main',
        'pull.sh':        'git pull origin main',
        'fetch-merge.sh': 'git fetch origin && git merge origin/main',
      }[filename] || '';

      const dirBadge = {
        clone:  { text: 'CLONE',  color: 'bg-emerald-100 text-emerald-700' },
        push:   { text: 'PUSH',   color: 'bg-rose-100 text-rose-700'       },
        pull:   { text: 'PULL',   color: 'bg-emerald-100 text-emerald-700' },
        fetch:  { text: 'FETCH',  color: 'bg-cyan-100 text-cyan-700'       },
        none:   { text: 'INSPECT', color: 'bg-slate-200 text-slate-600'    },
      }[dir] || { text: 'CMD', color: 'bg-slate-200 text-slate-600' };

      return (
        <div className="bg-slate-900 rounded-lg px-3 py-2 flex items-center gap-2 border border-slate-700">
          <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${dirBadge.color}`}>
            {dirBadge.text}
          </span>
          <span className="text-emerald-400 font-mono text-xs">$</span>
          <span className="text-slate-100 font-mono text-xs truncate">{cmd}</span>
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // LiveDataPane — 좌측: 로컬↔원격 다이어그램
    // ═══════════════════════════════════════════════
    function LiveDataPane({ state }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-4 flex flex-col gap-3 fade-in-up">
          <div className="flex items-center justify-between">
            <h3 className="text-xs font-bold text-slate-700 uppercase tracking-wide">
              Local ↔ Remote
            </h3>
            <span className="text-[10px] text-slate-400 font-mono">
              {state.remoteRegistered ? 'origin: registered' : 'origin: (none)'}
            </span>
          </div>

          {/* 다이어그램 영역 — 로컬 / 화살표 / 원격 */}
          <div className="flex items-stretch gap-1 flex-1 min-h-[260px]">
            <RepoBox
              title="Local Repository"
              subtitle="~/my-project (.git)"
              icon="💻"
              commits={state.localCommits}
              highlight={state.highlightLocal}
              accent="slate"
            />
            <TrafficArrow dir={state.trafficDir} label={state.trafficLabel} />
            <RepoBox
              title="Remote (origin)"
              subtitle="github.com/hong/my-project"
              icon="🌐"
              commits={state.remoteCommits}
              highlight={state.highlightRemote}
              accent="emerald"
            />
          </div>

          {/* 명령 시뮬레이션 줄 */}
          <CommandSimulator filename={state.activeFile} dir={state.trafficDir} />

          {/* 범례 */}
          <div className="flex flex-wrap items-center gap-x-3 gap-y-1 text-[10px] text-slate-500 border-t border-slate-100 pt-2">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded-full bg-emerald-500"></span>
              clone / pull
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded-full bg-rose-500"></span>
              push
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded-full bg-cyan-500"></span>
              fetch (merge 없음)
            </span>
            <span className="flex items-center gap-1">
              <span className="inline-block px-1 rounded bg-yellow-100 border border-yellow-300 text-yellow-800">신규</span>
              방금 추가된 커밋
            </span>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // Header
    // ═══════════════════════════════════════════════
    function Header() {
      return (
        <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
          <div className="flex items-center justify-between flex-wrap gap-2">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 bg-slate-700 text-white flex items-center justify-center rounded-full font-bold text-xs">III</div>
              <div>
                <h1 className="text-lg md:text-xl font-bold text-slate-800">
                  Part III. Remote — clone / push / pull / fetch
                </h1>
                <p className="text-[11px] md:text-xs text-slate-500">
                  로컬과 원격 저장소를 잇는 4가지 핵심 명령을 단계별 시뮬레이션으로 익힌다.
                </p>
              </div>
            </div>
            <a href="../index.html" className="text-xs text-slate-600 hover:text-slate-900 hover:underline font-medium">
              ← 전체 목차
            </a>
          </div>
        </header>
      );
    }

    // ═══════════════════════════════════════════════
    // DescPanel — 단계 설명 (설명 박스)
    // ═══════════════════════════════════════════════
    function DescPanel({ step, stepIdx, total }) {
      return (
        <div className="bg-slate-800 text-white p-4 rounded-xl shadow-sm border border-slate-900 fade-in-up">
          <div className="flex items-center gap-2 mb-1">
            <span className="text-[10px] font-bold text-slate-300 uppercase tracking-wider">
              Step {stepIdx + 1} / {total}
            </span>
            <span className="text-[10px] text-slate-400">·</span>
            <span className="text-[11px] font-mono text-emerald-300">{step.code.filename}</span>
          </div>
          <h3 className="text-sm md:text-base font-bold mb-1 text-white">{step.title}</h3>
          <p className="text-[12px] md:text-[13px] leading-relaxed text-slate-200">{step.desc}</p>
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // Controls — 4 버튼 + step indicator
    // ═══════════════════════════════════════════════
    function Controls({ stepIdx, setStepIdx, isPlaying, setIsPlaying, total }) {
      const isFirst = stepIdx === 0;
      const isLast = stepIdx === total - 1;

      return (
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
          <div className="flex items-center gap-2">
            <button
              aria-label="처음으로"
              onClick={() => { setStepIdx(0); setIsPlaying(false); }}
              disabled={isFirst}
              className="px-3 py-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 text-xs font-medium transition"
            >
              ⏮ 처음
            </button>
            <button
              aria-label="이전 단계"
              onClick={() => { setStepIdx(Math.max(0, stepIdx - 1)); setIsPlaying(false); }}
              disabled={isFirst}
              className="px-3 py-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 text-xs font-medium transition"
            >
              ← 이전
            </button>
            <button
              aria-label={isPlaying ? '정지' : '자동 재생'}
              onClick={() => {
                if (isLast && !isPlaying) setStepIdx(0);
                setIsPlaying(p => !p);
              }}
              className="px-4 py-2 rounded bg-slate-700 hover:bg-slate-800 text-white text-xs font-bold transition shadow-sm w-28 text-center"
            >
              {isPlaying ? '⏸ 정지' : '▶ 자동재생'}
            </button>
            <button
              aria-label="다음 단계"
              onClick={() => setStepIdx(Math.min(total - 1, stepIdx + 1))}
              disabled={isLast}
              className="px-3 py-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 text-xs font-medium transition"
            >
              다음 →
            </button>
          </div>

          <div className="flex items-center gap-3">
            <div className="text-xs font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
              Step {stepIdx + 1} / {total}
            </div>
            <div className="flex gap-1.5">
              {Array.from({ length: total }).map((_, i) => (
                <button
                  key={i}
                  aria-label={`Step ${i + 1}로 이동`}
                  onClick={() => { setStepIdx(i); setIsPlaying(false); }}
                  className={`w-2.5 h-2.5 rounded-full transition-all ${
                    i === stepIdx
                      ? 'bg-slate-700 scale-125'
                      : i < stepIdx
                        ? 'bg-slate-400'
                        : 'bg-slate-200'
                  }`}
                />
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // KeyboardHint
    // ═══════════════════════════════════════════════
    function KeyboardHint() {
      return (
        <div className="text-center text-[11px] text-slate-400 py-1">
          ⌨ 키보드: <kbd className="px-1.5 py-0.5 bg-slate-200 rounded text-[10px] font-mono">←</kbd> 이전 ·
          {' '}<kbd className="px-1.5 py-0.5 bg-slate-200 rounded text-[10px] font-mono">→</kbd> 다음 ·
          {' '}<kbd className="px-1.5 py-0.5 bg-slate-200 rounded text-[10px] font-mono">Space</kbd> 재생/정지
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // App — 메인
    // ═══════════════════════════════════════════════
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const step = STEPS[stepIdx];

      // 자동 재생 (3000ms) — 마지막 step 도달 시 자동 정지
      useEffect(() => {
        if (!isPlaying) return;
        const t = setInterval(() => {
          setStepIdx(prev => {
            if (prev < STEPS.length - 1) return prev + 1;
            setIsPlaying(false);
            return prev;
          });
        }, 3000);
        return () => clearInterval(t);
      }, [isPlaying]);

      // 키보드 (← / → / Space)
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') {
            setStepIdx(i => Math.min(STEPS.length - 1, i + 1));
            setIsPlaying(false);
          } else if (e.key === 'ArrowLeft') {
            setStepIdx(i => Math.max(0, i - 1));
            setIsPlaying(false);
          } else if (e.key === ' ' || e.key === 'Spacebar') {
            e.preventDefault();
            setIsPlaying(p => !p);
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-4">
            <Header />

            {/* 상단: STEP 진행 표시 (사다리꼴 5칸) */}
            <div className="bg-white rounded-xl border border-slate-200 p-2 flex gap-1 overflow-x-auto">
              {STEPS.map((s, i) => {
                const active = i === stepIdx;
                const done = i < stepIdx;
                return (
                  <button
                    key={i}
                    onClick={() => { setStepIdx(i); setIsPlaying(false); }}
                    aria-label={`Step ${i + 1} — ${s.title}`}
                    className={`flex-1 min-w-[120px] px-2 py-2 rounded-lg text-xs font-medium transition ${
                      active
                        ? 'bg-slate-700 text-white shadow-sm'
                        : done
                          ? 'bg-slate-100 text-slate-700 hover:bg-slate-200'
                          : 'text-slate-400 hover:bg-slate-50'
                    }`}
                  >
                    <div className="text-[10px] font-bold opacity-80">Step {i + 1}</div>
                    <div className="mt-0.5 text-[11px] font-mono truncate">{s.code.filename}</div>
                  </button>
                );
              })}
            </div>

            {/* 좌/우 2-pane (lg:grid-cols-2) */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step.dataState} />
              <CodeViewer code={step.code} />
            </div>

            <DescPanel step={step} stepIdx={stepIdx} total={STEPS.length} />

            <Controls
              stepIdx={stepIdx}
              setStepIdx={setStepIdx}
              isPlaying={isPlaying}
              setIsPlaying={setIsPlaying}
              total={STEPS.length}
            />

            <KeyboardHint />

            <footer className="text-center text-[11px] text-slate-400 py-2">
              Git &amp; GitHub 사다리형 학습 — Part III · Remote 5 STEPS · pattern-fastapi.md 표준
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  <\/script>
  <script src="sidebar.js"></script>
</body>
</html>
