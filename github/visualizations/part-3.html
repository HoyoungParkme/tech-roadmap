</head>
<body>
  <div id="root"></div>

  <!--
    ─────────────────────────────────────────────────────────────
    Part III — 깃 첫 걸음 (11 Section 시각화)
    ─────────────────────────────────────────────────────────────
    III-0-1. Git GUI 클라이언트 소개
    III-0-2. Windows에서 Git 설치하기
    III-0-3. macOS/Linux에서 Git 설치하기
    III-1-1. Git 설치와 초기 설정
    III-1-2. 첫 저장소 만들기 — git init
    III-1-3. 파일 추가와 첫 커밋
    III-2-1. git status와 git diff
    III-2-2. 실수 되돌리기 — restore와 reset
    III-3-1. .gitignore
    III-3-2. 원격 저장소 연결 — git remote
    III-4-1. GUI로 add·commit·push 따라하기
    ─────────────────────────────────────────────────────────────
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ═══════════════════════════════════════════════
    // 공용 구문 강조 헬퍼 (기존 index.html 패턴 재활용)
    // ═══════════════════════════════════════════════
    const GIT_CMDS = new Set(['git','add','commit','push','pull','checkout','merge','branch','echo','cd','mkdir','ls','cat','touch','rm','init','clone','config','status','diff','log','restore','reset','remote','nano','code']);
    const GIT_FLAGS = new Set(['-m','-b','-u','--all','--force','--global','--local','--version','--staged','--soft','--hard','--cached','-v','-a','origin','main','HEAD','HEAD~1','.']);

    const highlightLine = (line) => {
      const trimmed = line.trimStart();
      if (trimmed.startsWith('#')) return <span className="text-slate-500 italic">{line}</span>;
      if (trimmed.startsWith('$')) {
        const rest = line.slice(line.indexOf('$') + 2);
        return <><span className="text-emerald-400 font-bold">$ </span>{highlightTokens(rest)}</>;
      }
      if (!line.trim()) return <span> </span>;
      return <span className="text-slate-400">{line}</span>;
    };

    const highlightTokens = (text) => {
      const tokens = text.split(/(\s+)/g);
      return tokens.map((t, i) => {
        if (GIT_CMDS.has(t)) return <span key={i} className="text-pink-400 font-semibold">{t}</span>;
        if (GIT_FLAGS.has(t)) return <span key={i} className="text-yellow-300 font-bold">{t}</span>;
        if (/^["'].*["']$/.test(t)) return <span key={i} className="text-emerald-400">{t}</span>;
        if (/^[\w/.-]+\/[\w/.-]+$/.test(t)) return <span key={i} className="text-cyan-400">{t}</span>;
        return <span key={i} className="text-slate-200">{t}</span>;
      });
    };

    // ═══════════════════════════════════════════════
    // 공용 터미널 뷰어 컴포넌트
    // ═══════════════════════════════════════════════
    function TerminalViewer({ lines, activeLine, title }) {
      return (
        <div className="rounded-xl border border-slate-700 overflow-hidden bg-slate-900 h-full flex flex-col">
          <div className="flex items-center px-4 py-2 bg-slate-800 border-b border-slate-700 gap-2">
            <div className="w-3 h-3 rounded-full bg-red-500"></div>
            <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
            <div className="w-3 h-3 rounded-full bg-green-500"></div>
            <span className="ml-2 text-xs text-slate-400 font-mono">{title || 'bash'}</span>
          </div>
          <div className="p-4 overflow-y-auto flex-1 text-sm font-mono leading-relaxed">
            {lines.map((line, idx) => {
              const isActive = activeLine === idx;
              return (
                <div key={idx} className={`px-2 py-0.5 rounded transition-colors ${
                  isActive ? 'bg-emerald-900/40 border-l-4 border-emerald-400' : 'border-l-4 border-transparent'}`}>
                  {highlightLine(line)}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // III-0-1: Git GUI 클라이언트 소개
    // ═══════════════════════════════════════════════
    const STEPS_0_1 = [
      {
        label: "CLI vs GUI",
        desc: "[STEP 1] Git을 사용하는 방법은 두 가지다. CLI(터미널에 명령어 입력)와 GUI(그래픽 인터페이스 클릭). 둘 다 뒤에서 같은 Git 명령을 실행한다.",
        lines: ["# CLI (Command Line Interface)", "$ git add .", "$ git commit -m \"로그인 기능 추가\"", "$ git push origin main", "", "# GUI는 같은 작업을 버튼 클릭으로 수행한다", "# 어느 쪽을 쓰든 결과는 동일!"],
        activeLine: null,
      },
      {

        lines: ["# GitHub Desktop", "# ✅ GitHub 공식 앱 — github.com/desktop", "# ✅ 설치 후 GitHub 계정 자동 연동", "# ✅ 변경 파일 목록 + diff 시각화", "# ✅ 브랜치 생성·전환·머지 GUI", "# ✅ PR 생성까지 앱 내에서 가능", "# ⚠️ 고급 기능(rebase, bisect 등)은 CLI 필요"],
        activeLine: null,
      },
      {
        label: "SourceTree",
        desc: "[STEP 3] Atlassian이 만든 무료 앱. 브랜치 그래프가 직관적이고, Jira 연동이 강점이다. 커밋 히스토리를 시각적으로 탐색하기 좋다.",
        lines: ["# SourceTree (Atlassian)", "# ✅ 무료 — sourcetreeapp.com", "# ✅ 브랜치 그래프가 시각적으로 보기 좋음", "# ✅ Jira·Bitbucket 연동 강점", "# ✅ Interactive Rebase 지원", "# ⚠️ Windows/macOS만 지원 (Linux 미지원)", "# ⚠️ 계정 등록 필요"],
        activeLine: null,
      },
      {
        label: "VS Code Git",
        desc: "[STEP 4] VS Code 에디터에 Git이 내장되어 있다. 코드 수정과 커밋을 한 화면에서 한다. 별도 앱 설치 없이 바로 사용 가능.",
        lines: ["# VS Code 내장 Git", "# ✅ 에디터에 내장 — 별도 설치 불필요", "# ✅ Source Control 패널 (Ctrl+Shift+G)", "# ✅ 줄 단위 diff + 인라인 변경 표시", "# ✅ GitLens 확장으로 blame/log 강화", "# ✅ 터미널도 내장 — CLI와 GUI 동시 사용", "# ⚠️ 복잡한 머지/리베이스는 CLI가 편할 수 있음"],
        activeLine: null,
      },
      {
        label: "어떤 걸 선택할까?",
        desc: "[STEP 5] 초보자는 GitHub Desktop으로 시작하고, 익숙해지면 CLI를 병행하자. VS Code 사용자라면 내장 Git만으로도 충분하다. 어떤 도구든 Git의 핵심 개념은 동일하다.",
        lines: ["# 추천 경로:", "# 1. 완전 초보 → GitHub Desktop으로 시작", "# 2. 코드 에디터 있음 → VS Code 내장 Git", "# 3. 히스토리 시각화 필요 → SourceTree", "# 4. 익숙해지면 → CLI 병행 (가장 강력)", "", "# 핵심: GUI든 CLI든 Git의 원리는 동일하다!"],
        activeLine: null,
      },
    ];

    // ═══════════════════════════════════════════════
    // III-0-2: Windows에서 Git 설치하기
    // ═══════════════════════════════════════════════
    const STEPS_0_2 = [
      {
        label: "설치 파일 다운로드",
        desc: "[STEP 1] git-scm.com에서 Windows용 설치 파일을 다운로드한다. 64-bit 버전을 선택한다.",
        lines: ["# 1. https://git-scm.com/download/win 접속", "# 2. 'Click here to download' 클릭", "# 3. Git-2.44.0-64-bit.exe 다운로드", "# 4. 설치 파일 실행"],
        activeLine: null,
      },
      {
        label: "설치 옵션 — 에디터",
        desc: "[STEP 2] 기본 에디터를 선택한다. Vim이 기본인데, VS Code로 바꾸는 것을 권장한다. 나머지 옵션은 대부분 기본값으로 진행한다.",
        lines: ["# 설치 옵션 중 중요한 것:", "", "# 기본 에디터 선택:", "#   Vim (기본) → 초보자에게 어려움", "#   ✅ VS Code 선택 권장", "", "# 나머지 옵션은 기본값으로 Next"],
        activeLine: null,
      },
      {
        label: "줄바꿈 설정 (CRLF)",
        desc: "[STEP 3] Windows는 줄바꿈에 CRLF(\\r\\n)를 쓰고, macOS/Linux는 LF(\\n)를 쓴다. 기본 옵션 'Checkout Windows-style, commit Unix-style'을 선택하면 자동 변환된다.",
        lines: ["# 줄바꿈(Line Ending) 설정", "# Windows: CRLF (\\r\\n)", "# macOS/Linux: LF (\\n)", "", "# 권장 옵션:", "# ✅ 'Checkout Windows-style, commit Unix-style'", "# → 로컬에서는 CRLF, 저장소에는 LF로 저장"],
        activeLine: null,
      },
      {
        label: "설치 확인",
        desc: "[STEP 4] 설치가 끝나면 Git Bash 또는 PowerShell에서 git --version으로 확인한다. Git Bash는 Linux 명령어(ls, cat 등)를 Windows에서 쓸 수 있게 해준다.",
        lines: ["# Git Bash 또는 PowerShell 열기", "", "$ git --version", "git version 2.44.0.windows.1", "", "# Git Bash: Linux 명령어 사용 가능", "# PowerShell: Windows 기본 터미널"],
        activeLine: 2,
      },
    ];

    // ═══════════════════════════════════════════════
    // III-0-3: macOS/Linux에서 Git 설치하기
    // ═══════════════════════════════════════════════
    const STEPS_0_3 = [
      {
        label: "macOS — Xcode CLI Tools",
        desc: "[STEP 1] macOS에서 터미널을 열고 git을 처음 실행하면 Xcode Command Line Tools 설치를 제안한다. '설치'를 클릭하면 된다.",
        lines: ["# macOS 터미널 열기 (Cmd+Space → Terminal)", "", "$ git --version", "# 설치 안 되어 있으면 팝업:", "# 'The \"git\" command requires the command line", "#  developer tools. Would you like to install?'", "# → '설치' 클릭"],
        activeLine: 2,
      },
      {
        label: "macOS — Homebrew",
        desc: "[STEP 2] 최신 버전을 쓰고 싶으면 Homebrew로 설치한다. Homebrew가 없으면 brew.sh에서 먼저 설치한다.",
        lines: ["# Homebrew로 최신 Git 설치", "$ brew install git", "", "$ git --version", "git version 2.44.0", "", "# Homebrew 설치: https://brew.sh"],
        activeLine: 1,
      },
      {
        label: "Linux — apt / dnf",
        desc: "[STEP 3] Ubuntu/Debian은 apt, Fedora는 dnf로 설치한다. 대부분의 Linux 배포판에서 한 줄 명령으로 끝난다.",
        lines: ["# Ubuntu / Debian:", "$ sudo apt update", "$ sudo apt install git", "", "# Fedora:", "$ sudo dnf install git", "", "$ git --version", "git version 2.44.0"],
        activeLine: 2,
      },
      {
        label: "설치 확인",
        desc: "[STEP 4] macOS/Linux는 줄바꿈 설정을 따로 할 필요 없다 (기본이 LF). git --version으로 설치를 확인하면 완료!",
        lines: ["$ git --version", "git version 2.44.0", "", "# macOS/Linux는 기본 LF — 줄바꿈 걱정 없음", "# 터미널(Terminal.app, bash, zsh)에서 바로 사용", "", "# 다음 단계: git config로 사용자 정보 설정!"],
        activeLine: 0,
      },
    ];

    // ═══════════════════════════════════════════════
    // III-1-1: Git 설치와 초기 설정
    // ═══════════════════════════════════════════════
    const STEPS_1_1 = [
      {
        label: "Git 설치 확인",
        desc: "[STEP 1] 먼저 Git이 설치되어 있는지 확인한다. 터미널에서 git --version을 실행하면 설치된 버전이 나온다.",
        lines: ["$ git --version", "git version 2.44.0"],
        activeLine: 0,
      },
      {
        label: "사용자 이름 설정",
        desc: "[STEP 2] 커밋에 기록될 사용자 이름을 등록한다. --global 옵션은 이 컴퓨터의 모든 저장소에 적용된다.",
        lines: ["$ git --version", "git version 2.44.0", "", "$ git config --global user.name \"홍길동\""],
        activeLine: 3,
      },
      {
        label: "이메일 설정",
        desc: "[STEP 3] 사용자 이메일도 등록한다. GitHub 계정과 같은 이메일을 쓰면 커밋이 프로필에 연결된다.",
        lines: ["$ git --version", "git version 2.44.0", "", "$ git config --global user.name \"홍길동\"", "$ git config --global user.email \"hong@example.com\""],
        activeLine: 4,
      },
      {
        label: "설정 확인",
        desc: "[STEP 4] 등록한 설정을 확인한다. git config --list로 모든 설정값을 볼 수 있다.",
        lines: ["$ git config --global user.name \"홍길동\"", "$ git config --global user.email \"hong@example.com\"", "", "$ git config --list", "user.name=홍길동", "user.email=hong@example.com"],
        activeLine: 3,
      },
    ];

    // III-1-2: 첫 저장소 만들기 — git init
    const STEPS_1_2 = [
      {
        label: "프로젝트 폴더 생성",
        desc: "[STEP 1] 새 프로젝트를 위한 빈 폴더를 만들고 이동한다.",
        lines: ["$ mkdir my-project", "$ cd my-project"],
        activeLine: 0,
      },
      {
        label: "git init 실행",
        desc: "[STEP 2] git init을 실행하면 현재 폴더가 Git 저장소가 된다. .git 숨김 폴더가 생긴다.",
        lines: ["$ mkdir my-project", "$ cd my-project", "", "$ git init", "Initialized empty Git repository in /Users/jisu/my-project/.git/"],
        activeLine: 3,
      },
      {
        label: ".git 폴더 확인",
        desc: "[STEP 3] .git 폴더가 Git 데이터베이스다. 모든 커밋, 브랜치, 설정이 여기에 저장된다. 이 폴더를 삭제하면 히스토리가 전부 사라진다.",
        lines: ["$ git init", "Initialized empty Git repository in /Users/jisu/my-project/.git/", "", "$ ls -al", ".  ..  .git"],
        activeLine: 3,
      },
      {
        label: "git clone (참고)",
        desc: "[STEP 4] 기존 원격 저장소를 복사할 때는 git clone을 쓴다. 내부적으로 git init + 다운로드를 함께 수행한다.",
        lines: ["# 새 저장소: git init", "# 기존 저장소 복사: git clone", "", "$ git clone https://github.com/user/repo.git", "Cloning into 'repo'...", "done."],
        activeLine: 3,
      },
    ];

    // III-1-3: 파일 추가와 첫 커밋
    const STEPS_1_3 = [
      {
        label: "파일 생성",
        desc: "[STEP 1] 프로젝트에 첫 번째 파일을 만든다. 아직 Git은 이 파일을 추적하지 않는다.",
        lines: ["$ echo \"Hello Git\" > README.md", "$ cat README.md", "Hello Git"],
        activeLine: 0,
      },
      {
        label: "git add — 스테이지에 올리기",
        desc: "[STEP 2] git add로 파일을 Staging Area에 올린다. 장바구니에 담는 것과 같다. 아직 히스토리에 기록되지 않았다.",
        lines: ["$ echo \"Hello Git\" > README.md", "", "$ git add README.md", "# README.md가 Staging Area에 올라감"],
        activeLine: 2,
      },
      {
        label: "git commit — 히스토리에 기록",
        desc: "[STEP 3] git commit으로 스테이지의 내용을 영구 스냅샷으로 저장한다. -m 뒤에 '무엇을 했는지' 메시지를 쓴다.",
        lines: ["$ git add README.md", "", "$ git commit -m \"첫 번째 커밋: README 추가\"", "[main (root-commit) a3f9c2d] 첫 번째 커밋: README 추가", " 1 file changed, 1 insertion(+)"],
        activeLine: 2,
      },
      {
        label: "git log — 히스토리 확인",
        desc: "[STEP 4] git log로 커밋 히스토리를 확인한다. SHA 해시, 작성자, 날짜, 메시지가 표시된다.",
        lines: ["$ git log", "commit a3f9c2d (HEAD -> main)", "Author: 홍길동 <hong@example.com>", "Date:   Mon Apr 20 10:00:00 2026", "", "    첫 번째 커밋: README 추가"],
        activeLine: 0,
      },
    ];

    // III-2-1: git status와 git diff
    const STEPS_2_1 = [
      {
        label: "파일 수정",
        desc: "[STEP 1] README.md를 수정한다. Git은 변경을 감지하지만 아직 스테이지에 올리지 않았다.",
        lines: ["$ echo \"두 번째 줄 추가\" >> README.md"],
        activeLine: 0,
      },
      {
        label: "git status — 현재 상태",
        desc: "[STEP 2] git status로 어떤 파일이 변경되었는지 확인한다. 빨간색은 '변경됐지만 스테이지에 없음'이다.",
        lines: ["$ git status", "On branch main", "Changes not staged for commit:", "  modified:   README.md", "", "no changes added to commit"],
        activeLine: 0,
      },
      {
        label: "git diff — 변경 내용",
        desc: "[STEP 3] git diff로 정확히 무엇이 바뀌었는지 줄 단위로 확인한다. +는 추가된 줄, -는 삭제된 줄이다.",
        lines: ["$ git diff", "diff --git a/README.md b/README.md", "--- a/README.md", "+++ b/README.md", "@@ -1 +1,2 @@", " Hello Git", "+두 번째 줄 추가"],
        activeLine: 0,
      },
      {
        label: "스테이지 후 커밋",
        desc: "[STEP 4] 변경 내용을 확인했으면 add → commit 순서로 기록한다. 커밋 전 항상 diff를 확인하는 습관을 들이자.",
        lines: ["$ git add README.md", "$ git commit -m \"README에 두 번째 줄 추가\"", "[main b7e1f3a] README에 두 번째 줄 추가", " 1 file changed, 1 insertion(+)"],
        activeLine: 1,
      },
    ];

    // III-2-2: 실수 되돌리기 — restore와 reset
    const STEPS_2_2 = [
      {
        label: "수정 취소 — git restore",
        desc: "[STEP 1] 파일을 수정했다가 취소하고 싶을 때 git restore를 쓴다. 마지막 커밋 상태로 돌아간다.",
        lines: ["$ echo \"실수로 잘못 작성\" >> README.md", "", "# 수정을 취소하고 싶다!", "$ git restore README.md", "# README.md가 마지막 커밋 상태로 복원됨"],
        activeLine: 3,
      },
      {
        label: "스테이지 해제 — restore --staged",
        desc: "[STEP 2] git add로 스테이지에 올렸다가 내리고 싶을 때 --staged 옵션을 쓴다. 파일 내용은 유지된다.",
        lines: ["$ git add README.md", "", "# 스테이지에서 내리고 싶다!", "$ git restore --staged README.md", "# 스테이지에서 내려감 (파일 내용은 유지)"],
        activeLine: 3,
      },
      {
        label: "커밋 취소 — reset --soft",
        desc: "[STEP 3] 마지막 커밋을 취소하고 변경사항을 Staging Area에 유지한다. 커밋 메시지를 잘못 썼을 때 유용하다.",
        lines: ["$ git reset --soft HEAD~1", "# 마지막 커밋 취소", "# 변경사항은 Staging Area에 남아 있음", "", "$ git status", "Changes to be committed:", "  modified:   README.md"],
        activeLine: 0,
      },
      {
        label: "주의: reset --hard",
        desc: "[STEP 4] --hard는 변경사항까지 전부 삭제한다. 되돌릴 수 없으므로 주의! 확실할 때만 사용한다.",
        lines: ["# --soft: 커밋 취소, 변경사항 유지", "# --hard: 커밋 취소 + 변경사항 삭제 (위험!)", "", "$ git reset --hard HEAD~1", "HEAD is now at a3f9c2d 첫 번째 커밋", "# 주의: 변경사항이 영구 삭제됨!"],
        activeLine: 3,
      },
    ];

    // III-3-1: .gitignore
    const STEPS_3_1 = [
      {
        label: "추적하면 안 되는 파일들",
        desc: "[STEP 1] .env(비밀 키), node_modules/(패키지), __pycache__/(캐시) 같은 파일은 Git으로 추적하면 안 된다.",
        lines: ["# 추적하면 안 되는 파일 예시:", "# .env          — API 키, DB 비밀번호", "# node_modules/  — npm 패키지 (용량 거대)", "# __pycache__/   — Python 캐시", "# .DS_Store      — macOS 시스템 파일"],
        activeLine: null,
      },
      {
        label: ".gitignore 파일 생성",
        desc: "[STEP 2] 프로젝트 루트에 .gitignore 파일을 만들고 무시할 패턴을 적는다.",
        lines: ["$ cat .gitignore", ".env", "node_modules/", "__pycache__/", "*.log", ".DS_Store"],
        activeLine: 0,
      },
      {
        label: "동작 확인",
        desc: "[STEP 3] .gitignore에 적힌 파일은 git status에 나타나지 않는다. Git이 완전히 무시한다.",
        lines: ["$ touch .env", "$ mkdir node_modules", "", "$ git status", "On branch main", "Untracked files:", "  .gitignore", "", "# .env와 node_modules는 보이지 않음!"],
        activeLine: 3,
      },
      {
        label: "이미 추적 중인 파일 제외",
        desc: "[STEP 4] 이미 git add한 파일은 .gitignore에 추가해도 계속 추적된다. git rm --cached로 추적을 해제해야 한다.",
        lines: ["# 이미 추적 중인 파일 제외하기:", "$ git rm --cached .env", "rm '.env'", "", "# 이제 .gitignore가 적용됨", "$ git commit -m \".env를 추적에서 제외\""],
        activeLine: 1,
      },
    ];

    // III-3-2: 원격 저장소 연결 — git remote
    const STEPS_3_2 = [
      {
        label: "GitHub에 저장소 생성",
        desc: "[STEP 1] GitHub에서 빈 저장소를 만든다. (GitHub UI에서 New Repository 클릭) 로컬 저장소와 연결할 URL을 복사한다.",
        lines: ["# GitHub에서 빈 저장소 생성 후", "# HTTPS URL 복사:", "# https://github.com/hong/my-project.git"],
        activeLine: null,
      },
      {
        label: "git remote add origin",
        desc: "[STEP 2] 로컬 저장소에 원격 주소를 등록한다. origin은 관례적인 원격 저장소 이름이다.",
        lines: ["$ git remote add origin https://github.com/hong/my-project.git", "", "$ git remote -v", "origin  https://github.com/hong/my-project.git (fetch)", "origin  https://github.com/hong/my-project.git (push)"],
        activeLine: 0,
      },
      {
        label: "git push — 원격에 올리기",
        desc: "[STEP 3] git push로 로컬 커밋을 원격 저장소에 전송한다. -u 옵션은 다음부터 git push만으로 동기화되게 한다.",
        lines: ["$ git push -u origin main", "Enumerating objects: 3, done.", "Counting objects: 100% (3/3), done.", "To https://github.com/hong/my-project.git", " * [new branch]      main -> main", "Branch 'main' set up to track 'origin/main'."],
        activeLine: 0,
      },
      {
        label: "git pull — 원격에서 가져오기",
        desc: "[STEP 4] git pull로 원격의 최신 변경사항을 로컬로 가져온다. 내부적으로 fetch + merge를 수행한다.",
        lines: ["# 다른 사람이 원격에 커밋한 경우:", "", "$ git pull origin main", "remote: Enumerating objects: 3, done.", "Updating b7e1f3a..c9d2e4f", "Fast-forward", " README.md | 1 +"],
        activeLine: 2,
      },
      {
        label: "로컬 ↔ 원격 흐름",
        desc: "[STEP 5] push는 로컬→원격, pull은 원격→로컬. 이 두 명령어로 팀원과 코드를 동기화한다.",
        lines: ["# 로컬 → 원격: git push", "# 원격 → 로컬: git pull", "", "# 변경 확인만 (머지 안 함): git fetch", "$ git fetch origin", "# fetch 후 diff로 확인, 그 다음 merge"],
        activeLine: null,
      },
    ];

    // ═══════════════════════════════════════════════
    // III-4-1: GUI로 add·commit·push 따라하기
    // ═══════════════════════════════════════════════
    const STEPS_4_1 = [
      {
        label: "GitHub Desktop — 변경 확인",
        desc: "[STEP 1] 파일을 수정하면 GitHub Desktop 왼쪽 패널에 변경된 파일 목록이 나타난다. 오른쪽에 diff(변경 내용)가 표시된다. CLI의 git status + git diff와 동일하다.",
        lines: ["# GitHub Desktop 화면 구성:", "# ┌──────────────┬──────────────────┐", "# │ Changes (1)  │  README.md       │", "# │ ☑ README.md  │  + 두 번째 줄    │", "# │              │  + 추가됨        │", "# └──────────────┴──────────────────┘", "# = git status + git diff 와 동일"],
        activeLine: null,
      },
      {
        label: "GitHub Desktop — 커밋",
        desc: "[STEP 2] 왼쪽 하단에 커밋 메시지를 입력하고 'Commit to main' 버튼을 클릭한다. 파일 체크박스를 선택/해제해서 부분 스테이징도 가능하다. CLI의 git add + git commit과 동일하다.",
        lines: ["# GitHub Desktop 커밋:", "# ┌──────────────────────────────┐", "# │ Summary: README 수정         │", "# │ Description: (선택)          │", "# │ [Commit to main]             │", "# └──────────────────────────────┘", "# = git add README.md", "# = git commit -m \"README 수정\""],
        activeLine: null,
      },
      {
        label: "GitHub Desktop — 푸시",
        desc: "[STEP 3] 커밋 후 상단에 'Push origin' 버튼이 나타난다. 클릭하면 원격 저장소에 전송된다. CLI의 git push와 동일하다.",
        lines: ["# 커밋 완료 후:", "# ┌──────────────────────────────┐", "# │   ↑ Push origin              │", "# │   1 commit to push           │", "# └──────────────────────────────┘", "# 클릭! → 원격 저장소에 전송", "# = git push origin main"],
        activeLine: null,
      },
      {
        label: "VS Code — Source Control",
        desc: "[STEP 4] VS Code에서는 Source Control 패널(Ctrl+Shift+G)을 연다. 변경 파일 옆 + 버튼으로 스테이징하고, 상단 메시지 입력 후 ✓ 버튼으로 커밋한다. ... 메뉴에서 Push를 선택한다.",
        lines: ["# VS Code Source Control (Ctrl+Shift+G):", "# ┌──────────────────────────────┐", "# │ Message: \"README 수정\"   [✓] │", "# │ Staged Changes:              │", "# │   README.md  [M]             │", "# │ ... → Push                   │", "# └──────────────────────────────┘", "# + 버튼 = git add", "# ✓ 버튼 = git commit", "# Push  = git push"],
        activeLine: null,
      },
      {
        label: "CLI와 GUI는 같다",
        desc: "[STEP 5] GUI의 모든 동작은 뒤에서 같은 Git 명령을 실행한다. GUI로 시작하고, 익숙해지면 CLI를 병행하는 것이 가장 효과적인 학습 경로다.",
        lines: ["# GUI 동작      = CLI 명령어", "# ─────────────────────────────", "# 파일 체크      = git add <파일>", "# Commit 버튼    = git commit -m \"...\"", "# Push 버튼      = git push origin main", "# Pull 버튼      = git pull origin main", "", "# 원리를 이해하면 어떤 도구든 자유자재!"],
        activeLine: null,
      },
    ];

    // ═══════════════════════════════════════════════
    // 공용 터미널 렌더러
    // ═══════════════════════════════════════════════
    function TerminalViz({ step }) {
      return (
        <div className="h-full p-4 flex items-center justify-center">
          <div className="w-full max-w-2xl h-full min-h-[300px]">
            <TerminalViewer lines={step.lines} activeLine={step.activeLine} title="bash — git" />
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════
    // 섹션 목록
    // ═══════════════════════════════════════════════
    const SECTIONS = [
      { id: "0-1", label: "III-0-1", title: "GUI 클라이언트 소개", steps: STEPS_0_1, Renderer: TerminalViz },
      { id: "0-2", label: "III-0-2", title: "Windows 설치", steps: STEPS_0_2, Renderer: TerminalViz },
      { id: "0-3", label: "III-0-3", title: "macOS/Linux 설치", steps: STEPS_0_3, Renderer: TerminalViz },
      { id: "1-1", label: "III-1-1", title: "Git 설치와 초기 설정", steps: STEPS_1_1, Renderer: TerminalViz },
      { id: "1-2", label: "III-1-2", title: "첫 저장소 만들기", steps: STEPS_1_2, Renderer: TerminalViz },
      { id: "1-3", label: "III-1-3", title: "파일 추가와 첫 커밋", steps: STEPS_1_3, Renderer: TerminalViz },
      { id: "2-1", label: "III-2-1", title: "git status와 diff", steps: STEPS_2_1, Renderer: TerminalViz },
      { id: "2-2", label: "III-2-2", title: "실수 되돌리기", steps: STEPS_2_2, Renderer: TerminalViz },
      { id: "3-1", label: "III-3-1", title: ".gitignore", steps: STEPS_3_1, Renderer: TerminalViz },
      { id: "3-2", label: "III-3-2", title: "원격 저장소 연결", steps: STEPS_3_2, Renderer: TerminalViz },
      { id: "4-1", label: "III-4-1", title: "GUI로 add·commit·push", steps: STEPS_4_1, Renderer: TerminalViz },
    ];

    // ═══════════════════════════════════════════════
    // 메인 앱 (Part I/II와 동일 구조, 테마: emerald)
    // ═══════════════════════════════════════════════
    function App() {
      const [sectionIdx, setSectionIdx] = useState(0);
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playRef = useRef(null);

      const section = SECTIONS[sectionIdx];
      const step = section.steps[stepIdx];
      const isEnd = stepIdx === section.steps.length - 1;
      const Renderer = section.Renderer;

      const handleTabChange = (idx) => { setSectionIdx(idx); setStepIdx(0); setIsPlaying(false); };

      const handleNext = () => {
        setStepIdx(prev => {
          if (prev < section.steps.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => { if (stepIdx > 0) { setStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playRef.current = setInterval(() => handleNextRef.current(), 2800); }
        else { clearInterval(playRef.current); }
        return () => clearInterval(playRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-4">

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between flex-wrap gap-2">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-xs">III</div>
                  <div>
                    <h1 className="text-xl font-bold text-slate-800">Part III. 깃 첫 걸음</h1>
                    <p className="text-xs text-slate-500">터미널을 열고 첫 저장소를 만들어 실제로 손을 움직인다.</p>
                  </div>
                </div>
                <a href="../index.html" className="text-xs text-emerald-600 hover:underline font-medium">← 전체 목차</a>
              </div>
            </header>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-1 flex gap-1 overflow-x-auto">
              {SECTIONS.map((s, i) => (
                <button key={s.id} onClick={() => handleTabChange(i)}
                  aria-label={`${s.label} — ${s.title} 섹션으로 이동`}
                  className={`flex-1 min-w-[100px] px-2 py-2 rounded-lg text-xs font-medium transition-all
                    ${i === sectionIdx ? 'bg-emerald-600 text-white shadow-sm' : 'text-slate-500 hover:bg-slate-100'}`}>
                  <div className="font-bold">{s.label}</div>
                  <div className={`mt-0.5 text-[10px] ${i === sectionIdx ? 'text-emerald-200' : 'text-slate-400'}`}>{s.title}</div>
                </button>
              ))}
            </div>

            <div className="bg-emerald-700 text-white p-4 rounded-xl shadow-sm border border-emerald-800 min-h-[80px] flex flex-col justify-center">
              <h3 className="text-[10px] font-bold text-emerald-200 uppercase tracking-wider mb-1">
                {section.label} — {step.label}
              </h3>
              <p className="text-sm md:text-base font-medium leading-relaxed">{step.desc}</p>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 min-h-[320px] md:min-h-[380px]">
              <Renderer step={step} />
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={stepIdx === 0}
                  className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'} onClick={togglePlay}
                  className="flex items-center px-4 py-2 rounded bg-emerald-600 hover:bg-emerald-700 text-white font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                  )}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd}
                  className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="flex items-center gap-3">
                <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                  Step {stepIdx + 1} / {section.steps.length}
                </div>
                <div className="flex gap-1">
                  {section.steps.map((_, i) => (
                    <button key={i} onClick={() => { setStepIdx(i); setIsPlaying(false); }}
                      aria-label={`Step ${i + 1}로 이동`}
                      className={`w-2.5 h-2.5 rounded-full transition-all ${
                        i === stepIdx ? 'bg-emerald-500 scale-125' : i < stepIdx ? 'bg-emerald-300' : 'bg-slate-200'}`} />
                  ))}
                </div>
              </div>
            </div>

            <footer className="text-center text-xs text-slate-400 py-2">
              Git & GitHub 사다리형 학습 커리큘럼 — Part III 시각화
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
<script src="sidebar.js"></script>
</body>
</html>
