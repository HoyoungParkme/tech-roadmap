<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Part VIII. 태그·릴리즈·분석·디버깅 — 인터랙티브 시각화</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeInUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .fade-in-up { animation: fadeInUp 0.5s ease-out both; }
  </style>
</head>
<body>
  <div id="root"></div>
  <!--
    Part VIII — 태그·릴리즈·분석·디버깅 (5 Section 시각화)
    VIII-1-1. 태그와 릴리즈
    VIII-1-2. GitHub Releases
    VIII-2-1. git log 고급
    VIII-2-2. git blame
    VIII-2-3. git bisect
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // VIII-1-1: 태그와 릴리즈
    const STEPS_1_1 = [
      { label:"태그란", desc:"[STEP 1] 태그(Tag)는 특정 커밋에 붙이는 영구 레이블이다. 브랜치는 새 커밋이 생기면 이동하지만, 태그는 한번 만들면 움직이지 않는다.",
        phase:'concept' },
      { label:"Lightweight Tag", desc:"[STEP 2] git tag v1.0.0 — 이름만 붙이는 가벼운 태그. 작성자·날짜·메시지가 없다.",
        phase:'lightweight', cmd:'git tag v1.0.0' },
      { label:"Annotated Tag", desc:"[STEP 3] git tag -a v1.0.0 -m '첫 릴리즈' — 작성자, 날짜, 메시지가 포함된 태그. 릴리즈에는 이것을 쓴다.",
        phase:'annotated', cmd:'git tag -a v1.0.0 -m "첫 릴리즈"' },
      { label:"태그 푸시", desc:"[STEP 4] git push origin v1.0.0으로 원격에 태그를 전송한다. --tags를 쓰면 모든 태그를 한 번에 푸시한다.",
        phase:'push', cmd:'git push origin v1.0.0' },
      { label:"Semantic Versioning", desc:"[STEP 5] MAJOR.MINOR.PATCH 규칙. MAJOR: 호환성 깨짐, MINOR: 기능 추가, PATCH: 버그 수정. 버전만 보고 변경 범위를 안다.",
        phase:'semver' },
    ];

    // VIII-1-2: GitHub Releases
    const STEPS_1_2 = [
      { label:"Releases 페이지", desc:"[STEP 1] 저장소 → Releases → Draft a new release. 기존 태그를 선택하거나 새로 만든다.",
        phase:'page' },
      { label:"릴리즈 노트 자동 생성", desc:"[STEP 2] 'Generate release notes' 버튼 클릭 — 마지막 릴리즈 이후의 PR 목록이 자동으로 채워진다.",
        phase:'generate' },
      { label:"카테고리 커스터마이즈", desc:"[STEP 3] .github/release.yml 파일로 카테고리(Features, Bug Fixes, Breaking Changes)를 설정할 수 있다.",
        phase:'customize' },
      { label:"Assets 첨부", desc:"[STEP 4] 바이너리 빌드 파일이 있으면 Assets에 첨부한다. 사용자가 소스 코드 대신 빌드 결과물을 다운로드한다.",
        phase:'assets' },
    ];

    // VIII-2-1: git log 고급
    const STEPS_2_1 = [
      { label:"--oneline", desc:"[STEP 1] git log --oneline — SHA 7자리 + 메시지 한 줄로 압축. 히스토리를 빠르게 훑어본다.",
        cmd:'git log --oneline', output:['a3f9c2d 버그 수정','b7e1f3a 로그인 추가','c9d2e4f 첫 커밋'] },
      { label:"--graph", desc:"[STEP 2] git log --oneline --graph — 브랜치 분기·합류를 ASCII 그래프로 시각화한다.",
        cmd:'git log --oneline --graph', output:['* a3f9c2d 버그 수정','|\\','| * d4e5f6a feature 작업','|/','* b7e1f3a 머지'] },
      { label:"필터링", desc:"[STEP 3] --since, --author, --grep으로 특정 조건의 커밋만 추출한다. 경로를 지정하면 해당 파일에 영향을 준 커밋만 나온다.",
        cmd:'git log --author="지수" --since="2024-01-01"', output:['b7e1f3a 로그인 추가','e8f9a0b API 연동'] },
      { label:"--pretty=format", desc:"[STEP 4] 출력 형식을 커스터마이즈한다. %h(SHA), %an(작성자), %s(메시지), %ar(상대 시간).",
        cmd:'git log --pretty=format:"%h %an %s"', output:['a3f9c2d 지수 버그 수정','b7e1f3a 민지 로그인 추가'] },
    ];

    // VIII-2-2: git blame
    const STEPS_2_2 = [
      { label:"blame 실행", desc:"[STEP 1] git blame <파일> — 파일의 모든 줄에 대해 마지막 변경 커밋, 작성자, 날짜를 표시한다.",
        phase:'run' },
      { label:"줄 범위 지정", desc:"[STEP 2] git blame -L 10,20 <파일> — 10~20번째 줄만 blame한다. 긴 파일에서 특정 부분만 확인할 때 유용하다.",
        phase:'range' },
      { label:"공백 무시", desc:"[STEP 3] -w 옵션으로 공백 변경을 무시한다. 들여쓰기만 바뀐 커밋을 건너뛰고 실제 로직 변경 커밋을 찾는다.",
        phase:'ignore' },
      { label:"목적은 맥락 이해", desc:"[STEP 4] blame의 목적은 '범인 찾기'가 아니라 '변경 맥락 이해'다. 왜 이렇게 바꿨는지 커밋 메시지를 확인한다.",
        phase:'purpose' },
    ];

    // VIII-2-3: git bisect
    const STEPS_2_3 = [
      { label:"문제 상황", desc:"[STEP 1] '1주일 전엔 잘 됐는데 지금은 버그가 있다.' 100개 커밋 중 어디서 문제가 생겼을까?",
        phase:'problem', range:[1,100] },
      { label:"bisect start", desc:"[STEP 2] git bisect start → git bisect bad(현재, 버그 있음) → git bisect good <SHA>(정상 커밋). Git이 이진 검색을 시작한다.",
        phase:'start', range:[1,100], mid:50 },
      { label:"이진 검색 반복", desc:"[STEP 3] Git이 중간 커밋(#50)을 체크아웃한다. 테스트 후 good 또는 bad를 입력. 범위가 절반으로 줄어든다. log₂(100) ≈ 7번이면 찾는다.",
        phase:'search', range:[50,100], mid:75 },
      { label:"범인 발견", desc:"[STEP 4] 몇 번의 반복 후 버그를 도입한 커밋 하나를 정확히 찾는다. git bisect reset으로 원래 브랜치로 돌아온다.",
        phase:'found' },
    ];

    // 렌더러들
    function Viz_1_1({step}) {
      if(step.phase==='concept') return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-3">
          <div className="flex gap-1 items-end">
            {['C1','C2','C3','C4','C5'].map((c,i)=>(<div key={i} className="text-[10px] bg-slate-100 text-slate-700 px-2 py-0.5 rounded font-mono">{c}</div>))}
          </div>
          <div className="flex gap-4">
            <div className="bg-amber-100 border-2 border-amber-400 rounded-full px-3 py-1 text-xs font-bold text-amber-700">🏷️ v1.0 → C3</div>
            <div className="bg-purple-100 border-2 border-purple-400 rounded-lg px-3 py-1 text-xs font-bold text-purple-700">🌿 main → C5</div>
          </div>
          <div className="text-[10px] text-slate-500">태그는 C3에 고정. 브랜치는 C5로 이동.</div>
        </div>
      );
      if(step.phase==='semver') return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-3">
          <div className="text-sm font-bold text-amber-700">Semantic Versioning</div>
          <div className="flex gap-2">
            {[{v:'MAJOR',d:'호환성 깨짐',c:'red'},{v:'MINOR',d:'기능 추가',c:'amber'},{v:'PATCH',d:'버그 수정',c:'emerald'}].map((s,i)=>(
              <div key={i} className={`fade-in-up bg-${s.c}-50 border-2 border-${s.c}-300 rounded-lg p-3 text-center`} style={{animationDelay:`${i*0.15}s`}}>
                <div className={`text-xs font-bold text-${s.c}-700`}>{s.v}</div>
                <div className={`text-[10px] text-${s.c}-600 mt-1`}>{s.d}</div>
              </div>
            ))}
          </div>
          <div className="text-xs font-mono text-amber-600 font-bold">v2.1.3</div>
        </div>
      );
      return (
        <div className="flex flex-col items-center justify-center h-full p-6">
          <div className="bg-slate-900 rounded-xl p-5 max-w-sm w-full">
            <div className="text-xs text-slate-400 mb-2 font-mono">bash</div>
            <div className="text-emerald-400 font-mono text-sm font-bold">$ {step.cmd}</div>
          </div>
        </div>
      );
    }

    function Viz_1_2({step}) {
      const panels = {
        page:{icon:'📋',title:'Draft a new release',items:['Tag: v1.0.0','Target: main','Title: 첫 릴리즈']},
        generate:{icon:'✨',title:'Generate release notes',items:['## What\'s Changed','- feat: 로그인 (#12)','- fix: 버그 수정 (#15)','- docs: README (#18)']},
        customize:{icon:'⚙️',title:'.github/release.yml',items:['categories:','  - title: Features','    labels: [enhancement]','  - title: Bug Fixes','    labels: [bug]']},
        assets:{icon:'📦',title:'Assets',items:['app-v1.0.0-win.exe','app-v1.0.0-mac.dmg','Source code (zip)','Source code (tar.gz)']},
      };
      const p=panels[step.phase];
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-3">
          <div className="text-3xl">{p.icon}</div>
          <div className="border-2 border-amber-300 bg-amber-50 rounded-xl p-4 max-w-xs w-full">
            <div className="text-sm font-bold text-amber-700 mb-2 text-center">{p.title}</div>
            <div className="space-y-1">
              {p.items.map((item,i)=>(<div key={i} className="text-xs px-2 py-1 bg-white border border-slate-200 rounded font-mono text-slate-700">{item}</div>))}
            </div>
          </div>
        </div>
      );
    }

    function Viz_2_1({step}) {
      return (
        <div className="flex flex-col items-center justify-center h-full p-6">
          <div className="bg-slate-900 rounded-xl p-5 max-w-md w-full">
            <div className="text-xs text-slate-400 mb-2 font-mono">bash</div>
            <div className="text-emerald-400 font-mono text-sm font-bold mb-3">$ {step.cmd}</div>
            <div className="space-y-1">
              {step.output.map((line,i)=>(<div key={i} className="fade-in-up text-xs font-mono text-slate-300" style={{animationDelay:`${i*0.1}s`}}>{line}</div>))}
            </div>
          </div>
        </div>
      );
    }

    function Viz_2_2({step}) {
      if(step.phase==='run') return (
        <div className="flex flex-col items-center justify-center h-full p-4">
          <div className="bg-slate-900 rounded-xl p-4 max-w-md w-full font-mono text-xs space-y-1">
            <div className="text-slate-400 mb-2">$ git blame app.js</div>
            {[{sha:'a3f9c2d',author:'지수',date:'04-15',line:'const API = "/api"'},{sha:'b7e1f3a',author:'민지',date:'04-18',line:'const PORT = 3000'},{sha:'c9d2e4f',author:'지수',date:'04-20',line:'app.listen(PORT)'}].map((l,i)=>(
              <div key={i} className="fade-in-up flex gap-2" style={{animationDelay:`${i*0.15}s`}}>
                <span className="text-amber-400">{l.sha}</span><span className="text-cyan-400">{l.author}</span><span className="text-slate-500">{l.date}</span><span className="text-slate-300">{l.line}</span>
              </div>
            ))}
          </div>
        </div>
      );
      if(step.phase==='purpose') return (
        <div className="flex flex-col items-center justify-center h-full p-4">
          <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-5 text-center max-w-sm">
            <div className="text-2xl mb-2">🔍</div>
            <div className="font-bold text-amber-700">목적: 변경 맥락 이해</div>
            <div className="text-xs text-amber-600 mt-2">"범인 찾기"가 아니라 "왜 이렇게 바꿨는지" 확인</div>
          </div>
        </div>
      );
      return (
        <div className="flex flex-col items-center justify-center h-full p-6">
          <div className="bg-slate-900 rounded-xl p-5 max-w-sm w-full">
            <div className="text-emerald-400 font-mono text-sm font-bold">$ git blame {step.phase==='range'?'-L 10,20 ':'-w '}app.js</div>
            <div className="text-slate-400 text-xs mt-2 font-mono">{step.phase==='range'?'10~20번째 줄만 표시':'공백 변경 무시'}</div>
          </div>
        </div>
      );
    }

    function Viz_2_3({step}) {
      if(step.phase==='problem') return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-3">
          <div className="bg-red-50 border-2 border-red-300 rounded-xl p-4 text-center max-w-sm">
            <div className="text-xl mb-1">🐛</div>
            <div className="font-bold text-red-700 text-sm">100개 커밋 중 어디서 버그가?</div>
            <div className="text-xs text-red-600 mt-1">하나씩 확인하면 100번...</div>
          </div>
        </div>
      );
      if(step.phase==='found') return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-3">
          <div className="bg-emerald-50 border-2 border-emerald-400 rounded-xl p-4 text-center max-w-sm">
            <div className="text-xl mb-1">🎯</div>
            <div className="font-bold text-emerald-700 text-sm">커밋 #73 발견!</div>
            <div className="text-xs text-emerald-600 mt-1">7번 만에 100개 중 범인 특정</div>
            <div className="text-[10px] text-slate-500 mt-2 font-mono">$ git bisect reset</div>
          </div>
        </div>
      );
      return (
        <div className="flex flex-col items-center justify-center h-full p-4 space-y-3">
          <div className="flex items-center gap-1 max-w-xs w-full">
            <div className="text-[10px] text-emerald-600 font-bold">#{step.range[0]}</div>
            <div className="flex-1 h-3 bg-slate-200 rounded-full relative overflow-hidden">
              <div className="absolute left-0 top-0 h-full bg-emerald-300 rounded-full" style={{width:`${((step.mid-step.range[0])/(step.range[1]-step.range[0]))*100}%`}}></div>
              <div className="absolute top-0 h-full w-1 bg-amber-500" style={{left:`${((step.mid-step.range[0])/(step.range[1]-step.range[0]))*100}%`}}></div>
            </div>
            <div className="text-[10px] text-red-600 font-bold">#{step.range[1]}</div>
          </div>
          <div className="bg-amber-100 border-2 border-amber-400 rounded-full px-4 py-1">
            <span className="text-xs font-bold text-amber-700">현재 테스트: #{step.mid}</span>
          </div>
          <div className="text-[10px] text-slate-500">good? or bad?</div>
        </div>
      );
    }

    const SECTIONS = [
      {id:"1-1",label:"VIII-1-1",title:"태그와 릴리즈",steps:STEPS_1_1,Renderer:Viz_1_1},
      {id:"1-2",label:"VIII-1-2",title:"GitHub Releases",steps:STEPS_1_2,Renderer:Viz_1_2},
      {id:"2-1",label:"VIII-2-1",title:"git log 고급",steps:STEPS_2_1,Renderer:Viz_2_1},
      {id:"2-2",label:"VIII-2-2",title:"git blame",steps:STEPS_2_2,Renderer:Viz_2_2},
      {id:"2-3",label:"VIII-2-3",title:"git bisect",steps:STEPS_2_3,Renderer:Viz_2_3},
    ];

    function App() {
      const [sectionIdx,setSectionIdx]=useState(0);const [stepIdx,setStepIdx]=useState(0);const [isPlaying,setIsPlaying]=useState(false);const playRef=useRef(null);
      const section=SECTIONS[sectionIdx];const step=section.steps[stepIdx];const isEnd=stepIdx===section.steps.length-1;const Renderer=section.Renderer;

      const handleTabChange=(idx)=>{setSectionIdx(idx);setStepIdx(0);setIsPlaying(false);};
      const handleNext=()=>{setStepIdx(prev=>{if(prev<section.steps.length-1)return prev+1;setIsPlaying(false);return prev;});};
      const handleNextRef=useRef(handleNext);handleNextRef.current=handleNext;
      const handlePrev=()=>{if(stepIdx>0){setStepIdx(prev=>prev-1);setIsPlaying(false);}};
      const togglePlay=()=>{if(isEnd)setStepIdx(0);setIsPlaying(prev=>!prev);};

      useEffect(()=>{
        if(isPlaying){playRef.current=setInterval(()=>handleNextRef.current(),2800);}
        else{clearInterval(playRef.current);}
        return()=>clearInterval(playRef.current);
      },[isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-4">
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between flex-wrap gap-2">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-[9px]">VIII</div>
                  <div>
                    <h1 className="text-xl font-bold text-slate-800">Part VIII. 태그·릴리즈·분석·디버깅</h1>
                    <p className="text-xs text-slate-500">버전 태그로 릴리즈를 관리하고, Git의 분석·디버깅 도구로 문제를 추적한다.</p>
                  </div>
                </div>
                <a href="../index.html" className="text-xs text-amber-600 hover:underline font-medium">← 전체 목차</a>
              </div>
            </header>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-1 flex gap-1 overflow-x-auto">
              {SECTIONS.map((s,i)=>(
                <button key={s.id} onClick={()=>handleTabChange(i)} aria-label={`${s.label} — ${s.title} 섹션으로 이동`}
                  className={`flex-1 min-w-[90px] px-2 py-2 rounded-lg text-xs font-medium transition-all
                    ${i===sectionIdx?'bg-amber-600 text-white shadow-sm':'text-slate-500 hover:bg-slate-100'}`}>
                  <div className="font-bold">{s.label}</div>
                  <div className="text-[10px] mt-0.5 opacity-80 truncate">{s.title}</div>
                </button>
              ))}
            </div>

            <div className={`rounded-xl p-4 text-white text-sm bg-amber-600`}>
              <div className="font-bold">{step.label}</div>
              <div className="text-xs mt-1 opacity-90">{step.desc}</div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 min-h-[320px] flex items-stretch">
              <div className="flex-1"><Renderer step={step} /></div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-3 flex items-center justify-between">
              <button onClick={handlePrev} disabled={stepIdx===0} aria-label="이전 단계"
                className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-colors ${stepIdx===0?'text-slate-300 cursor-not-allowed':'text-amber-600 hover:bg-amber-50'}`}>← 이전</button>
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} aria-label={isPlaying?'정지':'자동 재생'}
                  className="w-8 h-8 rounded-full bg-amber-600 text-white flex items-center justify-center text-xs hover:bg-amber-700 transition-colors">
                  {isPlaying?'⏸':'▶'}
                </button>
                <span className="text-xs text-slate-500 font-medium">Step {stepIdx+1}/{section.steps.length}</span>
              </div>
              <button onClick={handleNext} disabled={isEnd} aria-label="다음 단계"
                className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-colors ${isEnd?'text-slate-300 cursor-not-allowed':'text-amber-600 hover:bg-amber-50'}`}>다음 →</button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
<script src="sidebar.js"></script>
</body>
</html>
