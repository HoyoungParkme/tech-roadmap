            </g>
          )}
          <text x="395" y="44" fontSize="11" fontFamily="monospace" fill={active ? '#0f172a' : '#94a3b8'}>main</text>
          <text x="95" y="20" fontSize="8" fontFamily="monospace" fill={active ? '#0ea5e9' : '#cbd5e1'}>≤ 1d</text>
        </g>
      );
    }

    function BranchRowRelease({ active }) {
      // main 위로 release/1.x, release/2.x 두 갈래 분기 후 평행 유지
      const mainCol = active ? '#0f172a' : '#cbd5e1';
      const r1 = active ? '#7c3aed' : '#cbd5e1';
      const r2 = active ? '#16a34a' : '#cbd5e1';
      return (
        <g>
          {/* main */}
          <line x1="20" y1="60" x2="380" y2="60" stroke={mainCol} strokeWidth="2" />
          {/* release/1.x: 분기 후 평행 */}
          <path d="M 110 60 C 125 50, 140 50, 155 40" fill="none" stroke={r1} strokeWidth="2" />
          <line x1="155" y1="40" x2="380" y2="40" stroke={r1} strokeWidth="2" />
          {/* release/2.x: 분기 후 평행 (위쪽) */}
          <path d="M 230 60 C 245 35, 260 35, 275 22" fill="none" stroke={r2} strokeWidth="2" />
          <line x1="275" y1="22" x2="380" y2="22" stroke={r2} strokeWidth="2" />
          {/* cherry-pick 화살표 (점선) */}
          {active && (
            <>
              <path d="M 320 60 C 335 50, 340 45, 340 40" fill="none" stroke={r1} strokeWidth="1" strokeDasharray="2 2" />
              <path d="M 350 60 C 360 40, 360 30, 360 22" fill="none" stroke={r2} strokeWidth="1" strokeDasharray="2 2" />
            </>
          )}
          {/* 점 */}
          {[40, 110, 180, 230, 280, 320, 350, 380].map((x, i) => (
            <circle key={i} cx={x} cy="60" r="3.5" fill={mainCol} />
          ))}
          {[180, 240, 300, 340, 380].map((x, i) => (
            <circle key={i} cx={x} cy="40" r="3" fill={r1} />
          ))}
          {[300, 340, 380].map((x, i) => (
            <circle key={i} cx={x} cy="22" r="3" fill={r2} />
          ))}
          {/* 라벨 */}
          <text x="395" y="63" fontSize="10" fontFamily="monospace" fill={active ? '#0f172a' : '#94a3b8'}>main</text>
          <text x="160" y="36" fontSize="9" fontFamily="monospace" fill={active ? '#7c3aed' : '#94a3b8'}>release/1.x</text>
          <text x="280" y="18" fontSize="9" fontFamily="monospace" fill={active ? '#16a34a' : '#94a3b8'}>release/2.x</text>
          {active && (
            <text x="345" y="55" fontSize="7" fontFamily="monospace" fill="#64748b">cherry-pick</text>
          )}
        </g>
      );
    }

    function ModelCard({ id, title, subtitle, active, children }) {
      return (
        <div
          className={`rounded-xl border-2 p-3 transition ${
            active
              ? 'border-slate-700 bg-white shadow-md ring-2 ring-slate-300'
              : 'border-slate-200 bg-slate-50 opacity-70'
          }`}
        >
          <div className="flex items-center justify-between mb-2">
            <div>
              <div className={`text-xs font-bold ${active ? 'text-slate-800' : 'text-slate-500'}`}>{title}</div>
              <div className={`text-[10px] ${active ? 'text-slate-500' : 'text-slate-400'}`}>{subtitle}</div>
            </div>
            {active && (
              <span className="text-[10px] bg-slate-800 text-white px-2 py-0.5 rounded-full font-mono pulse-ring">
                ACTIVE
              </span>
            )}
          </div>
          <svg viewBox="0 0 470 90" className="w-full h-[78px]" preserveAspectRatio="xMinYMid meet">
            {children}
          </svg>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측. 4 모델 카드 + step 5 일 때 비교 매트릭스 추가
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const isActive = (id) => step.highlightModels.includes(id);
      const isCompare = step.active === 'compare';

      return (
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-4 space-y-3">
          <div className="flex items-center justify-between">
            <h2 className="text-sm font-bold text-slate-700">브랜칭 모델 그래프</h2>
            <span className="text-[10px] text-slate-400 font-mono">
              {isCompare ? '4 / 4 모델' : `${step.highlightModels.length} / 4 활성`}
            </span>
          </div>

          <ModelCard
            id="github"
            title="GitHub Flow"
            subtitle="main + 짧은 feature"
            active={isActive('github')}
          >
            <BranchRowGitHubFlow active={isActive('github')} />
          </ModelCard>

          <ModelCard
            id="gitflow"
            title="Git Flow"
            subtitle="main / develop / feature / release / hotfix"
            active={isActive('gitflow')}
          >
            <BranchRowGitFlow active={isActive('gitflow')} />
          </ModelCard>

          <ModelCard
            id="trunk"
            title="Trunk-based"
            subtitle="main only + feature flag"
            active={isActive('trunk')}
          >
            <BranchRowTrunk active={isActive('trunk')} />
          </ModelCard>

          <ModelCard
            id="release"
            title="Release branch"
            subtitle="release/1.x, release/2.x 장기 유지"
            active={isActive('release')}
          >
            <BranchRowRelease active={isActive('release')} />
          </ModelCard>

          {/* compare step 에서만 보이는 결정 보드 */}
          {isCompare && (
            <div className="fade-in-up mt-2 rounded-xl bg-slate-900 text-slate-100 p-3 text-[11px] font-mono leading-relaxed">
              <div className="text-slate-400 mb-1">// quick-pick decision</div>
              <div><span className="text-emerald-400">small SaaS</span> → GitHub Flow</div>
              <div><span className="text-violet-400">scheduled release</span> → Git Flow</div>
              <div><span className="text-sky-400">100+ devs + flags</span> → Trunk-based</div>
              <div><span className="text-amber-400">OSS / LTS</span> → Release branch</div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // CodeViewer — 우측. 5 파일 탭 + 활성 파일 highlight.js 렌더
    // ─────────────────────────────────────────────────────
    function CodeViewer({ activeFile, stepIdx, total }) {
      const code = CODE_FILES[activeFile];
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        // 한 번에 하이라이트 후 줄 단위 분리
        const raw = code.lines.join('\n');
        try {
          const result = window.hljs.highlight(raw, { language: code.lang, ignoreIllegals: true });
          setRenderedLines(result.value.split('\n'));
        } catch (e) {
          setRenderedLines(code.lines);
        }
      }, [activeFile]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg flex flex-col">
          {/* 헤더 — 신호등 + 5 파일 탭 + 언어 */}
          <div className="bg-[#21252b] flex items-center border-b border-slate-700">
            <div className="flex gap-1.5 px-4 py-2 flex-shrink-0 border-r border-slate-700">
              <span className="w-3 h-3 rounded-full bg-red-500" />
              <span className="w-3 h-3 rounded-full bg-yellow-500" />
              <span className="w-3 h-3 rounded-full bg-green-500" />
            </div>
            <div className="flex flex-1 overflow-x-auto">
              {FILE_TABS.map((tab) => {
                const active = tab === activeFile;
                return (
                  <div
                    key={tab}
                    className={`text-[10px] font-mono px-3 py-2 border-r border-slate-700 transition whitespace-nowrap ${
                      active
                        ? 'bg-[#282c34] text-slate-200 font-bold border-t-2 border-t-slate-300'
                        : 'text-slate-500'
                    }`}
                  >
                    {tab}
                  </div>
                );
              })}
            </div>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase px-3 py-2 flex-shrink-0">
              {code.lang}
            </span>
          </div>

          {/* hljs 토큰화 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 라인 렌더 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-slate-500/15 border-l-2 border-slate-300' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {activeFile}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 자동재생(3000ms) + 키보드 ←/→ + 4 버튼 컨트롤
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => setStepIdx((i) => {
        if (i >= STEPS.length - 1) {
          setIsPlaying(false);
          return i;
        }
        return i + 1;
      });
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };
      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') {
            e.preventDefault();
            nextRef.current();
          }
          if (e.key === 'ArrowLeft') {
            e.preventDefault();
            prevRef.current();
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-slate-700 hover:text-slate-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum VIII</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex items-center gap-3">
              <div className="w-9 h-9 bg-slate-700 text-white flex items-center justify-center rounded-full font-bold text-[11px] flex-shrink-0">VIII</div>
              <div>
                <div className="text-xs text-slate-500 font-medium">Part VIII. 협업 워크플로우</div>
                <h1 className="text-xl md:text-2xl font-bold text-slate-800">Git Flow / GitHub Flow / Trunk-based / Release branch</h1>
                <p className="text-sm text-slate-500 mt-0.5">4 가지 브랜칭 모델을 한 화면에서 비교하며 팀에 맞는 모델을 고른다</p>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer activeFile={step.codeFile} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-slate-100 border-2 border-slate-300 rounded-xl p-3 text-sm text-slate-800">
                💡 정리: 모델은 도구가 아니라 팀의 약속이다. <strong>팀 규모 × 배포 빈도 × 제품 유형</strong>으로 고르고, 작게 시작해 필요 시 점진적으로 옮긴다. 다음 Part IX에서는 이 워크플로우를 자동화하는 GitHub Actions를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-slate-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-slate-300">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-slate-300">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
              <div className="mt-2 inline-block bg-slate-900/40 text-slate-100 px-2 py-0.5 rounded text-[11px] font-mono">
                key: {step.keyPoint}
              </div>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              {(() => {
                const grayBtn = "px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition";
                return (
                  <>
                    <button onClick={handleReset} disabled={stepIdx === 0 && !isPlaying} aria-label="처음으로" className={grayBtn}>처음</button>
                    <button onClick={handlePrev} disabled={stepIdx === 0} aria-label="이전 단계" className={grayBtn}>&larr; 이전</button>
                    <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                      className="px-4 py-1.5 rounded-lg text-sm font-bold bg-slate-700 text-white hover:bg-slate-800 transition min-w-[110px]">
                      {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
                    </button>
                    <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1} aria-label="다음 단계" className={grayBtn}>다음 &rarr;</button>
                  </>
                );
              })()}
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['GitHub Flow', 'Git Flow', 'Trunk-based', 'Release branch', 'feature flag', 'cherry-pick', 'develop', 'hotfix', 'main only'].map((kw) => (
                <span key={kw} className="bg-slate-100 text-slate-700 px-3 py-1 rounded-full text-xs font-medium border border-slate-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./part-7.html" className="text-slate-700 hover:text-slate-900 font-medium">&larr; Part VII</a>
              <a href="./part-9.html" className="text-slate-700 hover:text-slate-900 font-medium">Part IX &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script src="sidebar.js"></script>
</body>
</html>
