<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Git & GitHub 학습 — Merge Conflict 해결</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-2-2. Merge Conflict 해결
    학습 목표: 충돌 마커를 읽고 수동 결정 → commit으로 충돌을 해결할 수 있다.
    핵심 비유: "두 사람이 같은 칠판에 동시 수정" — Git이 "여기 겹쳤어요" 신호 → 사람이 결정
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 분기 시작 — 같은 라인에 두 가지 변경',
        desc: 'main과 feature 두 브랜치가 base 커밋에서 분기. 같은 파일의 같은 라인을 각각 다르게 수정한다. 이 시점에서는 아직 문제 없음 — Git은 변경을 따로 기록.',
        focus: 'split',
      },
      {
        title: 'Step 2. merge 시도 → 자동 머지 거부',
        desc: 'main에서 `git merge feature` 실행. Git이 같은 라인에 두 개의 다른 변경이 있음을 감지. 자동으로 어느 쪽이 옳은지 모르므로 사람의 결정을 요청한다. CONFLICT 메시지 출력.',
        focus: 'merge',
      },
      {
        title: 'Step 3. 충돌 마커 표시',
        desc: 'Git이 충돌 파일에 마커를 자동 삽입한다. `<<<<<<< HEAD` ~ `=======` 사이는 현재 브랜치(main)의 코드, `=======` ~ `>>>>>>> feature` 사이는 들어오는 브랜치(feature)의 코드. 사람이 직접 편집해야 한다.',
        focus: 'markers',
      },
      {
        title: 'Step 4. 사람이 수동 결정',
        desc: '편집기에서 마커를 모두 지우고 셋 중 하나를 선택. (A) HEAD만 남김, (B) feature만 남김, (C) 두 변경을 합쳐 새로 작성. 어느 쪽도 자동이 아니다 — 의도를 아는 건 사람뿐.',
        focus: 'decide',
      },
      {
        title: 'Step 5. add + commit으로 마무리',
        desc: '결정한 내용을 저장 → `git add <file>` → `git commit`. 충돌이 해결되고 merge commit이 만들어진다. 둘 이상의 부모를 가진 특별한 commit으로 히스토리에 기록된다.',
        focus: 'commit',
      },
    ];

    // 결정 옵션 (Step 4)
    const DECISIONS = {
      head:    { label: 'HEAD만 남김',  result: 'console.log("v1: from main")' },
      feature: { label: 'feature만 남김', result: 'console.log("v2: from feature")' },
      both:    { label: '두 변경 통합',  result: 'console.log("v1+v2: merged manually")' },
    };

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [decision, setDecision] = useState('head');
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const focus = step.focus;

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Merge Conflict 해결</h1>
                <p className="text-sm text-slate-500 mt-1">두 사람이 같은 줄을 수정 → Git이 "여기 겹쳤어요" 신호 → 사람이 결정</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* 메인 비주얼: 두 브랜치 좌우 비교 */}
            {(focus === 'split' || focus === 'merge') && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div className="bg-white rounded-xl border-2 border-emerald-400 p-4">
                  <div className="font-bold text-emerald-800 text-sm mb-2">🌿 main 브랜치</div>
                  <pre className="bg-slate-900 text-white p-3 rounded text-xs leading-6 font-mono">
                    <div>function greet() {`{`}</div>
                    <div className="bg-emerald-700 -mx-3 px-3">  console.log("v1: from main")</div>
                    <div>{`}`}</div>
                  </pre>
                </div>
                <div className="bg-white rounded-xl border-2 border-violet-400 p-4">
                  <div className="font-bold text-violet-800 text-sm mb-2">🌳 feature 브랜치</div>
                  <pre className="bg-slate-900 text-white p-3 rounded text-xs leading-6 font-mono">
                    <div>function greet() {`{`}</div>
                    <div className="bg-violet-700 -mx-3 px-3">  console.log("v2: from feature")</div>
                    <div>{`}`}</div>
                  </pre>
                </div>
              </div>
            )}

            {/* Step 2 추가: merge 명령 + 거부 메시지 */}
            {focus === 'merge' && (
              <div className="bg-rose-50 border-2 border-rose-300 rounded-xl p-4 mb-6">
                <pre className="bg-slate-900 text-white p-3 rounded text-xs font-mono mb-2">
                  $ git checkout main<br/>
                  $ git merge feature<br/>
                  <span className="text-rose-300">CONFLICT (content): Merge conflict in app.js</span><br/>
                  <span className="text-rose-300">Automatic merge failed; fix conflicts and then commit the result.</span>
                </pre>
                <div className="text-[11px] text-rose-900 leading-relaxed">
                  ⚠️ 같은 라인에 두 변경 → Git이 어느 쪽이 옳은지 모름. 사람의 결정 필요
                </div>
              </div>
            )}

            {/* Step 3: 충돌 마커가 들어간 파일 */}
            {focus === 'markers' && (
              <div className="bg-white rounded-xl border-2 border-amber-400 p-5 mb-6">
                <div className="font-bold text-amber-800 text-sm mb-2">📄 app.js — Git이 자동 삽입한 마커</div>
                <pre className="bg-slate-900 text-white p-4 rounded text-xs leading-6 font-mono">
                  <div>function greet() {`{`}</div>
                  <div className="bg-rose-700 -mx-4 px-4 font-bold">{'<<<<<<< HEAD'}</div>
                  <div className="bg-emerald-700 -mx-4 px-4">  console.log("v1: from main")</div>
                  <div className="bg-rose-700 -mx-4 px-4 font-bold">=======</div>
                  <div className="bg-violet-700 -mx-4 px-4">  console.log("v2: from feature")</div>
                  <div className="bg-rose-700 -mx-4 px-4 font-bold">{'>>>>>>> feature'}</div>
                  <div>{`}`}</div>
                </pre>
                <div className="mt-3 grid grid-cols-1 md:grid-cols-3 gap-2 text-[11px]">
                  <div className="p-2 bg-rose-50 rounded">
                    <code>{'<<<<<<< HEAD'}</code><br/>
                    <span className="text-slate-600">현재 브랜치 시작</span>
                  </div>
                  <div className="p-2 bg-rose-50 rounded">
                    <code>=======</code><br/>
                    <span className="text-slate-600">두 변경 사이 구분선</span>
                  </div>
                  <div className="p-2 bg-rose-50 rounded">
                    <code>{'>>>>>>> feature'}</code><br/>
                    <span className="text-slate-600">들어오는 브랜치 끝</span>
                  </div>
                </div>
              </div>
            )}

            {/* Step 4: 결정 토글 */}
            {focus === 'decide' && (
              <div className="bg-white rounded-xl border-2 border-sky-400 p-5 mb-6">
                <div className="font-bold text-slate-800 text-sm mb-3">선택 — 어느 쪽을 남길까?</div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-2 mb-4">
                  {Object.entries(DECISIONS).map(([key, d]) => (
                    <button
                      key={key}
                      onClick={() => setDecision(key)}
                      aria-pressed={decision === key}
                      className={`p-3 rounded-lg border-2 text-left text-xs transition-all ${
                        decision === key
                          ? 'border-sky-600 bg-sky-50 font-bold'
                          : 'border-slate-200 hover:border-slate-400 bg-white'
                      }`}
                    >
                      {d.label}
                    </button>
                  ))}
                </div>
                <div className="bg-slate-900 text-white p-3 rounded text-xs font-mono">
                  <div className="text-slate-400 mb-1">// app.js (마커 모두 제거 후)</div>
                  <div>function greet() {`{`}</div>
                  <div className="bg-emerald-700 -mx-3 px-3">  {DECISIONS[decision].result}</div>
                  <div>{`}`}</div>
                </div>
              </div>
            )}

            {/* Step 5: commit 마무리 */}
            {focus === 'commit' && (
              <div className="bg-white rounded-xl border-2 border-emerald-400 p-5 mb-6">
                <pre className="bg-slate-900 text-white p-4 rounded text-xs font-mono leading-6">
                  $ git add app.js<br/>
                  $ git commit<br/>
                  <span className="text-emerald-300">[main 7a3f9c2] Merge branch 'feature'</span>
                </pre>
                <div className="mt-3 p-3 bg-slate-50 border border-slate-200 rounded text-[11px] text-slate-700">
                  Step 4 결정 → <span className="font-bold">{DECISIONS[decision].label}</span>
                </div>
                <div className="mt-2 p-3 bg-emerald-50 border border-emerald-200 rounded text-[11px] text-emerald-900">
                  ✅ 충돌 해결 완료. merge commit은 두 부모(main + feature)를 가진다 → 히스토리에 분기와 합류 모두 기록.
                </div>
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
