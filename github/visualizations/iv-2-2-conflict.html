<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Git & GitHub 학습 — Merge Conflict 해결 (FastAPI 패턴)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-2-2. Merge Conflict 해결 (FastAPI 패턴 v1)
    학습 목표: 충돌 마커를 읽고 수동으로 해결 → commit으로 머지 완료까지의 흐름을 이해한다.
    핵심 비유: "두 사람이 같은 칠판에 동시 수정" — Git이 "여기 겹쳤어요" 신호 → 사람이 결정
    레이아웃: 좌 LiveDataPane(브랜치 + 충돌 파일 시각화) / 우 CodeViewer(파일명 탭)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // -----------------------------------------------------------------------
    // STEPS — 5단계 시뮬레이션
    // 각 step에는 좌측 LiveDataPane이 읽는 dataState와
    // 우측 CodeViewer가 읽는 code(filename, lang, lines, highlight)이 있다.
    // -----------------------------------------------------------------------
    const STEPS = [
      {
        title: 'Step 1. 두 브랜치가 같은 줄을 수정',
        desc: 'main과 feature 브랜치가 같은 base 커밋에서 분기. 같은 파일(app.js)의 같은 라인을 각각 다르게 수정한다. 이 시점에는 아직 충돌이 없다 — Git은 두 변경을 따로 기록만 해둔 상태.',
        focus: 'split',
        dataState: {
          stage: 'split',
          mainLine: 'console.log("v1: from main")',
          featureLine: 'console.log("v2: from feature")',
          mergedFile: null,
          mergeStatus: null,
        },
        code: {
          filename: 'setup.sh',
          lang: 'bash',
          highlight: [4, 9],
          lines: [
            '#!/usr/bin/env bash',
            '# 두 브랜치를 만들고 같은 줄을 다르게 수정한다',
            '',
            'git checkout -b main',
            'echo \'function greet() { console.log("base"); }\' > app.js',
            'git add app.js && git commit -m "base"',
            '',
            '# main 브랜치에서 수정',
            'sed -i \'s/base/v1: from main/\' app.js',
            'git commit -am "main: v1"',
            '',
            '# feature 브랜치 분기 후 같은 줄 수정',
            'git checkout -b feature HEAD~1',
            'sed -i \'s/base/v2: from feature/\' app.js',
            'git commit -am "feature: v2"',
          ],
        },
      },
      {
        title: 'Step 2. merge 시도 → CONFLICT 발생',
        desc: 'main 브랜치로 돌아가 `git merge feature` 실행. Git이 같은 라인에 두 가지 다른 변경이 있음을 감지. 자동으로 어느 쪽이 옳은지 판단할 수 없으므로 자동 머지를 거부하고 CONFLICT 메시지를 출력한다.',
        focus: 'merge',
        dataState: {
          stage: 'merge',
          mainLine: 'console.log("v1: from main")',
          featureLine: 'console.log("v2: from feature")',
          mergedFile: null,
          mergeStatus: 'CONFLICT',
        },
        code: {
          filename: 'merge-conflict.sh',
          lang: 'bash',
          highlight: [4, 5, 6],
          lines: [
            '$ git checkout main',
            'Switched to branch \'main\'',
            '',
            '$ git merge feature',
            'Auto-merging app.js',
            'CONFLICT (content): Merge conflict in app.js',
            'Automatic merge failed; fix conflicts and then commit the result.',
            '',
            '$ git status',
            'On branch main',
            'You have unmerged paths.',
            '  (fix conflicts and run "git commit")',
            '',
            'Unmerged paths:',
            '  (use "git add <file>..." to mark resolution)',
            '        both modified:   app.js',
          ],
        },
      },
      {
        title: 'Step 3. 충돌 마커 확인',
        desc: 'Git이 app.js에 충돌 마커를 자동 삽입한다. `<<<<<<< HEAD` ~ `=======` 사이는 현재 브랜치(main)의 코드, `=======` ~ `>>>>>>> feature` 사이는 들어오는 브랜치(feature)의 코드. 사람이 직접 편집해서 결정해야 한다.',
        focus: 'markers',
        dataState: {
          stage: 'markers',
          mainLine: 'console.log("v1: from main")',
          featureLine: 'console.log("v2: from feature")',
          mergedFile: [
            { kind: 'plain', text: 'function greet() {' },
            { kind: 'marker', text: '<<<<<<< HEAD' },
            { kind: 'main', text: '  console.log("v1: from main")' },
            { kind: 'sep', text: '=======' },
            { kind: 'feature', text: '  console.log("v2: from feature")' },
            { kind: 'marker', text: '>>>>>>> feature' },
            { kind: 'plain', text: '}' },
          ],
          mergeStatus: 'CONFLICT',
        },
        code: {
          filename: 'markers.txt',
          lang: 'plaintext',
          highlight: [2, 4, 6],
          lines: [
            'function greet() {',
            '<<<<<<< HEAD',
            '  console.log("v1: from main")',
            '=======',
            '  console.log("v2: from feature")',
            '>>>>>>> feature',
            '}',
            '',
            '# 마커 의미',
            '# <<<<<<< HEAD     : 현재 브랜치(main) 시작',
            '# =======          : 두 변경 사이의 구분선',
            '# >>>>>>> feature  : 들어오는 브랜치(feature) 끝',
          ],
        },
      },
      {
        title: 'Step 4. 수동 해결 — 코드 편집',
        desc: '편집기에서 마커를 모두 지우고 의도한 코드만 남긴다. 여기서는 두 변경을 합치는 방식으로 결정. 어느 쪽도 자동이 아니다 — 의도를 아는 건 사람뿐이다.',
        focus: 'resolve',
        dataState: {
          stage: 'resolve',
          mainLine: 'console.log("v1: from main")',
          featureLine: 'console.log("v2: from feature")',
          mergedFile: [
            { kind: 'plain', text: 'function greet() {' },
            { kind: 'merged', text: '  console.log("v1+v2: merged manually")' },
            { kind: 'plain', text: '}' },
          ],
          mergeStatus: 'RESOLVED',
        },
        code: {
          filename: 'resolve.txt',
          lang: 'javascript',
          highlight: [2],
          lines: [
            'function greet() {',
            '  console.log("v1+v2: merged manually")',
            '}',
            '',
            '// 수동 해결의 3가지 옵션',
            '// (A) HEAD만 남김    : main 브랜치 코드만 유지',
            '// (B) feature만 남김 : feature 브랜치 코드만 유지',
            '// (C) 두 변경 통합   : 양쪽 의도를 합쳐 새로 작성 ← 이 예시',
            '',
            '// 마커(<<<<<<<, =======, >>>>>>>)는 모두 제거되어야 한다',
          ],
        },
      },
      {
        title: 'Step 5. git add + git commit으로 완료',
        desc: '편집한 파일을 staging에 올리고(`git add app.js`) commit한다(`git commit`). 충돌이 해결되고 두 부모(main + feature)를 가진 merge commit이 만들어진다. 히스토리에 분기와 합류가 모두 기록된다.',
        focus: 'commit',
        dataState: {
          stage: 'commit',
          mainLine: 'console.log("v1: from main")',
          featureLine: 'console.log("v2: from feature")',
          mergedFile: [
            { kind: 'plain', text: 'function greet() {' },
            { kind: 'merged', text: '  console.log("v1+v2: merged manually")' },
            { kind: 'plain', text: '}' },
          ],
          mergeStatus: 'COMMITTED',
        },
        code: {
          filename: 'commit.sh',
          lang: 'bash',
          highlight: [1, 2, 4],
          lines: [
            '$ git add app.js',
            '$ git commit -m "Merge branch \'feature\' into main"',
            '',
            '[main 7a3f9c2] Merge branch \'feature\' into main',
            '',
            '$ git log --oneline --graph',
            '*   7a3f9c2 (HEAD -> main) Merge branch \'feature\' into main',
            '|\\',
            '| * b8c1d44 (feature) feature: v2',
            '* | a2e7f10 main: v1',
            '|/',
            '* 1f3d9e7 base',
          ],
        },
      },
    ];

    // -----------------------------------------------------------------------
    // 학습 팁 — 단계별 핵심 메시지
    // 각 step의 focus에 매핑되는 한 줄 팁. 본문 desc보다 짧고 행동 지침 중심.
    // -----------------------------------------------------------------------
    const STEP_TIPS = {
      split: {
        emoji: '🌱',
        title: '아직은 안전하다',
        body: '브랜치 분기는 충돌의 원인이 아니다. 같은 라인을 서로 다르게 바꿨을 때 비로소 문제가 된다.',
      },
      merge: {
        emoji: '🚦',
        title: 'Git의 거부는 에러가 아니다',
        body: 'CONFLICT는 "잘못됐어"가 아니라 "결정해줘"라는 신호. 자동으로 정답을 고를 수 없다는 솔직한 보고일 뿐이다.',
      },
      markers: {
        emoji: '🔍',
        title: '마커의 3 부분을 구분해서 읽기',
        body: '<<<<<<< HEAD 부터 ======= 까지가 내 코드, ======= 부터 >>>>>>> feature 까지가 상대 코드. 이 형식은 Git의 표준 약속.',
      },
      resolve: {
        emoji: '✏️',
        title: '마커는 "코드"가 아니다 — 모두 지운다',
        body: '<<<<<<<, =======, >>>>>>> 세 마커는 반드시 모두 제거해야 한다. 남기면 syntax error로 빌드가 깨진다.',
      },
      commit: {
        emoji: '🎯',
        title: 'merge commit은 두 부모를 가진다',
        body: '히스토리 그래프에서 한 노드가 두 줄기로 거슬러 올라가는 모양이 된다. git log --graph로 직접 확인 가능.',
      },
    };

    // -----------------------------------------------------------------------
    // CodeViewer — VSCode 스타일 코드 블록 (atom-one-dark + 라인 번호)
    // 파일명 탭 + 윈도우 dot + 라인 강조
    // -----------------------------------------------------------------------
    function CodeViewer({ code }) {
      const codeRef = useRef(null);

      // 단계가 바뀔 때마다 highlight.js 재실행
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          // data-highlighted 플래그를 제거해야 재실행이 가능
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const fullText = code.lines.join('\n');

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일명 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="text-[10px] text-slate-500 ml-auto font-mono uppercase">{code.lang}</span>
          </div>

          {/* 코드 영역: 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[28rem] text-xs">
            <table className="w-full border-collapse">
              <tbody>
                {code.lines.map((line, i) => {
                  const lineNo = i + 1;
                  const isHighlighted = code.highlight && code.highlight.includes(lineNo);
                  return (
                    <tr key={i} className={isHighlighted ? 'bg-yellow-500/10' : ''}>
                      <td className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 align-top font-mono">
                        {lineNo}
                      </td>
                      <td className="pl-3 pr-3 font-mono whitespace-pre text-slate-100">
                        {line || ' '}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            {/* hljs용 hidden 마커 — 실제 표시는 위 table에서 */}
            <pre className="hidden">
              <code ref={codeRef} className={`language-${code.lang}`}>{fullText}</code>
            </pre>
          </div>
        </div>
      );
    }

    // -----------------------------------------------------------------------
    // LiveDataPane — 좌측 도메인 시각화
    // 두 브랜치 박스 + 충돌 파일 시각화 + merge 상태 배너
    // -----------------------------------------------------------------------
    function LiveDataPane({ state }) {
      const stage = state.stage;

      return (
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-4 space-y-3">
          <div className="flex items-center justify-between">
            <div className="text-xs font-bold text-slate-700">📦 브랜치 상태 시각화</div>
            <StatusBadge status={state.mergeStatus} />
          </div>

          {/* 두 브랜치 박스 */}
          <BranchPair
            mainLine={state.mainLine}
            featureLine={state.featureLine}
            stage={stage}
          />

          {/* merge 화살표 / 충돌 표시 */}
          <MergeIndicator stage={stage} />

          {/* 머지 결과 파일 (Step 3 이후 등장) */}
          {state.mergedFile && (
            <MergedFile lines={state.mergedFile} stage={stage} />
          )}

          {/* commit 결과 (Step 5) */}
          {stage === 'commit' && <CommitResult />}
        </div>
      );
    }

    // 상태 배지: 우측 상단 머지 단계 표시
    function StatusBadge({ status }) {
      const map = {
        CONFLICT: { label: 'CONFLICT', cls: 'bg-rose-100 text-rose-700 border-rose-300' },
        RESOLVED: { label: 'RESOLVED', cls: 'bg-amber-100 text-amber-700 border-amber-300' },
        COMMITTED: { label: 'COMMITTED', cls: 'bg-emerald-100 text-emerald-700 border-emerald-300' },
      };
      if (!status) {
        return (
          <span className="px-2 py-0.5 text-[10px] font-mono rounded border bg-slate-100 text-slate-500 border-slate-200">
            BRANCHED
          </span>
        );
      }
      const m = map[status];
      return (
        <span className={`px-2 py-0.5 text-[10px] font-mono rounded border ${m.cls}`}>
          {m.label}
        </span>
      );
    }

    // 두 브랜치 박스를 좌우로 표시
    function BranchPair({ mainLine, featureLine, stage }) {
      // merge 단계에서는 두 박스에 빨간 테두리로 충돌 표시
      const conflict = stage === 'merge' || stage === 'markers';
      return (
        <div className="grid grid-cols-2 gap-2">
          <BranchBox
            name="main"
            icon="🌿"
            line={mainLine}
            color="emerald"
            conflict={conflict}
          />
          <BranchBox
            name="feature"
            icon="🌳"
            line={featureLine}
            color="violet"
            conflict={conflict}
          />
        </div>
      );
    }

    // 단일 브랜치 박스 — 브랜치 이름 + 수정한 라인
    function BranchBox({ name, icon, line, color, conflict }) {
      // emerald, violet base 색 + conflict일 때 ring 강조
      const colorMap = {
        emerald: 'border-emerald-300 bg-emerald-50',
        violet: 'border-violet-300 bg-violet-50',
      };
      const textMap = {
        emerald: 'text-emerald-800',
        violet: 'text-violet-800',
      };
      const lineBg = {
        emerald: 'bg-emerald-100 border-emerald-300',
        violet: 'bg-violet-100 border-violet-300',
      };
      return (
        <div className={`rounded-lg border-2 p-3 ${colorMap[color]} ${conflict ? 'ring-2 ring-rose-300 ring-offset-1' : ''}`}>
          <div className={`text-xs font-bold mb-2 ${textMap[color]}`}>
            {icon} {name}
          </div>
          <div className="text-[10px] text-slate-500 mb-1 font-mono">app.js</div>
          <div className={`text-[11px] font-mono p-2 rounded border ${lineBg[color]} text-slate-800 break-all`}>
            {line}
          </div>
        </div>
      );
    }

    // 머지 단계 표시 화살표 / 충돌 X 마크
    function MergeIndicator({ stage }) {
      if (stage === 'split') {
        return (
          <div className="flex items-center justify-center py-2 text-xs text-slate-400">
            ↓ 두 브랜치 동시 진행 중
          </div>
        );
      }
      if (stage === 'merge') {
        return (
          <div className="bg-rose-50 border-2 border-rose-300 rounded-lg p-3 text-center">
            <div className="text-rose-700 font-bold text-sm">⚠️ 같은 라인 충돌</div>
            <div className="text-[11px] text-rose-600 mt-1">Git이 자동으로 어느 쪽이 옳은지 모름 → 사람의 결정 필요</div>
          </div>
        );
      }
      if (stage === 'markers') {
        return (
          <div className="bg-amber-50 border-2 border-amber-300 rounded-lg p-3 text-center">
            <div className="text-amber-700 font-bold text-sm">📌 충돌 마커가 파일에 삽입됨</div>
            <div className="text-[11px] text-amber-700 mt-1">아래 파일을 직접 편집해야 한다</div>
          </div>
        );
      }
      if (stage === 'resolve') {
        return (
          <div className="bg-amber-50 border-2 border-amber-400 rounded-lg p-3 text-center">
            <div className="text-amber-800 font-bold text-sm">✏️ 사람이 수동 편집</div>
            <div className="text-[11px] text-amber-700 mt-1">마커 모두 제거 + 의도한 코드만 남김</div>
          </div>
        );
      }
      if (stage === 'commit') {
        return (
          <div className="bg-emerald-50 border-2 border-emerald-400 rounded-lg p-3 text-center">
            <div className="text-emerald-800 font-bold text-sm">✅ git add + git commit</div>
            <div className="text-[11px] text-emerald-700 mt-1">두 부모를 가진 merge commit 생성</div>
          </div>
        );
      }
      return null;
    }

    // 머지된(또는 마커 포함된) 파일 시각화
    // kind에 따라 색상이 다름: marker(빨강), main(초록), feature(보라), sep(빨강), merged(에메랄드), plain(흰색)
    function MergedFile({ lines, stage }) {
      const titleMap = {
        markers: '📄 app.js — Git이 삽입한 충돌 마커',
        resolve: '📄 app.js — 수동 편집 후',
        commit: '📄 app.js — 최종 커밋된 내용',
      };
      const borderMap = {
        markers: 'border-rose-300',
        resolve: 'border-amber-300',
        commit: 'border-emerald-300',
      };

      const renderLine = (l, idx) => {
        const baseCls = 'px-3 py-0.5 text-[11px] font-mono whitespace-pre';
        const kindCls = {
          plain: 'text-slate-300',
          marker: 'bg-rose-700/80 text-white font-bold',
          sep: 'bg-rose-700/80 text-white font-bold',
          main: 'bg-emerald-700/70 text-white',
          feature: 'bg-violet-700/70 text-white',
          merged: 'bg-emerald-600/80 text-white',
        };
        return (
          <div key={idx} className={`${baseCls} ${kindCls[l.kind] || 'text-slate-300'}`}>
            {l.text}
          </div>
        );
      };

      return (
        <div className={`rounded-lg border-2 ${borderMap[stage] || 'border-slate-300'} overflow-hidden`}>
          <div className="bg-slate-100 px-3 py-1.5 text-[11px] font-bold text-slate-700 border-b border-slate-300">
            {titleMap[stage] || '📄 app.js'}
          </div>
          <div className="bg-slate-900 py-2">
            {lines.map(renderLine)}
          </div>
        </div>
      );
    }

    // commit 단계 — 부모가 둘인 merge commit 트리 시각화
    function CommitResult() {
      return (
        <div className="rounded-lg border border-slate-200 bg-slate-50 p-3">
          <div className="text-[11px] font-bold text-slate-700 mb-2">🌳 히스토리 그래프</div>
          <pre className="text-[10px] font-mono text-slate-700 leading-5">
{`  *   7a3f9c2  Merge branch 'feature' (HEAD -> main)
  |\\
  | *  b8c1d44  feature: v2
  * |  a2e7f10  main: v1
  |/
  *    1f3d9e7  base`}
          </pre>
          <div className="text-[10px] text-slate-500 mt-1">↑ merge commit은 부모가 둘 (main + feature)</div>
        </div>
      );
    }

    // -----------------------------------------------------------------------
    // StepBreadcrumb — 5단계 진행 표시 점퍼
    // 각 점을 클릭하면 해당 단계로 즉시 이동. 현재 단계는 강조.
    // -----------------------------------------------------------------------
    function StepBreadcrumb({ stepIdx, setStepIdx, total }) {
      const labels = ['분기', 'merge', '마커', '해결', 'commit'];
      return (
        <div className="flex items-center justify-center gap-1 mb-4">
          {Array.from({ length: total }).map((_, i) => {
            const isActive = i === stepIdx;
            const isPast = i < stepIdx;
            return (
              <React.Fragment key={i}>
                <button
                  onClick={() => setStepIdx(i)}
                  aria-label={`Step ${i + 1}: ${labels[i]}`}
                  aria-current={isActive ? 'step' : undefined}
                  className={`flex flex-col items-center gap-1 px-2 py-1 rounded transition-all ${
                    isActive ? 'scale-110' : 'opacity-70 hover:opacity-100'
                  }`}
                >
                  <div
                    className={`w-7 h-7 rounded-full flex items-center justify-center text-[11px] font-bold border-2 ${
                      isActive
                        ? 'bg-slate-800 text-white border-slate-800'
                        : isPast
                        ? 'bg-slate-300 text-slate-700 border-slate-400'
                        : 'bg-white text-slate-400 border-slate-300'
                    }`}
                  >
                    {i + 1}
                  </div>
                  <span className={`text-[10px] ${isActive ? 'font-bold text-slate-700' : 'text-slate-500'}`}>
                    {labels[i]}
                  </span>
                </button>
                {i < total - 1 && (
                  <div className={`w-4 h-0.5 ${i < stepIdx ? 'bg-slate-400' : 'bg-slate-200'}`} />
                )}
              </React.Fragment>
            );
          })}
        </div>
      );
    }

    // -----------------------------------------------------------------------
    // TipPanel — 현재 단계의 학습 팁 카드
    // 본문 desc 옆에 같이 보이며 핵심 행동 지침을 강조한다.
    // -----------------------------------------------------------------------
    function TipPanel({ focus }) {
      const tip = STEP_TIPS[focus];
      if (!tip) return null;
      return (
        <div className="bg-slate-100 border border-slate-300 rounded-lg p-3 flex gap-3 items-start">
          <div className="text-2xl shrink-0" aria-hidden="true">{tip.emoji}</div>
          <div>
            <div className="text-xs font-bold text-slate-800 mb-0.5">💡 {tip.title}</div>
            <p className="text-[11px] text-slate-600 leading-relaxed">{tip.body}</p>
          </div>
        </div>
      );
    }

    // -----------------------------------------------------------------------
    // App — 최상위 컴포넌트
    // STEPS 시뮬레이션 + 컨트롤(처음/이전/재생/다음) + 키보드 + 자동재생 3000ms
    // -----------------------------------------------------------------------
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const step = STEPS[stepIdx];

      // 자동재생: 3000ms마다 다음 단계로
      useEffect(() => {
        if (!isPlaying) return;
        const t = setInterval(() => {
          setStepIdx((i) => {
            if (i < STEPS.length - 1) return i + 1;
            setIsPlaying(false);
            return i;
          });
        }, 3000);
        return () => clearInterval(t);
      }, [isPlaying]);

      // 키보드 ←/→ 단계 이동
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight' && stepIdx < STEPS.length - 1) setStepIdx(stepIdx + 1);
          if (e.key === 'ArrowLeft' && stepIdx > 0) setStepIdx(stepIdx - 1);
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [stepIdx]);

      // 재생/정지 토글 — 마지막 단계에서 누르면 처음부터
      const togglePlay = () => {
        if (stepIdx === STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            {/* 헤더: 허브 링크 + 제목 + 단계 카운터 */}
            <div className="mb-5 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Merge Conflict 해결</h1>
                <p className="text-sm text-slate-500 mt-1">
                  두 사람이 같은 줄을 수정 → Git이 "여기 겹쳤어요" 신호 → 사람이 결정 → commit
                </p>
              </div>
              <div className="text-right shrink-0">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{stepIdx + 1} / {STEPS.length}</div>
              </div>
            </div>

            {/* 단계 브레드크럼: 5점 점퍼 */}
            <StepBreadcrumb stepIdx={stepIdx} setStepIdx={setStepIdx} total={STEPS.length} />

            {/* 좌/우 2-pane 분할 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
              <LiveDataPane state={step.dataState} />
              <CodeViewer code={step.code} />
            </div>

            {/* 단계 설명 패널 + 학습 팁 */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
              <div className="md:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="font-bold text-slate-800 text-base mb-1.5">{step.title}</div>
                <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
              </div>
              <TipPanel focus={step.focus} />
            </div>

            {/* 진행 바 */}
            <div className="mb-4">
              <div className="h-1.5 bg-slate-200 rounded-full overflow-hidden">
                <div
                  className="h-full bg-slate-700 transition-all duration-300"
                  style={{ width: `${((stepIdx + 1) / STEPS.length) * 100}%` }}
                />
              </div>
            </div>

            {/* 컨트롤 — 4 버튼 (처음 / 이전 / 재생 / 다음) */}
            <div className="flex items-center justify-between gap-2 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button
                onClick={() => { setIsPlaying(false); setStepIdx(0); }}
                disabled={stepIdx === 0}
                aria-label="처음으로"
                className="px-3 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed"
              >
                ↻ 처음
              </button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed flex-1"
              >
                ← 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700 flex-1"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={stepIdx === STEPS.length - 1}
                aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed flex-1"
              >
                다음 →
              </button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">
              키보드 ←/→ 로 단계 이동 · 자동 재생 3초 간격
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
