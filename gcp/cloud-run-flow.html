<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GCP 인터랙티브 학습 — Cloud Run 요청 흐름 시각화</title>

  <!-- Tailwind CSS Play CDN: 학습 자료용. 프로덕션에서는 PostCSS 빌드를 권장. -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 (development 버전: 학습용이므로 에러 메시지 상세 버전 사용) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel Standalone 7.x: 브라우저에서 JSX를 실시간 변환 (Fragment shorthand `<>` 지원) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    ─────────────────────────────────────────────────────────────
    GCP Chapter IV-1 — Cloud Run 요청 흐름 시각화
    ─────────────────────────────────────────────────────────────
    학습 목표 : 클라이언트 HTTPS 요청이 GCP 인프라에서
               Load Balancer → Cloud Run → Cloud SQL → 응답 → 로깅까지
               거치는 6단계 흐름을 단계별로 체험한다.
    조작법   : "자동 실행" 버튼으로 재생, 이전/다음 버튼으로 수동 전환.
    확장 방법 : 새 챕터를 추가할 때는 STEPS / CLI_CODE / 헤더 텍스트만 교체한다.
    ─────────────────────────────────────────────────────────────
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // -----------------------------------------
    // 1. 교육용 CLI 코드 (gcloud + YAML 혼합)
    // -----------------------------------------
    const PYTHON_CODE = [
      "# 1. Cloud Run 배포",
      "gcloud run deploy my-api \\",
      "  --image gcr.io/myproject/my-api \\",
      "  --region asia-northeast3 \\",
      "  --allow-unauthenticated",
      "",
      "# 2. Cloud SQL 연결 설정",
      "gcloud run services update my-api \\",
      "  --add-cloudsql-instances \\",
      "  myproject:asia-northeast3:mydb",
      "",
      "# 3. 로그 확인",
      "gcloud logging read \\",
      "  \"resource.type=cloud_run_revision\" \\",
      "  --limit 10",
    ];

    // -----------------------------------------
    // 2. 시뮬레이션 스텝 정의 (6 STEPS)
    // -----------------------------------------
    const STEPS = [
      {
        codeLine: 1,
        title: "STEP 1 — 클라이언트 요청",
        desc: "[클라이언트 요청] 브라우저나 앱이 HTTPS로 요청을 보냅니다. TLS 암호화가 적용된 안전한 통신입니다. gcloud CLI로 배포한 Cloud Run 서비스 URL(예: https://my-api-xxxx-an.a.run.app)이 목적지입니다.",
        clientState: 'sending',
        lbState: 'idle',
        crState: 'idle',
        sqlState: 'idle',
        responseState: 'idle',
        loggingState: 'idle',
        dataObj: { method: 'HTTPS', path: '/api/users' }
      },
      {
        codeLine: 1,
        title: "STEP 2 — Google Load Balancer",
        desc: "[Load Balancer] Google의 글로벌 로드 밸런서가 요청을 받습니다. 여기서 SSL(TLS) 암호화를 종료(Termination)하고, 가장 가까운 리전(asia-northeast3 = 서울)의 Cloud Run 인스턴스로 트래픽을 라우팅합니다.",
        clientState: 'waiting',
        lbState: 'active',
        crState: 'idle',
        sqlState: 'idle',
        responseState: 'idle',
        loggingState: 'idle',
        dataObj: { ssl: 'terminated', region: 'asia-northeast3' }
      },
      {
        codeLine: 1,
        title: "STEP 3 — Cloud Run 인스턴스",
        desc: "[Cloud Run] Stateless(상태 없는) 컨테이너가 요청을 처리합니다. 트래픽이 많으면 자동으로 인스턴스가 늘어나고(Scale Out), 없으면 0까지 줄어듭니다(Scale to Zero). --allow-unauthenticated 옵션으로 인증 없이도 접근 가능합니다.",
        clientState: 'waiting',
        lbState: 'done',
        crState: 'active',
        sqlState: 'idle',
        responseState: 'idle',
        loggingState: 'idle',
        dataObj: { instances: 3, status: 'processing' }
      },
      {
        codeLine: 7,
        title: "STEP 4 — Cloud SQL (Private IP)",
        desc: "[Cloud SQL] Cloud Run이 Cloud SQL에 데이터를 조회/저장합니다. --add-cloudsql-instances 옵션으로 연결을 설정하면 Private IP(내부 네트워크)를 통해 안전하게 통신합니다. 외부 인터넷을 거치지 않아 빠르고 안전합니다.",
        clientState: 'waiting',
        lbState: 'done',
        crState: 'waiting',
        sqlState: 'active',
        responseState: 'idle',
        loggingState: 'idle',
        dataObj: { query: 'SELECT * FROM users', ip: 'private' }
      },
      {
        codeLine: 1,
        title: "STEP 5 — 응답 반환",
        desc: "[응답 반환] Cloud SQL에서 결과를 받은 Cloud Run이 JSON 응답을 만들어 클라이언트에 반환합니다. Load Balancer를 통해 다시 나가며, HTTP 상태 코드와 함께 데이터가 전달됩니다.",
        clientState: 'received',
        lbState: 'done',
        crState: 'done',
        sqlState: 'done',
        responseState: 'active',
        loggingState: 'idle',
        dataObj: { status: 200, body: '{"users": [...]}' }
      },
      {
        codeLine: 12,
        title: "STEP 6 — Cloud Logging / Monitoring",
        desc: "[로깅 & 모니터링] 요청이 처리되는 내내 Cloud Logging이 자동으로 로그를 기록합니다. gcloud logging read 명령으로 최근 로그를 확인할 수 있습니다. resource.type=cloud_run_revision 필터로 Cloud Run 로그만 볼 수 있습니다.",
        clientState: 'received',
        lbState: 'done',
        crState: 'done',
        sqlState: 'done',
        responseState: 'done',
        loggingState: 'active',
        dataObj: { logged: true, entries: 10 }
      }
    ];

    // -----------------------------------------
    // 3. 구문 강조(Syntax Highlighting) 헬퍼
    // -----------------------------------------
    const CLI_KEYWORDS = new Set([
      'gcloud', 'run', 'deploy', 'services', 'logging', 'read',
      '--image', '--region', '--allow-unauthenticated', '--add-cloudsql-instances',
      '--limit', 'update', 'resource.type'
    ]);

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line;
      let commentPart = '';

      if (commentIdx !== -1) {
        codePart = line.slice(0, commentIdx);
        commentPart = line.slice(commentIdx);
      }

      if (!codePart.trim() && commentPart) {
        return <span className="text-slate-500 italic">{commentPart}</span>;
      }

      // 줄 전체가 주석인 경우
      if (line.trimStart().startsWith('#')) {
        return <span className="text-slate-500 italic">{line}</span>;
      }

      const tokens = line.split(/(\s+|\\|=|"[^"]*")/g);

      const highlightedTokens = tokens.map((token, i) => {
        const trimmed = token.trim();
        if (CLI_KEYWORDS.has(trimmed)) {
          if (trimmed === 'gcloud') return <span key={i} className="text-yellow-300 font-bold">{token}</span>;
          if (['run', 'logging'].includes(trimmed)) return <span key={i} className="text-cyan-400 font-semibold">{token}</span>;
          if (['deploy', 'services', 'read', 'update'].includes(trimmed)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
          if (trimmed.startsWith('--')) return <span key={i} className="text-emerald-400">{token}</span>;
          if (trimmed === 'resource.type') return <span key={i} className="text-orange-300">{token}</span>;
        }
        if (token.startsWith('"') && token.endsWith('"')) {
          return <span key={i} className="text-emerald-300">{token}</span>;
        }
        if (token === '\\') return <span key={i} className="text-slate-500">{token}</span>;
        return <span key={i} className="text-slate-200">{token}</span>;
      });

      return (
        <>
          {highlightedTokens}
          {commentPart && <span className="text-slate-500 italic">{commentPart}</span>}
        </>
      );
    };

    // -----------------------------------------
    // 4. 상태 클래스 헬퍼
    // -----------------------------------------
    const getStatusClass = (state, baseClass) => {
      if (state === 'active' || state === 'sending') {
        return `${baseClass} bg-blue-100 border-blue-500 ring-2 ring-blue-300 shadow-lg scale-105 transition-all duration-500`;
      }
      if (state === 'waiting') {
        return `${baseClass} bg-yellow-50 border-yellow-400 border-dashed text-yellow-700 transition-all duration-500`;
      }
      if (state === 'done' || state === 'received') {
        return `${baseClass} bg-slate-100 border-blue-400 text-blue-700 transition-all duration-500`;
      }
      return `${baseClass} bg-white border-slate-200 text-slate-400 transition-all duration-500`;
    };

    // -----------------------------------------
    // 5. 메인 앱 컴포넌트
    // -----------------------------------------
    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 2500);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">

            {/* 헤더 */}
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-xl">G</div>
                <h1 className="text-2xl font-bold text-slate-800">GCP Cloud Run 요청 흐름 시각화</h1>
              </div>
              <p className="text-slate-600">
                클라이언트 HTTPS 요청이 <b>Google Load Balancer → Cloud Run 인스턴스 → Cloud SQL</b>을 거쳐
                응답을 반환하고 <b>Cloud Logging</b>에 기록되는 6단계 흐름을 시뮬레이션합니다.
              </p>
            </header>

            {/* 현재 단계 설명 */}
            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 flex flex-col justify-center min-h-[100px]">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">{stepData.title}</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 좌우 레이아웃 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">

              {/* 왼쪽: 아키텍처 다이어그램 */}
              <div className="flex flex-col space-y-6">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col gap-3 min-h-[480px] justify-between">

                  {/* STEP 1: 클라이언트 */}
                  <div className="flex justify-center">
                    <div className={getStatusClass(stepData.clientState, "px-6 py-3 rounded-lg border-2 font-bold w-56 text-center")}>
                      <div className="text-xs mb-1 uppercase tracking-widest opacity-60">STEP 1</div>
                      <div className="text-sm font-bold">Client (HTTPS)</div>
                      <div className="text-xs mt-1 opacity-70">
                        {stepData.clientState === 'sending' ? 'POST /api/users' : stepData.clientState === 'received' ? '200 OK' : 'Waiting...'}
                      </div>
                    </div>
                  </div>

                  {/* 화살표 + 데이터 패킷 */}
                  <div className="flex flex-col items-center gap-1 my-1">
                    <div className="w-0.5 h-4 bg-slate-300"></div>
                    <div className="bg-slate-800 text-blue-300 text-xs font-mono px-2 py-1 rounded shadow-md">
                      {JSON.stringify(stepData.dataObj)}
                    </div>
                    <div className="w-0.5 h-4 bg-slate-300"></div>
                  </div>

                  {/* STEP 2: Load Balancer */}
                  <div className="flex justify-center">
                    <div className={getStatusClass(stepData.lbState, "px-6 py-3 rounded-lg border-2 font-bold w-56 text-center")}>
                      <div className="text-xs mb-1 uppercase tracking-widest opacity-60">STEP 2</div>
                      <div className="text-sm font-bold">Google Load Balancer</div>
                      <div className="text-xs mt-1 opacity-70">SSL 종료 · 지역 라우팅</div>
                    </div>
                  </div>

                  <div className="flex justify-center">
                    <div className="w-0.5 h-4 bg-slate-300"></div>
                  </div>

                  {/* STEP 3: Cloud Run */}
                  <div className="flex justify-center">
                    <div className={getStatusClass(stepData.crState, "px-6 py-4 rounded-xl border-2 font-bold w-56 text-center")}>
                      <div className="text-xs mb-1 uppercase tracking-widest opacity-60">STEP 3</div>
                      <div className="text-sm font-bold">Cloud Run</div>
                      <div className="text-xs mt-1 opacity-70">Stateless · 자동 스케일</div>
                      {stepData.crState === 'active' && (
                        <div className="mt-2 flex justify-center gap-1">
                          <div className="w-2 h-2 rounded-full bg-blue-500 animate-bounce" style={{animationDelay:'0ms'}}></div>
                          <div className="w-2 h-2 rounded-full bg-blue-500 animate-bounce" style={{animationDelay:'150ms'}}></div>
                          <div className="w-2 h-2 rounded-full bg-blue-500 animate-bounce" style={{animationDelay:'300ms'}}></div>
                        </div>
                      )}
                    </div>
                  </div>

                  <div className="flex justify-center">
                    <div className="w-0.5 h-4 bg-slate-300"></div>
                  </div>

                  {/* STEP 4: Cloud SQL */}
                  <div className="flex justify-center">
                    <div className={getStatusClass(stepData.sqlState, "px-6 py-3 rounded-lg border-2 font-bold w-56 text-center")}>
                      <div className="text-xs mb-1 uppercase tracking-widest opacity-60">STEP 4</div>
                      <div className="text-sm font-bold">Cloud SQL</div>
                      <div className="text-xs mt-1 opacity-70">Private IP 연결</div>
                    </div>
                  </div>

                  <div className="flex justify-center">
                    <div className="w-0.5 h-4 bg-slate-300"></div>
                  </div>

                  {/* STEP 5 + STEP 6 나란히 */}
                  <div className="flex justify-center gap-3">
                    <div className={getStatusClass(stepData.responseState, "px-4 py-3 rounded-lg border-2 font-bold w-26 text-center flex-1")}>
                      <div className="text-xs mb-1 uppercase tracking-widest opacity-60">STEP 5</div>
                      <div className="text-sm font-bold">응답 반환</div>
                      <div className="text-xs mt-1 opacity-70">200 OK · JSON</div>
                    </div>
                    <div className={getStatusClass(stepData.loggingState, "px-4 py-3 rounded-lg border-2 font-bold w-26 text-center flex-1")}>
                      <div className="text-xs mb-1 uppercase tracking-widest opacity-60">STEP 6</div>
                      <div className="text-sm font-bold">Cloud Logging</div>
                      <div className="text-xs mt-1 opacity-70">자동 기록</div>
                    </div>
                  </div>

                </div>

                {/* 컨트롤 바 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button
                      aria-label="이전 단계"
                      onClick={handlePrev}
                      disabled={currentStepIdx === 0}
                      className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"
                    >
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true">
                        <path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/>
                      </svg>
                    </button>
                    <button
                      aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                      onClick={togglePlay}
                      className="flex items-center px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-medium transition shadow-sm w-32 justify-center"
                    >
                      {isPlaying ? (
                        <>
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true">
                            <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
                          </svg>
                          정지
                        </>
                      ) : (
                        <>
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                          </svg>
                          자동 실행
                        </>
                      )}
                    </button>
                    <button
                      aria-label="다음 단계"
                      onClick={handleNext}
                      disabled={isEnd}
                      className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"
                    >
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true">
                        <path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/>
                      </svg>
                    </button>
                  </div>
                  <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                    Step: {currentStepIdx + 1} / {STEPS.length}
                  </div>
                </div>
              </div>

              {/* 오른쪽: CLI 코드 뷰어 */}
              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-slate-900 flex flex-col">
                  <div className="bg-slate-800 px-4 py-2 text-xs font-mono text-slate-400 border-b border-slate-700 flex items-center gap-2">
                    <span className="w-3 h-3 rounded-full bg-red-500 opacity-70"></span>
                    <span className="w-3 h-3 rounded-full bg-yellow-500 opacity-70"></span>
                    <span className="w-3 h-3 rounded-full bg-green-500 opacity-70"></span>
                    <span className="ml-2">gcloud CLI — Cloud Run 배포 · SQL 연결 · 로그 확인</span>
                  </div>
                  <div className="p-5 overflow-y-auto flex-1 text-sm font-mono text-slate-300 scroll-smooth leading-relaxed">
                    {PYTHON_CODE.map((line, idx) => {
                      // STEP별 코드 하이라이트 범위 지정
                      // codeLine 1 → 0~4 (Cloud Run 배포)
                      // codeLine 7 → 6~9 (Cloud SQL 연결)
                      // codeLine 12 → 11~14 (로그 확인)
                      const activeRange = {
                        1: [0, 4],
                        7: [6, 9],
                        12: [11, 14],
                      };
                      const range = activeRange[stepData.codeLine];
                      const isActive = range && idx >= range[0] && idx <= range[1];

                      return (
                        <div
                          key={idx}
                          className={`flex px-2 py-0.5 rounded transition-colors ${
                            isActive
                              ? 'bg-blue-900/60 text-white font-bold border-l-4 border-blue-400 shadow-inner'
                              : 'border-l-4 border-transparent'
                          }`}
                        >
                          <span className="text-slate-600 select-none mr-4 w-6 text-right inline-block shrink-0 tabular-nums">
                            {idx + 1}
                          </span>
                          <span className="whitespace-pre">{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                  <div className="bg-slate-800 px-4 py-3 border-t border-slate-700 text-xs text-slate-500 font-mono">
                    <span className="text-blue-400">현재 단계:</span> {stepData.title}
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    // -----------------------------------------
    // 6. 마운트
    // -----------------------------------------
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
