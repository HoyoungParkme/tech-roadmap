<html lang="ko">
<head>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>

</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const SECTIONS = [
      {
        part: 'I', label: 'Part I. 왜 클라우드인가', color: 'bg-sky-600',
        items: [
          { id: 'I-1-1', title: '내 서버를 직접 운영한다는 것', file: './learn/viewer.html#/I-1-1' },
          { id: 'I-1-2', title: '클라우드가 해결하는 세 가지 문제', file: './learn/viewer.html#/I-1-2' },
          { id: 'I-1-3', title: 'IaaS / PaaS / SaaS', file: './learn/viewer.html#/I-1-3' },
          { id: 'I-2-1', title: '클라우드 비용 구조 이해하기', file: './learn/viewer.html#/I-2-1' },
        ],
      },
      {
        part: 'II', label: 'Part II. 클라우드 비교', color: 'bg-blue-600',
        items: [
          { id: 'II-1-1', title: '세 공룡의 포지션', file: './learn/viewer.html#/II-1-1' },
          { id: 'II-1-2', title: 'GCP의 특화 영역', file: './learn/viewer.html#/II-1-2' },
          { id: 'II-1-3', title: '주요 서비스 대응표 (AWS vs GCP)', file: './learn/viewer.html#/II-1-3' },
        ],
      },
      {
        part: 'III', label: 'Part III. GCP 계정·gcloud CLI', color: 'bg-indigo-600',
        items: [
          { id: 'III-1-1', title: 'GCP 계정 생성과 프로젝트 구조', file: './learn/viewer.html#/III-1-1' },
          { id: 'III-1-2', title: 'gcloud CLI 설치와 초기 설정', file: './learn/viewer.html#/III-1-2' },
          { id: 'III-1-3', title: '리전(Region)과 존(Zone) 선택하기', file: './learn/viewer.html#/III-1-3' },
          { id: 'III-2-1', title: 'Cloud Console 주요 화면 둘러보기', file: './learn/viewer.html#/III-2-1' },
          { id: 'III-2-2', title: 'Billing 알람 설정하기', file: './learn/viewer.html#/III-2-2' },
        ],
      },
      {
        part: 'IV', label: 'Part IV. Compute·Storage·DB', color: 'bg-violet-600',
        items: [
          { id: 'IV-1-1', title: 'Cloud Run 요청 처리 흐름', file: './learn/viewer.html#/IV-1-1' },
          { id: 'IV-1-2', title: 'Dockerfile과 컨테이너 이미지', file: './learn/viewer.html#/IV-1-2' },
          { id: 'IV-1-3', title: 'Cloud Run 배포 옵션', file: './learn/viewer.html#/IV-1-3' },
          { id: 'IV-2-1', title: 'Cloud Storage', file: './learn/viewer.html#/IV-2-1' },
          { id: 'IV-3-1', title: 'Cloud SQL', file: './learn/viewer.html#/IV-3-1' },
          { id: 'IV-3-2', title: 'Cloud SQL 연결·Secret Manager', file: './learn/viewer.html#/IV-3-2' },
          { id: 'IV-3-3', title: 'Cloud SQL Studio', file: './learn/viewer.html#/IV-3-3' },
        ],
      },
      {
        part: 'V', label: 'Part V. 네트워킹·IAM', color: 'bg-teal-600',
        items: [
          { id: 'V-1-1', title: 'VPC — 나만의 가상 네트워크', file: './learn/viewer.html#/V-1-1' },
          { id: 'V-1-2', title: 'IAM — 누가 무엇을 할 수 있는가', file: './learn/viewer.html#/V-1-2' },
          { id: 'V-2-1', title: '로드 밸런서 심화', file: './learn/viewer.html#/V-2-1' },
          { id: 'V-2-2', title: 'Cloud Armor — DDoS 방어', file: './learn/viewer.html#/V-2-2' },
        ],
      },
      {
        part: 'VI', label: 'Part VI. 실전 배포 프로젝트', color: 'bg-emerald-600',
        items: [
          { id: 'VI-1-1', title: '3계층 아키텍처 설계', file: './learn/viewer.html#/VI-1-1' },
          { id: 'VI-1-2', title: 'CI/CD — Cloud Build', file: './learn/viewer.html#/VI-1-2' },
          { id: 'VI-1-3', title: '환경 분리 — dev·staging·prod', file: './learn/viewer.html#/VI-1-3' },
        ],
      },
      {
        part: 'VII', label: 'Part VII. Cloud Run 배포·운영', color: 'bg-cyan-600',
        items: [
          { id: 'VII-1-1', title: 'Cloud Logging으로 로그 확인', file: './learn/viewer.html#/VII-1-1' },
          { id: 'VII-1-2', title: 'Cloud Monitoring — 알림·대시보드', file: './learn/viewer.html#/VII-1-2' },
          { id: 'VII-1-3', title: 'Traffic Splitting', file: './learn/viewer.html#/VII-1-3' },
          { id: 'VII-2-1', title: '비용 최적화 — Cloud Run 튜닝', file: './learn/viewer.html#/VII-2-1' },
        ],
      },
      {
        part: 'VIII', label: 'Part VIII. Compute Engine — VM', color: 'bg-amber-600',
        items: [
          { id: 'VIII-1-1', title: 'Compute Engine이란?', file: './learn/viewer.html#/VIII-1-1' },
          { id: 'VIII-1-2', title: '인스턴스 생성과 방화벽', file: './learn/viewer.html#/VIII-1-2' },
          { id: 'VIII-1-3', title: '예제 앱 실행하기', file: './learn/viewer.html#/VIII-1-3' },
          { id: 'VIII-2-1', title: 'Public vs Private Subnet', file: './learn/viewer.html#/VIII-2-1' },
          { id: 'VIII-2-2', title: 'Bastion Host', file: './learn/viewer.html#/VIII-2-2' },
          { id: 'VIII-2-3', title: 'IAP로 접근하기', file: './learn/viewer.html#/VIII-2-3' },
        ],
      },
      {
        part: 'IX', label: 'Part IX. IAM·VPC 실습', color: 'bg-orange-600',
        items: [
          { id: 'IX-1-1', title: 'Service Account 생성·권한', file: './learn/viewer.html#/IX-1-1' },
          { id: 'IX-1-2', title: '리소스 접근 제어', file: './learn/viewer.html#/IX-1-2' },
          { id: 'IX-2-1', title: 'VPC 직접 생성하기', file: './learn/viewer.html#/IX-2-1' },
          { id: 'IX-2-2', title: 'Subnet·방화벽 규칙 관리', file: './learn/viewer.html#/IX-2-2' },
        ],
      },
      {
        part: 'X', label: 'Part X. Load Balancer·도메인', color: 'bg-rose-600',
        items: [
          { id: 'X-1-1', title: '인스턴스 템플릿·그룹·Health Check', file: './learn/viewer.html#/X-1-1' },
          { id: 'X-1-2', title: 'Load Balancer 생성', file: './learn/viewer.html#/X-1-2' },
          { id: 'X-2-1', title: '도메인 구매와 등록', file: './learn/viewer.html#/X-2-1' },
          { id: 'X-2-2', title: 'Cloud DNS 매핑', file: './learn/viewer.html#/X-2-2' },
        ],
      },
      {
        part: 'XI', label: 'Part XI. 데이터 분석 — BigQuery', color: 'bg-pink-600',
        items: [
          { id: 'XI-1-1', title: 'BigQuery란?', file: './learn/viewer.html#/XI-1-1' },
          { id: 'XI-1-2', title: '데이터 업로드와 SQL 쿼리', file: './learn/viewer.html#/XI-1-2' },
          { id: 'XI-1-3', title: 'Looker Studio 시각화', file: './learn/viewer.html#/XI-1-3' },
        ],
      },
      {
        part: 'XII', label: 'Part XII. GKE — 컨테이너', color: 'bg-purple-600',
        items: [
          { id: 'XII-1-1', title: 'GKE Autopilot vs Standard', file: './learn/viewer.html#/XII-1-1' },
          { id: 'XII-1-2', title: 'GKE 클러스터 생성', file: './learn/viewer.html#/XII-1-2' },
          { id: 'XII-1-3', title: 'Nginx 웹서버 배포', file: './learn/viewer.html#/XII-1-3' },
        ],
      },
      {
        part: 'XIII', label: 'Part XIII. AI — AgentBuilder', color: 'bg-slate-600',
        items: [
          { id: 'XIII-1-1', title: 'AgentBuilder란?', file: './learn/viewer.html#/XIII-1-1' },
          { id: 'XIII-1-2', title: '웹검색 기반 에이전트 구현', file: './learn/viewer.html#/XIII-1-2' },
        ],
      },
    ];

    const TOTAL = SECTIONS.reduce((sum, s) => sum + s.items.length, 0);

    const PART_BG = {
      I: 'hover:bg-sky-50', II: 'hover:bg-blue-50', III: 'hover:bg-indigo-50',
      IV: 'hover:bg-violet-50', V: 'hover:bg-teal-50', VI: 'hover:bg-emerald-50',
      VII: 'hover:bg-cyan-50', VIII: 'hover:bg-amber-50', IX: 'hover:bg-orange-50',
      X: 'hover:bg-rose-50', XI: 'hover:bg-pink-50', XII: 'hover:bg-purple-50', XIII: 'hover:bg-slate-50',
    };

    const PART_ACTIVE = {
      I: 'bg-sky-100 text-sky-800 font-bold', II: 'bg-blue-100 text-blue-800 font-bold',
      III: 'bg-indigo-100 text-indigo-800 font-bold', IV: 'bg-violet-100 text-violet-800 font-bold',
      V: 'bg-teal-100 text-teal-800 font-bold', VI: 'bg-emerald-100 text-emerald-800 font-bold',
      VII: 'bg-cyan-100 text-cyan-800 font-bold', VIII: 'bg-amber-100 text-amber-800 font-bold',
      IX: 'bg-orange-100 text-orange-800 font-bold', X: 'bg-rose-100 text-rose-800 font-bold',
      XI: 'bg-pink-100 text-pink-800 font-bold', XII: 'bg-purple-100 text-purple-800 font-bold',
      XIII: 'bg-slate-200 text-slate-800 font-bold',
    };

    function findItemById(id) {
      for (const section of SECTIONS) {
        const found = section.items.find(item => item.id === id);
        if (found) return { ...found, part: section.part };
      }
      return null;
    }

    /**
     * GiscusPanel — 마인드맵의 vanilla JS giscus 패널을 React로 재현.
     */
    function GiscusPanel({ term }) {
      const [open, setOpen] = React.useState(false);
      const [width, setWidth] = React.useState(() => Math.min(480, Math.round(window.innerWidth * 0.9)));
      const bodyRef = React.useRef(null);
      const loadedRef = React.useRef(false);

      React.useEffect(() => {
        if (!open || loadedRef.current || !bodyRef.current) return;
        const s = document.createElement('script');
        s.src = 'https://giscus.app/client.js';
        s.async = true;
        s.crossOrigin = 'anonymous';
        s.setAttribute('data-repo', 'HoyoungParkme/tech-roadmap');
        s.setAttribute('data-repo-id', 'R_kgDOSIZCtg');
        s.setAttribute('data-category', 'General');
        s.setAttribute('data-category-id', 'DIC_kwDOSIZCts4C7lgx');
        s.setAttribute('data-mapping', 'specific');
        s.setAttribute('data-term', term);
        s.setAttribute('data-strict', '0');
        s.setAttribute('data-reactions-enabled', '1');
        s.setAttribute('data-emit-metadata', '0');
        s.setAttribute('data-input-position', 'bottom');
        s.setAttribute('data-theme', 'light');
        s.setAttribute('data-lang', 'ko');
        bodyRef.current.appendChild(s);
        loadedRef.current = true;
      }, [open, term]);

      const onResizeStart = (e) => {
        e.preventDefault();
        const startX = e.clientX;
        const startW = width;
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;cursor:ew-resize;';
        document.body.appendChild(overlay);
        const onMove = (ev) => {
          const newW = Math.max(320, Math.min(window.innerWidth * 0.9, startW + (startX - ev.clientX)));
          setWidth(newW);
        };
        const onUp = () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
          overlay.remove();
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      };

      const buttonRight = open ? Math.min(width, window.innerWidth - 40) + 'px' : 0;

      return (
        <React.Fragment>
          <button
            onClick={() => setOpen(o => !o)}
            aria-expanded={open}
            aria-label={open ? '댓글 패널 닫기' : '댓글 패널 열기'}
            style={{ position: 'fixed', top: '40%', right: buttonRight, zIndex: 51, writingMode: 'vertical-rl', transition: 'right 0.25s ease' }}
            className="bg-slate-800 text-white px-2 py-3 rounded-l-lg text-sm font-medium shadow-md hover:bg-slate-700"
          >
            💬 {open ? '닫기' : '댓글'}
          </button>
          <div
            role="complementary"
            aria-label="댓글 패널"
            style={{ position: 'fixed', top: 0, right: 0, height: '100vh', width: width + 'px', transform: open ? 'translateX(0)' : 'translateX(100%)', transition: 'transform 0.25s ease', zIndex: 50, background: '#fff', boxShadow: '-4px 0 12px rgba(0,0,0,0.08)' }}
          >
            <div onMouseDown={onResizeStart} style={{ position: 'absolute', left: '-4px', top: 0, width: '8px', height: '100%', cursor: 'ew-resize', zIndex: 52 }} aria-hidden="true" />
            <div className="border-b border-slate-200 px-4 py-3 flex items-center justify-between">
              <span className="font-bold text-slate-800">💬 댓글 / 질문</span>
              <button onClick={() => setOpen(false)} aria-label="댓글 패널 닫기" className="text-slate-500 hover:text-slate-800 px-2">✕</button>
            </div>
            <div ref={bodyRef} className="p-4 overflow-y-auto" style={{ height: 'calc(100vh - 56px)' }} />
          </div>
        </React.Fragment>
      );
    }

    function App() {
      const [activeId, setActiveId] = useState(null);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [expandedParts, setExpandedParts] = useState(
        { I: true, II: true, III: true, IV: true, V: true, VI: true, VII: true, VIII: true, IX: true, X: true, XI: true, XII: true, XIII: true }
      );

      const activeItem = activeId ? findItemById(activeId) : null;

      const navigate = useCallback((id) => {
        setActiveId(id);
        window.location.hash = id;
        if (window.innerWidth < 1024) setSidebarOpen(false);
      }, []);

      useEffect(() => {
        const hash = window.location.hash.slice(1);
        if (hash && findItemById(hash)) setActiveId(hash);
        const onHash = () => {
          const h = window.location.hash.slice(1);
          if (h && findItemById(h)) setActiveId(h);
        };
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      const togglePart = (part) => {
        setExpandedParts(prev => ({ ...prev, [part]: !prev[part] }));
      };

      return (
        <React.Fragment>
        <div className="h-full flex bg-slate-100">

          {sidebarOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-30 z-30 lg:hidden" onClick={() => setSidebarOpen(false)} />
          )}

          <aside className={`
            fixed lg:static z-40 h-full w-72 bg-white border-r border-slate-200 flex flex-col
            transition-transform duration-200
            ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0 lg:w-72'}
          `}>
            <div className="p-4 border-b border-slate-200 shrink-0">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-lg font-bold text-sm">G</div>
                <div>
                  <div className="font-bold text-slate-800 text-sm">GCP 학습</div>
                  <div className="text-[11px] text-slate-500">{TOTAL}개 시각화</div>
                </div>
              </div>
            </div>

            <nav className="flex-1 overflow-y-auto p-2">
              {SECTIONS.map((section) => (
                <div key={section.part} className="mb-1">
                  <button
                    onClick={() => togglePart(section.part)}
                    className="w-full flex items-center gap-2 px-2 py-2 rounded-lg text-left hover:bg-slate-50 transition"
                  >
                    <span className={`w-5 h-5 rounded text-white text-[10px] flex items-center justify-center font-bold ${section.color}`}>
                      {section.part}
                    </span>
                    <span className="text-xs font-bold text-slate-700 flex-1 truncate">{section.label}</span>
                    <span className="text-[10px] text-slate-400">{section.items.length}</span>
                    <span className={`text-slate-400 text-xs transition-transform ${expandedParts[section.part] ? 'rotate-90' : ''}`}>&#9654;</span>
                  </button>

                  {expandedParts[section.part] && (
                    <div className="ml-4 border-l border-slate-100 pl-2 space-y-0.5">
                      {section.items.map((item) => {
                        const isActive = activeId === item.id;
                        return (
                          <button
                            key={item.id}
                            onClick={() => navigate(item.id)}
                            className={`w-full text-left px-2 py-1.5 rounded-md text-xs transition-all truncate
                              ${isActive ? PART_ACTIVE[section.part] : `text-slate-600 ${PART_BG[section.part]}`}
                            `}
                          >
                            <span className="font-mono text-[10px] opacity-60 mr-1">{item.id}</span>
                            {item.title}
                          </button>
                        );
                      })}
                    </div>
                  )}
                </div>
              ))}
            </nav>

            <div className="p-3 border-t border-slate-200 shrink-0 text-[10px] text-slate-400 text-center">
              React + Tailwind + Babel CDN
            </div>
          </aside>

          <main className="flex-1 flex flex-col min-w-0">
            <div className="h-12 bg-white border-b border-slate-200 flex items-center px-4 shrink-0 gap-3">
              <button
                onClick={() => setSidebarOpen(prev => !prev)}
                className="lg:hidden p-1.5 rounded-md hover:bg-slate-100 text-slate-600"
                aria-label="사이드바 토글"
              >
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                  <path fillRule="evenodd" d="M3 5h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2z" />
                </svg>
              </button>

              {activeItem ? (
                <div className="flex items-center gap-2 min-w-0">
                  <span className={`w-5 h-5 rounded text-white text-[10px] flex items-center justify-center font-bold shrink-0 ${
                    SECTIONS.find(s => s.part === activeItem.part)?.color || 'bg-slate-600'
                  }`}>{activeItem.part}</span>
                  <span className="font-mono text-xs text-slate-500 shrink-0">{activeItem.id}</span>
                  <span className="text-sm font-bold text-slate-800 truncate">{activeItem.title}</span>
                </div>
              ) : (
                <span className="text-sm text-slate-500">시각화를 선택하세요</span>
              )}
            </div>

            {activeItem ? (
              <iframe
                key={activeItem.id}
                src={activeItem.file}
                className="flex-1 w-full border-0"
                title={activeItem.title}
              />
            ) : (
              <div className="flex-1 flex items-center justify-center p-8">
                <div className="text-center max-w-lg">
                  <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl font-bold">G</div>
                  <h2 className="text-2xl font-bold text-slate-800 mb-3">GCP 인터랙티브 학습</h2>
                  <p className="text-slate-600 mb-6 leading-relaxed">
                    왼쪽 사이드바에서 시각화를 선택하세요.<br/>
                    Part I부터 순서대로 보거나, 관심 있는 주제를 바로 클릭할 수 있습니다.
                  </p>
                  <div className="grid grid-cols-4 gap-2 mb-6">
                    {SECTIONS.map(s => (
                      <div key={s.part} className="text-center">
                        <div className={`w-8 h-8 rounded-lg text-white text-[9px] flex items-center justify-center font-bold mx-auto mb-1 ${s.color}`}>{s.part}</div>
                        <div className="text-[10px] text-slate-500">{s.items.length}개</div>
                      </div>
                    ))}
                  </div>
                  <p className="text-xs text-slate-400">총 {TOTAL}개 시각화 | React + Tailwind CDN | 빌드 도구 없음</p>
                </div>
              </div>
            )}
          </main>
        </div>
        <GiscusPanel term="gcp" />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
