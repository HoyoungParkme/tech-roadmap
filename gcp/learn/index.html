<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GCP 인터랙티브 학습</title>

  <!-- 커스텀 CSS (애니메이션, 사이드바, 레이아웃) -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 (development) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel Standalone 7.x: JSX 실시간 변환 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    ─────────────────────────────────────────────────────────────
    GCP 인터랙티브 학습 사이트
    ─────────────────────────────────────────────────────────────
    구조: Data (plain JS) → Components (JSX via Babel) → Mount
    데이터는 import/export 없이 window.GCPLearn 네임스페이스로 공유
    ─────────────────────────────────────────────────────────────
  -->

  <!-- 1) 데이터 (plain JS — Babel 불필요) -->
  <script src="data/toc.js"></script>
  <script src="data/part-I.js"></script>
  <script src="data/part-II.js"></script>
  <script src="data/part-III.js"></script>
  <script src="data/part-IV.js"></script>
  <script src="data/part-V.js"></script>
  <script src="data/part-VI.js"></script>
  <script src="data/part-VII.js"></script>
  <script src="data/part-VIII.js"></script>
  <script src="data/part-IX.js"></script>
  <script src="data/part-X.js"></script>
  <script src="data/part-XI.js"></script>
  <script src="data/part-XII.js"></script>

  <!-- 2) 공통 컴포넌트 (JSX — Babel 필요) -->
  <script type="text/babel" src="components/animations.js"></script>
  <script type="text/babel" src="components/Sidebar.js"></script>
  <script type="text/babel" src="components/SectionPage.js"></script>
  <script type="text/babel" src="components/InteractiveViewer.js"></script>

  <!-- 3) Section 애니메이션 컴포넌트 -->
  <script type="text/babel" src="sections/I-1-1.js"></script>
  <script type="text/babel" src="sections/I-1-2.js"></script>
  <script type="text/babel" src="sections/I-1-3.js"></script>
  <script type="text/babel" src="sections/I-2-1.js"></script>
  <script type="text/babel" src="sections/II-1-1.js"></script>
  <script type="text/babel" src="sections/II-1-2.js"></script>
  <script type="text/babel" src="sections/II-1-3.js"></script>
  <script type="text/babel" src="sections/III-1-1.js"></script>
  <script type="text/babel" src="sections/III-1-2.js"></script>
  <script type="text/babel" src="sections/III-1-3.js"></script>
  <script type="text/babel" src="sections/III-2-1.js"></script>
  <script type="text/babel" src="sections/III-2-2.js"></script>
  <script type="text/babel" src="sections/IV-1-1.js"></script>
  <script type="text/babel" src="sections/IV-1-2.js"></script>
  <script type="text/babel" src="sections/IV-1-3.js"></script>
  <script type="text/babel" src="sections/IV-2-1.js"></script>
  <script type="text/babel" src="sections/IV-3-1.js"></script>
  <script type="text/babel" src="sections/IV-3-2.js"></script>
  <script type="text/babel" src="sections/IV-3-3.js"></script>
  <script type="text/babel" src="sections/V-1-1.js"></script>
  <script type="text/babel" src="sections/V-1-2.js"></script>
  <script type="text/babel" src="sections/V-2-1.js"></script>
  <script type="text/babel" src="sections/V-2-2.js"></script>
  <script type="text/babel" src="sections/VI-1-1.js"></script>
  <script type="text/babel" src="sections/VI-1-2.js"></script>
  <script type="text/babel" src="sections/VI-1-3.js"></script>
  <script type="text/babel" src="sections/VII-1-1.js"></script>
  <script type="text/babel" src="sections/VII-1-2.js"></script>
  <script type="text/babel" src="sections/VII-1-3.js"></script>
  <script type="text/babel" src="sections/VII-2-1.js"></script>
  <script type="text/babel" src="sections/VIII-1-1.js"></script>
  <script type="text/babel" src="sections/VIII-1-2.js"></script>
  <script type="text/babel" src="sections/VIII-1-3.js"></script>
  <script type="text/babel" src="sections/VIII-2-1.js"></script>
  <script type="text/babel" src="sections/VIII-2-2.js"></script>
  <script type="text/babel" src="sections/VIII-2-3.js"></script>
  <script type="text/babel" src="sections/IX-1-1.js"></script>
  <script type="text/babel" src="sections/IX-1-2.js"></script>
  <script type="text/babel" src="sections/IX-2-1.js"></script>
  <script type="text/babel" src="sections/IX-2-2.js"></script>
  <script type="text/babel" src="sections/X-1-1.js"></script>
  <script type="text/babel" src="sections/X-1-2.js"></script>
  <script type="text/babel" src="sections/X-2-1.js"></script>
  <script type="text/babel" src="sections/X-2-2.js"></script>
  <script type="text/babel" src="sections/XI-1-1.js"></script>
  <script type="text/babel" src="sections/XI-1-2.js"></script>
  <script type="text/babel" src="sections/XI-1-3.js"></script>
  <script type="text/babel" src="sections/XII-1-1.js"></script>
  <script type="text/babel" src="sections/XII-1-2.js"></script>
  <script type="text/babel" src="sections/XII-1-3.js"></script>
  <script type="text/babel" src="sections/XIII-1-1.js"></script>
  <script type="text/babel" src="sections/XIII-1-2.js"></script>

  <!-- 4) 루트 컴포넌트 (라우터 + 레이아웃) -->
  <script type="text/babel" src="components/App.js"></script>

  <!-- 5) 마운트 -->
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<GCPLearn.App />);
  </script>
</body>
</html>
