  <!-- 뷰어 App -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    function ViewerApp() {
      const [sectionId, setSectionId] = useState(null);

      useEffect(() => {
        const id = window.location.hash.replace('#/', '').replace('#', '');
        if (id && window.GCPLearn.sections[id]) setSectionId(id);
      }, []);

      if (!sectionId) {
        return (
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', color: '#888' }}>
            섹션을 로드하는 중...
          </div>
        );
      }

      const Renderer = window.GCPLearn.sectionRenderers[sectionId];
      if (!Renderer) {
        return (
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', color: '#888' }}>
            시각화를 찾을 수 없습니다: {sectionId}
          </div>
        );
      }

      return <Renderer />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ViewerApp />);
  </script>
