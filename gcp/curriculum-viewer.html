<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GCP 학습 교재 — curriculum.md 뷰어</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
      display: flex;
      height: 100vh;
      background: #f8f9fa;
      color: #1a1a2e;
    }

    /* 사이드바 */
    #sidebar {
      width: 320px;
      min-width: 320px;
      height: 100vh;
      overflow-y: auto;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px 0;
      position: sticky;
      top: 0;
      border-right: 3px solid #4361ee;
    }

    #sidebar h1 {
      font-size: 15px;
      font-weight: 700;
      color: #4cc9f0;
      padding: 0 20px 12px;
      border-bottom: 1px solid #333;
      margin-bottom: 8px;
    }

    .toc-part {
      padding: 10px 20px 4px;
      font-size: 13px;
      font-weight: 700;
      color: #4361ee;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      user-select: none;
    }
    .toc-part:hover { color: #4cc9f0; }

    .toc-section {
      display: block;
      padding: 5px 20px 5px 32px;
      font-size: 13px;
      color: #b0b0b0;
      text-decoration: none;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.15s;
      line-height: 1.4;
    }
    .toc-section:hover {
      background: rgba(67, 97, 238, 0.15);
      color: #fff;
      border-left-color: #4361ee;
    }
    .toc-section.active {
      background: rgba(67, 97, 238, 0.25);
      color: #4cc9f0;
      border-left-color: #4cc9f0;
      font-weight: 600;
    }

    .toc-appendix {
      padding: 10px 20px 4px;
      font-size: 13px;
      font-weight: 700;
      color: #f72585;
      cursor: pointer;
    }
    .toc-appendix:hover { color: #ff6b9d; }

    /* 본문 */
    #content {
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      padding: 40px 60px 80px;
      max-width: 900px;
      scroll-behavior: smooth;
    }

    #content h1 {
      font-size: 28px;
      font-weight: 800;
      color: #1a1a2e;
      margin: 48px 0 16px;
      padding-bottom: 8px;
      border-bottom: 3px solid #4361ee;
    }

    #content h2 {
      font-size: 22px;
      font-weight: 700;
      color: #4361ee;
      margin: 40px 0 12px;
      padding-top: 20px;
    }

    #content h3 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a2e;
      margin: 32px 0 8px;
      padding-top: 16px;
    }

    #content p {
      font-size: 15px;
      line-height: 1.8;
      margin: 10px 0;
      color: #333;
    }

    #content ul, #content ol {
      margin: 10px 0 10px 24px;
      font-size: 15px;
      line-height: 1.7;
    }

    #content li { margin: 4px 0; }

    #content strong { color: #1a1a2e; }

    #content code {
      background: #e8eaf6;
      color: #4361ee;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'Fira Code', 'Consolas', monospace;
    }

    #content pre {
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 20px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 16px 0;
      border-left: 4px solid #4361ee;
    }

    #content pre code {
      background: none;
      color: inherit;
      padding: 0;
      font-size: 13px;
    }

    #content blockquote {
      border-left: 4px solid #4cc9f0;
      background: #e8f4f8;
      padding: 12px 20px;
      margin: 16px 0;
      border-radius: 0 8px 8px 0;
      font-style: italic;
      color: #555;
    }

    #content hr {
      border: none;
      height: 1px;
      background: #ddd;
      margin: 32px 0;
    }

    #content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 14px;
    }

    #content th {
      background: #4361ee;
      color: #fff;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
    }

    #content td {
      padding: 8px 12px;
      border-bottom: 1px solid #e0e0e0;
    }

    #content tr:nth-child(even) { background: #f0f2ff; }

    /* 로딩 */
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex: 1;
      font-size: 18px;
      color: #888;
    }

    /* 스크롤바 커스텀 */
    #sidebar::-webkit-scrollbar { width: 6px; }
    #sidebar::-webkit-scrollbar-track { background: #1a1a2e; }
    #sidebar::-webkit-scrollbar-thumb { background: #4361ee; border-radius: 3px; }

    #content::-webkit-scrollbar { width: 8px; }
    #content::-webkit-scrollbar-track { background: #f0f0f0; }
    #content::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

    /* 검색 */
    #search-box {
      width: calc(100% - 40px);
      margin: 0 20px 12px;
      padding: 8px 12px;
      background: #2a2a3e;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }
    #search-box:focus { border-color: #4361ee; }
    #search-box::placeholder { color: #666; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h1>GCP 학습 교재</h1>
    <input type="text" id="search-box" placeholder="Section 검색..." />
    <div id="toc"></div>
  </div>
  <div id="loading">curriculum.md 로딩 중...</div>
  <div id="content" style="display:none;"></div>

  <script>
    /**
     * curriculum-viewer.js
     * curriculum.md를 로드하여 왼쪽 목차 + 오른쪽 본문 뷰어로 렌더링
     */

    (async function() {
      // 1. curriculum.md 로드
      const res = await fetch('curriculum.md');
      if (!res.ok) {
        document.getElementById('loading').textContent =
          'curriculum.md 로드 실패. 같은 폴더에 파일이 있는지 확인하세요.';
        return;
      }
      const md = await res.text();

      // 2. marked로 HTML 변환
      marked.setOptions({
        breaks: false,
        gfm: true,
      });
      const html = marked.parse(md);

      // 3. 본문에 삽입
      const contentEl = document.getElementById('content');
      contentEl.innerHTML = html;
      contentEl.style.display = 'block';
      document.getElementById('loading').style.display = 'none';

      // 4. 모든 heading에 id 부여 + TOC 빌드
      const tocEl = document.getElementById('toc');
      const headings = contentEl.querySelectorAll('h1, h2, h3');
      const tocItems = [];

      headings.forEach((h, i) => {
        const id = 'heading-' + i;
        h.id = id;

        const text = h.textContent.trim();
        const tag = h.tagName;

        // h1: 교재 제목 (맨 처음만)
        if (tag === 'H1' && i === 0) return;

        const item = document.createElement('div');
        item.dataset.id = id;
        item.dataset.text = text.toLowerCase();

        if (tag === 'H2') {
          // Part 또는 부록
          if (text.startsWith('부록')) {
            item.className = 'toc-appendix';
          } else {
            item.className = 'toc-part';
          }
          item.textContent = text;
          item.addEventListener('click', () => scrollToHeading(id));
        } else if (tag === 'H3') {
          item.className = 'toc-section';
          item.textContent = text;
          item.addEventListener('click', () => scrollToHeading(id));
        } else {
          return;
        }

        tocItems.push(item);
        tocEl.appendChild(item);
      });

      // 5. 스크롤 시 현재 Section 하이라이트
      const sectionHeadings = contentEl.querySelectorAll('h2, h3');
      contentEl.addEventListener('scroll', () => {
        let current = null;
        sectionHeadings.forEach(h => {
          const rect = h.getBoundingClientRect();
          if (rect.top <= 120) current = h.id;
        });
        if (current) {
          tocItems.forEach(item => {
            item.classList.toggle('active',
              item.dataset.id === current && item.classList.contains('toc-section'));
          });
        }
      });

      // 6. 검색
      const searchBox = document.getElementById('search-box');
      searchBox.addEventListener('input', () => {
        const q = searchBox.value.toLowerCase();
        tocItems.forEach(item => {
          const match = !q || item.dataset.text.includes(q);
          item.style.display = match ? '' : 'none';
        });
      });

      function scrollToHeading(id) {
        const el = document.getElementById(id);
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }
    })();
  </script>
</body>
</html>
