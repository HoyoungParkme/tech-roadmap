<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redis 학습 노트</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📓</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { font-family: 'Gaegu', system-ui, sans-serif; background: #fffdf7; color: #2b2b2b; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!--
    AI Agent 학습 노트 — 필기노트 톤 사이드바 + iframe 레이아웃
    - 왼쪽 사이드바에서 26개 시각화 탐색, 오른쪽 iframe에 로드
    - URL 해시(#I-1-1) 딥링크, 읽음 체크(localStorage), 이전/다음, giscus 댓글
    - 토큰: 종이 #fffdf7 / 존 #faf7ef / 잉크 #2b2b2b / 형광펜 #fde68a
  -->
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ── 이 주제만의 설정 (다른 허브에 복제 시 이 블록만 교체) ─────────────
    const TOPIC_ID = 'redis';          // 폴더명 = giscus term
    const TOPIC_NAME = "Redis";        // 표시명
    const SECTIONS = [
      { part: "Ⅰ", label: "Part Ⅰ. 캐시 기초 (Why Redis)", items: [
        { id: "I-1-1", title: "DB만 쓸 때의 부하", file: "./part1/I-1-1.html" },
        { id: "I-1-2", title: "인메모리 캐시란", file: "./part1/I-1-2.html" },
        { id: "I-2-1", title: "Redis vs Memcached vs DragonflyDB", file: "./part1/I-2-1.html" },
        { id: "I-2-2", title: "Redis 설치 + 첫 GET/SET", file: "./part1/I-2-2.html" },
      ]},
      { part: "Ⅱ", label: "Part Ⅱ. 5 자료구조", items: [
        { id: "II-1-1", title: "String — INCR/DECR", file: "./part2/II-1-1.html" },
        { id: "II-1-2", title: "List — LPUSH/RPOP 큐 패턴", file: "./part2/II-1-2.html" },
        { id: "II-2-1", title: "Hash — 객체 저장", file: "./part2/II-2-1.html" },
        { id: "II-2-2", title: "Set / Sorted Set — 랭킹", file: "./part2/II-2-2.html" },
      ]},
      { part: "Ⅲ", label: "Part Ⅲ. 운영 핵심", items: [
        { id: "III-1-1", title: "TTL — EXPIRE / 만료 정책", file: "./part3/III-1-1.html" },
        { id: "III-1-2", title: "Eviction — LRU/LFU 정책", file: "./part3/III-1-2.html" },
        { id: "III-2-1", title: "Persistence — RDB vs AOF", file: "./part3/III-2-1.html" },
        { id: "III-2-2", title: "Replication + failover", file: "./part3/III-2-2.html" },
      ]},
      { part: "Ⅳ", label: "Part Ⅳ. 분산 패턴", items: [
        { id: "IV-1-1", title: "분산 락 — SET NX + Redlock", file: "./part4/IV-1-1.html" },
        { id: "IV-1-2", title: "Pub/Sub vs Stream", file: "./part4/IV-1-2.html" },
        { id: "IV-2-1", title: "Redis Streams + Consumer Group", file: "./part4/IV-2-1.html" },
        { id: "IV-2-2", title: "Cluster — 16384 slot", file: "./part4/IV-2-2.html" },
      ]},
      { part: "Ⅴ", label: "Part Ⅴ. 보안과 운영", items: [
        { id: "V-1-1", title: "캐시 함정 — Stampede/Avalanche", file: "./part5/V-1-1.html" },
        { id: "V-1-2", title: "ACL + TLS + protected-mode", file: "./part5/V-1-2.html" },
        { id: "V-2-1", title: "모니터링 — INFO/SLOWLOG", file: "./part5/V-2-1.html" },
        { id: "V-2-2", title: "운영 체크리스트", file: "./part5/V-2-2.html" },
      ]},
    ];
    // ────────────────────────────────────────────────────────────────

    const RKEY = 'trn-read-' + TOPIC_ID;
    const HL = { background: 'linear-gradient(transparent 62%, #fde68a 62%)', padding: '0 4px' };
    const FLAT = SECTIONS.flatMap(s => s.items.map(i => ({ part: s.part, id: i.id, title: i.title, file: i.file })));
    const TOTAL = FLAT.length;

    function loadRead() {
      try { return JSON.parse(localStorage.getItem(RKEY) || '{}'); } catch (e) { return {}; }
    }

    /**
     * GiscusPanel — 오른쪽 슬라이드 댓글 패널 (필기노트 스킨).
     * giscus 설정/리사이즈 로직은 기존 그대로, 색상만 잉크/종이존으로 변경.
     */
    function GiscusPanel({ term }) {
      const [open, setOpen] = useState(false);
      const [width, setWidth] = useState(() => Math.min(400, Math.round(window.innerWidth * 0.9)));
      const bodyRef = React.useRef(null);
      const loadedRef = React.useRef(false);

      useEffect(() => {
        if (!open || loadedRef.current || !bodyRef.current) return;
        const s = document.createElement('script');
        s.src = 'https://giscus.app/client.js';
        s.async = true;
        s.crossOrigin = 'anonymous';
        s.setAttribute('data-repo', 'HoyoungParkme/tech-roadmap');
        s.setAttribute('data-repo-id', 'R_kgDOSIZCtg');
        s.setAttribute('data-category', 'General');
        s.setAttribute('data-category-id', 'DIC_kwDOSIZCts4C7lgx');
        s.setAttribute('data-mapping', 'specific');
        s.setAttribute('data-term', term);
        s.setAttribute('data-strict', '0');
        s.setAttribute('data-reactions-enabled', '1');
        s.setAttribute('data-emit-metadata', '0');
        s.setAttribute('data-input-position', 'bottom');
        s.setAttribute('data-theme', 'light');
        s.setAttribute('data-lang', 'ko');
        bodyRef.current.appendChild(s);
        loadedRef.current = true;
      }, [open, term]);

      const onResizeStart = (e) => {
        e.preventDefault();
        const startX = e.clientX;
        const startW = width;
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;cursor:ew-resize;';
        document.body.appendChild(overlay);
        const onMove = (ev) => setWidth(Math.max(320, Math.min(window.innerWidth * 0.9, startW + (startX - ev.clientX))));
        const onUp = () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
          overlay.remove();
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      };

      const buttonRight = open ? Math.min(width, window.innerWidth - 40) + 'px' : 0;

      return (
        <React.Fragment>
          <button
            onClick={() => setOpen(o => !o)}
            aria-expanded={open}
            aria-label={open ? '댓글 패널 닫기' : '댓글 패널 열기'}
            style={{
              position: 'fixed', top: '42%', right: buttonRight, zIndex: 51,
              writingMode: 'vertical-rl', transition: 'right 0.25s ease',
              background: '#2b2b2b', color: '#fff', border: 'none',
              borderRadius: '6px 0 0 6px', padding: '12px 6px', fontFamily: "'Gaegu', sans-serif",
              fontSize: '14px', cursor: 'pointer', boxShadow: '2px 2px 0 rgba(0,0,0,.15)',
            }}
          >
            💬 {open ? '닫기' : '댓글'}
          </button>
          <div
            role="complementary"
            aria-label="댓글 패널"
            style={{
              position: 'fixed', top: 0, right: 0, height: '100vh', width: width + 'px',
              transform: open ? 'translateX(0)' : 'translateX(100%)',
              transition: 'transform 0.25s ease', zIndex: 50, background: '#faf7ef',
              borderLeft: '1.5px solid #2b2b2b', boxShadow: '-4px 0 12px rgba(0,0,0,0.08)',
              display: 'flex', flexDirection: 'column',
            }}
          >
            <div
              onMouseDown={onResizeStart}
              style={{ position: 'absolute', left: '-4px', top: 0, width: '8px', height: '100%', cursor: 'ew-resize', zIndex: 52 }}
              aria-hidden="true"
            />
            <div style={{ padding: '12px 16px', borderBottom: '1.5px solid #2b2b2b', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <span style={{ fontSize: '17px', fontWeight: 700, color: '#2b2b2b' }}>💬 댓글 / 질문</span>
              <button onClick={() => setOpen(false)} aria-label="댓글 패널 닫기" style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '16px', color: '#8a8578' }}>✕</button>
            </div>
            <div ref={bodyRef} className="overflow-y-auto" style={{ flex: 1, padding: '16px' }} />
          </div>
        </React.Fragment>
      );
    }

    function App() {
      const [activeId, setActiveId] = useState(FLAT[0].id);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [read, setRead] = useState(loadRead);

      const idx = FLAT.findIndex(f => f.id === activeId);
      const active = FLAT[idx];
      const readN = FLAT.filter(f => read[f.id]).length;

      const navigate = useCallback((id) => {
        setActiveId(id);
        window.location.hash = id;
        if (window.innerWidth < 1024) setSidebarOpen(false);
        // 루트 허브 "이어서 보기"용 최근 방문 기록
        const f = FLAT.find(x => x.id === id);
        try {
          localStorage.setItem('trn-last', JSON.stringify({
            url: '../' + TOPIC_ID + '/index.html#' + id,
            label: TOPIC_NAME + ' · ' + id + ' ' + (f ? f.title : ''),
          }));
        } catch (e) {}
      }, []);

      const toggleRead = useCallback((id, e) => {
        if (e) e.stopPropagation();
        setRead(prev => {
          const next = { ...prev, [id]: !prev[id] };
          try { localStorage.setItem(RKEY, JSON.stringify(next)); } catch (err) {}
          return next;
        });
      }, []);

      const go = useCallback((delta) => {
        const i = FLAT.findIndex(f => f.id === activeId);
        const next = FLAT[Math.min(FLAT.length - 1, Math.max(0, i + delta))];
        navigate(next.id);
      }, [activeId, navigate]);

      useEffect(() => {
        const applyHash = () => {
          const h = window.location.hash.slice(1);
          if (h && FLAT.some(f => f.id === h)) setActiveId(h);
        };
        applyHash();
        window.addEventListener('hashchange', applyHash);
        return () => window.removeEventListener('hashchange', applyHash);
      }, []);

      return (
        <React.Fragment>
          <div style={{ height: '100%', display: 'flex', overflow: 'hidden', background: '#e9e4d8' }}>

            {/* 모바일 오버레이 */}
            {sidebarOpen && (
              <div className="fixed inset-0 z-30 lg:hidden" style={{ background: 'rgba(43,43,43,.35)' }} onClick={() => setSidebarOpen(false)} />
            )}

            {/* 사이드바 */}
            <aside
              className={`fixed lg:static z-40 h-full flex flex-col transition-transform duration-200 ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}
              style={{ width: 256, flex: 'none', background: '#faf7ef', borderRight: '1.5px solid #2b2b2b' }}
            >
              <div style={{ padding: '16px 18px 12px', borderBottom: '1.5px solid #2b2b2b', flexShrink: 0 }}>
                <a href="../index.html" style={{ fontSize: 13, color: '#a09a8c', textDecoration: 'none' }}>← 목차로</a>
                <div style={{ fontFamily: "'Nanum Pen Script', cursive", fontSize: 30, lineHeight: 1.1, color: '#2b2b2b', marginTop: 4 }}>{TOPIC_NAME} 노트</div>
                <div style={{ fontSize: 13, color: '#a09a8c' }}>{SECTIONS.length} Part · {TOTAL}장 — 읽음 {readN}/{TOTAL}장</div>
              </div>

              <nav className="overflow-y-auto" style={{ flex: 1, padding: '12px 12px 16px' }}>
                {SECTIONS.map(section => (
                  <div key={section.part} style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 15.5, fontWeight: 700, color: '#2b2b2b', marginBottom: 4 }}>
                      <span style={HL}>{section.label}</span>
                    </div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 1 }}>
                      {section.items.map(item => {
                        const isActive = item.id === activeId;
                        return (
                          <button
                            key={item.id}
                            onClick={() => navigate(item.id)}
                            className="trn-item"
                            style={{
                              display: 'flex', alignItems: 'baseline', gap: 6, width: '100%', textAlign: 'left',
                              border: 'none', fontFamily: "'Gaegu', sans-serif", fontSize: 14.5, padding: '3px 7px',
                              borderRadius: 4, cursor: 'pointer',
                              background: isActive ? '#2b2b2b' : 'transparent',
                              color: isActive ? '#fff' : '#57534a',
                            }}
                          >
                            <span
                              onClick={(e) => toggleRead(item.id, e)}
                              title="읽음 체크"
                              style={{ fontSize: 15, lineHeight: 1, userSelect: 'none', flex: 'none' }}
                            >{read[item.id] ? '☑' : '☐'}</span>
                            <span style={{ fontFamily: 'ui-monospace, Menlo, monospace', fontSize: 10, opacity: 0.5, flex: 'none' }}>{item.id}</span>
                            <span style={{ minWidth: 0 }}>{item.title}</span>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </nav>

              <div style={{ borderTop: '1.5px dashed #cfc9ba', padding: 8, fontSize: 11.5, color: '#b5af9f', textAlign: 'center', flexShrink: 0 }}>
                단일 HTML · giscus 유지 · #해시 딥링크
              </div>
            </aside>

            {/* 메인 */}
            <main style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, background: '#fffdf7', position: 'relative' }}>
              <div style={{ height: 48, flex: 'none', borderBottom: '1.5px solid #2b2b2b', display: 'flex', alignItems: 'center', gap: 10, padding: '0 16px' }}>
                <button
                  onClick={() => setSidebarOpen(o => !o)}
                  className="lg:hidden"
                  style={{ border: '1.5px solid #2b2b2b', background: '#fff', borderRadius: 5, width: 30, height: 28, cursor: 'pointer', flex: 'none' }}
                  aria-label="사이드바 토글"
                >☰</button>
                <span style={{ width: 24, height: 24, flex: 'none', border: '1.5px solid #2b2b2b', borderRadius: 5, background: '#2b2b2b', color: '#fff', fontSize: 13, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{active.part}</span>
                <span style={{ fontFamily: 'ui-monospace, Menlo, monospace', fontSize: 11.5, color: '#a09a8c', flex: 'none' }}>{active.id}</span>
                <span style={{ fontSize: 18, fontWeight: 700, color: '#2b2b2b', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{active.title}</span>
                <span style={{ marginLeft: 'auto', fontSize: 13.5, color: '#a09a8c', flex: 'none' }}>{idx + 1} / {TOTAL}장</span>
                <button onClick={() => go(-1)} className="trn-nav" aria-label="이전" style={{ flex: 'none', border: '1.5px solid #2b2b2b', background: '#fff', borderRadius: 5, width: 28, height: 28, fontSize: 15, cursor: 'pointer', fontFamily: "'Gaegu'" }}>‹</button>
                <button onClick={() => go(1)} className="trn-nav" aria-label="다음" style={{ flex: 'none', border: '1.5px solid #2b2b2b', background: '#fff', borderRadius: 5, width: 28, height: 28, fontSize: 15, cursor: 'pointer', fontFamily: "'Gaegu'" }}>›</button>
              </div>

              <iframe key={active.id} src={active.file} title={active.title} style={{ flex: 1, width: '100%', border: 0, background: '#fff' }} />
            </main>
          </div>
          <GiscusPanel term={TOPIC_ID} />

          <style>{`
            .trn-item:hover { background: rgba(253,230,138,.35) !important; }
            .trn-nav:hover { background: #fde68a !important; }
          `}</style>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
