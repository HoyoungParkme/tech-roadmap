      );
    }

    function RecoveryCompareViz({ viz }) {
      return (
        <div className="rounded-lg bg-neutral-50 border border-neutral-300 p-4 space-y-2">
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-white border border-emerald-300 rounded p-3">
              <div className="font-bold text-sm text-emerald-800 mb-2">RDB</div>
              <div className="space-y-1 text-[11px]">
                <div className="flex justify-between"><span className="text-neutral-500">복구</span><span className="font-mono font-bold">{viz.rdb.recovery}</span></div>
                <div className="flex justify-between"><span className="text-neutral-500">데이터 손실</span><span className="font-mono text-rose-600">{viz.rdb.loss}</span></div>
                <div className="flex justify-between"><span className="text-neutral-500">파일</span><span className="font-mono">{viz.rdb.fileSize}</span></div>
              </div>
            </div>
            <div className="bg-white border border-amber-300 rounded p-3">
              <div className="font-bold text-sm text-amber-800 mb-2">AOF</div>
              <div className="space-y-1 text-[11px]">
                <div className="flex justify-between"><span className="text-neutral-500">복구</span><span className="font-mono font-bold">{viz.aof.recovery}</span></div>
                <div className="flex justify-between"><span className="text-neutral-500">데이터 손실</span><span className="font-mono text-emerald-600">{viz.aof.loss}</span></div>
                <div className="flex justify-between"><span className="text-neutral-500">파일</span><span className="font-mono">{viz.aof.fileSize}</span></div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function AOFTradeoffViz({ viz }) {
      const maxSize = Math.max(...viz.fileSizes.map(f => f.size));
      const maxLoss = Math.max(...viz.dataLoss.map(d => d.loss));
      return (
        <div className="rounded-lg bg-neutral-50 border border-neutral-300 p-4 space-y-3">
          <div>
            <div className="text-xs text-neutral-600 mb-1">파일 크기 (MB)</div>
            {viz.fileSizes.map((f, i) => (
              <div key={i} className="mb-1">
                <div className="flex justify-between text-[10px] mb-0.5">
                  <span>{f.name}</span><span className="font-mono">{f.size}MB</span>
                </div>
                <div className="h-2 bg-white border border-neutral-200 rounded overflow-hidden">
                  <div className={`h-full bg-${f.color}-500`} style={{ width: `${(f.size/maxSize)*100}%` }}></div>
                </div>
              </div>
            ))}
          </div>
          <div>
            <div className="text-xs text-neutral-600 mb-1">데이터 손실 (초)</div>
            {viz.dataLoss.map((d, i) => (
              <div key={i} className="mb-1">
                <div className="flex justify-between text-[10px] mb-0.5">
                  <span>{d.name}</span><span className="font-mono">{d.loss}s</span>
                </div>
                <div className="h-2 bg-white border border-neutral-200 rounded overflow-hidden">
                  <div className={`h-full bg-${d.color}-500`} style={{ width: `${(d.loss/maxLoss)*100}%` }}></div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function HybridViz({ viz }) {
      const total = viz.parts.reduce((a, p) => a + p.size, 0);
      return (
        <div className="rounded-lg bg-neutral-50 border border-neutral-300 p-4">
          <div className="text-xs text-neutral-600 mb-2">appendonly.aof = RDB base + incremental AOF</div>
          <div className="flex h-12 rounded overflow-hidden border border-neutral-300">
            {viz.parts.map((p, i) => (
              <div key={i} className={`bg-${p.color}-500 flex items-center justify-center text-white text-xs font-mono`} style={{ width: `${(p.size/total)*100}%` }}>
                {p.name}
              </div>
            ))}
          </div>
          <div className="mt-3 space-y-1.5">
            {viz.parts.map((p, i) => (
              <div key={i} className="flex items-center gap-2 text-[11px]">
                <span className={`w-2 h-2 rounded-full bg-${p.color}-500`}></span>
                <span className="font-mono">{p.name}</span>
                <span className="text-neutral-500">— {p.desc} ({p.size}MB)</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-neutral-400 bg-white p-3">
          <div className="text-sm font-bold text-neutral-800 mb-2">📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-neutral-500 border-b border-neutral-200">
                <th className="py-1 pr-2">방식</th><th className="py-1 pr-2">전</th><th className="py-1 pr-2">후</th><th className="py-1">효과</th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-neutral-100">
                  <td className="py-1 pr-2 font-medium text-neutral-700">{r.metric}</td>
                  <td className="py-1 pr-2 text-rose-700 font-mono text-[10px]">{r.before}</td>
                  <td className="py-1 pr-2 text-emerald-700 font-mono text-[10px]">{r.after}</td>
                  <td className="py-1 text-neutral-800 font-bold text-[10px]">{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.warn;
      const viz = state.viz;
      return (
        <div className="rounded-xl border border-neutral-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-neutral-800">Persistence 시뮬레이션</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          {viz?.kind === 'rdb-timeline' && <RDBTimelineViz viz={viz} />}
          {viz?.kind === 'aof-log' && <AOFLogViz viz={viz} />}
          {viz?.kind === 'recovery-compare' && <RecoveryCompareViz viz={viz} />}
          {viz?.kind === 'aof-tradeoff' && <AOFTradeoffViz viz={viz} />}
          {viz?.kind === 'hybrid' && <HybridViz viz={viz} />}

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs text-neutral-800 bg-neutral-100 border border-neutral-300 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-neutral-500/25 border-l-2 border-neutral-300 -ml-3 pl-2' : ''}`}>
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-neutral-50 to-stone-100 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-neutral-700 text-white font-bold">R</span>
              <div>
                <h1 className="text-2xl font-bold text-neutral-900">Chapter III-2-1. Persistence RDB vs AOF</h1>
                <p className="text-sm text-neutral-700/80">snapshot vs 쓰기 로그 — 재시작 후 복구 전략</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-neutral-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-neutral-700' : 'bg-neutral-200'}`} />
              ))}
            </div>

            <div className="mb-4 rounded-xl bg-neutral-800 text-neutral-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-neutral-200/90 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button aria-label="처음으로" onClick={() => setStepIdx(0)} className="px-3 py-1.5 text-xs rounded border border-neutral-300 bg-white text-neutral-700 hover:bg-neutral-50">처음</button>
              <button aria-label="이전 단계" onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} className="px-3 py-1.5 text-xs rounded border border-neutral-300 bg-white text-neutral-700 hover:bg-neutral-50 disabled:opacity-40">← 이전</button>
              <button aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'} onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-neutral-900 text-white' : 'bg-neutral-700 text-white hover:bg-neutral-800'}`}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button aria-label="다음 단계" onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} className="px-3 py-1.5 text-xs rounded border border-neutral-300 bg-white text-neutral-700 hover:bg-neutral-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-neutral-600 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-neutral-400 bg-white px-4 py-3 text-sm text-neutral-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                RDB는 빠른 복구, AOF는 최소 손실. 운영급은 RDB+AOF 혼합 (aof-use-rdb-preamble yes). 캐시 전용이면 RDB만으로 충분.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Persistence', 'RDB', 'AOF', 'fsync', 'Recovery', 'Hybrid'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-neutral-100 text-neutral-800 border border-neutral-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-neutral-700">
              <a href="./III-1-2.html" className="underline hover:no-underline">← III-1-2 Eviction</a>
              <a href="./III-2-2.html" className="underline hover:no-underline">다음: III-2-2 Replication →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
