            <div className="bg-white border border-amber-300 rounded p-3">
              <div className="font-bold text-sm text-amber-800 mb-1">② {viz.active.name}</div>
              <div className="text-xs text-neutral-600 mb-2">{viz.active.desc}</div>
              <div className="text-[10px] font-mono bg-amber-50 px-2 py-1 rounded">{viz.active.cost}</div>
            </div>
          </div>
          <div className="text-[10px] text-neutral-600 bg-white p-2 rounded border border-neutral-200">
            ⚠ TTL=0 직후에도 잠시 메모리에 남을 수 있음. 정확한 만료 시점이 필요하면 keyspace notification 사용.
          </div>
        </div>
      );
    }

    function NotificationFlowViz({ viz }) {
      return (
        <div className="rounded-lg bg-neutral-50 border border-neutral-300 p-4 space-y-2">
          <div className="flex items-center gap-2 text-xs">
            <span className="bg-rose-100 text-rose-800 px-2 py-1 rounded font-mono">{viz.publisher}</span>
            <span className="text-neutral-400">→</span>
            <span className="bg-neutral-700 text-white px-2 py-1 rounded font-mono text-[10px]">{viz.channel}</span>
          </div>
          <div className="text-center text-[10px] text-neutral-500">↓ message: <span className="font-mono">{viz.message}</span></div>
          <div className="grid grid-cols-2 gap-2">
            {viz.subscribers.map((s, i) => (
              <div key={i} className="bg-emerald-50 border border-emerald-300 rounded p-2 text-xs font-mono text-emerald-800">
                📥 {s}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-neutral-400 bg-white p-3">
          <div className="text-sm font-bold text-neutral-800 mb-2">📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-neutral-500 border-b border-neutral-200">
                <th className="py-1 pr-2">분류</th><th className="py-1 pr-2">전</th><th className="py-1 pr-2">후</th><th className="py-1">효과</th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-neutral-100">
                  <td className="py-1 pr-2 font-medium text-neutral-700">{r.metric}</td>
                  <td className="py-1 pr-2 text-rose-700 font-mono text-[10px]">{r.before}</td>
                  <td className="py-1 pr-2 text-emerald-700 font-mono text-[10px]">{r.after}</td>
                  <td className="py-1 text-neutral-800 font-bold text-[10px]">{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.warn;
      const viz = state.viz;
      return (
        <div className="rounded-xl border border-neutral-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-neutral-800">TTL 시각화</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          {viz?.kind === 'ttl-list' && <TTLListViz viz={viz} />}
          {viz?.kind === 'ttl-countdown' && <TTLCountdownViz viz={viz} />}
          {viz?.kind === 'persist-flow' && <PersistFlowViz viz={viz} />}
          {viz?.kind === 'expiration-modes' && <ExpirationModesViz viz={viz} />}
          {viz?.kind === 'notification-flow' && <NotificationFlowViz viz={viz} />}

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs text-neutral-800 bg-neutral-100 border border-neutral-300 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-neutral-500/25 border-l-2 border-neutral-300 -ml-3 pl-2' : ''}`}>
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-neutral-50 to-stone-100 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-neutral-700 text-white font-bold">R</span>
              <div>
                <h1 className="text-2xl font-bold text-neutral-900">Chapter III-1-1. TTL과 만료</h1>
                <p className="text-sm text-neutral-700/80">EXPIRE / PERSIST / Lazy vs Active / Keyspace Notification</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-neutral-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-neutral-700' : 'bg-neutral-200'}`} />
              ))}
            </div>

            <div className="mb-4 rounded-xl bg-neutral-800 text-neutral-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-neutral-200/90 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} aria-label="처음으로" className="px-3 py-1.5 text-xs rounded border border-neutral-300 bg-white text-neutral-700 hover:bg-neutral-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 text-xs rounded border border-neutral-300 bg-white text-neutral-700 hover:bg-neutral-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'} className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-neutral-900 text-white' : 'bg-neutral-700 text-white hover:bg-neutral-800'}`}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} aria-label="다음 단계" className="px-3 py-1.5 text-xs rounded border border-neutral-300 bg-white text-neutral-700 hover:bg-neutral-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-neutral-600 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-neutral-400 bg-white px-4 py-3 text-sm text-neutral-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                TTL은 캐시의 핵심. SETEX로 안전하게 설정, KEEPTTL로 유지, PERSIST로 명시적 제거. 실제 삭제는 Lazy+Active 병행. 정확한 시점 필요하면 keyspace notification.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['TTL', 'EXPIRE', 'PERSIST', 'Lazy', 'Active', 'Notification'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-neutral-100 text-neutral-800 border border-neutral-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-neutral-700">
              <a href="../part2/II-2-2.html" className="underline hover:no-underline">← II-2-2 Set/Sorted Set</a>
              <a href="./III-1-2.html" className="underline hover:no-underline">다음: III-1-2 Eviction 정책 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
