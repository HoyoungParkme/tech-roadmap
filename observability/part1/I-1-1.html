<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observability 학습 — Observability란 무엇인가</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    I-1-1. Observability란 무엇인가
    학습 목표: 시스템 내부 상태를 외부 출력으로 추론하기 위한 3 pillars(Logs/Metrics/Traces) 이해
    핵심 비유: "의사의 진찰 3종" — Logs=의무 차트, Metrics=실시간 활력 모니터, Traces=환자 경로
    구조: 4단계 (모니터링 부재 / Metrics / Logs / Traces)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 모니터링 부재 — "사용자 컴플레인이 알람"',
        desc: '대시보드 0개. 로그는 컨테이너 재시작과 함께 휘발. trace는 아예 없음. 사용자 "느려요" 한 마디가 들어와야 운영팀이 어디서부터 봐야 할지 모른 채 헤맨다. MTTR이 시간 단위.',
        block: {
          kind: 'shell',
          code: `# 운영 환경 — 어느 평일 오후
사용자 A: "결제가 30초째 멈춰있어요"
사용자 B: "장바구니가 사라졌어요"
운영팀: "어… 어디 서버부터 봐야 하지?"

$ kubectl get pods
NAME                    READY   STATUS    RESTARTS
api-server-7d4f-x9k     1/1     Running   0
api-server-7d4f-z2m     1/1     Running   3   ← 재시작됨? 왜?

$ kubectl logs api-server-7d4f-z2m
Error from server: previous terminated container's log not found
# ↑ 휘발됨. 사고 흔적이 사라졌다

# 우리에게 없는 것
✗ 대시보드 (지금 시스템이 건강한가?)
✗ 영구 로그 (방금 무슨 일이 있었나?)
✗ 분산 추적 (어느 서비스가 느린가?)`,
        },
        focus: 'none',
      },
      {
        title: 'Step 2. Metrics — "활력 모니터" (실시간 수치)',
        desc: 'Prometheus가 각 서비스에서 latency/QPS/에러율을 15초마다 수집. Grafana로 시계열 그래프. 한눈에 "지금 건강한가?"를 본다. 단 "왜?"의 답은 못 한다 — 숫자뿐.',
        block: {
          kind: 'python',
          code: `# FastAPI + prometheus_client (4 Golden Signals 중 latency/traffic/errors)
from prometheus_client import Counter, Histogram, start_http_server
import time

request_total = Counter("http_requests_total", "Requests", ["method", "path", "status"])
request_latency = Histogram("http_request_duration_seconds", "Latency", ["path"])

@app.middleware("http")
async def observe(request, call_next):
    start = time.time()
    response = await call_next(request)
    request_total.labels(request.method, request.url.path, response.status_code).inc()
    request_latency.labels(request.url.path).observe(time.time() - start)
    return response

start_http_server(9090)   # /metrics 노출 → Prometheus가 scrape

# Prometheus scrape 설정
# - scrape_interval: 15s
# - target: api-server:9090/metrics
# - Grafana 패널: rate(http_requests_total[1m]), p99 latency

# 한계
# - "QPS 급증" 본다 → 그러나 "왜 user_id=42가 실패했나?" 답 못 함`,
        },
        focus: 'metrics',
      },
      {
        title: 'Step 3. Logs — "의무 차트" (자세한 기록)',
        desc: '구조화 로그(JSON)를 stdout으로 흘려 Loki/ELK가 수집. request_id로 한 요청의 모든 로그를 한 줄로 묶는다. "왜?"의 답이 여기 있다. 단 분산 환경에서 서비스가 많으면 검색이 무거워진다.',
        block: {
          kind: 'python',
          code: `# 구조화 로그 — JSON 한 줄에 context를 다 담는다
import json, logging, uuid

logger = logging.getLogger("api")

@app.post("/checkout")
def checkout(payload: dict):
    request_id = str(uuid.uuid4())
    logger.info(json.dumps({
        "request_id": request_id,
        "user_id": payload["user_id"],
        "endpoint": "/checkout",
        "event": "request_started",
    }))
    try:
        result = payment_service.charge(payload)
        return result
    except ConnectionTimeout as e:
        logger.error(json.dumps({
            "request_id": request_id,
            "user_id": payload["user_id"],
            "event": "payment_failed",
            "reason": "ConnectionTimeout",
            "downstream": "payment-service",
        }))
        raise

# Loki 검색 예시
# {service="api"} | json | request_id="abc-123"
# → 해당 요청 전체 흐름이 한 줄씩 시간순 출력`,
        },
        focus: 'logs',
      },
      {
        title: 'Step 4. Traces — "환자 경로" (요청의 흐름)',
        desc: 'OpenTelemetry SDK가 trace_id/span_id를 자동 전파. 4개 마이크로서비스를 거친 한 요청을 폭포수 그래프로 본다. p99 병목이 어느 서비스의 어느 함수인지 즉시 가시화.',
        block: {
          kind: 'python',
          code: `# OpenTelemetry — span으로 함수/HTTP 호출을 자동 측정
from opentelemetry import trace
from opentelemetry.sdk.trace import TracerProvider
from opentelemetry.sdk.trace.export import BatchSpanProcessor
from opentelemetry.exporter.otlp.proto.grpc.trace_exporter import OTLPSpanExporter
from opentelemetry.instrumentation.fastapi import FastAPIInstrumentor
from opentelemetry.instrumentation.requests import RequestsInstrumentor

trace.set_tracer_provider(TracerProvider())
trace.get_tracer_provider().add_span_processor(
    BatchSpanProcessor(OTLPSpanExporter(endpoint="otel-collector:4317"))
)
FastAPIInstrumentor.instrument_app(app)   # 들어오는 HTTP 자동 span
RequestsInstrumentor().instrument()       # 나가는 HTTP 자동 span

tracer = trace.get_tracer(__name__)

@app.post("/checkout")
def checkout(payload):
    with tracer.start_as_current_span("validate_cart") as span:
        span.set_attribute("user_id", payload["user_id"])
        validate(payload)
    # → trace_id 하나로 api → cart → payment → ledger 4개 서비스 chain 추적
    # → Jaeger UI에서 폭포수 그래프 → "payment 서비스의 DB query가 800ms" 즉발견

# 다음(I-1-2)에서는 Observability vs 모니터링 — CCTV vs 형사 비유로 차이점 비교`,
        },
        focus: 'traces',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const PILLARS = [
      { key: 'none',    emoji: '🤷', name: 'None',    note: '모니터링 없음 — 캄캄' },
      { key: 'metrics', emoji: '📈', name: 'Metrics', note: '활력 모니터 — 실시간 수치' },
      { key: 'logs',    emoji: '📝', name: 'Logs',    note: '의무 차트 — 자세한 기록' },
      { key: 'traces',  emoji: '🔗', name: 'Traces',  note: '환자 경로 — 요청 흐름' },
    ];

    function PillarCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🩺 의사의 진찰 3종 (3 pillars)</div>
          <div className="grid grid-cols-4 gap-2">
            {PILLARS.map((p) => {
              const isActive = focus === p.key;
              return (
                <div
                  key={p.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-red-100 border-2 border-red-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{p.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{p.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1 leading-tight">{p.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Observability란 무엇인가</h1>
                <p className="text-sm text-slate-500 mt-1">의사의 진찰 3종 — Logs / Metrics / Traces</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <PillarCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'traces' && (
              <div className="bg-red-50 border-2 border-red-300 rounded-xl p-3 mb-6 text-xs text-red-900">
                💡 다음(I-1-2)에서는 Observability vs 모니터링 — CCTV vs 형사 비유로 차이점 비교
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
