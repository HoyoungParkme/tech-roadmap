<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observability 학습 — Observability vs 모니터링</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    I-1-2. Observability vs 모니터링
    학습 목표: known unknowns(모니터링)과 unknown unknowns(Observability) 차이를 이해
    핵심 비유: "CCTV vs 형사"
      - CCTV(모니터링): 미리 정해진 구역만 비춤. 예측된 사건은 잘 잡지만 새 패턴엔 무력.
      - 형사(Observability): 단서(attribute)를 따라 새로운 사건을 파헤침.
    구조: 4단계 (CCTV / 형사 / Cardinality / Exploration)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 모니터링 — "CCTV"',
        desc: '미리 정해진 지표(cpu/mem/disk)와 정해진 dashboard만 본다. "예측된 것"이 잘 작동하는지 확인하는 도구. known unknowns에 강하지만, 처음 보는 장애 패턴엔 무력 — CCTV는 정해진 구역만 비추기 때문.',
        block: {
          kind: 'shell',
          code: `# 전통 모니터링 — known unknowns
# "내가 무엇을 모르는지 알고 있는" 것만 본다

$ kubectl top nodes
NAME       CPU%   MEM%
node-1     45%    62%
node-2     78%    71%   ← 알람 (CPU 임계 75%)

# Grafana dashboard (미리 만들어 둔 것)
- CPU usage         ✅ 미리 등록
- Memory usage      ✅ 미리 등록
- Disk I/O          ✅ 미리 등록
- Request rate      ✅ 미리 등록

# 그러나 새 장애가 발생하면?
"user_id=123인 사용자만 결제가 느려요"
"한국어 입력 시 502가 나는 것 같은데?"
"화요일 오후 3시에만 timeout?"

→ dashboard에 그런 항목이 없다
→ 추가하려면 코드 수정 + 재배포 필요
→ CCTV는 새 각도로 못 돌린다`,
        },
        focus: 'cctv',
      },
      {
        title: 'Step 2. Observability — "형사"',
        desc: '시스템 상태를 임의의 attribute(user_id, region, device, version...)로 자유롭게 질문할 수 있는 능력. 사전에 dashboard를 만들지 않아도 됨. unknown unknowns — "처음 보는 문제"를 디버깅하는 도구. 비결은 풍부한 구조화 attribute.',
        block: {
          kind: 'python',
          code: `# Observability — 풍부한 attribute로 로그/스팬 기록
# 형사처럼 단서를 모은다

import logging
from opentelemetry import trace

tracer = trace.get_tracer(__name__)

@app.post("/checkout")
def checkout(request):
    with tracer.start_as_current_span("checkout") as span:
        # 임의의 attribute를 같이 기록 — 미래의 질문을 위한 단서
        span.set_attributes({
            "user.id":         request.user_id,
            "user.tier":       request.user_tier,
            "user.country":    request.country,
            "device.type":     request.device,
            "app.version":     APP_VERSION,
            "cart.items":      len(request.items),
            "cart.amount":     request.total,
            "feature_flag.v2": flags.is_enabled("v2"),
        })
        result = process(request)
        span.set_attribute("result.status", result.status)
        return result

# 장애 발생 후
"user_id=123만 느려요"
→ Honeycomb/Tempo에서 user.id=123 필터 → 즉시 trace 추출
→ 새 dashboard 만들 필요 X, 재배포 X`,
        },
        focus: 'detective',
      },
      {
        title: 'Step 3. Cardinality — "단서의 정밀도"',
        desc: 'Cardinality = 한 attribute가 가질 수 있는 고유값 갯수. user_id, request_id, trace_id 같은 고카디널리티 필드를 인덱싱해야 진짜 디버깅이 가능. 전통 메트릭(Prometheus)은 고카디널리티가 약점, Observability 도구(Loki, Honeycomb)는 강점.',
        block: {
          kind: 'shell',
          code: `# Cardinality 비교

# 저카디널리티 (Prometheus 친화)
http_status:    200, 404, 500           → 고유값 ~10
http_method:    GET, POST, PUT, DELETE  → 고유값 ~5
region:         seoul, tokyo, us-east   → 고유값 ~10

# 고카디널리티 (전통 메트릭의 적)
user_id:        1, 2, 3, ..., 1억       → 고유값 1억개
request_id:     uuid                    → 사실상 무한
trace_id:       hex                     → 사실상 무한

# Prometheus에 user_id를 라벨로 붙이면?
http_requests_total{user_id="1"}     ← 시계열 1개
http_requests_total{user_id="2"}     ← 시계열 1개
...
http_requests_total{user_id="1억"}   ← 시계열 1억개
→ 메모리 폭발, OOM (cardinality explosion)

# Observability 도구는 다르게 처리
Loki:        log line + label, 본문은 grep
Tempo:       trace_id로 인덱싱
Honeycomb:   columnar store, 모든 attribute 인덱싱

→ "user_id=123" 쿼리가 1초 안에 끝남
→ 형사가 지문(고카디널리티 단서)으로 범인을 잡는다`,
        },
        focus: 'cardinality',
      },
      {
        title: 'Step 4. Exploration — "ad-hoc 가설 검증"',
        desc: '새 가설이 떠오르면 즉시 쿼리로 검증할 수 있는 워크플로우. 미리 dashboard를 만들어 둘 필요가 없음. "어제 오후 3시 5xx 낸 요청들의 user-agent 분포는?" 같은 질문을 LogQL/PromQL/HoneycombQL로 즉시 답한다.',
        block: {
          kind: 'shell',
          code: `# Exploration — 가설이 떠오르면 즉시 쿼리

# 가설 1: "어제 오후 3시 5xx 낸 요청들의 user-agent 분포?"
# Loki LogQL
{app="checkout"}
  | json
  | status >= 500
  | __error__ = ""
  | line_format "{{.user_agent}}"
  # 시간 범위: 2026-05-05 15:00 ~ 16:00
→ 결과: Safari 17.4 가 82% (의심!)

# 가설 2: "v2.3.1 배포 후 latency p99 변화?"
# PromQL
histogram_quantile(0.99,
  sum(rate(http_duration_bucket{version="v2.3.1"}[5m])) by (le)
)
vs
histogram_quantile(0.99,
  sum(rate(http_duration_bucket{version="v2.3.0"}[5m])) by (le)
)
→ p99: 320ms → 1100ms  (배포가 원인)

# 가설 3: "user_tier=premium 만 timeout?"
# Honeycomb
WHERE user.tier = "premium"
GROUP BY error.type
COUNT
→ premium 만 DB connection pool 부족 발견

# 핵심 차이
모니터링 = 미리 만든 질문에만 답함
Observability = 새로운 질문에 즉시 답함
                → 디버깅 속도 = 곧 MTTR 단축`,
        },
        focus: 'explore',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const CONTRAST = [
      { key: 'cctv',        emoji: '📹', name: 'CCTV',         note: '모니터링: 예측된 것' },
      { key: 'detective',   emoji: '🕵️', name: '형사',          note: 'Observability: 미지 디버깅' },
      { key: 'cardinality', emoji: '🔢', name: 'Cardinality',  note: '고유값(user_id) 폭발' },
      { key: 'explore',     emoji: '🔍', name: 'Exploration',  note: '자유 탐색 쿼리' },
    ];

    function ContrastCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🔍 CCTV vs 형사 (모니터링 vs Observability)</div>
          <div className="grid grid-cols-4 gap-2">
            {CONTRAST.map((c) => {
              const isActive = focus === c.key;
              return (
                <div
                  key={c.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-red-100 border-2 border-red-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{c.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{c.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1 leading-tight">{c.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Observability vs 모니터링</h1>
                <p className="text-sm text-slate-500 mt-1">CCTV vs 형사 — known unknowns vs unknown unknowns</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <ContrastCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'explore' && (
              <div className="bg-red-50 border-2 border-red-300 rounded-xl p-3 mb-6 text-xs text-red-900">
                💡 다음(I-2-1)에서는 SRE 4 Golden Signals — Latency/Traffic/Errors/Saturation
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
