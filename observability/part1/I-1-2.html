<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observability 학습 — I-1-2. Observability vs 모니터링</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🕵️</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    I-1-2. Observability vs 모니터링
    학습 목표: known unknowns(모니터링)과 unknown unknowns(Observability) 차이를 이해
    핵심 비유: "CCTV vs 형사"
      - CCTV(모니터링): 정해진 4 알람만 본다. 안정 녹색.
      - 형사(Observability): high-cardinality 단서(user_id 등)로 임의 질문에 답한다.
    구조: 4단계 (cctv / detective / cardinality / explore)
    패턴: observability 표준 — 좌(LiveDataPane 시각화) / 우(VSCode 코드)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── 4 STEPS — 좌측 LiveDataPane이 보여줄 데이터 + 우측 코드
    const STEPS = [
      {
        focus: 'cctv',
        title: 'Step 1. 모니터링 — "CCTV"',
        desc: '미리 정해진 지표(CPU/Mem/Disk/RPS) 4개만 본다. 임계 안에 있으면 모든 게 녹색이다. known unknowns에 강하지만, 처음 보는 장애 패턴엔 무력 — CCTV는 정해진 구역만 비추기 때문이다.',
        legend: '4개 알람 — 임계 안 → 안정 녹색. "예측된 것"만 본다.',
        code: {
          lang: 'yaml',
          filename: 'prometheus-rules.yaml — 사전 정의 4 알람',
          lines: [
            '# 전통 모니터링 — known unknowns',
            '# "내가 무엇을 모르는지 알고 있는" 것만 본다',
            'groups:',
            '- name: classic-4-alarms',
            '  rules:',
            '  - alert: HighCPU',
            '    expr: node_cpu_usage > 0.75',
            '    for: 5m',
            '  - alert: HighMemory',
            '    expr: node_mem_usage > 0.80',
            '    for: 5m',
            '  - alert: DiskFull',
            '    expr: node_disk_usage > 0.85',
            '    for: 5m',
            '  - alert: HighRPS',
            '    expr: rate(http_requests_total[5m]) > 1000',
            '    for: 5m',
            '',
            '# 그러나 새 장애가 발생하면?',
            '# "user_id=123인 사용자만 결제가 느려요"',
            '# → dashboard에 그런 항목이 없다',
            '# → 추가하려면 코드 수정 + 재배포',
            '# → CCTV는 새 각도로 못 돌린다',
          ],
          highlight: [6, 9, 12, 15],
        },
      },
      {
        focus: 'detective',
        title: 'Step 2. Observability — "형사"',
        desc: '시스템 상태를 임의의 attribute(user_id, region, device, version…)로 자유롭게 질문할 수 있는 능력. 사전에 dashboard를 만들지 않아도 된다. "user_id=123 latency p99?" 같은 질문을 즉시 던지고 1200ms라는 답을 받는다. unknown unknowns에 강하다.',
        legend: 'high-cardinality 검색 — user_id=123 latency p99 = 1200ms (사전 dashboard 없이도 답이 나온다)',
        code: {
          lang: 'python',
          filename: 'detective.py — 풍부한 attribute 기록',
          lines: [
            '# Observability — 풍부한 attribute로 span 기록',
            '# 형사처럼 단서를 모은다',
            'from opentelemetry import trace',
            '',
            'tracer = trace.get_tracer(__name__)',
            '',
            '@app.post("/checkout")',
            'def checkout(request):',
            '    with tracer.start_as_current_span("checkout") as span:',
            '        # 임의의 attribute = 미래의 질문을 위한 단서',
            '        span.set_attributes({',
            '            "user.id":         request.user_id,',
            '            "user.tier":       request.user_tier,',
            '            "user.country":    request.country,',
            '            "device.type":     request.device,',
            '            "app.version":     APP_VERSION,',
            '            "cart.items":      len(request.items),',
            '            "feature_flag.v2": flags.is_enabled("v2"),',
            '        })',
            '        result = process(request)',
            '        span.set_attribute("result.status", result.status)',
            '        return result',
            '',
            '# 장애 발생 후 — Honeycomb / Tempo 즉시 질의',
            '#   WHERE user.id = 123',
            '#   GROUP BY name',
            '#   PERCENTILE(duration_ms, 0.99)',
            '# → user_id=123 의 p99 = 1200ms (즉시)',
            '# → 새 dashboard X, 재배포 X',
          ],
          highlight: [11, 12, 13, 14, 15, 16, 17],
        },
      },
      {
        focus: 'cardinality',
        title: 'Step 3. Cardinality — "단서의 정밀도"',
        desc: 'Cardinality = 한 attribute가 가질 수 있는 고유값 갯수. user_id, request_id, trace_id 같은 고카디널리티 필드를 인덱싱해야 진짜 디버깅이 가능. 전통 메트릭(Prometheus, Loki label)은 고카디널리티가 약점, Observability 도구(Honeycomb, Tempo)는 강점이다.',
        legend: 'unique user_id = 1,000,000 — Loki label에 넣으면 OOM, Honeycomb columnar는 1초',
        code: {
          lang: 'shell',
          filename: 'cardinality.sh — 고유값 폭발 비교',
          lines: [
            '# Cardinality 비교 — 1M user_ids',
            '',
            '# 저카디널리티 (Prometheus/Loki label 친화)',
            'http_status:    200, 404, 500           → 고유값 ~10',
            'http_method:    GET, POST, PUT, DELETE  → 고유값 ~5',
            'region:         seoul, tokyo, us-east   → 고유값 ~10',
            '',
            '# 고카디널리티 (전통 메트릭의 적)',
            'user_id:        1, 2, 3, ..., 1,000,000 → 고유값 1M',
            'request_id:     uuid                    → 사실상 무한',
            'trace_id:       hex                     → 사실상 무한',
            '',
            '# Loki에 user_id를 라벨로 붙이면?',
            '{app="checkout", user_id="1"}     ← stream 1개',
            '{app="checkout", user_id="2"}     ← stream 1개',
            '...',
            '{app="checkout", user_id="1M"}    ← stream 1M개',
            '→ ingester 메모리 폭발, OOM (cardinality explosion)',
            '',
            '# Honeycomb/Tempo 는 다르게 처리',
            'Honeycomb:   columnar store, 모든 attribute 인덱싱',
            'Tempo:       trace_id로 인덱싱, attribute 본문 스캔',
            '',
            '→ "user_id=123" 쿼리가 1초 안에 끝남',
            '→ 형사가 지문(고카디널리티 단서)으로 범인을 잡는다',
          ],
          highlight: [9, 18, 21],
        },
      },
      {
        focus: 'explore',
        title: 'Step 4. Exploration — "ad-hoc 가설 검증"',
        desc: '새 가설이 떠오르면 즉시 쿼리로 검증할 수 있는 워크플로우. 미리 dashboard를 만들어 둘 필요가 없다. "어제 5xx 낸 요청들의 user-agent 분포는?" 같은 질문을 LogQL/HoneycombQL로 즉시 답한다. Safari 17.4가 82%라는 답이 30초 안에 나온다.',
        legend: 'ad-hoc 결과: 5xx 요청의 user-agent 분포 — Safari 17.4 가 82% (의심!)',
        code: {
          lang: 'shell',
          filename: 'explore.logql — ad-hoc 가설 검증',
          lines: [
            '# Exploration — 가설이 떠오르면 즉시 쿼리',
            '',
            '# 가설 1: "어제 5xx 낸 요청들의 user-agent 분포?"',
            '# Loki LogQL',
            '{app="checkout"}',
            '  | json',
            '  | status >= 500',
            '  | __error__ = ""',
            '  | line_format "{{.user_agent}}"',
            '# 시간 범위: 2026-05-06 00:00 ~ 24:00',
            '#',
            '# → 결과:  Safari 17.4    82%  ◀ 의심',
            '#         Chrome 124      9%',
            '#         Firefox 125     5%',
            '#         curl/8.4        4%',
            '',
            '# 가설 2: "v2.3.1 배포 후 latency p99 변화?"',
            '# Honeycomb',
            'WHERE app.version = "v2.3.1"',
            'PERCENTILE(duration_ms, 0.99)',
            '# → p99: 320ms → 1100ms  (배포가 원인)',
            '',
            '# 가설 3: "user_tier=premium 만 timeout?"',
            'WHERE user.tier = "premium"',
            'GROUP BY error.type',
            'COUNT',
            '# → premium 만 DB connection pool 부족',
            '',
            '# 핵심 차이',
            '# 모니터링 = 미리 만든 질문에만 답함',
            '# Observability = 새로운 질문에 즉시 답함 → MTTR 단축',
          ],
          highlight: [5, 6, 7, 8, 9, 12],
        },
      },
    ];

    // ── CCTV 4 알람 데이터 (Step 1)
    const CCTV_ALARMS = [
      { id: 'cpu',  label: 'CPU usage',     value: '45%',   threshold: '< 75%', icon: '🖥️' },
      { id: 'mem',  label: 'Memory usage',  value: '62%',   threshold: '< 80%', icon: '💾' },
      { id: 'disk', label: 'Disk usage',    value: '38%',   threshold: '< 85%', icon: '🗄️' },
      { id: 'rps',  label: 'Request rate',  value: '420/s', threshold: '< 1000/s', icon: '📡' },
    ];

    // ── 형사: 검색 시뮬레이션 (Step 2)
    const DETECTIVE_QUERIES = [
      { q: 'WHERE user.id = 123 | PERCENTILE(duration_ms, 0.99)',  label: 'user_id=123 latency p99',     answer: '1200ms', tag: 'p99', extra: '느린 요청 47건 — 전부 v2.3.1 빌드' },
      { q: 'WHERE user.country = "KR" AND status >= 500 | COUNT', label: 'KR 5xx 건수 (1h)',            answer: '83건',   tag: 'count', extra: 'feature_flag.v2 = true 인 것만' },
      { q: 'WHERE device.type = "ios" | GROUP BY error.type',     label: 'iOS 에러 타입 분포',          answer: '2 group', tag: 'group', extra: 'Timeout 71%, ConnReset 29%' },
    ];

    // ── Cardinality 비교 (Step 3)
    const CARDINALITY_ROWS = [
      { field: 'http_status',  unique: 10,         tool: 'Prometheus',   ok: true,  note: '저카디널리티 — 라벨 OK' },
      { field: 'http_method',  unique: 5,          tool: 'Prometheus',   ok: true,  note: '저카디널리티 — 라벨 OK' },
      { field: 'region',       unique: 10,         tool: 'Loki label',   ok: true,  note: '저카디널리티 — stream 10' },
      { field: 'user_id',      unique: 1000000,    tool: 'Loki label',   ok: false, note: 'OOM — stream 1M 폭발' },
      { field: 'user_id',      unique: 1000000,    tool: 'Honeycomb',    ok: true,  note: 'columnar — 1초 쿼리' },
      { field: 'trace_id',     unique: '∞',        tool: 'Tempo',        ok: true,  note: 'trace_id 직접 인덱싱' },
    ];

    // ── Exploration: 5xx user-agent 분포 (Step 4)
    const EXPLORE_RESULT = [
      { ua: 'Safari 17.4',  pct: 82, count: 6724, suspect: true  },
      { ua: 'Chrome 124',   pct:  9, count:  738, suspect: false },
      { ua: 'Firefox 125',  pct:  5, count:  410, suspect: false },
      { ua: 'curl/8.4',     pct:  4, count:  328, suspect: false },
    ];

    // ── 좌측 LiveDataPane — focus 별로 다른 시각화 렌더
    function LiveDataPane({ step, stepIdx }) {
      const animKey = `lp-${stepIdx}`;
      const [queryIdx, setQueryIdx] = useState(0);

      // Step 2 진입 시 query를 순환 (시각적 동기 효과)
      useEffect(() => {
        if (step.focus !== 'detective') return;
        setQueryIdx(0);
        const t = setInterval(() => setQueryIdx((i) => (i + 1) % DETECTIVE_QUERIES.length), 2200);
        return () => clearInterval(t);
      }, [stepIdx, step.focus]);

      return (
        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          <div className="bg-slate-50 px-4 py-2 flex items-center justify-between border-b border-slate-200">
            <div className="flex items-center gap-2">
              <span className="text-base">
                {step.focus === 'cctv' && '📹'}
                {step.focus === 'detective' && '🕵️'}
                {step.focus === 'cardinality' && '🔢'}
                {step.focus === 'explore' && '🔍'}
              </span>
              <span className="text-xs font-bold text-slate-700">
                {step.focus === 'cctv' && '모니터링 — 사전 정의 4 알람'}
                {step.focus === 'detective' && 'Observability — high-cardinality 검색'}
                {step.focus === 'cardinality' && 'Cardinality — Loki vs Honeycomb'}
                {step.focus === 'explore' && 'Exploration — ad-hoc 쿼리 결과'}
              </span>
            </div>
            <span className="text-[10px] text-slate-500 font-mono">
              {step.focus === 'cctv' && 'classic-4-alarms'}
              {step.focus === 'detective' && 'honeycomb://prod'}
              {step.focus === 'cardinality' && 'cardinality scan'}
              {step.focus === 'explore' && 'logql://checkout'}
            </span>
          </div>

          <div className="p-4 min-h-[360px]" key={animKey}>
            {/* ── Step 1: CCTV 4 알람 — 임계 안 녹색 */}
            {step.focus === 'cctv' && (
              <div className="space-y-3">
                <div className="grid grid-cols-2 gap-3">
                  {CCTV_ALARMS.map((a, i) => (
                    <div
                      key={a.id}
                      className="rounded-lg border-2 border-emerald-300 bg-emerald-50 p-3 fade-in"
                      style={{ animationDelay: `${i * 180}ms` }}
                    >
                      <div className="flex items-center gap-2 mb-2">
                        <span className="text-xl">{a.icon}</span>
                        <span className="text-xs font-bold text-slate-700">{a.label}</span>
                        <span className="ml-auto text-[10px] text-emerald-700 font-bold">● OK</span>
                      </div>
                      <div className="text-2xl font-mono font-bold text-emerald-700">{a.value}</div>
                      <div className="text-[10px] text-slate-500 font-mono mt-1">threshold {a.threshold}</div>
                    </div>
                  ))}
                </div>
                <div className="rounded-lg bg-slate-100 border border-slate-200 p-3 text-[11px] text-slate-600 fade-in" style={{ animationDelay: '720ms' }}>
                  <div className="font-bold text-slate-700 mb-1">📺 CCTV 화면 — 4개 구역 모두 녹색</div>
                  "user_id=123 만 느려요" 같은 질문엔 답할 수 없다. 화면에 그런 칸이 없으니까.
                </div>
              </div>
            )}

            {/* ── Step 2: 형사 high-cardinality 검색 */}
            {step.focus === 'detective' && (
              <div className="space-y-3">
                {/* query input 박스 */}
                <div className="rounded-lg bg-slate-900 border border-red-500/40 p-3 fade-in" style={{ animationDelay: '0ms' }}>
                  <div className="flex items-center gap-2 mb-2">
                    <span className="text-[10px] font-bold text-red-400">QUERY</span>
                    <span className="text-[10px] text-slate-500 font-mono">honeycomb</span>
                    <span className="ml-auto inline-block w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                  </div>
                  <div className="font-mono text-xs text-emerald-300 break-all">
                    {DETECTIVE_QUERIES[queryIdx].q}
                    <span className="inline-block w-1.5 h-3.5 bg-emerald-300 ml-1 align-middle animate-pulse"></span>
                  </div>
                </div>

                {/* 응답 카드 */}
                <div className="rounded-lg border-2 border-red-300 bg-red-50 p-3 fade-in" key={`a-${queryIdx}`} style={{ animationDelay: '120ms' }}>
                  <div className="flex items-center gap-2 mb-1">
                    <span className="text-[10px] font-bold text-red-700 uppercase">{DETECTIVE_QUERIES[queryIdx].tag}</span>
                    <span className="text-xs text-slate-700">{DETECTIVE_QUERIES[queryIdx].label}</span>
                  </div>
                  <div className="text-3xl font-mono font-bold text-red-700">
                    {DETECTIVE_QUERIES[queryIdx].answer}
                  </div>
                  <div className="text-[11px] text-slate-600 mt-1">{DETECTIVE_QUERIES[queryIdx].extra}</div>
                </div>

                {/* 다른 쿼리 미리보기 */}
                <div className="space-y-1">
                  {DETECTIVE_QUERIES.map((q, i) => (
                    <div
                      key={i}
                      className={`text-[11px] font-mono px-2 py-1 rounded transition-all ${
                        i === queryIdx ? 'bg-red-100 text-red-800 font-bold' : 'bg-slate-50 text-slate-500'
                      }`}
                    >
                      <span className="mr-1">{i === queryIdx ? '▶' : '·'}</span>
                      {q.label}
                    </div>
                  ))}
                </div>

                <div className="text-[10px] text-slate-500 leading-snug">
                  사전 dashboard 없이도 임의 attribute로 즉시 질문 가능 — unknown unknowns 디버깅
                </div>
              </div>
            )}

            {/* ── Step 3: Cardinality 표 + 1M 카운터 */}
            {step.focus === 'cardinality' && (
              <div className="space-y-3">
                {/* 카운터 — 1M unique user_ids */}
                <div className="rounded-lg bg-slate-900 border border-red-500/40 p-3 fade-in" style={{ animationDelay: '0ms' }}>
                  <div className="flex items-center gap-2 mb-1">
                    <span className="text-[10px] font-bold text-red-400">UNIQUE user_id</span>
                    <span className="ml-auto text-[10px] text-slate-500 font-mono">last 24h</span>
                  </div>
                  <div className="text-3xl font-mono font-bold text-red-400">1,000,000</div>
                  <div className="text-[11px] text-slate-400 mt-1">cardinality = 1M (사실상 무한급)</div>
                </div>

                {/* 비교 표 */}
                <div className="rounded-lg border border-slate-200 overflow-hidden">
                  <table className="w-full text-[11px]">
                    <thead>
                      <tr className="bg-slate-100 text-slate-600">
                        <th className="text-left px-2 py-1.5 font-bold">field</th>
                        <th className="text-right px-2 py-1.5 font-bold">unique</th>
                        <th className="text-left px-2 py-1.5 font-bold">tool</th>
                        <th className="text-left px-2 py-1.5 font-bold">verdict</th>
                      </tr>
                    </thead>
                    <tbody>
                      {CARDINALITY_ROWS.map((r, i) => (
                        <tr
                          key={i}
                          className={`border-t border-slate-100 fade-in ${r.ok ? 'bg-white' : 'bg-red-50'}`}
                          style={{ animationDelay: `${120 + i * 80}ms` }}
                        >
                          <td className="px-2 py-1.5 font-mono text-slate-700">{r.field}</td>
                          <td className="px-2 py-1.5 font-mono text-right text-slate-600">{typeof r.unique === 'number' ? r.unique.toLocaleString() : r.unique}</td>
                          <td className="px-2 py-1.5 text-slate-600">{r.tool}</td>
                          <td className={`px-2 py-1.5 ${r.ok ? 'text-emerald-700' : 'text-red-700 font-bold'}`}>
                            {r.ok ? '✓ ' : '✗ '}{r.note}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                <div className="text-[10px] text-slate-500 leading-snug">
                  같은 user_id 1M — Loki label 은 OOM, Honeycomb columnar 는 1초. 도구 선택의 핵심.
                </div>
              </div>
            )}

            {/* ── Step 4: ad-hoc query input + 결과 표 */}
            {step.focus === 'explore' && (
              <div className="space-y-3">
                {/* query input */}
                <div className="rounded-lg bg-slate-900 border border-red-500/40 p-3 fade-in" style={{ animationDelay: '0ms' }}>
                  <div className="flex items-center gap-2 mb-2">
                    <span className="text-[10px] font-bold text-red-400">AD-HOC QUERY</span>
                    <span className="text-[10px] text-slate-500 font-mono">LogQL</span>
                    <span className="ml-auto inline-block w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                  </div>
                  <div className="font-mono text-[11px] text-emerald-300 leading-relaxed">
                    {'{app="checkout"} | json | status >= 500'}<br />
                    {'  | line_format "{{.user_agent}}"'}
                    <span className="inline-block w-1.5 h-3 bg-emerald-300 ml-1 align-middle animate-pulse"></span>
                  </div>
                </div>

                {/* 결과 표 — user-agent 분포 */}
                <div className="rounded-lg border border-slate-200 overflow-hidden">
                  <div className="bg-slate-100 px-3 py-1.5 text-[10px] font-bold text-slate-600">5xx 요청의 user-agent 분포 (n=8,200)</div>
                  <div className="divide-y divide-slate-100">
                    {EXPLORE_RESULT.map((r, i) => (
                      <div
                        key={r.ua}
                        className={`px-3 py-2 flex items-center gap-3 fade-in ${r.suspect ? 'bg-red-50' : 'bg-white'}`}
                        style={{ animationDelay: `${200 + i * 160}ms` }}
                      >
                        <div className="w-28 text-[11px] font-mono text-slate-700 truncate">{r.ua}</div>
                        <div className="flex-1 h-4 bg-slate-100 rounded overflow-hidden">
                          <div
                            className={`h-full grow-bar rounded ${r.suspect ? 'bg-red-500' : 'bg-slate-400'}`}
                            style={{ '--target-width': `${r.pct}%`, animationDelay: `${260 + i * 160}ms` }}
                          />
                        </div>
                        <div className={`w-12 text-right text-[11px] font-mono font-bold ${r.suspect ? 'text-red-700' : 'text-slate-600'}`}>{r.pct}%</div>
                        <div className="w-14 text-right text-[10px] font-mono text-slate-500">{r.count.toLocaleString()}</div>
                        {r.suspect && <span className="text-[10px] font-bold text-red-700">◀ 의심</span>}
                      </div>
                    ))}
                  </div>
                </div>

                <div className="text-[10px] text-slate-500 leading-snug">
                  사전 dashboard 없이 30초 안에 범인 후보 발견 — Safari 17.4 의 SSL 핸드셰이크 이슈 의심
                </div>
              </div>
            )}
          </div>

          {/* 범례 */}
          <div className="px-4 pb-3 pt-2 border-t border-slate-100 bg-slate-50">
            <div className="text-[10px] text-slate-500 leading-snug">{step.legend}</div>
          </div>
        </div>
      );
    }

    // ── 우측: VSCode 스타일 코드 뷰어 (highlight.js)
    function CodeViewer({ code, stepIdx }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [stepIdx]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 px-2 py-0.5 rounded bg-slate-700/40 font-mono">{code.lang}</span>
          </div>
          <div className="overflow-auto max-h-[28rem] text-xs">
            <pre className="p-0 m-0">
              <code ref={codeRef} className={`language-${code.lang} block !bg-transparent !p-0`}>
{code.lines.map((line, i) => {
  const highlighted = code.highlight && code.highlight.includes(i + 1);
  return (
    <div key={i} className={`flex ${highlighted ? 'bg-yellow-500/10' : ''}`}>
      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-10 shrink-0">{i + 1}</span>
      <span className="pl-3 pr-3 whitespace-pre">{line || ' '}</span>
    </div>
  );
})}
              </code>
            </pre>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);

      const handleNext = () => setStepIdx((i) => (i < STEPS.length - 1 ? i + 1 : i));
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setIsPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[stepIdx];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <style>{`
            @keyframes fadeIn {
              from { opacity: 0; transform: translateY(4px); }
              to   { opacity: 1; transform: translateY(0); }
            }
            .fade-in {
              opacity: 0;
              animation: fadeIn 360ms ease-out forwards;
            }
            @keyframes growBar {
              from { width: 0; }
              to   { width: var(--target-width); }
            }
            .grow-bar {
              width: 0;
              animation: growBar 700ms cubic-bezier(.2,.7,.3,1) forwards;
            }
          `}</style>

          <div className="max-w-6xl mx-auto space-y-5">

            {/* 헤더 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-red-600 hover:text-red-800 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-red-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. Observability 개론 &gt; Chapter 1. 왜 Observability인가</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Observability vs 모니터링</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                CCTV vs 형사 — <strong>known unknowns</strong>(예측된 알람) vs <strong>unknown unknowns</strong>(처음 보는 장애).
                전자는 <code className="bg-slate-100 px-1 rounded text-xs">미리 정한 4 알람</code>만 본다,
                후자는 <code className="bg-slate-100 px-1 rounded text-xs">user_id</code> 같은 high-cardinality 단서로 임의 질문에 답한다.
              </p>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer code={step.code} stepIdx={stepIdx} />
            </div>

            {/* 설명 */}
            <div className="p-4 rounded-xl bg-red-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-red-200">Step {stepIdx + 1} / {STEPS.length} — {step.title}</h3>
                <span className="text-xs text-red-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 마지막 단계: 다음 안내 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="p-3 rounded-xl bg-red-50 border-2 border-red-300 text-red-900 text-sm">
                💡 다음(I-2-1)에서는 <strong>SRE 4 Golden Signals — Latency / Traffic / Errors / Saturation</strong>
              </div>
            )}

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setStepIdx(0); setIsPlaying(false); }} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                처음
              </button>
              <button onClick={handlePrev} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                &larr; 이전
              </button>
              <button onClick={togglePlay}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-red-600 text-white hover:bg-red-700 transition min-w-[96px]">
                {isPlaying ? '⏸ 일시정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; I-1-1</a>
              <a href="../part1/I-2-1.html" className="text-red-600 hover:text-red-800 font-medium">I-2-1 SRE 4 Golden Signals &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
