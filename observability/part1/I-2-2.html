<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>💳</text></svg>" />

</head>
<body>
  <div id="root"></div>

  <!--
    I-2-2. SLO / SLI / Error Budget
    학습 목표: 신뢰성을 숫자로 약속하고 예산처럼 관리하는 모델 이해
    핵심 비유: "신용카드 한도" — SLI=실제 사용량, SLO=한도 목표, Error Budget=남은 한도, Burn Rate=소진 속도
    패턴: fastapi 표준 — 좌(SLO 게이지 + Budget 잔액 그래프) / 우(VSCode PromQL alert rule)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 30일 budget = 43.2분 (= 99.9% SLO)
    const BUDGET_TOTAL_MIN = 43.2;

    // 4 STEPS — sli / slo / budget / burn
    const STEPS = [
      {
        focus: 'sli',
        title: 'Step 1. SLI — "이번 달 카드 사용 내역"',
        desc: 'Service Level Indicator: 측정 가능한 신뢰성 지표. 5분 윈도우 내 2xx/3xx 비율처럼 "실제로 사용자에게 어떻게 보였는가"를 숫자로 만든 값이다. 신용카드로 치면 이번 달 실제 사용 내역이다. 지금 SLI = 99.95%.',
        title2: 'SLI 측정값 = 99.95%',
        legend: 'SLO(목표)와 비교 전, 현재 실제 신뢰성을 먼저 측정한다',
        sliPct: 99.95,           // 실제 측정값
        sloPct: 99.9,            // 목표 라인
        budgetUsedMin: 0,        // Budget 잔액 그래프는 아직 비활성
        budgetActive: false,
        burnRate: 1.0,
        alarm: false,
        code: {
          lang: 'yaml',
          filename: 'sli.recording-rule.yml — Prometheus SLI',
          lines: [
            '# SLI 정의 — Recording Rule로 5분 윈도우 success ratio 산출',
            'groups:',
            '  - name: sli_availability',
            '    interval: 30s',
            '    rules:',
            '      # 가용성 SLI: 2xx/3xx 비율',
            '      - record: sli:http_requests:success_ratio_5m',
            '        expr: |',
            '          sum(rate(http_requests_total{status=~"2..|3.."}[5m]))',
            '          /',
            '          sum(rate(http_requests_total[5m]))',
            '',
            '      # 지연 SLI: p99 < 300ms 비율',
            '      - record: sli:http_requests:latency_ratio_5m',
            '        expr: |',
            '          sum(rate(http_request_duration_seconds_bucket{le="0.3"}[5m]))',
            '          /',
            '          sum(rate(http_request_duration_seconds_count[5m]))',
            '',
            '# 흔한 SLI 4종 — 사용자 체감 지표',
            '#   가용성 / 지연 / 오류율 / 처리량',
            '# 안티패턴: CPU/메모리 같은 인프라 메트릭은 SLI가 아니다',
          ],
          highlight: [7, 8, 9, 10, 11],
        },
      },
      {
        focus: 'slo',
        title: 'Step 2. SLO — "월 한도 99.9% 약속"',
        desc: 'Service Level Objective: SLI의 목표치. "99.9% (three nines)"는 한 달 30일 중 43.2분만 down 허용한다. 9 하나 늘릴 때마다 인프라 비용은 10배. 100% SLO는 불가능 — 사용자가 차이를 느끼지 못하는 최소 신뢰도를 골라야 한다. 지금 SLI 99.95% > SLO 99.9% — 합격선 위.',
        title2: 'SLO 99.9% 라인 + SLI 현재 위치',
        legend: 'SLI(99.95%)가 SLO(99.9%) 위에 있다 → 예산은 아직 거의 그대로',
        sliPct: 99.95,
        sloPct: 99.9,
        budgetUsedMin: 0,
        budgetActive: false,
        burnRate: 0.5,
        alarm: false,
        code: {
          lang: 'yaml',
          filename: 'slo.targets.yml — SLO 목표 정의',
          lines: [
            '# SLO 9 갯수별 허용 down time (월 30일 기준)',
            '#   SLO        월간 허용 down       하루 허용 down',
            '#   99%        7시간 12분            14분 24초',
            '#   99.9%      43분 12초             1분 26초    ← 일반 SaaS',
            '#   99.95%     21분 36초             43초',
            '#   99.99%     4분 19초              8.6초       ← 결제/금융',
            '#   99.999%    25.9초                0.86초      ← 통신/항공',
            '',
            'slos:',
            '  - service: checkout-api',
            '    target: 0.999          # 99.9% — three nines',
            '    window: 30d',
            '    sli_ref: sli:http_requests:success_ratio_5m',
            '    rationale: |',
            '      - 결제 미션 크리티컬 직전 단계 (4 nines는 비용 과대)',
            '      - 사용자 불만 임계 99.85% (지난 분기 측정)',
            '      - 99.9% → 99.99% 가려면 multi-region 필요',
            '',
            '# SLO 결정 프레임 (Google SRE Workbook)',
            '#   1. 현재 SLI baseline 측정 (지난 4주)',
            '#   2. 사용자 불만 시작 지점 찾기',
            '#   3. 그 사이 어딘가로 SLO 설정',
            '#   4. 분기마다 재검토 (너무 쉬우면 ↑, 못 지키면 ↓)',
          ],
          highlight: [11, 12, 13, 14],
        },
      },
      {
        focus: 'budget',
        title: 'Step 3. Error Budget — "쓸 수 있는 실패 시간"',
        desc: 'Error Budget = 100% - SLO. 99.9% SLO면 한 달에 0.1% (43.2분) 실패해도 OK. 이 예산을 위험 감수 자산으로 쓴다 — 새 기능 배포, A/B 실험, 인프라 변경 모두 이 예산 안에서 결정한다. 30일 budget 43.2분 / 사용 12분 / 잔액 31.2분 (72% 남음).',
        title2: '30일 Budget = 43.2분 / 사용 12분 / 잔액 31.2분',
        legend: '잔액 50% 이상 → 새 기능 배포 OK, 25%~50% → 위험 변경 금지',
        sliPct: 99.972,
        sloPct: 99.9,
        budgetUsedMin: 12,       // 12분 사용
        budgetActive: true,
        burnRate: 1.0,
        alarm: false,
        code: {
          lang: 'python',
          filename: 'error_budget.py — 잔액 계산 + 정책',
          lines: [
            '# 파일: sre/error_budget.py — Error Budget 잔액 계산',
            'from datetime import timedelta',
            'from prometheus_api_client import PrometheusConnect',
            '',
            'SLO_TARGET = 0.999          # 99.9%',
            'WINDOW_DAYS = 30',
            '',
            '',
            'def calculate_error_budget(prom: PrometheusConnect) -> dict:',
            '    """30일 윈도우 SLI 측정 → 예산 잔액 환산"""',
            '    query = (',
            '        \'sum(rate(http_requests_total{status=~"2..|3.."}[30d]))\'',
            '        \' / \'',
            '        \'sum(rate(http_requests_total[30d]))\'',
            '    )',
            '    actual_sli = float(prom.custom_query(query)[0]["value"][1])',
            '',
            '    # 예산 환산',
            '    error_budget_total = 1 - SLO_TARGET             # 0.001',
            '    error_budget_used = max(0, SLO_TARGET - actual_sli)',
            '    used_pct = error_budget_used / error_budget_total',
            '',
            '    # 시간 단위로 변환 (30일 = 43,200분 → 0.1% = 43.2분)',
            '    minutes_total = WINDOW_DAYS * 24 * 60 * (1 - SLO_TARGET)',
            '    minutes_used = used_pct * minutes_total',
            '',
            '    return {',
            '        "actual_sli": actual_sli,                   # 0.99972',
            '        "budget_total_min": minutes_total,          # 43.2',
            '        "budget_used_min": minutes_used,            # 12.0',
            '        "budget_remaining_pct": 1 - used_pct,       # 0.72',
            '    }',
            '',
            '# 정책 — "예산 = 의사결정 도구"',
            '#   50%+ 남음   → 새 기능 배포 OK, A/B 실험 OK',
            '#   25%~50%    → 위험한 변경 금지, 카나리 강화',
            '#   0%~25%     → 신규 배포 freeze, 안정화 sprint',
            '#   초과       → postmortem + SLO 재협상',
          ],
          highlight: [22, 23, 24, 25],
        },
      },
      {
        focus: 'burn',
        title: 'Step 4. Burn Rate — "이 속도로 쓰면 며칠 못 버텨요"',
        desc: 'Burn Rate: 예산 소진 속도. 14.4x = 1시간에 월 예산 2% 소진 → 2시간이면 다 씀 → 즉시 페이저. 잔액보다 소진 속도가 빠른 신호다. 지금 burn rate 18x로 임계(14.4x) 초과 → 잔액이 31.2분에서 빠르게 줄어들고 있다. 알람 라인 발화.',
        title2: 'Burn Rate 18x — 임계 초과, 알람 발화',
        legend: 'Multi-window (5분 + 1시간) 동시 조건으로 false positive 방지',
        sliPct: 98.5,
        sloPct: 99.9,
        budgetUsedMin: 38,       // 잔액 5.2분만 남음 (빠르게 소진)
        budgetActive: true,
        burnRate: 18.0,
        alarm: true,
        code: {
          lang: 'yaml',
          filename: 'slo_burn_rate.alert.yml — Multi-window alert',
          lines: [
            '# Multi-window burn rate alert (Google SRE Workbook 권장)',
            '# 파일: alerts/slo_burn_rate.yml',
            'groups:',
            '  - name: slo_burn_rate',
            '    rules:',
            '      # FAST burn — 1시간에 2% 예산 소진 (= 14.4x)',
            '      # 5분 + 1시간 동시 조건 → false positive 방지',
            '      - alert: ErrorBudgetBurnFast',
            '        expr: |',
            '          (',
            '            (1 - sli:http_requests:success_ratio_5m) > (14.4 * 0.001)',
            '            and',
            '            (1 - sli:http_requests:success_ratio_1h) > (14.4 * 0.001)',
            '          )',
            '        for: 2m',
            '        labels:',
            '          severity: page         # 즉시 페이저 (밤에도 깨움)',
            '        annotations:',
            '          summary: "예산 소진 속도 14.4x — 2시간이면 월 예산 소진"',
            '',
            '      # SLOW burn — 6시간에 5% 예산 소진 (= 6x)',
            '      - alert: ErrorBudgetBurnSlow',
            '        expr: |',
            '          (',
            '            (1 - sli:http_requests:success_ratio_30m) > (6 * 0.001)',
            '            and',
            '            (1 - sli:http_requests:success_ratio_6h) > (6 * 0.001)',
            '          )',
            '        for: 15m',
            '        labels:',
            '          severity: ticket       # 업무 시간 처리 OK',
            '        annotations:',
            '          summary: "예산 소진 속도 6x — 5일이면 월 예산 소진"',
            '',
            '# Burn Rate 임계 (Google SRE)',
            '#   14.4x → 1시간만에 2% 소진 → page (즉시)',
            '#   6x   → 6시간만에 5% 소진 → ticket',
            '#   1x   → 정상 속도 (월 예산 = 월 사용)',
          ],
          highlight: [8, 11, 13, 17],
        },
      },
    ];

    // ── 좌측: SLO 게이지 + Error Budget 잔액 그래프
    function LiveDataPane({ step, stepIdx }) {
      const { sliPct, sloPct, budgetUsedMin, budgetActive, burnRate, alarm } = step;

      // 게이지: 99.0 ~ 100.0 범위로 매핑
      const GAUGE_MIN = 99.0;
      const GAUGE_MAX = 100.0;
      const sliPos = ((sliPct - GAUGE_MIN) / (GAUGE_MAX - GAUGE_MIN)) * 100;
      const sloPos = ((sloPct - GAUGE_MIN) / (GAUGE_MAX - GAUGE_MIN)) * 100;
      const sliAboveSlo = sliPct >= sloPct;

      // Budget 잔액
      const remainingMin = Math.max(0, BUDGET_TOTAL_MIN - budgetUsedMin);
      const usedPct = Math.min(100, (budgetUsedMin / BUDGET_TOTAL_MIN) * 100);
      const remainingPct = 100 - usedPct;

      // 잔액 색상 — 50%+ 초록, 25~50% 주황, 25%- 빨강
      const remColor =
        remainingPct >= 50 ? 'bg-emerald-500' :
        remainingPct >= 25 ? 'bg-amber-500' :
        'bg-red-500';
      const remTextColor =
        remainingPct >= 50 ? 'text-emerald-700' :
        remainingPct >= 25 ? 'text-amber-700' :
        'text-red-700';

      return (
        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          <div className="bg-slate-50 px-4 py-2 flex items-center justify-between border-b border-slate-200">
            <div className="flex items-center gap-2">
              <span className="text-base">💳</span>
              <span className="text-xs font-bold text-slate-700">SLO 게이지 + Error Budget 잔액</span>
            </div>
            <span className="text-[10px] text-slate-500 font-mono">window=30d · slo=99.9%</span>
          </div>

          {/* ① SLO 게이지 — SLI 현재값 + SLO 목표 라인 */}
          <div className="px-4 pt-4 pb-3 border-b border-slate-100">
            <div className="flex items-center justify-between mb-2">
              <span className="text-[11px] font-bold text-slate-700">① SLO 게이지</span>
              <span className={`text-[11px] font-mono font-bold ${sliAboveSlo ? 'text-emerald-700' : 'text-red-700'}`}>
                SLI {sliPct.toFixed(2)}%
                {' '}{sliAboveSlo ? '≥' : '<'} SLO 99.9%
              </span>
            </div>

            <div className="relative h-9 bg-gradient-to-r from-red-100 via-amber-100 to-emerald-100 rounded-lg border border-slate-200">
              {/* SLO 목표 라인 */}
              <div
                className="absolute top-0 bottom-0 w-0.5 bg-red-600 transition-all duration-700"
                style={{ left: `${sloPos}%` }}
              >
                <div className="absolute -top-4 left-1/2 -translate-x-1/2 text-[9px] font-bold text-red-600 whitespace-nowrap">
                  SLO 99.9%
                </div>
              </div>
              {/* SLI 현재 위치 마커 */}
              <div
                className="absolute top-1 bottom-1 w-1.5 rounded-full bg-slate-800 shadow-md transition-all duration-700"
                style={{ left: `calc(${sliPos}% - 3px)` }}
              />
              <div
                className="absolute -bottom-5 -translate-x-1/2 text-[10px] font-mono font-bold text-slate-700 transition-all duration-700"
                style={{ left: `${sliPos}%` }}
              >
                ▲ SLI
              </div>
            </div>
            <div className="flex justify-between text-[9px] text-slate-400 mt-6 font-mono">
              <span>99.0%</span>
              <span>99.5%</span>
              <span>99.9%</span>
              <span>100%</span>
            </div>
          </div>

          {/* ② Error Budget 잔액 그래프 — 신용카드 한도 */}
          <div className="px-4 pt-3 pb-3 border-b border-slate-100">
            <div className="flex items-center justify-between mb-2">
              <span className="text-[11px] font-bold text-slate-700">② Error Budget 잔액 (30일)</span>
              <span className={`text-[11px] font-mono font-bold ${budgetActive ? remTextColor : 'text-slate-400'}`}>
                {budgetActive ? `잔액 ${remainingMin.toFixed(1)}분 / 43.2분` : '— (측정 전)'}
              </span>
            </div>

            {/* 카드 한도 막대 */}
            <div className="relative h-7 bg-slate-100 rounded-lg overflow-hidden border border-slate-200">
              {/* 사용량 (왼쪽부터) */}
              <div
                className={`absolute left-0 top-0 bottom-0 ${budgetActive ? 'bg-slate-300' : 'bg-slate-100'} transition-all duration-700`}
                style={{ width: `${budgetActive ? usedPct : 0}%` }}
              >
                {budgetActive && usedPct > 12 && (
                  <span className="absolute inset-0 flex items-center justify-center text-[10px] font-mono font-bold text-slate-700">
                    사용 {budgetUsedMin.toFixed(1)}분
                  </span>
                )}
              </div>
              {/* 잔액 (오른쪽 — 색상 강조) */}
              <div
                className={`absolute right-0 top-0 bottom-0 ${budgetActive ? remColor : 'bg-slate-100'} transition-all duration-700`}
                style={{ width: `${budgetActive ? remainingPct : 100}%` }}
              >
                {budgetActive && remainingPct > 15 && (
                  <span className="absolute inset-0 flex items-center justify-center text-[10px] font-mono font-bold text-white">
                    잔액 {remainingMin.toFixed(1)}분 ({remainingPct.toFixed(0)}%)
                  </span>
                )}
              </div>
            </div>
            <div className="flex justify-between text-[9px] text-slate-500 mt-1 font-mono">
              <span>0분</span>
              <span>21.6분 (50%)</span>
              <span>43.2분</span>
            </div>
          </div>

          {/* ③ Burn Rate + 알람 라인 */}
          <div className="px-4 pt-3 pb-4">
            <div className="flex items-center justify-between mb-2">
              <span className="text-[11px] font-bold text-slate-700">③ Burn Rate (소진 속도)</span>
              <span className={`text-[11px] font-mono font-bold ${burnRate >= 14.4 ? 'text-red-700' : burnRate >= 6 ? 'text-amber-700' : 'text-emerald-700'}`}>
                {burnRate.toFixed(1)}x {burnRate >= 14.4 ? '⚠ 임계 초과' : burnRate >= 6 ? '주의' : '정상'}
              </span>
            </div>

            {/* burn rate 막대 + 임계 라인 */}
            <div className="relative h-6 bg-slate-100 rounded border border-slate-200">
              {/* 6x 임계 라인 (slow burn) */}
              <div className="absolute top-0 bottom-0 w-px bg-amber-500" style={{ left: '30%' }}>
                <div className="absolute -top-3.5 -translate-x-1/2 text-[8px] font-bold text-amber-600 whitespace-nowrap">6x</div>
              </div>
              {/* 14.4x 임계 라인 (fast burn) */}
              <div className="absolute top-0 bottom-0 w-px bg-red-600" style={{ left: '72%' }}>
                <div className="absolute -top-3.5 -translate-x-1/2 text-[8px] font-bold text-red-600 whitespace-nowrap">14.4x ⚡</div>
              </div>
              {/* 현재 burn rate 막대 */}
              <div
                className={`absolute left-0 top-0 bottom-0 rounded-l transition-all duration-700 ${burnRate >= 14.4 ? 'bg-red-500' : burnRate >= 6 ? 'bg-amber-500' : 'bg-emerald-500'}`}
                style={{ width: `${Math.min(100, (burnRate / 20) * 100)}%` }}
              />
            </div>
            <div className="flex justify-between text-[9px] text-slate-400 mt-1 font-mono">
              <span>0x</span>
              <span>1x (정상)</span>
              <span>20x</span>
            </div>

            {/* 알람 발화 표시 */}
            {alarm && (
              <div className="mt-3 px-3 py-2 rounded-lg bg-red-100 border-2 border-red-400 flex items-center gap-2 alarm-flash">
                <span className="text-base">🚨</span>
                <div>
                  <div className="text-[11px] font-bold text-red-800">ErrorBudgetBurnFast — page</div>
                  <div className="text-[10px] text-red-700">예산 소진 속도 18x — 약 1.7시간이면 월 예산 소진</div>
                </div>
              </div>
            )}
          </div>

          {/* 범례/제목 */}
          <div className="px-4 pb-3 pt-2 border-t border-slate-100 bg-slate-50">
            <div className="text-[11px] text-slate-600 font-bold mb-1">{step.title2}</div>
            <div className="text-[10px] text-slate-500 leading-snug">{step.legend}</div>
          </div>
        </div>
      );
    }

    // ── 우측: VSCode 스타일 코드 뷰어
    function CodeViewer({ code, stepIdx }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [stepIdx]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 px-2 py-0.5 rounded bg-slate-700/40 font-mono">{code.lang}</span>
          </div>
          <div className="overflow-auto max-h-[32rem] text-xs">
            <pre className="p-0 m-0">
              <code ref={codeRef} className={`language-${code.lang} block !bg-transparent !p-0`}>
{code.lines.map((line, i) => {
  const highlighted = code.highlight && code.highlight.includes(i + 1);
  return (
    <div key={i} className={`flex ${highlighted ? 'bg-yellow-500/10' : ''}`}>
      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-10 shrink-0">{i + 1}</span>
      <span className="pl-3 pr-3 whitespace-pre">{line || ' '}</span>
    </div>
  );
})}
              </code>
            </pre>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);

      const handleNext = () => setStepIdx((i) => (i < STEPS.length - 1 ? i + 1 : i));
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setIsPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[stepIdx];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <style>{`
            @keyframes alarmFlash {
              0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.5); }
              50%      { box-shadow: 0 0 0 6px rgba(220, 38, 38, 0); }
            }
            .alarm-flash {
              animation: alarmFlash 1.2s ease-out infinite;
            }
          `}</style>

          <div className="max-w-6xl mx-auto space-y-5">

            {/* 헤더 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-red-600 hover:text-red-800 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-red-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. Observability 개론 &gt; Chapter 2. 신뢰성 모델</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">SLO / SLI / Error Budget</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                신용카드 한도 — <strong>신뢰성을 숫자로 약속하고 예산처럼 관리</strong>한다.
                <code className="bg-slate-100 px-1 rounded text-xs">SLI</code>는 사용 내역,
                <code className="bg-slate-100 px-1 rounded text-xs">SLO</code>는 한도 목표,
                <code className="bg-slate-100 px-1 rounded text-xs">Error Budget</code>은 남은 한도,
                <code className="bg-slate-100 px-1 rounded text-xs">Burn Rate</code>는 소진 속도다.
              </p>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer code={step.code} stepIdx={stepIdx} />
            </div>

            {/* 설명 */}
            <div className="p-4 rounded-xl bg-red-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-red-200">Step {stepIdx + 1} / {STEPS.length} — {step.title}</h3>
                <span className="text-xs text-red-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 마지막 단계: Part II 안내 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="p-3 rounded-xl bg-red-50 border-2 border-red-300 text-red-900 text-sm">
                💡 Part I 완성. 다음(Part II)에서는 메트릭 — Prometheus
              </div>
            )}

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setStepIdx(0); setIsPlaying(false); }} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                처음
              </button>
              <button onClick={handlePrev} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                &larr; 이전
              </button>
              <button onClick={togglePlay}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-red-600 text-white hover:bg-red-700 transition min-w-[96px]">
                {isPlaying ? '⏸ 일시정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-2-1.html" className="text-slate-500 hover:text-slate-700">&larr; I-2-1</a>
              <a href="../part2/II-1-1.html" className="text-red-600 hover:text-red-800 font-medium">II-1-1 Prometheus &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
