<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observability 학습 — SLO / SLI / Error Budget</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    I-2-2. SLO / SLI / Error Budget
    학습 목표: 신뢰성 목표를 숫자로 약속하고 예산처럼 관리하는 법
    핵심 비유: "신용카드 한도" — SLI=실제 사용량, SLO=한도 목표, Error Budget=남은 한도
    구조: 4단계 (SLI / SLO / Error Budget / Burn Rate)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. SLI — "이번 달 카드 사용 내역"',
        desc: 'Service Level Indicator: 측정 가능한 신뢰성 지표. "5분 윈도우 내 2xx 응답 비율 = 99.92%"처럼 명확한 숫자여야 한다. 무엇을 SLI로 정할지 결정이 절반의 일 — 사용자 관점(가용성/지연/오류율)으로 잡아야 한다.',
        block: {
          kind: 'yaml',
          code: `# Prometheus recording rule — SLI 정의
# 5분 윈도우 내 성공 요청 비율 (가용성 SLI)
groups:
  - name: sli_availability
    interval: 30s
    rules:
      - record: sli:http_requests:success_ratio_5m
        expr: |
          sum(rate(http_requests_total{status=~"2..|3.."}[5m]))
          /
          sum(rate(http_requests_total[5m]))

      # 지연 SLI — p99 < 300ms 비율
      - record: sli:http_requests:latency_ratio_5m
        expr: |
          sum(rate(http_request_duration_seconds_bucket{le="0.3"}[5m]))
          /
          sum(rate(http_request_duration_seconds_count[5m]))

# SLI 선정 가이드 (Google SRE Workbook)
# 1. 사용자 관점에서 의미 있는 숫자인가?
#    OK: "주문 API 성공률"   NO: "CPU 사용률"
# 2. 측정 가능한가? (이미 있는 메트릭으로 산출 가능)
# 3. 0~1 범위 비율로 표현 가능한가?
#
# 흔한 SLI 4종 — 사용자가 직접 체감하는 것
# - 가용성: 성공 응답 / 전체 응답
# - 지연:   임계 ms 이하 응답 비율
# - 오류율: 5xx / 전체
# - 처리량: 처리한 요청 / 받은 요청`,
        },
        focus: 'sli',
      },
      {
        title: 'Step 2. SLO — "월 한도 100만원, 99.9% 약속"',
        desc: 'Service Level Objective: SLI의 목표치. "99.9% (three nines)"는 한 달 30일 중 43.2분만 down 허용. 9 하나 늘릴 때마다 비용 10배. 100% SLO는 불가능 — "사용자가 차이를 느끼지 못하는 최소 신뢰도"를 골라야 한다.',
        block: {
          kind: 'shell',
          code: `# SLO 9 갯수별 허용 down time (월 30일 기준)
SLO        가용성       월간 허용 down       하루 허용 down
─────────────────────────────────────────────────────────────
99%        two nines     7시간 12분          14분 24초
99.5%      ─             3시간 36분           7분 12초
99.9%      three nines   43분 12초            1분 26초   ← 일반 SaaS
99.95%     ─             21분 36초              43초
99.99%     four nines     4분 19초            8.6초     ← 결제/금융
99.999%    five nines       25.9초            0.86초    ← 통신/항공

# SLO 결정 프레임 (Google SRE)
1. 현재 SLI 측정 (지난 4주 평균 = baseline)
2. 사용자가 불만 시작하는 지점 찾기
3. 그 사이 어딘가로 SLO 설정
4. 분기마다 재검토 (너무 쉬우면 올리고, 못 지키면 낮춤)

# 안티패턴
# ❌ 100% SLO       → 불가능. 새 기능 배포도 못 함
# ❌ 측정도 없이 99.99% 약속  → 영업이 정한 거짓말
# ❌ 1년에 1번만 평가  → 너무 늦음 (월/주 단위)

# 핵심 — "9 하나 늘릴 때마다 인프라 비용 10배"
# 99.9 → 99.99 가려면 multi-region, 자동 failover, 배포 정책 모두 강화`,
        },
        focus: 'slo',
      },
      {
        title: 'Step 3. Error Budget — "쓸 수 있는 실패 시간"',
        desc: 'Error Budget = 100% - SLO. 99.9% SLO면 한 달에 0.1% (43.2분) 실패해도 OK. 이 예산을 절반 이상 쓰면 새 기능 배포 freeze, 안정화에 집중. 예산은 "위험 감수 자산" — 다 쓰면 위험한 일을 할 수 없다.',
        block: {
          kind: 'python',
          code: `# Error Budget 계산 — 이번 달 얼마나 남았나
# 파일: sre/error_budget.py

from datetime import datetime, timedelta
from prometheus_api_client import PrometheusConnect

SLO_TARGET = 0.999  # 99.9%
WINDOW_DAYS = 30


def calculate_error_budget(prom: PrometheusConnect) -> dict:
    # 30일 윈도우 SLI 측정
    query = (
        'sum(rate(http_requests_total{status=~"2..|3.."}[30d]))'
        ' / '
        'sum(rate(http_requests_total[30d]))'
    )
    actual_sli = float(prom.custom_query(query)[0]["value"][1])

    # 예산 계산
    error_budget_total = 1 - SLO_TARGET            # 0.001 = 0.1%
    error_budget_used = max(0, SLO_TARGET - actual_sli)
    budget_remaining = error_budget_total - error_budget_used
    budget_used_pct = error_budget_used / error_budget_total

    # 시간으로 변환 (30일 = 43,200분)
    minutes_total = WINDOW_DAYS * 24 * 60 * (1 - SLO_TARGET)
    minutes_used = budget_used_pct * minutes_total

    return {
        "actual_sli": actual_sli,                  # 0.9992
        "budget_total_min": minutes_total,         # 43.2분
        "budget_used_min": minutes_used,           # 21.6분
        "budget_remaining_pct": 1 - budget_used_pct,  # 0.5
    }


# 정책 — "예산 = 의사결정 도구"
# - 50%+ 남음   → 새 기능 배포 OK, A/B 실험 OK
# - 25%~50%    → 위험한 변경 금지, 카나리 강화
# - 0%~25%     → 신규 배포 freeze, 안정화 sprint
# - 초과       → postmortem, SLO 재협상 or 인프라 보강

# 핵심 — 예산을 "쓰는 것"이 정상. 안 쓰면 SLO가 너무 약하다는 뜻`,
        },
        focus: 'budget',
      },
      {
        title: 'Step 4. Burn Rate — "이 속도로 쓰면 며칠 못 버텨요"',
        desc: 'Burn Rate: 예산 소진 속도. 1시간 동안 14.4배 빠르게 쓰면 30일치 예산을 2시간에 다 씀 → 즉시 페이저. Google SRE는 multi-window (5분 + 1시간) 동시 조건으로 false positive 방지. "남은 예산"보다 "소진 속도"가 빠른 신호다.',
        block: {
          kind: 'yaml',
          code: `# Multi-window burn rate alert (Google SRE Workbook 권장)
# 파일: alerts/slo_burn_rate.yml
groups:
  - name: slo_burn_rate
    rules:
      # FAST burn — 1시간에 2% 예산 소진 (= 14.4x)
      # 5분 + 1시간 동시 조건 → false positive 방지
      - alert: ErrorBudgetBurnFast
        expr: |
          (
            (1 - sli:http_requests:success_ratio_5m) > (14.4 * 0.001)
            and
            (1 - sli:http_requests:success_ratio_1h) > (14.4 * 0.001)
          )
        for: 2m
        labels:
          severity: page         # 즉시 페이저 (밤에도 깨움)
        annotations:
          summary: "예산 소진 속도 14.4x — 2시간이면 월 예산 소진"

      # SLOW burn — 6시간에 5% 예산 소진 (= 6x)
      - alert: ErrorBudgetBurnSlow
        expr: |
          (
            (1 - sli:http_requests:success_ratio_30m) > (6 * 0.001)
            and
            (1 - sli:http_requests:success_ratio_6h) > (6 * 0.001)
          )
        for: 15m
        labels:
          severity: ticket       # 업무 시간 처리 OK
        annotations:
          summary: "예산 소진 속도 6x — 5일이면 월 예산 소진"

# Burn Rate 임계 (Google SRE)
# 14.4x → 1시간만에 2% 소진 → page (즉시)
# 6x   → 6시간만에 5% 소진 → ticket
# 1x   → 정상 속도 (월 예산 = 월 사용)
#
# 핵심 — "이미 다 썼다"보다 "다 쓸 속도"를 알려주는 게 빠른 대응

# 다음(Part II)에서는 메트릭 — Prometheus / PromQL / Grafana / Alertmanager`,
        },
        focus: 'burn',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const BUDGET = [
      { key: 'sli',    emoji: '📐', name: 'SLI',          note: '실제 99.92%' },
      { key: 'slo',    emoji: '🎯', name: 'SLO',          note: '목표 99.9%' },
      { key: 'budget', emoji: '💳', name: 'Error Budget', note: '월 43.2분' },
      { key: 'burn',   emoji: '🔥', name: 'Burn Rate',    note: '소진 속도' },
    ];

    function BudgetCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">💳 신용카드 한도 (SLI/SLO/Error Budget)</div>
          <div className="grid grid-cols-4 gap-2">
            {BUDGET.map((t) => {
              const isActive = focus === t.key;
              return (
                <div
                  key={t.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-red-100 border-2 border-red-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{t.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{t.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{t.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">SLO / SLI / Error Budget</h1>
                <p className="text-sm text-slate-500 mt-1">신용카드 한도 — SLI / SLO / Error Budget / Burn Rate</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <BudgetCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'burn' && (
              <div className="bg-red-50 border-2 border-red-300 rounded-xl p-3 mb-6 text-xs text-red-900">
                💡 Part I 완성. 다음(Part II)에서는 메트릭 — Prometheus / PromQL / Grafana / Alertmanager
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
