<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observability 학습 — SRE 4 Golden Signals</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    I-2-1. SRE 4 Golden Signals
    학습 목표: Latency / Traffic / Errors / Saturation 4가지 핵심 지표 이해
    핵심 비유: "자동차 계기판" — 속도계/주행거리/경고등/연료·RPM
    구조: 4단계 (Latency / Traffic / Errors / Saturation)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Latency — "속도계 (응답 시간)"',
        desc: '요청이 들어와서 응답까지 걸리는 시간. 평균은 거짓말 — p50(중앙값)/p99(상위 1%)로 봐야 한다. p99 latency가 사용자 체감의 핵심 — 100명 중 1명이 3초를 기다리면 그 1명이 이탈한다. 성공 요청과 실패 요청을 분리해서 측정.',
        block: {
          kind: 'yaml',
          code: `# Prometheus query — latency 측정
# p99 latency (상위 1% 응답 시간)
histogram_quantile(0.99,
  sum by (le) (rate(http_request_duration_seconds_bucket[5m]))
)

# p50 (중앙값) vs p99 비교
histogram_quantile(0.50, sum by (le) (rate(http_request_duration_seconds_bucket[5m])))
histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket[5m])))

# 성공 요청만 (5xx 제외)
histogram_quantile(0.99,
  sum by (le) (rate(http_request_duration_seconds_bucket{status!~"5.."}[5m]))
)

# 측정 결과 예시
# p50 = 80ms   (절반 사용자는 80ms 이내)
# p99 = 1200ms (100명 중 1명은 1.2초 기다림)
# 평균 = 150ms (p99 가려져서 안 보임 — 평균만 보면 안 됨)`,
        },
        focus: 'latency',
      },
      {
        title: 'Step 2. Traffic — "주행거리 (얼마나 달리고 있나)"',
        desc: '시스템이 받고 있는 부하의 양. 웹 서비스는 QPS/RPS(초당 요청), 메시징 시스템은 메시지/초, DB는 트랜잭션/초. 비즈니스 부하를 그대로 반영하는 지표 — 평소 대비 급증/급감 모두 신호. 시간대/요일별 패턴을 baseline으로 잡는다.',
        block: {
          kind: 'yaml',
          code: `# Prometheus query — traffic (QPS) 측정
# 전체 RPS (초당 요청 수)
rate(http_requests_total[5m])

# 엔드포인트별 RPS
sum by (path) (rate(http_requests_total[5m]))

# 평소 vs 지금 비교 (1주 전 같은 시간대)
rate(http_requests_total[5m])
  /
rate(http_requests_total[5m] offset 1w)

# 측정 결과 예시
# 평일 오후 2시 평균: 850 RPS
# 지금 (마케팅 이벤트): 4200 RPS (5배 급증)
#   → Saturation 함께 확인 필요
# 새벽 3시 평소: 50 RPS
# 지금: 0 RPS (급감)
#   → 장애? Health check도 안 들어옴? 의심!

# 비즈니스 KPI 연결
# QPS 감소 = 사용자 이탈 = 매출 손실 직결`,
        },
        focus: 'traffic',
      },
      {
        title: 'Step 3. Errors — "경고등 (실패 비율)"',
        desc: '실패한 요청의 비율. HTTP 5xx(서버 오류) / 4xx(클라이언트 오류 — 중요한 일부만) / 의미적 실패(200이지만 빈 응답). 절대값보다 비율이 중요 — 트래픽 늘면 에러 수도 늘어남. 임계 1% 등 SLO 기준으로 알람.',
        block: {
          kind: 'python',
          code: `# FastAPI middleware — status code 수집
from fastapi import FastAPI, Request
from prometheus_client import Counter
import time

app = FastAPI()

http_requests_total = Counter(
    "http_requests_total",
    "Total HTTP requests",
    ["method", "path", "status"],
)

@app.middleware("http")
async def metrics_middleware(request: Request, call_next):
    response = await call_next(request)
    http_requests_total.labels(
        method=request.method,
        path=request.url.path,
        status=str(response.status_code),
    ).inc()
    return response

# Prometheus 에러율 query
# - 5xx 비율 = 서버 에러 / 전체
# - rate(http_requests_total{status=~"5.."}[5m])
# -   / rate(http_requests_total[5m])
# - 임계: > 0.01 (1%) 5분간 지속이면 알람

# 운영 화면 출력 예시
# total RPS: 850
# 5xx     : 12.7/s (1.5%)  ← 임계 초과! 알람 발송
# 4xx     : 8.2/s  (1.0%)  (인증 실패가 대부분 — 정상)`,
        },
        focus: 'errors',
      },
      {
        title: 'Step 4. Saturation — "연료·RPM (자원 한계)"',
        desc: '시스템이 자원 한계에 얼마나 가까운가. CPU/메모리/디스크 I/O/네트워크 사용률. 80% 이상이면 capacity 위험 — 트래픽 조금만 늘어도 latency 급증. 큐 길이, GC 시간, 디스크 wait도 saturation 신호. "지금은 멀쩡하지만 곧 터진다"를 미리 알려줌.',
        block: {
          kind: 'shell',
          code: `# kubectl로 pod 자원 사용률 확인
$ kubectl top pod -n production
NAME                       CPU(cores)   MEMORY(bytes)
api-server-7d9f-abcde      820m         1850Mi
api-server-7d9f-fghij      910m         1920Mi   # CPU 91% — 위험!
worker-5c8d-klmno          340m         512Mi

# 노드 단위 확인
$ kubectl top node
NAME            CPU%   MEMORY%
node-1          78%    82%      # 메모리 82% — 곧 OOM 위험
node-2          45%    51%

# htop으로 호스트 자세히 (load avg, I/O wait)
$ htop
Load avg: 8.2, 7.5, 6.8   # CPU 코어 수보다 크면 대기 발생
%CPU 91  %MEM 82  IO-wait 15%   # IO-wait 높으면 디스크 병목

# 큐 길이 — saturation의 또 다른 형태
$ redis-cli LLEN job_queue
1247                     # 평소 50 → 1247: worker 처리 못 따라감

# 임계 권장값
# - CPU: > 80% 5분 지속
# - 메모리: > 85%
# - 디스크 I/O wait: > 10%
# - 큐 길이: baseline의 5배`,
        },
        focus: 'saturation',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'PromQL', textColor: '#fde68a' },
    };

    const SIGNALS = [
      { key: 'latency',    emoji: '🚀', name: 'Latency',    note: '속도계 (응답 시간)' },
      { key: 'traffic',    emoji: '🚦', name: 'Traffic',    note: '주행거리 (QPS/RPS)' },
      { key: 'errors',     emoji: '🚨', name: 'Errors',     note: '경고등 (5xx 비율)' },
      { key: 'saturation', emoji: '🔋', name: 'Saturation', note: '연료·RPM (자원 한계)' },
    ];

    function SignalCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🚗 자동차 계기판 (4 Golden Signals)</div>
          <div className="grid grid-cols-4 gap-2">
            {SIGNALS.map((s) => {
              const isActive = focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-red-100 border-2 border-red-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{s.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{s.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{s.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">SRE 4 Golden Signals</h1>
                <p className="text-sm text-slate-500 mt-1">자동차 계기판 — Latency / Traffic / Errors / Saturation</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <SignalCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'saturation' && (
              <div className="bg-red-50 border-2 border-red-300 rounded-xl p-3 mb-6 text-xs text-red-900">
                💡 다음(I-2-2)에서는 SLO/SLI/Error Budget — 신용카드 한도 비유
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
