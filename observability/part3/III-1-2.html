          { situation: '보안/감사/SIEM, 컴플라이언스', answer: 'ELK',  side: 'elk' },
          { situation: 'Kibana 대시보드, 풀텍스트 분석', answer: 'ELK',  side: 'elk' },
          { situation: 'trace_id 따라가는 운영 디버깅', answer: 'Loki', side: 'loki' },
          { situation: 'Prometheus + Grafana 사용 중', answer: 'Loki', side: 'loki' },
          { situation: '로그량 폭발, 비용 압박',         answer: 'Loki', side: 'loki' },
          { situation: '보안 + 운영 둘 다 필요',         answer: '병행', side: 'both' },
        ];
        const sideStyle = {
          elk:  'bg-red-50 border-red-200 text-red-700',
          loki: 'bg-emerald-50 border-emerald-200 text-emerald-700',
          both: 'bg-violet-50 border-violet-200 text-violet-700',
        };
        return (
          <div className="p-4 space-y-3" key={animKey}>
            <div className="text-[11px] font-bold text-slate-700">의사결정 매트릭스</div>
            <div className="space-y-1.5">
              {rows.map((r, i) => (
                <div key={i} className="flex items-center gap-2 fade-in" style={{ animationDelay: `${i * 90}ms` }}>
                  <div className="flex-1 text-[11px] text-slate-700 font-mono px-2 py-1.5 rounded bg-slate-50 border border-slate-200 truncate">
                    {r.situation}
                  </div>
                  <span className="text-slate-400 text-xs">→</span>
                  <div className={`text-[11px] font-bold px-3 py-1.5 rounded border ${sideStyle[r.side]} w-20 text-center`}>
                    {r.answer}
                  </div>
                </div>
              ))}
            </div>

            <div className="grid grid-cols-2 gap-2 pt-2 border-t border-slate-200">
              <div className="p-2 rounded-lg bg-red-50 border border-red-200">
                <div className="text-[10px] font-bold text-red-700">📚 ELK 진영</div>
                <div className="text-[10px] text-red-900 leading-snug mt-0.5">사용자 행동 분석 / 감사 / SIEM</div>
              </div>
              <div className="p-2 rounded-lg bg-emerald-50 border border-emerald-200">
                <div className="text-[10px] font-bold text-emerald-700">📓 Loki 진영</div>
                <div className="text-[10px] text-emerald-900 leading-snug mt-0.5">운영 디버깅 / SRE / Grafana 통합</div>
              </div>
            </div>
          </div>
        );
      };

      const render = {
        elk:    renderElk,
        loki:   renderLoki,
        cost:   renderCost,
        choose: renderChoose,
      }[step.focus];

      return (
        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          <div className="bg-slate-50 px-4 py-2 flex items-center justify-between border-b border-slate-200">
            <div className="flex items-center gap-2">
              <span className="text-base">{step.focus === 'elk' ? '📚' : step.focus === 'loki' ? '📓' : step.focus === 'cost' ? '💰' : '🎯'}</span>
              <span className="text-xs font-bold text-slate-700">{step.title2}</span>
            </div>
            <span className="text-[10px] text-slate-500 font-mono">step {stepIdx + 1}/{STEPS.length}</span>
          </div>

          <div className="min-h-[360px]">
            {render && render()}
          </div>

          <div className="px-4 pb-3 pt-2 border-t border-slate-100 bg-slate-50">
            <div className="text-[10px] text-slate-500 leading-snug">{step.legend}</div>
          </div>
        </div>
      );
    }

    // ── 우측: VSCode 스타일 코드 뷰어
    function CodeViewer({ code, stepIdx }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [stepIdx]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 px-2 py-0.5 rounded bg-slate-700/40 font-mono">{code.lang}</span>
          </div>
          <div className="overflow-auto max-h-[28rem] text-xs">
            <pre className="p-0 m-0">
              <code ref={codeRef} className={`language-${code.lang} block !bg-transparent !p-0`}>
{code.lines.map((line, i) => {
  const highlighted = code.highlight && code.highlight.includes(i + 1);
  return (
    <div key={i} className={`flex ${highlighted ? 'bg-yellow-500/10' : ''}`}>
      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-10 shrink-0">{i + 1}</span>
      <span className="pl-3 pr-3 whitespace-pre">{line || ' '}</span>
    </div>
  );
})}
              </code>
            </pre>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);

      const handleNext = () => setStepIdx((i) => (i < STEPS.length - 1 ? i + 1 : i));
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setIsPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[stepIdx];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <style>{`
            @keyframes fadeIn {
              from { opacity: 0; transform: translateY(4px); }
              to   { opacity: 1; transform: translateY(0); }
            }
            .fade-in {
              opacity: 0;
              animation: fadeIn 360ms ease-out forwards;
            }
            @keyframes growBar {
              from { width: 0; }
              to   { width: var(--target-width); }
            }
            .grow-bar {
              width: 0;
              animation: growBar 700ms cubic-bezier(.2,.7,.3,1) forwards;
            }
          `}</style>

          <div className="max-w-6xl mx-auto space-y-5">

            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-red-600 hover:text-red-800 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-2</span>
            </nav>

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-red-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Observability &gt; Chapter 1. Logs</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">ELK vs Loki 비교</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                도서관 vs 공책 — <strong>전수 색인의 강력함</strong> vs <strong>라벨 색인의 가벼움</strong>.
                같은 1TB 로그가 ELK는 <code className="bg-slate-100 px-1 rounded text-xs">~3TB</code>, Loki는 <code className="bg-slate-100 px-1 rounded text-xs">~0.3TB</code>.
                무엇을 우선할 것인가.
              </p>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer code={step.code} stepIdx={stepIdx} />
            </div>

            <div className="p-4 rounded-xl bg-red-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-red-200">Step {stepIdx + 1} / {STEPS.length} — {step.title}</h3>
                <span className="text-xs text-red-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {stepIdx === STEPS.length - 1 && (
              <div className="p-3 rounded-xl bg-red-50 border-2 border-red-300 text-red-900 text-sm">
                💡 다음(III-2-1)에서는 <strong>로그 수집 파이프라인 — Fluent Bit / Vector</strong>
              </div>
            )}

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setStepIdx(0); setIsPlaying(false); }} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                처음
              </button>
              <button onClick={handlePrev} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                &larr; 이전
              </button>
              <button onClick={togglePlay}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-red-600 text-white hover:bg-red-700 transition min-w-[96px]">
                {isPlaying ? '⏸ 일시정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                다음 &rarr;
              </button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; III-1-1</a>
              <a href="../part3/III-2-1.html" className="text-red-600 hover:text-red-800 font-medium">III-2-1 로그 수집 파이프라인 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
