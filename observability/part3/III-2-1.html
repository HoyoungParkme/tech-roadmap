<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observability 학습 — 로그 수집 파이프라인 (Fluent Bit / Vector / Promtail)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📔</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    III-2-1. 로그 수집 파이프라인 (Fluent Bit / Vector / Promtail)
    학습 목표: 흩어진 로그를 모으는 파이프라인의 4단계(source/parser/filter/sink)를 이해한다.
    핵심 비유: "택배 집하장" — 흩어진 로그를 한 곳에 모아 분류·라벨링 후 적절한 백엔드로 전송
    구조: 4단계 (source / parser / filter / sink)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Source — "어디서 로그를 줍나?" (컨테이너 / 파일 / journald)',
        desc: '로그 출처는 다양하다. 컨테이너 stdout/stderr, 일반 파일 tail, systemd journald, syslog, 네트워크 수신까지. K8s에서는 노드별 DaemonSet으로 띄워서 각 노드의 /var/log/containers/*.log 를 한꺼번에 읽는다. 집하장에 트럭이 들어오는 입구다.',
        block: {
          kind: 'yaml',
          code: `# fluent-bit-daemonset.yaml — K8s 노드별 1개씩 띄움
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: logging
spec:
  selector:
    matchLabels: { app: fluent-bit }
  template:
    metadata:
      labels: { app: fluent-bit }
    spec:
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:3.0
          volumeMounts:
            - { name: varlog,  mountPath: /var/log }
            - { name: dockerc, mountPath: /var/lib/docker/containers, readOnly: true }
      volumes:
        - { name: varlog,  hostPath: { path: /var/log } }
        - { name: dockerc, hostPath: { path: /var/lib/docker/containers } }
---
# fluent-bit.conf — 입력(source) 정의
[INPUT]
    Name              tail
    Path              /var/log/containers/*.log
    Parser            docker            # 컨테이너 stdout JSON 파싱
    Tag               kube.*
    Refresh_Interval  5
    DB                /var/log/flb.db   # 어디까지 읽었는지 체크포인트
[INPUT]
    Name              systemd
    Tag               host.*
    Systemd_Filter    _SYSTEMD_UNIT=kubelet.service`,
        },
        focus: 'source',
      },
      {
        title: 'Step 2. Parser — "송장 스티커 읽기" (JSON / regex 추출)',
        desc: '로그 한 줄을 의미 있는 필드로 쪼갠다. JSON 로그는 자동 파싱, nginx access log 같은 텍스트는 regex로 method/status/path 분리. 파싱 실패한 라인은 dead letter queue로 보내 나중에 분석. 송장 스티커를 읽어 어디로 갈지 분류표를 만드는 단계.',
        block: {
          kind: 'yaml',
          code: `# parsers.conf — Fluent Bit parser 정의
[PARSER]
    Name        docker
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z

[PARSER]
    Name        nginx
    Format      regex
    Regex       ^(?<remote>[^ ]*) - (?<user>[^ ]*) \\[(?<time>[^\\]]*)\\] "(?<method>\\S+)(?: +(?<path>[^\\"]*?)(?: +\\S*)?)?" (?<status>[^ ]*) (?<size>[^ ]*)
    Time_Key    time
    Time_Format %d/%b/%Y:%H:%M:%S %z

# fluent-bit.conf — Parser 적용 + 실패 처리
[FILTER]
    Name         parser
    Match        kube.*nginx*
    Key_Name     log               # 원본 텍스트 필드
    Parser       nginx
    Reserve_Data On                # 파싱 실패해도 원본 보존
    Preserve_Key On

# 파싱 실패 라인 → dead letter (별도 sink로 라우팅)
[OUTPUT]
    Name   file
    Match  kube.*unparsed*
    Path   /var/log/dlq/
    Format plain
# → 운영자가 정규식 보강 후 재처리 가능`,
        },
        focus: 'parser',
      },
      {
        title: 'Step 3. Filter — "라벨 붙이고 민감정보 가린다" (enrich / mask / sample)',
        desc: 'namespace, pod_name, node 같은 K8s 메타데이터를 자동으로 라벨링하고, password/token 필드는 마스킹한다. 트래픽이 너무 많으면 sampling으로 1/10만 보내서 비용 절감. 집하장에서 박스에 지역 라벨 붙이고, 깨질 위험 표시 붙이는 단계.',
        block: {
          kind: 'yaml',
          code: `# Vector — transforms 단계 (TOML/YAML 둘 다 지원)
sources:
  app_logs:
    type: kubernetes_logs            # K8s 메타 자동 enrich

transforms:
  enrich:
    type: remap
    inputs: [app_logs]
    source: |
      # K8s 메타데이터 → 로그 라벨로 승격
      .namespace = .kubernetes.pod_namespace
      .app       = .kubernetes.pod_labels.app
      .env       = get_env_var!("CLUSTER_ENV")

  mask_secrets:
    type: remap
    inputs: [enrich]
    source: |
      # 민감 필드 마스킹 (정규식 치환)
      .message = replace(.message, r'("password"\\s*:\\s*)"[^"]*"', "$1\\"***\\"")
      .message = replace(.message, r'(Bearer\\s+)[A-Za-z0-9._-]+',  "$1***")

  sample_debug:
    type: sample
    inputs: [mask_secrets]
    rate: 10                          # DEBUG 레벨만 1/10
    key_field: level
    exclude:
      type: vrl
      source: '.level != "debug"'    # ERROR/WARN/INFO는 100% 통과

# → 라벨은 풍부하게, 본문은 안전하게, 양은 적당히`,
        },
        focus: 'filter',
      },
      {
        title: 'Step 4. Sink — "어디로 보낼까?" (Loki / ES / S3 / Kafka 동시 다중)',
        desc: '하나의 로그를 여러 곳으로 동시에 보낸다. Loki(라벨 기반 저렴), Elasticsearch(전문 검색), S3(장기 보관 — 컴플라이언스), Kafka(다른 시스템 fan-out). 출구가 여러 개인 집하장. 백엔드 하나 죽어도 나머지는 흘러가도록 sink별로 buffer 둔다.',
        block: {
          kind: 'yaml',
          code: `# Vector — 같은 이벤트를 4개 sink로 동시 송출
sinks:
  loki:                          # 라벨 기반, 저렴, Grafana 연계
    type: loki
    inputs: [sample_debug]
    endpoint: http://loki:3100
    labels:
      namespace: "{{ namespace }}"
      app:       "{{ app }}"
      level:     "{{ level }}"
    encoding: { codec: json }

  elasticsearch:                 # 전문 검색, 복잡한 쿼리
    type: elasticsearch
    inputs: [sample_debug]
    endpoints: ["http://es:9200"]
    bulk: { index: "logs-%Y.%m.%d" }
    buffer: { type: disk, max_size: 1073741824 }   # 1GB 디스크 버퍼

  s3_archive:                    # 장기 보관 (90일+ 컴플라이언스)
    type: aws_s3
    inputs: [sample_debug]
    bucket: company-log-archive
    key_prefix: "year=%Y/month=%m/day=%d/"
    compression: gzip
    batch: { max_bytes: 10485760, timeout_secs: 300 }

  kafka_fanout:                  # SIEM/이상탐지로 fan-out
    type: kafka
    inputs: [sample_debug]
    bootstrap_servers: kafka:9092
    topic: "logs.{{ namespace }}"
    encoding: { codec: json }
# → 하나가 느려도 다른 sink는 영향 없음 (sink별 독립 buffer)`,
        },
        focus: 'sink',
      },
    ];

    const KIND_STYLE = {
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      python: { label: 'Python', textColor: '#86efac' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const SHIPPER = [
      { key: 'source', emoji: '📦', name: 'Source', note: 'stdout / file / journald' },
      { key: 'parser', emoji: '🔍', name: 'Parser', note: 'JSON / regex 추출' },
      { key: 'filter', emoji: '🏷️', name: 'Filter', note: '라벨 추가 / drop' },
      { key: 'sink',   emoji: '🚚', name: 'Sink',   note: 'Loki / ES / Kafka' },
    ];

    function ShipperCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">📦 택배 집하장 (로그 수집 파이프라인)</div>
          <div className="grid grid-cols-4 gap-2">
            {SHIPPER.map((s) => {
              const isActive = focus === s.key;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-red-100 border-2 border-red-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{s.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{s.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{s.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">로그 수집 파이프라인 (Fluent Bit / Vector / Promtail)</h1>
                <p className="text-sm text-slate-500 mt-1">택배 집하장 — 흩어진 로그를 모아 분류·라벨링 후 전송</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <ShipperCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'sink' && (
              <div className="bg-red-50 border-2 border-red-300 rounded-xl p-3 mb-6 text-xs text-red-900">
                💡 다음(III-2-2)에서는 로그 검색·집계 — LogQL/KQL
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
