<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observability 학습 — III-1-1. 구조화 로그 (JSON)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📔</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    III-1-1. 구조화 로그 (JSON)
    학습 목표: 자유 텍스트 로그를 JSON으로 바꾸어 검색·집계·추적이 가능해지는 과정을 단계별로 보인다.
    핵심 비유: "일기장 vs 데이터베이스"
    패턴: fastapi 표준 — 좌(LiveDataPane: 로그 검색 비교) / 우(VSCode 코드)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── 4 STEPS — 좌측 LiveDataPane + 우측 코드
    const STEPS = [
      {
        title: 'Step 1. Plain — 자유 텍스트, grep 노가다',
        desc: 'print/logger.info로 자유 텍스트만 찍으면 사람은 읽기 편하지만 분석 도구는 막막하다. "에러 몇 번?", "user_id별 실패율?" 같은 질의는 매번 정규식을 새로 짜야 한다. 일기장처럼 페이지를 한 장씩 넘기는 셈이다.',
        title2: 'plain text 로그 — grep 어려움',
        mode: 'plain',
        rows: [
          { raw: 'error: failed to fetch user 123 — timeout 5s' },
          { raw: 'info: request finished in 1.2s' },
          { raw: 'warning: cache miss for key=session:abc' },
          { raw: 'error: failed to fetch user 456 — timeout 5s' },
          { raw: 'info: GET /api/items 200 124ms' },
          { raw: 'error: db connection lost retries=3' },
        ],
        legend: 'grep "failed" | wc -l → 정규식 매번 작성, ad-hoc 파싱 실수투성이',
        code: {
          lang: 'python',
          filename: 'app_plain.py — 자유 텍스트 logger',
          lines: [
            '# 평범한 logger — 사람용, 기계는 못 읽는다',
            'import logging',
            '',
            'logging.basicConfig(',
            '    level=logging.INFO,',
            '    format="%(levelname)s: %(message)s",',
            ')',
            'log = logging.getLogger("app")',
            '',
            '# 자유 텍스트로 찍힘 — 필드 구분 없음',
            'log.error("failed to fetch user 123 — timeout 5s")',
            'log.info("request finished in 1.2s")',
            'log.warning("cache miss for key=session:abc")',
            '',
            '# 분석은 grep 노가다',
            '# $ grep "failed to fetch" app.log | wc -l',
            '# $ grep -oP "user \\d+" app.log | sort | uniq -c',
            '# $ awk \'/timeout/ { ... }\'  ← 매번 즉석 파싱',
            '# ✗ 새 질의가 생길 때마다 정규식을 새로 작성',
          ],
          highlight: [5, 11, 12, 13],
        },
      },
      {
        title: 'Step 2. JSON — key:value 구조화',
        desc: '같은 정보를 JSON으로 찍으면 user_id, timeout_s가 명시적인 필드가 된다. jq · ELK · Loki 어디서든 필드 단위로 select·집계가 가능해진다. 일기장이 데이터베이스로 바뀌는 순간이다.',
        title2: 'JSON 구조화 로그 — key:value 표 파싱',
        mode: 'json',
        rows: [
          { level: 'error', msg: 'fetch_user_failed', user_id: 123, timeout_s: 5 },
          { level: 'info',  msg: 'request_completed', latency_ms: 1200 },
          { level: 'warn',  msg: 'cache_miss',        key: 'session:abc' },
          { level: 'error', msg: 'fetch_user_failed', user_id: 456, timeout_s: 5 },
          { level: 'info',  msg: 'http_request',      method: 'GET', path: '/api/items', status: 200, latency_ms: 124 },
          { level: 'error', msg: 'db_connection_lost', retries: 3 },
        ],
        legend: 'jq \'select(.msg=="fetch_user_failed") | .user_id\' — 한 줄로 집계',
        code: {
          lang: 'python',
          filename: 'app_json.py — JSONFormatter',
          lines: [
            '# JSON 한 줄당 한 이벤트 — 필드가 명시적',
            'import json, logging, sys',
            '',
            'class JSONFormatter(logging.Formatter):',
            '    def format(self, record):',
            '        payload = {',
            '            "level": record.levelname.lower(),',
            '            "msg": record.getMessage(),',
            '            "logger": record.name,',
            '        }',
            '        # extra={"user_id": 123} 같은 사용자 필드 흡수',
            '        for k, v in record.__dict__.items():',
            '            if k not in ("args", "msg", "levelname", "name") \\',
            '               and not k.startswith("_"):',
            '                payload.setdefault(k, v)',
            '        return json.dumps(payload, ensure_ascii=False)',
            '',
            'handler = logging.StreamHandler(sys.stdout)',
            'handler.setFormatter(JSONFormatter())',
            'log = logging.getLogger("app")',
            'log.addHandler(handler)',
            'log.setLevel(logging.INFO)',
            '',
            '# 이벤트 이름 + 필드를 분리해서 찍는다',
            'log.error("fetch_user_failed", extra={"user_id": 123, "timeout_s": 5})',
            '# → {"level":"error","msg":"fetch_user_failed",',
            '#    "user_id":123,"timeout_s":5}',
          ],
          highlight: [4, 16, 25],
        },
      },
      {
        title: 'Step 3. Context — request_id / trace_id / user_id 자동 주입',
        desc: 'contextvars(자바 MDC)에 request_id를 한 번 set하면, 그 요청 안의 모든 로그에 자동으로 같은 키가 따라붙는다. trace_id로 grep 한 번이면 한 요청이 만든 로그 전체를 시간순으로 복원할 수 있다.',
        title2: 'request_id / trace_id / user_id가 모든 row에 자동 주입',
        mode: 'context',
        rows: [
          { level: 'info',  msg: 'request_started',   trace_id: 'a1b2c3', request_id: 'r-7741', user_id: 42 },
          { level: 'info',  msg: 'cart_loaded',       trace_id: 'a1b2c3', request_id: 'r-7741', user_id: 42, items: 3 },
          { level: 'warn',  msg: 'cache_miss',        trace_id: 'a1b2c3', request_id: 'r-7741', user_id: 42, key: 'session:abc' },
          { level: 'error', msg: 'fetch_user_failed', trace_id: 'a1b2c3', request_id: 'r-7741', user_id: 42, timeout_s: 5 },
          { level: 'info',  msg: 'request_finished',  trace_id: 'a1b2c3', request_id: 'r-7741', user_id: 42, status: 500 },
        ],
        legend: 'trace_id=a1b2c3로 grep 한 번 → 요청 전체 흐름 한 화면에',
        code: {
          lang: 'python',
          filename: 'context_filter.py — contextvars 주입',
          lines: [
            '# 요청별 컨텍스트를 모든 로그에 자동 주입',
            'import contextvars, logging, uuid',
            '',
            'trace_id_var   = contextvars.ContextVar("trace_id",   default=None)',
            'request_id_var = contextvars.ContextVar("request_id", default=None)',
            'user_id_var    = contextvars.ContextVar("user_id",    default=None)',
            '',
            'class ContextFilter(logging.Filter):',
            '    """모든 LogRecord에 현재 컨텍스트 값을 끼워 넣는다."""',
            '    def filter(self, record):',
            '        record.trace_id   = trace_id_var.get()',
            '        record.request_id = request_id_var.get()',
            '        record.user_id    = user_id_var.get()',
            '        return True',
            '',
            'log = logging.getLogger("app")',
            'log.addFilter(ContextFilter())',
            '',
            '# FastAPI 미들웨어 — 요청 진입점에서 한 번만 set',
            '@app.middleware("http")',
            'async def trace_middleware(request, call_next):',
            '    trace_id_var.set(',
            '        request.headers.get("x-trace-id") or uuid.uuid4().hex',
            '    )',
            '    request_id_var.set(f"r-{uuid.uuid4().hex[:4]}")',
            '    user_id_var.set(getattr(request.state, "user_id", None))',
            '    return await call_next(request)',
            '',
            '# 이후 어디서 찍든 trace_id/request_id/user_id가 따라붙는다',
            'log.info("request_started")',
            'log.error("fetch_user_failed", extra={"timeout_s": 5})',
          ],
          highlight: [10, 11, 12, 13, 21, 22, 23, 24, 25, 26],
        },
      },
      {
        title: 'Step 4. Levels — DEBUG / INFO / WARN / ERROR 색상 + 카운트',
        desc: '레벨은 "이걸 누가 봐야 하나"의 신호다. DEBUG(개발자), INFO(정상 흐름), WARN(주의), ERROR(즉시 대응). 운영은 보통 INFO 이상만 흘리고, 장애 디버깅 시 동적으로 DEBUG로 잠깐 낮춘다. 색상으로 한눈에, 카운트로 추세 파악.',
        title2: '레벨 색상 분류 + 카운트 차트',
        mode: 'levels',
        rows: [
          { level: 'debug', msg: 'cache_lookup',        key: 'session:abc' },
          { level: 'info',  msg: 'request_started',     trace_id: 'a1b2c3' },
          { level: 'info',  msg: 'cart_loaded',         items: 3 },
          { level: 'warn',  msg: 'cache_miss_high',     miss_rate: 0.42 },
          { level: 'debug', msg: 'sql_query',           rows: 12 },
          { level: 'info',  msg: 'request_finished',    latency_ms: 124 },
          { level: 'error', msg: 'db_connection_lost', retries: 3 },
          { level: 'error', msg: 'fetch_user_failed',  timeout_s: 5 },
        ],
        legend: '운영=INFO 이상, 장애 시 SIGUSR1로 30분만 DEBUG로 낮췄다 복구',
        code: {
          lang: 'python',
          filename: 'levels.py — 레벨 + 동적 변경',
          lines: [
            '# 레벨 = "누가 봐야 하나" 신호',
            'import logging, os, signal',
            '',
            'log = logging.getLogger("app")',
            '# 운영=INFO, 개발=DEBUG (환경변수)',
            'log.setLevel(os.getenv("LOG_LEVEL", "INFO"))',
            '',
            'log.debug("cache_lookup", extra={"key": "session:abc"})  # 개발자',
            'log.info("request_completed", extra={"latency_ms": 124}) # 정상',
            'log.warning("cache_miss_high", extra={"miss_rate": 0.42})# 주의',
            'log.error("db_connection_lost", extra={"retries": 3})    # 즉시 대응',
            '',
            '# ① admin endpoint — 재배포 없이 동적 변경',
            '@app.post("/admin/log-level")',
            'def set_level(level: str):',
            '    logging.getLogger("app").setLevel(level.upper())',
            '    return {"level": level}',
            '',
            '# ② SIGUSR1 토글 — 장애 디버깅용',
            'def toggle_debug(signum, frame):',
            '    cur = log.getEffectiveLevel()',
            '    log.setLevel(',
            '        logging.DEBUG if cur != logging.DEBUG else logging.INFO',
            '    )',
            'signal.signal(signal.SIGUSR1, toggle_debug)',
            '',
            '# 운영 기본은 INFO — 노이즈/비용 절감',
            '# 장애 시 30분만 DEBUG로 낮췄다 다시 INFO로 복구',
          ],
          highlight: [8, 9, 10, 11, 20, 21, 22, 23],
        },
      },
    ];

    // ── 레벨별 색상
    const LEVEL_COLOR = {
      debug: { bar: 'bg-slate-400',  pill: 'bg-slate-100  text-slate-700  border-slate-300' },
      info:  { bar: 'bg-sky-500',    pill: 'bg-sky-50     text-sky-700    border-sky-300' },
      warn:  { bar: 'bg-amber-500',  pill: 'bg-amber-50   text-amber-800  border-amber-300' },
      error: { bar: 'bg-red-500',    pill: 'bg-red-50     text-red-800    border-red-300' },
    };

    // ── 좌측: LiveDataPane (로그 검색 비교)
    function LiveDataPane({ step, stepIdx }) {
      const animKey = `step-${stepIdx}`;

      // levels 모드용 카운트
      const counts = { debug: 0, info: 0, warn: 0, error: 0 };
      if (step.mode === 'levels') {
        for (const r of step.rows) counts[r.level] = (counts[r.level] || 0) + 1;
      }
      const maxCount = Math.max(1, ...Object.values(counts));

      return (
        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          {/* 헤더 */}
          <div className="bg-slate-50 px-4 py-2 flex items-center justify-between border-b border-slate-200">
            <div className="flex items-center gap-2">
              <span className="text-base">📔</span>
              <span className="text-xs font-bold text-slate-700">로그 검색 비교</span>
            </div>
            <span className="text-[10px] text-slate-500 font-mono">
              mode={step.mode}
            </span>
          </div>

          {/* row들 */}
          <div className="p-3 space-y-1.5 min-h-[300px] max-h-[420px] overflow-auto" key={animKey}>
            {/* Step 1 — plain text */}
            {step.mode === 'plain' && step.rows.map((r, i) => (
              <div key={i}
                   className="fade-in text-[11px] font-mono text-slate-700 bg-slate-50 border border-slate-200 rounded px-2 py-1.5 truncate"
                   style={{ animationDelay: `${i * 90}ms` }}>
                {r.raw}
              </div>
            ))}

            {/* Step 2 — JSON key:value 표 */}
            {step.mode === 'json' && step.rows.map((r, i) => {
              const level = r.level || 'info';
              const c = LEVEL_COLOR[level === 'warn' ? 'warn' : level];
              const fields = Object.entries(r).filter(([k]) => k !== 'level' && k !== 'msg');
              return (
                <div key={i}
                     className="fade-in border border-slate-200 rounded px-2 py-1.5 bg-slate-50"
                     style={{ animationDelay: `${i * 90}ms` }}>
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded border uppercase ${c.pill}`}>{level}</span>
                    <span className="text-[11px] font-mono font-bold text-slate-800">{r.msg}</span>
                    {fields.map(([k, v]) => (
                      <span key={k} className="text-[10px] font-mono">
                        <span className="text-slate-500">{k}=</span>
                        <span className="text-slate-800">{String(v)}</span>
                      </span>
                    ))}
                  </div>
                </div>
              );
            })}

            {/* Step 3 — context 자동 주입 (trace_id 강조) */}
            {step.mode === 'context' && step.rows.map((r, i) => {
              const level = r.level || 'info';
              const c = LEVEL_COLOR[level === 'warn' ? 'warn' : level];
              return (
                <div key={i}
                     className="fade-in border border-slate-200 rounded px-2 py-1.5 bg-slate-50"
                     style={{ animationDelay: `${i * 90}ms` }}>
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded border uppercase ${c.pill}`}>{level}</span>
                    <span className="text-[11px] font-mono font-bold text-slate-800">{r.msg}</span>
                    {/* 컨텍스트 필드 — 강조 */}
                    <span className="text-[10px] font-mono px-1 py-0.5 rounded bg-red-100 text-red-700 border border-red-200">
                      <span className="opacity-70">trace_id=</span>{r.trace_id}
                    </span>
                    <span className="text-[10px] font-mono px-1 py-0.5 rounded bg-red-50 text-red-700 border border-red-200">
                      <span className="opacity-70">request_id=</span>{r.request_id}
                    </span>
                    <span className="text-[10px] font-mono px-1 py-0.5 rounded bg-red-50 text-red-700 border border-red-200">
                      <span className="opacity-70">user_id=</span>{r.user_id}
                    </span>
                    {/* 그 외 필드 */}
                    {Object.entries(r)
                      .filter(([k]) => !['level','msg','trace_id','request_id','user_id'].includes(k))
                      .map(([k, v]) => (
                        <span key={k} className="text-[10px] font-mono">
                          <span className="text-slate-500">{k}=</span>
                          <span className="text-slate-800">{String(v)}</span>
                        </span>
                      ))}
                  </div>
                </div>
              );
            })}

            {/* Step 4 — levels 색상 + 카운트 차트 */}
            {step.mode === 'levels' && (
              <>
                {step.rows.map((r, i) => {
                  const level = r.level;
                  const c = LEVEL_COLOR[level];
                  const fields = Object.entries(r).filter(([k]) => k !== 'level' && k !== 'msg');
                  return (
                    <div key={i}
                         className={`fade-in border rounded px-2 py-1.5 flex items-center gap-2 ${c.pill}`}
                         style={{ animationDelay: `${i * 70}ms` }}>
                      <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded uppercase text-white ${c.bar}`}>{level}</span>
                      <span className="text-[11px] font-mono font-bold">{r.msg}</span>
                      {fields.map(([k, v]) => (
                        <span key={k} className="text-[10px] font-mono opacity-80">
                          <span className="opacity-70">{k}=</span>{String(v)}
                        </span>
                      ))}
                    </div>
                  );
                })}

                {/* 카운트 차트 */}
                <div className="mt-3 pt-2 border-t border-slate-200">
                  <div className="text-[10px] font-bold text-slate-600 mb-1.5">레벨 카운트</div>
                  {['debug','info','warn','error'].map((lv) => {
                    const c = LEVEL_COLOR[lv];
                    const n = counts[lv];
                    const pct = (n / maxCount) * 100;
                    return (
                      <div key={lv} className="flex items-center gap-2 mb-1">
                        <span className="text-[9px] font-bold uppercase w-12 text-slate-600 font-mono">{lv}</span>
                        <div className="flex-1 bg-slate-100 rounded h-3 overflow-hidden">
                          <div className={`h-full ${c.bar} grow-bar`}
                               style={{ '--target-width': `${pct}%`, animationDelay: '600ms' }} />
                        </div>
                        <span className="text-[10px] font-mono w-6 text-right text-slate-700">{n}</span>
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </div>

          {/* 범례 */}
          <div className="px-4 pb-3 pt-2 border-t border-slate-100 bg-slate-50">
            <div className="text-[11px] text-slate-600 font-bold mb-1">{step.title2}</div>
            <div className="text-[10px] text-slate-500 leading-snug">{step.legend}</div>
          </div>
        </div>
      );
    }

    // ── 우측: VSCode 스타일 코드 뷰어
    function CodeViewer({ code, stepIdx }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [stepIdx]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일명 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 px-2 py-0.5 rounded bg-slate-700/40 font-mono">{code.lang}</span>
          </div>
          {/* 코드 + 라인 번호 */}
          <div className="overflow-auto max-h-[28rem] text-xs">
            <pre className="p-0 m-0">
              <code ref={codeRef} className={`language-${code.lang} block !bg-transparent !p-0`}>
{code.lines.map((line, i) => {
  const highlighted = code.highlight && code.highlight.includes(i + 1);
  return (
    <div key={i} className={`flex ${highlighted ? 'bg-yellow-500/10' : ''}`}>
      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-10 shrink-0">{i + 1}</span>
      <span className="pl-3 pr-3 whitespace-pre">{line || ' '}</span>
    </div>
  );
})}
              </code>
            </pre>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);

      const handleNext = () => setStepIdx((i) => (i < STEPS.length - 1 ? i + 1 : i));
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setIsPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[stepIdx];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <style>{`
            @keyframes fadeIn {
              from { opacity: 0; transform: translateY(4px); }
              to   { opacity: 1; transform: translateY(0); }
            }
            .fade-in {
              opacity: 0;
              animation: fadeIn 360ms ease-out forwards;
            }
            @keyframes growBar {
              from { width: 0; }
              to   { width: var(--target-width); }
            }
            .grow-bar {
              width: 0;
              animation: growBar 700ms cubic-bezier(.2,.7,.3,1) forwards;
            }
          `}</style>

          <div className="max-w-6xl mx-auto space-y-5">

            {/* 헤더 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-red-600 hover:text-red-800 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-red-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Observability &gt; Chapter 1. Logging</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">구조화 로그 (JSON)</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                일기장 vs 데이터베이스 — <strong>자유 텍스트 로그</strong>를 <code className="bg-slate-100 px-1 rounded text-xs">JSON 구조화</code>로 바꾸어
                검색·집계·추적이 가능한 데이터로 만든다.
              </p>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer code={step.code} stepIdx={stepIdx} />
            </div>

            {/* 설명 */}
            <div className="p-4 rounded-xl bg-red-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-red-200">Step {stepIdx + 1} / {STEPS.length} — {step.title}</h3>
                <span className="text-xs text-red-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 마지막 단계: 다음 안내 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="p-3 rounded-xl bg-red-50 border-2 border-red-300 text-red-900 text-sm">
                💡 다음(III-1-2)에서는 <strong>ELK vs Loki</strong> — 두 로그 백엔드 비교
              </div>
            )}

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setStepIdx(0); setIsPlaying(false); }} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                처음
              </button>
              <button onClick={handlePrev} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                &larr; 이전
              </button>
              <button onClick={togglePlay}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-red-600 text-white hover:bg-red-700 transition min-w-[96px]">
                {isPlaying ? '⏸ 일시정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./III-1-2.html" className="text-red-600 hover:text-red-800 font-medium">III-1-2 ELK vs Loki &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
