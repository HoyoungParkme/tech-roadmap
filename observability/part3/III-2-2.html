<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observability 학습 — III-2-2. 로그 검색·집계 (LogQL)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🔎</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    III-2-2. 로그 검색·집계 (LogQL)
    학습 목표: 라벨로 stream 좁히고 → 본문 grep → 메트릭 변환 → 집계, 4단계 파이프라인 이해
    핵심 비유: "도서관 검색대" — 1M 로그 → 라벨 → 필터 → 카운터 → 집계
    패턴: 좌(LiveDataPane: 점진 좁히기 시각화) / 우(VSCode 코드 — yaml→LogQL 라벨)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── 4 STEPS — 점진적으로 좁혀지는 LogQL 파이프라인
    const STEPS = [
      {
        title: 'Step 1. Stream Selector — 라벨로 1M 로그를 50K로',
        desc: '도서관에 1,000,000권의 책이 꽂혀있다. 모두 읽는 건 불가능. 먼저 책장 라벨로 좁힌다. {app="api"} 라벨 매처는 인덱싱돼서 빠르다 (Loki tsdb). 1,000,000줄 → 50,000줄로 한 번에 좁혀진다. PromQL과 동일한 매처 모델이다.',
        focus: 'selector',
        // 좌측 데이터 패널이 보여줄 시각화 모드
        visual: 'funnel',
        funnel: {
          before: { count: 1000000, label: '전체 로그 stream' },
          after:  { count: 50000,   label: '{app="api"} 매칭' },
          ratio: 0.05,
        },
        code: {
          lang: 'yaml',
          filename: 'queries.logql — Stream Selector',
          lines: [
            '# LogQL stream selector — { } 안의 라벨 매처',
            '{app="api"}',
            '# → app=api 인 모든 log stream만 선택',
            '',
            '# 정규식 매처 (=~) 와 부정 (!=, !~)',
            '{app=~"api|web", env="prod"}        # api 또는 web',
            '{app="api", level!="debug"}          # debug 제외',
            '',
            '# 결과 형태 — 같은 라벨셋의 log stream',
            '# {app="api", level="info",  instance="api-1"}',
            '#   2026-05-06T10:23:01  INFO  GET /users 200 12ms',
            '# {app="api", level="error", instance="api-2"}',
            '#   2026-05-06T10:23:05  ERROR db_conn_fail user_id=88',
            '',
            '# 핵심 규칙',
            '# - 인덱싱된 라벨로만 빠른 조회 (Loki tsdb)',
            '# - 라벨 카디널리티 폭발 주의 (user_id 라벨 금지)',
            '# - 라벨 매처 없이는 풀 스캔이라 느림',
          ],
          highlight: [2, 6, 7],
        },
      },
      {
        title: 'Step 2. Filter — 본문 grep으로 50K를 500으로',
        desc: '라벨로 좁힌 50,000줄 위에서 파이프(|)로 본문을 grep한다. |= "error"는 부분 일치 — error가 포함된 줄만 통과. 50,000줄 중 500줄만 남는다. 순차 스캔이라 좁은 stream 위에서만 빠르다. KQL은 필드 단위 검색.',
        focus: 'filter',
        visual: 'grep',
        grep: {
          input: 50000,
          output: 500,
          // 좌측에 보여줄 가짜 로그 라인 (일부는 통과, 일부는 차단)
          lines: [
            { ts: '10:23:01', level: 'INFO',  msg: 'GET /users 200 12ms',         match: false },
            { ts: '10:23:02', level: 'INFO',  msg: 'GET /orders 200 8ms',         match: false },
            { ts: '10:23:03', level: 'ERROR', msg: 'db_conn_fail user_id=42',     match: true  },
            { ts: '10:23:04', level: 'INFO',  msg: 'POST /login 200 24ms',        match: false },
            { ts: '10:23:05', level: 'ERROR', msg: 'timeout error route=/cart',   match: true  },
            { ts: '10:23:06', level: 'WARN',  msg: 'slow query 1.2s',             match: false },
            { ts: '10:23:07', level: 'ERROR', msg: 'error 500 on /api/checkout',  match: true  },
            { ts: '10:23:08', level: 'INFO',  msg: 'GET /healthz 200 1ms',        match: false },
          ],
        },
        code: {
          lang: 'yaml',
          filename: 'queries.logql — Filter',
          lines: [
            '# LogQL pipeline — 라벨 → 파이프 필터',
            '{app="api"} |= "error"',
            '# → 본문에 "error" 포함된 줄만 (부분 일치)',
            '',
            '# 연산자 4종',
            '{app="api"} |= "timeout"          # 부분 일치 (포함)',
            '{app="api"} != "healthcheck"      # 부분 일치 제외',
            '{app="api"} |~ "user_id=[0-9]+"   # 정규식 매칭',
            '{app="api"} !~ "debug|trace"      # 정규식 제외',
            '',
            '# 체이닝 — 여러 단계 필터',
            '{app="api", level="error"}',
            '  |= "timeout"',
            '  != "retry"',
            '  |~ "user_id=[0-9]+"',
            '',
            '# 파싱 후 라벨 필터 (logfmt / json)',
            '{app="api"} | logfmt | status="500" | latency > 1s',
            '{app="api"} | json   | user_id="42"',
          ],
          highlight: [2, 6, 7, 8, 9],
        },
      },
      {
        title: 'Step 3. Metric Query — log line을 시계열로',
        desc: 'rate({app="api"} |= "error" [5m])는 5분 구간 슬라이딩으로 초당 에러 수를 계산한다. log line이 메트릭(시계열)으로 변환된다. range vector ([5m]) 입력 → instant vector 출력. PromQL과 동일 패턴이라 Grafana 그래프로 바로 그려진다.',
        focus: 'metric',
        visual: 'timeseries',
        timeseries: {
          // 단일 라인 — 초당 에러 수
          points: [
            0.4, 0.6, 0.5, 0.8, 1.2, 1.5, 1.3, 1.8, 2.4, 3.1, 4.2, 4.1, 3.6, 2.9, 3.4, 4.8, 6.2, 5.9, 4.6, 3.8,
          ],
          unit: 'errors/sec',
          peak: 6.2,
        },
        code: {
          lang: 'yaml',
          filename: 'queries.logql — Metric Query',
          lines: [
            '# LogQL → metric — log 줄 수를 시계열로',
            'rate({app="api"} |= "error" [5m])',
            '# = 4.13   (초당 4.13개의 error 로그, 5분 평균)',
            '',
            '# count_over_time — 구간 누적 카운트',
            'count_over_time({app="api"}[5m])',
            '# = 1240   (지난 5분간 1240줄)',
            '',
            '# bytes_over_time / bytes_rate — 바이트 양',
            'bytes_rate({app="api"}[5m])',
            '',
            '# 파싱 + unwrap 으로 숫자 필드 → 메트릭',
            'sum_over_time(',
            '  {app="api"} | logfmt | unwrap latency [5m]',
            ')',
            '# = 12340  (지난 5분 latency 합계 ms)',
            '',
            '# avg_over_time / max_over_time / quantile_over_time',
            'quantile_over_time(0.99,',
            '  {app="api"} | logfmt | unwrap latency [5m]',
            ')',
            '# = 412    (p99 latency = 412ms)',
          ],
          highlight: [2, 6, 19, 20, 21],
        },
      },
      {
        title: 'Step 4. Aggregation — sum by(status) + topk',
        desc: 'sum by (status) (rate(...))는 status 라벨로 그룹핑해서 시계열을 묶는다. SQL의 GROUP BY와 동일. 5xx/4xx 두 라인이 그려지고, topk(5, ...)로 가장 시끄러운 그룹을 뽑는다. Grafana 대시보드의 "에러 많은 endpoint Top 5" 패널이 이 패턴이다.',
        focus: 'agg',
        visual: 'grouped',
        grouped: {
          series: [
            { label: '5xx', color: 'red',   points: [0.2, 0.3, 0.5, 0.6, 0.8, 1.1, 1.4, 1.8, 2.6, 3.4, 4.5, 4.2, 3.8, 3.0, 3.6, 5.0, 6.4, 6.0, 4.8, 4.0], peak: 6.4 },
            { label: '4xx', color: 'amber', points: [1.2, 1.4, 1.3, 1.5, 1.6, 1.4, 1.5, 1.7, 1.8, 1.6, 1.5, 1.7, 1.9, 1.8, 1.7, 1.9, 2.1, 2.0, 1.9, 1.8], peak: 2.1 },
          ],
          topk: [
            { path: '/api/users/{id}', value: 2.1 },
            { path: '/api/orders',     value: 1.4 },
            { path: '/api/checkout',   value: 0.9 },
            { path: '/api/cart/{id}',  value: 0.6 },
            { path: '/api/login',      value: 0.3 },
          ],
        },
        code: {
          lang: 'yaml',
          filename: 'queries.logql — Aggregation',
          lines: [
            '# 1) status 별 초당 에러 수 — 라벨별 집계',
            'sum by (status) (',
            '  rate({app="api"} | logfmt | level="error" [5m])',
            ')',
            '# {status="500"} 1.8',
            '# {status="502"} 0.4',
            '# {status="504"} 0.2',
            '',
            '# 2) 에러 많은 endpoint Top 5',
            'topk(5,',
            '  sum by (path) (',
            '    rate({app="api"} | logfmt | level="error" [5m])',
            '  )',
            ')',
            '# {path="/api/users/{id}"}    2.1',
            '# {path="/api/orders"}         1.4',
            '',
            '# 3) 5xx 비율 (SLO 식) — log 기반',
            'sum(rate({app="api"} | logfmt | status=~"5.." [5m]))',
            '  /',
            'sum(rate({app="api"}[5m]))',
            '# = 0.014  (1.4% — SLO 1% 초과 → 알림)',
            '',
            '# 한 줄 요약',
            '# 라벨 → grep → metric 변환 → 집계',
            '# = "책장 좁히기 → 본문 읽기 → 카운터 → 통계"',
          ],
          highlight: [2, 3, 4, 10, 11, 12, 13, 14],
        },
      },
    ];

    // ── 4단계 파이프라인 카드 (상단 미니 인디케이터)
    const STAGES = [
      { key: 'selector', emoji: '🎯', name: 'Stream Selector', note: '라벨 매처' },
      { key: 'filter',   emoji: '🔍', name: 'Filter',          note: '|= |~ != grep' },
      { key: 'metric',   emoji: '🔢', name: 'Metric Query',    note: 'count / rate' },
      { key: 'agg',      emoji: '📊', name: 'Aggregation',     note: 'sum by / topk' },
    ];

    function StageCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-3">
          <div className="text-[11px] font-bold text-slate-700 mb-2">🔎 LogQL 4단계 파이프라인</div>
          <div className="grid grid-cols-4 gap-2">
            {STAGES.map((s, i) => {
              const isActive = focus === s.key;
              const isPast   = STAGES.findIndex((x) => x.key === focus) > i;
              return (
                <div
                  key={s.key}
                  className={`rounded-lg p-2 text-center transition-all ${
                    isActive ? 'bg-red-100 border-2 border-red-400 scale-105 shadow' :
                    isPast   ? 'bg-red-50  border  border-red-200 opacity-80' :
                               'bg-slate-50 border border-slate-200'
                  }`}
                >
                  <div className="text-lg leading-none">{s.emoji}</div>
                  <div className="text-[11px] font-bold text-slate-800 mt-1">{s.name}</div>
                  <div className="text-[9px] text-slate-500 mt-0.5">{s.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── 좌측 LiveDataPane — 단계별로 다른 시각화
    function LiveDataPane({ step, stepIdx }) {
      const animKey = `step-${stepIdx}`;
      return (
        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          <div className="bg-slate-50 px-4 py-2 flex items-center justify-between border-b border-slate-200">
            <div className="flex items-center gap-2">
              <span className="text-base">📚</span>
              <span className="text-xs font-bold text-slate-700">도서관 검색대 — Live Data</span>
            </div>
            <span className="text-[10px] text-slate-500 font-mono">stage: {step.focus}</span>
          </div>

          <div className="p-4 min-h-[340px]" key={animKey}>
            {step.visual === 'funnel'     && <FunnelView     data={step.funnel} />}
            {step.visual === 'grep'       && <GrepView       data={step.grep} />}
            {step.visual === 'timeseries' && <TimeSeriesView data={step.timeseries} />}
            {step.visual === 'grouped'    && <GroupedView    data={step.grouped} />}
          </div>
        </div>
      );
    }

    // ── (a) Step 1: 1M → 50K 깔때기
    function FunnelView({ data }) {
      const fmt = (n) => n.toLocaleString();
      return (
        <div className="space-y-4">
          <div className="text-[11px] text-slate-500 mb-1">1단계: 라벨 매처로 stream 좁히기</div>

          {/* 입력 — 1M */}
          <div className="fade-in" style={{ animationDelay: '0ms' }}>
            <div className="flex items-center justify-between mb-1">
              <span className="text-[11px] font-mono text-slate-600">{data.before.label}</span>
              <span className="text-xs font-bold text-slate-700">{fmt(data.before.count)} 줄</span>
            </div>
            <div className="h-7 bg-slate-200 rounded relative overflow-hidden grow-bar"
                 style={{ '--target-width': '100%' }}>
              <div className="absolute inset-0 flex items-center px-2 text-[10px] font-mono text-slate-700">
                ████████████████████████████ 1,000,000
              </div>
            </div>
          </div>

          {/* 화살표 + 쿼리 */}
          <div className="flex items-center justify-center gap-2 fade-in" style={{ animationDelay: '320ms' }}>
            <span className="text-2xl text-red-500">↓</span>
            <code className="text-xs bg-red-50 border border-red-200 text-red-800 px-2 py-1 rounded font-mono">
              {'{app="api"}'}
            </code>
            <span className="text-2xl text-red-500">↓</span>
          </div>

          {/* 출력 — 50K */}
          <div className="fade-in" style={{ animationDelay: '640ms' }}>
            <div className="flex items-center justify-between mb-1">
              <span className="text-[11px] font-mono text-slate-600">{data.after.label}</span>
              <span className="text-xs font-bold text-red-700">{fmt(data.after.count)} 줄</span>
            </div>
            <div className="h-7 bg-slate-100 rounded relative overflow-hidden">
              <div className="h-full bg-red-400 grow-bar"
                   style={{ '--target-width': `${data.ratio * 100}%`, animationDelay: '700ms' }}>
              </div>
              <div className="absolute inset-0 flex items-center px-2 text-[10px] font-mono text-red-900">
                █ 50,000 ({(data.ratio * 100).toFixed(0)}%)
              </div>
            </div>
          </div>

          <div className="bg-slate-50 border border-slate-200 rounded p-3 text-[11px] text-slate-600 fade-in"
               style={{ animationDelay: '900ms' }}>
            <div className="font-bold text-slate-700 mb-1">💡 왜 빠른가?</div>
            라벨은 인덱싱돼있어서 (Loki tsdb) {fmt(data.before.count)}줄 중 {fmt(data.after.count)}줄을 즉시 골라낸다.
            전체 본문 스캔이 아니다.
          </div>
        </div>
      );
    }

    // ── (b) Step 2: 라인별 매칭 / 비매칭 표시
    function GrepView({ data }) {
      return (
        <div className="space-y-3">
          <div className="flex items-center justify-between">
            <span className="text-[11px] text-slate-500">2단계: 본문 grep — <code className="font-mono text-red-700">|= "error"</code></span>
            <span className="text-[11px] font-mono">
              <span className="text-slate-600">{data.input.toLocaleString()}</span>
              <span className="text-red-500 mx-1">→</span>
              <span className="text-red-700 font-bold">{data.output.toLocaleString()}</span>
            </span>
          </div>

          <div className="bg-slate-900 rounded-lg p-2 font-mono text-[10px] space-y-0.5 max-h-[260px] overflow-auto">
            {data.lines.map((ln, i) => {
              const cls = ln.match
                ? 'bg-red-500/20 text-red-200 border-l-2 border-red-500'
                : 'text-slate-500 line-through opacity-50 border-l-2 border-transparent';
              return (
                <div key={i}
                     className={`px-2 py-1 rounded ${cls} fade-in`}
                     style={{ animationDelay: `${i * 90}ms` }}>
                  <span className="text-slate-400 mr-2">{ln.ts}</span>
                  <span className={ln.level === 'ERROR' ? 'text-red-400 font-bold' :
                                   ln.level === 'WARN'  ? 'text-amber-400 font-bold' :
                                                          'text-sky-400 font-bold'}>
                    {ln.level.padEnd(5)}
                  </span>
                  <span className="ml-2">{ln.msg}</span>
                  <span className="float-right text-[9px]">
                    {ln.match ? '✓ 통과' : '✗ 차단'}
                  </span>
                </div>
              );
            })}
          </div>

          <div className="bg-slate-50 border border-slate-200 rounded p-3 text-[11px] text-slate-600">
            <div className="font-bold text-slate-700 mb-1">💡 grep은 순차 스캔</div>
            인덱스가 없어서 한 줄씩 검사한다. 좁혀진 stream 위에서만 빠르다.
            라벨 없이 <code className="bg-white px-1 rounded">|=</code>만 쓰면 1M줄 풀스캔이라 느려진다.
          </div>
        </div>
      );
    }

    // ── (c) Step 3: 시계열 라인 차트 (단일 라인)
    function TimeSeriesView({ data }) {
      const W = 460, H = 180, PAD = 26;
      const pts = data.points;
      const maxY = Math.max(...pts) * 1.15;
      const stepX = (W - PAD * 2) / (pts.length - 1);
      const toX = (i) => PAD + i * stepX;
      const toY = (v) => H - PAD - (v / maxY) * (H - PAD * 2);
      const path = pts.map((v, i) => `${i === 0 ? 'M' : 'L'}${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join(' ');
      const area = `${path} L${toX(pts.length - 1)},${H - PAD} L${toX(0)},${H - PAD} Z`;

      return (
        <div className="space-y-3">
          <div className="flex items-center justify-between">
            <span className="text-[11px] text-slate-500">3단계: <code className="font-mono text-red-700">rate({'{app="api"}'} |= "error" [5m])</code></span>
            <span className="text-[11px] font-mono text-red-700 font-bold">peak {data.peak} {data.unit}</span>
          </div>

          <div className="bg-slate-900 rounded-lg p-2">
            <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-[200px]">
              {/* y grid */}
              {[0, 0.25, 0.5, 0.75, 1].map((p) => {
                const y = PAD + p * (H - PAD * 2);
                return (
                  <g key={p}>
                    <line x1={PAD} y1={y} x2={W - PAD} y2={y} stroke="#334155" strokeWidth="1" strokeDasharray="2 3" />
                    <text x={PAD - 4} y={y + 3} fill="#64748b" fontSize="9" textAnchor="end" fontFamily="monospace">
                      {(maxY * (1 - p)).toFixed(1)}
                    </text>
                  </g>
                );
              })}
              {/* x labels */}
              <text x={PAD}     y={H - 8} fill="#64748b" fontSize="9" fontFamily="monospace">-20m</text>
              <text x={W / 2}   y={H - 8} fill="#64748b" fontSize="9" fontFamily="monospace" textAnchor="middle">-10m</text>
              <text x={W - PAD} y={H - 8} fill="#64748b" fontSize="9" fontFamily="monospace" textAnchor="end">now</text>

              {/* area */}
              <path d={area} fill="rgba(239,68,68,0.18)" className="grow-line" />
              {/* line */}
              <path d={path} fill="none" stroke="#ef4444" strokeWidth="2" className="grow-line" />
              {/* points */}
              {pts.map((v, i) => (
                <circle key={i} cx={toX(i)} cy={toY(v)} r="2.2" fill="#ef4444" className="fade-in"
                        style={{ animationDelay: `${300 + i * 40}ms` }} />
              ))}
            </svg>
          </div>

          <div className="bg-slate-50 border border-slate-200 rounded p-3 text-[11px] text-slate-600">
            <div className="font-bold text-slate-700 mb-1">💡 log → metric 변환</div>
            5분 슬라이딩 윈도우에서 초당 매칭 줄 수를 계산. 결과는 instant vector 시계열이라
            Grafana 패널에 그래프로 그려진다. PromQL과 동일한 모델.
          </div>
        </div>
      );
    }

    // ── (d) Step 4: 그룹별 라인 + topk 막대
    function GroupedView({ data }) {
      const W = 460, H = 160, PAD = 26;
      const allPts = data.series.flatMap((s) => s.points);
      const maxY = Math.max(...allPts) * 1.15;
      const N = data.series[0].points.length;
      const stepX = (W - PAD * 2) / (N - 1);
      const toX = (i) => PAD + i * stepX;
      const toY = (v) => H - PAD - (v / maxY) * (H - PAD * 2);

      const COLORS = { red: '#ef4444', amber: '#f59e0b' };
      const maxTopk = Math.max(...data.topk.map((t) => t.value));

      return (
        <div className="space-y-3">
          <div className="text-[11px] text-slate-500">4단계: <code className="font-mono text-red-700">sum by (status) (rate(...))</code></div>

          {/* 그룹 라인 차트 */}
          <div className="bg-slate-900 rounded-lg p-2">
            <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-[170px]">
              {[0, 0.25, 0.5, 0.75, 1].map((p) => {
                const y = PAD + p * (H - PAD * 2);
                return (
                  <g key={p}>
                    <line x1={PAD} y1={y} x2={W - PAD} y2={y} stroke="#334155" strokeWidth="1" strokeDasharray="2 3" />
                    <text x={PAD - 4} y={y + 3} fill="#64748b" fontSize="9" textAnchor="end" fontFamily="monospace">
                      {(maxY * (1 - p)).toFixed(1)}
                    </text>
                  </g>
                );
              })}

              {data.series.map((s, sIdx) => {
                const path = s.points.map((v, i) => `${i === 0 ? 'M' : 'L'}${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join(' ');
                return (
                  <g key={s.label}>
                    <path d={path} fill="none" stroke={COLORS[s.color]} strokeWidth="2" className="grow-line"
                          style={{ animationDelay: `${sIdx * 200}ms` }} />
                    {s.points.map((v, i) => (
                      <circle key={i} cx={toX(i)} cy={toY(v)} r="2" fill={COLORS[s.color]} className="fade-in"
                              style={{ animationDelay: `${300 + sIdx * 200 + i * 30}ms` }} />
                    ))}
                  </g>
                );
              })}

              {/* legend */}
              {data.series.map((s, i) => (
                <g key={s.label}>
                  <rect x={W - 90} y={6 + i * 14} width="10" height="3" fill={COLORS[s.color]} />
                  <text x={W - 76} y={10 + i * 14} fill="#cbd5e1" fontSize="9" fontFamily="monospace">
                    {s.label} (peak {s.peak})
                  </text>
                </g>
              ))}
            </svg>
          </div>

          {/* topk 막대 */}
          <div>
            <div className="text-[11px] font-bold text-slate-700 mb-1">📊 topk(5, ...) — 에러 많은 endpoint</div>
            <div className="space-y-1">
              {data.topk.map((t, i) => (
                <div key={t.path} className="flex items-center gap-2 fade-in" style={{ animationDelay: `${800 + i * 100}ms` }}>
                  <span className="text-[10px] font-mono text-slate-600 w-36 truncate">{t.path}</span>
                  <div className="flex-1 bg-slate-100 rounded h-4 overflow-hidden">
                    <div className="h-full bg-red-400 grow-bar"
                         style={{ '--target-width': `${(t.value / maxTopk) * 100}%`, animationDelay: `${850 + i * 100}ms` }}>
                    </div>
                  </div>
                  <span className="text-[10px] font-mono text-red-700 font-bold w-10 text-right">{t.value}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ── 우측: VSCode 스타일 코드 뷰어 (highlight.js)
    function CodeViewer({ code, stepIdx }) {
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [stepIdx]);

      // yaml 라벨이지만 실제는 LogQL — 표시용 라벨 오버라이드
      const displayLang = code.lang === 'yaml' ? 'LogQL' : code.lang;

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-red-300 px-2 py-0.5 rounded bg-red-900/40 font-mono font-bold">{displayLang}</span>
          </div>
          <div className="overflow-auto max-h-[28rem] text-xs">
            <pre className="p-0 m-0">
              <code ref={codeRef} className={`language-${code.lang} block !bg-transparent !p-0`}>
{code.lines.map((line, i) => {
  const highlighted = code.highlight && code.highlight.includes(i + 1);
  return (
    <div key={i} className={`flex ${highlighted ? 'bg-red-500/10' : ''}`}>
      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-10 shrink-0">{i + 1}</span>
      <span className="pl-3 pr-3 whitespace-pre">{line || ' '}</span>
    </div>
  );
})}
              </code>
            </pre>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);

      const handleNext = () => setStepIdx((i) => (i < STEPS.length - 1 ? i + 1 : i));
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setIsPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[stepIdx];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <style>{`
            @keyframes fadeIn {
              from { opacity: 0; transform: translateY(4px); }
              to   { opacity: 1; transform: translateY(0); }
            }
            .fade-in {
              opacity: 0;
              animation: fadeIn 360ms ease-out forwards;
            }
            @keyframes growBar {
              from { width: 0; }
              to   { width: var(--target-width); }
            }
            .grow-bar {
              width: 0;
              animation: growBar 700ms cubic-bezier(.2,.7,.3,1) forwards;
            }
            @keyframes drawLine {
              from { stroke-dasharray: 0 1500; opacity: 0.3; }
              to   { stroke-dasharray: 1500 0; opacity: 1; }
            }
            .grow-line {
              stroke-dasharray: 1500;
              animation: drawLine 900ms ease-out forwards;
            }
          `}</style>

          <div className="max-w-6xl mx-auto space-y-5">

            {/* 헤더 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-red-600 hover:text-red-800 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-red-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. Observability &gt; Chapter 2. Logging</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">로그 검색·집계 (LogQL)</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                도서관 검색대 — <strong>1M 로그를 4단계로 좁혀서 통계로 만든다</strong>.
                <code className="bg-slate-100 px-1 rounded text-xs">Selector</code> →
                <code className="bg-slate-100 px-1 rounded text-xs">Filter</code> →
                <code className="bg-slate-100 px-1 rounded text-xs">Metric</code> →
                <code className="bg-slate-100 px-1 rounded text-xs">Aggregation</code>.
              </p>
            </header>

            {/* 4단계 인디케이터 */}
            <StageCards focus={step.focus} />

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer code={step.code} stepIdx={stepIdx} />
            </div>

            {/* 설명 */}
            <div className="p-4 rounded-xl bg-red-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-red-200">Step {stepIdx + 1} / {STEPS.length} — {step.title}</h3>
                <span className="text-xs text-red-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 마지막 단계: Part III 완성 안내 */}
            {stepIdx === STEPS.length - 1 && (
              <div className="p-3 rounded-xl bg-red-50 border-2 border-red-300 text-red-900 text-sm">
                💡 Part III 완성. 다음(Part IV)에서는 <strong>분산 추적</strong> — Trace/Span/OpenTelemetry/Jaeger
              </div>
            )}

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setStepIdx(0); setIsPlaying(false); }} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                처음
              </button>
              <button onClick={handlePrev} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                &larr; 이전
              </button>
              <button onClick={togglePlay}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-red-600 text-white hover:bg-red-700 transition min-w-[96px]">
                {isPlaying ? '⏸ 일시정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-2-1.html" className="text-slate-500 hover:text-slate-700">&larr; III-2-1 구조화 로깅</a>
              <a href="../part4/IV-1-1.html" className="text-red-600 hover:text-red-800 font-medium">IV-1-1 Trace/Span 개론 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
