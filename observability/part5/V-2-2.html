<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observability 학습 — 실전 체크리스트</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    V-2-2. 실전 체크리스트 (Observability 학습 자료의 마지막)
    학습 목표: 실무 도입 시 4 축 (Metrics / Logs / Traces / SRE 운영) 점검표
    핵심 비유: "관제 센터 점검표" — 4 축을 한꺼번에 손가락으로 짚으며 확인
    구조: 4단계 (Metrics / Logs / Traces / SRE)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Metrics — "심박수가 실시간으로 보이는가" (Prometheus + 4 Golden Signals)',
        desc: 'Prometheus 운영 + 4 Golden Signals(Latency/Traffic/Errors/Saturation) + alert rule 표준화. 모든 서비스가 동일한 메트릭 규약을 따르고 대시보드 한 장으로 건강 상태가 보여야 한다. Part II 의 회수.',
        block: {
          kind: 'shell',
          code: `# Metrics 체크리스트 (Part II)
# ───────────────────────────────────────────────
# Prometheus 운영
# [ ] Prometheus 또는 동등 TSDB 가 운영 중 (HA 2 노드 이상)
# [ ] scrape_interval / retention 정책 명시 (예: 15s / 30d)
# [ ] long-term storage (Thanos / Mimir / Cortex) 연동
# [ ] kube-state-metrics + node_exporter 기본 수집
#
# 4 Golden Signals (모든 서비스 공통)
# [ ] Latency: p50 / p95 / p99 histogram 노출
# [ ] Traffic: requests_per_second 라벨별 (route/method)
# [ ] Errors: 5xx / 4xx 비율 + error_rate < SLO 알람
# [ ] Saturation: CPU / Mem / GC / queue depth 모니터링
#
# Alert Rule
# [ ] alert rule 은 git 으로 버전 관리 (PromQL 코드 리뷰)
# [ ] for: 5m 등 flap 방지 윈도우 적용
# [ ] severity 라벨 표준 (critical / warning / info)
# [ ] runbook_url annotation 모든 alert 에 필수
#
# 자주 빠뜨리는 항목
# [ ] cardinality 폭발 방지 (user_id 같은 high-cardinality 라벨 X)
# [ ] recording rule 로 비싼 query 사전 계산
# [ ] alert receiver 점검 (Slack/PagerDuty 도달 테스트)
# [ ] Grafana 대시보드 코드화 (jsonnet / terraform)

# 합격선
# - 12 항목 중 10 개 이상 OK
# - 미충족은 risk register 기록 + 분기 내 보강`,
        },
        focus: 'metrics',
      },
      {
        title: 'Step 2. Logs — "기록이 검색 가능하고 흐름이 이어지는가" (구조화 + 수집 + 검색)',
        desc: '모든 서비스 JSON 구조화 로그 + trace_id/request_id 자동 주입 + 중앙 집중 검색 + retention 정책. "어떤 요청이 왜 실패했나" 5 분 안에 답이 나와야 한다. Part III 의 회수.',
        block: {
          kind: 'shell',
          code: `# Logs 체크리스트 (Part III)
# ───────────────────────────────────────────────
# 구조화 (Structured Logging)
# [ ] 모든 서비스가 JSON 로그 출력 (key-value, plain text 금지)
# [ ] 표준 필드: ts / level / service / trace_id / message
# [ ] PII / 비밀번호 / 토큰 자동 마스킹 미들웨어
# [ ] log level 환경별 표준 (prod=INFO, dev=DEBUG)
#
# Trace 연계
# [ ] trace_id / span_id 가 모든 로그 라인에 자동 주입
# [ ] request_id 가 inbound -> downstream 전파 (W3C Trace-Context)
# [ ] 로그에서 클릭 한 번으로 해당 trace 로 점프 가능
# [ ] 백엔드에서도 reverse: trace -> 관련 로그 link out
#
# 수집 / 저장
# [ ] Fluent Bit / Vector / Promtail 중 하나로 일관 수집
# [ ] Loki / ES / OpenSearch 중앙 저장소 운영 (HA)
# [ ] retention: hot 7d / warm 30d / cold 90d 같은 정책 명시
# [ ] 수집 실패 시 dead-letter / 재전송 큐 운영
#
# 자주 빠뜨리는 항목
# [ ] log volume / cost 모니터링 (월별 GB 추적)
# [ ] sampling 정책 (debug 로그는 1% 샘플링 등)
# [ ] 검색 alias / saved query 팀 공유
# [ ] 컴플라이언스 (GDPR 삭제 요청 지원)

# 합격선
# - 12 항목 중 10 개 이상 OK
# - "에러 발생 -> 5 분 내 원인 로그 발견" 분기마다 모의 훈련`,
        },
        focus: 'logs',
      },
      {
        title: 'Step 3. Traces — "요청의 여정이 한눈에 보이는가" (OpenTelemetry + 백엔드)',
        desc: 'OpenTelemetry SDK 모든 서비스 적용 + Collector 운영 + sampling 정책 + 백엔드 (Jaeger/Tempo) 연동. 분산 시스템에서 latency 병목과 에러 전파를 한 장의 waterfall 로 본다. Part IV 의 회수.',
        block: {
          kind: 'shell',
          code: `# Traces 체크리스트 (Part IV)
# ───────────────────────────────────────────────
# OpenTelemetry SDK
# [ ] 모든 서비스에 OTel SDK 적용 (auto-instrumentation 우선)
# [ ] FastAPI / Express / gRPC 등 framework 자동 계측
# [ ] DB / cache / queue 클라이언트 자동 계측 활성화
# [ ] 비즈니스 핵심 구간은 manual span 으로 보강
#
# Collector 운영
# [ ] OTel Collector HA 운영 (Deployment 또는 DaemonSet)
# [ ] receivers: otlp grpc(4317) + http(4318) 동시 노출
# [ ] processors: batch + memory_limiter + resource enrich
# [ ] exporters: 백엔드 + 백업 + Prometheus metrics fan-out
#
# Sampling 정책
# [ ] head sampling (parent-based) 기본 X%
# [ ] tail sampling: 에러 / 느린 trace 100% 보존
# [ ] 비용 / 보존 기간 / sampling rate 분기별 리뷰
# [ ] high-value endpoint (결제 등) 100% sampling
#
# 자주 빠뜨리는 항목
# [ ] context propagation 끊김 점검 (queue / batch worker)
# [ ] span 이름 표준 (HTTP method route 형태)
# [ ] trace -> log -> metric 3 way 상호 jump 동작 확인
# [ ] 백엔드 (Jaeger / Tempo) retention + 저장소 비용

# 합격선
# - 12 항목 중 10 개 이상 OK
# - "p99 latency spike 발생 -> trace 로 병목 서비스 식별" 5 분 내 가능`,
        },
        focus: 'traces',
      },
      {
        title: 'Step 4. SRE 운영 — "장애를 예측하고 학습하는 체계가 있는가" (SLO + OnCall + Incident)',
        desc: 'SLO 정의 모든 서비스 + Burn Rate alert + Runbook 100% + Postmortem 자동화. 단순 모니터링을 넘어 신뢰성을 숫자로 관리하고 장애로부터 조직이 학습한다. Part V 의 회수 — 15 번째 학습 자료 마무리 🎉.',
        block: {
          kind: 'shell',
          code: `# SRE 운영 체크리스트 (Part V)
# ───────────────────────────────────────────────
# SLO 정의
# [ ] 모든 production 서비스에 SLO 문서 (availability + latency)
# [ ] SLI PromQL 코드화 + recording rule 로 사전 계산
# [ ] error budget 월별 트래킹 + 소진 시 feature freeze 규칙
# [ ] 분기별 SLO 리뷰 (target 상향 / 하향 조정)
#
# Burn Rate Alert
# [ ] multi-window multi-burn-rate alert (1h / 6h / 3d)
# [ ] fast burn (1h, 14.4x) -> page 즉시
# [ ] slow burn (6h, 6x) -> ticket 생성
# [ ] alert -> runbook 1-click jump 표준
#
# OnCall + Incident
# [ ] on-call rotation 표 + 핸드오프 문서화
# [ ] PagerDuty / Opsgenie 등 24/7 도달 보장
# [ ] severity 정의 표준 (SEV1 / SEV2 / SEV3)
# [ ] incident 발생 시 Slack war-room 자동 생성
#
# Postmortem / 학습
# [ ] 모든 SEV1/SEV2 는 blameless postmortem 의무
# [ ] postmortem 템플릿 (timeline / impact / root cause / action)
# [ ] action item 은 ticket 화 + 분기 내 완료 추적
# [ ] error budget policy 위반 시 신규 release 중단

# 합격선
# - 12 항목 중 10 개 이상 OK
# - 분기마다 game day (장애 시뮬레이션) 실시

# ───────────────────────────────────────────────
# Observability 20 / 20 — 15 번째 학습 자료 완성 🎉
# Part I (4) + Part II (4) + Part III (4) + Part IV (4) + Part V (4) = 20
# 개론 / 메트릭 / 로그 / 분산 추적 / 실전 운영 종합
# graphrag / k8s / mlops 에 이어 100% 완성 — 학습 자료 15 개 누적
# ───────────────────────────────────────────────`,
        },
        focus: 'sre',
      },
    ];

    const KIND_STYLE = {
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      python: { label: 'Python', textColor: '#86efac' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const CHECKLIST_AXES = [
      { key: 'metrics', emoji: '📊', name: 'Metrics', note: 'Prom + 4 Golden' },
      { key: 'logs',    emoji: '📝', name: 'Logs',    note: '구조화 + 수집' },
      { key: 'traces',  emoji: '🔗', name: 'Traces',  note: 'OTel + 백엔드' },
      { key: 'sre',     emoji: '🚀', name: 'SRE 운영', note: 'SLO + OnCall' },
    ];

    function ChecklistCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🛰️ 관제 센터 점검표 (Observability 4축)</div>
          <div className="grid grid-cols-4 gap-2">
            {CHECKLIST_AXES.map((c) => {
              const isActive = focus === c.key;
              return (
                <div
                  key={c.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-red-100 border-2 border-red-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{c.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{c.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{c.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">실전 체크리스트</h1>
                <p className="text-sm text-slate-500 mt-1">관제 센터 점검표 — Metrics / Logs / Traces / SRE 운영</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <ChecklistCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'sre' && (
              <div className="bg-red-50 border-2 border-red-300 rounded-xl p-3 mb-6 text-xs text-red-900">
                💡 Observability 학습 완료. graphrag/k8s/mlops에 이어 100% 완성 — 학습 자료 15개 누적
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
