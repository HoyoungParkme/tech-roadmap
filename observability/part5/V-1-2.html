          { t: '—',     label: 'resolve 미정',     state: 'idle' },

            '    if alert["error_rate"] > 10:',

      {

          { t: '14:01', label: 'Prometheus alert HighErrorRate fired (Sev1)', state: 'done' },

          { t: '—',     label: 'resolve 미정',     state: 'idle' },
        ],
        code: {
          lang: 'python',
          filename: 'mitigate.py — rollback + circuit breaker',
          lines: [
            '# Mitigation 1순위 = "출혈 멈추기" (root cause는 나중)',
            'import subprocess',
            'from pybreaker import CircuitBreaker',
            '',
            '# 1) Kubernetes rollout undo — 직전 ReplicaSet으로 즉시 복귀',
            'def rollback_canary(deployment: str, namespace: str = "prod") -> None:',
            '    """canary 배포 직후 사고면 무조건 롤백 먼저."""',
            '    subprocess.run(',
            '        ["kubectl", "rollout", "undo",',
            '         f"deployment/{deployment}", "-n", namespace],',

            '',
            '# 2) Circuit breaker — downstream 보호 모드',
            'stripe_breaker = CircuitBreaker(',
            '    fail_max=5,           # 5번 실패하면 OPEN',
            '    reset_timeout=60,     # 60s 후 HALF_OPEN 시도',
            ')',
            '',
            '@stripe_breaker',
            'def call_stripe(payload: dict) -> dict:',
            '    """OPEN 상태에서는 즉시 CircuitBreakerError 발생."""',
            '    return stripe_client.charge(payload)',
            '',
            '# 3) Slack에 mitigate 선언 (영향 멈췄다고 명시)',
            'def declare_mitigated(channel: str, before: float, after: float) -> None:',
            '    """포스트모템 타임라인에 자동 추가됨."""',
            '    msg = f"MITIGATED — error rate {before}% → {after}%"',
            '    slack.post(channel=channel, text=msg)',
          ],
          highlight: [9, 10, 14, 15, 16],
        },
        shell: {
          filename: 'mitigate.sh — kubectl 명령',
          lines: [
            '# 즉시 실행 (5분 룰 안에 mitigate 목표)',

            '',
            '$ kubectl rollout status deployment/checkout -n prod',

        },
      },
      {
        phase: 'resolve',

        title: 'Step 3. Resolve — root cause fix 배포 (T+30min)',

        legend: 'root cause = Stripe timeout 미설정 → fix: timeout=5s + retry 3회',
        errorRate: 0.05,
        timeline: [
          { t: '14:01', label: 'Prometheus alert HighErrorRate fired (Sev1)', state: 'done' },
          { t: '14:04', label: 'on-call hong ack, IC 선언, #incident-1042 생성', state: 'done' },
          { t: '14:06', label: 'kubectl rollout undo + circuit breaker OPEN',  state: 'done' },
          { t: '14:31', label: 'v2.4.2 canary 100% 완료, RESOLVED 선언',          state: 'active' },
        ],
        code: {
          lang: 'python',
          filename: 'stripe_client.py — root cause fix',
          lines: [
            '# Before (문제 코드) timeout 미설정 → 무한 대기',
            'import stripe',
            '',
            'def charge_old(amount: int, token: str) -> dict:',
            '    return stripe.Charge.create(amount=amount, source=token)',
            '',
            '',
            '# After (fix) timeout 5s + 지수 백오프 재시도 3회',
            'from tenacity import retry, stop_after_attempt, wait_exponential',
            '',
            '@retry(',
            '    stop=stop_after_attempt(3),',
            '    wait=wait_exponential(multiplier=1, min=1, max=4),',
            ')',
            'def charge(amount: int, token: str) -> dict:',
            '    """Stripe 결제 timeout 5s, 실패 시 3회 재시도."""',
            '    return stripe.Charge.create(',
            '        amount=amount,',
            '        source=token,',
            '        timeout=5,                # 핵심 fix',
            '    )',
            '',
            '',
            '# 회귀 테스트 (재발 방지) — 같은 사고 재발이 가장 흔한 패턴',
            'def test_charge_timeout_raises(monkeypatch):',
            '    """Stripe timeout 시 APIConnectionError 발생 검증."""',
            '    def mock_create(**kw):',
            '        raise stripe.error.APIConnectionError("timeout")',
            '    monkeypatch.setattr(stripe.Charge, "create", mock_create)',
            '    with pytest.raises(stripe.error.APIConnectionError):',
            '        charge(1000, "tok_test")',
          ],
          highlight: [11, 12, 13, 20],
        },
        shell: {
          filename: 'deploy.sh — canary 점진 배포',
          lines: [
            '# Sev1 fix는 절대 100% 한 번에 X — canary로 점진',

      {

        legend: 'blameless — 사람 X, 시스템 O. action item은 owner + due date 필수',
        errorRate: 0,
        postmortem: {
          rootCause: 'Stripe SDK timeout 미설정 → checkout worker 무한 대기 → 풀 고갈',
          timeline: [
            { t: '14:01', e: 'Prometheus alert fired (Sev1)' },
            { t: '14:04', e: 'on-call ack + IC 선언' },
            { t: '14:06', e: 'kubectl rollout undo (mitigate)' },
            { t: '14:31', e: 'v2.4.2 fix deploy (resolve)' },
            { t: '15:48', e: 'incident closed' },
          ],
          actionItems: [
            { owner: '@hong', title: '외부 API 호출 timeout 강제 lint 룰 추가', due: '2026-05-13' },
            { owner: '@sumi', title: 'stripe_timeout_count 메트릭 + 알람 추가', due: '2026-05-10' },
            { owner: '@joon', title: '외부 API 호출 표준 wiki 문서화',         due: '2026-05-20' },
          ],
        },
        timeline: [
          { t: '14:01', label: 'Prometheus alert HighErrorRate fired (Sev1)', state: 'done' },
          { t: '14:04', label: 'on-call hong ack, IC 선언, #incident-1042 생성', state: 'done' },
          { t: '14:06', label: 'kubectl rollout undo + circuit breaker OPEN',  state: 'done' },
          { t: '14:31', label: 'v2.4.2 canary 100% 완료, RESOLVED 선언',          state: 'done' },
        ],
        code: {
          lang: 'yaml',

          lines: [

            '',
            'action_items:',
            '  - owner: "@hong"',
            '    title: "외부 API 호출 timeout 강제 lint 룰 추가"',
            '    due: "2026-05-13"',
            '  - owner: "@sumi"',
            '    title: "stripe_timeout_count 메트릭 + 알람 추가"',
            '    due: "2026-05-10"',
            '  - owner: "@joon"',
            '    title: "외부 API 호출 표준 wiki 문서화"',
            '    due: "2026-05-20"',
            '',
            'blameless_note: |',
            '  이 포스트모템은 개인을 비난하지 않는다.',
            '  "왜 사람이 그렇게 했나"가 아니라',

    // ── phase 색 (incident response 톤 — red 계열)
    const PHASE_COLOR = {
      detect:     { ring: 'ring-red-400',    bg: 'bg-red-100',    text: 'text-red-800',    dot: 'bg-red-500' },
      mitigate:   { ring: 'ring-orange-400', bg: 'bg-orange-100', text: 'text-orange-800', dot: 'bg-orange-500' },
      resolve:    { ring: 'ring-amber-400',  bg: 'bg-amber-100',  text: 'text-amber-800',  dot: 'bg-amber-500' },
      postmortem: { ring: 'ring-rose-400',   bg: 'bg-rose-100',   text: 'text-rose-800',   dot: 'bg-rose-500' },
    };

    const PHASES = [
      { key: 'detect',     emoji: '🚨', name: 'Detect',     note: 'T+0 / Sev 분류' },
      { key: 'mitigate',   emoji: '🩹', name: 'Mitigate',   note: 'T+5min / 롤백' },
      { key: 'resolve',    emoji: '🔧', name: 'Resolve',    note: 'T+30min / fix' },
      { key: 'postmortem', emoji: '📝', name: 'Postmortem', note: 'T+24h / 회고' },
    ];

    // ── 좌측: Incident 타임라인 시각화
    function IncidentLivePane({ step, stepIdx }) {
      const animKey = `step-${stepIdx}`;
      const phaseColor = PHASE_COLOR[step.phase];

      return (
        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          {/* 헤더 — 시간 카운터 + Sev */}
          <div className="bg-slate-50 px-4 py-2 flex items-center justify-between border-b border-slate-200">
            <div className="flex items-center gap-2">
              <span className="text-base">🚑</span>
              <span className="text-xs font-bold text-slate-700">Incident INC-1042 / Sev1</span>
            </div>
            <span className={`text-[10px] font-mono px-2 py-0.5 rounded ${phaseColor.bg} ${phaseColor.text}`}>
              clock={step.clock}
            </span>
          </div>

          {/* phase 4-카드 */}
          <div className="px-3 pt-3">
            <div className="grid grid-cols-4 gap-2">
              {PHASES.map((p) => {
                const isActive = step.phase === p.key;
                return (
                  <div
                    key={p.key}
                    className={`rounded-lg p-2 text-center transition-all ${isActive ? 'bg-red-100 border-2 border-red-400 scale-105 shadow' : 'bg-slate-50 border border-slate-200'}`}
                  >
                    <div className="text-xl">{p.emoji}</div>
                    <div className="text-[11px] font-bold text-slate-800 mt-0.5">{p.name}</div>
                    <div className="text-[9px] text-slate-500 mt-0.5">{p.note}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* 본문 — phase별 시각화 */}
          <div className="p-3" key={animKey}>
            {step.phase !== 'postmortem' ? (
              <ErrorRateChart errorRate={step.errorRate} phase={step.phase} />
            ) : (
              <PostmortemDoc data={step.postmortem} />
            )}

            {/* 진행 타임라인 */}
            <div className="mt-3 space-y-1.5">
              <div className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">진행 타임라인</div>
              {step.timeline.map((row, idx) => {
                const stateClass = {
                  done:    'text-slate-400 line-through',
                  active:  'text-red-700 font-bold',
                  pending: 'text-amber-700',
                  idle:    'text-slate-300',
                }[row.state];
                const dotClass = {
                  done:    'bg-emerald-500',
                  active:  'bg-red-500 animate-pulse',
                  pending: 'bg-amber-500',
                  idle:    'bg-slate-200',
                }[row.state];
                return (
                  <div key={idx} className="flex items-center gap-2 fade-in" style={{ animationDelay: `${idx * 120}ms` }}>
                    <span className={`w-2 h-2 rounded-full ${dotClass}`}></span>
                    <span className="text-[10px] font-mono text-slate-500 w-12">{row.t}</span>
                    <span className={`text-[11px] ${stateClass}`}>{row.label}</span>
                  </div>
                );
              })}
            </div>
          </div>

          {/* 범례 */}
          <div className="px-4 pb-3 pt-2 border-t border-slate-100 bg-slate-50">
            <div className="text-[11px] text-slate-600 font-bold mb-1">현재 phase: {step.phase.toUpperCase()}</div>
            <div className="text-[10px] text-slate-500 leading-snug">{step.legend}</div>
          </div>
        </div>
      );
    }

    // ── error rate 그래프 (detect / mitigate / resolve)
    function ErrorRateChart({ errorRate, phase }) {
      // 막대 높이 — 12% → 100%, 0.3% → 약 4%, 0.05% → 1%
      const pct = Math.min(100, Math.max(1, (errorRate / 12.4) * 100));
      const barColor = phase === 'detect' ? 'bg-red-500'
                     : phase === 'mitigate' ? 'bg-orange-400'
                     : 'bg-emerald-500';
      const labelColor = phase === 'detect' ? 'text-red-700'
                       : phase === 'mitigate' ? 'text-orange-700'
                       : 'text-emerald-700';

      return (
        <div className="bg-slate-50 rounded-lg p-3 border border-slate-200">
          <div className="flex items-center justify-between mb-2">
            <span className="text-[10px] font-bold text-slate-600 uppercase tracking-wider">checkout error rate (5m)</span>
            <span className={`text-base font-bold font-mono ${labelColor}`}>{errorRate}%</span>
          </div>
          <div className="relative h-16 bg-white rounded border border-slate-200 overflow-hidden">
            {/* SLO 임계선 (1%) */}
            <div className="absolute left-0 right-0 border-t border-dashed border-slate-300"
                 style={{ bottom: `${(1 / 12.4) * 100}%` }}>
              <span className="absolute right-1 -top-3 text-[9px] text-slate-400 font-mono">SLO 1%</span>
            </div>
            {/* 현재 막대 */}
            <div
              className={`absolute bottom-0 left-1/2 -translate-x-1/2 w-12 rounded-t ${barColor} grow-bar`}
              style={{ '--target-height': `${pct}%` }}
            />
          </div>
          <div className="flex items-center justify-between mt-1 text-[9px] text-slate-400">
            <span>0%</span>
            <span className="text-center">실시간</span>
            <span>12.4% peak</span>
          </div>
        </div>
      );
    }

    // ── postmortem 문서 (Step 4)
    function PostmortemDoc({ data }) {
      return (
        <div className="bg-rose-50 border border-rose-200 rounded-lg p-3 space-y-2">
          <div>
            <div className="text-[10px] font-bold text-rose-700 uppercase tracking-wider">root cause</div>
            <div className="text-[11px] text-slate-700 mt-0.5">{data.rootCause}</div>
          </div>
          <div>
            <div className="text-[10px] font-bold text-rose-700 uppercase tracking-wider">timeline</div>
            <ul className="mt-1 space-y-0.5">
              {data.timeline.map((t, i) => (
                <li key={i} className="flex items-center gap-2 text-[11px]">
                  <span className="font-mono text-slate-500 w-10">{t.t}</span>
                  <span className="text-slate-700">{t.e}</span>
                </li>
              ))}
            </ul>
          </div>
          <div>
            <div className="text-[10px] font-bold text-rose-700 uppercase tracking-wider">action items</div>
            <table className="w-full mt-1 border-collapse text-[10px]">
              <thead>
                <tr className="text-slate-500">
                  <th className="text-left font-bold pb-1 border-b border-rose-200">owner</th>
                  <th className="text-left font-bold pb-1 border-b border-rose-200">title</th>
                  <th className="text-left font-bold pb-1 border-b border-rose-200">due</th>
                </tr>
              </thead>
              <tbody>
                {data.actionItems.map((a, i) => (
                  <tr key={i} className="text-slate-700">
                    <td className="pt-1 font-mono text-rose-700">{a.owner}</td>
                    <td className="pt-1">{a.title}</td>
                    <td className="pt-1 font-mono text-slate-500">{a.due}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ── 우측: VSCode 스타일 코드 뷰어 (python 메인 + shell 분리)
    function CodeViewer({ code, shell, stepIdx }) {
      const codeRef = useRef(null);
      const shellRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
        if (shellRef.current && window.hljs) {
          shellRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(shellRef.current);
        }
      }, [stepIdx]);

      return (
        <div className="space-y-3">
          {/* 메인 코드 */}
          <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
            <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
              <div className="flex gap-1.5">
                <span className="w-3 h-3 rounded-full bg-red-500"></span>
                <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
                <span className="w-3 h-3 rounded-full bg-green-500"></span>
              </div>
              <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
              <span className="ml-auto text-[10px] text-slate-500 px-2 py-0.5 rounded bg-slate-700/40 font-mono">{code.lang}</span>
            </div>
            <div className="overflow-auto max-h-[28rem] text-xs">
              <pre className="p-0 m-0">
                <code ref={codeRef} className={`language-${code.lang} block !bg-transparent !p-0`}>
{code.lines.map((line, i) => {
  const highlighted = code.highlight && code.highlight.includes(i + 1);
  return (
    <div key={i} className={`flex ${highlighted ? 'bg-yellow-500/10' : ''}`}>
      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-10 shrink-0">{i + 1}</span>
      <span className="pl-3 pr-3 whitespace-pre">{line || ' '}</span>
    </div>
  );
})}
                </code>
              </pre>
            </div>
          </div>

          {/* shell 명령 (별도 분리) */}
          {shell && (
            <div className="bg-[#1a1d23] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
              <div className="bg-[#13151a] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
                <span className="text-xs text-slate-400 font-mono">$ {shell.filename}</span>
                <span className="ml-auto text-[10px] text-slate-500 px-2 py-0.5 rounded bg-slate-700/40 font-mono">bash</span>
              </div>
              <div className="overflow-auto max-h-[12rem] text-xs">
                <pre className="p-0 m-0">
                  <code ref={shellRef} className="language-bash block !bg-transparent !p-0">
{shell.lines.map((line, i) => (
    <div key={i} className="flex">
      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-10 shrink-0">{i + 1}</span>
      <span className="pl-3 pr-3 whitespace-pre">{line || ' '}</span>
    </div>
  ))}
                  </code>
                </pre>
              </div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);

      const handleNext = () => setStepIdx((i) => (i < STEPS.length - 1 ? i + 1 : i));
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setIsPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[stepIdx];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <style>{`
            @keyframes fadeIn {
              from { opacity: 0; transform: translateY(4px); }
              to   { opacity: 1; transform: translateY(0); }
            }
            .fade-in {
              opacity: 0;
              animation: fadeIn 360ms ease-out forwards;
            }
            @keyframes growBar {
              from { height: 0; }
              to   { height: var(--target-height); }
            }
            .grow-bar {
              height: 0;
              animation: growBar 700ms cubic-bezier(.2,.7,.3,1) forwards;
            }
          `}</style>

          <div className="max-w-6xl mx-auto space-y-5">

            {/* 헤더 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-red-600 hover:text-red-800 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-red-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. SRE 운영 &gt; Chapter 1. Incident Response</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Incident Response (감지→완화→해결→포스트모템)</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                응급실 트리아지 — <strong>표준 4단계 사고 대응 흐름</strong>. <code className="bg-slate-100 px-1 rounded text-xs">Detect</code> /
                <code className="bg-slate-100 px-1 rounded text-xs ml-1">Mitigate</code> /
                <code className="bg-slate-100 px-1 rounded text-xs ml-1">Resolve</code> /
                <code className="bg-slate-100 px-1 rounded text-xs ml-1">Postmortem</code>의 4 phase를 시간 흐름대로 따라간다.
              </p>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <IncidentLivePane step={step} stepIdx={stepIdx} />
              <CodeViewer code={step.code} shell={step.shell} stepIdx={stepIdx} />
            </div>

            {/* 설명 */}
            <div className="p-4 rounded-xl bg-red-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-red-200">Step {stepIdx + 1} / {STEPS.length} {step.title}</h3>
                <span className="text-xs text-red-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 마지막 단계: 다음 안내 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="p-3 rounded-xl bg-red-50 border-2 border-red-300 text-red-900 text-sm">
                💡 다음(V-2-1)에서는 <strong>OnCall + Runbook</strong> — 당직 로테이션과 표준 대응 매뉴얼
              </div>
            )}

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setStepIdx(0); setIsPlaying(false); }} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                처음
              </button>
              <button onClick={handlePrev} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                &larr; 이전
              </button>
              <button onClick={togglePlay}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-red-600 text-white hover:bg-red-700 transition min-w-[96px]">
                {isPlaying ? '⏸ 일시정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./V-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; V-1-1 SLI/SLO/SLA</a>
              <a href="./V-2-1.html" className="text-red-600 hover:text-red-800 font-medium">V-2-1 OnCall + Runbook &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
