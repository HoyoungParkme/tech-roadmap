            )}

            {/* ── Step 2: Runbook 페이지 */}
            {step.focus === 'runbook' && (
              <div className="space-y-2">
                <div className="bg-slate-900 rounded-t-md px-3 py-1.5 flex items-center gap-2">
                  <span className="text-[10px] text-slate-400 font-mono">📖 wiki/runbook/HighLatency.md</span>
                  <span className="ml-auto text-[9px] text-slate-500 font-mono">severity: critical</span>
                </div>
                <div className="border border-slate-200 rounded-b-md p-3 space-y-2">
                  <div className="font-bold text-slate-800 text-sm">HighLatency — p99 &gt; 1.5s</div>
                  <div className="text-[10px] text-slate-500 font-mono">last reviewed: 2026-04-15 · owner: ops-team</div>
                  {RUNBOOK_STEPS.map((s, i) => (
                    <div
                      key={s.n}
                      className="fade-in flex items-start gap-2 p-2 rounded border border-slate-100 bg-slate-50"
                      style={{ animationDelay: `${i * 120}ms` }}
                    >
                      <div className="w-6 h-6 shrink-0 bg-red-600 text-white rounded-full flex items-center justify-center text-[11px] font-bold">{s.n}</div>
                      <div className="flex-1">
                        <div className="text-[11px] font-bold text-slate-800">{s.title}</div>
                        <div className="text-[10px] text-slate-600 leading-snug">{s.body}</div>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="text-[10px] text-red-700 bg-red-50 border border-red-200 rounded p-2 font-bold">
                  ⚠️ alert annotations.runbook 링크 없으면 PR reject
                </div>
              </div>
            )}

            {/* ── Step 3: 응답 흐름도 */}
            {step.focus === 'response' && (
              <div className="space-y-3">
                <div className="text-[11px] text-slate-500 font-mono">incident response flow — Sev1 example</div>
                <div className="space-y-1.5">
                  {RESPONSE_FLOW.map((f, i) => {
                    const t = FLOW_TONE[f.tone];
                    return (
                      <div
                        key={f.id}
                        className="fade-in flex items-center gap-2"
                        style={{ animationDelay: `${i * 180}ms` }}
                      >
                        <div className={`flex-1 rounded-lg border-2 ${t.bg} ${t.border} px-3 py-2 flex items-center gap-3`}>
                          <span className="text-2xl">{f.emoji}</span>
                          <div className="flex-1">
                            <div className={`text-xs font-bold ${t.text}`}>{f.label}</div>
                            <div className="text-[10px] text-slate-600 font-mono">{f.sub}</div>
                          </div>
                          <span className="text-[10px] font-mono text-slate-500">#{i + 1}</span>
                        </div>
                        {i < RESPONSE_FLOW.length - 1 && (
                          <span className="text-slate-300 text-lg shrink-0 w-4 text-center">↓</span>
                        )}
                      </div>
                    );
                  })}
                </div>
                <div className="grid grid-cols-3 gap-2 pt-2 border-t border-slate-100 text-center">
                  <div className="bg-slate-50 rounded p-2">
                    <div className="text-[9px] text-slate-500 font-mono">MTTA</div>
                    <div className="text-sm font-bold text-emerald-700">3분</div>
                    <div className="text-[9px] text-slate-400">목표 5분 ✓</div>
                  </div>
                  <div className="bg-slate-50 rounded p-2">
                    <div className="text-[9px] text-slate-500 font-mono">Mitigate</div>
                    <div className="text-sm font-bold text-emerald-700">22분</div>
                    <div className="text-[9px] text-slate-400">목표 30분 ✓</div>
                  </div>
                  <div className="bg-slate-50 rounded p-2">
                    <div className="text-[9px] text-slate-500 font-mono">MTTR</div>
                    <div className="text-sm font-bold text-emerald-700">27분</div>
                    <div className="text-[9px] text-slate-400">목표 4h ✓</div>
                  </div>
                </div>
              </div>
            )}

            {/* ── Step 4: SRE 문화 지표 */}
            {step.focus === 'healthy' && (
              <div className="space-y-3">
                <div className="text-[11px] text-slate-500 font-mono">SRE culture metrics — 2026 Q2</div>
                <div className="grid grid-cols-2 gap-2">
                  {HEALTHY_METRICS.map((m, i) => (
                    <div
                      key={m.key}
                      className={`fade-in rounded-lg border-2 p-3 ${m.ok ? 'bg-emerald-50 border-emerald-300' : 'bg-red-50 border-red-300'}`}
                      style={{ animationDelay: `${i * 140}ms` }}
                    >
                      <div className="flex items-center justify-between">
                        <span className="text-[11px] font-bold text-slate-700">{m.label}</span>
                        <span className={`text-[10px] font-bold ${m.ok ? 'text-emerald-700' : 'text-red-700'}`}>
                          {m.ok ? '✓ PASS' : '✗ FAIL'}
                        </span>
                      </div>
                      <div className={`text-2xl font-bold mt-1 ${m.ok ? 'text-emerald-800' : 'text-red-800'}`}>{m.value}</div>
                      <div className="text-[10px] text-slate-500 font-mono">target {m.target}</div>
                      <div className="text-[10px] text-slate-500 mt-1">{m.hint}</div>
                    </div>
                  ))}
                </div>
                <div className="bg-slate-50 border border-slate-200 rounded p-2 space-y-1 text-[10px] text-slate-700 leading-snug">
                  <div className="font-bold text-slate-800 mb-1">매니저 책임 (분기 점검)</div>
                  <div>☐ Sev1 호출당 comp time(0.5일) 부여</div>
                  <div>☐ oncall 주 신규 feature 배정 금지</div>
                  <div>☐ 분기 oncall 만족도 설문 (anonymous)</div>
                  <div>☐ 1년 누적 oncall 시간 추적 (집중 방지)</div>
                </div>
              </div>
            )}
          </div>

          <div className="px-4 py-2 border-t border-slate-100 bg-slate-50">
            <div className="text-[11px] text-slate-600 font-bold mb-0.5">{step.title2}</div>
            <div className="text-[10px] text-slate-500 leading-snug">{step.legend}</div>
          </div>
        </div>
      );
    }

    // ── 우측: VSCode 스타일 코드 뷰어
    function CodeViewer({ code, stepIdx }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [stepIdx]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 px-2 py-0.5 rounded bg-slate-700/40 font-mono">{code.lang}</span>
          </div>
          <div className="overflow-auto max-h-[28rem] text-xs">
            <pre className="p-0 m-0">
              <code ref={codeRef} className={`language-${code.lang} block !bg-transparent !p-0`}>
{code.lines.map((line, i) => {
  const highlighted = code.highlight && code.highlight.includes(i + 1);
  return (
    <div key={i} className={`flex ${highlighted ? 'bg-yellow-500/10' : ''}`}>
      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-10 shrink-0">{i + 1}</span>
      <span className="pl-3 pr-3 whitespace-pre">{line || ' '}</span>
    </div>
  );
})}
              </code>
            </pre>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);

      const handleNext = () => setStepIdx((i) => (i < STEPS.length - 1 ? i + 1 : i));
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setIsPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[stepIdx];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <style>{`
            @keyframes fadeIn {
              from { opacity: 0; transform: translateY(4px); }
              to   { opacity: 1; transform: translateY(0); }
            }
            .fade-in {
              opacity: 0;
              animation: fadeIn 360ms ease-out forwards;
            }
          `}</style>

          <div className="max-w-6xl mx-auto space-y-5">

            {/* 헤더 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-red-600 hover:text-red-800 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-red-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. 운영 문화 &gt; Chapter 2. OnCall</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">OnCall + Runbook</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                당직 의사 + 진료 매뉴얼 — <strong>24/7 운영 문화의 4축</strong>.
                <code className="bg-slate-100 px-1 rounded text-xs">Rotation</code> /
                <code className="bg-slate-100 px-1 rounded text-xs">Runbook</code> /
                <code className="bg-slate-100 px-1 rounded text-xs">Response</code> /
                <code className="bg-slate-100 px-1 rounded text-xs">Healthy</code>.
              </p>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer code={step.code} stepIdx={stepIdx} />
            </div>

            {/* 설명 */}
            <div className="p-4 rounded-xl bg-red-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-red-200">Step {stepIdx + 1} / {STEPS.length} — {step.title}</h3>
                <span className="text-xs text-red-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 마지막 단계: 다음 안내 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="p-3 rounded-xl bg-red-50 border-2 border-red-300 text-red-900 text-sm">
                💡 다음(V-2-2)에서는 <strong>실전 체크리스트</strong> — Observability 4축 종합
              </div>
            )}

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setStepIdx(0); setIsPlaying(false); }} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                처음
              </button>
              <button onClick={handlePrev} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                &larr; 이전
              </button>
              <button onClick={togglePlay}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-red-600 text-white hover:bg-red-700 transition min-w-[96px]">
                {isPlaying ? '⏸ 일시정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./V-1-2.html" className="text-slate-500 hover:text-slate-700">&larr; V-1-2</a>
              <a href="./V-2-2.html" className="text-red-600 hover:text-red-800 font-medium">V-2-2 실전 체크리스트 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
