<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observability 학습 — II-2-2. Alertmanager 알람 라우팅</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🚒</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-2-2. Alertmanager — 알람 라우팅
    학습 목표: AlertRule 발화 → severity별 routing → Silence → Receiver 채널 분기
    핵심 비유: "119 분류" — 사고 신고가 들어오면 종류별로 다른 곳으로 (critical=PagerDuty, warning=Slack)
    패턴: 좌(LiveDataPane: 라우팅 시각화) / 우(VSCode CodeViewer: alertmanager.yml)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── 4 STEPS — alert가 라우팅 트리를 따라 흘러가는 과정
    const STEPS = [
      {
        focus: 'rule',
        title: 'Step 1. Rule — alert 발화 (HighLatency: p99 > 200ms 5분 지속)',
        desc: 'Prometheus가 PromQL로 "위험 상태"를 판단해 alert를 발생시킨다. 결제 API의 p99 지연이 5분간 200ms를 넘으면 HighLatency가 firing 상태로 바뀐다. for를 두는 이유: 일시적 spike로 매번 호출되면 운영팀이 미쳐버린다. 5분 지속돼야 진짜 문제다.',
        // alert 객체 — 좌측 시각화에 사용
        alert: {
          name: 'HighLatency',
          state: 'firing',
          severity: 'critical',
          team: 'ops',
          service: 'checkout-api',
          summary: 'p99 latency > 200ms (5m sustained)',
          value: '237ms',
          startedAt: '2026-05-07 14:32:10',
        },
        // routing 트리 표시 상태
        routing: { active: null, silenced: false, dispatched: null },
        code: {
          lang: 'yaml',
          filename: 'alert-rules.yml — Prometheus AlertRule',
          lines: [
            '# Prometheus AlertRule — "임계 조건 정의"',
            '# expr(조건) + for(지속시간) + labels(라우팅 키)',
            'groups:',
            '- name: api-latency',
            '  rules:',
            '',
            '  - alert: HighLatency',
            '    expr: |',
            '      histogram_quantile(0.99,',
            '        rate(http_request_duration_seconds_bucket',
            '             {service="checkout-api"}[5m])',
            '      ) > 0.2',
            '    for: 5m                       # 5분 지속돼야 firing',
            '    labels:',
            '      severity: critical          # ← 라우팅 핵심 키',
            '      team: ops',
            '      service: checkout-api',
            '    annotations:',
            '      summary: "p99 latency > 200ms (5m sustained)"',
            '      runbook: "https://wiki/runbook#HighLatency"',
            '',
            '# 핵심 원칙',
            '# - severity 3단계: critical / warning / info',
            '# - team label로 누구한테 갈지 결정',
            '# - for=0 금지 (false alarm 폭탄)',
          ],
          highlight: [7, 13, 15, 16],
        },
      },
      {
        focus: 'routing',
        title: 'Step 2. Routing — severity별 트리 (critical → PagerDuty)',
        desc: 'Alertmanager가 alert를 받으면 route 트리를 따라 내려간다. severity=critical이므로 첫 번째 match에서 잡혀 pagerduty-oncall으로 분기한다. continue:false라 더 이상 다른 route는 보지 않는다. group_by로 같은 알람을 묶고 group_wait로 burst를 합쳐 발송한다.',
        alert: {
          name: 'HighLatency', state: 'firing', severity: 'critical', team: 'ops',
          service: 'checkout-api', summary: 'p99 latency > 200ms (5m sustained)',
          value: '237ms', startedAt: '2026-05-07 14:32:10',
        },
        routing: { active: 'critical', silenced: false, dispatched: null },
        code: {
          lang: 'yaml',
          filename: 'alertmanager.yml — 라우팅 트리',
          lines: [
            '# alertmanager.yml — route 트리 (위→아래 매칭)',
            'route:',
            '  receiver: default-email          # 매칭 안 되면 여기로',
            '  group_by: [alertname, service]   # 같은 알람 묶기',
            '  group_wait: 30s                  # burst 합쳐서 한 번에',
            '  group_interval: 5m',
            '  repeat_interval: 4h              # 미해결 4h마다 재발송',
            '',
            '  routes:',
            '  # 1순위 — critical은 무조건 PagerDuty (새벽이라도 호출)',
            '  - match:',
            '      severity: critical',
            '    receiver: pagerduty-oncall',
            '    continue: false                # 매칭 끝, 다음 route 안 봄',
            '',
            '  # 2순위 — ML팀 warning은 ML 슬랙',
            '  - match:',
            '      severity: warning',
            '      team: ml',
            '    receiver: slack-ml',
            '',
            '  # 3순위 — ops팀 warning은 ops 슬랙',
            '  - match:',
            '      severity: warning',
            '      team: ops',
            '    receiver: slack-ops',
            '',
            '# amtool로 시뮬레이션',
            '# $ amtool config routes test severity=critical team=ops',
            '# → pagerduty-oncall',
          ],
          highlight: [10, 11, 12, 13, 14],
        },
      },
      {
        focus: 'silence',
        title: 'Step 3. Silence — 점검 중 알람 mute (회색 처리)',
        desc: '같은 시각 DB 정기 점검이 잡혀 있다고 가정하자. 운영자가 amtool로 service=checkout-api에 대해 2시간 silence를 걸어두면, route 트리까지 내려갔던 alert가 receiver 직전에서 차단된다. 점검 끝나면 expire로 즉시 만료시키는 게 원칙 — 영구 silence는 사고 원인 1순위다.',
        alert: {
          name: 'HighLatency', state: 'firing', severity: 'critical', team: 'ops',
          service: 'checkout-api', summary: 'p99 latency > 200ms (5m sustained)',
          value: '237ms', startedAt: '2026-05-07 14:32:10',
        },
        routing: { active: 'critical', silenced: true, dispatched: null },
        code: {
          lang: 'yaml',
          filename: 'amtool silence — CLI로 알람 일시 차단',
          lines: [
            '# amtool silence — 점검/배포 중 알람 mute',
            '# 시나리오: 14:00~16:00 checkout-api 정기 점검',
            '',
            '# 1) silence 추가 (matcher + 만료 시간 필수)',
            '$ amtool silence add \\',
            '    service="checkout-api" \\',
            '    --duration=2h \\',
            '    --comment="결제 API 정기 점검 - JIRA OPS-1234" \\',
            '    --author="hong@team.com"',
            '# silence_id: a1b2c3d4-...',
            '',
            '# 2) 활성 silence 목록',
            '$ amtool silence query',
            '# ID         Matchers                Ends At              Author',
            '# a1b2c3d4   service=checkout-api    2026-05-07 16:00 KST hong@...',
            '',
            '# 3) 점검 일찍 끝나면 즉시 만료',
            '$ amtool silence expire a1b2c3d4',
            '',
            '# 절대 규칙',
            '# - duration 없는 silence 금지 (영구 차단 = 사고)',
            '# - comment에 JIRA/배포 티켓 번호 필수',
            '# - 끝나면 본인이 expire (자동 만료 믿지 마라)',
            '# - critical 알람을 silence하면 슬랙에 announce',
          ],
          highlight: [5, 6, 7, 8],
        },
      },
      {
        focus: 'receiver',
        title: 'Step 4. Receiver — Slack/PagerDuty 호출',
        desc: '점검이 끝났다고 가정하고 silence를 expire 하면 alert가 receiver까지 도달한다. critical은 pagerduty-oncall으로 가서 oncall 엔지니어 휴대폰을 울리고, 동시에 slack-ops 채널에도 메시지가 올라간다(보조). 메시지에는 runbook URL이 반드시 포함돼야 새벽에 깬 사람이 뭘 해야 할지 안다.',
        alert: {
          name: 'HighLatency', state: 'firing', severity: 'critical', team: 'ops',
          service: 'checkout-api', summary: 'p99 latency > 200ms (5m sustained)',
          value: '237ms', startedAt: '2026-05-07 14:32:10',
        },
        routing: { active: 'critical', silenced: false, dispatched: 'pagerduty' },
        code: {
          lang: 'yaml',
          filename: 'alertmanager.yml — receivers + Slack template',
          lines: [
            '# alertmanager.yml — receivers (실제 도착 채널)',
            'receivers:',
            '',
            '# 1) PagerDuty — critical only (전화로 깨움)',
            '- name: pagerduty-oncall',
            '  pagerduty_configs:',
            '  - service_key: <PAGERDUTY_INTEGRATION_KEY>',
            '    description: "{{ .CommonAnnotations.summary }}"',
            '    severity: "{{ .CommonLabels.severity }}"',
            '',
            '# 2) Slack ML팀 — warning + 풍부한 컨텍스트',
            '- name: slack-ml',
            '  slack_configs:',
            '  - api_url: <SLACK_WEBHOOK_URL>',
            '    channel: "#ml-alerts"',
            '    title: "🚨 [{{ .CommonLabels.severity | toUpper }}] {{ .CommonLabels.alertname }}"',
            '    text: |',
            '      *Summary:* {{ .CommonAnnotations.summary }}',
            '      *Service:* {{ .CommonLabels.service }}',
            '      *Started:* {{ (index .Alerts 0).StartsAt }}',
            '      *Runbook:* {{ .CommonAnnotations.runbook }}',
            '',
            '# 3) Slack ops팀',
            '- name: slack-ops',
            '  slack_configs:',
            '  - channel: "#ops-alerts"',
            '    title: "{{ .CommonAnnotations.summary }}"',
            '',
            '# 4) 기본 — Email',
            '- name: default-email',
            '  email_configs:',
            '  - to: "team-default@company.com"',
          ],
          highlight: [4, 5, 6, 7, 8, 9],
        },
      },
    ];

    // ── 좌측: LiveDataPane — Alertmanager 라우팅 시각화
    function LiveDataPane({ step, stepIdx }) {
      const { alert, routing, focus } = step;

      // route 분기 정의
      const ROUTES = [
        { key: 'critical', label: 'severity=critical',          receiver: 'pagerduty-oncall', icon: '📞', color: 'red' },
        { key: 'warn-ml',  label: 'severity=warning + team=ml', receiver: 'slack-ml',         icon: '💬', color: 'amber' },
        { key: 'warn-ops', label: 'severity=warning + team=ops',receiver: 'slack-ops',        icon: '💬', color: 'amber' },
        { key: 'default',  label: '(default)',                  receiver: 'default-email',    icon: '📧', color: 'slate' },
      ];

      const animKey = `step-${stepIdx}`;

      return (
        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          <div className="bg-slate-50 px-4 py-2 flex items-center justify-between border-b border-slate-200">
            <div className="flex items-center gap-2">
              <span className="text-base">🚒</span>
              <span className="text-xs font-bold text-slate-700">Alertmanager 119 분류</span>
            </div>
            <span className="text-[10px] text-slate-500 font-mono">stage: {focus}</span>
          </div>

          <div className="p-4 space-y-3" key={animKey}>

            {/* ── (1) Alert 카드 — Step 1에서 발화 */}
            <div className={`fade-in rounded-lg border-2 p-3 ${focus === 'rule' ? 'bg-red-50 border-red-400 shadow-md shadow-red-200' : 'bg-red-50/60 border-red-300'}`} style={{ animationDelay: '0ms' }}>
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <span className={`text-lg ${focus === 'rule' ? 'animate-pulse' : ''}`}>🚨</span>
                  <span className="text-xs font-bold text-red-700 font-mono">{alert.name}</span>
                  <span className="text-[10px] px-1.5 py-0.5 rounded bg-red-600 text-white font-bold uppercase">{alert.state}</span>
                </div>
                <span className="text-[10px] text-red-600 font-mono">{alert.value}</span>
              </div>
              <div className="mt-1.5 text-[11px] text-slate-700">{alert.summary}</div>
              <div className="mt-1 flex flex-wrap gap-1">
                <span className="text-[10px] px-1.5 py-0.5 rounded bg-red-100 text-red-700 font-mono">severity={alert.severity}</span>
                <span className="text-[10px] px-1.5 py-0.5 rounded bg-slate-100 text-slate-700 font-mono">team={alert.team}</span>
                <span className="text-[10px] px-1.5 py-0.5 rounded bg-slate-100 text-slate-700 font-mono">service={alert.service}</span>
              </div>
            </div>

            {/* ── (2) 화살표 ↓ */}
            <div className="flex justify-center">
              <span className="text-slate-400 text-lg">↓</span>
            </div>

            {/* ── (3) Routing 트리 — Step 2부터 활성 */}
            <div className={`rounded-lg border p-3 ${focus === 'routing' ? 'bg-amber-50 border-amber-400' : 'bg-slate-50 border-slate-200'}`}>
              <div className="text-[10px] font-bold text-slate-600 mb-2 uppercase tracking-wide">🚦 route 트리 (위→아래 매칭)</div>
              <div className="space-y-1.5">
                {ROUTES.map((r, idx) => {
                  const isActive  = routing.active === r.key;
                  const isMatched = stepIdx >= 1 && r.key === routing.active;
                  const isDimmed  = stepIdx >= 1 && routing.active && r.key !== routing.active;
                  return (
                    <div
                      key={r.key}
                      className={`fade-in flex items-center justify-between px-2.5 py-1.5 rounded border text-[11px] font-mono transition-all ${
                        isMatched
                          ? 'bg-red-100 border-red-500 text-red-800 font-bold shadow-sm'
                          : isDimmed
                            ? 'bg-slate-50 border-slate-200 text-slate-400 opacity-50'
                            : 'bg-white border-slate-200 text-slate-600'
                      }`}
                      style={{ animationDelay: `${120 + idx * 80}ms` }}
                    >
                      <span>{isMatched ? '✓ ' : '  '}{r.label}</span>
                      <span className="flex items-center gap-1">
                        <span className="text-slate-300">→</span>
                        <span>{r.icon}</span>
                        <span>{r.receiver}</span>
                      </span>
                    </div>
                  );
                })}
              </div>
              {stepIdx >= 1 && (
                <div className="mt-2 text-[10px] text-slate-500 fade-in" style={{ animationDelay: '500ms' }}>
                  → continue:false → 매칭 즉시 종료, 다음 route 미평가
                </div>
              )}
            </div>

            {/* ── (4) Silence 박스 — Step 3에서 활성 */}
            {stepIdx >= 2 && (
              <>
                <div className="flex justify-center fade-in" style={{ animationDelay: '200ms' }}>
                  <span className="text-slate-400 text-lg">↓</span>
                </div>
                <div
                  className={`fade-in rounded-lg border-2 p-3 ${
                    routing.silenced
                      ? 'bg-slate-200 border-slate-400'
                      : 'bg-emerald-50 border-emerald-300'
                  }`}
                  style={{ animationDelay: '320ms' }}
                >
                  <div className="flex items-center gap-2">
                    <span className="text-lg">{routing.silenced ? '🤐' : '🔕'}</span>
                    <span className={`text-xs font-bold ${routing.silenced ? 'text-slate-600' : 'text-emerald-700'}`}>
                      {routing.silenced ? 'SILENCED — 알람 차단됨' : 'silence 없음 — 통과'}
                    </span>
                  </div>
                  {routing.silenced && (
                    <div className="mt-1.5 text-[10px] text-slate-500 font-mono leading-relaxed">
                      matcher: service="checkout-api"<br/>
                      duration: 2h (~16:00 KST)<br/>
                      comment: 결제 API 정기 점검 - JIRA OPS-1234
                    </div>
                  )}
                </div>
              </>
            )}

            {/* ── (5) Receiver 결과 — Step 4 */}
            {stepIdx >= 3 && !routing.silenced && (
              <>
                <div className="flex justify-center fade-in" style={{ animationDelay: '300ms' }}>
                  <span className="text-slate-400 text-lg">↓</span>
                </div>

                {/* PagerDuty 호출 */}
                <div className="fade-in rounded-lg border-2 border-red-500 bg-red-50 p-3" style={{ animationDelay: '420ms' }}>
                  <div className="flex items-center gap-2">
                    <span className="text-lg animate-pulse">📞</span>
                    <span className="text-xs font-bold text-red-700">PagerDuty incident triggered</span>
                  </div>
                  <div className="mt-1.5 text-[10px] text-slate-700 font-mono leading-relaxed">
                    POST /v2/enqueue<br/>
                    severity: critical → oncall: 홍 (010-****)<br/>
                    status: 202 Accepted (incident_key=I-08F2A1)
                  </div>
                </div>

                {/* Slack 메시지 sample */}
                <div className="fade-in rounded-lg border border-slate-300 bg-white p-3 shadow-sm" style={{ animationDelay: '560ms' }}>
                  <div className="flex items-center gap-2 pb-2 border-b border-slate-100">
                    <span className="w-6 h-6 rounded bg-purple-600 text-white flex items-center justify-center text-[10px] font-bold">A</span>
                    <span className="text-xs font-bold text-slate-700">Alertmanager</span>
                    <span className="text-[10px] text-slate-400">#ops-alerts · 14:32</span>
                  </div>
                  <div className="mt-2 text-[11px] text-slate-800 leading-snug">
                    <div className="font-bold">🚨 [CRITICAL] HighLatency</div>
                    <div className="mt-1 space-y-0.5 text-[10px] font-mono text-slate-600">
                      <div><span className="text-slate-400">Summary:</span> p99 latency &gt; 200ms (5m sustained)</div>
                      <div><span className="text-slate-400">Service:</span> checkout-api</div>
                      <div><span className="text-slate-400">Started:</span> 2026-05-07 14:32:10</div>
                      <div><span className="text-slate-400">Runbook:</span> <span className="text-blue-600 underline">https://wiki/runbook#HighLatency</span></div>
                    </div>
                  </div>
                </div>
              </>
            )}

            {/* Step 3에서 silenced일 때만 — 차단 표시 */}
            {stepIdx >= 2 && routing.silenced && (
              <div className="fade-in rounded-lg bg-slate-100 border border-slate-300 p-3 text-center" style={{ animationDelay: '500ms' }}>
                <div className="text-xs font-bold text-slate-500">📵 Receiver 호출 안 됨 — 운영팀 조용</div>
                <div className="text-[10px] text-slate-400 mt-1">silence 만료(또는 expire) 후 재평가</div>
              </div>
            )}

          </div>
        </div>
      );
    }

    // ── 우측: VSCode 스타일 코드 뷰어
    function CodeViewer({ code, stepIdx }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [stepIdx]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 px-2 py-0.5 rounded bg-slate-700/40 font-mono">{code.lang}</span>
          </div>
          <div className="overflow-auto max-h-[34rem] text-xs">
            <pre className="p-0 m-0">
              <code ref={codeRef} className={`language-${code.lang} block !bg-transparent !p-0`}>
{code.lines.map((line, i) => {
  const highlighted = code.highlight && code.highlight.includes(i + 1);
  return (
    <div key={i} className={`flex ${highlighted ? 'bg-yellow-500/10' : ''}`}>
      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-10 shrink-0">{i + 1}</span>
      <span className="pl-3 pr-3 whitespace-pre">{line || ' '}</span>
    </div>
  );
})}
              </code>
            </pre>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);

      const handleNext = () => setStepIdx((i) => (i < STEPS.length - 1 ? i + 1 : i));
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setIsPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[stepIdx];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <style>{`
            @keyframes fadeIn {
              from { opacity: 0; transform: translateY(4px); }
              to   { opacity: 1; transform: translateY(0); }
            }
            .fade-in {
              opacity: 0;
              animation: fadeIn 360ms ease-out forwards;
            }
          `}</style>

          <div className="max-w-6xl mx-auto space-y-5">

            {/* 헤더 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-red-600 hover:text-red-800 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-red-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. Metrics &amp; Alerting &gt; Chapter 2. Alertmanager</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Alertmanager — 알람 라우팅</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                119 분류 — <strong>alert가 발화되면 severity/team으로 분기</strong>해 PagerDuty·Slack·Email로 보낸다.
                Rule(<code className="bg-slate-100 px-1 rounded text-xs">발화</code>) → Routing(<code className="bg-slate-100 px-1 rounded text-xs">분기</code>)
                → Silence(<code className="bg-slate-100 px-1 rounded text-xs">차단</code>) → Receiver(<code className="bg-slate-100 px-1 rounded text-xs">수신처</code>)
              </p>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer code={step.code} stepIdx={stepIdx} />
            </div>

            {/* 설명 */}
            <div className="p-4 rounded-xl bg-red-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-red-200">Step {stepIdx + 1} / {STEPS.length} — {step.title}</h3>
                <span className="text-xs text-red-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 마지막 단계: 다음 안내 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="p-3 rounded-xl bg-red-50 border-2 border-red-300 text-red-900 text-sm">
                💡 Part II 완성. 다음(III-1-1)에서는 <strong>구조화 로그</strong>
              </div>
            )}

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setStepIdx(0); setIsPlaying(false); }} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                처음
              </button>
              <button onClick={handlePrev} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                &larr; 이전
              </button>
              <button onClick={togglePlay}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-red-600 text-white hover:bg-red-700 transition min-w-[96px]">
                {isPlaying ? '⏸ 일시정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-2-1.html" className="text-slate-500 hover:text-slate-700">&larr; II-2-1 PromQL</a>
              <a href="../part3/III-1-1.html" className="text-red-600 hover:text-red-800 font-medium">III-1-1 구조화 로그 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
