<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observability 학습 — II-1-1. Prometheus 개론 (pull 모델)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🥛</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-1-1. Prometheus 개론 (pull 모델)
    학습 목표: push와 pull 차이를 이해하고 Prometheus가 왜 pull을 채택했는지 안다.
    핵심 비유: "우유 배달 vs 우편" — push(앱이 보냄) vs pull(Prometheus가 가져감)
    패턴: 좌(LiveDataPane — Prometheus 아키텍처 시각화) / 우(VSCode CodeViewer — prometheus.yml)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── 4 STEPS — 좌측 LiveDataPane이 보여줄 시각화 + 우측 코드
    const STEPS = [
      {
        title: 'Step 1. Push 모델 — "앱이 매번 보냄" (한계)',
        desc: 'StatsD/Graphite처럼 push 방식은 애플리케이션이 직접 수집기로 보낸다. 한 서비스가 push를 빠뜨리거나 죽으면 "왜 안 오지?"인지 "원래 안 보내는지" 구분이 안 된다. 우체국에서 우편이 안 오기를 기다리는 셈.',
        focus: 'push',
        legend: 'svc-c가 push 누락 (회색) — 죽었는지 안 보내는지 알 수 없음',
        services: [
          { id: 'a', name: 'svc-a', state: 'pushing' },
          { id: 'b', name: 'svc-b', state: 'pushing' },
          { id: 'c', name: 'svc-c', state: 'silent' },
        ],
        code: {
          lang: 'yaml',
          filename: 'statsd_app.py — push 모델 (한계)',
          lines: [
            '# push 모델 — 앱이 수집기 주소를 알고 매번 send()',
            '# (StatsD/Graphite 방식)',
            '',
            'import statsd',
            '',
            '# ① 앱이 수집기 주소/프로토콜을 알아야 함',
            'c = statsd.StatsClient("graphite.local", 8125)',
            '',
            '@app.post("/login")',
            'def login(payload: dict):',
            '    # ② 매 요청마다 네트워크 호출 — 트래픽 폭증 시 같이 폭증',
            '    c.incr("login.success")',
            '    c.timing("db.query", 42)',
            '    return ok()',
            '',
            '# ③ 한계',
            '# - 앱이 죽으면 push 자체가 멈춤',
            '# - 수집기는 "왜 안 오지?"인지 모름 (죽음? 안 보냄?)',
            '# - 트래픽과 메트릭이 동시 폭증 → 수집기 다운',
            '# - 수신측 주소/포트 변경 시 모든 앱 재배포',
          ],
          highlight: [7, 11, 12],
        },
      },
      {
        title: 'Step 2. Pull 모델 — "Prometheus가 가지러 옴" (scrape)',
        desc: 'Prometheus는 정해진 간격(scrape_interval=15s)으로 각 타깃의 /metrics 엔드포인트를 HTTP GET 한다. 앱은 expose 포맷(텍스트)으로 노출만 하면 끝. scrape 실패 = up 0 으로 죽음 자체를 메트릭화한다. 우유 배달부가 정해진 시간에 우유통을 가지러 오는 구조.',
        focus: 'pull',
        legend: 'Prometheus → 각 서비스 /metrics scrape (15s 간격)',
        services: [
          { id: 'a', name: 'svc-a:9090/metrics', state: 'scraping' },
          { id: 'b', name: 'svc-b:9090/metrics', state: 'scraping' },
          { id: 'c', name: 'svc-c:9090/metrics', state: 'scraping' },
        ],
        code: {
          lang: 'yaml',
          filename: 'prometheus.yml — scrape 설정',
          lines: [
            '# prometheus.yml — pull 모델 (scrape)',
            'global:',
            '  scrape_interval: 15s        # 15초마다 가지러 감',
            '  evaluation_interval: 15s',
            '',
            'scrape_configs:',
            '  - job_name: "my-app"',
            '    static_configs:',
            '      - targets:',
            '          - "svc-a:9090"',
            '          - "svc-b:9090"',
            '          - "svc-c:9090"',
            '    # → Prometheus가 GET http://svc-a:9090/metrics 호출',
            '',
            '# 앱이 노출하는 /metrics 출력 (expose 포맷, 라인 기반)',
            '# HELP http_requests_total Total HTTP requests',
            '# TYPE http_requests_total counter',
            'http_requests_total{method="GET",status="200"} 1027',
            'http_requests_total{method="POST",status="500"} 3',
            '',
            '# 장점',
            '# - 앱은 expose만 하면 됨 (수집기 주소 모름)',
            '# - scrape 실패 = up 0 → 죽음 자체가 메트릭',
            '# - 트래픽과 무관하게 메트릭 트래픽 일정',
          ],
          highlight: [3, 9, 10, 11, 12],
        },
      },
      {
        title: 'Step 3. Service Discovery — "타깃을 자동으로 찾는다"',
        desc: 'K8s에서는 Pod IP가 매번 바뀌어 static_configs로 다 적을 수 없다. kubernetes_sd_configs를 쓰면 label/annotation을 보고 자동 등록. 새 Pod이 뜨면 자동 scrape 대상으로 추가, 죽으면 자동 제거. ServiceMonitor CRD를 쓰면 더 선언적으로 관리한다.',
        focus: 'discovery',
        legend: '새 svc-d가 K8s에 뜨자 SD가 자동 등록 → Prometheus가 scrape 시작',
        services: [
          { id: 'a', name: 'svc-a:9090/metrics', state: 'scraping' },
          { id: 'b', name: 'svc-b:9090/metrics', state: 'scraping' },
          { id: 'c', name: 'svc-c:9090/metrics', state: 'scraping' },
          { id: 'd', name: 'svc-d:9090/metrics', state: 'new' },
        ],
        code: {
          lang: 'yaml',
          filename: 'prometheus.yml — Kubernetes SD',
          lines: [
            '# prometheus.yml — Kubernetes Service Discovery',
            'scrape_configs:',
            '  - job_name: "kubernetes-pods"',
            '    kubernetes_sd_configs:',
            '      - role: pod                       # Pod 단위로 발견',
            '    relabel_configs:',
            '      # annotation prometheus.io/scrape=true 인 Pod만',
            '      - source_labels:',
            '          - __meta_kubernetes_pod_annotation_prometheus_io_scrape',
            '        action: keep',
            '        regex: true',
            '      # annotation prometheus.io/port 로 포트 지정',
            '      - source_labels:',
            '          - __address__',
            '          - __meta_kubernetes_pod_annotation_prometheus_io_port',
            '        action: replace',
            '        regex: ([^:]+)(?::\\d+)?;(\\d+)',
            '        replacement: $1:$2',
            '        target_label: __address__',
            '',
            '# Prometheus Operator 방식 — ServiceMonitor CRD',
            'apiVersion: monitoring.coreos.com/v1',
            'kind: ServiceMonitor',
            'metadata:',
            '  name: my-app',
            'spec:',
            '  selector:',
            '    matchLabels:',
            '      app: my-app                       # 이 label 가진 Service 자동 scrape',
            '  endpoints:',
            '    - port: metrics',
            '      interval: 15s',
            '',
            '# → 새 Pod 뜨면 자동 등록, 죽으면 자동 제거',
          ],
          highlight: [4, 5, 22, 23, 28, 29],
        },
      },
      {
        title: 'Step 4. TSDB — "시계열 DB에 저장" (retention 15일)',
        desc: 'Prometheus는 자체 TSDB(Time Series Database)를 갖는다. 시간 + 메트릭 이름 + label 조합을 시계열로 저장. 15초마다 데이터 포인트가 누적된다. 기본 retention 15일, 로컬 디스크 저장. 장기 보관/멀티 클러스터는 Thanos/Mimir/Cortex로 위임한다.',
        focus: 'tsdb',
        legend: 'TSDB에 15s 간격 데이터 포인트 누적 (시계열 차트)',
        services: [
          { id: 'a', name: 'svc-a:9090/metrics', state: 'scraping' },
          { id: 'b', name: 'svc-b:9090/metrics', state: 'scraping' },
          { id: 'c', name: 'svc-c:9090/metrics', state: 'scraping' },
          { id: 'd', name: 'svc-d:9090/metrics', state: 'scraping' },
        ],
        code: {
          lang: 'yaml',
          filename: 'prometheus.yml — TSDB / retention',
          lines: [
            '# Prometheus 데이터 디렉터리 구조',
            '# /prometheus/data/',
            '#   01HXAB...    # 2시간 단위 block',
            '#   01HXCD...',
            '#   chunks_head/  # 메모리에서 디스크로 flush 중',
            '#   wal/          # Write-Ahead Log (장애 복구용)',
            '#',
            '# /prometheus/data/01HXAB.../',
            '#   chunks/       # 실제 시계열 청크 (압축됨)',
            '#   index         # label → 시계열 인덱스',
            '#   meta.json     # block 메타데이터',
            '',
            '# CLI flag (docker-compose / k8s manifest 에 적용)',
            'command:',
            '  - "--config.file=/etc/prometheus/prometheus.yml"',
            '  - "--storage.tsdb.path=/prometheus/data"',
            '  - "--storage.tsdb.retention.time=15d"',
            '  - "--storage.tsdb.retention.size=50GB"',
            '',
            '# 장기 보관 — remote_write로 Thanos/Mimir에 위임',
            'remote_write:',
            '  - url: "http://thanos-receive:19291/api/v1/receive"',
            '',
            '# Prometheus 자체 = "최근 15일 빠른 조회"',
            '# 장기/멀티 클러스터/다운샘플링 = Thanos에 위임',
          ],
          highlight: [16, 17, 18, 21, 22],
        },
      },
    ];

    // ── 단계별 카드 강조 (Prometheus 아키텍처 4단계)
    const PHASES = [
      { key: 'push',      emoji: '📤', name: 'Push',              note: 'StatsD — 앱이 보냄' },
      { key: 'pull',      emoji: '📥', name: 'Pull',              note: 'scrape /metrics' },
      { key: 'discovery', emoji: '🎯', name: 'Service Discovery', note: 'K8s/EC2 자동 등록' },
      { key: 'tsdb',      emoji: '💾', name: 'TSDB',              note: '시계열 저장 (15d)' },
    ];

    // ── 좌측: Prometheus 아키텍처 LiveDataPane
    function LiveDataPane({ step, stepIdx }) {
      const isPush      = step.focus === 'push';
      const isPull      = step.focus === 'pull';
      const isDiscovery = step.focus === 'discovery';
      const isTsdb      = step.focus === 'tsdb';

      // TSDB 시계열 차트용 — 누적 데이터 포인트 (15s 간격)
      const [tsPoints, setTsPoints] = useState([]);
      useEffect(() => {
        if (!isTsdb) return;
        // 단계 진입 시 0 → 누적
        setTsPoints([]);
        let i = 0;
        const id = setInterval(() => {
          i += 1;
          // 적당히 출렁이는 곡선 (rate 같은 느낌)
          const v = 40 + Math.sin(i * 0.4) * 18 + (i % 3) * 4;
          setTsPoints((prev) => {
            const next = [...prev, Math.max(8, Math.min(90, v))];
            return next.length > 18 ? next.slice(-18) : next;
          });
          if (i > 30) clearInterval(id);
        }, 220);
        return () => clearInterval(id);
      }, [isTsdb, stepIdx]);

      return (
        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          {/* 헤더 */}
          <div className="bg-slate-50 px-4 py-2 flex items-center justify-between border-b border-slate-200">
            <div className="flex items-center gap-2">
              <span className="text-base">🥛</span>
              <span className="text-xs font-bold text-slate-700">Prometheus 아키텍처</span>
            </div>
            <span className="text-[10px] text-slate-500 font-mono">
              {isPush ? 'push (limit)' : `scrape_interval=15s`}
            </span>
          </div>

          {/* 4단계 카드 — 현재 focus 강조 */}
          <div className="px-4 pt-3">
            <div className="grid grid-cols-4 gap-2">
              {PHASES.map((p) => {
                const active = step.focus === p.key;
                return (
                  <div
                    key={p.key}
                    className={`rounded-lg p-2 text-center transition-all duration-300 ${active ? 'bg-red-100 border-2 border-red-400 scale-105 shadow-sm' : 'bg-slate-50 border border-slate-200'}`}
                  >
                    <div className="text-xl">{p.emoji}</div>
                    <div className="text-[11px] font-bold text-slate-800 mt-1">{p.name}</div>
                    <div className="text-[9px] text-slate-500 mt-0.5 leading-tight">{p.note}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* 본문 시각화 */}
          <div className="p-4 min-h-[280px]">
            {/* 중앙: Prometheus 노드 + 좌측 서비스 노드들 + 우측 TSDB */}
            <div className="relative">
              <div className="flex items-stretch gap-4">

                {/* 좌측: 서비스 노드 리스트 */}
                <div className="flex-1 space-y-2" key={`svcs-${stepIdx}`}>
                  {step.services.map((s, idx) => {
                    let cls = 'bg-emerald-50 border-emerald-300 text-emerald-800';
                    let badge = '/metrics';
                    let badgeCls = 'bg-emerald-100 text-emerald-700 border-emerald-300';
                    if (s.state === 'silent') {
                      cls = 'bg-slate-100 border-slate-300 text-slate-400';
                      badge = '✕ 무응답';
                      badgeCls = 'bg-slate-200 text-slate-500 border-slate-300';
                    } else if (s.state === 'pushing') {
                      cls = 'bg-amber-50 border-amber-300 text-amber-800';
                      badge = 'push →';
                      badgeCls = 'bg-amber-100 text-amber-700 border-amber-300';
                    } else if (s.state === 'new') {
                      cls = 'bg-red-50 border-red-400 text-red-800 ring-2 ring-red-300 ring-offset-1';
                      badge = 'NEW (auto)';
                      badgeCls = 'bg-red-100 text-red-700 border-red-300';
                    }
                    return (
                      <div
                        key={`${stepIdx}-${s.id}`}
                        className={`rounded-lg border-2 px-3 py-2 flex items-center justify-between transition-all duration-500 fade-in ${cls}`}
                        style={{ animationDelay: `${idx * 120}ms` }}
                      >
                        <div className="flex items-center gap-2">
                          <span className="text-sm">📦</span>
                          <span className="text-[11px] font-mono font-bold">{s.name}</span>
                        </div>
                        <span className={`text-[9px] font-mono px-1.5 py-0.5 rounded border ${badgeCls}`}>{badge}</span>
                      </div>
                    );
                  })}
                </div>

                {/* 화살표 영역 (push: 좌→우 / pull/discovery: 우→좌) */}
                <div className="w-16 flex flex-col items-center justify-center gap-2 relative">
                  {step.services.map((s, idx) => {
                    if (isPush) {
                      const muted = s.state === 'silent';
                      return (
                        <div key={`arr-${s.id}`} className="h-7 flex items-center justify-center w-full">
                          <div className={`w-full h-0.5 ${muted ? 'bg-slate-300' : 'bg-amber-400'} relative ${muted ? '' : 'arrow-push'}`}
                               style={{ animationDelay: `${idx * 200}ms` }}>
                            <span className={`absolute right-0 top-1/2 -translate-y-1/2 text-[10px] ${muted ? 'text-slate-400' : 'text-amber-600'}`}>▶</span>
                          </div>
                        </div>
                      );
                    }
                    // pull / discovery / tsdb — Prometheus가 가지러 옴 (우→좌)
                    const isNew = s.state === 'new';
                    return (
                      <div key={`arr-${s.id}`} className="h-7 flex items-center justify-center w-full">
                        <div className={`w-full h-0.5 ${isNew ? 'bg-red-500' : 'bg-red-400'} relative arrow-pull`}
                             style={{ animationDelay: `${idx * 200}ms` }}>
                          <span className={`absolute left-0 top-1/2 -translate-y-1/2 text-[10px] ${isNew ? 'text-red-700' : 'text-red-600'}`}>◀</span>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* 우측: Prometheus 서버 노드 */}
                <div className="w-44 shrink-0 flex flex-col">
                  <div className={`rounded-lg border-2 p-3 text-center transition-all ${isPush ? 'bg-slate-100 border-slate-300 text-slate-500' : 'bg-red-600 border-red-700 text-white shadow-lg shadow-red-500/30'}`}>
                    <div className="text-2xl">🔥</div>
                    <div className="text-xs font-bold mt-1">Prometheus</div>
                    <div className="text-[9px] mt-0.5 opacity-80">
                      {isPush ? '(수집기 — push 대기)' : (isDiscovery ? 'K8s SD enabled' : 'scrape every 15s')}
                    </div>
                  </div>

                  {/* TSDB 칩 — pull 이후 단계에서 보임 */}
                  {!isPush && (
                    <div className={`mt-2 rounded-lg border-2 p-2 transition-all ${isTsdb ? 'bg-red-50 border-red-400' : 'bg-slate-50 border-slate-300'}`}>
                      <div className="flex items-center justify-between">
                        <span className="text-[10px] font-bold text-slate-700">💾 TSDB</span>
                        <span className="text-[9px] font-mono text-slate-500">15d retention</span>
                      </div>
                      {/* 시계열 차트 — TSDB 단계일 때 누적 */}
                      {isTsdb && (
                        <div className="mt-2 h-12 w-full relative bg-white rounded border border-red-200 overflow-hidden">
                          {/* 격자 */}
                          <div className="absolute inset-0">
                            <div className="absolute left-0 right-0 top-1/3 border-t border-dashed border-red-100" />
                            <div className="absolute left-0 right-0 top-2/3 border-t border-dashed border-red-100" />
                          </div>
                          {/* 데이터 포인트 + 라인 */}
                          <svg className="absolute inset-0 w-full h-full" viewBox="0 0 180 48" preserveAspectRatio="none">
                            {tsPoints.length > 1 && (
                              <polyline
                                fill="none"
                                stroke="#dc2626"
                                strokeWidth="1.5"
                                points={tsPoints.map((v, i) => `${(i / 17) * 180},${48 - (v / 100) * 44}`).join(' ')}
                              />
                            )}
                            {tsPoints.map((v, i) => (
                              <circle
                                key={i}
                                cx={(i / 17) * 180}
                                cy={48 - (v / 100) * 44}
                                r="1.6"
                                fill="#dc2626"
                              />
                            ))}
                          </svg>
                          <div className="absolute bottom-0 left-1 text-[8px] font-mono text-red-700 bg-white/80 px-1 rounded">
                            +{tsPoints.length} pts
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>

          {/* 범례 */}
          <div className="px-4 pb-3 pt-2 border-t border-slate-100 bg-slate-50">
            <div className="text-[11px] text-slate-600 font-bold mb-1">{step.title.replace(/^Step \d+\. /, '')}</div>
            <div className="text-[10px] text-slate-500 leading-snug">{step.legend}</div>
          </div>
        </div>
      );
    }

    // ── 우측: VSCode 스타일 코드 뷰어 (highlight.js)
    function CodeViewer({ code, stepIdx }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [stepIdx]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일명 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 px-2 py-0.5 rounded bg-slate-700/40 font-mono">{code.lang}</span>
          </div>
          {/* 코드 + 라인 번호 */}
          <div className="overflow-auto max-h-[28rem] text-xs">
            <pre className="p-0 m-0">
              <code ref={codeRef} className={`language-${code.lang} block !bg-transparent !p-0`}>
{code.lines.map((line, i) => {
  const highlighted = code.highlight && code.highlight.includes(i + 1);
  return (
    <div key={i} className={`flex ${highlighted ? 'bg-yellow-500/10' : ''}`}>
      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-10 shrink-0">{i + 1}</span>
      <span className="pl-3 pr-3 whitespace-pre">{line || ' '}</span>
    </div>
  );
})}
              </code>
            </pre>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);

      const handleNext = () => setStepIdx((i) => (i < STEPS.length - 1 ? i + 1 : i));
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setIsPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[stepIdx];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <style>{`
            @keyframes fadeIn {
              from { opacity: 0; transform: translateY(4px); }
              to   { opacity: 1; transform: translateY(0); }
            }
            .fade-in {
              opacity: 0;
              animation: fadeIn 360ms ease-out forwards;
            }
            @keyframes arrowPullDash {
              from { background-position: 0 0; }
              to   { background-position: 18px 0; }
            }
            .arrow-pull {
              background-image: linear-gradient(to right, #dc2626 50%, transparent 50%);
              background-size: 9px 2px;
              background-repeat: repeat-x;
              animation: arrowPullDash 700ms linear infinite reverse;
            }
            @keyframes arrowPushDash {
              from { background-position: 0 0; }
              to   { background-position: 18px 0; }
            }
            .arrow-push {
              background-image: linear-gradient(to right, #f59e0b 50%, transparent 50%);
              background-size: 9px 2px;
              background-repeat: repeat-x;
              animation: arrowPushDash 1100ms linear infinite;
            }
          `}</style>

          <div className="max-w-6xl mx-auto space-y-5">

            {/* 헤더 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-red-600 hover:text-red-800 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-red-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. Observability &gt; Chapter 1. Metrics</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Prometheus 개론 (pull 모델)</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                우유 배달 vs 우편 — <strong>누가 가지러 가느냐</strong>의 차이.
                Prometheus는 <code className="bg-slate-100 px-1 rounded text-xs">scrape_interval</code>마다
                각 타깃의 <code className="bg-slate-100 px-1 rounded text-xs">/metrics</code>를 직접 가져온다.
              </p>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer code={step.code} stepIdx={stepIdx} />
            </div>

            {/* 설명 */}
            <div className="p-4 rounded-xl bg-red-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-red-200">Step {stepIdx + 1} / {STEPS.length} — {step.title}</h3>
                <span className="text-xs text-red-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 마지막 단계: 다음 안내 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="p-3 rounded-xl bg-red-50 border-2 border-red-300 text-red-900 text-sm">
                💡 다음(II-1-2)에서는 <strong>PromQL 쿼리</strong> — rate, histogram_quantile, sum by (...) 등
              </div>
            )}

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setStepIdx(0); setIsPlaying(false); }} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                처음
              </button>
              <button onClick={handlePrev} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                &larr; 이전
              </button>
              <button onClick={togglePlay}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-red-600 text-white hover:bg-red-700 transition min-w-[96px]">
                {isPlaying ? '⏸ 일시정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./II-1-2.html" className="text-red-600 hover:text-red-800 font-medium">II-1-2 PromQL &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
