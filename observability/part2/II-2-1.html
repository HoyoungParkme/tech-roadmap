<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observability 학습 — II-2-1. Grafana 대시보드</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>✈️</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

</head>
<body>
  <div id="root"></div>

  <!--
    II-2-1. Grafana 대시보드
    학습 목표: panel / variable / datasource / provisioning 4요소로 운영 대시보드 구성
    핵심 비유: "항공기 조종석" — Latency / 에러율 / QPS / 자원 한 보드에
    패턴: observability 표준 — 좌(LiveDataPane: Grafana 조종석 모방) / 우(VSCode grafana.json)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── 라인 차트 더미 데이터 (단위: 초)
    // 4개 단계마다 패널이 어떻게 변하는지 보여준다
    const SERIES_PROD_FRAUD = [
      0.12, 0.13, 0.11, 0.14, 0.13, 0.15, 0.18, 0.21, 0.25, 0.28,
      0.32, 0.41, 0.55, 0.62, 0.48, 0.35, 0.27, 0.22, 0.19, 0.17,
      0.16, 0.15, 0.14, 0.14,
    ];
    const SERIES_PROD_RECOMMEND = [
      0.08, 0.09, 0.08, 0.10, 0.09, 0.11, 0.10, 0.12, 0.11, 0.13,
      0.12, 0.14, 0.13, 0.15, 0.14, 0.13, 0.12, 0.11, 0.10, 0.09,
      0.10, 0.09, 0.08, 0.08,
    ];
    const SERIES_STAGING_FRAUD = [
      0.05, 0.06, 0.05, 0.07, 0.06, 0.08, 0.07, 0.09, 0.08, 0.10,
      0.09, 0.11, 0.10, 0.12, 0.11, 0.10, 0.09, 0.08, 0.07, 0.06,
      0.07, 0.06, 0.05, 0.05,
    ];

    // 4 STEPS — 각 단계마다 LiveDataPane이 보여줄 항공기 조종석
    const STEPS = [
      {
        title: 'Step 1. Panel — "단일 그래프 한 칸"',
        desc: 'Grafana 대시보드의 최소 단위는 panel이다. PromQL 쿼리 하나의 결과를 시각화 한 칸으로 만든다. 가장 흔한 4종은 Time series(시계열), Stat(단일 숫자), Gauge(게이지), Table(표). p99 latency는 time series, 현재 QPS는 stat, CPU는 gauge로 — "조종석 계기판 1개" 만드는 셈이다.',
        focus: 'panel',
        title2: '단일 패널 — p99 Latency (5m)',
        legend: 'panel 1개 = PromQL 쿼리 1개 + 시각화 1개. dashboard는 panel의 모음.',
        // 좌측 LiveDataPane이 보여줄 패널 상태
        showVariable: false,
        showDatasource: false,
        showProvisioning: false,
        series: [{ name: 'p99', color: 'red', data: SERIES_PROD_FRAUD }],
        thresholdYellow: 0.20,
        thresholdRed: 0.50,
        code: {
          lang: 'yaml',
          filename: 'dashboard.json — panel 정의',
          lines: [
            '# Step 1. panel — 단일 그래프 한 칸 (timeseries)',
            'panels:',
            '  - title: "p99 Latency (5m)"',
            '    type: timeseries           # 시계열 그래프',
            '    targets:',
            '      - expr: |',
            '          histogram_quantile(0.99,',
            '            sum by (le) (',
            '              rate(http_request_duration_seconds_bucket[5m])',
            '            )',
            '          )',
            '        legendFormat: "p99"',
            '    fieldConfig:',
            '      defaults:',
            '        unit: "s"              # 초 단위 표시',
            '        thresholds:',
            '          steps:',
            '            - { color: green,  value: null }',
            '            - { color: yellow, value: 0.2 }   # 200ms 노랑',
            '            - { color: red,    value: 0.5 }   # 500ms 빨강',
            '',
            '  - title: "QPS (now)"',
            '    type: stat                 # 단일 숫자 표시',
            '    targets:',
            '      - expr: sum(rate(http_requests_total[1m]))',
            '',
            '  - title: "CPU 사용률"',
            '    type: gauge                # 0~100 게이지',
            '    targets:',
            '      - expr: avg(rate(process_cpu_seconds_total[5m])) * 100',
          ],
          highlight: [3, 4, 14, 15, 16, 17, 18, 19],
        },
      },
      {
        title: 'Step 2. Variable — "드롭다운으로 같은 보드 재사용"',
        desc: '$env, $service 같은 변수를 정의하면 dashboard 상단에 드롭다운이 생긴다. label_values()로 Prometheus 라벨에서 자동 채움 — 새 서비스 추가해도 보드 수정이 필요 없다. prod ↔ staging, fraud ↔ recommend를 클릭 한 번으로 토글하면서 같은 보드를 재사용한다.',
        focus: 'variable',
        title2: '드롭다운 변수 — $env / $service',
        legend: '$service / $env 선택값에 따라 panel이 즉시 갱신된다 — 보드는 1개로 충분',
        showVariable: true,
        showDatasource: false,
        showProvisioning: false,
        // 변수 선택값에 따라 시리즈가 달라지는 효과 (이 단계에선 prod/fraud)
        selectedEnv: 'prod',
        selectedService: 'fraud',
        series: [
          { name: 'p99 — prod / fraud', color: 'red', data: SERIES_PROD_FRAUD },
        ],
        thresholdYellow: 0.20,
        thresholdRed: 0.50,
        code: {
          lang: 'yaml',
          filename: 'dashboard.json — templating(variable)',
          lines: [
            '# Step 2. variable — $env / $service 드롭다운',
            'templating:',
            '  list:',
            '    - name: env                # $env 로 참조',
            '      type: query',
            '      datasource: Prometheus',
            '      query: label_values(up, env)         # env 라벨 자동 추출',
            '      refresh: 2                 # dashboard 로드 시 갱신',
            '      includeAll: true',
            '',
            '    - name: service             # $service',
            '      type: query',
            '      datasource: Prometheus',
            '      query: label_values(up{env="$env"}, service)  # env에 종속',
            '      refresh: 2',
            '      multi: true               # 여러 개 동시 선택',
            '',
            '# panel 쿼리에서 변수 사용',
            'panels:',
            '  - title: "$service @ $env — p99"',
            '    targets:',
            '      - expr: |',
            '          histogram_quantile(0.99,',
            '            sum by (le) (',
            '              rate(http_request_duration_seconds_bucket{',
            '                env="$env", service=~"$service"',
            '              }[5m])',
            '            )',
            '          )',
            '',
            '# 결과: 보드 1개 → prod/staging × fraud/recommend/search 모두 커버',
          ],
          highlight: [4, 11, 20, 25, 26],
        },
      },
      {
        title: 'Step 3. Datasource — "Metrics + Logs 한 화면"',
        desc: 'Grafana는 Prometheus(metrics)와 Loki(logs)를 같은 dashboard에서 동시에 띄울 수 있다. 같은 시간대에 metric이 튀면 옆 panel의 log를 즉시 확인 — derivedFields로 log line의 trace_id를 클릭하면 Tempo 트레이스로 점프한다. 이게 MTTR(평균 복구 시간)을 분 단위로 깎아주는 핵심 기능이다.',
        focus: 'datasource',
        title2: 'Prometheus + Loki — 같은 보드에서',
        legend: 'metric panel 옆에 log panel — 시간 동기화 + Explore Linking으로 원클릭 점프',
        showVariable: true,
        showDatasource: true,
        showProvisioning: false,
        selectedEnv: 'prod',
        selectedService: 'fraud',
        series: [
          { name: 'p99 — prod / fraud', color: 'red', data: SERIES_PROD_FRAUD },
        ],
        thresholdYellow: 0.20,
        thresholdRed: 0.50,
        code: {
          lang: 'yaml',
          filename: 'datasources.yml — provisioning',
          lines: [
            '# Step 3. datasource — Prometheus + Loki 동시 등록',
            'apiVersion: 1',
            'datasources:',
            '  - name: Prometheus',
            '    type: prometheus',
            '    url: http://prometheus:9090',
            '    isDefault: true',
            '',
            '  - name: Loki',
            '    type: loki',
            '    url: http://loki:3100',
            '    jsonData:',
            '      derivedFields:',
            '        # log line의 trace_id 패턴 → Tempo로 한 번에 점프',
            '        - name: TraceID',
            '          matcherRegex: \'trace_id=(\\w+)\'',
            '          url: \'$${__value.raw}\'',
            '          datasourceUid: tempo',
            '',
            '# 운영 시나리오 (MTTR 단축)',
            '# 1) Prometheus panel: p99 200ms → 800ms 스파이크 발견',
            '# 2) 같은 시간대 Loki panel: ERROR 로그 폭증',
            '# 3) ERROR log 한 줄 클릭 → trace_id → Tempo 트레이스 열림',
            '# 4) DB 쿼리가 느린 span 확인 → 원인 파악 (3분 이내)',
          ],
          highlight: [4, 5, 9, 10, 13, 14, 15],
        },
      },
      {
        title: 'Step 4. Provisioning — "Dashboard as Code"',
        desc: 'UI에서 직접 만든 dashboard는 누가/언제/왜 바꿨는지 추적이 안 된다. JSON/YAML로 git 관리하고 provisioning 디렉토리에 두면 Grafana가 자동 동기화한다. PR 리뷰 → merge → 30초 후 반영. editable: false로 UI 수동 변경을 차단해 일관성을 강제한다.',
        focus: 'provisioning',
        title2: 'IaC — git에서 코드로 패널 정의',
        legend: 'editable: false + git PR 워크플로우 — "누가/언제/왜" 항상 추적',
        showVariable: true,
        showDatasource: true,
        showProvisioning: true,
        selectedEnv: 'prod',
        selectedService: 'fraud',
        series: [
          { name: 'p99 — prod / fraud',     color: 'red',  data: SERIES_PROD_FRAUD },
          { name: 'p99 — prod / recommend', color: 'blue', data: SERIES_PROD_RECOMMEND },
        ],
        thresholdYellow: 0.20,
        thresholdRed: 0.50,
        code: {
          lang: 'yaml',
          filename: 'provisioning/dashboards.yml',
          lines: [
            '# Step 4. provisioning — Dashboard as Code',
            'apiVersion: 1',
            'providers:',
            '  - name: \'team-platform\'',
            '    orgId: 1',
            '    folder: \'Platform\'',
            '    type: file',
            '    disableDeletion: true        # UI에서 삭제 못하게',
            '    editable: false              # UI 수정 차단 (read-only)',
            '    allowUiUpdates: false        # 수정해도 git이 덮어씀',
            '    updateIntervalSeconds: 30',
            '    options:',
            '      path: /etc/grafana/dashboards   # JSON 파일 위치',
            '',
            '# 디렉토리 구조 (git repo)',
            'grafana/',
            '├── provisioning/',
            '│   ├── datasources/',
            '│   │   └── datasources.yml',
            '│   └── dashboards/',
            '│       └── dashboards.yml',
            '└── dashboards/',
            '    ├── platform-overview.json',
            '    ├── fraud-detector.json',
            '    └── recommend-api.json',
            '',
            '# 운영 워크플로우',
            '$ vim dashboards/fraud-detector.json    # 패널 추가',
            '$ git commit -m "feat: add error rate panel"',
            '$ git push                              # PR 리뷰 → merge',
            '# → ArgoCD/Helm이 grafana pod에 동기화 → 30초 후 반영',
          ],
          highlight: [8, 9, 10, 28, 29, 30],
        },
      },
    ];

    // ── 색상 매핑 (시리즈별)
    const SERIES_COLOR = {
      red:  { stroke: '#ef4444', fill: 'rgba(239, 68, 68, 0.18)',  dot: 'bg-red-500',  text: 'text-red-700'  },
      blue: { stroke: '#3b82f6', fill: 'rgba(59, 130, 246, 0.16)', dot: 'bg-blue-500', text: 'text-blue-700' },
    };

    // ── 라인 차트 SVG (단일 패널)
    function LineChart({ series, thresholdYellow, thresholdRed }) {
      // viewBox: 0~400 가로, 0~120 세로 (위가 0 = 값이 큼)
      const W = 400;
      const H = 120;
      const Y_MAX = 0.7;             // 0~0.7s 범위로 그림 (스케일 고정)
      const N = series[0].data.length;

      const xAt = (i) => (i / (N - 1)) * W;
      const yAt = (v) => H - (v / Y_MAX) * H;

      // 시간축 ticks (0, 5, 10, 15, 20m 등)
      const xTicks = [0, 6, 12, 18, 23];

      return (
        <svg viewBox={`0 0 ${W} ${H + 22}`} className="w-full" preserveAspectRatio="none">
          {/* 격자 가로선 */}
          {[0, 0.2, 0.4, 0.6].map((v) => (
            <line key={v} x1="0" x2={W} y1={yAt(v)} y2={yAt(v)} stroke="#e2e8f0" strokeWidth="1" />
          ))}
          {/* threshold 라인 */}
          <line x1="0" x2={W} y1={yAt(thresholdYellow)} y2={yAt(thresholdYellow)}
                stroke="#f59e0b" strokeWidth="1" strokeDasharray="3 3" opacity="0.7" />
          <line x1="0" x2={W} y1={yAt(thresholdRed)} y2={yAt(thresholdRed)}
                stroke="#dc2626" strokeWidth="1" strokeDasharray="3 3" opacity="0.7" />

          {/* 각 시리즈 — fill area + line */}
          {series.map((s) => {
            const c = SERIES_COLOR[s.color] || SERIES_COLOR.red;
            const pts = s.data.map((v, i) => `${xAt(i)},${yAt(v)}`).join(' ');
            const areaPts = `0,${H} ${pts} ${W},${H}`;
            return (
              <g key={s.name}>
                <polygon points={areaPts} fill={c.fill} />
                <polyline points={pts} fill="none" stroke={c.stroke} strokeWidth="2" strokeLinejoin="round" />
              </g>
            );
          })}

          {/* x축 라벨 */}
          {xTicks.map((t) => (
            <text key={t} x={xAt(t)} y={H + 14} fontSize="9" fill="#94a3b8" textAnchor="middle" fontFamily="monospace">
              {`-${24 - t}m`}
            </text>
          ))}
          {/* y축 라벨 */}
          {[0.2, 0.5].map((v) => (
            <text key={v} x="2" y={yAt(v) - 2} fontSize="9" fill="#94a3b8" fontFamily="monospace">
              {`${(v * 1000).toFixed(0)}ms`}
            </text>
          ))}
        </svg>
      );
    }

    // ── 좌측: Grafana 항공기 조종석 모방
    function LiveDataPane({ step, stepIdx }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          {/* Grafana 헤더바 (상단 메뉴 + dashboard 제목) */}
          <div className="bg-slate-900 px-3 py-2 flex items-center gap-2 border-b border-slate-700">
            <span className="text-base">✈️</span>
            <span className="text-xs font-bold text-orange-400">Grafana</span>
            <span className="text-slate-500">/</span>
            <span className="text-xs text-slate-300 font-mono">Platform / Service Health</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono">last 24m · refresh 30s</span>
          </div>

          {/* 변수 드롭다운 행 (Step 2 이후) */}
          {step.showVariable ? (
            <div className="bg-slate-50 px-3 py-2 flex items-center gap-2 border-b border-slate-200 flex-wrap">
              <span className="text-[10px] text-slate-500 font-mono">env</span>
              <div className="flex items-center gap-1 bg-white border border-slate-300 rounded px-2 py-0.5 text-[11px] font-mono text-slate-700 shadow-sm">
                <span className="font-bold text-red-700">{step.selectedEnv}</span>
                <span className="text-slate-400">▾</span>
              </div>
              <span className="text-[10px] text-slate-500 font-mono ml-2">service</span>
              <div className="flex items-center gap-1 bg-white border border-slate-300 rounded px-2 py-0.5 text-[11px] font-mono text-slate-700 shadow-sm">
                <span className="font-bold text-red-700">{step.selectedService}</span>
                <span className="text-slate-400">▾</span>
              </div>
              <span className="ml-auto text-[10px] text-slate-400 italic">label_values()로 자동 채움</span>
            </div>
          ) : (
            <div className="bg-slate-50 px-3 py-2 border-b border-slate-200 text-[10px] text-slate-400 italic">
              (변수 드롭다운 없음 — 패널이 고정 라벨로만 동작)
            </div>
          )}

          {/* Datasource 박스 행 (Step 3 이후) */}
          <div className="px-3 py-2 border-b border-slate-100">
            <div className="text-[10px] text-slate-500 font-bold mb-1">Datasources</div>
            <div className="grid grid-cols-2 gap-2">
              <div className={`rounded-md px-2 py-1.5 border text-[11px] font-mono flex items-center gap-1.5 transition-all ${
                step.showDatasource
                  ? 'bg-orange-50 border-orange-300 text-orange-800'
                  : 'bg-slate-50 border-slate-200 text-slate-400'
              }`}>
                <span className="w-2 h-2 rounded-full bg-orange-500"></span>
                <span className="font-bold">Prometheus</span>
                <span className="text-[9px] ml-auto">metrics</span>
              </div>
              <div className={`rounded-md px-2 py-1.5 border text-[11px] font-mono flex items-center gap-1.5 transition-all ${
                step.showDatasource
                  ? 'bg-sky-50 border-sky-300 text-sky-800'
                  : 'bg-slate-50 border-slate-200 text-slate-400 opacity-50'
              }`}>
                <span className="w-2 h-2 rounded-full bg-sky-500"></span>
                <span className="font-bold">Loki</span>
                <span className="text-[9px] ml-auto">logs</span>
              </div>
            </div>
            {step.showDatasource && (
              <div className="text-[10px] text-slate-500 mt-1.5 italic">
                같은 dashboard에서 metric panel 옆에 log panel 배치 가능
              </div>
            )}
          </div>

          {/* 메인 패널 — p99 Latency 라인 차트 */}
          <div className="p-3" key={`pane-${stepIdx}`}>
            <div className="border border-slate-200 rounded-lg overflow-hidden bg-white panel-fade-in">
              {/* 패널 헤더 */}
              <div className="bg-slate-50 px-3 py-1.5 flex items-center justify-between border-b border-slate-200">
                <div className="text-[11px] font-bold text-slate-700">
                  {step.showVariable
                    ? `${step.selectedService} @ ${step.selectedEnv} — p99 Latency (5m)`
                    : 'p99 Latency (5m)'}
                </div>
                <div className="flex items-center gap-2 text-[9px] font-mono">
                  {step.series.map((s) => {
                    const c = SERIES_COLOR[s.color] || SERIES_COLOR.red;
                    return (
                      <span key={s.name} className={`flex items-center gap-1 ${c.text}`}>
                        <span className={`w-2 h-2 rounded-sm ${c.dot}`}></span>
                        {s.name}
                      </span>
                    );
                  })}
                </div>
              </div>
              {/* 차트 본체 */}
              <div className="px-2 pt-2 pb-1 bg-white">
                <LineChart
                  series={step.series}
                  thresholdYellow={step.thresholdYellow}
                  thresholdRed={step.thresholdRed}
                />
              </div>
              {/* threshold 범례 */}
              <div className="bg-slate-50 px-3 py-1 flex items-center gap-3 text-[9px] font-mono border-t border-slate-100">
                <span className="flex items-center gap-1 text-amber-700">
                  <span className="w-3 h-px bg-amber-500" style={{ borderTop: '1px dashed #f59e0b' }}></span>
                  warn 200ms
                </span>
                <span className="flex items-center gap-1 text-red-700">
                  <span className="w-3 h-px bg-red-500" style={{ borderTop: '1px dashed #dc2626' }}></span>
                  crit 500ms
                </span>
              </div>
            </div>
          </div>

          {/* Provisioning 배지 (Step 4) */}
          {step.showProvisioning && (
            <div className="px-3 pb-3">
              <div className="rounded-md bg-emerald-50 border border-emerald-300 px-2 py-1.5 text-[10px] text-emerald-800 font-mono flex items-center gap-2 panel-fade-in">
                <span>📦</span>
                <span className="font-bold">git-managed</span>
                <span className="text-emerald-600">·</span>
                <span>editable: false</span>
                <span className="text-emerald-600">·</span>
                <span>auto-sync 30s</span>
              </div>
            </div>
          )}

          {/* 범례/제목 */}
          <div className="px-4 pb-3 pt-2 border-t border-slate-100 bg-slate-50">
            <div className="text-[11px] text-slate-600 font-bold mb-1">{step.title2}</div>
            <div className="text-[10px] text-slate-500 leading-snug">{step.legend}</div>
          </div>
        </div>
      );
    }

    // ── 우측: VSCode 스타일 코드 뷰어
    function CodeViewer({ code, stepIdx }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [stepIdx]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일명 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 px-2 py-0.5 rounded bg-slate-700/40 font-mono">{code.lang}</span>
          </div>
          {/* 코드 + 라인 번호 */}
          <div className="overflow-auto max-h-[32rem] text-xs">
            <pre className="p-0 m-0">
              <code ref={codeRef} className={`language-${code.lang} block !bg-transparent !p-0`}>
{code.lines.map((line, i) => {
  const highlighted = code.highlight && code.highlight.includes(i + 1);
  return (
    <div key={i} className={`flex ${highlighted ? 'bg-yellow-500/10' : ''}`}>
      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-10 shrink-0">{i + 1}</span>
      <span className="pl-3 pr-3 whitespace-pre">{line || ' '}</span>
    </div>
  );
})}
              </code>
            </pre>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);

      const handleNext = () => setStepIdx((i) => (i < STEPS.length - 1 ? i + 1 : i));
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setIsPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[stepIdx];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <style>{`
            @keyframes fadeIn {
              from { opacity: 0; transform: translateY(4px); }
              to   { opacity: 1; transform: translateY(0); }
            }
            .panel-fade-in {
              opacity: 0;
              animation: fadeIn 360ms ease-out forwards;
            }
          `}</style>

          <div className="max-w-6xl mx-auto space-y-5">

            {/* 헤더 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-red-600 hover:text-red-800 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-red-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. Observability &gt; Chapter 2. Visualization</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Grafana 대시보드</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                항공기 조종석 — <strong>panel + variable + datasource + provisioning</strong> 4요소.
                Latency / 에러율 / QPS / 자원을 한 보드에 모아 운영 중 이상을 즉시 본다.
              </p>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer code={step.code} stepIdx={stepIdx} />
            </div>

            {/* 설명 */}
            <div className="p-4 rounded-xl bg-red-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-red-200">Step {stepIdx + 1} / {STEPS.length} — {step.title}</h3>
                <span className="text-xs text-red-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 마지막 단계: 다음 안내 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="p-3 rounded-xl bg-red-50 border-2 border-red-300 text-red-900 text-sm">
                💡 다음(II-2-2)에서는 <strong>Alertmanager — 위험 즉시 통보 (Slack / PagerDuty)</strong>
              </div>
            )}

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setStepIdx(0); setIsPlaying(false); }} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                처음
              </button>
              <button onClick={handlePrev} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                &larr; 이전
              </button>
              <button onClick={togglePlay}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-red-600 text-white hover:bg-red-700 transition min-w-[96px]">
                {isPlaying ? '⏸ 일시정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-1-2.html" className="text-slate-500 hover:text-slate-700">&larr; II-1-2 PromQL</a>
              <a href="./II-2-2.html" className="text-red-600 hover:text-red-800 font-medium">II-2-2 Alertmanager &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
