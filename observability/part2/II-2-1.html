<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observability 학습 — Grafana 대시보드</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    II-2-1. Grafana 대시보드
    학습 목표: panel/variable/datasource/provisioning 4요소로 운영 대시보드 구성
    핵심 비유: "항공기 조종석" — Latency/에러율/QPS/자원 한 보드에
    구조: 4단계 (panel / variable / datasource / provisioning)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Panel — "단일 그래프 한 칸"',
        desc: 'Grafana 대시보드의 최소 단위는 panel. Time series(시계열), Stat(단일 숫자), Gauge(게이지), Table(표) 4종이 가장 자주 쓰임. PromQL 쿼리 결과를 시각화 형태로 그림. p99 latency는 time series, 현재 QPS는 stat, CPU는 gauge로.',
        block: {
          kind: 'yaml',
          code: `# panel JSON 일부 (dashboard.json)
panels:
  - title: "p99 Latency (5m)"
    type: timeseries           # 시계열 그래프
    targets:
      - expr: |
          histogram_quantile(0.99,
            sum by (le) (rate(http_request_duration_seconds_bucket[5m]))
          )
        legendFormat: "p99"
    fieldConfig:
      defaults:
        unit: "s"              # 초 단위 표시
        thresholds:
          steps:
            - { color: green,  value: null }
            - { color: yellow, value: 0.2 }   # 200ms
            - { color: red,    value: 0.5 }   # 500ms

  - title: "QPS (now)"
    type: stat                 # 단일 숫자
    targets:
      - expr: sum(rate(http_requests_total[1m]))

  - title: "CPU 사용률"
    type: gauge                # 0~100 게이지
    targets:
      - expr: avg(rate(process_cpu_seconds_total[5m])) * 100`,
        },
        focus: 'panel',
      },
      {
        title: 'Step 2. Variable — "드롭다운으로 같은 보드 재사용"',
        desc: '$env, $service 같은 변수를 정의하면 dashboard 상단에 드롭다운이 생김. prod/staging 환경, fraud/recommend 서비스를 골라서 같은 보드를 재사용. label_values() 함수로 Prometheus 라벨에서 자동 채움 → 새 서비스 추가해도 보드 수정 불필요.',
        block: {
          kind: 'yaml',
          code: `# variable 정의 (dashboard.json templating)
templating:
  list:
    - name: env                # $env 로 참조
      type: query
      datasource: Prometheus
      query: label_values(up, env)         # env 라벨 자동 추출
      refresh: 2                 # dashboard 로드 시 갱신
      includeAll: true

    - name: service             # $service
      type: query
      datasource: Prometheus
      query: label_values(up{env="$env"}, service)  # env에 종속
      refresh: 2
      multi: true               # 여러 개 동시 선택

# panel 쿼리에서 변수 사용
panels:
  - title: "$service @ $env — p99"
    targets:
      - expr: |
          histogram_quantile(0.99,
            sum by (le) (
              rate(http_request_duration_seconds_bucket{
                env="$env", service=~"$service"
              }[5m])
            )
          )

# 결과: 한 dashboard로 prod/staging × fraud/recommend/search 다 커버`,
        },
        focus: 'variable',
      },
      {
        title: 'Step 3. Datasource — "Metrics + Logs + Traces 한 화면"',
        desc: 'Grafana는 Prometheus(metrics), Loki(logs), Tempo(traces) 모두 panel로 띄울 수 있음. 같은 시간 범위에 metrics가 튀면 옆 패널 logs를 즉시 확인. log line의 trace_id를 클릭하면 Tempo 트레이스로 점프 — Explore Linking. MTTR 단축의 핵심.',
        block: {
          kind: 'yaml',
          code: `# datasource provisioning (datasources.yml)
apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    url: http://loki:3100
    jsonData:
      derivedFields:
        # log에서 trace_id 패턴 발견 → Tempo로 링크
        - name: TraceID
          matcherRegex: 'trace_id=(\\w+)'
          url: '$\${__value.raw}'
          datasourceUid: tempo

  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200
    jsonData:
      tracesToLogs:
        datasourceUid: loki     # trace → 관련 log 역방향
        tags: ['service', 'pod']

# 운영 시나리오
# 1) Prometheus panel: p99 200ms → 800ms 스파이크 발견
# 2) 같은 시간대 Loki panel: ERROR 로그 폭증
# 3) ERROR log 한 줄 클릭 → trace_id → Tempo 트레이스 열림
# 4) DB 쿼리가 느린 span 확인 → 원인 파악 (3분 이내)`,
        },
        focus: 'datasource',
      },
      {
        title: 'Step 4. Provisioning — "Dashboard as Code"',
        desc: 'UI에서 직접 만든 dashboard는 누가/언제/왜 바꿨는지 추적 안 됨. JSON/YAML로 git 관리하고 provisioning 디렉토리에 두면 Grafana가 자동 동기화. PR 리뷰 → merge → 배포. UI 수동 변경 금지 정책으로 일관성 유지.',
        block: {
          kind: 'yaml',
          code: `# provisioning/dashboards/dashboards.yml
apiVersion: 1
providers:
  - name: 'team-platform'
    orgId: 1
    folder: 'Platform'
    type: file
    disableDeletion: true        # UI에서 삭제 못하게
    editable: false              # UI 수정 차단 (read-only)
    allowUiUpdates: false        # 수정해도 git이 덮어씀
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/dashboards   # JSON 파일 위치

# 디렉토리 구조 (git repo)
grafana/
├── provisioning/
│   ├── datasources/
│   │   └── datasources.yml
│   └── dashboards/
│       └── dashboards.yml
└── dashboards/
    ├── platform-overview.json
    ├── fraud-detector.json
    └── recommend-api.json

# 운영 워크플로우
$ vim dashboards/fraud-detector.json    # 패널 추가
$ git commit -m "feat: add error rate panel"
$ git push                              # PR 리뷰 → merge
# → ArgoCD/Helm이 grafana pod에 동기화 → 30초 후 반영

# UI 수동 변경 금지 정책
# - editable: false 로 강제
# - 변경이 필요하면 반드시 git PR을 거침
# - "누가/언제/왜" 항상 추적 가능`,
        },
        focus: 'provisioning',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const GRAFANA = [
      { key: 'panel',        emoji: '📊', name: 'Panel',        note: '단일 그래프' },
      { key: 'variable',     emoji: '🎛️', name: 'Variable',     note: '드롭다운 (env/service)' },
      { key: 'datasource',   emoji: '🔗', name: 'Datasource',   note: 'Prom/Loki/Tempo 통합' },
      { key: 'provisioning', emoji: '🚀', name: 'Provisioning', note: 'JSON으로 dashboard as code' },
    ];

    function GrafanaCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">✈️ 항공기 조종석 (Grafana 대시보드)</div>
          <div className="grid grid-cols-4 gap-2">
            {GRAFANA.map((g) => {
              const isActive = focus === g.key;
              return (
                <div
                  key={g.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-red-100 border-2 border-red-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{g.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{g.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{g.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Grafana 대시보드</h1>
                <p className="text-sm text-slate-500 mt-1">항공기 조종석 — panel + variable + datasource + provisioning</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <GrafanaCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'provisioning' && (
              <div className="bg-red-50 border-2 border-red-300 rounded-xl p-3 mb-6 text-xs text-red-900">
                💡 다음(II-2-2)에서는 Alertmanager — 위험 즉시 통보 (Slack/PagerDuty)
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
