<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🔌</text></svg>" />

<body>
  <div id="root"></div>

  <!--
    IV-1-2. OpenTelemetry 표준
    학습 목표: OTel이 왜 표준이 되었고, Spec/SDK/Collector/Vendor 구조를 이해한다.
    핵심 비유: "공용 콘센트(220V 표준 규격)" — 어느 백엔드든 같은 규격으로 꽂으면 동작
    패턴: fastapi 표준 — 좌(OTel 아키텍처 시각화) / 우(VSCode 코드)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── 4 STEPS — 각 단계마다 좌측 LiveDataPane이 보여줄 OTel 아키텍처
    const STEPS = [
      {
        title: 'Step 1. Spec — OTel 표준 규격 (OTLP)',
        desc: 'OpenTelemetry는 CNCF 졸업 프로젝트로 Trace/Metrics/Logs 세 신호를 하나의 표준으로 묶는다. 핵심은 OTLP(OpenTelemetry Protocol) — gRPC/HTTP 위에서 protobuf 메시지로 동일한 wire format을 쓴다. 220V 콘센트 규격을 정해두면 어느 가전이든 꽂히듯, 어느 SDK·어느 백엔드든 OTLP만 지키면 서로 연결된다.',
        focus: 'spec',
        code: {
          lang: 'yaml',
          filename: 'otlp_message.yaml — OTel 표준 메시지',
          lines: [
            '# OTLP (OpenTelemetry Protocol) — 세 신호 통합 표준',
            '# 전송: gRPC(:4317) 또는 HTTP(:4318)',
            '# 포맷: protobuf 정의 (opentelemetry-proto repo)',
            '',
            'resourceSpans:',
            '  - resource:',
            '      attributes:',
            '        - key: service.name',
            '          value: { stringValue: "checkout-api" }',
            '        - key: deployment.environment',
            '          value: { stringValue: "prod" }',
            '    scopeSpans:',
            '      - scope: { name: "otel.fastapi", version: "0.45b0" }',
            '        spans:',
            '          - traceId: "5b8aa5a2d2c872e8321cf37308d69df2"',
            '            spanId:  "051581bf3cb55c13"',
            '            name: "POST /checkout"',
            '            kind: SPAN_KIND_SERVER',
            '            startTimeUnixNano: "1714972800000000000"',
            '            endTimeUnixNano:   "1714972800142000000"',
            '            attributes:',
            '              - key: http.method',
            '                value: { stringValue: "POST" }',
            '              - key: http.status_code',
            '                value: { intValue: 200 }',
            '            status: { code: STATUS_CODE_OK }',
            '',
            '# Trace + Metrics + Logs 모두 동일한 wire format',
            '# → SDK와 백엔드가 서로 모르는 사이여도 통신 OK',
          ],
          highlight: [1, 2, 3, 28, 29],
        },
      },
      {
        title: 'Step 2. SDK — 언어별 자동 계측 (Python/Java/Go)',
        desc: 'OTel SDK는 주요 언어(Python·Java·Go·JS·.NET·Ruby 등)에 동일한 API를 제공한다. 핵심은 auto-instrumentation — opentelemetry-instrument 한 줄이면 FastAPI/requests/SQLAlchemy/Redis가 알아서 span을 찍는다. 직접 trace 코드를 짜지 않아도 80%는 커버된다. 콘센트 표준에 맞춘 가전제품(언어별 SDK)이라고 보면 된다.',
        focus: 'sdk',
        code: {
          lang: 'python',
          filename: 'app.py — OTel Python SDK 자동 계측',
          lines: [
            '# pip install opentelemetry-distro \\',
            '#             opentelemetry-exporter-otlp \\',
            '#             opentelemetry-instrumentation-fastapi \\',
            '#             opentelemetry-instrumentation-requests \\',
            '#             opentelemetry-instrumentation-sqlalchemy',
            '',
            'from fastapi import FastAPI',
            'from opentelemetry.instrumentation.fastapi import FastAPIInstrumentor',
            'from opentelemetry.instrumentation.requests import RequestsInstrumentor',
            'from opentelemetry.instrumentation.sqlalchemy import SQLAlchemyInstrumentor',
            '',
            'app = FastAPI()',
            '',
            '# ① 한 줄로 자동 계측 — 모든 라우터 span 자동 부착',
            'FastAPIInstrumentor.instrument_app(app)',
            'RequestsInstrumentor().instrument()       # 나가는 HTTP → 자식 span',
            'SQLAlchemyInstrumentor().instrument()     # SQL → 자식 span',
            '',
            '@app.post("/checkout")',
            'def checkout(order_id: str):',
            '    # 진입/종료가 자동으로 span 으로 기록된다',
            '    return {"ok": True}',
            '',
            '# ② 환경 변수만 설정하면 OTLP exporter 자동 활성화',
            '#   OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317',
            '#   OTEL_SERVICE_NAME=checkout-api',
            '#   OTEL_TRACES_EXPORTER=otlp',
            '',
            '# 실행:  opentelemetry-instrument python app.py',
            '# → 코드 변경 0줄, trace 가 자동으로 Collector 로 전송',
            '',
            '# Java/Go 도 동일 ─ 같은 API, 같은 OTLP 출력',
          ],
          highlight: [14, 15, 16, 17, 29],
        },
      },
      {
        title: 'Step 3. Collector — 중앙 허브 (receiver → processor → exporter)',
        desc: 'OTel Collector는 SDK들이 보내는 텔레메트리를 한곳에서 받아 가공한 뒤 여러 백엔드로 fan-out 한다. 파이프라인은 receiver(수신) → processor(batch/sampling/속성 추가) → exporter(전송) 3단계. 앱은 Collector 주소만 알면 되고, 백엔드 변경은 Collector YAML만 고치면 끝난다. 멀티탭 + 변압기 역할이다.',
        focus: 'collector',
        code: {
          lang: 'yaml',
          filename: 'otel-collector-config.yaml — pipeline 정의',
          lines: [
            '# OTel Collector — receiver / processor / exporter 파이프라인',
            '',
            'receivers:',
            '  otlp:                                # SDK 들이 OTLP 로 push',
            '    protocols:',
            '      grpc: { endpoint: 0.0.0.0:4317 }',
            '      http: { endpoint: 0.0.0.0:4318 }',
            '',
            'processors:',
            '  batch:                               # 배치 묶음 → 효율적 전송',
            '    timeout: 5s',
            '    send_batch_size: 512',
            '  memory_limiter:                      # OOM 방지',
            '    check_interval: 1s',
            '    limit_mib: 400',
            '  resource:                            # 공통 속성 자동 부착',
            '    attributes:',
            '      - key: cluster',
            '        value: prod-seoul',
            '        action: upsert',
            '  tail_sampling:                       # 에러/느린 trace 만 샘플링',
            '    policies:',
            '      - name: errors',
            '        type: status_code',
            '        status_code: { status_codes: [ERROR] }',
            '      - name: slow',
            '        type: latency',
            '        latency: { threshold_ms: 500 }',
            '',
            'exporters:',
            '  otlp/jaeger: { endpoint: jaeger:4317, tls: { insecure: true } }',
            '  otlp/tempo:  { endpoint: tempo:4317,  tls: { insecure: true } }',
            '  prometheus:  { endpoint: 0.0.0.0:8889 }',
            '',
            'service:',
            '  pipelines:',
            '    traces:',
            '      receivers:  [otlp]',
            '      processors: [memory_limiter, resource, tail_sampling, batch]',
            '      exporters:  [otlp/jaeger, otlp/tempo]',
            '    metrics:',
            '      receivers:  [otlp]',
            '      processors: [batch]',
            '      exporters:  [prometheus]',
          ],
          highlight: [3, 9, 30, 36],
        },
      },
      {
        title: 'Step 4. Vendor 무관 — 백엔드 갈아끼우기 (락인 X)',
        desc: '같은 앱 코드를 그대로 두고 Collector의 exporter만 갈아끼우면 Jaeger ↔ Tempo ↔ Datadog ↔ New Relic 어디로든 보낼 수 있다. 마이그레이션 시에는 두 곳에 동시에 fan-out 시켜놓고 비교하다가 한쪽을 떼면 된다. 벤더 락인이 사라져 백엔드 교체 비용이 사실상 0 — 이게 OTel의 가장 큰 가치다.',
        focus: 'vendor',
        code: {
          lang: 'yaml',
          filename: 'exporters.yaml — 같은 앱 코드, exporter 만 교체',
          lines: [
            '# 같은 앱 코드 + 같은 SDK + 같은 Collector',
            '# 바꾸는 건 exporters 블록 하나뿐',
            '',
            'exporters:',
            '  # 1) 오픈소스: Jaeger',
            '  otlp/jaeger:',
            '    endpoint: jaeger:4317',
            '    tls: { insecure: true }',
            '',
            '  # 2) 오픈소스: Grafana Tempo (S3 backed)',
            '  otlp/tempo:',
            '    endpoint: tempo-distributor:4317',
            '    tls: { insecure: true }',
            '',
            '  # 3) SaaS: Datadog',
            '  datadog:',
            '    api:',
            '      site: datadoghq.com',
            '      key:  ${env:DD_API_KEY}',
            '',
            '  # 4) SaaS: New Relic',
            '  otlp/newrelic:',
            '    endpoint: otlp.nr-data.net:4317',
            '    headers:',
            '      api-key: ${env:NR_LICENSE_KEY}',
            '',
            'service:',
            '  pipelines:',
            '    traces:',
            '      receivers:  [otlp]',
            '      processors: [batch]',
            '      # 동시에 여러 곳으로 fan-out — 마이그레이션 시 유용',
            '      exporters:  [otlp/jaeger, otlp/tempo, datadog]',
            '',
            '# 벤더 변경 = exporters 한 줄 수정',
            '# 앱 코드 / SDK 호출 / 비즈니스 로직: 0 변경',
          ],
          highlight: [5, 10, 15, 21, 33],
        },
      },
    ];

    // ─────────────────────────────────────────────────────────
    // 좌측 LiveDataPane — OTel 아키텍처 시각화
    // ─────────────────────────────────────────────────────────
    function OtelArchitecture({ step, stepIdx }) {
      const focus = step.focus;
      const animKey = `step-${stepIdx}`;

      return (
        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          <div className="bg-slate-50 px-4 py-2 flex items-center justify-between border-b border-slate-200">
            <div className="flex items-center gap-2">
              <span className="text-base">🔌</span>
              <span className="text-xs font-bold text-slate-700">OpenTelemetry — 공용 콘센트</span>
            </div>
            <span className="text-[10px] text-slate-500 font-mono">CNCF Graduated · OTLP v1</span>
          </div>

          <div className="p-4 space-y-3 min-h-[440px]" key={animKey}>

            {/* Step 1: Spec — 표준 규격 박스 */}
            <SpecBox active={focus === 'spec'} dimmed={focus !== 'spec'} />

            {/* 화살표 */}
            <ArrowDown active={['sdk','collector','vendor'].includes(focus)} />

            {/* Step 2: SDK — 3 언어 박스 */}
            <SdkRow active={focus === 'sdk'} dimmed={!['sdk','collector','vendor'].includes(focus)} />

            {/* 화살표 — OTLP wire */}
            <ArrowDown active={['collector','vendor'].includes(focus)} label="OTLP/gRPC :4317" />

            {/* Step 3: Collector — pipeline */}
            <CollectorBox active={focus === 'collector'} dimmed={!['collector','vendor'].includes(focus)} />

            {/* 화살표 */}
            <ArrowDown active={focus === 'vendor'} label="OTLP fan-out" />

            {/* Step 4: Vendor — 4 백엔드 */}
            <VendorRow active={focus === 'vendor'} dimmed={focus !== 'vendor'} />
          </div>

          <div className="px-4 pb-3 pt-2 border-t border-slate-100 bg-slate-50">
            <div className="text-[11px] text-slate-600 font-bold mb-1">{step.title.replace(/^Step \d+\. /, '')}</div>
            <div className="text-[10px] text-slate-500 leading-snug">
              {focus === 'spec'      && 'OTLP — Trace/Metrics/Logs 통합 표준 wire format'}
              {focus === 'sdk'       && '언어별 SDK + auto-instrumentation — 코드 0줄로 계측'}
              {focus === 'collector' && 'receiver → processor → exporter 파이프라인'}
              {focus === 'vendor'    && '같은 코드, 다른 백엔드 — 락인 0'}
            </div>
          </div>
        </div>
      );
    }

    // ── Step 1: Spec 박스
    function SpecBox({ active, dimmed }) {
      const cls = active
        ? 'bg-red-50 border-2 border-red-400 shadow-lg shadow-red-200/50 scale-[1.02]'
        : dimmed
        ? 'bg-slate-50 border border-slate-200 opacity-60'
        : 'bg-white border border-slate-300';
      return (
        <div className={`rounded-lg p-3 transition-all duration-500 ${cls} fade-in`}>
          <div className="flex items-center gap-2 mb-2">
            <span className="text-lg">📐</span>
            <span className="text-sm font-bold text-slate-800">Spec — OTLP Protocol</span>
            {active && <span className="ml-auto text-[10px] bg-red-600 text-white px-2 py-0.5 rounded-full font-bold">FOCUS</span>}
          </div>
          <div className="grid grid-cols-3 gap-2">
            {[
              { name: 'Trace',   icon: '🚇', color: 'bg-red-100 text-red-700 border-red-300' },
              { name: 'Metrics', icon: '📊', color: 'bg-amber-100 text-amber-700 border-amber-300' },
              { name: 'Logs',    icon: '📜', color: 'bg-blue-100 text-blue-700 border-blue-300' },
            ].map((s) => (
              <div key={s.name} className={`rounded border ${s.color} px-2 py-1.5 text-center`}>
                <div className="text-base">{s.icon}</div>
                <div className="text-[10px] font-bold">{s.name}</div>
              </div>
            ))}
          </div>
          <div className="mt-2 text-center text-[10px] text-slate-500 font-mono">통합 표준 wire format · gRPC/HTTP + protobuf</div>
        </div>
      );
    }

    // ── Step 2: SDK 3 언어 박스
    function SdkRow({ active, dimmed }) {
      const cls = active
        ? 'bg-red-50 border-2 border-red-400 shadow-lg shadow-red-200/50 scale-[1.02]'
        : dimmed
        ? 'bg-slate-50 border border-slate-200 opacity-60'
        : 'bg-white border border-slate-300';
      const langs = [
        { name: 'Python', icon: '🐍', extra: 'opentelemetry-instrument' },
        { name: 'Java',   icon: '☕', extra: '-javaagent:otel.jar' },
        { name: 'Go',     icon: '🐹', extra: 'otel-go SDK' },
      ];
      return (
        <div className={`rounded-lg p-3 transition-all duration-500 ${cls} fade-in`}>
          <div className="flex items-center gap-2 mb-2">
            <span className="text-lg">🛠️</span>
            <span className="text-sm font-bold text-slate-800">SDK — 언어별 자동 계측</span>
            {active && <span className="ml-auto text-[10px] bg-red-600 text-white px-2 py-0.5 rounded-full font-bold">FOCUS</span>}
          </div>
          <div className="grid grid-cols-3 gap-2">
            {langs.map((l) => (
              <div key={l.name} className="rounded border border-slate-300 bg-white px-2 py-2 text-center">
                <div className="text-xl">{l.icon}</div>
                <div className="text-[11px] font-bold text-slate-800">{l.name}</div>
                <div className="text-[9px] text-slate-500 font-mono mt-0.5 truncate">{l.extra}</div>
              </div>
            ))}
          </div>
          <div className="mt-2 text-center text-[10px] text-slate-600 font-mono">
            <span className="bg-emerald-100 text-emerald-700 border border-emerald-300 rounded px-2 py-0.5">auto-instrument</span>
            <span className="mx-1">→</span>
            FastAPI · requests · SQLAlchemy · Redis 자동 span
          </div>
        </div>
      );
    }

    // ── Step 3: Collector pipeline
    function CollectorBox({ active, dimmed }) {
      const cls = active
        ? 'bg-red-50 border-2 border-red-400 shadow-lg shadow-red-200/50 scale-[1.02]'
        : dimmed
        ? 'bg-slate-50 border border-slate-200 opacity-60'
        : 'bg-white border border-slate-300';
      const stages = [
        { name: 'receiver',  icon: '📥', detail: 'otlp :4317',          color: 'bg-sky-100 text-sky-800 border-sky-300' },
        { name: 'processor', icon: '⚙️', detail: 'batch · sample',      color: 'bg-violet-100 text-violet-800 border-violet-300' },
        { name: 'exporter',  icon: '📤', detail: 'otlp/jaeger',         color: 'bg-emerald-100 text-emerald-800 border-emerald-300' },
      ];
      return (
        <div className={`rounded-lg p-3 transition-all duration-500 ${cls} fade-in`}>
          <div className="flex items-center gap-2 mb-2">
            <span className="text-lg">🔧</span>
            <span className="text-sm font-bold text-slate-800">Collector — pipeline</span>
            {active && <span className="ml-auto text-[10px] bg-red-600 text-white px-2 py-0.5 rounded-full font-bold">FOCUS</span>}
          </div>
          <div className="flex items-center gap-1">
            {stages.map((s, i) => (
              <React.Fragment key={s.name}>
                <div className={`flex-1 rounded border ${s.color} px-2 py-2 text-center`}>
                  <div className="text-base">{s.icon}</div>
                  <div className="text-[11px] font-bold">{s.name}</div>
                  <div className="text-[9px] font-mono opacity-80">{s.detail}</div>
                </div>
                {i < stages.length - 1 && (
                  <div className="text-slate-400 text-lg shrink-0">→</div>
                )}
              </React.Fragment>
            ))}
          </div>
          <div className="mt-2 text-center text-[10px] text-slate-500">
            앱은 Collector 주소만 알면 됨 · 백엔드 교체는 YAML 수정만
          </div>
        </div>
      );
    }

    // ── Step 4: Vendor 4 백엔드
    function VendorRow({ active, dimmed }) {
      const cls = active
        ? 'bg-red-50 border-2 border-red-400 shadow-lg shadow-red-200/50 scale-[1.02]'
        : dimmed
        ? 'bg-slate-50 border border-slate-200 opacity-60'
        : 'bg-white border border-slate-300';
      const vendors = [
        { name: 'Jaeger',    type: 'OSS',  icon: '🟦', color: 'bg-blue-100 text-blue-800 border-blue-300' },
        { name: 'Tempo',     type: 'OSS',  icon: '🟧', color: 'bg-orange-100 text-orange-800 border-orange-300' },
        { name: 'Datadog',   type: 'SaaS', icon: '🟪', color: 'bg-purple-100 text-purple-800 border-purple-300' },
        { name: 'New Relic', type: 'SaaS', icon: '🟩', color: 'bg-green-100 text-green-800 border-green-300' },
      ];
      return (
        <div className={`rounded-lg p-3 transition-all duration-500 ${cls} fade-in`}>
          <div className="flex items-center gap-2 mb-2">
            <span className="text-lg">🎯</span>
            <span className="text-sm font-bold text-slate-800">Vendor — 자유롭게 라우팅</span>
            {active && <span className="ml-auto text-[10px] bg-red-600 text-white px-2 py-0.5 rounded-full font-bold">FOCUS</span>}
          </div>
          <div className="grid grid-cols-4 gap-1.5">
            {vendors.map((v) => (
              <div key={v.name} className={`rounded border ${v.color} px-1 py-1.5 text-center`}>
                <div className="text-base">{v.icon}</div>
                <div className="text-[10px] font-bold leading-tight">{v.name}</div>
                <div className="text-[8px] opacity-70 font-mono">{v.type}</div>
              </div>
            ))}
          </div>
          <div className="mt-2 text-center text-[10px] text-slate-500">
            벤더 변경 = exporters YAML 한 줄 · 앱 코드 0 변경
          </div>
        </div>
      );
    }

    // ── 단계 사이 화살표
    function ArrowDown({ active, label }) {
      return (
        <div className="flex flex-col items-center -my-1">
          <div className={`text-2xl leading-none transition-all duration-500 ${active ? 'text-red-500' : 'text-slate-300'}`}>
            ↓
          </div>
          {label && (
            <div className={`text-[9px] font-mono transition-colors ${active ? 'text-red-600 font-bold' : 'text-slate-400'}`}>
              {label}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer
    // ─────────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [stepIdx]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 px-2 py-0.5 rounded bg-slate-700/40 font-mono">{code.lang}</span>
          </div>
          <div className="overflow-auto max-h-[28rem] text-xs">
            <pre className="p-0 m-0">
              <code ref={codeRef} className={`language-${code.lang} block !bg-transparent !p-0`}>
{code.lines.map((line, i) => {
  const highlighted = code.highlight && code.highlight.includes(i + 1);
  return (
    <div key={i} className={`flex ${highlighted ? 'bg-yellow-500/10' : ''}`}>
      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-10 shrink-0">{i + 1}</span>
      <span className="pl-3 pr-3 whitespace-pre">{line || ' '}</span>
    </div>
  );
})}
              </code>
            </pre>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);

      const handleNext = () => setStepIdx((i) => (i < STEPS.length - 1 ? i + 1 : i));
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setIsPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[stepIdx];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <style>{`
            @keyframes fadeIn {
              from { opacity: 0; transform: translateY(4px); }
              to   { opacity: 1; transform: translateY(0); }
            }
            .fade-in {
              animation: fadeIn 360ms ease-out;
            }
          `}</style>

          <div className="max-w-6xl mx-auto space-y-5">

            {/* 헤더 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-red-600 hover:text-red-800 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-red-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. Observability &gt; Chapter 1. Tracing</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">OpenTelemetry 표준</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                공용 콘센트 — <strong>어느 백엔드든 같은 규격으로 꽂는다</strong>.
                <code className="bg-slate-100 px-1 rounded text-xs">Spec</code> /
                <code className="bg-slate-100 px-1 rounded text-xs">SDK</code> /
                <code className="bg-slate-100 px-1 rounded text-xs">Collector</code> /
                <code className="bg-slate-100 px-1 rounded text-xs">Vendor 무관</code> 4 단계로 락인 없는 관측 표준을 만든다.
              </p>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <OtelArchitecture step={step} stepIdx={stepIdx} />
              <CodeViewer code={step.code} stepIdx={stepIdx} />
            </div>

            {/* 설명 */}
            <div className="p-4 rounded-xl bg-red-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-red-200">Step {stepIdx + 1} / {STEPS.length} — {step.title}</h3>
                <span className="text-xs text-red-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 마지막 단계: 다음 안내 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="p-3 rounded-xl bg-red-50 border-2 border-red-300 text-red-900 text-sm">
                💡 다음(IV-2-1)에서는 <strong>Jaeger / Tempo</strong>
              </div>
            )}

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setStepIdx(0); setIsPlaying(false); }} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                처음
              </button>
              <button onClick={handlePrev} disabled={stepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                &larr; 이전
              </button>
              <button onClick={togglePlay}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-red-600 text-white hover:bg-red-700 transition min-w-[96px]">
                {isPlaying ? '⏸ 일시정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; IV-1-1 Trace/Span 개론</a>
              <a href="./IV-2-1.html" className="text-red-600 hover:text-red-800 font-medium">IV-2-1 Jaeger / Tempo &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
