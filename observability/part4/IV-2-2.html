<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observability 학습 — 분산 시스템 디버깅 흐름</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-2-2. 분산 시스템 디버깅 흐름
    학습 목표: Metrics → Logs → Traces 순서로 5xx 알람을 추적하는 실전 디버깅 루틴 체득
    핵심 비유: "병원 내원 기록 역추적" — 알람=내원, Metrics=활력, Logs=진료기록, Traces=동선
    구조: 4단계 (alert / isolate / logs / root)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 알람 — "새벽 3시 Slack 호출 (환자 내원)"',
        desc: 'Alertmanager가 SLO 위반(checkout API p99 > 500ms)을 감지하고 #ops-oncall로 호출. 잠 깨고 노트북 연다. 첫 행동은 "큰 그림부터" — 어느 서비스가 어떤 패턴으로 아픈지 활력(Metrics)으로 본다. 절대 로그부터 grep하지 마라 — 시야가 좁아진다.',
        block: {
          kind: 'shell',
          code: `# Slack #ops-oncall — 03:14 KST
┌─────────────────────────────────────────────────────────────┐
│ 🚨 [CRITICAL] CheckoutLatencyHigh                            │
│ ─────────────────────────────────────────────────────────── │
│ Summary  : checkout API p99 latency > 500ms (SLO 위반)       │
│ Service  : checkout-api  /  Cluster: prod-asia               │
│ Started  : 2026-05-06 03:11:42 KST  (3분 지속)               │
│ Runbook  : https://wiki/runbook#CheckoutLatencyHigh          │
│ Grafana  : https://grafana/d/checkout?from=now-1h            │
│ Silence  : https://alertmanager/#/silences/new               │
└─────────────────────────────────────────────────────────────┘

# 첫 30초 — Acknowledge 누르고 큰 그림 잡기
$ pd ack --incident=INC-9921 --comment "investigating"

# 다음 행동 (순서 중요!)
1. Grafana 열기 (Metrics — 어디가/얼마나 아픈가)   ← Step 2
2. Loki에서 5xx 로그 (Logs — 무슨 에러인가)         ← Step 3
3. trace_id로 점프 (Traces — 어느 코드가 원인인가) ← Step 4

# 안티패턴
✗ kubectl logs부터 치기 (로그 바다 — 길 잃음)
✗ pod 재시작부터 (증거 휘발 — 사후 분석 불가)`,
        },
        focus: 'alert',
      },
      {
        title: 'Step 2. 격리 — "활력 모니터로 어느 과인지 (RED method)"',
        desc: 'Grafana 대시보드 열고 RED(Rate / Errors / Duration) 3종을 동시에 본다. checkout만 느린지, 같은 시점 traffic 폭증인지, 에러율은 어떻게 변했는지. 이 단계에서 "checkout-api → payment-service 호출이 느림"까지 좁힌다. 아직 코드는 안 본다.',
        block: {
          kind: 'yaml',
          code: `# Grafana 대시보드에서 같은 시간 창(03:00~03:20)으로 3개 패널 동시에 본다

# 1) Rate — traffic 폭증인가? (단순 부하 vs 실제 장애 구분)
sum by (service) (
  rate(http_requests_total{cluster="prod-asia"}[1m])
)
# → checkout 800rps (평소 700rps). 폭증 아님 → 외부 부하 X

# 2) Errors — 5xx 비율 (SLO 핵심 신호)
sum by (service) (
  rate(http_requests_total{status=~"5..", cluster="prod-asia"}[1m])
)
/ sum by (service) (
  rate(http_requests_total{cluster="prod-asia"}[1m])
)
# → checkout: 0.8% → 4.2% (5x ↑)
# → payment : 0.1% → 3.9% (downstream도 같이 ↑)  ← 의심!
# → cart    : 변화 없음

# 3) Duration — p50 / p95 / p99 (꼬리 지연)
histogram_quantile(0.99,
  sum by (le, service) (
    rate(http_request_duration_seconds_bucket[5m])
  )
)
# → checkout p99: 180ms → 540ms
# → payment  p99:  90ms → 460ms   ← 여기가 진짜 환자

# 결론: payment-service가 느려져서 checkout이 같이 죽는 중
# → 다음(Step 3): payment의 5xx 로그를 까본다`,
        },
        focus: 'isolate',
      },
      {
        title: 'Step 3. 본문 검사 — "진료기록 → trace_id 점프"',
        desc: 'Loki에서 payment의 5xx 로그를 LogQL로 잡고, 한 줄을 클릭해 trace_id를 얻는다. 구조화 로그(JSON) + trace_id 주입이 여기서 빛난다 — 한 클릭으로 Logs ↔ Traces가 연결된다. 검색 속도가 곧 MTTR.',
        block: {
          kind: 'yaml',
          code: `# Grafana → Explore → Loki 데이터소스
# 같은 시간 창(03:00~03:20) 유지

# 1) payment의 5xx 로그만 추출 (정규식으로 5\\d\\d 매칭)
{app="payment", cluster="prod-asia"} |~ "5\\d\\d" | json
# → 1분당 ~30 라인 hit. 첫 한 줄을 펼친다

# 2) 한 에러 라인 (JSON 구조화 로그)
{
  "ts": "2026-05-06T03:12:08.214Z",
  "level": "ERROR",
  "service": "payment",
  "endpoint": "/charge",
  "status": 500,
  "user_id": 7421,
  "trace_id": "a3f1c8e2d9b04f7a8e1c2d3b4f5a6c7d",   ← 핵심
  "span_id":  "9b04f7a8e1c2d3b4",
  "error": "DB query timeout (4012ms > 4000ms)",
  "query": "SELECT * FROM payment_methods WHERE user_id IN (?, ?, ?, ...)"
}

# 3) trace_id로 Tempo/Jaeger 즉시 점프
# Grafana Loki 패널의 trace_id 필드 → "View trace" 버튼 클릭
# (또는 derived field 설정으로 trace_id를 링크화)
#
# URL 예: https://grafana/explore?datasource=tempo&traceId=a3f1c8e2...

# 핵심 — 이 점프가 가능한 이유
# - 모든 서비스가 OTel SDK로 trace_id를 자동 전파
# - 로그 포맷에 trace_id 필드를 표준으로 주입
# - Grafana derived field로 Loki ↔ Tempo 링크
# → 다음(Step 4): trace tree에서 단일 span을 본다`,
        },
        focus: 'logs',
      },
      {
        title: 'Step 4. 근본 원인 — "동선(Traces)으로 단일 span 분석"',
        desc: 'Tempo에서 trace tree를 펼치면 payment의 DB call span 하나가 4초를 잡아먹고 있다. 그 안에 IN-list 쿼리 N개. 어제 배포에서 add_to_cart 시 payment_methods를 user 단위가 아니라 cart item마다 N+1로 부르도록 바뀜. 코드 fix → 알람 해소.',
        block: {
          kind: 'shell',
          code: `# Tempo / Jaeger UI — trace_id=a3f1c8e2... 를 폭포수로 본다

trace_id: a3f1c8e2d9b04f7a8e1c2d3b4f5a6c7d   total: 4180ms
├─ checkout-api  POST /checkout                              4180ms ████████████████████
│  ├─ cart-service  validate_cart                              45ms ▎
│  ├─ payment-service  POST /charge                          4087ms ███████████████████  ← 범인
│  │  ├─ payment-service  load_user_methods                  4012ms ███████████████████
│  │  │  └─ db.query  SELECT * FROM payment_methods          4011ms ███████████████████
│  │  │       attrs:
│  │  │         db.statement = "SELECT ... WHERE user_id IN (?,?,?,...x47)"
│  │  │         db.rows      = 47 parameters
│  │  │         peer.service = "postgres-primary"
│  │  └─ payment-service  charge_card                          73ms ▍
│  └─ ledger-service  record_txn                               40ms ▎

# Critical Path = payment-service.load_user_methods (4012ms / 4180ms = 96%)

# git blame 으로 어제 배포 확인
$ git log --oneline -- payment/methods.py | head -3
b7c2f1a (2026-05-05) refactor: load methods per cart item   ← 이놈
3d9e4a2 (2026-05-01) feat: add 3DS verification

# 코드 fix — 단일 쿼리로 합치기 (N+1 제거)
- for item in cart.items:                        # N번 호출
-     methods += db.query(load_methods_for(item))
+ methods = db.query(load_methods_for_user(user_id))   # 1번 호출

# 배포 → 5분 후 Grafana 패널 회복 → Alertmanager auto-resolve
$ pd resolve --incident=INC-9921 --comment "N+1 query fix deployed (b7c2f1a → revert/fix)"

# 회고 (다음 OnCall을 위해)
✓ MTTR: 23분 (Metrics 5분 + Logs 8분 + Traces 6분 + 배포 4분)
✓ 핵심: trace_id가 모든 pillar를 연결 → 검색 시간 절약
→ Part V에서는 이 흐름을 SLO/Incident/OnCall 정책으로 정착시킨다`,
        },
        focus: 'root',
      },
    ];

    const KIND_STYLE = {
      python: { label: 'Python', textColor: '#86efac' },
      shell:  { label: 'Bash',   textColor: '#a5f3fc' },
      yaml:   { label: 'YAML',   textColor: '#fde68a' },
    };

    const DEBUG = [
      { key: 'alert',   emoji: '🚨', name: '알람',      note: 'Metrics 임계 초과' },
      { key: 'isolate', emoji: '📊', name: '격리',      note: '어느 서비스/엔드포인트' },
      { key: 'logs',    emoji: '📝', name: '본문 검사', note: 'Logs + trace_id 점프' },
      { key: 'root',    emoji: '🎯', name: '근본 원인', note: '단일 span 분석' },
    ];

    function DebugCards({ focus }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
          <div className="text-xs font-bold text-slate-700 mb-3">🩺 병원 내원 기록 역추적 (분산 디버깅)</div>
          <div className="grid grid-cols-4 gap-2">
            {DEBUG.map((d) => {
              const isActive = focus === d.key;
              return (
                <div
                  key={d.key}
                  className={`rounded-lg p-3 text-center transition-all ${isActive ? 'bg-red-100 border-2 border-red-400 scale-105' : 'bg-slate-50 border border-slate-200'}`}
                >
                  <div className="text-2xl">{d.emoji}</div>
                  <div className="text-xs font-bold text-slate-800 mt-1">{d.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1 leading-tight">{d.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 4500);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const blockStyle = KIND_STYLE[step.block.kind];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">분산 시스템 디버깅 흐름</h1>
                <p className="text-sm text-slate-500 mt-1">병원 내원 기록 역추적 — 알람 → 격리 → 본문 검사 → 근본 원인</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            <DebugCards focus={step.focus} />

            <div className="bg-slate-900 rounded-xl p-4 mb-6">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-[10px] text-slate-400">{blockStyle.label}</span>
              </div>
              <pre className="font-mono text-sm overflow-x-auto whitespace-pre" style={{ color: blockStyle.textColor }}>
{step.block.code}
              </pre>
            </div>

            {step.focus === 'root' && (
              <div className="bg-red-50 border-2 border-red-300 rounded-xl p-3 mb-6 text-xs text-red-900">
                💡 Part IV 완성. 다음(Part V)에서는 실전 운영 — SLO 정책 / Incident / OnCall / 체크리스트
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
