  <!--
    Elasticsearch Chapter I-1-2 — Inverted Index
    학습 목표: 단어 → 문서 ID 매핑 테이블이 어떻게 검색을 빠르게 하는지 보여준다
    핵심 비유: 책 뒤 색인(index) — 한 단어 찾으려고 책 전체를 안 본다
    패턴: fastapi v1 — 좌(LiveDataPane: 토큰 → 매핑 시각화) / 우(VSCode CodeViewer)
    색상: zinc
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 문서 3개 — 토큰화부터',
        desc: '먼저 문서 3개를 준비한다. doc1 = "Kafka is a streaming platform", doc2 = "Redis is a cache", doc3 = "Kafka and Redis together". 검색 엔진은 이 문장들을 단어 단위로 쪼개고 (tokenize), 소문자로 통일하고, 불용어(a, is, and) 를 제거한다.',
        rps: 0,
        indexed: 3,
        tokens: 12,
        verdict: '토큰화',
        verdictTone: 'good',
        keyPoint: 'Inverted Index 의 첫 단계는 텍스트를 비교 가능한 토큰으로 정규화하는 것.',
        code: {
          lang: 'python',
          filename: 'step1-tokenize.py',
          lines: [
            '# Step 1. 원본 문서 3개를 토큰으로 쪼갠다',
            '',
            'documents = {',
            '    1: "Kafka is a streaming platform",',
            '    2: "Redis is a cache",',
            '    3: "Kafka and Redis together",',

            '',
            'STOPWORDS = {"a", "is", "and", "the", "of"}',
            '',
            'def tokenize(text: str) -> list[str]:',
            '    """ 문장 → 토큰 리스트',
            '    1) 공백으로 split',
            '    2) lowercase',
            '    3) stopword 제거',
            '    """',
            '    tokens = [w.lower() for w in text.split()]',
            '    return [t for t in tokens if t not in STOPWORDS]',
            '',
            'for doc_id, text in documents.items():',
            '    print(doc_id, tokenize(text))',
            '',
            '# 출력',
            '# 1 [\'kafka\', \'streaming\', \'platform\']',
            '# 2 [\'redis\', \'cache\']',
            '# 3 [\'kafka\', \'redis\', \'together\']',
            '',
            '# 검색 엔진은 이 토큰을 키로 색인을 만든다',
          ],
          highlight: [3, 4, 5, 6, 7, 9, 11, 17, 18, 24, 25, 26],
        },
      },
      {
        title: 'Step 2. 단어 → 문서 ID 매핑',
        desc: '각 토큰이 어느 문서에 등장했는지 거꾸로 정리한다. "kafka" → [1, 3], "redis" → [2, 3], "streaming" → [1]. 이것이 Inverted Index. 원래는 doc → words 였는데 word → docs 로 뒤집었다고 "Inverted".',
        rps: 0,
        indexed: 3,
        tokens: 6,
        verdict: '색인 완성',
        verdictTone: 'good',
        keyPoint: '한 번 만들어두면 단어 검색은 표 1번 lookup 으로 끝난다. O(1) 에 가깝다.',
        code: {
          lang: 'python',
          filename: 'step2-inverted-index.py',
          lines: [
            '# Step 2. 토큰 → {문서 ID 집합} 매핑 만들기',
            '',
            'from collections import defaultdict',
            '',
            'inverted_index = defaultdict(set)',
            '',
            'for doc_id, text in documents.items():',
            '    for token in tokenize(text):',
            '        inverted_index[token].add(doc_id)',
            '',
            '# 결과',
            'for term, posting_list in inverted_index.items():',
            '    print(f"{term:12} → {sorted(posting_list)}")',
            '',
            '# kafka        → [1, 3]',
            '# streaming    → [1]',
            '# platform     → [1]',
            '# redis        → [2, 3]',
            '# cache        → [2]',
            '# together     → [3]',
            '',
            '# 이 표를 "Term → Posting List" 라고 부른다',
            '# Lucene 은 이 구조를 디스크에 압축 저장 (FST + skip list)',
            '# 메모리에는 term dictionary 만 캐싱',
          ],
          highlight: [5, 7, 8, 9, 12, 13, 14, 15, 16, 17, 18, 19, 20],
        },
      },
      {
        title: 'Step 3. "kafka" 검색 — 표 1번 lookup',
        desc: '사용자가 "kafka" 를 검색하면? 풀스캔이 아니라 단어 표에서 "kafka" 행을 찾아 [1, 3] 을 즉시 반환한다. 100만 문서든 1000만 문서든 단어 표에서 키 하나 찾는 비용은 거의 같다. 이게 Inverted Index 의 위력이다.',
        rps: 100,
        indexed: 1000000,
        tokens: 6,
        verdict: 'O(log T)',
        verdictTone: 'good',
        keyPoint: '풀스캔 O(N행) → 표 lookup O(log T단어). 문서 수와 거의 무관.',
        code: {
          lang: 'python',
          filename: 'step3-search.py',
          lines: [
            '# Step 3. "kafka" 검색 — 인덱스 1번 lookup',
            '',
            'def search(query: str) -> list[int]:',
            '    """ 검색어 → 문서 ID 리스트',
            '    풀스캔 하지 않고 단어 표에서 직접 조회',
            '    """',
            '    tokens = tokenize(query)',
            '    if not tokens:',
            '        return []',
            '',
            '    # 단일 토큰이면 posting list 그대로 반환',
            '    if len(tokens) == 1:',
            '        return sorted(inverted_index.get(tokens[0], set()))',
            '',
            '    # 여러 토큰이면 교집합 (AND) 또는 합집합 (OR)',
            '    result = inverted_index.get(tokens[0], set())',
            '    for t in tokens[1:]:',
            '        result = result & inverted_index.get(t, set())',
            '    return sorted(result)',
            '',
            'print(search("kafka"))',
            '# [1, 3]   ← 풀스캔 없이 즉시 응답',
            '',
            'print(search("kafka redis"))',
            '# [3]      ← 두 단어 모두 포함하는 문서',
            '',
            '# 100만 문서에서도 시간 복잡도',
            '#   풀스캔: O(N) = 100만 → 5초',
            '#   인덱스 lookup: O(log T) = 표 검색 → 1ms',
          ],
          highlight: [3, 7, 12, 13, 15, 16, 17, 18, 21, 22, 24, 25, 27, 28, 29],
        },
      },
      {
        title: 'Step 4. TF-IDF — "얼마나 관련 있나" 점수',
        desc: '검색 결과 100건이 매칭됐을 때 어떤 게 가장 관련 있는가? TF (단어 빈도) × IDF (역문서빈도) 로 점수를 매긴다. 단어가 문서에 많이 나올수록 ↑, 흔한 단어일수록 ↓. Lucene/Elasticsearch 는 더 발전한 BM25 를 기본 사용.',
        rps: 100,
        indexed: 1000000,
        tokens: 6,
        verdict: '랭킹',
        verdictTone: 'good',
        keyPoint: '검색은 "찾기" 만이 아니라 "어떤 게 더 관련 있나" 정렬까지가 본질.',
        code: {
          lang: 'python',
          filename: 'step4-tfidf.py',
          lines: [
            '# Step 4. TF-IDF 점수 — 관련도 정렬',
            '',
            'import math',
            'from collections import Counter',
            '',
            'def tf(term: str, doc_tokens: list[str]) -> float:',
            '    """ Term Frequency: 문서 안에서 단어가 얼마나 자주 나오나 """',
            '    return Counter(doc_tokens)[term] / max(len(doc_tokens), 1)',
            '',
            'def idf(term: str, all_docs: dict) -> float:',
            '    """ Inverse Document Frequency: 흔한 단어는 점수 낮춤 """',
            '    n_with_term = sum(1 for d in all_docs.values() if term in tokenize(d))',
            '    return math.log((len(all_docs) + 1) / (n_with_term + 1)) + 1',
            '',
            'def tf_idf(term: str, doc_id: int, all_docs: dict) -> float:',
            '    doc_tokens = tokenize(all_docs[doc_id])',
            '    return tf(term, doc_tokens) * idf(term, all_docs)',
            '',
            '# "kafka" 가 doc1, doc3 에 모두 나올 때',
            'for d in [1, 3]:',
            '    score = tf_idf("kafka", d, documents)',
            '    print(f"doc{d}: score={score:.4f}")',
            '',
            '# Elasticsearch 는 BM25 를 기본 사용 (TF-IDF 의 개선판)',
            '#  • 단어 길이 보정',
            '#  • 문서 길이 보정',
            '#  • 포화 곡선 (한 단어가 100번 나와도 점수가 무한 증가하지 않음)',
            '',
            '# 결과 정렬 → score DESC 로 사용자에게 보여줌',
          ],
          highlight: [6, 7, 8, 10, 11, 12, 13, 15, 16, 17, 20, 21, 22, 24, 25, 26, 27],
        },
      },
      {
        title: 'Step 5. Lucene — Java 검색 엔진 라이브러리',
        desc: 'Inverted Index, BM25, 토큰화, 압축, 색인 병합... 이 모든 걸 구현한 게 Apache Lucene. Elasticsearch / OpenSearch / Solr 는 모두 Lucene 을 코어로 쓰고, 그 위에 클러스터링/REST API/Kibana 를 얹은 제품이다.',
        rps: 100,
        indexed: 1000000,
        tokens: 6,
        verdict: '전체 그림',
        verdictTone: 'good',
        summary: {
          title: '풀스캔 vs Inverted Index',
          rows: [
            { metric: '100만 행 검색', before: '5000ms', after: '1ms', delta: '−5000x' },
            { metric: '시간 복잡도', before: 'O(N행)', after: 'O(log T단어)', delta: '✓' },
            { metric: '점수 랭킹', before: '없음', after: 'BM25', delta: '✓' },
            { metric: '확장', before: '느려짐', after: '거의 일정', delta: '✓' },
          ],
        },
        keyPoint: 'Lucene + REST API + 클러스터 = Elasticsearch. 다음 챕터에서 비교 제품을 본다.',
        code: {
          lang: 'markdown',
          filename: 'lucene-stack.md',
          lines: [
            '# Step 5. Lucene 기반 스택 정리',
            '',
            '## Apache Lucene (1999~)',
            '- Java 로 작성된 전문 검색 라이브러리',
            '- Inverted Index, BM25, 토크나이저, 압축, segment merge 다 포함',
            '- 라이브러리이지 서버가 아니다 → 임베드해서 써야 함',
            '',
            '## Lucene 위에 만든 제품들',
            '| 제품 | 추가 가치 |',
            '|:--|:--|',
            '| Elasticsearch | REST API, 클러스터링, Kibana, ELK Stack |',
            '| OpenSearch    | AWS 가 ES 7.10 fork, Apache 2.0 |',
            '| Solr          | Apache 재단, Zookeeper 기반 클러스터 |',
            '',
            '## Inverted Index 핵심 자료구조',
            '```',
            'Term Dictionary  (모든 단어 정렬)',
            '   ↓ FST (Finite State Transducer) 로 압축',
            'Posting List     (단어 → [docId, freq, position])',
            '   ↓ skip list 로 빠른 교집합',
            'Stored Fields    (원본 _source 저장)',
            '```',
            '',
            '## Inverted Index 가 빠른 이유',
            '1. 단어 표는 정렬되어 있어 binary search (O(log T))',
            '2. Posting List 는 docId 정렬 → 교집합도 빠름',
            '3. 전체가 메모리 매핑 가능한 작은 크기',
            '4. tf/idf 가 색인 시점에 미리 계산',
            '',
            '## 한계',
            '- 색인 비용 (쓰기 = 단어 표 갱신)',
            '- 디스크 공간 (원본 + 인덱스)',
            '- 실시간성 (refresh interval 1초)',
            '→ 이걸 다음 챕터들에서 풀어간다',
          ],
          highlight: [3, 4, 5, 6, 8, 9, 10, 11, 12, 13, 15, 16, 17, 18, 19, 20, 21, 24, 25, 26, 27],
        },
      },
    ];

    const TONE = {
      good:   { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-800', badge: 'bg-emerald-200 text-emerald-800' },
      warn:   { bg: 'bg-amber-50',    border: 'border-amber-400',   text: 'text-amber-800',   badge: 'bg-amber-200 text-amber-800' },
      danger: { bg: 'bg-rose-50',     border: 'border-rose-400',    text: 'text-rose-800',    badge: 'bg-rose-200 text-rose-800' },
    };

    function MetricCard({ label, value, unit, max, current, tone }) {
      const t = TONE[tone] || TONE.warn;
      const pct = Math.min(100, (current / max) * 100);
      return (
        <div className={`rounded-lg border ${t.bg} ${t.border} px-3 py-2`}>
          <div className="flex justify-between items-baseline mb-1">
            <span className={`text-xs ${t.text}`}>{label}</span>
            <span className={`text-lg font-mono font-bold ${t.text}`}>
              {value}<span className="text-xs opacity-70">{unit}</span>
            </span>
          </div>
          <div className="h-1.5 bg-white/60 rounded overflow-hidden">
            <div className={`h-full ${t.badge.split(' ')[0]}`} style={{ width: `${pct}%` }} />
          </div>
        </div>
      );
    }

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-zinc-400 bg-white p-3">
          <div className="text-sm font-bold text-zinc-800 mb-2">📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-zinc-500 border-b border-zinc-200">
                <th className="py-1 pr-2">지표</th><th className="py-1 pr-2">Before</th><th className="py-1 pr-2">After</th><th className="py-1">변화</th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-zinc-100">
                  <td className="py-1 pr-2 font-medium text-zinc-700">{r.metric}</td>
                  <td className="py-1 pr-2 text-rose-700 font-mono">{r.before}</td>
                  <td className="py-1 pr-2 text-emerald-700 font-mono">{r.after}</td>
                  <td className="py-1 text-zinc-800 font-bold">{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.warn;
      const sampleIndex = [
        { term: 'kafka',     docs: [1, 3] },
        { term: 'streaming', docs: [1] },
        { term: 'platform',  docs: [1] },
        { term: 'redis',     docs: [2, 3] },
        { term: 'cache',     docs: [2] },
        { term: 'together',  docs: [3] },
      ];
      return (
        <div className="rounded-xl border border-zinc-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-zinc-800">Inverted Index 시각화</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          <div className="grid grid-cols-1 gap-2">
            <MetricCard label="색인된 문서" value={state.indexed.toLocaleString()} unit=" 개" max={1000000} current={state.indexed} tone="good" />
            <MetricCard label="고유 토큰 (단어 표)" value={state.tokens} unit=" 개" max={20} current={state.tokens} tone="good" />
            <MetricCard label="초당 검색" value={state.rps} unit=" qps" max={1000} current={state.rps} tone="good" />
          </div>

          <div className="mt-3 rounded-lg bg-zinc-50 border border-zinc-200 p-3">
            <div className="text-[11px] font-bold text-zinc-700 mb-2">Term → Posting List</div>
            <table className="w-full text-[11px] font-mono">
              <tbody>
                {sampleIndex.map((row) => (
                  <tr key={row.term} className="border-b border-zinc-200 last:border-0">
                    <td className="py-1 text-zinc-800">{row.term}</td>
                    <td className="py-1 text-right text-zinc-600">→ [{row.docs.join(', ')}]</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs text-zinc-800 bg-zinc-100 border border-zinc-300 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-zinc-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-zinc-800 border-b border-zinc-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-zinc-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-zinc-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-zinc-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-zinc-500/25 border-l-2 border-zinc-300 -ml-3 pl-2' : ''}`}>
                    <span className="text-zinc-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-zinc-800 border-t border-zinc-700 flex items-center justify-between text-[10px] text-zinc-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-zinc-50 to-stone-100 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-zinc-700 text-white font-bold">E</span>
              <div>
                <h1 className="text-2xl font-bold text-zinc-900">Chapter I-1-2. Inverted Index</h1>
                <p className="text-sm text-zinc-700/80">단어 → 문서 ID 매핑으로 100만 문서를 10ms 에 검색</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-zinc-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-zinc-700' : 'bg-zinc-200'}`} />
              ))}
            </div>

            <div className="mb-4 rounded-xl bg-zinc-800 text-zinc-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-zinc-200/90 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} aria-label="처음으로" className="px-3 py-1.5 text-xs rounded border border-zinc-300 bg-white text-zinc-700 hover:bg-zinc-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 text-xs rounded border border-zinc-300 bg-white text-zinc-700 hover:bg-zinc-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'} className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-zinc-900 text-white' : 'bg-zinc-700 text-white hover:bg-zinc-800'}`}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} aria-label="다음 단계" className="px-3 py-1.5 text-xs rounded border border-zinc-300 bg-white text-zinc-700 hover:bg-zinc-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-zinc-600 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-zinc-400 bg-white px-4 py-3 text-sm text-zinc-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                Inverted Index 는 "단어 → 문서 ID 표". 풀스캔 대신 표 lookup 으로 100만 문서를 1ms 에 검색. TF-IDF/BM25 로 점수까지. 이걸 구현한 게 Lucene.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Inverted Index', 'Tokenize', 'Posting List', 'TF-IDF', 'BM25', 'Lucene'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-zinc-100 text-zinc-800 border border-zinc-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-zinc-700">
              <a href="./I-1-1.html" className="underline hover:no-underline">← I-1-1 RDB LIKE 한계</a>
              <a href="./I-2-1.html" className="underline hover:no-underline">다음: I-2-1 ES vs Solr vs OpenSearch →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
