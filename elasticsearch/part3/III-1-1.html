    const TONE = {
      good:   { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-800', badge: 'bg-emerald-200 text-emerald-800' },
      warn:   { bg: 'bg-amber-50',    border: 'border-amber-400',   text: 'text-amber-800',   badge: 'bg-amber-200 text-amber-800' },
      danger: { bg: 'bg-rose-50',     border: 'border-rose-400',    text: 'text-rose-800',    badge: 'bg-rose-200 text-rose-800' },
    };

    function MetricCard({ label, value, unit, max, current, tone }) {
      const t = TONE[tone] || TONE.warn;
      const pct = Math.min(100, (current / max) * 100);
      return (
        <div className={`rounded-lg border ${t.bg} ${t.border} px-3 py-2`}>
          <div className="flex justify-between items-baseline mb-1">
            <span className={`text-xs ${t.text}`}>{label}</span>
            <span className={`text-lg font-mono font-bold ${t.text}`}>
              {value.toLocaleString()}<span className="text-xs opacity-70">{unit}</span>
            </span>
          </div>
          <div className="h-1.5 bg-white/60 rounded overflow-hidden">
            <div className={`h-full ${t.badge.split(' ')[0]}`} style={{ width: `${pct}%` }} />
          </div>
        </div>
      );
    }

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-zinc-400 bg-white p-3">
          <div className="text-sm font-bold text-zinc-800 mb-2">📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-zinc-500 border-b border-zinc-200">
                <th className="py-1 pr-2">방식</th><th className="py-1 pr-2">처리량</th><th className="py-1 pr-2">시간</th><th className="py-1">배수</th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-zinc-100">
                  <td className="py-1 pr-2 font-medium text-zinc-700">{r.metric}</td>
                  <td className="py-1 pr-2 text-emerald-700 font-mono">{r.before}</td>
                  <td className="py-1 pr-2 text-zinc-700 font-mono">{r.after}</td>
                  <td className="py-1 text-zinc-800 font-bold">{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.warn;
      return (
        <div className="rounded-xl border border-zinc-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-zinc-800">색인 처리량 시뮬레이션</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          <div className="rounded-lg border border-zinc-300 bg-zinc-50 p-3">
            <div className="text-[10px] text-zinc-500">방식</div>
            <div className="text-sm font-bold text-zinc-800 font-mono">{state.method}</div>
          </div>

          <div className="mt-3 grid grid-cols-1 gap-2">
            <MetricCard label="처리량 (docs/sec)" value={state.docsPerSec} unit="" max={50000} current={state.docsPerSec} tone={state.docsPerSec >= 5000 ? 'good' : state.docsPerSec >= 500 ? 'warn' : 'danger'} />
            <MetricCard label="10만 건 소요 (초)" value={state.totalSec} unit="s" max={2000} current={state.totalSec} tone={state.totalSec <= 30 ? 'good' : state.totalSec <= 300 ? 'warn' : 'danger'} />
          </div>

          <div className="mt-3 rounded-lg bg-zinc-50 border border-zinc-200 p-3">
            <div className="text-[11px] font-bold text-zinc-700 mb-2">10만 건 색인 비교</div>
            <div className="space-y-1">
              {[
                ['단건 POST', 2000, 'bg-rose-500'],
                ['Bulk 1000', 10, 'bg-emerald-500'],
                ['Bulk + parallel', 5, 'bg-emerald-600'],
                ['최적화 풀세트', 2, 'bg-emerald-700'],
              ].map(([name, sec, color]) => (
                <div key={name} className="flex items-center gap-2">
                  <span className="text-[10px] text-zinc-700 w-28">{name}</span>
                  <div className="flex-1 h-2 bg-zinc-200 rounded">
                    <div className={`h-full ${color} rounded`} style={{ width: `${Math.max(2, Math.min(100, (sec / 2000) * 100))}%` }} />
                  </div>
                  <span className="text-[10px] font-mono text-zinc-700">{sec}s</span>
                </div>
              ))}
            </div>
          </div>

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs text-zinc-800 bg-zinc-100 border border-zinc-300 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-zinc-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-zinc-800 border-b border-zinc-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-zinc-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-zinc-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-zinc-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-zinc-500/25 border-l-2 border-zinc-300 -ml-3 pl-2' : ''}`}>
                    <span className="text-zinc-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-zinc-800 border-t border-zinc-700 flex items-center justify-between text-[10px] text-zinc-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-zinc-50 to-stone-100 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-zinc-700 text-white font-bold">E</span>
              <div>
                <h1 className="text-2xl font-bold text-zinc-900">Chapter III-1-1. Bulk API</h1>
                <p className="text-sm text-zinc-700/80">10만 건 색인 30분 → 2초 (900x)</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-zinc-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-zinc-700' : 'bg-zinc-200'}`} />
              ))}
            </div>

            <div className="mb-4 rounded-xl bg-zinc-800 text-zinc-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-zinc-200/90 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} aria-label="처음으로" className="px-3 py-1.5 text-xs rounded border border-zinc-300 bg-white text-zinc-700 hover:bg-zinc-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 text-xs rounded border border-zinc-300 bg-white text-zinc-700 hover:bg-zinc-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'} className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-zinc-900 text-white' : 'bg-zinc-700 text-white hover:bg-zinc-800'}`}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} aria-label="다음 단계" className="px-3 py-1.5 text-xs rounded border border-zinc-300 bg-white text-zinc-700 hover:bg-zinc-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-zinc-600 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-zinc-400 bg-white px-4 py-3 text-sm text-zinc-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                대량 색인 = Bulk API + chunk 1000~5000 + refresh -1 + replicas 0. 초기 적재 후 setting 복구 + forcemerge. 단건 대비 1000x 처리량.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Bulk', 'NDJSON', 'chunk_size', 'parallel_bulk', 'refresh', 'forcemerge'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-zinc-100 text-zinc-800 border border-zinc-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-zinc-700">
              <a href="../part2/II-2-2.html" className="underline hover:no-underline">← II-2-2 Aggregation</a>
              <a href="./III-1-2.html" className="underline hover:no-underline">다음: III-1-2 Refresh interval →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
