import os
from datetime import datetime, timedelta, timezone

from jose import JWTError, jwt
from passlib.context import CryptContext

SECRET_KEY = os.getenv("SECRET_KEY", "dev-secret-key-change-in-production")
ALGORITHM = "HS256"
ACCESS_TOKEN_EXPIRE_MINUTES = 60

pwd_context = CryptContext(schemes=["bcrypt"], deprecated="auto")


def hash_password(password: str) -> str:
    """비밀번호를 bcrypt로 해싱"""
    return pwd_context.hash(password)


def verify_password(plain_password: str, hashed_password: str) -> bool:
    """평문 비밀번호와 해시를 비교"""
    return pwd_context.verify(plain_password, hashed_password)


def create_access_token(data: dict) -> str:
    """JWT 액세스 토큰 생성

    Args:
        data: 토큰에 담을 페이로드 (sub 필드 필수)

    Returns:
        인코딩된 JWT 문자열
    """
    to_encode = data.copy()
    expire = datetime.now(timezone.utc) + timedelta(minutes=ACCESS_TOKEN_EXPIRE_MINUTES)
    to_encode.update({"exp": expire})
    return jwt.encode(to_encode, SECRET_KEY, algorithm=ALGORITHM)


def decode_access_token(token: str) -> dict | None:
    """JWT 토큰을 디코딩하여 페이로드 반환

    Returns:
        디코딩된 페이로드 dict, 실패 시 None
    """
    try:
        return jwt.decode(token, SECRET_KEY, algorithms=[ALGORITHM])
    except JWTError:
        return None`

def register_user(db: Session, user_data: UserCreate) -> User:
    """새 사용자 등록

    Args:
        db: DB 세션
        user_data: 회원가입 데이터 (email, username, password)

    Returns:
        생성된 User 객체

    Raises:
        HTTPException 400: 이메일 또는 사용자명이 이미 존재할 때
    """
    # 중복 체크
    if db.query(User).filter(User.email == user_data.email).first():
        raise HTTPException(status_code=400, detail="이미 등록된 이메일입니다")
    if db.query(User).filter(User.username == user_data.username).first():
        raise HTTPException(status_code=400, detail="이미 사용 중인 사용자명입니다")

    user = User(
        email=user_data.email,
        username=user_data.username,
        hashed_password=hash_password(user_data.password),
    )
    db.add(user)
    db.commit()
    db.refresh(user)
    return user

        HTTPException 401: 이메일/비밀번호가 틀렸을 때
    """
    user = db.query(User).filter(User.email == email).first()
    if not user or not verify_password(password, user.hashed_password):

            detail="이메일 또는 비밀번호가 올바르지 않습니다",

    return create_access_token(data={"sub": user.email})`

    post = Post(
        title=post_data.title,
        content=post_data.content,

def get_post(db: Session, post_id: int) -> Post:
    """게시글 단건 조회"""

    if not post:

    return post


def update_post(db: Session, post_id: int, post_data: PostUpdate, author: User) -> Post:
    """게시글 수정 (작성자만 가능)"""
    post = get_post(db, post_id)
    if post.author_id != author.id:
        raise HTTPException(status_code=status.HTTP_403_FORBIDDEN, detail="수정 권한이 없습니다")

    if post_data.title is not None:
        post.title = post_data.title
    if post_data.content is not None:
        post.content = post_data.content

    db.commit()
    db.refresh(post)
    return post


def delete_post(db: Session, post_id: int, author: User) -> None:
    """게시글 삭제 (작성자만 가능)"""
    post = get_post(db, post_id)
    if post.author_id != author.id:
        raise HTTPException(status_code=status.HTTP_403_FORBIDDEN, detail="삭제 권한이 없습니다")

    db.delete(post)
    db.commit()`
