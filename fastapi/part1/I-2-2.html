<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — I-2-2. HTTP 메서드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const METHODS = [
      { name: 'GET',    crud: 'Read',   action: '보여주세요', icon: '\uD83D\uDC40', color: 'blue',    example: '메뉴판 보기' },
      { name: 'POST',   crud: 'Create', action: '추가해주세요', icon: '\u2795',       color: 'emerald', example: '새 주문 넣기' },
      { name: 'PUT',    crud: 'Update', action: '교체해주세요', icon: '\uD83D\uDD04', color: 'amber',   example: '주문 변경' },
      { name: 'DELETE', crud: 'Delete', action: '삭제해주세요', icon: '\u274C',       color: 'rose',    example: '주문 취소' },
    ];

    const METHOD_STYLE = {
      blue:    { bg: 'bg-blue-50',    border: 'border-blue-500',    text: 'text-blue-700',    ring: 'ring-blue-200',    badge: 'bg-blue-600' },
      emerald: { bg: 'bg-emerald-50', border: 'border-emerald-500', text: 'text-emerald-700', ring: 'ring-emerald-200', badge: 'bg-emerald-600' },
      amber:   { bg: 'bg-amber-50',   border: 'border-amber-500',   text: 'text-amber-700',   ring: 'ring-amber-200',   badge: 'bg-amber-600' },
      rose:    { bg: 'bg-rose-50',    border: 'border-rose-500',    text: 'text-rose-700',    ring: 'ring-rose-200',    badge: 'bg-rose-600' },
    };

    const STEPS = [
      {
        desc: "[HTTP 메서드란?] HTTP 요청에는 \"어떤 행동을 할 것인지\" 나타내는 메서드(Method)가 붙습니다. 식당 주문에 비유하면 이해하기 쉽습니다.",
        activeMethod: null,
        showCrud: false,
      },
      {
        desc: "[GET — 보여주세요] 메뉴판을 달라고 하는 것. 데이터를 가져오기만 하고 서버의 데이터를 바꾸지 않습니다. 웹 브라우저에서 페이지를 여는 것이 GET입니다.",
        activeMethod: 'GET',
        showCrud: false,
      },
      {
        desc: "[POST — 추가해주세요] 새 주문을 넣는 것. 서버에 새 데이터를 만듭니다. 회원가입, 글쓰기, 주문 접수 등이 POST입니다.",
        activeMethod: 'POST',
        showCrud: false,
      },
      {
        desc: "[PUT — 교체해주세요] 이미 넣은 주문을 통째로 바꾸는 것. 기존 데이터를 새 데이터로 교체합니다. 프로필 수정, 주문 변경 등이 PUT입니다.",
        activeMethod: 'PUT',
        showCrud: false,
      },
      {
        desc: "[DELETE — 삭제해주세요] 주문을 취소하는 것. 서버의 데이터를 삭제합니다. 계정 탈퇴, 게시물 삭제 등이 DELETE입니다.",
        activeMethod: 'DELETE',
        showCrud: false,
      },
      {
        desc: "[CRUD 정리] 이 네 가지 메서드가 데이터의 생성(Create), 읽기(Read), 수정(Update), 삭제(Delete)를 모두 표현합니다. 웹 API의 기본 뼈대입니다.",
        activeMethod: null,
        showCrud: true,
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-emerald-700 hover:text-emerald-900 font-medium"><span>&larr;</span> 허브</a></nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I &gt; Chapter 2. HTTP</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-2-2. 메서드 — GET / POST / PUT / DELETE</h1>
                </div>
              </div>
              <p className="text-slate-600">HTTP 메서드는 요청의 <b>행동 종류</b>입니다. 식당에서 "보여주세요(GET)", "추가해주세요(POST)", "교체해주세요(PUT)", "삭제해주세요(DELETE)"와 같습니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-blue-700 border-blue-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">HTTP 메서드</h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 메서드 카드 그리드 */}
            <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                {METHODS.map(m => {
                  const isActive = stepData.activeMethod === m.name || stepData.showCrud;
                  const s = METHOD_STYLE[m.color];
                  return (
                    <div key={m.name} className={`p-4 rounded-xl border-2 text-center transition-all duration-500 ${
                      isActive ? `${s.bg} ${s.border} ${s.text} ring-2 ${s.ring} shadow-md` : 'bg-white border-slate-200 text-slate-400'
                    } ${stepData.activeMethod === m.name ? 'scale-105' : ''}`}>
                      <div className="text-3xl mb-2">{m.icon}</div>
                      <div className={`inline-block px-3 py-1 rounded-full text-white text-xs font-bold mb-2 ${isActive ? s.badge : 'bg-slate-300'}`}>{m.name}</div>
                      <div className="text-sm font-bold">{m.action}</div>
                      <div className="text-xs mt-1 opacity-70">{m.example}</div>
                      {stepData.showCrud && (
                        <div className="mt-2 text-[10px] font-mono bg-white/80 rounded px-2 py-1 font-bold">
                          CRUD: {m.crud}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              {stepData.showCrud && (
                <div className="mt-6 text-center">
                  <div className="inline-block bg-slate-100 border border-slate-300 text-slate-700 px-6 py-3 rounded-lg text-sm">
                    <span className="font-bold">C</span>reate(POST) + <span className="font-bold">R</span>ead(GET) + <span className="font-bold">U</span>pdate(PUT) + <span className="font-bold">D</span>elete(DELETE) = <span className="font-bold">CRUD</span>
                  </div>
                </div>
              )}

              <div className="mt-4 bg-slate-50 rounded-lg p-4 text-sm text-slate-600 border border-slate-200">
                <span className="font-bold text-slate-700">비유:</span> 식당에서 메뉴를 보는 것(GET), 새 주문을 넣는 것(POST),
                주문을 바꾸는 것(PUT), 주문을 취소하는 것(DELETE). 이 네 가지로 모든 식당 업무가 돌아간다.
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['GET', 'POST', 'PUT', 'DELETE', 'CRUD', 'HTTP 메서드'].map(kw => (
                <span key={kw} className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-sm font-medium border border-blue-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-blue-600 hover:bg-blue-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>)}
                </button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./I-2-1.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; I-2-1. 요청과 응답</a>
              <a href="./I-2-3.html" className="text-blue-600 hover:text-blue-800 font-medium">I-2-3. 상태 코드 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
