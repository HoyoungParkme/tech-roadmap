    function SafetyBadge({ ok, label }) {
      const cls = ok
        ? 'bg-emerald-100 text-emerald-700 border-emerald-300'
        : 'bg-rose-100 text-rose-700 border-rose-300';
      return (
        <span className={`text-[10px] px-1.5 py-0.5 rounded border ${cls}`}>
          {ok ? '✓' : '✗'} {label}
        </span>
      );
    }

    function IdemBadge({ idem }) {
      // idem 이 boolean 이 아니면 (PATCH 처럼) ? 표시
      if (typeof idem !== 'boolean') {
        return (
          <span className="text-[10px] px-1.5 py-0.5 rounded border bg-amber-100 text-amber-700 border-amber-300">
            ? 멱등
          </span>
        );
      }
      const cls = idem
        ? 'bg-emerald-100 text-emerald-700 border-emerald-300'
        : 'bg-rose-100 text-rose-700 border-rose-300';
      return (
        <span className={`text-[10px] px-1.5 py-0.5 rounded border ${cls}`}>
          {idem ? '✓' : '✗'} 멱등
        </span>
      );
    }

    function MethodCard({ method, active, onClick }) {
      const c = METHOD_COLOR[method.name];
      // PATCH 의 멱등성은 구현 의존이므로 문자열로 처리
      const idemForBadge = method.name === 'PATCH' ? 'maybe' : method.idem;
      return (
        <button
          onClick={onClick}
          className={`w-full text-left rounded-lg border-2 p-3 transition-all duration-300 ${
            active
              ? `${c.bg} ${c.border} ${c.text} ring-2 ${c.ring} shadow-md scale-[1.02]`
              : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300'
          }`}
        >
          <div className="flex items-center gap-2 mb-1">
            <span className="text-xl">{method.icon}</span>
            <span className={`px-2 py-0.5 rounded text-white text-[11px] font-bold ${active ? c.badge : 'bg-slate-300'}`}>
              {method.name}
            </span>
            <span className="ml-auto text-[10px] font-mono">{method.crud}</span>
          </div>
          <div className="text-sm font-bold">{method.action}</div>
          <div className="text-[11px] opacity-80 mt-0.5">{method.example}</div>
          <div className="flex flex-wrap gap-1 mt-2">
            <SafetyBadge ok={method.safe} label="안전" />
            <IdemBadge idem={idemForBadge} />
            <span className={`text-[10px] px-1.5 py-0.5 rounded border ${
              method.body
                ? 'bg-indigo-100 text-indigo-700 border-indigo-300'
                : 'bg-slate-100 text-slate-600 border-slate-300'
            }`}>
              {method.body ? '바디 ✓' : '바디 ✗'}
            </span>
          </div>
        </button>
      );
    }

    function LiveDataPane({ step, onPick, activeTabIdx }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">HTTP 메서드 5 종</h3>
            <span className="text-[10px] text-slate-500">카드를 누르면 코드 탭 전환</span>
          </div>
          <div className="space-y-2">
            {METHODS.map((m, i) => (
              <MethodCard
                key={m.name}
                method={m}
                active={step.activeMethod === m.name || activeTabIdx === i}
                onClick={() => onPick(i)}
              />
            ))}
          </div>
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {step.note}
          </div>
          <div className="mt-3 text-[11px] text-slate-600 bg-slate-50 border border-slate-200 rounded p-2 leading-relaxed">
            <b>안전(Safe)</b> = 서버 상태를 바꾸지 않음.{' '}
            <b>멱등(Idempotent)</b> = 같은 요청을 여러 번 보내도 최종 상태가 같음.
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer — 5 탭, highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ tabs, activeIdx, onPick, stepIdx, total }) {
      const codeRef = useRef(null);
      const code = tabs[activeIdx];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [activeIdx]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 윈도우 헤더 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          {/* 탭 바 */}
          <div className="flex bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {tabs.map((t, i) => (
              <button
                key={t.filename}
                onClick={() => onPick(i)}
                className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                  i === activeIdx
                    ? 'bg-[#282c34] text-indigo-300 border-t-2 border-t-indigo-400'
                    : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'
                }`}
              >
                {t.filename}
              </button>
            ))}
          </div>
          {/* 코드 본문 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          {/* 푸터 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [tabIdx, setTabIdx] = useState(STEPS[0].tabIdx);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // step 이 바뀌면 우측 탭도 따라간다 (단, 사용자가 카드로 직접 바꿀 수 있음)
      useEffect(() => {
        setTabIdx(STEPS[stepIdx].tabIdx);
      }, [stepIdx]);

      // 키보드
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동재생 (3000ms)
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-slate-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">I</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">I-2-2. HTTP 메서드</h1>
                <p className="text-sm text-indigo-800/80">GET · POST · PUT · PATCH · DELETE — 멱등성과 안전성까지 한 번에</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 허브</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane step={step} onPick={setTabIdx} activeTabIdx={tabIdx} />
              <CodeViewer
                tabs={CODE_TABS}
                activeIdx={tabIdx}
                onPick={setTabIdx}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3 초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                GET(조회·멱등·안전) · POST(생성·비멱등) · PUT(전체 교체·멱등) · PATCH(부분 수정) · DELETE(삭제·멱등).
                멱등성과 안전성 매트릭스를 외워두면 REST API 설계 시 메서드 선택이 단순해진다.
                다음 챕터(I-2-3)에서는 응답에 붙는 <b>상태 코드</b>를 다룬다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['GET', 'POST', 'PUT', 'PATCH', 'DELETE', '멱등성', '안전성', 'CRUD', 'REST'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./I-2-1.html" className="underline hover:no-underline">← I-2-1. 요청과 응답</a>
              <a href="./I-2-3.html" className="underline hover:no-underline">다음: I-2-3. 상태 코드 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
