<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — I-2-1. 요청과 응답</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "[약속] HTTP(HyperText Transfer Protocol)는 웹에서 데이터를 주고받는 약속입니다. 편지를 주고받는 방식과 똑같습니다.",
        clientState: 'idle',
        serverState: 'idle',
        letter: null,
        letterDir: null,
      },
      {
        desc: "[요청 작성] 클라이언트(손님)가 편지를 씁니다: \"이 페이지 좀 보여줄 수 있어요?\" 이것이 요청(Request)입니다.",
        clientState: 'writing',
        serverState: 'idle',
        letter: { type: 'request', text: 'GET /menu HTTP/1.1' },
        letterDir: null,
      },
      {
        desc: "[요청 전송] 편지(요청)가 네트워크를 통해 서버에 전달됩니다. 서버가 받을 때까지 클라이언트는 기다립니다.",
        clientState: 'waiting',
        serverState: 'receiving',
        letter: { type: 'request', text: 'GET /menu HTTP/1.1' },
        letterDir: 'toServer',
      },
      {
        desc: "[응답 작성] 서버(직원)가 요청을 읽고 응답(Response)을 준비합니다: \"네, 메뉴 여기 있습니다.\"",
        clientState: 'waiting',
        serverState: 'writing',
        letter: { type: 'response', text: 'HTTP/1.1 200 OK\n{\"menu\": [\"치킨\", \"피자\"]}' },
        letterDir: null,
      },
      {
        desc: "[응답 수신] 응답 편지가 클라이언트에게 돌아옵니다. 한 번의 요청에 한 번의 응답 — 이것이 HTTP의 기본 원칙입니다.",
        clientState: 'received',
        serverState: 'done',
        letter: { type: 'response', text: 'HTTP/1.1 200 OK\n{\"menu\": [\"치킨\", \"피자\"]}' },
        letterDir: 'toClient',
      },
    ];

    const CLIENT_CLASS = {
      idle:     'bg-white border-slate-200 text-slate-400',
      writing:  'bg-blue-50 border-blue-500 text-blue-700 ring-2 ring-blue-200',
      waiting:  'bg-slate-100 border-slate-300 text-slate-500',
      received: 'bg-emerald-50 border-emerald-500 text-emerald-700 ring-2 ring-emerald-200',
    };

    const SERVER_CLASS = {
      idle:      'bg-white border-slate-200 text-slate-400',
      receiving: 'bg-amber-50 border-amber-400 text-amber-700 ring-2 ring-amber-200 animate-pulse',
      writing:   'bg-blue-50 border-blue-500 text-blue-700 ring-2 ring-blue-200',
      done:      'bg-emerald-50 border-emerald-500 text-emerald-700',
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-emerald-700 hover:text-emerald-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I &gt; Chapter 2. HTTP, 아주 느린 대화로 읽어보기</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-2-1. 요청과 응답 — 편지처럼 주고받는다</h1>
                </div>
              </div>
              <p className="text-slate-600">HTTP는 <b>편지 주고받기</b>입니다. 클라이언트가 먼저 요청(Request)을 보내고, 서버가 응답(Response)을 돌려줍니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-blue-700 border-blue-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">요청-응답 사이클</h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 다이어그램 */}
            <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between gap-8">
                {/* 클라이언트 */}
                <div className={`flex-1 p-6 rounded-xl border-2 text-center transition-all duration-500 ${CLIENT_CLASS[stepData.clientState]}`}>
                  <div className="text-4xl mb-2">&#x1F4BB;</div>
                  <div className="font-bold">클라이언트</div>
                  <div className="text-xs mt-1">(손님 / 브라우저)</div>
                  <div className="text-[10px] mt-2 font-mono">
                    {stepData.clientState === 'idle' && '대기 중'}
                    {stepData.clientState === 'writing' && '요청 작성 중...'}
                    {stepData.clientState === 'waiting' && '응답 대기 중...'}
                    {stepData.clientState === 'received' && '응답 수신 완료'}
                  </div>
                </div>

                {/* 편지 / 화살표 */}
                <div className="flex flex-col items-center gap-2 w-48">
                  {stepData.letterDir === 'toServer' && (
                    <div className="text-blue-600 font-bold text-sm animate-pulse flex items-center gap-1">
                      요청 <span className="text-xl">&rarr;</span>
                    </div>
                  )}
                  {stepData.letter && (
                    <div className={`p-3 rounded-lg border-2 text-xs font-mono w-full text-center transition-all duration-300 ${
                      stepData.letter.type === 'request'
                        ? 'bg-blue-50 border-blue-300 text-blue-700'
                        : 'bg-emerald-50 border-emerald-300 text-emerald-700'
                    }`}>
                      <div className="text-[10px] font-bold mb-1 uppercase">
                        {stepData.letter.type === 'request' ? '&#x2709;&#xFE0F; Request' : '&#x1F4E8; Response'}
                      </div>
                      <div className="whitespace-pre-wrap">{stepData.letter.text}</div>
                    </div>
                  )}
                  {!stepData.letter && (
                    <div className="text-slate-300 text-sm">편지 대기</div>
                  )}
                  {stepData.letterDir === 'toClient' && (
                    <div className="text-emerald-600 font-bold text-sm animate-pulse flex items-center gap-1">
                      <span className="text-xl">&larr;</span> 응답
                    </div>
                  )}
                </div>

                {/* 서버 */}
                <div className={`flex-1 p-6 rounded-xl border-2 text-center transition-all duration-500 ${SERVER_CLASS[stepData.serverState]}`}>
                  <div className="text-4xl mb-2">&#x1F5A5;&#xFE0F;</div>
                  <div className="font-bold">서버</div>
                  <div className="text-xs mt-1">(직원 / 웹 서버)</div>
                  <div className="text-[10px] mt-2 font-mono">
                    {stepData.serverState === 'idle' && '대기 중'}
                    {stepData.serverState === 'receiving' && '요청 수신 중...'}
                    {stepData.serverState === 'writing' && '응답 준비 중...'}
                    {stepData.serverState === 'done' && '응답 전송 완료'}
                  </div>
                </div>
              </div>

              {/* 핵심 원칙 */}
              {currentStepIdx === 4 && (
                <div className="mt-6 text-center">
                  <div className="inline-block bg-blue-100 border border-blue-300 text-blue-700 px-6 py-3 rounded-lg font-bold">
                    HTTP 핵심 원칙: 1 Request &rarr; 1 Response (항상 쌍)
                  </div>
                </div>
              )}

              <div className="mt-4 bg-slate-50 rounded-lg p-4 text-sm text-slate-600 border border-slate-200">
                <span className="font-bold text-slate-700">비유:</span> 편지를 보내면(요청) 답장이 온다(응답).
                먼저 편지를 보내지 않으면 답장도 오지 않는다 — 서버가 먼저 말을 거는 일은 기본 HTTP에서는 없다.
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['HTTP', '요청(Request)', '응답(Response)', '프로토콜'].map(kw => (
                <span key={kw} className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-sm font-medium border border-blue-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-blue-600 hover:bg-blue-700">
                  {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>)}
                </button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./I-1-3.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; I-1-3. 포트</a>
              <a href="./I-2-2.html" className="text-blue-600 hover:text-blue-800 font-medium">I-2-2. HTTP 메서드 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
