            '```python',
            '@app.middleware("http")',
            'async def add_process_time(request, call_next):',
            '    start = time.time()',
            '    response = await call_next(request)',
            '    response.headers["X-Process-Time"] = f"{(time.time()-start)*1000:.0f}ms"',
            '    return response',
            '```',
            '',
            '## ③ BackgroundTasks — 응답 후 비동기 작업',
            '```python',
            '@router.post("/orders")',
            'def create_order(payload: OrderCreate, tasks: BackgroundTasks):',
            '    order = service.create(payload)',
            '    tasks.add_task(send_email, order.user_id)  # 응답 후 실행',
            '    return order',
            '```',
            '',
            '## ④ Lifespan — 앱 시작/종료 (1회성)',
            '```python',
            '@asynccontextmanager',
            'async def lifespan(app):',
            '    await db_pool.start()   # 앱 시작',
            '    yield                   # 앱이 살아 있는 동안',
            '    await db_pool.close()   # 앱 종료',
            'app = FastAPI(lifespan=lifespan)',
            '```',
            '',
            '## TCP 커넥션은 어떻게 되는가',
            '- **HTTP/1.0** : 요청 1번 → close (매번 새로 연결)',
            '- **HTTP/1.1** : 기본 Keep-Alive (커넥션 재사용)',
            '- **HTTP/2**   : 한 커넥션에서 멀티플렉싱',
            '',
            '## 5단계가 1초에 수천 번 반복된다',
            'FastAPI가 비동기(async)인 이유 — I/O 대기 시간에 다른 요청을 처리.',
            '',
            '# ✅ 정리',
            '요청 텍스트 → 파싱 → 처리 → 응답 텍스트 → 정리. 이게 HTTP의 전부.',
          ],
          highlight: [4, 5, 6, 12, 13, 14, 22, 23, 24, 31, 32, 33, 41, 42, 43],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤 (Client ↔ Server 메시지 박스)
    // ─────────────────────────────────────────────────────
    const KIND_STYLE = {
      line:        { bg: 'bg-indigo-100',  border: 'border-indigo-400', text: 'text-indigo-900',  badge: 'bg-indigo-200 text-indigo-900' },
      header:      { bg: 'bg-sky-50',      border: 'border-sky-300',    text: 'text-sky-900',     badge: 'bg-sky-200 text-sky-900' },
      body:        { bg: 'bg-emerald-50',  border: 'border-emerald-300',text: 'text-emerald-900', badge: 'bg-emerald-200 text-emerald-900' },
      blank:       { bg: 'bg-slate-50',    border: 'border-slate-200',  text: 'text-slate-400',   badge: 'bg-slate-200 text-slate-500' },
      placeholder: { bg: 'bg-slate-50',    border: 'border-slate-200',  text: 'text-slate-400',   badge: 'bg-slate-200 text-slate-500' },
      work:        { bg: 'bg-amber-50',    border: 'border-amber-300',  text: 'text-amber-900',   badge: 'bg-amber-200 text-amber-900' },
      done:        { bg: 'bg-emerald-50',  border: 'border-emerald-300',text: 'text-emerald-900', badge: 'bg-emerald-200 text-emerald-900' },
      cleanup:     { bg: 'bg-violet-50',   border: 'border-violet-300', text: 'text-violet-900',  badge: 'bg-violet-200 text-violet-900' },
    };

    const KIND_BADGE = {
      line: '라인', header: '헤더', body: '바디', blank: '구분선',
      placeholder: '비어 있음', work: '작업', done: '완료', cleanup: '정리',
    };

    function MessageLine({ item }) {
      const s = KIND_STYLE[item.kind] || KIND_STYLE.header;
      return (
        <div className={`rounded-md border ${s.bg} ${s.border} px-2.5 py-1.5 flex items-start gap-2`}>
          <span className={`text-[10px] px-1.5 py-0.5 rounded ${s.badge} font-bold shrink-0`}>
            {KIND_BADGE[item.kind] || '–'}
          </span>
          <span className={`text-[12px] font-mono ${s.text} break-all whitespace-pre-wrap leading-snug`}>
            {item.text || ' '}
          </span>
        </div>
      );
    }

    function MessageBox({ side, box }) {
      const isClient = side === 'client';
      const tone = isClient
        ? { ring: 'border-indigo-400', head: 'bg-indigo-600 text-white', icon: '💻' }
        : { ring: 'border-violet-400', head: 'bg-violet-600 text-white', icon: '🖥️' };
      return (
        <div className={`rounded-xl border-2 ${tone.ring} bg-white shadow-sm flex flex-col`}>
          <div className={`${tone.head} px-3 py-1.5 rounded-t-lg flex items-center gap-2`}>
            <span className="text-base">{tone.icon}</span>
            <span className="text-xs font-bold">{box.label}</span>
            <span className="ml-auto text-[10px] uppercase tracking-wider opacity-80">{box.state}</span>
          </div>
          <div className="p-2 space-y-1.5">
            {box.lines.map((it, i) => (
              <MessageLine key={i} item={it} />
            ))}
          </div>
        </div>
      );
    }

    function WireBar({ wire }) {
      const dirIcon = wire.dir === 'toServer'
        ? '→ → → →'
        : wire.dir === 'toClient'
          ? '← ← ← ←'
          : wire.dir === 'idle'
            ? '∼ ∼ ∼ ∼'
            : '· · · ·';
      const tone = wire.dir === 'toServer'
        ? 'text-indigo-700 bg-indigo-50 border-indigo-300'
        : wire.dir === 'toClient'
          ? 'text-violet-700 bg-violet-50 border-violet-300'
          : wire.dir === 'idle'
            ? 'text-emerald-700 bg-emerald-50 border-emerald-300'
            : 'text-slate-500 bg-slate-50 border-slate-200';
      return (
        <div className={`rounded-md border-2 border-dashed ${tone} px-3 py-2 text-center`}>
          <div className="text-xs font-bold">{wire.label}</div>
          <div className="text-sm font-mono mt-1 tracking-widest">{dirIcon}</div>
          <div className="text-[10px] mt-0.5 opacity-70">TCP / IP 네트워크</div>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-3 h-full flex flex-col">
          <div className="flex items-center justify-between mb-2">
            <h3 className="text-sm font-bold text-indigo-800">HTTP 통신 시뮬레이션</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 메시지 흐름</span>
          </div>
          <div className="space-y-2">
            <MessageBox side="client" box={state.clientBox} />
            <WireBar wire={state.wire} />
            <MessageBox side="server" box={state.serverBox} />
          </div>
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js, 5탭)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ stepIdx, total, activeFile, onSelectFile, files }) {
      const codeRef = useRef(null);
      const code = files[activeFile];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code, activeFile]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 탭 헤더 */}
          <div className="flex items-center gap-1 px-2 pt-2 bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {Object.keys(files).map((fname, i) => {
              const isActive = fname === activeFile;
              return (
                <button
                  key={fname}
                  onClick={() => onSelectFile(fname)}
                  className={`px-3 py-1.5 text-[11px] font-mono rounded-t-md whitespace-nowrap border-t border-l border-r ${
                    isActive
                      ? 'bg-[#282c34] text-indigo-300 border-slate-700'
                      : 'bg-slate-800 text-slate-400 border-transparent hover:text-slate-200'
                  } ${i === stepIdx ? 'font-bold' : ''}`}
                >
                  {fname}
                </button>
              );
            })}
          </div>
          {/* 윈도우 컨트롤 + 파일명 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          {/* 코드 영역 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          {/* 푸터 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 5개 파일을 모두 모은 dict (탭 전환용)
      const files = {};
      STEPS.forEach((s) => { files[s.code.filename] = s.code; });
      const fileNames = Object.keys(files);

      // 현재 step에 따라 활성 탭을 자동 변경. 사용자가 탭을 클릭하면 그 탭을 유지.
      const [activeFile, setActiveFile] = useState(fileNames[0]);
      const [userOverride, setUserOverride] = useState(false);

      useEffect(() => {
        if (!userOverride) {
          setActiveFile(step.code.filename);
        }
      }, [stepIdx]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') {
            setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
            setUserOverride(false);
          } else if (e.key === 'ArrowLeft') {
            setStepIdx((i) => Math.max(0, i - 1));
            setUserOverride(false);
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
          setUserOverride(false);
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      const onSelectFile = (fname) => {
        setActiveFile(fname);
        setUserOverride(true);
      };

      const goStep = (i) => {
        setStepIdx(i);
        setUserOverride(false);
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">I</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">I-2-1. HTTP 요청과 응답</h1>
                <p className="text-sm text-indigo-800/80">클라이언트 요청 → 서버 수신 → 처리 → 응답 → 라이프사이클. 5단계로 추적</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <button key={i} onClick={() => goStep(i)} aria-label={`Step ${i + 1}로 이동`} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`} />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer stepIdx={stepIdx} total={STEPS.length} activeFile={activeFile} onSelectFile={onSelectFile} files={files} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => goStep(0)} className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50">처음</button>
              <button onClick={() => goStep(Math.max(0, stepIdx - 1))} disabled={stepIdx === 0} className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) goStep(0); setPlaying((p) => !p); }} className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => goStep(Math.min(STEPS.length - 1, stepIdx + 1))} disabled={isLast} className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계 · 탭 클릭으로 코드 비교</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                HTTP 통신은 텍스트 메시지의 왕복이다. 요청라인 + 헤더 + 바디 형태로 보내고 받고, 그 사이에서 서버가 처리하고, 마지막에 자원을 정리한다. FastAPI는 이 5단계를 타입 힌트와 의존성 주입으로 깔끔하게 표현한다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['HTTP', '요청라인', '헤더', '바디', '상태코드', 'FastAPI', 'uvicorn', 'Pydantic', 'Keep-Alive', 'Lifespan'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./I-2-2.html" className="underline hover:no-underline">다음: I-2-2 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
