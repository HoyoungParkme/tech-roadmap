          '- 이제 양방향 통신 채널 확보',
          '',
          '### 3단계: HTTP 요청 패킷 캡슐화',
          '- 애플리케이션 계층 : HTTP/1.1 GET /users',
          '- 전송 계층(TCP)    : 포트 + 시퀀스 번호',
          '- 네트워크 계층(IP) : 출발/도착 IP 주소',
          '- 데이터 링크 계층  : MAC 주소 + 프레임',
          '',
          '### 4단계: 라우팅 (다음 홉으로 전달)',
          '- 내 PC → 공유기(192.168.0.1)',
          '- 공유기 → ISP 라우터 (NAT 변환)',
          '- ISP 라우터 → 백본 라우터',
          '- 백본 → IXP → 상대 ISP',
          '- 상대 ISP → 목적지 서버',
          '',
          '### 5단계: traceroute 로 직접 확인',
          '- traceroute api.example.com',
          '- 각 홉의 IP와 응답 시간 표시',
          '- "* * *" 는 응답하지 않는 라우터(필터링)',
          '',
          '## 패킷 손실/재전송',
          '- TCP는 패킷 순서/손실을 책임진다',
          '- 누락된 패킷 발견 시 자동 재전송',
          '- 그래서 "신뢰성 있는 전송 계층"이라 부른다',
          '',
          '## 전체 소요 시간',
          '- 같은 도시 서버 : 5~20ms',
          '- 국내 다른 지역 : 20~50ms',
          '- 미국 서버      : 130~180ms (RTT)',
          '- 평소 우리가 "빠르다"고 느끼는 모든 통신이 이 흐름',
          '',
          '## 핵심 정리',
          '- 인터넷 = 단말 + ISP + 백본 + IXP + DNS + TCP/IP',
          '- 0.1초도 안 되는 시간에 이 모든 일이 동시 진행',
          '- FastAPI 서버도 이 흐름의 마지막 "도착지"일 뿐',
        ],
        highlight: [7, 8, 9, 10, 11, 19, 20, 21, 22, 23, 24, 25, 26, 38, 39, 40, 41],
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — 네트워크 토폴로지 SVG
    // ─────────────────────────────────────────────────────
    function TopologyView({ step }) {
      const activeNodes = new Set(step.activeNodes);
      const activeLinks = new Set(step.activeLinks);

      // 좌표 변환: col(1~5) → x(80~720), row(1~3) → y(60~240)
      const xOf = (col) => 80 + (col - 1) * 160;
      const yOf = (row) => 60 + (row - 1) * 90;

      return (
        <svg viewBox="0 0 800 320" className="w-full">
          {/* 배경 그리드 */}
          <defs>
            <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
              <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e0e7ff" strokeWidth="0.5" />
            </pattern>
          </defs>
          <rect width="800" height="320" fill="url(#grid)" opacity="0.4" />

          {/* 링크 */}
          {LINKS.map((lk, i) => {
            const a = NODES.find((n) => n.id === lk.from);
            const b = NODES.find((n) => n.id === lk.to);
            const key = `${lk.from}-${lk.to}`;
            const isActive = activeLinks.has(key);
            return (
              <line
                key={i}
                x1={xOf(a.col)}
                y1={yOf(a.row)}
                x2={xOf(b.col)}
                y2={yOf(b.row)}
                stroke={isActive ? '#4f46e5' : '#cbd5e1'}
                strokeWidth={isActive ? 3 : 1.5}
                strokeDasharray={isActive ? '0' : '4 4'}
              />
            );
          })}

          {/* 노드 */}
          {NODES.map((n, i) => {
            const isActive = activeNodes.has(n.id);
            const cx = xOf(n.col);
            const cy = yOf(n.row);
            return (
              <g key={i}>
                <circle
                  cx={cx}
                  cy={cy}
                  r="32"
                  fill={isActive ? '#4f46e5' : '#ffffff'}
                  stroke={isActive ? '#3730a3' : '#94a3b8'}
                  strokeWidth={isActive ? 3 : 1.5}
                />
                <text
                  x={cx}
                  y={cy + 6}
                  textAnchor="middle"
                  fontSize="22"
                >{n.icon}</text>
                <text
                  x={cx}
                  y={cy + 52}
                  textAnchor="middle"
                  fontSize="11"
                  fontWeight="bold"
                  fill={isActive ? '#3730a3' : '#475569'}
                >{n.label}</text>
                <text
                  x={cx}
                  y={cy + 66}
                  textAnchor="middle"
                  fontSize="9"
                  fill={isActive ? '#6366f1' : '#94a3b8'}
                >{n.role}</text>
              </g>
            );
          })}
        </svg>
      );
    }

    function LiveDataPane({ step }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">네트워크 토폴로지</h3>
            <span className="text-[10px] text-slate-500">Client → ISP → Backbone → IXP → Server</span>
          </div>
          <div className="flex-1 flex items-center justify-center">
            <TopologyView step={step} />
          </div>
          <div className="mt-3 rounded-lg border border-indigo-200 bg-indigo-50 px-3 py-2 text-xs text-indigo-900">
            <span className="font-bold">현재 단계: </span>{step.summary}
          </div>
          <div className="mt-2 rounded-lg bg-indigo-100 border border-indigo-200 px-3 py-2 text-xs text-indigo-900">
            💡 {step.keyPoint}
          </div>
          <div className="mt-2 flex flex-wrap gap-1.5 text-[10px]">
            {step.activeNodes.map((id) => {
              const n = NODES.find((x) => x.id === id);
              return (
                <span key={id} className="px-2 py-0.5 rounded-full bg-indigo-600 text-white">
                  {n.icon} {n.label}
                </span>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (탭 5개 + highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ activeTab, onTabChange, stepIdx, total }) {
      const codeRef = useRef(null);
      const code = TABS[activeTab];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [activeTab]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 윈도우 헤더 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>

          {/* 탭 바 */}
          <div className="flex bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {TABS.map((t, i) => (
              <button
                key={i}
                onClick={() => onTabChange(i)}
                className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                  i === activeTab
                    ? 'bg-[#282c34] text-indigo-300 border-t-2 border-t-indigo-400'
                    : 'text-slate-400 hover:bg-slate-800'
                }`}
              >
                {t.filename}
              </button>
            ))}
          </div>

          {/* 코드 본문 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>

          {/* 상태 바 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total} · Tab {activeTab + 1} / {TABS.length}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [activeTab, setActiveTab] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 단계 이동 시 해당 단계 권장 탭으로 동기화
      useEffect(() => {
        setActiveTab(step.tabIdx);
      }, [stepIdx]);

      // 키보드 ← → 단계 이동
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동재생 3000ms
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-blue-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">I</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">I-1-1. 인터넷이 어떻게 연결돼 있나</h1>
                <p className="text-sm text-indigo-800/80">단말 → ISP → 백본/IXP → DNS → end-to-end TCP/IP 5단계 추적</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane step={step} />
              <CodeViewer
                activeTab={activeTab}
                onTabChange={setActiveTab}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                인터넷은 단말 + ISP + 백본/IXP + DNS + TCP/IP 라우팅이 한 몸으로 동작하는 시스템이다. 다음 챕터(I-1-2)에서는 이 위에서 실제로 "서버 한 대"가 어떻게 클라이언트 요청을 받아 처리하는지 살펴본다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['단말', 'ISP', '백본', 'IXP', 'DNS', 'TCP/IP', 'NAT', 'traceroute'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./I-1-2.html" className="underline hover:no-underline">다음: I-1-2 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
