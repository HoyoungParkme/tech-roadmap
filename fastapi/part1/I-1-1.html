<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — I-1-1. 인터넷이 어떻게 연결돼 있나</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    I-1-1. 인터넷이 어떻게 연결돼 있나
    학습 목표: 인터넷이 컴퓨터들을 이어주는 거대한 연결망임을 설명할 수 있다.
    템플릿: 개념형 (Type A) — 코드 패널 없이 전체 너비 다이어그램.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // -----------------------------------------
    // 1. 시뮬레이션 스텝 (5단계)
    // -----------------------------------------
    const STEPS = [
      {
        desc: "[혼자인 컴퓨터] 내 컴퓨터 한 대가 놓여 있습니다. 다른 컴퓨터와 연결되어 있지 않으면 아무것도 주고받을 수 없습니다.",
        visibleNodes: ['myPC'],
        visibleLinks: [],
        activeLink: null,
        packetFrom: null,
        packetTo: null,
        brokenLink: null,
      },
      {
        desc: "[연결 시작] 케이블이나 와이파이로 공유기(라우터)에 연결합니다. 다른 컴퓨터들도 같은 라우터에 연결되면 서로 데이터를 주고받을 수 있습니다.",
        visibleNodes: ['myPC', 'routerA', 'friendPC', 'serverA'],
        visibleLinks: ['myPC-routerA', 'routerA-friendPC', 'routerA-serverA'],
        activeLink: null,
        packetFrom: null,
        packetTo: null,
        brokenLink: null,
      },
      {
        desc: "[데이터 전송] 내 컴퓨터에서 보낸 데이터 패킷이 라우터를 거쳐 서버까지 전달됩니다. 택배가 물류 센터를 경유하는 것과 같습니다.",
        visibleNodes: ['myPC', 'routerA', 'routerB', 'friendPC', 'serverA', 'serverB'],
        visibleLinks: ['myPC-routerA', 'routerA-friendPC', 'routerA-serverA', 'routerA-routerB', 'routerB-serverB'],
        activeLink: 'myPC-routerA',
        packetFrom: 'myPC',
        packetTo: 'serverB',
        brokenLink: null,
      },
      {
        desc: "[대체 경로] 중간 경로가 끊겨도 다른 길을 찾아서 전달합니다 — 이것이 인터넷의 핵심 설계 원칙입니다. 하나의 길이 막혀도 데이터는 돌아갑니다.",
        visibleNodes: ['myPC', 'routerA', 'routerB', 'routerC', 'friendPC', 'serverA', 'serverB'],
        visibleLinks: ['myPC-routerA', 'routerA-friendPC', 'routerA-serverA', 'routerA-routerB', 'routerB-serverB', 'routerA-routerC', 'routerC-serverB'],
        activeLink: 'routerA-routerC',
        packetFrom: 'myPC',
        packetTo: 'serverB',
        brokenLink: 'routerA-routerB',
      },
      {
        desc: "[인터넷 전체] 이 연결 구조가 전 세계 수십억 대의 컴퓨터로 확장된 것이 인터넷(Internet)입니다. 우리 집 공유기도 이 거대한 그물망의 한 매듭(노드)입니다.",
        visibleNodes: ['myPC', 'routerA', 'routerB', 'routerC', 'friendPC', 'serverA', 'serverB'],
        visibleLinks: ['myPC-routerA', 'routerA-friendPC', 'routerA-serverA', 'routerA-routerB', 'routerB-serverB', 'routerA-routerC', 'routerC-serverB', 'routerC-routerB'],
        activeLink: null,
        packetFrom: null,
        packetTo: null,
        brokenLink: null,
      },
    ];

    // -----------------------------------------
    // 2. 노드 정의 (위치, 라벨, 아이콘)
    // -----------------------------------------
    const NODES = {
      myPC:     { x: 10, y: 40, label: '내 컴퓨터', type: 'pc' },
      routerA:  { x: 35, y: 35, label: '공유기 A', type: 'router' },
      routerB:  { x: 60, y: 20, label: '라우터 B', type: 'router' },
      routerC:  { x: 60, y: 55, label: '라우터 C', type: 'router' },
      friendPC: { x: 35, y: 65, label: '친구 PC', type: 'pc' },
      serverA:  { x: 55, y: 40, label: '서버 A', type: 'server' },
      serverB:  { x: 85, y: 38, label: '서버 B', type: 'server' },
    };

    // -----------------------------------------
    // 3. 링크 정의
    // -----------------------------------------
    const LINKS = {
      'myPC-routerA':    ['myPC', 'routerA'],
      'routerA-friendPC':['routerA', 'friendPC'],
      'routerA-serverA': ['routerA', 'serverA'],
      'routerA-routerB': ['routerA', 'routerB'],
      'routerB-serverB': ['routerB', 'serverB'],
      'routerA-routerC': ['routerA', 'routerC'],
      'routerC-serverB': ['routerC', 'serverB'],
      'routerC-routerB': ['routerC', 'routerB'],
    };

    // -----------------------------------------
    // 4. 스타일 매핑 (Tailwind JIT 안전)
    // -----------------------------------------
    const NODE_STYLE = {
      pc:     { bg: 'bg-blue-100', border: 'border-blue-500', text: 'text-blue-700', icon: '\uD83D\uDCBB' },
      router: { bg: 'bg-amber-100', border: 'border-amber-500', text: 'text-amber-700', icon: '\uD83D\uDD00' },
      server: { bg: 'bg-emerald-100', border: 'border-emerald-500', text: 'text-emerald-700', icon: '\uD83D\uDDC4\uFE0F' },
    };

    // -----------------------------------------
    // 5. 메인 앱
    // -----------------------------------------
    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">

            {/* 허브 네비게이션 */}
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-emerald-700 hover:text-emerald-900 font-medium">
                <span aria-hidden="true">&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. 왜 웹인가 &gt; Chapter 1. 컴퓨터끼리 어떻게 이야기하나</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-1-1. 인터넷이 어떻게 연결돼 있나</h1>
                </div>
              </div>
              <p className="text-slate-600">
                인터넷은 전 세계 컴퓨터가 <b>그물망처럼 연결</b>된 거대한 네트워크입니다.
                택배가 물류 센터를 거쳐 목적지에 도착하듯, 데이터도 여러 라우터를 거쳐 전달됩니다.
              </p>
            </header>

            {/* 현재 단계 설명 */}
            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-blue-700 border-blue-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">네트워크 구조</h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 다이어그램 (전체 너비) */}
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 relative" style={{minHeight: '400px'}}>
              {/* SVG 연결선 */}
              <svg className="absolute inset-0 w-full h-full pointer-events-none" style={{zIndex: 1}}>
                {Object.entries(LINKS).map(([linkId, [fromId, toId]]) => {
                  if (!stepData.visibleLinks.includes(linkId)) return null;
                  const from = NODES[fromId];
                  const to = NODES[toId];
                  const isBroken = stepData.brokenLink === linkId;
                  const isActive = stepData.activeLink === linkId;

                  return (
                    <line
                      key={linkId}
                      x1={`${from.x}%`} y1={`${from.y}%`}
                      x2={`${to.x}%`} y2={`${to.y}%`}
                      stroke={isBroken ? '#ef4444' : isActive ? '#22c55e' : '#94a3b8'}
                      strokeWidth={isActive ? 3 : 2}
                      strokeDasharray={isBroken ? '8,4' : 'none'}
                      className="transition-all duration-500"
                    />
                  );
                })}

                {/* X 표시 (끊긴 링크) */}
                {stepData.brokenLink && LINKS[stepData.brokenLink] && (() => {
                  const [fromId, toId] = LINKS[stepData.brokenLink];
                  const from = NODES[fromId];
                  const to = NODES[toId];
                  const mx = (from.x + to.x) / 2;
                  const my = (from.y + to.y) / 2;
                  return (
                    <text x={`${mx}%`} y={`${my}%`} textAnchor="middle" dominantBaseline="middle"
                      fill="#ef4444" fontSize="24" fontWeight="bold">
                      X
                    </text>
                  );
                })()}
              </svg>

              {/* 노드 */}
              {Object.entries(NODES).map(([nodeId, node]) => {
                const isVisible = stepData.visibleNodes.includes(nodeId);
                const style = NODE_STYLE[node.type];
                const isSource = stepData.packetFrom === nodeId;
                const isDest = stepData.packetTo === nodeId;

                return (
                  <div
                    key={nodeId}
                    className={`absolute transition-all duration-500 flex flex-col items-center ${isVisible ? 'opacity-100 scale-100' : 'opacity-0 scale-75'}`}
                    style={{
                      left: `${node.x}%`,
                      top: `${node.y}%`,
                      transform: 'translate(-50%, -50%)',
                      zIndex: 2,
                    }}
                  >
                    <div className={`w-14 h-14 rounded-full border-2 flex items-center justify-center text-2xl ${style.bg} ${style.border} ${isSource || isDest ? 'ring-4 ring-emerald-300 shadow-lg scale-110' : ''} transition-all duration-300`}>
                      {style.icon}
                    </div>
                    <div className={`text-xs font-bold mt-1 ${style.text} whitespace-nowrap`}>{node.label}</div>
                    {isSource && <div className="text-[10px] bg-emerald-100 text-emerald-700 px-2 rounded-full mt-0.5 font-bold">발신</div>}
                    {isDest && <div className="text-[10px] bg-emerald-100 text-emerald-700 px-2 rounded-full mt-0.5 font-bold">수신</div>}
                  </div>
                );
              })}

              {/* 인터넷 전체 라벨 (마지막 단계) */}
              {currentStepIdx === 4 && (
                <div className="absolute inset-0 flex items-end justify-center pb-4" style={{zIndex: 3}}>
                  <div className="bg-blue-600 text-white px-6 py-2 rounded-full font-bold text-sm shadow-lg">
                    이 전체 그물망 = 인터넷 (Internet)
                  </div>
                </div>
              )}
            </div>

            {/* 핵심 키워드 */}
            <div className="flex flex-wrap gap-2">
              {['인터넷', '네트워크', '라우터', '데이터 패킷'].map(kw => (
                <span key={kw} className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-sm font-medium border border-blue-200">{kw}</span>
              ))}
            </div>

            {/* 컨트롤 바 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-blue-600 hover:bg-blue-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                  )}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length}
              </div>
            </div>

            {/* 다음 섹션 안내 */}
            <div className="text-sm text-slate-500 text-right">
              다음: <a href="./I-1-2.html" className="text-blue-600 hover:text-blue-800 font-medium">I-1-2. IP, 도메인, DNS →</a>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
