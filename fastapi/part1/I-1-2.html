<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — I-1-2. IP, 도메인, DNS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    I-1-2. IP, 도메인, DNS — 주소의 종류
    학습 목표: IP 주소와 도메인 이름의 차이를 설명하고, DNS가 둘을 어떻게 연결하는지 말할 수 있다.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "[숫자 주소] 인터넷의 모든 컴퓨터는 IP 주소라는 숫자 주소를 가집니다. 예를 들어 구글 서버의 주소는 142.250.207.46입니다.",
        browserUrl: '',
        dnsState: 'idle',
        dnsQuery: '',
        dnsResponse: '',
        serverState: 'idle',
        serverIp: '142.250.207.46',
        highlight: 'server',
        arrowStep: 0,
      },
      {
        desc: "[이름 붙이기] 숫자를 외우기 어려우니 사람이 읽을 수 있는 이름(도메인)을 붙입니다. 142.250.207.46 대신 google.com이라고 부릅니다.",
        browserUrl: 'google.com',
        dnsState: 'idle',
        dnsQuery: '',
        dnsResponse: '',
        serverState: 'idle',
        serverIp: '142.250.207.46',
        highlight: 'browser',
        arrowStep: 0,
      },
      {
        desc: "[DNS 질의] 브라우저에 google.com을 입력하면, 먼저 DNS 서버에 물어봅니다: \"google.com의 IP 주소가 뭐야?\"",
        browserUrl: 'google.com',
        dnsState: 'querying',
        dnsQuery: 'google.com의 IP는?',
        dnsResponse: '',
        serverState: 'idle',
        serverIp: '142.250.207.46',
        highlight: 'dns',
        arrowStep: 1,
      },
      {
        desc: "[IP 반환] DNS 서버가 전화번호부를 찾아서 응답합니다: \"142.250.207.46이야.\" 이제 브라우저가 실제 주소를 알게 됩니다.",
        browserUrl: 'google.com',
        dnsState: 'resolved',
        dnsQuery: 'google.com의 IP는?',
        dnsResponse: '142.250.207.46',
        serverState: 'idle',
        serverIp: '142.250.207.46',
        highlight: 'dns',
        arrowStep: 2,
      },
      {
        desc: "[연결 완료] 브라우저가 알아낸 IP 주소(142.250.207.46)로 직접 접속합니다. 웹사이트가 로드됩니다. 이 과정이 매번 주소를 입력할 때마다 일어납니다.",
        browserUrl: 'google.com',
        dnsState: 'resolved',
        dnsQuery: '',
        dnsResponse: '142.250.207.46',
        serverState: 'connected',
        serverIp: '142.250.207.46',
        highlight: 'server',
        arrowStep: 3,
      },
    ];

    const DNS_CLASS = {
      idle:     'bg-white border-slate-200 text-slate-400',
      querying: 'bg-amber-50 border-amber-400 text-amber-700 ring-2 ring-amber-200 animate-pulse',
      resolved: 'bg-emerald-50 border-emerald-500 text-emerald-700',
    };

    const SERVER_CLASS = {
      idle:      'bg-white border-slate-200 text-slate-400',
      connected: 'bg-emerald-50 border-emerald-500 text-emerald-700 ring-2 ring-emerald-300',
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); }
      };
      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">

            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-emerald-700 hover:text-emerald-900 font-medium">
                <span aria-hidden="true">&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. 왜 웹인가 &gt; Chapter 1. 컴퓨터끼리 어떻게 이야기하나</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-1-2. IP, 도메인, DNS — 주소의 종류</h1>
                </div>
              </div>
              <p className="text-slate-600">
                IP 주소는 컴퓨터의 <b>숫자 주소</b>이고, 도메인은 사람이 읽기 쉬운 <b>이름</b>입니다.
                DNS는 이름을 숫자로 바꿔주는 <b>전화번호부</b>입니다.
              </p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-blue-700 border-blue-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">DNS 조회 과정</h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 다이어그램 (전체 너비) */}
            <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200 space-y-6">

              {/* 3열 레이아웃: 브라우저 — DNS — 서버 */}
              <div className="grid grid-cols-3 gap-4 items-start">

                {/* 브라우저 */}
                <div className={`p-4 rounded-xl border-2 text-center transition-all duration-500 ${stepData.highlight === 'browser' ? 'bg-blue-50 border-blue-500 text-blue-700 ring-2 ring-blue-200' : 'bg-white border-slate-200 text-slate-600'}`}>
                  <div className="text-3xl mb-2">&#x1F310;</div>
                  <div className="font-bold text-sm">웹 브라우저</div>
                  {stepData.browserUrl && (
                    <div className="mt-2 bg-white border border-slate-300 rounded-lg px-3 py-2 text-xs font-mono">
                      <span className="text-slate-400">https://</span>
                      <span className="text-blue-600 font-bold">{stepData.browserUrl}</span>
                    </div>
                  )}
                </div>

                {/* DNS 서버 */}
                <div className={`p-4 rounded-xl border-2 text-center transition-all duration-500 ${DNS_CLASS[stepData.dnsState]}`}>
                  <div className="text-3xl mb-2">&#x1F4D6;</div>
                  <div className="font-bold text-sm">DNS 서버</div>
                  <div className="text-[10px] mt-1">전화번호부</div>
                  {stepData.dnsQuery && (
                    <div className="mt-2 bg-white/80 rounded-lg px-2 py-1 text-xs font-mono">
                      Q: {stepData.dnsQuery}
                    </div>
                  )}
                  {stepData.dnsResponse && (
                    <div className="mt-1 bg-emerald-100 rounded-lg px-2 py-1 text-xs font-mono text-emerald-700 font-bold">
                      A: {stepData.dnsResponse}
                    </div>
                  )}
                </div>

                {/* 웹 서버 */}
                <div className={`p-4 rounded-xl border-2 text-center transition-all duration-500 ${SERVER_CLASS[stepData.serverState]}`}>
                  <div className="text-3xl mb-2">&#x1F5A5;&#xFE0F;</div>
                  <div className="font-bold text-sm">구글 서버</div>
                  <div className="mt-2 bg-slate-100 rounded-lg px-2 py-1 text-xs font-mono">
                    IP: <span className="font-bold">{stepData.serverIp}</span>
                  </div>
                  {stepData.serverState === 'connected' && (
                    <div className="mt-1 text-[10px] bg-emerald-200 text-emerald-800 px-2 py-0.5 rounded-full inline-block font-bold">연결됨</div>
                  )}
                </div>
              </div>

              {/* 화살표 영역 */}
              <div className="grid grid-cols-3 gap-4">
                <div className="text-center">
                  {stepData.arrowStep >= 1 && (
                    <div className="text-amber-500 font-bold text-sm animate-pulse">→ DNS 질의 →</div>
                  )}
                </div>
                <div className="text-center">
                  {stepData.arrowStep >= 2 && (
                    <div className="text-emerald-500 font-bold text-sm">← IP 응답 ←</div>
                  )}
                </div>
                <div></div>
              </div>

              {stepData.arrowStep >= 3 && (
                <div className="text-center">
                  <div className="inline-block bg-emerald-100 border border-emerald-300 text-emerald-700 px-4 py-2 rounded-lg text-sm font-bold">
                    브라우저 → 142.250.207.46 직접 연결 → 웹사이트 로드 완료
                  </div>
                </div>
              )}

              {/* 비유 박스 */}
              <div className="bg-slate-50 rounded-lg p-4 text-sm text-slate-600 border border-slate-200">
                <span className="font-bold text-slate-700">비유:</span> IP 주소는 집의 위도/경도 좌표(37.5665, 126.9780)이고,
                도메인은 사람이 부르는 주소(서울시 중구 세종대로)다.
                DNS는 좌표와 주소를 연결해주는 지도 앱이다.
              </div>
            </div>

            {/* 핵심 키워드 */}
            <div className="flex flex-wrap gap-2">
              {['IP 주소', '도메인', 'DNS', '네임 서버'].map(kw => (
                <span key={kw} className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-sm font-medium border border-blue-200">{kw}</span>
              ))}
            </div>

            {/* 컨트롤 바 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-blue-600 hover:bg-blue-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                  )}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length}
              </div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./I-1-1.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; I-1-1. 인터넷 연결</a>
              <a href="./I-1-3.html" className="text-blue-600 hover:text-blue-800 font-medium">I-1-3. 포트 &rarr;</a>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
