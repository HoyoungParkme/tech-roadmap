<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — I-2-3. 상태 코드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CODE_BANDS = [
      { range: '2xx', label: '성공', desc: '요청이 잘 처리됨', color: 'emerald', icon: '\u2705', codes: [{ code: 200, name: 'OK', desc: '정상 처리' }, { code: 201, name: 'Created', desc: '새 데이터 생성됨' }] },
      { range: '3xx', label: '이동', desc: '다른 곳으로 안내', color: 'blue', icon: '\u27A1\uFE0F', codes: [{ code: 301, name: 'Moved', desc: '주소가 바뀜' }, { code: 304, name: 'Not Modified', desc: '변경 없음' }] },
      { range: '4xx', label: '클라이언트 잘못', desc: '요청에 문제 있음', color: 'amber', icon: '\u26A0\uFE0F', codes: [{ code: 400, name: 'Bad Request', desc: '잘못된 요청' }, { code: 404, name: 'Not Found', desc: '찾을 수 없음' }, { code: 422, name: 'Unprocessable', desc: '타입 오류' }] },
      { range: '5xx', label: '서버 잘못', desc: '서버에 문제 발생', color: 'rose', icon: '\uD83D\uDCA5', codes: [{ code: 500, name: 'Server Error', desc: '서버 고장' }, { code: 503, name: 'Unavailable', desc: '서비스 중단' }] },
    ];

    const BAND_STYLE = {
      emerald: { bg: 'bg-emerald-50', border: 'border-emerald-500', text: 'text-emerald-700', ring: 'ring-emerald-200', badge: 'bg-emerald-600' },
      blue:    { bg: 'bg-blue-50',    border: 'border-blue-500',    text: 'text-blue-700',    ring: 'ring-blue-200',    badge: 'bg-blue-600' },
      amber:   { bg: 'bg-amber-50',   border: 'border-amber-500',   text: 'text-amber-700',   ring: 'ring-amber-200',   badge: 'bg-amber-600' },
      rose:    { bg: 'bg-rose-50',    border: 'border-rose-500',    text: 'text-rose-700',    ring: 'ring-rose-200',    badge: 'bg-rose-600' },
    };

    const STEPS = [
      { desc: "[상태 코드란?] 서버가 응답할 때 숫자 코드를 함께 돌려줍니다. 이 숫자가 요청의 처리 결과를 알려주는 상태 코드(Status Code)입니다.", activeBand: null, activeCode: null },
      { desc: "[2xx — 성공] 200번대는 \"잘 됐어!\"라는 뜻입니다. 200 OK가 가장 흔하고, 201 Created는 새 데이터가 만들어졌다는 뜻입니다.", activeBand: '2xx', activeCode: 200 },
      { desc: "[4xx — 클라이언트 잘못] 400번대는 \"네가 잘못 보냈어\"라는 뜻입니다. 404 Not Found는 요청한 페이지가 없다는 뜻 — 브라우저에서 본 적 있을 겁니다.", activeBand: '4xx', activeCode: 404 },
      { desc: "[5xx — 서버 잘못] 500번대는 \"내(서버)가 고장났어\"라는 뜻입니다. 500 Internal Server Error는 서버 코드에 버그가 있거나 다운됐을 때 나옵니다.", activeBand: '5xx', activeCode: 500 },
      { desc: "[대역 정리] 첫 번째 자리로 분류합니다: 2xx 성공, 3xx 이동, 4xx 클라이언트 잘못, 5xx 서버 잘못. 이 규칙만 알면 처음 보는 코드도 대략 뜻을 짐작할 수 있습니다.", activeBand: null, activeCode: null },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;
      const showAll = stepData.activeBand === null;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-emerald-700 hover:text-emerald-900 font-medium"><span>&larr;</span> 허브</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I &gt; Chapter 2. HTTP</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-2-3. 상태 코드 — 200 / 404 / 500</h1>
                </div>
              </div>
              <p className="text-slate-600">상태 코드는 서버의 <b>대답 번호</b>입니다. 첫 자리만 보면 성공(2xx), 이동(3xx), 내 잘못(4xx), 서버 잘못(5xx)을 바로 알 수 있습니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-blue-700 border-blue-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">상태 코드 대역</h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 space-y-4">
              {CODE_BANDS.map(band => {
                const isActive = showAll || stepData.activeBand === band.range;
                const s = BAND_STYLE[band.color];
                return (
                  <div key={band.range} className={`p-4 rounded-xl border-2 transition-all duration-500 ${isActive ? `${s.bg} ${s.border} ${s.text}` : 'bg-slate-50 border-slate-200 text-slate-300'} ${stepData.activeBand === band.range ? 'ring-2 ' + s.ring + ' shadow-lg scale-[1.02]' : ''}`}>
                    <div className="flex items-center gap-3 mb-2">
                      <span className="text-2xl">{band.icon}</span>
                      <span className={`px-3 py-1 rounded-full text-white text-sm font-bold ${isActive ? s.badge : 'bg-slate-300'}`}>{band.range}</span>
                      <span className="font-bold">{band.label}</span>
                      <span className="text-sm opacity-70">— {band.desc}</span>
                    </div>
                    <div className="flex flex-wrap gap-2 ml-10">
                      {band.codes.map(c => (
                        <div key={c.code} className={`px-3 py-1.5 rounded-lg border text-xs font-mono transition-all duration-300 ${
                          stepData.activeCode === c.code ? 'bg-white border-current font-bold shadow-md scale-110' : 'border-current/30'
                        }`}>
                          <span className="font-bold">{c.code}</span> {c.name} <span className="opacity-60">({c.desc})</span>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}

              <div className="bg-slate-50 rounded-lg p-4 text-sm text-slate-600 border border-slate-200">
                <span className="font-bold text-slate-700">팁:</span> FastAPI에서 가장 자주 만나는 코드는 200(성공), 201(생성됨), 404(없음), 422(타입 오류)입니다.
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['상태 코드', '200 OK', '404 Not Found', '500 Server Error'].map(kw => (
                <span key={kw} className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-sm font-medium border border-blue-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-blue-600 hover:bg-blue-700">{isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>)}</button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./I-2-2.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; I-2-2. HTTP 메서드</a>
              <a href="./I-2-4.html" className="text-blue-600 hover:text-blue-800 font-medium">I-2-4. 헤더와 바디 &rarr;</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
