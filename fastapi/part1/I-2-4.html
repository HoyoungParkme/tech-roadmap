<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — I-2-4. 헤더와 바디</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "[봉투 구조] HTTP 메시지는 봉투처럼 생겼습니다. 겉면(헤더)에는 부가 정보를, 안(바디)에는 실제 내용을 담습니다.",
        highlightPart: 'none',
        showRequest: true,
        showResponse: false,
      },
      {
        desc: "[헤더 — 봉투 겉면] 헤더(Header)에는 발신인, 데이터 형식, 인증 토큰 같은 부가 정보가 적혀 있습니다. 우편물 겉면의 우편번호, 발신자와 같습니다.",
        highlightPart: 'header',
        showRequest: true,
        showResponse: false,
      },
      {
        desc: "[바디 — 편지 내용] 바디(Body)에는 실제 전달하려는 내용이 담깁니다. JSON 데이터, HTML, 이미지 등이 여기 들어갑니다.",
        highlightPart: 'body',
        showRequest: true,
        showResponse: false,
      },
      {
        desc: "[GET vs POST] GET 요청은 보통 바디가 없습니다 — \"보여주세요\"에는 보낼 내용이 없으니까요. POST나 PUT은 바디에 새 데이터를 담아 보냅니다.",
        highlightPart: 'both',
        showRequest: true,
        showResponse: false,
      },
      {
        desc: "[응답도 같은 구조] 서버의 응답(Response)도 헤더+바디 구조입니다. 헤더에 상태 코드와 Content-Type을, 바디에 실제 데이터를 담아 돌려줍니다.",
        highlightPart: 'both',
        showRequest: true,
        showResponse: true,
      },
    ];

    const REQ_HEADERS = [
      'POST /users/ HTTP/1.1',
      'Host: api.example.com',
      'Content-Type: application/json',
      'Authorization: Bearer eyJhbG...',
    ];

    const REQ_BODY = [
      '{',
      '  "name": "Alice",',
      '  "age": 25',
      '}',
    ];

    const RES_HEADERS = [
      'HTTP/1.1 201 Created',
      'Content-Type: application/json',
      'X-Request-Id: abc123',
    ];

    const RES_BODY = [
      '{',
      '  "id": 1,',
      '  "name": "Alice",',
      '  "msg": "등록 완료"',
      '}',
    ];

    function EnvelopeView({ title, icon, headers, body, highlightPart }) {
      const headerActive = highlightPart === 'header' || highlightPart === 'both';
      const bodyActive = highlightPart === 'body' || highlightPart === 'both';

      return (
        <div className="border-2 border-slate-300 rounded-2xl overflow-hidden bg-white">
          <div className="bg-slate-100 px-4 py-2 text-sm font-bold text-slate-600 flex items-center gap-2">
            <span>{icon}</span> {title}
          </div>

          {/* 헤더 영역 */}
          <div className={`px-4 py-3 border-b-2 border-dashed transition-all duration-500 ${
            headerActive ? 'bg-amber-50 border-amber-300' : 'bg-white border-slate-200'
          }`}>
            <div className={`text-xs font-bold mb-1 flex items-center gap-1 ${headerActive ? 'text-amber-700' : 'text-slate-400'}`}>
              <span>&#x2709;&#xFE0F;</span> Header (봉투 겉면)
            </div>
            <div className="font-mono text-xs space-y-0.5">
              {headers.map((h, i) => (
                <div key={i} className={headerActive ? 'text-amber-800' : 'text-slate-400'}>{h}</div>
              ))}
            </div>
          </div>

          {/* 바디 영역 */}
          <div className={`px-4 py-3 transition-all duration-500 ${
            bodyActive ? 'bg-emerald-50' : 'bg-white'
          }`}>
            <div className={`text-xs font-bold mb-1 flex items-center gap-1 ${bodyActive ? 'text-emerald-700' : 'text-slate-400'}`}>
              <span>&#x1F4DD;</span> Body (편지 내용)
            </div>
            <div className="font-mono text-xs space-y-0.5">
              {body.map((b, i) => (
                <div key={i} className={bodyActive ? 'text-emerald-800' : 'text-slate-400'}>{b}</div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-emerald-700 hover:text-emerald-900 font-medium"><span>&larr;</span> 허브</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I &gt; Chapter 2. HTTP</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-2-4. 헤더와 바디 — 봉투와 편지지</h1>
                </div>
              </div>
              <p className="text-slate-600">HTTP 메시지는 <b>봉투</b>입니다. 헤더(Header)는 겉면의 부가 정보, 바디(Body)는 안에 든 실제 내용입니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-blue-700 border-blue-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">메시지 구조</h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
              <div className={`grid gap-6 ${stepData.showResponse ? 'grid-cols-1 md:grid-cols-2' : 'grid-cols-1 max-w-md mx-auto'}`}>
                {stepData.showRequest && (
                  <EnvelopeView
                    title="Request (요청)"
                    icon="&#x1F4E4;"
                    headers={REQ_HEADERS}
                    body={REQ_BODY}
                    highlightPart={stepData.highlightPart}
                  />
                )}
                {stepData.showResponse && (
                  <EnvelopeView
                    title="Response (응답)"
                    icon="&#x1F4E5;"
                    headers={RES_HEADERS}
                    body={RES_BODY}
                    highlightPart={stepData.highlightPart}
                  />
                )}
              </div>

              {/* 범례 */}
              <div className="mt-6 flex flex-wrap gap-4 justify-center">
                <div className="flex items-center gap-2 text-sm">
                  <div className="w-4 h-4 rounded bg-amber-200 border border-amber-400"></div>
                  <span className="text-amber-700 font-medium">Header (부가 정보)</span>
                </div>
                <div className="flex items-center gap-2 text-sm">
                  <div className="w-4 h-4 rounded bg-emerald-200 border border-emerald-400"></div>
                  <span className="text-emerald-700 font-medium">Body (실제 내용)</span>
                </div>
              </div>

              <div className="mt-4 bg-slate-50 rounded-lg p-4 text-sm text-slate-600 border border-slate-200">
                <span className="font-bold text-slate-700">비유:</span> 봉투 겉면(헤더)에는 "보내는 사람, 우편번호, 등기 여부"를 적고,
                봉투 안 편지지(바디)에는 "실제 전달할 메시지"를 적는 것과 같다.
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['헤더(Header)', '바디(Body)', 'Content-Type', 'Authorization'].map(kw => (
                <span key={kw} className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-sm font-medium border border-blue-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-blue-600 hover:bg-blue-700">{isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>)}</button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./I-2-3.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; I-2-3. 상태 코드</a>
              <span className="text-slate-400 font-medium">Part I 완료 &mdash; <a href="../index.html" className="text-blue-600 hover:text-blue-800">허브로 돌아가기</a></span>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
