            '# ── 해결 C: TIME_WAIT 잔여 소켓 문제 ───────',
            '# 서버를 막 껐는데 OS가 소켓을 잠시(60초 정도) 잡고 있는 경우',
            '# → SO_REUSEADDR 옵션을 켜면 즉시 재바인딩 가능',
            'uvicorn main:app --port 8000 --reload  # 개발 모드는 자동으로 처리',
            '',
            '# ── 예방 ───────────────────────────────────',
            '# - Ctrl+C 로 서버를 깨끗하게 종료한다',
            '# - 개발 시에는 --reload 옵션을 쓴다 (코드 수정시 자동 재시작)',
            '# - 포트는 환경변수로 빼서 충돌 시 쉽게 바꾼다',
            '#     export PORT=8001',
            '#     uvicorn main:app --port "$PORT"',
            '',
            '# ── 핵심 정리 ──────────────────────────────',
            '#   포트 = 한 컴퓨터의 창구 번호 (0~65535)',
            '#   well-known: 0~1023 (80/443/22)',
            '#   번호 다르면 N개 동시 실행',
            '#   lsof / netstat / ss 로 점유 확인',
            '#   "already in use" → kill 또는 다른 포트',
          ],
          highlight: [4, 5, 6, 7, 8, 13, 14, 15, 17, 18, 19, 20, 25, 26, 27, 40, 41, 42, 43, 44, 45],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤
    // 호스트 박스(IP) + 다중 포트 카드 + ASCII art
    // ─────────────────────────────────────────────────────
    const PORT_STATE_STYLE = {
      idle:     { bg: 'bg-slate-100',   border: 'border-slate-300',  text: 'text-slate-500',    badge: 'bg-slate-200 text-slate-600',     dot: 'bg-slate-400'   },
      listen:   { bg: 'bg-indigo-50',   border: 'border-indigo-400', text: 'text-indigo-800',   badge: 'bg-indigo-100 text-indigo-800',   dot: 'bg-indigo-500'  },
      target:   { bg: 'bg-amber-50',    border: 'border-amber-500',  text: 'text-amber-800',    badge: 'bg-amber-100 text-amber-800',     dot: 'bg-amber-500'   },
      conflict: { bg: 'bg-rose-50',     border: 'border-rose-500',   text: 'text-rose-800',     badge: 'bg-rose-100 text-rose-800',       dot: 'bg-rose-500'    },
    };

    function PortCard({ port }) {
      const s = PORT_STATE_STYLE[port.state] || PORT_STATE_STYLE.idle;
      const pulse = port.state === 'target' ? 'animate-pulse' : '';
      return (
        <div className={`rounded-lg border-2 ${s.bg} ${s.border} px-3 py-2 ${pulse}`}>
          <div className="flex items-center justify-between mb-1">
            <span className={`text-base font-mono font-bold ${s.text}`}>:{port.num}</span>
            <span className={`w-2 h-2 rounded-full ${s.dot}`}></span>
          </div>
          <div className={`text-xs font-bold ${s.text}`}>{port.label}</div>
          <div className={`mt-1 inline-block text-[10px] px-2 py-0.5 rounded ${s.badge}`}>{port.service}</div>
        </div>
      );
    }

    function AsciiHost({ label }) {
      // 호스트 박스를 감싸는 단순 ASCII 라인 — 박스 아래 강조용
      return (
        <pre className="mt-3 text-[10px] leading-tight font-mono text-indigo-700 bg-indigo-50 border border-indigo-200 rounded p-2 overflow-x-auto">
{`  ┌─────────────────────────────────────────────┐
  │  Host  192.168.0.100   (IP 1개)             │
  │   ├─ :22   SSH        ─┐                    │
  │   ├─ :80   HTTP        │  포트 번호로       │
  │   ├─ :443  HTTPS       │  서비스 구분       │
  │   ├─ :5432 Postgres    │                    │
  │   ├─ :6379 Redis       │                    │
  │   └─ :8000 FastAPI    ─┘                    │
  └─────────────────────────────────────────────┘
                ↑ ${label}`}
        </pre>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">호스트 & 포트 상태</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 네트워크 상태</span>
          </div>

          {/* 호스트 박스 */}
          <div className="border-2 border-indigo-300 rounded-xl p-3 bg-gradient-to-br from-indigo-50 to-slate-50 relative">
            <div className="absolute -top-3 left-3 bg-indigo-600 text-white text-[10px] font-bold px-2 py-0.5 rounded">
              HOST · 192.168.0.100
            </div>
            <div className="grid grid-cols-2 gap-2 mt-2">
              {state.ports.map((p) => (
                <PortCard key={p.num} port={p} />
              ))}
            </div>
          </div>

          {/* ASCII art */}
          <AsciiHost label={state.asciiKey} />

          {/* 핵심 한 줄 */}
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js) — 5탭
    // ─────────────────────────────────────────────────────
    function CodeViewer({ steps, stepIdx, setStepIdx }) {
      const codeRef = useRef(null);
      const code = steps[stepIdx].code;

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 탭 바 (5탭) */}
          <div className="flex items-center bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {steps.map((s, i) => {
              const active = i === stepIdx;
              return (
                <button
                  key={i}
                  onClick={() => setStepIdx(i)}
                  className={`px-3 py-2 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                    active
                      ? 'bg-[#282c34] text-indigo-300 border-t-2 border-t-indigo-400'
                      : 'bg-slate-900 text-slate-400 hover:text-slate-200'
                  }`}
                >
                  {s.code.filename}
                </button>
              );
            })}
          </div>

          {/* 윈도우 헤더 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>

          {/* 코드 본문 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>

          {/* 푸터 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {steps.length}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 키보드 ← →
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동재생 3000ms
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-slate-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">

            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">I</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">I-1-3. 포트 — 한 컴퓨터 안의 여러 창구</h1>
                <p className="text-sm text-indigo-800/80">1 IP, 65535 포트 → well-known → 다중 실행 → 점유 확인 → 충돌 해결</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 허브</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer steps={STEPS} stepIdx={stepIdx} setStepIdx={setStepIdx} />
            </div>

            {/* 컨트롤 (4버튼) */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계 · 우측 파일 탭 클릭으로 점프</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                포트는 한 IP 안에서 서비스를 구분하는 0~65535번 창구다. 80/443/22 같은 well-known은 약속, 번호만 다르면 N개 동시 실행, lsof/netstat로 점유 확인, "already in use" 에러는 kill 또는 포트 교체로 해결한다. 다음 챕터(I-2-1)에서는 이 포트로 오가는 "요청과 응답"의 형태를 살펴본다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Port', '65535', 'well-known', 'HTTP(80)', 'HTTPS(443)', 'SSH(22)', 'FastAPI(8000)', 'lsof', 'netstat', 'EADDRINUSE'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./I-1-2.html" className="underline hover:no-underline">← I-1-2. IP, 도메인, DNS</a>
              <a href="./I-2-1.html" className="underline hover:no-underline">I-2-1. 요청과 응답 →</a>
            </nav>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
