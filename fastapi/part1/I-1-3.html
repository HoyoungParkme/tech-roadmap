<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — I-1-3. 포트 — 한 컴퓨터 안의 여러 창구</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    I-1-3. 포트 — 한 컴퓨터 안의 여러 창구
    학습 목표: 포트가 무엇인지, 왜 같은 컴퓨터에서 여러 서비스를 동시에 실행할 수 있는지 설명할 수 있다.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PORTS = [
      { num: 80,   label: 'HTTP',    service: '웹사이트 서빙',   icon: '\uD83C\uDF10', color: 'blue' },
      { num: 443,  label: 'HTTPS',   service: '암호화된 웹',     icon: '\uD83D\uDD12', color: 'emerald' },
      { num: 8000, label: 'FastAPI', service: 'API 개발 서버',   icon: '\u26A1',       color: 'amber' },
      { num: 25,   label: 'SMTP',    service: '이메일 발송',     icon: '\u2709\uFE0F', color: 'rose' },
    ];

    const PORT_COLOR = {
      blue:    { bg: 'bg-blue-50',    border: 'border-blue-500',    text: 'text-blue-700',    ring: 'ring-blue-200',    badge: 'bg-blue-100 text-blue-800' },
      emerald: { bg: 'bg-emerald-50', border: 'border-emerald-500', text: 'text-emerald-700', ring: 'ring-emerald-200', badge: 'bg-emerald-100 text-emerald-800' },
      amber:   { bg: 'bg-amber-50',   border: 'border-amber-500',   text: 'text-amber-700',   ring: 'ring-amber-200',   badge: 'bg-amber-100 text-amber-800' },
      rose:    { bg: 'bg-rose-50',    border: 'border-rose-500',    text: 'text-rose-700',    ring: 'ring-rose-200',    badge: 'bg-rose-100 text-rose-800' },
    };

    const STEPS = [
      {
        desc: "[하나의 건물] 서버 컴퓨터 한 대는 IP 주소가 하나입니다. 마치 주소가 하나인 건물과 같습니다.",
        activePorts: [],
        showServer: true,
        showRequest: false,
        requestPort: null,
      },
      {
        desc: "[여러 창구] 하지만 건물 안에는 여러 창구(포트)가 있습니다. 각 창구마다 다른 업무를 담당합니다 — 80번은 웹, 443번은 암호화된 웹, 8000번은 개발 서버, 25번은 이메일.",
        activePorts: [80, 443, 8000, 25],
        showServer: true,
        showRequest: false,
        requestPort: null,
      },
      {
        desc: "[HTTP 요청] 웹 브라우저가 접속하면 기본적으로 포트 80(HTTP) 또는 443(HTTPS)번 창구로 갑니다. 주소에 포트를 안 쓰면 브라우저가 자동으로 붙여줍니다.",
        activePorts: [80, 443, 8000, 25],
        showServer: true,
        showRequest: true,
        requestPort: 443,
      },
      {
        desc: "[FastAPI 개발] FastAPI 개발 서버는 기본적으로 포트 8000번에서 대기합니다. 그래서 개발할 때 127.0.0.1:8000으로 접속하는 것입니다.",
        activePorts: [80, 443, 8000, 25],
        showServer: true,
        showRequest: true,
        requestPort: 8000,
      },
      {
        desc: "[동시 실행] 포트가 다르기 때문에 하나의 컴퓨터에서 웹 서버, FastAPI, 이메일 서버를 동시에 실행할 수 있습니다. 창구 번호만 다르면 충돌하지 않습니다.",
        activePorts: [80, 443, 8000, 25],
        showServer: true,
        showRequest: false,
        requestPort: null,
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); }
      };
      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">

            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-emerald-700 hover:text-emerald-900 font-medium">
                <span aria-hidden="true">&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. 왜 웹인가 &gt; Chapter 1. 컴퓨터끼리 어떻게 이야기하나</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-1-3. 포트 — 한 컴퓨터 안의 여러 창구</h1>
                </div>
              </div>
              <p className="text-slate-600">
                하나의 컴퓨터에서 여러 서비스를 동시에 돌릴 수 있는 비밀은 <b>포트(Port)</b>입니다.
                우체국 건물 안의 <b>창구 번호</b>처럼, 각 포트마다 다른 서비스가 대기합니다.
              </p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-blue-700 border-blue-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-blue-200">포트 구조</h3>
                <span className="text-xs text-blue-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 다이어그램 */}
            <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200">

              {/* 요청 표시 */}
              {stepData.showRequest && stepData.requestPort && (
                <div className="mb-4 flex justify-center">
                  <div className="bg-blue-100 border border-blue-300 text-blue-800 px-4 py-2 rounded-lg text-sm font-mono font-bold animate-pulse">
                    &#x1F310; 브라우저 &rarr; 127.0.0.1:<span className="text-blue-600">{stepData.requestPort}</span>
                  </div>
                </div>
              )}

              {/* 서버 건물 */}
              <div className="border-2 border-slate-300 rounded-2xl p-6 bg-slate-50 relative">
                <div className="absolute -top-3 left-4 bg-slate-200 text-slate-600 text-xs font-bold px-3 py-1 rounded-full">
                  &#x1F5A5;&#xFE0F; 서버 (IP: 192.168.0.100)
                </div>

                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4">
                  {PORTS.map(port => {
                    const isActive = stepData.activePorts.includes(port.num);
                    const isTarget = stepData.requestPort === port.num;
                    const c = PORT_COLOR[port.color];

                    return (
                      <div
                        key={port.num}
                        className={`rounded-xl border-2 p-4 text-center transition-all duration-500 ${
                          isActive
                            ? `${c.bg} ${c.border} ${c.text} ${isTarget ? `ring-4 ${c.ring} shadow-lg scale-105` : ''}`
                            : 'bg-slate-100 border-slate-200 text-slate-300'
                        }`}
                      >
                        <div className="text-2xl mb-1">{port.icon}</div>
                        <div className="font-bold text-lg font-mono">:{port.num}</div>
                        <div className="text-xs font-bold">{port.label}</div>
                        <div className="text-[10px] mt-1">{isActive ? port.service : '비활성'}</div>
                        {isTarget && (
                          <div className={`mt-2 text-[10px] font-bold px-2 py-0.5 rounded-full inline-block ${c.badge}`}>
                            요청 수신 중
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {/* 마지막 단계: 동시 실행 강조 */}
                {currentStepIdx === 4 && (
                  <div className="mt-4 text-center">
                    <div className="inline-block bg-emerald-100 border border-emerald-300 text-emerald-700 px-4 py-2 rounded-lg text-sm font-bold">
                      4개 서비스가 동시에 실행 중 — 포트 번호만 다르면 충돌 없음
                    </div>
                  </div>
                )}
              </div>

              {/* 비유 박스 */}
              <div className="mt-4 bg-slate-50 rounded-lg p-4 text-sm text-slate-600 border border-slate-200">
                <span className="font-bold text-slate-700">비유:</span> 우체국 건물(= IP 주소) 안에
                1번 창구(= 포트 80, 일반 우편), 2번 창구(= 포트 443, 등기), 3번 창구(= 포트 8000, 택배)가
                동시에 운영되는 것과 같다.
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['포트', 'HTTP(80)', 'HTTPS(443)', 'localhost'].map(kw => (
                <span key={kw} className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-sm font-medium border border-blue-200">{kw}</span>
              ))}
            </div>

            {/* 컨트롤 바 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-blue-600 hover:bg-blue-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                  )}
                </button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length}
              </div>
            </div>

            <div className="flex justify-between text-sm text-slate-500">
              <a href="./I-1-2.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; I-1-2. IP, 도메인, DNS</a>
              <a href="./I-2-1.html" className="text-blue-600 hover:text-blue-800 font-medium">I-2-1. 요청과 응답 &rarr;</a>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
