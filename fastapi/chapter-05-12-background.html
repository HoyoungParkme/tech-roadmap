            '    # async 함수 등록 — 이벤트 루프에서 await 으로 실행',
            '    tasks.add_task(send_welcome_email, body.email)',
            '',
            '    # sync 함수 등록 — thread pool 에서 실행',
            '    tasks.add_task(write_audit_log, user_id)',
            '',
            '    # 등록 순서대로 응답 이후 실행된다.',
            '    return {"id": user_id, "ok": True}',
          ],
          highlight: [19, 20, 27, 28, 29, 30, 31, 32, 37, 38, 43, 44, 49, 52],
        },
      },
      {
        title: 'Step 5. 한계 — 서버가 재시작되면 작업이 사라진다',
        desc: 'BackgroundTasks 는 "응답 직후, 같은 프로세스에서" 실행되는 단순한 메커니즘이다. 그래서 한계가 있다. ① 서버가 죽으면 큐에 남아 있던 작업도 같이 사라진다. ② 재시도/실패 추적 기능이 없다. ③ 여러 워커에 분산 실행되지 않는다. ④ 무거운 작업(파일 변환, ML 추론)은 응답성을 떨어뜨릴 수 있다. 이런 요구가 생기면 Celery, RQ, Dramatiq, Arq 같은 작업 큐로 옮겨야 한다. BackgroundTasks 는 "가벼운 후속 작업, 실패해도 큰일 나지 않는 작업" 에만 쓰는 것이 안전하다.',
        timeline: [
          { t: '00ms',   kind: 'request',  label: 'POST /signup',            detail: '가입 + 백그라운드 메일 예약',      badge: '요청' },
          { t: '20ms',   kind: 'response', label: '200 OK 응답',             detail: '응답 정상',                        badge: '응답' },
          { t: '20ms',   kind: 'bg-start', label: '메일 발송 시작',          detail: 'SMTP 연결 중...',                  badge: '백그라운드' },
          { t: '0.8s',   kind: 'note',     label: '⚠ 서버 재시작',           detail: 'kill -9 / 배포 / OOM',             badge: '장애' },
          { t: '0.8s',   kind: 'note',     label: '큐에 있던 작업 손실',     detail: '메일 미발송, 재시도 없음',         badge: '데이터 손실' },
        ],
        summary: {
          title: '한계',
          text: '서버가 죽으면 큐가 사라진다. 재시도/분산/모니터링이 필요하면 외부 작업 큐로 옮긴다.',
        },
        warningBox: {
          title: 'BackgroundTasks 를 쓰면 안 되는 경우',
          items: [
            '결제 후처리, 정산 — 실패하면 돈 문제. 작업 큐 + DB 트랜잭션 필요',
            '메일/SMS 가 반드시 도착해야 하는 경우 — Celery/RQ + 재시도 정책',
            '수 분 이상 걸리는 작업 (배치/리포트/ML) — 별도 워커 프로세스',
            '여러 서버에 분산 실행해야 하는 경우 — Redis/RabbitMQ 기반 큐',
            '작업 결과를 사용자에게 추적해서 보여줘야 하는 경우 — job_id + 폴링',
          ],
        },
        keyPoint: 'BackgroundTasks = 가벼운 후속 작업 전용. 손실되면 곤란한 작업은 외부 큐를 쓴다.',
        code: {
          lang: 'markdown',
          filename: 'limit.md',
          lines: [
            '# Step 5. BackgroundTasks 의 한계와 대안',
            '',
            'BackgroundTasks 는 "응답 직후, 같은 프로세스 안에서" 실행되는 단순한 메커니즘이다.',
            '구조가 단순한 만큼 한계도 명확하다.',
            '',
            '## 한계 정리',
            '',
            '| 항목 | BackgroundTasks | 외부 작업 큐 (Celery/RQ/Arq) |',
            '|:--|:--|:--|',
            '| 영속성 | ❌ 프로세스 죽으면 손실 | ✅ Redis/RabbitMQ 에 저장 |',
            '| 재시도 | ❌ 없음 | ✅ 재시도 정책 설정 가능 |',
            '| 분산 실행 | ❌ 같은 프로세스 한정 | ✅ 여러 워커에 분산 |',
            '| 작업 상태 추적 | ❌ 응답 후 추적 불가 | ✅ job_id 로 상태 조회 |',
            '| 스케줄링 | ❌ 즉시 실행만 | ✅ Cron/지연 실행 가능 |',
            '| 운영 부담 | ✅ 추가 인프라 없음 | ❌ 브로커 + 워커 운영 필요 |',
            '',
            '## 사용 기준',
            '',
            '### ✅ BackgroundTasks 가 적합한 경우',
            '- 가입 후 환영 메일 발송 (실패해도 사용자가 직접 재요청 가능)',
            '- 사용자 활동 로그 적재 (유실되어도 큰 문제 없음)',
            '- 캐시 워밍업 / 백업 알림 등 "있으면 좋은" 작업',
            '- 수 초 이내에 끝나는 작은 후속 작업',
            '',
            '### ❌ BackgroundTasks 를 피해야 하는 경우',
            '- 결제 정산, 환불 처리 등 금전이 걸린 작업',
            '- 반드시 도착해야 하는 알림 (보안 OTP, 인증 메일)',
            '- 수 분 이상 걸리는 무거운 작업 (ML 추론, PDF 생성)',
            '- 여러 서버로 부하 분산해야 하는 경우',
            '',
            '## 마이그레이션 시점',
            '',
            '아래 신호가 보이면 Celery/Arq 로 옮길 시점이다.',
            '1. "메일이 안 갔어요" 라는 CS 가 들어오기 시작한다',
            '2. 배포할 때마다 진행 중인 작업을 잃는다',
            '3. 작업 시간이 응답 시간보다 길어진다',
            '4. 작업 결과를 사용자에게 보여주고 싶어진다',
            '',
            '## 한 줄 결론',
            '',
            '> BackgroundTasks 는 "응답 빠르게 + 가벼운 후속 작업" 에 쓴다.',
            '> 비즈니스 크리티컬한 작업은 처음부터 외부 큐를 검토한다.',
          ],
          highlight: [3, 4, 8, 9, 10, 11, 12, 13, 14, 15, 19, 25],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤
    // ─────────────────────────────────────────────────────
    const KIND_STYLE = {
      request:  { bg: 'bg-slate-100',    border: 'border-slate-300',    text: 'text-slate-700',    badge: 'bg-slate-200 text-slate-700',    dot: 'bg-slate-400' },
      response: { bg: 'bg-indigo-50',    border: 'border-indigo-300',   text: 'text-indigo-800',   badge: 'bg-indigo-200 text-indigo-800',  dot: 'bg-indigo-500' },
      'bg-start': { bg: 'bg-violet-50',  border: 'border-violet-300',   text: 'text-violet-800',   badge: 'bg-violet-200 text-violet-800',  dot: 'bg-violet-500' },
      'bg-step':  { bg: 'bg-sky-50',     border: 'border-sky-300',      text: 'text-sky-800',      badge: 'bg-sky-200 text-sky-800',        dot: 'bg-sky-500' },
      'bg-done':  { bg: 'bg-emerald-50', border: 'border-emerald-300',  text: 'text-emerald-800',  badge: 'bg-emerald-200 text-emerald-800', dot: 'bg-emerald-500' },
      note:       { bg: 'bg-amber-50',   border: 'border-amber-300',    text: 'text-amber-800',    badge: 'bg-amber-200 text-amber-800',     dot: 'bg-amber-500' },
    };

    function TimelineItem({ item, isLast }) {
      const s = KIND_STYLE[item.kind] || KIND_STYLE['bg-step'];
      return (
        <div className="flex gap-3">
          {/* 왼쪽: 시간 + 점 + 라인 */}
          <div className="flex flex-col items-center">
            <span className="text-[10px] font-mono text-slate-500 w-12 text-right pr-1">{item.t}</span>
            <span className={`w-3 h-3 rounded-full ${s.dot} mt-1`}></span>
            {!isLast && <span className="flex-1 w-px bg-slate-300 my-1"></span>}
          </div>
          {/* 오른쪽: 카드 */}
          <div className={`flex-1 mb-2 rounded-lg border ${s.bg} ${s.border} px-3 py-2`}>
            <div className="flex items-center justify-between mb-0.5">
              <span className={`text-sm font-bold ${s.text}`}>{item.label}</span>
              <span className={`text-[10px] px-2 py-0.5 rounded ${s.badge}`}>{item.badge}</span>
            </div>
            <div className="text-xs text-slate-600 font-mono">{item.detail}</div>
          </div>
        </div>
      );
    }

    function SummaryBox({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-indigo-400 bg-indigo-50 p-3">
          <div className="text-xs font-bold text-indigo-800 mb-1">★ {summary.title}</div>
          <div className="text-sm text-indigo-900 leading-snug">{summary.text}</div>
        </div>
      );
    }

    function WarningBox({ warning }) {
      if (!warning) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-rose-400 bg-gradient-to-br from-rose-50 to-amber-50 p-4">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-xl">⚠</span>
            <span className="text-sm font-bold text-rose-800">{warning.title}</span>
          </div>
          <ul className="space-y-1.5">
            {warning.items.map((it, i) => (
              <li key={i} className="text-sm text-rose-900 flex gap-2">
                <span className="text-rose-500 mt-0.5">✗</span>
                <span>{it}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">응답 → 백그라운드 타임라인</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 실행 흐름</span>
          </div>
          <div>
            {state.timeline.map((it, i) => (
              <TimelineItem
                key={i}
                item={it}
                isLast={i === state.timeline.length - 1}
              />
            ))}
          </div>
          <SummaryBox summary={state.summary} />
          <WarningBox warning={state.warningBox} />
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">⚡</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter 05-12. BackgroundTasks</h1>
                <p className="text-sm text-indigo-800/80">응답 먼저, 작업은 뒤에서. 5단계로 추적한다.</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                BackgroundTasks 는 "응답 먼저, 가벼운 후속 작업은 뒤에서" 라는 패턴이다. 의존성 주입처럼 인자에 적기만 하면 되고, add_task 로 함수+인자를 예약한다. async/sync 둘 다 가능하지만, 손실되면 곤란한 작업은 Celery/Arq 같은 외부 큐로 옮겨야 한다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['BackgroundTasks', 'add_task', '의존성 주입', 'async', 'thread pool', '작업 큐', 'Celery', '응답 시간'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./chapter-05-13.html" className="underline hover:no-underline">다음: 05-13 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
