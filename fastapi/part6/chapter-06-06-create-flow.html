    const FILES = {
      request: {

        filename: 'request.http',

        lines: [
          '### POST /todos — 새 할 일 등록 요청',
          'POST http://localhost:8000/todos HTTP/1.1',
          'Host: localhost:8000',
          'Content-Type: application/json',
          'Accept: application/json',
          '',
          '{',
          '  "title": "장보기"',
          '}',
          '',
          '# 이 시점:',
          '#  - 단순한 텍스트 한 덩어리',
          '#  - 메서드(POST) + 경로(/todos) + 헤더 + JSON 본문',

          '책임:',
          '  - HTTP 입출력 어댑터 역할',

          '"""',
          'from fastapi import APIRouter, Depends, HTTPException, status',
          '',
          'from app.schemas import TodoCreate, TodoRead',
          'from app.services import TodoService',
          'from app.deps import get_todo_service',
          '',
          'router = APIRouter(prefix="/todos", tags=["todos"])',
          '',
          '@router.post(',
          '    "",',
          '    response_model=TodoRead,',

          '    payload: TodoCreate,                              # ① Pydantic 자동 검증',

          'class DuplicateTodoError(Exception):',

        </div>
      );
    }

    function ClientArrow({ direction, label }) {
      const isIn = direction === 'in';
      return (
        <div className="flex items-center gap-2 mb-2">
          <span className="text-xs font-bold text-slate-500 w-16">{isIn ? '🌐 Client' : '🌐 Client'}</span>
          <span className={`text-lg ${isIn ? 'text-indigo-500' : 'text-emerald-500'}`}>{isIn ? '→' : '←'}</span>
          <span className={`flex-1 text-[10px] font-mono px-2 py-1 rounded border ${isIn ? 'bg-indigo-50 border-indigo-200 text-indigo-800' : 'bg-emerald-50 border-emerald-200 text-emerald-800'}`}>
            {label}
          </span>
        </div>
      );
    }

    function PayloadCard({ payload }) {
      if (!payload) return null;
      const s = PAYLOAD_STYLE[payload.kind] || PAYLOAD_STYLE.dto;
      return (
        <div className={`mt-3 rounded-lg border-2 ${s.bg} ${s.border} p-3`}>
          <div className="flex items-center justify-between mb-1">
            <span className={`text-[10px] font-bold uppercase tracking-wider ${s.text}`}>현재 흐르는 데이터</span>
            <span className={`text-[10px] px-2 py-0.5 rounded ${s.chip}`}>{payload.label}</span>
          </div>
          <div className={`text-sm font-mono ${s.text} break-all`}>{payload.value}</div>
        </div>
      );
    }

    function ResponseBox({ box }) {
      if (!box) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-emerald-500 bg-gradient-to-br from-emerald-50 to-green-50 p-3">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-xl">✅</span>
            <span className="text-sm font-bold text-emerald-800">{box.title}</span>
          </div>
          <pre className="text-[11px] font-mono text-emerald-900 bg-white/60 rounded p-2 border border-emerald-200">
{box.lines.join('\n')}
          </pre>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">3계층 데이터 흐름</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = Controller→Service→Repository</span>
          </div>

          {/* 클라이언트 → 서버 도착 화살표 */}
          {state.arrowIn && <ClientArrow direction="in" label={state.arrowIn.label} />}

          {/* 3계층 박스 + 화살표 */}
          <div className="space-y-1">
            <LayerBox layer={state.layers[0]} />
            {state.arrowDown && state.arrowDown.from === 'controller' && <ArrowDown label={state.arrowDown.label} />}
            {state.arrowUp && state.arrowUp.from === 'service' && state.arrowUp.to === 'controller' && <ArrowUp label={state.arrowUp.label} />}
            {!state.arrowDown && !state.arrowUp && <div className="h-3" />}

            <LayerBox layer={state.layers[1]} />
            {state.arrowDown && state.arrowDown.from === 'service' && <ArrowDown label={state.arrowDown.label} />}
            {state.arrowUp && state.arrowUp.from === 'repository' && <ArrowUp label={state.arrowUp.label} />}
            {!state.arrowDown && !state.arrowUp && <div className="h-3" />}

            <LayerBox layer={state.layers[2]} />
          </div>

          {/* 서버 → 클라이언트 응답 화살표 */}
          {state.arrowOut && (
            <div className="mt-2">
              <ClientArrow direction="out" label={state.arrowOut.label} />
            </div>
          )}

          {/* 현재 흐르는 페이로드 카드 */}
          <PayloadCard payload={state.payload} />

          {/* 마지막 단계 응답 본문 박스 */}
          <ResponseBox box={state.responseBox} />

          {/* 핵심 포인트 */}
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer — 5탭 + highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ activeTab, setActiveTab, highlight, stepIdx, total }) {
      const codeRef = useRef(null);
      const file = FILES[activeTab];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [activeTab]);

      const highlightSet = new Set(highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return file.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return file.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 윈도우 헤더 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">VS Code — fastapi-todo</span>
            <span className="ml-auto text-[10px] text-slate-400">{file.lang}</span>
          </div>

          {/* 탭 바 */}
          <div className="flex bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {TAB_ORDER.map((key) => {
              const isActive = key === activeTab;
              return (
                <button
                  key={key}
                  onClick={() => setActiveTab(key)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                    isActive
                      ? 'bg-[#282c34] text-indigo-300 border-t-2 border-t-indigo-400'
                      : 'bg-slate-900 text-slate-400 hover:text-slate-200'
                  }`}
                >
                  {FILES[key].label}
                </button>
              );
            })}
          </div>

          {/* 코드 본문 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${file.lang}`}>{file.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {file.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>

          {/* 상태 바 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{file.filename} · {file.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [activeTab, setActiveTab] = useState(STEPS[0].activeTab);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 단계 변경 시 해당 단계의 자동 탭으로 전환
      useEffect(() => {
        setActiveTab(step.activeTab);
      }, [stepIdx]);

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동재생 3000ms
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">VI</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">VI-2-2. Create CRUD 3계층 흐름</h1>
                <p className="text-sm text-indigo-800/80">POST 요청 한 건이 Controller → Service → Repository 를 통과해 201 응답이 되기까지</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer
                activeTab={activeTab}
                setActiveTab={setActiveTab}
                highlight={step.highlight}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 컨트롤 (4버튼) */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                POST 요청은 Controller(검증) → Service(비즈니스 규칙) → Repository(INSERT) 3계층을 통과하고, 응답은 역방향으로 직렬화되어 201 로 돌아온다. 각 계층이 단일 책임만 가지므로 테스트도 계층별로 독립적으로 작성할 수 있다. 다음 챕터(VI-2-3)에서는 Read(목록 조회) 흐름과 페이지네이션을 다룬다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Create', 'POST', 'Controller', 'Service', 'Repository', 'Pydantic', 'SQLAlchemy', '201 Created', '3계층'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./chapter-06-07-erd.html" className="underline hover:no-underline">다음: VI-2-3 ERD 설계 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
