<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — VI-2-2. Create CRUD 3계층 흐름</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    VI-2-2. Create — 3계층 데이터 흐름 (Schema → Service → Repository → DB)
    학습 목표: POST /todos 요청 한 건이 3계층 구조 안에서 어떻게 흘러가는지 추적할 수 있다.
    핵심 비유: "식당 주문 처리 라인" — 손님(Client) → 점원(Schema) → 매니저(Service) → 주방(Repository) → 냄비(DB) → 역순 응답
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 요청 도착 + Pydantic 검증',
        desc: '클라이언트가 POST /todos에 JSON {"title": "장보기"}을 보낸다. FastAPI는 자동으로 Pydantic Schema(TodoCreate)로 입력을 검증한다. 빈 문자열이거나 타입 잘못이면 422를 즉시 반환한다.',
        active: ['client', 'schema'],
        codeLine: 1,
      },
      {
        title: 'Step 2. Schema 검증 통과 → Service 호출',
        desc: 'Schema 통과한 값을 Router가 Service에 넘긴다. Service는 비즈니스 로직(예: 같은 제목이 이미 있는지 검사, 작성 시각 추가 등)을 담당한다. 라우터는 "받기 + 위임"만 한다.',
        active: ['schema', 'service'],
        codeLine: 2,
      },
      {
        title: 'Step 3. Service → Repository.add()',
        desc: 'Service는 DB 접근을 직접 하지 않고 Repository에 위임한다. Repository는 SQLAlchemy ORM의 db.add(model)을 호출한다. 비즈니스 로직과 DB 로직이 분리됐다 = 테스트와 유지보수가 쉬워진다.',
        active: ['service', 'repository'],
        codeLine: 3,
      },
      {
        title: 'Step 4. Repository → DB INSERT',
        desc: 'db.commit()이 호출되면 SQLAlchemy가 INSERT INTO todos (title) VALUES (?) SQL을 실제 DB에 보낸다. AUTO INCREMENT id가 부여되고 row가 저장된다. db.refresh(model)로 새 id가 모델에 반영된다.',
        active: ['repository', 'db'],
        codeLine: 4,
      },
      {
        title: 'Step 5. DB → 생성된 Row 반환',
        desc: 'DB가 새로 만든 row(id=42)를 돌려준다. 흐름은 이제 역순으로 거슬러 올라간다. Repository → Service → Router 순으로 객체가 전달된다. 실패하면 SQLAlchemy 예외가 발생하고 Service가 잡아 처리한다.',
        active: ['db', 'repository', 'service'],
        codeLine: 5,
      },
      {
        title: 'Step 6. Schema 직렬화 → JSON 응답',
        desc: 'Router가 받은 모델 객체를 응답 Schema(TodoOut)로 직렬화한다. id 같은 필드가 추가되고, 비밀번호 같은 민감 필드는 자동으로 제외된다. 최종 JSON {"id": 42, "title": "장보기"}가 클라이언트에 도착.',
        active: ['service', 'schema', 'client'],
        codeLine: 6,
      },
    ];

    const NODES = ['client', 'schema', 'service', 'repository', 'db'];
    // 이모지와 이름을 객체로 분리 — split(' ')의 fragility 회피
    const NODE_INFO = {
      client:     { emoji: '🧑',    name: 'Client' },
      schema:     { emoji: '📋',    name: 'Schema' },
      service:    { emoji: '🧑‍💼',   name: 'Service' },
      repository: { emoji: '🍳',    name: 'Repository' },
      db:         { emoji: '🗄️',    name: 'DB' },
    };
    const NODE_DESC = {
      client:     'POST /todos JSON',
      schema:     'TodoCreate (검증)',
      service:    '비즈니스 로직',
      repository: 'SQLAlchemy ORM',
      db:         'PostgreSQL/SQLite',
    };
    const NODE_ACTIVE = {
      client:     'border-emerald-500 bg-emerald-50',
      schema:     'border-violet-500 bg-violet-50',
      service:    'border-sky-500 bg-sky-50',
      repository: 'border-amber-500 bg-amber-50',
      db:         'border-rose-500 bg-rose-50',
    };
    const NODE_DIM = 'border-slate-200 bg-white opacity-50';

    const CODE = [
      '@router.post("/todos", response_model=TodoOut)',                        // line 1
      'def create_todo(payload: TodoCreate, db: Session = Depends(get_db)):',  // line 2
      '    return TodoService(TodoRepository(db)).create(payload)',            // line 3
      '# Repository.add(model)  →  db.add(); db.commit(); db.refresh(model)',  // line 4
      '# DB INSERT INTO todos (title) VALUES (...)  →  id=42 부여 후 반환',    // line 5
      '# 라우터: 모델 → TodoOut 직렬화 → JSON 응답',                            // line 6
    ];

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => {
        setCurrentStep((c) => Math.max(0, c - 1));
      };
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 2800);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const activeSet = new Set(step.active);

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">VI-2-2. Create — 3계층 흐름</h1>
                <p className="text-sm text-slate-500 mt-1">POST /todos 한 건이 Schema → Service → Repository → DB를 거쳐 응답으로 돌아온다</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* 5개 계층 흐름도 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-6">
              <div className="grid grid-cols-5 gap-3 items-stretch">
                {NODES.map((n, idx) => {
                  const isActive = activeSet.has(n);
                  return (
                    <div key={n} className="flex flex-col items-center">
                      <div className={`w-full text-center p-4 rounded-xl border-2 transition-all ${isActive ? NODE_ACTIVE[n] : NODE_DIM}`}>
                        <div className="text-2xl mb-1">{NODE_INFO[n].emoji}</div>
                        <div className="font-bold text-sm text-slate-800">{NODE_INFO[n].name}</div>
                        <div className="text-[10px] text-slate-500 mt-1">{NODE_DESC[n]}</div>
                      </div>
                      {idx < NODES.length - 1 && (
                        <div className={`text-2xl mt-2 ${activeSet.has(n) && activeSet.has(NODES[idx+1]) ? 'text-emerald-500' : 'text-slate-300'}`}>↓</div>
                      )}
                    </div>
                  );
                })}
              </div>
              {/* 응답 흐름 표시 — Step 5 이후 */}
              {currentStep >= 4 && (
                <div className="mt-4 p-3 bg-emerald-50 border border-emerald-200 rounded-lg">
                  <div className="text-xs font-bold text-emerald-800 mb-1">↑ 응답 흐름 (역순)</div>
                  <div className="text-[11px] text-emerald-700 font-mono">
                    DB row → Repository → Service → Router → Schema 직렬화 → JSON 응답
                  </div>
                </div>
              )}
            </div>

            {/* 코드 뷰어 */}
            <div className="bg-slate-900 rounded-xl shadow-sm p-5 mb-6">
              <div className="text-[11px] text-slate-400 mb-2 font-bold">routers/todos.py + service + repository (요약)</div>
              <pre className="text-xs leading-6 font-mono">
                {CODE.map((line, idx) => {
                  const isHi = (idx + 1) === step.codeLine;
                  return (
                    <div
                      key={idx}
                      className={isHi ? 'bg-yellow-300 text-slate-900 px-2 -mx-2 rounded' : 'text-slate-200 px-2 -mx-2'}
                    >
                      <span className="text-slate-500 mr-3 select-none">{(idx + 1).toString().padStart(2, ' ')}</span>
                      {line}
                    </div>
                  );
                })}
              </pre>
            </div>

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button
                onClick={handlePrev}
                disabled={currentStep === 0}
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed"
              >
                ← 이전
              </button>
              <button
                onClick={togglePlay}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700"
              >
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={currentStep === STEPS.length - 1}
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed"
              >
                다음 →
              </button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
