    패턴: fastapi v1 — 좌(LiveDataPane: ERD 카드/관계선) / 우(VSCode CodeViewer 5탭)

  -->

          '',
          '## 관계 카디널리티 표기',
          '- `1 ─── N`  : 1 대 다',
          '- `1 ─── 1`  : 1 대 1 (드묾, 보통 컬럼으로 풀림)',
          '- `M ─── N`  : 다 대 다 → 중간 테이블 필수',
          '',
          '## 흔한 실수',
          '- ❌ M:N 을 컬럼 하나에 `"1,5,8"` 처럼 쉼표 문자열로 저장',
          '- ❌ FK 인데 RDBMS 제약을 안 걸어 두기 → 무결성 깨짐',
        ],
        highlight: [3, 4, 5, 6, 8, 9, 10, 11, 12, 13, 14, 17, 18, 19, 20, 23, 24, 25, 26, 27, 28, 32, 33, 34, 35],
      },
      {
        filename: 'mermaid.md',
        lang: 'markdown',
        lines: [
          '# Step 5. Mermaid ERD — 텍스트로 적는 그림',
          '',
          'GitHub README, 노션, 옵시디언 모두 아래 코드 블록을 그림으로 자동 렌더한다.',
          '',
          '```mermaid',
          'erDiagram',
          '    users ||--o{ todos : "owns"',
          '    todos ||--o{ todo_tags : "tagged"',
          '    tags  ||--o{ todo_tags : "applied"',
          '',
          '    users {',
          '      INTEGER      id PK',
          '      VARCHAR(120) email',
          '      VARCHAR(60)  name',
          '    }',
          '',
          '    todos {',
          '      INTEGER      id PK',
          '      INTEGER      user_id FK',
          '      VARCHAR(200) title',
          '      TEXT         description',
          '      BOOLEAN      completed',
          '      DATETIME     created_at',
          '    }',
          '',
          '    todo_tags {',
          '      INTEGER todo_id PK,FK',
          '      INTEGER tag_id  PK,FK',
          '    }',
          '',
          '    tags {',
          '      INTEGER     id PK',
          '      VARCHAR(30) name',
          '    }',
          '```',
          '',
          '## 표기법 핵심',
          '- `||--o{` : 왼쪽 1, 오른쪽 N (one-to-many)',
          '- `||--||` : 1 : 1',
          '- `}o--o{` : M : N (중간 테이블 없는 표기)',
          '',
          '## 왜 Mermaid 인가',
          '- ✅ 그림이 아니라 텍스트 → git diff 에 변경 이력이 남는다',
          '- ✅ PR 리뷰에서 "여기 컬럼 추가" 라고 한 줄로 코멘트 가능',
          '- ✅ draw.io / dbdiagram.io 같은 외부 도구 의존 0',
        ],
        highlight: [5, 6, 7, 8, 9, 11, 12, 13, 14, 15, 17, 18, 19, 20, 21, 22, 23, 24, 26, 27, 28, 29, 31, 32, 33, 34, 38, 39, 40, 41],
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — ERD 카드 + 관계선 (indigo)
    // ─────────────────────────────────────────────────────
    const TYPE_COLOR = {
      'INTEGER':       'bg-amber-100 text-amber-800',
      'VARCHAR(200)':  'bg-emerald-100 text-emerald-800',
      'VARCHAR(120)':  'bg-emerald-100 text-emerald-800',
      'VARCHAR(60)':   'bg-emerald-100 text-emerald-800',
      'VARCHAR(30)':   'bg-emerald-100 text-emerald-800',
      'TEXT':          'bg-emerald-100 text-emerald-800',
      'BOOLEAN':       'bg-violet-100 text-violet-800',
      'DATETIME':      'bg-sky-100 text-sky-800',
    };

    function EntityCard({ entity, focus }) {
      return (
        <div className="rounded-lg border-2 border-indigo-300 bg-white overflow-hidden shadow-sm">
          <div className="bg-indigo-700 text-indigo-50 px-3 py-1.5 flex items-center justify-between">
            <span className="text-sm font-mono font-bold">📋 {entity.name}</span>
            <span className="text-[10px] text-indigo-200">{entity.columns.length} cols</span>
          </div>
          {entity.columns.length === 0 ? (
            <div className="px-3 py-4 text-center text-[11px] text-indigo-400 italic">
              (아직 컬럼 없음 — 박스만)
            </div>
          ) : (
            <div className="divide-y divide-indigo-100">
              {entity.columns.map((c) => {
                const hiPk = (focus === 'pk' || focus === 'all') && c.pk;
                const hiFk = (focus === 'fk' || focus === 'all') && c.fk;
                return (
                  <div
                    key={c.name}
                    className={`grid grid-cols-12 gap-1 items-center px-2 py-1 text-[11px] ${
                      hiPk ? 'bg-amber-50' : hiFk ? 'bg-rose-50' : ''
                    }`}
                  >
                    <div className="col-span-5 font-mono text-slate-800 flex items-center gap-1">
                      {c.pk && <span title="PRIMARY KEY">🔑</span>}
                      {c.fk && <span title="FOREIGN KEY">🔗</span>}
                      <span className="truncate">{c.name}</span>
                    </div>
                    <div className="col-span-4">
                      <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${TYPE_COLOR[c.type] || 'bg-slate-100 text-slate-700'}`}>
                        {c.type}
                      </span>
                    </div>
                    <div className="col-span-3 text-[9px] text-right">
                      {c.pk && <span className="bg-amber-200 text-amber-900 px-1 rounded font-bold">PK</span>}
                      {c.fk && <span className="bg-rose-200 text-rose-900 px-1 rounded font-bold ml-1">FK</span>}
                      {!c.pk && !c.fk && c.nullable && <span className="text-slate-400">NULL?</span>}
                      {!c.pk && !c.fk && !c.nullable && <span className="text-slate-400">NOT NULL</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          {entity.note && (
            <div className="px-3 py-1 bg-indigo-50 text-[10px] text-indigo-700 border-t border-indigo-100">
              {entity.note}
            </div>
          )}
        </div>
      );
    }

    function RelationLine({ rel }) {
      return (
        <div className="flex items-center justify-center my-1 gap-2 text-[11px] font-mono">
          <span className="px-2 py-0.5 rounded bg-indigo-100 text-indigo-800 border border-indigo-200">
            {rel.from}
          </span>
          <span className="text-indigo-600 font-bold">{rel.label}</span>
          <span className="px-2 py-0.5 rounded bg-indigo-100 text-indigo-800 border border-indigo-200">
            {rel.to}
          </span>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">ERD 다이어그램</h3>
            <span className="text-[10px] text-slate-500">박스 = 테이블 · 선 = 관계</span>
          </div>

          <div className="space-y-2">
            {state.entities.map((e) => (
              <EntityCard key={e.name} entity={e} focus={state.focus} />
            ))}
          </div>

          {state.relations.length > 0 && (
            <div className="mt-3 pt-3 border-t border-dashed border-indigo-300">
              <div className="text-[10px] font-bold text-indigo-700 mb-2">관계 (cardinality)</div>
              <div className="space-y-1">
                {state.relations.map((r, i) => (
                  <RelationLine key={i} rel={r} />
                ))}
              </div>
            </div>
          )}

          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js + 5탭)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ activeTab, onTabChange, stepIdx, total }) {
      const tab = TABS[activeTab];
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [activeTab]);

      const highlightSet = new Set(tab.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return tab.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return tab.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 탭바 */}
          <div className="flex items-center bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {TABS.map((t, i) => (
              <button
                key={t.filename}
                onClick={() => onTabChange(i)}
                className={`px-3 py-2 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                  i === activeTab
                    ? 'bg-[#282c34] text-indigo-300 border-t-2 border-t-indigo-400'
                    : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'
                }`}
              >
                {t.filename}
              </button>
            ))}
          </div>
          {/* 헤더 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{tab.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{tab.lang}</span>
          </div>
          {/* 본문 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${tab.lang}`}>{tab.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {tab.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1 whitespace-pre"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          {/* 푸터 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{tab.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total} · tab {activeTab + 1}/{TABS.length}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const [tabOverride, setTabOverride] = useState(null); // null = step 의 activeTab 사용
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];
      const activeTab = tabOverride !== null ? tabOverride : step.activeTab;

      // step 이 바뀌면 탭 override 해제 (step 의 activeTab 으로 복귀)
      useEffect(() => {
        setTabOverride(null);
      }, [stepIdx]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">6</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter 6-7. ERD 그리기 (todos)</h1>
                <p className="text-sm text-indigo-800/80">엔티티 → 속성 → PK/FK → 관계 → Mermaid. 5단계로 추적</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer
                activeTab={activeTab}
                onTabChange={setTabOverride}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                ERD = 엔티티(박스) + 속성(컬럼) + 키(PK/FK) + 관계(1:N/M:N). Mermaid `erDiagram` 으로 텍스트화하면
                git diff 에 변경 이력이 남아 팀과 같은 그림을 본다. 다음 챕터(6-8)에서는 이 ERD 를 SQLAlchemy 모델 코드로
                옮긴 뒤 git 으로 버전 관리하는 흐름을 다룬다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['ERD', '엔티티', '속성', 'PK', 'FK', '1:N', 'M:N', 'Mermaid', 'todos'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="../index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./chapter-06-08-git.html" className="underline hover:no-underline">다음: 6-8 git 으로 버전 관리 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
