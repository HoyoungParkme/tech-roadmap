<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — ERD 그리기 (todos 테이블)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    VI-1-3. ERD 그리기 — todos 테이블
    학습 목표: ERD로 DB 테이블의 컬럼/타입/제약을 표현할 수 있다.
    핵심 비유: "학생부의 한 학생" — 각 컬럼은 학생의 속성(이름, 학번, 출석)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 컬럼 데이터 — 처음부터 명시적으로 정의 (REV-12 W-1 학습)
    const COLUMNS = [
      { name: 'id',          type: 'INTEGER',      pk: true,  nullable: false, dflt: 'AUTO',     hint: 'DB가 자동 부여',   sample: '1' },
      { name: 'title',       type: 'VARCHAR(200)', pk: false, nullable: false, dflt: '─',        hint: '필수 입력',         sample: '장보기' },
      { name: 'description', type: 'TEXT',         pk: false, nullable: true,  dflt: 'NULL',     hint: '없어도 됨',         sample: 'NULL' },
      { name: 'completed',   type: 'BOOLEAN',      pk: false, nullable: false, dflt: 'FALSE',    hint: '기본값 False',     sample: 'false' },
      { name: 'created_at',  type: 'DATETIME',     pk: false, nullable: false, dflt: 'NOW()',    hint: '저장 시각 자동',    sample: '2026-04-30T10:00' },
    ];

    const STEPS = [
      {
        title: 'Step 1. ERD가 무엇인가',
        desc: 'ERD(Entity Relationship Diagram)는 DB 테이블과 관계를 그림으로 표현한 것이다. 비유: 학교의 학생부 — 한 명의 학생을 한 행(row), 학생의 속성(이름/학번/출석)을 컬럼(column)으로 표현한다. 처음 만드는 API는 테이블 하나로 충분하다.',
        focus: 'concept',
      },
      {
        title: 'Step 2. todos 테이블의 5개 컬럼',
        desc: '"할 일" 한 건이 가져야 할 속성 5개를 컬럼으로 정한다. id(식별자), title(제목), description(설명), completed(완료 여부), created_at(만든 시각). 각 컬럼은 데이터 타입을 가진다.',
        focus: 'columns',
      },
      {
        title: 'Step 3. id는 PRIMARY KEY + AUTO INCREMENT',
        desc: 'id 컬럼은 각 행을 구분하는 고유 식별자(PRIMARY KEY)다. AUTO INCREMENT는 새 행이 들어올 때마다 1, 2, 3... 자동으로 번호를 부여한다. 우리가 직접 id를 적을 필요가 없다.',
        focus: 'pk',
      },
      {
        title: 'Step 4. nullable — 비어도 되는 칸',
        desc: 'description은 사용자가 입력 안 해도 된다 → nullable로 설정. SQL의 NULL은 "값 없음"을 의미. title처럼 필수인 컬럼은 NOT NULL로 두면 빈 값을 막을 수 있다. 기본값(default)을 정해두면 입력 안 해도 자동 채워진다.',
        focus: 'nullable',
      },
      {
        title: 'Step 5. 완성된 ERD + 첫 행 예시',
        desc: '이 표 그대로 SQLAlchemy 모델로 옮기면 된다. AUTO INCREMENT로 id=1, NOT NULL인 title="장보기", nullable인 description=NULL, default FALSE인 completed=false, 저장 시각이 자동 기록된다. 한 행이 완성된다.',
        focus: 'sample',
      },
    ];

    const TYPE_COLOR = {
      'INTEGER':       'bg-amber-100 text-amber-800',
      'VARCHAR(200)':  'bg-emerald-100 text-emerald-800',
      'TEXT':          'bg-emerald-100 text-emerald-800',
      'BOOLEAN':       'bg-violet-100 text-violet-800',
      'DATETIME':      'bg-sky-100 text-sky-800',
    };

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 2800);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const focus = step.focus;

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">ERD 그리기 — todos 테이블</h1>
                <p className="text-sm text-slate-500 mt-1">학생부의 한 학생처럼, "할 일 한 건"의 속성 5개를 표로 정리한다</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* Step 1: 비유 카드 */}
            {focus === 'concept' && (
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-6">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div className="p-4 bg-sky-50 border-2 border-sky-300 rounded-lg">
                    <div className="text-2xl mb-2">🎒</div>
                    <div className="font-bold text-slate-800 mb-1">학교 학생부 (현실 비유)</div>
                    <div className="text-xs text-slate-600 leading-relaxed">
                      한 행 = 한 학생 (홍길동, 김유신 ...)<br/>
                      한 컬럼 = 학생 속성 (이름, 학번, 출석)<br/>
                      표 전체 = 학생부
                    </div>
                  </div>
                  <div className="p-4 bg-emerald-50 border-2 border-emerald-300 rounded-lg">
                    <div className="text-2xl mb-2">🗂️</div>
                    <div className="font-bold text-slate-800 mb-1">DB 테이블 (오늘 만들 것)</div>
                    <div className="text-xs text-slate-600 leading-relaxed">
                      한 행 = 할 일 한 건 (장보기, 운동 ...)<br/>
                      한 컬럼 = 할 일 속성 (제목, 완료 여부)<br/>
                      표 전체 = todos 테이블
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* Step 2~5: ERD 본체 */}
            {focus !== 'concept' && (
              <div className="bg-white rounded-xl shadow-sm border-2 border-slate-300 mb-6 overflow-hidden">
                <div className="bg-slate-800 text-white px-5 py-3 font-mono text-sm">
                  📋 todos
                </div>
                <div className="p-5 space-y-2">
                  <div className="grid grid-cols-12 gap-2 text-[11px] font-bold text-slate-500 px-3 mb-2">
                    <div className="col-span-3">컬럼명</div>
                    <div className="col-span-3">타입</div>
                    <div className="col-span-2">제약</div>
                    <div className="col-span-2">기본값</div>
                    <div className="col-span-2">샘플</div>
                  </div>
                  {COLUMNS.map((c) => {
                    const highlightPK       = focus === 'pk' && c.pk;
                    const highlightNullable = focus === 'nullable' && c.nullable;
                    const showSample        = focus === 'sample';
                    return (
                      <div
                        key={c.name}
                        className={`grid grid-cols-12 gap-2 items-center p-3 rounded-lg border-2 transition-all ${
                          highlightPK
                            ? 'border-amber-500 bg-amber-50 ring-2 ring-amber-300'
                            : highlightNullable
                              ? 'border-rose-500 bg-rose-50'
                              : 'border-slate-200 bg-white'
                        }`}
                      >
                        <div className="col-span-3 font-mono text-sm text-slate-800 flex items-center gap-1">
                          {c.pk && <span title="PRIMARY KEY">🔑</span>}
                          {c.name}
                        </div>
                        <div className="col-span-3">
                          <span className={`text-[10px] font-bold px-2 py-1 rounded ${TYPE_COLOR[c.type]}`}>{c.type}</span>
                        </div>
                        <div className="col-span-2 text-[11px] text-slate-700">
                          {c.pk && <span className="bg-amber-200 px-1 rounded font-bold">PK</span>}
                          {!c.pk && c.nullable && <span className="bg-rose-100 text-rose-700 px-1 rounded">NULLABLE</span>}
                          {!c.pk && !c.nullable && <span className="text-slate-500">NOT NULL</span>}
                        </div>
                        <div className="col-span-2 text-[11px] font-mono text-slate-600">{c.dflt}</div>
                        <div className="col-span-2 text-[11px] font-mono text-slate-700">
                          {showSample ? <span className="bg-emerald-100 text-emerald-800 px-1 rounded">{c.sample}</span> : <span className="text-slate-300">─</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
                {focus === 'sample' && (
                  <div className="px-5 pb-5">
                    <div className="p-3 bg-slate-800 text-white rounded text-xs font-mono">
                      INSERT INTO todos (title, description, completed) VALUES ('장보기', NULL, false);<br/>
                      <span className="text-emerald-300">→ id=1, created_at=2026-04-30T10:00 자동 부여</span>
                    </div>
                  </div>
                )}
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
