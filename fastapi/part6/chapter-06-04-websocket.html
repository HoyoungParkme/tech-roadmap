    function ClientCard({ client }) {
      const s = STATUS_STYLE[client.status] || STATUS_STYLE.idle;
      return (
        <div className={`rounded-lg border ${s.bg} ${s.border} px-3 py-2 flex items-center justify-between`}>
          <div className="flex items-center gap-2">
            <span className={`w-2 h-2 rounded-full ${s.dot}`}></span>
            <span className={`text-sm font-bold ${s.text}`}>{client.name}</span>
          </div>
          <span className={`text-[10px] px-2 py-0.5 rounded ${s.bg} ${s.text} border ${s.border}`}>{client.label}</span>
        </div>
      );
    }

    function MessageRow({ msg }) {
      const isIn = msg.dir === 'in';
      const arrow = isIn ? '→' : '←';
      const color = isIn ? 'text-indigo-700' : 'text-violet-700';
      const bg = isIn ? 'bg-indigo-50 border-indigo-200' : 'bg-violet-50 border-violet-200';
      return (
        <div className={`rounded border ${bg} px-2.5 py-1.5 flex items-center gap-2 text-xs`}>
          <span className={`font-mono font-bold ${color} w-12`}>
            {msg.from} {arrow} {msg.to}
          </span>
          <span className="text-slate-700 truncate">{msg.text}</span>
        </div>
      );
    }

    function HighlightBox({ highlight }) {
      if (!highlight) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-indigo-400 bg-gradient-to-br from-indigo-50 to-violet-50 p-3">
          <div className="text-xs font-bold text-indigo-800 mb-2">{highlight.title}</div>
          <ul className="space-y-1">
            {highlight.lines.map((line, i) => (
              <li key={i} className="text-xs text-indigo-900 flex gap-2">
                <span className="text-indigo-500">▸</span>
                <span>{line}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">WebSocket 통신 시뮬레이션</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 연결 상태</span>
          </div>

          {/* 클라이언트 목록 */}
          <div className="mb-3">
            <div className="text-[10px] font-bold text-indigo-700 mb-1.5 uppercase tracking-wider">접속 클라이언트</div>
            <div className="space-y-1.5">
              {state.clients.map((c, i) => (
                <ClientCard key={i} client={c} />
              ))}
            </div>
          </div>

          {/* 서버 박스 */}
          <div className="my-2 rounded-lg border-2 border-indigo-500 bg-indigo-600 text-white px-3 py-2 text-center">
            <div className="flex items-center justify-center gap-2">
              <span className="text-lg">🖥️</span>
              <span className="text-sm font-bold">FastAPI Server</span>
              <span className="text-[10px] font-mono bg-indigo-700 px-1.5 py-0.5 rounded">/ws</span>
            </div>
          </div>

          {/* 메시지 흐름 */}
          {state.messages.length > 0 && (
            <div className="mb-2">
              <div className="text-[10px] font-bold text-indigo-700 mb-1.5 uppercase tracking-wider">메시지 흐름</div>
              <div className="space-y-1">
                {state.messages.map((m, i) => (
                  <MessageRow key={i} msg={m} />
                ))}
              </div>
            </div>
          )}

          <HighlightBox highlight={state.highlight} />

          <div className="mt-auto pt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js + 탭)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ steps, stepIdx, onSelectTab }) {
      const code = steps[stepIdx].code;
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 윈도우 헤더 + 탭 */}
          <div className="bg-slate-800 border-b border-slate-700">
            <div className="flex items-center gap-2 px-3 py-2">
              <span className="w-3 h-3 rounded-full bg-red-400"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
              <span className="w-3 h-3 rounded-full bg-green-400"></span>
              <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
              <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
            </div>
            <div className="flex border-t border-slate-700 overflow-x-auto">
              {steps.map((s, i) => (
                <button
                  key={i}
                  onClick={() => onSelectTab(i)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                    i === stepIdx
                      ? 'bg-[#282c34] text-indigo-300 border-t-2 border-t-indigo-400'
                      : 'bg-slate-800 text-slate-400 hover:bg-slate-700'
                  }`}
                >
                  {s.code.filename}
                </button>
              ))}
            </div>
          </div>

          {/* 코드 본문 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {steps.length}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동재생 3000ms
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">VI</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter VI-3-1. WebSocket 실시간 통신</h1>
                <p className="text-sm text-indigo-800/80">@app.websocket → accept → send/receive → broadcast → disconnect. 5단계로 추적</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer steps={STEPS} stepIdx={stepIdx} onSelectTab={setStepIdx} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계 · 우측 탭 클릭으로 단계 이동</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                @app.websocket → accept → send/receive_text → broadcast → WebSocketDisconnect. 이 5단계가 FastAPI 실시간 통신의 전부다. 다음 챕터(VII-1-1)에서는 Docker 로 이 서버를 배포한다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['WebSocket', '@app.websocket', 'accept', 'send_text', 'receive_text', 'broadcast', 'ConnectionManager', 'WebSocketDisconnect', '실시간'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./chapter-06-03-testing.html" className="underline hover:no-underline">← VI-2-1 pytest + TestClient</a>
              <a href="../part7/chapter-07-01-docker.html" className="underline hover:no-underline">다음: VII-1-1 Docker 배포 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
