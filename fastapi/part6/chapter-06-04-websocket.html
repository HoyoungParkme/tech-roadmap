<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — VI-3-1. WebSocket 실시간 통신</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    VI-3-1. WebSocket 실시간 통신
    학습 목표: WebSocket의 개념과 FastAPI에서의 구현 방법을 설명할 수 있다.
    핵심 비유: "HTTP는 편지, WebSocket은 전화 — 한번 연결하면 계속 대화"
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'HTTP의 한계 — 매번 연결/끊기를 반복',
        desc: 'HTTP는 요청-응답 후 연결이 끊어진다. 실시간 채팅이라면? 매 초마다 "새 메시지 있어?" 하고 물어봐야 한다(polling). 서버 부하가 크고, 지연도 생긴다. 비유: "매번 편지를 보내고 답장을 기다리는 셈."',
        visual: 'http',
      },
      {
        title: 'WebSocket — 한 번 연결하면 계속 대화',
        desc: 'WebSocket은 처음 한 번 연결(handshake)하면, 양방향으로 계속 메시지를 주고받을 수 있다. 서버도 클라이언트에게 먼저 메시지를 보낼 수 있다. 비유: "전화를 걸면 끊을 때까지 계속 대화."',
        visual: 'websocket',
      },
      {
        title: 'FastAPI WebSocket 엔드포인트',
        desc: '@app.websocket("/ws") 데코레이터로 WebSocket 엔드포인트를 만든다. await websocket.accept()로 연결을 수락하고, receive_text()/send_text()로 메시지를 주고받는다.',
        visual: 'endpoint',
        showCode: true,
      },
      {
        title: '실전 — 채팅 예시',
        desc: '여러 클라이언트가 접속하면 ConnectionManager로 연결을 관리한다. 한 사람이 메시지를 보내면 모든 접속자에게 broadcast한다. 이것이 실시간 채팅의 핵심 구조다.',
        visual: 'chat',
        summary: true,
      },
    ];

    const VISUAL_CLASS = {
      http: 'border-red-400 bg-red-50',
      websocket: 'border-emerald-400 bg-emerald-50',
      endpoint: 'border-blue-400 bg-blue-50',
      chat: 'border-violet-400 bg-violet-50',
    };

    const VISUAL_ICON = {
      http: '📮',
      websocket: '📞',
      endpoint: '🔌',
      chat: '💬',
    };

    const VISUAL_LABEL = {
      http: 'HTTP: 요청 → 응답 → 끊김',
      websocket: 'WebSocket: 연결 유지 + 양방향',
      endpoint: 'FastAPI WebSocket 엔드포인트',
      chat: '실시간 채팅 (broadcast)',
    };

    const CODE = [
      'from fastapi import FastAPI, WebSocket',
      '',
      'app = FastAPI()',
      '',
      '@app.websocket("/ws")',
      'async def websocket_endpoint(websocket: WebSocket):',
      '    await websocket.accept()',
      '    while True:',
      '        data = await websocket.receive_text()',
      '        await websocket.send_text(f"Echo: {data}")',
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum VI-3-1</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. 실전 프로젝트 &gt; Chapter 3. 실시간 통신</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VI-3-1. WebSocket 실시간 통신</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                HTTP는 편지, WebSocket은 전화 — <strong>한번 연결하면 계속 대화</strong>하는 실시간 통신.
              </p>
            </header>

            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="flex flex-col items-center gap-4">
                <div className={`w-full max-w-md p-6 rounded-lg border-2 transition-all duration-300 text-center ${VISUAL_CLASS[stepData.visual]}`}>
                  <div className="text-3xl mb-2">{VISUAL_ICON[stepData.visual]}</div>
                  <div className="font-bold text-sm">{VISUAL_LABEL[stepData.visual]}</div>
                </div>
                {stepData.visual === 'http' && (
                  <div className="w-full max-w-md flex items-center gap-2 text-xs justify-center">
                    <div className="p-2 rounded bg-blue-100 border border-blue-300">Client</div>
                    <div className="flex flex-col items-center text-red-500 text-[10px]">
                      <span>요청→</span><span>←응답</span><span className="font-bold">끊김!</span>
                    </div>
                    <div className="p-2 rounded bg-slate-100 border border-slate-300">Server</div>
                  </div>
                )}
                {stepData.visual === 'websocket' && (
                  <div className="w-full max-w-md flex items-center gap-2 text-xs justify-center">
                    <div className="p-2 rounded bg-blue-100 border border-blue-300">Client</div>
                    <div className="flex flex-col items-center text-emerald-500 text-[10px]">
                      <span>←→ 양방향</span><span className="font-bold">연결 유지!</span>
                    </div>
                    <div className="p-2 rounded bg-slate-100 border border-slate-300">Server</div>
                  </div>
                )}
                {stepData.visual === 'chat' && (
                  <div className="w-full max-w-md bg-slate-900 rounded-lg p-3 text-xs font-mono">
                    <div className="text-blue-300">[User A] 안녕하세요!</div>
                    <div className="text-emerald-300">[User B] 반갑습니다!</div>
                    <div className="text-amber-300">[User C] 접속했습니다</div>
                    <div className="text-slate-500 mt-1"># broadcast: 모두에게 전달</div>
                  </div>
                )}
              </div>
            </div>

            {stepData.showCode && (
              <div className="bg-slate-900 rounded-xl overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono">main.py — WebSocket 엔드포인트</div>
                <div className="p-4 text-xs font-mono leading-5">
                  {CODE.map((line, i) => (
                    <div key={i} className={`px-2 py-0.5 ${i >= 4 && i <= 9 ? 'bg-blue-900/40 text-blue-300' : 'text-slate-300'}`}>{line || '\u00A0'}</div>
                  ))}
                </div>
              </div>
            )}

            {stepData.summary && (
              <div className="bg-white rounded-xl border border-slate-200 p-4">
                <div className="text-sm font-bold text-slate-600 mb-2">HTTP vs WebSocket</div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs">
                  <div className="p-2 rounded bg-red-50 border border-red-200"><b>HTTP</b> — 단방향, 매번 연결/끊기, Polling 필요</div>
                  <div className="p-2 rounded bg-emerald-50 border border-emerald-200"><b>WebSocket</b> — 양방향, 연결 유지, 실시간 푸시</div>
                </div>
              </div>
            )}

            <div className="p-4 rounded-xl bg-orange-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-orange-600 text-white hover:bg-orange-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-06-03-testing.html" className="text-slate-500 hover:text-slate-700">&larr; VI-2-1 pytest + TestClient</a>
              <a href="../part7/chapter-07-01-docker.html" className="text-blue-600 hover:text-blue-800 font-medium">VII-1-1 Docker 배포 &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
