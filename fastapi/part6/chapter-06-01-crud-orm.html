  <!--

    학습 목표: SQLAlchemy ORM으로 Create / Read / Update / Delete / Transaction
              5단계 동작을 추적하고, 각 단계가 DB 상태를 어떻게 바꾸는지 시각화한다.
    핵심 비유: "통역사(ORM)가 Python 객체 말을 SQL로 번역해서 DB에 전달한다"
    패턴: fastapi v1 — 좌(LiveDataPane: 4 CRUD 작업 + DB 상태) / 우(VSCode CodeViewer 5탭)

  -->

    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Create — INSERT 한 행을 추가한다',
        desc: 'SQLAlchemy ORM 으로 새 행을 만드는 흐름은 ① 모델 인스턴스 생성 → ② session.add() → ③ session.commit() 세 줄이다. ORM 이 Python 객체를 INSERT SQL 로 번역해서 DB 에 보낸다. 커밋이 끝나면 PK(id) 가 채워지고, 좌측 테이블에 새 행이 한 줄 늘어난다. 핵심은 "객체를 만든다 → 세션에 등록한다 → 커밋한다" 3 단계 리듬이다.',

          { id: 1, store: '강남점', amount: 280000, badge: 'NEW' },
        ],
        action: 'INSERT INTO sales',
        log: [
          { kind: 'sql', text: 'BEGIN' },
          { kind: 'sql', text: "INSERT INTO sales (store, amount) VALUES ('강남점', 280000)" },
          { kind: 'ok',  text: 'COMMIT — id=1 채워짐' },
        ],
        keyPoint: 'Create = new Sale() → session.add() → session.commit(). 커밋 후 PK 가 채워진다.',
        code: {
          lang: 'python',
          filename: 'create.py',
          lines: [
            '"""Sale 생성 — Create',
            '',
            'SQLAlchemy ORM 으로 sales 테이블에 한 행을 추가한다.',
            '"""',
            'from sqlalchemy.orm import Session',
            'from .models import Sale',
            'from .schemas import SaleCreate',
            '',
            '',
            'def create_sale(db: Session, payload: SaleCreate) -> Sale:',
            '    """sales 테이블에 새 행을 INSERT 한다.',
            '',
            '    Args:',
            '        db: SQLAlchemy 세션',
            '        payload: 검증된 입력(SaleCreate)',
            '',
            '    Returns:',
            '        커밋 후 PK 가 채워진 Sale 인스턴스',
            '    """',
            '    # ① 모델 인스턴스 생성 (아직 DB 에는 없음)',
            '    sale = Sale(',
            '        store=payload.store,',
            '        amount=payload.amount,',
            '    )',
            '',
            '    # ② 세션에 등록 (pending 상태)',
            '    db.add(sale)',
            '',
            '    # ③ 커밋 — 이 시점에 실제 INSERT SQL 실행',
            '    db.commit()',
            '',
            '    # ④ refresh — DB 가 채운 PK/기본값을 객체에 반영',
            '    db.refresh(sale)',
            '',
            '    return sale',
            '',
            '',
            '# 비교: 같은 일을 raw SQL 로 쓰면',
            "#   INSERT INTO sales (store, amount) VALUES ('강남점', 280000);",
            '#   SELECT currval(pg_get_serial_sequence(\'sales\', \'id\'));',
            '# ORM 은 이 두 줄을 add() + commit() + refresh() 로 자동 처리한다.',
          ],
          highlight: [9, 19, 20, 21, 22, 23, 25, 26, 28, 29, 31, 32],
        },
      },
      {
        title: 'Step 2. Read — SELECT 단건/목록을 가져온다',
        desc: 'Read 는 두 가지 모양이다. ① 단건 조회: PK 로 한 행을 가져온다 → db.get(Sale, 1). ② 목록 조회: 조건/정렬/페이징을 붙여 여러 행 → select(Sale).where(...).order_by(...).limit(...). ORM 이 SELECT 쿼리를 만들어 보내고, 결과 행을 Sale 객체 리스트로 돌려준다. DB 는 읽기만 하므로 상태가 바뀌지 않는다.',
        rows: [
          { id: 1, store: '강남점', amount: 280000, badge: 'READ' },
        ],
        action: 'SELECT FROM sales',
        log: [
          { kind: 'sql', text: 'SELECT * FROM sales WHERE id = 1' },

        keyPoint: 'Read = db.get(PK) 또는 db.execute(select(...)). 상태는 바뀌지 않는다.',
        code: {
          lang: 'python',
          filename: 'read.py',
          lines: [
            '"""Sale 조회 — Read (단건 / 목록)',
            '',
            'PK 단건 조회와 조건/정렬/페이징 목록 조회를 분리한다.',
            '"""',
            'from sqlalchemy import select',
            'from sqlalchemy.orm import Session',
            'from .models import Sale',
            '',
            '',
            'def get_sale(db: Session, sale_id: int) -> Sale | None:',
            '    """PK 로 한 건을 조회한다. 없으면 None.',
            '',
            '    Args:',
            '        db: SQLAlchemy 세션',
            '        sale_id: 조회 대상 PK',
            '',
            '    Returns:',
            '        Sale 또는 None',
            '    """',
            '    # 1.x 스타일: db.query(Sale).get(sale_id)',
            '    # 2.x 권장 스타일: db.get(Sale, sale_id)',
            '    return db.get(Sale, sale_id)',
            '',
            '',
            'def list_sales(',
            '    db: Session,',
            '    store: str | None = None,',
            '    limit: int = 20,',
            '    offset: int = 0,',
            ') -> list[Sale]:',
            '    """목록을 조회한다. 조건/정렬/페이징을 붙인다.',
            '',
            '    Args:',
            '        db: SQLAlchemy 세션',
            '        store: 매장명 필터 (None 이면 전체)',
            '        limit: 페이지 크기',
            '        offset: 건너뛸 개수',
            '',
            '    Returns:',
            '        Sale 리스트 (없으면 빈 리스트)',
            '    """',
            '    stmt = select(Sale).order_by(Sale.id).limit(limit).offset(offset)',
            '    if store is not None:',
            '        stmt = stmt.where(Sale.store == store)',
            '',
            '    # execute().scalars().all() = ORM 객체 리스트로 받기',
            '    return list(db.execute(stmt).scalars().all())',
          ],
          highlight: [9, 21, 24, 30, 40, 41, 42, 45],
        },
      },
      {
        title: 'Step 3. Update — UPDATE 필드를 수정한다',
        desc: 'Update 도 리듬은 같다. ① 먼저 Read 로 객체를 가져온다 → ② 필드를 직접 수정한다 (sale.amount = 320000) → ③ commit() 한다. SQLAlchemy 의 "Unit of Work" 패턴이 객체의 변경을 자동 추적해서 UPDATE SQL 을 만들어준다. 변경된 필드만 UPDATE 쿼리에 들어간다.',
        rows: [
          { id: 1, store: '강남점', amount: 320000, badge: 'UPDATED' },
        ],
        action: 'UPDATE sales SET amount=?',
        log: [
          { kind: 'sql', text: 'BEGIN' },
          { kind: 'sql', text: 'SELECT * FROM sales WHERE id = 1' },
          { kind: 'sql', text: 'UPDATE sales SET amount = 320000 WHERE id = 1' },
          { kind: 'ok',  text: 'COMMIT — 1 row affected' },
        ],
        keyPoint: 'Update = get() → 필드 변경 → commit(). ORM 이 변경 필드만 골라 UPDATE 한다.',
        code: {
          lang: 'python',
          filename: 'update.py',
          lines: [
            '"""Sale 수정 — Update',
            '',
            '① Read 로 객체를 가져와서 → ② 필드를 수정하고 → ③ 커밋한다.',
            'SQLAlchemy 의 Unit of Work 가 변경 사항을 추적한다.',
            '"""',
            'from sqlalchemy.orm import Session',
            'from .models import Sale',
            'from .schemas import SaleUpdate',
            '',
            '',
            'def update_sale(',
            '    db: Session,',
            '    sale_id: int,',
            '    payload: SaleUpdate,',
            ') -> Sale | None:',
            '    """일부 필드만 수정한다 (PATCH 스타일).',
            '',
            '    Args:',
            '        db: SQLAlchemy 세션',
            '        sale_id: 수정 대상 PK',
            '        payload: 변경할 필드(없는 필드는 그대로)',
            '',
            '    Returns:',
            '        수정된 Sale, 행이 없으면 None',
            '    """',
            '    sale = db.get(Sale, sale_id)',
            '    if sale is None:',
            '        return None',
            '',
            '    # exclude_unset=True : 클라이언트가 보낸 필드만 골라낸다',
            '    data = payload.model_dump(exclude_unset=True)',
            '',
            '    # 변경 적용 — ORM 이 dirty 로 추적',
            '    for key, value in data.items():',
            '        setattr(sale, key, value)',
            '',
            '    db.commit()',
            '    db.refresh(sale)',
            '    return sale',
            '',
            '',
            '# 주의: db.commit() 호출 전까지 DB 는 변경되지 않는다.',
            '#       rollback() 으로 되돌릴 수도 있다.',
          ],
          highlight: [11, 26, 27, 28, 31, 34, 35, 37, 38, 39],
        },
      },
      {
        title: 'Step 4. Delete — DELETE 행을 삭제한다',
        desc: 'Delete 도 같은 리듬이다. ① 객체를 가져오고 → ② db.delete(sale) 호출 → ③ commit(). 그러면 DELETE SQL 이 실행되고 행이 사라진다. 주의 — 진짜로 지우는 "hard delete" 와 deleted_at 플래그만 채우는 "soft delete" 가 있다. 실서비스는 soft delete 가 일반적이지만 학습용으로는 hard delete 로 시작한다.',
        rows: [],
        action: 'DELETE FROM sales',
        log: [
          { kind: 'sql', text: 'BEGIN' },
          { kind: 'sql', text: 'SELECT * FROM sales WHERE id = 1' },
          { kind: 'sql', text: 'DELETE FROM sales WHERE id = 1' },
          { kind: 'ok',  text: 'COMMIT — 1 row affected, 테이블 비어 있음' },
        ],
        keyPoint: 'Delete = get() → db.delete() → commit(). hard / soft 두 가지 전략을 구분한다.',
        code: {
          lang: 'python',
          filename: 'delete.py',
          lines: [
            '"""Sale 삭제 — Delete',
            '',
            'hard delete (행을 지운다) / soft delete (deleted_at 만 채운다) 두 가지.',
            '"""',
            'from datetime import datetime, timezone',
            'from sqlalchemy.orm import Session',
            'from .models import Sale',
            '',
            '',
            'def delete_sale(db: Session, sale_id: int) -> bool:',
            '    """행을 실제로 지운다 (hard delete).',
            '',
            '    Args:',
            '        db: SQLAlchemy 세션',
            '        sale_id: 삭제 대상 PK',
            '',
            '    Returns:',
            '        True 면 삭제 성공, False 면 행이 없었음',
            '    """',
            '    sale = db.get(Sale, sale_id)',
            '    if sale is None:',
            '        return False',
            '',
            '    db.delete(sale)',
            '    db.commit()',
            '    return True',
            '',
            '',
            'def soft_delete_sale(db: Session, sale_id: int) -> bool:',
            '    """deleted_at 컬럼만 채운다 (행은 남는다).',
            '',
            '    Returns:',
            '        True 면 삭제 표시, False 면 행이 없었음',
            '    """',
            '    sale = db.get(Sale, sale_id)',
            '    if sale is None or sale.deleted_at is not None:',
            '        return False',
            '',
            '    sale.deleted_at = datetime.now(timezone.utc)',
            '    db.commit()',
            '    return True',
            '',
            '',
            '# 실서비스 팁:',
            '#  - 감사/복구 가능성이 필요하면 soft delete',
            '#  - 진짜로 지워야 하는 개인정보(GDPR 등)는 hard delete',
          ],
          highlight: [10, 20, 21, 22, 24, 25, 26, 29, 35, 36, 38, 39, 40],
        },
      },
      {
        title: 'Step 5. Transaction — 여러 작업을 하나의 단위로 묶는다',
        desc: '여기가 ORM 의 진짜 가치다. "강남점 매출은 +5만원, 홍대점 매출은 -5만원" 같이 두 작업이 동시에 성공하거나 동시에 실패해야 할 때, 둘을 하나의 트랜잭션으로 묶는다. 중간에 예외가 터지면 rollback() 으로 둘 다 되돌린다. 이 보장이 ACID 의 A(Atomicity) 다. with db.begin() 한 블록이 곧 하나의 트랜잭션이다.',
        rows: [
          { id: 1, store: '강남점', amount: 330000, badge: 'TX' },
          { id: 2, store: '홍대점', amount: 250000, badge: 'TX' },
        ],
        action: 'BEGIN ... COMMIT (atomic)',
        log: [
          { kind: 'sql', text: 'BEGIN' },
          { kind: 'sql', text: 'UPDATE sales SET amount=330000 WHERE store=강남점' },
          { kind: 'sql', text: 'UPDATE sales SET amount=250000 WHERE store=홍대점' },
          { kind: 'ok',  text: 'COMMIT — 두 UPDATE 가 한 단위로 성공' },
          { kind: 'warn', text: '(예외 발생 시) ROLLBACK — 둘 다 원복' },
        ],
        txBox: {
          title: 'Transaction (ACID)',
          features: [
            'Atomicity   : 전부 성공 or 전부 실패 — 중간 상태 없음',
            'Consistency : 제약 조건 위반 시 즉시 거부',
            'Isolation   : 다른 트랜잭션과 격리 (격리 수준 설정)',
            'Durability  : 커밋되면 절대 사라지지 않음',
          ],
        },
        keyPoint: 'Transaction = with db.begin(): ... 블록. 예외 시 자동 rollback() 으로 일관성을 지킨다.',
        code: {
          lang: 'python',
          filename: 'tx.py',
          lines: [
            '"""트랜잭션 — 여러 CRUD 를 하나의 원자 단위로 묶는다',
            '',
            '예: 강남점 매출 +5만원, 홍대점 매출 -5만원 — 둘 다 성공해야 한다.',
            '"""',
            'from sqlalchemy import select',
            'from sqlalchemy.orm import Session',
            'from .models import Sale',
            '',
            '',
            'def transfer_amount(',
            '    db: Session,',
            '    src_store: str,',
            '    dst_store: str,',
            '    amount: int,',
            ') -> tuple[Sale, Sale]:',
            '    """src_store 에서 dst_store 로 amount 만큼 매출을 이동한다.',
            '',
            '    두 UPDATE 가 모두 성공할 때만 커밋된다.',
            '    중간에 예외가 발생하면 SQLAlchemy 가 자동으로 rollback 한다.',
            '',
            '    Args:',
            '        db: SQLAlchemy 세션',
            '        src_store: 출발 매장',
            '        dst_store: 도착 매장',
            '        amount: 이동 금액 (양수)',
            '',
            '    Returns:',
            '        (src, dst) — 갱신된 두 Sale',
            '',
            '    Raises:',
            '        ValueError: 매장이 없거나 잔액이 부족할 때',
            '    """',
            '    # with db.begin() : 블록 시작 = BEGIN, 정상 종료 = COMMIT, 예외 = ROLLBACK',
            '    with db.begin():',
            '        src = db.execute(',
            '            select(Sale).where(Sale.store == src_store)',
            '        ).scalar_one_or_none()',
            '        dst = db.execute(',
            '            select(Sale).where(Sale.store == dst_store)',
            '        ).scalar_one_or_none()',
            '',
            '        if src is None or dst is None:',
            '            raise ValueError("매장을 찾을 수 없습니다")',
            '        if src.amount < amount:',
            '            raise ValueError("출발 매장 잔액이 부족합니다")',
            '',
            '        src.amount -= amount',
            '        dst.amount += amount',
            '        # 블록을 빠져나가는 순간 자동 COMMIT',
            '',
            '    return src, dst',
            '',
            '',
            '# 핵심 한 줄: 트랜잭션은 "전부 or 전부 안 됨" 을 보장하는 안전벨트다.',
          ],
          highlight: [10, 33, 34, 35, 36, 37, 38, 39, 41, 42, 43, 44, 46, 47, 48],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤
    // ─────────────────────────────────────────────────────
    const BADGE_STYLE = {
      NEW:     { bg: 'bg-emerald-100', text: 'text-emerald-800', border: 'border-emerald-300' },
      READ:    { bg: 'bg-sky-100',     text: 'text-sky-800',     border: 'border-sky-300' },
      UPDATED: { bg: 'bg-amber-100',   text: 'text-amber-800',   border: 'border-amber-300' },
      TX:      { bg: 'bg-indigo-100',  text: 'text-indigo-800',  border: 'border-indigo-300' },
    };

    function SaleRow({ row }) {
      const s = BADGE_STYLE[row.badge] || BADGE_STYLE.READ;
      return (
        <div className={`rounded-lg border ${s.border} ${s.bg} px-3 py-2 flex items-center justify-between`}>
          <div className="flex items-center gap-3">
            <span className="text-[10px] font-mono text-slate-500">id={row.id}</span>
            <span className={`text-sm font-bold ${s.text}`}>{row.store}</span>
            <span className={`text-base font-mono font-bold ${s.text}`}>{row.amount.toLocaleString()}원</span>
          </div>
          <span className={`text-[10px] px-2 py-0.5 rounded ${s.bg} ${s.text} border ${s.border}`}>{row.badge}</span>
        </div>
      );
    }

    function EmptyRow() {
      return (
        <div className="rounded-lg border border-dashed border-slate-300 bg-slate-50 px-3 py-3 text-center text-xs text-slate-500">
          (테이블이 비어 있음)
        </div>
      );
    }

    function LogLine({ entry }) {
      const palette = {
        sql:  'text-indigo-300',
        ok:   'text-emerald-300',
        warn: 'text-amber-300',
      };
      const prefix = entry.kind === 'sql' ? 'SQL >' : entry.kind === 'ok' ? 'OK  >' : 'WARN>';
      return (
        <div className="flex gap-2 font-mono text-[11px] leading-5">
          <span className={`${palette[entry.kind] || 'text-slate-300'} font-bold w-12 shrink-0`}>{prefix}</span>
          <span className="text-slate-200 break-all">{entry.text}</span>
        </div>
      );
    }

    function TxBox({ tx }) {
      if (!tx) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-indigo-500 bg-gradient-to-br from-indigo-50 to-violet-50 p-3">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-xl">🔒</span>
            <span className="text-base font-bold text-indigo-800">{tx.title}</span>
          </div>
          <ul className="space-y-1">
            {tx.features.map((f, i) => (
              <li key={i} className="text-xs text-indigo-900 flex gap-2">
                <span className="text-indigo-500 mt-0.5">✓</span>
                <span className="font-mono">{f}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          {/* 헤더 */}
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">sales 테이블 상태</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = DB 상태 변화</span>
          </div>

          {/* 동작 라벨 */}
          <div className="mb-3 text-center text-xs font-bold text-indigo-700 py-1.5 rounded bg-indigo-50 border border-indigo-200">
            ▶ {state.action}
          </div>

          {/* 행 목록 */}
          <div className="space-y-2">
            {state.rows.length === 0
              ? <EmptyRow />
              : state.rows.map((r) => <SaleRow key={r.id} row={r} />)}
          </div>

          {/* 트랜잭션 박스 (Step 5) */}
          <TxBox tx={state.txBox} />

          {/* 로그 패널 */}
          <div className="mt-3 rounded-lg bg-slate-900 border border-slate-700 p-3">
            <div className="text-[10px] font-bold text-slate-400 mb-1.5">SQL Log</div>
            <div className="space-y-0.5">
              {state.log.map((entry, i) => <LogLine key={i} entry={entry} />)}
            </div>
          </div>

          {/* 핵심 한 줄 */}
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">VI</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter VI-1-1. CRUD + SQLAlchemy ORM</h1>
                <p className="text-sm text-indigo-800/80">Create → Read → Update → Delete → Transaction. 5단계로 추적</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 (4버튼) */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3000ms/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                Create / Read / Update / Delete 네 가지 동작 모두 "객체 → 세션 → 커밋" 의 리듬을 따른다. 여러 작업을 묶어야 할 때는 트랜잭션(with db.begin())으로 원자성을 보장한다. 다음 챕터(VI-1-2)에서는 스키마가 바뀔 때 안전하게 마이그레이션하는 Alembic 을 다룬다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['SQLAlchemy', 'ORM', 'Create', 'Read', 'Update', 'Delete', 'Transaction', 'ACID', 'Unit of Work'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="../index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./chapter-06-02-alembic.html" className="underline hover:no-underline">다음: VI-1-2 Alembic 마이그레이션 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
