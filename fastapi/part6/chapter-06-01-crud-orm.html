<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — VI-1-1. CRUD + SQLAlchemy ORM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    VI-1-1. CRUD + SQLAlchemy ORM
    학습 목표: SQLAlchemy ORM으로 CRUD를 구현하고 FastAPI 라우터와 연결할 수 있다.
    핵심 비유: "SQL을 직접 쓰는 대신 Python 클래스로 DB를 다룬다"
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'ORM이란 — SQL 대신 Python 클래스',
        desc: 'ORM(Object-Relational Mapping)은 DB 테이블을 Python 클래스로, 행(row)을 객체로 매핑한다. SQL을 직접 쓰는 대신 Python 코드로 DB를 다룬다. 비유: "통역사가 Python 말을 SQL로 번역해준다."',
        visual: 'concept',
      },
      {
        title: '모델 정의 — Base + Column',
        desc: 'SQLAlchemy의 declarative_base()로 Base를 만들고, 이를 상속해서 모델 클래스를 정의한다. __tablename__으로 테이블명, Column()으로 컬럼을 지정한다.',
        visual: 'model',
        showCode: 'model',
      },
      {
        title: 'DB 연결 — SessionLocal',
        desc: 'create_engine()으로 DB 연결 엔진을 만들고, sessionmaker()로 세션 팩토리를 생성한다. 각 요청마다 세션을 열고/닫는다. FastAPI의 Depends()로 주입한다.',
        visual: 'session',
        showCode: 'session',
      },
      {
        title: 'CRUD 함수 4개',
        desc: 'Create(db.add), Read(db.query), Update(setattr + commit), Delete(db.delete). 각 함수는 세션(db)을 받아서 DB 작업을 수행한다. 비즈니스 로직과 DB 로직을 분리할 수 있다.',
        visual: 'crud',
        showCode: 'crud',
      },
      {
        title: '라우터 연결 — API 완성',
        desc: 'FastAPI 라우터에서 CRUD 함수를 호출한다. Depends(get_db)로 세션을 주입받고, CRUD 함수에 전달한다. 이제 POST/GET/PUT/DELETE API가 완성된다.',
        visual: 'router',
        summary: true,
      },
    ];

    const VISUAL_CLASS = {
      concept: 'border-orange-400 bg-orange-50',
      model: 'border-amber-400 bg-amber-50',
      session: 'border-blue-400 bg-blue-50',
      crud: 'border-violet-400 bg-violet-50',
      router: 'border-emerald-400 bg-emerald-50',
    };

    const VISUAL_ICON = {
      concept: '🔄',
      model: '📦',
      session: '🔌',
      crud: '✏️',
      router: '🚀',
    };

    const VISUAL_LABEL = {
      concept: 'Python 클래스 ↔ DB 테이블',
      model: 'ORM 모델 정의',
      session: 'DB 세션 관리',
      crud: 'CRUD 함수',
      router: 'API 라우터 연결',
    };

    const CODE_MODEL = [
      'from sqlalchemy import Column, Integer, String',
      'from sqlalchemy.ext.declarative import declarative_base',
      '',
      'Base = declarative_base()',
      '',
      'class Todo(Base):',
      '    __tablename__ = "todos"',
      '',
      '    id = Column(Integer, primary_key=True, index=True)',
      '    title = Column(String, nullable=False)',
      '    done = Column(Integer, default=0)',
    ];

    const CODE_SESSION = [
      'from sqlalchemy import create_engine',
      'from sqlalchemy.orm import sessionmaker',
      '',
      'DATABASE_URL = "sqlite:///./app.db"',
      'engine = create_engine(DATABASE_URL)',
      'SessionLocal = sessionmaker(bind=engine)',
      '',
      'def get_db():',
      '    db = SessionLocal()',
      '    try:',
      '        yield db',
      '    finally:',
      '        db.close()',
    ];

    const CODE_CRUD = [
      'def create_todo(db, title: str):',
      '    todo = Todo(title=title)',
      '    db.add(todo)',
      '    db.commit()',
      '    return todo',
      '',
      'def get_todos(db):',
      '    return db.query(Todo).all()',
      '',
      'def update_todo(db, todo_id: int, title: str):',
      '    todo = db.query(Todo).get(todo_id)',
      '    todo.title = title',
      '    db.commit()',
      '',
      'def delete_todo(db, todo_id: int):',
      '    todo = db.query(Todo).get(todo_id)',
      '    db.delete(todo)',
      '    db.commit()',
    ];

    const CODE_MAP = { model: CODE_MODEL, session: CODE_SESSION, crud: CODE_CRUD };
    const CODE_TITLE_MAP = { model: 'models.py — ORM 모델', session: 'database.py — 세션 설정', crud: 'crud.py — CRUD 함수' };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const currentCode = stepData.showCode ? CODE_MAP[stepData.showCode] : null;
      const codeTitle = stepData.showCode ? CODE_TITLE_MAP[stepData.showCode] : '';

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum VI-1-1</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. 실전 프로젝트 &gt; Chapter 1. DB 연동</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VI-1-1. CRUD + SQLAlchemy ORM</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                SQL을 직접 쓰는 대신 <strong>Python 클래스로 DB를 다룬다</strong> — SQLAlchemy ORM으로 CRUD를 구현한다.
              </p>
            </header>

            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="flex flex-col items-center gap-4">
                <div className={`w-full max-w-md p-6 rounded-lg border-2 transition-all duration-300 text-center ${VISUAL_CLASS[stepData.visual]}`}>
                  <div className="text-3xl mb-2">{VISUAL_ICON[stepData.visual]}</div>
                  <div className="font-bold text-sm">{VISUAL_LABEL[stepData.visual]}</div>
                </div>
                {stepData.visual === 'concept' && (
                  <div className="w-full max-w-md grid grid-cols-3 gap-2 items-center text-center text-xs">
                    <div className="p-2 rounded bg-orange-100 border border-orange-300 font-bold">Python 클래스</div>
                    <div className="text-lg font-bold text-orange-500">↔</div>
                    <div className="p-2 rounded bg-blue-100 border border-blue-300 font-bold">DB 테이블</div>
                  </div>
                )}
                {stepData.visual === 'crud' && (
                  <div className="w-full max-w-md grid grid-cols-2 gap-2 text-xs">
                    <div className="p-2 rounded bg-emerald-50 border border-emerald-300 text-center font-bold">Create — db.add()</div>
                    <div className="p-2 rounded bg-blue-50 border border-blue-300 text-center font-bold">Read — db.query()</div>
                    <div className="p-2 rounded bg-amber-50 border border-amber-300 text-center font-bold">Update — setattr + commit</div>
                    <div className="p-2 rounded bg-red-50 border border-red-300 text-center font-bold">Delete — db.delete()</div>
                  </div>
                )}
              </div>
            </div>

            {currentCode && (
              <div className="bg-slate-900 rounded-xl overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono">{codeTitle}</div>
                <div className="p-4 text-xs font-mono leading-5">
                  {currentCode.map((line, i) => (
                    <div key={i} className="px-2 py-0.5 text-slate-300">{line || '\u00A0'}</div>
                  ))}
                </div>
              </div>
            )}

            {stepData.summary && (
              <div className="bg-white rounded-xl border border-slate-200 p-4">
                <div className="text-sm font-bold text-slate-600 mb-2">전체 흐름</div>
                <div className="flex items-center gap-2 text-xs flex-wrap">
                  <div className="p-2 rounded bg-orange-50 border border-orange-200 font-bold">모델 정의</div>
                  <span className="text-slate-400">→</span>
                  <div className="p-2 rounded bg-blue-50 border border-blue-200 font-bold">세션 설정</div>
                  <span className="text-slate-400">→</span>
                  <div className="p-2 rounded bg-violet-50 border border-violet-200 font-bold">CRUD 함수</div>
                  <span className="text-slate-400">→</span>
                  <div className="p-2 rounded bg-emerald-50 border border-emerald-200 font-bold">라우터 연결</div>
                </div>
              </div>
            )}

            <div className="p-4 rounded-xl bg-orange-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-orange-600 text-white hover:bg-orange-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="../part4/chapter-04-04-exception-handler.html" className="text-slate-500 hover:text-slate-700">&larr; IV-4-4 Exception Handler</a>
              <a href="./chapter-06-02-alembic.html" className="text-blue-600 hover:text-blue-800 font-medium">VI-1-2 Alembic 마이그레이션 &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
