<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — VI-1-4. API 설계표 (사용자 스토리 → REST)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    VI-1-4. API 설계표 — 사용자 스토리 → REST 매핑
    학습 목표: 사용자 스토리 5개를 HTTP 메서드 + 엔드포인트로 매핑할 수 있다.
    핵심 비유: "메뉴판" — 손님이 원하는 행위를 메서드/주소로 정리한 표
    단계: 스토리 5개 → 동사 추출 → 메서드 매핑 → URL 매핑 → 완성된 설계표
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 동사 강조 시 원문이 깨지지 않도록 pre/highlight/post 3-tuple로 분해해 둔다.
    const STORIES = [
      { id: 'US-01', pre: '나는 새로운 할 일을 ', highlight: '등록하고', post: ' 싶다', verb: '등록(만들기)', method: 'POST',   url: '/todos',      color: 'emerald' },
      { id: 'US-02', pre: '나는 모든 할 일을 한 번에 ', highlight: '보고', post: ' 싶다', verb: '목록 조회',  method: 'GET',    url: '/todos',      color: 'sky'     },
      { id: 'US-03', pre: '나는 특정 할 일 하나만 ', highlight: '보고', post: ' 싶다', verb: '단일 조회',  method: 'GET',    url: '/todos/{id}', color: 'sky'     },
      { id: 'US-04', pre: '나는 할 일의 내용을 ', highlight: '수정하고', post: ' 싶다', verb: '수정',     method: 'PUT',    url: '/todos/{id}', color: 'amber'   },
      { id: 'US-05', pre: '나는 끝낸 할 일을 ', highlight: '지우고', post: ' 싶다', verb: '삭제',         method: 'DELETE', url: '/todos/{id}', color: 'rose'    },
    ];

    const STEPS = [
      {
        title: 'Step 1. 사용자 스토리 5개',
        desc: '먼저 학습자가 만들고 싶은 기능을 사람 말로 적는다. "나는 OO하고 싶다" 형식이 가장 자연스럽다. 비유: 식당에서 손님이 "메뉴 추가/주문/취소" 같은 요청을 말로 한 것. 아직 코드는 없다.',
        focus: 'story',
      },
      {
        title: 'Step 2. 동사 추출 — 무엇을 하려는가',
        desc: '각 스토리의 핵심 동사(action)를 뽑아낸다. "등록하다", "보다", "수정하다" 같은 행위 키워드. 이게 다음 단계에서 HTTP 메서드를 결정하는 신호다.',
        focus: 'verb',
      },
      {
        title: 'Step 3. 동사 → HTTP 메서드',
        desc: 'REST 규약에 따라 동사를 HTTP 메서드로 변환한다. 만들기→POST, 읽기→GET, 수정→PUT(또는 PATCH), 삭제→DELETE. 같은 GET이라도 "전체 목록"과 "하나만"은 곧 URL이 달라진다.',
        focus: 'method',
      },
      {
        title: 'Step 4. 메서드 + 자원 → URL',
        desc: '리소스 이름을 정한다(여기서는 todos). "전체"는 /todos, "하나"는 /todos/{id}. URL은 명사로, 행위는 메서드로 표현한다 — 이게 RESTful 설계의 핵심 원칙이다.',
        focus: 'url',
      },
      {
        title: 'Step 5. 완성된 API 설계표',
        desc: '5행짜리 표가 완성됐다. 이제 이 표 그대로 FastAPI 라우터를 작성하면 된다. 설계가 먼저, 코드는 그 다음. 표가 명확할수록 구현이 단순해진다.',
        focus: 'table',
      },
    ];

    const COLOR_BG = {
      emerald: 'bg-emerald-50 border-emerald-300',
      sky:     'bg-sky-50 border-sky-300',
      amber:   'bg-amber-50 border-amber-300',
      rose:    'bg-rose-50 border-rose-300',
    };
    const COLOR_BADGE = {
      emerald: 'bg-emerald-600',
      sky:     'bg-sky-600',
      amber:   'bg-amber-600',
      rose:    'bg-rose-600',
    };
    const COLOR_TEXT = {
      emerald: 'text-emerald-800',
      sky:     'text-sky-800',
      amber:   'text-amber-800',
      rose:    'text-rose-800',
    };

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => {
        setCurrentStep((c) => Math.max(0, c - 1));
      };
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 2800);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const focus = step.focus;

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            {/* 헤더 */}
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">VI-1-4. API 설계표</h1>
                <p className="text-sm text-slate-500 mt-1">사용자 스토리 5개 → HTTP 메서드 + 엔드포인트로 매핑하기</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            {/* 단계 설명 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* 메인 비주얼 — 5행 카드 그리드 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="grid grid-cols-12 gap-2 text-[11px] font-bold text-slate-500 mb-3 px-2">
                <div className="col-span-1">ID</div>
                <div className="col-span-5">사용자 스토리</div>
                <div className="col-span-2">동사</div>
                <div className="col-span-1">메서드</div>
                <div className="col-span-3">URL</div>
              </div>
              <div className="space-y-2">
                {STORIES.map((s) => {
                  // Step 1(story)에서는 스토리 원문만, Step 2(verb) 이후 단계별로 동사/메서드/URL 열을 점진 공개.
                  const showVerb   = focus === 'verb'   || focus === 'method' || focus === 'url' || focus === 'table';
                  const showMethod = focus === 'method' || focus === 'url'    || focus === 'table';
                  const showUrl    = focus === 'url'    || focus === 'table';
                  const allShow    = focus === 'table';
                  return (
                    <div
                      key={s.id}
                      className={`grid grid-cols-12 gap-2 items-center p-3 rounded-lg border-2 transition-all ${COLOR_BG[s.color]}`}
                    >
                      <div className="col-span-1 font-mono text-xs text-slate-500">{s.id}</div>
                      <div className="col-span-5 text-sm text-slate-800">
                        {focus === 'verb' ? (
                          <>{s.pre}<span className="bg-yellow-200 px-1 rounded font-bold">{s.highlight}</span>{s.post}</>
                        ) : (
                          <>{s.pre}{s.highlight}{s.post}</>
                        )}
                      </div>
                      <div className="col-span-2">
                        {showVerb ? (
                          <span className={`text-xs font-bold ${COLOR_TEXT[s.color]}`}>{s.verb}</span>
                        ) : (
                          <span className="text-xs text-slate-300">─</span>
                        )}
                      </div>
                      <div className="col-span-1">
                        {showMethod ? (
                          <span className={`text-[10px] font-bold text-white px-2 py-1 rounded ${COLOR_BADGE[s.color]}`}>
                            {s.method}
                          </span>
                        ) : (
                          <span className="text-xs text-slate-300">─</span>
                        )}
                      </div>
                      <div className="col-span-3">
                        {showUrl ? (
                          <code className={`text-xs font-mono ${COLOR_TEXT[s.color]} ${allShow ? 'font-bold' : ''}`}>
                            {s.url}
                          </code>
                        ) : (
                          <span className="text-xs text-slate-300">─</span>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>

              {focus === 'table' && (
                <div className="mt-5 p-4 bg-slate-800 text-white rounded-lg text-xs">
                  <div className="font-bold mb-2">완성된 API 설계 — 이제 FastAPI 라우터로 옮기면 끝</div>
                  <div className="font-mono leading-relaxed text-slate-200">
                    POST&nbsp;&nbsp;&nbsp;/todos<br/>
                    GET&nbsp;&nbsp;&nbsp;&nbsp;/todos<br/>
                    GET&nbsp;&nbsp;&nbsp;&nbsp;/todos/{`{id}`}<br/>
                    PUT&nbsp;&nbsp;&nbsp;&nbsp;/todos/{`{id}`}<br/>
                    DELETE /todos/{`{id}`}
                  </div>
                </div>
              )}
            </div>

            {/* 컨트롤 */}
            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button
                onClick={handlePrev}
                disabled={currentStep === 0}
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed"
              >
                ← 이전
              </button>
              <button
                onClick={togglePlay}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700"
              >
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={currentStep === STEPS.length - 1}
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed"
              >
                다음 →
              </button>
            </div>

            {/* 키보드 안내 */}
            <p className="text-center text-[11px] text-slate-400 mt-3">
              키보드 ←/→ 로 단계 이동 가능
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
