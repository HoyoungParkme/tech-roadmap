          <div className="text-xs font-bold text-indigo-800 mb-2">📦 식별된 리소스</div>
          <ul className="space-y-1.5">
            {resources.map((r, i) => (
              <li key={i} className="flex items-center gap-2 text-sm">
                <code className="px-2 py-0.5 rounded bg-white border border-indigo-300 text-indigo-700 font-mono text-xs">
                  /{r.plural}
                </code>
                <span className="text-indigo-900">{r.name}</span>
                <span className="text-[10px] text-indigo-600 ml-auto">{r.why}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function NotesBox({ notes }) {
      if (!notes) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-indigo-400 bg-indigo-50 p-3">
          <div className="text-xs font-bold text-indigo-800 mb-2">📋 {notes.title}</div>
          <div className="overflow-hidden rounded border border-indigo-200 bg-white">
            <table className="w-full text-[11px]">
              <thead className="bg-indigo-100 text-indigo-800">
                <tr>
                  <th className="px-2 py-1 text-left font-bold">상태</th>
                  <th className="px-2 py-1 text-left font-bold">상황</th>
                  <th className="px-2 py-1 text-left font-bold">본문</th>
                </tr>
              </thead>
              <tbody>
                {notes.rows.map((r, i) => (
                  <tr key={i} className="border-t border-indigo-100">
                    <td className="px-2 py-1 font-mono text-indigo-700">{r.code}</td>
                    <td className="px-2 py-1 text-slate-700">{r.when}</td>
                    <td className="px-2 py-1 text-slate-600">{r.body}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function ErrorsBox({ errors }) {
      if (!errors) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-rose-400 bg-rose-50 p-3">
          <div className="text-xs font-bold text-rose-800 mb-2">⚠ {errors.title}</div>
          <div className="overflow-hidden rounded border border-rose-200 bg-white">
            <table className="w-full text-[11px]">
              <thead className="bg-rose-100 text-rose-800">
                <tr>
                  <th className="px-2 py-1 text-left font-bold">코드</th>
                  <th className="px-2 py-1 text-left font-bold">원인</th>
                  <th className="px-2 py-1 text-left font-bold">detail</th>
                </tr>
              </thead>
              <tbody>
                {errors.rows.map((r, i) => (
                  <tr key={i} className="border-t border-rose-100">
                    <td className="px-2 py-1 font-mono text-rose-700">{r.code}</td>
                    <td className="px-2 py-1 text-slate-700">{r.cause}</td>
                    <td className="px-2 py-1 text-slate-600 font-mono">{r.detail}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function StoryRow({ story, focusFields, stepIdx }) {
      // 단계에 따라 점진적으로 컬럼을 채워 보여준다.
      const showVerb   = stepIdx >= 1;
      const showMethod = stepIdx >= 2;
      const showUrl    = stepIdx >= 2;
      const showStatus = stepIdx >= 3;

      const hi = (key) => (focusFields || []).includes(key)
        ? 'ring-2 ring-indigo-400 bg-indigo-50'
        : 'bg-white';

      return (
        <tr className="border-t border-indigo-100">
          <td className="px-2 py-1.5 font-mono text-[10px] text-indigo-700 align-top">{story.id}</td>
          <td className={`px-2 py-1.5 text-xs text-slate-800 ${hi('text')}`}>{story.text}</td>
          <td className="px-2 py-1.5 text-center">
            {showVerb ? <span className="text-[11px] text-indigo-700 font-bold">{story.verb}</span> : <span className="text-slate-300">·</span>}
          </td>
          <td className={`px-2 py-1.5 text-center ${hi('method')}`}>
            {showMethod ? <MethodBadge method={story.method} /> : <span className="text-slate-300">·</span>}
          </td>
          <td className={`px-2 py-1.5 font-mono text-[11px] text-slate-700 ${hi('url')}`}>
            {showUrl ? story.url : <span className="text-slate-300">·</span>}
          </td>
          <td className={`px-2 py-1.5 text-center ${hi('status')}`}>
            {showStatus ? <span className="text-[11px] font-mono text-indigo-700">{story.status}</span> : <span className="text-slate-300">·</span>}
          </td>
        </tr>
      );
    }

    function LiveDataPane({ step, stepIdx }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">스토리 → 엔드포인트 매핑 표</h3>
            <span className="text-[10px] text-slate-500">단계별로 컬럼이 채워진다</span>
          </div>
          <div className="overflow-hidden rounded-lg border border-indigo-200">
            <table className="w-full text-xs">
              <thead className="bg-indigo-100 text-indigo-800">
                <tr>
                  <th className="px-2 py-1.5 text-left font-bold">ID</th>
                  <th className="px-2 py-1.5 text-left font-bold">사용자 스토리</th>
                  <th className="px-2 py-1.5 text-center font-bold">동사</th>
                  <th className="px-2 py-1.5 text-center font-bold">Method</th>
                  <th className="px-2 py-1.5 text-left font-bold">URL</th>
                  <th className="px-2 py-1.5 text-center font-bold">Status</th>
                </tr>
              </thead>
              <tbody>
                {STORIES.map((s) => (
                  <StoryRow key={s.id} story={s} focusFields={step.focusFields} stepIdx={stepIdx} />
                ))}
              </tbody>
            </table>
          </div>

          <ResourceBox resources={step.resources} />
          <NotesBox notes={step.notes} />
          <ErrorsBox errors={step.errors} />

          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {step.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (5탭) — highlight.js 적용
    // ─────────────────────────────────────────────────────
    function CodeViewer({ tabs, activeIdx, onChange, stepIdx, total }) {
      const codeRef = useRef(null);
      const tab = tabs[activeIdx];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [activeIdx]);

      const highlightSet = new Set(tab.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return tab.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return tab.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 윈도우 헤더 + 탭 바 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-2 text-[10px] text-slate-400">VS Code · 5 files</span>
          </div>
          <div className="flex bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {tabs.map((t, i) => (
              <button
                key={t.filename}
                onClick={() => onChange(i)}
                className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                  i === activeIdx
                    ? 'bg-[#282c34] text-indigo-300 border-t-2 border-t-indigo-400'
                    : 'bg-slate-900 text-slate-400 hover:text-slate-200'
                }`}
              >
                {t.filename}
              </button>
            ))}
          </div>

          {/* 코드 본문 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${tab.lang}`}>{tab.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {tab.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>

          {/* 푸터 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{tab.filename} · {tab.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [tabIdx, setTabIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 단계가 바뀌면 권장 탭으로 자동 포커스
      useEffect(() => {
        setTabIdx(step.activeTab);
      }, [stepIdx]);

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동재생 3초/단계
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">VI</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter VI-1-4. API 설계표 (사용자 스토리 → REST)</h1>
                <p className="text-sm text-indigo-800/80">스토리 → 리소스 → URL/메서드 → 응답 모델 → 에러 케이스. 한 장으로 정리</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer
                tabs={TABS}
                activeIdx={tabIdx}
                onChange={setTabIdx}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계 · 탭 클릭으로 파일 전환</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                한 장의 설계표 = 사용자 스토리 + 리소스 + URL/메서드 + 응답 모델 + 에러 케이스. 이 표가 완성되면 곧장 FastAPI 라우터 구현으로 넘어갈 수 있다. 다음 챕터(VI-1-5)에서는 이 표를 바탕으로 실제 create 흐름을 코드로 옮긴다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['사용자 스토리', '리소스', 'REST', 'HTTP 메서드', 'Pydantic', '응답 모델', '에러 코드', 'FastAPI'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./chapter-06-04-websocket.html" className="underline hover:no-underline">← 이전: 06-04 WebSocket</a>
              <a href="./chapter-06-06-create-flow.html" className="underline hover:no-underline">다음: 06-06 Create Flow →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
