<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — VI-2-1. pytest + TestClient</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    VI-2-1. pytest + TestClient
    학습 목표: TestClient로 FastAPI 엔드포인트를 테스트할 수 있다.
    핵심: "코드를 바꿔도 기존 기능이 깨지지 않았다는 증거"
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: '왜 테스트를 쓰는가',
        desc: '코드를 수정할 때마다 Postman으로 수동 확인? 기능이 10개면 10번 반복해야 한다. 테스트 코드가 있으면 `pytest` 한 번으로 전체 기능이 정상인지 확인된다. "코드를 바꿔도 기존 기능이 깨지지 않았다는 증거"다.',
        visual: 'why',
      },
      {
        title: 'TestClient 설정',
        desc: 'FastAPI의 TestClient는 실제 서버를 띄우지 않고 API를 호출할 수 있게 해준다. httpx 기반이라 requests와 사용법이 같다. app 인스턴스만 넘기면 된다.',
        visual: 'setup',
        showCode: 'setup',
      },
      {
        title: 'GET 테스트 작성',
        desc: 'client.get("/items")으로 호출하고, response.status_code와 response.json()을 assert로 검증한다. 기대값과 실제값이 다르면 테스트가 실패한다.',
        visual: 'get-test',
        showCode: 'get',
      },
      {
        title: 'POST 테스트 작성',
        desc: 'client.post("/items", json={...})로 데이터를 보내고, 생성된 결과를 검증한다. 상태 코드 201, 반환 데이터의 필드를 확인한다.',
        visual: 'post-test',
        showCode: 'post',
      },
      {
        title: '테스트 실행 — pytest',
        desc: '터미널에서 `pytest` 명령 한 줄이면 모든 테스트 파일(test_*.py)을 자동으로 찾아 실행한다. 초록색 PASSED면 성공, 빨간색 FAILED면 어디가 틀렸는지 정확히 알려준다.',
        visual: 'run',
        summary: true,
      },
    ];

    const VISUAL_CLASS = {
      why: 'border-red-400 bg-red-50',
      setup: 'border-amber-400 bg-amber-50',
      'get-test': 'border-blue-400 bg-blue-50',
      'post-test': 'border-violet-400 bg-violet-50',
      run: 'border-emerald-400 bg-emerald-50',
    };

    const VISUAL_ICON = {
      why: '🤔',
      setup: '⚙️',
      'get-test': '📥',
      'post-test': '📤',
      run: '✅',
    };

    const VISUAL_LABEL = {
      why: '수동 테스트의 한계',
      setup: 'TestClient 설정',
      'get-test': 'GET 엔드포인트 테스트',
      'post-test': 'POST 엔드포인트 테스트',
      run: 'pytest 실행 → 전체 검증',
    };

    const CODE_SETUP = [
      'from fastapi.testclient import TestClient',
      'from main import app',
      '',
      'client = TestClient(app)',
    ];

    const CODE_GET = [
      'def test_read_items():',
      '    response = client.get("/items")',
      '    assert response.status_code == 200',
      '    assert isinstance(response.json(), list)',
    ];

    const CODE_POST = [
      'def test_create_item():',
      '    response = client.post(',
      '        "/items",',
      '        json={"title": "New Item", "done": False},',
      '    )',
      '    assert response.status_code == 201',
      '    data = response.json()',
      '    assert data["title"] == "New Item"',
      '    assert "id" in data',
    ];

    const CODE_MAP = { setup: CODE_SETUP, get: CODE_GET, post: CODE_POST };
    const CODE_TITLE_MAP = { setup: 'test_main.py — TestClient 설정', get: 'test_main.py — GET 테스트', post: 'test_main.py — POST 테스트' };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const currentCode = stepData.showCode ? CODE_MAP[stepData.showCode] : null;
      const codeTitle = stepData.showCode ? CODE_TITLE_MAP[stepData.showCode] : '';

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum VI-2-1</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. 실전 프로젝트 &gt; Chapter 2. 테스트</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VI-2-1. pytest + TestClient</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                코드를 바꿔도 기존 기능이 깨지지 않았다는 증거 — <strong>pytest + TestClient</strong>로 API를 자동 검증한다.
              </p>
            </header>

            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="flex flex-col items-center gap-4">
                <div className={`w-full max-w-md p-6 rounded-lg border-2 transition-all duration-300 text-center ${VISUAL_CLASS[stepData.visual]}`}>
                  <div className="text-3xl mb-2">{VISUAL_ICON[stepData.visual]}</div>
                  <div className="font-bold text-sm">{VISUAL_LABEL[stepData.visual]}</div>
                </div>
                {stepData.visual === 'why' && (
                  <div className="w-full max-w-md grid grid-cols-2 gap-2 text-xs text-center">
                    <div className="p-2 rounded bg-red-50 border border-red-300"><b>수동</b> — 매번 Postman 반복</div>
                    <div className="p-2 rounded bg-emerald-50 border border-emerald-300"><b>자동</b> — pytest 한 번이면 끝</div>
                  </div>
                )}
                {stepData.visual === 'run' && (
                  <div className="w-full max-w-md bg-slate-900 rounded-lg p-3 text-xs font-mono">
                    <div className="text-slate-400">$ pytest</div>
                    <div className="text-emerald-400 mt-1">test_main.py::test_read_items PASSED</div>
                    <div className="text-emerald-400">test_main.py::test_create_item PASSED</div>
                    <div className="text-emerald-400 mt-1 font-bold">====== 2 passed in 0.12s ======</div>
                  </div>
                )}
              </div>
            </div>

            {currentCode && (
              <div className="bg-slate-900 rounded-xl overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono">{codeTitle}</div>
                <div className="p-4 text-xs font-mono leading-5">
                  {currentCode.map((line, i) => (
                    <div key={i} className="px-2 py-0.5 text-slate-300">{line || '\u00A0'}</div>
                  ))}
                </div>
              </div>
            )}

            {stepData.summary && (
              <div className="bg-white rounded-xl border border-slate-200 p-4">
                <div className="text-sm font-bold text-slate-600 mb-2">테스트 작성 패턴</div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-2 text-xs">
                  <div className="p-2 rounded bg-amber-50 border border-amber-200"><b>Arrange</b> — 준비 (client 설정)</div>
                  <div className="p-2 rounded bg-blue-50 border border-blue-200"><b>Act</b> — 실행 (client.get/post)</div>
                  <div className="p-2 rounded bg-emerald-50 border border-emerald-200"><b>Assert</b> — 검증 (assert)</div>
                </div>
              </div>
            )}

            <div className="p-4 rounded-xl bg-orange-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-orange-600 text-white hover:bg-orange-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-06-02-alembic.html" className="text-slate-500 hover:text-slate-700">&larr; VI-1-2 Alembic 마이그레이션</a>
              <a href="./chapter-06-04-websocket.html" className="text-blue-600 hover:text-blue-800 font-medium">VI-3-1 WebSocket 실시간 통신 &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
