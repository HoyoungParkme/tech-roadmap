  <!--
    FastAPI Chapter VI-3 — pytest + TestClient
    학습 목표: TestClient로 FastAPI 엔드포인트를 검증하는 5가지 기본기를 익힌다.
              setup → call → assert → teardown 사이클을 시각적으로 추적한다.
    핵심 비유: 식당 손님(테스트) — 매번 깨끗한 테이블(fixture)에서 주문(call)하고
              영수증(response)을 확인(assert)한 뒤 나간다(teardown)
    패턴: fastapi v1 — 좌(LiveDataPane: setup→call→assert→teardown) / 우(VSCode CodeViewer 5탭)
    색상: indigo
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 5단계 시나리오 — TestClient / fixture / assert / override / async
    //   phase     : setup / call / assert / teardown (좌측 흐름 박스 강조용)
    //   request   : TestClient가 보내는 요청 카드
    //   response  : 서버가 돌려준 응답 카드
    //   asserts   : assert 라인 [{label, pass, hint}]
    //   teardown  : 정리 단계 메시지
    //   activeTab : 우측 CodeViewer 활성 탭 (0~4)
    // ─────────────────────────────────────────────────────
    const TABS = [
      { key: 'client',   filename: 'client.py',       lang: 'python', label: 'TestClient' },
      { key: 'fixture',  filename: 'fixture.py',      lang: 'python', label: 'fixture' },
      { key: 'assert',   filename: 'assert.py',       lang: 'python', label: 'assert' },
      { key: 'override', filename: 'override.py',     lang: 'python', label: 'dependency_overrides' },
      { key: 'async',    filename: 'async-test.py',   lang: 'python', label: 'pytest-asyncio' },
    ];

    const STEPS = [
      {
        title: 'Step 1. TestClient — 서버 없이 요청을 쏜다',
        desc: 'TestClient는 실제로 uvicorn을 띄우지 않고도 app 객체에 직접 요청을 흘려보낸다. httpx 기반이라 requests와 사용법이 같다. `client = TestClient(app)`만 만들어두면 `client.get("/items")` 한 줄로 200 OK가 떨어진다. 네트워크 비용/포트 충돌 없이 빠르게 검증할 수 있는 이유다.',
        phase: 'setup',
        request: { method: 'GET', path: '/items/1', body: null },
        response: { status: 200, body: '{ "id": 1, "name": "키보드" }' },
        asserts: [
          { label: 'response.status_code == 200', pass: true, hint: 'TestClient 한 줄로 검증' },
        ],
        teardown: null,
        keyPoint: 'TestClient = "서버 안 켜고 api 호출". 빠르고 격리되고 재현 가능하다.',
        activeTab: 0,
      },
      {
        title: 'Step 2. fixture — 매 테스트마다 깨끗한 DB',
        desc: 'pytest fixture는 "테스트 시작 전 준비, 끝나면 정리"를 자동화한다. `@pytest.fixture` 데코레이터로 만들고, `yield`로 테스트에 넘긴 다음, yield 이후 줄에서 teardown을 한다. test_db fixture는 매번 빈 SQLite 인메모리 DB를 만들어 테스트 간 데이터 오염을 막는다.',
        phase: 'setup',
        request: { method: 'GET', path: '/items', body: null },
        response: { status: 200, body: '[]  ← 깨끗한 DB' },
        asserts: [
          { label: 'len(response.json()) == 0', pass: true, hint: 'fixture가 매번 새 DB 제공' },
        ],
        teardown: '테스트 종료 → engine.dispose() · 임시 파일 삭제',
        keyPoint: 'fixture = setup + teardown 자동화. yield 전이 setup, yield 후가 teardown.',
        activeTab: 1,
      },
      {
        title: 'Step 3. assert — 무엇을 어떻게 검증할까',
        desc: 'assert는 "이 조건이 참이어야 한다"는 약속이다. status_code, json 응답의 필드, 길이, 타입까지 단계별로 검증한다. 한 테스트에서 너무 많은 것을 검증하지 말고 "한 테스트 = 한 시나리오" 원칙을 지킨다. assert 메시지를 붙이면 실패 시 디버깅이 쉬워진다.',
        phase: 'assert',
        request: { method: 'POST', path: '/items', body: '{ "name": "마우스", "price": 12000 }' },
        response: { status: 201, body: '{ "id": 7, "name": "마우스", "price": 12000 }' },
        asserts: [
          { label: 'response.status_code == 201',           pass: true,  hint: '생성 성공' },
          { label: 'data["name"] == "마우스"',              pass: true,  hint: '필드 값 검증' },
          { label: 'data["price"] == 12000',                pass: true,  hint: '숫자 정확히 비교' },
          { label: '"id" in data',                          pass: true,  hint: '자동 생성된 PK 존재' },
        ],
        teardown: null,
        keyPoint: 'assert = 약속한 결과. status → 핵심 필드 → 부가 조건 순서로 검증한다.',
        activeTab: 2,
      },
      {
        title: 'Step 4. dependency_overrides — 외부 의존성 갈아끼우기',
        desc: '실제 DB나 외부 API를 테스트에서 그대로 쓸 수는 없다. `app.dependency_overrides[get_db] = get_test_db`로 의존성을 바꿔치기하면 테스트 코드에서만 다른 구현체가 들어간다. 테스트가 끝나면 `clear()`로 원복한다. JWT 인증을 우회하거나 mock DB를 주입할 때 가장 자주 쓰인다.',
        phase: 'call',
        request: { method: 'GET', path: '/protected', body: 'Authorization: Bearer fake-token' },
        response: { status: 200, body: '{ "user": "test_user" }' },
        asserts: [
          { label: 'response.status_code == 200', pass: true, hint: 'get_current_user override됨' },
          { label: 'data["user"] == "test_user"', pass: true, hint: '가짜 사용자 주입 성공' },
        ],
        teardown: 'app.dependency_overrides.clear() → 원복',
        keyPoint: 'dependency_overrides = "이 함수 대신 이걸 써라". 테스트 후 반드시 clear().',
        activeTab: 3,
      },
      {
        title: 'Step 5. pytest-asyncio — async 함수 테스트',
        desc: 'FastAPI에 `async def` 엔드포인트가 늘어나면 테스트도 비동기로 짜야 할 때가 있다. `pytest-asyncio`를 설치하고 `@pytest.mark.asyncio` 데코레이터를 붙이면 `async def test_xxx()` 형식의 테스트를 실행할 수 있다. httpx.AsyncClient를 쓰면 TestClient와 거의 같은 API로 비동기 호출이 가능하다.',
        phase: 'teardown',
        request: { method: 'GET', path: '/async-items', body: null },
        response: { status: 200, body: '[ { "id": 1, "name": "async 키보드" } ]' },
        asserts: [
          { label: 'response.status_code == 200',          pass: true, hint: 'AsyncClient로 호출' },
          { label: 'isinstance(data, list)',               pass: true, hint: '비동기 응답도 동일 검증' },
          { label: '@pytest.mark.asyncio 적용',            pass: true, hint: '없으면 RuntimeWarning' },
        ],
        teardown: 'async with AsyncClient(...) 컨텍스트 자동 종료',
        keyPoint: 'pytest-asyncio = async 엔드포인트도 같은 패턴. 데코레이터 + AsyncClient.',
        activeTab: 4,
      },
    ];

    // ─────────────────────────────────────────────────────
    // 5개 코드 탭 — 각 탭은 STEP과 독립적으로 항상 모두 존재한다
    // 활성 STEP의 activeTab만 강조되고, 사용자는 탭 클릭으로 전환 가능
    // ─────────────────────────────────────────────────────
    const CODE_BY_KEY = {
      client: {
        lang: 'python',
        filename: 'client.py',
        lines: [
          '# client.py — TestClient 기본 사용법',
          '# 핵심: 실제 서버를 띄우지 않고 app 객체에 요청을 직접 흘려보낸다',
          '',
          'from fastapi import FastAPI',
          'from fastapi.testclient import TestClient',
          '',
          'app = FastAPI()',
          '',
          '@app.get("/items/{item_id}")',
          'def read_item(item_id: int):',
          '    """간단한 GET 엔드포인트 — DB 없이 dict 반환."""',
          '    return {"id": item_id, "name": "키보드"}',
          '',
          '',
          '# ───────── 테스트 ─────────',
          '# TestClient는 httpx 기반이라 requests와 사용법이 동일하다',
          'client = TestClient(app)',
          '',
          'def test_read_item():',
          '    """GET /items/1 → 200, body 검증."""',
          '    response = client.get("/items/1")',
          '',
          '    assert response.status_code == 200',
          '    assert response.json() == {"id": 1, "name": "키보드"}',
          '',
          '',
          '# 실행:',
          '#   $ pytest -v',
          '#   test_read_item PASSED  [100%]',
          '',
          '# 장점:',
          '#  • 네트워크 없음 → 빠르다 (수십 ms)',
          '#  • 포트 충돌 없음 → 병렬 실행 가능',
          '#  • 실제 라우팅/미들웨어/의존성 그대로 검증',
        ],
        highlight: [4, 5, 17, 20, 22, 23],
      },
      fixture: {
        lang: 'python',
        filename: 'fixture.py',
        lines: [
          '# fixture.py — pytest fixture 로 매 테스트마다 깨끗한 DB 만들기',
          '# 핵심: yield 이전 = setup, yield 이후 = teardown',
          '',
          'import pytest',
          'from sqlalchemy import create_engine',
          'from sqlalchemy.orm import sessionmaker',
          'from fastapi.testclient import TestClient',
          '',
          'from app.main import app',
          'from app.db import Base, get_db',
          '',
          '',
          '@pytest.fixture',
          'def test_db():',
          '    """테스트 함수마다 빈 SQLite 인메모리 DB 를 만들어 넘긴다."""',
          '    # ───── setup ─────',
          '    engine = create_engine("sqlite:///:memory:")',
          '    Base.metadata.create_all(engine)            # 테이블 생성',
          '    TestingSession = sessionmaker(bind=engine)',
          '    session = TestingSession()',
          '',
          '    yield session                               # ← 테스트로 전달',
          '',
          '    # ───── teardown ─────',
          '    session.close()',
          '    Base.metadata.drop_all(engine)',
          '    engine.dispose()',
          '',
          '',
          '@pytest.fixture',
          'def client(test_db):',
          '    """TestClient 도 fixture 로 — DB 의존성을 override 하여 주입."""',
          '    def override_get_db():',
          '        yield test_db',
          '',
          '    app.dependency_overrides[get_db] = override_get_db',
          '    yield TestClient(app)',
          '    app.dependency_overrides.clear()',
          '',
          '',
          'def test_empty_items(client):',
          '    """fixture 가 매번 새 DB 를 만드니 초기 목록은 빈 배열."""',
          '    response = client.get("/items")',
          '    assert response.status_code == 200',
          '    assert response.json() == []',
        ],
        highlight: [13, 14, 17, 22, 25, 26, 27, 30, 31, 36, 38],
      },
      assert: {
        lang: 'python',
        filename: 'assert.py',
        lines: [
          '# assert.py — 무엇을 어떻게 검증할까',
          '# 원칙: 한 테스트 = 한 시나리오. status → 핵심 필드 → 부가 조건 순서.',
          '',
          'def test_create_item(client):',
          '    """POST /items 생성 → 201, body 필드 검증."""',
          '    payload = {"name": "마우스", "price": 12000}',
          '',
          '    response = client.post("/items", json=payload)',
          '    data = response.json()',
          '',
          '    # ① 상태 코드 — 가장 먼저 검증',
          '    assert response.status_code == 201, f"예상 201, 실제 {response.status_code}"',
          '',
          '    # ② 핵심 필드 — 값과 타입',
          '    assert data["name"] == "마우스"',
          '    assert data["price"] == 12000',

          '',
          '    # ③ 자동 생성된 PK — 존재 여부만 확인 (값은 환경마다 다름)',
          '    assert "id" in data',
          '    assert data["id"] > 0',
          '',
          '',
          'def test_get_not_found(client):',
          '    """존재하지 않는 id → 404 + 에러 메시지."""',
          '    response = client.get("/items/99999")',
          '',
          '    assert response.status_code == 404',
          '    assert response.json()["detail"] == "Item not found"',
          '',
          '',
          'def test_validation_error(client):',
          '    """잘못된 타입 입력 → 422 (FastAPI 자동 응답)."""',
          '    response = client.post("/items", json={"name": "X", "price": "비싸요"})',
          '',

          '    assert any(e["loc"][-1] == "price" for e in errors)',

          '',
          '# 나쁜 예시 (참고용):',
          '#   assert response.status_code == 200 and data["name"] == "마우스" and ...',
          '#   → 어디서 실패했는지 알 수 없음. 한 줄에 한 assert 가 디버깅에 좋다.',
        ],
        highlight: [11, 14, 15, 16, 17, 20, 21, 27, 28, 34, 35, 36, 37],
      },
      override: {
        lang: 'python',
        filename: 'override.py',
        lines: [
          '# override.py — dependency_overrides 로 의존성 갈아끼우기',
          '# 핵심: 실제 함수 대신 테스트용 함수를 끼워넣는다. 끝나면 반드시 clear().',
          '',
          'from fastapi import Depends, FastAPI, HTTPException',
          'from fastapi.testclient import TestClient',
          '',
          'app = FastAPI()',
          '',
          '',
          'def get_current_user():',
          '    """실제 JWT 검증 — 테스트에서는 우회하고 싶다."""',

          '',
          '',
          '@app.get("/protected")',
          'def protected_route(user: str = Depends(get_current_user)):',
          '    return {"user": user}',
          '',
          '',
          '# ───── 테스트 ─────',
          'client = TestClient(app)',
          '',
          '',

          '    # ① 의존성 갈아끼우기 (한 줄)',

          '',
          '    # ② 평소처럼 호출',
          '    response = client.get("/protected")',
          '',
          '    assert response.status_code == 200',
          '    assert response.json() == {"user": "test_user"}',
          '',
          '    # ③ 원복 — 빠뜨리면 다른 테스트가 오염된다',
          '    app.dependency_overrides.clear()',
          '',
          '',
          '# 흔한 활용:',
          '#  • get_db → 인메모리 DB',
          '#  • get_current_user → 가짜 사용자',

        ],
        highlight: [9, 10, 11, 23, 24, 25, 29, 30, 38, 39],

      async: {
        lang: 'python',
        filename: 'async-test.py',
        lines: [
          '# async-test.py — async def 엔드포인트를 테스트하기',

          '#        $ pip install pytest-asyncio httpx',

          'from httpx import AsyncClient, ASGITransport',
          '',
          'from app.main import app',
          '',
          '',
          '@pytest.mark.asyncio',
          'async def test_async_list_items():',
          '    """async def 엔드포인트를 비동기로 호출."""',
          '    transport = ASGITransport(app=app)',
          '',
          '    async with AsyncClient(transport=transport, base_url="http://test") as ac:',
          '        response = await ac.get("/async-items")',

          '        response = await ac.post(',
          '            "/async-items",',

          '',

          '# 언제 async 테스트가 필요한가?',
          '#  • 엔드포인트가 async def 이고 내부에서 await 호출이 많을 때',
          '#  • 동시 요청 시나리오 (asyncio.gather) 를 검증하고 싶을 때',
          '#  • 동기 TestClient 로는 데드락이 나는 경우',
        ],
        highlight: [4, 5, 10, 11, 15, 16, 19, 20, 24, 25],
      },
    };

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤
    // 흐름: setup → call → assert → teardown
    // ─────────────────────────────────────────────────────
    const PHASES = [
      { key: 'setup',    label: 'setup',    icon: '🧹' },
      { key: 'call',     label: 'call',     icon: '📤' },
      { key: 'assert',   label: 'assert',   icon: '✅' },
      { key: 'teardown', label: 'teardown', icon: '🧼' },
    ];

    function PhaseTimeline({ active }) {
      return (
        <div className="flex items-center justify-between gap-1 mb-3">
          {PHASES.map((p, i) => {
            const isActive = p.key === active;
            return (
              <React.Fragment key={p.key}>
                <div
                  className={`flex-1 text-center px-2 py-1.5 rounded border text-[11px] font-bold transition ${
                    isActive
                      ? 'bg-indigo-600 text-white border-indigo-700 shadow'
                      : 'bg-white text-indigo-500 border-indigo-200'
                  }`}
                >
                  <div className="text-base leading-none">{p.icon}</div>
                  <div className="mt-0.5">{p.label}</div>
                </div>
                {i < PHASES.length - 1 && (
                  <span className={`text-xs ${isActive ? 'text-indigo-300' : 'text-indigo-400'}`}>→</span>
                )}
              </React.Fragment>
            );
          })}
        </div>
      );
    }

    function RequestCard({ req }) {
      const METHOD_COLOR = {
        GET:    'bg-emerald-100 text-emerald-800 border-emerald-300',
        POST:   'bg-sky-100 text-sky-800 border-sky-300',
        PUT:    'bg-amber-100 text-amber-800 border-amber-300',
        DELETE: 'bg-rose-100 text-rose-800 border-rose-300',
      };
      return (
        <div className="rounded-lg border border-indigo-200 bg-indigo-50/60 px-3 py-2">
          <div className="text-[10px] font-bold text-indigo-700 mb-1.5">📤 Request</div>
          <div className="flex items-center gap-2 flex-wrap">
            <span className={`text-[11px] font-bold px-2 py-0.5 rounded border ${METHOD_COLOR[req.method] || 'bg-slate-100'}`}>
              {req.method}
            </span>
            <span className="font-mono text-xs text-indigo-900">{req.path}</span>
          </div>
          {req.body && (
            <div className="mt-1.5 text-[11px] font-mono text-indigo-800 bg-white border border-indigo-100 rounded px-2 py-1 break-all">
              {req.body}
            </div>
          )}
        </div>
      );
    }

    function ResponseCard({ res }) {
      const ok = res.status >= 200 && res.status < 300;
      return (
        <div className={`rounded-lg border px-3 py-2 ${ok ? 'border-emerald-200 bg-emerald-50/60' : 'border-rose-200 bg-rose-50/60'}`}>
          <div className={`text-[10px] font-bold mb-1.5 ${ok ? 'text-emerald-700' : 'text-rose-700'}`}>📥 Response</div>
          <div className="flex items-center gap-2">
            <span className={`text-[11px] font-bold px-2 py-0.5 rounded border ${
              ok ? 'bg-emerald-100 text-emerald-800 border-emerald-300' : 'bg-rose-100 text-rose-800 border-rose-300'
            }`}>
              {res.status} {ok ? 'OK' : 'FAIL'}
            </span>
          </div>
          <div className="mt-1.5 text-[11px] font-mono text-slate-700 bg-white border border-slate-100 rounded px-2 py-1 break-all">
            {res.body}
          </div>
        </div>
      );
    }

    function AssertList({ items }) {
      if (!items || items.length === 0) return null;
      return (
        <div className="mt-2.5 rounded-lg border border-indigo-200 bg-white p-2.5">
          <div className="text-[10px] font-bold text-indigo-700 mb-1.5">✅ Asserts</div>
          <ul className="space-y-1">
            {items.map((a, i) => (
              <li key={i} className="flex items-start gap-2 text-[11px]">
                <span className={`mt-0.5 ${a.pass ? 'text-emerald-600' : 'text-rose-600'}`}>
                  {a.pass ? '✓' : '✗'}
                </span>
                <div className="flex-1">
                  <code className="font-mono text-indigo-900">{a.label}</code>
                  {a.hint && <div className="text-[10px] text-slate-500">{a.hint}</div>}
                </div>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function TeardownBox({ msg }) {
      if (!msg) return null;
      return (
        <div className="mt-2.5 rounded-lg border border-slate-300 bg-slate-50 px-3 py-2 text-[11px] text-slate-700">
          <span className="font-bold text-slate-600">🧼 teardown · </span>
          {msg}
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">테스트 사이클 시뮬레이션</h3>
            <span className="text-[10px] text-slate-500">setup → call → assert → teardown</span>
          </div>
          <PhaseTimeline active={state.phase} />
          <div className="space-y-2">
            <RequestCard req={state.request} />
            <div className="text-center text-[10px] text-indigo-500">↓ TestClient</div>
            <ResponseCard res={state.response} />
          </div>
          <AssertList items={state.asserts} />
          <TeardownBox msg={state.teardown} />
          <div className="mt-3 text-[11px] text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js · 5탭)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ activeTab, onChangeTab, stepIdx, total }) {
      const codeRef = useRef(null);
      const code = CODE_BY_KEY[TABS[activeTab].key];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [activeTab]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 탭바 */}
          <div className="flex items-center bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {TABS.map((t, i) => {
              const active = i === activeTab;
              return (
                <button
                  key={t.key}
                  onClick={() => onChangeTab(i)}
                  className={`px-3 py-2 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                    active
                      ? 'bg-[#282c34] text-indigo-300 border-t-2 border-t-indigo-400'
                      : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800 border-t-2 border-t-transparent'
                  }`}
                >
                  {t.filename}
                </button>
              );
            })}
          </div>
          {/* 윈도우 헤더 */}
          <div className="flex items-center gap-2 px-3 py-1.5 bg-slate-800 border-b border-slate-700">
            <span className="w-2.5 h-2.5 rounded-full bg-red-400"></span>
            <span className="w-2.5 h-2.5 rounded-full bg-yellow-400"></span>
            <span className="w-2.5 h-2.5 rounded-full bg-green-400"></span>
            <span className="ml-2 text-[11px] text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{TABS[activeTab].label}</span>
          </div>
          {/* 코드 본문 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          {/* 푸터 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [tabIdx, setTabIdx] = useState(STEPS[0].activeTab);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 스텝이 바뀌면 그 스텝의 권장 탭으로 자동 이동
      useEffect(() => {
        setTabIdx(STEPS[stepIdx].activeTab);
      }, [stepIdx]);

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동재생 3초/스텝
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">VI</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter VI-3. pytest + TestClient</h1>
                <p className="text-sm text-indigo-800/80">TestClient · fixture · assert · dependency_overrides · pytest-asyncio</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer
                activeTab={tabIdx}
                onChangeTab={setTabIdx}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 컨트롤 — 4버튼 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계 · 탭 직접 클릭 가능</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                TestClient(빠른 호출) → fixture(setup/teardown) → assert(검증) → dependency_overrides(의존성 교체) → pytest-asyncio(비동기). 이 5개만 익히면 FastAPI 테스트의 90%를 커버한다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['pytest', 'TestClient', 'fixture', 'assert', 'dependency_overrides', 'pytest-asyncio', 'AsyncClient', 'ASGITransport'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./chapter-06-02-alembic.html" className="underline hover:no-underline">← VI-2 Alembic</a>
              <a href="./chapter-06-04-websocket.html" className="underline hover:no-underline">다음: VI-4 WebSocket →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
