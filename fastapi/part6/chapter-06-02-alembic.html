<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — VI-1-2. Alembic 마이그레이션</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    VI-1-2. Alembic 마이그레이션
    학습 목표: Alembic으로 DB 스키마 변경을 안전하게 관리할 수 있다.
    핵심 비유: "DB의 git — 스키마 변경 이력을 관리한다"
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: '문제 — DB 스키마를 바꾸면 데이터가 날아간다',
        desc: '개발 중 모델에 컬럼을 추가하면? Base.metadata.create_all()은 기존 테이블을 건드리지 않는다. 테이블을 삭제하고 다시 만들면 데이터가 사라진다. 프로덕션에서는 절대 할 수 없는 방법이다.',
        visual: 'problem',
      },
      {
        title: 'Alembic init — 마이그레이션 환경 설정',
        desc: '`alembic init alembic` 명령으로 마이그레이션 폴더를 생성한다. alembic.ini(설정)와 alembic/env.py(환경)가 생긴다. env.py에 SQLAlchemy 모델의 metadata를 연결해준다.',
        visual: 'init',
        showCode: 'init',
      },
      {
        title: 'revision — 변경 사항 감지',
        desc: '`alembic revision --autogenerate -m "add column"`으로 현재 모델과 DB 상태를 비교해서 마이그레이션 스크립트를 자동 생성한다. upgrade()와 downgrade() 함수가 들어있다.',
        visual: 'revision',
        showCode: 'revision',
      },
      {
        title: 'upgrade/downgrade — 적용과 되돌리기',
        desc: '`alembic upgrade head`로 최신 상태로 적용. `alembic downgrade -1`로 한 단계 되돌리기. DB의 git처럼 스키마 변경 이력을 앞뒤로 이동할 수 있다.',
        visual: 'upgrade',
        summary: true,
      },
    ];

    const VISUAL_CLASS = {
      problem: 'border-red-400 bg-red-50',
      init: 'border-amber-400 bg-amber-50',
      revision: 'border-blue-400 bg-blue-50',
      upgrade: 'border-emerald-400 bg-emerald-50',
    };

    const VISUAL_ICON = {
      problem: '💥',
      init: '📁',
      revision: '📝',
      upgrade: '🔄',
    };

    const VISUAL_LABEL = {
      problem: '스키마 변경 = 데이터 손실 위험',
      init: 'alembic init 실행',
      revision: '마이그레이션 스크립트 생성',
      upgrade: 'upgrade ↑ / downgrade ↓',
    };

    const CODE_INIT = [
      '# 터미널에서 실행',
      'pip install alembic',
      'alembic init alembic',
      '',
      '# 생성되는 파일 구조',
      'alembic/',
      '├── env.py          # 환경 설정',
      '├── versions/       # 마이그레이션 파일들',
      '└── script.py.mako  # 템플릿',
      'alembic.ini          # DB URL 설정',
    ];

    const CODE_REVISION = [
      '# 마이그레이션 스크립트 자동 생성',
      'alembic revision --autogenerate -m "add done column"',
      '',
      '# 생성된 파일 (versions/xxxx_add_done_column.py)',
      'def upgrade():',
      '    op.add_column("todos",',
      '        sa.Column("done", sa.Boolean(), default=False)',
      '    )',
      '',
      'def downgrade():',
      '    op.drop_column("todos", "done")',
    ];

    const CODE_MAP = { init: CODE_INIT, revision: CODE_REVISION };
    const CODE_TITLE_MAP = { init: '터미널 — Alembic 초기화', revision: '마이그레이션 스크립트 생성' };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const currentCode = stepData.showCode ? CODE_MAP[stepData.showCode] : null;
      const codeTitle = stepData.showCode ? CODE_TITLE_MAP[stepData.showCode] : '';

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum VI-1-2</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-orange-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VI</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VI. 실전 프로젝트 &gt; Chapter 1. DB 연동</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VI-1-2. Alembic 마이그레이션</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                DB의 git — <strong>Alembic</strong>으로 스키마 변경 이력을 관리한다.
              </p>
            </header>

            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="flex flex-col items-center gap-4">
                <div className={`w-full max-w-md p-6 rounded-lg border-2 transition-all duration-300 text-center ${VISUAL_CLASS[stepData.visual]}`}>
                  <div className="text-3xl mb-2">{VISUAL_ICON[stepData.visual]}</div>
                  <div className="font-bold text-sm">{VISUAL_LABEL[stepData.visual]}</div>
                </div>
                {stepData.visual === 'upgrade' && (
                  <div className="w-full max-w-md flex items-center gap-2 text-xs font-mono justify-center">
                    <div className="p-2 rounded bg-slate-200 border border-slate-300">v1</div>
                    <span className="text-slate-400">→</span>
                    <div className="p-2 rounded bg-slate-200 border border-slate-300">v2</div>
                    <span className="text-slate-400">→</span>
                    <div className="p-2 rounded bg-emerald-200 border border-emerald-400 font-bold">v3 (head)</div>
                  </div>
                )}
              </div>
            </div>

            {currentCode && (
              <div className="bg-slate-900 rounded-xl overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono">{codeTitle}</div>
                <div className="p-4 text-xs font-mono leading-5">
                  {currentCode.map((line, i) => (
                    <div key={i} className="px-2 py-0.5 text-slate-300">{line || '\u00A0'}</div>
                  ))}
                </div>
              </div>
            )}

            {stepData.summary && (
              <div className="bg-white rounded-xl border border-slate-200 p-4">
                <div className="text-sm font-bold text-slate-600 mb-2">Alembic 핵심 명령어</div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs">
                  <div className="p-2 rounded bg-amber-50 border border-amber-200"><b>alembic init</b> — 초기 설정</div>
                  <div className="p-2 rounded bg-blue-50 border border-blue-200"><b>alembic revision --autogenerate</b> — 변경 감지</div>
                  <div className="p-2 rounded bg-emerald-50 border border-emerald-200"><b>alembic upgrade head</b> — 최신으로 적용</div>
                  <div className="p-2 rounded bg-red-50 border border-red-200"><b>alembic downgrade -1</b> — 한 단계 되돌리기</div>
                </div>
              </div>
            )}

            <div className="p-4 rounded-xl bg-orange-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-orange-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-orange-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-orange-600 text-white hover:bg-orange-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-06-01-crud-orm.html" className="text-slate-500 hover:text-slate-700">&larr; VI-1-1 CRUD + ORM</a>
              <a href="./chapter-06-03-testing.html" className="text-blue-600 hover:text-blue-800 font-medium">VI-2-1 pytest + TestClient &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
