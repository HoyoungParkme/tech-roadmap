<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — Git 버전 관리 첫걸음</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    VI-3-2. Git 버전 관리 첫걸음
    학습 목표: git init/.gitignore/add/commit 4개 명령으로 코드 변경 이력을 저장할 수 있다.
    핵심 비유: "게임 세이브 포인트" — 원하는 시점으로 돌아갈 수 있음
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 파일 데이터 — staging 상태가 단계별로 변함
    const FILES = [
      { name: 'main.py',          danger: false, ignored: false },
      { name: 'core/config.py',   danger: false, ignored: false },
      { name: 'README.md',        danger: false, ignored: false },
      { name: '.env',             danger: true,  ignored: true,  hint: '비밀번호! 절대 commit 금지' },
      { name: '.venv/',           danger: false, ignored: true,  hint: '가상환경 — 추적 X' },
      { name: '__pycache__/',     danger: false, ignored: true,  hint: 'Python 캐시 — 추적 X' },
    ];

    const COMMITS = [
      { hash: 'a1b2c3d', prefix: 'feat',  msg: '프로젝트 스켈레톤 초기 설정',     when: '10:00' },
      { hash: 'd4e5f6g', prefix: 'feat',  msg: 'todos CRUD 라우터 추가',         when: '11:30' },
      { hash: 'h7i8j9k', prefix: 'fix',   msg: 'description nullable 처리 누락', when: '14:20' },
      { hash: 'l0m1n2o', prefix: 'docs',  msg: 'README에 실행 방법 보강',        when: '15:45' },
    ];

    // commit prefix 색상 정적 매핑 — 다른 파일의 TYPE_COLOR/COLOR_BG 패턴과 일관성 유지
    const PREFIX_COLOR = {
      feat: 'bg-emerald-100 text-emerald-800',
      fix:  'bg-amber-100 text-amber-800',
      docs: 'bg-sky-100 text-sky-800',
    };

    const STEPS = [
      {
        title: 'Step 1. git init — 새 게임 시작',
        desc: 'git은 코드 변경 이력을 저장하는 도구. 비유: 게임의 세이브 포인트 — 원하는 시점으로 돌아갈 수 있다. `git init` 한 번이면 현재 폴더가 git 저장소가 된다. 숨김 폴더 .git/ 이 생기고 모든 변경 이력이 거기 저장된다.',
        focus: 'init',
      },
      {
        title: 'Step 2. .gitignore — 추적 제외 파일 표시',
        desc: '모든 파일을 다 저장하면 안 된다. .env(비밀번호!), .venv/(가상환경), __pycache__/(캐시)는 .gitignore에 적어두면 git이 영원히 추적 안 한다. 특히 .env는 GitHub에 올라가면 비밀번호가 전 세계에 공개된다.',
        focus: 'ignore',
      },
      {
        title: 'Step 3. git add . — 다음 세이브 대상 선택',
        desc: 'add는 staging area(준비 영역)로 파일을 옮긴다. 게임으로 비유하면 "다음 세이브에 포함할 진행" 선택. .gitignore에 적힌 파일은 자동으로 제외된다. 아직 commit 전이라 실제 저장은 안 됐다.',
        focus: 'add',
      },
      {
        title: 'Step 4. git commit -m "feat: ..." — 실제 세이브',
        desc: '드디어 세이브. -m 뒤에는 "무엇을 했는가" 한 줄 메시지를 쓴다. 접두어 컨벤션: feat:(새 기능) / fix:(버그 수정) / docs:(문서). 6개월 뒤 자기가 봐도 알아볼 수 있게 명확히. 매 commit은 고유한 해시(예: a1b2c3d)를 가진다.',
        focus: 'commit',
      },
      {
        title: 'Step 5. 커밋 히스토리 — 세이브 슬롯 목록',
        desc: '`git log`로 모든 commit 이력을 본다. 시간순, 메시지 한 줄씩. 원하는 commit으로 돌아가거나(`git checkout <hash>`), 그 시점의 코드를 가져올 수 있다. 이게 git의 진짜 가치 — 안전한 탐험 + 협업의 기반.',
        focus: 'history',
      },
    ];

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 2800);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const focus = step.focus;

      // 단계별 zone 활성화
      const showWorkingTree = true; // 항상
      const showStaging     = focus === 'add' || focus === 'commit' || focus === 'history';
      const showHistory     = focus === 'commit' || focus === 'history';
      const showAllCommits  = focus === 'history';

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">Git 버전 관리 첫걸음</h1>
                <p className="text-sm text-slate-500 mt-1">게임 세이브 포인트 — init → .gitignore → add → commit → history</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* 3-zone 다이어그램: working tree → staging → commit history */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-6">
              {/* Working Tree */}
              <div className="bg-white rounded-xl border-2 border-slate-300 p-4">
                <div className="font-bold text-slate-800 text-sm mb-2 flex items-center gap-2">
                  📁 Working Tree
                  {focus === 'init' && <span className="text-[10px] bg-emerald-200 text-emerald-800 px-2 py-0.5 rounded">새로 .git/ 생성됨</span>}
                </div>
                <div className="space-y-1">
                  {FILES.map((f) => {
                    const isIgnored = focus === 'ignore' && f.ignored;
                    return (
                      <div key={f.name} className={`text-xs font-mono px-2 py-1 rounded flex items-center gap-2 ${
                        isIgnored ? 'bg-slate-200 text-slate-400 line-through' : f.danger ? 'bg-rose-50 text-rose-800' : 'bg-slate-50 text-slate-700'
                      }`}>
                        {f.danger && <span title="위험!">⚠️</span>}
                        {f.name}
                        {isIgnored && <span className="text-[10px] ml-auto">ignored</span>}
                      </div>
                    );
                  })}
                </div>
                {focus === 'ignore' && (
                  <div className="mt-3 p-2 bg-amber-50 border border-amber-300 rounded text-[10px] text-amber-900 font-mono">
                    .gitignore:<br/>
                    .env<br/>
                    .venv/<br/>
                    __pycache__/
                  </div>
                )}
              </div>

              {/* Staging Area */}
              <div className={`bg-white rounded-xl border-2 p-4 transition-all ${
                showStaging ? 'border-sky-400 bg-sky-50' : 'border-slate-200 opacity-50'
              }`}>
                <div className="font-bold text-slate-800 text-sm mb-2">🎯 Staging Area</div>
                {!showStaging ? (
                  <div className="text-[11px] text-slate-400 italic">git add . 하면 여기로 이동</div>
                ) : (
                  <div className="space-y-1">
                    {FILES.filter(f => !f.ignored).map((f) => (
                      <div key={f.name} className="text-xs font-mono px-2 py-1 rounded bg-white text-slate-700 border border-sky-200">
                        + {f.name}
                      </div>
                    ))}
                    {focus === 'add' && (
                      <div className="text-[10px] text-slate-500 mt-2">📌 .env, .venv/, __pycache__/는 자동 제외됨</div>
                    )}
                  </div>
                )}
              </div>

              {/* Commit History */}
              <div className={`bg-white rounded-xl border-2 p-4 transition-all ${
                showHistory ? 'border-violet-400 bg-violet-50' : 'border-slate-200 opacity-50'
              }`}>
                <div className="font-bold text-slate-800 text-sm mb-2">💾 Commit History</div>
                {!showHistory ? (
                  <div className="text-[11px] text-slate-400 italic">git commit 하면 여기에 기록</div>
                ) : (
                  <div className="space-y-1.5">
                    {(showAllCommits ? COMMITS : COMMITS.slice(0, 1)).map((c, idx) => (
                      <div key={c.hash} className="bg-white border border-violet-200 rounded p-2">
                        <div className="flex items-center gap-2 mb-1">
                          <span className="font-mono text-[10px] text-violet-700 bg-violet-100 px-1.5 py-0.5 rounded">{c.hash}</span>
                          <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${PREFIX_COLOR[c.prefix]}`}>{c.prefix}</span>
                          <span className="text-[10px] text-slate-400 ml-auto">{c.when}</span>
                        </div>
                        <div className="text-[11px] text-slate-700">{c.msg}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {/* 명령어 카드 */}
            <div className="bg-slate-900 text-white rounded-xl p-4 mb-6 font-mono text-sm">
              {focus === 'init' && <div>$ git init</div>}
              {focus === 'ignore' && (
                <>
                  <div>$ echo ".env" {'>>'}  .gitignore</div>
                  <div>$ echo ".venv/" {'>>'} .gitignore</div>
                  <div>$ echo "__pycache__/" {'>>'} .gitignore</div>
                </>
              )}
              {focus === 'add' && <div>$ git add .</div>}
              {focus === 'commit' && (
                <div>$ git commit -m "feat: 프로젝트 스켈레톤 초기 설정"</div>
              )}
              {focus === 'history' && (
                <div>$ git log --oneline</div>
              )}
            </div>

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
