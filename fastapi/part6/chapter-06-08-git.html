            '',
            '# (5) 다른 컴퓨터/팀원이 가져갈 때',
            'git clone https://github.com/me/fastapi-todo.git',
            'cd fastapi-todo',
            '# 모든 이력이 그대로 복제됨',
            '',
            '# (6) 팀원이 push 한 변경을 내려받기',
            'git pull',
            '# Updating ... Fast-forward',
            '',
            '# 핵심 5단계 흐름 정리:',
            '#  init  → add  → commit  → branch  → push',
            '#  세팅    선택    저장      분기      백업/공유',
            '',
            '# .env 처럼 비밀 파일은 절대 push 금지!',
            '# → .gitignore 에 반드시 추가 (Step 1 에서 했음)',
          ],
          highlight: [7, 8, 9, 16, 17, 18, 19, 20, 21, 22, 26, 27, 28, 33, 34, 35, 40, 41, 42, 43, 44],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤
    //   작업 디렉토리 → staging → local repo → remote 4영역
    // ─────────────────────────────────────────────────────
    const STATE_STYLE = {
      tracked:   { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-800', label: 'tracked' },
      modified:  { bg: 'bg-amber-50',   border: 'border-amber-300',   text: 'text-amber-800',   label: 'modified' },
      untracked: { bg: 'bg-slate-100',  border: 'border-slate-300',   text: 'text-slate-700',   label: 'untracked' },
    };

    function FileCard({ file }) {
      const s = STATE_STYLE[file.state] || STATE_STYLE.untracked;
      return (
        <div className={`rounded-md border ${s.bg} ${s.border} px-2 py-1 flex items-center justify-between text-xs`}>
          <span className={`font-mono ${s.text}`}>{file.name}</span>
          <span className={`text-[9px] px-1.5 py-0.5 rounded ${s.bg} ${s.text} border ${s.border}`}>{s.label}</span>
        </div>
      );
    }

    function StagingCard({ file }) {
      return (
        <div className="rounded-md border border-indigo-300 bg-indigo-50 px-2 py-1 flex items-center justify-between text-xs">
          <span className="font-mono text-indigo-800">{file.name}</span>
          <span className="text-[9px] px-1.5 py-0.5 rounded bg-indigo-200 text-indigo-800">staged</span>
        </div>
      );
    }

    function CommitCard({ commit, isRemote }) {
      const isFeat = commit.msg.startsWith('feat');
      const isFix = commit.msg.startsWith('fix');
      const isDocs = commit.msg.startsWith('docs');
      const tagBg = isFeat ? 'bg-emerald-100 text-emerald-800'
                  : isFix  ? 'bg-amber-100 text-amber-800'
                  : isDocs ? 'bg-sky-100 text-sky-800'
                           : 'bg-slate-100 text-slate-700';
      const branchTag = commit.branch && commit.branch !== 'main';
      return (
        <div className={`rounded-md border ${isRemote ? 'border-violet-300 bg-violet-50' : 'border-indigo-200 bg-white'} px-2 py-1 text-xs`}>
          <div className="flex items-center gap-2">
            <span className="font-mono text-[10px] text-slate-500">{commit.hash}</span>
            {branchTag && (
              <span className="text-[9px] px-1.5 py-0.5 rounded bg-violet-100 text-violet-800 border border-violet-200">{commit.branch}</span>
            )}
            <span className={`text-[9px] px-1.5 py-0.5 rounded ${tagBg} ml-auto`}>
              {commit.msg.split(':')[0]}
            </span>
          </div>
          <div className="mt-0.5 text-[11px] text-slate-700 truncate">{commit.msg.split(':').slice(1).join(':').trim()}</div>
        </div>
      );
    }

    function Zone({ title, subtitle, children, accent }) {
      const accentMap = {
        slate:  'border-slate-300  bg-slate-50',
        indigo: 'border-indigo-300 bg-indigo-50/40',
        sky:    'border-sky-300    bg-sky-50/40',
        violet: 'border-violet-300 bg-violet-50/40',
      };
      const titleColorMap = {
        slate:  'text-slate-700',
        indigo: 'text-indigo-800',
        sky:    'text-sky-800',
        violet: 'text-violet-800',
      };
      return (
        <div className={`rounded-lg border ${accentMap[accent]} p-2`}>
          <div className="flex items-center justify-between mb-1.5">
            <span className={`text-[11px] font-bold ${titleColorMap[accent]}`}>{title}</span>
            <span className="text-[9px] text-slate-500">{subtitle}</span>
          </div>
          <div className="space-y-1">{children}</div>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">Git 워크플로우 — 4영역 추적</h3>
            <span className="text-[10px] text-slate-500">현재 브랜치: <b className="text-indigo-700">{state.branchInfo.current}</b> @ <span className="font-mono">{state.branchInfo.head}</span></span>
          </div>

          {/* 작업 디렉토리 */}
          <Zone title="① 작업 디렉토리 (working tree)" subtitle="내 PC 의 파일" accent="slate">
            {state.working.length === 0
              ? <div className="text-[10px] text-slate-400 italic px-1">파일 없음</div>
              : state.working.map((f, i) => <FileCard key={i} file={f} />)}
          </Zone>

          {/* 화살표 */}
          <div className="text-center text-[10px] font-bold text-indigo-600 py-1">↓ git add ↓</div>

          {/* 스테이징 */}
          <Zone title="② 스테이징 영역 (staging)" subtitle="다음 커밋 대기" accent="indigo">
            {state.staging.length === 0
              ? <div className="text-[10px] text-slate-400 italic px-1">비어 있음</div>
              : state.staging.map((f, i) => <StagingCard key={i} file={f} />)}
          </Zone>

          {/* 화살표 */}
          <div className="text-center text-[10px] font-bold text-indigo-600 py-1">↓ git commit ↓</div>

          {/* 로컬 저장소 */}
          <Zone title="③ 로컬 저장소 (.git/)" subtitle="내 PC 의 이력" accent="sky">
            {state.localRepo.length === 0
              ? <div className="text-[10px] text-slate-400 italic px-1">커밋 없음</div>
              : state.localRepo.map((c, i) => <CommitCard key={i} commit={c} isRemote={false} />)}
          </Zone>

          {/* 화살표 */}
          <div className="text-center text-[10px] font-bold text-indigo-600 py-1">↓ git push ↓</div>

          {/* 원격 저장소 */}
          <Zone title="④ 원격 저장소 (GitHub)" subtitle="팀의 이력" accent="violet">
            {state.remote.length === 0
              ? <div className="text-[10px] text-slate-400 italic px-1">아직 push 안 함</div>
              : state.remote.map((c, i) => <CommitCard key={i} commit={c} isRemote={true} />)}
          </Zone>

          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">VI</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter VI-3-2. Git 버전 관리 첫걸음</h1>
                <p className="text-sm text-indigo-800/80">init → add/commit → status/log → branch → push. 5단계로 추적</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                init → add/commit → status/log → branch → push 의 5단계가 Git 일상 워크플로우다. 작업 디렉토리 → 스테이징 → 로컬 저장소 → 원격 저장소의 4영역을 머릿속에 그리면 어떤 명령이 어디를 바꾸는지 즉시 보인다. .env 같은 비밀 파일은 절대 push 하지 말고 .gitignore 에 꼭 등록한다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['git init', 'git add', 'git commit', 'git status', 'git log', 'git branch', 'git checkout', 'git push', '.gitignore', 'GitHub'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./chapter-06-07-erd.html" className="underline hover:no-underline">← 이전: VI-3-1 ERD 그리기</a>
              <a href="../index.html" className="underline hover:no-underline">챕터 목록 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
