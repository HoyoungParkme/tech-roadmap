<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — II-1-1. 맨땅에서 짓지 않고 틀을 쓰는 이유</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-1-1. 맨땅에서 짓지 않고 틀을 쓰는 이유
    학습 목표: 웹 프레임워크가 왜 필요한지를 "건물 자재" 비유로 설명할 수 있다.
    패턴: 구조 비교형 — 맨땅 빌드 vs 프레임워크 빌드 단계 비교
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TASKS = [
      { id: 'http',   label: 'HTTP 요청 수신',   icon: '📡' },
      { id: 'url',    label: 'URL 파싱/라우팅',   icon: '🔀' },
      { id: 'valid',  label: '데이터 검증',        icon: '✅' },
      { id: 'logic',  label: '비즈니스 로직',      icon: '⚙️' },
      { id: 'serial', label: '응답 직렬화',        icon: '📦' },
      { id: 'error',  label: '에러 처리',          icon: '🚨' },
    ];

    const STEPS = [
      {
        title: '웹 서버에 필요한 6가지 작업',
        desc: '웹 서버를 만들려면 최소 6가지 작업을 처리해야 한다. HTTP 요청을 받고, URL을 분석하고, 데이터를 검증하고, 비즈니스 로직을 실행하고, 응답을 만들고, 에러를 처리해야 한다.',
        taskStates: { http: 'todo', url: 'todo', valid: 'todo', logic: 'todo', serial: 'todo', error: 'todo' },


      },
      {
        title: '맨땅 — 전부 직접 구현',
        desc: '[맨땅] 프레임워크 없이 만들면? 6가지 전부를 직접 작성해야 한다. 소켓 열기부터 HTTP 헤더 파싱까지 수십~수백 줄의 보일러플레이트 코드가 필요하다.',
        taskStates: { http: 'manual', url: 'manual', valid: 'manual', logic: 'manual', serial: 'manual', error: 'manual' },


      },
      {
        title: '프레임워크 도입 — 틀이 대신해주는 것',
        desc: '[프레임워크] FastAPI 같은 프레임워크를 쓰면? 5가지 반복 작업을 프레임워크가 처리한다. 개발자가 직접 작성할 코드는 "비즈니스 로직" 하나뿐이다.',
        taskStates: { http: 'framework', url: 'framework', valid: 'framework', logic: 'dev', serial: 'framework', error: 'framework' },


      },
      {
        title: '코드량 비교 — 50줄 vs 5줄',
        desc: '"Hello World" 하나를 응답하는 서버를 비교해보자. 생 소켓으로 만들면 50줄 이상, FastAPI로 만들면 5줄이면 된다. 프레임워크가 반복 작업을 숨겨주기 때문이다.',
        taskStates: { http: 'framework', url: 'framework', valid: 'framework', logic: 'dev', serial: 'framework', error: 'framework' },


        showCode: true,
      },
      {
        title: '핵심 — 건물 구조는 프레임워크가, 내용은 개발자가',
        desc: '집을 지을 때 벽돌 하나하나를 직접 굽는 사람은 없다. 미리 만들어진 자재(프레임워크)를 쓰고, 인테리어(비즈니스 로직)에 집중한다. 이것이 프레임워크를 쓰는 이유다.',
        taskStates: { http: 'framework', url: 'framework', valid: 'framework', logic: 'dev', serial: 'framework', error: 'framework' },


        summary: true,
      },
    ];

    const TASK_CLASS = {
      todo:      'bg-slate-100 border-slate-300 text-slate-500',
      manual:    'bg-red-100 border-red-400 text-red-700',
      framework: 'bg-emerald-100 border-emerald-400 text-emerald-700',
      dev:       'bg-blue-100 border-blue-400 text-blue-700',
    };

    const TASK_BADGE = {
      todo:      '미정',
      manual:    '직접 구현',
      framework: '프레임워크',
      dev:       '개발자',
    };

    const RAW_CODE = [
      '# 생 소켓으로 웹 서버 만들기',
      'import socket',
      '',
      'server = socket.socket()',
      'server.bind(("127.0.0.1", 8000))',
      'server.listen(1)',
      '',
      'while True:',
      '    conn, addr = server.accept()',
      '    data = conn.recv(1024).decode()',
      '    # HTTP 헤더 파싱...',
      '    # URL 라우팅...',
      '    # 데이터 검증...',
      '    # 에러 처리...',
      '    response = "HTTP/1.1 200 OK\\r\\n..."',
      '    conn.sendall(response.encode())',
      '    conn.close()',
      '    # ... 약 50줄 이상',
    ];

    const FASTAPI_CODE = [
      '# FastAPI로 웹 서버 만들기',
      'from fastapi import FastAPI',
      '',
      'app = FastAPI()',
      '',
      '@app.get("/")',
      'def hello():',
      '    return {"message": "Hello World"}',
      '    # 끝! 5줄이면 충분',
    ];

    const CODE_TAG_BG = {
      comment:   'bg-slate-700',
      import:    'bg-violet-900',
      code:      'bg-transparent',
      highlight: 'bg-blue-900',
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];

      const handleNext = () => {
        setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1));
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        setCurrentStepIdx(prev => Math.max(prev - 1, 0));
      };

      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false);
      }, [currentStepIdx]);

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">

            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum II-1-1</span>
            </nav>

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 웹 프레임워크 개론 &gt; Chapter 1. 프레임워크란 무엇인가</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-1-1. 맨땅에서 짓지 않고 틀을 쓰는 이유</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                집을 지을 때 벽돌을 직접 굽지 않듯, 웹 서버도 <strong>"프레임워크"라는 미리 만들어진 틀</strong>을 써서 만든다.
                반복 작업은 프레임워크에 맡기고, 핵심 로직에 집중하는 것이 생산적이다.
              </p>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              {/* 왼쪽: 작업 블록 다이어그램 */}
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
                <h2 className="text-sm font-bold text-slate-600">웹 서버 구성 작업</h2>
                <div className="space-y-2">
                  {TASKS.map((task) => {
                    const state = stepData.taskStates[task.id];
                    return (
                      <div key={task.id} className={`p-3 rounded-lg border-2 transition-all duration-300 flex items-center justify-between ${TASK_CLASS[state]}`}>
                        <div className="flex items-center gap-2">
                          <span aria-hidden="true">{task.icon}</span>
                          <span className="font-bold text-sm">{task.label}</span>
                        </div>
                        <span className="text-xs font-medium px-2 py-0.5 rounded-full bg-white bg-opacity-60">{TASK_BADGE[state]}</span>
                      </div>
                    );
                  })}
                </div>

                {/* 범례 */}
                <div className="flex flex-wrap gap-3 text-xs pt-2 border-t border-slate-100">
                  <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-red-200 border border-red-400"></span> 직접 구현</span>
                  <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-emerald-200 border border-emerald-400"></span> 프레임워크 제공</span>
                  <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-blue-200 border border-blue-400"></span> 개발자 작성</span>
                </div>

                {/* 코드량 비교 게이지 (Step 3) */}
                {stepData.showCode && (
                  <div className="space-y-2 pt-2 border-t border-slate-100">
                    <div className="text-xs font-bold text-slate-500">코드량 비교</div>
                    <div className="flex items-center gap-2">
                      <span className="text-xs w-16 text-right text-red-600 font-bold">생 소켓</span>
                      <div className="flex-1 bg-slate-100 rounded-full h-5 overflow-hidden">
                        <div className="bg-red-400 h-full rounded-full transition-all duration-700" style={{ width: '100%' }}></div>
                      </div>
                      <span className="text-xs w-10 text-red-600 font-bold">~50줄</span>
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="text-xs w-16 text-right text-emerald-600 font-bold">FastAPI</span>
                      <div className="flex-1 bg-slate-100 rounded-full h-5 overflow-hidden">
                        <div className="bg-emerald-400 h-full rounded-full transition-all duration-700" style={{ width: '10%' }}></div>
                      </div>
                      <span className="text-xs w-10 text-emerald-600 font-bold">5줄</span>
                    </div>
                  </div>
                )}

                {/* 요약 (Step 4) */}
                {stepData.summary && (
                  <div className="p-3 rounded-lg bg-indigo-50 border border-indigo-200 text-indigo-800 text-sm">
                    <div className="font-bold mb-1">핵심 정리</div>
                    프레임워크 = 미리 만들어진 건물 구조(틀). 개발자 = 인테리어(비즈니스 로직). 반복 작업을 없애고 핵심에 집중한다.
                  </div>
                )}
              </div>

              {/* 오른쪽: 코드 뷰어 */}
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between items-center">
                  <span>{stepData.showCode ? '코드 비교' : '프레임워크의 역할'}</span>
                  <span className="text-slate-500">Step {currentStepIdx + 1} / {STEPS.length}</span>
                </div>
                <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
                  {stepData.showCode ? (
                    <div className="p-4 space-y-4">
                      <div>
                        <div className="text-red-400 font-bold mb-2">{'// ❌ 생 소켓 (~50줄)'}</div>
                        {RAW_CODE.map((line, i) => (
                          <div key={i} className="text-slate-300 px-2 py-0.5">{line || '\u00A0'}</div>
                        ))}
                      </div>
                      <hr className="border-slate-600" />
                      <div>
                        <div className="text-emerald-400 font-bold mb-2">{'// ✅ FastAPI (5줄)'}</div>
                        {FASTAPI_CODE.map((line, i) => (
                          <div key={i} className="text-slate-300 px-2 py-0.5">{line || '\u00A0'}</div>
                        ))}
                      </div>
                    </div>
                  ) : (
                    <div className="p-4 space-y-3">
                      <div className="text-slate-400 mb-3">{'// 프레임워크가 대신하는 작업들'}</div>
                      {TASKS.map((task) => {
                        const state = stepData.taskStates[task.id];
                        const color = state === 'framework' ? 'text-emerald-400' : state === 'dev' ? 'text-blue-400' : state === 'manual' ? 'text-red-400' : 'text-slate-500';
                        const mark = state === 'framework' ? '✅ 프레임워크' : state === 'dev' ? '👨‍💻 개발자' : state === 'manual' ? '❌ 직접 구현' : '⬜ 미정';
                        return (
                          <div key={task.id} className={`${color} px-2 py-1`}>
                            <span>{mark}</span><span className="text-slate-500"> — </span><span>{task.label}</span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </div>
            </div>

            {/* 설명 + 컨트롤 */}
            <div className="p-4 rounded-xl bg-indigo-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 컨트롤 바 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                처음
              </button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                &larr; 이전
              </button>
              <button onClick={togglePlay}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-indigo-600 text-white hover:bg-indigo-700 transition min-w-[80px]">
                {isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}
              </button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../part1/I-2-4.html" className="text-slate-500 hover:text-slate-700">&larr; I-2-4 헤더와 바디</a>
              <a href="./II-1-2.html" className="text-blue-600 hover:text-blue-800 font-medium">II-1-2 라이브러리 vs 프레임워크 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
