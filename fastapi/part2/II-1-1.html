            '| OpenAPI 스펙 | 수동 작성 / 누락 | 자동 생성 |',
            '',
            '## 2. 커뮤니티 자산',
            '',
            '- **GitHub 스타 76k+** → 이슈/PR 활발, 버그가 빨리 잡힌다',
            '- **공식 문서 한국어 포함 다국어** → 검색 한 번이면 해결',
            '- **Stack Overflow 수만 건** → 막힐 때 답이 이미 있다',
            '- **확장 패키지** (fastapi-users, fastapi-cache, ...) → 인증/캐시도 검증된 것 가져다 씀',
            '',
            '## 3. 채용 / 협업 측면',
            '',
            '- 새 동료가 입사 첫날 코드를 읽을 수 있다 ("FastAPI 안다")',
            '- 자체 프레임워크 → 매번 신규 입사자 교육 필요',
            '- 면접에서 "스프링/FastAPI 경험 있나요" 가 표준 질문',
            '- 직접 짠 프레임워크 = 회사 떠나면 아무도 못 건든다',
            '',
            '## 4. 핵심 정리',
            '',
            '> 프레임워크를 쓴다 ≠ 단지 코드 줄 수 절약',
            '> 프레임워크를 쓴다 = "수만 명이 검증한 베스트 프랙티스를 임포트한다"',
            '',
            '### 다음 챕터에서',
            '',
            '- II-1-2: 라이브러리 vs 프레임워크의 결정적 차이 (제어의 역전, IoC)',
            '- II-1-3: WSGI vs ASGI — 동기와 비동기의 표준',
            '- II-1-4: Django / Flask / FastAPI 한눈에 비교',
            '',
            '학습 끝.',
          ],
          highlight: [9, 10, 11, 12, 13, 14, 18, 19, 20, 21, 25, 26, 27, 28, 32, 33],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤 + 막대 차트
    // ─────────────────────────────────────────────────────
    const MAX_LINES = 100; // 막대 차트 최대 줄 수 (정규화 기준)

    function CodeBar({ bar }) {
      const widthPct = Math.min(100, Math.round((bar.lines / MAX_LINES) * 100));
      return (
        <div className="space-y-1">
          <div className="flex items-center justify-between text-xs">
            <span className="font-bold text-slate-700">{bar.label}</span>
            <span className="text-slate-500">{bar.note}</span>
          </div>
          <div className="flex items-center gap-2">
            <div className="flex-1 bg-slate-100 rounded-full h-6 overflow-hidden border border-slate-200">
              <div
                className={`${bar.color} h-full rounded-full transition-all duration-700 flex items-center justify-end pr-2`}
                style={{ width: `${widthPct}%` }}
              >
                {bar.lines > 10 && (
                  <span className="text-[10px] font-bold text-white">{bar.lines}줄</span>
                )}
              </div>
            </div>
            {bar.lines <= 10 && (
              <span className="text-xs font-bold text-emerald-700 w-10 text-right">{bar.lines}줄</span>
            )}
          </div>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">코드 줄 수 비교</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 도메인 상태</span>
          </div>
          <div className="space-y-4 flex-1">
            {state.bars.map((b, i) => (
              <CodeBar key={i} bar={b} />
            ))}
          </div>
          <div className="mt-4 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5 max-h-[28rem]">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-slate-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">II</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">II-1-1. 맨땅에서 짓지 않고 틀을 쓰는 이유</h1>
                <p className="text-sm text-indigo-800/80">생 소켓 100줄 → socketserver 30줄 → FastAPI 5줄. 같은 일을 다르게 짓는다</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 허브로</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                프레임워크 = 미리 만들어진 건물 구조(틀) + 검증된 패턴 + 커뮤니티. 개발자는 비즈니스 로직(인테리어)에만 집중하면 된다. 다음 챕터(II-1-2)에서는 "라이브러리와 프레임워크의 결정적 차이(제어의 역전)"를 살펴본다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['프레임워크', 'FastAPI', '생소켓', 'socketserver', '보일러플레이트', '공통부분', '검증된패턴', '커뮤니티'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="../part1/I-2-4.html" className="underline hover:no-underline">← I-2-4 헤더와 바디</a>
              <a href="./II-1-2.html" className="underline hover:no-underline">다음: II-1-2 라이브러리 vs 프레임워크 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
