<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — II-4-1. 동기 vs 비동기 (햄버거 가게)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-4-1. 블로킹과 논블로킹 — 햄버거 가게 비유
    학습 목표: 동기(블로킹)와 비동기(논블로킹)의 차이를 일상 비유로 설명할 수 있다.
    패턴: 좌우 타임라인 비교 — 동기 vs 비동기 시뮬레이션
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CUSTOMERS = ['손님 A', '손님 B', '손님 C'];

    const STEPS = [
      {
        title: '햄버거 가게에 손님 3명이 온다',
        desc: '카운터 직원 1명, 손님 3명. 각 햄버거는 만드는 데 3분이 걸린다. 직원이 주문을 처리하는 방식에 따라 총 대기 시간이 달라진다.',
        sync: [
          { customer: 0, action: '대기', state: 'waiting' },
          { customer: 1, action: '대기', state: 'waiting' },
          { customer: 2, action: '대기', state: 'waiting' },
        ],
        async: [
          { customer: 0, action: '대기', state: 'waiting' },
          { customer: 1, action: '대기', state: 'waiting' },
          { customer: 2, action: '대기', state: 'waiting' },
        ],
        syncTime: '0분',
        asyncTime: '0분',
      },
      {
        title: '동기 — 한 명씩 순서대로',
        desc: '[동기/블로킹] 직원이 A의 햄버거가 완성될 때까지 서서 기다린다. 그동안 B, C는 줄 서서 대기. A에게 건네준 후에야 B를 받는다.',
        sync: [
          { customer: 0, action: '주문+대기+수령', state: 'active' },
          { customer: 1, action: '줄 서서 대기', state: 'blocked' },
          { customer: 2, action: '줄 서서 대기', state: 'blocked' },
        ],
        async: [
          { customer: 0, action: '주문 → 번호표', state: 'ordered' },
          { customer: 1, action: '대기', state: 'waiting' },
          { customer: 2, action: '대기', state: 'waiting' },
        ],
        syncTime: '3분 (A만 완료)',
        asyncTime: '0분',
      },
      {
        title: '비동기 — 번호표 시스템',
        desc: '[비동기/논블로킹] 직원이 A 주문을 받고 번호표를 준 뒤, 바로 B, C 주문도 받는다. 햄버거가 준비되면 번호를 호출한다. 직원은 대기 시간 없이 계속 일한다.',
        sync: [
          { customer: 0, action: '완료', state: 'done' },
          { customer: 1, action: '주문+대기+수령', state: 'active' },
          { customer: 2, action: '줄 서서 대기', state: 'blocked' },
        ],
        async: [
          { customer: 0, action: '조리 중...', state: 'cooking' },
          { customer: 1, action: '주문 → 번호표', state: 'ordered' },
          { customer: 2, action: '주문 → 번호표', state: 'ordered' },
        ],
        syncTime: '6분 (A+B 완료)',
        asyncTime: '1분 (3명 접수 완료)',
      },
      {
        title: '결과 비교 — 처리량이 다르다',
        desc: '동기: 3명 처리에 9분 (3분 × 3). 비동기: 3명 처리에 3분 (동시 조리). 대기 시간(I/O)이 긴 작업일수록 비동기가 유리하다. 웹 서버의 DB 조회, 외부 API 호출이 이 "대기 시간"에 해당한다.',
        sync: [
          { customer: 0, action: '완료', state: 'done' },
          { customer: 1, action: '완료', state: 'done' },
          { customer: 2, action: '완료', state: 'done' },
        ],
        async: [
          { customer: 0, action: '완료', state: 'done' },
          { customer: 1, action: '완료', state: 'done' },
          { customer: 2, action: '완료', state: 'done' },
        ],
        syncTime: '총 9분',
        asyncTime: '총 3분',
        showCompare: true,
      },
    ];

    const STATE_CLASS = {
      waiting: 'bg-slate-100 border-slate-300 text-slate-500',
      blocked: 'bg-red-50 border-red-300 text-red-600',
      active:  'bg-amber-100 border-amber-400 text-amber-700 animate-pulse',
      ordered: 'bg-blue-100 border-blue-400 text-blue-700',
      cooking: 'bg-amber-100 border-amber-400 text-amber-700 animate-pulse',
      done:    'bg-emerald-100 border-emerald-400 text-emerald-700',
    };

    const STATE_ICON = {
      waiting: '⬜',
      blocked: '🚫',
      active:  '⏳',
      ordered: '🎫',
      cooking: '🍔',
      done:    '✅',
    };

    function TimelinePanel({ title, color, items, time }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4">
          <div className="flex items-center justify-between mb-3">
            <h2 className={`text-sm font-bold ${color}`}>{title}</h2>
            <span className={`text-xs font-mono font-bold ${color}`}>{time}</span>
          </div>
          <div className="space-y-2">
            {items.map((item, i) => (
              <div key={i} className={`p-3 rounded-lg border-2 transition-all duration-500 ${STATE_CLASS[item.state]}`}>
                <div className="flex items-center justify-between">
                  <span className="font-bold text-sm">{STATE_ICON[item.state]} {CUSTOMERS[item.customer]}</span>
                  <span className="text-xs">{item.action}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];

      const handleNext = () => {
        setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1));
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        setCurrentStepIdx(prev => Math.max(prev - 1, 0));
      };

      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false);
      }, [currentStepIdx]);

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">

            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum II-4-1</span>
            </nav>

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 웹 프레임워크 개론 &gt; Chapter 4. 동기 vs 비동기</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-4-1. 블로킹과 논블로킹 — 햄버거 가게</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                <strong>동기(블로킹)</strong>: 한 손님 끝날 때까지 기다린다. <strong>비동기(논블로킹)</strong>: 번호표를 주고 다음 손님을 받는다.
                대기 시간이 긴 작업(DB, 외부 API)일수록 비동기가 유리하다.
              </p>
            </header>

            {/* 좌우 타임라인 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <TimelinePanel
                title="동기 (Synchronous)"
                color="text-red-600"
                items={stepData.sync}
                time={stepData.syncTime}
              />
              <TimelinePanel
                title="비동기 (Asynchronous)"
                color="text-emerald-600"
                items={stepData.async}
                time={stepData.asyncTime}
              />
            </div>

            {/* 비교 게이지 (마지막 단계) */}
            {stepData.showCompare && (
              <div className="bg-white rounded-xl border border-slate-200 p-4 space-y-3">
                <div className="text-sm font-bold text-slate-600">총 처리 시간 비교</div>
                <div className="flex items-center gap-2">
                  <span className="text-xs w-14 text-right text-red-600 font-bold">동기</span>
                  <div className="flex-1 bg-slate-100 rounded-full h-6 overflow-hidden">
                    <div className="bg-red-400 h-full rounded-full flex items-center justify-end pr-2 text-white text-xs font-bold" style={{ width: '100%' }}>9분</div>
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  <span className="text-xs w-14 text-right text-emerald-600 font-bold">비동기</span>
                  <div className="flex-1 bg-slate-100 rounded-full h-6 overflow-hidden">
                    <div className="bg-emerald-400 h-full rounded-full flex items-center justify-end pr-2 text-white text-xs font-bold" style={{ width: '33%' }}>3분</div>
                  </div>
                </div>
                <p className="text-xs text-slate-500">웹 서버에서 "대기 시간" = DB 조회, 외부 API 호출, 파일 읽기 등 I/O 작업</p>
              </div>
            )}

            <div className="p-4 rounded-xl bg-indigo-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-indigo-600 text-white hover:bg-indigo-700 transition min-w-[80px]">
                {isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-3.html" className="text-slate-500 hover:text-slate-700">&larr; II-3 프레임워크 지도</a>
              <a href="./II-4-2.html" className="text-blue-600 hover:text-blue-800 font-medium">II-4-2 WSGI vs ASGI &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
