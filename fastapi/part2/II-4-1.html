          { name: '이미지 변환',   state: 'blocked', badge: '❌ async 부적합 — CPU 바운드' },
          { name: 'ML 추론',      state: 'blocked', badge: '❌ async 부적합 — CPU 바운드' },
        ],
        bullets: {
          title: '✅ 한 줄 의사결정 가이드',
          items: [
            'I/O 바운드(대기 위주) → async + FastAPI 의 def vs async def 에서 후자',
            'CPU 바운드(계산 위주) → 동기 함수 + run_in_executor 로 별도 프로세스',
            '확신이 안 서면 일단 def 로 시작 → 병목 측정 후 전환',
          ],
        },
        keyPoint: '핵심: 시간이 어디서 새는지(I/O인지 CPU인지)를 먼저 측정하고 그에 맞는 도구를 골라라.',
        code: {
          lang: 'markdown',
          filename: 'when_async.md',
          lines: [
            '# Step 5. 언제 async를 써야 할까',
            '',
            '## 한 줄 결론',
            '- 기다리는 시간이 긴 작업 → async (I/O 바운드)',
            '- 계산이 오래 걸리는 작업 → 동기 / 멀티프로세스 (CPU 바운드)',
            '',
            '## I/O 바운드 — async 가 빛나는 영역',
            '| 작업 | 대기 시간 비율 | 예시 라이브러리 |',
            '|:--|:--|:--|',
            '| DB 쿼리 | 90%+ 대기 | asyncpg, SQLAlchemy async |',
            '| 외부 API 호출 | 95%+ 대기 | httpx, aiohttp |',
            '| 파일 읽기 | 80%+ 대기 | aiofiles |',
            '| 메시지 큐 | 99% 대기 | aio-pika, aiokafka |',
            '',
            '## CPU 바운드 — async 가 안 통하는 영역',
            '| 작업 | CPU 사용률 | 적절한 방법 |',
            '|:--|:--|:--|',
            '| 이미지 리사이즈 | 100% | ProcessPoolExecutor |',
            '| ML 추론 | 100% | 별도 워커 프로세스 |',
            '| 큰 수학 연산 | 100% | numpy + ProcessPool |',
            '| 압축/암호화 | 100% | 동기 + 워커 큐 |',
            '',
            '## FastAPI 의사결정 흐름',
            '',
            '```',
            '요청 들어옴',
            '   ↓',
            ' 무엇을 하는가?',
            '   ↓                    ↓',
            ' I/O 작업              CPU 작업',
            '   ↓                    ↓',
            ' async def           def + run_in_executor',
            '   ↓                    ↓',
            ' await로 호출         별도 프로세스에 위임',
            '```',
            '',
            '## 실무 팁',
            '- FastAPI 라우터는 def 로 만들어도 알아서 스레드풀에서 실행해 준다',
            '- 그래서 동기 라이브러리를 써도 일단은 동작한다 (단, 처리량이 떨어짐)',
            '- 진짜 비동기 이점을 보려면 async def + 비동기 라이브러리 조합이 필요',
            '- 측정 도구: locust, wrk, ab — RPS 가 실제로 오르는지 확인',
          ],
          highlight: [3, 4, 5, 7, 8, 9, 10, 11, 12, 13, 15, 16, 17, 18, 19, 20, 21, 37, 38, 39, 40, 41],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤 (햄버거 가게 시뮬레이션)
    // ─────────────────────────────────────────────────────
    const STATE_STYLE = {
      blocked: { bg: 'bg-rose-50',     border: 'border-rose-300',    text: 'text-rose-700',    badge: 'bg-rose-200 text-rose-800',    icon: '🚫' },
      cooking: { bg: 'bg-amber-50',    border: 'border-amber-300',   text: 'text-amber-700',   badge: 'bg-amber-200 text-amber-800',  icon: '🍔' },
      ordered: { bg: 'bg-indigo-50',   border: 'border-indigo-300',  text: 'text-indigo-700',  badge: 'bg-indigo-200 text-indigo-800', icon: '🎫' },
      ready:   { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-700', badge: 'bg-emerald-200 text-emerald-800', icon: '✅' },
      waiting: { bg: 'bg-slate-100',   border: 'border-slate-300',   text: 'text-slate-600',   badge: 'bg-slate-200 text-slate-700',  icon: '⏳' },
      busy:    { bg: 'bg-indigo-100',  border: 'border-indigo-400',  text: 'text-indigo-800',  badge: 'bg-indigo-300 text-indigo-900', icon: '💼' },
    };

    function ClerkBox({ clerk }) {
      const s = STATE_STYLE[clerk.state] || STATE_STYLE.busy;
      return (
        <div className={`rounded-xl border-2 ${s.bg} ${s.border} px-3 py-2.5 mb-3`}>
          <div className="flex items-center gap-2">
            <span className="text-2xl">{s.icon}</span>
            <div className="flex-1">
              <div className={`text-xs font-bold ${s.text}`}>{clerk.label}</div>
              <div className={`text-[11px] ${s.text}/80`}>{clerk.note}</div>
            </div>
          </div>
        </div>
      );
    }

    function QueueCard({ item }) {
      const s = STATE_STYLE[item.state] || STATE_STYLE.waiting;
      return (
        <div className={`rounded-lg border ${s.bg} ${s.border} px-3 py-2 flex items-center justify-between`}>
          <div className="flex items-center gap-2">
            <span className="text-base">{s.icon}</span>
            <span className={`text-sm font-bold ${s.text}`}>{item.name}</span>
          </div>
          <span className={`text-[10px] px-2 py-0.5 rounded ${s.badge}`}>{item.badge}</span>
        </div>
      );
    }

    function BoardBox({ board }) {
      if (!board) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-indigo-400 bg-indigo-50 p-3">
          <div className="text-xs font-bold text-indigo-800 mb-2">{board.title}</div>
          <ul className="space-y-1">
            {board.items.map((b, i) => (
              <li key={i} className="text-sm text-indigo-900 flex gap-2">
                <span className="text-indigo-500">▸</span>
                <span>{b}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LoopBox({ box }) {
      if (!box) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-indigo-500 bg-gradient-to-br from-indigo-50 to-violet-50 p-4">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl">🔁</span>
            <span className="text-lg font-bold text-indigo-800">{box.title}</span>
          </div>
          <ul className="space-y-1.5">
            {box.rows.map((r, i) => (
              <li key={i} className="text-sm text-indigo-900 flex gap-2">
                <span className="text-indigo-500 mt-0.5">→</span>
                <span>{r}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function BulletsBox({ bullets }) {
      if (!bullets) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-indigo-400 bg-indigo-50 p-3">
          <div className="text-xs font-bold text-indigo-800 mb-2">{bullets.title}</div>
          <ul className="space-y-1">
            {bullets.items.map((b, i) => (
              <li key={i} className="text-sm text-indigo-900 flex gap-2">
                <span className="text-indigo-500">★</span>
                <span>{b}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">🍔 햄버거 가게 시뮬레이션</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 가게 상태</span>
          </div>
          <ClerkBox clerk={state.clerk} />
          <div className="text-[11px] font-bold text-indigo-600 mb-1.5">손님 / 코루틴 큐</div>
          <div className="space-y-1.5">
            {state.queue.map((it, i) => (
              <QueueCard key={i} item={it} />
            ))}
          </div>
          <BoardBox board={state.board} />
          <LoopBox box={state.loopBox} />
          <BulletsBox bullets={state.bullets} />
          <div className="mt-auto pt-3">
            <div className="text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
              💡 {state.keyPoint}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          {/* 5탭 인디케이터 */}
          <div className="flex items-center gap-0 px-2 pt-1.5 bg-slate-800 border-b border-slate-700 text-[10px] font-mono">
            {STEPS.map((s, i) => (
              <span
                key={i}
                className={`px-2 py-1 rounded-t border-t border-x ${
                  i === stepIdx
                    ? 'bg-[#282c34] border-indigo-500 text-indigo-300'
                    : 'bg-slate-700 border-transparent text-slate-400'
                }`}
              >
                {s.code.filename}
              </span>
            ))}
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">II</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">II-4-1. 동기 vs 비동기 — 햄버거 가게</h1>
                <p className="text-sm text-indigo-800/80">동기 → 비동기 → Event Loop → async/await → 적합 시나리오. 5단계로 추적</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 허브로</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                동기는 한 손님씩, 비동기는 동시에. 뒤에서는 Event Loop가 코루틴을 번갈아 깨워준다. async/await 두 키워드로 표현하고, I/O 바운드 작업에 쓴다. 다음 챕터(II-4-2)에서는 이 비동기를 웹 서버 차원에서 구현한 WSGI vs ASGI 차이를 본다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['동기', '비동기', '블로킹', '논블로킹', 'EventLoop', 'async', 'await', 'asyncio', 'I/O바운드', 'CPU바운드'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./II-3.html" className="underline hover:no-underline">← II-3 프레임워크 지도</a>
              <a href="./II-4-2.html" className="underline hover:no-underline">다음: II-4-2 WSGI vs ASGI →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
