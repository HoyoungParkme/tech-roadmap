<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — II-3. 주요 웹 프레임워크 지도</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-3. 주요 웹 프레임워크 지도 (II-3-1 + II-3-2 + II-3-3 통합)
    학습 목표: Python/Node.js/다언어 주요 프레임워크 특징과 적합한 상황을 설명할 수 있다.
    패턴: 포지셔닝 맵 — 언어별 프레임워크 카드 + 특성 비교
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const FRAMEWORKS = [
      { id: 'django',     name: 'Django',      lang: 'Python',  type: '풀스택',   weight: 'heavy',  desc: '"배터리 포함" — ORM, 관리자 페이지, 인증 기본 내장. DB 중심 앱에 강하다.' },
      { id: 'flask',      name: 'Flask',       lang: 'Python',  type: '마이크로', weight: 'light',  desc: '뼈대만 제공. 필요한 부품을 직접 골라 붙인다. 작은 API, 프로토타입에 적합.' },
      { id: 'fastapi',    name: 'FastAPI',     lang: 'Python',  type: '마이크로', weight: 'light',  desc: '타입 힌트 + 자동 문서 + 비동기. 현대적 API 서버의 표준.' },
      { id: 'express',    name: 'Express',     lang: 'Node.js', type: '마이크로', weight: 'light',  desc: 'Node.js 최다 사용. 미니멀하고 자유로운 구조. 대형 프로젝트에선 난잡해질 수 있다.' },
      { id: 'nestjs',     name: 'NestJS',      lang: 'Node.js', type: '엔터프라이즈', weight: 'heavy', desc: 'TypeScript + 의존성 주입. Spring Boot 스타일의 구조화된 Node.js 프레임워크.' },
      { id: 'rails',      name: 'Rails',       lang: 'Ruby',    type: '풀스택',   weight: 'heavy',  desc: '"설정보다 관례" — 스타트업 MVP를 빠르게 만들 때 강하다.' },
      { id: 'springboot', name: 'Spring Boot', lang: 'Java',    type: '엔터프라이즈', weight: 'heavy', desc: '금융, 공공기관, 대기업의 표준. 타입 안전성과 생태계가 압도적.' },
      { id: 'laravel',    name: 'Laravel',     lang: 'PHP',     type: '풀스택',   weight: 'medium', desc: 'PHP 현대화의 선두. 중소 웹서비스, 콘텐츠 관리에 자주 사용.' },
      { id: 'gin',        name: 'Gin',         lang: 'Go',      type: '마이크로', weight: 'light',  desc: '극한의 속도와 낮은 메모리. 고성능 인프라 도구와 API에 적합.' },
    ];

    const STEPS = [
      {
        title: 'Python 프레임워크 — Django / Flask / FastAPI',
        desc: 'Python에는 3대 웹 프레임워크가 있다. Django(풀스택, 배터리 포함), Flask(마이크로, 자유로운 구조), FastAPI(마이크로, 타입+비동기+자동문서). 프로젝트 규모와 필요한 기능에 따라 선택한다.',
        highlight: ['django', 'flask', 'fastapi'],
        filterLang: 'Python',
      },
      {
        title: 'Node.js 프레임워크 — Express / NestJS',
        desc: 'JavaScript/TypeScript로 백엔드도 만들 수 있다. Express(미니멀, 최다 사용), NestJS(구조화, TypeScript 중심). 프론트엔드와 같은 언어로 풀스택 개발할 때 선택한다.',
        highlight: ['express', 'nestjs'],
        filterLang: 'Node.js',
      },
      {
        title: '다른 언어 — Rails / Spring Boot / Laravel / Gin',
        desc: 'Ruby의 Rails(빠른 MVP), Java의 Spring Boot(엔터프라이즈), PHP의 Laravel(현대적 PHP), Go의 Gin(극한 성능). 언어와 팀 경험, 프로젝트 규모에 맞는 선택이 중요하다.',
        highlight: ['rails', 'springboot', 'laravel', 'gin'],
        filterLang: 'other',
      },
      {
        title: '전체 지도 — 무게와 유형으로 분류',
        desc: '가로축: 마이크로(가볍고 자유) ↔ 풀스택/엔터프라이즈(무겁고 구조적). 같은 언어라도 선택지가 다르다. FastAPI는 Python 마이크로 진영에서 가장 현대적인 선택이다.',
        highlight: FRAMEWORKS.map(f => f.id),
        filterLang: 'all',
      },
    ];

    const LANG_COLOR = {
      Python:   { bg: 'bg-blue-100',    border: 'border-blue-400',    text: 'text-blue-800',    badge: 'bg-blue-500' },
      'Node.js':{ bg: 'bg-emerald-100', border: 'border-emerald-400', text: 'text-emerald-800', badge: 'bg-emerald-500' },
      Ruby:     { bg: 'bg-red-100',     border: 'border-red-400',     text: 'text-red-800',     badge: 'bg-red-500' },
      Java:     { bg: 'bg-amber-100',   border: 'border-amber-400',   text: 'text-amber-800',   badge: 'bg-amber-500' },
      PHP:      { bg: 'bg-violet-100',  border: 'border-violet-400',  text: 'text-violet-800',  badge: 'bg-violet-500' },
      Go:       { bg: 'bg-cyan-100',    border: 'border-cyan-400',    text: 'text-cyan-800',    badge: 'bg-cyan-500' },
    };

    const TYPE_ICON = {
      '마이크로': '🪶',
      '풀스택': '📦',
      '엔터프라이즈': '🏢',
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];

      const handleNext = () => {
        setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1));
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        setCurrentStepIdx(prev => Math.max(prev - 1, 0));
      };

      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false);
      }, [currentStepIdx]);

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 5000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const visibleFrameworks = stepData.filterLang === 'all'
        ? FRAMEWORKS
        : stepData.filterLang === 'other'
          ? FRAMEWORKS.filter(f => !['Python', 'Node.js'].includes(f.lang))
          : FRAMEWORKS.filter(f => f.lang === stepData.filterLang);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">

            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum II-3</span>
            </nav>

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 웹 프레임워크 개론 &gt; Chapter 3. 주요 웹 프레임워크 지도</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-3. 주요 웹 프레임워크 지도</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                웹 프레임워크는 <strong>Python에만 있지 않다</strong>. 언어별 대표 프레임워크 9개를
                <b> 마이크로 ↔ 풀스택/엔터프라이즈</b> 축으로 분류해본다.
              </p>
            </header>

            {/* 프레임워크 카드 그리드 */}
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                {visibleFrameworks.map((fw) => {
                  const colors = LANG_COLOR[fw.lang];
                  const isHighlighted = stepData.highlight.includes(fw.id);
                  const isFastAPI = fw.id === 'fastapi';
                  return (
                    <div key={fw.id}
                      className={`p-3 rounded-lg border-2 transition-all duration-300 ${
                        isHighlighted
                          ? `${colors.bg} ${colors.border} ${colors.text} ${isFastAPI ? 'ring-2 ring-blue-400 shadow-md' : ''}`
                          : 'bg-slate-50 border-slate-200 text-slate-400'
                      }`}
                    >
                      <div className="flex items-center justify-between mb-1">
                        <span className="font-bold text-sm">{fw.name}</span>
                        <span className={`text-[10px] px-1.5 py-0.5 rounded-full text-white ${isHighlighted ? colors.badge : 'bg-slate-300'}`}>{fw.lang}</span>
                      </div>
                      <div className="flex items-center gap-1 text-xs mb-2">
                        <span aria-hidden="true">{TYPE_ICON[fw.type]}</span>
                        <span>{fw.type}</span>
                      </div>
                      {isHighlighted && (
                        <p className="text-xs leading-relaxed opacity-80">{fw.desc}</p>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* 범례 */}
              <div className="flex flex-wrap gap-4 text-xs pt-3 mt-3 border-t border-slate-100">
                <span className="flex items-center gap-1">🪶 마이크로 — 가볍고 자유</span>
                <span className="flex items-center gap-1">📦 풀스택 — 기능 내장</span>
                <span className="flex items-center gap-1">🏢 엔터프라이즈 — 대규모 구조</span>
              </div>
            </div>

            {/* 설명 + 컨트롤 */}
            <div className="p-4 rounded-xl bg-indigo-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 컨트롤 바 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                처음
              </button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                &larr; 이전
              </button>
              <button onClick={togglePlay}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-indigo-600 text-white hover:bg-indigo-700 transition min-w-[80px]">
                {isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}
              </button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                다음 &rarr;
              </button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-2-1.html" className="text-slate-500 hover:text-slate-700">&larr; II-2-1 생 소켓 vs 프레임워크</a>
              <a href="./II-4-1.html" className="text-blue-600 hover:text-blue-800 font-medium">II-4-1 동기 vs 비동기 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
