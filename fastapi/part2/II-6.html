        title: 'Step 5. 마이크로 단일 페이지 → Flask',
        desc: '엔드포인트가 2~3개뿐인 사내 도구, Slack 슬래시 커맨드 처리기, 간단한 웹훅 리시버 같은 "정말 작은 서비스"라면 Flask가 가장 가볍다. import 한 줄, app = Flask(__name__) 한 줄로 시작한다. FastAPI도 작긴 하지만 Pydantic·typing 등의 의존성과 async 학습 비용이 따라온다. Flask는 1년차 주니어가 30분 안에 다 읽을 수 있는 마이크로 프레임워크다. 단, 검증과 문서를 직접 짜야 하므로 엔드포인트가 5개를 넘기 시작하면 FastAPI로 갈아타는 게 낫다.',
        focusId: 'micro',
        verdict: 'flask',
        keyPoint: '엔드포인트 ≤ 3개 + 학습 비용 최소화 = Flask가 가장 단순.',
        code: {
          lang: 'python',
          filename: 'micro.md',
          lines: [
            '# Step 5. 마이크로 단일 페이지 서비스 — Flask',
            '# 시나리오: 사내 Slack 슬래시 커맨드 (/날씨 서울)',
            '#           엔드포인트 1~2개, 의존성 최소, 누가 봐도 30초 이해',
            '',
            '# ── Flask: 정말로 한 파일 한 화면 ──',
            'from flask import Flask, request, jsonify',
            'import requests',
            '',
            'app = Flask(__name__)',
            '',
            '@app.post("/slack/weather")',
            'def slack_weather():',
            '    city = request.form.get("text", "서울")',
            '    r = requests.get(f"http://wttr.in/{city}?format=3", timeout=3)',
            '    return jsonify({',
            '        "response_type": "in_channel",',
            '        "text": r.text,',
            '    })',
            '',
            '# 실행: flask --app main run',
            '# 코드량: 약 12줄, 의존성: flask + requests',
            '# 새 팀원이 30초 안에 다 읽음',
            '',
            '# ── FastAPI 로 같은 일을 한다면? ──',
            '# from fastapi import FastAPI, Form',
            '# app = FastAPI()',
            '# @app.post("/slack/weather")',
            '# def slack_weather(text: str = Form("서울")):',
            '#     ...',
            '# 가능하지만 Pydantic/typing 등 학습 부담이 새 팀원에게 추가됨',
            '',
            '# ── 그러면 언제 Flask 를 떠나야 하나? ──',
            '# 1) 엔드포인트가 5개를 넘기 시작했다',
            '# 2) 외부에 API 문서를 공유해야 한다',
            '# 3) 입력 검증 로직이 코드의 절반을 차지한다',
            '# 4) 동시 요청이 많아져 async 가 필요하다',
            '# 5) 팀에 타입 힌트 사용자가 늘었다',
            '#  → 이 시점에서 FastAPI 로 마이그레이션 검토',
            '',
            '# ── 세 프레임워크 한 줄 요약 ──',
            '# Flask    : "조립식. 가장 가볍다. 작은 서비스에 최강."',
            '# FastAPI  : "조립식 + 타입 + 비동기. 현대적 API 의 디폴트."',
            '# Django   : "완성품. 풀스택 사이트 통째로 가능."',
            '',
            '# ── 의사결정 체크리스트 (요약) ──',
            '# 풀스택 사이트(admin 필요) ───→ Django',
            '# API 서버 + 비동기 + 타입 ───→ FastAPI',
            '# 엔드포인트 2~3개짜리 도구 ──→ Flask',
            '',
            '# 단, "이미 팀이 쓰고 있는 프레임워크" 가',
            '# 위 추천을 이기는 경우가 많다. 학습/운영 비용도 기준에 포함하자.',
          ],
          highlight: [5, 6, 7, 9, 11, 12, 13, 14, 15, 16, 17, 18, 20, 21, 22, 33, 34, 35, 36, 37, 38, 44, 45, 46],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 프레임워크별 스타일
    // ─────────────────────────────────────────────────────
    const FW_STYLE = {
      FastAPI: { bg: 'bg-indigo-50',   border: 'border-indigo-400', text: 'text-indigo-800', badge: 'bg-indigo-600 text-white', accent: 'text-indigo-600' },
      Django:  { bg: 'bg-emerald-50',  border: 'border-emerald-400', text: 'text-emerald-800', badge: 'bg-emerald-600 text-white', accent: 'text-emerald-600' },
      Flask:   { bg: 'bg-amber-50',    border: 'border-amber-400', text: 'text-amber-800', badge: 'bg-amber-600 text-white', accent: 'text-amber-600' },
    };

    function ScenarioCard({ scenario, focused }) {
      const s = FW_STYLE[scenario.framework];
      if (!focused) {
        return (
          <div className="rounded-lg border bg-slate-50 border-slate-200 px-3 py-2 opacity-60">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-2">
                <span className="text-base">{scenario.icon}</span>
                <span className="text-sm font-bold text-slate-600">{scenario.label}</span>
              </div>
              <span className="text-[10px] text-slate-500">{scenario.framework}</span>
            </div>
            <div className="text-[11px] text-slate-500 mt-1 pl-7">{scenario.detail}</div>
          </div>
        );
      }
      return (
        <div className={`rounded-lg border-2 ${s.bg} ${s.border} px-3 py-2.5 shadow-sm transition`}>
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2">
              <span className="text-lg">{scenario.icon}</span>
              <span className={`text-sm font-bold ${s.text}`}>{scenario.label}</span>
            </div>
            <span className={`text-[10px] px-2 py-0.5 rounded font-bold ${s.badge}`}>{scenario.framework}</span>
          </div>
          <div className={`text-[12px] mt-1 pl-7 ${s.text} font-medium`}>▸ {scenario.detail}</div>
        </div>
      );
    }

    function VerdictBox({ step }) {
      const s = FW_STYLE[step.verdict === 'fastapi' ? 'FastAPI' : step.verdict === 'django' ? 'Django' : 'Flask'];
      const fwName = step.verdict === 'fastapi' ? 'FastAPI' : step.verdict === 'django' ? 'Django' : 'Flask';
      return (
        <div className={`mt-3 rounded-lg border-2 ${s.border} ${s.bg} p-3`}>
          <div className="flex items-center gap-2 mb-1">
            <span className="text-base">🏆</span>
            <span className={`text-xs font-bold ${s.text}`}>이 단계의 정답</span>
            <span className={`ml-auto text-xs font-bold px-2 py-0.5 rounded ${s.badge}`}>{fwName}</span>
          </div>
          <div className={`text-[12px] ${s.text}`}>{step.keyPoint}</div>
        </div>
      );
    }

    function LiveDataPane({ step }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">5가지 시나리오 결정 패널</h3>
            <span className="text-[10px] text-slate-500">하이라이트 = 이번 단계 주인공</span>
          </div>
          <div className="space-y-2">
            {SCENARIOS.map((sc) => (
              <ScenarioCard
                key={sc.id}
                scenario={sc}
                focused={sc.id === step.focusId}
              />
            ))}
          </div>
          <VerdictBox step={step} />
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 모든 프레임워크에는 적합한 자리가 있다. "무엇을 만들 것인가" + "팀이 무엇을 아는가" 두 축으로 정하자.
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-slate-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">II</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">II-6. FastAPI 선택 가이드</h1>
                <p className="text-sm text-indigo-800/80">다섯 가지 시나리오로 보는 FastAPI / Django / Flask 의사결정</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                <ul className="space-y-1 list-disc pl-5 text-[13px]">
                  <li><span className="font-bold text-indigo-700">FastAPI</span> — 빠른 프로토타입, I/O 바운드 API, ML 모델 서빙처럼 "타입 + 자동 문서 + 비동기"가 빛나는 자리</li>
                  <li><span className="font-bold text-emerald-700">Django</span> — admin·인증·ORM·SSR이 한꺼번에 필요한 풀스택 사이트</li>
                  <li><span className="font-bold text-amber-700">Flask</span> — 엔드포인트 2~3개짜리, 학습 비용을 최소화해야 하는 마이크로 서비스</li>
                  <li>기술 선택은 트레이드오프. "이미 팀이 쓰는 도구"라는 변수가 위 추천을 이기는 경우도 많다.</li>
                </ul>
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['FastAPI', 'Django', 'Flask', '프로토타입', 'I/O 바운드', 'ML 서빙', '풀스택', '마이크로서비스', '의사결정'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <span className="text-indigo-500">Part II 마지막 자료</span>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
