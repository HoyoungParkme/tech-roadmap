<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — II-6. FastAPI 선택 가이드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-6. 언제 FastAPI를 선택하나 (II-6-1 + II-6-2 통합)
    학습 목표: FastAPI가 적합한 / 부적합한 상황을 각각 2가지 이상 설명할 수 있다.
    패턴: 시나리오별 결정 기준표 — 적합 vs 부적합
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SCENARIOS = [
      { id: 'api',    label: '고성능 REST API',       verdict: 'good', reason: 'ASGI + 비동기로 높은 동시 처리' },
      { id: 'ml',     label: 'ML 모델 서빙',          verdict: 'good', reason: '타입 힌트로 입출력 스키마 자동 문서화' },
      { id: 'type',   label: '타입 안전한 API',        verdict: 'good', reason: 'Pydantic 자동 검증 + 422 에러' },
      { id: 'micro',  label: '마이크로서비스',          verdict: 'good', reason: '가볍고 빠른 기동, Docker 친화적' },
      { id: 'admin',  label: '관리자 페이지가 필요',    verdict: 'bad',  reason: 'Django Admin이 기본 내장 — FastAPI에는 없음' },
      { id: 'full',   label: '풀스택 웹앱 (SSR)',      verdict: 'bad',  reason: 'Django/Rails/Next.js가 더 적합' },
      { id: 'legacy', label: '기존 WSGI 앱 확장',      verdict: 'bad',  reason: 'Flask/Django 확장이 안전. 마이그레이션 비용 높음' },
      { id: 'team',   label: '팀이 Python 초보',       verdict: 'bad',  reason: '타입 힌트·async 학습 비용. Flask가 입문 친화적' },
    ];

    const STEPS = [
      {
        title: 'FastAPI가 빛나는 시나리오',
        desc: '[적합] 고성능 API, ML 모델 서빙, 타입 안전성, 마이크로서비스. 비동기 I/O와 자동 문서가 강점인 상황에서 FastAPI가 최선이다.',
        highlight: ['api', 'ml', 'type', 'micro'],
        filter: 'good',
      },
      {
        title: 'FastAPI가 정답이 아닌 시나리오',
        desc: '[부적합] 관리자 페이지 필요(→ Django), 풀스택 SSR(→ Django/Next.js), 기존 WSGI 확장(→ Flask/Django), Python 초보 팀(→ Flask). 모든 도구에는 적합한 용도가 있다.',
        highlight: ['admin', 'full', 'legacy', 'team'],
        filter: 'bad',
      },
      {
        title: '정리 — 기술 선택은 트레이드오프',
        desc: 'FastAPI = API 특화 + 현대적 Python. 하지만 만능이 아니다. "무엇을 만들 것인가"와 "팀이 무엇을 아는가"에 따라 최적 프레임워크가 달라진다. 중요한 건 도구의 장단점을 알고 상황에 맞게 선택하는 것이다.',
        highlight: SCENARIOS.map(s => s.id),
        filter: 'all',
        summary: true,
      },
    ];

    const VERDICT_CLASS = {
      good: 'bg-emerald-100 border-emerald-400 text-emerald-800',
      bad:  'bg-red-50 border-red-300 text-red-700',
    };

    const VERDICT_ICON = { good: '✅', bad: '❌' };
    const VERDICT_LABEL = { good: '적합', bad: '부적합' };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 5000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const visible = stepData.filter === 'all' ? SCENARIOS : SCENARIOS.filter(s => s.verdict === stepData.filter);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum II-6</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 웹 프레임워크 개론 &gt; Chapter 6. 언제 FastAPI를 선택하나</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-6. FastAPI 선택 가이드</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                FastAPI가 <strong>빛나는 시나리오</strong>와 <strong>다른 도구가 더 나은 시나리오</strong>를 구분한다.
                만능 도구는 없다 — 상황에 맞는 선택이 중요하다.
              </p>
            </header>

            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                {visible.map((s) => {
                  const isHighlighted = stepData.highlight.includes(s.id);
                  return (
                    <div key={s.id} className={`p-3 rounded-lg border-2 transition-all duration-300 ${isHighlighted ? VERDICT_CLASS[s.verdict] : 'bg-slate-50 border-slate-200 text-slate-400'}`}>
                      <div className="flex items-center justify-between mb-1">
                        <span className="font-bold text-sm">{VERDICT_ICON[s.verdict]} {s.label}</span>
                        <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-white bg-opacity-60 font-medium">{VERDICT_LABEL[s.verdict]}</span>
                      </div>
                      {isHighlighted && <p className="text-xs leading-relaxed opacity-80">{s.reason}</p>}
                    </div>
                  );
                })}
              </div>
            </div>

            {stepData.summary && (
              <div className="bg-indigo-50 border border-indigo-200 rounded-xl p-4 text-indigo-800 text-sm">
                <div className="font-bold mb-1">핵심 정리</div>
                FastAPI를 선택할 때: <b>API 특화</b>, <b>타입 안전성</b>, <b>비동기 I/O</b>, <b>자동 문서</b>가 필요할 때.
                다른 도구가 더 나을 때: <b>관리자 페이지</b>(Django), <b>풀스택 SSR</b>(Next.js), <b>간단한 입문</b>(Flask).
              </div>
            )}

            <div className="p-4 rounded-xl bg-indigo-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-indigo-600 text-white hover:bg-indigo-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-4-2.html" className="text-slate-500 hover:text-slate-700">&larr; II-4-2 WSGI vs ASGI</a>
              <a href="../part3/III-2-1.html" className="text-blue-600 hover:text-blue-800 font-medium">III-2-1 가상환경 &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
