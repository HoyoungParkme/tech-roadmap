        savedAreas: [
          { name: '버그 표면',     lines: 0, by: '✓ 직접 짠 파서의 보안 구멍 사라짐', auto: true },
          { name: '가독성',        lines: 0, by: '✓ 비즈니스 로직 ≫ 인프라 코드', auto: true },
          { name: 'HTTP 표준',     lines: 0, by: '✓ keep-alive / chunked / gzip 자동', auto: true },
          { name: '생산성',        lines: 0, by: '✓ 새 엔드포인트 = 함수 하나', auto: true },
          { name: '문서화',        lines: 0, by: '✓ /docs 자동 생성 (FastAPI)', auto: true },
          { name: '핵심 가치',     lines: 0, by: '★ 비즈니스 로직만 쓰는 환경', auto: true, business: true },
        ],
        keyPoint: '코드량 절감 = 시간 절감 = 버그 절감. 프레임워크는 단순한 도구가 아니라 "안 짜도 되는 권리".',
        activeTab: 'verdict',
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤
    //   ① 코드량 막대 그래프 (150 / 10 / 5)
    //   ② 자동화된 영역 카드 6개 (책임 = 색)
    // ─────────────────────────────────────────────────────
    const COLOR_STYLE = {
      red:    { bar: 'bg-red-500',    bg: 'bg-red-50',    border: 'border-red-300',    text: 'text-red-800' },
      sky:    { bar: 'bg-sky-500',    bg: 'bg-sky-50',    border: 'border-sky-300',    text: 'text-sky-800' },
      indigo: { bar: 'bg-indigo-500', bg: 'bg-indigo-50', border: 'border-indigo-300', text: 'text-indigo-800' },
    };

    function CodeBar({ bar, maxLines }) {
      const s = COLOR_STYLE[bar.color];
      const widthPct = bar.visible ? Math.max(2, (bar.lines / maxLines) * 100) : 0;
      return (
        <div className={`mb-3 ${bar.visible ? '' : 'opacity-25'}`}>
          <div className="flex items-center justify-between mb-1">
            <span className={`text-xs font-bold ${s.text}`}>{bar.name}</span>
            <span className={`text-xs font-mono font-bold ${s.text}`}>
              {bar.visible ? `${bar.lines}줄` : '—'}
            </span>
          </div>
          <div className="h-6 bg-slate-100 rounded-md overflow-hidden border border-slate-200 relative">
            <div
              className={`h-full ${s.bar} transition-all duration-700 ease-out flex items-center justify-end pr-2`}
              style={{ width: `${widthPct}%` }}
            >
              {bar.visible && bar.lines >= 20 && (
                <span className="text-[10px] font-bold text-white">{bar.lines}</span>
              )}
            </div>
          </div>
        </div>
      );
    }

    function SavedAreaCard({ area }) {
      // 자동화된 책임 = 초록 / 직접 작성해야 하는 책임 = 회색
      // business = 비즈니스 로직 (개발자가 짤 가치가 있는 코드) = 인디고 강조
      const bg = area.business
        ? 'bg-indigo-50 border-indigo-300'
        : area.auto
          ? 'bg-emerald-50 border-emerald-300'
          : 'bg-slate-50 border-slate-300';
      const textColor = area.business
        ? 'text-indigo-800'
        : area.auto
          ? 'text-emerald-800'
          : 'text-slate-700';
      const badgeColor = area.business
        ? 'bg-indigo-200 text-indigo-800'
        : area.auto
          ? 'bg-emerald-200 text-emerald-800'
          : 'bg-slate-200 text-slate-700';
      const icon = area.business ? '★' : area.auto ? '✓' : '×';
      const ringClass = area.highlight ? 'ring-2 ring-emerald-400 ring-offset-1' : '';
      return (
        <div className={`rounded-lg border ${bg} ${ringClass} px-2.5 py-2 flex items-center justify-between transition-all`}>
          <div className="flex items-center gap-2 min-w-0">
            <span className={`text-xs font-bold ${textColor} w-3 text-center`}>{icon}</span>
            <span className={`text-xs font-bold ${textColor} truncate`}>{area.name}</span>
          </div>
          <span className={`text-[10px] px-2 py-0.5 rounded ${badgeColor} flex-shrink-0 ml-2 truncate max-w-[10rem]`}>
            {area.by}
          </span>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const maxLines = Math.max(...state.bars.map((b) => b.lines));
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          {/* 막대 그래프 */}
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">코드량 비교 (Hello 응답)</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 줄 수</span>
          </div>
          <div>
            {state.bars.map((b, i) => (
              <CodeBar key={i} bar={b} maxLines={maxLines} />
            ))}
          </div>

          {/* 자동화된 영역 카드 */}
          <div className="mt-2 pt-3 border-t border-dashed border-indigo-200">
            <div className="flex items-center justify-between mb-2">
              <h4 className="text-xs font-bold text-indigo-700">책임별 자동화 상태</h4>
              <div className="flex items-center gap-2 text-[10px]">
                <span className="inline-flex items-center gap-1">
                  <span className="inline-block w-2 h-2 rounded-full bg-emerald-500"></span>
                  <span className="text-slate-600">자동</span>
                </span>
                <span className="inline-flex items-center gap-1">
                  <span className="inline-block w-2 h-2 rounded-full bg-slate-500"></span>
                  <span className="text-slate-600">직접</span>
                </span>
              </div>
            </div>
            <div className="space-y-1.5">
              {state.savedAreas.map((a, i) => (
                <SavedAreaCard key={i} area={a} />
              ))}
            </div>
          </div>

          {/* 핵심 요약 */}
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (5탭 + highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ activeKey, onTabChange, stepIdx, total }) {
      const codeRef = useRef(null);
      const file = FILES[activeKey];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [activeKey]);

      const tokenLines = (() => {
        if (!codeRef.current) return file.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return file.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      const tabs = [
        { key: 'raw',     label: 'raw.py' },
        { key: 'flask',   label: 'flask.py' },
        { key: 'fastapi', label: 'fastapi.py' },
        { key: 'saved',   label: 'what-saved.md' },
        { key: 'verdict', label: 'verdict.md' },
      ];

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 탭 바 */}
          <div className="flex items-center px-2 py-1.5 bg-slate-800 border-b border-slate-700 gap-1 overflow-x-auto">
            <span className="w-3 h-3 rounded-full bg-red-400 flex-shrink-0 ml-1"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400 flex-shrink-0"></span>
            <span className="w-3 h-3 rounded-full bg-green-400 flex-shrink-0 mr-2"></span>
            {tabs.map((t) => (
              <button
                key={t.key}
                onClick={() => onTabChange(t.key)}
                className={`px-2.5 py-1 text-[11px] font-mono rounded-t flex-shrink-0 transition ${
                  activeKey === t.key
                    ? 'bg-[#282c34] text-indigo-300 border-t border-l border-r border-slate-600'
                    : 'text-slate-400 hover:text-slate-200'
                }`}
              >
                {t.label}
              </button>
            ))}
          </div>

          {/* 파일 헤더 */}
          <div className="flex items-center px-3 py-1.5 bg-slate-800/80 border-b border-slate-700">
            <span className="text-xs text-slate-300 font-mono">{file.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{file.lang}</span>
          </div>

          {/* 코드 본문 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${file.lang}`}>{file.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {file.lines.map((line, i) => {
                const lineNo = i + 1;
                return (
                  <div key={i} className="flex">
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1 whitespace-pre"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>

          {/* 상태 바 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{file.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const [tabOverride, setTabOverride] = useState(null);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 우측 탭: STEPS 가 지정한 기본 탭 + 유저가 직접 클릭한 경우 그 탭을 우선
      const activeTab = tabOverride || step.activeTab;

      // Step 변경 시 override 리셋 (시나리오 따라가도록)
      useEffect(() => {
        setTabOverride(null);
      }, [stepIdx]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-slate-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">

            {/* 상단 네비 */}
            <nav className="mb-4 flex items-center justify-between text-xs">
              <a href="../index.html" className="text-indigo-700 hover:text-indigo-900 font-medium">← 허브로</a>
              <span className="font-mono bg-white px-2 py-1 rounded border border-slate-200 text-slate-600">curriculum II-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">II</span>
              <div>
                <div className="text-[11px] text-slate-500 font-medium">Part II. 웹 프레임워크 개론 &gt; Chapter 2. 썼을 때 vs 안 썼을 때</div>
                <h1 className="text-2xl font-bold text-indigo-900">II-2-1. 생 소켓 vs 프레임워크 코드량 비교</h1>
                <p className="text-sm text-indigo-800/80">같은 "Hello" 응답 — socket 150줄 / Flask 10줄 / FastAPI 5줄</p>
              </div>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer
                activeKey={activeTab}
                onTabChange={setTabOverride}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                프레임워크는 "내가 안 짜도 되는 코드" 를 늘려준다. 라우팅·파싱·응답 자동화로 150줄 → 5줄.
                다음 챕터(II-3)에서는 Flask / FastAPI / Django 가 각자 어느 자리에 있는지 지도로 본다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['socket', 'bind', 'listen', 'accept', 'HTTP parsing', 'routing', 'response', 'boilerplate', 'Flask', 'FastAPI'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 하단 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./II-1-2.html" className="underline hover:no-underline">← II-1-2 라이브러리 vs 프레임워크</a>
              <a href="./II-3.html" className="underline hover:no-underline">다음: II-3 프레임워크 지도 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
