<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — II-2-1. 생 소켓 vs 프레임워크 코드량 비교</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-2-1. 생(raw) 소켓 코드의 양 비교
    학습 목표: 프레임워크 없이 웹 서버를 만들 때 얼마나 많은 코드가 필요한지 설명할 수 있다.
    패턴: 좌우 코드 비교 + 단계별 하이라이트
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const RAW_CODE = [
      { text: 'import socket',                              tag: 'import' },
      { text: '',                                           tag: 'none' },
      { text: '# 1단계: TCP 소켓 열기',                      tag: 'comment' },
      { text: 'server = socket.socket()',                   tag: 'socket' },
      { text: 'server.setsockopt(',                         tag: 'socket' },
      { text: '    socket.SOL_SOCKET,',                     tag: 'socket' },
      { text: '    socket.SO_REUSEADDR, 1)',                tag: 'socket' },
      { text: 'server.bind(("127.0.0.1", 8000))',           tag: 'socket' },
      { text: 'server.listen(5)',                            tag: 'socket' },
      { text: '',                                           tag: 'none' },
      { text: '# 2단계: 연결 수락 + HTTP 파싱',              tag: 'comment' },
      { text: 'while True:',                                tag: 'parse' },
      { text: '    conn, addr = server.accept()',           tag: 'parse' },
      { text: '    data = conn.recv(4096).decode()',        tag: 'parse' },
      { text: '    method, path, _ = data.split(" ", 2)',   tag: 'parse' },
      { text: '',                                           tag: 'none' },
      { text: '    # 3단계: URL 라우팅 (직접 분기)',          tag: 'comment' },
      { text: '    if path == "/" and method == "GET":',    tag: 'route' },
      { text: '        body = \'{"msg":"Hello"}\'',         tag: 'route' },
      { text: '        status = "200 OK"',                  tag: 'route' },
      { text: '    else:',                                  tag: 'route' },
      { text: '        body = \'{"error":"Not Found"}\'',   tag: 'route' },
      { text: '        status = "404 Not Found"',           tag: 'route' },
      { text: '',                                           tag: 'none' },
      { text: '    # 4단계: HTTP 응답 헤더 직접 조립',        tag: 'comment' },
      { text: '    headers = "HTTP/1.1 " + status + "\\r\\n"', tag: 'response' },
      { text: '    headers += "Content-Type: application/json\\r\\n"', tag: 'response' },
      { text: '    headers += f"Content-Length: {len(body)}\\r\\n"',   tag: 'response' },
      { text: '    headers += "\\r\\n"',                    tag: 'response' },
      { text: '    conn.sendall((headers + body).encode())',tag: 'response' },
      { text: '    conn.close()',                            tag: 'response' },
    ];

    const FAST_CODE = [
      { text: 'from fastapi import FastAPI',  tag: 'import' },
      { text: '',                              tag: 'none' },
      { text: 'app = FastAPI()',               tag: 'setup' },
      { text: '',                              tag: 'none' },
      { text: '@app.get("/")',                 tag: 'route' },
      { text: 'def hello():',                  tag: 'logic' },
      { text: '    return {"msg": "Hello"}',   tag: 'logic' },
    ];

    const STEPS = [
      {
        title: '전체 코드 비교 — 31줄 vs 7줄',
        desc: '똑같은 "Hello" JSON을 응답하는 서버를 만든다. 생 소켓은 31줄, FastAPI는 7줄. 줄 수 차이가 4배 이상이다.',
        highlightRaw: null,
        highlightFast: null,
      },
      {
        title: '1단계 — TCP 소켓 열기',
        desc: '[소켓] 생 소켓 방식: socket 모듈로 TCP 연결을 직접 열고, 포트를 바인딩하고, 대기 큐를 설정해야 한다 (6줄). FastAPI: app = FastAPI() 한 줄이면 서버 준비 완료. Uvicorn이 나머지를 처리한다.',
        highlightRaw: 'socket',
        highlightFast: 'setup',
      },
      {
        title: '2단계 — HTTP 요청 파싱',
        desc: '[파싱] 생 소켓: 클라이언트 연결을 수락하고, 바이트 데이터를 받아 디코딩하고, HTTP 메서드와 경로를 직접 분리해야 한다 (4줄). FastAPI: 프레임워크가 자동으로 파싱한다. 개발자 코드 0줄.',
        highlightRaw: 'parse',
        highlightFast: null,
      },
      {
        title: '3단계 — URL 라우팅',
        desc: '[라우팅] 생 소켓: if/else로 경로를 직접 분기한다. 경로가 늘어날수록 조건문이 커진다 (6줄). FastAPI: @app.get("/") 데코레이터 한 줄로 URL과 함수를 연결한다.',
        highlightRaw: 'route',
        highlightFast: 'route',
      },
      {
        title: '4단계 — 응답 조립 + 전송',
        desc: '[응답] 생 소켓: HTTP 상태줄, Content-Type, Content-Length 헤더를 직접 문자열로 조립하고 바이트로 인코딩해서 전송한다 (6줄). FastAPI: return {"msg": "Hello"} — 딕셔너리를 반환하면 자동으로 JSON + 헤더가 만들어진다.',
        highlightRaw: 'response',
        highlightFast: 'logic',
      },
    ];

    const TAG_HIGHLIGHT = {
      socket:   'bg-red-800 ring-1 ring-red-500',
      parse:    'bg-amber-800 ring-1 ring-amber-500',
      route:    'bg-blue-800 ring-1 ring-blue-500',
      response: 'bg-emerald-800 ring-1 ring-emerald-500',
      setup:    'bg-cyan-800 ring-1 ring-cyan-500',
      logic:    'bg-indigo-800 ring-1 ring-indigo-500',
    };

    function CodePanel({ title, lines, highlight, lineCount, color }) {
      return (
        <div className="bg-slate-900 rounded-lg overflow-hidden">
          <div className={`px-4 py-2 text-xs font-mono flex justify-between items-center ${color}`}>
            <span>{title}</span>
            <span className="opacity-70">{lineCount}줄</span>
          </div>
          <div className="overflow-auto max-h-[26rem] text-xs font-mono leading-5 p-3">
            {lines.map((line, i) => {
              const isHighlighted = highlight && line.tag === highlight;
              const isDimmed = highlight && line.tag !== highlight && line.tag !== 'none' && line.tag !== 'comment';
              const bg = isHighlighted ? TAG_HIGHLIGHT[line.tag] : '';
              const opacity = isDimmed ? 'opacity-30' : '';
              return (
                <div key={i} className={`px-2 py-0.5 rounded transition-all duration-300 ${bg} ${opacity}`}>
                  <span className="text-slate-500 select-none mr-3 inline-block w-5 text-right">{i + 1}</span>
                  <span className="text-slate-200">{line.text || '\u00A0'}</span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];

      const handleNext = () => {
        setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1));
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        setCurrentStepIdx(prev => Math.max(prev - 1, 0));
      };

      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false);
      }, [currentStepIdx]);

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum II-2-1</span>
            </nav>

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 웹 프레임워크 개론 &gt; Chapter 2. 썼을 때 vs 안 썼을 때</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-2-1. 생 소켓 코드의 양 비교</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                "Hello" 한 마디를 응답하는 서버. <strong>생 소켓으로 31줄</strong>, <strong>FastAPI로 7줄</strong>.
                프레임워크가 HTTP 파싱, 라우팅, 응답 직렬화를 대신해주기 때문이다.
              </p>
            </header>

            {/* 좌우 코드 비교 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <CodePanel
                title="생 소켓 (socket 모듈)"
                lines={RAW_CODE}
                highlight={stepData.highlightRaw}
                lineCount={31}
                color="bg-red-900 text-red-200"
              />
              <CodePanel
                title="FastAPI"
                lines={FAST_CODE}
                highlight={stepData.highlightFast}
                lineCount={7}
                color="bg-emerald-900 text-emerald-200"
              />
            </div>

            {/* 설명 + 컨트롤 */}
            <div className="p-4 rounded-xl bg-indigo-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 컨트롤 바 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                처음
              </button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                &larr; 이전
              </button>
              <button onClick={togglePlay}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-indigo-600 text-white hover:bg-indigo-700 transition min-w-[80px]">
                {isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}
              </button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                다음 &rarr;
              </button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-1-2.html" className="text-slate-500 hover:text-slate-700">&larr; II-1-2 라이브러리 vs 프레임워크</a>
              <a href="./II-3.html" className="text-blue-600 hover:text-blue-800 font-medium">II-3 프레임워크 지도 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
