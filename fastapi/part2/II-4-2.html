<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — II-4-2. WSGI vs ASGI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-4-2. WSGI vs ASGI (Python 한정)
    학습 목표: WSGI와 ASGI의 차이를 설명하고, FastAPI가 어느 표준을 사용하는지 말할 수 있다.
    패턴: 좌우 비교 다이어그램 — 전통 vs 현대 표준
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Python 웹 서버의 표준이 필요하다',
        desc: '프레임워크(Django, FastAPI)와 웹 서버(Gunicorn, Uvicorn)는 별개의 프로그램이다. 둘이 소통하려면 공통 규약(표준)이 필요하다. "프레임워크가 이런 형식으로 요청을 받고, 이런 형식으로 응답을 돌려준다"는 약속이다.',
        wsgi: { state: 'intro', label: 'WSGI란?', items: ['Web Server Gateway Interface', '2003년 등장', 'PEP 3333'] },
        asgi: { state: 'intro', label: 'ASGI란?', items: ['Asynchronous Server Gateway Interface', '2018년 등장', 'ASGI 3.0'] },
      },
      {
        title: 'WSGI — 동기 전용 표준',
        desc: '[WSGI] 2003년부터 쓰인 전통 표준. 요청 하나를 받으면 처리가 끝날 때까지 다음 요청을 못 받는다(동기). Django, Flask가 이 방식으로 시작했다. Gunicorn, uWSGI 같은 서버와 함께 쓰인다.',
        wsgi: { state: 'active', label: 'WSGI 방식', items: ['동기 전용 (한 번에 하나)', 'Django, Flask', 'Gunicorn, uWSGI'] },
        asgi: { state: 'dim', label: 'ASGI', items: ['아직 등장 전...'] },
      },
      {
        title: 'ASGI — 동기 + 비동기 모두 지원',
        desc: '[ASGI] 2018년에 등장한 현대 표준. 비동기(async/await)를 네이티브 지원하고, WebSocket(실시간 통신), HTTP/2도 처리한다. FastAPI는 ASGI 전용 프레임워크로, Uvicorn 위에서 실행된다.',
        wsgi: { state: 'dim', label: 'WSGI (전통)', items: ['동기 전용', 'WebSocket 불가'] },
        asgi: { state: 'active', label: 'ASGI 방식', items: ['동기 + 비동기 모두', 'FastAPI, Starlette', 'Uvicorn, Daphne', 'WebSocket, HTTP/2 지원'] },
      },
      {
        title: '정리 — WSGI는 전통, ASGI는 미래',
        desc: 'WSGI = 동기 시대의 표준 (Django/Flask 전통 방식). ASGI = 비동기 시대의 새 표준 (FastAPI/Starlette). Django도 최신 버전에서 ASGI를 지원하기 시작했다. 새 프로젝트라면 ASGI(FastAPI + Uvicorn)가 현대적 선택이다.',
        wsgi: { state: 'compare', label: 'WSGI', items: ['동기 전용', 'Gunicorn', 'Django, Flask'] },
        asgi: { state: 'compare-win', label: 'ASGI ✅', items: ['동기 + 비동기', 'Uvicorn', 'FastAPI, Starlette', 'WebSocket 지원'] },
        summary: true,
      },
    ];

    const BOX_STATE = {
      intro:       'bg-slate-100 border-slate-300 text-slate-600',
      active:      'bg-blue-100 border-blue-400 text-blue-800 ring-2 ring-blue-300',
      dim:         'bg-slate-50 border-slate-200 text-slate-400',
      compare:     'bg-slate-100 border-slate-300 text-slate-600',
      'compare-win': 'bg-emerald-100 border-emerald-400 text-emerald-800 ring-2 ring-emerald-300',
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum II-4-2</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 웹 프레임워크 개론 &gt; Chapter 4. 동기 vs 비동기</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-4-2. WSGI vs ASGI</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                <strong>WSGI</strong>는 동기 전용 전통 표준, <strong>ASGI</strong>는 비동기도 지원하는 현대 표준.
                FastAPI는 ASGI 전용이며 <b>Uvicorn</b> 위에서 실행된다.
              </p>
            </header>

            {/* 좌우 비교 */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {[stepData.wsgi, stepData.asgi].map((box, i) => (
                <div key={i} className={`p-5 rounded-xl border-2 transition-all duration-300 ${BOX_STATE[box.state]}`}>
                  <div className="font-bold text-base mb-3">{box.label}</div>
                  <ul className="space-y-1">
                    {box.items.map((item, j) => (
                      <li key={j} className="text-sm flex items-center gap-2">
                        <span className="w-1.5 h-1.5 rounded-full bg-current opacity-50"></span>
                        {item}
                      </li>
                    ))}
                  </ul>
                </div>
              ))}
            </div>

            {stepData.summary && (
              <div className="bg-white rounded-xl border border-slate-200 p-4">
                <div className="text-sm font-bold text-slate-600 mb-2">비교 요약</div>
                <div className="overflow-x-auto">
                  <table className="w-full text-xs">
                    <thead><tr className="border-b"><th className="py-1 text-left">항목</th><th className="py-1 text-left">WSGI</th><th className="py-1 text-left text-emerald-600">ASGI</th></tr></thead>
                    <tbody>
                      <tr className="border-b"><td className="py-1">비동기</td><td>불가</td><td className="text-emerald-600 font-bold">지원</td></tr>
                      <tr className="border-b"><td className="py-1">WebSocket</td><td>불가</td><td className="text-emerald-600 font-bold">지원</td></tr>
                      <tr className="border-b"><td className="py-1">서버</td><td>Gunicorn, uWSGI</td><td className="text-emerald-600">Uvicorn, Daphne</td></tr>
                      <tr><td className="py-1">프레임워크</td><td>Django, Flask</td><td className="text-emerald-600 font-bold">FastAPI, Starlette</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            <div className="p-4 rounded-xl bg-indigo-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-indigo-600 text-white hover:bg-indigo-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-4-1.html" className="text-slate-500 hover:text-slate-700">&larr; II-4-1 동기 vs 비동기</a>
              <a href="./II-6.html" className="text-blue-600 hover:text-blue-800 font-medium">II-6 FastAPI 선택 가이드 &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
