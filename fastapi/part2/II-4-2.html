            'pip install "uvicorn[standard]" fastapi',
            '',
            '# 1) 개발용 — 코드 변경 시 자동 재시작',
            'uvicorn main:app --reload',
            '',
            '# 2) 호스트/포트 지정',
            'uvicorn main:app --host 0.0.0.0 --port 8000',
            '',
            '# 3) 운영용 — 워커 여러 개 (멀티 프로세스)',
            'uvicorn main:app --workers 4 --host 0.0.0.0 --port 8000',
            '',
            '# 4) 실전 추천 — gunicorn 으로 프로세스 관리, uvicorn worker 로 ASGI 실행',
            'gunicorn main:app \\',
            '  --workers 4 \\',
            '  --worker-class uvicorn.workers.UvicornWorker \\',
            '  --bind 0.0.0.0:8000',
            '',
            '# 5) WebSocket 동작 확인 (별도 셸)',
            '#   wscat -c ws://localhost:8000/chat',
            '#   > 안녕   ← 입력하면',
            '#   < echo: 안녕   ← 서버가 echo 로 응답',
            '',
            '# 정리:',
            '#   FastAPI  : ASGI 프레임워크 (앱 측 표준 구현)',
            '#   uvicorn  : ASGI 서버      (네트워크 측 표준 구현)',
            '#   ASGI     : 둘을 잇는 표준 시그니처 (scope, receive, send)',
          ],
          highlight: [7, 8, 10, 11, 13, 14, 16, 17, 19, 20, 21, 22, 23, 30, 31, 32, 33],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤
    // ─────────────────────────────────────────────────────
    const BOX_STATE = {
      active:        { wrap: 'border-indigo-400 bg-indigo-50 ring-2 ring-indigo-300', title: 'text-indigo-800' },
      dim:           { wrap: 'border-slate-200 bg-slate-50 opacity-60', title: 'text-slate-400' },
      compare:       { wrap: 'border-slate-300 bg-slate-100', title: 'text-slate-600' },
      'compare-win': { wrap: 'border-emerald-400 bg-emerald-50 ring-2 ring-emerald-300', title: 'text-emerald-800' },
    };

    const FLOW_KIND = {
      req:   'bg-slate-100   border-slate-300   text-slate-700',
      sync:  'bg-rose-50     border-rose-300    text-rose-800',
      async: 'bg-indigo-100  border-indigo-300  text-indigo-800',
      res:   'bg-emerald-50  border-emerald-300 text-emerald-800',
    };

    function FlowRow({ item }) {
      const cls = FLOW_KIND[item.kind] || FLOW_KIND.sync;
      return (
        <div className={`rounded-lg border px-3 py-2 text-xs ${cls}`}>
          <div className="font-bold">{item.label}</div>
          <div className="font-mono text-[11px] opacity-80 mt-0.5">{item.detail}</div>
        </div>
      );
    }

    function ProtocolBox({ title, badge, data, accent }) {
      const s = BOX_STATE[data.state] || BOX_STATE.dim;
      return (
        <div className={`rounded-xl border-2 p-4 transition-all ${s.wrap}`}>
          <div className="flex items-center justify-between mb-2">
            <div className={`text-base font-bold ${s.title}`}>{title}</div>
            <span className={`text-[10px] px-2 py-0.5 rounded-full bg-white border ${accent}`}>{badge}</span>
          </div>
          <div className="text-[11px] text-slate-600 mb-1">프레임워크</div>
          <div className="text-sm font-mono text-slate-800 mb-2">{data.framework}</div>
          <div className="text-[11px] text-slate-600 mb-1">서버</div>
          <div className="text-sm font-mono text-slate-800 mb-3">{data.server}</div>
          {data.flow && data.flow.length > 0 && (
            <div className="space-y-1.5">
              {data.flow.map((f, i) => (
                <React.Fragment key={i}>
                  <FlowRow item={f} />
                  {i < data.flow.length - 1 && (
                    <div className="text-center text-slate-400 text-xs leading-none">↓</div>
                  )}
                </React.Fragment>
              ))}
            </div>
          )}
          {data.channels && data.channels.length > 0 && (
            <div className="mt-3 pt-3 border-t border-dashed border-slate-300">
              <div className="text-[11px] font-bold text-slate-600 mb-1.5">지원 채널</div>
              <div className="flex flex-wrap gap-1.5">
                {data.channels.map((c, i) => (
                  <div key={i} className="text-[11px] px-2 py-1 rounded bg-white border border-indigo-200">
                    <span className="font-bold text-indigo-700">{c.label}</span>
                    <span className="text-slate-600 ml-1">— {c.detail}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
          {data.note && (
            <div className="mt-3 text-[11px] text-slate-700 bg-white/70 border border-slate-200 rounded px-2 py-1.5">
              {data.note}
            </div>
          )}
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">표준 비교 — WSGI vs ASGI</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 프로토콜 박스</span>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <ProtocolBox
              title="WSGI"
              badge="2003 · 동기"
              data={state.wsgi}
              accent="border-rose-200 text-rose-700"
            />
            <ProtocolBox
              title="ASGI"
              badge="2018 · 비동기"
              data={state.asgi}
              accent="border-indigo-200 text-indigo-700"
            />
          </div>
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-slate-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">II</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">II-4-2. WSGI vs ASGI</h1>
                <p className="text-sm text-indigo-800/80">WSGI(동기·단방향) → ASGI(비동기·양방향+WebSocket). 5단계로 추적</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 허브로</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                WSGI(2003, 동기 단방향) → ASGI(2018, 비동기 + WebSocket). Flask·Django는 WSGI, FastAPI·Starlette는 ASGI. uvicorn은 ASGI 서버로 FastAPI의 기본 런타임이다. 다음 챕터(II-6)에서 FastAPI를 언제 선택해야 하는지 정리한다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['WSGI', 'ASGI', 'PEP 3333', 'Flask', 'Django', 'FastAPI', 'Starlette', 'uvicorn', 'WebSocket', 'gunicorn'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./II-4-1.html" className="underline hover:no-underline">← II-4-1 동기 vs 비동기</a>
              <a href="./II-6.html" className="underline hover:no-underline">다음: II-6 FastAPI 선택 가이드 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
