            '| `BackgroundTasks` | FastAPI 가 응답 후 호출 |',
            '',
            '모두 **"등록만 한다 → 프레임워크가 부른다"** 패턴.',
            '',
            '## 3. 다른 프레임워크의 같은 패턴',
            '',
            '- **Django**: `urls.py` 에 등록 → Django 가 호출',
            '- **Spring**: `@Controller` 등록 → 컨테이너가 호출',
            '- **React**: 컴포넌트 정의 → React 가 라이프사이클로 호출',
            '- **pytest**: `test_*` 함수 정의 → pytest 러너가 호출',
            '',
            '## 4. 실무에서의 의미',
            '',
            '- 프레임워크의 "규칙(컨벤션)" 을 지켜야 부른다',
            '- 함수 시그니처가 곧 계약 — 이름·타입·데코레이터',
            '- 내 코드 안에서 `main()` 을 찾지 마라 — 프레임워크가 진입점이다',
            '- 디버깅 시 흐름이 안 보이면 "어디서 부르는가" 를 찾는다',
            '',
            '## 핵심 한 줄',
            '',
            '> 라이브러리는 도구함, 프레임워크는 무대.',
            '> 도구는 내가 꺼내 쓰지만, 무대 위에서는 내가 호출되기를 기다린다.',
          ],
          highlight: [2, 3, 5, 6, 7, 8, 10, 13, 15, 16, 17, 18, 19, 20, 22, 32, 36, 37],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤
    // ─────────────────────────────────────────────────────
    const TONE_STYLE = {
      'active-indigo': { bg: 'bg-indigo-100',   border: 'border-indigo-400',  text: 'text-indigo-800',  ring: 'ring-2 ring-indigo-300' },
      'passive':       { bg: 'bg-slate-100',    border: 'border-slate-300',   text: 'text-slate-600',   ring: '' },
      'compare-lib':   { bg: 'bg-amber-50',     border: 'border-amber-400',   text: 'text-amber-800',   ring: '' },
      'compare-fw':    { bg: 'bg-indigo-50',    border: 'border-indigo-400',  text: 'text-indigo-800',  ring: '' },
    };

    const VERDICT_STYLE = {
      lib:       'border-amber-400  bg-amber-50  text-amber-900',
      fw:        'border-indigo-400 bg-indigo-50 text-indigo-900',
      ioc:       'border-rose-400   bg-rose-50   text-rose-900',
      hollywood: 'border-indigo-500 bg-gradient-to-br from-indigo-50 to-violet-50 text-indigo-900',
    };

    function ActorBox({ actor }) {
      const s = TONE_STYLE[actor.tone] || TONE_STYLE.passive;
      return (
        <div className={`rounded-lg border-2 ${s.bg} ${s.border} ${s.ring} p-3`}>
          <div className={`font-bold text-sm mb-2 ${s.text}`}>{actor.label}</div>
          <div className="space-y-1">
            {actor.items.map((it, i) => (
              <div key={i} className="text-xs font-mono px-2 py-1 rounded bg-white/70 text-slate-700">
                {it}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function FlowArrow({ flow }) {
      const map = {
        'caller-to-callee': { symbol: '▼', label: '호출 (call)', color: 'text-indigo-600' },
        'both':             { symbol: '⇅', label: '방향이 반대!', color: 'text-rose-600' },
      };
      const info = map[flow] || map['caller-to-callee'];
      return (
        <div className="my-2 flex items-center justify-center gap-2 py-2 border-y border-dashed border-indigo-200">
          <span className={`text-2xl font-bold ${info.color}`}>{info.symbol}</span>
          <span className={`text-xs font-bold ${info.color}`}>{info.label}</span>
        </div>
      );
    }

    function VerdictBox({ verdict }) {
      if (!verdict) return null;
      const cls = VERDICT_STYLE[verdict.tone] || VERDICT_STYLE.fw;
      return (
        <div className={`mt-3 rounded-lg border-2 ${cls} p-3`}>
          <div className="flex items-center gap-2 mb-1">
            <span className="text-xl">{verdict.icon}</span>
            <span className="font-bold text-sm">{verdict.title}</span>
          </div>
          <p className="text-sm leading-relaxed">{verdict.text}</p>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">제어 흐름 시뮬레이션</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 호출자 · 오른쪽 = 피호출자</span>
          </div>
          <div className="grid grid-cols-2 gap-3">
            {state.actors.map((a, i) => (
              <ActorBox key={i} actor={a} />
            ))}
          </div>
          <FlowArrow flow={state.flow} />
          <VerdictBox verdict={state.verdict} />
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js) — 5탭
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total, onTab }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 탭 바 */}
          <div className="flex items-center gap-1 px-2 py-1.5 bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {STEPS.map((s, i) => (
              <button
                key={i}
                onClick={() => onTab(i)}
                className={`px-2.5 py-1 text-[11px] font-mono rounded whitespace-nowrap transition ${
                  i === stepIdx
                    ? 'bg-[#282c34] text-indigo-300 border-t-2 border-indigo-400'
                    : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'
                }`}
                title={s.code.filename}
              >
                {s.code.filename}
              </button>
            ))}
          </div>
          {/* 파일 정보 */}
          <div className="flex items-center gap-2 px-3 py-1.5 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          {/* 본문 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          {/* 푸터 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 상단 네비 */}
            <nav className="mb-4 flex items-center justify-between text-sm">
              <a href="../index.html" className="text-indigo-700 hover:text-indigo-900 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-white px-2 py-1 rounded border border-indigo-200 text-indigo-700">curriculum II-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">II</span>
              <div>
                <div className="text-xs text-indigo-700/80 font-medium">Part II. 웹 프레임워크 개론 &gt; Chapter 1. 프레임워크란 무엇인가</div>
                <h1 className="text-2xl font-bold text-indigo-900">II-1-2. 라이브러리와 프레임워크의 차이</h1>
                <p className="text-sm text-indigo-800/80">"누가 호출하는가" 한 질문으로 라이브러리/프레임워크를 가른다. 제어의 역전(IoC)을 5단계로 추적</p>
              </div>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} onTab={setStepIdx} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-800 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                "내가 호출하면 라이브러리, 나를 호출하면 프레임워크." 호출 방향의 역전(IoC)이 두 개념을 가르는 가장 단순한 기준이다.
                FastAPI 의 모든 데코레이터(@app.get, @app.on_event, Depends 등)는 이 Hollywood Principle 위에 서 있다.
                다음 챕터(II-2-1)에서는 생 소켓으로 직접 HTTP 서버를 만들어보며 프레임워크가 감춰주는 영역을 들여다본다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['라이브러리', '프레임워크', 'IoC', '제어의 역전', 'Hollywood Principle', 'FastAPI', 'requests', '데코레이터'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 이전/다음 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./II-1-1.html" className="underline hover:no-underline">← II-1-1 맨땅 vs 프레임워크</a>
              <a href="./II-2-1.html" className="underline hover:no-underline">다음: II-2-1 생 소켓 vs 프레임워크 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
