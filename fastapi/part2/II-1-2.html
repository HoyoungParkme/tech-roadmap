<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — II-1-2. 라이브러리와 프레임워크의 차이</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    II-1-2. "라이브러리"와 "프레임워크"의 차이 — 전화 받는 쪽이 누구인가
    학습 목표: 라이브러리와 프레임워크의 핵심 차이(제어 역전)를 설명할 수 있다.
    패턴: 구조 비교형 — 좌우 대칭 다이어그램 + 제어 흐름 화살표
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: '라이브러리 — 내가 도구를 꺼내 쓴다',
        desc: '[라이브러리] 공구함에서 드라이버를 꺼내 쓰는 것처럼, 내가 필요할 때 라이브러리 함수를 호출한다. 주도권은 내 코드에 있다.',
        left: {
          label: '내 코드',
          state: 'active',
          items: ['main() 시작', 'requests.get() 호출', '결과 처리', 'json.dumps() 호출', '출력'],
        },
        right: {
          label: '라이브러리',
          state: 'passive',
          items: ['requests 모듈', 'json 모듈'],
        },
        arrows: 'left-to-right',
        analogy: { icon: '🔧', text: '공구함: 필요할 때 꺼내 쓴다' },
      },
      {
        title: '프레임워크 — 프레임워크가 나를 호출한다',
        desc: '[프레임워크] 악단에서 지휘자가 연주 순서를 정하듯, 프레임워크가 전체 흐름을 제어한다. 개발자는 프레임워크가 정한 방식으로 자기 파트를 작성한다.',
        left: {
          label: '프레임워크',
          state: 'active',
          items: ['서버 시작', 'URL 라우팅', '내 함수 호출 ←', '응답 변환', '클라이언트 전송'],
        },
        right: {
          label: '내 코드',
          state: 'passive',
          items: ['@app.get("/")', 'def hello():', '  return {"msg": "hi"}'],
        },
        arrows: 'right-to-left',
        analogy: { icon: '🎵', text: '악단 지휘자: 내 파트만 연주한다' },
      },
      {
        title: '제어의 역전 (IoC)',
        desc: '[핵심] 라이브러리: "내 코드 → 라이브러리" (내가 호출). 프레임워크: "프레임워크 → 내 코드" (나를 호출). 이 뒤바뀐 흐름을 "제어의 역전(Inversion of Control)"이라 부른다.',
        left: {
          label: '라이브러리 방식',
          state: 'compare-lib',
          items: ['내 코드가 주도', '→ 도구를 호출'],
        },
        right: {
          label: '프레임워크 방식',
          state: 'compare-fw',
          items: ['프레임워크가 주도', '→ 나를 호출'],
        },
        arrows: 'both',
        analogy: { icon: '🔄', text: '제어의 역전: 호출 방향이 반대다' },
      },
      {
        title: '정리 — "누가 전화 거는 쪽인가?"',
        desc: '라이브러리 = 내가 전화를 건다 (필요할 때 호출). 프레임워크 = 프레임워크가 전화를 건다 (규칙에 맞춰 내 코드를 호출). FastAPI도 프레임워크다 — @app.get()으로 "이 URL이면 이 함수를 불러라"고 등록하면, 요청이 올 때 FastAPI가 내 함수를 호출한다.',
        left: {
          label: '라이브러리',
          state: 'compare-lib',
          items: ['내가 → 도구 호출', '예: requests, json'],
        },
        right: {
          label: '프레임워크',
          state: 'compare-fw',
          items: ['틀이 → 내 코드 호출', '예: FastAPI, Django'],
        },
        arrows: 'both',
        analogy: { icon: '📞', text: '전화: 누가 거는 쪽인가?' },
        summary: true,
      },
    ];

    const BOX_CLASS = {
      active:      'bg-blue-100 border-blue-400 text-blue-800 ring-2 ring-blue-300',
      passive:     'bg-slate-100 border-slate-300 text-slate-600',
      'compare-lib': 'bg-amber-50 border-amber-400 text-amber-800',
      'compare-fw':  'bg-indigo-50 border-indigo-400 text-indigo-800',
    };

    const ARROW_CLASS = {
      'left-to-right': { dir: '→', color: 'text-blue-500', label: '내가 호출' },
      'right-to-left': { dir: '←', color: 'text-indigo-500', label: '나를 호출' },
      both:            { dir: '↔', color: 'text-rose-500', label: '방향이 반대!' },
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];

      const handleNext = () => {
        setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1));
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        setCurrentStepIdx(prev => Math.max(prev - 1, 0));
      };

      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false);
      }, [currentStepIdx]);

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const arrowInfo = ARROW_CLASS[stepData.arrows];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">

            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum II-1-2</span>
            </nav>

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 웹 프레임워크 개론 &gt; Chapter 1. 프레임워크란 무엇인가</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-1-2. 라이브러리와 프레임워크의 차이</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                라이브러리는 <strong>내가 꺼내 쓰는 도구</strong>, 프레임워크는 <strong>내가 들어가서 연주하는 악단</strong>.
                핵심 차이는 <b>"누가 주도권을 쥐는가"</b> — 이것을 <b>제어의 역전(IoC)</b>이라 부른다.
              </p>
            </header>

            {/* 좌우 비교 다이어그램 */}
            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="grid grid-cols-1 md:grid-cols-[1fr_auto_1fr] gap-4 items-start">
                {/* 왼쪽 */}
                <div className={`p-4 rounded-lg border-2 transition-all duration-300 ${BOX_CLASS[stepData.left.state]}`}>
                  <div className="font-bold text-sm mb-3">{stepData.left.label}</div>
                  <div className="space-y-1">
                    {stepData.left.items.map((item, i) => (
                      <div key={i} className="text-xs font-mono px-2 py-1 rounded bg-white bg-opacity-60">{item}</div>
                    ))}
                  </div>
                </div>

                {/* 화살표 */}
                <div className="flex flex-col items-center justify-center gap-2 py-4">
                  <span className={`text-4xl font-bold ${arrowInfo.color} transition-all duration-300`}>{arrowInfo.dir}</span>
                  <span className={`text-xs font-bold ${arrowInfo.color}`}>{arrowInfo.label}</span>
                </div>

                {/* 오른쪽 */}
                <div className={`p-4 rounded-lg border-2 transition-all duration-300 ${BOX_CLASS[stepData.right.state]}`}>
                  <div className="font-bold text-sm mb-3">{stepData.right.label}</div>
                  <div className="space-y-1">
                    {stepData.right.items.map((item, i) => (
                      <div key={i} className="text-xs font-mono px-2 py-1 rounded bg-white bg-opacity-60">{item}</div>
                    ))}
                  </div>
                </div>
              </div>

              {/* 비유 배지 */}
              <div className="mt-4 flex items-center gap-2 text-sm">
                <span aria-hidden="true" className="text-lg">{stepData.analogy.icon}</span>
                <span className="font-medium text-slate-600">{stepData.analogy.text}</span>
              </div>

              {/* 요약 (마지막 단계) */}
              {stepData.summary && (
                <div className="mt-4 p-3 rounded-lg bg-indigo-50 border border-indigo-200 text-indigo-800 text-sm">
                  <div className="font-bold mb-1">FastAPI에서의 IoC</div>
                  <code className="text-xs bg-white px-1 rounded">@app.get("/")</code>로 함수를 등록하면, 요청이 올 때 <b>FastAPI가 내 함수를 호출</b>한다.
                  개발자는 "어떤 URL → 어떤 함수"만 정의하고, 나머지는 프레임워크에 맡긴다.
                </div>
              )}
            </div>

            {/* 설명 + 컨트롤 */}
            <div className="p-4 rounded-xl bg-indigo-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 컨트롤 바 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                처음
              </button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                &larr; 이전
              </button>
              <button onClick={togglePlay}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-indigo-600 text-white hover:bg-indigo-700 transition min-w-[80px]">
                {isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}
              </button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1}
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; II-1-1 맨땅 vs 프레임워크</a>
              <a href="./II-2-1.html" className="text-blue-600 hover:text-blue-800 font-medium">II-2-1 생 소켓 vs 프레임워크 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
