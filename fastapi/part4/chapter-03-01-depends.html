<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 인터랙티브 학습 — Chapter 3-1. Depends()</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PYTHON_CODE = [
      "from fastapi import FastAPI, Depends, Query",           // 0
      "",                                                       // 1
      "app = FastAPI()",                                        // 2
      "",                                                       // 3
      "# 공통 파라미터를 꺼내주는 함수 (의존성)",                  // 4
      "def common_params(",                                     // 5
      "    skip: int = Query(0),",                              // 6
      "    limit: int = Query(10),",                            // 7
      "):",                                                     // 8
      "    return {'skip': skip, 'limit': limit}",              // 9
      "",                                                       // 10
      "# Depends()로 주입 — 직접 호출하지 않는다",                // 11
      "@app.get('/users/')",                                    // 12
      "def list_users(params = Depends(common_params)):",       // 13
      "    return {'endpoint': 'users', **params}",             // 14
      "",                                                       // 15
      "# 같은 함수를 다른 엔드포인트에도 재사용",                  // 16
      "@app.get('/items/')",                                    // 17
      "def list_items(params = Depends(common_params)):",       // 18
      "    return {'endpoint': 'items', **params}",             // 19
    ];

    const STEPS = [
      {
        codeLine: 12,
        desc: "[요청 도착] 클라이언트가 GET /users/?skip=5&limit=20 을 요청합니다. FastAPI가 라우터를 찾았습니다.",
        depState: 'idle', routerState: 'idle', injectState: 'idle',
      },
      {
        codeLine: 13,
        desc: "[Depends 발견] 파라미터에 Depends(common_params)가 있습니다. FastAPI가 라우터를 실행하기 전에 먼저 common_params 함수를 호출합니다.",
        depState: 'found', routerState: 'idle', injectState: 'idle',
      },
      {
        codeLine: 5,
        desc: "[의존성 실행] common_params(skip=5, limit=20)가 실행됩니다. Query 파라미터를 꺼내서 {'skip': 5, 'limit': 20}을 반환합니다.",
        depState: 'running', routerState: 'idle', injectState: 'idle',
      },
      {
        codeLine: 9,
        desc: "[결과 주입] common_params가 반환한 {'skip': 5, 'limit': 20}이 params 변수에 주입됩니다. 개발자가 직접 호출한 게 아니라 FastAPI가 자동으로 꽂아준 것입니다.",
        depState: 'done', routerState: 'idle', injectState: 'injected',
      },
      {
        codeLine: 14,
        desc: "[라우터 실행] 이제 라우터 함수 list_users가 주입된 params를 사용해 응답을 만듭니다.",
        depState: 'done', routerState: 'active', injectState: 'injected',
      },
      {
        codeLine: 17,
        desc: "[재사용] 같은 common_params를 /items/ 엔드포인트에서도 Depends()로 등록할 수 있습니다. 중복 코드 없이 공통 로직을 여러 곳에서 공유하는 것이 Depends()의 핵심입니다.",
        depState: 'reuse', routerState: 'active', injectState: 'injected',
      },
    ];

    const DEP_CLASS = {
      'idle':    'bg-slate-100 border-slate-300 text-slate-500',
      'found':   'bg-amber-100 border-amber-400 text-amber-700',
      'running': 'bg-amber-100 border-amber-400 text-amber-700 animate-pulse',
      'done':    'bg-emerald-100 border-emerald-400 text-emerald-700',
      'reuse':   'bg-blue-100 border-blue-400 text-blue-700',
    };
    const ROUTER_CLASS = {
      'idle':   'bg-slate-100 border-slate-300 text-slate-500',
      'active': 'bg-emerald-100 border-emerald-400 text-emerald-700',
    };
    const INJECT_CLASS = {
      'idle':     'bg-slate-50 border-slate-200 text-slate-400',
      'injected': 'bg-emerald-50 border-emerald-300 text-emerald-700',
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx >= STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handlePrev = () => setCurrentStepIdx(prev => (prev > 0 ? prev - 1 : prev));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => { if (!isPlaying) return; const id = setInterval(() => handleNextRef.current(), 2200); return () => clearInterval(id); }, [isPlaying]);
      useEffect(() => { const h = (e) => { if (e.key === 'ArrowRight') handleNextRef.current(); if (e.key === 'ArrowLeft') handlePrevRef.current(); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, []);
      const togglePlay = () => { if (isEnd) { setCurrentStepIdx(0); setIsPlaying(true); return; } setIsPlaying(prev => !prev); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm text-slate-500">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum IV-3-1</span>
            </nav>

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-xl md:text-2xl font-bold text-slate-800 mb-2">Chapter 3-1. Depends() 동작 원리</h1>
              <p className="text-slate-600 text-sm leading-relaxed">
                의존성 주입은 <strong>"내가 필요한 것을 직접 만들지 않고, 누군가 만들어서 꽂아주는 방식"</strong>이다.
                <code className="text-xs bg-slate-100 px-1 rounded">Depends(함수)</code>를 파라미터에 선언하면
                FastAPI가 자동으로 그 함수를 실행하고 결과를 라우터에 주입한다.
              </p>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
                <h2 className="text-sm font-bold text-slate-600">의존성 주입 흐름</h2>

                <div className={`p-3 rounded-lg border-2 text-center transition-all duration-300 ${DEP_CLASS[stepData.depState]}`}>
                  <div className="text-xs font-bold mb-1">Depends(common_params)</div>
                  <div className="text-sm font-bold">
                    {stepData.depState === 'idle' && '대기'}
                    {stepData.depState === 'found' && '발견! 먼저 실행합니다'}
                    {stepData.depState === 'running' && '실행 중... skip=5, limit=20'}
                    {stepData.depState === 'done' && "완료 → {'skip': 5, 'limit': 20}"}
                    {stepData.depState === 'reuse' && '다른 엔드포인트에서도 재사용 가능!'}
                  </div>
                </div>

                <div className="text-center text-slate-400 text-lg">↓ 주입</div>

                <div className={`p-3 rounded-lg border-2 text-center transition-all duration-300 ${INJECT_CLASS[stepData.injectState]}`}>
                  <div className="text-xs font-bold mb-1">params 변수</div>
                  <div className="text-sm font-mono font-bold">
                    {stepData.injectState === 'injected' ? "{'skip': 5, 'limit': 20}" : '—'}
                  </div>
                </div>

                <div className="text-center text-slate-400 text-lg">↓</div>

                <div className={`p-3 rounded-lg border-2 text-center transition-all duration-300 ${ROUTER_CLASS[stepData.routerState]}`}>
                  <div className="text-xs font-bold mb-1">라우터 함수</div>
                  <div className="text-sm font-bold">
                    {stepData.routerState === 'active' ? "list_users(params) → 200 OK" : 'list_users — 대기'}
                  </div>
                </div>

                <div className="p-4 rounded-lg border bg-blue-50 border-blue-200 text-blue-800 text-sm leading-relaxed">
                  {stepData.desc}
                </div>
              </div>

              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between items-center">
                  <span>main.py — Depends()</span>
                  <span className="text-slate-500">line {stepData.codeLine + 1}</span>
                </div>
                <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
                  {PYTHON_CODE.map((line, idx) => (
                    <div key={idx} className={`px-4 py-0.5 whitespace-pre ${stepData.codeLine === idx ? 'bg-amber-100 text-amber-900 font-bold border-l-4 border-amber-400' : 'text-slate-700 border-l-4 border-transparent'}`}>
                      <span className="inline-block w-6 text-right mr-3 text-slate-400 select-none">{idx + 1}</span>{line || '\u00A0'}
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div className="flex items-center justify-center gap-3 flex-wrap">
              <button onClick={() => handlePrevRef.current()} disabled={currentStepIdx === 0} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="이전 단계">← 이전</button>
              <button onClick={togglePlay} className={`px-6 py-2 rounded-lg font-bold text-sm transition-colors ${isPlaying ? 'bg-amber-500 text-white hover:bg-amber-600' : 'bg-emerald-600 text-white hover:bg-emerald-700'}`} aria-label={isPlaying ? '정지' : (isEnd ? '처음부터 재생' : '자동 실행')}>{isPlaying ? '⏸ 정지' : (isEnd ? '⟳ 처음부터' : '▶ 자동 실행')}</button>
              <button onClick={() => handleNextRef.current()} disabled={isEnd} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="다음 단계">다음 →</button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <footer className="text-center text-xs text-slate-400 py-4">FastAPI 인터랙티브 학습 — Chapter 3-1. Depends() | 키보드 ← → 지원</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
