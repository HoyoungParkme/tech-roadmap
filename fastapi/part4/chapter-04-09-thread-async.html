<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — IV-4-9. def vs async def (ThreadPool)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-4-9. def vs async def (ThreadPool)
    학습 목표: def와 async def의 실행 방식 차이를 이해한다.
    핵심 비유: def = 대리 운전, async def = 직접 운전
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'def → ThreadPool에서 실행',
        desc: '일반 def 함수를 라우터에 등록하면 FastAPI가 ThreadPool(별도 스레드)에서 실행한다. "대리 운전"처럼 EventLoop가 직접 실행하지 않고 다른 스레드에 맡긴다. 동기 I/O(파일 읽기, requests 등)를 써도 EventLoop가 블로킹되지 않는다.',
        left: { label: 'def endpoint()', desc: 'ThreadPool 스레드에서 실행', icon: '🚗', status: '대리 운전' },
        right: { label: 'EventLoop', desc: '다른 요청 처리 계속', icon: '🔄', status: '블로킹 없음' },
      },
      {
        title: 'async def → EventLoop에서 실행',
        desc: 'async def 함수는 EventLoop에서 직접 실행된다. "직접 운전". await를 만나면 제어권을 양보하고 다른 코루틴이 실행된다. 단, await 없이 긴 작업을 하면 EventLoop가 멈춘다(블로킹)!',
        left: { label: 'async def endpoint()', desc: 'EventLoop에서 직접 실행', icon: '🏎️', status: '직접 운전' },
        right: { label: 'await', desc: '제어권 양보 → 다른 코루틴 실행', icon: '↔️', status: '협력적 멀티태스킹' },
      },
      {
        title: '언제 어떤 것을 쓰나',
        desc: 'async def: httpx, asyncpg, aiofiles 등 async 라이브러리 사용 시. def: requests, psycopg2, open() 등 동기 라이브러리 사용 시. 확실하지 않으면 def를 쓰자 — FastAPI가 ThreadPool로 안전하게 처리한다.',
        table: [
          { when: 'async 라이브러리 (httpx, asyncpg)', use: 'async def', reason: 'await로 제어권 양보' },
          { when: '동기 라이브러리 (requests, psycopg2)', use: 'def', reason: 'ThreadPool이 대신 실행' },
          { when: '단순 계산 (CPU bound 아닌)', use: '둘 다 OK', reason: '짧으면 상관없음' },
          { when: '잘 모르겠다', use: 'def', reason: '안전한 기본값' },
        ],
      },
      {
        title: 'Uvicorn → Starlette → FastAPI 3계층',
        desc: 'Uvicorn: ASGI 서버 (이벤트 루프 + 소켓 관리). Starlette: ASGI 프레임워크 (라우팅, 미들웨어). FastAPI: Starlette 위에 Pydantic 검증 + Swagger 추가. def 함수를 ThreadPool로 보내는 것은 Starlette 계층이 담당한다.',
        layers: [
          { name: 'Uvicorn', role: 'ASGI 서버 — EventLoop, 소켓', color: 'bg-sky-100 border-sky-300' },
          { name: 'Starlette', role: '프레임워크 — 라우팅, 미들웨어, ThreadPool', color: 'bg-violet-100 border-violet-300' },
          { name: 'FastAPI', role: '+ Pydantic 검증, Swagger UI, DI', color: 'bg-emerald-100 border-emerald-300' },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum IV-4-9</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. FastAPI 코어 &gt; Chapter 4. 비동기 처리</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-4-9. def vs async def (ThreadPool)</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                <strong>def = 대리 운전</strong> (ThreadPool이 대신), <strong>async def = 직접 운전</strong> (EventLoop). 차이를 알아야 블로킹 없는 API를 만든다.
              </p>
            </header>

            {stepData.left && stepData.right && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div className="p-4 rounded-xl border-2 border-amber-200 bg-amber-50 text-center">
                  <div className="text-3xl mb-2">{stepData.left.icon}</div>
                  <div className="font-bold text-sm font-mono">{stepData.left.label}</div>
                  <div className="text-xs text-slate-600 mt-1">{stepData.left.desc}</div>
                  <div className="mt-2 text-xs font-bold text-amber-700">{stepData.left.status}</div>
                </div>
                <div className="p-4 rounded-xl border-2 border-sky-200 bg-sky-50 text-center">
                  <div className="text-3xl mb-2">{stepData.right.icon}</div>
                  <div className="font-bold text-sm font-mono">{stepData.right.label}</div>
                  <div className="text-xs text-slate-600 mt-1">{stepData.right.desc}</div>
                  <div className="mt-2 text-xs font-bold text-sky-700">{stepData.right.status}</div>
                </div>
              </div>
            )}

            {stepData.table && (
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <table className="w-full text-xs">
                  <thead className="bg-slate-100">
                    <tr>
                      <th className="px-3 py-2 text-left font-bold">상황</th>
                      <th className="px-3 py-2 text-left font-bold">사용</th>
                      <th className="px-3 py-2 text-left font-bold">이유</th>
                    </tr>
                  </thead>
                  <tbody>
                    {stepData.table.map((row, i) => (
                      <tr key={i} className="border-t border-slate-100">
                        <td className="px-3 py-2">{row.when}</td>
                        <td className="px-3 py-2 font-mono font-bold">{row.use}</td>
                        <td className="px-3 py-2 text-slate-600">{row.reason}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}

            {stepData.layers && (
              <div className="space-y-2">
                {stepData.layers.map((layer, i) => (
                  <div key={i} className={`p-4 rounded-xl border-2 ${layer.color}`}>
                    <div className="font-bold text-sm">{layer.name}</div>
                    <div className="text-xs text-slate-600 mt-1">{layer.role}</div>
                  </div>
                ))}
              </div>
            )}

            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">Step {currentStepIdx + 1}/{STEPS.length}: {stepData.title}</h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-04-08-pydantic-advanced.html" className="text-slate-500 hover:text-slate-700">&larr; IV-4-8 Pydantic 심화</a>
              <a href="./chapter-04-10-async-db.html" className="text-blue-600 hover:text-blue-800 font-medium">IV-4-10 비동기 DB &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
