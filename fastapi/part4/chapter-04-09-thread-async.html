<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI нХЩмКµ вАФ IV-4-9. def vs async def (ThreadPool)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-4-9. def vs async def (ThreadPool)
    нХЩмКµ л™©нСЬ: defмЩА async defмЭШ мЛ§нЦЙ л∞©мЛЭ м∞®мЭіл•Љ мЭінХінХЬлЛ§.
    нХµмЛђ лєДмЬ†: def = лМАл¶ђ мЪім†Д, async def = мІБм†С мЪім†Д
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'def вЖТ ThreadPoolмЧРмДЬ мЛ§нЦЙ',
        desc: 'мЭЉл∞Ш def нХ®мИШл•Љ лЭЉмЪ∞нД∞мЧР лУ±л°ЭнХШл©і FastAPIк∞А ThreadPool(л≥ДлПД мК§л†ИлУЬ)мЧРмДЬ мЛ§нЦЙнХЬлЛ§. "лМАл¶ђ мЪім†Д"м≤ШлЯЉ EventLoopк∞А мІБм†С мЛ§нЦЙнХШмІА мХКк≥† лЛ§л•Є мК§л†ИлУЬмЧР лІ°кЄілЛ§. лПЩкЄ∞ I/O(нММмЭЉ мЭљкЄ∞, requests лУ±)л•Љ мН®лПД EventLoopк∞А лЄФл°ЬнВєлРШмІА мХКлКФлЛ§.',
        left: { label: 'def endpoint()', desc: 'ThreadPool мК§л†ИлУЬмЧРмДЬ мЛ§нЦЙ', icon: 'рЯЪЧ', status: 'лМАл¶ђ мЪім†Д' },
        right: { label: 'EventLoop', desc: 'лЛ§л•Є мЪФм≤≠ м≤Шл¶ђ к≥ДмЖН', icon: 'рЯФД', status: 'лЄФл°ЬнВє мЧЖмЭМ' },
      },
      {
        title: 'async def вЖТ EventLoopмЧРмДЬ мЛ§нЦЙ',
        desc: 'async def нХ®мИШлКФ EventLoopмЧРмДЬ мІБм†С мЛ§нЦЙлРЬлЛ§. "мІБм†С мЪім†Д". awaitл•Љ лІМлВШл©і м†ЬмЦікґМмЭД мЦСл≥інХШк≥† лЛ§л•Є мљФл£®нЛімЭі мЛ§нЦЙлРЬлЛ§. лЛ®, await мЧЖмЭі кЄі мЮСмЧЕмЭД нХШл©і EventLoopк∞А л©ИмґШлЛ§(лЄФл°ЬнВє)!',
        left: { label: 'async def endpoint()', desc: 'EventLoopмЧРмДЬ мІБм†С мЛ§нЦЙ', icon: 'рЯПОпЄП', status: 'мІБм†С мЪім†Д' },
        right: { label: 'await', desc: 'м†ЬмЦікґМ мЦСл≥і вЖТ лЛ§л•Є мљФл£®нЛі мЛ§нЦЙ', icon: 'вЖФпЄП', status: 'нШСл†•м†Б л©АнЛ∞нГЬмК§нВє' },
      },
      {
        title: 'мЦЄм†Ь мЦілЦ§ к≤ГмЭД мУ∞лВШ',
        desc: 'async def: httpx, asyncpg, aiofiles лУ± async лЭЉмЭілЄМлЯђл¶ђ мВђмЪ© мЛЬ. def: requests, psycopg2, open() лУ± лПЩкЄ∞ лЭЉмЭілЄМлЯђл¶ђ мВђмЪ© мЛЬ. нЩХмЛ§нХШмІА мХКмЬЉл©і defл•Љ мУ∞мЮР вАФ FastAPIк∞А ThreadPoolл°Ь мХИм†ДнХШк≤М м≤Шл¶ђнХЬлЛ§.',
        table: [
          { when: 'async лЭЉмЭілЄМлЯђл¶ђ (httpx, asyncpg)', use: 'async def', reason: 'awaitл°Ь м†ЬмЦікґМ мЦСл≥і' },
          { when: 'лПЩкЄ∞ лЭЉмЭілЄМлЯђл¶ђ (requests, psycopg2)', use: 'def', reason: 'ThreadPoolмЭі лМАмЛ† мЛ§нЦЙ' },
          { when: 'лЛ®мИЬ к≥ДмВ∞ (CPU bound мХДлЛМ)', use: 'лСШ лЛ§ OK', reason: 'мІІмЬЉл©і мГБкіАмЧЖмЭМ' },
          { when: 'мЮШ л™®л•ік≤†лЛ§', use: 'def', reason: 'мХИм†ДнХЬ кЄ∞л≥Єк∞Т' },
        ],
      },
      {
        title: 'Uvicorn вЖТ Starlette вЖТ FastAPI 3к≥ДмЄµ',
        desc: 'Uvicorn: ASGI мДЬл≤Д (мЭіл≤§нКЄ л£®нФД + мЖМмЉУ кіАл¶ђ). Starlette: ASGI нФДл†ИмЮДмЫМнБђ (лЭЉмЪ∞нМЕ, лѓЄлУ§мЫ®мЦі). FastAPI: Starlette мЬДмЧР Pydantic к≤Ам¶Э + Swagger мґФк∞А. def нХ®мИШл•Љ ThreadPoolл°Ь л≥ілВілКФ к≤ГмЭА Starlette к≥ДмЄµмЭі лЛілЛєнХЬлЛ§.',
        layers: [
          { name: 'Uvicorn', role: 'ASGI мДЬл≤Д вАФ EventLoop, мЖМмЉУ', color: 'bg-sky-100 border-sky-300' },
          { name: 'Starlette', role: 'нФДл†ИмЮДмЫМнБђ вАФ лЭЉмЪ∞нМЕ, лѓЄлУ§мЫ®мЦі, ThreadPool', color: 'bg-violet-100 border-violet-300' },
          { name: 'FastAPI', role: '+ Pydantic к≤Ам¶Э, Swagger UI, DI', color: 'bg-emerald-100 border-emerald-300' },
        ],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; нЧИлЄМл°Ь лПМмХДк∞АкЄ∞</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum IV-4-9</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. FastAPI мљФмЦі &gt; Chapter 4. лєДлПЩкЄ∞ м≤Шл¶ђ</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-4-9. def vs async def (ThreadPool)</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                <strong>def = лМАл¶ђ мЪім†Д</strong> (ThreadPoolмЭі лМАмЛ†), <strong>async def = мІБм†С мЪім†Д</strong> (EventLoop). м∞®мЭіл•Љ мХМмХДмХЉ лЄФл°ЬнВє мЧЖлКФ APIл•Љ лІМлУ†лЛ§.
              </p>
            </header>

            {stepData.left && stepData.right && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div className="p-4 rounded-xl border-2 border-amber-200 bg-amber-50 text-center">
                  <div className="text-3xl mb-2">{stepData.left.icon}</div>
                  <div className="font-bold text-sm font-mono">{stepData.left.label}</div>
                  <div className="text-xs text-slate-600 mt-1">{stepData.left.desc}</div>
                  <div className="mt-2 text-xs font-bold text-amber-700">{stepData.left.status}</div>
                </div>
                <div className="p-4 rounded-xl border-2 border-sky-200 bg-sky-50 text-center">
                  <div className="text-3xl mb-2">{stepData.right.icon}</div>
                  <div className="font-bold text-sm font-mono">{stepData.right.label}</div>
                  <div className="text-xs text-slate-600 mt-1">{stepData.right.desc}</div>
                  <div className="mt-2 text-xs font-bold text-sky-700">{stepData.right.status}</div>
                </div>
              </div>
            )}

            {stepData.table && (
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <table className="w-full text-xs">
                  <thead className="bg-slate-100">
                    <tr>
                      <th className="px-3 py-2 text-left font-bold">мГБнЩ©</th>
                      <th className="px-3 py-2 text-left font-bold">мВђмЪ©</th>
                      <th className="px-3 py-2 text-left font-bold">мЭімЬ†</th>
                    </tr>
                  </thead>
                  <tbody>
                    {stepData.table.map((row, i) => (
                      <tr key={i} className="border-t border-slate-100">
                        <td className="px-3 py-2">{row.when}</td>
                        <td className="px-3 py-2 font-mono font-bold">{row.use}</td>
                        <td className="px-3 py-2 text-slate-600">{row.reason}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}

            {stepData.layers && (
              <div className="space-y-2">
                {stepData.layers.map((layer, i) => (
                  <div key={i} className={`p-4 rounded-xl border-2 ${layer.color}`}>
                    <div className="font-bold text-sm">{layer.name}</div>
                    <div className="text-xs text-slate-600 mt-1">{layer.role}</div>
                  </div>
                ))}
              </div>
            )}

            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">Step {currentStepIdx + 1}/{STEPS.length}: {stepData.title}</h3>
                <span className="text-xs text-emerald-200">нВ§л≥ілУЬ &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">м≤ШмЭМ</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; мЭім†Д</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[80px]">{isPlaying ? 'мЭЉмЛЬм†ХмІА' : currentStepIdx >= STEPS.length - 1 ? 'лЛ§мЛЬл≥ікЄ∞' : 'мЮРлПЩмЮђмГЭ'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">лЛ§мЭМ &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-04-08-pydantic-advanced.html" className="text-slate-500 hover:text-slate-700">&larr; IV-4-8 Pydantic мЛђнЩФ</a>
              <a href="./chapter-04-10-async-db.html" className="text-blue-600 hover:text-blue-800 font-medium">IV-4-10 лєДлПЩкЄ∞ DB &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
