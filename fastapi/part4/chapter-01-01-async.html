<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 인터랙티브 학습 — Chapter 1-1. 비동기 I/O &amp; Event Loop</title>

  <!-- Tailwind CSS Play CDN: 학습 자료용. 프로덕션에서는 PostCSS 빌드를 권장. -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 (development 버전: 학습용이므로 에러 메시지 상세 버전 사용) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel Standalone 7.x: 브라우저에서 JSX를 실시간 변환 (Fragment shorthand `<>` 지원) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    ─────────────────────────────────────────────────────────────
    FastAPI Chapter 1-1 — 비동기 I/O와 Event Loop
    ─────────────────────────────────────────────────────────────
    학습 목표 : POST 요청이 FastAPI 내부에서 Pydantic 검증 → Event Loop 비동기 대기
               → DB I/O 완료 → 응답 반환까지 거치는 논블로킹 흐름을 단계별로 체험한다.
    조작법   : "자동 실행" 버튼으로 재생, 이전/다음 버튼으로 수동 전환.
    구조 안내 : 허브(목차)는 `./index.html`. 새 챕터를 추가할 때는
               `chapter-XX-XX-NAME.html`을 새로 만들고 `index.html`의 카드 배열에
               1줄을 추가하면 된다 — 이 파일은 손대지 않아도 된다.
    ─────────────────────────────────────────────────────────────
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // -----------------------------------------
    // 1. 교육용 Python 코드 (FastAPI 기본 구조)
    // -----------------------------------------
    const PYTHON_CODE = [
      "from fastapi import FastAPI",
      "from pydantic import BaseModel",
      "import asyncio",
      "",
      "app = FastAPI()",
      "",
      "# 1. Pydantic 데이터 검증 모델 (엄격한 주문 검수원)",
      "class User(BaseModel):",
      "    name: str",
      "    age: int",
      "",
      "# 2. 비동기 라우터 (드라이브스루 점원)",
      "@app.post('/users/')",
      "async def create_user(user: User):",
      "    # 3. 비동기 I/O 대기 (주방에 지시 후 다음 손님 응대)",
      "    await asyncio.sleep(1) # DB 저장 시뮬레이션",
      "    ",
      "    # 4. 작업 완료 후 응답 반환",
      "    return {'msg': f'{user.name}님 등록', 'age': user.age}"
    ];

    // -----------------------------------------
    // 2. 시뮬레이션 스텝 정의
    // -----------------------------------------
    const STEPS = [
      {
        // codeLine을 12로 지정: 실제 엔드포인트 선언(@app.post('/users/')) 줄.
        // (이전 값 11은 주석 줄을 가리켜 Step 1 설명과 일치하지 않았다.)
        codeLine: 12,
        desc: "[요청 대기] 클라이언트로부터 '/users/' 엔드포인트로 POST 요청이 들어옵니다. (데이터: name='Alice', age=25)",
        clientState: 'sending',
        fastApiState: 'idle',
        pydanticState: 'idle',
        eventLoopState: 'idle',
        dbState: 'idle',
        dataObj: { name: 'Alice', age: 25 }
      },
      {
        codeLine: 7,
        desc: "[데이터 검증] 라우터에 도달하기 전, Pydantic 모델이 개입합니다. name이 문자열인지, age가 정수인지 엄격하게 타입 검사를 수행합니다.",
        clientState: 'waiting',
        fastApiState: 'receiving',
        pydanticState: 'validating',
        eventLoopState: 'idle',
        dbState: 'idle',
        dataObj: { name: 'Alice', age: 25 }
      },
      {
        codeLine: 13,
        desc: "[라우터 진입] 검증을 통과한 데이터가 User 객체로 변환되어 비동기 함수(async def)인 create_user에 전달됩니다.",
        clientState: 'waiting',
        fastApiState: 'processing',
        pydanticState: 'passed',
        eventLoopState: 'active',
        dbState: 'idle',
        dataObj: { name: 'Alice', age: 25 }
      },
      {
        codeLine: 15,
        desc: "[비동기 대기 - 핵심] await 키워드를 만났습니다. DB에 저장하는 동안 Event Loop는 이 작업의 완료를 기다리지 않고 스레드를 해제하여 다른 요청을 받을 준비를 합니다. (Pydantic 검증은 요청 수신 시에만 개입하므로 이 단계부터는 대기 상태로 돌아갑니다.)",
        clientState: 'waiting',
        fastApiState: 'awaiting',
        pydanticState: 'idle',
        eventLoopState: 'free', // 핵심: 루프가 해제됨
        dbState: 'saving',
        dataObj: { status: 'DB I/O 중...' }
      },
      {
        codeLine: 18,
        desc: "[응답 반환] DB 저장이 완료되면 Event Loop가 다시 제어권을 가져와 JSON 형태로 응답을 클라이언트에게 반환합니다.",
        clientState: 'received',
        fastApiState: 'responding',
        pydanticState: 'idle',
        eventLoopState: 'active',
        dbState: 'done',
        dataObj: { msg: 'Alice님 등록', age: 25 }
      }
    ];

    // -----------------------------------------
    // 3. 구문 강조(Syntax Highlighting) 헬퍼
    // -----------------------------------------
    const KEYWORDS = new Set(['from', 'import', 'class', 'async', 'def', 'await', 'return']);
    const BUILTINS = new Set(['FastAPI', 'BaseModel', 'str', 'int', 'f']);
    const DECORATORS = new Set(['@app.post']);
    const PUNCTUATION_STRING = new Set(['=', ':', "'", '"']);
    // URL 경로 패턴(`/users/`, `/users/items/` 등)을 하나의 토큰으로 다루기 위한 정규식.
    const PATH_PATTERN = /^\/[\w/]*\/?$/;

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line;
      let commentPart = '';

      if (commentIdx !== -1) {
        codePart = line.slice(0, commentIdx);
        commentPart = line.slice(commentIdx);
      }

      if (!codePart.trim() && commentPart) {
        return <span className="text-slate-500 italic">{commentPart}</span>;
      }

      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|<|>|\*|'|")/g);

      const highlightedTokens = tokens.map((token, i) => {
        if (KEYWORDS.has(token)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (BUILTINS.has(token)) return <span key={i} className="text-cyan-400">{token}</span>;
        if (DECORATORS.has(token)) return <span key={i} className="text-yellow-300 font-bold">{token}</span>;
        if (token.trim() !== '' && !isNaN(token)) return <span key={i} className="text-orange-300">{token}</span>;
        if (PUNCTUATION_STRING.has(token) || PATH_PATTERN.test(token)) {
          return <span key={i} className="text-emerald-400">{token}</span>;
        }
        return <span key={i} className="text-slate-200">{token}</span>;
      });

      return (
        <>
          {highlightedTokens}
          {commentPart && <span className="text-slate-500 italic">{commentPart}</span>}
        </>
      );
    };

    // -----------------------------------------
    // 4. 메인 앱 컴포넌트
    // -----------------------------------------
    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      // handleNext는 setInterval 콜백에서 호출되므로 "항상 최신 함수"를 참조해야 한다.
      // useCallback + useEffect deps 조합을 쓰면 스텝이 전환될 때마다 타이머가
      // 재설정되어 간격이 불안정해지므로, Ref 패턴으로 우회한다.
      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      // handlePrev는 setInterval이 참조하지 않으므로 useCallback이 불필요하다.
      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const togglePlay = () => {
        // 마지막 스텝에서 재생을 누르면 처음부터 다시 시작한다.
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 2500);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      // 상태별 색상 및 애니메이션 클래스 생성 헬퍼
      const getStatusClass = (state, baseClass) => {
        if (state === 'active' || state === 'validating' || state === 'saving') {
          return `${baseClass} bg-emerald-100 border-emerald-500 ring-2 ring-emerald-300 shadow-lg scale-105 transition-all duration-500`;
        }
        if (state === 'free') {
          return `${baseClass} bg-blue-50 border-blue-400 border-dashed text-blue-600 transition-all duration-500`;
        }
        if (state === 'passed' || state === 'done' || state === 'received') {
          return `${baseClass} bg-slate-100 border-emerald-500 text-emerald-700 transition-all duration-500`;
        }
        return `${baseClass} bg-white border-slate-200 text-slate-400 transition-all duration-500`;
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">

            {/* 허브 네비게이션 */}
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-emerald-700 hover:text-emerald-900 font-medium">
                <span aria-hidden="true">←</span> 허브로 돌아가기
              </a>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-xl">F</div>
                <h1 className="text-2xl font-bold text-slate-800">Chapter 1-1. 비동기 I/O &amp; Event Loop</h1>
              </div>
              <p className="text-slate-600">
                FastAPI의 핵심인 <b>Pydantic을 통한 자동 데이터 검증</b>과 <b>Event Loop를 활용한 비동기(Async) 논블로킹 I/O</b> 처리 과정을 시뮬레이션합니다.
              </p>
            </header>

            {/* 상단: 현재 단계 설명 */}
            <div className="bg-emerald-700 text-white p-5 rounded-xl shadow-sm border border-emerald-800 flex flex-col justify-center min-h-[100px]">
              <h3 className="text-xs font-bold text-emerald-200 mb-2 uppercase tracking-wider">현재 아키텍처 상태</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 좌우 레이아웃 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch h-full">

              {/* 왼쪽: 아키텍처 다이어그램 및 시각화 */}
              <div className="flex flex-col space-y-6">

                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1 flex flex-col min-h-[400px] justify-between relative overflow-hidden">

                  {/* 클라이언트 영역 */}
                  <div className="flex justify-center mb-4">
                    <div className={getStatusClass(stepData.clientState, "px-6 py-3 rounded-lg border-2 font-bold w-48 text-center z-10")}>
                      <div className="text-xs mb-1 uppercase tracking-widest opacity-70">Client</div>
                      {stepData.clientState === 'sending' ? 'POST Request' : stepData.clientState === 'received' ? '200 OK' : 'Waiting...'}
                    </div>
                  </div>

                  {/* 화살표 방향 및 데이터 패킷 */}
                  <div className="flex justify-center my-2 h-16 relative">
                    <div className="w-1 border-l-2 border-dashed border-slate-300 h-full absolute left-1/2"></div>
                    <div className="bg-slate-800 text-emerald-400 text-xs font-mono p-2 rounded shadow-md z-10 self-center absolute">
                      {JSON.stringify(stepData.dataObj)}
                    </div>
                  </div>

                  {/* FastAPI 내부 영역 */}
                  <div className="border-2 border-slate-200 rounded-xl p-4 bg-slate-50 flex-1 flex flex-col justify-around relative">
                    <div className="absolute top-0 left-0 bg-slate-200 text-slate-600 text-xs font-bold px-3 py-1 rounded-br-lg">FastAPI Application</div>

                    {/* 1. Pydantic Validator */}
                    <div className="flex justify-center mt-4">
                      <div className={getStatusClass(stepData.pydanticState, "px-4 py-3 rounded-lg border-2 font-bold w-5/6 text-center flex items-center justify-center gap-2")}>
                        <div className="w-6 h-6 rounded bg-current opacity-20"></div>
                        <div>
                          <div className="text-xs uppercase tracking-widest opacity-70">Pydantic</div>
                          Data Validation
                        </div>
                      </div>
                    </div>

                    {/* 2. Event Loop & Router */}
                    <div className="flex justify-center my-4">
                      <div className={getStatusClass(stepData.eventLoopState, "px-4 py-4 rounded-full border-2 font-bold w-40 h-40 flex flex-col items-center justify-center text-center")}>
                        <div className="text-xs uppercase tracking-widest opacity-70 mb-1">Event Loop</div>
                        <div className="text-sm">async def<br/>create_user</div>
                        {stepData.eventLoopState === 'free' && (
                          <div className="mt-2 text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded-full">Thread Free!</div>
                        )}
                      </div>
                    </div>
                  </div>

                  {/* 화살표 */}
                  <div className="flex justify-center h-8 relative">
                    <div className="w-1 border-l-2 border-dashed border-slate-300 h-full absolute left-1/2"></div>
                  </div>

                  {/* DB/IO 영역 */}
                  <div className="flex justify-center">
                    <div className={getStatusClass(stepData.dbState, "px-6 py-4 rounded-b-xl rounded-t-sm border-2 font-bold w-48 text-center")}>
                      <div className="text-xs uppercase tracking-widest opacity-70">Database / I/O</div>
                      asyncio.sleep(1)
                    </div>
                  </div>

                </div>

                {/* 컨트롤 바 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-emerald-600 hover:bg-emerald-700 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying ? (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                      ) : (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                      )}
                    </button>
                    <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                  </div>
                  <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                    Step: {currentStepIdx + 1} / {STEPS.length}
                  </div>
                </div>
              </div>

              {/* 오른쪽: 코드 뷰어 */}
              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-slate-900 flex flex-col">
                  <div className="p-5 overflow-y-auto flex-1 text-sm font-mono text-slate-300 scroll-smooth leading-relaxed">
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div
                          key={idx}
                          className={`flex px-2 py-0.5 rounded transition-colors ${isActive ? 'bg-emerald-900/60 text-white font-bold border-l-4 border-emerald-400 shadow-inner' : 'border-l-4 border-transparent'}`}
                        >
                          <span className="text-slate-600 select-none mr-4 w-6 text-right inline-block shrink-0 tabular-nums">{idx + 1}</span>
                          <span className="whitespace-pre">{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    // -----------------------------------------
    // 5. 마운트
    // -----------------------------------------
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
