<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 인터랙티브 학습 — Chapter 3-2. DB 세션 관리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PYTHON_CODE = [
      "from fastapi import FastAPI, Depends",                  // 0
      "from sqlalchemy.orm import Session",                    // 1
      "from database import SessionLocal",                     // 2
      "",                                                       // 3
      "app = FastAPI()",                                        // 4
      "",                                                       // 5
      "# yield 기반 의존성 — 세션 생명주기 관리",                 // 6
      "def get_db():",                                          // 7
      "    db = SessionLocal()      # 세션 열기 (물 채우기)",    // 8
      "    try:",                                                // 9
      "        yield db              # 라우터에 세션 전달",       // 10
      "    finally:",                                            // 11
      "        db.close()            # 세션 닫기 (물 비우기)",    // 12
      "",                                                       // 13
      "@app.get('/users/')",                                    // 14
      "def list_users(db: Session = Depends(get_db)):",         // 15
      "    users = db.query(User).all()",                       // 16
      "    return users",                                        // 17
    ];

    const STEPS = [
      {
        codeLine: 14,
        desc: "[요청 도착] 클라이언트가 GET /users/를 요청합니다. Depends(get_db)가 선언되어 있으므로 FastAPI가 먼저 get_db()를 호출합니다.",
        sessionState: 'idle', yieldState: 'idle', routerState: 'idle', cleanupState: 'idle',
      },
      {
        codeLine: 8,
        desc: "[세션 열기] db = SessionLocal() — 설거지통에 물을 채우듯, DB 연결(세션)을 하나 엽니다. 이제 이 세션으로 DB 작업을 할 수 있습니다.",
        sessionState: 'open', yieldState: 'idle', routerState: 'idle', cleanupState: 'idle',
      },
      {
        codeLine: 10,
        desc: "[yield — 세션 전달] yield db — 열어둔 세션을 라우터 함수의 db 파라미터에 넘겨줍니다. yield 이후 코드는 아직 실행하지 않고 대기합니다.",
        sessionState: 'open', yieldState: 'yielded', routerState: 'idle', cleanupState: 'idle',
      },
      {
        codeLine: 16,
        desc: "[라우터 실행] 라우터 함수가 주입받은 db 세션으로 db.query(User).all()을 실행합니다. 세션은 열려 있는 상태입니다.",
        sessionState: 'open', yieldState: 'yielded', routerState: 'active', cleanupState: 'idle',
      },
      {
        codeLine: 12,
        desc: "[세션 닫기] 라우터 실행이 끝나면 yield 이후의 finally 블록이 실행됩니다. db.close() — 설거지통의 물을 비우듯 세션을 닫습니다. 닫지 않으면 DB 커넥션이 쌓여 문제가 됩니다.",
        sessionState: 'closed', yieldState: 'done', routerState: 'active', cleanupState: 'done',
      },
    ];

    const SESSION_CLASS = {
      'idle':   'bg-slate-100 border-slate-300 text-slate-500',
      'open':   'bg-blue-100 border-blue-400 text-blue-700',
      'closed': 'bg-slate-200 border-slate-400 text-slate-600',
    };
    const YIELD_CLASS = {
      'idle':    'bg-slate-50 border-slate-200 text-slate-400',
      'yielded': 'bg-amber-100 border-amber-300 text-amber-700',
      'done':    'bg-emerald-100 border-emerald-300 text-emerald-700',
    };
    const ROUTER_CLASS = {
      'idle':   'bg-slate-100 border-slate-300 text-slate-500',
      'active': 'bg-emerald-100 border-emerald-400 text-emerald-700',
    };
    const CLEANUP_CLASS = {
      'idle': 'bg-slate-50 border-slate-200 text-slate-400',
      'done': 'bg-emerald-100 border-emerald-400 text-emerald-700',
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx >= STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handlePrev = () => setCurrentStepIdx(prev => (prev > 0 ? prev - 1 : prev));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => { if (!isPlaying) return; const id = setInterval(() => handleNextRef.current(), 2500); return () => clearInterval(id); }, [isPlaying]);
      useEffect(() => { const h = (e) => { if (e.key === 'ArrowRight') handleNextRef.current(); if (e.key === 'ArrowLeft') handlePrevRef.current(); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, []);
      const togglePlay = () => { if (isEnd) { setCurrentStepIdx(0); setIsPlaying(true); return; } setIsPlaying(prev => !prev); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm text-slate-500">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum IV-3-2</span>
            </nav>

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-xl md:text-2xl font-bold text-slate-800 mb-2">Chapter 3-2. DB 세션 관리 (yield)</h1>
              <p className="text-slate-600 text-sm leading-relaxed">
                DB 세션은 <strong>설거지통</strong>이다. 요청이 오면 물을 채우고(<code className="text-xs bg-slate-100 px-1 rounded">SessionLocal()</code>),
                요청이 끝나면 반드시 물을 비운다(<code className="text-xs bg-slate-100 px-1 rounded">db.close()</code>).
                <code className="text-xs bg-slate-100 px-1 rounded">yield</code>가 이 생명주기를 자동으로 관리한다.
              </p>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
                <h2 className="text-sm font-bold text-slate-600">세션 생명주기</h2>

                {/* 세션 상태 */}
                <div className={`p-3 rounded-lg border-2 text-center transition-all duration-300 ${SESSION_CLASS[stepData.sessionState]}`}>
                  <div className="text-2xl mb-1">{stepData.sessionState === 'open' ? '🟢' : stepData.sessionState === 'closed' ? '⚪' : '⚪'}</div>
                  <div className="text-xs font-bold">DB 세션 (설거지통)</div>
                  <div className="text-sm font-bold">
                    {stepData.sessionState === 'idle' && '대기'}
                    {stepData.sessionState === 'open' && '열림 — 물 채워짐'}
                    {stepData.sessionState === 'closed' && '닫힘 — 물 비워짐'}
                  </div>
                </div>

                {/* yield 상태 */}
                <div className={`p-3 rounded-lg border-2 text-center transition-all duration-300 ${YIELD_CLASS[stepData.yieldState]}`}>
                  <div className="text-xs font-bold mb-1">yield db</div>
                  <div className="text-sm font-bold">
                    {stepData.yieldState === 'idle' && '대기'}
                    {stepData.yieldState === 'yielded' && '세션을 라우터에 전달 중...'}
                    {stepData.yieldState === 'done' && '완료 → finally 블록 실행'}
                  </div>
                </div>

                {/* 라우터 */}
                <div className={`p-3 rounded-lg border-2 text-center transition-all duration-300 ${ROUTER_CLASS[stepData.routerState]}`}>
                  <div className="text-xs font-bold mb-1">라우터 (list_users)</div>
                  <div className="text-sm font-bold font-mono">
                    {stepData.routerState === 'active' ? 'db.query(User).all() → 200 OK' : '대기'}
                  </div>
                </div>

                {/* 정리 */}
                <div className={`p-3 rounded-lg border-2 text-center transition-all duration-300 ${CLEANUP_CLASS[stepData.cleanupState]}`}>
                  <div className="text-xs font-bold mb-1">finally: db.close()</div>
                  <div className="text-sm font-bold">
                    {stepData.cleanupState === 'done' ? '세션 정리 완료' : '—'}
                  </div>
                </div>

                <div className="p-4 rounded-lg border bg-blue-50 border-blue-200 text-blue-800 text-sm leading-relaxed">
                  {stepData.desc}
                </div>
              </div>

              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between items-center">
                  <span>main.py — DB 세션 (yield)</span>
                  <span className="text-slate-500">line {stepData.codeLine + 1}</span>
                </div>
                <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
                  {PYTHON_CODE.map((line, idx) => (
                    <div key={idx} className={`px-4 py-0.5 whitespace-pre ${stepData.codeLine === idx ? 'bg-amber-100 text-amber-900 font-bold border-l-4 border-amber-400' : 'text-slate-700 border-l-4 border-transparent'}`}>
                      <span className="inline-block w-6 text-right mr-3 text-slate-400 select-none">{idx + 1}</span>{line || '\u00A0'}
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div className="flex items-center justify-center gap-3 flex-wrap">
              <button onClick={() => handlePrevRef.current()} disabled={currentStepIdx === 0} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="이전 단계">← 이전</button>
              <button onClick={togglePlay} className={`px-6 py-2 rounded-lg font-bold text-sm transition-colors ${isPlaying ? 'bg-amber-500 text-white hover:bg-amber-600' : 'bg-emerald-600 text-white hover:bg-emerald-700'}`} aria-label={isPlaying ? '정지' : (isEnd ? '처음부터 재생' : '자동 실행')}>{isPlaying ? '⏸ 정지' : (isEnd ? '⟳ 처음부터' : '▶ 자동 실행')}</button>
              <button onClick={() => handleNextRef.current()} disabled={isEnd} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="다음 단계">다음 →</button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <footer className="text-center text-xs text-slate-400 py-4">FastAPI 인터랙티브 학습 — Chapter 3-2. DB 세션 관리 | 키보드 ← → 지원</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
