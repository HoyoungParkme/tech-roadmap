            '',
            '@router.post("/", response_model=UserOut, status_code=201)',
            'def create_user(',
            '    payload: UserCreate,',
            '    db: Session = Depends(get_db),',
            ') -> User:',
            '    """사용자 생성.',
            '',
            '    흐름:',
            '        1) db.add()  : 스테이징 (아직 DB 반영 X)',
            '        2) db.commit(): 확정 (DB 에 INSERT 반영)',
            '        3) 예외 발생 시 db.rollback() 으로 원상 복구',
            '        4) db.close() 는 get_db 의 finally 가 자동 처리',
            '    """',
            '    new_user = User(email=payload.email, name=payload.name)',
            '    db.add(new_user)              # ① 스테이징',
            '    try:',
            '        db.commit()               # ② 확정 (INSERT 실행)',
            '        db.refresh(new_user)      #   생성된 id 등을 다시 읽기',
            '    except SQLAlchemyError as exc:',
            '        db.rollback()             # ③ 실패 시 전부 취소',
            '        raise HTTPException(500, "DB 오류") from exc',
            '    return new_user',
            '',
            '',
            '# ─── 핵심 정리 ─────────────────────────────────',
            '# add()/delete()  : 세션 스테이징 영역에만 변경 적재',
            '# commit()        : 스테이징 → DB 로 한 번에 반영',
            '# rollback()      : 스테이징 영역 전부 비우기',
            '# close()         : 세션 종료 (get_db finally 가 보장)',
            '#',
            '# 안티 패턴:',
            '#   ✗ commit 호출 안 함 → 응답은 200 인데 DB 에 아무것도 안 들어감',
            '#   ✗ rollback 없이 except 그냥 통과 → 다음 요청에 더러운 상태 누수',
            '#   ✗ try/except 로 SQLAlchemyError 를 삼키기 → 무엇이 실패했는지 미궁',
          ],
          highlight: [14, 15, 16, 17, 18, 19, 20, 27, 28, 29, 30, 31, 32, 33, 34, 35],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤 (DB 세션 라이프사이클)
    // ─────────────────────────────────────────────────────
    const ENGINE_STYLE = {
      created:   { bg: 'bg-indigo-50',  border: 'border-indigo-300', text: 'text-indigo-700', icon: '🚰' },
      connected: { bg: 'bg-indigo-100', border: 'border-indigo-400', text: 'text-indigo-800', icon: '🚰' },
    };

    const FACTORY_STYLE = {
      ready:  { bg: 'bg-violet-50',  border: 'border-violet-300', text: 'text-violet-700', icon: '🏭' },
      spawn:  { bg: 'bg-violet-100', border: 'border-violet-400', text: 'text-violet-800', icon: '🏭' },
      served: { bg: 'bg-violet-100', border: 'border-violet-400', text: 'text-violet-800', icon: '🏭' },
    };

    const REQ_STYLE = {
      incoming: { bg: 'bg-amber-50',    border: 'border-amber-300',   text: 'text-amber-700',   badge: 'bg-amber-200 text-amber-800',   icon: '📨' },
      active:   { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-700', badge: 'bg-emerald-200 text-emerald-800', icon: '⚙️' },
    };

    const EVENT_STYLE = {
      done:      { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-700', badge: 'bg-emerald-200 text-emerald-800', icon: '✓' },
      open:      { bg: 'bg-indigo-50',   border: 'border-indigo-300',  text: 'text-indigo-700',  badge: 'bg-indigo-200 text-indigo-800',   icon: '🪣' },
      yielded:   { bg: 'bg-amber-50',    border: 'border-amber-300',   text: 'text-amber-700',   badge: 'bg-amber-200 text-amber-800',     icon: '↪️' },
      using:     { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-700', badge: 'bg-emerald-200 text-emerald-800', icon: '🔧' },
      pending:   { bg: 'bg-slate-50',    border: 'border-slate-300',   text: 'text-slate-500',   badge: 'bg-slate-200 text-slate-600',     icon: '⏳' },
      staged:    { bg: 'bg-sky-50',      border: 'border-sky-300',     text: 'text-sky-700',     badge: 'bg-sky-200 text-sky-800',         icon: '📦' },
      committed: { bg: 'bg-emerald-100', border: 'border-emerald-400', text: 'text-emerald-800', badge: 'bg-emerald-300 text-emerald-900', icon: '✅' },
      rolled:    { bg: 'bg-rose-50',     border: 'border-rose-300',    text: 'text-rose-700',    badge: 'bg-rose-200 text-rose-800',       icon: '↩️' },
      closed:    { bg: 'bg-slate-100',   border: 'border-slate-400',   text: 'text-slate-700',   badge: 'bg-slate-300 text-slate-800',     icon: '🚪' },
    };

    function EngineBox({ engine }) {
      if (!engine) return null;
      const s = ENGINE_STYLE[engine.state] || ENGINE_STYLE.created;
      return (
        <div className={`rounded-xl border-2 ${s.bg} ${s.border} px-3 py-2.5 mb-2`}>
          <div className="flex items-center gap-2">
            <span className="text-2xl">{s.icon}</span>
            <div className="flex-1">
              <div className={`text-xs font-bold ${s.text}`}>{engine.label}</div>
              <div className={`text-[11px] ${s.text}/80`}>{engine.note}</div>
            </div>
          </div>
        </div>
      );
    }

    function FactoryBox({ factory }) {
      if (!factory) return null;
      const s = FACTORY_STYLE[factory.state] || FACTORY_STYLE.ready;
      return (
        <div className={`rounded-xl border-2 ${s.bg} ${s.border} px-3 py-2.5 mb-2`}>
          <div className="flex items-center gap-2">
            <span className="text-2xl">{s.icon}</span>
            <div className="flex-1">
              <div className={`text-xs font-bold ${s.text}`}>{factory.label}</div>
              <div className={`text-[11px] ${s.text}/80`}>{factory.note}</div>
            </div>
          </div>
        </div>
      );
    }

    function RequestCard({ item }) {
      const s = REQ_STYLE[item.state] || REQ_STYLE.incoming;
      return (
        <div className={`rounded-lg border ${s.bg} ${s.border} px-3 py-2 flex items-center justify-between mb-1.5`}>
          <div className="flex items-center gap-2">
            <span className="text-base">{s.icon}</span>
            <span className={`text-sm font-bold ${s.text}`}>{item.name}</span>
          </div>
          <span className={`text-[10px] px-2 py-0.5 rounded ${s.badge}`}>{item.badge}</span>
        </div>
      );
    }

    function EventRow({ item }) {
      const s = EVENT_STYLE[item.state] || EVENT_STYLE.pending;
      return (
        <div className={`rounded-lg border ${s.bg} ${s.border} px-3 py-1.5 flex items-center justify-between`}>
          <div className="flex items-center gap-2">
            <span className="text-base">{s.icon}</span>
            <span className={`text-[12px] font-mono font-bold ${s.text}`}>{item.label}</span>
          </div>
          <span className={`text-[10px] px-2 py-0.5 rounded ${s.badge}`}>{item.badge}</span>
        </div>
      );
    }

    function TxBox({ box }) {
      if (!box) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-indigo-500 bg-gradient-to-br from-indigo-50 to-violet-50 p-4">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl">🔁</span>
            <span className="text-sm font-bold text-indigo-800">{box.title}</span>
          </div>
          <ul className="space-y-1.5">
            {box.rows.map((r, i) => (
              <li key={i} className="text-[12px] text-indigo-900 flex gap-2 font-mono">
                <span className="text-indigo-500 mt-0.5">→</span>
                <span>{r}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">🪣 DB 세션 라이프사이클</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 요청 흐름</span>
          </div>

          <EngineBox engine={state.engine} />
          <FactoryBox factory={state.factory} />

          {state.request && state.request.length > 0 && (
            <>
              <div className="text-[11px] font-bold text-indigo-600 mb-1 mt-1">들어온 요청</div>
              {state.request.map((it, i) => (
                <RequestCard key={i} item={it} />
              ))}
            </>
          )}

          <div className="text-[11px] font-bold text-indigo-600 mb-1.5 mt-1">세션 이벤트 타임라인</div>
          <div className="space-y-1.5">
            {state.sessionEvents.map((it, i) => (
              <EventRow key={i} item={it} />
            ))}
          </div>

          <TxBox box={state.txBox} />

          <div className="mt-auto pt-3">
            <div className="text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
              💡 {state.keyPoint}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js) — 5탭
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          {/* 5탭 인디케이터 */}
          <div className="flex items-center gap-0 px-2 pt-1.5 bg-slate-800 border-b border-slate-700 text-[10px] font-mono">
            {STEPS.map((s, i) => (
              <span
                key={i}
                className={`px-2 py-1 rounded-t border-t border-x ${
                  i === stepIdx
                    ? 'bg-[#282c34] border-indigo-500 text-indigo-300'
                    : 'bg-slate-700 border-transparent text-slate-400'
                }`}
              >
                {s.code.filename}
              </span>
            ))}
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">3-2</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter 3-2. DB 세션 관리 (yield)</h1>
                <p className="text-sm text-indigo-800/80">engine → SessionLocal → get_db/yield → Depends → commit/rollback. 5단계로 추적</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 허브로</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                engine 1개 → SessionLocal 공장 → get_db()가 요청마다 세션을 열고 finally로 닫는다 → Depends가 라우터에 자동 주입 → 쓰기는 commit/rollback으로 명시 확정. 이 5단계가 FastAPI + SQLAlchemy의 표준 DB 세션 패턴이다. 다음 챕터(3-3)에서는 보호된 API에 필요한 JWT 인증을 본다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['SQLAlchemy', 'engine', 'SessionLocal', 'sessionmaker', 'get_db', 'yield', 'Depends', 'commit', 'rollback', 'close', '의존성주입', '커넥션풀'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./chapter-03-01-depends.html" className="underline hover:no-underline">← 3-1 Depends</a>
              <a href="./chapter-03-03-jwt.html" className="underline hover:no-underline">다음: 3-3 JWT 인증 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
