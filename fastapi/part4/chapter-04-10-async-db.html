    FastAPI Chapter IV-4-10 — 비동기 SQLAlchemy + Lifespan
    학습 목표: create_async_engine → AsyncSession → lifespan(asynccontextmanager)
              → startup(engine 초기화/테이블 생성) → shutdown(engine.dispose)
              5단계로 비동기 DB와 FastAPI 앱 라이프사이클의 결합을 시각화한다.
    핵심 비유: 카페 오픈→영업→마감 — DB 커넥션 풀이 가게의 직원이라면
              startup은 출근, runtime은 영업, shutdown은 퇴근이다.
    패턴: fastapi v1 — 좌(LiveDataPane: 라이프사이클 startup→runtime→shutdown)
                       우(VSCode CodeViewer 5탭 — engine/session/lifespan/startup/shutdown.py)
    색상: indigo (fastapi 비동기 도메인)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────

    // Step마다 활성 탭과 하이라이트 라인만 다르다.
    // ─────────────────────────────────────────────────────
    const FILES = {

          '',

      'session.py': {
        lang: 'python',
        lines: [
          '"""',
          'session.py — AsyncSession 팩토리 + 의존성 주입 함수',
          '',
          '목적: 라우터가 한 요청 안에서 사용할 비동기 세션을 만든다.',
          '주요 기능:',
          '  - async_sessionmaker 로 세션 팩토리 1개 생성',
          '  - get_session: FastAPI Depends 용 generator',
          '"""',
          'from typing import AsyncGenerator',
          'from sqlalchemy.ext.asyncio import AsyncSession, async_sessionmaker',
          '',
          'from .engine import engine',
          '',
          '# 팩토리 — engine 을 기반으로 세션을 찍어내는 도장',
          'AsyncSessionLocal = async_sessionmaker(',
          '    bind=engine,',
          '    class_=AsyncSession,',
          '    expire_on_commit=False,  # commit 후 객체 만료 방지',
          '    autoflush=False,',
          ')',
          '',
          '',
          'async def get_session() -> AsyncGenerator[AsyncSession, None]:',
          '    """라우터용 세션 의존성 (FastAPI Depends 로 주입).',
          '',
          '    한 HTTP 요청 = 한 세션이 원칙.',
          '    yield 이후의 코드는 응답 직전에 실행된다 (커넥션 반납).',
          '    """',
          '    async with AsyncSessionLocal() as session:',
          '        try:',
          '            yield session',
          '            await session.commit()',
          '        except Exception:',
          '            await session.rollback()',
          '            raise',
          '        finally:',
          '            await session.close()',
        ],

          '  - @asynccontextmanager 로 startup/shutdown 흐름을 한 함수에 묶기',

    // ─────────────────────────────────────────────────────

    // ─────────────────────────────────────────────────────

    const TIMELINE = [
      { key: 0, label: 'import' },

    function Timeline({ position }) {
      return (
        <div className="rounded-lg border border-indigo-200 bg-indigo-50 px-3 py-2">

              const reached = i <= position;
              const current = i === position;
              return (
                <React.Fragment key={t.key}>
                  <div className="flex flex-col items-center">
                    <div className={`w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold border-2 ${current ? 'bg-indigo-600 text-white border-indigo-700 ring-2 ring-indigo-300' : reached ? 'bg-indigo-500 text-white border-indigo-600' : 'bg-white text-indigo-300 border-indigo-200'}`}>{i + 1}</div>

                  {i < TIMELINE.length - 1 && (

    // ─────────────────────────────────────────────────────
    // 커넥션 풀 시각화
    // ─────────────────────────────────────────────────────
    function PoolView({ pool }) {
      const slots = Math.max(pool.total, 3);
      const items = [];
      for (let i = 0; i < slots; i++) {
        let state = 'empty';
        if (i < pool.active) state = 'active';
        else if (i < pool.active + pool.idle) state = 'idle';
        items.push(state);
      }
      const STATE_STYLE = {
        empty:  { bg: 'bg-slate-100',  border: 'border-slate-300',  label: '-',     text: 'text-slate-400' },
        idle:   { bg: 'bg-indigo-100', border: 'border-indigo-400', label: 'idle',  text: 'text-indigo-700' },
        active: { bg: 'bg-emerald-200',border: 'border-emerald-500',label: 'busy',  text: 'text-emerald-800' },
      };
      return (
        <div className="rounded-lg border border-indigo-200 bg-white px-3 py-2">
          <div className="flex items-center justify-between mb-2">
            <div className="text-[10px] font-bold text-indigo-700">커넥션 풀</div>
            <div className="text-[10px] text-indigo-500 font-mono">total {pool.total} · idle {pool.idle} · busy {pool.active}</div>
          </div>
          <div className="flex gap-1.5">
            {items.map((st, i) => {
              const s = STATE_STYLE[st];
              return (
                <div key={i} className={`flex-1 h-10 rounded border-2 ${s.bg} ${s.border} flex items-center justify-center text-[10px] font-bold ${s.text}`}>
                  {s.label}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 이벤트 로그 (라이프사이클 누적 이벤트)
    // ─────────────────────────────────────────────────────
    const KIND_STYLE = {
      init:     { bg: 'bg-slate-50',     border: 'border-slate-300',    text: 'text-slate-700',    badge: 'bg-slate-200 text-slate-700' },
      lifespan: { bg: 'bg-indigo-50',    border: 'border-indigo-300',   text: 'text-indigo-800',   badge: 'bg-indigo-200 text-indigo-800' },
      startup:  { bg: 'bg-violet-50',    border: 'border-violet-300',   text: 'text-violet-800',   badge: 'bg-violet-200 text-violet-800' },
      runtime:  { bg: 'bg-emerald-50',   border: 'border-emerald-300',  text: 'text-emerald-800',  badge: 'bg-emerald-200 text-emerald-800' },
      shutdown: { bg: 'bg-amber-50',     border: 'border-amber-300',    text: 'text-amber-800',    badge: 'bg-amber-200 text-amber-800' },
      done:     { bg: 'bg-rose-50',      border: 'border-rose-300',     text: 'text-rose-800',     badge: 'bg-rose-200 text-rose-800' },
    };

    function EventLog({ events }) {
      return (
        <div className="rounded-lg border border-indigo-200 bg-white px-3 py-2">
          <div className="text-[10px] font-bold text-indigo-700 mb-2">이벤트 로그</div>
          <ul className="space-y-1.5">
            {events.map((e, i) => {
              const s = KIND_STYLE[e.kind] || KIND_STYLE.init;
              return (
                <li key={i} className={`rounded border ${s.bg} ${s.border} px-2 py-1.5 flex items-start gap-2`}>
                  <span className="text-[10px] font-mono text-slate-500 mt-0.5 w-6">{e.at}</span>
                  <span className={`text-[10px] px-1.5 py-0.5 rounded ${s.badge}`}>{e.kind}</span>
                  <div className="flex-1 min-w-0">
                    <div className={`text-xs font-semibold ${s.text}`}>{e.label}</div>
                    <div className="text-[10px] text-slate-600">{e.detail}</div>
                  </div>
                </li>
              );
            })}
          </ul>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-gradient-to-br from-indigo-50/60 to-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">FastAPI + AsyncDB 라이프사이클</h3>
            <span className="text-[10px] text-slate-500">left: domain state</span>
          </div>
          <div className="space-y-2.5 flex-1">
            <Timeline position={state.lifeline} />
            <PoolView pool={state.pool} />
            <EventLog events={state.events} />
          </div>
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer — 5 탭, 활성 탭만 본문 표시
    // ─────────────────────────────────────────────────────
    function CodeViewer({ activeTab, highlight, stepIdx, total, onTabChange }) {
      const codeRef = useRef(null);
      const file = FILES[activeTab];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [activeTab]);

      const highlightSet = new Set(highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return file.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return file.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 윈도우 헤더 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">app/db/{activeTab}</span>
            <span className="ml-auto text-[10px] text-slate-400">{file.lang}</span>
          </div>
          {/* 탭 바 */}
          <div className="flex bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {TAB_ORDER.map((name) => {
              const isActive = name === activeTab;
              return (
                <button
                  key={name}
                  onClick={() => onTabChange(name)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${isActive ? 'bg-[#282c34] text-indigo-300 border-t-2 border-t-indigo-400' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}
                >
                  {name}
                </button>
              );
            })}
          </div>
          {/* 코드 본문 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${file.lang}`}>{file.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {file.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/20 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          {/* 푸터 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{file.lines.length} lines · {activeTab}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 컨트롤(4버튼) + 키보드(←/→) + 3000ms 자동재생
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const [manualTab, setManualTab] = useState(null);  // 사용자가 직접 누른 탭(있으면 우선)
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // step 변경 시 수동 탭 초기화 (Step 의 기본 탭 표시)
      useEffect(() => { setManualTab(null); }, [stepIdx]);

      // 키보드 좌/우
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') {
            e.preventDefault();
            setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          } else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            setStepIdx((i) => Math.max(0, i - 1));
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동재생 3000ms
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;
      const activeTab = manualTab || step.activeTab;
      // 수동 탭이 있으면 하이라이트는 비활성(다른 파일이므로) — Step 기본 탭과 일치할 때만 하이라이트
      const highlight = activeTab === step.activeTab ? step.highlight : [];

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6 font-sans">
          <div className="max-w-7xl mx-auto">
            {/* 상단 네비 */}
            <nav className="mb-4 flex items-center justify-between text-xs">
              <a href="../index.html" className="text-indigo-700 hover:text-indigo-900 font-medium underline hover:no-underline">← 허브로 돌아가기</a>
              <span className="font-mono bg-white px-2 py-1 rounded border border-indigo-200 text-indigo-700">curriculum IV-4-10</span>
            </nav>

            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">IV</span>
              <div>
                <div className="text-[11px] text-slate-500 font-medium">Part IV. FastAPI 코어 &gt; Chapter 4. 비동기 처리</div>
                <h1 className="text-2xl font-bold text-indigo-900">IV-4-10. 비동기 SQLAlchemy + Lifespan</h1>
                <p className="text-sm text-indigo-800/80 mt-0.5">create_async_engine → AsyncSession → asynccontextmanager lifespan → startup → shutdown 5단계</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <div className="flex items-center justify-between mb-1">
                <h2 className="text-lg font-bold">{step.title}</h2>
                <span className="text-[10px] text-indigo-200">Step {stepIdx + 1} / {STEPS.length}</span>
              </div>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane (좌: LiveDataPane / 우: CodeViewer) */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 min-h-[560px]">
              <LiveDataPane state={step} />
              <CodeViewer
                activeTab={activeTab}
                highlight={highlight}
                stepIdx={stepIdx}
                total={STEPS.length}
                onTabChange={(name) => setManualTab(name === step.activeTab ? null : name)}
              />
            </div>

            {/* 컨트롤 — 4 버튼 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => { setStepIdx(0); setPlaying(false); }}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40 disabled:cursor-not-allowed"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40 disabled:cursor-not-allowed"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-800 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'} min-w-[90px]`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40 disabled:cursor-not-allowed"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계 · 우측 탭 클릭 시 다른 파일 미리보기</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                create_async_engine 으로 공장을 만들고, async_sessionmaker 로 세션을 찍어내고, lifespan 의 yield 를 경계로 startup(테이블/풀) → runtime(요청 처리) → shutdown(engine.dispose) 의 한 사이클이 완성된다. 다음 챕터(IV-4-11)에서는 Bcrypt 비밀번호 해싱을 다룬다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['create_async_engine', 'AsyncSession', 'async_sessionmaker', 'asynccontextmanager', 'lifespan', 'startup', 'shutdown', 'engine.dispose', 'asyncpg', 'pool'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 하단 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./chapter-04-09-thread-async.html" className="underline hover:no-underline">← IV-4-9 def vs async def</a>
              <a href="./chapter-04-11-bcrypt.html" className="underline hover:no-underline">다음: IV-4-11 Bcrypt 해싱 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
