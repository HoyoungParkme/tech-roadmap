<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 인터랙티브 학습 — Chapter 2-1. Path & Query Parameter</title>

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 (development 버전) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    ─────────────────────────────────────────────────────────────
    FastAPI Chapter 2-1 — Path Parameter와 Query Parameter
    ─────────────────────────────────────────────────────────────
    학습 목표 : URL의 Path Parameter(/users/{user_id})와
               Query Parameter(?skip=0&limit=10)가 함수 파라미터로
               자동 매핑되는 FastAPI 규칙을 이해한다.
    조작법   : 자동 실행, 이전/다음 버튼, 키보드 ←/→로 단계 이동.
    ─────────────────────────────────────────────────────────────
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // -----------------------------------------
    // 1. Python 코드
    // -----------------------------------------
    const PYTHON_CODE = [
      "from fastapi import FastAPI",                           // 0
      "",                                                       // 1
      "app = FastAPI()",                                        // 2
      "",                                                       // 3
      "# Path Parameter: URL 경로에 포함된 값",                  // 4
      "@app.get('/users/{user_id}')",                           // 5
      "def get_user(user_id: int):",                            // 6
      "    return {'user_id': user_id}",                        // 7
      "",                                                       // 8
      "# Query Parameter: ? 뒤에 붙는 키=값 쌍",                // 9
      "@app.get('/items/')",                                    // 10
      "def list_items(skip: int = 0, limit: int = 10):",       // 11
      "    return {'skip': skip, 'limit': limit}",              // 12
      "",                                                       // 13
      "# Path + Query 혼합",                                    // 14
      "@app.get('/users/{user_id}/orders')",                    // 15
      "def get_orders(user_id: int, status: str = 'all'):",    // 16
      "    return {",                                            // 17
      "        'user_id': user_id,",                             // 18
      "        'status': status",                                // 19
      "    }",                                                   // 20
    ];

    // -----------------------------------------
    // 2. 단계 데이터
    // -----------------------------------------
    const STEPS = [
      {
        codeLine: 5,
        desc: "[URL 도착] 클라이언트가 GET /users/42?detail=true 를 요청합니다. FastAPI가 이 URL을 받아 라우터를 찾습니다.",
        url: '/users/42?detail=true',
        pathParts: [
          { text: '/users/', type: 'fixed' },
          { text: '42', type: 'idle' },
        ],
        queryParts: [],
        params: [],
        responseState: 'idle',
      },
      {
        codeLine: 5,
        desc: "[경로 매칭] 데코레이터 @app.get('/users/{user_id}')와 URL /users/42를 비교합니다. {user_id} 자리에 '42'가 들어왔으므로 매칭 성공!",
        url: '/users/42?detail=true',
        pathParts: [
          { text: '/users/', type: 'fixed' },
          { text: '42', type: 'matched' },
        ],
        queryParts: [],
        params: [{ name: 'user_id', value: "'42'", type: 'path', converted: false }],
        responseState: 'idle',
      },
      {
        codeLine: 6,
        desc: "[타입 변환] 함수 시그니처에 user_id: int 라고 적혀 있으므로, 문자열 '42'를 정수 42로 자동 변환합니다. 타입이 맞지 않으면 422 에러가 나갑니다.",
        url: '/users/42?detail=true',
        pathParts: [
          { text: '/users/', type: 'fixed' },
          { text: '42', type: 'matched' },
        ],
        queryParts: [],
        params: [{ name: 'user_id', value: '42', type: 'path', converted: true }],
        responseState: 'idle',
      },
      {
        codeLine: 11,
        desc: "[Query Parameter 규칙] Query Parameter는 함수에 기본값이 있는 파라미터입니다. skip: int = 0, limit: int = 10 — 기본값이 있으면 Query, 없으면 Path 입니다.",
        url: '/items/?skip=5&limit=20',
        pathParts: [
          { text: '/items/', type: 'fixed' },
        ],
        queryParts: [
          { key: 'skip', value: '5', state: 'highlight' },
          { key: 'limit', value: '20', state: 'highlight' },
        ],
        params: [
          { name: 'skip', value: '5 → 5', type: 'query', converted: true },
          { name: 'limit', value: '20 → 20', type: 'query', converted: true },
        ],
        responseState: 'idle',
      },
      {
        codeLine: 16,
        desc: "[Path + Query 혼합] /users/{user_id}/orders?status=pending — user_id는 경로에서, status는 쿼리에서 각각 추출해 함수 파라미터로 주입합니다.",
        url: '/users/7/orders?status=pending',
        pathParts: [
          { text: '/users/', type: 'fixed' },
          { text: '7', type: 'matched' },
          { text: '/orders', type: 'fixed' },
        ],
        queryParts: [
          { key: 'status', value: 'pending', state: 'highlight' },
        ],
        params: [
          { name: 'user_id', value: '7', type: 'path', converted: true },
          { name: 'status', value: "'pending'", type: 'query', converted: true },
        ],
        responseState: 'idle',
      },
      {
        codeLine: 17,
        desc: "[응답 반환] 모든 파라미터가 함수에 주입되었습니다. FastAPI가 반환된 dict를 JSON으로 직렬화해 200 OK로 응답합니다.",
        url: '/users/7/orders?status=pending',
        pathParts: [
          { text: '/users/', type: 'fixed' },
          { text: '7', type: 'matched' },
          { text: '/orders', type: 'fixed' },
        ],
        queryParts: [
          { key: 'status', value: 'pending', state: 'highlight' },
        ],
        params: [
          { name: 'user_id', value: '7', type: 'path', converted: true },
          { name: 'status', value: "'pending'", type: 'query', converted: true },
        ],
        responseState: '200',
      },
    ];

    // -----------------------------------------
    // 3. 정적 클래스 매핑
    // -----------------------------------------
    const PATH_PART_CLASS = {
      'fixed':   'text-slate-600',
      'idle':    'text-slate-600',
      'matched': 'bg-blue-200 text-blue-800 font-bold rounded px-1',
    };

    const QUERY_STATE_CLASS = {
      'idle':      'text-slate-400',
      'highlight': 'bg-amber-200 text-amber-800 font-bold rounded px-1',
    };

    const PARAM_TYPE_CLASS = {
      'path':  'bg-blue-100 border-blue-400 text-blue-700',
      'query': 'bg-amber-100 border-amber-400 text-amber-700',
    };

    const RESPONSE_CLASS = {
      'idle': 'bg-slate-50 border-slate-200 text-slate-400',
      '200':  'bg-emerald-100 border-emerald-400 text-emerald-700',
    };

    // -----------------------------------------
    // 4. App 컴포넌트
    // -----------------------------------------
    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx >= STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };

      const handlePrev = () => {
        setCurrentStepIdx(prev => (prev > 0 ? prev - 1 : prev));
      };

      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        const id = setInterval(() => handleNextRef.current(), 2200);
        return () => clearInterval(id);
      }, [isPlaying]);

      useEffect(() => {
        const handler = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);

      const togglePlay = () => {
        if (isEnd) {
          setCurrentStepIdx(0);
          setIsPlaying(true);
          return;
        }
        setIsPlaying(prev => !prev);
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 네비게이션 */}
            <nav className="flex items-center justify-between text-sm text-slate-500">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum IV-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-xl md:text-2xl font-bold text-slate-800 mb-2">Chapter 2-1. Path Parameter & Query Parameter</h1>
              <p className="text-slate-600 text-sm leading-relaxed">
                URL의 <strong className="text-blue-700">/users/<code className="bg-blue-100 px-1 rounded">123</code></strong>에서 <code>123</code>이 Path Parameter,
                <strong className="text-amber-700">?<code className="bg-amber-100 px-1 rounded">skip=0&limit=10</code></strong>이 Query Parameter다.
                FastAPI는 함수 파라미터 이름만 맞추면 자동으로 매핑하고 타입도 변환해준다.
              </p>
            </header>

            {/* 메인 레이아웃 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">

              {/* 왼쪽: 시각화 */}
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
                <h2 className="text-sm font-bold text-slate-600">파라미터 추출 흐름</h2>

                {/* URL 바 */}
                <div className="bg-slate-800 text-slate-300 rounded-lg p-3 font-mono text-sm">
                  <span className="text-slate-500 mr-1">GET</span>
                  {stepData.pathParts.map((part, i) => (
                    <span key={i} className={PATH_PART_CLASS[part.type]}>{part.text}</span>
                  ))}
                  {stepData.queryParts.length > 0 && (
                    <>
                      <span className="text-slate-500">?</span>
                      {stepData.queryParts.map((q, i) => (
                        <span key={i}>
                          {i > 0 && <span className="text-slate-500">&</span>}
                          <span className={QUERY_STATE_CLASS[q.state]}>{q.key}={q.value}</span>
                        </span>
                      ))}
                    </>
                  )}
                </div>

                {/* 범례 */}
                <div className="flex gap-4 text-xs">
                  <span className="flex items-center gap-1">
                    <span className="inline-block w-3 h-3 rounded bg-blue-200 border border-blue-400"></span>
                    Path Parameter
                  </span>
                  <span className="flex items-center gap-1">
                    <span className="inline-block w-3 h-3 rounded bg-amber-200 border border-amber-400"></span>
                    Query Parameter
                  </span>
                </div>

                {/* 추출된 파라미터 */}
                <div className="space-y-2">
                  <h3 className="text-xs font-bold text-slate-500">함수 파라미터로 주입</h3>
                  {stepData.params.length === 0 ? (
                    <div className="text-xs text-slate-400 bg-slate-50 rounded-lg p-3 text-center">아직 추출된 파라미터 없음</div>
                  ) : (
                    <div className="grid grid-cols-1 gap-2">
                      {stepData.params.map((p, i) => (
                        <div key={i} className={`flex items-center justify-between p-3 rounded-lg border-2 transition-all duration-300 ${PARAM_TYPE_CLASS[p.type]}`}>
                          <div>
                            <span className="font-bold font-mono text-sm">{p.name}</span>
                            <span className="text-xs ml-2 opacity-70">{p.type === 'path' ? 'Path' : 'Query'}</span>
                          </div>
                          <div className="font-mono text-sm font-bold">
                            {p.converted ? (
                              <span>{p.value} {p.type === 'path' && <span className="text-xs opacity-70">(int)</span>}</span>
                            ) : (
                              <span className="italic">{p.value} <span className="text-xs">(str→int 변환 대기)</span></span>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* 응답 */}
                <div className={`p-3 rounded-lg border-2 text-center transition-all duration-300 ${RESPONSE_CLASS[stepData.responseState]}`}>
                  <div className="text-xs font-bold mb-1">응답</div>
                  <div className="text-sm font-bold font-mono">
                    {stepData.responseState === '200' && '200 OK — {"user_id": 7, "status": "pending"}'}
                    {stepData.responseState === 'idle' && '—'}
                  </div>
                </div>

                {/* 설명 */}
                <div className="p-4 rounded-lg border bg-blue-50 border-blue-200 text-blue-800 text-sm leading-relaxed">
                  {stepData.desc}
                </div>
              </div>

              {/* 오른쪽: 코드 뷰어 */}
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between items-center">
                  <span>main.py — Path & Query Parameter</span>
                  <span className="text-slate-500">line {stepData.codeLine + 1}</span>
                </div>
                <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
                  {PYTHON_CODE.map((line, idx) => {
                    const isActive = stepData.codeLine === idx;
                    return (
                      <div
                        key={idx}
                        className={`px-4 py-0.5 whitespace-pre ${
                          isActive
                            ? 'bg-amber-100 text-amber-900 font-bold border-l-4 border-amber-400'
                            : 'text-slate-700 border-l-4 border-transparent'
                        }`}
                      >
                        <span className="inline-block w-6 text-right mr-3 text-slate-400 select-none">{idx + 1}</span>
                        {line || '\u00A0'}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* 컨트롤 바 */}
            <div className="flex items-center justify-center gap-3 flex-wrap">
              <button onClick={() => handlePrevRef.current()} disabled={currentStepIdx === 0}
                className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors"
                aria-label="이전 단계">← 이전</button>
              <button onClick={togglePlay}
                className={`px-6 py-2 rounded-lg font-bold text-sm transition-colors ${
                  isPlaying ? 'bg-amber-500 text-white hover:bg-amber-600' : 'bg-emerald-600 text-white hover:bg-emerald-700'
                }`}
                aria-label={isPlaying ? '정지' : (isEnd ? '처음부터 재생' : '자동 실행')}>
                {isPlaying ? '⏸ 정지' : (isEnd ? '⟳ 처음부터' : '▶ 자동 실행')}
              </button>
              <button onClick={() => handleNextRef.current()} disabled={isEnd}
                className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors"
                aria-label="다음 단계">다음 →</button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            {/* 풋노트 */}
            <footer className="text-center text-xs text-slate-400 py-4">
              <p>FastAPI 인터랙티브 학습 — Chapter 2-1. Path & Query Parameter | 키보드 ← → 지원</p>
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
