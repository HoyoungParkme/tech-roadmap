<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 인터랙티브 학습 — Chapter 3-3. JWT 인증</title>

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 (development 버전) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    ─────────────────────────────────────────────────────────────
    FastAPI Chapter 3-3 — JWT 인증 (Bearer Token)
    ─────────────────────────────────────────────────────────────
    학습 목표 : JWT 기반 Bearer Token 인증 흐름을 이해한다.
               유효한 토큰은 검문소를 통과해 라우터에 도달하고,
               만료/위조 토큰은 401로 차단되는 두 시나리오를 비교한다.
    조작법   : 상단 [유효한 토큰 / 만료된 토큰] 토글로 두 시나리오 비교 가능.
               자동 실행, 이전/다음 버튼, 키보드 ←/→로 단계 이동.
    ─────────────────────────────────────────────────────────────
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // -----------------------------------------
    // 1. Python 코드 (JWT 인증 전체 흐름)
    // -----------------------------------------
    const PYTHON_CODE = [
      "from fastapi import FastAPI, Depends, HTTPException",  // 0
      "from fastapi.security import OAuth2PasswordBearer",    // 1
      "from jose import jwt, JWTError",                       // 2
      "from datetime import datetime, timedelta",             // 3
      "",                                                      // 4
      "SECRET_KEY = os.getenv('SECRET_KEY')  # 환경변수!",     // 5
      "ALGORITHM = 'HS256'",                                   // 6
      "",                                                      // 7
      "oauth2_scheme = OAuth2PasswordBearer(tokenUrl='login')",// 8
      "",                                                      // 9
      "def create_access_token(data: dict):",                  // 10
      "    expire = datetime.utcnow() + timedelta(minutes=30)",// 11
      "    return jwt.encode({**data, 'exp': expire},",        // 12
      "                      SECRET_KEY, algorithm=ALGORITHM)",// 13
      "",                                                      // 14
      "def get_current_user(token = Depends(oauth2_scheme)):", // 15
      "    try:",                                               // 16
      "        payload = jwt.decode(token, SECRET_KEY,",        // 17
      "                             algorithms=[ALGORITHM])",   // 18
      "        return payload['sub']",                          // 19
      "    except JWTError:",                                   // 20
      "        raise HTTPException(401, 'Invalid token')",      // 21
      "",                                                       // 22
      "app = FastAPI()",                                        // 23
      "",                                                       // 24
      "@app.post('/login')",                                    // 25
      "def login(username: str, password: str):",               // 26
      "    token = create_access_token({'sub': username})",      // 27
      "    return {'access_token': token}",                      // 28
      "",                                                       // 29
      "@app.get('/profile')",                                   // 30
      "def get_profile(user = Depends(get_current_user)):",     // 31
      "    return {'username': user, 'msg': '인증 성공!'}",      // 32
    ];

    // -----------------------------------------
    // 2. 시나리오별 STEPS 데이터
    // -----------------------------------------

    // --- 유효한 토큰 시나리오 ---
    const VALID_STEPS = [
      {
        codeLine: 26,
        desc: "[로그인 요청] 클라이언트가 /login에 username과 password를 전송합니다. 서버가 자격을 확인합니다.",
        clientState: 'sending-login',
        serverState: 'authenticating',
        gatekeeperState: 'idle',
        tokenState: 'idle',
        routerState: 'idle',
        responseState: 'idle',
      },
      {
        codeLine: 12,
        desc: "[JWT 발급] 서버가 SECRET_KEY로 페이로드(사용자 이름 + 만료 시간)를 서명해 JWT를 생성합니다. 이 토큰이 '디지털 출입 증명서'입니다.",
        clientState: 'waiting',
        serverState: 'generating-token',
        gatekeeperState: 'idle',
        tokenState: 'generating',
        routerState: 'idle',
        responseState: 'idle',
      },
      {
        codeLine: 28,
        desc: "[토큰 수령] 클라이언트가 access_token을 응답으로 받아 저장합니다. 이후 요청마다 이 토큰을 함께 보냅니다.",
        clientState: 'received-token',
        serverState: 'idle',
        gatekeeperState: 'idle',
        tokenState: 'valid',
        routerState: 'idle',
        responseState: 'idle',
      },
      {
        codeLine: 8,
        desc: "[보호된 요청] 클라이언트가 /profile에 Authorization: Bearer <토큰> 헤더를 담아 요청합니다. OAuth2PasswordBearer가 헤더에서 토큰을 추출합니다.",
        clientState: 'sending-request',
        serverState: 'idle',
        gatekeeperState: 'idle',
        tokenState: 'valid',
        routerState: 'idle',
        responseState: 'idle',
      },
      {
        codeLine: 17,
        desc: "[검문소 검증] get_current_user가 토큰을 SECRET_KEY로 복호화합니다. 서명이 일치하고 만료 시간이 지나지 않았으므로 사용자 이름을 꺼냅니다.",
        clientState: 'waiting',
        serverState: 'idle',
        gatekeeperState: 'decoding',
        tokenState: 'valid',
        routerState: 'idle',
        responseState: 'idle',
      },
      {
        codeLine: 19,
        desc: "[통과!] 검문소를 통과했습니다. payload에서 꺼낸 사용자 이름이 Depends()를 통해 라우터 함수의 user 파라미터로 주입됩니다.",
        clientState: 'waiting',
        serverState: 'idle',
        gatekeeperState: 'passed',
        tokenState: 'valid',
        routerState: 'active',
        responseState: 'idle',
      },
      {
        codeLine: 32,
        desc: "[200 응답] 라우터가 사용자 프로필을 반환합니다. 인증된 요청만 이 코드에 도달할 수 있습니다.",
        clientState: 'received-200',
        serverState: 'idle',
        gatekeeperState: 'passed',
        tokenState: 'valid',
        routerState: 'active',
        responseState: '200',
      },
    ];

    // --- 만료된 토큰 시나리오 ---
    const INVALID_STEPS = [
      {
        codeLine: 8,
        desc: "[보호된 요청] 클라이언트가 /profile에 만료된 토큰을 담아 요청합니다. OAuth2PasswordBearer가 헤더에서 토큰을 추출합니다.",
        clientState: 'sending-request',
        serverState: 'idle',
        gatekeeperState: 'idle',
        tokenState: 'expired',
        routerState: 'idle',
        responseState: 'idle',
      },
      {
        codeLine: 17,
        desc: "[검문소 검증 시도] get_current_user가 토큰을 SECRET_KEY로 복호화를 시도합니다...",
        clientState: 'waiting',
        serverState: 'idle',
        gatekeeperState: 'decoding',
        tokenState: 'expired',
        routerState: 'idle',
        responseState: 'idle',
      },
      {
        codeLine: 20,
        desc: "[JWTError 발생!] 토큰의 만료 시간(exp)이 이미 지났습니다. jose 라이브러리가 ExpiredSignatureError를 던지고, except JWTError 블록으로 진입합니다.",
        clientState: 'waiting',
        serverState: 'idle',
        gatekeeperState: 'rejected',
        tokenState: 'expired',
        routerState: 'idle',
        responseState: 'idle',
      },
      {
        codeLine: 21,
        desc: "[차단!] HTTPException(401)이 발생합니다. 라우터 함수에는 도달하지 못합니다. 검문소가 출입을 거부했습니다.",
        clientState: 'waiting',
        serverState: 'idle',
        gatekeeperState: 'rejected',
        tokenState: 'expired',
        routerState: 'blocked',
        responseState: 'idle',
      },
      {
        codeLine: 21,
        desc: "[401 Unauthorized] 클라이언트에게 'Invalid token' 메시지와 함께 401 응답이 반환됩니다. 다시 /login으로 새 토큰을 받아야 합니다.",
        clientState: 'received-401',
        serverState: 'idle',
        gatekeeperState: 'rejected',
        tokenState: 'expired',
        routerState: 'blocked',
        responseState: '401',
      },
    ];

    // -----------------------------------------
    // 3. 정적 클래스 매핑 (Tailwind JIT 안전)
    // -----------------------------------------
    const CLIENT_CLASS = {
      'idle':            'bg-slate-100 border-slate-300 text-slate-500',
      'sending-login':   'bg-blue-100 border-blue-400 text-blue-700',
      'waiting':         'bg-amber-50 border-amber-300 text-amber-700',
      'received-token':  'bg-emerald-100 border-emerald-400 text-emerald-700',
      'sending-request': 'bg-blue-100 border-blue-400 text-blue-700',
      'received-200':    'bg-emerald-100 border-emerald-400 text-emerald-700',
      'received-401':    'bg-rose-100 border-rose-400 text-rose-700',
    };

    const GATEKEEPER_CLASS = {
      'idle':     'bg-slate-100 border-slate-300 text-slate-500',
      'decoding': 'bg-amber-100 border-amber-400 text-amber-700',
      'passed':   'bg-emerald-100 border-emerald-400 text-emerald-700',
      'rejected': 'bg-rose-100 border-rose-400 text-rose-700',
    };

    const TOKEN_CLASS = {
      'idle':       'bg-slate-50 border-slate-200 text-slate-400',
      'generating': 'bg-amber-50 border-amber-300 text-amber-600',
      'valid':      'bg-emerald-50 border-emerald-300 text-emerald-600',
      'expired':    'bg-rose-50 border-rose-300 text-rose-600',
    };

    const ROUTER_CLASS = {
      'idle':    'bg-slate-100 border-slate-300 text-slate-500',
      'active':  'bg-emerald-100 border-emerald-400 text-emerald-700',
      'blocked': 'bg-rose-100 border-rose-400 text-rose-700',
    };

    const RESPONSE_CLASS = {
      'idle': 'bg-slate-50 border-slate-200 text-slate-400',
      '200':  'bg-emerald-100 border-emerald-400 text-emerald-700',
      '401':  'bg-rose-100 border-rose-400 text-rose-700',
    };

    const TOKEN_LABEL = {
      'idle':       '대기',
      'generating': '발급 중...',
      'valid':      '유효',
      'expired':    '만료됨',
    };

    const GATEKEEPER_LABEL = {
      'idle':     '대기',
      'decoding': '검증 중...',
      'passed':   '통과',
      'rejected': '차단',
    };

    // -----------------------------------------
    // 4. App 컴포넌트
    // -----------------------------------------
    function App() {
      const [mode, setMode] = useState('valid');
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);

      const STEPS = mode === 'valid' ? VALID_STEPS : INVALID_STEPS;
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx >= STEPS.length - 1;

      // --- 핸들러 ---
      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };

      const handlePrev = () => {
        setCurrentStepIdx(prev => (prev > 0 ? prev - 1 : prev));
      };

      // stale closure 방지를 위한 ref
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      // 자동 재생
      useEffect(() => {
        if (!isPlaying) return;
        const id = setInterval(() => handleNextRef.current(), 2000);
        return () => clearInterval(id);
      }, [isPlaying]);

      // 키보드 ←/→
      useEffect(() => {
        const handler = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);

      // 모드 전환 시 리셋
      const switchMode = (newMode) => {
        if (newMode === mode) return;
        setMode(newMode);
        setCurrentStepIdx(0);
        setIsPlaying(false);
      };

      const togglePlay = () => {
        if (isEnd) {
          setCurrentStepIdx(0);
          setIsPlaying(true);
          return;
        }
        setIsPlaying(prev => !prev);
      };

      // --- 렌더 ---
      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 네비게이션 */}
            <nav className="flex items-center justify-between text-sm text-slate-500">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum IV-3-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-xl md:text-2xl font-bold text-slate-800 mb-2">Chapter 3-3. JWT 인증 (Bearer Token)</h1>
              <p className="text-slate-600 text-sm leading-relaxed">
                JWT는 <strong>"위조가 어려운 디지털 출입 증명서"</strong>다. 로그인하면 서버가 발급하고, 이후 요청마다 클라이언트가 제시한다.
                서버의 검문소(<code className="text-xs bg-slate-100 px-1 rounded">get_current_user</code>)가 토큰을 복호화해 통과 여부를 결정한다.
              </p>
            </header>

            {/* 시나리오 토글 */}
            <div className="flex gap-2" role="tablist">
              <button
                role="tab"
                aria-selected={mode === 'valid'}
                onClick={() => switchMode('valid')}
                className={`flex-1 py-2.5 rounded-lg font-bold text-sm border-2 transition-colors ${
                  mode === 'valid'
                    ? 'bg-emerald-50 border-emerald-500 text-emerald-700'
                    : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300'
                }`}
                aria-label="유효한 토큰 시나리오"
              >
                유효한 토큰
              </button>
              <button
                role="tab"
                aria-selected={mode === 'invalid'}
                onClick={() => switchMode('invalid')}
                className={`flex-1 py-2.5 rounded-lg font-bold text-sm border-2 transition-colors ${
                  mode === 'invalid'
                    ? 'bg-rose-50 border-rose-500 text-rose-700'
                    : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300'
                }`}
                aria-label="만료된 토큰 시나리오"
              >
                만료된 토큰
              </button>
            </div>

            {/* 메인 레이아웃 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">

              {/* 왼쪽: 시각화 */}
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
                <h2 className="text-sm font-bold text-slate-600">인증 흐름</h2>

                {/* 토큰 카드 */}
                <div className={`p-3 rounded-lg border-2 text-center transition-all duration-300 ${TOKEN_CLASS[stepData.tokenState]}`}>
                  <div className="text-xs font-bold mb-1">출입 증명서 (JWT)</div>
                  <div className="text-lg font-bold">{TOKEN_LABEL[stepData.tokenState]}</div>
                  {stepData.tokenState === 'valid' && (
                    <div className="text-xs mt-1 font-mono">eyJhbGci...  exp: 30분</div>
                  )}
                  {stepData.tokenState === 'expired' && (
                    <div className="text-xs mt-1 font-mono text-rose-500">exp: 이미 지남</div>
                  )}
                </div>

                {/* 흐름 시각화: 클라이언트 → 검문소 → 라우터 */}
                <div className="grid grid-cols-3 gap-3">
                  {/* 클라이언트 */}
                  <div className={`p-3 rounded-lg border-2 text-center transition-all duration-300 ${CLIENT_CLASS[stepData.clientState]}`}>
                    <div className="text-2xl mb-1">👤</div>
                    <div className="text-xs font-bold">클라이언트</div>
                    <div className="text-xs mt-1">
                      {stepData.clientState === 'sending-login' && '로그인 요청 중'}
                      {stepData.clientState === 'waiting' && '대기 중...'}
                      {stepData.clientState === 'received-token' && '토큰 수령!'}
                      {stepData.clientState === 'sending-request' && 'Bearer 전송'}
                      {stepData.clientState === 'received-200' && '200 OK 수신'}
                      {stepData.clientState === 'received-401' && '401 거부됨'}
                      {stepData.clientState === 'idle' && '대기'}
                    </div>
                  </div>

                  {/* 검문소 */}
                  <div className={`p-3 rounded-lg border-2 text-center transition-all duration-300 ${GATEKEEPER_CLASS[stepData.gatekeeperState]}`}>
                    <div className="text-2xl mb-1">
                      {stepData.gatekeeperState === 'passed' ? '✅' : stepData.gatekeeperState === 'rejected' ? '🚫' : '🛡️'}
                    </div>
                    <div className="text-xs font-bold">검문소</div>
                    <div className="text-xs mt-1 font-mono">get_current_user</div>
                    <div className="text-xs mt-1">{GATEKEEPER_LABEL[stepData.gatekeeperState]}</div>
                  </div>

                  {/* 라우터 */}
                  <div className={`p-3 rounded-lg border-2 text-center transition-all duration-300 ${ROUTER_CLASS[stepData.routerState]}`}>
                    <div className="text-2xl mb-1">
                      {stepData.routerState === 'active' ? '🟢' : stepData.routerState === 'blocked' ? '🔴' : '⚪'}
                    </div>
                    <div className="text-xs font-bold">라우터</div>
                    <div className="text-xs mt-1 font-mono">/profile</div>
                    <div className="text-xs mt-1">
                      {stepData.routerState === 'active' && '실행 중'}
                      {stepData.routerState === 'blocked' && '진입 불가'}
                      {stepData.routerState === 'idle' && '대기'}
                    </div>
                  </div>
                </div>

                {/* 응답 */}
                <div className={`p-3 rounded-lg border-2 text-center transition-all duration-300 ${RESPONSE_CLASS[stepData.responseState]}`}>
                  <div className="text-xs font-bold mb-1">응답</div>
                  <div className="text-sm font-bold">
                    {stepData.responseState === '200' && '200 OK — {"username": "alice", "msg": "인증 성공!"}'}
                    {stepData.responseState === '401' && '401 Unauthorized — {"detail": "Invalid token"}'}
                    {stepData.responseState === 'idle' && '—'}
                  </div>
                </div>

                {/* 설명 */}
                <div className={`p-4 rounded-lg border text-sm leading-relaxed ${
                  mode === 'valid' ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-rose-50 border-rose-200 text-rose-800'
                }`}>
                  {stepData.desc}
                </div>
              </div>

              {/* 오른쪽: 코드 뷰어 */}
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between items-center">
                  <span>main.py — JWT 인증</span>
                  <span className="text-slate-500">line {stepData.codeLine + 1}</span>
                </div>
                <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
                  {PYTHON_CODE.map((line, idx) => {
                    const isActive = stepData.codeLine === idx;
                    return (
                      <div
                        key={idx}
                        className={`px-4 py-0.5 whitespace-pre ${
                          isActive
                            ? 'bg-amber-100 text-amber-900 font-bold border-l-4 border-amber-400'
                            : 'text-slate-700 border-l-4 border-transparent'
                        }`}
                      >
                        <span className="inline-block w-6 text-right mr-3 text-slate-400 select-none">{idx + 1}</span>
                        {line || '\u00A0'}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* 컨트롤 바 */}
            <div className="flex items-center justify-center gap-3 flex-wrap">
              <button
                onClick={() => handlePrevRef.current()}
                disabled={currentStepIdx === 0}
                className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors"
                aria-label="이전 단계"
              >
                ← 이전
              </button>
              <button
                onClick={togglePlay}
                className={`px-6 py-2 rounded-lg font-bold text-sm transition-colors ${
                  isPlaying
                    ? 'bg-amber-500 text-white hover:bg-amber-600'
                    : 'bg-emerald-600 text-white hover:bg-emerald-700'
                }`}
                aria-label={isPlaying ? '정지' : (isEnd ? '처음부터 재생' : '자동 실행')}
              >
                {isPlaying ? '⏸ 정지' : (isEnd ? '⟳ 처음부터' : '▶ 자동 실행')}
              </button>
              <button
                onClick={() => handleNextRef.current()}
                disabled={isEnd}
                className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors"
                aria-label="다음 단계"
              >
                다음 →
              </button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            {/* 풋노트 */}
            <footer className="text-center text-xs text-slate-400 py-4 space-y-1">
              <p>FastAPI 인터랙티브 학습 — Chapter 3-3. JWT 인증 | 키보드 ← → 지원</p>
              <p>⚠️ 실제 운영에서는 SECRET_KEY를 코드에 직접 쓰지 않는다. 반드시 환경변수로 관리한다.</p>
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
