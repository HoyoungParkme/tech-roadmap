          { side: 'server', label: 'jwt.decode() 검증', detail: 'exp=1747700000 < 현재시각 → 만료', kind: 'reject' },
          { side: 'server', label: 'ExpiredSignatureError', detail: 'JWTError 의 하위 클래스', kind: 'reject' },
          { side: 'client', label: '응답 401', detail: '{"detail":"토큰이 만료되었습니다"}', kind: 'response-fail' },
        ],
        verdict: { ok: false, text: '차단 — 다시 /login 으로 새 토큰 발급받아야 함' },
        keyPoint: 'exp 가 인증 시스템의 안전망. 토큰 유출돼도 시간이 지나면 자동 무효화된다.',
        code: {
          lang: 'python',
          filename: 'expiry.py',
          lines: [
            '"""',
            'expiry.py — JWT 만료 처리',
            '',
            'exp 클레임으로 토큰 수명을 제한하고,',
            '만료된 토큰은 401 로 응답한다.',
            '"""',
            'from datetime import datetime, timedelta',
            'from fastapi import Depends, HTTPException, status',
            'from fastapi.security import OAuth2PasswordBearer',
            'from jose import jwt, JWTError, ExpiredSignatureError',
            'import os',
            '',
            'SECRET_KEY = os.getenv("JWT_SECRET")',
            'ALGORITHM = "HS256"',
            'ACCESS_TOKEN_EXPIRE_MINUTES = 30  # 짧게 유지하는 게 정석',
            '',
            'oauth2_scheme = OAuth2PasswordBearer(tokenUrl="login")',
            '',
            '',
            'def create_access_token(sub: str) -> str:',
            '    """exp 클레임을 포함해서 토큰 발급',
            '',
            '    datetime.utcnow() + timedelta 로 만료 시각을 정한다.',
            '    jose 가 자동으로 datetime → epoch 정수로 변환한다.',
            '    """',
            '    expire = datetime.utcnow() + timedelta(',
            '        minutes=ACCESS_TOKEN_EXPIRE_MINUTES',
            '    )',
            '    payload = {',
            '        "sub": sub,',
            '        "exp": expire,         # 만료 시각',
            '        "iat": datetime.utcnow(),  # 발급 시각',
            '    }',
            '    return jwt.encode(payload, SECRET_KEY, algorithm=ALGORITHM)',
            '',
            '',
            'def verify_token(token: str = Depends(oauth2_scheme)) -> str:',
            '    """만료 케이스를 명시적으로 구분해 응답 메시지를 다르게 준다"""',
            '    try:',
            '        payload = jwt.decode(',
            '            token, SECRET_KEY, algorithms=[ALGORITHM]',
            '        )',
            '        return payload["sub"]',
            '',
            '    except ExpiredSignatureError:',
            '        # 만료된 경우 — 클라이언트에게 명확히 알린다',
            '        raise HTTPException(',
            '            status_code=status.HTTP_401_UNAUTHORIZED,',
            '            detail="토큰이 만료되었습니다. 다시 로그인하세요.",',
            '            headers={"WWW-Authenticate": "Bearer"},',
            '        )',
            '',
            '    except JWTError:',
            '        # 서명 불일치 / 형식 오류',
            '        raise HTTPException(',
            '            status_code=status.HTTP_401_UNAUTHORIZED,',
            '            detail="유효하지 않은 토큰입니다.",',
            '            headers={"WWW-Authenticate": "Bearer"},',
            '        )',
            '',
            '',
            '# ─── 운영 정석 ───',
            '#  • access_token: 짧게 (15~30분)',
            '#  • refresh_token: 길게 (7~30일), 별도 저장',
            '#  • 만료 시 클라이언트가 refresh_token 으로 새 access_token 요청',
            '#  • 로그아웃 = refresh_token 폐기 (블랙리스트 또는 DB 삭제)',
          ],
          highlight: [10, 15, 26, 27, 28, 29, 30, 31, 32, 33, 34, 45, 46, 47, 48, 49, 50, 51, 63, 64, 65, 66, 67],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤
    // ─────────────────────────────────────────────────────
    const KIND_STYLE = {
      request:       { bg: 'bg-indigo-50',  border: 'border-indigo-300',  text: 'text-indigo-800',  badge: 'bg-indigo-200 text-indigo-800',  icon: '→' },
      response:      { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-800', badge: 'bg-emerald-200 text-emerald-800', icon: '←' },
      'response-fail': { bg: 'bg-rose-50',  border: 'border-rose-300',    text: 'text-rose-800',    badge: 'bg-rose-200 text-rose-800',       icon: '✕' },
      check:         { bg: 'bg-violet-50',  border: 'border-violet-300',  text: 'text-violet-800',  badge: 'bg-violet-200 text-violet-800',   icon: '◎' },
      issue:         { bg: 'bg-sky-50',     border: 'border-sky-300',     text: 'text-sky-800',     badge: 'bg-sky-200 text-sky-800',         icon: '✦' },
      reject:        { bg: 'bg-rose-50',    border: 'border-rose-300',    text: 'text-rose-800',    badge: 'bg-rose-200 text-rose-800',       icon: '⛔' },
      'jwt-header':  { bg: 'bg-indigo-50',  border: 'border-indigo-400',  text: 'text-indigo-900',  badge: 'bg-indigo-200 text-indigo-900',   icon: '①' },
      'jwt-payload': { bg: 'bg-fuchsia-50', border: 'border-fuchsia-400', text: 'text-fuchsia-900', badge: 'bg-fuchsia-200 text-fuchsia-900', icon: '②' },
      'jwt-sig':     { bg: 'bg-amber-50',   border: 'border-amber-400',   text: 'text-amber-900',   badge: 'bg-amber-200 text-amber-900',     icon: '③' },
      'http-header': { bg: 'bg-slate-50',   border: 'border-slate-300',   text: 'text-slate-700',   badge: 'bg-slate-200 text-slate-700',     icon: '⚑' },
    };

    const SIDE_LABEL = {
      client: '클라이언트',
      server: '서버',
      token:  'JWT 토큰',
      header: 'HTTP 헤더',
    };

    function ActorCard({ item }) {
      const s = KIND_STYLE[item.kind] || KIND_STYLE.check;
      return (
        <div className={`rounded-lg border ${s.bg} ${s.border} px-3 py-2`}>
          <div className="flex items-center justify-between mb-1">
            <div className="flex items-center gap-2">
              <span className={`text-sm ${s.text}`}>{s.icon}</span>
              <span className={`text-xs font-bold ${s.text}`}>{item.label}</span>
            </div>
            <span className={`text-[10px] px-2 py-0.5 rounded ${s.badge}`}>{SIDE_LABEL[item.side] || item.side}</span>
          </div>
          <div className={`text-[11px] font-mono ${s.text} break-all leading-snug`}>
            {item.detail}
          </div>
        </div>
      );
    }

    function VerdictBox({ verdict }) {
      if (!verdict) return null;
      const ok = verdict.ok;
      return (
        <div
          className={`mt-3 rounded-lg border-2 p-3 flex items-start gap-2 ${
            ok ? 'border-emerald-400 bg-emerald-50' : 'border-rose-400 bg-rose-50'
          }`}
        >
          <span className="text-xl leading-none">{ok ? '✅' : '❌'}</span>
          <div className={`text-sm font-bold ${ok ? 'text-emerald-900' : 'text-rose-900'}`}>
            {verdict.text}
          </div>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">JWT 인증 흐름 시뮬레이션</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 메시지 흐름</span>
          </div>
          <div className="space-y-2">
            {state.actors.map((it, i) => (
              <ActorCard key={i} item={it} />
            ))}
          </div>
          <VerdictBox verdict={state.verdict} />
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">🔐</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter 3-3. JWT 인증</h1>
                <p className="text-sm text-indigo-800/80">로그인 → 토큰 발급 → 헤더 전송 → 검증 → 만료. 5단계로 추적</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                로그인 → access_token 발급 → JWT 구조 이해 → Authorization: Bearer 헤더 → verify_token Depends → exp 만료 자동 처리. 이 5단계가 JWT 인증의 전부다. 실무에서는 access_token + refresh_token 조합으로 보안과 사용성을 동시에 잡는다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['JWT', 'access_token', 'OAuth2PasswordBearer', 'Authorization', 'Bearer', 'Depends', 'verify_token', 'exp', 'jose', 'HS256'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="../index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./chapter-03-04.html" className="underline hover:no-underline">다음 챕터 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
