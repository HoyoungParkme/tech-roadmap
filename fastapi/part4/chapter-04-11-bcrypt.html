<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — IV-4-11. Bcrypt 패스워드 해싱</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-4-11. Bcrypt 패스워드 해싱 + 회원가입
    학습 목표: 비밀번호를 안전하게 해싱·검증하는 방법을 이해한다.
    핵심 비유: 금고 잠금장치 — 열 수는 있지만 역으로 비밀번호를 알아낼 수 없다
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: '평문 저장의 위험',
        desc: 'DB에 비밀번호를 그대로 저장하면 DB가 유출될 때 모든 사용자의 비밀번호가 노출된다. 2024년에도 여전히 발생하는 보안 사고. 비밀번호는 절대 평문 저장하지 않는다.',
        visual: 'danger',
      },
      {
        title: 'Bcrypt 해싱 원리',
        desc: '해싱은 "일방향 함수"다. 비밀번호 → 해시값 변환은 쉽지만, 해시값 → 비밀번호 복원은 불가능하다. Bcrypt는 salt(랜덤값)를 자동 추가하여 같은 비밀번호도 매번 다른 해시값을 만든다. 금고 잠금장치처럼 — 잠글 수 있지만 열쇠 없이는 열 수 없다.',
        visual: 'hash',
      },
      {
        title: '회원가입 (해싱 → 저장)',
        desc: '사용자가 비밀번호를 보내면, 해싱한 후 해시값만 DB에 저장한다. 원본 비밀번호는 어디에도 보관하지 않는다.',
        code: [
          'from passlib.context import CryptContext',
          '',
          'pwd_context = CryptContext(schemes=["bcrypt"], deprecated="auto")',
          '',
          'def hash_password(password: str) -> str:',
          '    return pwd_context.hash(password)',
          '',
          '@app.post("/register")',
          'async def register(username: str = Form(), password: str = Form()):',
          '    hashed = hash_password(password)',
          '    # DB에 username + hashed 저장',
          '    save_user(username, hashed)',
          '    return {"message": "회원가입 완료"}',
        ],
        highlight: [0, 2, 5, 9],
      },
      {
        title: '로그인 (해싱 → 비교)',
        desc: '로그인 시에는 입력된 비밀번호를 다시 해싱하여 DB의 해시값과 비교한다. pwd_context.verify()가 내부적으로 salt를 추출하여 비교해준다.',
        code: [
          'def verify_password(plain_password: str, hashed_password: str) -> bool:',
          '    return pwd_context.verify(plain_password, hashed_password)',
          '',
          '@app.post("/login")',
          'async def login(username: str = Form(), password: str = Form()):',
          '    user = get_user(username)',
          '    if not user:',
          '        raise HTTPException(status_code=401, detail="사용자 없음")',
          '    if not verify_password(password, user.hashed_password):',
          '        raise HTTPException(status_code=401, detail="비밀번호 불일치")',
          '    return {"message": "로그인 성공"}',
        ],
        highlight: [0, 1, 8, 9],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum IV-4-11</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. FastAPI 코어 &gt; Chapter 4. 인증/보안</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-4-11. Bcrypt 패스워드 해싱</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                비밀번호는 <strong>절대 평문 저장하지 않는다</strong>. Bcrypt로 해싱하여 저장하고, 로그인 시 비교한다.
              </p>
            </header>

            {stepData.visual === 'danger' && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div className="p-4 rounded-xl border-2 border-red-300 bg-red-50">
                  <div className="font-bold text-sm text-red-700 mb-2">평문 저장 (위험)</div>
                  <div className="text-xs font-mono bg-white p-2 rounded border border-red-200">
                    <div>id: 1, password: "mypass123"</div>
                    <div>id: 2, password: "qwerty"</div>
                  </div>
                  <div className="text-xs text-red-600 mt-2 font-bold">DB 유출 = 비밀번호 전체 노출</div>
                </div>
                <div className="p-4 rounded-xl border-2 border-emerald-300 bg-emerald-50">
                  <div className="font-bold text-sm text-emerald-700 mb-2">해시 저장 (안전)</div>
                  <div className="text-xs font-mono bg-white p-2 rounded border border-emerald-200">
                    <div>id: 1, password: "$2b$12$LJ3..."</div>
                    <div>id: 2, password: "$2b$12$Kx9..."</div>
                  </div>
                  <div className="text-xs text-emerald-600 mt-2 font-bold">DB 유출해도 원본 복원 불가</div>
                </div>
              </div>
            )}

            {stepData.visual === 'hash' && (
              <div className="bg-white rounded-xl border border-slate-200 p-4">
                <div className="flex flex-col md:flex-row items-center gap-4 justify-center">
                  <div className="p-3 rounded-lg bg-blue-50 border border-blue-200 text-center">
                    <div className="text-xs text-slate-500">입력</div>
                    <div className="font-mono text-sm font-bold">"mypass123"</div>
                  </div>
                  <div className="text-2xl font-bold text-slate-400">→</div>
                  <div className="p-3 rounded-lg bg-amber-50 border border-amber-200 text-center">
                    <div className="text-xs text-slate-500">Bcrypt (salt 포함)</div>
                    <div className="font-mono text-xs font-bold">$2b$12$LJ3m...</div>
                  </div>
                  <div className="text-2xl font-bold text-red-400">✕</div>
                  <div className="p-3 rounded-lg bg-red-50 border border-red-200 text-center">
                    <div className="text-xs text-slate-500">역방향</div>
                    <div className="font-mono text-sm font-bold text-red-500">불가능</div>
                  </div>
                </div>
              </div>
            )}

            {stepData.code && (
              <div className="bg-slate-900 rounded-xl overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono">auth.py — {stepData.title}</div>
                <div className="p-4 text-xs font-mono leading-5">
                  {stepData.code.map((line, i) => (
                    <div key={i} className={`px-2 py-0.5 ${stepData.highlight.includes(i) ? 'bg-emerald-900/40 text-emerald-300' : 'text-slate-300'}`}>{line || '\u00A0'}</div>
                  ))}
                </div>
              </div>
            )}

            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">Step {currentStepIdx + 1}/{STEPS.length}: {stepData.title}</h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-04-10-async-db.html" className="text-slate-500 hover:text-slate-700">&larr; IV-4-10 비동기 DB</a>
              <a href="./chapter-04-12-session-vs-jwt.html" className="text-blue-600 hover:text-blue-800 font-medium">IV-4-12 Session vs JWT &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
