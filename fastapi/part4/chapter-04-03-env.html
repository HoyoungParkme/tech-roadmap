<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — IV-4-3. 환경 변수 (.env + pydantic-settings)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-4-3. 환경 변수 (.env + pydantic-settings)
    학습 목표: 환경 변수를 안전하게 관리하고 pydantic-settings로 검증하는 법을 설명할 수 있다.
    패턴: 하드코딩 → .env → pydantic Settings → 12-factor app
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: '문제 — 비밀값을 코드에 하드코딩한다',
        desc: 'DB 비밀번호, API 키 같은 민감 정보를 소스코드에 직접 적으면? GitHub에 올라가는 순간 전 세계에 공개된다. 환경마다(개발/테스트/프로덕션) 값이 다를 때 코드를 매번 수정해야 한다.',
        visual: 'hardcoded',
      },
      {
        title: '해결 1단계 — .env 파일로 분리',
        desc: '.env 파일에 비밀값을 적고, .gitignore에 추가해서 코드 저장소에 올리지 않는다. python-dotenv 패키지로 불러온다. 이제 코드와 설정이 분리된다.',
        visual: 'dotenv',
      },
      {
        title: '해결 2단계 — pydantic Settings 클래스',
        desc: 'pydantic-settings의 BaseSettings를 상속하면, 환경 변수를 자동으로 읽고 타입 검증까지 해준다. 값이 없거나 타입이 틀리면 앱 시작 시 즉시 에러가 나서, 런타임 버그를 방지한다.',
        visual: 'pydantic',
        showCode: true,
      },
      {
        title: '정리 — 12-Factor App 원칙',
        desc: '12-Factor App의 3번째 원칙: "설정은 환경 변수에 저장한다." 코드(git)와 설정(.env)을 완전히 분리하면, 같은 코드로 개발/스테이징/프로덕션을 실행할 수 있다.',
        visual: 'twelve-factor',
        summary: true,
      },
    ];

    const VISUAL_CLASS = {
      hardcoded: 'border-red-400 bg-red-50',
      dotenv: 'border-amber-400 bg-amber-50',
      pydantic: 'border-emerald-400 bg-emerald-50',
      'twelve-factor': 'border-emerald-400 bg-emerald-50',
    };

    const VISUAL_ICON = {
      hardcoded: '🚨',
      dotenv: '📄',
      pydantic: '✅',
      'twelve-factor': '🏗️',
    };

    const VISUAL_LABEL = {
      hardcoded: '하드코딩 위험',
      dotenv: '.env 파일 분리',
      pydantic: 'pydantic 검증',
      'twelve-factor': '12-Factor 완성',
    };

    const CODE = [
      'from pydantic_settings import BaseSettings',
      '',
      'class Settings(BaseSettings):',
      '    db_url: str',
      '    secret_key: str',
      '    debug: bool = False',
      '',
      '    class Config:',
      '        env_file = ".env"',
      '',
      '# 사용',
      'settings = Settings()',
      'print(settings.db_url)  # .env에서 자동 로드',
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum IV-4-3</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. FastAPI 코어 &gt; Chapter 4. 미들웨어와 설정</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-4-3. 환경 변수 (.env + pydantic-settings)</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                비밀값을 코드에 직접 쓰지 말고, <strong>.env 파일 + pydantic-settings</strong>로 안전하게 관리한다.
              </p>
            </header>

            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="flex flex-col items-center gap-4">
                <div className={`w-full max-w-md p-6 rounded-lg border-2 transition-all duration-300 text-center ${VISUAL_CLASS[stepData.visual]}`}>
                  <div className="text-3xl mb-2">{VISUAL_ICON[stepData.visual]}</div>
                  <div className="font-bold text-sm">{VISUAL_LABEL[stepData.visual]}</div>
                </div>
                {stepData.visual === 'hardcoded' && (
                  <div className="w-full max-w-md bg-slate-900 rounded-lg p-3 text-xs font-mono text-red-300">
                    <div>DATABASE_URL = "postgresql://user:<span className="text-red-400 font-bold">mypassword123</span>@db:5432/app"</div>
                    <div className="text-slate-500 mt-1"># 이 코드가 GitHub에 올라가면...</div>
                  </div>
                )}
                {stepData.visual === 'dotenv' && (
                  <div className="w-full max-w-md grid grid-cols-2 gap-2">
                    <div className="bg-slate-900 rounded-lg p-3 text-xs font-mono text-amber-300">
                      <div className="text-slate-500 mb-1"># .env</div>
                      <div>DB_URL=postgresql://...</div>
                      <div>SECRET_KEY=abc123</div>
                    </div>
                    <div className="bg-slate-900 rounded-lg p-3 text-xs font-mono text-slate-400">
                      <div className="text-slate-500 mb-1"># .gitignore</div>
                      <div>.env</div>
                      <div>*.env</div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            {stepData.showCode && (
              <div className="bg-slate-900 rounded-xl overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono">config.py — pydantic Settings 클래스</div>
                <div className="p-4 text-xs font-mono leading-5">
                  {CODE.map((line, i) => (
                    <div key={i} className={`px-2 py-0.5 ${i >= 2 && i <= 8 ? 'bg-emerald-900/40 text-emerald-300' : 'text-slate-300'}`}>{line || '\u00A0'}</div>
                  ))}
                </div>
              </div>
            )}

            {stepData.summary && (
              <div className="bg-white rounded-xl border border-slate-200 p-4">
                <div className="text-sm font-bold text-slate-600 mb-2">12-Factor App — 설정 관리 원칙</div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-2 text-xs">
                  <div className="p-2 rounded bg-red-50 border border-red-200"><b>코드</b> — git에 저장, 비밀값 없음</div>
                  <div className="p-2 rounded bg-amber-50 border border-amber-200"><b>.env</b> — 환경별 설정, git 제외</div>
                  <div className="p-2 rounded bg-emerald-50 border border-emerald-200"><b>Settings</b> — 타입 검증 + 자동 로드</div>
                </div>
              </div>
            )}

            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-04-02-upload.html" className="text-slate-500 hover:text-slate-700">&larr; IV-4-2 파일 업로드</a>
              <a href="./chapter-04-04-exception-handler.html" className="text-blue-600 hover:text-blue-800 font-medium">IV-4-4 커스텀 Exception Handler &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
