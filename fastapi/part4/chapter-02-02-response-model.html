</head>
<body>
  <div id="root"></div>

  <!--
    FastAPI Chapter 2-2 — Response Model
    학습 목표: response_model 로 응답 스키마를 지정하면 원본 객체에서 어떤 필드가 걸러져 JSON 으로 나가는지 5단계로 추적한다.
    5단계: ① response_model=Schema ② 필드 자동 필터 (password 제거) ③ response_model_exclude ④ status_code ⑤ 다중 응답 (responses={})
    패턴: fastapi v1 — 좌(LiveDataPane: 원본 객체 → 응답 모델 필터 → JSON) / 우(CodeViewer 5탭)
    색상: indigo
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 5단계 시나리오 — Response Model 동작 추적
    //   pane      : LiveDataPane 도메인 상태
    //     - source   : 좌측 "원본 객체" 카드 [{key, value, secret}]
    //     - filter   : 가운데 필터 설명
    //     - output   : 우측 "JSON 응답" 카드 [{key, value}]
    //     - status   : 응답 상태 코드 박스 (text + color)
    //     - branches : 다중 응답 분기 (Step 5)
    //   tabIdx    : 우측 CodeViewer 활성 탭 (0~4)
    // ─────────────────────────────────────────────────────
    const TABS = [
      { filename: 'model.py',    lang: 'python', label: '① response_model' },
      { filename: 'filter.py',   lang: 'python', label: '② 필드 필터' },
      { filename: 'exclude.py',  lang: 'python', label: '③ exclude' },
      { filename: 'status.py',   lang: 'python', label: '④ status_code' },
      { filename: 'multiple.py', lang: 'python', label: '⑤ responses' },
    ];

    // 각 step 별 코드 파일 내용 — 5개 모두 항상 존재 (탭에서 클릭 가능)
    const CODE_FILES = [
      {
        // ── ① model.py ── response_model=Schema
        filename: 'model.py',
        lang: 'python',
        lines: [
          '"""① response_model 지정 — 응답 스키마를 명시한다.',
          '@app.get(..., response_model=UserOut) 한 줄로 나가는 JSON 의 모양이 고정된다."""',
          'from fastapi import FastAPI',
          'from pydantic import BaseModel',
          '',
          'app = FastAPI()',
          '',
          '',
          'class UserOut(BaseModel):',
          '    """응답용 스키마 — id, name, email 만 노출."""',
          '    id: int',
          '    name: str',
          '    email: str',
          '',
          '',
          '@app.get("/users/{user_id}", response_model=UserOut)',
          'def read_user(user_id: int) -> dict:',
          '    """원본 dict 를 반환해도 UserOut 모양으로 직렬화된다."""',
          '    # 의도적으로 password 가 섞인 dict 를 반환한다',
          '    return {',
          '        "id": user_id,',
          '        "name": "Hoyoung",',
          '        "email": "hy@dfocus.net",',
          '        "password": "raw-secret",  # ← 응답엔 안 나간다',
          '    }',
        ],
        highlight: [8, 9, 10, 11, 12, 15, 16],
      },
      {
        // ── ② filter.py ── 필드 자동 필터 (password 제거)
        filename: 'filter.py',
        lang: 'python',
        lines: [
          '"""② 필드 자동 필터 — 스키마에 없는 키는 잘려나간다.',
          'DB 모델(UserDB) 에 password 가 있어도 response_model 에 없으면 응답에서 사라진다."""',
          'from fastapi import FastAPI',
          'from pydantic import BaseModel',
          '',
          'app = FastAPI()',
          '',
          '',
          'class UserDB(BaseModel):',
          '    """DB 에서 그대로 꺼낸 모델 — password 포함."""',
          '    id: int',
          '    name: str',
          '    email: str',
          '    password: str  # 위험: 평문 비밀번호',
          '',
          '',
          'class UserOut(BaseModel):',
          '    """응답용 — password 없음."""',
          '    id: int',
          '    name: str',
          '    email: str',
          '',
          '',
          '@app.get("/users/{user_id}", response_model=UserOut)',
          'def read_user(user_id: int) -> UserDB:',
          '    """UserDB 를 그대로 반환해도 password 가 잘려나간다."""',
          '    return UserDB(',
          '        id=user_id,',
          '        name="Hoyoung",',
          '        email="hy@dfocus.net",',
          '        password="hashed-secret",  # ← 응답에서 자동 제거',
          '    )',
        ],
        highlight: [17, 18, 19, 20, 21, 24, 25, 26, 31],
      },
      {
        // ── ③ exclude.py ── response_model_exclude
        filename: 'exclude.py',
        lang: 'python',
        lines: [
          '"""③ response_model_exclude — 일부 필드만 더 빼고 싶을 때.',
          '같은 스키마를 쓰되 이 엔드포인트에서만 특정 필드를 추가로 숨긴다."""',
          'from fastapi import FastAPI',
          'from pydantic import BaseModel',
          '',
          'app = FastAPI()',
          '',
          '',
          'class UserOut(BaseModel):',
          '    """기본 응답 — id, name, email, phone."""',
          '    id: int',
          '    name: str',
          '    email: str',
          '    phone: str | None = None',
          '',
          '',
          '@app.get(',
          '    "/users/{user_id}/public",',
          '    response_model=UserOut,',
          '    response_model_exclude={"phone"},  # ← phone 만 빼고 응답',
          ')',
          'def read_user_public(user_id: int) -> UserOut:',
          '    """공개 페이지용 — 전화번호는 숨긴다."""',
          '    return UserOut(',
          '        id=user_id,',
          '        name="Hoyoung",',
          '        email="hy@dfocus.net",',
          '        phone="010-0000-1234",  # ← 응답에서 제거됨',
          '    )',
          '',
          '',
          '# 유사 옵션:',
          '#   response_model_include={"id", "name"}  → 화이트리스트',
          '#   response_model_exclude_unset=True      → 입력 안 한 값 제거',
          '#   response_model_exclude_none=True       → None 값 제거',
          '#   response_model_exclude_defaults=True   → 기본값과 같으면 제거',
        ],
        highlight: [17, 18, 19, 20, 21, 27, 28, 32, 33, 34, 35],
      },
      {
        // ── ④ status.py ── status_code
        filename: 'status.py',
        lang: 'python',
        lines: [
          '"""④ status_code — 응답 코드를 명시한다.',
          '기본은 200 OK. 새 자원이면 201, 본문 없으면 204 처럼 의도를 드러낸다."""',
          'from fastapi import FastAPI, status',
          'from pydantic import BaseModel',
          '',
          'app = FastAPI()',
          '',
          '',
          'class UserIn(BaseModel):',
          '    """생성 요청 본문."""',
          '    name: str',
          '    email: str',
          '',
          '',
          'class UserOut(BaseModel):',
          '    """생성 결과 — id 포함."""',
          '    id: int',
          '    name: str',
          '    email: str',
          '',
          '',
          '@app.post(',
          '    "/users",',
          '    response_model=UserOut,',
          '    status_code=status.HTTP_201_CREATED,  # ← 201 명시',
          ')',
          'def create_user(payload: UserIn) -> UserOut:',
          '    """새 유저를 만든다. 201 Created 로 응답."""',
          '    new_id = 42  # 실제로는 DB INSERT 결과',
          '    return UserOut(id=new_id, **payload.model_dump())',
          '',
          '',
          '@app.delete("/users/{user_id}", status_code=204)',
          'def delete_user(user_id: int) -> None:',
          '    """삭제 성공 — 본문 없이 204 No Content."""',
          '    return None',
        ],
        highlight: [21, 22, 23, 24, 25, 26, 32, 33, 34, 35],
      },
      {
        // ── ⑤ multiple.py ── responses={}
        filename: 'multiple.py',
        lang: 'python',
        lines: [
          '"""⑤ 다중 응답 — responses={} 로 분기별 스키마를 선언.',
          '200 외에 404, 422 등 에러 응답 모양도 OpenAPI 에 자동 반영된다."""',
          'from fastapi import FastAPI, HTTPException',
          'from pydantic import BaseModel',
          '',
          'app = FastAPI()',
          '',
          '',
          'class UserOut(BaseModel):',
          '    """정상 응답."""',
          '    id: int',
          '    name: str',
          '    email: str',
          '',
          '',
          'class ErrorOut(BaseModel):',
          '    """에러 응답."""',
          '    code: str',
          '    message: str',
          '',
          '',
          '@app.get(',
          '    "/users/{user_id}",',
          '    response_model=UserOut,',
          '    responses={',
          '        404: {"model": ErrorOut, "description": "유저 없음"},',
          '        422: {"model": ErrorOut, "description": "검증 실패"},',
          '    },',
          ')',
          'def read_user(user_id: int) -> UserOut:',
          '    """유저 조회 — 분기별 응답 모양이 다르다."""',
          '    if user_id == 0:',
          '        raise HTTPException(',
          '            status_code=404,',
          '            detail={"code": "USER_NOT_FOUND", "message": "없다"},',
          '        )',
          '    return UserOut(id=user_id, name="Hoyoung", email="hy@dfocus.net")',
        ],
        highlight: [15, 16, 17, 18, 19, 23, 24, 25, 26, 27, 28],
      },
    ];

    // 각 step 의 도메인 상태
    const STEPS = [
      {
        title: 'Step 1. response_model=Schema — 응답 스키마를 명시한다',
        desc: '엔드포인트 데코레이터에 response_model=UserOut 을 적어두면, 함수가 어떤 모양의 dict 를 돌려주든 FastAPI 가 그 모양으로 다시 검증해서 내보낸다. 즉 "출구 검문소" 역할. Swagger 문서에도 이 모양 그대로 노출된다.',
        tabIdx: 0,
        source: [
          { key: 'id',       value: '42',               secret: false },
          { key: 'name',     value: '"Hoyoung"',        secret: false },
          { key: 'email',    value: '"hy@dfocus.net"',  secret: false },
        ],
        filter: 'response_model=UserOut  · id/name/email 만 통과',
        output: [
          { key: 'id',    value: '42' },
          { key: 'name',  value: '"Hoyoung"' },
          { key: 'email', value: '"hy@dfocus.net"' },
        ],
        status: { code: '200 OK', tone: 'ok' },
        keyPoint: 'response_model 은 "함수 리턴값 → JSON" 사이의 출구 검문소다. 함수가 무엇을 반환하든 이 모양으로 다시 직렬화된다.',
      },
      {
        title: 'Step 2. 필드 자동 필터 — password 가 사라진다',
        desc: 'DB 에서 꺼낸 객체에 password 가 들어있어도, response_model 에 password 가 없으면 응답에서 자동 제거된다. 개발자가 "잊고 password 를 그대로 리턴해도" 클라이언트로 새지 않는다. 보안의 1차 방어선.',
        tabIdx: 1,
        source: [
          { key: 'id',       value: '42',               secret: false },
          { key: 'name',     value: '"Hoyoung"',        secret: false },
          { key: 'email',    value: '"hy@dfocus.net"',  secret: false },
          { key: 'password', value: '"hashed-secret"',  secret: true  },
        ],
        filter: 'UserOut 에 password 가 없음 → 자동 제거',
        output: [
          { key: 'id',    value: '42' },
          { key: 'name',  value: '"Hoyoung"' },
          { key: 'email', value: '"hy@dfocus.net"' },
        ],
        status: { code: '200 OK', tone: 'ok' },
        keyPoint: '스키마에 없는 필드 = 응답에 없음. password, 내부 ID, 관리자 메모 등을 자동으로 가린다.',
      },
      {
        title: 'Step 3. response_model_exclude — 추가 필드 더 숨기기',
        desc: '같은 UserOut 스키마를 쓰지만 "이 엔드포인트에서만 phone 은 빼고 싶다" 면 response_model_exclude={"phone"} 을 추가한다. 스키마는 그대로 두고, 엔드포인트마다 다른 가시성을 줄 수 있다.',
        tabIdx: 2,
        source: [
          { key: 'id',    value: '42',                   secret: false },
          { key: 'name',  value: '"Hoyoung"',            secret: false },
          { key: 'email', value: '"hy@dfocus.net"',      secret: false },
          { key: 'phone', value: '"010-0000-1234"',      secret: true  },
        ],
        filter: 'response_model_exclude={"phone"} · phone 추가 제거',
        output: [
          { key: 'id',    value: '42' },
          { key: 'name',  value: '"Hoyoung"' },
          { key: 'email', value: '"hy@dfocus.net"' },
        ],
        status: { code: '200 OK', tone: 'ok' },
        keyPoint: 'exclude/include/exclude_unset/exclude_none/exclude_defaults — 같은 스키마를 엔드포인트별로 다르게 보여주는 5가지 미세 조정 옵션.',
      },
      {
        title: 'Step 4. status_code — 응답 코드를 의도대로',
        desc: 'POST 로 자원을 새로 만들면 201 Created, DELETE 가 성공해 본문이 없으면 204 No Content 처럼, 데코레이터에 status_code= 를 적어 의도를 분명히 한다. Swagger 문서, 클라이언트 SDK 자동 생성, 모니터링 알람 분기에 그대로 사용된다.',
        tabIdx: 3,
        source: [
          { key: 'name',  value: '"Hoyoung"',           secret: false },
          { key: 'email', value: '"hy@dfocus.net"',     secret: false },
        ],
        filter: 'POST /users + status_code=201_CREATED',
        output: [
          { key: 'id',    value: '42' },
          { key: 'name',  value: '"Hoyoung"' },
          { key: 'email', value: '"hy@dfocus.net"' },
        ],
        status: { code: '201 Created', tone: 'created' },
        keyPoint: '200 만 쓰지 말자. 201/204/202 처럼 의미를 담은 코드는 운영 단계에서 로깅/알람/캐시 정책의 핵심 키가 된다.',
      },
      {
        title: 'Step 5. 다중 응답 — responses={} 로 분기별 스키마',
        desc: '정상 응답 외에 404, 422 같은 에러 응답에도 각각의 모양(model) 을 미리 선언할 수 있다. responses={404: {"model": ErrorOut}} 로 적으면 Swagger 에 모든 분기가 자동 노출되고, 프론트엔드 타입도 자동 생성된다. "성공만 문서화" 하는 시대는 끝났다.',
        tabIdx: 4,
        source: [
          { key: 'user_id', value: '0  (없음)', secret: false },
        ],
        filter: 'user_id == 0 → HTTPException(404) 분기',
        output: [
          { key: 'code',    value: '"USER_NOT_FOUND"' },
          { key: 'message', value: '"없다"' },
        ],
        status: { code: '404 Not Found', tone: 'error' },
        branches: [
          { code: '200', model: 'UserOut',  note: '정상 — id/name/email' },
          { code: '404', model: 'ErrorOut', note: '유저 없음 — code/message' },
          { code: '422', model: 'ErrorOut', note: '검증 실패 — code/message' },
        ],
        keyPoint: 'responses={} 는 OpenAPI 의 "분기별 응답 카탈로그". 정상/예외 모양을 한 곳에 모아 두면 클라이언트도 안전하게 분기 처리할 수 있다.',
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤
    // ─────────────────────────────────────────────────────
    const STATUS_TONE = {
      ok:      { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-800' },
      created: { bg: 'bg-sky-50',      border: 'border-sky-300',     text: 'text-sky-800'     },
      error:   { bg: 'bg-rose-50',     border: 'border-rose-300',    text: 'text-rose-800'    },
    };

    function SourceCard({ item }) {
      const s = item.secret;
      const box = s ? 'bg-rose-50 border-rose-300' : 'bg-indigo-50 border-indigo-300';
      const keyC = s ? 'text-rose-700' : 'text-indigo-700';
      const valC = s ? 'text-rose-800 line-through decoration-rose-400' : 'text-indigo-900';
      return (
        <div className={`rounded-lg border px-3 py-2 flex items-center justify-between ${box}`}>
          <div className="flex items-center gap-2">
            <span className={`text-[10px] font-bold w-16 ${keyC}`}>{item.key}</span>
            <span className={`text-sm font-mono ${valC}`}>{item.value}</span>
          </div>
          {s && <span className="text-[10px] px-2 py-0.5 rounded bg-rose-200 text-rose-800">차단</span>}
        </div>
      );
    }

    function OutputCard({ item }) {
      return (
        <div className="rounded-lg border border-emerald-300 bg-emerald-50 px-3 py-2 flex items-center justify-between">
          <span className="text-[10px] font-bold text-emerald-700 w-16">{item.key}</span>
          <span className="text-sm font-mono text-emerald-900">{item.value}</span>
        </div>
      );
    }

    function StatusBadge({ status }) {
      const t = STATUS_TONE[status.tone] || STATUS_TONE.ok;
      return (
        <div className={`mt-3 rounded-lg border-2 px-3 py-2 text-center font-bold text-sm ${t.bg} ${t.border} ${t.text}`}>
          HTTP {status.code}
        </div>
      );
    }

    function BranchesBox({ branches }) {
      if (!branches) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-indigo-400 bg-indigo-50 p-3">
          <div className="text-xs font-bold text-indigo-800 mb-2">⚙ responses={'{}'} 분기 카탈로그</div>
          <ul className="space-y-1">
            {branches.map((b, i) => (
              <li key={i} className="text-xs text-indigo-900 flex gap-2 items-center">
                <span className="font-mono font-bold text-indigo-700 w-10">{b.code}</span>
                <span className="font-mono text-indigo-800 w-20">{b.model}</span>
                <span className="text-indigo-700/80">{b.note}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">Response Model 필터 흐름</h3>
            <span className="text-[10px] text-slate-500">원본 → 필터 → JSON</span>
          </div>

          {/* 원본 객체 */}
          <div className="mb-2">
            <div className="text-[10px] font-bold text-slate-600 mb-1.5 uppercase tracking-wide">① 함수 리턴값 (원본)</div>
            <div className="space-y-1.5">
              {state.source.map((it, i) => <SourceCard key={i} item={it} />)}
            </div>
          </div>

          {/* 필터 박스 */}
          <div className="my-3 rounded-lg border-2 border-dashed border-indigo-400 bg-indigo-50 px-3 py-2 text-center">
            <div className="text-[10px] font-bold text-indigo-700 mb-0.5">② response_model 필터</div>
            <div className="text-xs font-mono text-indigo-900">{state.filter}</div>
          </div>

          {/* JSON 응답 */}
          <div>
            <div className="text-[10px] font-bold text-slate-600 mb-1.5 uppercase tracking-wide">③ 클라이언트 JSON</div>
            <div className="space-y-1.5">
              {state.output.map((it, i) => <OutputCard key={i} item={it} />)}
            </div>
          </div>

          <StatusBadge status={state.status} />
          <BranchesBox branches={state.branches} />

          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer — 5 탭 (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ activeTab, onTabClick, stepIdx, total }) {
      const codeRef = useRef(null);
      const code = CODE_FILES[activeTab];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [activeTab]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 윈도우 헤더 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>

          {/* 탭 바 */}
          <div className="flex bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {TABS.map((t, i) => {
              const active = i === activeTab;
              return (
                <button
                  key={i}
                  onClick={() => onTabClick(i)}
                  className={`px-3 py-1.5 text-[11px] font-mono border-r border-slate-700 whitespace-nowrap transition ${
                    active
                      ? 'bg-[#282c34] text-indigo-300 border-t-2 border-t-indigo-400'
                      : 'bg-slate-900 text-slate-400 hover:text-slate-200 hover:bg-slate-800'
                  }`}
                  title={t.label}
                >
                  {t.filename}
                </button>
              );
            })}
          </div>

          {/* 코드 영역 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>

          {/* 푸터 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const [manualTab, setManualTab] = useState(null);  // null = step 의 tabIdx 따름
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // step 이동 시 수동 탭 해제
      useEffect(() => {
        setManualTab(null);
      }, [stepIdx]);

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동재생 3000ms
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;
      const activeTab = manualTab !== null ? manualTab : step.tabIdx;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">
                2-2
              </span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter 2-2. Response Model</h1>
                <p className="text-sm text-indigo-800/80">
                  원본 객체 → 응답 모델 필터 → JSON. 5단계로 추적
                </p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">
                ← 챕터 목록
              </a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`} />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer activeTab={activeTab} onTabClick={(i) => setManualTab(i)} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 — 4버튼 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40">← 이전</button>
              <button
                onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계 · 우측 탭 클릭으로 임의 파일 열람</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                response_model 은 "출구 검문소"다. 함수가 무엇을 반환하든 선언된 스키마 모양으로 다시 직렬화한다.
                추가로 exclude/include 로 미세 조정하고, status_code 와 responses={} 로 응답 의도까지 분명히 하면
                Swagger 문서·클라이언트 SDK·운영 알람이 모두 한 줄짜리 선언에서 자동으로 따라온다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['response_model', 'Pydantic', 'BaseModel', 'exclude', 'include', 'status_code', '201 Created', '204 No Content', 'responses', 'OpenAPI'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./chapter-02-01-params.html" className="underline hover:no-underline">← 이전: 2-1 Params</a>
              <a href="../index.html" className="underline hover:no-underline">챕터 목록</a>
              <a href="./chapter-02-03-exception.html" className="underline hover:no-underline">다음: 2-3 Exception →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
