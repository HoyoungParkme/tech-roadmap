<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 인터랙티브 학습 — Chapter 2-2. Response Model</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    ─────────────────────────────────────────────────────────────
    FastAPI Chapter 2-2 — Response Model과 데이터 필터링
    ─────────────────────────────────────────────────────────────
    학습 목표 : response_model로 응답 스키마를 지정하면
               DB 데이터의 민감 필드(비밀번호 등)가 자동 제거되는 원리 이해.
    ─────────────────────────────────────────────────────────────
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PYTHON_CODE = [
      "from fastapi import FastAPI",                           // 0
      "from pydantic import BaseModel",                        // 1
      "",                                                       // 2
      "# 요청용 모델 (클라이언트 → 서버)",                       // 3
      "class UserCreate(BaseModel):",                           // 4
      "    name: str",                                          // 5
      "    email: str",                                         // 6
      "    password: str",                                      // 7
      "",                                                       // 8
      "# 응답용 모델 (서버 → 클라이언트) — 비밀번호 없음!",       // 9
      "class UserResponse(BaseModel):",                         // 10
      "    id: int",                                            // 11
      "    name: str",                                          // 12
      "    email: str",                                         // 13
      "    # password 필드가 없다 → 응답에서 자동 제거",          // 14
      "",                                                       // 15
      "app = FastAPI()",                                        // 16
      "",                                                       // 17
      "# response_model=UserResponse → 출구 필터 역할",          // 18
      "@app.get('/users/{user_id}', response_model=UserResponse)",// 19
      "def get_user(user_id: int):",                            // 20
      "    # DB에서 꺼낸 데이터 (비밀번호 포함)",                 // 21
      "    db_user = {",                                         // 22
      "        'id': user_id,",                                  // 23
      "        'name': 'Alice',",                                // 24
      "        'email': 'alice@example.com',",                   // 25
      "        'password': 'hashed_secret_123',",                // 26
      "    }",                                                   // 27
      "    return db_user  # 그대로 반환해도 안전!",               // 28
    ];

    const STEPS = [
      {
        codeLine: 19,
        desc: "[요청 도착] 클라이언트가 GET /users/1 을 요청합니다. 데코레이터에 response_model=UserResponse가 지정되어 있습니다.",
        dbFields: [],
        filterState: 'idle',
        responseFields: [],
        responseState: 'idle',
      },
      {
        codeLine: 22,
        desc: "[DB 조회] 함수가 DB에서 사용자 데이터를 꺼냅니다. id, name, email은 물론 password(해시된 비밀번호)까지 모두 포함되어 있습니다.",
        dbFields: [
          { name: 'id', value: '1', safe: true },
          { name: 'name', value: "'Alice'", safe: true },
          { name: 'email', value: "'alice@example.com'", safe: true },
          { name: 'password', value: "'hashed_secret_123'", safe: false },
        ],
        filterState: 'idle',
        responseFields: [],
        responseState: 'idle',
      },
      {
        codeLine: 28,
        desc: "[return] 함수가 db_user dict를 그대로 반환합니다. 비밀번호가 포함된 채로! 하지만 걱정할 필요 없습니다...",
        dbFields: [
          { name: 'id', value: '1', safe: true },
          { name: 'name', value: "'Alice'", safe: true },
          { name: 'email', value: "'alice@example.com'", safe: true },
          { name: 'password', value: "'hashed_secret_123'", safe: false },
        ],
        filterState: 'filtering',
        responseFields: [],
        responseState: 'idle',
      },
      {
        codeLine: 10,
        desc: "[필터 통과] response_model=UserResponse가 출구 필터 역할을 합니다. UserResponse에 정의된 필드(id, name, email)만 통과시키고, password는 모델에 없으므로 자동 제거됩니다.",
        dbFields: [
          { name: 'id', value: '1', safe: true },
          { name: 'name', value: "'Alice'", safe: true },
          { name: 'email', value: "'alice@example.com'", safe: true },
          { name: 'password', value: "'hashed_secret_123'", safe: false },
        ],
        filterState: 'done',
        responseFields: [
          { name: 'id', value: '1' },
          { name: 'name', value: "'Alice'" },
          { name: 'email', value: "'alice@example.com'" },
        ],
        responseState: 'idle',
      },
      {
        codeLine: 19,
        desc: "[200 안전한 응답] 클라이언트에게 전달되는 JSON에는 password가 없습니다. 개발자가 실수로 return db_user를 해도 response_model이 보호해 줍니다.",
        dbFields: [
          { name: 'id', value: '1', safe: true },
          { name: 'name', value: "'Alice'", safe: true },
          { name: 'email', value: "'alice@example.com'", safe: true },
          { name: 'password', value: "'hashed_secret_123'", safe: false },
        ],
        filterState: 'done',
        responseFields: [
          { name: 'id', value: '1' },
          { name: 'name', value: "'Alice'" },
          { name: 'email', value: "'alice@example.com'" },
        ],
        responseState: '200',
      },
    ];

    const FILTER_CLASS = {
      'idle':      'bg-slate-100 border-slate-300 text-slate-500',
      'filtering': 'bg-amber-100 border-amber-400 text-amber-700 animate-pulse',
      'done':      'bg-emerald-100 border-emerald-400 text-emerald-700',
    };

    const FILTER_LABEL = {
      'idle':      '대기',
      'filtering': '필터링 중...',
      'done':      '필터 완료',
    };

    const RESPONSE_STATE_CLASS = {
      'idle': 'bg-slate-50 border-slate-200 text-slate-400',
      '200':  'bg-emerald-100 border-emerald-400 text-emerald-700',
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx >= STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handlePrev = () => setCurrentStepIdx(prev => (prev > 0 ? prev - 1 : prev));

      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        const id = setInterval(() => handleNextRef.current(), 2200);
        return () => clearInterval(id);
      }, [isPlaying]);

      useEffect(() => {
        const handler = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);

      const togglePlay = () => {
        if (isEnd) { setCurrentStepIdx(0); setIsPlaying(true); return; }
        setIsPlaying(prev => !prev);
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            <nav className="flex items-center justify-between text-sm text-slate-500">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum IV-2-2</span>
            </nav>

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-xl md:text-2xl font-bold text-slate-800 mb-2">Chapter 2-2. Response Model과 데이터 필터링</h1>
              <p className="text-slate-600 text-sm leading-relaxed">
                <code className="text-xs bg-slate-100 px-1 rounded">response_model</code>은 응답의 <strong>출구 필터</strong>다.
                DB에서 꺼낸 데이터에 비밀번호가 포함되어 있어도, 이 필터를 통과하면 허용된 필드만 남고 나머지는 자동 제거된다.
              </p>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              {/* 시각화 */}
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
                <h2 className="text-sm font-bold text-slate-600">데이터 필터링 흐름</h2>

                {/* DB 데이터 */}
                <div className="space-y-1">
                  <h3 className="text-xs font-bold text-slate-500">DB에서 꺼낸 데이터 (db_user)</h3>
                  {stepData.dbFields.length === 0 ? (
                    <div className="text-xs text-slate-400 bg-slate-50 rounded-lg p-3 text-center">아직 조회 전</div>
                  ) : (
                    <div className="space-y-1">
                      {stepData.dbFields.map((f, i) => (
                        <div key={i} className={`flex justify-between items-center p-2 rounded border text-sm font-mono transition-all duration-300 ${
                          f.safe ? 'bg-slate-50 border-slate-200 text-slate-700' : 'bg-rose-50 border-rose-300 text-rose-700'
                        }`}>
                          <span className="font-bold">{f.name}</span>
                          <span>{f.value} {!f.safe && <span className="text-xs ml-1">(민감!)</span>}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* 필터 게이트 */}
                <div className={`p-3 rounded-lg border-2 text-center transition-all duration-300 ${FILTER_CLASS[stepData.filterState]}`}>
                  <div className="text-xs font-bold mb-1">response_model = UserResponse</div>
                  <div className="text-sm font-bold">{FILTER_LABEL[stepData.filterState]}</div>
                  {stepData.filterState === 'done' && (
                    <div className="text-xs mt-1">password 필드 → 제거됨</div>
                  )}
                </div>

                {/* 응답 데이터 */}
                <div className="space-y-1">
                  <h3 className="text-xs font-bold text-slate-500">클라이언트에게 전달되는 응답</h3>
                  {stepData.responseFields.length === 0 ? (
                    <div className="text-xs text-slate-400 bg-slate-50 rounded-lg p-3 text-center">—</div>
                  ) : (
                    <div className="space-y-1">
                      {stepData.responseFields.map((f, i) => (
                        <div key={i} className="flex justify-between items-center p-2 rounded border bg-emerald-50 border-emerald-200 text-emerald-700 text-sm font-mono transition-all duration-300">
                          <span className="font-bold">{f.name}</span>
                          <span>{f.value}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* 응답 상태 */}
                <div className={`p-3 rounded-lg border-2 text-center transition-all duration-300 ${RESPONSE_STATE_CLASS[stepData.responseState]}`}>
                  <div className="text-sm font-bold">
                    {stepData.responseState === '200' && '200 OK — password 없는 안전한 JSON'}
                    {stepData.responseState === 'idle' && '—'}
                  </div>
                </div>

                {/* 설명 */}
                <div className="p-4 rounded-lg border bg-blue-50 border-blue-200 text-blue-800 text-sm leading-relaxed">
                  {stepData.desc}
                </div>
              </div>

              {/* 코드 뷰어 */}
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between items-center">
                  <span>main.py — Response Model</span>
                  <span className="text-slate-500">line {stepData.codeLine + 1}</span>
                </div>
                <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
                  {PYTHON_CODE.map((line, idx) => {
                    const isActive = stepData.codeLine === idx;
                    return (
                      <div key={idx} className={`px-4 py-0.5 whitespace-pre ${
                        isActive ? 'bg-amber-100 text-amber-900 font-bold border-l-4 border-amber-400' : 'text-slate-700 border-l-4 border-transparent'
                      }`}>
                        <span className="inline-block w-6 text-right mr-3 text-slate-400 select-none">{idx + 1}</span>
                        {line || '\u00A0'}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* 컨트롤 */}
            <div className="flex items-center justify-center gap-3 flex-wrap">
              <button onClick={() => handlePrevRef.current()} disabled={currentStepIdx === 0}
                className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors"
                aria-label="이전 단계">← 이전</button>
              <button onClick={togglePlay}
                className={`px-6 py-2 rounded-lg font-bold text-sm transition-colors ${isPlaying ? 'bg-amber-500 text-white hover:bg-amber-600' : 'bg-emerald-600 text-white hover:bg-emerald-700'}`}
                aria-label={isPlaying ? '정지' : (isEnd ? '처음부터 재생' : '자동 실행')}>
                {isPlaying ? '⏸ 정지' : (isEnd ? '⟳ 처음부터' : '▶ 자동 실행')}
              </button>
              <button onClick={() => handleNextRef.current()} disabled={isEnd}
                className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors"
                aria-label="다음 단계">다음 →</button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <footer className="text-center text-xs text-slate-400 py-4">
              <p>FastAPI 인터랙티브 학습 — Chapter 2-2. Response Model | 키보드 ← → 지원</p>
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
