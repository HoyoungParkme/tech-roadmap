<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — IV-4-4. 커스텀 Exception Handler</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-4-4. 커스텀 Exception Handler
    학습 목표: 커스텀 예외 클래스와 exception_handler를 사용해 일관된 에러 응답을 만들 수 있다.
    패턴: HTTPException 한계 → 커스텀 예외 → 핸들러 등록 → 일관된 에러 응답
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: '문제 — HTTPException만으로는 부족하다',
        desc: 'FastAPI 기본 HTTPException은 status_code와 detail만 지원한다. 하지만 실무에서는 에러 코드(error_code), 추가 정보(context) 등 일관된 에러 형식이 필요하다. 프론트엔드가 에러를 파싱하기 어렵다.',
        visual: 'problem',
      },
      {
        title: '해결 1단계 — 커스텀 예외 클래스 정의',
        desc: 'Python의 Exception을 상속해서 비즈니스 로직에 맞는 예외를 만든다. 예: ItemNotFound, PermissionDenied, ValidationFailed. 각 예외에 필요한 정보를 담을 수 있다.',
        visual: 'custom-exception',
        showCode: 'exception',
      },
      {
        title: '해결 2단계 — @app.exception_handler 등록',
        desc: '@app.exception_handler(예외클래스) 데코레이터로 해당 예외가 발생하면 어떤 응답을 줄지 정의한다. JSONResponse로 일관된 형식을 반환한다.',
        visual: 'handler',
        showCode: 'handler',
      },
      {
        title: '결과 — 일관된 에러 응답 형식',
        desc: '모든 에러가 {"error_code": "ITEM_NOT_FOUND", "message": "...", "detail": {...}} 같은 통일된 형식으로 나간다. 프론트엔드는 error_code로 분기 처리, message로 사용자에게 표시할 수 있다.',
        visual: 'result',
        summary: true,
      },
    ];

    const VISUAL_CLASS = {
      problem: 'border-red-400 bg-red-50',
      'custom-exception': 'border-amber-400 bg-amber-50',
      handler: 'border-blue-400 bg-blue-50',
      result: 'border-emerald-400 bg-emerald-50',
    };

    const VISUAL_ICON = {
      problem: '😵',
      'custom-exception': '🏷️',
      handler: '🎯',
      result: '✅',
    };

    const VISUAL_LABEL = {
      problem: '에러 형식 불일치',
      'custom-exception': '커스텀 예외 클래스',
      handler: 'Exception Handler 등록',
      result: '일관된 에러 응답',
    };

    const CODE_EXCEPTION = [
      'class ItemNotFound(Exception):',
      '    def __init__(self, item_id: int):',
      '        self.item_id = item_id',
      '        self.message = f"Item {item_id} not found"',
      '',
      '# 서비스에서 사용',
      'def get_item(item_id: int):',
      '    item = db.get(item_id)',
      '    if not item:',
      '        raise ItemNotFound(item_id)',
      '    return item',
    ];

    const CODE_HANDLER = [
      'from fastapi.responses import JSONResponse',
      '',
      '@app.exception_handler(ItemNotFound)',
      'async def item_not_found_handler(request, exc):',
      '    return JSONResponse(',
      '        status_code=404,',
      '        content={',
      '            "error_code": "ITEM_NOT_FOUND",',
      '            "message": exc.message,',
      '            "detail": {"item_id": exc.item_id},',
      '        },',
      '    )',
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const currentCode = stepData.showCode === 'exception' ? CODE_EXCEPTION : stepData.showCode === 'handler' ? CODE_HANDLER : null;
      const codeTitle = stepData.showCode === 'exception' ? 'exceptions.py — 커스텀 예외 클래스' : 'main.py — Exception Handler 등록';

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum IV-4-4</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. FastAPI 코어 &gt; Chapter 4. 미들웨어와 설정</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-4-4. 커스텀 Exception Handler</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                커스텀 예외 + <strong>@app.exception_handler</strong>로 일관된 에러 응답 형식을 만든다.
              </p>
            </header>

            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="flex flex-col items-center gap-4">
                <div className={`w-full max-w-md p-6 rounded-lg border-2 transition-all duration-300 text-center ${VISUAL_CLASS[stepData.visual]}`}>
                  <div className="text-3xl mb-2">{VISUAL_ICON[stepData.visual]}</div>
                  <div className="font-bold text-sm">{VISUAL_LABEL[stepData.visual]}</div>
                </div>
                {stepData.visual === 'problem' && (
                  <div className="w-full max-w-md grid grid-cols-2 gap-2 text-xs font-mono">
                    <div className="bg-slate-900 rounded-lg p-3 text-red-300">
                      <div className="text-slate-500 mb-1"># 응답 1</div>
                      <div>{`{"detail": "Not found"}`}</div>
                    </div>
                    <div className="bg-slate-900 rounded-lg p-3 text-red-300">
                      <div className="text-slate-500 mb-1"># 응답 2</div>
                      <div>{`{"error": "invalid"}`}</div>
                    </div>
                  </div>
                )}
                {stepData.visual === 'result' && (
                  <div className="w-full max-w-md bg-slate-900 rounded-lg p-3 text-xs font-mono text-emerald-300">
                    <div>{`{`}</div>
                    <div>{`  "error_code": "ITEM_NOT_FOUND",`}</div>
                    <div>{`  "message": "Item 42 not found",`}</div>
                    <div>{`  "detail": {"item_id": 42}`}</div>
                    <div>{`}`}</div>
                  </div>
                )}
              </div>
            </div>

            {currentCode && (
              <div className="bg-slate-900 rounded-xl overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono">{codeTitle}</div>
                <div className="p-4 text-xs font-mono leading-5">
                  {currentCode.map((line, i) => (
                    <div key={i} className={`px-2 py-0.5 ${i >= 0 && i <= 3 ? 'bg-emerald-900/40 text-emerald-300' : 'text-slate-300'}`}>{line || '\u00A0'}</div>
                  ))}
                </div>
              </div>
            )}

            {stepData.summary && (
              <div className="bg-white rounded-xl border border-slate-200 p-4">
                <div className="text-sm font-bold text-slate-600 mb-2">에러 처리 3단계</div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-2 text-xs">
                  <div className="p-2 rounded bg-amber-50 border border-amber-200"><b>1. 예외 정의</b> — Exception 상속</div>
                  <div className="p-2 rounded bg-blue-50 border border-blue-200"><b>2. 핸들러 등록</b> — @app.exception_handler</div>
                  <div className="p-2 rounded bg-emerald-50 border border-emerald-200"><b>3. raise</b> — 서비스에서 예외 발생</div>
                </div>
              </div>
            )}

            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-04-03-env.html" className="text-slate-500 hover:text-slate-700">&larr; IV-4-3 환경 변수</a>
              <a href="../part6/chapter-06-01-crud-orm.html" className="text-blue-600 hover:text-blue-800 font-medium">VI-1-1 CRUD + ORM &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
