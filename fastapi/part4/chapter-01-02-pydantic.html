<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 인터랙티브 학습 — Chapter 1-2. Pydantic 데이터 검증</title>

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 (development 버전) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    ─────────────────────────────────────────────────────────────
    FastAPI Chapter 1-2 — Pydantic 데이터 검증
    ─────────────────────────────────────────────────────────────
    학습 목표 : Pydantic 모델이 라우터 진입 전에 요청 바디를 검증하고,
               잘못된 데이터는 자동으로 422 응답으로 되돌려보내는 흐름을 이해한다.
    조작법   : 상단 [잘못된 입력 / 올바른 입력] 토글로 두 시나리오 비교 가능.
               자동 실행, 이전/다음 버튼, 키보드 ←/→로 단계 이동.
    ─────────────────────────────────────────────────────────────
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // -----------------------------------------
    // 1. 교육용 Python 코드 (Pydantic 검증)
    // -----------------------------------------
    const PYTHON_CODE = [
      "from fastapi import FastAPI",
      "from pydantic import BaseModel",
      "",
      "app = FastAPI()",
      "",
      "# 검수원: 입구에서 주문서를 검사한다",
      "class User(BaseModel):",
      "    name: str",
      "    age: int",
      "",
      "@app.post('/users/')",
      "async def create_user(user: User):",
      "    # Pydantic 검증을 통과한 user는",
      "    # 항상 정확한 타입이 보장된다",
      "    return {'msg': f'{user.name}님 등록', 'age': user.age}",
      "",
      "# 잘못된 요청 예:",
      "#   {\"name\": \"Bob\", \"age\": \"스무살\"}",
      "#   → 검수원이 라우터 진입 전 차단, 422 응답",
      "#",
      "# 올바른 요청 예:",
      "#   {\"name\": \"Alice\", \"age\": 25}",
      "#   → 검증 통과, create_user 실행, 200 응답"
    ];

    // -----------------------------------------
    // 2. 시뮬레이션 스텝 정의 — 모드별 분리
    // -----------------------------------------
    // 각 STEP의 상태값:
    //   clientState: 'sending' | 'waiting' | 'received-200' | 'received-422'
    //   pydanticState: 'idle' | 'validating' | 'passed' | 'failed'
    //   nameFieldState, ageFieldState: 'idle' | 'checking' | 'passed' | 'failed'
    //   routerState: 'idle' | 'active'
    //   responseState: 'idle' | '200' | '422'
    //   payload: 화면 중앙 패킷에 표시할 객체
    //   errorDetail: 422일 때 보여줄 어느 필드/왜 (배열)
    const BAD_STEPS = [
      {
        // codeLine 10 = `@app.post('/users/')` — 요청이 향하는 라우터 선언 줄.
        // (이전 값 17은 주석 줄을 가리켜 학습자에게 혼동을 줄 수 있어 교정.)
        codeLine: 10,
        desc: "[요청 전송] 클라이언트가 잘못된 JSON을 전송합니다. age 필드에 '스무살'이라는 문자열이 담겨 있습니다 — 모델은 정수(int)를 기대합니다.",
        clientState: 'sending',
        pydanticState: 'idle',
        nameFieldState: 'idle',
        ageFieldState: 'idle',
        routerState: 'idle',
        responseState: 'idle',
        payload: { name: 'Bob', age: '스무살' },
        errorDetail: null,
      },
      {
        codeLine: 6,
        desc: "[검수원 입장] FastAPI가 라우터를 호출하기 전, 요청 바디를 User 모델에 파싱하려 합니다. Pydantic 검증이 시작됩니다.",
        clientState: 'waiting',
        pydanticState: 'validating',
        nameFieldState: 'checking',
        ageFieldState: 'idle',
        routerState: 'idle',
        responseState: 'idle',
        payload: { name: 'Bob', age: '스무살' },
        errorDetail: null,
      },
      {
        codeLine: 7,
        desc: "[name 필드 통과] name='Bob'은 문자열(str) 타입과 일치합니다. 통과.",
        clientState: 'waiting',
        pydanticState: 'validating',
        nameFieldState: 'passed',
        ageFieldState: 'checking',
        routerState: 'idle',
        responseState: 'idle',
        payload: { name: 'Bob', age: '스무살' },
        errorDetail: null,
      },
      {
        codeLine: 8,
        desc: "[age 필드 실패] age='스무살'은 정수(int) 타입으로 변환할 수 없습니다. ValidationError 발생.",
        clientState: 'waiting',
        pydanticState: 'failed',
        nameFieldState: 'passed',
        ageFieldState: 'failed',
        routerState: 'idle',
        responseState: 'idle',
        payload: { name: 'Bob', age: '스무살' },
        errorDetail: null,
      },
      {
        codeLine: 8,
        desc: "[422 응답 조립] FastAPI가 ValidationError를 잡아 422 Unprocessable Entity 응답을 자동으로 만듭니다. 어느 필드가 왜 틀렸는지 본문에 담깁니다.",
        clientState: 'waiting',
        pydanticState: 'failed',
        nameFieldState: 'passed',
        ageFieldState: 'failed',
        routerState: 'idle',
        responseState: '422',
        payload: { name: 'Bob', age: '스무살' },
        errorDetail: [
          { loc: 'body.age', msg: 'Input should be a valid integer', type: 'int_parsing' }
        ],
      },
      {
        codeLine: 11,
        desc: "[차단 확인] create_user 라우터 함수는 호출조차 되지 않았습니다. 422 응답이 그대로 클라이언트로 되돌아갑니다 — 검수원이 입구에서 막은 것입니다.",
        clientState: 'received-422',
        pydanticState: 'failed',
        nameFieldState: 'passed',
        ageFieldState: 'failed',
        routerState: 'idle',
        responseState: '422',
        payload: { name: 'Bob', age: '스무살' },
        errorDetail: [
          { loc: 'body.age', msg: 'Input should be a valid integer', type: 'int_parsing' }
        ],
      },
    ];

    const GOOD_STEPS = [
      {
        // codeLine 10 = `@app.post('/users/')` — BAD_STEPS와 동일 이유로 라우터 선언 줄을 강조.
        codeLine: 10,
        desc: "[요청 전송] 클라이언트가 올바른 JSON을 전송합니다. age=25는 정수, name='Alice'는 문자열로 모델 정의와 일치합니다.",
        clientState: 'sending',
        pydanticState: 'idle',
        nameFieldState: 'idle',
        ageFieldState: 'idle',
        routerState: 'idle',
        responseState: 'idle',
        payload: { name: 'Alice', age: 25 },
        errorDetail: null,
      },
      {
        codeLine: 6,
        desc: "[검수원 입장] FastAPI가 요청 바디를 User 모델로 파싱하려 합니다. Pydantic 검증이 시작됩니다.",
        clientState: 'waiting',
        pydanticState: 'validating',
        nameFieldState: 'checking',
        ageFieldState: 'idle',
        routerState: 'idle',
        responseState: 'idle',
        payload: { name: 'Alice', age: 25 },
        errorDetail: null,
      },
      {
        // codeLine 7 = `name: str` 줄. desc가 name 통과를 먼저 언급하므로 name 줄을 강조.
        // (이전 값 8(`age: int`)은 desc와 어긋났음.)
        codeLine: 7,
        desc: "[전 필드 통과] name='Alice'(str), age=25(int) 모두 타입과 일치합니다. User 객체가 생성됩니다.",
        clientState: 'waiting',
        pydanticState: 'passed',
        nameFieldState: 'passed',
        ageFieldState: 'passed',
        routerState: 'idle',
        responseState: 'idle',
        payload: { name: 'Alice', age: 25 },
        errorDetail: null,
      },
      {
        codeLine: 11,
        desc: "[라우터 진입] 검증을 통과한 User 객체가 인자로 전달되어 create_user 함수가 실행됩니다.",
        clientState: 'waiting',
        pydanticState: 'passed',
        nameFieldState: 'passed',
        ageFieldState: 'passed',
        routerState: 'active',
        responseState: 'idle',
        payload: { name: 'Alice', age: 25 },
        errorDetail: null,
      },
      {
        codeLine: 14,
        desc: "[200 응답 반환] 라우터가 만든 dict가 JSON으로 직렬화되어 200 OK로 클라이언트에 반환됩니다.",
        clientState: 'received-200',
        pydanticState: 'passed',
        nameFieldState: 'passed',
        ageFieldState: 'passed',
        routerState: 'active',
        responseState: '200',
        payload: { msg: 'Alice님 등록', age: 25 },
        errorDetail: null,
      },
    ];

    // -----------------------------------------
    // 3. 구문 강조(Syntax Highlighting) 헬퍼
    // -----------------------------------------
    const KEYWORDS = new Set(['from', 'import', 'class', 'async', 'def', 'await', 'return']);
    const BUILTINS = new Set(['FastAPI', 'BaseModel', 'str', 'int', 'f']);
    const DECORATORS = new Set(['@app.post']);
    const PUNCTUATION_STRING = new Set(['=', ':', "'", '"']);
    const PATH_PATTERN = /^\/[\w/]*\/?$/;

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('#');
      let codePart = line;
      let commentPart = '';

      if (commentIdx !== -1) {
        codePart = line.slice(0, commentIdx);
        commentPart = line.slice(commentIdx);
      }

      if (!codePart.trim() && commentPart) {
        return <span className="text-slate-500 italic">{commentPart}</span>;
      }

      const tokens = codePart.split(/(\s+|\[|\]|\(|\)|:|,|==|=|!=|\+|-|<|>|\*|'|")/g);

      const highlightedTokens = tokens.map((token, i) => {
        if (KEYWORDS.has(token)) return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        if (BUILTINS.has(token)) return <span key={i} className="text-cyan-400">{token}</span>;
        if (DECORATORS.has(token)) return <span key={i} className="text-yellow-300 font-bold">{token}</span>;
        if (token.trim() !== '' && !isNaN(token)) return <span key={i} className="text-orange-300">{token}</span>;
        if (PUNCTUATION_STRING.has(token) || PATH_PATTERN.test(token)) {
          return <span key={i} className="text-emerald-400">{token}</span>;
        }
        return <span key={i} className="text-slate-200">{token}</span>;
      });

      return (
        <>
          {highlightedTokens}
          {commentPart && <span className="text-slate-500 italic">{commentPart}</span>}
        </>
      );
    };

    // -----------------------------------------
    // 4. 상태별 색상 매핑 (Tailwind JIT 안전: 정적 문자열 매핑)
    // -----------------------------------------
    // 동적 클래스를 문자열 결합으로 만들면 Play CDN의 JIT가 누락하므로,
    // 상태값 → 클래스 묶음으로 미리 매핑한다.
    const FIELD_CLASS = {
      idle:    'bg-white border-slate-200 text-slate-400',
      checking:'bg-amber-50 border-amber-400 text-amber-700 ring-2 ring-amber-200 animate-pulse',
      passed:  'bg-emerald-50 border-emerald-500 text-emerald-700',
      failed:  'bg-rose-50 border-rose-500 text-rose-700 ring-2 ring-rose-200',
    };

    const PYDANTIC_CLASS = {
      idle:      'bg-white border-slate-200 text-slate-500',
      validating:'bg-emerald-50 border-emerald-500 text-emerald-700 ring-2 ring-emerald-300 shadow-lg',
      passed:    'bg-emerald-100 border-emerald-600 text-emerald-800',
      failed:    'bg-rose-100 border-rose-600 text-rose-800 ring-2 ring-rose-300 shadow-lg',
    };

    const ROUTER_CLASS = {
      idle:   'bg-white border-slate-200 text-slate-400 border-dashed',
      active: 'bg-emerald-50 border-emerald-500 text-emerald-700 ring-2 ring-emerald-300 shadow-md',
    };

    const RESPONSE_CLASS = {
      idle: 'bg-white border-slate-200 text-slate-400',
      '200': 'bg-emerald-100 border-emerald-600 text-emerald-800',
      '422': 'bg-rose-100 border-rose-600 text-rose-800',
    };

    const CLIENT_CLASS = {
      sending:        'bg-emerald-100 border-emerald-500 text-emerald-700',
      waiting:        'bg-slate-100 border-slate-300 text-slate-500',
      'received-200': 'bg-emerald-100 border-emerald-600 text-emerald-800',
      'received-422': 'bg-rose-100 border-rose-600 text-rose-800',
    };

    const CLIENT_LABEL = {
      sending: 'POST 요청 전송',
      waiting: '응답 대기...',
      'received-200': '200 OK',
      'received-422': '422 Unprocessable Entity',
    };

    // -----------------------------------------
    // 5. 메인 앱 컴포넌트
    // -----------------------------------------
    function App() {
      const [mode, setMode] = useState('bad'); // 'bad' | 'good'
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const STEPS = mode === 'bad' ? BAD_STEPS : GOOD_STEPS;
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      // handleNextRef와 동일한 패턴 — setInterval과 키보드 리스너에서 항상 최신 함수 참조.
      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      const switchMode = (newMode) => {
        if (newMode === mode) return;
        setMode(newMode);
        setCurrentStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 2500);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      // 키보드 ←/→ 단계 이동.
      // 두 핸들러 모두 Ref 패턴으로 최신 함수를 참조하므로 deps는 비워서 리스너 교체 비용을 없앤다.
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const fieldBox = (label, value, state) => (
        <div className={`flex items-center justify-between rounded-md border-2 px-3 py-2 text-sm font-mono transition-all duration-300 ${FIELD_CLASS[state]}`}>
          <span className="font-semibold">{label}</span>
          <span className="opacity-80">{JSON.stringify(value)}</span>
          <span className="text-xs ml-2">
            {state === 'passed' && '✓ ok'}
            {state === 'failed' && '✗ fail'}
            {state === 'checking' && '⟳ 검사'}
            {state === 'idle' && '· 대기'}
          </span>
        </div>
      );

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">

            {/* 허브 네비게이션 */}
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-emerald-700 hover:text-emerald-900 font-medium">
                <span aria-hidden="true">←</span> 허브로 돌아가기
              </a>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-xl">F</div>
                <h1 className="text-2xl font-bold text-slate-800">Chapter 1-2. Pydantic 데이터 검증</h1>
              </div>
              <p className="text-slate-600">
                Pydantic은 FastAPI 주방의 <b>입구 검수원</b>입니다. 잘못된 주문서는 라우터에 닿기도 전에 <b>422 응답</b>으로 되돌려보내고, 올바른 주문서만 안으로 통과시킵니다.
              </p>
            </header>

            {/* 시나리오 토글 */}
            <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row sm:items-center gap-3">
              <span className="text-sm font-bold text-slate-700">시나리오:</span>
              <div className="flex gap-2" role="tablist" aria-label="검증 시나리오 선택">
                <button
                  role="tab"
                  aria-selected={mode === 'bad'}
                  onClick={() => switchMode('bad')}
                  className={`px-4 py-2 rounded-lg text-sm font-medium border-2 transition ${mode === 'bad' ? 'bg-rose-600 text-white border-rose-700 shadow-sm' : 'bg-white text-slate-700 border-slate-200 hover:border-rose-300'}`}>
                  잘못된 입력 → 422
                </button>
                <button
                  role="tab"
                  aria-selected={mode === 'good'}
                  onClick={() => switchMode('good')}
                  className={`px-4 py-2 rounded-lg text-sm font-medium border-2 transition ${mode === 'good' ? 'bg-emerald-600 text-white border-emerald-700 shadow-sm' : 'bg-white text-slate-700 border-slate-200 hover:border-emerald-300'}`}>
                  올바른 입력 → 200
                </button>
              </div>
              <span className="sm:ml-auto text-xs text-slate-500">
                키보드 ←/→로 단계 이동 가능
              </span>
            </div>

            {/* 상단: 현재 단계 설명 */}
            <div className={`p-5 rounded-xl shadow-sm border min-h-[100px] flex flex-col justify-center ${mode === 'bad' ? 'bg-rose-700 border-rose-800 text-white' : 'bg-emerald-700 border-emerald-800 text-white'}`}>
              <h3 className={`text-xs font-bold mb-2 uppercase tracking-wider ${mode === 'bad' ? 'text-rose-200' : 'text-emerald-200'}`}>현재 검증 상태</h3>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 좌우 레이아웃 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch h-full">

              {/* 왼쪽: 다이어그램 */}
              <div className="flex flex-col space-y-6">

                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-1 flex flex-col min-h-[500px] justify-between relative overflow-hidden">

                  {/* 클라이언트 영역 */}
                  <div className="flex justify-center mb-3">
                    <div className={`px-6 py-3 rounded-lg border-2 font-bold w-56 text-center transition-all duration-500 ${CLIENT_CLASS[stepData.clientState]}`}>
                      <div className="text-xs mb-1 uppercase tracking-widest opacity-70">Client</div>
                      {CLIENT_LABEL[stepData.clientState]}
                    </div>
                  </div>

                  {/* 패킷 (요청 본문) */}
                  <div className="flex justify-center my-1 h-12 relative">
                    <div className="w-1 border-l-2 border-dashed border-slate-300 h-full absolute left-1/2"></div>
                    <div className="bg-slate-800 text-emerald-400 text-xs font-mono p-2 rounded shadow-md z-10 self-center absolute whitespace-nowrap">
                      {JSON.stringify(stepData.payload)}
                    </div>
                  </div>

                  {/* FastAPI 내부 영역 */}
                  <div className="border-2 border-slate-200 rounded-xl p-4 bg-slate-50 flex-1 flex flex-col gap-3 relative">
                    <div className="absolute top-0 left-0 bg-slate-200 text-slate-600 text-xs font-bold px-3 py-1 rounded-br-lg">FastAPI Application</div>

                    {/* Pydantic 검수원 */}
                    <div className={`mt-5 px-4 py-3 rounded-lg border-2 transition-all duration-500 ${PYDANTIC_CLASS[stepData.pydanticState]}`}>
                      <div className="flex items-center justify-between mb-2">
                        <div>
                          <div className="text-xs uppercase tracking-widest opacity-70">Pydantic</div>
                          <div className="font-bold">User 모델 검수원</div>
                        </div>
                        <div className="text-xs font-mono">
                          {stepData.pydanticState === 'idle' && '대기'}
                          {stepData.pydanticState === 'validating' && '검사 중...'}
                          {stepData.pydanticState === 'passed' && '✓ 전 필드 통과'}
                          {stepData.pydanticState === 'failed' && '✗ ValidationError'}
                        </div>
                      </div>

                      {/* 필드별 검사 슬롯 */}
                      <div className="space-y-2">
                        {fieldBox('name: str', stepData.payload.name, stepData.nameFieldState)}
                        {fieldBox('age: int', stepData.payload.age, stepData.ageFieldState)}
                      </div>
                    </div>

                    {/* 라우터 함수 */}
                    <div className={`px-4 py-3 rounded-lg border-2 text-center font-bold transition-all duration-500 ${ROUTER_CLASS[stepData.routerState]}`}>
                      <div className="text-xs uppercase tracking-widest opacity-70">Router</div>
                      <div>async def create_user(user)</div>
                      {stepData.routerState === 'idle' && (
                        <div className="text-[10px] mt-1 italic">{mode === 'bad' ? '호출되지 않음' : '아직 대기'}</div>
                      )}
                      {stepData.routerState === 'active' && (
                        <div className="text-[10px] mt-1 bg-emerald-200 text-emerald-800 px-2 py-0.5 rounded-full inline-block">실행 중</div>
                      )}
                    </div>
                  </div>

                  {/* 응답 영역 */}
                  <div className="flex justify-center mt-3">
                    <div className={`px-6 py-3 rounded-lg border-2 font-bold w-full max-w-md text-center transition-all duration-500 ${RESPONSE_CLASS[stepData.responseState]}`}>
                      <div className="text-xs uppercase tracking-widest opacity-70">Response</div>
                      {stepData.responseState === 'idle' && '— 아직 없음 —'}
                      {stepData.responseState === '200' && '200 OK · ' + JSON.stringify(stepData.payload)}
                      {stepData.responseState === '422' && stepData.errorDetail && (
                        <div className="text-left text-xs font-mono mt-2 bg-white/60 p-2 rounded">
                          {stepData.errorDetail.map((d, i) => (
                            <div key={i}>
                              <span className="font-bold">{d.loc}</span>: {d.msg} <span className="opacity-60">[{d.type}]</span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>

                </div>

                {/* 컨트롤 바 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'} onClick={togglePlay} className={`flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center ${mode === 'bad' ? 'bg-rose-600 hover:bg-rose-700' : 'bg-emerald-600 hover:bg-emerald-700'}`}>
                      {isPlaying ? (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                      ) : (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                      )}
                    </button>
                    <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                  </div>
                  <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                    Step: {currentStepIdx + 1} / {STEPS.length}
                  </div>
                </div>
              </div>

              {/* 오른쪽: 코드 뷰어 */}
              <div className="relative min-h-[500px] lg:min-h-0 rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-slate-900 flex flex-col">
                  <div className="p-5 overflow-y-auto flex-1 text-sm font-mono text-slate-300 scroll-smooth leading-relaxed">
                    {PYTHON_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div
                          key={idx}
                          className={`flex px-2 py-0.5 rounded transition-colors ${isActive ? (mode === 'bad' ? 'bg-rose-900/60 text-white font-bold border-l-4 border-rose-400 shadow-inner' : 'bg-emerald-900/60 text-white font-bold border-l-4 border-emerald-400 shadow-inner') : 'border-l-4 border-transparent'}`}
                        >
                          <span className="text-slate-600 select-none mr-4 w-6 text-right inline-block shrink-0 tabular-nums">{idx + 1}</span>
                          <span className="whitespace-pre">{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    // -----------------------------------------
    // 6. 마운트
    // -----------------------------------------
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
