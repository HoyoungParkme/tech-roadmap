<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 인터랙티브 학습 — Chapter 2-3. HTTPException</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    ─────────────────────────────────────────────────────────────
    FastAPI Chapter 2-3 — 예외 처리 (HTTPException)
    ─────────────────────────────────────────────────────────────
    학습 목표 : raise HTTPException으로 처리 흐름을 즉시 중단하고
               원하는 상태 코드 + 메시지를 반환하는 원리 이해.
    조작법   : [정상 요청 / 존재하지 않는 ID] 토글로 두 시나리오 비교.
    ─────────────────────────────────────────────────────────────
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PYTHON_CODE = [
      "from fastapi import FastAPI, HTTPException",           // 0
      "",                                                      // 1
      "app = FastAPI()",                                       // 2
      "",                                                      // 3
      "# 가짜 DB",                                             // 4
      "fake_db = {",                                           // 5
      "    1: {'name': 'Alice', 'email': 'alice@example.com'},",// 6
      "    2: {'name': 'Bob',   'email': 'bob@example.com'},", // 7
      "}",                                                      // 8
      "",                                                       // 9
      "@app.get('/users/{user_id}')",                           // 10
      "def get_user(user_id: int):",                            // 11
      "    user = fake_db.get(user_id)",                        // 12
      "    if user is None:",                                    // 13
      "        raise HTTPException(",                            // 14
      "            status_code=404,",                            // 15
      "            detail='사용자를 찾을 수 없습니다'",            // 16
      "        )",                                               // 17
      "    return user",                                         // 18
    ];

    // --- 정상 요청 (user_id=1) ---
    const OK_STEPS = [
      {
        codeLine: 10,
        desc: "[요청 도착] 클라이언트가 GET /users/1 을 요청합니다.",
        flowState: 'request',
        dbLookup: null,
        exceptionState: 'idle',
        responseState: 'idle',
      },
      {
        codeLine: 12,
        desc: "[DB 조회] fake_db.get(1) — ID 1번 사용자를 찾습니다.",
        flowState: 'lookup',
        dbLookup: { found: true, data: "{'name': 'Alice', 'email': 'alice@...'}" },
        exceptionState: 'idle',
        responseState: 'idle',
      },
      {
        codeLine: 13,
        desc: "[조건 검사] user is None? → False! 사용자가 존재하므로 raise를 건너뜁니다.",
        flowState: 'check-pass',
        dbLookup: { found: true, data: "{'name': 'Alice', 'email': 'alice@...'}" },
        exceptionState: 'skipped',
        responseState: 'idle',
      },
      {
        codeLine: 18,
        desc: "[200 응답] return user — 정상적으로 사용자 데이터를 반환합니다.",
        flowState: 'response',
        dbLookup: { found: true, data: "{'name': 'Alice', 'email': 'alice@...'}" },
        exceptionState: 'skipped',
        responseState: '200',
      },
    ];

    // --- 존재하지 않는 ID (user_id=999) ---
    const NOTFOUND_STEPS = [
      {
        codeLine: 10,
        desc: "[요청 도착] 클라이언트가 GET /users/999 를 요청합니다.",
        flowState: 'request',
        dbLookup: null,
        exceptionState: 'idle',
        responseState: 'idle',
      },
      {
        codeLine: 12,
        desc: "[DB 조회] fake_db.get(999) — ID 999번 사용자를 찾습니다.",
        flowState: 'lookup',
        dbLookup: { found: false, data: 'None' },
        exceptionState: 'idle',
        responseState: 'idle',
      },
      {
        codeLine: 13,
        desc: "[조건 검사] user is None? → True! 사용자가 없으므로 raise 블록으로 진입합니다.",
        flowState: 'check-fail',
        dbLookup: { found: false, data: 'None' },
        exceptionState: 'idle',
        responseState: 'idle',
      },
      {
        codeLine: 14,
        desc: "[raise HTTPException!] 처리 흐름이 즉시 중단됩니다. status_code=404, detail='사용자를 찾을 수 없습니다'가 설정됩니다. return user에는 도달하지 못합니다.",
        flowState: 'exception',
        dbLookup: { found: false, data: 'None' },
        exceptionState: 'raised',
        responseState: 'idle',
      },
      {
        codeLine: 16,
        desc: "[404 응답] FastAPI가 HTTPException을 잡아 {\"detail\": \"사용자를 찾을 수 없습니다\"} JSON을 404 상태 코드로 반환합니다.",
        flowState: 'response',
        dbLookup: { found: false, data: 'None' },
        exceptionState: 'raised',
        responseState: '404',
      },
    ];

    const FLOW_CLASS = {
      'request':    'bg-blue-100 border-blue-400 text-blue-700',
      'lookup':     'bg-amber-100 border-amber-400 text-amber-700',
      'check-pass': 'bg-emerald-100 border-emerald-400 text-emerald-700',
      'check-fail': 'bg-rose-100 border-rose-400 text-rose-700',
      'exception':  'bg-rose-100 border-rose-400 text-rose-700',
      'response':   'bg-slate-100 border-slate-300 text-slate-600',
    };

    const EXCEPTION_CLASS = {
      'idle':    'bg-slate-50 border-slate-200 text-slate-400',
      'skipped': 'bg-emerald-50 border-emerald-200 text-emerald-600',
      'raised':  'bg-rose-100 border-rose-400 text-rose-700',
    };

    const RESPONSE_CLASS = {
      'idle': 'bg-slate-50 border-slate-200 text-slate-400',
      '200':  'bg-emerald-100 border-emerald-400 text-emerald-700',
      '404':  'bg-rose-100 border-rose-400 text-rose-700',
    };

    function App() {
      const [mode, setMode] = useState('ok');
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);

      const STEPS = mode === 'ok' ? OK_STEPS : NOTFOUND_STEPS;
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx >= STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handlePrev = () => setCurrentStepIdx(prev => (prev > 0 ? prev - 1 : prev));

      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        const id = setInterval(() => handleNextRef.current(), 2200);
        return () => clearInterval(id);
      }, [isPlaying]);

      useEffect(() => {
        const handler = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);

      const switchMode = (m) => { if (m === mode) return; setMode(m); setCurrentStepIdx(0); setIsPlaying(false); };
      const togglePlay = () => {
        if (isEnd) { setCurrentStepIdx(0); setIsPlaying(true); return; }
        setIsPlaying(prev => !prev);
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            <nav className="flex items-center justify-between text-sm text-slate-500">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum IV-2-3</span>
            </nav>

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-xl md:text-2xl font-bold text-slate-800 mb-2">Chapter 2-3. 예외 처리 (HTTPException)</h1>
              <p className="text-slate-600 text-sm leading-relaxed">
                <code className="text-xs bg-slate-100 px-1 rounded">raise HTTPException(404, detail="...")</code>을 실행하면
                FastAPI가 즉시 처리를 중단하고 지정한 상태 코드와 메시지를 반환한다.
                주방에서 재료가 없으면 즉시 <strong>"품절"</strong>을 알리고 조리를 중단하는 것과 같다.
              </p>
            </header>

            {/* 시나리오 토글 */}
            <div className="flex gap-2" role="tablist">
              <button role="tab" aria-selected={mode === 'ok'} onClick={() => switchMode('ok')}
                className={`flex-1 py-2.5 rounded-lg font-bold text-sm border-2 transition-colors ${
                  mode === 'ok' ? 'bg-emerald-50 border-emerald-500 text-emerald-700' : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300'
                }`} aria-label="정상 요청 시나리오">정상 요청 (ID=1)</button>
              <button role="tab" aria-selected={mode === 'notfound'} onClick={() => switchMode('notfound')}
                className={`flex-1 py-2.5 rounded-lg font-bold text-sm border-2 transition-colors ${
                  mode === 'notfound' ? 'bg-rose-50 border-rose-500 text-rose-700' : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300'
                }`} aria-label="존재하지 않는 ID 시나리오">존재하지 않는 ID (ID=999)</button>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              {/* 시각화 */}
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
                <h2 className="text-sm font-bold text-slate-600">예외 처리 흐름</h2>

                {/* 처리 흐름 */}
                <div className={`p-3 rounded-lg border-2 text-center transition-all duration-300 ${FLOW_CLASS[stepData.flowState]}`}>
                  <div className="text-xs font-bold mb-1">현재 단계</div>
                  <div className="text-sm font-bold">
                    {stepData.flowState === 'request' && '요청 수신'}
                    {stepData.flowState === 'lookup' && 'DB 조회'}
                    {stepData.flowState === 'check-pass' && 'None 검사 → 통과'}
                    {stepData.flowState === 'check-fail' && 'None 검사 → 실패!'}
                    {stepData.flowState === 'exception' && 'raise HTTPException!'}
                    {stepData.flowState === 'response' && '응답 반환'}
                  </div>
                </div>

                {/* DB 조회 결과 */}
                {stepData.dbLookup && (
                  <div className={`p-3 rounded-lg border text-sm font-mono transition-all duration-300 ${
                    stepData.dbLookup.found ? 'bg-emerald-50 border-emerald-200 text-emerald-700' : 'bg-rose-50 border-rose-200 text-rose-700'
                  }`}>
                    <span className="font-bold">DB 결과:</span> {stepData.dbLookup.data}
                  </div>
                )}

                {/* HTTPException 상태 */}
                <div className={`p-3 rounded-lg border-2 text-center transition-all duration-300 ${EXCEPTION_CLASS[stepData.exceptionState]}`}>
                  <div className="text-xs font-bold mb-1">HTTPException</div>
                  <div className="text-sm font-bold">
                    {stepData.exceptionState === 'idle' && '대기'}
                    {stepData.exceptionState === 'skipped' && '건너뜀 (데이터 존재)'}
                    {stepData.exceptionState === 'raised' && '발생! status=404, detail="사용자를 찾을 수 없습니다"'}
                  </div>
                </div>

                {/* 응답 */}
                <div className={`p-3 rounded-lg border-2 text-center transition-all duration-300 ${RESPONSE_CLASS[stepData.responseState]}`}>
                  <div className="text-sm font-bold">
                    {stepData.responseState === '200' && '200 OK — {"name": "Alice", "email": "alice@..."}'}
                    {stepData.responseState === '404' && '404 Not Found — {"detail": "사용자를 찾을 수 없습니다"}'}
                    {stepData.responseState === 'idle' && '—'}
                  </div>
                </div>

                {/* 설명 */}
                <div className={`p-4 rounded-lg border text-sm leading-relaxed ${
                  mode === 'ok' ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-rose-50 border-rose-200 text-rose-800'
                }`}>{stepData.desc}</div>
              </div>

              {/* 코드 뷰어 */}
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between items-center">
                  <span>main.py — HTTPException</span>
                  <span className="text-slate-500">line {stepData.codeLine + 1}</span>
                </div>
                <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
                  {PYTHON_CODE.map((line, idx) => {
                    const isActive = stepData.codeLine === idx;
                    return (
                      <div key={idx} className={`px-4 py-0.5 whitespace-pre ${
                        isActive ? 'bg-amber-100 text-amber-900 font-bold border-l-4 border-amber-400' : 'text-slate-700 border-l-4 border-transparent'
                      }`}>
                        <span className="inline-block w-6 text-right mr-3 text-slate-400 select-none">{idx + 1}</span>
                        {line || '\u00A0'}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* 컨트롤 */}
            <div className="flex items-center justify-center gap-3 flex-wrap">
              <button onClick={() => handlePrevRef.current()} disabled={currentStepIdx === 0}
                className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors"
                aria-label="이전 단계">← 이전</button>
              <button onClick={togglePlay}
                className={`px-6 py-2 rounded-lg font-bold text-sm transition-colors ${isPlaying ? 'bg-amber-500 text-white hover:bg-amber-600' : 'bg-emerald-600 text-white hover:bg-emerald-700'}`}
                aria-label={isPlaying ? '정지' : (isEnd ? '처음부터 재생' : '자동 실행')}>
                {isPlaying ? '⏸ 정지' : (isEnd ? '⟳ 처음부터' : '▶ 자동 실행')}
              </button>
              <button onClick={() => handleNextRef.current()} disabled={isEnd}
                className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors"
                aria-label="다음 단계">다음 →</button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <footer className="text-center text-xs text-slate-400 py-4">
              <p>FastAPI 인터랙티브 학습 — Chapter 2-3. HTTPException | 키보드 ← → 지원</p>
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
