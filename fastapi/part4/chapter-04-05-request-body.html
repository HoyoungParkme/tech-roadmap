<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — IV-4-5. Request Body 상세</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-4-5. Request Body 상세
    학습 목표: Body() 사용법과 Path+Query+Body 조합을 이해한다.
    패턴: JSON Body → Body() 직접 사용 → 여러 Body → 조합
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'JSON Body란',
        desc: 'HTTP 요청의 본문(body)에 JSON 데이터를 담아 보낸다. FastAPI는 Pydantic 모델을 선언하면 자동으로 body에서 파싱한다. GET은 body가 없고, POST/PUT/PATCH에서 주로 사용한다.',
        code: [
          'from pydantic import BaseModel',
          '',
          'class Item(BaseModel):',
          '    name: str',
          '    price: float',
          '    is_offer: bool = False',
          '',
          '@app.post("/items/")',
          'async def create_item(item: Item):',
          '    return {"item_name": item.name}',
        ],
        highlight: [7, 8, 9],
      },
      {
        title: 'Body() 직접 사용',
        desc: 'Pydantic 모델 대신 개별 값을 body에서 받고 싶을 때 Body()를 사용한다. Query(), Path()처럼 출처를 명시적으로 지정하는 것이다.',
        code: [
          'from fastapi import Body',
          '',
          '@app.put("/items/{item_id}")',
          'async def update_item(',
          '    item_id: int,',
          '    importance: int = Body()',
          '):',
          '    return {"item_id": item_id, "importance": importance}',
        ],
        highlight: [5],
      },
      {
        title: '여러 Body 파라미터',
        desc: 'Pydantic 모델 2개 이상을 body에 넣으면 FastAPI가 각 모델 이름을 key로 자동 분리한다. 요청 JSON: {"item": {...}, "user": {...}}',
        code: [
          'class Item(BaseModel):',
          '    name: str',
          '    price: float',
          '',
          'class User(BaseModel):',
          '    username: str',
          '    full_name: str | None = None',
          '',
          '@app.put("/items/{item_id}")',
          'async def update_item(item_id: int, item: Item, user: User):',
          '    return {"item_id": item_id, "item": item, "user": user}',
        ],
        highlight: [9, 10],
        json: '{\n  "item": {"name": "Foo", "price": 50.5},\n  "user": {"username": "edgar"}\n}',
      },
      {
        title: 'Path + Query + Body 조합',
        desc: '하나의 엔드포인트에서 Path, Query, Body를 모두 조합할 수 있다. FastAPI는 타입과 기본값을 보고 각각의 출처를 자동 판단한다. Pydantic 모델 → Body, 단순 타입 + Path() → URL 경로, 단순 타입 + 기본값 → Query.',
        code: [
          'from fastapi import FastAPI, Path, Query, Body',
          '',
          '@app.put("/items/{item_id}")',
          'async def update_item(',
          '    item_id: int = Path(ge=1),        # URL 경로',
          '    q: str | None = Query(default=None), # 쿼리스트링',
          '    item: Item,                        # Body (모델)',
          '    user: User,                        # Body (모델)',
          '    importance: int = Body(ge=1),      # Body (단일 값)',
          '):',
          '    return {"item_id": item_id, "q": q}',
        ],
        highlight: [4, 5, 6, 7, 8],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum IV-4-5</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. FastAPI 코어 &gt; Chapter 4. 요청과 응답</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-4-5. Request Body 상세</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                JSON Body를 <strong>Body()</strong>로 직접 받거나, 여러 모델을 조합하고, Path·Query·Body를 하나의 엔드포인트에서 동시에 사용한다.
              </p>
            </header>

            <div className="bg-slate-900 rounded-xl overflow-hidden">
              <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono">main.py — {stepData.title}</div>
              <div className="p-4 text-xs font-mono leading-5">
                {stepData.code.map((line, i) => (
                  <div key={i} className={`px-2 py-0.5 ${stepData.highlight.includes(i) ? 'bg-emerald-900/40 text-emerald-300' : 'text-slate-300'}`}>{line || '\u00A0'}</div>
                ))}
              </div>
            </div>

            {stepData.json && (
              <div className="bg-white rounded-xl border border-slate-200 p-4">
                <div className="text-xs font-bold text-slate-500 mb-2">요청 JSON 예시</div>
                <pre className="text-xs font-mono bg-slate-50 p-3 rounded-lg border border-slate-100">{stepData.json}</pre>
              </div>
            )}

            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">Step {currentStepIdx + 1}/{STEPS.length}: {stepData.title}</h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-04-04-exception-handler.html" className="text-slate-500 hover:text-slate-700">&larr; IV-4-4 예외 처리</a>
              <a href="./chapter-04-06-form.html" className="text-blue-600 hover:text-blue-800 font-medium">IV-4-6 Form 데이터 &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
