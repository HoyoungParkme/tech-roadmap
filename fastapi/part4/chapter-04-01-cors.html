          <div className="flex items-center gap-2 mb-1">
            <span className="text-lg">{isFront ? '🌐' : '⚙️'}</span>
            <span className={`text-xs font-bold ${isFront ? 'text-indigo-800' : 'text-violet-800'}`}>{title}</span>
          </div>
          <div className={`text-[11px] font-mono ${isFront ? 'text-indigo-900' : 'text-violet-900'}`}>{url}</div>
        </div>
      );
    }

    function RequestRow({ req }) {
      const methodColor = {
        GET:     'bg-emerald-200 text-emerald-900',
        POST:    'bg-sky-200 text-sky-900',
        PUT:     'bg-amber-200 text-amber-900',
        DELETE:  'bg-rose-200 text-rose-900',
        OPTIONS: 'bg-amber-200 text-amber-900',
      }[req.method] || 'bg-slate-200 text-slate-900';
      return (
        <div className="rounded-lg border border-slate-200 bg-white px-3 py-2">
          <div className="flex items-center gap-2 mb-1">
            <span className={`text-[10px] font-bold px-2 py-0.5 rounded ${methodColor}`}>{req.method}</span>
            <span className="text-xs font-mono text-slate-800">{req.path}</span>
            {req.preflight && (
              <span className="ml-auto text-[10px] px-2 py-0.5 rounded bg-amber-100 text-amber-800 border border-amber-200">
                preflight ({req.nextMethod})
              </span>
            )}
            {req.withCookie && (
              <span className="ml-auto text-[10px] px-2 py-0.5 rounded bg-violet-100 text-violet-800 border border-violet-200">
                cookie 포함
              </span>
            )}
          </div>
          <div className="text-[10px] text-slate-600 font-mono">
            Origin: <span className="text-indigo-700">{req.origin}</span>
          </div>
        </div>
      );
    }

    const HEADER_STYLE = {
      origin:  { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-900', tag: 'bg-emerald-200 text-emerald-800' },
      methods: { bg: 'bg-sky-50',     border: 'border-sky-300',     text: 'text-sky-900',     tag: 'bg-sky-200 text-sky-800' },
      headers: { bg: 'bg-sky-50',     border: 'border-sky-300',     text: 'text-sky-900',     tag: 'bg-sky-200 text-sky-800' },
      cache:   { bg: 'bg-amber-50',   border: 'border-amber-300',   text: 'text-amber-900',   tag: 'bg-amber-200 text-amber-800' },
      creds:   { bg: 'bg-violet-50',  border: 'border-violet-300',  text: 'text-violet-900',  tag: 'bg-violet-200 text-violet-800' },
      cookie:  { bg: 'bg-rose-50',    border: 'border-rose-300',    text: 'text-rose-900',    tag: 'bg-rose-200 text-rose-800' },
    };

    function HeaderRow({ h }) {
      const s = HEADER_STYLE[h.kind] || HEADER_STYLE.origin;
      return (
        <div className={`rounded-md border ${s.bg} ${s.border} px-2.5 py-1.5 flex items-center gap-2`}>
          <span className={`text-[10px] font-mono font-bold ${s.text} truncate`}>{h.name}</span>
          <span className="text-slate-400 text-xs">:</span>
          <span className={`text-[10px] font-mono ${s.text} truncate flex-1`}>{h.value}</span>
        </div>
      );
    }

    function VerdictBox({ verdict }) {
      if (!verdict) return null;
      const isOk = verdict.kind === 'ok';
      return (
        <div className={`rounded-lg border-2 px-3 py-2 text-xs font-bold ${isOk ? 'border-emerald-400 bg-emerald-50 text-emerald-900' : 'border-rose-400 bg-rose-50 text-rose-900'}`}>
          {isOk ? '✅' : '🚫'} {verdict.text}
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const flow = FLOW_STYLE[state.flow] || FLOW_STYLE.blocked;
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">브라우저 ↔ 백엔드 (CORS)</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 도메인 상태</span>
          </div>

          {/* 노드 — 브라우저(프론트) ↔ 백엔드 */}
          <div className="flex items-stretch gap-2">
            <NodeBox title="브라우저 (프론트)" url={state.request.origin} role="front" />
            <div className={`self-center text-[10px] font-bold border-y-2 px-2 py-1 rounded ${flow.arrow}`}>
              {flow.label}
            </div>
            <NodeBox title="FastAPI (백엔드)" url={state.request.host} role="back" />
          </div>

          {/* 요청 */}
          <div className="mt-3">
            <div className="text-[10px] font-bold text-indigo-700 mb-1">→ Request</div>
            <RequestRow req={state.request} />
          </div>

          {/* 응답 헤더 */}
          <div className="mt-3 flex-1">
            <div className="text-[10px] font-bold text-violet-700 mb-1">← Response Headers (서버 → 브라우저)</div>
            {state.responseHeaders.length === 0 ? (
              <div className="rounded-md border border-dashed border-rose-300 bg-rose-50/40 px-3 py-2 text-[11px] text-rose-700">
                (CORS 헤더 없음 — 그래서 브라우저가 차단한다)
              </div>
            ) : (
              <div className="space-y-1">
                {state.responseHeaders.map((h, i) => <HeaderRow key={i} h={h} />)}
              </div>
            )}
          </div>

          {/* 판정 박스 */}
          <div className="mt-3">
            <VerdictBox verdict={state.verdict} />
          </div>

          {/* 키 포인트 */}
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (5탭 + highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ files, activeIdx, onChangeTab, stepIdx, total }) {
      const code = files[activeIdx];
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 상단 바 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>

          {/* 탭 바 */}
          <div className="flex items-center gap-0.5 px-2 pt-1.5 bg-slate-800/70 border-b border-slate-700 overflow-x-auto">
            {files.map((f, i) => (
              <button
                key={f.filename}
                onClick={() => onChangeTab(i)}
                className={`px-2.5 py-1 text-[10px] font-mono rounded-t-md whitespace-nowrap transition ${
                  i === activeIdx
                    ? 'bg-[#282c34] text-indigo-300 border-x border-t border-slate-700'
                    : 'text-slate-400 hover:text-slate-200'
                }`}
              >
                {f.filename}
              </button>
            ))}
          </div>

          {/* 코드 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>

          {/* 하단 상태 바 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [activeFile, setActiveFile] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 단계 바뀌면 그 단계의 기본 활성 파일로 이동
      useEffect(() => {
        setActiveFile(STEPS[stepIdx].activeFile ?? 0);
      }, [stepIdx]);

      // 키보드 ← →
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동 재생 (3000ms)
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">IV</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter IV-4-1. CORS 미들웨어</h1>
                <p className="text-sm text-indigo-800/80">Same-Origin Policy → CORSMiddleware → allow_origins → preflight → credentials. 5단계로 추적</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer
                files={FILES}
                activeIdx={activeFile}
                onChangeTab={setActiveFile}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                CORS 차단은 브라우저가 한다. 서버가 응답에 Access-Control-Allow-* 헤더를 붙여서 "허락" 사인을 보내면 풀린다. FastAPI 의 CORSMiddleware 가 이 헤더 부착 + preflight 처리 + credentials 까지 자동으로 해준다. 운영에서는 allow_origins 에 정확한 도메인만, 그리고 credentials=True 면 절대 "*" 사용 금지.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['CORS', 'Same-Origin', 'CORSMiddleware', 'allow_origins', 'preflight', 'OPTIONS', 'credentials', 'Access-Control'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="../index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./chapter-04-02-https.html" className="underline hover:no-underline">다음: IV-4-2 HTTPS 적용 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
