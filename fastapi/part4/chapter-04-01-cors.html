<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — IV-4-1. CORS 미들웨어</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-4-1. CORS 미들웨어
    학습 목표: CORS가 왜 필요한지, FastAPI에서 어떻게 설정하는지 설명할 수 있다.
    패턴: 브라우저→서버 요청 차단/허용 시뮬레이션
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: '문제 — 브라우저가 API 호출을 차단한다',
        desc: '프론트엔드(localhost:3000)에서 백엔드(localhost:8000) API를 호출하면 브라우저가 차단한다. "Access to fetch has been blocked by CORS policy" 에러. 왜?',
        browser: { url: 'localhost:3000', state: 'blocked' },
        server: { url: 'localhost:8000', state: 'no-cors' },
        arrow: 'blocked',
      },
      {
        title: '원인 — 동일 출처 정책 (Same-Origin Policy)',
        desc: '[보안] 브라우저는 "같은 출처(프로토콜+도메인+포트)"가 아닌 곳으로의 요청을 기본적으로 차단한다. localhost:3000과 localhost:8000은 포트가 달라서 "다른 출처"다. 이건 브라우저의 보안 정책이다.',
        browser: { url: 'localhost:3000', state: 'asking' },
        server: { url: 'localhost:8000', state: 'no-cors' },
        arrow: 'preflight',
      },
      {
        title: '해결 — CORS 미들웨어 추가',
        desc: '[CORS] 서버가 "이 출처에서 오는 요청은 허용한다"고 응답 헤더에 명시하면 된다. FastAPI에서는 CORSMiddleware를 추가하고 allow_origins에 허용할 출처를 적는다.',
        browser: { url: 'localhost:3000', state: 'allowed' },
        server: { url: 'localhost:8000', state: 'cors-on' },
        arrow: 'allowed',
        showCode: true,
      },
      {
        title: '정리 — 4가지 설정 항목',
        desc: 'allow_origins: 허용할 출처 목록 (["*"]은 전체 허용, 개발용). allow_methods: 허용할 HTTP 메서드. allow_headers: 허용할 헤더. allow_credentials: 쿠키/인증 포함 여부. 프로덕션에서는 "*" 대신 실제 도메인만 허용한다.',
        browser: { url: 'localhost:3000', state: 'allowed' },
        server: { url: 'localhost:8000', state: 'cors-on' },
        arrow: 'allowed',
        summary: true,
      },
    ];

    const BROWSER_CLASS = {
      blocked: 'border-red-400 bg-red-50',
      asking:  'border-amber-400 bg-amber-50 animate-pulse',
      allowed: 'border-emerald-400 bg-emerald-50',
    };

    const SERVER_CLASS = {
      'no-cors': 'border-slate-300 bg-slate-50',
      'cors-on': 'border-emerald-400 bg-emerald-50',
    };

    const ARROW_CLASS = {
      blocked:   'text-red-500',
      preflight: 'text-amber-500',
      allowed:   'text-emerald-500',
    };

    const ARROW_LABEL = {
      blocked:   'BLOCKED',
      preflight: 'OPTIONS (preflight)',
      allowed:   'ALLOWED',
    };

    const CODE = [
      'from fastapi import FastAPI',
      'from fastapi.middleware.cors import CORSMiddleware',
      '',
      'app = FastAPI()',
      '',
      'app.add_middleware(',
      '    CORSMiddleware,',
      '    allow_origins=["http://localhost:3000"],',
      '    allow_credentials=True,',
      '    allow_methods=["*"],',
      '    allow_headers=["*"],',
      ')',
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum IV-4-1</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. FastAPI 코어 &gt; Chapter 4. 미들웨어와 설정</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-4-1. CORS 미들웨어</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                프론트엔드에서 API를 호출하면 브라우저가 차단한다. <strong>CORS(Cross-Origin Resource Sharing)</strong> 설정으로 허용한다.
              </p>
            </header>

            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="grid grid-cols-1 md:grid-cols-[1fr_auto_1fr] gap-4 items-center">
                <div className={`p-4 rounded-lg border-2 transition-all duration-300 text-center ${BROWSER_CLASS[stepData.browser.state]}`}>
                  <div className="text-2xl mb-2">🌐</div>
                  <div className="font-bold text-sm">브라우저 (프론트엔드)</div>
                  <div className="text-xs font-mono mt-1">{stepData.browser.url}</div>
                </div>
                <div className="flex flex-col items-center gap-1">
                  <span className={`text-3xl font-bold transition-all ${ARROW_CLASS[stepData.arrow]}`}>
                    {stepData.arrow === 'blocked' ? '✕' : '→'}
                  </span>
                  <span className={`text-xs font-bold ${ARROW_CLASS[stepData.arrow]}`}>{ARROW_LABEL[stepData.arrow]}</span>
                </div>
                <div className={`p-4 rounded-lg border-2 transition-all duration-300 text-center ${SERVER_CLASS[stepData.server.state]}`}>
                  <div className="text-2xl mb-2">🖥️</div>
                  <div className="font-bold text-sm">FastAPI 서버</div>
                  <div className="text-xs font-mono mt-1">{stepData.server.url}</div>
                  <div className="text-[10px] mt-1 font-bold">{stepData.server.state === 'cors-on' ? 'CORS ON' : 'CORS 없음'}</div>
                </div>
              </div>
            </div>

            {stepData.showCode && (
              <div className="bg-slate-900 rounded-xl overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono">main.py — CORS 설정</div>
                <div className="p-4 text-xs font-mono leading-5">
                  {CODE.map((line, i) => (
                    <div key={i} className={`px-2 py-0.5 ${i >= 5 && i <= 11 ? 'bg-emerald-900/40 text-emerald-300' : 'text-slate-300'}`}>{line || '\u00A0'}</div>
                  ))}
                </div>
              </div>
            )}

            {stepData.summary && (
              <div className="bg-white rounded-xl border border-slate-200 p-4">
                <div className="text-sm font-bold text-slate-600 mb-2">4가지 설정</div>
                <div className="grid grid-cols-2 gap-2 text-xs">
                  <div className="p-2 rounded bg-blue-50 border border-blue-200"><b>allow_origins</b> — 허용할 출처</div>
                  <div className="p-2 rounded bg-amber-50 border border-amber-200"><b>allow_methods</b> — 허용할 메서드</div>
                  <div className="p-2 rounded bg-violet-50 border border-violet-200"><b>allow_headers</b> — 허용할 헤더</div>
                  <div className="p-2 rounded bg-emerald-50 border border-emerald-200"><b>allow_credentials</b> — 쿠키 포함</div>
                </div>
              </div>
            )}

            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-03-03-jwt.html" className="text-slate-500 hover:text-slate-700">&larr; IV-3-3 JWT 인증</a>
              <a href="./chapter-04-02-upload.html" className="text-blue-600 hover:text-blue-800 font-medium">IV-4-2 파일 업로드 &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
