<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — IV-4-2. 파일 업로드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STEPS = [
      { title: '파일 업로드란?', desc: '클라이언트가 이미지, 문서 등을 서버에 보내는 것. HTML form의 multipart/form-data 형식으로 전송한다. FastAPI는 File()과 UploadFile 두 가지 방식을 제공한다.', highlight: null, phase: 'intro' },
      { title: 'File() vs UploadFile', desc: '[비교] File()은 파일 전체를 메모리에 올린다 — 작은 파일에 적합. UploadFile은 스풀(임시 파일)을 사용해 메모리를 아낀다 — 큰 파일에 적합. 실무에서는 대부분 UploadFile을 쓴다.', highlight: 'upload', phase: 'compare' },
      { title: 'UploadFile 속성', desc: '[속성] filename: 원본 파일명, content_type: MIME 타입(image/png 등), file: 실제 파일 객체(SpooledTemporaryFile). await file.read()로 내용을 읽고, await file.seek(0)으로 커서를 처음으로 되돌린다.', highlight: 'attrs', phase: 'detail' },
      { title: '코드 예시 + 다중 파일', desc: '@app.post("/upload")에 file: UploadFile을 선언하면 끝. 다중 파일은 files: list[UploadFile]로 받는다. Swagger UI에서 직접 파일을 선택해 테스트할 수 있다.', highlight: 'code', phase: 'code' },
    ];
    const CODE = [
      { text: 'from fastapi import FastAPI, UploadFile', tag: 'import' },
      { text: '', tag: 'none' },
      { text: 'app = FastAPI()', tag: 'none' },
      { text: '', tag: 'none' },
      { text: '@app.post("/upload")', tag: 'code' },
      { text: 'async def upload_file(file: UploadFile):', tag: 'code' },
      { text: '    contents = await file.read()', tag: 'code' },
      { text: '    return {', tag: 'code' },
      { text: '        "filename": file.filename,', tag: 'attrs' },
      { text: '        "content_type": file.content_type,', tag: 'attrs' },
      { text: '        "size": len(contents)', tag: 'attrs' },
      { text: '    }', tag: 'code' },
      { text: '', tag: 'none' },
      { text: '# 다중 파일 업로드', tag: 'label' },
      { text: '@app.post("/uploads")', tag: 'multi' },
      { text: 'async def upload_files(files: list[UploadFile]):', tag: 'multi' },
      { text: '    return [f.filename for f in files]', tag: 'multi' },
    ];
    const TAG_HL = { import: 'bg-violet-900/50', code: 'bg-blue-900/50', attrs: 'bg-emerald-900/50', multi: 'bg-amber-900/50', label: 'bg-slate-700', none: '' };
    const COMPARE = [
      { name: 'File()', mem: '전체 메모리', use: '작은 파일', icon: '📋' },
      { name: 'UploadFile', mem: '스풀(임시파일)', use: '큰 파일 (권장)', icon: '📁' },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };
      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum IV-4-2</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. FastAPI 코어 &gt; Chapter 4. 미들웨어와 설정</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-4-2. 파일 업로드 (UploadFile)</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                <strong>UploadFile</strong>로 파일을 받으면 메모리를 아끼면서 큰 파일도 처리할 수 있다.
              </p>
            </header>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-3">
                <h2 className="text-sm font-bold text-slate-600">File() vs UploadFile 비교</h2>
                {COMPARE.map((c, i) => (
                  <div key={i} className={`p-3 rounded-lg border-2 transition-all duration-300 ${stepData.phase === 'compare' && c.name === 'UploadFile' ? 'bg-emerald-100 border-emerald-400' : 'bg-slate-50 border-slate-200'}`}>
                    <div className="font-bold text-sm">{c.icon} {c.name}</div>
                    <div className="text-xs mt-1">메모리: {c.mem} | 용도: {c.use}</div>
                  </div>
                ))}
                {stepData.phase === 'detail' && (
                  <div className="p-3 rounded-lg bg-blue-50 border border-blue-200 text-sm space-y-1">
                    <div className="font-bold text-blue-700">UploadFile 주요 속성</div>
                    <div className="text-xs"><code className="bg-white px-1 rounded">filename</code> — 원본 파일명</div>
                    <div className="text-xs"><code className="bg-white px-1 rounded">content_type</code> — MIME 타입</div>
                    <div className="text-xs"><code className="bg-white px-1 rounded">file</code> — SpooledTemporaryFile</div>
                    <div className="text-xs"><code className="bg-white px-1 rounded">await file.read()</code> — 내용 읽기</div>
                  </div>
                )}
              </div>
              <div className="bg-slate-900 rounded-xl overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between"><span>파일 업로드 코드</span><span className="text-slate-500">Step {currentStepIdx + 1}/{STEPS.length}</span></div>
                <div className="p-3 text-xs font-mono leading-5">
                  {CODE.map((line, i) => {
                    const hl = stepData.highlight && line.tag === stepData.highlight;
                    const dim = stepData.highlight && line.tag !== stepData.highlight && line.tag !== 'none' && line.tag !== 'label';
                    return (<div key={i} className={`px-2 py-0.5 rounded ${hl ? TAG_HL[line.tag] + ' text-white' : ''} ${dim ? 'opacity-30' : ''} text-slate-300`}>{line.text || '\u00A0'}</div>);
                  })}
                </div>
              </div>
            </div>
            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2"><h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">Step {currentStepIdx + 1}: {stepData.title}</h3><span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span></div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-04-01-cors.html" className="text-slate-500 hover:text-slate-700">&larr; IV-4-1 CORS</a>
              <a href="./chapter-04-03-env.html" className="text-blue-600 hover:text-blue-800 font-medium">IV-4-3 환경 변수 &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
