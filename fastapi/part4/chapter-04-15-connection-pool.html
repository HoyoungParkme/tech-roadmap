          lines: [
            '"""',
            'Step 5. pool_recycle — 좀비 연결 방지',
            '경로: app/db/engine.py',
            '목적: 오래된 연결을 자동 폐기하고 새로 만든다',
            '"""',
            'from sqlalchemy import create_engine',
            '',
            'engine = create_engine(',
            '    "postgresql+psycopg2://app:secret@db:5432/shop",',
            '    pool_size=5,',
            '    max_overflow=10,',
            '    pool_timeout=5,',
            '    pool_recycle=3600,    # ✅ 1시간 = 3600초 후 연결 폐기',
            '    pool_pre_ping=True,   # ✅ 꺼낼 때마다 SELECT 1 로 살아있는지 확인',
            ')',
            '',
            '',
            '# 왜 필요한가:',
            '#   • PostgreSQL: idle_in_transaction_session_timeout, tcp_keepalives',
            '#   • MySQL:      wait_timeout (기본 8시간) 후 서버가 연결 끊음',
            '#   • AWS RDS:    idle 5분 후 ELB/NAT 게이트웨이가 끊을 수 있음',
            '#   • 클라이언트 측 풀은 "끊겼다"는 사실을 모르고 좀비 연결을 꺼냄',
            '#   → 다음 쿼리에서 OperationalError("server closed connection")',
            '#',
            '# 산정 가이드:',
            '#   • pool_recycle 은 DB / 방화벽 idle timeout 의 50~80%',
            '#   • RDS 기본 환경: 1800초 (30분) 정도가 무난',
            '#   • 사내 DB로 안정적이면 3600초 (1시간)',
            '#',
            '# pool_pre_ping=True 의 비용:',
            '#   • 쿼리마다 SELECT 1 한 번 추가 (~0.1ms)',
            '#   • 좀비 연결로 인한 500 에러보다 압도적으로 싸다',
            '#   • 운영 환경이라면 무조건 켜는 것을 권장',
            '#',
            '# 최종 권장 설정 (FastAPI + PostgreSQL):',
            '#   pool_size=5, max_overflow=10,',
            '#   pool_timeout=5, pool_recycle=1800, pool_pre_ping=True',
          ],
          highlight: [8, 9, 10, 11, 12, 13, 14, 15],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤
    //   풀 박스 + 활성/유휴/오버플로우/대기/재생성 연결 카드
    // ─────────────────────────────────────────────────────
    const STATE_STYLE = {
      active:   { bg: 'bg-indigo-100',  border: 'border-indigo-400',  text: 'text-indigo-900',  badge: 'bg-indigo-500 text-white',   dot: 'bg-indigo-500' },
      idle:     { bg: 'bg-slate-50',    border: 'border-slate-300',   text: 'text-slate-700',   badge: 'bg-slate-300 text-slate-700', dot: 'bg-slate-400' },
      overflow: { bg: 'bg-violet-50',   border: 'border-violet-400',  text: 'text-violet-900',  badge: 'bg-violet-500 text-white',   dot: 'bg-violet-500' },
      waiting:  { bg: 'bg-amber-50',    border: 'border-amber-400',   text: 'text-amber-900',   badge: 'bg-amber-500 text-white',    dot: 'bg-amber-500' },
      recycled: { bg: 'bg-rose-50',     border: 'border-rose-400',    text: 'text-rose-900',    badge: 'bg-rose-500 text-white',     dot: 'bg-rose-500' },
    };

    function ConnCard({ item }) {
      const s = STATE_STYLE[item.state] || STATE_STYLE.idle;
      return (
        <div className={`rounded-lg border ${s.bg} ${s.border} px-3 py-2 flex items-center justify-between`}>
          <div className="flex items-center gap-2">
            <span className={`w-2 h-2 rounded-full ${s.dot} ${item.state === 'active' ? 'animate-pulse' : ''}`}></span>
            <span className={`text-xs font-bold ${s.text} w-16`}>{item.label}</span>
            <span className={`text-[11px] font-mono ${s.text}`}>{item.age}</span>
          </div>
          <span className={`text-[10px] px-2 py-0.5 rounded ${s.badge}`}>{item.badge}</span>
        </div>
      );
    }

    function PoolHeader({ box }) {
      if (box.mode === 'no-pool') {
        return (
          <div className="rounded-lg border-2 border-dashed border-rose-400 bg-rose-50 px-3 py-2 mb-2">
            <div className="flex items-center justify-between">
              <span className="text-xs font-bold text-rose-800">⚠ 풀 없음 (anti-pattern)</span>
              <span className="text-[10px] text-rose-700">매 요청마다 새 TCP</span>
            </div>
          </div>
        );
      }
      const total = box.size + (box.overflow || 0);
      const used = box.active + (box.overflowActive || 0);
      return (
        <div className="rounded-lg border-2 border-indigo-400 bg-indigo-50 px-3 py-2 mb-2">
          <div className="flex items-center justify-between mb-1">
            <span className="text-xs font-bold text-indigo-900">SQLAlchemy QueuePool</span>
            <span className="text-[10px] font-mono text-indigo-700">{used} / {total} 사용 중</span>
          </div>
          <div className="grid grid-cols-4 gap-1.5 text-[10px]">
            <div className="rounded bg-white border border-indigo-200 px-1.5 py-1 text-center">
              <div className="font-bold text-indigo-900">{box.size}</div>
              <div className="text-indigo-600">pool_size</div>
            </div>
            <div className="rounded bg-white border border-violet-200 px-1.5 py-1 text-center">
              <div className="font-bold text-violet-900">{box.overflow}</div>
              <div className="text-violet-600">max_overflow</div>
            </div>
            <div className="rounded bg-white border border-indigo-200 px-1.5 py-1 text-center">
              <div className="font-bold text-indigo-900">{box.active}</div>
              <div className="text-indigo-600">active</div>
            </div>
            <div className="rounded bg-white border border-slate-200 px-1.5 py-1 text-center">
              <div className="font-bold text-slate-900">{box.idle}</div>
              <div className="text-slate-600">idle</div>
            </div>
          </div>
        </div>
      );
    }

    function WaitingPanel({ list }) {
      if (!list || list.length === 0) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-amber-400 bg-amber-50 p-2">
          <div className="text-[11px] font-bold text-amber-800 mb-1.5 flex items-center gap-1">
            <span>🕒</span>
            <span>대기열 (waiting queue)</span>
          </div>
          <div className="space-y-1.5">
            {list.map((it, i) => (
              <ConnCard key={i} item={it} />
            ))}
          </div>
        </div>
      );
    }

    function MeterBar({ ms, label }) {
      // 0~100ms 사이를 강조하고 그 이상은 빨간 영역
      const norm = Math.min(100, (ms / 100) * 100);
      const color = ms <= 10 ? 'bg-emerald-500' : ms <= 50 ? 'bg-indigo-500' : ms <= 300 ? 'bg-amber-500' : 'bg-rose-500';
      const display = ms >= 1000 ? `${(ms / 1000).toFixed(0)}초` : `${ms}ms`;
      return (
        <div className="mt-3 rounded-lg border border-indigo-200 bg-white p-2">
          <div className="flex items-center justify-between mb-1">
            <span className="text-[11px] font-bold text-indigo-800">{label}</span>
            <span className="text-xs font-mono font-bold text-indigo-900">{display}</span>
          </div>
          <div className="h-2 rounded-full bg-slate-100 overflow-hidden">
            <div className={`h-full ${color} transition-all`} style={{ width: `${norm}%` }} />
          </div>
          <div className="flex justify-between text-[9px] text-slate-500 mt-0.5">
            <span>0</span>
            <span>10ms</span>
            <span>50ms</span>
            <span>100ms+</span>
          </div>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">Connection Pool 시각화</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 풀 상태</span>
          </div>

          <PoolHeader box={state.poolBox} />

          <div className="space-y-1.5">
            {state.conns.map((it, i) => (
              <ConnCard key={i} item={it} />
            ))}
          </div>

          <WaitingPanel list={state.waitingList} />

          <MeterBar ms={state.meterMs} label={state.meterLabel} />

          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js, 5탭)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total, onTabSelect }) {
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 윈도우 타이틀바 + 5탭 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <div className="ml-3 flex gap-1 flex-1 overflow-x-auto">
              {STEPS.map((s, i) => (
                <button
                  key={i}
                  onClick={() => onTabSelect(i)}
                  className={`px-2.5 py-1 text-[11px] font-mono rounded-t transition whitespace-nowrap ${
                    i === stepIdx
                      ? 'bg-[#282c34] text-indigo-300 border-t border-l border-r border-slate-600'
                      : 'bg-slate-900/60 text-slate-400 hover:text-slate-200'
                  }`}
                >
                  {s.code.filename}
                </button>
              ))}
            </div>
          </div>

          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>

          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 4버튼 + 키보드 + 3000ms 자동재생
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 키보드 ← / →
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동재생 3000ms
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">IV</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter IV-4-15. SQLAlchemy Connection Pool</h1>
                <p className="text-sm text-indigo-800/80">연결마다 새 TCP → pool_size → max_overflow → pool_timeout → pool_recycle</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane (좌 시각화 / 우 코드) */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer
                code={step.code}
                stepIdx={stepIdx}
                total={STEPS.length}
                onTabSelect={setStepIdx}
              />
            </div>

            {/* 컨트롤 — 4버튼 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                <ul className="space-y-1 list-disc pl-5">
                  <li><b>pool_size</b>: 평소 유지되는 기본 연결 수 (기본 5)</li>
                  <li><b>max_overflow</b>: 피크 시 추가 허용 (기본 10) → 총 동시 = pool_size + max_overflow</li>
                  <li><b>pool_timeout</b>: 풀에서 자리 기다리는 최대 초 — 짧게(5~10초) 잡고 빠르게 실패</li>
                  <li><b>pool_recycle</b>: 연결 수명 한도 — DB/방화벽 idle timeout 보다 짧게</li>
                  <li><b>pool_pre_ping=True</b>: SELECT 1 로 좀비 연결 사전 감지 (운영에서는 필수)</li>
                </ul>
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['SQLAlchemy', 'QueuePool', 'pool_size', 'max_overflow', 'pool_timeout', 'pool_recycle', 'pool_pre_ping', 'TCP handshake', 'PostgreSQL'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./chapter-04-14-middleware-custom.html" className="underline hover:no-underline">← 이전: 04-14 커스텀 미들웨어</a>
              <a href="./chapter-04-16-uvicorn-workers.html" className="underline hover:no-underline">다음: 04-16 Uvicorn 워커 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
