<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — IV-4-15. SQLAlchemy Connection Pool</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-4-15. SQLAlchemy Connection Pool
    학습 목표: Connection Pool 개념과 주요 설정을 이해한다.
    핵심 비유: 택시 대기열 — 매번 부르지 않고 대기 중인 택시를 재사용
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: '매번 연결의 비용',
        desc: 'DB 연결 1회에는 TCP 핸드셰이크, 인증, 메모리 할당 등이 필요하다. 요청마다 연결을 새로 만들면 수십~수백ms가 낭비된다. 동시 요청 100개 → 100개 연결 생성 → DB 과부하.',
        visual: 'problem',
      },
      {
        title: 'Connection Pool 개념',
        desc: '미리 N개의 연결을 만들어 두고 재사용한다. "택시 대기열"처럼 사용 후 반납하면 다음 요청이 가져다 쓴다. 연결 생성 비용 제거, DB 연결 수 제한, 안정적 성능.',
        visual: 'pool',
      },
      {
        title: 'pool_size / max_overflow',
        desc: 'pool_size: 풀에 유지하는 기본 연결 수 (기본 5). max_overflow: pool_size 초과 시 추가로 허용하는 연결 수 (기본 10). 총 최대 동시 연결 = pool_size + max_overflow.',
        code: [
          'from sqlalchemy import create_engine',
          '',
          'engine = create_engine(',
          '    "postgresql://user:pass@localhost/db",',
          '    pool_size=5,       # 기본 풀 크기',
          '    max_overflow=10,   # 추가 허용 (피크 시)',
          '    # 최대 동시 연결: 5 + 10 = 15',
          ')',
        ],
        highlight: [4, 5, 6],
      },
      {
        title: 'pool_recycle / pool_timeout',
        desc: 'pool_recycle: 연결의 최대 수명(초). MySQL의 wait_timeout(기본 8시간) 이전에 재생성해야 "MySQL server has gone away" 방지. pool_timeout: 풀에서 연결을 기다리는 최대 시간(초). 초과 시 에러.',
        code: [
          'engine = create_engine(',
          '    "mysql+pymysql://user:pass@localhost/db",',
          '    pool_size=5,',
          '    max_overflow=10,',
          '    pool_recycle=3600,   # 1시간마다 연결 재생성',
          '    pool_timeout=30,     # 30초 대기 후 에러',
          '    pool_pre_ping=True,  # 사용 전 연결 상태 확인',
          ')',
        ],
        highlight: [4, 5, 6],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum IV-4-15</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. FastAPI 코어 &gt; Chapter 4. 데이터베이스</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-4-15. SQLAlchemy Connection Pool</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                <strong>택시 대기열</strong>처럼 DB 연결을 미리 만들어 재사용한다. 매번 연결하는 비용을 제거한다.
              </p>
            </header>

            {stepData.visual === 'problem' && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div className="p-4 rounded-xl border-2 border-red-200 bg-red-50">
                  <div className="font-bold text-sm text-red-700 mb-2">매번 새 연결 (비효율)</div>
                  <div className="text-xs space-y-1">
                    <div className="bg-white p-2 rounded border border-red-100">요청 1 → 연결 생성(50ms) → 쿼리 → 연결 종료</div>
                    <div className="bg-white p-2 rounded border border-red-100">요청 2 → 연결 생성(50ms) → 쿼리 → 연결 종료</div>
                    <div className="bg-white p-2 rounded border border-red-100">요청 3 → 연결 생성(50ms) → 쿼리 → 연결 종료</div>
                  </div>
                </div>
                <div className="p-4 rounded-xl border-2 border-emerald-200 bg-emerald-50">
                  <div className="font-bold text-sm text-emerald-700 mb-2">Connection Pool (효율)</div>
                  <div className="text-xs space-y-1">
                    <div className="bg-white p-2 rounded border border-emerald-100">요청 1 → 풀에서 꺼냄(0ms) → 쿼리 → 반납</div>
                    <div className="bg-white p-2 rounded border border-emerald-100">요청 2 → 풀에서 꺼냄(0ms) → 쿼리 → 반납</div>
                    <div className="bg-white p-2 rounded border border-emerald-100">요청 3 → 풀에서 꺼냄(0ms) → 쿼리 → 반납</div>
                  </div>
                </div>
              </div>
            )}

            {stepData.visual === 'pool' && (
              <div className="bg-white rounded-xl border border-slate-200 p-4">
                <div className="text-center mb-3 text-sm font-bold text-slate-600">Connection Pool (택시 대기열)</div>
                <div className="flex justify-center gap-2 mb-3">
                  {[1, 2, 3, 4, 5].map(i => (
                    <div key={i} className="w-12 h-12 rounded-lg bg-emerald-100 border-2 border-emerald-300 flex items-center justify-center text-xs font-bold text-emerald-700">
                      conn{i}
                    </div>
                  ))}
                </div>
                <div className="text-xs text-center text-slate-500">
                  사용 후 반납 → 다음 요청이 재사용 (연결 생성 비용 = 0)
                </div>
              </div>
            )}

            {stepData.code && (
              <div className="bg-slate-900 rounded-xl overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono">database.py — {stepData.title}</div>
                <div className="p-4 text-xs font-mono leading-5">
                  {stepData.code.map((line, i) => (
                    <div key={i} className={`px-2 py-0.5 ${stepData.highlight.includes(i) ? 'bg-emerald-900/40 text-emerald-300' : 'text-slate-300'}`}>{line || '\u00A0'}</div>
                  ))}
                </div>
              </div>
            )}

            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">Step {currentStepIdx + 1}/{STEPS.length}: {stepData.title}</h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-04-14-middleware-custom.html" className="text-slate-500 hover:text-slate-700">&larr; IV-4-14 Custom Middleware</a>
              <a href="./chapter-04-16-uvicorn-workers.html" className="text-blue-600 hover:text-blue-800 font-medium">IV-4-16 Uvicorn Workers &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
