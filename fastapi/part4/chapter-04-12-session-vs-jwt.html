<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — IV-4-12. Session vs JWT 비교</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    IV-4-12. Session vs JWT 비교
    학습 목표: Session과 JWT 인증 방식의 차이와 상황별 선택을 이해한다.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Session 방식 (서버 저장)',
        desc: '로그인 성공 시 서버가 세션 ID를 생성하고, 서버 메모리(또는 Redis)에 사용자 정보를 저장한다. 클라이언트에는 세션 ID만 Cookie로 전달. 매 요청마다 서버가 세션 ID로 사용자를 조회한다.',
        side: 'session',
      },
      {
        title: 'JWT 방식 (클라이언트 저장)',
        desc: '로그인 성공 시 서버가 사용자 정보를 담은 토큰(JWT)을 생성하여 클라이언트에 전달한다. 서버는 아무것도 저장하지 않는다(Stateless). 매 요청마다 Authorization 헤더에 토큰을 보내고, 서버는 서명만 검증한다.',
        side: 'jwt',
      },
      {
        title: '비교표',
        desc: '핵심 차이: Session은 서버에 상태를 보관하고(Stateful), JWT는 클라이언트가 상태를 보관한다(Stateless). 각각의 장단점이 명확하다.',
        visual: 'table',
      },
      {
        title: '상황별 선택',
        desc: 'Session: 단일 서버, 보안 최우선(즉시 로그아웃 필요), 전통적 웹앱. JWT: 다중 서버/마이크로서비스, 모바일 앱, API 서버, 확장성 중요. 실무에서는 JWT + Redis(블랙리스트)를 조합하기도 한다.',
        visual: 'choice',
      },
    ];

    const SESSION_FLOW = [
      { label: '클라이언트', detail: 'Cookie: session_id=abc123' },
      { label: '서버', detail: '세션 저장소에서 abc123 조회 → 사용자 정보 반환' },
    ];

    const JWT_FLOW = [
      { label: '클라이언트', detail: 'Authorization: Bearer eyJhbG...' },
      { label: '서버', detail: '서명 검증만 → 토큰에서 사용자 정보 추출 (DB 조회 불필요)' },
    ];

    const COMPARE_TABLE = [
      { item: '저장 위치', session: '서버 (메모리/Redis)', jwt: '클라이언트 (localStorage/Cookie)' },
      { item: '상태', session: 'Stateful', jwt: 'Stateless' },
      { item: '전달 방식', session: 'Cookie', jwt: 'Authorization 헤더' },
      { item: '확장성', session: '서버 간 세션 공유 필요', jwt: '서버 독립적 (확장 쉬움)' },
      { item: '즉시 무효화', session: '쉬움 (세션 삭제)', jwt: '어려움 (만료까지 유효)' },
      { item: '보안', session: 'CSRF 주의', jwt: 'XSS 주의 (localStorage)' },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum IV-4-12</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. FastAPI 코어 &gt; Chapter 4. 인증/보안</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-4-12. Session vs JWT 비교</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                <strong>Session</strong>(서버 상태 보관) vs <strong>JWT</strong>(Stateless). 각각의 동작 방식과 선택 기준을 비교한다.
              </p>
            </header>

            {stepData.side === 'session' && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {SESSION_FLOW.map((item, i) => (
                  <div key={i} className="p-4 rounded-xl border-2 border-amber-200 bg-amber-50">
                    <div className="font-bold text-sm mb-1">{item.label}</div>
                    <div className="text-xs font-mono bg-white p-2 rounded">{item.detail}</div>
                  </div>
                ))}
              </div>
            )}

            {stepData.side === 'jwt' && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {JWT_FLOW.map((item, i) => (
                  <div key={i} className="p-4 rounded-xl border-2 border-sky-200 bg-sky-50">
                    <div className="font-bold text-sm mb-1">{item.label}</div>
                    <div className="text-xs font-mono bg-white p-2 rounded">{item.detail}</div>
                  </div>
                ))}
              </div>
            )}

            {stepData.visual === 'table' && (
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <table className="w-full text-xs">
                  <thead className="bg-slate-100">
                    <tr>
                      <th className="px-3 py-2 text-left font-bold">항목</th>
                      <th className="px-3 py-2 text-left font-bold text-amber-700">Session</th>
                      <th className="px-3 py-2 text-left font-bold text-sky-700">JWT</th>
                    </tr>
                  </thead>
                  <tbody>
                    {COMPARE_TABLE.map((row, i) => (
                      <tr key={i} className="border-t border-slate-100">
                        <td className="px-3 py-2 font-medium">{row.item}</td>
                        <td className="px-3 py-2">{row.session}</td>
                        <td className="px-3 py-2">{row.jwt}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}

            {stepData.visual === 'choice' && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div className="p-4 rounded-xl border-2 border-amber-200 bg-amber-50">
                  <div className="font-bold text-sm text-amber-700 mb-2">Session 선택</div>
                  <ul className="text-xs space-y-1 text-slate-700">
                    <li>- 단일 서버 / 소규모</li>
                    <li>- 즉시 로그아웃 필수</li>
                    <li>- 전통적 웹 애플리케이션</li>
                    <li>- 보안 최우선</li>
                  </ul>
                </div>
                <div className="p-4 rounded-xl border-2 border-sky-200 bg-sky-50">
                  <div className="font-bold text-sm text-sky-700 mb-2">JWT 선택</div>
                  <ul className="text-xs space-y-1 text-slate-700">
                    <li>- 다중 서버 / 마이크로서비스</li>
                    <li>- 모바일 앱 / SPA</li>
                    <li>- API 서버 (확장성 중요)</li>
                    <li>- 서버 간 인증 전파</li>
                  </ul>
                </div>
              </div>
            )}

            <div className="p-4 rounded-xl bg-emerald-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">Step {currentStepIdx + 1}/{STEPS.length}: {stepData.title}</h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-04-11-bcrypt.html" className="text-slate-500 hover:text-slate-700">&larr; IV-4-11 Bcrypt 해싱</a>
              <a href="./chapter-04-13-cookie.html" className="text-blue-600 hover:text-blue-800 font-medium">IV-4-13 Cookie &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
