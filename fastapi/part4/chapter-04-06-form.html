            '# HTML 쪽 (enctype 필수):',
            '#   <form action="/posts" method="post"',
            '#         enctype="multipart/form-data">',
            '#     <input type="text" name="title" />',
            '#     <input type="file" name="file" />',
            '#     <button>업로드</button>',
            '#   </form>',
            '# enctype 빠뜨리면 파일이 안 올라감. 큰 파일은 chunk 읽기 권장.',
          ],
          highlight: [11, 12, 13, 14, 15, 26, 27, 28, 29, 30, 31, 32, 33, 38, 39, 40, 41, 42, 43, 44, 45],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤 (Form 데이터 흐름 시뮬레이션)
    // ─────────────────────────────────────────────────────
    const KIND_STYLE = {
      text:  { bg: 'bg-indigo-50',  border: 'border-indigo-300',  text: 'text-indigo-800',  badge: 'bg-indigo-200 text-indigo-800',  icon: '🔤' },
      check: { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-800', badge: 'bg-emerald-200 text-emerald-800', icon: '☑' },
      file:  { bg: 'bg-violet-50',  border: 'border-violet-300',  text: 'text-violet-800',  badge: 'bg-violet-200 text-violet-800',   icon: '📎' },
    };

    function InputCard({ item }) {
      const s = KIND_STYLE[item.kind] || KIND_STYLE.text;
      return (
        <div className={`rounded-lg border ${s.bg} ${s.border} px-3 py-2 flex items-center justify-between`}>
          <div className="flex items-center gap-2">
            <span className="text-base">{s.icon}</span>
            <span className={`text-xs font-bold ${s.text}`}>{item.label}</span>
          </div>
          <span className={`text-[11px] font-mono ${s.text}`}>{item.value}</span>
        </div>
      );
    }

    function PayloadBox({ payload }) {
      if (!payload) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-indigo-400 bg-slate-900 p-3">
          <div className="flex items-center justify-between mb-2">
            <span className="text-[10px] font-bold text-indigo-300">📤 전송 본문</span>
            <span className="text-[10px] font-mono text-amber-300">{payload.contentType}</span>
          </div>
          <pre className="text-[10px] font-mono text-slate-200 leading-4 whitespace-pre-wrap break-all">
{payload.body.join('\n')}
          </pre>
        </div>
      );
    }

    function ParsedBox({ parsed }) {
      if (!parsed) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-emerald-400 bg-emerald-50 p-3">
          <div className="text-xs font-bold text-emerald-800 mb-2">✅ {parsed.title}</div>
          <ul className="space-y-1">
            {parsed.rows.map((r, i) => (
              <li key={i} className="text-[11px] flex items-center justify-between gap-2">
                <span className="font-mono text-emerald-900">{r.key}</span>
                <span className="flex items-center gap-1.5">
                  <span className="font-mono text-emerald-700">{r.val}</span>
                  <span className="text-[9px] px-1.5 py-0.5 rounded bg-emerald-200 text-emerald-800">{r.badge}</span>
                </span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function CompareBox({ compare }) {
      if (!compare) return null;
      const COLOR = {
        sky:    { border: 'border-sky-300',    bg: 'bg-sky-50',    text: 'text-sky-800',    code: 'bg-sky-100 text-sky-900' },
        indigo: { border: 'border-indigo-300', bg: 'bg-indigo-50', text: 'text-indigo-800', code: 'bg-indigo-100 text-indigo-900' },
      };
      const renderCol = (col) => {
        const c = COLOR[col.color] || COLOR.indigo;
        return (
          <div className={`rounded-lg border-2 ${c.border} ${c.bg} p-3 flex-1`}>
            <div className={`text-xs font-bold ${c.text} mb-2`}>{col.label}</div>
            <div className="text-[10px] text-slate-500 mb-0.5">Content-Type</div>
            <div className={`text-[10px] font-mono px-2 py-1 rounded mb-2 ${c.code}`}>{col.contentType}</div>
            <div className="text-[10px] text-slate-500 mb-0.5">본문</div>
            <pre className={`text-[10px] font-mono px-2 py-1 rounded mb-2 ${c.code} whitespace-pre-wrap`}>{col.example}</pre>
            <div className="text-[10px] text-slate-500 mb-0.5">FastAPI 선언</div>
            <div className={`text-[10px] font-mono px-2 py-1 rounded mb-2 ${c.code}`}>{col.decl}</div>
            <div className="text-[10px] text-slate-500 mb-0.5">주 사용처</div>
            <div className={`text-[10px] ${c.text}`}>{col.usedBy}</div>
          </div>
        );
      };
      return (
        <div className="flex gap-2">
          {renderCol(compare.left)}
          {renderCol(compare.right)}
        </div>
      );
    }

    function FlowBox({ flow }) {
      if (!flow) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-indigo-500 bg-gradient-to-br from-indigo-50 to-violet-50 p-4">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl">🔑</span>
            <span className="text-base font-bold text-indigo-800">{flow.title}</span>
          </div>
          <ul className="space-y-1.5">
            {flow.steps.map((s, i) => (
              <li key={i} className="text-sm text-indigo-900 flex gap-2">
                <span className="text-indigo-500 mt-0.5">→</span>
                <span>{s}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">📝 Form 데이터 흐름</h3>
            <span className="text-[10px] text-slate-500">입력 → 페이로드 → 파싱</span>
          </div>

          {/* Step 2: 비교 박스 */}
          {state.compare && <CompareBox compare={state.compare} />}

          {/* 그 외 단계: 입력 카드 + 페이로드 + 파싱 */}
          {state.inputs && (
            <>
              <div className="text-[11px] font-bold text-indigo-600 mb-1.5">① 폼 입력</div>
              <div className="space-y-1.5">
                {state.inputs.map((it, i) => (
                  <InputCard key={i} item={it} />
                ))}
              </div>
              <div className="mt-3 text-center text-xs font-bold text-indigo-600 py-1.5 border-y border-dashed border-indigo-300">
                ↓ 브라우저가 본문으로 인코딩 ↓
              </div>
              <PayloadBox payload={state.payload} />
              <div className="mt-3 text-center text-xs font-bold text-indigo-600 py-1.5 border-y border-dashed border-indigo-300">
                ↓ FastAPI 파싱 (Form / File) ↓
              </div>
              <ParsedBox parsed={state.parsed} />
            </>
          )}

          {/* Step 4: OAuth2 플로우 박스 */}
          <FlowBox flow={state.flowBox} />

          <div className="mt-auto pt-3">
            <div className="text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
              💡 {state.keyPoint}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js) — 5탭
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total, onTabClick }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          {/* 5탭 인디케이터 */}
          <div className="flex items-center gap-0 px-2 pt-1.5 bg-slate-800 border-b border-slate-700 text-[10px] font-mono overflow-x-auto">
            {STEPS.map((s, i) => (
              <button
                key={i}
                type="button"
                onClick={() => onTabClick && onTabClick(i)}
                className={`px-2 py-1 rounded-t border-t border-x whitespace-nowrap transition ${
                  i === stepIdx
                    ? 'bg-[#282c34] border-indigo-500 text-indigo-300'
                    : 'bg-slate-700 border-transparent text-slate-400 hover:text-slate-200'
                }`}
              >
                {s.code.filename}
              </button>
            ))}
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">IV</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">IV-4-6. Form 데이터</h1>
                <p className="text-sm text-indigo-800/80">Form(...) → JSON vs Form → HTML form → OAuth2 → File+Form. 5단계로 추적</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 허브로</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer
                code={step.code}
                stepIdx={stepIdx}
                total={STEPS.length}
                onTabClick={(i) => setStepIdx(i)}
              />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계 · 탭 클릭으로 이동</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                Form 은 HTML 의 30년 호환성을 그대로 받는 전송 형식이다. JSON Body 와는 본문 디코더가 다르므로 한 엔드포인트에 섞어 쓰지 않는다. OAuth2 표준이 Form 을 요구하기 때문에 FastAPI 는 OAuth2PasswordRequestForm 으로 표준 토큰 발급을 한 줄에 끝낸다. 파일과 함께 보낼 때는 자동으로 multipart/form-data 로 바뀌고, File()·UploadFile 과 Form() 을 같은 함수에 섞어 선언하면 된다. 다음 챕터(IV-4-7)에서는 응답 종류(JSON / HTML / Stream / File)를 다룬다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Form', 'python-multipart', 'urlencoded', 'multipart', 'OAuth2', 'PasswordFlow', 'UploadFile', 'HTMLform', 'Body'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./chapter-04-05-request-body.html" className="underline hover:no-underline">← IV-4-5 Request Body</a>
              <a href="./chapter-04-07-response-types.html" className="underline hover:no-underline">다음: IV-4-7 Response 종류 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
