  <!--
    FastAPI IV-4-8 — Pydantic 심화 검증
    학습 목표: @field_validator / @model_validator / Field 제약 / 특수 타입 / model_config
              "사용자 입력 한 줄"이 어떤 검증 레이어를 거치는지 5단계로 시각화한다.
    핵심 비유: 회원가입 폼 — 같은 입력이 단계마다 더 촘촘한 검증 게이트를 통과
    패턴: fastapi v1 — 좌(LiveDataPane: 입력 → 다층 검증 단계) / 우(VSCode CodeViewer 5탭)
    색상: indigo (fastapi 도메인)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 5단계 시나리오 — @field_validator → @model_validator → Field 제약 → 특수 타입 → model_config
    //   title      : 단계 제목
    //   desc       : 단계 설명 (3~5문장)
    //   payload    : 입력 페이로드 카드 [{key, value, badge}]
    //   gates      : 검증 게이트 박스 [{label, status, note}] — pass/fail/skip

    //   code       : 우측 CodeViewer 파일 (lang, filename, lines, highlight)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. @field_validator — 단일 필드 사용자 검증',

        verdict: { ok: false, message: '422 Validation Error — username, password 둘 다 거절' },
        keyPoint: '@field_validator = 필드 하나에 대한 커스텀 룰. before/after 모드로 변환도 가능.',
        code: {
          lang: 'python',
          filename: 'validator.py',
          lines: [
            '"""',
            'Step 1. @field_validator — 단일 필드 사용자 검증',
            '경로: app/schemas/validator.py',
            '목적: 회원가입 username/password 도메인 규칙을 강제한다.',
            '"""',
            'from pydantic import BaseModel, field_validator',
            '',
            '',
            'class SignupForm(BaseModel):',
            '    """회원가입 입력 폼 — 도메인 규칙을 필드 단위로 검증."""',
            '',
            '    username: str',
            '    password: str',
            '    email: str',
            '',
            '    @field_validator("username")',
            '    @classmethod',
            '    def username_lower_alnum(cls, v: str) -> str:',

            '        if not v.isalnum() or not v.islower():',

            '        return v',
            '',
            '    @field_validator("password")',
            '    @classmethod',
            '    def password_min_len(cls, v: str) -> str:',

            '        if len(v) < 8:',
            '            raise ValueError("password 는 8자 이상")',
            '        return v',
            '',
            '',
            '# 입력 예시',
            '# SignupForm(username="Admin", password="1234", email="a@b.com")',
            '#   → ValidationError:',
            '#       username  : username 은 소문자/숫자만 허용',
            '#       password  : password 는 8자 이상',
            '#',
            '# SignupForm(username="hong", password="secret-123", email="a@b.com")',

            '# user.nickname  # → "hong" (앞뒤 공백 제거됨)',
            '',
            '# 자주 쓰는 ConfigDict 옵션',
            '#   strict                : 자동 형변환 끔',
            '#   from_attributes       : ORM 객체 바로 사용 (구 orm_mode)',
            '#   str_strip_whitespace  : 문자열 trim',
            '#   extra="forbid"        : 미정의 필드 거절',
            '#   frozen                : 불변 모델',
            '#   populate_by_name      : alias 와 본명 모두 허용',
            '#   json_schema_extra     : OpenAPI 문서 확장',
            '',
            '# ─── 5단계 요약 ──────────────────────────────',
            '# ① @field_validator  : 필드 1개 커스텀 룰',
            '# ② @model_validator  : 여러 필드 교차 검증',
            '# ③ Field             : 선언적 제약 (gt/lt/pattern...)',
            '# ④ EmailStr/HttpUrl  : 타입만 바꿔도 끝나는 검증',
            '# ⑤ model_config      : 모델 단위 정책 스위치',
            '# ────────────────────────────────────────────',
          ],
          highlight: [9, 12, 13, 14, 15, 16, 17, 18, 19, 21, 22, 23, 24, 45, 46, 47, 48, 49, 50, 51],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤
    // ─────────────────────────────────────────────────────
    const STATUS_STYLE = {
      pass: { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-800', icon: '✓', badge: 'bg-emerald-200 text-emerald-800' },
      fail: { bg: 'bg-rose-50',    border: 'border-rose-300',    text: 'text-rose-800',    icon: '✗', badge: 'bg-rose-200 text-rose-800' },
      skip: { bg: 'bg-slate-50',   border: 'border-slate-300',   text: 'text-slate-600',   icon: '○', badge: 'bg-slate-200 text-slate-600' },
    };

    function PayloadCard({ item }) {
      return (
        <div className="rounded-lg border bg-indigo-50 border-indigo-300 px-3 py-2 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <span className="text-xs font-bold text-indigo-800 w-24 truncate">{item.key}</span>
            <span className="text-sm font-mono font-bold text-indigo-900">{item.value}</span>
          </div>
          <span className="text-[10px] px-2 py-0.5 rounded bg-indigo-200 text-indigo-800">{item.badge}</span>
        </div>
      );
    }

    function GateRow({ gate }) {
      const s = STATUS_STYLE[gate.status] || STATUS_STYLE.skip;
      return (
        <div className={`rounded-lg border ${s.bg} ${s.border} px-3 py-2`}>
          <div className="flex items-center justify-between mb-0.5">
            <div className="flex items-center gap-2">
              <span className={`text-base font-bold ${s.text}`}>{s.icon}</span>
              <span className={`text-sm font-semibold ${s.text}`}>{gate.label}</span>
            </div>
            <span className={`text-[10px] px-2 py-0.5 rounded ${s.badge}`}>{gate.status.toUpperCase()}</span>
          </div>
          <div className={`text-[11px] ${s.text} pl-6`}>{gate.note}</div>
        </div>
      );
    }

    function VerdictBox({ verdict }) {
      if (!verdict) return null;
      const ok = verdict.ok;
      return (
        <div className={`mt-3 rounded-lg border-2 p-3 ${ok ? 'border-emerald-400 bg-emerald-50' : 'border-rose-400 bg-rose-50'}`}>
          <div className={`text-xs font-bold mb-1 ${ok ? 'text-emerald-800' : 'text-rose-800'}`}>
            {ok ? '✅ 최종 통과' : '⛔ 최종 실패'}
          </div>
          <div className={`text-sm ${ok ? 'text-emerald-900' : 'text-rose-900'}`}>{verdict.message}</div>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">검증 레이어 시뮬레이션</h3>
            <span className="text-[10px] text-slate-500">입력 → 게이트 통과 흐름</span>
          </div>

          <div className="text-[11px] font-bold text-indigo-700 mb-1.5">📥 입력 페이로드</div>
          <div className="space-y-1.5">
            {state.payload.map((it, i) => (
              <PayloadCard key={i} item={it} />
            ))}
          </div>

          <div className="mt-3 text-center text-xs font-bold text-indigo-600 py-1.5 border-y border-dashed border-indigo-300">
            ↓ Pydantic 검증 게이트 ↓
          </div>

          <div className="mt-2 space-y-1.5">
            {state.gates.map((g, i) => (
              <GateRow key={i} gate={g} />
            ))}
          </div>

          <VerdictBox verdict={state.verdict} />

          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-blue-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">IV</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter IV-4-8. Pydantic 심화 검증</h1>
                <p className="text-sm text-indigo-800/80">@field_validator → @model_validator → Field → 특수 타입 → model_config 5단계</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                Pydantic 심화 검증은 다섯 개의 도구로 완성된다.
                ① @field_validator (필드 단위 커스텀 룰) ② @model_validator (여러 필드 교차 검증)
                ③ Field 제약 (선언적 gt/lt/pattern) ④ EmailStr/HttpUrl 같은 특수 타입
                ⑤ model_config (모델 단위 정책 스위치). 단순한 규칙은 Field·특수 타입으로,
                도메인 규칙은 validator 로, 모델 전체 정책은 model_config 로 — 이렇게 분담하면 검증 코드가 깔끔해진다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Pydantic v2', 'field_validator', 'model_validator', 'Field', 'EmailStr', 'HttpUrl', 'model_config', 'ConfigDict', 'from_attributes', 'strict'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./chapter-04-07-response-types.html" className="underline hover:no-underline">← IV-4-7 Response 종류</a>
              <a href="./chapter-04-09-thread-async.html" className="underline hover:no-underline">다음: IV-4-9 def vs async def →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
