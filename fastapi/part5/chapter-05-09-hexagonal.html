<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 인터랙티브 학습 — Chapter 5-9. 헥사고날 아키텍처</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: '3계층의 한계',
        desc: '[문제] 3계층은 DB가 바뀌면 Repository뿐 아니라 Service까지 영향을 받을 수 있다. 외부 시스템(이메일, 결제)이 늘어나면 경계가 모호해진다. "비즈니스 로직을 외부에서 완전히 격리할 수 없을까?"',
        layers: [
          { label: '외부 시스템', sublabel: 'HTTP, DB, Email...', state: 'warning' },
          { label: 'Application Core', sublabel: '비즈니스 로직', state: 'idle' },
        ],
        codeLines: [
          { code: '# 3계층에서는...', tag: 'label' },
          { code: '# Service가 ORM(SQLAlchemy)을 직접 알고 있다', tag: 'problem' },
          { code: 'from sqlalchemy.orm import Session', tag: 'problem' },
          { code: '', tag: 'none' },
          { code: 'def create_order(db: Session, data):', tag: 'problem' },
          { code: '    order = Order(**data.dict())', tag: 'code' },
          { code: '    db.add(order)  # ORM 직접 사용!', tag: 'problem' },
          { code: '    db.commit()', tag: 'problem' },
          { code: '    return order', tag: 'code' },
          { code: '', tag: 'none' },
          { code: '# → DB를 바꾸면 Service도 수정해야 한다', tag: 'problem' },
        ],
      },
      {
        title: 'Port — 인터페이스 경계',
        desc: '[Port] 비즈니스 로직이 외부 세계를 직접 알지 못하게 "Port(인터페이스)"를 만든다. Port는 "이런 기능이 필요하다"는 계약서일 뿐, 구현은 없다. Service는 Port만 바라본다.',
        layers: [
          { label: '외부 시스템', sublabel: '', state: 'idle' },
          { label: 'Port (인터페이스)', sublabel: '"이런 기능이 필요하다"', state: 'active' },
          { label: 'Application Core', sublabel: 'Port만 바라본다', state: 'highlight' },
        ],
        codeLines: [
          { code: '# Port = 인터페이스 (계약서)', tag: 'label' },
          { code: 'from abc import ABC, abstractmethod', tag: 'code' },
          { code: '', tag: 'none' },
          { code: 'class OrderRepository(ABC):  # Port', tag: 'port' },
          { code: '    @abstractmethod', tag: 'port' },
          { code: '    def save(self, order) -> Order:', tag: 'port' },
          { code: '        ...', tag: 'port' },
          { code: '', tag: 'none' },
          { code: '# Service는 Port만 안다 (구현체를 모른다)', tag: 'label' },
          { code: 'class OrderService:', tag: 'code' },
          { code: '    def __init__(self, repo: OrderRepository):', tag: 'code' },
          { code: '        self.repo = repo  # Port 타입!', tag: 'code' },
        ],
      },
      {
        title: 'Adapter — 구현체 연결',
        desc: '[Adapter] Port를 실제로 구현하는 것이 Adapter다. PostgreSQL용, MongoDB용, 테스트용 등 목적별 Adapter를 만들 수 있다. Application Core는 Adapter를 모른다 — Port만 안다.',
        layers: [
          { label: 'Adapter (구현체)', sublabel: 'PostgreSQL / MongoDB / Mock', state: 'active' },
          { label: 'Port (인터페이스)', sublabel: '계약서', state: 'highlight' },
          { label: 'Application Core', sublabel: 'Port만 바라본다', state: 'highlight' },
        ],
        codeLines: [
          { code: '# Adapter = Port의 실제 구현', tag: 'label' },
          { code: '', tag: 'none' },
          { code: '# PostgreSQL Adapter', tag: 'adapter' },
          { code: 'class PgOrderRepo(OrderRepository):', tag: 'adapter' },
          { code: '    def save(self, order) -> Order:', tag: 'adapter' },
          { code: '        db.add(order)', tag: 'adapter' },
          { code: '        db.commit()', tag: 'adapter' },
          { code: '        return order', tag: 'adapter' },
          { code: '', tag: 'none' },
          { code: '# 테스트용 Mock Adapter', tag: 'mock' },
          { code: 'class MockOrderRepo(OrderRepository):', tag: 'mock' },
          { code: '    def save(self, order) -> Order:', tag: 'mock' },
          { code: '        return order  # DB 없이 테스트!', tag: 'mock' },
        ],
      },
      {
        title: 'DB를 바꿔도 Core는 그대로',
        desc: '[장점] PostgreSQL → MongoDB로 바꿔도? Adapter만 교체하면 된다. Application Core(비즈니스 로직)는 한 줄도 수정하지 않는다. 이것이 헥사고날의 핵심 가치: 외부 변경으로부터 비즈니스 로직 보호.',
        layers: [
          { label: 'Adapter A → Adapter B', sublabel: '교체!', state: 'swap' },
          { label: 'Port (인터페이스)', sublabel: '변경 없음', state: 'highlight' },
          { label: 'Application Core', sublabel: '변경 없음!', state: 'highlight' },
        ],
        codeLines: [
          { code: '# Adapter만 교체하면 된다', tag: 'label' },
          { code: '', tag: 'none' },
          { code: '# 운영: PostgreSQL', tag: 'adapter' },
          { code: 'service = OrderService(PgOrderRepo())', tag: 'adapter' },
          { code: '', tag: 'none' },
          { code: '# 테스트: Mock', tag: 'mock' },
          { code: 'service = OrderService(MockOrderRepo())', tag: 'mock' },
          { code: '', tag: 'none' },
          { code: '# Application Core는 한 줄도 안 바뀜!', tag: 'label' },
          { code: '# → 이것이 헥사고날의 핵심 가치', tag: 'label' },
        ],
      },
      {
        title: '소규모에는 과설계',
        desc: '[주의] 초기 구조 설계가 복잡하다. Port + Adapter + DI 설정이 필요하다. 소규모 프로젝트에는 과설계다. 주니어라면 3계층을 먼저 완전히 익히고, 팀에서 필요할 때 도입하자.',
        layers: [
          { label: 'Adapter', sublabel: '구현체', state: 'idle' },
          { label: 'Port', sublabel: '인터페이스', state: 'idle' },
          { label: 'Application Core', sublabel: '비즈니스 로직', state: 'idle' },
        ],
        codeLines: [
          { code: '# 언제 쓸까?', tag: 'label' },
          { code: '', tag: 'none' },
          { code: '# ✅ 외부 시스템이 자주 바뀔 때', tag: 'code' },
          { code: '# ✅ 5인+ 팀, 장기 운영 프로젝트', tag: 'code' },
          { code: '# ✅ 테스트 격리가 중요할 때', tag: 'code' },
          { code: '', tag: 'none' },
          { code: '# ❌ 혼자 + 프로토타입', tag: 'problem' },
          { code: '# ❌ 소규모 CRUD API', tag: 'problem' },
          { code: '# ❌ "있어 보이려고"', tag: 'problem' },
          { code: '', tag: 'none' },
          { code: '# → 3계층 먼저 완전히 익히자', tag: 'label' },
        ],
      },
    ];

    const LAYER_CLASS = {
      idle:      'bg-slate-100 border-slate-300 text-slate-500',
      active:    'bg-blue-100 border-blue-400 text-blue-700 ring-2 ring-blue-300',
      highlight: 'bg-emerald-100 border-emerald-400 text-emerald-700',
      warning:   'bg-red-100 border-red-400 text-red-700',
      swap:      'bg-amber-100 border-amber-400 text-amber-700 ring-2 ring-amber-300',
    };
    const CODE_TAG_BG = { label: 'bg-slate-100', code: 'bg-white', port: 'bg-blue-50', adapter: 'bg-emerald-50', mock: 'bg-violet-50', problem: 'bg-red-50', none: 'bg-white' };
    const CODE_TAG_BORDER = { label: 'border-slate-300', code: 'border-transparent', port: 'border-blue-300', adapter: 'border-emerald-300', mock: 'border-violet-300', problem: 'border-red-300', none: 'border-transparent' };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx >= STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => prev < STEPS.length - 1 ? prev + 1 : prev); };
      const handlePrev = () => setCurrentStepIdx(prev => (prev > 0 ? prev - 1 : prev));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => { if (!isPlaying) return; const id = setInterval(() => handleNextRef.current(), 3000); return () => clearInterval(id); }, [isPlaying]);
      useEffect(() => { const h = (e) => { if (e.key === 'ArrowRight') handleNextRef.current(); if (e.key === 'ArrowLeft') handlePrevRef.current(); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, []);
      const togglePlay = () => { if (isEnd) { setCurrentStepIdx(0); setIsPlaying(true); return; } setIsPlaying(prev => !prev); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm text-slate-500">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum V-4-1</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-xl md:text-2xl font-bold text-slate-800 mb-2">Chapter 5-9. 헥사고날 (Ports & Adapters)</h1>
              <p className="text-slate-600 text-sm leading-relaxed">
                비즈니스 로직(Application Core)이 DB나 HTTP에 직접 의존하지 않도록
                <strong>Port(인터페이스)</strong>와 <strong>Adapter(구현체)</strong>로 경계를 만든다.
                DB를 바꿔도 비즈니스 로직은 건드리지 않는다.
              </p>
            </header>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
                <h2 className="text-sm font-bold text-slate-600">헥사고날 구조</h2>
                <div className="space-y-2">
                  {stepData.layers.map((layer, idx) => (
                    <div key={idx} className={`p-4 rounded-lg border-2 transition-all duration-300 ${LAYER_CLASS[layer.state]}`}>
                      <div className="font-bold text-lg">{layer.label}</div>
                      {layer.sublabel && <div className="text-xs opacity-70">{layer.sublabel}</div>}
                    </div>
                  ))}
                </div>
                <div className="p-4 rounded-lg border bg-blue-50 border-blue-200 text-blue-800 text-sm leading-relaxed">
                  <div className="font-bold mb-1">{stepData.title}</div>{stepData.desc}
                </div>
              </div>
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between items-center">
                  <span>Ports & Adapters 코드</span>
                  <span className="text-slate-500">Step {currentStepIdx + 1} / {STEPS.length}</span>
                </div>
                <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
                  {stepData.codeLines.map((line, idx) => (
                    <div key={idx} className={`px-4 py-0.5 whitespace-pre border-l-4 transition-all duration-300 ${CODE_TAG_BG[line.tag]} ${CODE_TAG_BORDER[line.tag]}`}>
                      <span className="inline-block w-4 text-right mr-3 text-slate-400 select-none">{idx + 1}</span>{line.code || '\u00A0'}
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div className="flex items-center justify-center gap-3 flex-wrap">
              <button onClick={() => handlePrevRef.current()} disabled={currentStepIdx === 0} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="이전 단계">← 이전</button>
              <button onClick={togglePlay} className={`px-6 py-2 rounded-lg font-bold text-sm transition-colors ${isPlaying ? 'bg-amber-500 text-white hover:bg-amber-600' : 'bg-emerald-600 text-white hover:bg-emerald-700'}`} aria-label={isPlaying ? '정지' : (isEnd ? '처음부터 재생' : '자동 실행')}>{isPlaying ? '⏸ 정지' : (isEnd ? '⟳ 처음부터' : '▶ 자동 실행')}</button>
              <button onClick={() => handleNextRef.current()} disabled={isEnd} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="다음 단계">다음 →</button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>
            <footer className="text-center text-xs text-slate-400 py-4">FastAPI 인터랙티브 학습 — Chapter 5-9. 헥사고날 | 키보드 ← → 지원</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
