          { side: 'bottom', label: 'StripePaymentAdapter', tech: 'stripe', badge: 'outbound', active: true, swapped: true },
        ],
        swap: {
          title: '어댑터 교체',
          changes: [
            'SqlOrderRepository → MongoOrderRepository (PostgreSQL → MongoDB)',
            'TossPaymentAdapter → StripePaymentAdapter (Toss → Stripe)',
            '테스트용 InMemoryOrderRepository 추가 — DB 없이 단위 테스트',
            'Domain Core / Port 코드: 0줄 변경',
          ],
        },
        keyPoint: '어댑터만 교체 = DB/API/UI 가 바뀌어도 비즈니스 로직은 안전. 테스트도 쉬워진다.',
        code: {
          lang: 'python',
          filename: 'swap.py',
          lines: [
            '"""',
            'swap.py — 어댑터 교체로 외부 기술을 자유롭게 갈아끼우기',
            '경로: app/adapters/mongo_order_repository.py, app/adapters/in_memory_repo.py',
            '목적: Port 만 지키면 어댑터를 자유롭게 교체할 수 있음을 보인다.',
            '의존성: pymongo (Mongo 용), stripe (결제용).',
            '"""',
            'from pymongo.collection import Collection',
            'import stripe',
            '',
            'from app.domain.order import Order',
            'from app.ports.order_repository import OrderRepository',
            'from app.ports.payment_gateway import PaymentGateway',
            '',
            '',
            '# ── 교체 1: PostgreSQL → MongoDB ──────────────────',
            'class MongoOrderRepository:',
            '    """OrderRepository(Port) 의 MongoDB 구현 — 시그니처 동일."""',
            '',
            '    def __init__(self, collection: Collection) -> None:',
            '        self.collection = collection',
            '',
            '    def save(self, order: Order) -> None:',
            '        self.collection.insert_one({',
            '            "_id": order.id,',
            '            "customer_id": order.customer_id,',
            '            "total": order.total(),',
            '        })',
            '',
            '    def find_by_id(self, order_id: str) -> Order | None:',
            '        doc = self.collection.find_one({"_id": order_id})',
            '        if doc is None:',
            '            return None',
            '        return Order(id=doc["_id"], customer_id=doc["customer_id"])',
            '',
            '',
            '# ── 교체 2: Toss → Stripe ─────────────────────────',
            'class StripePaymentAdapter:',
            '    """PaymentGateway(Port) 의 Stripe 구현 — 시그니처 동일."""',
            '',
            '    def __init__(self, api_key: str) -> None:',
            '        stripe.api_key = api_key',
            '',
            '    def charge(self, order_id: str, amount: int) -> bool:',
            '        try:',
            '            stripe.PaymentIntent.create(amount=amount, currency="krw",',
            '                                        metadata={"order_id": order_id})',
            '            return True',
            '        except stripe.error.StripeError:',
            '            return False',
            '',
            '',
            '# ── 교체 3: 테스트용 Fake 어댑터 (DB 없이 단위 테스트) ─',
            'class InMemoryOrderRepository:',
            '    """테스트용 메모리 저장소 — 실제 DB 없이 빠르게 검증."""',
            '',
            '    def __init__(self) -> None:',
            '        self.storage: dict[str, Order] = {}',
            '',
            '    def save(self, order: Order) -> None:',
            '        self.storage[order.id] = order',
            '',
            '    def find_by_id(self, order_id: str) -> Order | None:',
            '        return self.storage.get(order_id)',
            '',
            '',
            '# ── 사용 예: DI 컨테이너에서 한 줄만 바꾸면 끝 ────────',
            '# 운영(MongoDB):   repo = MongoOrderRepository(mongo_collection)',
            '# 운영(PostgreSQL): repo = SqlOrderRepository(session)',
            '# 테스트:          repo = InMemoryOrderRepository()',
            '#',
            '# Domain Core (domain.py), Port (port.py): 0줄 변경',
          ],
          highlight: [14, 15, 16, 21, 22, 23, 24, 25, 26, 34, 35, 36, 37, 38, 41, 42, 43, 44, 45, 46, 50, 51, 52, 53, 56, 57, 65, 66, 67, 68],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤 (6각형 도식)
    // ─────────────────────────────────────────────────────
    const SIDE_POS = {
      left:   { className: 'absolute left-0 top-1/2 -translate-y-1/2',   align: 'items-end',   row: false },
      right:  { className: 'absolute right-0 top-1/2 -translate-y-1/2',  align: 'items-start', row: false },
      bottom: { className: 'absolute bottom-0 left-1/2 -translate-x-1/2', align: 'items-center', row: true  },
      top:    { className: 'absolute top-0 left-1/2 -translate-x-1/2',    align: 'items-center', row: true  },
    };

    function PortBadge({ port }) {
      const color = port.kind === 'inbound' ? 'bg-emerald-100 text-emerald-800 border-emerald-300'
                                            : 'bg-amber-100 text-amber-800 border-amber-300';
      return (
        <div className={`text-[10px] px-2 py-0.5 rounded border ${color} font-mono whitespace-nowrap`}>
          {port.kind === 'inbound' ? '◀ ' : '▶ '}{port.label}
        </div>
      );
    }

    function AdapterBox({ adapter }) {
      const swapped = adapter.swapped;
      const base = swapped
        ? 'bg-pink-50 border-pink-400 text-pink-900'
        : 'bg-indigo-50 border-indigo-400 text-indigo-900';
      return (
        <div className={`rounded-lg border-2 ${base} px-2 py-1.5 shadow-sm whitespace-nowrap`}>
          <div className="text-xs font-bold flex items-center gap-1">
            {swapped && <span className="text-pink-500">✦</span>}
            {adapter.label}
          </div>
          <div className="text-[10px] opacity-70">{adapter.tech}</div>
        </div>
      );
    }

    function HexagonDiagram({ state }) {
      // 6각형 + 각 면에 포트/어댑터 배치
      return (
        <div className="relative w-full" style={{ height: '320px' }}>
          {/* 중앙 6각형 (clip-path 로 polygon 모양) */}
          <div
            className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center justify-center bg-gradient-to-br from-indigo-500 to-indigo-700 text-white shadow-lg"
            style={{
              width: '180px',
              height: '180px',
              clipPath: 'polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%)',
            }}
          >
            <div className="text-center px-2">
              <div className="text-sm font-bold">{state.hexagon.label}</div>
              <div className="text-[10px] opacity-90 mt-0.5">{state.hexagon.sublabel}</div>
            </div>
          </div>

          {/* 좌측 포트/어댑터 */}
          <div className="absolute left-2 top-1/2 -translate-y-1/2 flex flex-col items-start gap-1.5">
            {state.adapters.filter(a => a.side === 'left').map((a, i) => <AdapterBox key={i} adapter={a} />)}
            {state.ports.filter(p => p.side === 'left').map((p, i) => <PortBadge key={i} port={p} />)}
          </div>

          {/* 우측 포트/어댑터 */}
          <div className="absolute right-2 top-1/2 -translate-y-1/2 flex flex-col items-end gap-1.5">
            {state.ports.filter(p => p.side === 'right').map((p, i) => <PortBadge key={i} port={p} />)}
            {state.adapters.filter(a => a.side === 'right').map((a, i) => <AdapterBox key={i} adapter={a} />)}
          </div>

          {/* 하단 포트/어댑터 */}
          <div className="absolute bottom-2 left-1/2 -translate-x-1/2 flex gap-2 items-center">
            {state.ports.filter(p => p.side === 'bottom').map((p, i) => <PortBadge key={i} port={p} />)}
            {state.adapters.filter(a => a.side === 'bottom').map((a, i) => <AdapterBox key={i} adapter={a} />)}
          </div>
        </div>
      );
    }

    function SwapBox({ swap }) {
      if (!swap) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-pink-400 bg-pink-50 p-3">
          <div className="text-xs font-bold text-pink-800 mb-2">✦ {swap.title}</div>
          <ul className="space-y-1">
            {swap.changes.map((c, i) => (
              <li key={i} className="text-sm text-pink-900 flex gap-2">
                <span className="text-pink-500">▸</span>
                <span>{c}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">헥사고날 도식</h3>
            <span className="text-[10px] text-slate-500">중앙 = Domain Core / 양면 = Port + Adapter</span>
          </div>

          <HexagonDiagram state={state} />

          {/* 범례 */}
          <div className="mt-2 flex flex-wrap gap-2 text-[10px]">
            <span className="px-2 py-0.5 rounded border bg-emerald-100 text-emerald-800 border-emerald-300">◀ inbound port</span>
            <span className="px-2 py-0.5 rounded border bg-amber-100 text-amber-800 border-amber-300">▶ outbound port</span>
            <span className="px-2 py-0.5 rounded border bg-indigo-50 text-indigo-900 border-indigo-400">adapter</span>
            <span className="px-2 py-0.5 rounded border bg-pink-50 text-pink-900 border-pink-400">✦ swapped</span>
          </div>

          <SwapBox swap={state.swap} />

          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js) — 5탭 구조
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total, onTabClick }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      const tabs = STEPS.map((s, i) => ({ name: s.code.filename, idx: i }));

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 탭 바 (5탭) */}
          <div className="flex items-center bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {tabs.map((t) => (
              <button
                key={t.idx}
                onClick={() => onTabClick(t.idx)}
                className={`px-3 py-2 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                  t.idx === stepIdx
                    ? 'bg-[#282c34] text-indigo-300 border-t-2 border-t-indigo-400'
                    : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'
                }`}
              >{t.name}</button>
            ))}
          </div>
          <div className="flex items-center gap-2 px-3 py-1.5 bg-slate-800 border-b border-slate-700">
            <span className="w-2.5 h-2.5 rounded-full bg-red-400"></span>
            <span className="w-2.5 h-2.5 rounded-full bg-yellow-400"></span>
            <span className="w-2.5 h-2.5 rounded-full bg-green-400"></span>
            <span className="ml-2 text-[10px] text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">⬡</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter 5-9. 헥사고날 아키텍처</h1>
                <p className="text-sm text-indigo-800/80">Domain → Port → Adapter → inbound/outbound → 교체 자유. 5단계로 추적</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} onTabClick={setStepIdx} />
            </div>

            {/* 컨트롤 — 4버튼 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                Domain Core (순수 로직) → Port (계약) → Adapter (구현) 구조로 분리하면, DB/API/UI 가 바뀌어도 비즈니스 로직은 안전하다. 다음 챕터(5-10)에서는 헥사고날의 확장형인 클린 아키텍처를 살펴본다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['헥사고날', 'Domain Core', 'Port', 'Adapter', 'inbound', 'outbound', 'DI', 'Protocol', 'FastAPI'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./chapter-05-08-apirouter.html" className="underline hover:no-underline">← 이전: 5-8 APIRouter</a>
              <a href="./chapter-05-10-clean.html" className="underline hover:no-underline">다음: 5-10 클린 아키텍처 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
