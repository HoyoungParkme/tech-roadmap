<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 인터랙티브 학습 — Chapter 5-12. BackgroundTasks</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: '문제 — 느린 작업이 응답을 막는다',
        desc: '[Before] 회원가입 시 환영 이메일을 보내야 한다. 이메일 전송은 3초 걸린다. 그 동안 사용자는 "가입 완료" 응답을 기다려야 한다. 느리다!',
        phase: 'problem',
        blocks: [
          { label: '요청: POST /signup', state: 'active' },
          { label: '가입 처리 (0.1초)', state: 'done' },
          { label: '이메일 전송 (3초) ← 여기서 멈춤!', state: 'warning' },
          { label: '응답: "가입 완료"', state: 'idle' },
        ],
        codeLines: [
          { code: '# Before — 이메일이 끝나야 응답', tag: 'label' },
          { code: '', tag: 'none' },
          { code: '@router.post("/signup")', tag: 'code' },
          { code: 'def signup(email: str):', tag: 'code' },
          { code: '    create_user(email)', tag: 'code' },
          { code: '    send_welcome_email(email)  # 3초!', tag: 'problem' },
          { code: '    return {"message": "가입 완료"}', tag: 'code' },
          { code: '', tag: 'none' },
          { code: '# → 사용자가 3초 동안 기다림', tag: 'problem' },
        ],
      },
      {
        title: 'BackgroundTasks — 응답 먼저, 작업은 뒤에서',
        desc: '[After] BackgroundTasks를 쓰면 "가입 완료" 응답을 즉시 보내고, 이메일은 뒤에서 처리한다. 사용자는 기다리지 않는다!',
        phase: 'solution',
        blocks: [
          { label: '요청: POST /signup', state: 'done' },
          { label: '가입 처리 (0.1초)', state: 'done' },
          { label: '응답: "가입 완료" ← 즉시!', state: 'active' },
          { label: '이메일 전송 (뒤에서 3초)', state: 'background' },
        ],
        codeLines: [
          { code: '# After — BackgroundTasks 사용', tag: 'label' },
          { code: 'from fastapi import BackgroundTasks', tag: 'code' },
          { code: '', tag: 'none' },
          { code: 'def send_welcome_email(email: str):', tag: 'bg' },
          { code: '    # 실제 이메일 전송 (느린 작업)', tag: 'bg' },
          { code: '    ...', tag: 'bg' },
          { code: '', tag: 'none' },
          { code: '@router.post("/signup")', tag: 'code' },
          { code: 'def signup(bg: BackgroundTasks, email: str):', tag: 'code' },
          { code: '    create_user(email)', tag: 'code' },
          { code: '    bg.add_task(send_welcome_email, email)', tag: 'highlight' },
          { code: '    return {"message": "가입 완료"}  # 즉시!', tag: 'highlight' },
        ],
      },
      {
        title: '동작 원리',
        desc: '[원리] add_task()는 작업을 등록만 한다. 응답이 클라이언트에 전달된 후, FastAPI가 등록된 작업을 실행한다. 같은 프로세스 안에서 비동기로 실행.',
        phase: 'how',
        blocks: [
          { label: '1. add_task(함수, 인자) — 등록만', state: 'active' },
          { label: '2. return 응답 — 클라이언트에 즉시 전달', state: 'active' },
          { label: '3. 응답 전달 후 → 등록된 작업 실행', state: 'background' },
          { label: '4. 같은 프로세스, 비동기 실행', state: 'done' },
        ],
        codeLines: [
          { code: '# 동작 순서', tag: 'label' },
          { code: '', tag: 'none' },
          { code: '# 1. 라우터 함수 실행', tag: 'code' },
          { code: 'bg.add_task(send_email, email)  # 등록만!', tag: 'highlight' },
          { code: 'return {"message": "완료"}       # 즉시 반환', tag: 'highlight' },
          { code: '', tag: 'none' },
          { code: '# 2. FastAPI가 응답을 클라이언트에 전달', tag: 'code' },
          { code: '', tag: 'none' },
          { code: '# 3. 전달 완료 후 → send_email() 실행', tag: 'bg' },
          { code: '#    같은 프로세스 안에서 비동기로', tag: 'bg' },
        ],
      },
      {
        title: '주의 — 같은 프로세스의 한계',
        desc: '[주의] BackgroundTasks는 같은 프로세스에서 실행된다. 서버가 꺼지면 작업도 사라진다. CPU 집약 작업(이미지 변환, ML 추론)에는 부적합. 그런 작업은 Celery가 필요하다 → 다음 챕터.',
        phase: 'warning',
        blocks: [
          { label: '✅ 빠른 I/O 후처리 (이메일, 로깅)', state: 'done' },
          { label: '✅ 알림 발송, 캐시 갱신', state: 'done' },
          { label: '❌ CPU 집약 (이미지, ML)', state: 'warning' },
          { label: '❌ 서버 재시작 시 유실', state: 'warning' },
        ],
        codeLines: [
          { code: '# 적합한 작업', tag: 'label' },
          { code: '# ✅ 이메일 발송', tag: 'code' },
          { code: '# ✅ 슬랙 알림', tag: 'code' },
          { code: '# ✅ 로그 기록', tag: 'code' },
          { code: '# ✅ 캐시 워밍', tag: 'code' },
          { code: '', tag: 'none' },
          { code: '# 부적합한 작업', tag: 'label' },
          { code: '# ❌ 이미지/동영상 변환', tag: 'problem' },
          { code: '# ❌ ML 모델 추론', tag: 'problem' },
          { code: '# ❌ 대용량 파일 처리', tag: 'problem' },
          { code: '# ❌ 반드시 완료 보장 필요한 결제', tag: 'problem' },
          { code: '', tag: 'none' },
          { code: '# → 다음 챕터: Celery / 메시지 큐', tag: 'label' },
        ],
      },
    ];

    const BLOCK_CLASS = {
      idle:       'bg-slate-100 border-slate-300 text-slate-500',
      active:     'bg-blue-100 border-blue-400 text-blue-700 ring-2 ring-blue-300',
      done:       'bg-emerald-100 border-emerald-400 text-emerald-700',
      warning:    'bg-red-100 border-red-400 text-red-700',
      background: 'bg-amber-100 border-amber-400 text-amber-700 animate-pulse',
    };
    const CODE_TAG_BG = { label: 'bg-slate-100', code: 'bg-white', problem: 'bg-red-50', bg: 'bg-amber-50', highlight: 'bg-emerald-50', none: 'bg-white' };
    const CODE_TAG_BORDER = { label: 'border-slate-300', code: 'border-transparent', problem: 'border-red-300', bg: 'border-amber-300', highlight: 'border-emerald-300', none: 'border-transparent' };
    const PHASE_BADGE_CLASS = { problem: 'bg-red-100 text-red-700 border-red-300', solution: 'bg-emerald-100 text-emerald-700 border-emerald-300', how: 'bg-blue-100 text-blue-700 border-blue-300', warning: 'bg-amber-100 text-amber-700 border-amber-300' };
    const PHASE_BADGE_LABEL = { problem: 'Before', solution: 'After', how: '원리', warning: '주의' };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx >= STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => prev < STEPS.length - 1 ? prev + 1 : prev); };
      const handlePrev = () => setCurrentStepIdx(prev => (prev > 0 ? prev - 1 : prev));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => { if (!isPlaying) return; const id = setInterval(() => handleNextRef.current(), 3000); return () => clearInterval(id); }, [isPlaying]);
      useEffect(() => { const h = (e) => { if (e.key === 'ArrowRight') handleNextRef.current(); if (e.key === 'ArrowLeft') handlePrevRef.current(); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, []);
      const togglePlay = () => { if (isEnd) { setCurrentStepIdx(0); setIsPlaying(true); return; } setIsPlaying(prev => !prev); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm text-slate-500">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum V-5-1</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-xl md:text-2xl font-bold text-slate-800 mb-2">Chapter 5-12. BackgroundTasks로 느린 일을 뒤로</h1>
              <p className="text-slate-600 text-sm leading-relaxed">
                <code className="text-xs bg-slate-100 px-1 rounded">BackgroundTasks</code>를 쓰면 응답을 즉시 보내고,
                느린 작업(이메일, 알림)은 <strong>뒤에서 처리</strong>한다. 사용자는 기다리지 않는다.
              </p>
            </header>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
                <div className="flex items-center justify-between">
                  <h2 className="text-sm font-bold text-slate-600">실행 흐름</h2>
                  <span className={`text-xs font-bold px-2.5 py-1 rounded-full border ${PHASE_BADGE_CLASS[stepData.phase]}`}>{PHASE_BADGE_LABEL[stepData.phase]}</span>
                </div>
                <div className="space-y-2">
                  {stepData.blocks.map((block, idx) => (
                    <div key={idx} className={`p-3 rounded-lg border-2 transition-all duration-300 ${BLOCK_CLASS[block.state]}`}>
                      <div className="font-bold text-sm">{block.label}</div>
                    </div>
                  ))}
                </div>
                <div className="p-4 rounded-lg border bg-blue-50 border-blue-200 text-blue-800 text-sm leading-relaxed">
                  <div className="font-bold mb-1">{stepData.title}</div>{stepData.desc}
                </div>
              </div>
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between items-center">
                  <span>BackgroundTasks 코드</span>
                  <span className="text-slate-500">Step {currentStepIdx + 1} / {STEPS.length}</span>
                </div>
                <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
                  {stepData.codeLines.map((line, idx) => (
                    <div key={idx} className={`px-4 py-0.5 whitespace-pre border-l-4 transition-all duration-300 ${CODE_TAG_BG[line.tag]} ${CODE_TAG_BORDER[line.tag]}`}>
                      <span className="inline-block w-4 text-right mr-3 text-slate-400 select-none">{idx + 1}</span>{line.code || '\u00A0'}
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div className="flex items-center justify-center gap-3 flex-wrap">
              <button onClick={() => handlePrevRef.current()} disabled={currentStepIdx === 0} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="이전 단계">← 이전</button>
              <button onClick={togglePlay} className={`px-6 py-2 rounded-lg font-bold text-sm transition-colors ${isPlaying ? 'bg-amber-500 text-white hover:bg-amber-600' : 'bg-emerald-600 text-white hover:bg-emerald-700'}`} aria-label={isPlaying ? '정지' : (isEnd ? '처음부터 재생' : '자동 실행')}>{isPlaying ? '⏸ 정지' : (isEnd ? '⟳ 처음부터' : '▶ 자동 실행')}</button>
              <button onClick={() => handleNextRef.current()} disabled={isEnd} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="다음 단계">다음 →</button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>
            <footer className="text-center text-xs text-slate-400 py-4">FastAPI 인터랙티브 학습 — Chapter 5-12. BackgroundTasks | 키보드 ← → 지원</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
