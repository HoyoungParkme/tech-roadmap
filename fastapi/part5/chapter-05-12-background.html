<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — Chapter 5-12. BackgroundTasks</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    FastAPI Chapter 5-12 — BackgroundTasks
    학습 목표: 응답을 먼저 돌려보내고 후속 작업을 같은 프로세스에서 비동기로 처리한다.
    핵심 비유: 카운터에서 영수증을 먼저 주고, 주방은 뒤에서 조리 시작
    패턴: fastapi v1 — 좌(LiveDataPane: 요청→응답→백그라운드) + 우(VSCode CodeViewer)
    색상: indigo
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 응답 후 작업 — 왜 필요한가',
        desc: '회원가입 후 환영 메일을 보내는 케이스. 메일 SMTP가 3초 걸리면 응답도 3초 늦어진다. 사용자는 "느린 서비스"로 인식한다. 메일 발송 같은 후속 작업은 응답을 먼저 돌려준 뒤 뒷단에서 처리해야 한다.',
        flow: { req: 'POST /signup', resp: '201 Created', bg: '이메일 발송 (3초)', mode: 'inline-bad' },
        keyPoint: 'API 응답 시간 = 핵심 처리 시간 + 후속 작업 시간. 후속 작업을 떼어내면 응답이 빨라진다.',
        code: {
          lang: 'python',
          filename: 'pattern.py',
          lines: [
            '# Step 1. 인라인 처리의 문제 — 응답 시간 = 메일 발송 시간까지 포함',
            '',
            'from fastapi import FastAPI',
            'import smtplib, time',
            '',
            'app = FastAPI()',
            '',
            '@app.post("/signup")',
            'def signup(email: str):',
            '    # 1) 사용자 저장 — 빠름 (5ms)',
            '    save_user(email)',
            '',
            '    # 2) 환영 메일 발송 — 느림 (3000ms)',
            '    send_welcome_email(email)  # ⚠ 사용자는 3초 기다림',
            '',
            '    return {"ok": True}',
            '',
            '# 응답 시간 = 5ms + 3000ms ≈ 3초',
            '# UX 부정적 + 트래픽 늘면 워커 점유',
            '',
            '# → BackgroundTasks 로 응답 뒤로 미루자',
          ],
          highlight: [12, 13, 14, 17, 18, 21],
        },
      },
      {
        title: 'Step 2. BackgroundTasks 의존성 주입',
        desc: 'FastAPI는 BackgroundTasks 타입을 의존성 주입한다. 경로 함수 시그니처에 추가하면 빈 큐가 만들어지고, 응답 직후 FastAPI가 큐에 담긴 작업을 실행한다.',
        flow: { req: 'POST /signup', resp: '201 Created (즉시)', bg: '큐 생성', mode: 'inject' },
        keyPoint: 'BackgroundTasks 는 매 요청마다 새로 생성되는 작업 큐. 의존성 주입으로 자동 제공.',
        code: {
          lang: 'python',
          filename: 'dependency.py',
          lines: [
            '# Step 2. BackgroundTasks 를 의존성으로 받는다',
            '',
            'from fastapi import FastAPI, BackgroundTasks',
            '',
            'app = FastAPI()',
            '',
            '@app.post("/signup")',
            'def signup(',
            '    email: str,',
            '    background: BackgroundTasks,   # ← FastAPI 가 자동 주입',
            '):',
            '    save_user(email)',
            '    # 아직 add_task 안 함 — 큐만 준비',
            '    return {"ok": True}',
            '',
            '# 시그니처에 BackgroundTasks 만 적으면',
            '# FastAPI 가 빈 큐 객체를 만들어 넘겨준다.',
            '# 응답이 끝난 뒤 이 큐에 담긴 작업들을 순서대로 실행.',
          ],
          highlight: [3, 9, 10, 11, 17],
        },
      },
      {
        title: 'Step 3. add_task — 큐에 작업 등록',
        desc: 'background.add_task(func, *args, **kwargs) 로 큐에 함수와 인자를 등록한다. 작업은 응답 직후 실행되고, 응답에 영향을 주지 않는다.',
        flow: { req: 'POST /signup', resp: '201 Created (5ms)', bg: '메일 발송 (3초, 응답 후)', mode: 'queued' },
        keyPoint: 'add_task 는 등록만 한다. 실제 실행은 응답 본문이 클라이언트에 전달된 직후.',
        code: {
          lang: 'python',
          filename: 'add-task.py',
          lines: [
            '# Step 3. add_task 로 후속 작업 등록',
            '',
            'from fastapi import FastAPI, BackgroundTasks',
            '',
            'app = FastAPI()',
            '',
            'def send_welcome_email(to: str):',
            '    """3초 걸리는 SMTP 발송."""',
            '    smtp.sendmail("noreply@a.com", to, "환영합니다")',
            '',
            '@app.post("/signup")',
            'def signup(email: str, bg: BackgroundTasks):',
            '    save_user(email)',
            '',
            '    # 함수와 인자를 큐에 등록 — 호출은 응답 뒤',
            '    bg.add_task(send_welcome_email, email)',
            '',
            '    # 즉시 응답 (5ms)',
            '    return {"ok": True}',
            '',
            '# 흐름:',
            '#  1) save_user (5ms)',
            '#  2) return → 클라이언트에 201 전달 (5ms)',
            '#  3) FastAPI 가 send_welcome_email 호출 (3000ms, 클라 모름)',
          ],
          highlight: [11, 12, 14, 15, 18, 22, 23],
        },
      },
      {
        title: 'Step 4. async 함수도 동일',
        desc: '비동기 함수도 add_task 로 등록 가능. FastAPI가 자동으로 await 한다. async/def 섞어 써도 OK.',
        flow: { req: 'POST /notify', resp: '202 Accepted (3ms)', bg: '비동기 API 호출 (1초, 응답 후)', mode: 'async' },
        keyPoint: 'async def 함수든 일반 def 함수든 add_task 로 그대로 등록 가능.',
        code: {
          lang: 'python',
          filename: 'async-task.py',
          lines: [
            '# Step 4. async 함수도 add_task 로 등록',
            '',
            'from fastapi import FastAPI, BackgroundTasks',
            'import httpx',
            '',
            'app = FastAPI()',
            '',
            'async def push_to_analytics(event: dict):',
            '    """외부 분석 API 비동기 전송."""',
            '    async with httpx.AsyncClient() as client:',
            '        await client.post(',
            '            "https://analytics.example.com/event",',
            '            json=event,',
            '            timeout=5,',
            '        )',
            '',
            '@app.post("/notify")',
            'async def notify(payload: dict, bg: BackgroundTasks):',
            '    # async 함수도 그대로 등록',
            '    bg.add_task(push_to_analytics, payload)',
            '    return {"queued": True}',
            '',
            '# FastAPI 가 async/def 구분 없이 적절히 실행',
            '# async → await, def → ThreadPool 자동 처리',
          ],
          highlight: [7, 8, 9, 10, 11, 12, 13, 18, 19, 20, 22],
        },
      },
      {
        title: 'Step 5. 한계 — 서버 재시작 시 손실',
        desc: 'BackgroundTasks는 같은 프로세스 안에서 실행된다. 서버가 갑자기 꺼지면 큐에 남은 작업은 사라진다. 또 무거운 작업이 응답 워커 풀을 점유하면 신규 요청 처리가 느려진다. 영속/분산 처리가 필요하면 Celery 같은 별도 큐 시스템을 써야 한다.',
        flow: { req: '재시작', resp: '신규 요청 OK', bg: '미실행 작업 손실', mode: 'limit' },
        limits: [
          { icon: '💥', title: '서버 재시작', detail: '큐에 남은 작업 영구 손실 (메모리 휘발)' },
          { icon: '⏱', title: '워커 점유', detail: '무거운 작업이 응답 워커 풀을 잡으면 신규 요청 지연' },
          { icon: '🔁', title: '재시도 없음', detail: '실패해도 자동 재시도/재큐 기능 없음' },
        ],
        keyPoint: 'BackgroundTasks = 가볍고 빠른 후속 작업 전용. 영속/재시도/스케줄링 필요 시 Celery/RQ.',
        code: {
          lang: 'markdown',
          filename: 'limit.md',
          lines: [
            '# Step 5. BackgroundTasks 의 한계와 대안',
            '',
            '## 한계',
            '',
            '### 1. 영속성 없음',
            '- 큐는 메모리에만 존재',
            '- 서버 프로세스 죽으면 미실행 작업 손실',
            '- 컨테이너 롤링 배포 시에도 손실 가능',
            '',
            '### 2. 워커 점유',
            '- 같은 프로세스에서 실행',
            '- 무거운 작업 (수십 초+)을 던지면 응답 워커가 점유됨',
            '- 결국 신규 요청 처리 속도 저하',
            '',
            '### 3. 재시도 / 스케줄링 부재',
            '- 작업 실패 시 자동 재시도 없음',
            '- "10분 뒤 실행" 같은 지연 실행 불가',
            '- 분산 환경 작업 분산 안 됨',
            '',
            '## 언제 써도 좋은가',
            '- 메일 1통 발송 (1~3초)',
            '- 외부 분석 API 1건 푸시',
            '- 캐시 무효화 같은 가벼운 후속 작업',
            '- "실패해도 큰 일 아닌" 작업',
            '',
            '## 언제 쓰지 말아야 하는가 → Celery / RQ / Dramatiq',
            '- 결제·정산 같은 누락 불가 작업',
            '- 이미지/비디오 인코딩 (수십 초~수 분)',
            '- 스케줄링 (매일 자정 배치)',
            '- 재시도 + 모니터링 필요',
            '',
            '## 한 줄 결론',
            '> BackgroundTasks = "응답 후 1~3초 가벼운 작업".',
            '> 그 이상은 메시지 큐로 옮긴다.',
          ],
          highlight: [4, 5, 6, 7, 9, 10, 11, 12, 14, 15, 16, 17, 26, 27, 28, 29, 30, 32, 33],
        },
      },
    ];

    function FlowLine({ flow }) {
      const TONE = {
        'inline-bad': { client: 'rose-100 text-rose-800',     bg: 'rose-100 text-rose-800',     verdict: '느림 (3초)' },
        'inject':     { client: 'indigo-100 text-indigo-800', bg: 'slate-100 text-slate-700',   verdict: '큐 생성 (빈 상태)' },
        'queued':     { client: 'indigo-100 text-indigo-800', bg: 'emerald-100 text-emerald-800', verdict: '응답 즉시 + 메일 뒤로' },
        'async':      { client: 'indigo-100 text-indigo-800', bg: 'violet-100 text-violet-800', verdict: 'async 자동 await' },
        'limit':      { client: 'amber-100 text-amber-800',   bg: 'rose-100 text-rose-800',     verdict: '재시작 시 손실' },
      };
      const t = TONE[flow.mode] || TONE['queued'];
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4">
          <div className="grid grid-cols-3 gap-2 items-center">
            <div className={`rounded-lg px-3 py-3 text-center bg-${t.client.split(' ')[0]} text-${t.client.split(' ')[1].split('-')[0]}-${t.client.split(' ')[1].split('-')[1]}`}>
              <div className="text-[10px] opacity-70">요청</div>
              <div className="text-sm font-mono font-bold">{flow.req}</div>
            </div>
            <div className="text-center text-2xl text-indigo-400">→</div>
            <div className={`rounded-lg px-3 py-3 text-center bg-${t.client.split(' ')[0]}`}>
              <div className="text-[10px] opacity-70">응답</div>
              <div className="text-sm font-mono font-bold">{flow.resp}</div>
            </div>
          </div>
          <div className="mt-3 text-center text-xs text-indigo-500">↓ 응답 후 ↓</div>
          <div className={`mt-2 rounded-lg px-3 py-3 text-center bg-${t.bg.split(' ')[0]}`}>
            <div className="text-[10px] opacity-70">백그라운드</div>
            <div className="text-sm font-mono font-bold">{flow.bg}</div>
          </div>
          <div className="mt-3 text-center text-[11px] text-indigo-700 italic">{t.verdict}</div>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">요청·응답·백그라운드 흐름</h3>
            <span className="text-[10px] text-slate-500">FastAPI BackgroundTasks</span>
          </div>
          <FlowLine flow={state.flow} />
          {state.limits && (
            <div className="mt-3 space-y-2">
              {state.limits.map((l, i) => (
                <div key={i} className="rounded-lg border border-rose-300 bg-rose-50 px-3 py-2">
                  <div className="flex items-center gap-2 mb-1">
                    <span className="text-lg">{l.icon}</span>
                    <span className="text-sm font-bold text-rose-800">{l.title}</span>
                  </div>
                  <p className="text-xs text-rose-700">{l.detail}</p>
                </div>
              ))}
            </div>
          )}
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);
      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();
      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-indigo-500/20 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}>
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">V</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter 5-12. BackgroundTasks</h1>
                <p className="text-sm text-indigo-800/80">응답 후 가벼운 후속 작업을 같은 프로세스에서 처리</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`} />
              ))}
            </div>

            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-900 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['BackgroundTasks', 'add_task', 'async', 'response-first', 'Celery 대안'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./chapter-05-11-when.html" className="underline hover:no-underline">← 5-11 패턴 선택 가이드</a>
              <a href="./chapter-05-13-celery.html" className="underline hover:no-underline">다음: 5-13 Celery →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
