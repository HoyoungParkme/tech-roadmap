<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 인터랙티브 학습 — Chapter 5-13. Celery / 메시지 큐</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'BackgroundTasks의 한계',
        desc: '[한계] BackgroundTasks는 같은 프로세스에서 실행된다. 서버가 꺼지면 작업도 사라진다. 작업이 실패해도 재시도가 없다. 대규모 서비스에는 부족하다.',
        blocks: [
          { label: 'API 서버 프로세스', state: 'warning', children: ['라우터', 'BackgroundTask ← 여기서 실행'] },
          { label: '서버 재시작 → 작업 유실!', state: 'problem' },
        ],
        codeLines: [
          { code: '# BackgroundTasks 한계', tag: 'label' },
          { code: '', tag: 'none' },
          { code: '# 1. 서버 종료 → 작업 유실', tag: 'problem' },
          { code: '# 2. 재시도 없음 → 실패하면 끝', tag: 'problem' },
          { code: '# 3. 같은 프로세스 → CPU 경쟁', tag: 'problem' },
          { code: '', tag: 'none' },
          { code: '# → 해결: 작업을 외부에 저장하고', tag: 'label' },
          { code: '#    별도 프로세스가 처리하게 하자', tag: 'label' },
        ],
      },
      {
        title: '메시지 큐 — 번호표 기계',
        desc: '[비유] 메시지 큐는 "번호표 뽑는 기계"다. API 서버가 번호표(작업)를 발급하면, 워커가 번호 순서대로 처리한다. Redis나 RabbitMQ가 이 역할을 한다. 서버가 꺼져도 큐에 남은 번호표는 사라지지 않는다.',
        blocks: [
          { label: 'API 서버 → 번호표 발급', state: 'active' },
          { label: '메시지 큐 (Redis/RabbitMQ) ← 대기열', state: 'queue' },
          { label: 'Worker → 순서대로 처리', state: 'worker' },
        ],
        codeLines: [
          { code: '# 메시지 큐 흐름', tag: 'label' },
          { code: '', tag: 'none' },
          { code: '# 1. API 서버가 작업을 큐에 넣는다', tag: 'api' },
          { code: 'result = process_image.delay(image_id)', tag: 'api' },
          { code: '', tag: 'none' },
          { code: '# 2. 큐에 저장된다 (Redis)', tag: 'queue' },
          { code: '#    [작업1, 작업2, 작업3, ...]', tag: 'queue' },
          { code: '', tag: 'none' },
          { code: '# 3. Worker가 꺼내서 처리한다', tag: 'worker' },
          { code: '#    별도 프로세스! API와 독립', tag: 'worker' },
        ],
      },
      {
        title: 'Celery — Python 작업 큐',
        desc: '[Celery] Python에서 가장 널리 쓰이는 분산 작업 큐. @task 데코레이터로 함수를 작업으로 등록하고, .delay()로 큐에 넣는다. Worker가 별도 프로세스에서 실행.',
        blocks: [
          { label: '@task 함수 정의', state: 'active' },
          { label: '.delay() 호출 → 큐에 등록', state: 'queue' },
          { label: 'celery worker → 큐에서 꺼내 실행', state: 'worker' },
        ],
        codeLines: [
          { code: '# Celery 기본 사용법', tag: 'label' },
          { code: 'from celery import Celery', tag: 'code' },
          { code: '', tag: 'none' },
          { code: 'app = Celery("tasks", broker="redis://localhost")', tag: 'code' },
          { code: '', tag: 'none' },
          { code: '@app.task  # 작업으로 등록', tag: 'highlight' },
          { code: 'def process_image(image_id: int):', tag: 'highlight' },
          { code: '    # CPU 집약 작업 (별도 프로세스에서 실행)', tag: 'highlight' },
          { code: '    image = load(image_id)', tag: 'highlight' },
          { code: '    return resize(image)', tag: 'highlight' },
          { code: '', tag: 'none' },
          { code: '# API에서 호출', tag: 'label' },
          { code: 'process_image.delay(42)  # 큐에 넣기!', tag: 'api' },
        ],
      },
      {
        title: '비교표 — 언제 뭘 쓸까',
        desc: '[정리] BackgroundTasks는 간단한 I/O 후처리에, Celery는 CPU 집약/재시도 필요/대용량 작업에. 대부분의 FastAPI 프로젝트는 BackgroundTasks로 충분하다. Celery는 규모가 커졌을 때 도입.',
        blocks: [
          { label: 'BackgroundTasks: 간단 I/O ✅', state: 'active' },
          { label: 'Celery: CPU 집약, 재시도 ✅', state: 'worker' },
          { label: '대부분은 BackgroundTasks로 충분!', state: 'done' },
        ],
        codeLines: [
          { code: '# ──── 비교표 ────', tag: 'label' },
          { code: '', tag: 'none' },
          { code: '#              BackgroundTasks  │  Celery', tag: 'label' },
          { code: '# ────────────┼────────────────┼──────────', tag: 'label' },
          { code: '# 설정        │  없음          │  Redis 필요', tag: 'code' },
          { code: '# 작업 보장   │  없음(유실)    │  있음(큐)', tag: 'code' },
          { code: '# 재시도      │  없음          │  자동', tag: 'code' },
          { code: '# 적합        │  이메일,로깅   │  ML,이미지', tag: 'code' },
          { code: '# 프로세스    │  같은 프로세스  │  별도 Worker', tag: 'code' },
          { code: '', tag: 'none' },
          { code: '# → 대부분 BackgroundTasks로 시작', tag: 'highlight' },
          { code: '# → 규모가 커지면 Celery 도입', tag: 'highlight' },
        ],
      },
    ];

    const BLOCK_CLASS = {
      active:  'bg-blue-100 border-blue-400 text-blue-700',
      done:    'bg-emerald-100 border-emerald-400 text-emerald-700',
      warning: 'bg-amber-100 border-amber-400 text-amber-700',
      problem: 'bg-red-100 border-red-400 text-red-700',
      queue:   'bg-violet-100 border-violet-400 text-violet-700',
      worker:  'bg-emerald-100 border-emerald-400 text-emerald-700 animate-pulse',
    };
    const CODE_TAG_BG = { label: 'bg-slate-100', code: 'bg-white', problem: 'bg-red-50', api: 'bg-blue-50', queue: 'bg-violet-50', worker: 'bg-emerald-50', highlight: 'bg-amber-50', none: 'bg-white' };
    const CODE_TAG_BORDER = { label: 'border-slate-300', code: 'border-transparent', problem: 'border-red-300', api: 'border-blue-300', queue: 'border-violet-300', worker: 'border-emerald-300', highlight: 'border-amber-300', none: 'border-transparent' };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx >= STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => prev < STEPS.length - 1 ? prev + 1 : prev); };
      const handlePrev = () => setCurrentStepIdx(prev => (prev > 0 ? prev - 1 : prev));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => { if (!isPlaying) return; const id = setInterval(() => handleNextRef.current(), 3000); return () => clearInterval(id); }, [isPlaying]);
      useEffect(() => { const h = (e) => { if (e.key === 'ArrowRight') handleNextRef.current(); if (e.key === 'ArrowLeft') handlePrevRef.current(); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, []);
      const togglePlay = () => { if (isEnd) { setCurrentStepIdx(0); setIsPlaying(true); return; } setIsPlaying(prev => !prev); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm text-slate-500">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum V-5-2</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-xl md:text-2xl font-bold text-slate-800 mb-2">Chapter 5-13. Celery / 메시지 큐 개요</h1>
              <p className="text-slate-600 text-sm leading-relaxed">
                메시지 큐는 <strong>"번호표 뽑는 기계"</strong>. API 서버가 번호표를 발급하면 워커가 순서대로 처리한다.
                서버가 재시작돼도 큐에 남은 작업은 보장된다.
              </p>
            </header>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
                <h2 className="text-sm font-bold text-slate-600">메시지 큐 구조</h2>
                <div className="space-y-2">
                  {stepData.blocks.map((block, idx) => (
                    <div key={idx} className={`p-3 rounded-lg border-2 transition-all duration-300 ${BLOCK_CLASS[block.state]}`}>
                      <div className="font-bold text-sm">{block.label}</div>
                      {block.children && (
                        <ul className="mt-1 ml-3 text-xs opacity-80 list-disc list-inside">
                          {block.children.map((c, ci) => <li key={ci}>{c}</li>)}
                        </ul>
                      )}
                    </div>
                  ))}
                </div>
                <div className="p-4 rounded-lg border bg-blue-50 border-blue-200 text-blue-800 text-sm leading-relaxed">
                  <div className="font-bold mb-1">{stepData.title}</div>{stepData.desc}
                </div>
              </div>
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between items-center">
                  <span>Celery / 메시지 큐</span>
                  <span className="text-slate-500">Step {currentStepIdx + 1} / {STEPS.length}</span>
                </div>
                <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
                  {stepData.codeLines.map((line, idx) => (
                    <div key={idx} className={`px-4 py-0.5 whitespace-pre border-l-4 transition-all duration-300 ${CODE_TAG_BG[line.tag]} ${CODE_TAG_BORDER[line.tag]}`}>
                      <span className="inline-block w-4 text-right mr-3 text-slate-400 select-none">{idx + 1}</span>{line.code || '\u00A0'}
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div className="flex items-center justify-center gap-3 flex-wrap">
              <button onClick={() => handlePrevRef.current()} disabled={currentStepIdx === 0} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="이전 단계">← 이전</button>
              <button onClick={togglePlay} className={`px-6 py-2 rounded-lg font-bold text-sm transition-colors ${isPlaying ? 'bg-amber-500 text-white hover:bg-amber-600' : 'bg-emerald-600 text-white hover:bg-emerald-700'}`} aria-label={isPlaying ? '정지' : (isEnd ? '처음부터 재생' : '자동 실행')}>{isPlaying ? '⏸ 정지' : (isEnd ? '⟳ 처음부터' : '▶ 자동 실행')}</button>
              <button onClick={() => handleNextRef.current()} disabled={isEnd} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="다음 단계">다음 →</button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>
            <footer className="text-center text-xs text-slate-400 py-4">FastAPI 인터랙티브 학습 — Chapter 5-13. Celery / 메시지 큐 | 키보드 ← → 지원</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
