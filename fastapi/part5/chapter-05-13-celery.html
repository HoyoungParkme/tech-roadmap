            'app/retry_task.py',
            '',
            '목적: 외부 API처럼 "가끔 실패하는" 작업을 안전하게 재시도한다.',
            '  - autoretry_for: 어떤 예외가 났을 때 재시도할지 선언',
            '  - retry_backoff: 재시도 간격을 지수적으로 늘림(2,4,8,...초)',
            '  - max_retries: 몇 번까지 재시도할지 상한선',
            '"""',
            'import requests',
            'from celery import Celery',
            'from celery.utils.log import get_task_logger',
            '',
            'celery_app = Celery(',
            '    "worker",',
            '    broker="redis://localhost:6379/0",',
            '    backend="redis://localhost:6379/1",',
            ')',
            'log = get_task_logger(__name__)',
            '',
            '',
            '@celery_app.task(',
            '    bind=True,',
            '    autoretry_for=(requests.RequestException,),  # ① 어떤 예외에 재시도할지',
            '    retry_backoff=2,        # ② 지수 백오프: 2, 4, 8, 16, 32초',
            '    retry_backoff_max=600,  # ③ 최대 대기 10분',
            '    retry_jitter=True,      # ④ 동시에 몰리지 않게 약간의 랜덤',
            '    max_retries=5,          # ⑤ 5번 실패 시 FAILURE',
            ')',
            'def send_sms(self, phone: str, body: str) -> str:',
            '    """외부 SMS API 호출. 네트워크 실패 시 자동 재시도."""',
            '    log.info("send_sms attempt %s → %s", self.request.retries, phone)',
            '    res = requests.post(',
            '        "https://sms.example.com/send",',
            '        json={"to": phone, "body": body},',
            '        timeout=5,',
            '    )',
            '    res.raise_for_status()   # 4xx/5xx → RequestException → 재시도',
            '    return res.json()["id"]',
            '',
            '',
            '# 모니터링 — Flower 한 줄로 띄우기',
            '#',
            '#   pip install flower',
            '#   celery -A app.tasks flower --port=5555',
            '#   → http://localhost:5555 에서 큐/태스크/실패율 확인',
            '',
            '# 운영 체크리스트',
            '#  ✓ 큐 길이 > 1000 알람                 (작업이 쌓이고 있음)',
            '#  ✓ 실패율 > 1% 알람                    (외부 의존성 문제?)',
            '#  ✓ 평균 처리시간 > 평소 3배 알람       (DB/네트워크 느려짐)',
            '#  ✓ worker liveness ping (--heartbeat) (worker가 죽었나)',
            '#  ✓ idempotent task (재시도 안전성)    (같은 작업 2번 실행돼도 OK)',
          ],
          highlight: [20, 21, 22, 23, 24, 25, 26, 27, 32, 33, 34, 35, 36, 37, 40, 41, 42, 43, 44, 46, 47, 48, 49, 50, 51],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤
    // ─────────────────────────────────────────────────────
    function ApiBox({ api }) {
      if (!api) return null;
      const methodColor = {
        GET: 'bg-emerald-500',
        POST: 'bg-blue-500',
        PUT: 'bg-amber-500',
        DELETE: 'bg-rose-500',
      }[api.method] || 'bg-slate-500';
      const statusColor = api.status < 300 ? 'bg-emerald-500' : api.status < 400 ? 'bg-blue-500' : 'bg-amber-500';
      return (
        <div className="rounded-lg border border-indigo-200 bg-white p-3">
          <div className="text-[10px] font-bold text-indigo-700 mb-1.5">① API 서버 (FastAPI)</div>
          <div className="flex items-center gap-2 mb-1.5">
            <span className={`text-[10px] font-bold text-white px-2 py-0.5 rounded ${methodColor}`}>{api.method}</span>
            <span className="text-sm font-mono text-indigo-900">{api.path}</span>
          </div>
          {api.note && <div className="text-[10px] text-slate-500 mb-1.5">{api.note}</div>}
          <div className="flex items-center gap-2">
            <span className={`text-[10px] font-bold text-white px-2 py-0.5 rounded ${statusColor}`}>{api.status}</span>
            <span className="text-[10px] font-mono text-indigo-800 break-all">{api.body}</span>
          </div>
        </div>
      );
    }

    function BrokerBox({ broker }) {
      if (!broker) return null;
      const stateLabel = {
        pending: '대기 중',
        consumed: '꺼내짐',
        empty: '비어있음',
      }[broker.queueState] || '';
      const stateColor = {
        pending: 'bg-amber-100 text-amber-800 border-amber-300',
        consumed: 'bg-blue-100 text-blue-800 border-blue-300',
        empty: 'bg-slate-100 text-slate-600 border-slate-300',
      }[broker.queueState] || 'bg-slate-100';
      return (
        <div className="rounded-lg border-2 border-violet-300 bg-violet-50 p-3">
          <div className="flex items-center justify-between mb-1.5">
            <div className="text-[10px] font-bold text-violet-700">② Broker (메시지 큐)</div>
            <span className={`text-[10px] font-bold px-2 py-0.5 rounded border ${stateColor}`}>{stateLabel}</span>
          </div>
          <div className="text-[11px] font-mono text-violet-900 mb-2">{broker.name}</div>
          {broker.items.length === 0 ? (
            <div className="text-[10px] text-violet-700/70 italic py-2 text-center border border-dashed border-violet-300 rounded">
              큐가 비었습니다 (worker가 모두 처리)
            </div>
          ) : (
            <ul className="space-y-1">
              {broker.items.map((it, i) => (
                <li key={i} className="text-[10px] font-mono bg-white border border-violet-200 rounded px-2 py-1 flex items-center justify-between">
                  <span className="text-violet-900">
                    <span className="text-violet-500">▸</span> {it.task}<span className="text-slate-500">{it.args}</span>
                  </span>
                  <span className="flex items-center gap-1.5">
                    {it.retries !== undefined && (
                      <span className="text-[9px] bg-rose-100 text-rose-700 px-1.5 py-0.5 rounded">retry {it.retries}</span>
                    )}
                    <span className="text-[9px] text-slate-400">{it.id}</span>
                  </span>
                </li>
              ))}
            </ul>
          )}
        </div>
      );
    }

    function WorkerBox({ worker }) {
      if (!worker) return null;
      return (
        <div className="rounded-lg border-2 border-emerald-300 bg-emerald-50 p-3">
          <div className="flex items-center justify-between mb-1.5">
            <div className="text-[10px] font-bold text-emerald-700">③ Worker (별도 프로세스)</div>
            <span className="text-[9px] bg-emerald-200 text-emerald-800 px-1.5 py-0.5 rounded">concurrency={worker.concurrency}</span>
          </div>
          <div className="text-[11px] font-mono text-emerald-900 mb-2">{worker.name}</div>
          {worker.processing ? (
            <div className="bg-white border border-emerald-200 rounded px-2 py-1.5">
              <div className="flex items-center gap-1.5 mb-0.5">
                <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span className="text-[10px] font-bold text-emerald-800">{worker.processing.task}</span>
                <span className="text-[9px] text-slate-400 ml-auto">{worker.processing.id}</span>
              </div>
              <div className="text-[10px] text-emerald-700/80 pl-3.5">{worker.processing.progress}</div>
            </div>
          ) : worker.done ? (
            <div className="bg-white border border-emerald-200 rounded px-2 py-1.5">
              <div className="flex items-center gap-1.5">
                <span className="text-emerald-600">✓</span>
                <span className="text-[10px] font-bold text-emerald-800">완료: {worker.done.id}</span>
              </div>
              <div className="text-[10px] font-mono text-emerald-700/80 pl-3.5">return {worker.done.returned}</div>
            </div>
          ) : (
            <div className="text-[10px] text-emerald-700/70 italic py-1 text-center border border-dashed border-emerald-300 rounded">
              idle (큐 대기 중)
            </div>
          )}
        </div>
      );
    }

    function BackendBox({ backend }) {
      if (!backend) return null;
      const statusColor = {
        SUCCESS: 'bg-emerald-200 text-emerald-800',
        STARTED: 'bg-blue-200 text-blue-800',
        RETRY: 'bg-amber-200 text-amber-800',
        FAILURE: 'bg-rose-200 text-rose-800',
        PENDING: 'bg-slate-200 text-slate-700',
      };
      return (
        <div className="rounded-lg border border-indigo-200 bg-indigo-50 p-3">
          <div className="text-[10px] font-bold text-indigo-700 mb-1.5">④ Result Backend (결과 저장소)</div>
          <div className="text-[11px] font-mono text-indigo-900 mb-2">{backend.name}</div>
          <ul className="space-y-1">
            {backend.entries.map((e, i) => (
              <li key={i} className="text-[10px] font-mono bg-white border border-indigo-200 rounded px-2 py-1 flex items-center justify-between gap-2">
                <span className="text-indigo-900 truncate">{e.id}</span>
                <span className="flex items-center gap-1.5 shrink-0">
                  <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${statusColor[e.status] || 'bg-slate-200'}`}>{e.status}</span>
                  {e.result && <span className="text-[9px] text-indigo-700 truncate max-w-[120px]">{e.result}</span>}
                </span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function RetryBox({ retry }) {
      if (!retry) return null;
      return (
        <div className="rounded-lg border-2 border-rose-300 bg-rose-50 p-3">
          <div className="text-[10px] font-bold text-rose-700 mb-1.5">⑤ {retry.title}</div>
          <ul className="space-y-1">
            {retry.rules.map((r, i) => (
              <li key={i} className="text-[10px] text-rose-900 flex gap-1.5">
                <span className="text-rose-500">▸</span>
                <span className="font-mono">{r}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">Celery 작업 흐름</h3>
            <span className="text-[10px] text-slate-500">API → broker → worker → backend</span>
          </div>
          <div className="space-y-2">
            <ApiBox api={state.api} />
            {state.broker && <div className="text-center text-xs font-bold text-indigo-500 py-0.5">↓ .delay() 큐에 넣기 ↓</div>}
            <BrokerBox broker={state.broker} />
            {state.worker && <div className="text-center text-xs font-bold text-indigo-500 py-0.5">↓ worker가 꺼냄 ↓</div>}
            <WorkerBox worker={state.worker} />
            {state.backend && <div className="text-center text-xs font-bold text-indigo-500 py-0.5">↓ 결과 저장 ↓</div>}
            <BackendBox backend={state.backend} />
            {state.retry && <div className="text-center text-xs font-bold text-rose-500 py-0.5">↓ 실패 시 자동 재시도 ↓</div>}
            <RetryBox retry={state.retry} />
          </div>
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer — 5탭
    // ─────────────────────────────────────────────────────
    function CodeViewer({ steps, stepIdx, setStepIdx }) {
      const code = steps[stepIdx].code;
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 탭 바 */}
          <div className="flex items-center gap-0.5 bg-slate-900 px-2 pt-2 border-b border-slate-700 overflow-x-auto">
            {steps.map((s, i) => {
              const active = i === stepIdx;
              return (
                <button
                  key={s.code.id}
                  onClick={() => setStepIdx(i)}
                  className={`px-3 py-1.5 text-[11px] font-mono rounded-t whitespace-nowrap transition ${
                    active
                      ? 'bg-[#282c34] text-indigo-300 border-t border-l border-r border-slate-700'
                      : 'bg-slate-800 text-slate-400 hover:text-slate-200'
                  }`}
                >
                  {s.code.filename}
                </button>
              );
            })}
          </div>
          {/* 파일 경로 바 */}
          <div className="flex items-center gap-2 px-3 py-1.5 bg-slate-800 border-b border-slate-700">
            <span className="w-2.5 h-2.5 rounded-full bg-red-400"></span>
            <span className="w-2.5 h-2.5 rounded-full bg-yellow-400"></span>
            <span className="w-2.5 h-2.5 rounded-full bg-green-400"></span>
            <span className="ml-2 text-[11px] text-slate-300 font-mono">app/{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          {/* 코드 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          {/* 상태 바 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines · {code.highlight ? code.highlight.length : 0} highlighted</span>
            <span>Step {stepIdx + 1} / {steps.length}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-blue-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">5-13</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter 5-13. Celery / 메시지 큐</h1>
                <p className="text-sm text-indigo-800/80">API → broker → worker → backend → 재시도. 5단계로 추적</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer steps={STEPS} stepIdx={stepIdx} setStepIdx={setStepIdx} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계 · 우측 탭 클릭으로 직접 이동</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                무거운 작업 분리 → broker(Redis) → worker(별도 프로세스) → result backend → autoretry/Flower 모니터링까지, Celery로 비동기 작업 큐를 안전하게 운영하는 5단계를 정리했다. API 응답 흐름과 무거운 작업을 분리하는 것이 핵심이고, 모니터링 없이는 운영하지 마라.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Celery', 'Redis', 'RabbitMQ', 'broker', 'worker', 'result-backend', 'AsyncResult', 'autoretry_for', 'retry_backoff', 'Flower'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="../index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <span className="text-indigo-500">Chapter 5-13 / Part 5</span>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
