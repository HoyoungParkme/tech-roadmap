<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 인터랙티브 학습 — Chapter 5-5. Fat Controller</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ─────────────────────────────────────────
       1. Fat Controller 성장 단계 정의
    ───────────────────────────────────────── */

    const SNAPSHOTS = [
      // Step 0: 깔끔한 Controller
      {
        lines: [
          { code: '# controller/order_controller.py', tag: 'label' },
          { code: '@app.post("/orders")', tag: 'route' },
          { code: 'def create_order(data):', tag: 'route' },
          { code: '    order = OrderModel.create(data)', tag: 'route' },
          { code: '    return {"id": order.id}', tag: 'route' },
        ],
      },
      // Step 1: 할인 계산 추가
      {
        lines: [
          { code: '# controller/order_controller.py', tag: 'label' },
          { code: '@app.post("/orders")', tag: 'route' },
          { code: 'def create_order(data):', tag: 'route' },
          { code: '    # 할인 계산 (비즈니스 로직)', tag: 'biz' },
          { code: '    if data.total > 100000:', tag: 'biz' },
          { code: '        data.total *= 0.9', tag: 'biz' },
          { code: '    order = OrderModel.create(data)', tag: 'route' },
          { code: '    return {"id": order.id}', tag: 'route' },
        ],
      },
      // Step 2: 이메일+로깅+권한 추가 (Fat Controller)
      {
        lines: [
          { code: '# controller/order_controller.py', tag: 'label' },
          { code: '@app.post("/orders")', tag: 'route' },
          { code: 'def create_order(data, user):', tag: 'route' },
          { code: '    # 권한 체크', tag: 'biz' },
          { code: '    if not user.can_order:', tag: 'biz' },
          { code: '        raise Forbidden()', tag: 'biz' },
          { code: '    # 할인 계산', tag: 'biz' },
          { code: '    if data.total > 100000:', tag: 'biz' },
          { code: '        data.total *= 0.9', tag: 'biz' },
          { code: '    elif user.is_vip:', tag: 'biz' },
          { code: '        data.total *= 0.85', tag: 'biz' },
          { code: '    # 재고 체크', tag: 'biz' },
          { code: '    stock = StockModel.get(data.item)', tag: 'biz' },
          { code: '    if stock < data.qty:', tag: 'biz' },
          { code: '        raise OutOfStock()', tag: 'biz' },
          { code: '    order = OrderModel.create(data)', tag: 'route' },
          { code: '    # 이메일 발송', tag: 'extra' },
          { code: '    send_email(user.email, "주문 완료")', tag: 'extra' },
          { code: '    # 로깅', tag: 'extra' },
          { code: '    logger.info(f"주문 생성: {order.id}")', tag: 'extra' },
          { code: '    return {"id": order.id}', tag: 'route' },
        ],
      },
      // Step 3: 문제점 표시
      {
        lines: [
          { code: '# controller/order_controller.py  ← 21줄!', tag: 'label' },
          { code: '@app.post("/orders")', tag: 'route' },
          { code: 'def create_order(data, user):       # 문제 1: 테스트하려면 HTTP 요청 필요', tag: 'problem' },
          { code: '    if not user.can_order:           # 문제 2: 다른 Controller에서', tag: 'problem' },
          { code: '        raise Forbidden()            #         같은 권한 체크를', tag: 'problem' },
          { code: '    if data.total > 100000:          #         복사/붙여넣기 해야 함', tag: 'problem' },
          { code: '        data.total *= 0.9', tag: 'biz' },
          { code: '    elif user.is_vip:', tag: 'biz' },
          { code: '        data.total *= 0.85', tag: 'biz' },
          { code: '    stock = StockModel.get(data.item)', tag: 'biz' },
          { code: '    if stock < data.qty:', tag: 'biz' },
          { code: '        raise OutOfStock()', tag: 'biz' },
          { code: '    order = OrderModel.create(data)', tag: 'route' },
          { code: '    send_email(user.email, "주문 완료") # 문제 3: 변경 시', tag: 'problem' },
          { code: '    logger.info(f"주문 생성: {order.id}") # Controller 전체를 읽어야 함', tag: 'problem' },
          { code: '    return {"id": order.id}', tag: 'route' },
        ],
      },
      // Step 4: Service 분리 힌트
      {
        lines: [
          { code: '# ──── After: Service 계층 분리 ────', tag: 'label' },
          { code: '', tag: 'none' },
          { code: '# controller (얇아졌다!)', tag: 'route' },
          { code: '@app.post("/orders")', tag: 'route' },
          { code: 'def create_order(data, user):', tag: 'route' },
          { code: '    return order_service.create(data, user)', tag: 'route' },
          { code: '', tag: 'none' },
          { code: '# service (비즈니스 로직이 여기로)', tag: 'service' },
          { code: 'def create(data, user):', tag: 'service' },
          { code: '    check_permission(user)', tag: 'service' },
          { code: '    apply_discount(data, user)', tag: 'service' },
          { code: '    check_stock(data)', tag: 'service' },
          { code: '    order = order_repo.save(data)', tag: 'service' },
          { code: '    notify(user, order)', tag: 'service' },
          { code: '    return order', tag: 'service' },
          { code: '', tag: 'none' },
          { code: '# → 다음 챕터: 3계층 아키텍처 (V-3)', tag: 'label' },
        ],
      },
    ];

    const STEPS = [
      {
        title: '깔끔한 Controller',
        desc: '[시작] Controller가 요청을 받고 → Model에 저장 → 응답. 5줄이면 충분하다. 이 정도는 아무 문제 없다.',
        controllerSize: 1,
        serviceSize: 0,
        problemLevel: 0,
      },
      {
        title: '할인 계산 추가',
        desc: '[로직 추가] "할인 계산도 Controller에서 하자." 비즈니스 로직이 슬그머니 들어온다. 함수가 8줄로 늘었다.',
        controllerSize: 2,
        serviceSize: 0,
        problemLevel: 1,
      },
      {
        title: 'Fat Controller — 뚱뚱해졌다!',
        desc: '[Fat Controller] 권한 체크, 할인 계산, 재고 확인, 이메일 발송, 로깅... Controller가 21줄짜리 뚱뚱한 함수가 됐다. 이것이 Fat Controller 문제다.',
        controllerSize: 4,
        serviceSize: 0,
        problemLevel: 3,
      },
      {
        title: '문제점 — 왜 나쁜가?',
        desc: '[문제] 1) 테스트하려면 HTTP 요청이 필요 2) 다른 Controller에서 같은 로직을 쓰려면 복사/붙여넣기 3) 변경하려면 Controller 전체를 읽어야 함. MVC의 한계다.',
        controllerSize: 4,
        serviceSize: 0,
        problemLevel: 4,
      },
      {
        title: '해결 힌트 — Service 분리',
        desc: '[힌트] 비즈니스 로직을 Service 계층으로 빼면? Controller는 6줄로 돌아간다. Service는 HTTP 없이 단독 테스트 가능. 이것이 3계층 아키텍처 — 다음 챕터(V-3)에서 자세히!',
        controllerSize: 1,
        serviceSize: 3,
        problemLevel: 0,
      },
    ];

    /* ─────────────────────────────────────────
       2. 색상 매핑 (Tailwind 정적)
    ───────────────────────────────────────── */

    const TAG_BG = { route: 'bg-blue-50', biz: 'bg-amber-50', extra: 'bg-purple-50', problem: 'bg-red-50', service: 'bg-emerald-50', label: 'bg-slate-100', none: 'bg-white' };
    const TAG_BORDER = { route: 'border-blue-300', biz: 'border-amber-300', extra: 'border-purple-300', problem: 'border-red-400', service: 'border-emerald-300', label: 'border-slate-300', none: 'border-transparent' };
    const TAG_TEXT = { route: 'text-blue-600', biz: 'text-amber-600', extra: 'text-purple-600', problem: 'text-red-600', service: 'text-emerald-600', label: 'text-slate-500', none: 'text-slate-400' };

    const PROBLEM_BAR_CLASS = { 0: 'bg-emerald-400', 1: 'bg-yellow-400', 2: 'bg-amber-400', 3: 'bg-orange-500', 4: 'bg-red-500' };
    const PROBLEM_LABEL = { 0: '깨끗함', 1: '주의', 2: '복잡해짐', 3: 'Fat Controller!', 4: '위험 — 한계 도달' };
    const PROBLEM_TEXT_CLASS = { 0: 'text-emerald-700', 1: 'text-yellow-700', 2: 'text-amber-700', 3: 'text-orange-700', 4: 'text-red-700' };

    /* ─────────────────────────────────────────
       3. 앱 컴포넌트
    ───────────────────────────────────────── */

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const stepData = STEPS[currentStepIdx];
      const snapshot = SNAPSHOTS[currentStepIdx];
      const isEnd = currentStepIdx >= STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => prev < STEPS.length - 1 ? prev + 1 : prev); };
      const handlePrev = () => setCurrentStepIdx(prev => (prev > 0 ? prev - 1 : prev));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => { if (!isPlaying) return; const id = setInterval(() => handleNextRef.current(), 2800); return () => clearInterval(id); }, [isPlaying]);
      useEffect(() => { const h = (e) => { if (e.key === 'ArrowRight') handleNextRef.current(); if (e.key === 'ArrowLeft') handlePrevRef.current(); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, []);
      const togglePlay = () => { if (isEnd) { setCurrentStepIdx(0); setIsPlaying(true); return; } setIsPlaying(prev => !prev); };

      // Controller 크기 비율 (시각적)
      const maxBarHeight = 10;
      const controllerHeight = Math.max(1, stepData.controllerSize);
      const serviceHeight = stepData.serviceSize;

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm text-slate-500">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum V-2-3</span>
            </nav>

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-xl md:text-2xl font-bold text-slate-800 mb-2">Chapter 5-5. MVC/MTV의 한계 — Fat Controller</h1>
              <p className="text-slate-600 text-sm leading-relaxed">
                MVC/MTV의 Controller(View)가 비즈니스 로직을 직접 들고 있으면,
                기능이 늘수록 <strong>뚱뚱한 Controller</strong> 문제가 생긴다.
                이를 해결하기 위해 비즈니스 로직을 별도 계층(Service)으로 빼는 3계층 아키텍처가 등장했다.
              </p>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              {/* ── 좌측: Controller 크기 시각화 ── */}
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
                <h2 className="text-sm font-bold text-slate-600">Controller 크기 변화</h2>

                {/* 비대화 수준 바 */}
                <div className="space-y-1">
                  <div className="flex items-center justify-between text-xs font-bold">
                    <span className={PROBLEM_TEXT_CLASS[stepData.problemLevel]}>{PROBLEM_LABEL[stepData.problemLevel]}</span>
                    <span className="text-slate-400">Step {currentStepIdx + 1} / {STEPS.length}</span>
                  </div>
                  <div className="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                    <div className={`h-full rounded-full transition-all duration-500 ${PROBLEM_BAR_CLASS[stepData.problemLevel]}`} style={{ width: `${(stepData.problemLevel / 4) * 100}%` }} />
                  </div>
                </div>

                {/* Controller + Service 블록 크기 */}
                <div className="flex gap-4 items-end justify-center" style={{ minHeight: '10rem' }}>
                  <div className="flex flex-col items-center gap-1">
                    <div
                      className={`w-28 rounded-lg border-2 flex items-center justify-center font-bold text-sm transition-all duration-500 ${stepData.problemLevel >= 3 ? 'bg-red-100 border-red-400 text-red-700' : 'bg-blue-100 border-blue-400 text-blue-700'}`}
                      style={{ height: `${controllerHeight * 2.2}rem` }}
                    >
                      Controller
                    </div>
                    <span className="text-xs text-slate-500">{snapshot.lines.filter(l => l.tag !== 'label' && l.tag !== 'none' && l.tag !== 'service').length}줄</span>
                  </div>
                  {serviceHeight > 0 && (
                    <div className="flex flex-col items-center gap-1">
                      <div
                        className="w-28 rounded-lg border-2 bg-emerald-100 border-emerald-400 text-emerald-700 flex items-center justify-center font-bold text-sm transition-all duration-500"
                        style={{ height: `${serviceHeight * 2.2}rem` }}
                      >
                        Service
                      </div>
                      <span className="text-xs text-slate-500">{snapshot.lines.filter(l => l.tag === 'service').length}줄</span>
                    </div>
                  )}
                </div>

                {/* 설명 */}
                <div className="p-4 rounded-lg border bg-blue-50 border-blue-200 text-blue-800 text-sm leading-relaxed">
                  <div className="font-bold mb-1">{stepData.title}</div>
                  {stepData.desc}
                </div>
              </div>

              {/* ── 우측: 코드 뷰어 ── */}
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between items-center">
                  <span>Controller 코드 변화</span>
                  <span className="text-slate-500">{snapshot.lines.length}줄</span>
                </div>
                <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
                  {snapshot.lines.map((line, idx) => (
                    <div key={idx} className={`px-4 py-0.5 whitespace-pre transition-all duration-300 border-l-4 ${TAG_BG[line.tag]} ${TAG_BORDER[line.tag]}`}>
                      <span className="inline-block w-6 text-right mr-3 text-slate-400 select-none">{idx + 1}</span>
                      {line.code || '\u00A0'}
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* ── 컨트롤 ── */}
            <div className="flex items-center justify-center gap-3 flex-wrap">
              <button onClick={() => handlePrevRef.current()} disabled={currentStepIdx === 0} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="이전 단계">← 이전</button>
              <button onClick={togglePlay} className={`px-6 py-2 rounded-lg font-bold text-sm transition-colors ${isPlaying ? 'bg-amber-500 text-white hover:bg-amber-600' : 'bg-emerald-600 text-white hover:bg-emerald-700'}`} aria-label={isPlaying ? '정지' : (isEnd ? '처음부터 재생' : '자동 실행')}>{isPlaying ? '⏸ 정지' : (isEnd ? '⟳ 처음부터' : '▶ 자동 실행')}</button>
              <button onClick={() => handleNextRef.current()} disabled={isEnd} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="다음 단계">다음 →</button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <footer className="text-center text-xs text-slate-400 py-4">FastAPI 인터랙티브 학습 — Chapter 5-5. Fat Controller | 키보드 ← → 지원</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
