<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 인터랙티브 학습 — Chapter 5-11. 패턴 선택 가이드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: '혼자 + 프로토타입/MVP',
        desc: '[플랫 구조] 1인 개발, 빠른 검증이 목표일 때. main.py + schemas.py + models.py면 충분하다. 패턴은 나중에.',
        level: 0,
        pattern: '플랫 구조',
        team: '1인',
        rows: [
          { situation: '혼자 + 프로토타입/MVP', pattern: '플랫 구조', highlight: true },
          { situation: '2~5인 팀, 도메인 로직 생길 때', pattern: '3계층', highlight: false },
          { situation: '5~15인 팀, 외부 시스템 연동', pattern: '3계층 또는 헥사고날', highlight: false },
          { situation: '15인+ 장기 운영, 도메인 복잡', pattern: '클린 아키텍처 / MSA', highlight: false },
        ],
        codeLines: [
          { code: '# 플랫 구조 — 이것만으로 충분!', tag: 'label' },
          { code: '', tag: 'none' },
          { code: 'app/', tag: 'code' },
          { code: '├── main.py', tag: 'highlight' },
          { code: '├── schemas.py', tag: 'highlight' },
          { code: '└── models.py', tag: 'highlight' },
          { code: '', tag: 'none' },
          { code: '# 3개 파일이면 MVP 완성 가능', tag: 'label' },
          { code: '# 패턴은 복잡해지면 그때 도입', tag: 'label' },
        ],
      },
      {
        title: '2~5인 팀 — 3계층',
        desc: '[3계층] 팀원이 생기거나 비즈니스 로직이 복잡해지면 3계층(Router/Service/Repository)으로 나눈다. 대부분의 FastAPI 프로젝트가 여기.',
        level: 1,
        pattern: '3계층',
        team: '2~5인',
        rows: [
          { situation: '혼자 + 프로토타입/MVP', pattern: '플랫 구조', highlight: false },
          { situation: '2~5인 팀, 도메인 로직 생길 때', pattern: '3계층', highlight: true },
          { situation: '5~15인 팀, 외부 시스템 연동', pattern: '3계층 또는 헥사고날', highlight: false },
          { situation: '15인+ 장기 운영, 도메인 복잡', pattern: '클린 아키텍처 / MSA', highlight: false },
        ],
        codeLines: [
          { code: '# 3계층 — FastAPI 실무 표준', tag: 'label' },
          { code: '', tag: 'none' },
          { code: 'app/', tag: 'code' },
          { code: '├── routers/     ← Controller', tag: 'highlight' },
          { code: '├── services/    ← 비즈니스 로직', tag: 'highlight' },
          { code: '├── repositories/ ← DB 접근', tag: 'highlight' },
          { code: '├── models/', tag: 'code' },
          { code: '└── schemas/', tag: 'code' },
          { code: '', tag: 'none' },
          { code: '# 대부분의 프로젝트가 여기서 충분', tag: 'label' },
        ],
      },
      {
        title: '5~15인 — 헥사고날 고려',
        desc: '[헥사고날] 외부 시스템(결제, 알림, 외부 API)이 많아지면 Port/Adapter로 경계를 만든다. DB 교체나 외부 서비스 변경이 비즈니스 로직에 영향을 주지 않게.',
        level: 2,
        pattern: '3계층 또는 헥사고날',
        team: '5~15인',
        rows: [
          { situation: '혼자 + 프로토타입/MVP', pattern: '플랫 구조', highlight: false },
          { situation: '2~5인 팀, 도메인 로직 생길 때', pattern: '3계층', highlight: false },
          { situation: '5~15인 팀, 외부 시스템 연동', pattern: '3계층 또는 헥사고날', highlight: true },
          { situation: '15인+ 장기 운영, 도메인 복잡', pattern: '클린 아키텍처 / MSA', highlight: false },
        ],
        codeLines: [
          { code: '# 헥사고날 — Port + Adapter 경계', tag: 'label' },
          { code: '', tag: 'none' },
          { code: 'app/', tag: 'code' },
          { code: '├── domain/       ← 순수 비즈니스', tag: 'highlight' },
          { code: '├── ports/        ← 인터페이스', tag: 'highlight' },
          { code: '├── adapters/', tag: 'code' },
          { code: '│   ├── db/       ← DB Adapter', tag: 'highlight' },
          { code: '│   ├── api/      ← HTTP Adapter', tag: 'highlight' },
          { code: '│   └── notify/   ← 알림 Adapter', tag: 'highlight' },
          { code: '└── main.py', tag: 'code' },
        ],
      },
      {
        title: '15인+ — 클린 / MSA',
        desc: '[클린/MSA] 대규모 팀, 장기 운영, 복잡한 도메인이면 클린 아키텍처 또는 마이크로서비스(MSA)를 고려한다. 하지만 이 단계는 팀의 결정이지, 혼자 판단할 문제가 아니다.',
        level: 3,
        pattern: '클린 아키텍처 / MSA',
        team: '15인+',
        rows: [
          { situation: '혼자 + 프로토타입/MVP', pattern: '플랫 구조', highlight: false },
          { situation: '2~5인 팀, 도메인 로직 생길 때', pattern: '3계층', highlight: false },
          { situation: '5~15인 팀, 외부 시스템 연동', pattern: '3계층 또는 헥사고날', highlight: false },
          { situation: '15인+ 장기 운영, 도메인 복잡', pattern: '클린 아키텍처 / MSA', highlight: true },
        ],
        codeLines: [
          { code: '# 이 단계는 팀의 결정', tag: 'label' },
          { code: '', tag: 'none' },
          { code: '# 클린 아키텍처:', tag: 'label' },
          { code: '#   Domain → UseCases → Adapters → Infra', tag: 'code' },
          { code: '', tag: 'none' },
          { code: '# MSA (마이크로서비스):', tag: 'label' },
          { code: '#   서비스별 독립 배포', tag: 'code' },
          { code: '#   API Gateway + 메시지 큐', tag: 'code' },
          { code: '', tag: 'none' },
          { code: '# 혼자 결정하지 말고 팀과 함께!', tag: 'label' },
        ],
      },
      {
        title: '결론 — 3계층부터 완벽하게',
        desc: '[주니어 가이드] 3계층을 완전히 이해하는 것이 먼저. 헥사고날/클린은 팀에서 "이 패턴 씁니다"라는 결정이 내려졌을 때 공부해도 늦지 않는다. 과설계보다 적정 설계가 실력이다.',
        level: 1,
        pattern: '3계층부터!',
        team: '주니어',
        rows: [
          { situation: '혼자 + 프로토타입/MVP', pattern: '플랫 구조', highlight: false },
          { situation: '2~5인 팀, 도메인 로직 생길 때', pattern: '3계층 ← 여기부터!', highlight: true },
          { situation: '5~15인 팀, 외부 시스템 연동', pattern: '3계층 또는 헥사고날', highlight: false },
          { situation: '15인+ 장기 운영, 도메인 복잡', pattern: '클린 아키텍처 / MSA', highlight: false },
        ],
        codeLines: [
          { code: '# 주니어 로드맵', tag: 'label' },
          { code: '', tag: 'none' },
          { code: '# 1단계: 플랫 구조로 첫 프로젝트', tag: 'code' },
          { code: '# 2단계: 3계층을 완전히 익히기', tag: 'highlight' },
          { code: '# 3단계: 팀에서 필요하면 헥사고날', tag: 'code' },
          { code: '# 4단계: 대규모면 클린/MSA', tag: 'code' },
          { code: '', tag: 'none' },
          { code: '# 과설계 < 적정 설계', tag: 'label' },
          { code: '# "있어 보이는 구조" < "동작하는 코드"', tag: 'label' },
        ],
      },
    ];

    const ROW_CLASS = { normal: 'bg-white border-slate-200 text-slate-600', highlight: 'bg-amber-50 border-amber-300 text-amber-800 font-bold' };
    const CODE_TAG_BG = { label: 'bg-slate-100', code: 'bg-white', highlight: 'bg-amber-50', none: 'bg-white' };
    const CODE_TAG_BORDER = { label: 'border-slate-300', code: 'border-transparent', highlight: 'border-amber-300', none: 'border-transparent' };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx >= STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => prev < STEPS.length - 1 ? prev + 1 : prev); };
      const handlePrev = () => setCurrentStepIdx(prev => (prev > 0 ? prev - 1 : prev));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => { if (!isPlaying) return; const id = setInterval(() => handleNextRef.current(), 3000); return () => clearInterval(id); }, [isPlaying]);
      useEffect(() => { const h = (e) => { if (e.key === 'ArrowRight') handleNextRef.current(); if (e.key === 'ArrowLeft') handlePrevRef.current(); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, []);
      const togglePlay = () => { if (isEnd) { setCurrentStepIdx(0); setIsPlaying(true); return; } setIsPlaying(prev => !prev); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm text-slate-500">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum V-4-3</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-xl md:text-2xl font-bold text-slate-800 mb-2">Chapter 5-11. 주니어가 언제 고민해도 되나</h1>
              <p className="text-slate-600 text-sm leading-relaxed">
                팀 규모와 프로젝트 복잡도에 따라 패턴을 고른다.
                주니어라면 <strong>3계층을 완전히 이해하는 것이 먼저</strong>.
                헥사고날/클린은 팀에서 필요할 때 공부해도 늦지 않는다.
              </p>
            </header>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
                <h2 className="text-sm font-bold text-slate-600">패턴 선택 기준표</h2>
                <div className="space-y-2">
                  {stepData.rows.map((row, idx) => (
                    <div key={idx} className={`p-3 rounded-lg border transition-all duration-300 flex items-center justify-between ${row.highlight ? ROW_CLASS.highlight : ROW_CLASS.normal}`}>
                      <span className="text-sm">{row.situation}</span>
                      <span className="text-xs font-bold">{row.pattern}</span>
                    </div>
                  ))}
                </div>
                <div className="p-4 rounded-lg border bg-blue-50 border-blue-200 text-blue-800 text-sm leading-relaxed">
                  <div className="font-bold mb-1">{stepData.title}</div>{stepData.desc}
                </div>
              </div>
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between items-center">
                  <span>{stepData.pattern} — {stepData.team}</span>
                  <span className="text-slate-500">Step {currentStepIdx + 1} / {STEPS.length}</span>
                </div>
                <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
                  {stepData.codeLines.map((line, idx) => (
                    <div key={idx} className={`px-4 py-0.5 whitespace-pre border-l-4 transition-all duration-300 ${CODE_TAG_BG[line.tag]} ${CODE_TAG_BORDER[line.tag]}`}>
                      <span className="inline-block w-4 text-right mr-3 text-slate-400 select-none">{idx + 1}</span>{line.code || '\u00A0'}
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div className="flex items-center justify-center gap-3 flex-wrap">
              <button onClick={() => handlePrevRef.current()} disabled={currentStepIdx === 0} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="이전 단계">← 이전</button>
              <button onClick={togglePlay} className={`px-6 py-2 rounded-lg font-bold text-sm transition-colors ${isPlaying ? 'bg-amber-500 text-white hover:bg-amber-600' : 'bg-emerald-600 text-white hover:bg-emerald-700'}`} aria-label={isPlaying ? '정지' : (isEnd ? '처음부터 재생' : '자동 실행')}>{isPlaying ? '⏸ 정지' : (isEnd ? '⟳ 처음부터' : '▶ 자동 실행')}</button>
              <button onClick={() => handleNextRef.current()} disabled={isEnd} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="다음 단계">다음 →</button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>
            <footer className="text-center text-xs text-slate-400 py-4">FastAPI 인터랙티브 학습 — Chapter 5-11. 패턴 선택 가이드 | 키보드 ← → 지원</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
