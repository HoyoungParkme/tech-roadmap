<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 인터랙티브 학습 — Chapter 5-1. 스파게티 코드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ─────────────────────────────────────────
       1. 단계별 코드 스냅샷
       각 단계에서 main.py가 어떻게 변하는지 보여준다.
       코드 줄마다 "책임 태그"를 붙여서 좌측 시각화와 연동.
    ───────────────────────────────────────── */

    // 책임 종류 (색상 매핑용)
    // route = 라우팅, calc = 계산, db = DB, email = 이메일, bug = 버그
    const TAG = { route: 'route', calc: 'calc', db: 'db', email: 'email', bug: 'bug', none: 'none' };

    const SNAPSHOTS = [
      // ── Step 0: 간단한 코드 ──
      {
        lines: [
          { code: 'from fastapi import FastAPI',          tag: TAG.none },
          { code: '',                                      tag: TAG.none },
          { code: 'app = FastAPI()',                        tag: TAG.none },
          { code: '',                                      tag: TAG.none },
          { code: '@app.post("/orders")',                   tag: TAG.route },
          { code: 'def create_order(item: str, qty: int):', tag: TAG.route },
          { code: '    db.save({"item": item, "qty": qty})', tag: TAG.db },
          { code: '    return {"status": "ok"}',            tag: TAG.route },
        ],
      },
      // ── Step 1: 계산 로직 추가 ──
      {
        lines: [
          { code: 'from fastapi import FastAPI',           tag: TAG.none },
          { code: '',                                       tag: TAG.none },
          { code: 'app = FastAPI()',                         tag: TAG.none },
          { code: '',                                       tag: TAG.none },
          { code: '@app.post("/orders")',                    tag: TAG.route },
          { code: 'def create_order(item: str, qty: int):', tag: TAG.route },
          { code: '    price = get_price(item)',             tag: TAG.calc },
          { code: '    total = price * qty',                 tag: TAG.calc },
          { code: '    if total > 100000:',                  tag: TAG.calc },
          { code: '        total *= 0.9  # 10% 할인',       tag: TAG.calc },
          { code: '    db.save({"item": item, "total": total})', tag: TAG.db },
          { code: '    return {"status": "ok", "total": total}', tag: TAG.route },
        ],
      },
      // ── Step 2: 이메일 전송까지 ──
      {
        lines: [
          { code: 'from fastapi import FastAPI',            tag: TAG.none },
          { code: 'import smtplib',                          tag: TAG.email },
          { code: '',                                        tag: TAG.none },
          { code: 'app = FastAPI()',                          tag: TAG.none },
          { code: '',                                        tag: TAG.none },
          { code: '@app.post("/orders")',                     tag: TAG.route },
          { code: 'def create_order(item: str, qty: int):', tag: TAG.route },
          { code: '    price = get_price(item)',              tag: TAG.calc },
          { code: '    total = price * qty',                  tag: TAG.calc },
          { code: '    if total > 100000:',                   tag: TAG.calc },
          { code: '        total *= 0.9  # 10% 할인',        tag: TAG.calc },
          { code: '    db.save({"item": item, "total": total})', tag: TAG.db },
          { code: '    db.update_stock(item, -qty)',          tag: TAG.db },
          { code: '    msg = f"주문 완료: {item} x {qty}"',   tag: TAG.email },
          { code: '    smtp = smtplib.SMTP("mail.co")',       tag: TAG.email },
          { code: '    smtp.send(user.email, msg)',           tag: TAG.email },
          { code: '    return {"status": "ok", "total": total}', tag: TAG.route },
        ],
      },
      // ── Step 3: 버그 발생 ──
      {
        lines: [
          { code: 'from fastapi import FastAPI',            tag: TAG.none },
          { code: 'import smtplib',                          tag: TAG.email },
          { code: '',                                        tag: TAG.none },
          { code: 'app = FastAPI()',                          tag: TAG.none },
          { code: '',                                        tag: TAG.none },
          { code: '@app.post("/orders")',                     tag: TAG.route },
          { code: 'def create_order(item: str, qty: int):', tag: TAG.route },
          { code: '    price = get_price(item)',              tag: TAG.calc },
          { code: '    total = price * qty',                  tag: TAG.calc },
          { code: '    if total > 100000:',                   tag: TAG.calc },
          { code: '        total *= 0.9  # 10% 할인',        tag: TAG.calc },
          { code: '    db.save({"item": item, "total": total})', tag: TAG.db },
          { code: '    db.update_stock(item, -qty)',          tag: TAG.bug },
          { code: '    msg = f"주문 완료: {item} x {qty}"',   tag: TAG.email },
          { code: '    smtp = smtplib.SMTP("mail.co")',       tag: TAG.email },
          { code: '    smtp.send(user.email, msg)',           tag: TAG.email },
          { code: '    return {"status": "ok", "total": total}', tag: TAG.route },
        ],
      },
      // ── Step 4: 수정 → 회귀 ──
      {
        lines: [
          { code: 'from fastapi import FastAPI',            tag: TAG.none },
          { code: 'import smtplib',                          tag: TAG.email },
          { code: '',                                        tag: TAG.none },
          { code: 'app = FastAPI()',                          tag: TAG.none },
          { code: '',                                        tag: TAG.none },
          { code: '@app.post("/orders")',                     tag: TAG.route },
          { code: 'def create_order(item: str, qty: int):', tag: TAG.route },
          { code: '    price = get_price(item)',              tag: TAG.calc },
          { code: '    total = price * qty',                  tag: TAG.calc },
          { code: '    if total > 100000:',                   tag: TAG.calc },
          { code: '        total *= 0.9  # 10% 할인',        tag: TAG.calc },
          { code: '    stock = db.get_stock(item)',           tag: TAG.db },
          { code: '    if stock < qty:',                      tag: TAG.db },
          { code: '        raise HTTPException(400)',         tag: TAG.bug },
          { code: '    db.save({"item": item, "total": total})', tag: TAG.db },
          { code: '    db.update_stock(item, -qty)',          tag: TAG.db },
          { code: '    msg = f"주문 완료: {item} x {qty}"',   tag: TAG.email },
          { code: '    smtp = smtplib.SMTP("mail.co")',       tag: TAG.email },
          { code: '    smtp.send(user.email, msg)',           tag: TAG.bug },
          { code: '    return {"status": "ok", "total": total}', tag: TAG.route },
        ],
      },
    ];

    const STEPS = [
      {
        title: '간단한 코드',
        desc: '[시작] main.py 하나에 라우터 1개, DB 저장 1줄. 이 정도는 아무 문제 없다. 코드가 짧아서 한눈에 읽힌다.',
        responsibilities: ['route', 'db'],
        problemLevel: 0,
      },
      {
        title: '함수가 비대해진다',
        desc: '[기능 추가] 가격 계산 + 할인 로직이 같은 함수 안에 들어왔다. 함수가 2가지 일을 하기 시작한다.',
        responsibilities: ['route', 'calc', 'db'],
        problemLevel: 1,
      },
      {
        title: '이메일 전송까지',
        desc: '[또 추가] 이메일 전송 로직까지 같은 함수에! 한 함수가 라우팅 + 계산 + DB + 이메일 = 4가지 책임을 진다. 이것이 스파게티 코드다.',
        responsibilities: ['route', 'calc', 'db', 'email'],
        problemLevel: 2,
      },
      {
        title: '버그 발생 — 어디가 문제?',
        desc: '[버그] 재고가 마이너스로 떨어지는 버그 발생! 그런데 함수가 17줄이나 되니 어디서 문제인지 찾으려면 전체를 읽어야 한다.',
        responsibilities: ['route', 'calc', 'db', 'email'],
        problemLevel: 3,
      },
      {
        title: '수정하면 다른 곳이 깨진다',
        desc: '[회귀] 재고 체크를 추가했더니, 이메일 전송 순서가 꼬여서 "주문 완료" 메일이 실패 시에도 발송된다. 한 곳을 고치면 다른 곳이 깨지는 전형적인 스파게티.',
        responsibilities: ['route', 'calc', 'db', 'email'],
        problemLevel: 4,
      },
    ];

    /* ─────────────────────────────────────────
       2. 색상 매핑 (Tailwind 정적 클래스)
    ───────────────────────────────────────── */

    const TAG_BG = {
      route: 'bg-blue-100',
      calc:  'bg-amber-100',
      db:    'bg-emerald-100',
      email: 'bg-purple-100',
      bug:   'bg-red-200',
      none:  'bg-slate-50',
    };
    const TAG_BORDER = {
      route: 'border-blue-300',
      calc:  'border-amber-300',
      db:    'border-emerald-300',
      email: 'border-purple-300',
      bug:   'border-red-400',
      none:  'border-slate-200',
    };
    const TAG_TEXT = {
      route: 'text-blue-700',
      calc:  'text-amber-700',
      db:    'text-emerald-700',
      email: 'text-purple-700',
      bug:   'text-red-700',
      none:  'text-slate-500',
    };
    const TAG_LABEL = {
      route: '라우팅',
      calc:  '계산',
      db:    'DB',
      email: '이메일',
      bug:   '버그!',
      none:  '',
    };

    const PROBLEM_BAR_CLASS = {
      0: 'bg-emerald-400',
      1: 'bg-yellow-400',
      2: 'bg-amber-400',
      3: 'bg-orange-500',
      4: 'bg-red-500',
    };
    const PROBLEM_TEXT_CLASS = {
      0: 'text-emerald-700',
      1: 'text-yellow-700',
      2: 'text-amber-700',
      3: 'text-orange-700',
      4: 'text-red-700',
    };
    const PROBLEM_LABEL = {
      0: '깨끗함',
      1: '주의',
      2: '복잡해짐',
      3: '위험',
      4: '스파게티!',
    };

    /* ─────────────────────────────────────────
       3. 앱 컴포넌트
    ───────────────────────────────────────── */

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const stepData = STEPS[currentStepIdx];
      const snapshot = SNAPSHOTS[currentStepIdx];
      const isEnd = currentStepIdx >= STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => prev < STEPS.length - 1 ? prev + 1 : prev); };
      const handlePrev = () => setCurrentStepIdx(prev => (prev > 0 ? prev - 1 : prev));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => { if (!isPlaying) return; const id = setInterval(() => handleNextRef.current(), 2500); return () => clearInterval(id); }, [isPlaying]);
      useEffect(() => { const h = (e) => { if (e.key === 'ArrowRight') handleNextRef.current(); if (e.key === 'ArrowLeft') handlePrevRef.current(); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, []);
      const togglePlay = () => { if (isEnd) { setCurrentStepIdx(0); setIsPlaying(true); return; } setIsPlaying(prev => !prev); };

      // 책임 블록 카운트
      const tagCounts = {};
      snapshot.lines.forEach(l => { if (l.tag !== TAG.none) tagCounts[l.tag] = (tagCounts[l.tag] || 0) + 1; });

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm text-slate-500">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum V-1-1</span>
            </nav>

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-xl md:text-2xl font-bold text-slate-800 mb-2">Chapter 5-1. 큰 프로젝트가 왜 망가지는가</h1>
              <p className="text-slate-600 text-sm leading-relaxed">
                처음엔 <code className="text-xs bg-slate-100 px-1 rounded">main.py</code> 하나에 모든 코드를 넣어도 괜찮다.
                그런데 기능이 늘수록 한 함수가 <strong>"요청 + 계산 + DB + 이메일"</strong>을 동시에 맡게 된다.
                이 상태를 <strong>스파게티 코드</strong>라고 부른다 — 면발이 엉켜 어느 가닥을 잡아당겨야 할지 모르는 것처럼.
              </p>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              {/* ── 좌측: 책임 블록 시각화 ── */}
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
                <h2 className="text-sm font-bold text-slate-600">책임 분포 — create_order()</h2>

                {/* 엉킴 수준 바 */}
                <div className="space-y-1">
                  <div className="flex items-center justify-between text-xs font-bold">
                    <span className={PROBLEM_TEXT_CLASS[stepData.problemLevel]}>엉킴 수준: {PROBLEM_LABEL[stepData.problemLevel]}</span>
                    <span className="text-slate-400">Step {currentStepIdx + 1} / {STEPS.length}</span>
                  </div>
                  <div className="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                    <div
                      className={`h-full rounded-full transition-all duration-500 ${PROBLEM_BAR_CLASS[stepData.problemLevel]}`}
                      style={{ width: `${(stepData.problemLevel / 4) * 100}%` }}
                    />
                  </div>
                </div>

                {/* 책임 블록 */}
                <div className="space-y-2">
                  {['route', 'calc', 'db', 'email'].map(tag => {
                    const count = tagCounts[tag] || 0;
                    if (count === 0 && !stepData.responsibilities.includes(tag)) return null;
                    const isActive = stepData.responsibilities.includes(tag);
                    return (
                      <div key={tag} className={`flex items-center gap-3 p-2 rounded-lg border transition-all duration-300 ${isActive ? `${TAG_BG[tag]} ${TAG_BORDER[tag]}` : 'bg-slate-50 border-slate-200 opacity-40'}`}>
                        <span className={`text-xs font-bold w-14 ${isActive ? TAG_TEXT[tag] : 'text-slate-400'}`}>{TAG_LABEL[tag]}</span>
                        <div className="flex gap-1 flex-wrap flex-1">
                          {Array.from({ length: count }).map((_, i) => (
                            <div key={i} className={`w-5 h-5 rounded transition-all duration-300 ${isActive ? TAG_BG[tag] + ' border ' + TAG_BORDER[tag] : 'bg-slate-100 border border-slate-200'}`} />
                          ))}
                          {count === 0 && <span className="text-xs text-slate-300">—</span>}
                        </div>
                        <span className={`text-xs font-mono font-bold ${isActive ? TAG_TEXT[tag] : 'text-slate-300'}`}>{count}줄</span>
                      </div>
                    );
                  })}
                </div>

                {/* 버그 경고 (Step 3~4) */}
                {stepData.problemLevel >= 3 && (
                  <div className="p-3 rounded-lg border-2 border-red-300 bg-red-50 text-red-700 text-sm font-bold animate-pulse">
                    {stepData.problemLevel === 3 && '버그 발견! 17줄 중 어디가 문제인지 전체를 읽어야 한다'}
                    {stepData.problemLevel === 4 && '한 곳을 고쳤더니 다른 곳이 깨졌다 — 이것이 스파게티 코드'}
                  </div>
                )}

                {/* 설명 */}
                <div className="p-4 rounded-lg border bg-blue-50 border-blue-200 text-blue-800 text-sm leading-relaxed">
                  <div className="font-bold mb-1">{stepData.title}</div>
                  {stepData.desc}
                </div>
              </div>

              {/* ── 우측: 코드 뷰어 ── */}
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between items-center">
                  <span>main.py — 모든 것이 하나의 파일</span>
                  <span className="text-slate-500">{snapshot.lines.length}줄</span>
                </div>
                <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
                  {snapshot.lines.map((line, idx) => {
                    const bgClass = `${TAG_BG[line.tag]} border-l-4 ${TAG_BORDER[line.tag]}`;
                    return (
                      <div key={idx} className={`px-4 py-0.5 whitespace-pre transition-all duration-300 ${bgClass}`}>
                        <span className="inline-block w-6 text-right mr-3 text-slate-400 select-none">{idx + 1}</span>
                        {line.code || '\u00A0'}
                        {line.tag !== TAG.none && (
                          <span className={`ml-2 text-xs font-bold ${TAG_TEXT[line.tag]}`}>← {TAG_LABEL[line.tag]}</span>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* ── 컨트롤 ── */}
            <div className="flex items-center justify-center gap-3 flex-wrap">
              <button onClick={() => handlePrevRef.current()} disabled={currentStepIdx === 0} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="이전 단계">← 이전</button>
              <button onClick={togglePlay} className={`px-6 py-2 rounded-lg font-bold text-sm transition-colors ${isPlaying ? 'bg-amber-500 text-white hover:bg-amber-600' : 'bg-emerald-600 text-white hover:bg-emerald-700'}`} aria-label={isPlaying ? '정지' : (isEnd ? '처음부터 재생' : '자동 실행')}>{isPlaying ? '⏸ 정지' : (isEnd ? '⟳ 처음부터' : '▶ 자동 실행')}</button>
              <button onClick={() => handleNextRef.current()} disabled={isEnd} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="다음 단계">다음 →</button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <footer className="text-center text-xs text-slate-400 py-4">FastAPI 인터랙티브 학습 — Chapter 5-1. 스파게티 코드 | 키보드 ← → 지원</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
