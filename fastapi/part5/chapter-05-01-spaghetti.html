      },
      {

        desc: '이제 정리하자. 스파게티가 만든 4가지 문제 — 한 함수에 1000줄, 강결합, 테스트 불가, 변경 비용 폭증 — 은 모두 한 가지 원인에서 출발한다: "책임이 한 곳에 모여 있다". 그래서 다음 챕터들은 모두 "책임을 어떻게 쪼갤 것인가"에 대한 답이다. MVC 는 입력/처리/출력으로, Layered 는 Controller/Service/Repository 로, Hexagonal 은 도메인/포트/어댑터로. 패턴마다 쪼개는 기준이 다를 뿐 목적은 같다.',
        blocks: [

          { kind: 'good', label: 'services/order.py', lines: '120줄', badge: '비즈니스' },

          { kind: 'good', label: 'integrations/slack.py', lines: '30줄', badge: '슬랙만' },
        ],
        couplings: [],
        metric: { totalLines: 280, funcCount: 12, depCount: 0, testable: '가능 (모듈별)' },
        verdict: {

            '- 테스트 불가 → Service 단위 mock 1회로 단위 테스트 가능',
            '- 변경 비용 → 변경이 한 모듈로 국한 (영향 예측 가능)',

            '5-9  Hexagonal',
            '5-10 Clean Architecture',
            '5-11 When (언제 어떤 패턴을 쓰나)',
            '5-12 Background Tasks',
            '5-13 Celery',
            '5-14 Jinja2',
            '5-15 Static Files',
            '```',
            '',
            '> 핵심: **5-6 Layered 만 익혀도 80% 의 프로젝트는 행복해진다.**',
          ],
          highlight: [12, 13, 14, 15, 16, 17, 18, 25, 26, 27, 28, 29, 41, 42, 43],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤
    // ─────────────────────────────────────────────────────
    const KIND_STYLE = {
      route: { bg: 'bg-indigo-50',  border: 'border-indigo-300', text: 'text-indigo-800', badge: 'bg-indigo-200 text-indigo-800' },
      mix:   { bg: 'bg-rose-50',    border: 'border-rose-400',   text: 'text-rose-800',   badge: 'bg-rose-200 text-rose-800' },
      ext:   { bg: 'bg-slate-100',  border: 'border-slate-300',  text: 'text-slate-700',  badge: 'bg-slate-200 text-slate-700' },
      fail:  { bg: 'bg-red-50',     border: 'border-red-400',    text: 'text-red-800',    badge: 'bg-red-200 text-red-800' },
      risk:  { bg: 'bg-amber-50',   border: 'border-amber-400',  text: 'text-amber-800',  badge: 'bg-amber-200 text-amber-800' },
      good:  { bg: 'bg-emerald-50', border: 'border-emerald-300',text: 'text-emerald-800',badge: 'bg-emerald-200 text-emerald-800' },
    };

    function BlockCard({ item }) {
      const s = KIND_STYLE[item.kind] || KIND_STYLE.route;
      return (
        <div className={`rounded-lg border ${s.bg} ${s.border} px-3 py-2 flex items-center justify-between`}>
          <div className="flex items-center gap-2 min-w-0">
            <span className={`text-xs font-mono font-bold ${s.text} truncate`}>{item.label}</span>
            <span className={`text-[10px] ${s.text} opacity-70 whitespace-nowrap`}>{item.lines}</span>
          </div>
          <span className={`text-[10px] px-2 py-0.5 rounded ${s.badge} whitespace-nowrap ml-2`}>{item.badge}</span>
        </div>
      );
    }

    function MetricBar({ metric }) {
      if (!metric) return null;
      const dangerous = metric.testable === '불가' || (typeof metric.testable === 'string' && metric.testable.startsWith('불가'));
      return (
        <div className="mt-3 grid grid-cols-4 gap-2">
          <div className="rounded border border-indigo-200 bg-white px-2 py-1.5 text-center">
            <div className="text-[10px] text-indigo-700">총 라인</div>
            <div className="text-sm font-bold text-indigo-900">{metric.totalLines}</div>
          </div>
          <div className="rounded border border-indigo-200 bg-white px-2 py-1.5 text-center">
            <div className="text-[10px] text-indigo-700">함수 수</div>
            <div className="text-sm font-bold text-indigo-900">{metric.funcCount}</div>
          </div>
          <div className="rounded border border-indigo-200 bg-white px-2 py-1.5 text-center">
            <div className="text-[10px] text-indigo-700">외부 의존</div>
            <div className="text-sm font-bold text-indigo-900">{metric.depCount}</div>
          </div>
          <div className={`rounded border px-2 py-1.5 text-center ${dangerous ? 'border-rose-300 bg-rose-50' : 'border-emerald-300 bg-emerald-50'}`}>
            <div className={`text-[10px] ${dangerous ? 'text-rose-700' : 'text-emerald-700'}`}>테스트</div>
            <div className={`text-xs font-bold ${dangerous ? 'text-rose-900' : 'text-emerald-900'}`}>{metric.testable}</div>
          </div>
        </div>
      );
    }

    function CouplingBox({ couplings }) {
      if (!couplings || couplings.length === 0) return null;
      return (
        <div className="mt-3 rounded-lg border border-rose-300 bg-rose-50 p-2">
          <div className="text-[10px] font-bold text-rose-800 mb-1">⚠ 강결합 의존선</div>
          <div className="flex flex-wrap gap-1.5">
            {couplings.map((c, i) => (
              <span key={i} className="text-[10px] px-2 py-0.5 rounded bg-white border border-rose-200 text-rose-700 font-mono">
                {c.from} → {c.to}
              </span>
            ))}
          </div>
        </div>
      );
    }

    function VerdictBox({ verdict }) {
      if (!verdict) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-indigo-400 bg-indigo-50 p-3">
          <div className="text-xs font-bold text-indigo-800 mb-2">⚡ {verdict.title}</div>
          <ul className="space-y-1">
            {verdict.actions.map((a, i) => (
              <li key={i} className="text-xs text-indigo-900 flex gap-2">
                <span className="text-indigo-500">▸</span>
                <span>{a}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">main.py 구조 시각화</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 코드 구조</span>
          </div>
          <div className="space-y-2">
            {state.blocks.map((it, i) => (
              <BlockCard key={i} item={it} />
            ))}
          </div>
          <CouplingBox couplings={state.couplings} />
          <MetricBar metric={state.metric} />
          <VerdictBox verdict={state.verdict} />
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">5</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter 5-1. 스파게티 코드 — 왜 패턴이 필요한가</h1>
                <p className="text-sm text-indigo-800/80">한 함수 1000줄 → 결합도 폭증 → 테스트 불가 → 변경 비용 폭증 → 패턴 필요성. 5단계로 추적</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                스파게티의 4가지 비극(긴 함수 · 강결합 · 테스트 불가 · 변경 폭발)은 모두 "책임이 한 곳에 모임" 이 원인이다. 다음 챕터(5-2 Template)부터는 책임을 쪼개는 방법을 패턴별로 배운다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['스파게티', '강결합', '테스트가능성', '변경비용', '책임분리', 'SRP', 'MVC', 'Layered'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="../index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./chapter-05-02-template.html" className="underline hover:no-underline">다음: 5-2 Template 패턴 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
