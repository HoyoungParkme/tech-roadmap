<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 인터랙티브 학습 — Chapter 5-3. MVC 패턴</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ─────────────────────────────────────────
       1. MVC 흐름 단계 정의
    ───────────────────────────────────────── */

    // 각 블록 상태: idle | active | done
    const STEPS = [
      {
        title: '요청 도착',
        desc: '[사용자 → Controller] 사용자가 "상품 목록 보여줘" 요청을 보낸다. Controller(매니저)가 이 요청을 제일 먼저 받는다.',
        controller: 'active', model: 'idle', view: 'idle',
        arrow: 'user-to-controller',
        codeHighlight: 0,
      },
      {
        title: 'Model 조회',
        desc: '[Controller → Model] Controller가 Model(창고+재고관리)에 "상품 데이터 줘" 지시한다. Model이 DB에서 데이터를 꺼낸다.',
        controller: 'active', model: 'active', view: 'idle',
        arrow: 'controller-to-model',
        codeHighlight: 1,
      },
      {
        title: '데이터 반환',
        desc: '[Model → Controller] Model이 상품 리스트를 Controller에 돌려준다. Controller는 아직 데이터를 가공하지 않는다 — 그건 Model의 일이다.',
        controller: 'active', model: 'done', view: 'idle',
        arrow: 'model-to-controller',
        codeHighlight: 2,
      },
      {
        title: 'View 렌더링',
        desc: '[Controller → View] Controller가 데이터를 View(인테리어+메뉴판)에 넘긴다. View가 사용자에게 보여줄 화면을 만든다.',
        controller: 'done', model: 'done', view: 'active',
        arrow: 'controller-to-view',
        codeHighlight: 3,
      },
      {
        title: '응답 — 역할 분리의 핵심',
        desc: '[View → 사용자] 완성된 화면이 사용자에게 돌아간다. 핵심: 화면(View)을 바꿔도 데이터(Model)에 손댈 필요가 없다. 이것이 역할 분리의 장점이다.',
        controller: 'done', model: 'done', view: 'done',
        arrow: 'view-to-user',
        codeHighlight: 4,
      },
    ];

    const CODE_SECTIONS = [
      { label: 'Controller (매니저)', tag: 'controller', lines: [
        '# controller/product_controller.py',
        '@app.get("/products")',
        'def list_products():',
        '    products = product_model.get_all()  # Model에 요청',
        '    return render(products)              # View에 전달',
      ]},
      { label: 'Model (창고)', tag: 'model', lines: [
        '# model/product_model.py',
        'def get_all():',
        '    return db.query("SELECT * FROM products")',
        '    # 데이터 + 비즈니스 규칙만 담당',
      ]},
      { label: 'View (메뉴판)', tag: 'view', lines: [
        '# view/product_view.html',
        '<ul>',
        '  {% for p in products %}',
        '    <li>{{ p.name }} — {{ p.price }}원</li>',
        '  {% endfor %}',
        '</ul>',
      ]},
    ];

    /* ─────────────────────────────────────────
       2. 색상 매핑 (Tailwind 정적)
    ───────────────────────────────────────── */

    const BLOCK_CLASS = {
      controller: { idle: 'bg-slate-100 border-slate-300 text-slate-500', active: 'bg-blue-100 border-blue-400 text-blue-700 ring-2 ring-blue-300', done: 'bg-blue-50 border-blue-300 text-blue-600' },
      model:      { idle: 'bg-slate-100 border-slate-300 text-slate-500', active: 'bg-emerald-100 border-emerald-400 text-emerald-700 ring-2 ring-emerald-300', done: 'bg-emerald-50 border-emerald-300 text-emerald-600' },
      view:       { idle: 'bg-slate-100 border-slate-300 text-slate-500', active: 'bg-violet-100 border-violet-400 text-violet-700 ring-2 ring-violet-300', done: 'bg-violet-50 border-violet-300 text-violet-600' },
    };

    const BLOCK_LABEL = { controller: 'Controller', model: 'Model', view: 'View' };
    const BLOCK_DESC = { controller: '매니저 — 요청 수신, 조율', model: '창고 — 데이터 + 비즈니스 규칙', view: '메뉴판 — 화면 렌더링' };

    const ARROW_CLASS = {
      'user-to-controller':  'text-blue-500',
      'controller-to-model': 'text-emerald-500',
      'model-to-controller': 'text-emerald-500',
      'controller-to-view':  'text-violet-500',
      'view-to-user':        'text-violet-500',
    };
    const ARROW_LABEL = {
      'user-to-controller':  '사용자 → Controller',
      'controller-to-model': 'Controller → Model',
      'model-to-controller': 'Model → Controller',
      'controller-to-view':  'Controller → View',
      'view-to-user':        'View → 사용자',
    };

    const CODE_TAG_BG = {
      controller: 'bg-blue-50',
      model: 'bg-emerald-50',
      view: 'bg-violet-50',
    };
    const CODE_TAG_BORDER = {
      controller: 'border-blue-200',
      model: 'border-emerald-200',
      view: 'border-violet-200',
    };

    /* ─────────────────────────────────────────
       3. 앱 컴포넌트
    ───────────────────────────────────────── */

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx >= STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => prev < STEPS.length - 1 ? prev + 1 : prev); };
      const handlePrev = () => setCurrentStepIdx(prev => (prev > 0 ? prev - 1 : prev));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => { if (!isPlaying) return; const id = setInterval(() => handleNextRef.current(), 2500); return () => clearInterval(id); }, [isPlaying]);
      useEffect(() => { const h = (e) => { if (e.key === 'ArrowRight') handleNextRef.current(); if (e.key === 'ArrowLeft') handlePrevRef.current(); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, []);
      const togglePlay = () => { if (isEnd) { setCurrentStepIdx(0); setIsPlaying(true); return; } setIsPlaying(prev => !prev); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm text-slate-500">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum V-2-1</span>
            </nav>

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-xl md:text-2xl font-bold text-slate-800 mb-2">Chapter 5-3. MVC — Model, View, Controller</h1>
              <p className="text-slate-600 text-sm leading-relaxed">
                MVC는 가장 오래되고 넓게 쓰이는 패턴이다.
                <strong>Model</strong>(창고), <strong>View</strong>(메뉴판), <strong>Controller</strong>(매니저) — 세 역할이 분리되면
                화면을 바꿔도 비즈니스 로직에 손댈 필요가 없다.
              </p>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              {/* ── 좌측: MVC 다이어그램 ── */}
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
                <h2 className="text-sm font-bold text-slate-600">MVC 흐름</h2>

                {/* 현재 화살표 */}
                <div className={`text-center text-sm font-bold py-2 rounded-lg bg-slate-50 border border-slate-200 transition-all duration-300 ${ARROW_CLASS[stepData.arrow]}`}>
                  {ARROW_LABEL[stepData.arrow]}
                </div>

                {/* 3블록 */}
                <div className="space-y-3">
                  {['controller', 'model', 'view'].map(role => (
                    <div key={role} className={`p-4 rounded-lg border-2 transition-all duration-300 ${BLOCK_CLASS[role][stepData[role]]}`}>
                      <div className="flex items-center justify-between">
                        <div className="font-bold text-lg">{BLOCK_LABEL[role]}</div>
                        <div className="text-xs font-medium opacity-70">{BLOCK_DESC[role]}</div>
                      </div>
                    </div>
                  ))}
                </div>

                {/* 설명 */}
                <div className="p-4 rounded-lg border bg-blue-50 border-blue-200 text-blue-800 text-sm leading-relaxed">
                  <div className="font-bold mb-1">{stepData.title}</div>
                  {stepData.desc}
                </div>
              </div>

              {/* ── 우측: 코드 뷰어 ── */}
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between items-center">
                  <span>MVC 각 역할의 코드</span>
                  <span className="text-slate-500">Step {currentStepIdx + 1} / {STEPS.length}</span>
                </div>
                <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
                  {CODE_SECTIONS.map((section, sIdx) => {
                    const isHighlighted = stepData.codeHighlight === sIdx || (stepData.codeHighlight === STEPS[STEPS.length - 1].codeHighlight);
                    return (
                      <div key={sIdx} className={`border-b last:border-b-0 ${isHighlighted ? CODE_TAG_BG[section.tag] : 'bg-white'}`}>
                        <div className={`px-4 py-1 text-xs font-bold border-l-4 ${isHighlighted ? CODE_TAG_BORDER[section.tag] + ' ' + CODE_TAG_BG[section.tag] : 'border-transparent text-slate-400'}`}>
                          {section.label}
                        </div>
                        {section.lines.map((line, lIdx) => (
                          <div key={lIdx} className={`px-4 py-0.5 whitespace-pre border-l-4 transition-all duration-300 ${isHighlighted ? CODE_TAG_BORDER[section.tag] : 'border-transparent'}`}>
                            <span className="inline-block w-4 text-right mr-3 text-slate-400 select-none">{lIdx + 1}</span>
                            {line || '\u00A0'}
                          </div>
                        ))}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* ── 컨트롤 ── */}
            <div className="flex items-center justify-center gap-3 flex-wrap">
              <button onClick={() => handlePrevRef.current()} disabled={currentStepIdx === 0} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="이전 단계">← 이전</button>
              <button onClick={togglePlay} className={`px-6 py-2 rounded-lg font-bold text-sm transition-colors ${isPlaying ? 'bg-amber-500 text-white hover:bg-amber-600' : 'bg-emerald-600 text-white hover:bg-emerald-700'}`} aria-label={isPlaying ? '정지' : (isEnd ? '처음부터 재생' : '자동 실행')}>{isPlaying ? '⏸ 정지' : (isEnd ? '⟳ 처음부터' : '▶ 자동 실행')}</button>
              <button onClick={() => handleNextRef.current()} disabled={isEnd} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="다음 단계">다음 →</button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <footer className="text-center text-xs text-slate-400 py-4">FastAPI 인터랙티브 학습 — Chapter 5-3. MVC 패턴 | 키보드 ← → 지원</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
