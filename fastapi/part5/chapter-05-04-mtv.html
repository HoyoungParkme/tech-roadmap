          { label: '⑤ 응답', from: 'view', to: 'browser', note: 'HttpResponse(html)', active: true },
        ],
        compare: false,
        keyPoint: 'URL → View → Model → Template → Response. Django 화면 요청의 기본 5단계.',
        code: {
          lang: 'python',
          filename: 'flow.md',
          lines: [
            '"""',
            'Step 5. Django flow — 한 번의 요청을 5단계로 추적',
            '',
            '시나리오 : 사용자가 브라우저에서 /articles/ 를 연다',
            '결과     : 게시글 목록 HTML 이 화면에 나타난다',
            '"""',
            '',
            '# ─────────────────────────────────────────────',
            '# ① URLconf — 어떤 View 에 보낼지 정한다',
            '# 파일 : blog/urls.py',
            '# ─────────────────────────────────────────────',
            'from django.urls import path',
            'from . import views',
            '',
            'urlpatterns = [',
            '    path("articles/", views.article_list, name="article-list"),',
            '    path("articles/<int:pk>/", views.article_detail, name="article-detail"),',
            ']',
            '',
            '# 동작: 요청 URL "/articles/" 와 패턴 "articles/" 가 매치',
            '#       → views.article_list 가 호출된다',
            '',
            '',
            '# ─────────────────────────────────────────────',
            '# ② View — 요청을 받아 조율한다',
            '# 파일 : blog/views.py',
            '# ─────────────────────────────────────────────',
            'def article_list(request):',
            '    # ③ Model 조회 (DB 에서 데이터를 꺼낸다)',
            '    articles = Article.objects.all()',
            '',
            '    # context 만들기 (Template 에 전달할 데이터)',
            '    context = {"articles": articles, "site_name": "My Blog"}',
            '',
            '    # ④ Template 렌더 (HTML 문자열 생성)',
            '    return render(request, "blog/list.html", context)',
            '    # ⑤ render() 는 HttpResponse 객체를 반환 → 브라우저로 전송',
            '',
            '',
            '# ─────────────────────────────────────────────',
            '# 흐름 요약',
            '# ─────────────────────────────────────────────',
            '#  브라우저   →  URLconf   →  View   →  Model      →  Template   →  브라우저',
            '#  (GET)         (매칭)      (조율)    (DB 조회)     (HTML 렌더)    (응답)',
            '#',
            '#  대응 (MVC):',
            '#  Client     →  Router    →  Ctrl   →  Model      →  View       →  Client',
            '',
            '',
            '# ─────────────────────────────────────────────',
            '# FastAPI 라면 어떻게 다른가',
            '# ─────────────────────────────────────────────',
            '#  - URLconf 대신 @app.get("/articles") 데코레이터로 매핑',
            '#  - View 함수 = path operation function',
            '#  - Template 단계 없음 → 보통 Pydantic 모델 JSON 직렬화',
            '#  - Model 은 ORM(SQLAlchemy) 또는 Pydantic 둘 다 가능',
            '#',
            '#  즉 MTV 는 Django 의 전용 용어이고,',
            '#  FastAPI 에서는 Router(=View) / Service / Repository 로 부른다.',
            '#',
            '#  다음 챕터 5-5 에서 이 차이를 본격적으로 본다.',
          ],
          highlight: [11, 12, 13, 14, 15, 16, 17, 27, 28, 29, 30, 31, 32, 33, 34, 35, 41, 42, 43, 44, 45, 46],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤 (fastapi 도메인)
    // ─────────────────────────────────────────────────────
    const ROLE_STYLE = {
      M: { bg: 'bg-indigo-50', border: 'border-indigo-300', text: 'text-indigo-800', badge: 'bg-indigo-200 text-indigo-800' },
      T: { bg: 'bg-sky-50',    border: 'border-sky-300',    text: 'text-sky-800',    badge: 'bg-sky-200 text-sky-800' },
      V: { bg: 'bg-violet-50', border: 'border-violet-300', text: 'text-violet-800', badge: 'bg-violet-200 text-violet-800' },
    };

    function PieceCard({ piece }) {
      const s = ROLE_STYLE[piece.role] || ROLE_STYLE.M;
      return (
        <div className={`rounded-lg border-2 ${piece.active ? s.bg : 'bg-slate-50'} ${piece.active ? s.border : 'border-slate-200'} px-3 py-2 transition`}>
          <div className="flex items-center justify-between gap-2">
            <div className="flex items-center gap-2">
              <span className={`inline-flex items-center justify-center w-7 h-7 rounded ${piece.active ? s.badge : 'bg-slate-200 text-slate-500'} font-bold text-sm`}>
                {piece.role}
              </span>
              <span className={`text-sm font-bold ${piece.active ? s.text : 'text-slate-400'}`}>
                {piece.name}
              </span>
            </div>
            <span className={`text-[10px] px-2 py-0.5 rounded-full ${piece.active ? s.badge : 'bg-slate-200 text-slate-500'}`}>
              MVC: {piece.mvc}
            </span>
          </div>
          <div className={`mt-1 text-xs ${piece.active ? 'text-slate-700' : 'text-slate-400'}`}>
            {piece.desc}
          </div>
        </div>
      );
    }

    function FlowItem({ item }) {
      return (
        <div className={`rounded border ${item.active ? 'border-indigo-300 bg-indigo-50' : 'border-slate-200 bg-slate-50'} px-2.5 py-1.5 text-xs flex items-center gap-2`}>
          <span className={`font-bold ${item.active ? 'text-indigo-800' : 'text-slate-400'}`}>{item.label}</span>
          <span className={`${item.active ? 'text-slate-600' : 'text-slate-400'} font-mono text-[11px] truncate`}>{item.note}</span>
        </div>
      );
    }

    function CompareTable() {
      const rows = [
        { role: '데이터',    mvc: 'Model',      mtv: 'Model',    same: true },
        { role: '화면',      mvc: 'View',       mtv: 'Template', same: false },
        { role: '요청 처리', mvc: 'Controller', mtv: 'View',     same: false },
      ];
      return (
        <div className="mt-3 rounded-lg border-2 border-indigo-400 bg-white p-3">
          <div className="text-xs font-bold text-indigo-800 mb-2">⚡ MVC ↔ MTV 매핑</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-indigo-700 border-b border-indigo-200">
                <th className="text-left py-1">역할</th>
                <th className="text-left py-1">MVC</th>
                <th className="text-left py-1">MTV</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r, i) => (
                <tr key={i} className="border-b border-slate-100 last:border-0">
                  <td className="py-1 text-slate-700">{r.role}</td>
                  <td className="py-1 font-mono text-indigo-700">{r.mvc}</td>
                  <td className={`py-1 font-mono ${r.same ? 'text-emerald-700' : 'text-rose-700 font-bold'}`}>
                    {r.mtv} {r.same ? '✓' : '⚠'}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          <div className="mt-2 text-[11px] text-slate-600">
            ⚠ 표시는 이름이 달라 헷갈리는 부분이다.
          </div>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">Django MTV 흐름</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = Django 도메인 상태</span>
          </div>

          {/* MTV 3 조각 */}
          <div className="space-y-2">
            {state.pieces.map((p, i) => (
              <PieceCard key={i} piece={p} />
            ))}
          </div>

          {/* 흐름 라인 */}
          <div className="mt-3">
            <div className="text-[10px] text-indigo-700/70 mb-1.5">요청 흐름</div>
            <div className="space-y-1">
              {state.flow.map((f, i) => (
                <FlowItem key={i} item={f} />
              ))}
            </div>
          </div>

          {/* MVC ↔ MTV 비교 테이블 (Step 4 만) */}
          {state.compare && <CompareTable />}

          {/* 핵심 한 줄 */}
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>

          {/* 5탭 표시 — 현재 스텝의 파일명이 활성 */}
          <div className="flex items-center gap-0 px-2 py-1 bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {STEPS.map((s, i) => (
              <span
                key={i}
                className={`px-2 py-1 text-[10px] font-mono rounded-t border-t border-l border-r ${i === stepIdx ? 'bg-[#282c34] text-indigo-300 border-slate-700' : 'bg-slate-800 text-slate-500 border-transparent'}`}
              >
                {s.code.filename}
              </span>
            ))}
          </div>

          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">5</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter 5-4. MTV (Django)</h1>
                <p className="text-sm text-indigo-800/80">Model · Template · View — 그리고 MVC와의 명칭 차이를 5단계로 추적</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                Django MTV = Model + Template + View. <b>Django의 "View"는 MVC의 "Controller"</b>이고, <b>Django의 "Template"이 MVC의 "View"</b>다. 이름만 다르고 역할은 같다. FastAPI 에는 Template 단계가 없으므로 다음 챕터부터는 Router → Service → Repository 계층 구조를 본다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Django', 'MTV', 'Model', 'Template', 'View', 'MVC', 'Controller', 'URLconf', 'ORM'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./chapter-05-03-mvc.html" className="underline hover:no-underline">← 이전: 5-3 MVC 패턴</a>
              <a href="./chapter-05-05-fat-controller.html" className="underline hover:no-underline">다음: 5-5 Fat Controller 문제 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
