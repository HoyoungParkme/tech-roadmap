<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 인터랙티브 학습 — Chapter 5-4. MTV (Django)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ─────────────────────────────────────────
       1. MVC ↔ MTV 비교 단계 정의
    ───────────────────────────────────────── */

    const STEPS = [
      {
        title: 'MVC 복습',
        desc: '[MVC] 세 역할을 기억하자. Model(데이터), View(화면), Controller(요청 처리). 이 이름은 원조 MVC 패턴에서 왔다.',
        phase: 'mvc',
        mvcHighlight: 'all',
        mtvHighlight: 'none',
        codeView: 'mvc',
      },
      {
        title: 'Django의 이름 바꾸기',
        desc: '[MTV] Django는 같은 구조인데 이름이 다르다. Model은 그대로, View는 Template으로, Controller는 View로 바꿨다. 왜? Django 창시자가 "내가 만든 View는 MVC의 View가 아니라 Controller에 가깝다"고 생각했기 때문이다.',
        phase: 'rename',
        mvcHighlight: 'all',
        mtvHighlight: 'all',
        codeView: 'mtv',
      },
      {
        title: '혼동 포인트 — View ≠ View',
        desc: '[핵심] 가장 헷갈리는 부분! Django의 "View"는 MVC의 "Controller"다. Django의 "Template"이 MVC의 "View"다. 이름만 다를 뿐 하는 일은 같다.',
        phase: 'confusion',
        mvcHighlight: 'swap',
        mtvHighlight: 'swap',
        codeView: 'compare',
      },
      {
        title: 'FastAPI는?',
        desc: '[FastAPI] FastAPI에는 Template 개념이 없다 (API 서버니까). MTV는 Django 전용이다. FastAPI는 MVC보다 3계층 아키텍처(Router → Service → Repository)에 더 가깝다. 다음 챕터에서 배운다.',
        phase: 'fastapi',
        mvcHighlight: 'none',
        mtvHighlight: 'none',
        codeView: 'fastapi',
      },
    ];

    /* ─────────────────────────────────────────
       2. 색상 매핑 (Tailwind 정적)
    ───────────────────────────────────────── */

    const MVC_ROLES = [
      { key: 'model',      label: 'Model',      desc: '데이터 + 비즈니스 규칙' },
      { key: 'view',       label: 'View',        desc: '화면 렌더링' },
      { key: 'controller', label: 'Controller',  desc: '요청 수신 → 조율' },
    ];
    const MTV_ROLES = [
      { key: 'model',    label: 'Model',    desc: '데이터 + DB 쿼리' },
      { key: 'template', label: 'Template', desc: 'HTML 화면 렌더링' },
      { key: 'view',     label: 'View',     desc: '요청 수신 → 조율' },
    ];

    const ROLE_CLASS = {
      model:      { normal: 'bg-emerald-100 border-emerald-400 text-emerald-700', dim: 'bg-slate-50 border-slate-200 text-slate-400', swap: 'bg-emerald-100 border-emerald-400 text-emerald-700' },
      view:       { normal: 'bg-violet-100 border-violet-400 text-violet-700', dim: 'bg-slate-50 border-slate-200 text-slate-400', swap: 'bg-amber-100 border-amber-400 text-amber-700 ring-2 ring-amber-300' },
      controller: { normal: 'bg-blue-100 border-blue-400 text-blue-700', dim: 'bg-slate-50 border-slate-200 text-slate-400', swap: 'bg-amber-100 border-amber-400 text-amber-700 ring-2 ring-amber-300' },
      template:   { normal: 'bg-violet-100 border-violet-400 text-violet-700', dim: 'bg-slate-50 border-slate-200 text-slate-400', swap: 'bg-amber-100 border-amber-400 text-amber-700 ring-2 ring-amber-300' },
    };

    const PHASE_BADGE_CLASS = {
      mvc:       'bg-blue-100 text-blue-700 border-blue-300',
      rename:    'bg-amber-100 text-amber-700 border-amber-300',
      confusion: 'bg-red-100 text-red-700 border-red-300',
      fastapi:   'bg-emerald-100 text-emerald-700 border-emerald-300',
    };
    const PHASE_BADGE_LABEL = {
      mvc:       'MVC',
      rename:    '이름 변경',
      confusion: '혼동 주의!',
      fastapi:   'FastAPI',
    };

    const CODE_VIEWS = {
      mvc: [
        { code: '# MVC 패턴 (전통적)', tag: 'none' },
        { code: '', tag: 'none' },
        { code: '# Controller — 요청을 받고 조율', tag: 'controller' },
        { code: 'def list_products(request):', tag: 'controller' },
        { code: '    data = ProductModel.get_all()', tag: 'controller' },
        { code: '    return render("product_list", data)', tag: 'controller' },
        { code: '', tag: 'none' },
        { code: '# Model — 데이터 + 비즈니스 규칙', tag: 'model' },
        { code: 'class ProductModel:', tag: 'model' },
        { code: '    def get_all():', tag: 'model' },
        { code: '        return db.query(Product)', tag: 'model' },
        { code: '', tag: 'none' },
        { code: '# View — 화면 (HTML 템플릿)', tag: 'view' },
        { code: '<!-- product_list.html -->', tag: 'view' },
        { code: '<li>{{ product.name }}</li>', tag: 'view' },
      ],
      mtv: [
        { code: '# Django MTV 패턴', tag: 'none' },
        { code: '', tag: 'none' },
        { code: '# View (= MVC의 Controller!)', tag: 'controller' },
        { code: '# views.py', tag: 'controller' },
        { code: 'def product_list(request):', tag: 'controller' },
        { code: '    products = Product.objects.all()', tag: 'controller' },
        { code: '    return render(request, "list.html", ctx)', tag: 'controller' },
        { code: '', tag: 'none' },
        { code: '# Model — 데이터 (변함없음)', tag: 'model' },
        { code: '# models.py', tag: 'model' },
        { code: 'class Product(models.Model):', tag: 'model' },
        { code: '    name = models.CharField(max_length=100)', tag: 'model' },
        { code: '', tag: 'none' },
        { code: '# Template (= MVC의 View!)', tag: 'view' },
        { code: '<!-- templates/list.html -->', tag: 'view' },
        { code: '<li>{{ product.name }}</li>', tag: 'view' },
      ],
      compare: [
        { code: '# ──── 이름이 다를 뿐, 하는 일은 같다 ────', tag: 'none' },
        { code: '', tag: 'none' },
        { code: '#        MVC          │  Django MTV', tag: 'none' },
        { code: '#   ─────────────────┼──────────────', tag: 'none' },
        { code: '#   Controller       │  View          ← 같은 역할!', tag: 'controller' },
        { code: '#   (요청 수신)      │  (views.py)', tag: 'controller' },
        { code: '', tag: 'none' },
        { code: '#   View             │  Template      ← 같은 역할!', tag: 'view' },
        { code: '#   (화면 렌더링)    │  (*.html)', tag: 'view' },
        { code: '', tag: 'none' },
        { code: '#   Model            │  Model         ← 이름 동일', tag: 'model' },
        { code: '#   (데이터)         │  (models.py)', tag: 'model' },
      ],
      fastapi: [
        { code: '# FastAPI — Template 없음, API 전용', tag: 'none' },
        { code: '', tag: 'none' },
        { code: '# Router (Controller 역할)', tag: 'controller' },
        { code: '@app.get("/products")', tag: 'controller' },
        { code: 'def list_products():', tag: 'controller' },
        { code: '    return product_service.get_all()', tag: 'controller' },
        { code: '', tag: 'none' },
        { code: '# Service (비즈니스 로직 — MVC에 없는 계층!)', tag: 'model' },
        { code: 'def get_all():', tag: 'model' },
        { code: '    return product_repo.find_all()', tag: 'model' },
        { code: '', tag: 'none' },
        { code: '# → MVC보다 3계층 아키텍처에 가깝다', tag: 'none' },
        { code: '# → 다음 챕터(V-3)에서 자세히!', tag: 'none' },
      ],
    };

    const CODE_TAG_BG = { controller: 'bg-blue-50', model: 'bg-emerald-50', view: 'bg-violet-50', none: 'bg-white' };
    const CODE_TAG_BORDER = { controller: 'border-blue-300', model: 'border-emerald-300', view: 'border-violet-300', none: 'border-transparent' };

    /* ─────────────────────────────────────────
       3. 블록 스타일 결정 헬퍼
    ───────────────────────────────────────── */

    function getRoleClass(roleKey, highlight) {
      if (highlight === 'none') return ROLE_CLASS[roleKey]?.dim || 'bg-slate-50 border-slate-200 text-slate-400';
      if (highlight === 'all') return ROLE_CLASS[roleKey]?.normal || 'bg-slate-100 border-slate-300 text-slate-500';
      if (highlight === 'swap') {
        if (roleKey === 'view' || roleKey === 'controller' || roleKey === 'template') return ROLE_CLASS[roleKey]?.swap || ROLE_CLASS[roleKey]?.normal;
        return ROLE_CLASS[roleKey]?.normal;
      }
      return ROLE_CLASS[roleKey]?.normal;
    }

    /* ─────────────────────────────────────────
       4. 앱 컴포넌트
    ───────────────────────────────────────── */

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx >= STEPS.length - 1;
      const codeLines = CODE_VIEWS[stepData.codeView];

      const handleNext = () => { setCurrentStepIdx(prev => prev < STEPS.length - 1 ? prev + 1 : prev); };
      const handlePrev = () => setCurrentStepIdx(prev => (prev > 0 ? prev - 1 : prev));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => { if (!isPlaying) return; const id = setInterval(() => handleNextRef.current(), 3000); return () => clearInterval(id); }, [isPlaying]);
      useEffect(() => { const h = (e) => { if (e.key === 'ArrowRight') handleNextRef.current(); if (e.key === 'ArrowLeft') handlePrevRef.current(); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, []);
      const togglePlay = () => { if (isEnd) { setCurrentStepIdx(0); setIsPlaying(true); return; } setIsPlaying(prev => !prev); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm text-slate-500">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum V-2-2</span>
            </nav>

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-xl md:text-2xl font-bold text-slate-800 mb-2">Chapter 5-4. MTV — Django의 이름 바꾸기</h1>
              <p className="text-slate-600 text-sm leading-relaxed">
                Django는 MVC와 같은 구조를 쓰지만 이름이 다르다.
                가장 헷갈리는 포인트: <strong>Django의 "View" = MVC의 "Controller"</strong>.
                FastAPI에는 Template 개념이 없으므로 MTV는 Django 전용이다.
              </p>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              {/* ── 좌측: MVC ↔ MTV 비교 다이어그램 ── */}
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
                <div className="flex items-center justify-between">
                  <h2 className="text-sm font-bold text-slate-600">MVC ↔ MTV 비교</h2>
                  <span className={`text-xs font-bold px-2.5 py-1 rounded-full border ${PHASE_BADGE_CLASS[stepData.phase]}`}>
                    {PHASE_BADGE_LABEL[stepData.phase]}
                  </span>
                </div>

                {/* 좌: MVC, 우: MTV */}
                <div className="grid grid-cols-2 gap-3">
                  <div className="space-y-2">
                    <div className="text-xs font-bold text-center text-slate-500 pb-1 border-b border-slate-200">MVC (원조)</div>
                    {MVC_ROLES.map(role => (
                      <div key={role.key} className={`p-3 rounded-lg border-2 text-center transition-all duration-300 ${getRoleClass(role.key, stepData.mvcHighlight)}`}>
                        <div className="font-bold text-sm">{role.label}</div>
                        <div className="text-xs opacity-70">{role.desc}</div>
                      </div>
                    ))}
                  </div>
                  <div className="space-y-2">
                    <div className="text-xs font-bold text-center text-slate-500 pb-1 border-b border-slate-200">Django (MTV)</div>
                    {MTV_ROLES.map(role => (
                      <div key={role.key} className={`p-3 rounded-lg border-2 text-center transition-all duration-300 ${getRoleClass(role.key, stepData.mtvHighlight)}`}>
                        <div className="font-bold text-sm">{role.label}</div>
                        <div className="text-xs opacity-70">{role.desc}</div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* 연결선 힌트 (Step 2~3) */}
                {(stepData.phase === 'rename' || stepData.phase === 'confusion') && (
                  <div className="text-center text-xs font-bold text-amber-600 bg-amber-50 border border-amber-200 rounded-lg p-2">
                    Model = Model &nbsp;|&nbsp; View ↔ Template &nbsp;|&nbsp; Controller ↔ View
                  </div>
                )}

                {/* 설명 */}
                <div className="p-4 rounded-lg border bg-blue-50 border-blue-200 text-blue-800 text-sm leading-relaxed">
                  <div className="font-bold mb-1">{stepData.title}</div>
                  {stepData.desc}
                </div>
              </div>

              {/* ── 우측: 코드 뷰어 ── */}
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between items-center">
                  <span>{{ mvc: 'MVC 코드', mtv: 'Django MTV 코드', compare: '이름 비교표', fastapi: 'FastAPI 코드' }[stepData.codeView]}</span>
                  <span className="text-slate-500">Step {currentStepIdx + 1} / {STEPS.length}</span>
                </div>
                <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
                  {codeLines.map((line, idx) => (
                    <div key={idx} className={`px-4 py-0.5 whitespace-pre transition-all duration-300 border-l-4 ${CODE_TAG_BG[line.tag]} ${CODE_TAG_BORDER[line.tag]}`}>
                      <span className="inline-block w-4 text-right mr-3 text-slate-400 select-none">{idx + 1}</span>
                      {line.code || '\u00A0'}
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* ── 컨트롤 ── */}
            <div className="flex items-center justify-center gap-3 flex-wrap">
              <button onClick={() => handlePrevRef.current()} disabled={currentStepIdx === 0} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="이전 단계">← 이전</button>
              <button onClick={togglePlay} className={`px-6 py-2 rounded-lg font-bold text-sm transition-colors ${isPlaying ? 'bg-amber-500 text-white hover:bg-amber-600' : 'bg-emerald-600 text-white hover:bg-emerald-700'}`} aria-label={isPlaying ? '정지' : (isEnd ? '처음부터 재생' : '자동 실행')}>{isPlaying ? '⏸ 정지' : (isEnd ? '⟳ 처음부터' : '▶ 자동 실행')}</button>
              <button onClick={() => handleNextRef.current()} disabled={isEnd} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="다음 단계">다음 →</button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <footer className="text-center text-xs text-slate-400 py-4">FastAPI 인터랙티브 학습 — Chapter 5-4. MTV (Django) | 키보드 ← → 지원</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
