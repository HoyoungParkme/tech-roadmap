<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — V-5-3. Jinja2 템플릿 엔진</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    V-5-3. Jinja2 템플릿 엔진
    학습 목표: Jinja2로 서버 사이드 HTML 렌더링을 이해한다.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: '템플릿이란',
        desc: '템플릿은 "빈칸 있는 HTML"이다. 서버에서 데이터를 채워 완성된 HTML을 클라이언트에 보낸다. SPA(React 등) 없이도 동적 페이지를 만들 수 있다. 관리자 페이지, 이메일 본문, 간단한 웹앱에 적합.',
        visual: 'concept',
      },
      {
        title: '변수 삽입 {{ }}',
        desc: '이중 중괄호 {{ }} 안에 변수명을 넣으면 해당 값으로 치환된다. Python에서 전달한 데이터가 HTML에 삽입된다.',
        code: [
          '<!-- templates/hello.html -->',
          '<html>',
          '<body>',
          '    <h1>안녕하세요, {{ username }}님!</h1>',
          '    <p>가입일: {{ join_date }}</p>',
          '    <p>포인트: {{ points }}점</p>',
          '</body>',
          '</html>',
        ],
        highlight: [3, 4, 5],
      },
      {
        title: '조건/반복 {% %}',
        desc: '{% if %}, {% for %} 등 제어문으로 조건부 렌더링과 리스트 반복이 가능하다. Python 문법과 유사하다.',
        code: [
          '<!-- templates/items.html -->',
          '{% if items %}',
          '    <ul>',
          '    {% for item in items %}',
          '        <li class="{% if item.is_sale %}text-red-500{% endif %}">',
          '            {{ item.name }} - {{ item.price }}원',
          '        </li>',
          '    {% endfor %}',
          '    </ul>',
          '{% else %}',
          '    <p>상품이 없습니다.</p>',
          '{% endif %}',
        ],
        highlight: [1, 3, 4, 5, 7, 9, 11],
      },
      {
        title: 'FastAPI + Jinja2 통합',
        desc: 'Jinja2Templates 클래스로 템플릿 디렉토리를 지정하고, TemplateResponse로 렌더링한다. request 객체를 반드시 context에 포함해야 한다.',
        code: [
          'from fastapi import FastAPI, Request',
          'from fastapi.templating import Jinja2Templates',
          '',
          'app = FastAPI()',
          'templates = Jinja2Templates(directory="templates")',
          '',
          '@app.get("/hello/{username}")',
          'async def hello(request: Request, username: str):',
          '    return templates.TemplateResponse(',
          '        request=request,',
          '        name="hello.html",',
          '        context={"username": username, "points": 1500},',
          '    )',
        ],
        highlight: [1, 4, 8, 9, 10, 11, 12],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum V-5-3</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-purple-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. 실전 확장 &gt; Chapter 5. 템플릿과 정적 파일</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">V-5-3. Jinja2 템플릿 엔진</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                <strong>Jinja2</strong>로 서버에서 HTML을 렌더링한다. 변수 삽입, 조건, 반복을 지원한다.
              </p>
            </header>

            {stepData.visual === 'concept' && (
              <div className="bg-white rounded-xl border border-slate-200 p-4">
                <div className="flex flex-col md:flex-row items-center gap-4 justify-center">
                  <div className="p-3 rounded-lg bg-purple-50 border border-purple-200 text-center">
                    <div className="text-xs text-slate-500">템플릿</div>
                    <div className="font-mono text-xs mt-1">안녕, {'{{ name }}'}!</div>
                  </div>
                  <div className="text-xl font-bold text-slate-400">+</div>
                  <div className="p-3 rounded-lg bg-blue-50 border border-blue-200 text-center">
                    <div className="text-xs text-slate-500">데이터</div>
                    <div className="font-mono text-xs mt-1">name = "홍길동"</div>
                  </div>
                  <div className="text-xl font-bold text-slate-400">=</div>
                  <div className="p-3 rounded-lg bg-emerald-50 border border-emerald-200 text-center">
                    <div className="text-xs text-slate-500">결과 HTML</div>
                    <div className="font-mono text-xs mt-1">안녕, 홍길동!</div>
                  </div>
                </div>
              </div>
            )}

            {stepData.code && (
              <div className="bg-slate-900 rounded-xl overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono">{stepData.title}</div>
                <div className="p-4 text-xs font-mono leading-5">
                  {stepData.code.map((line, i) => (
                    <div key={i} className={`px-2 py-0.5 ${stepData.highlight.includes(i) ? 'bg-purple-900/40 text-purple-300' : 'text-slate-300'}`}>{line || '\u00A0'}</div>
                  ))}
                </div>
              </div>
            )}

            <div className="p-4 rounded-xl bg-purple-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-purple-200">Step {currentStepIdx + 1}/{STEPS.length}: {stepData.title}</h3>
                <span className="text-xs text-purple-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-purple-600 text-white hover:bg-purple-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="../part4/chapter-04-16-uvicorn-workers.html" className="text-slate-500 hover:text-slate-700">&larr; IV-4-16 Uvicorn Workers</a>
              <a href="./chapter-05-15-static-files.html" className="text-blue-600 hover:text-blue-800 font-medium">V-5-4 StaticFiles &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
