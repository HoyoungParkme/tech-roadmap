    function PyDataCard({ item }) {
      return (
        <div className="rounded-lg border border-indigo-300 bg-indigo-50 px-3 py-2 flex items-center justify-between">
          <div className="flex items-center gap-2 min-w-0">
            <span className="text-xs font-bold text-indigo-700 w-20 truncate">{item.label}</span>

          </div>
          <span className="text-[10px] px-2 py-0.5 rounded bg-indigo-200 text-indigo-800 ml-2 shrink-0">{item.badge}</span>
        </div>
      );
    }

    function TemplateBox({ lines }) {
      if (!lines) return null;
      return (
        <div className="mt-3 rounded-lg border border-violet-300 bg-violet-50 p-3">
          <div className="text-[11px] font-bold text-violet-800 mb-2 flex items-center gap-1">

            <span>Jinja2 템플릿 (.html)</span>
          </div>
          <pre className="text-[11px] font-mono text-violet-900 leading-snug whitespace-pre overflow-x-auto">{lines.join('\n')}</pre>
        </div>
      );
    }

      if (!lines) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-emerald-400 bg-emerald-50 p-3">
          <div className="text-[11px] font-bold text-emerald-800 mb-2 flex items-center gap-1">

              <span>Python 컨텍스트 (TemplateResponse에 전달)</span>
            </div>
            <div className="space-y-1.5">
              {state.pyData.map((it, i) => (
                <PyDataCard key={i} item={it} />
              ))}
            </div>
          </div>
          {state.template && (
            <div className="text-center text-xs font-bold text-indigo-600 my-1 py-1">
              ↓ Jinja2 엔진이 빈칸을 채운다 ↓
            </div>
          )}
          <TemplateBox lines={state.template} />
          <RenderedBox lines={state.rendered} />
          <div className="mt-auto pt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.note}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer — 5개 파일 탭
    // ─────────────────────────────────────────────────────
    const FILE_TABS = [
      { name: 'setup.py',     icon: '🐍' },
      { name: 'response.py',  icon: '🐍' },
      { name: 'vars.html',    icon: '📄' },
      { name: 'control.html', icon: '📄' },
      { name: 'extends.html', icon: '📄' },
    ];

    function CodeViewer({ code, activeTab, onTabClick, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 윈도우 헤더 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-900 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">jinja2-templates</span>
            <span className="ml-auto text-[10px] text-slate-400">VSCode</span>
          </div>
          {/* 파일 탭 */}
          <div className="flex bg-slate-800 border-b border-slate-700 overflow-x-auto">
            {FILE_TABS.map((tab, i) => {
              const isActive = i === activeTab;
              return (
                <button
                  key={tab.name}
                  onClick={() => onTabClick(i)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                    isActive
                      ? 'bg-[#282c34] text-indigo-300 border-t-2 border-t-indigo-400'
                      : 'text-slate-400 hover:text-slate-200 hover:bg-slate-700/50'
                  }`}
                >
                  {tab.icon} {tab.name}
                </button>
              );
            })}
          </div>
          {/* 코드 영역 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1 whitespace-pre"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          {/* 푸터 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines · {code.lang}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const [tabOverride, setTabOverride] = useState(null);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 스텝 변경 시 탭 오버라이드 초기화 → 스텝의 기본 탭으로
      useEffect(() => {
        setTabOverride(null);
      }, [stepIdx]);

      const activeTab = tabOverride !== null ? tabOverride : step.fileTab;
      const activeCode = STEPS[activeTab].code;

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동재생 3000ms
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">V</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">V-5-14. Jinja2 템플릿</h1>
                <p className="text-sm text-indigo-800/80">Python 데이터 → Jinja2 템플릿 → HTML. 5단계로 추적</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer
                code={activeCode}
                activeTab={activeTab}
                onTabClick={(i) => setTabOverride(i)}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2 flex-wrap">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">
              키보드 ←/→ · 자동재생 3초/단계 · 우측 파일 탭 클릭으로 코드 전환
            </div>

            {/* 마지막 단계 정리 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                Jinja2Templates 등록 → TemplateResponse 반환 → &#123;&#123; &#125;&#125; 변수 출력 →
                &#123;% if %&#125;/&#123;% for %&#125; 흐름 제어 → extends/block 으로 레이아웃 재사용.
                다음(V-5-15)에서는 정적 파일(StaticFiles)을 다룬다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Jinja2', 'TemplateResponse', 'context', '{{ }}', '{% if %}', '{% for %}', 'extends', 'block', 'SSR'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./chapter-05-13-celery.html" className="underline hover:no-underline">← 이전: V-5-13 Celery</a>
              <a href="../index.html" className="underline hover:no-underline">챕터 목록</a>
              <a href="./chapter-05-15-static-files.html" className="underline hover:no-underline">다음: V-5-15 정적 파일 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
