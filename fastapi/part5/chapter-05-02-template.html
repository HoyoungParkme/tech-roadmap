        keyPoint: '패턴 = 미래의 나/동료에게 보내는 편지. 코드를 쓰는 비용보다 읽는 비용이 더 크다.',
        code: {
          lang: 'markdown',
          filename: 'maintenance.md',
          lines: [
            '# Step 5. 유지보수성 — 진짜 비용은 6개월 뒤',
            '',
            '## 소프트웨어의 비용 분포 (업계 통계)',
            '',
            '- 작성: 20%',
            '- 유지보수/수정/디버깅: 80%',
            '',
            '→ 즉, "쉽게 쓰는 코드"보다 "쉽게 읽는 코드"가 이긴다.',
            '',
            '## 패턴이 유지보수에서 빛나는 순간',
            '',
            '### 시나리오 A. 버그 추적',
            '',
            '버그: "결제 금액이 1원 적게 찍힌다"',
            '',
            '- 패턴 없음 → main.py 800줄을 처음부터 읽는다 (1시간+)',
            '- Layered 패턴 → services/payment_service.py만 본다 (10분)',
            '',
            '### 시나리오 B. 기능 변경',
            '',
            '요청: "할인율을 10%에서 15%로 바꿔달라"',
            '',
            '- 패턴 없음 → 할인 코드 찾기부터. grep으로 8군데 발견',
            '- Layered 패턴 → services/discount_service.py 한 줄 수정',
            '',
            '### 시나리오 C. DB 교체',
            '',
            '요청: "MySQL → PostgreSQL로 바꿔달라"',
            '',
            '- 패턴 없음 → SQL이 곳곳에 흩어짐. 한 달',
            '- Layered 패턴 → repositories/ 폴더 안만 수정. 3일',
            '',
            '## 패턴 ≠ 만능',
            '',
            '- 100줄짜리 학습 코드에 Clean Architecture 도입은 과설계',
            '- 도메인 1개 → Layered',
            '- 도메인 많음 → Folder by Feature',
            '- 외부 시스템 많음 → Hexagonal',
            '- 규모/복잡도에 맞는 패턴을 고른다',
            '',
            '## 결론',
            '',
            '패턴은 "지금 빨리 짜기"보다 ',
            '"6개월 뒤의 나/팀이 빨리 읽기"를 위한 투자다.',
            '',
            '# → 다음 챕터 (5-3): MVC 패턴 자세히',
          ],
          highlight: [4, 5, 6, 7, 12, 13, 14, 15, 16, 17, 20, 21, 22, 23, 24, 27, 28, 29, 30, 31, 34, 35, 36, 37, 38, 39, 43, 44, 45],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤
    // ─────────────────────────────────────────────────────
    const KIND_STYLE = {
      pain: { bg: 'bg-rose-50',     border: 'border-rose-300',    text: 'text-rose-800',    badge: 'bg-rose-200 text-rose-800' },
      win:  { bg: 'bg-indigo-50',   border: 'border-indigo-300',  text: 'text-indigo-800',  badge: 'bg-indigo-200 text-indigo-800' },
    };

    function DataCard({ item }) {
      const s = KIND_STYLE[item.kind] || KIND_STYLE.win;
      return (
        <div className={`rounded-lg border ${s.bg} ${s.border} px-3 py-2 flex items-center justify-between`}>
          <div className="flex items-center gap-2">
            <span className={`text-xs font-bold ${s.text} w-14`}>{item.label}</span>
            <span className={`text-sm font-mono font-bold ${s.text}`}>{item.value}</span>
          </div>
          <span className={`text-[10px] px-2 py-0.5 rounded ${s.badge}`}>{item.badge}</span>
        </div>
      );
    }

    function SummaryBox({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-indigo-500 bg-gradient-to-br from-indigo-50 to-violet-50 p-4">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl">🎯</span>
            <span className="text-lg font-bold text-indigo-800">{summary.title}</span>
          </div>
          <ul className="space-y-1.5">
            {summary.features.map((f, i) => (
              <li key={i} className="text-sm text-indigo-900 flex gap-2">
                <span className="text-indigo-500 mt-0.5">✓</span>
                <span>{f}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">패턴 효과 누적</h3>
            <span className="text-[10px] text-slate-500">좌 = 효과 카드</span>
          </div>
          <div className="space-y-2">
            {state.rawList.map((it, i) => (
              <DataCard key={i} item={it} />
            ))}
          </div>
          {state.arrow && (
            <div className="mt-3 text-center text-xs font-bold text-indigo-600 py-2 border-y border-dashed border-indigo-300">
              ↓ {state.arrow} ↓
            </div>
          )}
          <SummaryBox summary={state.summaryBox} />
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js, 5탭)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ steps, stepIdx, onTabClick }) {
      const code = steps[stepIdx].code;
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 탭 바 */}
          <div className="flex items-center gap-1 px-2 pt-2 bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {steps.map((s, i) => {
              const active = i === stepIdx;
              return (
                <button
                  key={i}
                  onClick={() => onTabClick(i)}
                  className={`px-3 py-1.5 text-xs rounded-t font-mono whitespace-nowrap transition ${
                    active
                      ? 'bg-[#282c34] text-indigo-300 border-t border-l border-r border-slate-700'
                      : 'bg-slate-800 text-slate-400 hover:text-slate-200'
                  }`}
                >
                  {s.code.filename}
                </button>
              );
            })}
          </div>
          {/* 윈도우 헤더 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          {/* 코드 영역 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          {/* 푸터 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {steps.length}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동재생 (3000ms)
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">5</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter 5-2. 템플릿(패턴)의 효과</h1>
                <p className="text-sm text-indigo-800/80">매번 새로 만들기 → 검증된 패턴 → 학습 곡선 평탄 → 협업 → 유지보수성. 5단계로 추적</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer steps={STEPS} stepIdx={stepIdx} onTabClick={setStepIdx} />
            </div>

            {/* 컨트롤 (4버튼) */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계 · 상단 탭 클릭 가능</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                패턴(템플릿)은 매번 새로 만드는 비효율을 없애고, 검증된 답으로 학습/협업/유지보수를 모두 개선한다. 다음 챕터(5-3)에서는 가장 고전적인 MVC 패턴을 자세히 본다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['아키텍처 패턴', '템플릿', 'Layered', 'router/service/repo', '유지보수성', '협업', '학습 곡선'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./chapter-05-01-spaghetti.html" className="underline hover:no-underline">← 5-1 스파게티 코드</a>
              <a href="./chapter-05-03-mvc.html" className="underline hover:no-underline">다음: 5-3 MVC 패턴 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
