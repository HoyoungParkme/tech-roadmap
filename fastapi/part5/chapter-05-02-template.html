<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 인터랙티브 학습 — Chapter 5-2. 템플릿(패턴)의 효과</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ─────────────────────────────────────────
       1. 폴더 구조 + 코드 스냅샷
       스파게티 코드가 패턴 적용으로 정리되는 과정.
    ───────────────────────────────────────── */

    // 파일 상태: 'inactive' | 'active' | 'highlight' | 'newperson'
    const FILE_STATE = { inactive: 'inactive', active: 'active', highlight: 'highlight', newperson: 'newperson' };

    const STEPS = [
      {
        title: '문제 인식 — 스파게티 코드',
        desc: '[Before] main.py 하나에 라우팅 + 계산 + DB + 이메일이 전부 섞여 있다. 누가 봐도 복잡하다. "이걸 어떻게 정리할까?"',
        folders: [
          { name: 'project/', depth: 0, type: 'dir', state: FILE_STATE.active },
          { name: 'main.py  (모든 코드가 여기!)', depth: 1, type: 'file', state: FILE_STATE.highlight },
        ],
        codeTitle: 'main.py — 17줄, 4가지 책임',
        codeLines: [
          { code: '@app.post("/orders")', tag: 'route' },
          { code: 'def create_order(item, qty):', tag: 'route' },
          { code: '    price = get_price(item)', tag: 'calc' },
          { code: '    total = price * qty', tag: 'calc' },
          { code: '    if total > 100000:', tag: 'calc' },
          { code: '        total *= 0.9', tag: 'calc' },
          { code: '    db.save({"item": item, ...})', tag: 'db' },
          { code: '    db.update_stock(item, -qty)', tag: 'db' },
          { code: '    smtp.send(user.email, msg)', tag: 'email' },
          { code: '    return {"status": "ok"}', tag: 'route' },
        ],
        phase: 'before',
      },
      {
        title: '규칙 도입 — "어떤 코드는 어디에"',
        desc: '[규칙] 아키텍처 패턴은 "어떤 코드는 어디에 넣는다"는 규칙집이다. 음식점 주방에서 "고기는 냉장고, 양념은 선반, 완성품은 조리대"라는 자리 규칙과 같다.',
        folders: [
          { name: 'project/', depth: 0, type: 'dir', state: FILE_STATE.active },
          { name: 'router/      ← 요청/응답만', depth: 1, type: 'dir', state: FILE_STATE.highlight },
          { name: 'service/     ← 비즈니스 로직만', depth: 1, type: 'dir', state: FILE_STATE.highlight },
          { name: 'repository/  ← DB 접근만', depth: 1, type: 'dir', state: FILE_STATE.highlight },
          { name: 'notification/ ← 알림만', depth: 1, type: 'dir', state: FILE_STATE.highlight },
        ],
        codeTitle: '규칙: 각 폴더의 책임',
        codeLines: [
          { code: '# router/    → HTTP 요청을 받고 응답을 돌려준다', tag: 'route' },
          { code: '#              다른 로직은 넣지 않는다', tag: 'route' },
          { code: '', tag: 'none' },
          { code: '# service/   → 가격 계산, 할인, 비즈니스 규칙', tag: 'calc' },
          { code: '#              DB를 직접 호출하지 않는다', tag: 'calc' },
          { code: '', tag: 'none' },
          { code: '# repository/ → DB 저장, 조회, 수정만', tag: 'db' },
          { code: '#               비즈니스 로직을 넣지 않는다', tag: 'db' },
          { code: '', tag: 'none' },
          { code: '# notification/ → 이메일, SMS 등 알림만', tag: 'email' },
        ],
        phase: 'rules',
      },
      {
        title: '분리 — 각 파일이 하나의 책임만',
        desc: '[After] main.py의 코드를 규칙에 따라 4개 파일로 나눈다. 각 파일은 하나의 책임만 진다. 어디서 뭘 하는지 파일명만 보고 알 수 있다.',
        folders: [
          { name: 'project/', depth: 0, type: 'dir', state: FILE_STATE.active },
          { name: 'router/', depth: 1, type: 'dir', state: FILE_STATE.active },
          { name: 'order_router.py', depth: 2, type: 'file', state: FILE_STATE.highlight },
          { name: 'service/', depth: 1, type: 'dir', state: FILE_STATE.active },
          { name: 'order_service.py', depth: 2, type: 'file', state: FILE_STATE.highlight },
          { name: 'repository/', depth: 1, type: 'dir', state: FILE_STATE.active },
          { name: 'order_repo.py', depth: 2, type: 'file', state: FILE_STATE.highlight },
          { name: 'notification/', depth: 1, type: 'dir', state: FILE_STATE.active },
          { name: 'email_sender.py', depth: 2, type: 'file', state: FILE_STATE.highlight },
        ],
        codeTitle: '분리된 4개 파일 (각각 한 가지 책임)',
        codeLines: [
          { code: '# router/order_router.py', tag: 'route' },
          { code: '@app.post("/orders")', tag: 'route' },
          { code: 'def create_order(item, qty):', tag: 'route' },
          { code: '    result = order_service.create(item, qty)', tag: 'route' },
          { code: '    return result', tag: 'route' },
          { code: '', tag: 'none' },
          { code: '# service/order_service.py', tag: 'calc' },
          { code: 'def create(item, qty):', tag: 'calc' },
          { code: '    total = calc_total(item, qty)', tag: 'calc' },
          { code: '    order_repo.save(item, total)', tag: 'calc' },
          { code: '    email_sender.send_confirmation(...)', tag: 'calc' },
          { code: '', tag: 'none' },
          { code: '# repository/order_repo.py', tag: 'db' },
          { code: 'def save(item, total):', tag: 'db' },
          { code: '    db.save({"item": item, "total": total})', tag: 'db' },
          { code: '', tag: 'none' },
          { code: '# notification/email_sender.py', tag: 'email' },
          { code: 'def send_confirmation(email, msg):', tag: 'email' },
          { code: '    smtp.send(email, msg)', tag: 'email' },
        ],
        phase: 'after',
      },
      {
        title: '새 팀원이 합류한다',
        desc: '[협업] 새 개발자가 합류했다. 규칙이 있으니 "주문 로직을 바꿔야 하면 service/ 폴더를 보면 되겠구나" 바로 파악한다. 구조를 외울 필요 없이 규칙만 알면 된다.',
        folders: [
          { name: 'project/', depth: 0, type: 'dir', state: FILE_STATE.active },
          { name: 'router/', depth: 1, type: 'dir', state: FILE_STATE.active },
          { name: 'order_router.py', depth: 2, type: 'file', state: FILE_STATE.active },
          { name: 'service/', depth: 1, type: 'dir', state: FILE_STATE.active },
          { name: 'order_service.py  ← 여기만 보면 돼!', depth: 2, type: 'file', state: FILE_STATE.newperson },
          { name: 'repository/', depth: 1, type: 'dir', state: FILE_STATE.active },
          { name: 'order_repo.py', depth: 2, type: 'file', state: FILE_STATE.active },
          { name: 'notification/', depth: 1, type: 'dir', state: FILE_STATE.active },
          { name: 'email_sender.py', depth: 2, type: 'file', state: FILE_STATE.active },
        ],
        codeTitle: '새 팀원의 사고 흐름',
        codeLines: [
          { code: '# "주문 할인 로직을 바꿔달래..."', tag: 'none' },
          { code: '', tag: 'none' },
          { code: '# 1. 비즈니스 로직 → service/ 폴더', tag: 'calc' },
          { code: '# 2. order_service.py 열기', tag: 'calc' },
          { code: '# 3. calc_total() 함수 찾기', tag: 'calc' },
          { code: '# 4. 할인 조건만 수정 → 끝!', tag: 'calc' },
          { code: '', tag: 'none' },
          { code: '# router? 건드릴 필요 없음', tag: 'route' },
          { code: '# repository? 건드릴 필요 없음', tag: 'db' },
          { code: '# notification? 건드릴 필요 없음', tag: 'email' },
          { code: '', tag: 'none' },
          { code: '# → 다른 파일에 영향 없이 안전하게 수정!', tag: 'calc' },
        ],
        phase: 'collab',
      },
      {
        title: '패턴의 목적 = 협업과 유지보수',
        desc: '[결론] 아키텍처 패턴을 배우는 목적은 패턴 자체가 아니라, 협업과 유지보수를 쉽게 하는 것이다. 어떤 요리사가 들어와도 헤매지 않는 주방처럼.',
        folders: [
          { name: 'project/', depth: 0, type: 'dir', state: FILE_STATE.active },
          { name: 'router/    → 요청/응답', depth: 1, type: 'dir', state: FILE_STATE.highlight },
          { name: 'service/   → 비즈니스 로직', depth: 1, type: 'dir', state: FILE_STATE.highlight },
          { name: 'repository/ → DB 접근', depth: 1, type: 'dir', state: FILE_STATE.highlight },
          { name: 'notification/ → 알림', depth: 1, type: 'dir', state: FILE_STATE.highlight },
        ],
        codeTitle: '정리: Before vs After',
        codeLines: [
          { code: '# ──── Before (스파게티) ────', tag: 'none' },
          { code: '# main.py 1개에 모든 코드', tag: 'none' },
          { code: '#   → 버그 찾기 어려움', tag: 'none' },
          { code: '#   → 수정 시 회귀 발생', tag: 'none' },
          { code: '#   → 새 팀원이 헤맴', tag: 'none' },
          { code: '', tag: 'none' },
          { code: '# ──── After (패턴 적용) ────', tag: 'calc' },
          { code: '# 책임별 폴더 분리', tag: 'calc' },
          { code: '#   → 파일명만 보고 위치 파악', tag: 'calc' },
          { code: '#   → 한 파일 수정, 다른 파일 무관', tag: 'calc' },
          { code: '#   → 새 팀원도 규칙만 알면 OK', tag: 'calc' },
        ],
        phase: 'summary',
      },
    ];

    /* ─────────────────────────────────────────
       2. 색상 매핑 (Tailwind 정적 클래스)
    ───────────────────────────────────────── */

    const TAG_BG = {
      route: 'bg-blue-100',
      calc:  'bg-amber-100',
      db:    'bg-emerald-100',
      email: 'bg-purple-100',
      none:  'bg-slate-50',
    };
    const TAG_BORDER = {
      route: 'border-blue-300',
      calc:  'border-amber-300',
      db:    'border-emerald-300',
      email: 'border-purple-300',
      none:  'border-slate-200',
    };
    const TAG_TEXT = {
      route: 'text-blue-600',
      calc:  'text-amber-600',
      db:    'text-emerald-600',
      email: 'text-purple-600',
      none:  'text-slate-400',
    };

    const FOLDER_CLASS = {
      inactive:  'bg-slate-50 border-slate-200 text-slate-400',
      active:    'bg-slate-50 border-slate-300 text-slate-700',
      highlight: 'bg-amber-50 border-amber-300 text-amber-800 font-bold',
      newperson: 'bg-emerald-50 border-emerald-300 text-emerald-800 font-bold animate-pulse',
    };

    const PHASE_BADGE_CLASS = {
      before:  'bg-red-100 text-red-700 border-red-300',
      rules:   'bg-amber-100 text-amber-700 border-amber-300',
      after:   'bg-emerald-100 text-emerald-700 border-emerald-300',
      collab:  'bg-blue-100 text-blue-700 border-blue-300',
      summary: 'bg-violet-100 text-violet-700 border-violet-300',
    };
    const PHASE_BADGE_LABEL = {
      before:  'Before',
      rules:   '규칙 도입',
      after:   'After',
      collab:  '협업 효과',
      summary: '결론',
    };

    /* ─────────────────────────────────────────
       3. 앱 컴포넌트
    ───────────────────────────────────────── */

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx >= STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => prev < STEPS.length - 1 ? prev + 1 : prev); };
      const handlePrev = () => setCurrentStepIdx(prev => (prev > 0 ? prev - 1 : prev));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => { if (!isPlaying) return; const id = setInterval(() => handleNextRef.current(), 2800); return () => clearInterval(id); }, [isPlaying]);
      useEffect(() => { const h = (e) => { if (e.key === 'ArrowRight') handleNextRef.current(); if (e.key === 'ArrowLeft') handlePrevRef.current(); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, []);
      const togglePlay = () => { if (isEnd) { setCurrentStepIdx(0); setIsPlaying(true); return; } setIsPlaying(prev => !prev); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm text-slate-500">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum V-1-2</span>
            </nav>

            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-xl md:text-2xl font-bold text-slate-800 mb-2">Chapter 5-2. 템플릿을 쓰면 뭐가 달라지나</h1>
              <p className="text-slate-600 text-sm leading-relaxed">
                아키텍처 패턴은 <strong>"어떤 코드는 어디에 넣는다"</strong>는 규칙집이다.
                음식점 주방에서 <strong>"고기는 냉장고, 양념은 선반, 완성품은 조리대"</strong>라는 자리 규칙이 있으면
                어떤 요리사가 들어와도 헤매지 않는다.
              </p>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              {/* ── 좌측: 폴더 구조 시각화 ── */}
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
                <div className="flex items-center justify-between">
                  <h2 className="text-sm font-bold text-slate-600">프로젝트 구조</h2>
                  <span className={`text-xs font-bold px-2.5 py-1 rounded-full border ${PHASE_BADGE_CLASS[stepData.phase]}`}>
                    {PHASE_BADGE_LABEL[stepData.phase]}
                  </span>
                </div>

                {/* 폴더 트리 */}
                <div className="space-y-1 font-mono text-sm">
                  {stepData.folders.map((item, idx) => (
                    <div
                      key={idx}
                      className={`px-3 py-1.5 rounded border transition-all duration-300 ${FOLDER_CLASS[item.state]}`}
                      style={{ marginLeft: `${item.depth * 1.25}rem` }}
                    >
                      <span className="mr-2">{item.type === 'dir' ? '📁' : '📄'}</span>
                      {item.name}
                    </div>
                  ))}
                </div>

                {/* 설명 */}
                <div className="p-4 rounded-lg border bg-blue-50 border-blue-200 text-blue-800 text-sm leading-relaxed">
                  <div className="font-bold mb-1">{stepData.title}</div>
                  {stepData.desc}
                </div>
              </div>

              {/* ── 우측: 코드 뷰어 ── */}
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between items-center">
                  <span>{stepData.codeTitle}</span>
                  <span className="text-slate-500">Step {currentStepIdx + 1} / {STEPS.length}</span>
                </div>
                <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
                  {stepData.codeLines.map((line, idx) => {
                    const bgClass = `${TAG_BG[line.tag]} border-l-4 ${TAG_BORDER[line.tag]}`;
                    return (
                      <div key={idx} className={`px-4 py-0.5 whitespace-pre transition-all duration-300 ${bgClass}`}>
                        <span className="inline-block w-6 text-right mr-3 text-slate-400 select-none">{idx + 1}</span>
                        {line.code || '\u00A0'}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* ── 컨트롤 ── */}
            <div className="flex items-center justify-center gap-3 flex-wrap">
              <button onClick={() => handlePrevRef.current()} disabled={currentStepIdx === 0} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="이전 단계">← 이전</button>
              <button onClick={togglePlay} className={`px-6 py-2 rounded-lg font-bold text-sm transition-colors ${isPlaying ? 'bg-amber-500 text-white hover:bg-amber-600' : 'bg-emerald-600 text-white hover:bg-emerald-700'}`} aria-label={isPlaying ? '정지' : (isEnd ? '처음부터 재생' : '자동 실행')}>{isPlaying ? '⏸ 정지' : (isEnd ? '⟳ 처음부터' : '▶ 자동 실행')}</button>
              <button onClick={() => handleNextRef.current()} disabled={isEnd} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="다음 단계">다음 →</button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <footer className="text-center text-xs text-slate-400 py-4">FastAPI 인터랙티브 학습 — Chapter 5-2. 템플릿(패턴) 효과 | 키보드 ← → 지원</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
