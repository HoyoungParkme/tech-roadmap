<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 인터랙티브 학습 — Chapter 5-6. 3계층 아키텍처</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const LAYERS = ['controller', 'service', 'repository', 'db'];
    const LAYER_LABEL = { controller: 'Controller', service: 'Service', repository: 'Repository', db: 'DB' };
    const LAYER_DESC = { controller: 'HTTP 요청 수신, 파라미터 추출', service: '비즈니스 규칙, 여러 Repo 조합', repository: 'DB 쿼리, ORM 조작', db: '데이터 저장소' };

    const LAYER_CLASS = {
      idle:    { controller: 'bg-slate-100 border-slate-300 text-slate-500', service: 'bg-slate-100 border-slate-300 text-slate-500', repository: 'bg-slate-100 border-slate-300 text-slate-500', db: 'bg-slate-100 border-slate-300 text-slate-500' },
      active:  { controller: 'bg-blue-100 border-blue-400 text-blue-700 ring-2 ring-blue-300', service: 'bg-amber-100 border-amber-400 text-amber-700 ring-2 ring-amber-300', repository: 'bg-emerald-100 border-emerald-400 text-emerald-700 ring-2 ring-emerald-300', db: 'bg-violet-100 border-violet-400 text-violet-700 ring-2 ring-violet-300' },
      done:    { controller: 'bg-blue-50 border-blue-300 text-blue-600', service: 'bg-amber-50 border-amber-300 text-amber-600', repository: 'bg-emerald-50 border-emerald-300 text-emerald-600', db: 'bg-violet-50 border-violet-300 text-violet-600' },
    };

    const STEPS = [
      {
        title: 'HTTP 요청 도착',
        desc: '[요청 → Controller] 사용자가 POST /orders 요청을 보낸다. Controller(Router)가 HTTP 파라미터를 꺼내고, 나머지는 Service에 넘긴다. Controller에 DB 쿼리나 비즈니스 계산을 넣으면 안 된다.',
        states: { controller: 'active', service: 'idle', repository: 'idle', db: 'idle' },
        arrow: 'down-1',
        codeIdx: 0,
      },
      {
        title: 'Controller → Service',
        desc: '[Service] Controller에서 꺼낸 데이터를 Service에 전달한다. Service는 비즈니스 규칙(할인 계산, 권한 체크)을 적용한다. HTTP 상태코드나 ORM을 직접 호출하지 않는다.',
        states: { controller: 'done', service: 'active', repository: 'idle', db: 'idle' },
        arrow: 'down-2',
        codeIdx: 1,
      },
      {
        title: 'Service → Repository',
        desc: '[Repository] Service가 처리한 데이터를 Repository에 넘긴다. Repository는 DB 쿼리와 ORM 조작만 담당한다. 비즈니스 판단이나 HTTP 개념을 넣으면 안 된다.',
        states: { controller: 'done', service: 'done', repository: 'active', db: 'idle' },
        arrow: 'down-3',
        codeIdx: 2,
      },
      {
        title: 'Repository → DB',
        desc: '[DB] Repository가 ORM으로 DB에 데이터를 저장하거나 조회한다. 실제 SQL이 실행되는 지점이다.',
        states: { controller: 'done', service: 'done', repository: 'done', db: 'active' },
        arrow: 'down-4',
        codeIdx: 3,
      },
      {
        title: '응답 — 단방향 흐름의 핵심',
        desc: '[응답] 결과가 DB → Repository → Service → Controller 역방향으로 올라온다. 핵심 규칙: 계층 건너뛰기(Controller가 Repository 직접 호출) 금지. 항상 Controller → Service → Repository 순서를 지킨다.',
        states: { controller: 'done', service: 'done', repository: 'done', db: 'done' },
        arrow: 'up-all',
        codeIdx: 4,
      },
    ];

    const CODE_SECTIONS = [
      { label: 'routers/order_router.py', tag: 'controller', lines: ['@router.post("/orders")', 'def create_order(data: OrderCreate):', '    result = order_service.create(data)', '    return result'] },
      { label: 'services/order_service.py', tag: 'service', lines: ['def create(data: OrderCreate):', '    apply_discount(data)', '    check_stock(data)', '    return order_repo.save(data)'] },
      { label: 'repositories/order_repo.py', tag: 'repository', lines: ['def save(data: OrderCreate):', '    order = Order(**data.dict())', '    db.add(order)', '    db.commit()', '    return order'] },
      { label: 'DB (SQLite/PostgreSQL)', tag: 'db', lines: ['-- INSERT INTO orders', '--   (item, qty, total)', '--   VALUES (...)', '-- COMMIT'] },
      { label: '응답 흐름 (역방향)', tag: 'all', lines: ['# DB → Repository: Order 객체 반환', '# Repository → Service: Order 반환', '# Service → Controller: Order 반환', '# Controller → 클라이언트: JSON 응답', '# 계층 건너뛰기 금지!'] },
    ];

    const CODE_TAG_BG = { controller: 'bg-blue-50', service: 'bg-amber-50', repository: 'bg-emerald-50', db: 'bg-violet-50', all: 'bg-slate-50' };
    const CODE_TAG_BORDER = { controller: 'border-blue-300', service: 'border-amber-300', repository: 'border-emerald-300', db: 'border-violet-300', all: 'border-slate-300' };

    const ARROW_LABEL = { 'down-1': '요청 → Controller', 'down-2': 'Controller → Service', 'down-3': 'Service → Repository', 'down-4': 'Repository → DB', 'up-all': 'DB → Repo → Service → Controller → 응답' };
    const ARROW_CLASS = { 'down-1': 'text-blue-600', 'down-2': 'text-amber-600', 'down-3': 'text-emerald-600', 'down-4': 'text-violet-600', 'up-all': 'text-slate-600' };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const stepData = STEPS[currentStepIdx];
      const codeSection = CODE_SECTIONS[stepData.codeIdx];
      const isEnd = currentStepIdx >= STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => prev < STEPS.length - 1 ? prev + 1 : prev); };
      const handlePrev = () => setCurrentStepIdx(prev => (prev > 0 ? prev - 1 : prev));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => { if (!isPlaying) return; const id = setInterval(() => handleNextRef.current(), 2500); return () => clearInterval(id); }, [isPlaying]);
      useEffect(() => { const h = (e) => { if (e.key === 'ArrowRight') handleNextRef.current(); if (e.key === 'ArrowLeft') handlePrevRef.current(); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, []);
      const togglePlay = () => { if (isEnd) { setCurrentStepIdx(0); setIsPlaying(true); return; } setIsPlaying(prev => !prev); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm text-slate-500">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum V-3-1</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-xl md:text-2xl font-bold text-slate-800 mb-2">Chapter 5-6. Controller / Service / Repository</h1>
              <p className="text-slate-600 text-sm leading-relaxed">
                3계층은 코드를 <strong>Controller</strong>(HTTP), <strong>Service</strong>(비즈니스), <strong>Repository</strong>(DB)로 나눈다.
                데이터 흐름은 항상 한 방향: 요청 → Controller → Service → Repository → DB.
                <strong>계층 건너뛰기는 금지</strong>다.
              </p>
            </header>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
                <h2 className="text-sm font-bold text-slate-600">3계층 흐름</h2>
                <div className={`text-center text-sm font-bold py-2 rounded-lg bg-slate-50 border border-slate-200 transition-all duration-300 ${ARROW_CLASS[stepData.arrow]}`}>{ARROW_LABEL[stepData.arrow]}</div>
                <div className="space-y-2">
                  {LAYERS.map(layer => (
                    <div key={layer} className={`p-4 rounded-lg border-2 transition-all duration-300 ${LAYER_CLASS[stepData.states[layer]][layer]}`}>
                      <div className="flex items-center justify-between">
                        <div className="font-bold text-lg">{LAYER_LABEL[layer]}</div>
                        <div className="text-xs font-medium opacity-70">{LAYER_DESC[layer]}</div>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="p-4 rounded-lg border bg-blue-50 border-blue-200 text-blue-800 text-sm leading-relaxed">
                  <div className="font-bold mb-1">{stepData.title}</div>{stepData.desc}
                </div>
              </div>
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between items-center">
                  <span>{codeSection.label}</span>
                  <span className="text-slate-500">Step {currentStepIdx + 1} / {STEPS.length}</span>
                </div>
                <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
                  {codeSection.lines.map((line, idx) => (
                    <div key={idx} className={`px-4 py-0.5 whitespace-pre border-l-4 transition-all duration-300 ${CODE_TAG_BG[codeSection.tag]} ${CODE_TAG_BORDER[codeSection.tag]}`}>
                      <span className="inline-block w-4 text-right mr-3 text-slate-400 select-none">{idx + 1}</span>{line || '\u00A0'}
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div className="flex items-center justify-center gap-3 flex-wrap">
              <button onClick={() => handlePrevRef.current()} disabled={currentStepIdx === 0} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="이전 단계">← 이전</button>
              <button onClick={togglePlay} className={`px-6 py-2 rounded-lg font-bold text-sm transition-colors ${isPlaying ? 'bg-amber-500 text-white hover:bg-amber-600' : 'bg-emerald-600 text-white hover:bg-emerald-700'}`} aria-label={isPlaying ? '정지' : (isEnd ? '처음부터 재생' : '자동 실행')}>{isPlaying ? '⏸ 정지' : (isEnd ? '⟳ 처음부터' : '▶ 자동 실행')}</button>
              <button onClick={() => handleNextRef.current()} disabled={isEnd} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="다음 단계">다음 →</button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>
            <footer className="text-center text-xs text-slate-400 py-4">FastAPI 인터랙티브 학습 — Chapter 5-6. 3계층 아키텍처 | 키보드 ← → 지원</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
