<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 인터랙티브 학습 — Chapter 5-8. APIRouter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Before — main.py에 모든 것',
        desc: '[문제] 모든 엔드포인트가 main.py 하나에 들어있다. 파일이 금방 수백 줄이 된다. 도메인(users, items)이 섞여 있어서 찾기 어렵다.',
        phase: 'before',
        codeLines: [
          { code: '# main.py — 모든 엔드포인트가 여기', tag: 'label' },
          { code: 'from fastapi import FastAPI', tag: 'code' },
          { code: 'app = FastAPI()', tag: 'code' },
          { code: '', tag: 'none' },
          { code: '# 유저 관련', tag: 'user' },
          { code: '@app.get("/users/{user_id}")', tag: 'user' },
          { code: 'def get_user(user_id: int): ...', tag: 'user' },
          { code: '', tag: 'none' },
          { code: '@app.post("/users")', tag: 'user' },
          { code: 'def create_user(data): ...', tag: 'user' },
          { code: '', tag: 'none' },
          { code: '# 아이템 관련', tag: 'item' },
          { code: '@app.get("/items/{item_id}")', tag: 'item' },
          { code: 'def get_item(item_id: int): ...', tag: 'item' },
          { code: '', tag: 'none' },
          { code: '@app.post("/items")', tag: 'item' },
          { code: 'def create_item(data): ...', tag: 'item' },
          { code: '# ... 점점 길어진다', tag: 'label' },
        ],
        files: [
          { name: 'app/', depth: 0, type: 'dir', state: 'normal' },
          { name: 'main.py  (모든 코드!)', depth: 1, type: 'file', state: 'highlight' },
        ],
      },
      {
        title: 'APIRouter로 분리',
        desc: '[분리] APIRouter를 사용해 도메인별로 파일을 나눈다. users.py에는 유저 관련, items.py에는 아이템 관련만 넣는다. 각 파일이 하나의 도메인을 담당한다.',
        phase: 'split',
        codeLines: [
          { code: '# routers/users.py', tag: 'label' },
          { code: 'from fastapi import APIRouter', tag: 'user' },
          { code: '', tag: 'none' },
          { code: 'router = APIRouter(', tag: 'user' },
          { code: '    prefix="/users",', tag: 'user' },
          { code: '    tags=["users"]', tag: 'user' },
          { code: ')', tag: 'user' },
          { code: '', tag: 'none' },
          { code: '@router.get("/{user_id}")', tag: 'user' },
          { code: 'def get_user(user_id: int): ...', tag: 'user' },
          { code: '', tag: 'none' },
          { code: '@router.post("/")', tag: 'user' },
          { code: 'def create_user(data): ...', tag: 'user' },
        ],
        files: [
          { name: 'app/', depth: 0, type: 'dir', state: 'normal' },
          { name: 'main.py', depth: 1, type: 'file', state: 'normal' },
          { name: 'routers/', depth: 1, type: 'dir', state: 'highlight' },
          { name: 'users.py', depth: 2, type: 'file', state: 'highlight' },
          { name: 'items.py', depth: 2, type: 'file', state: 'highlight' },
        ],
      },
      {
        title: 'main.py에서 등록',
        desc: '[등록] main.py에서 include_router로 각 라우터를 등록한다. prefix="/users"를 설정하면 라우터 안의 모든 경로에 /users가 자동으로 붙는다. tags는 Swagger UI에서 그룹 이름이 된다.',
        phase: 'register',
        codeLines: [
          { code: '# main.py — 깔끔해졌다!', tag: 'label' },
          { code: 'from fastapi import FastAPI', tag: 'code' },
          { code: 'from app.routers import users, items', tag: 'code' },
          { code: '', tag: 'none' },
          { code: 'app = FastAPI()', tag: 'code' },
          { code: '', tag: 'none' },
          { code: '# 라우터 등록', tag: 'label' },
          { code: 'app.include_router(users.router)', tag: 'user' },
          { code: 'app.include_router(items.router)', tag: 'item' },
          { code: '', tag: 'none' },
          { code: '# prefix="/users" → /users/{user_id}', tag: 'label' },
          { code: '# prefix="/items" → /items/{item_id}', tag: 'label' },
          { code: '# tags → Swagger UI 그룹 이름', tag: 'label' },
        ],
        files: [
          { name: 'app/', depth: 0, type: 'dir', state: 'normal' },
          { name: 'main.py  ← include_router', depth: 1, type: 'file', state: 'highlight' },
          { name: 'routers/', depth: 1, type: 'dir', state: 'normal' },
          { name: 'users.py', depth: 2, type: 'file', state: 'normal' },
          { name: 'items.py', depth: 2, type: 'file', state: 'normal' },
        ],
      },
      {
        title: '결과 — 파일별 책임 분리',
        desc: '[완성] 각 파일이 하나의 도메인(Controller)을 담당한다. 새 도메인이 생기면 routers/ 폴더에 파일 하나만 추가하고 main.py에 한 줄(include_router)만 추가하면 된다. Swagger UI에서도 도메인별로 정리된다.',
        phase: 'result',
        codeLines: [
          { code: '# ──── 정리 ────', tag: 'label' },
          { code: '', tag: 'none' },
          { code: '# Before:', tag: 'label' },
          { code: '#   main.py 1개에 모든 엔드포인트', tag: 'label' },
          { code: '#   → 수백 줄, 도메인 혼재', tag: 'label' },
          { code: '', tag: 'none' },
          { code: '# After:', tag: 'label' },
          { code: '#   routers/users.py — 유저 도메인만', tag: 'user' },
          { code: '#   routers/items.py — 아이템 도메인만', tag: 'item' },
          { code: '#   main.py — include_router 등록만', tag: 'code' },
          { code: '', tag: 'none' },
          { code: '# 이 라우터 파일 = 3계층의 Controller!', tag: 'label' },
        ],
        files: [
          { name: 'app/', depth: 0, type: 'dir', state: 'highlight' },
          { name: 'main.py  (등록만)', depth: 1, type: 'file', state: 'normal' },
          { name: 'routers/', depth: 1, type: 'dir', state: 'highlight' },
          { name: 'users.py  = Controller', depth: 2, type: 'file', state: 'highlight' },
          { name: 'items.py  = Controller', depth: 2, type: 'file', state: 'highlight' },
          { name: 'orders.py  (새 도메인? 파일 추가!)', depth: 2, type: 'file', state: 'highlight' },
        ],
      },
    ];

    const FOLDER_CLASS = { normal: 'bg-slate-50 border-slate-300 text-slate-700', highlight: 'bg-amber-50 border-amber-300 text-amber-800 font-bold' };
    const CODE_TAG_BG = { label: 'bg-slate-100', code: 'bg-white', user: 'bg-blue-50', item: 'bg-emerald-50', none: 'bg-white' };
    const CODE_TAG_BORDER = { label: 'border-slate-300', code: 'border-transparent', user: 'border-blue-300', item: 'border-emerald-300', none: 'border-transparent' };
    const PHASE_BADGE_CLASS = { before: 'bg-red-100 text-red-700 border-red-300', split: 'bg-amber-100 text-amber-700 border-amber-300', register: 'bg-blue-100 text-blue-700 border-blue-300', result: 'bg-emerald-100 text-emerald-700 border-emerald-300' };
    const PHASE_BADGE_LABEL = { before: 'Before', split: '분리', register: '등록', result: '완성' };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx >= STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => prev < STEPS.length - 1 ? prev + 1 : prev); };
      const handlePrev = () => setCurrentStepIdx(prev => (prev > 0 ? prev - 1 : prev));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => { if (!isPlaying) return; const id = setInterval(() => handleNextRef.current(), 3000); return () => clearInterval(id); }, [isPlaying]);
      useEffect(() => { const h = (e) => { if (e.key === 'ArrowRight') handleNextRef.current(); if (e.key === 'ArrowLeft') handlePrevRef.current(); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, []);
      const togglePlay = () => { if (isEnd) { setCurrentStepIdx(0); setIsPlaying(true); return; } setIsPlaying(prev => !prev); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm text-slate-500">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum V-3-3</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-xl md:text-2xl font-bold text-slate-800 mb-2">Chapter 5-8. APIRouter로 Controller 나누기</h1>
              <p className="text-slate-600 text-sm leading-relaxed">
                모든 엔드포인트를 <code className="text-xs bg-slate-100 px-1 rounded">main.py</code> 하나에 넣으면 금방 수백 줄.
                <strong>APIRouter</strong>를 쓰면 도메인별로 파일을 나눌 수 있다. 이렇게 나뉜 라우터 파일이 3계층의 Controller다.
              </p>
            </header>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
                <div className="flex items-center justify-between">
                  <h2 className="text-sm font-bold text-slate-600">파일 구조</h2>
                  <span className={`text-xs font-bold px-2.5 py-1 rounded-full border ${PHASE_BADGE_CLASS[stepData.phase]}`}>{PHASE_BADGE_LABEL[stepData.phase]}</span>
                </div>
                <div className="space-y-1 font-mono text-sm">
                  {stepData.files.map((item, idx) => (
                    <div key={idx} className={`px-3 py-1.5 rounded border transition-all duration-300 ${FOLDER_CLASS[item.state]}`} style={{ marginLeft: `${item.depth * 1.25}rem` }}>
                      <span className="mr-2">{item.type === 'dir' ? '📁' : '📄'}</span>{item.name}
                    </div>
                  ))}
                </div>
                <div className="p-4 rounded-lg border bg-blue-50 border-blue-200 text-blue-800 text-sm leading-relaxed">
                  <div className="font-bold mb-1">{stepData.title}</div>{stepData.desc}
                </div>
              </div>
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between items-center">
                  <span>{{ before: 'main.py (모든 코드)', split: 'routers/users.py', register: 'main.py (등록)', result: '정리' }[stepData.phase]}</span>
                  <span className="text-slate-500">Step {currentStepIdx + 1} / {STEPS.length}</span>
                </div>
                <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
                  {stepData.codeLines.map((line, idx) => (
                    <div key={idx} className={`px-4 py-0.5 whitespace-pre border-l-4 transition-all duration-300 ${CODE_TAG_BG[line.tag]} ${CODE_TAG_BORDER[line.tag]}`}>
                      <span className="inline-block w-4 text-right mr-3 text-slate-400 select-none">{idx + 1}</span>{line.code || '\u00A0'}
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div className="flex items-center justify-center gap-3 flex-wrap">
              <button onClick={() => handlePrevRef.current()} disabled={currentStepIdx === 0} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="이전 단계">← 이전</button>
              <button onClick={togglePlay} className={`px-6 py-2 rounded-lg font-bold text-sm transition-colors ${isPlaying ? 'bg-amber-500 text-white hover:bg-amber-600' : 'bg-emerald-600 text-white hover:bg-emerald-700'}`} aria-label={isPlaying ? '정지' : (isEnd ? '처음부터 재생' : '자동 실행')}>{isPlaying ? '⏸ 정지' : (isEnd ? '⟳ 처음부터' : '▶ 자동 실행')}</button>
              <button onClick={() => handleNextRef.current()} disabled={isEnd} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="다음 단계">다음 →</button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>
            <footer className="text-center text-xs text-slate-400 py-4">FastAPI 인터랙티브 학습 — Chapter 5-8. APIRouter | 키보드 ← → 지원</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
