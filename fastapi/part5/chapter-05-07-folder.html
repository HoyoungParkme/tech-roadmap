<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 인터랙티브 학습 — Chapter 5-7. 프로젝트 폴더 구조</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const FILE_STATE = { normal: 'normal', highlight: 'highlight', dim: 'dim' };

    const STEPS = [
      {
        title: '전체 구조 한눈에',
        desc: '[개요] 커뮤니티에서 가장 흔히 쓰는 FastAPI 3계층 폴더 구조다. main.py가 앱을 시작하고, 나머지 폴더들이 각 계층의 역할을 담당한다.',
        folders: [
          { name: 'app/', depth: 0, type: 'dir', state: FILE_STATE.highlight },
          { name: 'main.py', depth: 1, type: 'file', state: FILE_STATE.highlight },
          { name: 'core/', depth: 1, type: 'dir', state: FILE_STATE.normal },
          { name: 'routers/', depth: 1, type: 'dir', state: FILE_STATE.normal },
          { name: 'services/', depth: 1, type: 'dir', state: FILE_STATE.normal },
          { name: 'repositories/', depth: 1, type: 'dir', state: FILE_STATE.normal },
          { name: 'models/', depth: 1, type: 'dir', state: FILE_STATE.normal },
          { name: 'schemas/', depth: 1, type: 'dir', state: FILE_STATE.normal },
        ],
        codeTitle: 'main.py — 앱 시작점',
        codeLines: [
          { code: '# app/main.py', tag: 'label' },
          { code: 'from fastapi import FastAPI', tag: 'code' },
          { code: 'from app.routers import users, items', tag: 'code' },
          { code: '', tag: 'none' },
          { code: 'app = FastAPI()', tag: 'code' },
          { code: 'app.include_router(users.router)', tag: 'code' },
          { code: 'app.include_router(items.router)', tag: 'code' },
        ],
      },
      {
        title: 'routers/ = Controller 계층',
        desc: '[Controller] routers/ 폴더에 APIRouter 파일들이 있다. HTTP 요청을 받고 응답을 돌려주는 역할만 한다. DB 쿼리나 비즈니스 계산을 여기에 넣으면 안 된다.',
        folders: [
          { name: 'app/', depth: 0, type: 'dir', state: FILE_STATE.dim },
          { name: 'main.py', depth: 1, type: 'file', state: FILE_STATE.dim },
          { name: 'core/', depth: 1, type: 'dir', state: FILE_STATE.dim },
          { name: 'routers/  ← Controller', depth: 1, type: 'dir', state: FILE_STATE.highlight },
          { name: 'users.py', depth: 2, type: 'file', state: FILE_STATE.highlight },
          { name: 'items.py', depth: 2, type: 'file', state: FILE_STATE.highlight },
          { name: 'services/', depth: 1, type: 'dir', state: FILE_STATE.dim },
          { name: 'repositories/', depth: 1, type: 'dir', state: FILE_STATE.dim },
          { name: 'models/', depth: 1, type: 'dir', state: FILE_STATE.dim },
          { name: 'schemas/', depth: 1, type: 'dir', state: FILE_STATE.dim },
        ],
        codeTitle: 'routers/users.py — Controller',
        codeLines: [
          { code: '# app/routers/users.py', tag: 'label' },
          { code: 'from fastapi import APIRouter', tag: 'code' },
          { code: '', tag: 'none' },
          { code: 'router = APIRouter(prefix="/users")', tag: 'code' },
          { code: '', tag: 'none' },
          { code: '@router.get("/{user_id}")', tag: 'code' },
          { code: 'def get_user(user_id: int):', tag: 'code' },
          { code: '    return user_service.get(user_id)', tag: 'code' },
          { code: '    # DB 쿼리는 여기서 하지 않는다!', tag: 'comment' },
        ],
      },
      {
        title: 'services/ + repositories/',
        desc: '[비즈니스 + DB] services/는 비즈니스 규칙, repositories/는 DB 접근만. Service가 여러 Repository를 조합할 수 있지만, Repository는 Service를 호출하면 안 된다 (단방향).',
        folders: [
          { name: 'app/', depth: 0, type: 'dir', state: FILE_STATE.dim },
          { name: 'main.py', depth: 1, type: 'file', state: FILE_STATE.dim },
          { name: 'core/', depth: 1, type: 'dir', state: FILE_STATE.dim },
          { name: 'routers/', depth: 1, type: 'dir', state: FILE_STATE.dim },
          { name: 'services/  ← 비즈니스', depth: 1, type: 'dir', state: FILE_STATE.highlight },
          { name: 'user_service.py', depth: 2, type: 'file', state: FILE_STATE.highlight },
          { name: 'repositories/  ← DB', depth: 1, type: 'dir', state: FILE_STATE.highlight },
          { name: 'user_repo.py', depth: 2, type: 'file', state: FILE_STATE.highlight },
          { name: 'models/', depth: 1, type: 'dir', state: FILE_STATE.dim },
          { name: 'schemas/', depth: 1, type: 'dir', state: FILE_STATE.dim },
        ],
        codeTitle: 'services/ + repositories/',
        codeLines: [
          { code: '# services/user_service.py', tag: 'label' },
          { code: 'def get(user_id: int):', tag: 'code' },
          { code: '    user = user_repo.find_by_id(user_id)', tag: 'code' },
          { code: '    if not user:', tag: 'code' },
          { code: '        raise NotFound("유저 없음")', tag: 'code' },
          { code: '    return user', tag: 'code' },
          { code: '', tag: 'none' },
          { code: '# repositories/user_repo.py', tag: 'label' },
          { code: 'def find_by_id(user_id: int):', tag: 'code' },
          { code: '    return db.query(User).get(user_id)', tag: 'code' },
        ],
      },
      {
        title: 'models/ vs schemas/ — 왜 분리?',
        desc: '[타입 분리] models/는 DB 테이블(SQLAlchemy), schemas/는 API 타입(Pydantic). 왜 분리? DB에는 비밀번호 해시가 있지만 API 응답에서는 제거해야 하니까. DB 구조 ≠ API 응답.',
        folders: [
          { name: 'app/', depth: 0, type: 'dir', state: FILE_STATE.dim },
          { name: 'main.py', depth: 1, type: 'file', state: FILE_STATE.dim },
          { name: 'core/', depth: 1, type: 'dir', state: FILE_STATE.dim },
          { name: 'routers/', depth: 1, type: 'dir', state: FILE_STATE.dim },
          { name: 'services/', depth: 1, type: 'dir', state: FILE_STATE.dim },
          { name: 'repositories/', depth: 1, type: 'dir', state: FILE_STATE.dim },
          { name: 'models/  ← DB 테이블', depth: 1, type: 'dir', state: FILE_STATE.highlight },
          { name: 'user.py  (SQLAlchemy)', depth: 2, type: 'file', state: FILE_STATE.highlight },
          { name: 'schemas/  ← API 타입', depth: 1, type: 'dir', state: FILE_STATE.highlight },
          { name: 'user.py  (Pydantic)', depth: 2, type: 'file', state: FILE_STATE.highlight },
        ],
        codeTitle: 'models/ vs schemas/',
        codeLines: [
          { code: '# models/user.py (DB 테이블)', tag: 'label' },
          { code: 'class User(Base):', tag: 'code' },
          { code: '    id = Column(Integer, primary_key=True)', tag: 'code' },
          { code: '    email = Column(String)', tag: 'code' },
          { code: '    hashed_pw = Column(String)  # DB에만!', tag: 'highlight' },
          { code: '', tag: 'none' },
          { code: '# schemas/user.py (API 응답)', tag: 'label' },
          { code: 'class UserOut(BaseModel):', tag: 'code' },
          { code: '    id: int', tag: 'code' },
          { code: '    email: str', tag: 'code' },
          { code: '    # hashed_pw 없음 → API 응답에서 제거!', tag: 'highlight' },
        ],
      },
    ];

    const FOLDER_CLASS = {
      normal:    'bg-slate-50 border-slate-300 text-slate-700',
      highlight: 'bg-amber-50 border-amber-300 text-amber-800 font-bold',
      dim:       'bg-slate-50 border-slate-200 text-slate-400',
    };
    const CODE_TAG_BG = { label: 'bg-slate-100', code: 'bg-white', comment: 'bg-blue-50', highlight: 'bg-amber-50', none: 'bg-white' };
    const CODE_TAG_BORDER = { label: 'border-slate-300', code: 'border-transparent', comment: 'border-blue-200', highlight: 'border-amber-300', none: 'border-transparent' };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx >= STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => prev < STEPS.length - 1 ? prev + 1 : prev); };
      const handlePrev = () => setCurrentStepIdx(prev => (prev > 0 ? prev - 1 : prev));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => { if (!isPlaying) return; const id = setInterval(() => handleNextRef.current(), 3000); return () => clearInterval(id); }, [isPlaying]);
      useEffect(() => { const h = (e) => { if (e.key === 'ArrowRight') handleNextRef.current(); if (e.key === 'ArrowLeft') handlePrevRef.current(); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, []);
      const togglePlay = () => { if (isEnd) { setCurrentStepIdx(0); setIsPlaying(true); return; } setIsPlaying(prev => !prev); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm text-slate-500">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum V-3-2</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-xl md:text-2xl font-bold text-slate-800 mb-2">Chapter 5-7. FastAPI 프로젝트 폴더 구조</h1>
              <p className="text-slate-600 text-sm leading-relaxed">
                3계층 규칙에 맞는 FastAPI 폴더 구조. <strong>routers/</strong>(Controller), <strong>services/</strong>(비즈니스),
                <strong>repositories/</strong>(DB), <strong>models/</strong>(DB 테이블), <strong>schemas/</strong>(API 타입).
              </p>
            </header>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
                <h2 className="text-sm font-bold text-slate-600">프로젝트 구조</h2>
                <div className="space-y-1 font-mono text-sm">
                  {stepData.folders.map((item, idx) => (
                    <div key={idx} className={`px-3 py-1.5 rounded border transition-all duration-300 ${FOLDER_CLASS[item.state]}`} style={{ marginLeft: `${item.depth * 1.25}rem` }}>
                      <span className="mr-2">{item.type === 'dir' ? '📁' : '📄'}</span>{item.name}
                    </div>
                  ))}
                </div>
                <div className="p-4 rounded-lg border bg-blue-50 border-blue-200 text-blue-800 text-sm leading-relaxed">
                  <div className="font-bold mb-1">{stepData.title}</div>{stepData.desc}
                </div>
              </div>
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between items-center">
                  <span>{stepData.codeTitle}</span>
                  <span className="text-slate-500">Step {currentStepIdx + 1} / {STEPS.length}</span>
                </div>
                <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
                  {stepData.codeLines.map((line, idx) => (
                    <div key={idx} className={`px-4 py-0.5 whitespace-pre border-l-4 transition-all duration-300 ${CODE_TAG_BG[line.tag]} ${CODE_TAG_BORDER[line.tag]}`}>
                      <span className="inline-block w-4 text-right mr-3 text-slate-400 select-none">{idx + 1}</span>{line.code || '\u00A0'}
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div className="flex items-center justify-center gap-3 flex-wrap">
              <button onClick={() => handlePrevRef.current()} disabled={currentStepIdx === 0} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="이전 단계">← 이전</button>
              <button onClick={togglePlay} className={`px-6 py-2 rounded-lg font-bold text-sm transition-colors ${isPlaying ? 'bg-amber-500 text-white hover:bg-amber-600' : 'bg-emerald-600 text-white hover:bg-emerald-700'}`} aria-label={isPlaying ? '정지' : (isEnd ? '처음부터 재생' : '자동 실행')}>{isPlaying ? '⏸ 정지' : (isEnd ? '⟳ 처음부터' : '▶ 자동 실행')}</button>
              <button onClick={() => handleNextRef.current()} disabled={isEnd} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="다음 단계">다음 →</button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>
            <footer className="text-center text-xs text-slate-400 py-4">FastAPI 인터랙티브 학습 — Chapter 5-7. 폴더 구조 | 키보드 ← → 지원</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
