        desc: '"정답 하나"는 없다. 프로젝트 규모와 팀 크기에 맞춰 선택한다. ① 데모/PoC: flat. ② 1~10명 팀, 도메인 3~10개: feature-based (가장 무난). ③ Spring Boot 출신 팀, 도메인 5개 이하: layer-based. ④ 큰 모놀리식, MSA 분리 예정: domain-based. 그리고 어떤 구조를 쓰든 main.py / core/ / 도메인 폴더(들) / tests/ 의 큰 뼈대는 비슷하다. 처음엔 feature-based로 시작해서, 도메인이 5개 넘으면 domain-based로 점진적으로 옮기는 것이 안전한 길이다.',
        trees: [
          {
            title: '⭐ 추천 (중·대형 FastAPI 표준)',
            root: 'app/',
            nodes: [
              { name: 'main.py', depth: 1, type: 'file', kind: 'entry' },
              { name: 'core/', depth: 1, type: 'dir', kind: 'core' },
              { name: 'config.py', depth: 2, type: 'file', kind: 'normal' },
              { name: 'database.py', depth: 2, type: 'file', kind: 'normal' },
              { name: 'security.py', depth: 2, type: 'file', kind: 'normal' },
              { name: 'users/', depth: 1, type: 'dir', kind: 'feature' },
              { name: 'router.py', depth: 2, type: 'file', kind: 'normal' },
              { name: 'service.py', depth: 2, type: 'file', kind: 'normal' },
              { name: 'orders/', depth: 1, type: 'dir', kind: 'feature' },
              { name: 'router.py', depth: 2, type: 'file', kind: 'normal' },
              { name: 'service.py', depth: 2, type: 'file', kind: 'normal' },
              { name: 'tests/', depth: 1, type: 'dir', kind: 'tests' },
            ],
          },
        ],
        note: '✅ 처음엔 feature-based, 도메인 5개+ 넘으면 domain-based 로 점진 이동.',
        recommend: {
          title: '규모별 권장표',
          rows: [
            { scale: '데모 / PoC (파일 < 10)', pick: 'flat', why: '빠른 시작이 최우선' },
            { scale: '소·중형 (도메인 3~10)', pick: 'feature-based ⭐', why: '가장 무난, FastAPI 표준' },
            { scale: 'Spring 출신 팀, 도메인 < 5', pick: 'layer-based', why: '계층 책임 익숙' },
            { scale: '대형 / MSA 분리 예정', pick: 'domain-based', why: 'DDD · Bounded Context' },
          ],
        },
        pros: [
          'main.py / core/ / 도메인 폴더 / tests/ 는 어떤 구조든 공통',
          '처음 feature-based 로 시작 → 5도메인 넘으면 domain-based 로 이동',
          'tests/ 는 항상 별도. tests/users/ tests/orders/ 처럼 도메인 미러링',
        ],
        keyPoint: '구조는 규모에 따라 진화한다. flat→feature→domain 순서가 안전한 길.',
        code: {
          lang: 'plaintext',
          filename: 'recommend.tree',
          lines: [
            '# Step 5. 추천 — 규모별 선택 가이드',
            '# "정답 하나" 는 없다. 규모와 팀에 맞춰 선택한다.',
            '',
            '# ───── 소·중형 (도메인 3~10) ⭐ 가장 흔한 케이스 ─────',
            '#   → feature-based. FastAPI 공식 권장.',
            '',
            'app/',
            '├── main.py',
            '├── core/                 # 공통 설정·인프라',
            '│   ├── config.py',
            '│   ├── database.py',
            '│   └── security.py',
            '│',
            '├── users/                # ★ 도메인 1',
            '│   ├── router.py',
            '│   ├── service.py',
            '│   ├── repository.py',
            '│   ├── models.py',
            '│   └── schemas.py',
            '│',
            '├── orders/               # ★ 도메인 2 (구조 동일)',
            '│   └── ...',
            '│',
            '└── tests/                # ★ tests 는 항상 별도, 도메인 미러링',
            '    ├── conftest.py',
            '    ├── users/',
            '    └── orders/',
            '',
            '# ───── 진화 경로 ─────',
            '#  flat → feature-based → domain-based',
            '#  (도메인 5개 넘기 전에 feature-based 로 옮긴다)',
            '#  (도메인 10개 넘기면 domain-based 검토)',
            '',
            '# ───── 어떤 구조든 공통되는 4가지 뼈대 ─────',
            '#  ① main.py — 앱 시작점, router include',
            '#  ② core/   — 설정·DB·보안 등 공통 인프라',
            '#  ③ 도메인 폴더(들) — feature OR layer OR domain',
            '#  ④ tests/  — 항상 별도, 도메인 구조를 미러링',
          ],
          highlight: [4, 5, 7, 8, 9, 10, 11, 12, 14, 15, 16, 17, 18, 19, 21, 22, 25, 26, 27, 28, 30, 31, 32, 33, 35, 36, 37, 38, 39, 40],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤 (폴더 트리)
    // ─────────────────────────────────────────────────────
    const KIND_STYLE = {
      entry:   { icon: '🚀', text: 'text-indigo-700',   badge: 'bg-indigo-200 text-indigo-800',  label: 'entry' },
      big:     { icon: '⚠️', text: 'text-rose-700',     badge: 'bg-rose-200 text-rose-800',      label: '비대' },
      normal:  { icon: '📄', text: 'text-slate-700',    badge: '',                               label: '' },
      feature: { icon: '📦', text: 'text-emerald-700',  badge: 'bg-emerald-200 text-emerald-800', label: 'feature' },
      layer:   { icon: '🧱', text: 'text-sky-700',      badge: 'bg-sky-200 text-sky-800',        label: 'layer' },
      domain:  { icon: '🏛️', text: 'text-violet-700',   badge: 'bg-violet-200 text-violet-800',  label: 'domain' },
      core:    { icon: '⚙️', text: 'text-amber-700',    badge: 'bg-amber-200 text-amber-800',    label: 'core' },
      tests:   { icon: '🧪', text: 'text-teal-700',     badge: 'bg-teal-200 text-teal-800',      label: 'tests' },
    };

    function TreeNode({ node }) {
      const s = KIND_STYLE[node.kind] || KIND_STYLE.normal;
      const indent = node.depth * 16;
      const isDir = node.type === 'dir';
      return (
        <div
          className="flex items-center gap-1.5 py-0.5 text-sm font-mono"
          style={{ paddingLeft: `${indent}px` }}
        >
          <span className="text-xs">{isDir ? '📁' : s.icon}</span>
          <span className={`${s.text} ${isDir ? 'font-bold' : ''}`}>{node.name}</span>
          {s.label && (
            <span className={`ml-auto text-[9px] px-1.5 py-0.5 rounded ${s.badge}`}>{s.label}</span>
          )}
        </div>
      );
    }

    function FolderTree({ tree }) {
      return (
        <div className="rounded-lg border border-indigo-200 bg-indigo-50/50 p-3">
          <div className="text-xs font-bold text-indigo-800 mb-2">{tree.title}</div>
          <div className="bg-white rounded border border-indigo-100 p-2">
            <div className="text-sm font-mono font-bold text-indigo-900 mb-1">
              📂 {tree.root}
            </div>
            {tree.nodes.map((n, i) => (
              <TreeNode key={i} node={n} />
            ))}
          </div>
        </div>
      );
    }

    function ProsConsBox({ pros, cons }) {
      if (!pros && !cons) return null;
      return (
        <div className="mt-3 grid grid-cols-1 gap-2">
          {pros && pros.length > 0 && (
            <div className="rounded-lg border border-emerald-300 bg-emerald-50 p-2">
              <div className="text-xs font-bold text-emerald-800 mb-1">✅ 장점</div>
              <ul className="space-y-0.5">
                {pros.map((p, i) => (
                  <li key={i} className="text-xs text-emerald-900 flex gap-1.5">
                    <span className="text-emerald-500">▸</span>
                    <span>{p}</span>
                  </li>
                ))}
              </ul>
            </div>
          )}
          {cons && cons.length > 0 && (
            <div className="rounded-lg border border-rose-300 bg-rose-50 p-2">
              <div className="text-xs font-bold text-rose-800 mb-1">⚠️ 단점</div>
              <ul className="space-y-0.5">
                {cons.map((c, i) => (
                  <li key={i} className="text-xs text-rose-900 flex gap-1.5">
                    <span className="text-rose-500">▸</span>
                    <span>{c}</span>
                  </li>
                ))}
              </ul>
            </div>
          )}
        </div>
      );
    }

    function RecommendBox({ recommend }) {
      if (!recommend) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-indigo-500 bg-gradient-to-br from-indigo-50 to-violet-50 p-3">
          <div className="text-xs font-bold text-indigo-800 mb-2">⭐ {recommend.title}</div>
          <div className="space-y-1.5">
            {recommend.rows.map((r, i) => (
              <div key={i} className="rounded bg-white border border-indigo-200 p-2">
                <div className="flex items-center justify-between mb-0.5">
                  <span className="text-xs font-bold text-indigo-900">{r.scale}</span>
                  <span className="text-[10px] px-1.5 py-0.5 rounded bg-indigo-600 text-white font-bold">
                    {r.pick}
                  </span>
                </div>
                <div className="text-[10px] text-slate-600">{r.why}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">폴더 트리 비교</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 시각화</span>
          </div>
          <div className="space-y-2">
            {state.trees.map((t, i) => (
              <FolderTree key={i} tree={t} />
            ))}
          </div>
          {state.note && (
            <div className="mt-3 text-center text-xs font-bold text-indigo-700 py-2 border-y border-dashed border-indigo-300">
              {state.note}
            </div>
          )}
          <ProsConsBox pros={state.pros} cons={state.cons} />
          <RecommendBox recommend={state.recommend} />
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">5</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter 5-7. 프로젝트 폴더 구조</h1>
                <p className="text-sm text-indigo-800/80">flat → feature → layer → domain → 추천. 5단계 비교</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                flat → feature → layer → domain. 정답은 규모에 따라 다르다. 처음엔 feature-based 로 시작하고, 도메인이 5개를 넘기 시작하면 domain-based 로 점진적으로 이동한다. 어떤 구조든 main.py / core/ / 도메인 폴더(들) / tests/ 네 가지 뼈대는 공통이다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['flat', 'feature-based', 'layer-based', 'domain-based', 'APIRouter', 'core', 'DDD', 'monorepo', 'tests'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./chapter-05-06-layered.html" className="underline hover:no-underline">← 이전: 5-6 레이어드 아키텍처</a>
              <a href="./chapter-05-08-apirouter.html" className="underline hover:no-underline">다음: 5-8 APIRouter 분할 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
