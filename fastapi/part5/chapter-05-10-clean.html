<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 인터랙티브 학습 — Chapter 5-10. 클린 아키텍처</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 4개 동심원: 바깥→안쪽 순서로 Infrastructure, Adapters, UseCases, Domain
    const RINGS = ['infrastructure', 'adapters', 'usecases', 'domain'];
    const RING_LABEL = { infrastructure: 'Infrastructure', adapters: 'Adapters', usecases: 'Use Cases', domain: 'Domain' };
    const RING_DESC = { infrastructure: 'DB, HTTP, 외부 API', adapters: 'Controller, Repository 구현', usecases: '비즈니스 흐름 조율', domain: '순수 비즈니스 규칙' };

    const RING_CLASS = {
      idle:      { infrastructure: 'bg-slate-100 border-slate-300 text-slate-500', adapters: 'bg-slate-100 border-slate-300 text-slate-500', usecases: 'bg-slate-100 border-slate-300 text-slate-500', domain: 'bg-slate-100 border-slate-300 text-slate-500' },
      active:    { infrastructure: 'bg-violet-100 border-violet-400 text-violet-700 ring-2 ring-violet-300', adapters: 'bg-blue-100 border-blue-400 text-blue-700 ring-2 ring-blue-300', usecases: 'bg-amber-100 border-amber-400 text-amber-700 ring-2 ring-amber-300', domain: 'bg-emerald-100 border-emerald-400 text-emerald-700 ring-2 ring-emerald-300' },
      highlight: { infrastructure: 'bg-violet-50 border-violet-300 text-violet-600', adapters: 'bg-blue-50 border-blue-300 text-blue-600', usecases: 'bg-amber-50 border-amber-300 text-amber-600', domain: 'bg-emerald-50 border-emerald-300 text-emerald-600' },
    };

    const STEPS = [
      {
        title: '4개 동심원',
        desc: '[구조] 클린 아키텍처는 4개 원으로 구성된다. 바깥에서 안쪽으로: Infrastructure(DB, HTTP) → Adapters(Controller, Repo 구현) → UseCases(비즈니스 흐름) → Domain(순수 규칙). 가장 안쪽이 가장 중요하다.',
        states: { infrastructure: 'active', adapters: 'active', usecases: 'active', domain: 'active' },
        codeLines: [
          { code: '# 클린 아키텍처 4계층 (동심원)', tag: 'label' },
          { code: '', tag: 'none' },
          { code: '# [바깥] Infrastructure', tag: 'infra' },
          { code: '#   DB 드라이버, HTTP 서버, 외부 API', tag: 'infra' },
          { code: '', tag: 'none' },
          { code: '# [중간] Adapters', tag: 'adapter' },
          { code: '#   Controller, Repository 구현체', tag: 'adapter' },
          { code: '', tag: 'none' },
          { code: '# [중간] Use Cases', tag: 'usecase' },
          { code: '#   비즈니스 흐름 조율 (서비스)', tag: 'usecase' },
          { code: '', tag: 'none' },
          { code: '# [중심] Domain', tag: 'domain' },
          { code: '#   순수 비즈니스 규칙 (엔티티)', tag: 'domain' },
        ],
      },
      {
        title: '의존성은 항상 안쪽으로',
        desc: '[핵심 규칙] 의존성 방향은 항상 안쪽. 바깥이 안쪽을 알 수 있지만, 안쪽이 바깥을 알면 안 된다. Domain은 프레임워크도 DB도 모른다 — 순수한 비즈니스 규칙만.',
        states: { infrastructure: 'highlight', adapters: 'highlight', usecases: 'highlight', domain: 'active' },
        codeLines: [
          { code: '# 의존성 방향: 항상 안쪽으로만!', tag: 'label' },
          { code: '', tag: 'none' },
          { code: '# Infrastructure → Adapters  ✅', tag: 'infra' },
          { code: '# Adapters → UseCases        ✅', tag: 'adapter' },
          { code: '# UseCases → Domain          ✅', tag: 'usecase' },
          { code: '', tag: 'none' },
          { code: '# Domain → UseCases          ❌ 금지!', tag: 'problem' },
          { code: '# Domain → Adapters          ❌ 금지!', tag: 'problem' },
          { code: '# Domain → Infrastructure    ❌ 금지!', tag: 'problem' },
          { code: '', tag: 'none' },
          { code: '# Domain은 아무것도 import하지 않는다', tag: 'domain' },
          { code: '# → 순수 Python 클래스만', tag: 'domain' },
        ],
      },
      {
        title: 'Domain — 순수 비즈니스 규칙',
        desc: '[Domain] 가장 안쪽 원. FastAPI도 SQLAlchemy도 모른다. 순수한 비즈니스 규칙만 담는다. "주문 금액이 10만원 이상이면 10% 할인" 같은 규칙이 여기.',
        states: { infrastructure: 'idle', adapters: 'idle', usecases: 'idle', domain: 'active' },
        codeLines: [
          { code: '# domain/order.py — 순수 비즈니스 규칙', tag: 'label' },
          { code: '', tag: 'none' },
          { code: 'class Order:  # 프레임워크 의존 없음!', tag: 'domain' },
          { code: '    def __init__(self, item, qty, price):', tag: 'domain' },
          { code: '        self.item = item', tag: 'domain' },
          { code: '        self.qty = qty', tag: 'domain' },
          { code: '        self.total = price * qty', tag: 'domain' },
          { code: '', tag: 'none' },
          { code: '    def apply_discount(self):', tag: 'domain' },
          { code: '        if self.total > 100000:', tag: 'domain' },
          { code: '            self.total *= 0.9', tag: 'domain' },
          { code: '', tag: 'none' },
          { code: '# import 없음! 순수 Python만', tag: 'label' },
        ],
      },
      {
        title: '헥사고날과의 관계',
        desc: '[비교] 헥사고날과 목표는 같다 — "비즈니스 로직을 외부에서 격리". 클린 아키텍처는 계층을 더 세밀하게(4개 원) 나누는 방식. 헥사고날의 Port = 클린의 Use Case 경계, Adapter = Adapters 계층.',
        states: { infrastructure: 'highlight', adapters: 'highlight', usecases: 'highlight', domain: 'highlight' },
        codeLines: [
          { code: '# 헥사고날 vs 클린 아키텍처', tag: 'label' },
          { code: '', tag: 'none' },
          { code: '# 헥사고날:', tag: 'label' },
          { code: '#   Adapter → Port → Core', tag: 'adapter' },
          { code: '', tag: 'none' },
          { code: '# 클린 아키텍처:', tag: 'label' },
          { code: '#   Infra → Adapters → UseCases → Domain', tag: 'usecase' },
          { code: '', tag: 'none' },
          { code: '# 목표는 동일:', tag: 'label' },
          { code: '# "비즈니스 로직을 외부에서 격리"', tag: 'domain' },
          { code: '', tag: 'none' },
          { code: '# 클린이 계층을 더 세밀하게 나눈 것', tag: 'label' },
        ],
      },
    ];

    const CODE_TAG_BG = { label: 'bg-slate-100', code: 'bg-white', infra: 'bg-violet-50', adapter: 'bg-blue-50', usecase: 'bg-amber-50', domain: 'bg-emerald-50', problem: 'bg-red-50', none: 'bg-white' };
    const CODE_TAG_BORDER = { label: 'border-slate-300', code: 'border-transparent', infra: 'border-violet-300', adapter: 'border-blue-300', usecase: 'border-amber-300', domain: 'border-emerald-300', problem: 'border-red-300', none: 'border-transparent' };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx >= STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => prev < STEPS.length - 1 ? prev + 1 : prev); };
      const handlePrev = () => setCurrentStepIdx(prev => (prev > 0 ? prev - 1 : prev));
      const handleNextRef = useRef(handleNext);
      const handlePrevRef = useRef(handlePrev);
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => { if (!isPlaying) return; const id = setInterval(() => handleNextRef.current(), 3000); return () => clearInterval(id); }, [isPlaying]);
      useEffect(() => { const h = (e) => { if (e.key === 'ArrowRight') handleNextRef.current(); if (e.key === 'ArrowLeft') handlePrevRef.current(); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, []);
      const togglePlay = () => { if (isEnd) { setCurrentStepIdx(0); setIsPlaying(true); return; } setIsPlaying(prev => !prev); };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm text-slate-500">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum V-4-2</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h1 className="text-xl md:text-2xl font-bold text-slate-800 mb-2">Chapter 5-10. 클린 아키텍처와 의존성 역전</h1>
              <p className="text-slate-600 text-sm leading-relaxed">
                4개 동심원: <strong>Infrastructure → Adapters → UseCases → Domain</strong>.
                규칙은 하나: <strong>"의존성 방향은 항상 안쪽"</strong>. Domain은 프레임워크도 DB도 모른다.
              </p>
            </header>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
                <h2 className="text-sm font-bold text-slate-600">4개 동심원 (바깥→안쪽)</h2>
                <div className="space-y-2">
                  {RINGS.map(ring => (
                    <div key={ring} className={`p-4 rounded-lg border-2 transition-all duration-300 ${RING_CLASS[stepData.states[ring]][ring]}`} style={{ marginLeft: `${RINGS.indexOf(ring) * 0.75}rem`, marginRight: `${RINGS.indexOf(ring) * 0.75}rem` }}>
                      <div className="flex items-center justify-between">
                        <div className="font-bold">{RING_LABEL[ring]}</div>
                        <div className="text-xs opacity-70">{RING_DESC[ring]}</div>
                      </div>
                    </div>
                  ))}
                  <div className="text-center text-xs text-slate-400 mt-2">↑ 의존성 방향: 항상 안쪽으로만</div>
                </div>
                <div className="p-4 rounded-lg border bg-blue-50 border-blue-200 text-blue-800 text-sm leading-relaxed">
                  <div className="font-bold mb-1">{stepData.title}</div>{stepData.desc}
                </div>
              </div>
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between items-center">
                  <span>클린 아키텍처 코드</span>
                  <span className="text-slate-500">Step {currentStepIdx + 1} / {STEPS.length}</span>
                </div>
                <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
                  {stepData.codeLines.map((line, idx) => (
                    <div key={idx} className={`px-4 py-0.5 whitespace-pre border-l-4 transition-all duration-300 ${CODE_TAG_BG[line.tag]} ${CODE_TAG_BORDER[line.tag]}`}>
                      <span className="inline-block w-4 text-right mr-3 text-slate-400 select-none">{idx + 1}</span>{line.code || '\u00A0'}
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div className="flex items-center justify-center gap-3 flex-wrap">
              <button onClick={() => handlePrevRef.current()} disabled={currentStepIdx === 0} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="이전 단계">← 이전</button>
              <button onClick={togglePlay} className={`px-6 py-2 rounded-lg font-bold text-sm transition-colors ${isPlaying ? 'bg-amber-500 text-white hover:bg-amber-600' : 'bg-emerald-600 text-white hover:bg-emerald-700'}`} aria-label={isPlaying ? '정지' : (isEnd ? '처음부터 재생' : '자동 실행')}>{isPlaying ? '⏸ 정지' : (isEnd ? '⟳ 처음부터' : '▶ 자동 실행')}</button>
              <button onClick={() => handleNextRef.current()} disabled={isEnd} className="px-4 py-2 rounded-lg bg-slate-200 text-slate-700 font-bold text-sm disabled:opacity-40 hover:bg-slate-300 transition-colors" aria-label="다음 단계">다음 →</button>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>
            <footer className="text-center text-xs text-slate-400 py-4">FastAPI 인터랙티브 학습 — Chapter 5-10. 클린 아키텍처 | 키보드 ← → 지원</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
