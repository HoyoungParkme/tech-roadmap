          '',
          '- Entity가 SQLAlchemy를 import 하면 → DB 교체 불가',
          '- Use Case가 FastAPI를 import 하면 → 단위 테스트 어려움',
          '- 결국 "안쪽이 바깥에 끌려다니는" 구조가 되어 유지보수가 어려워진다',
          '',
          '## 한 줄 정리',
          '',
          '> **안쪽은 바깥을 모른다. 바깥은 안쪽을 안다.**',
        ],
        highlight: [2, 6, 7, 8, 9, 12, 13, 14, 15, 16, 17, 20, 21, 22, 23, 24, 25, 27, 28, 29, 30, 32, 33, 34, 35, 51, 52, 53, 54, 55],
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — 4개 동심원 다이어그램 (indigo)
    //   바깥 ring 부터 안쪽 ring 까지 점점 작아지는 원으로 표현
    // ─────────────────────────────────────────────────────
    const RING_SIZES = [
      { size: 'w-[420px] h-[420px]', label: 'top-2 left-1/2 -translate-x-1/2' },     // framework
      { size: 'w-[320px] h-[320px]', label: 'top-2 left-1/2 -translate-x-1/2' },     // interface
      { size: 'w-[220px] h-[220px]', label: 'top-2 left-1/2 -translate-x-1/2' },     // usecase
      { size: 'w-[120px] h-[120px]', label: 'top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2' }, // entity
    ];

    function ConcentricRings({ activeRings, focusRing }) {
      // 바깥(framework) → 안쪽(entity) 순서로 z-index 쌓는다
      const layered = [...RINGS].reverse(); // [framework, interface, usecase, entity]
      return (
        <div className="relative w-[440px] h-[440px] mx-auto">
          {layered.map((ring, i) => {
            const isActive = activeRings.includes(ring.id);
            const isFocus = focusRing === ring.id;
            const sizing = RING_SIZES[i];
            const bg = isActive
              ? (ring.id === 'entity'    ? 'bg-indigo-200/70 border-indigo-600' :
                 ring.id === 'usecase'   ? 'bg-indigo-100/60 border-indigo-500' :
                 ring.id === 'interface' ? 'bg-indigo-50/60 border-indigo-400'  :
                                            'bg-white border-indigo-300')
              : 'bg-slate-50 border-slate-200';
            const focusRing = isFocus ? 'ring-4 ring-indigo-400/60 shadow-lg' : '';
            return (
              <div
                key={ring.id}
                className={`absolute ${sizing.size} rounded-full border-2 ${bg} ${focusRing} transition-all duration-500 left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2`}
                style={{ zIndex: i + 1 }}
              >
                <div className={`absolute ${sizing.label}`} style={{ zIndex: 20 }}>
                  <span
                    className={`text-[11px] font-bold px-2 py-0.5 rounded whitespace-nowrap ${
                      isActive ? 'bg-indigo-600 text-white' : 'bg-slate-300 text-slate-600'
                    }`}
                  >
                    {ring.label}
                  </span>
                </div>
              </div>
            );
          })}
          {/* 중심 텍스트 */}
          <div className="absolute inset-0 flex items-center justify-center pointer-events-none" style={{ zIndex: 30 }}>
            <div className="text-center">
              <div className="text-[10px] text-indigo-700 font-bold">CORE</div>
              <div className="text-[9px] text-indigo-600/70">비즈니스 규칙</div>
            </div>
          </div>
        </div>
      );
    }

    function ArrowList({ arrows }) {
      if (!arrows || arrows.length === 0) {
        return (
          <div className="text-center text-[11px] text-slate-400 italic py-2">
            의존성 화살표가 아직 없습니다
          </div>
        );
      }
      const NAME = { entity: 'Entity', usecase: 'Use Case', interface: 'Adapter', framework: 'Framework' };
      return (
        <div className="space-y-1">
          {arrows.map((a, i) => (
            <div key={i} className="flex items-center gap-2 text-xs bg-indigo-50 border border-indigo-200 rounded px-2 py-1">
              <span className="font-bold text-indigo-800">{NAME[a.from]}</span>
              <span className="text-indigo-500">→ {a.label} →</span>
              <span className="font-bold text-indigo-800">{NAME[a.to]}</span>
            </div>
          ))}
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">클린 아키텍처 동심원</h3>
            <span className="text-[10px] text-slate-500">바깥 → 안쪽 의존 방향</span>
          </div>
          <div className="flex-1 flex items-center justify-center py-2">
            <ConcentricRings activeRings={state.activeRings} focusRing={state.focusRing} />
          </div>
          <div className="mt-2">
            <div className="text-[11px] font-bold text-indigo-700 mb-1">의존성 화살표</div>
            <ArrowList arrows={state.arrows} />
          </div>
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer 5탭 (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ tabIdx, setTabIdx, stepIdx, total }) {
      const code = TABS[tabIdx];
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [tabIdx]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 탭바 */}
          <div className="flex items-center gap-1 px-2 py-1.5 bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {TABS.map((t, i) => (
              <button
                key={t.filename}
                onClick={() => setTabIdx(i)}
                className={`px-2.5 py-1 text-[11px] font-mono rounded-t transition whitespace-nowrap ${
                  i === tabIdx
                    ? 'bg-[#282c34] text-indigo-300 border-t border-x border-slate-600'
                    : 'text-slate-400 hover:text-slate-200'
                }`}
              >
                {t.filename}
              </button>
            ))}
          </div>
          {/* 파일 헤더 */}
          <div className="flex items-center gap-2 px-3 py-1.5 bg-slate-800 border-b border-slate-700">
            <span className="w-2.5 h-2.5 rounded-full bg-red-400"></span>
            <span className="w-2.5 h-2.5 rounded-full bg-yellow-400"></span>
            <span className="w-2.5 h-2.5 rounded-full bg-green-400"></span>
            <span className="ml-2 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          {/* 코드 영역 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          {/* 푸터 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [tabIdx, setTabIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 단계가 바뀌면 활성 탭도 단계 기본값으로 따라간다
      useEffect(() => {
        setTabIdx(STEPS[stepIdx].tabIdx);
      }, [stepIdx]);

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동 재생 3000ms
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-slate-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">5</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter 5-10. 클린 아키텍처</h1>
                <p className="text-sm text-indigo-800/80">Entity → Use case → Adapter → Framework. 의존성은 항상 안쪽으로</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer tabIdx={tabIdx} setTabIdx={setTabIdx} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계 · 우측 탭 클릭으로 코드 직접 보기</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                클린 아키텍처는 4개 동심원(Entity → Use case → Adapter → Framework)으로 코드를 나누고, 의존성을 안쪽 방향으로만 흐르게 한다. 비즈니스 규칙은 가장 안쪽에서 가장 단단하게 보호되고, 바깥의 도구는 언제든 교체 가능한 껍질이 된다. 다음 챕터(5-11)에서는 "언제 어떤 아키텍처를 골라야 하는가"를 비교한다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Clean Architecture', 'Entity', 'Use Case', 'Interface Adapter', 'Frameworks', 'Dependency Rule', 'DIP', 'FastAPI'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./chapter-05-09-hexagonal.html" className="underline hover:no-underline">← 이전: 5-9 헥사고날 아키텍처</a>
              <a href="./chapter-05-11-when.html" className="underline hover:no-underline">다음: 5-11 언제 어떤 아키텍처를 고를까 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
