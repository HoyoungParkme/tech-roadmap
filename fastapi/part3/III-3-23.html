<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — III-3-2/3. uvicorn 실행 + 브라우저 확인</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    III-3-2 + III-3-3. uvicorn 실행 + 브라우저 확인 (통합)
    학습 목표: uvicorn main:app --reload로 서버를 실행하고, 브라우저에서 JSON 응답을 확인할 수 있다.
    패턴: 요청→서버→응답 흐름 시뮬레이션
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: '서버 실행 명령어 분석',
        desc: 'uvicorn main:app --reload — 이 명령어를 터미널에 입력하면 서버가 시작된다. 각 부분의 의미를 살펴보자.',
        flow: [
          { label: 'uvicorn', desc: 'ASGI 서버 (웨이터)', state: 'active' },
          { label: 'main', desc: '파일 이름 (main.py)', state: 'highlight' },
          { label: ':', desc: '구분자', state: 'dim' },
          { label: 'app', desc: 'FastAPI 객체 이름', state: 'highlight' },
          { label: '--reload', desc: '코드 저장 시 자동 재시작', state: 'info' },
        ],
        server: null,
        browser: null,
      },
      {
        title: '서버가 시작된다',
        desc: '[서버 시작] 명령을 실행하면 "Uvicorn running on http://127.0.0.1:8000"이 터미널에 뜬다. 127.0.0.1은 "내 컴퓨터 자신", 8000은 포트 번호다. 서버가 손님(요청)을 기다리는 상태.',
        flow: null,
        server: { state: 'running', log: 'INFO:     Uvicorn running on http://127.0.0.1:8000' },
        browser: { state: 'idle', url: '', response: '' },
      },
      {
        title: '브라우저에서 접속한다',
        desc: '[요청] 브라우저 주소창에 http://127.0.0.1:8000을 입력한다. 브라우저가 GET / 요청을 보낸다. Uvicorn이 요청을 받아서 FastAPI의 read_root() 함수를 호출한다.',
        flow: null,
        server: { state: 'processing', log: 'INFO:     GET / HTTP/1.1 200 OK' },
        browser: { state: 'requesting', url: 'http://127.0.0.1:8000', response: '' },
      },
      {
        title: '응답이 온다',
        desc: '[응답] read_root()가 {"message": "Hello, World!"}를 반환한다. FastAPI가 JSON으로 변환하고, Uvicorn이 브라우저에게 전달한다. 브라우저 화면에 JSON이 표시된다!',
        flow: null,
        server: { state: 'running', log: 'INFO:     GET / HTTP/1.1 200 OK' },
        browser: { state: 'done', url: 'http://127.0.0.1:8000', response: '{"message": "Hello, World!"}' },
      },
      {
        title: '정리 — 전체 흐름',
        desc: '(1) uvicorn main:app --reload → 서버 시작. (2) 브라우저가 GET / 요청 → Uvicorn이 받음. (3) FastAPI가 read_root() 실행 → JSON 반환. (4) 브라우저에 표시. 서버를 끄려면 터미널에서 Ctrl+C.',
        flow: null,
        server: { state: 'running', log: '서버 실행 중... (Ctrl+C로 종료)' },
        browser: { state: 'done', url: 'http://127.0.0.1:8000', response: '{"message": "Hello, World!"}' },
        summary: true,
      },
    ];

    const FLOW_STATE = {
      active:    'bg-blue-100 border-blue-400 text-blue-800 font-bold',
      highlight: 'bg-amber-100 border-amber-400 text-amber-800 font-bold',
      dim:       'bg-slate-100 border-slate-200 text-slate-400',
      info:      'bg-emerald-100 border-emerald-400 text-emerald-700',
    };

    const SERVER_STATE = {
      running:    'bg-emerald-900 border-emerald-600',
      processing: 'bg-amber-900 border-amber-600 animate-pulse',
    };

    const BROWSER_STATE = {
      idle:       'bg-slate-100 border-slate-300',
      requesting: 'bg-amber-50 border-amber-300 animate-pulse',
      done:       'bg-white border-emerald-400',
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum III-3-2/3</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. FastAPI 첫 걸음 &gt; Chapter 3. Hello World</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-3-2/3. uvicorn 실행 + 브라우저 확인</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                <code className="bg-slate-100 px-1 rounded text-xs">uvicorn main:app --reload</code> → 서버 시작 →
                브라우저에서 <strong>JSON 응답</strong> 확인. 요청→서버→응답 흐름을 따라간다.
              </p>
            </header>

            {/* 명령어 분석 (Step 0) */}
            {stepData.flow && (
              <div className="bg-white rounded-xl border border-slate-200 p-5">
                <div className="text-sm font-bold text-slate-600 mb-3">명령어 분해</div>
                <div className="flex flex-wrap items-center gap-2 mb-3">
                  <span className="text-slate-500 font-mono text-sm">$</span>
                  {stepData.flow.map((part, i) => (
                    <div key={i} className={`px-3 py-1.5 rounded-lg border-2 transition-all duration-300 ${FLOW_STATE[part.state]}`}>
                      <span className="font-mono text-sm">{part.label}</span>
                    </div>
                  ))}
                </div>
                <div className="space-y-1">
                  {stepData.flow.filter(p => p.state !== 'dim').map((part, i) => (
                    <div key={i} className="text-xs text-slate-600">
                      <span className="font-mono font-bold">{part.label}</span> — {part.desc}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* 서버 + 브라우저 시뮬레이션 */}
            {stepData.server && (
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                {/* 터미널 (서버) */}
                <div className={`rounded-xl border-2 overflow-hidden transition-all duration-300 ${SERVER_STATE[stepData.server.state]}`}>
                  <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between">
                    <span>터미널 (서버)</span>
                    <span className="text-emerald-400">{stepData.server.state === 'running' ? '● 실행 중' : '● 처리 중...'}</span>
                  </div>
                  <div className="bg-slate-900 p-4 text-xs font-mono text-slate-300 min-h-[120px]">
                    <div className="text-slate-500">$ uvicorn main:app --reload</div>
                    <div className="text-emerald-400 mt-2">{stepData.server.log}</div>
                  </div>
                </div>

                {/* 브라우저 */}
                <div className={`rounded-xl border-2 overflow-hidden transition-all duration-300 ${BROWSER_STATE[stepData.browser.state]}`}>
                  <div className="bg-slate-200 px-4 py-2 text-xs flex items-center gap-2">
                    <div className="flex gap-1">
                      <span className="w-2.5 h-2.5 rounded-full bg-red-400"></span>
                      <span className="w-2.5 h-2.5 rounded-full bg-amber-400"></span>
                      <span className="w-2.5 h-2.5 rounded-full bg-emerald-400"></span>
                    </div>
                    <div className="flex-1 bg-white rounded px-2 py-0.5 text-slate-500 font-mono text-[11px]">
                      {stepData.browser.url || '주소를 입력하세요...'}
                    </div>
                  </div>
                  <div className="bg-white p-4 min-h-[120px] flex items-center justify-center">
                    {stepData.browser.state === 'idle' && <span className="text-slate-400 text-sm">대기 중...</span>}
                    {stepData.browser.state === 'requesting' && <span className="text-amber-600 text-sm">요청 중...</span>}
                    {stepData.browser.state === 'done' && (
                      <pre className="text-emerald-700 font-mono text-lg font-bold">{stepData.browser.response}</pre>
                    )}
                  </div>
                </div>
              </div>
            )}

            {stepData.summary && (
              <div className="bg-white rounded-xl border border-slate-200 p-4">
                <div className="text-sm font-bold text-slate-600 mb-2">전체 흐름</div>
                <div className="flex flex-wrap items-center gap-2 text-xs">
                  <span className="px-2 py-1 rounded bg-blue-100 text-blue-700 font-bold">uvicorn 실행</span>
                  <span className="text-slate-400">→</span>
                  <span className="px-2 py-1 rounded bg-amber-100 text-amber-700 font-bold">브라우저 GET /</span>
                  <span className="text-slate-400">→</span>
                  <span className="px-2 py-1 rounded bg-teal-100 text-teal-700 font-bold">read_root() 실행</span>
                  <span className="text-slate-400">→</span>
                  <span className="px-2 py-1 rounded bg-emerald-100 text-emerald-700 font-bold">JSON 응답</span>
                </div>
              </div>
            )}

            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-3-1.html" className="text-slate-500 hover:text-slate-700">&larr; III-3-1 5줄 첫 API</a>
              <a href="./III-4.html" className="text-blue-600 hover:text-blue-800 font-medium">III-4 Swagger UI &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
