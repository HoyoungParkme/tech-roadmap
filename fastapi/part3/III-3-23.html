            '',
            '- URL: http://127.0.0.1:8000/redoc',
            '- 같은 OpenAPI 스펙을 다른 UI 로 보여준다',
            '- 강점: 외부 공개용 API 문서로 보기 좋다',
            '',
            '## ④ /openapi.json — 원본 스펙',
            '',
            '- URL: http://127.0.0.1:8000/openapi.json',
            '- /docs 와 /redoc 이 이걸 읽어서 그려준다',
            '- 외부 도구(Postman, OpenAPI Generator)로 import 가능',
            '',
            '## ✅ 핵심 정리',
            '',
            '- `uvicorn main:app --reload --host 0.0.0.0 --port 8000` 이 개발용 최종 형태',
            '- 브라우저로 `/`, `/docs`, `/redoc` 3가지를 즉시 확인할 수 있어야 한다',
            '- 다음: III-4 Swagger UI 자세히 보기',
          ],
          highlight: [5, 6, 7, 10, 11, 12, 13, 14, 17, 18, 19, 28, 29, 30, 31],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 터미널 라인 스타일 (indigo 톤)
    // ─────────────────────────────────────────────────────
    const TERM_LINE_STYLE = {
      cmd:  'text-indigo-200',
      info: 'text-slate-300',
      ok:   'text-emerald-300',
      warn: 'text-amber-300',
      err:  'text-red-300',
      dim:  'text-slate-500',
    };

    const TERM_STATUS_BADGE = {
      idle:      { text: '대기', cls: 'bg-slate-700 text-slate-300' },
      running:   { text: '● 실행 중', cls: 'bg-emerald-900 text-emerald-300' },
      reloading: { text: '↻ 재시작', cls: 'bg-amber-900 text-amber-300 animate-pulse' },
    };

    function TerminalMock({ terminal }) {
      if (!terminal) return null;
      const badge = TERM_STATUS_BADGE[terminal.status] || TERM_STATUS_BADGE.idle;
      return (
        <div className="rounded-lg overflow-hidden border-2 border-slate-700 shadow">
          <div className="bg-slate-800 text-slate-300 px-3 py-1.5 text-[11px] font-mono flex justify-between items-center">
            <span className="flex items-center gap-2">
              <span className="w-2.5 h-2.5 rounded-full bg-red-400"></span>
              <span className="w-2.5 h-2.5 rounded-full bg-amber-400"></span>
              <span className="w-2.5 h-2.5 rounded-full bg-emerald-400"></span>
              <span className="ml-2">터미널 (서버 측)</span>
            </span>
            <span className={`px-2 py-0.5 rounded text-[10px] ${badge.cls}`}>{badge.text}</span>
          </div>
          <div className="bg-slate-900 px-3 py-2.5 text-[11px] font-mono leading-5 min-h-[180px]">
            {terminal.lines.map((line, i) => (
              <div key={i} className={TERM_LINE_STYLE[line.kind] || 'text-slate-300'}>
                {line.text || ' '}
              </div>
            ))}
            {terminal.status === 'running' && (
              <div className="text-slate-500 mt-1">
                <span className="text-indigo-300">$</span>
                <span className="inline-block w-2 h-3.5 ml-1.5 bg-indigo-300 animate-pulse align-middle"></span>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 브라우저 mock
    // ─────────────────────────────────────────────────────
    function BrowserMock({ browser }) {
      if (!browser) return null;
      const isMultiTab = browser.tab === 'all' && browser.tabs;
      return (
        <div className="rounded-lg overflow-hidden border-2 border-indigo-300 shadow bg-white">
          <div className="bg-indigo-100 px-3 py-1.5 text-[11px] flex items-center gap-2 border-b border-indigo-200">
            <div className="flex gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-red-400"></span>
              <span className="w-2.5 h-2.5 rounded-full bg-amber-400"></span>
              <span className="w-2.5 h-2.5 rounded-full bg-emerald-400"></span>
            </div>
            <div className="flex-1 bg-white rounded px-2 py-0.5 text-slate-600 font-mono text-[10px] truncate border border-indigo-200">
              {browser.url || '주소를 입력하세요...'}
            </div>
            <span className="text-[10px] text-indigo-700 font-bold">브라우저 (클라이언트 측)</span>
          </div>
          {isMultiTab ? (
            <div className="bg-white p-2 min-h-[180px]">
              <div className="space-y-2">
                {browser.tabs.map((t, i) => (
                  <div key={i} className="rounded border border-indigo-200 overflow-hidden">
                    <div className="bg-indigo-50 px-2.5 py-1 flex items-center justify-between border-b border-indigo-100">
                      <span className="text-[10px] font-mono text-indigo-700">127.0.0.1:8000{t.path}</span>
                      <span className="text-[10px] px-1.5 py-0.5 rounded bg-indigo-600 text-white font-bold">{t.label}</span>
                    </div>
                    <pre className="px-2.5 py-1.5 text-[11px] font-mono text-emerald-700 whitespace-pre-wrap">{t.preview}</pre>
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <div className="bg-white p-3 min-h-[180px] flex flex-col items-center justify-center">
              {browser.subtitle && (
                <div className="text-xs text-indigo-700 mb-2">{browser.subtitle}</div>
              )}
              {browser.state === 'idle' && (
                <span className="text-slate-400 text-sm">대기 중...</span>
              )}
              {browser.state === 'loading' && (
                <span className="text-amber-600 text-sm">요청 중...</span>
              )}
              {browser.state === 'done' && (
                <pre className="text-emerald-700 font-mono text-base font-bold text-center">
                  {typeof browser.body === 'string'
                    ? browser.body
                    : JSON.stringify(browser.body)}
                </pre>
              )}
            </div>
          )}
        </div>
      );
    }

    function DecisionBox({ decision }) {
      if (!decision) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-indigo-400 bg-indigo-50 p-3">
          <div className="text-xs font-bold text-indigo-800 mb-2">⚡ {decision.title}</div>
          <ul className="space-y-1">
            {decision.actions.map((a, i) => (
              <li key={i} className="text-xs text-indigo-900 flex gap-2 font-mono">
                <span className="text-indigo-500">▸</span>
                <span>{a}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">실행 시뮬레이션</h3>
            <span className="text-[10px] text-slate-500">터미널 + 브라우저</span>
          </div>
          <div className="space-y-3">
            <TerminalMock terminal={state.terminal} />
            <BrowserMock browser={state.browser} />
          </div>
          {state.arrow && (
            <div className="mt-3 text-center text-xs font-bold text-indigo-600 py-2 border-y border-dashed border-indigo-300">
              ↓ {state.arrow} ↓
            </div>
          )}
          <DecisionBox decision={state.decision} />
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">III</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">III-3-2/3. uvicorn 실행 + 브라우저 확인</h1>
                <p className="text-sm text-indigo-800/80">uvicorn main:app → --reload → --host → --port → 브라우저 3진입</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 허브로</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 — 4버튼 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => { setStepIdx(0); setPlaying(false); }}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                <code className="bg-indigo-100 px-1 rounded text-xs">uvicorn main:app --reload --host 0.0.0.0 --port 8000</code> 이 개발용 최종 형태다. 브라우저로 <strong>/</strong>, <strong>/docs</strong>, <strong>/redoc</strong> 3가지를 즉시 확인할 수 있다. 다음 챕터(III-4)에서는 /docs (Swagger UI) 를 자세히 살펴본다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['uvicorn', '--reload', '--host', '--port', '127.0.0.1', '0.0.0.0', '/docs', '/redoc'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./III-3-1.html" className="underline hover:no-underline">← III-3-1 5줄 첫 API</a>
              <a href="./III-4.html" className="underline hover:no-underline">다음: III-4 Swagger UI →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
