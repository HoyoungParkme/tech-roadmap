<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — III-5-1. Port already in use</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: '에러 발생 — Port already in use',
        desc: 'uvicorn을 실행했는데 "ERROR: [Errno 98] Address already in use" 또는 "Port 8000 is already in use"가 뜬다. 서버가 시작되지 않는다!',
        port: { state: 'error', processes: ['서버 A (이미 실행 중)', '서버 B (새로 실행 시도)'] },
        terminal: 'ERROR: [Errno 98] Address already in use',
      },
      {
        title: '원인 — 창구 하나에 두 명이 서려고 한다',
        desc: '[원인] 포트(창구)는 한 번에 하나의 프로세스만 사용할 수 있다. 이전 터미널에서 uvicorn을 Ctrl+C 없이 닫았거나, 다른 탭에서 이미 실행 중인 경우 발생한다.',
        port: { state: 'conflict', processes: ['서버 A → 포트 8000 차지 중!', '서버 B → 같은 포트에 진입 불가'] },
        terminal: '포트 8000에 이미 다른 프로세스가 있다',
      },
      {
        title: '해결 1 — 기존 서버 종료',
        desc: '[해결] 이전 터미널에서 Ctrl+C를 눌러 기존 서버를 종료한다. 찾을 수 없다면 명령어로 강제 종료: Windows는 netstat -ano | findstr :8000, Mac/Linux는 lsof -i :8000으로 PID를 찾아 kill한다.',
        port: { state: 'fixed', processes: ['서버 A → 종료됨', '서버 B → 포트 8000 사용 가능!'] },
        terminal: '$ Ctrl+C  # 기존 서버 종료\n$ uvicorn main:app --reload  # 다시 실행',
      },
      {
        title: '해결 2 — 다른 포트 사용',
        desc: '[대안] 기존 서버를 유지한 채 다른 포트를 쓸 수도 있다. --port 옵션으로 8001, 8002 등 다른 번호를 지정한다. uvicorn main:app --reload --port 8001',
        port: { state: 'alt', processes: ['서버 A → 포트 8000', '서버 B → 포트 8001 (다른 창구!)'] },
        terminal: '$ uvicorn main:app --reload --port 8001\nINFO: Uvicorn running on http://127.0.0.1:8001',
        summary: true,
      },
    ];

    const PORT_STATE = {
      error:    'bg-red-100 border-red-400 text-red-700',
      conflict: 'bg-red-50 border-red-300 text-red-600',
      fixed:    'bg-emerald-100 border-emerald-400 text-emerald-700',
      alt:      'bg-blue-100 border-blue-400 text-blue-700',
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum III-5-1</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. FastAPI 첫 걸음 &gt; Chapter 5. 처음 만나는 에러</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-5-1. "Port already in use"</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                창구(포트) 하나에 <strong>두 서버가 동시에 서려고 할 때</strong> 발생하는 에러.
                Ctrl+C로 기존 서버를 끄거나, <code className="bg-slate-100 px-1 rounded text-xs">--port</code>로 다른 포트를 쓴다.
              </p>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <div className={`p-4 rounded-xl border-2 transition-all duration-300 ${PORT_STATE[stepData.port.state]}`}>
                <div className="font-bold text-sm mb-3">포트 8000 상태</div>
                {stepData.port.processes.map((p, i) => (
                  <div key={i} className="text-sm py-1 px-2 rounded bg-white bg-opacity-50 mb-1">{p}</div>
                ))}
              </div>

              <div className="bg-slate-900 rounded-xl overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono">터미널</div>
                <div className="p-4 text-xs font-mono text-slate-300 whitespace-pre-wrap min-h-[100px]">
                  <span className={stepData.port.state === 'error' || stepData.port.state === 'conflict' ? 'text-red-400' : 'text-emerald-400'}>{stepData.terminal}</span>
                </div>
              </div>
            </div>

            {stepData.summary && (
              <div className="p-3 rounded-lg bg-teal-50 border border-teal-200 text-teal-800 text-sm">
                <div className="font-bold mb-1">정리</div>
                "Port already in use" → (1) Ctrl+C로 기존 서버 종료 후 재실행, 또는 (2) <code className="bg-white px-1 rounded">--port 8001</code>로 다른 포트.
              </div>
            )}

            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-4.html" className="text-slate-500 hover:text-slate-700">&larr; III-4 Swagger UI</a>
              <a href="./III-5-2.html" className="text-blue-600 hover:text-blue-800 font-medium">III-5-2 ModuleNotFoundError &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
