            '#  (C) 둘 다 안 되면 컴퓨터 재시작 (최후의 카드)',
          ],
          highlight: [4, 5, 6, 9, 10, 11, 14, 27, 28, 29, 32, 33, 34, 35],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤
    // ─────────────────────────────────────────────────────
    const TERMINAL_STYLE = {
      cmd:     { text: 'text-emerald-300', prefix: '' },
      info:    { text: 'text-slate-300',   prefix: '' },
      error:   { text: 'text-red-400',     prefix: '' },
      ok:      { text: 'text-emerald-300', prefix: '' },
      comment: { text: 'text-slate-500',   prefix: '' },
    };

    const PROC_STATE = {
      unknown: { dot: 'bg-slate-400',   ring: 'border-slate-300',   label: '확인 안됨',  badge: 'bg-slate-200 text-slate-700' },
      holding: { dot: 'bg-red-500',     ring: 'border-red-300',     label: '점유 중',    badge: 'bg-red-100 text-red-700' },
      blocked: { dot: 'bg-amber-500',   ring: 'border-amber-300',   label: '거절됨',     badge: 'bg-amber-100 text-amber-700' },
      failed:  { dot: 'bg-red-600',     ring: 'border-red-300',     label: '시작 실패',  badge: 'bg-red-100 text-red-700' },
      found:   { dot: 'bg-indigo-500',  ring: 'border-indigo-300',  label: '발견',       badge: 'bg-indigo-100 text-indigo-700' },
      killed:  { dot: 'bg-slate-500',   ring: 'border-slate-300',   label: '종료됨',     badge: 'bg-slate-200 text-slate-700' },
      running: { dot: 'bg-emerald-500', ring: 'border-emerald-300', label: '실행 중',    badge: 'bg-emerald-100 text-emerald-700' },
    };

    function TerminalBlock({ lines }) {
      return (
        <div className="rounded-lg overflow-hidden border border-slate-700 bg-slate-900">
          <div className="px-3 py-1.5 bg-slate-800 border-b border-slate-700 flex items-center gap-1.5">
            <span className="w-2.5 h-2.5 rounded-full bg-red-400"></span>
            <span className="w-2.5 h-2.5 rounded-full bg-yellow-400"></span>
            <span className="w-2.5 h-2.5 rounded-full bg-green-400"></span>
            <span className="ml-2 text-[10px] text-slate-400 font-mono">terminal</span>
          </div>
          <div className="p-3 text-xs font-mono leading-relaxed space-y-0.5">
            {lines.map((line, i) => {
              const s = TERMINAL_STYLE[line.kind] || TERMINAL_STYLE.info;
              return (
                <div key={i} className={s.text}>
                  {line.text}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function ProcessDiagram({ procs }) {
      return (
        <div className="rounded-lg border border-indigo-200 bg-indigo-50/50 p-3">
          <div className="text-xs font-bold text-indigo-800 mb-2">PID 추적 다이어그램</div>
          <div className="space-y-2">
            {procs.map((p, i) => {
              const s = PROC_STATE[p.state] || PROC_STATE.unknown;
              return (
                <div
                  key={i}
                  className={`flex items-center gap-2 bg-white rounded border ${s.ring} px-2.5 py-1.5`}
                >
                  <span className={`w-2.5 h-2.5 rounded-full ${s.dot} flex-shrink-0`}></span>
                  <span className="text-xs font-semibold text-slate-700 w-32 truncate">{p.label}</span>
                  <span className="text-[10px] font-mono text-slate-500">PID</span>
                  <span className="text-xs font-mono font-bold text-slate-800 w-14">{p.pid}</span>
                  <span className="text-[10px] font-mono text-slate-500">:{p.port}</span>
                  <span className={`ml-auto text-[10px] px-1.5 py-0.5 rounded ${s.badge}`}>{s.label}</span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">트러블슈팅 추적</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 터미널 + PID</span>
          </div>
          <TerminalBlock lines={state.terminal} />
          <div className="mt-3">
            <ProcessDiagram procs={state.procs} />
          </div>
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.tip}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-slate-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">III</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">III-5-1. "Port already in use"</h1>
                <p className="text-sm text-indigo-800/80">에러 메시지 → 원인 → PID 찾기 → kill → 다른 포트. 5단계 트러블슈팅</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 허브로</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                "Port already in use" → ① 에러 메시지 확인 ② 원인은 죽지 않은 옛 프로세스 ③ lsof/netstat 로 PID 찾기 ④ kill -9 PID 로 종료 ⑤ 또는 --port 8001 로 우회. 다음 챕터(III-5-2)에서는 ModuleNotFoundError 를 다룬다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['EADDRINUSE', 'Errno 98', 'WinError 10048', 'lsof', 'netstat', 'kill -9', 'taskkill', '--port', 'uvicorn'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./III-4.html" className="underline hover:no-underline">← III-4 Swagger UI</a>
              <a href="./III-5-2.html" className="underline hover:no-underline">다음: III-5-2 ModuleNotFoundError →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
