<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — III-5-2. ModuleNotFoundError</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CHECKLIST = [
      { id: 'venv',    label: '(venv) 표시가 있는가?',         fix: 'source venv/bin/activate (Mac)\nvenv\\Scripts\\activate (Windows)', icon: '📦' },
      { id: 'install', label: 'pip install을 했는가?',         fix: 'pip install fastapi[standard]', icon: '📥' },
      { id: 'verify',  label: 'pip list에 fastapi가 있는가?',  fix: 'pip list | grep fastapi', icon: '🔍' },
    ];

    const STEPS = [
      {
        title: '에러 발생 — ModuleNotFoundError',
        desc: 'uvicorn main:app을 실행했는데 "ModuleNotFoundError: No module named \'fastapi\'"가 뜬다. Python이 fastapi 패키지를 찾지 못했다는 뜻이다.',
        checkStates: { venv: 'unchecked', install: 'unchecked', verify: 'unchecked' },
        terminal: "ModuleNotFoundError: No module named 'fastapi'",
        terminalState: 'error',
      },
      {
        title: '체크 1 — 가상환경이 켜져 있는가?',
        desc: '[확인] 터미널 앞에 (venv) 표시가 있는지 확인한다. 없으면 가상환경이 꺼져 있는 것이다. activate 명령으로 켠다. 대부분의 ModuleNotFoundError는 이것으로 해결된다.',
        checkStates: { venv: 'checking', install: 'unchecked', verify: 'unchecked' },
        terminal: '$ source venv/bin/activate\n(venv) $  ← 이 표시가 보여야 한다',
        terminalState: 'fix',
      },
      {
        title: '체크 2 — pip install을 했는가?',
        desc: '[확인] 가상환경을 켰는데도 에러가 나면, 이 가상환경에서 pip install을 안 한 것이다. pip install fastapi[standard]를 실행한다.',
        checkStates: { venv: 'passed', install: 'checking', verify: 'unchecked' },
        terminal: '(venv) $ pip install fastapi[standard]\nSuccessfully installed fastapi-0.115...',
        terminalState: 'fix',
      },
      {
        title: '체크 3 — 설치 확인',
        desc: '[검증] pip list | grep fastapi로 설치 여부를 최종 확인한다. fastapi가 목록에 있으면 성공. 이제 uvicorn main:app --reload를 다시 실행하면 정상 작동한다.',
        checkStates: { venv: 'passed', install: 'passed', verify: 'passed' },
        terminal: '(venv) $ pip list | grep fastapi\nfastapi    0.115.6\n\n(venv) $ uvicorn main:app --reload\nINFO: Uvicorn running on http://127.0.0.1:8000',
        terminalState: 'success',
        summary: true,
      },
    ];

    const CHECK_STATE_CLASS = {
      unchecked: 'bg-slate-100 border-slate-300 text-slate-500',
      checking:  'bg-amber-100 border-amber-400 text-amber-700 ring-2 ring-amber-300',
      passed:    'bg-emerald-100 border-emerald-400 text-emerald-700',
    };

    const CHECK_ICON = { unchecked: '⬜', checking: '🔍', passed: '✅' };

    const TERMINAL_COLOR = {
      error:   'text-red-400',
      fix:     'text-amber-300',
      success: 'text-emerald-400',
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum III-5-2</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. FastAPI 첫 걸음 &gt; Chapter 5. 처음 만나는 에러</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-5-2. ModuleNotFoundError</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                <strong>"No module named 'fastapi'"</strong> — 대부분 가상환경을 안 켰거나 pip install을 안 한 것.
                3단계 체크리스트로 해결한다.
              </p>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              {/* 체크리스트 */}
              <div className="bg-white rounded-xl border border-slate-200 p-4 space-y-2">
                <div className="text-sm font-bold text-slate-600 mb-2">디버깅 체크리스트</div>
                {CHECKLIST.map((item) => {
                  const state = stepData.checkStates[item.id];
                  return (
                    <div key={item.id} className={`p-3 rounded-lg border-2 transition-all duration-300 ${CHECK_STATE_CLASS[state]}`}>
                      <div className="flex items-center gap-2 mb-1">
                        <span>{CHECK_ICON[state]}</span>
                        <span className="font-bold text-sm">{item.icon} {item.label}</span>
                      </div>
                      {state === 'checking' && (
                        <div className="text-xs font-mono bg-white bg-opacity-50 p-2 rounded mt-1 whitespace-pre-wrap">{item.fix}</div>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* 터미널 */}
              <div className="bg-slate-900 rounded-xl overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono">터미널</div>
                <div className="p-4 text-xs font-mono min-h-[180px] whitespace-pre-wrap">
                  <span className={TERMINAL_COLOR[stepData.terminalState]}>{stepData.terminal}</span>
                </div>
              </div>
            </div>

            {stepData.summary && (
              <div className="p-3 rounded-lg bg-teal-50 border border-teal-200 text-teal-800 text-sm">
                <div className="font-bold mb-1">습관으로 만들기</div>
                ModuleNotFoundError가 나면 → <b>(1) (venv) 표시 확인</b> → <b>(2) pip install</b> → <b>(3) pip list 확인</b>. 이 순서를 몸에 익히면 대부분 해결된다.
              </div>
            )}

            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-5-1.html" className="text-slate-500 hover:text-slate-700">&larr; III-5-1 포트 충돌</a>
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">허브로 돌아가기 &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
