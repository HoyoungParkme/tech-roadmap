<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — III-4. Swagger UI 구조</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const ENDPOINTS = [
      { method: 'GET',    path: '/',        desc: 'Hello World', tag: 'root' },
      { method: 'GET',    path: '/items',   desc: '아이템 목록', tag: 'items' },
      { method: 'POST',   path: '/items',   desc: '아이템 생성', tag: 'items' },
      { method: 'PUT',    path: '/items/{id}', desc: '아이템 수정', tag: 'items' },
      { method: 'DELETE', path: '/items/{id}', desc: '아이템 삭제', tag: 'items' },
    ];

    const METHOD_CLASS = {
      GET:    'bg-blue-500 text-white',
      POST:   'bg-emerald-500 text-white',
      PUT:    'bg-amber-500 text-white',
      DELETE: 'bg-red-500 text-white',
    };

    const METHOD_BG = {
      GET:    'bg-blue-50 border-blue-200 hover:bg-blue-100',
      POST:   'bg-emerald-50 border-emerald-200 hover:bg-emerald-100',
      PUT:    'bg-amber-50 border-amber-200 hover:bg-amber-100',
      DELETE: 'bg-red-50 border-red-200 hover:bg-red-100',
    };

    const STEPS = [
      {
        title: '/docs — 자동 문서가 열린다',
        desc: 'http://127.0.0.1:8000/docs에 접속하면 Swagger UI가 뜬다. FastAPI가 코드를 분석해 자동으로 만든 API 문서다. 별도로 문서를 쓸 필요가 없다.',
        visibleCount: 1,
        tryItOut: false,
      },
      {
        title: 'API가 추가되면 자동으로 쌓인다',
        desc: '[자동 문서] 엔드포인트를 코드에 추가하면 Swagger에도 자동으로 나타난다. GET=파란색, POST=초록색, PUT=주황색, DELETE=빨간색. 색상만 봐도 역할을 구분할 수 있다.',
        visibleCount: 5,
        tryItOut: false,
      },
      {
        title: 'Try it out — 직접 호출해본다',
        desc: '[Try it out] 엔드포인트를 클릭하고 "Try it out" → "Execute"를 누르면 실제 HTTP 요청을 보내고 응답을 화면에서 확인한다. Postman 없이도 API를 테스트할 수 있다. curl 명령어도 자동 생성된다.',
        visibleCount: 5,
        tryItOut: true,
      },
      {
        title: '정리 — 코드만 쓰면 문서는 공짜',
        desc: 'FastAPI + Swagger UI: 코드에서 타입 힌트와 데코레이터를 쓰면 문서가 자동 생성된다. 문서와 코드가 항상 동기화되어 "문서 따로, 코드 따로" 문제가 없다. /redoc 경로도 같은 정보를 다른 디자인으로 보여준다.',
        visibleCount: 5,
        tryItOut: false,
        summary: true,
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 5000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const visible = ENDPOINTS.slice(0, stepData.visibleCount);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum III-4</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. FastAPI 첫 걸음 &gt; Chapter 4. Swagger UI</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-4. Swagger UI 구조</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                <code className="bg-slate-100 px-1 rounded text-xs">/docs</code> 경로에 접속하면 <strong>자동 생성된 API 문서</strong>가 뜬다.
                코드만 쓰면 문서는 공짜다.
              </p>
            </header>

            {/* Swagger UI 시뮬레이션 */}
            <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
              <div className="bg-slate-800 text-white px-4 py-3 flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <span className="text-emerald-400 font-bold text-sm">Swagger UI</span>
                  <span className="text-slate-400 text-xs">— FastAPI 자동 문서</span>
                </div>
                <span className="text-xs font-mono text-slate-400">127.0.0.1:8000/docs</span>
              </div>
              <div className="p-4 space-y-2">
                {visible.map((ep, i) => (
                  <div key={i} className={`p-3 rounded-lg border transition-all duration-300 flex items-center gap-3 cursor-pointer ${METHOD_BG[ep.method]}`}>
                    <span className={`px-2 py-0.5 rounded text-xs font-bold min-w-[60px] text-center ${METHOD_CLASS[ep.method]}`}>{ep.method}</span>
                    <span className="font-mono text-sm flex-1">{ep.path}</span>
                    <span className="text-xs text-slate-500">{ep.desc}</span>
                  </div>
                ))}
              </div>

              {stepData.tryItOut && (
                <div className="border-t border-slate-200 p-4 bg-blue-50">
                  <div className="text-sm font-bold text-blue-700 mb-2">Try it out — GET /</div>
                  <div className="bg-white rounded border p-3 space-y-2">
                    <div className="text-xs text-slate-500">curl -X 'GET' 'http://127.0.0.1:8000/' -H 'accept: application/json'</div>
                    <div className="border-t pt-2">
                      <div className="text-xs font-bold text-slate-600">Response (200)</div>
                      <pre className="text-sm font-mono text-emerald-700 mt-1">{"{"}"message": "Hello, World!"{"}"}</pre>
                    </div>
                  </div>
                </div>
              )}
            </div>

            {/* 범례 */}
            <div className="flex flex-wrap gap-3 text-xs">
              {Object.entries(METHOD_CLASS).map(([method, cls]) => (
                <span key={method} className={`px-2 py-1 rounded ${cls}`}>{method}</span>
              ))}
            </div>

            {stepData.summary && (
              <div className="p-3 rounded-lg bg-teal-50 border border-teal-200 text-teal-800 text-sm">
                <div className="font-bold mb-1">핵심</div>
                FastAPI = <b>코드와 문서의 자동 동기화</b>. 타입 힌트 + 데코레이터로 코드를 쓰면 Swagger UI가 자동 생성된다.
              </div>
            )}

            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-3-23.html" className="text-slate-500 hover:text-slate-700">&larr; III-3-2/3 uvicorn + 브라우저</a>
              <a href="./III-5-1.html" className="text-blue-600 hover:text-blue-800 font-medium">III-5-1 포트 충돌 에러 &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
