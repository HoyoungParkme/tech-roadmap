    }

    function TryItOutPanel() {
      return (
        <div className="mt-3 rounded-lg border border-indigo-300 bg-indigo-50 p-3">
          <div className="text-xs font-bold text-indigo-700 mb-2">▶ Try it out — GET /items</div>
          <div className="bg-white rounded border border-slate-200 p-2.5 space-y-2">
            <div className="text-[10px] text-slate-500 font-mono">
              curl -X 'GET' 'http://127.0.0.1:8000/items' \
              <br />&nbsp;&nbsp;-H 'accept: application/json'
            </div>
            <div className="border-t border-slate-200 pt-2">
              <div className="flex items-center gap-2 mb-1">
                <span className="px-1.5 py-0.5 rounded text-[10px] font-bold bg-emerald-500 text-white">200</span>
                <span className="text-[10px] text-slate-600">Successful Response</span>
              </div>
              <pre className="text-[11px] font-mono text-emerald-700 bg-slate-50 rounded px-2 py-1">{`[
  { "id": 1, "name": "라떼",    "price": 4500 },
  { "id": 2, "name": "아메리카노", "price": 4000 }
]`}</pre>
            </div>
          </div>
        </div>
      );
    }

    function SchemaCard() {
      return (
        <div className="mt-3 rounded-lg border-2 border-indigo-400 bg-gradient-to-br from-indigo-50 to-violet-50 p-3">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-lg">📦</span>
            <span className="text-sm font-bold text-indigo-800">Schemas — Item</span>
          </div>
          <div className="bg-white rounded border border-indigo-200 p-2 font-mono text-[11px] text-slate-700 space-y-0.5">
            <div><span className="text-indigo-600">id</span>    <span className="text-slate-400">integer</span> <span className="text-rose-500">*required</span></div>
            <div><span className="text-indigo-600">name</span>  <span className="text-slate-400">string</span>  <span className="text-rose-500">*required</span> <span className="text-slate-400">(1~50자)</span></div>
            <div><span className="text-indigo-600">price</span> <span className="text-slate-400">number</span>  <span className="text-rose-500">*required</span> <span className="text-slate-400">(&gt; 0)</span></div>
          </div>
          <div className="mt-2 text-[10px] text-indigo-700">
            ↑ Pydantic <code className="bg-indigo-100 px-1 rounded">Item</code> 모델에서 자동 추출
          </div>
        </div>
      );
    }

    function SpecJsonPreview() {
      return (
        <div className="rounded-lg border border-slate-300 bg-slate-900 p-3 font-mono text-[11px] text-slate-200 leading-5">
          <div className="text-amber-300 mb-1">// http://127.0.0.1:8000/openapi.json</div>
          <div>{'{'}</div>
          <div className="pl-3"><span className="text-sky-300">"openapi"</span>: <span className="text-emerald-300">"3.1.0"</span>,</div>
          <div className="pl-3"><span className="text-sky-300">"info"</span>: {'{'} <span className="text-sky-300">"title"</span>: <span className="text-emerald-300">"My Shop API"</span> {'}'},</div>
          <div className="pl-3"><span className="text-sky-300">"paths"</span>: {'{'} <span className="text-emerald-300">"/items"</span>: ... {'}'},</div>
          <div className="pl-3"><span className="text-sky-300">"components"</span>: {'{'} <span className="text-sky-300">"schemas"</span>: {'{'} <span className="text-emerald-300">"Item"</span>: ... {'}'} {'}'}</div>
          <div>{'}'}</div>
        </div>
      );
    }

    function ReDocPreview({ endpoints }) {
      return (
        <div className="rounded-lg border border-slate-300 bg-white overflow-hidden">
          <div className="grid grid-cols-3">
            {/* ReDoc 좌측 사이드바 */}
            <div className="col-span-1 bg-slate-50 border-r border-slate-200 p-3 text-xs">
              <div className="font-bold text-slate-700 mb-2">📚 My Shop API</div>
              <div className="text-slate-500 mb-1">items</div>
              <ul className="space-y-1 pl-2">
                {endpoints.map((ep, i) => (
                  <li key={i} className="flex items-center gap-1.5 text-slate-700 hover:text-indigo-600 cursor-pointer">
                    <span className={`text-[9px] px-1 rounded ${METHOD_BADGE[ep.method]}`}>{ep.method}</span>
                    <span className="truncate font-mono text-[10px]">{ep.path}</span>
                  </li>
                ))}
                <li className="text-slate-500 mt-2">Schemas</li>
                <li className="pl-2 text-slate-700">▸ Item</li>
              </ul>
            </div>
            {/* ReDoc 우측 본문 */}
            <div className="col-span-2 p-3 text-xs">
              <div className="text-sm font-bold text-slate-800 mb-1">GET /items</div>
              <div className="text-slate-500 mb-2">아이템 목록을 반환한다.</div>
              <div className="bg-slate-50 border border-slate-200 rounded p-2 font-mono text-[10px] text-slate-700">
                <div className="text-emerald-600">200 Successful Response</div>
                <div className="mt-1">Array&lt;Item&gt;</div>
              </div>
              <div className="mt-2 text-[10px] text-slate-400">↑ 좌측 = 네비, 우측 = 본문. 읽기/공유에 강하다.</div>
            </div>
          </div>
        </div>
      );
    }

    function SwaggerHeader({ tab }) {
      const isSpec = tab === 'spec';
      const isRedoc = tab === 'redoc';
      const label = isSpec ? 'OpenAPI 스펙' : isRedoc ? 'ReDoc' : 'Swagger UI';
      const path = isSpec ? '/openapi.json' : isRedoc ? '/redoc' : '/docs';
      return (
        <div className="bg-slate-800 text-white px-3 py-2 flex items-center justify-between rounded-t-lg">
          <div className="flex items-center gap-2">
            <span className="w-2 h-2 rounded-full bg-emerald-400"></span>
            <span className="text-indigo-300 font-bold text-xs">{label}</span>
            <span className="text-slate-400 text-[10px]">— FastAPI 자동 생성</span>
          </div>
          <span className="text-[10px] font-mono text-slate-400">127.0.0.1:8000{path}</span>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const tab = state.docsTab;
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">Swagger UI mock — /docs 화면</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 브라우저 화면</span>
          </div>

          <SwaggerHeader tab={tab} />

          <div className="border border-t-0 border-slate-200 rounded-b-lg p-3 bg-slate-50/40">
            {tab === 'spec' && <SpecJsonPreview />}
            {tab === 'redoc' && <ReDocPreview endpoints={state.endpoints} />}
            {tab === 'swagger' && (
              <div className="space-y-1.5">
                {state.endpoints.map((ep, i) => (
                  <EndpointRow key={i} ep={ep} active={state.activePath === ep.path} />
                ))}
              </div>
            )}
          </div>

          {state.tryItOpen && <TryItOutPanel />}
          {state.schemaShown && <SchemaCard />}

          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js) — 5탭
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      const TABS = ['openapi.json', 'swagger.html', 'redoc.html', 'try-it.md', 'schema.py'];

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          {/* 5탭 바 */}
          <div className="flex bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {TABS.map((t) => (
              <div
                key={t}
                className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 ${
                  t === code.tab
                    ? 'bg-[#282c34] text-indigo-300 border-t-2 border-t-indigo-400'
                    : 'text-slate-500'
                }`}
              >{t}</div>
            ))}
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">III</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">III-4. Swagger UI 구조 (/docs)</h1>
                <p className="text-sm text-indigo-800/80">OpenAPI 스펙 → /docs → /redoc → Try it out → schema 자동 추출</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                코드(Pydantic 모델 + 데코레이터) → OpenAPI JSON → /docs(Swagger) & /redoc(ReDoc) → Try it out 실행 → schema 자동 추출. FastAPI 의 "코드만 쓰면 문서는 공짜" 철학이 어떻게 동작하는지 5단계로 추적했다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['OpenAPI', 'Swagger UI', 'ReDoc', '/docs', '/redoc', 'Try it out', 'Pydantic', 'SSOT'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./III-3-23.html" className="underline hover:no-underline">← III-3-2/3 uvicorn + 브라우저</a>
              <a href="./III-5-1.html" className="underline hover:no-underline">다음: III-5-1 포트 충돌 에러 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
