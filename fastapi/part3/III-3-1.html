<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — III-3-1. 5줄짜리 첫 API</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    III-3-1. 5줄짜리 첫 API
    학습 목표: FastAPI 앱을 5줄로 작성하고, 각 줄의 역할을 설명할 수 있다.
    패턴: 코드 한 줄씩 역할 분석 — 줄별 하이라이트 + 역할 설명
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CODE_LINES = [
      { text: 'from fastapi import FastAPI',   role: 'import',    desc: 'FastAPI 도구를 가져온다' },
      { text: 'app = FastAPI()',                role: 'instance',  desc: 'API 앱 객체를 만든다 (식당 간판)' },
      { text: '@app.get("/")',                  role: 'decorator', desc: '"/ 주소로 GET 요청이 오면 아래 함수를 실행하라"' },
      { text: 'def read_root():',              role: 'function',  desc: '요청을 처리할 함수를 정의한다' },
      { text: '    return {"message": "Hello, World!"}', role: 'return', desc: 'JSON 데이터를 응답으로 돌려준다' },
    ];

    const STEPS = [
      {
        title: '전체 코드 — 5줄이 전부다',
        desc: 'main.py에 이 5줄만 적으면 완전한 API 서버가 된다. 각 줄이 어떤 역할을 하는지 한 줄씩 살펴보자.',
        highlight: null,
        analogy: null,
      },
      {
        title: '1줄 — 도구 가져오기',
        desc: '[import] from fastapi import FastAPI — 도구함에서 FastAPI 도구를 꺼내온다. 이 한 줄로 라우팅, 검증, 문서 생성 등 모든 기능이 준비된다.',
        highlight: 'import',
        analogy: '🧰 도구함에서 도구를 꺼낸다',
      },
      {
        title: '2줄 — 앱 객체 생성',
        desc: '[인스턴스] app = FastAPI() — API 앱 객체를 만든다. 식당으로 치면 "간판을 건다". 이 app에 URL과 함수를 등록하면 서버가 된다.',
        highlight: 'instance',
        analogy: '🪧 식당 간판을 건다',
      },
      {
        title: '3줄 — URL과 함수 연결 (데코레이터)',
        desc: '[데코레이터] @app.get("/") — "누군가 / 주소로 GET 방식으로 오면 바로 아래 함수를 실행하라"는 표시. @ 기호가 "이 함수는 특별하다"고 알려주는 역할.',
        highlight: 'decorator',
        analogy: '📋 메뉴판에 "/ 주소 → 이 함수" 등록',
      },
      {
        title: '4~5줄 — 함수 정의 + JSON 반환',
        desc: '[함수+반환] def read_root()는 요청 처리 함수. return {"message": "Hello, World!"}는 파이썬 딕셔너리를 반환한다. FastAPI가 자동으로 JSON으로 변환해서 응답한다.',
        highlight: 'return',
        analogy: '🍽️ 주문받고 요리를 내놓는다',
      },
      {
        title: '정리 — 구조는 "주소 + 함수" 두 가지',
        desc: '복잡해 보여도 핵심은 단순하다. (1) 어떤 주소(@app.get("/"))로 오면 (2) 어떤 함수(def read_root)를 실행한다. 이 패턴이 FastAPI의 전부다. 엔드포인트를 추가하고 싶으면 @app.get + def를 더 적으면 된다.',
        highlight: null,
        analogy: null,
        summary: true,
      },
    ];

    const LINE_CLASS = {
      import:    'bg-violet-900/60 ring-1 ring-violet-400',
      instance:  'bg-cyan-900/60 ring-1 ring-cyan-400',
      decorator: 'bg-amber-900/60 ring-1 ring-amber-400',
      return:    'bg-emerald-900/60 ring-1 ring-emerald-400',
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum III-3-1</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. FastAPI 첫 걸음 &gt; Chapter 3. Hello World</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-3-1. 5줄짜리 첫 API</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                <strong>5줄</strong>이면 완전한 API 서버가 된다. 각 줄의 역할을 한 줄씩 살펴본다.
                핵심은 <b>"주소 + 함수"</b> 두 가지뿐이다.
              </p>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              {/* 코드 패널 */}
              <div className="bg-slate-900 rounded-xl overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono flex justify-between">
                  <span>main.py</span>
                  <span className="text-slate-500">5줄</span>
                </div>
                <div className="p-4 space-y-0.5">
                  {CODE_LINES.map((line, i) => {
                    const isHighlighted = stepData.highlight === line.role || (stepData.highlight === 'return' && line.role === 'function');
                    const isDimmed = stepData.highlight && !isHighlighted;
                    return (
                      <div key={i} className={`px-3 py-1.5 rounded transition-all duration-300 ${isHighlighted ? LINE_CLASS[stepData.highlight] || '' : ''} ${isDimmed ? 'opacity-30' : ''}`}>
                        <span className="text-slate-500 select-none mr-3 inline-block w-4 text-right text-xs">{i + 1}</span>
                        <span className="text-slate-200 text-sm font-mono">{line.text}</span>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* 역할 설명 */}
              <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-3">
                <h2 className="text-sm font-bold text-slate-600">각 줄의 역할</h2>
                {CODE_LINES.map((line, i) => {
                  const isActive = stepData.highlight === line.role || (stepData.highlight === 'return' && line.role === 'function');
                  const isDimmed = stepData.highlight && !isActive;
                  return (
                    <div key={i} className={`p-2 rounded-lg border transition-all duration-300 ${isActive ? 'bg-teal-50 border-teal-300 text-teal-800' : isDimmed ? 'bg-slate-50 border-slate-100 text-slate-300' : 'bg-slate-50 border-slate-200 text-slate-600'}`}>
                      <span className="text-xs font-bold">Line {i + 1}:</span> <span className="text-xs">{line.desc}</span>
                    </div>
                  );
                })}

                {stepData.analogy && (
                  <div className="p-2 rounded-lg bg-amber-50 border border-amber-200 text-amber-800 text-sm font-medium">
                    {stepData.analogy}
                  </div>
                )}

                {stepData.summary && (
                  <div className="p-3 rounded-lg bg-teal-50 border border-teal-200 text-teal-800 text-sm">
                    <div className="font-bold mb-1">핵심 패턴</div>
                    <code className="text-xs bg-white px-1 rounded">@app.get("/경로")</code> + <code className="text-xs bg-white px-1 rounded">def 함수():</code> = 하나의 API 엔드포인트.
                    이 패턴을 반복하면 된다.
                  </div>
                )}
              </div>
            </div>

            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-2-1.html" className="text-slate-500 hover:text-slate-700">&larr; III-2-1 가상환경</a>
              <a href="./III-3-23.html" className="text-blue-600 hover:text-blue-800 font-medium">III-3-2/3 uvicorn + 브라우저 &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
