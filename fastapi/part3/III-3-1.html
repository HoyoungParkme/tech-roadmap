          '- 백엔드와 프론트엔드가 같은 문서를 보며 협업할 수 있다',
          '- API 사용법을 별도 문서로 만들 필요가 거의 없다',
          '- 함수에 타입 힌트만 추가하면 문서가 더 풍성해진다',
          '',
          '## 5분 안의 첫 API 정리',
          '1. `pip install fastapi "uvicorn[standard]"`',
          '2. `main.py` 에 5줄',
          '3. `uvicorn main:app --reload`',
          '4. 브라우저로 `/` 응답 확인',
          '5. `/docs` 에서 Swagger 확인',
          '',
          '→ 다음 절에서는 이 5줄에 엔드포인트와 타입 힌트를 더해 본다.',
        ],
        highlight: [2, 3, 4, 5, 8, 9, 14, 15, 18, 19, 20, 32, 33, 34, 35, 36, 37],
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤 (단계별 진행 박스)
    // ─────────────────────────────────────────────────────
    const STATUS_STYLE = {
      done:    { dot: 'bg-indigo-500',  text: 'text-indigo-900', label: '완료' },
      active:  { dot: 'bg-amber-400',   text: 'text-amber-900',  label: '진행' },
      pending: { dot: 'bg-slate-300',   text: 'text-slate-500',  label: '대기' },
    };

    function TaskRow({ task }) {
      const s = STATUS_STYLE[task.status] || STATUS_STYLE.done;
      return (
        <div className="flex items-center gap-2 py-1.5 border-b border-indigo-100 last:border-b-0">
          <span className={`w-2.5 h-2.5 rounded-full ${s.dot} flex-shrink-0`} />
          <span className={`text-sm font-medium ${s.text} flex-1`}>{task.label}</span>
          <span className="text-[10px] text-slate-500 font-mono">{task.detail}</span>
        </div>
      );
    }

    function ProgressBoxes({ activeIdx }) {
      // 5개 단계 박스를 가로로 나열, 진행도에 따라 색이 채워짐
      return (
        <div className="grid grid-cols-5 gap-1.5 mb-3">
          {STEPS.map((s, i) => {
            const isDone = i < activeIdx;
            const isActive = i === activeIdx;
            return (
              <div
                key={s.id}
                className={`px-2 py-1.5 rounded-md border text-center transition ${
                  isActive ? 'bg-indigo-600 border-indigo-700 text-white shadow' :
                  isDone   ? 'bg-indigo-100 border-indigo-300 text-indigo-700' :
                             'bg-slate-50  border-slate-200  text-slate-400'
                }`}
              >
                <div className="text-[9px] uppercase tracking-wide font-semibold">
                  {s.id}
                </div>
                <div className="text-[10px] mt-0.5">
                  {isActive ? '진행중' : isDone ? '완료' : '대기'}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function TerminalBox({ terminal }) {
      if (!terminal) return null;
      const isShell = terminal.kind === 'shell';
      const isEditor = terminal.kind === 'editor';
      const isBrowser = terminal.kind === 'browser';
      const headerColor = isShell ? 'bg-slate-800' : isEditor ? 'bg-indigo-900' : 'bg-sky-900';
      const bodyColor = isShell ? 'bg-slate-900 text-green-300' :
                        isEditor ? 'bg-slate-900 text-indigo-200' :
                                   'bg-slate-900 text-sky-200';
      const icon = isShell ? '$' : isEditor ? '📝' : '🌐';
      return (
        <div className="mt-3 rounded-lg overflow-hidden border border-slate-700">
          <div className={`${headerColor} text-slate-100 px-3 py-1.5 text-[11px] font-mono flex items-center gap-2`}>
            <span>{icon}</span>
            <span className="truncate">{terminal.title}</span>
          </div>
          <div className={`${bodyColor} font-mono text-[11px] leading-relaxed p-3 overflow-x-auto`}>
            {terminal.lines.map((l, i) => (
              <div key={i} className="whitespace-pre">{l || ' '}</div>
            ))}
          </div>
        </div>
      );
    }

    function LiveDataPane({ stepIdx }) {
      const step = STEPS[stepIdx];
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">5단계 진행 상황</h3>
            <span className="text-[10px] text-slate-500">install → write → run → test → docs</span>
          </div>

          <ProgressBoxes activeIdx={stepIdx} />

          <div className="rounded-lg border border-indigo-200 bg-indigo-50/40 p-3">
            <div className="text-xs font-bold text-indigo-800 mb-2">
              {step.title.split(' — ')[0]} 체크리스트
            </div>
            <div>
              {step.tasks.map((t, i) => <TaskRow key={i} task={t} />)}
            </div>
          </div>

          <TerminalBox terminal={step.terminal} />

          <div className="mt-3 text-xs text-indigo-900 bg-amber-50 border border-amber-200 rounded p-2">
            💡 {step.tip}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 CodeViewer — 탭 5개 (install / write / run / test / docs)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ activeTabIdx, stepIdx, total, onTabClick }) {
      const tab = TABS[activeTabIdx];
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [activeTabIdx]);

      const highlightSet = new Set(tab.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return tab.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return tab.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 윈도우 헤더 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{tab.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{tab.lang}</span>
          </div>

          {/* 탭 바 */}
          <div className="flex bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {TABS.map((t, i) => {
              const isActive = i === activeTabIdx;
              return (
                <button
                  key={t.key}
                  onClick={() => onTabClick && onTabClick(i)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-800 transition ${
                    isActive
                      ? 'bg-[#282c34] text-indigo-300 border-t-2 border-t-indigo-400 -mt-px'
                      : 'bg-slate-900 text-slate-400 hover:text-slate-200'
                  }`}
                >
                  {t.label}
                </button>
              );
            })}
          </div>

          {/* 코드 본문 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${tab.lang}`}>{tab.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {tab.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>

          {/* 푸터 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{tab.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 상태 관리, 키보드, 자동재생(3000ms)
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [activeTabIdx, setActiveTabIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 단계 변경 시 우측 탭도 함께 이동
      useEffect(() => {
        setActiveTabIdx(STEPS[stepIdx].activeTab);
      }, [stepIdx]);

      // 키보드 좌/우
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') {
            e.preventDefault();
            setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          } else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            setStepIdx((i) => Math.max(0, i - 1));
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동재생 3000ms
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 상단 네비 */}
            <nav className="mb-3 flex items-center justify-between text-sm">
              <a href="../index.html" className="text-indigo-700 hover:text-indigo-900 font-medium">← 허브로 돌아가기</a>
              <span className="font-mono bg-white px-2 py-1 rounded border border-indigo-200 text-indigo-700 text-xs">curriculum III-3-1</span>
            </nav>

            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">III</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">III-3-1. 5줄짜리 첫 API</h1>
                <p className="text-sm text-indigo-800/80">pip install → main.py 5줄 → uvicorn → 브라우저 → /docs. 한 사이클이면 끝</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane stepIdx={stepIdx} />
              <CodeViewer
                activeTabIdx={activeTabIdx}
                stepIdx={stepIdx}
                total={STEPS.length}
                onTabClick={(i) => setActiveTabIdx(i)}
              />
            </div>

            {/* 컨트롤 4버튼 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => { setStepIdx(0); setPlaying(false); }}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${
                  playing ? 'bg-indigo-800 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'
                }`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">
              키보드 ←/→ · 자동재생 3초/단계
            </div>

            {/* 마지막 단계 정리 박스 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                <ol className="list-decimal list-inside space-y-0.5">
                  <li><b>pip install fastapi "uvicorn[standard]"</b> — 두 라이브러리만 있으면 충분</li>
                  <li><b>main.py 5줄</b> — import → app = FastAPI() → @app.get → def → return dict</li>
                  <li><b>uvicorn main:app --reload</b> — 한 줄로 서버 기동</li>
                  <li><b>http://127.0.0.1:8000/</b> — JSON 응답 확인</li>
                  <li><b>http://127.0.0.1:8000/docs</b> — Swagger 자동 문서가 거저 따라온다</li>
                </ol>
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['FastAPI', 'uvicorn', 'pip', '@app.get', 'JSON', 'Swagger', 'OpenAPI', '/docs'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 하단 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./III-2-1.html" className="underline hover:no-underline">← III-2-1 가상환경</a>
              <a href="./III-3-23.html" className="underline hover:no-underline">다음: III-3-2/3 uvicorn + 브라우저 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
