<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — III-2-1. 왜 가상환경이 필요한가</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    III-2-1. 왜 가상환경이 필요한가 (장난감 상자 비유)
    학습 목표: 가상환경이 필요한 이유를 설명하고, 프로젝트별 독립 환경 개념을 이해할 수 있다.
    패턴: 프로젝트별 격리 다이어그램 — 충돌 → 해결 과정
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: '문제 — 한 컴퓨터에 프로젝트가 2개',
        desc: '프로젝트 A는 FastAPI 0.100이 필요하고, 프로젝트 B는 FastAPI 0.90이 필요하다. 한 컴퓨터에 두 버전을 동시에 설치할 수 없다.',
        projects: [
          { name: '프로젝트 A', pkg: 'FastAPI 0.100', state: 'need' },
          { name: '프로젝트 B', pkg: 'FastAPI 0.90', state: 'need' },
        ],
        global: { label: '전역 Python', pkgs: ['FastAPI ???'], state: 'confused' },
        hasVenv: false,
      },
      {
        title: '충돌 — 전역에 하나만 설치 가능',
        desc: '[충돌] pip install fastapi==0.100을 하면 0.90이 사라진다. 0.90을 깔면 0.100이 사라진다. 전역 Python에는 한 버전만 존재할 수 있다. 프로젝트 B가 깨진다!',
        projects: [
          { name: '프로젝트 A', pkg: 'FastAPI 0.100', state: 'ok' },
          { name: '프로젝트 B', pkg: 'FastAPI 0.90', state: 'broken' },
        ],
        global: { label: '전역 Python', pkgs: ['FastAPI 0.100 (하나만!)'], state: 'conflict' },
        hasVenv: false,
      },
      {
        title: '해결 — 장난감 상자를 따로 준다',
        desc: '[가상환경] 각 프로젝트에 자기만의 "장난감 상자"(가상환경)를 만든다. 프로젝트 A의 상자에는 0.100, 프로젝트 B의 상자에는 0.90. 서로 건드리지 않는다!',
        projects: [
          { name: '프로젝트 A', pkg: 'FastAPI 0.100', state: 'isolated', venv: 'venv_A/' },
          { name: '프로젝트 B', pkg: 'FastAPI 0.90', state: 'isolated', venv: 'venv_B/' },
        ],
        global: { label: '전역 Python', pkgs: ['깨끗한 상태'], state: 'clean' },
        hasVenv: true,
      },
      {
        title: '정리 — 가상환경 = 프로젝트별 독립 패키지',
        desc: '가상환경이 없으면: 패키지 충돌, 전역 오염, 협업 시 환경 불일치. 가상환경이 있으면: 프로젝트별 독립, 전역 깨끗, requirements.txt로 환경 재현. python -m venv venv로 만들고 activate로 켠다.',
        projects: [
          { name: '프로젝트 A', pkg: 'FastAPI 0.100', state: 'isolated', venv: 'venv/' },
          { name: '프로젝트 B', pkg: 'FastAPI 0.90', state: 'isolated', venv: 'venv/' },
        ],
        global: { label: '전역 Python', pkgs: ['깨끗!'], state: 'clean' },
        hasVenv: true,
        summary: true,
      },
    ];

    const PROJECT_CLASS = {
      need:     'bg-amber-100 border-amber-400 text-amber-800',
      ok:       'bg-emerald-100 border-emerald-400 text-emerald-700',
      broken:   'bg-red-100 border-red-400 text-red-700',
      isolated: 'bg-blue-100 border-blue-400 text-blue-700',
    };

    const GLOBAL_CLASS = {
      confused: 'bg-amber-50 border-amber-300 text-amber-700',
      conflict: 'bg-red-50 border-red-300 text-red-700',
      clean:    'bg-emerald-50 border-emerald-300 text-emerald-700',
    };

    const PROJECT_ICON = {
      need: '❓', ok: '✅', broken: '💥', isolated: '📦',
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum III-2-1</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-teal-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. FastAPI 첫 걸음 &gt; Chapter 2. 가상환경과 pip</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-2-1. 왜 가상환경이 필요한가</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                가상환경은 <strong>"각 프로젝트에게 자기만의 장난감 상자를 따로 주는 것"</strong>.
                패키지 버전 충돌을 막고, 전역 Python을 깨끗하게 유지한다.
              </p>
            </header>

            <div className="bg-white rounded-xl border border-slate-200 p-5 space-y-4">
              {/* 프로젝트 카드 */}
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                {stepData.projects.map((proj, i) => (
                  <div key={i} className={`p-4 rounded-lg border-2 transition-all duration-300 ${PROJECT_CLASS[proj.state]}`}>
                    <div className="flex items-center justify-between mb-2">
                      <span className="font-bold text-sm">{PROJECT_ICON[proj.state]} {proj.name}</span>
                      {proj.venv && <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-white bg-opacity-60 font-mono">{proj.venv}</span>}
                    </div>
                    <div className="text-xs font-mono bg-white bg-opacity-50 px-2 py-1 rounded">{proj.pkg}</div>
                  </div>
                ))}
              </div>

              {/* 전역 Python 상태 */}
              <div className={`p-3 rounded-lg border-2 transition-all duration-300 ${GLOBAL_CLASS[stepData.global.state]}`}>
                <div className="font-bold text-sm mb-1">{stepData.global.label}</div>
                <div className="flex flex-wrap gap-2">
                  {stepData.global.pkgs.map((pkg, i) => (
                    <span key={i} className="text-xs font-mono bg-white bg-opacity-50 px-2 py-0.5 rounded">{pkg}</span>
                  ))}
                </div>
              </div>

              {/* 화살표 표시 */}
              {!stepData.hasVenv && (
                <div className="text-center text-2xl text-slate-400">↑ 전역에 직접 설치 ↑</div>
              )}
              {stepData.hasVenv && (
                <div className="text-center text-sm text-blue-500 font-medium">각 프로젝트가 독립된 가상환경(venv/) 사용</div>
              )}

              {stepData.summary && (
                <div className="p-3 rounded-lg bg-teal-50 border border-teal-200 text-teal-800 text-sm">
                  <div className="font-bold mb-1">명령어 요약</div>
                  <code className="text-xs bg-white px-1 rounded">python -m venv venv</code> → 가상환경 생성<br/>
                  <code className="text-xs bg-white px-1 rounded">source venv/bin/activate</code> (Mac) / <code className="text-xs bg-white px-1 rounded">venv\Scripts\activate</code> (Win) → 활성화<br/>
                  <code className="text-xs bg-white px-1 rounded">deactivate</code> → 비활성화
                </div>
              )}
            </div>

            <div className="p-4 rounded-xl bg-teal-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-teal-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-teal-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-teal-600 text-white hover:bg-teal-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="../part2/II-6.html" className="text-slate-500 hover:text-slate-700">&larr; II-6 FastAPI 선택 가이드</a>
              <a href="./III-3-1.html" className="text-blue-600 hover:text-blue-800 font-medium">III-3-1 5줄 첫 API &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
