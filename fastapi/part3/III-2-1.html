      reproducible: { bg: 'bg-indigo-50',   border: 'border-indigo-400',   text: 'text-indigo-900',   badge: 'bg-indigo-200 text-indigo-800',   icon: '🔁' },
    };

    const GLOBAL_STYLE = {
      conflict: { bg: 'bg-rose-50',    border: 'border-rose-300',    text: 'text-rose-800',    dot: 'bg-rose-500' },
      clean:    { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-800', dot: 'bg-emerald-500' },
      using:    { bg: 'bg-sky-50',     border: 'border-sky-300',     text: 'text-sky-800',     dot: 'bg-sky-500' },
    };

    function ProjectCard({ p }) {
      const s = PROJECT_STYLE[p.status] || PROJECT_STYLE.isolated;
      return (
        <div className={`rounded-lg border-2 ${s.bg} ${s.border} px-3 py-2`}>
          <div className="flex items-center justify-between mb-1">
            <span className={`text-xs font-bold ${s.text}`}>
              <span className="mr-1">{s.icon}</span>
              {p.name}
            </span>
            <span className={`text-[10px] px-2 py-0.5 rounded ${s.badge}`}>{p.badge}</span>
          </div>
          <div className={`text-sm font-mono ${s.text}`}>{p.need}</div>
        </div>
      );
    }

    function GlobalPythonBox({ globalPy }) {
      if (!globalPy) return null;
      const s = GLOBAL_STYLE[globalPy.state] || GLOBAL_STYLE.clean;
      return (
        <div className={`rounded-lg border ${s.bg} ${s.border} px-3 py-2`}>
          <div className="flex items-center gap-2 mb-1">
            <span className={`w-2 h-2 rounded-full ${s.dot}`}></span>
            <span className={`text-xs font-bold ${s.text}`}>🐍 {globalPy.label}</span>
          </div>
          <div className={`text-sm font-mono ${s.text}`}>{globalPy.installed}</div>
          {globalPy.note && (
            <div className={`text-[10px] mt-1 ${s.text} opacity-80`}>↳ {globalPy.note}</div>
          )}
        </div>
      );
    }

    function VenvBoxList({ venvBoxes }) {
      if (!venvBoxes || venvBoxes.length === 0) return null;
      return (
        <div className="space-y-2">
          <div className="text-[10px] font-bold text-indigo-700 uppercase tracking-wide">venv (격리된 작은 Python)</div>
          {venvBoxes.map((v, i) => (
            <div key={i} className="rounded-lg border-2 border-dashed border-indigo-400 bg-gradient-to-br from-indigo-50 to-violet-50 px-3 py-2">
              <div className="flex items-center justify-between">
                <span className="text-xs font-bold text-indigo-800">📁 {v.name}</span>
                <span className="text-[10px] text-indigo-700">{v.python}</span>
              </div>
              <div className="text-sm font-mono text-indigo-900 mt-1">{v.pkg}</div>
            </div>
          ))}
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">전역 vs venv 비교</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 환경 상태</span>
          </div>

          {/* 두 프로젝트 박스 */}
          <div className="space-y-2 mb-3">
            {state.projects.map((p, i) => (
              <ProjectCard key={i} p={p} />
            ))}
          </div>

          {/* 전역 Python 박스 */}
          <div className="mb-3">
            <GlobalPythonBox globalPy={state.globalPy} />
          </div>

          {/* venv 박스 목록 (Step 2부터 활성) */}
          {state.venvBoxes && (
            <div className="mb-3">
              <VenvBoxList venvBoxes={state.venvBoxes} />
            </div>
          )}

          {/* 화살표 */}
          {state.arrow && (
            <div className="mt-1 mb-2 text-center text-xs font-bold text-indigo-600 py-2 border-y border-dashed border-indigo-300">
              ↓ {state.arrow} ↓
            </div>
          )}

          {/* 키 포인트 */}
          <div className="mt-auto text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js) — 5탭
    // ─────────────────────────────────────────────────────
    function CodeViewer({ steps, stepIdx, onTabChange }) {
      const codeRef = useRef(null);
      const code = steps[stepIdx].code;

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 윈도우 도트 + 탭 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-[10px] text-slate-400">VSCode</span>
          </div>
          {/* 파일 탭 5개 */}
          <div className="flex bg-slate-900 border-b border-slate-700 text-[11px] overflow-x-auto">
            {steps.map((s, i) => (
              <button
                key={i}
                onClick={() => onTabChange(i)}
                className={`px-3 py-1.5 font-mono whitespace-nowrap border-r border-slate-700 transition ${
                  i === stepIdx
                    ? 'bg-[#282c34] text-indigo-300 border-t-2 border-t-indigo-400'
                    : 'text-slate-400 hover:text-slate-200'
                }`}
              >
                {s.code.filename}
              </button>
            ))}
          </div>
          {/* 코드 본문 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          {/* 푸터 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines · {code.lang}</span>
            <span>Step {stepIdx + 1} / {steps.length}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];
      const isLast = stepIdx === STEPS.length - 1;

      // 키보드 좌우
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동재생 — 3000ms
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">III</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">III-2-1. 왜 가상환경(venv)이 필요한가</h1>
                <p className="text-sm text-indigo-800/80">전역 충돌 → venv 격리 → 생성 → 활성화 → requirements.txt</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer steps={STEPS} stepIdx={stepIdx} onTabChange={setStepIdx} />
            </div>

            {/* 컨트롤 — 4버튼 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계 · 상단 탭으로 직접 이동</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                전역 Python 한 군데에 다 깔면 버전 충돌이 난다. python -m venv .venv 로 프로젝트별 작은 Python 을 만들고, activate 로 켜서 그 안에 패키지를 깐다. .venv 자체는 커밋하지 않고 requirements.txt 로 환경을 글로 적어두면 어느 컴퓨터에서도 같은 환경을 재현할 수 있다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['venv', 'site-packages', 'python -m venv', 'activate', 'deactivate', 'pip install', 'requirements.txt', 'pip freeze'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./III-3-1.html" className="underline hover:no-underline">다음: III-3-1 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
