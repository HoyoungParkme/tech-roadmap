<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — 정적 vs 동적 호스팅</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    VII-1-3. 정적 vs 동적 호스팅
    학습 목표: GitHub Pages(정적) vs Render(동적)의 흐름 차이를 이해하고 FastAPI는 왜 반드시 동적 호스팅이 필요한지 안다.
    핵심 비유: GitHub Pages = "책 진열대" (HTML 파일을 그대로 보여주기만 함) / Render = "주방" (Python 실행해 매번 새로 응답)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. 클라이언트 요청 도착',
        desc: '사용자가 브라우저에서 같은 URL을 입력했다. 같은 요청이라도 호스팅 종류에 따라 흐름이 완전히 달라진다. 왼쪽은 정적(GitHub Pages), 오른쪽은 동적(Render)이다.',
        side: 'both',
      },
      {
        title: 'Step 2. 정적 호스팅 — 파일 그대로 반환',
        desc: 'GitHub Pages는 미리 올려둔 HTML/CSS/JS 파일을 "그대로" 클라이언트에 던진다. 서버에서 코드를 실행하지 않는다. 빠르고 무료, 무제한 트래픽이지만 — Python을 실행할 수 없으므로 FastAPI는 동작 불가.',
        side: 'static',
      },
      {
        title: 'Step 3. 동적 호스팅 — Python 실행 후 응답',
        desc: 'Render는 매 요청마다 uvicorn 서버를 통해 FastAPI 라우터를 실행하고, DB 조회/가공 후 JSON을 만들어 응답한다. 매번 다른 응답이 가능하다. 비유: 주방에서 매번 새로 요리한다. 무료 티어에는 슬립 모드가 있어 첫 요청이 느릴 수 있다.',
        side: 'dynamic',
      },
      {
        title: 'Step 4. 결론 — FastAPI는 반드시 동적',
        desc: '정적 호스팅은 페이지 미리보기/마인드맵 같은 "변하지 않는 콘텐츠"에 적합. FastAPI처럼 DB 접근, 인증, 동적 응답이 필요한 백엔드는 반드시 Python 런타임을 제공하는 동적 호스팅(Render/Fly/Railway/AWS)을 써야 한다.',
        side: 'compare',
      },
    ];

    const STATIC_FLOW = [
      { icon: '🌐', label: '클라이언트 요청', detail: 'GET /index.html' },
      { icon: '📦', label: 'CDN/스토리지', detail: '미리 올려둔 파일' },
      { icon: '📄', label: 'HTML 그대로', detail: '서버 실행 없음' },
      { icon: '🌐', label: '클라이언트 응답', detail: '같은 콘텐츠' },
    ];

    const DYNAMIC_FLOW = [
      { icon: '🌐', label: '클라이언트 요청', detail: 'GET /api/todos' },
      { icon: '🚀', label: 'uvicorn', detail: 'ASGI 서버 가동' },
      { icon: '⚡', label: 'FastAPI 라우터', detail: 'Python 코드 실행' },
      { icon: '🗄️', label: 'DB 조회/가공', detail: '동적 데이터' },
      { icon: '🌐', label: 'JSON 응답', detail: '매번 다를 수 있음' },
    ];

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => {
        setCurrentStep((c) => Math.max(0, c - 1));
      };
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 3200);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const showStatic  = step.side === 'static'  || step.side === 'both' || step.side === 'compare';
      const showDynamic = step.side === 'dynamic' || step.side === 'both' || step.side === 'compare';
      const dimStatic   = step.side === 'dynamic';
      const dimDynamic  = step.side === 'static';

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">정적 vs 동적 호스팅</h1>
                <p className="text-sm text-slate-500 mt-1">GitHub Pages는 책 진열대, Render는 주방 — FastAPI는 후자가 필요</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* 좌우 비교 */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
              {/* 정적 (GitHub Pages) */}
              <div className={`bg-white rounded-xl border-2 p-5 transition-opacity ${dimStatic ? 'opacity-30' : 'opacity-100'} ${showStatic ? 'border-sky-400' : 'border-slate-200'}`}>
                <div className="text-center mb-4">
                  <div className="text-3xl mb-1">📚</div>
                  <div className="font-bold text-slate-800">정적 호스팅 (GitHub Pages)</div>
                  <div className="text-[11px] text-slate-500">"책 진열대" 비유</div>
                </div>
                <div className="space-y-2">
                  {STATIC_FLOW.map((f, idx) => (
                    <div key={idx} className="flex items-center gap-3 p-2 bg-sky-50 border border-sky-200 rounded">
                      <span className="text-xl">{f.icon}</span>
                      <div className="flex-1">
                        <div className="text-sm font-bold text-slate-700">{f.label}</div>
                        <div className="text-[10px] text-slate-500">{f.detail}</div>
                      </div>
                      {idx < STATIC_FLOW.length - 1 && <span className="text-sky-400">↓</span>}
                    </div>
                  ))}
                </div>
                {step.side !== 'both' && (
                  <div className="mt-3 p-3 bg-slate-50 rounded text-[11px] text-slate-600 leading-relaxed">
                    ✅ 빠름, 무료, 무제한 트래픽<br/>
                    ❌ Python/DB 실행 불가 → FastAPI 동작 X
                  </div>
                )}
              </div>

              {/* 동적 (Render) */}
              <div className={`bg-white rounded-xl border-2 p-5 transition-opacity ${dimDynamic ? 'opacity-30' : 'opacity-100'} ${showDynamic ? 'border-emerald-400' : 'border-slate-200'}`}>
                <div className="text-center mb-4">
                  <div className="text-3xl mb-1">🍳</div>
                  <div className="font-bold text-slate-800">동적 호스팅 (Render)</div>
                  <div className="text-[11px] text-slate-500">"주방" 비유</div>
                </div>
                <div className="space-y-2">
                  {DYNAMIC_FLOW.map((f, idx) => (
                    <div key={idx} className="flex items-center gap-3 p-2 bg-emerald-50 border border-emerald-200 rounded">
                      <span className="text-xl">{f.icon}</span>
                      <div className="flex-1">
                        <div className="text-sm font-bold text-slate-700">{f.label}</div>
                        <div className="text-[10px] text-slate-500">{f.detail}</div>
                      </div>
                      {idx < DYNAMIC_FLOW.length - 1 && <span className="text-emerald-500">↓</span>}
                    </div>
                  ))}
                </div>
                {step.side !== 'both' && (
                  <div className="mt-3 p-3 bg-slate-50 rounded text-[11px] text-slate-600 leading-relaxed">
                    ✅ Python/DB 실행 가능 → FastAPI 동작<br/>
                    ❌ 무료 티어는 슬립 모드 (15분 idle → cold start)
                  </div>
                )}
              </div>
            </div>

            {/* Step 4 결론 */}
            {step.side === 'compare' && (
              <div className="bg-slate-800 text-white rounded-xl p-5 mb-6">
                <div className="font-bold mb-2">결론 — 무엇을 어디에 올릴까</div>
                <div className="text-sm text-slate-200 leading-relaxed space-y-1">
                  <div>📚 정적: 마인드맵, 블로그, 문서, 랜딩 페이지 → GitHub Pages / Vercel / Netlify</div>
                  <div>🍳 동적: FastAPI, Spring, Django, DB 백엔드 → Render / Fly.io / Railway / AWS</div>
                </div>
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button
                onClick={handlePrev}
                disabled={currentStep === 0}
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed"
              >
                ← 이전
              </button>
              <button
                onClick={togglePlay}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700"
              >
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={currentStep === STEPS.length - 1}
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed"
              >
                다음 →
              </button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
