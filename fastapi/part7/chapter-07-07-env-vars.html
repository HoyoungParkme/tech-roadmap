<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — 환경변수로 비밀 보호하기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    VII-2-1. 환경변수 — 비밀번호를 코드에 쓰지 않는 법
    학습 목표: .env + BaseSettings + .gitignore + Render 대시보드 4단계로 비밀을 안전하게 관리할 수 있다.
    핵심 비유: "금고와 출입증" — 비밀번호는 금고(.env)에 두고, 코드엔 열쇠(설정 객체)만
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const BAD_CODE = [
      'DATABASE_URL = "sqlite:///./todos.db"',
      'SECRET_KEY = "my-secret-key-here"  # 위험!',
      '',
      '# main.py에서 직접 사용',
      'engine = create_engine(DATABASE_URL)',
    ];

    const GOOD_ENV = [
      '# .env (이 파일은 .gitignore에 추가)',
      'DATABASE_URL=sqlite:///./todos.db',
      'SECRET_KEY=my-secret-key-here',
    ];

    const GOOD_CONFIG = [
      '# core/config.py',
      'from pydantic_settings import BaseSettings',
      '',
      'class Settings(BaseSettings):',
      '    database_url: str',
      '    secret_key: str = "개발용-기본값"',
      '',
      '    class Config:',
      '        env_file = ".env"',
      '',
      'settings = Settings()',
    ];

    const STEPS = [
      {
        title: 'Step 1. 위험 — 코드에 비밀번호 직접 작성',
        desc: '비밀번호/API 키를 코드에 그대로 쓰면, GitHub에 push하는 순간 전 세계에 공개된다. 검색 엔진이 .py 파일을 인덱싱하므로 30분 내에 봇이 키를 가져갈 수 있다. 실제 사례: AWS 키 노출로 하룻밤에 수백 달러 청구된 경우 다수.',
        focus: 'danger',
      },
      {
        title: 'Step 2. 해결 — .env 파일로 분리',
        desc: '비밀 값을 .env 파일에 따로 적는다. 이 파일은 코드와 분리되어 있고 .gitignore에 추가되므로 git이 절대 추적하지 않는다. 코드 안에서는 환경변수를 "읽어오는" 방식으로 사용한다.',
        focus: 'env',
      },
      {
        title: 'Step 3. .gitignore 차단 — git이 보지 못하게',
        desc: '.gitignore 파일에 .env 한 줄을 추가하면, 그 다음부터 git status / git add 명령에서 .env가 완전히 사라진다. 실수로 add 해도 거부된다. 가장 확실한 안전장치다.',
        focus: 'gitignore',
      },
      {
        title: 'Step 4. BaseSettings — 코드에서 안전하게 읽기',
        desc: 'pydantic-settings의 BaseSettings를 상속해 Settings 클래스를 만든다. 자동으로 .env에서 값을 읽어와 타입 검증까지 해준다. 비유: 금고에서 출입증을 발급받아 건물 안에서 사용. 비밀번호 자체는 금고 밖으로 나오지 않는다.',
        focus: 'config',
      },
      {
        title: 'Step 5. 배포 — Render Environment Variables',
        desc: '.env는 로컬용. 배포 서버(Render)에는 .env 파일을 올리지 않는다. 대신 Render 대시보드의 "Environment Variables" 메뉴에서 같은 변수를 직접 입력한다. 코드는 동일하지만 환경마다 다른 값이 주입된다.',
        focus: 'deploy',
      },
    ];

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => setCurrentStep((c) => Math.max(0, c - 1));
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const focus = step.focus;

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">환경변수로 비밀 보호하기</h1>
                <p className="text-sm text-slate-500 mt-1">금고(.env)에 비밀번호 보관, 코드엔 출입증(설정 객체)만</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* Step 1: 위험 시나리오 */}
            {focus === 'danger' && (
              <div className="bg-white rounded-xl shadow-sm border-2 border-rose-300 p-5 mb-6">
                <div className="font-bold text-rose-700 text-sm mb-3 flex items-center gap-2">
                  ⚠️ 위험! main.py
                </div>
                <pre className="bg-slate-900 text-white p-4 rounded text-xs leading-6 font-mono">
                  {BAD_CODE.map((line, i) => (
                    <div key={i} className={line.includes('SECRET_KEY') ? 'bg-rose-700 -mx-4 px-4' : ''}>
                      <span className="text-slate-500 mr-3 select-none">{(i+1).toString().padStart(2, ' ')}</span>
                      {line || ' '}
                    </div>
                  ))}
                </pre>
                <div className="mt-3 p-3 bg-rose-50 border border-rose-200 rounded text-[11px] text-rose-900 leading-relaxed">
                  <div className="font-bold mb-1">git push origin main 후 30분 안에 일어나는 일</div>
                  <div>• GitHub 검색에 "SECRET_KEY"로 노출됨</div>
                  <div>• 봇이 자동으로 키 추출 → 무단 사용</div>
                  <div>• AWS/Stripe 키였다면 즉시 과금 발생</div>
                </div>
              </div>
            )}

            {/* Step 2~5: .env + 설정 + 배포 */}
            {focus !== 'danger' && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                {/* 왼쪽: .env 파일 */}
                <div className={`bg-white rounded-xl border-2 p-4 transition-all ${
                  focus === 'env' || focus === 'gitignore' ? 'border-emerald-400 bg-emerald-50' : 'border-slate-200'
                }`}>
                  <div className="font-bold text-slate-800 text-sm mb-2 flex items-center gap-2">
                    🔐 .env (금고)
                    {focus === 'gitignore' && <span className="text-[10px] bg-amber-200 text-amber-800 px-2 py-0.5 rounded">gitignore 차단됨</span>}
                  </div>
                  <pre className="bg-slate-900 text-white p-3 rounded text-[11px] leading-5 font-mono">
                    {GOOD_ENV.map((line, i) => (
                      <div key={i}>{line || ' '}</div>
                    ))}
                  </pre>
                  {focus === 'gitignore' && (
                    <div className="mt-3 p-2 bg-amber-50 border border-amber-300 rounded text-[10px] font-mono text-amber-900">
                      .gitignore:<br/>
                      <span className="bg-amber-200 px-1">.env</span>  ← 추가됨<br/>
                      .venv/<br/>
                      __pycache__/
                    </div>
                  )}
                  {focus === 'deploy' && (
                    <div className="mt-3 p-2 bg-slate-100 rounded text-[10px] text-slate-600 italic">
                      ❌ 배포 서버에는 안 올림 (로컬 전용)
                    </div>
                  )}
                </div>

                {/* 오른쪽: BaseSettings 코드 또는 Render 대시보드 */}
                {focus !== 'deploy' ? (
                  <div className={`bg-white rounded-xl border-2 p-4 transition-all ${
                    focus === 'config' ? 'border-violet-400 bg-violet-50' : 'border-slate-200 opacity-60'
                  }`}>
                    <div className="font-bold text-slate-800 text-sm mb-2">🎫 core/config.py (출입증)</div>
                    <pre className="bg-slate-900 text-white p-3 rounded text-[11px] leading-5 font-mono">
                      {GOOD_CONFIG.map((line, i) => (
                        <div key={i} className={focus === 'config' && (line.includes('BaseSettings') || line.includes('env_file')) ? 'bg-violet-700 -mx-3 px-3' : ''}>
                          {line || ' '}
                        </div>
                      ))}
                    </pre>
                    {focus === 'config' && (
                      <div className="mt-3 p-2 bg-violet-50 border border-violet-200 rounded text-[10px] text-violet-900">
                        ✅ .env에서 자동으로 값 읽기 + 타입 검증<br/>
                        ✅ 비밀번호는 코드에 절대 등장 X
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="bg-sky-50 rounded-xl border-2 border-sky-400 p-4">
                    <div className="font-bold text-slate-800 text-sm mb-2 flex items-center gap-2">
                      ☁️ Render Dashboard
                    </div>
                    <div className="bg-white border border-slate-300 rounded p-3 text-xs">
                      <div className="text-[11px] font-bold text-slate-700 mb-2">Environment Variables</div>
                      <div className="space-y-1.5">
                        <div className="flex items-center gap-2 p-1.5 bg-slate-50 rounded text-[10px] font-mono">
                          <span className="text-slate-500">KEY:</span>
                          <span className="text-slate-800">DATABASE_URL</span>
                          <span className="text-slate-500 ml-auto">VALUE:</span>
                          <span className="text-slate-800">postgres://...</span>
                        </div>
                        <div className="flex items-center gap-2 p-1.5 bg-slate-50 rounded text-[10px] font-mono">
                          <span className="text-slate-500">KEY:</span>
                          <span className="text-slate-800">SECRET_KEY</span>
                          <span className="text-slate-500 ml-auto">VALUE:</span>
                          <span className="text-slate-800">●●●●●●●●●●</span>
                        </div>
                      </div>
                    </div>
                    <div className="mt-3 p-2 bg-sky-100 rounded text-[10px] text-sky-900">
                      💡 코드는 동일, 환경마다 다른 값이 주입된다.<br/>
                      로컬: .env 파일 / 배포: Render 대시보드 입력값
                    </div>
                  </div>
                )}
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button onClick={handlePrev} disabled={currentStep === 0} aria-label="이전 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">← 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700">
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} aria-label="다음 단계"
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">다음 →</button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
