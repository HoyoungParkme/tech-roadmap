            '- 사고가 터졌을 때도 같은 메커니즘으로 즉시 교체 가능',
            '',
            '## 권장 주기 (실무 기준)',
            '| 비밀 종류 | 정기 주기 | 긴급 시 |',
            '|:--|:--|:--|',
            '| DB 비밀번호 | 90일 | 노출 의심 즉시 |',
            '| 외부 API 키 (Stripe, OpenAI) | 30~60일 | 같음 |',
            '| JWT 서명 시크릿 | 180일 | 같음 |',
            '| OAuth Client Secret | 1년 | 같음 |',
            '| 일회용 토큰 | 분/시간 단위 | TTL 만료 |',
            '',
            '## 무중단 rotation 패턴 (grace period)',
            '1. 새 비밀 v2 발급 → Secret Manager 에 등록',
            '2. 일정 시간(예: 24h) v1, v2 모두 유효하게 둠',
            '3. 모든 서비스가 v2 로 자연스럽게 전환되도록 부팅 시 fetch',
            '4. grace 종료 후 v1 폐기',
            '',
            '## AWS Secrets Manager 자동 rotation',
            '- Secret 마다 "Rotation" 활성화',
            '- 주기: 7 ~ 365일 중 선택',
            '- Rotation Lambda 가 새 비밀 생성 + DB 사용자 비번 교체까지 자동화',
            '- 앱은 부팅마다 `get_secret_value` 로 최신값을 받으므로 코드 무변경',
            '',
            '## 긴급 rotation 체크리스트',
            '- [ ] Secret Manager 에서 "Rotate now" 실행',
            '- [ ] 모든 서비스 롤링 재시작 (또는 hot-reload)',
            '- [ ] 외부 파트너에게 새 키 공지',
            '- [ ] 옛 비밀이 사용된 흔적 로그 분석',
            '- [ ] 사후 보고서 작성 (RCA)',
            '',
            '## 핵심 정리 (1줄)',
            '> 비밀은 "코드 밖" 이 시작, "정기 교체" 가 완성.',
          ],
          highlight: [3, 4, 5, 6, 9, 10, 11, 12, 13, 14, 18, 19, 20, 21, 22, 23, 36, 37, 38],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤
    // ─────────────────────────────────────────────────────
    const KIND_STYLE = {
      danger:   { bg: 'bg-rose-50',    border: 'border-rose-300',    text: 'text-rose-800',    badge: 'bg-rose-200 text-rose-800' },
      local:    { bg: 'bg-sky-50',     border: 'border-sky-300',     text: 'text-sky-800',     badge: 'bg-sky-200 text-sky-800' },
      platform: { bg: 'bg-indigo-50',  border: 'border-indigo-300',  text: 'text-indigo-800',  badge: 'bg-indigo-200 text-indigo-800' },
      vault:    { bg: 'bg-violet-50',  border: 'border-violet-300',  text: 'text-violet-800',  badge: 'bg-violet-200 text-violet-800' },
      rotate:   { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-800', badge: 'bg-emerald-200 text-emerald-800' },
    };

    function StoreCard({ item }) {
      const s = KIND_STYLE[item.kind] || KIND_STYLE.local;
      return (
        <div className={`rounded-lg border ${s.bg} ${s.border} px-3 py-2 flex items-center justify-between`}>
          <div className="flex items-center gap-2 min-w-0">
            <span className={`text-xs font-bold ${s.text} w-20 shrink-0`}>{item.label}</span>
            <span className={`text-sm font-mono font-bold ${s.text} truncate`}>{item.value}</span>
          </div>
          <span className={`text-[10px] px-2 py-0.5 rounded ${s.badge} shrink-0 ml-2`}>{item.badge}</span>
        </div>
      );
    }

    function IncidentBox({ incident }) {
      if (!incident) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-rose-400 bg-rose-50 p-3">
          <div className="text-xs font-bold text-rose-800 mb-2">🚨 {incident.title}</div>
          <ul className="space-y-1">
            {incident.actions.map((a, i) => (
              <li key={i} className="text-sm text-rose-900 flex gap-2">
                <span className="text-rose-500">▸</span>
                <span>{a}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function GuardBox({ guard }) {
      if (!guard) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-indigo-500 bg-gradient-to-br from-indigo-50 to-violet-50 p-4">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl">🔐</span>
            <span className="text-base font-bold text-indigo-800">{guard.title}</span>
          </div>
          <ul className="space-y-1.5">
            {guard.features.map((f, i) => (
              <li key={i} className="text-sm text-indigo-900 flex gap-2">
                <span className="text-indigo-500 mt-0.5">✓</span>
                <span>{f}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">비밀 저장 위치별 안전성</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 저장소 상태</span>
          </div>
          <div className="space-y-2">
            {state.storeList.map((it, i) => (
              <StoreCard key={i} item={it} />
            ))}
          </div>
          {state.arrow && (
            <div className="mt-3 text-center text-xs font-bold text-indigo-600 py-2 border-y border-dashed border-indigo-300">
              ↓ {state.arrow} ↓
            </div>
          )}
          <IncidentBox incident={state.incident} />
          <GuardBox guard={state.guardBox} />
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">7</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter 07-07. 환경변수로 비밀 보호하기</h1>
                <p className="text-sm text-indigo-800/80">하드코딩 → .env → 플랫폼 env → Secret Manager → Rotation 5단계로 추적</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 허브로</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 (4버튼) */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                비밀은 코드 밖으로 — .env 로 분리하고, 운영에선 플랫폼 env / Secret Manager 로 한 단계 더 격리하고, 마지막에 정기적으로 rotation 한다. "한 번 안전"이 아니라 "지속적으로 안전"이 보안의 본질이다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['환경변수', '.env', '.gitignore', 'BaseSettings', 'Secret Manager', 'IAM', 'Rotation', '12-Factor'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./chapter-07-06-platform-compare.html" className="underline hover:no-underline">← 07-06 플랫폼 비교</a>
              <a href="../index.html" className="underline hover:no-underline">허브로 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
