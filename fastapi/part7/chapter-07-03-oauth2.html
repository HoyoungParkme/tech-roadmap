<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — VII-2-1. OAuth2 소셜 로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    VII-2-1. OAuth2 소셜 로그인
    학습 목표: OAuth2 Authorization Code Flow를 이해하고 FastAPI에서 구현 개요를 설명할 수 있다.
    핵심 비유: "호텔 프론트에서 여권으로 신원 확인 — Google이 여권 발급 역할"
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: '비밀번호 로그인의 한계',
        desc: '사용자마다 ID/PW를 관리하면? 비밀번호 분실, 약한 비밀번호, 해킹 시 대량 유출 위험. 사용자도 매 사이트마다 비밀번호를 기억해야 한다. "Google로 로그인" 한 줄이면 해결된다.',
        visual: 'problem',
      },
      {
        title: 'OAuth2란 — 제3자에게 인증을 맡긴다',
        desc: '비유: 호텔 프론트에서 여권으로 신원 확인. 우리 서비스(호텔)는 직접 신분증을 발급하지 않고, Google/GitHub(여권 발급 기관)에게 "이 사람 맞아?" 하고 확인한다.',
        visual: 'concept',
      },
      {
        title: 'Authorization Code Flow',
        desc: '(1) 사용자를 Google 로그인 페이지로 리다이렉트 → (2) 사용자가 동의하면 Google이 "인가 코드"를 우리 서버로 전달(콜백) → (3) 우리 서버가 인가 코드로 "액세스 토큰"을 교환 → (4) 토큰으로 사용자 정보 조회.',
        visual: 'flow',
        showCode: true,
      },
      {
        title: 'FastAPI 구현 개요',
        desc: '(1) /login/google — Google 인증 페이지로 리다이렉트. (2) /callback — 인가 코드를 받아 토큰 교환. (3) 토큰으로 사용자 이메일/이름 조회 후 DB 저장. authlib 또는 httpx로 구현한다.',
        visual: 'implementation',
        summary: true,
      },
    ];

    const VISUAL_CLASS = {
      problem: 'border-red-400 bg-red-50',
      concept: 'border-amber-400 bg-amber-50',
      flow: 'border-blue-400 bg-blue-50',
      implementation: 'border-emerald-400 bg-emerald-50',
    };

    const VISUAL_ICON = {
      problem: '🔓',
      concept: '🛂',
      flow: '🔄',
      implementation: '🚀',
    };

    const VISUAL_LABEL = {
      problem: '비밀번호 관리의 부담',
      concept: '제3자 인증 (OAuth2)',
      flow: 'Authorization Code Flow',
      implementation: 'FastAPI 구현',
    };

    const CODE = [
      '# 1. 로그인 리다이렉트',
      '@app.get("/login/google")',
      'async def login_google():',
      '    return RedirectResponse(google_auth_url)',
      '',
      '# 2. 콜백 — 인가 코드 → 토큰 교환',
      '@app.get("/callback")',
      'async def callback(code: str):',
      '    token = await exchange_code_for_token(code)',
      '    user_info = await get_user_info(token)',
      '    # DB에 사용자 저장/조회',
      '    return {"email": user_info["email"]}',
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum VII-2-1</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VII. 배포와 운영 &gt; Chapter 2. 인증 심화</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VII-2-1. OAuth2 소셜 로그인</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                호텔 프론트에서 여권으로 신원 확인 — <strong>Google이 여권 발급 역할</strong>을 하는 OAuth2 인증.
              </p>
            </header>

            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="flex flex-col items-center gap-4">
                <div className={`w-full max-w-md p-6 rounded-lg border-2 transition-all duration-300 text-center ${VISUAL_CLASS[stepData.visual]}`}>
                  <div className="text-3xl mb-2">{VISUAL_ICON[stepData.visual]}</div>
                  <div className="font-bold text-sm">{VISUAL_LABEL[stepData.visual]}</div>
                </div>

                {stepData.visual === 'flow' && (
                  <div className="w-full max-w-lg">
                    <div className="flex items-center gap-2 text-[10px] md:text-xs justify-center flex-wrap">
                      <div className="p-2 rounded bg-blue-100 border border-blue-300 text-center">사용자</div>
                      <span className="text-slate-400">→ 로그인 클릭</span>
                      <div className="p-2 rounded bg-amber-100 border border-amber-300 text-center">Google</div>
                      <span className="text-slate-400">→ 인가코드</span>
                      <div className="p-2 rounded bg-emerald-100 border border-emerald-300 text-center">우리 서버</div>
                      <span className="text-slate-400">→ 토큰교환</span>
                      <div className="p-2 rounded bg-violet-100 border border-violet-300 text-center">완료</div>
                    </div>
                  </div>
                )}

                {stepData.visual === 'concept' && (
                  <div className="w-full max-w-md grid grid-cols-3 gap-2 items-center text-center text-xs">
                    <div className="p-2 rounded bg-blue-100 border border-blue-300">우리 서비스<br/><span className="text-[10px] text-slate-500">(호텔)</span></div>
                    <div className="text-lg font-bold text-amber-500">← 확인 →</div>
                    <div className="p-2 rounded bg-amber-100 border border-amber-300">Google<br/><span className="text-[10px] text-slate-500">(여권 기관)</span></div>
                  </div>
                )}
              </div>
            </div>

            {stepData.showCode && (
              <div className="bg-slate-900 rounded-xl overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono">main.py — OAuth2 엔드포인트 개요</div>
                <div className="p-4 text-xs font-mono leading-5">
                  {CODE.map((line, i) => (
                    <div key={i} className={`px-2 py-0.5 ${i >= 1 && i <= 3 ? 'bg-blue-900/40 text-blue-300' : i >= 6 && i <= 11 ? 'bg-emerald-900/40 text-emerald-300' : 'text-slate-300'}`}>{line || '\u00A0'}</div>
                  ))}
                </div>
              </div>
            )}

            {stepData.summary && (
              <div className="bg-white rounded-xl border border-slate-200 p-4">
                <div className="text-sm font-bold text-slate-600 mb-2">OAuth2 흐름 요약</div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs">
                  <div className="p-2 rounded bg-blue-50 border border-blue-200"><b>1. /login</b> — 인증 페이지 리다이렉트</div>
                  <div className="p-2 rounded bg-amber-50 border border-amber-200"><b>2. 사용자 동의</b> — Google에서 허용 클릭</div>
                  <div className="p-2 rounded bg-violet-50 border border-violet-200"><b>3. /callback</b> — 인가 코드 수신</div>
                  <div className="p-2 rounded bg-emerald-50 border border-emerald-200"><b>4. 토큰 교환</b> — 사용자 정보 획득</div>
                </div>
              </div>
            )}

            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-07-02-deploy.html" className="text-slate-500 hover:text-slate-700">&larr; VII-1-2 배포 플랫폼 비교</a>
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">허브로 돌아가기 &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
