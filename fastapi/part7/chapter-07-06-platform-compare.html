            '',
            '# ─── Google Cloud Run ────────────────────',
            'gcloud run deploy fastapi-app \\',
            '  --source . \\',
            '  --region asia-northeast3 \\',
            '  --allow-unauthenticated',
            '# → Cloud Build 가 도커 빌드 → Cloud Run 배포',
            '# → 첫 줄에 https URL 출력',
            '',
            '# ─── 결론 ────────────────────────────────',
            '# 학습/MVP   : Railway / Render  (git push 만)',
            '# 글로벌     : Fly.io           (fly deploy)',
            '# 스파이크   : Cloud Run        (gcloud run deploy)',
            '# 엔터프라이즈: App Runner       (콘솔/IaC)',
          ],
          highlight: [3, 4, 5, 6, 8, 9, 10, 13, 14, 15, 16, 17, 35, 36, 37, 38, 39, 43, 44, 45, 46, 47],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — 5×5 매트릭스 (활성 컬럼 강조)
    // ─────────────────────────────────────────────────────
    const TONE_STYLE = {
      good: { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-800', dot: 'bg-emerald-500' },
      warn: { bg: 'bg-amber-50',    border: 'border-amber-300',   text: 'text-amber-800',   dot: 'bg-amber-500'   },
      bad:  { bg: 'bg-rose-50',     border: 'border-rose-300',    text: 'text-rose-800',    dot: 'bg-rose-500'    },
    };

    function MatrixRow({ platform, metric }) {
      const t = TONE_STYLE[metric.tone] || TONE_STYLE.warn;
      return (
        <div className={`rounded-lg border ${t.bg} ${t.border} px-3 py-2 flex items-center gap-3`}>
          <div className="flex items-center gap-2 w-40 shrink-0">
            <span className="text-xl">{platform.emoji}</span>
            <div className="flex flex-col">
              <span className="text-sm font-bold text-slate-800 leading-tight">{platform.name}</span>
              <span className="text-[10px] text-slate-500 leading-tight">{platform.tag}</span>
            </div>
          </div>
          <div className="flex-1 flex items-center gap-2">
            <span className={`w-2 h-2 rounded-full ${t.dot}`}></span>
            <span className={`text-sm font-medium ${t.text}`}>{metric.label}</span>
          </div>
          <div className="flex flex-col items-end shrink-0">
            <span className={`text-base font-mono font-bold ${t.text}`}>{metric.value}</span>
            <span className="text-[10px] text-slate-500">{metric.note}</span>
          </div>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      // 플랫폼 순서대로 정렬 (state.metrics 는 id 기반 매핑)
      const metricById = Object.fromEntries(state.metrics.map((m) => [m.id, m]));
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">5×5 플랫폼 매트릭스</h3>
            <span className="text-[10px] text-slate-500">현재 지표: {state.metricKey}</span>
          </div>
          <div className="space-y-2">
            {PLATFORMS.map((p) => (
              <MatrixRow key={p.id} platform={p} metric={metricById[p.id]} />
            ))}
          </div>
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
          <div className="mt-2 grid grid-cols-3 gap-1.5 text-[10px]">
            <div className="flex items-center gap-1.5 rounded border border-emerald-200 bg-emerald-50 px-2 py-1">
              <span className="w-2 h-2 rounded-full bg-emerald-500"></span>
              <span className="text-emerald-800">유리/추천</span>
            </div>
            <div className="flex items-center gap-1.5 rounded border border-amber-200 bg-amber-50 px-2 py-1">
              <span className="w-2 h-2 rounded-full bg-amber-500"></span>
              <span className="text-amber-800">중간/조건부</span>
            </div>
            <div className="flex items-center gap-1.5 rounded border border-rose-200 bg-rose-50 px-2 py-1">
              <span className="w-2 h-2 rounded-full bg-rose-500"></span>
              <span className="text-rose-800">불리/주의</span>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer — 5탭, highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ stepIdx, setStepIdx, total }) {
      const code = STEPS[stepIdx].code;
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 탭 바 (5탭) */}
          <div className="flex items-center gap-0.5 px-2 pt-2 bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {STEPS.map((s, i) => {
              const active = i === stepIdx;
              return (
                <button
                  key={i}
                  onClick={() => setStepIdx(i)}
                  className={`px-3 py-1.5 text-[11px] font-mono rounded-t whitespace-nowrap transition ${
                    active
                      ? 'bg-[#282c34] text-indigo-300 border-t border-x border-slate-700'
                      : 'bg-slate-800 text-slate-400 hover:text-slate-200'
                  }`}
                >
                  {s.code.filename}
                </button>
              );
            })}
          </div>
          {/* 윈도우 헤더 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          {/* 코드 본문 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          {/* 푸터 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">VII</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter VII-6. 배포 플랫폼 매트릭스</h1>
                <p className="text-sm text-indigo-800/80">Render / Fly / Railway / AWS App Runner / Cloud Run × 5개 지표</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer stepIdx={stepIdx} setStepIdx={setStepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리 — 시나리오별 추천</div>
                <ul className="space-y-1 mt-2">
                  <li>• <b>처음 배포</b>: Render (git push 자동, 무료 750h)</li>
                  <li>• <b>사이드 운영</b>: Railway ($5 크레딧, 원클릭 DB)</li>
                  <li>• <b>글로벌 서비스</b>: Fly.io (엣지 배포)</li>
                  <li>• <b>트래픽 스파이크</b>: Google Cloud Run (0→1000 인스턴스)</li>
                  <li>• <b>사내 AWS 통합</b>: AWS App Runner (IAM/VPC 통제)</li>
                </ul>
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Render', 'Fly.io', 'Railway', 'AppRunner', 'CloudRun', 'cold-start', 'autoscale', 'min-instances'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./chapter-07-05-static-vs-dynamic.html" className="underline hover:no-underline">← 이전: VII-5 정적 vs 동적 호스팅</a>
              <a href="./chapter-07-07-env-vars.html" className="underline hover:no-underline">다음: VII-7 환경변수 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
