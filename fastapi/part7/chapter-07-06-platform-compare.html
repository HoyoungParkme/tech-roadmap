<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — 배포 플랫폼 매트릭스</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    VII-1-4. 배포 플랫폼 매트릭스 — Render / Fly.io / Railway / AWS
    학습 목표: 4개 동적 호스팅 플랫폼의 무료 티어/난이도/특징을 비교하고 시나리오별 추천을 안다.
    핵심 비유: 식당 종류 — Render(작은 식당, 무료지만 슬립), Fly.io(글로벌 체인), Railway(부드러운 서비스), AWS(거대 시설)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PLATFORMS = [
      {
        id: 'render',
        name: 'Render',
        emoji: '🍱',
        analogy: '작은 무료 식당',
        free:    '750h/월 무료',
        difficulty: '⭐ 쉬움',
        sleep:   '15분 idle → sleep',
        feature: 'GitHub 자동 연동, 학습용 최적',
        bestFor: '학습/MVP',
        color: 'emerald',
      },
      {
        id: 'fly',
        name: 'Fly.io',
        emoji: '🌍',
        analogy: '글로벌 체인',
        free:    '3 VM 무료',
        difficulty: '⭐⭐ 보통',
        sleep:   'Auto-stop 옵션',
        feature: '엣지 글로벌 배포, 빠른 응답',
        bestFor: '글로벌 서비스',
        color: 'sky',
      },
      {
        id: 'railway',
        name: 'Railway',
        emoji: '🚆',
        analogy: '부드러운 정기 서비스',
        free:    '$5 크레딧/월',
        difficulty: '⭐ 쉬움',
        sleep:   '없음 (크레딧 한도)',
        feature: 'DB 통합 쉬움, 부드러운 UX',
        bestFor: 'MVP/소규모 서비스',
        color: 'violet',
      },
      {
        id: 'aws',
        name: 'AWS',
        emoji: '🏭',
        analogy: '거대한 산업 단지',
        free:    '12개월 한정 무료',
        difficulty: '⭐⭐⭐⭐ 어려움',
        sleep:   '없음',
        feature: '무한 확장, 가장 많은 서비스',
        bestFor: '프로덕션/대규모',
        color: 'amber',
      },
    ];

    const SCENARIOS = {
      learner: {
        label: '학습자 (이번이 첫 배포)',
        recommend: ['render', 'railway'],
        reason: '클릭 몇 번으로 배포 가능, 무료. Render는 슬립이 있지만 학습엔 충분.',
      },
      mvp: {
        label: 'MVP / 사이드 프로젝트',
        recommend: ['railway', 'fly'],
        reason: 'Railway는 DB 연동이 쉬워 빠르게 띄움. 글로벌 사용자면 Fly.io.',
      },
      production: {
        label: '프로덕션 / 회사 서비스',
        recommend: ['aws', 'fly'],
        reason: 'AWS는 안정성과 확장성 최강. Fly.io는 가벼우면서도 글로벌 배포.',
      },
    };

    const STEPS = [
      {
        title: 'Step 1. 시나리오 선택 — 누가 쓰는가',
        desc: '같은 FastAPI 앱이라도 누가, 어떤 규모로 쓸지에 따라 적합한 플랫폼이 다르다. 학습자가 처음 배포할 때와 회사 프로덕션은 완전히 다른 선택이다. 먼저 자신의 시나리오를 정한다.',
        view: 'scenario',
      },
      {
        title: 'Step 2. 4개 플랫폼 한눈에 비교',
        desc: 'Render, Fly.io, Railway, AWS를 무료 티어/난이도/슬립 모드/특징 4축으로 비교한다. 학습/MVP/프로덕션 어느 시나리오에 적합한지 같이 본다. 비유로 빠르게 감을 잡는다.',
        view: 'compare',
      },
      {
        title: 'Step 3. Render 슬립 모드 타임라인',
        desc: 'Render 무료 티어는 15분 동안 요청이 없으면 sleep 상태가 된다. 다음 첫 요청은 cold start로 30초~1분 걸린다 — 학습용엔 OK, 실서비스엔 부적합. 이걸 시간축으로 본다.',
        view: 'sleep',
      },
      {
        title: 'Step 4. 시나리오별 추천 매트릭스',
        desc: '각 시나리오에서 어느 플랫폼이 추천되는지 매트릭스로 정리. "내 상황 = 학습/MVP/프로덕션 중 하나" → 추천 플랫폼 즉시 확인. 더 깊이 비교하려면 각 플랫폼 공식 문서 확인.',
        view: 'matrix',
      },
    ];

    const COLOR_BORDER = {
      emerald: 'border-emerald-400',
      sky:     'border-sky-400',
      violet:  'border-violet-400',
      amber:   'border-amber-400',
    };
    const COLOR_BG = {
      emerald: 'bg-emerald-50',
      sky:     'bg-sky-50',
      violet:  'bg-violet-50',
      amber:   'bg-amber-50',
    };
    const COLOR_BADGE = {
      emerald: 'bg-emerald-600',
      sky:     'bg-sky-600',
      violet:  'bg-violet-600',
      amber:   'bg-amber-600',
    };

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [scenario, setScenario] = useState('learner');
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const handleNextRef = useRef(null);
      const handlePrevRef = useRef(null);

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) setCurrentStep((c) => c + 1);
        else setIsPlaying(false);
      };
      const handlePrev = () => {
        setCurrentStep((c) => Math.max(0, c - 1));
      };
      handleNextRef.current = handleNext;
      handlePrevRef.current = handlePrev;

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => handleNextRef.current(), 3200);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') handleNextRef.current();
          if (e.key === 'ArrowLeft') handlePrevRef.current();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const togglePlay = () => {
        if (currentStep === STEPS.length - 1) setCurrentStep(0);
        setIsPlaying((p) => !p);
      };

      const step = STEPS[currentStep];
      const sc = SCENARIOS[scenario];

      return (
        <div className="min-h-screen bg-slate-50 p-6">
          <div className="max-w-6xl mx-auto">
            <div className="mb-6 flex items-start justify-between gap-4">
              <div>
                <a href="../index.html" className="text-xs text-slate-500 hover:text-slate-700">← 허브로</a>
                <h1 className="text-2xl font-bold text-slate-800 mt-1">배포 플랫폼 매트릭스</h1>
                <p className="text-sm text-slate-500 mt-1">Render / Fly.io / Railway / AWS — 시나리오별 적합도</p>
              </div>
              <div className="text-right">
                <div className="text-[11px] text-slate-400">Step</div>
                <div className="text-2xl font-bold text-slate-700">{currentStep + 1} / {STEPS.length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
              <div className="font-bold text-slate-800 text-lg mb-2">{step.title}</div>
              <p className="text-sm text-slate-600 leading-relaxed">{step.desc}</p>
            </div>

            {/* Step 1: 시나리오 선택 */}
            {step.view === 'scenario' && (
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-6">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                  {Object.entries(SCENARIOS).map(([key, s]) => (
                    <button
                      key={key}
                      onClick={() => setScenario(key)}
                      aria-pressed={scenario === key}
                      className={`p-4 rounded-lg border-2 text-left transition-all ${
                        scenario === key
                          ? 'border-slate-800 bg-slate-50'
                          : 'border-slate-200 hover:border-slate-400 bg-white'
                      }`}
                    >
                      <div className="font-bold text-sm text-slate-800">{s.label}</div>
                    </button>
                  ))}
                </div>
                <div className="p-4 bg-slate-50 rounded-lg">
                  <div className="text-xs font-bold text-slate-700 mb-1">선택된 시나리오</div>
                  <div className="text-sm text-slate-800">{sc.label}</div>
                  <div className="text-xs text-slate-500 mt-2">{sc.reason}</div>
                </div>
              </div>
            )}

            {/* Step 2: 4 플랫폼 비교 */}
            {step.view === 'compare' && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                {PLATFORMS.map((p) => (
                  <div key={p.id} className={`bg-white rounded-xl border-2 p-5 ${COLOR_BORDER[p.color]}`}>
                    <div className="flex items-center gap-3 mb-3">
                      <div className="text-3xl">{p.emoji}</div>
                      <div>
                        <div className="font-bold text-slate-800">{p.name}</div>
                        <div className="text-[11px] text-slate-500">{p.analogy}</div>
                      </div>
                    </div>
                    <div className={`p-2 rounded ${COLOR_BG[p.color]} space-y-1`}>
                      <div className="text-[11px]"><span className="font-bold text-slate-600">무료:</span> <span className="text-slate-700">{p.free}</span></div>
                      <div className="text-[11px]"><span className="font-bold text-slate-600">난이도:</span> <span className="text-slate-700">{p.difficulty}</span></div>
                      <div className="text-[11px]"><span className="font-bold text-slate-600">슬립:</span> <span className="text-slate-700">{p.sleep}</span></div>
                      <div className="text-[11px]"><span className="font-bold text-slate-600">특징:</span> <span className="text-slate-700">{p.feature}</span></div>
                      <div className="text-[11px]"><span className="font-bold text-slate-600">적합:</span> <span className={`text-white px-2 py-0.5 rounded text-[10px] font-bold ${COLOR_BADGE[p.color]}`}>{p.bestFor}</span></div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Step 3: 슬립 모드 타임라인 */}
            {step.view === 'sleep' && (
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-6">
                <div className="font-bold text-slate-800 mb-4">Render 무료 티어 슬립 모드 — 시간축</div>
                <div className="space-y-3">
                  <div className="flex items-center gap-3">
                    <div className="w-24 text-xs text-slate-500 shrink-0">0:00</div>
                    <div className="flex-1 p-3 bg-emerald-50 border border-emerald-300 rounded text-sm">
                      🟢 첫 요청 도착 → uvicorn 가동 → 응답 (200ms)
                    </div>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="w-24 text-xs text-slate-500 shrink-0">0:01 ~ 14:59</div>
                    <div className="flex-1 p-3 bg-emerald-50 border border-emerald-300 rounded text-sm">
                      🟢 활성 상태 — 모든 요청 빠른 응답
                    </div>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="w-24 text-xs text-slate-500 shrink-0">15:00 (idle)</div>
                    <div className="flex-1 p-3 bg-amber-50 border border-amber-300 rounded text-sm">
                      😴 15분간 요청 없음 → Render가 컨테이너를 sleep 시킴
                    </div>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="w-24 text-xs text-slate-500 shrink-0">다음 요청</div>
                    <div className="flex-1 p-3 bg-rose-50 border border-rose-300 rounded text-sm">
                      🐢 Cold start — 30초~1분 기다려야 응답
                    </div>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="w-24 text-xs text-slate-500 shrink-0">그 다음</div>
                    <div className="flex-1 p-3 bg-emerald-50 border border-emerald-300 rounded text-sm">
                      🟢 다시 활성 → 빠른 응답 복귀
                    </div>
                  </div>
                </div>
                <div className="mt-4 p-3 bg-slate-100 rounded text-xs text-slate-700">
                  💡 학습엔 충분, 실서비스엔 부적합. UptimeRobot 같은 핑 서비스로 깨워두는 꼼수도 가능하나 본질 해결 X.
                </div>
              </div>
            )}

            {/* Step 4: 추천 매트릭스 */}
            {step.view === 'matrix' && (
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-6">
                <div className="font-bold text-slate-800 mb-4">시나리오별 추천 매트릭스</div>
                <div className="space-y-3">
                  {Object.entries(SCENARIOS).map(([key, s]) => (
                    <div key={key} className="flex items-start gap-3 p-3 bg-slate-50 rounded-lg border border-slate-200">
                      <div className="w-40 shrink-0">
                        <div className="font-bold text-sm text-slate-800">{s.label}</div>
                      </div>
                      <div className="flex flex-wrap gap-2">
                        {s.recommend.map((rid) => {
                          const p = PLATFORMS.find((x) => x.id === rid);
                          return (
                            <span key={rid} className={`text-xs text-white px-3 py-1 rounded-full font-bold ${COLOR_BADGE[p.color]}`}>
                              {p.emoji} {p.name}
                            </span>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
                <div className="mt-4 p-3 bg-slate-800 text-white rounded text-xs">
                  💡 "내 상황 = 학습" → Render로 시작 → 익숙해지면 Railway/Fly.io → 회사 서비스면 AWS로
                </div>
              </div>
            )}

            <div className="flex items-center justify-between gap-3 bg-white rounded-xl shadow-sm border border-slate-200 p-3">
              <button
                onClick={handlePrev}
                disabled={currentStep === 0}
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed"
              >
                ← 이전
              </button>
              <button
                onClick={togglePlay}
                className="px-5 py-2 rounded-md bg-slate-800 text-white text-sm font-medium hover:bg-slate-700"
              >
                {isPlaying ? '⏸ 정지' : (currentStep === STEPS.length - 1 ? '↻ 처음부터' : '▶ 자동 재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={currentStep === STEPS.length - 1}
                className="px-4 py-2 rounded-md bg-slate-100 text-slate-700 text-sm font-medium hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed"
              >
                다음 →
              </button>
            </div>

            <p className="text-center text-[11px] text-slate-400 mt-3">키보드 ←/→ 로 단계 이동 가능</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
