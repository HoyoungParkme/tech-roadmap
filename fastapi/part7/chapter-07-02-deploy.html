<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — VII-1-2. 배포 플랫폼 비교</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    VII-1-2. 배포 플랫폼 비교
    학습 목표: 상황에 맞는 배포 플랫폼을 선택할 수 있다.
    패턴: 플랫폼 비교표 → 단계별 추천 → 배포 체크리스트
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: '플랫폼 비교 — 어디에 배포할까?',
        desc: 'FastAPI를 배포할 수 있는 플랫폼은 다양하다. 무료 티어, 난이도, 확장성이 모두 다르다. 프로젝트 단계에 따라 적합한 플랫폼이 다르다.',
        visual: 'compare',
      },
      {
        title: '단계별 추천',
        desc: '학습/포트폴리오 → Render(가장 쉬움). MVP/사이드 프로젝트 → Railway 또는 Fly.io(적당한 자유도). 프로덕션 → AWS/GCP(완전한 제어, 복잡). 처음부터 어려운 걸 고를 필요 없다.',
        visual: 'recommend',
      },
      {
        title: '배포 체크리스트',
        desc: '배포 전에 반드시 확인할 것: (1) requirements.txt 최신화 (2) .env 환경 변수 설정 (3) CORS 허용 도메인 (4) DEBUG=False (5) gunicorn/uvicorn 워커 수 설정. 이 5가지를 빠뜨리면 배포 후 문제가 생긴다.',
        visual: 'checklist',
        summary: true,
      },
    ];

    const VISUAL_CLASS = {
      compare: 'border-sky-400 bg-sky-50',
      recommend: 'border-amber-400 bg-amber-50',
      checklist: 'border-emerald-400 bg-emerald-50',
    };

    const VISUAL_ICON = {
      compare: '📊',
      recommend: '🎯',
      checklist: '✅',
    };

    const VISUAL_LABEL = {
      compare: '배포 플랫폼 비교',
      recommend: '단계별 추천',
      checklist: '배포 체크리스트',
    };

    const PLATFORMS = [
      { name: 'Render', free: '무료 티어 O', difficulty: '쉬움', note: 'GitHub 연동, 자동 배포' },
      { name: 'Railway', free: '월 $5 크레딧', difficulty: '쉬움', note: 'DB 포함, 빠른 설정' },
      { name: 'Fly.io', free: '무료 티어 O', difficulty: '보통', note: '글로벌 엣지, Docker 기반' },
      { name: 'AWS/GCP', free: '프리 티어(1년)', difficulty: '어려움', note: '완전한 제어, 학습 곡선 높음' },
    ];

    const DIFFICULTY_CLASS = {
      '쉬움': 'text-emerald-600 bg-emerald-50',
      '보통': 'text-amber-600 bg-amber-50',
      '어려움': 'text-red-600 bg-red-50',
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum VII-1-2</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VII. 배포와 운영 &gt; Chapter 1. 배포</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VII-1-2. 배포 플랫폼 비교</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                Render, Railway, Fly.io, AWS — <strong>프로젝트 단계에 맞는 플랫폼</strong>을 선택한다.
              </p>
            </header>

            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="flex flex-col items-center gap-4">
                <div className={`w-full max-w-md p-6 rounded-lg border-2 transition-all duration-300 text-center ${VISUAL_CLASS[stepData.visual]}`}>
                  <div className="text-3xl mb-2">{VISUAL_ICON[stepData.visual]}</div>
                  <div className="font-bold text-sm">{VISUAL_LABEL[stepData.visual]}</div>
                </div>

                {stepData.visual === 'compare' && (
                  <div className="w-full grid grid-cols-1 md:grid-cols-2 gap-3">
                    {PLATFORMS.map((p, i) => (
                      <div key={i} className="p-3 rounded-lg border border-slate-200 bg-white shadow-sm">
                        <div className="flex items-center justify-between mb-1">
                          <span className="font-bold text-sm">{p.name}</span>
                          <span className={`text-[10px] px-2 py-0.5 rounded font-bold ${DIFFICULTY_CLASS[p.difficulty]}`}>{p.difficulty}</span>
                        </div>
                        <div className="text-xs text-slate-500">{p.free}</div>
                        <div className="text-xs text-slate-600 mt-1">{p.note}</div>
                      </div>
                    ))}
                  </div>
                )}

                {stepData.visual === 'recommend' && (
                  <div className="w-full max-w-md space-y-2 text-xs">
                    <div className="p-3 rounded-lg bg-emerald-50 border border-emerald-200 flex items-center gap-3">
                      <span className="font-bold text-emerald-700 min-w-[80px]">학습/포폴</span>
                      <span>Render — 가장 쉽고, GitHub 연동 자동 배포</span>
                    </div>
                    <div className="p-3 rounded-lg bg-amber-50 border border-amber-200 flex items-center gap-3">
                      <span className="font-bold text-amber-700 min-w-[80px]">MVP</span>
                      <span>Railway/Fly.io — DB 포함, 적당한 자유도</span>
                    </div>
                    <div className="p-3 rounded-lg bg-red-50 border border-red-200 flex items-center gap-3">
                      <span className="font-bold text-red-700 min-w-[80px]">프로덕션</span>
                      <span>AWS/GCP — 완전한 제어, DevOps 필요</span>
                    </div>
                  </div>
                )}
              </div>
            </div>

            {stepData.summary && (
              <div className="bg-white rounded-xl border border-slate-200 p-4">
                <div className="text-sm font-bold text-slate-600 mb-2">배포 전 체크리스트</div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs">
                  <div className="p-2 rounded bg-sky-50 border border-sky-200">requirements.txt 최신화</div>
                  <div className="p-2 rounded bg-sky-50 border border-sky-200">.env 환경 변수 설정</div>
                  <div className="p-2 rounded bg-sky-50 border border-sky-200">CORS 허용 도메인 확인</div>
                  <div className="p-2 rounded bg-sky-50 border border-sky-200">DEBUG=False 설정</div>
                  <div className="p-2 rounded bg-sky-50 border border-sky-200 md:col-span-2">uvicorn 워커 수 설정 (CPU 코어 x 2 + 1)</div>
                </div>
              </div>
            )}

            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-07-01-docker.html" className="text-slate-500 hover:text-slate-700">&larr; VII-1-1 Docker 배포</a>
              <a href="./chapter-07-03-oauth2.html" className="text-blue-600 hover:text-blue-800 font-medium">VII-2-1 OAuth2 소셜 로그인 &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
