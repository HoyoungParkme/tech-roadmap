<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — VII-2-2. Redis 세션</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    VII-2-2. Redis 세션
    학습 목표: Redis를 세션 저장소로 활용하는 방법을 이해한다.
    핵심 비유: 메모 보드 — 빠르게 쓰고 읽는 임시 저장소
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Redis란 (인메모리 Key-Value)',
        desc: 'Redis는 메모리에 데이터를 저장하는 Key-Value 저장소다. 디스크 DB보다 수십~수백 배 빠르다. "메모 보드"처럼 빠르게 쓰고 읽는 임시 저장소. 세션, 캐시, 큐 등에 사용.',
        visual: 'concept',
      },
      {
        title: 'Python Redis 클라이언트',
        desc: 'redis-py (또는 redis[hiredis]) 패키지로 Python에서 Redis에 접근한다. 비동기는 redis.asyncio 모듈을 사용한다.',
        code: [
          '# pip install redis[hiredis]',
          'import redis.asyncio as aioredis',
          '',
          '# Redis 연결',
          'redis_client = aioredis.from_url(',
          '    "redis://localhost:6379",',
          '    encoding="utf-8",',
          '    decode_responses=True,',
          ')',
          '',
          '# 기본 사용',
          'await redis_client.set("key", "value", ex=3600)  # 1시간 TTL',
          'value = await redis_client.get("key")',
        ],
        highlight: [1, 4, 5, 6, 7, 11, 12],
      },
      {
        title: 'Session 저장소로 활용',
        desc: '로그인 시 세션 ID를 생성하고 Redis에 사용자 정보를 저장한다. TTL(만료 시간)을 설정하면 자동으로 세션이 만료된다. 다중 서버에서도 동일한 Redis를 바라보면 세션 공유가 된다.',
        code: [
          'import uuid',
          'import json',
          '',
          'async def create_session(user_id: int, data: dict) -> str:',
          '    session_id = str(uuid.uuid4())',
          '    session_data = json.dumps({"user_id": user_id, **data})',
          '    await redis_client.set(',
          '        f"session:{session_id}",',
          '        session_data,',
          '        ex=3600,  # 1시간 만료',
          '    )',
          '    return session_id',
          '',
          'async def get_session(session_id: str) -> dict | None:',
          '    data = await redis_client.get(f"session:{session_id}")',
          '    return json.loads(data) if data else None',
        ],
        highlight: [4, 5, 6, 7, 8, 9, 14, 15],
      },
      {
        title: 'FastAPI + Redis 통합',
        desc: 'Lifespan에서 Redis 연결을 관리하고, Depends()로 세션 검증을 수행한다. 로그인 시 쿠키에 세션 ID를 설정하고, 이후 요청에서 쿠키로 세션을 조회한다.',
        code: [
          '@asynccontextmanager',
          'async def lifespan(app: FastAPI):',
          '    app.state.redis = aioredis.from_url("redis://localhost")',
          '    yield',
          '    await app.state.redis.close()',
          '',
          '@app.post("/login")',
          'async def login(response: Response, form: LoginForm = Depends()):',
          '    user = authenticate(form.username, form.password)',
          '    session_id = await create_session(user.id, {"role": user.role})',
          '    response.set_cookie("session_id", session_id, httponly=True)',
          '    return {"message": "로그인 성공"}',
          '',
          'async def get_current_user(session_id: str = Cookie(default=None)):',
          '    if not session_id:',
          '        raise HTTPException(401)',
          '    session = await get_session(session_id)',
          '    if not session:',
          '        raise HTTPException(401, "세션 만료")',
          '    return session',
        ],
        highlight: [2, 4, 9, 10, 13, 16, 17, 18],
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum VII-2-2</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VII. 인프라 &gt; Chapter 2. 캐시와 세션</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VII-2-2. Redis 세션</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                <strong>Redis</strong>를 세션 저장소로 활용한다. "메모 보드"처럼 빠르게 쓰고 읽는 임시 저장소.
              </p>
            </header>

            {stepData.visual === 'concept' && (
              <div className="bg-white rounded-xl border border-slate-200 p-4">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                  <div className="p-3 rounded-lg bg-red-50 border border-red-200 text-center">
                    <div className="font-bold text-sm text-red-700">Redis</div>
                    <div className="text-xs text-slate-600 mt-1">인메모리 Key-Value 저장소</div>
                    <div className="text-xs font-mono mt-2 bg-white p-1 rounded">SET key value EX 3600</div>
                  </div>
                  <div className="p-3 rounded-lg bg-sky-50 border border-sky-200 text-center">
                    <div className="font-bold text-sm text-sky-700">용도</div>
                    <div className="text-xs text-slate-600 mt-1 space-y-0.5">
                      <div>- 세션 저장</div>
                      <div>- 캐시</div>
                      <div>- 메시지 큐</div>
                    </div>
                  </div>
                  <div className="p-3 rounded-lg bg-emerald-50 border border-emerald-200 text-center">
                    <div className="font-bold text-sm text-emerald-700">장점</div>
                    <div className="text-xs text-slate-600 mt-1 space-y-0.5">
                      <div>- 초고속 (1ms 이하)</div>
                      <div>- TTL 자동 만료</div>
                      <div>- 다중 서버 공유</div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {stepData.code && (
              <div className="bg-slate-900 rounded-xl overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono">{stepData.title}</div>
                <div className="p-4 text-xs font-mono leading-5">
                  {stepData.code.map((line, i) => (
                    <div key={i} className={`px-2 py-0.5 ${stepData.highlight.includes(i) ? 'bg-sky-900/40 text-sky-300' : 'text-slate-300'}`}>{line || '\u00A0'}</div>
                  ))}
                </div>
              </div>
            )}

            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">Step {currentStepIdx + 1}/{STEPS.length}: {stepData.title}</h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="../part5/chapter-05-15-static-files.html" className="text-slate-500 hover:text-slate-700">&larr; V-5-4 StaticFiles</a>
              <a href="../part4/chapter-04-17-request-object.html" className="text-blue-600 hover:text-blue-800 font-medium">IV-4-17 Request 객체 &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
