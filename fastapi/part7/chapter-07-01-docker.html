            { name: 'up / down', desc: 'docker compose up -d / down -v 로 시작·정리' },
          ],
        },
        code: {
          lang: 'yaml',
          filename: 'compose.yml',
          lines: [
            '# Step 5. docker compose — FastAPI + Postgres 스택',
            '#   compose up 한 번이면 web/db 가 같이 뜬다',
            '',
            'services:',
            '  # ════ FastAPI 앱 ════',
            '  web:',
            '    build:',
            '      context: .',
            '      dockerfile: multi-stage.Dockerfile',
            '    image: fastapi-app:1.0-slim',
            '    container_name: fastapi-web',
            '    ports:',
            '      - "8000:8000"',
            '    environment:',
            '      DATABASE_URL: postgresql://app:secret@db:5432/appdb',
            '      LOG_LEVEL: INFO',
            '    depends_on:',
            '      db:',
            '        condition: service_healthy',
            '    networks:',
            '      - app-net',
            '    restart: unless-stopped',
            '',
            '  # ════ PostgreSQL ════',
            '  db:',
            '    image: postgres:16-alpine',
            '    container_name: fastapi-db',
            '    environment:',
            '      POSTGRES_DB: appdb',
            '      POSTGRES_USER: app',
            '      POSTGRES_PASSWORD: secret',
            '    ports:',
            '      - "5432:5432"',
            '    volumes:',
            '      - pgdata:/var/lib/postgresql/data',
            '    networks:',
            '      - app-net',
            '    healthcheck:',
            '      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]',
            '      interval: 5s',
            '      timeout: 3s',
            '      retries: 5',
            '    restart: unless-stopped',
            '',
            'networks:',
            '  app-net:',
            '    driver: bridge',
            '',
            'volumes:',
            '  pgdata:',
            '',
            '# ════ 사용법 ════',
            '# docker compose up -d --build   # 빌드 + 백그라운드 기동',
            '# docker compose ps              # 서비스 상태',
            '# docker compose logs -f web     # 앱 로그',
            '# docker compose exec db psql -U app appdb   # DB 진입',
            '# docker compose down            # 정지 (볼륨 유지)',
            '# docker compose down -v         # 정지 + 볼륨 삭제 (초기화)',
            '',
            '# 핵심 포인트:',
            '#  • web 은 DATABASE_URL 의 호스트로 "db" (서비스명) 사용 → app-net 내부 DNS',
            '#  • depends_on + healthcheck 로 DB 준비 후 앱 기동',
            '#  • pgdata 볼륨으로 컨테이너 재기동해도 데이터 유지',
          ],
          highlight: [5, 6, 7, 8, 9, 10, 13, 14, 15, 17, 18, 19, 25, 26, 27, 29, 30, 31, 34, 35, 38, 39, 40, 41, 42, 51, 52, 53, 54, 55, 56],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — indigo 톤
    // ─────────────────────────────────────────────────────
    const KIND_STYLE = {
      src:       { bg: 'bg-slate-100',  border: 'border-slate-300',  text: 'text-slate-700',  badge: 'bg-slate-200 text-slate-700' },
      layer:     { bg: 'bg-indigo-50',  border: 'border-indigo-300', text: 'text-indigo-800', badge: 'bg-indigo-200 text-indigo-800' },
      image:     { bg: 'bg-violet-50',  border: 'border-violet-300', text: 'text-violet-800', badge: 'bg-violet-200 text-violet-800' },
      container: { bg: 'bg-sky-50',     border: 'border-sky-300',    text: 'text-sky-800',    badge: 'bg-sky-200 text-sky-800' },
      service:   { bg: 'bg-emerald-50', border: 'border-emerald-300',text: 'text-emerald-800',badge: 'bg-emerald-200 text-emerald-800' },
    };

    function PipelineRow({ item }) {
      const s = KIND_STYLE[item.kind] || KIND_STYLE.layer;
      return (
        <div className={`rounded-lg border ${s.bg} ${s.border} px-3 py-2 flex items-center justify-between`}>
          <div className="flex items-center gap-2">
            <span className={`text-xs font-bold ${s.text} w-20`}>{item.label}</span>
            <span className={`text-sm font-mono font-bold ${s.text}`}>{item.value}</span>
          </div>
          <span className={`text-[10px] px-2 py-0.5 rounded ${s.badge}`}>{item.badge}</span>
        </div>
      );
    }

    function NoteBox({ note }) {
      if (!note) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-indigo-400 bg-indigo-50 p-3">
          <div className="text-xs font-bold text-indigo-800 mb-2">{note.title}</div>
          <ul className="space-y-1">
            {note.actions.map((a, i) => (
              <li key={i} className="text-sm text-indigo-900 flex gap-2">
                <span className="text-indigo-500">▸</span>
                <span>{a}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function StackBox({ stack }) {
      if (!stack) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-indigo-500 bg-gradient-to-br from-indigo-50 to-violet-50 p-4">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl">📦</span>
            <span className="text-lg font-bold text-indigo-800">{stack.title}</span>
          </div>
          <ul className="space-y-1.5">
            {stack.services.map((s, i) => (
              <li key={i} className="text-sm text-indigo-900 flex gap-2">
                <span className="text-indigo-500 mt-0.5">✓</span>
                <span><span className="font-mono font-bold">{s.name}</span> — {s.desc}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-indigo-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-indigo-800">Docker 빌드 파이프라인</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 빌드/실행 상태</span>
          </div>
          <div className="space-y-2">
            {state.pipeline.map((it, i) => (
              <PipelineRow key={i} item={it} />
            ))}
          </div>
          {state.arrow && (
            <div className="mt-3 text-center text-xs font-bold text-indigo-600 py-2 border-y border-dashed border-indigo-300">
              ↓ {state.arrow} ↓
            </div>
          )}
          <NoteBox note={state.note} />
          <StackBox stack={state.stack} />
          <div className="mt-3 text-xs text-indigo-900 bg-indigo-50 border border-indigo-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js) — 5탭
    // ─────────────────────────────────────────────────────
    function CodeViewer({ steps, stepIdx, setStepIdx }) {
      const codeRef = useRef(null);
      const code = steps[stepIdx].code;

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 파일 탭 */}
          <div className="flex bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {steps.map((s, i) => {
              const active = i === stepIdx;
              return (
                <button
                  key={i}
                  onClick={() => setStepIdx(i)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 ${active ? 'bg-[#282c34] text-indigo-300 border-t-2 border-t-indigo-400' : 'text-slate-400 hover:text-slate-200'}`}
                >
                  {s.code.filename}
                </button>
              );
            })}
          </div>
          {/* 헤더 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          {/* 코드 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-indigo-500/15 border-l-2 border-indigo-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          {/* 푸터 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {steps.length}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-violet-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-indigo-600 text-white font-bold">VII</span>
              <div>
                <h1 className="text-2xl font-bold text-indigo-900">Chapter VII-1-1. FastAPI Docker 배포</h1>
                <p className="text-sm text-indigo-800/80">Dockerfile → multi-stage → build → run → compose. 5단계로 배포 파이프라인 완성</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-indigo-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-indigo-600' : 'bg-indigo-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-indigo-700 text-indigo-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-indigo-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer steps={STEPS} stepIdx={stepIdx} setStepIdx={setStepIdx} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-indigo-700 text-white' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-indigo-300 bg-white text-indigo-700 hover:bg-indigo-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-indigo-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-indigo-400 bg-white px-4 py-3 text-sm text-indigo-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                Dockerfile(명세) → multi-stage(경량화) → build(이미지) → run(컨테이너) → compose(스택)의 5단계가 FastAPI 배포의 골격이다. 다음 챕터(VII-1-2)에서는 클라우드 플랫폼 배포 옵션을 비교한다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Docker', 'Dockerfile', 'multi-stage', 'image', 'container', 'docker compose', 'FastAPI', 'uvicorn'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-800 border border-indigo-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-indigo-700">
              <a href="./index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./chapter-07-02-deploy.html" className="underline hover:no-underline">다음: VII-1-2 클라우드 배포 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
