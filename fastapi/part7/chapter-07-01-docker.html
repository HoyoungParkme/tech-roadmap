<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastAPI 학습 — VII-1-1. Docker 배포</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    VII-1-1. Docker 배포
    학습 목표: Dockerfile을 작성하고 docker-compose로 앱을 배포할 수 있다.
    핵심 비유: "도시락 포장 — 앱+환경을 통째로 싸서 어디서든 실행"
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: '배포 문제 — "내 컴퓨터에선 되는데"',
        desc: '개발 환경과 서버 환경이 다르면 동작이 달라진다. Python 버전, 라이브러리 버전, OS 설정... "내 컴퓨터에선 되는데 서버에선 안 돼요"는 가장 흔한 배포 문제다.',
        visual: 'problem',
      },
      {
        title: 'Docker란 — 컨테이너로 환경을 통째로 포장',
        desc: '도시락 비유: 앱 코드 + Python + 라이브러리 + 설정을 하나의 "컨테이너"로 포장한다. 이 컨테이너는 어떤 서버에서든 동일하게 실행된다. 환경 차이 문제가 사라진다.',
        visual: 'concept',
      },
      {
        title: 'Dockerfile 작성',
        desc: 'Dockerfile은 "어떻게 포장할지" 적는 레시피다. 베이스 이미지(FROM) → 코드 복사(COPY) → 의존성 설치(RUN pip install) → 실행 명령(CMD). 이 4줄이 핵심이다.',
        visual: 'dockerfile',
        showCode: 'dockerfile',
      },
      {
        title: '이미지 빌드 — docker build',
        desc: '`docker build -t myapp .` 명령으로 Dockerfile을 이미지로 만든다. 이미지는 "포장 완료된 도시락". `docker run -p 8000:8000 myapp`으로 컨테이너를 실행한다.',
        visual: 'build',
        showCode: 'build',
      },
      {
        title: 'docker-compose — 여러 서비스를 한 번에',
        desc: 'FastAPI + DB + Redis 등 여러 서비스를 한 파일(docker-compose.yml)로 정의한다. `docker-compose up` 한 줄이면 전체 인프라가 올라간다.',
        visual: 'compose',
        showCode: 'compose',
        summary: true,
      },
    ];

    const VISUAL_CLASS = {
      problem: 'border-red-400 bg-red-50',
      concept: 'border-amber-400 bg-amber-50',
      dockerfile: 'border-blue-400 bg-blue-50',
      build: 'border-violet-400 bg-violet-50',
      compose: 'border-emerald-400 bg-emerald-50',
    };

    const VISUAL_ICON = {
      problem: '😰',
      concept: '📦',
      dockerfile: '📋',
      build: '🔨',
      compose: '🚀',
    };

    const VISUAL_LABEL = {
      problem: '"내 컴퓨터에선 되는데..."',
      concept: '도시락 포장 = 컨테이너',
      dockerfile: 'Dockerfile (포장 레시피)',
      build: 'docker build → 이미지 생성',
      compose: 'docker-compose → 전체 실행',
    };

    const CODE_DOCKERFILE = [
      'FROM python:3.11-slim',
      '',
      'WORKDIR /app',
      '',
      'COPY requirements.txt .',
      'RUN pip install --no-cache-dir -r requirements.txt',
      '',
      'COPY . .',
      '',
      'CMD ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]',
    ];

    const CODE_BUILD = [
      '# 이미지 빌드',
      'docker build -t myapp .',
      '',
      '# 컨테이너 실행',
      'docker run -p 8000:8000 myapp',
      '',
      '# 브라우저에서 확인',
      '# http://localhost:8000/docs',
    ];

    const CODE_COMPOSE = [
      '# docker-compose.yml',
      'version: "3.8"',
      'services:',
      '  app:',
      '    build: .',
      '    ports:',
      '      - "8000:8000"',
      '    depends_on:',
      '      - db',
      '  db:',
      '    image: postgres:15',
      '    environment:',
      '      POSTGRES_PASSWORD: secret',
    ];

    const CODE_MAP = { dockerfile: CODE_DOCKERFILE, build: CODE_BUILD, compose: CODE_COMPOSE };
    const CODE_TITLE_MAP = { dockerfile: 'Dockerfile', build: '터미널 — Docker 빌드/실행', compose: 'docker-compose.yml' };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];

      const handleNext = () => { setCurrentStepIdx(prev => Math.min(prev + 1, STEPS.length - 1)); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { setCurrentStepIdx(prev => Math.max(prev - 1, 0)); };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (currentStepIdx >= STEPS.length - 1) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (currentStepIdx >= STEPS.length - 1) setIsPlaying(false); }, [currentStepIdx]);
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const currentCode = stepData.showCode ? CODE_MAP[stepData.showCode] : null;
      const codeTitle = stepData.showCode ? CODE_TITLE_MAP[stepData.showCode] : '';

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-blue-600 hover:text-blue-800 font-medium">&larr; 허브로 돌아가기</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200">curriculum VII-1-1</span>
            </nav>
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VII. 배포와 운영 &gt; Chapter 1. Docker</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VII-1-1. Docker 배포</h1>
                </div>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                도시락 포장 — <strong>앱+환경을 통째로 싸서 어디서든 실행</strong>하는 Docker 컨테이너.
              </p>
            </header>

            <div className="bg-white rounded-xl border border-slate-200 p-5">
              <div className="flex flex-col items-center gap-4">
                <div className={`w-full max-w-md p-6 rounded-lg border-2 transition-all duration-300 text-center ${VISUAL_CLASS[stepData.visual]}`}>
                  <div className="text-3xl mb-2">{VISUAL_ICON[stepData.visual]}</div>
                  <div className="font-bold text-sm">{VISUAL_LABEL[stepData.visual]}</div>
                </div>
                {stepData.visual === 'concept' && (
                  <div className="w-full max-w-md flex items-center gap-2 text-xs justify-center flex-wrap">
                    <div className="p-2 rounded bg-blue-100 border border-blue-300">Python 3.11</div>
                    <span className="text-slate-400">+</span>
                    <div className="p-2 rounded bg-amber-100 border border-amber-300">라이브러리</div>
                    <span className="text-slate-400">+</span>
                    <div className="p-2 rounded bg-emerald-100 border border-emerald-300">코드</div>
                    <span className="text-slate-400">=</span>
                    <div className="p-2 rounded bg-violet-200 border border-violet-400 font-bold">컨테이너</div>
                  </div>
                )}
              </div>
            </div>

            {currentCode && (
              <div className="bg-slate-900 rounded-xl overflow-hidden">
                <div className="bg-slate-800 text-slate-300 px-4 py-2 text-xs font-mono">{codeTitle}</div>
                <div className="p-4 text-xs font-mono leading-5">
                  {currentCode.map((line, i) => (
                    <div key={i} className="px-2 py-0.5 text-slate-300">{line || '\u00A0'}</div>
                  ))}
                </div>
              </div>
            )}

            {stepData.summary && (
              <div className="bg-white rounded-xl border border-slate-200 p-4">
                <div className="text-sm font-bold text-slate-600 mb-2">Docker 핵심 흐름</div>
                <div className="flex items-center gap-2 text-xs flex-wrap">
                  <div className="p-2 rounded bg-blue-50 border border-blue-200 font-bold">Dockerfile 작성</div>
                  <span className="text-slate-400">→</span>
                  <div className="p-2 rounded bg-violet-50 border border-violet-200 font-bold">docker build</div>
                  <span className="text-slate-400">→</span>
                  <div className="p-2 rounded bg-emerald-50 border border-emerald-200 font-bold">docker run</div>
                </div>
              </div>
            )}

            <div className="p-4 rounded-xl bg-sky-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">Step {currentStepIdx + 1}: {stepData.title}</h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setCurrentStepIdx(0); setIsPlaying(false); }} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={() => handlePrev()} disabled={currentStepIdx === 0} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-sky-600 text-white hover:bg-sky-700 transition min-w-[80px]">{isPlaying ? '일시정지' : currentStepIdx >= STEPS.length - 1 ? '다시보기' : '자동재생'}</button>
              <button onClick={() => handleNext()} disabled={currentStepIdx >= STEPS.length - 1} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            <nav className="flex justify-between text-sm pt-2">
              <a href="../part6/chapter-06-04-websocket.html" className="text-slate-500 hover:text-slate-700">&larr; VI-3-1 WebSocket</a>
              <a href="./chapter-07-02-deploy.html" className="text-blue-600 hover:text-blue-800 font-medium">VII-1-2 배포 플랫폼 비교 &rarr;</a>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
