<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent 학습 — V-2-1. 에이전트 루프 구현</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    V-2-1. 에이전트 루프 구현 — 실제 30~50라인 코드로 본 Agent loop
    학습 목표: while 루프 골격 → LLM 호출 → tool 실행 → 종료 조건 → 에러 처리까지
              5단계로 Agent 메인 루프의 모든 책임을 본다.
    핵심 비유: 자동차 엔진의 4행정 사이클 + 안전 차단 (max_iter / done / error).
    패턴: fastapi v1 — 좌(LiveDataPane: 루프 상태 다이어그램 + 메시지 스트림)
                   / 우(VSCode CodeViewer: 단계별 .py 파일 탭)
    색상: agent amber
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의
    //   loopState   : { iteration, maxIter, status, currentPhase }
    //   messages    : [{ role, content, hl?: bool }]
    //   toolCalls   : [{ name, args, status: 'pending'|'done'|'fail' }]
    //   diagram     : 루프 다이어그램에서 강조할 노드 id 배열
    //   error       : { type, message } | null
    // ─────────────────────────────────────────────────────
    const STEPS = [
      // ───── Step 1 ─────
      {
        title: 'Step 1. 기본 루프 골격 — while not done',
        desc: 'Agent의 심장은 while 루프다. done 플래그가 True가 될 때까지 (또는 max_iter에 도달할 때까지) 한 사이클씩 돈다. 이 골격 안에 LLM 호출, 도구 실행, 결과 누적이 들어간다. 무한 루프를 막기 위해 max_iter는 절대 빠뜨리지 않는다.',
        loopState: {
          iteration: 0,
          maxIter: 5,
          status: 'idle',
          currentPhase: 'init',
          done: false,
        },
        messages: [
          { role: 'user', content: '서울 날씨와 도쿄 날씨 비교해줘', hl: true },
        ],
        toolCalls: [],
        diagram: ['init'],
        error: null,
        code: {
          lang: 'python',
          filename: 'loop-skeleton.py',
          lines: [
            '"""Agent 메인 루프 — 가장 단순한 골격."""',
            '',
            'def run_agent(user_input: str, max_iter: int = 5):',
            '    """Agent 루프 진입점."""',
            '    messages = [{"role": "user", "content": user_input}]',
            '    done = False',
            '    iteration = 0',
            '',
            '    # 루프 골격: done 또는 max_iter 도달 시 종료',
            '    while not done and iteration < max_iter:',
            '        iteration += 1',
            '        # 1) LLM 호출  2) tool 실행  3) 최종이면 done=True',
            '        pass  # Step 2부터 채워나간다',
            '',
            '    return messages',
            '',
            '# 핵심: while True 금지, iteration 카운터 필수,',
            '#       messages는 LLM 컨텍스트 누적 버퍼',
          ],
          highlight: [3, 5, 6, 7, 10, 11],
        },
      },
      // ───── Step 2 ─────
      {
        title: 'Step 2. LLM 호출 + tool_calls 파싱',
        desc: 'LLM에 messages와 사용 가능한 tool 스키마를 같이 보낸다. 응답에는 두 종류가 있다 — (1) tool_calls (이 도구를 이 인자로 호출하라) 또는 (2) 일반 content (최종 답변). assistant 메시지를 messages에 누적해야 다음 턴에 LLM이 자기 결정을 기억한다.',
        loopState: {
          iteration: 1,
          maxIter: 5,
          status: 'running',
          currentPhase: 'llm',
          done: false,
        },
        messages: [
          { role: 'user', content: '서울 날씨와 도쿄 날씨 비교해줘' },
          { role: 'assistant', content: 'tool_calls: get_weather(city="Seoul"), get_weather(city="Tokyo")', hl: true },
        ],
        toolCalls: [
          { name: 'get_weather', args: '{"city":"Seoul"}', status: 'pending' },
          { name: 'get_weather', args: '{"city":"Tokyo"}', status: 'pending' },
        ],
        diagram: ['llm'],
        error: null,
        code: {
          lang: 'python',
          filename: 'llm-call.py',
          lines: [
            '"""LLM 호출 + 응답 분기 — tool_calls 또는 content."""',
            '',
            'from openai import OpenAI',
            'client = OpenAI()',
            '',
            'TOOLS = [{',
            '    "type": "function",',
            '    "function": {',
            '        "name": "get_weather",',
            '        "description": "도시 날씨 조회",',
            '        "parameters": {',
            '            "type": "object",',
            '            "properties": {"city": {"type": "string"}},',
            '            "required": ["city"],',
            '        },',
            '    },',
            '}]',
            '',
            'def call_llm(messages):',
            '    """LLM에 messages + tools 전달, 응답 파싱."""',
            '    resp = client.chat.completions.create(',
            '        model="gpt-4o-mini",',
            '        messages=messages,',
            '        tools=TOOLS,',
            '    )',
            '    msg = resp.choices[0].message',
            '',
            '    # 핵심: assistant 메시지를 messages에 누적',
            '    messages.append(msg.model_dump(exclude_none=True))',
            '',
            '    # tool_calls 있으면 도구 실행, 없으면 최종 답변',
            '    return msg.tool_calls, msg.content',
          ],
          highlight: [21, 22, 23, 24, 25, 26, 29, 32],
        },
      },
      // ───── Step 3 ─────
      {
        title: 'Step 3. tool 실행 + 결과 messages 추가',
        desc: 'LLM이 요청한 각 tool_call을 실행하고, 결과를 role="tool" 메시지로 messages에 추가한다. 핵심은 tool_call_id를 그대로 매칭해 돌려줘야 LLM이 어떤 호출의 결과인지 안다는 것. 이렇게 누적된 messages를 다시 LLM에 보내면 도구 결과를 보고 최종 답변을 생성한다.',
        loopState: {
          iteration: 1,
          maxIter: 5,
          status: 'running',
          currentPhase: 'tool',
          done: false,
        },
        messages: [
          { role: 'user', content: '서울 날씨와 도쿄 날씨 비교해줘' },
          { role: 'assistant', content: 'tool_calls: get_weather(Seoul), get_weather(Tokyo)' },
          { role: 'tool', content: 'Seoul: 18°C, 맑음', hl: true },
          { role: 'tool', content: 'Tokyo: 22°C, 흐림', hl: true },
        ],
        toolCalls: [
          { name: 'get_weather', args: '{"city":"Seoul"}', status: 'done' },
          { name: 'get_weather', args: '{"city":"Tokyo"}', status: 'done' },
        ],
        diagram: ['tool'],
        error: null,
        code: {
          lang: 'python',
          filename: 'tool-exec.py',
          lines: [
            '"""tool 실행 + 결과를 messages에 추가."""',
            '',
            'import json',
            '',
            '# 실제 실행 가능한 함수 매핑',
            'TOOL_REGISTRY = {',
            '    "get_weather": lambda city: f"{city}: 18°C, 맑음",',
            '    "calculator":  lambda expr: str(eval(expr)),',
            '}',
            '',
            'def execute_tool_calls(tool_calls, messages):',
            '    """LLM이 요청한 모든 tool_call을 실행."""',
            '    for call in tool_calls:',
            '        name = call.function.name',
            '        args = json.loads(call.function.arguments)',
            '        func = TOOL_REGISTRY.get(name)',
            '',
            '        if func is None:',
            '            result = f"[error] unknown tool: {name}"',
            '        else:',
            '            result = func(**args)',
            '',
            '        # 핵심: tool_call_id를 그대로 매칭해 돌려줘야',
            '        #       LLM이 어느 호출의 결과인지 안다',
            '        messages.append({',
            '            "role": "tool",',
            '            "tool_call_id": call.id,',
            '            "name": name,',
            '            "content": result,',
            '        })',
          ],
          highlight: [13, 14, 15, 16, 20, 21, 25, 26, 27, 28, 29, 30],
        },
      },
      // ───── Step 4 ─────
      {
        title: 'Step 4. 종료 조건 — max_iter / done / "Final" 토큰',
        desc: '루프를 멈추는 트리거는 세 가지다. (1) tool_calls가 없는 일반 content가 오면 LLM이 답변을 완성한 것 → done=True. (2) iteration이 max_iter 도달 → 강제 중단. (3) 모델이 "Final Answer:" 같은 약속된 토큰을 내뱉으면 종료 (ReAct 스타일). 셋 중 하나만이라도 빠지면 무한 루프 위험.',
        loopState: {
          iteration: 2,
          maxIter: 5,
          status: 'done',
          currentPhase: 'terminate',
          done: true,
        },
        messages: [
          { role: 'user', content: '서울 날씨와 도쿄 날씨 비교해줘' },
          { role: 'assistant', content: 'tool_calls: get_weather x2' },
          { role: 'tool', content: 'Seoul: 18°C, 맑음' },
          { role: 'tool', content: 'Tokyo: 22°C, 흐림' },
          { role: 'assistant', content: '서울은 18도로 맑고, 도쿄는 22도로 흐립니다. 도쿄가 4도 더 따뜻합니다.', hl: true },
        ],
        toolCalls: [
          { name: 'get_weather', args: '{"city":"Seoul"}', status: 'done' },
          { name: 'get_weather', args: '{"city":"Tokyo"}', status: 'done' },
        ],
        diagram: ['terminate'],
        error: null,
        code: {
          lang: 'python',
          filename: 'terminate.py',
          lines: [
            '"""종료 조건 3가지 — 빠지면 무한 루프 위험."""',
            '',
            'FINAL_TOKEN = "Final Answer:"  # ReAct 종료 마커',
            '',
            'def should_stop(content, tool_calls, iteration, max_iter):',
            '    """루프 종료 여부를 결정."""',
            '    # 조건 1: max_iter 초과 (최우선 — 안전 차단)',
            '    if iteration >= max_iter:',
            '        return True, "max_iter_reached"',
            '    # 조건 2: tool_calls 없는 일반 답변 → 완료',
            '    if not tool_calls and content:',
            '        return True, "final_answer"',
            '    # 조건 3: ReAct 종료 토큰',
            '    if content and FINAL_TOKEN in content:',
            '        return True, "final_token"',
            '    return False, "continue"',
            '',
            '',
            '# 통합 루프 (Step 1~3을 합친 모습)',
            'def run_agent(user_input, max_iter=5):',
            '    messages = [{"role": "user", "content": user_input}]',
            '    iteration = 0',
            '    while iteration < max_iter:',
            '        iteration += 1',
            '        tool_calls, content = call_llm(messages)',
            '        stop, reason = should_stop(',
            '            content, tool_calls, iteration, max_iter)',
            '        if stop:',
            '            return {"answer": content, "reason": reason}',
            '        execute_tool_calls(tool_calls, messages)',
          ],
          highlight: [7, 8, 9, 10, 11, 12, 13, 14, 15, 26, 27, 28, 29],
        },
      },
      // ───── Step 5 ─────
      {
        title: 'Step 5. 에러 처리 — tool 실패 / LLM 에러 / 무한 루프',
        desc: '실전에서 깨지는 곳은 세 군데다. (1) tool 실행 중 예외 (네트워크, 타임아웃, 잘못된 인자) — try/except로 잡아 "error" 메시지로 LLM에 돌려준다. (2) LLM API 에러 (rate limit, 5xx) — exponential backoff로 재시도. (3) max_iter 도달 — RuntimeError 또는 fallback 답변 반환. 핵심은 "에러도 messages에 넣어 LLM이 회복하게 한다".',
        loopState: {
          iteration: 3,
          maxIter: 5,
          status: 'recovered',
          currentPhase: 'error',
          done: false,
        },
        messages: [
          { role: 'user', content: '날씨 비교해줘' },
          { role: 'assistant', content: 'tool_calls: get_weather(Seoul)' },
          { role: 'tool', content: '[error] HTTPTimeout — 30s 초과', hl: true },
          { role: 'assistant', content: '재시도: get_weather(Seoul)' },
          { role: 'tool', content: 'Seoul: 18°C, 맑음', hl: true },
        ],
        toolCalls: [
          { name: 'get_weather', args: '{"city":"Seoul"}', status: 'fail' },
          { name: 'get_weather', args: '{"city":"Seoul"}', status: 'done' },
        ],
        diagram: ['error', 'tool'],
        error: {
          type: 'ToolTimeout',
          message: 'HTTPTimeout 후 LLM이 자체 재시도 → 회복',
        },
        code: {
          lang: 'python',
          filename: 'error-handle.py',
          lines: [
            '"""에러 처리 — 실전에서 채워야 하는 3가지."""',
            '',
            'import time',
            'from openai import APIError, RateLimitError',
            '',
            '# (1) tool 실행 에러 → messages에 error 메시지로 회수',
            'def safe_execute(call, messages):',
            '    name = call.function.name',
            '    try:',
            '        args = json.loads(call.function.arguments)',
            '        result = TOOL_REGISTRY[name](**args)',
            '    except KeyError:',
            '        result = f"[error] unknown tool: {name}"',
            '    except Exception as e:',
            '        # 핵심: 예외를 죽이지 말고 LLM에 돌려준다',
            '        result = f"[error] {type(e).__name__}: {e}"',
            '    messages.append({',
            '        "role": "tool", "tool_call_id": call.id,',
            '        "name": name, "content": result,',
            '    })',
            '',
            '# (2) LLM API 에러 → 지수 백오프 재시도',
            'def call_llm_with_retry(messages, max_retries=3):',
            '    for attempt in range(max_retries):',
            '        try:',
            '            return call_llm(messages)',
            '        except RateLimitError:',
            '            time.sleep(2 ** attempt)  # 1s, 2s, 4s',
            '        except APIError:',
            '            if attempt == max_retries - 1: raise',
            '            time.sleep(1)',
            '    raise RuntimeError("LLM 재시도 모두 실패")',
            '',
            '# (3) max_iter 도달 → fallback 답변',
            'def run_agent_safe(user_input, max_iter=5):',
            '    messages = [{"role": "user", "content": user_input}]',
            '    for i in range(max_iter):',
            '        tool_calls, content = call_llm_with_retry(messages)',
            '        if not tool_calls:',
            '            return content  # 정상 종료',
            '        for call in tool_calls:',
            '            safe_execute(call, messages)',
            '    return "[fallback] 최대 반복 초과 — 답변 미완"',
          ],
          highlight: [7, 8, 9, 13, 14, 15, 16, 23, 24, 25, 26, 27, 28, 35, 43],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 SVG: 루프 다이어그램 (init → llm → tool → terminate, error 분기)
    // ─────────────────────────────────────────────────────
    function LoopDiagram({ active, loopState }) {
      const w = 360;
      const h = 240;

      // 노드 정의
      const nodes = [
        { id: 'init',      x: 60,  y: 50,  label: 'init',      color: '#fbbf24' },
        { id: 'llm',       x: 180, y: 50,  label: 'LLM 호출',   color: '#f59e0b' },
        { id: 'tool',      x: 300, y: 50,  label: 'tool 실행', color: '#d97706' },
        { id: 'terminate', x: 180, y: 180, label: '종료',       color: '#10b981' },
        { id: 'error',     x: 300, y: 180, label: '에러 처리',  color: '#dc2626' },
      ];
      // 엣지 정의 (from → to)
      const edges = [
        { from: 'init', to: 'llm' },
        { from: 'llm', to: 'tool' },
        { from: 'tool', to: 'llm', curve: true },         // 결과 누적 후 다시 LLM
        { from: 'llm', to: 'terminate' },                 // tool_calls 없으면 종료
        { from: 'tool', to: 'error' },                    // tool 실패
        { from: 'error', to: 'tool', curveBack: true },   // 재시도
      ];
      const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));

      const isActiveNode = (id) => active.includes(id);
      const isActiveEdge = (e) =>
        active.includes(e.from) && (active.includes(e.to) || active.length === 1);

      return (
        <div className="rounded-lg bg-gradient-to-br from-amber-50 to-amber-100 border border-amber-200 p-2">
          <div className="text-[11px] font-bold text-amber-800 mb-1 flex items-center gap-1">
            <span>🔁</span>
            <span>Agent 루프 다이어그램</span>
          </div>
          <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
            <defs>
              <pattern id="grid-loop" width="30" height="30" patternUnits="userSpaceOnUse">
                <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#fde68a" strokeWidth="0.5" />
              </pattern>
              <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
                <path d="M0,0 L8,4 L0,8 Z" fill="#92400e" />
              </marker>
              <marker id="arrow-active" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
                <path d="M0,0 L9,4.5 L0,9 Z" fill="#dc2626" />
              </marker>
            </defs>
            <rect width={w} height={h} fill="url(#grid-loop)" />

            {/* 엣지 */}
            {edges.map((e, i) => {
              const a = nodeMap[e.from];
              const b = nodeMap[e.to];
              const hot = isActiveEdge(e);
              const stroke = hot ? '#dc2626' : '#92400e';
              const sw = hot ? 2.2 : 1.2;
              const op = hot ? 1 : 0.4;
              const marker = hot ? 'url(#arrow-active)' : 'url(#arrow-amber)';

              if (e.curve) {
                // tool → llm 곡선 (위로 휘어 감기)
                const path = `M ${a.x - 10} ${a.y - 12} Q ${(a.x + b.x) / 2} ${a.y - 50} ${b.x + 10} ${b.y - 12}`;
                return (
                  <g key={i}>
                    <path d={path} fill="none" stroke={stroke} strokeWidth={sw} opacity={op}
                          strokeDasharray="4 3" markerEnd={marker} />
                    <text x={(a.x + b.x) / 2} y={a.y - 35} textAnchor="middle"
                          fontSize="8" fill={hot ? '#991b1b' : '#92400e'} fontFamily="monospace" opacity={op}>
                      결과 누적
                    </text>
                  </g>
                );
              }
              if (e.curveBack) {
                // error → tool (아래쪽 곡선 재시도)
                const path = `M ${a.x - 12} ${a.y - 12} Q ${(a.x + b.x) / 2 + 30} ${(a.y + b.y) / 2 + 25} ${b.x + 12} ${b.y + 12}`;
                return (
                  <g key={i}>
                    <path d={path} fill="none" stroke={stroke} strokeWidth={sw} opacity={op}
                          strokeDasharray="3 2" markerEnd={marker} />
                    <text x={(a.x + b.x) / 2 + 28} y={(a.y + b.y) / 2 + 18} textAnchor="middle"
                          fontSize="8" fill={hot ? '#991b1b' : '#92400e'} fontFamily="monospace" opacity={op}>
                      재시도
                    </text>
                  </g>
                );
              }

              return (
                <g key={i}>
                  <line x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke={stroke}
                        strokeWidth={sw} opacity={op} markerEnd={marker} />
                </g>
              );
            })}

            {/* 노드 */}
            {nodes.map((n) => {
              const hot = isActiveNode(n.id);
              const r = hot ? 30 : 24;
              return (
                <g key={n.id} className="transition-all duration-500">
                  {hot && (
                    <circle cx={n.x} cy={n.y} r={r + 6} fill="none"
                            stroke={n.color} strokeWidth="2" opacity="0.5">
                      <animate attributeName="r" from={r + 2} to={r + 12} dur="1.4s" repeatCount="indefinite" />
                      <animate attributeName="opacity" from="0.6" to="0" dur="1.4s" repeatCount="indefinite" />
                    </circle>
                  )}
                  <circle cx={n.x} cy={n.y} r={r}
                          fill={hot ? n.color : '#fef3c7'}
                          stroke={n.color} strokeWidth="2" />
                  <text x={n.x} y={n.y + 3} textAnchor="middle"
                        fontSize="10" fontWeight="bold"
                        fill={hot ? 'white' : '#78350f'}
                        fontFamily="monospace" pointerEvents="none">
                    {n.label}
                  </text>
                </g>
              );
            })}
          </svg>

          {/* 루프 상태 카운터 */}
          <div className="grid grid-cols-3 gap-1 mt-2 text-[10px] font-mono">
            <div className="bg-white rounded border border-amber-200 px-2 py-1">
              <div className="text-amber-700 font-bold">iter</div>
              <div className="text-slate-700">
                {loopState.iteration} / {loopState.maxIter}
              </div>
            </div>
            <div className="bg-white rounded border border-amber-200 px-2 py-1">
              <div className="text-amber-700 font-bold">phase</div>
              <div className="text-slate-700">{loopState.currentPhase}</div>
            </div>
            <div className="bg-white rounded border border-amber-200 px-2 py-1">
              <div className="text-amber-700 font-bold">status</div>
              <div className={
                loopState.status === 'done' ? 'text-emerald-700 font-bold' :
                loopState.status === 'recovered' ? 'text-orange-700 font-bold' :
                loopState.status === 'running' ? 'text-amber-700 font-bold' :
                'text-slate-500'
              }>
                {loopState.status}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 라이브 메시지 스트림 (assistant / user / tool)
    // ─────────────────────────────────────────────────────
    function MessageStream({ messages, toolCalls }) {
      const roleStyle = {
        user:      { bg: 'bg-sky-50',     border: 'border-sky-300',     icon: '👤', label: 'user'      },
        assistant: { bg: 'bg-amber-50',   border: 'border-amber-300',   icon: '🤖', label: 'assistant' },
        tool:      { bg: 'bg-emerald-50', border: 'border-emerald-300', icon: '🔧', label: 'tool'      },
      };

      const toolStatusColor = {
        pending: 'text-slate-500 bg-slate-100',
        done:    'text-emerald-700 bg-emerald-100',
        fail:    'text-red-700 bg-red-100',
      };

      return (
        <div className="rounded-lg bg-white border border-slate-200 p-2">
          <div className="text-[11px] font-bold text-slate-700 mb-2 flex items-center justify-between">
            <span className="flex items-center gap-1">
              <span>📜</span>
              <span>messages 스트림 ({messages.length})</span>
            </span>
            {toolCalls.length > 0 && (
              <span className="text-[10px] text-slate-500 font-mono">
                tool_calls: {toolCalls.length}
              </span>
            )}
          </div>

          <div className="space-y-1.5 max-h-[150px] overflow-auto pr-1">
            {messages.map((m, i) => {
              const s = roleStyle[m.role] || roleStyle.assistant;
              const hl = m.hl;
              return (
                <div
                  key={i}
                  className={`rounded-md border ${s.bg} ${s.border} ${
                    hl ? 'ring-2 ring-offset-1 ring-amber-400 shadow-sm' : ''
                  } px-2 py-1.5 text-[11px] flex items-start gap-2 transition-all duration-500`}
                >
                  <span className="text-sm leading-none">{s.icon}</span>
                  <div className="flex-1 min-w-0">
                    <div className="text-[9px] uppercase tracking-wider font-bold text-slate-500">
                      {s.label}
                    </div>
                    <div className="text-slate-800 font-mono break-words">
                      {m.content}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* tool_calls 상태 패널 */}
          {toolCalls.length > 0 && (
            <div className="mt-2 pt-2 border-t border-slate-100">
              <div className="text-[10px] font-bold text-slate-600 mb-1">tool_calls 상태</div>
              <div className="space-y-1">
                {toolCalls.map((t, i) => (
                  <div key={i} className="flex items-center gap-2 text-[10px] font-mono">
                    <span className={`px-1.5 py-0.5 rounded ${toolStatusColor[t.status]}`}>
                      {t.status}
                    </span>
                    <span className="text-slate-700 truncate flex-1">
                      {t.name}({t.args})
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 에러 알림 박스 (Step 5에서만)
    // ─────────────────────────────────────────────────────
    function ErrorBanner({ error }) {
      if (!error) return null;
      return (
        <div className="rounded-lg border-2 border-red-300 bg-red-50 px-3 py-2 flex items-start gap-2">
          <span className="text-lg leading-none">⚠️</span>
          <div className="flex-1">
            <div className="text-[10px] uppercase tracking-wider font-bold text-red-700">
              {error.type}
            </div>
            <div className="text-xs text-red-800 mt-0.5">{error.message}</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 상단 다이어그램 + 하단 메시지 스트림
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm space-y-3">
          <div className="flex items-center justify-between">
            <h2 className="text-sm font-bold text-slate-700">
              🚗 Agent 4행정 — 루프 라이브 트레이스
            </h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <LoopDiagram active={step.diagram} loopState={step.loopState} />

          <MessageStream messages={step.messages} toolCalls={step.toolCalls} />

          <ErrorBanner error={step.error} />

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: '#fbbf24' }}></span>
              루프 노드
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: '#10b981' }}></span>
              종료
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: '#dc2626' }}></span>
              에러 분기
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-3 h-0.5" style={{ background: '#dc2626' }}></span>
              현재 활성 경로
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total, allFiles, onJump }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-3 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5 flex-shrink-0">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>

            {/* 파일 탭들 */}
            <div className="flex gap-0.5 ml-2 overflow-x-auto">
              {allFiles.map((f, i) => {
                const active = i === stepIdx;
                return (
                  <button
                    key={i}
                    onClick={() => onJump(i)}
                    className={`px-2.5 py-1 text-[10px] font-mono rounded-t transition flex-shrink-0 ${
                      active
                        ? 'bg-[#282c34] text-amber-300 border-t border-l border-r border-amber-500/40'
                        : 'bg-[#1c1f25] text-slate-500 hover:text-slate-300 hover:bg-[#21252b]'
                    }`}
                  >
                    {f}
                  </button>
                );
              })}
            </div>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>
              {code.lines.join('\n')}
            </code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[34rem] text-[11px] font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];
      const allFiles = STEPS.map((s) => s.code.filename);

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      const handleJump = (i) => {
        setStepIdx(i);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
          if (e.key === ' ')          { e.preventDefault(); togglePlay(); }
          if (e.key === 'Home')       { e.preventDefault(); handleReset(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [stepIdx, isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">
                &larr; 허브로
              </a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">
                curriculum V-2-1
              </span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. 실전 에이전트 구축 &gt; Chapter 2. 실전 구현</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">V-2-1. 에이전트 루프 구현</h1>
                  <p className="text-sm text-slate-500 mt-0.5">실제 30~50라인 코드 — 골격 / LLM / tool / 종료 / 에러</p>
                </div>
              </div>
              <p className="text-sm text-slate-600 mt-2">
                <b>자동차 엔진 4행정</b>처럼: 흡입(LLM 호출) → 압축(파싱) → 폭발(tool 실행) → 배기(messages 누적). 이 사이클을 <b>안전 차단</b>(max_iter / done / error)과 함께 본다.
              </p>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                code={step.code}
                stepIdx={stepIdx}
                total={STEPS.length}
                allFiles={allFiles}
                onJump={handleJump}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                💡 다음(V-2-2)에서는 <strong>Multi-Agent</strong> 패턴 — 여러 Agent가 협업하는 구조와 메시지 라우팅을 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">
                  &larr;/&rarr; · Space 재생 · Home 처음
                </span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={handleReset} disabled={stepIdx === 0 && !isPlaying} aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={handlePrev} disabled={stepIdx === 0} aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[100px]">
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1} aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['에이전트 루프', 'while not done', 'tool_calls 파싱', 'max_iter 안전차단', 'try/except 회복'].map((kw) => (
                <span key={kw} className="bg-amber-50 text-amber-700 px-3 py-1 rounded-full text-xs font-medium border border-amber-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./V-1-2.html" className="text-amber-700 hover:text-amber-900 font-medium">
                &larr; V-1-2. 메모리와 상태 관리
              </a>
              <a href="./V-2-2.html" className="text-amber-700 hover:text-amber-900 font-medium">
                V-2-2. Multi-Agent 개요 &rarr;
              </a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
