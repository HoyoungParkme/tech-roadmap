          <div className="space-y-1 max-h-44 overflow-y-auto pr-1">
            {messages && messages.length > 0 ? (
              messages.map((m, i) => {
                const isUser = m.role === 'user';
                const isSystem = m.role === 'system';
                const isRet = m.retrieved;
                const dropped = m.dropped;

                let cls = 'bg-white border border-amber-200 text-slate-700';
                if (dropped) cls = 'bg-slate-100 border border-dashed border-slate-400 text-slate-400 line-through';
                else if (isRet) cls = 'bg-violet-50 border border-violet-300 text-violet-800';
                else if (isUser) cls = 'bg-amber-200 border border-amber-400 text-amber-900';
                else if (isSystem) cls = 'bg-emerald-50 border border-emerald-300 text-emerald-800';

                return (
                  <div key={i} className={`text-[10px] px-2 py-1 rounded ${cls} font-mono flex items-start gap-1`}>
                    <span className="font-bold uppercase text-[8px] mt-0.5 opacity-70">
                      {dropped ? '✗' : (isRet ? '↩' : (isUser ? 'U' : (isSystem ? 'S' : 'A')))}
                    </span>
                    <span className="flex-1 leading-tight">{m.content}</span>
                  </div>
                );
              })
            ) : (
              <div className="text-[10px] text-slate-400 italic text-center py-3 font-mono">(메시지 없음)</div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 장기 메모리 박스 — 벡터 DB의 요약 카드들
    // ─────────────────────────────────────────────────────
    function LongTermBox({ memories, active }) {
      const ringActive = active ? 'ring-2 ring-amber-400 shadow-md scale-[1.02]' : 'opacity-60';

      return (
        <div className={`rounded-lg bg-gradient-to-br from-amber-50 to-orange-100 border-2 border-orange-300 p-3 transition-all duration-500 ${ringActive}`}>
          <div className="flex items-center justify-between mb-2">
            <div className="text-[11px] font-bold text-orange-800 flex items-center gap-1">
              <span>📚</span>
              <span>Long-term (책장 도서관)</span>
            </div>
            <span className="text-[9px] text-orange-700 font-mono">vector DB</span>
          </div>

          <div className="space-y-1 max-h-44 overflow-y-auto pr-1">
            {memories && memories.length > 0 ? (
              memories.map((m) => {
                const cls = m.hit
                  ? 'bg-orange-200 border-orange-500 text-orange-900 font-semibold shadow-sm'
                  : 'bg-white border-orange-200 text-slate-600';
                return (
                  <div key={m.id} className={`text-[10px] px-2 py-1.5 rounded border ${cls} font-mono flex items-start gap-1.5`}>
                    {m.hit && (
                      <span className="text-orange-600 text-[11px] leading-tight">●</span>
                    )}
                    <span className="flex-1 leading-tight">{m.summary}</span>
                  </div>
                );
              })
            ) : (
              <div className="text-[10px] text-slate-400 italic text-center py-3 font-mono">(저장된 기억 없음)</div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 에피소딕 메모리 박스 — 시계열 이벤트 타임라인
    // ─────────────────────────────────────────────────────
    function EpisodicBox({ events, active }) {
      const ringActive = active ? 'ring-2 ring-amber-400 shadow-md scale-[1.02]' : 'opacity-60';

      return (
        <div className={`rounded-lg bg-gradient-to-br from-yellow-50 to-amber-100 border-2 border-yellow-400 p-3 transition-all duration-500 ${ringActive}`}>
          <div className="flex items-center justify-between mb-2">
            <div className="text-[11px] font-bold text-yellow-800 flex items-center gap-1">
              <span>📖</span>
              <span>Episodic (일기장 시계열)</span>
            </div>
            <span className="text-[9px] text-yellow-700 font-mono">user_events</span>
          </div>

          <div className="relative pl-3 max-h-44 overflow-y-auto">
            {events && events.length > 0 ? (
              <>
                <div className="absolute left-1 top-1 bottom-1 w-px bg-yellow-400"></div>
                <div className="space-y-1.5">
                  {events.map((e, i) => {
                    const cls = e.hit
                      ? 'bg-yellow-200 border-yellow-500 text-yellow-900 font-semibold'
                      : 'bg-white border-yellow-200 text-slate-600';
                    return (
                      <div key={i} className="relative">
                        <span
                          className={`absolute -left-2.5 top-1 w-2 h-2 rounded-full border-2 ${
                            e.hit ? 'bg-yellow-500 border-yellow-700' : 'bg-white border-yellow-400'
                          }`}
                        ></span>
                        <div className={`ml-2 text-[10px] px-2 py-1 rounded border ${cls} font-mono`}>
                          <div className="text-[8px] opacity-70">{e.time}</div>
                          <div className="leading-tight">{e.event}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </>
            ) : (
              <div className="text-[10px] text-slate-400 italic text-center py-3 font-mono">(이벤트 없음)</div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 토큰 사용량 게이지
    // ─────────────────────────────────────────────────────
    function TokenGauge({ usage }) {
      const pct = Math.min(100, (usage.used / usage.max) * 100);
      const color = usage.alert
        ? 'bg-red-500'
        : pct > 70
          ? 'bg-amber-500'
          : 'bg-emerald-500';
      const labelColor = usage.alert ? 'text-red-700' : 'text-amber-800';

      return (
        <div className="rounded-lg bg-white border border-amber-200 p-3">
          <div className="flex items-center justify-between mb-1.5">
            <div className={`text-[11px] font-bold ${labelColor} flex items-center gap-1`}>
              <span>{usage.alert ? '🚨' : '🪙'}</span>
              <span>토큰 사용량</span>
            </div>
            <div className="text-[10px] font-mono text-slate-600">
              {usage.used.toLocaleString()} / {usage.max.toLocaleString()}
            </div>
          </div>
          <div className="h-3 bg-slate-100 rounded-full overflow-hidden border border-slate-200">
            <div
              className={`h-full ${color} transition-all duration-700 rounded-full`}
              style={{ width: `${pct}%` }}
            ></div>
          </div>
          {usage.alert && (
            <div className="text-[9px] text-red-700 font-mono mt-1 font-bold">
              ⚠ 컨텍스트 한계 임박! 오래된 메시지가 잘립니다
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 흐름 화살표 — 입력이 어디로 흘러가는가
    // ─────────────────────────────────────────────────────
    function FlowArrow({ flow }) {
      if (!flow) return null;

      const labelMap = {
        input: { icon: '⌨️', text: '사용자 입력', color: 'bg-slate-200 text-slate-800' },
        short: { icon: '📝', text: 'Short-term', color: 'bg-amber-200 text-amber-800' },
        long: { icon: '📚', text: 'Long-term', color: 'bg-orange-200 text-orange-800' },
        episodic: { icon: '📖', text: 'Episodic', color: 'bg-yellow-200 text-yellow-800' },
        all: { icon: '🧠', text: '3 메모리', color: 'bg-amber-300 text-amber-900' },
        drop: { icon: '🗑️', text: 'Drop (잘림)', color: 'bg-red-200 text-red-800' },
      };
      const from = labelMap[flow.from];
      const to = labelMap[flow.to];

      return (
        <div className="rounded-lg bg-amber-50 border border-amber-300 p-2.5 flex items-center justify-center gap-2 text-[11px]">
          <span className={`px-2 py-1 rounded font-bold font-mono ${from.color}`}>
            {from.icon} {from.text}
          </span>
          <div className="flex-1 max-w-[120px] flex items-center gap-1">
            <div className="flex-1 border-t-2 border-dashed border-amber-500"></div>
            <span className="text-[9px] font-mono text-amber-700 font-bold whitespace-nowrap">
              {flow.label}
            </span>
            <div className="flex-1 border-t-2 border-dashed border-amber-500"></div>
            <span className="text-amber-600 text-sm">▶</span>
          </div>
          <span className={`px-2 py-1 rounded font-bold font-mono ${to.color}`}>
            {to.icon} {to.text}
          </span>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 3 메모리 박스 + 토큰 게이지 + 흐름
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const isActive = (id) => step.activeBox === id || step.activeBox === 'all';

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🧠 Agent 메모리 시스템 — 3 종류</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 흐름 화살표 */}
          <div className="mb-3">
            <FlowArrow flow={step.flow} />
          </div>

          {/* 3 메모리 박스 */}
          <div className="space-y-2 mb-3">
            <ShortTermBox messages={step.shortMem} active={isActive('short')} />
            <LongTermBox memories={step.longMem} active={isActive('long')} />
            <EpisodicBox events={step.episodicMem} active={isActive('episodic')} />
          </div>

          {/* 토큰 게이지 */}
          <TokenGauge usage={step.tokenUsage} />

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded ring-2 ring-amber-400 bg-white"></span>
              활성 메모리
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-orange-400"></span>
              매칭/회수
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-2 bg-slate-200 border border-dashed border-slate-400"></span>
              drop
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2.5 h-2.5 rounded-full bg-violet-400"></span>
              RAG 회수 메시지
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[36rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. 실전 에이전트 구축 &gt; Chapter 1. 에이전트 설계</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">메모리와 상태 관리</h1>
                  <p className="text-sm text-slate-500 mt-0.5">Short-term · Long-term · Episodic — 3 메모리 동시 활용</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                💡 다음(V-2-1)에서는 <strong>에이전트 루프 구현</strong>(perceive → think → act 사이클)을 자세히 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./V-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; V-1-1 Single Agent 설계 패턴</a>
              <a href="./V-2-1.html" className="text-amber-700 hover:text-amber-900 font-medium">V-2-1 에이전트 루프 구현 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
