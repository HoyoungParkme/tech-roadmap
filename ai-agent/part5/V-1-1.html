            '# Single Agent — 4 영역 Best Practice 체크리스트',
            '',
            '> 이 4개를 모두 충족하면 80점. 나머지는 평가셋과 모니터링.',
            '',
            '## 1. System Prompt',
            '- [ ] 페르소나(이름·도메인·말투) 명시',
            '- [ ] DO NOT 규칙 5개 이내 구체적',
            '- [ ] 출력 형식 고정 (JSON 스키마 또는 [섹션] 헤더)',
            '- [ ] few-shot 예시 1~3개',
            '- [ ] 모르는 경우 처리 ("확인 필요" + escalate)',
            '',
            '## 2. Tools',
            '- [ ] 함수명이 의도를 표현 (search ✗ → lookup_product ✓)',
            '- [ ] description = 무엇·언제·반환 3 정보',
            '- [ ] enum/Literal/regex/range로 잘못된 호출 차단',
            '- [ ] Pydantic 응답 스키마',
            '- [ ] tool 8개 이하 (많으면 sub-agent로 분리)',
            '',
            '## 3. Memory',
            '- [ ] ChatHistory(영구) vs Scratchpad(휘발) 분리',
            '- [ ] N턴 넘으면 앞쪽 자동 요약',
            '- [ ] scratchpad는 응답 완료 시 clear()',
            '- [ ] 컨텍스트 토큰 8k 상한 모니터링',
            '- [ ] 민감정보(PII)는 메모리 저장 전 마스킹',
            '',
            '## 4. Loop',
            '- [ ] MAX_ITER 5~10',
            '- [ ] 명시 종료 신호 (final_answer tool)',
            '- [ ] 같은 tool 3회 반복 시 break',
            '- [ ] 각 iteration 토큰/비용 로깅',
            '- [ ] timeout (전체 30s 등) 추가',
            '',
            '## 5. 평가 (다음 단계)',
            '- [ ] 골든 셋 30~100개 준비',
            '- [ ] 정답률 / 호출 수 / 비용 3 지표',
            '- [ ] 회귀 테스트 자동화 (CI에 연결)',
            '',
            '> 이 체크리스트가 곧 V-1-2 (메모리 심화)와',
            '> V-2-* (멀티 에이전트)의 출발점이다.',
          ],
          highlight: [5, 6, 7, 8, 12, 13, 14, 15, 19, 20, 21, 22, 26, 27, 28, 29],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 4 영역 박스 메타 — System / Tools / Memory / Loop
    // ─────────────────────────────────────────────────────
    const AREAS = [
      { id: 'system', icon: '📜', label: 'System Prompt', sub: '페르소나·규칙·형식' },
      { id: 'tools',  icon: '🛠️', label: 'Tools',         sub: 'description·params' },
      { id: 'memory', icon: '🧠', label: 'Memory',        sub: 'history+scratchpad' },
      { id: 'loop',   icon: '🔁', label: 'Loop',          sub: 'max_iter·종료조건' },
    ];

    // ─────────────────────────────────────────────────────
    // 4 박스 다이어그램 — 단계별 활성 영역 강조
    // ─────────────────────────────────────────────────────
    function AgentDiagram({ active, stats }) {
      const isActive = (id) => active === id || active === 'all';

      const toneClass = (tone) => {
        switch (tone) {
          case 'on':   return 'bg-amber-500 text-white border-amber-700 shadow-md scale-105';
          case 'done': return 'bg-amber-100 text-amber-900 border-amber-400';
          default:     return 'bg-slate-50 text-slate-400 border-slate-200 opacity-60';
        }
      };

      return (
        <div className="rounded-lg bg-gradient-to-br from-amber-50 to-orange-50 border border-amber-200 p-3">
          <div className="text-[11px] font-bold text-amber-800 mb-2 flex items-center gap-1">
            <span>🤖</span>
            <span>Single Agent — 4 핵심 영역</span>
          </div>

          {/* 중앙 Agent 코어 + 4 위성 박스 */}
          <div className="relative">
            <div className="grid grid-cols-2 gap-2">
              {AREAS.map((a) => {
                const s = stats[a.id];
                const tone = isActive(a.id) ? s.tone : 'off';
                return (
                  <div
                    key={a.id}
                    className={`rounded-lg border-2 p-2.5 transition-all duration-500 ${toneClass(tone)}`}
                  >
                    <div className="flex items-center gap-1.5 mb-1">
                      <span className="text-lg leading-none">{a.icon}</span>
                      <span className="text-xs font-bold">{a.label}</span>
                    </div>
                    <div className="text-[9px] opacity-80 font-mono mb-1">{a.sub}</div>
                    <div className={`text-[10px] font-bold font-mono ${tone === 'on' ? 'text-white' : ''}`}>
                      {s.label}: <span className="font-normal">{s.value}</span>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* 중앙 코어 표식 */}
            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
              <div className="w-12 h-12 rounded-full bg-white border-2 border-amber-400 flex items-center justify-center shadow-md">
                <span className="text-xl">🤖</span>
              </div>
            </div>
          </div>

          <div className="text-[9px] text-amber-700 mt-2 text-center font-mono">
            {active === 'all'
              ? '✓ 4 영역 모두 활성 — 잘 만든 Single Agent'
              : `현재 활성 영역: ${AREAS.find((x) => x.id === active)?.label || '—'}`}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좋은 예 vs 나쁜 예 비교 카드 (Step 1~4)
    // ─────────────────────────────────────────────────────
    function CompareCard({ compare }) {
      if (!compare) return null;
      const { bad, good } = compare;

      return (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3">
          {/* 나쁜 예 */}
          <div className="rounded-lg border-2 border-red-300 bg-red-50 overflow-hidden">
            <div className="bg-red-500 text-white text-[10px] font-bold px-3 py-1.5 flex items-center gap-1">
              <span>⚠️</span><span>{bad.title}</span>
            </div>
            <div className="p-3 space-y-2">
              <pre className="text-[11px] text-red-900 font-mono whitespace-pre-wrap leading-snug bg-white/60 rounded p-2 border border-red-200">{bad.text}</pre>
              <ul className="text-[10px] text-red-800 space-y-0.5">
                {bad.issues.map((it, i) => (
                  <li key={i} className="flex items-start gap-1">
                    <span className="text-red-500 leading-none">✗</span>
                    <span>{it}</span>
                  </li>
                ))}
              </ul>
            </div>
          </div>

          {/* 좋은 예 */}
          <div className="rounded-lg border-2 border-emerald-300 bg-emerald-50 overflow-hidden">
            <div className="bg-emerald-500 text-white text-[10px] font-bold px-3 py-1.5 flex items-center gap-1">
              <span>✅</span><span>{good.title}</span>
            </div>
            <div className="p-3 space-y-2">
              <pre className="text-[11px] text-emerald-900 font-mono whitespace-pre-wrap leading-snug bg-white/60 rounded p-2 border border-emerald-200">{good.text}</pre>
              <ul className="text-[10px] text-emerald-800 space-y-0.5">
                {good.issues.map((it, i) => (
                  <li key={i} className="flex items-start gap-1">
                    <span className="text-emerald-600 leading-none">✓</span>
                    <span>{it}</span>
                  </li>
                ))}
              </ul>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Best Practice 4-그리드 (Step 5)
    // ─────────────────────────────────────────────────────
    function BestPracticeGrid({ items }) {
      const colorMap = {
        amber:  'border-amber-300 bg-amber-50  text-amber-900  ring-amber-400',
        orange: 'border-orange-300 bg-orange-50 text-orange-900 ring-orange-400',
        yellow: 'border-yellow-400 bg-yellow-50 text-yellow-900 ring-yellow-400',
      };

      return (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mt-3">
          {items.map((b) => (
            <div key={b.area} className={`rounded-lg border-2 p-3 ${colorMap[b.color]}`}>
              <div className="flex items-center gap-1.5 mb-2">
                <span className="text-lg leading-none">{b.icon}</span>
                <span className="text-xs font-bold">{b.area}</span>
              </div>
              <ul className="text-[10px] space-y-1 font-medium">
                {b.items.map((it, i) => (
                  <li key={i} className="flex items-start gap-1">
                    <span className="leading-none mt-0.5">▪</span>
                    <span>{it}</span>
                  </li>
                ))}
              </ul>
            </div>
          ))}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 4 박스 다이어그램 + 비교 카드 / Best Practice
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🤖 Single Agent — 모범 구조</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 4 박스 다이어그램 */}
          <AgentDiagram active={step.active} stats={step.stats} />

          {/* 비교 카드 (Step 1~4) */}
          {step.compare && <CompareCard compare={step.compare} />}

          {/* Best Practice 그리드 (Step 5) */}
          {step.bestList && <BestPracticeGrid items={step.bestList} />}

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm bg-amber-500"></span>
              현재 활성
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm bg-amber-100 border border-amber-400"></span>
              완료
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm bg-slate-50 border border-slate-200"></span>
              대기
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2.5 h-2.5 rounded-sm bg-emerald-500"></span>
              좋은 예
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm bg-red-500"></span>
              나쁜 예
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. 실전 에이전트 구축 &gt; Chapter 1. 에이전트 설계</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Single Agent 설계 패턴</h1>
                  <p className="text-sm text-slate-500 mt-0.5">단일 Agent의 모범 구조 — System Prompt · Tools · Memory · Loop</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                💡 다음(V-1-2)에서는 <strong>메모리와 상태 관리</strong>를 더 깊이 — long-term memory, vector store 기반 회상, session 분리 패턴까지 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../part4/IV-3-1.html" className="text-slate-500 hover:text-slate-700">&larr; IV-3-1 MCP Server</a>
              <a href="./V-1-2.html" className="text-amber-700 hover:text-amber-900 font-medium">V-1-2 메모리와 상태 관리 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
