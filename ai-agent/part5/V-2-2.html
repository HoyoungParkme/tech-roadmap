            '### 🔁 Loop Guard',
            '- [x] `max_iterations` ≤ 25',
            '- [x] no-progress 감지 (3턴 동일 응답 → break)',
            '- [x] tool error 누적 cap (≥3회 → escalate)',
            '- [x] wall-clock timeout (예: 5min)',
            '',
            '### 💰 Cost Cap',
            '- [x] 세션 token cap (예: 200k)',
            '- [x] 일일/유저 호출 한도 + 80% 알람',
            '- [x] sub-agent 모델 라우팅 (small/large)',
            '- [x] tool call 최대 횟수 (예: 30)',
            '',
            '### 📡 Observability',
            '- [x] `trace_id` 모든 sub-agent 전파',
            '- [x] hand-off 로그 (from/to/payload)',
            '- [x] p50/p95 latency + error rate 대시',
            '- [x] human-in-the-loop 게이트 (위험 작업)',
            '',
            '## 4. 다음 단계',
            '',
            '1. **PoC 1개** — Supervisor 패턴 + 도구 3개 + 12 가드 → 1주일',
            '2. **트래픽 측정** — p95 latency / 비용 / 루프 빈도',
            '3. **확장 결정** — 한계 만나면 Hierarchy or Network',
            '',
            '---',
            '',
            '## 🎉 ai-agent 26/26 fastapi 패턴 통일 완료',
            '',
            '- Part I (개론) → V (실전) **26 자료 모두 좌/우 2-pane**',
            '- highlight.js + atom-one-dark + 3000ms 자동재생',
            '- 마지막 자료 V-2-2까지 amber 톤으로 마무리',
            '- 이제 진짜 Agent 한 번 직접 만들어 볼 차례',
          ],
          highlight: [5, 15, 21, 28, 35, 41, 48],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 패턴 카드 노드 위치 — 다이어그램용 (절대 좌표 %)
    // ─────────────────────────────────────────────────────
    const NODE_POS = {
      supervisor: {
        PM:         { x: 50, y: 18 },
        Researcher: { x: 18, y: 75 },
        Coder:      { x: 50, y: 75 },
        Reviewer:   { x: 82, y: 75 },
      },
      hierarchy: {
        CEO:       { x: 50, y: 12 },
        'FE Lead': { x: 25, y: 45 },
        'BE Lead': { x: 75, y: 45 },
        'FE-1':    { x: 12, y: 80 },
        'FE-2':    { x: 38, y: 80 },
        'BE-1':    { x: 62, y: 80 },
        'BE-2':    { x: 88, y: 80 },
      },
      network: {
        Writer:     { x: 25, y: 25 },
        Critic:     { x: 75, y: 25 },
        Researcher: { x: 25, y: 75 },
        Tester:     { x: 75, y: 75 },
      },
    };

    // ─────────────────────────────────────────────────────
    // 한 패턴의 다이어그램 (SVG + 노드)
    // ─────────────────────────────────────────────────────
    function PatternDiagram({ pattern, isActive, isFocus, messageFlow }) {
      const positions = NODE_POS[pattern.key];
      const flowEdges = (messageFlow || []).filter((m) =>
        positions[m.from] && positions[m.to]
      );
      return (
        <div
          className={`relative rounded-lg border-2 p-3 transition-all duration-500 ${
            isActive
              ? isFocus
                ? 'bg-amber-50 border-amber-500 ring-2 ring-amber-300 ring-offset-1 shadow-md'
                : 'bg-amber-50/60 border-amber-300'
              : 'bg-slate-50 border-slate-200 opacity-50'
          }`}
        >
          <div className="flex items-center gap-1.5 mb-1">
            <span className="text-base" aria-hidden="true">{pattern.emoji}</span>
            <span className={`text-xs font-bold ${isActive ? 'text-amber-800' : 'text-slate-500'}`}>
              {pattern.name}
            </span>
          </div>
          <div className={`text-[10px] mb-2 ${isActive ? 'text-amber-700' : 'text-slate-400'}`}>
            {pattern.sub}
          </div>

          {/* SVG 다이어그램 */}
          <div className="relative w-full" style={{ height: '160px' }}>
            <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="absolute inset-0 w-full h-full">
              {/* 정적 엣지 */}
              {pattern.edges.map((e, i) => {
                const a = positions[e.from];
                const b = positions[e.to];
                if (!a || !b) return null;
                return (
                  <line
                    key={`edge-${i}`}
                    x1={a.x} y1={a.y} x2={b.x} y2={b.y}
                    stroke={isActive ? '#f59e0b' : '#cbd5e1'}
                    strokeWidth="0.5"
                    opacity={isActive ? 0.6 : 0.4}
                  />
                );
              })}
              {/* 메시지 흐름 (animated) */}
              {isFocus && flowEdges.map((m, i) => {
                const a = positions[m.from];
                const b = positions[m.to];
                return (
                  <g key={`flow-${i}`}>
                    <line
                      x1={a.x} y1={a.y} x2={b.x} y2={b.y}
                      stroke="#d97706"
                      strokeWidth="1.2"
                      strokeDasharray="3 2"
                      opacity="0.9"
                    >
                      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1.2s" repeatCount="indefinite" />
                    </line>
                  </g>
                );
              })}
            </svg>
            {/* 노드 — 절대 위치 */}
            {Object.entries(positions).map(([name, pos]) => (
              <div
                key={name}
                className={`absolute -translate-x-1/2 -translate-y-1/2 px-1.5 py-0.5 rounded text-[9px] font-bold border whitespace-nowrap transition-colors duration-500 ${
                  isActive
                    ? 'bg-white border-amber-400 text-amber-800 shadow-sm'
                    : 'bg-white border-slate-300 text-slate-500'
                }`}
                style={{ left: `${pos.x}%`, top: `${pos.y}%` }}
              >
                {name}
              </div>
            ))}
          </div>

          <div className={`mt-2 text-[10px] leading-tight ${isActive ? 'text-amber-700' : 'text-slate-400'}`}>
            <div><span className="font-semibold">언제:</span> {pattern.when}</div>
            <div><span className="font-semibold">예:</span> {pattern.example}</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측: 3 패턴 다이어그램 + 12 체크리스트
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ activePatterns, focusPattern, messageFlow, checklistDone, isFinal }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🤝 Multi-Agent 협업 패턴</h2>
            <span className="text-[10px] text-slate-400 font-mono">3 패턴 · 12 가드</span>
          </div>

          {/* 3 패턴 다이어그램 (1열로 쌓아 다이어그램이 잘 보이도록) */}
          <div className="grid grid-cols-1 gap-2.5 mb-4">
            {PATTERNS.map((p) => (
              <PatternDiagram
                key={p.key}
                pattern={p}
                isActive={activePatterns.includes(p.key)}
                isFocus={focusPattern === p.key}
                messageFlow={focusPattern === p.key ? messageFlow : []}
              />
            ))}
          </div>

          {/* 12 운영 체크리스트 — Step 3+에서 활성화 */}
          <div
            className={`rounded-lg border-2 p-3 transition-all duration-500 ${
              checklistDone === 12
                ? isFinal
                  ? 'bg-amber-100 border-amber-500 animate-pulse'
                  : 'bg-amber-50 border-amber-400'
                : 'bg-slate-50 border-slate-300'
            }`}
          >
            <div className="flex items-baseline justify-between mb-1.5">
              <span className="text-xs font-bold text-slate-700">12 운영 가드</span>
              <span
                className={`text-lg font-extrabold tabular-nums ${
                  checklistDone === 12 ? 'text-amber-700' : 'text-slate-500'
                }`}
              >
                {checklistDone}<span className="text-xs text-slate-500"> / 12</span>
                {checklistDone === 12 && <span className="ml-1.5">✓</span>}
              </span>
            </div>

            {/* 12 항목 — 3 그룹 × 4 */}
            <div className="grid grid-cols-3 gap-2">
              {(['loop', 'cost', 'obs']).map((g) => {
                const meta = GROUP_META[g];
                const items = CHECKLIST.filter((c) => c.group === g);
                return (
                  <div key={g} className="space-y-1">
                    <div className="flex items-center gap-1 text-[10px] font-bold text-slate-700">
                      <span aria-hidden="true">{meta.emoji}</span>
                      <span>{meta.name}</span>
                    </div>
                    <ul className="space-y-0.5">
                      {items.map((it, i) => {
                        const done = checklistDone === 12;
                        return (
                          <li
                            key={i}
                            className={`text-[9.5px] leading-tight flex items-start gap-1 transition-colors duration-500 ${
                              done ? 'text-amber-800' : 'text-slate-400'
                            }`}
                          >
                            <span className={done ? 'text-amber-600 font-bold' : 'text-slate-300'}>
                              {done ? '✓' : '○'}
                            </span>
                            <span className="flex-1">{it.text}</span>
                          </li>
                        );
                      })}
                    </ul>
                  </div>
                );
              })}
            </div>

            {checklistDone === 12 && isFinal && (
              <div className="mt-2 pt-2 border-t border-amber-300 text-xs font-bold text-amber-800">
                ai-agent 26/26 완성 — 100% fastapi 패턴 통일 🎉
              </div>
            )}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[10px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-amber-400"></span>활성 패턴
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded bg-slate-300"></span>비활성
            </span>
            <span className="ml-auto font-mono">3 + 12 = 시작 가이드</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      useEffect(() => {
        if (!codeRef.current || !window.hljs) return;
        const html = codeRef.current.innerHTML;
        setRenderedLines(html.split('\n'));
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화 hidden */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/10 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];
      const isFinal = stepIdx === STEPS.length - 1;

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum V-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. 실전 에이전트 구축 &gt; Chapter 2. 실전 구현</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Multi-Agent 개요 — 협업 패턴 + 운영 체크리스트</h1>
                  <p className="text-sm text-slate-500 mt-0.5">Single → Supervisor / Hierarchy / Network · 12 운영 가드</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane
                activePatterns={step.activePatterns}
                focusPattern={step.focusPattern}
                messageFlow={step.messageFlow}
                checklistDone={step.checklistDone}
                isFinal={isFinal}
              />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {isFinal && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                🎉 ai-agent 100% fastapi 패턴 통일 — Part I~V 26/26 자료 모두 완성. 다음 단계는 작은 PoC 한 번 직접 돌려보는 것
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./V-2-1.html" className="text-slate-500 hover:text-slate-700">&larr; V-2-1</a>
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">허브로 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
