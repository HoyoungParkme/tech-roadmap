<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent 학습 — V-2-2. Multi-Agent 개요</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SUPERVISOR_AGENTS = [
      { icon: '🔬', name: 'Research Agent', task: '조사' },
      { icon: '💻', name: 'Coding Agent', task: '구현' },
      { icon: '📝', name: 'Review Agent', task: '리뷰' },
    ];

    const STEPS = [
      { desc: "[왜 Multi-Agent?] 복잡한 문제는 하나의 Agent로 해결하기 어렵습니다. 회사에서 한 사람이 모든 일을 할 수 없듯이, 역할을 나누면 각 Agent가 전문화된 작업을 더 잘 수행합니다.", pattern: null },
      { desc: "[Supervisor 패턴] 팀장(Supervisor)이 팀원(Sub-agent)에게 업무를 분배합니다. PM Agent가 Research, Coding, Review Agent에게 작업을 나눠주고 결과를 종합합니다.", pattern: 'supervisor' },
      { desc: "[Peer-to-Peer 패턴] 동등한 Agent들이 서로 메시지를 주고받으며 협업합니다. 토론처럼 서로의 결과를 검증합니다. 의견 다양성이 필요할 때 적합합니다.", pattern: 'peer' },
      { desc: "[실전 예시] Claude Code가 바로 Multi-Agent 시스템입니다. PM(메인) → Researcher(조사) → Reviewer(리뷰) → Test-writer(테스트). 각각 전문화된 역할을 수행합니다.", pattern: 'example' },
      { desc: "[정리] Single Agent로 시작하고, 복잡해지면 Multi-Agent로 확장하세요. Supervisor가 가장 흔하고, Peer-to-Peer는 검증/토론에 적합합니다. 이것으로 AI Agent 학습이 완료되었습니다!", pattern: 'summary' },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;
      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };
      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-emerald-700 hover:text-emerald-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-emerald-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. 실전 에이전트 구축 &gt; Chapter 2. 실전 구현</div>
                  <h1 className="text-2xl font-bold text-slate-800">V-2-2. Multi-Agent 개요</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>회사 조직도</b>처럼, 팀장(Supervisor)이 팀원(Sub-agent)에게 업무를 분배하거나, 동료(Peer)끼리 협업합니다.</p>
            </header>
            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-emerald-600 border-emerald-700 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-200">Supervisor vs Peer-to-Peer</h3>
                <span className="text-xs text-emerald-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {/* Supervisor */}
              <div className={`rounded-xl border-2 p-5 transition-all duration-500 ${stepData.pattern === 'supervisor' || stepData.pattern === 'example' || stepData.pattern === 'summary' ? 'border-violet-300 bg-violet-50 scale-105 shadow-md' : stepData.pattern === 'peer' ? 'border-slate-200 bg-white opacity-30' : 'border-slate-200 bg-white'}`}>
                <div className="text-center mb-3">
                  <div className="text-sm font-bold text-violet-700">Supervisor 패턴</div>
                  <div className="text-xs text-slate-500">팀장 → 팀원</div>
                </div>
                <div className="flex justify-center mb-3">
                  <div className="w-14 h-14 bg-violet-100 border-2 border-violet-300 rounded-full flex items-center justify-center text-2xl">👨‍💼</div>
                </div>
                <div className="text-center text-xs text-violet-600 mb-3 font-bold">PM Agent (감독)</div>
                <div className="flex justify-center gap-1 mb-2">
                  <span className="text-slate-300">↙</span><span className="text-slate-300">↓</span><span className="text-slate-300">↘</span>
                </div>
                <div className="grid grid-cols-3 gap-2">
                  {SUPERVISOR_AGENTS.map((a, i) => (
                    <div key={i} className="text-center p-2 bg-white rounded-lg border border-violet-100">
                      <div className="text-xl">{a.icon}</div>
                      <div className="text-xs font-bold text-slate-700">{a.task}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Peer-to-Peer */}
              <div className={`rounded-xl border-2 p-5 transition-all duration-500 ${stepData.pattern === 'peer' || stepData.pattern === 'summary' ? 'border-sky-300 bg-sky-50 scale-105 shadow-md' : stepData.pattern === 'supervisor' || stepData.pattern === 'example' ? 'border-slate-200 bg-white opacity-30' : 'border-slate-200 bg-white'}`}>
                <div className="text-center mb-3">
                  <div className="text-sm font-bold text-sky-700">Peer-to-Peer 패턴</div>
                  <div className="text-xs text-slate-500">동료 ↔ 동료</div>
                </div>
                <div className="flex justify-center gap-4 mb-3">
                  <div className="w-14 h-14 bg-sky-100 border-2 border-sky-300 rounded-full flex items-center justify-center text-2xl">🤖</div>
                  <div className="flex items-center text-sky-400 text-xl">↔</div>
                  <div className="w-14 h-14 bg-sky-100 border-2 border-sky-300 rounded-full flex items-center justify-center text-2xl">🤖</div>
                </div>
                <div className="text-center text-xs text-sky-600 mb-3 font-bold">서로 메시지 교환 + 검증</div>
                <div className="space-y-2">
                  <div className="bg-white rounded-lg p-2 border border-sky-100 text-xs text-slate-600">Agent A: "이 코드가 맞을까?"</div>
                  <div className="bg-white rounded-lg p-2 border border-sky-100 text-xs text-slate-600">Agent B: "버그 발견. 수정 제안..."</div>
                </div>
              </div>
            </div>

            {/* 완료 배너 */}
            {isEnd && (
              <div className="bg-emerald-100 border-2 border-emerald-300 rounded-xl p-6 text-center">
                <div className="text-3xl mb-2">🎉</div>
                <div className="text-xl font-bold text-emerald-800">AI Agent 학습 완료!</div>
                <div className="text-sm text-emerald-600 mt-2">Part I~V, 26개 시각화를 모두 마쳤습니다.</div>
                <div className="text-xs text-emerald-500 mt-1">Agent 개론 → LLM 기초 → CoT/ReAct/Tool Use → MCP → 실전 구축</div>
              </div>
            )}

            <div className="flex flex-wrap gap-2">
              {['Multi-Agent', 'Supervisor', 'Peer-to-Peer', '역할 분담', '협업'].map(kw => (
                <span key={kw} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-sm font-medium border border-emerald-200">{kw}</span>
              ))}
            </div>
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-emerald-600 hover:bg-emerald-700">{isPlaying ? <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</> : <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>}</button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>
            <div className="text-sm text-slate-500 flex justify-between">
              <a href="./V-2-1.html" className="text-emerald-600 hover:text-emerald-800 font-medium">← V-2-1. 에이전트 루프 구현</a>
              <span className="text-emerald-600 font-bold">🎉 전체 학습 완료!</span>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
