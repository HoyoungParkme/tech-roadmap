<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent 학습 — I-2-2. 자율성 스펙트럼</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    I-2-2. 자율성 스펙트럼
    학습 목표: "완전 수동"부터 "완전 자율"까지 에이전트의 자율성 수준을 분류할 수 있다.
    템플릿: 개념형 (Type A) — 수평 스펙트럼.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const LEVELS = [
      {
        level: 0, label: 'L0: 수동',
        car: '리모컨 자동차', carIcon: '🎮',
        ai: '단순 API 호출', aiIcon: '📞',
        desc: '사람이 모든 걸 조종한다. 매번 지시해야 한다.',
        example: 'LLM에 하나씩 질문하고 답변 받기',
        color: 'slate',
      },
      {
        level: 1, label: 'L1: 보조',
        car: '크루즈 컨트롤', carIcon: '🚗',
        ai: 'Copilot', aiIcon: '✨',
        desc: '일부만 자동. 사람이 대부분 조종한다.',
        example: '코드 자동완성 (GitHub Copilot)',
        color: 'sky',
      },
      {
        level: 2, label: 'L2: 반자율',
        car: '차선 유지 + 속도 조절', carIcon: '🚙',
        ai: 'ReAct Agent', aiIcon: '🤖',
        desc: '판단+행동을 하지만, 사람이 감독한다.',
        example: 'Claude Code — 코드 작성+실행, 사람이 승인',
        color: 'violet',
      },
      {
        level: 3, label: 'L3: 조건부 자율',
        car: '고속도로 자율주행', carIcon: '🚘',
        ai: '도메인 전문 Agent', aiIcon: '🏢',
        desc: '특정 영역에서 자율 동작. 범위 밖은 사람에게 넘긴다.',
        example: '고객 응대 Agent — 정해진 시나리오 내 자율 처리',
        color: 'amber',
      },
      {
        level: 4, label: 'L4: 완전 자율',
        car: '완전 자율주행', carIcon: '🛸',
        ai: '범용 자율 Agent', aiIcon: '🌐',
        desc: '목표만 주면 알아서 해결. 아직 연구 단계.',
        example: '\"이 프로젝트 완성해줘\" → 스스로 전부 처리',
        color: 'emerald',
      },
    ];

    const colorMap = {
      slate:   { bg: 'bg-slate-100', border: 'border-slate-400', text: 'text-slate-700', badge: 'bg-slate-500', bar: 'bg-slate-400' },
      sky:     { bg: 'bg-sky-100', border: 'border-sky-400', text: 'text-sky-700', badge: 'bg-sky-500', bar: 'bg-sky-400' },
      violet:  { bg: 'bg-violet-100', border: 'border-violet-400', text: 'text-violet-700', badge: 'bg-violet-500', bar: 'bg-violet-500' },
      amber:   { bg: 'bg-amber-100', border: 'border-amber-400', text: 'text-amber-700', badge: 'bg-amber-500', bar: 'bg-amber-400' },
      emerald: { bg: 'bg-emerald-100', border: 'border-emerald-400', text: 'text-emerald-700', badge: 'bg-emerald-500', bar: 'bg-emerald-400' },
    };

    const STEPS = [
      {
        desc: "[자율성이란?] 모든 Agent가 같은 수준으로 동작하지 않습니다. 자동차의 자율주행 단계처럼, Agent에도 자율성 수준이 있습니다.",
        activeLevel: null,
      },
      {
        desc: "[L0: 수동] 리모컨 자동차처럼, 사람이 모든 걸 조종합니다. LLM에 하나씩 질문하고 답을 받는 수준입니다. Agent라고 부르기 어렵습니다.",
        activeLevel: 0,
      },
      {
        desc: "[L1: 보조] 크루즈 컨트롤처럼, 일부만 자동입니다. GitHub Copilot이 코드 자동완성을 제안하지만, 수락/거부는 사람이 합니다.",
        activeLevel: 1,
      },
      {
        desc: "[L2: 반자율] 차선 유지 + 속도 조절처럼, 판단과 행동을 하지만 사람이 감독합니다. Claude Code처럼 코드를 작성하고 실행하되, 중요한 결정은 사람이 승인합니다. 현재 실용적인 Agent의 주류입니다.",
        activeLevel: 2,
      },
      {
        desc: "[L3~L4] L3은 특정 도메인에서 자율 동작 (고객 응대 봇). L4는 \"이 프로젝트 완성해줘\"만 말하면 알아서 처리 — 아직 연구 단계입니다. 현재 대부분의 Agent는 L2~L3에 있습니다.",
        activeLevel: 'high',
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };
      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const isLevelActive = (lvl) => {
        if (stepData.activeLevel === null) return true;
        if (stepData.activeLevel === 'high') return lvl.level >= 3;
        return lvl.level === stepData.activeLevel;
      };

      const isCurrentPractical = (lvl) => {
        return lvl.level === 2 && (stepData.activeLevel === 2 || stepData.activeLevel === 'high');
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">

            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-violet-700 hover:text-violet-900 font-medium">
                <span aria-hidden="true">&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. AI Agent란 무엇인가 &gt; Chapter 2. Agent의 구성요소</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-2-2. 자율성 스펙트럼</h1>
                </div>
              </div>
              <p className="text-slate-600">
                자동차의 자율주행 단계처럼, AI Agent에도 <b>자율성 수준</b>이 있습니다. L0(수동)부터 L4(완전 자율)까지, 현재 실용적인 Agent는 주로 <b>L2~L3</b>에 있습니다.
              </p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-violet-700 border-violet-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">자율성 스펙트럼</h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 스펙트럼 바 */}
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-1 mb-6 h-3 rounded-full overflow-hidden bg-slate-100">
                {LEVELS.map(lvl => {
                  const c = colorMap[lvl.color];
                  const active = isLevelActive(lvl);
                  return (
                    <div key={lvl.level} className={`flex-1 h-full transition-all duration-500 ${active ? c.bar : 'bg-slate-200'} ${active ? 'opacity-100' : 'opacity-30'}`} />
                  );
                })}
              </div>
              <div className="flex justify-between text-xs text-slate-500 mb-6 px-1">
                <span>수동</span>
                <span>→ 자율성 증가 →</span>
                <span>완전 자율</span>
              </div>

              {/* 레벨 카드 */}
              <div className="space-y-3">
                {LEVELS.map(lvl => {
                  const c = colorMap[lvl.color];
                  const active = isLevelActive(lvl);
                  const practical = isCurrentPractical(lvl);
                  return (
                    <div key={lvl.level} className={`flex items-start gap-4 p-4 rounded-xl border-2 transition-all duration-500 ${active ? `${c.bg} ${c.border} shadow-sm` : 'border-slate-100 bg-slate-50 opacity-30'} ${practical ? 'ring-2 ring-violet-300' : ''}`}>
                      <div className={`w-10 h-10 rounded-lg flex items-center justify-center text-white font-bold text-sm shrink-0 ${active ? c.badge : 'bg-slate-300'}`}>
                        L{lvl.level}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 mb-1">
                          <span className={`font-bold ${active ? c.text : 'text-slate-400'}`}>{lvl.label}</span>
                          {practical && <span className="text-xs bg-violet-200 text-violet-800 px-2 py-0.5 rounded-full font-bold">현재 주류</span>}
                        </div>
                        <div className="text-sm text-slate-600 mb-2">{lvl.desc}</div>
                        <div className="flex flex-wrap gap-3 text-xs">
                          <span className="flex items-center gap-1"><span>{lvl.carIcon}</span> <b>자동차:</b> {lvl.car}</span>
                          <span className="flex items-center gap-1"><span>{lvl.aiIcon}</span> <b>AI:</b> {lvl.ai}</span>
                        </div>
                        {active && <div className="mt-2 text-xs text-slate-500 bg-white bg-opacity-60 rounded-lg px-3 py-1.5"><b>예시:</b> {lvl.example}</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['자율성', 'Human-in-the-Loop', '감독', 'Copilot', '자율 Agent'].map(kw => (
                <span key={kw} className="bg-violet-50 text-violet-700 px-3 py-1 rounded-full text-sm font-medium border border-violet-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-violet-600 hover:bg-violet-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                  )}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length}
              </div>
            </div>

            <div className="text-sm text-slate-500 flex justify-between">
              <a href="./I-2-1.html" className="text-violet-600 hover:text-violet-800 font-medium">← I-2-1. Agent 아키텍처 전체 지도</a>
              <span className="text-slate-400">Part I 완료! 다음: Part II. LLM 기초</span>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
