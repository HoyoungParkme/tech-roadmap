<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent 학습 — I-1-2. Agent의 3요소: 관찰-사고-행동</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    I-1-2. Agent의 3요소: 관찰-사고-행동
    학습 목표: Perception-Reasoning-Action 루프를 그릴 수 있다.
    템플릿: 개념형 (Type A) — 순환 다이어그램.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PHASES = [
      { id: 'observe', label: '관찰 (Observe)', icon: '👁️', color: 'sky', desc: '환경에서 정보를 수집한다' },
      { id: 'think',   label: '사고 (Think)',   icon: '🧠', color: 'amber', desc: '수집한 정보를 분석하고 판단한다' },
      { id: 'act',     label: '행동 (Act)',     icon: '⚡', color: 'emerald', desc: '판단에 따라 실제 행동을 실행한다' },
    ];

    const STEPS = [
      {
        desc: "[시작] 음식점 매니저를 상상해봅시다. 매니저는 환경을 관찰하고, 판단하고, 행동하는 것을 끊임없이 반복합니다. AI Agent도 같은 방식으로 동작합니다.",
        activePhase: null,
        scenario: null,
      },
      {
        desc: "[1단계: 관찰] 매니저가 주방과 홀을 둘러봅니다. \"4번 테이블 주문이 밀려 있고, 디저트 재료가 거의 바닥났네.\" — 환경에서 정보를 수집합니다.",
        activePhase: 'observe',
        scenario: { icon: '👁️', title: '관찰 (Observe)', example: '\"4번 테이블 주문 밀림, 디저트 재료 부족\"', detail: 'Agent는 사용자 입력, API 응답, DB 조회 결과 등을 수집합니다.' },
      },
      {
        desc: "[2단계: 사고] 매니저가 생각합니다. \"디저트보다 메인 요리를 먼저 내보내고, 재료는 공급업체에 주문하자.\" — 수집한 정보를 바탕으로 판단합니다.",
        activePhase: 'think',
        scenario: { icon: '🧠', title: '사고 (Think)', example: '\"메인 요리 우선 → 재료 발주 필요\"', detail: 'Agent의 LLM이 상황을 분석하고 다음 행동을 결정합니다.' },
      },
      {
        desc: "[3단계: 행동] 매니저가 직원에게 지시합니다. \"메인 요리 먼저 4번에 내보내고, 공급업체에 전화해.\" — 판단에 따라 실제 행동을 실행합니다.",
        activePhase: 'act',
        scenario: { icon: '⚡', title: '행동 (Act)', example: '\"직원에게 지시 + 공급업체 전화\"', detail: 'Agent가 도구(API, 검색, 실행)를 사용해 실제로 행동합니다.' },
      },
      {
        desc: "[순환] 행동의 결과를 다시 관찰합니다. \"4번에 요리가 나갔고, 재료 발주가 접수됐다.\" 이 결과를 보고 다시 사고 → 행동을 반복합니다. 이것이 Agent의 핵심 루프입니다.",
        activePhase: 'loop',
        scenario: { icon: '🔄', title: '순환 루프', example: '관찰 → 사고 → 행동 → 결과 → 다시 관찰...', detail: '문제가 해결될 때까지 이 루프를 반복합니다. ReAct 패턴의 기초입니다.' },
      },
    ];

    const colorMap = {
      sky: { bg: 'bg-sky-100', border: 'border-sky-400', text: 'text-sky-700', ring: 'ring-sky-300', fill: 'bg-sky-500' },
      amber: { bg: 'bg-amber-100', border: 'border-amber-400', text: 'text-amber-700', ring: 'ring-amber-300', fill: 'bg-amber-500' },
      emerald: { bg: 'bg-emerald-100', border: 'border-emerald-400', text: 'text-emerald-700', ring: 'ring-emerald-300', fill: 'bg-emerald-500' },
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };
      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">

            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-violet-700 hover:text-violet-900 font-medium">
                <span aria-hidden="true">&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. AI Agent란 무엇인가 &gt; Chapter 1. 에이전트의 탄생</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-1-2. Agent의 3요소: 관찰-사고-행동</h1>
                </div>
              </div>
              <p className="text-slate-600">
                <b>음식점 매니저</b>처럼 AI Agent는 관찰(Observe) → 사고(Think) → 행동(Act)을 반복합니다. 이 순환이 에이전트의 심장입니다.
              </p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-violet-700 border-violet-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">Observe → Think → Act 루프</h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 순환 다이어그램 */}
            <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200 relative" style={{minHeight: '350px'}}>
              <div className="flex items-center justify-center gap-4 md:gap-8">
                {PHASES.map((phase, i) => {
                  const isActive = stepData.activePhase === phase.id || stepData.activePhase === 'loop';
                  const c = colorMap[phase.color];
                  return (
                    <React.Fragment key={phase.id}>
                      <div className={`flex flex-col items-center transition-all duration-500 ${isActive ? 'scale-110' : stepData.activePhase && stepData.activePhase !== 'loop' ? 'opacity-40 scale-95' : ''}`}>
                        <div className={`w-20 h-20 md:w-24 md:h-24 rounded-full border-3 flex items-center justify-center text-3xl md:text-4xl transition-all duration-300 ${c.bg} ${c.border} ${isActive ? `ring-4 ${c.ring} shadow-lg` : ''}`}
                          style={{borderWidth: '3px'}}>
                          {phase.icon}
                        </div>
                        <div className={`mt-2 font-bold text-sm ${c.text}`}>{phase.label}</div>
                        <div className="text-xs text-slate-500 text-center mt-1 max-w-[120px]">{phase.desc}</div>
                      </div>
                      {i < PHASES.length - 1 && (
                        <div className={`text-2xl md:text-3xl transition-all duration-300 ${stepData.activePhase === 'loop' ? 'text-violet-500 scale-125' : 'text-slate-300'}`}>→</div>
                      )}
                    </React.Fragment>
                  );
                })}
              </div>

              {/* 순환 화살표 (마지막 단계) */}
              {stepData.activePhase === 'loop' && (
                <div className="flex justify-center mt-6">
                  <div className="bg-violet-100 border border-violet-200 rounded-full px-6 py-2 text-violet-700 font-bold text-sm flex items-center gap-2">
                    <span className="text-lg">🔄</span> 결과를 관찰 → 다시 반복
                  </div>
                </div>
              )}

              {/* 시나리오 상세 */}
              {stepData.scenario && (
                <div className="mt-6 bg-slate-50 rounded-lg p-4 border border-slate-200">
                  <div className="flex items-center gap-2 mb-2">
                    <span className="text-xl">{stepData.scenario.icon}</span>
                    <span className="font-bold text-slate-800">{stepData.scenario.title}</span>
                  </div>
                  <div className="text-sm text-slate-700 mb-1">
                    <b>음식점 예시:</b> {stepData.scenario.example}
                  </div>
                  <div className="text-sm text-slate-500">
                    <b>AI Agent:</b> {stepData.scenario.detail}
                  </div>
                </div>
              )}
            </div>

            <div className="flex flex-wrap gap-2">
              {['Perception', 'Reasoning', 'Action', '루프', '순환'].map(kw => (
                <span key={kw} className="bg-violet-50 text-violet-700 px-3 py-1 rounded-full text-sm font-medium border border-violet-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-violet-600 hover:bg-violet-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                  )}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length}
              </div>
            </div>

            <div className="text-sm text-slate-500 flex justify-between">
              <a href="./I-1-1.html" className="text-violet-600 hover:text-violet-800 font-medium">← I-1-1. 챗봇 vs AI Agent</a>
              <a href="./I-1-3.html" className="text-violet-600 hover:text-violet-800 font-medium">I-1-3. 왜 Agent가 필요한가 →</a>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
