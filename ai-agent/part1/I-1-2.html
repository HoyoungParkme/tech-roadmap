    // ─────────────────────────────────────────────────────
    // 좌측: Observe / Think / Act 3박스 원형 배치 + 화살표 루프

    function LoopDiagram({ activePhase }) {

      const cx = w / 2;
      const cy = h / 2 + 6;
      const r = 96;

      // 3박스 위치: 위(Observe) / 오른쪽 아래(Think) / 왼쪽 아래(Act)
      const positions = {
        observe: { x: cx,           y: cy - r,            color: '#f59e0b', label: 'Observe', icon: '👁️' },
        think:   { x: cx + r * 0.866, y: cy + r * 0.5,    color: '#f59e0b', label: 'Think',   icon: '🧠' },
        act:     { x: cx - r * 0.866, y: cy + r * 0.5,    color: '#f59e0b', label: 'Act',     icon: '⚡' },
      };

      const isLoop = activePhase === 'loop';

      const renderBox = (id) => {
        const p = positions[id];
        const active = activePhase === id || isLoop;
        const fill = active ? '#fbbf24' : '#fef3c7';
        const stroke = active ? '#b45309' : '#fcd34d';
        const textColor = active ? '#451a03' : '#92400e';
        return (
          <g key={id} className="transition-all duration-500">
            {active && (
              <circle
                cx={p.x}
                cy={p.y}
                r={48}
                fill="none"
                stroke="#f59e0b"
                strokeWidth="2"
                opacity="0.55"
              >
                <animate attributeName="r" from="38" to="56" dur="1.4s" repeatCount="indefinite" />
                <animate attributeName="opacity" from="0.7" to="0" dur="1.4s" repeatCount="indefinite" />
              </circle>
            )}
            <circle
              cx={p.x}
              cy={p.y}
              r={38}
              fill={fill}
              stroke={stroke}
              strokeWidth="3"
            />
            <text
              x={p.x}
              y={p.y - 4}
              textAnchor="middle"
              fontSize="20"
              pointerEvents="none"
            >
              {p.icon}
            </text>
            <text
              x={p.x}
              y={p.y + 16}
              textAnchor="middle"
              fontSize="11"
              fontWeight="bold"
              fill={textColor}
              fontFamily="monospace"
              pointerEvents="none"
            >
              {p.label}
            </text>
          </g>
        );
      };

      // 화살표 (원호 형태) — observe → think → act → observe
      const arrowPath = (fromId, toId) => {
        const f = positions[fromId];
        const t = positions[toId];
        // 원의 중심 (cx,cy) 기준 부드러운 호
        return `M ${f.x} ${f.y} A ${r} ${r} 0 0 1 ${t.x} ${t.y}`;
      };

      return (
        <div className="rounded-lg bg-gradient-to-br from-amber-50 to-amber-100 border border-amber-200 p-3">
          <div className="text-[11px] font-bold text-amber-800 mb-1 flex items-center justify-between">
            <span className="flex items-center gap-1">
              <span>🔁</span>
              <span>Agent Loop — Observe → Think → Act</span>
            </span>
            {isLoop && (
              <span className="bg-amber-600 text-white px-2 py-0.5 rounded-full text-[9px] font-bold">
                LOOPING
              </span>
            )}
          </div>
          <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
            {/* 화살표 호 */}
            <defs>
              <marker id="amber-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
                <path d="M0,0 L10,5 L0,10 Z" fill="#f59e0b" />
              </marker>
              <marker id="amber-arrow-active" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
                <path d="M0,0 L11,5.5 L0,11 Z" fill="#b45309" />
              </marker>
            </defs>

            {[
              ['observe', 'think'],
              ['think',   'act'],
              ['act',     'observe'],
            ].map(([from, to], i) => {
              const active = isLoop;
              return (
                <path
                  key={i}
                  d={arrowPath(from, to)}
                  fill="none"
                  stroke={active ? '#b45309' : '#fcd34d'}
                  strokeWidth={active ? 2.5 : 1.8}
                  strokeDasharray={active ? '0' : '4 3'}
                  markerEnd={active ? 'url(#amber-arrow-active)' : 'url(#amber-arrow)'}
                  opacity={active ? 1 : 0.7}
                />
              );
            })}

            {/* 중앙 표시 */}
            <circle cx={cx} cy={cy} r={28} fill="#fffbeb" stroke="#fde68a" strokeWidth="1.5" strokeDasharray="2 2" />
            <text x={cx} y={cy - 2} textAnchor="middle" fontSize="10" fill="#92400e" fontFamily="monospace" fontWeight="bold">
              Agent
            </text>
            <text x={cx} y={cy + 12} textAnchor="middle" fontSize="9" fill="#b45309" fontFamily="monospace">
              core loop
            </text>

            {/* 3박스 */}
            {renderBox('observe')}
            {renderBox('think')}
            {renderBox('act')}
          </svg>
          <div className="text-[9px] text-amber-700 mt-1 text-center font-mono">
            활성 phase에 amber glow · 점선 → 실선 = 루프 활성화
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 단계별 메시지 박스 (Observe 입력 / Think 결정 / Act 실행)
    // ─────────────────────────────────────────────────────
    function MessageBoxes({ step }) {
      const items = [
        {
          id: 'observe',
          icon: '👁️',
          title: 'Observe (입력)',
          msg: step.observeMsg,
          render: (m) => (
            <div>
              <span className="inline-block bg-amber-200 text-amber-900 text-[9px] font-bold px-1.5 py-0.5 rounded mr-1 font-mono uppercase">
                {m.from}
              </span>
              <span className="text-slate-700 text-xs">{m.body}</span>
            </div>
          ),
        },
        {
          id: 'think',
          icon: '🧠',
          title: 'Think (LLM 결정)',
          msg: step.thinkMsg,
          render: (m) => (
            <div>
              <span className={`inline-block text-[9px] font-bold px-1.5 py-0.5 rounded mr-1 font-mono uppercase ${
                m.decision === 'final' ? 'bg-emerald-200 text-emerald-900' : 'bg-amber-200 text-amber-900'
              }`}>
                {m.decision}
              </span>
              <span className="text-slate-700 text-xs">{m.body}</span>
            </div>
          ),
        },
        {
          id: 'act',
          icon: '⚡',
          title: 'Act (실행)',
          msg: step.actMsg,
          render: (m) => (
            <div>
              <span className={`inline-block text-[9px] font-bold px-1.5 py-0.5 rounded mr-1 font-mono uppercase ${
                m.kind === 'final' ? 'bg-emerald-200 text-emerald-900' : 'bg-amber-200 text-amber-900'
              }`}>
                {m.kind}
              </span>
              <span className="text-slate-700 text-xs">{m.body}</span>
            </div>
          ),
        },
      ];

      return (
        <div className="space-y-1.5 mt-2">
          {items.map((it) => {
            const active = step.activePhase === it.id || step.activePhase === 'loop';
            const filled = !!it.msg;
            const base = filled
              ? (active
                  ? 'bg-amber-50 border-amber-400 shadow-sm'
                  : 'bg-white border-slate-200')
              : 'bg-slate-50 border-slate-200 opacity-50';
            return (
              <div key={it.id} className={`rounded-lg border-2 p-2 transition-all duration-300 ${base}`}>
                <div className="flex items-center gap-1.5 mb-1">
                  <span className="text-sm">{it.icon}</span>
                  <span className="text-[10px] uppercase tracking-wider font-bold text-slate-600">{it.title}</span>
                  {active && filled && (
                    <span className="ml-auto bg-amber-500 text-white text-[8px] px-1.5 py-0.5 rounded-full font-bold animate-pulse">ACTIVE</span>
                  )}
                </div>
                {filled ? it.render(it.msg) : (
                  <div className="text-[10px] text-slate-400 italic font-mono">— 아직 채워지지 않음 —</div>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 시나리오 trace 표 (Step 5에서만)
    // ─────────────────────────────────────────────────────
    function ScenarioTrace({ trace }) {
      return (
        <div className="rounded-lg bg-white border-2 border-amber-300 overflow-hidden mt-2">
          <div className="bg-amber-100 px-3 py-1.5 border-b border-amber-200 flex items-center justify-between">
            <div className="text-xs font-bold text-amber-900">📋 5 cycle trace — "강릉 여행 계획"</div>
            <div className="text-[10px] text-amber-700 font-mono">{trace.length} cycles</div>
          </div>
          <table className="w-full text-[11px]">
            <thead>
              <tr className="bg-amber-50 text-left">
                <th className="px-2 py-1 font-bold text-amber-700 w-12">cycle</th>
                <th className="px-2 py-1 font-bold text-amber-700">action</th>
                <th className="px-2 py-1 font-bold text-amber-700">result</th>
              </tr>
            </thead>
            <tbody>
              {trace.map((row, i) => {
                const kindStyle = {
                  tool:  'bg-amber-200 text-amber-900',
                  think: 'bg-sky-200 text-sky-900',
                  final: 'bg-emerald-200 text-emerald-900',
                }[row.kind] || 'bg-slate-200 text-slate-700';
                return (
                  <tr key={i} className={i % 2 === 0 ? 'bg-white' : 'bg-amber-50/40'}>
                    <td className="px-2 py-1 font-bold font-mono text-slate-700 border-r border-slate-100">
                      <span className="inline-flex items-center justify-center w-5 h-5 rounded-full bg-amber-500 text-white text-[10px]">{row.cycle}</span>
                    </td>
                    <td className="px-2 py-1 font-mono text-slate-700">
                      <span className={`inline-block text-[8px] font-bold px-1 py-0.5 rounded mr-1 uppercase ${kindStyle}`}>{row.kind}</span>
                      {row.action}
                    </td>
                    <td className="px-2 py-1 text-slate-600">{row.result}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-2">
            <h2 className="text-sm font-bold text-slate-700">🎯 음식점 매니저 — Observe / Think / Act</h2>
            <div className="flex items-center gap-2">
              <span className="text-[10px] text-slate-500 font-mono">
                cycle <span className="font-bold text-amber-700">{step.cycle}</span>
                {step.totalCycles > 1 && <span className="text-slate-400"> / {step.totalCycles}</span>}
              </span>
              <span className="text-[10px] text-slate-400 font-mono">live</span>
            </div>
          </div>

          <LoopDiagram activePhase={step.activePhase} />
          <MessageBoxes step={step} />

          {step.scenarioStage && <ScenarioTrace trace={step.scenarioStage} />}

          {step.isFinal && (
            <div className="mt-2 rounded-lg border-2 border-emerald-400 bg-emerald-50 p-2 flex items-start gap-2">
              <span className="text-base leading-none">✅</span>
              <div className="text-[11px] text-emerald-800">
                <span className="font-bold">루프 종료</span> — Think가 <code className="bg-emerald-200 px-1 rounded font-mono">final</code> 판단 → 사용자에게 응답.
              </div>
            </div>
          )}

          <div className="flex flex-wrap gap-2 text-[10px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: '#fef3c7', border: '1.5px solid #fcd34d' }}></span>
              비활성
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: '#fbbf24', border: '1.5px solid #b45309' }}></span>
              활성 (amber glow)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-0.5" style={{ background: '#b45309' }}></span>
              실선 = 루프 활성
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측: VSCode 스타일 CodeViewer + 5개 파일 탭
    // ─────────────────────────────────────────────────────
    const FILE_TABS = [
      { idx: 0, name: 'observe.py' },
      { idx: 1, name: 'think.py' },
      { idx: 2, name: 'act.py' },
      { idx: 3, name: 'agent-loop.py' },
      { idx: 4, name: 'scenario.py' },
    ];

    function CodeViewer({ code, stepIdx, total, onTabClick }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] flex items-center border-b border-slate-700">
            <div className="flex gap-1.5 px-4 py-2">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <div className="flex flex-1 overflow-x-auto">
              {FILE_TABS.map((t) => {
                const active = t.name === code.filename;
                return (
                  <button
                    key={t.name}
                    onClick={() => onTabClick(t.idx)}
                    className={`px-3 py-2 text-[11px] font-mono border-r border-slate-700 transition whitespace-nowrap ${
                      active
                        ? 'bg-[#282c34] text-amber-300 border-t-2 border-t-amber-500'
                        : 'bg-[#21252b] text-slate-500 hover:text-slate-300 hover:bg-[#2a2e36]'
                    }`}
                  >
                    {t.name}
                  </button>
                );
              })}
            </div>
            <span className="ml-auto px-4 py-2 text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      const handleTabClick = (idx) => {
        setStepIdx(idx);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. AI Agent란 무엇인가 &gt; Chapter 1. 에이전트의 탄생</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Agent의 3요소: 관찰 - 사고 - 행동</h1>
                  <p className="text-sm text-slate-500 mt-0.5">음식점 매니저 — Observe → Think → Act 가 종료 조건까지 반복되는 Agent의 심장</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} onTabClick={handleTabClick} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                💡 다음(I-1-3)에서는 <strong>왜 Agent가 필요한가</strong> — 챗봇으로는 풀 수 없는 자율적 다단계 작업의 사례를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[110px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; I-1-1. 챗봇 vs AI Agent</a>
              <a href="./I-1-3.html" className="text-amber-700 hover:text-amber-900 font-medium">I-1-3. 왜 Agent가 필요한가 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
