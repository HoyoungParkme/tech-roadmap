            '"""Agent Memory — 단기(세션) + 장기(벡터) 이중 저장소.',

            '"""',
            'import redis.asyncio as redis',
            'import json',
            'from openai import AsyncOpenAI',
            '',
            '',
            'class MemoryStore:',
            '    """Short-term(Redis) + Long-term(벡터 DB) 통합."""',
            '',
            '    def __init__(self):',
            '        self.short = redis.from_url("redis://localhost")',
            '        self.embedder = AsyncOpenAI()',
            '        # 실제론 Pinecone/Qdrant/pgvector — 여기선 인메모리',

            '    # ── Short-term: 세션 대화 ──────────────────',

            '        """현재 세션의 최근 N 턴 로드."""',
            '        raw = await self.short.lrange(f"chat:{session_id}", -20, -1)',

            '        """새 메시지를 세션 히스토리에 push."""',
            '        await self.short.rpush(',
            '            f"chat:{session_id}", json.dumps(msg))',
            '',
            '    # ── Long-term: 벡터 검색 ────────────────────',
            '    async def remember(self, text: str) -> None:',
            '        """중요 정보를 임베딩으로 영구 저장."""',
            '        vec = await self._embed(text)',
            '        self.long.append((vec, text))',
            '',
            '    async def recall(self, query: str, k: int = 3) -> list[str]:',
            '        """과거 정보 중 질문과 유사한 top-k 회수."""',
            '        qv = await self._embed(query)',
            '        scored = [(self._cos(qv, v), t) for v, t in self.long]',
            '        scored.sort(reverse=True)',
            '        return [t for _, t in scored[:k]]',
            '',
            '    async def _embed(self, text: str) -> list[float]:',

            '            model="text-embedding-3-small", input=text)',

            '        # 코사인 유사도 (실전은 numpy/벡터DB 가 처리)',
            '        dot = sum(x * y for x, y in zip(a, b))',

            'from app.services.tools import ToolRegistry',
            '',
            '',

            '',
            '    def __init__(self, tools: ToolRegistry):',
            '        self.tools = tools',
            '',
            '    async def finalize(',
            '        self,',
            '        answer: str,',
            '        actions: list[dict] | None = None,',

            '',
            '        Args:',

            '',

                <path d="M0,0 L8,4 L0,8 Z" fill="#fcd34d" />
              </marker>
              <marker id="arrow-hot" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
                <path d="M0,0 L10,5 L0,10 Z" fill="#d97706" />
              </marker>
            </defs>
            <rect width={w} height={h} fill="url(#grid-arch)" />

            {/* 흐름선 (먼저 그려야 노드 아래로 깔림) */}
            {FLOWS.map((f) => {
              const a = compMap[f.from];
              const b = compMap[f.to];
              const hot = flowSet.has(f.id);
              const stroke = hot ? '#d97706' : '#fcd34d';
              const strokeW = hot ? 2.6 : 1.4;
              const opacity = hot ? 1 : 0.45;
              const marker = hot ? 'url(#arrow-hot)' : 'url(#arrow-dim)';

              // 곡선 (return path) vs 직선
              if (f.curved) {
                // 약간 위/아래로 휘게
                const midX = (a.x + b.x) / 2;
                const midY = (a.y + b.y) / 2 - 22;
                const path = `M ${a.x} ${a.y} Q ${midX} ${midY} ${b.x} ${b.y}`;
                return (
                  <g key={f.id} className="transition-all duration-700">
                    <path
                      d={path}
                      fill="none"
                      stroke={stroke}
                      strokeWidth={strokeW}
                      strokeDasharray={hot ? '0' : '4 3'}
                      opacity={opacity}
                      markerEnd={marker}
                    />
                    {hot && (
                      <text
                        x={midX}
                        y={midY - 4}
                        textAnchor="middle"
                        fontSize="10"
                        fontWeight="bold"
                        fill="#92400e"
                        fontFamily="monospace"
                      >
                        {f.label}
                      </text>
                    )}
                  </g>
                );
              }

              const midX = (a.x + b.x) / 2;
              const midY = (a.y + b.y) / 2;
              return (
                <g key={f.id} className="transition-all duration-700">
                  <line
                    x1={a.x}
                    y1={a.y}
                    x2={b.x}
                    y2={b.y}
                    stroke={stroke}
                    strokeWidth={strokeW}
                    strokeDasharray={hot ? '0' : '4 3'}
                    opacity={opacity}
                    markerEnd={marker}
                  />
                  {hot && (
                    <text
                      x={midX}
                      y={midY - 6}
                      textAnchor="middle"
                      fontSize="10"
                      fontWeight="bold"
                      fill="#92400e"
                      fontFamily="monospace"
                    >
                      {f.label}
                    </text>
                  )}
                </g>
              );
            })}

            {/* 5 컴포넌트 노드 */}
            {COMPONENTS.map((c) => {
              const isActive = activeSet.has(c.id);
              const fill = isActive ? '#fbbf24' : '#fef3c7';
              const stroke = isActive ? '#b45309' : '#fcd34d';
              const textColor = isActive ? '#451a03' : '#92400e';
              const r = isActive ? 38 : 32;
              const opacity = isActive ? 1 : 0.55;

              return (
                <g key={c.id} className="transition-all duration-700" opacity={opacity}>
                  {isActive && (
                    <circle
                      cx={c.x}
                      cy={c.y}
                      r={r + 8}
                      fill="none"
                      stroke="#d97706"
                      strokeWidth="2"
                      opacity="0.5"
                    >
                      <animate attributeName="r" from={r + 4} to={r + 16} dur="1.6s" repeatCount="indefinite" />
                      <animate attributeName="opacity" from="0.6" to="0" dur="1.6s" repeatCount="indefinite" />
                    </circle>
                  )}
                  <circle
                    cx={c.x}
                    cy={c.y}
                    r={r}
                    fill={fill}
                    stroke={stroke}
                    strokeWidth="2.5"
                  />
                  <text
                    x={c.x}
                    y={c.y - 6}
                    textAnchor="middle"
                    fontSize="20"
                    pointerEvents="none"
                  >
                    {c.icon}
                  </text>
                  <text
                    x={c.x}
                    y={c.y + 14}
                    textAnchor="middle"
                    fontSize="10"
                    fontWeight="bold"
                    fill={textColor}
                    fontFamily="monospace"
                    pointerEvents="none"
                  >
                    {c.label}
                  </text>
                  <text
                    x={c.x}
                    y={c.y + r + 14}
                    textAnchor="middle"
                    fontSize="9"
                    fill={textColor}
                    fontFamily="monospace"
                    opacity="0.85"
                    pointerEvents="none"
                  >
                    {c.sub}
                  </text>
                </g>
              );
            })}
          </svg>
          <div className="text-[9px] text-amber-700 mt-2 text-center font-mono">
            진한 화살표 = 이번 단계 데이터 흐름 · 활성 노드 = amber 강조
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 하단: 단계별 실행 로그 (요청/도구/결과)
    // ─────────────────────────────────────────────────────
    function RunLog({ log }) {
      const tagStyle = {
        IN:   'bg-blue-100 text-blue-800 border-blue-300',
        API:  'bg-slate-100 text-slate-700 border-slate-300',
        CORE: 'bg-amber-100 text-amber-800 border-amber-300',
        LLM:  'bg-violet-100 text-violet-800 border-violet-300',
        TOOL: 'bg-emerald-100 text-emerald-800 border-emerald-300',
        RES:  'bg-emerald-50 text-emerald-700 border-emerald-200',
        MEM:  'bg-sky-100 text-sky-800 border-sky-300',
        VEC:  'bg-sky-50 text-sky-700 border-sky-200',
        OUT:  'bg-orange-100 text-orange-800 border-orange-300',
        SIDE: 'bg-pink-100 text-pink-800 border-pink-300',
      };

      return (
        <div className="rounded-lg bg-slate-900 border border-slate-700 p-3 font-mono text-xs">
          <div className="text-[10px] font-bold text-slate-400 mb-2 flex items-center gap-1 uppercase tracking-wider">
            <span>⚡</span>
            <span>실행 로그</span>
          </div>
          <div className="space-y-1.5">
            {log.map((entry, i) => (
              <div key={i} className="flex items-start gap-2">
                <span className={`px-1.5 py-0.5 rounded border text-[9px] font-bold ${tagStyle[entry.tag] || tagStyle.API}`}>
                  {entry.tag}
                </span>
                <span className="text-slate-200 flex-1 leading-relaxed">{entry.text}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체 (다이어그램 + 로그)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm space-y-3">
          <div className="flex items-center justify-between">
            <h2 className="text-sm font-bold text-slate-700">🏢 회사 비유 — 사장 + 도구함 + 수첩</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <ArchDiagram
            activeComponents={step.activeComponents}
            activeFlows={step.activeFlows}
          />

          <RunLog log={step.log} />

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: '#fbbf24' }}></span>
              활성 컴포넌트
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: '#fef3c7', border: '1px solid #fcd34d' }}></span>
              비활성
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-0.5" style={{ background: '#d97706' }}></span>
              현재 흐름
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="text-amber-700 font-bold">FastAPI 패턴</span>
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — 파일명 탭(5개) + highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total, onTabClick }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      // 파일명 탭 — 5개 step 의 파일명을 모두 표시, 현재 step 강조
      const allTabs = STEPS.map((s, i) => ({ filename: s.code.filename, idx: i }));

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot */}
          <div className="bg-[#21252b] px-3 py-1.5 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="ml-2 text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 파일명 탭 (5개) */}
          <div className="bg-[#21252b] flex items-center border-b border-slate-700 overflow-x-auto">
            {allTabs.map((t) => {
              const isActive = t.idx === stepIdx;
              return (
                <button
                  key={t.filename}
                  onClick={() => onTabClick && onTabClick(t.idx)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                    isActive
                      ? 'bg-[#282c34] text-amber-400 border-t-2 border-t-amber-400'
                      : 'text-slate-500 hover:text-slate-300 hover:bg-[#2c313a]'
                  }`}
                >
                  {t.filename}
                </button>
              );
            })}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[36rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-3 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. AI Agent란 무엇인가 &gt; Chapter 2. Agent의 구성요소</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Agent 아키텍처 전체 지도</h1>
                  <p className="text-sm text-slate-500 mt-0.5">User → Agent Core → Tools / Memory → Output 5 단계 흐름</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                code={step.code}
                stepIdx={stepIdx}
                total={STEPS.length}
                onTabClick={(i) => { setStepIdx(i); setIsPlaying(false); }}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                💡 다음(I-2-2)에서는 <strong>자율성 스펙트럼</strong> — Agent 가 얼마나 스스로 판단/행동하는지의 단계를 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[110px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-1-3.html" className="text-slate-500 hover:text-slate-700">&larr; I-1-3 왜 Agent 가 필요한가</a>
              <a href="./I-2-2.html" className="text-amber-700 hover:text-amber-900 font-medium">I-2-2 자율성 스펙트럼 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
