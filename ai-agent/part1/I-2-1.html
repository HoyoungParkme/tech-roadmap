<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent 학습 — I-2-1. Agent 아키텍처 전체 지도</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    I-2-1. Agent 아키텍처 전체 지도
    학습 목표: LLM + Memory + Tools + Planning이 어떻게 조합되는지 전체 그림을 그릴 수 있다.
    템플릿: 개념형 (Type A) — 중앙 LLM + 4개 모듈 아키텍처 다이어그램.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const MODULES = [
      { id: 'llm',      icon: '🧠', label: 'LLM (뇌)',       color: 'violet', desc: '모든 판단의 중심. 언어를 이해하고, 추론하고, 응답을 생성한다.', analogy: '회사의 사장' },
      { id: 'memory',   icon: '📝', label: 'Memory (기억)',   color: 'sky',    desc: '이전 대화와 중요 정보를 기록. 단기/장기 기억으로 나뉜다.', analogy: '사장의 수첩' },
      { id: 'tools',    icon: '🔧', label: 'Tools (도구)',    color: 'amber',  desc: '검색, API 호출, 코드 실행 등. LLM이 직접 못 하는 일을 대신한다.', analogy: '사장의 도구함' },
      { id: 'planning', icon: '📋', label: 'Planning (계획)', color: 'emerald',desc: '복잡한 작업을 단계별로 분해하고 순서를 정한다.', analogy: '사장의 일정표' },
    ];

    const colorMap = {
      violet:  { bg: 'bg-violet-100', border: 'border-violet-400', text: 'text-violet-700', ring: 'ring-violet-300', badge: 'bg-violet-600' },
      sky:     { bg: 'bg-sky-100', border: 'border-sky-400', text: 'text-sky-700', ring: 'ring-sky-300', badge: 'bg-sky-600' },
      amber:   { bg: 'bg-amber-100', border: 'border-amber-400', text: 'text-amber-700', ring: 'ring-amber-300', badge: 'bg-amber-600' },
      emerald: { bg: 'bg-emerald-100', border: 'border-emerald-400', text: 'text-emerald-700', ring: 'ring-emerald-300', badge: 'bg-emerald-600' },
    };

    const STEPS = [
      {
        desc: "[전체 구조] Agent는 4가지 핵심 모듈로 구성됩니다. 회사에 비유하면: 사장(LLM) + 수첩(Memory) + 도구함(Tools) + 일정표(Planning)입니다.",
        activeModule: null,
      },
      {
        desc: "[LLM — 뇌] 모든 판단의 중심입니다. 사용자의 말을 이해하고, 상황을 분석하고, 다음에 뭘 할지 결정합니다. GPT-4, Claude 같은 대형 언어 모델이 여기에 해당합니다.",
        activeModule: 'llm',
      },
      {
        desc: "[Memory — 기억] 대화 내용과 중요 정보를 기록합니다. \"아까 사용자가 부산 출장이라고 했지\" — 이런 맥락을 유지하는 역할입니다. 대화가 끝나도 기억하는 장기 기억도 가능합니다.",
        activeModule: 'memory',
      },
      {
        desc: "[Tools — 도구] LLM이 직접 못 하는 일을 도구가 대신합니다. 검색엔진, 날씨 API, 코드 실행기, 이메일 발송 등. Agent의 \"손과 발\" 역할입니다.",
        activeModule: 'tools',
      },
      {
        desc: "[Planning — 계획] 복잡한 작업을 작은 단계로 분해합니다. \"출장 준비\"를 → 1. 날씨 확인 → 2. 교통편 예약 → 3. 숙소 예약 → 4. 일정 추가 로 나누는 것입니다.",
        activeModule: 'planning',
      },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };
      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const llm = MODULES[0];
      const surrounding = MODULES.slice(1);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">

            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-violet-700 hover:text-violet-900 font-medium">
                <span aria-hidden="true">&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. AI Agent란 무엇인가 &gt; Chapter 2. Agent의 구성요소</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-2-1. Agent 아키텍처 전체 지도</h1>
                </div>
              </div>
              <p className="text-slate-600">
                Agent는 <b>사장(LLM)</b> + <b>수첩(Memory)</b> + <b>도구함(Tools)</b> + <b>일정표(Planning)</b>로 구성됩니다.
              </p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-violet-700 border-violet-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">Agent 아키텍처</h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 아키텍처 다이어그램: 중앙 LLM + 주변 3개 */}
            <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
              {/* 중앙 LLM */}
              <div className="flex justify-center mb-6">
                {(() => {
                  const c = colorMap[llm.color];
                  const isActive = stepData.activeModule === llm.id || stepData.activeModule === null;
                  return (
                    <div className={`flex flex-col items-center transition-all duration-500 ${isActive ? 'scale-110' : 'opacity-40'}`}>
                      <div className={`w-24 h-24 rounded-full border-3 flex items-center justify-center text-4xl ${c.bg} ${c.border} ${stepData.activeModule === llm.id ? `ring-4 ${c.ring} shadow-lg` : ''}`}
                        style={{borderWidth: '3px'}}>
                        {llm.icon}
                      </div>
                      <div className={`mt-2 font-bold ${c.text}`}>{llm.label}</div>
                      <div className="text-xs text-slate-500">{llm.analogy}</div>
                    </div>
                  );
                })()}
              </div>

              {/* 연결선 표시 */}
              <div className="flex justify-center mb-2">
                <div className="flex gap-16 text-slate-300 text-2xl">
                  <span>↙</span><span>↓</span><span>↘</span>
                </div>
              </div>

              {/* 주변 3개 모듈 */}
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                {surrounding.map(mod => {
                  const c = colorMap[mod.color];
                  const isActive = stepData.activeModule === mod.id || stepData.activeModule === null;
                  return (
                    <div key={mod.id} className={`flex flex-col items-center p-4 rounded-xl border-2 transition-all duration-500 ${isActive ? `${c.bg} ${c.border} scale-105` : 'border-slate-100 bg-slate-50 opacity-40'} ${stepData.activeModule === mod.id ? `ring-2 ${c.ring} shadow-md` : ''}`}>
                      <div className="text-3xl mb-2">{mod.icon}</div>
                      <div className={`font-bold text-sm ${c.text}`}>{mod.label}</div>
                      <div className="text-xs text-slate-500 mb-2">{mod.analogy}</div>
                      <p className="text-xs text-slate-600 text-center">{mod.desc}</p>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['LLM', 'Memory', 'Tools', 'Planning', '아키텍처'].map(kw => (
                <span key={kw} className="bg-violet-50 text-violet-700 px-3 py-1 rounded-full text-sm font-medium border border-violet-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-violet-600 hover:bg-violet-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                  )}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length}
              </div>
            </div>

            <div className="text-sm text-slate-500 flex justify-between">
              <a href="./I-1-3.html" className="text-violet-600 hover:text-violet-800 font-medium">← I-1-3. 왜 Agent가 필요한가</a>
              <a href="./I-2-2.html" className="text-violet-600 hover:text-violet-800 font-medium">I-2-2. 자율성 스펙트럼 →</a>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
