            '- 영업 자동화 : Salesforce Agentforce',
            '- 코드 작업 : GitHub Copilot Workspace, Claude Code',
            '- 운영 (DevOps) : Sourcegraph Cody, Cursor Agent',
            '',
            '## 핵심 통찰',
            '- LLM 단독 = "조언자" → 사용자가 직접 실행',
            '- Agent = "실무자" → 직접 행동하고 결과 반환',
            '- 비즈니스 가치는 "행동의 자동화"에서 나온다',
            '- 그래서 2025~2026 모든 SaaS가 Agent 기능 필수 탑재',
          ],
          highlight: [5, 6, 7, 8, 9, 11, 12, 13, 14, 15, 19, 20, 21, 22, 23, 24, 25, 33, 34, 35, 36],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 한계 카드 — status: idle / active / fixed
    // ─────────────────────────────────────────────────────
    function LimitCard({ limit }) {
      const styles = {
        idle:   'border-slate-200 bg-white text-slate-700',
        active: 'border-red-400 bg-red-50 text-red-800 scale-[1.02] shadow-md',
        fixed:  'border-emerald-400 bg-emerald-50 text-emerald-800',
      };
      const badgeText = {
        idle:   '대기',
        active: '⚠ 발현',
        fixed:  '✓ 해소',
      };
      const badgeStyle = {
        idle:   'bg-slate-100 text-slate-500',
        active: 'bg-red-200 text-red-800',
        fixed:  'bg-emerald-200 text-emerald-800',
      };

      return (
        <div className={`rounded-lg border-2 p-3 transition-all duration-500 ${styles[limit.status]}`}>
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="text-lg">{limit.icon}</span>
              <span className="font-bold text-sm">{limit.label}</span>
            </div>
            <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${badgeStyle[limit.status]}`}>
              {badgeText[limit.status]}
            </span>
          </div>
          <p className="text-[11px] mb-1.5 opacity-90">{limit.desc}</p>
          <div className={`text-[10px] rounded p-1.5 font-mono leading-tight ${
            limit.status === 'active' ? 'bg-red-100' :
            limit.status === 'fixed'  ? 'bg-emerald-100' : 'bg-slate-50'
          }`}>
            {limit.example}
          </div>
          {limit.status === 'fixed' && limit.fix && (
            <div className="mt-1.5 pt-1.5 border-t border-emerald-200 flex items-center gap-1">
              <span className="text-xs">🔧</span>
              <span className="text-[10px] font-mono font-bold text-emerald-700">{limit.fix}</span>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 비용 비교 막대 (Step 5)
    // ─────────────────────────────────────────────────────
    function CostBars() {
      // 1건당 비용 기준
      const human = 25000;  // 사람 (원)
      const agent = 200;    // Agent (원)
      const max = human;
      const humanPct = (human / max) * 100;
      const agentPct = (agent / max) * 100;

      return (
        <div className="rounded-lg bg-gradient-to-br from-amber-50 to-orange-100 border-2 border-amber-300 p-3">
          <div className="text-[11px] font-bold text-amber-900 mb-2 flex items-center gap-1">
            <span>💰</span>
            <span>1건 처리 비용 비교 (주가 조회 + 요약 + 이메일)</span>
          </div>

          {/* 사람 막대 */}
          <div className="mb-3">
            <div className="flex justify-between text-[10px] mb-0.5">
              <span className="font-bold text-slate-700">👤 사람 직접 처리 (30분)</span>
              <span className="font-mono font-bold text-red-700">25,000원</span>
            </div>
            <div className="h-6 bg-slate-100 rounded overflow-hidden">
              <div
                className="h-full bg-gradient-to-r from-red-400 to-red-600 transition-all duration-1000 flex items-center justify-end pr-2"
                style={{ width: `${humanPct}%` }}
              >
                <span className="text-[10px] text-white font-bold">100%</span>
              </div>
            </div>
          </div>

          {/* Agent 막대 */}
          <div className="mb-3">
            <div className="flex justify-between text-[10px] mb-0.5">
              <span className="font-bold text-slate-700">🤖 Agent 자동 처리 (30초)</span>
              <span className="font-mono font-bold text-emerald-700">200원</span>
            </div>
            <div className="h-6 bg-slate-100 rounded overflow-hidden">
              <div
                className="h-full bg-gradient-to-r from-emerald-400 to-emerald-600 transition-all duration-1000 flex items-center justify-end pr-2"
                style={{ width: `${Math.max(agentPct, 2)}%` }}
              >
                <span className="text-[10px] text-white font-bold">0.8%</span>
              </div>
            </div>
          </div>

          {/* 핵심 지표 */}
          <div className="grid grid-cols-3 gap-2 mt-3 pt-2 border-t border-amber-300">
            <div className="bg-white rounded p-1.5 text-center border border-amber-200">
              <div className="text-[9px] text-slate-500 font-bold uppercase">비용 절감</div>
              <div className="text-base font-bold text-emerald-700">99.2%</div>
            </div>
            <div className="bg-white rounded p-1.5 text-center border border-amber-200">
              <div className="text-[9px] text-slate-500 font-bold uppercase">속도 향상</div>
              <div className="text-base font-bold text-amber-700">60×</div>
            </div>
            <div className="bg-white rounded p-1.5 text-center border border-amber-200">
              <div className="text-[9px] text-slate-500 font-bold uppercase">가용성</div>
              <div className="text-base font-bold text-violet-700">24/7</div>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 (3 한계 카드 + 질문/답 + 비용 막대)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const ansStyle = {
        stale:         'bg-orange-50 border-orange-400 text-orange-800',
        hallucination: 'bg-red-50 border-red-400 text-red-800',
        refused:       'bg-amber-50 border-amber-400 text-amber-900',
        success:       'bg-emerald-50 border-emerald-400 text-emerald-800',
      };
      const ansIcon = {
        stale:         '📅',
        hallucination: '🌀',
        refused:       '🚫',
        success:       '✅',
      };
      const ansLabel = {
        stale:         'LLM 응답 (오래된 데이터)',
        hallucination: 'LLM 응답 (환각)',
        refused:       'LLM 응답 (실행 불가)',
        success:       'Agent 응답 (Tool 실행)',
      };

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🤖 LLM의 한계 vs Agent의 해결</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 3 한계 카드 그리드 */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-2 mb-3">
            {step.limits.map((l) => (
              <LimitCard key={l.id} limit={l} />
            ))}
          </div>

          {/* 비용 막대 (Step 5에서만) */}
          {step.showCost && <CostBars />}

          {/* 질문 + 답 박스 */}
          {step.query && (
            <div className="mt-3 space-y-2">
              <div className="rounded-lg bg-amber-600 text-white p-3 flex items-start gap-2 shadow-sm">
                <span className="text-lg leading-none">❓</span>
                <div className="flex-1">
                  <div className="text-[10px] uppercase tracking-wider text-amber-100 font-bold">사용자 요청</div>
                  <div className="text-sm font-bold mt-0.5">{step.query}</div>
                </div>
              </div>

              {step.answer && (
                <div className={`rounded-lg border-2 p-3 flex items-start gap-2 ${ansStyle[step.answerType]}`}>
                  <span className="text-lg leading-none">{ansIcon[step.answerType]}</span>
                  <div className="flex-1">
                    <div className="text-[10px] uppercase tracking-wider font-bold opacity-70">
                      {ansLabel[step.answerType]}
                    </div>
                    <div className="text-sm font-medium mt-0.5">{step.answer}</div>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-slate-300"></span>
              대기
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-red-500"></span>
              한계 발현
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
              Agent 해소
            </span>
            <span className="flex items-center gap-1 ml-auto font-mono">
              5 STEPS
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-1-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. AI Agent란 무엇인가 &gt; Chapter 1. 에이전트의 탄생</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">왜 Agent가 필요한가</h1>
                  <p className="text-sm text-slate-500 mt-0.5">정적 답변 한계(오래된 데이터/환각/행동 불가) → 동적 행동(Tool 호출)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                💡 다음(I-2-1)에서는 <strong>Agent 아키텍처 전체 지도</strong>를 통해 reasoning loop, tool 선택, memory가 어떻게 맞물리는지 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./I-1-2.html" className="text-slate-500 hover:text-slate-700">&larr; I-1-2 Agent의 3요소</a>
              <a href="./I-2-1.html" className="text-amber-700 hover:text-amber-900 font-medium">I-2-1 Agent 아키텍처 전체 지도 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
