<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent 학습 — I-1-3. 왜 Agent가 필요한가</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    I-1-3. 왜 Agent가 필요한가
    학습 목표: LLM 단독 사용의 한계와 에이전트가 해결하는 문제를 설명할 수 있다.
    템플릿: 개념형 (Type A) — 한계 → 해결책 매핑.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const LIMITS = [
      { id: 'hallucination', icon: '🌀', label: '환각', desc: '모르는 것도 자신감 있게 지어낸다', example: '\"서울-부산 해저터널은 2023년 개통\" (없는 사실)', solution: '도구로 검색해서 사실 확인 (Grounding)', solutionIcon: '🔍' },
      { id: 'cutoff',        icon: '📅', label: '지식 단절', desc: '학습 이후의 정보를 모른다', example: '\"오늘 날씨?\" → 학습 데이터에 없음', solution: '실시간 API 호출로 최신 정보 획득', solutionIcon: '🌐' },
      { id: 'no-action',     icon: '🚫', label: '행동 불가', desc: '대답만 하고 실행은 못 한다', example: '\"이메일 보내줘\" → 보내는 방법만 설명', solution: '도구를 사용해 직접 실행 (이메일 발송, 예약 등)', solutionIcon: '⚡' },
    ];

    const STEPS = [
      {
        desc: "[LLM만 있는 사람] 백과사전만 들고 있는 사람을 상상해보세요. 뭘 물어봐도 답은 하지만, 전화를 걸거나 검색하거나 메모하는 건 못 합니다.",
        activeLimit: null,
        showSolution: false,
        showAll: false,
      },
      {
        desc: "[한계 1: 환각] LLM은 모르는 것도 자신감 있게 답합니다. 존재하지 않는 사실을 마치 진짜처럼 말합니다 — 이것이 환각(Hallucination)입니다.",
        activeLimit: 'hallucination',
        showSolution: false,
        showAll: false,
      },
      {
        desc: "[한계 2: 지식 단절] LLM은 학습 시점 이후의 정보를 모릅니다. \"오늘 날씨\"나 \"최신 뉴스\"를 물으면 답할 수 없습니다.",
        activeLimit: 'cutoff',
        showSolution: false,
        showAll: false,
      },
      {
        desc: "[한계 3: 행동 불가] LLM은 말만 합니다. \"이메일 보내줘\"라고 하면 보내는 방법을 설명하지, 실제로 보내지는 않습니다.",
        activeLimit: 'no-action',
        showSolution: false,
        showAll: false,
      },
      {
        desc: "[Agent의 해결] Agent는 이 세 가지 한계를 모두 해결합니다. 도구로 검색해서 사실을 확인하고, API로 최신 정보를 가져오고, 직접 행동을 실행합니다.",
        activeLimit: null,
        showSolution: true,
        showAll: true,
      },
    ];

    function LimitCard({ limit, isActive, showSolution }) {
      return (
        <div className={`rounded-xl border-2 p-4 transition-all duration-500 ${isActive ? 'border-red-300 bg-red-50 scale-105 shadow-md' : 'border-slate-200 bg-white'}`}>
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl">{limit.icon}</span>
            <span className={`font-bold ${isActive ? 'text-red-700' : 'text-slate-800'}`}>{limit.label}</span>
          </div>
          <p className={`text-sm mb-2 ${isActive ? 'text-red-600' : 'text-slate-600'}`}>{limit.desc}</p>
          <div className={`text-xs bg-slate-100 rounded-lg p-2 mb-3 ${isActive ? 'bg-red-100 text-red-700' : 'text-slate-500'}`}>
            <b>예시:</b> {limit.example}
          </div>

          {showSolution && (
            <div className="border-t border-slate-200 pt-3 mt-2">
              <div className="flex items-center gap-2 mb-1">
                <span className="text-lg">{limit.solutionIcon}</span>
                <span className="text-xs font-bold text-emerald-700 uppercase">Agent 해결책</span>
              </div>
              <p className="text-sm text-emerald-700">{limit.solution}</p>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };
      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">

            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-violet-700 hover:text-violet-900 font-medium">
                <span aria-hidden="true">&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. AI Agent란 무엇인가 &gt; Chapter 1. 에이전트의 탄생</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-1-3. 왜 Agent가 필요한가</h1>
                </div>
              </div>
              <p className="text-slate-600">
                LLM만 있으면 <b>백과사전만 든 사람</b>입니다. Agent는 백과사전 + <b>전화기 + 인터넷 + 수첩</b>을 가진 사람입니다.
              </p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-violet-700 border-violet-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">LLM의 한계 → Agent의 해결</h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 3개 한계 카드 */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              {LIMITS.map(limit => (
                <LimitCard
                  key={limit.id}
                  limit={limit}
                  isActive={stepData.activeLimit === limit.id}
                  showSolution={stepData.showAll || (stepData.showSolution && stepData.activeLimit === limit.id)}
                />
              ))}
            </div>

            {/* 전체 요약 (마지막 단계) */}
            {stepData.showAll && (
              <div className="bg-violet-50 border border-violet-200 rounded-xl p-5">
                <div className="flex items-center gap-3 mb-3">
                  <div className="w-10 h-10 bg-violet-600 text-white rounded-full flex items-center justify-center text-xl">🤖</div>
                  <div>
                    <div className="font-bold text-violet-800">Agent = LLM + 도구 + 행동 능력</div>
                    <div className="text-sm text-violet-600">백과사전 + 전화기 + 인터넷 + 수첩</div>
                  </div>
                </div>
                <div className="grid grid-cols-3 gap-2 text-center text-xs">
                  <div className="bg-white rounded-lg p-2 border border-violet-100">
                    <div className="text-lg mb-1">🔍</div>
                    <div className="text-violet-700 font-medium">검색으로 사실 확인</div>
                  </div>
                  <div className="bg-white rounded-lg p-2 border border-violet-100">
                    <div className="text-lg mb-1">🌐</div>
                    <div className="text-violet-700 font-medium">API로 최신 정보</div>
                  </div>
                  <div className="bg-white rounded-lg p-2 border border-violet-100">
                    <div className="text-lg mb-1">⚡</div>
                    <div className="text-violet-700 font-medium">도구로 직접 실행</div>
                  </div>
                </div>
              </div>
            )}

            <div className="flex flex-wrap gap-2">
              {['지식 단절', '환각', '행동 불가', '도구 사용', 'Grounding'].map(kw => (
                <span key={kw} className="bg-violet-50 text-violet-700 px-3 py-1 rounded-full text-sm font-medium border border-violet-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-violet-600 hover:bg-violet-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                  )}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length}
              </div>
            </div>

            <div className="text-sm text-slate-500 flex justify-between">
              <a href="./I-1-2.html" className="text-violet-600 hover:text-violet-800 font-medium">← I-1-2. Agent의 3요소</a>
              <a href="./I-2-1.html" className="text-violet-600 hover:text-violet-800 font-medium">I-2-1. Agent 아키텍처 전체 지도 →</a>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
