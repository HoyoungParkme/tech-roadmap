<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent н•ҷмҠө вҖ” I-1-3. мҷң Agentк°Җ н•„мҡ”н•ңк°Җ</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>рҹ“ҡ</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    I-1-3. мҷң Agentк°Җ н•„мҡ”н•ңк°Җ
    н•ҷмҠө лӘ©н‘ң: LLM лӢЁлҸ… мӮ¬мҡ©мқҳ н•ңкі„мҷҖ м—җмқҙм „нҠёк°Җ н•ҙкІ°н•ҳлҠ” л¬ём ңлҘј м„ӨлӘ…н•  мҲҳ мһҲлӢӨ.
    н…ңн”ҢлҰҝ: к°ңл…җнҳ• (Type A) вҖ” н•ңкі„ вҶ’ н•ҙкІ°мұ… л§Өн•‘.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const LIMITS = [
      { id: 'hallucination', icon: 'рҹҢҖ', label: 'нҷҳк°Ғ', desc: 'лӘЁлҘҙлҠ” кІғлҸ„ мһҗмӢ к°җ мһҲкІҢ м§Җм–ҙлӮёлӢӨ', example: '\"м„ңмҡё-л¶ҖмӮ° н•ҙм Җн„°л„җмқҖ 2023л…„ к°ңнҶө\" (м—ҶлҠ” мӮ¬мӢӨ)', solution: 'лҸ„кө¬лЎң кІҖмғүн•ҙм„ң мӮ¬мӢӨ нҷ•мқё (Grounding)', solutionIcon: 'рҹ”Қ' },
      { id: 'cutoff',        icon: 'рҹ“…', label: 'м§ҖмӢқ лӢЁм Ҳ', desc: 'н•ҷмҠө мқҙнӣ„мқҳ м •ліҙлҘј лӘЁлҘёлӢӨ', example: '\"мҳӨлҠҳ лӮ м”Ё?\" вҶ’ н•ҷмҠө лҚ°мқҙн„°м—җ м—ҶмқҢ', solution: 'мӢӨмӢңк°„ API нҳём¶ңлЎң мөңмӢ  м •ліҙ нҡҚл“қ', solutionIcon: 'рҹҢҗ' },
      { id: 'no-action',     icon: 'рҹҡ«', label: 'н–үлҸҷ л¶Ҳк°Җ', desc: 'лҢҖлӢөл§Ң н•ҳкі  мӢӨн–үмқҖ лӘ» н•ңлӢӨ', example: '\"мқҙл©”мқј ліҙлӮҙмӨҳ\" вҶ’ ліҙлӮҙлҠ” л°©лІ•л§Ң м„ӨлӘ…', solution: 'лҸ„кө¬лҘј мӮ¬мҡ©н•ҙ м§Ғм ‘ мӢӨн–ү (мқҙл©”мқј л°ңмҶЎ, мҳҲм•Ҫ л“ұ)', solutionIcon: 'вҡЎ' },
    ];

    const STEPS = [
      {
        desc: "[LLMл§Ң мһҲлҠ” мӮ¬лһҢ] л°ұкіјмӮ¬м „л§Ң л“Өкі  мһҲлҠ” мӮ¬лһҢмқ„ мғҒмғҒн•ҙліҙм„ёмҡ”. лӯҳ л¬јм–ҙлҙҗлҸ„ лӢөмқҖ н•ҳм§Җл§Ң, м „нҷ”лҘј кұёкұ°лӮҳ кІҖмғүн•ҳкұ°лӮҳ л©”лӘЁн•ҳлҠ” кұҙ лӘ» н•©лӢҲлӢӨ.",
        activeLimit: null,
        showSolution: false,
        showAll: false,
      },
      {
        desc: "[н•ңкі„ 1: нҷҳк°Ғ] LLMмқҖ лӘЁлҘҙлҠ” кІғлҸ„ мһҗмӢ к°җ мһҲкІҢ лӢөн•©лӢҲлӢӨ. мЎҙмһ¬н•ҳм§Җ м•ҠлҠ” мӮ¬мӢӨмқ„ л§Ҳм№ҳ м§„м§ңмІҳлҹј л§җн•©лӢҲлӢӨ вҖ” мқҙкІғмқҙ нҷҳк°Ғ(Hallucination)мһ…лӢҲлӢӨ.",
        activeLimit: 'hallucination',
        showSolution: false,
        showAll: false,
      },
      {
        desc: "[н•ңкі„ 2: м§ҖмӢқ лӢЁм Ҳ] LLMмқҖ н•ҷмҠө мӢңм җ мқҙнӣ„мқҳ м •ліҙлҘј лӘЁлҰ…лӢҲлӢӨ. \"мҳӨлҠҳ лӮ м”Ё\"лӮҳ \"мөңмӢ  лүҙмҠӨ\"лҘј л¬јмңјл©ҙ лӢөн•  мҲҳ м—ҶмҠөлӢҲлӢӨ.",
        activeLimit: 'cutoff',
        showSolution: false,
        showAll: false,
      },
      {
        desc: "[н•ңкі„ 3: н–үлҸҷ л¶Ҳк°Җ] LLMмқҖ л§җл§Ң н•©лӢҲлӢӨ. \"мқҙл©”мқј ліҙлӮҙмӨҳ\"лқјкі  н•ҳл©ҙ ліҙлӮҙлҠ” л°©лІ•мқ„ м„ӨлӘ…н•ҳм§Җ, мӢӨм ңлЎң ліҙлӮҙм§ҖлҠ” м•ҠмҠөлӢҲлӢӨ.",
        activeLimit: 'no-action',
        showSolution: false,
        showAll: false,
      },
      {
        desc: "[Agentмқҳ н•ҙкІ°] AgentлҠ” мқҙ м„ё к°Җм§Җ н•ңкі„лҘј лӘЁл‘җ н•ҙкІ°н•©лӢҲлӢӨ. лҸ„кө¬лЎң кІҖмғүн•ҙм„ң мӮ¬мӢӨмқ„ нҷ•мқён•ҳкі , APIлЎң мөңмӢ  м •ліҙлҘј к°Җм ёмҳӨкі , м§Ғм ‘ н–үлҸҷмқ„ мӢӨн–үн•©лӢҲлӢӨ.",
        activeLimit: null,
        showSolution: true,
        showAll: true,
      },
    ];

    function LimitCard({ limit, isActive, showSolution }) {
      return (
        <div className={`rounded-xl border-2 p-4 transition-all duration-500 ${isActive ? 'border-red-300 bg-red-50 scale-105 shadow-md' : 'border-slate-200 bg-white'}`}>
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl">{limit.icon}</span>
            <span className={`font-bold ${isActive ? 'text-red-700' : 'text-slate-800'}`}>{limit.label}</span>
          </div>
          <p className={`text-sm mb-2 ${isActive ? 'text-red-600' : 'text-slate-600'}`}>{limit.desc}</p>
          <div className={`text-xs bg-slate-100 rounded-lg p-2 mb-3 ${isActive ? 'bg-red-100 text-red-700' : 'text-slate-500'}`}>
            <b>мҳҲмӢң:</b> {limit.example}
          </div>

          {showSolution && (
            <div className="border-t border-slate-200 pt-3 mt-2">
              <div className="flex items-center gap-2 mb-1">
                <span className="text-lg">{limit.solutionIcon}</span>
                <span className="text-xs font-bold text-emerald-700 uppercase">Agent н•ҙкІ°мұ…</span>
              </div>
              <p className="text-sm text-emerald-700">{limit.solution}</p>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };
      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">

            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-violet-700 hover:text-violet-900 font-medium">
                <span aria-hidden="true">&larr;</span> н—ҲлёҢлЎң лҸҢм•„к°Җкё°
              </a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. AI AgentлһҖ л¬ҙм—Үмқёк°Җ &gt; Chapter 1. м—җмқҙм „нҠёмқҳ нғ„мғқ</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-1-3. мҷң Agentк°Җ н•„мҡ”н•ңк°Җ</h1>
                </div>
              </div>
              <p className="text-slate-600">
                LLMл§Ң мһҲмңјл©ҙ <b>л°ұкіјмӮ¬м „л§Ң л“  мӮ¬лһҢ</b>мһ…лӢҲлӢӨ. AgentлҠ” л°ұкіјмӮ¬м „ + <b>м „нҷ”кё° + мқён„°л„· + мҲҳмІ©</b>мқ„ к°Җм§„ мӮ¬лһҢмһ…лӢҲлӢӨ.
              </p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-violet-700 border-violet-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">LLMмқҳ н•ңкі„ вҶ’ Agentмқҳ н•ҙкІ°</h3>
                <span className="text-xs text-violet-200">нӮӨліҙл“ң &larr;/&rarr;лЎң лӢЁкі„ мқҙлҸҷ</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 3к°ң н•ңкі„ м№ҙл“ң */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              {LIMITS.map(limit => (
                <LimitCard
                  key={limit.id}
                  limit={limit}
                  isActive={stepData.activeLimit === limit.id}
                  showSolution={stepData.showAll || (stepData.showSolution && stepData.activeLimit === limit.id)}
                />
              ))}
            </div>

            {/* м „мІҙ мҡ”м•Ҫ (л§Ҳм§Җл§ү лӢЁкі„) */}
            {stepData.showAll && (
              <div className="bg-violet-50 border border-violet-200 rounded-xl p-5">
                <div className="flex items-center gap-3 mb-3">
                  <div className="w-10 h-10 bg-violet-600 text-white rounded-full flex items-center justify-center text-xl">рҹӨ–</div>
                  <div>
                    <div className="font-bold text-violet-800">Agent = LLM + лҸ„кө¬ + н–үлҸҷ лҠҘл Ҙ</div>
                    <div className="text-sm text-violet-600">л°ұкіјмӮ¬м „ + м „нҷ”кё° + мқён„°л„· + мҲҳмІ©</div>
                  </div>
                </div>
                <div className="grid grid-cols-3 gap-2 text-center text-xs">
                  <div className="bg-white rounded-lg p-2 border border-violet-100">
                    <div className="text-lg mb-1">рҹ”Қ</div>
                    <div className="text-violet-700 font-medium">кІҖмғүмңјлЎң мӮ¬мӢӨ нҷ•мқё</div>
                  </div>
                  <div className="bg-white rounded-lg p-2 border border-violet-100">
                    <div className="text-lg mb-1">рҹҢҗ</div>
                    <div className="text-violet-700 font-medium">APIлЎң мөңмӢ  м •ліҙ</div>
                  </div>
                  <div className="bg-white rounded-lg p-2 border border-violet-100">
                    <div className="text-lg mb-1">вҡЎ</div>
                    <div className="text-violet-700 font-medium">лҸ„кө¬лЎң м§Ғм ‘ мӢӨн–ү</div>
                  </div>
                </div>
              </div>
            )}

            <div className="flex flex-wrap gap-2">
              {['м§ҖмӢқ лӢЁм Ҳ', 'нҷҳк°Ғ', 'н–үлҸҷ л¶Ҳк°Җ', 'лҸ„кө¬ мӮ¬мҡ©', 'Grounding'].map(kw => (
                <span key={kw} className="bg-violet-50 text-violet-700 px-3 py-1 rounded-full text-sm font-medium border border-violet-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="мқҙм „ лӢЁкі„" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button aria-label={isPlaying ? 'м •м§Җ' : 'мһҗлҸҷ мӢӨн–ү'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-violet-600 hover:bg-violet-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> м •м§Җ</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> мһҗлҸҷ мӢӨн–ү</>
                  )}
                </button>
                <button aria-label="лӢӨмқҢ лӢЁкі„" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length}
              </div>
            </div>

            <div className="text-sm text-slate-500 flex justify-between">
              <a href="./I-1-2.html" className="text-violet-600 hover:text-violet-800 font-medium">вҶҗ I-1-2. Agentмқҳ 3мҡ”мҶҢ</a>
              <a href="./I-2-1.html" className="text-violet-600 hover:text-violet-800 font-medium">I-2-1. Agent м•„нӮӨн…ҚмІҳ м „мІҙ м§ҖлҸ„ вҶ’</a>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
