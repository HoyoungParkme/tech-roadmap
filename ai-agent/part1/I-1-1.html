<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent 학습 — I-1-1. 챗봇 vs AI Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    I-1-1. 챗봇 vs AI Agent
    학습 목표: 단순 챗봇과 AI Agent의 차이를 설명할 수 있다.
    템플릿: 개념형 (Type A) — 좌우 비교 다이어그램.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        desc: "[사용자 질문] 사용자가 \"내일 부산 출장 준비해줘\"라고 요청합니다. 챗봇과 AI Agent가 이 요청을 어떻게 처리하는지 비교해봅시다.",
        chatbot: { state: 'receive', messages: [{ role: 'user', text: '내일 부산 출장 준비해줘' }] },
        agent: { state: 'receive', messages: [{ role: 'user', text: '내일 부산 출장 준비해줘' }], actions: [] },
      },
      {
        desc: "[챗봇의 한계] 챗봇은 정해진 대로만 답합니다. \"출장 준비 관련 정보를 알려드리겠습니다\" — 말만 할 뿐, 실제로 아무것도 해주지 않습니다.",
        chatbot: { state: 'reply', messages: [
          { role: 'user', text: '내일 부산 출장 준비해줘' },
          { role: 'bot', text: '출장 준비 체크리스트를 알려드릴게요:\n1. 교통편 예약\n2. 숙소 예약\n3. 일정 확인' },
        ] },
        agent: { state: 'thinking', messages: [{ role: 'user', text: '내일 부산 출장 준비해줘' }], actions: [{ icon: '🤔', text: '추론 중: 내일 날짜 확인, 교통편 검색, 숙소 예약 필요...' }] },
      },
      {
        desc: "[Agent가 행동한다] AI Agent는 직접 도구를 사용합니다. 날씨를 검색하고, 기차표를 조회하고, 캘린더에 일정을 추가합니다.",
        chatbot: { state: 'done', messages: [
          { role: 'user', text: '내일 부산 출장 준비해줘' },
          { role: 'bot', text: '출장 준비 체크리스트를 알려드릴게요:\n1. 교통편 예약\n2. 숙소 예약\n3. 일정 확인' },
          { role: 'system', text: '(대화 종료 — 실행 없음)' },
        ] },
        agent: { state: 'acting', messages: [{ role: 'user', text: '내일 부산 출장 준비해줘' }], actions: [
          { icon: '🔍', text: '날씨 API 호출 → 부산 내일 맑음, 24°C' },
          { icon: '🚄', text: 'KTX 조회 → 09:00 서울→부산, 좌석 예약 완료' },
          { icon: '📅', text: '캘린더에 출장 일정 추가 완료' },
        ] },
      },
      {
        desc: "[Agent가 결과를 종합한다] Agent는 수행한 모든 행동의 결과를 정리해서 보고합니다. 말만 하는 것이 아니라, 실제로 일을 처리했습니다.",
        chatbot: { state: 'done', messages: [
          { role: 'user', text: '내일 부산 출장 준비해줘' },
          { role: 'bot', text: '출장 준비 체크리스트를 알려드릴게요:\n1. 교통편 예약\n2. 숙소 예약\n3. 일정 확인' },
          { role: 'system', text: '(대화 종료 — 실행 없음)' },
        ] },
        agent: { state: 'done', messages: [
          { role: 'user', text: '내일 부산 출장 준비해줘' },
          { role: 'agent', text: '출장 준비 완료!\n• 부산 내일 맑음 24°C\n• KTX 09:00 예약됨 (좌석 3A)\n• 캘린더에 일정 추가됨\n• 우산은 안 챙겨도 돼요' },
        ], actions: [
          { icon: '✅', text: '날씨 확인 완료' },
          { icon: '✅', text: 'KTX 예약 완료' },
          { icon: '✅', text: '일정 추가 완료' },
        ] },
      },
      {
        desc: "[핵심 차이] 챗봇은 \"무전기\" — 정보를 전달만 합니다. AI Agent는 \"비서\" — 스스로 판단하고, 도구를 사용해서, 실제로 일을 처리합니다.",
        chatbot: { state: 'summary', messages: [] },
        agent: { state: 'summary', messages: [] },
      },
    ];

    function ChatMessage({ msg }) {
      const roleStyle = {
        user: 'bg-slate-100 text-slate-800 ml-auto',
        bot: 'bg-gray-200 text-gray-700',
        agent: 'bg-violet-100 text-violet-800',
        system: 'bg-red-50 text-red-500 text-xs italic',
      };
      return (
        <div className={`px-3 py-2 rounded-lg text-sm max-w-[85%] whitespace-pre-line ${roleStyle[msg.role] || 'bg-white'}`}>
          {msg.text}
        </div>
      );
    }

    function ActionItem({ action, active }) {
      return (
        <div className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm transition-all duration-300 ${active ? 'bg-violet-50 border border-violet-200 scale-105' : 'bg-slate-50 border border-slate-100'}`}>
          <span className="text-lg">{action.icon}</span>
          <span className="text-slate-700">{action.text}</span>
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };
      const handlePrevRef = useRef(handlePrev);
      handlePrevRef.current = handlePrev;

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); handlePrevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const isSummary = stepData.chatbot.state === 'summary';

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">

            {/* 허브 네비게이션 */}
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-violet-700 hover:text-violet-900 font-medium">
                <span aria-hidden="true">&larr;</span> 허브로 돌아가기
              </a>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-violet-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. AI Agent란 무엇인가 &gt; Chapter 1. 에이전트의 탄생</div>
                  <h1 className="text-2xl font-bold text-slate-800">I-1-1. 챗봇 vs AI Agent</h1>
                </div>
              </div>
              <p className="text-slate-600">
                챗봇은 <b>무전기</b>처럼 말만 전달합니다. AI Agent는 <b>비서</b>처럼 스스로 판단하고, 도구를 쓰고, 실제로 행동합니다.
              </p>
            </header>

            {/* 현재 단계 설명 */}
            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-violet-700 border-violet-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">챗봇 vs Agent 비교</h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 좌우 비교 다이어그램 */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

              {/* 챗봇 (왼쪽) */}
              <div className={`bg-white rounded-xl shadow-sm border-2 p-5 transition-all duration-300 ${isSummary ? 'border-red-200' : 'border-slate-200'}`}>
                <div className="flex items-center gap-2 mb-4">
                  <div className="w-8 h-8 bg-gray-500 text-white flex items-center justify-center rounded-lg text-lg">📟</div>
                  <div>
                    <div className="font-bold text-slate-800">챗봇</div>
                    <div className="text-xs text-slate-500">고정 응답, 실행 없음</div>
                  </div>
                </div>

                {isSummary ? (
                  <div className="space-y-3">
                    <div className="bg-red-50 border border-red-200 rounded-lg p-4 text-center">
                      <div className="text-4xl mb-2">📟</div>
                      <div className="font-bold text-red-700 text-lg">무전기</div>
                      <div className="text-sm text-red-600 mt-1">말만 전달한다</div>
                    </div>
                    <ul className="text-sm text-slate-600 space-y-1">
                      <li>❌ 도구 사용 불가</li>
                      <li>❌ 자율적 판단 불가</li>
                      <li>❌ 실제 행동 불가</li>
                    </ul>
                  </div>
                ) : (
                  <div className="space-y-2 min-h-[200px]">
                    {stepData.chatbot.messages.map((msg, i) => (
                      <ChatMessage key={i} msg={msg} />
                    ))}
                    {stepData.chatbot.state === 'done' && (
                      <div className="text-center text-xs text-slate-400 pt-2">— 대화 종료 —</div>
                    )}
                  </div>
                )}
              </div>

              {/* AI Agent (오른쪽) */}
              <div className={`bg-white rounded-xl shadow-sm border-2 p-5 transition-all duration-300 ${isSummary ? 'border-violet-300' : stepData.agent.state === 'acting' || stepData.agent.state === 'done' ? 'border-violet-200 ring-2 ring-violet-100' : 'border-slate-200'}`}>
                <div className="flex items-center gap-2 mb-4">
                  <div className="w-8 h-8 bg-violet-600 text-white flex items-center justify-center rounded-lg text-lg">🤖</div>
                  <div>
                    <div className="font-bold text-slate-800">AI Agent</div>
                    <div className="text-xs text-slate-500">판단 + 도구 사용 + 행동</div>
                  </div>
                </div>

                {isSummary ? (
                  <div className="space-y-3">
                    <div className="bg-violet-50 border border-violet-200 rounded-lg p-4 text-center">
                      <div className="text-4xl mb-2">🤖</div>
                      <div className="font-bold text-violet-700 text-lg">비서</div>
                      <div className="text-sm text-violet-600 mt-1">판단하고 직접 행동한다</div>
                    </div>
                    <ul className="text-sm text-slate-600 space-y-1">
                      <li>✅ 도구 사용 (검색, API, 예약)</li>
                      <li>✅ 자율적 판단 (상황에 맞게)</li>
                      <li>✅ 실제 행동 (예약, 일정 추가)</li>
                    </ul>
                  </div>
                ) : (
                  <div className="space-y-2 min-h-[200px]">
                    {stepData.agent.messages.map((msg, i) => (
                      <ChatMessage key={i} msg={msg} />
                    ))}
                    {stepData.agent.actions.length > 0 && (
                      <div className="mt-3 space-y-1.5 border-t border-slate-100 pt-3">
                        <div className="text-xs font-bold text-violet-600 uppercase tracking-wider">Agent 행동</div>
                        {stepData.agent.actions.map((action, i) => (
                          <ActionItem key={i} action={action} active={stepData.agent.state === 'acting'} />
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>

            {/* 핵심 키워드 */}
            <div className="flex flex-wrap gap-2">
              {['Chatbot', 'AI Agent', '자율성', '판단', '행동'].map(kw => (
                <span key={kw} className="bg-violet-50 text-violet-700 px-3 py-1 rounded-full text-sm font-medium border border-violet-200">{kw}</span>
              ))}
            </div>

            {/* 컨트롤 바 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-violet-600 hover:bg-violet-700">
                  {isPlaying ? (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 정지</>
                  ) : (
                    <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg> 자동 실행</>
                  )}
                </button>
                <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                Step: {currentStepIdx + 1} / {STEPS.length}
              </div>
            </div>

            {/* 다음 섹션 안내 */}
            <div className="text-sm text-slate-500 text-right">
              다음: <a href="./I-1-2.html" className="text-violet-600 hover:text-violet-800 font-medium">I-1-2. Agent의 3요소: 관찰-사고-행동 →</a>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
