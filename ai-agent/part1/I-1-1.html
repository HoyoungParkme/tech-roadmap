        }`}>

            <span className="text-base">📟</span>
            <div className="flex-1">
              <div className="text-[11px] font-bold text-slate-700">챗봇</div>
              <div className="text-[9px] text-slate-500 font-mono">LLM only</div>
            </div>
            {isLimit && (
              <span className="text-[9px] bg-red-600 text-white px-1.5 py-0.5 rounded font-bold">LIMIT</span>
            )}
          </div>

          {/* 내부 구조 — LLM 박스만 */}
          <div className="bg-white rounded border border-slate-200 p-2 mb-2 flex items-center justify-center gap-1.5">
            <div className="bg-gradient-to-br from-slate-200 to-slate-300 px-2 py-1 rounded text-[10px] font-mono font-bold text-slate-700">LLM</div>

            <span className="text-[9px] text-slate-500 font-mono">텍스트만</span>
          </div>

          {/* 메시지 흐름 */}
          <div className="space-y-1.5 min-h-[80px]">
            {chatbot.messages.length === 0 && (
              <div className="text-center text-[10px] text-slate-400 italic py-3">대기 중...</div>
            )}
            {chatbot.messages.map((m, i) => {
              const isUser = m.role === 'user';
              return (
                <div key={i} className={`flex ${isUser ? 'justify-end' : 'justify-start'}`}>
                  <div className={`max-w-[88%] px-2 py-1 rounded text-[10px] leading-tight ${
                    isUser
                      ? 'bg-slate-600 text-white'
                      : isLimit && i === chatbot.messages.length - 1
                        ? 'bg-red-100 text-red-800 border border-red-300'
                        : 'bg-white text-slate-700 border border-slate-200'
                  }`}>
                    {m.text}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 패널: AI Agent 박스 (LLM + Tool + Memory + Loop)
    // ─────────────────────────────────────────────────────
    function AgentBox({ agent }) {
      const active = agent.status !== 'idle';
      return (
        <div className={`rounded-lg border-2 p-2 transition-all duration-500 ${
          active
            ? 'bg-gradient-to-br from-amber-50 to-amber-100 border-amber-300 shadow-sm'
            : 'bg-amber-50/40 border-amber-200 opacity-50'
        }`}>
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">🤖</span>
            <div className="flex-1">
              <div className="text-[11px] font-bold text-amber-800">AI Agent</div>
              <div className="text-[9px] text-amber-700 font-mono">LLM + Tool + Memory + Loop</div>
            </div>
            {agent.status === 'loop' && (
              <span className="text-[9px] bg-amber-600 text-white px-1.5 py-0.5 rounded font-bold animate-pulse">REACT</span>
            )}
            {agent.status === 'tool_call' && (
              <span className="text-[9px] bg-amber-600 text-white px-1.5 py-0.5 rounded font-bold">TOOL</span>
            )}
          </div>

          {/* 내부 구조 — LLM + Tool + Memory + Loop */}
          <div className="bg-white rounded border border-amber-200 p-2 mb-2">
            <div className="grid grid-cols-4 gap-1 text-center">
              <div className="bg-amber-200 px-1 py-1 rounded text-[9px] font-mono font-bold text-amber-900">LLM</div>
              <div className={`px-1 py-1 rounded text-[9px] font-mono font-bold transition-all ${
                agent.tools ? 'bg-amber-500 text-white' : 'bg-slate-100 text-slate-400'
              }`}>Tool</div>
              <div className={`px-1 py-1 rounded text-[9px] font-mono font-bold transition-all ${
                agent.memory ? 'bg-amber-500 text-white' : 'bg-slate-100 text-slate-400'
              }`}>Memory</div>
              <div className={`px-1 py-1 rounded text-[9px] font-mono font-bold transition-all ${
                agent.loop ? 'bg-amber-500 text-white animate-pulse' : 'bg-slate-100 text-slate-400'
              }`}>Loop</div>
            </div>
          </div>

          {/* 메시지 흐름 */}
          <div className="space-y-1.5 min-h-[80px]">
            {agent.messages.length === 0 && (
              <div className="text-center text-[10px] text-amber-400 italic py-3">대기 중...</div>
            )}
            {agent.messages.map((m, i) => {
              const isUser = m.role === 'user';
              return (
                <div key={i} className={`flex ${isUser ? 'justify-end' : 'justify-start'}`}>
                  <div className={`max-w-[88%] px-2 py-1 rounded text-[10px] leading-tight whitespace-pre-line ${
                    isUser
                      ? 'bg-amber-700 text-white'
                      : 'bg-white text-amber-900 border border-amber-300 font-medium'
                  }`}>
                    {m.text}
                  </div>
                </div>
              );
            })}
          </div>

          {/* ReAct 루프 단계 (Step 4 전용) */}
          {agent.loopSteps && (
            <div className="mt-2 pt-2 border-t border-amber-200">
              <div className="text-[9px] font-bold text-amber-800 uppercase tracking-wider mb-1">ReAct 루프</div>
              <div className="space-y-0.5">
                {agent.loopSteps.map((s) => {
                  const labelColor = s.label === 'Reason'
                    ? 'bg-blue-500 text-white'
                    : s.label === 'Act'
                      ? 'bg-amber-600 text-white'
                      : 'bg-emerald-500 text-white';
                  return (
                    <div key={s.n} className="flex items-center gap-1 text-[9px] font-mono">
                      <span className="text-amber-600 font-bold w-4">#{s.n}</span>
                      <span className={`px-1.5 py-0.5 rounded font-bold w-12 text-center ${labelColor}`}>{s.label}</span>
                      <span className="text-slate-700 flex-1">{s.text}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Tool 외부 박스 — Agent → 외부 API 호출 시각화
    // ─────────────────────────────────────────────────────
    function ToolCallPane({ toolCall }) {
      if (!toolCall) {
        return (
          <div className="rounded-lg bg-slate-50 border border-dashed border-slate-300 p-2 text-center">
            <div className="text-[10px] text-slate-400 font-mono italic">(외부 도구 호출 없음 — 챗봇은 도구를 부를 수단이 없다)</div>
          </div>
        );
      }
      return (
        <div className="rounded-lg bg-white border-2 border-amber-400 p-2 shadow-sm">
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-1.5">
              <span className="text-sm">🔧</span>
              <span className="text-[11px] font-bold text-amber-800">외부 도구 호출</span>
            </div>
            <span className="text-[9px] bg-amber-600 text-white px-1.5 py-0.5 rounded font-mono font-bold">{toolCall.name}</span>
          </div>

          {/* 화살표 흐름: Agent → Tool → Response */}
          <div className="grid grid-cols-[1fr_auto_1fr] gap-2 items-center text-[9px] font-mono">
            {/* request */}
            <div className="bg-amber-50 border border-amber-200 rounded px-1.5 py-1">
              <div className="text-[8px] uppercase font-bold text-amber-700 mb-0.5">request</div>
              <div className="text-amber-900 whitespace-pre-line leading-tight">{toolCall.payload}</div>
            </div>
            {/* arrow */}
            <div className="flex flex-col items-center text-amber-600">
              <span className="text-base leading-none">→</span>
              <span className="text-base leading-none mt-1">←</span>
            </div>
            {/* response */}
            <div className="bg-emerald-50 border border-emerald-200 rounded px-1.5 py-1">
              <div className="text-[8px] uppercase font-bold text-emerald-700 mb-0.5">response</div>
              <div className="text-emerald-900 whitespace-pre-line leading-tight">{toolCall.response}</div>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 비교 표 (Step 5)
    // ─────────────────────────────────────────────────────
    function CompareTable() {
      const rows = [
        { k: '동작 방식',   bot: '정적 (1 사이클)',           agent: '동적 (Reason↔Act 루프)' },
        { k: '도구 사용',   bot: '✗ 외부 API 불가',           agent: '✓ tool_calls (weather, db 등)' },
        { k: '메모리',      bot: '짧은 컨텍스트',             agent: '누적 messages + 외부 메모리' },
        { k: '자율성',      bot: '입력 1번 = 답 1번',         agent: '목표만 주면 다단계 자율 실행' },
        { k: '결과 형태',   bot: '텍스트만',                  agent: '텍스트 + 실제 효과 (예약/등록)' },
        { k: '적합 용도',   bot: 'FAQ · 안내 · 상담',         agent: '예약 · 자동화 · 워크플로' },
        { k: '비유',        bot: '📟 무전기',                 agent: '🤵 비서' },
      ];

      return (
        <div className="rounded-lg bg-white border-2 border-amber-300 overflow-hidden">
          <div className="bg-amber-100 px-3 py-2 border-b border-amber-200">
            <div className="text-xs font-bold text-amber-900">📊 챗봇 vs AI Agent</div>
          </div>
          <table className="w-full text-[11px]">
            <thead>
              <tr className="bg-amber-50 text-left">
                <th className="px-3 py-2 font-bold text-amber-700 w-1/4">기준</th>
                <th className="px-3 py-2 font-bold text-slate-700">챗봇</th>
                <th className="px-3 py-2 font-bold text-amber-700">AI Agent</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r, i) => (
                <tr key={r.k} className={i % 2 === 0 ? 'bg-white' : 'bg-amber-50/40'}>
                  <td className="px-3 py-1.5 font-bold text-slate-700 border-r border-slate-100">{r.k}</td>
                  <td className="px-3 py-1.5 text-slate-700 font-mono">{r.bot}</td>
                  <td className="px-3 py-1.5 text-amber-800 font-mono font-semibold">{r.agent}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌(챗봇) + 우(Agent) + 하단(Tool 외부 박스)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📟🤖 무전기 vs 비서 — 메시지 흐름</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {step.showCompare ? (
            <CompareTable />
          ) : (
            <>
              {/* 좌(챗봇) + 우(Agent) */}
              <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mb-2">
                <ChatbotBox chatbot={step.chatbot} />
                <AgentBox agent={step.agent} />
              </div>
              {/* Tool 외부 박스 (Agent에서 화살표) */}
              <ToolCallPane toolCall={step.toolCall} />
            </>
          )}

          {/* 범례 */}
          {!step.showCompare && (
            <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
              <span className="flex items-center gap-1">
                <span className="w-2.5 h-2.5 rounded bg-slate-400"></span>
                챗봇 (LLM only)
              </span>
              <span className="flex items-center gap-1">
                <span className="w-2.5 h-2.5 rounded bg-amber-500"></span>
                Agent (4 컴포넌트)
              </span>
              <span className="flex items-center gap-1">
                <span className="w-2.5 h-2.5 rounded bg-emerald-500"></span>
                Tool 응답
              </span>
              <span className="flex items-center gap-1 ml-auto">
                <span className="w-2.5 h-2.5 rounded bg-red-400"></span>
                LIMIT (못함)
              </span>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum I-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">I</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part I. AI Agent란 무엇인가 &gt; Chapter 1. 에이전트의 탄생</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">챗봇 vs AI Agent — 단순 응답에서 자율 행동으로</h1>
                  <p className="text-sm text-slate-500 mt-0.5">무전기(챗봇) vs 비서(Agent) — LLM에 Tool + Memory + Loop를 더하면?</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                💡 다음(I-1-2)에서는 <strong>Agent의 3요소</strong> — 관찰(Perception) · 사고(Reasoning) · 행동(Action)의 동작 사이클을 자세히 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../index.html" className="text-slate-500 hover:text-slate-700">&larr; 허브</a>
              <a href="./I-1-2.html" className="text-amber-700 hover:text-amber-900 font-medium">I-1-2 Agent의 3요소 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
