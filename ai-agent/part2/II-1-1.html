  <!--
    II-1-1. LLM의 작동 원리 — Tokenization → Embedding → Transformer → Generation
    학습 목표: LLM이 텍스트를 받아 다음 토큰을 생성하기까지 5단계 파이프라인을
              실제 데이터(토큰 ID, 벡터, attention score, 확률 분포)로 추적하고,
              추론 파라미터(temperature/top-p)가 어떻게 출력을 바꾸는지 이해한다.
    핵심 비유: LLM = 자동완성 키보드의 거대한 버전 — 단, 내부엔 4단계 파이프라인이 있다
    패턴: fastapi v1 — 좌(LiveDataPane: 4단계 파이프라인 + temperature 슬라이더) / 우(VSCode CodeViewer)
    색상: ai-agent amber
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의
    //   activeStage : 'tokenize' | 'embed' | 'attention' | 'generate' | 'params'
    //   tokens      : [{ text, id, embedded }] — 입력 토큰 + ID
    //   embeddings  : [{ token, vector(축약 4차원) }]
    //   attention   : [{ from, to, score }] — 토큰 간 가중치
    //   candidates  : [{ token, prob, chosen }] — 다음 토큰 후보
    //   generated   : ['Hello', 'world', '!'] — 누적 생성된 토큰
    //   tempDemo    : { temperature, topP, samples: [3개 다른 출력] }
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {

        desc: '"Hello world"를 LLM이 바로 받지 못한다. 먼저 BPE(Byte-Pair Encoding) tokenizer가 텍스트를 정수 ID 시퀀스로 변환한다. "Hello"는 한 토큰, " world"(앞 공백 포함)는 다른 토큰. tokenizer 사전엔 보통 5만~10만개 토큰이 등록되어 있고, 각 토큰엔 고유 ID가 매핑된다.',
        activeStage: 'tokenize',
        tokens: [
          { text: 'Hello', id: 9906, embedded: false },
          { text: ' world', id: 1917, embedded: false },
        ],

        attention: null,
        candidates: null,
        generated: ['Hello', ' world'],
        tempDemo: null,
        code: {
          lang: 'python',
          filename: 'tokenize.py',
          lines: [
            '"""tokenize.py — BPE 기반 tokenizer 동작',
            '경로: ai-agent/part2/llm/tokenize.py',
            '목적: 자연어 문자열을 LLM이 처리할 수 있는 정수 ID 시퀀스로 변환',
            '주요 의존성: tiktoken (OpenAI), transformers (HuggingFace)"""',
            'import tiktoken',

            '',

            '    print(tid, "→", repr(enc.decode([tid])))',

            '# 핵심: 토큰 = 단어가 아니다. "unbelievable" → ["un","believ","able"]',

          ],

      {
        title: 'Step 2. Embedding — 토큰 ID를 고차원 벡터로',
        desc: '정수 ID(9906)는 "Hello의 의미"를 담고 있지 않다. Embedding layer는 각 ID를 고차원 벡터(GPT-4: 12,288차원, 데모는 4차원으로 축약)로 매핑한다. 비슷한 의미의 토큰은 벡터 공간에서 가까이, 다른 의미는 멀리 위치한다. 이 벡터가 Transformer 입력이 된다.',
        activeStage: 'embed',
        tokens: [

          { text: ' world', id: 1917, embedded: true },
        ],
        embeddings: [
          { token: 'Hello',  vector: [0.21, -0.45, 0.83, 0.12] },
          { token: ' world', vector: [0.67, 0.09, -0.31, 0.55] },
        ],
        attention: null,
        candidates: null,
        generated: ['Hello', ' world'],
        tempDemo: null,
        code: {
          lang: 'python',
          filename: 'embedding.py',
          lines: [
            '"""embedding.py — Embedding layer 동작',
            '경로: ai-agent/part2/llm/embedding.py',
            '목적: 정수 토큰 ID를 d_model 차원의 학습 가능한 벡터로 매핑',
            '주요 의존성: torch.nn.Embedding"""',
            'import torch',
            'import torch.nn as nn',
            '',
            '# 1) Embedding layer 정의 — vocab 200k, dim 12288 (GPT-4 기준)',
            'vocab_size = 200_000',
            'd_model = 12_288  # 데모는 4차원으로 축약',
            'embedding = nn.Embedding(vocab_size, d_model)',
            '',
            '# 2) 토큰 ID → 벡터 lookup',
            'token_ids = torch.tensor([9906, 1917])  # ["Hello", " world"]',
            'vectors = embedding(token_ids)',
            'print(vectors.shape)  # torch.Size([2, 12288])',
            '',
            '# 3) 데모용 4차원 축약 결과',
            '# Hello   → [ 0.21, -0.45,  0.83,  0.12]',
            '# " world" → [ 0.67,  0.09, -0.31,  0.55]',
            '',
            '# 핵심:',
            '# - Embedding은 학습 가능 — 의미가 비슷하면 벡터도 가까워짐',
            '# - cosine_similarity("king" - "man" + "woman", "queen") ≈ 1.0',
            '# - 위치 정보는 따로 (Positional Embedding) 더해짐',
            '#   → 같은 단어라도 문장 내 위치가 다르면 다른 벡터',
          ],
          highlight: [10, 11, 14, 15, 16, 19, 20],
        },
      },
      {
        title: 'Step 3. Transformer — Attention으로 단어 간 관계 학습',
        desc: 'Self-Attention 메커니즘은 각 토큰이 문장 내 다른 토큰을 얼마나 "주목"할지 가중치(score)로 계산한다. 예: "The cat sat on the mat. It was tired."에서 "It"은 "cat"에 높은 attention을 준다. 이 가중치 합산으로 각 토큰의 벡터가 문맥을 반영해 업데이트된다. 데모: "Hello world!" 3 토큰의 attention matrix.',
        activeStage: 'attention',
        tokens: [
          { text: 'Hello', id: 9906, embedded: true },
          { text: ' world', id: 1917, embedded: true },
          { text: '!', id: 0, embedded: true },
        ],
        embeddings: null,
        attention: [
          { from: 'Hello',  to: 'Hello',  score: 0.62 },
          { from: 'Hello',  to: ' world', score: 0.31 },
          { from: 'Hello',  to: '!',      score: 0.07 },
          { from: ' world', to: 'Hello',  score: 0.45 },
          { from: ' world', to: ' world', score: 0.50 },
          { from: ' world', to: '!',      score: 0.05 },
          { from: '!',      to: 'Hello',  score: 0.20 },
          { from: '!',      to: ' world', score: 0.55 },
          { from: '!',      to: '!',      score: 0.25 },
        ],
        candidates: null,
        generated: ['Hello', ' world', '!'],
        tempDemo: null,
        code: {
          lang: 'python',
          filename: 'attention.py',
          lines: [
            '"""',
            'attention.py — Scaled Dot-Product Self-Attention',
            '경로: ai-agent/part2/llm/attention.py',
            '목적: 토큰 벡터들 사이의 관계를 학습 가능한 weight matrix로 계산',
            '주요 의존성: torch (matmul, softmax)',
            '"""',
            'import torch',
            'import torch.nn.functional as F',
            'import math',
            '',
            'def self_attention(x, W_q, W_k, W_v):',
            '    """',
            '    x: (seq_len, d_model) — 토큰 임베딩 시퀀스',
            '    Q, K, V: 각각 W_q, W_k, W_v로 학습 — 같은 입력의 3가지 view',
            '    """',
            '    Q = x @ W_q   # Query: 내가 무엇을 찾는가',
            '    K = x @ W_k   # Key:   내가 무엇을 가지고 있는가',
            '    V = x @ W_v   # Value: 실제 전달할 정보',
            '',
            '    # 1) Q와 모든 K의 내적 → 유사도 score',
            '    d_k = K.size(-1)',
            '    scores = (Q @ K.transpose(-2, -1)) / math.sqrt(d_k)',
            '',
            '    # 2) softmax로 확률화 — 합이 1.0',
            '    weights = F.softmax(scores, dim=-1)',
            '    # weights[i][j] = i번째 토큰이 j번째 토큰에 주는 attention',
            '',
            '    # 3) V를 attention weight로 합산',
            '    output = weights @ V',
            '    return output, weights',
            '',
            '# 핵심:',
            '# - "It was tired"에서 "It"이 "cat"에 높은 weight → 대명사 해소',
            '# - Multi-Head: 이 과정을 8~96개 head로 병렬 → 다양한 관계 포착',
            '# - 12+ Transformer 블록 적층 → 깊은 추상화',
          ],
          highlight: [16, 17, 18, 22, 23, 26, 30],
        },
      },
      {
        title: 'Step 4. Generation — 한 토큰씩 autoregressive 생성',
        desc: 'Transformer를 거친 마지막 토큰의 벡터를 vocab 크기로 projection → softmax → 다음 토큰의 확률 분포를 얻는다. 가장 높은 확률 토큰("?")을 선택, 입력 끝에 붙이고 다시 처음부터 — 이 반복이 autoregressive generation. EOS(end-of-sequence) 토큰이 나오거나 max_tokens에 도달하면 멈춘다.',
        activeStage: 'generate',
        tokens: [
          { text: 'Hello', id: 9906, embedded: true },
          { text: ' world', id: 1917, embedded: true },
          { text: '!', id: 0, embedded: true },
        ],
        embeddings: null,
        attention: null,
        candidates: [
          { token: ' How',     prob: 0.45, chosen: true },
          { token: ' What',    prob: 0.22, chosen: false },
          { token: ' Welcome', prob: 0.15, chosen: false },
          { token: '\\n',       prob: 0.10, chosen: false },
          { token: ' Hi',      prob: 0.08, chosen: false },
        ],
        generated: ['Hello', ' world', '!', ' How'],
        tempDemo: null,
        code: {
          lang: 'python',
          filename: 'generate.py',
          lines: [
            '"""',
            'generate.py — Autoregressive token generation loop',
            '경로: ai-agent/part2/llm/generate.py',
            '목적: 한 번에 한 토큰씩 다음 토큰을 예측하고 입력에 추가하는 루프',
            '주요 의존성: torch, transformers',
            '"""',
            'import torch',
            'import torch.nn.functional as F',
            '',
            'def generate(model, tokenizer, prompt, max_tokens=50):',
            '    """',
            '    prompt → 토큰 ID 리스트 → 한 토큰씩 생성',
            '    """',
            '    input_ids = tokenizer.encode(prompt)',
            '',
            '    for _ in range(max_tokens):',
            '        # 1) 모델에 현재까지의 모든 토큰 입력',
            '        x = torch.tensor(input_ids).unsqueeze(0)',
            '        logits = model(x)            # (1, seq_len, vocab)',
            '',
            '        # 2) 마지막 위치의 logits만 사용',
            '        next_logits = logits[0, -1, :]   # (vocab,)',
            '',
            '        # 3) softmax → 확률 분포',
            '        probs = F.softmax(next_logits, dim=-1)',
            '',
            '        # 4) argmax (greedy) — 가장 확률 높은 토큰 선택',
            '        next_id = torch.argmax(probs).item()',
            '',
            '        # 5) EOS면 종료, 아니면 입력에 추가',
            '        if next_id == tokenizer.eos_token_id:',
            '            break',
            '        input_ids.append(next_id)',
            '',
            '    return tokenizer.decode(input_ids)',
            '',
            '# 핵심:',
            '# - 매 step마다 전체 시퀀스를 다시 forward (KV cache로 최적화)',
            '# - greedy는 결정적이지만 단조로움 → sampling이 더 다양한 출력',
            '# - n 토큰 생성 = n번 forward pass → 비용은 길이에 비례',
          ],
          highlight: [18, 19, 22, 25, 28, 31, 32, 33],
        },
      },
      {
        title: 'Step 5. 추론 파라미터 — temperature, top-p, max_tokens',
        desc: 'Step 4의 argmax는 항상 같은 답만 준다(deterministic). 실제론 sampling을 쓴다. temperature는 확률 분포의 "날카로움"을 조절: 0.0이면 argmax처럼 결정적, 2.0이면 거의 균등 분포(창의적/엉뚱). top-p(nucleus)는 확률 누적 p%까지의 후보만 남기고 sampling — 슬라이더를 옮겨보면 같은 입력에서 출력이 어떻게 변하는지 보인다.',
        activeStage: 'params',
        tokens: null,
        embeddings: null,
        attention: null,
        candidates: null,
        generated: ['Hello', ' world', '!', ' How', ' are', ' you', '?'],
        tempDemo: {
          samples: [
            { temp: 0.0, label: 'deterministic',  text: 'Hello world! How are you today?',          color: '#0891b2' },
            { temp: 0.7, label: 'balanced',       text: 'Hello world! How are you doing this fine evening?', color: '#d97706' },
            { temp: 1.5, label: 'creative',       text: 'Hello world! How fares thy quantum garden today?',   color: '#dc2626' },
          ],
        },
        code: {
          lang: 'python',
          filename: 'params.py',
          lines: [
            '"""',
            'params.py — 추론 시점의 sampling 파라미터',
            '경로: ai-agent/part2/llm/params.py',
            '목적: temperature, top-p, max_tokens 등으로 생성 출력의 다양성/길이 제어',
            '주요 의존성: torch.nn.functional.softmax',
            '"""',
            'import torch',
            'import torch.nn.functional as F',
            '',
            'def sample_next(logits, temperature=1.0, top_p=0.9):',
            '    """',
            '    logits: (vocab,) — 모델이 뱉은 raw score',
            '    temperature: 0.0 ≈ greedy, >1.0 = 더 랜덤',
            '    top_p:       누적 확률 p까지의 후보만 사용 (nucleus)',
            '    """',
            '    # 1) temperature 적용 — logits를 나눠서 분포 sharpening/flattening',
            '    if temperature == 0.0:',
            '        return torch.argmax(logits).item()',
            '    logits = logits / temperature',
            '',
            '    # 2) softmax → 확률',
            '    probs = F.softmax(logits, dim=-1)',
            '',
            '    # 3) top-p (nucleus) 필터링',
            '    sorted_probs, sorted_idx = torch.sort(probs, descending=True)',
            '    cumulative = torch.cumsum(sorted_probs, dim=-1)',
            '    cutoff = (cumulative <= top_p).sum().item() + 1',
            '    keep_idx = sorted_idx[:cutoff]',
            '    keep_probs = sorted_probs[:cutoff]',
            '    keep_probs = keep_probs / keep_probs.sum()  # 재정규화',
            '',
            '    # 4) 분포에서 sampling',
            '    chosen = torch.multinomial(keep_probs, 1).item()',
            '    return keep_idx[chosen].item()',
            '',
            '# OpenAI API 예시:',
            '# client.chat.completions.create(',
            '#     model="gpt-4o",',
            '#     messages=[...],',
            '#     temperature=0.7,   # 0.0 (정확/반복) ~ 2.0 (창의/엉뚱)',
            '#     top_p=0.9,         # 상위 90% 후보 풀에서 sampling',
            '#     max_tokens=500,    # 출력 길이 상한 (비용 cap)',
            '# )',
          ],
          highlight: [17, 18, 19, 20, 26, 27, 28, 29, 30, 34],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 파이프라인 4단계 박스 (Tokenize → Embed → Transformer → Output)
    // ─────────────────────────────────────────────────────
    function PipelineDiagram({ activeStage }) {
      const stages = [
        { id: 'tokenize',  label: 'Tokenize',    icon: '🔤', desc: 'text → IDs' },
        { id: 'embed',     label: 'Embedding',   icon: '📐', desc: 'IDs → vectors' },
        { id: 'attention', label: 'Transformer', icon: '🧠', desc: 'attention' },
        { id: 'generate',  label: 'Generate',    icon: '✍️', desc: 'next token' },
      ];

      return (
        <div className="rounded-lg bg-gradient-to-br from-amber-50 to-orange-50 border border-amber-200 p-3">
          <div className="text-[11px] font-bold text-amber-800 mb-2 flex items-center gap-1">
            <span>⚙️</span>
            <span>LLM 파이프라인</span>
          </div>
          <div className="flex items-center gap-1">
            {stages.map((s, i) => {
              const isActive = activeStage === s.id;
              const isPast = stages.findIndex(x => x.id === activeStage) > i;
              const isFuture = stages.findIndex(x => x.id === activeStage) < i && activeStage !== 'params';
              const bg = isActive ? 'bg-amber-500 border-amber-600 text-white shadow-md scale-105'
                       : isPast   ? 'bg-amber-100 border-amber-300 text-amber-700'
                       : isFuture ? 'bg-white border-slate-200 text-slate-400'
                       : 'bg-amber-100 border-amber-300 text-amber-700';
              return (
                <React.Fragment key={s.id}>
                  <div className={`flex-1 rounded-lg border-2 p-2 transition-all duration-500 ${bg}`}>
                    <div className="text-lg text-center">{s.icon}</div>
                    <div className="text-[10px] font-bold text-center">{s.label}</div>
                    <div className="text-[8px] text-center opacity-80 font-mono">{s.desc}</div>
                  </div>
                  {i < stages.length - 1 && (
                    <span className={`text-lg ${isPast || isActive ? 'text-amber-500' : 'text-slate-300'}`}>›</span>
                  )}
                </React.Fragment>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 1: 토큰 ID 시각화
    // ─────────────────────────────────────────────────────
    function TokenizeView({ tokens }) {
      return (
        <div className="rounded-lg bg-white border border-amber-200 p-3">
          <div className="text-[11px] font-bold text-amber-800 mb-2">📥 입력: "Hello world" → BPE 인코딩</div>
          <div className="flex flex-wrap items-center gap-2">
            <span className="text-sm text-slate-500 font-mono">"Hello world"</span>
            <span className="text-amber-500 text-lg">→</span>
            {tokens.map((t, i) => (
              <div key={i} className="flex flex-col items-center gap-1">
                <div className="px-3 py-2 bg-amber-500 text-white rounded-lg font-mono font-bold text-sm shadow">
                  {t.text}
                </div>
                <div className="text-[10px] text-amber-700 font-mono bg-amber-50 px-2 py-0.5 rounded border border-amber-200">
                  id: {t.id}
                </div>
              </div>
            ))}
          </div>
          <div className="mt-3 text-[10px] text-slate-500 font-mono border-t border-slate-100 pt-2">
            tokenizer vocab: 200,000 · 영어 1단어 ≈ 1.3 토큰 · 한글 1글자 ≈ 2~3 토큰
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 2: Embedding 벡터 시각화
    // ─────────────────────────────────────────────────────
    function EmbeddingView({ embeddings }) {
      return (
        <div className="rounded-lg bg-white border border-amber-200 p-3">
          <div className="text-[11px] font-bold text-amber-800 mb-2">📐 토큰 ID → 12,288차원 벡터 (데모: 4차원)</div>
          <div className="space-y-2">
            {embeddings.map((e, i) => (
              <div key={i} className="flex items-center gap-2">
                <div className="w-20 px-2 py-1.5 bg-amber-500 text-white rounded font-mono font-bold text-xs text-center shadow">
                  {e.token}
                </div>
                <span className="text-amber-500">→</span>
                <div className="flex-1 flex gap-1">
                  {e.vector.map((v, j) => {
                    const pct = Math.abs(v) * 100;
                    const isPos = v >= 0;
                    return (
                      <div key={j} className="flex-1 flex flex-col items-center">
                        <div className="w-full h-8 bg-slate-100 rounded relative overflow-hidden border border-slate-200">
                          <div
                            className={`absolute left-0 right-0 ${isPos ? 'bottom-1/2 bg-amber-500' : 'top-1/2 bg-orange-400'}`}
                            style={{ height: `${pct / 2}%` }}
                          />
                          <div className="absolute top-1/2 left-0 right-0 border-t border-slate-300" />
                        </div>
                        <div className="text-[9px] text-slate-600 font-mono mt-0.5">{v.toFixed(2)}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
          <div className="mt-3 text-[10px] text-slate-500 font-mono border-t border-slate-100 pt-2">
            의미가 비슷하면 벡터도 가까워짐 · king − man + woman ≈ queen
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 3: Attention matrix 시각화
    // ─────────────────────────────────────────────────────
    function AttentionView({ tokens, attention }) {
      const labels = tokens.map(t => t.text);
      const matrix = labels.map(from =>
        labels.map(to => {
          const cell = attention.find(a => a.from === from && a.to === to);
          return cell ? cell.score : 0;
        })
      );

      return (
        <div className="rounded-lg bg-white border border-amber-200 p-3">
          <div className="text-[11px] font-bold text-amber-800 mb-2">🧠 Self-Attention Matrix (행: query, 열: key)</div>
          <div className="overflow-x-auto">
            <table className="text-xs font-mono mx-auto">
              <thead>
                <tr>
                  <th className="px-1 py-1"></th>
                  {labels.map((l, i) => (
                    <th key={i} className="px-2 py-1 text-amber-700 font-bold border-b border-amber-200">{l}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {matrix.map((row, i) => (
                  <tr key={i}>
                    <td className="px-2 py-1 text-amber-700 font-bold border-r border-amber-200 text-right">{labels[i]}</td>
                    {row.map((score, j) => {
                      const intensity = Math.round(score * 100);
                      const bg = `rgba(245, 158, 11, ${score})`;
                      const textColor = score > 0.4 ? 'white' : '#92400e';
                      return (
                        <td key={j} className="text-center transition-all duration-700 border border-amber-100">
                          <div
                            className="w-12 h-10 flex items-center justify-center font-bold"
                            style={{ background: bg, color: textColor }}
                          >
                            {(score * 100).toFixed(0)}
                          </div>
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="mt-3 text-[10px] text-slate-500 font-mono border-t border-slate-100 pt-2">
            진할수록 높은 attention · 합 = 1.0 (softmax) · Multi-Head: 8~96개 병렬
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 4: 다음 토큰 후보 + 확률 분포
    // ─────────────────────────────────────────────────────
    function GenerateView({ candidates, generated }) {
      return (
        <div className="rounded-lg bg-white border border-amber-200 p-3">
          <div className="text-[11px] font-bold text-amber-800 mb-2">✍️ 다음 토큰 확률 분포 (softmax 출력)</div>

          {/* 누적 생성된 시퀀스 */}
          <div className="mb-3 p-2 bg-slate-50 rounded border border-slate-200">
            <div className="text-[10px] text-slate-500 font-bold mb-1">현재 시퀀스</div>
            <div className="flex flex-wrap gap-1">
              {generated.map((t, i) => {
                const isLast = i === generated.length - 1;
                return (
                  <span
                    key={i}
                    className={`px-2 py-1 rounded font-mono text-xs font-bold ${
                      isLast ? 'bg-amber-500 text-white shadow scale-105' : 'bg-amber-100 text-amber-800'
                    }`}
                  >
                    {t}
                  </span>
                );
              })}
              <span className="w-2 h-6 bg-amber-400 animate-pulse rounded ml-1" />
            </div>
          </div>

          {/* 후보 분포 */}
          <div className="space-y-1.5">
            {candidates.map((c, i) => (
              <div key={i} className={`flex items-center gap-2 p-1.5 rounded ${c.chosen ? 'bg-amber-50 border border-amber-300' : ''}`}>
                <span className={`font-mono font-bold px-2 py-0.5 rounded text-xs w-24 text-center ${
                  c.chosen ? 'bg-amber-500 text-white' : 'bg-slate-200 text-slate-600'
                }`}>
                  {c.token}
                </span>
                <div className="flex-1 h-5 bg-slate-100 rounded-full overflow-hidden">
                  <div
                    className={`h-full rounded-full transition-all duration-700 ${c.chosen ? 'bg-amber-500' : 'bg-slate-300'}`}
                    style={{ width: `${c.prob * 100}%` }}
                  />
                </div>
                <span className={`text-xs font-bold w-12 text-right font-mono ${c.chosen ? 'text-amber-700' : 'text-slate-400'}`}>
                  {(c.prob * 100).toFixed(0)}%
                </span>
                {c.chosen && <span className="text-[9px] bg-amber-200 text-amber-800 px-1.5 py-0.5 rounded font-bold">argmax</span>}
              </div>
            ))}
          </div>
          <div className="mt-3 text-[10px] text-slate-500 font-mono border-t border-slate-100 pt-2">
            매 step마다 전체 시퀀스 forward → softmax → 1 토큰 선택 (autoregressive)
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 5: temperature 슬라이더 + 3개 출력 비교
    // ─────────────────────────────────────────────────────
    function ParamsView({ tempDemo }) {
      const [temp, setTemp] = useState(0.7);
      // temperature에 따라 어떤 sample이 가장 가까운지 강조
      const closest = tempDemo.samples.reduce((best, s) =>
        Math.abs(s.temp - temp) < Math.abs(best.temp - temp) ? s : best
      , tempDemo.samples[0]);

      return (
        <div className="rounded-lg bg-white border border-amber-200 p-3">
          <div className="text-[11px] font-bold text-amber-800 mb-2">🎛️ Temperature 슬라이더 (직접 움직여보기)</div>

          {/* 슬라이더 */}
          <div className="mb-4 px-1">
            <div className="flex items-center justify-between text-[10px] text-slate-500 font-mono mb-1">
              <span>0.0 결정적</span>
              <span className="text-amber-700 font-bold text-sm">T = {temp.toFixed(2)}</span>
              <span>2.0 창의적</span>
            </div>
            <input
              type="range"
              min="0"
              max="2"
              step="0.1"
              value={temp}
              onChange={(e) => setTemp(parseFloat(e.target.value))}
              className="w-full accent-amber-500"
            />
            <div className="flex justify-between text-[9px] text-slate-400 font-mono mt-0.5">
              <span>greedy</span>
              <span>balanced</span>
              <span>random</span>
            </div>
          </div>

          {/* 3가지 sample 출력 */}
          <div className="text-[10px] font-bold text-slate-500 uppercase mb-2">동일 prompt, 다른 T → 다른 출력</div>
          <div className="space-y-2">
            {tempDemo.samples.map((s, i) => {
              const isClosest = s === closest;
              return (
                <div
                  key={i}
                  className={`p-2 rounded border-2 transition-all ${
                    isClosest ? 'border-amber-400 bg-amber-50 shadow-sm' : 'border-slate-200 bg-slate-50 opacity-60'
                  }`}
                >
                  <div className="flex items-center justify-between mb-1">
                    <span className="font-mono font-bold text-xs" style={{ color: s.color }}>
                      T = {s.temp.toFixed(1)} · {s.label}
                    </span>
                    {isClosest && <span className="text-[9px] bg-amber-500 text-white px-1.5 py-0.5 rounded font-bold">현재</span>}
                  </div>
                  <div className="text-xs font-mono text-slate-700">{s.text}</div>
                </div>
              );
            })}
          </div>

          {/* top-p / max_tokens 안내 */}
          <div className="mt-3 grid grid-cols-2 gap-2 text-[10px] text-slate-600 font-mono">
            <div className="bg-orange-50 border border-orange-200 rounded p-2">
              <div className="font-bold text-orange-800">top_p (nucleus)</div>
              <div>상위 p% 누적 후보만 sampling</div>
            </div>
            <div className="bg-orange-50 border border-orange-200 rounded p-2">
              <div className="font-bold text-orange-800">max_tokens</div>
              <div>출력 상한 → 비용/지연 cap</div>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 파이프라인 + 단계별 상세 view
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm space-y-3">
          <div className="flex items-center justify-between">
            <h2 className="text-sm font-bold text-slate-700">🔬 LLM 내부 파이프라인 추적</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 파이프라인 다이어그램 (params 단계는 숨김) */}
          {step.activeStage !== 'params' && <PipelineDiagram activeStage={step.activeStage} />}

          {/* 단계별 상세 시각화 */}
          {step.activeStage === 'tokenize' && <TokenizeView tokens={step.tokens} />}
          {step.activeStage === 'embed' && <EmbeddingView embeddings={step.embeddings} />}
          {step.activeStage === 'attention' && <AttentionView tokens={step.tokens} attention={step.attention} />}
          {step.activeStage === 'generate' && <GenerateView candidates={step.candidates} generated={step.generated} />}
          {step.activeStage === 'params' && <ParamsView tempDemo={step.tempDemo} />}

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-amber-500"></span>
              현재 단계
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-amber-200"></span>
              완료 단계
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-slate-200"></span>
              미진입
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. LLM 기초 &gt; Chapter 1. LLM이란</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">LLM의 작동 원리</h1>
                  <p className="text-sm text-slate-500 mt-0.5">Tokenization → Embedding → Transformer → Generation 4단계 + 추론 파라미터</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                💡 다음(II-1-2)에서는 <strong>토큰과 컨텍스트 윈도우</strong> — 모델별 한계, 비용 계산, prompt 절약 기법을 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../part1/I-2-2.html" className="text-slate-500 hover:text-slate-700">&larr; I-2-2 자율성 스펙트럼</a>
              <a href="./II-1-2.html" className="text-amber-700 hover:text-amber-900 font-medium">II-1-2 토큰과 컨텍스트 윈도우 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
