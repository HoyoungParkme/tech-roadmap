<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent 학습 — II-1-1. LLM의 작동 원리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SENTENCE = ['오늘', ' 점심은', ' 뭐', ' 먹을까', '?'];
    const CANDIDATES = [
      [' 점심은', ' 날씨가', ' 저녁은'],
      [' 뭐', ' 어디서', ' 맛있는'],
      [' 먹을까', ' 할까', ' 시킬까'],
      ['?', '!', '...'],
      [],
    ];
    const PROBS = [
      [0.72, 0.18, 0.10],
      [0.65, 0.20, 0.15],
      [0.80, 0.12, 0.08],
      [0.85, 0.10, 0.05],
      [],
    ];

    const STEPS = [
      { desc: "[입력] 사용자가 \"오늘\"이라고 입력합니다. LLM은 이 토큰을 받고, 다음에 올 가장 적절한 토큰을 예측합니다.", tokenIdx: 0, showCandidates: false, generated: ['오늘'] },
      { desc: "[예측 1] \"오늘\" 다음에 올 단어 후보들이 나타납니다. \" 점심은\"이 72%로 가장 높은 확률을 가지므로 선택됩니다.", tokenIdx: 0, showCandidates: true, generated: ['오늘'] },
      { desc: "[생성 1] \" 점심은\"이 선택되었습니다. 이제 \"오늘 점심은\" 다음에 올 토큰을 예측합니다.", tokenIdx: 1, showCandidates: false, generated: ['오늘', ' 점심은'] },
      { desc: "[예측 2→3] 같은 과정을 반복합니다. \" 뭐\"(65%) → \" 먹을까\"(80%) → \"?\"(85%). 매번 가장 확률 높은 토큰을 선택합니다.", tokenIdx: 3, showCandidates: true, generated: ['오늘', ' 점심은', ' 뭐', ' 먹을까'] },
      { desc: "[완성] 문장이 완성되었습니다! LLM은 \"이해\"하는 게 아니라 \"예측\"하는 것입니다. 스마트폰 자동완성 키보드와 원리가 같지만, 수십만 개의 후보 중에서 고릅니다.", tokenIdx: 4, showCandidates: false, generated: ['오늘', ' 점심은', ' 뭐', ' 먹을까', '?'] },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-sky-700 hover:text-sky-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a></nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. LLM 기초 &gt; Chapter 1. LLM이란</div>
                  <h1 className="text-2xl font-bold text-slate-800">II-1-1. LLM의 작동 원리</h1>
                </div>
              </div>
              <p className="text-slate-600">LLM은 <b>자동완성 키보드</b>와 같습니다. 앞 단어를 보고 다음 단어를 확률적으로 고릅니다. "이해"가 아니라 <b>"예측"</b>입니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-sky-700 border-sky-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">다음 토큰 예측</h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 토큰 생성 시각화 */}
            <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
              {/* 생성된 토큰들 */}
              <div className="flex flex-wrap items-center gap-1 mb-8 min-h-[60px]">
                {stepData.generated.map((token, i) => (
                  <span key={i} className={`px-3 py-2 rounded-lg text-lg font-bold transition-all duration-500 ${i === stepData.generated.length - 1 && currentStepIdx > 0 ? 'bg-sky-500 text-white scale-110 shadow-md' : 'bg-sky-100 text-sky-800'}`}>
                    {token}
                  </span>
                ))}
                {!isEnd && <span className="w-4 h-8 bg-sky-400 rounded animate-pulse ml-1" />}
              </div>

              {/* 후보 토큰 + 확률 */}
              {stepData.showCandidates && CANDIDATES[stepData.tokenIdx].length > 0 && (
                <div className="border-t border-slate-200 pt-6">
                  <div className="text-xs font-bold text-slate-500 uppercase mb-3">다음 토큰 후보</div>
                  <div className="space-y-2">
                    {CANDIDATES[stepData.tokenIdx].map((cand, i) => {
                      const prob = PROBS[stepData.tokenIdx][i];
                      const isChosen = i === 0;
                      return (
                        <div key={i} className={`flex items-center gap-3 p-2 rounded-lg transition-all ${isChosen ? 'bg-sky-50 border border-sky-200' : 'bg-slate-50'}`}>
                          <span className={`font-mono font-bold px-2 py-1 rounded ${isChosen ? 'bg-sky-500 text-white' : 'bg-slate-200 text-slate-600'}`}>{cand}</span>
                          <div className="flex-1 h-6 bg-slate-100 rounded-full overflow-hidden">
                            <div className={`h-full rounded-full transition-all duration-700 ${isChosen ? 'bg-sky-500' : 'bg-slate-300'}`} style={{width: `${prob * 100}%`}} />
                          </div>
                          <span className={`text-sm font-bold w-12 text-right ${isChosen ? 'text-sky-700' : 'text-slate-400'}`}>{(prob * 100).toFixed(0)}%</span>
                          {isChosen && <span className="text-xs bg-sky-100 text-sky-700 px-2 py-0.5 rounded-full font-bold">선택</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* 완성 표시 */}
              {isEnd && (
                <div className="mt-6 bg-sky-50 border border-sky-200 rounded-lg p-4 text-center">
                  <div className="text-2xl mb-2">📱</div>
                  <div className="font-bold text-sky-700">스마트폰 자동완성과 같은 원리!</div>
                  <div className="text-sm text-sky-600">다만 LLM은 수십만 개 후보 중에서 고릅니다</div>
                </div>
              )}
            </div>

            <div className="flex flex-wrap gap-2">
              {['토큰', '다음 토큰 예측', '확률', '자동완성'].map(kw => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-sm font-medium border border-sky-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-sky-600 hover:bg-sky-700">{isPlaying ? <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</> : <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>}</button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="text-sm text-slate-500 flex justify-between">
              <a href="../part1/I-2-2.html" className="text-sky-600 hover:text-sky-800 font-medium">← I-2-2. 자율성 스펙트럼</a>
              <a href="./II-1-2.html" className="text-sky-600 hover:text-sky-800 font-medium">II-1-2. 토큰과 컨텍스트 윈도우 →</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
