<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent 학습 — II-3-1. 환각, 지식 단절, 행동 불가</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const LIMITS = [
      { id: 'hallucination', icon: '🌀', label: '환각 (Hallucination)',
        studentDesc: '모르는 문제에 자신감 넘치게 틀린 답을 쓴다',
        llmDesc: 'LLM이 존재하지 않는 사실을 진짜처럼 답한다',
        example: 'Q: "김철수 교수의 논문 알려줘"\nA: "2023년 Nature에 실린 \'AI와 의식\'이라는 논문이 있습니다" (완전 지어낸 것)',
        solution: '🔍 검색 도구로 사실 확인 (Grounding)', solutionDesc: 'Agent가 실제 검색 결과와 대조하여 거짓 정보를 걸러냄' },
      { id: 'cutoff', icon: '📅', label: '지식 단절 (Knowledge Cutoff)',
        studentDesc: '시험 범위 밖의 문제가 나왔다',
        llmDesc: '학습 시점 이후의 정보를 모른다',
        example: 'Q: "오늘 서울 날씨 알려줘"\nA: "죄송합니다, 실시간 정보에 접근할 수 없습니다"',
        solution: '🌐 실시간 API로 최신 정보 획득', solutionDesc: '날씨 API, 뉴스 API 등을 호출하여 최신 데이터 제공' },
      { id: 'no-action', icon: '🚫', label: '행동 불가 (No Action)',
        studentDesc: '답안지에 "계산기를 쓰면 됩니다"라고만 쓴다',
        llmDesc: '대답만 하고 실제 실행은 못 한다',
        example: 'Q: "팀장에게 이메일 보내줘"\nA: "이메일을 보내는 방법을 알려드리겠습니다:\n1. 이메일 앱을 여세요\n2. 받는 사람에..."',
        solution: '⚡ 도구를 사용해 직접 실행', solutionDesc: '이메일 API를 호출하여 실제로 이메일을 발송' },
    ];

    const STEPS = [
      { desc: "[시험 보는 학생] LLM은 시험 보는 학생과 비슷합니다. 모르는 문제를 지어내고, 시험 범위 밖은 못 풀고, 답만 쓰고 제출은 못 합니다. 3가지 한계를 하나씩 봅시다.", activeLimit: null, showSolution: false },
      { desc: "[환각] 모르는 문제에 자신감 넘치게 틀린 답을 쓰는 학생. LLM도 마찬가지 — 없는 논문, 없는 사실을 마치 진짜처럼 말합니다. 가장 위험한 한계입니다.", activeLimit: 'hallucination', showSolution: false },
      { desc: "[지식 단절] 시험 범위 밖의 문제가 나온 상황. LLM은 학습 데이터 이후의 세상을 모릅니다. 오늘 날씨, 최신 뉴스, 실시간 주가 — 전부 모릅니다.", activeLimit: 'cutoff', showSolution: false },
      { desc: "[행동 불가] 답안지에 \"계산기를 쓰면 됩니다\"라고만 쓰고 실제로 계산은 안 하는 학생. LLM은 \"이메일 보내는 법\"은 알지만, 실제로 보내지는 못합니다.", activeLimit: 'no-action', showSolution: false },
      { desc: "[Agent의 해결] Agent는 이 세 가지를 모두 해결합니다. 검색으로 사실 확인, API로 최신 정보, 도구로 직접 실행. Part I에서 배운 내용의 복습이자, Part III로의 연결입니다.", activeLimit: null, showSolution: true },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-sky-700 hover:text-sky-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. LLM 기초 &gt; Chapter 3. LLM의 한계</div>
                  <h1 className="text-2xl font-bold text-slate-800">II-3-1. 환각, 지식 단절, 행동 불가</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>시험 보는 학생</b>처럼 LLM은 모르면 지어내고, 범위 밖은 못 풀고, 답만 쓰고 실행은 못 합니다. Agent가 이 세 가지를 해결합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-sky-700 border-sky-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">LLM의 3가지 한계</h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 3개 한계 카드 */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              {LIMITS.map(limit => {
                const isActive = stepData.activeLimit === limit.id;
                const showSol = stepData.showSolution;
                return (
                  <div key={limit.id} className={`rounded-xl border-2 p-4 transition-all duration-500 ${isActive ? 'border-red-300 bg-red-50 scale-105 shadow-md' : showSol ? 'border-emerald-200 bg-emerald-50' : 'border-slate-200 bg-white'}`}>
                    <div className="flex items-center gap-2 mb-2">
                      <span className="text-2xl">{limit.icon}</span>
                      <span className={`font-bold text-sm ${isActive ? 'text-red-700' : showSol ? 'text-emerald-700' : 'text-slate-700'}`}>{limit.label}</span>
                    </div>

                    <div className={`text-xs rounded-lg p-2 mb-2 ${isActive ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-600'}`}>
                      <b>학생 비유:</b> {limit.studentDesc}
                    </div>

                    {isActive && (
                      <div className="text-xs bg-white border border-red-200 rounded-lg p-2 mb-2 whitespace-pre-line text-red-600">
                        <b>실제 예시:</b>{'\n'}{limit.example}
                      </div>
                    )}

                    {showSol && (
                      <div className="border-t border-slate-200 pt-2 mt-2">
                        <div className="text-sm font-bold text-emerald-700 mb-1">{limit.solution}</div>
                        <div className="text-xs text-emerald-600">{limit.solutionDesc}</div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Part III 연결 안내 */}
            {stepData.showSolution && (
              <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-center">
                <div className="text-lg mb-1">👉</div>
                <div className="font-bold text-amber-800">다음 Part III에서 배울 내용</div>
                <div className="text-sm text-amber-700">Agent가 이 한계들을 해결하는 구체적인 패턴: CoT, ReAct, Tool Use</div>
              </div>
            )}

            <div className="flex flex-wrap gap-2">
              {['Hallucination', 'Knowledge Cutoff', 'Grounding', 'Tool Use'].map(kw => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-sm font-medium border border-sky-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-sky-600 hover:bg-sky-700">{isPlaying ? <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</> : <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>}</button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="text-sm text-slate-500 flex justify-between">
              <a href="./II-2-2.html" className="text-sky-600 hover:text-sky-800 font-medium">← II-2-2. API 호출 기본</a>
              <span className="text-slate-400">Part II 완료! 다음: <a href="../part3/III-1-1.html" className="text-amber-600 hover:text-amber-800 font-medium">Part III. 핵심 패턴 →</a></span>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
