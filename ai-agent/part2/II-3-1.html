            </div>
            <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full font-mono ${c.status}`}>
              {c.statusIcon} {c.statusText}
            </span>
          </div>

          <div className={`text-[11px] ${c.note} leading-snug`}>
            {state === 'fixed' ? (
              <>
                <span className="font-bold">[{meta.solutionTag}]</span> {meta.oneLineSolution}
              </>
            ) : (
              meta.oneLineProblem
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 답변 박스 (사용자 질문 + LLM 응답)
    // ─────────────────────────────────────────────────────
    function DialogBox({ userAsk, llmAnswer, answerKind, reality }) {
      if (!userAsk) return null;

      const ansStyle = {
        lying:       { bg: 'bg-red-50',     border: 'border-red-300',     text: 'text-red-900',     icon: '🤥', label: 'LLM 응답 (환각!)' },
        refusing:    { bg: 'bg-amber-50',   border: 'border-amber-300',   text: 'text-amber-900',   icon: '🤷', label: 'LLM 응답 (모름)' },
        instructing: { bg: 'bg-orange-50',  border: 'border-orange-300',  text: 'text-orange-900',  icon: '📝', label: 'LLM 응답 (설명만)' },
        success:     { bg: 'bg-emerald-50', border: 'border-emerald-400', text: 'text-emerald-900', icon: '✅', label: 'Agent 응답 (실행 완료)' },
        silent:      { bg: 'bg-slate-50',   border: 'border-slate-200',   text: 'text-slate-700',   icon: '💬', label: 'LLM 응답' },
      };
      const s = ansStyle[answerKind] || ansStyle.silent;

      return (
        <div className="space-y-2">
          {/* 사용자 질문 */}
          <div className="rounded-lg bg-amber-600 text-white p-2.5 flex items-start gap-2 shadow-sm">
            <span className="text-base leading-none">❓</span>
            <div className="flex-1 min-w-0">
              <div className="text-[9px] uppercase tracking-wider text-amber-100 font-bold">사용자 질문</div>
              <div className="text-xs font-bold mt-0.5 break-words">{userAsk}</div>
            </div>
          </div>

          {/* LLM 응답 */}
          {llmAnswer && (
            <div className={`rounded-lg border-2 p-2.5 ${s.bg} ${s.border}`}>
              <div className="flex items-start gap-2">
                <span className="text-base leading-none">{s.icon}</span>
                <div className="flex-1 min-w-0">
                  <div className={`text-[9px] uppercase tracking-wider font-bold opacity-70 ${s.text}`}>{s.label}</div>
                  <div className={`text-xs font-medium mt-0.5 whitespace-pre-line break-words ${s.text}`}>
                    {llmAnswer}
                  </div>
                </div>
              </div>
              {reality && (
                <div className="mt-2 pt-2 border-t border-slate-200 text-[10px] text-slate-600 italic">
                  {reality}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 해결책 박스 (Step 4)
    // ─────────────────────────────────────────────────────
    function SolutionBox() {
      const items = [
        {
          icon: '🌀',
          limit: '환각',
          arrow: '→',
          fix: 'RAG + Verification',
          desc: '신뢰 가능한 문서를 먼저 검색해 컨텍스트로 주입. 출처를 함께 반환해 검증 가능.',
          color: 'red',
        },
        {
          icon: '📅',
          limit: '지식 단절',
          arrow: '→',
          fix: 'Tool Use (실시간 API)',
          desc: '날씨/뉴스/주가 API를 도구로 등록. LLM이 필요할 때 호출하여 최신 정보 획득.',
          color: 'blue',
        },
        {
          icon: '🚫',
          limit: '행동 불가',
          arrow: '→',
          fix: 'Tool Use (외부 함수)',
          desc: '이메일/DB/파일 시스템을 함수로 래핑해 도구 등록. LLM이 호출 결정 → 런타임이 실행.',
          color: 'purple',
        },
      ];

      const bgClass = {
        red:    'from-red-50 to-emerald-50 border-emerald-300',
        blue:   'from-amber-50 to-emerald-50 border-emerald-300',
        purple: 'from-orange-50 to-emerald-50 border-emerald-300',
      };

      return (
        <div className="space-y-2">
          <div className="text-[11px] font-bold text-amber-900 uppercase tracking-wider px-1">
            💊 한계별 처방
          </div>
          {items.map((it) => (
            <div
              key={it.limit}
              className={`rounded-lg border-2 bg-gradient-to-r ${bgClass[it.color]} p-2.5 flex items-center gap-3`}
            >
              <span className="text-xl">{it.icon}</span>
              <div className="flex items-center gap-2 text-xs font-bold">
                <span className="text-red-700 line-through opacity-60">{it.limit}</span>
                <span className="text-slate-500">{it.arrow}</span>
                <span className="text-emerald-700">{it.fix}</span>
              </div>
              <div className="flex-1 text-[10px] text-slate-600 ml-auto leading-snug">{it.desc}</div>
            </div>
          ))}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Agent 통합 다이어그램 (Step 5)
    // ─────────────────────────────────────────────────────
    function AgentDiagram() {
      return (
        <div className="rounded-lg bg-gradient-to-br from-amber-50 to-orange-50 border-2 border-amber-300 p-3">
          <div className="text-[11px] font-bold text-amber-900 uppercase tracking-wider mb-2 text-center">
            🤖 Agent = LLM + 도구 + 루프
          </div>
          <svg viewBox="0 0 380 180" className="w-full h-auto">
            <defs>
              <marker id="arrow-flow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
                <path d="M0,0 L8,4 L0,8 Z" fill="#d97706" />
              </marker>
            </defs>

            {/* 사용자 */}
            <g>
              <rect x="10" y="75" width="60" height="35" rx="6" fill="#fde68a" stroke="#d97706" strokeWidth="1.5" />
              <text x="40" y="92" textAnchor="middle" fontSize="10" fontWeight="bold" fill="#78350f">사용자</text>
              <text x="40" y="104" textAnchor="middle" fontSize="8" fill="#78350f">요청</text>
            </g>

            {/* LLM (중앙) */}
            <g>
              <rect x="140" y="60" width="100" height="60" rx="8" fill="#fb923c" stroke="#c2410c" strokeWidth="2" />
              <text x="190" y="82" textAnchor="middle" fontSize="11" fontWeight="bold" fill="white">LLM (두뇌)</text>
              <text x="190" y="95" textAnchor="middle" fontSize="8" fill="#fff7ed">"어떤 도구를</text>
              <text x="190" y="106" textAnchor="middle" fontSize="8" fill="#fff7ed">언제 쓸까?"</text>
            </g>

            {/* 도구 3개 */}
            <g>
              <rect x="290" y="10" width="80" height="35" rx="6" fill="#dcfce7" stroke="#15803d" strokeWidth="1.5" />
              <text x="330" y="25" textAnchor="middle" fontSize="9" fontWeight="bold" fill="#14532d">🔍 search_kb</text>
              <text x="330" y="37" textAnchor="middle" fontSize="7" fill="#166534">환각 방지</text>
            </g>
            <g>
              <rect x="290" y="73" width="80" height="35" rx="6" fill="#dbeafe" stroke="#1d4ed8" strokeWidth="1.5" />
              <text x="330" y="88" textAnchor="middle" fontSize="9" fontWeight="bold" fill="#1e3a8a">🌐 get_weather</text>
              <text x="330" y="100" textAnchor="middle" fontSize="7" fill="#1e40af">최신 정보</text>
            </g>
            <g>
              <rect x="290" y="135" width="80" height="35" rx="6" fill="#f3e8ff" stroke="#7e22ce" strokeWidth="1.5" />
              <text x="330" y="150" textAnchor="middle" fontSize="9" fontWeight="bold" fill="#581c87">📧 send_email</text>
              <text x="330" y="162" textAnchor="middle" fontSize="7" fill="#6b21a8">실제 행동</text>
            </g>

            {/* 화살표 */}
            <line x1="70" y1="92" x2="138" y2="90" stroke="#d97706" strokeWidth="1.5" markerEnd="url(#arrow-flow)" />
            <line x1="240" y1="75" x2="288" y2="30" stroke="#d97706" strokeWidth="1.5" markerEnd="url(#arrow-flow)" />
            <line x1="240" y1="90" x2="288" y2="90" stroke="#d97706" strokeWidth="1.5" markerEnd="url(#arrow-flow)" />
            <line x1="240" y1="105" x2="288" y2="150" stroke="#d97706" strokeWidth="1.5" markerEnd="url(#arrow-flow)" />

            {/* 루프 표시 */}
            <path
              d="M 290 30 Q 260 30 245 50 L 240 60"
              fill="none"
              stroke="#a3a3a3"
              strokeWidth="1"
              strokeDasharray="3 3"
              markerEnd="url(#arrow-flow)"
              opacity="0.6"
            />
            <text x="263" y="45" fontSize="7" fill="#737373" fontStyle="italic">결과</text>
          </svg>
          <div className="text-[10px] text-amber-900 text-center mt-2 font-medium">
            LLM은 <b>판단</b>만 — 실제 작업은 <b>도구</b>가 수행
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🎓 시험 보는 학생 — LLM의 3 한계</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 3 한계 카드 */}
          <div className="space-y-2 mb-3">
            <LimitCard id="hallucination" state={step.states.hallucination} focused={step.focus === 'hallucination'} />
            <LimitCard id="cutoff" state={step.states.cutoff} focused={step.focus === 'cutoff'} />
            <LimitCard id="action" state={step.states.action} focused={step.focus === 'action'} />
          </div>

          {/* 다이얼로그 (질문 + 응답) */}
          {step.userAsk && (
            <div className="mt-3 pt-3 border-t border-slate-100">
              <DialogBox
                userAsk={step.userAsk}
                llmAnswer={step.llmAnswer}
                answerKind={step.answerKind}
                reality={step.reality}
              />
            </div>
          )}

          {/* 해결책 박스 (Step 4) */}
          {step.solutionStep && (
            <div className="mt-3 pt-3 border-t border-slate-100">
              <SolutionBox />
            </div>
          )}

          {/* Agent 통합 다이어그램 (Step 5) */}
          {step.integration && (
            <div className="mt-3 pt-3 border-t border-slate-100">
              <AgentDiagram />
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-slate-200 border border-slate-300"></span>
              대기 중
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-red-500"></span>
              한계 발현 (✗)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
              Agent 해결 (✓)
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode CodeViewer — highlight.js + 파일 탭
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total, allFilenames, currentFilename }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg flex flex-col">
          {/* 윈도우 dot */}
          <div className="bg-[#21252b] px-3 py-1.5 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-[10px] text-slate-400 ml-2 font-mono uppercase">{code.lang}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono">Step {stepIdx + 1} / {total}</span>
          </div>

          {/* 파일 탭 */}
          <div className="bg-[#1e2227] flex border-b border-slate-700 overflow-x-auto">
            {allFilenames.map((fn) => {
              const active = fn === currentFilename;
              return (
                <div
                  key={fn}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 ${
                    active
                      ? 'bg-[#282c34] text-amber-300 border-t-2 border-t-amber-400'
                      : 'text-slate-500'
                  }`}
                >
                  {fn}
                </div>
              );
            })}
          </div>

          {/* hljs hidden 토큰화 */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5 flex-1">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : 'border-l-2 border-transparent'
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-3 py-1 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.lang}</span>
            <span>{currentFilename}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];
      const allFilenames = STEPS.map((s) => s.code.filename);

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">
                curriculum II-3-1
              </span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. LLM 기초 &gt; Chapter 3. LLM의 한계</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-3-1. 환각, 지식 단절, 행동 불가</h1>
                  <p className="text-sm text-slate-500 mt-0.5">시험 보는 학생 — LLM의 3대 한계와 Agent의 해결책</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                code={step.code}
                stepIdx={stepIdx}
                total={STEPS.length}
                allFilenames={allFilenames}
                currentFilename={step.code.filename}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                💡 다음 <strong>Part III. 핵심 패턴</strong>에서는 Agent의 핵심 패턴(CoT / ReAct / Tool Use)을 자세히 다룹니다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Hallucination', 'Knowledge Cutoff', 'No Action', 'RAG', 'Tool Use', 'Agent'].map((kw) => (
                <span
                  key={kw}
                  className="bg-amber-50 text-amber-700 px-3 py-1 rounded-full text-xs font-medium border border-amber-200"
                >
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-2-2.html" className="text-amber-700 hover:text-amber-900 font-medium">
                &larr; II-2-2. API 호출 기본
              </a>
              <a href="../part3/III-1-1.html" className="text-amber-700 hover:text-amber-900 font-medium">
                Part III. 핵심 패턴 &rarr;
              </a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
