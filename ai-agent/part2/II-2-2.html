            '"""л№„мҡ© лӘЁлӢҲн„°л§Ғ вҖ” usage нҶ нҒ° Г— лӢЁк°Җ вҶ’ лҲ„м Ғ н•©кі„ (examples/cost-track.py)"""',
            'from datetime import date',
            'from openai import OpenAI',
            '',
            'client = OpenAI()',
            '',
            '# лӢЁк°Җн‘ң ($ / 1M tokens) вҖ” 2025л…„ кё°мӨҖ мҳҲмӢң (мӢӨм ң к°ҖкІ©мқҖ кіөмӢқ л¬ём„ң м°ёкі )',
            'PRICE_TABLE = {',
            '    "gpt-4o":      {"input": 2.50, "output": 10.00},',
            '    "gpt-4o-mini": {"input": 0.15, "output": 0.60},',
            '    "o1-mini":     {"input": 3.00, "output": 12.00},',
            '}',
            '',
            'def calc_cost(usage, model: str) -> float:',
            '    """мқҙ нҳём¶ң 1нҡҢмқҳ USD л№„мҡ©мқ„ л°ҳнҷҳ."""',
            '    p = PRICE_TABLE[model]',
            '    return (',
            '        usage.prompt_tokens     * p["input"]  / 1_000_000 +',
            '        usage.completion_tokens * p["output"] / 1_000_000',
            '    )',
            '',
            '# мқјлі„ лҲ„м Ғ вҖ” мӢӨм ңлЎңлҠ” DB/Redisм—җ м ҖмһҘ',
            'daily_cost = {date.today(): 0.0}',
            '',
            'def call_and_track(messages, model="gpt-4o-mini"):',
            '    response = client.chat.completions.create(',
            '        model=model, messages=messages, max_tokens=512',
            '    )',
            '    cost = calc_cost(response.usage, model)',
            '    daily_cost[date.today()] += cost',
            '    print(f"мқҙлІҲ нҳём¶ң: ${cost:.6f} | мҳӨлҠҳ лҲ„м Ғ: ${daily_cost[date.today()]:.4f}")',
            '    return response',
            '',
            '# мӮ¬мҡ©',
            'call_and_track([{"role": "user", "content": "нҢҢмҠӨнғҖ л ҲмӢңн”ј"}])',
            '',
            '# н•өмӢ¬:',
            '#   - usageлҠ” лӘЁл“  мқ‘лӢө к°қмІҙм—җ нҸ¬н•Ё (streamingмқҖ мҳөм…ҳ н•„мҡ”)',
            '#   - лӢЁк°ҖлҠ” input/outputмқҙ лӢӨлҘҙлӢӨ (outputмқҙ 4~5л°° л№„мҢҲ)',
            '#   - prompt cache мӮ¬мҡ© мӢң cached_tokens лӢЁк°ҖлҠ” лҚ” м Җл ҙ',
            '#',
            '# мҡҙмҳҒ нҢЁн„ҙ:',
            '#   - user_id лі„ мқј/мӣ” quota вҶ’ мҙҲкіј мӢң м°ЁлӢЁ',
            '#   - лӘЁлҚёлі„ cost dashboard (Grafana л“ұ)лЎң м•ҢлһҢ',
          ],
          highlight: [8, 9, 10, 11, 12, 14, 15, 16, 17, 18, 19, 20, 29, 30, 31],
        },
      },
    ];

    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // API Sequence Diagram (Client вҶ’ API вҶ’ Response)
    //   - sequence мў…лҘҳм—җ л”°лқј м–ҙлҠҗ лӢЁкі„к°Җ нҷңм„ұмқём§Җ н‘ңмӢң
    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function ApiSequence({ sequence, retryCount, retryStatus }) {
      const w = 380;
      const h = 240;

      // нҷңм„ұ нҷ”мӮҙн‘ң кІ°м •
      const activeArrows = {
        request:    ['req'],
        response:   ['req', 'res'],
        streaming:  ['req', 'stream'],
        retry:      ['req', 'fail', 'retry', 'res'],
        billing:    ['req', 'res', 'bill'],
      }[sequence] || [];

      const isActive = (id) => activeArrows.includes(id);

      // x мўҢн‘ң
      const xClient = 70;
      const xApi    = 310;

      return (
        <div className="rounded-lg bg-gradient-to-br from-amber-50 to-orange-100 border border-amber-300 p-2">
          <div className="text-[11px] font-bold text-amber-900 mb-1 flex items-center gap-1">
            <span>рҹ”„</span>
            <span>API Sequence Diagram</span>
          </div>
          <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
            <defs>
              <marker id="seq-arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
                <path d="M0,0 L10,5 L0,10 Z" fill="#b45309" />
              </marker>
              <marker id="seq-arrow-active" markerWidth="11" markerHeight="11" refX="10" refY="5.5" orient="auto">
                <path d="M0,0 L11,5.5 L0,11 Z" fill="#d97706" />
              </marker>
              <marker id="seq-arrow-fail" markerWidth="11" markerHeight="11" refX="10" refY="5.5" orient="auto">
                <path d="M0,0 L11,5.5 L0,11 Z" fill="#dc2626" />
              </marker>
            </defs>

            {/* Lifeline л°•мҠӨ (мғҒлӢЁ) */}
            <rect x={xClient - 45} y={10} width="90" height="28" rx="4"
                  fill="#fef3c7" stroke="#d97706" strokeWidth="2" />
            <text x={xClient} y={28} textAnchor="middle" fontSize="11"
                  fontWeight="bold" fill="#78350f" fontFamily="monospace">Client</text>

            <rect x={xApi - 45} y={10} width="90" height="28" rx="4"
                  fill="#fef3c7" stroke="#d97706" strokeWidth="2" />
            <text x={xApi} y={28} textAnchor="middle" fontSize="11"
                  fontWeight="bold" fill="#78350f" fontFamily="monospace">LLM API</text>

            {/* Lifeline м җм„  (м„ёлЎң) */}
            <line x1={xClient} y1={38} x2={xClient} y2={h - 10}
                  stroke="#fbbf24" strokeWidth="1" strokeDasharray="3,3" />
            <line x1={xApi} y1={38} x2={xApi} y2={h - 10}
                  stroke="#fbbf24" strokeWidth="1" strokeDasharray="3,3" />

            {/* request нҷ”мӮҙн‘ң (кіөнҶө) */}
            <line x1={xClient} y1={60} x2={xApi - 8} y2={60}
                  stroke={isActive('req') ? '#d97706' : '#fde68a'}
                  strokeWidth={isActive('req') ? 2.5 : 1.5}
                  markerEnd={isActive('req') ? 'url(#seq-arrow-active)' : 'url(#seq-arrow)'} />
            <text x={(xClient + xApi) / 2} y={55} textAnchor="middle" fontSize="10"
                  fontWeight={isActive('req') ? 'bold' : 'normal'}
                  fill={isActive('req') ? '#92400e' : '#a8a29e'} fontFamily="monospace">
              create(messages)
            </text>

            {/* response (лӢЁмҲң) */}
            {sequence === 'response' && (
              <>
                <line x1={xApi} y1={100} x2={xClient + 8} y2={100} stroke="#d97706" strokeWidth="2.5" markerEnd="url(#seq-arrow-active)" />
                <text x={(xClient + xApi) / 2} y={95} textAnchor="middle" fontSize="10" fontWeight="bold" fill="#92400e" fontFamily="monospace">response (1 chunk)</text>
              </>
            )}

            {/* streaming вҖ” м—¬лҹ¬ нҷ”мӮҙн‘ң */}
            {sequence === 'streaming' && (
              <>
                {[90, 110, 130, 150, 170, 190].map((y, i) => (
                  <line key={i} x1={xApi} y1={y} x2={xClient + 8} y2={y} stroke="#d97706" strokeWidth="2" markerEnd="url(#seq-arrow-active)" opacity={0.4 + i * 0.1} />
                ))}
                <text x={(xClient + xApi) / 2} y={85} textAnchor="middle" fontSize="9" fontWeight="bold" fill="#92400e" fontFamily="monospace">chunk Г— N (мӢӨмӢңк°„)</text>
              </>
            )}

            {/* retry вҖ” мӢӨнҢЁ вҶ’ мһ¬мӢңлҸ„ вҶ’ м„ұкіө */}
            {sequence === 'retry' && (
              <>
                <line x1={xApi} y1={85} x2={xClient + 8} y2={85} stroke="#dc2626" strokeWidth="2.5" strokeDasharray="4,2" markerEnd="url(#seq-arrow-fail)" />
                <text x={(xClient + xApi) / 2} y={80} textAnchor="middle" fontSize="9" fontWeight="bold" fill="#dc2626" fontFamily="monospace">вң— 429 RateLimit</text>
                <line x1={xClient} y1={120} x2={xApi - 8} y2={120} stroke="#d97706" strokeWidth="2.5" markerEnd="url(#seq-arrow-active)" />
                <text x={(xClient + xApi) / 2} y={115} textAnchor="middle" fontSize="9" fontWeight="bold" fill="#92400e" fontFamily="monospace">retry (л°ұмҳӨн”„ 2s)</text>
                <line x1={xApi} y1={145} x2={xClient + 8} y2={145} stroke="#dc2626" strokeWidth="2.5" strokeDasharray="4,2" markerEnd="url(#seq-arrow-fail)" />
                <text x={(xClient + xApi) / 2} y={140} textAnchor="middle" fontSize="9" fontWeight="bold" fill="#dc2626" fontFamily="monospace">вң— Timeout</text>
                <line x1={xClient} y1={180} x2={xApi - 8} y2={180} stroke="#d97706" strokeWidth="2.5" markerEnd="url(#seq-arrow-active)" />
                <text x={(xClient + xApi) / 2} y={175} textAnchor="middle" fontSize="9" fontWeight="bold" fill="#92400e" fontFamily="monospace">retry (л°ұмҳӨн”„ 4s)</text>
                <line x1={xApi} y1={205} x2={xClient + 8} y2={205} stroke="#15803d" strokeWidth="2.5" markerEnd="url(#seq-arrow-active)" />
                <text x={(xClient + xApi) / 2} y={200} textAnchor="middle" fontSize="9" fontWeight="bold" fill="#15803d" fontFamily="monospace">вң“ 200 OK</text>
              </>
            )}

            {/* billing вҖ” мқ‘лӢө + usage */}
            {sequence === 'billing' && (
              <>
                <line x1={xApi} y1={100} x2={xClient + 8} y2={100} stroke="#d97706" strokeWidth="2.5" markerEnd="url(#seq-arrow-active)" />
                <text x={(xClient + xApi) / 2} y={95} textAnchor="middle" fontSize="10" fontWeight="bold" fill="#92400e" fontFamily="monospace">response + usage</text>
                <rect x={xClient - 50} y={140} width="100" height="60" rx="6" fill="#fef3c7" stroke="#d97706" strokeWidth="2" />
                <text x={xClient} y={158} textAnchor="middle" fontSize="9" fontWeight="bold" fill="#78350f" fontFamily="monospace">рҹ’° мҳҒмҲҳмҰқ</text>
                <text x={xClient} y={174} textAnchor="middle" fontSize="9" fill="#78350f" fontFamily="monospace">in: 1,240</text>
                <text x={xClient} y={188} textAnchor="middle" fontSize="9" fill="#78350f" fontFamily="monospace">out: 856</text>
              </>
            )}

            {/* request вҖ” pending мҠӨн”јл„Ҳ */}
            {sequence === 'request' && (
              <>
                <text x={xApi} y={110} textAnchor="middle" fontSize="11" fontWeight="bold" fill="#92400e" fontFamily="monospace">вҸі processing...</text>
                <circle cx={xApi} cy={130} r="8" fill="none" stroke="#d97706" strokeWidth="2.5" strokeDasharray="6,4">
                  <animateTransform attributeName="transform" type="rotate" from={`0 ${xApi} 130`} to={`360 ${xApi} 130`} dur="1.5s" repeatCount="indefinite" />
                </circle>
              </>
            )}
          </svg>
        </div>
      );
    }

    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // Token Stream вҖ” Streaming лӢЁкі„м—җм„ң н•ң кёҖмһҗм”© лҸ„м°©н•ҳлҠ” м• лӢҲл©”мқҙм…ҳ
    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function TokenStream({ tokens }) {
      const [visibleCount, setVisibleCount] = useState(0);

      useEffect(() => {
        setVisibleCount(0);
        if (!tokens) return;
        let i = 0;
        const t = setInterval(() => {
          i += 1;
          if (i > tokens.length) {
            clearInterval(t);
            return;
          }
          setVisibleCount(i);
        }, 140);
        return () => clearInterval(t);
      }, [tokens]);

      if (!tokens) return null;

      return (
        <div className="rounded-lg bg-slate-900 border border-amber-300 p-3 mt-2 shadow-inner">
          <div className="flex items-center justify-between mb-1.5">
            <div className="text-[10px] font-bold text-amber-300 font-mono uppercase tracking-wider">
              рҹ“Ў Streaming Output
            </div>
            <div className="text-[9px] text-amber-200 font-mono">
              {visibleCount} / {tokens.length} tokens
            </div>
          </div>
          <div className="font-mono text-sm text-amber-100 min-h-[2.5rem] leading-relaxed">
            {tokens.slice(0, visibleCount).join('')}
            {visibleCount < tokens.length && (
              <span className="inline-block w-2 h-4 bg-amber-300 ml-0.5 align-middle animate-pulse" />
            )}
            {visibleCount === tokens.length && (
              <span className="text-emerald-400 ml-2">вң“ done</span>
            )}
          </div>
        </div>
      );
    }

    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // Retry Counter вҖ” Step 4 мӢңлҸ„ нҡҹмҲҳ мӢңк°Ғнҷ”
    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function RetryCounter({ count, status }) {
      if (count === 0) return null;
      const attempts = Array.from({ length: count }, (_, i) => i + 1);

      return (
        <div className="rounded-lg bg-amber-50 border-2 border-amber-300 p-3 mt-2">
          <div className="flex items-center justify-between mb-2">
            <div className="text-[10px] font-bold text-amber-900 font-mono uppercase tracking-wider">
              рҹ”Ғ Retry Counter
            </div>
            <div className="text-[10px] text-amber-700 font-mono">
              л°ұмҳӨн”„: 1s вҶ’ 2s вҶ’ 4s
            </div>
          </div>
          <div className="flex items-center gap-2">
            {attempts.map((n) => {
              const isLast = n === count;
              const success = isLast && status === 'success';
              return (
                <div key={n} className="flex items-center gap-1">
                  <div
                    className={`w-9 h-9 rounded-full flex items-center justify-center text-xs font-bold border-2 ${
                      success
                        ? 'bg-emerald-500 border-emerald-700 text-white'
                        : 'bg-red-100 border-red-400 text-red-700'
                    }`}
                  >
                    {success ? 'вң“' : 'вң—'}
                  </div>
                  {n < count && <div className="text-amber-400 text-lg">вҶ’</div>}
                </div>
              );
            })}
            <div className="ml-auto text-xs font-mono text-amber-900">
              мҙқ {count}нҡҢ мӢңлҸ„ В· {status === 'success' ? 'м„ұкіө' : 'м§„н–үмӨ‘'}
            </div>
          </div>
        </div>
      );
    }

    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // Parsed Response Card вҖ” Step 2 мқ‘лӢө л¶„н•ҙ
    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function ParsedCard({ parsed }) {
      if (!parsed) return null;
      const rows = [
        { k: 'choices',         v: parsed.choices,        color: 'text-amber-700' },
        { k: 'message.role',    v: parsed.role,           color: 'text-amber-700' },
        { k: 'message.content', v: parsed.content,        color: 'text-slate-800' },
        { k: 'finish_reason',   v: parsed.finishReason,   color: 'text-emerald-700' },
        { k: 'model',           v: parsed.model,          color: 'text-slate-700' },
        { k: 'usage.prompt',    v: `${parsed.inputTokens} tokens`,  color: 'text-amber-700' },
        { k: 'usage.completion',v: `${parsed.outputTokens} tokens`, color: 'text-amber-700' },
      ];
      return (
        <div className="rounded-lg bg-white border-2 border-amber-300 overflow-hidden mt-2">
          <div className="bg-amber-100 px-3 py-1.5 border-b border-amber-200">
            <div className="text-xs font-bold text-amber-900 font-mono">рҹ“Ұ Response Object</div>
          </div>
          <table className="w-full text-[11px]">
            <tbody>
              {rows.map((r, i) => (
                <tr key={r.k} className={i % 2 === 0 ? 'bg-white' : 'bg-amber-50/40'}>
                  <td className="px-3 py-1.5 font-mono text-slate-500 w-2/5 border-r border-slate-100">
                    {r.k}
                  </td>
                  <td className={`px-3 py-1.5 font-mono font-semibold ${r.color}`}>{r.v}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // Cost Card вҖ” Step 5 л№„мҡ© лӘЁлӢҲн„°л§Ғ
    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function CostCard({ usage }) {
      if (!usage) return null;
      const inputCost  = (usage.input  * usage.inputPrice)  / 1_000_000;
      const outputCost = (usage.output * usage.outputPrice) / 1_000_000;
      const total = inputCost + outputCost;

      return (
        <div className="rounded-lg bg-white border-2 border-amber-300 overflow-hidden mt-2 shadow-sm">
          <div className="bg-amber-100 px-3 py-1.5 border-b border-amber-200 flex items-center justify-between">
            <div className="text-xs font-bold text-amber-900 font-mono">рҹ’° л№„мҡ© мҳҒмҲҳмҰқ</div>
            <div className="text-[10px] text-amber-700 font-mono">{usage.model}</div>
          </div>
          <table className="w-full text-[11px]">
            <thead>
              <tr className="bg-amber-50">
                <th className="px-3 py-1.5 text-left font-bold text-amber-900">н•ӯлӘ©</th>
                <th className="px-3 py-1.5 text-right font-bold text-amber-900">tokens</th>
                <th className="px-3 py-1.5 text-right font-bold text-amber-900">лӢЁк°Җ/1M</th>
                <th className="px-3 py-1.5 text-right font-bold text-amber-900">USD</th>
              </tr>
            </thead>
            <tbody>
              <tr className="bg-white">
                <td className="px-3 py-1.5 font-mono text-slate-700">мһ…л Ҙ</td>
                <td className="px-3 py-1.5 font-mono text-right text-slate-700">{usage.input.toLocaleString()}</td>
                <td className="px-3 py-1.5 font-mono text-right text-slate-700">${usage.inputPrice.toFixed(2)}</td>
                <td className="px-3 py-1.5 font-mono text-right text-amber-800 font-semibold">${inputCost.toFixed(6)}</td>
              </tr>
              <tr className="bg-amber-50/40">
                <td className="px-3 py-1.5 font-mono text-slate-700">м¶ңл Ҙ</td>
                <td className="px-3 py-1.5 font-mono text-right text-slate-700">{usage.output.toLocaleString()}</td>
                <td className="px-3 py-1.5 font-mono text-right text-slate-700">${usage.outputPrice.toFixed(2)}</td>
                <td className="px-3 py-1.5 font-mono text-right text-amber-800 font-semibold">${outputCost.toFixed(6)}</td>
              </tr>
              <tr className="bg-amber-100 border-t-2 border-amber-300">
                <td colSpan="3" className="px-3 py-1.5 font-mono text-right font-bold text-amber-900">мқҙлІҲ нҳём¶ң н•©кі„</td>
                <td className="px-3 py-1.5 font-mono text-right font-bold text-amber-900">${total.toFixed(6)}</td>
              </tr>
              <tr className="bg-amber-200/60">
                <td colSpan="3" className="px-3 py-1.5 font-mono text-right font-bold text-amber-900">рҹ“… мҳӨлҠҳ лҲ„м Ғ</td>
                <td className="px-3 py-1.5 font-mono text-right font-bold text-amber-900">${usage.totalCost.toFixed(4)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      );
    }

    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // LiveDataPane вҖ” мўҢмёЎ л©”мқё мӢңк°Ғнҷ”
    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">рҹҚқ мӢқлӢ№ мЈјл¬ём„ң вҖ” LLM API нҳём¶ң нқҗлҰ„</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* мӢңнҖҖмҠӨ лӢӨмқҙм–ҙк·ёлһЁ */}
          <ApiSequence
            sequence={step.sequence}
            retryCount={step.retryCount}
            retryStatus={step.retryStatus}
          />

          {/* лӢЁкі„лі„ ліҙмЎ° мӢңк°Ғнҷ” */}
          <TokenStream tokens={step.tokens} />
          <RetryCounter count={step.retryCount} status={step.retryStatus} />
          <ParsedCard parsed={step.parsed} />
          <CostCard usage={step.usage} />

          {/* лІ”лЎҖ */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: '#d97706' }}></span>
              нҷңм„ұ лӢЁкі„
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-0.5" style={{ background: '#dc2626' }}></span>
              мӢӨнҢЁ/мһ¬мӢңлҸ„
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-0.5" style={{ background: '#15803d' }}></span>
              м„ұкіө
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2.5 h-2.5 rounded-full bg-amber-200"></span>
              лҢҖкё°
            </span>
          </div>
        </div>
      );
    }

    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // VSCode мҠӨнғҖмқј CodeViewer вҖ” highlight.js
    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* мңҲлҸ„мҡ° dot + нҢҢмқј нғӯ */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs нҶ нҒ°нҷ”мҡ© hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* мӢӨм ң л ҢлҚ”л§Ғ вҖ” лқјмқё лІҲнҳё + к°•мЎ° лқјмқё */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* н‘ён„° */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // App л©”мқё
    // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* мғҒлӢЁ л„Өл№„ */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; н—ҲлёҢлЎң</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-2-2</span>
            </nav>

            {/* н—ӨлҚ” */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. LLM кё°мҙҲ &gt; Chapter 2. н”„лЎ¬н”„нҠё м—”м§ҖлӢҲм–ҙл§Ғ</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-2-2. API нҳём¶ң кё°ліё</h1>
                  <p className="text-sm text-slate-500 mt-0.5">OpenAI/Anthropic SDK В· мқ‘лӢө нҢҢмӢұ В· streaming В· error handling В· л№„мҡ© лӘЁлӢҲн„°л§Ғ</p>
                </div>
              </div>
            </header>

            {/* мўҢ/мҡ° 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* л§Ҳм§Җл§ү лӢЁкі„ alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                рҹ’Ў лӢӨмқҢ(II-3-1)м—җм„ңлҠ” LLMмқҳ н•ңкі„ вҖ” <strong>нҷҳк°Ғ, м§ҖмӢқ лӢЁм Ҳ, н–үлҸҷ л¶Ҳк°Җ</strong>лҘј лӢӨлЈ¬лӢӨ.
                Agentк°Җ мҷң н•„мҡ”н•ңм§Җм—җ лҢҖн•ң лҸҷкё°лЎң мқҙм–ҙм§„лӢӨ.
              </div>
            )}

            {/* м„ӨлӘ… нҢЁл„җ */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} В· {step.title}
                </h3>
                <span className="text-xs text-amber-200">нӮӨліҙл“ң &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* м»ЁнҠёлЎӨ 4 лІ„нҠј */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="мІҳмқҢмңјлЎң"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                мІҳмқҢ
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="мқҙм „ лӢЁкі„"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; мқҙм „
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? 'мһҗлҸҷ мһ¬мғқ м •м§Җ' : 'мһҗлҸҷ мһ¬мғқ мӢңмһ‘'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[100px]"
              >
                {isPlaying ? 'вҸё м •м§Җ' : (stepIdx >= STEPS.length - 1 ? 'вҶ» лӢӨмӢңліҙкё°' : 'в–¶ мһҗлҸҷмһ¬мғқ')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="лӢӨмқҢ лӢЁкі„"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                лӢӨмқҢ &rarr;
              </button>
            </div>

            {/* нӮӨмӣҢл“ң м№© */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['client', 'messages', 'choices', 'finish_reason', 'stream=True', 'RateLimitError', 'usage', 'cost'].map(kw => (
                <span key={kw} className="bg-amber-50 text-amber-800 px-3 py-1 rounded-full text-xs font-mono border border-amber-200">{kw}</span>
              ))}
            </div>

            {/* мқҙм „/лӢӨмқҢ мһҗлЈҢ л„Өл№„ */}
            <nav className="flex justify-between text-sm pt-2 border-t border-slate-200">
              <a href="./II-2-1.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; II-2-1. н”„лЎ¬н”„нҠё кө¬мЎ°</a>
              <a href="./II-3-1.html" className="text-amber-700 hover:text-amber-900 font-medium">II-3-1. нҷҳк°Ғ, м§ҖмӢқ лӢЁм Ҳ, н–үлҸҷ л¶Ҳк°Җ &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
