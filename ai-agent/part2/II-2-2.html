<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent 학습 — II-2-2. API 호출 기본</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CODE_LINES = [
      'import anthropic',
      '',
      'client = anthropic.Anthropic(',
      '    api_key="sk-ant-..."     # 신용카드(인증)',
      ')',
      '',
      'response = client.messages.create(',
      '    model="claude-sonnet-4-20250514",  # 메뉴(모델)',
      '    max_tokens=1024,          # 최대 분량',
      '    messages=[               # 요청사항',
      '        {',
      '            "role": "user",',
      '            "content": "파스타 레시피 알려줘"',
      '        }',
      '    ]',
      ')',
      '',
      'print(response.content[0].text)',
    ];

    const STEPS = [
      { desc: "[식당 주문서] API 호출은 식당에서 주문하는 것과 같습니다. 메뉴(model), 요청사항(messages), 추가옵션(max_tokens), 신용카드(api_key)가 필요합니다.", highlightLines: [], flowState: 'ready' },
      { desc: "[1. API 키 — 신용카드] API 키는 인증과 과금에 사용됩니다. 이것 없이는 주문(API 호출)을 할 수 없습니다.", highlightLines: [2, 3, 4], flowState: 'auth' },
      { desc: "[2. 모델 선택 — 메뉴 고르기] 어떤 모델을 쓸지 선택합니다. claude-sonnet-4-20250514, gpt-4o 등. 모델마다 성능과 가격이 다릅니다.", highlightLines: [7], flowState: 'model' },
      { desc: "[3. 메시지 — 주문 내용] System/User/Assistant 메시지를 배열로 전달합니다. 이전 단계에서 배운 구조 그대로입니다.", highlightLines: [9, 10, 11, 12, 13, 14], flowState: 'messages' },
      { desc: "[4. 응답 수신] 요리(응답)가 나왔습니다! response 객체에서 텍스트를 추출합니다. 요청 → 응답, 이것이 LLM API의 전부입니다.", highlightLines: [17], flowState: 'response' },
    ];

    const FLOW_ITEMS = [
      { id: 'client', label: '개발자\n(주문자)', icon: '👨‍💻' },
      { id: 'request', label: 'API 요청\n(주문서)', icon: '📋' },
      { id: 'server', label: 'LLM 서버\n(주방)', icon: '🏭' },
      { id: 'response', label: 'API 응답\n(요리)', icon: '🍝' },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      const flowActiveIdx = { ready: -1, auth: 0, model: 1, messages: 1, response: 3 }[stepData.flowState];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-sky-700 hover:text-sky-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. LLM 기초 &gt; Chapter 2. 프롬프트 엔지니어링</div>
                  <h1 className="text-2xl font-bold text-slate-800">II-2-2. API 호출 기본</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>식당 주문서</b>와 같습니다. 메뉴(model), 요청사항(messages), 추가옵션(max_tokens)을 보내면 응답(요리)이 돌아옵니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-sky-700 border-sky-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">API 호출 흐름</h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 좌우 분할: 흐름 다이어그램 + 코드 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              {/* 왼쪽: 요청/응답 흐름 */}
              <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                <div className="text-xs font-bold text-slate-500 uppercase mb-4">요청 → 응답 흐름</div>
                <div className="flex flex-col items-center gap-3">
                  {FLOW_ITEMS.map((item, i) => (
                    <React.Fragment key={item.id}>
                      <div className={`w-full p-3 rounded-xl border-2 flex items-center gap-3 transition-all duration-500 ${i <= flowActiveIdx ? 'bg-sky-50 border-sky-300 scale-105' : 'border-slate-100 bg-slate-50 opacity-40'}`}>
                        <span className="text-2xl">{item.icon}</span>
                        <span className="text-sm font-bold text-slate-700 whitespace-pre-line">{item.label}</span>
                      </div>
                      {i < FLOW_ITEMS.length - 1 && (
                        <div className={`text-xl transition-all ${i < flowActiveIdx ? 'text-sky-500' : 'text-slate-200'}`}>↓</div>
                      )}
                    </React.Fragment>
                  ))}
                </div>
              </div>

              {/* 오른쪽: Python 코드 */}
              <div className="bg-slate-900 rounded-xl p-4 overflow-x-auto">
                <div className="text-xs text-slate-500 mb-2 font-mono">Python — Anthropic SDK</div>
                {CODE_LINES.map((line, i) => {
                  const isHighlighted = stepData.highlightLines.includes(i);
                  const isComment = line.includes('#');
                  return (
                    <div key={i} className={`font-mono text-sm px-2 py-0.5 rounded transition-all duration-300 ${isHighlighted ? 'bg-sky-900 bg-opacity-50' : ''}`}>
                      <span className="text-slate-600 mr-3 select-none w-5 inline-block text-right">{i + 1}</span>
                      {isComment ? (
                        <>
                          <span className={isHighlighted ? 'text-sky-300' : 'text-slate-400'}>{line.split('#')[0]}</span>
                          <span className="text-emerald-500">#{line.split('#')[1]}</span>
                        </>
                      ) : (
                        <span className={isHighlighted ? 'text-sky-300' : 'text-slate-400'}>{line}</span>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['API Key', 'model', 'messages', 'max_tokens', 'response'].map(kw => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-sm font-medium border border-sky-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-sky-600 hover:bg-sky-700">{isPlaying ? <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</> : <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>}</button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="text-sm text-slate-500 flex justify-between">
              <a href="./II-2-1.html" className="text-sky-600 hover:text-sky-800 font-medium">← II-2-1. 프롬프트 구조</a>
              <a href="./II-3-1.html" className="text-sky-600 hover:text-sky-800 font-medium">II-3-1. 환각, 지식 단절, 행동 불가 →</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
