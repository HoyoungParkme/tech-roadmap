<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent 학습 — II-1-2. 토큰과 컨텍스트 윈도우</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TOKEN_EXAMPLES = [
      { text: 'Hello', tokens: ['Hello'], count: 1, lang: '영어' },
      { text: 'beautiful', tokens: ['beaut', 'iful'], count: 2, lang: '영어' },
      { text: '안녕하세요', tokens: ['안녕', '하', '세요'], count: 3, lang: '한국어' },
      { text: 'AI Agent', tokens: ['AI', ' Agent'], count: 2, lang: '영어' },
    ];

    const WINDOW_ITEMS = [
      { label: 'System 메시지', size: 500, color: 'bg-violet-400' },
      { label: '대화 이력', size: 2000, color: 'bg-sky-400' },
      { label: '도구 결과', size: 1500, color: 'bg-amber-400' },
      { label: '현재 질문', size: 200, color: 'bg-emerald-400' },
      { label: '응답 공간', size: 800, color: 'bg-rose-400' },
    ];
    const WINDOW_TOTAL = WINDOW_ITEMS.reduce((s, i) => s + i.size, 0);

    const STEPS = [
      { desc: "[토큰이란?] LLM이 처리하는 텍스트의 최소 단위가 토큰입니다. 단어보다 작을 수도, 같을 수도 있습니다. LLM은 문자가 아니라 토큰 단위로 읽고 씁니다.", showTokens: false, showWindow: false, showModels: false },
      { desc: "[토큰 분해] 영어는 짧은 단어가 1토큰이지만, 긴 단어는 2개로 쪼개집니다. 한국어는 같은 뜻이라도 토큰을 더 많이 씁니다. \"안녕하세요\" = 3토큰!", showTokens: true, showWindow: false, showModels: false },
      { desc: "[컨텍스트 윈도우] LLM의 \"책상 크기\"입니다. 이 안에 시스템 메시지, 대화 이력, 도구 결과, 현재 질문, 응답 공간이 모두 들어가야 합니다.", showTokens: false, showWindow: true, showModels: false },
      { desc: "[책상이 꽉 차면?] 토큰이 윈도우를 초과하면 오래된 대화를 잘라내야 합니다. Agent가 긴 작업을 하면 컨텍스트 관리가 중요해집니다.", showTokens: false, showWindow: true, showModels: true },
      { desc: "[모델별 윈도우] GPT-4o: 128K, Claude: 200K, Gemini: 1M 토큰. 윈도우가 클수록 더 많은 맥락을 한 번에 볼 수 있습니다.", showTokens: false, showWindow: false, showModels: true },
    ];

    const MODELS = [
      { name: 'GPT-4o', tokens: '128K', width: 32, color: 'bg-emerald-500' },
      { name: 'Claude 3.5', tokens: '200K', width: 50, color: 'bg-violet-500' },
      { name: 'Gemini 1.5', tokens: '1M', width: 100, color: 'bg-sky-500' },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-sky-700 hover:text-sky-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-sky-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. LLM 기초 &gt; Chapter 1. LLM이란</div>
                  <h1 className="text-2xl font-bold text-slate-800">II-1-2. 토큰과 컨텍스트 윈도우</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>책상 크기</b>를 생각해보세요. 책상이 크면 많은 서류를 펼쳐놓고 동시에 볼 수 있습니다. 컨텍스트 윈도우 = LLM의 책상 크기.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-sky-700 border-sky-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-sky-200">토큰 & 컨텍스트</h3>
                <span className="text-xs text-sky-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 space-y-6">
              {/* 토큰 분해 예시 */}
              {stepData.showTokens && (
                <div>
                  <div className="text-xs font-bold text-slate-500 uppercase mb-3">토큰 분해 예시</div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    {TOKEN_EXAMPLES.map((ex, i) => (
                      <div key={i} className="bg-slate-50 rounded-lg p-3 flex items-center gap-3">
                        <span className="text-sm font-mono bg-white border border-slate-200 px-2 py-1 rounded">{ex.text}</span>
                        <span className="text-slate-400">→</span>
                        <div className="flex gap-1">
                          {ex.tokens.map((t, j) => (
                            <span key={j} className="bg-sky-100 text-sky-800 px-2 py-1 rounded text-sm font-mono border border-sky-200">{t}</span>
                          ))}
                        </div>
                        <span className="text-xs text-slate-500 ml-auto">{ex.count}토큰 ({ex.lang})</span>
                      </div>
                    ))}
                  </div>
                  <div className="mt-3 text-sm text-amber-700 bg-amber-50 border border-amber-200 rounded-lg p-3">💡 한국어는 영어보다 토큰을 2~3배 더 소비합니다</div>
                </div>
              )}

              {/* 컨텍스트 윈도우 */}
              {stepData.showWindow && (
                <div>
                  <div className="text-xs font-bold text-slate-500 uppercase mb-3">컨텍스트 윈도우 = 책상 크기</div>
                  <div className="bg-slate-100 rounded-xl p-4 border-2 border-dashed border-slate-300">
                    <div className="flex h-12 rounded-lg overflow-hidden gap-0.5">
                      {WINDOW_ITEMS.map((item, i) => (
                        <div key={i} className={`${item.color} flex items-center justify-center text-white text-xs font-bold transition-all duration-500`} style={{width: `${(item.size / WINDOW_TOTAL) * 100}%`}}>
                          {(item.size / WINDOW_TOTAL) * 100 > 10 ? item.label : ''}
                        </div>
                      ))}
                    </div>
                    <div className="flex justify-between mt-2">
                      {WINDOW_ITEMS.map((item, i) => (
                        <div key={i} className="text-center" style={{width: `${(item.size / WINDOW_TOTAL) * 100}%`}}>
                          <div className="text-[10px] text-slate-500">{item.label}</div>
                          <div className="text-[10px] text-slate-400">{item.size}토큰</div>
                        </div>
                      ))}
                    </div>
                    <div className="text-center text-xs text-slate-500 mt-3 border-t border-slate-200 pt-2">총 {WINDOW_TOTAL.toLocaleString()}토큰 / 최대 128K~200K</div>
                  </div>
                </div>
              )}

              {/* 모델별 비교 */}
              {stepData.showModels && (
                <div>
                  <div className="text-xs font-bold text-slate-500 uppercase mb-3">모델별 컨텍스트 윈도우</div>
                  <div className="space-y-3">
                    {MODELS.map((m, i) => (
                      <div key={i} className="flex items-center gap-3">
                        <span className="text-sm font-bold text-slate-700 w-24">{m.name}</span>
                        <div className="flex-1 h-8 bg-slate-100 rounded-full overflow-hidden">
                          <div className={`h-full ${m.color} rounded-full transition-all duration-700 flex items-center justify-end pr-3`} style={{width: `${m.width}%`}}>
                            <span className="text-xs text-white font-bold">{m.tokens}</span>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {!stepData.showTokens && !stepData.showWindow && !stepData.showModels && (
                <div className="text-center py-8">
                  <div className="text-6xl mb-4">🧩</div>
                  <div className="text-lg font-bold text-slate-700">토큰 = LLM이 읽는 최소 단위</div>
                  <div className="text-sm text-slate-500 mt-1">단어보다 작을 수도, 같을 수도 있습니다</div>
                </div>
              )}
            </div>

            <div className="flex flex-wrap gap-2">
              {['토큰', '컨텍스트 윈도우', '토큰 제한', '토큰화'].map(kw => (
                <span key={kw} className="bg-sky-50 text-sky-700 px-3 py-1 rounded-full text-sm font-medium border border-sky-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-sky-600 hover:bg-sky-700">{isPlaying ? <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</> : <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>}</button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="text-sm text-slate-500 flex justify-between">
              <a href="./II-1-1.html" className="text-sky-600 hover:text-sky-800 font-medium">← II-1-1. LLM의 작동 원리</a>
              <a href="./II-2-1.html" className="text-sky-600 hover:text-sky-800 font-medium">II-2-1. 프롬프트 구조 →</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
