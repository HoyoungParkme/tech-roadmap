    function TokenBreakdown({ tokens }) {

    // ─────────────────────────────────────────────────────
    // 윈도우 막대 시각화 (Step 3, 4, 5)
    //   - 누적 사용량 / DEMO_LIMIT(128K) 비율로 막대 채움
    //   - overflow=true면 빨간 알람 + 잘려나간 영역 표시
    // ─────────────────────────────────────────────────────
    function ContextWindowBar({ usage, overflow }) {
      const total = usage.reduce((s, u) => s + u.size, 0);
      const limit = DEMO_LIMIT;
      const pct = Math.min(100, (total / limit) * 100);
      const overPct = overflow ? Math.min(40, ((total - limit) / limit) * 100) : 0;
      const isCritical = pct >= 95;

      return (
        <div className="rounded-lg bg-gradient-to-br from-amber-50 to-amber-100 border border-amber-200 p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="text-[11px] font-bold text-amber-800 flex items-center gap-1">
              <span>📏</span>
              <span>컨텍스트 윈도우 (GPT-4o · 128,000 토큰)</span>
            </div>
            <div className={`text-[11px] font-mono font-bold px-2 py-0.5 rounded ${
              overflow ? 'bg-red-600 text-white' : isCritical ? 'bg-amber-500 text-white' : 'bg-emerald-500 text-white'
            }`}>
              {total.toLocaleString()} / {limit.toLocaleString()}
            </div>
          </div>

          {/* 막대 본체 */}
          <div className="relative bg-slate-200 rounded-lg h-12 overflow-hidden border-2 border-slate-300">
            <div className="flex h-full">
              {usage.map((u, i) => {
                const w = (u.size / limit) * 100;
                const showLabel = w > 6;
                return (
                  <div
                    key={i}
                    className="flex items-center justify-center text-white text-[10px] font-bold transition-all duration-700 border-r border-white/40"
                    style={{ width: `${Math.min(100, w)}%`, background: u.color }}
                    title={`${u.label}: ${u.size.toLocaleString()} tok`}
                  >
                    {showLabel ? u.label : ''}
                  </div>
                );
              })}
            </div>

            {/* 한도 라인 */}
            <div
              className="absolute top-0 bottom-0 border-l-2 border-dashed border-red-700"
              style={{ left: '100%', transform: 'translateX(-1px)' }}
            />
          </div>

          {/* 오버플로 잘린 영역 */}
          {overflow && (
            <div className="mt-2 flex items-center gap-2 bg-red-100 border-2 border-red-400 rounded-lg p-2 animate-pulse">
              <span className="text-2xl">⚠️</span>
              <div className="flex-1">
                <div className="text-xs font-bold text-red-800">
                  OVERFLOW! {(total - limit).toLocaleString()} 토큰 초과 ({Math.round(((total - limit) / limit) * 100)}%)
                </div>
                <div className="text-[10px] text-red-700 font-mono">
                  → 오래된 대화 잘림 · API 거부 (400) · Agent "기억상실" 발생
                </div>
              </div>
            </div>
          )}

          {/* 항목별 범례 */}
          <div className="mt-2 grid grid-cols-5 gap-1 text-[9px]">
            {usage.map((u, i) => (
              <div key={i} className="text-center">
                <div className="w-full h-1 rounded mb-0.5" style={{ background: u.color }}></div>
                <div className="text-slate-600 font-medium truncate">{u.label}</div>
                <div className="text-slate-400 font-mono">{u.size.toLocaleString()}</div>
              </div>
            ))}
          </div>

          {/* 사용률 % */}
          <div className="mt-2 text-center text-[10px] text-amber-700 font-mono">
            사용률 {pct.toFixed(1)}% · 응답까지 포함한 합계
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 모델별 윈도우 비교 막대 (Step 3, 5)
    // ─────────────────────────────────────────────────────
    function ModelComparison() {
      return (
        <div className="rounded-lg bg-gradient-to-br from-amber-50 to-amber-100 border border-amber-200 p-3">
          <div className="text-[11px] font-bold text-amber-800 mb-2 flex items-center gap-1">
            <span>📊</span>
            <span>모델별 컨텍스트 윈도우 (Gemini 1M 기준 100%)</span>
          </div>
          <div className="space-y-2">
            {MODELS.map((m) => (
              <div key={m.id} className="flex items-center gap-2">
                <span className="text-xs font-bold text-slate-700 w-20 truncate">{m.name}</span>
                <div className="flex-1 h-7 bg-white rounded-full overflow-hidden border border-slate-200 relative">
                  <div
                    className="h-full rounded-full transition-all duration-700 flex items-center justify-end pr-3"
                    style={{ width: `${m.relWidth}%`, background: m.color }}
                  >
                    <span className="text-[11px] text-white font-bold drop-shadow">
                      {m.label}
                    </span>
                  </div>
                </div>
                <span className="text-[10px] text-slate-500 font-mono w-14 text-right">
                  {m.limit.toLocaleString()}
                </span>
              </div>
            ))}
          </div>
          <div className="mt-2 text-[10px] text-amber-700 font-mono text-center">
            크다고 만능 X — Lost in the Middle, 비용, 지연시간 모두 함께 증가
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 대처 전략 카드 (Step 5)
    // ─────────────────────────────────────────────────────
    function StrategyCards() {
      const items = [
        {
          icon: '✂️',
          title: '청킹 (Chunking)',
          desc: '긴 문서를 1000 토큰 조각으로 자르고 100 토큰 겹치기',
          color: 'border-amber-400 bg-amber-50',
        },
        {
          icon: '📝',
          title: '요약 (Summary)',
          desc: '오래된 대화를 LLM으로 5문장 압축 (Map-Reduce)',
          color: 'border-sky-400 bg-sky-50',
        },
        {
          icon: '🔍',
          title: 'RAG 검색',
          desc: '질문마다 관련 청크 top-k만 벡터 DB에서 회수',
          color: 'border-emerald-400 bg-emerald-50',
        },
      ];
      return (
        <div className="grid grid-cols-3 gap-2 mt-3">
          {items.map((it, i) => (
            <div
              key={i}
              className={`rounded-lg border-2 p-2 ${it.color} transition-all duration-500`}
            >
              <div className="text-2xl text-center mb-1">{it.icon}</div>
              <div className="text-[11px] font-bold text-slate-800 text-center">{it.title}</div>
              <div className="text-[9px] text-slate-600 text-center mt-1 leading-tight">{it.desc}</div>
            </div>
          ))}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 단계별 시각화 컴포지션
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 책상 비유 — 토큰과 윈도우</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            {/* Step 1, 2: 토큰 분해 */}
            {step.tokens && <TokenBreakdown tokens={step.tokens} />}

            {/* Step 3, 4, 5: 윈도우 막대 */}
            {step.usage && <ContextWindowBar usage={step.usage} overflow={step.overflow} />}

            {/* Step 3, 5: 모델 비교 */}
            {step.showModels && <ModelComparison />}

            {/* Step 5: 전략 카드 */}
            {step.strategy === 'all' && <StrategyCards />}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm" style={{ background: '#a855f7' }}></span>
              System
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm" style={{ background: '#0ea5e9' }}></span>
              이력
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm" style={{ background: '#f59e0b' }}></span>
              도구/RAG
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm" style={{ background: '#10b981' }}></span>
              질문
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm" style={{ background: '#f43f5e' }}></span>
              응답
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-3 h-0.5 border-t-2 border-dashed border-red-700"></span>
              한도 라인
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. LLM 기초 &gt; Chapter 1. LLM이란</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">토큰과 컨텍스트 윈도우</h1>
                  <p className="text-sm text-slate-500 mt-0.5">책상 비유 — 입력 토큰의 한계와 overflow 대처 전략</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                💡 다음(II-2-1)에서는 <strong>프롬프트 구조</strong> — System/User/Assistant 역할과 효과적인 지시 작성법을 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['토큰', 'tiktoken', '컨텍스트 윈도우', 'overflow', '청킹', '요약', 'RAG'].map(kw => (
                <span key={kw} className="bg-amber-50 text-amber-700 px-3 py-1 rounded-full text-xs font-medium border border-amber-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-1-1.html" className="text-slate-500 hover:text-slate-700">&larr; II-1-1 LLM의 작동 원리</a>
              <a href="./II-2-1.html" className="text-amber-700 hover:text-amber-900 font-medium">II-2-1 프롬프트 구조 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
