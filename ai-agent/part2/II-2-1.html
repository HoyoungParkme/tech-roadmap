            '    # few-shot 1~3쌍',
            '    {"role": "user",      "content": example_q1},',
            '    {"role": "assistant", "content": example_a1},',
            '    # 실제 질문',
            '    {"role": "user",      "content": real_question},',
            ']',
            '```',
            '',
            '## 자주 하는 실수',
            '- ❌ system에 모든 걸 다 욱여넣기 → 토큰 낭비, 우선순위 모호',
            '- ❌ 예시를 5개 이상 → 비용은 늘고 효과는 정체',
            '- ❌ JSON 포맷만 말로 시키고 예시 없음 → 깨진 JSON 자주 옴',
            '- ❌ "최선을 다해줘" 같은 추상 지시 → 측정 불가',
            '',
            '## 다음 단계',
            '- II-2-2 API 호출 기본: temperature, max_tokens 등 호출 파라미터',
            '- III-x Tool Calling: 프롬프트로 LLM이 함수를 호출하게 만들기',
            '- IV-x Agent 패턴: ReAct, Plan-and-Execute, Reflexion',
          ],
          highlight: [3, 4, 5, 8, 9, 10, 13, 14, 15, 18, 19, 20, 28, 29, 30, 31],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 메시지 카드 — 좌측 LiveDataPane이 사용
    // ─────────────────────────────────────────────────────
    function MessageCard({ msg, idx }) {
      const meta = ROLE_META[msg.role];
      const isNew = msg.isNew;

      return (
        <div
          className={[
            'rounded-lg border-2 p-3 transition-all duration-700',
            meta.bg,
            meta.border,
            isNew ? `ring-2 ${meta.ring} ring-offset-2 shadow-md scale-[1.02]` : 'opacity-95',
          ].join(' ')}
        >
          <div className="flex items-center gap-2 mb-1.5">
            <span className="text-base leading-none">{meta.icon}</span>
            <span className={`text-[10px] font-mono font-bold uppercase tracking-wider px-2 py-0.5 rounded ${meta.badge} ${meta.badgeText}`}>
              {meta.label}
            </span>
            {msg.tag && (
              <span className="text-[10px] font-mono text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded border border-slate-200">
                {msg.tag}
              </span>
            )}
            {isNew && (
              <span className="ml-auto text-[10px] font-mono font-bold text-amber-700 bg-amber-100 px-1.5 py-0.5 rounded border border-amber-300 animate-pulse">
                NEW
              </span>
            )}
            {!isNew && (
              <span className="ml-auto text-[10px] font-mono text-slate-400">#{idx}</span>
            )}
          </div>
          <div className={`text-xs leading-relaxed font-medium whitespace-pre-line ${meta.text}`}>
            {msg.content}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — messages 배열 시각화 (스택)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step, stepIdx }) {
      const counts = step.messages.reduce(
        (acc, m) => {
          acc[m.role] = (acc[m.role] || 0) + 1;
          return acc;
        },
        { system: 0, user: 0, assistant: 0 }
      );

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700 flex items-center gap-1.5">
              <span>🎬</span>
              <span>messages 배열 — 연극 대본 누적</span>
            </h2>
            <span className="text-[10px] text-slate-400 font-mono">{step.note}</span>
          </div>

          {/* 역할별 카운트 — 상단 */}
          <div className="flex items-center gap-2 mb-3 text-[10px] font-mono">
            {Object.entries(ROLE_META).map(([role, meta]) => (
              <span
                key={role}
                className={[
                  'flex items-center gap-1 px-2 py-0.5 rounded border',
                  counts[role] > 0 ? `${meta.badge} ${meta.badgeText} border-transparent` : 'bg-slate-50 text-slate-400 border-slate-200',
                ].join(' ')}
              >
                <span>{meta.icon}</span>
                <span>{meta.label}</span>
                <span className="font-bold">{counts[role]}</span>
              </span>
            ))}
            <span className="ml-auto text-slate-500">
              total {step.messages.length}
            </span>
          </div>

          {/* 메시지 스택 */}
          <div className="space-y-2 max-h-[28rem] overflow-y-auto pr-1">
            {step.messages.map((msg, i) => (
              <MessageCard key={`${stepIdx}-${i}`} msg={msg} idx={i} />
            ))}
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            {Object.entries(ROLE_META).map(([role, meta]) => (
              <span key={role} className="flex items-center gap-1">
                <span className={`w-2.5 h-2.5 rounded-full ${meta.badge}`}></span>
                <span>{meta.icon} {meta.label} — {meta.desc}</span>
              </span>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum II-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. LLM 기초 &gt; Chapter 2. 프롬프트 엔지니어링</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-2-1. 프롬프트의 구조</h1>
                  <p className="text-sm text-slate-500 mt-0.5">연극 대본 — System(무대) + User(질문) + Assistant(응답)</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                💡 다음(II-2-2)에서는 <strong>API 호출 파라미터</strong>(temperature, max_tokens, top_p 등)로 응답을 더 정교하게 제어하는 법을 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 칩 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['system message', 'user message', 'assistant message', 'multi-turn', 'few-shot', '4 원칙'].map((kw) => (
                <span key={kw} className="bg-amber-50 text-amber-800 px-3 py-1 rounded-full text-xs font-medium border border-amber-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./II-1-2.html" className="text-slate-500 hover:text-slate-700">&larr; II-1-2 토큰과 컨텍스트 윈도우</a>
              <a href="./II-2-2.html" className="text-amber-700 hover:text-amber-900 font-medium">II-2-2 API 호출 기본 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
