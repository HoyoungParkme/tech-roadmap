            'client = OpenAI()',
            '',
            '# 1) "다음 단계 후보 N개 + 각 점수" 프롬프트',
            'def expand(node):',
            '    prompt = f"""문제: {problem}',
            '    현재: {node.text}',
            '    다음 단계 후보 3개 + 0~10 점수, JSON으로."""',
            '    res = client.chat.completions.create(',
            '        model="gpt-4o",',
            '        messages=[{"role":"user","content":prompt}],',
            '        response_format={"type": "json_object"})',
            '    return parse_branches(res)  # [{text, score}, ...]',

            '# 2) Beam search — 점수 top-k만 살리고 나머지 가지치기',
            'def search(root, depth=3, beam=2):',
            '    frontier = [root]',
            '    for _ in range(depth):',
            '        cands = [c for n in frontier for c in expand(n)]',
            '        cands.sort(key=lambda x: x.score, reverse=True)',
            '        frontier = cands[:beam]  # 가지치기',

    function TechCards({ activeTech }) {
      const techList = [TECHS.zero, TECHS.few, TECHS.sc, TECHS.tot];
      return (
        <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-3">
          {techList.map((t) => {
            const active = t.id === activeTech;
            const cls = active ? 'bg-amber-100 border-amber-500 shadow-md scale-105' : 'bg-slate-50 border-slate-200 opacity-60';
            const stat = active ? 'text-amber-700 font-mono font-bold' : 'text-slate-500 font-mono';
            return (
              <div key={t.id} className={`rounded-lg border-2 p-2 transition-all duration-500 ${cls}`}>
                <div className="flex items-center gap-1.5 mb-1">
                  <span className="text-base">{t.icon}</span>
                  <span className={`text-[11px] font-bold ${active ? 'text-amber-900' : 'text-slate-700'}`}>{t.name}</span>
                </div>
                <div className={`text-[9px] leading-tight ${active ? 'text-amber-800' : 'text-slate-500'}`}>{t.desc}</div>
                <div className="flex justify-between text-[9px] mt-1.5 pt-1.5 border-t border-amber-200">
                  <span className={stat}>{t.accuracy}%</span>
                  <span className={stat}>×{t.cost}</span>
                </div>
              </div>
            );
          })}
        </div>
      );

    function ReasoningChain({ chain }) {

      return (
        <div className="rounded-lg bg-gradient-to-br from-amber-50 to-amber-100 border border-amber-200 p-3">

            <span>추론 체인 (단일 경로)</span>
          </div>
          <div className="space-y-1.5">
            {chain.map((c, i) => {
              const isQ = c.step === 'Q';
              const isA = c.step === 'A';
              const okStyle = c.ok === false
                ? 'bg-red-100 border-red-400 text-red-900'
                : c.ok === true
                ? 'bg-emerald-50 border-emerald-300 text-emerald-900'
                : 'bg-white border-amber-300 text-amber-900';
              const labelStyle = isQ
                ? 'bg-violet-600 text-white'
                : isA
                ? c.ok ? 'bg-emerald-600 text-white' : 'bg-red-600 text-white'
                : 'bg-amber-500 text-white';
              return (
                <div key={i} className="flex items-start gap-2">
                  <div className={`rounded px-2 py-0.5 text-[10px] font-bold font-mono shrink-0 min-w-[42px] text-center ${labelStyle}`}>
                    {c.step}
                  </div>
                  <div className={`flex-1 rounded border px-2 py-1 text-[11px] font-mono ${okStyle}`}>
                    {c.text}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Self-consistency 투표 시각화 (Step 3)
    // ─────────────────────────────────────────────────────
    function VoteBoard({ votes, finalVote }) {
      if (!votes) return null;
      return (
        <div className="rounded-lg bg-gradient-to-br from-amber-50 to-amber-100 border border-amber-200 p-3">
          <div className="text-[11px] font-bold text-amber-800 mb-2 flex items-center gap-1">
            <span>🗳️</span><span>5회 호출 결과 → 다수결</span>
          </div>
          <div className="grid grid-cols-5 gap-1.5 mb-3">
            {votes.map((v) => (
              <div key={v.id} className={`rounded border-2 p-1.5 text-center transition-all duration-500 ${v.ok ? 'bg-emerald-50 border-emerald-400' : 'bg-red-50 border-red-400'}`}>
                <div className="text-[9px] text-slate-500 font-mono">호출 {v.id}</div>
                <div className={`text-[11px] font-bold font-mono ${v.ok ? 'text-emerald-800' : 'text-red-800'}`}>{v.answer}</div>
                <div className="text-[10px] mt-0.5">{v.ok ? '✓' : '✗'}</div>
              </div>
            ))}
          </div>
          {finalVote && (
            <div className="rounded-lg bg-amber-600 text-white p-2.5 flex items-center justify-between shadow-sm">
              <div>
                <div className="text-[9px] uppercase tracking-wider text-amber-200 font-bold">최종 (다수결)</div>
                <div className="text-base font-bold font-mono mt-0.5">{finalVote.answer}</div>
              </div>
              <div className="text-right">
                <div className="text-2xl font-bold font-mono">{finalVote.count}</div>
                <div className="text-[10px] text-amber-200">/ {finalVote.total} 표</div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Tree of Thoughts 트리 시각화 (Step 4)
    // ─────────────────────────────────────────────────────
    function ThoughtTree({ tree }) {
      if (!tree) return null;
      const w = 400, h = 260;
      // 라인 (root → branch, branch → leaf)
      const lines = [];
      tree.branches.forEach((b) => {
        lines.push({ x1: tree.root.x, y1: tree.root.y + 14, x2: b.x, y2: b.y - 14, picked: b.picked });
        b.leaves.forEach((l) => {
          lines.push({ x1: b.x, y1: b.y + 14, x2: l.x, y2: l.y - 14, picked: b.picked && l.picked });
        });
      });
      return (
        <div className="rounded-lg bg-gradient-to-br from-amber-50 to-amber-100 border border-amber-200 p-3">
          <div className="text-[11px] font-bold text-amber-800 mb-2 flex items-center gap-1">
            <span>🌳</span><span>추론 가지 탐색 (점수 top 채택)</span>
          </div>
          <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
            <defs>
              <pattern id="grid-tot" width="30" height="30" patternUnits="userSpaceOnUse">
                <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#fde68a" strokeWidth="0.5" />
              </pattern>
            </defs>
            <rect width={w} height={h} fill="url(#grid-tot)" />
            {lines.map((ln, i) => (
              <line key={`ln${i}`} x1={ln.x1} y1={ln.y1} x2={ln.x2} y2={ln.y2}
                stroke={ln.picked ? '#d97706' : '#cbd5e1'} strokeWidth={ln.picked ? 2.5 : 1.5}
                strokeDasharray={ln.picked ? 'none' : '4,3'} opacity={ln.picked ? 1 : 0.5} />
            ))}
            {/* 루트 */}
            <g>
              <rect x={tree.root.x - 90} y={tree.root.y - 14} width={180} height={28} rx={6}
                fill="#7c3aed" stroke="#5b21b6" strokeWidth="1.5" />
              <text x={tree.root.x} y={tree.root.y + 4} textAnchor="middle" fontSize="9"
                fontWeight="bold" fill="white" fontFamily="monospace">문제</text>
            </g>
            {/* 가지 */}
            {tree.branches.map((b) => {
              const fill = b.picked ? '#f59e0b' : '#e2e8f0';
              const stroke = b.picked ? '#b45309' : '#94a3b8';
              const tc = b.picked ? 'white' : '#475569';
              return (
                <g key={b.id}>
                  <rect x={b.x - 55} y={b.y - 14} width={110} height={28} rx={5}
                    fill={fill} stroke={stroke} strokeWidth={b.picked ? 2 : 1} />
                  <text x={b.x} y={b.y - 1} textAnchor="middle" fontSize="8.5"
                    fontWeight="bold" fill={tc} fontFamily="monospace">{b.label}</text>
                  <text x={b.x} y={b.y + 9} textAnchor="middle" fontSize="8"
                    fill={tc} fontFamily="monospace">score: {b.score}/10</text>
                </g>
              );
            })}
            {/* 리프 */}
            {tree.branches.flatMap((b) => b.leaves.map((l) => {
              const picked = b.picked && l.picked;
              const fill = picked ? '#10b981' : (b.picked ? '#fef3c7' : '#f1f5f9');
              const stroke = picked ? '#047857' : (b.picked ? '#d97706' : '#cbd5e1');
              const tc = picked ? 'white' : '#475569';
              return (
                <g key={l.id}>
                  <rect x={l.x - 60} y={l.y - 14} width={120} height={28} rx={5}
                    fill={fill} stroke={stroke} strokeWidth={picked ? 2 : 1} opacity={!b.picked ? 0.6 : 1} />
                  <text x={l.x} y={l.y - 1} textAnchor="middle" fontSize="8.5"
                    fontWeight={picked ? 'bold' : 'normal'} fill={tc} fontFamily="monospace">{l.text}</text>
                  <text x={l.x} y={l.y + 9} textAnchor="middle" fontSize="8"
                    fill={tc} fontFamily="monospace">score: {l.score}/10</text>
                  {picked && (
                    <circle cx={l.x + 55} cy={l.y - 7} r={6} fill="#fbbf24" stroke="white" strokeWidth="1.5">
                      <animate attributeName="r" from="5" to="9" dur="1.4s" repeatCount="indefinite" />
                      <animate attributeName="opacity" from="1" to="0.3" dur="1.4s" repeatCount="indefinite" />
                    </circle>
                  )}
                </g>
              );
            }))}
          </svg>
          {tree.finalAnswer && (
            <div className="mt-2 rounded bg-emerald-100 border border-emerald-400 p-2 text-center">
              <div className="text-[9px] text-emerald-700 uppercase tracking-wider font-bold">최종 채택</div>
              <div className="text-xs font-bold text-emerald-900 font-mono mt-0.5">{tree.finalAnswer}</div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 정확도 막대 비교 (Step 5)
    // ─────────────────────────────────────────────────────
    function CompareBar() {
      const techList = [TECHS.zero, TECHS.few, TECHS.sc, TECHS.tot];
      const useCases = {
        zero: '분류, FAQ 단답, 짧은 답변',
        few:  '일반 챗봇, 요약, 번역, 가벼운 추론',
        sc:   '의료/법률/금융 등 critical 도메인',
        tot:  '수학 올림피아드, 알고리즘, 게임 AI',
      };
      const renderBars = (label, icon, key, max, gradient, suffix) => (
        <div className="rounded-lg bg-white border-2 border-amber-300 p-3">
          <div className="text-xs font-bold text-amber-900 mb-2 flex items-center gap-1">
            <span>{icon}</span><span>{label}</span>
          </div>
          <div className="space-y-1.5">
            {techList.map((t) => (
              <div key={t.id} className="flex items-center gap-2">
                <div className="w-32 shrink-0 flex items-center gap-1 text-[11px]">
                  <span>{t.icon}</span>
                  <span className="font-bold text-slate-700">{t.name}</span>
                </div>
                <div className="flex-1 h-5 bg-slate-100 rounded overflow-hidden relative">
                  <div className={`h-full bg-gradient-to-r ${gradient} transition-all duration-1000 flex items-center justify-end pr-1.5`}
                    style={{ width: `${(t[key] / max) * 100}%` }}>
                    <span className="text-[10px] font-bold text-white font-mono">{suffix(t[key])}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
      return (
        <div className="space-y-3">
          {renderBars('정확도 비교 (GSM8K 수학 벤치마크 기준)', '🎯', 'accuracy', 100, 'from-amber-400 to-amber-600', (v) => `${v}%`)}
          {renderBars('비용 비교 (Zero-shot=1배 기준)', '💸', 'cost', 10, 'from-red-400 to-red-600', (v) => `×${v}`)}
          <div className="rounded-lg bg-white border-2 border-amber-300 overflow-hidden">
            <div className="bg-amber-100 px-3 py-1.5 border-b border-amber-200">
              <div className="text-xs font-bold text-amber-900">📋 실무 권장 사용처</div>
            </div>
            <table className="w-full text-[11px]">
              <tbody>
                {techList.map((t, i) => (
                  <tr key={t.id} className={i % 2 === 0 ? 'bg-white' : 'bg-amber-50/40'}>
                    <td className="px-3 py-1.5 font-bold text-amber-900 border-r border-slate-100 w-1/3">
                      {t.icon} {t.name}
                    </td>
                    <td className="px-3 py-1.5 text-slate-700 font-mono">{useCases[t.id]}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 4 카드 + (체인|투표|트리|비교)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🧠 Reasoning 4 기법 비교</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 4 기법 카드 */}
          <TechCards activeTech={step.activeTech} />

          {/* 단계별 시각화 */}
          {step.chain    && <ReasoningChain chain={step.chain} />}
          {step.votes    && <VoteBoard votes={step.votes} finalVote={step.finalVote} />}
          {step.tree     && <ThoughtTree tree={step.tree} />}
          {step.showCompare && <CompareBar />}

          {/* 범례 */}
          {!step.showCompare && (
            <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
              <span className="flex items-center gap-1">
                <span className="w-2.5 h-2.5 rounded-full bg-amber-500"></span>
                활성 기법
              </span>
              <span className="flex items-center gap-1">
                <span className="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
                정답
              </span>
              <span className="flex items-center gap-1">
                <span className="w-2.5 h-2.5 rounded-full bg-red-500"></span>
                오답
              </span>
              <span className="flex items-center gap-1 ml-auto">
                <span className="w-2.5 h-2.5 rounded-full bg-slate-300"></span>
                미사용
              </span>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 핵심 패턴 &gt; Chapter 1. Chain of Thought</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Few-shot CoT — 예시 추론을 미리 보여줌</h1>
                  <p className="text-sm text-slate-500 mt-0.5">Zero-shot · Few-shot · Self-consistency · Tree of Thoughts 4 기법 비교</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                💡 다음(III-2-1)에서는 <strong>ReAct</strong> — 추론 + 도구 호출(Tool use)을 결합해 외부 세계와 상호작용하는 에이전트 패턴을 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[110px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-1-1.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; III-1-1. Chain of Thought</a>
              <a href="./III-2-1.html" className="text-amber-700 hover:text-amber-900 font-medium">III-2-1. ReAct란 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
