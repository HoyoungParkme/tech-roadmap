    function JsonBox({ obj, label, color = 'amber' }) {
      const colorMap = {
        amber: 'bg-amber-50 border-amber-300 text-amber-900',
        slate: 'bg-slate-50 border-slate-300 text-slate-700',
        emerald: 'bg-emerald-50 border-emerald-300 text-emerald-900',
        sky: 'bg-sky-50 border-sky-300 text-sky-900',
      };
      return (
        <div className={`rounded border ${colorMap[color]} p-2`}>
          {label && <div className="text-[9px] uppercase tracking-wider font-bold opacity-70 mb-1">{label}</div>}
          <pre className="text-[10px] leading-tight font-mono whitespace-pre-wrap break-all m-0">
            {typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2)}
          </pre>
        </div>
      );
    }

      // SDK 별 색상 / 라벨
      const sdkStyle = sdkName === 'OpenAI'
        ? { bg: 'from-emerald-50 to-emerald-100', border: 'border-emerald-300', icon: '🟢', accent: 'text-emerald-800' }
        : { bg: 'from-orange-50 to-orange-100', border: 'border-orange-300', icon: '🟠', accent: 'text-orange-800' };

      const dim = isActive ? '' : 'opacity-40';

      return (
        <div className={`rounded-lg bg-gradient-to-br ${sdkStyle.bg} border-2 ${sdkStyle.border} p-2 transition-all duration-500 ${dim}`}>
          <div className={`text-[11px] font-bold ${sdkStyle.accent} mb-1.5 flex items-center gap-1`}>
            <span>{sdkStyle.icon}</span>
            <span>{sdkName}</span>
            <span className="ml-auto text-[9px] font-mono opacity-60">stage: {data.stage}</span>
          </div>

          <div className="space-y-1.5">
            {/* 도구 정의 */}
            {data.toolDef && (
              <JsonBox obj={data.toolDef} label={`tools[0] (${sdkName})`} color="amber" />
            )}

            {/* messages 배열 */}
            {data.messages && data.messages.length > 0 && (
              <div className="rounded border border-slate-300 bg-white p-1.5">
                <div className="text-[9px] uppercase tracking-wider font-bold text-slate-500 mb-1">messages</div>
                <div className="space-y-1">
                  {data.messages.map((m, i) => {
                    const roleColor = m.role === 'user'
                      ? (m.tool_use_id ? 'bg-purple-50 border-purple-300 text-purple-900' : 'bg-sky-50 border-sky-300 text-sky-900')
                      : m.role === 'assistant'
                        ? 'bg-amber-50 border-amber-300 text-amber-900'
                        : 'bg-purple-50 border-purple-300 text-purple-900';  // tool
                    const roleLabel = m.role === 'tool'
                      ? `tool (id=${m.tool_call_id})`
                      : m.tool_use_id
                        ? `user [tool_result] (id=${m.tool_use_id})`
                        : m.role + (m.stopReason ? ` (stop=${m.stopReason})` : '');
                    return (
                      <div key={i} className={`rounded border ${roleColor} px-1.5 py-1`}>
                        <div className="text-[8px] uppercase tracking-wider font-bold opacity-70">{roleLabel}</div>
                        <div className="text-[10px] font-mono break-words">{m.text}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* tool_calls / tool_use 블록 */}
            {data.toolCalls && (
              <div className="rounded border-2 border-amber-400 bg-amber-50 p-1.5">
                <div className="text-[9px] uppercase tracking-wider font-bold text-amber-800 mb-1">
                  {sdkName === 'OpenAI' ? 'message.tool_calls' : 'content[].tool_use'}
                </div>
                {data.toolCalls.map((tc, i) => (
                  <div key={i} className="text-[10px] font-mono space-y-0.5">
                    <div><span className="text-amber-700">id:</span> {tc.id}</div>
                    <div><span className="text-amber-700">name:</span> {tc.name}</div>
                    <div>
                      <span className="text-amber-700">{sdkName === 'OpenAI' ? 'arguments:' : 'input:'}</span>
                      <span className="text-slate-700"> {typeof tc.args === 'string' ? tc.args : JSON.stringify(tc.args)}</span>
                      <span className="ml-1 text-[9px] text-amber-600">
                        ({sdkName === 'OpenAI' ? 'str → json.loads' : 'dict (parsed)'})
                      </span>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* 실행 결과 */}
            {data.execResult && (
              <div className="rounded border border-emerald-400 bg-emerald-50 p-1.5">
                <div className="text-[9px] uppercase tracking-wider font-bold text-emerald-800 mb-1">
                  dispatch() 결과
                </div>
                <div className="text-[10px] font-mono text-emerald-900">
                  {JSON.stringify(data.execResult)}
                </div>
              </div>
            )}

            {/* 최종 답변 */}
            {data.finalAnswer && (
              <div className="rounded border-2 border-amber-500 bg-amber-100 p-2 shadow-sm">
                <div className="text-[9px] uppercase tracking-wider font-bold text-amber-900 mb-1">
                  ✅ 최종 자연어 답변
                </div>
                <div className="text-xs font-bold text-amber-900">{data.finalAnswer}</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌(OpenAI) | 우(Anthropic) 비교
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const openaiActive = step.active === 'openai' || step.active === 'both';
      const anthropicActive = step.active === 'anthropic' || step.active === 'both';

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🛠️ Function Calling — OpenAI vs Anthropic</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            <SdkColumn data={step.openai} sdkName="OpenAI" isActive={openaiActive} />
            <SdkColumn data={step.anthropic} sdkName="Anthropic" isActive={anthropicActive} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm bg-sky-200 border border-sky-300"></span>
              user
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm bg-amber-200 border border-amber-300"></span>
              assistant
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-sm bg-purple-200 border border-purple-300"></span>
              tool / tool_result
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2.5 h-2.5 rounded-sm bg-emerald-200 border border-emerald-300"></span>
              실행 결과
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[36rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-3-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 핵심 패턴 &gt; Chapter 3. Tool Use</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-3-2. Function Calling 상세</h1>
                  <p className="text-sm text-slate-500 mt-0.5">OpenAI / Anthropic SDK — 같은 흐름, 다른 필드명</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                💡 다음(III-3-3)에서는 <strong>Tool Use + ReAct 통합</strong> — 여러 도구를 reasoning 루프로 연속 호출하는 패턴을 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 키워드 칩 */}
            <div className="flex flex-wrap gap-2">
              {['JSON Schema', 'tools', 'tool_calls', 'tool_use', 'tool_call_id', 'tool_result', 'dispatch', 'finish_reason', 'stop_reason'].map(kw => (
                <span key={kw} className="bg-amber-50 text-amber-700 px-3 py-1 rounded-full text-xs font-medium border border-amber-200">{kw}</span>
              ))}
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[110px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-3-1.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; III-3-1. Tool Use란</a>
              <a href="./III-3-3.html" className="text-amber-700 hover:text-amber-900 font-medium">III-3-3. Tool Use + ReAct 통합 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
