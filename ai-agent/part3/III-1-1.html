<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent 학습 — III-1-1. Chain of Thought</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const QUESTION = '서울에서 부산까지 KTX로 2시간 30분 걸립니다.\n오전 9시에 출발하면 몇 시에 도착하나요?';

    const DIRECT = { answer: '오후 12시 30분', correct: false, badge: '❌ 틀림' };

    const COT_STEPS = [
      { thought: '출발 시간: 오전 9시 (= 9:00)', partial: '9:00' },
      { thought: '소요 시간: 2시간 30분', partial: '+ 2:30' },
      { thought: '9:00 + 2시간 = 11:00', partial: '= 11:00' },
      { thought: '11:00 + 30분 = 11:30', partial: '= 11:30' },
    ];
    const COT_ANSWER = { answer: '오전 11시 30분', correct: true, badge: '✅ 정답' };

    const STEPS = [
      { desc: "[문제] 간단한 시간 계산 문제입니다. LLM이 이 문제를 두 가지 방식으로 풀어봅니다 — 직접 답변 vs Chain of Thought.", showQuestion: true, showDirect: false, showCot: false, cotStep: -1 },
      { desc: "[직접 답변] 풀이 과정 없이 바로 답만 냅니다. \"오후 12시 30분\" — 틀렸습니다! 풀이 과정이 없으니 실수를 잡을 수 없었습니다.", showQuestion: true, showDirect: true, showCot: false, cotStep: -1 },
      { desc: "[CoT 시작] 이번에는 \"단계별로 생각해봐\"라고 지시합니다. LLM이 풀이 과정을 하나씩 펼칩니다.", showQuestion: true, showDirect: true, showCot: true, cotStep: 0 },
      { desc: "[CoT 진행] 9시 + 2시간 = 11시, 11시 + 30분 = 11시 30분. 중간 과정을 쓰면서 계산하니 실수가 줄어듭니다.", showQuestion: true, showDirect: true, showCot: true, cotStep: 3 },
      { desc: "[결과 비교] 직접 답변은 틀리고, CoT는 맞았습니다. \"단계별로 생각해봐\"라는 한 마디가 정확도를 크게 높입니다. 이것이 Chain of Thought의 핵심입니다.", showQuestion: true, showDirect: true, showCot: true, cotStep: 4 },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-amber-700 hover:text-amber-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 핵심 패턴 &gt; Chapter 1. Chain of Thought</div>
                  <h1 className="text-2xl font-bold text-slate-800">III-1-1. 생각의 사슬: 단계적 추론</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>수학 풀이</b>처럼, "정답: 42"만 쓰면 틀리지만 풀이 과정을 쓰면 정확도가 올라갑니다. LLM에게 "단계별로 생각해봐"라고 하면 됩니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-amber-600 border-amber-700 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">직접 답변 vs CoT</h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 문제 표시 */}
            {stepData.showQuestion && (
              <div className="bg-slate-800 text-white p-4 rounded-xl">
                <div className="text-xs font-bold text-slate-400 uppercase mb-2">문제</div>
                <p className="whitespace-pre-line font-medium">{QUESTION}</p>
              </div>
            )}

            {/* 좌우 비교 */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {/* 직접 답변 */}
              <div className={`rounded-xl border-2 p-5 transition-all duration-500 ${stepData.showDirect ? 'border-red-300 bg-red-50' : 'border-slate-200 bg-white opacity-30'}`}>
                <div className="flex items-center gap-2 mb-3">
                  <span className="text-xl">💬</span>
                  <span className="font-bold text-slate-800">직접 답변</span>
                  <span className="text-xs text-slate-500">(풀이 없음)</span>
                </div>
                {stepData.showDirect && (
                  <>
                    <div className="bg-white border border-red-200 rounded-lg p-3 mb-3 text-center">
                      <div className="text-lg font-bold text-red-700">{DIRECT.answer}</div>
                    </div>
                    <div className="text-center text-sm font-bold text-red-600">{DIRECT.badge}</div>
                  </>
                )}
              </div>

              {/* CoT */}
              <div className={`rounded-xl border-2 p-5 transition-all duration-500 ${stepData.showCot ? 'border-emerald-300 bg-emerald-50' : 'border-slate-200 bg-white opacity-30'}`}>
                <div className="flex items-center gap-2 mb-3">
                  <span className="text-xl">🧠</span>
                  <span className="font-bold text-slate-800">Chain of Thought</span>
                  <span className="text-xs text-slate-500">(단계별 풀이)</span>
                </div>
                {stepData.showCot && (
                  <>
                    <div className="space-y-2 mb-3">
                      {COT_STEPS.map((s, i) => (
                        <div key={i} className={`flex items-center gap-2 p-2 rounded-lg transition-all duration-300 ${i <= stepData.cotStep ? 'bg-white border border-emerald-200' : 'opacity-20 bg-slate-50'}`}>
                          <span className="text-xs font-bold text-emerald-600 w-6">#{i+1}</span>
                          <span className="text-sm text-slate-700 flex-1">{s.thought}</span>
                          <span className="font-mono text-xs text-emerald-700 bg-emerald-100 px-2 py-0.5 rounded">{s.partial}</span>
                        </div>
                      ))}
                    </div>
                    {stepData.cotStep >= 3 && (
                      <>
                        <div className="bg-white border border-emerald-200 rounded-lg p-3 mb-3 text-center">
                          <div className="text-lg font-bold text-emerald-700">{COT_ANSWER.answer}</div>
                        </div>
                        <div className="text-center text-sm font-bold text-emerald-600">{COT_ANSWER.badge}</div>
                      </>
                    )}
                  </>
                )}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['Chain of Thought', '단계적 추론', 'Zero-shot CoT', '정확도 향상'].map(kw => (
                <span key={kw} className="bg-amber-50 text-amber-700 px-3 py-1 rounded-full text-sm font-medium border border-amber-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-amber-600 hover:bg-amber-700">{isPlaying ? <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</> : <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>}</button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>
            <div className="text-sm text-slate-500 flex justify-between">
              <a href="../part2/II-3-1.html" className="text-amber-600 hover:text-amber-800 font-medium">← II-3-1. LLM의 한계</a>
              <a href="./III-1-2.html" className="text-amber-600 hover:text-amber-800 font-medium">III-1-2. Few-shot CoT →</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
