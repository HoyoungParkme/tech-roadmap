  <!--
    III-1-1. Chain of Thought (CoT) — 단계별 추론으로 정확도 향상
    학습 목표: "단계별로 생각해봐" 한 마디로 LLM 추론 정확도가 어떻게 올라가는지,
              그리고 토큰 비용이 늘어나는 trade-off 를 5단계로 이해한다.
    핵심 비유: 수학 시험 — 답만 적으면 틀리지만, 풀이 과정을 쓰면 점수가 오른다.
    패턴: fastapi v1 — 좌(LiveDataPane: 직접답 vs CoT 단계 + 정확도/토큰 막대) / 우(VSCode CodeViewer)
    색상: ai-agent amber
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 단계별 데이터 정의
    //   direct        : { answer, reasoning[], correct }    — 좌측 직접 답 박스
    //   cot           : { reasoning[], answer, correct }    — 우측 CoT 누적 추론
    //   accuracy      : { direct, cot }                     — % 정확도 막대
    //   tokens        : { direct, cot }                     — 토큰 사용량 막대
    //   showStats     : 정확도/토큰 막대 표시 여부 (Step 4~5)
    // ─────────────────────────────────────────────────────

            '',

            'Step 2: 3개를 먹으면 7 - 3 = 4개가 남습니다.',
            'Step 3: 다시 2개를 먹으면 4 - 2 = 2개가 남습니다.',
            '',
            '따라서 남은 사과는 2개입니다.',
            '"""',
            '',
            '# 핵심 관찰:',
            '#   1) 각 step 이 독립된 산수 1번만 수행 → 실수 확률 ↓',
            '#   2) 중간 결과(4)가 다음 step 의 입력 → 빼먹기 방지',
            '#   3) "따라서" 마커가 최종 답을 명시 → 파싱 용이',
            '#',
            '# 코드에서 최종 답만 추출하기:',
            'import re',
            '',

            'm = re.search(r"따라서.*?(\\d+)개", text)',
            'final = int(m.group(1)) if m else None',
            'print(f"최종 답: {final}개")  # 최종 답: 2개',

        },
      },
      {

            { n: 1, thought: '처음 사과 개수',     formula: '7개' },

            '    text = resp.choices[0].message.content',

          reasoning: [],

            { n: 1, thought: '처음 사과 개수',     formula: '7개' },
            { n: 2, thought: '3개를 먹으면',       formula: '7 - 3 = 4' },

        showStats: true,
        code: {
          lang: 'markdown',

            '',
            '## 1. CoT 의 비용',
            '- 응답 길이 5~10배 증가 (예: 12 → 80 토큰)',
            '- 응답 시간도 비례 증가 (스트리밍 기준 토큰당 시간)',
            '- 출력 토큰 가격 ≈ 입력의 3~5배 → 실비용 영향 큼',

            '- 산술/대수 다단계 계산 (GSM8K, MATH)',
            '- 논리 추론 (Big-Bench, ARC)',

    // 직접 답 카드 — 좌측
    // ─────────────────────────────────────────────────────
    function DirectCard({ direct }) {
      if (!direct.shown) {
        return (
          <div className="rounded-lg border-2 border-dashed border-slate-200 bg-slate-50 p-3 h-full flex items-center justify-center text-slate-400 text-xs">
            (아직 시도 전)
          </div>
        );
      }
      return (
        <div className="rounded-lg border-2 border-red-300 bg-gradient-to-br from-red-50 to-rose-50 p-3 h-full flex flex-col">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">💬</span>
            <span className="text-[11px] font-bold text-slate-800">직접 답변</span>
            <span className="text-[9px] text-slate-500">(풀이 없음)</span>
          </div>
          <div className="flex-1 flex flex-col items-center justify-center min-h-[120px]">
            <div className="text-[10px] text-slate-500 mb-1">Q → A</div>
            <div className="bg-white border-2 border-red-200 rounded-lg px-4 py-3 text-center w-full">
              <div className="text-2xl font-bold text-red-700">{direct.answer}</div>
            </div>
            <div className="mt-2 inline-flex items-center gap-1 text-[11px] font-bold text-red-700 bg-red-100 px-2 py-0.5 rounded-full">
              <span>❌</span><span>틀림</span>
            </div>
          </div>
          <div className="text-[9px] text-red-700/70 text-center mt-2 font-mono">
            7 - 3 = 4, … (-2 빼먹음)
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // CoT 카드 — 우측 (단계별 추론 누적)
    // ─────────────────────────────────────────────────────
    function CotCard({ cot }) {
      if (!cot.shown) {
        return (
          <div className="rounded-lg border-2 border-dashed border-slate-200 bg-slate-50 p-3 h-full flex items-center justify-center text-slate-400 text-xs">
            (아직 시도 전)
          </div>
        );
      }
      return (
        <div className="rounded-lg border-2 border-emerald-300 bg-gradient-to-br from-emerald-50 to-teal-50 p-3 h-full flex flex-col">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="text-base">🧠</span>
            <span className="text-[11px] font-bold text-slate-800">Chain of Thought</span>
            <span className="text-[9px] text-slate-500">(단계별 풀이)</span>
          </div>

          {cot.waiting && cot.reasoning.length === 0 && (
            <div className="flex-1 flex flex-col items-center justify-center min-h-[120px] text-center">
              <div className="text-2xl mb-1 animate-pulse">…</div>
              <div className="text-[10px] text-emerald-700 font-mono">
                "Let's think step by step." 추가
              </div>
              <div className="text-[10px] text-slate-500 mt-1">→ 다음 단계에서 추론 펼침</div>
            </div>
          )}

          {cot.reasoning.length > 0 && (
            <div className="flex-1 flex flex-col">
              <div className="space-y-1.5">
                {cot.reasoning.map((r) => (
                  <div
                    key={r.n}
                    className="flex items-center gap-2 bg-white border border-emerald-200 rounded-md px-2 py-1.5 transition-all duration-500"
                  >
                    <span className="text-[10px] font-bold text-emerald-700 bg-emerald-100 rounded-full w-5 h-5 flex items-center justify-center flex-shrink-0">
                      {r.n}
                    </span>
                    <span className="text-[11px] text-slate-700 flex-1">{r.thought}</span>
                    <span className="font-mono text-[10px] text-emerald-800 bg-emerald-50 border border-emerald-200 px-1.5 py-0.5 rounded">
                      {r.formula}
                    </span>
                  </div>
                ))}
              </div>
              {cot.answer && (
                <div className="mt-2 pt-2 border-t border-emerald-200">
                  <div className="text-[9px] text-emerald-700/70 mb-1 text-center">→ 따라서</div>
                  <div className="bg-white border-2 border-emerald-300 rounded-lg px-4 py-2 text-center">
                    <div className="text-xl font-bold text-emerald-700">{cot.answer}</div>
                  </div>
                  <div className="mt-2 inline-flex items-center gap-1 text-[11px] font-bold text-emerald-700 bg-emerald-100 px-2 py-0.5 rounded-full mx-auto w-fit">
                    <span>✅</span><span>정답</span>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 정확도 막대 (Step 4~5)
    //   직접 vs CoT 가로 막대 + % 텍스트
    // ─────────────────────────────────────────────────────
    function AccuracyBars({ accuracy }) {
      const items = [
        { label: '직접 답변', val: accuracy.direct, color: 'red',     anim: accuracy.animDirect },
        { label: 'CoT',      val: accuracy.cot,    color: 'emerald', anim: accuracy.animCot },
      ];
      const colorMap = {
        red:     { bg: 'bg-red-500',     text: 'text-red-700',     bar: 'bg-red-200/60' },
        emerald: { bg: 'bg-emerald-500', text: 'text-emerald-700', bar: 'bg-emerald-200/60' },
      };

      return (
        <div className="rounded-lg border border-amber-200 bg-amber-50/40 p-3">
          <div className="flex items-center gap-1.5 mb-2">
            <span>📊</span>
            <span className="text-[11px] font-bold text-amber-900">GSM8K 정확도 (%)</span>
            <span className="text-[9px] text-slate-500 ml-auto font-mono">100문제 평균</span>
          </div>
          <div className="space-y-2">
            {items.map((it) => {
              const c = colorMap[it.color];
              return (
                <div key={it.label}>
                  <div className="flex justify-between text-[10px] mb-0.5">
                    <span className="font-medium text-slate-700">{it.label}</span>
                    <span className={`font-mono font-bold ${c.text} ${it.anim ? 'animate-pulse' : ''}`}>
                      {it.val}%
                    </span>
                  </div>
                  <div className={`relative h-3 ${c.bar} rounded-full overflow-hidden`}>
                    <div
                      className={`absolute left-0 top-0 h-full ${c.bg} transition-all duration-700`}
                      style={{ width: `${it.val}%` }}
                    />
                  </div>
                </div>
              );
            })}
          </div>
          <div className="text-[9px] text-amber-800/70 mt-2 text-center font-mono">
            +50%p 향상 — Kojima et al. 2022
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 토큰 사용량 막대 (Step 4~5)
    // ─────────────────────────────────────────────────────
    function TokenBars({ tokens }) {
      const max = 100;
      const items = [
        { label: '직접 답변', val: tokens.direct, color: 'red',     anim: tokens.animDirect },
        { label: 'CoT',      val: tokens.cot,    color: 'amber',   anim: tokens.animCot },
      ];
      const colorMap = {
        red:   { bg: 'bg-red-400',   text: 'text-red-700',   bar: 'bg-red-100' },
        amber: { bg: 'bg-amber-500', text: 'text-amber-700', bar: 'bg-amber-100' },
      };

      return (
        <div className="rounded-lg border border-slate-200 bg-slate-50 p-3">
          <div className="flex items-center gap-1.5 mb-2">
            <span>🪙</span>
            <span className="text-[11px] font-bold text-slate-800">출력 토큰 사용량</span>
            <span className="text-[9px] text-slate-500 ml-auto font-mono">평균</span>
          </div>
          <div className="space-y-2">
            {items.map((it) => {
              const c = colorMap[it.color];
              const widthPct = Math.min(100, (it.val / max) * 100);
              return (
                <div key={it.label}>
                  <div className="flex justify-between text-[10px] mb-0.5">
                    <span className="font-medium text-slate-700">{it.label}</span>
                    <span className={`font-mono font-bold ${c.text} ${it.anim ? 'animate-pulse' : ''}`}>
                      {it.val} tokens
                    </span>
                  </div>
                  <div className={`relative h-3 ${c.bar} rounded-full overflow-hidden`}>
                    <div
                      className={`absolute left-0 top-0 h-full ${c.bg} transition-all duration-700`}
                      style={{ width: `${widthPct}%` }}
                    />
                  </div>
                </div>
              );
            })}
          </div>
          <div className="text-[9px] text-slate-600 mt-2 text-center font-mono">
            CoT 응답이 약 6~7배 길다 → 비용/지연 ↑
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌(직접 답) + 우(CoT) + (옵션) 정확도/토큰 막대
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🍎 같은 질문, 두 가지 답</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 질문 */}
          <div className="rounded-lg bg-slate-800 text-white p-3 mb-3 flex items-start gap-2">
            <span className="text-base leading-none">❓</span>
            <div className="flex-1">
              <div className="text-[9px] uppercase tracking-wider text-slate-400 font-bold">사용자 질문</div>
              <div className="text-sm font-medium mt-0.5">{QUESTION}</div>
            </div>
          </div>

          {/* 직접 vs CoT */}
          <div className="grid grid-cols-2 gap-2 mb-3">
            <DirectCard direct={step.direct} />
            <CotCard cot={step.cot} />
          </div>

          {/* 통계 막대 (Step 4~5에서만) */}
          {step.showStats && (
            <div className="space-y-2">
              <AccuracyBars accuracy={step.accuracy} />
              <TokenBars tokens={step.tokens} />
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-red-400"></span>
              직접 (단답)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-emerald-400"></span>
              CoT (단계별)
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2.5 h-2.5 rounded-full bg-amber-400"></span>
              지표 막대
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 핵심 패턴 &gt; Chapter 1. Chain of Thought</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Chain of Thought — 단계별 추론으로 정확도 향상</h1>
                  <p className="text-sm text-slate-500 mt-0.5">"Let's think step by step." — 한 줄로 LLM 추론 정확도를 끌어올린다</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                💡 다음(III-1-2)에서는 <strong>Few-shot CoT</strong> — 풀이 예시 1~3개를 함께 주면 정확도가 더 오르는 패턴을 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 키워드 칩 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Chain of Thought', 'Zero-shot CoT', '단계별 추론', 'GSM8K', '정확도 +50%p', '토큰 비용 ↑'].map((kw) => (
                <span key={kw} className="bg-amber-50 text-amber-700 px-3 py-1 rounded-full text-xs font-medium border border-amber-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../part2/II-3-1.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; II-3-1. LLM의 한계</a>
              <a href="./III-1-2.html" className="text-amber-700 hover:text-amber-900 font-medium">III-1-2. Few-shot CoT &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
