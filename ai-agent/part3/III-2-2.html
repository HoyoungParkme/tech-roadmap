<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent 학습 — III-2-2. ReAct 실행 흐름</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CODE_LINES = [
      'def react_loop(question, tools, max_iter=5):',
      '    messages = [{"role": "user", "content": question}]',
      '',
      '    for i in range(max_iter):',
      '        # 1. LLM에게 다음 행동 요청',
      '        response = llm.chat(messages)',
      '',
      '        # 2. 종료 조건 확인',
      '        if response.type == "final_answer":',
      '            return response.content',
      '',
      '        # 3. 도구 호출 실행',
      '        tool_name = response.tool_call.name',
      '        tool_args = response.tool_call.args',
      '        result = tools[tool_name](**tool_args)',
      '',
      '        # 4. 결과를 대화에 추가',
      '        messages.append({"role": "tool", "content": result})',
      '',
      '    return "최대 반복 초과"',
    ];

    const STEPS = [
      { desc: "[전체 구조] ReAct를 코드로 옮기면 while 루프(여기서는 for)가 됩니다. LLM 호출 → 종료 확인 → 도구 실행 → 결과 추가 → 반복.", hl: [], loopStep: -1 },
      { desc: "[1. LLM 호출] 매 반복마다 LLM에게 현재까지의 대화(messages)를 보내고 \"다음에 뭘 할지\" 물어봅니다. LLM이 Thought + Action을 결정합니다.", hl: [4, 5], loopStep: 0 },
      { desc: "[2. 종료 확인] LLM이 \"최종 답변입니다\"라고 하면 루프를 빠져나옵니다. 더 이상 도구 호출이 필요 없다는 뜻입니다.", hl: [7, 8, 9], loopStep: 1 },
      { desc: "[3. 도구 실행] LLM이 도구를 호출하겠다고 하면, 개발자 코드가 실제로 도구를 실행합니다. 검색, API 호출, 계산 등.", hl: [11, 12, 13, 14], loopStep: 2 },
      { desc: "[4. 결과 추가] 도구 실행 결과를 messages에 추가합니다. 이 결과가 다음 LLM 호출의 입력이 됩니다. 그리고 1번으로 돌아가 반복합니다.", hl: [16, 17], loopStep: 3 },
      { desc: "[안전장치] max_iter=5로 최대 반복 횟수를 제한합니다. 무한 루프를 방지합니다. 실제 Agent에서는 토큰 예산, 시간 제한 등도 사용합니다.", hl: [3, 19], loopStep: 4 },
    ];

    const LOOP_LABELS = ['LLM 호출', '종료 확인', '도구 실행', '결과 추가', '안전장치'];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-amber-700 hover:text-amber-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 핵심 패턴 &gt; Chapter 2. ReAct 패턴</div>
                  <h1 className="text-2xl font-bold text-slate-800">III-2-2. ReAct 실행 흐름</h1>
                </div>
              </div>
              <p className="text-slate-600">ReAct를 코드로 구현하면 <b>for 루프</b>입니다. LLM 호출 → 종료 확인 → 도구 실행 → 결과 추가 → 반복.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-amber-600 border-amber-700 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">ReAct 루프 코드</h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              {/* 왼쪽: 루프 단계 */}
              <div className="space-y-2">
                <div className="text-xs font-bold text-slate-500 uppercase mb-2">ReAct 루프 단계</div>
                {LOOP_LABELS.map((label, i) => {
                  const isActive = stepData.loopStep === i;
                  const colors = ['bg-sky-50 border-sky-300', 'bg-emerald-50 border-emerald-300', 'bg-amber-50 border-amber-300', 'bg-violet-50 border-violet-300', 'bg-red-50 border-red-300'];
                  const icons = ['🧠', '🏁', '🔧', '📝', '🛡️'];
                  return (
                    <div key={i} className={`p-3 rounded-xl border-2 flex items-center gap-3 transition-all duration-500 ${isActive ? `${colors[i]} scale-105 shadow-md` : 'border-slate-100 bg-white opacity-30'}`}>
                      <span className="text-xl">{icons[i]}</span>
                      <span className="font-bold text-sm text-slate-700">{i + 1}. {label}</span>
                      {i < 4 && !isActive && <span className="ml-auto text-slate-300">↓</span>}
                      {i === 3 && isActive && <span className="ml-auto text-violet-500 font-bold text-xs">→ 1번으로</span>}
                    </div>
                  );
                })}
              </div>

              {/* 오른쪽: 코드 */}
              <div className="bg-slate-900 rounded-xl p-4 overflow-x-auto">
                <div className="text-xs text-slate-500 mb-2 font-mono">pseudo-Python</div>
                {CODE_LINES.map((line, i) => {
                  const isHl = stepData.hl.includes(i);
                  const isComment = line.trimStart().startsWith('#');
                  return (
                    <div key={i} className={`font-mono text-xs px-2 py-0.5 rounded transition-all duration-300 ${isHl ? 'bg-amber-900 bg-opacity-40' : ''}`}>
                      <span className="text-slate-600 mr-2 select-none w-5 inline-block text-right">{i + 1}</span>
                      {isComment ? <span className="text-emerald-500">{line}</span> : <span className={isHl ? 'text-amber-300' : 'text-slate-400'}>{line}</span>}
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['while 루프', 'LLM 호출', 'Action 파싱', '종료 조건', '최대 반복'].map(kw => (
                <span key={kw} className="bg-amber-50 text-amber-700 px-3 py-1 rounded-full text-sm font-medium border border-amber-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-amber-600 hover:bg-amber-700">{isPlaying ? <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</> : <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>}</button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>
            <div className="text-sm text-slate-500 flex justify-between">
              <a href="./III-2-1.html" className="text-amber-600 hover:text-amber-800 font-medium">← III-2-1. ReAct란</a>
              <a href="./III-3-1.html" className="text-amber-600 hover:text-amber-800 font-medium">III-3-1. Tool Use란 →</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
