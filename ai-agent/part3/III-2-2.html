  <!--
    III-2-2. ReAct 실행 흐름 (실제 코드 단계별)
    학습 목표: ReAct 루프가 실제로 어떻게 돌아가는지 사이클(Thought→Action→Observation)
              누적 + 종료 조건 체크까지 5단계로 이해한다.
    핵심 비유: 회의 메모 — 매 사이클마다 "내 생각 / 내가 한 행동 / 결과"를 차곡차곡 적는다.
    패턴: fastapi v1 — 좌(LiveDataPane: 사이클 누적 메모) / 우(VSCode CodeViewer 5 파일 탭)
    색상: ai-agent amber
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 5개 파일의 코드 정의 (CodeViewer 탭별)
    //   각 파일은 ReAct 루프의 한 책임을 담당
    // ─────────────────────────────────────────────────────
    const FILES = {
      'agent-loop.py': {
        lang: 'python',
        filename: 'agent-loop.py',
        lines: [
          '"""ReAct 메인 루프 — Thought → Action → Observation 사이클을 반복한다.',
          '',
          '파일 경로: src/react/agent_loop.py',
          '주요 의존성: thought.py, action.py, observation.py, terminate.py',
          '"""',
          'from thought import generate_thought',
          'from action import execute_action',
          'from observation import build_observation',
          'from terminate import should_terminate',
          '',
          '',
          'def run_react(question: str, tools: dict, max_iter: int = 5) -> str:',
          '    """ReAct 루프 실행 — 사용자 질문에 답할 때까지 사이클을 돈다."""',
          '    history = [{"role": "user", "content": question}]',
          '',
          '    for i in range(max_iter):',
          '        # 1) Thought + Action 생성 (LLM 호출)',
          '        thought, action = generate_thought(history)',
          '        history.append({"role": "assistant",',
          '                        "thought": thought, "action": action})',
          '',
          '        # 2) 종료 조건 체크 — Final Answer면 즉시 반환',
          '        done, final = should_terminate(action, i, max_iter)',
          '        if done:',
          '            return final',
          '',
          '        # 3) Action 실행 → Observation',
          '        result = execute_action(action, tools)',
          '        observation = build_observation(result)',
          '        history.append({"role": "tool", "content": observation})',
          '',
          '    return "[max_iter 초과] 답을 찾지 못했습니다"',
        ],
        highlight: [12, 13, 16],
      },
      'thought.py': {
        lang: 'python',
        filename: 'thought.py',
        lines: [
          '"""Thought 생성 — LLM이 현재 상황을 보고 다음 행동을 결정한다."""',
          'from llm import call_llm',
          '',
          'REACT_SYSTEM = """당신은 ReAct 에이전트입니다.',
          '아래 형식으로만 응답하세요:',
          '',
          'Thought: <지금 무엇을 알고 있고, 다음에 무엇이 필요한지>',
          'Action: <도구이름>(<인자>)        # 도구 호출이 필요할 때',
          'Final Answer: <최종 답>           # 충분한 정보를 모았을 때',
          '"""',
          '',
          '',
          'def generate_thought(history: list) -> tuple[str, dict]:',
          '    """대화 history → LLM → Thought + Action(또는 Final Answer) 파싱."""',
          '    messages = [{"role": "system", "content": REACT_SYSTEM}, *history]',
          '    raw = call_llm(messages, temperature=0.0)',
          '',
          '    # 파싱: "Thought: ...\\nAction: ..." 또는 "...Final Answer: ..."',
          '    thought = _extract(raw, "Thought:")',
          '    if "Final Answer:" in raw:',
          '        action = {"type": "final", "answer": _extract(raw, "Final Answer:")}',
          '    else:',
          '        action = _parse_tool_call(_extract(raw, "Action:"))',
          '    return thought, action',
          '',
          '',
          'def _parse_tool_call(line: str) -> dict:',
          '    """\'search("쿼리")\' → {"type": "tool", "name": "search", "args": ...}"""',
          '    name, args = line.split("(", 1)',
          '    return {"type": "tool", "name": name.strip(),',
          '            "args": args.rstrip(")").strip().strip("\\"")}',
        ],
        highlight: [13, 14, 15, 16],
      },
      'action.py': {
        lang: 'python',
        filename: 'action.py',
        lines: [
          '"""Action 실행 — LLM이 결정한 도구를 실제로 호출한다."""',
          '',
          '',
          'def execute_action(action: dict, tools: dict) -> any:',
          '    """tools 레지스트리에서 함수를 찾아 호출하고 결과 반환.',
          '',
          '    Args:',
          '        action: {"type": "tool", "name": "search", "args": "..."}',
          '        tools: {"search": <fn>, "read_page": <fn>, ...}',
          '    Returns:',
          '        도구 실행 결과 (문자열, dict, 리스트 등 도구마다 다름)',
          '    Raises:',
          '        KeyError: 등록되지 않은 도구를 호출하면 발생',
          '    """',
          '    if action["type"] != "tool":',
          '        raise ValueError("execute_action은 tool action만 처리합니다")',
          '',
          '    tool_fn = tools[action["name"]]    # KeyError 가능 — 의도된 fail-fast',
          '    return tool_fn(action["args"])',
          '',
          '',
          '# 예시 도구 레지스트리',
          'def _search(query: str) -> list[dict]:',
          '    """위키피디아 검색 stub — 상위 N개 결과의 제목+요약 반환."""',
          '    return [{"title": "Steve Jobs", "snippet": "..."}, ...]',
          '',
          '',
          'def _read_page(title: str) -> str:',
          '    """페이지 본문 전체를 가져옴."""',
          '    return "Steve Jobs (1955-2011) was an American business magnate..."',
          '',
          '',
          'TOOLS = {"search": _search, "read_page": _read_page}',
        ],
        highlight: [4, 18, 19],
      },
      'observation.py': {
        lang: 'python',
        filename: 'observation.py',
        lines: [
          '"""Observation 빌더 — 도구 결과를 LLM이 읽기 좋은 텍스트로 정리한다."""',
          '',
          '',
          'def build_observation(result: any) -> str:',
          '    """도구 결과 → "Observation: ..." 텍스트로 직렬화.',
          '',
          '    핵심: LLM은 다음 사이클에서 이 텍스트만 읽고 다음 Thought를 만든다.',
          '         그래서 너무 길면 토큰 낭비, 너무 짧으면 정보 손실.',
          '         → 보통 상위 N개만 / 본문은 앞 500자만 자른다.',
          '    """',
          '    if isinstance(result, list):',
          '        # search 결과 같은 리스트',
          '        lines = [f"- {r[\'title\']}: {r[\'snippet\'][:120]}"',
          '                 for r in result[:5]]',
          '        body = "\\n".join(lines)',
          '    elif isinstance(result, str):',
          '        # read_page 본문 — 앞 500자로 잘라 토큰 절약',
          '        body = result[:500] + ("..." if len(result) > 500 else "")',
          '    else:',
          '        body = str(result)',
          '',
          '    return f"Observation: {body}"',
          '',
          '',
          '# Note: build_observation 결과는 history에 role="tool"로 추가되고,',
          '#       다음 사이클의 LLM 호출에서 그대로 컨텍스트로 들어간다.',
          '#       이게 ReAct의 "관찰을 추론에 다시 넣는다"는 핵심 메커니즘이다.',
        ],
        highlight: [4, 11, 12, 13, 14, 15, 16, 17, 18],
      },
      'terminate.py': {
        lang: 'python',
        filename: 'terminate.py',
        lines: [
          '"""종료 조건 — 무한 루프 방지 + Final Answer 감지."""',
          '',
          '',
          'def should_terminate(action: dict, iter_idx: int, max_iter: int',
          '                     ) -> tuple[bool, str | None]:',
          '    """루프를 멈춰야 하는지 판정.',
          '',
          '    Returns:',
          '        (done, final_answer)',
          '        - done=True, final="..." : Final Answer 도달 → 정상 종료',
          '        - done=True, final="[max_iter 초과]" : 안전장치 발동',
          '        - done=False, final=None : 루프 계속',
          '',
          '    종료 조건은 두 가지뿐이다:',
          '      (1) LLM이 "Final Answer:"를 출력했다 (정상)',
          '      (2) 반복 횟수가 max_iter에 도달했다 (안전장치)',
          '    """',
          '    # (1) 정상 종료 — Final Answer 토큰',
          '    if action.get("type") == "final":',
          '        return True, action["answer"]',
          '',
          '    # (2) 안전장치 — 마지막 반복인데 아직 final이 아니면 강제 종료',
          '    if iter_idx >= max_iter - 1:',
          '        return True, "[max_iter 초과] 답을 찾지 못했습니다"',
          '',
          '    return False, None',
          '',
          '',
          '# 실전 추가 종료 조건 (선택):',
          '#   - 토큰 예산 초과 (input_tokens + output_tokens > budget)',
          '#   - 시간 제한 (start_time + timeout < now)',
          '#   - 같은 Action을 N번 연속 반복 (loop detection)',
          '#   - 사용자가 cancel 신호 (asyncio.CancelledError)',
        ],
        highlight: [4, 5, 19, 20, 23, 24],
      },
    };

    // ─────────────────────────────────────────────────────
    // STEPS — 5단계 정의
    //   cycles    : 누적된 사이클 배열 [{thought, action, observation}]
    //   question  : 사용자 질문 (Step 1부터 표시)
    //   finalAns  : Step 4의 최종 답
    //   terminate : Step 5 종료 조건 시각화 객체
    //   activeFile: 우측 CodeViewer 활성 파일명
    // ─────────────────────────────────────────────────────
    const QUESTION = '잡스가 인도를 여행한 해는?';

    const STEPS = [
      // ───── Step 1 ─────
      {

        question: QUESTION,
        cycles: [
          {
            n: 1,

            action: { name: 'search', args: '"Steve Jobs India trip"' },

          {

    // ─────────────────────────────────────────────────────
    // CycleCard — 한 사이클(Thought / Action / Observation)
    // ─────────────────────────────────────────────────────
    function CycleCard({ cycle, isFinalCycle }) {
      const isFinal = cycle.action.name === 'FINAL';

      return (
        <div className="rounded-lg border-2 border-amber-300 bg-white shadow-sm overflow-hidden">
          {/* 사이클 헤더 */}
          <div className="bg-amber-100 px-3 py-1.5 border-b border-amber-200 flex items-center justify-between">
            <div className="text-[11px] font-bold text-amber-900 font-mono">
              ▸ Cycle {cycle.n} (iter={cycle.n - 1})
            </div>
            {isFinal && (
              <span className="text-[10px] font-bold text-emerald-700 bg-emerald-100 px-2 py-0.5 rounded-full">
                FINAL
              </span>
            )}
          </div>

          {/* Thought */}
          <div className="px-3 py-2 border-b border-slate-100 flex items-start gap-2">
            <span className="text-base leading-none mt-0.5">🧠</span>
            <div className="flex-1">
              <div className="text-[10px] uppercase tracking-wider font-bold text-sky-700">Thought</div>
              <div className="text-xs text-slate-700 mt-0.5 leading-relaxed">{cycle.thought}</div>
            </div>
          </div>

          {/* Action */}
          <div className={`px-3 py-2 ${cycle.observation ? 'border-b border-slate-100' : ''} flex items-start gap-2`}>
            <span className="text-base leading-none mt-0.5">{isFinal ? '🏁' : '🔧'}</span>
            <div className="flex-1">
              <div className={`text-[10px] uppercase tracking-wider font-bold ${isFinal ? 'text-emerald-700' : 'text-amber-700'}`}>
                {isFinal ? 'Final Answer' : 'Action'}
              </div>
              {isFinal ? (
                <div className="text-xs text-emerald-800 mt-0.5 font-medium">{cycle.action.args}</div>
              ) : (
                <div className="text-xs text-slate-700 mt-0.5 font-mono">
                  <span className="text-amber-700 font-bold">{cycle.action.name}</span>
                  <span className="text-slate-500">(</span>
                  <span className="text-violet-700">{cycle.action.args}</span>
                  <span className="text-slate-500">)</span>
                </div>
              )}
            </div>
          </div>

          {/* Observation (FINAL이 아닐 때만) */}
          {cycle.observation && (
            <div className="px-3 py-2 bg-slate-50 flex items-start gap-2">
              <span className="text-base leading-none mt-0.5">👁️</span>
              <div className="flex-1 min-w-0">
                <div className="text-[10px] uppercase tracking-wider font-bold text-violet-700">Observation</div>
                <pre className="text-[11px] text-slate-700 mt-0.5 whitespace-pre-wrap font-mono leading-snug max-h-24 overflow-y-auto">
                  {cycle.observation}
                </pre>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // TerminatePanel — Step 5 종료 조건 시각화
    // ─────────────────────────────────────────────────────
    function TerminatePanel({ terminate }) {
      return (
        <div className="rounded-lg border-2 border-amber-400 bg-gradient-to-br from-amber-50 to-orange-50 p-3 shadow-sm">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-base">🛡️</span>
            <div className="text-xs font-bold text-amber-900">should_terminate() — 종료 조건 체크</div>
          </div>

          <div className="space-y-1.5">
            {terminate.conditions.map((c) => (
              <div
                key={c.id}
                className={`px-3 py-2 rounded-lg border-2 flex items-start gap-2 transition-all ${
                  c.hit
                    ? 'bg-emerald-100 border-emerald-400 shadow-sm'
                    : 'bg-white border-slate-200 opacity-70'
                }`}
              >
                <span className="text-sm mt-0.5">{c.hit ? '✅' : '⚪'}</span>
                <div className="flex-1">
                  <div className={`text-[11px] font-mono font-bold ${c.hit ? 'text-emerald-900' : 'text-slate-600'}`}>
                    {c.label}
                  </div>
                  <div className={`text-[10px] mt-0.5 ${c.hit ? 'text-emerald-700' : 'text-slate-500'}`}>
                    {c.desc}
                  </div>
                </div>
              </div>
            ))}
          </div>

          <div className="mt-2 px-3 py-2 rounded-lg bg-emerald-600 text-white text-xs font-bold flex items-center gap-2">
            <span>🎯</span>
            <span>{terminate.result}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 사이클 누적 표시
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📋 ReAct 실행 메모 (history)</h2>
            <span className="text-[10px] text-slate-400 font-mono">live · cycles={step.cycles.length}</span>
          </div>

          {/* 사용자 질문 */}
          <div className="rounded-lg bg-amber-600 text-white p-3 flex items-start gap-2 shadow-sm mb-3">
            <span className="text-lg leading-none">❓</span>
            <div className="flex-1">
              <div className="text-[10px] uppercase tracking-wider text-amber-200 font-bold">사용자 질문 (history[0])</div>
              <div className="text-sm font-bold mt-0.5">{step.question}</div>
            </div>
          </div>

          {/* 사이클 누적 */}
          {step.cycles.length === 0 ? (
            <div className="rounded-lg border-2 border-dashed border-slate-300 p-6 text-center text-slate-400 text-xs font-mono">
              for 루프 진입 직전 — 아직 사이클 없음
            </div>
          ) : (
            <div className="space-y-2 max-h-[26rem] overflow-y-auto pr-1">
              {step.cycles.map((c) => (
                <CycleCard key={c.n} cycle={c} isFinalCycle={c.n === step.cycles.length} />
              ))}
            </div>
          )}

          {/* 종료 조건 패널 (Step 5 전용) */}
          {step.terminate && (
            <div className="mt-3">
              <TerminatePanel terminate={step.terminate} />
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span>🧠</span> Thought (LLM 추론)</span>
            <span className="flex items-center gap-1"><span>🔧</span> Action (도구 호출)</span>
            <span className="flex items-center gap-1"><span>👁️</span> Observation (결과)</span>
            <span className="flex items-center gap-1"><span>🏁</span> Final Answer</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // FileTabs — CodeViewer 상단 5개 파일 탭
    // ─────────────────────────────────────────────────────
    function FileTabs({ activeFile, onSelect }) {
      const tabs = Object.keys(FILES);
      return (
        <div className="bg-[#21252b] border-b border-slate-700 flex overflow-x-auto">
          {tabs.map((name) => {
            const isActive = name === activeFile;
            return (
              <button
                key={name}
                onClick={() => onSelect(name)}
                className={`px-3 py-2 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                  isActive
                    ? 'bg-[#282c34] text-amber-300 border-b-2 border-b-amber-400'
                    : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'
                }`}
              >
                {name}
              </button>
            );
          })}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // CodeViewer — VSCode 스타일 + highlight.js + 파일 탭
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, activeFile, onSelectFile, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot */}
          <div className="bg-[#1c1f24] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">react-agent/</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 파일 탭 */}
          <FileTabs activeFile={activeFile} onSelect={onSelectFile} />

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 */}
          <div className="overflow-auto max-h-[28rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#1c1f24] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.filename} · {code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [activeFile, setActiveFile] = useState(STEPS[0].activeFile);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      // step 변경 시 step.activeFile에 맞춰 탭도 자동 전환
      useEffect(() => {
        setActiveFile(step.activeFile);
      }, [stepIdx]);

      // 현재 표시할 코드 (탭 수동 변경 시는 그 탭 우선)
      const currentCode = FILES[activeFile] || step.code;

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 핵심 패턴 &gt; Chapter 2. ReAct 패턴</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">ReAct 실행 흐름</h1>
                  <p className="text-sm text-slate-500 mt-0.5">실제 코드 단계별 — Thought → Action → Observation 사이클 누적</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                code={currentCode}
                activeFile={activeFile}
                onSelectFile={setActiveFile}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                💡 다음(III-3-1)에서는 <strong>Tool Use</strong>의 정의와 LLM이 도구를 어떻게 호출하는지 살펴봅니다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr; · 파일 탭 클릭으로 코드 비교</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 키워드 칩 */}
            <div className="flex flex-wrap gap-2">
              {['for 루프', 'Thought', 'Action', 'Observation', 'Final Answer', 'max_iter', 'history'].map(kw => (
                <span key={kw} className="bg-amber-50 text-amber-700 px-3 py-1 rounded-full text-xs font-medium border border-amber-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[110px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-2-1.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; III-2-1. ReAct란</a>
              <a href="./III-3-1.html" className="text-amber-700 hover:text-amber-900 font-medium">III-3-1. Tool Use란 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
