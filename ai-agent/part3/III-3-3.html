<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent 학습 — III-3-3. Tool Use + ReAct 통합</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TIMELINE = [
      { type: 'user', text: '서울 날씨 확인하고, 비 오면 실내 데이트 코스 추천해줘' },
      { type: 'thought', text: '먼저 서울 날씨를 확인해야 한다. get_weather 도구를 사용하자.' },
      { type: 'tool_call', text: 'get_weather(city="서울")', tool: 'get_weather' },
      { type: 'tool_result', text: '{"temp": 18, "condition": "비", "rain_prob": 80}' },
      { type: 'thought', text: '비가 올 확률 80%. 실내 데이트 코스를 검색해야 한다.' },
      { type: 'tool_call', text: 'search("서울 실내 데이트 코스 추천")', tool: 'search' },
      { type: 'tool_result', text: '1. 코엑스 아쿠아리움\n2. 국립중앙박물관\n3. 롯데월드\n4. 북서울미술관' },
      { type: 'answer', text: '서울 오늘 날씨는 비(18°C, 강수 80%)입니다.\n\n실내 데이트 코스 추천:\n1. 코엑스 아쿠아리움\n2. 국립중앙박물관\n3. 롯데월드\n4. 북서울미술관\n\n우산 꼭 챙기세요!' },
    ];

    const STEPS = [
      { desc: "[통합 아키텍처] ReAct 루프 안에서 Tool Use가 결합됩니다. 형사가 추리하면서(ReAct) 감식 도구를 사용하는(Tool Use) 통합 수사와 같습니다. 이것이 현대 AI Agent의 표준 패턴입니다.", visibleIdx: 0 },
      { desc: "[Thought 1] LLM이 추론합니다. \"먼저 날씨를 확인해야겠다 → get_weather를 쓰자.\" ReAct의 Thought가 Tool Use의 도구 선택을 결정합니다.", visibleIdx: 2 },
      { desc: "[Tool Call → Result] 날씨 도구를 호출하고 결과를 받습니다. 비, 18도, 강수 80%. 이 Observation이 다음 Thought의 입력이 됩니다.", visibleIdx: 3 },
      { desc: "[Thought 2 → Tool 2] \"비가 오니까 실내 코스를 검색하자\" — 첫 번째 도구 결과를 보고 두 번째 도구를 호출합니다. 도구를 연쇄적으로 사용하는 것이 핵심입니다.", visibleIdx: 6 },
      { desc: "[최종 답변] 두 도구의 결과를 종합하여 자연어로 답변합니다. 날씨 정보 + 추천 코스 + \"우산 챙기세요\" 조언까지. ReAct + Tool Use = 현대 Agent의 표준.", visibleIdx: 7 },
    ];

    const TYPE_STYLE = {
      user: { bg: 'bg-slate-100', border: 'border-slate-300', label: '👤 User', labelColor: 'text-slate-600' },
      thought: { bg: 'bg-amber-50', border: 'border-amber-200', label: '💭 Thought', labelColor: 'text-amber-600' },
      tool_call: { bg: 'bg-sky-50', border: 'border-sky-200', label: '⚡ Tool Call', labelColor: 'text-sky-600' },
      tool_result: { bg: 'bg-emerald-50', border: 'border-emerald-200', label: '📨 Result', labelColor: 'text-emerald-600' },
      answer: { bg: 'bg-violet-50', border: 'border-violet-200', label: '🤖 Answer', labelColor: 'text-violet-600' },
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3500); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-amber-700 hover:text-amber-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 핵심 패턴 &gt; Chapter 3. Tool Use</div>
                  <h1 className="text-2xl font-bold text-slate-800">III-3-3. Tool Use + ReAct 통합</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>형사가 감식 도구를 사용하는 수사</b>처럼, ReAct 루프 안에서 Tool Use가 결합됩니다. 이것이 현대 AI Agent의 표준 아키텍처입니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-amber-600 border-amber-700 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">ReAct + Tool Use 통합</h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 타임라인 */}
            <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 space-y-2">
              <div className="text-xs font-bold text-slate-500 uppercase mb-3">실행 타임라인</div>
              {TIMELINE.map((item, i) => {
                const style = TYPE_STYLE[item.type];
                const isVisible = i <= stepData.visibleIdx;
                const isLatest = i === stepData.visibleIdx && i > 0;
                return (
                  <div key={i} className={`transition-all duration-500 ${isVisible ? 'opacity-100' : 'opacity-0 h-0 overflow-hidden'}`}>
                    <div className={`p-3 rounded-lg border ${style.bg} ${style.border} ${isLatest ? 'ring-2 ring-amber-300 scale-[1.02]' : ''}`}>
                      <span className={`text-xs font-bold ${style.labelColor}`}>{style.label}</span>
                      <div className={`text-sm mt-1 whitespace-pre-line ${item.type === 'tool_call' ? 'font-mono' : ''} ${item.type === 'tool_result' ? 'font-mono text-xs' : ''}`}>{item.text}</div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* 아키텍처 요약 (마지막 단계) */}
            {isEnd && (
              <div className="bg-amber-50 border border-amber-200 rounded-xl p-5">
                <div className="font-bold text-amber-800 text-center mb-3">현대 AI Agent의 표준 아키텍처</div>
                <div className="flex items-center justify-center gap-2 text-sm">
                  <span className="bg-amber-200 text-amber-800 px-3 py-1 rounded-full font-bold">Thought</span>
                  <span className="text-amber-400">→</span>
                  <span className="bg-sky-200 text-sky-800 px-3 py-1 rounded-full font-bold">Tool Call</span>
                  <span className="text-amber-400">→</span>
                  <span className="bg-emerald-200 text-emerald-800 px-3 py-1 rounded-full font-bold">Observation</span>
                  <span className="text-amber-400">→</span>
                  <span className="text-amber-600 font-bold">반복</span>
                </div>
              </div>
            )}

            <div className="flex flex-wrap gap-2">
              {['ReAct + Tool Use', 'Agent 루프', '통합 아키텍처', '표준 패턴'].map(kw => (
                <span key={kw} className="bg-amber-50 text-amber-700 px-3 py-1 rounded-full text-sm font-medium border border-amber-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-amber-600 hover:bg-amber-700">{isPlaying ? <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</> : <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>}</button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>
            <div className="text-sm text-slate-500 flex justify-between">
              <a href="./III-3-2.html" className="text-amber-600 hover:text-amber-800 font-medium">← III-3-2. Function Calling 상세</a>
              <span className="text-slate-400">Part III 완료! 다음: <a href="../part4/IV-1-1.html" className="text-rose-600 hover:text-rose-800 font-medium">Part IV. MCP →</a></span>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
