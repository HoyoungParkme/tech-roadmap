    // ─────────────────────────────────────────────────────
    // Agent Flow SVG — LLM ↔ Tool Selector ↔ Tool ↔ Result

    function AgentFlow({ nodes, cycleLabel }) {
      const w = 380;
      const h = 220;

      // 4개 노드 좌표
      const positions = {
        llm:      { x: 70,  y: 60,  label: 'LLM',           sub: 'Thought',     icon: '🧠' },
        selector: { x: 280, y: 60,  label: 'Tool Selector', sub: 'Action',      icon: '🎯' },
        tool:     { x: 280, y: 170, label: 'Tool Exec',     sub: 'execute',     icon: '⚡' },
        result:   { x: 70,  y: 170, label: 'Observation',   sub: 'feedback',    icon: '📨' },
      };

      const arrows = [
        { from: 'llm',      to: 'selector', label: 'pick' },
        { from: 'selector', to: 'tool',     label: 'call' },
        { from: 'tool',     to: 'result',   label: 'data' },
        { from: 'result',   to: 'llm',      label: 'next' },
      ];

      const nodeColor = (n) => n.active ? (n.glow ? '#d97706' : '#f59e0b') : '#fde68a';
      const nodeStroke = (n) => n.active ? '#92400e' : '#fbbf24';
      const nodeText = (n) => n.active ? 'white' : '#78350f';

      return (
        <div className="rounded-lg bg-gradient-to-br from-amber-50 to-amber-100 border border-amber-200 p-2">
          <div className="text-[11px] font-bold text-amber-800 mb-1 flex items-center justify-between gap-1">
            <span className="flex items-center gap-1"><span>🔄</span><span>Agent 흐름 (ReAct + Tool Use)</span></span>
            <span className="text-[10px] text-amber-700 font-mono bg-amber-200/60 px-2 py-0.5 rounded">{cycleLabel}</span>
          </div>
          <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
            <defs>
              <pattern id="grid-agent" width="30" height="30" patternUnits="userSpaceOnUse">
                <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#fde68a" strokeWidth="0.5" />
              </pattern>
              <marker id="arrow-amber" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
                <path d="M0,0 L9,4.5 L0,9 Z" fill="#d97706" />
              </marker>
              <marker id="arrow-amber-faded" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
                <path d="M0,0 L9,4.5 L0,9 Z" fill="#fbbf24" />
              </marker>
            </defs>
            <rect width={w} height={h} fill="url(#grid-agent)" />

            {/* 화살표 (노드 뒤에) */}
            {arrows.map((a, i) => {
              const from = positions[a.from];
              const to = positions[a.to];
              const fromActive = nodes[a.from]?.active;
              const toActive = nodes[a.to]?.active;
              const isActive = fromActive && toActive;

              // 사각형 가장자리에서 시작/끝나도록 살짝 보정
              const dx = to.x - from.x;
              const dy = to.y - from.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              const offset = 36;
              const x1 = from.x + (dx / dist) * offset;
              const y1 = from.y + (dy / dist) * offset;
              const x2 = to.x - (dx / dist) * offset;
              const y2 = to.y - (dy / dist) * offset;

              const midX = (x1 + x2) / 2;
              const midY = (y1 + y2) / 2;
              const stroke = isActive ? '#d97706' : '#fbbf24';
              const opacity = isActive ? 1 : 0.45;

              return (
                <g key={`arr${i}`} className="transition-all duration-700">
                  <line
                    x1={x1} y1={y1} x2={x2} y2={y2}
                    stroke={stroke}
                    strokeWidth={isActive ? 2.5 : 1.5}
                    opacity={opacity}
                    strokeDasharray={isActive ? '0' : '4,3'}
                    markerEnd={isActive ? 'url(#arrow-amber)' : 'url(#arrow-amber-faded)'}
                  />
                  <text
                    x={midX}
                    y={midY - 4}
                    textAnchor="middle"
                    fontSize="9"
                    fontWeight={isActive ? 'bold' : 'normal'}
                    fill={isActive ? '#92400e' : '#a16207'}
                    fontFamily="monospace"
                    opacity={isActive ? 1 : 0.7}
                  >
                    {a.label}
                  </text>
                </g>
              );
            })}

            {/* 노드 */}
            {Object.entries(positions).map(([id, p]) => {
              const n = nodes[id] || { active: false, glow: false };
              const fill = nodeColor(n);
              const stroke = nodeStroke(n);
              const tcolor = nodeText(n);

              return (
                <g key={id} className="transition-all duration-700">
                  {n.glow && (
                    <rect
                      x={p.x - 50}
                      y={p.y - 28}
                      width={100}
                      height={56}
                      rx={10}
                      fill="none"
                      stroke="#d97706"
                      strokeWidth="2"
                      opacity="0.5"
                    >
                      <animate attributeName="opacity" from="0.7" to="0.1" dur="1.4s" repeatCount="indefinite" />
                    </rect>
                  )}
                  <rect
                    x={p.x - 46}
                    y={p.y - 24}
                    width={92}
                    height={48}
                    rx={8}
                    fill={fill}
                    stroke={stroke}
                    strokeWidth="2"
                  />
                  <text
                    x={p.x - 30}
                    y={p.y - 4}
                    fontSize="14"
                    fill={tcolor}
                  >
                    {p.icon}
                  </text>
                  <text
                    x={p.x + 10}
                    y={p.y - 4}
                    fontSize="11"
                    fontWeight="bold"
                    fill={tcolor}
                    fontFamily="monospace"
                  >
                    {p.label}
                  </text>
                  <text
                    x={p.x}
                    y={p.y + 14}
                    textAnchor="middle"
                    fontSize="9"
                    fill={tcolor}
                    fontFamily="monospace"
                    opacity="0.85"
                  >
                    {p.sub}
                  </text>
                </g>
              );
            })}
          </svg>
          <div className="text-[9px] text-amber-700 mt-1 text-center font-mono">
            노드 = Agent 컴포넌트 · 점선 = 비활성 · 실선 = 현재 사이클 흐름
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 메시지 박스 (사이클 누적)
    // ─────────────────────────────────────────────────────
    const KIND_STYLE = {
      init:        { bg: 'bg-slate-100',    border: 'border-slate-300',    label: '🛠 Initialize',  labelColor: 'text-slate-700' },
      user:        { bg: 'bg-slate-100',    border: 'border-slate-300',    label: '👤 User',        labelColor: 'text-slate-700' },
      thought:     { bg: 'bg-amber-50',     border: 'border-amber-300',    label: '💭 Thought',     labelColor: 'text-amber-700' },
      tool_call:   { bg: 'bg-sky-50',       border: 'border-sky-300',      label: '⚡ Tool Call',    labelColor: 'text-sky-700' },
      observation: { bg: 'bg-emerald-50',   border: 'border-emerald-300',  label: '📨 Observation', labelColor: 'text-emerald-700' },
      answer:      { bg: 'bg-violet-50',    border: 'border-violet-300',   label: '🤖 Final Answer', labelColor: 'text-violet-700' },
      summary:     { bg: 'bg-amber-100',    border: 'border-amber-400',    label: '✓ Summary',      labelColor: 'text-amber-800' },
    };

    function MessageList({ messages }) {
      return (
        <div className="space-y-1.5">
          {messages.map((m, i) => {
            const style = KIND_STYLE[m.kind] || KIND_STYLE.user;
            const isMono = m.kind === 'tool_call' || m.kind === 'observation';
            return (
              <div
                key={i}
                className={`p-2 rounded-md border ${style.bg} ${style.border} transition-all duration-500 ${m.fade ? 'opacity-50' : 'opacity-100'}`}
              >
                <div className={`text-[10px] font-bold ${style.labelColor} uppercase tracking-wider`}>{style.label}</div>
                <div className={`text-xs mt-0.5 whitespace-pre-line ${isMono ? 'font-mono' : ''} text-slate-800`}>
                  {m.text}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — Agent SVG + 메시지 박스
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🕵 형사 수사 — ReAct + Tool Use</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <AgentFlow nodes={step.nodes} cycleLabel={step.cycleLabel} />

          <div className="mt-3 pt-3 border-t border-slate-100">
            <div className="text-[10px] uppercase tracking-wider text-slate-500 font-bold mb-2">실행 사이클</div>
            <MessageList messages={step.messages} />
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode CodeViewer — 파일 탭 + highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ activeFile, setActiveFile, stepIdx, total }) {
      const code = CODE_FILES[activeFile];
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      const fileTabs = ['mini-agent.py', 'init.py', 'loop.py', 'tools.py', 'system-prompt.md'];

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 행 */}
          <div className="bg-[#21252b] px-3 py-1.5 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5 mr-2">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <div className="flex gap-1 overflow-x-auto">
              {fileTabs.map((f) => {
                const isActive = f === activeFile;
                return (
                  <button
                    key={f}
                    onClick={() => setActiveFile(f)}
                    className={`text-[10px] px-2 py-1 rounded-t font-mono whitespace-nowrap transition ${
                      isActive
                        ? 'bg-[#282c34] text-amber-300 border-t border-l border-r border-amber-500/40'
                        : 'text-slate-500 hover:text-slate-300'
                    }`}
                  >
                    {f}
                  </button>
                );
              })}
            </div>
          </div>

          {/* hljs hidden */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 라인 + 강조 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.lang}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [activeFile, setActiveFile] = useState(STEPS[0].activeFile);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      // step이 바뀌면 추천 파일을 자동 활성화
      useEffect(() => {
        setActiveFile(step.activeFile);
      }, [stepIdx]);

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-3-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 핵심 패턴 &gt; Chapter 3. Tool Use</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-3-3. Tool Use + ReAct 통합</h1>
                  <p className="text-sm text-slate-500 mt-0.5">형사 수사 — 30라인으로 동작하는 표준 Agent 패턴</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                activeFile={activeFile}
                setActiveFile={setActiveFile}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                💡 다음(Part IV)에서는 <strong>MCP (Model Context Protocol)</strong> — Tool Use를 표준 프로토콜로 확장하는 방법을 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[110px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['ReAct + Tool Use', 'Agent 루프', '30라인 미니 Agent', '표준 패턴'].map((kw) => (
                <span
                  key={kw}
                  className="bg-amber-50 text-amber-700 px-3 py-1 rounded-full text-xs font-medium border border-amber-200"
                >
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-3-2.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; III-3-2 Function Calling 상세</a>
              <a href="../part4/IV-1-1.html" className="text-rose-700 hover:text-rose-900 font-medium">Part IV. MCP &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
