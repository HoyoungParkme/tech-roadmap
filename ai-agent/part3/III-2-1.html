    function ReactLoopDiagram({ activePhase, mode }) {
      const w = 360;
      const h = 240;
      const cx = w / 2;
      const cy = h / 2;
      const r = 80;
      // 3개 노드 위치 (정삼각형 — 위, 우하, 좌하)

        thought:     { x: cx,         y: cy - r,        icon: '💭', label: 'Thought',     short: '추론' },

        observation: { x: cx - r * 0.87, y: cy + r * 0.5,  icon: '👁', label: 'Observation', short: '관찰' },
      };
      // 화살표 순서: thought → action → observation → thought

        { from: 'thought',     to: 'action' },
        { from: 'action',      to: 'observation' },
        { from: 'observation', to: 'thought' },
      ];

      // 모드별 강조
      const showAll = mode === 'react' || mode === 'example';
      const isCotOnly = mode === 'cot';
      const isToolOnly = mode === 'tool';

      // 활성 노드 판정
      const isActive = (key) => {
        if (activePhase === key) return true;
        return false;
      };

      // 노드 dim 처리

        if (isCotOnly) return key !== 'thought';
        if (isToolOnly) return key === 'thought';
        return false;
      };

      return (
        <div className="rounded-lg bg-gradient-to-br from-amber-50 to-amber-100 border border-amber-200 p-2">
          <div className="text-[11px] font-bold text-amber-800 mb-1 flex items-center gap-1">
            <span>🔁</span>
            <span>ReAct 루프 — Thought → Action → Observation</span>
          </div>
          <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
            <defs>
              <pattern id="grid-react" width="30" height="30" patternUnits="userSpaceOnUse">
                <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#fde68a" strokeWidth="0.5" />
              </pattern>
              <marker id="arrow-react" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
                <path d="M0,0 L9,4.5 L0,9 Z" fill="#d97706" />
              </marker>
              <marker id="arrow-dim" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
                <path d="M0,0 L8,4 L0,8 Z" fill="#cbd5e1" />
              </marker>
            </defs>
            <rect width={w} height={h} fill="url(#grid-react)" />

            {/* 화살표 (호로 그려서 순환 느낌) */}
            {arrows.map((arr, i) => {
              const a = positions[arr.from];
              const b = positions[arr.to];
              const dimmed = isDimmed(arr.from) || isDimmed(arr.to);
              const stroke = dimmed ? '#cbd5e1' : '#d97706';
              const sw = dimmed ? 1.5 : 2.5;
              // 노드 가장자리에서 시작하도록 거리 보정
              const nodeR = 28;
              const dx = b.x - a.x;
              const dy = b.y - a.y;
              const len = Math.sqrt(dx * dx + dy * dy);
              const ux = dx / len;
              const uy = dy / len;
              const x1 = a.x + ux * nodeR;
              const y1 = a.y + uy * nodeR;
              const x2 = b.x - ux * nodeR;
              const y2 = b.y - uy * nodeR;
              // 곡선 컨트롤 포인트 (살짝 바깥으로)
              const mx = (x1 + x2) / 2;
              const my = (y1 + y2) / 2;
              const ctrlX = mx + uy * 25;
              const ctrlY = my - ux * 25;
              return (
                <path
                  key={`arr${i}`}
                  d={`M ${x1} ${y1} Q ${ctrlX} ${ctrlY} ${x2} ${y2}`}
                  fill="none"
                  stroke={stroke}
                  strokeWidth={sw}
                  opacity={dimmed ? 0.4 : 0.85}
                  markerEnd={dimmed ? 'url(#arrow-dim)' : 'url(#arrow-react)'}
                  className="transition-all duration-500"
                />
              );
            })}

            {/* 3 노드 */}
            {Object.entries(positions).map(([key, p]) => {
              const active = isActive(key);
              const dimmed = isDimmed(key);
              const fill = active ? '#d97706' : (dimmed ? '#e2e8f0' : '#fed7aa');
              const stroke = active ? '#92400e' : (dimmed ? '#94a3b8' : '#d97706');
              const textColor = active ? '#fff' : (dimmed ? '#94a3b8' : '#7c2d12');
              const nodeR = active ? 30 : 26;
              return (
                <g key={key} className="transition-all duration-500">
                  {active && (
                    <circle cx={p.x} cy={p.y} r={nodeR + 8} fill="none" stroke="#d97706" strokeWidth="2" opacity="0.5">
                      <animate attributeName="r" from={nodeR + 4} to={nodeR + 14} dur="1.4s" repeatCount="indefinite" />
                      <animate attributeName="opacity" from="0.6" to="0" dur="1.4s" repeatCount="indefinite" />
                    </circle>
                  )}
                  <circle cx={p.x} cy={p.y} r={nodeR} fill={fill} stroke={stroke} strokeWidth="2.5" opacity={dimmed ? 0.5 : 1} />
                  <text x={p.x} y={p.y - 2} textAnchor="middle" fontSize="14" pointerEvents="none">{p.icon}</text>
                  <text x={p.x} y={p.y + 14} textAnchor="middle" fontSize="9" fontWeight="bold" fill={textColor} fontFamily="monospace" pointerEvents="none">{p.short}</text>
                </g>
              );
            })}

            {/* 모드 라벨 */}
            <text x={cx} y={h - 8} textAnchor="middle" fontSize="9" fill="#92400e" fontFamily="monospace" fontWeight="bold">
              {isCotOnly && 'CoT only — 추론만 활성'}
              {isToolOnly && 'Tool Use only — 행동만 활성'}
              {showAll && 'ReAct — 전체 루프 활성'}
              {mode === 'compare' && '3가지 패턴 비교'}
            </text>
          </svg>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 메시지 박스 — Thought / Action / Observation 누적
    // ─────────────────────────────────────────────────────
    function MessageStack({ messages, question, answer, answerType }) {
      const styles = {
        thought:     { bg: 'bg-amber-50',   border: 'border-amber-300',   text: 'text-amber-900',   label: 'text-amber-700',   icon: '💭', name: 'Thought' },
        action:      { bg: 'bg-sky-50',     border: 'border-sky-300',     text: 'text-sky-900',     label: 'text-sky-700',     icon: '⚡', name: 'Action' },
        observation: { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-900', label: 'text-emerald-700', icon: '👁', name: 'Observation' },
      };

      const ansStyle = {
        unknown: 'bg-slate-50 border-slate-300 text-slate-700',
        fail:    'bg-red-50 border-red-400 text-red-800',
        success: 'bg-emerald-50 border-emerald-400 text-emerald-800',
      };

      return (
        <div className="space-y-2">
          {question && (
            <div className="rounded-lg bg-amber-600 text-white p-2.5 flex items-start gap-2 shadow-sm">
              <span className="text-base leading-none">❓</span>
              <div className="flex-1">
                <div className="text-[9px] uppercase tracking-wider text-amber-100 font-bold">사용자 질문</div>
                <div className="text-xs font-bold mt-0.5">{question}</div>
              </div>
            </div>
          )}

          {messages && messages.length > 0 && (
            <div className="space-y-1.5 max-h-[260px] overflow-y-auto pr-1">
              {messages.map((m, i) => {
                const s = styles[m.role] || styles.thought;
                return (
                  <div key={i} className={`rounded-md border ${s.bg} ${s.border} p-2 flex items-start gap-2 transition-all duration-300`}>
                    <span className="text-sm leading-none mt-0.5">{s.icon}</span>
                    <div className="flex-1 min-w-0">
                      <div className={`text-[9px] uppercase tracking-wider font-bold ${s.label}`}>{s.name}</div>
                      <div className={`text-[11px] mt-0.5 ${s.text} ${m.role === 'action' ? 'font-mono' : 'leading-relaxed'} break-words`}>{m.text}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {answer && (
            <div className={`rounded-lg border-2 ${ansStyle[answerType]} p-2.5 flex items-start gap-2`}>
              <span className="text-base leading-none">
                {answerType === 'success' ? '✅' : answerType === 'fail' ? '⚠️' : '💬'}
              </span>
              <div className="flex-1">
                <div className="text-[9px] uppercase tracking-wider font-bold opacity-70">최종 답변</div>
                <div className="text-xs font-medium mt-0.5 leading-relaxed">{answer}</div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 비교 표 (Step 5)
    // ─────────────────────────────────────────────────────
    function CompareTable() {
      const rows = [
        { k: '추론(Reasoning)',     cot: 'O',   tool: 'X',   react: 'O' },
        { k: '행동(Acting)',        cot: 'X',   tool: 'O',   react: 'O' },
        { k: '다단계 검증',         cot: 'X',   tool: 'X',   react: 'O' },
        { k: '실시간 데이터',       cot: 'X',   tool: 'O',   react: 'O' },
        { k: 'Hallucination 위험', cot: '높음', tool: '중간', react: '낮음' },
        { k: '추론 투명성',         cot: '중간', tool: '낮음', react: '높음' },
        { k: 'LLM 호출 비용',       cot: '1회', tool: '1~2회', react: 'N회' },
      ];

      const cellStyle = (v) => {
        if (v === 'O' || v === '낮음' || v === '높음 (좋음)') return 'text-emerald-700 font-bold';
        if (v === 'X' || v === '높음') return 'text-red-700 font-bold';
        return 'text-slate-700';
      };

      return (
        <div className="rounded-lg bg-white border-2 border-amber-300 overflow-hidden">
          <div className="bg-amber-100 px-3 py-2 border-b border-amber-200">
            <div className="text-xs font-bold text-amber-900">📊 CoT vs Tool Use vs ReAct</div>
          </div>
          <table className="w-full text-[11px]">
            <thead>
              <tr className="bg-amber-50 text-left">
                <th className="px-3 py-2 font-bold text-amber-700 w-1/3">기준</th>
                <th className="px-3 py-2 font-bold text-slate-600 text-center">CoT</th>
                <th className="px-3 py-2 font-bold text-slate-600 text-center">Tool Use</th>
                <th className="px-3 py-2 font-bold text-amber-700 text-center">ReAct</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r, i) => (
                <tr key={r.k} className={i % 2 === 0 ? 'bg-white' : 'bg-amber-50/40'}>
                  <td className="px-3 py-1.5 font-bold text-slate-700 border-r border-slate-100">{r.k}</td>
                  <td className={`px-3 py-1.5 text-center font-mono ${cellStyle(r.cot)}`}>{r.cot}</td>
                  <td className={`px-3 py-1.5 text-center font-mono ${cellStyle(r.tool)}`}>{r.tool}</td>
                  <td className={`px-3 py-1.5 text-center font-mono ${cellStyle(r.react)}`}>{r.react}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌(루프 다이어그램) + 메시지 박스
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🕵️ 형사의 수사 — 추론 + 행동의 결합</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {step.showCompare ? (
            <CompareTable />
          ) : (
            <>
              <ReactLoopDiagram activePhase={step.activePhase} mode={step.mode} />
              <div className="mt-3">
                <MessageStack
                  messages={step.messages}
                  question={step.question}
                  answer={step.answer}
                  answerType={step.answerType}
                />
              </div>
            </>
          )}

          {/* 범례 */}
          {!step.showCompare && (
            <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
              <span className="flex items-center gap-1">
                <span className="w-2.5 h-2.5 rounded-full bg-amber-300"></span>
                Thought (추론)
              </span>
              <span className="flex items-center gap-1">
                <span className="w-2.5 h-2.5 rounded-full bg-sky-300"></span>
                Action (도구 호출)
              </span>
              <span className="flex items-center gap-1">
                <span className="w-2.5 h-2.5 rounded-full bg-emerald-300"></span>
                Observation (결과)
              </span>
              <span className="flex items-center gap-1 ml-auto">
                <span className="w-2.5 h-2.5 rounded-full bg-slate-300"></span>
                미사용
              </span>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + 라인 번호
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      // 5개 파일 탭 (모든 단계에서 표시 — 현재 파일 강조)
      const FILE_TABS = [
        { idx: 0, filename: 'cot-only.py' },
        { idx: 1, filename: 'tool-only.py' },
        { idx: 2, filename: 'react.py' },
        { idx: 3, filename: 'example.py' },
        { idx: 4, filename: 'compare.md' },
      ];

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot */}
          <div className="bg-[#21252b] px-4 py-1.5 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 파일 탭 (5개) */}
          <div className="bg-[#21252b] flex items-center border-b border-slate-700 overflow-x-auto">
            {FILE_TABS.map((tab) => {
              const active = tab.filename === code.filename;
              return (
                <div
                  key={tab.filename}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                    active
                      ? 'bg-[#282c34] text-amber-300 border-t-2 border-t-amber-500'
                      : 'text-slate-500 hover:text-slate-300'
                  }`}
                >
                  {tab.filename}
                </div>
              );
            })}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[32rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum III-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 핵심 패턴 &gt; Chapter 2. ReAct 패턴</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">III-2-1. ReAct란 — Reasoning + Acting</h1>
                  <p className="text-sm text-slate-500 mt-0.5">형사의 수사 — 추리(Thought) → 조사(Action) → 단서(Observation) → 다시 추리</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                💡 다음(III-2-2)에서는 <strong>ReAct 실행 흐름</strong>을 직접 따라가며 LangChain AgentExecutor가 내부적으로 어떻게 루프를 돌리는지 본다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 키워드 칩 */}
            <div className="flex flex-wrap gap-2">
              {['ReAct', 'Reasoning', 'Acting', 'Thought-Action-Observation', '추론-행동 루프', 'Hallucination 감소'].map(kw => (
                <span key={kw} className="bg-amber-50 text-amber-700 px-3 py-1 rounded-full text-sm font-medium border border-amber-200">{kw}</span>
              ))}
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[110px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./III-1-2.html" className="text-amber-600 hover:text-amber-800 font-medium">&larr; III-1-2 Few-shot CoT</a>
              <a href="./III-2-2.html" className="text-amber-700 hover:text-amber-900 font-medium">III-2-2 ReAct 실행 흐름 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
