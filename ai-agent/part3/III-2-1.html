<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent 학습 — III-2-1. ReAct란</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const LOOP = [
      { phase: 'thought', icon: '💭', label: 'Thought (추론)', color: 'amber' },
      { phase: 'action',  icon: '⚡', label: 'Action (행동)', color: 'sky' },
      { phase: 'observation', icon: '👁️', label: 'Observation (관찰)', color: 'emerald' },
    ];

    const SCENARIO = [
      { phase: 'start', thought: '', action: '', observation: '', question: '서울 여행 3일 코스 짜줘. 내일 날씨도 알려줘.' },
      { phase: 'thought', thought: '사용자가 서울 여행 코스와 내일 날씨를 원한다. 먼저 내일 서울 날씨를 확인해야겠다.', action: '', observation: '' },
      { phase: 'action', thought: '사용자가 서울 여행 코스와 내일 날씨를 원한다. 먼저 내일 서울 날씨를 확인해야겠다.', action: 'search("서울 내일 날씨")', observation: '' },
      { phase: 'observation', thought: '', action: '', observation: '서울 내일: 맑음, 최고 24°C, 강수 확률 10%' },
      { phase: 'thought2', thought: '날씨가 맑으니 야외 관광지 위주로 코스를 짜자. 경복궁 → 북촌 → 남산 순서가 좋겠다.', action: '', observation: '' },
      { phase: 'finish', thought: '', action: '', observation: '', answer: '내일 서울은 맑음(24°C)입니다!\n\n3일 코스:\nDay 1: 경복궁 → 북촌한옥마을 → 인사동\nDay 2: 남산타워 → 이태원 → 한강공원\nDay 3: 홍대 → 연남동 → 망원시장' },
    ];

    const STEPS = [
      { desc: "[질문] 사용자가 \"서울 여행 3일 코스 + 내일 날씨\"를 요청합니다. ReAct Agent는 이 요청을 Thought → Action → Observation 루프로 처리합니다.", scenarioIdx: 0, activePhase: null },
      { desc: "[Thought 1] 형사의 추리처럼, Agent가 먼저 생각합니다. \"날씨를 먼저 확인해야겠다\" — 다음에 뭘 할지 결정합니다.", scenarioIdx: 1, activePhase: 'thought' },
      { desc: "[Action 1] 생각한 대로 행동합니다. 날씨 검색 도구를 호출합니다. Thought가 Action을 결정합니다.", scenarioIdx: 2, activePhase: 'action' },
      { desc: "[Observation 1] 행동의 결과를 관찰합니다. \"맑음, 24°C, 강수 10%\" — 이 결과가 다음 Thought의 입력이 됩니다.", scenarioIdx: 3, activePhase: 'observation' },
      { desc: "[Thought 2 → 완료] 관찰 결과를 바탕으로 다시 추론합니다. \"날씨가 맑으니 야외 위주로\" — 그리고 최종 답변을 생성합니다. 이것이 ReAct = Reasoning + Acting입니다.", scenarioIdx: 5, activePhase: 'finish' },
    ];

    const cMap = { amber: { bg: 'bg-amber-50', border: 'border-amber-300', text: 'text-amber-700', ring: 'ring-amber-200' }, sky: { bg: 'bg-sky-50', border: 'border-sky-300', text: 'text-sky-700', ring: 'ring-sky-200' }, emerald: { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-700', ring: 'ring-emerald-200' } };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const scene = SCENARIO[stepData.scenarioIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3500); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-amber-700 hover:text-amber-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">III</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part III. 핵심 패턴 &gt; Chapter 2. ReAct 패턴</div>
                  <h1 className="text-2xl font-bold text-slate-800">III-2-1. ReAct란: Reasoning + Acting</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>형사의 수사</b>처럼, 추리하고(Thought) → 조사하고(Action) → 결과를 보고(Observation) → 다시 추리합니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-amber-600 border-amber-700 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">Thought → Action → Observation</h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 루프 다이어그램 */}
            <div className="flex items-center justify-center gap-3 md:gap-6 py-2">
              {LOOP.map((item, i) => {
                const c = cMap[item.color];
                const isActive = stepData.activePhase === item.phase || stepData.activePhase === 'finish' || (stepData.activePhase === 'thought2' && item.phase === 'thought');
                return (
                  <React.Fragment key={item.phase}>
                    <div className={`flex flex-col items-center transition-all duration-500 ${isActive ? 'scale-110' : 'opacity-30 scale-95'}`}>
                      <div className={`w-16 h-16 md:w-20 md:h-20 rounded-full border-2 flex items-center justify-center text-2xl md:text-3xl ${c.bg} ${c.border} ${isActive ? `ring-4 ${c.ring} shadow-lg` : ''}`}>{item.icon}</div>
                      <div className={`mt-1 font-bold text-xs ${c.text}`}>{item.label}</div>
                    </div>
                    {i < LOOP.length - 1 && <div className={`text-xl md:text-2xl ${stepData.activePhase ? 'text-amber-400' : 'text-slate-200'}`}>→</div>}
                  </React.Fragment>
                );
              })}
            </div>

            {/* 시나리오 상세 */}
            <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 space-y-3">
              {scene.question && (
                <div className="bg-slate-100 rounded-lg p-3"><span className="text-xs font-bold text-slate-500">사용자 질문:</span><div className="text-sm text-slate-800 mt-1">{scene.question}</div></div>
              )}
              {scene.thought && (
                <div className="bg-amber-50 border border-amber-200 rounded-lg p-3"><span className="text-xs font-bold text-amber-600">💭 Thought:</span><div className="text-sm text-amber-800 mt-1">{scene.thought}</div></div>
              )}
              {scene.action && (
                <div className="bg-sky-50 border border-sky-200 rounded-lg p-3"><span className="text-xs font-bold text-sky-600">⚡ Action:</span><div className="text-sm font-mono text-sky-800 mt-1">{scene.action}</div></div>
              )}
              {scene.observation && (
                <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3"><span className="text-xs font-bold text-emerald-600">👁️ Observation:</span><div className="text-sm text-emerald-800 mt-1">{scene.observation}</div></div>
              )}
              {scene.answer && (
                <div className="bg-violet-50 border border-violet-200 rounded-lg p-3"><span className="text-xs font-bold text-violet-600">🤖 최종 답변:</span><div className="text-sm text-violet-800 mt-1 whitespace-pre-line">{scene.answer}</div></div>
              )}
            </div>

            <div className="flex flex-wrap gap-2">
              {['ReAct', 'Thought', 'Action', 'Observation', '추론-행동 루프'].map(kw => (
                <span key={kw} className="bg-amber-50 text-amber-700 px-3 py-1 rounded-full text-sm font-medium border border-amber-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-amber-600 hover:bg-amber-700">{isPlaying ? <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</> : <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>}</button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>
            <div className="text-sm text-slate-500 flex justify-between">
              <a href="./III-1-2.html" className="text-amber-600 hover:text-amber-800 font-medium">← III-1-2. Few-shot CoT</a>
              <a href="./III-2-2.html" className="text-amber-600 hover:text-amber-800 font-medium">III-2-2. ReAct 실행 흐름 →</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
