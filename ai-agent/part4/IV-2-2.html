    학습 목표: MCP가 JSON-RPC 2.0 위에서 5단계 라이프사이클로 동작하는 흐름을 이해하고,
              각 단계의 메시지(method/params/result/notification)를 직접 추적해본다.
    핵심 비유: 전화 통화 — 안내(Initialize) → 메뉴 듣기(Discovery) → 메뉴 선택(Invocation)
              → 푸시 알림(Notification) → 끊기(Shutdown)
    패턴: fastapi v1 — 좌(LiveDataPane: Sequence diagram + JSON payload) / 우(VSCode CodeViewer)
    색상: ai-agent amber
  -->

    //   activeId   : 현재 단계에서 강조할 메시지 id (payload 박스 표출)

            '//  HTTP+SSE : Client가 SSE 스트림 disconnect → 세션 만료',
            '// ─── 전체 라이프사이클 요약 (5단계) ───',
            '//   1) Initialize   : initialize → result → notifications/initialized',
            '//   2) Discovery    : tools/list, resources/list, prompts/list',
            '//   3) Invocation   : tools/call → result.content',
            '//   4) Notification : subscribe → updated → read (server push)',
            '//   5) Shutdown     : shutdown → ok → notifications/exit',
            '//',
            '// 핵심: 5단계 모두 같은 JSON-RPC 2.0 메시지 형식.',
            '//       transport가 stdio든 HTTP든 메시지 본문은 동일하다.',
          ],
          highlight: [2, 3, 4, 5, 8, 9, 10, 11, 12, 13, 15, 16, 17, 18],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 메시지 화살표 — kind/dir에 따른 색상/스타일
    // ─────────────────────────────────────────────────────
    const KIND_STYLES = {
      request: {
        bg: 'bg-amber-50',
        border: 'border-amber-300',
        text: 'text-amber-800',
        badge: 'bg-amber-500',
        icon: '→',
      },
      response: {
        bg: 'bg-sky-50',
        border: 'border-sky-300',
        text: 'text-sky-800',
        badge: 'bg-sky-500',
        icon: '←',
      },
      notification: {
        bg: 'bg-violet-50',
        border: 'border-violet-300',
        text: 'text-violet-800',
        badge: 'bg-violet-500',
        icon: '⇢',
      },
    };

    // ─────────────────────────────────────────────────────
    // SequenceDiagram — Client / Server 두 레인 + 메시지 화살표
    // ─────────────────────────────────────────────────────
    function SequenceDiagram({ messages, activeId }) {
      // 표시 가능한 메시지만 (payload === null인 메시지는 dim 처리)
      const visible = messages.filter(Boolean);

      return (
        <div className="rounded-lg bg-gradient-to-br from-amber-50 to-orange-50 border border-amber-200 p-3">
          {/* 레인 헤더 */}
          <div className="flex items-stretch gap-2 mb-2">
            <div className="flex-1 text-center">
              <div className="inline-flex items-center gap-1.5 px-3 py-1.5 bg-sky-500 text-white rounded-lg shadow-sm">
                <span className="text-base">💻</span>
                <span className="text-xs font-bold">Client (LLM Host)</span>
              </div>
            </div>
            <div className="flex-1 text-center">
              <div className="inline-flex items-center gap-1.5 px-3 py-1.5 bg-amber-600 text-white rounded-lg shadow-sm">
                <span className="text-base">🛠️</span>
                <span className="text-xs font-bold">MCP Server</span>
              </div>
            </div>
          </div>

          {/* 라이프라인 + 메시지 영역 */}
          <div className="relative">
            {/* 두 레인 수직선 */}
            <div className="absolute inset-0 flex pointer-events-none">
              <div className="flex-1 flex justify-center">
                <div className="w-0.5 bg-sky-300"></div>
              </div>
              <div className="flex-1 flex justify-center">
                <div className="w-0.5 bg-amber-400"></div>
              </div>
            </div>

            {/* 메시지 화살표들 */}
            <div className="relative space-y-2 py-2">
              {visible.map((m) => {
                const style = KIND_STYLES[m.kind];
                const dir = m.from === 'client' ? 'right' : 'left';
                const isActive = m.id === activeId;
                const opacity = m.hit ? 1 : 0.3;
                const arrowChar = dir === 'right' ? '➡' : '⬅';

                return (
                  <div
                    key={m.id}
                    className={`flex items-center transition-all duration-500 ${isActive ? 'scale-105' : ''}`}
                    style={{ opacity }}
                  >
                    <div
                      className={`mx-auto w-[88%] rounded-md border ${style.border} ${style.bg} px-2 py-1 ${
                        isActive ? 'ring-2 ring-amber-400 shadow-md' : 'shadow-sm'
                      }`}
                    >
                      <div className="flex items-center gap-2">
                        <span className={`inline-block w-1.5 h-1.5 rounded-full ${style.badge}`}></span>
                        <span className={`text-[9px] uppercase font-bold ${style.text} tracking-wider`}>
                          {m.kind}
                        </span>
                        {dir === 'right' ? (
                          <span className="text-amber-600 text-xs">{arrowChar}</span>
                        ) : (
                          <span className="text-sky-600 text-xs">{arrowChar}</span>
                        )}
                        <code className={`text-[11px] font-mono font-semibold ${style.text} flex-1 truncate`}>
                          {m.label}
                        </code>
                        {isActive && (
                          <span className="text-[9px] bg-amber-500 text-white px-1.5 py-0.5 rounded font-bold">
                            NOW
                          </span>
                        )}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // PayloadBox — 활성 메시지의 JSON-RPC payload 박스
    // ─────────────────────────────────────────────────────
    function PayloadBox({ message }) {
      if (!message || !message.payload) {
        return (
          <div className="rounded-lg border-2 border-dashed border-slate-200 bg-slate-50 p-3 text-center text-[11px] text-slate-400 font-mono">
            (활성 메시지 없음)
          </div>
        );
      }

      const style = KIND_STYLES[message.kind];
      const json = JSON.stringify(message.payload, null, 2);

      return (
        <div className={`rounded-lg border-2 ${style.border} ${style.bg} overflow-hidden`}>
          <div className={`px-3 py-1.5 ${style.badge} text-white flex items-center justify-between`}>
            <div className="flex items-center gap-2">
              <span className="text-[10px] uppercase font-bold tracking-wider">
                {message.kind}
              </span>
              <code className="text-xs font-mono font-bold">{message.label}</code>
            </div>
            <span className="text-[10px] font-mono opacity-90">JSON-RPC 2.0</span>
          </div>
          <pre className="text-[10.5px] leading-relaxed font-mono text-slate-800 p-3 overflow-auto max-h-[18rem] m-0">
            {json}
          </pre>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // PhaseBadge — 현재 phase를 시각화
    // ─────────────────────────────────────────────────────
    function PhaseBadge({ phase }) {
      const phases = [
        { id: 'initialize',   label: '1. Initialize',   icon: '🤝' },
        { id: 'discovery',    label: '2. Discovery',    icon: '🔍' },
        { id: 'invocation',   label: '3. Invocation',   icon: '⚡' },
        { id: 'notification', label: '4. Notification', icon: '🔔' },
        { id: 'shutdown',     label: '5. Shutdown',     icon: '👋' },
      ];

      return (
        <div className="flex items-center gap-1 flex-wrap">
          {phases.map((p, i) => {
            const isActive = p.id === phase;
            const idx = phases.findIndex((x) => x.id === phase);
            const isPast = i < idx;
            return (
              <React.Fragment key={p.id}>
                <div
                  className={`px-2 py-1 rounded-md text-[10px] font-bold transition-all flex items-center gap-1 ${
                    isActive
                      ? 'bg-amber-500 text-white shadow-md ring-2 ring-amber-300'
                      : isPast
                      ? 'bg-amber-100 text-amber-700'
                      : 'bg-slate-100 text-slate-400'
                  }`}
                >
                  <span>{p.icon}</span>
                  <span>{p.label}</span>
                </div>
                {i < phases.length - 1 && (
                  <span className={`text-[10px] ${isPast || isActive ? 'text-amber-400' : 'text-slate-300'}`}>›</span>
                )}
              </React.Fragment>
            );
          })}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — Sequence diagram + Phase badge + Payload box
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const activeMessage = step.messages.find((m) => m.id === step.activeId);

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700 flex items-center gap-2">
              <span>📞</span>
              <span>MCP 라이프사이클 — JSON-RPC 메시지 흐름</span>
            </h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* Phase 진행 표시 */}
          <div className="mb-3 pb-3 border-b border-slate-100">
            <PhaseBadge phase={step.phase} />
          </div>

          {/* Sequence diagram */}
          <SequenceDiagram messages={step.messages} activeId={step.activeId} />

          {/* 활성 메시지의 JSON-RPC payload */}
          <div className="mt-3">
            <div className="text-[10px] uppercase tracking-wider text-slate-500 font-bold mb-1.5 flex items-center gap-1">
              <span>📨</span>
              <span>활성 메시지 payload</span>
            </div>
            <PayloadBox message={activeMessage} />
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-amber-500"></span>
              request (id 있음)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-sky-500"></span>
              response (id 매칭)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-violet-500"></span>
              notification (id 없음)
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="text-amber-500 font-bold">NOW</span>
              현재 강조 메시지
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-2-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. MCP &gt; Chapter 2. MCP 구성요소</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-2-2. MCP 통신 흐름</h1>
                  <p className="text-sm text-slate-500 mt-0.5">
                    전화 통화 — Initialize → Discovery → Invocation → Notification → Shutdown
                  </p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                💡 다음(IV-3-1)에서는 직접 <strong>MCP Server</strong>를 만들어본다 — Python SDK로 tool 등록부터 stdio 등록까지
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-2-1.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; IV-2-1. Resources, Tools, Prompts</a>
              <a href="./IV-3-1.html" className="text-amber-700 hover:text-amber-900 font-medium">IV-3-1. MCP Server 만들기 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
