<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent 학습 — IV-3-1. MCP Server 만들기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const CODE = [
      'from mcp.server import Server',
      'from mcp.types import TextContent',
      '',
      '# 1. 서버 인스턴스 생성 (레스토랑 오픈 준비)',
      'server = Server("weather-server")',
      '',
      '# 2. 도구 정의 (메뉴판 작성)',
      '@server.tool("get_weather")',
      'async def get_weather(city: str) -> list:',
      '    """도시의 현재 날씨를 조회합니다"""',
      '    # 3. 핸들러 구현 (주방 세팅)',
      '    weather = await fetch_weather_api(city)',
      '    return [TextContent(',
      '        type="text",',
      '        text=f"{city}: {weather}"',
      '    )]',
      '',
      '# 4. 서버 실행 (오픈!)',
      'server.run()',
    ];
    const RESTAURANT = [
      { step: '메뉴판 작성', icon: '📋', desc: '어떤 도구를 제공할지 정의 (@server.tool)', color: 'sky' },
      { step: '주방 세팅', icon: '👨‍🍳', desc: '실제 로직 구현 (async def handler)', color: 'amber' },
      { step: '오픈', icon: '🚪', desc: '서버 실행 (server.run())', color: 'emerald' },
    ];
    const STEPS = [
      { desc: "[레스토랑 오픈] MCP Server를 만드는 건 레스토랑을 오픈하는 것과 같습니다. 메뉴판 작성(도구 정의) → 주방 세팅(핸들러 구현) → 오픈(서버 실행). Python SDK로 10줄 안팎!", hl: [], activeStep: -1 },
      { desc: "[1. 서버 생성] Server 인스턴스를 만듭니다. 레스토랑 이름을 정하는 것과 같습니다. \"weather-server\"라고 이름 붙였습니다.", hl: [0, 1, 3, 4], activeStep: -1 },
      { desc: "[2. 메뉴판 — @server.tool] 도구를 정의합니다. @server.tool 데코레이터로 \"get_weather\"라는 도구를 등록합니다. 파라미터와 설명도 함께 정의합니다.", hl: [6, 7, 8, 9], activeStep: 0 },
      { desc: "[3. 주방 — 핸들러 구현] 실제 로직을 작성합니다. 날씨 API를 호출하고, 결과를 TextContent로 감싸서 반환합니다.", hl: [10, 11, 12, 13, 14, 15], activeStep: 1 },
      { desc: "[4. 오픈 — server.run()] 서버를 실행합니다. stdio로 통신하며 Client의 연결을 기다립니다. 이게 전부입니다 — 10줄 안팎으로 MCP Server 완성!", hl: [17, 18], activeStep: 2 },
      { desc: "[정리] MCP Server = @server.tool로 도구 정의 + async 핸들러 구현 + server.run() 실행. Claude Desktop의 claude_desktop_config.json에 등록하면 바로 사용 가능합니다.", hl: [], activeStep: 3 },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;
      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };
      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      const cMap = { sky: 'bg-sky-50 border-sky-300', amber: 'bg-amber-50 border-amber-300', emerald: 'bg-emerald-50 border-emerald-300' };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-rose-700 hover:text-rose-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. MCP &gt; Chapter 3. MCP 실전</div>
                  <h1 className="text-2xl font-bold text-slate-800">IV-3-1. MCP Server 만들기</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>레스토랑 오픈</b>처럼: 메뉴판 작성(도구 정의) → 주방 세팅(핸들러 구현) → 오픈(서버 실행). Python SDK로 10줄이면 됩니다.</p>
            </header>
            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-rose-600 border-rose-700 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">MCP Server 구현</h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <div className="space-y-3">
                <div className="text-xs font-bold text-slate-500 uppercase mb-1">레스토랑 오픈 3단계</div>
                {RESTAURANT.map((r, i) => {
                  const isActive = stepData.activeStep === i || stepData.activeStep === 3;
                  return (
                    <div key={i} className={`p-3 rounded-xl border-2 flex items-center gap-3 transition-all duration-500 ${isActive ? `${cMap[r.color]} scale-105 shadow-md` : 'border-slate-100 bg-white opacity-30'}`}>
                      <span className="text-2xl">{r.icon}</span>
                      <div>
                        <div className="font-bold text-sm text-slate-800">{r.step}</div>
                        <div className="text-xs text-slate-500">{r.desc}</div>
                      </div>
                    </div>
                  );
                })}
                {isEnd && (
                  <div className="bg-rose-50 border border-rose-200 rounded-xl p-4 text-center">
                    <div className="font-bold text-rose-700">claude_desktop_config.json에 등록</div>
                    <div className="text-xs text-rose-600 mt-1 font-mono bg-white rounded p-2 text-left">{"{"}"mcpServers": {"{"}"weather": {"{"}"command": "python", "args": ["server.py"]{"}"}{"}"}{"}"}</div>
                  </div>
                )}
              </div>
              <div className="bg-slate-900 rounded-xl p-4 overflow-x-auto">
                <div className="text-xs text-slate-500 mb-2 font-mono">Python MCP SDK</div>
                {CODE.map((line, i) => {
                  const isHl = stepData.hl.includes(i);
                  const isComment = line.trimStart().startsWith('#');
                  const isDocstring = line.trimStart().startsWith('"""');
                  return (
                    <div key={i} className={`font-mono text-xs px-2 py-0.5 rounded transition-all duration-300 ${isHl ? 'bg-rose-900 bg-opacity-40' : ''}`}>
                      <span className="text-slate-600 mr-2 select-none w-5 inline-block text-right">{i+1}</span>
                      {isComment ? <span className="text-emerald-500">{line}</span> : isDocstring ? <span className="text-emerald-400">{line}</span> : <span className={isHl ? 'text-rose-300' : 'text-slate-400'}>{line}</span>}
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="flex flex-wrap gap-2">
              {['MCP SDK', '@server.tool', '핸들러', 'stdio', 'server.run()'].map(kw => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-sm font-medium border border-rose-200">{kw}</span>
              ))}
            </div>
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-rose-600 hover:bg-rose-700">{isPlaying ? <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</> : <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>}</button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>
            <div className="text-sm text-slate-500 flex justify-between">
              <a href="./IV-2-2.html" className="text-rose-600 hover:text-rose-800 font-medium">← IV-2-2. MCP 통신 흐름</a>
              <span className="text-slate-400">Part IV 완료! 다음: <a href="../part5/V-1-1.html" className="text-emerald-600 hover:text-emerald-800 font-medium">Part V. 실전 에이전트 구축 →</a></span>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
