    // 노드 lookup (id → 좌표/라벨)
    // ─────────────────────────────────────────────────────
    function buildNodeMap(nodes) {
      return Object.fromEntries(nodes.map((n) => [n.id, n]));
    }

    // ─────────────────────────────────────────────────────
    // 상단 다이어그램 — N×M 직결 (Before)
    // ─────────────────────────────────────────────────────
    function BeforeDiagram({ edges, label }) {
      const w = 380;
      const h = 270;
      const agentMap = buildNodeMap(AGENTS);
      const toolMap = buildNodeMap(TOOLS);
      const nodeMap = { ...agentMap, ...toolMap };

      return (
        <div className="rounded-lg bg-gradient-to-br from-red-50 to-amber-50 border-2 border-red-200 p-2">
          <div className="text-[11px] font-bold text-red-800 mb-1 flex items-center justify-between">
            <span className="flex items-center gap-1"><span>🌪️</span><span>Before — Agent ↔ Tool 직결 (N × M)</span></span>
            <span className="bg-red-100 text-red-700 px-2 py-0.5 rounded font-mono">{label}</span>
          </div>
          <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
            <defs>
              <pattern id="grid-before" width="20" height="20" patternUnits="userSpaceOnUse">
                <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#fecaca" strokeWidth="0.5" />
              </pattern>
            </defs>
            <rect width={w} height={h} fill="url(#grid-before)" />

            {/* 헤더 라벨 */}
            <text x={60}  y={20} textAnchor="middle" fontSize="10" fontWeight="bold" fill="#92400e" fontFamily="monospace">Agent (N=3)</text>
            <text x={320} y={20} textAnchor="middle" fontSize="10" fontWeight="bold" fill="#92400e" fontFamily="monospace">Tool (M=3)</text>

            {/* 엣지 — 9개 직결선 */}
            {edges && edges.map((e, i) => {
              const a = nodeMap[e.from];
              const b = nodeMap[e.to];
              if (!a || !b) return null;
              const opacity = e.faded ? 0.15 : 0.6;
              return (
                <line
                  key={`be${i}`}
                  x1={a.x + 22}
                  y1={a.y}
                  x2={b.x - 22}
                  y2={b.y}
                  stroke="#dc2626"
                  strokeWidth="1.5"
                  opacity={opacity}
                  strokeDasharray="3,2"
                />
              );
            })}

            {/* Agent 노드 */}
            {AGENTS.map((a) => (
              <g key={a.id}>
                <circle cx={a.x} cy={a.y} r={20} fill="#fed7aa" stroke="#d97706" strokeWidth="2" />
                <text x={a.x} y={a.y + 4} textAnchor="middle" fontSize="14">{a.icon}</text>
                <text x={a.x - 30} y={a.y + 4} textAnchor="end" fontSize="9" fontWeight="bold" fill="#78350f" fontFamily="monospace">{a.label}</text>
              </g>
            ))}

            {/* Tool 노드 */}
            {TOOLS.map((t) => (
              <g key={t.id}>
                <circle cx={t.x} cy={t.y} r={20} fill="#fed7aa" stroke="#d97706" strokeWidth="2" />
                <text x={t.x} y={t.y + 4} textAnchor="middle" fontSize="14">{t.icon}</text>
                <text x={t.x + 30} y={t.y + 4} textAnchor="start" fontSize="9" fontWeight="bold" fill="#78350f" fontFamily="monospace">{t.label}</text>
              </g>
            ))}
          </svg>
          <div className="text-[9px] text-red-700 mt-1 text-center font-mono">
            각 Agent가 각 Tool마다 별도 어댑터 → 9개의 다른 코드
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 하단 다이어그램 — MCP 경유 (After)
    // ─────────────────────────────────────────────────────
    function AfterDiagram({ edges, label, highlightAgent, highlightTool }) {
      const w = 380;
      const h = 270;
      const mcpNode = { id: 'mcp', label: 'MCP', x: 190, y: 130 };
      const agentMap = buildNodeMap(AGENTS);
      const toolMap = buildNodeMap(TOOLS);
      const nodeMap = { ...agentMap, ...toolMap, mcp: mcpNode };

      return (
        <div className="rounded-lg bg-gradient-to-br from-emerald-50 to-amber-50 border-2 border-emerald-300 p-2">
          <div className="text-[11px] font-bold text-emerald-800 mb-1 flex items-center justify-between">
            <span className="flex items-center gap-1"><span>🔌</span><span>After — MCP 표준 경유 (N + M)</span></span>
            <span className="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded font-mono">{label}</span>
          </div>
          <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
            <defs>
              <pattern id="grid-after" width="20" height="20" patternUnits="userSpaceOnUse">
                <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#a7f3d0" strokeWidth="0.5" />
              </pattern>
              <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
                <path d="M0,0 L8,4 L0,8 Z" fill="#d97706" />
              </marker>
              <marker id="arrow-amber-hit" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
                <path d="M0,0 L9,4.5 L0,9 Z" fill="#b45309" />
              </marker>
            </defs>
            <rect width={w} height={h} fill="url(#grid-after)" />

            {/* 헤더 */}
            <text x={60}  y={20} textAnchor="middle" fontSize="10" fontWeight="bold" fill="#065f46" fontFamily="monospace">Client (Agent)</text>
            <text x={320} y={20} textAnchor="middle" fontSize="10" fontWeight="bold" fill="#065f46" fontFamily="monospace">Server (Tool)</text>

            {/* 엣지 (N + M = 6) */}
            {edges && edges.map((e, i) => {
              const a = nodeMap[e.from];
              const b = nodeMap[e.to];
              if (!a || !b) return null;
              const stroke = e.hit ? '#b45309' : '#d97706';
              const strokeW = e.hit ? 2.5 : 2;
              const opacity = e.hit ? 1 : 0.85;
              return (
                <line
                  key={`af${i}`}
                  x1={a.x + 22}
                  y1={a.y}
                  x2={b.x - 22}
                  y2={b.y}
                  stroke={stroke}
                  strokeWidth={strokeW}
                  opacity={opacity}
                  markerEnd={e.hit ? 'url(#arrow-amber-hit)' : 'url(#arrow-amber)'}
                />
              );
            })}

            {/* Agent 노드 */}
            {AGENTS.map((a) => {
              const active = highlightAgent === 'all' || highlightAgent === a.id;
              const fill = active ? '#fbbf24' : '#fde68a';
              return (
                <g key={a.id}>
                  {active && (
                    <circle cx={a.x} cy={a.y} r={26} fill="none" stroke="#d97706" strokeWidth="2" opacity="0.5">
                      <animate attributeName="r" from="22" to="32" dur="1.4s" repeatCount="indefinite" />
                      <animate attributeName="opacity" from="0.6" to="0" dur="1.4s" repeatCount="indefinite" />
                    </circle>
                  )}
                  <circle cx={a.x} cy={a.y} r={20} fill={fill} stroke="#b45309" strokeWidth="2" />
                  <text x={a.x} y={a.y + 4} textAnchor="middle" fontSize="14">{a.icon}</text>
                  <text x={a.x - 30} y={a.y + 4} textAnchor="end" fontSize="9" fontWeight="bold" fill="#78350f" fontFamily="monospace">{a.label}</text>
                </g>
              );
            })}

            {/* MCP 중앙 허브 */}
            <g>
              <circle cx={mcpNode.x} cy={mcpNode.y} r={32} fill="#10b981" stroke="#047857" strokeWidth="3" />
              <circle cx={mcpNode.x} cy={mcpNode.y} r={40} fill="none" stroke="#10b981" strokeWidth="1.5" opacity="0.4">
                <animate attributeName="r" from="35" to="45" dur="2s" repeatCount="indefinite" />
                <animate attributeName="opacity" from="0.5" to="0" dur="2s" repeatCount="indefinite" />
              </circle>
              <text x={mcpNode.x} y={mcpNode.y - 2} textAnchor="middle" fontSize="11" fontWeight="bold" fill="white" fontFamily="monospace">MCP</text>
              <text x={mcpNode.x} y={mcpNode.y + 10} textAnchor="middle" fontSize="7" fill="#d1fae5" fontFamily="monospace">protocol</text>
            </g>

            {/* Tool 노드 */}
            {TOOLS.map((t) => {
              const active = highlightTool === 'all' || highlightTool === t.id;
              const fill = active ? '#fbbf24' : '#fde68a';
              return (
                <g key={t.id}>
                  {active && (
                    <circle cx={t.x} cy={t.y} r={26} fill="none" stroke="#d97706" strokeWidth="2" opacity="0.5">
                      <animate attributeName="r" from="22" to="32" dur="1.4s" repeatCount="indefinite" />
                      <animate attributeName="opacity" from="0.6" to="0" dur="1.4s" repeatCount="indefinite" />
                    </circle>
                  )}
                  <circle cx={t.x} cy={t.y} r={20} fill={fill} stroke="#b45309" strokeWidth="2" />
                  <text x={t.x} y={t.y + 4} textAnchor="middle" fontSize="14">{t.icon}</text>
                  <text x={t.x + 30} y={t.y + 4} textAnchor="start" fontSize="9" fontWeight="bold" fill="#78350f" fontFamily="monospace">{t.label}</text>
                </g>
              );
            })}
          </svg>
          <div className="text-[9px] text-emerald-700 mt-1 text-center font-mono">
            Agent N개 + Tool M개 → MCP 한 층으로 N+M 연결만 필요
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // Step 5: 사용처 카드
    // ─────────────────────────────────────────────────────
    function AdoptersGrid({ adopters }) {
      const toneStyle = {
        amber: 'bg-amber-50 border-amber-300 text-amber-900',
        slate: 'bg-slate-50 border-slate-300 text-slate-700',
      };
      return (
        <div className="rounded-lg bg-white border-2 border-amber-300 overflow-hidden">
          <div className="bg-amber-100 px-3 py-2 border-b border-amber-200">
            <div className="text-xs font-bold text-amber-900">🚀 MCP 채택 현황 — Hosts & Servers</div>
          </div>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-2 p-3">
            {adopters.map((a) => (
              <div key={a.name} className={`rounded-lg border-2 p-2 ${toneStyle[a.tone]}`}>
                <div className="flex items-center gap-1.5">
                  <span className="text-base">{a.icon}</span>
                  <span className="text-xs font-bold">{a.name}</span>
                </div>
                <div className="text-[10px] mt-0.5 opacity-70 font-mono">{a.kind}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 상태 배지
    // ─────────────────────────────────────────────────────
    function StatusBadge({ badge }) {
      if (!badge) return null;
      const style = {
        fail:    'bg-red-100 border-red-300 text-red-800',
        pending: 'bg-amber-100 border-amber-300 text-amber-800',
        success: 'bg-emerald-100 border-emerald-300 text-emerald-800',
      };
      const icon = { fail: '⚠️', pending: '🛠️', success: '✅' };
      return (
        <div className={`rounded-lg border-2 px-3 py-2 flex items-center gap-2 ${style[badge.tone]}`}>
          <span className="text-base leading-none">{icon[badge.tone]}</span>
          <div className="text-xs font-bold">{badge.text}</div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 도메인 시각화
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🔌 USB-C 비유 — Agent ↔ Tool 통합</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* Step 5: 사용처 카드 */}
          {step.adopters ? (
            <div className="space-y-3">
              <AfterDiagram
                edges={step.afterEdges}
                label={step.edgeCountLabel}
                highlightAgent={step.highlightAgent}
                highlightTool={step.highlightTool}
              />
              <AdoptersGrid adopters={step.adopters} />
            </div>
          ) : (
            <div className="space-y-3">
              {/* 상단: 항상 Before 다이어그램 */}
              {step.beforeEdges && (
                <BeforeDiagram edges={step.beforeEdges} label={step.edgeCountLabel} />
              )}

              {/* 하단: showAfter일 때만 */}
              {step.showAfter && step.afterEdges && (
                <AfterDiagram
                  edges={step.afterEdges}
                  label={step.edgeCountLabel}
                  highlightAgent={step.highlightAgent}
                  highlightTool={step.highlightTool}
                />
              )}
            </div>
          )}

          {/* 상태 배지 */}
          {step.statusBadge && (
            <div className="mt-3">
              <StatusBadge badge={step.statusBadge} />
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-3 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-3 h-0.5" style={{ background: '#dc2626' }}></span>
              직결 (N×M)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-0.5" style={{ background: '#d97706' }}></span>
              MCP 경유 (N+M)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: '#10b981' }}></span>
              MCP 허브
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: '#fde68a', border: '1px solid #b45309' }}></span>
              Agent / Tool
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일명 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 파일명 탭 (3개) */}
          <div className="bg-[#1c1f24] px-2 py-1 flex items-center gap-1 border-b border-slate-700 overflow-x-auto">
            {['mcp-vs-custom.md', 'mcp-overview.json', 'mcp-server-spec.md'].map((fn) => {
              const active = fn === code.filename;
              return (
                <span
                  key={fn}
                  className={`text-[10px] font-mono px-2 py-1 rounded-t whitespace-nowrap ${
                    active
                      ? 'bg-[#282c34] text-amber-300 border-t-2 border-amber-400'
                      : 'text-slate-500 hover:text-slate-300'
                  }`}
                >
                  {fn}
                </span>
              );
            })}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. MCP &gt; Chapter 1. MCP 개요</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">MCP란 무엇인가</h1>
                  <p className="text-sm text-slate-500 mt-0.5">USB-C 비유 — Tool 표준화 프로토콜로 N×M 통합 폭발을 N+M으로</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                💡 다음(IV-1-2)에서는 MCP의 <strong>Client / Server / Transport</strong> 아키텍처를 자세히 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="../part3/III-3-3.html" className="text-slate-500 hover:text-slate-700">&larr; III-3-3 Tool Use + ReAct</a>
              <a href="./IV-1-2.html" className="text-amber-700 hover:text-amber-900 font-medium">IV-1-2 MCP 아키텍처 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
