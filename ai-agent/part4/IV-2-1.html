<body>
  <div id="root"></div>

  <!--
    IV-2-1. MCP의 Resources, Tools, Prompts — 3 핵심 capability
    학습 목표: MCP 서버가 노출하는 3가지 primitive(Resources/Tools/Prompts)의
              차이와, 셋이 결합되어 실제 워크플로우를 만드는 방법을 4단계로 이해한다.
    핵심 비유: 도서관 — 책(Resources, 읽기), 복사기(Tools, 실행), 사서 추천(Prompts, 템플릿)
    패턴: fastapi v1 — 좌(LiveDataPane: 3 capability 카드 + 워크플로우)
                    / 우(VSCode CodeViewer 4 파일 탭)
    색상: amber
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 3 capability 카드 메타 정보
    //   - Resources, Tools, Prompts 각각의 아이콘/비유/설명/예시
    //   - 단계마다 active 카드만 진하게 표시
    // ─────────────────────────────────────────────────────
    const CAPS = [
      {
        id: 'resources',
        icon: '📚',
        label: 'Resources',
        sub: '책 (읽기 전용)',
        uri: 'file://docs/api.md',
        desc: '읽기 전용 데이터 — 파일, DB, API 응답을 LLM에 노출',
        examples: [
          { uri: 'file:///project/README.md', kind: '파일' },
          { uri: 'db://users/42',             kind: 'DB 행' },
          { uri: 'http://api/weather',        kind: 'API 캐시' },
        ],
        verb: 'resources/read',
        safety: '안전 — side effect 없음',
      },
      {
        id: 'tools',
        icon: '🛠️',
        label: 'Tools',
        sub: '복사기 (행동)',
        uri: 'create_file(path, content)',
        desc: '행동 가능한 함수 — 파일 쓰기, 메일 발송, 코드 실행',
        examples: [
          { uri: 'create_file(path, body)',   kind: '파일 생성' },
          { uri: 'send_message(to, text)',    kind: '메시지 발송' },
          { uri: 'run_sql(query)',            kind: 'DB 실행' },
        ],
        verb: 'tools/call',
        safety: '주의 — 부작용(side effect)',
      },
      {
        id: 'prompts',
        icon: '📋',
        label: 'Prompts',
        sub: '추천 템플릿',
        uri: '/code-review {file}',
        desc: '미리 정의된 prompt 템플릿 — slash command처럼 호출',
        examples: [
          { uri: '/code-review {file}',       kind: '코드 리뷰' },
          { uri: '/translate {text} {lang}',  kind: '번역' },
          { uri: '/summarize {url}',          kind: '요약' },
        ],
        verb: 'prompts/get',
        safety: '편의 — 재사용 템플릿',
      },
    ];

    // ─────────────────────────────────────────────────────
    // 단계별 시뮬레이션 데이터
    //   active   : 강조할 capability id ('resources'|'tools'|'prompts'|'all')
    //   workflow : Step 4에서만 사용 (Resources → Prompt → Tools 흐름)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. Resources — 읽기 전용 데이터',
        desc: '도서관의 책처럼, 빌려서 "읽기"만 한다. 파일 내용·DB 레코드·API 응답을 URI(file://, db://, http://)로 노출하면 LLM이 컨텍스트에 가져다 쓴다. 호출해도 시스템 상태는 안 바뀐다.',
        active: 'resources',
        workflow: null,
        code: {
          lang: 'python',
          filename: 'resources.py',
          lines: [
            '"""',
            'MCP Resources — 읽기 전용 데이터를 LLM에 노출하는 capability.',
            '',
            '경로  : my_mcp_server/resources.py',
            '목적  : 파일/DB/API 응답을 URI로 식별 가능한 "리소스"로 만들기',
            '핵심  : @server.list_resources(), @server.read_resource()',
            '"""',
            'from mcp.server import Server',
            'from mcp.types import Resource, TextResourceContents',
            '',
            'server = Server("docs-server")',
            '',
            '# 1) 노출할 리소스 목록을 알려준다',
            '@server.list_resources()',
            'async def list_resources() -> list[Resource]:',
            '    return [',
            '        Resource(',
            '            uri="file:///project/README.md",',
            '            name="프로젝트 README",',
            '            mimeType="text/markdown",',
            '        ),',
            '        Resource(',
            '            uri="db://users/42",',
            '            name="유저 #42",',
            '            mimeType="application/json",',
            '        ),',
            '    ]',
            '',
            '# 2) URI로 호출되면 실제 내용을 반환한다 — 읽기만!',
            '@server.read_resource()',
            'async def read_resource(uri: str) -> str:',
            '    if uri.startswith("file://"):',
            '        path = uri.removeprefix("file://")',
            '        return open(path, encoding="utf-8").read()',
            '    if uri.startswith("db://users/"):',
            '        user_id = uri.removeprefix("db://users/")',
            '        row = db.fetch_one("SELECT * FROM users WHERE id=?", user_id)',
            '        return json.dumps(row)',
            '    raise ValueError(f"unknown uri: {uri}")',
            '',
            '# 핵심 규칙',
            '#   - read_resource는 "조회"만. INSERT/UPDATE/DELETE 금지',
            '#   - 같은 URI를 두 번 호출해도 시스템 상태가 변하지 않아야 함',
            '#   - 부작용이 필요하면 그건 Resources가 아니라 Tools',
          ],
          highlight: [13, 14, 27, 28, 38, 39, 40, 41],
        },
      },
      {
        title: 'Step 2. Tools — 행동 가능한 함수',
        desc: '도서관의 복사기/프린터처럼, "실행"하면 시스템이 변한다. create_file·send_message처럼 입력 스키마(JSON Schema)와 함께 노출하면 LLM이 인자를 채워 호출한다. 부작용이 있으니 권한·확인이 중요하다.',
        active: 'tools',
        workflow: null,
        code: {
          lang: 'python',
          filename: 'tools.py',
          lines: [
            '"""',
            'MCP Tools — 행동(파일 생성/메시지 발송/실행)을 노출하는 capability.',
            '',
            '경로  : my_mcp_server/tools.py',
            '목적  : LLM이 호출 가능한 "함수"를 JSON Schema와 함께 광고',
            '핵심  : @server.list_tools(), @server.call_tool()',
            '"""',
            'from mcp.server import Server',
            'from mcp.types import Tool, TextContent',
            '',
            'server = Server("file-server")',
            '',
            '# 1) 호출 가능한 도구 목록 + 입력 스키마',
            '@server.list_tools()',
            'async def list_tools() -> list[Tool]:',
            '    return [',
            '        Tool(',
            '            name="create_file",',
            '            description="새 파일을 생성한다",',
            '            inputSchema={',
            '                "type": "object",',
            '                "properties": {',
            '                    "path":    {"type": "string"},',
            '                    "content": {"type": "string"},',
            '                },',
            '                "required": ["path", "content"],',
            '            },',
            '        ),',
            '        Tool(',
            '            name="send_message",',
            '            description="슬랙 채널에 메시지를 전송한다",',
            '            inputSchema={',
            '                "type": "object",',
            '                "properties": {',
            '                    "channel": {"type": "string"},',
            '                    "text":    {"type": "string"},',
            '                },',
            '                "required": ["channel", "text"],',
            '            },',
            '        ),',
            '    ]',
            '',
            '# 2) LLM이 인자를 채워 호출 → 실제로 부작용을 일으킨다',
            '@server.call_tool()',
            'async def call_tool(name: str, args: dict) -> list[TextContent]:',
            '    if name == "create_file":',
            '        with open(args["path"], "w", encoding="utf-8") as f:',
            '            f.write(args["content"])',
            '        return [TextContent(type="text", text=f"created {args[\'path\']}")]',
            '    if name == "send_message":',
            '        slack.post(args["channel"], args["text"])',
            '        return [TextContent(type="text", text="sent")]',
            '    raise ValueError(f"unknown tool: {name}")',
            '',
            '# 핵심 규칙',
            '#   - inputSchema는 JSON Schema → LLM이 보고 인자를 만든다',
            '#   - 호출 결과는 항상 list[TextContent] (또는 ImageContent)',
            '#   - 부작용이 크면 클라이언트에서 사용자 confirm을 받아야 안전',
          ],
          highlight: [14, 15, 17, 18, 29, 30, 43, 44, 45, 46],
        },
      },
      {
        title: 'Step 3. Prompts — 미리 정의된 템플릿',
        desc: '사서가 자주 쓰는 추천 목록처럼, slash command(/code-review, /translate)로 호출되는 prompt 템플릿을 미리 만들어 둔다. 인자만 채우면 잘 짜인 system+user 메시지가 완성된다.',
        active: 'prompts',
        workflow: null,
        code: {
          lang: 'python',
          filename: 'prompts.py',
          lines: [
            '"""',
            'MCP Prompts — 자주 쓰는 prompt 템플릿을 slash command로 노출.',
            '',
            '경로  : my_mcp_server/prompts.py',
            '목적  : LLM에게 일관된 지시를 내리기 위한 재사용 템플릿',
            '핵심  : @server.list_prompts(), @server.get_prompt()',
            '"""',
            'from mcp.server import Server',
            'from mcp.types import Prompt, PromptArgument, PromptMessage, TextContent',
            '',
            'server = Server("prompt-server")',
            '',
            '# 1) 사용 가능한 prompt 템플릿 목록',
            '@server.list_prompts()',
            'async def list_prompts() -> list[Prompt]:',
            '    return [',
            '        Prompt(',
            '            name="code-review",',
            '            description="주어진 코드를 리뷰한다",',
            '            arguments=[',
            '                PromptArgument(name="file",    required=True),',
            '                PromptArgument(name="lang",    required=False),',
            '            ],',
            '        ),',
            '        Prompt(',
            '            name="translate",',
            '            description="텍스트를 다른 언어로 번역",',
            '            arguments=[',
            '                PromptArgument(name="text",    required=True),',
            '                PromptArgument(name="target",  required=True),',
            '            ],',
            '        ),',
            '    ]',
            '',
            '# 2) 인자를 받아 완성된 메시지 시퀀스를 반환',
            '@server.get_prompt()',
            'async def get_prompt(name: str, args: dict) -> list[PromptMessage]:',
            '    if name == "code-review":',
            '        file_uri = args["file"]',
            '        return [',
            '            PromptMessage(',
            '                role="user",',
            '                content=TextContent(',
            '                    type="text",',
            '                    text=(',
            '                        f"다음 코드를 리뷰해라.\\n"',
            '                        f"기준: 가독성, 버그, 성능.\\n"',
            '                        f"파일: {file_uri}\\n"',
            '                    ),',
            '                ),',
            '            ),',
            '        ]',
            '    raise ValueError(f"unknown prompt: {name}")',
            '',
            '# 핵심 규칙',
            '#   - 사용자가 /code-review file=... 처럼 호출한다 (slash command UX)',
            '#   - 인자는 필수/선택을 명시 → 잘못된 호출을 미리 막는다',
            '#   - 서버가 템플릿을 관리하므로 클라이언트가 prompt를 외울 필요 없음',
          ],
          highlight: [14, 15, 17, 18, 19, 20, 35, 36, 37, 38],
        },
      },
      {
        title: 'Step 4. 종합 — Resources 읽고 → Prompt로 가공 → Tools 실행',
        desc: '실전 워크플로우: ① Resources로 README.md 본문을 읽고 → ② /code-review 프롬프트에 끼워 넣어 LLM에게 리뷰를 받고 → ③ Tools(create_file)로 review.md를 저장한다. 셋이 결합되어야 진짜 자동화가 된다.',
        active: 'all',
        workflow: {
          steps: [
            { cap: 'resources', label: 'README.md 읽기',  detail: 'resources/read("file:///proj/README.md")' },
            { cap: 'prompts',   label: '/code-review로 가공', detail: 'prompts/get("code-review", {file:"..."})' },
            { cap: 'tools',     label: 'review.md 저장',     detail: 'tools/call("create_file", {path:"review.md", content:...})' },
          ],
        },
        code: {
          lang: 'python',
          filename: 'combined-workflow.py',
          lines: [
            '"""',
            '실전: Resources + Prompts + Tools 결합 워크플로우.',
            '',
            '경로  : examples/code_review_bot.py',
            '시나리오:',
            '  README.md를 읽고 (Resources)',
            '  → 코드 리뷰 프롬프트로 가공 (Prompts)',
            '  → 결과를 review.md로 저장 (Tools)',
            '"""',
            'import asyncio',
            'from mcp.client import ClientSession',
            'from anthropic import Anthropic',
            '',
            'async def code_review_bot(session: ClientSession):',
            '    # ① Resources — 읽기 (side effect 없음)',
            '    readme = await session.read_resource(',
            '        uri="file:///project/README.md",',
            '    )',
            '    source_text = readme.contents[0].text',
            '',
            '    # ② Prompts — 미리 정의된 템플릿으로 가공',
            '    review_prompt = await session.get_prompt(',
            '        name="code-review",',
            '        arguments={"file": "file:///project/README.md"},',
            '    )',
            '    messages = [',
            '        {"role": m.role, "content": m.content.text}',
            '        for m in review_prompt.messages',
            '    ]',
            '    messages[0]["content"] += f"\\n\\n---\\n{source_text}"',
            '',
            '    # ③ LLM 호출 — 위 두 단계 결과를 합쳐 리뷰 받기',
            '    llm = Anthropic()',
            '    response = llm.messages.create(',
            '        model="claude-opus-4-7",',
            '        max_tokens=2000,',
            '        messages=messages,',
            '    )',
            '    review_text = response.content[0].text',
            '',
            '    # ④ Tools — 행동 (review.md 저장, side effect 발생!)',
            '    result = await session.call_tool(',
            '        name="create_file",',
            '        arguments={',
            '            "path":    "/project/review.md",',
            '            "content": review_text,',
            '        },',
            '    )',
            '    print(result.content[0].text)  # "created /project/review.md"',
            '',
            'if __name__ == "__main__":',
            '    asyncio.run(code_review_bot(session))',
            '',
            '# 핵심',
            '#   - Resources(읽기) → Prompts(가공) → Tools(실행)',
            '#     순서가 가장 안전: 읽고 → 생각하고 → 행동한다',
            '#   - 각 단계가 분리돼 있어 권한 부여/감사 로그도 단계별로 가능',
            '#   - 이 3-step이 MCP 서버 활용의 표준 패턴',
          ],
          highlight: [15, 16, 17, 18, 22, 23, 24, 25, 41, 42, 43, 44, 45, 46],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // CapabilityCard — 단계마다 활성 카드만 강조
    // ─────────────────────────────────────────────────────
    function CapabilityCard({ cap, active }) {
      const isActive = active === cap.id || active === 'all';

      return (
        <div
          className={`rounded-xl border-2 p-4 transition-all duration-500 ${
            isActive
              ? 'bg-amber-50 border-amber-400 shadow-md scale-[1.02]'
              : 'bg-slate-50 border-slate-200 opacity-50'
          }`}
        >
          <div className="flex items-center gap-2 mb-2">
            <div
              className={`w-9 h-9 rounded-lg flex items-center justify-center text-lg ${
                isActive ? 'bg-amber-500 text-white' : 'bg-slate-200 text-slate-500'
              }`}
            >
              {cap.icon}
            </div>
            <div className="flex-1 min-w-0">
              <div className={`text-sm font-bold ${isActive ? 'text-amber-900' : 'text-slate-600'}`}>
                {cap.label}
              </div>
              <div className="text-[10px] text-slate-500">{cap.sub}</div>
            </div>
          </div>

          <div
            className={`text-[10px] font-mono px-2 py-1 rounded mb-2 truncate ${
              isActive ? 'bg-white border border-amber-200 text-amber-800' : 'bg-slate-100 text-slate-400'
            }`}
            title={cap.uri}
          >
            {cap.uri}
          </div>

          <p className={`text-xs leading-relaxed mb-2 ${isActive ? 'text-slate-700' : 'text-slate-400'}`}>
            {cap.desc}
          </p>

          {isActive && (
            <div className="space-y-1 mt-2">
              {cap.examples.map((ex, i) => (
                <div
                  key={i}
                  className="bg-white border border-amber-100 rounded px-2 py-1 flex items-center gap-2"
                >
                  <span className="text-[9px] uppercase tracking-wider text-amber-600 font-bold w-12 flex-shrink-0">
                    {ex.kind}
                  </span>
                  <span className="text-[10px] font-mono text-slate-700 truncate" title={ex.uri}>
                    {ex.uri}
                  </span>
                </div>
              ))}
              <div className="text-[10px] mt-2 px-2 py-1 rounded-full bg-amber-100 text-amber-800 font-bold text-center border border-amber-200">
                {cap.safety}
              </div>
              <div className="text-[10px] text-center text-slate-500 font-mono mt-1">
                MCP verb: <span className="text-amber-700 font-bold">{cap.verb}</span>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // WorkflowDiagram — Step 4 전용. Resources → Prompt → Tools 흐름
    // ─────────────────────────────────────────────────────
    function WorkflowDiagram({ workflow }) {
      const capMap = Object.fromEntries(CAPS.map((c) => [c.id, c]));

      return (
        <div className="rounded-xl bg-gradient-to-br from-amber-50 to-amber-100 border-2 border-amber-300 p-4">
          <div className="text-xs font-bold text-amber-900 mb-3 flex items-center gap-1">
            <span>🔗</span>
            <span>3 capability 결합 워크플로우</span>
          </div>

          <div className="space-y-2">
            {workflow.steps.map((s, i) => {
              const cap = capMap[s.cap];
              return (
                <React.Fragment key={i}>
                  <div className="bg-white rounded-lg border-2 border-amber-300 p-3 shadow-sm flex items-start gap-3">
                    <div className="w-9 h-9 rounded-lg bg-amber-500 text-white flex items-center justify-center text-lg flex-shrink-0">
                      {cap.icon}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 mb-1">
                        <span className="text-[10px] uppercase tracking-wider font-bold text-amber-700">
                          {i + 1}단계
                        </span>
                        <span className="text-xs font-bold text-slate-700">{cap.label}</span>
                      </div>
                      <div className="text-sm font-medium text-slate-800">{s.label}</div>
                      <div className="text-[10px] font-mono text-slate-500 mt-0.5 truncate" title={s.detail}>
                        {s.detail}
                      </div>
                    </div>
                  </div>
                  {i < workflow.steps.length - 1 && (
                    <div className="flex justify-center text-amber-600 text-xl leading-none">↓</div>
                  )}
                </React.Fragment>
              );
            })}
          </div>

          <div className="mt-3 text-[11px] text-amber-900 bg-white border border-amber-200 rounded p-2">
            <span className="font-bold">📌 패턴:</span>{' '}
            읽고 (안전) → 생각하고 (템플릿) → 행동한다 (부작용). 이 순서가 가장 안전하고 감사 가능한 자동화.
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측. 3 카드 (Step 1~3) 또는 워크플로우 (Step 4)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📚 도서관 — MCP 3 capability</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {step.workflow ? (
            <div className="space-y-3">
              <div className="grid grid-cols-3 gap-2">
                {CAPS.map((cap) => (
                  <CapabilityCard key={cap.id} cap={cap} active="all" />
                ))}
              </div>
              <WorkflowDiagram workflow={step.workflow} />
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
              {CAPS.map((cap) => (
                <CapabilityCard key={cap.id} cap={cap} active={step.active} />
              ))}
            </div>
          )}

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-4 pt-3 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-amber-400 border border-amber-500"></span>
              활성 capability
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2.5 h-2.5 rounded-full bg-slate-200 border border-slate-300"></span>
              비활성
            </span>
            <span className="flex items-center gap-1 ml-auto">
              <span>🔗</span> Step 4 결합 워크플로우
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + 라인 강조
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      // 4개 파일명 탭 (stepIdx로 active 결정)
      const tabs = ['resources.py', 'tools.py', 'prompts.py', 'combined-workflow.py'];

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-500 ml-2 font-mono">my_mcp_server/</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 파일 탭 (4개) */}
          <div className="bg-[#21252b] flex border-b border-slate-700 overflow-x-auto">
            {tabs.map((tab, i) => {
              const isActive = i === stepIdx;
              return (
                <div
                  key={tab}
                  className={`px-3 py-1.5 text-[11px] font-mono border-r border-slate-700 whitespace-nowrap ${
                    isActive
                      ? 'bg-[#282c34] text-amber-300 border-t-2 border-t-amber-400'
                      : 'text-slate-500'
                  }`}
                >
                  {tab}
                </div>
              );
            })}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[36rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-2-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. MCP &gt; Chapter 2. MCP 구성요소</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">Resources, Tools, Prompts</h1>
                  <p className="text-sm text-slate-500 mt-0.5">도서관 비유로 본 MCP의 3 핵심 capability</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                💡 다음(IV-2-2)에서는 클라이언트와 서버가 어떤 <strong>JSON-RPC 메시지</strong>를 주고받으며
                위 3 capability를 호출하는지 통신 흐름을 자세히 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-1-2.html" className="text-slate-500 hover:text-slate-700">&larr; IV-1-2 MCP 아키텍처</a>
              <a href="./IV-2-2.html" className="text-amber-700 hover:text-amber-900 font-medium">IV-2-2 MCP 통신 흐름 &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
