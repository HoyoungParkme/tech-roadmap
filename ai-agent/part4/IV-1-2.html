<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent 학습 — IV-1-2. MCP 아키텍처</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const LAYERS = [
      { id: 'host', icon: '🏨', label: 'Host (호텔 건물)', color: 'violet', desc: 'Claude Desktop, VS Code 같은 AI 애플리케이션. 전체를 감싸는 컨테이너.', examples: ['Claude Desktop', 'VS Code', 'Cursor'] },
      { id: 'client', icon: '🛎️', label: 'Client (프런트 데스크)', color: 'sky', desc: 'Host 안에서 서버와 1:1로 통신하는 연결 관리자.', examples: ['연결 관리', '요청 전달', '응답 수신'] },
      { id: 'server', icon: '🧹', label: 'Server (서비스 부서)', color: 'rose', desc: '세탁실, 룸서비스 같은 독립적 기능 제공자. 각각 MCP 서버.', examples: ['파일 시스템', 'GitHub', 'DB 쿼리'] },
    ];

    const cMap = {
      violet: { bg: 'bg-violet-50', border: 'border-violet-300', text: 'text-violet-700', ring: 'ring-violet-200', badge: 'bg-violet-500' },
      sky: { bg: 'bg-sky-50', border: 'border-sky-300', text: 'text-sky-700', ring: 'ring-sky-200', badge: 'bg-sky-500' },
      rose: { bg: 'bg-rose-50', border: 'border-rose-300', text: 'text-rose-700', ring: 'ring-rose-200', badge: 'bg-rose-500' },
    };

    const STEPS = [
      { desc: "[호텔 비유] MCP의 3계층을 호텔에 비유해봅시다. 호텔 건물(Host), 프런트 데스크(Client), 서비스 부서들(Server). 투숙객(LLM)이 프런트에 요청하면 서비스 부서에 연락합니다.", activeLayer: null },
      { desc: "[Host — 호텔 건물] Claude Desktop, VS Code 같은 AI 애플리케이션입니다. 여러 Client를 포함할 수 있습니다. 호텔 건물 안에 여러 프런트가 있을 수 있는 것처럼.", activeLayer: 'host' },
      { desc: "[Client — 프런트 데스크] Host 안에서 특정 Server와 1:1로 연결합니다. \"세탁 부탁합니다\"라는 요청을 받으면 세탁실 서버에 전달합니다.", activeLayer: 'client' },
      { desc: "[Server — 서비스 부서] 실제 기능을 제공합니다. 파일 시스템 서버, GitHub 서버, DB 서버 등. 각각 독립적으로 동작하며, 같은 MCP 프로토콜로 통신합니다.", activeLayer: 'server' },
      { desc: "[전체 흐름] LLM(투숙객) → Host(호텔) → Client(프런트) → Server(서비스). 응답은 역순으로 돌아옵니다. 이 3계층이 MCP의 뼈대입니다.", activeLayer: 'all' },
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;
      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const handlePrevRef = useRef(handlePrev); handlePrevRef.current = handlePrev;
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };
      useEffect(() => { if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); } else { clearInterval(playIntervalRef.current); } return () => clearInterval(playIntervalRef.current); }, [isPlaying]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); handleNextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-4xl mx-auto space-y-6">
            <nav className="text-sm"><a href="../index.html" className="inline-flex items-center gap-1 text-rose-700 hover:text-rose-900 font-medium"><span>&larr;</span> 허브로 돌아가기</a></nav>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-rose-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. MCP &gt; Chapter 1. MCP 개요</div>
                  <h1 className="text-2xl font-bold text-slate-800">IV-1-2. MCP 아키텍처: Host, Client, Server</h1>
                </div>
              </div>
              <p className="text-slate-600"><b>호텔</b>을 생각해보세요. 호텔 건물(Host), 프런트 데스크(Client), 서비스 부서(Server). 이 3계층이 MCP의 뼈대입니다.</p>
            </header>

            <div className="p-5 rounded-xl shadow-sm border min-h-[80px] flex flex-col justify-center bg-rose-600 border-rose-700 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-rose-200">Host → Client → Server</h3>
                <span className="text-xs text-rose-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 space-y-4">
              {LAYERS.map((layer, i) => {
                const c = cMap[layer.color];
                const isActive = stepData.activeLayer === layer.id || stepData.activeLayer === 'all';
                return (
                  <div key={layer.id} className={`p-4 rounded-xl border-2 transition-all duration-500 ${isActive ? `${c.bg} ${c.border} scale-[1.02] shadow-md` : 'border-slate-100 bg-slate-50 opacity-30'}`}>
                    <div className="flex items-center gap-3 mb-2">
                      <div className={`w-10 h-10 rounded-lg flex items-center justify-center text-white font-bold text-xl ${c.badge}`}>{layer.icon}</div>
                      <div>
                        <div className={`font-bold ${c.text}`}>{layer.label}</div>
                        <div className="text-xs text-slate-500">{layer.desc}</div>
                      </div>
                    </div>
                    {isActive && (
                      <div className="flex gap-2 mt-2">
                        {layer.examples.map((ex, j) => (
                          <span key={j} className={`text-xs px-2 py-1 rounded-full border ${c.bg} ${c.border} ${c.text}`}>{ex}</span>
                        ))}
                      </div>
                    )}
                    {i < LAYERS.length - 1 && <div className="text-center text-slate-300 text-lg mt-2">↓</div>}
                  </div>
                );
              })}
            </div>

            <div className="flex flex-wrap gap-2">
              {['Host', 'Client', 'Server', '3계층', 'Transport'].map(kw => (
                <span key={kw} className="bg-rose-50 text-rose-700 px-3 py-1 rounded-full text-sm font-medium border border-rose-200">{kw}</span>
              ))}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-rose-600 hover:bg-rose-700">{isPlaying ? <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</> : <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>}</button>
                <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {currentStepIdx + 1} / {STEPS.length}</div>
            </div>
            <div className="text-sm text-slate-500 flex justify-between">
              <a href="./IV-1-1.html" className="text-rose-600 hover:text-rose-800 font-medium">← IV-1-1. MCP란 무엇인가</a>
              <a href="./IV-2-1.html" className="text-rose-600 hover:text-rose-800 font-medium">IV-2-1. Resources, Tools, Prompts →</a>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
