        { y: 270, cId: 'c-slack', sId: 's-slack' },
      ];
      const clientX = 145;
      const serverX = 425;
      const clientW = 120;
      const clientH = 56;
      const serverW = 150;
      const serverH = 56;

      const findClient = (id) => step.clients.find((c) => c.id === id);
      const findServer = (id) => step.servers.find((s) => s.id === id);
      const findTransport = (cId) => step.transports.find((t) => t.from === cId);

      const hostActive = step.active === 'host' || step.active === 'flow';

      return (
        <div className="rounded-lg bg-gradient-to-br from-amber-50 to-amber-100 border border-amber-200 p-2">
          <div className="text-[11px] font-bold text-amber-800 mb-1 flex items-center gap-1">
            <span>🏗️</span>
            <span>MCP 아키텍처 — Host / Client / Transport / Server</span>
          </div>
          <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto">
            <defs>
              <pattern id="grid-mcp" width="30" height="30" patternUnits="userSpaceOnUse">
                <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#fde68a" strokeWidth="0.5" />
              </pattern>
              <marker id="arr-amber" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
                <path d="M0,0 L8,4 L0,8 Z" fill="#b45309" />
              </marker>
              <marker id="arr-amber-hot" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
                <path d="M0,0 L9,4.5 L0,9 Z" fill="#d97706" />
              </marker>
              <marker id="arr-amber-rev" markerWidth="9" markerHeight="9" refX="0" refY="4.5" orient="auto">
                <path d="M9,0 L0,4.5 L9,9 Z" fill="#d97706" />
              </marker>
            </defs>
            <rect width={w} height={h} fill="url(#grid-mcp)" />

            {/* Host 큰 박스 (Client들을 감쌈) */}
            <rect x={20} y={30} width={310} height={310} rx={14}
              fill={hostActive ? '#fef3c7' : '#fffbeb'}
              stroke={hostActive ? '#d97706' : '#fcd34d'}
              strokeWidth={hostActive ? 3 : 1.5}
              opacity={step.active === 'server' || step.active === 'transport' ? 0.55 : 1}
              className="transition-all duration-700" />
            <text x={35} y={50} fontSize="13" fontWeight="bold" fontFamily="monospace"
              fill={hostActive ? '#92400e' : '#b45309'}>🖥️ Host (Claude Desktop)</text>
            <text x={35} y={64} fontSize="9" fill="#a16207" fontFamily="monospace">UI · LLM 호출 · 설정 관리</text>

            {/* Client 인스턴스 3개 (Host 내부) */}
            {rows.map((r) => {
              const c = findClient(r.cId);
              const isActive = step.active === 'client' || (c && c.hit);
              const cFill = c && c.hit ? '#f59e0b' : '#fef3c7';
              const cStroke = c && c.hit ? '#b45309' : '#fbbf24';
              const txtColor = c && c.hit ? 'white' : '#92400e';
              const opacity = c && c.dim ? 0.35 : 1;
              return (
                <g key={r.cId} className="transition-all duration-700" opacity={opacity}>
                  {c && c.hit && (
                    <rect x={clientX - 4} y={r.y - 4} width={clientW + 8} height={clientH + 8} rx={10}
                      fill="none" stroke="#d97706" strokeWidth="2" opacity="0.5">
                      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.6s" repeatCount="indefinite" />
                    </rect>
                  )}
                  <rect x={clientX} y={r.y} width={clientW} height={clientH} rx={8}
                    fill={cFill} stroke={cStroke} strokeWidth={isActive ? 2.5 : 1.5} />
                  <text x={clientX + clientW / 2} y={r.y + 22} textAnchor="middle" fontSize="11" fontWeight="bold" fill={txtColor} fontFamily="monospace">Client</text>
                  <text x={clientX + clientW / 2} y={r.y + 38} textAnchor="middle" fontSize="9" fill={txtColor} fontFamily="monospace" opacity="0.85">{r.cId.replace('c-', '→ ')}</text>
                  <text x={clientX + clientW / 2} y={r.y + 50} textAnchor="middle" fontSize="8" fill={txtColor} fontFamily="monospace" opacity="0.7">instance</text>
                </g>
              );
            })}

            {/* Transport 라인 + label */}
            {rows.map((r) => {
              const t = findTransport(r.cId);
              if (!t) return null;
              const x1 = clientX + clientW;
              const x2 = serverX;
              const y  = r.y + clientH / 2;
              const isActive = step.active === 'transport' || t.hit;
              const stroke = t.hit ? '#d97706' : '#fcd34d';
              const sw = t.hit ? 2.5 : 1.5;
              const opacity = t.dim ? 0.3 : 1;
              const dash = t.kind === 'sse' ? '6 4' : null;
              const midX = (x1 + x2) / 2;
              return (
                <g key={`t-${r.cId}`} className="transition-all duration-700" opacity={opacity}>
                  <line x1={x1 + 2} y1={y - 6} x2={x2 - 2} y2={y - 6} stroke={stroke} strokeWidth={sw} strokeDasharray={dash} markerEnd={t.hit ? 'url(#arr-amber-hot)' : 'url(#arr-amber)'} />
                  <line x1={x2 - 2} y1={y + 6} x2={x1 + 2} y2={y + 6} stroke={stroke} strokeWidth={sw} strokeDasharray={dash} markerEnd={t.hit ? 'url(#arr-amber-hot)' : 'url(#arr-amber)'} />
                  <rect x={midX - 22} y={y - 9} width={44} height={18} rx={5}
                    fill={t.kind === 'stdio' ? '#fff7ed' : '#ecfeff'}
                    stroke={t.kind === 'stdio' ? '#d97706' : '#0891b2'}
                    strokeWidth={isActive ? 1.6 : 1} />
                  <text x={midX} y={y + 3} textAnchor="middle" fontSize="9" fontWeight="bold" fontFamily="monospace"
                    fill={t.kind === 'stdio' ? '#9a3412' : '#155e75'}>{t.kind}</text>
                  {step.active === 'flow' && t.hit && (
                    <g>
                      <text x={midX} y={y - 18} textAnchor="middle" fontSize="9" fontWeight="bold" fill="#9a3412" fontFamily="monospace">tools/call</text>
                      <text x={midX} y={y + 26} textAnchor="middle" fontSize="9" fontWeight="bold" fill="#15803d" fontFamily="monospace">result</text>
                    </g>
                  )}
                </g>
              );
            })}

            {/* Server 박스 3개 */}
            {rows.map((r) => {
              const s = findServer(r.sId);
              if (!s) return null;
              const isActive = step.active === 'server' || s.hit;
              const fill = s.hit ? '#f59e0b' : '#fef3c7';
              const stroke = s.hit ? '#b45309' : '#fbbf24';
              const txtColor = s.hit ? 'white' : '#92400e';
              const opacity = s.dim ? 0.35 : 1;
              return (
                <g key={r.sId} className="transition-all duration-700" opacity={opacity}>
                  {s.hit && (
                    <rect x={serverX - 4} y={r.y - 4} width={serverW + 8} height={serverH + 8} rx={10}
                      fill="none" stroke="#d97706" strokeWidth="2" opacity="0.5">
                      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.6s" repeatCount="indefinite" />
                    </rect>
                  )}
                  <rect x={serverX} y={r.y} width={serverW} height={serverH} rx={8}
                    fill={fill} stroke={stroke} strokeWidth={isActive ? 2.5 : 1.5} />
                  <text x={serverX + serverW / 2} y={r.y + 20} textAnchor="middle" fontSize="11" fontWeight="bold" fill={txtColor} fontFamily="monospace">🛠️ {s.label}</text>
                  <text x={serverX + serverW / 2} y={r.y + 36} textAnchor="middle" fontSize="8" fill={txtColor} fontFamily="monospace" opacity="0.85">{s.tools.slice(0, 2).join(', ')}</text>
                  <text x={serverX + serverW / 2} y={r.y + 48} textAnchor="middle" fontSize="7" fill={txtColor} fontFamily="monospace" opacity="0.7">MCP Server</text>
                </g>
              );
            })}
          </svg>

          {/* 범례 */}
          <div className="flex flex-wrap gap-3 text-[10px] mt-2 text-amber-800 font-mono">
            <span className="flex items-center gap-1">
              <span className="w-3 h-2 rounded" style={{ background: '#fef3c7', border: '1.5px solid #fbbf24' }}></span>
              컴포넌트 (대기)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-3 h-2 rounded" style={{ background: '#f59e0b', border: '1.5px solid #b45309' }}></span>
              활성
            </span>
            <span className="flex items-center gap-1">
              <span className="w-4 h-0.5" style={{ background: '#d97706' }}></span>
              stdio
            </span>
            <span className="flex items-center gap-1">
              <span className="w-4 border-t-2 border-dashed" style={{ borderColor: '#0891b2' }}></span>
              SSE
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 메시지 흐름 패널 (Step 5에서 강조)
    // ─────────────────────────────────────────────────────
    function FlowPanel({ step }) {
      if (step.active !== 'flow') return null;
      const lanes = [
        { from: 'LLM',         to: 'Host',      arrow: '→', label: 'tool_use 결정', kind: 'down' },
        { from: 'Host',        to: 'Client',    arrow: '→', label: 'callTool() 위임', kind: 'down' },
        { from: 'Client',      to: 'Transport', arrow: '→', label: 'JSON-RPC 직렬화', kind: 'down' },
        { from: 'Transport',   to: 'Server',    arrow: '→', label: 'stdin / HTTP POST', kind: 'down' },
        { from: 'Server',      to: 'Transport', arrow: '←', label: 'result JSON', kind: 'up' },
        { from: 'Transport',   to: 'Client',    arrow: '←', label: 'stdout / SSE', kind: 'up' },
        { from: 'Client',      to: 'Host',      arrow: '←', label: 'Promise resolve', kind: 'up' },
        { from: 'Host',        to: 'LLM',       arrow: '←', label: 'tool_result 주입', kind: 'up' },
      ];
      return (
        <div className="mt-3 rounded-lg border-2 border-amber-300 bg-white overflow-hidden">
          <div className="bg-amber-100 px-3 py-1.5 text-[11px] font-bold text-amber-900 border-b border-amber-200">
            📨 JSON-RPC 메시지 흐름 (Request 4단계 ↓ + Response 4단계 ↑)
          </div>
          <table className="w-full text-[10.5px] font-mono">
            <tbody>
              {lanes.map((l, i) => (
                <tr key={i} className={l.kind === 'down' ? 'bg-amber-50/60' : 'bg-emerald-50/60'}>
                  <td className="px-3 py-1 text-right text-slate-700 font-bold w-1/5">{l.from}</td>
                  <td className={`px-2 py-1 text-center font-bold w-12 ${l.kind === 'down' ? 'text-amber-700' : 'text-emerald-700'}`}>{l.arrow}</td>
                  <td className="px-3 py-1 text-left text-slate-700 font-bold w-1/5">{l.to}</td>
                  <td className="px-3 py-1 text-slate-600">{l.label}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 컴포넌트 설명 카드 (현재 활성 layer에 따라)
    // ─────────────────────────────────────────────────────
    function ComponentInfo({ step }) {
      const map = {
        host: {
          icon: '🖥️',
          name: 'Host',
          oneLine: '사용자가 보는 AI 애플리케이션 (Claude Desktop, Cursor 등)',
          bullets: [
            'UI · LLM 호출 · 대화 기록 관리',
            'host.json으로 어떤 Server를 띄울지 설정',
            'Server 1개 = 내부에 Client 인스턴스 1개 생성',
          ],
        },
        client: {
          icon: '🔌',
          name: 'Client',
          oneLine: 'Host 내부에서 Server 1개와 1:1 통신하는 인스턴스',
          bullets: [
            'Server마다 별도 인스턴스 (3개 Server → 3개 Client)',
            'connection state, tool 목록 캐시, request 추적',
            'Host는 항상 Client를 통해서만 Server에 접근',
          ],
        },
        transport: {
          icon: '🚇',
          name: 'Transport',
          oneLine: 'Client ↔ Server를 잇는 통신 채널',
          bullets: [
            'stdio: 자식 프로세스 + stdin/stdout (로컬용)',
            'SSE: HTTP POST + Server-Sent Events (원격용)',
            '메시지 포맷(JSON-RPC 2.0)은 양쪽 동일',
          ],
        },
        server: {
          icon: '🛠️',
          name: 'Server',
          oneLine: '실제 Tool/Resource/Prompt를 구현한 코드',
          bullets: [
            'filesystem · github · slack · postgres 등',
            'list_tools / call_tool 핸들러를 등록',
            'Host/Client 정보를 알 필요 없음 (decoupled)',
          ],
        },
        flow: {
          icon: '📨',
          name: '메시지 흐름',
          oneLine: 'JSON-RPC 2.0 양방향 메시지 (Request ↔ Response ↔ Notification)',
          bullets: [
            'Request: id + method + params (응답 기대)',
            'Response: 같은 id + result 또는 error',
            'Notification: id 없음, Server → Client push',
          ],
        },
      };
      const info = map[step.active];
      if (!info) return null;
      return (
        <div className="mt-3 rounded-lg bg-white border-2 border-amber-300 p-3 shadow-sm">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl">{info.icon}</span>
            <div>
              <div className="text-[10px] uppercase tracking-wider text-amber-700 font-bold">현재 컴포넌트</div>
              <div className="text-base font-bold text-slate-800">{info.name}</div>
            </div>
          </div>
          <p className="text-xs text-slate-700 mb-2 leading-relaxed">{info.oneLine}</p>
          <ul className="text-xs text-slate-600 space-y-1">
            {info.bullets.map((b, i) => (
              <li key={i} className="flex items-start gap-2">
                <span className="text-amber-600 font-bold mt-0.5">▸</span>
                <span>{b}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🏨 MCP 4 컴포넌트 — Host / Client / Transport / Server</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>
          <McpDiagram step={step} />
          <ComponentInfo step={step} />
          <FlowPanel step={step} />
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + 파일명 탭
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total, allFiles, onSelectTab }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">MCP architecture</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* 파일명 탭 (5개) */}
          <div className="bg-[#1e2127] flex overflow-x-auto border-b border-slate-700">
            {allFiles.map((f, i) => {
              const isActive = f.idx === stepIdx;
              return (
                <button
                  key={f.filename}
                  onClick={() => onSelectTab(f.idx)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                    isActive
                      ? 'bg-[#282c34] text-amber-300 border-t-2 border-t-amber-400'
                      : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800/40'
                  }`}
                >
                  {f.filename}
                </button>
              );
            })}
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[34rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-amber-500/15 border-l-2 border-amber-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App 메인
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const allFiles = STEPS.map((s, i) => ({ filename: s.code.filename, idx: i }));

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="../index.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; 허브로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">curriculum IV-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. MCP &gt; Chapter 1. MCP 개요</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">MCP 아키텍처 — Host / Client / Server / Transport</h1>
                  <p className="text-sm text-slate-500 mt-0.5">Claude Desktop 안에서 3개 MCP Server에 1:1 Client로 연결되는 구조와 JSON-RPC 메시지 흐름</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} allFiles={allFiles}
                onSelectTab={(i) => { setStepIdx(i); setIsPlaying(false); }} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-3 text-sm text-amber-900">
                💡 다음(IV-2-1)에서는 MCP Server가 노출하는 3가지 primitive — <strong>Resources / Tools / Prompts</strong> — 의 차이와 사용 시점을 자세히 다룬다
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-amber-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-amber-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-amber-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={handleReset} disabled={stepIdx === 0 && !isPlaying} aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">처음</button>
              <button onClick={handlePrev} disabled={stepIdx === 0} aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">&larr; 이전</button>
              <button onClick={togglePlay} aria-pressed={isPlaying} aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-amber-600 text-white hover:bg-amber-700 transition min-w-[100px]">
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button onClick={handleNext} disabled={stepIdx >= STEPS.length - 1} aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition">다음 &rarr;</button>
            </div>

            {/* 키워드 뱃지 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Host', 'Client', 'Transport', 'Server', 'stdio', 'SSE', 'JSON-RPC 2.0'].map((kw) => (
                <span key={kw} className="bg-amber-50 text-amber-800 px-3 py-1 rounded-full text-xs font-medium border border-amber-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./IV-1-1.html" className="text-amber-700 hover:text-amber-900 font-medium">&larr; IV-1-1. MCP란 무엇인가</a>
              <a href="./IV-2-1.html" className="text-amber-700 hover:text-amber-900 font-medium">IV-2-1. Resources, Tools, Prompts &rarr;</a>
            </nav>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
