<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent 인터랙티브 학습</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!--
    AI Agent 인터랙티브 학습 — 사이드바 + iframe 레이아웃
    역할: 왼쪽 사이드바에서 26개 시각화를 탐색, 오른쪽 iframe에 로드.
    URL 해시(#I-1-1)로 딥링크 지원.
  -->
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const SECTIONS = [
      {
        part: 'I',
        label: 'Part I. AI Agent란 무엇인가',
        color: 'bg-violet-600',
        items: [
          { id: 'I-1-1', title: '챗봇 vs AI Agent', file: './part1/I-1-1.html' },
          { id: 'I-1-2', title: 'Agent의 3요소', file: './part1/I-1-2.html' },
          { id: 'I-1-3', title: '왜 Agent가 필요한가', file: './part1/I-1-3.html' },
          { id: 'I-2-1', title: 'Agent 아키텍처 전체 지도', file: './part1/I-2-1.html' },
          { id: 'I-2-2', title: '자율성 스펙트럼', file: './part1/I-2-2.html' },
        ],
      },
      {
        part: 'II',
        label: 'Part II. LLM 기초',
        color: 'bg-sky-600',
        items: [
          { id: 'II-1-1', title: 'LLM 작동 원리', file: './part2/II-1-1.html' },
          { id: 'II-1-2', title: '토큰과 컨텍스트 윈도우', file: './part2/II-1-2.html' },
          { id: 'II-2-1', title: '프롬프트 구조', file: './part2/II-2-1.html' },
          { id: 'II-2-2', title: 'API 호출 기본', file: './part2/II-2-2.html' },
          { id: 'II-3-1', title: '환각, 지식 단절, 행동 불가', file: './part2/II-3-1.html' },
        ],
      },
      {
        part: 'III',
        label: 'Part III. 핵심 패턴',
        color: 'bg-amber-600',
        items: [
          { id: 'III-1-1', title: 'Chain of Thought', file: './part3/III-1-1.html' },
          { id: 'III-1-2', title: 'Few-shot CoT', file: './part3/III-1-2.html' },
          { id: 'III-2-1', title: 'ReAct란', file: './part3/III-2-1.html' },
          { id: 'III-2-2', title: 'ReAct 실행 흐름', file: './part3/III-2-2.html' },
          { id: 'III-3-1', title: 'Tool Use란', file: './part3/III-3-1.html' },
          { id: 'III-3-2', title: 'Function Calling', file: './part3/III-3-2.html' },
          { id: 'III-3-3', title: 'Tool Use + ReAct 통합', file: './part3/III-3-3.html' },
        ],
      },
      {
        part: 'IV',
        label: 'Part IV. MCP',
        color: 'bg-rose-600',
        items: [
          { id: 'IV-1-1', title: 'MCP란 무엇인가', file: './part4/IV-1-1.html' },
          { id: 'IV-1-2', title: 'MCP 아키텍처', file: './part4/IV-1-2.html' },
          { id: 'IV-2-1', title: 'Resources, Tools, Prompts', file: './part4/IV-2-1.html' },
          { id: 'IV-2-2', title: 'MCP 통신 흐름', file: './part4/IV-2-2.html' },
          { id: 'IV-3-1', title: 'MCP Server 만들기', file: './part4/IV-3-1.html' },
        ],
      },
      {
        part: 'V',
        label: 'Part V. 실전 에이전트 구축',
        color: 'bg-emerald-600',
        items: [
          { id: 'V-1-1', title: 'Single Agent 설계 패턴', file: './part5/V-1-1.html' },
          { id: 'V-1-2', title: '메모리와 상태 관리', file: './part5/V-1-2.html' },
          { id: 'V-2-1', title: '에이전트 루프 구현', file: './part5/V-2-1.html' },
          { id: 'V-2-2', title: 'Multi-Agent 개요', file: './part5/V-2-2.html' },
        ],
      },
    ];

    const TOTAL = SECTIONS.reduce((sum, s) => sum + s.items.length, 0);

    const PART_BG = {
      I:   'hover:bg-violet-50',
      II:  'hover:bg-sky-50',
      III: 'hover:bg-amber-50',
      IV:  'hover:bg-rose-50',
      V:   'hover:bg-emerald-50',
    };

    const PART_ACTIVE = {
      I:   'bg-violet-100 text-violet-800 font-bold',
      II:  'bg-sky-100 text-sky-800 font-bold',
      III: 'bg-amber-100 text-amber-800 font-bold',
      IV:  'bg-rose-100 text-rose-800 font-bold',
      V:   'bg-emerald-100 text-emerald-800 font-bold',
    };

    function findItemById(id) {
      for (const section of SECTIONS) {
        const found = section.items.find(item => item.id === id);
        if (found) return { ...found, part: section.part };
      }
      return null;
    }

    function App() {
      const [activeId, setActiveId] = useState(null);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [expandedParts, setExpandedParts] = useState({ I: true, II: true, III: true, IV: true, V: true });

      const activeItem = activeId ? findItemById(activeId) : null;

      const navigate = useCallback((id) => {
        setActiveId(id);
        window.location.hash = id;
        if (window.innerWidth < 1024) setSidebarOpen(false);
      }, []);

      useEffect(() => {
        const hash = window.location.hash.slice(1);
        if (hash && findItemById(hash)) {
          setActiveId(hash);
        }
        const onHash = () => {
          const h = window.location.hash.slice(1);
          if (h && findItemById(h)) setActiveId(h);
        };
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      const togglePart = (part) => {
        setExpandedParts(prev => ({ ...prev, [part]: !prev[part] }));
      };

      return (
        <div className="h-full flex bg-slate-100">

          {/* 모바일 오버레이 */}
          {sidebarOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-30 z-30 lg:hidden" onClick={() => setSidebarOpen(false)} />
          )}

          {/* 사이드바 */}
          <aside className={`
            fixed lg:static z-40 h-full w-72 bg-white border-r border-slate-200 flex flex-col
            transition-transform duration-200
            ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0 lg:w-72'}
          `}>
            {/* 사이드바 헤더 */}
            <div className="p-4 border-b border-slate-200 shrink-0">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 bg-violet-600 text-white flex items-center justify-center rounded-lg font-bold text-sm">A</div>
                <div>
                  <div className="font-bold text-slate-800 text-sm">AI Agent 학습</div>
                  <div className="text-[11px] text-slate-500">{TOTAL}개 시각화</div>
                </div>
              </div>
            </div>

            {/* 네비게이션 목록 */}
            <nav className="flex-1 overflow-y-auto p-2">
              {SECTIONS.map((section) => (
                <div key={section.part} className="mb-1">
                  <button
                    onClick={() => togglePart(section.part)}
                    className="w-full flex items-center gap-2 px-2 py-2 rounded-lg text-left hover:bg-slate-50 transition"
                  >
                    <span className={`w-5 h-5 rounded text-white text-[10px] flex items-center justify-center font-bold ${section.color}`}>
                      {section.part}
                    </span>
                    <span className="text-xs font-bold text-slate-700 flex-1 truncate">{section.label}</span>
                    <span className="text-[10px] text-slate-400">{section.items.length}</span>
                    <span className={`text-slate-400 text-xs transition-transform ${expandedParts[section.part] ? 'rotate-90' : ''}`}>&#9654;</span>
                  </button>

                  {expandedParts[section.part] && (
                    <div className="ml-4 border-l border-slate-100 pl-2 space-y-0.5">
                      {section.items.map((item) => {
                        const isActive = activeId === item.id;
                        return (
                          <button
                            key={item.id}
                            onClick={() => navigate(item.id)}
                            className={`w-full text-left px-2 py-1.5 rounded-md text-xs transition-all truncate
                              ${isActive ? PART_ACTIVE[section.part] : `text-slate-600 ${PART_BG[section.part]}`}
                            `}
                          >
                            <span className="font-mono text-[10px] opacity-60 mr-1">{item.id}</span>
                            {item.title}
                          </button>
                        );
                      })}
                    </div>
                  )}
                </div>
              ))}
            </nav>

            {/* 사이드바 풋터 */}
            <div className="p-3 border-t border-slate-200 shrink-0 text-[10px] text-slate-400 text-center">
              React + Tailwind + Babel CDN
            </div>
          </aside>

          {/* 메인 콘텐츠 */}
          <main className="flex-1 flex flex-col min-w-0">
            {/* 상단 바 */}
            <div className="h-12 bg-white border-b border-slate-200 flex items-center px-4 shrink-0 gap-3">
              <button
                onClick={() => setSidebarOpen(prev => !prev)}
                className="lg:hidden p-1.5 rounded-md hover:bg-slate-100 text-slate-600"
                aria-label="사이드바 토글"
              >
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                  <path fillRule="evenodd" d="M3 5h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2z" />
                </svg>
              </button>

              {activeItem ? (
                <div className="flex items-center gap-2 min-w-0">
                  <span className={`w-5 h-5 rounded text-white text-[10px] flex items-center justify-center font-bold shrink-0 ${
                    SECTIONS.find(s => s.part === activeItem.part)?.color || 'bg-slate-600'
                  }`}>{activeItem.part}</span>
                  <span className="font-mono text-xs text-slate-500 shrink-0">{activeItem.id}</span>
                  <span className="text-sm font-bold text-slate-800 truncate">{activeItem.title}</span>
                </div>
              ) : (
                <span className="text-sm text-slate-500">시각화를 선택하세요</span>
              )}
            </div>

            {/* iframe 또는 웰컴 화면 */}
            {activeItem ? (
              <iframe
                key={activeItem.id}
                src={activeItem.file}
                className="flex-1 w-full border-0"
                title={activeItem.title}
              />
            ) : (
              <div className="flex-1 flex items-center justify-center p-8">
                <div className="text-center max-w-md">
                  <div className="w-16 h-16 bg-violet-100 text-violet-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl font-bold">A</div>
                  <h2 className="text-2xl font-bold text-slate-800 mb-3">AI Agent 인터랙티브 학습</h2>
                  <p className="text-slate-600 mb-6 leading-relaxed">
                    왼쪽 사이드바에서 시각화를 선택하세요.<br/>
                    Part I부터 순서대로 보거나, 관심 있는 주제를 바로 클릭할 수 있습니다.
                  </p>
                  <div className="grid grid-cols-5 gap-2 mb-6">
                    {SECTIONS.map(s => (
                      <div key={s.part} className="text-center">
                        <div className={`w-8 h-8 rounded-lg text-white text-xs flex items-center justify-center font-bold mx-auto mb-1 ${s.color}`}>{s.part}</div>
                        <div className="text-[10px] text-slate-500">{s.items.length}개</div>
                      </div>
                    ))}
                  </div>
                  <p className="text-xs text-slate-400">총 {TOTAL}개 시각화 | React + Tailwind CDN | 빌드 도구 없음</p>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
