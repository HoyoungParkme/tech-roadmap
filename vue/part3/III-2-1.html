    function RouteView({ routes }) {
      if (!routes) return null;
      return (<div className="space-y-1.5">{routes.map((r, i) => (<div key={i} className="flex items-stretch rounded border overflow-hidden" style={{ borderColor: '#A7F3D0' }}><div className="w-44 px-2 py-1.5 text-xs font-mono" style={{ backgroundColor: '#ECFDF5', color: '#047857' }}>{r.path}</div><div className="flex-1 px-2 py-1.5 text-xs" style={{ backgroundColor: '#FFFFFF', color: '#1F2937' }}>{r.name}</div><div className="w-32 px-2 py-1.5 text-[10px] font-mono text-right" style={{ backgroundColor: '#F9FAFB', color: '#6B7280' }}>{r.comp}</div></div>))}</div>);
    }

      const badge = KIND_BADGE[state.kind] || KIND_BADGE.spa;
      return (<div className="rounded-xl border bg-white p-4 h-full flex flex-col" style={{ borderColor: '#A7F3D0' }}><div className="flex items-center justify-between mb-3"><h3 className="text-sm font-bold" style={{ color: '#047857' }}>Vue Router — 노선도</h3><span className="text-[10px] px-2 py-0.5 rounded text-white" style={{ backgroundColor: badge.color }}>{badge.label}</span></div><div className="rounded-lg border-2 p-3 flex-1" style={{ borderColor: '#4FC08D' }}><div className="text-xs font-bold mb-2" style={{ color: '#047857' }}>🚇 routes 매핑</div><RouteView routes={state.routes} /></div>{state.alert && <AlertBox alert={state.alert} />}</div>);

    function AlertBox({ alert }) { if (!alert) return null; const s = ALERT_STYLE[alert.tone] || ALERT_STYLE.info; return (<div className="mt-3 rounded-lg border p-2 text-xs flex gap-2" style={{ backgroundColor: s.bg, borderColor: s.border, color: s.text }}><span>{s.icon}</span><span>{alert.text}</span></div>); }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => { if (codeRef.current && window.hljs) { codeRef.current.removeAttribute('data-highlighted'); window.hljs.highlightElement(codeRef.current); } }, [code]);
      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => { if (!codeRef.current) return code.lines.map((l) => ({ html: l })); const html = codeRef.current.innerHTML; const split = html.split('\n'); return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l })); })();
      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700"><span className="w-3 h-3 rounded-full bg-red-400"></span><span className="w-3 h-3 rounded-full bg-yellow-400"></span><span className="w-3 h-3 rounded-full bg-green-400"></span><span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span><span className="ml-auto text-[10px] text-slate-400">{code.lang}</span></div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5"><pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre><div className="text-slate-200">{code.lines.map((line, i) => { const lineNo = i + 1; const isHi = highlightSet.has(lineNo); return (<div key={i} className={`flex ${isHi ? 'border-l-2 -ml-3 pl-2' : ''}`} style={isHi ? { backgroundColor: 'rgba(79,192,141,0.15)', borderColor: '#4FC08D' } : {}}><span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span><span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} /></div>); })}</div></div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400"><span>{code.lines.length} lines</span><span>Step {stepIdx + 1} / {total}</span></div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0); const [playing, setPlaying] = useState(false); const intervalRef = useRef(null); const step = STEPS[stepIdx];
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1)); else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1)); }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);
      useEffect(() => { if (!playing) return; intervalRef.current = setInterval(() => { setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; }); }, 3000); return () => clearInterval(intervalRef.current); }, [playing]);
      const isLast = stepIdx === STEPS.length - 1;
      return (
        <div className="min-h-screen px-4 py-6" style={{ background: 'linear-gradient(135deg, #ECFDF5, #F0FDF4)' }}>
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap"><span className="inline-flex items-center justify-center w-10 h-10 rounded-lg text-white font-bold" style={{ backgroundColor: '#4FC08D' }}>V</span><div><h1 className="text-2xl font-bold" style={{ color: '#047857' }}>III-2-1. Vue Router 4</h1><p className="text-sm" style={{ color: '#065F46' }}>지하철 노선도 — URL = 역, 컴포넌트 = 정거장 풍경</p></div><a href="../index.html" className="ml-auto text-xs underline hover:no-underline" style={{ color: '#047857' }}>← 챕터 목록</a></header>
            <div className="mb-4 flex gap-1.5">{STEPS.map((_, i) => (<div key={i} className="h-1.5 flex-1 rounded-full transition" style={{ backgroundColor: i <= stepIdx ? '#4FC08D' : '#A7F3D0' }} />))}</div>
            <div className="mb-4 rounded-xl text-white px-5 py-4 shadow" style={{ background: 'linear-gradient(90deg, #047857, #4FC08D)' }}><h2 className="text-lg font-bold mb-1">{step.title}</h2><p className="text-sm leading-relaxed opacity-95">{step.desc}</p></div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4"><LiveDataPane state={step} /><CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} /></div>
            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} aria-label="처음으로" className="px-3 py-1.5 text-xs rounded border bg-white hover:opacity-80" style={{ borderColor: '#4FC08D', color: '#047857' }}>처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 text-xs rounded border bg-white hover:opacity-80 disabled:opacity-40" style={{ borderColor: '#4FC08D', color: '#047857' }}>← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'} className="px-4 py-1.5 text-xs rounded font-bold text-white" style={{ backgroundColor: playing ? '#047857' : '#4FC08D' }}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} aria-label="다음 단계" className="px-3 py-1.5 text-xs rounded border bg-white hover:opacity-80 disabled:opacity-40" style={{ borderColor: '#4FC08D', color: '#047857' }}>다음 →</button>
            </div>
            <div className="text-center text-[10px] mt-2" style={{ color: '#047857' }}>키보드 ←/→ · 자동재생 3초/단계</div>
            {isLast && (<div className="mt-5 rounded-lg border-2 bg-white px-4 py-3 text-sm" style={{ borderColor: '#4FC08D', color: '#065F46' }}><div className="font-bold mb-1">✅ 핵심 정리</div>Vue Router 4 = createRouter + routes 배열. RouterView/RouterLink/router.push. 동적 :id + props:true + 중첩 children. 다음 챕터는 Navigation Guard.</div>)}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">{['VueRouter', 'createRouter', 'RouterView', 'RouterLink', 'dynamicRoute', 'nested', 'SPA'].map((k) => (<span key={k} className="px-2 py-0.5 rounded-full border" style={{ backgroundColor: '#ECFDF5', color: '#047857', borderColor: '#A7F3D0' }}>#{k}</span>))}</div>
            <nav className="mt-6 flex items-center justify-between text-xs" style={{ color: '#047857' }}><a href="./III-1-2.html" className="underline hover:no-underline">← 이전: III-1-2</a><a href="./III-2-2.html" className="underline hover:no-underline">다음: III-2-2 →</a></nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
