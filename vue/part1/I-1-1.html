<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vue 학습 — I-1-1. Vue 3 첫 컴포넌트 (Options vs Composition)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🟢</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <style>
    .vue-brand { color: #4FC08D; }
    .vue-bg { background-color: #4FC08D; }
    .vue-border { border-color: #4FC08D; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!--
    Vue I-1-1 — Vue 3 첫 컴포넌트 (Options vs Composition)
    비유: "주방 정리법" — Options API(재료별 서랍) vs Composition API(요리별 서랍)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. Vue 컴포넌트가 뭔지부터',
        desc: 'Vue 컴포넌트는 <template>(HTML) + <script>(JS) + <style>(CSS) 세 블록을 한 .vue 파일에 묶은 것. 화면의 한 조각(버튼, 카드, 페이지)을 통째로 한 파일에 담는다. HTML/JS/CSS를 따로 두지 않고 "이 화면 조각에 필요한 모든 것"을 한 곳에 모은다.',
        sfc: { template: '<button @click="count++">{{ count }}</button>', script: 'data() { return { count: 0 } }', style: 'button { color: #4FC08D; }' },
        api: 'sfc',
        alert: { tone: 'info', text: '.vue 파일 = HTML + JS + CSS 한 묶음. 화면 한 조각의 단일 책임.' },
        code: {
          lang: 'html',
          filename: 'Counter.vue',
          lines: [
            '<!-- Vue Single File Component (SFC)',
            '     - .vue 확장자',
            '     - <template> + <script> + <style> 세 블록',
            '     - 한 화면 조각을 한 파일에 모은다 -->',
            '',
            '<template>',
            '  <button @click="count++">',
            '    count: {{ count }}',
            '  </button>',
            '</template>',
            '',
            '<script>',
            'export default {',
            '  data() {',
            '    return { count: 0 }',
            '  }',
            '}',
            '<\/script>',
            '',
            '<style scoped>',
            'button {',
            '  color: #4FC08D;',
            '  font-weight: bold;',
            '}',
            '</style>',
            '',
            '<!-- 이 한 파일이 = 버튼 컴포넌트 통째 -->',
          ],
          highlight: [6, 7, 8, 9, 10, 12, 13, 14, 15, 16, 17, 20, 21, 22, 23, 24],
        },
      },
      {
        title: 'Step 2. Options API — 재료별 서랍 정리',
        desc: 'Options API는 data, methods, computed, watch 같은 "옵션 이름별"로 코드를 나눠 담는다. data는 data끼리, methods는 methods끼리. 한 기능이 여러 옵션에 흩어진다. count 기능: data의 count + methods의 increment + computed의 doubled — 세 곳을 봐야 한다.',
        sfc: { template: '<button @click="inc">{{ count }} (x2={{ doubled }})</button>', script: 'data, methods, computed 옵션 분리', style: 'option-based' },
        api: 'options',
        alert: { tone: 'warn', text: '한 기능이 data/methods/computed 여러 곳에 흩어진다 → 큰 컴포넌트에서 찾기 어렵다.' },
        code: {
          lang: 'html',
          filename: 'Counter.options.vue',
          lines: [
            '<!-- Options API — Vue 2 스타일 (Vue 3에서도 동작) -->',
            '',
            '<template>',
            '  <div>',
            '    <p>count: {{ count }} (x2 = {{ doubled }})</p>',
            '    <button @click="increment">+1</button>',
            '  </div>',
            '</template>',
            '',
            '<script>',
            'export default {',
            '  // ── 1) data: 반응형 상태 ───────────────',
            '  data() {',
            '    return {',
            '      count: 0,',
            '      name: "주니어",',
            '    }',
            '  },',
            '',
            '  // ── 2) computed: 파생 상태 ─────────────',
            '  computed: {',
            '    doubled() {',
            '      return this.count * 2',
            '    },',
            '  },',
            '',
            '  // ── 3) methods: 이벤트 핸들러 ──────────',
            '  methods: {',
            '    increment() {',
            '      this.count++',
            '    },',
            '  },',
            '',
            '  // ── 4) watch: 변경 감시 ────────────────',
            '  watch: {',
            '    count(newVal) {',
            '      console.log("count changed:", newVal)',
            '    },',
            '  },',
            '',
            '  // ── 5) lifecycle ───────────────────────',
            '  mounted() {',
            '    console.log("마운트 완료")',
            '  },',
            '}',
            '<\/script>',
            '',
            '<!-- 문제: count 한 기능이 data + computed + methods + watch',
            '     네 옵션에 흩어져 있다. 컴포넌트가 커지면 찾기 어려움. -->',
          ],
          highlight: [12, 13, 14, 15, 16, 17, 20, 21, 22, 23, 24, 27, 28, 29, 30, 31],
        },
      },
      {
        title: 'Step 3. Composition API — 요리별 서랍 정리',
        desc: 'Composition API는 setup() 안에서 "한 기능에 필요한 모든 코드"를 한 곳에 모은다. count 기능 = ref + computed + function 을 setup 한 블록에 나란히. 같은 관심사가 같은 위치에. 큰 컴포넌트에서 "검색 기능 코드"만 모아 보고, "필터 코드"만 모아 보는 식이 가능해진다.',
        sfc: { template: '<button @click="inc">{{ count }}</button>', script: '<script setup> ref, computed', style: 'composition' },
        api: 'composition',
        alert: { tone: 'good', text: '한 기능 = 한 블록. 관심사 응집도(Co-location)가 높아진다.' },
        code: {
          lang: 'html',
          filename: 'Counter.composition.vue',
          lines: [
            '<!-- Composition API — Vue 3 권장 방식 (<script setup>) -->',
            '',
            '<template>',
            '  <div>',
            '    <p>count: {{ count }} (x2 = {{ doubled }})</p>',
            '    <button @click="increment">+1</button>',
            '  </div>',
            '</template>',
            '',
            '<script setup>',
            'import { ref, computed, watch, onMounted } from "vue"',
            '',
            '// ── count 기능을 한 블록에 모음 ──────────',
            'const count = ref(0)',
            'const doubled = computed(() => count.value * 2)',
            'function increment() {',
            '  count.value++',
            '}',
            'watch(count, (newVal) => {',
            '  console.log("count changed:", newVal)',
            '})',
            '',
            '// ── name 기능은 따로 ─────────────────────',
            'const name = ref("주니어")',
            '',
            '// ── lifecycle ───────────────────────────',
            'onMounted(() => {',
            '  console.log("마운트 완료")',
            '})',
            '<\/script>',
            '',
            '<!-- 장점:',
            '     1) "count 기능"이 한 블록에 모여 있다 (data/computed/methods 분산 X)',
            '     2) this 가 사라져서 TypeScript 친화적',
            '     3) 같은 로직을 함수로 빼서 재사용 (composable)',
            '     4) <script setup> 으로 export 보일러플레이트 제거 -->',
          ],
          highlight: [10, 11, 13, 14, 15, 16, 17, 18, 19, 20, 21, 23, 24, 27, 28, 29],
        },
      },
      {
        title: 'Step 4. 같은 카운터를 두 방식으로 비교',
        desc: '같은 결과(카운터 + 두 배 표시 + 변경 로그)를 Options와 Composition 두 방식으로 구현한 결과를 나란히 본다. 코드 라인 수, "한 기능을 보려고 봐야 하는 위치 수", 재사용성을 비교하면 차이가 명확해진다. 작은 컴포넌트에선 Options도 OK. 컴포넌트가 커지고 한 기능이 복잡해질수록 Composition이 유리하다.',
        sfc: { template: '비교표', script: '두 방식', style: 'side-by-side' },
        api: 'compare',
        alert: { tone: 'info', text: '작으면 Options OK. 크고 복잡하면 Composition이 검색·재사용에 강하다.' },
        code: {
          lang: 'markdown',
          filename: 'comparison.md',
          lines: [
            '# Options API vs Composition API — 같은 카운터',
            '',
            '## 코드 라인 수 (대략)',
            '| 항목 | Options | Composition |',
            '|:--|:--:|:--:|',
            '| 카운터 (단순) | 30 줄 | 22 줄 |',
            '| 검색 + 필터 + 페이지네이션 | 200 줄 | 120 줄 |',
            '',
            '## "count 기능"을 보려고 봐야 하는 위치',
            '| 방식 | 위치 |',
            '|:--|:--|',
            '| Options | data + computed + methods + watch — 4곳 |',
            '| Composition | setup 안 한 블록 — 1곳 |',
            '',
            '## 재사용성',
            '- Options: mixin 으로 재사용 (네임 충돌 위험)',
            '- Composition: composable 함수로 재사용 (충돌 없음)',
            '',
            '## TypeScript 친화도',
            '- Options: this 추론이 까다로움',
            '- Composition: 일반 함수처럼 추론 → TS 친화적',
            '',
            '## 언제 무엇을 쓰나',
            '- 단순 컴포넌트 (50줄 이하) → 둘 다 OK',
            '- 중대형 컴포넌트 (200줄+) → Composition 권장',
            '- Vue 2에서 마이그레이션 중 → 두 방식 혼용 가능',
            '- 신규 프로젝트 + TypeScript → Composition + <script setup>',
            '',
            '## 결론',
            '> Vue 3 공식 권장: Composition API + <script setup>',
            '> Options API 는 사라지지 않는다 (호환성 유지)',
            '> 그래도 신규 코드는 Composition 으로 시작하자',
          ],
          highlight: [3, 4, 5, 6, 7, 9, 10, 11, 12, 13, 24, 25, 26, 27, 30, 31, 32],
        },
      },
      {
        title: 'Step 5. <script setup> — 최종 권장 형태',
        desc: '<script setup>은 Composition API의 사용성을 한 단계 더 끌어올린 문법. setup() 함수도 안 쓰고, return도 안 쓰고, top-level에 import한 컴포넌트도 자동 등록. 보일러플레이트가 거의 없다. Vue 3 + Vite + TypeScript 조합이 현재의 표준이다. 다음 챕터부터는 모두 이 형태를 기준으로 한다.',
        sfc: { template: '<script setup> 표준', script: 'modern', style: 'standard' },
        api: 'setup',
        alert: { tone: 'good', text: 'Vue 3 신규 코드 표준: <script setup> + Composition API + TypeScript.' },
        code: {
          lang: 'html',
          filename: 'HelloVue.vue',
          lines: [
            '<!-- 표준 Vue 3 컴포넌트 — <script setup> + TS -->',
            '',
            '<template>',
            '  <section class="card">',
            '    <h2>{{ greeting }}</h2>',
            '    <UserCard :name="name" @save="onSave" />',
            '    <button @click="reload">새로고침</button>',
            '  </section>',
            '</template>',
            '',
            '<script setup lang="ts">',
            'import { ref, computed, onMounted } from "vue"',
            'import UserCard from "./UserCard.vue"  // ← 자동 등록',
            '',
            '// props (타입 안전)',
            'const props = defineProps<{',
            '  initialName: string',
            '}>()',
            '',
            '// emit (타입 안전)',
            'const emit = defineEmits<{',
            '  (e: "saved", payload: { name: string }): void',
            '}>()',
            '',
            '// state',
            'const name = ref(props.initialName)',
            'const greeting = computed(() => `안녕, ${name.value}!`)',
            '',
            '// methods',
            'function reload() {',
            '  name.value = props.initialName',
            '}',
            'function onSave(payload: { name: string }) {',
            '  emit("saved", payload)',
            '}',
            '',
            '// lifecycle',
            'onMounted(() => {',
            '  console.log("HelloVue 마운트")',
            '})',
            '<\/script>',
            '',
            '<style scoped>',
            '.card { padding: 1rem; border: 1px solid #4FC08D; }',
            '</style>',
            '',
            '<!-- 핵심:',
            '  1) import 한 컴포넌트는 그대로 template 에서 사용',
            '  2) defineProps / defineEmits 는 컴파일러 매크로 (import 불필요)',
            '  3) return 안 함 — top-level 변수가 template 에 자동 노출',
            '  4) lang="ts" 로 TypeScript 활성화 -->',
          ],
          highlight: [11, 12, 13, 16, 17, 18, 21, 22, 23, 26, 27, 30, 31, 32, 33, 34, 35, 38, 39, 40],
        },
      },
    ];

    function SFCBlock({ label, color, content }) {
      return (
        <div className="rounded border" style={{ borderColor: '#A7F3D0' }}>
          <div className="text-[10px] font-bold px-2 py-1" style={{ color: '#047857', backgroundColor: '#ECFDF5' }}>{label}</div>
          <div className="px-2 py-1.5 text-[11px] font-mono text-slate-700 break-all">{content}</div>
        </div>
      );
    }

    const API_BADGE = {
      sfc: { label: 'SFC 구조', color: '#4FC08D' },
      options: { label: 'Options API', color: '#F59E0B' },
      composition: { label: 'Composition API', color: '#4FC08D' },
      compare: { label: '두 방식 비교', color: '#6366F1' },
      setup: { label: '<script setup>', color: '#047857' },
    };

    function LiveDataPane({ state }) {
      const badge = API_BADGE[state.api] || API_BADGE.sfc;
      return (
        <div className="rounded-xl border bg-white p-4 h-full flex flex-col" style={{ borderColor: '#A7F3D0' }}>
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold" style={{ color: '#047857' }}>Vue Component — .vue 파일</h3>
            <span className="text-[10px] px-2 py-0.5 rounded text-white" style={{ backgroundColor: badge.color }}>{badge.label}</span>
          </div>

          <div className="rounded-lg border-2 overflow-hidden" style={{ borderColor: '#4FC08D' }}>
            <div className="text-white px-3 py-1.5 text-xs font-bold flex items-center gap-2" style={{ background: 'linear-gradient(90deg, #4FC08D, #047857)' }}>
              <span>📦</span>
              <span>Component.vue</span>
              <span className="ml-auto text-[10px] bg-white/20 px-2 py-0.5 rounded">{badge.label}</span>
            </div>
            <div className="p-3 space-y-2 bg-slate-50">
              <SFCBlock label="<template> (HTML)" content={state.sfc.template} />
              <SFCBlock label="<script> (JS)" content={state.sfc.script} />
              <SFCBlock label="<style> (CSS)" content={state.sfc.style} />
            </div>
          </div>

          {state.api === 'compare' && (
            <div className="mt-3 grid grid-cols-2 gap-2">
              <div className="rounded-lg border p-2" style={{ borderColor: '#FCD34D', backgroundColor: '#FFFBEB' }}>
                <div className="text-[10px] font-bold text-amber-700">Options API</div>
                <div className="text-[10px] text-amber-900 mt-1">한 기능 = 4곳</div>
                <div className="text-[10px] text-amber-900">큰 컴포넌트 분산</div>
              </div>
              <div className="rounded-lg border p-2" style={{ borderColor: '#4FC08D', backgroundColor: '#ECFDF5' }}>
                <div className="text-[10px] font-bold" style={{ color: '#047857' }}>Composition API</div>
                <div className="text-[10px] mt-1" style={{ color: '#065F46' }}>한 기능 = 1곳</div>
                <div className="text-[10px]" style={{ color: '#065F46' }}>composable 재사용</div>
              </div>
            </div>
          )}

          {state.alert && <AlertBox alert={state.alert} />}
        </div>
      );
    }

    const ALERT_STYLE = {
      info:   { bg: '#ECFDF5', border: '#A7F3D0', text: '#065F46', icon: '💡' },
      warn:   { bg: '#FFFBEB', border: '#FCD34D', text: '#92400E', icon: '⚠️' },
      danger: { bg: '#FEF2F2', border: '#FCA5A5', text: '#991B1B', icon: '🚨' },
      good:   { bg: '#ECFDF5', border: '#4FC08D', text: '#047857', icon: '✅' },
    };

    function AlertBox({ alert }) {
      if (!alert) return null;
      const s = ALERT_STYLE[alert.tone] || ALERT_STYLE.info;
      return (
        <div className="mt-3 rounded-lg border p-2 text-xs flex gap-2" style={{ backgroundColor: s.bg, borderColor: s.border, color: s.text }}>
          <span>{s.icon}</span>
          <span>{alert.text}</span>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'border-l-2 -ml-3 pl-2' : ''}`}
                    style={isHi ? { backgroundColor: 'rgba(79,192,141,0.15)', borderColor: '#4FC08D' } : {}}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen px-4 py-6" style={{ background: 'linear-gradient(135deg, #ECFDF5, #F0FDF4)' }}>
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg text-white font-bold" style={{ backgroundColor: '#4FC08D' }}>V</span>
              <div>
                <h1 className="text-2xl font-bold" style={{ color: '#047857' }}>I-1-1. Vue 3 첫 컴포넌트 — Options vs Composition</h1>
                <p className="text-sm" style={{ color: '#065F46' }}>주방 정리법 비유 — 재료별 서랍 vs 요리별 서랍</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs underline hover:no-underline" style={{ color: '#047857' }}>← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className="h-1.5 flex-1 rounded-full transition" style={{ backgroundColor: i <= stepIdx ? '#4FC08D' : '#A7F3D0' }} />
              ))}
            </div>

            <div className="mb-4 rounded-xl text-white px-5 py-4 shadow" style={{ background: 'linear-gradient(90deg, #047857, #4FC08D)' }}>
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm leading-relaxed opacity-95">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                aria-label="처음으로"
                className="px-3 py-1.5 text-xs rounded border bg-white hover:opacity-80"
                style={{ borderColor: '#4FC08D', color: '#047857' }}
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 text-xs rounded border bg-white hover:opacity-80 disabled:opacity-40"
                style={{ borderColor: '#4FC08D', color: '#047857' }}
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                aria-pressed={playing}
                aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 text-xs rounded font-bold text-white"
                style={{ backgroundColor: playing ? '#047857' : '#4FC08D' }}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                aria-label="다음 단계"
                className="px-3 py-1.5 text-xs rounded border bg-white hover:opacity-80 disabled:opacity-40"
                style={{ borderColor: '#4FC08D', color: '#047857' }}
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] mt-2" style={{ color: '#047857' }}>키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 bg-white px-4 py-3 text-sm" style={{ borderColor: '#4FC08D', color: '#065F46' }}>
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                Vue 3 컴포넌트는 .vue SFC 파일 한 묶음. Options API는 옵션별 분산, Composition API + &lt;script setup&gt;은 기능별 응집. 신규 코드는 Composition + TypeScript 가 표준. 다음 챕터에서는 ref vs reactive 의 선택 기준을 다룬다.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Vue3', 'SFC', 'OptionsAPI', 'CompositionAPI', 'scriptSetup', 'TypeScript', 'composable', 'reactivity'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full border" style={{ backgroundColor: '#ECFDF5', color: '#047857', borderColor: '#A7F3D0' }}>#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs" style={{ color: '#047857' }}>
              <a href="../index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./I-1-2.html" className="underline hover:no-underline">다음: I-1-2 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
