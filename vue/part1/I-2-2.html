<body>
  <div id="root"></div>
  <!-- Vue I-2-2 — watch / watchEffect (비유: CCTV 감시 카메라) -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1. computed vs watch — 같은 듯 다른 둘',
        desc: 'computed = "다른 값에서 새 값을 도출" (순수 함수, 부수 효과 없음). watch = "값이 바뀌면 부수 효과 실행" (네트워크 요청, 로그, localStorage 저장 등). 둘을 헷갈리는 가장 흔한 실수: computed 안에서 API 호출 → 절대 금지. computed는 "계산", watch는 "반응".',
        kind: 'compare',
        timeline: [
          { time: 't=0', event: 'searchKeyword = ""', who: 'state' },
          { time: 't=1', event: '사용자 "vue" 입력', who: 'user', hot: true },
          { time: 't=2', event: 'watch 감지 → API /search?q=vue', who: 'watch', good: true },
          { time: 't=3', event: '결과 도착 → results = [...]', who: 'state' },
        ],
        alert: { tone: 'warn', text: 'computed 안에서 API/localStorage/console.log 같은 부수 효과 금지!' },
        code: {
          lang: 'javascript',
          filename: 'compare.js',
          lines: [
            '// computed vs watch — 역할이 다르다',
            '',
            'import { ref, computed, watch } from "vue"',
            '',
            'const query = ref("")',
            'const results = ref([])',
            '',
            '// ── ❌ 잘못된 예: computed 안에서 부수 효과 ───',
            'const wrongResults = computed(() => {',
            '  console.log("이거 매번 찍히지 않음!")  // 부수 효과 X',
            '  fetch(`/api/search?q=${query.value}`)   // ❌❌❌',
            '    .then(r => r.json())',
            '    .then(data => results.value = data)',
            '  return results.value',
            '})',
            '// 문제: computed 는 getter 함수. 부수 효과 넣으면',
            '//       무한 루프 / 중복 호출 / 추적 망가짐',
            '',
            '// ── ✓ 올바른 예: watch 로 부수 효과 ──────────',
            'watch(query, async (newQ, oldQ) => {',
            '  if (!newQ) return',
            '  const r = await fetch(`/api/search?q=${newQ}`)',
            '  results.value = await r.json()',
            '})',
            '',
            '// ── 정리 ─────────────────────────────────────',
            '// computed: 입력 → 출력 (순수 계산)',
            '// watch:    변경 → 실행 (부수 효과)',
            '//',
            '// 신호:',
            '//   "값을 계산하고 싶다"     → computed',
            '//   "값이 바뀌면 뭘 하고싶다" → watch',
          ],
          highlight: [8, 9, 10, 11, 12, 13, 14, 19, 20, 21, 22, 23, 24, 26, 27, 28, 29, 30, 31, 32],
        },
      },
      {
        title: 'Step 2. watch — 특정 ref 를 감시',
        desc: 'watch(source, callback)는 source(ref/getter/배열)가 변경되면 callback을 실행한다. callback은 (newValue, oldValue)를 받는다. "old 값과 new 값을 비교"해야 할 때 유용. 초기 실행은 안 함(immediate: true 옵션으로 변경 가능). 가장 흔한 용도: 라우트 변경, 폼 검증, debounce 검색.',
        kind: 'watch',
        timeline: [
          { time: 'mount', event: 'watch 등록 (callback 실행 X)', who: 'setup' },
          { time: 't=1', event: 'page = 1 → 2 변경', who: 'user', hot: true },
          { time: 't=2', event: 'callback(2, 1) 호출', who: 'watch', good: true },
          { time: 't=3', event: 'fetchProducts(2) 실행', who: 'side-effect' },
        ],
        alert: { tone: 'info', text: 'watch 는 변경 시점만 잡는다. 마운트 시 한 번 실행하려면 immediate: true.' },
        code: {
          lang: 'javascript',
          filename: 'watch-basic.js',
          lines: [
            'import { ref, watch } from "vue"',
            '',
            'const page = ref(1)',
            'const products = ref([])',
            '',
            '// (1) 단일 ref 감시',
            'watch(page, async (newPage, oldPage) => {',
            '  console.log(`페이지 변경: ${oldPage} → ${newPage}`)',
            '  products.value = await fetchProducts(newPage)',
            '})',
            '',
            '// (2) 여러 ref 동시 감시 (배열)',
            'const category = ref("all")',
            'const sortBy   = ref("price")',
            'watch([category, sortBy], ([newCat, newSort], [oldCat, oldSort]) => {',
            '  console.log("카테고리/정렬 둘 중 하나라도 바뀜")',
            '  refetch(newCat, newSort)',
            '})',
            '',
            '// (3) reactive 객체의 특정 속성',
            'const form = reactive({ name: "", age: 0 })',
            'watch(',
            '  () => form.name,  // ← getter 로 감싸야 함',
            '  (newName) => console.log("이름:", newName),',
            ')',
            '',
            '// (4) deep 옵션 — 객체 내부까지 감시',
            'const profile = ref({ name: "", address: { city: "" } })',
            'watch(profile, () => {',
            '  console.log("프로필 어떤 필드든 변경됨")',
            '}, { deep: true })',
            '',
            '// (5) immediate — 등록 즉시 한 번 실행',
            'watch(page, fetchProducts, { immediate: true })',
            '',
            '// (6) once — 한 번만 실행 (Vue 3.4+)',
            'watch(page, log, { once: true })',
          ],
          highlight: [6, 7, 8, 9, 14, 15, 16, 17, 22, 23, 24, 28, 29, 30, 31, 33, 36],
        },
      },
      {
        title: 'Step 3. watchEffect — 의존성 자동 감지 + 즉시 실행',
        desc: 'watchEffect는 함수를 받아 "함수 안에서 사용된 모든 ref" 를 자동 감지해서 추적한다. 즉시 한 번 실행되고, 의존성이 바뀔 때마다 다시 실행. computed처럼 자동 추적이지만, 값을 반환하지 않고 부수 효과를 수행. "여러 ref를 한 번에 감시 + 마운트 즉시 한 번 실행" 시나리오에 깔끔.',
        kind: 'effect',
        timeline: [
          { time: 'mount', event: 'watchEffect 즉시 실행 → 의존성 등록', who: 'setup', good: true },
          { time: 't=1', event: 'query 변경', who: 'user' },
          { time: 't=2', event: 'watchEffect 재실행', who: 'watch', good: true },
          { time: 't=3', event: 'page 변경', who: 'user' },
          { time: 't=4', event: 'watchEffect 다시 재실행 (query+page 둘 다 의존)', who: 'watch', good: true },
        ],
        alert: { tone: 'good', text: 'watchEffect = 자동 의존성 + 즉시 실행. 여러 ref를 한 번에 감시할 때 깔끔.' },
        code: {
          lang: 'javascript',
          filename: 'watchEffect.js',
          lines: [
            'import { ref, watchEffect } from "vue"',
            '',
            'const query = ref("")',
            'const page  = ref(1)',
            'const results = ref([])',
            '',
            '// watchEffect — 함수 안의 ref 를 자동 추적',
            'watchEffect(async () => {',
            '  // 이 안에서 사용한 query.value, page.value 가 모두 의존성',
            '  if (!query.value) return',
            '  const url = `/api/search?q=${query.value}&page=${page.value}`',
            '  const res = await fetch(url)',
            '  results.value = await res.json()',
            '})',
            '',
            '// 동작:',
            '//   - 마운트 즉시 1회 실행',
            '//   - query 또는 page 가 바뀔 때마다 재실행',
            '//   - 의존성 배열을 우리가 안 적어줘도 됨',
            '',
            '// ── watch vs watchEffect 비교 ─────────────',
            '//',
            '// 항목              | watch                | watchEffect',
            '// 의존성 명시         | 명시 (첫 인자)        | 자동',
            '// 초기 실행           | 안 함 (옵션으로 ON)   | 즉시 실행',
            '// old/new 값 접근     | ✓ (인자로 받음)       | ❌ (없음)',
            '// 조건부 추적         | ✓ 명시한 것만         | 함수 안의 모든 ref',
            '// 적절한 상황         | 특정 변경만 잡고싶다    | 여러 의존성 동시 추적',
            '',
            '// 클린업 — 새 실행 전에 이전 실행 정리',
            'watchEffect((onCleanup) => {',
            '  const controller = new AbortController()',
            '  fetch(`/api/search?q=${query.value}`, { signal: controller.signal })',
            '',
            '  onCleanup(() => controller.abort())  // ← 이전 요청 취소',
            '})',
          ],
          highlight: [7, 8, 9, 10, 11, 12, 13, 14, 16, 17, 18, 22, 23, 24, 25, 26, 31, 32, 33, 34, 35, 36],
        },
      },
      {
        title: 'Step 4. 클린업 (onCleanup) — 이전 실행 취소',
        desc: '검색창에 빠르게 타이핑하면 매 keystroke마다 API 요청이 쏟아진다. 사용자가 "vue ro" → "vue rou" → "vue rout" 입력 시, "vue ro" 응답이 늦게 도착하면 "vue rout" 결과를 덮어쓰는 race condition 발생. 해결: watchEffect의 onCleanup으로 이전 요청 취소(AbortController). watch도 같은 패턴 가능.',
        kind: 'cleanup',
        timeline: [
          { time: 't=1', event: '"vue" 입력 → 요청 A 시작', who: 'user' },
          { time: 't=2', event: '"vue r" 입력 → 요청 A 취소 + 요청 B 시작', who: 'cleanup', good: true },
          { time: 't=3', event: '"vue ro" 입력 → 요청 B 취소 + 요청 C 시작', who: 'cleanup', good: true },
          { time: 't=4', event: '요청 C 응답 도착 → results 갱신', who: 'state', good: true },
        ],
        alert: { tone: 'good', text: 'onCleanup 으로 race condition 방지. 검색/자동완성에서 필수.' },
        code: {
          lang: 'html',
          filename: 'SearchBox.vue',
          lines: [
            '<!-- 검색창 with 클린업 -->',
            '<template>',
            '  <div>',
            '    <input v-model="query" placeholder="검색어" />',
            '    <p v-if="loading">검색 중...</p>',
            '    <ul>',
            '      <li v-for="r in results" :key="r.id">{{ r.title }}</li>',
            '    </ul>',
            '  </div>',
            '</template>',
            '',
            '<script setup>',
            'import { ref, watchEffect } from "vue"',
            '',
            'const query   = ref("")',
            'const results = ref([])',
            'const loading = ref(false)',
            '',
            'watchEffect(async (onCleanup) => {',
            '  if (!query.value) {',
            '    results.value = []',
            '    return',
            '  }',
            '',
            '  // (1) AbortController 로 이전 요청 취소 준비',
            '  const controller = new AbortController()',
            '  onCleanup(() => {',
            '    controller.abort()',
            '    console.log("이전 요청 취소")',
            '  })',
            '',
            '  loading.value = true',
            '  try {',
            '    const res = await fetch(',
            '      `/api/search?q=${query.value}`,',
            '      { signal: controller.signal }',
            '    )',
            '    results.value = await res.json()',
            '  } catch (e) {',
            '    if (e.name !== "AbortError") throw e',
            '  } finally {',
            '    loading.value = false',
            '  }',
            '})',
            '<\/script>',
            '',
            '<!-- 효과:',
            '  사용자가 빠르게 타이핑해도 마지막 입력의 결과만 화면에 표시.',
            '  race condition (늦은 응답이 최신 결과 덮어쓰기) 방지. -->',
          ],
          highlight: [13, 19, 25, 26, 27, 28, 29, 33, 34, 35, 36, 39, 40, 41, 42, 43, 44, 47, 48, 49, 50, 51],
        },
      },
      {
        title: 'Step 5. 결정 트리 — computed / watch / watchEffect',
        desc: '실무 결정 트리. (1) 값을 반환하고 싶다 → computed. (2) 특정 값이 바뀐 순간만 잡고싶다 (+ old 값 필요) → watch. (3) 여러 값을 한 번에 + 초기 1회 실행 → watchEffect. (4) ref를 안 쓰는 cleanup 만 등록 → onBeforeUnmount + 일반 함수. 이 4가지 분기만 외워도 90% 결정 가능.',
        kind: 'decide',
        timeline: [
          { time: 'Q1', event: '값을 반환?', who: 'YES → computed', good: true },
          { time: 'Q2', event: '특정 값 변경 + old/new 필요?', who: 'YES → watch', good: true },
          { time: 'Q3', event: '여러 값 + 즉시 실행?', who: 'YES → watchEffect', good: true },
          { time: 'Q4', event: '컴포넌트 정리 only?', who: 'onBeforeUnmount', good: true },
        ],
        alert: { tone: 'good', text: '계산 = computed, 한 값 변경 잡기 = watch, 여러 값 + 즉시 = watchEffect.' },
        code: {
          lang: 'javascript',
          filename: 'decide.js',
          lines: [
            '// 결정 트리 — computed / watch / watchEffect',
            '',
            '// (1) 단순 파생값 → computed',
            'const fullName = computed(() => `${first.value} ${last.value}`)',
            '',
            '// (2) 라우트 변경 시 데이터 다시 가져오기 → watch',
            'import { useRoute } from "vue-router"',
            'const route = useRoute()',
            'watch(',
            '  () => route.params.id,',
            '  async (newId) => { product.value = await fetchProduct(newId) },',
            '  { immediate: true },',
            ')',
            '',
            '// (3) 폼 자동 저장 (여러 필드 + 즉시) → watchEffect',
            'const form = reactive({ title: "", body: "" })',
            'watchEffect(() => {',
            '  localStorage.setItem("draft", JSON.stringify(form))',
            '})',
            '',
            '// (4) 외부 리소스 정리만 → onBeforeUnmount',
            'import { onBeforeUnmount } from "vue"',
            'const timer = setInterval(tick, 1000)',
            'onBeforeUnmount(() => clearInterval(timer))',
            '',
            '// ── 흔한 안티패턴 ─────────────────────────',
            '',
            '// ❌ computed 안에서 fetch',
            'const x = computed(() => fetch("/api").then(r => r.json()))',
            '',
            '// ❌ watchEffect 가 너무 많은 일을 함',
            'watchEffect(() => {',
            '  // 100줄짜리 거대 로직 → 작은 watch 여러 개로 쪼개기',
            '})',
            '',
            '// ❌ watch 에서 의존성 안 잡힘',
            'watch(form.name, log)  // form.name 은 값이라 추적 안 됨',
            '// 해결: watch(() => form.name, log)',
            '',
            '// ✓ 적정 크기 + getter 사용 + 명확한 책임',
          ],
          highlight: [3, 4, 6, 7, 8, 9, 10, 11, 12, 13, 15, 16, 17, 18, 19, 21, 22, 23, 24, 28, 29, 31, 32, 33, 34, 36, 37, 38],
        },
      },
    ];

    const KIND_BADGE = {
      compare: { label: 'computed vs watch', color: '#F59E0B' },
      watch:   { label: 'watch()', color: '#4FC08D' },
      effect:  { label: 'watchEffect()', color: '#6366F1' },
      cleanup: { label: 'onCleanup', color: '#0EA5E9' },
      decide:  { label: '결정 트리', color: '#047857' },
    };

    function Timeline({ events }) {
      if (!events) return null;
      return (
        <div className="space-y-1.5">
          {events.map((e, i) => {
            const bg = e.hot ? '#FEF3C7' : e.good ? '#D1FAE5' : '#F9FAFB';
            const border = e.hot ? '#FCD34D' : e.good ? '#4FC08D' : '#E5E7EB';
            return (
              <div key={i} className="flex items-stretch rounded border overflow-hidden" style={{ borderColor: border }}>
                <div className="w-16 px-2 py-1.5 text-[10px] font-bold text-white text-center" style={{ backgroundColor: '#4FC08D' }}>{e.time}</div>
                <div className="flex-1 px-2 py-1.5 text-xs" style={{ backgroundColor: bg, color: '#1F2937' }}>{e.event}</div>
                <div className="w-32 px-2 py-1.5 text-[10px] font-mono text-right" style={{ backgroundColor: '#F3F4F6', color: '#047857' }}>{e.who}</div>
              </div>
            );
          })}
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const badge = KIND_BADGE[state.kind] || KIND_BADGE.watch;
      return (
        <div className="rounded-xl border bg-white p-4 h-full flex flex-col" style={{ borderColor: '#A7F3D0' }}>
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold" style={{ color: '#047857' }}>Vue Reactivity — 타임라인</h3>
            <span className="text-[10px] px-2 py-0.5 rounded text-white" style={{ backgroundColor: badge.color }}>{badge.label}</span>
          </div>
          <div className="rounded-lg border-2 p-3 flex-1" style={{ borderColor: '#4FC08D' }}>
            <div className="text-xs font-bold mb-2" style={{ color: '#047857' }}>📷 CCTV 카메라 — 시간 흐름</div>
            <Timeline events={state.timeline} />
          </div>
          {state.alert && <AlertBox alert={state.alert} />}
        </div>
      );
    }

    const ALERT_STYLE = {
      info:   { bg: '#ECFDF5', border: '#A7F3D0', text: '#065F46', icon: '💡' },
      warn:   { bg: '#FFFBEB', border: '#FCD34D', text: '#92400E', icon: '⚠️' },
      danger: { bg: '#FEF2F2', border: '#FCA5A5', text: '#991B1B', icon: '🚨' },
      good:   { bg: '#ECFDF5', border: '#4FC08D', text: '#047857', icon: '✅' },
    };

    function AlertBox({ alert }) {
      if (!alert) return null;
      const s = ALERT_STYLE[alert.tone] || ALERT_STYLE.info;
      return (
        <div className="mt-3 rounded-lg border p-2 text-xs flex gap-2" style={{ backgroundColor: s.bg, borderColor: s.border, color: s.text }}>
          <span>{s.icon}</span><span>{alert.text}</span>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);
      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();
      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'border-l-2 -ml-3 pl-2' : ''}`} style={isHi ? { backgroundColor: 'rgba(79,192,141,0.15)', borderColor: '#4FC08D' } : {}}>
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span><span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);
      const isLast = stepIdx === STEPS.length - 1;
      return (
        <div className="min-h-screen px-4 py-6" style={{ background: 'linear-gradient(135deg, #ECFDF5, #F0FDF4)' }}>
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg text-white font-bold" style={{ backgroundColor: '#4FC08D' }}>V</span>
              <div>
                <h1 className="text-2xl font-bold" style={{ color: '#047857' }}>I-2-2. watch / watchEffect — 부수 효과 구분</h1>
                <p className="text-sm" style={{ color: '#065F46' }}>CCTV 감시 카메라 — 변화를 보고 액션을 실행</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs underline hover:no-underline" style={{ color: '#047857' }}>← 챕터 목록</a>
            </header>
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (<div key={i} className="h-1.5 flex-1 rounded-full transition" style={{ backgroundColor: i <= stepIdx ? '#4FC08D' : '#A7F3D0' }} />))}
            </div>
            <div className="mb-4 rounded-xl text-white px-5 py-4 shadow" style={{ background: 'linear-gradient(90deg, #047857, #4FC08D)' }}>
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm leading-relaxed opacity-95">{step.desc}</p>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>
            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} aria-label="처음으로" className="px-3 py-1.5 text-xs rounded border bg-white hover:opacity-80" style={{ borderColor: '#4FC08D', color: '#047857' }}>처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 text-xs rounded border bg-white hover:opacity-80 disabled:opacity-40" style={{ borderColor: '#4FC08D', color: '#047857' }}>← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'} className="px-4 py-1.5 text-xs rounded font-bold text-white" style={{ backgroundColor: playing ? '#047857' : '#4FC08D' }}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} aria-label="다음 단계" className="px-3 py-1.5 text-xs rounded border bg-white hover:opacity-80 disabled:opacity-40" style={{ borderColor: '#4FC08D', color: '#047857' }}>다음 →</button>
            </div>
            <div className="text-center text-[10px] mt-2" style={{ color: '#047857' }}>키보드 ←/→ · 자동재생 3초/단계</div>
            {isLast && (
              <div className="mt-5 rounded-lg border-2 bg-white px-4 py-3 text-sm" style={{ borderColor: '#4FC08D', color: '#065F46' }}>
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                computed = 순수 계산. watch = 한 값 변경 + old/new. watchEffect = 여러 값 + 즉시 실행 + 자동 추적. 클린업으로 race 방지. 다음 챕터부터 컴포넌트 통신 패턴(II)으로 들어간다.
              </div>
            )}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['watch', 'watchEffect', 'sideEffect', 'cleanup', 'AbortController', 'race', 'reactivity'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full border" style={{ backgroundColor: '#ECFDF5', color: '#047857', borderColor: '#A7F3D0' }}>#{k}</span>
              ))}
            </div>
            <nav className="mt-6 flex items-center justify-between text-xs" style={{ color: '#047857' }}>
              <a href="./I-2-1.html" className="underline hover:no-underline">← 이전: I-2-1</a>
              <a href="../part2/II-1-1.html" className="underline hover:no-underline">다음: II-1-1 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
