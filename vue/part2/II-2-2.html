            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1; const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'border-l-2 -ml-3 pl-2' : ''}`} style={isHi ? { backgroundColor: 'rgba(79,192,141,0.15)', borderColor: '#4FC08D' } : {}}>
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span><span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];
      useEffect(() => {
        const onKey = (e) => { if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1)); else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1)); };
        window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey);
      }, []);
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => { setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; }); }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);
      const isLast = stepIdx === STEPS.length - 1;
      return (
        <div className="min-h-screen px-4 py-6" style={{ background: 'linear-gradient(135deg, #ECFDF5, #F0FDF4)' }}>
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg text-white font-bold" style={{ backgroundColor: '#4FC08D' }}>V</span>
              <div>
                <h1 className="text-2xl font-bold" style={{ color: '#047857' }}>II-2-2. provide / inject — 의존성 주입</h1>
                <p className="text-sm" style={{ color: '#065F46' }}>회사 사내 방송 — 깊이 무관 직통 통신</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs underline hover:no-underline" style={{ color: '#047857' }}>← 챕터 목록</a>
            </header>
            <div className="mb-4 flex gap-1.5">{STEPS.map((_, i) => (<div key={i} className="h-1.5 flex-1 rounded-full transition" style={{ backgroundColor: i <= stepIdx ? '#4FC08D' : '#A7F3D0' }} />))}</div>
            <div className="mb-4 rounded-xl text-white px-5 py-4 shadow" style={{ background: 'linear-gradient(90deg, #047857, #4FC08D)' }}>
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm leading-relaxed opacity-95">{step.desc}</p>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>
            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} aria-label="처음으로" className="px-3 py-1.5 text-xs rounded border bg-white hover:opacity-80" style={{ borderColor: '#4FC08D', color: '#047857' }}>처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 text-xs rounded border bg-white hover:opacity-80 disabled:opacity-40" style={{ borderColor: '#4FC08D', color: '#047857' }}>← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'} className="px-4 py-1.5 text-xs rounded font-bold text-white" style={{ backgroundColor: playing ? '#047857' : '#4FC08D' }}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} aria-label="다음 단계" className="px-3 py-1.5 text-xs rounded border bg-white hover:opacity-80 disabled:opacity-40" style={{ borderColor: '#4FC08D', color: '#047857' }}>다음 →</button>
            </div>
            <div className="text-center text-[10px] mt-2" style={{ color: '#047857' }}>키보드 ←/→ · 자동재생 3초/단계</div>
            {isLast && (<div className="mt-5 rounded-lg border-2 bg-white px-4 py-3 text-sm" style={{ borderColor: '#4FC08D', color: '#065F46' }}><div className="font-bold mb-1">✅ 핵심 정리</div>provide/inject = 트리 내 의존성 주입. props drilling 해결. Symbol + InjectionKey = 안전. 큰 도메인은 Pinia. 다음 챕터부터 Pinia 시작.</div>)}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">{['provide', 'inject', 'DI', 'propsDrilling', 'Symbol', 'InjectionKey', 'TypeScript'].map((k) => (<span key={k} className="px-2 py-0.5 rounded-full border" style={{ backgroundColor: '#ECFDF5', color: '#047857', borderColor: '#A7F3D0' }}>#{k}</span>))}</div>
            <nav className="mt-6 flex items-center justify-between text-xs" style={{ color: '#047857' }}>
              <a href="./II-2-1.html" className="underline hover:no-underline">← 이전: II-2-1</a>
              <a href="../part3/III-1-1.html" className="underline hover:no-underline">다음: III-1-1 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
