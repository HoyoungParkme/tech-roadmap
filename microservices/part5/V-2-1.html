            '|:--|:--|:--|:--|',
            '| Distributed Monolith | Bounded Context 재정의 | API 계약 안정화 | DDD, Pact, OpenAPI |',
            '| Chatty | Batch API | BFF + 캐시 | gRPC, Redis, GraphQL |',
            '| Cascading | Timeout + 서킷브레이커 | Bulkhead + Async | resilience4j, Istio |',
            '| Shared DB | Owner 명시 | DB 분리 + 이벤트 | Outbox, Debezium |',
            '',
            '## 6단계 리팩토링 로드맵',
            '',
            '### Stage 1 — 진단 (1-2주)',
            '- 서비스 의존성 그래프 (Kiali, OTel)',
            '- 배포 빈도/리드타임 측정',
            '- DB 직접 접근 SQL 감사',
            '- 영향 사고 history 정리',
            '',
            '### Stage 2 — 응급 처방 (1개월)',
            '- 모든 외부 호출에 timeout',
            '- 깊은 동기 체인 → 서킷브레이커',
            '- N+1 RPC 핫스팟 → Batch',
            '',
            '### Stage 3 — DB 정리 (2-3개월)',
            '- 테이블 별 owner 지정',
            '- 외부 서비스 SELECT → API 전환',
            '- 점진적 권한 분리',
            '',
            '### Stage 4 — API 계약 (병행)',
            '- OpenAPI/Protobuf 표준화',
            '- consumer-driven contract test',
            '- breaking change 정책',
            '',
            '### Stage 5 — Async (3-4개월)',
            '- 비핵심 동작은 이벤트로',
            '- Outbox + Kafka',
            '- Saga 가 필요한 곳 식별',
            '',
            '### Stage 6 — 회복 점검 (지속)',
            '- 카오스 엔지니어링 도입',
            '- Game Day 정례화',
            '- 회고 → 자동화 보강',
            '',
            '## 측정 지표 (DORA)',
            '- Deployment Frequency',
            '- Lead Time for Changes',
            '- Mean Time to Restore (MTTR)',
            '- Change Failure Rate',
            '',
            '## 다음 챕터',
            '> V-2-2 운영 출항 체크리스트 — 48 항목',
            '> 4개 축으로 정리한 MSA 마지막 점검표',
          ],
          highlight: [3, 4, 5, 6, 7, 8, 9, 12, 13, 14, 15, 16, 17, 19, 20, 21, 22, 23, 25, 26, 27, 28, 30, 31, 32, 33, 35, 36, 37, 38, 40, 41, 42, 43, 45, 46, 47, 48, 49, 51, 52, 53],
        },
      },
    ];

    const TONE = {
      good:   { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-800', badge: 'bg-emerald-200 text-emerald-800' },
      warn:   { bg: 'bg-amber-50',    border: 'border-amber-400',   text: 'text-amber-800',   badge: 'bg-amber-200 text-amber-800' },
      danger: { bg: 'bg-rose-50',     border: 'border-rose-400',    text: 'text-rose-800',    badge: 'bg-rose-200 text-rose-800' },
    };

    function DiagnosisCard({ label, value, tone }) {
      const colors = {
        good:   'bg-emerald-50 border-emerald-300 text-emerald-900',
        warn:   'bg-amber-50 border-amber-300 text-amber-900',
        danger: 'bg-rose-50 border-rose-300 text-rose-900',
        info:   'bg-cyan-50 border-cyan-300 text-cyan-900',
      };
      return (
        <div className={`rounded-lg border px-3 py-2 ${colors[tone] || colors.info}`}>
          <div className="text-[10px] opacity-80 mb-0.5">{label}</div>
          <div className="text-xs leading-snug">{value}</div>
        </div>
      );
    }

    function PatternBox({ scenario }) {
      const map = {
        'distributed-monolith': (
          <div className="text-xs">
            <div className="grid grid-cols-3 gap-1 mb-1">
              <div className="rounded bg-rose-200 border border-rose-400 px-2 py-1 text-center font-mono">svc-A</div>
              <div className="rounded bg-rose-200 border border-rose-400 px-2 py-1 text-center font-mono">svc-B</div>
              <div className="rounded bg-rose-200 border border-rose-400 px-2 py-1 text-center font-mono">svc-C</div>
            </div>
            <div className="text-center text-rose-700 mb-1">↓ ↓ ↓ 같은 DB</div>
            <div className="rounded bg-rose-100 border-2 border-rose-500 px-3 py-1 text-center font-mono">shared DB + 함께 배포</div>
          </div>
        ),
        'chatty': (
          <div className="text-xs space-y-1">
            <div className="flex items-center gap-1">
              <span className="rounded bg-cyan-700 text-white px-2 py-1 font-mono">BFF</span>
              <span className="text-cyan-700">×100</span>
              <span className="rounded bg-rose-500 text-white px-2 py-1 font-mono">catalog</span>
            </div>
            <div className="text-rose-700">총 100 호출 × 30ms = 3 초</div>
          </div>
        ),
        'storm': (
          <div className="text-xs">
            <div className="flex items-center gap-1 mb-1">
              <span className="rounded bg-cyan-100 border border-cyan-300 px-2 py-1 font-mono">checkout</span>
              <span className="text-rose-600">→</span>
              <span className="rounded bg-cyan-200 border border-cyan-400 px-2 py-1 font-mono">orders</span>
              <span className="text-rose-600">→</span>
              <span className="rounded bg-amber-300 border border-amber-500 px-2 py-1 font-mono">payments</span>
              <span className="text-rose-600">→</span>
              <span className="rounded bg-rose-500 text-white px-2 py-1 font-mono animate-pulse">kakaopay 💀</span>
            </div>
            <div className="text-rose-700">위쪽 전부 timeout → 5XX 폭주</div>
          </div>
        ),
        'shared-db': (
          <div className="text-xs">
            <div className="grid grid-cols-2 gap-1 mb-1">
              <div className="rounded bg-cyan-100 border border-cyan-300 px-2 py-1 text-center font-mono">orders</div>
              <div className="rounded bg-cyan-100 border border-cyan-300 px-2 py-1 text-center font-mono">inventory</div>
            </div>
            <div className="text-center text-rose-700 mb-1">↓ SELECT/UPDATE 같은 테이블</div>
            <div className="rounded bg-rose-100 border-2 border-rose-500 px-3 py-1 text-center font-mono">products 테이블 (공유)</div>
          </div>
        ),
        'fix-all': (
          <div className="text-xs space-y-1">
            <div className="rounded bg-emerald-50 border border-emerald-300 px-2 py-1">① 도메인 재분석 (DDD)</div>
            <div className="rounded bg-emerald-50 border border-emerald-300 px-2 py-1">② DB 분리 + 이벤트 동기화</div>
            <div className="rounded bg-emerald-50 border border-emerald-300 px-2 py-1">③ API 계약 + 회복 정책</div>
            <div className="rounded bg-emerald-50 border border-emerald-300 px-2 py-1">④ Async / Batch / 캐시</div>
          </div>
        ),
      };
      return map[scenario] || null;
    }

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-cyan-400 bg-white p-3">
          <div className="text-sm font-bold text-cyan-800 mb-2">📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-cyan-600 border-b border-cyan-200">
                <th className="py-1 pr-2">우선순위</th><th className="py-1 pr-2">Before</th><th className="py-1 pr-2">After</th><th className="py-1">의미</th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-cyan-50">
                  <td className="py-1 pr-2 font-medium text-cyan-800">{r.metric}</td>
                  <td className="py-1 pr-2 text-rose-700 font-mono">{r.before}</td>
                  <td className="py-1 pr-2 text-emerald-700 font-mono">{r.after}</td>
                  <td className="py-1 text-cyan-900 font-bold">{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.warn;
      return (
        <div className="rounded-xl border border-cyan-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-cyan-800">안티패턴 진단</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          <div className="space-y-2 mb-3">
            <DiagnosisCard label="🩺 증상" value={state.symptom} tone={state.verdictTone} />
            <DiagnosisCard label="🧬 원인" value={state.cause} tone="warn" />
            <DiagnosisCard label="💊 처방" value={state.fix} tone="good" />
          </div>

          <div className="rounded-lg bg-gradient-to-br from-cyan-50 to-sky-50 border border-cyan-200 p-3">
            <div className="text-[10px] text-cyan-700 mb-1.5">구조 모형</div>
            <PatternBox scenario={state.scenario} />
          </div>

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs text-cyan-900 bg-cyan-100 border border-cyan-300 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-cyan-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-cyan-800 border-b border-cyan-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-cyan-100 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-cyan-200">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-zinc-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-cyan-500/25 border-l-2 border-cyan-300 -ml-3 pl-2' : ''}`}>
                    <span className="text-zinc-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-cyan-800 border-t border-cyan-700 flex items-center justify-between text-[10px] text-cyan-200">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-cyan-50 to-sky-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg text-white font-bold" style={{ backgroundColor: '#0e7490' }}>M</span>
              <div>
                <h1 className="text-2xl font-bold text-cyan-900">Chapter V-2-1. MSA 안티패턴</h1>
                <p className="text-sm text-cyan-800/80">Distributed Monolith → Chatty → Cascading → Shared DB → 해결 패턴</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-cyan-800 underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-cyan-700' : 'bg-cyan-100'}`} />
              ))}
            </div>

            <div className="mb-4 rounded-xl text-cyan-50 px-5 py-4 shadow" style={{ backgroundColor: '#0e7490' }}>
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-cyan-50/95 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} aria-label="처음으로" className="px-3 py-1.5 text-xs rounded border border-cyan-300 bg-white text-cyan-700 hover:bg-cyan-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 text-xs rounded border border-cyan-300 bg-white text-cyan-700 hover:bg-cyan-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'} className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-cyan-900 text-white' : 'bg-cyan-700 text-white hover:bg-cyan-800'}`}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} aria-label="다음 단계" className="px-3 py-1.5 text-xs rounded border border-cyan-300 bg-white text-cyan-700 hover:bg-cyan-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-cyan-700 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-cyan-400 bg-white px-4 py-3 text-sm text-cyan-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                MSA 안티패턴 4대장 — Distributed Monolith, Chatty, Cascading, Shared DB. 모두 "분리만 했지 결합은 그대로" 가 본질. 해결은 도메인 재분석부터 시작해 DB 분리, API 계약, Async/회복 정책, 캐시·BFF 까지 단계적으로.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Distributed Monolith', 'Chatty', 'Cascading', 'Shared DB', 'Strangler Fig'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-cyan-100 text-cyan-800 border border-cyan-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-cyan-800">
              <a href="./V-1-2.html" className="underline hover:no-underline">← 이전: V-1-2 카오스</a>
              <a href="./V-2-2.html" className="underline hover:no-underline">다음: V-2-2 체크리스트 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
