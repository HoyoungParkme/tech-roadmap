            '| 45-48 | 모범 사례. 자동화 확장 |',
            '',
            '## 분기별 행동 권고',
            '',
            '### 점수 ≤ 30 — 위기 모드',
            '1. timeout 없는 호출 전부 찾아 추가',
            '2. shared DB 직접 접근 차단',
            '3. SLO 1개라도 측정 시작',
            '4. on-call runbook 1장 작성',
            '',
            '### 31-39 — 안정화',
            '1. 분산 트레이싱 (OTel) 도입',
            '2. 배포 전략 Rolling → Canary',
            '3. multi-burn-rate 알람',
            '4. consumer-driven contract test',
            '',
            '### 40+ — 진화',
            '1. 카오스 엔지니어링 분기 1회',
            '2. Game Day 정례화',
            '3. DR/region failover 실습',
            '4. Operator 패턴으로 운영 자동화',
            '',
            '## 4축 균형이 중요',
            '- 한 축만 강하면 다른 축에서 사고',
            '- 운영만 잘하고 경계가 흐리면 → 모래성',
            '- 경계만 좋고 운영 없으면 → 24시간 깨지는 장난감',
            '- 모든 축을 7/12 이상 유지 권장',
            '',
            '## 마지막 조언',
            '> MSA 는 모놀리스를 N 개로 나누는 것이 아니라',
            '> "독립 진화하는 시스템들의 협업" 을 만드는 것.',
            '> 도구가 아니라 조직·도메인·운영 문화의 문제.',
            '> 진짜 무기는 "측정 + 자동화 + 회고".',
            '',
            '## 끝',
            '🎉 Microservices 커리큘럼 20개 학습 완료!',
            '   I (기초) → II (통신) → III (데이터) → IV (배포/운영) → V (모니터링/안정성)',
            '',
            '   다음은 실전 프로젝트로 적용하면서 이 체크리스트를 분기별 회고에 사용한다.',
          ],
          highlight: [3, 4, 5, 6, 7, 8, 9, 10, 13, 14, 15, 16, 17, 18, 19, 21, 22, 23, 24, 25, 27, 28, 29, 30, 31, 33, 34, 35, 36, 37, 39, 40, 41, 42, 43, 45, 46, 47],
        },
      },
    ];

    const TONE = {
      good:   { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-800', badge: 'bg-emerald-200 text-emerald-800' },
      warn:   { bg: 'bg-amber-50',    border: 'border-amber-400',   text: 'text-amber-800',   badge: 'bg-amber-200 text-amber-800' },
      danger: { bg: 'bg-rose-50',     border: 'border-rose-400',    text: 'text-rose-800',    badge: 'bg-rose-200 text-rose-800' },
    };

    function ChecklistCard({ axisKey, score, items, active }) {
      const axis = AXES[axisKey];
      const max = axis.items.length;
      const tone = score >= 9 ? 'emerald' : score >= 5 ? 'amber' : 'rose';
      return (
        <div className={`rounded-lg border p-3 ${active ? 'border-cyan-500 ring-2 ring-cyan-300 bg-white' : 'border-cyan-200 bg-cyan-50'}`}>
          <div className="flex justify-between items-center mb-2">
            <span className="text-xs font-bold text-cyan-800">{axis.title}</span>
            <span className={`text-xs font-mono font-bold text-${tone}-700`}>{score}/{max}</span>
          </div>
          <div className="h-2 bg-cyan-100 rounded overflow-hidden mb-2">
            <div className={`h-full bg-${tone}-500`} style={{ width: `${(score / max) * 100}%` }} />
          </div>
          {active && items && (
            <ul className="text-[10px] text-cyan-900 space-y-0.5 max-h-44 overflow-auto pr-1">
              {items.slice(0, 6).map((it, i) => (
                <li key={i} className="flex gap-1.5">
                  <span className={i < score ? 'text-emerald-600' : 'text-cyan-300'}>{i < score ? '✓' : '○'}</span>
                  <span className={i < score ? '' : 'opacity-60'}>{it}</span>
                </li>
              ))}
              {items.length > 6 && (
                <li className="text-cyan-600 italic">... +{items.length - 6} more</li>
              )}
            </ul>
          )}
        </div>
      );
    }

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-cyan-400 bg-white p-3">
          <div className="text-sm font-bold text-cyan-800 mb-2">📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-cyan-600 border-b border-cyan-200">
                <th className="py-1 pr-2">축</th><th className="py-1 pr-2">Before</th><th className="py-1 pr-2">After</th><th className="py-1">등급</th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-cyan-50">
                  <td className="py-1 pr-2 font-medium text-cyan-800">{r.metric}</td>
                  <td className="py-1 pr-2 text-rose-700 font-mono">{r.before}</td>
                  <td className="py-1 pr-2 text-emerald-700 font-mono">{r.after}</td>
                  <td className="py-1 text-cyan-900 font-bold">{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.warn;
      const total = state.scores.boundaries + state.scores.communication + state.scores.data + state.scores.operations;
      return (
        <div className="rounded-xl border border-cyan-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-cyan-800">MSA 4축 × 12 = 48 점검</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          <div className="grid grid-cols-2 gap-2">
            <ChecklistCard axisKey="boundaries"    score={state.scores.boundaries}    items={AXES.boundaries.items}    active={state.axis === 'boundaries'} />
            <ChecklistCard axisKey="communication" score={state.scores.communication} items={AXES.communication.items} active={state.axis === 'communication'} />
            <ChecklistCard axisKey="data"          score={state.scores.data}          items={AXES.data.items}          active={state.axis === 'data'} />
            <ChecklistCard axisKey="operations"    score={state.scores.operations}    items={AXES.operations.items}    active={state.axis === 'operations'} />
          </div>

          <div className="mt-3 rounded-lg bg-gradient-to-br from-cyan-50 to-sky-50 border border-cyan-200 p-3">
            <div className="flex justify-between text-xs mb-1">
              <span className="text-cyan-800 font-bold">종합 점수</span>
              <span className="font-mono font-bold text-cyan-900">{total}/48</span>
            </div>
            <div className="h-3 bg-white rounded overflow-hidden border border-cyan-200">
              <div className={`h-full ${total >= 40 ? 'bg-emerald-500' : total >= 30 ? 'bg-cyan-500' : total >= 20 ? 'bg-amber-500' : 'bg-rose-500'}`} style={{ width: `${(total / 48) * 100}%` }} />
            </div>
            <div className="mt-1 text-[10px] text-cyan-700 text-right">
              {total >= 45 ? '🏆 모범' : total >= 40 ? '✨ 성숙' : total >= 30 ? '✅ 운영 가능' : total >= 20 ? '⚠️ 시작 단계' : '🚧 위기'}
            </div>
          </div>

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs text-cyan-900 bg-cyan-100 border border-cyan-300 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-cyan-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-cyan-800 border-b border-cyan-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-cyan-100 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-cyan-200">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-zinc-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-cyan-500/25 border-l-2 border-cyan-300 -ml-3 pl-2' : ''}`}>
                    <span className="text-zinc-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-cyan-800 border-t border-cyan-700 flex items-center justify-between text-[10px] text-cyan-200">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-cyan-50 to-sky-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg text-white font-bold" style={{ backgroundColor: '#0e7490' }}>M</span>
              <div>
                <h1 className="text-2xl font-bold text-cyan-900">Chapter V-2-2. 운영 출항 체크리스트 (48)</h1>
                <p className="text-sm text-cyan-800/80">경계 → 통신 → 데이터 → 운영 → 종합 채점</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-cyan-800 underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-cyan-700' : 'bg-cyan-100'}`} />
              ))}
            </div>

            <div className="mb-4 rounded-xl text-cyan-50 px-5 py-4 shadow" style={{ backgroundColor: '#0e7490' }}>
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-cyan-50/95 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} className="px-3 py-1.5 text-xs rounded border border-cyan-300 bg-white text-cyan-700 hover:bg-cyan-50" aria-label="처음으로">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} className="px-3 py-1.5 text-xs rounded border border-cyan-300 bg-white text-cyan-700 hover:bg-cyan-50 disabled:opacity-40" aria-label="이전 단계">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-cyan-900 text-white' : 'bg-cyan-700 text-white hover:bg-cyan-800'}`} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} className="px-3 py-1.5 text-xs rounded border border-cyan-300 bg-white text-cyan-700 hover:bg-cyan-50 disabled:opacity-40" aria-label="다음 단계">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-cyan-700 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-cyan-400 bg-white px-4 py-3 text-sm text-cyan-900">
                <div className="font-bold mb-1">🎉 Microservices 커리큘럼 20개 학습 완료</div>
                4축 × 12 = 48 점검표를 분기별 회고에 사용하면 MSA 가 시간이 갈수록 성숙해진다. 도구가 아니라 측정·자동화·회고 문화가 진짜 무기.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Checklist', 'Boundaries', 'Communication', 'Data', 'Operations', 'DORA'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-cyan-100 text-cyan-800 border border-cyan-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-cyan-800">
              <a href="./V-2-1.html" className="underline hover:no-underline">← 이전: V-2-1 안티패턴</a>
              <a href="../index.html" className="underline hover:no-underline">챕터 목록</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
