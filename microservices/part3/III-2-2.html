      },
    ];

    const TONE = {
      good:   { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-800', badge: 'bg-emerald-200 text-emerald-800' },
      warn:   { bg: 'bg-amber-50',    border: 'border-amber-400',   text: 'text-amber-800',   badge: 'bg-amber-200 text-amber-800' },
      danger: { bg: 'bg-rose-50',     border: 'border-rose-400',    text: 'text-rose-800',    badge: 'bg-rose-200 text-rose-800' },
    };

    function Bar({ label, value, max, color }) {
      const pct = Math.min(100, (value / max) * 100);
      return (
        <div className="mb-1.5">
          <div className="flex justify-between text-[10px] text-cyan-800">
            <span>{label}</span>
            <span className="font-mono font-bold">{value}</span>
          </div>
          <div className="h-2 bg-white/70 border border-cyan-200 rounded overflow-hidden">
            <div className={`h-full ${color}`} style={{ width: `${pct}%` }} />
          </div>
        </div>
      );
    }

    function CQRSDiagram({ scenario }) {
      // 시각화: 쓰기 → DB ← 읽기 (구조 변화)
      if (scenario === 'shared') {
        return (
          <div className="flex flex-col items-center gap-2 py-3">
            <div className="flex gap-2">
              <span className="px-3 py-1.5 rounded bg-cyan-700 text-white text-xs">Write 1.5K/s</span>
              <span className="px-3 py-1.5 rounded bg-cyan-500 text-white text-xs">Read 12K/s</span>
            </div>
            <span className="text-cyan-700">↓</span>
            <div className="px-4 py-2 rounded-lg bg-rose-100 border-2 border-rose-400 text-rose-800 font-mono text-sm animate-pulse">
              🗃 single DB (overloaded)
            </div>
          </div>
        );
      }
      if (scenario === 'split-code') {
        return (
          <div className="flex flex-col items-center gap-2 py-3">
            <div className="flex gap-2">
              <span className="px-3 py-1.5 rounded bg-cyan-700 text-white text-xs">CommandHandler</span>
              <span className="px-3 py-1.5 rounded bg-cyan-500 text-white text-xs">QueryHandler</span>
            </div>
            <span className="text-cyan-700">↓</span>
            <div className="px-4 py-2 rounded-lg bg-amber-100 border-2 border-amber-400 text-amber-800 font-mono text-sm">
              🗃 same DB (책임 분리)
            </div>
          </div>
        );
      }
      if (scenario === 'replica') {
        return (
          <div className="flex flex-col items-center gap-2 py-3">
            <div className="flex gap-6">
              <div className="flex flex-col items-center gap-1">
                <span className="px-3 py-1 rounded bg-cyan-700 text-white text-xs">Write</span>
                <span className="text-cyan-700">↓</span>
                <span className="px-3 py-1.5 rounded bg-cyan-100 border-2 border-cyan-400 text-cyan-800 font-mono text-xs">Primary DB</span>
              </div>
              <span className="text-cyan-700 self-center text-lg">⤳</span>
              <div className="flex flex-col items-center gap-1">
                <span className="px-3 py-1 rounded bg-cyan-500 text-white text-xs">Read</span>
                <span className="text-cyan-700">↓</span>
                <div className="flex flex-col gap-1">
                  <span className="px-3 py-1 rounded bg-emerald-100 border border-emerald-400 text-emerald-800 text-xs">Replica</span>
                  <span className="px-3 py-1 rounded bg-emerald-100 border border-emerald-400 text-emerald-800 text-xs">MV / ES</span>
                </div>
              </div>
            </div>
          </div>
        );
      }
      if (scenario === 'eventual') {
        return (
          <div className="flex flex-col gap-2 py-3 text-xs font-mono">
            <div className="flex items-center gap-2"><span className="px-2 py-1 rounded bg-cyan-700 text-white">t=0ms</span><span>POST /orders → 200</span></div>
            <div className="flex items-center gap-2"><span className="px-2 py-1 rounded bg-rose-500 text-white">t=50ms</span><span>GET /orders → 빈 배열 (lag)</span></div>
            <div className="flex items-center gap-2"><span className="px-2 py-1 rounded bg-emerald-600 text-white">t=350ms</span><span>GET /orders → 새 주문 OK</span></div>
            <div className="text-[10px] text-cyan-700 mt-1">→ RYOW 패턴으로 보완</div>
          </div>
        );
      }
      // pitfalls
      return (
        <div className="grid grid-cols-2 gap-2 py-2 text-xs">
          <div className="rounded bg-emerald-50 border border-emerald-300 p-2">
            <div className="font-bold text-emerald-800 mb-1">✅ 적용 OK</div>
            <ul className="list-disc list-inside text-emerald-900 space-y-0.5">
              <li>read &gt;&gt; write</li>
              <li>다양한 read 모양</li>
              <li>대규모 트래픽</li>
            </ul>
          </div>
          <div className="rounded bg-rose-50 border border-rose-300 p-2">
            <div className="font-bold text-rose-800 mb-1">❌ 적용 NO</div>
            <ul className="list-disc list-inside text-rose-900 space-y-0.5">
              <li>단순 CRUD</li>
              <li>강한 일관성 필수</li>
              <li>운영 인력 부족</li>
            </ul>
          </div>
        </div>
      );
    }

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-cyan-400 bg-white p-3">
          <div className="text-sm font-bold text-cyan-800 mb-2">📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-cyan-600 border-b border-cyan-200">
                <th className="py-1 pr-2">지표</th><th className="py-1 pr-2">Before</th><th className="py-1 pr-2">After</th><th className="py-1">변화</th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-cyan-50">
                  <td className="py-1 pr-2 font-medium text-cyan-800">{r.metric}</td>
                  <td className="py-1 pr-2 text-rose-700 font-mono">{r.before}</td>
                  <td className="py-1 pr-2 text-emerald-700 font-mono">{r.after}</td>
                  <td className="py-1 text-cyan-900 font-bold">{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.warn;
      return (
        <div className="rounded-xl border border-cyan-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-cyan-800">CQRS 트래픽 모형</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          <div className="rounded-lg bg-cyan-50 border border-cyan-200 p-3">
            <Bar label="쓰기 QPS"     value={state.writeQps}    max={15000} color="bg-cyan-700" />
            <Bar label="읽기 QPS"     value={state.readQps}     max={15000} color="bg-cyan-500" />
            <Bar label="읽기 P95(ms)" value={state.readLatency} max={1000}  color={state.readLatency > 200 ? 'bg-rose-500' : 'bg-emerald-500'} />
            {state.replicaLag !== undefined && (
              <Bar label="복제 지연(ms)" value={state.replicaLag} max={1000} color="bg-amber-500" />
            )}
          </div>

          <div className="mt-3 rounded-lg bg-gradient-to-br from-cyan-50 to-sky-50 border border-cyan-200">
            <CQRSDiagram scenario={state.scenario} />
          </div>

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs text-cyan-900 bg-cyan-100 border border-cyan-300 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-cyan-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-cyan-800 border-b border-cyan-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-cyan-100 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-cyan-200">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-zinc-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-cyan-500/25 border-l-2 border-cyan-300 -ml-3 pl-2' : ''}`}>
                    <span className="text-zinc-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-cyan-800 border-t border-cyan-700 flex items-center justify-between text-[10px] text-cyan-200">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-cyan-50 to-sky-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg text-white font-bold" style={{ backgroundColor: '#0e7490' }}>M</span>
              <div>
                <h1 className="text-2xl font-bold text-cyan-900">Chapter III-2-2. CQRS — 읽기/쓰기 분리</h1>
                <p className="text-sm text-cyan-800/80">공유 모델 → 핸들러 분리 → Replica + MV → Eventual Consistency → 함정</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-cyan-800 underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-cyan-700' : 'bg-cyan-100'}`} />
              ))}
            </div>

            <div className="mb-4 rounded-xl text-cyan-50 px-5 py-4 shadow" style={{ backgroundColor: '#0e7490' }}>
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-cyan-50/95 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} aria-label="처음으로" className="px-3 py-1.5 text-xs rounded border border-cyan-300 bg-white text-cyan-700 hover:bg-cyan-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 text-xs rounded border border-cyan-300 bg-white text-cyan-700 hover:bg-cyan-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'} className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-cyan-900 text-white' : 'bg-cyan-700 text-white hover:bg-cyan-800'}`}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} aria-label="다음 단계" className="px-3 py-1.5 text-xs rounded border border-cyan-300 bg-white text-cyan-700 hover:bg-cyan-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-cyan-700 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-cyan-400 bg-white px-4 py-3 text-sm text-cyan-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                CQRS = "쓰기와 읽기는 책임이 다르다" 는 인정. 코드 분리 → Replica → Materialized View → 별도 store 순으로 단계적 도입. 그 대가로 Eventual Consistency 를 받아들이고, 강한 일관성이 꼭 필요한 곳에는 절대 적용하지 않는다.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['CQRS', 'Command', 'Query', 'Read Replica', 'Materialized View', 'Eventual'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-cyan-100 text-cyan-800 border border-cyan-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-cyan-800">
              <a href="./III-2-1.html" className="underline hover:no-underline">← 이전: III-2-1 Outbox/ES</a>
              <a href="../part4/IV-1-1.html" className="underline hover:no-underline">다음: IV-1-1 Container + k8s →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
