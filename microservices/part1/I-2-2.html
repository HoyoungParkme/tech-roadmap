        return (
          <div className="mt-2 rounded bg-cyan-50 border border-cyan-200 p-2 text-[10px] font-mono text-cyan-900">
            [Monolith jar] + [payment-service] ← 첫 추출<br/>
            트래픽 1% → 10% → 100% 점진 이동<br/>
            <span className="opacity-70">Strangler Fig 패턴</span>
          </div>
        );
      }
      return null;
    }

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-cyan-400 bg-white p-3">
          <div className="text-sm font-bold text-cyan-900 mb-2">📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-cyan-700 border-b border-cyan-200">
                <th className="py-1 pr-2">측면</th><th className="py-1 pr-2">모놀리스</th><th className="py-1">모듈러</th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-cyan-100">
                  <td className="py-1 pr-2 font-medium text-cyan-900">{r.metric}</td>
                  <td className="py-1 pr-2 text-cyan-900 font-mono text-[10px]">{r.before}</td>
                  <td className="py-1 text-cyan-900 font-mono text-[10px]">{r.after}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.verdictTone] || TONE.warn;
      return (
        <div className="rounded-xl border border-cyan-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-cyan-900">모듈러 모놀리스 구조</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.verdict}</span>
          </div>

          <div className="grid grid-cols-1 gap-2">
            <MetricCard label="모듈 수" value={state.modules} unit="개" max={8} current={state.modules} tone="good" />
            <div className="rounded-lg border bg-cyan-50 border-cyan-300 px-3 py-2">
              <div className="flex justify-between items-baseline mb-1">
                <span className="text-xs text-cyan-800">모듈 간 통신</span>
                <span className="text-xs font-mono font-bold text-cyan-900">{state.crossCalls}</span>
              </div>
            </div>
            <MetricCard label="배포 단위" value={state.deployUnits} unit="개" max={5} current={state.deployUnits} tone="good" />
          </div>

          <ModularDiagram variant={state.diagram} />

          <SummaryTable summary={state.summary} />

          <div className="mt-auto pt-3 text-xs text-cyan-900 bg-cyan-50 border border-cyan-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-cyan-800 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-cyan-900 border-b border-cyan-800">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-cyan-100 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-cyan-200">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-zinc-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-cyan-500/25 border-l-2 border-cyan-300 -ml-3 pl-2' : ''}`}>
                    <span className="text-zinc-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-cyan-900 border-t border-cyan-800 flex items-center justify-between text-[10px] text-cyan-200">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-cyan-50 to-sky-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap" style={{padding:'0.5rem'}}>
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg text-white font-bold" style={{backgroundColor:'#0e7490'}}>M</span>
              <div>
                <h1 className="text-2xl font-bold" style={{color:'#0e7490'}}>Chapter I-2-2. 모듈러 모놀리스</h1>
                <p className="text-sm text-cyan-800/80">한 배포, 명확한 모듈 경계, MSA 전 단계</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-cyan-800 underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className="h-1.5 flex-1 rounded-full transition" style={{backgroundColor: i <= stepIdx ? '#0e7490' : '#cffafe'}} />
              ))}
            </div>

            <div className="mb-4 rounded-xl text-white px-5 py-4 shadow" style={{backgroundColor:'#0e7490'}}>
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-cyan-50 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} className="px-3 py-1.5 text-xs rounded border border-cyan-300 bg-white text-cyan-800 hover:bg-cyan-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} className="px-3 py-1.5 text-xs rounded border border-cyan-300 bg-white text-cyan-800 hover:bg-cyan-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} className="px-4 py-1.5 text-xs rounded font-bold text-white" style={{backgroundColor: playing ? '#155e75' : '#0e7490'}}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} className="px-3 py-1.5 text-xs rounded border border-cyan-300 bg-white text-cyan-800 hover:bg-cyan-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-cyan-700 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-cyan-400 bg-white px-4 py-3 text-sm text-cyan-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                모듈러 모놀리스 = 한 배포 + 명확한 모듈 경계 + DB schema 분리 + 이벤트 기반. MSA 의 80% 효과를 20% 비용으로. 도메인이 굳고 운영 역량 갖춰지면 Strangler Fig 로 떼어낸다.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Modular Monolith', 'Spring Modulith', 'Schema Separation', 'Strangler Fig', 'ArchUnit'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-cyan-100 text-cyan-900 border border-cyan-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-cyan-800">
              <a href="./I-2-1.html" className="underline hover:no-underline">← 이전: I-2-1</a>
              <a href="../part2/II-1-1.html" className="underline hover:no-underline">다음: II-1-1 Sync vs Async →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
