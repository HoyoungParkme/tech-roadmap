      const t = TONE[state.impactTone] || TONE.warn;
      return (
        <div className="rounded-xl border border-gray-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-gray-800">LLM 운영 함정 시뮬레이션</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.impact}</span>
          </div>

          <div className="grid grid-cols-1 gap-2">
            <div className={`rounded-lg border ${t.bg} ${t.border} px-3 py-2`}>
              <div className="text-xs text-gray-600 mb-1">시나리오</div>
              <div className={`text-sm font-mono font-bold ${t.text}`}>{state.scenario}</div>
            </div>
            <MetricCard label={state.metricLabel} value={state.metric} unit="" tone={state.impactTone} />
          </div>

          <div className="mt-3 rounded-lg bg-gray-50 border border-gray-200 p-3">
            <div className="flex items-center justify-between text-xs font-mono">
              <span className="px-2 py-1 rounded bg-white border border-gray-300">👤 User</span>
              <span className="text-gray-400">→</span>
              <span className="px-2 py-1 rounded bg-gray-700 text-white">🤖 LLM</span>
              <span className="text-gray-400">→</span>
              {state.impactTone === 'good' ? (
                <span className="px-2 py-1 rounded bg-emerald-600 text-white">✅ 안전</span>
              ) : (
                <span className="px-2 py-1 rounded bg-rose-600 text-white animate-pulse">⚠ 사고</span>
              )}
            </div>
          </div>

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs text-gray-800 bg-gray-100 border border-gray-300 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-gray-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-gray-800 border-b border-gray-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-gray-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-gray-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-gray-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-gray-500/25 border-l-2 border-gray-300 -ml-3 pl-2' : ''}`}>
                    <span className="text-gray-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-gray-800 border-t border-gray-700 flex items-center justify-between text-[10px] text-gray-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-gray-50 to-slate-100 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-gray-700 text-white font-bold">L</span>
              <div>
                <h1 className="text-2xl font-bold text-gray-900">Chapter I-1-1. LLM 운영의 함정</h1>
                <p className="text-sm text-gray-700/80">장애 · 비용 · 환각 · Injection — 왜 LLMOps 가 필요한가</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-gray-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-gray-700' : 'bg-gray-200'}`} />
              ))}
            </div>

            <div className="mb-4 rounded-xl bg-gray-800 text-gray-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-gray-200/90 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} className="px-3 py-1.5 text-xs rounded border border-gray-300 bg-white text-gray-700 hover:bg-gray-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} className="px-3 py-1.5 text-xs rounded border border-gray-300 bg-white text-gray-700 hover:bg-gray-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-gray-900 text-white' : 'bg-gray-700 text-white hover:bg-gray-800'}`}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} className="px-3 py-1.5 text-xs rounded border border-gray-300 bg-white text-gray-700 hover:bg-gray-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-gray-600 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-gray-400 bg-white px-4 py-3 text-sm text-gray-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                LLM 은 외부 인프라(장애) · 확률적(환각) · 비싸고(토큰 과금) · 공격당한다(Injection). 이 네 가지를 운영 절차로 묶은 게 LLMOps. Prompt / Eval / Cost / Reliability 4축이 다음 19개 챕터의 뼈대.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Outage', 'Cost', 'Hallucination', 'PromptInjection', 'LLMOps'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-gray-100 text-gray-800 border border-gray-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-gray-700">
              <a href="../index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./I-1-2.html" className="underline hover:no-underline">다음: I-1-2 MLOps vs LLMOps →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
