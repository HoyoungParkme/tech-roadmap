            '## 다음 챕터 예고',
            '> III-1-2 에서 LLM-as-Judge 의 작동 방식과',
            '> rubric / pairwise / 편향 한계를 본다.',
            '',
            '## 핵심 마인드셋',
            '> "BLEU 가 죽었다" 가 아니라 "BLEU 의 자리가 바뀌었다."',
            '> 표면적 단어 일치는 BLEU, 의미적 평가는 LLM-as-Judge.',
            '> 두 가지를 함께 써야 빠르고 정확한 평가가 된다.',
          ],
          highlight: [3, 4, 5, 6, 7, 8, 9, 11, 12, 13, 14, 15, 16, 17, 19, 20, 21, 22, 23, 24, 25, 27, 28, 29, 30, 31, 32, 33, 35, 36, 37, 38, 39, 40, 41],
        },
      },
    ];

    const TONE = {
      good:   { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-800', badge: 'bg-emerald-200 text-emerald-800' },
      warn:   { bg: 'bg-amber-50',    border: 'border-amber-400',   text: 'text-amber-800',   badge: 'bg-amber-200 text-amber-800' },
      danger: { bg: 'bg-rose-50',     border: 'border-rose-400',    text: 'text-rose-800',    badge: 'bg-rose-200 text-rose-800' },
    };

    function InfoCard({ label, value, tone }) {
      const t = TONE[tone] || TONE.warn;
      return (
        <div className={`rounded-lg border ${t.bg} ${t.border} px-3 py-2`}>
          <div className="text-xs text-gray-600 mb-1">{label}</div>
          <div className={`text-sm font-mono font-bold ${t.text}`}>{value}</div>
        </div>
      );
    }

    function SummaryTable({ summary }) {
      if (!summary) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-gray-400 bg-white p-3">
          <div className="text-sm font-bold text-gray-800 mb-2">📊 {summary.title}</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-left text-gray-500 border-b border-gray-200">
                <th className="py-1 pr-2">지표</th><th className="py-1 pr-2">BLEU/ROUGE</th><th className="py-1 pr-2">LLM-judge</th><th className="py-1">변화</th>
              </tr>
            </thead>
            <tbody>
              {summary.rows.map((r, i) => (
                <tr key={i} className="border-b border-gray-100">
                  <td className="py-1 pr-2 font-medium text-gray-700">{r.metric}</td>
                  <td className="py-1 pr-2 text-rose-700 font-mono">{r.before}</td>
                  <td className="py-1 pr-2 text-emerald-700 font-mono">{r.after}</td>
                  <td className="py-1 text-gray-800 font-bold">{r.delta}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const t = TONE[state.toneTag] || TONE.warn;
      return (
        <div className="rounded-xl border border-gray-300 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-gray-800">{state.metric} 시뮬레이션</h3>
            <span className={`text-[10px] px-2 py-0.5 rounded ${t.badge}`}>{state.score}</span>
          </div>

          <div className="grid grid-cols-1 gap-2">
            <InfoCard label="Reference (정답)" value={state.reference} tone="warn" />
            <InfoCard label="Candidate (답)" value={state.candidate} tone={state.toneTag} />
            <InfoCard label="점수" value={state.score} tone={state.toneTag} />
          </div>

          <div className="mt-3 rounded-lg bg-gray-50 border border-gray-200 p-3">
            <div className="flex items-center justify-between text-xs font-mono">
              <span className="px-2 py-1 rounded bg-white border border-gray-300">📝 Cand</span>
              <span className="text-gray-400">↔</span>
              <span className="px-2 py-1 rounded bg-gray-700 text-white">📐 {state.metric}</span>
              <span className="text-gray-400">↔</span>
              <span className="px-2 py-1 rounded bg-white border border-gray-300">✏️ Ref</span>
            </div>
          </div>

          <SummaryTable summary={state.summary} />

          <div className="mt-3 text-xs text-gray-800 bg-gray-100 border border-gray-300 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-gray-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-gray-800 border-b border-gray-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-gray-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-gray-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-gray-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div key={i} className={`flex ${isHi ? 'bg-gray-500/25 border-l-2 border-gray-300 -ml-3 pl-2' : ''}`}>
                    <span className="text-gray-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span className="flex-1" dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }} />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-gray-800 border-t border-gray-700 flex items-center justify-between text-[10px] text-gray-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => { if (i >= STEPS.length - 1) { setPlaying(false); return i; } return i + 1; });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-gray-50 to-slate-100 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-gray-700 text-white font-bold">L</span>
              <div>
                <h1 className="text-2xl font-bold text-gray-900">Chapter III-1-1. BLEU/ROUGE 한계</h1>
                <p className="text-sm text-gray-700/80">전통 자동 평가 — 왜 LLM 시대에 부족한가</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-gray-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div key={i} className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-gray-700' : 'bg-gray-200'}`} />
              ))}
            </div>

            <div className="mb-4 rounded-xl bg-gray-800 text-gray-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-gray-200/90 leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            <div className="mt-5 flex items-center justify-center gap-2">
              <button onClick={() => setStepIdx(0)} aria-label="처음으로" className="px-3 py-1.5 text-xs rounded border border-gray-300 bg-white text-gray-700 hover:bg-gray-50">처음</button>
              <button onClick={() => setStepIdx((i) => Math.max(0, i - 1))} disabled={stepIdx === 0} aria-label="이전 단계" className="px-3 py-1.5 text-xs rounded border border-gray-300 bg-white text-gray-700 hover:bg-gray-50 disabled:opacity-40">← 이전</button>
              <button onClick={() => { if (isLast) setStepIdx(0); setPlaying((p) => !p); }} aria-pressed={playing} aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'} className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-gray-900 text-white' : 'bg-gray-700 text-white hover:bg-gray-800'}`}>{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))} disabled={isLast} aria-label="다음 단계" className="px-3 py-1.5 text-xs rounded border border-gray-300 bg-white text-gray-700 hover:bg-gray-50 disabled:opacity-40">다음 →</button>
            </div>
            <div className="text-center text-[10px] text-gray-600 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-gray-400 bg-white px-4 py-3 text-sm text-gray-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                BLEU/ROUGE 는 n-gram 매칭. paraphrase / 사실 검증 / 다양한 정답 처리 못 한다. 인간 평가와 상관도 0.3 수준. LLM 시대엔 LLM-as-Judge 같은 의미 기반 평가가 표준.
              </div>
            )}

            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['BLEU', 'ROUGE', 'NGram', 'Paraphrase', 'HumanCorr'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-gray-100 text-gray-800 border border-gray-300">#{k}</span>
              ))}
            </div>

            <nav className="mt-6 flex items-center justify-between text-xs text-gray-700">
              <a href="../part2/II-2-2.html" className="underline hover:no-underline">← II-2-2 Prompt Injection 방어</a>
              <a href="./III-1-2.html" className="underline hover:no-underline">다음: III-1-2 LLM-as-Judge →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
