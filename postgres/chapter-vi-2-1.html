<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — VI-2-1. 전자상거래 스키마 설계</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    PostgreSQL Chapter VI-2-1 — 전자상거래 스키마 설계
    학습 목표: users, products, orders, order_items 테이블을 설계하고 외래키로 연결할 수 있다.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { label: 'users', desc: '[Step 1: users 테이블] 회원 정보를 담는 테이블. UUID를 기본키로 사용해 외부 노출에 안전하다. 이메일은 UNIQUE 제약으로 중복을 방지한다.',
        phase: 'users', highlight: ['users'],
        sql: "CREATE TABLE users (\n  id         UUID PRIMARY KEY\n               DEFAULT gen_random_uuid(),\n  email      TEXT NOT NULL UNIQUE,\n  name       TEXT NOT NULL,\n  created_at TIMESTAMPTZ DEFAULT NOW()\n);" },
      { label: 'products', desc: '[Step 2: products 테이블] 상품 목록. SERIAL 기본키로 자동 증가 정수를 사용한다. CHECK 제약으로 가격이 0 이상, 재고가 0 이상임을 보장한다.',
        phase: 'products', highlight: ['products'],
        sql: "CREATE TABLE products (\n  id         SERIAL PRIMARY KEY,\n  name       TEXT NOT NULL,\n  price      INT  NOT NULL CHECK (price >= 0),\n  stock      INT  NOT NULL DEFAULT 0\n               CHECK (stock >= 0),\n  created_at TIMESTAMPTZ DEFAULT NOW()\n);" },
      { label: 'orders', desc: '[Step 3: orders 테이블] 주문 헤더. user_id 외래키로 users와 1:N 관계를 만든다. 한 회원이 여러 주문을 할 수 있다.',
        phase: 'orders', highlight: ['users', 'orders'],
        sql: "CREATE TABLE orders (\n  id         SERIAL PRIMARY KEY,\n  user_id    UUID NOT NULL\n               REFERENCES users(id),\n  status     TEXT NOT NULL\n               DEFAULT 'pending',\n  ordered_at TIMESTAMPTZ DEFAULT NOW()\n);" },
      { label: 'order_items', desc: '[Step 4: order_items 테이블] 주문 상세. orders와 1:N, products와 N:1 관계를 맺어 M:N(다대다)을 표현하는 중간 테이블 역할을 한다.',
        phase: 'order_items', highlight: ['orders', 'order_items', 'products'],
        sql: "CREATE TABLE order_items (\n  id         SERIAL PRIMARY KEY,\n  order_id   INT NOT NULL\n               REFERENCES orders(id),\n  product_id INT NOT NULL\n               REFERENCES products(id),\n  quantity   INT NOT NULL\n               CHECK (quantity > 0),\n  unit_price INT NOT NULL\n);" },
      { label: 'ERD 전체', desc: '[Step 5: ERD 전체 관계] 네 테이블이 외래키로 연결된 전체 구조. users ──< orders ──< order_items >── products. 이 패턴이 전자상거래 스키마의 표준 구조다.',
        phase: 'erd', highlight: ['users', 'orders', 'order_items', 'products'],
        sql: "-- 전체 관계 요약\n-- users ──< orders ──< order_items >── products\n--  (1:N)           (1:N)         (N:1)\n\n-- JOIN으로 주문 상세 조회\nSELECT u.name, p.name AS product,\n       oi.quantity, oi.unit_price\nFROM users u\nJOIN orders o ON o.user_id = u.id\nJOIN order_items oi ON oi.order_id = o.id\nJOIN products p ON p.id = oi.product_id;" },
      { label: 'UUID vs SERIAL', desc: '[Step 6: UUID vs SERIAL 비교] UUID는 외부 노출에 안전하고 분산 환경에 적합하다. SERIAL은 단순하고 JOIN/인덱스 효율이 높다. 용도에 따라 혼합 사용한다.',
        phase: 'compare', highlight: [],
        sql: null }
    ];

    const TABLES = {
      users: { name: 'users', color: 'blue', cols: ['id (UUID, PK)', 'email (UNIQUE)', 'name', 'created_at'] },
      products: { name: 'products', color: 'emerald', cols: ['id (SERIAL, PK)', 'name', 'price (CHECK>=0)', 'stock (CHECK>=0)'] },
      orders: { name: 'orders', color: 'violet', cols: ['id (SERIAL, PK)', 'user_id (FK→users)', 'status', 'ordered_at'] },
      order_items: { name: 'order_items', color: 'amber', cols: ['id (SERIAL, PK)', 'order_id (FK→orders)', 'product_id (FK→products)', 'quantity', 'unit_price'] }
    };

    function TableCard({ table, active }) {
      const colorMap = {
        blue: { bg: active ? 'bg-blue-50' : 'bg-slate-50', border: active ? 'border-blue-400' : 'border-slate-200', header: 'bg-blue-600', text: active ? 'text-blue-700' : 'text-slate-400' },
        emerald: { bg: active ? 'bg-emerald-50' : 'bg-slate-50', border: active ? 'border-emerald-400' : 'border-slate-200', header: 'bg-emerald-600', text: active ? 'text-emerald-700' : 'text-slate-400' },
        violet: { bg: active ? 'bg-violet-50' : 'bg-slate-50', border: active ? 'border-violet-400' : 'border-slate-200', header: 'bg-violet-600', text: active ? 'text-violet-700' : 'text-slate-400' },
        amber: { bg: active ? 'bg-amber-50' : 'bg-slate-50', border: active ? 'border-amber-400' : 'border-slate-200', header: 'bg-amber-600', text: active ? 'text-amber-700' : 'text-slate-400' }
      };
      const c = colorMap[table.color];
      return (
        <div className={`rounded-lg border-2 overflow-hidden transition-all duration-500 ${c.bg} ${c.border} ${active ? 'scale-[1.03]' : 'opacity-60'}`}>
          <div className={`px-3 py-1.5 ${c.header} text-white text-xs font-bold`}>{table.name}</div>
          <div className="p-2 space-y-0.5">
            {table.cols.map((col, i) => (
              <div key={i} className={`text-xs font-mono ${c.text} ${col.includes('PK') || col.includes('FK') ? 'font-bold' : ''}`}>{col}</div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 5000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const hlSet = new Set(stepData.highlight);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">VI-2-1. 전자상거래 스키마 설계</h1>
              </div>
              <p className="text-slate-600"><b>users · products · orders · order_items</b> 네 테이블의 구조와 외래키 연결을 단계별로 확인합니다.</p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 min-h-[110px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[400px] flex flex-col justify-center">
                  <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">
                    {stepData.phase === 'compare' ? 'UUID vs SERIAL 비교' : 'SQL 코드'}
                  </div>

                  {stepData.sql && (
                    <div className="bg-slate-800 rounded-lg p-4 font-mono text-sm text-slate-200 leading-relaxed whitespace-pre-wrap overflow-x-auto">{stepData.sql}</div>
                  )}

                  {stepData.phase === 'compare' && (
                    <div className="overflow-hidden rounded-lg border border-slate-200">
                      <table className="w-full text-xs">
                        <thead><tr className="bg-slate-700 text-white">
                          <th className="p-2 text-left">항목</th>
                          <th className="p-2 text-center bg-blue-600">UUID</th>
                          <th className="p-2 text-center bg-emerald-600">SERIAL</th>
                        </tr></thead>
                        <tbody>
                          {[
                            ['형태', '128비트 문자열', '자동 증가 정수'],
                            ['크기', '16바이트', '4바이트'],
                            ['외부 노출', '안전 (추측 불가)', '위험 (순차 공격)'],
                            ['분산 환경', '충돌 없음', '서버 간 조율 필요'],
                            ['인덱스 효율', '상대적 낮음', '높음'],
                            ['적합한 용도', '외부 API, 분산 시스템', '내부 ID, 단일 DB']
                          ].map(([label, uuid, serial], i) => (
                            <tr key={i} className="border-t">
                              <td className="p-2 font-bold text-slate-500">{label}</td>
                              <td className="p-2 text-center bg-blue-50">{uuid}</td>
                              <td className="p-2 text-center bg-emerald-50">{serial}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button aria-label={isPlaying?'자동 재생 정지':'자동 재생 시작'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                    </button>
                    <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex gap-1">{STEPS.map((s,i)=>(<button key={i} aria-label={`Step ${i+1}: ${s.label}`} onClick={()=>{setCurrentStepIdx(i);setIsPlaying(false);}} className={`w-2.5 h-2.5 rounded-full transition-all ${i===currentStepIdx?'bg-blue-600 scale-125':i<currentStepIdx?'bg-blue-300':'bg-slate-200'}`}/>))}</div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">{currentStepIdx+1} / {STEPS.length}</div>
                  </div>
                </div>
              </div>

              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-white flex flex-col">
                  <div className="flex items-center px-4 py-3 bg-slate-100 border-b border-slate-200 gap-2">
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-500 font-semibold">ERD — 테이블 관계도</span>
                  </div>
                  <div className="p-4 overflow-y-auto flex-1">
                    <div className="grid grid-cols-2 gap-3 mb-4">
                      {Object.values(TABLES).map(table => (
                        <TableCard key={table.name} table={table} active={hlSet.has(table.name) || hlSet.size === 0} />
                      ))}
                    </div>

                    <div className="space-y-2 mt-3">
                      {[
                        { from: 'users', to: 'orders', rel: '1:N', desc: '한 회원 → 여러 주문', active: hlSet.has('users') && hlSet.has('orders') },
                        { from: 'orders', to: 'order_items', rel: '1:N', desc: '한 주문 → 여러 상품 줄', active: hlSet.has('orders') && hlSet.has('order_items') },
                        { from: 'products', to: 'order_items', rel: '1:N', desc: '한 상품 → 여러 주문에 포함', active: hlSet.has('products') && hlSet.has('order_items') }
                      ].map((link, i) => (
                        <div key={i} className={`flex items-center gap-2 p-2 rounded-lg border text-xs transition-all duration-500 ${link.active ? 'border-blue-400 bg-blue-50' : 'border-slate-200 bg-slate-50'}`}>
                          <span className={`font-mono font-bold ${link.active ? 'text-blue-700' : 'text-slate-400'}`}>{link.from}</span>
                          <span className="text-slate-400">──{link.rel}──&gt;</span>
                          <span className={`font-mono font-bold ${link.active ? 'text-blue-700' : 'text-slate-400'}`}>{link.to}</span>
                          <span className="text-slate-500 ml-auto">{link.desc}</span>
                        </div>
                      ))}
                    </div>

                    {stepData.phase === 'erd' && (
                      <div className="mt-3 p-3 bg-violet-50 border-2 border-violet-300 rounded-lg text-xs text-violet-700 font-bold text-center">
                        M:N 관계 = order_items가 orders와 products 사이의 중간 테이블
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
