            "-- FK: 회원별 주문 목록 (가장 자주 쓰는 쿼리)",
            '--   SELECT * FROM orders WHERE user_id = ?',
            'CREATE INDEX idx_orders_user_id ON orders(user_id);',
            '',
            '-- 시간 역순 (최근 주문 N건 페이징)',
            '--   SELECT * FROM orders ORDER BY created_at DESC LIMIT 20',
            'CREATE INDEX idx_orders_created_at ON orders(created_at DESC);',
            '',
            "-- 상태별 조회 (대시보드: 결제 대기 / 배송 중)",
            "--   대부분의 주문은 'done' 이므로 부분 인덱스가 효율적",
            'CREATE INDEX idx_orders_status_active ON orders(status)',
            "  WHERE status IN ('placed','paid','shipped');",
            '',
            "-- 복합: 회원의 최근 주문 (한 번에 user_id + 시간 정렬)",
            'CREATE INDEX idx_orders_user_recent',
            '  ON orders(user_id, created_at DESC);',
            '',
            '-- ───────────────────────────────────────────',
            '-- order_items 테이블',
            '-- ───────────────────────────────────────────',
            '',
            "-- (order_id, product_id) 는 PRIMARY KEY 라 자동 인덱스 있음",
            "-- 하지만 product_id 단독 검색은 자동 인덱스가 없다",
            '--   "이 상품이 몇 번 팔렸나" → product_id 로 역방향 조회',
            'CREATE INDEX idx_items_product_id ON order_items(product_id);',
            '',
            '-- ───────────────────────────────────────────',
            '-- payments 테이블',
            '-- ───────────────────────────────────────────',
            '',
            "-- order_id 는 UNIQUE 제약으로 자동 인덱스 있음",
            "-- 결제 방법별 통계가 자주라면",
            'CREATE INDEX idx_payments_method ON payments(method);',
            '',
            '-- 일자별 매출 집계',
            "--   SELECT date_trunc('day', paid_at), sum(amount) ...",
            'CREATE INDEX idx_payments_paid_at ON payments(paid_at);',
            '',
            '-- ───────────────────────────────────────────',
            '-- products 테이블',
            '-- ───────────────────────────────────────────',
            '',
            "-- 상품명 부분 일치 검색 (LIKE 'name%')",
            "--   ILIKE 도 지원하려면 trigram 확장 별도 필요",
            'CREATE INDEX idx_products_name ON products(name);',
            '',
            '-- ───────────────────────────────────────────',
            '-- 인덱스 추가 시 항상 EXPLAIN ANALYZE 로 검증하라.',
            '-- 무조건 많이 만들지 마라 — INSERT/UPDATE 가 느려진다.',
            '-- ───────────────────────────────────────────',
          ],
          highlight: [11, 12, 13, 15, 16, 17, 19, 20, 21, 22, 24, 25, 26, 33, 34, 35, 41, 42, 45, 46, 47, 53, 54, 55],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // ERD SVG 다이어그램
    // ─────────────────────────────────────────────────────
    function ErdDiagram({ visible, relations, highlight }) {
      const visibleSet = new Set(visible || []);
      const highlightSet = new Set(highlight || []);

      // 두 박스의 가까운 변 위 좌표 (간단한 박스 가장자리 클램프)
      const edgePoint = (fromId, toId) => {
        const f = ERD_BOXES[fromId];
        const t = ERD_BOXES[toId];
        const fc = { x: f.x + f.w / 2, y: f.y + f.h / 2 };
        const tc = { x: t.x + t.w / 2, y: t.y + t.h / 2 };
        const dx = tc.x - fc.x;
        const dy = tc.y - fc.y;
        const horiz = Math.abs(dx) > Math.abs(dy);
        let fx, fy, tx, ty;
        if (horiz) {
          fx = dx > 0 ? f.x + f.w : f.x;
          fy = fc.y;
          tx = dx > 0 ? t.x : t.x + t.w;
          ty = tc.y;
        } else {
          fx = fc.x;
          fy = dy > 0 ? f.y + f.h : f.y;
          tx = tc.x;
          ty = dy > 0 ? t.y : t.y + t.h;
        }
        return { fx, fy, tx, ty };
      };

      return (
        <svg viewBox="0 0 480 360" className="w-full h-auto bg-orange-50/40 rounded-lg border border-orange-200">
          <defs>
            <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c" />
            </marker>
          </defs>

          {/* 관계 화살표 */}
          {(relations || []).map((r, i) => {
            if (!visibleSet.has(r.from) || !visibleSet.has(r.to)) return null;
            const { fx, fy, tx, ty } = edgePoint(r.from, r.to);
            const mx = (fx + tx) / 2;
            const my = (fy + ty) / 2;
            return (
              <g key={i}>
                <line
                  x1={fx} y1={fy} x2={tx} y2={ty}
                  stroke="#ea580c" strokeWidth="1.5"
                  markerEnd="url(#arrow-orange)"
                />
                <rect x={mx - 18} y={my - 8} width="36" height="14" rx="3" fill="#fff7ed" stroke="#fb923c" />
                <text x={mx} y={my + 2} textAnchor="middle" fontSize="9" fill="#9a3412" fontWeight="bold">{r.label}</text>
              </g>
            );
          })}

          {/* 엔티티 박스 */}
          {Object.entries(ERD_BOXES).map(([id, b]) => {
            if (!visibleSet.has(id)) return null;
            const hi = highlightSet.has(id);
            return (
              <g key={id}>
                <rect
                  x={b.x} y={b.y} width={b.w} height={b.h} rx="6"
                  fill={hi ? '#fed7aa' : '#ffffff'}
                  stroke={hi ? '#c2410c' : '#fb923c'}
                  strokeWidth={hi ? '2' : '1.5'}
                />
                <rect x={b.x} y={b.y} width={b.w} height="16" rx="6" fill={hi ? '#c2410c' : '#fb923c'} />
                <text x={b.x + b.w / 2} y={b.y + 11} textAnchor="middle" fontSize="9" fontWeight="bold" fill="#fff">
                  {b.label}
                </text>
                {b.cols.map((c, j) => (
                  <text
                    key={j}
                    x={b.x + 6}
                    y={b.y + 28 + j * 10}
                    fontSize="7.5"
                    fill="#9a3412"
                    fontFamily="monospace"
                  >
                    {c}
                  </text>
                ))}
              </g>
            );
          })}

          {/* 빈 상태 안내 */}
          {(!visible || visible.length === 0) && (
            <text x="240" y="180" textAnchor="middle" fontSize="11" fill="#9a3412" opacity="0.6">
              요구사항 분석 단계 — 아직 엔티티가 그려지지 않았다
            </text>
          )}
        </svg>
      );
    }

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — orange 톤
    // ─────────────────────────────────────────────────────
    function BulletList({ items }) {
      if (!items || items.length === 0) return null;
      return (
        <ul className="space-y-1.5 mt-3">
          {items.map((it, i) => (
            <li key={i} className="flex items-start gap-2 text-sm text-orange-900">
              <span className="text-lg leading-tight">{it.icon}</span>
              <span><span className="font-bold">{it.label}</span> — <span className="text-orange-800/80">{it.detail}</span></span>
            </li>
          ))}
        </ul>
      );
    }

    function FinalNote({ note }) {
      if (!note) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-orange-400 bg-gradient-to-br from-orange-50 to-amber-50 p-3 text-sm text-orange-900 font-bold">
          {note}
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-orange-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-orange-800">ERD — 전자상거래 스키마</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 엔티티 다이어그램</span>
          </div>

          <ErdDiagram
            visible={state.visible}
            relations={state.relations}
            highlight={state.highlight}
          />

          <BulletList items={state.bulletList} />
          <FinalNote note={state.finalNote} />

          <div className="mt-3 text-xs text-orange-900 bg-orange-50 border border-orange-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-orange-500/15 border-l-2 border-orange-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-orange-600 text-white font-bold">VI</span>
              <div>
                <h1 className="text-2xl font-bold text-orange-900">Chapter VI-2-1. 전자상거래 스키마 설계</h1>
                <p className="text-sm text-orange-800/80">요구사항 → 엔티티 → 관계 → 컬럼/타입 → 인덱스. 5단계로 완성</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-orange-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-orange-600' : 'bg-orange-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-orange-700 text-orange-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-orange-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-orange-700 text-white' : 'bg-orange-600 text-white hover:bg-orange-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-orange-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-orange-400 bg-white px-4 py-3 text-sm text-orange-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                요구사항 → 엔티티 → 관계 → 컬럼/타입 → 인덱스, 이 5단계는 어떤 도메인에도 그대로 적용된다. 다음 챕터에서는 같은 방식으로 SNS / 게시판 도메인을 설계하면서, 정규화·반정규화의 판단 기준을 배운다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['ERD', '엔티티', '1:N', 'N:M', 'FK', 'CHECK', 'NUMERIC', 'TIMESTAMPTZ', '인덱스', '부분인덱스'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-orange-100 text-orange-800 border border-orange-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-orange-700">
              <a href="./index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./chapter-vi-2-2.html" className="underline hover:no-underline">다음: VI-2-2 SNS 도메인 설계 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
