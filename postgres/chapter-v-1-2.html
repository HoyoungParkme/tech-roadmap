<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — V-1-2. ACID 속성</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    PostgreSQL Chapter V-1-2 — ACID 속성
    학습 목표: ACID의 원자성·일관성·격리성·지속성 각 속성이 어떤 문제를 막는지 설명할 수 있다.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { label: 'ACID 개요', desc: '[Step 1: ACID 개요] ACID는 Atomicity(원자성), Consistency(일관성), Isolation(격리성), Durability(지속성)의 약어다. 신뢰할 수 있는 데이터 처리의 네 가지 보장이다.',
        phase: 'overview', highlight: 'all' },
      { label: 'Atomicity', desc: '[Step 2: 원자성] 트랜잭션 안의 작업은 전부 성공하거나 전부 취소된다. 계좌 이체에서 차감만 되고 추가가 안 되는 상황을 막는다.',
        phase: 'atomicity', highlight: 'A' },
      { label: 'Consistency', desc: '[Step 3: 일관성] 트랜잭션 전후로 데이터베이스는 미리 정의된 제약 조건(CHECK, UNIQUE, FK)을 항상 만족한다. 잔액이 음수가 되는 커밋은 불가능하다.',
        phase: 'consistency', highlight: 'C' },
      { label: 'Isolation 시작', desc: '[Step 4: 격리성 — 세션 A] 격리성은 동시 트랜잭션이 서로 간섭하지 않는 성질이다. 세션 A가 BEGIN 후 UPDATE를 실행하고 아직 COMMIT하지 않았다.',
        phase: 'isolation_a', highlight: 'I',
        sessionA: 'BEGIN;\nUPDATE accounts SET balance = balance - 30000 WHERE id = 1;\n-- 아직 COMMIT 안 함',
        sessionB: 'SELECT balance FROM accounts WHERE id = 1;\n\n-- 결과: 100000 (원래 값)',
        aBalance: 70000, bSees: 100000 },
      { label: 'Isolation 확인', desc: '[Step 5: 격리성 — Read Committed] 세션 B가 같은 행을 조회하면 커밋 전 값(100,000)이 보인다. Read Committed 격리 수준이 더티 리드를 방지한다.',
        phase: 'isolation_b', highlight: 'I',
        sessionA: '-- 세션 A: COMMIT\nCOMMIT;',
        sessionB: '-- 세션 B: 재조회\nSELECT balance FROM accounts WHERE id = 1;\n\n-- 결과: 70000 (커밋 후 값)',
        aBalance: 70000, bSees: 70000 },
      { label: 'Durability', desc: '[Step 6: 지속성] COMMIT된 데이터는 서버 다운, 전원 차단 후에도 손실되지 않는다. PostgreSQL은 WAL(Write-Ahead Log)에 먼저 기록해 장애 복구를 보장한다.',
        phase: 'durability', highlight: 'D' }
    ];

    const ACID_CARDS = [
      { key: 'A', title: '원자성 (Atomicity)', desc: '전부 성공 또는 전부 취소', problem: '절반만 반영되는 상황', color: 'blue' },
      { key: 'C', title: '일관성 (Consistency)', desc: '제약 조건 항상 유지', problem: '잘못된 상태로의 커밋', color: 'emerald' },
      { key: 'I', title: '격리성 (Isolation)', desc: '동시 트랜잭션 간 간섭 차단', problem: '더티 리드, 중복 처리', color: 'violet' },
      { key: 'D', title: '지속성 (Durability)', desc: '커밋 후 장애에도 보존', problem: '장애 후 데이터 손실', color: 'amber' }
    ];

    function AcidCard({ data, active }) {
      const colorClasses = {
        blue: { bg: active ? 'bg-blue-50' : 'bg-slate-50', border: active ? 'border-blue-400' : 'border-slate-200', badge: 'bg-blue-600', text: active ? 'text-blue-700' : 'text-slate-400' },
        emerald: { bg: active ? 'bg-emerald-50' : 'bg-slate-50', border: active ? 'border-emerald-400' : 'border-slate-200', badge: 'bg-emerald-600', text: active ? 'text-emerald-700' : 'text-slate-400' },
        violet: { bg: active ? 'bg-violet-50' : 'bg-slate-50', border: active ? 'border-violet-400' : 'border-slate-200', badge: 'bg-violet-600', text: active ? 'text-violet-700' : 'text-slate-400' },
        amber: { bg: active ? 'bg-amber-50' : 'bg-slate-50', border: active ? 'border-amber-400' : 'border-slate-200', badge: 'bg-amber-600', text: active ? 'text-amber-700' : 'text-slate-400' }
      };
      const c = colorClasses[data.color];
      return (
        <div className={`p-3 rounded-lg border-2 transition-all duration-500 ${c.bg} ${c.border} ${active ? 'scale-[1.02]' : ''}`}>
          <div className="flex items-center gap-2 mb-1">
            <span className={`w-7 h-7 rounded-full text-white font-bold text-sm flex items-center justify-center ${c.badge}`}>{data.key}</span>
            <span className={`text-sm font-bold ${c.text}`}>{data.title}</span>
          </div>
          <div className="text-xs text-slate-600">{data.desc}</div>
          {active && <div className="text-xs text-slate-500 mt-1">막는 문제: {data.problem}</div>}
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 5000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const isIsolation = stepData.phase === 'isolation_a' || stepData.phase === 'isolation_b';

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">V-1-2. ACID 속성</h1>
              </div>
              <p className="text-slate-600"><b>ACID</b> 네 가지 속성이 각각 어떤 문제를 막는지, 격리성을 두 세션 시뮬레이션으로 확인합니다.</p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 min-h-[110px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[400px] flex flex-col justify-center">
                  <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">
                    {isIsolation ? '두 세션 시뮬레이션' : 'ACID 속성'}
                  </div>

                  {!isIsolation && (
                    <div className="grid grid-cols-2 gap-3">
                      {ACID_CARDS.map(card => (
                        <AcidCard key={card.key} data={card} active={stepData.highlight === 'all' || stepData.highlight === card.key} />
                      ))}
                    </div>
                  )}

                  {isIsolation && (
                    <div className="space-y-4">
                      <div className="p-3 bg-blue-50 border-2 border-blue-300 rounded-lg">
                        <div className="text-xs font-bold text-blue-600 mb-2">세션 A (이체 실행자)</div>
                        <div className="bg-slate-800 rounded p-3 font-mono text-xs text-slate-200 whitespace-pre-wrap">{stepData.sessionA}</div>
                      </div>
                      <div className="p-3 bg-violet-50 border-2 border-violet-300 rounded-lg">
                        <div className="text-xs font-bold text-violet-600 mb-2">세션 B (다른 사용자)</div>
                        <div className="bg-slate-800 rounded p-3 font-mono text-xs text-slate-200 whitespace-pre-wrap">{stepData.sessionB}</div>
                      </div>
                      <div className="flex gap-4 text-xs">
                        <div className="flex-1 p-2 bg-blue-50 rounded border border-blue-200 text-center">
                          <div className="text-blue-500 font-bold">A가 보는 잔액</div>
                          <div className="font-mono font-bold text-blue-700">{stepData.aBalance.toLocaleString()}원</div>
                        </div>
                        <div className="flex-1 p-2 bg-violet-50 rounded border border-violet-200 text-center">
                          <div className="text-violet-500 font-bold">B가 보는 잔액</div>
                          <div className="font-mono font-bold text-violet-700">{stepData.bSees.toLocaleString()}원</div>
                        </div>
                      </div>
                    </div>
                  )}

                  {stepData.phase === 'durability' && (
                    <div className="mt-4 p-4 bg-amber-50 border-2 border-amber-300 rounded-lg">
                      <div className="flex items-center gap-3">
                        <div className="w-10 h-10 bg-amber-600 text-white rounded-full flex items-center justify-center font-bold text-lg flex-shrink-0">W</div>
                        <div>
                          <div className="font-bold text-amber-700 text-sm">WAL (Write-Ahead Log)</div>
                          <div className="text-xs text-slate-600">데이터 변경 전에 WAL에 먼저 기록. 장애 후 WAL을 재실행해 커밋 상태로 복원.</div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button aria-label={isPlaying?'자동 재생 정지':'자동 재생 시작'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                    </button>
                    <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex gap-1">{STEPS.map((s,i)=>(<button key={i} aria-label={`Step ${i+1}: ${s.label}`} onClick={()=>{setCurrentStepIdx(i);setIsPlaying(false);}} className={`w-2.5 h-2.5 rounded-full transition-all ${i===currentStepIdx?'bg-blue-600 scale-125':i<currentStepIdx?'bg-blue-300':'bg-slate-200'}`}/>))}</div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">{currentStepIdx+1} / {STEPS.length}</div>
                  </div>
                </div>
              </div>

              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-white flex flex-col">
                  <div className="flex items-center px-4 py-3 bg-slate-100 border-b border-slate-200 gap-2">
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-500 font-semibold">ACID 요약</span>
                  </div>
                  <div className="p-6 overflow-y-auto flex-1 space-y-4">
                    <div className="overflow-hidden rounded-lg border border-slate-200">
                      <table className="w-full text-xs">
                        <thead><tr className="bg-slate-700 text-white">
                          <th className="p-2 text-left">속성</th>
                          <th className="p-2 text-left">보장 내용</th>
                          <th className="p-2 text-left">막는 문제</th>
                        </tr></thead>
                        <tbody>
                          {ACID_CARDS.map((card, i) => {
                            const active = stepData.highlight === 'all' || stepData.highlight === card.key;
                            const rowColors = { A: 'bg-blue-50', C: 'bg-emerald-50', I: 'bg-violet-50', D: 'bg-amber-50' };
                            return (
                              <tr key={i} className={`border-t transition-all duration-300 ${active ? rowColors[card.key] : ''}`}>
                                <td className="p-2 font-bold">{card.key} — {card.title.split('(')[0].trim()}</td>
                                <td className="p-2">{card.desc}</td>
                                <td className="p-2 text-slate-500">{card.problem}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>

                    <div className="p-3 bg-slate-50 rounded-lg border border-slate-200">
                      <div className="text-xs font-bold text-slate-400 mb-2">PostgreSQL 격리 수준</div>
                      <div className="space-y-2">
                        {[
                          { level: 'Read Committed', desc: '기본값. 커밋된 데이터만 읽음. 더티 리드 방지.', active: true },
                          { level: 'Repeatable Read', desc: '트랜잭션 시작 시점의 스냅샷 유지.', active: false },
                          { level: 'Serializable', desc: '가장 강한 격리. 직렬화 실패 가능.', active: false }
                        ].map((item, i) => (
                          <div key={i} className={`p-2 rounded border text-xs ${item.active ? 'bg-violet-50 border-violet-300 text-violet-700 font-bold' : 'bg-white border-slate-200 text-slate-500'}`}>
                            <span className="font-mono">{item.level}</span> — {item.desc}
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
