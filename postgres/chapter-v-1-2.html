              ③ Isolation   : 동시 트랜잭션 서로 영향 없음
              ④ Durability  : COMMIT 후 절대 사라지지 않음 (WAL)

      {
        title: 'Step 5. ACID = 비즈니스 안전망',
        desc: '네 속성 A·C·I·D는 따로 떨어진 기능이 아니라 하나의 약속을 함께 만든다 — "한 번 OK 한 트랜잭션은, 어떤 상황에서도 일관되고, 안전하고, 영원하다". 송금, 결제, 재고 차감, 예약, 회계 — 돈과 신뢰가 걸린 모든 워크로드가 이 위에서 굴러간다. PostgreSQL은 이 ACID 보장을 표준으로 제공하는 대표 RDBMS다. NoSQL 일부는 성능을 위해 일부 속성을 약화하기도 하지만, RDB는 "끝까지 책임지는 데이터"를 위한 선택이다.',
        attrs: { A: 'pass', C: 'pass', I: 'pass', D: 'pass' },
        accounts: [
          { name: 'A 계좌', before: 50000, after: 40000, change: '-10000', status: 'final' },
          { name: 'B 계좌', before: 30000, after: 40000, change: '+10000', status: 'final' },
        ],
        scenario2: {
          kind: 'pass',
          title: '4개 속성이 함께 만드는 보장',
          lines: [
            'A: 절반 실행 없음 — 전부 or 전무',
            'C: 잘못된 데이터 거부 — 항상 유효한 상태',
            'I: 동시 작업 충돌 없음 — 직렬화된 효과',
            'D: COMMIT = 영원 — 정전에도 살아남음',
            '→ 합치면: 어떤 상황에서도 신뢰할 수 있는 데이터',
          ],
        },
        keyPoint: 'ACID는 RDBMS의 약속. 송금·결제·예약 같은 미션 크리티컬 워크로드의 기반.',
        code: {
          lang: 'markdown',
          filename: 'summary.md',
          lines: [
            '# ACID 한눈에 정리',
            '',
            '> "한 번 OK 한 트랜잭션은, 어떤 상황에서도 일관되고, 안전하고, 영원하다."',
            '',
            '## 4가지 속성',
            '',
            '| 속성 | 보장 | 막아주는 사고 | 핵심 도구 |',
            '|:--|:--|:--|:--|',
            '| Atomicity   | 전부 or 전무             | 송금 절반 실행      | BEGIN / COMMIT / ROLLBACK |',
            '| Consistency | 제약 조건 항상 만족      | 잔액 음수, FK 오류  | CHECK, UNIQUE, FK |',
            '| Isolation   | 동시 작업 서로 격리       | Lost Update, Dirty Read | MVCC, 행 잠금, 격리 수준 |',
            '| Durability  | COMMIT 후 영속           | 정전으로 데이터 증발 | WAL + fsync |',
            '',
            '## 송금 시나리오로 본 ACID',
            '',
            '```',
            'BEGIN;',
            '  UPDATE A SET balance = balance - 10000;  -- A: Atomicity (한 덩어리)',
            '  -- CHECK (balance >= 0)                  -- C: Consistency (제약)',
            '  UPDATE B SET balance = balance + 10000;  -- I: Isolation (락으로 다른 세션 차단)',
            'COMMIT;                                    -- D: Durability (WAL fsync 후 OK)',
            '```',
            '',
            '## 언제 중요한가',
            '',
            '- 돈이 오가는 모든 시스템 (송금, 결제, 정산)',
            '- 재고 차감, 좌석/방 예약 (중복 판매 방지)',
            '- 회계, 의료 기록, 법적 증빙 (변조 불가)',
            '- 멀티 단계 워크플로우 (절반 실행 시 일관성 깨짐)',
            '',
            '## 트레이드오프',
            '',
            '- ACID 보장은 공짜가 아니다 (디스크 fsync, 락 대기)',
            '- 단순 캐시·로그·분석 워크로드는 일부 속성을 양보하기도 함',
            '- 그러나 "돈과 신뢰"가 걸린 곳에서는 절대 양보 불가',
            '',
            '## 다음 단원',
            '',
            'V-1-3 에서는 트랜잭션을 SQL 수준에서 실제로 다루는 법',
            '(BEGIN / COMMIT / ROLLBACK / SAVEPOINT)을 본격 학습한다.',
          ],
          highlight: [3, 7, 8, 9, 10, 11, 12, 16, 17, 18, 19, 20, 21, 26, 27, 28, 29],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — orange 톤
    // ─────────────────────────────────────────────────────
    const STATUS_STYLE = {
      idle:   { card: 'bg-slate-50 border-slate-200',    title: 'text-slate-500', icon: 'opacity-40', mark: '' },
      active: { card: 'bg-orange-100 border-orange-400 ring-2 ring-orange-300', title: 'text-orange-900', icon: '', mark: '◉' },
      pass:   { card: 'bg-emerald-50 border-emerald-300', title: 'text-emerald-800', icon: '', mark: '✓' },
      fail:   { card: 'bg-rose-50 border-rose-300',       title: 'text-rose-800',  icon: '',  mark: '✕' },
    };

    function AttrCard({ attr, status }) {
      const s = STATUS_STYLE[status] || STATUS_STYLE.idle;
      return (
        <div className={`rounded-lg border-2 ${s.card} px-3 py-2 transition`}>
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2">
              <span className={`text-xl ${s.icon}`}>{attr.icon}</span>
              <div>
                <div className={`text-xs font-bold ${s.title}`}>{attr.id}. {attr.name}</div>
                <div className="text-[10px] text-slate-600">{attr.ko} · {attr.desc}</div>
              </div>
            </div>
            <span className={`text-lg font-bold ${s.title}`}>{s.mark}</span>
          </div>
        </div>
      );
    }

    function AccountRow({ acc }) {
      const isReject = acc.status === 'reject' || acc.status === 'rollback';
      const color = isReject ? 'text-slate-500' : 'text-orange-800';
      return (
        <div className="flex items-center justify-between text-sm py-1.5 border-b border-orange-100 last:border-0">
          <span className="text-xs font-bold text-orange-900 w-28">{acc.name}</span>
          <span className={`font-mono ${color}`}>{acc.before.toLocaleString()}원</span>
          <span className="text-orange-400 text-xs">→</span>
          <span className={`font-mono font-bold ${color}`}>{acc.after.toLocaleString()}원</span>
          <span className={`text-[10px] px-1.5 py-0.5 rounded ${isReject ? 'bg-slate-200 text-slate-700' : 'bg-orange-200 text-orange-800'}`}>
            {acc.change || '변경없음'}
          </span>
        </div>
      );
    }

    function ScenarioBox({ scenario }) {
      if (!scenario) return null;
      const isFail = scenario.kind === 'fail';
      const wrap = isFail
        ? 'border-rose-300 bg-rose-50'
        : 'border-emerald-300 bg-emerald-50';
      const titleColor = isFail ? 'text-rose-800' : 'text-emerald-800';
      const mark = isFail ? '✕' : '✓';
      const markBg = isFail ? 'bg-rose-500' : 'bg-emerald-500';
      return (
        <div className={`mt-3 rounded-lg border-2 ${wrap} p-3`}>
          <div className="flex items-center gap-2 mb-2">
            <span className={`inline-flex items-center justify-center w-5 h-5 rounded-full ${markBg} text-white text-xs font-bold`}>{mark}</span>
            <span className={`text-xs font-bold ${titleColor}`}>{scenario.title}</span>
          </div>
          <ul className="space-y-1">
            {scenario.lines.map((line, i) => (
              <li key={i} className={`text-xs font-mono ${isFail ? 'text-rose-900' : 'text-emerald-900'}`}>
                {line}
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-orange-200 bg-white p-4 h-full flex flex-col overflow-auto">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-orange-800">ACID 시뮬레이션</h3>
            <span className="text-[10px] text-slate-500">송금: A → B 10,000원</span>
          </div>

          {/* 4개 속성 카드 */}
          <div className="grid grid-cols-2 gap-2 mb-3">
            {ATTRS.map((a) => (
              <AttrCard key={a.id} attr={a} status={state.attrs[a.id]} />
            ))}
          </div>

          {/* 계좌 상태 */}
          {state.accounts && (
            <div className="rounded-lg border border-orange-200 bg-orange-50/50 px-3 py-2">
              <div className="text-[10px] font-bold text-orange-700 mb-1">계좌 상태</div>
              {state.accounts.map((acc, i) => (
                <AccountRow key={i} acc={acc} />
              ))}
            </div>
          )}

          {/* 시나리오 박스 (실패 / 통과) */}
          <ScenarioBox scenario={state.scenario} />
          <ScenarioBox scenario={state.scenario2} />

          {/* 핵심 한 줄 */}
          <div className="mt-3 text-xs text-orange-900 bg-orange-50 border border-orange-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <div className="ml-3 flex gap-1">
              {STEPS.map((s, i) => (
                <span
                  key={i}
                  className={`text-[10px] px-1.5 py-0.5 rounded font-mono ${i === stepIdx ? 'bg-orange-500 text-white' : 'bg-slate-700 text-slate-400'}`}
                >
                  {STEPS[i].code.filename}
                </span>
              ))}
            </div>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-orange-500/15 border-l-2 border-orange-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-orange-600 text-white font-bold">V</span>
              <div>
                <h1 className="text-2xl font-bold text-orange-900">Chapter V-1-2. ACID 속성</h1>
                <p className="text-sm text-orange-800/80">Atomicity · Consistency · Isolation · Durability — 송금으로 체감하는 4가지 보장</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-orange-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-orange-600' : 'bg-orange-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-orange-700 text-orange-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-orange-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-orange-700 text-white' : 'bg-orange-600 text-white hover:bg-orange-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-orange-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-orange-400 bg-white px-4 py-3 text-sm text-orange-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                A·C·I·D 네 속성이 함께 만드는 약속 — "한 번 OK 한 트랜잭션은 어떤 상황에서도 일관되고 안전하고 영원하다". 다음 챕터(V-1-3)에서는 BEGIN/COMMIT/ROLLBACK/SAVEPOINT 를 SQL로 직접 다뤄본다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['ACID', 'Atomicity', 'Consistency', 'Isolation', 'Durability', 'WAL', 'MVCC', 'Transaction'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-orange-100 text-orange-800 border border-orange-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-orange-700">
              <a href="./chapter-v-1-1.html" className="underline hover:no-underline">← 이전: V-1-1 트랜잭션이란</a>
              <a href="./chapter-v-1-3.html" className="underline hover:no-underline">다음: V-1-3 BEGIN/COMMIT/ROLLBACK →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
