<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — III-2-2. 데이터 수정과 삭제</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    PostgreSQL Chapter III-2-2 — 데이터 수정과 삭제
    학습 목표: UPDATE, DELETE, WHERE 절을 올바르게 사용할 수 있다. WHERE 없는 위험을 체험한다.
    조작법: "자동 실행" 버튼으로 재생, 이전/다음 버튼으로 수동 전환.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const INITIAL_ROWS = [
      { id: 1, name: 'Alice', age: 25 },
      { id: 2, name: 'Bob', age: 30 },
      { id: 3, name: 'Carol', age: 22 }
    ];

    const STEPS = [
      { label: '현재 데이터', desc: '[Step 1: 현재 테이블 상태] users 테이블에 Alice(25), Bob(30), Carol(22) 세 명이 있다. 이 데이터를 수정하고 삭제하는 방법을 알아본다.',
        terminal: ['mydb=# SELECT * FROM users;', ' id | name  | age', '----+-------+-----', '  1 | Alice |  25', '  2 | Bob   |  30', '  3 | Carol |  22', '(3 rows)'],
        rows: INITIAL_ROWS, modified: [], danger: false },
      { label: 'SELECT로 확인', desc: '[Step 2: 안전 습관 — 먼저 SELECT로 확인] UPDATE나 DELETE 전에 같은 WHERE 조건으로 SELECT를 먼저 실행해서 영향 받는 행을 눈으로 확인한다.',
        terminal: ["mydb=# SELECT * FROM users WHERE name = 'Alice';", ' id | name  | age', '----+-------+-----', '  1 | Alice |  25', '(1 row)'],
        rows: INITIAL_ROWS, modified: [0], danger: false },
      { label: 'UPDATE', desc: '[Step 3: 안전한 UPDATE] 확인 후 UPDATE를 실행한다. Alice의 나이를 31로 바꾼다. "UPDATE 1"은 1개 행이 수정되었다는 뜻이다.',
        terminal: ["mydb=# UPDATE users SET age = 31 WHERE name = 'Alice';", 'UPDATE 1'],
        rows: [{ id: 1, name: 'Alice', age: 31 }, { id: 2, name: 'Bob', age: 30 }, { id: 3, name: 'Carol', age: 22 }], modified: [0], danger: false },
      { label: 'DELETE', desc: '[Step 4: 안전한 DELETE] Bob(id=2)을 삭제한다. id로 조건을 거는 것이 가장 안전하다. 기본키이므로 정확히 한 행만 가리킨다.',
        terminal: ['mydb=# DELETE FROM users WHERE id = 2;', 'DELETE 1'],
        rows: [{ id: 1, name: 'Alice', age: 31 }, { id: 3, name: 'Carol', age: 22 }], modified: [], danger: false },
      { label: 'WHERE 없는 위험', desc: '[Step 5: 위험! WHERE 없는 UPDATE] WHERE 절 없이 UPDATE를 실행하면 테이블의 모든 행이 영향을 받는다. 모든 사람의 나이가 0이 된다! "WHERE 없는 UPDATE/DELETE는 핵폭탄"이라고 기억하자.',
        terminal: ['mydb=# -- 위험! WHERE 없음!', 'mydb=# UPDATE users SET age = 0;', 'UPDATE 2  ← 모든 행이 수정됨!'],
        rows: [{ id: 1, name: 'Alice', age: 0 }, { id: 3, name: 'Carol', age: 0 }], modified: [0, 1], danger: true },
      { label: '안전한 습관', desc: '[Step 6: 실수 방지 습관 요약] ① 조건을 먼저 SELECT로 확인한다 ② 트랜잭션(BEGIN/COMMIT/ROLLBACK)으로 감싼다. 트랜잭션은 Part V에서 자세히 다룬다.',
        terminal: ['mydb=# BEGIN;', 'BEGIN', "mydb=# UPDATE users SET age = 99 WHERE id = 1;", 'UPDATE 1', 'mydb=# -- 결과 확인 후 문제가 있으면:', 'mydb=# ROLLBACK;', 'ROLLBACK  ← 변경 취소!'],
        rows: [{ id: 1, name: 'Alice', age: 31 }, { id: 3, name: 'Carol', age: 22 }], modified: [], danger: false }
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [typedLines, setTypedLines] = useState([]);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        setTypedLines([]);
        const lines = stepData.terminal;
        const ids = lines.map((_, i) => setTimeout(() => setTypedLines(prev => [...prev, lines[i]]), (i + 1) * 350));
        return () => ids.forEach(clearTimeout);
      }, [currentStepIdx]);

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4500); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">III-2-2. 데이터 수정과 삭제</h1>
              </div>
              <p className="text-slate-600">
                <b>UPDATE</b>와 <b>DELETE</b>는 강력한 만큼 위험합니다. <b>WHERE 없는 UPDATE/DELETE는 핵폭탄</b>입니다.
              </p>
            </header>

            <div className={`${stepData.danger ? 'bg-red-600' : 'bg-blue-700'} text-white p-5 rounded-xl shadow-sm border ${stepData.danger ? 'border-red-800' : 'border-blue-800'} flex flex-col justify-center min-h-[110px] transition-colors duration-500`}>
              <h3 className={`text-xs font-bold mb-2 uppercase tracking-wider ${stepData.danger ? 'text-red-200' : 'text-blue-200'}`}>
                {stepData.danger ? '⚠ 위험!' : '현재 단계'}
              </h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                {/* 터미널 */}
                <div className={`rounded-xl shadow-sm border min-h-[250px] flex flex-col overflow-hidden transition-colors duration-500 ${stepData.danger ? 'bg-red-950 border-red-800' : 'bg-slate-900 border-slate-700'}`}>
                  <div className={`flex items-center px-4 py-2 border-b gap-2 ${stepData.danger ? 'bg-red-900 border-red-800' : 'bg-slate-800 border-slate-700'}`}>
                    <div className="w-3 h-3 rounded-full bg-red-500 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-400 font-mono">psql — mydb</span>
                  </div>
                  <div className="p-4 font-mono text-sm text-emerald-400 flex-1 overflow-y-auto space-y-0.5">
                    {typedLines.map((line, i) => (
                      <div key={`${currentStepIdx}-${i}`} className={`transition-opacity duration-300 ${
                        line.includes('위험') || line.includes('←') ? 'text-red-400 font-bold' :
                        line.startsWith('mydb') ? 'text-white' :
                        line.startsWith('UPDATE') || line.startsWith('DELETE') || line === 'BEGIN' || line.startsWith('ROLLBACK') ? 'text-emerald-300 font-bold' :
                        'text-slate-400'
                      }`}>{line}</div>
                    ))}
                    <div className="animate-pulse text-slate-500">▌</div>
                  </div>
                </div>

                {/* 테이블 상태 */}
                <div className={`p-4 rounded-xl shadow-sm border transition-colors duration-500 ${stepData.danger ? 'bg-red-50 border-red-300' : 'bg-white border-slate-200'}`}>
                  <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">
                    테이블 상태: users {stepData.danger && <span className="text-red-500 ml-2">⚠ 전체 행 영향!</span>}
                  </div>
                  <div className="overflow-x-auto">
                    <table className="w-full text-sm">
                      <thead><tr className="bg-slate-700 text-white">
                        <th className="p-2 text-left">id</th><th className="p-2 text-left">name</th><th className="p-2 text-left">age</th>
                      </tr></thead>
                      <tbody>
                        {stepData.rows.map((r, i) => (
                          <tr key={r.id} className={`border-t transition-all duration-500 ${
                            stepData.danger && stepData.modified.includes(i) ? 'bg-red-100 ring-1 ring-red-400' :
                            stepData.modified.includes(i) ? 'bg-amber-50 ring-1 ring-amber-300' :
                            'bg-white'
                          }`}>
                            <td className="p-2 font-mono text-slate-500">{r.id}</td>
                            <td className="p-2 font-mono">{r.name}</td>
                            <td className={`p-2 font-mono ${stepData.danger && stepData.modified.includes(i) ? 'text-red-600 font-bold' : ''}`}>{r.age}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>

                {/* 컨트롤 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                    </button>
                    <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex gap-1">{STEPS.map((s, i) => (<button key={i} aria-label={`Step ${i+1}: ${s.label}`} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }} className={`w-2.5 h-2.5 rounded-full transition-all ${i === currentStepIdx ? 'bg-blue-600 scale-125' : i < currentStepIdx ? 'bg-blue-300' : 'bg-slate-200'}`} />))}</div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">{currentStepIdx + 1} / {STEPS.length}</div>
                  </div>
                </div>
              </div>

              {/* 오른쪽 패널 */}
              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-white flex flex-col">
                  <div className="flex items-center px-4 py-3 bg-slate-100 border-b border-slate-200 gap-2">
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-500 font-semibold">핵심 개념</span>
                  </div>
                  <div className="p-6 overflow-y-auto flex-1 space-y-4">
                    {[
                      { t: 'UPDATE + WHERE', d: '특정 행의 값을 수정한다. WHERE로 대상 행을 반드시 지정한다.', a: currentStepIdx === 2 },
                      { t: 'DELETE + WHERE', d: '특정 행을 삭제한다. WHERE로 대상 행을 반드시 지정한다.', a: currentStepIdx === 3 },
                      { t: 'WHERE 없는 위험', d: 'WHERE 절 없이 UPDATE/DELETE를 실행하면 테이블의 모든 행이 영향을 받는다. 핵폭탄!', a: currentStepIdx === 4, danger: true },
                      { t: '안전한 습관 ①', d: '수정/삭제 전에 같은 WHERE 조건으로 SELECT를 먼저 실행해 영향 범위를 확인한다.', a: currentStepIdx === 1 || currentStepIdx === 5 },
                      { t: '안전한 습관 ②', d: 'BEGIN으로 트랜잭션을 열고, 결과를 보고 COMMIT 또는 ROLLBACK. Part V에서 상세히.', a: currentStepIdx === 5 }
                    ].map((item, i) => (
                      <div key={i} className={`p-4 rounded-lg border-2 transition-all duration-500 ${
                        item.a && item.danger ? 'border-red-400 bg-red-50 scale-[1.02] shadow-md' :
                        item.a ? 'border-blue-400 bg-blue-50 scale-[1.02] shadow-md' :
                        'border-slate-200 bg-slate-50'
                      }`}>
                        <div className={`text-xs font-bold mb-1 ${
                          item.a && item.danger ? 'text-red-600' :
                          item.a ? 'text-blue-600' : 'text-slate-400'
                        }`}>{item.t}</div>
                        <div className="text-sm text-slate-700">{item.d}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
