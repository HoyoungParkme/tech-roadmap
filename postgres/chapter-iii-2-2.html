<body>
  <div id="root"></div>

  <!--
    PostgreSQL Chapter III-2-2 — 데이터 수정과 삭제
    학습 목표: UPDATE/DELETE 의 안전한 사용. WHERE 누락 시의 위험을 시각적으로 체험한다.
    5단계 시나리오:
      ① UPDATE products SET price=12000 WHERE id=1   → 안전한 단건 수정
      ② UPDATE products SET price=12000              → WHERE 누락! 전체 행 덮어쓰기 (위험)
      ③ DELETE FROM products WHERE id=5              → 안전한 단건 삭제
      ④ DELETE FROM products                         → WHERE 누락! 전체 삭제 (위험)
      ⑤ BEGIN → UPDATE → SELECT 검증 → COMMIT/ROLLBACK → 안전한 패턴
    패턴: fastapi v1 — 좌(LiveDataPane: products 테이블 상태) / 우(VSCode CodeViewer)
    색상: orange (postgres 도메인)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 초기 products 테이블 — 모든 단계의 시각화 기준이 되는 5개 행
    const BASE_ROWS = [
      { id: 1, name: '아메리카노',   price: 4500,  stock: 50 },
      { id: 2, name: '라떼',         price: 5000,  stock: 40 },
      { id: 3, name: '카푸치노',     price: 5500,  stock: 30 },
      { id: 4, name: '에스프레소',   price: 4000,  stock: 25 },
      { id: 5, name: '바닐라라떼',   price: 5800,  stock: 15 },
    ];

    // ─────────────────────────────────────────────────────
    // 5단계 시나리오
    //   pane    : 좌측 LiveDataPane 에 표시할 도메인 상태
    //   rows    : 단계 종료 후의 테이블 상태
    //   touched : 강조 표시할 id 집합 (수정/삭제 대상)
    //   removed : 삭제 표시(취소선)할 id 집합
    //   warn    : ⚠ WHERE 누락 경고 메시지 (있으면 박스 표시)
    //   txnLog  : BEGIN/COMMIT 트랜잭션 단계 로그 (Step 5만 사용)
    //   code    : 우측 CodeViewer 파일 (lang, filename, lines, highlight)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. UPDATE — 한 행만 골라서 수정하기',
        desc: 'products 테이블의 1번 행(아메리카노) 가격을 4500원 → 12000원으로 바꾼다. 핵심은 WHERE id = 1. 이 조건 덕분에 딱 1행만 수정된다. PostgreSQL 은 매치된 행 수를 "UPDATE 1" 로 알려준다. 가격이 바뀐 행은 주황색으로 강조되고, 나머지는 그대로다.',
        rows: BASE_ROWS.map((r) => (r.id === 1 ? { ...r, price: 12000 } : r)),
        touched: new Set([1]),
        removed: new Set(),
        warn: null,
        keyPoint: 'UPDATE 의 본질은 "조건에 맞는 행의 컬럼 값을 덮어쓰기". WHERE 가 범위를 결정한다.',
        code: {
          lang: 'sql',
          filename: 'update-safe.sql',
          lines: [
            '-- Step 1. 안전한 UPDATE — WHERE 로 단건 지정',
            '-- 목표: id = 1 (아메리카노) 의 가격만 12000 원으로 변경',
            '',
            'UPDATE products',
            'SET price = 12000',
            'WHERE id = 1;',
            '',
            '-- 실행 결과:',
            '--   UPDATE 1   ← 정확히 1행만 수정됨',
            '',
            '-- 확인용 SELECT',
            'SELECT id, name, price',
            'FROM products',
            'WHERE id = 1;',
            '--   id | name        | price',
            '--   ---+-------------+------',
            "--    1 | 아메리카노  | 12000",
            '',
            '-- 핵심 포인트:',
            '--   • WHERE 가 "어느 행을 수정할지" 를 결정한다',
            '--   • SET 절에 적힌 컬럼만 바뀐다 (다른 컬럼은 그대로)',
            '--   • PK (id) 로 거는 WHERE 가 가장 안전하다',
          ],
          highlight: [3, 4, 5, 8, 9, 19, 20, 21],
        },
      },
      {
        title: 'Step 2. WHERE 없는 UPDATE — 전체 행이 한꺼번에 바뀐다 (위험!)',
        desc: 'WHERE 절을 빼먹는 순간 UPDATE 는 모든 행에 적용된다. 5개 음료 가격이 전부 12000원이 된다. 메뉴판이 한꺼번에 망가지는 셈. 실무에서 가장 흔한 사고 중 하나가 바로 이 "WHERE 없는 UPDATE" 다. PostgreSQL 은 친절하게 막아주지 않는다 — UPDATE 5 라고 표시될 뿐.',
        rows: BASE_ROWS.map((r) => ({ ...r, price: 12000 })),
        touched: new Set([1, 2, 3, 4, 5]),
        removed: new Set(),
        warn: 'WHERE 누락! 5개 행 전체 가격이 12000 원으로 덮어써졌다. 메뉴판이 망가진 상태.',
        keyPoint: 'WHERE 가 없으면 UPDATE 는 전체 행에 적용된다. DB 는 막아주지 않는다 — 본인이 챙겨야 한다.',
        code: {
          lang: 'sql',
          filename: 'update-danger.sql',
          lines: [
            '-- Step 2. 위험한 UPDATE — WHERE 누락',
            '-- 의도: 1번 행만 바꾸려 했는데 WHERE 를 깜빡함',
            '',
            'UPDATE products',
            'SET price = 12000;',
            '-- ↑ WHERE 가 없다! 모든 행이 12000 으로 바뀐다',
            '',
            '-- 실행 결과:',
            '--   UPDATE 5   ← 5개 행 모두 수정됨 (의도하지 않은 결과)',
            '',
            '-- 확인:',
            'SELECT id, name, price FROM products;',
            '--   id | name          | price',
            '--   ---+---------------+------',
            "--    1 | 아메리카노    | 12000   ← 의도",
            "--    2 | 라떼          | 12000   ← 사고!",
            "--    3 | 카푸치노      | 12000   ← 사고!",
            "--    4 | 에스프레소    | 12000   ← 사고!",
            "--    5 | 바닐라라떼    | 12000   ← 사고!",
            '',
            '-- 왜 이런 사고가 자주 나는가:',
            '--   • SQL 편집기에서 WHERE 한 줄을 실수로 지움',
            '--   • 복사/붙여넣기 중 끝부분 잘림',
            '--   • 테스트 DB 와 운영 DB 를 혼동',
            '',
            '-- 예방 수칙:',
            '--   1) UPDATE 전에 같은 WHERE 로 SELECT 먼저 돌려본다',
            '--   2) BEGIN; ... COMMIT; 안에서 작업 (Step 5 참고)',
            '--   3) 영향 받는 행 수를 미리 확인',
          ],
          highlight: [3, 4, 5, 8, 9, 22, 23, 24, 25, 27, 28, 29, 30],
        },
      },
      {
        title: 'Step 3. DELETE — 한 행만 골라서 지우기',
        desc: 'products 테이블에서 5번 행(바닐라라떼)만 삭제한다. WHERE id = 5 가 있기 때문에 정확히 1행만 사라진다. 삭제된 행은 회색 + 취소선으로 표시. PostgreSQL 의 응답은 "DELETE 1". DELETE 는 컬럼 단위가 아니라 행(row) 단위로 동작한다 — SET 절이 없다.',
        rows: BASE_ROWS.filter((r) => r.id !== 5),
        touched: new Set(),
        removed: new Set([5]),
        warn: null,
        keyPoint: 'DELETE = "조건에 맞는 행을 통째로 삭제". UPDATE 처럼 SET 이 없고, WHERE 만 있다.',
        code: {
          lang: 'sql',
          filename: 'delete-safe.sql',
          lines: [
            '-- Step 3. 안전한 DELETE — WHERE 로 단건 지정',
            '-- 목표: id = 5 (바닐라라떼) 한 행만 삭제',
            '',
            'DELETE FROM products',
            'WHERE id = 5;',
            '',
            '-- 실행 결과:',
            '--   DELETE 1   ← 정확히 1행만 삭제됨',
            '',
            '-- 확인용 SELECT',
            'SELECT id, name FROM products ORDER BY id;',
            '--   id | name',
            '--   ---+-------------',
            "--    1 | 아메리카노",
            "--    2 | 라떼",
            "--    3 | 카푸치노",
            "--    4 | 에스프레소",
            '--   (4 rows)   ← 5번 행이 사라졌다',
            '',
            '-- DELETE 와 UPDATE 의 차이:',
            '--   UPDATE : SET 으로 컬럼 값을 바꿈 (행은 남음)',
            '--   DELETE : 행 자체가 사라짐 (컬럼 단위 X)',
            '',
            '-- DELETE 후에 복구하려면:',
            '--   • 삭제 전에 BEGIN 으로 트랜잭션 시작 → ROLLBACK 가능',
            '--   • 백업/스냅샷에서 복구',
            '--   • 평소에 soft delete (is_deleted 컬럼) 패턴 고려',
          ],
          highlight: [3, 4, 7, 8, 10, 11, 19, 20, 21, 23, 24, 25],
        },
      },
      {
        title: 'Step 4. WHERE 없는 DELETE — 테이블이 통째로 비워진다 (위험!)',
        desc: 'WHERE 를 빼고 DELETE FROM products 만 실행하면 5개 행 전부 사라진다. UPDATE 사고보다 더 치명적이다 — 모든 행이 회색 취소선이 되고, 테이블은 빈 깡통이 된다. 실무에서 이런 사고를 막기 위해 DBA 들은 BEGIN/COMMIT 트랜잭션 패턴을 강제한다. 다음 단계에서 그 패턴을 본다.',
        rows: BASE_ROWS,
        touched: new Set(),
        removed: new Set([1, 2, 3, 4, 5]),
        warn: 'WHERE 누락! 테이블의 모든 행이 사라졌다. 운영 DB 에서 이러면 비상사태.',
        keyPoint: 'DELETE 에 WHERE 가 없으면 = 테이블 비우기. TRUNCATE 와 비슷한 효과지만 더 느리고 더 위험.',
        code: {
          lang: 'sql',
          filename: 'delete-danger.sql',
          lines: [
            '-- Step 4. 위험한 DELETE — WHERE 누락',
            '-- 의도: 5번 행만 지우려 했는데 WHERE 를 깜빡함',
            '',
            'DELETE FROM products;',
            '-- ↑ WHERE 가 없다! 테이블의 모든 행이 사라진다',
            '',
            '-- 실행 결과:',
            '--   DELETE 5   ← 전체 행 삭제 (의도하지 않은 결과)',
            '',
            '-- 확인:',
            'SELECT COUNT(*) FROM products;',
            '--   count',
            '--   -----',
            '--       0   ← 텅 비었다',
            '',
            '-- 운영 DB 에서 이런 사고가 나면:',
            '--   • 서비스 전체가 멈춘다 (조회 시 빈 결과)',
            '--   • 백업 복구까지 수십 분~수 시간 다운타임',
            '--   • PK 시퀀스는 그대로라서 새 INSERT 시 id 가 6 부터',
            '',
            '-- TRUNCATE 와 비교:',
            '--   DELETE   : WAL 로그 남김, 트리거 발동, ROLLBACK 가능',
            '--   TRUNCATE : 메타데이터만 변경, 빠름, 트리거 발동 안 함',
            '--              (ROLLBACK 가능 여부는 트랜잭션 안에 있을 때만)',
            '',
            '-- 예방:',
            '--   1) DELETE 전에 같은 WHERE 로 SELECT 먼저',
            '--   2) BEGIN; ... ROLLBACK; 으로 연습',
            '--   3) 영향 행 수가 예상보다 많으면 즉시 ROLLBACK',
          ],
          highlight: [3, 4, 7, 8, 10, 11, 16, 17, 18, 19, 27, 28, 29, 30],
        },
      },
      {
        title: 'Step 5. 안전한 패턴 — BEGIN → 변경 → SELECT 검증 → COMMIT',
        desc: '실무에서 UPDATE/DELETE 사고를 막는 황금 패턴은 트랜잭션이다. ① BEGIN 으로 시작 ② UPDATE/DELETE 실행 ③ SELECT 로 영향 받은 행이 맞는지 검증 ④ 맞으면 COMMIT, 이상하면 ROLLBACK. PostgreSQL 은 BEGIN 안의 모든 변경을 "잠정적인 상태" 로 두기 때문에, COMMIT 전에는 언제든지 되돌릴 수 있다. 이게 ACID 의 A (Atomicity) 다.',
        rows: BASE_ROWS.map((r) => (r.id === 1 ? { ...r, price: 12000 } : r)),
        touched: new Set([1]),
        removed: new Set(),
        warn: null,
        txnLog: {
          title: '트랜잭션 진행',
          steps: [
            { tag: 'BEGIN',    text: '트랜잭션 시작. 이 시점 이후의 변경은 잠정 상태.' },
            { tag: 'UPDATE',   text: 'UPDATE products SET price=12000 WHERE id=1; → UPDATE 1' },
            { tag: 'SELECT',   text: 'SELECT * FROM products WHERE id=1; → 가격 12000 확인 ✓' },
            { tag: 'COMMIT',   text: '검증 통과 → COMMIT. 변경 사항이 영구 반영된다.' },
          ],
        },
        keyPoint: 'BEGIN ~ COMMIT 사이는 잠정 상태. ROLLBACK 으로 언제든 취소 가능. 이게 DB 의 안전망.',
        code: {
          lang: 'sql',
          filename: 'transaction.sql',
          lines: [
            '-- Step 5. 안전한 UPDATE/DELETE 패턴 — 트랜잭션 + 검증',
            '-- 황금 절차: BEGIN → 변경 → SELECT 검증 → COMMIT (or ROLLBACK)',
            '',
            '-- ① 트랜잭션 시작',
            'BEGIN;',
            '',
            '-- ② 변경 실행 (영향 행 수에 주목)',
            'UPDATE products',
            'SET price = 12000',
            'WHERE id = 1;',
            '--   UPDATE 1   ← 예상: 1. 실제: 1. 일치 ✓',
            '',
            '-- ③ SELECT 로 결과 검증',
            'SELECT id, name, price',
            'FROM products',
            'WHERE id = 1;',
            '--   id | name        | price',
            "--    1 | 아메리카노  | 12000   ← 의도대로",
            '',
            '-- ④ 검증 통과 → 영구 반영',
            'COMMIT;',
            '',
            '-- 만약 ③ 단계에서 이상하면:',
            '-- ROLLBACK;   ← UPDATE 가 없었던 것처럼 되돌아감',
            '',
            '-- 이 패턴이 막아주는 사고:',
            '--   • WHERE 누락 (영향 행 수가 너무 많으면 즉시 ROLLBACK)',
            '--   • 잘못된 조건 (SELECT 검증에서 다른 행이 보이면 ROLLBACK)',
            '--   • 운영 DB 에 실수로 실행 (COMMIT 전에 멈출 수 있음)',
            '',
            '-- 실무 팁:',
            '--   • DELETE 도 같은 패턴 적용: BEGIN → DELETE → SELECT COUNT(*) → COMMIT',
            '--   • 큰 변경은 LIMIT 으로 영향 범위 확인 후 진행',
            '--   • psql 에서 \\set AUTOCOMMIT off 로 항상 트랜잭션 모드',
          ],
          highlight: [3, 4, 6, 7, 8, 9, 10, 12, 13, 14, 15, 16, 20, 21, 23, 24, 26, 27, 28, 29],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — products 테이블 박스
    // ─────────────────────────────────────────────────────
    function ProductsTable({ rows, touched, removed }) {
      // 삭제된 행도 시각적으로 보여주기 위해, removed 가 있으면 BASE_ROWS 기준으로 그린다
      const visibleRows = removed && removed.size > 0 ? BASE_ROWS : rows;
      return (
        <div className="rounded-lg border border-orange-200 overflow-hidden">
          <div className="bg-orange-100 px-3 py-1.5 text-[11px] font-bold text-orange-800 flex items-center justify-between">
            <span>products</span>
            <span className="text-orange-600/70">PostgreSQL Table</span>
          </div>
          <table className="w-full text-xs">
            <thead className="bg-orange-50 text-orange-700">
              <tr>
                <th className="px-2 py-1 text-left font-semibold w-10">id</th>
                <th className="px-2 py-1 text-left font-semibold">name</th>
                <th className="px-2 py-1 text-right font-semibold w-20">price</th>
                <th className="px-2 py-1 text-right font-semibold w-16">stock</th>
              </tr>
            </thead>
            <tbody>
              {visibleRows.map((row) => {
                const isTouched = touched && touched.has(row.id);
                const isRemoved = removed && removed.has(row.id);
                const rowCls = isRemoved
                  ? 'bg-slate-100 text-slate-400 line-through'
                  : isTouched
                  ? 'bg-orange-200/60 text-orange-900 font-semibold'
                  : 'bg-white text-slate-700';
                // 변경된 price 표시: touched 행은 현재 rows 의 값을, 아니면 BASE_ROWS 값을 표시
                const effective = isTouched
                  ? rows.find((r) => r.id === row.id) || row
                  : row;
                return (
                  <tr key={row.id} className={`border-t border-orange-100 ${rowCls}`}>
                    <td className="px-2 py-1 font-mono">{row.id}</td>
                    <td className="px-2 py-1">{row.name}</td>
                    <td className="px-2 py-1 text-right font-mono">{effective.price.toLocaleString()}</td>
                    <td className="px-2 py-1 text-right font-mono">{row.stock}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      );
    }

    function WarnBox({ message }) {
      if (!message) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-red-400 bg-red-50 px-3 py-2 flex items-start gap-2">
          <span className="text-red-500 text-lg leading-none">⚠</span>
          <div>
            <div className="text-[11px] font-bold text-red-700 mb-0.5">WHERE 누락 경고</div>
            <div className="text-xs text-red-900 leading-relaxed">{message}</div>
          </div>
        </div>
      );
    }

    function TxnLogBox({ log }) {
      if (!log) return null;
      const tagColor = {
        BEGIN:  'bg-orange-200 text-orange-800',
        UPDATE: 'bg-amber-200 text-amber-800',
        SELECT: 'bg-emerald-200 text-emerald-800',
        COMMIT: 'bg-orange-500 text-white',
      };
      return (
        <div className="mt-3 rounded-lg border-2 border-orange-400 bg-orange-50 p-3">
          <div className="text-xs font-bold text-orange-800 mb-2">⚡ {log.title}</div>
          <ol className="space-y-1.5">
            {log.steps.map((s, i) => (
              <li key={i} className="text-xs text-orange-900 flex gap-2 items-start">
                <span className={`text-[10px] px-1.5 py-0.5 rounded font-mono font-bold ${tagColor[s.tag] || 'bg-slate-200'}`}>{s.tag}</span>
                <span className="flex-1 leading-relaxed">{s.text}</span>
              </li>
            ))}
          </ol>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-orange-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-orange-800">products 테이블 상태</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 도메인 상태</span>
          </div>
          <ProductsTable rows={state.rows} touched={state.touched} removed={state.removed} />
          <WarnBox message={state.warn} />
          <TxnLogBox log={state.txnLog} />
          <div className="mt-3 text-xs text-orange-900 bg-orange-50 border border-orange-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js) — 5개 탭으로 동시 전환
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total, onTabClick }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 파일 탭 (5개 STEPS) */}
          <div className="flex bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {STEPS.map((s, i) => (
              <button
                key={i}
                onClick={() => onTabClick(i)}
                className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                  i === stepIdx
                    ? 'bg-[#282c34] text-orange-300 border-b-2 border-b-orange-400'
                    : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'
                }`}
              >
                {s.code.filename}
              </button>
            ))}
          </div>
          {/* 윈도우 헤더 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          {/* 코드 본문 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-orange-500/15 border-l-2 border-orange-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-orange-600 text-white font-bold">III</span>
              <div>
                <h1 className="text-2xl font-bold text-orange-900">Chapter III-2-2. 데이터 수정과 삭제</h1>
                <p className="text-sm text-orange-800/80">UPDATE / DELETE / WHERE — 안전한 패턴과 위험한 실수</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-orange-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-orange-600' : 'bg-orange-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-orange-700 text-orange-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-orange-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer
                code={step.code}
                stepIdx={stepIdx}
                total={STEPS.length}
                onTabClick={setStepIdx}
              />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-orange-700 text-white' : 'bg-orange-600 text-white hover:bg-orange-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-orange-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계 · 우측 탭 클릭으로 직접 이동</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-orange-400 bg-white px-4 py-3 text-sm text-orange-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                UPDATE/DELETE 의 위험은 항상 "WHERE 누락" 에서 시작된다. BEGIN → 변경 → SELECT 검증 → COMMIT 패턴이 사고를 막아준다. 다음 챕터에서는 여러 테이블 간의 관계(JOIN)와 외래키 제약을 다룬다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['UPDATE', 'DELETE', 'WHERE', 'BEGIN', 'COMMIT', 'ROLLBACK', 'Transaction', 'ACID'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-orange-100 text-orange-800 border border-orange-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-orange-700">
              <a href="./chapter-iii-2-1.html" className="underline hover:no-underline">← 이전: III-2-1</a>
              <a href="./index.html" className="underline hover:no-underline">챕터 목록</a>
              <a href="./chapter-iii-3-1.html" className="underline hover:no-underline">다음: III-3-1 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
