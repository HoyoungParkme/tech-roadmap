<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — Chapter IV-1-1. SQL 쿼리 실행 파이프라인</title>

  <!-- Tailwind CSS Play CDN: 학습 자료용. 프로덕션에서는 PostCSS 빌드를 권장. -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 (development 버전: 학습용이므로 에러 메시지 상세 버전 사용) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel Standalone 7.x: 브라우저에서 JSX를 실시간 변환 (Fragment shorthand `<>` 지원) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    ─────────────────────────────────────────────────────────────
    PostgreSQL Chapter IV-1-1 — SQL 쿼리 실행 파이프라인
    ─────────────────────────────────────────────────────────────
    학습 목표 : 클라이언트가 보낸 SQL(SELECT * FROM users WHERE age > 25)이
               PostgreSQL 서버 내부에서 Parser → Planner/Optimizer → Executor →
               Storage Manager를 거쳐 결과 행이 반환되기까지의 흐름을
               단계별로 체험한다.
    조작법   : "자동 실행" 버튼으로 재생, 이전/다음 버튼으로 수동 전환.
    확장 방법 : 새 챕터를 추가할 때는 STEPS / SQL_CODE / 헤더 텍스트만 교체하면 된다.
               (챕터가 2개 이상이 되면 파일을 분리하고 index.html은 허브로 전환한다.)
    ─────────────────────────────────────────────────────────────
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // -----------------------------------------
    // 1. 교육용 SQL 코드 (쿼리 실행 파이프라인)
    // -----------------------------------------
    const SQL_CODE = [
      "-- 1. 클라이언트 요청: 애플리케이션이 아래 쿼리를 전송",
      "SELECT *",
      "FROM users",
      "WHERE age > 25;",
      "",
      "-- 2. Parser: SQL 문법 검사 → 파스 트리(Parse Tree) 생성",
      "--    SELECT → target list: *",
      "--    FROM   → relation: users",
      "--    WHERE  → qual: age > 25",
      "",
      "-- 3. Planner/Optimizer: 최적 실행 계획 수립",
      "--    인덱스가 있으면: Index Scan on idx_users_age",
      "--    인덱스가 없으면: Sequential Scan on users",
      "EXPLAIN SELECT * FROM users WHERE age > 25;",
      "",
      "-- 4. Executor: 계획대로 행(row)을 하나씩 가져옴",
      "--    Heap Fetch: 디스크 페이지에서 실제 행 읽기",
      "--    Filter: age > 25 조건을 만족하는 행만 선별",
      "",
      "-- 5. Storage Manager: 버퍼 캐시(shared_buffers) 확인",
      "--    캐시 HIT  → 메모리에서 즉시 반환 (빠름)",
      "--    캐시 MISS → 디스크 I/O 후 버퍼에 적재",
      "",
      "-- 6. 결과 반환: 조건을 만족하는 row를 클라이언트로 전송",
      "-- 예시 결과:",
      "-- id | name  | age",
      "-- ---|-------|----",
      "-- 3  | Alice | 30",
      "-- 7  | Bob   | 28"
    ];

    // -----------------------------------------
    // 2. 시뮬레이션 스텝 정의
    // -----------------------------------------
    const STEPS = [
      {
        codeLine: 0,
        label: "SQL 전송",
        desc: "[Step 1: 클라이언트 SQL 전송] 애플리케이션(psql, 앱 서버 등)이 'SELECT * FROM users WHERE age > 25;' 쿼리를 PostgreSQL 서버 프로세스(postmaster)에 전송합니다. 서버는 클라이언트 연결마다 전담 백엔드 프로세스를 생성하여 처리합니다.",
        clientState: 'sending',
        parserState: 'idle',
        plannerState: 'idle',
        executorState: 'idle',
        storageState: 'idle',
        diskState: 'idle',
        dataObj: { query: 'SELECT * FROM users WHERE age > 25' }
      },
      {
        codeLine: 5,
        label: "Parser",
        desc: "[Step 2: Parser — 문법 검사 및 파스 트리 생성] Parser가 SQL 문자열의 문법(syntax)을 검사하고 파스 트리(Parse Tree)를 만듭니다. 오타나 문법 오류가 있으면 이 단계에서 즉시 에러를 반환합니다. 파스 트리는 이후 단계가 이해할 수 있는 내부 구조체(C struct)입니다.",
        clientState: 'waiting',
        parserState: 'active',
        plannerState: 'idle',
        executorState: 'idle',
        storageState: 'idle',
        diskState: 'idle',
        dataObj: { parseTree: 'SELECT → FROM users → WHERE age > 25' }
      },
      {
        codeLine: 10,
        label: "Planner",
        desc: "[Step 3: Planner/Optimizer — 실행 계획 수립] Optimizer가 파스 트리를 받아 가장 빠른 실행 방법을 계산합니다. 'age' 컬럼에 인덱스(idx_users_age)가 있으면 Index Scan을, 없으면 Sequential Scan(전체 행 순회)을 선택합니다. EXPLAIN 명령으로 어떤 계획이 선택됐는지 확인할 수 있습니다.",
        clientState: 'waiting',
        parserState: 'done',
        plannerState: 'active',
        executorState: 'idle',
        storageState: 'idle',
        diskState: 'idle',
        dataObj: { plan: 'Index Scan on idx_users_age (cost=0.29..8.56)' }
      },
      {
        codeLine: 15,
        label: "Executor",
        desc: "[Step 4: Executor — 계획대로 행 가져오기] Executor가 실행 계획을 따라 행을 하나씩 꺼내옵니다. 인덱스 스캔 시에는 인덱스 항목 → 힙(Heap, 실제 테이블 데이터 페이지) 순서로 접근하며, WHERE 조건(age > 25)을 만족하는 행만 선별합니다.",
        clientState: 'waiting',
        parserState: 'done',
        plannerState: 'done',
        executorState: 'active',
        storageState: 'idle',
        diskState: 'idle',
        dataObj: { fetching: 'Heap Fetch: page 3, tuple 5...' }
      },
      {
        codeLine: 19,
        label: "Storage Mgr",
        desc: "[Step 5: Storage Manager — 버퍼 캐시 확인] Storage Manager가 필요한 데이터 페이지를 shared_buffers(공유 메모리 버퍼 캐시)에서 찾습니다. 캐시 HIT이면 메모리에서 즉시 읽고, MISS이면 디스크에서 읽어 버퍼에 올립니다. 자주 쓰는 페이지가 캐시에 남아 있을수록 쿼리가 빨라집니다.",
        clientState: 'waiting',
        parserState: 'done',
        plannerState: 'done',
        executorState: 'active',
        storageState: 'active',
        diskState: 'reading',
        dataObj: { cache: 'shared_buffers HIT → page loaded' }
      },
      {
        codeLine: 23,
        label: "결과 반환",
        desc: "[Step 6: 결과 반환] 조건(age > 25)을 만족하는 모든 행이 수집되면, PostgreSQL이 결과 집합(result set)을 클라이언트 프로토콜(libpq)을 통해 전송합니다. 클라이언트는 행 단위로 데이터를 수신합니다.",
        clientState: 'received',
        parserState: 'done',
        plannerState: 'done',
        executorState: 'done',
        storageState: 'done',
        diskState: 'done',
        dataObj: { rows: [{ id: 3, name: 'Alice', age: 30 }, { id: 7, name: 'Bob', age: 28 }] }
      }
    ];

    // -----------------------------------------
    // 3. 구문 강조(Syntax Highlighting) 헬퍼 — SQL 버전
    // -----------------------------------------
    // SQL 예약어 (대소문자 무시)
    const SQL_KEYWORDS = new Set([
      'SELECT', 'FROM', 'WHERE', 'JOIN', 'LEFT', 'RIGHT', 'INNER', 'OUTER',
      'ON', 'GROUP', 'BY', 'ORDER', 'HAVING', 'LIMIT', 'OFFSET',
      'INSERT', 'INTO', 'VALUES', 'UPDATE', 'SET', 'DELETE',
      'CREATE', 'TABLE', 'INDEX', 'DROP', 'ALTER', 'ADD',
      'EXPLAIN', 'ANALYZE', 'AND', 'OR', 'NOT', 'IN', 'IS', 'NULL',
      'AS', 'DISTINCT', 'UNION', 'ALL', 'EXISTS', 'CASE', 'WHEN', 'THEN', 'ELSE', 'END'
    ]);
    // SQL 내장 타입 / 함수
    const SQL_BUILTINS = new Set(['INT', 'VARCHAR', 'TEXT', 'BOOLEAN', 'TIMESTAMP', 'SERIAL', 'COUNT', 'SUM', 'AVG', 'MAX', 'MIN']);

    const highlightLine = (line) => {
      // 주석 처리: --로 시작하는 부분
      const commentIdx = line.indexOf('--');
      let codePart = line;
      let commentPart = '';

      if (commentIdx !== -1) {
        codePart = line.slice(0, commentIdx);
        commentPart = line.slice(commentIdx);
      }

      if (!codePart.trim() && commentPart) {
        return <span className="text-slate-500 italic">{commentPart}</span>;
      }

      if (!codePart.trim() && !commentPart) {
        return <span> </span>;
      }

      // 토큰 분리 (공백, 괄호, 연산자, 쉼표, 세미콜론)
      const tokens = codePart.split(/(\s+|\(|\)|,|;|=|>|<|!=|\*|'[^']*'|"[^"]*")/g);

      const highlightedTokens = tokens.map((token, i) => {
        const upper = token.trim().toUpperCase();
        if (SQL_KEYWORDS.has(upper)) {
          return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        }
        if (SQL_BUILTINS.has(upper)) {
          return <span key={i} className="text-cyan-400">{token}</span>;
        }
        // 숫자 리터럴
        if (token.trim() !== '' && !isNaN(token.trim()) && token.trim() !== '') {
          return <span key={i} className="text-orange-300">{token}</span>;
        }
        // 문자열 리터럴 (작은따옴표)
        if (/^'[^']*'$/.test(token.trim())) {
          return <span key={i} className="text-emerald-400">{token}</span>;
        }
        // 연산자
        if (['>', '<', '=', '!=', '*', ';', ','].includes(token.trim()) && token.trim() !== '') {
          return <span key={i} className="text-yellow-300">{token}</span>;
        }
        return <span key={i} className="text-slate-200">{token}</span>;
      });

      return (
        <>
          {highlightedTokens}
          {commentPart && <span className="text-slate-500 italic">{commentPart}</span>}
        </>
      );
    };

    // -----------------------------------------
    // 4. 파이프라인 노드 색상 헬퍼
    // -----------------------------------------
    const getStatusClass = (state, baseClass) => {
      if (state === 'active' || state === 'reading') {
        return `${baseClass} bg-blue-100 border-blue-500 ring-2 ring-blue-300 shadow-lg scale-105 transition-all duration-500`;
      }
      if (state === 'sending') {
        return `${baseClass} bg-emerald-100 border-emerald-500 ring-2 ring-emerald-300 shadow-lg scale-105 transition-all duration-500`;
      }
      if (state === 'done' || state === 'received') {
        return `${baseClass} bg-slate-100 border-emerald-500 text-emerald-700 transition-all duration-500`;
      }
      return `${baseClass} bg-white border-slate-200 text-slate-400 transition-all duration-500`;
    };

    // -----------------------------------------
    // 5. 메인 앱 컴포넌트
    // -----------------------------------------
    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 2500);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      // 파이프라인 단계 목록 (다이어그램용)
      const pipelineNodes = [
        { key: 'client',   label: 'Client',            stateKey: 'clientState' },
        { key: 'parser',   label: 'Parser',             stateKey: 'parserState' },
        { key: 'planner',  label: 'Planner/Optimizer',  stateKey: 'plannerState' },
        { key: 'executor', label: 'Executor',            stateKey: 'executorState' },
        { key: 'storage',  label: 'Storage Manager',    stateKey: 'storageState' },
        { key: 'disk',     label: 'DB Disk / Buffer',   stateKey: 'diskState' },
      ];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">

            {/* 헤더 */}
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">PostgreSQL 쿼리 실행 파이프라인 시각화</h1>
              </div>
              <p className="text-slate-600">
                클라이언트가 보낸 <b>SELECT SQL</b>이 PostgreSQL 내부에서
                <b> Parser → Planner/Optimizer → Executor → Storage Manager</b>를 거쳐
                결과 행으로 반환되는 전 과정을 단계별로 시뮬레이션합니다.
              </p>
            </header>

            {/* 현재 단계 설명 배너 */}
            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 flex flex-col justify-center min-h-[110px]">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 파이프라인 상태</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 좌우 레이아웃 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">

              {/* 왼쪽: 파이프라인 다이어그램 */}
              <div className="flex flex-col space-y-4">

                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col gap-2">
                  <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">SQL 실행 파이프라인</div>

                  {pipelineNodes.map((node, i) => {
                    const state = stepData[node.stateKey];
                    return (
                      <div key={node.key}>
                        <div className={getStatusClass(state, "px-4 py-3 rounded-lg border-2 font-semibold text-center text-sm")}>
                          <span className="text-xs font-normal opacity-60 mr-2">Step {i + 1}</span>
                          {node.label}
                          {state === 'active' && <span className="ml-2 inline-block w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>}
                          {state === 'reading' && <span className="ml-2 text-xs text-blue-600">(I/O)</span>}
                          {state === 'done' && <span className="ml-2 text-emerald-600 text-xs">완료</span>}
                        </div>
                        {i < pipelineNodes.length - 1 && (
                          <div className="flex justify-center">
                            <div className="w-0.5 h-4 bg-slate-300"></div>
                          </div>
                        )}
                      </div>
                    );
                  })}

                  {/* 데이터 패킷 표시 */}
                  <div className="mt-4 bg-slate-900 text-emerald-400 text-xs font-mono p-3 rounded-lg overflow-x-auto">
                    <span className="text-slate-500 mr-2">데이터:</span>
                    {JSON.stringify(stepData.dataObj, null, 0)}
                  </div>
                </div>

                {/* 컨트롤 바 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button
                      aria-label="이전 단계"
                      onClick={handlePrev}
                      disabled={currentStepIdx === 0}
                      className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"
                    >
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true">
                        <path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/>
                      </svg>
                    </button>
                    <button
                      aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                      onClick={togglePlay}
                      className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition shadow-sm w-32 justify-center"
                    >
                      {isPlaying ? (
                        <>
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true">
                            <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
                          </svg>
                          정지
                        </>
                      ) : (
                        <>
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                          </svg>
                          자동 실행
                        </>
                      )}
                    </button>
                    <button
                      aria-label="다음 단계"
                      onClick={handleNext}
                      disabled={isEnd}
                      className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"
                    >
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true">
                        <path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/>
                      </svg>
                    </button>
                  </div>
                  <div className="flex items-center gap-3">
                    {/* 단계 인디케이터 */}
                    <div className="flex gap-1">
                      {STEPS.map((s, i) => (
                        <button
                          key={i}
                          onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                          aria-label={`Step ${i + 1}: ${s.label}`}
                          className={`w-2.5 h-2.5 rounded-full transition-all ${i === currentStepIdx ? 'bg-blue-600 scale-125' : i < currentStepIdx ? 'bg-blue-300' : 'bg-slate-200'}`}
                        />
                      ))}
                    </div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                      {currentStepIdx + 1} / {STEPS.length}
                    </div>
                  </div>
                </div>
              </div>

              {/* 오른쪽: SQL 코드 뷰어 */}
              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-slate-900 flex flex-col">
                  {/* 코드 뷰어 상단 탭 */}
                  <div className="flex items-center px-4 py-2 bg-slate-800 border-b border-slate-700 gap-2">
                    <div className="w-3 h-3 rounded-full bg-red-500 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-yellow-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-500 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-400 font-mono">query_pipeline.sql</span>
                  </div>
                  <div className="p-4 overflow-y-auto flex-1 text-sm font-mono text-slate-300 scroll-smooth leading-relaxed">
                    {SQL_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div
                          key={idx}
                          className={`flex px-2 py-0.5 rounded transition-colors ${
                            isActive
                              ? 'bg-blue-900/60 text-white font-bold border-l-4 border-blue-400 shadow-inner'
                              : 'border-l-4 border-transparent'
                          }`}
                        >
                          <span className="text-slate-600 select-none mr-4 w-6 text-right inline-block shrink-0 tabular-nums">
                            {idx + 1}
                          </span>
                          <span className="whitespace-pre">{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    // -----------------------------------------
    // 6. 마운트
    // -----------------------------------------
