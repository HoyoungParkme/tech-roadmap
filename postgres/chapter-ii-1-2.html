<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — II-1-2. 외래키와 테이블 간 관계</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CUSTOMERS = [{id:1,name:'Alice',email:'alice@ex.com'},{id:2,name:'Bob',email:'bob@ex.com'}];
    const ORDERS = [{id:101,cid:1,product:'노트북',price:1500000},{id:102,cid:1,product:'마우스',price:30000},{id:103,cid:2,product:'키보드',price:80000}];

    const STEPS = [
      {label:"두 테이블",desc:"[Step 1: 두 개의 테이블] 고객 테이블과 주문 테이블이 따로 존재한다. 고객 정보를 주문 테이블에 통째로 복사하면 중복이 생기고, 고객 정보가 바뀔 때 주문 테이블도 전부 수정해야 한다. 그래서 테이블을 분리한다.",phase:'intro',fkHighlight:false,joinResult:false,errorTest:false},
      {label:"외래키 연결",desc:"[Step 2: 외래키(FK)] 주문 테이블의 '고객_id' 열이 고객 테이블의 'id'를 가리킨다. 이 '고객_id'가 외래키(foreign key)다. 화살표가 두 테이블을 연결하는 것을 확인하라.",phase:'fk',fkHighlight:true,joinResult:false,errorTest:false},
      {label:"참조 무결성",desc:"[Step 3: 참조 무결성] 주문 테이블에 고객_id=99를 넣으려 하면? 고객 테이블에 id=99가 없으므로 데이터베이스가 거부한다. '유령 고객의 주문'을 원천 차단하는 규칙이 참조 무결성(referential integrity)이다.",phase:'integrity',fkHighlight:true,joinResult:false,errorTest:true},
      {label:"1:N 관계",desc:"[Step 4: 1:N 관계] Alice(id=1)는 주문 2건, Bob(id=2)은 주문 1건이다. 고객 1명이 주문 N개를 가진다 → 1:N 관계. 고객 테이블의 행 하나가 주문 테이블의 여러 행과 연결된다.",phase:'1n',fkHighlight:true,joinResult:false,errorTest:false},
      {label:"JOIN 합치기",desc:"[Step 5: JOIN] 외래키로 연결된 두 테이블을 JOIN하면 하나의 결과로 합쳐볼 수 있다. 'Alice가 주문한 모든 내역'을 SQL 한 줄로 가져온다. JOIN이 없다면 코드에서 직접 엮어야 한다.",phase:'join',fkHighlight:false,joinResult:true,errorTest:false}
    ];

    function App() {
      const [ci,setCi]=useState(0);const [playing,setPlaying]=useState(false);const ref=useRef(null);
      const s=STEPS[ci];const isEnd=ci===STEPS.length-1;
      const next=()=>{setCi(p=>{if(p<STEPS.length-1)return p+1;setPlaying(false);return p;});};
      const nRef=useRef(next);nRef.current=next;
      const prev=()=>{if(ci>0){setCi(p=>p-1);setPlaying(false);}};
      const toggle=()=>{if(isEnd)setCi(0);setPlaying(p=>!p);};
      useEffect(()=>{if(playing)ref.current=setInterval(()=>nRef.current(),3500);else clearInterval(ref.current);return()=>clearInterval(ref.current);},[playing]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold">II-1-2. 외래키(FK)와 테이블 간 관계</h1>
              </div>
              <p className="text-slate-600"><b>외래키</b>로 두 테이블을 연결하고, <b>참조 무결성</b>으로 잘못된 데이터를 막고, <b>JOIN</b>으로 합쳐본다.</p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl min-h-[100px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[400px]">
                  <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">테이블 관계 시각화</div>

                  {/* 고객 테이블 */}
                  <div className="mb-2 text-xs font-bold text-blue-600">고객 테이블</div>
                  <table className="w-full text-sm mb-4 border-collapse">
                    <thead><tr className="bg-blue-600 text-white"><th className="p-2 text-left">id (PK)</th><th className="p-2 text-left">이름</th><th className="p-2 text-left">이메일</th></tr></thead>
                    <tbody>{CUSTOMERS.map((c,i)=>(
                      <tr key={i} className={`border transition-all ${s.phase==='1n'&&c.id===1?'bg-blue-50 ring-1 ring-blue-300':'bg-white'}`}>
                        <td className="p-2 font-mono font-bold text-blue-700 border">{c.id}</td>
                        <td className="p-2 font-mono border">{c.name}</td>
                        <td className="p-2 font-mono border text-xs">{c.email}</td>
                      </tr>
                    ))}</tbody>
                  </table>

                  {/* FK 화살표 */}
                  {s.fkHighlight && (
                    <div className="flex justify-center my-2">
                      <div className="flex flex-col items-center text-amber-500">
                        <div className="text-xs font-bold">외래키 참조</div>
                        <div className="text-2xl animate-bounce">⬇️</div>
                        <div className="text-xs">고객_id → 고객.id</div>
                      </div>
                    </div>
                  )}

                  {/* 주문 테이블 */}
                  <div className="mb-2 text-xs font-bold text-emerald-600">주문 테이블</div>
                  <table className="w-full text-sm border-collapse">
                    <thead><tr className="bg-emerald-600 text-white"><th className="p-2 text-left">id</th><th className={`p-2 text-left ${s.fkHighlight?'bg-amber-500':''}`}>고객_id (FK)</th><th className="p-2 text-left">상품명</th><th className="p-2 text-left">금액</th></tr></thead>
                    <tbody>
                      {ORDERS.map((o,i)=>(
                        <tr key={i} className={`border transition-all ${s.phase==='1n'&&o.cid===1?'bg-emerald-50 ring-1 ring-emerald-300':'bg-white'}`}>
                          <td className="p-2 font-mono border">{o.id}</td>
                          <td className={`p-2 font-mono border font-bold ${s.fkHighlight?'text-amber-600 bg-amber-50':''}`}>{o.cid}</td>
                          <td className="p-2 font-mono border">{o.product}</td>
                          <td className="p-2 font-mono border">{o.price.toLocaleString()}</td>
                        </tr>
                      ))}
                      {s.errorTest && (
                        <tr className="bg-red-50 border-2 border-red-400">
                          <td className="p-2 font-mono border">104</td>
                          <td className="p-2 font-mono border text-red-600 font-bold line-through">99</td>
                          <td className="p-2 font-mono border text-red-400">모니터</td>
                          <td className="p-2 font-mono border text-red-400">500000</td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                  {s.errorTest && (
                    <div className="mt-3 p-3 bg-red-50 border-2 border-red-300 rounded-lg text-sm text-red-700">
                      <b>ERROR:</b> 고객_id=99 → 고객 테이블에 id=99 없음 → <b>거부!</b> (참조 무결성)
                    </div>
                  )}

                  {/* JOIN 결과 */}
                  {s.joinResult && (
                    <div className="mt-4">
                      <div className="bg-slate-900 p-3 rounded-t-lg text-sm font-mono text-slate-200">
                        <span className="text-pink-400">SELECT</span> 고객.이름, 주문.상품명, 주문.금액
                        <span className="text-pink-400"> FROM</span> 주문
                        <span className="text-pink-400"> JOIN</span> 고객 <span className="text-pink-400">ON</span> 주문.고객_id = 고객.id;
                      </div>
                      <table className="w-full text-sm border-collapse">
                        <thead><tr className="bg-violet-600 text-white"><th className="p-2">이름</th><th className="p-2">상품명</th><th className="p-2">금액</th></tr></thead>
                        <tbody>
                          {[['Alice','노트북','1,500,000'],['Alice','마우스','30,000'],['Bob','키보드','80,000']].map((r,i)=>(
                            <tr key={i} className="bg-violet-50 border"><td className="p-2 font-mono border">{r[0]}</td><td className="p-2 font-mono border">{r[1]}</td><td className="p-2 font-mono border">{r[2]}</td></tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전 단계" onClick={prev} disabled={ci===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button aria-label={playing?'자동 재생 정지':'자동 재생 시작'} onClick={toggle} className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition shadow-sm w-32 justify-center">{playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}</button>
                    <button aria-label="다음 단계" onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex gap-1">{STEPS.map((st,i)=>(<button key={i} aria-label={`Step ${i+1}: ${st.label}`} onClick={()=>{setCi(i);setPlaying(false);}} className={`w-2.5 h-2.5 rounded-full transition-all ${i===ci?'bg-blue-600 scale-125':i<ci?'bg-blue-300':'bg-slate-200'}`}/>))}</div>
                    <div className="text-sm text-slate-500 bg-slate-50 px-3 py-1 rounded-full border">{ci+1}/{STEPS.length}</div>
                  </div>
                </div>
              </div>

              <div className="rounded-xl shadow-sm border border-slate-200 overflow-hidden bg-white flex flex-col min-h-[400px]">
                <div className="px-4 py-3 bg-slate-100 border-b"><span className="text-xs text-slate-500 font-semibold">핵심 개념</span></div>
                <div className="p-6 overflow-y-auto flex-1 space-y-3">
                  {[
                    {t:'외래키(Foreign Key)',d:'다른 테이블의 기본키를 참조하는 열. 두 테이블을 연결한다.',a:s.phase==='fk'},
                    {t:'참조 무결성',d:'외래키 값은 반드시 참조 대상에 실제로 존재해야 한다. 유령 데이터 차단.',a:s.phase==='integrity'},
                    {t:'1:N 관계',d:'한 행이 다른 테이블의 여러 행과 연결. 고객:주문 = 1:N.',a:s.phase==='1n'},
                    {t:'JOIN',d:'외래키로 연결된 테이블들을 합쳐 하나의 결과로 보는 SQL 연산.',a:s.phase==='join'}
                  ].map((item,i)=>(
                    <div key={i} className={`p-4 rounded-lg border-2 transition-all duration-500 ${item.a?'border-blue-400 bg-blue-50 scale-[1.02] shadow-md':'border-slate-200 bg-slate-50'}`}>
                      <div className={`text-xs font-bold mb-1 ${item.a?'text-blue-600':'text-slate-400'}`}>{item.t}</div>
                      <div className="text-sm text-slate-700">{item.d}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
