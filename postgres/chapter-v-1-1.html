<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — V-1-1. 트랜잭션이란 무엇인가</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    PostgreSQL Chapter V-1-1 — 트랜잭션이란 무엇인가
    학습 목표: 트랜잭션의 개념과 BEGIN / COMMIT / ROLLBACK 사용법을 설명할 수 있다.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { label: '초기 상태', desc: '[Step 1: 초기 상태] accounts 테이블에 김철수(100,000원)와 이영희(50,000원)가 있다. 아직 트랜잭션이 시작되지 않았다.',
        phase: 'init', sql: "SELECT * FROM accounts;\n\n id | owner  | balance\n----+--------+---------\n  1 | 김철수 | 100000\n  2 | 이영희 |  50000",
        a: 100000, b: 50000, txState: 'none' },
      { label: 'BEGIN', desc: '[Step 2: BEGIN — 트랜잭션 시작] BEGIN 명령으로 트랜잭션을 시작한다. 이 뒤의 SQL은 아직 확정되지 않은 "임시 상태"다.',
        phase: 'begin', sql: "BEGIN;",
        a: 100000, b: 50000, txState: 'open' },
      { label: 'UPDATE 1', desc: '[Step 3: 차감] 김철수 계좌에서 30,000원을 차감한다. 아직 COMMIT 전이므로 다른 세션에서는 이 변경이 보이지 않는다.',
        phase: 'update1', sql: "UPDATE accounts\nSET balance = balance - 30000\nWHERE id = 1;\n\n-- 김철수: 100,000 → 70,000 (임시)",
        a: 70000, b: 50000, txState: 'open' },
      { label: 'UPDATE 2', desc: '[Step 4: 추가] 이영희 계좌에 30,000원을 추가한다. 두 UPDATE가 모두 성공한 상태. 아직 확정 전이다.',
        phase: 'update2', sql: "UPDATE accounts\nSET balance = balance + 30000\nWHERE id = 2;\n\n-- 이영희: 50,000 → 80,000 (임시)",
        a: 70000, b: 80000, txState: 'open' },
      { label: 'COMMIT', desc: '[Step 5: COMMIT — 확정] COMMIT으로 두 변경을 모두 확정한다. 이제 다른 세션에서도 변경된 값이 보인다. 이체 완료!',
        phase: 'commit', sql: "COMMIT;\n\n-- 트랜잭션 안의 모든 변경이 확정됨\n-- 김철수: 70,000 / 이영희: 80,000",
        a: 70000, b: 80000, txState: 'committed' },
      { label: 'ROLLBACK 시나리오', desc: '[Step 6: ROLLBACK — 되돌리기] 만약 중간에 오류가 발생했다면? ROLLBACK을 실행하면 BEGIN 이전 상태로 완전히 되돌아간다. 이것이 원자성(Atomicity)이다.',
        phase: 'rollback', sql: "BEGIN;\nUPDATE accounts SET balance = balance - 30000 WHERE id = 1;\n-- 오류 발생!\nROLLBACK;\n\n-- 모든 변경 취소, 원래 상태 유지\n-- 김철수: 100,000 / 이영희: 50,000",
        a: 100000, b: 50000, txState: 'rolled_back' }
    ];

    function AccountCard({ owner, balance, highlight, label }) {
      const colorMap = {
        none: 'border-slate-200 bg-white',
        open: 'border-amber-400 bg-amber-50',
        committed: 'border-emerald-400 bg-emerald-50',
        rolled_back: 'border-red-400 bg-red-50'
      };
      return (
        <div className={`p-4 rounded-xl border-2 transition-all duration-500 ${colorMap[highlight] || colorMap.none}`}>
          <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">{label}</div>
          <div className="text-lg font-bold text-slate-800">{owner}</div>
          <div className="text-2xl font-mono font-bold mt-2 text-slate-700">
            {balance.toLocaleString()}원
          </div>
        </div>
      );
    }

    function TxIndicator({ state }) {
      const map = {
        none: { text: '트랜잭션 없음', color: 'bg-slate-100 text-slate-500 border-slate-200' },
        open: { text: '트랜잭션 진행 중 (미확정)', color: 'bg-amber-100 text-amber-700 border-amber-300' },
        committed: { text: 'COMMIT 완료 (확정)', color: 'bg-emerald-100 text-emerald-700 border-emerald-300' },
        rolled_back: { text: 'ROLLBACK 완료 (취소)', color: 'bg-red-100 text-red-700 border-red-300' }
      };
      const s = map[state] || map.none;
      return (
        <div className={`px-4 py-2 rounded-lg border-2 text-sm font-bold text-center transition-all duration-500 ${s.color}`}>
          {s.text}
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">V-1-1. 트랜잭션이란 무엇인가</h1>
              </div>
              <p className="text-slate-600">계좌 이체를 예시로 <b>BEGIN / COMMIT / ROLLBACK</b>의 동작을 단계별로 확인합니다.</p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 min-h-[110px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[400px] flex flex-col justify-center">
                  <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">SQL 코드</div>
                  <div className="bg-slate-800 rounded-lg p-4 font-mono text-sm text-slate-200 leading-relaxed whitespace-pre-wrap overflow-x-auto">{stepData.sql}</div>
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button aria-label={isPlaying?'자동 재생 정지':'자동 재생 시작'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                    </button>
                    <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex gap-1">{STEPS.map((s,i)=>(<button key={i} aria-label={`Step ${i+1}: ${s.label}`} onClick={()=>{setCurrentStepIdx(i);setIsPlaying(false);}} className={`w-2.5 h-2.5 rounded-full transition-all ${i===currentStepIdx?'bg-blue-600 scale-125':i<currentStepIdx?'bg-blue-300':'bg-slate-200'}`}/>))}</div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">{currentStepIdx+1} / {STEPS.length}</div>
                  </div>
                </div>
              </div>

              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-white flex flex-col">
                  <div className="flex items-center px-4 py-3 bg-slate-100 border-b border-slate-200 gap-2">
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-500 font-semibold">계좌 이체 시뮬레이션</span>
                  </div>
                  <div className="p-6 overflow-y-auto flex-1 space-y-4">
                    <TxIndicator state={stepData.txState} />

                    <div className="grid grid-cols-2 gap-4">
                      <AccountCard owner="김철수" balance={stepData.a} highlight={stepData.txState} label="계좌 1" />
                      <AccountCard owner="이영희" balance={stepData.b} highlight={stepData.txState} label="계좌 2" />
                    </div>

                    <div className="flex items-center justify-center py-2">
                      {stepData.txState === 'open' && (
                        <div className="flex items-center gap-2 px-4 py-2 bg-amber-50 border-2 border-amber-300 rounded-lg text-amber-700 font-bold text-sm">
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 9v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                          이체 30,000원 — 임시 상태 (다른 세션에 안 보임)
                        </div>
                      )}
                      {stepData.txState === 'committed' && (
                        <div className="flex items-center gap-2 px-4 py-2 bg-emerald-50 border-2 border-emerald-300 rounded-lg text-emerald-700 font-bold text-sm">
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                          이체 완료 — 모든 세션에서 확인 가능
                        </div>
                      )}
                      {stepData.txState === 'rolled_back' && (
                        <div className="flex items-center gap-2 px-4 py-2 bg-red-50 border-2 border-red-300 rounded-lg text-red-700 font-bold text-sm">
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                          ROLLBACK — 원래 상태로 복원 (원자성 보장)
                        </div>
                      )}
                    </div>

                    <div className="mt-2 p-3 bg-slate-50 rounded-lg border border-slate-200 text-xs text-slate-500">
                      <b>합계:</b> {(stepData.a + stepData.b).toLocaleString()}원 (항상 150,000원 유지 — 일관성)
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
