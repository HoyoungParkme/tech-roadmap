            "  SELECT balance FROM accounts WHERE id = 'A';  -- 1000",
            '  -- (다른 세션이 900 으로 커밋해도)',
            "  SELECT balance FROM accounts WHERE id = 'A';  -- 1000 (그대로)",
            'COMMIT;',
            '',
            '-- ④ SERIALIZABLE',
            '--    동시 실행 결과가 어떤 직렬 실행과 동등함을 보장',
            '--    충돌 감지되면 ERROR — 애플리케이션이 재시도해야 함',
            '--    → 가장 안전, 가장 비쌈. 금융/회계 같은 무결성 최우선에 사용',
            'BEGIN ISOLATION LEVEL SERIALIZABLE;',
            '  -- ... 동시 충돌 시:',
            '  -- ERROR: could not serialize access due to ...',
            '  -- → 클라이언트에서 BEGIN 부터 재시도',
            'COMMIT;',
            '',
            '-- 정리',
            '--  RC  ←→  RR  ←→  SER',
            '--  빠름        안전',
            '--  실무 99% 는 READ COMMITTED 로 충분',
            '--  돈/재고/예약 같은 케이스만 REPEATABLE READ 이상',
          ],
          highlight: [4, 5, 7, 8, 10, 15, 16, 17, 18, 19, 25, 26, 27, 28, 35, 36, 37, 38, 44, 45, 46, 47, 48],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — 계좌 박스 + 트랜잭션 로그 + 격리수준
    // ─────────────────────────────────────────────────────
    const TX_STYLE = {
      broken:     { label: '데이터 깨짐',  icon: '💥', bg: 'bg-red-100',     border: 'border-red-400',     text: 'text-red-800' },
      committed:  { label: '커밋 완료',    icon: '✓',  bg: 'bg-emerald-100', border: 'border-emerald-400', text: 'text-emerald-800' },
      rolledback: { label: '롤백됨',       icon: '↩', bg: 'bg-amber-100',    border: 'border-amber-400',   text: 'text-amber-800' },
      partial:    { label: '부분 커밋',    icon: '🪪', bg: 'bg-orange-100',  border: 'border-orange-400',  text: 'text-orange-800' },
      isolation:  { label: '격리 수준 비교', icon: '🔒', bg: 'bg-sky-100',     border: 'border-sky-400',     text: 'text-sky-800' },
    };

    const ACCOUNT_STATUS = {
      broken:     { bg: 'bg-red-50',      border: 'border-red-300',     text: 'text-red-800',     deltaText: 'text-red-600' },
      committed:  { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-800', deltaText: 'text-emerald-600' },
      rolledback: { bg: 'bg-slate-50',    border: 'border-slate-300',   text: 'text-slate-700',   deltaText: 'text-slate-500' },
    };

    function AccountBox({ account }) {
      const s = ACCOUNT_STATUS[account.status] || ACCOUNT_STATUS.committed;
      const deltaLabel =
        account.delta > 0 ? `+${account.delta}만원` :
        account.delta < 0 ? `${account.delta}만원` :
        '변동 없음';
      return (
        <div className={`rounded-lg border-2 ${s.bg} ${s.border} p-3`}>
          <div className="flex items-center justify-between mb-1">
            <span className={`text-xs font-bold ${s.text}`}>{account.label}</span>
            <span className={`text-[10px] font-bold ${s.deltaText}`}>{deltaLabel}</span>
          </div>
          <div className={`text-2xl font-mono font-bold ${s.text}`}>
            {account.balance}<span className="text-sm ml-1">만원</span>
          </div>
        </div>
      );
    }

    function TxStateBadge({ state, savepoint }) {
      const s = TX_STYLE[state] || TX_STYLE.committed;
      return (
        <div className={`rounded-lg border-2 ${s.bg} ${s.border} px-3 py-2 flex items-center justify-between`}>
          <div className="flex items-center gap-2">
            <span className="text-lg">{s.icon}</span>
            <span className={`text-sm font-bold ${s.text}`}>{s.label}</span>
          </div>
          {savepoint && (
            <span className="text-[10px] px-2 py-0.5 rounded bg-orange-200 text-orange-800 font-mono">
              SAVEPOINT {savepoint}
            </span>
          )}
        </div>
      );
    }

    const LOG_TAG_STYLE = {
      BEGIN:    'bg-orange-200 text-orange-900',
      COMMIT:   'bg-emerald-200 text-emerald-900',
      ROLLBACK: 'bg-amber-200 text-amber-900',
      SAVE:     'bg-orange-200 text-orange-900',
      BACK:     'bg-amber-200 text-amber-900',
      SQL:      'bg-slate-200 text-slate-700',
      ERR:      'bg-red-200 text-red-800',
      '결과':   'bg-slate-300 text-slate-800',
    };

    function TxLogList({ log }) {
      if (!log || log.length === 0) return null;
      return (
        <div className="mt-3 space-y-1">
          {log.map((entry, i) => {
            const tagClass = LOG_TAG_STYLE[entry.tag] || 'bg-slate-200 text-slate-700';
            return (
              <div
                key={i}
                className={`flex items-start gap-2 text-xs p-1.5 rounded ${entry.ok ? 'bg-white border border-slate-200' : 'bg-red-50 border border-red-200'}`}
              >
                <span className={`text-[10px] font-bold font-mono px-1.5 py-0.5 rounded ${tagClass}`}>{entry.tag}</span>
                <span className={`flex-1 ${entry.ok ? 'text-slate-700' : 'text-red-700'}`}>{entry.text}</span>
              </div>
            );
          })}
        </div>
      );
    }

    const ISO_SAFETY_STYLE = [
      'bg-slate-100 text-slate-700 border-slate-300',
      'bg-amber-100 text-amber-800 border-amber-300',
      'bg-orange-100 text-orange-800 border-orange-300',
      'bg-emerald-100 text-emerald-800 border-emerald-300',
    ];

    function IsolationList({ levels }) {
      if (!levels) return null;
      return (
        <div className="mt-3 space-y-1.5">
          {levels.map((lv, i) => {
            const safetyClass = ISO_SAFETY_STYLE[lv.safe - 1];
            return (
              <div key={i} className={`rounded-lg border ${safetyClass} px-2.5 py-1.5`}>
                <div className="flex items-center justify-between">
                  <span className="text-xs font-bold font-mono">{lv.level}</span>
                  <span className="text-[10px]">
                    {'★'.repeat(lv.safe)}
                    <span className="opacity-30">{'★'.repeat(4 - lv.safe)}</span>
                  </span>
                </div>
                <div className="text-[11px] mt-0.5 opacity-90">{lv.note}</div>
              </div>
            );
          })}
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-orange-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-orange-800">계좌 & 트랜잭션 시뮬레이션</h3>
            <span className="text-[10px] text-slate-500">송금 A → B</span>
          </div>

          {/* 계좌 박스 2개 */}
          <div className="grid grid-cols-2 gap-3 mb-3">
            <AccountBox account={state.accountA} />
            <AccountBox account={state.accountB} />
          </div>

          {/* 트랜잭션 상태 뱃지 */}
          <TxStateBadge state={state.txState} savepoint={state.savepoint} />

          {/* 트랜잭션 진행 로그 */}
          <TxLogList log={state.txLog} />

          {/* 격리 수준 리스트 (Step 5 에만 등장) */}
          <IsolationList levels={state.isolation} />

          {/* 핵심 메시지 */}
          <div className="mt-auto pt-3">
            <div className="text-xs text-orange-900 bg-orange-50 border border-orange-200 rounded p-2">
              💡 {state.keyPoint}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-orange-500/15 border-l-2 border-orange-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-orange-600 text-white font-bold">V</span>
              <div>
                <h1 className="text-2xl font-bold text-orange-900">Chapter V-1-1. 트랜잭션이란</h1>
                <p className="text-sm text-orange-800/80">송금 시나리오로 보는 BEGIN/COMMIT/ROLLBACK · SAVEPOINT · 격리 수준</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-orange-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-orange-600' : 'bg-orange-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-orange-700 text-orange-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-orange-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-orange-700 text-white' : 'bg-orange-600 text-white hover:bg-orange-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-orange-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-orange-400 bg-white px-4 py-3 text-sm text-orange-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                트랜잭션 = BEGIN ~ COMMIT 묶음. 중간 에러 시 ROLLBACK 으로 모두 취소. SAVEPOINT 로 부분만 되돌리기. 격리 수준으로 동시성 안전성 조절. PostgreSQL 기본은 READ COMMITTED, 무결성 최우선이면 REPEATABLE READ 또는 SERIALIZABLE.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['트랜잭션', 'BEGIN', 'COMMIT', 'ROLLBACK', 'SAVEPOINT', '격리수준', 'ACID', 'PostgreSQL'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-orange-100 text-orange-800 border border-orange-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-orange-700">
              <a href="./index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./chapter-v-1-2.html" className="underline hover:no-underline">다음: V-1-2 ACID 속성 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
