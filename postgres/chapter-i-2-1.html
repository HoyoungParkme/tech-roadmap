          ],
          highlight: [3, 4, 5, 7, 8, 9, 10, 12, 13, 15, 16, 17, 18, 19, 20, 21, 23, 24, 25, 32, 33, 34, 35, 37, 38, 39, 40],
        },
      },
      {
        title: 'Step 5. 데이터 타입 안전성 — "abc"가 amount 컬럼에 들어가도 막을 수 없음 (스키마 강제 불가)',
        desc: 'CSV는 그냥 텍스트다. amount 컬럼에 "abc"가 들어가도, sold_at에 "내일"이라고 적혀도, 파일은 아무 불평 없이 받는다. 다음에 평균 매출을 계산할 때 프로그램이 죽거나 잘못된 결과가 나온다. 데이터베이스는 CREATE TABLE 시 컬럼 타입을 지정하면 어긋난 값을 거부한다 (스키마 강제 = Consistency). CSV에는 이 보호가 없다 — 한 줄만 잘못 들어가도 전체 분석이 망가질 수 있다. 여기까지 4가지 한계를 모두 봤다. 이제 데이터베이스가 어떻게 해결하는지 보자.',
        csvBox: {
          filename: 'sales.csv',
          rows: 1000000,
          status: 'dirty',
          note: '"abc" in amount · "내일" in sold_at — 그냥 통과됨',
        },
        limits: [
          { id: 'search',     label: '① 검색 속도',   status: 'active', detail: 'CSV: Full Scan — DB: 인덱스 0.001초' },
          { id: 'concurrent', label: '② 동시 수정',   status: 'active', detail: 'CSV: Lost Update — DB: 트랜잭션' },
          { id: 'torn',       label: '③ 부분 쓰기',   status: 'active', detail: 'CSV: 깨짐 — DB: WAL 복구' },
          { id: 'schema',     label: '④ 타입 안전성', status: 'active', detail: 'CSV: 무방비 — DB: 스키마 강제' },
        ],
        solution: {
          title: 'PostgreSQL 이 해결하는 방법',
          features: [
            '인덱스 (B-Tree, Hash) — 검색을 O(log N) 으로 단축',
            '트랜잭션 + Row Lock — Lost Update 자동 방지',
            'WAL (Write-Ahead Log) — 정전에도 데이터 복구',
            '스키마 + CHECK 제약 — 타입/범위 어긋난 값 거부',
            'ACID 통째로 보장 — Atomicity / Consistency / Isolation / Durability',
          ],
        },
        keyPoint: 'CSV의 4가지 한계는 모두 "텍스트 파일이라는 본질" 에서 온다. DB는 그 본질을 바꾼다.',
        code: {
          lang: 'csv',
          filename: 'type-unsafe.csv',
          lines: [
            '# Step 5. 스키마 강제 불가 — CSV 는 아무 값이나 받는다',
            '# 카페 알바생이 매출 입력 자동화 스크립트를 작성했는데 버그가 있었다.',
            '',
            'sold_at,store,product,amount',
            '2026-05-10,강남점,아메리카노,4500',
            '2026-05-10,강남점,라떼,5500',
            '2026-05-11,강남점,아메리카노,abc           ← 숫자 자리에 문자',
            '2026-05-11,강남점,카푸치노,5500',
            '내일,강남점,에스프레소,3500                 ← 날짜 자리에 한국어',
            '2026-05-12,강남점,아메리카노,-4500          ← 음수 매출 (현실 불가)',
            '2026-05-12,강남점,라떼,5500',
            '2026-05-12,,아메리카노,4500                 ← store 비어 있음',
            '2026-05-13,강남점,바닐라라떼,6000',
            '2026-05-13,강남점,콜드브루,5500999999999    ← 비현실적 큰 값',
            '',
            '# 결과: 파일은 잘 저장됨. 아무 에러 없음.',
            '# 그러나 분석 시:',
            '#   df = pd.read_csv("sales.csv")',
            '#   df["amount"].mean()',
            "#   → ValueError: could not convert string to float: 'abc'",
            '',
            '# 또는 SUM 계산이 음수로 망가지고, 평균이 5억으로 튀어오른다.',
            '',
            '# 비교: PostgreSQL 이라면?',
            '#   CREATE TABLE sales (',
            '#     id        SERIAL PRIMARY KEY,',
            '#     sold_at   DATE NOT NULL,                       -- 날짜 강제',
            '#     store     TEXT NOT NULL,                       -- 빈 값 거부',
            '#     product   TEXT NOT NULL,',
            '#     amount    INTEGER NOT NULL CHECK (amount > 0)  -- 양수 강제',
            '#   );',
            '',
            "#   INSERT INTO sales VALUES (..., 'abc');",
            '#   → ERROR: invalid input syntax for type integer: "abc"',
            '',
            '#   INSERT INTO sales VALUES (..., -4500);',
            '#   → ERROR: violates check constraint "sales_amount_check"',
            '',
            '# 핵심: DB 는 잘못된 데이터를 "입력 시점에" 거부한다.',
            '#       CSV 는 잘못된 데이터를 "분석 시점에" 폭발시킨다.',
            '#       어느 쪽이 데이터를 안전하게 지키는가?',
            '',
            '# → 결론: CSV 의 4가지 한계 = DB 가 존재하는 이유',
          ],
          highlight: [3, 6, 8, 9, 11, 13, 23, 24, 25, 26, 27, 28, 29, 30, 32, 33, 35, 36, 38, 39, 40, 42],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — CSV 파일 박스 + 4가지 한계 카드 (orange 톤)
    // ─────────────────────────────────────────────────────
    const LIMIT_STYLE = {
      idle:   { bg: 'bg-slate-100',   border: 'border-slate-300',   text: 'text-slate-600',   dot: 'bg-slate-400' },
      ok:     { bg: 'bg-emerald-50',  border: 'border-emerald-300', text: 'text-emerald-800', dot: 'bg-emerald-500' },
      active: { bg: 'bg-orange-50',   border: 'border-orange-400',  text: 'text-orange-900',  dot: 'bg-orange-500' },
    };

    const CSV_STATUS_STYLE = {
      healthy:   { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-800', icon: '✓' },
      slow:      { bg: 'bg-amber-50',   border: 'border-amber-400',   text: 'text-amber-900',   icon: '🐢' },
      conflict:  { bg: 'bg-orange-50',  border: 'border-orange-400',  text: 'text-orange-900',  icon: '⚔' },
      corrupted: { bg: 'bg-red-50',     border: 'border-red-400',     text: 'text-red-900',     icon: '⚡' },
      dirty:     { bg: 'bg-rose-50',    border: 'border-rose-400',    text: 'text-rose-900',    icon: '✗' },
    };

    function CsvFileBox({ csvBox }) {
      const s = CSV_STATUS_STYLE[csvBox.status] || CSV_STATUS_STYLE.healthy;
      return (
        <div className={`rounded-lg border-2 ${s.bg} ${s.border} px-3 py-3`}>
          <div className="flex items-center gap-2 mb-1">
            <span className="text-2xl">{s.icon}</span>
            <div className="flex-1">
              <div className={`font-mono text-sm font-bold ${s.text}`}>{csvBox.filename}</div>
              <div className={`text-[11px] ${s.text} opacity-80`}>{csvBox.rows.toLocaleString()} rows</div>
            </div>
          </div>
          <div className={`text-xs ${s.text} mt-1`}>{csvBox.note}</div>
        </div>
      );
    }

    function LimitCard({ item }) {
      const s = LIMIT_STYLE[item.status] || LIMIT_STYLE.idle;
      const isActive = item.status === 'active';
      return (
        <div
          className={`rounded-lg border ${s.bg} ${s.border} px-3 py-2 flex items-center justify-between ${
            isActive ? 'ring-2 ring-orange-400 ring-offset-1' : ''
          }`}
        >
          <div className="flex items-center gap-2 min-w-0">
            <span className={`w-2 h-2 rounded-full ${s.dot} flex-shrink-0`}></span>
            <span className={`text-xs font-bold ${s.text} flex-shrink-0`}>{item.label}</span>
          </div>
          <span className={`text-[10px] ${s.text} text-right ml-2 truncate`} title={item.detail}>
            {item.detail}
          </span>
        </div>
      );
    }

    function SolutionBox({ solution }) {
      if (!solution) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-orange-500 bg-gradient-to-br from-orange-50 to-amber-50 p-4">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl">🐘</span>
            <span className="text-base font-bold text-orange-800">{solution.title}</span>
          </div>
          <ul className="space-y-1.5">
            {solution.features.map((f, i) => (
              <li key={i} className="text-sm text-orange-900 flex gap-2">
                <span className="text-orange-500 mt-0.5">✓</span>
                <span>{f}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-orange-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-orange-800">CSV 파일 상태 + 4가지 한계</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 시나리오 상태</span>
          </div>

          {/* CSV 파일 박스 */}
          <CsvFileBox csvBox={state.csvBox} />

          {/* 4가지 한계 카드 */}
          <div className="mt-3 space-y-2">
            {state.limits.map((it) => (
              <LimitCard key={it.id} item={it} />
            ))}
          </div>

          {/* DB 해결 박스 (Step 5만) */}
          <SolutionBox solution={state.solution} />

          {/* keyPoint 띠 */}
          <div className="mt-3 text-xs text-orange-900 bg-orange-50 border border-orange-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-orange-500/15 border-l-2 border-orange-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-orange-600 text-white font-bold">I</span>
              <div>
                <h1 className="text-2xl font-bold text-orange-900">Chapter I-2-1. 텍스트 파일과 CSV의 한계</h1>
                <p className="text-sm text-orange-800/80">검색 느림 · Lost Update · Torn Write · 스키마 강제 불가 — 4가지 한계로 추적</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-orange-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-orange-600' : 'bg-orange-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-orange-700 text-orange-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-orange-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-orange-700 text-white' : 'bg-orange-600 text-white hover:bg-orange-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-orange-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-orange-400 bg-white px-4 py-3 text-sm text-orange-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                CSV의 4가지 한계 — ① 검색 느림(인덱스 없음) ② Lost Update(동시성 없음) ③ Torn Write(트랜잭션 없음) ④ 타입 안전성 없음(스키마 강제 불가) — 가 곧 데이터베이스가 존재해야 하는 이유다. 다음 챕터(I-2-2)에서는 데이터베이스가 이 4가지를 구체적으로 어떻게 해결하는지 살펴본다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['CSV', 'Full Scan', '인덱스', 'Lost Update', 'Torn Write', 'WAL', '스키마', 'ACID', 'PostgreSQL'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-orange-100 text-orange-800 border border-orange-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-orange-700">
              <a href="./chapter-i-1-2.html" className="underline hover:no-underline">← 이전: I-1-2</a>
              <a href="./chapter-i-2-2.html" className="underline hover:no-underline">다음: I-2-2 데이터베이스가 해결하는 방법 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
