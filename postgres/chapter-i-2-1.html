<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — Chapter I-2-1. 텍스트 파일과 CSV의 한계</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        label: "정상 CSV",
        desc: "[Step 1: CSV 파일 — 정상 상태] 팀원 명단이 CSV 파일 하나에 저장되어 있습니다. 이름, 나이, 부서 세 열로 구조가 잡혀 있고, 현재는 한 사람만 파일을 열어 작업 중입니다. 아직 아무 문제가 없습니다.",
        phase: 'normal',
        fileA: [['Alice','25','개발팀'],['Bob','30','기획팀'],['Carol','22','디자인팀']],
        fileB: null,
        conflict: false,
        searchHighlight: null
      },
      {
        label: "동시 수정 충돌",
        desc: "[Step 2: 동시 접근 문제] 두 사람이 같은 CSV 파일을 동시에 엽니다. A가 Bob의 나이를 31로 수정하고, B가 Bob의 부서를 '마케팅팀'으로 변경합니다. 둘 다 저장하면 나중에 저장한 사람의 변경만 남고, 먼저 저장한 사람의 수정은 사라집니다.",
        phase: 'conflict',
        fileA: [['Alice','25','개발팀'],['Bob','31','기획팀'],['Carol','22','디자인팀']],
        fileB: [['Alice','25','개발팀'],['Bob','30','마케팅팀'],['Carol','22','디자인팀']],
        conflict: true,
        searchHighlight: null
      },
      {
        label: "검색 속도 문제",
        desc: "[Step 3: 순차 탐색의 한계] CSV에서 'Carol'을 찾으려면 파일의 첫 줄부터 한 줄씩 읽어야 합니다. 3명이면 금방이지만, 100만 명이면? 최악의 경우 100만 줄을 모두 읽어야 합니다. 이것이 순차 탐색(sequential scan)입니다. 데이터가 늘어날수록 검색이 느려집니다.",
        phase: 'search',
        fileA: [['Alice','25','개발팀'],['Bob','30','기획팀'],['Carol','22','디자인팀']],
        fileB: null,
        conflict: false,
        searchHighlight: 2
      },
      {
        label: "데이터 일관성 문제",
        desc: "[Step 4: 일관성 문제] Alice의 나이를 26으로 바꾸던 중 프로그램이 강제 종료되었습니다. 파일에는 '2'만 쓰여 있고 '6'은 기록되지 않았습니다. 이름은 'Alice'인데 나이가 '2'로 남아 데이터가 깨졌습니다. CSV는 '전부 성공하거나 전부 취소' 같은 안전 장치가 없습니다.",
        phase: 'consistency',
        fileA: [['Alice','2','개발팀'],['Bob','30','기획팀'],['Carol','22','디자인팀']],
        fileB: null,
        conflict: false,
        searchHighlight: null
      },
      {
        label: "DB가 해결",
        desc: "[Step 5: 데이터베이스는 이 세 가지를 해결한다] 동시 접근 → 잠금(Lock)으로 충돌 방지. 느린 검색 → 인덱스로 빠른 조회. 일관성 → 트랜잭션으로 '전부 아니면 전무' 보장. 이 세 가지 한계가 DBMS가 존재하는 이유입니다.",
        phase: 'solution',
        fileA: [['Alice','25','개발팀'],['Bob','30','기획팀'],['Carol','22','디자인팀']],
        fileB: null,
        conflict: false,
        searchHighlight: null
      }
    ];

    function CsvTable({ data, label, highlight, broken, editorLabel }) {
      return (
        <div className="space-y-1">
          {editorLabel && <div className="text-xs font-bold text-slate-500 mb-1">{editorLabel}</div>}
          <div className="overflow-hidden rounded-lg border border-slate-300">
            <table className="w-full text-sm">
              <thead><tr className="bg-slate-600 text-white text-xs">
                <th className="p-2">이름</th><th className="p-2">나이</th><th className="p-2">부서</th>
              </tr></thead>
              <tbody>
                {data.map((row, i) => (
                  <tr key={i} className={`border-t border-slate-200 transition-all duration-300 ${
                    highlight === i ? 'bg-amber-100 ring-2 ring-amber-400' :
                    broken && i === 0 ? 'bg-red-100' : 'bg-white'
                  }`}>
                    <td className="p-2 font-mono">{row[0]}</td>
                    <td className={`p-2 font-mono ${broken && i === 0 ? 'text-red-600 font-bold' : ''}`}>{row[1]}</td>
                    <td className="p-2 font-mono">{row[2]}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(p => p - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) playIntervalRef.current = setInterval(() => handleNextRef.current(), 3500);
        else clearInterval(playIntervalRef.current);
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">I-2-1. 텍스트 파일과 CSV의 한계</h1>
              </div>
              <p className="text-slate-600">
                CSV 파일 하나로 데이터를 관리하면 <b>동시 수정 충돌</b>, <b>느린 검색</b>, <b>데이터 깨짐</b> 세 가지 문제가 발생합니다.
              </p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 min-h-[110px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[400px]">
                  <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">CSV 파일 시뮬레이션</div>

                  {stepData.phase === 'normal' && (
                    <div className="space-y-4">
                      <div className="text-sm text-slate-500 font-semibold">team_members.csv</div>
                      <CsvTable data={stepData.fileA} />
                      <div className="text-center text-sm text-emerald-600 font-medium">정상 상태 — 문제 없음</div>
                    </div>
                  )}

                  {stepData.phase === 'conflict' && (
                    <div className="space-y-4">
                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <CsvTable data={stepData.fileA} editorLabel="사용자 A가 수정" highlight={1} />
                          <div className="text-xs text-blue-500 mt-1 text-center">Bob 나이: 30 → <b>31</b></div>
                        </div>
                        <div>
                          <CsvTable data={stepData.fileB} editorLabel="사용자 B가 수정" highlight={1} />
                          <div className="text-xs text-purple-500 mt-1 text-center">Bob 부서: 기획팀 → <b>마케팅팀</b></div>
                        </div>
                      </div>
                      <div className="p-3 bg-red-50 border-2 border-red-300 rounded-lg text-center">
                        <div className="text-red-600 font-bold text-sm">충돌! 나중에 저장한 사람의 변경만 남음</div>
                        <div className="text-xs text-red-400 mt-1">먼저 저장한 수정은 덮어쓰기로 사라짐</div>
                      </div>
                    </div>
                  )}

                  {stepData.phase === 'search' && (
                    <div className="space-y-4">
                      <div className="text-sm text-slate-500 font-semibold">"Carol 찾기" — 순차 탐색</div>
                      <CsvTable data={stepData.fileA} highlight={stepData.searchHighlight} />
                      <div className="space-y-2">
                        <div className="flex items-center gap-2 text-sm">
                          <div className="w-6 h-6 bg-slate-200 rounded flex items-center justify-center text-xs">1</div>
                          <span className="text-slate-400 line-through">Alice — 아님</span>
                        </div>
                        <div className="flex items-center gap-2 text-sm">
                          <div className="w-6 h-6 bg-slate-200 rounded flex items-center justify-center text-xs">2</div>
                          <span className="text-slate-400 line-through">Bob — 아님</span>
                        </div>
                        <div className="flex items-center gap-2 text-sm">
                          <div className="w-6 h-6 bg-amber-400 text-white rounded flex items-center justify-center text-xs font-bold">3</div>
                          <span className="text-amber-700 font-bold">Carol — 찾음!</span>
                        </div>
                      </div>
                      <div className="text-xs text-slate-400">100만 명이면? 최악 100만 줄을 모두 읽어야 함</div>
                    </div>
                  )}

                  {stepData.phase === 'consistency' && (
                    <div className="space-y-4">
                      <div className="text-sm text-red-500 font-semibold">수정 중 프로그램 강제 종료!</div>
                      <CsvTable data={stepData.fileA} broken={true} />
                      <div className="p-3 bg-red-50 border-2 border-red-300 rounded-lg">
                        <div className="text-sm text-red-700">
                          <b>Alice의 나이: 25 → 26 수정 중 crash</b><br/>
                          파일에 '2'만 쓰이고 '6'은 기록 실패 → 나이가 <b className="text-red-600">'2'</b>로 깨짐
                        </div>
                        <div className="text-xs text-red-400 mt-1">"전부 성공하거나 전부 취소" 같은 안전 장치가 없음</div>
                      </div>
                    </div>
                  )}

                  {stepData.phase === 'solution' && (
                    <div className="space-y-3">
                      <div className="text-sm text-emerald-600 font-semibold">데이터베이스가 해결하는 방법</div>
                      {[
                        { problem: '동시 접근 충돌', solution: '잠금(Lock)으로 충돌 방지', icon: '🔒' },
                        { problem: '느린 검색', solution: '인덱스로 즉시 조회', icon: '🔍' },
                        { problem: '데이터 깨짐', solution: '트랜잭션으로 전부 아니면 전무', icon: '🛡️' }
                      ].map((item, i) => (
                        <div key={i} className="flex items-center gap-3 p-3 bg-emerald-50 border border-emerald-200 rounded-lg">
                          <div className="text-2xl">{item.icon}</div>
                          <div>
                            <div className="text-xs text-red-400 line-through">{item.problem}</div>
                            <div className="text-sm text-emerald-700 font-bold">{item.solution}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* 컨트롤 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                    </button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex gap-1">
                      {STEPS.map((_, i) => (
                        <button key={i} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                          className={`w-2.5 h-2.5 rounded-full transition-all ${i === currentStepIdx ? 'bg-blue-600 scale-125' : i < currentStepIdx ? 'bg-blue-300' : 'bg-slate-200'}`} />
                      ))}
                    </div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">{currentStepIdx + 1} / {STEPS.length}</div>
                  </div>
                </div>
              </div>

              {/* 오른쪽 패널 */}
              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-white flex flex-col">
                  <div className="flex items-center px-4 py-3 bg-slate-100 border-b border-slate-200">
                    <div className="w-3 h-3 rounded-full bg-red-400 opacity-80 mr-1"></div>
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80 mr-2"></div>
                    <span className="text-xs text-slate-500 font-semibold">CSV의 세 가지 한계</span>
                  </div>
                  <div className="p-6 overflow-y-auto flex-1 space-y-4">
                    {[
                      { title: '1. 동시 접근 문제', desc: '두 사람이 동시에 같은 파일을 수정하면 나중에 저장한 사람의 변경만 남는다.', active: stepData.phase === 'conflict', color: 'red' },
                      { title: '2. 검색 속도 문제', desc: '원하는 데이터를 찾으려면 파일 전체를 처음부터 읽어야 한다(순차 탐색). 데이터가 많을수록 느려진다.', active: stepData.phase === 'search', color: 'amber' },
                      { title: '3. 데이터 일관성 문제', desc: '수정 도중 오류가 나면 데이터가 반만 쓰여 깨진다. "전부 성공 아니면 전부 취소" 보장이 없다.', active: stepData.phase === 'consistency', color: 'orange' }
                    ].map((item, i) => (
                      <div key={i} className={`p-4 rounded-lg border-2 transition-all duration-500 ${
                        item.active ? `border-${item.color}-400 bg-${item.color}-50 scale-[1.02] shadow-md` : 'border-slate-200 bg-slate-50'
                      }`}>
                        <div className={`text-xs font-bold mb-1 ${item.active ? `text-${item.color}-600` : 'text-slate-400'}`}>{item.title}</div>
                        <div className="text-sm text-slate-700">{item.desc}</div>
                      </div>
                    ))}

                    <div className={`p-4 rounded-lg border-2 transition-all duration-500 ${
                      stepData.phase === 'solution' ? 'border-emerald-400 bg-emerald-50 scale-[1.02] shadow-md' : 'border-slate-200 bg-slate-50'
                    }`}>
                      <div className={`text-xs font-bold mb-1 ${stepData.phase === 'solution' ? 'text-emerald-600' : 'text-slate-400'}`}>DBMS의 해결책</div>
                      <div className="text-sm text-slate-700 space-y-1">
                        <div>동시 접근 → <b>잠금(Lock) + MVCC</b></div>
                        <div>느린 검색 → <b>인덱스(B-tree 등)</b></div>
                        <div>데이터 깨짐 → <b>트랜잭션(ACID)</b></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
