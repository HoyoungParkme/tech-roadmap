<!DOCTYPE html>
<html lang="ko">
<head>

  <title>PostgreSQL 인터랙티브 학습 — Chapter III-C-1-2. 조건 검색 WHERE</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>

  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" data-presets="env,react"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">

</head>
<body>
  <div id="root"></div>

  <!--
    PostgreSQL Chapter III-C-1-2 — 조건 검색 WHERE
    학습 목표: WHERE 절의 핵심 5가지 패턴을 익힌다.
              ① 비교 연산자 (=, !=, <, >)
              ② 논리 결합 (AND, OR, NOT)
              ③ LIKE 패턴 매칭 (%, _)
              ④ IN (a, b, c)
              ⑤ BETWEEN x AND y
    핵심 비유: products 테이블에서 원하는 상품만 골라내는 5가지 방법
    패턴: fastapi v1 — 좌(LiveDataPane: products 테이블 + 매칭 행 강조) / 우(VSCode CodeViewer)
    색상: orange (postgres 도메인)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // products 테이블 — 좌측 LiveDataPane 에 표시되는 원본 데이터
    //   id / name / category / price / stock
    //   8개 행을 두어 각 조건마다 매칭 행이 2~4개 나오도록 구성한다
    // ─────────────────────────────────────────────────────
    const PRODUCTS = [
      { id: 1, name: 'PostgreSQL 입문',     category: 'book',     price: 32000, stock: 15 },
      { id: 2, name: 'Python 웹 개발',      category: 'book',     price: 45000, stock: 8  },
      { id: 3, name: 'SQL 마스터 클래스',   category: 'course',   price: 89000, stock: 3  },
      { id: 4, name: 'postgis 확장 팩',     category: 'software', price: 12000, stock: 50 },
      { id: 5, name: '데이터베이스 설계',   category: 'book',     price: 28000, stock: 22 },
      { id: 6, name: 'PostgreSQL 튜닝',     category: 'book',     price: 55000, stock: 6  },
      { id: 7, name: 'Docker 핸즈온',       category: 'course',   price: 75000, stock: 11 },
      { id: 8, name: 'pgAdmin GUI Kit',     category: 'software', price: 9000,  stock: 30 },
    ];

    // ─────────────────────────────────────────────────────
    // 5단계 STEPS — phase 별로 매칭 함수와 SQL 코드 정의
    //   match     : (row) => boolean. 좌측 테이블에서 강조할 행
    //   condition : SQL WHERE 표현 (좌측 상단 박스에 표시)
    //   keyPoint  : 핵심 한 줄 정리
    //   code      : 우측 CodeViewer 탭 (lang/filename/lines/highlight)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. 비교 연산자 — =, !=, <, >',
        desc: 'WHERE 절의 가장 기본은 "이 컬럼이 어떤 값과 같은가/다른가/큰가/작은가" 를 비교하는 것이다. 등호(=)는 정확히 같은 값, !=(또는 <>)는 다른 값, < > <= >= 는 숫자/날짜 범위 비교. 예시는 price > 30000 — 가격이 3만원을 초과하는 상품만 골라낸다. 결과적으로 5개 행이 남는다. 비교 연산자는 SQL 의 가장 기본이며, 모든 WHERE 조건의 출발점이다.',
        phase: 'compare',
        condition: "price > 30000",
        match: (r) => r.price > 30000,
        keyPoint: '비교는 SQL 의 ABC. =, !=, <, >, <=, >= 6개를 먼저 익힌다.',
        code: {
          lang: 'sql',
          filename: 'compare.sql',
          lines: [
            '-- Step 1. 비교 연산자 — = != < > <= >=',
            '-- WHERE 절의 가장 기본. "컬럼 vs 값" 비교.',
            '',
            '-- ① 정확히 같음 (=)',
            "SELECT * FROM products WHERE category = 'book';",
            '-- → category 가 정확히 \'book\' 인 행만',
            '',
            '-- ② 다름 (!= 또는 <>)',
            "SELECT * FROM products WHERE category != 'book';",
            "SELECT * FROM products WHERE category <> 'book';  -- 동일",
            '',
            '-- ③ 크다 / 작다 (>, <)',
            'SELECT * FROM products WHERE price > 30000;',
            '-- → 3만원 초과 (3만원은 포함 안 됨)',
            '',
            'SELECT * FROM products WHERE stock < 10;',
            '-- → 재고 10개 미만 (10은 포함 안 됨)',
            '',
            '-- ④ 크거나 같다 / 작거나 같다 (>=, <=)',
            'SELECT * FROM products WHERE price >= 30000;',
            '-- → 3만원 이상 (3만원 포함)',
            '',
            'SELECT * FROM products WHERE stock <= 10;',
            '-- → 재고 10개 이하 (10 포함)',
            '',
            '-- ⑤ 실무 팁',
            '--   • 문자열도 비교 가능 (사전순): name > \'P\'',
            '--   • 날짜도 비교 가능: sold_at >= \'2026-01-01\'',
            '--   • NULL 과의 비교는 항상 NULL → IS NULL 사용',
            '',
            '-- 현재 화면 예시: price > 30000',
            '--   매칭 5개 행 (id 1, 2, 3, 5, 6, 7)',
          ],
          highlight: [4, 5, 8, 9, 10, 13, 14, 16, 17, 20, 21, 23, 24, 31, 32],
        },
      },
      {
        title: 'Step 2. 논리 결합 — AND / OR / NOT',
        desc: '조건이 하나로 부족하면 AND, OR, NOT 으로 여러 조건을 결합한다. AND 는 "둘 다 만족", OR 는 "하나만 만족해도 OK", NOT 은 "이 조건의 반대". 예시는 category = \'book\' AND price < 50000 — 책 중에서 5만원 미만인 상품만. 우선순위는 NOT > AND > OR 이므로 헷갈리면 괄호를 쓰는 것이 안전하다. 실무에서 가장 많이 쓰는 패턴 중 하나.',
        phase: 'boolean',
        condition: "category = 'book' AND price < 50000",
        match: (r) => r.category === 'book' && r.price < 50000,
        keyPoint: 'AND > OR 우선순위. 헷갈리면 괄호로 묶어라.',
        code: {
          lang: 'sql',
          filename: 'boolean.sql',
          lines: [
            '-- Step 2. 논리 결합 — AND / OR / NOT',
            '-- 여러 조건을 결합해서 더 정교하게 검색한다.',
            '',
            '-- ① AND — 둘 다 만족',
            'SELECT * FROM products',
            "WHERE category = 'book' AND price < 50000;",
            '-- → 책 카테고리이면서 5만원 미만',
            '',
            '-- ② OR — 하나만 만족해도 OK',
            'SELECT * FROM products',
            "WHERE category = 'book' OR category = 'course';",
            '-- → 책이거나 강의',
            '',
            '-- ③ NOT — 조건의 반대',
            'SELECT * FROM products',
            "WHERE NOT category = 'software';",
            '-- → software 가 아닌 것',
            "-- (category != 'software' 와 동일하지만 NOT 은 복잡한 표현에 유용)",
            '',
            '-- ④ 우선순위 함정 — NOT > AND > OR',
            'SELECT * FROM products',
            "WHERE category = 'book' OR category = 'course' AND price > 50000;",
            '-- ⚠ AND 가 먼저 평가됨!',
            "-- → category=\'book\' (전체) OR (category=\'course\' AND price>50000)",
            '',
            '-- ⑤ 괄호로 명확하게',
            'SELECT * FROM products',
            "WHERE (category = 'book' OR category = 'course')",
            '  AND price > 50000;',
            '-- → 책 또는 강의 중에서 5만원 초과',
            '',
            '-- 현재 화면 예시:',
            "--   category = 'book' AND price < 50000",
            '--   매칭: id 1, 5 (2건)',
          ],
          highlight: [4, 5, 6, 9, 10, 11, 14, 15, 16, 21, 22, 27, 28, 29],
        },
      },
      {
        title: 'Step 3. LIKE 패턴 매칭 — % 와 _',
        desc: '문자열의 일부만 알고 있을 때 사용하는 것이 LIKE 다. % 는 0개 이상의 임의 문자, _ 는 정확히 1글자. \'Post%\' 는 "Post"로 시작하는 모든 값, \'%SQL%\' 은 "SQL"을 포함하는 값, \'_ostgreSQL\' 은 첫 글자만 다르고 나머지는 똑같은 값을 찾는다. 대소문자 무시는 ILIKE 를 쓴다 (PostgreSQL 고유). 검색 기능 만들 때 거의 항상 등장한다.',
        phase: 'like',
        condition: "name LIKE 'Post%'",
        match: (r) => r.name.startsWith('Post'),
        keyPoint: '% = 여러 글자, _ = 한 글자. 대소문자 무시는 ILIKE.',
        code: {
          lang: 'sql',
          filename: 'like.sql',
          lines: [
            '-- Step 3. LIKE 패턴 매칭 — 와일드카드 % 와 _',
            '-- 문자열의 일부만 알고 있을 때 사용.',
            '',
            '-- ① 시작 일치 — Post로 시작하는 모든 값',
            "SELECT * FROM products WHERE name LIKE 'Post%';",
            '-- → \'PostgreSQL 입문\', \'PostgreSQL 튜닝\'',
            '',
            '-- ② 끝 일치 — \'Kit\' 로 끝나는 모든 값',
            "SELECT * FROM products WHERE name LIKE '%Kit';",
            '-- → \'pgAdmin GUI Kit\'',
            '',
            '-- ③ 포함 — \'SQL\' 이 어딘가에 있는 값',
            "SELECT * FROM products WHERE name LIKE '%SQL%';",
            '-- → \'PostgreSQL ...\', \'SQL 마스터 클래스\'',
            '',
            '-- ④ _ 와일드카드 — 정확히 1글자',
            "SELECT * FROM products WHERE name LIKE '_ostgreSQL%';",
            '-- → 첫 글자만 다르고 나머지는 PostgreSQL 인 값',
            '',
            '-- ⑤ ILIKE — 대소문자 무시 (PostgreSQL 고유)',
            "SELECT * FROM products WHERE name ILIKE '%postgres%';",
            '-- → \'PostgreSQL\' 도 매칭 (대소문자 상관없이)',
            '',
            '-- ⑥ 와일드카드 자체를 검색하려면 ESCAPE',
            "SELECT * FROM products WHERE name LIKE '%50\\%%' ESCAPE '\\';",
            '-- → \'50%\' 라는 문자열을 포함하는 값',
            '',
            '-- ⑦ 실무 팁 — 인덱스',
            "--   • LIKE 'Post%'  (앞 고정) → 인덱스 사용 가능",
            "--   • LIKE '%SQL'   (앞 가변) → 풀스캔 (느림)",
            '--   • 대용량은 pg_trgm 확장으로 GIN 인덱스 고려',
            '',
            '-- 현재 화면 예시:',
            "--   name LIKE 'Post%'",
            '--   매칭: id 1, 6 (2건)',
          ],
          highlight: [4, 5, 8, 9, 12, 13, 16, 17, 20, 21, 28, 29, 30],
        },
      },
      {
        title: 'Step 4. IN — 여러 값 중 하나와 매칭',
        desc: 'category = \'book\' OR category = \'course\' OR category = \'software\' 처럼 OR 가 길어지면 IN 으로 한 줄에 모은다. WHERE category IN (\'book\', \'course\') 는 카테고리가 둘 중 하나인 모든 행을 찾는다. NOT IN 은 그 반대. 서브쿼리와 결합하면 강력해진다 — 예: WHERE id IN (SELECT product_id FROM orders WHERE ...). 가독성도 좋고 옵티마이저도 잘 처리한다.',
        phase: 'in',
        condition: "category IN ('book', 'course')",
        match: (r) => ['book', 'course'].includes(r.category),
        keyPoint: 'IN (a, b, c) = OR 의 단축형. 가독성과 성능 모두 좋다.',
        code: {
          lang: 'sql',
          filename: 'in.sql',
          lines: [
            '-- Step 4. IN — 여러 값 중 하나와 매칭',
            '-- 긴 OR 체인을 깔끔하게 묶는다.',
            '',
            '-- ① OR 의 단축형',
            'SELECT * FROM products',
            "WHERE category IN ('book', 'course');",
            '-- → category 가 \'book\' 또는 \'course\'',
            '-- 아래와 동일:',
            'SELECT * FROM products',
            "WHERE category = 'book' OR category = 'course';",
            '',
            '-- ② NOT IN — 목록에 없는 값',
            'SELECT * FROM products',
            "WHERE category NOT IN ('software');",
            '-- → software 가 아닌 모든 행',
            '',
            '-- ③ 숫자 목록',
            'SELECT * FROM products WHERE id IN (1, 3, 5, 7);',
            '-- → id 가 1, 3, 5, 7 인 행',
            '',
            '-- ④ 서브쿼리와 결합 — 가장 강력한 활용',
            'SELECT * FROM products',
            'WHERE id IN (',
            '  SELECT product_id FROM orders',
            "  WHERE ordered_at >= '2026-05-01'",
            ');',
            '-- → 5월 이후 주문된 상품만',
            '',
            '-- ⑤ NOT IN 의 NULL 함정 ⚠',
            'SELECT * FROM products',
            "WHERE category NOT IN ('book', NULL);",
            '-- → 결과 0행! NULL 이 섞이면 NOT IN 은 항상 거짓',
            '-- 해결: WHERE category IS DISTINCT FROM \'book\'',
            '',
            '-- ⑥ 성능',
            '--   • IN 목록이 적당하면 옵티마이저가 잘 처리',
            '--   • 수천 개면 임시 테이블 JOIN 이 빠를 수 있음',
            '',
            '-- 현재 화면 예시:',
            "--   category IN ('book', 'course')",
            '--   매칭: id 1, 2, 3, 5, 6, 7 (6건)',
          ],
          highlight: [4, 5, 6, 12, 13, 14, 17, 18, 21, 22, 23, 24, 25],
        },
      },
      {
        title: 'Step 5. BETWEEN — 범위 검색',
        desc: 'price >= 10000 AND price <= 50000 처럼 "X 이상 Y 이하" 패턴은 BETWEEN 으로 한 줄에 쓸 수 있다. 양쪽 경계값이 포함된다는 점이 중요 (closed interval). 가격, 재고, 날짜에 자주 쓴다. 날짜 범위는 특히 BETWEEN 을 많이 쓰는데, 시각이 포함된 timestamp 라면 \'2026-05-15\' 가 \'2026-05-15 00:00:00\' 이라 그날 데이터가 누락될 수 있어 주의가 필요하다.',
        phase: 'between',
        condition: "price BETWEEN 10000 AND 50000",
        match: (r) => r.price >= 10000 && r.price <= 50000,
        keyPoint: 'BETWEEN x AND y = x 이상 y 이하 (양 끝 포함).',
        code: {
          lang: 'sql',
          filename: 'between.sql',
          lines: [
            '-- Step 5. BETWEEN — 범위 검색 (양 끝 포함)',
            '-- "X 이상 Y 이하" 를 한 줄로.',
            '',
            '-- ① 숫자 범위',
            'SELECT * FROM products',
            'WHERE price BETWEEN 10000 AND 50000;',
            '-- → 1만원 이상 5만원 이하 (양쪽 포함)',
            '-- 아래와 동일:',
            'SELECT * FROM products',
            'WHERE price >= 10000 AND price <= 50000;',
            '',
            '-- ② NOT BETWEEN — 범위 밖',
            'SELECT * FROM products',
            'WHERE price NOT BETWEEN 10000 AND 50000;',
            '-- → 1만원 미만 또는 5만원 초과',
            '',
            '-- ③ 날짜 범위 (자주 쓰는 패턴)',
            'SELECT * FROM orders',
            "WHERE ordered_at BETWEEN '2026-05-01' AND '2026-05-31';",
            '-- → 5월 1일부터 5월 31일까지',
            '',
            '-- ④ ⚠ timestamp 함정',
            "-- '2026-05-31' = '2026-05-31 00:00:00' 으로 해석된다",
            "-- → 5월 31일 오후 주문은 누락!",
            '-- 해결책 1: 다음달 00:00 미만',
            'SELECT * FROM orders',
            "WHERE ordered_at >= '2026-05-01'",
            "  AND ordered_at <  '2026-06-01';",
            '-- 해결책 2: 날짜 부분만 추출',
            'SELECT * FROM orders',
            "WHERE ordered_at::date BETWEEN '2026-05-01' AND '2026-05-31';",
            '',
            '-- ⑤ 문자열 범위 (사전순)',
            'SELECT * FROM products',
            "WHERE name BETWEEN 'A' AND 'Q';",
            '-- → 사전순으로 A 이상 Q 이하인 이름',
            '',
            '-- 현재 화면 예시:',
            '--   price BETWEEN 10000 AND 50000',
            '--   매칭: id 1, 2, 4, 5 (4건)',
          ],
          highlight: [4, 5, 6, 12, 13, 14, 17, 18, 19, 22, 23, 24, 25, 26, 27, 28],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — products 테이블 + 매칭 행 강조
    // ─────────────────────────────────────────────────────
    function ProductRow({ row, matched }) {
      const base = 'border-b border-orange-100 transition-all duration-500';
      const cls = matched
        ? 'bg-orange-100 border-l-4 border-l-orange-500 font-semibold text-orange-900'
        : 'opacity-40 text-slate-500';
      return (
        <tr className={`${base} ${cls}`}>
          <td className="px-2 py-1.5 text-center w-8">{row.id}</td>
          <td className="px-2 py-1.5 font-mono text-xs">{row.name}</td>
          <td className="px-2 py-1.5">
            <span className={`text-[10px] px-1.5 py-0.5 rounded ${matched ? 'bg-orange-200 text-orange-900' : 'bg-slate-200 text-slate-600'}`}>
              {row.category}
            </span>
          </td>
          <td className="px-2 py-1.5 text-right font-mono text-xs">{row.price.toLocaleString()}</td>
          <td className="px-2 py-1.5 text-right font-mono text-xs">{row.stock}</td>
          <td className="px-2 py-1.5 text-center w-10">
            {matched
              ? <span className="text-orange-600 font-bold">●</span>
              : <span className="text-slate-300">○</span>}
          </td>
        </tr>
      );
    }

    function LiveDataPane({ step }) {
      const matchedIds = PRODUCTS.filter(step.match).map((r) => r.id);
      const matchedSet = new Set(matchedIds);
      return (
        <div className="rounded-xl border border-orange-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-orange-800">products 테이블 — 매칭 시뮬레이션</h3>
            <span className="text-[10px] text-slate-500">8행 중 {matchedIds.length}행 매칭</span>
          </div>

          {/* WHERE 조건 박스 */}
          <div className="mb-3 rounded-lg bg-slate-900 px-3 py-2 font-mono text-xs">
            <span className="text-slate-400">SELECT * FROM products WHERE </span>
            <span className="text-orange-300 font-bold">{step.condition}</span>
            <span className="text-slate-400">;</span>
          </div>

          {/* 테이블 박스 */}
          <div className="rounded-lg border border-orange-200 overflow-hidden bg-orange-50/30">
            <table className="w-full text-xs">
              <thead className="bg-orange-200/60 text-orange-900">
                <tr>
                  <th className="px-2 py-2 text-center w-8">id</th>
                  <th className="px-2 py-2 text-left">name</th>
                  <th className="px-2 py-2 text-left">category</th>
                  <th className="px-2 py-2 text-right">price</th>
                  <th className="px-2 py-2 text-right">stock</th>
                  <th className="px-2 py-2 text-center w-10">매칭</th>
                </tr>
              </thead>
              <tbody>
                {PRODUCTS.map((r) => (
                  <ProductRow key={r.id} row={r} matched={matchedSet.has(r.id)} />
                ))}
              </tbody>
            </table>
          </div>

          {/* 결과 박스 */}
          <div className="mt-3 rounded-lg border-2 border-orange-400 bg-orange-50 px-3 py-2">
            <div className="text-[10px] font-bold text-orange-700 uppercase tracking-wider mb-1">결과</div>
            <div className="text-sm text-orange-900">
              매칭된 행: <span className="font-bold text-orange-700">{matchedIds.length}</span>건
              {matchedIds.length > 0 && (
                <span className="ml-2 font-mono text-xs text-orange-800">
                  (id: {matchedIds.join(', ')})
                </span>
              )}
            </div>
          </div>

          {/* keyPoint */}
          <div className="mt-3 text-xs text-orange-900 bg-orange-50 border border-orange-200 rounded p-2">
            💡 {step.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer — 5개 SQL 탭, highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ steps, stepIdx, onTabClick }) {
      const code = steps[stepIdx].code;
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [stepIdx]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 윈도우 상단 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>

          {/* 탭 바 */}
          <div className="flex bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {steps.map((s, i) => {
              const active = i === stepIdx;
              return (
                <button
                  key={i}
                  onClick={() => onTabClick(i)}
                  className={`px-3 py-1.5 text-xs font-mono whitespace-nowrap border-r border-slate-700 transition ${
                    active
                      ? 'bg-[#282c34] text-orange-300 border-b-2 border-b-orange-500'
                      : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'
                  }`}
                >
                  {s.code.filename}
                </button>
              );
            })}
          </div>

          {/* 코드 영역 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-orange-500/15 border-l-2 border-orange-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1 whitespace-pre"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>

          {/* 하단 상태바 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {steps.length}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 컨트롤, 키보드, 자동재생
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동재생 3000ms
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-orange-600 text-white font-bold">III</span>
              <div>
                <h1 className="text-2xl font-bold text-orange-900">Chapter III-C-1-2. 조건 검색 WHERE</h1>
                <p className="text-sm text-orange-800/80">비교 → 논리 결합 → LIKE → IN → BETWEEN. 5단계로 추적</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-orange-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-orange-600' : 'bg-orange-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-orange-700 text-orange-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-orange-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane step={step} />
              <CodeViewer steps={STEPS} stepIdx={stepIdx} onTabClick={setStepIdx} />
            </div>

            {/* 컨트롤 — 4버튼 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-orange-700 text-white' : 'bg-orange-600 text-white hover:bg-orange-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-orange-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 정리 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-orange-400 bg-white px-4 py-3 text-sm text-orange-900">
                <div className="font-bold mb-1">✅ WHERE 5종 한눈에</div>
                비교(=, !=, &lt;, &gt;) → 결합(AND/OR/NOT) → 패턴(LIKE %, _) → 목록(IN) → 범위(BETWEEN).
                이 5가지면 실무 SQL 의 90% 는 작성할 수 있다. 다음 챕터에서는 NULL 처리와 정렬(ORDER BY) 로 넘어간다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['WHERE', '비교', 'AND', 'OR', 'NOT', 'LIKE', 'ILIKE', 'IN', 'BETWEEN', 'PostgreSQL'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-orange-100 text-orange-800 border border-orange-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-orange-700">
              <a href="./index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./chapter-iii-c-1-3.html" className="underline hover:no-underline">다음: III-C-1-3 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
