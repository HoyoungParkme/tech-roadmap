<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — Chapter III-C-1-2. 조건 검색</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const DATA = [
      { id: 1, name: 'PostgreSQL 입문', category: 'books', price: 32000, desc: 'SQL 기초부터' },
      { id: 2, name: 'Python 웹 개발', category: 'books', price: 45000, desc: null },
      { id: 3, name: 'SQL 마스터 클래스', category: 'courses', price: 89000, desc: '실전 SQL 강의' },
      { id: 4, name: 'postgis 확장 팩', category: 'software', price: 0, desc: '지리 데이터 확장' },
      { id: 5, name: '데이터베이스 설계', category: null, price: 28000, desc: null },
      { id: 6, name: 'PostgreSQL 성능 튜닝', category: 'books', price: 55000, desc: '고급 튜닝 가이드' }
    ];

    const STEPS = [
      { label: "LIKE 패턴 매칭", desc: "[Step 1] LIKE 'Post%'는 'Post'로 시작하는 값을 찾습니다. %는 0개 이상의 임의 문자, _는 정확히 1글자입니다. 'PostgreSQL 입문'과 'PostgreSQL 성능 튜닝'이 매칭됩니다.", phase: "like" },
      { label: "ILIKE 대소문자 무시", desc: "[Step 2] ILIKE '%postgres%'는 대소문자를 무시하고 'postgres'가 포함된 값을 찾습니다. 'PostgreSQL'도, 'postgis'도 매칭됩니다. PostgreSQL 고유 기능입니다.", phase: "ilike" },
      { label: "IN 목록 검색", desc: "[Step 3] IN ('books', 'courses')는 category가 'books'이거나 'courses'인 행을 찾습니다. 여러 OR 조건을 한 줄로 쓰는 것과 같습니다.", phase: "in" },
      { label: "BETWEEN 범위 검색", desc: "[Step 4] BETWEEN 30000 AND 60000은 가격이 30,000원 이상 60,000원 이하인 행을 찾습니다. 양쪽 경계값이 모두 포함됩니다.", phase: "between" },
      { label: "IS NULL / = NULL 함정", desc: "[Step 5] IS NULL은 NULL인 행을 찾습니다. 주의: = NULL은 동작하지 않습니다! NULL은 '알 수 없는 값'이라 비교 자체가 성립하지 않기 때문입니다. 가장 흔한 초보자 실수입니다.", phase: "isnull" }
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4500); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const phase = stepData.phase;

      const getMatched = () => {
        if (phase === 'like') return DATA.filter(r => r.name.startsWith('Post'));
        if (phase === 'ilike') return DATA.filter(r => r.name.toLowerCase().includes('postgres') || r.name.toLowerCase().includes('postgis'));
        if (phase === 'in') return DATA.filter(r => ['books', 'courses'].includes(r.category));
        if (phase === 'between') return DATA.filter(r => r.price >= 30000 && r.price <= 60000);
        if (phase === 'isnull') return DATA.filter(r => r.category === null);
        return [];
      };

      const matchedIds = getMatched().map(r => r.id);

      const sqlMap = {
        like: "WHERE name LIKE 'Post%'",
        ilike: "WHERE name ILIKE '%postgres%'",
        in: "WHERE category IN ('books', 'courses')",
        between: "WHERE price BETWEEN 30000 AND 60000",
        isnull: "WHERE category IS NULL"
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold">III-C-1-2. 조건 검색: LIKE, IN, BETWEEN, IS NULL</h1>
              </div>
              <p className="text-slate-600">각 검색 조건이 테이블의 어떤 행을 매칭하는지 실시간으로 확인합니다.</p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm min-h-[90px]">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[350px]">
              <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm mb-4">
                <span className="text-slate-400">SELECT * FROM products </span>
                <span className="text-yellow-300">{sqlMap[phase]}</span>;
                {phase === 'isnull' && (
                  <div className="mt-2">
                    <span className="text-red-400 line-through">SELECT * FROM products WHERE category = NULL;</span>
                    <span className="text-red-400"> -- 결과 0행! (동작 안 함)</span>
                  </div>
                )}
              </div>

              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b-2 border-slate-300">
                    <th className="p-2 text-left">id</th>
                    <th className="p-2 text-left">name</th>
                    <th className="p-2 text-left">category</th>
                    <th className="p-2 text-right">price</th>
                    <th className="p-2 text-left">desc</th>
                    <th className="p-2 text-center w-16">매칭</th>
                  </tr>
                </thead>
                <tbody>
                  {DATA.map(r => {
                    const matched = matchedIds.includes(r.id);
                    return (
                      <tr key={r.id} className={`border-t transition-all duration-500 ${matched ? 'bg-green-50 font-bold' : 'opacity-40'}`}>
                        <td className="p-2">{r.id}</td>
                        <td className="p-2 font-mono">{r.name}</td>
                        <td className="p-2">{r.category === null ? <span className="text-red-500 italic">NULL</span> : r.category}</td>
                        <td className="p-2 text-right font-mono">{r.price.toLocaleString()}</td>
                        <td className="p-2 text-xs">{r.desc === null ? <span className="text-red-500 italic">NULL</span> : r.desc}</td>
                        <td className="p-2 text-center">{matched ? <span className="text-green-600 text-lg">O</span> : <span className="text-slate-300">-</span>}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>

              <div className="mt-3 text-sm text-center">
                매칭된 행: <span className="font-bold text-green-600">{matchedIds.length}개</span> / 전체 {DATA.length}개
              </div>
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="px-5 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg font-medium disabled:opacity-30 disabled:cursor-not-allowed">이전</button>
                <div className="flex items-center gap-4">
                  <button onClick={togglePlay} className={`px-5 py-2 rounded-lg font-medium ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-blue-600 hover:bg-blue-700 text-white'}`}>{isPlaying ? '일시 정지' : (isEnd ? '처음부터' : '자동 실행')}</button>
                  <div className="flex gap-1">{STEPS.map((_, i) => <button key={i} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }} className={`w-3 h-3 rounded-full ${i === currentStepIdx ? 'bg-blue-600' : i < currentStepIdx ? 'bg-blue-300' : 'bg-slate-200'}`} />)}</div>
                  <span className="text-xs text-slate-400 font-mono">{currentStepIdx + 1}/{STEPS.length}</span>
                </div>
                <button onClick={handleNext} disabled={isEnd} className="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium disabled:opacity-30 disabled:cursor-not-allowed">다음</button>
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
