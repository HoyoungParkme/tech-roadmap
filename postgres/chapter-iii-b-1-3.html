<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — Chapter III-B-1-3. 날짜와 시간: TIMESTAMP, DATE, TIME, INTERVAL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    PostgreSQL Chapter III-B-1-3 — 날짜와 시간: TIMESTAMP, DATE, TIME, INTERVAL
    학습 목표: TIMESTAMP vs TIMESTAMPTZ의 차이를 시각적으로 체험하고,
              INTERVAL 날짜 연산을 이해한다.
    조작법: "자동 실행" 버튼으로 재생, 이전/다음 버튼으로 수동 전환.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const ZONES = [
      { city: '서울', offset: '+09:00', utcDiff: 9, flag: 'KR' },
      { city: '런던', offset: '+00:00', utcDiff: 0, flag: 'GB' },
      { city: 'LA', offset: '-07:00', utcDiff: -7, flag: 'US' },
      { city: '도쿄', offset: '+09:00', utcDiff: 9, flag: 'JP' }
    ];

    const STEPS = [
      {
        label: "네 가지 날짜 타입",
        desc: "[Step 1] PostgreSQL에는 DATE(날짜만), TIME(시간만), TIMESTAMP(날짜+시간, 타임존 없음), TIMESTAMPTZ(날짜+시간+타임존) 네 가지가 있습니다.",
        phase: "intro"
      },
      {
        label: "TIMESTAMP 저장",
        desc: "[Step 2] TIMESTAMP은 '2026-04-21 14:30:00'을 그대로 저장합니다. 타임존 정보가 없으므로 이 시각이 서울 시각인지, 런던 시각인지 알 수 없습니다.",
        phase: "timestamp"
      },
      {
        label: "TIMESTAMPTZ 저장",
        desc: "[Step 3] TIMESTAMPTZ는 내부적으로 UTC로 변환해 저장합니다. '2026-04-21 14:30:00+09'(서울)을 넣으면 UTC '05:30:00'으로 저장하고, 조회할 때 클라이언트의 타임존에 맞게 변환해 보여줍니다.",
        phase: "timestamptz"
      },
      {
        label: "타임존 문제 발생",
        desc: "[Step 4] 서버 타임존이 변경되면? TIMESTAMP은 값이 그대로라 시각이 어긋납니다. TIMESTAMPTZ는 UTC 기준이므로 어떤 서버에서 조회해도 올바른 현지 시각을 보여줍니다. 실무에서는 거의 항상 TIMESTAMPTZ를 써야 합니다.",
        phase: "problem"
      },
      {
        label: "INTERVAL 연산",
        desc: "[Step 5] INTERVAL은 '기간'을 표현합니다. NOW() + INTERVAL '30 days'는 30일 후, AGE(날짜1, 날짜2)는 두 날짜 사이의 기간을 반환합니다. 날짜 연산의 핵심 도구입니다.",
        phase: "interval"
      },
      {
        label: "실무 정리",
        desc: "[Step 6] 결론: 시각은 TIMESTAMPTZ, 생년월일 같은 순수 날짜는 DATE, 기간 계산은 INTERVAL. TIMESTAMP(타임존 없음)은 특별한 이유가 없으면 피합니다.",
        phase: "summary"
      }
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const phase = stepData.phase;

      const ClockRow = ({ city, time, highlight, note }) => (
        <div className={`flex items-center gap-3 p-3 rounded-lg transition-all duration-500 ${highlight ? 'bg-blue-50 border-2 border-blue-400 shadow' : 'bg-slate-50 border border-slate-200'}`}>
          <div className="w-16 text-sm font-bold text-slate-700">{city}</div>
          <div className={`flex-1 font-mono text-lg ${highlight ? 'text-blue-700 font-bold' : 'text-slate-600'}`}>{time}</div>
          {note && <div className="text-xs text-slate-500">{note}</div>}
        </div>
      );

      const renderViz = () => {
        if (phase === 'intro') {
          const types = [
            { name: 'DATE', ex: '2026-04-21', desc: '날짜만', color: 'green' },
            { name: 'TIME', ex: '14:30:00', desc: '시간만', color: 'purple' },
            { name: 'TIMESTAMP', ex: '2026-04-21 14:30:00', desc: '날짜+시간 (TZ 없음)', color: 'amber' },
            { name: 'TIMESTAMPTZ', ex: '2026-04-21 14:30:00+09', desc: '날짜+시간+타임존', color: 'blue' }
          ];
          return (
            <div className="grid grid-cols-2 gap-3">
              {types.map((t, i) => (
                <div key={i} className={`p-4 rounded-lg border-2 border-${t.color}-400 bg-${t.color}-50`}>
                  <div className={`text-sm font-bold text-${t.color}-600`}>{t.name}</div>
                  <div className="font-mono text-base text-slate-700 mt-1">{t.ex}</div>
                  <div className="text-xs text-slate-500 mt-1">{t.desc}</div>
                </div>
              ))}
            </div>
          );
        }

        if (phase === 'timestamp') {
          return (
            <div className="space-y-4">
              <div className="bg-slate-800 text-green-300 p-4 rounded-lg font-mono text-sm">
                <div className="text-slate-400">-- TIMESTAMP (타임존 없음)</div>
                <div>INSERT INTO events (ts) VALUES ('2026-04-21 14:30:00');</div>
                <div className="text-slate-400 mt-2">-- 저장된 값</div>
                <div className="text-amber-300">2026-04-21 14:30:00</div>
              </div>
              <div className="bg-amber-50 border-2 border-amber-400 p-4 rounded-lg text-center">
                <div className="text-amber-700 text-2xl font-mono font-bold">2026-04-21 14:30:00</div>
                <div className="text-amber-600 text-sm mt-2">이 시각이 어느 나라 시각인지 알 수 없음</div>
              </div>
              <div className="grid grid-cols-4 gap-2">
                {ZONES.map((z, i) => (
                  <div key={i} className="p-2 rounded bg-slate-100 text-center">
                    <div className="text-xs text-slate-500">{z.city}</div>
                    <div className="font-mono text-sm text-slate-700">14:30:00</div>
                    <div className="text-xs text-red-500">같은 값?</div>
                  </div>
                ))}
              </div>
            </div>
          );
        }

        if (phase === 'timestamptz') {
          return (
            <div className="space-y-4">
              <div className="bg-slate-800 text-green-300 p-4 rounded-lg font-mono text-sm">
                <div className="text-slate-400">-- TIMESTAMPTZ (타임존 포함)</div>
                <div>INSERT INTO events (tstz) VALUES ('2026-04-21 14:30:00<span className="text-blue-300">+09</span>');</div>
                <div className="text-slate-400 mt-2">-- 내부 저장: UTC로 변환</div>
                <div className="text-blue-300">2026-04-21 05:30:00 UTC</div>
              </div>
              <div className="bg-blue-50 border-2 border-blue-400 p-3 rounded-lg text-center mb-2">
                <div className="text-xs text-blue-600 mb-1">내부 저장값 (UTC)</div>
                <div className="text-blue-700 text-xl font-mono font-bold">2026-04-21 05:30:00 UTC</div>
              </div>
              <div className="text-xs text-center text-slate-500 mb-1">조회 시 클라이언트 타임존에 맞게 자동 변환:</div>
              <div className="grid grid-cols-4 gap-2">
                {ZONES.map((z, i) => {
                  const h = (5 + 30/60 + z.utcDiff);
                  const hour = Math.floor(((h % 24) + 24) % 24);
                  const min = 30;
                  return (
                    <div key={i} className={`p-2 rounded text-center ${z.city === '서울' ? 'bg-blue-100 border-2 border-blue-400' : 'bg-slate-50 border border-slate-200'}`}>
                      <div className="text-xs font-bold text-slate-600">{z.city} ({z.offset})</div>
                      <div className="font-mono text-lg text-blue-700 font-bold">{String(hour).padStart(2,'0')}:{String(min).padStart(2,'0')}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        }

        if (phase === 'problem') {
          return (
            <div className="space-y-4">
              <div className="text-center text-sm text-slate-600 mb-2">서버 타임존이 Asia/Seoul에서 US/Pacific으로 변경되면?</div>
              <div className="grid grid-cols-2 gap-4">
                <div className="p-4 rounded-lg border-2 border-red-400 bg-red-50">
                  <div className="text-sm font-bold text-red-600 mb-2">TIMESTAMP</div>
                  <div className="font-mono text-slate-700">저장: 14:30:00</div>
                  <div className="font-mono text-slate-700">조회: 14:30:00</div>
                  <div className="text-red-600 text-xs mt-2 font-bold">서울 14:30이 LA 14:30으로 해석됨 (16시간 차이!)</div>
                </div>
                <div className="p-4 rounded-lg border-2 border-green-400 bg-green-50">
                  <div className="text-sm font-bold text-green-600 mb-2">TIMESTAMPTZ</div>
                  <div className="font-mono text-slate-700">저장: 05:30 UTC</div>
                  <div className="font-mono text-slate-700">조회: 서울 14:30 / LA 22:30(전날)</div>
                  <div className="text-green-600 text-xs mt-2 font-bold">어디서 조회해도 정확한 시각!</div>
                </div>
              </div>
              <div className="bg-blue-100 border border-blue-300 p-3 rounded-lg text-center text-blue-700 font-bold">
                실무에서는 거의 항상 TIMESTAMPTZ를 사용한다
              </div>
            </div>
          );
        }

        if (phase === 'interval') {
          return (
            <div className="space-y-4">
              <div className="bg-slate-800 text-green-300 p-4 rounded-lg font-mono text-sm">
                <div className="text-slate-400">-- INTERVAL: 기간 표현과 날짜 연산</div>
                <div className="mt-1">SELECT NOW() + INTERVAL '30 days';</div>
                <div className="text-blue-300">-- 30일 후 시각</div>
                <div className="mt-2">SELECT NOW() - INTERVAL '2 hours 30 minutes';</div>
                <div className="text-blue-300">-- 2시간 30분 전</div>
                <div className="mt-2">SELECT AGE('2026-04-21', '2000-03-15');</div>
                <div className="text-blue-300">-- 결과: 26 years 1 mon 6 days</div>
              </div>
              <div className="grid grid-cols-3 gap-3">
                <div className="p-3 rounded-lg bg-purple-50 border border-purple-300 text-center">
                  <div className="text-xs text-purple-600 font-bold">NOW() + 30일</div>
                  <div className="font-mono text-sm text-purple-700 mt-1">2026-05-21</div>
                </div>
                <div className="p-3 rounded-lg bg-purple-50 border border-purple-300 text-center">
                  <div className="text-xs text-purple-600 font-bold">NOW() - 2h 30m</div>
                  <div className="font-mono text-sm text-purple-700 mt-1">12:00:00</div>
                </div>
                <div className="p-3 rounded-lg bg-purple-50 border border-purple-300 text-center">
                  <div className="text-xs text-purple-600 font-bold">AGE()</div>
                  <div className="font-mono text-sm text-purple-700 mt-1">26y 1m 6d</div>
                </div>
              </div>
            </div>
          );
        }

        if (phase === 'summary') {
          return (
            <div className="space-y-3">
              {[
                { label: '시각 (이벤트 시간, 생성일)', type: 'TIMESTAMPTZ', color: 'blue', note: 'UTC 기반, 타임존 안전' },
                { label: '순수 날짜 (생년월일, 공휴일)', type: 'DATE', color: 'green', note: '시간 불필요' },
                { label: '기간 계산 (만료일, 구독 기간)', type: 'INTERVAL', color: 'purple', note: '날짜 연산의 핵심' },
                { label: '시각 (타임존 없음)', type: 'TIMESTAMP', color: 'red', note: '특별한 이유 없으면 피한다' }
              ].map((r, i) => (
                <div key={i} className={`flex items-center gap-4 p-3 rounded-lg border-2 border-${r.color}-300 bg-${r.color}-50`}>
                  <div className="flex-1 text-sm text-slate-700">{r.label}</div>
                  <div className={`font-mono text-sm font-bold text-${r.color}-700 bg-white px-3 py-1 rounded-lg`}>{r.type}</div>
                  <div className={`text-xs text-${r.color}-600 w-40`}>{r.note}</div>
                </div>
              ))}
            </div>
          );
        }

        return null;
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">III-B-1-3. 날짜와 시간: TIMESTAMP, DATE, TIME, INTERVAL</h1>
              </div>
              <p className="text-slate-600">
                <b>TIMESTAMPTZ</b>는 타임존을 포함해 어디서 조회해도 정확한 시각을 보여줍니다.
                <b>INTERVAL</b>로 날짜 연산을 수행합니다.
              </p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm min-h-[100px]">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[350px] flex flex-col justify-center">
              {renderViz()}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between">
                <button onClick={handlePrev} disabled={currentStepIdx === 0}
                  className="px-5 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg font-medium disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
                  이전
                </button>
                <div className="flex items-center gap-4">
                  <button onClick={togglePlay}
                    className={`px-5 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-blue-600 hover:bg-blue-700 text-white'}`}>
                    {isPlaying ? '일시 정지' : (isEnd ? '처음부터' : '자동 실행')}
                  </button>
                  <div className="flex gap-1">
                    {STEPS.map((_, i) => (
                      <button key={i} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                        className={`w-3 h-3 rounded-full transition-colors ${i === currentStepIdx ? 'bg-blue-600' : (i < currentStepIdx ? 'bg-blue-300' : 'bg-slate-200')}`} />
                    ))}
                  </div>
                  <span className="text-xs text-slate-400 font-mono">{currentStepIdx + 1}/{STEPS.length}</span>
                </div>
                <button onClick={handleNext} disabled={isEnd}
                  className="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
                  다음
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
