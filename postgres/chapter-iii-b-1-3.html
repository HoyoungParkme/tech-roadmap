  -->

            'CREATE TABLE subscriptions (',
            '  id          SERIAL PRIMARY KEY,',
            '  user_id     INTEGER NOT NULL,',
            '  started_at  TIMESTAMPTZ NOT NULL DEFAULT NOW(),',
            "  duration    INTERVAL NOT NULL DEFAULT INTERVAL '30 days'",
            ');',
            '',
            'INSERT INTO subscriptions (user_id, duration) VALUES',
            "  (1, INTERVAL '7 days'),",
            "  (2, INTERVAL '1 month'),",
            "  (3, INTERVAL '1 year 6 months'),",
            "  (4, INTERVAL '2 days 3 hours');  -- 혼합 단위 가능",
            '',
            '-- ② 만료 시각 계산 — 시점 + 기간 = 새 시점',
            'SELECT user_id,',
            '       started_at,',
            '       duration,',
            '       started_at + duration AS expires_at',
            'FROM subscriptions;',
            '',
            '-- ③ INTERVAL 다양한 입력 형식',
            "SELECT INTERVAL '2 days 3 hours'         AS mixed,",
            "       INTERVAL '90 minutes'             AS as_min,",
            "       INTERVAL '1.5 hours'              AS fractional,",
            "       INTERVAL '1 year 2 months 3 days' AS multi;",
            '-- 결과: 2 days 03:00:00 | 01:30:00 | 01:30:00 | 1 year 2 mons 3 days',
            '',
            '-- ④ 시점 - 시점 = 기간',
            "SELECT TIMESTAMPTZ '2026-05-15 00:00+09'",
            "     - TIMESTAMPTZ '2026-05-14 15:30+09' AS duration;",
            '-- 결과: 08:30:00',
            '',
            '-- ⑤ EXTRACT 로 INTERVAL 분해',
            "SELECT EXTRACT(EPOCH FROM INTERVAL '2 days 3 hours') AS total_seconds,",
            "       EXTRACT(DAY   FROM INTERVAL '2 days 3 hours') AS d,",
            "       EXTRACT(HOUR  FROM INTERVAL '2 days 3 hours') AS h;",
            '-- 결과: 183600 | 2 | 3',
            '',
            '-- ⑥ 실무 패턴 — 곧 만료될 구독 찾기',
            'SELECT user_id, started_at + duration AS expires_at',
            'FROM subscriptions',
            "WHERE started_at + duration < NOW() + INTERVAL '3 days'",
            '  AND started_at + duration > NOW();',
            '',
            '-- ⑦ INTERVAL 집계 — 평균 작업 소요 시간',
            '-- SELECT AVG(finished_at - started_at) FROM jobs;',
            '',
            '-- 💡 포인트',
            '--   • INTERVAL 은 "얼마만큼"을 표현 — 시점이 아닌 기간.',
            "--   • 단위 조합 가능: '2 days 3 hours 30 minutes'",
            '--   • 시점 + INTERVAL = 시점,   시점 - 시점 = INTERVAL',
            '--   • 구독/만료/세션 타임아웃에 표준 패턴.',
          ],
          highlight: [2, 3, 4, 5, 6, 7, 8, 16, 17, 18, 19, 20, 23, 24, 25, 26, 27, 41, 42, 43, 44],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — orange 톤
    // ─────────────────────────────────────────────────────
    function TypeCard({ card, isHighlight }) {
      const base = 'rounded-lg border px-3 py-2 transition';
      const hi = isHighlight
        ? 'bg-orange-50 border-orange-400 ring-2 ring-orange-300 shadow'
        : 'bg-white border-slate-200';
      return (
        <div className={`${base} ${hi}`}>
          <div className="flex items-center justify-between mb-1">
            <span className={`text-xs font-bold ${isHighlight ? 'text-orange-700' : 'text-slate-600'}`}>{card.name}</span>
            <span className={`text-[10px] px-2 py-0.5 rounded ${isHighlight ? 'bg-orange-200 text-orange-800' : 'bg-slate-100 text-slate-600'}`}>{card.badge}</span>
          </div>
          <div className={`font-mono text-sm font-bold ${isHighlight ? 'text-orange-900' : 'text-slate-700'}`}>{card.value}</div>
          <div className={`text-[11px] mt-1 ${isHighlight ? 'text-orange-700' : 'text-slate-500'}`}>{card.note}</div>
        </div>
      );
    }

    function WarnBox({ warn }) {
      if (!warn) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-red-400 bg-red-50 p-3">
          <div className="text-xs font-bold text-red-800 mb-2">⚠️ {warn.title}</div>
          <ul className="space-y-1">
            {warn.points.map((p, i) => (
              <li key={i} className="text-xs text-red-900 flex gap-2">
                <span className="text-red-500">▸</span>
                <span>{p}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function TzBox({ tz }) {
      if (!tz) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-orange-500 bg-gradient-to-br from-orange-50 to-amber-50 p-3">
          <div className="text-xs font-bold text-orange-800 mb-2">{tz.title}</div>
          <ul className="space-y-1">
            {tz.points.map((p, i) => (
              <li key={i} className="text-xs text-orange-900 flex gap-2">
                <span className="text-orange-500">✓</span>
                <span>{p}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function IntervalCalcBox({ calc }) {
      if (!calc) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-orange-400 bg-orange-50 p-3">
          <div className="text-xs font-bold text-orange-800 mb-2">🧮 {calc.title}</div>
          <div className="space-y-1.5">
            {calc.rows.map((r, i) => (
              <div key={i} className="text-[11px] font-mono bg-white border border-orange-200 rounded px-2 py-1.5">
                <div className="text-orange-900 break-all">{r.left}</div>
                <div className="text-orange-600 text-center my-0.5">{r.op}</div>
                <div className="text-orange-800 font-bold break-all">{r.right}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-orange-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-orange-800">날짜/시간 타입 비교</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 타입 시각화</span>
          </div>
          <div className="space-y-2">
            {state.typeCards.map((card, i) => (
              <TypeCard key={i} card={card} isHighlight={state.highlight === card.name} />
            ))}
          </div>
          <WarnBox warn={state.warnBox} />
          <TzBox tz={state.tzBox} />
          <IntervalCalcBox calc={state.intervalCalc} />
          <div className="mt-3 text-xs text-orange-900 bg-orange-50 border border-orange-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js) — 5개 탭으로 스텝 이동
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total, onTabClick }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 5개 탭 — 클릭으로 스텝 이동 */}
          <div className="flex items-center bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {STEPS.map((s, i) => (
              <button
                key={i}
                onClick={() => onTabClick(i)}
                className={`px-3 py-2 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                  i === stepIdx
                    ? 'bg-[#282c34] text-orange-300 border-t-2 border-t-orange-400'
                    : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'
                }`}
              >
                {s.code.filename}
              </button>
            ))}
          </div>
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-orange-500/15 border-l-2 border-orange-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-orange-600 text-white font-bold">III</span>
              <div>
                <h1 className="text-2xl font-bold text-orange-900">Chapter III-B-1-3. 날짜/시간 타입</h1>
                <p className="text-sm text-orange-800/80">DATE · TIME · TIMESTAMP · TIMESTAMPTZ · INTERVAL — 5가지 시간 타입을 한 눈에</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-orange-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-orange-600' : 'bg-orange-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-orange-700 text-orange-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-orange-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} onTabClick={setStepIdx} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-orange-700 text-white' : 'bg-orange-600 text-white hover:bg-orange-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-orange-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계 · 탭 클릭으로 이동</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-orange-400 bg-white px-4 py-3 text-sm text-orange-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                날짜만 필요하면 <b>DATE</b>, 시간만 필요하면 <b>TIME</b>, 둘 다 필요하면 기본은 <b>TIMESTAMPTZ</b>(타임존 포함, 실무 추천). 기간/만료/소요 시간은 <b>INTERVAL</b>. TIMESTAMP(타임존 없음)는 단일 지역 서비스에서만 안전하다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['DATE', 'TIME', 'TIMESTAMP', 'TIMESTAMPTZ', 'INTERVAL', 'AT TIME ZONE', 'NOW()', 'CURRENT_DATE', 'EXTRACT', 'UTC'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-orange-100 text-orange-800 border border-orange-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-orange-700">
              <a href="./index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./index.html" className="underline hover:no-underline">다음: III-B-1-4 그 외 타입 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
