          '#   3) :wq 저장 + 닫기',
          '#   4) psql 이 그 쿼리를 즉시 실행',
          '#   5) 결과를 확인하고, 수정이 필요하면 다시 \\e',
          '#      (직전 쿼리가 버퍼에 남아 있어 그대로 다시 열림)',
          '',
          '# 결과 예시:',
          '#   mydb=# \\e',
          '#   (vim 에서 5줄 짜리 JOIN 작성 후 :wq)',
          '#    name  | cnt ',
          '#   -------+-----',
          '#    Alice |  42',
          '#   (1 row)',
        ],
        highlight: [12, 13, 14, 19, 20, 30, 31, 32, 33, 34, 35],
      },
      {
        key: 'include',
        filename: 'include.sh',
        lang: 'bash',
        title: '\\i file.sql — 파일 실행',
        lines: [
          '#!/usr/bin/env bash',
          '# include.sh — \\i 로 .sql 파일을 일괄 실행',
          '#',
          '# 사용 시점: 시드 데이터, 마이그레이션, 정기 점검 스크립트',
          '# 핵심: 파일 안의 모든 SQL 이 순서대로 실행되고 결과가 출력',
          '',
          '# ── 1. setup.sql 예시 (이 파일을 \\i 로 실행) ──',
          'cat > setup.sql <<\'EOF\'',
          'CREATE TABLE IF NOT EXISTS users (',
          '  id    SERIAL PRIMARY KEY,',
          '  name  TEXT NOT NULL,',
          '  age   INTEGER',
          ');',
          '',
          'INSERT INTO users (name, age) VALUES',
          "  ('Alice', 31),",
          "  ('Bob',   25),",
          "  ('Carol', 22);",
          '',
          'CREATE INDEX IF NOT EXISTS idx_users_age ON users(age);',
          'ANALYZE users;',
          '',
          'SELECT * FROM users ORDER BY id;',
          'EOF',
          '',
          '# ── 2. psql 안에서 실행 (절대경로) ──',
          'psql -U postgres -d mydb',
          '#   mydb=# \\i /home/me/setup.sql',
          '',
          '# ── 3. 상대경로로 실행하려면 \\ir ──',
          '#   mydb=# \\ir setup.sql',
          '#   (현재 작업 디렉터리 기준)',
          '',
          '# ── 4. 쉘에서 한 번에 (-f 옵션) ──',
          'psql -U postgres -d mydb -f setup.sql',
          '#   → \\i 와 동일한 결과. CI/CD 에서 가장 많이 쓰는 형태',
          '',
          '# ── 5. 여러 파일을 순서대로 ──',
          'for f in 01-schema.sql 02-seed.sql 03-index.sql; do',
          '  psql -U postgres -d mydb -f "$f"',
          'done',
          '',
          '# ── 에러 발생 시 즉시 중단하려면 ──',
          'psql -U postgres -d mydb -v ON_ERROR_STOP=1 -f setup.sql',
          '#   → 한 줄이라도 실패하면 즉시 종료. 배포 스크립트의 기본기.',
          '',
          '# 결과 예시:',
          '#   CREATE TABLE',
          '#   INSERT 0 3',
          '#   CREATE INDEX',
          '#   ANALYZE',
          '#    id | name  | age ',
          '#   ----+-------+-----',
          '#     1 | Alice |  31',
          '#   (3 rows)',
          '#   Time: 18.402 ms',
        ],
        highlight: [25, 26, 33, 34, 37, 38, 39, 40, 42, 43, 44],
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — psql 터미널 mock
    // ─────────────────────────────────────────────────────
    function TerminalPane({ step }) {
      return (
        <div className="rounded-xl border border-orange-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-orange-800">psql 터미널 (mock)</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 실행 결과</span>
          </div>

          {/* 터미널 박스 */}
          <div className="rounded-lg overflow-hidden border border-slate-800 bg-slate-900 shadow-inner flex-1 flex flex-col">
            <div className="flex items-center gap-2 px-3 py-1.5 bg-slate-800 border-b border-slate-700">
              <span className="w-2.5 h-2.5 rounded-full bg-red-400"></span>
              <span className="w-2.5 h-2.5 rounded-full bg-yellow-400"></span>
              <span className="w-2.5 h-2.5 rounded-full bg-green-400"></span>
              <span className="ml-2 text-[10px] text-slate-300 font-mono">postgres@mydb — psql 16</span>
            </div>
            <div className="p-3 font-mono text-[12px] leading-5 text-emerald-200 overflow-auto">
              <div className="text-emerald-300 font-bold">
                <span className="text-orange-400">$</span> psql -U postgres -d mydb
              </div>
              <div className="text-slate-400 mb-2">psql (16.x) — Type "help" for help.</div>

              {/* 입력된 명령 */}
              <div className="text-orange-300 font-bold">{step.prompt}</div>

              {/* 출력 */}
              <pre className="whitespace-pre text-slate-200 mt-1">
                {step.output.join('\n')}
              </pre>
            </div>
          </div>

          {/* tip 박스 */}
          <div className="mt-3 rounded-lg border border-orange-300 bg-orange-50 px-3 py-2 text-xs text-orange-900 flex gap-2">
            <span className="text-orange-500">▸</span>
            <span><b>이 단계에서 확인할 것:</b> {step.tip}</span>
          </div>

          {/* keyPoint */}
          <div className="mt-2 rounded-lg border border-amber-300 bg-amber-50 px-3 py-2 text-xs text-amber-900">
            <b>핵심 정리</b> · {step.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 CodeViewer — 5탭 (탭은 단계와 자동 동기화)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ activeKey, onSelect, stepIdx, total }) {
      const tab = TABS.find((t) => t.key === activeKey) || TABS[0];
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [tab.key]);

      const highlightSet = new Set(tab.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return tab.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return tab.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 윈도우 헤더 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{tab.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{tab.lang}</span>
          </div>

          {/* 탭 바 */}
          <div className="flex items-center bg-slate-800/70 border-b border-slate-700 overflow-x-auto">
            {TABS.map((t) => {
              const active = t.key === activeKey;
              return (
                <button
                  key={t.key}
                  onClick={() => onSelect(t.key)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                    active
                      ? 'bg-[#282c34] text-orange-300 border-b-2 border-b-orange-400'
                      : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'
                  }`}
                  title={t.title}
                >
                  {t.filename}
                </button>
              );
            })}
          </div>

          {/* 코드 영역 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${tab.lang}`}>{tab.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {tab.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-orange-500/15 border-l-2 border-orange-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>

          {/* 푸터 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{tab.lines.length} lines · {tab.title}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const [activeTab, setActiveTab] = useState(STEPS[0].tabKey);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 단계 변경 시 탭 자동 동기화
      useEffect(() => {
        setActiveTab(STEPS[stepIdx].tabKey);
      }, [stepIdx]);

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동재생 3000ms
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-orange-600 text-white font-bold">III</span>
              <div>
                <h1 className="text-2xl font-bold text-orange-900">Chapter III-3-1. psql 생산성 명령어 5종</h1>
                <p className="text-sm text-orange-800/80">\dt · \d · \timing · \e · \i — psql 을 손에 익히는 핵심 5개</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-orange-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-orange-600' : 'bg-orange-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-orange-700 text-orange-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-orange-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <TerminalPane step={step} />
              <CodeViewer
                activeKey={activeTab}
                onSelect={setActiveTab}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-orange-700 text-white' : 'bg-orange-600 text-white hover:bg-orange-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-orange-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-orange-400 bg-white px-4 py-3 text-sm text-orange-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                <ul className="space-y-1 list-disc pl-5">
                  <li><b>\dt</b> 로 DB 의 지도(테이블 목록)를 얻고, <b>\d 테이블명</b> 으로 각 테이블의 명세를 본다.</li>
                  <li><b>\timing on</b> 으로 모든 쿼리의 실행 시간을 자동 측정한다 (튜닝의 before/after).</li>
                  <li>긴 쿼리는 <b>\e</b> 로 vim 을 열어 작성하고, 반복되는 스크립트는 <b>\i file.sql</b> 로 일괄 실행한다.</li>
                  <li>이 5개를 손에 익히면 psql 만으로도 GUI 툴(DBeaver/pgAdmin) 의 80% 이상을 대체할 수 있다.</li>
                </ul>
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['psql', '메타명령어', '\\dt', '\\d', '\\timing', '\\e', '\\i', '.psqlrc', 'EDITOR', '생산성'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-orange-100 text-orange-800 border border-orange-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-orange-700">
              <a href="./chapter-iii-2-3.html" className="underline hover:no-underline">← 이전: III-2-3</a>
              <a href="./index.html" className="underline hover:no-underline">챕터 목록</a>
              <a href="./chapter-iii-3-2.html" className="underline hover:no-underline">다음: III-3-2 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
