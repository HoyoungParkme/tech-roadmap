<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — III-3-1. psql 생산성 높이기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    PostgreSQL Chapter III-3-1 — psql 생산성 높이기
    학습 목표: \timing, \e, \copy, .psqlrc 설정을 사용할 수 있다.
    조작법: "자동 실행" 버튼으로 재생, 이전/다음 버튼으로 수동 전환.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { label: '\\timing', desc: '[Step 1: 쿼리 실행 시간 측정] \\timing on을 입력하면 이후 모든 쿼리의 실행 시간이 밀리초 단위로 출력된다. 쿼리가 느리다고 느껴질 때 병목을 판단하는 첫 단서가 된다.',
        tool: 'timing',
        terminal: ['mydb=# \\timing on', 'Timing is on.', '', 'mydb=# SELECT * FROM users;', ' id | name  | age', '----+-------+-----', '  1 | Alice |  31', '  3 | Carol |  22', '(2 rows)', '', 'Time: 0.812 ms'] },
      { label: '\\e', desc: '[Step 2: 외부 편집기 연동] \\e를 입력하면 시스템 편집기(vim/nano)가 열린다. 긴 쿼리를 편하게 수정하고, 저장 후 닫으면 psql이 자동으로 실행한다.',
        tool: 'editor',
        terminal: ['mydb=# \\e', '', '-- vim 편집기가 열림 --', '-- SELECT name, age', '--   FROM users', '--   WHERE age > 20', '--   ORDER BY age DESC;', '-- 저장 후 닫기 --', '', ' name  | age', '-------+-----', ' Alice |  31', ' Carol |  22', '(2 rows)', '', 'Time: 0.654 ms'] },
      { label: '\\copy 임포트', desc: '[Step 3: CSV 파일 임포트] \\copy는 로컬 CSV 파일을 테이블에 올리는 명령이다. HEADER 옵션은 첫 줄을 열 이름 행으로 처리한다.',
        tool: 'copy',
        terminal: ["mydb=# \\copy users (name, age) FROM '/tmp/new_users.csv' CSV HEADER;", 'COPY 2', '', 'mydb=# SELECT * FROM users;', ' id | name  | age', '----+-------+-----', '  1 | Alice |  31', '  3 | Carol |  22', '  4 | Dave  |  28', '  5 | Eve   |  35', '(4 rows)'] },
      { label: '\\copy 익스포트', desc: '[Step 4: CSV 파일 익스포트] 반대로 테이블 내용을 CSV 파일로 내려받을 수도 있다. 백업이나 다른 도구로 데이터를 넘길 때 유용하다.',
        tool: 'copy',
        terminal: ["mydb=# \\copy users TO '/tmp/users_backup.csv' CSV HEADER;", 'COPY 4', '', '-- /tmp/users_backup.csv 내용:', '-- id,name,age', '-- 1,Alice,31', '-- 3,Carol,22', '-- 4,Dave,28', '-- 5,Eve,35'] },
      { label: '.psqlrc', desc: '[Step 5: 시작 설정 파일] 홈 디렉터리에 .psqlrc 파일을 만들면 psql을 열 때마다 자동으로 실행할 설정을 넣을 수 있다. 매번 \\timing on을 입력할 필요가 없어진다.',
        tool: 'psqlrc',
        terminal: ['$ cat ~/.psqlrc', '\\timing on', "\\pset null '(null)'", '\\pset pager off', '', '$ psql -U postgres -d mydb', 'psql (16.x)', 'Timing is on.        ← .psqlrc에서 자동 설정', 'Null display is "(null)".', 'Pager usage is off.', '', 'mydb=#'] }
    ];

    const TOOLS = [
      { cmd: '\\timing', desc: '쿼리 실행 시간을 밀리초로 표시', key: 'timing' },
      { cmd: '\\e', desc: '외부 편집기로 쿼리 편집 + 자동 실행', key: 'editor' },
      { cmd: '\\copy', desc: 'CSV ↔ 테이블 데이터 가져오기/내보내기', key: 'copy' },
      { cmd: '.psqlrc', desc: 'psql 시작 시 자동 실행할 설정 파일', key: 'psqlrc' }
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [typedLines, setTypedLines] = useState([]);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        setTypedLines([]);
        const lines = stepData.terminal;
        const ids = lines.map((_, i) => setTimeout(() => setTypedLines(prev => [...prev, lines[i]]), (i + 1) * 300));
        return () => ids.forEach(clearTimeout);
      }, [currentStepIdx]);

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 5000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">III-3-1. psql 생산성 높이기</h1>
              </div>
              <p className="text-slate-600">
                자주 쓰는 도구 4가지 — <b>\\timing</b>(시간 측정), <b>\\e</b>(편집기), <b>\\copy</b>(CSV), <b>.psqlrc</b>(자동 설정)를 익힙니다.
              </p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 flex flex-col justify-center min-h-[110px]">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                {/* 터미널 */}
                <div className="bg-slate-900 rounded-xl shadow-sm border border-slate-700 min-h-[400px] flex flex-col overflow-hidden">
                  <div className="flex items-center px-4 py-2 bg-slate-800 border-b border-slate-700 gap-2">
                    <div className="w-3 h-3 rounded-full bg-red-500 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-400 font-mono">psql — mydb</span>
                  </div>
                  <div className="p-4 font-mono text-sm text-emerald-400 flex-1 overflow-y-auto space-y-0.5">
                    {typedLines.map((line, i) => (
                      <div key={`${currentStepIdx}-${i}`} className={`transition-opacity duration-300 ${
                        line.startsWith('$') || line.startsWith('mydb') ? 'text-white' :
                        line.startsWith('Time:') ? 'text-amber-400 font-bold' :
                        line.startsWith('COPY') || line.startsWith('Timing') || line.startsWith('Null') || line.startsWith('Pager') ? 'text-emerald-300 font-bold' :
                        line.startsWith('--') ? 'text-slate-500' :
                        line.includes('←') ? 'text-blue-400' :
                        'text-slate-400'
                      }`}>{line || '\u00A0'}</div>
                    ))}
                    <div className="animate-pulse text-slate-500">▌</div>
                  </div>
                </div>

                {/* 컨트롤 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                    </button>
                    <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex gap-1">{STEPS.map((s, i) => (<button key={i} aria-label={`Step ${i+1}: ${s.label}`} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }} className={`w-2.5 h-2.5 rounded-full transition-all ${i === currentStepIdx ? 'bg-blue-600 scale-125' : i < currentStepIdx ? 'bg-blue-300' : 'bg-slate-200'}`} />))}</div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">{currentStepIdx + 1} / {STEPS.length}</div>
                  </div>
                </div>
              </div>

              {/* 오른쪽 패널 */}
              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-white flex flex-col">
                  <div className="flex items-center px-4 py-3 bg-slate-100 border-b border-slate-200 gap-2">
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-500 font-semibold">생산성 도구 가이드</span>
                  </div>
                  <div className="p-6 overflow-y-auto flex-1 space-y-4">
                    <h3 className="text-sm font-bold text-slate-700 border-b pb-2">4가지 생산성 도구</h3>
                    {TOOLS.map((tool, i) => (
                      <div key={i} className={`p-4 rounded-lg border-2 transition-all duration-500 ${stepData.tool === tool.key ? 'border-blue-400 bg-blue-50 scale-[1.02] shadow-md' : 'border-slate-200 bg-slate-50'}`}>
                        <div className="flex items-center gap-2 mb-1">
                          <code className={`px-2 py-0.5 rounded text-sm font-bold ${stepData.tool === tool.key ? 'bg-blue-200 text-blue-800' : 'bg-slate-200 text-slate-700'}`}>{tool.cmd}</code>
                        </div>
                        <div className="text-sm text-slate-700">{tool.desc}</div>
                      </div>
                    ))}

                    <div className="space-y-3 mt-4">
                      <h3 className="text-sm font-bold text-slate-700 border-b pb-2">.psqlrc 설정 예시</h3>
                      <div className={`p-3 rounded-lg border-2 transition-all duration-500 ${stepData.tool === 'psqlrc' ? 'border-violet-400 bg-violet-50 scale-[1.02]' : 'border-slate-200 bg-slate-50'}`}>
                        <div className="bg-slate-800 rounded p-3 font-mono text-xs text-slate-200 space-y-1">
                          <div><span className="text-emerald-400">\timing on</span> <span className="text-slate-500">-- 실행 시간 측정</span></div>
                          <div><span className="text-emerald-400">\pset null '(null)'</span> <span className="text-slate-500">-- NULL 표시</span></div>
                          <div><span className="text-emerald-400">\pset pager off</span> <span className="text-slate-500">-- 페이지 나누기 끄기</span></div>
                        </div>
                      </div>
                    </div>

                    <div className={`p-3 rounded-lg border-2 transition-all duration-500 ${stepData.tool === 'copy' ? 'border-amber-400 bg-amber-50 scale-[1.02]' : 'border-slate-200 bg-slate-50'}`}>
                      <div className="text-xs font-bold text-amber-600 mb-1">\\copy vs COPY</div>
                      <div className="text-sm text-slate-700">
                        <b>\\copy</b>: psql 클라이언트가 처리. 로컬 파일 경로 사용.<br/>
                        <b>COPY</b>: 서버가 처리. 서버 파일 경로 + 슈퍼유저 필요.<br/>
                        로컬 개발에서는 \\copy가 편리하다.
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
