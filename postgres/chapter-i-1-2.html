<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — Chapter I-1-2. 컴퓨터가 데이터를 기억하는 방법</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        label: "데이터 저장 요청",
        desc: "[Step 1: 데이터 저장 요청] 사용자가 'Alice, 25세' 데이터를 저장하라고 요청합니다. 컴퓨터는 이 데이터를 어딘가에 기록해야 합니다. 빠르게 접근할 수 있는 RAM과 영구 보관할 수 있는 디스크, 두 가지 선택지가 있습니다.",
        ramData: [],
        diskData: [],
        ramState: 'idle',
        diskState: 'idle',
        powerOn: true,
        incoming: { name: 'Alice', age: 25 }
      },
      {
        label: "RAM에 기록",
        desc: "[Step 2: RAM — 빠르지만 휘발성] 데이터가 먼저 RAM에 올라갑니다. RAM은 전기 신호로 데이터를 저장하기 때문에 읽고 쓰는 속도가 매우 빠릅니다. 하지만 전원이 꺼지면 전기 신호가 사라지므로 데이터도 함께 사라집니다. 칠판에 분필로 쓴 것과 같습니다.",
        ramData: [{ name: 'Alice', age: 25 }],
        diskData: [],
        ramState: 'writing',
        diskState: 'idle',
        powerOn: true,
        incoming: null
      },
      {
        label: "디스크에 영구 저장",
        desc: "[Step 3: 디스크 — 느리지만 영구 보관] RAM의 데이터를 디스크(SSD/HDD)에 기록합니다. 디스크는 자기 또는 전하를 물리적으로 변경해 데이터를 저장하므로 전원이 꺼져도 데이터가 남습니다. 노트에 펜으로 적는 것과 같습니다. 대신 RAM보다 속도가 느립니다.",
        ramData: [{ name: 'Alice', age: 25 }],
        diskData: [{ name: 'Alice', age: 25 }],
        ramState: 'active',
        diskState: 'writing',
        powerOn: true,
        incoming: null
      },
      {
        label: "전원 OFF!",
        desc: "[Step 4: 전원이 꺼지면?] 갑자기 전원이 나갔습니다! RAM은 전기 신호가 사라지면서 데이터가 모두 증발합니다. 칠판의 글씨가 지워진 것과 같습니다. 하지만 디스크에 기록된 데이터는 그대로 남아 있습니다. 노트에 적은 글씨는 전원과 무관하게 보존됩니다.",
        ramData: [],
        diskData: [{ name: 'Alice', age: 25 }],
        ramState: 'erased',
        diskState: 'safe',
        powerOn: false,
        incoming: null
      },
      {
        label: "DB의 전략",
        desc: "[Step 5: 데이터베이스의 전략] 데이터베이스는 두 저장소의 장점을 조합합니다. 자주 읽는 데이터는 RAM(버퍼 캐시)에 올려 빠르게 접근하고, 모든 변경은 반드시 디스크에도 기록해서 장애 시에도 데이터를 잃지 않습니다. 이것이 영속성(persistence)의 핵심입니다.",
        ramData: [{ name: 'Alice', age: 25, cached: true }],
        diskData: [{ name: 'Alice', age: 25 }],
        ramState: 'cached',
        diskState: 'safe',
        powerOn: true,
        incoming: null
      }
    ];

    const getRamBoxClass = (state) => {
      const base = 'p-4 rounded-xl border-2 transition-all duration-500 min-h-[140px]';
      if (state === 'writing') return `${base} border-blue-500 bg-blue-50 ring-2 ring-blue-300 shadow-lg`;
      if (state === 'active') return `${base} border-blue-400 bg-blue-50`;
      if (state === 'cached') return `${base} border-emerald-500 bg-emerald-50 ring-2 ring-emerald-300`;
      if (state === 'erased') return `${base} border-red-400 bg-red-50`;
      return `${base} border-slate-200 bg-white`;
    };

    const getDiskBoxClass = (state) => {
      const base = 'p-4 rounded-xl border-2 transition-all duration-500 min-h-[140px]';
      if (state === 'writing') return `${base} border-amber-500 bg-amber-50 ring-2 ring-amber-300 shadow-lg`;
      if (state === 'safe') return `${base} border-emerald-500 bg-emerald-50 ring-2 ring-emerald-300`;
      return `${base} border-slate-200 bg-white`;
    };

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(p => p - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">I-1-2. 컴퓨터가 데이터를 기억하는 방법</h1>
              </div>
              <p className="text-slate-600">
                <b>RAM(칠판)</b>은 빠르지만 전원이 꺼지면 사라지고, <b>디스크(노트)</b>는 느리지만 영구 보관됩니다.
                데이터베이스는 둘을 조합해 속도와 안전을 모두 챙깁니다.
              </p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 min-h-[110px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[400px]">
                  <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">저장소 시뮬레이션</div>

                  {/* 전원 상태 */}
                  <div className="flex items-center justify-center mb-4 gap-2">
                    <div className={`w-3 h-3 rounded-full ${stepData.powerOn ? 'bg-emerald-500 animate-pulse' : 'bg-red-500'}`}></div>
                    <span className={`text-sm font-bold ${stepData.powerOn ? 'text-emerald-600' : 'text-red-600'}`}>
                      전원: {stepData.powerOn ? 'ON' : 'OFF'}
                    </span>
                  </div>

                  {/* 수신 데이터 */}
                  {stepData.incoming && (
                    <div className="mb-4 p-3 bg-violet-50 border-2 border-violet-300 rounded-lg text-center animate-bounce">
                      <div className="text-xs text-violet-500 font-bold mb-1">저장 요청</div>
                      <div className="font-mono text-sm">{stepData.incoming.name}, {stepData.incoming.age}세</div>
                    </div>
                  )}

                  {/* RAM */}
                  <div className={getRamBoxClass(stepData.ramState)}>
                    <div className="flex items-center justify-between mb-2">
                      <div className="text-sm font-bold text-blue-700">RAM (칠판)</div>
                      <div className="text-xs text-slate-400">빠름 / 휘발성</div>
                    </div>
                    {stepData.ramState === 'erased' ? (
                      <div className="text-center py-4">
                        <div className="text-3xl mb-1">💨</div>
                        <div className="text-sm text-red-500 font-bold">데이터 소멸!</div>
                        <div className="text-xs text-slate-400">전원 OFF → 전기 신호 사라짐</div>
                      </div>
                    ) : stepData.ramData.length > 0 ? (
                      <div className="space-y-1">
                        {stepData.ramData.map((d, i) => (
                          <div key={i} className={`p-2 rounded text-sm font-mono ${d.cached ? 'bg-emerald-100 border border-emerald-300' : 'bg-blue-100 border border-blue-300'}`}>
                            {d.cached && <span className="text-xs text-emerald-600 mr-1">[캐시]</span>}
                            {d.name} | {d.age}
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="text-center py-4 text-sm text-slate-300">(비어 있음)</div>
                    )}
                  </div>

                  <div className="flex justify-center my-2">
                    <div className={`text-2xl transition-all duration-300 ${stepData.diskState === 'writing' ? 'text-amber-500 animate-bounce' : 'text-slate-300'}`}>
                      {stepData.diskState === 'writing' ? '⬇️' : '↕'}
                    </div>
                  </div>

                  {/* 디스크 */}
                  <div className={getDiskBoxClass(stepData.diskState)}>
                    <div className="flex items-center justify-between mb-2">
                      <div className="text-sm font-bold text-amber-700">디스크 (노트)</div>
                      <div className="text-xs text-slate-400">느림 / 영구 보관</div>
                    </div>
                    {stepData.diskData.length > 0 ? (
                      <div className="space-y-1">
                        {stepData.diskData.map((d, i) => (
                          <div key={i} className="p-2 bg-amber-100 border border-amber-300 rounded text-sm font-mono">
                            {d.name} | {d.age}
                            {stepData.diskState === 'safe' && <span className="text-emerald-600 ml-2 text-xs font-bold">안전!</span>}
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="text-center py-4 text-sm text-slate-300">(비어 있음)</div>
                    )}
                  </div>
                </div>

                {/* 컨트롤 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying ? (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                      ) : (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                      )}
                    </button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex gap-1">
                      {STEPS.map((s, i) => (
                        <button key={i} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                          className={`w-2.5 h-2.5 rounded-full transition-all ${i === currentStepIdx ? 'bg-blue-600 scale-125' : i < currentStepIdx ? 'bg-blue-300' : 'bg-slate-200'}`} />
                      ))}
                    </div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                      {currentStepIdx + 1} / {STEPS.length}
                    </div>
                  </div>
                </div>
              </div>

              {/* 오른쪽: 개념 패널 */}
              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-white flex flex-col">
                  <div className="flex items-center px-4 py-3 bg-slate-100 border-b border-slate-200">
                    <div className="w-3 h-3 rounded-full bg-blue-400 opacity-80 mr-1"></div>
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80 mr-2"></div>
                    <span className="text-xs text-slate-500 font-semibold">개념 비교</span>
                  </div>
                  <div className="p-6 overflow-y-auto flex-1 space-y-4">
                    <div className={`p-4 rounded-lg border-2 transition-all duration-500 ${
                      ['writing','active','cached'].includes(stepData.ramState) ? 'border-blue-400 bg-blue-50 scale-[1.02]' : stepData.ramState === 'erased' ? 'border-red-400 bg-red-50' : 'border-slate-200 bg-slate-50'
                    }`}>
                      <div className="text-xs font-bold text-blue-600 mb-1">RAM (Random Access Memory)</div>
                      <div className="text-sm text-slate-700 space-y-1">
                        <div>비유: <b>칠판</b> — 빠르게 쓰고 지울 수 있지만, 칠판을 치우면 다 사라진다.</div>
                        <div>속도: <span className="text-emerald-600 font-bold">매우 빠름</span></div>
                        <div>영속성: <span className="text-red-500 font-bold">없음</span> (전원 OFF → 소멸)</div>
                      </div>
                    </div>

                    <div className={`p-4 rounded-lg border-2 transition-all duration-500 ${
                      ['writing','safe'].includes(stepData.diskState) ? 'border-amber-400 bg-amber-50 scale-[1.02]' : 'border-slate-200 bg-slate-50'
                    }`}>
                      <div className="text-xs font-bold text-amber-600 mb-1">디스크 (SSD / HDD)</div>
                      <div className="text-sm text-slate-700 space-y-1">
                        <div>비유: <b>노트</b> — 적는 데 시간이 걸리지만, 덮어도 글씨가 남는다.</div>
                        <div>속도: <span className="text-amber-600 font-bold">RAM보다 느림</span></div>
                        <div>영속성: <span className="text-emerald-600 font-bold">있음</span> (전원 OFF에도 보존)</div>
                      </div>
                    </div>

                    <div className={`p-4 rounded-lg border-2 transition-all duration-500 ${
                      stepData.ramState === 'cached' ? 'border-violet-400 bg-violet-50 scale-[1.02]' : 'border-slate-200 bg-slate-50'
                    }`}>
                      <div className="text-xs font-bold text-violet-600 mb-1">데이터베이스의 전략</div>
                      <div className="text-sm text-slate-700 space-y-1">
                        <div>자주 읽는 데이터 → <b>RAM(버퍼 캐시)</b>에 올려 빠르게 접근</div>
                        <div>모든 변경 → 반드시 <b>디스크에 기록</b>해서 장애에 대비</div>
                        <div>이것이 <b>영속성(persistence)</b>의 핵심</div>
                      </div>
                    </div>

                    <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg">
                      <div className="text-xs font-bold text-slate-500 mb-2">비교 요약</div>
                      <table className="w-full text-xs">
                        <thead><tr className="text-left text-slate-400"><th className="pb-1">항목</th><th className="pb-1">RAM</th><th className="pb-1">디스크</th></tr></thead>
                        <tbody className="text-slate-600">
                          <tr><td className="py-0.5">속도</td><td className="text-emerald-600 font-bold">빠름</td><td className="text-amber-600">느림</td></tr>
                          <tr><td className="py-0.5">영속성</td><td className="text-red-500">없음</td><td className="text-emerald-600 font-bold">있음</td></tr>
                          <tr><td className="py-0.5">용량</td><td>작음 (GB)</td><td className="font-bold">큼 (TB)</td></tr>
                          <tr><td className="py-0.5">비유</td><td>칠판</td><td>노트</td></tr>
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
