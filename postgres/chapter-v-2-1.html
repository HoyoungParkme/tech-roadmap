<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — V-2-1. 인덱스의 원리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    PostgreSQL Chapter V-2-1 — 인덱스의 원리
    학습 목표: B-tree 인덱스의 구조와 동작 원리, 언제 인덱스가 효과적인지 설명할 수 있다.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TABLE_DATA = [
      { id: 1, name: '김철수', email: 'kim@mail.com', age: 28 },
      { id: 2, name: '이영희', email: 'lee@mail.com', age: 34 },
      { id: 3, name: '박민수', email: 'park@mail.com', age: 22 },
      { id: 4, name: '최지은', email: 'choi@mail.com', age: 29 },
      { id: 5, name: '정하늘', email: 'jung@mail.com', age: 31 },
      { id: 6, name: '강서연', email: 'kang@mail.com', age: 25 },
      { id: 7, name: '윤태호', email: 'yoon@mail.com', age: 37 },
      { id: 8, name: '한수지', email: 'han@mail.com', age: 26 }
    ];

    const STEPS = [
      { label: '테이블 소개', desc: '[Step 1: 테이블] customers 테이블에 8명의 고객이 있다. 여기서 id=5인 고객을 찾으려면 어떻게 해야 할까?',
        phase: 'table', scanRow: -1, treeHighlight: [], sql: "SELECT * FROM customers\nWHERE id = 5;" },
      { label: 'Sequential Scan', desc: '[Step 2: Sequential Scan] 인덱스 없이 찾으면 테이블을 첫 행부터 끝까지 하나씩 읽는다. 8행 모두 확인해야 5번을 찾을 수 있다. 100만 행이면?',
        phase: 'seq_scan', scanRow: 4, treeHighlight: [],
        sql: "-- Sequential Scan (전체 탐색)\nEXPLAIN SELECT * FROM customers WHERE id = 5;\n\n  Seq Scan on customers\n    (cost=0.00..180.00 rows=1)\n    Filter: (id = 5)" },
      { label: 'B-tree 구조', desc: '[Step 3: B-tree 인덱스 구조] B-tree는 정렬된 균형 트리다. 루트 노드에서 시작해 리프 노드까지 내려가며 값을 찾는다. 깊이가 균일해서 탐색 경로가 짧다.',
        phase: 'btree_intro', scanRow: -1, treeHighlight: ['root', 'left', 'right', 'leaf5'],
        sql: "-- 인덱스 생성\nCREATE INDEX idx_customers_id\nON customers (id);" },
      { label: 'Index Scan', desc: '[Step 4: Index Scan] 인덱스가 있으면 루트 → 중간 → 리프 3단계만에 id=5를 찾는다. 리프 노드에 물리적 주소가 있어 해당 행으로 바로 이동한다.',
        phase: 'index_scan', scanRow: 4, treeHighlight: ['root', 'right', 'leaf5'],
        sql: "-- Index Scan (인덱스 탐색)\nEXPLAIN SELECT * FROM customers WHERE id = 5;\n\n  Index Scan using idx_customers_id\n    (cost=0.14..8.16 rows=1)\n    Index Cond: (id = 5)" },
      { label: '비용 비교', desc: '[Step 5: 비용 비교] Sequential Scan cost=180 vs Index Scan cost=8.16. 인덱스가 약 22배 효율적이다. 테이블이 클수록 차이는 더 벌어진다.',
        phase: 'compare', scanRow: -1, treeHighlight: [],
        sql: "-- Seq Scan:  cost=0.00..180.00\n-- Index Scan: cost=0.14..8.16\n\n-- 차이: 약 22배\n-- 테이블 100만 행이면 수천 배 차이" },
      { label: '선택도', desc: '[Step 6: 선택도(Selectivity)] 선택도가 높으면(결과 행이 적으면) Index Scan이 유리하다. 선택도가 낮으면(대부분 해당) Seq Scan이 오히려 빠를 수 있다. 플래너가 자동으로 최적 방법을 선택한다.',
        phase: 'selectivity', scanRow: -1, treeHighlight: [],
        sql: "-- 높은 선택도: 1명만 해당 → Index Scan\nSELECT * FROM customers WHERE email = 'kim@mail.com';\n\n-- 낮은 선택도: 대부분 해당 → Seq Scan\nSELECT * FROM customers WHERE age >= 18;" }
    ];

    function BTreeViz({ highlight }) {
      const hl = new Set(highlight);
      const nodeClass = (key, base) => {
        const active = hl.has(key);
        return `${base} ${active ? 'ring-2 ring-blue-500 scale-105' : ''} transition-all duration-500`;
      };
      return (
        <div className="flex flex-col items-center gap-3">
          <div className={nodeClass('root', 'px-4 py-2 bg-blue-600 text-white rounded-lg text-xs font-bold')}>
            루트: [4]
          </div>
          <div className="flex items-center gap-1 text-slate-300">
            <svg width="60" height="20"><line x1="30" y1="0" x2="10" y2="20" stroke="currentColor" strokeWidth="1.5"/></svg>
            <svg width="60" height="20"><line x1="30" y1="0" x2="50" y2="20" stroke="currentColor" strokeWidth="1.5"/></svg>
          </div>
          <div className="flex gap-6">
            <div className={nodeClass('left', 'px-3 py-2 bg-blue-500 text-white rounded-lg text-xs font-bold')}>
              [1, 2, 3, 4]
            </div>
            <div className={nodeClass('right', 'px-3 py-2 bg-blue-500 text-white rounded-lg text-xs font-bold')}>
              [5, 6, 7, 8]
            </div>
          </div>
          <div className="flex items-center gap-1 text-slate-300">
            <div className="w-[60px]"></div>
            <svg width="60" height="20"><line x1="30" y1="0" x2="30" y2="20" stroke="currentColor" strokeWidth="1.5"/></svg>
          </div>
          <div className="flex gap-6">
            <div className="w-[90px]"></div>
            <div className={nodeClass('leaf5', 'px-3 py-2 bg-emerald-500 text-white rounded-lg text-xs font-bold')}>
              id=5 → 행 주소
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [seqScanProgress, setSeqScanProgress] = useState(0);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 5000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        if (stepData.phase === 'seq_scan') {
          setSeqScanProgress(0);
          const ids = TABLE_DATA.map((_, i) => setTimeout(() => setSeqScanProgress(i + 1), (i + 1) * 400));
          return () => ids.forEach(clearTimeout);
        }
        setSeqScanProgress(0);
      }, [currentStepIdx]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">V-2-1. 인덱스의 원리</h1>
              </div>
              <p className="text-slate-600"><b>B-tree</b> 인덱스가 어떻게 검색을 빠르게 하는지, <b>Sequential Scan</b>과 <b>Index Scan</b>을 비교합니다.</p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 min-h-[110px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[400px] flex flex-col justify-center">
                  <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">SQL / EXPLAIN</div>
                  <div className="bg-slate-800 rounded-lg p-4 font-mono text-sm text-slate-200 leading-relaxed whitespace-pre-wrap overflow-x-auto">{stepData.sql}</div>

                  {stepData.phase === 'compare' && (
                    <div className="mt-4 space-y-2">
                      <div className="flex items-center gap-3">
                        <span className="text-xs font-bold text-slate-500 w-24">Seq Scan</span>
                        <div className="flex-1 bg-slate-100 rounded-full h-5 overflow-hidden">
                          <div className="bg-red-400 h-full rounded-full transition-all duration-1000" style={{width: '100%'}}></div>
                        </div>
                        <span className="text-xs font-mono text-red-600 w-16 text-right">180.00</span>
                      </div>
                      <div className="flex items-center gap-3">
                        <span className="text-xs font-bold text-slate-500 w-24">Index Scan</span>
                        <div className="flex-1 bg-slate-100 rounded-full h-5 overflow-hidden">
                          <div className="bg-emerald-400 h-full rounded-full transition-all duration-1000" style={{width: '4.5%'}}></div>
                        </div>
                        <span className="text-xs font-mono text-emerald-600 w-16 text-right">8.16</span>
                      </div>
                    </div>
                  )}

                  {stepData.phase === 'selectivity' && (
                    <div className="mt-4 grid grid-cols-2 gap-3">
                      <div className="p-3 bg-emerald-50 border-2 border-emerald-300 rounded-lg text-center">
                        <div className="text-xs font-bold text-emerald-600">높은 선택도</div>
                        <div className="text-lg font-bold text-emerald-700 mt-1">1 / 8행</div>
                        <div className="text-xs text-slate-500 mt-1">→ Index Scan 유리</div>
                      </div>
                      <div className="p-3 bg-red-50 border-2 border-red-300 rounded-lg text-center">
                        <div className="text-xs font-bold text-red-600">낮은 선택도</div>
                        <div className="text-lg font-bold text-red-700 mt-1">8 / 8행</div>
                        <div className="text-xs text-slate-500 mt-1">→ Seq Scan 유리</div>
                      </div>
                    </div>
                  )}
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button aria-label={isPlaying?'자동 재생 정지':'자동 재생 시작'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                    </button>
                    <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex gap-1">{STEPS.map((s,i)=>(<button key={i} aria-label={`Step ${i+1}: ${s.label}`} onClick={()=>{setCurrentStepIdx(i);setIsPlaying(false);}} className={`w-2.5 h-2.5 rounded-full transition-all ${i===currentStepIdx?'bg-blue-600 scale-125':i<currentStepIdx?'bg-blue-300':'bg-slate-200'}`}/>))}</div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">{currentStepIdx+1} / {STEPS.length}</div>
                  </div>
                </div>
              </div>

              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-white flex flex-col">
                  <div className="flex items-center px-4 py-3 bg-slate-100 border-b border-slate-200 gap-2">
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-500 font-semibold">
                      {stepData.phase === 'btree_intro' || stepData.phase === 'index_scan' ? 'B-tree 인덱스' : 'customers 테이블'}
                    </span>
                  </div>
                  <div className="p-4 overflow-y-auto flex-1">
                    {(stepData.phase === 'btree_intro' || stepData.phase === 'index_scan') ? (
                      <div className="flex flex-col items-center justify-center h-full py-6">
                        <BTreeViz highlight={stepData.treeHighlight} />
                        {stepData.phase === 'index_scan' && (
                          <div className="mt-4 p-3 bg-emerald-50 border-2 border-emerald-300 rounded-lg text-xs text-emerald-700 font-bold text-center">
                            루트 [4] → 오른쪽 [5,6,7,8] → 리프에서 id=5 주소 발견 → 행으로 직행
                          </div>
                        )}
                      </div>
                    ) : (
                      <div className="overflow-hidden rounded-lg border border-slate-200">
                        <table className="w-full text-xs">
                          <thead><tr className="bg-slate-700 text-white">
                            <th className="p-2 text-center w-8"></th>
                            <th className="p-2 text-left">id</th>
                            <th className="p-2 text-left">name</th>
                            <th className="p-2 text-left">email</th>
                            <th className="p-2 text-left">age</th>
                          </tr></thead>
                          <tbody>
                            {TABLE_DATA.map((row, i) => {
                              const isTarget = row.id === 5;
                              const isScanning = stepData.phase === 'seq_scan' && i < seqScanProgress;
                              const isFound = isTarget && (stepData.scanRow === i || (stepData.phase === 'seq_scan' && seqScanProgress > i));
                              return (
                                <tr key={i} className={`border-t transition-all duration-300 ${isFound ? 'bg-emerald-100' : isScanning ? 'bg-amber-50' : ''}`}>
                                  <td className="p-2 text-center">
                                    {isScanning && !isFound && <span className="text-amber-500">→</span>}
                                    {isFound && <span className="text-emerald-600 font-bold">✓</span>}
                                  </td>
                                  <td className={`p-2 font-mono ${isFound ? 'font-bold text-emerald-700' : ''}`}>{row.id}</td>
                                  <td className="p-2">{row.name}</td>
                                  <td className="p-2 font-mono">{row.email}</td>
                                  <td className="p-2">{row.age}</td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    )}

                    {stepData.phase === 'seq_scan' && (
                      <div className="mt-3 p-2 bg-amber-50 border border-amber-200 rounded text-xs text-amber-700 text-center">
                        스캔 진행: {seqScanProgress} / {TABLE_DATA.length}행 확인
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
