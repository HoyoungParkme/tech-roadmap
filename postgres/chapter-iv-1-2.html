<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — IV-1-2. EXPLAIN과 실행 계획 읽기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    PostgreSQL Chapter IV-1-2 — EXPLAIN과 실행 계획 읽기
    학습 목표: EXPLAIN ANALYZE 출력을 읽고 Sequential Scan vs Index Scan을 구분할 수 있다.
    조작법: "자동 실행" 버튼으로 재생, 이전/다음 버튼으로 수동 전환.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { label: 'EXPLAIN 기본', desc: '[Step 1: EXPLAIN — 실행 계획 미리보기] EXPLAIN은 쿼리를 실행하지 않고 "어떻게 처리할 계획인지"만 보여준다. 지도 앱에서 경로를 미리보는 것과 같다.',
        explain: { type: 'Seq Scan', table: 'users', cost: '0.00..1.05', rows: '3', width: '40', filter: 'age > 25' },
        showActual: false, hasIndex: false },
      { label: 'cost 읽기', desc: '[Step 2: cost — 비용 추정값] cost=0.00..1.05에서 첫 번째 숫자(0.00)는 "첫 행까지의 비용", 두 번째(1.05)는 "총 비용"이다. 숫자 자체보다 두 실행 계획의 비용을 비교할 때 의미가 있다.',
        explain: { type: 'Seq Scan', table: 'users', cost: '0.00..1.05', rows: '3', width: '40', filter: 'age > 25' },
        showActual: false, hasIndex: false, highlight: 'cost' },
      { label: 'EXPLAIN ANALYZE', desc: '[Step 3: EXPLAIN ANALYZE — 계획 + 실측값] 실제로 쿼리를 실행한 뒤 계획값과 실측값을 함께 보여준다. actual time, Planning Time, Execution Time이 추가된다.',
        explain: { type: 'Seq Scan', table: 'users', cost: '0.00..1.05', rows: '3', width: '40', filter: 'age > 25', actualTime: '0.012..0.018', actualRows: '3', loops: '1', removed: '1', planTime: '0.085', execTime: '0.038' },
        showActual: true, hasIndex: false },
      { label: 'Seq Scan', desc: '[Step 4: Sequential Scan — 전체 읽기] 테이블을 처음부터 끝까지 읽는다. 대부분의 행을 가져올 때나 테이블이 작을 때 유리하다. 현재 인덱스가 없어 Seq Scan을 선택했다.',
        explain: { type: 'Seq Scan', table: 'users', cost: '0.00..1.05', rows: '3', width: '40', filter: 'age > 25' },
        showActual: false, hasIndex: false, highlight: 'type' },
      { label: '인덱스 추가', desc: '[Step 5: CREATE INDEX — 인덱스 추가] age 열에 인덱스를 추가하면 플래너가 Index Scan을 선택할 수 있다. 인덱스를 먼저 탐색해 해당 행 위치만 찾아간다.',
        explain: { type: 'Index Scan', index: 'idx_users_age', table: 'users', cost: '0.15..8.31', rows: '3', width: '40', cond: 'age > 25' },
        showActual: false, hasIndex: true, highlight: 'type' },
      { label: '비교 요약', desc: '[Step 6: Seq Scan vs Index Scan] 조건에 맞는 행이 전체의 일부일 때 Index Scan이 유리하다. 대부분의 행을 가져올 때는 Seq Scan이 더 빠를 수 있다. 플래너가 통계를 보고 자동으로 판단한다.',
        explain: null, showActual: false, hasIndex: true, highlight: 'compare' }
    ];

    function ExplainBlock({ data, showActual, highlight }) {
      if (!data) return null;
      const isIndex = data.type === 'Index Scan';
      return (
        <div className="bg-slate-800 rounded-lg p-4 font-mono text-sm leading-relaxed overflow-x-auto">
          <div className="text-slate-500 mb-1">QUERY PLAN</div>
          <div className="text-slate-500 mb-2">{'─'.repeat(50)}</div>
          <div>
            <span className={`${isIndex ? 'text-emerald-400' : 'text-amber-400'} font-bold ${highlight === 'type' ? 'bg-slate-600 px-1 rounded' : ''}`}>{data.type}</span>
            {isIndex && <span className="text-slate-400"> using </span>}
            {isIndex && <span className="text-blue-400">{data.index}</span>}
            <span className="text-slate-400"> on </span>
            <span className="text-white">{data.table}</span>
            <span className="text-slate-400">  (</span>
            <span className={`${highlight === 'cost' ? 'text-yellow-300 bg-slate-600 px-1 rounded' : 'text-slate-300'}`}>cost={data.cost}</span>
            <span className="text-slate-400"> rows=</span><span className="text-slate-300">{data.rows}</span>
            <span className="text-slate-400"> width=</span><span className="text-slate-300">{data.width}</span>
            <span className="text-slate-400">)</span>
          </div>
          {showActual && data.actualTime && (
            <div className="ml-4 text-blue-300">
              (actual time={data.actualTime} rows={data.actualRows} loops={data.loops})
            </div>
          )}
          <div className="ml-4 text-slate-400">
            {data.filter && <div>Filter: ({data.filter})</div>}
            {data.cond && <div>Index Cond: ({data.cond})</div>}
          </div>
          {showActual && data.removed && (
            <div className="ml-4 text-slate-500">Rows Removed by Filter: {data.removed}</div>
          )}
          {showActual && data.planTime && (
            <>
              <div className="text-violet-400 mt-2">Planning Time: {data.planTime} ms</div>
              <div className="text-violet-400">Execution Time: {data.execTime} ms</div>
            </>
          )}
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">IV-1-2. EXPLAIN과 실행 계획 읽기</h1>
              </div>
              <p className="text-slate-600"><b>EXPLAIN</b>은 경로 미리보기, <b>EXPLAIN ANALYZE</b>는 계획 대비 실측 비교. 쿼리 성능 진단의 핵심 도구입니다.</p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 min-h-[110px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[400px] flex flex-col justify-center">
                  <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">EXPLAIN 출력</div>

                  {stepData.explain ? (
                    <div className="space-y-4">
                      {stepData.hasIndex && (
                        <div className="p-2 bg-emerald-50 border border-emerald-200 rounded text-xs text-emerald-700 font-mono">
                          CREATE INDEX idx_users_age ON users (age);
                        </div>
                      )}
                      <ExplainBlock data={stepData.explain} showActual={stepData.showActual} highlight={stepData.highlight} />
                    </div>
                  ) : (
                    <div className="space-y-3">
                      <div className="text-sm font-semibold text-slate-500 mb-2">Seq Scan vs Index Scan</div>
                      <div className="grid grid-cols-2 gap-3">
                        <div className="p-4 bg-amber-50 border-2 border-amber-300 rounded-lg">
                          <div className="text-xs font-bold text-amber-600 mb-2">Sequential Scan</div>
                          <div className="text-sm text-slate-700">전체를 처음부터 끝까지 읽는다</div>
                          <div className="mt-2 text-xs text-slate-500">유리: 대부분의 행 필요, 테이블 작음</div>
                          <div className="mt-1 font-mono text-xs text-amber-700">cost=0.00..1.05</div>
                        </div>
                        <div className="p-4 bg-emerald-50 border-2 border-emerald-300 rounded-lg">
                          <div className="text-xs font-bold text-emerald-600 mb-2">Index Scan</div>
                          <div className="text-sm text-slate-700">인덱스로 위치를 먼저 찾아간다</div>
                          <div className="mt-2 text-xs text-slate-500">유리: 조건 맞는 행이 일부</div>
                          <div className="mt-1 font-mono text-xs text-emerald-700">cost=0.15..8.31</div>
                        </div>
                      </div>
                      <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg text-sm text-blue-800">
                        플래너가 통계를 보고 자동 판단. 인덱스가 있어도 전체 행의 30~40% 이상이면 Seq Scan을 선택할 수 있다.
                      </div>
                    </div>
                  )}
                </div>

                {/* 컨트롤 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                    </button>
                    <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex gap-1">{STEPS.map((s, i) => (<button key={i} aria-label={`Step ${i+1}: ${s.label}`} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }} className={`w-2.5 h-2.5 rounded-full transition-all ${i === currentStepIdx ? 'bg-blue-600 scale-125' : i < currentStepIdx ? 'bg-blue-300' : 'bg-slate-200'}`} />))}</div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">{currentStepIdx + 1} / {STEPS.length}</div>
                  </div>
                </div>
              </div>

              {/* 오른쪽 패널 */}
              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-white flex flex-col">
                  <div className="flex items-center px-4 py-3 bg-slate-100 border-b border-slate-200 gap-2">
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-500 font-semibold">EXPLAIN 필드 가이드</span>
                  </div>
                  <div className="p-6 overflow-y-auto flex-1 space-y-4">
                    {[
                      { t: 'EXPLAIN', d: '쿼리를 실행하지 않고 실행 계획만 출력. 비용 추정값을 보여준다.', a: currentStepIdx <= 1 },
                      { t: 'EXPLAIN ANALYZE', d: '실제로 실행 후 계획값과 실측값을 함께 보여준다. 성능 진단 핵심.', a: currentStepIdx === 2 },
                      { t: 'cost', d: '시작비용..총비용. 플래너의 추정치. 두 계획을 비교할 때 유용.', a: currentStepIdx === 1 },
                      { t: 'rows / width', d: 'rows: 예상 행 수. width: 행 한 개 크기(바이트).', a: currentStepIdx <= 2 },
                      { t: 'actual time', d: 'ANALYZE에서만. 첫 행~마지막 행 실제 시간(ms).', a: currentStepIdx === 2 },
                      { t: 'Sequential Scan', d: '테이블 전체를 순서대로 읽기. 대부분의 행 필요 시 유리.', a: currentStepIdx === 3 },
                      { t: 'Index Scan', d: '인덱스로 위치를 찾아가기. 조건 맞는 행이 일부일 때 유리.', a: currentStepIdx >= 4 }
                    ].map((item, i) => (
                      <div key={i} className={`p-3 rounded-lg border-2 transition-all duration-500 ${item.a ? 'border-blue-400 bg-blue-50 scale-[1.02]' : 'border-slate-200 bg-slate-50'}`}>
                        <div className={`text-xs font-bold mb-1 ${item.a ? 'text-blue-600' : 'text-slate-400'}`}>{item.t}</div>
                        <div className="text-sm text-slate-700">{item.d}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
