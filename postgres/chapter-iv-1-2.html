            'WHERE o.id = 42;  -- 결과 1건',
            '--  Nested Loop  (cost=0.56..16.61 rows=1 width=64)',
            '--    ->  Index Scan on orders  (cost=0.28..8.30 rows=1)',
            '--          Index Cond: (id = 42)',
            '--    ->  Index Scan on users   (cost=0.28..8.30 rows=1)',
            '--          Index Cond: (id = orders.user_id)',
            '',
            '-- ② Hash Join : 작은 쪽을 메모리 해시로 만들고 큰 쪽이 조회',
            '--   조건: 동등 조건(=), 메모리에 들어가는 크기, 인덱스 없어도 OK',
            'EXPLAIN',
            'SELECT * FROM orders o',
            'JOIN users u ON u.id = o.user_id;',
            '--  Hash Join  (cost=32.50..58.80 rows=800 width=64)',
            '--    Hash Cond: (o.user_id = u.id)',
            '--    ->  Seq Scan on orders  (cost=0.00..14.00 rows=800)',
            '--    ->  Hash  (cost=18.50..18.50 rows=1000)',
            '--          Buckets: 1024  Batches: 1',
            '--          ->  Seq Scan on users  (cost=0.00..18.50 rows=1000)',
            '',
            '-- ③ Merge Join : 양쪽 정렬된 상태로 지퍼처럼 병합',
            '--   조건: 양쪽 이미 정렬(인덱스나 ORDER BY), 큰 결과집합',
            'EXPLAIN',
            'SELECT * FROM orders o',
            'JOIN users u ON u.id = o.user_id',
            'ORDER BY u.id;',
            '--  Merge Join  (cost=0.85..120.00 rows=800 width=64)',
            '--    Merge Cond: (o.user_id = u.id)',
            '--    ->  Index Scan on orders_uid_idx',
            '--    ->  Index Scan on users_pkey',
            '',
            '-- 알고리즘 선택 요약:',
            "--  • 한 건 찾기 / 안쪽 인덱스 有 → Nested Loop",
            '--  • 동등 조건 + 양쪽 큰 테이블  → Hash Join',
            '--  • 정렬 결과 필요 / 범위 조건  → Merge Join',
            '--  → 옵티마이저가 cost 기준으로 자동 선택',
            '',
            '-- 끝. 이 5단계로 실행 계획을 읽을 줄 알게 됐다.',
          ],
          highlight: [3, 4, 5, 6, 7, 14, 15, 16, 17, 18, 26, 27, 28, 29, 30, 36, 37, 38, 39, 40],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — 실행 계획 트리 (depth 기반 들여쓰기)
    // ─────────────────────────────────────────────────────
    const KIND_STYLE = {
      scan:  { bg: 'bg-slate-100',  border: 'border-slate-300',  text: 'text-slate-700',  badge: 'bg-slate-200 text-slate-700' },
      index: { bg: 'bg-orange-50',  border: 'border-orange-300', text: 'text-orange-800', badge: 'bg-orange-200 text-orange-800' },
      sort:  { bg: 'bg-amber-50',   border: 'border-amber-300',  text: 'text-amber-800',  badge: 'bg-amber-200 text-amber-800' },
      join:  { bg: 'bg-orange-100', border: 'border-orange-400', text: 'text-orange-900', badge: 'bg-orange-300 text-orange-900' },
      hash:  { bg: 'bg-amber-100',  border: 'border-amber-400',  text: 'text-amber-900',  badge: 'bg-amber-300 text-amber-900' },
      cond:  { bg: 'bg-white',      border: 'border-slate-200',  text: 'text-slate-500',  badge: 'bg-slate-100 text-slate-500' },
      meta:  { bg: 'bg-emerald-50', border: 'border-emerald-300',text: 'text-emerald-800',badge: 'bg-emerald-200 text-emerald-800' },
    };

    function PlanNode({ node }) {
      const s = KIND_STYLE[node.kind] || KIND_STYLE.scan;
      const pad = node.depth * 16;
      return (
        <div className="flex items-stretch">
          <div style={{ width: pad }} className="flex-shrink-0 flex">
            {node.depth > 0 && (
              <div className="flex items-center text-orange-400 text-xs pl-1">
                {'-'.repeat(node.depth)}{'>'}
              </div>
            )}
          </div>
          <div className={`flex-1 rounded-lg border ${s.bg} ${s.border} px-3 py-2`}>
            <div className="flex items-center justify-between gap-2 flex-wrap">
              <div className="flex items-center gap-2">
                <span className={`text-sm font-bold ${s.text}`}>{node.op}</span>
                <span className="text-xs text-slate-600">{node.detail}</span>
              </div>
              {node.cost && (
                <span className={`text-[10px] px-2 py-0.5 rounded font-mono ${s.badge}`}>
                  cost={node.cost} rows={node.rows}
                </span>
              )}
            </div>
            {node.actual && (
              <div className="mt-1 text-[11px] text-emerald-700 font-mono">
                ↳ {node.actual}
              </div>
            )}
          </div>
        </div>
      );
    }

    function CompareBox({ compare }) {
      if (!compare) return null;
      const tone = {
        slate:  'bg-slate-50 border-slate-300 text-slate-700',
        orange: 'bg-orange-50 border-orange-300 text-orange-800',
        amber:  'bg-amber-50 border-amber-300 text-amber-800',
      };
      return (
        <div className="mt-3 rounded-lg border-2 border-orange-400 bg-white p-3">
          <div className="text-xs font-bold text-orange-800 mb-2">⚖️ {compare.title}</div>
          <div className="space-y-1.5">
            {compare.rows.map((r, i) => (
              <div key={i} className={`flex gap-2 items-center rounded border px-2 py-1.5 ${tone[r.tone] || tone.slate}`}>
                <span className="text-xs font-bold w-24 flex-shrink-0">{r.left}</span>
                <span className="text-xs flex-1">{r.right}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function NoteBox({ note }) {
      if (!note) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-orange-300 bg-orange-50 p-3">
          <div className="text-xs font-bold text-orange-800 mb-2">📖 {note.title}</div>
          <ul className="space-y-1">
            {note.items.map((it, i) => (
              <li key={i} className="text-sm text-orange-900 flex gap-2">
                <span className="text-orange-500">▸</span>
                <span>{it}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-orange-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-orange-800">실행 계획 트리</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 옵티마이저의 결과물</span>
          </div>
          <div className="space-y-1.5">
            {state.plan.map((n, i) => (
              <PlanNode key={i} node={n} />
            ))}
          </div>
          {state.arrow && (
            <div className="mt-3 text-center text-xs font-bold text-orange-600 py-2 border-y border-dashed border-orange-300">
              ↓ {state.arrow} ↓
            </div>
          )}
          <NoteBox note={state.note} />
          <CompareBox compare={state.compare} />
          <div className="mt-3 text-xs text-orange-900 bg-orange-50 border border-orange-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-orange-500/15 border-l-2 border-orange-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-orange-600 text-white font-bold">IV</span>
              <div>
                <h1 className="text-2xl font-bold text-orange-900">Chapter IV-1-2. EXPLAIN과 실행 계획</h1>
                <p className="text-sm text-orange-800/80">EXPLAIN → 스캔 종류 → cost/rows → ANALYZE → JOIN 3종</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-orange-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-orange-600' : 'bg-orange-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-orange-700 text-orange-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-orange-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-orange-700 text-white' : 'bg-orange-600 text-white hover:bg-orange-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-orange-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-orange-400 bg-white px-4 py-3 text-sm text-orange-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                EXPLAIN으로 계획을 보고, Seq/Index Scan을 구분하고, cost/rows의 의미를 해석하고, ANALYZE로 실제와 비교하고, JOIN 3종을 골라 쓸 줄 알면 쿼리 튜닝의 출발선이다. 다음 챕터에서는 인덱스 설계 자체를 깊이 다룬다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['EXPLAIN', 'ANALYZE', 'Seq Scan', 'Index Scan', 'cost', 'rows', 'Nested Loop', 'Hash Join', 'Merge Join', 'Optimizer'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-orange-100 text-orange-800 border border-orange-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-orange-700">
              <a href="./chapter-iv-1-1.html" className="underline hover:no-underline">← 이전: IV-1-1</a>
              <a href="./index.html" className="underline hover:no-underline">챕터 목록</a>
              <a href="./chapter-iv-2-1.html" className="underline hover:no-underline">다음: IV-2-1 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
