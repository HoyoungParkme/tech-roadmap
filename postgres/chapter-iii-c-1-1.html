    학습 목표: ORDER BY 기본 → DESC → 복합 정렬 → LIMIT/OFFSET → keyset pagination
              5단계로 "결과 순서를 통제하고 큰 데이터를 페이지 단위로 자르는 법" 익히기
    핵심 비유: 5권의 책을 책꽂이에 어떻게 꽂을지 / 책장이 100만권일 때 어떻게 한 페이지씩 보여줄지

    색상: orange (postgres 도메인)
  -->

    // ─────────────────────────────────────────────────────
    // 5단계 시나리오

    const STEPS = [
      {

        tabIdx: 2,
      },
      {

        desc: '12권의 책을 한 페이지 4권씩 보여주려면? LIMIT 4 OFFSET 0 = 1페이지, LIMIT 4 OFFSET 4 = 2페이지, LIMIT 4 OFFSET 8 = 3페이지. 가장 직관적이고 어디서나 통한다. 다만 OFFSET 100000 같이 깊은 페이지로 갈수록 DB 가 "앞 10만 행을 읽고 버려야" 하므로 느려진다. 작은 페이지(수십~수백 행)에는 OK.',
        scenario: 'limitOffset',
        sortLabel: 'ORDER BY price LIMIT 4 OFFSET (page-1)*4',
        keyPoint: 'LIMIT/OFFSET 은 쉽지만 페이지가 깊어질수록 느려진다. 큰 데이터에는 keyset 으로.',
        tabIdx: 3,
      },
      {
        title: 'Step 5. Keyset Pagination — 대용량 효율',
        desc: 'OFFSET 의 약점을 해결하는 패턴. "마지막으로 본 행의 키 이후부터" 를 WHERE 절로 자른다. 예: 가격 오름차순으로 보여주는 중인데, 마지막 본 책의 (price=15000, id=205) 라면 다음 페이지는 WHERE (price, id) > (15000, 205) ORDER BY price, id LIMIT 4. OFFSET 을 안 쓰니까 깊은 페이지도 빠르다 — 인덱스만 잘 타면 페이지 깊이와 무관하게 일정한 속도. 단, 임의의 N페이지로 점프는 어렵고 "다음/이전" 형태로만 가능.',

    // ─────────────────────────────────────────────────────
    // CodeViewer 탭별 SQL 파일
    // ─────────────────────────────────────────────────────
    const CODE_TABS = [
      {
        lang: 'sql',
        filename: 'asc.sql',
        lines: [
          '-- (1) ORDER BY 컬럼  (기본 = ASC 오름차순)',
          '',
          'SELECT id, title, price, sold_at',
          'FROM books',
          'ORDER BY price;          -- price ASC 와 동일',
          '',
          '-- 결과 순서:',
          '--   101  SQL 입문         18000  2026-05-10',
          '--   102  DB 설계          25000  2026-05-12',
          '--   104  인덱스 튜닝      25000  2026-05-13   <- 25000 동점',
          '--   103  PostgreSQL 실전  32000  2026-05-11',
          '--   105  쿼리 옵티마이저  41000  2026-05-09',
          '',
          '-- 포인트',
          '-- - ORDER BY 가 없으면 행 순서는 보장 안 됨 (heap 순서)',

          '-- - NULL 은 기본 NULLS LAST (오름차순일 때 마지막)',

      },
      {
        lang: 'sql',

          '--   103  PostgreSQL 실전  32000',

          '-- ORDER BY price DESC  ->  기본 NULLS FIRST',

        ],

      },

        lang: 'sql',

          '-- 완전한 안정 정렬: 항상 PK 를 마지막에',
          '-- ORDER BY price DESC, sold_at DESC, id ASC',
          '-- -> 어떤 동점이 나와도 결과 순서가 100% 같음',
          '-- -> 페이지네이션 안정성의 핵심',
        ],
        highlight: [7, 8, 9, 11, 12, 13, 14, 15, 16, 22, 23, 24, 25],

          '-- (4) LIMIT / OFFSET  (페이지네이션 기본)',

          'WHERE (price, id) > (19000, 209)',

          '',
          '-- 장점',

          '--   - 정렬 키만 보내주면 됨 (커서 토큰)',

          '--   - (그래서 price 단독이 아니라 (price, id) 를 함께 씀)',
        ],
        highlight: [7, 8, 10, 11, 12, 13, 14, 15, 17, 18, 19, 20, 21, 22, 23, 25, 26, 27, 28, 29, 30, 32, 33, 34, 35, 37, 38, 39, 40],
      },
    ];

    // ─────────────────────────────────────────────────────
    // 시나리오별 정렬/페이징 계산
    //   각 시나리오 -> {rows, layout, footer, ...}
    //   layout: 'list' 단순 리스트 / 'paged' 페이지 박스 3개
    // ─────────────────────────────────────────────────────
    function buildScenario(scenarioKey, pageNum) {
      if (scenarioKey === 'orderByAsc') {
        const rows = [...BASE_BOOKS].sort((a, b) => a.price - b.price);
        return { rows, layout: 'list', footer: '5건. price 오름차순. 25000 동점 -> 102/104 순서 불안정.' };
      }
      if (scenarioKey === 'orderByDesc') {
        const rows = [...BASE_BOOKS].sort((a, b) => b.price - a.price);
        return { rows, layout: 'list', footer: '5건. price 내림차순. 25000 동점은 여전히 불안정.' };
      }
      if (scenarioKey === 'orderByMulti') {
        const rows = [...BASE_BOOKS].sort((a, b) => {
          if (b.price !== a.price) return b.price - a.price;
          return b.sold_at.localeCompare(a.sold_at);
        });
        return { rows, layout: 'list', footer: '5건. price DESC, sold_at DESC. 25000 동점 -> 104(13일) 먼저.' };
      }
      if (scenarioKey === 'limitOffset') {
        const sorted = [...BIG_BOOKS].sort((a, b) => a.price - b.price);
        const pages = [
          sorted.slice(0, 4),
          sorted.slice(4, 8),
          sorted.slice(8, 12),
        ];
        return {
          rows: pages,
          layout: 'paged',
          footer: '총 12건 / 4건씩 / 3페이지. page ' + pageNum + ' 강조.',
          activePage: pageNum,
        };
      }
      if (scenarioKey === 'keyset') {
        const sorted = [...BIG_BOOKS].sort((a, b) => a.price - b.price);
        const pages = [
          sorted.slice(0, 4),
          sorted.slice(4, 8),
          sorted.slice(8, 12),
        ];
        const cursors = [
          { label: '시작 (LIMIT 4)' },
          { label: '(price,id) > (' + sorted[3].price + ', ' + sorted[3].id + ')' },
          { label: '(price,id) > (' + sorted[7].price + ', ' + sorted[7].id + ')' },
        ];
        return {
          rows: pages,
          layout: 'paged',
          footer: 'OFFSET 없이 (price,id) 커서로 자름. 페이지 깊이와 무관하게 일정한 속도.',
          activePage: pageNum,
          cursors,
        };
      }
      return { rows: [], layout: 'list', footer: '' };
    }

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — orange 톤
    // ─────────────────────────────────────────────────────
    function RowCard({ row, rank }) {
      return (
        <div className="rounded-lg border border-orange-300 bg-orange-50 px-3 py-2 flex items-center gap-3">
          <span className="w-5 h-5 rounded-full bg-orange-600 text-white text-[10px] font-bold flex items-center justify-center shrink-0">
            {rank}
          </span>
          <span className="text-[10px] font-mono text-orange-700 w-10">#{row.id}</span>
          <span className="text-sm font-bold text-orange-900 flex-1 truncate">{row.title}</span>
          <span className="text-sm font-mono font-bold text-orange-800 w-20 text-right">
            {row.price.toLocaleString()}원
          </span>
          {row.sold_at && (
            <span className="text-[10px] text-orange-600 font-mono w-20 text-right">{row.sold_at}</span>
          )}
        </div>
      );
    }

    function PageBox({ rows, pageNum, active, cursor }) {
      return (
        <div className={`rounded-lg border-2 p-2 transition ${
          active ? 'border-orange-500 bg-orange-50 shadow' : 'border-orange-200 bg-white opacity-70'
        }`}>
          <div className="flex items-center justify-between mb-1.5">
            <span className={`text-[10px] font-bold ${active ? 'text-orange-800' : 'text-orange-500'}`}>
              📄 Page {pageNum}
            </span>
            {cursor && (
              <span className="text-[9px] font-mono text-orange-600 truncate max-w-[65%]">
                {cursor.label}
              </span>
            )}
          </div>
          <div className="space-y-1">
            {rows.map((r, i) => (
              <div key={r.id} className="flex items-center gap-2 text-xs px-2 py-1 rounded bg-white border border-orange-200">
                <span className="text-orange-500 font-bold w-4">{(pageNum - 1) * 4 + i + 1}</span>
                <span className="text-[10px] font-mono text-orange-700 w-9">#{r.id}</span>
                <span className="text-orange-900 flex-1 truncate">{r.title}</span>
                <span className="text-orange-800 font-mono">{r.price.toLocaleString()}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function LiveDataPane({ step, scenario }) {
      const isPaged = scenario.layout === 'paged';
      return (
        <div className="rounded-xl border border-orange-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-2">
            <h3 className="text-sm font-bold text-orange-800">정렬 / 페이지네이션 시뮬레이션</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 결과 행 상태</span>
          </div>

          {/* 정렬 라벨 */}
          <div className="mb-3 rounded-lg bg-orange-100 border border-orange-300 px-3 py-1.5 text-xs font-mono text-orange-900 break-all">
            ▸ {step.sortLabel}
          </div>

          {/* 본문 */}
          {!isPaged && (
            <div className="space-y-1.5">
              {scenario.rows.map((r, i) => (
                <RowCard key={r.id} row={r} rank={i + 1} />
              ))}
            </div>
          )}

          {isPaged && (
            <div className="space-y-2">
              {scenario.rows.map((pageRows, i) => (
                <PageBox
                  key={i}
                  rows={pageRows}
                  pageNum={i + 1}
                  active={scenario.activePage === i + 1}
                  cursor={scenario.cursors ? scenario.cursors[i] : null}
                />
              ))}
            </div>
          )}

          {/* 풋터 */}
          <div className="mt-3 text-[11px] text-orange-900 bg-orange-50 border border-orange-200 rounded px-2 py-1.5">
            📊 {scenario.footer}
          </div>

          {/* 핵심 포인트 */}
          <div className="mt-2 text-xs text-orange-900 bg-amber-50 border border-amber-200 rounded p-2">
            💡 {step.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js + 5탭)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ tabs, activeIdx, onTabChange, stepIdx, total }) {
      const code = tabs[activeIdx];
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code, activeIdx]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 윈도우 헤더 + 탭 */}
          <div className="bg-slate-800 border-b border-slate-700">
            <div className="flex items-center gap-2 px-3 py-2">
              <span className="w-3 h-3 rounded-full bg-red-400"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
              <span className="w-3 h-3 rounded-full bg-green-400"></span>
              <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
              <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
            </div>
            <div className="flex gap-0 px-1 overflow-x-auto">
              {tabs.map((t, i) => (
                <button
                  key={t.filename}
                  onClick={() => onTabChange(i)}
                  className={`px-3 py-1 text-[11px] font-mono whitespace-nowrap transition ${
                    i === activeIdx
                      ? 'bg-[#282c34] text-orange-300 border-t-2 border-orange-400'
                      : 'text-slate-400 hover:text-slate-200 border-t-2 border-transparent'
                  }`}
                >
                  {t.filename}
                </button>
              ))}
            </div>
          </div>

          {/* 코드 본문 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-orange-500/15 border-l-2 border-orange-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>

          {/* 풋터 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [pageNum, setPageNum] = useState(1);
      const [playing, setPlaying] = useState(false);
      const [tabIdx, setTabIdx] = useState(0);
      const intervalRef = useRef(null);

      const step = STEPS[stepIdx];
      const scenario = buildScenario(step.scenario, pageNum);

      // 스텝이 바뀌면 해당 탭으로 자동 전환 + 페이지 리셋
      useEffect(() => {
        setTabIdx(step.tabIdx);
        setPageNum(1);
      }, [stepIdx]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;
      const isPaged = scenario.layout === 'paged';

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-orange-600 text-white font-bold">III</span>
              <div>
                <h1 className="text-2xl font-bold text-orange-900">Chapter III-C-1-1. 정렬과 페이지네이션</h1>
                <p className="text-sm text-orange-800/80">ORDER BY → DESC → 복합 정렬 → LIMIT/OFFSET → Keyset. 5단계로 추적</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-orange-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-orange-600' : 'bg-orange-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-orange-700 text-orange-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-orange-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 페이지 컨트롤 (paged 시나리오에만) */}
            {isPaged && (
              <div className="mb-3 flex items-center justify-center gap-2 flex-wrap">
                <span className="text-xs text-orange-800 font-bold">활성 페이지:</span>
                {[1, 2, 3].map((p) => (
                  <button
                    key={p}
                    onClick={() => setPageNum(p)}
                    className={`px-3 py-1 text-xs rounded font-bold transition ${
                      pageNum === p
                        ? 'bg-orange-600 text-white shadow'
                        : 'bg-white border border-orange-300 text-orange-700 hover:bg-orange-50'
                    }`}
                  >Page {p}</button>
                ))}
              </div>
            )}

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane step={step} scenario={scenario} />
              <CodeViewer
                tabs={CODE_TABS}
                activeIdx={tabIdx}
                onTabChange={setTabIdx}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-orange-700 text-white' : 'bg-orange-600 text-white hover:bg-orange-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-orange-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-orange-400 bg-white px-4 py-3 text-sm text-orange-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                <ul className="space-y-1 list-disc list-inside text-[13px]">
                  <li>ORDER BY 가 없으면 행 순서는 운에 맡기는 것 — 반드시 명시</li>
                  <li>동점이 있으면 tie-breaker 컬럼(보통 PK) 을 ORDER BY 마지막에 둔다</li>
                  <li>작은 페이지: LIMIT/OFFSET 으로 충분</li>
                  <li>큰 데이터 / 무한 스크롤: keyset (커서) 패턴 + 정렬 컬럼 인덱스</li>
                </ul>
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['ORDER BY', 'ASC', 'DESC', 'NULLS FIRST', 'NULLS LAST', 'LIMIT', 'OFFSET', 'Keyset', 'Cursor Pagination', 'Index'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-orange-100 text-orange-800 border border-orange-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-orange-700">
              <a href="./index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <span className="text-orange-700/50">SELECT · ORDER BY · LIMIT · OFFSET · Keyset Pagination</span>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
