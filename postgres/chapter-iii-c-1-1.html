<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — Chapter III-C-1-1. 정렬과 페이지네이션</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { label: "ORDER BY 정렬", desc: "[Step 1] ORDER BY는 결과를 원하는 순서로 정렬합니다. ASC(오름차순)이 기본이고, DESC(내림차순)으로 바꿀 수 있습니다. 여러 열로 정렬할 수도 있습니다.", phase: "orderby" },
      { label: "LIMIT과 OFFSET", desc: "[Step 2] LIMIT은 '최대 N개만 가져와라', OFFSET은 '앞의 N개를 건너뛰어라'입니다. 이 조합으로 페이지를 나눠 조회하는 '페이지네이션'을 구현합니다.", phase: "pagination" },
      { label: "OFFSET 성능 문제", desc: "[Step 3] 문제는 OFFSET이 클 때입니다. OFFSET 10000이면 PostgreSQL이 10,000행을 읽고 버린 뒤 다음 10개를 반환합니다. 페이지가 뒤로 갈수록 점점 느려집니다.", phase: "problem" },
      { label: "커서 기반 대안", desc: "[Step 4] 커서 기반 페이지네이션은 '마지막으로 본 행의 값' 이후부터 가져옵니다. WHERE id > 마지막_id ORDER BY id LIMIT 10. 어느 페이지든 일정한 속도를 유지합니다.", phase: "cursor" },
      { label: "비교 정리", desc: "[Step 5] OFFSET은 간단하지만 대용량에서 느리고, 커서 기반은 빠르지만 '5페이지로 바로 점프'가 어렵습니다. 무한 스크롤에는 커서 기반, 페이지 번호가 필요하면 OFFSET을 씁니다.", phase: "compare" }
    ];

    const ROWS = Array.from({length: 20}, (_, i) => ({ id: i + 1, name: `상품 ${String.fromCharCode(65 + i % 26)}`, price: Math.floor(Math.random() * 90000 + 10000) }))
      .sort((a, b) => a.price - b.price);

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4500); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const phase = stepData.phase;

      const renderViz = () => {
        if (phase === 'orderby') {
          const ascRows = [...ROWS].sort((a, b) => a.price - b.price).slice(0, 8);
          const descRows = [...ROWS].sort((a, b) => b.price - a.price).slice(0, 8);
          return (
            <div className="grid grid-cols-2 gap-4">
              <div>
                <div className="text-xs font-bold text-green-600 mb-2">ORDER BY price ASC (오름차순)</div>
                <table className="w-full text-sm border border-green-200 rounded">
                  <thead><tr className="bg-green-50"><th className="p-1 text-left">id</th><th className="p-1 text-left">name</th><th className="p-1 text-right">price</th></tr></thead>
                  <tbody>{ascRows.map((r, i) => <tr key={i} className="border-t border-green-100"><td className="p-1">{r.id}</td><td className="p-1">{r.name}</td><td className="p-1 text-right font-mono">{r.price.toLocaleString()}</td></tr>)}</tbody>
                </table>
              </div>
              <div>
                <div className="text-xs font-bold text-blue-600 mb-2">ORDER BY price DESC (내림차순)</div>
                <table className="w-full text-sm border border-blue-200 rounded">
                  <thead><tr className="bg-blue-50"><th className="p-1 text-left">id</th><th className="p-1 text-left">name</th><th className="p-1 text-right">price</th></tr></thead>
                  <tbody>{descRows.map((r, i) => <tr key={i} className="border-t border-blue-100"><td className="p-1">{r.id}</td><td className="p-1">{r.name}</td><td className="p-1 text-right font-mono">{r.price.toLocaleString()}</td></tr>)}</tbody>
                </table>
              </div>
            </div>
          );
        }

        if (phase === 'pagination') {
          const pages = [ROWS.slice(0, 5), ROWS.slice(5, 10), ROWS.slice(10, 15)];
          return (
            <div className="space-y-3">
              <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
                <div>SELECT * FROM products ORDER BY price LIMIT 5 OFFSET 0; <span className="text-slate-400">-- 1페이지</span></div>
                <div>SELECT * FROM products ORDER BY price LIMIT 5 OFFSET 5; <span className="text-slate-400">-- 2페이지</span></div>
                <div>SELECT * FROM products ORDER BY price LIMIT 5 OFFSET 10; <span className="text-slate-400">-- 3페이지</span></div>
              </div>
              <div className="grid grid-cols-3 gap-3">
                {pages.map((page, pi) => (
                  <div key={pi} className="border rounded-lg p-2">
                    <div className="text-xs font-bold text-blue-600 mb-1">{pi + 1}페이지 (OFFSET {pi * 5})</div>
                    {page.map((r, i) => (
                      <div key={i} className="text-xs font-mono py-0.5 border-t border-slate-100">{r.name} - {r.price.toLocaleString()}원</div>
                    ))}
                  </div>
                ))}
              </div>
            </div>
          );
        }

        if (phase === 'problem') {
          const offsets = [0, 100, 1000, 10000, 100000];
          const times = [0.5, 2, 15, 120, 850];
          return (
            <div className="space-y-4">
              <div className="text-sm text-center text-slate-600">OFFSET이 커질수록 응답 시간이 급격히 증가</div>
              <div className="space-y-2">
                {offsets.map((o, i) => (
                  <div key={i} className="flex items-center gap-3">
                    <div className="w-32 text-right text-xs font-mono text-slate-600">OFFSET {o.toLocaleString()}</div>
                    <div className="flex-1 bg-slate-100 rounded-full h-6 overflow-hidden">
                      <div className={`h-full rounded-full flex items-center px-2 transition-all duration-1000 ${times[i] > 100 ? 'bg-red-500' : times[i] > 10 ? 'bg-amber-500' : 'bg-green-500'}`}
                           style={{ width: `${Math.min(times[i] / 850 * 100, 100)}%`, minWidth: '40px' }}>
                        <span className="text-xs font-bold text-white">{times[i]}ms</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              <div className="bg-red-50 border border-red-300 p-3 rounded-lg text-center text-sm text-red-700">
                OFFSET 100,000: 100,000행을 읽고 버린 뒤 10개만 반환 = <b>850ms</b>
              </div>
            </div>
          );
        }

        if (phase === 'cursor') {
          return (
            <div className="space-y-4">
              <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
                <div className="text-slate-400">-- 첫 페이지</div>
                <div>SELECT * FROM products ORDER BY id LIMIT 10;</div>
                <div className="text-slate-400 mt-2">-- 다음 페이지 (마지막 id = 10)</div>
                <div>SELECT * FROM products <span className="text-blue-300">WHERE id {'>'} 10</span> ORDER BY id LIMIT 10;</div>
                <div className="text-slate-400 mt-2">-- 그다음 (마지막 id = 20)</div>
                <div>SELECT * FROM products <span className="text-blue-300">WHERE id {'>'} 20</span> ORDER BY id LIMIT 10;</div>
              </div>
              <div className="grid grid-cols-3 gap-3">
                {[{start: 1, end: 10, cursor: 10}, {start: 11, end: 20, cursor: 20}, {start: 21, end: 30, cursor: 30}].map((p, i) => (
                  <div key={i} className="border-2 border-blue-300 rounded-lg p-3 bg-blue-50">
                    <div className="text-xs font-bold text-blue-600 mb-1">id {p.start}~{p.end}</div>
                    <div className="text-xs text-slate-600">WHERE id {'>'} {i === 0 ? 0 : p.start - 1}</div>
                    <div className="text-xs text-green-600 font-bold mt-1">항상 ~0.5ms</div>
                    <div className="text-xs text-blue-500 mt-1">커서: id={p.cursor}</div>
                  </div>
                ))}
              </div>
              <div className="bg-green-50 border border-green-300 p-3 rounded-lg text-center text-sm text-green-700">
                건너뛸 행을 읽지 않아 <b>어느 페이지든 일정한 속도</b>
              </div>
            </div>
          );
        }

        if (phase === 'compare') {
          return (
            <div className="space-y-3">
              <div className="grid grid-cols-2 gap-4">
                <div className="p-4 rounded-lg border-2 border-amber-400 bg-amber-50">
                  <div className="text-sm font-bold text-amber-700 mb-2">OFFSET 방식</div>
                  <div className="text-xs text-slate-600 space-y-1">
                    <div>+ 구현 간단 (LIMIT N OFFSET M)</div>
                    <div>+ "5페이지로 바로 이동" 가능</div>
                    <div className="text-red-600">- 뒤 페이지가 느림</div>
                    <div className="text-red-600">- 데이터 추가 시 중복/누락 가능</div>
                  </div>
                  <div className="mt-3 text-xs font-bold text-amber-600">적합: 소규모 데이터, 페이지 번호 필요</div>
                </div>
                <div className="p-4 rounded-lg border-2 border-blue-400 bg-blue-50">
                  <div className="text-sm font-bold text-blue-700 mb-2">커서 기반 방식</div>
                  <div className="text-xs text-slate-600 space-y-1">
                    <div>+ 어느 페이지든 빠름</div>
                    <div>+ 중복/누락 없음</div>
                    <div className="text-red-600">- 구현이 약간 복잡</div>
                    <div className="text-red-600">- 임의 페이지 점프 어려움</div>
                  </div>
                  <div className="mt-3 text-xs font-bold text-blue-600">적합: 대용량, 무한 스크롤, 피드</div>
                </div>
              </div>
            </div>
          );
        }
        return null;
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold">III-C-1-1. 정렬과 페이지네이션</h1>
              </div>
              <p className="text-slate-600">ORDER BY로 정렬하고 LIMIT/OFFSET으로 페이지를 나누는 방법, 그리고 대용량에서 느려지는 문제와 커서 기반 대안을 체험합니다.</p>
            </header>
            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm min-h-[90px]">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[350px] flex flex-col justify-center">{renderViz()}</div>
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="px-5 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg font-medium disabled:opacity-30 disabled:cursor-not-allowed">이전</button>
                <div className="flex items-center gap-4">
                  <button onClick={togglePlay} className={`px-5 py-2 rounded-lg font-medium ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-blue-600 hover:bg-blue-700 text-white'}`}>{isPlaying ? '일시 정지' : (isEnd ? '처음부터' : '자동 실행')}</button>
                  <div className="flex gap-1">{STEPS.map((_, i) => <button key={i} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }} className={`w-3 h-3 rounded-full ${i === currentStepIdx ? 'bg-blue-600' : i < currentStepIdx ? 'bg-blue-300' : 'bg-slate-200'}`} />)}</div>
                  <span className="text-xs text-slate-400 font-mono">{currentStepIdx + 1}/{STEPS.length}</span>
                </div>
                <button onClick={handleNext} disabled={isEnd} className="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium disabled:opacity-30 disabled:cursor-not-allowed">다음</button>
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
