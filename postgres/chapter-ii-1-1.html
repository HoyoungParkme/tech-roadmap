              <div key={i} className="bg-slate-200 border-b border-r border-slate-300 text-center font-bold text-slate-700 py-1">
                {h}
              </div>
            ))}
            {/* 1행: 헤더 텍스트 */}

              <div key={i} className="bg-slate-50 border-b border-r border-slate-300 text-center font-bold text-slate-700 py-1">
                {c.label}
              </div>
            ))}
            {/* 데이터 행 */}
            {ROWS.map((row, r) => (
              <React.Fragment key={r}>
                <div className="bg-slate-100 border-b border-r border-slate-300 text-center text-slate-500 py-1">{r + 2}</div>
                {COLUMNS.map((c, i) => (
                  <div key={i} className="border-b border-r border-slate-300 text-center text-slate-800 py-1 font-mono">
                    {row[c.key]}
                  </div>
                ))}
              </React.Fragment>
            ))}
          </div>
        </div>
      );
    }

    /** DB 테이블 격자 — 헤더에 타입이 같이 표시되고, 행/열 강조가 가능하다 */
    function TableGrid({ highlight, focusIndex }) {
      const isRowHi = (r) => highlight === 'row' && focusIndex === r;
      const isColHi = (c) => highlight === 'column' && focusIndex === c;

      return (
        <div className="rounded-lg border-2 border-orange-300 overflow-hidden bg-white">
          {/* 테이블 이름 헤더 */}
          <div className="bg-orange-100 border-b border-orange-300 px-3 py-1.5 text-xs font-bold text-orange-800 flex items-center gap-2">
            <span className="text-base">🗂️</span>
            <span>테이블: users</span>
          </div>

          <div className="grid grid-cols-4 text-[12px]">
            {/* 헤더 행 (열 이름 + 타입) */}
            {COLUMNS.map((c, i) => (
              <div
                key={`h-${i}`}
                className={`border-b border-r border-orange-200 text-center py-1.5 ${
                  isColHi(i) ? 'bg-orange-500 text-white' : 'bg-orange-50 text-orange-900'
                }`}
              >
                <div className="font-bold">{c.label}</div>
                <div className={`text-[10px] ${isColHi(i) ? 'text-orange-100' : 'text-orange-500'}`}>{c.type}</div>
              </div>
            ))}

            {/* 데이터 행 */}
            {ROWS.map((row, r) => (
              <React.Fragment key={`r-${r}`}>
                {COLUMNS.map((c, i) => {
                  const rowHi = isRowHi(r);
                  const colHi = isColHi(i);
                  let cellCls = 'border-b border-r border-orange-200 text-center py-1.5 font-mono';
                  if (rowHi && colHi) cellCls += ' bg-orange-600 text-white font-bold';
                  else if (rowHi)     cellCls += ' bg-orange-200 text-orange-900 font-bold';
                  else if (colHi)     cellCls += ' bg-orange-100 text-orange-900';
                  else                cellCls += ' bg-white text-slate-800';
                  return (
                    <div key={`c-${r}-${i}`} className={cellCls}>
                      {row[c.key]}
                    </div>
                  );
                })}
              </React.Fragment>
            ))}
          </div>
        </div>
      );
    }

    /** 데이터베이스 미니맵 — 여러 테이블 카드와 관계선 */
    function DatabaseMap() {
      const tables = [
        { name: 'users',    icon: '👤', cols: ['id', 'name', 'age', 'email'],            rows: 3 },
        { name: 'products', icon: '📦', cols: ['id', 'name', 'price'],                    rows: 12 },
        { name: 'orders',   icon: '🛒', cols: ['id', 'user_id', 'product_id', 'qty'],     rows: 28 },
      ];
      return (
        <div className="space-y-2">
          <div className="rounded-xl border-2 border-orange-400 bg-gradient-to-br from-orange-50 to-amber-50 p-3">
            <div className="flex items-center gap-2 mb-2">
              <span className="text-2xl">🐘</span>
              <span className="text-base font-bold text-orange-800">PostgreSQL 데이터베이스</span>
              <span className="ml-auto text-[10px] text-orange-700 bg-white px-2 py-0.5 rounded-full border border-orange-300">3 tables</span>
            </div>
            <div className="grid grid-cols-3 gap-2">
              {tables.map((t) => (
                <div key={t.name} className="rounded-lg border border-orange-300 bg-white p-2">
                  <div className="flex items-center gap-1 mb-1">
                    <span>{t.icon}</span>
                    <span className="text-xs font-bold text-orange-800">{t.name}</span>
                  </div>
                  <div className="text-[10px] text-slate-600 space-y-0.5">
                    {t.cols.map((c) => (
                      <div key={c} className="truncate">· {c}</div>
                    ))}
                  </div>
                  <div className="mt-1 text-[10px] text-orange-600">{t.rows} rows</div>
                </div>
              ))}
            </div>
            <div className="mt-2 text-[11px] text-orange-900 bg-white/60 rounded p-2 border border-orange-200">
              <span className="font-bold">관계(JOIN):</span> orders.user_id → users.id · orders.product_id → products.id
            </div>
          </div>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-orange-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-orange-800">테이블 시각화</h3>
            <span className="text-[10px] text-slate-500">{state.note}</span>
          </div>

          {state.mode === 'excel'    && <ExcelGrid />}
          {state.mode === 'table'    && <TableGrid highlight={state.highlight} focusIndex={state.focusIndex} />}
          {state.mode === 'database' && <DatabaseMap />}

          {/* 상태별 보조 설명 */}
          {state.highlight === 'row' && (
            <div className="mt-3 text-xs text-orange-900 bg-orange-50 border border-orange-200 rounded p-2">
              <span className="font-bold">→ 행(row) 강조:</span> 가로 한 줄 = Alice 한 사람의 모든 속성
            </div>
          )}
          {state.highlight === 'column' && (
            <div className="mt-3 text-xs text-orange-900 bg-orange-50 border border-orange-200 rounded p-2">
              <span className="font-bold">↓ 열(column) 강조:</span> 세로 한 칸 = age 속성만 모아둔 곳 (타입: INTEGER)
            </div>
          )}

          <div className="mt-3 text-xs text-orange-900 bg-orange-50 border border-orange-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-orange-500/15 border-l-2 border-orange-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-orange-600 text-white font-bold">II</span>
              <div>
                <h1 className="text-2xl font-bold text-orange-900">Chapter II-1-1. 테이블, 행, 열</h1>
                <p className="text-sm text-orange-800/80">엑셀 시트 → 테이블 → 행/열 → 데이터베이스. 5단계로 익힌다</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-orange-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-orange-600' : 'bg-orange-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-orange-700 text-orange-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-orange-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-orange-700 text-white' : 'bg-orange-600 text-white hover:bg-orange-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-orange-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-orange-400 bg-white px-4 py-3 text-sm text-orange-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                엑셀 시트(격자) → 테이블(타입이 붙은 격자) → 행(가로 한 줄, 한 대상의 정보) → 열(세로 한 칸, 한 속성+타입) → 데이터베이스(여러 테이블의 모음). 다음 챕터(II-1-2)에서는 데이터 타입을 더 깊이 들여다본다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['엑셀', '테이블', '행(row)', '열(column)', '타입', 'INTEGER', 'TEXT', 'CREATE TABLE', 'INSERT', 'JOIN', 'PostgreSQL'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-orange-100 text-orange-800 border border-orange-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-orange-700">
              <a href="./index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./chapter-ii-1-2.html" className="underline hover:no-underline">다음: II-1-2 데이터 타입 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
