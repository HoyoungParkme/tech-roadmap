<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — II-1-1. 테이블, 행, 열</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { label: "엑셀 시트", desc: "[Step 1: 엑셀처럼 생각하기] 데이터를 표로 정리하는 가장 익숙한 도구는 엑셀이다. 가장 위 줄에 '이름/나이/이메일'을 쓰고, 아래로 한 사람씩 줄을 채운다. 관계형 데이터베이스(RDB)의 테이블도 이 구조와 거의 같다.", highlight: 'none', showPK: false, showSQL: false },
      { label: "열(Column)", desc: "[Step 2: 열 — 세로 방향의 속성] 파란색으로 강조된 세로 방향이 열(column)이다. '이름', '나이', '이메일'은 각각 하나의 열이다. 각 열은 어떤 종류의 데이터를 담는지 타입으로 정의한다. 이름은 TEXT, 나이는 INTEGER.", highlight: 'column', showPK: false, showSQL: false },
      { label: "행(Row)", desc: "[Step 3: 행 — 가로 방향의 레코드] 초록색으로 강조된 가로 방향이 행(row)이다. 한 행이 한 사람에 대한 완전한 데이터 단위다. Part I에서 배운 레코드가 바로 이것이다. 'Alice, 25, alice@example.com'이 하나의 행이다.", highlight: 'row', showPK: false, showSQL: false },
      { label: "기본키(PK)", desc: "[Step 4: 기본키 — 각 행의 고유 식별자] id 열이 기본키(primary key)다. 이름이 같은 두 사람이 있어도 id가 다르면 정확히 구분할 수 있다. 주민등록번호나 학번처럼, 기본키는 절대 중복되지 않는다.", highlight: 'pk', showPK: true, showSQL: false },
      { label: "SQL로 만들기", desc: "[Step 5: SQL로 테이블 생성] CREATE TABLE 문으로 이 테이블을 만들 수 있다. 각 열의 이름과 타입을 지정하고, PRIMARY KEY로 기본키를 설정한다. 나이 열에 '스물다섯'이라고 넣으면 INTEGER 타입에 맞지 않아 데이터베이스가 거부한다.", highlight: 'none', showPK: true, showSQL: true }
    ];

    const COLUMNS = ['id', '이름', '나이', '이메일'];
    const ROWS = [
      [1, 'Alice', 25, 'alice@example.com'],
      [2, 'Bob', 30, 'bob@example.com'],
      [3, 'Carol', 22, 'carol@example.com']
    ];

    function App() {
      const [ci, setCi] = useState(0);
      const [playing, setPlaying] = useState(false);
      const ref = useRef(null);
      const s = STEPS[ci];
      const isEnd = ci === STEPS.length - 1;
      const next = () => { setCi(p => { if (p < STEPS.length-1) return p+1; setPlaying(false); return p; }); };
      const nRef = useRef(next); nRef.current = next;
      const prev = () => { if(ci>0){setCi(p=>p-1);setPlaying(false);} };
      const toggle = () => { if(isEnd) setCi(0); setPlaying(p=>!p); };
      useEffect(() => { if(playing) ref.current=setInterval(()=>nRef.current(),3000); else clearInterval(ref.current); return ()=>clearInterval(ref.current); }, [playing]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold">II-1-1. 테이블, 행, 열 — 엑셀처럼 생각하기</h1>
              </div>
              <p className="text-slate-600">RDB는 데이터를 <b>테이블(표)</b>에 저장한다. <b>열(column)</b>은 속성, <b>행(row)</b>은 레코드, <b>기본키(PK)</b>는 각 행의 고유 식별자다.</p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl min-h-[100px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{s.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[400px]">
                  <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">테이블 구조 시각화</div>
                  <div className="overflow-x-auto">
                    <table className="w-full text-sm border-collapse">
                      <thead>
                        <tr>
                          {COLUMNS.map((c, i) => (
                            <th key={i} className={`p-3 text-left border-2 transition-all duration-500 ${
                              s.highlight === 'column' ? 'bg-blue-100 border-blue-400 text-blue-800' :
                              s.showPK && i === 0 ? 'bg-amber-100 border-amber-400 text-amber-800' :
                              'bg-slate-700 border-slate-600 text-white'
                            }`}>
                              {c}
                              {s.showPK && i === 0 && <span className="ml-1 text-xs bg-amber-500 text-white px-1 rounded">PK</span>}
                            </th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {ROWS.map((row, ri) => (
                          <tr key={ri} className={`transition-all duration-500 ${
                            s.highlight === 'row' && ri === 0 ? 'ring-2 ring-emerald-400 bg-emerald-50' : ''
                          }`}>
                            {row.map((cell, ci2) => (
                              <td key={ci2} className={`p-3 border font-mono transition-all duration-500 ${
                                s.highlight === 'column' ? 'border-blue-200' :
                                s.highlight === 'pk' && ci2 === 0 ? 'bg-amber-50 border-amber-300 font-bold text-amber-700' :
                                'border-slate-200'
                              }`}>{cell}</td>
                            ))}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>

                  {s.highlight === 'column' && (
                    <div className="mt-4 p-3 bg-blue-50 border border-blue-200 rounded-lg text-sm text-blue-700">
                      <b>열(column)</b> = 세로 방향. 속성을 정의한다. 각 열에 타입(TEXT, INTEGER 등)이 지정된다.
                    </div>
                  )}
                  {s.highlight === 'row' && (
                    <div className="mt-4 p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-sm text-emerald-700">
                      <b>행(row)</b> = 가로 방향. 하나의 완전한 레코드. 초록색 행이 Alice의 레코드다.
                    </div>
                  )}
                  {s.highlight === 'pk' && (
                    <div className="mt-4 p-3 bg-amber-50 border border-amber-200 rounded-lg text-sm text-amber-700">
                      <b>기본키(PK)</b> = id 열. 각 행을 유일하게 식별. 절대 중복 없음.
                    </div>
                  )}
                  {s.showSQL && (
                    <div className="mt-4 bg-slate-900 p-4 rounded-lg text-sm font-mono text-slate-200 leading-relaxed">
                      <div><span className="text-pink-400 font-bold">CREATE TABLE</span> 회원 (</div>
                      <div className="pl-4">id <span className="text-cyan-400">INTEGER</span> <span className="text-pink-400">PRIMARY KEY</span>,</div>
                      <div className="pl-4">이름 <span className="text-cyan-400">TEXT</span>,</div>
                      <div className="pl-4">나이 <span className="text-cyan-400">INTEGER</span>,</div>
                      <div className="pl-4">이메일 <span className="text-cyan-400">TEXT</span></div>
                      <div>);</div>
                    </div>
                  )}
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전 단계" onClick={prev} disabled={ci===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button onClick={toggle} className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition w-32 justify-center">
                      {playing?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                    </button>
                    <button aria-label="다음 단계" onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex gap-1">{STEPS.map((st,i)=>(<button key={i} aria-label={`Step ${i+1}: ${st.label}`} onClick={()=>{setCi(i);setPlaying(false);}} className={`w-2.5 h-2.5 rounded-full transition-all ${i===ci?'bg-blue-600 scale-125':i<ci?'bg-blue-300':'bg-slate-200'}`}/>))}</div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border">{ci+1}/{STEPS.length}</div>
                  </div>
                </div>
              </div>

              <div className="rounded-xl shadow-sm border border-slate-200 overflow-hidden bg-white flex flex-col min-h-[400px]">
                <div className="px-4 py-3 bg-slate-100 border-b border-slate-200"><span className="text-xs text-slate-500 font-semibold">핵심 개념</span></div>
                <div className="p-6 overflow-y-auto flex-1 space-y-3">
                  {[
                    {title:'테이블(Table)',desc:'행과 열로 이루어진 표. RDB에서 데이터 저장의 기본 단위.',active:s.highlight==='none'&&!s.showSQL,color:'slate'},
                    {title:'열(Column)',desc:'세로 방향. 속성(attribute)을 정의한다. 각 열에 타입이 강제된다.',active:s.highlight==='column',color:'blue'},
                    {title:'행(Row)',desc:'가로 방향. 하나의 완전한 레코드. 튜플(tuple)이라고도 한다.',active:s.highlight==='row',color:'emerald'},
                    {title:'기본키(Primary Key)',desc:'각 행을 고유하게 식별하는 열. 중복 없이 반드시 하나의 행만 가리킨다.',active:s.highlight==='pk'||s.showPK,color:'amber'},
                    {title:'관계(Relation)',desc:'테이블들이 서로 연결되는 구조. 다음 섹션(II-1-2)에서 외래키로 다룬다.',active:false,color:'violet'}
                  ].map((item,i)=>(
                    <div key={i} className={`p-4 rounded-lg border-2 transition-all duration-500 ${item.active?`border-${item.color}-400 bg-${item.color}-50 scale-[1.02] shadow-md`:'border-slate-200 bg-slate-50'}`}>
                      <div className={`text-xs font-bold mb-1 ${item.active?`text-${item.color}-600`:'text-slate-400'}`}>{item.title}</div>
                      <div className="text-sm text-slate-700">{item.desc}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
