<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — IV-4-1. 뷰(View)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    PostgreSQL Chapter IV-4-1 — 뷰(View)
    학습 목표: VIEW를 생성하고 복잡한 쿼리를 재사용하는 방법을 설명할 수 있다.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { label: 'VIEW란', desc: '[Step 1: 뷰 — 가상 테이블] VIEW는 자주 쓰는 SELECT 쿼리를 테이블처럼 저장해두는 "가상 테이블"이다. 실제 데이터를 복사하지 않고 쿼리 정의만 저장한다.',
        phase: 'intro',
        sql: "CREATE VIEW 활성직원 AS\nSELECT e.name, d.name AS dept\nFROM employees e\nJOIN departments d ON e.dept_id = d.id;" },
      { label: 'VIEW 사용', desc: '[Step 2: 뷰 조회] 뷰를 만들면 테이블처럼 SELECT할 수 있다. 복잡한 JOIN을 매번 반복하지 않아도 된다.',
        phase: 'use',
        sql: "-- 뷰를 테이블처럼 사용\nSELECT * FROM 활성직원;\n\n-- WHERE도 쓸 수 있다\nSELECT * FROM 활성직원\nWHERE dept = '개발팀';" },
      { label: '뷰의 장점', desc: '[Step 3: 뷰의 장점] ① 복잡한 쿼리 재사용 ② 접근 권한 제어 (민감 열 숨기기) ③ 인터페이스 유지 (테이블 구조 변경 시 뷰만 수정).',
        phase: 'benefits', sql: null },
      { label: 'Materialized View', desc: '[Step 4: 구체화된 뷰] 일반 뷰는 조회할 때마다 쿼리를 실행한다. Materialized View는 결과를 물리적으로 저장해 빠르게 조회한다. 대신 데이터가 변경되면 REFRESH가 필요하다.',
        phase: 'materialized',
        sql: "CREATE MATERIALIZED VIEW 직원별매출 AS\nSELECT e.name, SUM(o.amount) AS total\nFROM employees e\nJOIN orders o ON o.employee_id = e.id\nGROUP BY e.name;" },
      { label: 'REFRESH', desc: '[Step 5: REFRESH — 데이터 갱신] Materialized View는 원본 테이블이 바뀌어도 자동 갱신되지 않는다. REFRESH MATERIALIZED VIEW로 수동 갱신한다.',
        phase: 'refresh',
        sql: "-- 기본 갱신 (잠금 발생)\nREFRESH MATERIALIZED VIEW 직원별매출;\n\n-- 동시 접근 허용 갱신 (UNIQUE INDEX 필요)\nREFRESH MATERIALIZED VIEW\n  CONCURRENTLY 직원별매출;" }
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 5000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">IV-4-1. 뷰(View)</h1>
              </div>
              <p className="text-slate-600"><b>VIEW</b>는 복잡한 쿼리를 재사용하는 가상 테이블. <b>Materialized View</b>는 결과를 물리적으로 저장합니다.</p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 min-h-[110px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[400px] flex flex-col justify-center">
                  <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">
                    {stepData.phase === 'benefits' ? '뷰의 장점' : 'SQL 코드'}
                  </div>

                  {stepData.sql && (
                    <div className="bg-slate-800 rounded-lg p-4 font-mono text-sm text-slate-200 leading-relaxed whitespace-pre-wrap overflow-x-auto">{stepData.sql}</div>
                  )}

                  {stepData.phase === 'benefits' && (
                    <div className="space-y-3">
                      {[
                        {icon:'1',title:'복잡한 쿼리 재사용',desc:'JOIN/집계가 포함된 쿼리를 뷰로 만들면 SELECT 한 줄로 호출.',bg:'bg-blue-50',border:'border-blue-300',iconBg:'bg-blue-600',text:'text-blue-800'},
                        {icon:'2',title:'접근 권한 제어',desc:'민감한 열(급여, 주민번호)을 뷰에서 제외하고 뷰만 공개.',bg:'bg-emerald-50',border:'border-emerald-300',iconBg:'bg-emerald-600',text:'text-emerald-800'},
                        {icon:'3',title:'인터페이스 유지',desc:'테이블 구조가 바뀌어도 뷰 정의만 수정하면 애플리케이션 코드 변경 불필요.',bg:'bg-violet-50',border:'border-violet-300',iconBg:'bg-violet-600',text:'text-violet-800'}
                      ].map((item,i)=>(
                        <div key={i} className={`flex items-start gap-3 p-4 ${item.bg} border-2 ${item.border} rounded-lg`}>
                          <div className={`w-8 h-8 ${item.iconBg} text-white rounded-full flex items-center justify-center font-bold flex-shrink-0`}>{item.icon}</div>
                          <div>
                            <div className={`font-bold ${item.text}`}>{item.title}</div>
                            <div className="text-sm text-slate-700">{item.desc}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button aria-label={isPlaying?'자동 재생 정지':'자동 재생 시작'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                    </button>
                    <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex gap-1">{STEPS.map((s,i)=>(<button key={i} aria-label={`Step ${i+1}: ${s.label}`} onClick={()=>{setCurrentStepIdx(i);setIsPlaying(false);}} className={`w-2.5 h-2.5 rounded-full transition-all ${i===currentStepIdx?'bg-blue-600 scale-125':i<currentStepIdx?'bg-blue-300':'bg-slate-200'}`}/>))}</div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">{currentStepIdx+1} / {STEPS.length}</div>
                  </div>
                </div>
              </div>

              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-white flex flex-col">
                  <div className="flex items-center px-4 py-3 bg-slate-100 border-b border-slate-200 gap-2">
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-500 font-semibold">VIEW 비교</span>
                  </div>
                  <div className="p-6 overflow-y-auto flex-1 space-y-4">
                    <div className="overflow-hidden rounded-lg border border-slate-200">
                      <table className="w-full text-xs">
                        <thead><tr className="bg-slate-700 text-white">
                          <th className="p-2 text-left">항목</th>
                          <th className={`p-2 text-center ${currentStepIdx<=2?'bg-blue-600':''}`}>VIEW</th>
                          <th className={`p-2 text-center ${currentStepIdx>=3?'bg-emerald-600':''}`}>Mat. View</th>
                        </tr></thead>
                        <tbody>
                          {[
                            ['데이터 저장','쿼리 정의만','결과를 물리적 저장'],
                            ['조회 속도','매번 쿼리 실행','저장된 결과 바로 반환'],
                            ['자동 갱신','항상 최신','수동 REFRESH 필요'],
                            ['디스크 사용','없음','결과만큼 사용'],
                            ['적합한 상황','실시간 최신 데이터','집계/분석 (갱신 빈도 낮음)']
                          ].map(([label,v,mv],i)=>(
                            <tr key={i} className="border-t">
                              <td className="p-2 font-bold text-slate-500">{label}</td>
                              <td className={`p-2 text-center ${currentStepIdx<=2?'bg-blue-50':''}`}>{v}</td>
                              <td className={`p-2 text-center ${currentStepIdx>=3?'bg-emerald-50':''}`}>{mv}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>

                    <div className="space-y-3 mt-2">
                      {[
                        {t:'CREATE VIEW',d:'쿼리 정의를 가상 테이블로 저장. 데이터 복사 없음.',a:currentStepIdx<=1},
                        {t:'Materialized View',d:'결과를 물리적으로 저장. 빠른 조회, 수동 갱신.',a:currentStepIdx===3},
                        {t:'REFRESH',d:'Materialized View 데이터를 원본 기준으로 갱신. CONCURRENTLY 옵션으로 잠금 최소화.',a:currentStepIdx===4}
                      ].map((item,i)=>(
                        <div key={i} className={`p-3 rounded-lg border-2 transition-all duration-500 ${item.a?'border-blue-400 bg-blue-50 scale-[1.02]':'border-slate-200 bg-slate-50'}`}>
                          <div className={`text-xs font-bold mb-1 ${item.a?'text-blue-600':'text-slate-400'}`}>{item.t}</div>
                          <div className="text-sm text-slate-700">{item.d}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
