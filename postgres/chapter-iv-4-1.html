  <!--
    PostgreSQL Chapter IV-4-1 — 뷰(View)
    학습 목표: View가 "저장된 SELECT 문"이라는 점을 이해하고
              ① 생성 ② 사용 ③ 보안(컬럼 숨김) ④ Updatable ⑤ Materialized 까지 5단계로 확인한다.
    핵심 비유: 베이스 테이블 = 원자재 창고, View = 진열대 / Materialized View = 진열대 + 사진 캐시
    패턴: fastapi v1 — 좌(LiveDataPane: 베이스 테이블 → View 박스 → 사용처) / 우(VSCode CodeViewer 5탭)

  -->

    // ─────────────────────────────────────────────────────

          '--  결과 (디스크 캐시에서 즉시 반환):',
          '--  개발   | 2 | 6150000',
          '--  마케팅 | 1 | 4800000',
          '--  디자인 | 1 | 4200000',
          '',
          '-- ③ 베이스가 바뀌어도 MV 는 "옛 데이터" 유지',
          "INSERT INTO employees (name, dept, salary, ssn) VALUES ('신입', '개발', 3000000, '...');",
          'SELECT * FROM mv_dept_summary;   -- 여전히 개발 2명',
          '',
          '-- ④ REFRESH — 다시 계산해서 캐시 갱신',
          'REFRESH MATERIALIZED VIEW mv_dept_summary;',
          'SELECT * FROM mv_dept_summary;   -- 이제 개발 3명',
          '',
          '-- ⑤ CONCURRENTLY — 잠금 없이 갱신 (UNIQUE 인덱스 필수)',
          'CREATE UNIQUE INDEX ON mv_dept_summary(dept);',
          'REFRESH MATERIALIZED VIEW CONCURRENTLY mv_dept_summary;',
          '',
          '-- ⑥ 운영 — 야간 배치로 REFRESH (pg_cron / cron)',
          "--   0 3 * * *  psql -c 'REFRESH MATERIALIZED VIEW mv_dept_summary;'",
          '',
          '-- 일반 View vs Materialized View',
          '--   일반 View   : 항상 최신, 매번 계산 (느림)',
          '--   Mat. View   : 빠름, REFRESH 전까지 stale 가능',
        ],
        highlight: [9, 10, 11, 12, 13, 14, 15, 16, 29, 30, 31, 32, 33, 34],
      },
    };

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — 베이스 테이블 / 화살표 / View 박스 / 사용처
    // ─────────────────────────────────────────────────────
    function BaseTable({ highlight }) {
      const hi = new Set(highlight || []);
      return (
        <div className="rounded-lg border border-orange-300 bg-white overflow-hidden">
          <div className="px-3 py-1.5 bg-orange-100 border-b border-orange-300 flex items-center justify-between">
            <span className="text-xs font-bold text-orange-800">📦 {BASE_TABLE.name}</span>
            <span className="text-[10px] text-orange-700">베이스 테이블</span>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-[11px]">
              <thead className="bg-orange-50">
                <tr>
                  {BASE_TABLE.columns.map((c) => (
                    <th
                      key={c}
                      className={`px-2 py-1 text-left font-mono ${hi.has(c) ? 'bg-orange-300 text-orange-900' : 'text-orange-700'}`}
                    >
                      {c}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {BASE_TABLE.rows.map((r) => (
                  <tr key={r.id} className="border-t border-orange-100">
                    {BASE_TABLE.columns.map((c) => (
                      <td
                        key={c}
                        className={`px-2 py-1 font-mono ${hi.has(c) ? 'bg-orange-100 text-orange-900 font-bold' : 'text-slate-700'}`}
                      >
                        {r[c]}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function ViewBox({ view }) {
      const BADGE_COLOR = {
        'CREATE VIEW': 'bg-orange-200 text-orange-900',
        'SELECT 사용': 'bg-amber-200 text-amber-900',
        '민감컬럼 제외': 'bg-rose-200 text-rose-900',
        'UPDATABLE': 'bg-emerald-200 text-emerald-900',
        'MATERIALIZED': 'bg-violet-200 text-violet-900',
      };
      return (
        <div className="rounded-lg border-2 border-orange-500 bg-gradient-to-br from-orange-50 to-amber-50 overflow-hidden shadow-sm">
          <div className="px-3 py-1.5 bg-orange-500 text-white flex items-center justify-between">
            <span className="text-xs font-bold flex items-center gap-1">
              <span>🔭</span> VIEW · {view.name}
            </span>
            <span className={`text-[10px] px-2 py-0.5 rounded ${BADGE_COLOR[view.badge] || 'bg-white text-orange-700'}`}>
              {view.badge}
            </span>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-[11px]">
              <thead className="bg-orange-100/70">
                <tr>
                  {view.columns.map((c) => (
                    <th key={c} className="px-2 py-1 text-left font-mono text-orange-800">{c}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {view.rows.map((r, i) => (
                  <tr
                    key={i}
                    className={`border-t border-orange-200 ${r.highlight ? 'bg-emerald-100' : ''}`}
                  >
                    {view.columns.map((c) => (
                      <td key={c} className="px-2 py-1 font-mono text-orange-900">
                        {r[c]}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="px-3 py-1 bg-orange-50 border-t border-orange-200 text-[10px] text-orange-700">
            💭 {view.note}
          </div>
        </div>
      );
    }

    function ConsumerBox({ consumer }) {
      if (!consumer) return null;
      return (
        <div className="rounded-lg border border-amber-300 bg-amber-50 p-2.5 flex items-start gap-2">
          <span className="text-xl leading-none">{consumer.icon}</span>
          <div className="flex-1 min-w-0">
            <div className="text-xs font-bold text-amber-900">{consumer.label}</div>
            <div className="text-[10px] font-mono text-amber-800 break-all">{consumer.desc}</div>
          </div>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-orange-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-orange-800">View 동작 시뮬레이션</h3>
            <span className="text-[10px] text-slate-500">베이스 → 뷰 → 사용처</span>
          </div>

          <BaseTable highlight={state.baseHighlight} />

          <div className="my-2 text-center text-xs font-bold text-orange-600 py-1.5 border-y border-dashed border-orange-300">
            ↓ {state.arrow} ↓
          </div>

          <ViewBox view={state.viewBox} />

          {state.consumer && (
            <>
              <div className="my-2 text-center text-[10px] text-orange-600">↓ 사용처 ↓</div>
              <ConsumerBox consumer={state.consumer} />
            </>
          )}

          <div className="mt-auto pt-3 text-xs text-orange-900 bg-orange-50 border border-orange-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (5탭 + highlight.js)
    // ─────────────────────────────────────────────────────
    const TAB_ORDER = ['create', 'select', 'security', 'updatable', 'materialized'];

    function CodeViewer({ activeKey, onTabChange, stepIdx, total }) {
      const code = CODE_FILES[activeKey];
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [activeKey]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 윈도우 헤더 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          {/* 탭 바 */}
          <div className="flex bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {TAB_ORDER.map((k) => {
              const f = CODE_FILES[k];
              const active = k === activeKey;
              return (
                <button
                  key={k}
                  onClick={() => onTabChange(k)}
                  className={`px-3 py-1.5 text-[11px] font-mono border-r border-slate-700 whitespace-nowrap transition ${
                    active
                      ? 'bg-[#282c34] text-orange-300 border-t-2 border-t-orange-400'
                      : 'bg-slate-900 text-slate-400 hover:text-slate-200 hover:bg-slate-800'
                  }`}
                >
                  {f.filename}
                </button>
              );
            })}
          </div>
          {/* 코드 본문 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-orange-500/15 border-l-2 border-orange-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          {/* 푸터 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines · {code.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [activeFileKey, setActiveFileKey] = useState(STEPS[0].activeFileKey);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 단계 변경 시 코드 탭 자동 동기화
      useEffect(() => {
        setActiveFileKey(STEPS[stepIdx].activeFileKey);
      }, [stepIdx]);

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 3000ms 자동재생
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-orange-600 text-white font-bold">IV</span>
              <div>
                <h1 className="text-2xl font-bold text-orange-900">Chapter IV-4-1. 뷰(View)</h1>
                <p className="text-sm text-orange-800/80">저장된 SELECT → 보안 → Updatable → Materialized. 5단계로 정복</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-orange-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-orange-600' : 'bg-orange-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-orange-700 text-orange-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-orange-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer
                activeKey={activeFileKey}
                onTabChange={setActiveFileKey}
                stepIdx={stepIdx}
                total={STEPS.length}
              />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-orange-700 text-white' : 'bg-orange-600 text-white hover:bg-orange-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-orange-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계 · 우측 탭 클릭으로 코드 자유 탐색</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-orange-400 bg-white px-4 py-3 text-sm text-orange-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                View는 "저장된 SELECT"다. 보안(컬럼 숨김), 단순 View 의 INSERT/UPDATE/DELETE, 성능을 위한 Materialized View 까지 — 베이스 테이블을 그대로 두고 다양한 시야(view)를 제공할 수 있다. 다음 챕터에서는 인덱스와 함께 View 성능을 더 다듬는 방법을 살펴본다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['View', 'CREATE VIEW', '저장된 SELECT', '컬럼 보안', 'GRANT', 'Updatable View', 'WITH CHECK OPTION', 'Materialized View', 'REFRESH', 'PostgreSQL'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-orange-100 text-orange-800 border border-orange-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-orange-700">
              <a href="./index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./chapter-iv-4-2.html" className="underline hover:no-underline">다음: IV-4-2 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
