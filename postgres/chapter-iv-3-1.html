<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — IV-3-1. 서브쿼리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    PostgreSQL Chapter IV-3-1 — 서브쿼리(Subquery)
    학습 목표: 스칼라/IN/EXISTS 서브쿼리를 구분하고 올바른 상황에 사용할 수 있다.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { label: '서브쿼리란', desc: '[Step 1: 쿼리 안의 쿼리] 서브쿼리는 SQL 문 안에 중첩된 SELECT 문이다. 외부 쿼리가 서브쿼리 결과를 조건으로 사용한다.',
        sql: "SELECT * FROM employees\nWHERE dept_id = (\n  SELECT id FROM departments\n  WHERE name = '개발팀'\n);",
        type: 'intro', highlight: ['서브쿼리','(SELECT ...)'] },
      { label: '스칼라 서브쿼리', desc: '[Step 2: 스칼라 서브쿼리 — 값 하나 반환] SELECT 절이나 WHERE 절에서 단일 값을 반환하는 서브쿼리. 결과가 반드시 1행 1열이어야 한다.',
        sql: "SELECT name,\n  (SELECT AVG(amount) FROM orders) AS 전체평균\nFROM employees;",
        type: 'scalar', highlight: ['1행 1열','SELECT 절'] },
      { label: 'IN 서브쿼리', desc: '[Step 3: IN 서브쿼리 — 목록으로 필터링] 서브쿼리가 여러 행을 반환하고, 외부 쿼리가 그 목록에 포함되는지 확인한다.',
        sql: "SELECT id, name FROM employees\nWHERE id IN (\n  SELECT DISTINCT employee_id\n  FROM orders\n  WHERE status = 'completed'\n);",
        type: 'in', highlight: ['여러 행','WHERE IN'] },
      { label: 'EXISTS 서브쿼리', desc: '[Step 4: EXISTS — 존재 여부 확인] 서브쿼리에 결과가 하나라도 있으면 TRUE. SELECT 1이 관례. 상관 서브쿼리와 함께 자주 쓰인다.',
        sql: "SELECT e.id, e.name\nFROM employees e\nWHERE EXISTS (\n  SELECT 1 FROM orders o\n  WHERE o.employee_id = e.id\n    AND o.status = 'completed'\n);",
        type: 'exists', highlight: ['존재 여부','SELECT 1'] },
      { label: '상관 서브쿼리', desc: '[Step 5: 상관 서브쿼리 — 행마다 반복 실행] 외부 쿼리의 값을 참조하는 서브쿼리. 외부 행마다 서브쿼리가 반복 실행되므로 대량 데이터에서 느릴 수 있다. JOIN으로 대체 가능한 경우가 많다.',
        sql: "SELECT e.name,\n  (SELECT MAX(o.amount)\n   FROM orders o\n   WHERE o.employee_id = e.id\n  ) AS 최대주문\nFROM employees e;",
        type: 'correlated', highlight: ['행마다 실행','성능 주의'] }
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 5000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">IV-3-1. 서브쿼리(Subquery)</h1>
              </div>
              <p className="text-slate-600"><b>쿼리 안의 쿼리</b>. 스칼라(값 하나), IN(목록), EXISTS(존재 여부) 세 가지 패턴을 익힙니다.</p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 min-h-[110px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[400px] flex flex-col justify-center">
                  <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">SQL 코드</div>
                  <div className="bg-slate-800 rounded-lg p-4 font-mono text-sm text-slate-200 leading-relaxed whitespace-pre-wrap mb-4">{stepData.sql}</div>
                  <div className="flex flex-wrap gap-2">
                    {stepData.highlight.map((h,i) => (
                      <span key={i} className="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold">{h}</span>
                    ))}
                  </div>
                  {stepData.type === 'correlated' && (
                    <div className="mt-4 p-3 bg-amber-50 border border-amber-300 rounded-lg text-sm text-amber-800">
                      <b>성능 주의:</b> 상관 서브쿼리는 외부 행마다 반복 실행. 대량 데이터에서는 JOIN으로 대체를 검토한다.
                    </div>
                  )}
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button aria-label={isPlaying?'자동 재생 정지':'자동 재생 시작'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                    </button>
                    <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex gap-1">{STEPS.map((s,i)=>(<button key={i} aria-label={`Step ${i+1}: ${s.label}`} onClick={()=>{setCurrentStepIdx(i);setIsPlaying(false);}} className={`w-2.5 h-2.5 rounded-full transition-all ${i===currentStepIdx?'bg-blue-600 scale-125':i<currentStepIdx?'bg-blue-300':'bg-slate-200'}`}/>))}</div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">{currentStepIdx+1} / {STEPS.length}</div>
                  </div>
                </div>
              </div>

              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-white flex flex-col">
                  <div className="flex items-center px-4 py-3 bg-slate-100 border-b border-slate-200 gap-2">
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-500 font-semibold">서브쿼리 유형 비교</span>
                  </div>
                  <div className="p-6 overflow-y-auto flex-1 space-y-4">
                    {[
                      {t:'스칼라 서브쿼리',d:'값 하나(1행 1열)를 반환. SELECT 절이나 WHERE 절에서 사용.',a:currentStepIdx===1},
                      {t:'IN 서브쿼리',d:'여러 행을 반환. 외부 쿼리가 목록에 포함되는지 검사.',a:currentStepIdx===2},
                      {t:'EXISTS 서브쿼리',d:'결과가 존재하면 TRUE. SELECT 1이 관례.',a:currentStepIdx===3},
                      {t:'상관 서브쿼리',d:'외부 쿼리의 값을 참조. 행마다 반복 실행 → 성능 주의.',a:currentStepIdx===4},
                    ].map((item,i)=>(
                      <div key={i} className={`p-4 rounded-lg border-2 transition-all duration-500 ${item.a?'border-blue-400 bg-blue-50 scale-[1.02] shadow-md':'border-slate-200 bg-slate-50'}`}>
                        <div className={`text-xs font-bold mb-1 ${item.a?'text-blue-600':'text-slate-400'}`}>{item.t}</div>
                        <div className="text-sm text-slate-700">{item.d}</div>
                      </div>
                    ))}
                    <div className={`p-4 rounded-lg border-2 transition-all ${currentStepIdx===4?'border-amber-400 bg-amber-50':'border-slate-200 bg-slate-50'}`}>
                      <div className="text-xs font-bold text-amber-600 mb-1">성능 팁</div>
                      <div className="text-sm text-slate-700">상관 서브쿼리가 느리면 JOIN으로 대체를 검토한다. 같은 결과를 더 효율적으로 얻을 수 있다.</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
