<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — Chapter I-2-2. 데이터베이스가 해결하는 것</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        label: "도서관 사서",
        desc: "[Step 1: DBMS = 도서관 사서] DBMS는 도서관 사서와 같습니다. 책(데이터)을 분류해 정리하고, 여러 사람이 동시에 찾아도 충돌 없이 빌려주며, 화재(장애) 시에도 기록을 복구합니다. 사서 없이 책을 바닥에 쌓아두면? 그것이 CSV입니다.",
        activeFeature: null,
        scenario: 'intro'
      },
      {
        label: "저장(Storage)",
        desc: "[Step 2: 기능 1 — 체계적 저장] 사서가 책을 주제별로 분류해 선반에 꽂듯, DBMS는 데이터를 테이블 구조로 정리해 디스크에 저장합니다. 각 열에 타입을 강제해 '나이 칸에 문자가 들어오는' 사고를 원천 차단합니다.",
        activeFeature: 'storage',
        scenario: 'storage'
      },
      {
        label: "검색(Query)",
        desc: "[Step 3: 기능 2 — 빠른 검색] 사서에게 '2024년에 출판된 컴퓨터 과학 책'을 요청하면, 사서가 목록(인덱스)을 보고 즉시 찾아줍니다. DBMS도 SQL 쿼리를 받으면 인덱스를 활용해 100만 건에서도 순식간에 원하는 데이터를 찾습니다.",
        activeFeature: 'query',
        scenario: 'query'
      },
      {
        label: "동시 접근 제어",
        desc: "[Step 4: 기능 3 — 동시 접근 제어] 두 사람이 같은 책을 빌리려 하면 사서가 순서를 정해줍니다. DBMS도 여러 사용자가 같은 데이터를 동시에 수정하려 할 때, 잠금(Lock)과 MVCC로 충돌 없이 처리합니다. CSV에서 겪었던 '덮어쓰기 사고'가 일어나지 않습니다.",
        activeFeature: 'concurrency',
        scenario: 'concurrency'
      },
      {
        label: "복구(Recovery)",
        desc: "[Step 5: 기능 4 — 장애 복구] 도서관에 화재가 나도 대출 기록부가 금고에 있으면 어떤 책이 있었는지 복원할 수 있습니다. DBMS는 모든 변경을 WAL(Write-Ahead Log)에 먼저 기록하기 때문에, 서버가 갑자기 꺼져도 로그를 재생해 데이터를 복구합니다.",
        activeFeature: 'recovery',
        scenario: 'recovery'
      },
      {
        label: "4기능 종합",
        desc: "[Step 6: DBMS의 4가지 핵심 기능] 저장, 검색, 동시 접근 제어, 복구. 이 네 가지가 파일 시스템이 해결하지 못하는 문제를 DBMS가 해결하는 방법입니다. PostgreSQL은 이 네 기능 모두에서 뛰어난 오픈소스 DBMS입니다. 다음 Part에서 직접 설치해 봅니다.",
        activeFeature: 'all',
        scenario: 'summary'
      }
    ];

    const FEATURES = [
      { key: 'storage', label: '저장', icon: '📦', color: 'blue', desc: '테이블 구조로 정리해 디스크에 보관' },
      { key: 'query', label: '검색', icon: '🔍', color: 'emerald', desc: 'SQL + 인덱스로 빠른 조회' },
      { key: 'concurrency', label: '동시 접근 제어', icon: '🔒', color: 'violet', desc: 'Lock/MVCC로 충돌 방지' },
      { key: 'recovery', label: '복구', icon: '🛡️', color: 'amber', desc: 'WAL 로그로 장애 시 데이터 복원' }
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(p => p - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) playIntervalRef.current = setInterval(() => handleNextRef.current(), 3500);
        else clearInterval(playIntervalRef.current);
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const isActive = (key) => stepData.activeFeature === key || stepData.activeFeature === 'all';

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">I-2-2. 데이터베이스가 해결하는 것</h1>
              </div>
              <p className="text-slate-600">
                DBMS는 <b>도서관 사서</b>처럼 데이터를 정리하고, 빠르게 찾아주고, 충돌을 막고, 장애에서 복구합니다.
              </p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 min-h-[110px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[400px]">
                  <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">DBMS 기능 시뮬레이션</div>

                  {/* 도서관 사서 비유 */}
                  {stepData.scenario === 'intro' && (
                    <div className="flex flex-col items-center space-y-4">
                      <div className="text-6xl">👩‍💼</div>
                      <div className="text-lg font-bold text-slate-700">DBMS = 도서관 사서</div>
                      <div className="grid grid-cols-2 gap-3 w-full">
                        <div className="p-3 bg-red-50 border border-red-200 rounded-lg text-center">
                          <div className="text-2xl mb-1">📄</div>
                          <div className="text-xs font-bold text-red-500">CSV (사서 없음)</div>
                          <div className="text-xs text-slate-500">책을 바닥에 쌓아둠</div>
                        </div>
                        <div className="p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-center">
                          <div className="text-2xl mb-1">🏛️</div>
                          <div className="text-xs font-bold text-emerald-500">DBMS (사서 있음)</div>
                          <div className="text-xs text-slate-500">분류 → 정리 → 관리</div>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* 저장 시나리오 */}
                  {stepData.scenario === 'storage' && (
                    <div className="space-y-4">
                      <div className="flex items-center gap-3 mb-2">
                        <div className="text-3xl">📦</div>
                        <div className="text-lg font-bold text-blue-700">기능 1: 체계적 저장</div>
                      </div>
                      <div className="grid grid-cols-2 gap-3">
                        <div className="p-3 bg-red-50 border border-red-200 rounded-lg">
                          <div className="text-xs font-bold text-red-500 mb-1">CSV 방식</div>
                          <div className="font-mono text-xs text-slate-600 space-y-0.5">
                            <div>Alice,25,개발팀</div>
                            <div>Bob,서른,기획팀</div>
                            <div className="text-red-500 font-bold">↑ "서른"이 숫자 칸에!</div>
                          </div>
                        </div>
                        <div className="p-3 bg-emerald-50 border border-emerald-200 rounded-lg">
                          <div className="text-xs font-bold text-emerald-500 mb-1">DB 방식</div>
                          <div className="text-xs text-slate-600">
                            <div className="font-mono">age INTEGER</div>
                            <div className="text-emerald-600 font-bold mt-1">"서른" 입력 → 거부!</div>
                            <div className="text-xs text-slate-400">타입 강제로 오류 차단</div>
                          </div>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* 검색 시나리오 */}
                  {stepData.scenario === 'query' && (
                    <div className="space-y-4">
                      <div className="flex items-center gap-3 mb-2">
                        <div className="text-3xl">🔍</div>
                        <div className="text-lg font-bold text-emerald-700">기능 2: 빠른 검색</div>
                      </div>
                      <div className="p-3 bg-slate-900 text-emerald-400 font-mono text-sm rounded-lg">
                        SELECT * FROM users WHERE age > 25;
                      </div>
                      <div className="grid grid-cols-2 gap-3">
                        <div className="p-3 bg-red-50 border border-red-200 rounded-lg text-center">
                          <div className="text-xs font-bold text-red-500">CSV: 순차 탐색</div>
                          <div className="text-2xl my-1">🐌</div>
                          <div className="text-xs text-slate-500">100만 줄 전부 읽기</div>
                        </div>
                        <div className="p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-center">
                          <div className="text-xs font-bold text-emerald-500">DB: 인덱스 검색</div>
                          <div className="text-2xl my-1">⚡</div>
                          <div className="text-xs text-slate-500">인덱스로 즉시 찾기</div>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* 동시 접근 시나리오 */}
                  {stepData.scenario === 'concurrency' && (
                    <div className="space-y-4">
                      <div className="flex items-center gap-3 mb-2">
                        <div className="text-3xl">🔒</div>
                        <div className="text-lg font-bold text-violet-700">기능 3: 동시 접근 제어</div>
                      </div>
                      <div className="flex items-center justify-center gap-4">
                        <div className="text-center p-2">
                          <div className="text-2xl">👤</div>
                          <div className="text-xs">사용자 A</div>
                          <div className="text-xs font-mono text-blue-500">UPDATE age=31</div>
                        </div>
                        <div className="flex flex-col items-center">
                          <div className="text-xs text-slate-400">동시에</div>
                          <div className="text-xl">→</div>
                        </div>
                        <div className="p-3 bg-violet-50 border-2 border-violet-300 rounded-lg text-center">
                          <div className="text-sm font-bold text-violet-600">DBMS</div>
                          <div className="text-xs text-violet-500">순서 정리</div>
                          <div className="text-xs text-violet-500">Lock / MVCC</div>
                        </div>
                        <div className="flex flex-col items-center">
                          <div className="text-xs text-slate-400">동시에</div>
                          <div className="text-xl">←</div>
                        </div>
                        <div className="text-center p-2">
                          <div className="text-2xl">👤</div>
                          <div className="text-xs">사용자 B</div>
                          <div className="text-xs font-mono text-purple-500">UPDATE dept=마케팅</div>
                        </div>
                      </div>
                      <div className="p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-center text-sm text-emerald-700">
                        두 수정 모두 안전하게 적용. 덮어쓰기 사고 없음!
                      </div>
                    </div>
                  )}

                  {/* 복구 시나리오 */}
                  {stepData.scenario === 'recovery' && (
                    <div className="space-y-4">
                      <div className="flex items-center gap-3 mb-2">
                        <div className="text-3xl">🛡️</div>
                        <div className="text-lg font-bold text-amber-700">기능 4: 장애 복구</div>
                      </div>
                      <div className="space-y-2">
                        <div className="flex items-center gap-2">
                          <div className="w-8 h-8 bg-blue-100 rounded flex items-center justify-center text-sm">1</div>
                          <div className="text-sm">데이터 변경 전, WAL에 <b>먼저</b> 기록</div>
                        </div>
                        <div className="flex items-center gap-2">
                          <div className="w-8 h-8 bg-blue-100 rounded flex items-center justify-center text-sm">2</div>
                          <div className="text-sm">실제 데이터 파일 수정</div>
                        </div>
                        <div className="flex items-center gap-2">
                          <div className="w-8 h-8 bg-red-100 rounded flex items-center justify-center text-sm">💥</div>
                          <div className="text-sm text-red-600">서버 크래시 발생!</div>
                        </div>
                        <div className="flex items-center gap-2">
                          <div className="w-8 h-8 bg-emerald-100 rounded flex items-center justify-center text-sm">3</div>
                          <div className="text-sm text-emerald-700"><b>WAL 로그를 재생</b>해 데이터 복구</div>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* 종합 */}
                  {stepData.scenario === 'summary' && (
                    <div className="space-y-3">
                      <div className="text-lg font-bold text-slate-700 text-center mb-2">DBMS의 4가지 핵심 기능</div>
                      <div className="grid grid-cols-2 gap-3">
                        {FEATURES.map(f => (
                          <div key={f.key} className="p-3 bg-emerald-50 border-2 border-emerald-300 rounded-lg text-center shadow-sm">
                            <div className="text-2xl mb-1">{f.icon}</div>
                            <div className="text-sm font-bold text-emerald-700">{f.label}</div>
                            <div className="text-xs text-slate-500 mt-1">{f.desc}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>

                {/* 컨트롤 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                    </button>
                    <button onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex gap-1">
                      {STEPS.map((_, i) => (
                        <button key={i} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                          className={`w-2.5 h-2.5 rounded-full transition-all ${i === currentStepIdx ? 'bg-blue-600 scale-125' : i < currentStepIdx ? 'bg-blue-300' : 'bg-slate-200'}`} />
                      ))}
                    </div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">{currentStepIdx + 1} / {STEPS.length}</div>
                  </div>
                </div>
              </div>

              {/* 오른쪽 패널 */}
              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-white flex flex-col">
                  <div className="flex items-center px-4 py-3 bg-slate-100 border-b border-slate-200">
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80 mr-1"></div>
                    <div className="w-3 h-3 rounded-full bg-violet-400 opacity-80 mr-2"></div>
                    <span className="text-xs text-slate-500 font-semibold">DBMS 4대 기능</span>
                  </div>
                  <div className="p-6 overflow-y-auto flex-1 space-y-3">
                    {FEATURES.map(f => (
                      <div key={f.key} className={`p-4 rounded-lg border-2 transition-all duration-500 ${
                        isActive(f.key) ? `border-${f.color}-400 bg-${f.color}-50 scale-[1.02] shadow-md` : 'border-slate-200 bg-slate-50'
                      }`}>
                        <div className="flex items-center gap-2 mb-1">
                          <span className="text-lg">{f.icon}</span>
                          <span className={`text-xs font-bold ${isActive(f.key) ? `text-${f.color}-600` : 'text-slate-400'}`}>{f.label}</span>
                        </div>
                        <div className="text-sm text-slate-700">{f.desc}</div>
                      </div>
                    ))}

                    <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg mt-4">
                      <div className="text-xs font-bold text-slate-500 mb-2">CSV vs DBMS 비교</div>
                      <table className="w-full text-xs">
                        <thead><tr className="text-left text-slate-400"><th className="pb-1">기능</th><th className="pb-1">CSV</th><th className="pb-1">DBMS</th></tr></thead>
                        <tbody className="text-slate-600">
                          <tr><td className="py-0.5">저장</td><td className="text-red-500">타입 강제 없음</td><td className="text-emerald-600 font-bold">타입 강제</td></tr>
                          <tr><td className="py-0.5">검색</td><td className="text-red-500">전체 탐색</td><td className="text-emerald-600 font-bold">인덱스</td></tr>
                          <tr><td className="py-0.5">동시 접근</td><td className="text-red-500">충돌</td><td className="text-emerald-600 font-bold">Lock/MVCC</td></tr>
                          <tr><td className="py-0.5">복구</td><td className="text-red-500">불가</td><td className="text-emerald-600 font-bold">WAL 로그</td></tr>
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
