          lines: [
            '# ⑤ ACID — DB가 보장하는 네 가지 약속',
            '',
            '## A · Atomicity (원자성)',
            '> 트랜잭션 안의 모든 작업은 전부 성공하거나 전부 실패한다',
            '',
            '```sql',
            'BEGIN;',
            '  UPDATE wallets SET balance = balance - 10000 WHERE user_id = 1;',
            '  UPDATE wallets SET balance = balance + 10000 WHERE user_id = 2;',
            '  -- 여기서 서버가 꺼져도',
            'COMMIT;',
            '```',
            '→ 둘 다 됐거나, 둘 다 안 됐거나. "A는 빠졌는데 B엔 안 들어옴" 같은 상태 없음.',
            '',
            '## C · Consistency (일관성)',
            '> 트랜잭션 종료 시점에 모든 제약 조건이 만족된다',
            '',
            '- NOT NULL, CHECK, UNIQUE, FOREIGN KEY 위반 시 트랜잭션 전체가 ROLLBACK',
            '- 즉 "유효하지 않은 상태"가 DB에 절대 남지 않음',
            '',
            '## I · Isolation (격리성)',
            '> 동시에 돌아가는 트랜잭션이 서로의 중간 상태를 보지 않는다',
            '',
            '| 격리 수준 | 막는 것 |',
            '|:--|:--|',
            '| READ COMMITTED (PG 기본) | Dirty Read |',
            '| REPEATABLE READ | Non-repeatable Read |',
            '| SERIALIZABLE | Phantom Read 까지 |',
            '',
            'PostgreSQL은 MVCC로 구현 → 읽기는 안 막고 쓰기끼리만 직렬화.',
            '',
            '## D · Durability (내구성)',
            '> COMMIT 된 데이터는 어떤 일이 있어도 사라지지 않는다',
            '',
            '- 모든 변경은 먼저 WAL(Write-Ahead Log) 에 기록 후 본 데이터에 반영',
            '- 서버가 강제 종료돼도 재시작 시 WAL 재생으로 복구',
            '- 디스크가 깨져도 백업 + WAL 로 시점 복구 가능 (PITR)',
            '',
            '## 정리',
            '',
            '| 보장 | 누가 책임지나 (PostgreSQL) |',
            '|:--|:--|',
            '| A | Transaction Manager (BEGIN/COMMIT/ROLLBACK) |',
            '| C | 제약 조건 (CHECK / FK / UNIQUE / NOT NULL) |',
            '| I | MVCC + Lock |',
            '| D | WAL + fsync |',
            '',
            '> 파일/CSV/캐시로는 절대 못 주는 4가지 약속. ACID = "왜 DB인가" 의 정답.',
          ],
          highlight: [2, 3, 4, 5, 6, 7, 8, 9, 10, 14, 15, 21, 22, 30, 31, 32],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — 5가지 해결책 카드 + 활성화
    // ─────────────────────────────────────────────────────
    function SolutionCard({ sol, isActive }) {
      const base = 'rounded-lg border transition px-3 py-2';
      const onCls = 'bg-orange-50 border-orange-400 shadow ring-2 ring-orange-300';
      const offCls = 'bg-slate-50 border-slate-200 opacity-60';
      return (
        <div className={`${base} ${isActive ? onCls : offCls}`}>
          <div className="flex items-center gap-2 mb-1">
            <span className="text-xl">{sol.icon}</span>
            <span className={`text-sm font-bold ${isActive ? 'text-orange-900' : 'text-slate-600'}`}>
              {sol.title}
            </span>
            {isActive && (
              <span className="ml-auto text-[10px] px-2 py-0.5 rounded-full bg-orange-600 text-white">
                ACTIVE
              </span>
            )}
          </div>
          <div className="text-[11px] text-slate-700 leading-snug mb-1">
            <span className="font-bold text-rose-700">문제 </span>
            {sol.problem}
          </div>
          <div className="text-[11px] text-slate-700 leading-snug">
            <span className="font-bold text-emerald-700">해결 </span>
            {sol.solution}
          </div>
        </div>
      );
    }

    const TONE_STYLE = {
      good:    'bg-emerald-50 border-emerald-300 text-emerald-800',
      bad:     'bg-rose-50    border-rose-300    text-rose-800',
      neutral: 'bg-slate-50   border-slate-200   text-slate-700',
    };

    function MetricRow({ metric }) {
      const cls = TONE_STYLE[metric.tone] || TONE_STYLE.neutral;
      return (
        <div className={`rounded-md border px-3 py-1.5 flex items-center justify-between ${cls}`}>
          <span className="text-xs font-bold">{metric.label}</span>
          <span className="text-xs font-mono">{metric.value}</span>
        </div>
      );
    }

    function LiveDataPane({ step }) {
      return (
        <div className="rounded-xl border border-orange-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-orange-800">DB가 해결하는 5가지</h3>
            <span className="text-[10px] text-slate-500">활성 카드 = 현재 단계</span>
          </div>
          <div className="space-y-2">
            {SOLUTIONS.map((sol) => (
              <SolutionCard
                key={sol.key}
                sol={sol}
                isActive={sol.key === step.activeKey}
              />
            ))}
          </div>

          {step.metrics && step.metrics.length > 0 && (
            <div className="mt-3 pt-3 border-t border-dashed border-orange-300">
              <div className="text-[10px] font-bold text-orange-700 mb-1.5 uppercase tracking-wide">
                지금 단계 수치
              </div>
              <div className="space-y-1.5">
                {step.metrics.map((m, i) => (
                  <MetricRow key={i} metric={m} />
                ))}
              </div>
            </div>
          )}

          <div className="mt-3 text-xs text-orange-900 bg-orange-50 border border-orange-200 rounded p-2">
            💡 {step.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer — 5개 탭 (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeTabs({ stepIdx, setStepIdx }) {
      return (
        <div className="flex bg-slate-900 border-b border-slate-700 overflow-x-auto">
          {STEPS.map((s, i) => {
            const active = i === stepIdx;
            return (
              <button
                key={s.code.tabKey}
                onClick={() => setStepIdx(i)}
                className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 ${
                  active
                    ? 'bg-[#282c34] text-orange-300 border-t-2 border-t-orange-400'
                    : 'bg-slate-900 text-slate-400 hover:text-slate-200'
                }`}
              >
                {s.code.filename}
              </button>
            );
          })}
        </div>
      );
    }

    function CodeViewer({ stepIdx, setStepIdx }) {
      const code = STEPS[stepIdx].code;
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <CodeTabs stepIdx={stepIdx} setStepIdx={setStepIdx} />
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-orange-500/15 border-l-2 border-orange-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {STEPS.length}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-orange-600 text-white font-bold">I</span>
              <div>
                <h1 className="text-2xl font-bold text-orange-900">Chapter I-2-2. 데이터베이스가 해결하는 것</h1>
                <p className="text-sm text-orange-800/80">인덱스 · 트랜잭션 · 스키마 · 제약 · ACID — DB만의 5가지 약속</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-orange-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-orange-600' : 'bg-orange-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-orange-700 text-orange-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-orange-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane step={step} />
              <CodeViewer stepIdx={stepIdx} setStepIdx={setStepIdx} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-orange-700 text-white' : 'bg-orange-600 text-white hover:bg-orange-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-orange-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-orange-400 bg-white px-4 py-3 text-sm text-orange-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                인덱스(속도) · 트랜잭션(동시성) · 스키마(타입) · 제약(무결성) · ACID(일관성). 이 다섯 가지가 파일/CSV/캐시로는 절대 못 푸는 문제다. 다음 챕터(I-2-3)에서는 이 약속들을 실제로 구현하는 PostgreSQL의 구조를 살펴본다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Index', 'B-Tree', 'Transaction', 'MVCC', 'Schema', 'Constraint', 'ACID', 'WAL', 'PostgreSQL'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-orange-100 text-orange-800 border border-orange-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-orange-700">
              <a href="./chapter-i-2-1.html" className="underline hover:no-underline">← 이전: I-2-1</a>
              <a href="./index.html" className="underline hover:no-underline">챕터 목록</a>
              <a href="./chapter-i-2-3.html" className="underline hover:no-underline">다음: I-2-3 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
