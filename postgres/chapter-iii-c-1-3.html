<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — Chapter III-C-1-3. NULL 다루기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { label: "NULL이란", desc: "[Step 1] NULL은 '값 없음'이 아니라 '알 수 없음'입니다. 0이나 빈 문자열과 다릅니다. NULL과의 모든 비교는 TRUE도 FALSE도 아닌 NULL(UNKNOWN)을 반환합니다.", phase: "what" },
      { label: "3값 논리 진리표", desc: "[Step 2] SQL은 TRUE/FALSE 외에 NULL(UNKNOWN)이라는 세 번째 값이 있습니다. AND와 OR에서 NULL이 끼면 결과가 달라집니다. TRUE AND NULL = NULL, FALSE OR NULL = NULL입니다.", phase: "truthtable" },
      { label: "COALESCE", desc: "[Step 3] COALESCE(a, b, c)는 첫 번째로 NULL이 아닌 값을 반환합니다. '이 값이 NULL이면 대신 이걸 써라'라는 기본값 패턴입니다. COALESCE(phone, '없음')은 phone이 NULL이면 '없음'을 반환합니다.", phase: "coalesce" },
      { label: "NULLIF", desc: "[Step 4] NULLIF(a, b)는 a와 b가 같으면 NULL을 반환하고, 다르면 a를 그대로 반환합니다. 가장 흔한 용도: 0으로 나누기 방지. revenue / NULLIF(count, 0)은 count가 0이면 NULL이 되어 나누기 에러를 피합니다.", phase: "nullif" },
      { label: "IS DISTINCT FROM", desc: "[Step 5] IS DISTINCT FROM은 NULL까지 포함해 안전하게 비교합니다. NULL IS DISTINCT FROM NULL = FALSE(같다), NULL = NULL은 NULL(알 수 없음). NULL-safe 비교가 필요할 때 씁니다.", phase: "distinct" },
      { label: "NOT IN + NULL 함정", desc: "[Step 6] NOT IN 목록에 NULL이 하나라도 있으면 결과가 항상 비어버립니다! WHERE id NOT IN (1, 2, NULL)은 0행을 반환합니다. 대안: NOT EXISTS나 LEFT JOIN ... IS NULL 패턴을 씁니다.", phase: "trap" }
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 5000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const phase = stepData.phase;

      const Cell = ({ val, color }) => (
        <td className={`p-2 text-center font-bold text-sm border ${color === 'true' ? 'bg-green-100 text-green-700' : color === 'false' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700'}`}>
          {val}
        </td>
      );

      const renderViz = () => {
        if (phase === 'what') {
          return (
            <div className="space-y-4">
              <div className="grid grid-cols-3 gap-4 text-center">
                <div className="p-4 rounded-lg border-2 border-green-300 bg-green-50">
                  <div className="text-2xl font-mono font-bold text-green-700">0</div>
                  <div className="text-xs text-slate-600 mt-2">"값이 0이다" (알고 있음)</div>
                </div>
                <div className="p-4 rounded-lg border-2 border-blue-300 bg-blue-50">
                  <div className="text-2xl font-mono font-bold text-blue-700">''</div>
                  <div className="text-xs text-slate-600 mt-2">"빈 문자열" (알고 있음)</div>
                </div>
                <div className="p-4 rounded-lg border-2 border-yellow-400 bg-yellow-50">
                  <div className="text-2xl font-mono font-bold text-yellow-700">NULL</div>
                  <div className="text-xs text-slate-600 mt-2">"알 수 없음" (모름)</div>
                </div>
              </div>
              <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
                <div>SELECT NULL = NULL;    <span className="text-yellow-300">-- NULL (TRUE가 아님!)</span></div>
                <div>SELECT NULL {'<>'} NULL;   <span className="text-yellow-300">-- NULL (FALSE가 아님!)</span></div>
                <div>SELECT NULL + 1;       <span className="text-yellow-300">-- NULL (전파됨)</span></div>
                <div>SELECT NULL = 0;       <span className="text-yellow-300">-- NULL</span></div>
              </div>
            </div>
          );
        }

        if (phase === 'truthtable') {
          const andTable = [
            ['', 'TRUE', 'FALSE', 'NULL'],
            ['TRUE', 'TRUE', 'FALSE', 'NULL'],
            ['FALSE', 'FALSE', 'FALSE', 'FALSE'],
            ['NULL', 'NULL', 'FALSE', 'NULL']
          ];
          const orTable = [
            ['', 'TRUE', 'FALSE', 'NULL'],
            ['TRUE', 'TRUE', 'TRUE', 'TRUE'],
            ['FALSE', 'TRUE', 'FALSE', 'NULL'],
            ['NULL', 'TRUE', 'NULL', 'NULL']
          ];
          const getColor = v => v === 'TRUE' ? 'true' : v === 'FALSE' ? 'false' : v === 'NULL' ? 'null' : '';

          const TruthTable = ({ title, data }) => (
            <div>
              <div className="text-sm font-bold text-slate-700 mb-2 text-center">{title}</div>
              <table className="w-full border-collapse border border-slate-300">
                <tbody>
                  {data.map((row, ri) => (
                    <tr key={ri}>
                      {row.map((cell, ci) => (
                        ri === 0 || ci === 0
                          ? <th key={ci} className="p-2 text-center text-xs font-bold bg-slate-100 border border-slate-300">{cell}</th>
                          : <Cell key={ci} val={cell} color={getColor(cell)} />
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          );

          return (
            <div className="grid grid-cols-2 gap-6">
              <TruthTable title="AND 진리표" data={andTable} />
              <TruthTable title="OR 진리표" data={orTable} />
            </div>
          );
        }

        if (phase === 'coalesce') {
          const examples = [
            { args: ['NULL', "'대한민국'"], result: '대한민국', note: '첫 번째가 NULL → 두 번째 반환' },
            { args: ["'서울'", "'대한민국'"], result: '서울', note: '첫 번째가 NOT NULL → 첫 번째 반환' },
            { args: ['NULL', 'NULL', "'없음'"], result: '없음', note: '앞 두 개가 NULL → 세 번째 반환' }
          ];
          return (
            <div className="space-y-4">
              <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
                <div className="text-slate-400">-- COALESCE: 첫 번째 NOT NULL 값 반환</div>
                <div>SELECT COALESCE(phone, email, '연락처 없음') FROM users;</div>
              </div>
              <div className="space-y-3">
                {examples.map((ex, i) => (
                  <div key={i} className="flex items-center gap-3 p-3 rounded-lg border border-slate-200 bg-slate-50">
                    <div className="font-mono text-sm">COALESCE({ex.args.join(', ')})</div>
                    <div className="text-slate-400">=</div>
                    <div className="font-mono text-sm font-bold text-green-700 bg-green-50 px-2 py-1 rounded">{ex.result}</div>
                    <div className="text-xs text-slate-500 flex-1 text-right">{ex.note}</div>
                  </div>
                ))}
              </div>
            </div>
          );
        }

        if (phase === 'nullif') {
          return (
            <div className="space-y-4">
              <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
                <div className="text-slate-400">-- NULLIF: a = b이면 NULL, 아니면 a</div>
                <div>SELECT NULLIF(5, 5);    <span className="text-yellow-300">-- NULL (같으므로)</span></div>
                <div>SELECT NULLIF(5, 3);    <span className="text-green-400">-- 5 (다르므로)</span></div>
                <div className="mt-2 text-slate-400">-- 핵심 용도: 0으로 나누기 방지</div>
                <div>SELECT revenue / <span className="text-blue-300">NULLIF(count, 0)</span>;</div>
                <div className="text-slate-400">-- count가 0이면 NULLIF가 NULL을 반환 → 나누기 결과도 NULL (에러 없음)</div>
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div className="p-4 rounded-lg border-2 border-red-300 bg-red-50 text-center">
                  <div className="text-xs font-bold text-red-600 mb-2">NULLIF 없이</div>
                  <div className="font-mono text-sm">100 / 0</div>
                  <div className="text-red-700 font-bold mt-2">ERROR: division by zero</div>
                </div>
                <div className="p-4 rounded-lg border-2 border-green-300 bg-green-50 text-center">
                  <div className="text-xs font-bold text-green-600 mb-2">NULLIF 사용</div>
                  <div className="font-mono text-sm">100 / NULLIF(0, 0)</div>
                  <div className="text-yellow-600 font-bold mt-2">NULL (안전!)</div>
                </div>
              </div>
            </div>
          );
        }

        if (phase === 'distinct') {
          const comparisons = [
            { a: 'NULL', b: 'NULL', eq: 'NULL', dist: 'FALSE' },
            { a: 'NULL', b: '1', eq: 'NULL', dist: 'TRUE' },
            { a: '1', b: '1', eq: 'TRUE', dist: 'FALSE' },
            { a: '1', b: '2', eq: 'FALSE', dist: 'TRUE' }
          ];
          return (
            <div className="space-y-4">
              <table className="w-full text-sm border-collapse">
                <thead>
                  <tr className="border-b-2 border-slate-300">
                    <th className="p-2 text-center">a</th>
                    <th className="p-2 text-center">b</th>
                    <th className="p-2 text-center bg-red-50">a = b</th>
                    <th className="p-2 text-center bg-green-50">a IS DISTINCT FROM b</th>
                  </tr>
                </thead>
                <tbody>
                  {comparisons.map((c, i) => (
                    <tr key={i} className="border-t">
                      <td className="p-2 text-center font-mono">{c.a}</td>
                      <td className="p-2 text-center font-mono">{c.b}</td>
                      <td className={`p-2 text-center font-bold ${c.eq === 'NULL' ? 'text-yellow-600 bg-yellow-50' : c.eq === 'TRUE' ? 'text-green-600' : 'text-red-600'}`}>{c.eq}</td>
                      <td className={`p-2 text-center font-bold ${c.dist === 'FALSE' ? 'text-green-600 bg-green-50' : 'text-blue-600 bg-blue-50'}`}>{c.dist}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div className="bg-green-50 border border-green-300 p-3 rounded-lg text-center text-sm text-green-700">
                IS DISTINCT FROM: NULL끼리는 "같다"(FALSE), NULL vs 값은 "다르다"(TRUE)<br/>
                <b>NULL-safe 비교</b>가 필요할 때 사용
              </div>
            </div>
          );
        }

        if (phase === 'trap') {
          return (
            <div className="space-y-4">
              <div className="grid grid-cols-2 gap-4">
                <div className="p-4 rounded-lg border-2 border-red-400 bg-red-50">
                  <div className="text-sm font-bold text-red-600 mb-2">NOT IN + NULL 함정</div>
                  <div className="bg-slate-800 text-green-300 p-2 rounded font-mono text-xs">
                    <div>WHERE id NOT IN (1, 2, NULL)</div>
                    <div className="text-slate-400 mt-1">-- 내부 전개:</div>
                    <div>id != 1 AND id != 2 AND id != NULL</div>
                    <div className="text-yellow-300">-- id != NULL = NULL (항상)</div>
                    <div className="text-red-400">-- ... AND NULL = NULL (항상)</div>
                    <div className="text-red-400 font-bold">-- 결과: 0행!</div>
                  </div>
                </div>
                <div className="p-4 rounded-lg border-2 border-green-400 bg-green-50">
                  <div className="text-sm font-bold text-green-600 mb-2">안전한 대안</div>
                  <div className="bg-slate-800 text-green-300 p-2 rounded font-mono text-xs">
                    <div className="text-slate-400">-- NOT EXISTS 패턴</div>
                    <div>WHERE NOT EXISTS (</div>
                    <div>  SELECT 1 FROM list</div>
                    <div>  WHERE list.id = t.id</div>
                    <div>);</div>
                    <div className="mt-2 text-slate-400">-- LEFT JOIN 패턴</div>
                    <div>LEFT JOIN list ON ...</div>
                    <div>WHERE list.id IS NULL;</div>
                  </div>
                </div>
              </div>
              <div className="bg-amber-50 border border-amber-300 p-3 rounded-lg text-center text-sm text-amber-700">
                NOT IN 서브쿼리 결과에 NULL이 포함될 가능성이 있다면 NOT EXISTS를 쓴다
              </div>
            </div>
          );
        }
        return null;
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold">III-C-1-3. NULL 다루기: COALESCE, NULLIF, IS DISTINCT FROM</h1>
              </div>
              <p className="text-slate-600">3값 논리 진리표를 직접 보고, COALESCE/NULLIF/IS DISTINCT FROM의 동작을 체험합니다.</p>
            </header>
            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm min-h-[90px]">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[350px] flex flex-col justify-center">{renderViz()}</div>
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="px-5 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg font-medium disabled:opacity-30 disabled:cursor-not-allowed">이전</button>
                <div className="flex items-center gap-4">
                  <button onClick={togglePlay} className={`px-5 py-2 rounded-lg font-medium ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-blue-600 hover:bg-blue-700 text-white'}`}>{isPlaying ? '일시 정지' : (isEnd ? '처음부터' : '자동 실행')}</button>
                  <div className="flex gap-1">{STEPS.map((_, i) => <button key={i} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }} className={`w-3 h-3 rounded-full ${i === currentStepIdx ? 'bg-blue-600' : i < currentStepIdx ? 'bg-blue-300' : 'bg-slate-200'}`} />)}</div>
                  <span className="text-xs text-slate-400 font-mono">{currentStepIdx + 1}/{STEPS.length}</span>
                </div>
                <button onClick={handleNext} disabled={isEnd} className="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium disabled:opacity-30 disabled:cursor-not-allowed">다음</button>
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
