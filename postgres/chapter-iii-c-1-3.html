            '-- numerator / NULL = NULL 이 되어 에러 대신 NULL 로 빠져나간다',
            '',
            '-- ③ COALESCE + NULLIF 조합 — 빈 문자열까지 한꺼번에 처리',
            "SELECT COALESCE(NULLIF(phone, ''), '미입력') AS phone_display",
            'FROM members;',
            "-- 빈 문자열도, NULL 도 모두 '미입력' 으로 통일",
            '',
            '-- ④ 3-valued logic — NULL 이 섞인 논리 연산',
            "--   AND: true  AND unknown = unknown",
            "--        false AND unknown = false   (한쪽이 false → false)",
            "--   OR : true  OR  unknown = true    (한쪽이 true  → true)",
            "--        false OR  unknown = unknown",
            "--   NOT: NOT unknown       = unknown",
            '',
            '-- ⑤ NULL 안전 체크리스트 (실무 디버깅용)',
            '--   [ ] 컬럼이 nullable 인가? (NOT NULL 인지 확인)',
            '--   [ ] = / <> 대신 IS NULL / IS NOT NULL 썼는가?',
            '--   [ ] 부정 조건에서 OR x IS NULL 을 빠뜨리지 않았나?',
            '--   [ ] 화면 표시할 때 COALESCE 로 기본값을 줬는가?',
            '--   [ ] 0 으로 나누기 위험에 NULLIF 를 썼는가?',
            '--   [ ] 빈 문자열과 NULL 을 한꺼번에 처리해야 하면',
            "--       COALESCE(NULLIF(x, ''), default) 패턴",
          ],
          highlight: [4, 5, 6, 7, 8, 9, 10, 16, 17, 18, 19, 20, 24, 25, 26, 29, 30, 31, 32, 33, 34, 36, 37, 38, 39, 40, 41, 42, 43],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — orange 톤
    //   회원 행 카드 + NULL 컬럼 회색 강조 + 비교 결과 표
    // ─────────────────────────────────────────────────────
    function renderPhoneCell(phone) {
      if (phone === null) {
        return <span className="italic text-slate-400 font-semibold">NULL</span>;
      }
      if (phone === '') {
        return <span className="text-slate-500">{'(빈 문자열)'}</span>;
      }
      return <span className="text-orange-900 font-semibold">{String(phone)}</span>;
    }

    function MemberRow({ row, highlightHit }) {
      const phoneIsNull = row.isNullCols && row.isNullCols.includes('phone');
      const normIsNull = row.isNullCols && row.isNullCols.includes('normalized');
      const hasNorm = row.normalized !== undefined;
      const hasDisplay = row.display !== undefined;

      const rowCls = highlightHit
        ? 'border-orange-400 bg-orange-100 shadow-sm'
        : 'border-orange-200 bg-white';

      return (
        <div className={`rounded-lg border ${rowCls} px-3 py-2`}>
          <div className="flex items-center gap-2 mb-1">
            <span className="text-[10px] font-mono text-slate-500 w-8">#{row.id}</span>
            <span className="text-sm font-bold text-orange-900 w-16">{row.name}</span>
            <span className="text-[10px] text-slate-500">age</span>
            <span className="text-sm font-mono text-orange-800">{row.age}</span>
            {highlightHit && (
              <span className="ml-auto text-[10px] px-2 py-0.5 rounded bg-orange-500 text-white font-bold">MATCH</span>
            )}
          </div>
          <div className="flex items-center gap-2 text-xs flex-wrap">
            <span className="text-[10px] text-slate-500 w-12">phone</span>
            <span className={`px-2 py-0.5 rounded font-mono ${phoneIsNull ? 'bg-slate-200 text-slate-500' : 'bg-orange-50 text-orange-900'}`}>
              {renderPhoneCell(row.phone)}
            </span>
            {hasDisplay && (
              <>
                <span className="text-slate-400">→</span>
                <span className="text-[10px] text-slate-500">display</span>
                <span className="px-2 py-0.5 rounded font-mono bg-amber-100 text-amber-900">
                  {row.display === '' ? <span className="text-slate-500">(빈 문자열)</span> : row.display}
                </span>
              </>
            )}
            {hasNorm && (
              <>
                <span className="text-slate-400">→</span>
                <span className="text-[10px] text-slate-500">norm</span>
                <span className={`px-2 py-0.5 rounded font-mono ${normIsNull ? 'bg-slate-200 text-slate-500 italic' : 'bg-amber-100 text-amber-900'}`}>
                  {row.normalized === null ? 'NULL' : row.normalized}
                </span>
              </>
            )}
          </div>
          {row.note && (
            <div className="mt-1 text-[10px] text-slate-500 italic">{row.note}</div>
          )}
        </div>
      );
    }

    function CompareBox({ compare }) {
      if (!compare || compare.length === 0) return null;

      const renderResult = (item) => {
        if (item.result === 'unknown') {
          return (
            <span className="ml-auto text-[10px] px-2 py-0.5 rounded bg-slate-300 text-slate-700 font-bold">unknown</span>
          );
        }
        if (item.hits) {
          return (
            <span className="ml-auto text-[10px] px-2 py-0.5 rounded bg-orange-500 text-white font-bold whitespace-nowrap">
              {item.hits.length}건 매치
            </span>
          );
        }
        return null;
      };

      return (
        <div className="mt-3 rounded-lg border-2 border-orange-400 bg-orange-50 p-3">
          <div className="text-xs font-bold text-orange-800 mb-2">🔍 비교 결과 (3-valued logic)</div>
          <ul className="space-y-1.5">
            {compare.map((c, i) => (
              <li key={i} className="text-xs text-orange-900 flex items-center gap-2 flex-wrap">
                <span className="font-mono bg-white px-1.5 py-0.5 rounded border border-orange-200 text-orange-800">
                  {c.expr}
                </span>
                <span className="text-orange-800/80">{c.meaning}</span>
                {renderResult(c)}
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      // compare 의 hits 정보로 어떤 행에 MATCH 표시할지 모은다
      const hitSet = new Set();
      if (state.compare) {
        state.compare.forEach((c) => {
          if (c.hits) c.hits.forEach((id) => hitSet.add(id));
        });
      }

      return (
        <div className="rounded-xl border border-orange-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-orange-800">members 테이블</h3>
            <span className="text-[10px] text-slate-500">회색 = NULL · 주황 = 값 존재</span>
          </div>
          <div className="space-y-2">
            {state.rows.map((row) => (
              <MemberRow
                key={row.id}
                row={row}
                highlightHit={hitSet.has(row.id)}
              />
            ))}
          </div>
          <CompareBox compare={state.compare} />
          <div className="mt-3 text-xs text-orange-900 bg-orange-50 border border-orange-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-orange-500/15 border-l-2 border-orange-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-orange-600 text-white font-bold">III</span>
              <div>
                <h1 className="text-2xl font-bold text-orange-900">Chapter III-C-1-3. NULL 다루기</h1>
                <p className="text-sm text-orange-800/80">NULL 은 값이 아니라 "값 없음" · IS NULL · COALESCE · NULLIF + 3치 논리</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-orange-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-orange-600' : 'bg-orange-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-orange-700 text-orange-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-orange-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-orange-700 text-white' : 'bg-orange-600 text-white hover:bg-orange-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-orange-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-orange-400 bg-white px-4 py-3 text-sm text-orange-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                NULL 은 "값 없음" → = 로 비교 불가 → IS NULL / IS NOT NULL 로 검사 → COALESCE 로 기본값 → NULLIF 로 특정 값을 NULL 로 변환. 3치 논리(true/false/unknown)를 머릿속에 그려두면 NULL 관련 버그의 대부분을 막을 수 있다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['NULL', 'IS NULL', 'IS NOT NULL', 'COALESCE', 'NULLIF', '3-valued logic', 'unknown', '빈 문자열'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-orange-100 text-orange-800 border border-orange-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-orange-700">
              <a href="./index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./chapter-iii-c-1-4.html" className="underline hover:no-underline">다음: III-C-1-4 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
