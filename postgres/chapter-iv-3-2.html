          ]},
          { name: 'growth', role: 'JOIN 비교', rows: [
            { c1: '강남점', c2: '+6.2%' },
            { c1: '판교점', c2: '+6.3%' },

          filename: 'chain.sql',
          lines: [
            '-- Step 3. 여러 CTE 체인',

            '  SELECT store, AVG(amount)::INT AS avg_sales',
            '  FROM sales',

            'ORDER BY growth_pct DESC;',

            { c1: '시니어 개발자', c2: 'depth 4' },

        mainQuery: {
          label: '메인 쿼리: org_tree ORDER BY depth, name',
          rows: [
            { c1: 'CEO', c2: '깊이 1' },
            { c1: 'CTO', c2: '깊이 2' },
            { c1: '백엔드 리드', c2: '깊이 3' },
            { c1: '시니어 개발자', c2: '깊이 4' },

          filename: 'recursive.sql',

            '-- 예시 테이블: employees(id, name, manager_id)',

            '  -- ① anchor: 최상위 (CEO)',
            '  SELECT',
            '    id,',
            '    name,',
            '    manager_id,',

            '  FROM employees',

        ctes: [

            { c1: '주문 1.2M건', c2: '캐시됨' },
            { c1: '재사용 ×3', c2: '동일 결과' },
          ]},
        ],
        mainQuery: {
          label: '메인 쿼리: big_orders 를 3번 참조',
          rows: [
            { c1: 'JOIN customers', c2: 'OK' },
            { c1: 'JOIN products', c2: 'OK' },
            { c1: 'JOIN regions', c2: 'OK' },
          ],
        },
        hint: {

          rules: [

            '-- PostgreSQL 12 부터 CTE 가 기본 인라인된다',

            '-- ① MATERIALIZED: 한 번만 계산 후 결과를 저장',

            'WITH big_orders AS MATERIALIZED (',

            '  FROM orders',
            '  WHERE total >= 1000000  -- 큰 주문만 (비싼 필터)',

            '',
            '-- ③ 기본 (PG12+):',
            '--    참조 1회 → 인라인',

            '',
            '-- ④ 재귀 CTE 는 항상 MATERIALIZED (인라인 불가)',

            '-- 결론:',

    function CteBox({ cte }) {
      return (
        <div className="rounded-lg border-2 border-orange-300 bg-orange-50 p-3">
          <div className="flex items-center justify-between mb-2">
            <span className="text-xs font-bold text-orange-800 font-mono">WITH {cte.name}</span>
            <span className="text-[10px] px-2 py-0.5 rounded bg-orange-200 text-orange-800">{cte.role}</span>
          </div>
          <div className="space-y-1">
            {cte.rows.map((r, i) => (
              <div key={i} className="flex items-center justify-between text-xs font-mono bg-white border border-orange-200 rounded px-2 py-1">
                <span className="text-orange-900">{r.c1}</span>
                <span className="text-orange-700">{r.c2}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function MainQueryBox({ q }) {
      return (
        <div className="rounded-lg border-2 border-amber-400 bg-amber-50 p-3">
          <div className="text-xs font-bold text-amber-900 mb-2 font-mono">{q.label}</div>
          <div className="space-y-1">
            {q.rows.map((r, i) => (
              <div key={i} className="flex items-center justify-between text-xs font-mono bg-white border border-amber-200 rounded px-2 py-1">
                <span className="text-amber-900">{r.c1}</span>
                <span className="text-amber-700">{r.c2}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function TreeBox({ tree }) {
      if (!tree) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-orange-400 bg-white p-3">
          <div className="text-xs font-bold text-orange-800 mb-2">🌳 {tree.title}</div>
          <div className="space-y-1">
            {tree.nodes.map((n, i) => (
              <div key={i} className="flex items-center gap-2 text-xs font-mono">
                <span style={{ paddingLeft: `${n.depth * 16}px` }} className="text-orange-500">
                  {n.depth > 0 ? '└─' : '●'}
                </span>
                <span className="font-bold text-orange-900">{n.label}</span>
                <span className="ml-auto text-[10px] text-slate-500">{n.tag}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function HintBox({ hint }) {
      if (!hint) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-orange-500 bg-gradient-to-br from-orange-50 to-amber-50 p-3">
          <div className="text-xs font-bold text-orange-800 mb-2">⚡ {hint.title}</div>
          <ul className="space-y-1">
            {hint.rules.map((r, i) => (
              <li key={i} className="text-xs text-orange-900 flex gap-2">
                <span className="text-orange-500 mt-0.5">▸</span>
                <span>{r}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-orange-200 bg-white p-4 h-full flex flex-col overflow-auto">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-orange-800">CTE 실행 흐름 시각화</h3>
            <span className="text-[10px] text-slate-500">위 = CTE / 아래 = 메인 쿼리</span>
          </div>
          <div className="space-y-2">
            {state.ctes.map((c, i) => (
              <CteBox key={i} cte={c} />
            ))}
          </div>
          <div className="my-3 text-center text-xs font-bold text-orange-600 py-1.5 border-y border-dashed border-orange-300">
            ↓ CTE 결과를 메인 쿼리에서 참조 ↓
          </div>
          <MainQueryBox q={state.mainQuery} />
          <TreeBox tree={state.tree} />
          <HintBox hint={state.hint} />
          <div className="mt-3 text-xs text-orange-900 bg-orange-50 border border-orange-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer — 5개 탭 (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ tabs, activeIdx, onTabClick }) {
      const codeRef = useRef(null);
      const code = tabs[activeIdx];
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          {/* 탭 바 */}
          <div className="flex bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {tabs.map((t, i) => (
              <button
                key={i}
                onClick={() => onTabClick(i)}
                className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 ${
                  i === activeIdx
                    ? 'bg-[#282c34] text-orange-300'
                    : 'bg-slate-900 text-slate-400 hover:text-slate-200'
                }`}
              >
                {t.filename}
              </button>
            ))}
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-orange-500/15 border-l-2 border-orange-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Tab {activeIdx + 1} / {tabs.length}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];
      const tabs = STEPS.map((s) => s.codeTab);

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동 재생 3000ms / 단계
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-orange-600 text-white font-bold">IV</span>
              <div>
                <h1 className="text-2xl font-bold text-orange-900">Chapter IV-3-2. CTE (Common Table Expression)</h1>
                <p className="text-sm text-orange-800/80">WITH 절 → 가독성 → 체인 → 재귀 → MATERIALIZED. 5단계로 추적</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-orange-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-orange-600' : 'bg-orange-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-orange-700 text-orange-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-orange-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4" style={{ minHeight: '560px' }}>
              <LiveDataPane state={step} />
              <CodeViewer tabs={tabs} activeIdx={stepIdx} onTabClick={setStepIdx} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-orange-700 text-white' : 'bg-orange-600 text-white hover:bg-orange-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-orange-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계 · 우측 탭 클릭으로 이동</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-orange-400 bg-white px-4 py-3 text-sm text-orange-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                CTE 는 한 쿼리 안의 "이름 붙인 임시 표"다. 가독성이 좋아지고, 같은 결과를 여러 번 참조할 수 있고, 재귀로 계층 구조를 펼칠 수 있다. PG12+ 부터는 옵티마이저가 똑똑하게 인라인/별도 계산을 결정하므로, 정말 필요할 때만 MATERIALIZED 힌트를 쓰면 된다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['CTE', 'WITH', 'WITH RECURSIVE', '서브쿼리', '가독성', '계층구조', 'MATERIALIZED', 'PG12+'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-orange-100 text-orange-800 border border-orange-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-orange-700">
              <a href="./chapter-iv-3-1.html" className="underline hover:no-underline">← 이전: IV-3-1</a>
              <a href="./chapter-iv-3-3.html" className="underline hover:no-underline">다음: IV-3-3 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
