  <!--
    PostgreSQL Chapter IV-2-1 — JOIN 완전 정복
    학습 목표: INNER / LEFT / RIGHT / FULL OUTER / CROSS JOIN 5가지를
              두 원본 테이블(employees, departments) + 결과 테이블 행 강조로
              "어떤 행이 결과에 포함되는가"를 직관적으로 비교한다.
    패턴: fastapi v1 — 좌(LiveDataPane: 양쪽 원본 테이블 + JOIN 결과 강조)
                    / 우(VSCode CodeViewer: 5개 SQL 파일)
    색상: orange (postgres 도메인)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 원본 데이터 — 두 테이블
    //   employees : 직원 (정수연은 부서 미배정 = NULL)
    //   departments: 부서 (디자인팀은 직원 0명)
    // ─────────────────────────────────────────────────────
    const EMP = [
      { id: 1, name: '김철수', deptId: 10 },
      { id: 2, name: '이영희', deptId: 10 },
      { id: 3, name: '박민준', deptId: 20 },
      { id: 4, name: '정수연', deptId: null }, // 부서 미배정
    ];

    const DEPT = [
      { id: 10, name: '개발팀' },
      { id: 20, name: '마케팅팀' },
      { id: 30, name: '디자인팀' }, // 직원 0명
    ];

    // ─────────────────────────────────────────────────────
    // JOIN 결과 계산 헬퍼
    //   각 결과 row 에는 fromEmpId / fromDeptId 메타를 같이 담아서
    //   좌측 원본 테이블에서 어떤 행이 매칭됐는지 강조에 사용
    // ─────────────────────────────────────────────────────
    function innerJoin() {
      const rows = [];
      EMP.forEach((e) => {
        DEPT.forEach((d) => {
          if (e.deptId === d.id) {
            rows.push({ empId: e.id, empName: e.name, deptId: d.id, deptName: d.name });
          }
        });
      });
      return rows;
    }
    function leftJoin() {
      const rows = [];
      EMP.forEach((e) => {
        const match = DEPT.find((d) => d.id === e.deptId);
        if (match) {
          rows.push({ empId: e.id, empName: e.name, deptId: match.id, deptName: match.name });
        } else {
          rows.push({ empId: e.id, empName: e.name, deptId: null, deptName: null, leftOnly: true });
        }
      });
      return rows;
    }
    function rightJoin() {
      const rows = [];
      DEPT.forEach((d) => {
        const matches = EMP.filter((e) => e.deptId === d.id);
        if (matches.length === 0) {
          rows.push({ empId: null, empName: null, deptId: d.id, deptName: d.name, rightOnly: true });
        } else {
          matches.forEach((e) => {
            rows.push({ empId: e.id, empName: e.name, deptId: d.id, deptName: d.name });
          });
        }
      });
      return rows;
    }
    function fullJoin() {
      const rows = leftJoin().slice();
      DEPT.forEach((d) => {
        const matched = EMP.some((e) => e.deptId === d.id);
        if (!matched) {
          rows.push({ empId: null, empName: null, deptId: d.id, deptName: d.name, rightOnly: true });
        }
      });
      return rows;
    }
    function crossJoin() {
      const rows = [];
      EMP.forEach((e) => {
        DEPT.forEach((d) => {
          rows.push({ empId: e.id, empName: e.name, deptId: d.id, deptName: d.name });
        });
      });
      return rows;
    }

    // ─────────────────────────────────────────────────────
    // 5단계 STEPS — joinType 별 시나리오 + SQL 파일
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {

        rule: '양쪽 키가 모두 존재 + 값이 일치하는 행만 반환',
        result: innerJoin(),
        keyPoint: '교집합. 한쪽이라도 매칭 실패하면 해당 행은 완전히 사라진다. NULL 행은 절대 나오지 않는다.',

      {

        code: {
          lang: 'sql',
          filename: 'left.sql',
          lines: [

        },
      },
      {
        joinType: 'right',
        title: 'Step 3. RIGHT JOIN — 오른쪽은 모두 살린다',
        desc: 'LEFT JOIN의 대칭. 오른쪽 테이블(departments)의 모든 행을 결과에 포함시킨다. 디자인팀(직원 0명)은 매칭 실패지만 오른쪽이라 결과에 들어가고 직원명은 NULL. 정수연은 왼쪽이라 여기서는 빠진다. 실무에서는 LEFT JOIN을 더 자주 쓰고, 테이블 순서를 바꿔 LEFT 로 표현하는 게 더 명확해서 RIGHT 는 덜 쓴다.',
        rule: '오른쪽 행은 무조건 살린다. 왼쪽 매칭 없으면 NULL.',
        result: rightJoin(),
        keyPoint: 'LEFT JOIN과 거울 관계. FROM A RIGHT JOIN B = FROM B LEFT JOIN A 와 동등.',
        code: {

            '-- 디자인팀(직원 0명) → 매칭 실패 BUT 오른쪽이라 살아남음',

            '',
            '-- 결과:',

            '--  3    | 박민준 | 20 | 마케팅팀',

        rule: '한쪽이라도 행이 있으면 살린다. 매칭 없는 쪽은 NULL.',
        result: fullJoin(),
        keyPoint: '합집합. "어느 쪽에 빠진 데이터가 있는가" 검출용으로 강력하다.',
        code: {
          lang: 'sql',
          filename: 'full.sql',
          lines: [
            '-- ④ FULL OUTER JOIN — 양쪽 모두 살린다 (합집합)',

            '-- 정수연(부서 NULL) → 왼쪽에 있으니까 살아남음',

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — 두 원본 테이블 + JOIN 결과 강조
    // ─────────────────────────────────────────────────────
    function SourceTable({ title, rows, kind, matchedIds, allMatched }) {
      // matchedIds: 이번 step 결과에 포함된 행 id 들
      // allMatched: true 면 모든 행을 강조 (CROSS JOIN)
      const isEmp = kind === 'emp';
      const headerBg = isEmp ? 'bg-orange-600' : 'bg-amber-600';
      const accent = isEmp ? 'text-orange-700' : 'text-amber-700';
      return (
        <div className="flex-1">
          <div className={`text-xs font-bold ${accent} mb-1`}>{title}</div>
          <table className="w-full text-[11px] border border-slate-200 rounded overflow-hidden">
            <thead>
              <tr className={`${headerBg} text-white`}>
                <th className="px-2 py-1 text-left">id</th>
                <th className="px-2 py-1 text-left">name</th>
                {isEmp && <th className="px-2 py-1 text-left">dept_id</th>}
              </tr>
            </thead>
            <tbody>
              {rows.map((r) => {
                const matched = allMatched || matchedIds.has(r.id);
                const isNullRow = isEmp && r.deptId === null;
                return (
                  <tr
                    key={r.id}
                    className={`border-t border-slate-200 transition-all ${
                      matched
                        ? 'bg-orange-100 ring-1 ring-orange-400'
                        : 'bg-slate-50 opacity-50'
                    }`}
                  >
                    <td className="px-2 py-1 font-mono">{r.id}</td>
                    <td className="px-2 py-1">{r.name}</td>
                    {isEmp && (
                      <td className={`px-2 py-1 font-mono ${isNullRow ? 'text-red-500 italic' : ''}`}>
                        {r.deptId === null ? 'NULL' : r.deptId}
                      </td>
                    )}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      );
    }

    function ResultTable({ rows, joinType }) {
      if (!rows || rows.length === 0) return null;
      return (
        <div>
          <div className="text-xs font-bold text-orange-800 mb-1">
            JOIN 결과 ({rows.length}건) — <span className="uppercase">{joinType}</span>
          </div>
          <div className="overflow-x-auto max-h-56 overflow-y-auto rounded border border-orange-300">
            <table className="w-full text-[11px]">
              <thead className="sticky top-0">
                <tr className="bg-orange-700 text-white">
                  <th className="px-2 py-1 text-left">emp_id</th>
                  <th className="px-2 py-1 text-left">emp_name</th>
                  <th className="px-2 py-1 text-left">dept_id</th>
                  <th className="px-2 py-1 text-left">dept_name</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r, i) => {
                  const isLeftOnly = r.leftOnly;
                  const isRightOnly = r.rightOnly;
                  const tone = isLeftOnly
                    ? 'bg-yellow-50'
                    : isRightOnly
                    ? 'bg-emerald-50'
                    : i % 2 === 0
                    ? 'bg-white'
                    : 'bg-orange-50/40';
                  const nullCls = 'text-red-500 italic';
                  return (
                    <tr key={i} className={`border-t border-slate-200 ${tone}`}>
                      <td className={`px-2 py-1 font-mono ${r.empId === null ? nullCls : ''}`}>
                        {r.empId === null ? 'NULL' : r.empId}
                      </td>
                      <td className={`px-2 py-1 ${r.empName === null ? nullCls : ''}`}>
                        {r.empName === null ? 'NULL' : r.empName}
                      </td>
                      <td className={`px-2 py-1 font-mono ${r.deptId === null ? nullCls : ''}`}>
                        {r.deptId === null ? 'NULL' : r.deptId}
                      </td>
                      <td className={`px-2 py-1 ${r.deptName === null ? nullCls : ''}`}>
                        {r.deptName === null ? 'NULL' : r.deptName}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function VennLite({ joinType }) {
      // 좌(EMP)와 우(DEPT) 두 원이 겹친 모양. joinType 별로 채워지는 영역이 바뀐다.
      const leftFill = ['left', 'full', 'cross'].includes(joinType) ? 'fill-orange-300' : 'fill-orange-100';
      const rightFill = ['right', 'full', 'cross'].includes(joinType) ? 'fill-amber-300' : 'fill-amber-100';
      const interFill = ['inner', 'left', 'right', 'full', 'cross'].includes(joinType) ? 'fill-orange-500' : 'fill-slate-200';
      return (
        <svg viewBox="0 0 220 90" className="w-full max-w-[220px] mx-auto">
          <circle cx="80" cy="45" r="38" className={`${leftFill} stroke-orange-400`} strokeWidth="1.2" opacity="0.85" />
          <circle cx="140" cy="45" r="38" className={`${rightFill} stroke-amber-500`} strokeWidth="1.2" opacity="0.85" />
          <clipPath id="cl-l"><circle cx="80" cy="45" r="38" /></clipPath>
          <circle cx="140" cy="45" r="38" clipPath="url(#cl-l)" className={interFill} opacity="0.95" />
          <text x="55" y="50" className="text-[9px] fill-orange-900 font-bold">EMP</text>
          <text x="148" y="50" className="text-[9px] fill-amber-900 font-bold">DEPT</text>
          <text x="110" y="82" textAnchor="middle" className="text-[9px] fill-slate-700 font-bold">
            {joinType.toUpperCase()} JOIN
          </text>
        </svg>
      );
    }

    function LiveDataPane({ step }) {
      // 결과 행에서 각 원본 테이블 어느 id 가 매칭됐는지 추출
      const matchedEmpIds = new Set();
      const matchedDeptIds = new Set();
      step.result.forEach((r) => {
        if (r.empId !== null) matchedEmpIds.add(r.empId);
        if (r.deptId !== null) matchedDeptIds.add(r.deptId);
      });
      const isCross = step.joinType === 'cross';

      return (
        <div className="rounded-xl border border-orange-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-orange-800">JOIN 시각화 — 원본 → 결과</h3>
            <span className="text-[10px] text-slate-500">강조: 결과에 포함된 행</span>
          </div>

          <VennLite joinType={step.joinType} />

          <div className="mt-3 flex gap-3">
            <SourceTable
              title="employees (왼쪽)"
              rows={EMP}
              kind="emp"
              matchedIds={matchedEmpIds}
              allMatched={isCross}
            />
            <SourceTable
              title="departments (오른쪽)"
              rows={DEPT}
              kind="dept"
              matchedIds={matchedDeptIds}
              allMatched={isCross}
            />
          </div>

          <div className="mt-3 text-center text-xs font-bold text-orange-600 py-1.5 border-y border-dashed border-orange-300">
            ↓ {step.rule} ↓
          </div>

          <div className="mt-3">
            <ResultTable rows={step.result} joinType={step.joinType} />
          </div>

          <div className="mt-3 text-xs text-orange-900 bg-orange-50 border border-orange-200 rounded p-2">
            💡 {step.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer — 5개 SQL 탭, highlight.js
    // ─────────────────────────────────────────────────────
    function CodeViewer({ steps, stepIdx, onSelectTab }) {
      const code = steps[stepIdx].code;
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">JOIN 패턴 5종</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>

          {/* 탭 (5개 SQL 파일) */}
          <div className="flex bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {steps.map((s, i) => (
              <button
                key={i}
                onClick={() => onSelectTab(i)}
                className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                  i === stepIdx
                    ? 'bg-[#282c34] text-orange-300 border-t-2 border-t-orange-500'
                    : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'
                }`}
              >
                {s.code.filename}
              </button>
            ))}
          </div>

          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-orange-500/15 border-l-2 border-orange-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>

          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {steps.length}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 키보드 좌/우
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 3000ms 자동 재생
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-orange-600 text-white font-bold">IV</span>
              <div>
                <h1 className="text-2xl font-bold text-orange-900">Chapter IV-2-1. JOIN 완전 정복</h1>
                <p className="text-sm text-orange-800/80">INNER · LEFT · RIGHT · FULL OUTER · CROSS — 5가지 JOIN을 결과 행으로 비교</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-orange-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-orange-600' : 'bg-orange-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-orange-700 text-orange-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-orange-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane step={step} />
              <CodeViewer steps={STEPS} stepIdx={stepIdx} onSelectTab={(i) => { setStepIdx(i); setPlaying(false); }} />
            </div>

            {/* 컨트롤 (4버튼) */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-orange-700 text-white' : 'bg-orange-600 text-white hover:bg-orange-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-orange-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계 · 우측 탭 클릭으로 직접 이동</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-orange-400 bg-white px-4 py-3 text-sm text-orange-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                INNER(교집합) · LEFT(왼쪽 기준) · RIGHT(오른쪽 기준) · FULL(합집합) · CROSS(N×M).
                실무에서 가장 많이 쓰는 건 INNER 와 LEFT. RIGHT 는 LEFT 로 바꿔 쓰는 게 가독성에 좋다.
                FULL 은 정합성 점검에 강력. CROSS 는 의도적으로만 쓴다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['INNER JOIN', 'LEFT JOIN', 'RIGHT JOIN', 'FULL OUTER JOIN', 'CROSS JOIN', 'ON', 'NULL', '카티시안 곱'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-orange-100 text-orange-800 border border-orange-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-orange-700">
              <a href="./index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <span className="text-orange-700/60">다음: IV-2-2 서브쿼리 / 윈도우 함수 →</span>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
