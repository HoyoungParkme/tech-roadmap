<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — IV-2-1. JOIN 완전 정복</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    PostgreSQL Chapter IV-2-1 — JOIN 완전 정복
    학습 목표: INNER/LEFT/RIGHT JOIN 차이를 설명하고 올바른 상황에 적용할 수 있다.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const EMP = [{id:1,name:'김철수',dept:1},{id:2,name:'이영희',dept:1},{id:3,name:'박민준',dept:2},{id:4,name:'정수연',dept:null}];
    const DEPT = [{id:1,name:'개발팀'},{id:2,name:'마케팅팀'},{id:3,name:'디자인팀'}];

    const STEPS = [
      { label: '두 테이블', desc: '[Step 1: 두 테이블] employees(직원)와 departments(부서) 테이블이 있다. 정수연은 부서 미배정(NULL), 디자인팀에는 직원이 없다.',
        joinType: null, result: null },
      { label: 'INNER JOIN', desc: '[Step 2: INNER JOIN] 양쪽 모두 일치하는 행만 반환. 부서 미배정 정수연과 직원 없는 디자인팀은 결과에 나오지 않는다.',
        joinType: 'inner', result: [{emp:'김철수',dept:'개발팀'},{emp:'이영희',dept:'개발팀'},{emp:'박민준',dept:'마케팅팀'}] },
      { label: 'LEFT JOIN', desc: '[Step 3: LEFT JOIN] 왼쪽(employees) 테이블의 행을 모두 유지. 부서 미배정 정수연도 결과에 포함되고 부서명은 NULL이 된다.',
        joinType: 'left', result: [{emp:'김철수',dept:'개발팀'},{emp:'이영희',dept:'개발팀'},{emp:'박민준',dept:'마케팅팀'},{emp:'정수연',dept:'NULL',isNull:true}] },
      { label: 'RIGHT JOIN', desc: '[Step 4: RIGHT JOIN] 오른쪽(departments) 테이블의 행을 모두 유지. 직원이 없는 디자인팀도 결과에 포함되고 직원명은 NULL이 된다.',
        joinType: 'right', result: [{emp:'김철수',dept:'개발팀'},{emp:'이영희',dept:'개발팀'},{emp:'박민준',dept:'마케팅팀'},{emp:'NULL',dept:'디자인팀',isNull:true}] },
      { label: 'FULL OUTER', desc: '[Step 5: FULL OUTER JOIN] 양쪽 모두 유지. 정수연(부서 없음)과 디자인팀(직원 없음) 모두 결과에 포함된다.',
        joinType: 'full', result: [{emp:'김철수',dept:'개발팀'},{emp:'이영희',dept:'개발팀'},{emp:'박민준',dept:'마케팅팀'},{emp:'정수연',dept:'NULL',isNull:true},{emp:'NULL',dept:'디자인팀',isNull:true}] }
    ];

    function VennDiagram({ joinType }) {
      return (
        <svg viewBox="0 0 200 120" className="w-full max-w-xs mx-auto">
          <circle cx="75" cy="60" r="45" className={`${joinType==='left'||joinType==='full'?'fill-blue-200':'fill-slate-100'} stroke-slate-400`} strokeWidth="1.5"/>
          <circle cx="125" cy="60" r="45" className={`${joinType==='right'||joinType==='full'?'fill-emerald-200':'fill-slate-100'} stroke-slate-400`} strokeWidth="1.5"/>
          {(joinType==='inner'||joinType==='left'||joinType==='right'||joinType==='full') && (
            <clipPath id="clip-left"><circle cx="75" cy="60" r="45"/></clipPath>
          )}
          {(joinType==='inner'||joinType==='left'||joinType==='right'||joinType==='full') && (
            <circle cx="125" cy="60" r="45" clipPath="url(#clip-left)" className={joinType==='inner'?'fill-violet-300':joinType==='left'?'fill-blue-300':joinType==='right'?'fill-emerald-300':'fill-violet-300'}/>
          )}
          <text x="55" y="65" className="text-[9px] fill-slate-600 font-bold">EMP</text>
          <text x="130" y="65" className="text-[9px] fill-slate-600 font-bold">DEPT</text>
          {joinType && <text x="100" y="110" textAnchor="middle" className="text-[10px] fill-slate-500 font-bold">{joinType.toUpperCase()} JOIN</text>}
        </svg>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">IV-2-1. JOIN 완전 정복</h1>
              </div>
              <p className="text-slate-600">INNER, LEFT, RIGHT, FULL OUTER JOIN의 차이를 <b>벤 다이어그램</b>과 <b>결과 테이블</b>로 직관적으로 이해합니다.</p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 min-h-[110px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[400px] flex flex-col">
                  <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">시각화</div>

                  {/* 원본 테이블 */}
                  {currentStepIdx === 0 && (
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <div className="text-xs font-bold text-blue-600 mb-2">employees</div>
                        <table className="w-full text-xs"><thead><tr className="bg-blue-700 text-white"><th className="p-1.5">id</th><th className="p-1.5">name</th><th className="p-1.5">dept_id</th></tr></thead>
                          <tbody>{EMP.map(e=>(<tr key={e.id} className="border-t"><td className="p-1.5 text-center">{e.id}</td><td className="p-1.5">{e.name}</td><td className={`p-1.5 text-center ${e.dept===null?'text-red-400 italic':'text-slate-700'}`}>{e.dept===null?'NULL':e.dept}</td></tr>))}</tbody>
                        </table>
                      </div>
                      <div>
                        <div className="text-xs font-bold text-emerald-600 mb-2">departments</div>
                        <table className="w-full text-xs"><thead><tr className="bg-emerald-700 text-white"><th className="p-1.5">id</th><th className="p-1.5">name</th></tr></thead>
                          <tbody>{DEPT.map(d=>(<tr key={d.id} className="border-t"><td className="p-1.5 text-center">{d.id}</td><td className="p-1.5">{d.name}</td></tr>))}</tbody>
                        </table>
                      </div>
                    </div>
                  )}

                  {/* JOIN 결과 */}
                  {stepData.result && (
                    <div className="space-y-4">
                      <VennDiagram joinType={stepData.joinType} />
                      <div className="overflow-x-auto">
                        <table className="w-full text-sm">
                          <thead><tr className="bg-slate-700 text-white"><th className="p-2 text-left">직원</th><th className="p-2 text-left">부서</th></tr></thead>
                          <tbody>{stepData.result.map((r,i)=>(
                            <tr key={i} className={`border-t ${r.isNull?'bg-amber-50':'bg-white'}`}>
                              <td className={`p-2 font-mono ${r.emp==='NULL'?'text-red-400 italic':'text-slate-700'}`}>{r.emp}</td>
                              <td className={`p-2 font-mono ${r.dept==='NULL'?'text-red-400 italic':'text-slate-700'}`}>{r.dept}</td>
                            </tr>
                          ))}</tbody>
                        </table>
                      </div>
                    </div>
                  )}
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button aria-label={isPlaying?'자동 재생 정지':'자동 재생 시작'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                    </button>
                    <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex gap-1">{STEPS.map((s,i)=>(<button key={i} aria-label={`Step ${i+1}: ${s.label}`} onClick={()=>{setCurrentStepIdx(i);setIsPlaying(false);}} className={`w-2.5 h-2.5 rounded-full transition-all ${i===currentStepIdx?'bg-blue-600 scale-125':i<currentStepIdx?'bg-blue-300':'bg-slate-200'}`}/>))}</div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">{currentStepIdx+1} / {STEPS.length}</div>
                  </div>
                </div>
              </div>

              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-white flex flex-col">
                  <div className="flex items-center px-4 py-3 bg-slate-100 border-b border-slate-200 gap-2">
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-500 font-semibold">JOIN 레퍼런스</span>
                  </div>
                  <div className="p-6 overflow-y-auto flex-1 space-y-4">
                    {[
                      {t:'INNER JOIN',d:'양쪽 모두 일치하는 행만 반환.',a:currentStepIdx===1},
                      {t:'LEFT JOIN',d:'왼쪽 테이블 모든 행 유지. 오른쪽 없으면 NULL.',a:currentStepIdx===2},
                      {t:'RIGHT JOIN',d:'오른쪽 테이블 모든 행 유지. 왼쪽 없으면 NULL.',a:currentStepIdx===3},
                      {t:'FULL OUTER JOIN',d:'양쪽 모두 유지. 어느 쪽이든 없으면 NULL.',a:currentStepIdx===4},
                      {t:'ON 절',d:'JOIN 조건 지정. e.dept_id = d.id 처럼 연결 키를 명시.',a:currentStepIdx===0},
                      {t:'NULL',d:'일치하는 행이 없을 때 채워지는 값. "비어있음"을 의미.',a:currentStepIdx>=2}
                    ].map((item,i)=>(
                      <div key={i} className={`p-3 rounded-lg border-2 transition-all duration-500 ${item.a?'border-blue-400 bg-blue-50 scale-[1.02]':'border-slate-200 bg-slate-50'}`}>
                        <div className={`text-xs font-bold mb-1 ${item.a?'text-blue-600':'text-slate-400'}`}>{item.t}</div>
                        <div className="text-sm text-slate-700">{item.d}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
