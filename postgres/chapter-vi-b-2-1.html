    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — orange 톤
    // ─────────────────────────────────────────────────────
    function DocCard({ doc, query }) {
      // 매칭 상태에 따라 카드 스타일 결정
      const matched = doc.matched;
      const bg     = matched ? 'bg-orange-50'   : 'bg-slate-100';
      const border = matched ? 'border-orange-300' : 'border-slate-300';
      const text   = matched ? 'text-orange-900'   : 'text-slate-500';

      // 본문에서 검색어 하이라이트
      const highlighted = (() => {
        if (!query) return doc.text;
        const parts = doc.text.split(query);
        if (parts.length === 1) return doc.text;
        return parts.map((p, i) => (
          <React.Fragment key={i}>
            {p}
            {i < parts.length - 1 && (
              <span className="bg-orange-300 text-orange-900 font-bold px-0.5 rounded">{query}</span>
            )}
          </React.Fragment>
        ));
      })();

      return (
        <div className={`rounded-lg border ${bg} ${border} px-3 py-2`}>
          <div className="flex items-start justify-between gap-2">
            <div className="flex items-center gap-2 flex-1">
              <span className={`text-xs font-bold ${text} w-6`}>#{doc.id}</span>
              <span className={`text-sm ${text}`}>{highlighted}</span>
            </div>
            {typeof doc.rank === 'number' && (
              <span className="text-[10px] px-2 py-0.5 rounded bg-orange-200 text-orange-800 font-mono">
                {doc.rank.toFixed(2)}
              </span>
            )}
            {!('rank' in doc) && (
              <span className={`text-[10px] px-2 py-0.5 rounded ${matched ? 'bg-orange-200 text-orange-800' : 'bg-slate-200 text-slate-600'}`}>
                {matched ? '매칭' : '제외'}
              </span>
            )}
          </div>
          {doc.tokens && (
            <div className="mt-1.5 flex flex-wrap gap-1">
              {doc.tokens.map((t, i) => (
                <span key={i} className="text-[10px] px-1.5 py-0.5 rounded bg-amber-100 text-amber-800 font-mono border border-amber-200">
                  {t}
                </span>
              ))}
            </div>
          )}
          {doc.note && (
            <div className={`mt-1 text-[10px] ${matched ? 'text-orange-700' : 'text-slate-500'}`}>
              ↳ {doc.note}
            </div>
          )}
        </div>
      );
    }

    function TokenBox({ box }) {
      if (!box) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-orange-300 bg-orange-50 p-3">
          <div className="text-xs font-bold text-orange-800 mb-1.5">🔧 {box.title}</div>
          <div className="text-[11px] font-mono text-slate-700 mb-1">
            <span className="text-slate-500">입력:</span> {box.example}
          </div>
          <div className="text-[11px] font-mono text-orange-900">
            <span className="text-slate-500">출력:</span> {box.result}
          </div>
        </div>
      );
    }

    function ResultBox({ result }) {
      if (!result) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-orange-400 bg-white p-3">
          <div className="text-xs font-bold text-orange-800 mb-2">✓ {result.title}</div>
          <ol className="space-y-1">
            {result.rows.map((r, i) => (
              <li key={r.id} className="text-sm text-orange-900 flex items-center gap-2">
                <span className="text-orange-500 font-bold w-5">{i + 1}.</span>
                <span className="flex-1 truncate">#{r.id} {r.body}</span>
                {typeof r.score === 'number' && (
                  <span className="text-[10px] px-2 py-0.5 rounded bg-orange-100 text-orange-800 font-mono">
                    {r.score.toFixed(2)}
                  </span>
                )}
              </li>
            ))}
          </ol>
        </div>
      );
    }

    function IndexBox({ box }) {
      if (!box) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-orange-500 bg-gradient-to-br from-orange-50 to-amber-50 p-4">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl">🐘</span>
            <span className="text-lg font-bold text-orange-800">{box.title}</span>
          </div>
          <ul className="space-y-1.5">
            {box.features.map((f, i) => (
              <li key={i} className="text-sm text-orange-900 flex gap-2">
                <span className="text-orange-500 mt-0.5">✓</span>
                <span>{f}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-orange-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-orange-800">풀텍스트 검색 시뮬레이션</h3>
            <span className="text-[10px] text-slate-500">검색어: <span className="font-mono text-orange-700">{state.query}</span></span>
          </div>
          <div className="space-y-2">
            {state.docs.map((d) => (
              <DocCard key={d.id} doc={d} query={state.query} />
            ))}
          </div>
          {state.arrow && (
            <div className="mt-3 text-center text-xs font-bold text-orange-600 py-2 border-y border-dashed border-orange-300">
              ↓ {state.arrow} ↓
            </div>
          )}
          <TokenBox box={state.tokenBox} />
          <ResultBox result={state.result} />
          <IndexBox box={state.indexBox} />
          <div className="mt-3 text-xs text-orange-900 bg-orange-50 border border-orange-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js, 5탭)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ steps, stepIdx, setStepIdx }) {
      const code = steps[stepIdx].code;
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 탭 바 */}
          <div className="flex items-center bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {steps.map((s, i) => {
              const active = i === stepIdx;
              return (
                <button
                  key={i}
                  onClick={() => setStepIdx(i)}
                  className={`px-3 py-2 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                    active
                      ? 'bg-[#282c34] text-orange-300 border-b-2 border-b-orange-400'
                      : 'bg-slate-900 text-slate-400 hover:text-slate-200'
                  }`}
                >
                  {s.code.filename}
                </button>
              );
            })}
          </div>
          {/* 파일 헤더 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          {/* 코드 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-orange-500/15 border-l-2 border-orange-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          {/* 푸터 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {steps.length}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 키보드 단축키
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동 재생
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-orange-600 text-white font-bold">VI</span>
              <div>
                <h1 className="text-2xl font-bold text-orange-900">Chapter VI-B-2-1. Full Text Search</h1>
                <p className="text-sm text-orange-800/80">LIKE의 한계 → tsvector → tsquery + @@ → ts_rank → GIN + mecab</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-orange-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-orange-600' : 'bg-orange-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-orange-700 text-orange-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-orange-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer steps={STEPS} stepIdx={stepIdx} setStepIdx={setStepIdx} />
            </div>

            {/* 컨트롤 4버튼 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-orange-700 text-white' : 'bg-orange-600 text-white hover:bg-orange-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-orange-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계 · 탭 클릭으로 코드 이동</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-orange-400 bg-white px-4 py-3 text-sm text-orange-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                LIKE '%word%'는 검색이 아니라 부분 문자열 매칭이다. tsvector로 토큰화하고, @@ 연산자로 매칭하고, ts_rank로 정렬하고, GIN 인덱스 + mecab으로 한국어까지 받쳐주면 PostgreSQL 한 엔진으로 미니 검색 시스템이 완성된다. 더 큰 규모/유사도가 필요하면 pg_trgm, pgroonga, Elasticsearch로 확장한다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Full Text Search', 'tsvector', 'tsquery', '@@', 'ts_rank', 'GIN', 'mecab', 'pg_trgm'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-orange-100 text-orange-800 border border-orange-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
