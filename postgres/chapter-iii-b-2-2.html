<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — Chapter III-B-2-2. 제약 조건 완전 가이드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    PostgreSQL Chapter III-B-2-2 — 제약 조건 완전 가이드
    학습 목표: NOT NULL, DEFAULT, CHECK, UNIQUE, EXCLUSION 제약 조건이
              잘못된 데이터를 어떻게 막는지 시각적으로 체험한다.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        label: "제약 조건이란",
        desc: "[Step 1] 제약 조건(constraint)은 잘못된 데이터가 테이블에 들어오는 것을 막는 방어선입니다. 애플리케이션 코드에서 검증해도, 직접 SQL을 실행하면 우회할 수 있습니다. 데이터베이스 레벨 방어가 필요한 이유입니다.",
        phase: "intro"
      },
      {
        label: "NOT NULL",
        desc: "[Step 2] NOT NULL은 빈 값을 금지합니다. 이름이 NULL인 사용자를 등록하려고 하면 INSERT가 거부됩니다. '반드시 값이 있어야 하는' 열에 사용합니다.",
        phase: "notnull",
        constraint: "NOT NULL"
      },
      {
        label: "DEFAULT",
        desc: "[Step 3] DEFAULT는 값을 넣지 않았을 때 자동으로 채워지는 기본값입니다. created_at TIMESTAMPTZ DEFAULT NOW()는 INSERT 시 현재 시각을 자동으로 넣어줍니다.",
        phase: "default",
        constraint: "DEFAULT"
      },
      {
        label: "CHECK",
        desc: "[Step 4] CHECK는 조건식이 참인 경우에만 INSERT/UPDATE를 허용합니다. CHECK (age >= 0)은 나이가 음수인 데이터를 거부합니다. 비즈니스 규칙을 데이터베이스에서 강제합니다.",
        phase: "check",
        constraint: "CHECK"
      },
      {
        label: "UNIQUE",
        desc: "[Step 5] UNIQUE는 같은 값이 두 번 들어가는 것을 막습니다. email UNIQUE로 선언하면 같은 이메일로 두 번 가입할 수 없습니다. 기본키(PRIMARY KEY)는 NOT NULL + UNIQUE의 조합입니다.",
        phase: "unique",
        constraint: "UNIQUE"
      },
      {
        label: "제약 조건 이름 붙이기",
        desc: "[Step 6] 제약 조건에 이름을 붙이면(CONSTRAINT chk_age CHECK (age >= 0)) 에러 메시지가 명확해지고, ALTER TABLE로 수정/삭제하기 쉬워집니다. 실무에서는 반드시 이름을 붙이는 것을 권장합니다.",
        phase: "naming"
      }
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const phase = stepData.phase;

      const InsertAttempt = ({ sql, result, success }) => (
        <div className="space-y-2">
          <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
            <div className="text-slate-400">-- INSERT 시도</div>
            <div>{sql}</div>
          </div>
          <div className={`p-3 rounded-lg border-2 text-center font-bold ${success ? 'border-green-400 bg-green-50 text-green-700' : 'border-red-400 bg-red-50 text-red-700'}`}>
            {success ? 'SUCCESS' : 'ERROR'}: {result}
          </div>
        </div>
      );

      const renderViz = () => {
        if (phase === 'intro') {
          const constraints = [
            { name: 'NOT NULL', desc: '빈 값 금지', icon: '&#128683;', color: 'red' },
            { name: 'DEFAULT', desc: '기본값 자동 채우기', icon: '&#9881;', color: 'blue' },
            { name: 'CHECK', desc: '조건 검사', icon: '&#9989;', color: 'green' },
            { name: 'UNIQUE', desc: '중복 방지', icon: '&#128275;', color: 'purple' },
            { name: 'EXCLUSION', desc: '범위 겹침 방지', icon: '&#128721;', color: 'amber' }
          ];
          return (
            <div className="space-y-4">
              <div className="text-center text-sm text-slate-600 mb-2">데이터베이스 레벨 방어선 5가지</div>
              <div className="grid grid-cols-5 gap-2">
                {constraints.map((c, i) => (
                  <div key={i} className={`p-3 rounded-lg border-2 border-${c.color}-300 bg-${c.color}-50 text-center`}>
                    <div className="text-2xl mb-1" dangerouslySetInnerHTML={{__html: c.icon}} />
                    <div className={`text-xs font-bold text-${c.color}-700`}>{c.name}</div>
                    <div className="text-xs text-slate-500 mt-1">{c.desc}</div>
                  </div>
                ))}
              </div>
              <div className="bg-slate-100 p-3 rounded-lg text-center text-sm text-slate-600">
                애플리케이션 코드의 유효성 검사 + 데이터베이스 제약 조건 = <b>이중 방어</b>
              </div>
            </div>
          );
        }

        if (phase === 'notnull') {
          return (
            <div className="space-y-4">
              <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
                <div className="text-slate-400">-- 테이블 정의</div>
                <div>CREATE TABLE users (</div>
                <div>  name TEXT <span className="text-red-300 font-bold">NOT NULL</span>,</div>
                <div>  email TEXT</div>
                <div>);</div>
              </div>
              <div className="grid grid-cols-2 gap-4">
                <InsertAttempt
                  sql="INSERT INTO users (name, email) VALUES ('김민준', 'kim@ex.com');"
                  result="1 row inserted"
                  success={true} />
                <InsertAttempt
                  sql="INSERT INTO users (name, email) VALUES (NULL, 'anon@ex.com');"
                  result="null value in column 'name' violates not-null constraint"
                  success={false} />
              </div>
            </div>
          );
        }

        if (phase === 'default') {
          return (
            <div className="space-y-4">
              <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
                <div className="text-slate-400">-- DEFAULT: 값을 넣지 않으면 자동 채움</div>
                <div>CREATE TABLE posts (</div>
                <div>  title TEXT NOT NULL,</div>
                <div>  status TEXT <span className="text-blue-300 font-bold">DEFAULT 'draft'</span>,</div>
                <div>  created_at TIMESTAMPTZ <span className="text-blue-300 font-bold">DEFAULT NOW()</span></div>
                <div>);</div>
              </div>
              <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
                <div className="text-slate-400">-- status와 created_at을 생략하고 INSERT</div>
                <div>INSERT INTO posts (title) VALUES ('첫 번째 글');</div>
              </div>
              <div className="bg-blue-50 border-2 border-blue-400 p-4 rounded-lg">
                <div className="text-xs text-blue-600 mb-2 font-bold">자동으로 채워진 결과:</div>
                <table className="w-full text-sm">
                  <thead><tr className="border-b border-blue-200">
                    <th className="text-left py-1 text-blue-700">title</th>
                    <th className="text-left py-1 text-blue-700">status</th>
                    <th className="text-left py-1 text-blue-700">created_at</th>
                  </tr></thead>
                  <tbody><tr>
                    <td className="py-1 font-mono">첫 번째 글</td>
                    <td className="py-1 font-mono font-bold text-blue-600">draft</td>
                    <td className="py-1 font-mono font-bold text-blue-600">2026-04-21 14:30:00+09</td>
                  </tr></tbody>
                </table>
              </div>
            </div>
          );
        }

        if (phase === 'check') {
          return (
            <div className="space-y-4">
              <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
                <div className="text-slate-400">-- CHECK: 조건을 만족해야만 허용</div>
                <div>CREATE TABLE employees (</div>
                <div>  name TEXT NOT NULL,</div>
                <div>  age INTEGER <span className="text-green-400 font-bold">CHECK (age >= 0 AND age {'<='} 150)</span>,</div>
                <div>  salary NUMERIC(12,2) <span className="text-green-400 font-bold">CHECK (salary > 0)</span></div>
                <div>);</div>
              </div>
              <div className="grid grid-cols-2 gap-4">
                <InsertAttempt
                  sql="INSERT INTO employees VALUES ('이서연', 29, 5000000);"
                  result="1 row inserted"
                  success={true} />
                <InsertAttempt
                  sql="INSERT INTO employees VALUES ('박도윤', -5, 3000000);"
                  result="new row violates check constraint 'employees_age_check'"
                  success={false} />
              </div>
            </div>
          );
        }

        if (phase === 'unique') {
          return (
            <div className="space-y-4">
              <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
                <div className="text-slate-400">-- UNIQUE: 중복 값 금지</div>
                <div>CREATE TABLE users (</div>
                <div>  id BIGINT PRIMARY KEY,</div>
                <div>  email TEXT <span className="text-purple-300 font-bold">UNIQUE</span> NOT NULL</div>
                <div>);</div>
              </div>
              <div className="space-y-3">
                <InsertAttempt
                  sql="INSERT INTO users VALUES (1, 'kim@example.com');"
                  result="1 row inserted"
                  success={true} />
                <InsertAttempt
                  sql="INSERT INTO users VALUES (2, 'kim@example.com');"
                  result="duplicate key value violates unique constraint 'users_email_key'"
                  success={false} />
              </div>
              <div className="bg-purple-50 border border-purple-300 p-3 rounded-lg text-center text-sm text-purple-700">
                PRIMARY KEY = NOT NULL + UNIQUE 조합
              </div>
            </div>
          );
        }

        if (phase === 'naming') {
          return (
            <div className="space-y-4">
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <div className="text-xs font-bold text-red-600 mb-2">이름 없는 제약 (나쁜 예)</div>
                  <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-xs">
                    <div>CHECK (age >= 0)</div>
                    <div className="mt-2 text-red-300">ERROR: "employees_age_check1"</div>
                    <div className="text-slate-400">-- 자동 이름이라 의미 파악 어려움</div>
                  </div>
                </div>
                <div>
                  <div className="text-xs font-bold text-green-600 mb-2">이름 있는 제약 (좋은 예)</div>
                  <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-xs">
                    <div><span className="text-green-400">CONSTRAINT</span> chk_emp_age CHECK (age >= 0)</div>
                    <div className="mt-2 text-red-300">ERROR: "chk_emp_age"</div>
                    <div className="text-slate-400">-- 즉시 원인 파악 가능</div>
                  </div>
                </div>
              </div>
              <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
                <div className="text-slate-400">-- 제약 조건 관리</div>
                <div>ALTER TABLE employees <span className="text-amber-300">ADD CONSTRAINT</span> chk_salary CHECK (salary > 0);</div>
                <div>ALTER TABLE employees <span className="text-red-300">DROP CONSTRAINT</span> chk_salary;</div>
              </div>
              <div className="bg-green-50 border border-green-300 p-3 rounded-lg text-center text-sm text-green-700">
                제약 조건에는 항상 의미 있는 이름을 붙인다 (chk_, uq_, pk_, fk_ 접두사 권장)
              </div>
            </div>
          );
        }

        return null;
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">III-B-2-2. 제약 조건 완전 가이드</h1>
              </div>
              <p className="text-slate-600">
                <b>NOT NULL</b>, <b>CHECK</b>, <b>UNIQUE</b> 등 제약 조건이 잘못된 데이터를 어떻게 막는지
                INSERT 시도와 에러를 직접 체험합니다.
              </p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm min-h-[100px]">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[380px] flex flex-col justify-center">
              {renderViz()}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between">
                <button onClick={handlePrev} disabled={currentStepIdx === 0}
                  className="px-5 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg font-medium disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
                  이전
                </button>
                <div className="flex items-center gap-4">
                  <button onClick={togglePlay}
                    className={`px-5 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-blue-600 hover:bg-blue-700 text-white'}`}>
                    {isPlaying ? '일시 정지' : (isEnd ? '처음부터' : '자동 실행')}
                  </button>
                  <div className="flex gap-1">
                    {STEPS.map((_, i) => (
                      <button key={i} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                        className={`w-3 h-3 rounded-full transition-colors ${i === currentStepIdx ? 'bg-blue-600' : (i < currentStepIdx ? 'bg-blue-300' : 'bg-slate-200')}`} />
                    ))}
                  </div>
                  <span className="text-xs text-slate-400 font-mono">{currentStepIdx + 1}/{STEPS.length}</span>
                </div>
                <button onClick={handleNext} disabled={isEnd}
                  className="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
                  다음
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
