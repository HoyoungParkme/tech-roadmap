<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — IV-2-2. GROUP BY와 집계 함수</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <!--
    PostgreSQL Chapter IV-2-2 — GROUP BY와 집계 함수
    학습 목표: COUNT, SUM, AVG와 GROUP BY, HAVING을 올바르게 사용할 수 있다.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const ORDERS = [
      {id:1,emp:'김철수',amount:10000,status:'completed'},
      {id:2,emp:'김철수',amount:25000,status:'completed'},
      {id:3,emp:'이영희',amount:15000,status:'cancelled'},
      {id:4,emp:'박민준',amount:30000,status:'completed'},
      {id:5,emp:'박민준',amount:20000,status:'completed'},
      {id:6,emp:'박민준',amount:5000,status:'cancelled'}
    ];

    const STEPS = [
      { label: '원본 데이터', desc: '[Step 1: orders 테이블] 6건의 주문 데이터. 직원별로 주문 건수와 금액이 다르고 status도 다양하다.',
        sql: 'SELECT * FROM orders;', groupBy: false, result: ORDERS.map(o => ({...o, highlight: false})) },
      { label: 'GROUP BY + COUNT', desc: '[Step 2: 직원별 주문 건수] GROUP BY employee_name으로 직원별로 묶고 COUNT(*)로 건수를 센다. 김철수 2건, 이영희 1건, 박민준 3건.',
        sql: "SELECT employee_name, COUNT(*)\nFROM orders\nGROUP BY employee_name;",
        groupBy: true, result: [{emp:'김철수',val:'2'},{emp:'이영희',val:'1'},{emp:'박민준',val:'3'}], header: ['직원','COUNT(*)'] },
      { label: '다중 집계', desc: '[Step 3: 여러 집계 함수 동시 사용] COUNT, SUM, AVG를 한 번에 계산한다. 직원별 주문 건수, 총액, 평균을 한눈에 볼 수 있다.',
        sql: "SELECT employee_name,\n  COUNT(*), SUM(amount), AVG(amount)\nFROM orders\nGROUP BY employee_name;",
        groupBy: true, result: [{emp:'김철수',val:'2 / 35,000 / 17,500'},{emp:'이영희',val:'1 / 15,000 / 15,000'},{emp:'박민준',val:'3 / 55,000 / 18,333'}], header: ['직원','COUNT / SUM / AVG'] },
      { label: 'WHERE 필터', desc: '[Step 4: WHERE — 그룹 전 필터링] WHERE status = \'completed\'를 먼저 적용해 취소 주문을 제외한 뒤 GROUP BY한다. 이영희는 완료 주문이 없어 결과에서 사라진다.',
        sql: "SELECT employee_name, COUNT(*)\nFROM orders\nWHERE status = 'completed'\nGROUP BY employee_name;",
        groupBy: true, result: [{emp:'김철수',val:'2'},{emp:'박민준',val:'2'}], header: ['직원','COUNT(*)'], filterNote: 'WHERE: 그룹 전 필터 (행 단위)' },
      { label: 'HAVING 필터', desc: '[Step 5: HAVING — 그룹 후 필터링] HAVING COUNT(*) >= 2로 주문 2건 이상인 직원만 남긴다. WHERE는 행을 필터링하고, HAVING은 그룹 결과를 필터링한다.',
        sql: "SELECT employee_name, COUNT(*)\nFROM orders\nWHERE status = 'completed'\nGROUP BY employee_name\nHAVING COUNT(*) >= 2;",
        groupBy: true, result: [{emp:'김철수',val:'2'},{emp:'박민준',val:'2'}], header: ['직원','COUNT(*)'], filterNote: 'HAVING: 그룹 후 필터 (집계 결과)' },
      { label: '실행 순서', desc: '[Step 6: SQL 실행 순서] WHERE → GROUP BY → HAVING → SELECT 순서로 실행된다. WHERE가 먼저 행을 걸러내고, GROUP BY가 묶고, HAVING이 그룹을 걸러내고, SELECT가 결과를 뽑는다.',
        sql: null, groupBy: false, result: null }
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4500); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">IV-2-2. GROUP BY와 집계 함수</h1>
              </div>
              <p className="text-slate-600"><b>GROUP BY</b>로 묶고, <b>집계 함수</b>(COUNT/SUM/AVG)로 계산하고, <b>HAVING</b>으로 그룹을 걸러냅니다.</p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 min-h-[110px] flex flex-col justify-center">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[400px] flex flex-col">
                  <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">
                    {stepData.sql ? 'SQL + 결과' : '실행 순서'}
                  </div>

                  {stepData.sql && (
                    <div className="bg-slate-800 rounded-lg p-3 font-mono text-sm text-slate-200 mb-4 whitespace-pre-wrap">{stepData.sql}</div>
                  )}

                  {/* 원본 테이블 */}
                  {currentStepIdx === 0 && (
                    <div className="overflow-x-auto">
                      <table className="w-full text-xs">
                        <thead><tr className="bg-slate-700 text-white"><th className="p-2">id</th><th className="p-2">employee</th><th className="p-2">amount</th><th className="p-2">status</th></tr></thead>
                        <tbody>{ORDERS.map(o=>(
                          <tr key={o.id} className="border-t"><td className="p-2 text-center">{o.id}</td><td className="p-2">{o.emp}</td><td className="p-2 text-right">{o.amount.toLocaleString()}</td><td className={`p-2 ${o.status==='cancelled'?'text-red-500':'text-emerald-600'}`}>{o.status}</td></tr>
                        ))}</tbody>
                      </table>
                    </div>
                  )}

                  {/* GROUP BY 결과 */}
                  {stepData.groupBy && stepData.result && (
                    <div className="space-y-3">
                      {stepData.filterNote && (
                        <div className="p-2 bg-amber-50 border border-amber-200 rounded text-xs text-amber-700 font-medium">{stepData.filterNote}</div>
                      )}
                      <table className="w-full text-sm">
                        <thead><tr className="bg-slate-700 text-white">{stepData.header.map((h,i)=>(<th key={i} className="p-2 text-left">{h}</th>))}</tr></thead>
                        <tbody>{stepData.result.map((r,i)=>(
                          <tr key={i} className="border-t bg-white"><td className="p-2 font-mono">{r.emp}</td><td className="p-2 font-mono">{r.val}</td></tr>
                        ))}</tbody>
                      </table>
                    </div>
                  )}

                  {/* 실행 순서 */}
                  {currentStepIdx === 5 && (
                    <div className="space-y-3">
                      {['① WHERE — 행을 먼저 걸러냄','② GROUP BY — 남은 행을 그룹으로 묶음','③ HAVING — 그룹 결과를 걸러냄','④ SELECT — 결과 열 추출'].map((step,i)=>(
                        <div key={i} className={`p-3 rounded-lg border-2 flex items-center gap-3 ${i<2?'border-blue-300 bg-blue-50':'border-violet-300 bg-violet-50'}`}>
                          <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-white flex-shrink-0 ${i<2?'bg-blue-600':'bg-violet-600'}`}>{i+1}</div>
                          <span className="text-sm font-medium text-slate-700">{step}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button aria-label={isPlaying?'자동 재생 정지':'자동 재생 시작'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying?(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>):(<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                    </button>
                    <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex gap-1">{STEPS.map((s,i)=>(<button key={i} aria-label={`Step ${i+1}: ${s.label}`} onClick={()=>{setCurrentStepIdx(i);setIsPlaying(false);}} className={`w-2.5 h-2.5 rounded-full transition-all ${i===currentStepIdx?'bg-blue-600 scale-125':i<currentStepIdx?'bg-blue-300':'bg-slate-200'}`}/>))}</div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">{currentStepIdx+1} / {STEPS.length}</div>
                  </div>
                </div>
              </div>

              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-white flex flex-col">
                  <div className="flex items-center px-4 py-3 bg-slate-100 border-b border-slate-200 gap-2">
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-500 font-semibold">핵심 개념</span>
                  </div>
                  <div className="p-6 overflow-y-auto flex-1 space-y-4">
                    {[
                      {t:'GROUP BY',d:'동일 값을 가진 행끼리 묶는다. 집계 함수와 함께 사용.',a:currentStepIdx>=1&&currentStepIdx<=3},
                      {t:'COUNT / SUM / AVG',d:'행 수, 합계, 평균. MIN/MAX도 있다.',a:currentStepIdx===1||currentStepIdx===2},
                      {t:'WHERE',d:'그룹 전에 행을 필터링한다. 집계 함수 사용 불가.',a:currentStepIdx===3},
                      {t:'HAVING',d:'그룹 후에 집계 결과를 필터링한다. 집계 함수 사용 가능.',a:currentStepIdx===4},
                      {t:'WHERE vs HAVING',d:'WHERE: 행 단위 필터(그룹 전). HAVING: 그룹 단위 필터(그룹 후).',a:currentStepIdx>=4}
                    ].map((item,i)=>(
                      <div key={i} className={`p-3 rounded-lg border-2 transition-all duration-500 ${item.a?'border-blue-400 bg-blue-50 scale-[1.02]':'border-slate-200 bg-slate-50'}`}>
                        <div className={`text-xs font-bold mb-1 ${item.a?'text-blue-600':'text-slate-400'}`}>{item.t}</div>
                        <div className="text-sm text-slate-700">{item.d}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
