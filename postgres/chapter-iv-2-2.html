<body>
  <div id="root"></div>

  <!--
    PostgreSQL Chapter IV-2-2 — GROUP BY와 집계 함수
    학습 목표: 행을 묶고 통계로 압축하는 다섯 가지 패턴
              ① COUNT(*) ② SUM/AVG/MIN/MAX ③ GROUP BY ④ HAVING ⑤ ROLLUP/CUBE
    핵심 비유: 카페 주문 영수증 묶음 — 100건의 행이 어떻게 "카테고리별 매출 요약"이 되는가
    패턴: fastapi v1 — 좌(LiveDataPane: 행 → 그룹 → 집계) / 우(VSCode CodeViewer 5탭)
    색상: orange (postgres 도메인)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 원본 행 (Step 1~2에서 그대로 노출되는 영수증 데이터)
    //   카페 주문 한 건 = 한 행. 카테고리(coffee/dessert/tea) + 가격.
    // ─────────────────────────────────────────────────────
    const ROWS = [
      { id: 1, category: 'coffee',  item: '아메리카노',  price: 4500 },
      { id: 2, category: 'coffee',  item: '라떼',        price: 5500 },
      { id: 3, category: 'dessert', item: '치즈케이크',  price: 7000 },
      { id: 4, category: 'tea',     item: '얼그레이',    price: 5000 },
      { id: 5, category: 'coffee',  item: '에스프레소',  price: 3500 },
      { id: 6, category: 'dessert', item: '마카롱',      price: 3000 },
      { id: 7, category: 'coffee',  item: '카푸치노',    price: 5000 },
      { id: 8, category: 'tea',     item: '캐모마일',    price: 4500 },
    ];

    // ─────────────────────────────────────────────────────
    // 5단계 시나리오 — 행 → 그룹 → 집계 결과
    //   view      : 좌측 표시 모드 ('rows' | 'aggregate' | 'groups' | 'having' | 'rollup')
    //   payload   : 모드별 데이터 (aggregate면 통계 객체, groups면 그룹 배열...)
    //   code      : 우측 CodeViewer 탭 (lang, filename, lines, highlight)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. COUNT(*) — 행이 몇 개인지 세기',
        desc: '집계의 가장 단순한 출발은 "행이 몇 개인가" 세는 것이다. 카페에서 오늘 주문이 몇 건이었는지, 회원이 몇 명인지처럼 행 개수만 알아도 의사결정에 쓸 수 있다. COUNT(*)는 행 전체를 세고, COUNT(컬럼)은 NULL이 아닌 값만 세며, COUNT(DISTINCT 컬럼)은 중복을 제거한다. 세 개의 차이를 구분하는 것이 핵심이다.',
        view: 'rows',
        payload: {
          rows: ROWS,
          summary: { total: 8, distinctCategory: 3 },
        },
        keyPoint: 'COUNT(*) = 모든 행 / COUNT(컬럼) = NULL 제외 / COUNT(DISTINCT 컬럼) = 중복 제거',
        code: {
          lang: 'sql',
          filename: 'count.sql',
          lines: [
            '-- Step 1. COUNT — 행이 몇 개인지 센다',
            '-- 가장 단순한 집계. 그러나 세 가지 변형을 반드시 구분해야 한다.',
            '',
            '-- ① 전체 행 수 (NULL 포함, 가장 빠름)',
            'SELECT COUNT(*) AS total_orders',
            'FROM orders;',
            '-- 결과: 8',
            '',
            '-- ② 특정 컬럼의 NOT NULL 행 수',
            'SELECT COUNT(price) AS priced_orders',
            'FROM orders;',
            '-- 결과: 8  (price 가 NULL 인 행이 없을 때)',
            '',
            '-- ③ 중복 제거 후 행 수',
            'SELECT COUNT(DISTINCT category) AS category_kinds',
            'FROM orders;',
            '-- 결과: 3  (coffee / dessert / tea)',
            '',
            '-- ④ 조건부 COUNT — FILTER 절 (PostgreSQL 표준)',
            'SELECT',
            "  COUNT(*) FILTER (WHERE category = 'coffee') AS coffee_cnt,",
            "  COUNT(*) FILTER (WHERE category = 'tea')    AS tea_cnt",
            'FROM orders;',
            '-- 결과: coffee_cnt=4 / tea_cnt=2',
            '',
            '-- 주의:',
            '--  • COUNT(*) 는 행 자체를 센다 → 인덱스만 봐도 됨',
            '--  • COUNT(컬럼) 은 NULL 을 건너뛴다',
            '--  • COUNT(DISTINCT) 는 정렬/해시 비용이 크다',
            '',
            '-- → 다음 (Step 2): "행을 숫자로 압축하는 SUM/AVG/MIN/MAX"',
          ],
          highlight: [3, 4, 5, 8, 9, 10, 13, 14, 15, 19, 20, 21, 22],
        },
      },
      {
        title: 'Step 2. SUM / AVG / MIN / MAX — 통계로 압축',
        desc: '행 개수만으로는 부족하다. "오늘 매출 합계는 얼마?", "평균 객단가는?", "최고가/최저가 메뉴는?" 같은 질문에는 SUM, AVG, MIN, MAX 같은 숫자 집계 함수가 필요하다. 이들은 모두 "여러 행을 받아 한 줄로 반환"한다. 즉 8행이 들어가도 결과는 한 줄이다. 이 압축이 집계의 본질이다.',
        view: 'aggregate',
        payload: {
          rows: ROWS,
          stats: {
            count: 8,
            sum: 38000,
            avg: 4750,
            min: 3000,
            max: 7000,
          },
        },
        keyPoint: '집계 함수는 N행 → 1행으로 압축한다. SUM/AVG/MIN/MAX는 숫자 컬럼에서만 유효.',
        code: {
          lang: 'sql',
          filename: 'aggregates.sql',
          lines: [
            '-- Step 2. SUM / AVG / MIN / MAX — 행을 통계로 압축한다',
            '-- 8 행이 들어가도 결과는 1 행. 이것이 집계의 본질.',
            '',
            '-- 한 번에 여러 통계 뽑기 (한 번의 스캔으로 끝)',
            'SELECT',
            '  COUNT(*)         AS cnt,         -- 행 개수',
            '  SUM(price)       AS total_sales, -- 합계',
            '  AVG(price)       AS avg_price,   -- 평균 (소수점 주의)',
            '  MIN(price)       AS cheapest,    -- 최저',
            '  MAX(price)       AS priciest     -- 최고',
            'FROM orders;',
            '-- 결과: 8 | 38000 | 4750.00 | 3000 | 7000',
            '',
            '-- AVG 는 numeric 으로 반환됨 → 정수가 필요하면 캐스팅',
            'SELECT AVG(price)::INTEGER AS avg_price',
            'FROM orders;',
            '-- 결과: 4750',
            '',
            '-- 추가로 자주 쓰는 통계',
            'SELECT',
            '  STDDEV(price)    AS std_dev,     -- 표준편차',
            '  VARIANCE(price)  AS variance,    -- 분산',
            '  PERCENTILE_CONT(0.5) WITHIN GROUP (ORDER BY price) AS median',
            'FROM orders;',
            '',
            '-- NULL 처리 규칙:',
            '--  • SUM/AVG/MIN/MAX 는 NULL 을 무시한다',
            '--  • 모두 NULL 이면 결과도 NULL (0 이 아님!)',
            '--  • 0 으로 받고 싶으면 COALESCE(SUM(price), 0)',
            '',
            '-- → 다음 (Step 3): "카테고리별로 따로 집계 — GROUP BY"',
          ],
          highlight: [4, 5, 6, 7, 8, 9, 10, 11, 19, 20, 21, 22, 23],
        },
      },
      {
        title: 'Step 3. GROUP BY — 카테고리별로 묶어서 집계',
        desc: '전체 통계 하나로는 부족하다. "커피, 디저트, 차 각각 매출이 얼마인지" 따로 보고 싶다. GROUP BY는 같은 값끼리 행을 묶고, 각 묶음마다 집계 함수를 한 번씩 실행한다. 결과 행 수는 묶음(그룹) 개수와 같다. 즉 8행이 카테고리별로 묶여 3행으로 압축된다.',
        view: 'groups',
        payload: {
          groups: [
            {
              key: 'coffee',
              rows: ROWS.filter((r) => r.category === 'coffee'),
              stats: { count: 4, sum: 18500, avg: 4625, min: 3500, max: 5500 },
            },
            {
              key: 'dessert',
              rows: ROWS.filter((r) => r.category === 'dessert'),
              stats: { count: 2, sum: 10000, avg: 5000, min: 3000, max: 7000 },
            },
            {
              key: 'tea',
              rows: ROWS.filter((r) => r.category === 'tea'),
              stats: { count: 2, sum: 9500, avg: 4750, min: 4500, max: 5000 },
            },
          ],
        },
        keyPoint: 'GROUP BY = 같은 값끼리 묶고, 묶음마다 집계 함수를 실행. 결과 행 = 그룹 수.',
        code: {
          lang: 'sql',
          filename: 'group-by.sql',
          lines: [
            '-- Step 3. GROUP BY — 카테고리별로 묶어서 집계',
            '-- 8 행 → "coffee/dessert/tea" 3 그룹 → 3 행으로 압축',
            '',
            'SELECT',
            '  category,',
            '  COUNT(*)        AS cnt,',
            '  SUM(price)      AS sales,',
            '  AVG(price)::INTEGER AS avg_price,',
            '  MAX(price)      AS max_price',
            'FROM orders',
            'GROUP BY category',
            'ORDER BY sales DESC;',
            '',
            '-- 결과:',
            '-- category | cnt | sales | avg_price | max_price',
            '-- ---------|-----|-------|-----------|----------',
            '-- coffee   |  4  | 18500 |   4625    |   5500',
            '-- dessert  |  2  | 10000 |   5000    |   7000',
            '-- tea      |  2  |  9500 |   4750    |   5000',
            '',
            '-- 핵심 규칙:',
            '--  • SELECT 에 등장하는 비집계 컬럼은 GROUP BY 에 모두 있어야 한다',
            '--  • 집계 함수가 적용된 컬럼은 GROUP BY 에 넣지 않는다',
            '',
            '-- 여러 컬럼으로 그룹핑도 가능 (다차원)',
            'SELECT category, (price >= 5000) AS is_premium, COUNT(*)',
            'FROM orders',
            'GROUP BY category, is_premium;',
            '-- → 카테고리 × 가격대 조합별 행 수',
            '',
            '-- 실행 순서 (반드시 외워둘 것):',
            '--  FROM → WHERE → GROUP BY → 집계 → HAVING → SELECT → ORDER BY',
            '',
            '-- → 다음 (Step 4): "그룹 자체에 조건을 거는 HAVING"',
          ],
          highlight: [4, 5, 6, 7, 8, 9, 10, 11, 12, 23, 24, 25, 32, 33, 34],
        },
      },
      {
        title: 'Step 4. HAVING — 그룹 단위 필터',
        desc: 'WHERE는 "행"에 대한 조건이지만 HAVING은 "그룹(집계 결과)"에 대한 조건이다. 예를 들어 "매출이 1만원 이상인 카테고리만 보고 싶다"는 그룹 조건이다. WHERE 절에서는 SUM(price) > 10000 같은 집계 결과를 쓸 수 없고 HAVING에서만 쓸 수 있다. 그래서 GROUP BY 다음에 HAVING이 따라온다.',
        view: 'having',
        payload: {
          groupsBefore: [
            { key: 'coffee',  stats: { count: 4, sum: 18500 }, pass: true,  reason: 'sum ≥ 10000' },
            { key: 'dessert', stats: { count: 2, sum: 10000 }, pass: true,  reason: 'sum ≥ 10000' },
            { key: 'tea',     stats: { count: 2, sum: 9500 },  pass: false, reason: 'sum < 10000 → 제외' },
          ],
          groupsAfter: [
            { key: 'coffee',  stats: { count: 4, sum: 18500 } },
            { key: 'dessert', stats: { count: 2, sum: 10000 } },
          ],
        },
        keyPoint: 'WHERE = 행 필터 / HAVING = 그룹(집계 결과) 필터. 둘은 적용 시점이 다르다.',
        code: {
          lang: 'sql',
          filename: 'having.sql',
          lines: [
            '-- Step 4. HAVING — 그룹 자체에 조건을 건다',
            '-- WHERE 는 "행 필터", HAVING 은 "그룹 필터".',
            '',
            '-- 매출 합계가 1만원 이상인 카테고리만',
            'SELECT',
            '  category,',
            '  COUNT(*)   AS cnt,',
            '  SUM(price) AS sales',
            'FROM orders',
            'GROUP BY category',
            'HAVING SUM(price) >= 10000',
            'ORDER BY sales DESC;',
            '',
            '-- 결과:',
            '-- category | cnt | sales',
            '-- ---------|-----|------',
            '-- coffee   |  4  | 18500',
            '-- dessert  |  2  | 10000',
            '-- (tea 9500 은 조건 미달 → 제외)',
            '',
            '-- WHERE vs HAVING — 자주 헷갈리는 부분',
            '',
            '-- ① WHERE 로 행을 먼저 거른 뒤 GROUP BY (가장 자주 같이 쓴다)',
            'SELECT category, COUNT(*) AS cnt',
            'FROM orders',
            "WHERE price >= 4000          -- 4000 원 이상 행만",
            'GROUP BY category',
            'HAVING COUNT(*) >= 2;        -- 그 중 2건 이상인 카테고리만',
            '',
            '-- ② 잘못된 사용 (집계 함수를 WHERE 에 넣으면 에러)',
            '-- WHERE SUM(price) >= 10000   ← ❌ aggregate functions not allowed in WHERE',
            '',
            '-- 정리: 행 단위 조건은 WHERE, 그룹 단위 조건은 HAVING.',
            '--       성능상도 WHERE 를 먼저 적용해 데이터를 줄이는 게 좋다.',
            '',
            '-- → 다음 (Step 5): "소계/총계까지 한 번에 — ROLLUP / CUBE"',
          ],
          highlight: [4, 5, 6, 7, 8, 9, 10, 11, 12, 24, 25, 26, 27, 28, 29, 31, 32],
        },
      },
      {
        title: 'Step 5. ROLLUP / CUBE — 소계와 총계까지 한 번에',
        desc: '카테고리별 매출을 봤다면, 그 아래 "전체 합계"도 같이 보고 싶다. 엑셀 피벗테이블의 소계/총계 같은 것이다. ROLLUP은 계층적 소계(상위로 올라가며 누적), CUBE는 모든 조합의 소계를 만든다. 결과 행에는 NULL이 등장하는데, 이 NULL이 "이 컬럼은 묶지 않은 = 전체 합계 행"이라는 표식이다.',
        view: 'rollup',
        payload: {
          groups: [
            { key: 'coffee',  stats: { count: 4, sum: 18500 }, kind: 'group' },
            { key: 'dessert', stats: { count: 2, sum: 10000 }, kind: 'group' },
            { key: 'tea',     stats: { count: 2, sum: 9500 },  kind: 'group' },
            { key: '(전체)',   stats: { count: 8, sum: 38000 }, kind: 'total' },
          ],
        },
        keyPoint: 'ROLLUP = 계층 소계, CUBE = 모든 조합 소계. 결과의 NULL 행 = "이 컬럼 안 묶음 = 총계".',
        code: {
          lang: 'sql',
          filename: 'rollup.sql',
          lines: [
            '-- Step 5. ROLLUP / CUBE — 소계와 총계를 한 쿼리로',
            '-- 엑셀 피벗테이블의 "총합계" 행을 SQL 한 줄로 만든다.',
            '',
            '-- ① ROLLUP — 계층적 소계 (왼쪽에서 오른쪽으로 누적)',
            'SELECT',
            '  category,',
            '  COUNT(*)   AS cnt,',
            '  SUM(price) AS sales',
            'FROM orders',
            'GROUP BY ROLLUP (category);',
            '',
            '-- 결과:',
            '-- category | cnt | sales',
            '-- ---------|-----|------',
            '-- coffee   |  4  | 18500',
            '-- dessert  |  2  | 10000',
            '-- tea      |  2  |  9500',
            '-- NULL     |  8  | 38000   ← 총계 (category 가 NULL 인 행)',
            '',
            '-- ② CUBE — 모든 조합의 소계',
            'SELECT category, (price >= 5000) AS is_premium,',
            '       COUNT(*) AS cnt, SUM(price) AS sales',
            'FROM orders',
            'GROUP BY CUBE (category, is_premium);',
            '-- → category 별 / is_premium 별 / 둘 다 / 전체 — 4 종류 소계',
            '',
            '-- ③ NULL 을 "(전체)" 라벨로 바꾸기 — GROUPING() 함수',
            'SELECT',
            "  CASE WHEN GROUPING(category) = 1 THEN '(전체)' ELSE category END AS cat,",
            '  COUNT(*)   AS cnt,',
            '  SUM(price) AS sales',
            'FROM orders',
            'GROUP BY ROLLUP (category);',
            '-- → 총계 행이 "(전체)" 로 명확하게 표시',
            '',
            '-- 주의:',
            '--  • 원래 NULL 인 값과 ROLLUP 이 만든 NULL 을 구분하려면 GROUPING() 필수',
            '--  • CUBE 는 컬럼 N 개면 2^N 가지 소계 → 컬럼 많으면 폭증',
            '--  • 대시보드 한 줄에 "총합" 표시할 때 자주 쓴다',
            '',
            '-- 정리: 행 → COUNT → 통계 → 그룹 → 그룹 필터 → 소계까지. 집계의 5단계 완성.',
          ],
          highlight: [4, 5, 6, 7, 8, 9, 10, 18, 19, 20, 21, 22, 25, 26, 27, 28, 29, 30, 31],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — orange 톤
    // ─────────────────────────────────────────────────────
    const CAT_STYLE = {
      coffee:  { bg: 'bg-orange-50',  border: 'border-orange-300',  text: 'text-orange-800',  dot: 'bg-orange-500' },
      dessert: { bg: 'bg-amber-50',   border: 'border-amber-300',   text: 'text-amber-800',   dot: 'bg-amber-500' },
      tea:     { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-800', dot: 'bg-emerald-500' },
    };

    function RowItem({ row, dim }) {
      const s = CAT_STYLE[row.category] || CAT_STYLE.coffee;
      return (
        <div className={`rounded border ${s.bg} ${s.border} px-3 py-1.5 flex items-center justify-between ${dim ? 'opacity-40' : ''}`}>
          <div className="flex items-center gap-2">
            <span className={`w-2 h-2 rounded-full ${s.dot}`}></span>
            <span className="text-[10px] text-slate-500 font-mono w-6">#{row.id}</span>
            <span className={`text-[10px] px-1.5 py-0.5 rounded ${s.bg} ${s.text} border ${s.border}`}>{row.category}</span>
            <span className={`text-sm ${s.text}`}>{row.item}</span>
          </div>
          <span className={`text-sm font-mono font-bold ${s.text}`}>{row.price.toLocaleString()}원</span>
        </div>
      );
    }

    function StatBox({ label, value, accent }) {
      return (
        <div className={`rounded-lg border ${accent ? 'border-orange-400 bg-orange-100' : 'border-orange-200 bg-orange-50'} px-3 py-2 text-center`}>
          <div className="text-[10px] text-orange-700 font-bold">{label}</div>
          <div className="text-lg font-mono font-bold text-orange-900">{value}</div>
        </div>
      );
    }

    function GroupBlock({ group }) {
      const s = CAT_STYLE[group.key] || CAT_STYLE.coffee;
      return (
        <div className={`rounded-lg border-2 ${s.border} ${s.bg} p-2`}>
          <div className="flex items-center justify-between mb-1.5">
            <div className="flex items-center gap-2">
              <span className={`w-2 h-2 rounded-full ${s.dot}`}></span>
              <span className={`text-xs font-bold ${s.text}`}>{group.key}</span>
              <span className="text-[10px] text-slate-500">{group.stats.count}건</span>
            </div>
            <span className={`text-sm font-mono font-bold ${s.text}`}>{group.stats.sum.toLocaleString()}원</span>
          </div>
          <div className="space-y-0.5">
            {group.rows.map((r) => (
              <div key={r.id} className="flex justify-between text-[11px] text-slate-700 px-1">
                <span>· {r.item}</span>
                <span className="font-mono">{r.price.toLocaleString()}</span>
              </div>
            ))}
          </div>
          <div className="mt-1.5 flex gap-1 text-[10px]">
            <span className="px-1.5 py-0.5 rounded bg-white border border-slate-200 text-slate-600">avg {group.stats.avg.toLocaleString()}</span>
            <span className="px-1.5 py-0.5 rounded bg-white border border-slate-200 text-slate-600">min {group.stats.min.toLocaleString()}</span>
            <span className="px-1.5 py-0.5 rounded bg-white border border-slate-200 text-slate-600">max {group.stats.max.toLocaleString()}</span>
          </div>
        </div>
      );
    }

    function HavingRow({ group }) {
      const s = CAT_STYLE[group.key] || CAT_STYLE.coffee;
      const pass = group.pass;
      return (
        <div className={`rounded-lg border-2 ${pass ? s.border : 'border-slate-300'} ${pass ? s.bg : 'bg-slate-100'} px-3 py-2 ${pass ? '' : 'opacity-60'}`}>
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2">
              <span className={`text-base ${pass ? 'text-green-600' : 'text-red-500'}`}>{pass ? '✓' : '✗'}</span>
              <span className={`text-sm font-bold ${pass ? s.text : 'text-slate-500'}`}>{group.key}</span>
              <span className="text-[10px] text-slate-500">{group.stats.count}건</span>
            </div>
            <span className={`text-sm font-mono font-bold ${pass ? s.text : 'text-slate-500'}`}>{group.stats.sum.toLocaleString()}원</span>
          </div>
          <div className="text-[10px] text-slate-600 mt-0.5">{group.reason}</div>
        </div>
      );
    }

    function RollupRow({ group }) {
      const isTotal = group.kind === 'total';
      const s = isTotal ? null : (CAT_STYLE[group.key] || CAT_STYLE.coffee);
      return (
        <div className={`rounded-lg px-3 py-2 flex items-center justify-between ${isTotal ? 'border-2 border-orange-500 bg-gradient-to-r from-orange-100 to-amber-100 font-bold' : `border ${s.border} ${s.bg}`}`}>
          <div className="flex items-center gap-2">
            {isTotal
              ? <span className="text-base">∑</span>
              : <span className={`w-2 h-2 rounded-full ${s.dot}`}></span>}
            <span className={`text-sm font-bold ${isTotal ? 'text-orange-900' : s.text}`}>{group.key}</span>
            <span className="text-[10px] text-slate-500">{group.stats.count}건</span>
          </div>
          <span className={`text-sm font-mono font-bold ${isTotal ? 'text-orange-900' : s.text}`}>{group.stats.sum.toLocaleString()}원</span>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const { view, payload } = state;
      return (
        <div className="rounded-xl border border-orange-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-orange-800">orders 테이블 — 집계 시뮬레이션</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 데이터 상태</span>
          </div>

          {/* Step 1: 원본 행 + COUNT 결과 */}
          {view === 'rows' && (
            <div className="flex flex-col gap-3">
              <div className="space-y-1">
                {payload.rows.map((r) => <RowItem key={r.id} row={r} />)}
              </div>
              <div className="text-center text-xs font-bold text-orange-600 py-1 border-y border-dashed border-orange-300">
                ↓ COUNT(*) ↓
              </div>
              <div className="grid grid-cols-2 gap-2">
                <StatBox label="COUNT(*)" value={payload.summary.total} accent />
                <StatBox label="COUNT(DISTINCT category)" value={payload.summary.distinctCategory} />
              </div>
            </div>
          )}

          {/* Step 2: 8행 → 통계 압축 */}
          {view === 'aggregate' && (
            <div className="flex flex-col gap-3">
              <div className="space-y-1">
                {payload.rows.map((r) => <RowItem key={r.id} row={r} dim />)}
              </div>
              <div className="text-center text-xs font-bold text-orange-600 py-1 border-y border-dashed border-orange-300">
                ↓ SUM / AVG / MIN / MAX ↓
              </div>
              <div className="grid grid-cols-3 gap-2">
                <StatBox label="COUNT" value={payload.stats.count} />
                <StatBox label="SUM (원)" value={payload.stats.sum.toLocaleString()} accent />
                <StatBox label="AVG (원)" value={payload.stats.avg.toLocaleString()} accent />
                <StatBox label="MIN" value={payload.stats.min.toLocaleString()} />
                <StatBox label="MAX" value={payload.stats.max.toLocaleString()} />
                <StatBox label="N → 1행" value="압축" />
              </div>
            </div>
          )}

          {/* Step 3: GROUP BY 결과 */}
          {view === 'groups' && (
            <div className="flex flex-col gap-2">
              <div className="text-center text-xs font-bold text-orange-600 py-1 border-y border-dashed border-orange-300">
                ↓ GROUP BY category ↓
              </div>
              {payload.groups.map((g) => <GroupBlock key={g.key} group={g} />)}
            </div>
          )}

          {/* Step 4: HAVING 필터 적용 */}
          {view === 'having' && (
            <div className="flex flex-col gap-3">
              <div>
                <div className="text-[11px] text-slate-500 mb-1">GROUP BY 결과 (3 그룹)</div>
                <div className="space-y-1.5">
                  {payload.groupsBefore.map((g) => <HavingRow key={g.key} group={g} />)}
                </div>
              </div>
              <div className="text-center text-xs font-bold text-orange-600 py-1 border-y border-dashed border-orange-300">
                ↓ HAVING SUM(price) ≥ 10000 ↓
              </div>
              <div>
                <div className="text-[11px] text-slate-500 mb-1">HAVING 통과 그룹</div>
                <div className="space-y-1.5">
                  {payload.groupsAfter.map((g) => {
                    const s = CAT_STYLE[g.key] || CAT_STYLE.coffee;
                    return (
                      <div key={g.key} className={`rounded-lg border-2 ${s.border} ${s.bg} px-3 py-2 flex items-center justify-between`}>
                        <span className={`text-sm font-bold ${s.text}`}>{g.key}</span>
                        <span className={`text-sm font-mono font-bold ${s.text}`}>{g.stats.sum.toLocaleString()}원</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

          {/* Step 5: ROLLUP — 소계/총계 */}
          {view === 'rollup' && (
            <div className="flex flex-col gap-3">
              <div className="text-center text-xs font-bold text-orange-600 py-1 border-y border-dashed border-orange-300">
                ↓ GROUP BY ROLLUP (category) ↓
              </div>
              <div className="space-y-1.5">
                {payload.groups.map((g) => <RollupRow key={g.key} group={g} />)}
              </div>
              <div className="text-[10px] text-orange-800 bg-orange-50 border border-orange-200 rounded p-2">
                마지막 행은 category 가 NULL — "이 컬럼은 묶지 않은 = 총계"의 표식.
              </div>
            </div>
          )}

          <div className="mt-3 text-xs text-orange-900 bg-orange-50 border border-orange-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js, 5개 탭)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          {/* 5개 파일 탭 — 현재 활성 step 표시 */}
          <div className="flex bg-slate-900 border-b border-slate-700 text-[10px] font-mono overflow-x-auto">
            {STEPS.map((s, i) => (
              <div
                key={i}
                className={`px-3 py-1.5 border-r border-slate-700 whitespace-nowrap ${i === stepIdx ? 'bg-[#282c34] text-orange-300 border-t-2 border-t-orange-400' : 'text-slate-500'}`}
              >
                {s.code.filename}
              </div>
            ))}
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-orange-500/15 border-l-2 border-orange-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-orange-600 text-white font-bold">IV</span>
              <div>
                <h1 className="text-2xl font-bold text-orange-900">Chapter IV-2-2. GROUP BY와 집계 함수</h1>
                <p className="text-sm text-orange-800/80">행 → COUNT → 통계 압축 → 그룹별 묶음 → 그룹 필터 → 소계/총계</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-orange-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-orange-600' : 'bg-orange-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-orange-700 text-orange-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-orange-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-orange-700 text-white' : 'bg-orange-600 text-white hover:bg-orange-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-orange-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-orange-400 bg-white px-4 py-3 text-sm text-orange-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                COUNT(*) → SUM/AVG/MIN/MAX → GROUP BY → HAVING → ROLLUP/CUBE 의 5단계가 집계의 전부다. 행을 묶고, 통계로 압축하고, 그룹에 조건을 걸고, 소계까지 한 번에 — 이것이 SQL 분석 쿼리의 뼈대다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['COUNT', 'SUM', 'AVG', 'MIN', 'MAX', 'GROUP BY', 'HAVING', 'ROLLUP', 'CUBE', 'GROUPING'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-orange-100 text-orange-800 border border-orange-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-orange-700">
              <a href="./index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./chapter-iv-2-3.html" className="underline hover:no-underline">다음: IV-2-3 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
