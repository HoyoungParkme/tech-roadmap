    function DbStatusBox({ pane }) {

        <div className="rounded-lg border-2 border-orange-300 bg-gradient-to-br from-orange-50 to-amber-50 p-3">

          <div className="flex items-center gap-2 text-xs">

            <span className="font-mono font-bold text-orange-900 bg-orange-100 px-2 py-0.5 rounded border border-orange-300">
              {pane.dbName}
            </span>
            <span className={`ml-auto text-[10px] px-2 py-0.5 rounded font-bold ${
              pane.connected
                ? 'bg-green-200 text-green-800'
                : 'bg-slate-200 text-slate-600'
            }`}>
              {pane.connected ? '● 접속됨 (shop=#)' : '○ 미접속 (postgres=#)'}
            </span>
          </div>
        </div>
      );
    }

      if (!tableExists) {

          <div className="mt-3 rounded-lg border-2 border-dashed border-orange-200 bg-orange-50/40 p-6 text-center">

            <div className="text-xs text-orange-700 font-bold">아직 테이블이 없다</div>
            <div className="text-[10px] text-orange-600 mt-0.5">CREATE TABLE 을 실행해야 격자가 생긴다</div>
          </div>
        );
      }

      return (
        <div className="mt-3">
          <div className="flex items-center justify-between mb-1.5">
            <span className="text-xs font-bold text-orange-900">테이블: products</span>
            <span className="text-[10px] text-orange-700">
              {gridRows.length === 0 ? '(0 rows — 빈 격자)' : `(${gridRows.length} rows)`}
              {selectMode && <span className="ml-2 px-1.5 py-0.5 rounded bg-emerald-100 text-emerald-800 border border-emerald-300">SELECT *</span>}
            </span>
          </div>
          <div className="rounded-lg overflow-hidden border-2 border-orange-300 bg-white">
            {/* 헤더 */}
            <div className="flex bg-orange-100 border-b-2 border-orange-300">
              {gridHeaders.map((h) => (
                <div
                  key={h}
                  className="flex-1 px-3 py-2 text-xs font-bold text-orange-900 font-mono border-r border-orange-200 last:border-r-0"
                >
                  {h}
                </div>
              ))}
            </div>
            {/* 행 */}
            {gridRows.length === 0 ? (
              <div className="px-3 py-6 text-center text-xs text-slate-400 italic">
                — 행 없음 — INSERT 로 채우면 여기에 표시된다 —
              </div>
            ) : (
              gridRows.map((row, i) => (
                <div
                  key={i}
                  className={`flex border-b border-orange-100 last:border-b-0 ${
                    row.highlight ? 'bg-amber-50 animate-pulse' : 'bg-white hover:bg-orange-50/40'
                  }`}
                >
                  <div className="flex-1 px-3 py-2 text-xs font-mono text-orange-800 border-r border-orange-100 font-bold">
                    {row.id}
                  </div>
                  <div className="flex-1 px-3 py-2 text-xs font-mono text-slate-800 border-r border-orange-100">
                    {row.name}
                  </div>
                  <div className="flex-1 px-3 py-2 text-xs font-mono text-slate-800 text-right">
                    {row.price.toLocaleString()}
                  </div>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    function PsqlPrompt({ pane }) {
      const promptText = pane.connected ? 'shop=#' : 'postgres=#';
      return (
        <div className="mt-3 rounded bg-slate-900 text-green-300 px-3 py-2 font-mono text-xs flex items-center gap-2">
          <span className="text-slate-500">$</span>
          <span className="text-green-400 font-bold">{promptText}</span>
          <span className="text-slate-400">_</span>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      const pane = state.pane;
      return (
        <div className="rounded-xl border border-orange-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-orange-800">테이블/데이터 상태 시뮬레이션</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = DB 안 상태</span>
          </div>

          <DbStatusBox pane={pane} />
          <TableGrid pane={pane} />
          <PsqlPrompt pane={pane} />

          {pane.message && (
            <div className="mt-3 text-xs text-orange-900 bg-orange-50 border border-orange-200 rounded p-2">
              📝 {pane.message}
            </div>
          )}

          <div className="mt-2 text-xs text-orange-900 bg-amber-50 border border-amber-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js) — 5탭 전환 가능
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total, onTabClick }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 타이틀 바 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>

          {/* 탭 바 — 5개 파일 전환 */}
          <div className="flex bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {STEPS.map((s, i) => (
              <button
                key={i}
                onClick={() => onTabClick(i)}
                className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                  i === stepIdx
                    ? 'bg-[#282c34] text-orange-300 border-t-2 border-t-orange-400'
                    : 'bg-slate-900 text-slate-400 hover:bg-slate-800 hover:text-slate-200'
                }`}
              >
                {s.code.filename}
              </button>
            ))}
          </div>

          {/* 코드 본문 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-orange-500/15 border-l-2 border-orange-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>

          {/* 상태 바 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 키보드 ←/→ 전환
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동 재생 (3000ms / step)
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-orange-600 text-white font-bold">III</span>
              <div>
                <h1 className="text-2xl font-bold text-orange-900">Chapter III-2-1. 테이블 생성과 데이터 삽입</h1>
                <p className="text-sm text-orange-800/80">CREATE DATABASE → \c → CREATE TABLE → INSERT → SELECT, 5단계 흐름</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-orange-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-orange-600' : 'bg-orange-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-orange-700 text-orange-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-orange-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer
                code={step.code}
                stepIdx={stepIdx}
                total={STEPS.length}
                onTabClick={(i) => setStepIdx(i)}
              />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-orange-700 text-white' : 'bg-orange-600 text-white hover:bg-orange-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-orange-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계 · 우측 파일 탭 클릭으로도 이동 가능</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-orange-400 bg-white px-4 py-3 text-sm text-orange-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                CREATE DATABASE 로 그릇을 만들고 → \c 로 그릇에 들어가고 → CREATE TABLE 로 빈 격자를 두고 → INSERT 로 행을 채우고 → SELECT 로 다시 꺼내본다. 이 5단계가 SQL CRUD의 출발점이다. 다음 챕터에서는 UPDATE 와 DELETE 로 데이터를 수정·삭제하는 법을 학습한다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['CREATE DATABASE', '\\c', 'CREATE TABLE', 'SERIAL', 'PRIMARY KEY', 'INSERT', 'SELECT', 'CRUD'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-orange-100 text-orange-800 border border-orange-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-orange-700">
              <a href="./index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./chapter-iii-2-2.html" className="underline hover:no-underline">다음: III-2-2 데이터 수정과 삭제 (UPDATE/DELETE) →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
