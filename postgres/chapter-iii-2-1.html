<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — III-2-1. 테이블 생성과 데이터 삽입</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    PostgreSQL Chapter III-2-1 — 테이블 생성과 데이터 삽입
    학습 목표: CREATE TABLE, INSERT INTO, SELECT 문을 작성하고 실행할 수 있다.
    조작법: "자동 실행" 버튼으로 재생, 이전/다음 버튼으로 수동 전환.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { label: 'CREATE TABLE', desc: '[Step 1: 테이블 구조 정의] CREATE TABLE 문으로 테이블의 이름과 각 열의 이름, 타입을 선언한다. 이 시점에 실제 데이터는 하나도 없다. 빈 그릇을 만드는 것이다.',
        sql: 'CREATE TABLE users (\n    id    SERIAL PRIMARY KEY,\n    name  TEXT,\n    age   INT\n);',
        terminal: ['mydb=# CREATE TABLE users (', 'mydb(#     id    SERIAL PRIMARY KEY,', 'mydb(#     name  TEXT,', 'mydb(#     age   INT', 'mydb(# );', 'CREATE TABLE'],
        tableRows: [] },
      { label: 'INSERT #1', desc: '[Step 2: 첫 번째 행 삽입] INSERT INTO로 Alice 데이터를 넣는다. id는 SERIAL이므로 자동으로 1이 부여된다. "INSERT 0 1"은 1개 행이 삽입되었다는 뜻이다.',
        sql: "INSERT INTO users (name, age)\nVALUES ('Alice', 25);",
        terminal: ["mydb=# INSERT INTO users (name, age) VALUES ('Alice', 25);", 'INSERT 0 1'],
        tableRows: [{ id: 1, name: 'Alice', age: 25 }] },
      { label: 'INSERT #2, #3', desc: '[Step 3: 추가 행 삽입] Bob과 Carol 데이터를 추가한다. id가 자동으로 2, 3으로 증가한다.',
        sql: "INSERT INTO users (name, age) VALUES ('Bob', 30);\nINSERT INTO users (name, age) VALUES ('Carol', 22);",
        terminal: ["mydb=# INSERT INTO users (name, age) VALUES ('Bob', 30);", 'INSERT 0 1', "mydb=# INSERT INTO users (name, age) VALUES ('Carol', 22);", 'INSERT 0 1'],
        tableRows: [{ id: 1, name: 'Alice', age: 25 }, { id: 2, name: 'Bob', age: 30 }, { id: 3, name: 'Carol', age: 22 }] },
      { label: 'SELECT *', desc: '[Step 4: 전체 조회] SELECT * FROM users; 로 테이블의 모든 행과 열을 가져온다. *는 "모든 열"을 뜻한다.',
        sql: 'SELECT * FROM users;',
        terminal: ['mydb=# SELECT * FROM users;', ' id | name  | age', '----+-------+-----', '  1 | Alice |  25', '  2 | Bob   |  30', '  3 | Carol |  22', '(3 rows)'],
        tableRows: [{ id: 1, name: 'Alice', age: 25 }, { id: 2, name: 'Bob', age: 30 }, { id: 3, name: 'Carol', age: 22 }] },
      { label: 'SELECT WHERE', desc: '[Step 5: 조건 조회] WHERE 절을 쓰면 조건에 맞는 행만 가져온다. age >= 25인 행만 필터링한다. Carol(22)은 제외된다.',
        sql: 'SELECT name, age FROM users\nWHERE age >= 25;',
        terminal: ['mydb=# SELECT name, age FROM users WHERE age >= 25;', ' name  | age', '-------+-----', ' Alice |  25', ' Bob   |  30', '(2 rows)'],
        tableRows: [{ id: 1, name: 'Alice', age: 25, highlight: true }, { id: 2, name: 'Bob', age: 30, highlight: true }, { id: 3, name: 'Carol', age: 22, highlight: false }] }
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [typedLines, setTypedLines] = useState([]);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        setTypedLines([]);
        const lines = stepData.terminal;
        const ids = lines.map((_, i) => setTimeout(() => setTypedLines(prev => [...prev, lines[i]]), (i + 1) * 300));
        return () => ids.forEach(clearTimeout);
      }, [currentStepIdx]);

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">III-2-1. 테이블 생성과 데이터 삽입</h1>
              </div>
              <p className="text-slate-600">
                <b>CREATE TABLE</b>로 빈 그릇을 만들고, <b>INSERT INTO</b>로 데이터를 넣고, <b>SELECT</b>로 꺼내는 기본 흐름을 체험합니다.
              </p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 flex flex-col justify-center min-h-[110px]">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                {/* 터미널 */}
                <div className="bg-slate-900 rounded-xl shadow-sm border border-slate-700 min-h-[250px] flex flex-col overflow-hidden">
                  <div className="flex items-center px-4 py-2 bg-slate-800 border-b border-slate-700 gap-2">
                    <div className="w-3 h-3 rounded-full bg-red-500 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-400 font-mono">psql — mydb</span>
                  </div>
                  <div className="p-4 font-mono text-sm text-emerald-400 flex-1 overflow-y-auto space-y-0.5">
                    {typedLines.map((line, i) => (
                      <div key={`${currentStepIdx}-${i}`} className={`transition-opacity duration-300 ${
                        line.startsWith('mydb') ? 'text-white' :
                        line === 'CREATE TABLE' || line.startsWith('INSERT') ? 'text-emerald-300 font-bold' :
                        line.startsWith('(') ? 'text-slate-500' :
                        line.startsWith('---') || line.startsWith(' id') || line.startsWith(' name') ? 'text-slate-400' :
                        'text-slate-300'
                      }`}>{line}</div>
                    ))}
                    <div className="animate-pulse text-slate-500">▌</div>
                  </div>
                </div>

                {/* 테이블 상태 시각화 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                  <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">테이블 상태: users</div>
                  {stepData.tableRows.length === 0 ? (
                    <div className="text-center py-6 text-slate-400 text-sm border-2 border-dashed border-slate-200 rounded-lg">
                      {currentStepIdx === 0 ? '빈 테이블 생성됨 — 아직 데이터 없음' : '테이블 없음'}
                    </div>
                  ) : (
                    <div className="overflow-x-auto">
                      <table className="w-full text-sm">
                        <thead><tr className="bg-slate-700 text-white">
                          <th className="p-2 text-left">id</th><th className="p-2 text-left">name</th><th className="p-2 text-left">age</th>
                        </tr></thead>
                        <tbody>
                          {stepData.tableRows.map((r, i) => (
                            <tr key={i} className={`border-t transition-all duration-500 ${r.highlight === false ? 'bg-slate-100 opacity-40' : r.highlight === true ? 'bg-emerald-50 ring-1 ring-emerald-300' : 'bg-white'}`}>
                              <td className="p-2 font-mono text-slate-500">{r.id}</td>
                              <td className="p-2 font-mono">{r.name}</td>
                              <td className="p-2 font-mono">{r.age}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}
                </div>

                {/* 컨트롤 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                    </button>
                    <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex gap-1">{STEPS.map((s, i) => (<button key={i} aria-label={`Step ${i+1}: ${s.label}`} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }} className={`w-2.5 h-2.5 rounded-full transition-all ${i === currentStepIdx ? 'bg-blue-600 scale-125' : i < currentStepIdx ? 'bg-blue-300' : 'bg-slate-200'}`} />))}</div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">{currentStepIdx + 1} / {STEPS.length}</div>
                  </div>
                </div>
              </div>

              {/* 오른쪽: 개념 패널 */}
              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-white flex flex-col">
                  <div className="flex items-center px-4 py-3 bg-slate-100 border-b border-slate-200 gap-2">
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-500 font-semibold">SQL 문법 & 핵심 개념</span>
                  </div>
                  <div className="p-6 overflow-y-auto flex-1 space-y-4">

                    {/* SQL 코드 블록 */}
                    <div>
                      <h3 className="text-sm font-bold text-slate-700 border-b pb-2 mb-3">현재 SQL</h3>
                      <div className="bg-slate-800 rounded-lg p-4 font-mono text-sm text-slate-200 leading-relaxed whitespace-pre-wrap">
                        {stepData.sql.split('\n').map((line, i) => (
                          <div key={i}>{line}</div>
                        ))}
                      </div>
                    </div>

                    {/* 타입 설명 */}
                    <div className="space-y-3">
                      <h3 className="text-sm font-bold text-slate-700 border-b pb-2">핵심 개념</h3>
                      {[
                        { t: 'SERIAL', d: 'PostgreSQL의 자동 증가 정수 타입. INSERT 시 1, 2, 3… 자동 부여.', a: currentStepIdx <= 1 },
                        { t: 'PRIMARY KEY', d: '각 행을 고유하게 식별하는 열. 중복 불가.', a: currentStepIdx === 0 },
                        { t: 'TEXT / INT', d: 'TEXT: 가변 길이 문자열. INT: 정수(소수점 없는 숫자).', a: currentStepIdx === 0 },
                        { t: 'INSERT INTO', d: '테이블에 새 행을 추가하는 명령.', a: currentStepIdx === 1 || currentStepIdx === 2 },
                        { t: 'SELECT + WHERE', d: 'SELECT로 조회, WHERE로 조건 필터링.', a: currentStepIdx >= 3 }
                      ].map((item, i) => (
                        <div key={i} className={`p-3 rounded-lg border-2 transition-all duration-500 ${item.a ? 'border-blue-400 bg-blue-50 scale-[1.02]' : 'border-slate-200 bg-slate-50'}`}>
                          <div className={`text-xs font-bold mb-1 ${item.a ? 'text-blue-600' : 'text-slate-400'}`}>{item.t}</div>
                          <div className="text-sm text-slate-700">{item.d}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
