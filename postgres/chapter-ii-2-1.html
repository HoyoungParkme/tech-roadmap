<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — II-2-1. RDB 제품 지도</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    PostgreSQL Chapter II-2-1 — RDB 제품 지도
    학습 목표: MySQL, Oracle, PostgreSQL의 핵심 차이점을 이해하고,
              상황에 따라 어떤 RDB를 선택할지 기준을 말할 수 있다.
    조작법: "자동 실행" 버튼으로 재생, 이전/다음 버튼으로 수동 전환.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // -----------------------------------------
    // 1. 시뮬레이션 스텝 정의
    // -----------------------------------------
    const STEPS = [
      {
        label: "세 가지 칼",
        desc: "[Step 1: 세 가지 도구] 주방 칼을 고른다고 해보자. 가정용 만능 식칼, 셰프의 고급 일식도, 캠핑 나이프. 모두 자를 수 있지만 가격·용도·관리법이 다르다. RDB도 마찬가지다. MySQL, Oracle, PostgreSQL은 모두 SQL을 쓰는 관계형 데이터베이스지만, 각자 강한 영역이 다르다.",
        phase: "intro",
        activeCard: null
      },
      {
        label: "MySQL",
        desc: "[Step 2: MySQL — 빠른 만능 식칼] 전 세계에서 가장 많이 설치된 RDB 중 하나. 설치가 빠르고 읽기 중심의 단순한 쿼리에서 속도가 빠르다. 웹 서비스, 블로그, 쇼핑몰 같은 LAMP 스택에서 오랫동안 표준처럼 쓰였다. 오픈소스(GPLv2)와 상용 라이선스가 혼용된다.",
        phase: "mysql",
        activeCard: "mysql"
      },
      {
        label: "Oracle",
        desc: "[Step 3: Oracle — 셰프의 고급 일식도] 1970년대부터 기업 시장에서 자리를 잡은 상용 RDBMS. 금융, 통신, 공공기관처럼 대규모 트랜잭션과 안정성이 최우선인 환경에서 쓰인다. 기능이 매우 풍부하지만 라이선스 비용이 높다.",
        phase: "oracle",
        activeCard: "oracle"
      },
      {
        label: "PostgreSQL",
        desc: "[Step 4: PostgreSQL — 캠핑 나이프 그 이상] UC 버클리에서 시작된 오픈소스 RDB. 무료이며 상업적 이용도 제한 없다. SQL 표준 준수도가 높고, 복잡한 쿼리와 집계 분석에 강하다. JSONB로 정형+반정형 데이터를 한 DB에서 다룰 수 있다.",
        phase: "postgresql",
        activeCard: "postgresql"
      },
      {
        label: "SQL은 같다",
        desc: "[Step 5: 기본 SQL은 동일하다] 세 제품 모두 같은 CREATE TABLE 문법이 동작한다. 차이는 세부 기능에서 나타난다. PostgreSQL의 JSONB는 MySQL에 없고, Oracle의 일부 분석 함수 문법은 표준과 다르다.",
        phase: "sql",
        activeCard: null
      },
      {
        label: "왜 PostgreSQL?",
        desc: "[Step 6: 왜 PostgreSQL인가?] 세 가지 이유: ① 무료 오픈소스라 누구나 실습 가능 ② SQL 표준을 충실히 따라 다른 RDB에서도 대부분 동작 ③ JSONB, PostGIS 등 확장 기능이 풍부해 다양한 실무 상황을 한 도구로 처리. 이 학습 자료가 PostgreSQL에 집중하는 이유다.",
        phase: "why",
        activeCard: "postgresql"
      }
    ];

    // -----------------------------------------
    // 2. 제품 데이터
    // -----------------------------------------
    const PRODUCTS = {
      mysql: {
        name: "MySQL",
        icon: "🔶",
        color: "amber",
        license: "오픈소스(GPLv2) / 상용 혼용",
        strength: "빠른 읽기, 간단한 설치",
        useCase: "웹 서비스, 스타트업",
        analogy: "만능 식칼",
        sqlStd: "보통"
      },
      oracle: {
        name: "Oracle",
        icon: "🔴",
        color: "red",
        license: "상용 (유료 라이선스)",
        strength: "대규모 트랜잭션, 엔터프라이즈",
        useCase: "금융, 공공, 대기업",
        analogy: "고급 일식도",
        sqlStd: "독자 확장 많음"
      },
      postgresql: {
        name: "PostgreSQL",
        icon: "🐘",
        color: "blue",
        license: "오픈소스 (완전 무료)",
        strength: "SQL 표준, JSONB, 확장성",
        useCase: "스타트업 ~ 엔터프라이즈",
        analogy: "만능 나이프+",
        sqlStd: "높음"
      }
    };

    // -----------------------------------------
    // 3. 카드 컴포넌트
    // -----------------------------------------
    function ProductCard({ id, active, phase }) {
      const p = PRODUCTS[id];
      const colorMap = {
        amber: { bg: 'bg-amber-50', border: 'border-amber-400', text: 'text-amber-700', ring: 'ring-amber-400', headerBg: 'bg-amber-100' },
        red: { bg: 'bg-red-50', border: 'border-red-400', text: 'text-red-700', ring: 'ring-red-400', headerBg: 'bg-red-100' },
        blue: { bg: 'bg-blue-50', border: 'border-blue-400', text: 'text-blue-700', ring: 'ring-blue-400', headerBg: 'bg-blue-100' }
      };
      const c = colorMap[p.color];
      const isActive = active === id;
      const dimmed = active !== null && !isActive;

      return (
        <div className={`rounded-xl border-2 transition-all duration-500 overflow-hidden ${isActive ? `${c.border} ${c.bg} scale-105 ring-2 ${c.ring} shadow-lg` : dimmed ? 'border-slate-200 bg-slate-50 opacity-50 scale-95' : `${c.border} ${c.bg}`}`}>
          <div className={`px-4 py-3 ${isActive ? c.headerBg : 'bg-white/50'} border-b ${isActive ? c.border : 'border-slate-200'}`}>
            <div className="flex items-center gap-2">
              <span className="text-2xl">{p.icon}</span>
              <div>
                <div className={`font-bold text-lg ${isActive ? c.text : 'text-slate-700'}`}>{p.name}</div>
                <div className="text-xs text-slate-500">{p.analogy}</div>
              </div>
            </div>
          </div>
          <div className="p-4 space-y-2 text-sm">
            <div>
              <span className="text-xs font-bold text-slate-400">라이선스</span>
              <div className="text-slate-700">{p.license}</div>
            </div>
            <div>
              <span className="text-xs font-bold text-slate-400">주요 강점</span>
              <div className={`font-medium ${isActive ? c.text : 'text-slate-700'}`}>{p.strength}</div>
            </div>
            <div>
              <span className="text-xs font-bold text-slate-400">주요 사용처</span>
              <div className="text-slate-700">{p.useCase}</div>
            </div>
            <div>
              <span className="text-xs font-bold text-slate-400">SQL 표준 준수</span>
              <div className="text-slate-700">{p.sqlStd}</div>
            </div>
          </div>
        </div>
      );
    }

    // -----------------------------------------
    // 4. 메인 앱 컴포넌트
    // -----------------------------------------
    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">

            {/* 헤더 */}
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">II-2-1. RDB 제품 지도</h1>
              </div>
              <p className="text-slate-600">
                MySQL, Oracle, PostgreSQL은 모두 <b>SQL을 쓰는 관계형 데이터베이스</b>이지만,
                라이선스·강점·사용처가 다릅니다. 용도에 맞는 도구를 고르는 기준을 알아봅니다.
              </p>
            </header>

            {/* 현재 단계 설명 */}
            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 flex flex-col justify-center min-h-[110px]">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 시각화 영역 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">

              {/* 왼쪽: 제품 카드 + SQL 비교 */}
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[400px] flex flex-col justify-center">
                  <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">RDB 제품 비교</div>

                  {/* 제품 카드 3개 */}
                  {(stepData.phase === 'intro' || stepData.phase === 'mysql' || stepData.phase === 'oracle' || stepData.phase === 'postgresql') && (
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 transition-all duration-500">
                      <ProductCard id="mysql" active={stepData.activeCard} phase={stepData.phase} />
                      <ProductCard id="oracle" active={stepData.activeCard} phase={stepData.phase} />
                      <ProductCard id="postgresql" active={stepData.activeCard} phase={stepData.phase} />
                    </div>
                  )}

                  {/* SQL 비교 */}
                  {stepData.phase === 'sql' && (
                    <div className="space-y-4 transition-all duration-500">
                      <div className="text-sm font-semibold text-slate-500 mb-2">같은 SQL, 같은 결과</div>
                      <div className="bg-slate-800 rounded-lg p-4 font-mono text-sm text-slate-200 leading-relaxed">
                        <div className="text-slate-500 mb-1">-- MySQL / Oracle / PostgreSQL 모두 동작</div>
                        <div><span className="text-blue-400">CREATE TABLE</span> 주문 (</div>
                        <div className="pl-4">id      <span className="text-emerald-400">INTEGER</span> <span className="text-amber-400">PRIMARY KEY</span>,</div>
                        <div className="pl-4">고객_id <span className="text-emerald-400">INTEGER</span>,</div>
                        <div className="pl-4">금액    <span className="text-emerald-400">INTEGER</span></div>
                        <div>);</div>
                      </div>
                      <div className="flex items-center gap-2 justify-center">
                        <span className="text-2xl">🔶</span>
                        <span className="text-lg text-slate-400">=</span>
                        <span className="text-2xl">🔴</span>
                        <span className="text-lg text-slate-400">=</span>
                        <span className="text-2xl">🐘</span>
                        <span className="ml-2 text-sm text-slate-500">기본 문법은 동일!</span>
                      </div>
                      <div className="p-3 bg-blue-50 border border-blue-200 rounded-lg text-sm text-blue-800">
                        <b>차이점:</b> PostgreSQL의 <span className="font-mono bg-blue-100 px-1 rounded">JSONB</span> 타입은 MySQL에 없고,
                        Oracle의 일부 분석 함수 문법은 표준과 다르다.
                      </div>
                    </div>
                  )}

                  {/* 왜 PostgreSQL인가? */}
                  {stepData.phase === 'why' && (
                    <div className="space-y-4 transition-all duration-500">
                      <div className="text-sm font-semibold text-slate-500 mb-2">왜 PostgreSQL인가?</div>
                      <div className="space-y-3">
                        <div className="flex items-start gap-3 p-3 bg-emerald-50 border-2 border-emerald-300 rounded-lg">
                          <div className="w-8 h-8 bg-emerald-600 text-white rounded-full flex items-center justify-center font-bold flex-shrink-0">1</div>
                          <div>
                            <div className="font-bold text-emerald-800">무료 오픈소스</div>
                            <div className="text-sm text-emerald-700">누구나 설치해서 실습할 수 있다. 상업적 이용도 제한 없다.</div>
                          </div>
                        </div>
                        <div className="flex items-start gap-3 p-3 bg-blue-50 border-2 border-blue-300 rounded-lg">
                          <div className="w-8 h-8 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold flex-shrink-0">2</div>
                          <div>
                            <div className="font-bold text-blue-800">SQL 표준 충실</div>
                            <div className="text-sm text-blue-700">여기서 배운 SQL이 다른 RDB에서도 대부분 동작한다.</div>
                          </div>
                        </div>
                        <div className="flex items-start gap-3 p-3 bg-violet-50 border-2 border-violet-300 rounded-lg">
                          <div className="w-8 h-8 bg-violet-600 text-white rounded-full flex items-center justify-center font-bold flex-shrink-0">3</div>
                          <div>
                            <div className="font-bold text-violet-800">확장 기능 풍부</div>
                            <div className="text-sm text-violet-700">JSONB, PostGIS, 전문 검색 등 다양한 실무 상황을 한 도구로.</div>
                          </div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>

                {/* 컨트롤 바 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button
                      aria-label="이전 단계"
                      onClick={handlePrev}
                      disabled={currentStepIdx === 0}
                      className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"
                    >
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true">
                        <path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/>
                      </svg>
                    </button>
                    <button
                      aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                      onClick={togglePlay}
                      className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition shadow-sm w-32 justify-center"
                    >
                      {isPlaying ? (
                        <>
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true">
                            <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
                          </svg>
                          정지
                        </>
                      ) : (
                        <>
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                          </svg>
                          자동 실행
                        </>
                      )}
                    </button>
                    <button
                      aria-label="다음 단계"
                      onClick={handleNext}
                      disabled={isEnd}
                      className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"
                    >
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true">
                        <path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/>
                      </svg>
                    </button>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex gap-1">
                      {STEPS.map((s, i) => (
                        <button
                          key={i}
                          onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                          aria-label={`Step ${i + 1}: ${s.label}`}
                          className={`w-2.5 h-2.5 rounded-full transition-all ${i === currentStepIdx ? 'bg-blue-600 scale-125' : i < currentStepIdx ? 'bg-blue-300' : 'bg-slate-200'}`}
                        />
                      ))}
                    </div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                      {currentStepIdx + 1} / {STEPS.length}
                    </div>
                  </div>
                </div>
              </div>

              {/* 오른쪽: 비교 요약 패널 */}
              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-white flex flex-col">
                  <div className="flex items-center px-4 py-3 bg-slate-100 border-b border-slate-200 gap-2">
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-500 font-semibold">비교 요약</span>
                  </div>
                  <div className="p-6 overflow-y-auto flex-1 space-y-6">

                    {/* 비교 표 */}
                    <div className="space-y-3">
                      <h3 className="text-sm font-bold text-slate-700 border-b pb-2">한눈에 비교</h3>
                      <div className="overflow-hidden rounded-lg border border-slate-200">
                        <table className="w-full text-xs">
                          <thead>
                            <tr className="bg-slate-700 text-white">
                              <th className="p-2 text-left">항목</th>
                              <th className={`p-2 text-center transition-all ${stepData.activeCard === 'mysql' ? 'bg-amber-600' : ''}`}>MySQL</th>
                              <th className={`p-2 text-center transition-all ${stepData.activeCard === 'oracle' ? 'bg-red-600' : ''}`}>Oracle</th>
                              <th className={`p-2 text-center transition-all ${stepData.activeCard === 'postgresql' ? 'bg-blue-600' : ''}`}>PostgreSQL</th>
                            </tr>
                          </thead>
                          <tbody>
                            <tr className="border-t border-slate-100">
                              <td className="p-2 font-bold text-slate-500">라이선스</td>
                              <td className={`p-2 text-center ${stepData.activeCard === 'mysql' ? 'bg-amber-50 font-bold' : ''}`}>오픈소스/상용</td>
                              <td className={`p-2 text-center ${stepData.activeCard === 'oracle' ? 'bg-red-50 font-bold' : ''}`}>상용</td>
                              <td className={`p-2 text-center ${stepData.activeCard === 'postgresql' ? 'bg-blue-50 font-bold' : ''}`}>완전 무료</td>
                            </tr>
                            <tr className="border-t border-slate-100">
                              <td className="p-2 font-bold text-slate-500">강점</td>
                              <td className={`p-2 text-center ${stepData.activeCard === 'mysql' ? 'bg-amber-50 font-bold' : ''}`}>빠른 읽기</td>
                              <td className={`p-2 text-center ${stepData.activeCard === 'oracle' ? 'bg-red-50 font-bold' : ''}`}>엔터프라이즈</td>
                              <td className={`p-2 text-center ${stepData.activeCard === 'postgresql' ? 'bg-blue-50 font-bold' : ''}`}>표준+확장</td>
                            </tr>
                            <tr className="border-t border-slate-100">
                              <td className="p-2 font-bold text-slate-500">SQL 표준</td>
                              <td className={`p-2 text-center ${stepData.activeCard === 'mysql' ? 'bg-amber-50 font-bold' : ''}`}>보통</td>
                              <td className={`p-2 text-center ${stepData.activeCard === 'oracle' ? 'bg-red-50 font-bold' : ''}`}>독자 확장</td>
                              <td className={`p-2 text-center ${stepData.activeCard === 'postgresql' ? 'bg-blue-50 font-bold' : ''}`}>높음</td>
                            </tr>
                            <tr className="border-t border-slate-100">
                              <td className="p-2 font-bold text-slate-500">JSONB</td>
                              <td className={`p-2 text-center ${stepData.activeCard === 'mysql' ? 'bg-amber-50' : ''}`}>-</td>
                              <td className={`p-2 text-center ${stepData.activeCard === 'oracle' ? 'bg-red-50' : ''}`}>-</td>
                              <td className={`p-2 text-center ${stepData.activeCard === 'postgresql' ? 'bg-blue-50 font-bold text-blue-700' : ''}`}>지원</td>
                            </tr>
                            <tr className="border-t border-slate-100">
                              <td className="p-2 font-bold text-slate-500">사용처</td>
                              <td className={`p-2 text-center ${stepData.activeCard === 'mysql' ? 'bg-amber-50 font-bold' : ''}`}>웹/스타트업</td>
                              <td className={`p-2 text-center ${stepData.activeCard === 'oracle' ? 'bg-red-50 font-bold' : ''}`}>금융/공공</td>
                              <td className={`p-2 text-center ${stepData.activeCard === 'postgresql' ? 'bg-blue-50 font-bold' : ''}`}>전방위</td>
                            </tr>
                          </tbody>
                        </table>
                      </div>
                    </div>

                    {/* 핵심 개념 */}
                    <div className="space-y-3">
                      <h3 className="text-sm font-bold text-slate-700 border-b pb-2">핵심 개념</h3>
                      <div className={`p-3 rounded-lg border-2 transition-all duration-500 ${
                        stepData.phase === 'sql' ? 'border-emerald-400 bg-emerald-50 scale-[1.02]' : 'border-slate-200 bg-slate-50'
                      }`}>
                        <div className="text-xs font-bold text-emerald-600 mb-1">SQL 표준 (SQL Standard)</div>
                        <div className="text-sm text-slate-700">ANSI/ISO가 정의한 공통 문법 규격. 이를 잘 따르는 DB일수록 다른 DB로 이전이 쉽다.</div>
                      </div>
                      <div className={`p-3 rounded-lg border-2 transition-all duration-500 ${
                        stepData.phase === 'why' || stepData.phase === 'postgresql' ? 'border-blue-400 bg-blue-50 scale-[1.02]' : 'border-slate-200 bg-slate-50'
                      }`}>
                        <div className="text-xs font-bold text-blue-600 mb-1">JSONB</div>
                        <div className="text-sm text-slate-700">PostgreSQL이 지원하는 이진 형태의 JSON 저장 타입. 인덱싱과 쿼리가 가능해 관계형 데이터와 함께 다룰 수 있다.</div>
                      </div>
                      <div className={`p-3 rounded-lg border-2 transition-all duration-500 ${
                        stepData.phase === 'intro' || stepData.phase === 'mysql' ? 'border-amber-400 bg-amber-50 scale-[1.02]' : 'border-slate-200 bg-slate-50'
                      }`}>
                        <div className="text-xs font-bold text-amber-600 mb-1">오픈소스 (Open Source)</div>
                        <div className="text-sm text-slate-700">소스 코드가 공개되어 있고 무료로 사용·수정할 수 있는 소프트웨어.</div>
                      </div>
                    </div>

                    {/* 선택 가이드 */}
                    <div className={`p-4 rounded-lg border-2 transition-all duration-500 ${
                      stepData.phase === 'why' ? 'border-violet-400 bg-violet-50 scale-[1.02]' : 'border-slate-200 bg-slate-50'
                    }`}>
                      <div className="text-xs font-bold text-violet-600 mb-1">선택 기준 요약</div>
                      <div className="text-sm text-slate-700 space-y-1">
                        <div>빠른 웹 서비스 → <b>MySQL</b></div>
                        <div>대규모 엔터프라이즈 → <b>Oracle</b></div>
                        <div>학습·실무 범용 → <b>PostgreSQL</b></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
