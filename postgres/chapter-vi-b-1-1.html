<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — Chapter VI-B-1-1. JSON vs JSONB 완전 가이드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PROFILE = { name: "김민준", age: 29, city: "서울", skills: ["Python", "SQL", "PostgreSQL"], address: { zip: "06234", district: "강남구" } };

    const STEPS = [
      { label: "JSON vs JSONB", desc: "[Step 1] JSON은 텍스트 그대로 저장하고, JSONB는 이진 형태로 파싱해서 저장합니다. JSONB가 읽기 빠르고 인덱싱을 지원하므로 실무에서는 거의 항상 JSONB를 씁니다.", phase: "compare" },
      { label: "-> vs ->> 연산자", desc: "[Step 2] ->는 JSONB 타입으로 값을 꺼내고, ->>는 TEXT 타입으로 꺼냅니다. 중첩 구조를 탐색할 때는 ->를 연결하고, 최종 값이 필요할 때 ->>를 씁니다.", phase: "arrow" },
      { label: "@> 포함 연산", desc: "[Step 3] @>는 왼쪽 JSONB가 오른쪽을 포함하는지 확인합니다. WHERE profile @> '{\"city\": \"서울\"}'은 서울에 사는 사용자를 찾습니다. GIN 인덱스를 활용합니다.", phase: "contains" },
      { label: "? 키 존재 확인", desc: "[Step 4] ?는 해당 키가 JSONB 객체 안에 존재하는지 확인합니다. ?|는 하나라도 존재, ?&는 모두 존재할 때 참입니다.", phase: "exists" },
      { label: "JSON 생성 함수", desc: "[Step 5] jsonb_build_object()로 SQL에서 JSON 객체를 만들고, jsonb_agg()로 여러 행을 JSON 배열로 집계합니다. API 응답을 SQL로 직접 조립할 때 유용합니다.", phase: "build" }
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 5000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const phase = stepData.phase;

      const JsonTree = ({ data, path, highlight }) => {
        const renderValue = (val, currentPath) => {
          const isHighlighted = highlight && currentPath === highlight;
          const cls = isHighlighted ? 'bg-yellow-200 px-1 rounded font-bold' : '';
          if (val === null) return <span className={`text-red-500 ${cls}`}>null</span>;
          if (typeof val === 'string') return <span className={`text-green-600 ${cls}`}>"{val}"</span>;
          if (typeof val === 'number') return <span className={`text-blue-600 ${cls}`}>{val}</span>;
          if (Array.isArray(val)) return <span className={cls}>[{val.map((v, i) => <span key={i}>{i > 0 && ', '}{renderValue(v, `${currentPath}[${i}]`)}</span>)}]</span>;
          if (typeof val === 'object') return (
            <div className={`ml-4 border-l-2 border-slate-200 pl-3 ${cls}`}>
              {Object.entries(val).map(([k, v], i) => (
                <div key={i} className="py-0.5">
                  <span className="text-purple-600">"{k}"</span>: {renderValue(v, `${currentPath}.${k}`)}
                </div>
              ))}
            </div>
          );
          return <span>{String(val)}</span>;
        };
        return <div className="font-mono text-sm bg-slate-50 p-4 rounded-lg border">{renderValue(data, path || '$')}</div>;
      };

      const renderViz = () => {
        if (phase === 'compare') {
          return (
            <div className="grid grid-cols-2 gap-4">
              <div className="p-4 rounded-lg border-2 border-amber-300 bg-amber-50">
                <div className="text-sm font-bold text-amber-700 mb-3">JSON (텍스트 저장)</div>
                <div className="font-mono text-xs bg-white p-3 rounded border">{JSON.stringify(PROFILE)}</div>
                <div className="mt-3 space-y-1 text-xs text-slate-600">
                  <div>+ 쓰기 빠름</div>
                  <div>+ 원본 키 순서 보존</div>
                  <div className="text-red-600">- 읽기 느림 (매번 파싱)</div>
                  <div className="text-red-600">- 인덱싱 불가</div>
                </div>
              </div>
              <div className="p-4 rounded-lg border-2 border-blue-300 bg-blue-50">
                <div className="text-sm font-bold text-blue-700 mb-3">JSONB (이진 저장)</div>
                <JsonTree data={PROFILE} />
                <div className="mt-3 space-y-1 text-xs text-slate-600">
                  <div>+ 읽기 빠름 (이미 파싱됨)</div>
                  <div>+ GIN 인덱스 지원</div>
                  <div>+ @>, ? 연산자 사용 가능</div>
                  <div className="text-amber-600">- 쓰기 시 파싱 비용</div>
                </div>
              </div>
            </div>
          );
        }

        if (phase === 'arrow') {
          return (
            <div className="space-y-4">
              <JsonTree data={PROFILE} highlight="$.name" />
              <div className="grid grid-cols-2 gap-3">
                <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
                  <div className="text-slate-400">-- -> : JSONB 반환</div>
                  <div>profile <span className="text-yellow-300">-></span> 'name'</div>
                  <div className="text-blue-300 mt-1">결과: <span className="text-green-400">"김민준"</span> (JSONB)</div>
                </div>
                <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
                  <div className="text-slate-400">-- ->> : TEXT 반환</div>
                  <div>profile <span className="text-yellow-300">{'>>'}</span> 'name'</div>
                  <div className="text-blue-300 mt-1">결과: <span className="text-green-400">김민준</span> (TEXT)</div>
                </div>
              </div>
              <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
                <div className="text-slate-400">-- 중첩 접근: -> 연결 후 마지막에 ->></div>
                <div>profile <span className="text-yellow-300">-></span> 'address' <span className="text-yellow-300">{'>>'}</span> 'district'</div>
                <div className="text-blue-300 mt-1">결과: 강남구 (TEXT)</div>
                <div className="mt-2 text-slate-400">-- 배열 인덱스 접근 (0-based)</div>
                <div>profile <span className="text-yellow-300">-></span> 'skills' <span className="text-yellow-300">-></span> 0</div>
                <div className="text-blue-300 mt-1">결과: "Python" (JSONB)</div>
              </div>
            </div>
          );
        }

        if (phase === 'contains') {
          return (
            <div className="space-y-4">
              <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
                <div>SELECT * FROM users WHERE profile <span className="text-yellow-300">@></span> '{'"city": "서울"'}';</div>
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div className="p-3 rounded-lg border-2 border-green-400 bg-green-50">
                  <div className="text-xs font-bold text-green-600 mb-1">매칭!</div>
                  <div className="font-mono text-xs">{"{"}"city": "서울", ...{"}"}</div>
                  <div className="text-xs text-green-600 mt-1">@> '{"{"}"city": "서울"{"}"}' = TRUE</div>
                </div>
                <div className="p-3 rounded-lg border border-slate-200 opacity-50">
                  <div className="text-xs font-bold text-slate-400 mb-1">미매칭</div>
                  <div className="font-mono text-xs">{"{"}"city": "부산", ...{"}"}</div>
                  <div className="text-xs text-slate-400 mt-1">@> '{"{"}"city": "서울"{"}"}' = FALSE</div>
                </div>
              </div>
              <div className="bg-blue-50 border border-blue-300 p-3 rounded-lg text-sm text-center text-blue-700">
                @> 연산자는 <b>GIN 인덱스</b>를 활용해 대용량에서도 빠르게 검색
              </div>
            </div>
          );
        }

        if (phase === 'exists') {
          return (
            <div className="space-y-4">
              <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
                <div className="text-slate-400">-- ? : 키가 존재하는지 확인</div>
                <div>profile <span className="text-yellow-300">?</span> 'email'  <span className="text-red-300">-- false (없음)</span></div>
                <div>profile <span className="text-yellow-300">?</span> 'name'   <span className="text-green-400">-- true (있음)</span></div>
                <div className="mt-2 text-slate-400">-- ?| : 하나라도 존재하면 true</div>
                <div>profile <span className="text-yellow-300">?|</span> array['email', 'name']  <span className="text-green-400">-- true</span></div>
                <div className="mt-2 text-slate-400">-- ?& : 모두 존재해야 true</div>
                <div>profile <span className="text-yellow-300">?&</span> array['email', 'name']  <span className="text-red-300">-- false</span></div>
              </div>
              <JsonTree data={PROFILE} />
              <div className="grid grid-cols-4 gap-2 text-center text-xs">
                {['name','age','city','email'].map(k => (
                  <div key={k} className={`p-2 rounded ${PROFILE[k] !== undefined ? 'bg-green-100 border border-green-300 text-green-700' : 'bg-red-100 border border-red-300 text-red-700'}`}>
                    <div className="font-mono font-bold">'{k}'</div>
                    <div>{PROFILE[k] !== undefined ? 'EXISTS' : 'NOT FOUND'}</div>
                  </div>
                ))}
              </div>
            </div>
          );
        }

        if (phase === 'build') {
          return (
            <div className="space-y-4">
              <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
                <div className="text-slate-400">-- jsonb_build_object: SQL → JSON 객체</div>
                <div>SELECT <span className="text-yellow-300">jsonb_build_object</span>(</div>
                <div>  'id', u.id, 'name', u.name</div>
                <div>) AS user_json FROM users u;</div>
                <div className="mt-3 text-slate-400">-- jsonb_agg: 여러 행 → JSON 배열</div>
                <div>SELECT department,</div>
                <div>  <span className="text-yellow-300">jsonb_agg</span>(name) AS members</div>
                <div>FROM employees GROUP BY department;</div>
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div className="p-3 rounded-lg border border-blue-300 bg-blue-50">
                  <div className="text-xs font-bold text-blue-600 mb-2">jsonb_build_object 결과</div>
                  <div className="font-mono text-sm text-slate-700">{"{"}"id": 1, "name": "김민준"{"}"}</div>
                </div>
                <div className="p-3 rounded-lg border border-green-300 bg-green-50">
                  <div className="text-xs font-bold text-green-600 mb-2">jsonb_agg 결과</div>
                  <div className="font-mono text-sm text-slate-700">["김민준", "이서연", "박도윤"]</div>
                </div>
              </div>
            </div>
          );
        }
        return null;
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold">VI-B-1-1. JSON vs JSONB 완전 가이드</h1>
              </div>
              <p className="text-slate-600">JSONB의 연산자(->, ->>, @>, ?)와 생성 함수를 시각적으로 체험합니다.</p>
            </header>
            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm min-h-[90px]">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[350px] flex flex-col justify-center">{renderViz()}</div>
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="px-5 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg font-medium disabled:opacity-30 disabled:cursor-not-allowed">이전</button>
                <div className="flex items-center gap-4">
                  <button onClick={togglePlay} className={`px-5 py-2 rounded-lg font-medium ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-blue-600 hover:bg-blue-700 text-white'}`}>{isPlaying ? '일시 정지' : (isEnd ? '처음부터' : '자동 실행')}</button>
                  <div className="flex gap-1">{STEPS.map((_, i) => <button key={i} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }} className={`w-3 h-3 rounded-full ${i === currentStepIdx ? 'bg-blue-600' : i < currentStepIdx ? 'bg-blue-300' : 'bg-slate-200'}`} />)}</div>
                  <span className="text-xs text-slate-400 font-mono">{currentStepIdx + 1}/{STEPS.length}</span>
                </div>
                <button onClick={handleNext} disabled={isEnd} className="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium disabled:opacity-30 disabled:cursor-not-allowed">다음</button>
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
