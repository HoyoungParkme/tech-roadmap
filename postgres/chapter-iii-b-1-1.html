<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — Chapter III-B-1-1. 숫자 타입: INT, NUMERIC, FLOAT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    PostgreSQL Chapter III-B-1-1 — 숫자 타입: INT, NUMERIC, FLOAT
    학습 목표: NUMERIC과 FLOAT의 오차 차이를 시각적으로 체험하고,
              "돈은 NUMERIC, 좌표는 FLOAT"를 직관적으로 이해한다.
    조작법: "자동 실행" 버튼으로 재생, 이전/다음 버튼으로 수동 전환.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        label: "세 가지 숫자 타입",
        desc: "[Step 1] PostgreSQL에는 세 가지 숫자 타입이 있습니다. INTEGER(정수), NUMERIC(정밀 소수), FLOAT(근사 소수). 각각 저장 방식이 다르고, 용도도 다릅니다.",
        phase: "intro",
        highlight: null
      },
      {
        label: "같은 값 저장",
        desc: "[Step 2] 0.1 + 0.2를 NUMERIC과 FLOAT에 각각 저장해 봅니다. 수학적으로 답은 0.3이어야 합니다. 과연 두 타입 모두 같은 결과를 보여줄까요?",
        phase: "store",
        highlight: "input"
      },
      {
        label: "FLOAT 오차 발생",
        desc: "[Step 3] NUMERIC은 정확히 0.3을 반환합니다. 하지만 FLOAT는 0.30000000000000004를 반환합니다! FLOAT는 이진수(0과 1)로 소수를 표현하는데, 0.1은 이진수로 정확히 표현할 수 없어 미세한 오차가 생깁니다.",
        phase: "error",
        highlight: "result"
      },
      {
        label: "금액 오차 누적",
        desc: "[Step 4] 이 작은 오차가 금액 계산에서는 치명적입니다. 1000건의 결제(각 29,900원)를 합산하면: NUMERIC은 정확히 29,900,000원, FLOAT는 29,899,999.97원처럼 차이가 생깁니다. 정산이 안 맞는 원인이 됩니다.",
        phase: "accumulate",
        highlight: "diff"
      },
      {
        label: "INTEGER 범위",
        desc: "[Step 5] 정수 타입은 오차가 없지만 저장 범위가 다릅니다. SMALLINT는 약 3만, INTEGER는 약 21억, BIGINT는 약 922경까지 담습니다. 대부분 INTEGER로 충분하고, ID가 수억 건이면 BIGINT를 씁니다.",
        phase: "integer",
        highlight: "range"
      },
      {
        label: "실무 선택 규칙",
        desc: "[Step 6] 결론: '돈은 NUMERIC, 좌표는 FLOAT, 개수는 INTEGER'. 타입을 잘못 고르면 눈에 안 보이는 오차가 쌓여 나중에 큰 문제가 됩니다. 처음부터 올바른 타입을 선택하는 것이 핵심입니다.",
        phase: "summary",
        highlight: null
      }
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const phase = stepData.phase;

      const TypeCard = ({ name, bytes, color, desc, active }) => (
        <div className={`p-4 rounded-lg border-2 transition-all duration-500 ${active ? `border-${color}-400 bg-${color}-50 shadow-lg scale-105` : 'border-slate-200 bg-white opacity-60'}`}>
          <div className={`text-sm font-bold text-${color}-600 mb-1`}>{name}</div>
          <div className="text-xs text-slate-500 mb-2">{bytes}</div>
          <div className="text-xs text-slate-600">{desc}</div>
        </div>
      );

      const renderViz = () => {
        if (phase === 'intro') {
          return (
            <div className="grid grid-cols-3 gap-4">
              <div className="p-4 rounded-lg border-2 border-green-400 bg-green-50 shadow-lg">
                <div className="text-sm font-bold text-green-600 mb-1">INTEGER</div>
                <div className="text-xs text-slate-500 mb-2">4 bytes</div>
                <div className="text-xs text-slate-600">소수점 없는 정수. 재고, 수량, 나이에 사용.</div>
                <div className="mt-3 font-mono text-lg text-center text-green-700">42</div>
              </div>
              <div className="p-4 rounded-lg border-2 border-blue-400 bg-blue-50 shadow-lg">
                <div className="text-sm font-bold text-blue-600 mb-1">NUMERIC</div>
                <div className="text-xs text-slate-500 mb-2">가변 크기</div>
                <div className="text-xs text-slate-600">정밀 소수. 금액, 세율에 사용.</div>
                <div className="mt-3 font-mono text-lg text-center text-blue-700">29900.00</div>
              </div>
              <div className="p-4 rounded-lg border-2 border-amber-400 bg-amber-50 shadow-lg">
                <div className="text-sm font-bold text-amber-600 mb-1">FLOAT</div>
                <div className="text-xs text-slate-500 mb-2">8 bytes</div>
                <div className="text-xs text-slate-600">근사 소수. 좌표, 센서 값에 사용.</div>
                <div className="mt-3 font-mono text-lg text-center text-amber-700">37.5664</div>
              </div>
            </div>
          );
        }

        if (phase === 'store') {
          return (
            <div className="space-y-4">
              <div className="bg-slate-800 text-green-300 p-4 rounded-lg font-mono text-sm">
                <div className="text-slate-400">-- 같은 계산을 두 타입에 저장</div>
                <div className="mt-1">SELECT (0.1 + 0.2)::<span className="text-blue-300">NUMERIC</span>;</div>
                <div>SELECT (0.1 + 0.2)::<span className="text-amber-300">FLOAT</span>;</div>
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div className="p-4 rounded-lg border-2 border-blue-400 bg-blue-50 text-center">
                  <div className="text-xs font-bold text-blue-600 mb-2">NUMERIC</div>
                  <div className="text-2xl font-mono text-blue-700 animate-pulse">0.1 + 0.2 = ?</div>
                </div>
                <div className="p-4 rounded-lg border-2 border-amber-400 bg-amber-50 text-center">
                  <div className="text-xs font-bold text-amber-600 mb-2">FLOAT</div>
                  <div className="text-2xl font-mono text-amber-700 animate-pulse">0.1 + 0.2 = ?</div>
                </div>
              </div>
            </div>
          );
        }

        if (phase === 'error') {
          return (
            <div className="space-y-4">
              <div className="grid grid-cols-2 gap-4">
                <div className="p-4 rounded-lg border-2 border-green-500 bg-green-50 text-center">
                  <div className="text-xs font-bold text-green-600 mb-2">NUMERIC 결과</div>
                  <div className="text-3xl font-mono text-green-700 font-bold">0.3</div>
                  <div className="text-xs text-green-600 mt-2">정확!</div>
                </div>
                <div className="p-4 rounded-lg border-2 border-red-500 bg-red-50 text-center">
                  <div className="text-xs font-bold text-red-600 mb-2">FLOAT 결과</div>
                  <div className="text-xl font-mono text-red-700 font-bold">0.30000000000000004</div>
                  <div className="text-xs text-red-600 mt-2">이진 변환 오차!</div>
                </div>
              </div>
              <div className="bg-slate-800 text-green-300 p-4 rounded-lg font-mono text-sm">
                <div className="text-slate-400">-- 같은지 비교</div>
                <div>SELECT (0.1::FLOAT + 0.2::FLOAT) = 0.3::FLOAT;</div>
                <div className="text-red-400 font-bold">-- 결과: false (!)</div>
                <div className="mt-2">SELECT (0.1::NUMERIC + 0.2::NUMERIC) = 0.3::NUMERIC;</div>
                <div className="text-green-400 font-bold">-- 결과: true</div>
              </div>
            </div>
          );
        }

        if (phase === 'accumulate') {
          const numericTotal = 29900000;
          const floatTotal = 29899999.97;
          return (
            <div className="space-y-4">
              <div className="text-center text-sm text-slate-600 mb-2">
                29,900원 x 1,000건 합산 결과
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div className="p-4 rounded-lg border-2 border-green-500 bg-green-50 text-center">
                  <div className="text-xs font-bold text-green-600 mb-2">NUMERIC(12,2)</div>
                  <div className="text-2xl font-mono text-green-700 font-bold">{numericTotal.toLocaleString()}원</div>
                  <div className="text-xs text-green-600 mt-2">정확한 합계</div>
                </div>
                <div className="p-4 rounded-lg border-2 border-red-500 bg-red-50 text-center">
                  <div className="text-xs font-bold text-red-600 mb-2">FLOAT</div>
                  <div className="text-2xl font-mono text-red-700 font-bold">{floatTotal.toLocaleString()}원</div>
                  <div className="text-xs text-red-600 mt-2">3원 부족!</div>
                </div>
              </div>
              <div className="bg-red-100 border border-red-300 p-3 rounded-lg text-center">
                <div className="text-red-700 font-bold text-lg">차이: {(numericTotal - floatTotal).toFixed(2)}원</div>
                <div className="text-red-600 text-xs mt-1">1000건에서 이 정도면, 100만 건이면 3,000원 차이!</div>
              </div>
            </div>
          );
        }

        if (phase === 'integer') {
          const types = [
            { name: 'SMALLINT', bytes: 2, max: '32,767', bar: 1, color: 'slate' },
            { name: 'INTEGER', bytes: 4, max: '2,147,483,647', bar: 40, color: 'green' },
            { name: 'BIGINT', bytes: 8, max: '9.2 x 10^18', bar: 100, color: 'blue' }
          ];
          return (
            <div className="space-y-4">
              {types.map((t, i) => (
                <div key={i} className="flex items-center gap-3">
                  <div className="w-24 text-right text-sm font-mono font-bold text-slate-700">{t.name}</div>
                  <div className="flex-1 bg-slate-100 rounded-full h-8 overflow-hidden">
                    <div className={`h-full bg-${t.color}-500 rounded-full flex items-center justify-end pr-2 transition-all duration-1000`}
                         style={{ width: `${t.bar}%` }}>
                      <span className="text-xs font-bold text-white">{t.bytes}B</span>
                    </div>
                  </div>
                  <div className="w-40 text-xs font-mono text-slate-600">max: {t.max}</div>
                </div>
              ))}
              <div className="mt-4 bg-green-50 border border-green-200 p-3 rounded-lg text-sm text-green-700">
                대부분 <b>INTEGER</b>로 충분합니다. ID가 수억 건 이상이면 <b>BIGINT</b>를 씁니다.
              </div>
            </div>
          );
        }

        if (phase === 'summary') {
          return (
            <div className="space-y-3">
              {[
                { icon: '&#128176;', label: '돈, 금액, 세율', type: 'NUMERIC(p,s)', color: 'blue', reason: '이진 오차 없음' },
                { icon: '&#127759;', label: '좌표, 센서, 물리량', type: 'FLOAT / DOUBLE PRECISION', color: 'amber', reason: '빠르고 범위 넓음' },
                { icon: '&#128290;', label: '개수, ID, 수량', type: 'INTEGER / BIGINT', color: 'green', reason: '소수 불필요' }
              ].map((r, i) => (
                <div key={i} className={`flex items-center gap-4 p-4 rounded-lg border-2 border-${r.color}-400 bg-${r.color}-50`}>
                  <div className="text-3xl" dangerouslySetInnerHTML={{__html: r.icon}} />
                  <div className="flex-1">
                    <div className="text-sm font-bold text-slate-700">{r.label}</div>
                    <div className={`text-xs text-${r.color}-600`}>{r.reason}</div>
                  </div>
                  <div className={`font-mono text-sm font-bold text-${r.color}-700 bg-white px-3 py-1 rounded-lg`}>{r.type}</div>
                </div>
              ))}
            </div>
          );
        }

        return null;
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">III-B-1-1. 숫자 타입: INT, NUMERIC, FLOAT</h1>
              </div>
              <p className="text-slate-600">
                <b>NUMERIC</b>은 돈 계산에, <b>FLOAT</b>는 좌표에, <b>INTEGER</b>는 개수에 씁니다.
                왜 그런지 오차를 직접 눈으로 확인해 봅니다.
              </p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 flex flex-col justify-center min-h-[100px]">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[350px] flex flex-col justify-center">
              {renderViz()}
            </div>

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between">
                <button onClick={handlePrev} disabled={currentStepIdx === 0}
                  className="px-5 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg font-medium disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
                  이전
                </button>

                <div className="flex items-center gap-4">
                  <button onClick={togglePlay}
                    className={`px-5 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-blue-600 hover:bg-blue-700 text-white'}`}>
                    {isPlaying ? '일시 정지' : (isEnd ? '처음부터' : '자동 실행')}
                  </button>

                  <div className="flex gap-1">
                    {STEPS.map((_, i) => (
                      <button key={i} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                        className={`w-3 h-3 rounded-full transition-colors ${i === currentStepIdx ? 'bg-blue-600' : (i < currentStepIdx ? 'bg-blue-300' : 'bg-slate-200')}`} />
                    ))}
                  </div>

                  <span className="text-xs text-slate-400 font-mono">{currentStepIdx + 1}/{STEPS.length}</span>
                </div>

                <button onClick={handleNext} disabled={isEnd}
                  className="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
                  다음
                </button>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
