<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — Chapter IV-B-1-1. Window Functions 기초</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const EMPLOYEES = [
      { name: '김민준', dept: 'engineering', salary: 5000000 },
      { name: '이서연', dept: 'engineering', salary: 4800000 },
      { name: '박도윤', dept: 'engineering', salary: 4800000 },
      { name: '최지우', dept: 'sales', salary: 4200000 },
      { name: '정수호', dept: 'sales', salary: 3900000 }
    ];

    const STEPS = [
      { label: "원본 데이터", desc: "[Step 1] employees 테이블에 5명의 직원이 있습니다. engineering 부서 3명, sales 부서 2명입니다.", phase: "data" },
      { label: "GROUP BY 결과", desc: "[Step 2] GROUP BY department로 부서별 평균 급여를 구하면 행이 2개로 줄어듭니다. 개별 직원 정보(이름, 급여)는 사라집니다.", phase: "groupby" },
      { label: "윈도우 함수 결과", desc: "[Step 3] AVG(salary) OVER(PARTITION BY department)를 쓰면 행이 그대로 5개 유지됩니다. 각 직원 행에 부서 평균이 새 열로 추가됩니다. 이것이 윈도우 함수의 핵심입니다.", phase: "window" },
      { label: "순위 함수 비교", desc: "[Step 4] ROW_NUMBER, RANK, DENSE_RANK 세 가지 순위 함수를 비교합니다. 동점(이서연, 박도윤 = 4,800,000) 처리 방식이 다릅니다.", phase: "rank" },
      { label: "PARTITION BY", desc: "[Step 5] PARTITION BY를 쓰면 부서별로 독립적인 창(window)이 만들어집니다. 각 부서 안에서 따로 순위를 매깁니다. PARTITION BY 없으면 전체가 하나의 창입니다.", phase: "partition" }
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4500); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const phase = stepData.phase;

      const renderViz = () => {
        if (phase === 'data') {
          return (
            <table className="w-full text-sm"><thead><tr className="bg-slate-100 border-b-2"><th className="p-2 text-left">name</th><th className="p-2 text-left">department</th><th className="p-2 text-right">salary</th></tr></thead>
            <tbody>{EMPLOYEES.map((e, i) => <tr key={i} className={`border-t ${e.dept === 'engineering' ? 'bg-blue-50' : 'bg-green-50'}`}><td className="p-2">{e.name}</td><td className="p-2">{e.dept}</td><td className="p-2 text-right font-mono">{e.salary.toLocaleString()}</td></tr>)}</tbody></table>
          );
        }

        if (phase === 'groupby') {
          const engAvg = Math.round((5000000 + 4800000 + 4800000) / 3);
          const salesAvg = Math.round((4200000 + 3900000) / 2);
          return (
            <div className="space-y-4">
              <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
                SELECT department, AVG(salary) FROM employees <span className="text-yellow-300">GROUP BY department</span>;
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div className="opacity-30">
                  <div className="text-xs text-slate-500 mb-1">원본 (5행)</div>
                  <table className="w-full text-xs"><tbody>{EMPLOYEES.map((e, i) => <tr key={i} className="border-t"><td className="p-1">{e.name}</td><td className="p-1">{e.dept}</td><td className="p-1 text-right font-mono">{e.salary.toLocaleString()}</td></tr>)}</tbody></table>
                </div>
                <div>
                  <div className="text-xs text-red-600 font-bold mb-1">GROUP BY 결과 (2행) - 개별 행 사라짐!</div>
                  <table className="w-full text-sm border-2 border-red-300 rounded">
                    <thead><tr className="bg-red-50"><th className="p-2 text-left">department</th><th className="p-2 text-right">avg(salary)</th></tr></thead>
                    <tbody>
                      <tr className="border-t bg-blue-50"><td className="p-2">engineering</td><td className="p-2 text-right font-mono font-bold">{engAvg.toLocaleString()}</td></tr>
                      <tr className="border-t bg-green-50"><td className="p-2">sales</td><td className="p-2 text-right font-mono font-bold">{salesAvg.toLocaleString()}</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        }

        if (phase === 'window') {
          const engAvg = Math.round((5000000 + 4800000 + 4800000) / 3);
          const salesAvg = Math.round((4200000 + 3900000) / 2);
          return (
            <div className="space-y-4">
              <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-sm">
                SELECT name, department, salary, <span className="text-yellow-300">AVG(salary) OVER(PARTITION BY department)</span> AS dept_avg FROM employees;
              </div>
              <table className="w-full text-sm border-2 border-green-300 rounded">
                <thead><tr className="bg-green-50"><th className="p-2 text-left">name</th><th className="p-2 text-left">department</th><th className="p-2 text-right">salary</th><th className="p-2 text-right font-bold text-green-700">dept_avg</th></tr></thead>
                <tbody>{EMPLOYEES.map((e, i) => {
                  const avg = e.dept === 'engineering' ? engAvg : salesAvg;
                  return <tr key={i} className={`border-t ${e.dept === 'engineering' ? 'bg-blue-50' : 'bg-green-50'}`}>
                    <td className="p-2">{e.name}</td><td className="p-2">{e.dept}</td>
                    <td className="p-2 text-right font-mono">{e.salary.toLocaleString()}</td>
                    <td className="p-2 text-right font-mono font-bold text-green-700">{avg.toLocaleString()}</td>
                  </tr>;
                })}</tbody>
              </table>
              <div className="bg-green-100 border border-green-300 p-3 rounded-lg text-center text-sm text-green-700">
                <b>5행 모두 유지</b> + 부서 평균이 새 열로 추가됨
              </div>
            </div>
          );
        }

        if (phase === 'rank') {
          const sorted = [...EMPLOYEES].sort((a, b) => b.salary - a.salary);
          const ranks = [
            { rn: 1, rank: 1, dense: 1 },
            { rn: 2, rank: 2, dense: 2 },
            { rn: 3, rank: 2, dense: 2 },
            { rn: 4, rank: 4, dense: 3 },
            { rn: 5, rank: 5, dense: 4 }
          ];
          return (
            <div className="space-y-3">
              <div className="text-xs text-center text-slate-600">전체 급여 내림차순 (PARTITION BY 없이)</div>
              <table className="w-full text-sm">
                <thead><tr className="bg-slate-100 border-b-2"><th className="p-2 text-left">name</th><th className="p-2 text-right">salary</th><th className="p-2 text-center bg-purple-50">ROW_NUMBER</th><th className="p-2 text-center bg-blue-50">RANK</th><th className="p-2 text-center bg-green-50">DENSE_RANK</th></tr></thead>
                <tbody>{sorted.map((e, i) => (
                  <tr key={i} className={`border-t ${e.salary === 4800000 ? 'bg-yellow-50' : ''}`}>
                    <td className="p-2">{e.name}</td>
                    <td className="p-2 text-right font-mono">{e.salary.toLocaleString()}</td>
                    <td className="p-2 text-center font-bold text-purple-700">{ranks[i].rn}</td>
                    <td className="p-2 text-center font-bold text-blue-700">{ranks[i].rank}</td>
                    <td className="p-2 text-center font-bold text-green-700">{ranks[i].dense}</td>
                  </tr>
                ))}</tbody>
              </table>
              <div className="bg-yellow-50 border border-yellow-300 p-2 rounded text-xs text-center text-yellow-700">
                동점(4,800,000): ROW_NUMBER는 2,3 / RANK는 2,2 (다음 4) / DENSE_RANK는 2,2 (다음 3)
              </div>
            </div>
          );
        }

        if (phase === 'partition') {
          const engSorted = EMPLOYEES.filter(e => e.dept === 'engineering').sort((a, b) => b.salary - a.salary);
          const salesSorted = EMPLOYEES.filter(e => e.dept === 'sales').sort((a, b) => b.salary - a.salary);
          return (
            <div className="grid grid-cols-2 gap-4">
              <div className="border-2 border-blue-300 rounded-lg p-3">
                <div className="text-xs font-bold text-blue-600 mb-2">PARTITION BY department = 'engineering'</div>
                <table className="w-full text-sm"><thead><tr className="bg-blue-50"><th className="p-1 text-left">name</th><th className="p-1 text-right">salary</th><th className="p-1 text-center">RANK</th></tr></thead>
                <tbody>{engSorted.map((e, i) => <tr key={i} className="border-t"><td className="p-1">{e.name}</td><td className="p-1 text-right font-mono">{e.salary.toLocaleString()}</td><td className="p-1 text-center font-bold text-blue-700">{i === 0 ? 1 : 2}</td></tr>)}</tbody></table>
              </div>
              <div className="border-2 border-green-300 rounded-lg p-3">
                <div className="text-xs font-bold text-green-600 mb-2">PARTITION BY department = 'sales'</div>
                <table className="w-full text-sm"><thead><tr className="bg-green-50"><th className="p-1 text-left">name</th><th className="p-1 text-right">salary</th><th className="p-1 text-center">RANK</th></tr></thead>
                <tbody>{salesSorted.map((e, i) => <tr key={i} className="border-t"><td className="p-1">{e.name}</td><td className="p-1 text-right font-mono">{e.salary.toLocaleString()}</td><td className="p-1 text-center font-bold text-green-700">{i + 1}</td></tr>)}</tbody></table>
              </div>
            </div>
          );
        }
        return null;
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold">IV-B-1-1. Window Functions 기초</h1>
              </div>
              <p className="text-slate-600">GROUP BY는 행을 줄이고, 윈도우 함수는 행을 유지합니다. 그 차이를 직접 비교합니다.</p>
            </header>
            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm min-h-[90px]">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[350px] flex flex-col justify-center">{renderViz()}</div>
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="px-5 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg font-medium disabled:opacity-30 disabled:cursor-not-allowed">이전</button>
                <div className="flex items-center gap-4">
                  <button onClick={togglePlay} className={`px-5 py-2 rounded-lg font-medium ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-blue-600 hover:bg-blue-700 text-white'}`}>{isPlaying ? '일시 정지' : (isEnd ? '처음부터' : '자동 실행')}</button>
                  <div className="flex gap-1">{STEPS.map((_, i) => <button key={i} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }} className={`w-3 h-3 rounded-full ${i === currentStepIdx ? 'bg-blue-600' : i < currentStepIdx ? 'bg-blue-300' : 'bg-slate-200'}`} />)}</div>
                  <span className="text-xs text-slate-400 font-mono">{currentStepIdx + 1}/{STEPS.length}</span>
                </div>
                <button onClick={handleNext} disabled={isEnd} className="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium disabled:opacity-30 disabled:cursor-not-allowed">다음</button>
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
