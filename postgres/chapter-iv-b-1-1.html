  <!--
    PostgreSQL Chapter IV-B-1-1 — Window Functions 기초
    학습 목표: OVER() → ROW_NUMBER → RANK/DENSE_RANK → 누적/이동(SUM/AVG OVER ORDER BY) → GROUP BY 대비
              5단계로 윈도우 함수가 "행을 줄이지 않고 옆 칸에 결과를 붙이는" 방식임을 보여준다.
    예시 도메인: 매출 5건 (강남점 월~금)
    패턴: fastapi v1 — 좌(LiveDataPane: 행 박스 + 윈도우 결과 컬럼) / 우(VSCode CodeViewer 5탭)
    색상: orange (postgres 도메인)
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─────────────────────────────────────────────────────
    // 기본 5행 — 강남점 월~금 매출 (단위: 만원)
    //   step별로 옆에 윈도우 함수 결과 컬럼이 추가/변화한다
    // ─────────────────────────────────────────────────────
    const BASE_ROWS = [
      { day: '월', amount: 28 },
      { day: '화', amount: 35 },
      { day: '수', amount: 30 },
      { day: '목', amount: 35 },
      { day: '금', amount: 32 },
    ];

    // ─────────────────────────────────────────────────────
    // STEPS — 각 단계는 좌측 행 박스에 붙는 "추가 컬럼"을 정의
    //   extraCols : [{ key, label, values: [row별 값] }]
    //   highlightCol : 강조할 컬럼 key
    //   compareRows  : Step 5 GROUP BY 결과 (행이 줄어듦)
    //   code         : 우측 CodeViewer (lang, filename, lines, highlight)
    // ─────────────────────────────────────────────────────
    const STEPS = [
      {
        title: 'Step 1. OVER() — 전체 행을 하나의 창으로',
        desc: 'OVER() 빈 괄호는 "테이블 전체를 하나의 윈도우(창)로 본다"는 뜻이다. AVG(amount) OVER()를 붙이면 5개 행이 그대로 유지되면서 각 행 옆에 "전체 평균 32"가 똑같이 붙는다. GROUP BY는 행을 줄이지만 OVER()는 행을 줄이지 않는다. 이것이 윈도우 함수의 가장 큰 차이점이다.',
        rows: BASE_ROWS,
        extraCols: [
          {
            key: 'avg_all',
            label: 'AVG OVER()',
            values: ['32.0', '32.0', '32.0', '32.0', '32.0'],
          },
        ],
        highlightCol: 'avg_all',
        keyPoint: 'OVER()는 빈 창 = 전체 행 대상. 모든 행에 같은 집계값이 붙는다. 행 개수는 그대로.',
        code: {
          lang: 'sql',
          filename: 'over.sql',
          lines: [
            '-- Step 1. OVER() — 전체 행을 하나의 윈도우로',
            '-- "AVG를 옆에 붙이고 싶다. 그런데 행은 줄이고 싶지 않다."',
            '-- 이럴 때 윈도우 함수를 쓴다.',
            '',
            'SELECT',
            '  day,',
            '  amount,',
            '  AVG(amount) OVER ()  AS avg_all   -- 전체 평균',
            'FROM sales;',
            '',
            '-- 결과 (5행 그대로 유지)',
            '--  day | amount | avg_all',
            '-- -----+--------+---------',
            '--  월  |  28    |  32.0',
            '--  화  |  35    |  32.0',
            '--  수  |  30    |  32.0',
            '--  목  |  35    |  32.0',
            '--  금  |  32    |  32.0',
            '',
            '-- 핵심:',
            '--  • OVER () 의 빈 괄호 = "전체 행 = 하나의 창"',
            '--  • AVG 가 옆에 컬럼으로 붙는다 (행을 줄이지 않음)',
            '--  • GROUP BY 였다면 행이 1개로 줄었을 것이다',
            '',
            '-- 비교:  SELECT AVG(amount) FROM sales;  → 1행, 컬럼만 평균',
            '--        SELECT amount, AVG(amount) OVER() FROM sales;  → 5행, 옆에 평균',
          ],
          highlight: [5, 6, 7, 8, 21, 22, 23],
        },
      },
      {
        title: 'Step 2. ROW_NUMBER() OVER (ORDER BY ...) — 순번 매기기',
        desc: 'ROW_NUMBER()는 OVER 안의 ORDER BY 기준으로 1, 2, 3, 4, 5 순번을 매긴다. amount 내림차순으로 매기면 35인 두 행(화/목)에도 서로 다른 번호가 붙는다. ROW_NUMBER는 "동률을 무시하고 무조건 1씩 증가"한다. "매출 상위 3등만 뽑기" 같은 페이지네이션, TOP-N 쿼리의 기본 도구다.',
        rows: BASE_ROWS,
        extraCols: [
          {
            key: 'rn',
            label: 'ROW_NUMBER',
            values: ['5', '1', '4', '2', '3'],
          },
        ],
        highlightCol: 'rn',
        keyPoint: 'ROW_NUMBER = 동률 무시, 무조건 1씩 증가. ORDER BY 기준으로 순번 부여.',
        code: {
          lang: 'sql',
          filename: 'row-number.sql',
          lines: [
            '-- Step 2. ROW_NUMBER() — 행마다 고유 순번',
            '-- "매출 1등은 누구? 2등은? 3등은?"',
            '',
            'SELECT',
            '  day,',
            '  amount,',
            '  ROW_NUMBER() OVER (ORDER BY amount DESC) AS rn',
            'FROM sales;',
            '',
            '-- 결과 (amount 내림차순으로 1~5 부여)',
            '--  day | amount | rn',
            '-- -----+--------+----',
            '--  화  |  35    |  1   ← 동률이어도',
            '--  목  |  35    |  2   ← 다른 번호 부여',
            '--  금  |  32    |  3',
            '--  수  |  30    |  4',
            '--  월  |  28    |  5',
            '',
            '-- 핵심:',
            '--  • ORDER BY amount DESC → 큰 값부터 1, 2, 3...',
            '--  • 화/목이 둘 다 35 이지만 무조건 1, 2 로 갈라진다',
            '--  • 동률 처리 규칙이 없으면 PostgreSQL 이 임의로 정한다',
            '',
            '-- 실무: TOP-N 페이지네이션',
            'SELECT * FROM (',
            '  SELECT day, amount,',
            '         ROW_NUMBER() OVER (ORDER BY amount DESC) AS rn',
            '  FROM sales',
            ') t WHERE rn <= 3;   -- 매출 상위 3등만',
          ],
          highlight: [3, 4, 5, 6, 7, 19, 20, 21, 22, 24, 25, 26, 27, 28],
        },
      },
      {
        title: 'Step 3. RANK / DENSE_RANK — 동률 처리 방식 비교',
        desc: 'RANK는 동률을 같은 순위로 묶고 다음 번호를 "건너뛴다" (1, 2, 2, 4 — 3번이 비어 있음). DENSE_RANK는 같은 순위로 묶지만 다음 번호를 "건너뛰지 않는다" (1, 2, 2, 3). 올림픽 메달처럼 공동 1등 두 명이면 2등 없이 바로 3등이 RANK. 학년 등수처럼 빈 자리 없이 1, 2, 2, 3이 DENSE_RANK. 동률 처리 정책이 비즈니스 요구사항에 따라 달라진다.',
        rows: BASE_ROWS,
        extraCols: [
          {
            key: 'rn',
            label: 'ROW_NUMBER',
            values: ['5', '1', '4', '2', '3'],
          },
          {
            key: 'rk',
            label: 'RANK',
            values: ['5', '1', '4', '1', '3'],
          },
          {
            key: 'dr',
            label: 'DENSE_RANK',
            values: ['4', '1', '3', '1', '2'],
          },
        ],
        highlightCol: 'rk',
        keyPoint: 'RANK = 동률 묶음 + 다음 번호 건너뜀. DENSE_RANK = 동률 묶음 + 다음 번호 안 건너뜀.',
        code: {
          lang: 'sql',
          filename: 'rank.sql',
          lines: [
            '-- Step 3. RANK vs DENSE_RANK — 동률(tie) 처리',
            '-- 화(35) 와 목(35) 이 똑같다. 어떻게 순위를 매길까?',
            '',
            'SELECT',
            '  day,',
            '  amount,',
            '  ROW_NUMBER() OVER (ORDER BY amount DESC) AS rn,',
            '  RANK()       OVER (ORDER BY amount DESC) AS rk,',
            '  DENSE_RANK() OVER (ORDER BY amount DESC) AS dr',
            'FROM sales;',
            '',
            '-- 결과',
            '--  day | amount | rn | rk | dr',
            '-- -----+--------+----+----+----',
            '--  화  |  35    |  1 |  1 |  1',
            '--  목  |  35    |  2 |  1 |  1   ← 동률 처리 시작',
            '--  금  |  32    |  3 |  3 |  2   ← rk는 2 건너뜀, dr은 안 건너뜀',
            '--  수  |  30    |  4 |  4 |  3',
            '--  월  |  28    |  5 |  5 |  4',
            '',
            '-- 세 함수의 차이를 한 줄로:',
            '--  • ROW_NUMBER  : 동률 무시, 무조건 1씩 증가  (1, 2, 3, 4, 5)',
            '--  • RANK        : 동률 같은 순위 + 다음 번호 건너뜀  (1, 1, 3, 4, 5)',
            '--  • DENSE_RANK  : 동률 같은 순위 + 다음 번호 안 건너뜀 (1, 1, 2, 3, 4)',
            '',
            '-- 언제 어느 것?',
            '--  • 올림픽 메달 (공동 1등 → 다음은 3등)         → RANK',
            '--  • 학년 등수   (공동 1등 → 다음은 2등)         → DENSE_RANK',
            '--  • 페이지네이션/TOP-N (순서만 유일하면 됨)    → ROW_NUMBER',
          ],
          highlight: [3, 4, 5, 6, 7, 8, 9, 21, 22, 23, 24, 26, 27, 28, 29],
        },
      },
      {
        title: 'Step 4. SUM/AVG OVER (ORDER BY ...) — 누적합과 이동평균',
        desc: 'OVER 안에 ORDER BY를 넣고 SUM을 쓰면 "누적합(running sum)"이 된다. 월부터 시작해서 그 행까지의 합계가 행마다 붙는다. 28 → 28+35=63 → 63+30=93 → 93+35=128 → 128+32=160. 같은 방식으로 AVG는 "현재 시점까지의 평균"이 된다. 매출 추이 그래프, 누적 매출 차트, 이동 평균선 같은 분석 쿼리의 핵심이다. ORDER BY가 없으면 누적이 정의되지 않으므로 반드시 필요하다.',
        rows: BASE_ROWS,
        extraCols: [
          {
            key: 'rsum',
            label: 'SUM OVER(ORDER BY day)',
            values: ['28', '63', '93', '128', '160'],
          },
          {
            key: 'ravg',
            label: 'AVG OVER(ORDER BY day)',
            values: ['28.0', '31.5', '31.0', '32.0', '32.0'],
          },
        ],
        highlightCol: 'rsum',
        keyPoint: 'OVER + ORDER BY → 누적/이동 계산. 행 단위로 "지금까지의 합/평균"이 붙는다.',
        code: {
          lang: 'sql',
          filename: 'running-sum.sql',
          lines: [
            '-- Step 4. SUM / AVG OVER (ORDER BY ...) — 누적과 이동',
            '-- ORDER BY 가 들어가면 "그 행까지의" 집계가 된다.',
            '',
            'SELECT',
            '  day,',
            '  amount,',
            '  SUM(amount) OVER (ORDER BY day) AS running_sum,',
            '  AVG(amount) OVER (ORDER BY day) AS running_avg',
            'FROM sales;',
            '',
            '-- 결과 (월부터 누적)',
            '--  day | amount | running_sum | running_avg',
            '-- -----+--------+-------------+-------------',
            '--  월  |  28    |     28      |   28.0',
            '--  화  |  35    |     63      |   31.5      ← (28+35)/2',
            '--  수  |  30    |     93      |   31.0      ← (28+35+30)/3',
            '--  목  |  35    |    128      |   32.0',
            '--  금  |  32    |    160      |   32.0',
            '',
            '-- 핵심:',
            '--  • ORDER BY 가 없으면 누적의 "순서"가 정의되지 않는다',
            '--  • 기본 프레임: RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW',
            '--    (시작부터 현재 행까지)',
            '',
            '-- 응용: 7일 이동평균 (날씨/주가 분석의 기본)',
            'SELECT day, amount,',
            '       AVG(amount) OVER (',
            '         ORDER BY day',
            '         ROWS BETWEEN 6 PRECEDING AND CURRENT ROW',
            '       ) AS moving_avg_7d',
            'FROM sales;',
            '',
            '-- 실무 예: 일자별 누적 매출, 월별 누적 가입자, 이동평균선',
          ],
          highlight: [3, 4, 5, 6, 7, 8, 20, 21, 22, 23, 25, 26, 27, 28, 29, 30, 31],
        },
      },
      {
        title: 'Step 5. GROUP BY vs Window — 행을 줄이느냐, 옆에 붙이느냐',
        desc: '같은 평균을 구해도 GROUP BY는 행이 1개로 줄어든다. 윈도우 함수는 5개 행이 그대로 유지되고 옆에 평균 컬럼이 추가될 뿐이다. "전체 합계를 보면서 각 행이 차지하는 비율을 같이 보고 싶다" 같은 요구사항은 GROUP BY로는 한 쿼리에 못 한다. 윈도우 함수는 한 쿼리로 가능하다. 두 기능은 대체재가 아니라 "행을 집계하느냐, 행마다 집계값을 옆에 붙이느냐"의 차이다.',
        rows: BASE_ROWS,
        extraCols: [
          {
            key: 'avg_win',
            label: 'AVG OVER() (window)',
            values: ['32.0', '32.0', '32.0', '32.0', '32.0'],
          },
          {
            key: 'pct',
            label: '% of total',
            values: ['17.5%', '21.9%', '18.8%', '21.9%', '20.0%'],
          },
        ],
        highlightCol: 'pct',
        compareRows: [
          { day: '전체', amount: '160 (SUM)' },
          { day: '평균', amount: '32 (AVG)' },
        ],
        keyPoint: 'GROUP BY는 행을 줄여 집계. Window는 행을 유지하며 옆에 집계값을 붙임. 목적이 다른 도구.',
        code: {
          lang: 'sql',
          filename: 'compare.sql',
          lines: [
            '-- Step 5. GROUP BY vs Window Function',
            '-- "같은 평균을 구한다" 같아 보이지만 결과 구조가 다르다.',
            '',
            '-- ① GROUP BY — 행을 줄여서 집계',
            'SELECT AVG(amount) AS avg_all,',
            '       SUM(amount) AS total',
            'FROM sales;',
            '-- 결과 (1행)',
            '--  avg_all | total',
            '-- ---------+-------',
            '--   32.0   |  160',
            '',
            '-- ② Window — 행 유지, 옆에 집계값 + 비율까지 한 번에',
            'SELECT',
            '  day,',
            '  amount,',
            '  AVG(amount) OVER ()                AS avg_all,',
            '  SUM(amount) OVER ()                AS total,',
            '  ROUND(100.0 * amount /',
            '        SUM(amount) OVER (), 1)      AS pct_of_total',
            'FROM sales;',
            '-- 결과 (5행 유지)',
            '--  day | amount | avg_all | total | pct_of_total',
            '-- -----+--------+---------+-------+--------------',
            '--  월  |  28    |  32.0   |  160  |  17.5',
            '--  화  |  35    |  32.0   |  160  |  21.9',
            '--  수  |  30    |  32.0   |  160  |  18.8',
            '--  목  |  35    |  32.0   |  160  |  21.9',
            '--  금  |  32    |  32.0   |  160  |  20.0',
            '',
            '-- 한 줄 요약:',
            '--  • GROUP BY  : 행을 줄여 묶음당 1줄 (보고서/요약)',
            '--  • Window    : 행 유지, 옆 컬럼에 집계 (분석/비율/순위/누적)',
            '',
            '-- 같이 못 쓰는 게 아니라 "동시에 쓸 수 있다"',
            'SELECT day, amount,',
            '       SUM(amount) OVER () AS total,',
            '       amount * 1.0 / SUM(amount) OVER () AS ratio',
            'FROM sales;  -- GROUP BY 로는 한 번에 못 함',
          ],
          highlight: [3, 4, 5, 6, 12, 13, 14, 15, 16, 17, 18, 19, 20, 31, 32, 33, 35, 36, 37, 38, 39],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — 행 박스 + 옆 윈도우 결과 컬럼
    // ─────────────────────────────────────────────────────
    function RowTable({ rows, extraCols, highlightCol }) {
      return (
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="bg-orange-100 text-orange-900">
                <th className="px-2 py-1.5 text-left font-semibold border border-orange-200">day</th>
                <th className="px-2 py-1.5 text-right font-semibold border border-orange-200">amount</th>
                {extraCols.map((col) => (
                  <th
                    key={col.key}
                    className={`px-2 py-1.5 text-right font-semibold border border-orange-200 ${
                      col.key === highlightCol ? 'bg-orange-500 text-white' : ''
                    }`}
                  >
                    {col.label}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map((row, i) => (
                <tr key={i} className="hover:bg-orange-50">
                  <td className="px-2 py-1.5 border border-orange-200 font-bold text-orange-800">{row.day}</td>
                  <td className="px-2 py-1.5 border border-orange-200 text-right font-mono text-orange-900">{row.amount}</td>
                  {extraCols.map((col) => (
                    <td
                      key={col.key}
                      className={`px-2 py-1.5 border border-orange-200 text-right font-mono ${
                        col.key === highlightCol
                          ? 'bg-orange-100 text-orange-900 font-bold'
                          : 'text-slate-700'
                      }`}
                    >
                      {col.values[i]}
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function CompareBox({ rows }) {
      if (!rows) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-dashed border-orange-400 bg-orange-50 p-3">
          <div className="text-xs font-bold text-orange-800 mb-2">📦 GROUP BY 결과 (행이 줄어듦)</div>
          <table className="w-full text-sm">
            <tbody>
              {rows.map((r, i) => (
                <tr key={i}>
                  <td className="px-2 py-1 font-bold text-orange-800 w-16">{r.day}</td>
                  <td className="px-2 py-1 font-mono text-orange-900">{r.amount}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div className="mt-2 text-[11px] text-orange-700">↑ 5행 → 1~2행으로 축소. 개별 day 정보는 사라짐.</div>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-orange-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-orange-800">윈도우 함수 결과 시뮬레이션</h3>
            <span className="text-[10px] text-slate-500">sales 테이블 (강남점 월~금)</span>
          </div>
          <RowTable rows={state.rows} extraCols={state.extraCols} highlightCol={state.highlightCol} />
          <CompareBox rows={state.compareRows} />
          <div className="mt-3 text-xs text-orange-900 bg-orange-50 border border-orange-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-orange-500/15 border-l-2 border-orange-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-orange-600 text-white font-bold">IV</span>
              <div>
                <h1 className="text-2xl font-bold text-orange-900">Chapter IV-B-1-1. Window Functions 기초</h1>
                <p className="text-sm text-orange-800/80">OVER() → ROW_NUMBER → RANK → 누적합 → GROUP BY 대비. 5단계로 추적</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-orange-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-orange-600' : 'bg-orange-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-orange-700 text-orange-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-orange-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-orange-700 text-white' : 'bg-orange-600 text-white hover:bg-orange-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-orange-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-orange-400 bg-white px-4 py-3 text-sm text-orange-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                Window 함수는 "행을 줄이지 않고 옆에 집계 컬럼을 붙이는" 도구다. OVER() 빈 괄호는 전체 창, ORDER BY를 넣으면 순위/누적이 된다. 동률 처리는 ROW_NUMBER/RANK/DENSE_RANK로 정책을 고른다. GROUP BY와 대체재가 아니라 목적이 다른 별개 도구다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['OVER', 'ROW_NUMBER', 'RANK', 'DENSE_RANK', 'PARTITION BY', 'SUM OVER', '누적합', 'GROUP BY'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-orange-100 text-orange-800 border border-orange-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-orange-700">
              <a href="./index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./chapter-iv-b-1-2.html" className="underline hover:no-underline">다음: IV-B-1-2 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
