<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — Chapter IV-B-1-2. Window Functions 실전</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SALES = [
      { ym: '2024-01', amount: 1200000 },
      { ym: '2024-02', amount: 1500000 },
      { ym: '2024-03', amount: 1100000 },
      { ym: '2024-04', amount: 1800000 },
      { ym: '2024-05', amount: 1600000 },
      { ym: '2024-06', amount: 2000000 }
    ];

    const STEPS = [
      { label: "원본 데이터", desc: "[Step 1] 6개월간 월별 매출 데이터입니다. 이 데이터로 전월 대비 증감, 누적합, 이동평균을 윈도우 함수로 계산해 봅니다.", phase: "data" },
      { label: "LAG — 전월 비교", desc: "[Step 2] LAG(amount) OVER(ORDER BY ym)은 이전 행의 값을 가져옵니다. 현재 매출에서 전월 매출을 빼면 증감액을 알 수 있습니다. 첫 행은 이전 값이 없어 NULL입니다.", phase: "lag" },
      { label: "LEAD — 다음 달 참조", desc: "[Step 3] LEAD(amount) OVER(ORDER BY ym)은 다음 행의 값을 가져옵니다. 마지막 행은 다음 값이 없어 NULL입니다. LAG와 반대 방향입니다.", phase: "lead" },
      { label: "누적합 (Running Total)", desc: "[Step 4] SUM(amount) OVER(ORDER BY ym)은 첫 행부터 현재 행까지의 합계를 누적합니다. 기본 프레임이 UNBOUNDED PRECEDING ~ CURRENT ROW이기 때문입니다.", phase: "cumsum" },
      { label: "3개월 이동평균", desc: "[Step 5] AVG(amount) OVER(ORDER BY ym ROWS BETWEEN 2 PRECEDING AND CURRENT ROW)는 현재 행과 앞 2행, 총 3행의 평균입니다. 주식 차트의 이동평균선과 같은 원리입니다.", phase: "movavg" },
      { label: "종합 비교", desc: "[Step 6] 한 쿼리에 LAG, SUM OVER, AVG OVER를 모두 사용할 수 있습니다. 윈도우 함수는 원본 행을 유지하면서 다양한 분석 열을 추가하는 강력한 도구입니다.", phase: "all" }
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(prev => { if (prev < STEPS.length - 1) return prev + 1; setIsPlaying(false); return prev; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4500); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const phase = stepData.phase;

      const computed = SALES.map((s, i) => {
        const prev = i > 0 ? SALES[i-1].amount : null;
        const next = i < SALES.length - 1 ? SALES[i+1].amount : null;
        let cumsum = 0; for (let j = 0; j <= i; j++) cumsum += SALES[j].amount;
        const start = Math.max(0, i - 2);
        let mavgSum = 0; let mavgCnt = 0;
        for (let j = start; j <= i; j++) { mavgSum += SALES[j].amount; mavgCnt++; }
        return { ...s, prev, next, diff: prev !== null ? s.amount - prev : null, cumsum, mavg: Math.round(mavgSum / mavgCnt) };
      });

      const fmt = n => n !== null && n !== undefined ? n.toLocaleString() : 'NULL';
      const diffColor = n => n > 0 ? 'text-green-600' : n < 0 ? 'text-red-600' : 'text-slate-500';

      const renderViz = () => {
        const cols = { data: ['ym','amount'], lag: ['ym','amount','prev','diff'], lead: ['ym','amount','next'], cumsum: ['ym','amount','cumsum'], movavg: ['ym','amount','mavg'], all: ['ym','amount','diff','cumsum','mavg'] };
        const headers = { ym: '월', amount: '매출', prev: '전월(LAG)', diff: '증감액', next: '다음달(LEAD)', cumsum: '누적합', mavg: '3M 이동평균' };
        const currentCols = cols[phase] || cols.data;

        return (
          <div className="space-y-4">
            {phase !== 'data' && (
              <div className="bg-slate-800 text-green-300 p-3 rounded-lg font-mono text-xs overflow-x-auto">
                {phase === 'lag' && <div>SELECT ym, amount, <span className="text-yellow-300">LAG(amount) OVER(ORDER BY ym)</span> AS prev, amount - LAG(amount) OVER(ORDER BY ym) AS diff FROM monthly_sales;</div>}
                {phase === 'lead' && <div>SELECT ym, amount, <span className="text-yellow-300">LEAD(amount) OVER(ORDER BY ym)</span> AS next FROM monthly_sales;</div>}
                {phase === 'cumsum' && <div>SELECT ym, amount, <span className="text-yellow-300">SUM(amount) OVER(ORDER BY ym)</span> AS cumsum FROM monthly_sales;</div>}
                {phase === 'movavg' && <div>SELECT ym, amount, <span className="text-yellow-300">AVG(amount) OVER(ORDER BY ym ROWS BETWEEN 2 PRECEDING AND CURRENT ROW)</span> AS mavg FROM monthly_sales;</div>}
                {phase === 'all' && <div>SELECT ym, amount, amount - LAG(amount) OVER(ORDER BY ym) AS diff, SUM(amount) OVER(ORDER BY ym) AS cumsum, AVG(amount) OVER(ORDER BY ym ROWS BETWEEN 2 PRECEDING AND CURRENT ROW) AS mavg FROM monthly_sales;</div>}
              </div>
            )}
            <table className="w-full text-sm">
              <thead><tr className="bg-slate-100 border-b-2">{currentCols.map(c => <th key={c} className={`p-2 ${c === 'ym' ? 'text-left' : 'text-right'} ${['prev','diff','next','cumsum','mavg'].includes(c) ? 'bg-blue-50 text-blue-700' : ''}`}>{headers[c]}</th>)}</tr></thead>
              <tbody>{computed.map((r, i) => (
                <tr key={i} className="border-t hover:bg-slate-50">
                  {currentCols.map(c => {
                    const val = r[c];
                    const isHighlight = ['prev','diff','next','cumsum','mavg'].includes(c);
                    const isDiff = c === 'diff';
                    return <td key={c} className={`p-2 font-mono ${c === 'ym' ? 'text-left' : 'text-right'} ${isHighlight ? 'font-bold' : ''} ${isDiff && val !== null ? diffColor(val) : isHighlight ? 'text-blue-700' : ''}`}>
                      {c === 'ym' ? val : val === null ? <span className="text-slate-400 italic">NULL</span> : fmt(val)}
                      {isDiff && val !== null && <span className="text-xs ml-1">{val > 0 ? '+' : ''}{fmt(val)}</span>}
                    </td>;
                  })}
                </tr>
              ))}</tbody>
            </table>
            {phase === 'movavg' && (
              <div className="bg-blue-50 border border-blue-300 p-2 rounded text-xs text-center text-blue-700">
                1월: 1개월 평균 | 2월: 2개월 평균 | 3월부터: 3개월 평균 (ROWS BETWEEN 2 PRECEDING AND CURRENT ROW)
              </div>
            )}
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold">IV-B-1-2. Window Functions 실전</h1>
              </div>
              <p className="text-slate-600">LAG/LEAD로 이전·다음 행을 참조하고, SUM/AVG OVER로 누적합과 이동평균을 계산합니다.</p>
            </header>
            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm min-h-[90px]">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>
            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[350px] flex flex-col justify-center">{renderViz()}</div>
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center justify-between">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="px-5 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg font-medium disabled:opacity-30 disabled:cursor-not-allowed">이전</button>
                <div className="flex items-center gap-4">
                  <button onClick={togglePlay} className={`px-5 py-2 rounded-lg font-medium ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-blue-600 hover:bg-blue-700 text-white'}`}>{isPlaying ? '일시 정지' : (isEnd ? '처음부터' : '자동 실행')}</button>
                  <div className="flex gap-1">{STEPS.map((_, i) => <button key={i} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }} className={`w-3 h-3 rounded-full ${i === currentStepIdx ? 'bg-blue-600' : i < currentStepIdx ? 'bg-blue-300' : 'bg-slate-200'}`} />)}</div>
                  <span className="text-xs text-slate-400 font-mono">{currentStepIdx + 1}/{STEPS.length}</span>
                </div>
                <button onClick={handleNext} disabled={isEnd} className="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium disabled:opacity-30 disabled:cursor-not-allowed">다음</button>
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
