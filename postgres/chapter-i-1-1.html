<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — Chapter I-1-1. 데이터와 정보의 차이</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    PostgreSQL Chapter I-1-1 — 데이터와 정보의 차이
    학습 목표: 데이터(원재료)와 정보(맥락이 붙은 의미 있는 값)의 차이를 이해하고,
              구조화(structuring)와 레코드(record)의 개념을 체험한다.
    조작법: "자동 실행" 버튼으로 재생, 이전/다음 버튼으로 수동 전환.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // -----------------------------------------
    // 1. 시뮬레이션 스텝 정의
    // -----------------------------------------
    const STEPS = [
      {
        label: "원재료 등장",
        desc: "[Step 1: 데이터 — 해석되지 않은 원재료] 숫자 '25', 문자열 'Alice', 날짜 '2000-03-15'가 화면에 흩어져 있습니다. 이것들은 아직 아무 맥락 없이 존재하는 '데이터(data)'입니다. 이 상태로는 25가 나이인지, 온도인지, 점수인지 알 수 없습니다.",
        phase: "raw",
        highlight: null
      },
      {
        label: "맥락 부여",
        desc: "[Step 2: 맥락(Context) 부여] 각 데이터에 '이름', '나이', '생년월일'이라는 라벨이 붙습니다. '25'는 '나이'라는 맥락을 얻어 '이 사람은 25살이다'라는 의미를 갖게 됩니다. 데이터에 맥락이 붙으면 '정보(information)'가 됩니다.",
        phase: "context",
        highlight: "labels"
      },
      {
        label: "정보 완성",
        desc: "[Step 3: 정보 — 의미 있는 해석] 'Alice라는 사람의 나이는 25세이고, 2000년 3월 15일에 태어났다.' 같은 숫자 '25'도 나이, 기온, 점수 중 무엇인지에 따라 전혀 다른 정보가 됩니다. 데이터베이스는 이 맥락을 보존하는 역할을 합니다.",
        phase: "information",
        highlight: "meaning"
      },
      {
        label: "구조화",
        desc: "[Step 4: 구조화(Structuring)] 데이터를 정해진 틀(칸)에 맞게 배열합니다. '이 값은 이름, 저 값은 나이, 그 값은 생년월일'이라는 틀에 맞추면 구조화된 데이터가 됩니다. 이 틀에 맞는 하나의 묶음을 레코드(record)라고 부릅니다.",
        phase: "structuring",
        highlight: "columns"
      },
      {
        label: "테이블 완성",
        desc: "[Step 5: 테이블 — 레코드의 모음] 여러 레코드를 모으면 테이블이 됩니다. 이제 '나이가 25세인 사람의 이름은?'이라는 질문에 바로 답할 수 있습니다. 맥락 없이 숫자만 나열된 텍스트 파일에서는 이 질문에 답하기가 훨씬 어렵습니다.",
        phase: "table",
        highlight: "query"
      }
    ];

    // -----------------------------------------
    // 2. 시각화에 사용할 데이터
    // -----------------------------------------
    const RAW_DATA = ['25', 'Alice', '2000-03-15', '30', 'Bob', '1995-07-22'];
    const LABELS = ['나이', '이름', '생년월일', '나이', '이름', '생년월일'];
    const RECORDS = [
      { name: 'Alice', age: 25, birth: '2000-03-15' },
      { name: 'Bob', age: 30, birth: '1995-07-22' }
    ];

    // -----------------------------------------
    // 3. 상태 색상 헬퍼
    // -----------------------------------------
    const getPhaseClass = (current, target) => {
      if (current === target) return 'ring-2 ring-blue-400 shadow-lg scale-105';
      return '';
    };

    // -----------------------------------------
    // 4. 메인 앱 컴포넌트
    // -----------------------------------------
    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">

            {/* 헤더 */}
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">I-1-1. 데이터와 정보의 차이</h1>
              </div>
              <p className="text-slate-600">
                숫자, 문자 같은 <b>데이터(원재료)</b>에 맥락이 붙으면 <b>정보</b>가 됩니다.
                데이터베이스는 이 맥락을 보존하여 언제든 정보로 꺼낼 수 있게 합니다.
              </p>
            </header>

            {/* 현재 단계 설명 */}
            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 flex flex-col justify-center min-h-[110px]">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 시각화 영역 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">

              {/* 왼쪽: 변환 과정 시각화 */}
              <div className="flex flex-col space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 min-h-[400px] flex flex-col justify-center">
                  <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">데이터 → 정보 변환</div>

                  {/* Phase 1: 원재료 (항상 표시) */}
                  {stepData.phase === 'raw' && (
                    <div className="space-y-4 transition-all duration-500">
                      <div className="text-sm font-semibold text-slate-500 mb-2">흩어진 원재료 (데이터)</div>
                      <div className="flex flex-wrap gap-3 justify-center">
                        {RAW_DATA.map((d, i) => (
                          <div key={i} className="px-4 py-3 bg-amber-50 border-2 border-amber-300 rounded-lg text-lg font-mono font-bold text-amber-800 animate-bounce" style={{animationDelay: `${i * 0.15}s`, animationDuration: '2s'}}>
                            {d}
                          </div>
                        ))}
                      </div>
                      <div className="text-center text-sm text-slate-400 mt-4">25가 나이? 온도? 점수? 알 수 없다</div>
                    </div>
                  )}

                  {/* Phase 2: 맥락 부여 */}
                  {stepData.phase === 'context' && (
                    <div className="space-y-4 transition-all duration-500">
                      <div className="text-sm font-semibold text-slate-500 mb-2">맥락(라벨) 부여</div>
                      <div className="flex flex-wrap gap-3 justify-center">
                        {RAW_DATA.map((d, i) => (
                          <div key={i} className="flex flex-col items-center gap-1">
                            <div className="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded">{LABELS[i]}</div>
                            <div className="w-0.5 h-3 bg-blue-300"></div>
                            <div className="px-4 py-3 bg-blue-50 border-2 border-blue-400 rounded-lg text-lg font-mono font-bold text-blue-800">
                              {d}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Phase 3: 정보 완성 */}
                  {stepData.phase === 'information' && (
                    <div className="space-y-4 transition-all duration-500">
                      <div className="text-sm font-semibold text-slate-500 mb-2">정보 완성</div>
                      <div className="space-y-3">
                        <div className="p-4 bg-emerald-50 border-2 border-emerald-400 rounded-lg">
                          <span className="text-emerald-800 font-medium">"<b>Alice</b>라는 사람의 <b>나이는 25세</b>이고, <b>2000-03-15</b>에 태어났다."</span>
                        </div>
                        <div className="p-4 bg-emerald-50 border-2 border-emerald-400 rounded-lg">
                          <span className="text-emerald-800 font-medium">"<b>Bob</b>이라는 사람의 <b>나이는 30세</b>이고, <b>1995-07-22</b>에 태어났다."</span>
                        </div>
                      </div>
                      <div className="flex items-center justify-center gap-4 mt-4">
                        <div className="text-center">
                          <div className="text-xs text-amber-600 font-bold">데이터</div>
                          <div className="text-2xl">📦</div>
                          <div className="text-xs text-slate-400">원재료</div>
                        </div>
                        <div className="text-2xl text-slate-300">→</div>
                        <div className="text-center">
                          <div className="text-xs text-blue-600 font-bold">+ 맥락</div>
                          <div className="text-2xl">🏷️</div>
                          <div className="text-xs text-slate-400">라벨</div>
                        </div>
                        <div className="text-2xl text-slate-300">→</div>
                        <div className="text-center">
                          <div className="text-xs text-emerald-600 font-bold">정보</div>
                          <div className="text-2xl">💡</div>
                          <div className="text-xs text-slate-400">의미</div>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Phase 4: 구조화 */}
                  {stepData.phase === 'structuring' && (
                    <div className="space-y-4 transition-all duration-500">
                      <div className="text-sm font-semibold text-slate-500 mb-2">구조화 — 틀에 맞게 배열</div>
                      <div className="space-y-2">
                        <div className="flex gap-2">
                          <div className="flex-1 p-2 bg-slate-700 text-white text-center text-sm font-bold rounded">이름</div>
                          <div className="flex-1 p-2 bg-slate-700 text-white text-center text-sm font-bold rounded">나이</div>
                          <div className="flex-1 p-2 bg-slate-700 text-white text-center text-sm font-bold rounded">생년월일</div>
                        </div>
                        <div className="flex gap-2 ring-2 ring-blue-400 rounded-lg p-1">
                          <div className="flex-1 p-2 bg-blue-50 text-center font-mono rounded">Alice</div>
                          <div className="flex-1 p-2 bg-blue-50 text-center font-mono rounded">25</div>
                          <div className="flex-1 p-2 bg-blue-50 text-center font-mono rounded">2000-03-15</div>
                        </div>
                        <div className="text-center text-xs text-blue-500 font-bold">↑ 이것이 하나의 레코드(record)</div>
                      </div>
                      <div className="text-center text-sm text-slate-500 mt-2">
                        정해진 틀(이름/나이/생년월일)에 맞게 데이터를 배열 = <b>구조화(structuring)</b>
                      </div>
                    </div>
                  )}

                  {/* Phase 5: 테이블 */}
                  {stepData.phase === 'table' && (
                    <div className="space-y-4 transition-all duration-500">
                      <div className="text-sm font-semibold text-slate-500 mb-2">테이블 — 레코드의 모음</div>
                      <div className="overflow-hidden rounded-lg border-2 border-slate-300">
                        <table className="w-full text-sm">
                          <thead>
                            <tr className="bg-slate-700 text-white">
                              <th className="p-3 text-left">이름</th>
                              <th className="p-3 text-left">나이</th>
                              <th className="p-3 text-left">생년월일</th>
                            </tr>
                          </thead>
                          <tbody>
                            {RECORDS.map((r, i) => (
                              <tr key={i} className={`border-t border-slate-200 ${stepData.highlight === 'query' && r.age === 25 ? 'bg-emerald-100 ring-2 ring-emerald-400' : 'bg-white'}`}>
                                <td className="p-3 font-mono">{r.name}</td>
                                <td className="p-3 font-mono">{r.age}</td>
                                <td className="p-3 font-mono">{r.birth}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                      {stepData.highlight === 'query' && (
                        <div className="p-3 bg-emerald-50 border border-emerald-300 rounded-lg text-sm text-emerald-800">
                          <b>Q:</b> "나이가 25인 사람의 이름은?" → <b>A: Alice</b> (즉시 답변 가능!)
                        </div>
                      )}
                    </div>
                  )}
                </div>

                {/* 컨트롤 바 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button
                      aria-label="이전 단계"
                      onClick={handlePrev}
                      disabled={currentStepIdx === 0}
                      className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"
                    >
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true">
                        <path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/>
                      </svg>
                    </button>
                    <button
                      aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                      onClick={togglePlay}
                      className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition shadow-sm w-32 justify-center"
                    >
                      {isPlaying ? (
                        <>
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true">
                            <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
                          </svg>
                          정지
                        </>
                      ) : (
                        <>
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                          </svg>
                          자동 실행
                        </>
                      )}
                    </button>
                    <button
                      aria-label="다음 단계"
                      onClick={handleNext}
                      disabled={isEnd}
                      className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"
                    >
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true">
                        <path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/>
                      </svg>
                    </button>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex gap-1">
                      {STEPS.map((s, i) => (
                        <button
                          key={i}
                          onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                          aria-label={`Step ${i + 1}: ${s.label}`}
                          className={`w-2.5 h-2.5 rounded-full transition-all ${i === currentStepIdx ? 'bg-blue-600 scale-125' : i < currentStepIdx ? 'bg-blue-300' : 'bg-slate-200'}`}
                        />
                      ))}
                    </div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                      {currentStepIdx + 1} / {STEPS.length}
                    </div>
                  </div>
                </div>
              </div>

              {/* 오른쪽: 개념 비교 패널 */}
              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-white flex flex-col">
                  <div className="flex items-center px-4 py-3 bg-slate-100 border-b border-slate-200 gap-2">
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-500 font-semibold">개념 비교</span>
                  </div>
                  <div className="p-6 overflow-y-auto flex-1 space-y-6">

                    {/* 데이터 vs 정보 비교 */}
                    <div className="space-y-3">
                      <h3 className="text-sm font-bold text-slate-700 border-b pb-2">데이터 vs 정보</h3>
                      <div className={`p-4 rounded-lg border-2 transition-all duration-500 ${
                        stepData.phase === 'raw' ? 'border-amber-400 bg-amber-50 scale-[1.02]' : 'border-slate-200 bg-slate-50'
                      }`}>
                        <div className="text-xs font-bold text-amber-600 mb-1">데이터 (Data)</div>
                        <div className="text-sm text-slate-700">해석 전 원재료. 숫자, 문자, 날짜 등.</div>
                        <div className="mt-2 font-mono text-xs text-slate-500">25, Alice, 2000-03-15</div>
                      </div>
                      <div className="flex justify-center"><div className="w-0.5 h-4 bg-slate-300"></div></div>
                      <div className={`p-4 rounded-lg border-2 transition-all duration-500 ${
                        stepData.phase === 'information' || stepData.phase === 'context' ? 'border-emerald-400 bg-emerald-50 scale-[1.02]' : 'border-slate-200 bg-slate-50'
                      }`}>
                        <div className="text-xs font-bold text-emerald-600 mb-1">정보 (Information)</div>
                        <div className="text-sm text-slate-700">맥락이 붙어 의미를 가진 데이터.</div>
                        <div className="mt-2 font-mono text-xs text-slate-500">"Alice의 나이는 25세"</div>
                      </div>
                    </div>

                    {/* 구조화 & 레코드 */}
                    <div className="space-y-3">
                      <h3 className="text-sm font-bold text-slate-700 border-b pb-2">핵심 개념</h3>
                      <div className={`p-4 rounded-lg border-2 transition-all duration-500 ${
                        stepData.phase === 'structuring' ? 'border-blue-400 bg-blue-50 scale-[1.02]' : 'border-slate-200 bg-slate-50'
                      }`}>
                        <div className="text-xs font-bold text-blue-600 mb-1">구조화 (Structuring)</div>
                        <div className="text-sm text-slate-700">데이터를 정해진 틀(칸)에 맞게 배열하는 것.</div>
                      </div>
                      <div className={`p-4 rounded-lg border-2 transition-all duration-500 ${
                        stepData.phase === 'structuring' || stepData.phase === 'table' ? 'border-blue-400 bg-blue-50 scale-[1.02]' : 'border-slate-200 bg-slate-50'
                      }`}>
                        <div className="text-xs font-bold text-blue-600 mb-1">레코드 (Record)</div>
                        <div className="text-sm text-slate-700">구조화된 틀에 맞게 묶인 하나의 데이터 단위.</div>
                        <div className="mt-2 font-mono text-xs text-slate-500">Alice | 25 | 2000-03-15 → 1개의 레코드</div>
                      </div>
                    </div>

                    {/* DB 역할 */}
                    <div className={`p-4 rounded-lg border-2 transition-all duration-500 ${
                      stepData.phase === 'table' ? 'border-violet-400 bg-violet-50 scale-[1.02]' : 'border-slate-200 bg-slate-50'
                    }`}>
                      <div className="text-xs font-bold text-violet-600 mb-1">데이터베이스의 역할</div>
                      <div className="text-sm text-slate-700">
                        숫자 "25"를 "age(나이)" 칸에 저장하면, 나중에 꺼낼 때 그것이 무엇을 의미하는지 잃어버리지 않는다.
                        <b> 맥락을 보존</b>하는 것이 DB의 핵심 기능 중 하나.
                      </div>
                    </div>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
