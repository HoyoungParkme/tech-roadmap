<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const SECTIONS = [
      {
        part: 'I', label: 'Part I. 왜 데이터베이스인가', color: 'bg-emerald-600',
        items: [
          { id: 'I-1-1', title: '데이터와 정보의 차이', file: './chapter-i-1-1.html' },
          { id: 'I-1-2', title: '데이터는 어디에 저장되는가', file: './chapter-i-1-2.html' },
          { id: 'I-2-1', title: '파일 vs 데이터베이스', file: './chapter-i-2-1.html' },
          { id: 'I-2-2', title: 'DBMS의 4대 기능', file: './chapter-i-2-2.html' },
        ],
      },
      {
        part: 'II', label: 'Part II. 관계형 모델과 PostgreSQL', color: 'bg-sky-600',
        items: [
          { id: 'II-1-1', title: '테이블·행·열·기본키', file: './chapter-ii-1-1.html' },
          { id: 'II-1-2', title: '외래키와 관계', file: './chapter-ii-1-2.html' },
          { id: 'II-2-1', title: '왜 PostgreSQL인가', file: './chapter-ii-2-1.html' },
        ],
      },
      {
        part: 'III', label: 'Part III. PostgreSQL 첫 걸음', color: 'bg-blue-600',
        items: [
          { id: 'III-1-1', title: 'PostgreSQL 설치', file: './chapter-iii-1-1.html' },
          { id: 'III-1-2', title: 'psql로 첫 접속', file: './chapter-iii-1-2.html' },
          { id: 'III-2-1', title: '테이블 생성과 데이터 삽입', file: './chapter-iii-2-1.html' },
          { id: 'III-2-2', title: '데이터 수정과 삭제', file: './chapter-iii-2-2.html' },
          { id: 'III-3-1', title: 'psql 생산성 높이기', file: './chapter-iii-3-1.html' },
        ],
      },
      {
        part: 'IIIB', label: 'Part III-B. 데이터 타입과 제약 조건', color: 'bg-cyan-600',
        items: [
          { id: 'III-B-1-1', title: '숫자 타입: INT, NUMERIC, FLOAT', file: './chapter-iii-b-1-1.html' },
          { id: 'III-B-1-2', title: '문자 타입: TEXT, VARCHAR, CHAR', file: null },
          { id: 'III-B-1-3', title: '날짜와 시간: TIMESTAMP, DATE, TIME', file: './chapter-iii-b-1-3.html' },
          { id: 'III-B-1-4', title: '그 외 타입: BOOLEAN, UUID, ENUM', file: null },
          { id: 'III-B-2-1', title: '타입 캐스팅과 변환', file: null },
          { id: 'III-B-2-2', title: '제약 조건 완전 가이드', file: './chapter-iii-b-2-2.html' },
        ],
      },
      {
        part: 'IIIC', label: 'Part III-C. 실전 쿼리 패턴', color: 'bg-teal-600',
        items: [
          { id: 'III-C-1-1', title: '정렬과 페이지네이션', file: './chapter-iii-c-1-1.html' },
          { id: 'III-C-1-2', title: '조건 검색: LIKE, IN, BETWEEN', file: './chapter-iii-c-1-2.html' },
          { id: 'III-C-1-3', title: 'NULL 다루기: COALESCE, NULLIF', file: './chapter-iii-c-1-3.html' },
          { id: 'III-C-2-1', title: 'DISTINCT와 집합 연산', file: null },
          { id: 'III-C-2-2', title: 'UPSERT와 RETURNING', file: null },
        ],
      },
      {
        part: 'IV', label: 'Part IV. SQL 코어 개념', color: 'bg-indigo-600',
        items: [
          { id: 'IV-1-1', title: 'SQL 쿼리 실행 파이프라인', file: './chapter-iv-1-1.html' },
          { id: 'IV-1-2', title: 'EXPLAIN과 실행 계획 읽기', file: './chapter-iv-1-2.html' },
          { id: 'IV-2-1', title: 'JOIN 완전 정복', file: './chapter-iv-2-1.html' },
          { id: 'IV-2-2', title: 'GROUP BY와 집계 함수', file: './chapter-iv-2-2.html' },
          { id: 'IV-3-1', title: '서브쿼리(Subquery)', file: './chapter-iv-3-1.html' },
          { id: 'IV-3-2', title: 'CTE (Common Table Expression)', file: './chapter-iv-3-2.html' },
          { id: 'IV-4-1', title: '뷰(View)', file: './chapter-iv-4-1.html' },
        ],
      },
      {
        part: 'IVB', label: 'Part IV-B. 고급 SQL', color: 'bg-violet-600',
        items: [
          { id: 'IV-B-1-1', title: 'Window Functions 기초', file: './chapter-iv-b-1-1.html' },
          { id: 'IV-B-1-2', title: 'Window Functions 실전', file: './chapter-iv-b-1-2.html' },
          { id: 'IV-B-2-1', title: 'Grouping Sets, ROLLUP, CUBE', file: null },
          { id: 'IV-B-2-2', title: 'LATERAL JOIN과 고급 조인', file: null },
        ],
      },
      {
        part: 'V', label: 'Part V. 트랜잭션·인덱스·성능', color: 'bg-purple-600',
        items: [
          { id: 'V-1-1', title: '트랜잭션이란 무엇인가', file: './chapter-v-1-1.html' },
          { id: 'V-1-2', title: 'ACID 속성', file: './chapter-v-1-2.html' },
          { id: 'V-2-1', title: '인덱스의 원리', file: './chapter-v-2-1.html' },
          { id: 'V-2-2', title: '인덱스 종류와 적용 전략', file: null },
          { id: 'V-3-1', title: 'EXPLAIN ANALYZE 심화', file: null },
        ],
      },
      {
        part: 'VI', label: 'Part VI. 실전 스키마 설계', color: 'bg-amber-600',
        items: [
          { id: 'VI-1-1', title: '정규화 1NF~3NF', file: null },
          { id: 'VI-1-2', title: '역정규화 전략', file: null },
          { id: 'VI-2-1', title: '전자상거래 스키마 설계', file: './chapter-vi-2-1.html' },
        ],
      },
      {
        part: 'VIB', label: 'Part VI-B. JSON·검색·벡터', color: 'bg-orange-600',
        items: [
          { id: 'VI-B-1-1', title: 'JSON vs JSONB 완전 가이드', file: './chapter-vi-b-1-1.html' },
          { id: 'VI-B-1-2', title: 'JSONB 업데이트와 인덱싱', file: null },
          { id: 'VI-B-2-1', title: 'Full Text Search', file: './chapter-vi-b-2-1.html' },
          { id: 'VI-B-2-2', title: 'pgvector와 시맨틱 검색', file: null },
        ],
      },
      {
        part: 'VII', label: 'Part VII. 복제·백업·모니터링', color: 'bg-rose-600',
        items: [
          { id: 'VII-1-1', title: 'pg_dump / pg_restore', file: null },
          { id: 'VII-2-1', title: '스트리밍 복제 개요', file: null },
          { id: 'VII-3-1', title: 'pg_stat_activity와 슬로우 쿼리', file: null },
        ],
      },
    ];

    const TOTAL = SECTIONS.reduce((sum, s) => sum + s.items.length, 0);
    const TOTAL_VIZ = SECTIONS.reduce((sum, s) => sum + s.items.filter(i => i.file).length, 0);

    const PART_BG = {
      I: 'hover:bg-emerald-50', II: 'hover:bg-sky-50', III: 'hover:bg-blue-50',
      IIIB: 'hover:bg-cyan-50', IIIC: 'hover:bg-teal-50',
      IV: 'hover:bg-indigo-50', IVB: 'hover:bg-violet-50',
      V: 'hover:bg-purple-50', VI: 'hover:bg-amber-50',
      VIB: 'hover:bg-orange-50', VII: 'hover:bg-rose-50',
    };

    const PART_ACTIVE = {
      I: 'bg-emerald-100 text-emerald-800 font-bold', II: 'bg-sky-100 text-sky-800 font-bold',
      III: 'bg-blue-100 text-blue-800 font-bold', IIIB: 'bg-cyan-100 text-cyan-800 font-bold',
      IIIC: 'bg-teal-100 text-teal-800 font-bold', IV: 'bg-indigo-100 text-indigo-800 font-bold',
      IVB: 'bg-violet-100 text-violet-800 font-bold', V: 'bg-purple-100 text-purple-800 font-bold',
      VI: 'bg-amber-100 text-amber-800 font-bold', VIB: 'bg-orange-100 text-orange-800 font-bold',
      VII: 'bg-rose-100 text-rose-800 font-bold',
    };

    function findItemById(id) {
      for (const section of SECTIONS) {
        const found = section.items.find(item => item.id === id);
        if (found) return { ...found, part: section.part };
      }
      return null;
    }

    /**
     * GiscusPanel — 마인드맵의 vanilla JS giscus 패널을 React로 재현.
     */
    function GiscusPanel({ term }) {
      const [open, setOpen] = React.useState(false);
      const [width, setWidth] = React.useState(() => Math.min(480, Math.round(window.innerWidth * 0.9)));
      const bodyRef = React.useRef(null);
      const loadedRef = React.useRef(false);

      React.useEffect(() => {
        if (!open || loadedRef.current || !bodyRef.current) return;
        const s = document.createElement('script');
        s.src = 'https://giscus.app/client.js';
        s.async = true;
        s.crossOrigin = 'anonymous';
        s.setAttribute('data-repo', 'HoyoungParkme/tech-roadmap');
        s.setAttribute('data-repo-id', 'R_kgDOSIZCtg');
        s.setAttribute('data-category', 'General');
        s.setAttribute('data-category-id', 'DIC_kwDOSIZCts4C7lgx');
        s.setAttribute('data-mapping', 'specific');
        s.setAttribute('data-term', term);
        s.setAttribute('data-strict', '0');
        s.setAttribute('data-reactions-enabled', '1');
        s.setAttribute('data-emit-metadata', '0');
        s.setAttribute('data-input-position', 'bottom');
        s.setAttribute('data-theme', 'light');
        s.setAttribute('data-lang', 'ko');
        bodyRef.current.appendChild(s);
        loadedRef.current = true;
      }, [open, term]);

      const onResizeStart = (e) => {
        e.preventDefault();
        const startX = e.clientX;
        const startW = width;
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;cursor:ew-resize;';
        document.body.appendChild(overlay);
        const onMove = (ev) => {
          const newW = Math.max(320, Math.min(window.innerWidth * 0.9, startW + (startX - ev.clientX)));
          setWidth(newW);
        };
        const onUp = () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
          overlay.remove();
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      };

      const buttonRight = open ? Math.min(width, window.innerWidth - 40) + 'px' : 0;

      return (
        <React.Fragment>
          <button
            onClick={() => setOpen(o => !o)}
            aria-expanded={open}
            aria-label={open ? '댓글 패널 닫기' : '댓글 패널 열기'}
            style={{ position: 'fixed', top: '40%', right: buttonRight, zIndex: 51, writingMode: 'vertical-rl', transition: 'right 0.25s ease' }}
            className="bg-slate-800 text-white px-2 py-3 rounded-l-lg text-sm font-medium shadow-md hover:bg-slate-700"
          >
            💬 {open ? '닫기' : '댓글'}
          </button>
          <div
            role="complementary"
            aria-label="댓글 패널"
            style={{ position: 'fixed', top: 0, right: 0, height: '100vh', width: width + 'px', transform: open ? 'translateX(0)' : 'translateX(100%)', transition: 'transform 0.25s ease', zIndex: 50, background: '#fff', boxShadow: '-4px 0 12px rgba(0,0,0,0.08)' }}
          >
            <div onMouseDown={onResizeStart} style={{ position: 'absolute', left: '-4px', top: 0, width: '8px', height: '100%', cursor: 'ew-resize', zIndex: 52 }} aria-hidden="true" />
            <div className="border-b border-slate-200 px-4 py-3 flex items-center justify-between">
              <span className="font-bold text-slate-800">💬 댓글 / 질문</span>
              <button onClick={() => setOpen(false)} aria-label="댓글 패널 닫기" className="text-slate-500 hover:text-slate-800 px-2">✕</button>
            </div>
            <div ref={bodyRef} className="p-4 overflow-y-auto" style={{ height: 'calc(100vh - 56px)' }} />
          </div>
        </React.Fragment>
      );
    }

    function App() {
      const [activeId, setActiveId] = useState(null);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [expandedParts, setExpandedParts] = useState(
        { I: true, II: true, III: true, IIIB: true, IIIC: true, IV: true, IVB: true, V: true, VI: true, VIB: true, VII: true }
      );

      const activeItem = activeId ? findItemById(activeId) : null;

      const navigate = useCallback((id) => {
        setActiveId(id);
        window.location.hash = id;
        if (window.innerWidth < 1024) setSidebarOpen(false);
      }, []);

      useEffect(() => {
        const hash = window.location.hash.slice(1);
        if (hash && findItemById(hash)) setActiveId(hash);
        const onHash = () => {
          const h = window.location.hash.slice(1);
          if (h && findItemById(h)) setActiveId(h);
        };
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      const togglePart = (part) => {
        setExpandedParts(prev => ({ ...prev, [part]: !prev[part] }));
      };

      return (
        <React.Fragment>
        <div className="h-full flex bg-slate-100">

          {sidebarOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-30 z-30 lg:hidden" onClick={() => setSidebarOpen(false)} />
          )}

          <aside className={`
            fixed lg:static z-40 h-full w-72 bg-white border-r border-slate-200 flex flex-col
            transition-transform duration-200
            ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0 lg:w-72'}
          `}>
            <div className="p-4 border-b border-slate-200 shrink-0">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-lg font-bold text-sm">P</div>
                <div>
                  <div className="font-bold text-slate-800 text-sm">PostgreSQL 학습</div>
                  <div className="text-[11px] text-slate-500">{TOTAL_VIZ}개 시각화 / {TOTAL}개 섹션</div>
                </div>
              </div>
            </div>

            <nav className="flex-1 overflow-y-auto p-2">
              {SECTIONS.map((section) => (
                <div key={section.part} className="mb-1">
                  <button
                    onClick={() => togglePart(section.part)}
                    className="w-full flex items-center gap-2 px-2 py-2 rounded-lg text-left hover:bg-slate-50 transition"
                  >
                    <span className={`w-5 h-5 rounded text-white text-[10px] flex items-center justify-center font-bold ${section.color}`}>
                      {section.part.length <= 3 ? section.part : section.part.slice(0, 2)}
                    </span>
                    <span className="text-xs font-bold text-slate-700 flex-1 truncate">{section.label}</span>
                    <span className="text-[10px] text-slate-400">{section.items.length}</span>
                    <span className={`text-slate-400 text-xs transition-transform ${expandedParts[section.part] ? 'rotate-90' : ''}`}>&#9654;</span>
                  </button>

                  {expandedParts[section.part] && (
                    <div className="ml-4 border-l border-slate-100 pl-2 space-y-0.5">
                      {section.items.map((item) => {
                        const isActive = activeId === item.id;
                        return (
                          <button
                            key={item.id}
                            onClick={() => navigate(item.id)}
                            className={`w-full text-left px-2 py-1.5 rounded-md text-xs transition-all truncate
                              ${isActive ? PART_ACTIVE[section.part] : `text-slate-600 ${PART_BG[section.part]}`}
                            `}
                          >
                            <span className={`font-mono text-[10px] mr-1 ${item.file ? 'opacity-60' : 'opacity-30'}`}>{item.id}</span>
                            {item.title}
                          </button>
                        );
                      })}
                    </div>
                  )}
                </div>
              ))}
            </nav>

            <div className="p-3 border-t border-slate-200 shrink-0 text-[10px] text-slate-400 text-center">
              React + Tailwind + Babel CDN
            </div>
          </aside>

          <main className="flex-1 flex flex-col min-w-0">
            <div className="h-12 bg-white border-b border-slate-200 flex items-center px-4 shrink-0 gap-3">
              <button
                onClick={() => setSidebarOpen(prev => !prev)}
                className="lg:hidden p-1.5 rounded-md hover:bg-slate-100 text-slate-600"
                aria-label="사이드바 토글"
              >
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                  <path fillRule="evenodd" d="M3 5h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2z" />
                </svg>
              </button>

              {activeItem ? (
                <div className="flex items-center gap-2 min-w-0">
                  <span className={`w-5 h-5 rounded text-white text-[10px] flex items-center justify-center font-bold shrink-0 ${
                    SECTIONS.find(s => s.part === activeItem.part)?.color || 'bg-slate-600'
                  }`}>{activeItem.part.length <= 3 ? activeItem.part : activeItem.part.slice(0, 2)}</span>
                  <span className="font-mono text-xs text-slate-500 shrink-0">{activeItem.id}</span>
                  <span className="text-sm font-bold text-slate-800 truncate">{activeItem.title}</span>
                </div>
              ) : (
                <span className="text-sm text-slate-500">시각화를 선택하세요</span>
              )}
            </div>

            {activeItem ? (
              activeItem.file ? (
                <iframe
                  key={activeItem.id}
                  src={activeItem.file}
                  className="flex-1 w-full border-0"
                  title={activeItem.title}
                />
              ) : (
                <div className="flex-1 flex items-center justify-center p-8">
                  <div className="text-center">
                    <div className="text-5xl mb-4">🔧</div>
                    <p className="text-lg font-bold text-slate-700 mb-2">시각화 준비 중</p>
                    <p className="text-sm text-slate-500 mb-1">{activeItem.id}. {activeItem.title}</p>
                    <p className="text-xs text-slate-400">이 섹션의 인터랙티브 시각화가 곧 추가됩니다</p>
                  </div>
                </div>
              )
            ) : (
              <div className="flex-1 flex items-center justify-center p-8">
                <div className="text-center max-w-md">
                  <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl font-bold">P</div>
                  <h2 className="text-2xl font-bold text-slate-800 mb-3">PostgreSQL 인터랙티브 학습</h2>
                  <p className="text-slate-600 mb-6 leading-relaxed">
                    왼쪽 사이드바에서 시각화를 선택하세요.<br/>
                    Part I부터 순서대로 보거나, 관심 있는 주제를 바로 클릭할 수 있습니다.
                  </p>
                  <div className="grid grid-cols-4 gap-2 mb-6">
                    {SECTIONS.map(s => (
                      <div key={s.part} className="text-center">
                        <div className={`w-8 h-8 rounded-lg text-white text-xs flex items-center justify-center font-bold mx-auto mb-1 ${s.color}`}>
                          {s.part.length <= 3 ? s.part : s.part.slice(0, 2)}
                        </div>
                        <div className="text-[10px] text-slate-500">{s.items.length}개</div>
                      </div>
                    ))}
                  </div>
                  <p className="text-xs text-slate-400">총 {TOTAL}개 섹션 ({TOTAL_VIZ}개 시각화) | React + Tailwind CDN | 빌드 도구 없음</p>
                </div>
              </div>
            )}
          </main>
        </div>
        <GiscusPanel term="postgres" />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
