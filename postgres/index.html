<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 완벽 가이드 — 인터랙티브 뷰어</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .sidebar::-webkit-scrollbar { width: 6px; }
    .sidebar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .sidebar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .prose h1 { font-size: 1.8rem; font-weight: 800; margin: 1.5rem 0 1rem; color: #1e293b; }
    .prose h2 { font-size: 1.4rem; font-weight: 700; margin: 1.5rem 0 0.8rem; color: #334155; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.4rem; }
    .prose h3 { font-size: 1.15rem; font-weight: 700; margin: 1.2rem 0 0.6rem; color: #475569; }
    .prose h4 { font-size: 1rem; font-weight: 600; margin: 1rem 0 0.5rem; color: #1e40af; }
    .prose p { margin: 0.6rem 0; line-height: 1.8; color: #374151; }
    .prose ul, .prose ol { margin: 0.5rem 0; padding-left: 1.5rem; }
    .prose li { margin: 0.3rem 0; line-height: 1.7; }
    .prose blockquote { border-left: 4px solid #3b82f6; background: #eff6ff; padding: 0.8rem 1rem; margin: 0.8rem 0; border-radius: 0 0.5rem 0.5rem 0; }
    .prose blockquote p { color: #1e40af; margin: 0.2rem 0; }
    .prose code { background: #f1f5f9; padding: 0.15rem 0.4rem; border-radius: 0.25rem; font-size: 0.9em; color: #be185d; }
    .prose pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.8rem 0; }
    .prose pre code { background: transparent; color: #e2e8f0; padding: 0; }
    .prose table { width: 100%; border-collapse: collapse; margin: 0.8rem 0; font-size: 0.9rem; }
    .prose th { background: #f1f5f9; padding: 0.5rem; text-align: left; border: 1px solid #e2e8f0; font-weight: 600; }
    .prose td { padding: 0.5rem; border: 1px solid #e2e8f0; }
    .prose strong { color: #1e293b; }
    .prose hr { border: none; border-top: 1px solid #e2e8f0; margin: 1.5rem 0; }
    .content-area::-webkit-scrollbar { width: 8px; }
    .content-area::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const CURRICULUM = [
      { part: "Part I", title: "왜 데이터베이스인가", level: "star1", book: "docs/book/part-1.md", sections: [
        { id: "I-1-1", title: "데이터와 정보의 차이", viz: "chapter-i-1-1.html" },
        { id: "I-1-2", title: "데이터는 어디에 저장되는가", viz: "chapter-i-1-2.html" },
        { id: "I-2-1", title: "파일 vs 데이터베이스", viz: "chapter-i-2-1.html" },
        { id: "I-2-2", title: "DBMS의 4대 기능", viz: "chapter-i-2-2.html" }
      ]},
      { part: "Part II", title: "관계형 모델과 PostgreSQL", level: "star2", book: "docs/book/part-2.md", sections: [
        { id: "II-1-1", title: "테이블·행·열·기본키", viz: "chapter-ii-1-1.html" },
        { id: "II-1-2", title: "외래키와 관계", viz: "chapter-ii-1-2.html" },
        { id: "II-2-1", title: "왜 PostgreSQL인가", viz: "chapter-ii-2-1.html" }
      ]},
      { part: "Part III", title: "PostgreSQL 첫 걸음", level: "star2", book: "docs/book/part-3.md", sections: [
        { id: "III-1-1", title: "PostgreSQL 설치", viz: "chapter-iii-1-1.html" },
        { id: "III-1-2", title: "psql로 첫 접속", viz: "chapter-iii-1-2.html" },
        { id: "III-2-1", title: "테이블 생성과 데이터 삽입", viz: "chapter-iii-2-1.html" },
        { id: "III-2-2", title: "데이터 수정과 삭제", viz: "chapter-iii-2-2.html" },
        { id: "III-3-1", title: "psql 생산성 높이기", viz: "chapter-iii-3-1.html" }
      ]},
      { part: "Part III-B", title: "데이터 타입과 제약 조건", level: "star2", book: "docs/book/part-3b.md", isNew: true, sections: [
        { id: "III-B-1-1", title: "숫자 타입: INT, NUMERIC, FLOAT", viz: "chapter-iii-b-1-1.html" },
        { id: "III-B-1-2", title: "문자 타입: TEXT, VARCHAR, CHAR" },
        { id: "III-B-1-3", title: "날짜와 시간: TIMESTAMP, DATE, TIME", viz: "chapter-iii-b-1-3.html" },
        { id: "III-B-1-4", title: "그 외 타입: BOOLEAN, UUID, ENUM" },
        { id: "III-B-2-1", title: "타입 캐스팅과 변환" },
        { id: "III-B-2-2", title: "제약 조건 완전 가이드", viz: "chapter-iii-b-2-2.html" }
      ]},
      { part: "Part III-C", title: "실전 쿼리 패턴", level: "star2", book: "docs/book/part-3c.md", isNew: true, sections: [
        { id: "III-C-1-1", title: "정렬과 페이지네이션", viz: "chapter-iii-c-1-1.html" },
        { id: "III-C-1-2", title: "조건 검색: LIKE, IN, BETWEEN", viz: "chapter-iii-c-1-2.html" },
        { id: "III-C-1-3", title: "NULL 다루기: COALESCE, NULLIF", viz: "chapter-iii-c-1-3.html" },
        { id: "III-C-2-1", title: "DISTINCT와 집합 연산" },
        { id: "III-C-2-2", title: "UPSERT와 RETURNING" }
      ]},
      { part: "Part IV", title: "SQL 코어 개념", level: "star3", book: "docs/book/part-4.md", sections: [
        { id: "IV-1-1", title: "SQL 쿼리 실행 파이프라인", viz: "chapter-iv-1-1.html" },
        { id: "IV-1-2", title: "EXPLAIN과 실행 계획 읽기", viz: "chapter-iv-1-2.html" },
        { id: "IV-2-1", title: "JOIN 완전 정복", viz: "chapter-iv-2-1.html" },
        { id: "IV-2-2", title: "GROUP BY와 집계 함수", viz: "chapter-iv-2-2.html" },
        { id: "IV-3-1", title: "서브쿼리(Subquery)", viz: "chapter-iv-3-1.html" },
        { id: "IV-3-2", title: "CTE (Common Table Expression)", viz: "chapter-iv-3-2.html" },
        { id: "IV-4-1", title: "뷰(View)", viz: "chapter-iv-4-1.html" }
      ]},
      { part: "Part IV-B", title: "고급 SQL", level: "star3", book: "docs/book/part-4b.md", isNew: true, sections: [
        { id: "IV-B-1-1", title: "Window Functions 기초", viz: "chapter-iv-b-1-1.html" },
        { id: "IV-B-1-2", title: "Window Functions 실전", viz: "chapter-iv-b-1-2.html" },
        { id: "IV-B-2-1", title: "Grouping Sets, ROLLUP, CUBE" },
        { id: "IV-B-2-2", title: "LATERAL JOIN과 고급 조인" }
      ]},
      { part: "Part V", title: "트랜잭션·인덱스·성능", level: "star3", book: "docs/book/part-5.md", sections: [
        { id: "V-1-1", title: "트랜잭션이란 무엇인가", viz: "chapter-v-1-1.html" },
        { id: "V-1-2", title: "ACID 속성", viz: "chapter-v-1-2.html" },
        { id: "V-2-1", title: "인덱스의 원리", viz: "chapter-v-2-1.html" },
        { id: "V-2-2", title: "인덱스 종류와 적용 전략" },
        { id: "V-3-1", title: "EXPLAIN ANALYZE 심화" }
      ]},
      { part: "Part VI", title: "실전 스키마 설계", level: "star3", book: "docs/book/part-6.md", sections: [
        { id: "VI-1-1", title: "정규화 1NF~3NF" },
        { id: "VI-1-2", title: "역정규화 전략" },
        { id: "VI-2-1", title: "전자상거래 스키마 설계", viz: "chapter-vi-2-1.html" }
      ]},
      { part: "Part VI-B", title: "JSON·검색·벡터", level: "star3", book: "docs/book/part-6b.md", isNew: true, sections: [
        { id: "VI-B-1-1", title: "JSON vs JSONB 완전 가이드", viz: "chapter-vi-b-1-1.html" },
        { id: "VI-B-1-2", title: "JSONB 업데이트와 인덱싱" },
        { id: "VI-B-2-1", title: "Full Text Search", viz: "chapter-vi-b-2-1.html" },
        { id: "VI-B-2-2", title: "pgvector와 시맨틱 검색" }
      ]},
      { part: "Part VII", title: "복제·백업·모니터링", level: "star3", book: "docs/book/part-7.md", sections: [
        { id: "VII-1-1", title: "pg_dump / pg_restore" },
        { id: "VII-2-1", title: "스트리밍 복제 개요" },
        { id: "VII-3-1", title: "pg_stat_activity와 슬로우 쿼리" }
      ]}
    ];

    const levelColors = { star1: 'bg-emerald-500', star2: 'bg-blue-500', star3: 'bg-purple-500' };

    function MarkdownViewer({ bookPath, sectionId }) {
      const [html, setHtml] = useState('');
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        setLoading(true);
        fetch(bookPath)
          .then(r => r.text())
          .then(md => {
            const rendered = marked.parse(md);
            setHtml(rendered);
            setLoading(false);
            setTimeout(() => {
              const prefix = sectionId.replace(/-/g, '-');
              const headings = document.querySelectorAll('.prose h3');
              for (const h of headings) {
                if (h.textContent.includes(sectionId + '.') || h.textContent.includes(sectionId.replace(/-/g, '-') + '.')) {
                  h.scrollIntoView({ behavior: 'smooth', block: 'start' });
                  h.style.background = '#fef3c7';
                  h.style.padding = '4px 8px';
                  h.style.borderRadius = '4px';
                  break;
                }
              }
            }, 100);
          })
          .catch(() => { setHtml('<p>본문 파일을 불러올 수 없습니다.</p>'); setLoading(false); });
      }, [bookPath, sectionId]);

      if (loading) return (
        <div className="flex-1 flex items-center justify-center">
          <div className="text-slate-400 animate-pulse text-lg">본문 로딩 중...</div>
        </div>
      );

      return (
        <div className="flex-1 overflow-y-auto content-area">
          <div className="max-w-4xl mx-auto p-8 bg-white min-h-full">
            <div className="prose" dangerouslySetInnerHTML={{ __html: html }} />
          </div>
        </div>
      );
    }

    function App() {
      const [selected, setSelected] = useState(null);
      const [selectedPart, setSelectedPart] = useState(null);
      const [viewMode, setViewMode] = useState('auto');
      const [expandedParts, setExpandedParts] = useState(new Set(CURRICULUM.map(p => p.part)));

      const togglePart = (part) => {
        setExpandedParts(prev => {
          const next = new Set(prev);
          if (next.has(part)) next.delete(part); else next.add(part);
          return next;
        });
      };

      const handleSelect = (sec, part) => {
        setSelected(sec);
        setSelectedPart(part);
        setViewMode(sec.viz ? 'viz' : 'book');
      };

      const totalSections = CURRICULUM.reduce((a, p) => a + p.sections.length, 0);
      const totalViz = CURRICULUM.reduce((a, p) => a + p.sections.filter(s => s.viz).length, 0);

      return (
        <div className="flex h-screen">
          <div className="w-72 bg-white border-r border-slate-200 flex flex-col flex-shrink-0">
            <div className="p-4 border-b border-slate-200 bg-slate-800 text-white">
              <div className="flex items-center gap-2 mb-1">
                <div className="w-7 h-7 bg-blue-500 rounded-full flex items-center justify-center font-bold text-sm">P</div>
                <h1 className="text-base font-bold">PostgreSQL 완벽 가이드</h1>
              </div>
              <div className="text-xs text-slate-300">{totalSections} Sections / {totalViz} Visualizations</div>
            </div>

            <div className="flex-1 overflow-y-auto sidebar p-2">
              {CURRICULUM.map((part, pi) => (
                <div key={pi} className="mb-1">
                  <button onClick={() => togglePart(part.part)}
                    className="w-full flex items-center gap-2 p-2 rounded-lg hover:bg-slate-50 text-left transition-colors">
                    <span className="text-xs text-slate-400">{expandedParts.has(part.part) ? '\u25BC' : '\u25B6'}</span>
                    <span className={`w-2 h-2 rounded-full ${levelColors[part.level]}`} />
                    <span className="text-sm font-bold text-slate-700 flex-1">{part.part}</span>
                    {part.isNew && <span className="text-xs bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded font-bold">NEW</span>}
                  </button>

                  {expandedParts.has(part.part) && (
                    <div className="ml-4 border-l-2 border-slate-100 pl-2">
                      <div className="text-xs text-slate-400 px-2 py-1">{part.title}</div>
                      {part.sections.map((sec, si) => {
                        const isSelected = selected && selected.id === sec.id;
                        return (
                          <button key={si}
                            onClick={() => handleSelect(sec, part)}
                            className={`w-full text-left px-2 py-1.5 rounded text-xs transition-colors flex items-center gap-1.5 ${isSelected ? 'bg-blue-100 text-blue-800 font-bold' : 'hover:bg-slate-50 text-slate-600'}`}>
                            {sec.viz ? <span className="text-blue-500 text-[10px]">{'\u25CF'}</span> : <span className="text-slate-300 text-[10px]">{'\u25CB'}</span>}
                            <span className="truncate">{sec.id}. {sec.title}</span>
                          </button>
                        );
                      })}
                    </div>
                  )}
                </div>
              ))}
            </div>

            <div className="p-3 border-t border-slate-200 text-xs text-slate-400">
              <div className="flex items-center gap-3 mb-1">
                <span className="flex items-center gap-1"><span className="text-blue-500">{'\u25CF'}</span> 시각화+본문</span>
                <span className="flex items-center gap-1"><span className="text-slate-300">{'\u25CB'}</span> 본문만</span>
              </div>
            </div>
          </div>

          <div className="flex-1 flex flex-col">
            {selected && (
              <div className="bg-white border-b border-slate-200 px-4 py-2 flex items-center gap-3">
                <span className="text-sm font-bold text-slate-700">{selected.id}. {selected.title}</span>
                <div className="flex-1" />
                {selected.viz && (
                  <div className="flex bg-slate-100 rounded-lg p-0.5">
                    <button onClick={() => setViewMode('viz')}
                      className={`px-3 py-1 text-xs rounded-md transition-colors ${viewMode === 'viz' ? 'bg-blue-600 text-white' : 'text-slate-600 hover:bg-slate-200'}`}>
                      시각화
                    </button>
                    <button onClick={() => setViewMode('book')}
                      className={`px-3 py-1 text-xs rounded-md transition-colors ${viewMode === 'book' ? 'bg-blue-600 text-white' : 'text-slate-600 hover:bg-slate-200'}`}>
                      본문
                    </button>
                  </div>
                )}
              </div>
            )}

            {selected ? (
              viewMode === 'viz' && selected.viz ? (
                <iframe src={selected.viz} className="w-full flex-1 border-0" title={selected.title} />
              ) : (
                <MarkdownViewer bookPath={selectedPart.book} sectionId={selected.id} />
              )
            ) : (
              <div className="flex-1 flex items-center justify-center bg-slate-50">
                <div className="text-center max-w-lg">
                  <div className="text-7xl mb-6 text-blue-200">{'\uD83D\uDC18'}</div>
                  <h2 className="text-2xl font-bold text-slate-700 mb-3">PostgreSQL 기초~실무 완벽 가이드</h2>
                  <p className="text-slate-500 mb-6">비개발자부터 주니어 개발자까지, 사다리형 구조로 단계별 학습</p>
                  <div className="grid grid-cols-3 gap-4 text-center">
                    <div className="bg-white p-4 rounded-xl shadow-sm border">
                      <div className="text-3xl font-bold text-blue-600">{totalSections}</div>
                      <div className="text-xs text-slate-500 mt-1">Sections</div>
                    </div>
                    <div className="bg-white p-4 rounded-xl shadow-sm border">
                      <div className="text-3xl font-bold text-green-600">{totalViz}</div>
                      <div className="text-xs text-slate-500 mt-1">Visualizations</div>
                    </div>
                    <div className="bg-white p-4 rounded-xl shadow-sm border">
                      <div className="text-3xl font-bold text-purple-600">11</div>
                      <div className="text-xs text-slate-500 mt-1">Parts</div>
                    </div>
                  </div>
                  <p className="text-sm text-slate-400 mt-6">왼쪽 사이드바에서 섹션을 클릭하세요</p>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
