<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — III-1-1. PostgreSQL 설치</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    PostgreSQL Chapter III-1-1 — PostgreSQL 설치
    학습 목표: 자신의 OS에 PostgreSQL을 설치하고 서버가 정상 실행 중인지 확인할 수 있다.
    조작법: OS 탭으로 전환, "자동 실행" 버튼으로 재생, 이전/다음 버튼으로 수동 전환.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const OS_DATA = {
      windows: {
        label: 'Windows', icon: '🪟',
        steps: [
          { label: '인스톨러 다운로드', desc: '[Step 1: EDB 인스톨러 다운로드] postgresql.org/download/windows에서 EDB 인스톨러를 내려받는다. GUI 마법사 방식이라 클릭 몇 번이면 설치가 끝난다.', terminal: ['> 브라우저에서 EDB 인스톨러 다운로드...', '> postgresql-16.x-windows-x64.exe 다운로드 완료'] },
          { label: '설치 실행', desc: '[Step 2: 설치 진행] 인스톨러를 실행해 설치 경로와 포트(기본 5432)를 확인하고 진행한다. 슈퍼유저(postgres)의 비밀번호를 설정한다. 이 비밀번호는 접속 시 필요하므로 꼭 기억해 둔다.', terminal: ['> 인스톨러 실행 중...', '> 설치 경로: C:\\Program Files\\PostgreSQL\\16', '> 포트: 5432', '> postgres 비밀번호 설정: ********', '> 설치 진행 중... ████████████ 100%', '> 설치 완료!'] },
          { label: '서비스 등록', desc: '[Step 3: Windows 서비스 자동 등록] 설치가 끝나면 Windows 서비스에 PostgreSQL이 자동 등록되어 시스템 시작 시 함께 실행된다.', terminal: ['> Windows 서비스 등록 확인...', '> 서비스명: postgresql-x64-16', '> 시작 유형: 자동', '> 상태: 실행 중 ✓'] },
          { label: 'pg_isready 확인', desc: '[Step 4: 서버 상태 확인] 명령 프롬프트나 PowerShell에서 pg_isready 명령으로 서버 상태를 확인한다. "accepting connections"가 나오면 설치 성공!', terminal: ['> pg_isready -U postgres', 'localhost:5432 - accepting connections ✓'] }
        ]
      },
      macos: {
        label: 'macOS', icon: '🍎',
        steps: [
          { label: 'Homebrew 설치', desc: '[Step 1: Homebrew로 설치] brew install postgresql@16 명령 하나로 설치가 끝난다. Homebrew가 없다면 먼저 brew.sh에서 설치한다.', terminal: ['$ brew install postgresql@16', '==> Downloading postgresql@16...', '==> Installing postgresql@16', '==> Summary', '  /opt/homebrew/opt/postgresql@16'] },
          { label: 'PATH 등록', desc: '[Step 2: PATH 환경변수 등록] 설치 후 안내 메시지에 따라 PATH에 등록한다. 이래야 터미널 어디서든 psql, pg_isready 명령을 쓸 수 있다.', terminal: ['$ echo \'export PATH="/opt/homebrew/opt/postgresql@16/bin:$PATH"\' >> ~/.zshrc', '$ source ~/.zshrc', '$ which psql', '/opt/homebrew/opt/postgresql@16/bin/psql'] },
          { label: '서버 시작', desc: '[Step 3: 서버 시작 + 자동 시작 등록] brew services start 명령으로 서버를 시작하고 로그인 시 자동 시작까지 등록한다.', terminal: ['$ brew services start postgresql@16', '==> Successfully started `postgresql@16`'] },
          { label: 'pg_isready 확인', desc: '[Step 4: 서버 상태 확인] pg_isready 명령으로 서버가 연결을 받을 준비가 되었는지 확인한다.', terminal: ['$ pg_isready', '/tmp/.s.PGSQL.5432 - accepting connections ✓'] }
        ]
      },
      linux: {
        label: 'Linux (Ubuntu)', icon: '🐧',
        steps: [
          { label: 'apt 설치', desc: '[Step 1: apt로 설치] sudo apt install postgresql 명령으로 서버와 클라이언트를 함께 설치한다.', terminal: ['$ sudo apt update', '$ sudo apt install postgresql postgresql-client', '패키지 목록을 읽는 중...', 'postgresql (16.x) 설치 중...', '설치 완료!'] },
          { label: '서비스 시작', desc: '[Step 2: 서비스 시작] systemctl로 PostgreSQL 서비스를 시작하고 자동 시작을 등록한다.', terminal: ['$ sudo systemctl start postgresql', '$ sudo systemctl enable postgresql', 'Synchronizing state of postgresql.service...', 'Created symlink... ✓'] },
          { label: 'postgres 계정', desc: '[Step 3: postgres 리눅스 계정] Ubuntu에서는 설치 후 postgres라는 리눅스 계정이 생긴다. 처음 접속할 때는 sudo -u postgres psql로 진입한다.', terminal: ['$ sudo -u postgres psql', 'psql (16.x)', 'Type "help" for help.', '', 'postgres=#'] },
          { label: 'pg_isready 확인', desc: '[Step 4: 서버 상태 확인] pg_isready로 서버 정상 실행을 확인한다.', terminal: ['$ pg_isready -U postgres', 'localhost:5432 - accepting connections ✓'] }
        ]
      }
    };

    function App() {
      const [os, setOs] = useState('windows');
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [typedLines, setTypedLines] = useState([]);
      const playIntervalRef = useRef(null);

      const steps = OS_DATA[os].steps;
      const stepData = steps[currentStepIdx];
      const isEnd = currentStepIdx === steps.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < steps.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      const switchOs = (newOs) => {
        setOs(newOs);
        setCurrentStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        setTypedLines([]);
        const lines = stepData.terminal;
        const ids = lines.map((_, i) =>
          setTimeout(() => setTypedLines(prev => [...prev, lines[i]]), (i + 1) * 400)
        );
        return () => ids.forEach(clearTimeout);
      }, [currentStepIdx, os]);

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">III-1-1. PostgreSQL 설치</h1>
              </div>
              <p className="text-slate-600">
                운영체제별 PostgreSQL 설치 과정을 단계별로 따라가며,
                <b> pg_isready</b>로 서버가 정상 실행 중인지 확인합니다.
              </p>
            </header>

            {/* OS 탭 */}
            <div className="flex gap-2">
              {Object.entries(OS_DATA).map(([key, val]) => (
                <button key={key} onClick={() => switchOs(key)}
                  className={`flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition ${os === key ? 'bg-blue-700 text-white shadow-sm' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'}`}>
                  <span>{val.icon}</span> {val.label}
                </button>
              ))}
            </div>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 flex flex-col justify-center min-h-[110px]">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">

              <div className="flex flex-col space-y-4">
                {/* 터미널 시뮬레이션 */}
                <div className="bg-slate-900 rounded-xl shadow-sm border border-slate-700 min-h-[400px] flex flex-col overflow-hidden">
                  <div className="flex items-center px-4 py-2 bg-slate-800 border-b border-slate-700 gap-2">
                    <div className="w-3 h-3 rounded-full bg-red-500 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-400 font-mono">{OS_DATA[os].label} — 터미널</span>
                  </div>
                  <div className="p-4 font-mono text-sm text-emerald-400 flex-1 overflow-y-auto space-y-1">
                    {typedLines.map((line, i) => (
                      <div key={`${currentStepIdx}-${i}`} className={`transition-opacity duration-300 ${line.includes('✓') ? 'text-emerald-300 font-bold' : line.startsWith('>') || line.startsWith('$') ? 'text-white' : 'text-slate-400'}`}>
                        {line}
                      </div>
                    ))}
                    <div className="animate-pulse text-slate-500">▌</div>
                  </div>
                </div>

                {/* 컨트롤 바 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0}
                      className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'} onClick={togglePlay}
                      className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying ? (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>
                      ) : (
                        <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>
                      )}
                    </button>
                    <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd}
                      className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex gap-1">
                      {steps.map((s, i) => (
                        <button key={i} aria-label={`Step ${i + 1}: ${s.label}`} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                          className={`w-2.5 h-2.5 rounded-full transition-all ${i === currentStepIdx ? 'bg-blue-600 scale-125' : i < currentStepIdx ? 'bg-blue-300' : 'bg-slate-200'}`} />
                      ))}
                    </div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                      {currentStepIdx + 1} / {steps.length}
                    </div>
                  </div>
                </div>
              </div>

              {/* 오른쪽: 핵심 개념 패널 */}
              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-white flex flex-col">
                  <div className="flex items-center px-4 py-3 bg-slate-100 border-b border-slate-200 gap-2">
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-500 font-semibold">핵심 개념</span>
                  </div>
                  <div className="p-6 overflow-y-auto flex-1 space-y-4">
                    {[
                      { t: 'pg_isready', d: 'PostgreSQL 서버가 새 연결을 받을 준비가 되었는지 확인하는 명령. "accepting connections"가 나오면 정상.', a: currentStepIdx === 3 },
                      { t: '슈퍼유저 (postgres)', d: '데이터베이스의 모든 권한을 가진 최고 관리자 계정. 기본 이름은 postgres.', a: currentStepIdx === 1 },
                      { t: '포트 5432', d: 'PostgreSQL의 기본 네트워크 포트 번호. 여러 버전을 동시에 쓸 때는 포트를 다르게 설정한다.', a: currentStepIdx <= 1 },
                      { t: os === 'windows' ? 'EDB 인스톨러' : os === 'macos' ? 'Homebrew' : 'apt', d: os === 'windows' ? 'Windows용 PostgreSQL 공식 GUI 설치 프로그램.' : os === 'macos' ? 'macOS의 패키지 관리자. brew install로 설치, brew services로 서비스 관리.' : 'Ubuntu(Debian 계열 Linux)의 패키지 관리자. sudo apt install로 설치.', a: currentStepIdx === 0 }
                    ].map((item, i) => (
                      <div key={i} className={`p-4 rounded-lg border-2 transition-all duration-500 ${item.a ? 'border-blue-400 bg-blue-50 scale-[1.02] shadow-md' : 'border-slate-200 bg-slate-50'}`}>
                        <div className={`text-xs font-bold mb-1 ${item.a ? 'text-blue-600' : 'text-slate-400'}`}>{item.t}</div>
                        <div className="text-sm text-slate-700">{item.d}</div>
                      </div>
                    ))}

                    <div className={`p-4 rounded-lg border-2 transition-all duration-500 ${currentStepIdx === 3 ? 'border-emerald-400 bg-emerald-50 scale-[1.02]' : 'border-slate-200 bg-slate-50'}`}>
                      <div className="text-xs font-bold text-emerald-600 mb-1">설치 완료 확인 (공통)</div>
                      <div className="bg-slate-800 rounded p-2 font-mono text-xs text-emerald-400 mt-1">
                        pg_isready<br/>
                        <span className="text-slate-400"># → localhost:5432 - accepting connections</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
