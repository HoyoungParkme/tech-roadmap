<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostgreSQL 인터랙티브 학습 — III-1-2. psql로 첫 접속</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    PostgreSQL Chapter III-1-2 — psql로 첫 접속
    학습 목표: psql로 로컬 PostgreSQL에 접속하고 \l, \dt, \c, \q 메타 커맨드를 사용할 수 있다.
    조작법: "자동 실행" 버튼으로 재생, 이전/다음 버튼으로 수동 전환.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { label: 'psql 접속', desc: '[Step 1: psql 접속] psql -U postgres 명령으로 PostgreSQL 서버에 접속한다. 프롬프트가 postgres=# 으로 바뀌면 접속 성공이다. #은 슈퍼유저, >는 일반 사용자를 뜻한다.',
        lines: ['$ psql -U postgres', 'psql (16.x)', 'Type "help" for help.', '', 'postgres=#'] },
      { label: '\\l — DB 목록', desc: '[Step 2: 데이터베이스 목록 조회] \\l 명령으로 서버에 있는 데이터베이스 목록을 본다. 설치 직후에는 postgres, template0, template1 세 개가 기본으로 존재한다.',
        lines: ['postgres=# \\l', '                        List of databases', '   Name    |  Owner   | Encoding', '-----------+----------+----------', ' postgres  | postgres | UTF8', ' template0 | postgres | UTF8', ' template1 | postgres | UTF8', '(3 rows)'] },
      { label: 'CREATE DATABASE', desc: '[Step 3: 새 데이터베이스 생성] CREATE DATABASE mydb; 로 새 데이터베이스를 만든다. 세미콜론(;)을 빠뜨리면 실행되지 않으니 주의한다.',
        lines: ['postgres=# CREATE DATABASE mydb;', 'CREATE DATABASE'] },
      { label: '\\c — DB 전환', desc: '[Step 4: 데이터베이스 전환] \\c mydb 명령으로 방금 만든 mydb 데이터베이스로 전환한다. 프롬프트가 mydb=#로 바뀐다.',
        lines: ['postgres=# \\c mydb', 'You are now connected to database "mydb" as user "postgres".', '', 'mydb=#'] },
      { label: '\\dt — 테이블 목록', desc: '[Step 5: 테이블 목록 조회] \\dt 명령으로 현재 데이터베이스의 테이블 목록을 본다. 아직 테이블을 만들지 않았으므로 비어있다.',
        lines: ['mydb=# \\dt', 'Did not find any relations.'] },
      { label: '\\q — 종료', desc: '[Step 6: psql 종료] \\q 명령으로 psql을 빠져나온다. 다시 운영체제 터미널 프롬프트($)로 돌아온다.',
        lines: ['mydb=# \\q', '$'] }
    ];

    const META_COMMANDS = [
      { cmd: '\\l', desc: '데이터베이스 목록 조회', active: 1 },
      { cmd: '\\c dbname', desc: '다른 데이터베이스로 전환', active: 3 },
      { cmd: '\\dt', desc: '현재 DB의 테이블 목록', active: 4 },
      { cmd: '\\d 테이블명', desc: '테이블 열 구조(스키마) 조회', active: -1 },
      { cmd: '\\q', desc: 'psql 종료', active: 5 }
    ];

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [typedLines, setTypedLines] = useState([]);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(prev => prev - 1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(prev => !prev); };

      useEffect(() => {
        setTypedLines([]);
        const lines = stepData.lines;
        const ids = lines.map((_, i) =>
          setTimeout(() => setTypedLines(prev => [...prev, lines[i]]), (i + 1) * 350)
        );
        return () => ids.forEach(clearTimeout);
      }, [currentStepIdx]);

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000);
        } else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-6">

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-8 h-8 bg-blue-700 text-white flex items-center justify-center rounded-full font-bold text-xl">P</div>
                <h1 className="text-2xl font-bold text-slate-800">III-1-2. psql로 첫 접속</h1>
              </div>
              <p className="text-slate-600">
                <b>psql</b>은 PostgreSQL과 대화하는 창구입니다. SQL과 <b>메타 커맨드(\\로 시작)</b>를 사용해 데이터베이스를 다룹니다.
              </p>
            </header>

            <div className="bg-blue-700 text-white p-5 rounded-xl shadow-sm border border-blue-800 flex flex-col justify-center min-h-[110px]">
              <h3 className="text-xs font-bold text-blue-200 mb-2 uppercase tracking-wider">현재 단계</h3>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
              <div className="flex flex-col space-y-4">
                {/* 터미널 */}
                <div className="bg-slate-900 rounded-xl shadow-sm border border-slate-700 min-h-[400px] flex flex-col overflow-hidden">
                  <div className="flex items-center px-4 py-2 bg-slate-800 border-b border-slate-700 gap-2">
                    <div className="w-3 h-3 rounded-full bg-red-500 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-400 font-mono">psql — PostgreSQL 터미널</span>
                  </div>
                  <div className="p-4 font-mono text-sm text-emerald-400 flex-1 overflow-y-auto space-y-0.5">
                    {typedLines.map((line, i) => (
                      <div key={`${currentStepIdx}-${i}`} className={`transition-opacity duration-300 ${
                        line.startsWith('$') || line.startsWith('postgres=#') || line.startsWith('mydb=#') ? 'text-white' :
                        line.includes('✓') || line === 'CREATE DATABASE' ? 'text-emerald-300 font-bold' :
                        line.startsWith('---') || line.startsWith('   ') ? 'text-slate-500' :
                        'text-slate-400'
                      }`}>
                        {line || '\u00A0'}
                      </div>
                    ))}
                    <div className="animate-pulse text-slate-500">▌</div>
                  </div>
                </div>

                {/* 컨트롤 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'} onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-blue-700 hover:bg-blue-800 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying ? (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</>) : (<><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>)}
                    </button>
                    <button aria-label="다음 단계" onClick={handleNext} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex gap-1">
                      {STEPS.map((s, i) => (
                        <button key={i} aria-label={`Step ${i + 1}: ${s.label}`} onClick={() => { setCurrentStepIdx(i); setIsPlaying(false); }}
                          className={`w-2.5 h-2.5 rounded-full transition-all ${i === currentStepIdx ? 'bg-blue-600 scale-125' : i < currentStepIdx ? 'bg-blue-300' : 'bg-slate-200'}`} />
                      ))}
                    </div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">{currentStepIdx + 1} / {STEPS.length}</div>
                  </div>
                </div>
              </div>

              {/* 오른쪽 패널 */}
              <div className="relative min-h-[400px] lg:min-h-0 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-white flex flex-col">
                  <div className="flex items-center px-4 py-3 bg-slate-100 border-b border-slate-200 gap-2">
                    <div className="w-3 h-3 rounded-full bg-amber-400 opacity-80"></div>
                    <div className="w-3 h-3 rounded-full bg-emerald-400 opacity-80"></div>
                    <span className="ml-2 text-xs text-slate-500 font-semibold">메타 커맨드 레퍼런스</span>
                  </div>
                  <div className="p-6 overflow-y-auto flex-1 space-y-4">
                    <h3 className="text-sm font-bold text-slate-700 border-b pb-2">자주 쓰는 메타 커맨드</h3>
                    {META_COMMANDS.map((mc, i) => (
                      <div key={i} className={`p-3 rounded-lg border-2 transition-all duration-500 ${mc.active === currentStepIdx ? 'border-blue-400 bg-blue-50 scale-[1.02] shadow-md' : 'border-slate-200 bg-slate-50'}`}>
                        <div className="flex items-center gap-2">
                          <code className={`px-2 py-0.5 rounded text-sm font-bold ${mc.active === currentStepIdx ? 'bg-blue-200 text-blue-800' : 'bg-slate-200 text-slate-700'}`}>{mc.cmd}</code>
                          <span className="text-sm text-slate-600">{mc.desc}</span>
                        </div>
                      </div>
                    ))}

                    <div className="space-y-3 mt-4">
                      <h3 className="text-sm font-bold text-slate-700 border-b pb-2">핵심 개념</h3>
                      <div className={`p-3 rounded-lg border-2 transition-all duration-500 ${currentStepIdx === 0 ? 'border-emerald-400 bg-emerald-50 scale-[1.02]' : 'border-slate-200 bg-slate-50'}`}>
                        <div className="text-xs font-bold text-emerald-600 mb-1">프롬프트 구분</div>
                        <div className="text-sm text-slate-700"><code className="bg-slate-200 px-1 rounded">#</code> = 슈퍼유저 / <code className="bg-slate-200 px-1 rounded">{'>'}</code> = 일반 사용자</div>
                      </div>
                      <div className={`p-3 rounded-lg border-2 transition-all duration-500 ${currentStepIdx === 0 ? 'border-blue-400 bg-blue-50 scale-[1.02]' : 'border-slate-200 bg-slate-50'}`}>
                        <div className="text-xs font-bold text-blue-600 mb-1">연결 문자열 (Connection String)</div>
                        <div className="text-sm text-slate-700">접속 정보를 한 줄로 표현</div>
                        <code className="text-xs text-slate-500 mt-1 block">psql "postgresql://postgres@localhost:5432/mydb"</code>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
