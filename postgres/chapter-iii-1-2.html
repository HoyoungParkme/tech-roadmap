          { kind: 'out', text: '  4) \\l                     # DB 목록' },
          { kind: 'out', text: '  5) \\q                     # 종료' },
        ],
        activeNote: {
          title: '종료 3가지 방법',
          items: [
            '\\q          : 정식 종료 (권장)',
            'Ctrl+D      : EOF 로 종료',
            'exit / quit : PG 16+ 안내 메시지',
          ],
        },
        keyPoint: '트랜잭션이 열려 있으면 종료 시 자동 ROLLBACK. 그래도 COMMIT/ROLLBACK 명시가 안전.',
        code: {
          lang: 'bash',
          filename: 'quit.sh',
          lines: [
            '#!/usr/bin/env bash',
            '# Step 5. psql 안전 종료',
            '',
            '# 정식 종료 (psql 프롬프트 안에서)',
            '#   postgres=# \\q',
            '',
            '# 또는 키보드 단축키',
            '#   Ctrl + D   (EOF 입력 = 종료)',
            '',
            '# PostgreSQL 16 부터는 일반 단어도 친절히 안내',
            '#   postgres=# exit',
            '#   Use \\q to quit.',
            '#   postgres=# quit',
            '#   Use \\q to quit.',
            '',
            '# 트랜잭션 열려 있을 때 종료하면?',
            '#   → 자동으로 ROLLBACK 되고 종료된다 (안전)',
            '#   → 그래도 명시적으로 끝내는 습관:',
            '#       postgres=# BEGIN;',
            '#       postgres=*# INSERT ...;',
            '#       postgres=*# COMMIT;   ← 또는 ROLLBACK;',
            '#       postgres=# \\q',
            '',
            '# 한 줄 명령만 실행하고 자동 종료 (psql 진입 없이)',
            'psql -h localhost -U postgres -d postgres -c "SELECT version();"',
            '#   → 실행 후 즉시 쉘로 복귀',
            '',
            '# 스크립트 파일 실행 후 종료',
            'psql -h localhost -U postgres -d postgres -f init.sql',
            '',
            '# ─────────────────────────────────',
            '# 첫 접속 한 사이클 요약',
            '# ─────────────────────────────────',
            '#   1) psql --help',
            '#   2) psql -h localhost -U postgres -d postgres',
            '#   3) postgres=#   ← 프롬프트로 확인',
            '#   4) \\l           ← DB 목록',
            '#   5) \\q           ← 종료',
            '#',
            '# 이 다음 챕터에서는 실제로 DB/테이블을 만들고',
            '# CREATE / INSERT / SELECT 를 차례로 해본다.',
          ],
          highlight: [3, 4, 6, 7, 9, 10, 11, 12, 13, 30, 31, 32, 33, 34, 35, 36, 37],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — 터미널 mock + 안내 박스
    // ─────────────────────────────────────────────────────
    const LINE_STYLE = {
      prompt:      { color: 'text-emerald-300', weight: 'font-bold' },
      cmd:         { color: 'text-orange-200',  weight: 'font-bold' },
      out:         { color: 'text-slate-300',   weight: 'font-normal' },
      sys:         { color: 'text-slate-500',   weight: 'italic' },
      psqlPrompt:  { color: 'text-amber-300',   weight: 'font-bold' },
    };

    function TerminalLine({ item }) {
      const s = LINE_STYLE[item.kind] || LINE_STYLE.out;
      if (item.kind === 'prompt') {
        return (
          <div className="flex">
            <span className={`${s.color} ${s.weight}`}>{item.text}</span>
          </div>
        );
      }
      if (item.kind === 'cmd') {
        return (
          <div className="flex pl-2">
            <span className="text-slate-500 mr-1">&gt;</span>
            <span className={`${s.color} ${s.weight}`}>{item.text}</span>
          </div>
        );
      }
      if (item.kind === 'psqlPrompt') {
        return (
          <div className="flex">
            <span className={`${s.color} ${s.weight}`}>{item.text}</span>
          </div>
        );
      }
      return (
        <div className={`${s.color} ${s.weight} whitespace-pre`}>{item.text || ' '}</div>
      );
    }

    function TerminalMock({ lines }) {
      return (
        <div className="rounded-lg overflow-hidden border border-slate-700 bg-[#0f172a] shadow-inner">
          <div className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-800 border-b border-slate-700">
            <span className="w-2.5 h-2.5 rounded-full bg-red-400"></span>
            <span className="w-2.5 h-2.5 rounded-full bg-yellow-400"></span>
            <span className="w-2.5 h-2.5 rounded-full bg-green-400"></span>
            <span className="ml-2 text-[10px] text-slate-300 font-mono">bash — psql session</span>
          </div>
          <div className="p-3 text-xs font-mono leading-5 max-h-[420px] overflow-auto">
            {lines.map((it, i) => (
              <TerminalLine key={i} item={it} />
            ))}
            <div className="flex items-center mt-1">
              <span className="text-amber-300 font-bold animate-pulse">▍</span>
            </div>
          </div>
        </div>
      );
    }

    function ActiveNote({ note }) {
      if (!note) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-orange-400 bg-orange-50 p-3">
          <div className="text-xs font-bold text-orange-800 mb-2">📌 {note.title}</div>
          <ul className="space-y-1">
            {note.items.map((a, i) => (
              <li key={i} className="text-sm text-orange-900 flex gap-2">
                <span className="text-orange-500">▸</span>
                <span className="font-mono">{a}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-orange-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-orange-800">터미널 시뮬레이션</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 실행 흐름</span>
          </div>
          <TerminalMock lines={state.terminalLines} />
          <ActiveNote note={state.activeNote} />
          <div className="mt-3 text-xs text-orange-900 bg-orange-50 border border-orange-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js + 탭)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total, onTabClick }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 탭 바 */}
          <div className="flex items-center gap-0 px-2 pt-2 bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {STEPS.map((s, i) => {
              const active = i === stepIdx;
              return (
                <button
                  key={i}
                  onClick={() => onTabClick(i)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-t-2 ${
                    active
                      ? 'bg-[#282c34] text-orange-300 border-orange-400'
                      : 'bg-slate-800 text-slate-400 border-transparent hover:text-slate-200'
                  }`}
                >
                  {s.code.filename}
                </button>
              );
            })}
          </div>
          {/* 파일 헤더 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-orange-500/15 border-l-2 border-orange-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-orange-600 text-white font-bold">III</span>
              <div>
                <h1 className="text-2xl font-bold text-orange-900">Chapter III-1-2. psql 첫 접속</h1>
                <p className="text-sm text-orange-800/80">--help → 접속 → 프롬프트 → \l → \q. 5단계 한 사이클</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-orange-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-orange-600' : 'bg-orange-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-orange-700 text-orange-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-orange-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} onTabClick={setStepIdx} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-orange-700 text-white' : 'bg-orange-600 text-white hover:bg-orange-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-orange-300 bg-white text-orange-700 hover:bg-orange-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-orange-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-orange-400 bg-white px-4 py-3 text-sm text-orange-900">
                <div className="font-bold mb-1">✅ 첫 접속 한 사이클 완료</div>
                옵션 확인(<code>--help</code>) → 접속(<code>-h -U -d</code>) → 프롬프트 확인(<code>postgres=#</code>) → 메타 명령(<code>\l</code>) → 종료(<code>\q</code>). 다음 챕터에서는 직접 DB/테이블을 만들고 CREATE / INSERT / SELECT 를 차례로 실습한다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['psql', '--help', '-h host', '-U user', '-d dbname', 'postgres=#', '\\l', '\\q', '메타명령', '.pgpass'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-orange-100 text-orange-800 border border-orange-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-orange-700">
              <a href="./chapter-iii-1-1.html" className="underline hover:no-underline">← 이전: III-1-1 PostgreSQL 설치</a>
              <a href="./index.html" className="underline hover:no-underline">챕터 목록</a>
              <a href="./chapter-iii-1-3.html" className="underline hover:no-underline">다음: III-1-3 첫 DB 만들기 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
