            border-bottom-style: dashed;
        }

        #canvas-container {
            width: 100vw;
            height: calc(100vh - 80px);
            cursor: grab;
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        .text-outline {
            text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff,
                         -2px 0 0 #fff, 2px 0 0 #fff, 0 -2px 0 #fff, 0 2px 0 #fff;
        }

        .btn-sketch {
            background: transparent;
            border: 2px solid #333;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            padding: 8px 16px;
            font-family: 'Nanum Pen Script', cursive;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 2px 2px 0px #333;
        }

        .btn-sketch:hover {
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px #333;
        }

        .clickable-item {
            cursor: pointer;
        }

        .clickable-item:hover rect {
            fill: #dcfce7 !important;
        }

        .clickable-item:hover text {
            fill: #15803d !important;
        }

        /* 댓글 패널 */
        #comment-panel {
            position: fixed;
            top: 80px;
            right: 0;
            width: 480px;
            min-width: 320px;
            max-width: 80vw;
            height: calc(100vh - 80px);
            background: #fff;
            border-left: 2px dashed #333;
            box-shadow: -4px 0 12px rgba(0,0,0,0.08);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 50;
            display: flex;
            flex-direction: column;
        }
        #comment-panel.open {
            transform: translateX(0);
        }
        #comment-panel.resizing {
            transition: none;
            user-select: none;
        }
        #resize-handle {
            position: absolute;
            left: -4px;
            top: 0;
            width: 8px;
            height: 100%;
            cursor: col-resize;
            z-index: 52;
        }
        #resize-handle:hover,
        #resize-handle.active {
            background: linear-gradient(90deg, transparent, rgba(99,102,241,0.3), transparent);
        }
        #comment-toggle {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 51;
            background: #fff;
            border: 2px solid #333;
            border-right: none;
            border-radius: 12px 0 0 12px;
            padding: 12px 8px;
            cursor: pointer;
            font-family: 'Nanum Pen Script', cursive;
            font-size: 20px;
            box-shadow: -2px 2px 0px #333;
            transition: right 0.3s ease;
            writing-mode: vertical-rl;
            letter-spacing: 2px;
        }
        #comment-toggle:hover {

        }
        .comment-header {

        function updateTogglePosition(w) {
            var toggle = document.getElementById("comment-toggle");
            var panel = document.getElementById("comment-panel");
            if (panel.classList.contains("open")) {
                toggle.style.right = w + "px";
            } else {
                toggle.style.right = "0px";
            }
        }

        function toggleComments() {
            var panel = document.getElementById("comment-panel");
            var isOpen = panel.classList.toggle("open");
            updateTogglePosition(isOpen ? panelWidth : 0);

            if (isOpen && !commentLoaded) {
                loadGiscus();
                commentLoaded = true;
            }
        }

        // 드래그 리사이즈 (오버레이로 마우스 이탈 방지)
        (function() {
            var handle = document.getElementById("resize-handle");
            var panel = document.getElementById("comment-panel");
            var overlay = null;

            handle.addEventListener("mousedown", function(e) {
                e.preventDefault();
                panel.classList.add("resizing");
                handle.classList.add("active");

                // 전체 화면 투명 오버레이로 마우스 캡처
                overlay = document.createElement("div");
                overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;cursor:col-resize;";
                document.body.appendChild(overlay);

                function onMove(ev) {
                    var newWidth = window.innerWidth - ev.clientX;
                    if (newWidth < 320) newWidth = 320;
                    if (newWidth > window.innerWidth * 0.8) newWidth = window.innerWidth * 0.8;
                    panelWidth = newWidth;
                    panel.style.width = newWidth + "px";
                    updateTogglePosition(newWidth);
                }

                function onUp() {
                    document.removeEventListener("mousemove", onMove);
                    document.removeEventListener("mouseup", onUp);
                    panel.classList.remove("resizing");
                    handle.classList.remove("active");
                    if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay);
                    overlay = null;
                }

                document.addEventListener("mousemove", onMove);
                document.addEventListener("mouseup", onUp);
            });
        })();

            script.setAttribute("data-input-position", "top");

            script.setAttribute("data-lang", "ko");

        /**
         * 손그림 느낌 박스를 그린다.
         * lines 배열에서 "---"는 구분선, "   -"로 시작하면 서브 항목.
         * 텍스트 안에 ● 또는 ○ 마커가 있으면 클릭 가능 항목으로 처리한다.
         */
        function drawBox(g, x, y, w, h, title, lines, bgColor, rotation) {
            rotation = rotation || 0;
            var boxGroup = g.append("g")
                .attr("transform", "translate(" + x + ", " + y + ") rotate(" + rotation + ")");

            // 그림자
            boxGroup.append("rect")
                .attr("x", -8).attr("y", 8)
                .attr("width", w).attr("height", h)
                .attr("fill", bgColor).attr("opacity", 0.6)
                .attr("filter", "url(#rough-pen)");

            // 본체
            boxGroup.append("rect")
                .attr("x", 0).attr("y", 0)
                .attr("width", w).attr("height", h)
                .attr("fill", "#fff")
                .attr("stroke", "#333").attr("stroke-width", 2.5)
                .attr("filter", "url(#rough-pen)");

            // 제목
            boxGroup.append("text")
                .attr("x", w / 2).attr("y", 35)
                .attr("text-anchor", "middle")
                .style("font-size", "28px").style("font-weight", "bold")
                .attr("class", "text-outline")
                .text(title);

            // 내용 줄
            var currentY = 75;
            lines.forEach(function(line) {
                if (line === "---") {
                    boxGroup.append("path")
                        .attr("d", "M 20 " + (currentY - 10) + " L " + (w - 20) + " " + (currentY - 10))
                        .attr("stroke", "#9ca3af").attr("stroke-width", 1.5)
                        .attr("stroke-dasharray", "4,4")
                        .attr("filter", "url(#rough-pen)");
                    currentY += 10;
                    return;
                }

                var isSub = line.startsWith("   -");
                var xPos = isSub ? 35 : 20;
                var fontSize = isSub ? "20px" : "23px";
                var fillColor = isSub ? "#4b5563" : "#111";

                // ● (ready) 또는 ○ (planned) 마커가 있는지 확인
                var hasReadyMarker = line.indexOf("\u25cf") !== -1;   // ●
                var hasPlannedMarker = line.indexOf("\u25cb") !== -1;  // ○

                if (hasReadyMarker || hasPlannedMarker) {
                    // 마커 텍스트에서 키워드 추출
                    var marker = hasReadyMarker ? "\u25cf" : "\u25cb";
                    var markerIdx = line.indexOf(marker);
                    var beforeMarker = line.substring(0, markerIdx);
                    var afterMarker = line.substring(markerIdx + 2); // marker + space

                    // 나머지 텍스트에서 쉼표로 분리 (같은 줄에 여러 항목이 있을 수 있음)
                    // beforeMarker 부분은 일반 텍스트로 그린다
                    if (beforeMarker.trim()) {
                        boxGroup.append("text")
                            .attr("x", xPos)
                            .attr("y", currentY)
                            .style("font-size", fontSize)
                            .style("fill", fillColor)
                            .text(beforeMarker);
                    }

                    // 클릭 가능 키워드 텍스트 추출
                    var keyword = afterMarker.trim();
                    var linkInfo = null;

                    // clickableLinks에서 매칭 찾기
                    Object.keys(clickableLinks).forEach(function(key) {
                        if (keyword.indexOf(key) !== -1) {
                            linkInfo = clickableLinks[key];
                        }
                    });

                    var markerXPos = beforeMarker ? xPos + beforeMarker.length * 11 : xPos;

                    if (linkInfo && linkInfo.status === "ready") {
                        // 클릭 가능 (초록 밑줄 + 포인터)
                        var clickUrl = linkInfo.url;
                        var clickGroup = boxGroup.append("g")

        // ==========================================

        function centerCanvas() {
            var mapWidth = 2900;
            var mapHeight = 2900;

            var scale = Math.min(width / mapWidth, height / mapHeight) * 0.9;
            var tx = (width - mapWidth * scale) / 2 + 50;
            var ty = (height - mapHeight * scale) / 2 + 50;

            var initialTransform = d3.zoomIdentity.translate(tx, ty).scale(scale);
            svg.transition().duration(1000).call(zoom.transform, initialTransform);
        }

        centerCanvas();

        document.getElementById("reset-btn").addEventListener("click", centerCanvas);

        window.addEventListener("resize", function() {
            width = container.clientWidth;
            height = container.clientHeight;
            svg.attr("width", width).attr("height", height);
