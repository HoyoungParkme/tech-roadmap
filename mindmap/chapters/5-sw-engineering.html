<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>소프트웨어 공학 — Chapter 5</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const STEPS = [
      { title: 'Step 1 — 애자일과 스크럼', desc: '애자일은 "작게, 빠르게, 반복"하는 개발 방식입니다. 2~4주 단위(스프린트)로 계획→개발→검증→회고를 반복합니다. 스크럼은 애자일의 대표적 프레임워크로, 데일리 스탠드업, 스프린트 리뷰 등의 의식을 가집니다.', metaphor: '마라톤 대신 100m 달리기를 여러 번. 매번 방향을 확인하며 달리니 잘못된 길로 멀리 가는 일이 없습니다.', panel: 'agile' },
      { title: 'Step 2 — DevOps 문화', desc: 'DevOps는 개발(Dev)과 운영(Ops)의 벽을 허무는 문화입니다. "내가 만들고, 내가 배포하고, 내가 모니터링한다." 자동화, 지속적 통합/배포, 모니터링이 핵심입니다.', metaphor: '요리사가 서빙까지: 요리(개발)만 하고 끝이 아니라 손님 반응(모니터링)까지 보고 다음 메뉴에 반영합니다.', panel: 'devops' },
      { title: 'Step 3 — CI/CD 파이프라인', desc: 'CI(Continuous Integration)는 코드를 자주 합치고 자동 테스트하는 것, CD(Continuous Deployment)는 검증된 코드를 자동으로 배포하는 것입니다. GitHub Actions, Jenkins 등의 도구를 사용합니다.', metaphor: '자동화 공장 라인: 부품 투입(코드 커밋) → 품질 검사(테스트) → 포장(빌드) → 출하(배포)가 자동으로 이어집니다.', panel: 'cicd' },
      { title: 'Step 4 — CBD와 컴포넌트 설계', desc: 'CBD(Component-Based Development)는 재사용 가능한 부품(컴포넌트)을 조립해 소프트웨어를 만드는 방식입니다. React의 컴포넌트, npm 패키지, Docker 이미지 모두 이 사상에 기반합니다.', metaphor: '레고 블록: 작은 블록(컴포넌트)을 조합해서 다양한 구조물을 만듭니다. 블록 하나를 바꿔도 전체가 무너지지 않습니다.', panel: 'cbd' },
      { title: 'Step 5 — 코드 리뷰와 클린 코드', desc: '코드 리뷰는 동료가 내 코드를 읽고 피드백하는 문화입니다. 클린 코드는 "읽기 쉽고, 수정하기 쉬운 코드"를 의미합니다. 의미 있는 이름, 작은 함수, 일관된 스타일이 핵심입니다.', metaphor: '글쓰기와 교정: 초고(첫 코드)를 쓰고, 교정(리뷰)을 받아 다듬으면 읽는 사람(미래의 나 포함)이 이해하기 쉬워집니다.', panel: 'clean' },
    ];

    function VisPanel({ type }) {
      if (type === 'agile') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">스크럼 스프린트 사이클</div>
          <div className="flex items-center justify-center">
            <div className="relative w-64 h-64">
              {[
                { label: '계획', angle: -90, color: 'blue', desc: 'Sprint Planning' },
                { label: '개발', angle: 0, color: 'emerald', desc: 'Development' },
                { label: '검증', angle: 90, color: 'amber', desc: 'Sprint Review' },
                { label: '회고', angle: 180, color: 'purple', desc: 'Retrospective' },
              ].map((item, i) => {
                const r = 90;
                const rad = (item.angle * Math.PI) / 180;
                const x = 132 + r * Math.cos(rad) - 32;
                const y = 132 + r * Math.sin(rad) - 24;
                return (
                  <div key={i} className={`absolute p-2 rounded-lg bg-${item.color}-50 border-2 border-${item.color}-300 text-center w-16`} style={{left:x,top:y}}>
                    <div className={`text-xs font-bold text-${item.color}-700`}>{item.label}</div>
                    <div className="text-[9px] text-slate-500">{item.desc}</div>
                  </div>
                );
              })}
              <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 bg-slate-800 text-white rounded-full w-16 h-16 flex items-center justify-center text-xs font-bold">2~4주<br/>반복</div>
            </div>
          </div>
          <div className="bg-blue-50 border border-blue-200 rounded-lg p-2 text-center text-xs text-blue-700">데일리 스탠드업: 매일 15분 — 어제/오늘/블로커 공유</div>
        </div>
      );
      if (type === 'devops') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">DevOps = Dev + Ops</div>
          <div className="grid grid-cols-2 gap-3 mb-3">
            <div className="border-2 border-blue-300 rounded-xl p-3 bg-blue-50 text-center">
              <div className="text-2xl mb-1">👨‍💻</div><div className="font-bold text-blue-700 text-sm">Dev (개발)</div>
              <div className="text-[10px] text-slate-500 mt-1">코드 작성, 테스트</div>
            </div>
            <div className="border-2 border-orange-300 rounded-xl p-3 bg-orange-50 text-center">
              <div className="text-2xl mb-1">🔧</div><div className="font-bold text-orange-700 text-sm">Ops (운영)</div>
              <div className="text-[10px] text-slate-500 mt-1">배포, 모니터링</div>
            </div>
          </div>
          <div className="border-2 border-emerald-300 rounded-xl p-3 bg-emerald-50 text-center">
            <div className="text-2xl mb-1">♾️</div><div className="font-bold text-emerald-700 text-sm">DevOps</div>
            <div className="text-[10px] text-slate-600 mt-1">자동화 + 지속적 통합 + 모니터링 = 빠르고 안정적 배포</div>
          </div>
          <div className="flex flex-wrap gap-2 justify-center">{['Docker','Kubernetes','Jenkins','GitHub Actions','Prometheus','Grafana'].map((t,i)=>(<span key={i} className="px-2 py-1 text-[10px] rounded-full bg-slate-100 text-slate-600 border border-slate-200">{t}</span>))}</div>
        </div>
      );
      if (type === 'cicd') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">CI/CD 파이프라인</div>
          {[
            { step: 'Code', desc: '개발자가 코드 커밋', icon: '💻', color: 'blue' },
            { step: 'Build', desc: '자동 빌드', icon: '🔨', color: 'indigo' },
            { step: 'Test', desc: '자동 테스트 (단위/통합)', icon: '✅', color: 'emerald' },
            { step: 'Release', desc: '배포 준비 (스테이징)', icon: '📦', color: 'amber' },
            { step: 'Deploy', desc: '프로덕션 자동 배포', icon: '🚀', color: 'red' },
            { step: 'Monitor', desc: '모니터링 + 알림', icon: '📊', color: 'purple' },
          ].map((s, i) => (
            <div key={i} className={`flex items-center gap-3 p-2 rounded-lg bg-${s.color}-50 border border-${s.color}-200`}>
              <div className="text-xl">{s.icon}</div>
              <div className="flex-1"><span className={`font-bold text-xs text-${s.color}-700`}>{s.step}</span><span className="text-[10px] text-slate-500 ml-2">{s.desc}</span></div>
              {i < 5 && <span className="text-slate-300">→</span>}
            </div>
          ))}
        </div>
      );
      if (type === 'cbd') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">컴포넌트 기반 개발</div>
          <div className="bg-white border-2 border-slate-300 rounded-xl p-4">
            <div className="text-xs font-bold text-slate-700 mb-3 text-center">웹 페이지 = 컴포넌트 조합</div>
            <div className="border-2 border-blue-200 rounded-lg p-2 mb-2 bg-blue-50"><div className="text-[10px] font-bold text-blue-600">Header 컴포넌트</div></div>
            <div className="grid grid-cols-3 gap-2 mb-2">
              <div className="col-span-2 border-2 border-emerald-200 rounded-lg p-2 bg-emerald-50"><div className="text-[10px] font-bold text-emerald-600">Content 컴포넌트</div>
                <div className="grid grid-cols-2 gap-1 mt-1">
                  <div className="border border-amber-200 rounded p-1 bg-amber-50 text-[9px] text-amber-600">Card</div>
                  <div className="border border-amber-200 rounded p-1 bg-amber-50 text-[9px] text-amber-600">Card</div>
                </div>
              </div>
              <div className="border-2 border-purple-200 rounded-lg p-2 bg-purple-50"><div className="text-[10px] font-bold text-purple-600">Sidebar</div></div>
            </div>
            <div className="border-2 border-slate-200 rounded-lg p-2 bg-slate-50"><div className="text-[10px] font-bold text-slate-600">Footer 컴포넌트</div></div>
          </div>
          <div className="text-center text-xs text-slate-500">각 컴포넌트는 독립적으로 개발·테스트·재사용 가능</div>
        </div>
      );
      if (type === 'clean') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">클린 코드 원칙</div>
          {[
            { rule: '의미 있는 이름', bad: 'let x = 5;', good: 'let retryCount = 5;', icon: '🏷️' },
            { rule: '함수는 하나만', bad: 'function doEverything()', good: 'function validateEmail()', icon: '🎯' },
            { rule: '주석보다 코드로', bad: '// 사용자를 찾는다', good: 'findUserById(id)', icon: '📝' },
            { rule: '일관된 스타일', bad: 'camelCase + snake_case 혼용', good: '팀 컨벤션 통일', icon: '📏' },
          ].map((r, i) => (
            <div key={i} className="p-3 rounded-lg bg-white border border-slate-200">
              <div className="flex items-center gap-2 mb-2"><span className="text-lg">{r.icon}</span><span className="text-xs font-bold text-slate-700">{r.rule}</span></div>
              <div className="grid grid-cols-2 gap-2">
                <div className="bg-red-50 border border-red-200 rounded p-1.5"><div className="text-[9px] text-red-500 font-bold">Bad</div><div className="text-[10px] font-mono text-red-700">{r.bad}</div></div>
                <div className="bg-emerald-50 border border-emerald-200 rounded p-1.5"><div className="text-[9px] text-emerald-500 font-bold">Good</div><div className="text-[10px] font-mono text-emerald-700">{r.good}</div></div>
              </div>
            </div>
          ))}
        </div>
      );
      return null;
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const step = STEPS[stepIdx];
      useEffect(() => { if (!isPlaying) return; const t = setInterval(() => { setStepIdx(p => { if(p>=STEPS.length-1){setIsPlaying(false);return p;} return p+1; }); }, 4000); return ()=>clearInterval(t); }, [isPlaying]);
      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-cyan-50">
          <header className="bg-white border-b border-slate-200 px-6 py-4"><div className="max-w-6xl mx-auto flex items-center justify-between"><div><h1 className="text-lg font-bold text-slate-800">제5장. 소프트웨어 공학</h1><p className="text-xs text-slate-500">애자일, DevOps, CI/CD, CBD, 클린 코드</p></div><a href="../index.html" className="text-xs text-slate-400 hover:text-slate-600">&larr; 로드맵</a></div></header>
          <main className="max-w-6xl mx-auto px-6 py-6">
            <div className="flex items-center justify-between mb-4">
              <div className="flex gap-1.5">{STEPS.map((_,i)=>(<button key={i} onClick={()=>{setStepIdx(i);setIsPlaying(false);}} className={`w-3 h-3 rounded-full transition-all duration-300 ${i===stepIdx?'bg-cyan-500 scale-125':i<stepIdx?'bg-cyan-300':'bg-slate-200'}`}/>))}</div>
              <div className="flex gap-2">
                <button onClick={()=>{setStepIdx(Math.max(0,stepIdx-1));setIsPlaying(false);}} disabled={stepIdx===0} className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white disabled:opacity-30">이전</button>
                <button onClick={()=>setIsPlaying(!isPlaying)} className="px-3 py-1.5 text-xs rounded-lg font-medium bg-cyan-500 text-white">{isPlaying?'정지':'자동 실행'}</button>
                <button onClick={()=>{setStepIdx(Math.min(STEPS.length-1,stepIdx+1));setIsPlaying(false);}} disabled={stepIdx===STEPS.length-1} className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white disabled:opacity-30">다음</button>
              </div>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 min-h-[400px]"><VisPanel type={step.panel} /></div>
              <div className="space-y-4">
                <div className="bg-cyan-50 border border-cyan-200 rounded-xl p-5"><h2 className="font-bold text-cyan-800 text-lg mb-2">{step.title}</h2><p className="text-sm text-cyan-700 leading-relaxed">{step.desc}</p></div>
                <div className="bg-amber-50 border border-amber-200 rounded-xl p-4"><div className="text-xs font-bold text-amber-600 mb-1">💡 비유로 이해하기</div><p className="text-sm text-amber-800">{step.metaphor}</p></div>
              </div>
            </div>
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
