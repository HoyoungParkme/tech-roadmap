<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>앱 종류: 웹/네이티브/하이브리드 — Chapter 1-3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    Chapter 1-3 — 앱 종류: 웹 앱 / 네이티브 앱 / 하이브리드 앱
    학습 목표: 세 가지 앱 유형의 차이, 장단점, 적합한 상황을 이해한다.
  -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    const STEPS = [
      {
        title: 'Step 1 — 앱의 세 가지 종류',
        desc: '우리가 사용하는 앱은 크게 세 가지로 나뉩니다: 웹 앱, 네이티브 앱, 하이브리드 앱. 각각 만드는 방법, 설치 방법, 성능이 다릅니다.',
        metaphor: '음식 비유: 배달 음식(웹), 직접 조리(네이티브), 밀키트(하이브리드) — 모두 "먹는 것"이지만 방식이 다릅니다.',
        highlight: 'overview',
      },
      {
        title: 'Step 2 — 웹 앱',
        desc: '브라우저에서 실행됩니다. 설치가 필요 없고, URL만 있으면 접속 가능. HTML/CSS/JavaScript로 만들며, 업데이트가 즉시 반영됩니다. 단, 카메라·GPS 같은 기기 기능 접근이 제한적입니다.',
        metaphor: '배달 음식: 주문하면 바로 먹을 수 있지만, 직접 만든 것보다 맞춤 조절이 어렵습니다.',
        highlight: 'web',
        examples: ['Gmail', 'Google Docs', 'Notion 웹'],
        tech: ['HTML', 'CSS', 'JavaScript', 'React', 'Vue'],
      },
      {
        title: 'Step 3 — 네이티브 앱',
        desc: '각 운영체제(iOS/Android)에 맞춰 전용 언어로 개발합니다. 앱스토어에서 설치하며, 카메라·GPS·알림 등 기기 기능을 100% 활용합니다. 성능이 가장 좋지만, iOS/Android를 따로 만들어야 합니다.',
        metaphor: '직접 조리: 재료부터 고르고, 내 입맛에 완벽하게 맞출 수 있지만 시간과 노력이 많이 듭니다.',
        highlight: 'native',
        examples: ['카카오톡', 'Instagram', '배달의민족'],
        tech: ['Swift (iOS)', 'Kotlin (Android)', 'Xcode', 'Android Studio'],
      },
      {
        title: 'Step 4 — 하이브리드 앱',
        desc: '웹 기술로 만들되, 네이티브 껍데기로 감싸서 앱스토어에 올립니다. 하나의 코드로 iOS/Android 동시 지원이 가능합니다. 성능은 네이티브보다 약간 떨어지지만, 개발 속도가 빠릅니다.',
        metaphor: '밀키트: 반조리 상태에서 간단히 완성. 직접 요리보다 빠르고, 배달보다 맞춤이 가능합니다.',
        highlight: 'hybrid',
        examples: ['Ionic 앱', 'React Native 앱', 'Flutter 앱'],
        tech: ['React Native', 'Flutter', 'Ionic', 'Capacitor'],
      },
      {
        title: 'Step 5 — 어떤 걸 선택할까?',
        desc: '정답은 없습니다. 프로젝트의 목적, 예산, 기간, 필요한 기능에 따라 선택이 달라집니다. 최근에는 하이브리드 기술(Flutter, React Native)이 빠르게 성장하고 있습니다.',
        metaphor: '예산과 시간을 고려해서 음식을 선택하는 것과 같습니다.',
        highlight: 'decision',
      },
    ];

    const NAV_CHAPTERS = [
      { id: '1-1', title: '개발이란?', file: '1-1-dev-intro.html' },
      { id: '1-2', title: '좋은 개발자', file: '1-2-good-developer.html' },
      { id: '1-3', title: '앱 종류', file: '1-3-app-types.html', active: true },
      { id: '1-4', title: '프론트/백엔드', file: '1-4-frontend-backend.html' },
      { id: '2-1', title: '웹 vs 네이티브', file: '2-1-webapp-vs-native.html' },
    ];

    const APP_TYPES = [
      { key: 'web', name: '웹 앱', icon: '🌐', color: 'blue', install: '불필요', performance: '보통', device: '제한적', cost: '낮음', update: '즉시' },
      { key: 'native', name: '네이티브 앱', icon: '📱', color: 'purple', install: '앱스토어', performance: '최고', device: '100%', cost: '높음', update: '스토어 심사' },
      { key: 'hybrid', name: '하이브리드 앱', icon: '🔄', color: 'emerald', install: '앱스토어', performance: '좋음', device: '대부분', cost: '중간', update: '스토어 심사' },
    ];

    function VisPanel({ step }) {
      const { highlight } = step;

      if (highlight === 'overview') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-4">앱의 세 가지 종류</div>
          <div className="grid grid-cols-3 gap-4">
            {APP_TYPES.map((t) => (
              <div key={t.key} className={`text-center p-4 rounded-xl border-2 border-${t.color}-300 bg-${t.color}-50 transition-all duration-500 hover:scale-105`}>
                <div className="text-4xl mb-2">{t.icon}</div>
                <div className={`font-bold text-${t.color}-700`}>{t.name}</div>
              </div>
            ))}
          </div>
          <div className="flex justify-center gap-2 mt-4">
            <span className="bg-slate-100 px-3 py-1 rounded-full text-xs text-slate-600">설치 방식이 다르다</span>
            <span className="bg-slate-100 px-3 py-1 rounded-full text-xs text-slate-600">성능이 다르다</span>
            <span className="bg-slate-100 px-3 py-1 rounded-full text-xs text-slate-600">개발 비용이 다르다</span>
          </div>
        </div>
      );

      if (highlight === 'web' || highlight === 'native' || highlight === 'hybrid') {
        const t = APP_TYPES.find(a => a.key === highlight);
        return (
          <div className="space-y-4">
            <div className="text-center">
              <div className="text-5xl mb-2">{t.icon}</div>
              <div className={`text-xl font-bold text-${t.color}-700`}>{t.name}</div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              {[
                { label: '설치', value: t.install },
                { label: '성능', value: t.performance },
                { label: '기기 기능', value: t.device },
                { label: '개발 비용', value: t.cost },
                { label: '업데이트', value: t.update },
              ].map((row, i) => (
                <div key={i} className={`flex justify-between items-center p-2 rounded-lg bg-${t.color}-50 border border-${t.color}-200`}>
                  <span className="text-xs text-slate-600">{row.label}</span>
                  <span className={`text-xs font-bold text-${t.color}-700`}>{row.value}</span>
                </div>
              ))}
            </div>
            <div>
              <div className="text-xs font-bold text-slate-500 mb-2">대표 예시</div>
              <div className="flex flex-wrap gap-2">
                {step.examples.map((ex, i) => (
                  <span key={i} className={`px-2 py-1 text-xs rounded-full bg-${t.color}-100 text-${t.color}-700`}>{ex}</span>
                ))}
              </div>
            </div>
            <div>
              <div className="text-xs font-bold text-slate-500 mb-2">기술 스택</div>
              <div className="flex flex-wrap gap-2">
                {step.tech.map((tc, i) => (
                  <span key={i} className="px-2 py-1 text-xs rounded-full bg-slate-100 text-slate-700 border border-slate-200">{tc}</span>
                ))}
              </div>
            </div>
          </div>
        );
      }

      if (highlight === 'decision') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">상황별 추천</div>
          {[
            { situation: '빠르게 MVP 출시', recommend: '웹 앱', reason: '설치 없이 URL 공유', color: 'blue' },
            { situation: '고성능 + 기기 기능', recommend: '네이티브 앱', reason: '카메라, GPS, AR 등', color: 'purple' },
            { situation: '1개 코드로 양쪽 출시', recommend: '하이브리드 앱', reason: '개발 비용 절감', color: 'emerald' },
            { situation: '내부 업무 도구', recommend: '웹 앱', reason: '업데이트 즉시 반영', color: 'blue' },
          ].map((item, i) => (
            <div key={i} className={`flex items-center gap-3 p-3 rounded-lg border border-${item.color}-200 bg-${item.color}-50`}>
              <div className={`px-3 py-1 rounded-full text-xs font-bold bg-${item.color}-200 text-${item.color}-800 whitespace-nowrap`}>{item.recommend}</div>
              <div>
                <div className="text-sm font-bold text-slate-700">{item.situation}</div>
                <div className="text-xs text-slate-500">{item.reason}</div>
              </div>
            </div>
          ))}
        </div>
      );

      return null;
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const step = STEPS[stepIdx];

      useEffect(() => {
        if (!isPlaying) return;
        const timer = setInterval(() => {
          setStepIdx(prev => {
            if (prev >= STEPS.length - 1) { setIsPlaying(false); return prev; }
            return prev + 1;
          });
        }, 4000);
        return () => clearInterval(timer);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-purple-50">
          <header className="bg-white border-b border-slate-200 px-6 py-4">
            <div className="max-w-6xl mx-auto flex items-center justify-between">
              <div>
                <h1 className="text-lg font-bold text-slate-800">Chapter 1-3. 앱 종류: 웹 / 네이티브 / 하이브리드</h1>
                <p className="text-xs text-slate-500">제1~2장. 소프트웨어 개론</p>
              </div>
              <a href="../index.html" className="text-xs text-slate-400 hover:text-slate-600">← 로드맵</a>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-6 py-6">
            <div className="flex items-center justify-between mb-4">
              <div className="flex gap-1.5">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStepIdx(i); setIsPlaying(false); }}
                    className={`w-3 h-3 rounded-full transition-all duration-300 ${i === stepIdx ? 'bg-purple-500 scale-125' : i < stepIdx ? 'bg-purple-300' : 'bg-slate-200'}`} />
                ))}
              </div>
              <div className="flex gap-2">
                <button onClick={() => { setStepIdx(Math.max(0, stepIdx - 1)); setIsPlaying(false); }}
                  disabled={stepIdx === 0}
                  className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white hover:bg-slate-50 disabled:opacity-30">이전</button>
                <button onClick={() => setIsPlaying(!isPlaying)}
                  className={`px-3 py-1.5 text-xs rounded-lg font-medium ${isPlaying ? 'bg-red-500 text-white' : 'bg-purple-500 text-white'}`}>
                  {isPlaying ? '정지' : '자동 실행'}
                </button>
                <button onClick={() => { setStepIdx(Math.min(STEPS.length - 1, stepIdx + 1)); setIsPlaying(false); }}
                  disabled={stepIdx === STEPS.length - 1}
                  className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white hover:bg-slate-50 disabled:opacity-30">다음</button>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 min-h-[400px]">
                <VisPanel step={step} />
              </div>
              <div className="space-y-4">
                <div className="bg-purple-50 border border-purple-200 rounded-xl p-5">
                  <h2 className="font-bold text-purple-800 text-lg mb-2">{step.title}</h2>
                  <p className="text-sm text-purple-700 leading-relaxed">{step.desc}</p>
                </div>
                <div className="bg-amber-50 border border-amber-200 rounded-xl p-4">
                  <div className="text-xs font-bold text-amber-600 mb-1">💡 비유로 이해하기</div>
                  <p className="text-sm text-amber-800">{step.metaphor}</p>
                </div>
              </div>
            </div>

            <nav className="mt-8 bg-white rounded-xl shadow-sm border border-slate-200 p-4">
              <div className="text-xs font-bold text-slate-400 mb-3">제1~2장. 소프트웨어 개론</div>
              <div className="flex flex-wrap gap-2">
                {NAV_CHAPTERS.map((ch) => (
                  <a key={ch.id} href={ch.file}
                    className={`px-3 py-1.5 text-xs rounded-lg transition-all ${ch.active ? 'bg-purple-500 text-white font-bold' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                    {ch.id} {ch.title}
                  </a>
                ))}
              </div>
            </nav>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
