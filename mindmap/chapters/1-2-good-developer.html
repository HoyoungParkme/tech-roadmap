<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>개발 잘하는 사람? — Chapter 1-2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const STEPS = [
      {
        title: 'Step 1 — 코딩 실력만이 전부가 아니다',
        desc: '"개발 잘한다"는 말은 단순히 코드를 빨리 치는 게 아닙니다. 문제를 정확히 이해하고, 유지보수하기 쉬운 코드를 작성하며, 팀과 소통하는 것까지 포함합니다.',
        metaphor: '요리 비유: 빠르게 자르는 칼질보다, 맛있는 요리를 일관되게 내놓는 능력이 중요합니다.',
        panel: 'intro',
      },
      {
        title: 'Step 2 — 하드 스킬: 기술 역량',
        desc: '프로그래밍 언어, 자료구조/알고리즘, 프레임워크, 디버깅 능력 등 기술적 실력입니다. 이것이 기본이지만, 이것만으로는 부족합니다.',
        metaphor: '요리 비유: 칼질, 불 조절, 양념 비율 같은 기본기입니다.',
        panel: 'hard',
      },
      {
        title: 'Step 3 — 소프트 스킬: 소통과 협업',
        desc: '코드 리뷰, 문서 작성, 요구사항 이해, 일정 관리 등 사람과 함께 일하는 능력입니다. 혼자 개발하는 시대는 끝났습니다.',
        metaphor: '요리 비유: 주방 팀과 소통하고, 주문을 정확히 파악하는 능력입니다.',
        panel: 'soft',
      },
      {
        title: 'Step 4 — 문제 해결 능력',
        desc: '모르는 것을 빠르게 찾아서 해결하는 능력이 핵심입니다. 모든 걸 외우는 게 아니라, "어디서 어떻게 찾는지"를 아는 것이 중요합니다.',
        metaphor: '요리 비유: 새로운 레시피를 보고 바로 응용할 수 있는 적응력입니다.',
        panel: 'problem',
      },
      {
        title: 'Step 5 — 성장하는 개발자의 습관',
        desc: '꾸준히 배우고, 실패에서 배우며, 자신의 코드를 돌아보는 습관. 1년 전 내 코드가 부끄럽다면, 그만큼 성장한 것입니다.',
        metaphor: '운동 비유: 매일 조금씩 하는 사람이 한 달에 한 번 폭풍 운동하는 사람보다 건강합니다.',
        panel: 'growth',
      },
    ];

    const NAV_CHAPTERS = [
      { id: '1-1', title: '개발이란?', file: '1-1-dev-intro.html' },
      { id: '1-2', title: '좋은 개발자', file: '1-2-good-developer.html', active: true },
      { id: '1-3', title: '앱 종류', file: '1-3-app-types.html' },
      { id: '1-4', title: '프론트/백엔드', file: '1-4-frontend-backend.html' },
      { id: '2-1', title: '웹 vs 네이티브', file: '2-1-webapp-vs-native.html' },
    ];

    function VisPanel({ type }) {
      if (type === 'intro') return (
        <div className="space-y-4">
          <div className="text-center text-5xl mb-2">👩‍💻</div>
          <div className="text-center text-sm font-bold text-slate-600 mb-4">"개발 잘한다" = ?</div>
          <div className="grid grid-cols-3 gap-3">
            {[
              { icon: '⚡', label: '빠른 코딩', wrong: true },
              { icon: '🧠', label: '모든 걸 암기', wrong: true },
              { icon: '🏆', label: '알고리즘 1등', wrong: true },
            ].map((item, i) => (
              <div key={i} className="text-center p-3 rounded-lg border-2 border-red-200 bg-red-50 relative">
                <div className="text-2xl mb-1">{item.icon}</div>
                <div className="text-xs text-slate-600">{item.label}</div>
                <div className="absolute -top-2 -right-2 w-6 h-6 bg-red-500 text-white rounded-full text-xs flex items-center justify-center font-bold">X</div>
              </div>
            ))}
          </div>
          <div className="text-center text-slate-400 text-lg my-2">↓</div>
          <div className="grid grid-cols-3 gap-3">
            {[
              { icon: '🎯', label: '문제 해결' },
              { icon: '🤝', label: '팀 협업' },
              { icon: '📈', label: '꾸준한 성장' },
            ].map((item, i) => (
              <div key={i} className="text-center p-3 rounded-lg border-2 border-emerald-300 bg-emerald-50">
                <div className="text-2xl mb-1">{item.icon}</div>
                <div className="text-xs font-bold text-emerald-700">{item.label}</div>
              </div>
            ))}
          </div>
        </div>
      );

      if (type === 'hard') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-blue-600 mb-2">하드 스킬 (기술 역량)</div>
          {[
            { skill: '프로그래밍 언어', level: 85, desc: 'Python, JavaScript, Java 등' },
            { skill: '자료구조 / 알고리즘', level: 70, desc: '효율적 문제 해결의 기본기' },
            { skill: '프레임워크', level: 75, desc: 'React, FastAPI, Spring Boot 등' },
            { skill: '디버깅', level: 80, desc: '에러를 읽고 원인을 추적하는 능력' },
            { skill: '버전 관리 (Git)', level: 90, desc: '협업의 기본 도구' },
          ].map((item, i) => (
            <div key={i} className="p-2 rounded-lg bg-blue-50 border border-blue-200">
              <div className="flex justify-between items-center mb-1">
                <span className="text-xs font-bold text-blue-700">{item.skill}</span>
                <span className="text-[10px] text-slate-500">{item.desc}</span>
              </div>
              <div className="h-2 bg-blue-100 rounded-full overflow-hidden">
                <div className="h-full bg-blue-500 rounded-full transition-all duration-1000" style={{width: `${item.level}%`}}></div>
              </div>
            </div>
          ))}
        </div>
      );

      if (type === 'soft') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-purple-600 mb-2">소프트 스킬 (소통과 협업)</div>
          {[
            { skill: '코드 리뷰', icon: '👀', desc: '동료 코드를 읽고 건설적 피드백' },
            { skill: '문서 작성', icon: '📝', desc: 'README, API 문서, 주석' },
            { skill: '요구사항 이해', icon: '👂', desc: '고객/기획자의 말을 코드로 번역' },
            { skill: '일정 관리', icon: '📅', desc: '작업 쪼개기, 우선순위 판단' },
            { skill: '질문하는 능력', icon: '❓', desc: '막힐 때 적절히 도움 요청' },
          ].map((item, i) => (
            <div key={i} className="flex items-center gap-3 p-3 rounded-lg bg-purple-50 border border-purple-200">
              <div className="text-2xl">{item.icon}</div>
              <div>
                <div className="text-sm font-bold text-purple-700">{item.skill}</div>
                <div className="text-xs text-slate-600">{item.desc}</div>
              </div>
            </div>
          ))}
        </div>
      );

      if (type === 'problem') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-amber-600 mb-2">문제 해결 4단계</div>
          {[
            { step: '1', title: '문제 정의', desc: '"정확히 뭐가 안 되는 거지?"', color: 'amber' },
            { step: '2', title: '검색 & 조사', desc: 'Google, StackOverflow, 공식 문서', color: 'amber' },
            { step: '3', title: '가설 & 실험', desc: '"이것 때문인 것 같다" → 테스트', color: 'amber' },
            { step: '4', title: '해결 & 기록', desc: '고친 후 왜 이런 문제였는지 정리', color: 'emerald' },
          ].map((item, i) => (
            <div key={i} className={`flex items-center gap-3 p-3 rounded-lg border-2 border-${item.color}-200 bg-${item.color}-50`}>
              <div className={`w-8 h-8 rounded-full bg-${item.color}-500 text-white flex items-center justify-center font-bold text-sm`}>{item.step}</div>
              <div>
                <div className={`font-bold text-${item.color}-700 text-sm`}>{item.title}</div>
                <div className="text-xs text-slate-600">{item.desc}</div>
              </div>
            </div>
          ))}
        </div>
      );

      if (type === 'growth') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-emerald-600 mb-2">성장하는 개발자의 5가지 습관</div>
          {[
            { habit: '매일 코드 읽기/쓰기', icon: '📖' },
            { habit: '사이드 프로젝트 하나씩', icon: '🛠️' },
            { habit: '기술 블로그 / TIL 정리', icon: '✍️' },
            { habit: '오픈소스 기여 시도', icon: '🌐' },
            { habit: '1년 전 내 코드 돌아보기', icon: '🔄' },
          ].map((item, i) => (
            <div key={i} className="flex items-center gap-3 p-3 rounded-xl bg-gradient-to-r from-emerald-50 to-teal-50 border border-emerald-200">
              <div className="text-2xl">{item.icon}</div>
              <div className="font-medium text-sm text-emerald-800">{item.habit}</div>
            </div>
          ))}
        </div>
      );

      return null;
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const step = STEPS[stepIdx];

      useEffect(() => {
        if (!isPlaying) return;
        const timer = setInterval(() => {
          setStepIdx(prev => {
            if (prev >= STEPS.length - 1) { setIsPlaying(false); return prev; }
            return prev + 1;
          });
        }, 4000);
        return () => clearInterval(timer);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-emerald-50">
          <header className="bg-white border-b border-slate-200 px-6 py-4">
            <div className="max-w-6xl mx-auto flex items-center justify-between">
              <div>
                <h1 className="text-lg font-bold text-slate-800">Chapter 1-2. 개발 잘하는 사람?</h1>
                <p className="text-xs text-slate-500">제1~2장. 소프트웨어 개론</p>
              </div>
              <a href="../index.html" className="text-xs text-slate-400 hover:text-slate-600">&larr; 로드맵</a>
            </div>
          </header>
          <main className="max-w-6xl mx-auto px-6 py-6">
            <div className="flex items-center justify-between mb-4">
              <div className="flex gap-1.5">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStepIdx(i); setIsPlaying(false); }}
                    className={`w-3 h-3 rounded-full transition-all duration-300 ${i === stepIdx ? 'bg-emerald-500 scale-125' : i < stepIdx ? 'bg-emerald-300' : 'bg-slate-200'}`} />
                ))}
              </div>
              <div className="flex gap-2">
                <button onClick={() => { setStepIdx(Math.max(0, stepIdx - 1)); setIsPlaying(false); }} disabled={stepIdx === 0}
                  className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white hover:bg-slate-50 disabled:opacity-30">이전</button>
                <button onClick={() => setIsPlaying(!isPlaying)}
                  className={`px-3 py-1.5 text-xs rounded-lg font-medium ${isPlaying ? 'bg-red-500 text-white' : 'bg-emerald-500 text-white'}`}>
                  {isPlaying ? '정지' : '자동 실행'}</button>
                <button onClick={() => { setStepIdx(Math.min(STEPS.length - 1, stepIdx + 1)); setIsPlaying(false); }} disabled={stepIdx === STEPS.length - 1}
                  className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white hover:bg-slate-50 disabled:opacity-30">다음</button>
              </div>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 min-h-[400px]">
                <VisPanel type={step.panel} />
              </div>
              <div className="space-y-4">
                <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-5">
                  <h2 className="font-bold text-emerald-800 text-lg mb-2">{step.title}</h2>
                  <p className="text-sm text-emerald-700 leading-relaxed">{step.desc}</p>
                </div>
                <div className="bg-amber-50 border border-amber-200 rounded-xl p-4">
                  <div className="text-xs font-bold text-amber-600 mb-1">💡 비유로 이해하기</div>
                  <p className="text-sm text-amber-800">{step.metaphor}</p>
                </div>
              </div>
            </div>
            <nav className="mt-8 bg-white rounded-xl shadow-sm border border-slate-200 p-4">
              <div className="text-xs font-bold text-slate-400 mb-3">제1~2장. 소프트웨어 개론</div>
              <div className="flex flex-wrap gap-2">
                {NAV_CHAPTERS.map((ch) => (
                  <a key={ch.id} href={ch.file}
                    className={`px-3 py-1.5 text-xs rounded-lg transition-all ${ch.active ? 'bg-emerald-500 text-white font-bold' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                    {ch.id} {ch.title}</a>
                ))}
              </div>
            </nav>
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
