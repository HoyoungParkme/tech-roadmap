<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프론트엔드 vs 백엔드 — Chapter 1-4</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const STEPS = [
      {
        title: 'Step 1 — 레스토랑으로 이해하기',
        desc: '웹 서비스를 레스토랑에 비유하면, 프론트엔드는 "홀(식당 공간)"이고 백엔드는 "주방"입니다. 손님(사용자)은 홀만 보지만, 진짜 요리는 주방에서 만들어집니다.',
        metaphor: '손님은 예쁜 메뉴판과 인테리어(프론트엔드)를 보고, 주문이 들어가면 주방(백엔드)에서 요리(데이터 처리)가 시작됩니다.',
        panel: 'restaurant',
      },
      {
        title: 'Step 2 — 프론트엔드: 사용자가 보는 화면',
        desc: '프론트엔드는 사용자가 직접 보고 클릭하는 모든 것입니다. 버튼, 입력창, 애니메이션, 레이아웃 등 "눈에 보이는 것"을 만듭니다. HTML(구조), CSS(디자인), JavaScript(동작)가 기본입니다.',
        metaphor: '홀 매니저: 테이블 배치, 메뉴판 디자인, 조명, 음악 — 손님의 경험을 만듭니다.',
        panel: 'frontend',
      },
      {
        title: 'Step 3 — 백엔드: 뒤에서 돌아가는 로직',
        desc: '백엔드는 데이터 저장, 인증(로그인), 비즈니스 로직, API 제공 등 "눈에 안 보이지만 핵심"인 것을 처리합니다. 서버, 데이터베이스, 보안이 핵심입니다.',
        metaphor: '주방장: 주문 접수, 재료 관리, 요리, 위생 — 보이지 않지만 레스토랑의 핵심입니다.',
        panel: 'backend',
      },
      {
        title: 'Step 4 — 둘은 어떻게 대화할까? (API)',
        desc: '프론트엔드와 백엔드는 API(Application Programming Interface)로 대화합니다. 프론트엔드가 "이 사용자의 주문 목록 줘"라고 요청하면, 백엔드가 데이터를 보내줍니다.',
        metaphor: '주문서: 홀에서 주방으로 전달되는 주문서가 바로 API입니다. 형식이 정해져 있어야 혼란이 없습니다.',
        panel: 'api',
      },
      {
        title: 'Step 5 — 풀스택: 둘 다 하는 사람',
        desc: '프론트엔드와 백엔드를 모두 다루는 개발자를 "풀스택 개발자"라고 합니다. 처음에는 한 쪽을 깊이 배우고, 점차 나머지를 확장하는 것이 현실적입니다.',
        metaphor: '홀과 주방을 모두 할 수 있는 만능 사장님. 작은 가게에서 특히 유용합니다.',
        panel: 'fullstack',
      },
    ];

    const NAV_CHAPTERS = [
      { id: '1-1', title: '개발이란?', file: '1-1-dev-intro.html' },
      { id: '1-2', title: '좋은 개발자', file: '1-2-good-developer.html' },
      { id: '1-3', title: '앱 종류', file: '1-3-app-types.html' },
      { id: '1-4', title: '프론트/백엔드', file: '1-4-frontend-backend.html', active: true },
      { id: '2-1', title: '웹 vs 네이티브', file: '2-1-webapp-vs-native.html' },
    ];

    function VisPanel({ type }) {
      if (type === 'restaurant') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">웹 서비스 = 레스토랑</div>
          <div className="grid grid-cols-2 gap-4">
            <div className="border-2 border-sky-300 rounded-xl p-4 bg-sky-50 text-center">
              <div className="text-3xl mb-2">🍽️</div>
              <div className="font-bold text-sky-700">홀 (프론트엔드)</div>
              <div className="text-xs text-slate-600 mt-1">손님이 보는 공간</div>
              <div className="mt-3 space-y-1 text-xs text-sky-600">
                <div>메뉴판 = UI</div>
                <div>인테리어 = 디자인</div>
                <div>직원 안내 = 인터랙션</div>
              </div>
            </div>
            <div className="border-2 border-orange-300 rounded-xl p-4 bg-orange-50 text-center">
              <div className="text-3xl mb-2">👨‍🍳</div>
              <div className="font-bold text-orange-700">주방 (백엔드)</div>
              <div className="text-xs text-slate-600 mt-1">보이지 않는 핵심</div>
              <div className="mt-3 space-y-1 text-xs text-orange-600">
                <div>요리 = 데이터 처리</div>
                <div>냉장고 = 데이터베이스</div>
                <div>위생 = 보안</div>
              </div>
            </div>
          </div>
          <div className="text-center">
            <div className="inline-block bg-slate-100 rounded-full px-4 py-2 text-xs text-slate-600">
              주문서 (API) 로 연결 📋
            </div>
          </div>
        </div>
      );

      if (type === 'frontend') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-sky-600 mb-2">프론트엔드 기술 스택</div>
          <div className="grid grid-cols-3 gap-3 mb-4">
            {[
              { name: 'HTML', role: '구조 (뼈대)', color: 'orange' },
              { name: 'CSS', role: '디자인 (옷)', color: 'blue' },
              { name: 'JavaScript', role: '동작 (행동)', color: 'yellow' },
            ].map((t, i) => (
              <div key={i} className={`text-center p-3 rounded-lg border-2 border-${t.color}-300 bg-${t.color}-50`}>
                <div className={`font-bold text-${t.color}-700 text-sm`}>{t.name}</div>
                <div className="text-[10px] text-slate-500 mt-1">{t.role}</div>
              </div>
            ))}
          </div>
          <div className="text-center text-xs text-slate-400 mb-2">+ 프레임워크</div>
          <div className="flex justify-center gap-3">
            {['React', 'Vue', 'Angular', 'Next.js'].map((fw, i) => (
              <span key={i} className="px-3 py-1.5 text-xs rounded-full bg-sky-100 text-sky-700 border border-sky-200 font-medium">{fw}</span>
            ))}
          </div>
          <div className="bg-sky-50 border border-sky-200 rounded-lg p-3 text-center text-xs text-sky-700 mt-3">
            핵심 역할: <strong>사용자 경험(UX)</strong>을 만든다
          </div>
        </div>
      );

      if (type === 'backend') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-orange-600 mb-2">백엔드 기술 스택</div>
          <div className="grid grid-cols-2 gap-3 mb-3">
            {[
              { name: '서버', desc: '요청을 받고 응답', icon: '🖥️' },
              { name: '데이터베이스', desc: '데이터 저장/조회', icon: '🗃️' },
              { name: '인증/보안', desc: '로그인, 권한 관리', icon: '🔐' },
              { name: 'API', desc: '프론트와 소통 창구', icon: '🔌' },
            ].map((item, i) => (
              <div key={i} className="flex items-center gap-2 p-2 rounded-lg bg-orange-50 border border-orange-200">
                <div className="text-xl">{item.icon}</div>
                <div>
                  <div className="text-xs font-bold text-orange-700">{item.name}</div>
                  <div className="text-[10px] text-slate-500">{item.desc}</div>
                </div>
              </div>
            ))}
          </div>
          <div className="text-center text-xs text-slate-400 mb-2">주요 언어/프레임워크</div>
          <div className="flex flex-wrap justify-center gap-2">
            {['Python/FastAPI', 'Java/Spring', 'Node.js', 'Go', 'PostgreSQL', 'MongoDB'].map((t, i) => (
              <span key={i} className="px-2 py-1 text-xs rounded-full bg-orange-100 text-orange-700 border border-orange-200">{t}</span>
            ))}
          </div>
        </div>
      );

      if (type === 'api') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">프론트 ↔ 백엔드 통신</div>
          <div className="flex items-center justify-center gap-4">
            <div className="text-center p-3 rounded-xl bg-sky-50 border-2 border-sky-300 w-28">
              <div className="text-2xl mb-1">🖥️</div>
              <div className="text-xs font-bold text-sky-700">프론트엔드</div>
            </div>
            <div className="flex flex-col items-center gap-1">
              <div className="text-xs text-emerald-600 font-bold">요청 →</div>
              <div className="w-20 h-0.5 bg-emerald-400"></div>
              <div className="w-20 h-0.5 bg-amber-400"></div>
              <div className="text-xs text-amber-600 font-bold">← 응답</div>
            </div>
            <div className="text-center p-3 rounded-xl bg-orange-50 border-2 border-orange-300 w-28">
              <div className="text-2xl mb-1">⚙️</div>
              <div className="text-xs font-bold text-orange-700">백엔드</div>
            </div>
          </div>
          <div className="bg-slate-50 rounded-lg p-3 font-mono text-xs space-y-2">
            <div className="text-emerald-600">GET /api/orders?user=kim</div>
            <div className="text-slate-400">↓ 백엔드가 DB 조회 후</div>
            <div className="text-amber-600">{'{"orders": [{"id": 1, "menu": "아메리카노"}]}'}</div>
          </div>
          <div className="bg-indigo-50 border border-indigo-200 rounded-lg p-3 text-center text-xs text-indigo-700">
            API = 프론트와 백엔드의 <strong>약속된 대화 방식</strong>
          </div>
        </div>
      );

      if (type === 'fullstack') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">개발자 유형</div>
          <div className="grid grid-cols-3 gap-3">
            {[
              { type: '프론트엔드', focus: 'UI/UX, 화면', color: 'sky', depth: '깊이 ★★★' },
              { type: '백엔드', focus: '서버, DB, API', color: 'orange', depth: '깊이 ★★★' },
              { type: '풀스택', focus: '양쪽 모두', color: 'violet', depth: '넓이 ★★★' },
            ].map((item, i) => (
              <div key={i} className={`text-center p-4 rounded-xl border-2 border-${item.color}-300 bg-${item.color}-50`}>
                <div className={`font-bold text-${item.color}-700 text-sm mb-1`}>{item.type}</div>
                <div className="text-[10px] text-slate-600 mb-2">{item.focus}</div>
                <div className={`text-[10px] px-2 py-0.5 rounded-full bg-${item.color}-200 text-${item.color}-800 inline-block`}>{item.depth}</div>
              </div>
            ))}
          </div>
          <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-sm text-emerald-800 text-center">
            추천: 한 쪽을 먼저 깊이 배우고 → 점차 확장
          </div>
        </div>
      );

      return null;
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const step = STEPS[stepIdx];

      useEffect(() => {
        if (!isPlaying) return;
        const timer = setInterval(() => {
          setStepIdx(prev => {
            if (prev >= STEPS.length - 1) { setIsPlaying(false); return prev; }
            return prev + 1;
          });
        }, 4000);
        return () => clearInterval(timer);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-sky-50">
          <header className="bg-white border-b border-slate-200 px-6 py-4">
            <div className="max-w-6xl mx-auto flex items-center justify-between">
              <div>
                <h1 className="text-lg font-bold text-slate-800">Chapter 1-4. 프론트엔드 vs 백엔드</h1>
                <p className="text-xs text-slate-500">제1~2장. 소프트웨어 개론</p>
              </div>
              <a href="../index.html" className="text-xs text-slate-400 hover:text-slate-600">&larr; 로드맵</a>
            </div>
          </header>
          <main className="max-w-6xl mx-auto px-6 py-6">
            <div className="flex items-center justify-between mb-4">
              <div className="flex gap-1.5">
                {STEPS.map((_, i) => (
                  <button key={i} onClick={() => { setStepIdx(i); setIsPlaying(false); }}
                    className={`w-3 h-3 rounded-full transition-all duration-300 ${i === stepIdx ? 'bg-sky-500 scale-125' : i < stepIdx ? 'bg-sky-300' : 'bg-slate-200'}`} />
                ))}
              </div>
              <div className="flex gap-2">
                <button onClick={() => { setStepIdx(Math.max(0, stepIdx - 1)); setIsPlaying(false); }} disabled={stepIdx === 0}
                  className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white hover:bg-slate-50 disabled:opacity-30">이전</button>
                <button onClick={() => setIsPlaying(!isPlaying)}
                  className={`px-3 py-1.5 text-xs rounded-lg font-medium ${isPlaying ? 'bg-red-500 text-white' : 'bg-sky-500 text-white'}`}>
                  {isPlaying ? '정지' : '자동 실행'}</button>
                <button onClick={() => { setStepIdx(Math.min(STEPS.length - 1, stepIdx + 1)); setIsPlaying(false); }} disabled={stepIdx === STEPS.length - 1}
                  className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white hover:bg-slate-50 disabled:opacity-30">다음</button>
              </div>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 min-h-[400px]">
                <VisPanel type={step.panel} />
              </div>
              <div className="space-y-4">
                <div className="bg-sky-50 border border-sky-200 rounded-xl p-5">
                  <h2 className="font-bold text-sky-800 text-lg mb-2">{step.title}</h2>
                  <p className="text-sm text-sky-700 leading-relaxed">{step.desc}</p>
                </div>
                <div className="bg-amber-50 border border-amber-200 rounded-xl p-4">
                  <div className="text-xs font-bold text-amber-600 mb-1">💡 비유로 이해하기</div>
                  <p className="text-sm text-amber-800">{step.metaphor}</p>
                </div>
              </div>
            </div>
            <nav className="mt-8 bg-white rounded-xl shadow-sm border border-slate-200 p-4">
              <div className="text-xs font-bold text-slate-400 mb-3">제1~2장. 소프트웨어 개론</div>
              <div className="flex flex-wrap gap-2">
                {NAV_CHAPTERS.map((ch) => (
                  <a key={ch.id} href={ch.file}
                    className={`px-3 py-1.5 text-xs rounded-lg transition-all ${ch.active ? 'bg-sky-500 text-white font-bold' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                    {ch.id} {ch.title}</a>
                ))}
              </div>
            </nav>
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
