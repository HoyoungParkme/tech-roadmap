<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent 시스템 흐름 — Chapter 11</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap');
    .hand { font-family: 'Caveat', cursive; }
    .sketch-box { filter: url(#sketchy); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      { title: 'Step 1 — 사용자가 질문한다', desc: '사용자가 "서울 날씨 알려주고 우산 필요한지 판단해줘"라고 요청합니다. 이 요청이 Agent의 입력이 됩니다.', highlight: ['user', 'arrow-user-llm'] },
      { title: 'Step 2 — LLM이 추론한다 (Thought)', desc: 'LLM(뇌)이 요청을 분석합니다. "날씨를 먼저 확인해야겠다 → get_weather 도구를 사용하자." ReAct 패턴의 Thought 단계입니다.', highlight: ['llm', 'thought'] },
      { title: 'Step 3 — 도구를 호출한다 (Action)', desc: 'LLM이 Tool Call을 생성합니다. 개발자 코드가 실제 도구(날씨 API, 검색, 코드 실행)를 실행합니다.', highlight: ['arrow-llm-tools', 'tools', 'tool-weather', 'tool-search', 'tool-code'] },
      { title: 'Step 4 — 결과를 관찰한다 (Observation)', desc: '도구 실행 결과가 LLM에게 돌아옵니다. "서울: 비, 18°C, 강수 80%". 이 결과가 다음 추론의 입력이 됩니다.', highlight: ['arrow-tools-llm', 'llm', 'observation'] },
      { title: 'Step 5 — 메모리에 저장/검색', desc: '대화 이력과 중요 정보를 메모리에 저장합니다. 다음 질문에서 "아까 날씨가 비라고 했죠?"를 기억할 수 있습니다.', highlight: ['memory', 'arrow-llm-memory'] },
      { title: 'Step 6 — MCP로 외부 연결', desc: 'MCP 프로토콜로 다양한 외부 시스템(파일, DB, GitHub 등)에 표준화된 방식으로 연결합니다. USB-C처럼 하나의 규격으로.', highlight: ['mcp', 'arrow-llm-mcp', 'mcp-file', 'mcp-db', 'mcp-github'] },
      { title: 'Step 7 — 최종 답변', desc: '모든 정보를 종합하여 사용자에게 자연어로 답변합니다. "서울은 비(18°C)입니다. 우산을 챙기세요!" ReAct 루프가 완료됩니다.', highlight: ['arrow-llm-user', 'user', 'llm', 'answer'] },
    ];

    function FlowDiagram({ highlight }) {
      const isActive = (id) => highlight.includes(id);
      const boxClass = (id) => `transition-all duration-500 ${isActive(id) ? 'opacity-100' : 'opacity-30'}`;
      const arrowClass = (id) => `transition-all duration-500 ${isActive(id) ? 'stroke-slate-700 stroke-[3]' : 'stroke-slate-300 stroke-[2]'}`;

      return (
        <svg viewBox="0 0 1000 620" className="w-full max-w-4xl mx-auto" style={{fontFamily: "'Caveat', cursive"}}>
          <defs>
            <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#475569" /></marker>
            <marker id="ah-active" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed" /></marker>
            <filter id="sketch"><feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" /></filter>
          </defs>

          {/* ===== 사용자 (왼쪽) ===== */}
          <g className={boxClass('user')}>
            <rect x="30" y="230" width="140" height="120" rx="12" fill="#f1f5f9" stroke="#64748b" strokeWidth="2" strokeDasharray="none" />
            <text x="100" y="275" textAnchor="middle" fontSize="28" fontWeight="bold" fill="#334155">User</text>
            <text x="100" y="300" textAnchor="middle" fontSize="16" fill="#64748b">(사용자)</text>
            <text x="100" y="330" textAnchor="middle" fontSize="30">👤</text>
          </g>

          {/* ===== LLM 중앙 (뇌) ===== */}
          <g className={boxClass('llm')}>
            <rect x="370" y="200" width="220" height="180" rx="16" fill="#ede9fe" stroke="#7c3aed" strokeWidth="3" />
            <text x="480" y="250" textAnchor="middle" fontSize="36">🧠</text>
            <text x="480" y="285" textAnchor="middle" fontSize="24" fontWeight="bold" fill="#5b21b6">LLM</text>
            <text x="480" y="310" textAnchor="middle" fontSize="16" fill="#7c3aed">(추론 엔진)</text>
            {isActive('thought') && <text x="480" y="340" textAnchor="middle" fontSize="14" fill="#7c3aed" fontWeight="bold">💭 Thought: "날씨를 확인하자"</text>}
            {isActive('observation') && <text x="480" y="340" textAnchor="middle" fontSize="14" fill="#059669" fontWeight="bold">👁️ Obs: "비, 18°C"</text>}
            {isActive('answer') && <text x="480" y="340" textAnchor="middle" fontSize="14" fill="#7c3aed" fontWeight="bold">✅ "우산 챙기세요!"</text>}
          </g>

          {/* ===== ReAct 루프 표시 ===== */}
          <g className={`${isActive('thought') || isActive('observation') ? 'opacity-100' : 'opacity-20'} transition-all duration-500`}>
            <path d="M 610 260 C 650 200, 680 200, 680 260" fill="none" stroke="#7c3aed" strokeWidth="2" strokeDasharray="6,3" markerEnd="url(#ah-active)" />
            <text x="670" y="220" fontSize="13" fill="#7c3aed" fontWeight="bold">ReAct</text>
            <text x="670" y="236" fontSize="13" fill="#7c3aed">루프</text>
          </g>

          {/* ===== Tools (오른쪽) ===== */}
          <g className={boxClass('tools')}>
            <rect x="720" y="140" width="250" height="300" rx="12" fill="#fff" stroke="#0284c7" strokeWidth="2" strokeDasharray="8,4" />
            <text x="845" y="175" textAnchor="middle" fontSize="20" fontWeight="bold" fill="#0369a1">Tools (도구)</text>
          </g>
          <g className={boxClass('tool-weather')}>
            <rect x="740" y="195" width="210" height="55" rx="8" fill="#e0f2fe" stroke="#38bdf8" strokeWidth="1.5" />
            <text x="760" y="228" fontSize="22">🌤️</text>
            <text x="790" y="225" fontSize="16" fill="#0369a1" fontWeight="bold">날씨 API</text>
            <text x="790" y="242" fontSize="12" fill="#64748b">get_weather(city)</text>
          </g>
          <g className={boxClass('tool-search')}>
            <rect x="740" y="260" width="210" height="55" rx="8" fill="#ecfdf5" stroke="#34d399" strokeWidth="1.5" />
            <text x="760" y="293" fontSize="22">🔍</text>
            <text x="790" y="290" fontSize="16" fill="#047857" fontWeight="bold">웹 검색</text>
            <text x="790" y="307" fontSize="12" fill="#64748b">search(query)</text>
          </g>
          <g className={boxClass('tool-code')}>
            <rect x="740" y="325" width="210" height="55" rx="8" fill="#fef3c7" stroke="#fbbf24" strokeWidth="1.5" />
            <text x="760" y="358" fontSize="22">💻</text>
            <text x="790" y="355" fontSize="16" fill="#92400e" fontWeight="bold">코드 실행</text>
            <text x="790" y="372" fontSize="12" fill="#64748b">execute(code)</text>
          </g>

          {/* ===== Memory (상단) ===== */}
          <g className={boxClass('memory')}>
            <rect x="350" y="20" width="260" height="120" rx="12" fill="#f0f9ff" stroke="#0ea5e9" strokeWidth="2" />
            <text x="480" y="55" textAnchor="middle" fontSize="22">📝</text>
            <text x="480" y="78" textAnchor="middle" fontSize="18" fontWeight="bold" fill="#0369a1">Memory</text>
            <text x="415" y="105" textAnchor="middle" fontSize="13" fill="#64748b">📋 단기 (대화)</text>
            <text x="545" y="105" textAnchor="middle" fontSize="13" fill="#64748b">🗄️ 장기 (DB)</text>
            <line x1="480" y1="88" x2="480" y2="125" stroke="#bae6fd" strokeWidth="1" strokeDasharray="3,3" />
          </g>

          {/* ===== MCP (하단) ===== */}
          <g className={boxClass('mcp')}>
            <rect x="250" y="460" width="500" height="140" rx="12" fill="#fdf2f8" stroke="#ec4899" strokeWidth="2" strokeDasharray="8,4" />
            <text x="500" y="495" textAnchor="middle" fontSize="18" fontWeight="bold" fill="#be185d">MCP (Model Context Protocol)</text>
            <text x="500" y="515" textAnchor="middle" fontSize="13" fill="#9d174d">표준화된 외부 시스템 연결</text>
          </g>
          <g className={boxClass('mcp-file')}>
            <rect x="275" y="530" width="130" height="50" rx="8" fill="#fce7f3" stroke="#f472b6" strokeWidth="1.5" />
            <text x="340" y="555" textAnchor="middle" fontSize="14" fill="#9d174d">📁 파일 시스템</text>
            <text x="340" y="572" textAnchor="middle" fontSize="11" fill="#be185d">MCP Server</text>
          </g>
          <g className={boxClass('mcp-db')}>
            <rect x="425" y="530" width="130" height="50" rx="8" fill="#fce7f3" stroke="#f472b6" strokeWidth="1.5" />
            <text x="490" y="555" textAnchor="middle" fontSize="14" fill="#9d174d">🗄️ Database</text>
            <text x="490" y="572" textAnchor="middle" fontSize="11" fill="#be185d">MCP Server</text>
          </g>
          <g className={boxClass('mcp-github')}>
            <rect x="575" y="530" width="130" height="50" rx="8" fill="#fce7f3" stroke="#f472b6" strokeWidth="1.5" />
            <text x="640" y="555" textAnchor="middle" fontSize="14" fill="#9d174d">🐙 GitHub</text>
            <text x="640" y="572" textAnchor="middle" fontSize="11" fill="#be185d">MCP Server</text>
          </g>

          {/* ===== 화살표들 ===== */}
          {/* User → LLM */}
          <line x1="170" y1="280" x2="365" y2="280" className={arrowClass('arrow-user-llm')} markerEnd="url(#ah)" />
          <text x="270" y="270" textAnchor="middle" fontSize="13" fill="#64748b" fontWeight="bold">프롬프트 입력</text>

          {/* LLM → User (응답) */}
          <line x1="365" y1="320" x2="170" y2="320" className={arrowClass('arrow-llm-user')} markerEnd="url(#ah)" />
          <text x="270" y="340" textAnchor="middle" fontSize="13" fill="#64748b" fontWeight="bold">최종 응답</text>

          {/* LLM → Tools */}
          <line x1="590" y1="270" x2="735" y2="270" className={arrowClass('arrow-llm-tools')} markerEnd="url(#ah)" />
          <text x="663" y="262" textAnchor="middle" fontSize="12" fill="#0369a1" fontWeight="bold">Tool Call</text>

          {/* Tools → LLM */}
          <line x1="735" y1="310" x2="590" y2="310" className={arrowClass('arrow-tools-llm')} markerEnd="url(#ah)" />
          <text x="663" y="330" textAnchor="middle" fontSize="12" fill="#059669" fontWeight="bold">Observation</text>

          {/* LLM ↔ Memory */}
          <line x1="460" y1="200" x2="460" y2="140" className={arrowClass('arrow-llm-memory')} markerEnd="url(#ah)" />
          <line x1="500" y1="140" x2="500" y2="200" className={arrowClass('arrow-llm-memory')} markerEnd="url(#ah)" />
          <text x="530" y="175" fontSize="12" fill="#0369a1">저장/검색</text>

          {/* LLM → MCP */}
          <line x1="480" y1="380" x2="480" y2="455" className={arrowClass('arrow-llm-mcp')} markerEnd="url(#ah)" />
          <text x="510" y="425" fontSize="12" fill="#be185d" fontWeight="bold">JSON-RPC</text>

          {/* 인프라 배경 */}
          <rect x="340" y="180" width="640" height="220" rx="16" fill="none" stroke="#c4b5fd" strokeWidth="1" strokeDasharray="10,5" opacity="0.3" />
          <text x="960" y="200" textAnchor="end" fontSize="13" fill="#c4b5fd" fontStyle="italic">Agent Runtime</text>
        </svg>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const data = STEPS[step];
      const isEnd = step === STEPS.length - 1;

      const next = () => { setStep(p => { if (p < STEPS.length - 1) return p + 1; setPlaying(false); return p; }); };
      const nextRef = useRef(next); nextRef.current = next;
      const prev = () => { if (step > 0) { setStep(p => p - 1); setPlaying(false); } };
      const prevRef = useRef(prev); prevRef.current = prev;
      const toggle = () => { if (isEnd) setStep(0); setPlaying(p => !p); };

      useEffect(() => { if (playing) { intervalRef.current = setInterval(() => nextRef.current(), 3500); } else { clearInterval(intervalRef.current); } return () => clearInterval(intervalRef.current); }, [playing]);
      useEffect(() => { const onKey = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); } if (e.key === 'ArrowLeft') { e.preventDefault(); prevRef.current(); } }; window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey); }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-6">
            <nav className="text-sm">
              <a href="../index.html" className="inline-flex items-center gap-1 text-violet-700 hover:text-violet-900 font-medium"><span>&larr;</span> 마인드맵으로 돌아가기</a>
              <span className="mx-2 text-slate-300">|</span>
              <a href="../../ai-agent/index.html" className="text-violet-600 hover:text-violet-800 font-medium">AI Agent 학습 허브 →</a>
            </nav>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-10 h-10 bg-violet-600 text-white flex items-center justify-center rounded-2xl font-bold text-lg">AI</div>
                <div>
                  <h1 className="text-2xl font-bold text-slate-800">AI Agent 시스템 흐름도</h1>
                  <p className="text-sm text-slate-500">사용자 → LLM → 도구 → 메모리 → MCP — Agent가 동작하는 전체 흐름</p>
                </div>
              </div>
            </header>

            {/* 현재 단계 설명 */}
            <div className="p-5 rounded-xl shadow-sm border bg-violet-700 border-violet-800 text-white">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-violet-200">{data.title}</h3>
                <span className="text-xs text-violet-200">키보드 &larr;/&rarr;로 단계 이동</span>
              </div>
              <p className="text-lg font-medium leading-relaxed">{data.desc}</p>
            </div>

            {/* 다이어그램 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
              <FlowDiagram highlight={data.highlight} />
            </div>

            {/* 컨트롤 */}
            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center space-x-2">
                <button onClick={prev} disabled={step === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button onClick={toggle} className="flex items-center px-4 py-2 rounded text-white font-medium transition shadow-sm w-32 justify-center bg-violet-600 hover:bg-violet-700">{playing ? <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>정지</> : <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"/></svg>자동 실행</>}</button>
                <button onClick={next} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-50 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step: {step + 1} / {STEPS.length}</div>
            </div>

            {/* 범례 */}
            <div className="grid grid-cols-2 md:grid-cols-5 gap-2 text-xs">
              {[
                { icon: '👤', label: 'User', desc: '사용자 입력', color: 'bg-slate-100' },
                { icon: '🧠', label: 'LLM', desc: '추론 엔진', color: 'bg-violet-100' },
                { icon: '🔧', label: 'Tools', desc: '외부 도구', color: 'bg-sky-100' },
                { icon: '📝', label: 'Memory', desc: '기억 저장', color: 'bg-cyan-100' },
                { icon: '🔌', label: 'MCP', desc: '표준 연결', color: 'bg-pink-100' },
              ].map((l, i) => (
                <div key={i} className={`${l.color} rounded-lg p-2 flex items-center gap-2`}>
                  <span className="text-lg">{l.icon}</span>
                  <div><div className="font-bold text-slate-700">{l.label}</div><div className="text-slate-500">{l.desc}</div></div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
