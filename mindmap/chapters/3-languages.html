<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>언어 및 프레임워크 — Chapter 3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const STEPS = [
      { title: 'Step 1 — C에서 시작된 프로그래밍', desc: 'C(1972)는 운영체제(Unix)를 만들기 위해 탄생했습니다. 메모리를 직접 다루는 저수준 언어로, 성능이 중요한 시스템 프로그래밍에 사용됩니다. C++(1979)는 C에 객체지향(OOP)을 추가해 게임 엔진, 브라우저 등에 쓰입니다.', metaphor: 'C=수동 변속기 차량(모든 걸 직접 제어), C++=자동 변속+수동 모드(편의성 추가). 빠르지만 배우기 어렵습니다.', panel: 'c' },
      { title: 'Step 2 — Python: 왜 아직 쓰나?', desc: '1991년에 만들어진 Python은 "읽기 쉬운 코드"를 철학으로 합니다. AI/ML, 데이터 분석, 웹 백엔드, 자동화 등 거의 모든 분야에서 사용됩니다. 속도는 느리지만 개발 생산성과 생태계가 압도적입니다.', metaphor: '스위스 아미 나이프: 만능은 아니지만, 대부분의 상황에서 "충분히 좋게" 작동합니다. 가장 먼저 꺼내보는 도구.', panel: 'python' },
      { title: 'Step 3 — JavaScript와 프론트엔드', desc: 'JavaScript는 웹 브라우저의 유일한 프로그래밍 언어로 시작했지만, Node.js 덕분에 서버에서도 실행됩니다. React, Vue, Angular 같은 프레임워크로 복잡한 UI를 만듭니다. TypeScript는 타입 안전성을 추가한 JS 확장입니다.', metaphor: '웹의 공용어: 영어가 국제 비즈니스 언어이듯, JS는 웹의 공용어입니다. 프론트/백/앱 어디서든 통합니다.', panel: 'js' },
      { title: 'Step 4 — 모바일 앱 언어', desc: 'iOS는 Swift, Android는 Kotlin이 공식 언어입니다. 하지만 React Native(JS), Flutter(Dart)로 하나의 코드로 양쪽 앱을 만드는 크로스플랫폼이 빠르게 성장 중입니다.', metaphor: '네이티브=현지어(최적), 크로스플랫폼=영어(두 나라에서 통하지만 현지인보다 어색할 수 있음).', panel: 'mobile' },
      { title: 'Step 5 — 프레임워크란? 어떻게 선택?', desc: '프레임워크는 "반쯤 완성된 구조"로, 개발자가 빈칸만 채우면 됩니다. 선택 기준: (1) 프로젝트 목적, (2) 팀의 기술 스택, (3) 생태계/커뮤니티 크기, (4) 성능 요구사항. 동기 vs 비동기도 중요한 기준입니다.', metaphor: '프레임워크=밀키트(재료+순서 제공), 라이브러리=마트 재료(필요한 것만 골라 씀). 프레임워크가 흐름을 주도합니다.', panel: 'framework' },
    ];

    function VisPanel({ type }) {
      if (type === 'c') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">프로그래밍 언어의 진화</div>
          <div className="space-y-2">
            {[
              { year: '1972', name: 'C', desc: '시스템 프로그래밍, OS 개발', use: 'Linux 커널, 임베디드', color: 'slate' },
              { year: '1979', name: 'C++', desc: 'C + 객체지향(OOP)', use: '게임 엔진, 브라우저', color: 'blue' },
              { year: '1991', name: 'Python', desc: '읽기 쉬운 범용 언어', use: 'AI/ML, 웹, 자동화', color: 'emerald' },
              { year: '1995', name: 'Java', desc: 'Write Once, Run Anywhere', use: '엔터프라이즈, Android', color: 'red' },
              { year: '1995', name: 'JavaScript', desc: '브라우저 스크립팅 → 풀스택', use: '웹 프론트/백, 앱', color: 'amber' },
            ].map((l, i) => (
              <div key={i} className={`flex items-center gap-3 p-2 rounded-lg bg-${l.color}-50 border border-${l.color}-200`}>
                <div className={`text-[10px] font-bold text-${l.color}-500 w-10`}>{l.year}</div>
                <div className={`font-bold text-sm text-${l.color}-700 w-20`}>{l.name}</div>
                <div className="flex-1 text-[10px] text-slate-600">{l.desc}</div>
              </div>
            ))}
          </div>
        </div>
      );
      if (type === 'python') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-emerald-600 mb-2">Python이 쓰이는 분야</div>
          <div className="grid grid-cols-2 gap-3">
            {[
              { field: 'AI / 머신러닝', tools: 'TensorFlow, PyTorch', share: '95%', icon: '🤖' },
              { field: '데이터 분석', tools: 'Pandas, NumPy', share: '85%', icon: '📊' },
              { field: '웹 백엔드', tools: 'FastAPI, Django', share: '30%', icon: '🌐' },
              { field: '자동화/스크립트', tools: '파일, 크롤링, API', share: '70%', icon: '⚙️' },
            ].map((f, i) => (
              <div key={i} className="p-3 rounded-xl bg-emerald-50 border border-emerald-200 text-center">
                <div className="text-2xl mb-1">{f.icon}</div>
                <div className="font-bold text-emerald-700 text-xs">{f.field}</div>
                <div className="text-[10px] text-slate-500 mt-1">{f.tools}</div>
                <div className="text-[9px] mt-1 px-2 py-0.5 rounded-full bg-emerald-200 text-emerald-700 inline-block">점유율 ~{f.share}</div>
              </div>
            ))}
          </div>
          <div className="bg-amber-50 border border-amber-200 rounded-lg p-2 text-center text-xs text-amber-700">단점: 실행 속도 느림 → 성능이 중요하면 Go, Rust 고려</div>
        </div>
      );
      if (type === 'js') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-amber-600 mb-2">JavaScript 생태계</div>
          <div className="grid grid-cols-2 gap-3">
            <div className="border-2 border-amber-300 rounded-xl p-3 bg-amber-50">
              <div className="font-bold text-amber-700 text-sm text-center mb-2">프론트엔드</div>
              <div className="space-y-1">{['React','Vue','Angular','Svelte'].map((f,i)=>(<div key={i} className="text-xs bg-white rounded p-1 border border-amber-200 text-center text-amber-700">{f}</div>))}</div>
            </div>
            <div className="border-2 border-green-300 rounded-xl p-3 bg-green-50">
              <div className="font-bold text-green-700 text-sm text-center mb-2">백엔드 (Node.js)</div>
              <div className="space-y-1">{['Express','NestJS','Fastify','Next.js API'].map((f,i)=>(<div key={i} className="text-xs bg-white rounded p-1 border border-green-200 text-center text-green-700">{f}</div>))}</div>
            </div>
          </div>
          <div className="bg-blue-50 border border-blue-200 rounded-lg p-2 text-center text-xs text-blue-700">TypeScript = JavaScript + 타입 시스템 → 대규모 프로젝트 필수</div>
        </div>
      );
      if (type === 'mobile') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">모바일 개발 언어 지도</div>
          <div className="grid grid-cols-2 gap-4">
            <div className="border-2 border-slate-300 rounded-xl p-3 bg-slate-50 text-center">
              <div className="text-2xl mb-1">🍎</div><div className="font-bold text-slate-700 text-sm">iOS</div>
              <div className="mt-2 bg-white rounded p-1 border border-slate-200 text-xs text-slate-600">Swift (공식)</div>
            </div>
            <div className="border-2 border-green-300 rounded-xl p-3 bg-green-50 text-center">
              <div className="text-2xl mb-1">🤖</div><div className="font-bold text-green-700 text-sm">Android</div>
              <div className="mt-2 bg-white rounded p-1 border border-green-200 text-xs text-green-600">Kotlin (공식)</div>
            </div>
          </div>
          <div className="text-center text-slate-400 text-sm my-1">또는</div>
          <div className="grid grid-cols-2 gap-4">
            {[
              { name: 'React Native', lang: 'JavaScript', by: 'Meta', color: 'blue' },
              { name: 'Flutter', lang: 'Dart', by: 'Google', color: 'cyan' },
            ].map((f, i) => (
              <div key={i} className={`border-2 border-${f.color}-300 rounded-xl p-3 bg-${f.color}-50 text-center`}>
                <div className={`font-bold text-${f.color}-700 text-sm`}>{f.name}</div>
                <div className="text-[10px] text-slate-500">{f.lang} · {f.by}</div>
                <div className={`text-[9px] mt-1 px-2 py-0.5 rounded-full bg-${f.color}-200 text-${f.color}-700 inline-block`}>iOS + Android 동시</div>
              </div>
            ))}
          </div>
        </div>
      );
      if (type === 'framework') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">프레임워크 선택 기준</div>
          {[
            { q: '프로젝트 목적은?', a: '웹→React/Next.js, API→FastAPI/Spring, 앱→Flutter/RN', icon: '🎯' },
            { q: '팀이 쓰는 언어는?', a: 'Python팀→Django/FastAPI, Java팀→Spring Boot', icon: '👥' },
            { q: '성능 요구사항?', a: '고성능→Go/Rust, 범용→Python/Node.js', icon: '⚡' },
            { q: '동기 vs 비동기?', a: '동기(Django/Flask) vs 비동기(FastAPI/Node.js)', icon: '🔄' },
            { q: '커뮤니티/생태계?', a: '큰 커뮤니티 = 문제 해결 쉬움, 라이브러리 풍부', icon: '🌐' },
          ].map((r, i) => (
            <div key={i} className="flex items-start gap-3 p-2 rounded-lg bg-white border border-slate-200">
              <div className="text-xl mt-0.5">{r.icon}</div>
              <div><div className="text-xs font-bold text-slate-700">{r.q}</div><div className="text-[10px] text-slate-500">{r.a}</div></div>
            </div>
          ))}
        </div>
      );
      return null;
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const step = STEPS[stepIdx];
      useEffect(() => { if (!isPlaying) return; const t = setInterval(() => { setStepIdx(p => { if(p>=STEPS.length-1){setIsPlaying(false);return p;} return p+1; }); }, 4000); return ()=>clearInterval(t); }, [isPlaying]);
      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-yellow-50">
          <header className="bg-white border-b border-slate-200 px-6 py-4"><div className="max-w-6xl mx-auto flex items-center justify-between"><div><h1 className="text-lg font-bold text-slate-800">제3장. 언어 및 프레임워크</h1><p className="text-xs text-slate-500">C/C++, Python, JavaScript, 모바일, 프레임워크 선택</p></div><a href="../index.html" className="text-xs text-slate-400 hover:text-slate-600">&larr; 로드맵</a></div></header>
          <main className="max-w-6xl mx-auto px-6 py-6">
            <div className="flex items-center justify-between mb-4">
              <div className="flex gap-1.5">{STEPS.map((_,i)=>(<button key={i} onClick={()=>{setStepIdx(i);setIsPlaying(false);}} className={`w-3 h-3 rounded-full transition-all duration-300 ${i===stepIdx?'bg-yellow-500 scale-125':i<stepIdx?'bg-yellow-300':'bg-slate-200'}`}/>))}</div>
              <div className="flex gap-2">
                <button onClick={()=>{setStepIdx(Math.max(0,stepIdx-1));setIsPlaying(false);}} disabled={stepIdx===0} className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white disabled:opacity-30">이전</button>
                <button onClick={()=>setIsPlaying(!isPlaying)} className="px-3 py-1.5 text-xs rounded-lg font-medium bg-yellow-500 text-white">{isPlaying?'정지':'자동 실행'}</button>
                <button onClick={()=>{setStepIdx(Math.min(STEPS.length-1,stepIdx+1));setIsPlaying(false);}} disabled={stepIdx===STEPS.length-1} className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white disabled:opacity-30">다음</button>
              </div>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 min-h-[400px]"><VisPanel type={step.panel} /></div>
              <div className="space-y-4">
                <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-5"><h2 className="font-bold text-yellow-800 text-lg mb-2">{step.title}</h2><p className="text-sm text-yellow-700 leading-relaxed">{step.desc}</p></div>
                <div className="bg-amber-50 border border-amber-200 rounded-xl p-4"><div className="text-xs font-bold text-amber-600 mb-1">💡 비유로 이해하기</div><p className="text-sm text-amber-800">{step.metaphor}</p></div>
              </div>
            </div>
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
