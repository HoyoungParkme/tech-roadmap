<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>컴퓨터 구조 및 OS — Chapter 6</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const STEPS = [
      { title: 'Step 1 — 컴퓨터의 내부 구조', desc: '컴퓨터는 크게 CPU(연산), RAM(임시 저장), 디스크(영구 저장)로 구성됩니다. CPU가 "두뇌", RAM이 "책상", 디스크가 "서랍"입니다. 프로그램은 디스크에서 RAM으로 올라가야 실행됩니다.', metaphor: '요리 비유: CPU=요리사(실제 조리), RAM=조리대(작업 공간), 디스크=냉장고(재료 보관). 냉장고에서 꺼내 조리대에 올려야 요리를 시작합니다.', panel: 'hardware' },
      { title: 'Step 2 — 메모리 계층', desc: '데이터에 빠르게 접근하기 위해 메모리는 계층 구조를 가집니다. CPU 레지스터 → L1/L2 캐시 → RAM → SSD/HDD. 위로 갈수록 빠르지만 비싸고 용량이 작습니다.', metaphor: '주머니(레지스터) → 책상 서랍(캐시) → 방 안 책장(RAM) → 창고(디스크). 자주 쓰는 건 가까이 둡니다.', panel: 'memory' },
      { title: 'Step 3 — 운영체제와 커널', desc: '운영체제(OS)는 하드웨어와 프로그램 사이의 "관리자"입니다. 커널은 OS의 핵심으로, CPU 시간 분배, 메모리 할당, 입출력 관리를 합니다. Windows, macOS, Linux가 대표적입니다.', metaphor: '호텔 매니저(OS): 방 배정(메모리), 룸서비스 일정(CPU), 체크인/아웃(프로세스 관리)을 총괄합니다.', panel: 'os' },
      { title: 'Step 4 — 프로그램 vs 프로세스', desc: '프로그램은 디스크에 저장된 "파일"(실행 전), 프로세스는 메모리에 올라가 "실행 중인 프로그램"입니다. 같은 프로그램을 두 번 실행하면 프로세스 2개가 생깁니다.', metaphor: '레시피(프로그램)는 책에 적혀 있고, 실제 조리 중인 요리(프로세스)는 조리대 위에 있습니다.', panel: 'process' },
      { title: 'Step 5 — 프로세스 vs 스레드', desc: '프로세스는 독립된 메모리 공간을 가지고, 스레드는 한 프로세스 안에서 메모리를 공유하며 실행됩니다. 스레드가 가벼워서 멀티태스킹에 유리하지만, 공유 데이터 충돌(동시성 문제)을 주의해야 합니다.', metaphor: '프로세스=각자 주방이 있는 요리사들, 스레드=한 주방에서 재료를 나눠 쓰는 요리사들. 빠르지만 "동시에 소금통 잡기" 충돌이 생길 수 있습니다.', panel: 'thread' },
      { title: 'Step 6 — 자료구조와 알고리즘', desc: '자료구조는 데이터를 "어떻게 정리하느냐"이고, 알고리즘은 "어떤 절차로 문제를 푸느냐"입니다. 배열, 연결 리스트, 스택, 큐, 트리, 해시맵이 대표적인 자료구조입니다. 올바른 자료구조 선택이 성능을 좌우합니다.', metaphor: '자료구조=정리함(서랍, 파일, 폴더), 알고리즘=찾는 방법(이진 탐색 vs 처음부터 끝까지). 잘 정리하면 빨리 찾습니다.', panel: 'ds' },
    ];

    function VisPanel({ type }) {
      if (type === 'hardware') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">컴퓨터 내부 구조</div>
          <div className="flex items-center justify-center gap-4">
            {[
              { icon: '🧠', name: 'CPU', role: '연산(두뇌)', color: 'red', speed: '초당 수십억 연산' },
              { icon: '📋', name: 'RAM', role: '임시 저장(책상)', color: 'blue', speed: '나노초 접근' },
              { icon: '💾', name: 'Disk', role: '영구 저장(서랍)', color: 'slate', speed: '밀리초 접근' },
            ].map((h, i) => (
              <div key={i} className={`text-center p-4 rounded-xl border-2 border-${h.color}-300 bg-${h.color}-50 w-28`}>
                <div className="text-3xl mb-1">{h.icon}</div>
                <div className={`font-bold text-${h.color}-700 text-sm`}>{h.name}</div>
                <div className="text-[10px] text-slate-500 mt-1">{h.role}</div>
                <div className={`text-[9px] mt-1 px-1 py-0.5 rounded-full bg-${h.color}-200 text-${h.color}-700`}>{h.speed}</div>
              </div>
            ))}
          </div>
          <div className="flex justify-center gap-2 text-slate-400 text-lg">
            <span>←→</span><span>←→</span>
          </div>
          <div className="bg-amber-50 border border-amber-200 rounded-lg p-2 text-center text-xs text-amber-800">프로그램 실행: Disk → RAM → CPU</div>
        </div>
      );
      if (type === 'memory') return (
        <div className="space-y-2">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">메모리 계층 피라미드</div>
          {[
            { name: 'CPU 레지스터', speed: '< 1ns', size: '수 KB', color: 'red', w: 'w-32' },
            { name: 'L1/L2 캐시', speed: '1~10ns', size: '수 MB', color: 'orange', w: 'w-40' },
            { name: 'RAM (주메모리)', speed: '~100ns', size: '8~64 GB', color: 'blue', w: 'w-52' },
            { name: 'SSD', speed: '~100μs', size: '256 GB~2 TB', color: 'slate', w: 'w-64' },
            { name: 'HDD', speed: '~10ms', size: '1~8 TB', color: 'gray', w: 'w-72' },
          ].map((m, i) => (
            <div key={i} className="flex justify-center"><div className={`${m.w} flex justify-between items-center p-2 rounded-lg bg-${m.color}-50 border border-${m.color}-200`}>
              <span className={`text-xs font-bold text-${m.color}-700`}>{m.name}</span>
              <div className="text-right"><div className="text-[10px] text-slate-500">{m.speed}</div><div className="text-[10px] text-slate-400">{m.size}</div></div>
            </div></div>
          ))}
          <div className="text-center text-[10px] text-slate-400 mt-1">↑ 빠르고 비쌈 &nbsp;&nbsp; ↓ 느리고 저렴</div>
        </div>
      );
      if (type === 'os') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">운영체제 구조</div>
          <div className="border-2 border-indigo-300 rounded-xl p-3 bg-indigo-50">
            <div className="text-center text-xs font-bold text-indigo-700 mb-2">응용 프로그램 (Chrome, VSCode, 카카오톡)</div>
            <div className="border-2 border-purple-300 rounded-lg p-3 bg-purple-50">
              <div className="text-center text-xs font-bold text-purple-700 mb-2">운영체제 (Windows, macOS, Linux)</div>
              <div className="border-2 border-red-300 rounded-lg p-2 bg-red-50 text-center">
                <div className="text-xs font-bold text-red-700">커널 (Kernel)</div>
                <div className="text-[10px] text-slate-600 mt-1">CPU 분배 · 메모리 관리 · I/O 제어</div>
              </div>
            </div>
          </div>
          <div className="border-2 border-slate-300 rounded-lg p-2 bg-slate-50 text-center">
            <div className="text-xs font-bold text-slate-700">하드웨어 (CPU, RAM, Disk, NIC)</div>
          </div>
        </div>
      );
      if (type === 'process') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">프로그램 vs 프로세스</div>
          <div className="grid grid-cols-2 gap-4">
            <div className="border-2 border-slate-300 rounded-xl p-4 bg-slate-50 text-center">
              <div className="text-3xl mb-2">📄</div>
              <div className="font-bold text-slate-700 text-sm">프로그램</div>
              <div className="text-xs text-slate-500 mt-2">디스크에 저장된 파일</div>
              <div className="text-xs text-slate-400 mt-1">정적 · 실행 전</div>
            </div>
            <div className="border-2 border-emerald-300 rounded-xl p-4 bg-emerald-50 text-center">
              <div className="text-3xl mb-2">⚡</div>
              <div className="font-bold text-emerald-700 text-sm">프로세스</div>
              <div className="text-xs text-slate-500 mt-2">메모리에서 실행 중</div>
              <div className="text-xs text-slate-400 mt-1">동적 · CPU 사용 중</div>
            </div>
          </div>
          <div className="bg-blue-50 border border-blue-200 rounded-lg p-2 text-center text-xs text-blue-700">chrome.exe(프로그램) → 탭 3개 열면 프로세스 3개</div>
        </div>
      );
      if (type === 'thread') return (
        <div className="space-y-4">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">프로세스 vs 스레드</div>
          <div className="grid grid-cols-2 gap-4">
            <div className="border-2 border-blue-300 rounded-xl p-3 bg-blue-50">
              <div className="font-bold text-blue-700 text-sm text-center mb-2">프로세스</div>
              <div className="space-y-1 text-xs text-slate-600">
                <div className="bg-white rounded p-1 border border-blue-200">독립 메모리 공간</div>
                <div className="bg-white rounded p-1 border border-blue-200">충돌해도 다른 프로세스 안전</div>
                <div className="bg-white rounded p-1 border border-blue-200">생성 비용 높음</div>
              </div>
            </div>
            <div className="border-2 border-purple-300 rounded-xl p-3 bg-purple-50">
              <div className="font-bold text-purple-700 text-sm text-center mb-2">스레드</div>
              <div className="space-y-1 text-xs text-slate-600">
                <div className="bg-white rounded p-1 border border-purple-200">메모리 공유</div>
                <div className="bg-white rounded p-1 border border-purple-200">가볍고 빠른 전환</div>
                <div className="bg-white rounded p-1 border border-purple-200">동시성 충돌 주의</div>
              </div>
            </div>
          </div>
          <div className="bg-red-50 border border-red-200 rounded-lg p-2 text-center text-xs text-red-700">주의: 스레드 공유 데이터 → Race Condition 발생 가능</div>
        </div>
      );
      if (type === 'ds') return (
        <div className="space-y-3">
          <div className="text-center text-sm font-bold text-slate-600 mb-2">핵심 자료구조</div>
          {[
            { name: '배열 (Array)', desc: '인덱스로 즉시 접근 O(1)', use: '순서 있는 목록', icon: '📊' },
            { name: '연결 리스트', desc: '삽입/삭제 O(1)', use: '자주 변하는 목록', icon: '🔗' },
            { name: '스택/큐', desc: 'LIFO/FIFO', use: '되돌리기, 대기열', icon: '📚' },
            { name: '해시맵', desc: '키→값 O(1) 조회', use: '사전, 캐시', icon: '🗂️' },
            { name: '트리', desc: '계층 구조 탐색', use: 'DOM, 파일 시스템', icon: '🌳' },
          ].map((d, i) => (
            <div key={i} className="flex items-center gap-3 p-2 rounded-lg bg-emerald-50 border border-emerald-200">
              <div className="text-xl">{d.icon}</div>
              <div className="flex-1"><div className="text-xs font-bold text-emerald-700">{d.name}</div><div className="text-[10px] text-slate-500">{d.desc}</div></div>
              <div className="text-[10px] px-2 py-0.5 rounded-full bg-emerald-200 text-emerald-700">{d.use}</div>
            </div>
          ))}
        </div>
      );
      return null;
    }

    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const step = STEPS[stepIdx];
      useEffect(() => { if (!isPlaying) return; const t = setInterval(() => { setStepIdx(p => { if (p >= STEPS.length-1){setIsPlaying(false);return p;} return p+1; }); }, 4000); return ()=>clearInterval(t); }, [isPlaying]);

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-red-50">
          <header className="bg-white border-b border-slate-200 px-6 py-4">
            <div className="max-w-6xl mx-auto flex items-center justify-between">
              <div><h1 className="text-lg font-bold text-slate-800">제6장. 컴퓨터 구조 및 OS</h1><p className="text-xs text-slate-500">CPU, 메모리, 프로세스, 자료구조</p></div>
              <a href="../index.html" className="text-xs text-slate-400 hover:text-slate-600">&larr; 로드맵</a>
            </div>
          </header>
          <main className="max-w-6xl mx-auto px-6 py-6">
            <div className="flex items-center justify-between mb-4">
              <div className="flex gap-1.5">{STEPS.map((_,i)=>(<button key={i} onClick={()=>{setStepIdx(i);setIsPlaying(false);}} className={`w-3 h-3 rounded-full transition-all duration-300 ${i===stepIdx?'bg-red-500 scale-125':i<stepIdx?'bg-red-300':'bg-slate-200'}`}/>))}</div>
              <div className="flex gap-2">
                <button onClick={()=>{setStepIdx(Math.max(0,stepIdx-1));setIsPlaying(false);}} disabled={stepIdx===0} className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white disabled:opacity-30">이전</button>
                <button onClick={()=>setIsPlaying(!isPlaying)} className={`px-3 py-1.5 text-xs rounded-lg font-medium ${isPlaying?'bg-red-500 text-white':'bg-red-500 text-white'}`}>{isPlaying?'정지':'자동 실행'}</button>
                <button onClick={()=>{setStepIdx(Math.min(STEPS.length-1,stepIdx+1));setIsPlaying(false);}} disabled={stepIdx===STEPS.length-1} className="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white disabled:opacity-30">다음</button>
              </div>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 min-h-[400px]"><VisPanel type={step.panel} /></div>
              <div className="space-y-4">
                <div className="bg-red-50 border border-red-200 rounded-xl p-5"><h2 className="font-bold text-red-800 text-lg mb-2">{step.title}</h2><p className="text-sm text-red-700 leading-relaxed">{step.desc}</p></div>
                <div className="bg-amber-50 border border-amber-200 rounded-xl p-4"><div className="text-xs font-bold text-amber-600 mb-1">💡 비유로 이해하기</div><p className="text-sm text-amber-800">{step.metaphor}</p></div>
              </div>
            </div>
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
