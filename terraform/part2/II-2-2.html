        note: '모든 리소스 제거',
        keyPoint: 'destroy = state 의 모든 리소스 역순 삭제. 운영은 prevent_destroy 로 방어.',
        code: {
          lang: 'bash',
          filename: 'destroy.sh',
          lines: [
            '#!/usr/bin/env bash',
            '# ─────────────────────────────────────────────',
            '# Step 5. terraform destroy',
            '#   목적: tfstate 에 기록된 모든 리소스 제거',
            '# ─────────────────────────────────────────────',
            'set -euo pipefail',
            '',
            '# 1) 기본 destroy (사람이 yes 확인)',
            'terraform destroy',
            '#   Plan: 0 to add, 0 to change, 3 to destroy.',
            '#   Do you really want to destroy all resources?',
            '#     Enter a value: yes',
            '',
            '# 2) destroy 도 plan 으로 미리보기 가능',
            'terraform plan -destroy',
            '',
            '# 3) 자동 승인 (PR 환경 정리, 테스트 폐기에 자주 사용)',
            'terraform destroy -auto-approve',
            '',
            '# 4) 특정 리소스만 삭제',
            'terraform destroy -target=aws_instance.web',
            '#   ⚠ -target 은 임시 운영용. 의존성 누락 가능성 있음.',
            '',
            '# 5) 변수 파일 사용',
            'terraform destroy -var-file="dev.tfvars" -auto-approve',
            '',
            '# 안전 장치 — 코드에 적어두면 destroy 시 막힌다',
            '#   resource "aws_db_instance" "prod" {',
            '#     # ...',
            '#     lifecycle {',
            '#       prevent_destroy = true   # ← 실수 방지',
            '#     }',
            '#   }',
            '',
            '# 비교 — destroy vs apply 로 코드 비우기',
            '#   • terraform destroy        → state 기반으로 전체 삭제',
            '#   • .tf 파일에서 resource 지우고 apply → 해당 resource 만 삭제',
            '#     (점진적 정리에 유리)',
            '',
            '# destroy 이후',
            '#   • terraform.tfstate     → resources: [] 로 비워짐',
            '#   • .terraform/           → 그대로 남음 (init 결과)',
            '#   • 실제 클라우드 콘솔   → 인스턴스 terminated, S3 삭제 확인',
            '',
            '# 실패 시 대응',
            '#   • "Bucket not empty" → S3 객체부터 비우기',
            '#   • "Dependency violation" → 의존 리소스부터 destroy',
            'echo "[OK] terraform destroy 완료"',
          ],
          highlight: [8, 9, 17, 18, 20, 21, 27, 28, 29, 30, 31, 32, 33],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — pink 톤
    // ─────────────────────────────────────────────────────
    const STATUS_STYLE = {
      plan:    { bg: 'bg-pink-50',    border: 'border-pink-300',    text: 'text-pink-800',    badge: 'bg-pink-200 text-pink-800' },
      create:  { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-800', badge: 'bg-emerald-200 text-emerald-800' },
      exists:  { bg: 'bg-slate-50',   border: 'border-slate-300',   text: 'text-slate-700',   badge: 'bg-slate-200 text-slate-700' },
      drift:   { bg: 'bg-amber-50',   border: 'border-amber-400',   text: 'text-amber-800',   badge: 'bg-amber-200 text-amber-800' },
      destroy: { bg: 'bg-rose-50',    border: 'border-rose-300',    text: 'text-rose-800',    badge: 'bg-rose-200 text-rose-800' },
      gone:    { bg: 'bg-slate-100',  border: 'border-slate-300',   text: 'text-slate-500',   badge: 'bg-slate-300 text-slate-700' },
    };

    function Timeline({ timeline }) {
      return (
        <div className="flex items-center gap-1.5 mb-3">
          {timeline.map((t, i) => {
            const isActive = t.state === 'active';
            const isDone = t.state === 'done';
            const cls = isActive
              ? 'bg-pink-600 text-white border-pink-700 ring-2 ring-pink-300'
              : isDone
                ? 'bg-pink-200 text-pink-900 border-pink-300'
                : 'bg-white text-slate-400 border-slate-200';
            return (
              <React.Fragment key={t.id}>
                <div className={`flex-1 text-center text-[11px] font-bold rounded px-1 py-1.5 border ${cls}`}>
                  <span className="opacity-60 mr-1">{i + 1}.</span>{t.label}
                </div>
                {i < timeline.length - 1 && (
                  <span className={`text-[10px] ${isDone ? 'text-pink-500' : 'text-slate-300'}`}>▶</span>
                )}
              </React.Fragment>
            );
          })}
        </div>
      );
    }

    function ResourceCard({ item }) {
      const s = STATUS_STYLE[item.status] || STATUS_STYLE.exists;
      const sym = {
        plan: '+', create: '+', exists: '=', drift: '~', destroy: '-', gone: '✗',
      }[item.status] || '·';
      return (
        <div className={`rounded-lg border ${s.bg} ${s.border} px-3 py-2 flex items-center justify-between`}>
          <div className="flex items-center gap-2">
            <span className={`text-base font-mono font-bold ${s.text} w-5 text-center`}>{sym}</span>
            <span className={`text-sm font-mono font-bold ${s.text}`}>{item.name}</span>
          </div>
          <span className={`text-[10px] px-2 py-0.5 rounded ${s.badge}`}>{item.badge}</span>
        </div>
      );
    }

    function DiffBox({ diff }) {
      if (!diff) return null;
      return (
        <div className="mt-3 rounded-lg border border-pink-300 bg-pink-50 p-3">
          <div className="flex items-center justify-between mb-1">
            <span className="text-xs font-bold text-pink-800">Plan 결과</span>
            {diff.applied && <span className="text-[10px] bg-emerald-200 text-emerald-800 px-2 py-0.5 rounded">applied ✓</span>}
            {diff.refreshed && <span className="text-[10px] bg-amber-200 text-amber-800 px-2 py-0.5 rounded">refreshed ↻</span>}
          </div>
          <div className="font-mono text-sm text-pink-900">
            <span className="text-emerald-700 font-bold">+ {diff.add}</span>
            <span className="mx-2 text-slate-400">|</span>
            <span className="text-amber-700 font-bold">~ {diff.change}</span>
            <span className="mx-2 text-slate-400">|</span>
            <span className="text-rose-700 font-bold">- {diff.destroy}</span>
            <span className="ml-2 text-[10px] text-pink-700/70">
              add / change / destroy
            </span>
          </div>
        </div>
      );
    }

    function StateFileBox({ stateFile }) {
      if (!stateFile) return null;
      return (
        <div className="mt-3 rounded-lg border border-slate-300 bg-slate-50 p-3">
          <div className="flex items-center justify-between mb-1">
            <span className="text-xs font-bold text-slate-700">📄 terraform.tfstate</span>
            <span className="text-[10px] bg-slate-200 text-slate-700 px-2 py-0.5 rounded">{stateFile.badge}</span>
          </div>
          <pre className="text-[11px] font-mono text-slate-800 whitespace-pre-wrap leading-snug">{stateFile.lines.join('\n')}</pre>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-pink-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-pink-800">라이프사이클 타임라인 + 리소스 상태</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 도메인 상태</span>
          </div>
          <Timeline timeline={state.timeline} />
          <div className="space-y-2">
            {state.resources.map((it, i) => (
              <ResourceCard key={i} item={it} />
            ))}
          </div>
          {state.note && (
            <div className="mt-3 text-center text-xs font-bold text-pink-600 py-2 border-y border-dashed border-pink-300">
              ↓ {state.note} ↓
            </div>
          )}
          <DiffBox diff={state.diff} />
          <StateFileBox stateFile={state.stateFile} />
          <div className="mt-3 text-xs text-pink-900 bg-pink-50 border border-pink-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-pink-500/15 border-l-2 border-pink-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-pink-50 to-rose-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-pink-600 text-white font-bold">II</span>
              <div>
                <h1 className="text-2xl font-bold text-pink-900">II-2-2. plan / apply / destroy 라이프사이클</h1>
                <p className="text-sm text-pink-800/80">init → plan → apply → refresh → destroy. 5단계로 추적</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-pink-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-pink-600' : 'bg-pink-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-pink-700 text-pink-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-pink-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                aria-label="처음으로"
                className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-700 hover:bg-pink-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-700 hover:bg-pink-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                aria-pressed={playing}
                aria-label={playing ? '자동 재생 정지' : '자동 재생 시작'}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-pink-700 text-white' : 'bg-pink-600 text-white hover:bg-pink-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                aria-label="다음 단계"
                className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-700 hover:bg-pink-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-pink-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-pink-400 bg-white px-4 py-3 text-sm text-pink-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                Terraform 라이프사이클은 init → plan → apply → refresh → destroy 의 5단계 순환이다.
                코드(.tf) / 상태(tfstate) / 실제 클라우드 세 축의 차이를 +/-/~ 기호로 계산하고,
                apply 가 실제 변경을 반영한 뒤 tfstate 에 기록한다. drift 가 의심되면 plan -refresh-only,
                삭제는 destroy 또는 prevent_destroy 로 방어한다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['init', 'plan', 'apply', 'refresh', 'destroy', 'tfstate', 'drift', '+/-/~', 'prevent_destroy', 'auto-approve'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-pink-100 text-pink-800 border border-pink-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-pink-700">
              <a href="./II-2-1.html" className="underline hover:no-underline">← 이전: II-2-1</a>
              <a href="../index.html" className="underline hover:no-underline">챕터 목록</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
