            '# (2) 도쿄 aws — alias 명시',
            'resource "aws_s3_bucket" "tokyo_logs" {',
            '  provider = aws.tokyo  # ← 어떤 provider 쓸지 명시',
            '  bucket   = "my-app-tokyo-logs"',
            '}',
            '',
            '# (3) GCP — Cloud Storage 버킷',
            'resource "google_storage_bucket" "gcp_assets" {',
            '  name     = "my-app-assets"',
            '  location = "ASIA-NORTHEAST3"',
            '}',
            '',
            '# (4) Azure — Resource Group',
            'resource "azurerm_resource_group" "main" {',
            '  name     = "rg-my-app"',
            '  location = "Korea Central"',
            '}',
            '',
            '# 실행 시:',
            '#   terraform init   → 3개 provider 모두 다운로드',
            '#   terraform plan   → 4개 리소스 생성 계획 (AWS x2 + GCP x1 + Azure x1)',
            '#   terraform apply  → 각 클라우드 API 동시 호출',
          ],
          highlight: [12, 13, 14, 15, 19, 20, 21, 22, 23, 24, 27, 28, 29, 30, 33, 34, 35, 39, 40, 41, 42, 43, 45, 46, 47, 48, 49, 51, 52, 53, 54, 55, 57, 58, 59, 60, 61],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — pink 톤
    // ─────────────────────────────────────────────────────
    const STATUS_STYLE = {
      declared:      { bg: 'bg-slate-100', border: 'border-slate-300', text: 'text-slate-700', badge: 'bg-slate-200 text-slate-700', label: '선언만' },
      authenticated: { bg: 'bg-pink-50',   border: 'border-pink-300',  text: 'text-pink-800',  badge: 'bg-pink-200 text-pink-800',   label: '인증됨' },
    };

    function ProviderCard({ p }) {
      const s = STATUS_STYLE[p.status] || STATUS_STYLE.declared;
      return (
        <div className={`rounded-lg border-2 ${s.bg} ${s.border} p-3`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-2">
              <span className="text-xl">{p.icon}</span>
              <span className={`text-sm font-bold ${s.text}`}>{p.label}</span>
            </div>
            <span className={`text-[10px] px-2 py-0.5 rounded ${s.badge}`}>{s.label}</span>
          </div>
          <div className="space-y-1">
            <div className="flex gap-2 text-xs">
              <span className="text-slate-500 w-12">인증:</span>
              <span className={`font-mono ${s.text}`}>{p.auth}</span>
            </div>
            <div className="flex gap-2 text-xs">
              <span className="text-slate-500 w-12">source:</span>
              <span className="font-mono text-slate-600 break-all">{p.source}</span>
            </div>
          </div>
        </div>
      );
    }

    function MultiBox({ multi }) {
      if (!multi) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-pink-400 bg-pink-50 p-3">
          <div className="text-xs font-bold text-pink-800 mb-2">⚡ {multi.title}</div>
          <ul className="space-y-1">
            {multi.actions.map((a, i) => (
              <li key={i} className="text-sm text-pink-900 flex gap-2">
                <span className="text-pink-500">▸</span>
                <span>{a}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-pink-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-pink-800">provider 인증 시뮬레이션</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = provider 상태</span>
          </div>
          <div className="space-y-2">
            {state.providers.map((p, i) => (
              <ProviderCard key={i} p={p} />
            ))}
          </div>
          {state.note && (
            <div className="mt-3 text-center text-xs font-bold text-pink-600 py-2 border-y border-dashed border-pink-300">
              ↓ {state.note} ↓
            </div>
          )}
          <MultiBox multi={state.multi} />
          <div className="mt-3 text-xs text-pink-900 bg-pink-50 border border-pink-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-pink-500/15 border-l-2 border-pink-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-pink-50 to-rose-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-pink-600 text-white font-bold">II</span>
              <div>
                <h1 className="text-2xl font-bold text-pink-900">II-1-1. provider — AWS/GCP/Azure 인증</h1>
                <p className="text-sm text-pink-800/80">provider 블록 → AWS → GCP → Azure → 멀티 provider. 5단계로 추적</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-pink-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-pink-600' : 'bg-pink-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-pink-700 text-pink-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-pink-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-700 hover:bg-pink-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-700 hover:bg-pink-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-pink-700 text-white' : 'bg-pink-600 text-white hover:bg-pink-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-700 hover:bg-pink-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-pink-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-pink-400 bg-white px-4 py-3 text-sm text-pink-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                provider 블록 = 클라우드 SDK 선언 + 인증 통로. AWS 는 chain(env/file/role), GCP 는 SA JSON, Azure 는 az login/SP. 멀티 클라우드는 provider 블록 N개 + alias 로 구성한다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['provider', 'AWS', 'GCP', 'Azure', 'IAM Role', 'Service Account', 'az login', 'alias', 'features {}'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-pink-100 text-pink-800 border border-pink-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-pink-700">
              <a href="../index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./II-1-2.html" className="underline hover:no-underline">다음: II-1-2 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
