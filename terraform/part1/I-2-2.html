            '# 또는 자동 승인 (학습용 — 운영에선 금지)',
            '# terraform apply -auto-approve',
            '',
            '# 출력 예시',
            '# ┌──────────────────────────────────────────────────',
            '# │ Plan: 1 to add, 0 to change, 0 to destroy.',
            '# │',
            '# │ Do you want to perform these actions?',
            '# │   Only \'yes\' will be accepted to approve.',
            '# │',
            '# │ Enter a value: yes',
            '# │',
            '# │ aws_s3_bucket.demo: Creating...',
            '# │ aws_s3_bucket.demo: Creation complete after 3s ',
            '# │   [id=tf-demo-bucket-2026-edgar]',
            '# │',
            '# │ Apply complete! Resources: 1 added, 0 changed, 0 destroyed.',
            '# │',
            '# │ Outputs:',
            '# │   bucket_name = "tf-demo-bucket-2026-edgar"',
            '# └──────────────────────────────────────────────────',
            '',
            '# ── 새로 생긴 파일 ──────────────────────────────',
            'ls -la',
            '# terraform.tfstate         ← 만들어진 리소스의 ID/속성 기록 (소중!)',
            '# terraform.tfstate.backup  ← 직전 상태 자동 백업',
            '',
            '# ── 확인 ────────────────────────────────────────',
            'terraform state list',
            '#   aws_s3_bucket.demo',
            '',
            'aws s3 ls | grep tf-demo-bucket-2026-edgar',
            '#   2026-05-19 14:32:11 tf-demo-bucket-2026-edgar',
            '',
            '# ── 정리 (학습 끝나면) ─────────────────────────',
            '# terraform destroy   ← 만든 리소스 전부 삭제',
            '',
            '# 축하합니다! IaC 첫 사이클(작성→init→plan→apply) 완료 🎉',
          ],
          highlight: [4, 5, 14, 19, 21, 22, 23, 25, 27, 28, 32, 33, 34, 37, 38, 40, 41, 45],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — pink 톤
    //  ① 터미널 mock (상단)
    //  ② AWS Console mock (하단, Step 4 부터 시각화)
    // ─────────────────────────────────────────────────────
    const LINE_STYLE = {
      cmd:     { bg: '',                 text: 'text-pink-200',  prompt: 'text-pink-400' },
      stdout:  { bg: '',                 text: 'text-slate-200', prompt: 'text-slate-500' },
      success: { bg: 'bg-emerald-900/30', text: 'text-emerald-300', prompt: 'text-emerald-400' },
      warn:    { bg: 'bg-amber-900/30',  text: 'text-amber-200', prompt: 'text-amber-400' },
      error:   { bg: 'bg-red-900/40',    text: 'text-red-200',   prompt: 'text-red-400' },
      info:    { bg: 'bg-slate-800/60',  text: 'text-slate-300', prompt: 'text-pink-300' },
    };

    function TerminalLine({ line }) {
      const s = LINE_STYLE[line.kind] || LINE_STYLE.stdout;
      return (
        <div className={`flex gap-2 px-2 py-0.5 rounded ${s.bg}`}>
          <span className={`w-5 text-xs font-mono ${s.prompt} select-none`}>{line.label}</span>
          <span className={`text-xs font-mono ${s.text} flex-1 whitespace-pre-wrap break-all`}>{line.text}</span>
        </div>
      );
    }

    function TerminalMock({ lines }) {
      return (
        <div className="rounded-lg border border-slate-700 bg-[#1e1e1e] overflow-hidden">
          <div className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-800 border-b border-slate-700">
            <span className="w-2.5 h-2.5 rounded-full bg-red-400"></span>
            <span className="w-2.5 h-2.5 rounded-full bg-yellow-400"></span>
            <span className="w-2.5 h-2.5 rounded-full bg-green-400"></span>
            <span className="ml-3 text-[10px] text-slate-300 font-mono">my-first-tf — bash</span>
          </div>
          <div className="p-2 space-y-0.5 max-h-[340px] overflow-auto">
            {lines.map((l, i) => <TerminalLine key={i} line={l} />)}
          </div>
        </div>
      );
    }

    function AwsConsoleMock({ pane }) {
      const { phase, buckets } = pane;
      const phaseLabel = {
        empty:    { text: '버킷 없음', color: 'text-slate-500', bg: 'bg-slate-100' },
        planning: { text: 'plan 검토 중 (변경 0건)', color: 'text-amber-700', bg: 'bg-amber-100' },
        creating: { text: '생성 중...', color: 'text-blue-700', bg: 'bg-blue-100' },
        done:     { text: '생성 완료', color: 'text-emerald-700', bg: 'bg-emerald-100' },
      }[phase] || { text: '-', color: 'text-slate-500', bg: 'bg-slate-100' };

      return (
        <div className="rounded-lg border border-pink-200 bg-white overflow-hidden">
          <div className="flex items-center gap-2 px-3 py-1.5 bg-gradient-to-r from-[#232f3e] to-[#37475a] text-white">
            <span className="text-base">☁️</span>
            <span className="text-xs font-bold tracking-wide">AWS Console — S3</span>
            <span className={`ml-auto text-[10px] px-2 py-0.5 rounded ${phaseLabel.bg} ${phaseLabel.color} font-bold`}>
              {phaseLabel.text}
            </span>
          </div>
          <div className="p-2">
            <div className="grid grid-cols-12 text-[10px] font-bold text-slate-500 border-b border-slate-200 pb-1 px-1">
              <span className="col-span-5">Name</span>
              <span className="col-span-3">Region</span>
              <span className="col-span-2">Tag</span>
              <span className="col-span-2 text-right">Created</span>
            </div>
            {buckets.length === 0 && (
              <div className="text-center text-xs text-slate-400 py-4">
                {phase === 'planning' ? '(plan 결과 — 아직 생성 안 됨)' : '버킷이 없습니다'}
              </div>
            )}
            {phase === 'planning' && (
              <div className="grid grid-cols-12 text-[11px] py-1 px-1 items-center bg-amber-50 border-l-2 border-amber-400 rounded mt-1">
                <span className="col-span-5 font-mono text-amber-800">+ tf-demo-bucket-2026-edgar</span>
                <span className="col-span-3 text-amber-700">us-east-1</span>
                <span className="col-span-2 text-amber-700">first-bucket</span>
                <span className="col-span-2 text-right text-amber-600">(pending)</span>
              </div>
            )}
            {buckets.map((b, i) => (
              <div key={i} className="grid grid-cols-12 text-[11px] py-1 px-1 items-center bg-emerald-50 border-l-2 border-emerald-400 rounded mt-1 animate-pulse">
                <span className="col-span-5 font-mono text-emerald-800">🪣 {b.name}</span>
                <span className="col-span-3 text-emerald-700">{b.region}</span>
                <span className="col-span-2 text-emerald-700">{b.tag}</span>
                <span className="col-span-2 text-right text-emerald-600">{b.created}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-pink-200 bg-white p-3 h-full flex flex-col gap-3">
          <div className="flex items-center justify-between">
            <h3 className="text-sm font-bold text-pink-800">실행 시뮬레이션</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 터미널 + AWS Console</span>
          </div>
          <TerminalMock lines={state.terminal} />
          <AwsConsoleMock pane={state.console} />
          <div className="mt-auto text-xs text-pink-900 bg-pink-50 border border-pink-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js, 5탭)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ steps, stepIdx, setStepIdx }) {
      const code = steps[stepIdx].code;
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 탭 바 (5개 파일) */}
          <div className="flex items-center bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {steps.map((s, i) => {
              const active = i === stepIdx;
              return (
                <button
                  key={i}
                  onClick={() => setStepIdx(i)}
                  className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                    active
                      ? 'bg-[#282c34] text-pink-300 border-t-2 border-t-pink-400'
                      : 'bg-slate-900 text-slate-400 hover:text-slate-200 border-t-2 border-t-transparent'
                  }`}
                >
                  {s.code.filename}
                </button>
              );
            })}
          </div>

          {/* 헤더 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>

          {/* 본문 */}
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-pink-500/15 border-l-2 border-pink-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>

          {/* 푸터 */}
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {steps.length}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동재생 3000ms
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-pink-50 to-rose-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-pink-600 text-white font-bold">🪴</span>
              <div>
                <h1 className="text-2xl font-bold text-pink-900">I-2-2. Terraform 설치 + 첫 실행</h1>
                <p className="text-sm text-pink-800/80">설치 → main.tf → init → plan → apply. 5단계로 첫 S3 버킷을 만든다</p>
              </div>
              <a href="../index.html" className="ml-auto text-xs text-pink-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-pink-600' : 'bg-pink-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-pink-700 text-pink-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-pink-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer steps={STEPS} stepIdx={stepIdx} setStepIdx={setStepIdx} />
            </div>

            {/* 컨트롤 (4버튼) */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => { setPlaying(false); setStepIdx(0); }}
                className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-700 hover:bg-pink-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-700 hover:bg-pink-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-pink-700 text-white' : 'bg-pink-600 text-white hover:bg-pink-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-700 hover:bg-pink-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-pink-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계 · 우측 탭 클릭으로 단계 이동</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-pink-400 bg-white px-4 py-3 text-sm text-pink-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                install → main.tf → init → plan → apply. 이 5단계가 모든 Terraform 작업의 기본 사이클이다. 다음 챕터(I-2-3)에서는 변경/삭제(update/destroy) 사이클과 state 파일의 역할을 깊게 본다.
                <div className="mt-2 text-xs text-pink-700">
                  학습 끝났으면 비용 방지를 위해 <code className="px-1 py-0.5 bg-pink-100 rounded">terraform destroy</code> 실행을 잊지 말 것.
                </div>
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Terraform', 'IaC', 'AWS', 'S3', 'provider', 'resource', 'init', 'plan', 'apply', 'tfstate', 'HCL'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-pink-100 text-pink-800 border border-pink-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-pink-700">
              <a href="../index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./I-2-3.html" className="underline hover:no-underline">다음: I-2-3 변경 & 삭제 사이클 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
