            '# (Terraform 으로 만들 수도, 콘솔/CLI 로 만들 수도 있다)',
            'resource "aws_secretsmanager_secret" "db" {',
            '  name                    = "prod/db/master"',
            '  description             = "RDS master credentials"',
            '  recovery_window_in_days = 7',
            '  kms_key_id              = aws_kms_key.secrets.id',
            '}',
            '',
            'resource "aws_secretsmanager_secret_version" "db" {',
            '  secret_id     = aws_secretsmanager_secret.db.id',
            '  secret_string = jsonencode({',
            '    username = "admin"',
            '    password = random_password.db.result',
            '  })',
            '}',
            '',
            'resource "random_password" "db" {',
            '  length  = 32',
            '  special = true',
            '}',
            '',
            '# ── ② 다른 Terraform 코드에서 가져오기 ──',
            'data "aws_secretsmanager_secret" "db" {',
            '  name = "prod/db/master"',
            '}',
            '',
            'data "aws_secretsmanager_secret_version" "db" {',
            '  secret_id = data.aws_secretsmanager_secret.db.id',
            '}',
            '',
            'locals {',
            '  db_creds = jsondecode(data.aws_secretsmanager_secret_version.db.secret_string)',
            '}',
            '',
            'resource "aws_db_instance" "main" {',
            '  identifier = "prod-db"',
            '  engine     = "postgres"',
            '  username   = local.db_creds.username',
            '  password   = local.db_creds.password',
            '  # ...',
            '}',
            '',
            '# ── ③ 자동 회전 (Lambda rotation) ──',
            'resource "aws_secretsmanager_secret_rotation" "db" {',
            '  secret_id           = aws_secretsmanager_secret.db.id',
            '  rotation_lambda_arn = aws_lambda_function.rotation.arn',
            '  rotation_rules {',
            '    automatically_after_days = 30',
            '  }',
            '}',
            '',
            '# 장점:',
            '#  1) IAM 으로 접근 제어 (별도 서버 불필요)',
            '#  2) RDS / DocumentDB 와 자동 회전 통합',
            '#  3) CloudTrail 에 모든 조회 기록',
            '#  4) 멀티 리전 복제 지원',
            '',
            '# 단점:',
            '#  1) AWS 종속 (멀티클라우드는 Vault)',
            '#  2) 비용: secret 당 월 $0.40 + API 호출당 과금',
            '',
            '# → 끝. 이제 평문 tfvars 를 다시는 git 에 안 올린다.',
          ],
          highlight: [6, 7, 8, 9, 10, 13, 14, 15, 16, 17, 18, 19, 26, 27, 28, 30, 31, 32, 35, 36, 37, 39, 40, 41, 42, 43, 44, 45, 48, 49, 50, 51, 52, 53, 54],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — pink 톤
    // ─────────────────────────────────────────────────────
    const KIND_STYLE = {
      bad:  { bg: 'bg-rose-50',   border: 'border-rose-300',   text: 'text-rose-800',   badge: 'bg-rose-200 text-rose-800' },
      okay: { bg: 'bg-amber-50',  border: 'border-amber-300',  text: 'text-amber-800',  badge: 'bg-amber-200 text-amber-800' },
      good: { bg: 'bg-pink-50',   border: 'border-pink-300',   text: 'text-pink-800',   badge: 'bg-pink-200 text-pink-800' },
    };

    function StarRating({ count }) {
      const stars = [];
      for (let i = 1; i <= 5; i += 1) {
        const filled = i <= count;
        const color = count >= 4 ? 'text-rose-500' : count >= 3 ? 'text-amber-500' : 'text-pink-500';
        stars.push(
          <span key={i} className={filled ? color : 'text-slate-300'}>
            {filled ? '★' : '☆'}
          </span>,
        );
      }
      return <span className="text-xs tracking-tighter">{stars}</span>;
    }

    function SecretCard({ item }) {
      const s = KIND_STYLE[item.kind] || KIND_STYLE.okay;
      return (
        <div className={`rounded-lg border ${s.bg} ${s.border} px-3 py-2`}>
          <div className="flex items-center justify-between mb-1">
            <span className={`text-xs font-bold ${s.text}`}>{item.location}</span>
            <StarRating count={item.stars} />
          </div>
          <div className="flex items-center justify-between gap-2">
            <span className={`text-[11px] font-mono ${s.text} truncate`}>{item.value}</span>
            <span className={`text-[10px] px-2 py-0.5 rounded shrink-0 ${s.badge}`}>{item.badge}</span>
          </div>
        </div>
      );
    }

    function IncidentBox({ incident }) {
      if (!incident) return null;
      return (
        <div className="mt-3 rounded-lg border-2 border-rose-400 bg-rose-50 p-3">
          <div className="text-xs font-bold text-rose-800 mb-2">🚨 {incident.title}</div>
          <ul className="space-y-1">
            {incident.actions.map((a, i) => (
              <li key={i} className="text-sm text-rose-900 flex gap-2">
                <span className="text-rose-500">▸</span>
                <span>{a}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function ConclusionBox({ conclusion }) {
      if (!conclusion) return null;
      return (
        <div className="mt-3 rounded-xl border-2 border-pink-500 bg-gradient-to-br from-pink-50 to-rose-50 p-4">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-2xl">🎯</span>
            <span className="text-lg font-bold text-pink-800">{conclusion.title}</span>
          </div>
          <ul className="space-y-1.5">
            {conclusion.actions.map((a, i) => (
              <li key={i} className="text-sm text-pink-900 flex gap-2">
                <span className="text-pink-500 mt-0.5">✓</span>
                <span>{a}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ state }) {
      return (
        <div className="rounded-xl border border-pink-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-pink-800">비밀 저장 위치 + 위험도</h3>
            <span className="text-[10px] text-slate-500">★ 많을수록 위험</span>
          </div>
          <div className="space-y-2">
            {state.secrets.map((it, i) => (
              <SecretCard key={i} item={it} />
            ))}
          </div>
          {state.arrow && (
            <div className="mt-3 text-center text-xs font-bold text-pink-600 py-2 border-y border-dashed border-pink-300">
              ↓ {state.arrow} ↓
            </div>
          )}
          <IncidentBox incident={state.incident} />
          <ConclusionBox conclusion={state.conclusion} />
          <div className="mt-3 text-xs text-pink-900 bg-pink-50 border border-pink-200 rounded p-2">
            💡 {state.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>
          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-pink-500/15 border-l-2 border-pink-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>
          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-pink-50 to-rose-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-pink-600 text-white font-bold">V</span>
              <div>
                <h1 className="text-2xl font-bold text-pink-900">V-2-1. Secret 관리 — Vault / SOPS / 환경변수</h1>
                <p className="text-sm text-pink-800/80">평문 tfvars → 환경변수 → Vault → SOPS → AWS Secrets Manager. 5단계로 추적</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-pink-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-pink-600' : 'bg-pink-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-pink-700 text-pink-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-pink-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane state={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-700 hover:bg-pink-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-700 hover:bg-pink-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-pink-700 text-white' : 'bg-pink-600 text-white hover:bg-pink-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-700 hover:bg-pink-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-pink-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-pink-400 bg-white px-4 py-3 text-sm text-pink-900">
                <div className="font-bold mb-1">✅ 핵심 정리</div>
                비밀은 절대 평문 tfvars로 git에 커밋하지 않는다. 가장 가벼운 단계는 환경변수, 표준은 Vault/SOPS/Secrets Manager. 팀 규모와 클라우드 종속도에 따라 골라 쓰면 된다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['tfvars', 'TF_VAR_*', 'Vault', 'SOPS', 'AWS Secrets Manager', 'KMS', 'sensitive', '감사로그'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-pink-100 text-pink-800 border border-pink-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-pink-700">
              <a href="./index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./V-2-2.html" className="underline hover:no-underline">다음: V-2-2 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
