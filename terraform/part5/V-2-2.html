            '',
            '- 모든 항목을 한 번에 통과하려 하지 말 것',
            '- "지금 운영 들어가는 모듈"의 우선순위 항목부터',
            '- 통과 못한 항목은 "TBD"가 아니라 "Owner + Due"로 명시',
            '- 체크리스트 자체를 git 으로 버전 관리',
            '',
            '## 다음 단계 (V-2-3)',
            '',
            '운영 단계로 넘어가면:',
            '- Terraform Cloud / Enterprise 도입 검토',
            '- 모듈 레지스트리 사내 운영',
            '- 정책 코드 (Sentinel / OPA) 본격 적용',
            '- 멀티 어카운트 / 멀티 클라우드 거버넌스',
            '',
            '## 마지막으로',
            '',
            '> 체크리스트가 정답을 주는 것은 아니다.',
            '> 다만 "내가 빠뜨린 게 있는지" 알 수 있게 해준다.',
            '> 운영은 정답을 맞추는 게임이 아니라',
            '> 실수를 줄여가는 과정이다.',
          ],
          highlight: [4, 5, 6, 7, 8, 9, 10, 11, 14, 15, 16, 17, 18, 26, 27, 28, 29, 30, 35, 36, 37, 38],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // 좌측 LiveDataPane — pink 톤
    //   4축 카드 + 각 축마다 12 항목 누적 체크 표시
    // ─────────────────────────────────────────────────────
    const AXIS_COLORS = {
      quality:  { bg: 'bg-rose-50',    border: 'border-rose-400',    text: 'text-rose-800',    bar: 'bg-rose-500' },
      state:    { bg: 'bg-pink-50',    border: 'border-pink-400',    text: 'text-pink-800',    bar: 'bg-pink-500' },
      security: { bg: 'bg-fuchsia-50', border: 'border-fuchsia-400', text: 'text-fuchsia-800', bar: 'bg-fuchsia-500' },
      ops:      { bg: 'bg-pink-50',    border: 'border-pink-500',    text: 'text-pink-900',    bar: 'bg-pink-600' },
    };

    function AxisCard({ axis, isActive, isDone }) {
      const c = AXIS_COLORS[axis.id];
      const stateLabel = isDone ? '12/12 ✓' : isActive ? '체크중...' : '대기';
      return (
        <div className={`rounded-lg border-2 ${c.border} ${isActive ? c.bg : 'bg-white'} p-3 transition`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-2">
              <span className="text-xl">{axis.icon}</span>
              <span className={`text-sm font-bold ${c.text}`}>{axis.title}</span>
            </div>
            <span className={`text-[10px] px-2 py-0.5 rounded font-mono ${isDone ? 'bg-pink-600 text-white' : isActive ? 'bg-pink-200 text-pink-900' : 'bg-slate-100 text-slate-500'}`}>
              {stateLabel}
            </span>
          </div>
          <div className="text-[10px] text-slate-500 mb-2">{axis.desc}</div>
          <ul className="space-y-0.5 max-h-44 overflow-y-auto pr-1">
            {axis.items.map((it, i) => {
              const checked = isDone || isActive;
              return (
                <li key={i} className="text-[10px] flex items-start gap-1.5">
                  <span className={`mt-0.5 ${checked ? 'text-pink-600' : 'text-slate-300'}`}>
                    {checked ? '✓' : '○'}
                  </span>
                  <span className={checked ? c.text : 'text-slate-400'}>{it}</span>
                </li>
              );
            })}
          </ul>
        </div>
      );
    }

    function LiveDataPane({ step, stepIdx }) {
      // 누적 통과 항목 진행률
      const total = AXES.length * 12; // 48
      const accumulated = step.accumulated;
      const percent = Math.round((accumulated / total) * 100);

      // 어떤 축이 활성/완료 상태인지 계산
      // Step 1~4 : 해당 축이 "이번 단계 활성", 이전 축들은 "완료"
      // Step 5   : 모든 축 완료
      const axisStatus = AXES.map((ax) => {
        if (step.activeAxis === 'all') return { isActive: false, isDone: true };
        if (ax.id === step.activeAxis) return { isActive: true, isDone: false };
        // 이전 단계에서 이미 통과한 축인지 확인
        const idxInSteps = STEPS.findIndex((s) => s.activeAxis === ax.id);
        return { isActive: false, isDone: idxInSteps !== -1 && idxInSteps < stepIdx };
      });

      return (
        <div className="rounded-xl border border-pink-200 bg-white p-4 h-full flex flex-col">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-bold text-pink-800">운영 출항 점검표 — 4축 × 12 항목</h3>
            <span className="text-[10px] text-slate-500">왼쪽 = 누적 체크 상태</span>
          </div>

          {/* 누적 진행률 */}
          <div className="mb-3 rounded-lg border border-pink-300 bg-pink-50 p-2">
            <div className="flex items-center justify-between text-xs font-bold text-pink-800 mb-1">
              <span>누적 통과</span>
              <span>{accumulated} / {total} ({percent}%)</span>
            </div>
            <div className="h-2 w-full rounded-full bg-pink-100 overflow-hidden">
              <div
                className="h-full bg-gradient-to-r from-pink-500 to-fuchsia-500 transition-all duration-500"
                style={{ width: `${percent}%` }}
              />
            </div>
          </div>

          {/* 4축 카드 그리드 */}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 flex-1 overflow-auto">
            {AXES.map((ax, i) => (
              <AxisCard
                key={ax.id}
                axis={ax}
                isActive={axisStatus[i].isActive}
                isDone={axisStatus[i].isDone}
              />
            ))}
          </div>

          <div className="mt-3 text-xs text-pink-900 bg-pink-50 border border-pink-200 rounded p-2">
            💡 {step.keyPoint}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // 우측 VSCode CodeViewer (highlight.js)
    //   5탭 — code-quality / state-safety / security / operations / summary
    // ─────────────────────────────────────────────────────
    function CodeViewer({ stepIdx, total }) {
      const codeRef = useRef(null);
      const code = STEPS[stepIdx].code;

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [code]);

      const highlightSet = new Set(code.highlight || []);
      const tokenLines = (() => {
        if (!codeRef.current) return code.lines.map((l) => ({ html: l }));
        const html = codeRef.current.innerHTML;
        const split = html.split('\n');
        return code.lines.map((l, i) => ({ html: split[i] !== undefined ? split[i] : l }));
      })();

      return (
        <div className="rounded-xl overflow-hidden border border-slate-700 bg-[#282c34] h-full flex flex-col shadow-lg">
          {/* 5탭 헤더 */}
          <div className="flex items-center gap-0 bg-slate-900 border-b border-slate-700 overflow-x-auto">
            {STEPS.map((s, i) => {
              const isActive = i === stepIdx;
              return (
                <div
                  key={i}
                  className={`px-3 py-2 text-[10px] font-mono whitespace-nowrap border-r border-slate-700 ${
                    isActive
                      ? 'bg-[#282c34] text-pink-300 border-t-2 border-t-pink-400'
                      : 'bg-slate-900 text-slate-500'
                  }`}
                >
                  {s.code.filename}
                </div>
              );
            })}
          </div>

          {/* 파일명 바 */}
          <div className="flex items-center gap-2 px-3 py-2 bg-slate-800 border-b border-slate-700">
            <span className="w-3 h-3 rounded-full bg-red-400"></span>
            <span className="w-3 h-3 rounded-full bg-yellow-400"></span>
            <span className="w-3 h-3 rounded-full bg-green-400"></span>
            <span className="ml-3 text-xs text-slate-300 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-400">{code.lang}</span>
          </div>

          <div className="flex-1 overflow-auto p-3 text-xs font-mono leading-5">
            <pre ref={codeRef} className={`hidden language-${code.lang}`}>{code.lines.join('\n')}</pre>
            <div className="text-slate-200">
              {code.lines.map((line, i) => {
                const lineNo = i + 1;
                const isHi = highlightSet.has(lineNo);
                return (
                  <div
                    key={i}
                    className={`flex ${isHi ? 'bg-pink-500/15 border-l-2 border-pink-400 -ml-3 pl-2' : ''}`}
                  >
                    <span className="text-slate-500 select-none w-8 text-right pr-2">{lineNo}</span>
                    <span
                      className="flex-1"
                      dangerouslySetInnerHTML={{ __html: tokenLines[i] ? tokenLines[i].html : line }}
                    />
                  </div>
                );
              })}
            </div>
          </div>

          <div className="px-3 py-1.5 bg-slate-800 border-t border-slate-700 flex items-center justify-between text-[10px] text-slate-400">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const intervalRef = useRef(null);
      const step = STEPS[stepIdx];

      // 키보드 ←/→
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') setStepIdx((i) => Math.min(STEPS.length - 1, i + 1));
          else if (e.key === 'ArrowLeft') setStepIdx((i) => Math.max(0, i - 1));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // 자동재생 3초/단계
      useEffect(() => {
        if (!playing) return;
        intervalRef.current = setInterval(() => {
          setStepIdx((i) => {
            if (i >= STEPS.length - 1) {
              setPlaying(false);
              return i;
            }
            return i + 1;
          });
        }, 3000);
        return () => clearInterval(intervalRef.current);
      }, [playing]);

      const isLast = stepIdx === STEPS.length - 1;

      return (
        <div className="min-h-screen bg-gradient-to-br from-pink-50 to-fuchsia-50 px-4 py-6">
          <div className="max-w-7xl mx-auto">
            {/* 헤더 */}
            <header className="mb-5 flex items-end gap-3 flex-wrap">
              <span className="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-pink-600 text-white font-bold">V</span>
              <div>
                <h1 className="text-2xl font-bold text-pink-900">V-2-2. 실전 체크리스트 — 운영 출항 점검표</h1>
                <p className="text-sm text-pink-800/80">Code Quality / State Safety / Security / Operations — 4축 × 12 = 48 항목</p>
              </div>
              <a href="./index.html" className="ml-auto text-xs text-pink-700 underline hover:no-underline">← 챕터 목록</a>
            </header>

            {/* 진행 바 */}
            <div className="mb-4 flex gap-1.5">
              {STEPS.map((_, i) => (
                <div
                  key={i}
                  className={`h-1.5 flex-1 rounded-full transition ${i <= stepIdx ? 'bg-pink-600' : 'bg-pink-200'}`}
                />
              ))}
            </div>

            {/* 설명 패널 */}
            <div className="mb-4 rounded-xl bg-pink-700 text-pink-50 px-5 py-4 shadow">
              <h2 className="text-lg font-bold mb-1">{step.title}</h2>
              <p className="text-sm text-pink-100/90 leading-relaxed">{step.desc}</p>
            </div>

            {/* 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <LiveDataPane step={step} stepIdx={stepIdx} />
              <CodeViewer stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 컨트롤 — 4버튼 */}
            <div className="mt-5 flex items-center justify-center gap-2">
              <button
                onClick={() => setStepIdx(0)}
                className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-700 hover:bg-pink-50"
              >처음</button>
              <button
                onClick={() => setStepIdx((i) => Math.max(0, i - 1))}
                disabled={stepIdx === 0}
                className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-700 hover:bg-pink-50 disabled:opacity-40"
              >← 이전</button>
              <button
                onClick={() => {
                  if (isLast) setStepIdx(0);
                  setPlaying((p) => !p);
                }}
                className={`px-4 py-1.5 text-xs rounded font-bold ${playing ? 'bg-pink-700 text-white' : 'bg-pink-600 text-white hover:bg-pink-700'}`}
              >{playing ? '⏸ 일시정지' : isLast ? '↻ 다시보기' : '▶ 자동재생'}</button>
              <button
                onClick={() => setStepIdx((i) => Math.min(STEPS.length - 1, i + 1))}
                disabled={isLast}
                className="px-3 py-1.5 text-xs rounded border border-pink-300 bg-white text-pink-700 hover:bg-pink-50 disabled:opacity-40"
              >다음 →</button>
            </div>
            <div className="text-center text-[10px] text-pink-700/60 mt-2">키보드 ←/→ · 자동재생 3초/단계</div>

            {/* 마지막 단계 안내 */}
            {isLast && (
              <div className="mt-5 rounded-lg border-2 border-pink-400 bg-white px-4 py-3 text-sm text-pink-900">
                <div className="font-bold mb-1">✅ 출항 준비 완료 — 48 / 48</div>
                Code Quality · State Safety · Security · Operations 4축의 48개 항목을 모두 점검했다. 이 체크리스트는 PR마다, 분기마다, 사고 후마다 갱신되는 살아있는 문서로 운영해야 한다. 다음 챕터(V-2-3)에서는 Terraform Cloud / Enterprise / 정책 코드(Sentinel/OPA) 본격 적용을 다룬다.
              </div>
            )}

            {/* 키워드 */}
            <div className="mt-4 flex flex-wrap gap-1.5 text-[10px]">
              {['Terraform', '체크리스트', 'fmt', 'validate', 'tflint', 'state', 'backend', 'lock', '암호화', 'IAM', 'tfsec', 'OPA', 'CI', 'runbook', 'on-call'].map((k) => (
                <span key={k} className="px-2 py-0.5 rounded-full bg-pink-100 text-pink-800 border border-pink-200">#{k}</span>
              ))}
            </div>

            {/* 네비 */}
            <nav className="mt-6 flex items-center justify-between text-xs text-pink-700">
              <a href="./index.html" className="underline hover:no-underline">← 챕터 목록</a>
              <a href="./V-2-3.html" className="underline hover:no-underline">다음: V-2-3 Terraform Cloud / 정책 코드 →</a>
            </nav>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
