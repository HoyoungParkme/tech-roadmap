    // ─────────────────────────────────────────────────────
    // BrowserBox — MPA 또는 SPA 브라우저 한 칸

    // ─────────────────────────────────────────────────────
    function BrowserBox({ kind, active, label, urlPattern, pages, ssrBadge }) {
      const [page, setPage] = useState(0);
      // step 변경 시 페이지 리셋되도록 key 로 강제 마운트하지 않고 자체 상태만 유지
      const accent = active
        ? 'border-indigo-400 ring-2 ring-indigo-200'

        ? (kind === 'spa' ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800')
        : 'bg-slate-100 text-slate-600';

      const currentPage = pages[page % pages.length];

      return (
        <div className={`bg-white rounded-lg border-2 ${accent} overflow-hidden`}>
          <div className={`px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider flex items-center justify-between ${headerBg}`}>

              <div className="text-[10px] text-slate-500 mt-0.5">

                  : '서버 HTML 응답 — 전체 페이지 재로드'}
              </div>
              {kind === 'spa' && page > 0 && (
                <div className="mt-1 text-[9px] text-emerald-600 font-bold">⚡ pushState 만 호출 (서버 요청 0건)</div>

              {kind === 'mpa' && page > 0 && (
                <div className="mt-1 text-[9px] text-rose-600 font-bold">⟳ 화면 전체 새로고침 (깜빡임)</div>

    // ─────────────────────────────────────────────────────
    // NetworkBars — 네트워크 요청 비교 막대 그래프
    //   각 행: MPA(rose) vs SPA(emerald) 막대
    // ─────────────────────────────────────────────────────
    function NetworkBars({ bars }) {
      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">
          <div className="bg-slate-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-slate-600 flex items-center justify-between">
            <span>네트워크 / 성능 비교</span>

          <div className="p-2.5 space-y-2">
            {bars.map((b, i) => {
              const mpaPct = Math.min(100, (b.mpa / b.max) * 100);
              const spaPct = Math.min(100, (b.spa / b.max) * 100);
              return (
                <div key={i}>
                  <div className="text-[10px] text-slate-600 font-medium mb-0.5 flex items-center justify-between">

                  </div>

    // ─────────────────────────────────────────────────────
    // FlowArrow — 가운데 흐름 라벨 (수직 화살표)
    // ─────────────────────────────────────────────────────
    function FlowArrow({ label }) {
      return (

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    //   상단 : MPA 브라우저 박스 / SPA 브라우저 박스 (좌우 비교)
    //   ↓ 네트워크 요청 흐름
    //   하단 : 네트워크 요청 비교 막대
    //   하단2: 핵심 포인트 + 범례
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const focusMpa = step.focus === 'mpa' || step.focus === 'both';
      const focusSpa = step.focus === 'spa' || step.focus === 'both';

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🌐 MPA vs SPA — 라우팅 흐름 + 네트워크 비교</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          {/* 1) 좌(MPA) / 우(SPA) 브라우저 박스 */}
          <div className="grid grid-cols-2 gap-2">
            <BrowserBox
              kind="mpa"
              active={focusMpa}
              label="MPA — 매번 서버"
              urlPattern="example.com/{page}.html"

            <div className="text-[9px] font-bold text-indigo-600 uppercase tracking-wider mb-0.5">핵심 포인트</div>
            <p className="text-[11px] text-indigo-900 leading-snug">{step.keyPoint}</p>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-400"></span>MPA (Multi Page)
            </span>
            <span className="flex items-center gap-1">

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   상단 : 5개 파일 탭 (mpa-flow / spa-router / pros / cons / ssr-fix)
    //   본문 : 라인 번호 + 강조 라인 (Step별 자동 활성 탭)
    //   사용자가 직접 탭 클릭도 가능
    // ─────────────────────────────────────────────────────
    function CodeViewer({ activeTabIdx, stepIdx, total, onTabChange }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);
      const tab = TABS[activeTabIdx];
      const code = CODE_FILES[tab.key];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 줄 */}
          <div className="bg-[#21252b] px-3 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5 mr-2">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <div className="flex gap-0.5 overflow-x-auto">
              {TABS.map((t, i) => (
                <button
                  key={t.key}
                  onClick={() => onTabChange(i)}
                  className={`px-2.5 py-1 text-[10px] font-mono rounded-t transition flex-shrink-0 ${
                    i === activeTabIdx
                      ? 'bg-[#282c34] text-indigo-300 font-bold'
                      : 'bg-[#21252b] text-slate-500 hover:text-slate-300 hover:bg-[#2c313a]'
                  }`}
                >
                  {t.filename}
                </button>
              ))}
            </div>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-indigo-500/15 border-l-2 border-indigo-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · {code.filename}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    //   - 코드 뷰어 탭은 step.tabIdx 가 기본값, 사용자가 직접 변경 가능
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [tabIdx, setTabIdx] = useState(STEPS[0].tabIdx);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      // step 변경 시 해당 step 의 추천 탭으로 자동 이동
      useEffect(() => {
        setTabIdx(STEPS[stepIdx].tabIdx);
      }, [stepIdx]);

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="./index.html" className="text-indigo-700 hover:text-indigo-900 font-medium">&larr; 목차로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter II-1-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 웹 프레임워크 기초 &gt; Chapter 1. 아키텍처</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-1-3. SPA vs MPA — 라우팅 / 번들 / SEO</h1>
                  <p className="text-sm text-slate-500 mt-0.5">"한 번만 받느냐, 매번 받느냐" — 웹 앱 아키텍처의 두 갈래</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer
                activeTabIdx={tabIdx}
                stepIdx={stepIdx}
                total={STEPS.length}
                onTabChange={setTabIdx}
              />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-indigo-50 border-2 border-indigo-300 rounded-xl p-3 text-sm text-indigo-900">
                💡 정리: SPA는 <strong>부드러운 UX</strong>를, MPA는 <strong>SEO와 빠른 첫 화면</strong>을 가져간다. <strong>Next.js / Remix</strong>가 SSR/SSG로 두 장점을 합쳐 표준이 됐다. 다음 자료에서는 Vite/Webpack 같은 <strong>번들러</strong> 개념을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-indigo-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-indigo-600 text-white hover:bg-indigo-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['SPA', 'MPA', 'CSR', 'SSR', 'SSG', 'Hydration', 'React Router', 'Next.js', 'SEO', 'Bundle Size'].map((kw) => (
                <span key={kw} className="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-xs font-medium border border-indigo-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-01-04-frontend-frameworks.html" className="text-indigo-700 hover:text-indigo-900 font-medium">&larr; II-1-2 프론트엔드 프레임워크</a>
              <a href="./chapter-02-02-bundlers.html" className="text-indigo-700 hover:text-indigo-900 font-medium">II-1-4 번들러 &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
