<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPA vs MPA — Chapter II-1-3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter II-1-3 — SPA vs MPA: 페이지를 새로 로드하냐 마냐 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1 — MPA: 전통 방식',
        desc: 'MPA(Multi-Page Application)는 링크를 클릭할 때마다 서버에서 새 HTML을 받아 전체 페이지를 다시 그립니다. 페이지 이동마다 화면이 깜빡입니다.',
        type: 'mpa',
        action: 'load',
        request: { from: '브라우저', to: '서버', what: '/about.html 요청', response: '전체 HTML 응답' },
      },
      {
        title: 'Step 2 — MPA: 매번 새 HTML',
        desc: '홈 → 소개 → 상품 페이지 이동마다 서버가 완전히 새로운 HTML 파일을 보내줍니다. 공통 부분(헤더, 푸터)도 매번 다시 받습니다.',
        type: 'mpa',
        action: 'navigate',
        request: { from: '브라우저', to: '서버', what: '매 페이지마다 전체 HTML', response: '헤더+내용+푸터 전부' },
      },
      {
        title: 'Step 3 — SPA: 처음 한 번만 로드',
        desc: 'SPA(Single-Page Application)는 처음에 HTML + JS 번들을 한 번 받습니다. 이후 화면 전환은 JavaScript가 내부에서 처리합니다. 서버 요청 없이 즉시 전환됩니다.',
        type: 'spa',
        action: 'initial',
        request: { from: '브라우저', to: '서버', what: 'index.html + bundle.js', response: '앱 전체 코드 (1회)' },
      },
      {
        title: 'Step 4 — SPA: JS가 화면을 바꾼다',
        desc: '링크를 클릭하면 JS가 현재 페이지의 일부분만 바꿉니다. 헤더·푸터는 그대로 유지되고 내용 영역만 변경됩니다. 깜빡임 없이 부드럽게 전환됩니다.',
        type: 'spa',
        action: 'navigate',
        request: { from: 'JS Router', to: 'DOM', what: '컴포넌트 교체', response: '내용 영역만 변경' },
      },
      {
        title: 'Step 5 — 각각 언제 쓰나?',
        desc: 'SPA: 대시보드, SaaS, Gmail 같은 앱. MPA: 블로그, 뉴스, SEO가 중요한 사이트. Next.js는 둘의 장점을 합친 하이브리드 방식입니다.',
        type: 'comparison',
        action: 'summary',
        request: null,
      },
    ];

    function BrowserSimulation({ step }) {
      const [currentPage, setCurrentPage] = useState('홈');
      const pages = ['홈', '소개', '상품'];
      const isLoading = step.action === 'load' || step.action === 'navigate';

      return (
        <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
          <div className="text-xs text-slate-400 uppercase tracking-wider mb-3 font-bold">
            {step.type === 'mpa' ? 'MPA 브라우저' : step.type === 'spa' ? 'SPA 브라우저' : '비교'}
          </div>

          {step.type !== 'comparison' ? (
            <div className="bg-white rounded-lg overflow-hidden">
              {/* 브라우저 주소바 */}
              <div className="bg-slate-100 px-3 py-2 flex items-center gap-2 border-b">
                <div className="flex gap-1"><div className="w-2.5 h-2.5 rounded-full bg-red-400"></div><div className="w-2.5 h-2.5 rounded-full bg-yellow-400"></div><div className="w-2.5 h-2.5 rounded-full bg-emerald-400"></div></div>
                <div className="bg-white border rounded px-2 py-0.5 text-[10px] text-slate-500 flex-1 font-mono">
                  {step.type === 'mpa' ? `example.com/${currentPage === '홈' ? '' : currentPage + '.html'}` : `example.com/#/${currentPage}`}
                </div>
              </div>
              {/* 네비게이션 */}
              <div className="flex border-b">
                {pages.map(p => (
                  <button key={p} onClick={() => setCurrentPage(p)} className={`flex-1 text-xs py-2 transition ${currentPage === p ? 'bg-sky-50 text-sky-700 font-bold border-b-2 border-sky-500' : 'text-slate-500 hover:bg-slate-50'}`}>{p}</button>
                ))}
              </div>
              {/* 내용 */}
              <div className="p-4 min-h-[100px]">
                {step.type === 'mpa' && step.action === 'navigate' && (
                  <div className="text-center">
                    <div className="text-[10px] text-red-500 mb-2 animate-pulse">전체 페이지 새로 로드 중...</div>
                    <div className="w-full h-1 bg-slate-200 rounded overflow-hidden"><div className="h-full bg-red-400 animate-pulse" style={{width: '60%'}}></div></div>
                  </div>
                )}
                {step.type === 'mpa' && step.action !== 'navigate' && (
                  <div><div className="text-sm font-bold text-slate-800 mb-1">{currentPage} 페이지</div><div className="text-xs text-slate-500">서버에서 받은 전체 HTML</div></div>
                )}
                {step.type === 'spa' && (
                  <div>
                    <div className="text-sm font-bold text-slate-800 mb-1">{currentPage} 페이지</div>
                    <div className="text-xs text-slate-500">{step.action === 'initial' ? 'JS 번들 로드 완료' : '내용 영역만 교체 (깜빡임 없음)'}</div>
                    {step.action === 'navigate' && <div className="mt-2 text-[10px] text-emerald-500 font-bold">부드러운 전환 ✓</div>}
                  </div>
                )}
              </div>
            </div>
          ) : (
            <div className="grid grid-cols-2 gap-3">
              <div className="bg-red-50 border border-red-200 rounded-lg p-3">
                <div className="text-xs font-bold text-red-700 mb-2">MPA</div>
                <div className="space-y-1 text-[11px] text-slate-600">
                  <div>✓ SEO 우수 (서버 렌더링)</div>
                  <div>✓ 초기 로딩 빠름</div>
                  <div>✓ 간단한 구조</div>
                  <div>✗ 페이지 이동 시 깜빡임</div>
                  <div>✗ 중복 데이터 전송</div>
                </div>
                <div className="mt-2 text-[10px] text-red-600 font-bold">용도: 블로그, 뉴스, 이커머스</div>
              </div>
              <div className="bg-sky-50 border border-sky-200 rounded-lg p-3">
                <div className="text-xs font-bold text-sky-700 mb-2">SPA</div>
                <div className="space-y-1 text-[11px] text-slate-600">
                  <div>✓ 부드러운 화면 전환</div>
                  <div>✓ 앱 같은 사용감</div>
                  <div>✓ 서버 부하 적음</div>
                  <div>✗ 초기 로딩 느림 (큰 JS)</div>
                  <div>✗ SEO 별도 처리 필요</div>
                </div>
                <div className="mt-2 text-[10px] text-sky-600 font-bold">용도: 대시보드, SaaS, Gmail</div>
              </div>
            </div>
          )}

          {/* 요청 흐름 */}
          {step.request && (
            <div className="mt-3 bg-slate-700/50 rounded-lg p-2 flex items-center gap-2 text-[10px]">
              <span className="text-sky-300 font-bold">{step.request.from}</span>
              <span className="text-slate-400">→</span>
              <span className="text-amber-300 font-bold">{step.request.to}</span>
              <span className="text-slate-400">|</span>
              <span className="text-slate-300">{step.request.what}</span>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => { setIdx(p => { if (p < STEPS.length-1) return p+1; setIsPlaying(false); return p; }); };
      const nextRef = useRef(next); nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 3500); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">II</div>
                <h1 className="text-2xl font-bold text-slate-800">SPA vs MPA</h1>
              </div>
              <p className="text-slate-600 text-sm"><b>Single-Page App</b>과 <b>Multi-Page App</b>의 차이를 브라우저 시뮬레이션으로 비교합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter II-1-3 | ★★☆ | 선수 지식 II-1-2 | 2026-04-20</p>
            </header>

            <div className="bg-violet-600 text-white p-5 rounded-xl shadow-sm">
              <div className="text-xs font-bold text-violet-200 mb-1 uppercase tracking-wider">{step.title}</div>
              <p className="text-base font-medium leading-relaxed">{step.desc}</p>
            </div>

            <BrowserSimulation key={step.type} step={step} />

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex items-center justify-between">
              <div className="flex items-center space-x-2">
                <button onClick={() => { if(idx>0){setIdx(p=>p-1);setIsPlaying(false);} }} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={() => { if(isEnd) setIdx(0); setIsPlaying(p=>!p); }} className="px-4 py-2 rounded bg-violet-600 hover:bg-violet-700 text-white font-medium transition w-32 text-center">{isPlaying ? '정지' : '자동 실행'}</button>
                <button onClick={() => { next(); setIsPlaying(false); }} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step {idx+1} / {STEPS.length}</div>
            </div>

            <div className="bg-white border border-slate-200 rounded-xl p-4 text-xs text-slate-500 space-y-1">
              <div className="font-bold text-slate-700 mb-2">기술 참고</div>
              <div><b>CSR (Client-Side Rendering)</b>: SPA의 기본 방식. 브라우저에서 JS가 화면을 그린다.</div>
              <div><b>SSR (Server-Side Rendering)</b>: 서버에서 HTML을 미리 만들어 보내는 방식. SEO와 초기 속도에 유리하다.</div>
              <div><b>Next.js</b>: SPA의 부드러운 전환 + SSR의 SEO 장점을 합친 하이브리드 프레임워크.</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
