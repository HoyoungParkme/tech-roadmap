<body>
  <div id="root"></div>

  <!--
    ─────────────────────────────────────────────────────────────
    React Chapter IV-1-3 — useEffect 생명주기 시각화
    ─────────────────────────────────────────────────────────────
    학습 목표 : 의존성 배열 3가지 모드([], [count], 생략)에서
               useEffect의 실행·cleanup 시점을 단계별로 체험한다.
    조작법   : 모드 선택 → 마운트/+1/언마운트/리셋 버튼으로 시나리오 진행.
               자동 재생·이전/다음 버튼으로 수동 전환도 가능.

    [참고] 이 시각화 페이지 자체도 React로 동작한다.
    ─────────────────────────────────────────────────────────────
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // =========================================================
    // 1. 모드별 useEffect 코드 템플릿
    // =========================================================
    const CODE_TEMPLATES = {
      EMPTY_DEPS: [
        "import { useEffect, useState } from 'react';",
        "",
        "function Counter() {",
        "  const [count, setCount] = useState(0);",
        "",
        "  useEffect(() => {",
        "    console.log('effect 실행', count);",
        "",
        "    return () => {",
        "      console.log('cleanup 실행');",
        "    };",
        "  }, []); // ← 빈 배열: 마운트 시 1회만",
        "",
        "  return (",
        "    <button onClick={() => setCount(c => c + 1)}>",
        "      count: {count}",
        "    </button>",
        "  );",
        "}",
      ],
      WITH_DEPS: [
        "import { useEffect, useState } from 'react';",
        "",
        "function Counter() {",
        "  const [count, setCount] = useState(0);",
        "",
        "  useEffect(() => {",
        "    console.log('effect 실행', count);",
        "",
        "    return () => {",
        "      console.log('cleanup 실행');",
        "    };",
        "  }, [count]); // ← count 변경 시마다 재실행",
        "",
        "  return (",
        "    <button onClick={() => setCount(c => c + 1)}>",
        "      count: {count}",
        "    </button>",
        "  );",
        "}",
      ],
      NO_DEPS: [
        "import { useEffect, useState } from 'react';",
        "",
        "function Counter() {",
        "  const [count, setCount] = useState(0);",
        "",
        "  useEffect(() => {",
        "    console.log('effect 실행', count);",
        "",
        "    return () => {",
        "      console.log('cleanup 실행');",
        "    };",
        "  }); // ← 의존성 배열 없음: 모든 렌더에서 실행",
        "",
        "  return (",
        "    <button onClick={() => setCount(c => c + 1)}>",
        "      count: {count}",
        "    </button>",
        "  );",
        "}",
      ],
    };

    // =========================================================
    // 2. 모드별 STEPS 정의
    //    각 step: { id, codeLine, title, desc, dataObj?,
    //              strictModeWarning?, frameworkRowIdx? }
    // =========================================================
    const STEPS_BY_MODE = {
      WITH_DEPS: [
        // S0: 초기
        { id: 'IDLE', codeLine: -1, title: '대기', desc: '컴포넌트가 아직 마운트되지 않았습니다. "마운트" 버튼을 눌러 시작하세요.', dataObj: null, frameworkRowIdx: null },
        // MOUNT 시퀀스 (S1~S3)
        { id: 'MOUNT_VDOM', codeLine: 2, title: '컴포넌트 추가', desc: 'Virtual DOM에 Counter 노드를 생성합니다.', dataObj: { phase: 'mount', vdom: 'Counter 노드 생성' }, frameworkRowIdx: null },
        { id: 'MOUNT_RENDER', codeLine: 14, title: '첫 렌더', desc: 'JSX를 DOM으로 변환합니다. count = 0 상태로 화면에 그려집니다.', dataObj: { rendered: true, count: 0 }, frameworkRowIdx: null },
        { id: 'MOUNT_EFFECT', codeLine: 5, title: 'effect 실행', desc: '렌더 완료 후 useEffect 콜백이 실행됩니다. 의존성 배열 [count]의 초기값 [0]을 캡처합니다.', dataObj: { mounted: true, depsSnapshot: [0], cleanupRegistered: true }, strictModeWarning: true, frameworkRowIdx: 0 },
        // INCREMENT 시퀀스 (S4~S7)
        { id: 'INC_SCHEDULE', codeLine: 14, title: 'setState 예약', desc: 'setCount(c => c + 1) 호출. React가 업데이트를 예약합니다.', dataObj: { scheduled: 'setCount(0 + 1)' }, frameworkRowIdx: null },
        { id: 'INC_RENDER', codeLine: 14, title: '재렌더 (count=1)', desc: 'Counter 함수가 다시 실행되고 count = 1로 화면이 업데이트됩니다.', dataObj: { rendered: true, count: 1 }, frameworkRowIdx: null },
        { id: 'INC_CLEANUP', codeLine: 8, title: 'cleanup 실행', desc: '이전 effect의 정리 함수가 호출됩니다. 이전 deps [0]에 바인딩된 리소스를 정리합니다.', dataObj: { cleanupCalled: true, prevDeps: [0] }, frameworkRowIdx: 2 },
        { id: 'INC_EFFECT', codeLine: 5, title: '새 effect 실행', desc: '새로운 deps [1]로 effect가 다시 실행됩니다. count가 변경되었으므로 재실행됩니다.', dataObj: { newDeps: [1], reason: 'count 변경 감지' }, frameworkRowIdx: 1 },
        // UNMOUNT 시퀀스 (S8~S9)
        { id: 'UNMOUNT_CLEANUP', codeLine: 8, title: 'cleanup (언마운트)', desc: '컴포넌트가 사라지기 전 마지막 effect의 cleanup이 호출됩니다.', dataObj: { cleanupCalled: true, reason: 'unmount' }, frameworkRowIdx: 3 },
        { id: 'UNMOUNT_REMOVE', codeLine: -1, title: '컴포넌트 제거', desc: 'DOM에서 Counter가 제거되었습니다. 모든 리소스가 정리되었습니다.', dataObj: { removed: true }, frameworkRowIdx: null },
      ],
      EMPTY_DEPS: [
        // S0: 초기
        { id: 'IDLE', codeLine: -1, title: '대기', desc: '컴포넌트가 아직 마운트되지 않았습니다. "마운트" 버튼을 눌러 시작하세요.', dataObj: null, frameworkRowIdx: null },
        // MOUNT 시퀀스 (S1~S3)
        { id: 'MOUNT_VDOM', codeLine: 2, title: '컴포넌트 추가', desc: 'Virtual DOM에 Counter 노드를 생성합니다.', dataObj: { phase: 'mount', vdom: 'Counter 노드 생성' }, frameworkRowIdx: null },
        { id: 'MOUNT_RENDER', codeLine: 14, title: '첫 렌더', desc: 'JSX를 DOM으로 변환합니다. count = 0 상태로 화면에 그려집니다.', dataObj: { rendered: true, count: 0 }, frameworkRowIdx: null },
        { id: 'MOUNT_EFFECT', codeLine: 5, title: 'effect 실행', desc: '렌더 완료 후 useEffect 콜백이 실행됩니다. 빈 배열 []이므로 이후 재실행되지 않습니다.', dataObj: { mounted: true, depsSnapshot: [], cleanupRegistered: true }, strictModeWarning: true, frameworkRowIdx: 0 },
        // INCREMENT 시퀀스 (S4~S6)
        { id: 'INC_SCHEDULE', codeLine: 14, title: 'setState 예약', desc: 'setCount(c => c + 1) 호출. React가 업데이트를 예약합니다.', dataObj: { scheduled: 'setCount(0 + 1)' }, frameworkRowIdx: null },
        { id: 'INC_RENDER', codeLine: 14, title: '재렌더 (count=1)', desc: 'Counter 함수가 다시 실행되고 count = 1로 화면이 업데이트됩니다. 재렌더는 발생합니다.', dataObj: { rendered: true, count: 1 }, frameworkRowIdx: null },
        { id: 'INC_SKIP', codeLine: 11, title: 'effect 재실행 안 됨', desc: '의존성 배열이 빈 배열([])이라 effect는 마운트 시 1회만 실행됩니다. 재렌더는 발생했지만 effect는 건너뜁니다.', dataObj: { effectSkipped: true, reason: '빈 deps — 마운트 1회만', count: 1 }, frameworkRowIdx: null },
        // UNMOUNT 시퀀스 (S6~S7)
        { id: 'UNMOUNT_CLEANUP', codeLine: 8, title: 'cleanup (언마운트)', desc: '컴포넌트가 사라지기 전 마지막 effect의 cleanup이 호출됩니다.', dataObj: { cleanupCalled: true, reason: 'unmount' }, frameworkRowIdx: 3 },
        { id: 'UNMOUNT_REMOVE', codeLine: -1, title: '컴포넌트 제거', desc: 'DOM에서 Counter가 제거되었습니다.', dataObj: { removed: true }, frameworkRowIdx: null },
      ],
      NO_DEPS: [
        // S0: 초기
        { id: 'IDLE', codeLine: -1, title: '대기', desc: '컴포넌트가 아직 마운트되지 않았습니다. "마운트" 버튼을 눌러 시작하세요.', dataObj: null, frameworkRowIdx: null },
        // MOUNT 시퀀스 (S1~S3)
        { id: 'MOUNT_VDOM', codeLine: 2, title: '컴포넌트 추가', desc: 'Virtual DOM에 Counter 노드를 생성합니다.', dataObj: { phase: 'mount', vdom: 'Counter 노드 생성' }, frameworkRowIdx: null },
        { id: 'MOUNT_RENDER', codeLine: 14, title: '첫 렌더', desc: 'JSX를 DOM으로 변환합니다. count = 0 상태로 화면에 그려집니다.', dataObj: { rendered: true, count: 0 }, frameworkRowIdx: null },
        { id: 'MOUNT_EFFECT', codeLine: 5, title: 'effect 실행', desc: '렌더 완료 후 useEffect 콜백이 실행됩니다. 의존성 배열이 없으므로 모든 렌더마다 실행됩니다.', dataObj: { mounted: true, cleanupRegistered: true }, strictModeWarning: true, frameworkRowIdx: 0 },
        // INCREMENT 시퀀스 (S4~S7)
        { id: 'INC_SCHEDULE', codeLine: 14, title: 'setState 예약', desc: 'setCount(c => c + 1) 호출. React가 업데이트를 예약합니다.', dataObj: { scheduled: 'setCount(0 + 1)' }, frameworkRowIdx: null },
        { id: 'INC_RENDER', codeLine: 14, title: '재렌더 (count=1)', desc: 'Counter 함수가 다시 실행되고 count = 1로 화면이 업데이트됩니다.', dataObj: { rendered: true, count: 1 }, frameworkRowIdx: null },
        { id: 'INC_CLEANUP', codeLine: 8, title: 'cleanup 실행', desc: '의존성 배열이 없어 매 렌더마다 이전 effect의 cleanup이 호출됩니다.', dataObj: { cleanupCalled: true, prevRender: 'count=0' }, frameworkRowIdx: 2 },
        { id: 'INC_EFFECT', codeLine: 5, title: '새 effect 실행', desc: '의존성 배열이 없어 매 렌더마다 effect가 다시 실행됩니다. 보통 안티패턴입니다.', dataObj: { rerun: true, count: 1, reason: '모든 렌더에서 실행' }, frameworkRowIdx: 1 },
        // UNMOUNT 시퀀스 (S8~S9)
        { id: 'UNMOUNT_CLEANUP', codeLine: 8, title: 'cleanup (언마운트)', desc: '컴포넌트가 사라지기 전 마지막 effect의 cleanup이 호출됩니다.', dataObj: { cleanupCalled: true, reason: 'unmount' }, frameworkRowIdx: 3 },
        { id: 'UNMOUNT_REMOVE', codeLine: -1, title: '컴포넌트 제거', desc: 'DOM에서 Counter가 제거되었습니다.', dataObj: { removed: true }, frameworkRowIdx: null },
      ],
    };

    // 액션 → 시작 stepIdx 매핑 (findIndex로 산출)
    const getActionStart = (mode) => {
      const steps = STEPS_BY_MODE[mode];
      return {
        MOUNT: steps.findIndex(s => s.id === 'MOUNT_VDOM'),
        INCREMENT: steps.findIndex(s => s.id === 'INC_SCHEDULE'),
        UNMOUNT: steps.findIndex(s => s.id === 'UNMOUNT_CLEANUP'),
      };
    };

    // 각 액션 시퀀스의 마지막 step 인덱스
    const getActionEnd = (mode) => {
      const steps = STEPS_BY_MODE[mode];
      const mountEnd = steps.findIndex(s => s.id === 'MOUNT_EFFECT');
      const incEnd = mode === 'EMPTY_DEPS'
        ? steps.findIndex(s => s.id === 'INC_SKIP')
        : steps.findIndex(s => s.id === 'INC_EFFECT');
      const unmountEnd = steps.findIndex(s => s.id === 'UNMOUNT_REMOVE');
      return { MOUNT: mountEnd, INCREMENT: incEnd, UNMOUNT: unmountEnd };
    };

    // =========================================================
    // 3. 다른 프레임워크 비교 데이터
    // =========================================================
    const FRAMEWORK_COMPARISON = [
      {
        reactPhase: '마운트 시 effect 실행',
        vueOptions: 'mounted()',
        vueComposition: 'onMounted()',
        angular: 'ngOnInit()',
        note: 'Vue/Angular는 명시적 라이프사이클 메서드, React는 useEffect의 deps 동작으로 표현',
      },
      {
        reactPhase: 'deps 변경 시 effect 재실행',
        vueOptions: 'watch: { count(newVal, oldVal) {} }',
        vueComposition: 'watch(count, (newVal, oldVal, onCleanup) => {})',
        angular: 'ngOnChanges() — @Input 한정',
        note: 'React는 return 함수로 cleanup 등록. Vue watch/watchEffect도 onCleanup(fn) 인자로 동일 기능 제공 — 인터페이스 차이만 있고 cleanup 개념은 양쪽 모두 존재. Angular ngOnChanges는 @Input 변경에만 반응하므로 컴포넌트 내부 state 변경 감지는 ngDoCheck 또는 RxJS 사용 필요.',
      },
      {
        reactPhase: 'cleanup (effect 정리)',
        vueOptions: 'beforeUnmount() (Vue 3) / beforeDestroy() (Vue 2)',
        vueComposition: 'onBeforeUnmount() + watch 콜백의 onCleanup(fn)',
        angular: 'ngOnDestroy()',
        note: 'React는 effect별 cleanup 등록 가능 → 더 세밀한 정리. Vue Composition API도 watch별 onCleanup으로 effect별 정리 가능.',
      },
      {
        reactPhase: '언마운트 시 cleanup',
        vueOptions: 'unmounted() (Vue 3) / destroyed() (Vue 2)',
        vueComposition: 'onUnmounted()',
        angular: 'ngOnDestroy()',
        note: 'React는 마지막 effect의 cleanup이 자동 호출. Vue/Angular는 컴포넌트 단위 훅',
      },
    ];

    // =========================================================
    // 4. JSX 구문 강조 헬퍼 (IV-1-1과 동일)
    // =========================================================
    const KEYWORDS = new Set([
      'import', 'export', 'default', 'function', 'const', 'return',
      'useState', 'useEffect',
    ]);
    const JSX_TAG_PATTERN = /^(<\/?\w[\w.]*\/?>|<>|<\/>|\/>)$/;
    const STRING_CONTENT_PATTERN = /^'[^']*'$/;
    const NUMBER_PATTERN = /^\d+$/;

    const highlightLine = (line) => {
      const commentIdx = line.indexOf('//');
      let codePart = line;
      let commentPart = '';
      if (commentIdx !== -1) {
        const beforeComment = line.slice(0, commentIdx);
        const quotesBefore = (beforeComment.match(/'/g) || []).length;
        if (quotesBefore % 2 === 0) {
          codePart = beforeComment;
          commentPart = line.slice(commentIdx);
        }
      }

      if (!codePart.trim() && commentPart) {
        return <span className="text-slate-500 italic">{commentPart}</span>;
      }

      const tokens = codePart.split(/(\s+|[{}()\[\]<>/,;=+!?:"|'`])/g);

      const highlightedTokens = tokens.map((token, i) => {
        if (!token) return null;
        if (KEYWORDS.has(token)) {
          return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        }
        if (JSX_TAG_PATTERN.test(token)) {
          return <span key={i} className="text-sky-400 font-semibold">{token}</span>;
        }
        if (STRING_CONTENT_PATTERN.test(token)) {
          return <span key={i} className="text-emerald-400">{token}</span>;
        }
        if (NUMBER_PATTERN.test(token)) {
          return <span key={i} className="text-orange-300">{token}</span>;
        }
        if (token === '{' || token === '}') {
          return <span key={i} className="text-yellow-300">{token}</span>;
        }
        return <span key={i} className="text-slate-200">{token}</span>;
      });

      return (
        <>
          {highlightedTokens}
          {commentPart && <span className="text-slate-500 italic">{commentPart}</span>}
        </>
      );
    };

    // =========================================================
    // 5. 컴포넌트 정의
    // =========================================================

    // --- Header ---
    function Header() {
      return (
        <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
          <div className="flex items-center gap-3 mb-2">
            <div className="w-9 h-9 bg-sky-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">R</div>
            <h1 className="text-2xl font-bold text-slate-800">useEffect 생명주기 시각화</h1>
          </div>
          <p className="text-slate-600 text-sm leading-relaxed">
            의존성 배열 <b>3가지 모드</b>에서 useEffect의 실행·cleanup 시점이 어떻게 달라지는지
            단계별 시뮬레이션으로 비교합니다.
          </p>
          <p className="mt-2 text-[11px] text-slate-400 italic">
            Chapter IV-1-3 | React 18 + Hooks 기준 | 2026-04-20
          </p>
        </header>
      );
    }

    // --- ModeSelector ---
    function ModeSelector({ mode, onChange }) {
      const modes = [
        { value: 'EMPTY_DEPS', label: 'useEffect(() => {}, [])', short: '빈 배열', desc: '마운트 시 1회만' },
        { value: 'WITH_DEPS', label: 'useEffect(() => {}, [count])', short: '[count]', desc: 'count 변경 시마다' },
        { value: 'NO_DEPS', label: 'useEffect(() => {})', short: '생략', desc: '모든 렌더에서 실행' },
      ];

      return (
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
          <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">의존성 배열 모드</div>
          <div className="flex flex-wrap gap-2">
            {modes.map(m => (
              <button
                key={m.value}
                onClick={() => onChange(m.value)}
                className={`flex-1 min-w-[140px] px-3 py-3 rounded-lg border-2 text-left transition-all ${
                  mode === m.value
                    ? 'border-sky-500 bg-sky-50 shadow-sm'
                    : 'border-slate-200 bg-white hover:border-slate-300'
                }`}
              >
                <div className={`text-xs font-bold mb-1 ${mode === m.value ? 'text-sky-700' : 'text-slate-600'}`}>
                  {m.short}
                </div>
                <div className="text-[10px] font-mono text-slate-500 mb-1 truncate">{m.label}</div>
                <div className="text-[10px] text-slate-400">{m.desc}</div>
              </button>
            ))}
          </div>
        </div>
      );
    }

    // --- StepDescription ---
    function StepDescription({ step }) {
      if (!step) return null;

      return (
        <div className="bg-sky-700 text-white p-5 rounded-xl shadow-sm border border-sky-800 min-h-[90px] flex flex-col justify-center">
          {step.strictModeWarning && (
            <div className="bg-amber-500/90 text-amber-50 text-xs px-3 py-2 rounded-lg mb-3 leading-relaxed">
              <span className="font-bold">Strict Mode 주의:</span> React 18 개발 환경(Strict Mode)에서는 이 단계가 2회 실행됩니다. cleanup이 올바르게 작동하는지 확인하기 위한 의도적 동작이며, 프로덕션 빌드에서는 1회만 실행됩니다.
            </div>
          )}
          <div className="text-xs font-bold text-sky-200 mb-1 uppercase tracking-wider">
            {step.title}
          </div>
          <p className="text-base font-medium leading-relaxed">{step.desc}</p>
        </div>
      );
    }

    // --- LifecycleTimeline ---
    function LifecycleTimeline({ steps, currentIdx, mode }) {
      // 표시할 고유 단계 노드들 (IDLE 제외)
      const nodes = steps.filter(s => s.id !== 'IDLE').map((s, i) => {
        const realIdx = steps.indexOf(s);
        let state = 'pending';
        if (realIdx < currentIdx) state = 'done';
        if (realIdx === currentIdx) state = 'active';
        return { ...s, state, realIdx };
      });

      const getNodeStyle = (state) => {
        if (state === 'active') return 'bg-sky-100 border-sky-500 text-sky-800 ring-2 ring-sky-300 shadow-md scale-105';
        if (state === 'done') return 'bg-emerald-50 border-emerald-400 text-emerald-700';
        return 'bg-white border-slate-200 text-slate-400';
      };

      return (
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 overflow-x-auto">
          <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">라이프사이클 타임라인</h3>
          <div className="flex items-center gap-1 min-w-max">
            {nodes.map((node, i) => (
              <div key={node.id} className="flex items-center gap-1">
                <div className={`px-2 py-1.5 rounded-md border-2 text-center min-w-[70px] transition-all duration-300 ${getNodeStyle(node.state)}`}>
                  <div className="text-[9px] font-bold leading-tight whitespace-nowrap">{node.title}</div>
                  {node.state === 'active' && (
                    <div className="mt-0.5 text-[8px] bg-sky-500 text-white px-1 py-0.5 rounded-full">진행 중</div>
                  )}
                  {node.state === 'done' && (
                    <div className="mt-0.5 text-[8px] bg-emerald-500 text-white px-1 py-0.5 rounded-full">완료</div>
                  )}
                </div>
                {i < nodes.length - 1 && (
                  <span className="text-slate-300 text-sm select-none">&rarr;</span>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // --- ComponentCard ---
    function ComponentCard({ phase, count, stepId }) {
      const isMounting = phase === 'MOUNTED' && (stepId === 'MOUNT_VDOM' || stepId === 'MOUNT_RENDER');
      const isEffect  = ['MOUNT_EFFECT', 'INC_EFFECT'].includes(stepId);
      const isCleanup = ['INC_CLEANUP', 'UNMOUNT_CLEANUP'].includes(stepId);

      if (phase === 'IDLE' || isMounting) {
        return (
          <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
            <div className="text-xs text-slate-400 uppercase tracking-wider mb-3 font-bold">Counter 컴포넌트</div>
            <div className="border-2 border-dashed border-slate-600 rounded-lg p-6 text-center">
              <p className="text-slate-500 text-sm">컴포넌트가 아직 마운트되지 않았습니다</p>
            </div>
          </div>
        );
      }

      if (phase === 'UNMOUNTED') {
        return (
          <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
            <div className="text-xs text-slate-400 uppercase tracking-wider mb-3 font-bold">Counter 컴포넌트</div>
            <div className="bg-slate-700 rounded-lg p-6 text-center">
              <p className="text-slate-500 text-sm">언마운트됨</p>
            </div>
          </div>
        );
      }

      return (
        <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
          <div className="text-xs text-slate-400 uppercase tracking-wider mb-3 font-bold">Counter 컴포넌트</div>
          <div className="relative bg-white rounded-lg p-4 text-center transition-all duration-500">
            {isEffect && (
              <span className="absolute top-2 right-2 bg-sky-500 text-white text-[9px] px-2 py-0.5 rounded-full animate-pulse">effect</span>
            )}
            {isCleanup && (
              <span className="absolute top-2 right-2 bg-amber-500 text-white text-[9px] px-2 py-0.5 rounded-full animate-pulse">cleanup</span>
            )}
            <p className="text-2xl font-bold mb-3 text-slate-800">
              count: {count}
            </p>
            <button className="px-4 py-2 rounded font-medium bg-slate-100 text-slate-600">
              +1 클릭
            </button>
          </div>
        </div>
      );
    }

    // --- DataSnapshot ---
    function DataSnapshot({ data }) {
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="text-xs text-slate-400 uppercase tracking-wider mb-2 font-bold">데이터 / 상태 스냅샷</div>
          <div className="font-mono text-emerald-400 text-sm whitespace-pre-wrap">
            {data ? JSON.stringify(data, null, 2) : '—'}
          </div>
        </div>
      );
    }

    // --- ActionButtons ---
    function ActionButtons({ phase, mode, stepIdx, steps, onAction, isPlaying, onTogglePlay, onPrev, onNext }) {
      const isIdle = phase === 'IDLE';
      const isMounted = phase === 'MOUNTED';
      const isUnmounted = phase === 'UNMOUNTED';
      const isEnd = stepIdx === steps.length - 1;

      return (
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 space-y-3">
          {/* 시나리오 액션 */}
          <div className="flex flex-wrap gap-2">
            <button
              onClick={() => onAction('MOUNT')}
              disabled={!isIdle}
              className="px-4 py-2 rounded-lg font-medium transition bg-emerald-600 hover:bg-emerald-700 text-white disabled:opacity-40 disabled:cursor-not-allowed"
            >
              마운트
            </button>
            <button
              onClick={() => onAction('INCREMENT')}
              disabled={!isMounted || isPlaying}
              className="px-4 py-2 rounded-lg font-medium transition bg-sky-600 hover:bg-sky-700 text-white disabled:opacity-40 disabled:cursor-not-allowed"
            >
              count + 1
            </button>
            <button
              onClick={() => onAction('UNMOUNT')}
              disabled={!isMounted || isPlaying}
              className="px-4 py-2 rounded-lg font-medium transition bg-red-600 hover:bg-red-700 text-white disabled:opacity-40 disabled:cursor-not-allowed"
            >
              언마운트
            </button>
            <button
              onClick={() => onAction('RESET')}
              className="px-4 py-2 rounded-lg font-medium transition bg-slate-200 hover:bg-slate-300 text-slate-700"
            >
              리셋
            </button>
          </div>

          {/* 재생 컨트롤 */}
          <div className="flex items-center justify-between">
            <div className="flex items-center space-x-2">
              <button
                aria-label="이전 단계"
                onClick={onPrev}
                disabled={stepIdx === 0}
                className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 transition"
              >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true">
                  <path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/>
                </svg>
              </button>
              <button
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                onClick={onTogglePlay}
                disabled={isIdle || isEnd}
                className="flex items-center px-3 py-2 rounded bg-sky-600 hover:bg-sky-700 text-white font-medium transition shadow-sm disabled:opacity-40 w-24 justify-center text-sm"
              >
                {isPlaying ? '정지' : '자동'}
              </button>
              <button
                aria-label="다음 단계"
                onClick={onNext}
                disabled={isEnd}
                className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 transition"
              >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true">
                  <path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/>
                </svg>
              </button>
            </div>
            <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
              Step {stepIdx + 1} / {steps.length}
            </div>
          </div>
        </div>
      );
    }

    // --- CodeViewer ---
    function CodeViewer({ code, activeCodeLine }) {
      return (
        <div className="relative min-h-[420px] lg:min-h-0 rounded-xl shadow-sm border border-slate-800 overflow-hidden">
          <div className="lg:absolute lg:inset-0 w-full h-full bg-slate-900 flex flex-col">
            <div className="flex items-center gap-2 px-4 py-2 bg-slate-800 border-b border-slate-700">
              <div className="flex gap-1.5">
                <div className="w-3 h-3 rounded-full bg-red-500 opacity-70"></div>
                <div className="w-3 h-3 rounded-full bg-yellow-400 opacity-70"></div>
                <div className="w-3 h-3 rounded-full bg-emerald-500 opacity-70"></div>
              </div>
              <span className="text-xs text-slate-400 font-mono ml-2">Counter.jsx</span>
            </div>
            <div className="p-4 overflow-y-auto flex-1 text-sm font-mono text-slate-300 scroll-smooth leading-relaxed">
              {code.map((line, idx) => {
                const isActive = activeCodeLine === idx;
                return (
                  <div
                    key={idx}
                    className={`flex px-2 py-0.5 rounded transition-colors duration-300 ${
                      isActive
                        ? 'bg-sky-900/60 text-white font-bold border-l-4 border-sky-400 shadow-inner'
                        : 'border-l-4 border-transparent'
                    }`}
                  >
                    <span className="text-slate-600 select-none mr-4 w-5 text-right inline-block shrink-0 tabular-nums">
                      {idx + 1}
                    </span>
                    <span className="whitespace-pre">{line ? highlightLine(line) : ' '}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // --- FrameworkComparison ---
    function FrameworkComparison({ stepData, open, onToggle }) {
      const activeRowIdx = stepData ? stepData.frameworkRowIdx : null;

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
          <button
            onClick={onToggle}
            className="w-full text-left px-5 py-4 flex items-center justify-between hover:bg-slate-50 transition"
          >
            <span className="text-sm font-bold text-slate-700">다른 프레임워크에서는?</span>
            <span className={`text-slate-400 transition-transform ${open ? 'rotate-180' : ''}`}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </span>
          </button>

          {open && (
            <div className="px-5 pb-5 overflow-x-auto">
              <table className="w-full text-xs border-collapse">
                <thead>
                  <tr className="bg-slate-50">
                    <th className="px-3 py-2 text-left font-bold text-slate-600 border-b">React (useEffect)</th>
                    <th className="px-3 py-2 text-left font-bold text-slate-600 border-b">Vue Options API</th>
                    <th className="px-3 py-2 text-left font-bold text-slate-600 border-b">Vue Composition API</th>
                    <th className="px-3 py-2 text-left font-bold text-slate-600 border-b">Angular</th>
                  </tr>
                </thead>
                <tbody>
                  {FRAMEWORK_COMPARISON.map((row, idx) => (
                    <tr
                      key={idx}
                      className={`border-b transition-colors ${
                        activeRowIdx === idx
                          ? 'bg-sky-50 border-sky-200'
                          : 'hover:bg-slate-50'
                      }`}
                    >
                      <td className="px-3 py-2 font-medium text-slate-800">{row.reactPhase}</td>
                      <td className="px-3 py-2 font-mono text-slate-600">{row.vueOptions}</td>
                      <td className="px-3 py-2 font-mono text-slate-600">{row.vueComposition}</td>
                      <td className="px-3 py-2 font-mono text-slate-600">{row.angular}</td>
                    </tr>
                  ))}
                </tbody>
              </table>

              {/* 현재 단계에 해당하는 note 표시 */}
              {activeRowIdx !== null && activeRowIdx !== undefined && FRAMEWORK_COMPARISON[activeRowIdx] && (
                <div className="mt-3 p-3 bg-sky-50 rounded-lg text-xs text-slate-600 leading-relaxed border border-sky-100">
                  <span className="font-bold text-sky-700">현재 단계 비교: </span>
                  {FRAMEWORK_COMPARISON[activeRowIdx].note}
                </div>
              )}

              {(activeRowIdx === null || activeRowIdx === undefined) && (
                <div className="mt-3 p-3 bg-slate-50 rounded-lg text-xs text-slate-500 leading-relaxed">
                  시각화 단계를 진행하면 해당하는 프레임워크 비교 행이 강조됩니다.
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // --- TechNote ---
    function TechNote() {
      return (
        <div className="bg-white border border-slate-200 rounded-xl p-4 text-xs text-slate-500 space-y-1">
          <div className="font-bold text-slate-700 mb-2">기술 참고 (React 18 기준)</div>
          <div>
            <b>useEffect 실행 시점</b>: 렌더 결과가 DOM에 커밋된 직후(paint 이후) 비동기로 실행된다.
            동기 실행이 필요하면 useLayoutEffect를 사용한다.
          </div>
          <div>
            <b>Strict Mode와 2회 실행</b>: 개발 환경에서 React 18 Strict Mode는 마운트 시 effect를 한 번 실행하고,
            즉시 cleanup한 뒤 다시 실행한다. cleanup이 올바르게 구현되었는지 검증하기 위한 의도적 동작이다.
            프로덕션 빌드에서는 1회만 실행된다.
          </div>
          <div>
            <b>cleanup 순서</b>: 재실행 시 이전 effect의 cleanup이 먼저 호출된 후
            새 effect가 실행된다. 언마운트 시에도 마지막 effect의 cleanup이 호출된다.
          </div>
        </div>
      );
    }

    // =========================================================
    // 6. 메인 App 컴포넌트
    // =========================================================
    function App() {
      const [mode, setMode] = useState('WITH_DEPS');
      const [stepIdx, setStepIdx] = useState(0);
      const [phase, setPhase] = useState('IDLE');       // 'IDLE' | 'MOUNTED' | 'UNMOUNTED'
      const [count, setCount] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [comparisonOpen, setComparisonOpen] = useState(false);
      const playIntervalRef = useRef(null);

      const steps = STEPS_BY_MODE[mode];
      const currentStep = steps[stepIdx];
      const code = CODE_TEMPLATES[mode];
      const actionStart = getActionStart(mode);
      const actionEnd = getActionEnd(mode);

      // 현재 액션 시퀀스 끝 감지 (자동 재생 정지용)
      const currentSequenceEnd = (() => {
        if (stepIdx >= actionStart.UNMOUNT) return actionEnd.UNMOUNT;
        if (stepIdx >= actionStart.INCREMENT) return actionEnd.INCREMENT;
        if (stepIdx >= actionStart.MOUNT) return actionEnd.MOUNT;
        return 0;
      })();

      // 자동 재생
      const handleNext = () => {
        setStepIdx(prev => {
          const next = prev + 1;
          if (next > currentSequenceEnd) {
            setIsPlaying(false);
            return prev;
          }
          if (next >= steps.length) {
            setIsPlaying(false);
            return prev;
          }
          return next;
        });
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 2500);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      // 모드 변경
      const handleModeChange = (newMode) => {
        setMode(newMode);
        setStepIdx(0);
        setCount(0);
        setPhase('IDLE');
        setIsPlaying(false);
      };

      // 액션 핸들러
      const handleAction = (action) => {
        const start = getActionStart(mode);
        switch (action) {
          case 'MOUNT':
            setStepIdx(start.MOUNT);
            setPhase('MOUNTED');
            break;
          case 'INCREMENT':
            setCount(c => c + 1);
            setStepIdx(start.INCREMENT);
            break;
          case 'UNMOUNT':
            setStepIdx(start.UNMOUNT);
            setPhase('UNMOUNTED');
            break;
          case 'RESET':
            setStepIdx(0);
            setCount(0);
            setPhase('IDLE');
            setIsPlaying(false);
            break;
        }
      };

      const handlePrev = () => {
        if (stepIdx > 0) {
          setStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const handleManualNext = () => {
        if (stepIdx < steps.length - 1) {
          setStepIdx(prev => prev + 1);
          setIsPlaying(false);
        }
      };

      const togglePlay = () => {
        setIsPlaying(prev => !prev);
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 목차로 돌아가기 */}
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition mb-[-8px]">
              &larr; 목차로
            </a>

            <Header />

            <ModeSelector mode={mode} onChange={handleModeChange} />

            <StepDescription step={currentStep} />

            <LifecycleTimeline steps={steps} currentIdx={stepIdx} mode={mode} />

            {/* 좌우 레이아웃 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5 items-stretch">

              {/* 왼쪽: 컴포넌트 카드 + 데이터 스냅샷 + 액션 버튼 */}
              <div className="flex flex-col space-y-4">
                <ComponentCard phase={phase} count={count} stepId={currentStep ? currentStep.id : null} />
                <DataSnapshot data={currentStep ? currentStep.dataObj : null} />
                <ActionButtons
                  phase={phase}
                  mode={mode}
                  stepIdx={stepIdx}
                  steps={steps}
                  onAction={handleAction}
                  isPlaying={isPlaying}
                  onTogglePlay={togglePlay}
                  onPrev={handlePrev}
                  onNext={handleManualNext}
                />
              </div>

              {/* 오른쪽: 코드 뷰어 */}
              <CodeViewer code={code} activeCodeLine={currentStep ? currentStep.codeLine : -1} />

            </div>

            <FrameworkComparison
              stepData={currentStep}
              open={comparisonOpen}
              onToggle={() => setComparisonOpen(prev => !prev)}
            />

            <TechNote />

          </div>
        </div>
      );
    }

    // =========================================================
    // 7. 마운트
    // =========================================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
