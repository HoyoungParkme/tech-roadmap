<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로젝트 설계 — 폴더 구조와 컴포넌트 분해 — Chapter VI-1-1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter VI-1-1 — 프로젝트 설계: 폴더 구조와 컴포넌트 분해 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        id: 'step-growth',
        title: 'Step 1 — 앱이 커지면 폴더 구조가 중요해지는 이유',
        desc: '파일이 10개일 때는 아무 구조나 괜찮습니다. 하지만 100개가 넘어가면 "이 컴포넌트 어디 있지?"를 찾는 시간이 개발 시간보다 길어집니다. 비유하면 서랍 하나에 모든 옷을 넣은 것(파일 10개)과 옷장을 방 여러 개로 분리한 것(파일 100개)의 차이입니다.',
        code: '// 파일 10개: 한 폴더에 다 넣어도 OK\nsrc/\n  App.jsx\n  Header.jsx\n  Button.jsx\n  utils.js\n\n// 파일 100개: 구조 없으면 카오스\nsrc/\n  App.jsx\n  Header.jsx\n  HeaderNav.jsx\n  HeaderLogo.jsx\n  Button.jsx\n  ButtonPrimary.jsx\n  ButtonSecondary.jsx\n  useAuth.js\n  useCart.js\n  useProducts.js\n  api.js\n  apiAuth.js\n  apiProducts.js\n  ... (90개 더)',
        visual: 'growth',
      },
      {
        id: 'step-type',
        title: 'Step 2 — type 중심 구조',
        desc: '"역할별로 분류" 방식입니다. 컴포넌트는 components/, 훅은 hooks/, 페이지는 pages/에 넣습니다. React 공식 문서에서도 언급하는 가장 전통적인 방식이며, 소규모~중규모 프로젝트에 적합합니다.',
        code: 'src/\n├── components/\n│   ├── Button.jsx\n│   ├── Header.jsx\n│   ├── Modal.jsx\n│   └── Card.jsx\n├── hooks/\n│   ├── useAuth.js\n│   ├── useCart.js\n│   └── useLocalStorage.js\n├── pages/\n│   ├── Home.jsx\n│   ├── Login.jsx\n│   └── ProductList.jsx\n├── utils/\n│   ├── formatDate.js\n│   └── validation.js\n└── App.jsx',
        visual: 'type-structure',
      },
      {
        id: 'step-feature',
        title: 'Step 3 — feature 중심 구조',
        desc: '"기능별로 분류" 방식입니다. 인증 관련 파일은 features/auth/에, 장바구니는 features/cart/에 모읍니다. 한 기능을 수정할 때 관련 파일이 모두 같은 폴더에 있어 탐색 시간이 줄어듭니다. 대규모 프로젝트에 적합합니다.',
        code: 'src/\n├── features/\n│   ├── auth/\n│   │   ├── LoginForm.jsx\n│   │   ├── SignupForm.jsx\n│   │   ├── useAuth.js\n│   │   └── authApi.js\n│   ├── cart/\n│   │   ├── CartList.jsx\n│   │   ├── CartItem.jsx\n│   │   ├── useCart.js\n│   │   └── cartApi.js\n│   └── products/\n│       ├── ProductList.jsx\n│       ├── ProductCard.jsx\n│       ├── useProducts.js\n│       └── productsApi.js\n├── shared/\n│   ├── Button.jsx\n│   └── Modal.jsx\n└── App.jsx',
        visual: 'feature-structure',
      },
      {
        id: 'step-pattern',
        title: 'Step 4 — Presentational vs Container 패턴',
        desc: 'Presentational 컴포넌트는 UI만 담당합니다. props를 받아 화면을 그릴 뿐, 데이터를 어디서 가져오는지 모릅니다. Container 컴포넌트는 데이터 페치와 상태 관리를 담당하고, 결과를 Presentational에 전달합니다. 현대 React에서는 커스텀 훅이 Container 역할을 대체하기도 합니다.',
        code: '// Presentational: UI만 (props로 동작)\nfunction UserCard({ name, email, avatar }) {\n  return (\n    <div className="card">\n      <img src={avatar} alt={name} />\n      <h3>{name}</h3>\n      <p>{email}</p>\n    </div>\n  );\n}\n\n// Container: 데이터 + 로직\nfunction UserCardContainer({ userId }) {\n  const [user, setUser] = useState(null);\n\n  useEffect(() => {\n    fetch(`/api/users/${userId}`)\n      .then(r => r.json())\n      .then(setUser);\n  }, [userId]);\n\n  if (!user) return <p>로딩...</p>;\n  return <UserCard {...user} />;\n}',
        visual: 'pattern',
      },
      {
        id: 'step-guide',
        title: 'Step 5 — 규모별 추천 가이드',
        desc: '정답은 없지만, 프로젝트 규모에 따라 일반적으로 추천되는 구조가 있습니다. 아래에서 규모를 선택하면 추천 폴더 구조를 확인할 수 있습니다. 핵심 원칙: "파일을 찾는 데 5초 이상 걸리면 구조를 바꿔야 할 때"입니다.',
        code: null,
        visual: 'guide',
      },
    ];

    /* ── 시각화 컴포넌트들 ── */

    const BG_CLASSES = {
      small: 'bg-emerald-50 border-emerald-200',
      medium: 'bg-amber-50 border-amber-200',
      large: 'bg-rose-50 border-rose-200',
      active: 'bg-rose-100 border-rose-400',
      inactive: 'bg-slate-50 border-slate-200',
    };

    function GrowthVisual() {
      const [showLarge, setShowLarge] = useState(false);

      useEffect(() => {
        const timer = setInterval(() => setShowLarge(p => !p), 2500);
        return () => clearInterval(timer);
      }, []);

      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">파일 개수에 따른 혼란도</div>
          <div className="flex gap-4 items-end justify-center">
            <div className="text-center">
              <div className={`rounded-xl border-2 p-3 transition-all ${!showLarge ? 'border-rose-400 scale-105' : 'border-slate-200'}`}>
                <div className="text-2xl mb-1">🗂️</div>
                <div className="grid grid-cols-3 gap-1">
                  {Array.from({ length: 9 }).map((_, i) => (
                    <div key={`small-${i}`} className="w-4 h-4 bg-emerald-200 rounded-sm"></div>
                  ))}
                </div>
              </div>
              <div className="text-[10px] font-bold text-slate-600 mt-2">10개 파일</div>
              <div className="text-[9px] text-emerald-600">서랍 하나로 충분</div>
            </div>
            <div className="text-lg text-slate-300">→</div>
            <div className="text-center">
              <div className={`rounded-xl border-2 p-3 transition-all ${showLarge ? 'border-rose-400 scale-105' : 'border-slate-200'}`}>
                <div className="text-2xl mb-1">🏠</div>
                <div className="grid grid-cols-5 gap-0.5">
                  {Array.from({ length: 25 }).map((_, i) => (
                    <div key={`large-${i}`} className="w-3 h-3 bg-red-200 rounded-sm"></div>
                  ))}
                </div>
                <div className="text-[9px] text-red-500 mt-1">... +75개 더</div>
              </div>
              <div className="text-[10px] font-bold text-slate-600 mt-2">100개 파일</div>
              <div className="text-[9px] text-red-600">방 여러 개 필요!</div>
            </div>
          </div>
          <div className="mt-3 text-center text-[10px] text-slate-500">
            {showLarge ? '파일 100개 → 구조 없으면 "어디 있지?" 반복' : '파일 10개 → 한 폴더면 충분'}
          </div>
        </div>
      );
    }

    function TypeStructureVisual() {
      const folders = [
        { name: 'components/', color: 'bg-blue-100 text-blue-700', items: ['Button', 'Header', 'Modal', 'Card'] },
        { name: 'hooks/', color: 'bg-purple-100 text-purple-700', items: ['useAuth', 'useCart', 'useLocalStorage'] },
        { name: 'pages/', color: 'bg-emerald-100 text-emerald-700', items: ['Home', 'Login', 'ProductList'] },
        { name: 'utils/', color: 'bg-amber-100 text-amber-700', items: ['formatDate', 'validation'] },
      ];

      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">type 중심 — 역할별 분류</div>
          <div className="grid grid-cols-2 gap-2 mb-3">
            {folders.map((folder) => (
              <div key={folder.name} className={`rounded-lg p-2 ${folder.color}`}>
                <div className="text-[10px] font-bold mb-1">{folder.name}</div>
                <div className="space-y-0.5">
                  {folder.items.map((item) => (
                    <div key={item} className="text-[9px] opacity-80">└ {item}</div>
                  ))}
                </div>
              </div>
            ))}
          </div>
          <div className="grid grid-cols-2 gap-2">
            <div className="bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2">
              <div className="text-[10px] font-bold text-emerald-700">장점</div>
              <div className="text-[9px] text-emerald-600">직관적, 학습 쉬움, 소규모 적합</div>
            </div>
            <div className="bg-red-50 border border-red-200 rounded-lg px-3 py-2">
              <div className="text-[10px] font-bold text-red-700">단점</div>
              <div className="text-[9px] text-red-600">기능 수정 시 여러 폴더 왕복</div>
            </div>
          </div>
        </div>
      );
    }

    function FeatureStructureVisual() {
      const features = [
        { name: 'features/auth/', color: 'bg-indigo-100 text-indigo-700', items: ['LoginForm', 'useAuth', 'authApi'] },
        { name: 'features/cart/', color: 'bg-rose-100 text-rose-700', items: ['CartList', 'useCart', 'cartApi'] },
        { name: 'features/products/', color: 'bg-teal-100 text-teal-700', items: ['ProductList', 'useProducts', 'productsApi'] },
      ];

      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">feature 중심 — 기능별 분류</div>
          <div className="space-y-2 mb-3">
            {features.map((feature) => (
              <div key={feature.name} className={`rounded-lg p-2 ${feature.color}`}>
                <div className="text-[10px] font-bold mb-1">{feature.name}</div>
                <div className="flex gap-2 flex-wrap">
                  {feature.items.map((item) => (
                    <span key={item} className="text-[9px] bg-white bg-opacity-60 rounded px-1.5 py-0.5">{item}</span>
                  ))}
                </div>
              </div>
            ))}
          </div>
          <div className="grid grid-cols-2 gap-2">
            <div className="bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2">
              <div className="text-[10px] font-bold text-emerald-700">장점</div>
              <div className="text-[9px] text-emerald-600">관련 파일 한 곳, 대규모 적합, 독립 배포 가능</div>
            </div>
            <div className="bg-red-50 border border-red-200 rounded-lg px-3 py-2">
              <div className="text-[10px] font-bold text-red-700">단점</div>
              <div className="text-[9px] text-red-600">공유 컴포넌트 위치 고민, 초기 설계 비용</div>
            </div>
          </div>
        </div>
      );
    }

    function PatternVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Presentational vs Container</div>
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-sky-50 border-2 border-sky-200 rounded-xl p-3">
              <div className="text-xs font-bold text-sky-700 mb-2">Presentational</div>
              <div className="space-y-1.5">
                {['UI만 담당', 'props로만 동작', '상태 없음 (거의)', '재사용 쉬움'].map((item) => (
                  <div key={item} className="flex items-center gap-1.5">
                    <span className="w-1.5 h-1.5 bg-sky-400 rounded-full"></span>
                    <span className="text-[10px] text-sky-700">{item}</span>
                  </div>
                ))}
              </div>
              <div className="mt-2 bg-sky-100 rounded px-2 py-1 text-[9px] text-sky-600 font-mono">
                {'<UserCard name={...} />'}
              </div>
            </div>
            <div className="bg-violet-50 border-2 border-violet-200 rounded-xl p-3">
              <div className="text-xs font-bold text-violet-700 mb-2">Container</div>
              <div className="space-y-1.5">
                {['데이터 페치', '상태 관리', 'Presentational에 전달', '비즈니스 로직'].map((item) => (
                  <div key={item} className="flex items-center gap-1.5">
                    <span className="w-1.5 h-1.5 bg-violet-400 rounded-full"></span>
                    <span className="text-[10px] text-violet-700">{item}</span>
                  </div>
                ))}
              </div>
              <div className="mt-2 bg-violet-100 rounded px-2 py-1 text-[9px] text-violet-600 font-mono">
                {'<UserCardContainer id={1} />'}
              </div>
            </div>
          </div>
          <div className="mt-3 text-center text-[10px] text-slate-500">
            현대 React: 커스텀 훅이 Container 역할을 대체하기도 함
          </div>
        </div>
      );
    }

    function GuideVisual() {
      const [scale, setScale] = useState('small');

      const GUIDES = {
        small: {
          label: '소규모 (파일 ~30개)',
          color: 'text-emerald-700',
          structure: 'src/\n├── components/\n│   ├── Button.jsx\n│   ├── Header.jsx\n│   └── ...\n├── pages/\n│   ├── Home.jsx\n│   └── About.jsx\n├── utils.js\n└── App.jsx',
          tip: 'type 중심으로 충분. 과한 분리는 오히려 해가 됩니다.',
        },
        medium: {
          label: '중규모 (파일 30~100개)',
          color: 'text-amber-700',
          structure: 'src/\n├── components/  (공유 UI)\n├── hooks/       (공유 훅)\n├── pages/       (라우트별)\n├── features/    (복잡한 기능만)\n│   └── auth/\n│   └── cart/\n├── utils/\n└── App.jsx',
          tip: 'type + feature 혼합. 복잡한 기능만 feature로 분리합니다.',
        },
        large: {
          label: '대규모 (파일 100개+)',
          color: 'text-rose-700',
          structure: 'src/\n├── features/\n│   ├── auth/\n│   │   ├── components/\n│   │   ├── hooks/\n│   │   ├── api/\n│   │   └── index.js\n│   ├── cart/\n│   ├── products/\n│   └── checkout/\n├── shared/\n│   ├── components/\n│   ├── hooks/\n│   └── utils/\n└── App.jsx',
          tip: 'feature 중심. 각 feature가 독립적인 미니 앱처럼 동작합니다.',
        },
      };

      const guide = GUIDES[scale];

      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">규모별 추천 구조</div>
          <div className="flex gap-2 mb-3">
            {Object.entries(GUIDES).map(([key, g]) => (
              <button key={key} onClick={() => setScale(key)}
                className={`flex-1 px-3 py-2 rounded-lg text-[10px] font-bold border-2 transition ${
                  scale === key ? BG_CLASSES.active : BG_CLASSES.inactive
                }`}>
                {g.label}
              </button>
            ))}
          </div>
          <div className="bg-slate-900 rounded-lg p-3 mb-3">
            <pre className="text-[10px] font-mono text-slate-300 leading-relaxed whitespace-pre">{guide.structure}</pre>
          </div>
          <div className={`text-[11px] font-bold ${guide.color}`}>
            {guide.tip}
          </div>
        </div>
      );
    }

    /* ── 코드 패널 ── */

    function CodePanel({ code }) {
      if (!code) return null;
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5"><div className="w-3 h-3 rounded-full bg-red-500"></div><div className="w-3 h-3 rounded-full bg-yellow-500"></div><div className="w-3 h-3 rounded-full bg-emerald-500"></div></div>
            <span className="text-[10px] text-slate-500 ml-2">project-structure</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    /* ── 메인 앱 ── */

    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => { setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; }); };
      const nextRef = useRef(next); nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const VISUAL_MAP = {
        'growth': GrowthVisual,
        'type-structure': TypeStructureVisual,
        'feature-structure': FeatureStructureVisual,
        'pattern': PatternVisual,
        'guide': GuideVisual,
      };
      const VisualComponent = VISUAL_MAP[step.visual];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-rose-600 transition">&larr; 목차로</a>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">VI</div>
                <h1 className="text-2xl font-bold text-slate-800">프로젝트 설계 — 폴더 구조와 컴포넌트 분해</h1>
              </div>
              <p className="text-slate-600 text-sm">프로젝트 규모에 맞는 <b>폴더 구조</b>를 선택하고, <b>Presentational/Container</b> 패턴으로 컴포넌트를 분해하는 방법을 시각화합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter VI-1-1 | ★★★ | 선수 지식 V-1-4 | 2026-04-21</p>
            </header>

            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-rose-500' : 'bg-slate-200'}`} aria-label={`Step ${i + 1}`} />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                <CodePanel code={step.code} />
                {VisualComponent && <VisualComponent />}
              </div>
              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-rose-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>
              </div>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }} disabled={idx === 0} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="이전 단계">&larr; 이전</button>
              <button onClick={() => { if (isEnd) { setIdx(0); } setIsPlaying(p => !p); }} className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-rose-500 hover:bg-rose-600 text-white'}`} aria-label={isPlaying ? '정지' : '자동 실행'}>{isPlaying ? '\u23F8 정지' : '\u25B6 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }} disabled={isEnd} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="다음 단계">다음 &rarr;</button>
            </div>
            <footer className="text-center text-xs text-slate-400 pb-4">React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-21</footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
