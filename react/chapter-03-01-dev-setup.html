<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>개발 환경 준비 — Chapter III-1-1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter III-1-1 — 개발 환경 준비: Node.js + Vite -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // =========================================================
    // 1. STEPS 정의 — 개발 환경 구축 5단계
    // =========================================================
    const STEPS = [
      {
        title: 'Step 1 — Node.js란?',
        desc: 'Node.js는 JavaScript를 브라우저 바깥에서 실행할 수 있게 해주는 환경입니다. 원래 JS는 브라우저 안에서만 돌아갔지만, Node.js 덕분에 서버·CLI 도구·빌드 도구도 JS로 만들 수 있게 되었습니다.',
        metaphor: '비유: 브라우저는 "방 안"이고, Node.js는 "밖으로 나갈 수 있는 문"입니다. JS가 방 밖(서버, 터미널)에서도 일할 수 있게 해줍니다.',
        terminal: [
          { type: 'cmd', text: 'node --version' },
          { type: 'output', text: 'v20.12.0' },
          { type: 'info', text: '✓ Node.js가 설치되어 있습니다!' },
        ],
        diagram: 'nodejs',
      },
      {
        title: 'Step 2 — npm이란?',
        desc: 'npm(Node Package Manager)은 Node.js의 패키지 관리자입니다. 다른 개발자가 만든 코드(패키지)를 한 줄 명령어로 설치할 수 있습니다. 스마트폰의 앱스토어와 같은 역할입니다.',
        metaphor: '비유: npm = 앱스토어. "react"라는 앱을 설치하고 싶으면 `npm install react` 한 줄이면 됩니다.',
        terminal: [
          { type: 'cmd', text: 'npm --version' },
          { type: 'output', text: '10.5.0' },
          { type: 'cmd', text: 'npm install react' },
          { type: 'output', text: 'added 3 packages in 1.2s' },
          { type: 'info', text: '✓ react 패키지 설치 완료!' },
        ],
        diagram: 'npm',
      },
      {
        title: 'Step 3 — Vite로 프로젝트 만들기',
        desc: '`npm create vite@latest`를 실행하면 React 프로젝트 뼈대가 자동으로 생성됩니다. Vite는 빌드 도구로, 코드를 저장하면 즉시 브라우저에 반영되는 "핫 리로드" 기능을 제공합니다.',
        metaphor: '비유: Vite = 요리 도구 세트. 냄비·프라이팬·칼이 미리 세팅된 주방에서 바로 요리를 시작할 수 있습니다.',
        terminal: [
          { type: 'cmd', text: 'npm create vite@latest my-app -- --template react' },
          { type: 'output', text: '' },
          { type: 'output', text: 'Scaffolding project in ./my-app...' },
          { type: 'output', text: '' },
          { type: 'info', text: '✓ 프로젝트 생성 완료!' },
          { type: 'output', text: '' },
          { type: 'output', text: 'Done. Now run:' },
          { type: 'highlight', text: '  cd my-app' },
          { type: 'highlight', text: '  npm install' },
          { type: 'highlight', text: '  npm run dev' },
        ],
        diagram: 'vite-create',
      },
      {
        title: 'Step 4 — 프로젝트 폴더 구조',
        desc: 'Vite가 만든 프로젝트 폴더에는 이미 필요한 파일이 다 들어있습니다. `src/` 폴더에 우리가 작성할 React 코드가 위치하고, `index.html`이 진입점입니다.',
        metaphor: '비유: 새 집에 입주한 것과 같습니다. 벽·천장·바닥은 이미 있고, 가구(코드)만 배치하면 됩니다.',
        terminal: [
          { type: 'cmd', text: 'ls my-app/' },
          { type: 'output', text: '' },
        ],
        diagram: 'folder-tree',
      },
      {
        title: 'Step 5 — 개발 서버 실행',
        desc: '`npm run dev`를 실행하면 Vite가 로컬 개발 서버를 시작합니다. 브라우저에서 `http://localhost:5173`으로 접속하면 React 앱이 보입니다. 코드를 수정하면 저장 즉시 브라우저에 반영됩니다.',
        metaphor: '비유: 전자레인지 데우기. 버튼 하나(npm run dev)만 누르면 바로 결과(앱)가 나옵니다.',
        terminal: [
          { type: 'cmd', text: 'cd my-app && npm run dev' },
          { type: 'output', text: '' },
          { type: 'output', text: '  VITE v5.4.2  ready in 312ms' },
          { type: 'output', text: '' },
          { type: 'highlight', text: '  ➜  Local:   http://localhost:5173/' },
          { type: 'output', text: '  ➜  Network: http://192.168.0.10:5173/' },
          { type: 'output', text: '' },
          { type: 'info', text: '✓ 개발 서버 실행 중! 브라우저를 열어보세요.' },
        ],
        diagram: 'dev-server',
      },
    ];

    // =========================================================
    // 2. 터미널 시뮬레이션 컴포넌트
    // =========================================================
    function TerminalPanel({ lines }) {
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700 font-mono text-sm">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-emerald-500"></div>
            </div>
            <span className="text-[10px] text-slate-500 ml-2">Terminal</span>
          </div>
          <div className="space-y-1">
            {lines.map((line, i) => {
              const lineKey = `${line.type}-${i}`;
              if (line.type === 'cmd') {
                return (
                  <div key={lineKey} className="flex items-center gap-2">
                    <span className="text-emerald-400">$</span>
                    <span className="text-slate-200">{line.text}</span>
                  </div>
                );
              }
              if (line.type === 'info') {
                return <div key={lineKey} className="text-emerald-300 font-bold">{line.text}</div>;
              }
              if (line.type === 'highlight') {
                return <div key={lineKey} className="text-sky-300">{line.text}</div>;
              }
              return <div key={lineKey} className="text-slate-400">{line.text || '\u00A0'}</div>;
            })}
          </div>
        </div>
      );
    }

    // =========================================================
    // 3. 다이어그램 컴포넌트
    // =========================================================
    function DiagramPanel({ type }) {
      if (type === 'nodejs') {
        return (
          <div className="bg-white rounded-xl p-4 border border-slate-200">
            <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Node.js 역할</div>
            <div className="flex items-center justify-center gap-3">
              <div className="text-center">
                <div className="w-16 h-16 bg-amber-100 border-2 border-amber-300 rounded-xl flex items-center justify-center text-2xl">🌐</div>
                <div className="text-[10px] text-slate-600 mt-1 font-bold">브라우저</div>
                <div className="text-[10px] text-slate-400">JS 실행 가능</div>
              </div>
              <div className="text-slate-300 text-lg">+</div>
              <div className="text-center">
                <div className="w-16 h-16 bg-emerald-100 border-2 border-emerald-300 rounded-xl flex items-center justify-center text-2xl">💻</div>
                <div className="text-[10px] text-slate-600 mt-1 font-bold">Node.js</div>
                <div className="text-[10px] text-slate-400">서버·터미널에서도!</div>
              </div>
              <div className="text-slate-300 text-lg">=</div>
              <div className="text-center">
                <div className="w-16 h-16 bg-sky-100 border-2 border-sky-300 rounded-xl flex items-center justify-center text-2xl">🚀</div>
                <div className="text-[10px] text-slate-600 mt-1 font-bold">어디서든 JS</div>
                <div className="text-[10px] text-slate-400">풀스택 가능</div>
              </div>
            </div>
          </div>
        );
      }

      if (type === 'npm') {
        const packages = [
          { name: 'react', desc: 'UI 라이브러리', downloads: '26M/주' },
          { name: 'vite', desc: '빌드 도구', downloads: '14M/주' },
          { name: 'tailwindcss', desc: 'CSS 프레임워크', downloads: '11M/주' },
        ];
        return (
          <div className="bg-white rounded-xl p-4 border border-slate-200">
            <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">npm = 앱스토어</div>
            <div className="space-y-2">
              {packages.map((pkg) => (
                <div key={pkg.name} className="flex items-center gap-3 bg-slate-50 rounded-lg px-3 py-2">
                  <div className="w-8 h-8 bg-red-100 rounded-lg flex items-center justify-center text-xs font-bold text-red-600">📦</div>
                  <div className="flex-1">
                    <div className="text-sm font-bold text-slate-800">{pkg.name}</div>
                    <div className="text-[10px] text-slate-500">{pkg.desc}</div>
                  </div>
                  <div className="text-[10px] text-slate-400">⬇ {pkg.downloads}</div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      if (type === 'vite-create') {
        return (
          <div className="bg-white rounded-xl p-4 border border-slate-200">
            <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Vite 프로젝트 생성 흐름</div>
            <div className="flex items-center gap-2 text-xs">
              {['명령어 실행', '템플릿 선택', '폴더 생성', '의존성 설치', '개발 시작'].map((label, i, arr) => (
                <React.Fragment key={label}>
                  <div className="bg-sky-50 border border-sky-200 rounded-lg px-2 py-2 text-center flex-1">
                    <div className="text-sky-700 font-bold">{i + 1}</div>
                    <div className="text-slate-600 mt-0.5">{label}</div>
                  </div>
                  {i < arr.length - 1 && <span className="text-slate-300">→</span>}
                </React.Fragment>
              ))}
            </div>
          </div>
        );
      }

      if (type === 'folder-tree') {
        const tree = [
          { name: 'my-app/', indent: 0, icon: '📁', highlight: false },
          { name: 'node_modules/', indent: 1, icon: '📁', highlight: false },
          { name: 'public/', indent: 1, icon: '📁', highlight: false },
          { name: 'src/', indent: 1, icon: '📁', highlight: true },
          { name: 'App.jsx', indent: 2, icon: '⚛️', highlight: true },
          { name: 'App.css', indent: 2, icon: '🎨', highlight: false },
          { name: 'main.jsx', indent: 2, icon: '⚛️', highlight: true },
          { name: 'index.html', indent: 1, icon: '📄', highlight: true },
          { name: 'package.json', indent: 1, icon: '📋', highlight: false },
          { name: 'vite.config.js', indent: 1, icon: '⚙️', highlight: false },
        ];
        return (
          <div className="bg-white rounded-xl p-4 border border-slate-200">
            <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">프로젝트 폴더 구조</div>
            <div className="font-mono text-sm space-y-0.5">
              {tree.map((item) => (
                <div key={item.name} style={{ paddingLeft: item.indent * 20 }}
                  className={item.highlight ? 'text-sky-700 font-bold' : 'text-slate-600'}>
                  <span className="mr-1">{item.icon}</span>{item.name}
                  {item.highlight && <span className="text-[10px] text-sky-500 ml-2">← 핵심!</span>}
                </div>
              ))}
            </div>
          </div>
        );
      }

      if (type === 'dev-server') {
        return (
          <div className="bg-white rounded-xl p-4 border border-slate-200">
            <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">개발 서버 동작</div>
            <div className="flex items-center gap-3 justify-center">
              <div className="text-center">
                <div className="w-14 h-14 bg-violet-100 border-2 border-violet-300 rounded-xl flex items-center justify-center text-xl">📝</div>
                <div className="text-[10px] text-slate-600 mt-1 font-bold">코드 수정</div>
              </div>
              <div className="text-violet-400 font-bold">→</div>
              <div className="text-center">
                <div className="w-14 h-14 bg-amber-100 border-2 border-amber-300 rounded-xl flex items-center justify-center text-xl animate-pulse">⚡</div>
                <div className="text-[10px] text-slate-600 mt-1 font-bold">Vite HMR</div>
              </div>
              <div className="text-amber-400 font-bold">→</div>
              <div className="text-center">
                <div className="w-14 h-14 bg-emerald-100 border-2 border-emerald-300 rounded-xl flex items-center justify-center text-xl">🌐</div>
                <div className="text-[10px] text-slate-600 mt-1 font-bold">즉시 반영!</div>
              </div>
            </div>
            <div className="mt-3 text-center text-[11px] text-slate-500">
              저장하면 브라우저가 자동으로 업데이트됩니다 (Hot Module Replacement)
            </div>
          </div>
        );
      }

      return null;
    }

    // =========================================================
    // 4. 메인 App
    // =========================================================
    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => {
        setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      };
      const nextRef = useRef(next);
      nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 5000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-teal-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">III</div>
                <h1 className="text-2xl font-bold text-slate-800">개발 환경 준비 — Node.js + Vite</h1>
              </div>
              <p className="text-slate-600 text-sm">React 프로젝트를 시작하기 위한 <b>도구 설치와 프로젝트 생성</b>을 가상 터미널로 체험합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter III-1-1 | ★★☆ | 선수 지식 II-1-4 | 2026-04-20</p>
            </header>

            {/* 진행 표시 */}
            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.title} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-teal-500' : 'bg-slate-200'}`}
                  aria-label={`Step ${i + 1}`}
                />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              {/* 좌: 터미널 + 다이어그램 */}
              <div className="space-y-4">
                <TerminalPanel lines={step.terminal} />
                <DiagramPanel type={step.diagram} />
              </div>

              {/* 우: 설명 패널 */}
              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-teal-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>
                <div className="mt-4 bg-teal-50 border border-teal-200 rounded-lg p-3">
                  <div className="text-[10px] text-teal-600 font-bold uppercase mb-1">비유</div>
                  <p className="text-xs text-teal-700">{step.metaphor}</p>
                </div>
              </div>
            </div>

            {/* 컨트롤 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }}
                disabled={idx === 0}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="이전 단계"
              >← 이전</button>
              <button onClick={() => { if (isEnd) setIdx(0); setIsPlaying(p => !p); }}
                className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${
                  isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-teal-500 hover:bg-teal-600 text-white'
                }`}
                aria-label={isPlaying ? '정지' : '자동 실행'}
              >{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }}
                disabled={isEnd}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="다음 단계"
              >다음 →</button>
            </div>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-20
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
