<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Props — 컴포넌트에 값 전달하기 — Chapter III-1-4</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter III-1-4 — Props: 컴포넌트에 값 전달하기 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // =========================================================
    // 1. STEPS 정의 — Props 개념 5단계
    // =========================================================
    const STEPS = [
      {
        title: 'Step 1 — Props란?',
        desc: 'Props(Properties)는 컴포넌트에 전달하는 값입니다. 함수의 매개변수와 같습니다. HTML 태그에 속성을 붙이듯, 컴포넌트에 데이터를 전달합니다.',
        code: '// HTML 속성처럼 값을 전달\n<img src="photo.jpg" alt="사진" />\n\n// React 컴포넌트에도 같은 방식!\n<UserCard name="김철수" age={25} />',
        mode: 'concept',
      },
      {
        title: 'Step 2 — 부모 → 자식 전달',
        desc: '부모 컴포넌트가 자식에게 props를 전달합니다. 택배처럼, 부모가 보내면 자식이 받습니다. 데이터는 항상 위에서 아래로 흐릅니다 — 이것이 "단방향 데이터 흐름"입니다.',
        code: '// 부모 컴포넌트\nfunction Parent() {\n  return (\n    <Child name="React" year={2013} />\n  );\n}\n\n// 자식 컴포넌트\nfunction Child(props) {\n  return (\n    <div>\n      <h1>{props.name}</h1>\n      <p>{props.year}년 출시</p>\n    </div>\n  );\n}',
        mode: 'flow',
      },
      {
        title: 'Step 3 — 구조 분해 할당',
        desc: '`props.name`, `props.age`로 접근하는 대신, 구조 분해 할당으로 바로 변수를 꺼낼 수 있습니다. 실무에서는 거의 항상 이 방식을 씁니다.',
        code: '// 방법 1: props 객체 통째로\nfunction Card(props) {\n  return <h1>{props.name}</h1>;\n}\n\n// 방법 2: 구조 분해 할당 (권장!)\nfunction Card({ name, age }) {\n  return (\n    <div>\n      <h1>{name}</h1>\n      <p>{age}살</p>\n    </div>\n  );\n}',
        mode: 'destructure',
      },
      {
        title: 'Step 4 — Props는 읽기 전용',
        desc: 'Props는 자식이 수정할 수 없습니다. 택배를 받은 후 내용물을 바꿔서 보낸 사람에게 돌려보낼 수 없는 것과 같습니다. 값을 바꾸고 싶으면 State(다음 파트)를 사용합니다.',
        code: '// ❌ 잘못된 코드 — props 수정 불가!\nfunction Bad({ count }) {\n  count = count + 1;  // 에러!\n  return <p>{count}</p>;\n}\n\n// ✅ 올바른 코드 — props는 읽기만\nfunction Good({ count }) {\n  return <p>현재 값: {count}</p>;\n}',
        mode: 'readonly',
      },
      {
        title: 'Step 5 — Props 체험하기',
        desc: '아래에서 Props 값을 직접 바꿔보세요! 부모가 전달하는 값이 바뀌면 자식 컴포넌트도 즉시 업데이트됩니다. 이것이 React의 핵심 — 데이터가 바뀌면 UI도 바뀐다.',
        code: null,
        mode: 'interactive',
      },
    ];

    // =========================================================
    // 2. 데이터 흐름 시각화
    // =========================================================
    function FlowDiagram() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">단방향 데이터 흐름</div>
          <div className="flex flex-col items-center gap-2">
            <div className="w-full bg-violet-50 border-2 border-violet-300 rounded-xl p-3 text-center">
              <div className="text-xs font-bold text-violet-700">부모 (Parent)</div>
              <div className="text-[10px] text-violet-500 mt-1 font-mono">{'<Child name="React" year={2013} />'}</div>
            </div>
            <div className="flex flex-col items-center">
              <div className="text-violet-400 text-lg">↓</div>
              <div className="bg-violet-100 text-violet-700 text-[10px] font-bold px-3 py-1 rounded-full">props 전달 (택배!)</div>
              <div className="text-violet-400 text-lg">↓</div>
            </div>
            <div className="w-full bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-center">
              <div className="text-xs font-bold text-emerald-700">자식 (Child)</div>
              <div className="text-[10px] text-emerald-500 mt-1 font-mono">{'props = { name: "React", year: 2013 }'}</div>
            </div>
          </div>
        </div>
      );
    }

    // =========================================================
    // 3. 인터랙티브 Props 편집기
    // =========================================================
    function PropsPlayground() {
      const [name, setName] = useState('React');
      const [age, setAge] = useState(13);
      const [color, setColor] = useState('#0ea5e9');

      return (
        <div className="space-y-4">
          {/* 부모: Props 편집 */}
          <div className="bg-violet-50 border-2 border-violet-300 rounded-xl p-4">
            <div className="text-xs font-bold text-violet-700 mb-3">부모 컴포넌트 — Props 설정</div>
            <div className="space-y-3">
              <div>
                <label className="text-[10px] text-slate-500 font-bold">name</label>
                <input value={name} onChange={e => setName(e.target.value)}
                  className="w-full mt-1 px-3 py-1.5 border border-slate-300 rounded-lg text-sm" />
              </div>
              <div>
                <label className="text-[10px] text-slate-500 font-bold">age: {age}</label>
                <input type="range" min="0" max="100" value={age} onChange={e => setAge(Number(e.target.value))}
                  className="w-full mt-1" />
              </div>
              <div>
                <label className="text-[10px] text-slate-500 font-bold">color</label>
                <div className="flex gap-2 mt-1">
                  {['#0ea5e9', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'].map(c => (
                    <button key={c} onClick={() => setColor(c)}
                      className={`w-7 h-7 rounded-full border-2 transition ${color === c ? 'border-slate-800 scale-110' : 'border-slate-200'}`}
                      style={{ backgroundColor: c }}
                      aria-label={`색상 ${c}`}
                    />
                  ))}
                </div>
              </div>
            </div>
            <div className="mt-3 font-mono text-[11px] text-violet-600 bg-violet-100 rounded-lg px-3 py-2">
              {'<ProfileCard name="' + name + '" age={' + age + '} color="' + color + '" />'}
            </div>
          </div>

          {/* 화살표 */}
          <div className="text-center text-violet-400 font-bold">↓ props 전달 ↓</div>

          {/* 자식: 결과 렌더링 */}
          <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-4">
            <div className="text-xs font-bold text-emerald-700 mb-3">자식 컴포넌트 — 렌더링 결과</div>
            <div className="bg-white rounded-xl p-4 border border-slate-200 text-center">
              <div className="w-16 h-16 rounded-full mx-auto flex items-center justify-center text-white text-xl font-bold shadow-lg" style={{ backgroundColor: color }}>
                {name.charAt(0).toUpperCase()}
              </div>
              <h2 className="text-lg font-bold text-slate-800 mt-3">{name}</h2>
              <p className="text-sm text-slate-500">{age}살</p>
              <div className="mt-2 inline-block text-xs px-3 py-1 rounded-full text-white font-bold" style={{ backgroundColor: color }}>
                {age < 18 ? '미성년' : age < 65 ? '성인' : '시니어'}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // =========================================================
    // 4. 코드 패널
    // =========================================================
    function CodePanel({ code }) {
      if (!code) return null;
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-emerald-500"></div>
            </div>
            <span className="text-[10px] text-slate-500 ml-2">App.jsx</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    // =========================================================
    // 5. 메인 App
    // =========================================================
    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => {
        setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      };
      const nextRef = useRef(next);
      nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 5000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-teal-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">III</div>
                <h1 className="text-2xl font-bold text-slate-800">Props — 컴포넌트에 값 전달하기</h1>
              </div>
              <p className="text-slate-600 text-sm"><b>부모 → 자식</b> 단방향 데이터 흐름을 시각화하고, Props를 직접 체험합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter III-1-4 | ★★☆ | 선수 지식 III-1-3 | 2026-04-20</p>
            </header>

            {/* 진행 표시 */}
            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.title} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-teal-500' : 'bg-slate-200'}`}
                  aria-label={`Step ${i + 1}`}
                />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              {/* 좌: 코드 + 시각화 */}
              <div className="space-y-4">
                {step.mode === 'interactive' ? (
                  <PropsPlayground />
                ) : (
                  <>
                    <CodePanel code={step.code} />
                    {step.mode === 'flow' && <FlowDiagram />}
                    {step.mode === 'readonly' && (
                      <div className="bg-white rounded-xl p-4 border border-slate-200">
                        <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Props 규칙</div>
                        <div className="grid grid-cols-2 gap-3">
                          <div className="bg-red-50 border border-red-200 rounded-lg p-3 text-center">
                            <div className="text-2xl mb-1">🚫</div>
                            <div className="text-xs font-bold text-red-700">수정 불가</div>
                            <div className="text-[10px] text-red-500 mt-1">props.name = "다른값"</div>
                          </div>
                          <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-center">
                            <div className="text-2xl mb-1">✅</div>
                            <div className="text-xs font-bold text-emerald-700">읽기만 가능</div>
                            <div className="text-[10px] text-emerald-500 mt-1">{'return <p>{props.name}</p>'}</div>
                          </div>
                        </div>
                      </div>
                    )}
                    {step.mode === 'destructure' && (
                      <div className="bg-white rounded-xl p-4 border border-slate-200">
                        <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">비교</div>
                        <div className="space-y-2">
                          <div className="bg-slate-50 rounded-lg p-3">
                            <div className="text-[10px] font-bold text-slate-600 mb-1">방법 1: props.xxx</div>
                            <div className="font-mono text-xs text-slate-500">props.name, props.age</div>
                          </div>
                          <div className="bg-emerald-50 rounded-lg p-3 border-2 border-emerald-200">
                            <div className="text-[10px] font-bold text-emerald-700 mb-1">방법 2: 구조 분해 (권장!)</div>
                            <div className="font-mono text-xs text-emerald-600">{'{ name, age }'} — 바로 변수로 사용</div>
                          </div>
                        </div>
                      </div>
                    )}
                  </>
                )}
              </div>

              {/* 우: 설명 패널 */}
              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-teal-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>

                {step.mode === 'concept' && (
                  <div className="mt-4 bg-teal-50 border border-teal-200 rounded-lg p-3">
                    <div className="text-[10px] text-teal-600 font-bold uppercase mb-1">비유</div>
                    <p className="text-xs text-teal-700">Props = 택배. 부모가 보내면 자식이 받습니다. 내용물(값)은 바꿀 수 없고, 받아서 사용만 합니다.</p>
                  </div>
                )}
              </div>
            </div>

            {/* 컨트롤 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }}
                disabled={idx === 0}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="이전 단계"
              >← 이전</button>
              <button onClick={() => { if (isEnd) setIdx(0); setIsPlaying(p => !p); }}
                className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${
                  isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-teal-500 hover:bg-teal-600 text-white'
                }`}
                aria-label={isPlaying ? '정지' : '자동 실행'}
              >{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }}
                disabled={isEnd}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="다음 단계"
              >다음 →</button>
            </div>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-20
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
