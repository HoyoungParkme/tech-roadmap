<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프레임워크 vs 라이브러리 — Chapter II-1-1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    Chapter II-1-1 — 프레임워크 vs 라이브러리: 주도권이 누구에게 있나
    학습 목표: 프레임워크와 라이브러리의 차이를 "제어의 역전" 개념으로 설명할 수 있다.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1 — 라이브러리: 내가 부르는 도구',
        desc: '라이브러리는 내가 필요할 때 꺼내 쓰는 도구다. 망치, 드라이버처럼 — 내가 원할 때 사용하고, 안 쓸 때는 서랍에 넣어둔다.',
        visual: 'library',
        code: '// 라이브러리: 내가 직접 호출한다\nimport { format } from "date-fns";\nimport axios from "axios";\n\n// 내 코드가 주도권을 갖고 있다\nconst today = format(new Date(), "yyyy-MM-dd");\nconst data = await axios.get("/api/users");\n\n// 언제, 어떻게 쓸지는 내가 결정한다\nconsole.log(today, data);',
      },
      {
        title: 'Step 2 — 프레임워크: 집이 나를 부른다',
        desc: '프레임워크는 미리 지어진 집이다. 내 코드가 프레임워크가 정해준 방식으로 들어가야 한다. 프레임워크가 "여기에 코드를 넣어라"라고 자리를 정해준다.',
        visual: 'framework',
        code: '// 프레임워크: 프레임워크가 내 코드를 호출한다\n// Angular 예시\n@Component({\n  selector: "app-root",\n  template: "<h1>{{title}}</h1>",\n})\nexport class AppComponent {\n  title = "Hello";\n\n  // 프레임워크가 정해준 생명주기 메서드\n  ngOnInit() {\n    // 프레임워크가 이 함수를 "알아서" 호출한다\n  }\n}',
      },
      {
        title: 'Step 3 — 제어의 역전 (IoC)',
        desc: '핵심 차이는 "누가 누구를 부르느냐"입니다. 라이브러리는 내가 부르고(내가 주도), 프레임워크는 프레임워크가 나를 부릅니다(프레임워크가 주도). 이것을 "제어의 역전(Inversion of Control)"이라 합니다.',
        visual: 'ioc',
        code: '// 제어의 역전 (Inversion of Control)\n\n// 라이브러리: 내 코드 → 라이브러리 호출\nmyCode() {\n  library.doSomething();  // 내가 부른다\n}\n\n// 프레임워크: 프레임워크 → 내 코드 호출\n// (프레임워크가 정해준 자리에 코드를 넣으면\n//  프레임워크가 적절한 시점에 호출해준다)\nonInit() {\n  // 프레임워크가 나를 부른다\n}',
      },
      {
        title: 'Step 4 — React는 어디에 해당?',
        desc: 'React는 "UI 레이어 라이브러리"로 분류합니다. 라우팅, 상태 관리, API 호출은 직접 선택해 조합해야 합니다. 반면 Angular는 이 모든 것을 프레임워크가 포함합니다.',
        visual: 'react',
        code: '// React: UI 라이브러리\n// → 라우팅? React Router 따로 설치\n// → 상태 관리? Zustand/Redux 따로 선택\n// → API 호출? axios/fetch 직접 결정\n\n// Angular: 풀 프레임워크\n// → 라우팅? 내장 (RouterModule)\n// → 상태 관리? 내장 (RxJS/NgRx)\n// → API 호출? 내장 (HttpClient)\n// → 폼 검증? 내장 (FormsModule)\n// → 테스트? 내장 (TestBed)',
      },
      {
        title: 'Step 5 — 장단점 비교',
        desc: '라이브러리는 자유롭지만 직접 조합해야 합니다. 프레임워크는 일관되지만 규칙을 따라야 합니다. 정답은 없고 — 프로젝트 상황에 맞게 선택합니다.',
        visual: 'comparison',
        code: '// 라이브러리 (React 등)\n// ✓ 자유로운 선택 — 필요한 것만 골라 쓴다\n// ✓ 작은 번들 크기 가능\n// ✓ 학습 곡선이 완만\n// ✗ 조합 비용 — 직접 고르고 연결해야 한다\n// ✗ "정답" 구조가 없어 팀마다 다를 수 있다\n\n// 프레임워크 (Angular 등)\n// ✓ 일관된 구조 — 팀 전체가 같은 패턴\n// ✓ 공식 해법이 있어 고민 적음\n// ✗ 큰 번들 크기\n// ✗ 학습 곡선이 가파름\n// ✗ 프레임워크 규칙에 묶임',
      },
    ];

    function VisualPanel({ type }) {
      if (type === 'library') {
        return (
          <div className="bg-slate-800 rounded-xl p-5 border border-slate-700">
            <div className="text-xs text-slate-400 uppercase tracking-wider mb-4 font-bold">라이브러리 = 도구 상자</div>
            <div className="flex items-center justify-center gap-6">
              <div className="text-center">
                <div className="w-20 h-20 bg-sky-100 border-2 border-sky-400 rounded-xl flex items-center justify-center text-2xl mb-2">👨‍💻</div>
                <div className="text-xs text-white font-bold">내 코드</div>
                <div className="text-[10px] text-slate-400">주도권: 나</div>
              </div>
              <div className="text-sky-400 text-2xl font-bold">→</div>
              <div className="flex flex-col gap-2">
                {['🔨 date-fns', '📡 axios', '🎨 Lodash'].map(tool => (
                  <div key={tool} className="bg-slate-700 px-3 py-1.5 rounded text-xs text-slate-200">{tool}</div>
                ))}
              </div>
            </div>
            <div className="mt-3 text-center text-[11px] text-sky-300">내가 필요할 때 꺼내 쓴다</div>
          </div>
        );
      }

      if (type === 'framework') {
        return (
          <div className="bg-slate-800 rounded-xl p-5 border border-slate-700">
            <div className="text-xs text-slate-400 uppercase tracking-wider mb-4 font-bold">프레임워크 = 미리 지어진 집</div>
            <div className="bg-slate-700 rounded-xl p-4 border-2 border-amber-500">
              <div className="text-xs text-amber-400 font-bold mb-3 text-center">프레임워크 (Angular)</div>
              <div className="grid grid-cols-3 gap-2">
                {['라우팅', '상태관리', 'HTTP', '폼검증', 'DI', '테스트'].map(m => (
                  <div key={m} className="bg-amber-900/30 px-2 py-1.5 rounded text-[10px] text-amber-200 text-center">{m}</div>
                ))}
              </div>
              <div className="mt-3 flex justify-center">
                <div className="bg-sky-600 px-3 py-2 rounded text-xs text-white font-bold">내 코드 (여기에 넣어라)</div>
              </div>
            </div>
            <div className="mt-3 text-center text-[11px] text-amber-300">프레임워크가 자리를 정해준다</div>
          </div>
        );
      }

      if (type === 'ioc') {
        return (
          <div className="bg-slate-800 rounded-xl p-5 border border-slate-700">
            <div className="text-xs text-slate-400 uppercase tracking-wider mb-4 font-bold">제어의 역전 (IoC)</div>
            <div className="space-y-4">
              <div className="flex items-center gap-4 bg-sky-900/30 p-3 rounded-lg">
                <div className="w-12 h-12 bg-sky-500 rounded-lg flex items-center justify-center text-white font-bold text-sm shrink-0">나</div>
                <div className="text-sky-400 text-xl">→</div>
                <div className="w-12 h-12 bg-sky-800 rounded-lg flex items-center justify-center text-sky-300 text-sm shrink-0">Lib</div>
                <div className="text-xs text-sky-300 ml-2">라이브러리: 내가 호출한다</div>
              </div>
              <div className="flex items-center gap-4 bg-amber-900/30 p-3 rounded-lg">
                <div className="w-12 h-12 bg-amber-800 rounded-lg flex items-center justify-center text-amber-300 font-bold text-sm shrink-0">FW</div>
                <div className="text-amber-400 text-xl">→</div>
                <div className="w-12 h-12 bg-amber-500 rounded-lg flex items-center justify-center text-white text-sm shrink-0">나</div>
                <div className="text-xs text-amber-300 ml-2">프레임워크: 프레임워크가 호출한다</div>
              </div>
            </div>
          </div>
        );
      }

      if (type === 'react') {
        return (
          <div className="bg-slate-800 rounded-xl p-5 border border-slate-700">
            <div className="text-xs text-slate-400 uppercase tracking-wider mb-4 font-bold">React의 위치</div>
            <div className="flex gap-4">
              <div className="flex-1 bg-sky-900/30 p-3 rounded-lg border border-sky-700">
                <div className="text-xs font-bold text-sky-400 mb-2">React (라이브러리)</div>
                <div className="space-y-1">
                  <div className="bg-sky-600 px-2 py-1 rounded text-[10px] text-white text-center">UI 렌더링</div>
                  <div className="bg-slate-600 px-2 py-1 rounded text-[10px] text-slate-300 text-center border border-dashed border-slate-500">+ React Router</div>
                  <div className="bg-slate-600 px-2 py-1 rounded text-[10px] text-slate-300 text-center border border-dashed border-slate-500">+ Zustand</div>
                  <div className="bg-slate-600 px-2 py-1 rounded text-[10px] text-slate-300 text-center border border-dashed border-slate-500">+ axios</div>
                </div>
                <div className="text-[9px] text-sky-300 mt-2">직접 조합</div>
              </div>
              <div className="flex-1 bg-amber-900/30 p-3 rounded-lg border border-amber-700">
                <div className="text-xs font-bold text-amber-400 mb-2">Angular (프레임워크)</div>
                <div className="space-y-1">
                  {['UI 렌더링', 'Router', 'RxJS', 'HttpClient', 'Forms', 'DI'].map(m => (
                    <div key={m} className="bg-amber-700/50 px-2 py-1 rounded text-[10px] text-amber-200 text-center">{m}</div>
                  ))}
                </div>
                <div className="text-[9px] text-amber-300 mt-2">모두 내장</div>
              </div>
            </div>
          </div>
        );
      }

      // comparison
      return (
        <div className="bg-slate-800 rounded-xl p-5 border border-slate-700">
          <div className="text-xs text-slate-400 uppercase tracking-wider mb-4 font-bold">장단점 비교</div>
          <div className="grid grid-cols-2 gap-4">
            <div className="bg-sky-900/20 p-3 rounded-lg">
              <div className="text-xs font-bold text-sky-400 mb-2">라이브러리</div>
              <div className="space-y-1 text-[11px]">
                <div className="text-emerald-400">✓ 자유로운 선택</div>
                <div className="text-emerald-400">✓ 작은 번들 가능</div>
                <div className="text-emerald-400">✓ 완만한 학습곡선</div>
                <div className="text-red-400">✗ 직접 조합 필요</div>
                <div className="text-red-400">✗ 팀마다 구조 상이</div>
              </div>
            </div>
            <div className="bg-amber-900/20 p-3 rounded-lg">
              <div className="text-xs font-bold text-amber-400 mb-2">프레임워크</div>
              <div className="space-y-1 text-[11px]">
                <div className="text-emerald-400">✓ 일관된 구조</div>
                <div className="text-emerald-400">✓ 공식 해법 존재</div>
                <div className="text-red-400">✗ 큰 번들 크기</div>
                <div className="text-red-400">✗ 가파른 학습곡선</div>
                <div className="text-red-400">✗ 규칙에 묶임</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => { setIdx(p => { if (p < STEPS.length-1) return p+1; setIsPlaying(false); return p; }); };
      const nextRef = useRef(next); nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">II</div>
                <h1 className="text-2xl font-bold text-slate-800">프레임워크 vs 라이브러리</h1>
              </div>
              <p className="text-slate-600 text-sm">주도권이 누구에게 있느냐 — <b>제어의 역전(IoC)</b> 개념으로 프레임워크와 라이브러리의 차이를 이해합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter II-1-1 | ★☆☆ | 선수 지식 I-1-4 | 2026-04-20</p>
            </header>

            <div className="bg-violet-600 text-white p-5 rounded-xl shadow-sm min-h-[80px]">
              <div className="text-xs font-bold text-violet-200 mb-1 uppercase tracking-wider">{step.title}</div>
              <p className="text-base font-medium leading-relaxed">{step.desc}</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5 items-stretch">
              <div className="flex flex-col space-y-4">
                <VisualPanel type={step.visual} />
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex items-center justify-between gap-3">
                  <div className="flex items-center space-x-2">
                    <button onClick={() => { if (idx > 0) { setIdx(p=>p-1); setIsPlaying(false); } }} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button onClick={() => { if(isEnd) setIdx(0); setIsPlaying(p=>!p); }} className="px-4 py-2 rounded bg-violet-600 hover:bg-violet-700 text-white font-medium transition w-32 text-center">{isPlaying ? '정지' : '자동 실행'}</button>
                    <button onClick={() => { next(); setIsPlaying(false); }} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                  </div>
                  <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step {idx+1} / {STEPS.length}</div>
                </div>
              </div>

              <div className="relative min-h-[380px] lg:min-h-0 rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-slate-900 flex flex-col">
                  <div className="flex items-center gap-2 px-4 py-2 bg-slate-800 border-b border-slate-700">
                    <div className="flex gap-1.5"><div className="w-3 h-3 rounded-full bg-red-500 opacity-70"></div><div className="w-3 h-3 rounded-full bg-yellow-400 opacity-70"></div><div className="w-3 h-3 rounded-full bg-emerald-500 opacity-70"></div></div>
                    <span className="text-xs text-slate-400 font-mono ml-2">코드 비교</span>
                  </div>
                  <div className="p-4 overflow-y-auto flex-1 text-sm font-mono text-slate-300 leading-relaxed">
                    <pre className="whitespace-pre-wrap">{step.code}</pre>
                  </div>
                </div>
              </div>
            </div>

            <div className="bg-white border border-slate-200 rounded-xl p-4 text-xs text-slate-500 space-y-1">
              <div className="font-bold text-slate-700 mb-2">기술 참고</div>
              <div><b>제어의 역전(IoC)</b>: "Don't call us, we'll call you." 할리우드 원칙이라고도 부른다.</div>
              <div><b>React의 정체성</b>: 공식 사이트에서 "A JavaScript library for building user interfaces"로 소개한다.</div>
              <div><b>Next.js</b>: React 위에 프레임워크 레이어를 씌운 것. React(라이브러리) + Next.js(프레임워크) 조합이 2024년 이후 표준에 가깝다.</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
