    // ─────────────────────────────────────────────────────
    // CallDirectionDiagram — 호출 방향을 화살표로 보여준다
    //   direction: 'lib' → 좌(내 코드) ──call──▶ 우(라이브러리)

    // ─────────────────────────────────────────────────────
    function CallDirectionDiagram({ direction, actors, callLabel }) {
      const isLib = direction === 'lib';
      const isFw = direction === 'fw';
      const isCompare = direction === 'compare';

      // 좌측 박스: lib 모드는 "내 코드"(주체) / fw 모드는 "프레임워크"(주체)
      const leftActive = isLib || isFw;
      const rightActive = isLib || isFw;

      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">
          <div className="bg-slate-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-slate-600 flex items-center justify-between">
            <span>호출 방향 (Who calls whom?)</span>
            <span className="font-mono text-indigo-600">
              {isLib && 'forward'}

    }

    // ─────────────────────────────────────────────────────
    // ExamplesStrip — 좌측 하단 예시 칩들
    //   kind 별 색상 (라이브러리/프레임워크/내장 표시)
    // ─────────────────────────────────────────────────────
    function ExamplesStrip({ examples }) {
      const kindMap = {

        util:  { bg: 'bg-emerald-100', text: 'text-emerald-800', border: 'border-emerald-300' },
        valid: { bg: 'bg-violet-100',  text: 'text-violet-800',  border: 'border-violet-300' },
        java:  { bg: 'bg-orange-100',  text: 'text-orange-800',  border: 'border-orange-300' },
        py:    { bg: 'bg-emerald-100', text: 'text-emerald-800', border: 'border-emerald-300' },
        ts:    { bg: 'bg-rose-100',    text: 'text-rose-800',    border: 'border-rose-300' },
        react: { bg: 'bg-indigo-100',  text: 'text-indigo-800',  border: 'border-indigo-300' },
        core:  { bg: 'bg-indigo-100',  text: 'text-indigo-800',  border: 'border-indigo-300' },
        pick:  { bg: 'bg-slate-100',   text: 'text-slate-700',   border: 'border-slate-300' },
        route: { bg: 'bg-amber-100',   text: 'text-amber-800',   border: 'border-amber-300' },
        hook:  { bg: 'bg-fuchsia-100', text: 'text-fuchsia-800', border: 'border-fuchsia-300' },
        api:   { bg: 'bg-teal-100',    text: 'text-teal-800',    border: 'border-teal-300' },
        lib:   { bg: 'bg-indigo-100',  text: 'text-indigo-800',  border: 'border-indigo-300' },

      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">
          <div className="bg-slate-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-slate-600">
            대표 예시

    // ─────────────────────────────────────────────────────
    // PositionStack — React/Next 위치 표시 (depth 들여쓰기)
    //   owner: me=indigo / lib=sky / fw=amber
    // ─────────────────────────────────────────────────────
    function PositionStack({ items }) {
      const ownerMap = {
        me:  { bg: 'bg-indigo-100',  text: 'text-indigo-800',  border: 'border-indigo-300', label: 'me'  },
        lib: { bg: 'bg-sky-100',     text: 'text-sky-800',     border: 'border-sky-300',    label: 'lib' },
        fw:  { bg: 'bg-amber-100',   text: 'text-amber-800',   border: 'border-amber-300',  label: 'fw'  },
      };
      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 overflow-hidden">
          <div className="bg-emerald-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-emerald-700 flex items-center justify-between">
            <span>책임 위치 — 누가 무엇을 담당?</span>
            <span className="text-[9px] font-mono text-emerald-600">stack</span>
          </div>
          <div className="p-2.5 space-y-1">
            {items.map((it, idx) => {
              const c = ownerMap[it.owner] || ownerMap.me;
              return (
                <div key={idx} className="flex items-center gap-2 text-[11px] font-mono leading-tight">
                  <span
                    className={`text-[8px] font-bold px-1.5 py-0.5 rounded ${c.bg} ${c.text} border ${c.border} uppercase tracking-wide flex-shrink-0`}
                  >
                    {c.label}
                  </span>
                  <span className="text-slate-700 flex-shrink-0">{it.layer}</span>
                  <span className="text-slate-400 text-[10px]">— {it.role}</span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // FlowArrow — 단계 사이 화살표 (수직)
    // ─────────────────────────────────────────────────────
    function FlowArrow({ label }) {
      return (
        <div className="flex items-center justify-center my-1">
          <div className="flex flex-col items-center">
            <div className="text-[9px] text-indigo-600 font-mono font-bold tracking-wider uppercase">{label}</div>
            <div className="text-indigo-400 text-lg leading-none">↓</div>
          </div>

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    //   상단 : 호출 방향 다이어그램
    //   ↓
    //   중간 : 대표 예시 칩
    //   ↓
    //   하단 : 책임 위치 스택 (React/Next 위치)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">⚛️ 라이브러리 vs 프레임워크 — 호출 방향 시각화</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-1">
            {/* 1) 호출 방향 다이어그램 */}

              actors={step.actors}

          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">

            </span>

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   파일명 탭 + 윈도우 dot + 라인 번호 + 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-indigo-500/15 border-l-2 border-indigo-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="./index.html" className="text-indigo-700 hover:text-indigo-900 font-medium">&larr; 목차로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter II-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">II</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part II. 프론트엔드 큰 그림 &gt; Chapter 1. 개념 정리</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">II-1-1. 프레임워크 vs 라이브러리 — 누가 누구를 부르나</h1>
                  <p className="text-sm text-slate-500 mt-0.5">제어의 역전 (IoC) — React는 라이브러리, Next.js는 프레임워크</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-indigo-50 border-2 border-indigo-300 rounded-xl p-3 text-sm text-indigo-900">
                💡 정리: <strong>라이브러리 = 내가 부르는 도구</strong>(React), <strong>프레임워크 = 나를 부르는 무대</strong>(Next.js). 차이의 본질은 크기가 아니라 <strong>호출 방향(IoC)</strong>이다. 다음(II-1-2)에서는 SPA vs MPA를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-indigo-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-indigo-600 text-white hover:bg-indigo-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Library', 'Framework', 'IoC', 'Inversion of Control', 'React', 'Next.js', 'Hollywood Principle', '제어의 역전'].map((kw) => (
                <span key={kw} className="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-xs font-medium border border-indigo-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./index.html" className="text-indigo-700 hover:text-indigo-900 font-medium">&larr; 목차</a>
              <a href="./chapter-02-02-spa-vs-mpa.html" className="text-indigo-700 hover:text-indigo-900 font-medium">II-1-2 SPA vs MPA &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
