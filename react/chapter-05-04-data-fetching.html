        { key: 'loading',  label: 'loading',  icon: '◌', color: 'amber'   },
        { key: 'success',  label: 'success',  icon: '✓', color: 'emerald' },
        { key: 'error',    label: 'error',    icon: '✕', color: 'rose'    },
        { key: 'race',     label: 'race!',    icon: '⚡', color: 'rose'    },
        { key: 'cleanup',  label: 'cleanup',  icon: '✂', color: 'sky'     },
        { key: 'cache-hit',          label: 'cache-hit',     icon: '⚡', color: 'emerald' },
        { key: 'background-refetch', label: 'bg refetch',    icon: '↻', color: 'violet'  },
        { key: 'swr',     label: 'SWR',     icon: '↻', color: 'violet' },
      ];
      const visible = lifecycle.sequence
        .map((k) => STATES.find((s) => s.key === k))
        .filter(Boolean);
      const active = lifecycle.active;

      const bgFor = (color, on) => {
        const map = {
          slate:   on ? 'bg-slate-200 border-slate-400 text-slate-800'         : 'bg-slate-50 border-slate-200 text-slate-500',
          amber:   on ? 'bg-amber-100 border-amber-400 text-amber-800'         : 'bg-slate-50 border-slate-200 text-slate-500',
          emerald: on ? 'bg-emerald-100 border-emerald-400 text-emerald-800'   : 'bg-slate-50 border-slate-200 text-slate-500',
          rose:    on ? 'bg-rose-100 border-rose-400 text-rose-800'            : 'bg-slate-50 border-slate-200 text-slate-500',
          sky:     on ? 'bg-sky-100 border-sky-400 text-sky-800'               : 'bg-slate-50 border-slate-200 text-slate-500',
          violet:  on ? 'bg-violet-100 border-violet-400 text-violet-800'      : 'bg-slate-50 border-slate-200 text-slate-500',
          indigo:  on ? 'bg-indigo-100 border-indigo-400 text-indigo-800'      : 'bg-slate-50 border-slate-200 text-slate-500',
        };
        return map[color] || map.slate;
      };

      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">
          <div className="bg-slate-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-slate-600 flex justify-between">
            <span>fetch 라이프사이클</span>
            <span className="text-slate-400 font-mono">state machine</span>
          </div>
          <div className="p-3 flex items-center justify-center gap-1.5 flex-wrap">
            {visible.map((s, i) => {
              const on = s.key === active;
              return (
                <React.Fragment key={s.key}>
                  <div className={`px-2.5 py-1.5 rounded-lg border-2 transition-all ${bgFor(s.color, on)} ${on ? 'scale-110 shadow-md' : ''}`}>
                    <div className="text-xs font-bold flex items-center gap-1">
                      <span className="text-sm leading-none">{s.icon}</span>
                      <span>{s.label}</span>
                    </div>
                  </div>
                  {i < visible.length - 1 && (
                    <span className="text-slate-300 text-sm">→</span>
                  )}
                </React.Fragment>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // NetworkTimeline — 요청 타임라인 막대 그래프
    //   각 요청을 가로 막대로 표시 (start/end ms, 색상)
    //   status 라벨로 결과 표시
    // ─────────────────────────────────────────────────────
    function NetworkTimeline({ timeline }) {
      const maxEnd = Math.max(...timeline.map((r) => r.end), 100);
      const colorMap = {
        emerald: 'bg-emerald-400 border-emerald-500',
        rose:    'bg-rose-400 border-rose-500',
        amber:   'bg-amber-400 border-amber-500',
        slate:   'bg-slate-300 border-slate-400',
        sky:     'bg-sky-400 border-sky-500',
        indigo:  'bg-indigo-400 border-indigo-500',
        violet:  'bg-violet-400 border-violet-500',
      };
      const statusBadge = {
        success:     { bg: 'bg-emerald-100', text: 'text-emerald-700', label: '200 OK' },
        cache:       { bg: 'bg-emerald-100', text: 'text-emerald-700', label: 'cache hit' },
        network:     { bg: 'bg-indigo-100',  text: 'text-indigo-700',  label: 'network' },
        swr:         { bg: 'bg-violet-100',  text: 'text-violet-700',  label: 'SWR' },
        wrong:       { bg: 'bg-rose-100',    text: 'text-rose-700',    label: '덮어씀!' },
        overwritten: { bg: 'bg-amber-100',   text: 'text-amber-700',   label: '응답 빠름' },
        stale:       { bg: 'bg-slate-100',   text: 'text-slate-600',   label: '오래된' },
        aborted:     { bg: 'bg-slate-200',   text: 'text-slate-600',   label: '✂ aborted' },
      };

      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">
          <div className="bg-slate-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-slate-600 flex justify-between">
            <span>Network 요청 타임라인</span>
            <span className="text-slate-400 font-mono">DevTools view</span>
          </div>
          <div className="p-2.5 space-y-1.5">
            {timeline.map((r) => {
              const leftPct = (r.start / maxEnd) * 100;
              const widthPct = Math.max(((r.end - r.start) / maxEnd) * 100, 4);
              const badge = statusBadge[r.status] || statusBadge.success;
              return (
                <div key={r.id} className="flex items-center gap-2">
                  <div className="w-44 text-[10px] font-mono text-slate-700 truncate flex-shrink-0">
                    {r.label}
                  </div>
                  <div className="flex-1 relative h-4 bg-slate-50 rounded border border-slate-200">
                    <div
                      className={`absolute top-0 bottom-0 rounded border ${colorMap[r.color] || colorMap.indigo}`}
                      style={{ left: `${leftPct}%`, width: `${widthPct}%` }}
                    />
                  </div>
                  <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded flex-shrink-0 ${badge.bg} ${badge.text}`}>
                    {badge.label}
                  </span>
                </div>
              );
            })}
          </div>
          <div className="bg-slate-50 border-t border-slate-200 px-2.5 py-1 text-[9px] text-slate-400 font-mono flex justify-between">
            <span>0 ms</span>
            <span>{Math.round(maxEnd)} ms</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // CacheBox — React Query 캐시 박스 (Step 4-5 만)
    //   key / state(fresh/stale) / age / source(cache/network/refetch)
    // ─────────────────────────────────────────────────────
    function CacheBox({ cache }) {
      const stateColor = {
        fresh: 'bg-emerald-100 text-emerald-700 border-emerald-300',
        stale: 'bg-amber-100  text-amber-700  border-amber-300',
      };
      const sourceColor = {
        cache:    'text-emerald-600',
        network:  'text-indigo-600',
        refetch:  'text-violet-600',
      };
      return (
        <div className="bg-white rounded-lg border-2 border-indigo-200 overflow-hidden">
          <div className="bg-indigo-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-indigo-700 flex justify-between">
            <span>React Query 캐시</span>
            <span className="font-mono text-indigo-500">stale: {cache.stale} · gc: {cache.gc}</span>
          </div>
          <div className="p-2.5 space-y-1.5">
            {cache.entries.map((e, i) => (
              <div key={i} className="flex items-center gap-2 bg-slate-50 rounded px-2 py-1.5 border border-slate-200">
                <span className="text-[10px] font-mono text-slate-700 flex-1 truncate">{e.key}</span>
                <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded border ${stateColor[e.state]}`}>{e.state}</span>
                <span className="text-[9px] text-slate-500 font-mono w-10 text-right">{e.age}</span>
                <span className={`text-[9px] font-bold w-14 text-right ${sourceColor[e.source]}`}>{e.source}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    //   상단 : fetch 라이프사이클 박스
    //   중간 : Network 요청 타임라인
    //   하단 : React Query 캐시 박스 (있을 때만)
    //   푸터 : 핵심 포인트
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🌐 fetch 라이프사이클 + Network 타임라인</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2.5">
            <LifecycleBox lifecycle={step.lifecycle} />
            <NetworkTimeline timeline={step.timeline} />
            {step.cache && <CacheBox cache={step.cache} />}
          </div>

          {/* 핵심 포인트 */}
          <div className="mt-3 bg-indigo-50 border-l-4 border-indigo-400 px-3 py-2 rounded-r">
            <div className="text-[9px] font-bold text-indigo-600 uppercase tracking-wider mb-0.5">핵심 포인트</div>
            <p className="text-[11px] text-indigo-900 leading-snug">{step.keyPoint}</p>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-emerald-400"></span>success</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-amber-400"></span>loading</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-rose-400"></span>race / error</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-sky-400"></span>cleanup</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-indigo-400"></span>network</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded bg-violet-400"></span>SWR</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   파일명 탭 + 윈도우 dot + 라인 번호 + 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-indigo-500/15 border-l-2 border-indigo-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="./index.html" className="text-indigo-700 hover:text-indigo-900 font-medium">&larr; 목차로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter V-1-4</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">V</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part V. 비동기 &amp; 데이터 &gt; Chapter 1. 서버 통신</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">V-1-4. 서버 데이터 fetch — fetch + React Query</h1>
                  <p className="text-sm text-slate-500 mt-0.5">useEffect+fetch 의 race condition 부터 React Query 의 cache + SWR 까지</p>
                </div>
              </div>
            </header>

            {/* Step 진행 바 */}
            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button
                  key={s.title}
                  onClick={() => { setStepIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= stepIdx ? 'bg-indigo-500' : 'bg-slate-200'}`}
                  aria-label={`Step ${i + 1}`}
                />
              ))}
            </div>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-indigo-50 border-2 border-indigo-300 rounded-xl p-3 text-sm text-indigo-900">
                💡 정리: <strong>useEffect+fetch</strong> 는 race condition / cleanup 을 직접 처리해야 한다. <strong>React Query</strong> 는 queryKey 로 캐시를 식별하고 <strong>stale-while-revalidate</strong> 패턴으로 항상 최신 데이터를 보장한다. 서버 상태는 React Query, 클라이언트 상태는 useState/Zustand 로 분리하자.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-indigo-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={() => { prevRef.current(); setIsPlaying(false); }}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-4 py-1.5 rounded-lg text-sm font-medium bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                ← 이전
              </button>
              <button
                onClick={togglePlay}
                aria-label={isPlaying ? '정지' : '자동 재생'}
                className={`px-5 py-1.5 rounded-lg text-sm font-bold shadow-sm transition ${
                  isPlaying ? 'bg-rose-500 hover:bg-rose-600 text-white' : 'bg-indigo-600 hover:bg-indigo-700 text-white'
                }`}
              >
                {isPlaying ? '⏸ 정지' : '▶ 자동재생'}
              </button>
              <button
                onClick={() => { nextRef.current(); setIsPlaying(false); }}
                disabled={stepIdx === STEPS.length - 1}
                aria-label="다음 단계"
                className="px-4 py-1.5 rounded-lg text-sm font-medium bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 →
              </button>
            </div>

            <footer className="text-center text-xs text-slate-400 pb-4 pt-2">
              React 18 UMD + Babel Standalone + Tailwind Play CDN + highlight.js 11.9.0 (atom-one-dark) · 2026-05-11
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
