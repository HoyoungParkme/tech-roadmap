<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서버에서 데이터 가져오기 — fetch / React Query — Chapter V-1-4</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter V-1-4 — 서버에서 데이터 가져오기: fetch / React Query -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1 — useEffect + fetch 패턴',
        desc: 'API 데이터를 가져오는 가장 기본적인 방법입니다. useEffect 안에서 fetch를 호출하고, loading/error/data 세 가지 상태를 직접 관리합니다. 동작은 하지만 코드가 길고 반복됩니다.',
        code: 'function UserList() {\n  const [data, setData] = useState(null);\n  const [loading, setLoading] = useState(true);\n  const [error, setError] = useState(null);\n\n  useEffect(() => {\n    fetch("/api/users")\n      .then(res => res.json())\n      .then(data => {\n        setData(data);\n        setLoading(false);\n      })\n      .catch(err => {\n        setError(err);\n        setLoading(false);\n      });\n  }, []);\n\n  if (loading) return <p>로딩 중...</p>;\n  if (error) return <p>에러 발생!</p>;\n  return <ul>{data.map(u => <li key={u.id}>{u.name}</li>)}</ul>;\n}',
        visual: 'fetch-flow',
      },
      {
        title: 'Step 2 — 반복되는 보일러플레이트',
        desc: '모든 API 호출마다 loading/error/data 상태 3개 + useEffect + try/catch를 반복 작성해야 합니다. 캐싱? 리패치? 중복 요청 방지? 전부 직접 구현해야 합니다.',
        code: '// 매번 반복되는 패턴 (보일러플레이트)\n// ↓ 이 코드가 API 호출할 때마다 복사됨\n\n// 1. state 3개 선언 (loading, error, data)\n// 2. useEffect + fetch\n// 3. try/catch 에러 처리\n// 4. 로딩/에러/성공 분기 렌더링\n\n// 직접 구현해야 하는 것들:\n// ❌ 캐싱 (같은 데이터 다시 안 불러오기)\n// ❌ 백그라운드 리패치 (탭 돌아올 때)\n// ❌ 중복 요청 방지\n// ❌ 자동 재시도\n// ❌ 로딩 스피너 관리',
        visual: 'boilerplate',
      },
      {
        title: 'Step 3 — React Query: useQuery 한 줄',
        desc: 'TanStack Query(구 React Query)는 위의 모든 문제를 한 줄로 해결합니다. useQuery(queryKey, fetchFn)만 호출하면 loading, error, data를 자동 관리하고, 캐싱과 리패치도 처리합니다.',
        code: 'import { useQuery } from "@tanstack/react-query";\n\nfunction UserList() {\n  const { data, isLoading, error } = useQuery({\n    queryKey: ["users"],\n    queryFn: () => fetch("/api/users").then(r => r.json()),\n  });\n\n  if (isLoading) return <p>로딩 중...</p>;\n  if (error) return <p>에러: {error.message}</p>;\n\n  return (\n    <ul>\n      {data.map(u => <li key={u.id}>{u.name}</li>)}\n    </ul>\n  );\n}',
        visual: 'query-flow',
      },
      {
        title: 'Step 4 — 캐싱과 리패치',
        desc: 'React Query의 핵심은 캐싱입니다. 같은 queryKey로 요청하면 캐시된 데이터를 즉시 보여주고, 백그라운드에서 서버와 동기화합니다. staleTime(신선도)과 gcTime(캐시 유지 시간)으로 세밀하게 제어합니다.',
        code: 'const { data } = useQuery({\n  queryKey: ["users"],\n  queryFn: fetchUsers,\n  staleTime: 5 * 60 * 1000,  // 5분간 "신선"\n  gcTime: 30 * 60 * 1000,    // 30분간 캐시 유지\n});\n\n// 시나리오:\n// 1. 첫 방문 → 서버에서 가져옴 (로딩 표시)\n// 2. 5분 내 재방문 → 캐시에서 즉시 표시 (서버 요청 X)\n// 3. 5분 후 재방문 → 캐시 먼저 표시 + 백그라운드 리패치\n// 4. 탭 전환 후 돌아오면 → 자동으로 최신 데이터 확인',
        visual: 'cache',
      },
      {
        title: 'Step 5 — 서버 상태 vs 클라이언트 상태',
        desc: '모던 React에서는 "서버 상태"(API 데이터)와 "클라이언트 상태"(UI 토글, 폼 입력)를 분리합니다. 서버 상태는 React Query가, 클라이언트 상태는 useState/Zustand가 담당합니다.',
        code: null,
        visual: 'separation',
      },
    ];

    function FetchFlowVisual() {
      const [phase, setPhase] = useState(0);
      useEffect(() => {
        const timer = setInterval(() => setPhase(p => (p + 1) % 4), 1500);
        return () => clearInterval(timer);
      }, []);

      const phases = ['요청 시작', 'loading...', '응답 수신', '렌더링'];
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">useEffect + fetch 흐름</div>
          <div className="flex items-center gap-2 justify-center">
            {phases.map((label, i) => (
              <React.Fragment key={label}>
                <div className={`px-3 py-2 rounded-lg text-[10px] font-bold border-2 transition-all ${
                  i === phase ? 'bg-indigo-100 border-indigo-400 text-indigo-700 scale-110' : 'bg-slate-50 border-slate-200 text-slate-500'
                }`}>{label}</div>
                {i < phases.length - 1 && <span className="text-slate-300">→</span>}
              </React.Fragment>
            ))}
          </div>
          <div className="mt-3 text-center text-[10px] text-slate-500">
            {phase === 0 && 'fetch() 호출'}
            {phase === 1 && 'setLoading(true) → 스피너 표시'}
            {phase === 2 && 'setData(response) + setLoading(false)'}
            {phase === 3 && 'data.map()으로 UI 렌더링'}
          </div>
        </div>
      );
    }

    function BoilerplateVisual() {
      const items = [
        { label: 'useState x3', desc: 'loading, error, data', manual: true },
        { label: 'useEffect', desc: 'fetch 호출', manual: true },
        { label: 'try/catch', desc: '에러 처리', manual: true },
        { label: '캐싱', desc: '같은 데이터 재사용', manual: true },
        { label: '리패치', desc: '탭 돌아올 때', manual: true },
        { label: '중복 방지', desc: '같은 요청 여러 번', manual: true },
      ];
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">직접 구현해야 하는 것들</div>
          <div className="grid grid-cols-2 gap-2">
            {items.map((item) => (
              <div key={item.label} className="bg-red-50 border border-red-200 rounded-lg px-3 py-2">
                <div className="text-[10px] font-bold text-red-600">{item.label}</div>
                <div className="text-[9px] text-red-500">{item.desc}</div>
              </div>
            ))}
          </div>
          <div className="mt-2 text-center text-[10px] text-red-500 font-bold">매번 이걸 다 직접 짜야 한다면...?</div>
        </div>
      );
    }

    function QueryFlowVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">React Query가 자동 처리하는 것</div>
          <div className="grid grid-cols-2 gap-2">
            {[
              { label: 'loading 관리', icon: '⏳' },
              { label: 'error 관리', icon: '🚨' },
              { label: '캐싱', icon: '💾' },
              { label: '백그라운드 리패치', icon: '🔄' },
              { label: '중복 요청 방지', icon: '🛡️' },
              { label: '자동 재시도', icon: '♻️' },
            ].map((item) => (
              <div key={item.label} className="bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2 flex items-center gap-2">
                <span>{item.icon}</span>
                <span className="text-[10px] font-bold text-emerald-700">{item.label}</span>
              </div>
            ))}
          </div>
          <div className="mt-2 text-center text-[10px] text-emerald-600 font-bold">useQuery() 한 줄이면 전부 자동!</div>
        </div>
      );
    }

    function CacheVisual() {
      const [scenario, setScenario] = useState(0);
      const scenarios = [
        { label: '첫 방문', action: '서버 요청', cache: '비어있음', result: '로딩 → 데이터 표시', icon: '🌐' },
        { label: '5분 내 재방문', action: '서버 요청 X', cache: '신선한 캐시', result: '즉시 표시!', icon: '⚡' },
        { label: '5분 후 재방문', action: '백그라운드 리패치', cache: '오래된 캐시', result: '캐시 먼저 + 업데이트', icon: '🔄' },
        { label: '탭 전환 후 복귀', action: '자동 확인', cache: '캐시 + 검증', result: '최신 데이터 보장', icon: '👀' },
      ];
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">캐싱 시나리오</div>
          <div className="space-y-2">
            {scenarios.map((s, i) => (
              <button key={s.label} onClick={() => setScenario(i)}
                className={`w-full text-left p-3 rounded-xl border-2 transition ${
                  scenario === i ? 'border-indigo-400 bg-indigo-50' : 'border-slate-200 hover:border-slate-300'
                }`}>
                <div className="flex items-center gap-3">
                  <span className="text-lg">{s.icon}</span>
                  <div className="flex-1">
                    <div className="text-xs font-bold text-slate-800">{s.label}</div>
                    {scenario === i && (
                      <div className="mt-1 space-y-0.5 text-[10px] text-slate-600">
                        <div>서버: {s.action}</div>
                        <div>캐시: {s.cache}</div>
                        <div className="font-bold text-indigo-600">결과: {s.result}</div>
                      </div>
                    )}
                  </div>
                </div>
              </button>
            ))}
          </div>
        </div>
      );
    }

    function SeparationVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">서버 상태 vs 클라이언트 상태</div>
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-indigo-50 border-2 border-indigo-200 rounded-xl p-3">
              <div className="text-xs font-bold text-indigo-700 mb-2">서버 상태</div>
              <div className="text-[10px] text-indigo-600 mb-2">React Query / SWR</div>
              <div className="space-y-1">
                {['사용자 목록', 'API 응답', '상품 데이터', '댓글'].map((item) => (
                  <div key={item} className="bg-indigo-100 rounded px-2 py-0.5 text-[10px] text-indigo-700">{item}</div>
                ))}
              </div>
              <div className="mt-2 text-[9px] text-indigo-500">서버에 원본이 있는 데이터</div>
            </div>
            <div className="bg-amber-50 border-2 border-amber-200 rounded-xl p-3">
              <div className="text-xs font-bold text-amber-700 mb-2">클라이언트 상태</div>
              <div className="text-[10px] text-amber-600 mb-2">useState / Zustand</div>
              <div className="space-y-1">
                {['모달 열림/닫힘', '폼 입력값', '테마 설정', '사이드바 토글'].map((item) => (
                  <div key={item} className="bg-amber-100 rounded px-2 py-0.5 text-[10px] text-amber-700">{item}</div>
                ))}
              </div>
              <div className="mt-2 text-[9px] text-amber-500">브라우저에만 존재하는 데이터</div>
            </div>
          </div>
        </div>
      );
    }

    function CodePanel({ code }) {
      if (!code) return null;
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5"><div className="w-3 h-3 rounded-full bg-red-500"></div><div className="w-3 h-3 rounded-full bg-yellow-500"></div><div className="w-3 h-3 rounded-full bg-emerald-500"></div></div>
            <span className="text-[10px] text-slate-500 ml-2">UserList.jsx</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => { setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; }); };
      const nextRef = useRef(next); nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const VISUAL_MAP = { 'fetch-flow': FetchFlowVisual, boilerplate: BoilerplateVisual, 'query-flow': QueryFlowVisual, cache: CacheVisual, separation: SeparationVisual };
      const VisualComponent = VISUAL_MAP[step.visual];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-indigo-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">V</div>
                <h1 className="text-2xl font-bold text-slate-800">서버에서 데이터 가져오기 — fetch / React Query</h1>
              </div>
              <p className="text-slate-600 text-sm">useEffect+fetch의 한계를 이해하고 <b>TanStack Query</b>의 캐싱·리패치를 시각화합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter V-1-4 | ★★★ | 선수 지식 V-1-3 | 2026-04-21</p>
            </header>

            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.title} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-indigo-500' : 'bg-slate-200'}`} aria-label={`Step ${i + 1}`} />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                <CodePanel code={step.code} />
                {VisualComponent && <VisualComponent />}
              </div>
              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-indigo-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>
              </div>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }} disabled={idx === 0} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="이전 단계">← 이전</button>
              <button onClick={() => { if (isEnd) { setIdx(0); } setIsPlaying(p => !p); }} className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-indigo-500 hover:bg-indigo-600 text-white'}`} aria-label={isPlaying ? '정지' : '자동 실행'}>{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }} disabled={isEnd} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="다음 단계">다음 →</button>
            </div>
            <footer className="text-center text-xs text-slate-400 pb-4">React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-21</footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
