<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React를 선택하는 기준 — Chapter II-1-5</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter II-1-5 — React를 선택하는 기준 -->
  <script type="text/babel">
    const { useState } = React;

    const SCENARIOS = [
      {
        question: '복잡한 UI 상태가 많은 SaaS 대시보드를 만들려 합니다.',
        answer: 'React',
        reason: '풍부한 상태 관리 생태계(Zustand, Redux), 컴포넌트 단위 설계에 최적화. 가장 많은 UI 라이브러리 지원.',
        icon: '📊',
        fit: 'perfect',
      },
      {
        question: 'SEO가 극도로 중요한 블로그/뉴스 사이트를 만들려 합니다.',
        answer: 'Next.js (React 기반) 또는 Astro',
        reason: 'React 단독 SPA는 SEO가 약하지만, Next.js의 SSR/SSG로 해결. Astro는 정적 사이트에 더 가벼운 대안.',
        icon: '📰',
        fit: 'conditional',
      },
      {
        question: '팀이 5명 이상이고 엔터프라이즈급 내부 시스템을 만듭니다.',
        answer: 'Angular 또는 React + 컨벤션',
        reason: 'Angular는 일관된 구조가 강제되어 대규모 팀에 적합. React도 가능하지만 팀 컨벤션을 별도로 정해야 한다.',
        icon: '🏢',
        fit: 'alternative',
      },
      {
        question: '아주 단순한 랜딩 페이지 하나만 만들면 됩니다.',
        answer: 'HTML + CSS (프레임워크 불필요)',
        reason: '간단한 정적 사이트에 React는 과하다. 바닐라 HTML/CSS나 Tailwind만으로 충분. 오버엔지니어링 주의.',
        icon: '📄',
        fit: 'overkill',
      },
      {
        question: '웹 + iOS + Android를 한 팀이 동시에 개발합니다.',
        answer: 'React + React Native',
        reason: 'React를 익히면 React Native로 모바일 앱도 만들 수 있다. 코드 완전 공유는 아니지만 개념·패턴이 동일.',
        icon: '📱',
        fit: 'perfect',
      },
      {
        question: '빠른 프로토타이핑이 필요하고 팀이 Vue에 익숙합니다.',
        answer: 'Vue',
        reason: '팀의 기존 역량이 가장 중요. Vue에 익숙한 팀이 React로 갈아타는 비용은 크다. 도구는 상황에 맞게 선택.',
        icon: '🔧',
        fit: 'alternative',
      },
    ];

    const FIT_STYLES = {
      perfect: { label: 'React 최적', bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-700' },
      conditional: { label: 'React + 보완 필요', bg: 'bg-sky-50', border: 'border-sky-300', text: 'text-sky-700' },
      alternative: { label: '다른 선택지 고려', bg: 'bg-amber-50', border: 'border-amber-300', text: 'text-amber-700' },
      overkill: { label: 'React 불필요', bg: 'bg-red-50', border: 'border-red-300', text: 'text-red-700' },
    };

    function App() {
      const [selectedIdx, setSelectedIdx] = useState(null);
      const selected = selectedIdx !== null ? SCENARIOS[selectedIdx] : null;

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">II</div>
                <h1 className="text-2xl font-bold text-slate-800">React를 선택하는 기준</h1>
              </div>
              <p className="text-slate-600 text-sm">프로젝트 상황별로 React가 적합한지 판단하는 인터랙티브 가이드. <b>시나리오를 클릭</b>해 보세요.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter II-1-5 | ★★☆ | 선수 지식 II-1-4 | 2026-04-20</p>
            </header>

            <div className="bg-violet-600 text-white p-4 rounded-xl shadow-sm">
              <p className="text-sm font-medium">"어떤 프로젝트를 만드느냐"에 따라 최적의 도구가 달라집니다. 아래 시나리오를 클릭해 판단 기준을 확인하세요.</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              {/* 시나리오 목록 */}
              <div className="space-y-2">
                {SCENARIOS.map((s, i) => {
                  const fit = FIT_STYLES[s.fit];
                  return (
                    <button
                      key={s.question}
                      onClick={() => setSelectedIdx(i)}
                      className={`w-full text-left p-4 rounded-xl border-2 transition-all ${
                        selectedIdx === i
                          ? `${fit.bg} ${fit.border} shadow-md`
                          : 'bg-white border-slate-200 hover:border-slate-300'
                      }`}
                    >
                      <div className="flex items-start gap-3">
                        <span className="text-xl mt-0.5">{s.icon}</span>
                        <div>
                          <p className="text-sm text-slate-800 leading-relaxed">{s.question}</p>
                          <span className={`inline-block mt-1 text-[10px] px-2 py-0.5 rounded-full font-bold ${fit.bg} ${fit.text} ${fit.border} border`}>{fit.label}</span>
                        </div>
                      </div>
                    </button>
                  );
                })}
              </div>

              {/* 답변 상세 */}
              <div className="bg-slate-800 rounded-xl p-6 border border-slate-700 min-h-[350px] flex flex-col justify-center">
                {selected ? (
                  <div className="space-y-4">
                    <div className="text-center">
                      <span className="text-4xl">{selected.icon}</span>
                      <h3 className="text-lg font-bold text-white mt-2">{selected.answer}</h3>
                      <span className={`inline-block mt-1 text-xs px-3 py-1 rounded-full font-bold ${FIT_STYLES[selected.fit].bg} ${FIT_STYLES[selected.fit].text}`}>
                        {FIT_STYLES[selected.fit].label}
                      </span>
                    </div>
                    <div className="bg-slate-700/50 rounded-lg p-4">
                      <p className="text-sm text-slate-300 leading-relaxed">{selected.reason}</p>
                    </div>
                    <div className="bg-slate-900 rounded-lg p-3">
                      <div className="text-[10px] text-slate-400 font-bold mb-1">시나리오</div>
                      <p className="text-xs text-slate-300">{selected.question}</p>
                    </div>
                  </div>
                ) : (
                  <div className="text-center text-slate-500">
                    <p className="text-sm">← 시나리오를 선택하면</p>
                    <p className="text-sm">추천과 이유가 표시됩니다</p>
                  </div>
                )}
              </div>
            </div>

            <div className="bg-white border border-slate-200 rounded-xl p-4 text-xs text-slate-500 space-y-1">
              <div className="font-bold text-slate-700 mb-2">기술 참고</div>
              <div><b>핵심 원칙</b>: 도구는 문제에 맞게 선택한다. "React가 최고"가 아니라 "이 상황에 React가 적합한가"를 판단한다.</div>
              <div><b>Next.js</b>: React + SSR/SSG. SEO가 필요하면 React 단독이 아니라 Next.js를 선택한다.</div>
              <div><b>Astro</b>: 콘텐츠 중심 정적 사이트에 최적화. React/Vue/Svelte 컴포넌트를 섞어 쓸 수 있다.</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
