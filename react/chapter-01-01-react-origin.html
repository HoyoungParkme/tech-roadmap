<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React가 등장한 이유 — Chapter I-1-4</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    Chapter I-1-4 — React가 등장한 이유: Facebook의 뉴스피드 문제
    학습 목표: React가 왜 만들어졌는지 역사적 배경을 이야기할 수 있다.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1 — 2011년 Facebook 뉴스피드',
        desc: 'Facebook의 뉴스피드는 좋아요 수, 댓글 수, 알림 배지, 채팅 상태가 실시간으로 변합니다. 이 모든 것이 같은 페이지에서 동시에 업데이트되어야 했습니다.',
        visual: 'feed',
        badge: { likes: 42, comments: 7, notifications: 3, chatOnline: 5 },
        year: 2011,
        problem: false,
      },
      {
        title: 'Step 2 — 각자 다른 코드가 DOM을 수정',
        desc: '좋아요 버튼 코드, 댓글 코드, 알림 코드, 채팅 코드가 각각 독립적으로 DOM을 직접 수정합니다. 서로의 존재를 모르는 채 같은 화면을 건드립니다.',
        visual: 'scripts',
        badge: { likes: 43, comments: 7, notifications: 3, chatOnline: 5 },
        year: 2011,
        problem: false,
      },
      {
        title: 'Step 3 — 화면 불일치 버그!',
        desc: '좋아요를 눌렀더니 숫자는 올라갔지만 알림 배지는 안 바뀝니다. 댓글을 달았는데 댓글 수는 올라가고 좋아요 수가 초기화됩니다. 어디서 버그가 생겼는지 추적하기 어렵습니다.',
        visual: 'bug',
        badge: { likes: 0, comments: 8, notifications: 3, chatOnline: 5 },
        year: 2011,
        problem: true,
      },
      {
        title: 'Step 4 — Jordan Walke의 해결 아이디어',
        desc: 'Facebook 엔지니어 Jordan Walke가 핵심 아이디어를 제안합니다: "상태(state)가 바뀌면 UI 전체를 다시 그리자. 단, 똑똑하게 — 바뀐 부분만 업데이트하자."',
        visual: 'idea',
        badge: null,
        year: 2013,
        problem: false,
      },
      {
        title: 'Step 5 — 단방향 데이터 흐름',
        desc: 'React의 핵심: 데이터는 항상 한 방향으로만 흐릅니다. State → Component → UI. UI에서 이벤트가 발생하면 State를 바꾸고, 바뀐 State로 UI를 다시 그립니다.',
        visual: 'flow',
        badge: null,
        year: 2013,
        problem: false,
      },
      {
        title: 'Step 6 — 2013년 오픈소스 공개',
        desc: 'React는 2013년 JSConf에서 오픈소스로 공개되었습니다. 처음에는 "JSX? HTML을 JS에 섞는다고?" 하며 회의적 반응이 많았지만, 복잡한 UI 문제를 깔끔하게 해결하면서 빠르게 확산되었습니다.',
        visual: 'timeline',
        badge: null,
        year: 2013,
        problem: false,
      },
    ];

    // 뉴스피드 시뮬레이션
    function NewsFeedSimulation({ visual, badge, problem }) {
      if (visual === 'feed' || visual === 'scripts' || visual === 'bug') {
        return (
          <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
            <div className="text-xs text-slate-400 uppercase tracking-wider mb-3 font-bold">Facebook 뉴스피드 (시뮬레이션)</div>
            <div className={`bg-white rounded-lg overflow-hidden transition-all ${problem ? 'ring-2 ring-red-400' : ''}`}>
              {/* 헤더 바 */}
              <div className="bg-blue-600 px-3 py-2 flex justify-between items-center">
                <span className="text-white font-bold text-sm">facebook</span>
                <div className="flex gap-3 text-white text-xs">
                  <span className="relative">알림 <span className={`absolute -top-1 -right-3 px-1 rounded-full text-[9px] ${problem ? 'bg-red-500' : 'bg-red-500'}`}>{badge.notifications}</span></span>
                  <span>채팅({badge.chatOnline})</span>
                </div>
              </div>
              {/* 포스트 */}
              <div className="p-3 border-b">
                <div className="flex items-center gap-2 mb-2">
                  <div className="w-8 h-8 bg-slate-300 rounded-full"></div>
                  <div className="text-xs"><div className="font-bold">홍길동</div><div className="text-slate-400">2분 전</div></div>
                </div>
                <p className="text-sm text-slate-700 mb-2">오늘 점심 맛집 발견!</p>
                <div className="flex gap-4 text-xs text-slate-500">
                  <span className={problem && badge.likes === 0 ? 'text-red-500 font-bold' : ''}>
                    👍 좋아요 {badge.likes} {problem && badge.likes === 0 && '← 초기화됨!'}
                  </span>
                  <span>💬 댓글 {badge.comments}</span>
                </div>
              </div>
              {visual === 'scripts' && (
                <div className="p-2 bg-yellow-50 text-[10px] text-yellow-700 space-y-0.5">
                  <div>📄 likes.js → #like-count 수정 중</div>
                  <div>📄 comments.js → #comment-count 수정 중</div>
                  <div>📄 notifications.js → #badge 수정 중</div>
                  <div>📄 chat.js → #online-status 수정 중</div>
                </div>
              )}
              {problem && (
                <div className="p-2 bg-red-50 text-[10px] text-red-600 font-bold">
                  버그: 좋아요 수가 0으로 초기화됨! 스크립트 간 DOM 충돌
                </div>
              )}
            </div>
          </div>
        );
      }

      if (visual === 'idea') {
        return (
          <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
            <div className="text-xs text-slate-400 uppercase tracking-wider mb-3 font-bold">Jordan Walke의 아이디어</div>
            <div className="bg-white rounded-lg p-4 text-center space-y-3">
              <div className="text-3xl">💡</div>
              <p className="text-sm font-bold text-slate-800">"State가 바뀌면 UI를 다시 그리자"</p>
              <div className="flex items-center justify-center gap-2 text-xs">
                <span className="bg-sky-100 text-sky-700 px-2 py-1 rounded font-bold">State 변경</span>
                <span className="text-slate-400">→</span>
                <span className="bg-amber-100 text-amber-700 px-2 py-1 rounded font-bold">전체 다시 그림</span>
                <span className="text-slate-400">→</span>
                <span className="bg-emerald-100 text-emerald-700 px-2 py-1 rounded font-bold">바뀐 부분만 반영</span>
              </div>
              <p className="text-[11px] text-slate-500">이것이 Virtual DOM의 시작점</p>
            </div>
          </div>
        );
      }

      if (visual === 'flow') {
        return (
          <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
            <div className="text-xs text-slate-400 uppercase tracking-wider mb-3 font-bold">단방향 데이터 흐름</div>
            <div className="bg-white rounded-lg p-4">
              <div className="flex items-center justify-between text-center">
                <div className="flex-1">
                  <div className="w-16 h-16 mx-auto bg-sky-100 border-2 border-sky-400 rounded-xl flex items-center justify-center text-sm font-bold text-sky-700">State</div>
                  <div className="text-[10px] text-slate-500 mt-1">데이터</div>
                </div>
                <div className="text-sky-400 text-xl font-bold">→</div>
                <div className="flex-1">
                  <div className="w-16 h-16 mx-auto bg-amber-100 border-2 border-amber-400 rounded-xl flex items-center justify-center text-sm font-bold text-amber-700">Render</div>
                  <div className="text-[10px] text-slate-500 mt-1">컴포넌트</div>
                </div>
                <div className="text-amber-400 text-xl font-bold">→</div>
                <div className="flex-1">
                  <div className="w-16 h-16 mx-auto bg-emerald-100 border-2 border-emerald-400 rounded-xl flex items-center justify-center text-sm font-bold text-emerald-700">UI</div>
                  <div className="text-[10px] text-slate-500 mt-1">화면</div>
                </div>
              </div>
              <div className="mt-4 flex justify-center">
                <div className="bg-slate-100 rounded-lg px-3 py-1 text-xs text-slate-600">
                  이벤트 발생 → State 업데이트 → UI 자동 반영 ↩
                </div>
              </div>
            </div>
          </div>
        );
      }

      // timeline
      return (
        <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
          <div className="text-xs text-slate-400 uppercase tracking-wider mb-3 font-bold">React 타임라인</div>
          <div className="bg-white rounded-lg p-4 space-y-3">
            {[
              { year: 2011, event: 'Facebook 내부에서 뉴스피드 UI 문제 심화', color: 'bg-red-100 border-red-300 text-red-700' },
              { year: 2012, event: 'Jordan Walke가 FaxJS(React 전신) 개발', color: 'bg-amber-100 border-amber-300 text-amber-700' },
              { year: 2013, event: 'JSConf에서 React 오픈소스 공개', color: 'bg-emerald-100 border-emerald-300 text-emerald-700' },
              { year: 2015, event: 'React Native 공개 (모바일)', color: 'bg-sky-100 border-sky-300 text-sky-700' },
              { year: 2019, event: 'Hooks 도입 (함수형 컴포넌트 시대)', color: 'bg-purple-100 border-purple-300 text-purple-700' },
              { year: 2022, event: 'React 18 출시 (Concurrent Mode)', color: 'bg-blue-100 border-blue-300 text-blue-700' },
            ].map(item => (
              <div key={item.year} className={`flex items-center gap-3 px-3 py-2 rounded-lg border ${item.color}`}>
                <span className="text-sm font-bold w-12">{item.year}</span>
                <span className="text-xs">{item.event}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => { setCurrentStepIdx(p => { if (p < STEPS.length-1) return p+1; setIsPlaying(false); return p; }); };
      const handleNextRef = useRef(handleNext); handleNextRef.current = handleNext;
      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(p => p-1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 3500); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">I</div>
                <h1 className="text-2xl font-bold text-slate-800">React가 등장한 이유</h1>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                2011년 <b>Facebook 뉴스피드</b>의 화면 불일치 문제에서 출발해,
                React가 어떻게 탄생하고 성장했는지 역사를 따라갑니다.
              </p>
              <p className="mt-2 text-[11px] text-slate-400 italic">
                Chapter I-1-4 | 난이도 ★☆☆ | 선수 지식 I-1-3 | 2026-04-20
              </p>
            </header>

            <div className={`${stepData.problem ? 'bg-red-600' : 'bg-amber-600'} text-white p-5 rounded-xl shadow-sm min-h-[80px] transition-colors`}>
              <div className="text-xs font-bold text-amber-200 mb-1 uppercase tracking-wider">{stepData.title}</div>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            <NewsFeedSimulation visual={stepData.visual} badge={stepData.badge} problem={stepData.problem} />

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-3">
              <div className="flex items-center space-x-2">
                <button onClick={handlePrev} disabled={currentStepIdx === 0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button onClick={togglePlay} className="flex items-center px-4 py-2 rounded bg-amber-600 hover:bg-amber-700 text-white font-medium transition shadow-sm w-32 justify-center">
                  {isPlaying ? '정지' : '자동 실행'}
                </button>
                <button onClick={() => { handleNext(); setIsPlaying(false); }} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 transition">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step {currentStepIdx + 1} / {STEPS.length}</div>
            </div>

            <div className="bg-white border border-slate-200 rounded-xl p-4 text-xs text-slate-500 space-y-1">
              <div className="font-bold text-slate-700 mb-2">기술 참고</div>
              <div><b>Jordan Walke</b>: React 최초 제작자. PHP의 XHP 컴포넌트에서 영감을 받았다.</div>
              <div><b>단방향 데이터 흐름</b>: State → Component → UI. 양방향 바인딩(Angular v1)의 복잡성을 해결한다.</div>
              <div><b>Virtual DOM</b>: React 성능의 핵심. "전체를 다시 그려도 빠른" 이유는 실제 DOM이 아닌 메모리 상의 가상 트리에서 먼저 비교하기 때문이다.</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
