<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>첫 컴포넌트 만들기 — Chapter III-1-2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter III-1-2 — 첫 컴포넌트 만들기 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // =========================================================
    // 1. STEPS 정의 — 컴포넌트 개념 5단계
    // =========================================================
    const STEPS = [
      {
        title: 'Step 1 — 컴포넌트란?',
        desc: 'React에서 UI의 기본 단위는 "컴포넌트(Component)"입니다. 레고 블록처럼, 작은 조각을 조합해 큰 화면을 만듭니다. 버튼 하나, 카드 하나가 각각 컴포넌트입니다.',
        code: '// 레고 블록 = 컴포넌트\n// 🟦 Header 블록\n// 🟩 Content 블록\n// 🟨 Footer 블록\n//\n// 합치면 → 완성된 페이지!',
        blocks: [
          { name: '버튼', color: 'bg-sky-100 border-sky-300', icon: '🔘' },
          { name: '카드', color: 'bg-emerald-100 border-emerald-300', icon: '📋' },
          { name: '헤더', color: 'bg-violet-100 border-violet-300', icon: '📌' },
          { name: '사이드바', color: 'bg-amber-100 border-amber-300', icon: '📂' },
        ],
        assembled: false,
      },
      {
        title: 'Step 2 — 함수형 컴포넌트',
        desc: '컴포넌트는 JavaScript 함수입니다. JSX(HTML처럼 생긴 문법)를 반환하면 화면에 그려집니다. 이름은 반드시 대문자로 시작해야 합니다.',
        code: 'function Greeting() {\n  return (\n    <div>\n      <h1>안녕하세요!</h1>\n      <p>첫 번째 컴포넌트입니다.</p>\n    </div>\n  );\n}',
        blocks: [],
        assembled: false,
        showPreview: true,
        previewContent: { tag: 'Greeting', html: '<h1>안녕하세요!</h1><p>첫 번째 컴포넌트입니다.</p>' },
      },
      {
        title: 'Step 3 — 컴포넌트 조합',
        desc: '작은 컴포넌트를 조합해 큰 컴포넌트를 만듭니다. Header, Content, Footer를 각각 만들고, Page 안에서 합칩니다. 이것이 React의 핵심 — "합성(Composition)"입니다.',
        code: 'function Header() {\n  return <header>📌 헤더</header>;\n}\n\nfunction Content() {\n  return <main>📋 본문</main>;\n}\n\nfunction Footer() {\n  return <footer>📎 푸터</footer>;\n}\n\nfunction Page() {\n  return (\n    <div>\n      <Header />\n      <Content />\n      <Footer />\n    </div>\n  );\n}',
        blocks: [],
        assembled: true,
      },
      {
        title: 'Step 4 — 대문자 규칙',
        desc: '컴포넌트 이름은 반드시 대문자로 시작합니다. 소문자로 시작하면 React가 HTML 태그로 인식합니다. `<div>`는 HTML 태그이고, `<MyComponent>`는 React 컴포넌트입니다.',
        code: '// ✅ 올바른 이름 (대문자 시작)\nfunction MyButton() { ... }\nfunction UserCard() { ... }\nfunction ProductList() { ... }\n\n// ❌ 잘못된 이름 (소문자 시작)\nfunction myButton() { ... }\n// → React가 HTML 태그로 착각함!',
        blocks: [],
        assembled: false,
        comparison: [
          { label: '✅ 컴포넌트', items: ['<MyButton />', '<UserCard />', '<ProductList />'], ok: true },
          { label: '✅ HTML 태그', items: ['<div>', '<span>', '<button>'], ok: true },
          { label: '❌ 오류', items: ['<myButton />', '<userCard />'], ok: false },
        ],
      },
      {
        title: 'Step 5 — 렌더링 흐름',
        desc: '작성한 컴포넌트를 화면에 표시하려면 `ReactDOM.createRoot()`로 "루트"를 만들고 `render()`를 호출합니다. HTML에 `<div id="root">`를 하나 두고, React가 그 안을 채웁니다.',
        code: '// 1. HTML에 빈 div 준비\n// <div id="root"></div>\n\n// 2. React가 그 안을 채움\nconst root = ReactDOM.createRoot(\n  document.getElementById("root")\n);\n\nroot.render(<App />);',
        blocks: [],
        assembled: false,
        renderFlow: true,
      },
    ];

    // =========================================================
    // 2. 블록 시각화 컴포넌트
    // =========================================================
    function BlocksPanel({ blocks, assembled }) {
      if (assembled) {
        return (
          <div className="bg-white rounded-xl p-4 border border-slate-200">
            <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">컴포넌트 조합 = 완성된 페이지</div>
            <div className="border-2 border-teal-300 rounded-xl overflow-hidden">
              <div className="bg-violet-100 border-b-2 border-violet-300 px-4 py-3 text-sm font-bold text-violet-700">📌 {'<Header />'}</div>
              <div className="bg-emerald-50 px-4 py-6 text-sm text-emerald-700 border-b-2 border-emerald-200">📋 {'<Content />'} — 여기에 본문이 들어갑니다</div>
              <div className="bg-amber-50 px-4 py-2 text-xs text-amber-700">📎 {'<Footer />'}</div>
            </div>
            <div className="mt-2 text-center text-[11px] text-teal-600 font-bold">{'<Page />'} 컴포넌트 = Header + Content + Footer</div>
          </div>
        );
      }

      if (blocks.length > 0) {
        return (
          <div className="bg-white rounded-xl p-4 border border-slate-200">
            <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">레고 블록 = 컴포넌트</div>
            <div className="grid grid-cols-2 gap-3">
              {blocks.map((b) => (
                <div key={b.name} className={`${b.color} border-2 rounded-xl p-4 text-center`}>
                  <div className="text-2xl mb-1">{b.icon}</div>
                  <div className="text-sm font-bold text-slate-700">{b.name}</div>
                  <div className="text-[10px] text-slate-500 mt-1">{'<' + b.name + ' />'}</div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      return null;
    }

    // =========================================================
    // 3. 코드 패널 컴포넌트
    // =========================================================
    function CodePanel({ code }) {
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-emerald-500"></div>
            </div>
            <span className="text-[10px] text-slate-500 ml-2">App.jsx</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    // =========================================================
    // 4. 메인 App
    // =========================================================
    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => {
        setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      };
      const nextRef = useRef(next);
      nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 5000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-teal-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">III</div>
                <h1 className="text-2xl font-bold text-slate-800">첫 컴포넌트 만들기</h1>
              </div>
              <p className="text-slate-600 text-sm">React의 기본 단위 <b>컴포넌트</b>를 이해하고, 함수형 컴포넌트를 작성하는 방법을 배웁니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter III-1-2 | ★★☆ | 선수 지식 III-1-1 | 2026-04-20</p>
            </header>

            {/* 진행 표시 */}
            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.title} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-teal-500' : 'bg-slate-200'}`}
                  aria-label={`Step ${i + 1}`}
                />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              {/* 좌: 코드 + 블록 시각화 */}
              <div className="space-y-4">
                <CodePanel code={step.code} />
                <BlocksPanel blocks={step.blocks} assembled={step.assembled} />

                {/* Step 2: 미리보기 */}
                {step.showPreview && (
                  <div className="bg-white rounded-xl p-4 border border-slate-200">
                    <div className="text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">렌더링 결과</div>
                    <div className="border-2 border-dashed border-teal-300 rounded-lg p-4">
                      <h1 className="text-lg font-bold text-slate-800">안녕하세요!</h1>
                      <p className="text-sm text-slate-600">첫 번째 컴포넌트입니다.</p>
                    </div>
                    <div className="mt-2 text-[10px] text-teal-600 font-bold">{'<Greeting />'} → 위 결과를 화면에 그림</div>
                  </div>
                )}

                {/* Step 4: 비교 테이블 */}
                {step.comparison && (
                  <div className="bg-white rounded-xl p-4 border border-slate-200">
                    <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">이름 규칙</div>
                    <div className="space-y-2">
                      {step.comparison.map((group) => (
                        <div key={group.label} className={`rounded-lg p-3 ${group.ok ? 'bg-slate-50' : 'bg-red-50'}`}>
                          <div className={`text-xs font-bold mb-1 ${group.ok ? 'text-slate-700' : 'text-red-600'}`}>{group.label}</div>
                          <div className="flex gap-2 flex-wrap">
                            {group.items.map((item) => (
                              <span key={item} className={`text-xs font-mono px-2 py-1 rounded ${group.ok ? 'bg-white border border-slate-200 text-slate-700' : 'bg-red-100 border border-red-300 text-red-700 line-through'}`}>{item}</span>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Step 5: 렌더링 흐름 */}
                {step.renderFlow && (
                  <div className="bg-white rounded-xl p-4 border border-slate-200">
                    <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">렌더링 흐름</div>
                    <div className="flex items-center gap-2 text-xs">
                      {[
                        { label: 'HTML', sub: '<div id="root">', color: 'bg-amber-50 border-amber-200' },
                        { label: 'createRoot', sub: '루트 생성', color: 'bg-sky-50 border-sky-200' },
                        { label: 'render()', sub: '<App />', color: 'bg-emerald-50 border-emerald-200' },
                        { label: '화면 표시', sub: 'DOM 업데이트', color: 'bg-violet-50 border-violet-200' },
                      ].map((item, i, arr) => (
                        <React.Fragment key={item.label}>
                          <div className={`${item.color} border rounded-lg px-3 py-2 text-center flex-1`}>
                            <div className="font-bold text-slate-700">{item.label}</div>
                            <div className="text-[10px] text-slate-500 mt-0.5">{item.sub}</div>
                          </div>
                          {i < arr.length - 1 && <span className="text-slate-300">→</span>}
                        </React.Fragment>
                      ))}
                    </div>
                  </div>
                )}
              </div>

              {/* 우: 설명 패널 */}
              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-teal-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>
              </div>
            </div>

            {/* 컨트롤 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }}
                disabled={idx === 0}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="이전 단계"
              >← 이전</button>
              <button onClick={() => { if (isEnd) setIdx(0); setIsPlaying(p => !p); }}
                className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${
                  isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-teal-500 hover:bg-teal-600 text-white'
                }`}
                aria-label={isPlaying ? '정지' : '자동 실행'}
              >{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }}
                disabled={isEnd}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="다음 단계"
              >다음 →</button>
            </div>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-20
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
