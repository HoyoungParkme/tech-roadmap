<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>브라우저가 웹 페이지를 그리는 방법 — Chapter I-1-1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    ─────────────────────────────────────────────────────────────
    Chapter I-1-1 — 브라우저가 웹 페이지를 그리는 방법
    ─────────────────────────────────────────────────────────────
    학습 목표: HTML·CSS·JS가 브라우저에서 어떻게 협력해 화면을 만드는지 설명할 수 있다.
    비유: HTML=메뉴판 내용, CSS=인테리어, JS=주문이 들어올 때 테이블을 바꾸는 직원
    ─────────────────────────────────────────────────────────────
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // =========================================================
    // 1. STEPS 정의 — 브라우저 렌더링 파이프라인 6단계
    // =========================================================
    const STEPS = [
      {
        title: 'Step 1 — HTML 텍스트 도착',
        desc: '서버에서 HTML 파일이 도착합니다. 아직은 그냥 텍스트 — 브라우저는 이 글자들을 이해하기 위해 "파싱(Parsing)"을 시작합니다.',
        metaphor: '레스토랑 비유: 손님이 주문서(HTML)를 건넸습니다. 아직 요리는 시작 전입니다.',
        codeSnippet: '<html>\n  <head>\n    <title>내 첫 페이지</title>\n  </head>\n  <body>\n    <h1>안녕하세요!</h1>\n    <p>첫 웹 페이지입니다.</p>\n  </body>\n</html>',
        activeNodes: [0],
        dataObj: { received: 'index.html', size: '542 bytes', type: 'text/html' },
      },
      {
        title: 'Step 2 — DOM 트리 생성',
        desc: 'HTML 파서가 텍스트를 읽으면서 "DOM(Document Object Model)" 트리를 만듭니다. 나무(tree) 모양 자료 구조로, 태그 하나하나가 나뭇가지가 됩니다.',
        metaphor: '레스토랑 비유: 주문서를 분석해서 "테이블 배치도"를 만듭니다. 어떤 요리가 어느 자리에 가는지 정리합니다.',
        codeSnippet: 'document\n├── html\n│   ├── head\n│   │   └── title\n│   │       └── "내 첫 페이지"\n│   └── body\n│       ├── h1\n│       │   └── "안녕하세요!"\n│       └── p\n│           └── "첫 웹 페이지입니다."',
        activeNodes: [0, 1],
        dataObj: { nodes: 8, tree: 'DOM Tree', rootElement: '<html>' },
      },
      {
        title: 'Step 3 — CSS로 스타일 입히기',
        desc: 'CSS 규칙을 읽어 CSSOM(CSS Object Model)을 만듭니다. DOM의 각 노드에 "어떤 색, 어떤 크기, 어떤 위치"인지 스타일을 붙입니다.',
        metaphor: '레스토랑 비유: 테이블에 식기를 세팅합니다. 접시 색, 냅킨 위치, 꽃 장식 — 같은 요리도 세팅에 따라 분위기가 달라집니다.',
        codeSnippet: 'h1 {\n  color: navy;\n  font-size: 24px;\n}\np {\n  color: gray;\n  line-height: 1.6;\n}',
        activeNodes: [0, 1, 2],
        dataObj: { rules: 2, properties: ['color', 'font-size', 'line-height'] },
      },
      {
        title: 'Step 4 — 렌더 트리 합체',
        desc: 'DOM 트리 + CSSOM을 합쳐 "렌더 트리"를 만듭니다. 화면에 실제로 보이는 요소만 남깁니다. display: none인 요소는 여기서 제외됩니다.',
        metaphor: '레스토랑 비유: 최종 배치도를 확정합니다. 빈 좌석(보이지 않는 요소)은 제외하고, 손님이 앉을 자리만 정리합니다.',
        codeSnippet: 'Render Tree:\n├── html  (display: block)\n│   └── body  (display: block)\n│       ├── h1  (color: navy, 24px)\n│       │   └── "안녕하세요!"\n│       └── p   (color: gray)\n│           └── "첫 웹 페이지입니다."',
        activeNodes: [0, 1, 2, 3],
        dataObj: { visibleNodes: 6, hiddenNodes: 0, combined: 'DOM + CSSOM' },
      },
      {
        title: 'Step 5 — 레이아웃 (위치와 크기 계산)',
        desc: '각 요소가 화면에서 어디에, 얼마나 크게 들어가는지 계산합니다. 뷰포트 크기, 폰트 크기, 여백 등을 모두 고려합니다.',
        metaphor: '레스토랑 비유: 테이블 간격을 재고, 의자를 배치합니다. 공간에 맞춰 정확한 위치를 정합니다.',
        codeSnippet: 'Layout 계산:\nh1: x=0, y=0, width=800, height=32\np:  x=0, y=48, width=800, height=26\n\n전체 페이지 높이: 90px\n뷰포트: 800 x 600',
        activeNodes: [0, 1, 2, 3, 4],
        dataObj: { viewport: '800x600', calculations: 'position + size', unit: 'px' },
      },
      {
        title: 'Step 6 — 페인트 (화면에 그리기)',
        desc: '드디어 픽셀을 찍습니다! 계산된 위치와 스타일대로 실제 화면에 글자, 색상, 테두리를 그려냅니다. 이 과정이 끝나면 우리가 보는 웹 페이지가 완성됩니다.',
        metaphor: '레스토랑 비유: 요리를 접시에 담아 테이블에 내놓습니다. 드디어 손님이 먹을 수 있습니다!',
        codeSnippet: '✅ 화면 출력 완료!\n\n┌──────────────────────┐\n│  안녕하세요!          │  ← navy, 24px\n│                      │\n│  첫 웹 페이지입니다.   │  ← gray\n└──────────────────────┘',
        activeNodes: [0, 1, 2, 3, 4, 5],
        dataObj: { pixels: 'painted', complete: true, fps: '60Hz 렌더링 준비' },
      },
    ];

    // 파이프라인 노드 레이블
    const PIPELINE_NODES = [
      { label: 'HTML\n텍스트', sub: '서버에서 도착' },
      { label: 'DOM\n트리', sub: 'HTML 파싱' },
      { label: 'CSSOM', sub: 'CSS 파싱' },
      { label: '렌더\n트리', sub: 'DOM + CSSOM' },
      { label: '레이아웃', sub: '위치·크기 계산' },
      { label: '페인트', sub: '픽셀 출력' },
    ];

    // =========================================================
    // 2. 파이프라인 다이어그램
    // =========================================================
    function PipelineDiagram({ activeNodes }) {
      const getStyle = (idx) => {
        if (activeNodes.includes(idx)) {
          const isLatest = idx === Math.max(...activeNodes);
          if (isLatest) return 'bg-sky-100 border-sky-500 ring-2 ring-sky-300 shadow-lg scale-105 text-sky-900';
          return 'bg-emerald-50 border-emerald-400 text-emerald-700';
        }
        return 'bg-white border-slate-200 text-slate-400';
      };

      return (
        <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
          <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">브라우저 렌더링 파이프라인</h3>
          <div className="flex flex-wrap items-center justify-between gap-2">
            {PIPELINE_NODES.map((node, i) => (
              <div key={i} className="flex items-center gap-1">
                <div className={`px-3 py-2 rounded-lg border-2 font-bold text-center min-w-[80px] transition-all duration-500 ${getStyle(i)}`}>
                  <div className="text-[11px] leading-tight whitespace-pre-line">{node.label}</div>
                  <div className="text-[9px] mt-1 opacity-60 font-normal">{node.sub}</div>
                  {activeNodes.includes(i) && i === Math.max(...activeNodes) && (
                    <div className="mt-1 text-[9px] bg-sky-500 text-white px-1 py-0.5 rounded-full">진행 중</div>
                  )}
                  {activeNodes.includes(i) && i !== Math.max(...activeNodes) && (
                    <div className="mt-1 text-[9px] bg-emerald-500 text-white px-1 py-0.5 rounded-full">완료</div>
                  )}
                </div>
                {i < PIPELINE_NODES.length - 1 && (
                  <div className="text-slate-300 font-bold text-lg select-none">&rarr;</div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // =========================================================
    // 3. 시각화 미리보기 (단계별 브라우저 결과)
    // =========================================================
    function BrowserPreview({ stepIdx }) {
      if (stepIdx < 5) {
        // 단계별 점진적 빌드업
        const stages = [
          { bg: 'bg-slate-100', content: <p className="text-slate-400 text-sm font-mono">&lt;html&gt; 텍스트 수신 중...</p> },
          { bg: 'bg-slate-100', content: (
            <div className="text-xs font-mono text-slate-600 space-y-1">
              <div className="font-bold text-slate-800">DOM 트리 구축 중</div>
              <div className="pl-2 border-l-2 border-slate-300">
                <div>├── head</div>
                <div>└── body</div>
                <div className="pl-4">├── h1</div>
                <div className="pl-4">└── p</div>
              </div>
            </div>
          )},
          { bg: 'bg-slate-100', content: (
            <div className="space-y-2">
              <div className="text-xs font-bold text-slate-800">스타일 적용 중</div>
              <h1 className="text-lg font-bold text-blue-900">안녕하세요!</h1>
              <p className="text-sm text-gray-400">첫 웹 페이지입니다.</p>
              <div className="text-[10px] text-slate-400 border-t pt-1">색상·크기 매핑 중...</div>
            </div>
          )},
          { bg: 'bg-slate-100', content: (
            <div className="space-y-2">
              <div className="text-xs font-bold text-slate-800">렌더 트리 합체</div>
              <h1 className="text-lg font-bold text-blue-900">안녕하세요!</h1>
              <p className="text-sm text-gray-500">첫 웹 페이지입니다.</p>
              <div className="text-[10px] text-emerald-500">보이는 요소만 남김 ✓</div>
            </div>
          )},
          { bg: 'bg-slate-50', content: (
            <div className="space-y-2">
              <div className="text-xs font-bold text-slate-800">레이아웃 계산</div>
              <div className="border-2 border-dashed border-sky-300 p-2 rounded">
                <h1 className="text-lg font-bold text-blue-900">안녕하세요!</h1>
              </div>
              <div className="border-2 border-dashed border-sky-300 p-2 rounded">
                <p className="text-sm text-gray-500">첫 웹 페이지입니다.</p>
              </div>
              <div className="text-[10px] text-sky-500">위치·크기 계산 중...</div>
            </div>
          )},
        ];
        const stage = stages[stepIdx];
        return (
          <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
            <div className="text-xs text-slate-400 uppercase tracking-wider mb-3 font-bold">브라우저 화면</div>
            <div className={`${stage.bg} rounded-lg p-4 min-h-[120px]`}>{stage.content}</div>
          </div>
        );
      }

      // Step 6: 완성된 화면
      return (
        <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
          <div className="text-xs text-slate-400 uppercase tracking-wider mb-3 font-bold">브라우저 화면</div>
          <div className="bg-white rounded-lg p-6 min-h-[120px] shadow-inner ring-2 ring-emerald-300 transition-all duration-500">
            <h1 className="text-xl font-bold text-blue-900 mb-2">안녕하세요!</h1>
            <p className="text-sm text-gray-500 leading-relaxed">첫 웹 페이지입니다.</p>
            <div className="mt-3 text-[10px] text-emerald-500 font-bold">화면 출력 완료!</div>
          </div>
        </div>
      );
    }

    // =========================================================
    // 4. 메인 앱
    // =========================================================
    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 3000);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 목차로 */}
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>

            {/* 헤더 */}
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">I</div>
                <h1 className="text-2xl font-bold text-slate-800">브라우저가 웹 페이지를 그리는 방법</h1>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                HTML·CSS·JavaScript가 브라우저 안에서 어떻게 협력해 화면을 만드는지,
                <b> 텍스트 → DOM → 스타일 → 레이아웃 → 페인트</b>의 6단계를 시뮬레이션합니다.
              </p>
              <p className="mt-2 text-[11px] text-slate-400 italic">
                Chapter I-1-1 | 난이도 ★☆☆ | 선수 지식 없음 | 2026-04-20
              </p>
            </header>

            {/* 단계 설명 배너 */}
            <div className="bg-amber-600 text-white p-5 rounded-xl shadow-sm border border-amber-700 min-h-[100px]">
              <div className="text-xs font-bold text-amber-200 mb-1 uppercase tracking-wider">{stepData.title}</div>
              <p className="text-base font-medium leading-relaxed mb-2">{stepData.desc}</p>
              <p className="text-sm text-amber-100 italic leading-relaxed">{stepData.metaphor}</p>
            </div>

            {/* 파이프라인 다이어그램 */}
            <PipelineDiagram activeNodes={stepData.activeNodes} />

            {/* 좌우 레이아웃 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5 items-stretch">

              {/* 왼쪽: 브라우저 미리보기 + 데이터 + 컨트롤 */}
              <div className="flex flex-col space-y-4">
                <BrowserPreview stepIdx={currentStepIdx} />

                {/* 데이터 스냅샷 */}
                <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
                  <div className="text-xs text-slate-400 uppercase tracking-wider mb-2 font-bold">내부 데이터</div>
                  <div className="font-mono text-emerald-400 text-sm">
                    {JSON.stringify(stepData.dataObj, null, 2)}
                  </div>
                </div>

                {/* 컨트롤 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-3">
                  <div className="flex items-center space-x-2">
                    <button aria-label="이전 단계" onClick={handlePrev} disabled={currentStepIdx === 0}
                      className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                    </button>
                    <button aria-label={isPlaying ? '정지' : '자동 실행'} onClick={togglePlay}
                      className="flex items-center px-4 py-2 rounded bg-amber-600 hover:bg-amber-700 text-white font-medium transition shadow-sm w-32 justify-center">
                      {isPlaying ? '정지' : '자동 실행'}
                    </button>
                    <button aria-label="다음 단계" onClick={() => { handleNext(); setIsPlaying(false); }} disabled={isEnd}
                      className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 transition">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                    </button>
                  </div>
                  <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                    Step {currentStepIdx + 1} / {STEPS.length}
                  </div>
                </div>
              </div>

              {/* 오른쪽: 코드/구조 뷰어 */}
              <div className="relative min-h-[420px] lg:min-h-0 rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-slate-900 flex flex-col">
                  <div className="flex items-center gap-2 px-4 py-2 bg-slate-800 border-b border-slate-700">
                    <div className="flex gap-1.5">
                      <div className="w-3 h-3 rounded-full bg-red-500 opacity-70"></div>
                      <div className="w-3 h-3 rounded-full bg-yellow-400 opacity-70"></div>
                      <div className="w-3 h-3 rounded-full bg-emerald-500 opacity-70"></div>
                    </div>
                    <span className="text-xs text-slate-400 font-mono ml-2">
                      {currentStepIdx === 0 ? 'index.html' : currentStepIdx === 2 ? 'style.css' : '브라우저 내부'}
                    </span>
                  </div>
                  <div className="p-4 overflow-y-auto flex-1 text-sm font-mono text-slate-300 leading-relaxed">
                    <pre className="whitespace-pre-wrap">{stepData.codeSnippet}</pre>
                  </div>
                </div>
              </div>

            </div>

            {/* 기술 메모 */}
            <div className="bg-white border border-slate-200 rounded-xl p-4 text-xs text-slate-500 space-y-1">
              <div className="font-bold text-slate-700 mb-2">기술 참고</div>
              <div><b>DOM (Document Object Model)</b>: HTML 문서를 나무(Tree) 구조로 표현한 것. JavaScript가 이 나무의 가지(노드)를 읽고 바꿀 수 있다.</div>
              <div><b>CSSOM (CSS Object Model)</b>: CSS 규칙을 트리 구조로 정리한 것. DOM과 합쳐져 렌더 트리가 된다.</div>
              <div><b>렌더링 엔진</b>: Chrome은 Blink, Firefox는 Gecko, Safari는 WebKit 엔진을 사용한다. 원리는 같지만 세부 구현이 다르다.</div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
