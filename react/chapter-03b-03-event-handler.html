<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이벤트 핸들러 — Chapter III-B-3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1 — 이벤트 핸들러란?',
        desc: '이벤트 핸들러는 사용자의 행동(클릭, 입력, 스크롤 등)에 반응하는 함수입니다. React에서는 JSX 속성으로 이벤트를 연결합니다. HTML의 onclick과 비슷하지만, 카멜케이스(onClick)로 작성합니다.',
        code: '// HTML 방식\n<button onclick="handleClick()">클릭</button>\n\n// React 방식 (카멜케이스!)\n<button onClick={handleClick}>클릭</button>\n\n// 주요 이벤트:\n// onClick    — 클릭\n// onChange   — 입력값 변경\n// onSubmit   — 폼 제출\n// onKeyDown  — 키보드 입력\n// onMouseEnter — 마우스 호버',
        visual: 'concept',
      },
      {
        title: 'Step 2 — onClick 핸들러',
        desc: '가장 많이 쓰는 이벤트입니다. 함수 참조를 전달해야 하며, 함수를 호출하면 안 됩니다. onClick={handleClick}은 "클릭하면 실행해"이고, onClick={handleClick()}은 "렌더링할 때 바로 실행해"입니다.',
        code: '// ✅ 올바른 방법 — 함수 참조 전달\n<button onClick={handleClick}>클릭</button>\n<button onClick={() => setCount(count + 1)}>+1</button>\n\n// ❌ 잘못된 방법 — 즉시 실행됨!\n<button onClick={handleClick()}>클릭</button>\n// → 렌더링 시 바로 실행되어 무한 루프!',
        visual: 'onclick-demo',
      },
      {
        title: 'Step 3 — onChange와 폼 입력',
        desc: 'onChange는 input, textarea, select 등의 값이 바뀔 때 호출됩니다. e.target.value로 현재 입력값을 가져옵니다. React에서 폼은 "제어 컴포넌트" 패턴으로 state와 연결합니다.',
        code: 'function SearchForm() {\n  const [query, setQuery] = useState("");\n\n  return (\n    <input\n      value={query}              // state와 연결\n      onChange={(e) => setQuery(e.target.value)}\n      placeholder="검색어 입력"\n    />\n  );\n}\n\n// e.target.value = 현재 입력된 텍스트\n// state가 바뀌면 → 리렌더링 → input에 반영',
        visual: 'onchange-demo',
      },
      {
        title: 'Step 4 — 이벤트 전파 (버블링)',
        desc: '자식 요소에서 발생한 이벤트는 부모 요소로 전파(버블링)됩니다. 카드 안의 버튼을 클릭하면, 카드의 onClick도 함께 실행됩니다. e.stopPropagation()으로 전파를 막을 수 있습니다.',
        code: 'function Card() {\n  return (\n    <div onClick={() => alert("카드 클릭!")}>\n      <h2>카드 제목</h2>\n      <button onClick={(e) => {\n        e.stopPropagation(); // 전파 차단!\n        alert("버튼 클릭!");\n      }}>\n        삭제\n      </button>\n    </div>\n  );\n}\n\n// stopPropagation 없으면:\n// 버튼 클릭 → "버튼 클릭!" + "카드 클릭!" 둘 다\n// stopPropagation 있으면:\n// 버튼 클릭 → "버튼 클릭!" 만',
        visual: 'bubbling-demo',
      },
      {
        title: 'Step 5 — 이벤트 핸들러 체험',
        desc: '아래에서 다양한 이벤트를 직접 체험해 보세요. 클릭, 입력, 마우스 호버, 키보드 입력 — 각 이벤트가 발생할 때마다 로그가 기록됩니다.',
        code: null,
        visual: 'playground',
      },
    ];

    function ConceptVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">React 이벤트 vs HTML 이벤트</div>
          <div className="space-y-2">
            {[
              { html: 'onclick', react: 'onClick', desc: '클릭' },
              { html: 'onchange', react: 'onChange', desc: '값 변경' },
              { html: 'onsubmit', react: 'onSubmit', desc: '폼 제출' },
              { html: 'onkeydown', react: 'onKeyDown', desc: '키 입력' },
              { html: 'onmouseenter', react: 'onMouseEnter', desc: '마우스 진입' },
            ].map((ev) => (
              <div key={ev.react} className="flex items-center gap-3 bg-slate-50 rounded-lg px-3 py-2">
                <span className="text-xs font-mono text-red-500 line-through min-w-[100px]">{ev.html}</span>
                <span className="text-slate-300">→</span>
                <span className="text-xs font-mono text-emerald-600 font-bold min-w-[110px]">{ev.react}</span>
                <span className="text-[10px] text-slate-500 ml-auto">{ev.desc}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function OnClickDemo() {
      const [count, setCount] = useState(0);
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">onClick 데모</div>
          <div className="text-center">
            <div className="text-4xl font-bold text-emerald-600 mb-3">{count}</div>
            <div className="flex gap-2 justify-center">
              <button onClick={() => setCount(prev => prev - 1)} className="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg text-sm font-bold transition">-1</button>
              <button onClick={() => setCount(0)} className="px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg text-sm font-bold transition">리셋</button>
              <button onClick={() => setCount(prev => prev + 1)} className="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg text-sm font-bold transition">+1</button>
            </div>
            <div className="mt-2 text-[10px] text-slate-500">{'onClick={() => setCount(prev => prev + 1)}'}</div>
          </div>
        </div>
      );
    }

    function OnChangeDemo() {
      const [text, setText] = useState('');
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">onChange 데모</div>
          <input value={text} onChange={(e) => setText(e.target.value)} placeholder="여기에 입력하세요"
            className="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm mb-3" aria-label="텍스트 입력" />
          <div className="bg-emerald-50 rounded-lg p-3 space-y-1">
            <div className="text-[10px] text-slate-500">e.target.value:</div>
            <div className="text-sm font-mono text-emerald-700 font-bold">{text || '(빈 문자열)'}</div>
            <div className="text-[10px] text-slate-400">글자 수: {text.length}</div>
          </div>
        </div>
      );
    }

    function BubblingDemo() {
      const [logs, setLogs] = useState([]);
      const addLog = (msg) => setLogs(prev => [...prev, msg].slice(-5));
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">이벤트 버블링 데모</div>
          <div className="grid grid-cols-2 gap-3 mb-3">
            <div onClick={() => addLog('카드 onClick 실행!')} className="bg-violet-50 border-2 border-violet-300 rounded-xl p-4 cursor-pointer hover:bg-violet-100 transition">
              <div className="text-xs font-bold text-violet-700 mb-2">카드 (부모)</div>
              <button onClick={(e) => { addLog('버튼 클릭 (전파 O)'); }} className="px-3 py-1.5 bg-violet-500 hover:bg-violet-600 text-white rounded-lg text-xs font-bold transition w-full">전파 허용 버튼</button>
            </div>
            <div onClick={() => addLog('카드 onClick 실행!')} className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-4 cursor-pointer hover:bg-emerald-100 transition">
              <div className="text-xs font-bold text-emerald-700 mb-2">카드 (부모)</div>
              <button onClick={(e) => { e.stopPropagation(); addLog('버튼 클릭 (전파 X — stopPropagation)'); }} className="px-3 py-1.5 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg text-xs font-bold transition w-full">전파 차단 버튼</button>
            </div>
          </div>
          <div className="bg-slate-900 rounded-lg p-3">
            <div className="text-[10px] text-slate-400 mb-1">이벤트 로그</div>
            {logs.length === 0 && <div className="text-[10px] text-slate-500">버튼이나 카드를 클릭해보세요</div>}
            {logs.map((log, i) => <div key={`log-${i}-${log}`} className="text-xs font-mono text-emerald-400">{log}</div>)}
          </div>
        </div>
      );
    }

    function PlaygroundVisual() {
      const [logs, setLogs] = useState([]);
      const addLog = (msg) => setLogs(prev => [`[${new Date().toLocaleTimeString()}] ${msg}`, ...prev].slice(0, 8));
      return (
        <div className="space-y-3">
          <div className="bg-white rounded-xl p-4 border border-slate-200">
            <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">이벤트 체험장</div>
            <div className="grid grid-cols-2 gap-3">
              <button onClick={() => addLog('onClick — 버튼 클릭!')} className="px-3 py-3 bg-sky-500 hover:bg-sky-600 text-white rounded-xl text-sm font-bold transition">클릭 이벤트</button>
              <div onMouseEnter={() => addLog('onMouseEnter — 마우스 진입!')} onMouseLeave={() => addLog('onMouseLeave — 마우스 이탈!')}
                className="px-3 py-3 bg-violet-100 border-2 border-violet-300 rounded-xl text-sm font-bold text-violet-700 text-center cursor-default">마우스 호버</div>
              <input onFocus={() => addLog('onFocus — 포커스!')} onBlur={() => addLog('onBlur — 포커스 해제!')} onChange={(e) => addLog(`onChange — "${e.target.value}"`)}
                placeholder="입력 이벤트" className="px-3 py-3 border-2 border-amber-300 rounded-xl text-sm" aria-label="이벤트 테스트 입력" />
              <input onKeyDown={(e) => addLog(`onKeyDown — key: "${e.key}"`)} placeholder="키보드 이벤트"
                className="px-3 py-3 border-2 border-emerald-300 rounded-xl text-sm" aria-label="키보드 이벤트 테스트" />
            </div>
          </div>
          <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
            <div className="text-[10px] text-slate-400 font-bold mb-2">Console</div>
            {logs.length === 0 && <div className="text-xs text-slate-500">위의 요소들과 상호작용해보세요!</div>}
            {logs.map((log) => <div key={log} className="text-xs font-mono text-emerald-400">{log}</div>)}
          </div>
        </div>
      );
    }

    function CodePanel({ code }) {
      if (!code) return null;
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5"><div className="w-3 h-3 rounded-full bg-red-500"></div><div className="w-3 h-3 rounded-full bg-yellow-500"></div><div className="w-3 h-3 rounded-full bg-emerald-500"></div></div>
            <span className="text-[10px] text-slate-500 ml-2">App.jsx</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;
      const next = () => { setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; }); };
      const nextRef = useRef(next); nextRef.current = next;
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const VISUAL_MAP = { concept: ConceptVisual, 'onclick-demo': OnClickDemo, 'onchange-demo': OnChangeDemo, 'bubbling-demo': BubblingDemo, playground: PlaygroundVisual };
      const VisualComponent = VISUAL_MAP[step.visual];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-500 text-white flex items-center justify-center rounded-full font-bold text-xs select-none">III-B</div>
                <h1 className="text-2xl font-bold text-slate-800">이벤트 핸들러</h1>
              </div>
              <p className="text-slate-600 text-sm"><b>onClick, onChange, 이벤트 전파</b>를 시각화하고 직접 체험합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter III-B-3 | ★★☆ | 선수 지식 III-B-2 | 2026-04-21</p>
            </header>
            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.title} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-emerald-500' : 'bg-slate-200'}`} aria-label={`Step ${i + 1}`} />
              ))}
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                <CodePanel code={step.code} />
                {VisualComponent && <VisualComponent />}
              </div>
              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-emerald-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>
              </div>
            </div>
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }} disabled={idx === 0} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="이전 단계">← 이전</button>
              <button onClick={() => { if (isEnd) { setIdx(0); } setIsPlaying(p => !p); }} className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-emerald-500 hover:bg-emerald-600 text-white'}`} aria-label={isPlaying ? '정지' : '자동 실행'}>{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }} disabled={isEnd} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="다음 단계">다음 →</button>
            </div>
            <footer className="text-center text-xs text-slate-400 pb-4">React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-21</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
