            '|:--|:--|:--|:--|',

            '> 💡 CNAME flattening 지원 DNS(Cloudflare) 는 루트도 CNAME 가능',
            '',
            '## DNS 전파 확인 (10분~24시간)',
            '```bash',
            'dig myapp.com +short        # → 76.76.21.21',
            'dig www.myapp.com +short    # → cname.vercel-dns.com.',
            '```',
            '',
            '## HTTPS 자동 발급 (Let\'s Encrypt)',
            '- DNS 검증 통과 즉시 Vercel 이 ACME 챌린지 수행',
            '- Let\'s Encrypt 인증서 자동 발급 (1~3분)',
            '- 90일 만료 전 자동 갱신 — 손댈 필요 0',
            '',
            '```',
            'Domain         | Status   | Issuer        | Auto-Renew',
            'myapp.com      | ✅ Valid | Let\'s Encrypt | Yes',
            'www.myapp.com  | ✅ Valid | Let\'s Encrypt | Yes',
            '```',
            '',
            '## 권장 패턴 / 트러블슈팅',
            '- apex(myapp.com) → www 로 308 영구 리다이렉트 (또는 반대)',
            '- Settings → Domains → "Redirect to" 한 줄 설정',
            '- DNS 가 안 보이면 → 24시간 대기 (전파 시간)',
            '- 인증서 발급 실패 → CAA 레코드 확인 (letsencrypt.org 허용)',
            '- 강제 HTTPS 가 안 걸리면 → "Force HTTPS" 토글 확인',
            '',
            '> 🎯 결론: 도메인 + HTTPS 가 무료. 운영 부담 0.',
          ],
          highlight: [3, 4, 5, 7, 8, 9, 10, 12, 13, 14, 15, 16, 18, 19, 20, 21, 23, 25, 26, 27, 28, 29, 31, 32, 33, 34, 36, 37, 38, 39, 40, 42, 43, 44, 45, 46, 47, 49],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // PipelineDiagram — GitHub → Vercel → CDN 4단 흐름
    //   각 노드는 status (idle/active/done) 별로 색상이 다르다
    //   flowActive 인덱스의 화살표는 animate-pulse
    // ─────────────────────────────────────────────────────
    function PipelineDiagram({ pipeline, flowActive }) {
      const statusStyle = {
        idle:   { bg: 'bg-slate-50',   border: 'border-slate-200', text: 'text-slate-400',   icon: 'opacity-40' },
        active: { bg: 'bg-indigo-50',  border: 'border-indigo-400', text: 'text-indigo-800', icon: 'opacity-100 animate-pulse' },
        done:   { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-800', icon: 'opacity-100' },
      };
      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">
          <div className="bg-slate-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-slate-600">
            GitHub → Vercel → CDN 파이프라인
          </div>
          <div className="p-3">
            <div className="flex items-stretch justify-between gap-1">
              {pipeline.map((node, i) => {
                const s = statusStyle[node.status];
                const isFlowActive = flowActive.includes(i);
                return (
                  <React.Fragment key={node.id}>
                    <div className={`flex-1 rounded-md border-2 ${s.bg} ${s.border} p-2 flex flex-col items-center justify-center text-center transition-all`}>
                      <div className={`text-xl mb-0.5 ${s.icon}`}>{node.icon}</div>
                      <div className={`text-[10px] font-bold ${s.text} leading-tight`}>{node.label}</div>
                      <div className={`text-[9px] ${s.text} opacity-75 leading-tight mt-0.5`}>{node.sub}</div>
                    </div>
                    {i < pipeline.length - 1 && (
                      <div className="flex items-center justify-center w-5">
                        <span className={`text-lg leading-none font-bold ${isFlowActive ? 'text-indigo-500 animate-pulse' : 'text-slate-300'}`}>→</span>
                      </div>
                    )}
                  </React.Fragment>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // MockImportUI — Step 1: Vercel Import 화면 mock
    // ─────────────────────────────────────────────────────
    function MockImportUI({ data }) {
      return (
        <div className="bg-white rounded-lg border-2 border-indigo-200 overflow-hidden">
          <div className="bg-indigo-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-indigo-700 flex items-center justify-between">
            <span>{data.title}</span>
            <span className="text-[9px] font-mono text-indigo-600">vercel.com</span>
          </div>
          <div className="p-2.5 space-y-1">
            {data.repos.map((r) => (
              <div key={r.name} className={`flex items-center justify-between px-2 py-1.5 rounded border ${r.selected ? 'bg-indigo-50 border-indigo-300' : 'bg-slate-50 border-slate-200'}`}>
                <div className="flex items-center gap-2">
                  <span className="text-base">🐙</span>
                  <span className={`text-[11px] font-mono font-bold ${r.selected ? 'text-indigo-800' : 'text-slate-700'}`}>{r.name}</span>
                  <span className="text-[9px] text-slate-400">{r.updated}</span>
                </div>
                <button className={`text-[10px] px-2 py-0.5 rounded font-bold ${r.selected ? 'bg-indigo-600 text-white' : 'bg-slate-200 text-slate-600'}`}>
                  {r.selected ? 'Importing…' : 'Import'}
                </button>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // MockConfigUI — Step 2: vercel.json 필드 표
    // ─────────────────────────────────────────────────────
    function MockConfigUI({ data }) {
      return (
        <div className="bg-white rounded-lg border-2 border-amber-200 overflow-hidden">
          <div className="bg-amber-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-amber-700">
            {data.title}
          </div>
          <div className="p-2.5 space-y-1">
            {data.rows.map((r, i) => (
              <div key={i} className="grid grid-cols-12 gap-2 text-[10px] font-mono items-center">
                <span className="col-span-4 text-amber-800 font-bold truncate">{r.key}</span>
                <span className="col-span-4 text-slate-700 truncate">{r.value}</span>
                <span className="col-span-4 text-slate-400 truncate">{r.hint}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // MockPipelineUI — Step 3: 빌드 단계 진행 표시
    // ─────────────────────────────────────────────────────
    function MockPipelineUI({ data }) {
      const statusIcon = { done: '✅', active: '⏳', idle: '⚪' };
      const statusText = { done: 'text-emerald-700', active: 'text-indigo-700 font-bold', idle: 'text-slate-400' };
      return (
        <div className="bg-white rounded-lg border-2 border-indigo-200 overflow-hidden">
          <div className="bg-indigo-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-indigo-700 flex items-center justify-between">
            <span>{data.title}</span>
            <span className="text-[9px] font-mono text-indigo-600">vercel deployment</span>
          </div>
          <div className="p-2.5 space-y-1">
            {data.stages.map((s, i) => (
              <div key={i} className="flex items-center justify-between text-[11px] font-mono">
                <div className="flex items-center gap-2">
                  <span className="text-sm">{statusIcon[s.status]}</span>
                  <span className={statusText[s.status]}>{s.label}</span>
                </div>
                <span className="text-[10px] text-slate-500">{s.duration}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // MockPRUI — Step 4: PR + Vercel Bot 댓글 + Preview URL
    // ─────────────────────────────────────────────────────
    function MockPRUI({ data }) {
      return (
        <div className="bg-white rounded-lg border-2 border-emerald-200 overflow-hidden">
          <div className="bg-emerald-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-emerald-700 flex items-center justify-between">
            <span>{data.title}</span>
            <span className="text-[9px] font-mono text-emerald-600">github.com</span>
          </div>
          <div className="p-2.5 space-y-2">
            {data.comments.map((c, i) => (
              <div key={i} className="bg-slate-50 border border-slate-200 rounded p-2">
                <div className="flex items-center gap-1.5 mb-1">
                  <span className="text-[10px] font-bold text-slate-700">{c.author}</span>
                  <span className="text-[9px] text-slate-400">commented</span>
                </div>
                <div className="text-[11px] text-emerald-800 font-bold">{c.body}</div>
                <div className="text-[9px] text-slate-500 mt-0.5">{c.meta}</div>
              </div>
            ))}
            <div className="bg-emerald-50 border-2 border-emerald-300 rounded px-2 py-1.5">
              <div className="text-[9px] font-bold text-emerald-600 uppercase mb-0.5">Preview URL</div>
              <div className="text-[10px] font-mono text-emerald-900 break-all">{data.previewUrl}</div>
              <div className="text-[9px] text-emerald-600 mt-0.5">status: {data.status}</div>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // MockDomainUI — Step 5: DNS 레코드 + SSL 상태
    // ─────────────────────────────────────────────────────
    function MockDomainUI({ data }) {
      return (
        <div className="bg-white rounded-lg border-2 border-indigo-200 overflow-hidden">
          <div className="bg-indigo-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-indigo-700 flex items-center justify-between">
            <span>{data.title}</span>
            <span className="text-[9px] font-mono text-indigo-600">DNS records</span>
          </div>
          <div className="p-2.5 space-y-0.5">
            {data.rows.map((r, i) => (
              <div key={i} className="grid grid-cols-12 gap-1 text-[10px] font-mono items-center">
                <span className="col-span-2 text-indigo-700 font-bold">{r.key}</span>
                <span className="col-span-1 text-slate-700">{r.value.length > 0 && r.value[0]}</span>
                <span className="col-span-5 text-slate-700 truncate">{r.value}</span>
                <span className="col-span-4 text-slate-400 truncate">{r.hint}</span>
              </div>
            ))}
            <div className="mt-2 pt-2 border-t border-slate-200 flex items-center justify-between text-[10px]">
              <span className="text-emerald-700 font-bold">🔒 SSL: {data.ssl.status}</span>
              <span className="text-slate-500 font-mono">{data.ssl.issuer} · auto-renew {data.ssl.autoRenew ? 'on' : 'off'}</span>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // MockSwitch — step 별로 mock UI 컴포넌트 분기
    // ─────────────────────────────────────────────────────
    function MockSwitch({ mockUI }) {
      switch (mockUI.kind) {
        case 'import':   return <MockImportUI   data={mockUI} />;
        case 'config':   return <MockConfigUI   data={mockUI} />;
        case 'pipeline': return <MockPipelineUI data={mockUI} />;
        case 'pr':       return <MockPRUI       data={mockUI} />;
        case 'domain':   return <MockDomainUI   data={mockUI} />;
        default:         return null;
      }
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    //   상단: 파이프라인 다이어그램 (GitHub → Vercel → CDN)
    //   하단: step 별 mock UI (Import / vercel.json / build / PR / DNS)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">▲ Vercel 배포 워크플로우</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-3">
            <PipelineDiagram pipeline={step.pipeline} flowActive={step.flowActive} />
            <MockSwitch mockUI={step.mockUI} />
          </div>

          {/* 핵심 포인트 박스 */}
          <div className="mt-3 bg-indigo-50 border-l-4 border-indigo-400 px-3 py-2 rounded-r">
            <div className="text-[9px] font-bold text-indigo-600 uppercase tracking-wider mb-0.5">핵심 포인트</div>
            <p className="text-[11px] text-indigo-900 leading-snug">{step.keyPoint}</p>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-300"></span>idle
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-indigo-400"></span>active
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-400"></span>done
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   상단에 5개 탭 (각 step 의 파일을 탭으로 노출)
    //   현재 step 의 탭이 활성, 다른 탭 클릭 시 해당 step 으로 이동
    // ─────────────────────────────────────────────────────
    function CodeViewer({ steps, stepIdx, onTabClick }) {
      const code = steps[stepIdx].code;
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 5개 파일 탭 */}
          <div className="bg-[#21252b] border-b border-slate-700">
            <div className="px-4 py-2 flex items-center gap-2">
              <div className="flex gap-1.5">
                <span className="w-3 h-3 rounded-full bg-red-500"></span>
                <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
                <span className="w-3 h-3 rounded-full bg-green-500"></span>
              </div>
              <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
              <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
            </div>
            <div className="flex border-t border-slate-700/60 overflow-x-auto">
              {steps.map((s, i) => {
                const active = i === stepIdx;
                return (
                  <button
                    key={i}
                    onClick={() => onTabClick(i)}
                    className={`px-3 py-1.5 text-[10px] font-mono whitespace-nowrap border-r border-slate-700 transition ${
                      active ? 'bg-[#282c34] text-indigo-300 border-b-2 border-b-indigo-400' : 'bg-[#21252b] text-slate-500 hover:text-slate-300'
                    }`}
                  >
                    <span className="opacity-60 mr-1">{i + 1}</span>{s.code.tabLabel}
                  </button>
                );
              })}
            </div>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-indigo-500/15 border-l-2 border-indigo-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {steps.length}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    //   - 우측 CodeViewer 의 탭 클릭으로도 step 이동
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="./index.html" className="text-indigo-700 hover:text-indigo-900 font-medium">&larr; 목차로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter VII-1-2</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VII. 배포 &amp; 운영 &gt; Chapter 1. Vercel</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VII-1-2. Vercel 배포 — Git push 한 번으로 전 세계 공개</h1>
                  <p className="text-sm text-slate-500 mt-0.5">repo 연결 → vercel.json → 자동 배포 → preview URL → 커스텀 도메인 + HTTPS</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer steps={STEPS} stepIdx={stepIdx} onTabClick={setStepIdx} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-indigo-50 border-2 border-indigo-300 rounded-xl p-3 text-sm text-indigo-900">
                💡 정리: Vercel 은 <strong>git push 가 곧 deploy</strong> 인 플랫폼이다. <strong>vercel.json</strong> 으로 빌드/라우팅을 코드로 관리하고, <strong>preview URL</strong> 로 PR 단위 검증, <strong>커스텀 도메인 + 자동 HTTPS</strong> 까지 한 번에. 다음(VII-1-3)에서는 환경 변수와 secrets 관리를 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-indigo-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-indigo-600 text-white hover:bg-indigo-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Vercel', 'GitHub', 'vercel.json', 'CI/CD', 'Preview URL', 'Edge CDN', 'HTTPS', "Let's Encrypt"].map((kw) => (
                <span key={kw} className="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-xs font-medium border border-indigo-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-07-01-build.html" className="text-indigo-700 hover:text-indigo-900 font-medium">&larr; VII-1-1 빌드 최적화</a>
              <a href="./chapter-07-03-env.html" className="text-indigo-700 hover:text-indigo-900 font-medium">VII-1-3 환경 변수 &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
