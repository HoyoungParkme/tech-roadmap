<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vercel로 배포하기 — Chapter VII-1-2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter VII-1-2 — Vercel로 배포하기 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        id: 'deploy-concept',
        title: 'Step 1 — 배포란?',
        desc: '배포(Deploy)란 로컬에서 만든 웹 앱을 인터넷에 공개하는 과정입니다. 개발 환경(localhost)에서만 볼 수 있던 결과물을, 전 세계 누구나 URL로 접근할 수 있도록 서버에 올리는 것입니다. "npm run build"로 최적화된 파일을 생성하고, 이를 호스팅 서비스에 업로드합니다.',
        code: '# 로컬 개발 환경\nnpm run dev\n→ http://localhost:3000 (나만 볼 수 있음)\n\n# 프로덕션 빌드\nnpm run build\n→ dist/ 폴더에 최적화된 파일 생성\n  ├── index.html\n  ├── assets/index-abc123.js  (번들링+미니파이)\n  └── assets/style-def456.css\n\n# 배포 후\nhttps://my-app.vercel.app\n→ 전 세계 누구나 접근 가능!',
        visual: 'deploy-flow',
      },
      {
        id: 'what-is-vercel',
        title: 'Step 2 — Vercel이란?',
        desc: 'Vercel은 Next.js를 만든 회사가 운영하는 프론트엔드 배포 플랫폼입니다. Git push 한 번으로 빌드부터 CDN 배포까지 자동으로 처리됩니다. Hobby(무료) 플랜으로 개인 프로젝트를 무제한 배포할 수 있어, React 학습용으로 최적입니다.',
        code: '// Vercel 주요 특징\nconst vercelFeatures = {\n  company: "Vercel Inc. (Next.js 개발사)",\n  pricing: "Hobby 무료 / Pro $20/월",\n  deploy: "Git push → 자동 빌드 → CDN 배포",\n  ssl: "HTTPS 자동 적용",\n  cdn: "글로벌 Edge Network",\n  preview: "PR마다 Preview URL 자동 생성",\n  framework: "React, Next.js, Vue, Svelte 등 지원",\n  rollback: "원클릭 롤백 가능",\n};\n\n// 무료 플랜 제한\nconst hobbyLimits = {\n  bandwidth: "100GB/월",\n  builds: "6000분/월",\n  serverless: "10초 타임아웃",\n  team: "개인만 (팀은 Pro)",\n};',
        visual: 'vercel-info',
      },
      {
        id: 'github-deploy',
        title: 'Step 3 — GitHub 연동 자동 배포',
        desc: 'Vercel에 GitHub 저장소를 연결하면, main 브랜치에 push할 때마다 자동으로 빌드→배포가 실행됩니다. 별도 CI/CD 설정 없이 Git workflow만으로 배포가 완료됩니다.',
        code: '# 1. Vercel 계정 생성 (GitHub 로그인)\nvercel.com → Sign Up with GitHub\n\n# 2. 저장소 연결\nNew Project → Import Git Repository\n→ my-react-app 선택\n\n# 3. 빌드 설정 (자동 감지)\nFramework: Create React App (or Vite)\nBuild Command: npm run build\nOutput Dir: build (or dist)\n\n# 4. 배포!\ngit add . && git commit -m "feat: new feature"\ngit push origin main\n→ Vercel이 자동으로 감지\n→ 빌드 실행 (약 30~60초)\n→ https://my-app.vercel.app 업데이트!',
        visual: 'deploy-pipeline',
      },
      {
        id: 'preview-url',
        title: 'Step 4 — Preview URL',
        desc: 'PR(Pull Request)을 열면 Vercel이 자동으로 해당 브랜치를 빌드하여 고유한 Preview URL을 생성합니다. 코드 리뷰어가 로컬 세팅 없이 바로 결과물을 확인할 수 있어, 팀 협업에서 매우 유용합니다.',
        code: '# feature 브랜치에서 작업\ngit checkout -b feature/dark-mode\n# ... 코드 작성 ...\ngit push origin feature/dark-mode\n\n# GitHub에서 PR 생성\n→ Vercel Bot이 자동 댓글:\n\n┌─────────────────────────────────────────┐\n│  ✅ Preview deployed!                   │\n│                                         │\n│  🔗 https://my-app-git-feature-        │\n│     dark-mode-username.vercel.app       │\n│                                         │\n│  Built in 42s                           │\n└─────────────────────────────────────────┘\n\n# PR 머지 → Production 자동 배포\n# PR 닫기 → Preview URL 자동 정리',
        visual: 'preview-demo',
      },
      {
        id: 'comparison',
        title: 'Step 5 — 플랫폼 비교',
        desc: 'Vercel 외에도 Netlify, GitHub Pages 등 무료 배포 플랫폼이 있습니다. 각 플랫폼마다 강점이 다르므로, 프로젝트 성격에 맞게 선택합니다. React SPA는 세 플랫폼 모두 잘 지원하지만, SSR이 필요하면 Vercel이나 Netlify가 적합합니다.',
        code: '// 플랫폼 선택 가이드\nconst recommendation = {\n  "정적 사이트 (HTML/CSS/JS)": "GitHub Pages",\n  "React SPA (Vite/CRA)": "Vercel or Netlify",\n  "Next.js (SSR/ISR)": "Vercel (최적 지원)",\n  "서버리스 함수 필요": "Vercel or Netlify",\n  "팀 협업 (무료)": "Netlify (팀 플랜 무료)",\n  "CI/CD 커스텀 필요": "GitHub Actions + Pages",\n};',
        visual: 'comparison-table',
      },
    ];

    /* ─── Visual Components ─── */

    function DeployFlowVisual() {
      const [phase, setPhase] = useState(0);
      useEffect(() => {
        const timer = setInterval(() => setPhase(p => (p + 1) % 4), 1500);
        return () => clearInterval(timer);
      }, []);

      const phases = [
        { label: 'localhost:3000', icon: '💻', sublabel: '로컬 개발', active: true },
        { label: 'npm run build', icon: '📦', sublabel: '빌드', active: phase >= 1 },
        { label: '서버 업로드', icon: '☁️', sublabel: '배포', active: phase >= 2 },
        { label: 'my-app.vercel.app', icon: '🌐', sublabel: '공개!', active: phase >= 3 },
      ];

      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">배포 흐름</div>
          <div className="flex items-center justify-between">
            {phases.map((p, i) => (
              <div key={p.label} className="flex items-center">
                <div className={`flex flex-col items-center transition-all duration-500 ${p.active ? 'opacity-100 scale-100' : 'opacity-30 scale-90'}`}>
                  <div className={`w-10 h-10 rounded-full flex items-center justify-center text-lg ${p.active ? 'bg-orange-100 border-2 border-orange-400' : 'bg-slate-100 border border-slate-200'}`}>{p.icon}</div>
                  <div className={`text-[9px] mt-1 font-bold ${p.active ? 'text-orange-600' : 'text-slate-400'}`}>{p.sublabel}</div>
                </div>
                {i < phases.length - 1 && (
                  <div className={`w-6 h-0.5 mx-1 transition-all ${phase > i ? 'bg-orange-400' : 'bg-slate-200'}`}></div>
                )}
              </div>
            ))}
          </div>
          <div className="mt-3 text-center text-[10px] text-slate-500">
            {phase === 0 && '로컬에서만 볼 수 있는 상태'}
            {phase === 1 && '프로덕션용 파일 생성 중...'}
            {phase === 2 && '호스팅 서버에 업로드 중...'}
            {phase === 3 && '전 세계에서 접근 가능!'}
          </div>
        </div>
      );
    }

    function VercelInfoVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Vercel 핵심 정보</div>
          <div className="space-y-2">
            <div className="bg-slate-900 rounded-lg p-3 flex items-center gap-3">
              <div className="text-white font-bold text-lg">▲</div>
              <div>
                <div className="text-white text-sm font-bold">Vercel</div>
                <div className="text-slate-400 text-[10px]">Next.js 개발사 | Frontend Cloud</div>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-2">
              {[
                { label: 'HTTPS', value: '자동 SSL', color: 'bg-emerald-50 text-emerald-700' },
                { label: 'CDN', value: '글로벌 Edge', color: 'bg-sky-50 text-sky-700' },
                { label: 'Preview', value: 'PR별 자동', color: 'bg-violet-50 text-violet-700' },
                { label: '무료', value: '100GB/월', color: 'bg-amber-50 text-amber-700' },
              ].map((item) => (
                <div key={item.label} className={`rounded-lg p-2 ${item.color}`}>
                  <div className="text-[9px] font-bold opacity-70">{item.label}</div>
                  <div className="text-[11px] font-bold">{item.value}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function DeployPipelineVisual() {
      const [stage, setStage] = useState(0);
      useEffect(() => {
        const timer = setInterval(() => setStage(p => (p + 1) % 5), 1200);
        return () => clearInterval(timer);
      }, []);

      const stages = [
        { label: 'git push', status: 'Git 이벤트 감지' },
        { label: 'Installing', status: 'npm install 실행' },
        { label: 'Building', status: 'npm run build 실행' },
        { label: 'Deploying', status: 'CDN에 배포 중' },
        { label: 'Ready!', status: '배포 완료' },
      ];

      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">자동 배포 파이프라인</div>
          <div className="bg-slate-900 rounded-lg p-3 font-mono text-[11px] space-y-1.5">
            {stages.map((s, i) => (
              <div key={s.label} className={`flex items-center gap-2 transition-all duration-300 ${i <= stage ? 'opacity-100' : 'opacity-20'}`}>
                <span className={`w-4 text-center ${i < stage ? 'text-emerald-400' : i === stage ? 'text-yellow-400' : 'text-slate-600'}`}>
                  {i < stage ? '✓' : i === stage ? '●' : '○'}
                </span>
                <span className={`${i <= stage ? 'text-slate-200' : 'text-slate-600'}`}>{s.label}</span>
                {i === stage && <span className="text-slate-500 text-[9px] ml-auto">{s.status}</span>}
              </div>
            ))}
          </div>
          <div className="mt-2 flex items-center justify-between text-[10px]">
            <span className="text-slate-400">소요 시간: ~45초</span>
            {stage === 4 && <span className="text-emerald-500 font-bold">Production 배포 완료!</span>}
          </div>
        </div>
      );
    }

    function PreviewDemoVisual() {
      const [prOpen, setPrOpen] = useState(false);
      useEffect(() => {
        const timer = setInterval(() => setPrOpen(p => !p), 3000);
        return () => clearInterval(timer);
      }, []);

      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Preview URL 동작</div>
          <div className="border border-slate-200 rounded-lg overflow-hidden">
            <div className="bg-slate-800 px-3 py-1.5 flex items-center gap-2">
              <div className="flex gap-1"><div className="w-2.5 h-2.5 rounded-full bg-red-500"></div><div className="w-2.5 h-2.5 rounded-full bg-yellow-500"></div><div className="w-2.5 h-2.5 rounded-full bg-emerald-500"></div></div>
              <span className="text-[10px] text-slate-400">GitHub Pull Request #42</span>
            </div>
            <div className="p-3 bg-slate-50 space-y-2">
              <div className="flex items-center gap-2">
                <div className="w-5 h-5 bg-emerald-500 rounded-full flex items-center justify-center text-white text-[8px] font-bold">PR</div>
                <span className="text-[11px] font-bold text-slate-700">feat: 다크모드 추가</span>
                <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-bold">Open</span>
              </div>
              {prOpen && (
                <div className="bg-white border border-sky-200 rounded-lg p-2 ml-7 transition-all">
                  <div className="flex items-center gap-1.5 mb-1">
                    <div className="w-4 h-4 bg-slate-900 rounded-sm flex items-center justify-center text-white text-[7px] font-bold">▲</div>
                    <span className="text-[10px] font-bold text-slate-600">vercel bot</span>
                  </div>
                  <div className="text-[10px] text-slate-600 space-y-0.5">
                    <div className="text-emerald-600 font-bold">Preview deployed!</div>
                    <div className="text-sky-600 underline break-all">https://my-app-git-dark-mode-user.vercel.app</div>
                    <div className="text-slate-400">Built in 42s</div>
                  </div>
                </div>
              )}
            </div>
          </div>
          <div className="mt-2 text-center text-[10px] text-slate-500">
            {prOpen ? 'PR 열림 → Preview URL 자동 생성!' : 'PR 생성 대기 중...'}
          </div>
        </div>
      );
    }

    function ComparisonTableVisual() {
      const platforms = [
        { name: 'Vercel', ssr: '◎', preview: '◎', free: '○', setup: '쉬움', best: 'Next.js / React SPA' },
        { name: 'Netlify', ssr: '○', preview: '◎', free: '◎', setup: '쉬움', best: 'JAMstack / SPA' },
        { name: 'GitHub Pages', ssr: '✕', preview: '✕', free: '◎', setup: '보통', best: '정적 사이트' },
      ];

      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">플랫폼 비교</div>
          <div className="overflow-x-auto">
            <table className="w-full text-[10px]">
              <thead>
                <tr className="border-b border-slate-200">
                  <th className="text-left py-1.5 px-1 text-slate-500 font-bold">플랫폼</th>
                  <th className="text-center py-1.5 px-1 text-slate-500 font-bold">SSR</th>
                  <th className="text-center py-1.5 px-1 text-slate-500 font-bold">Preview</th>
                  <th className="text-center py-1.5 px-1 text-slate-500 font-bold">무료</th>
                  <th className="text-center py-1.5 px-1 text-slate-500 font-bold">난이도</th>
                  <th className="text-left py-1.5 px-1 text-slate-500 font-bold">추천 용도</th>
                </tr>
              </thead>
              <tbody>
                {platforms.map((p) => (
                  <tr key={p.name} className="border-b border-slate-100">
                    <td className="py-1.5 px-1 font-bold text-slate-700">{p.name}</td>
                    <td className="py-1.5 px-1 text-center">{p.ssr}</td>
                    <td className="py-1.5 px-1 text-center">{p.preview}</td>
                    <td className="py-1.5 px-1 text-center">{p.free}</td>
                    <td className="py-1.5 px-1 text-center">{p.setup}</td>
                    <td className="py-1.5 px-1 text-slate-600">{p.best}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="mt-2 text-[9px] text-slate-400">◎ 최적 | ○ 지원 | ✕ 미지원</div>
        </div>
      );
    }

    /* ─── Shared Components ─── */

    function CodePanel({ code }) {
      if (!code) return null;
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5"><div className="w-3 h-3 rounded-full bg-red-500"></div><div className="w-3 h-3 rounded-full bg-yellow-500"></div><div className="w-3 h-3 rounded-full bg-emerald-500"></div></div>
            <span className="text-[10px] text-slate-500 ml-2">vercel-deploy.sh</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    /* ─── App ─── */

    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => { setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; }); };
      const nextRef = useRef(next); nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const VISUAL_MAP = {
        'deploy-flow': DeployFlowVisual,
        'vercel-info': VercelInfoVisual,
        'deploy-pipeline': DeployPipelineVisual,
        'preview-demo': PreviewDemoVisual,
        'comparison-table': ComparisonTableVisual,
      };
      const VisualComponent = VISUAL_MAP[step.visual];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-orange-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">VII</div>
                <h1 className="text-2xl font-bold text-slate-800">Vercel로 배포하기</h1>
              </div>
              <p className="text-slate-600 text-sm">Git push만으로 React 앱을 전 세계에 배포하는 <b>Vercel</b> 플랫폼을 학습합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter VII-1-2 | ★★★ | 선수 지식 VII-1-1 | 2026-04-21</p>
            </header>

            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-orange-500' : 'bg-slate-200'}`} aria-label={`Step ${i + 1}`} />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                <CodePanel code={step.code} />
                {VisualComponent && <VisualComponent />}
              </div>
              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-orange-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>
              </div>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }} disabled={idx === 0} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="이전 단계">← 이전</button>
              <button onClick={() => { if (isEnd) { setIdx(0); } setIsPlaying(p => !p); }} className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-orange-500 hover:bg-orange-600 text-white'}`} aria-label={isPlaying ? '정지' : '자동 실행'}>{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }} disabled={isEnd} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="다음 단계">다음 →</button>
            </div>
            <footer className="text-center text-xs text-slate-400 pb-4">React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-21</footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
