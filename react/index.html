<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React 인터랙티브 학습</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" data-presets="env,react"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const SECTIONS = [
      {
        part: 'I', label: 'Part I. 왜 React인가', color: 'bg-amber-600',
        items: [
          { id: 'I-1-1', title: '브라우저가 웹 페이지를 그리는 방법', file: './chapter-01-01-browser-rendering.html' },
          { id: 'I-1-2', title: 'JavaScript가 DOM을 직접 다루면?', file: './chapter-01-01-dom-manipulation.html' },
          { id: 'I-1-3', title: '선언형 UI', file: './chapter-01-01-declarative-ui.html' },
          { id: 'I-1-4', title: 'React가 등장한 이유', file: './chapter-01-01-react-origin.html' },
          { id: 'I-1-5', title: 'React로 만든 것들', file: './chapter-01-01-react-showcase.html' },
        ],
      },
      {
        part: 'II', label: 'Part II. JS 프레임워크 지도', color: 'bg-violet-600',
        items: [
          { id: 'II-1-1', title: '프레임워크 vs 라이브러리', file: './chapter-02-01-framework-vs-library.html' },
          { id: 'II-1-2', title: 'React / Vue / Svelte / Angular 비교', file: './chapter-02-01-framework-comparison.html' },
          { id: 'II-1-3', title: 'SPA vs MPA', file: './chapter-02-01-spa-vs-mpa.html' },
          { id: 'II-1-4', title: '번들러 지도', file: './chapter-02-01-bundler-map.html' },
          { id: 'II-1-5', title: 'React를 선택하는 기준', file: './chapter-02-01-why-react.html' },
        ],
      },
      {
        part: 'III', label: 'Part III. React 첫 걸음', color: 'bg-teal-600',
        items: [
          { id: 'III-1-1', title: '개발 환경 준비', file: './chapter-03-01-dev-setup.html' },
          { id: 'III-1-2', title: '첫 컴포넌트 만들기', file: './chapter-03-01-first-component.html' },
          { id: 'III-1-3', title: 'JSX — HTML처럼 생긴 JavaScript', file: './chapter-03-01-jsx.html' },
          { id: 'III-1-4', title: 'Props — 컴포넌트에 값 ���달하기', file: './chapter-03-01-props.html' },
          { id: 'III-1-5', title: '처음 만나는 에러와 해결법', file: './chapter-03-01-common-errors.html' },
        ],
      },
      {
        part: 'IIIB', label: 'Part III-B. React 실전 기초 보강', color: 'bg-emerald-600',
        items: [
          { id: 'III-B-1', title: '조건부 렌더링', file: './chapter-03b-01-conditional-rendering.html' },
          { id: 'III-B-2', title: '리스트 렌더링', file: './chapter-03b-02-list-rendering.html' },
          { id: 'III-B-3', title: '이벤트 핸들러', file: './chapter-03b-03-event-handler.html' },
          { id: 'III-B-4', title: 'State 고급', file: './chapter-03b-04-state-advanced.html' },
          { id: 'III-B-5', title: 'useRef Hook', file: './chapter-03b-05-useref.html' },
          { id: 'III-B-6', title: 'useReducer', file: './chapter-03b-06-usereducer.html' },
          { id: 'III-B-7', title: '순수 컴포넌트와 Strict Mode', file: './chapter-03b-07-pure-component.html' },
          { id: 'III-B-8', title: 'CSS 스타일링 비교', file: './chapter-03b-08-css-styling.html' },
        ],
      },
      {
        part: 'IV', label: 'Part IV. 컴포넌트·Hooks', color: 'bg-sky-600',
        items: [
          { id: 'IV-1-1', title: '렌더링 파이프라인', file: './chapter-04-01-rendering.html' },
          { id: 'IV-1-2', title: 'useState', file: './chapter-04-02-usestate.html' },
          { id: 'IV-1-3', title: 'useEffect 생명주기', file: './chapter-04-03-useeffect.html' },
          { id: 'IV-1-4', title: '커스텀 Hook', file: './chapter-04-04-custom-hook.html' },
        ],
      },
      {
        part: 'V', label: 'Part V. 상태 관리·라우팅·API', color: 'bg-indigo-600',
        items: [
          { id: 'V-1-1', title: 'Context API', file: './chapter-05-01-context-api.html' },
          { id: 'V-1-2', title: '외부 상태 라이브러리', file: './chapter-05-02-state-libraries.html' },
          { id: 'V-1-3', title: 'React Router', file: './chapter-05-03-react-router.html' },
          { id: 'V-1-4', title: '서버에서 데이터 가져오기', file: './chapter-05-04-data-fetching.html' },
        ],
      },
      {
        part: 'VI', label: 'Part VI. 실전 프론트엔드 프로젝트', color: 'bg-rose-600',
        items: [
          { id: 'VI-1-1', title: '프로젝트 설계 — 폴더 구조', file: './chapter-06-01-project-structure.html' },
          { id: 'VI-1-2', title: '폼과 유효성 검사', file: './chapter-06-02-forms.html' },
          { id: 'VI-1-3', title: '���증(Auth) 흐름 구현', file: './chapter-06-03-auth-flow.html' },
          { id: 'VI-1-4', title: '에러 경계와 로��� 상태', file: './chapter-06-04-error-boundary.html' },
        ],
      },
      {
        part: 'VII', label: 'Part VII. 배포', color: 'bg-orange-600',
        items: [
          { id: 'VII-1-1', title: '빌드 결과물 이해하기', file: './chapter-07-01-build.html' },
          { id: 'VII-1-2', title: 'Vercel로 배포하기', file: './chapter-07-02-vercel.html' },
          { id: 'VII-1-3', title: '환경 변수와 API 키 보호', file: './chapter-07-03-env-variables.html' },
          { id: 'VII-1-4', title: '성능 최적화 기초', file: './chapter-07-04-performance.html' },
        ],
      },
    ];

    const TOTAL = SECTIONS.reduce((sum, s) => sum + s.items.length, 0);

    const PART_BG = {
      I: 'hover:bg-amber-50', II: 'hover:bg-violet-50', III: 'hover:bg-teal-50',
      IIIB: 'hover:bg-emerald-50', IV: 'hover:bg-sky-50', V: 'hover:bg-indigo-50',
      VI: 'hover:bg-rose-50', VII: 'hover:bg-orange-50',
    };

    const PART_ACTIVE = {
      I: 'bg-amber-100 text-amber-800 font-bold', II: 'bg-violet-100 text-violet-800 font-bold',
      III: 'bg-teal-100 text-teal-800 font-bold', IIIB: 'bg-emerald-100 text-emerald-800 font-bold',
      IV: 'bg-sky-100 text-sky-800 font-bold', V: 'bg-indigo-100 text-indigo-800 font-bold',
      VI: 'bg-rose-100 text-rose-800 font-bold', VII: 'bg-orange-100 text-orange-800 font-bold',
    };

    function findItemById(id) {
      for (const section of SECTIONS) {
        const found = section.items.find(item => item.id === id);
        if (found) return { ...found, part: section.part };
      }
      return null;
    }

    /**
     * GiscusPanel — 마인드맵의 vanilla JS giscus 패널을 React로 재현.
     */
    function GiscusPanel({ term }) {
      const [open, setOpen] = React.useState(false);
      const [width, setWidth] = React.useState(() => Math.min(480, Math.round(window.innerWidth * 0.9)));
      const bodyRef = React.useRef(null);
      const loadedRef = React.useRef(false);

      React.useEffect(() => {
        if (!open || loadedRef.current || !bodyRef.current) return;
        const s = document.createElement('script');
        s.src = 'https://giscus.app/client.js';
        s.async = true;
        s.crossOrigin = 'anonymous';
        s.setAttribute('data-repo', 'HoyoungParkme/tech-roadmap');
        s.setAttribute('data-repo-id', 'R_kgDOSIZCtg');
        s.setAttribute('data-category', 'General');
        s.setAttribute('data-category-id', 'DIC_kwDOSIZCts4C7lgx');
        s.setAttribute('data-mapping', 'specific');
        s.setAttribute('data-term', term);
        s.setAttribute('data-strict', '0');
        s.setAttribute('data-reactions-enabled', '1');
        s.setAttribute('data-emit-metadata', '0');
        s.setAttribute('data-input-position', 'bottom');
        s.setAttribute('data-theme', 'light');
        s.setAttribute('data-lang', 'ko');
        bodyRef.current.appendChild(s);
        loadedRef.current = true;
      }, [open, term]);

      const onResizeStart = (e) => {
        e.preventDefault();
        const startX = e.clientX;
        const startW = width;
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;cursor:ew-resize;';
        document.body.appendChild(overlay);
        const onMove = (ev) => {
          const newW = Math.max(320, Math.min(window.innerWidth * 0.9, startW + (startX - ev.clientX)));
          setWidth(newW);
        };
        const onUp = () => {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
          overlay.remove();
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      };

      const buttonRight = open ? Math.min(width, window.innerWidth - 40) + 'px' : 0;

      return (
        <React.Fragment>
          <button
            onClick={() => setOpen(o => !o)}
            aria-expanded={open}
            aria-label={open ? '댓글 패널 닫기' : '댓글 패널 열기'}
            style={{ position: 'fixed', top: '40%', right: buttonRight, zIndex: 51, writingMode: 'vertical-rl', transition: 'right 0.25s ease' }}
            className="bg-slate-800 text-white px-2 py-3 rounded-l-lg text-sm font-medium shadow-md hover:bg-slate-700"
          >
            💬 {open ? '닫기' : '댓글'}
          </button>
          <div
            role="complementary"
            aria-label="댓글 패널"
            style={{ position: 'fixed', top: 0, right: 0, height: '100vh', width: width + 'px', transform: open ? 'translateX(0)' : 'translateX(100%)', transition: 'transform 0.25s ease', zIndex: 50, background: '#fff', boxShadow: '-4px 0 12px rgba(0,0,0,0.08)' }}
          >
            <div onMouseDown={onResizeStart} style={{ position: 'absolute', left: '-4px', top: 0, width: '8px', height: '100%', cursor: 'ew-resize', zIndex: 52 }} aria-hidden="true" />
            <div className="border-b border-slate-200 px-4 py-3 flex items-center justify-between">
              <span className="font-bold text-slate-800">💬 댓글 / 질문</span>
              <button onClick={() => setOpen(false)} aria-label="댓글 패널 닫기" className="text-slate-500 hover:text-slate-800 px-2">✕</button>
            </div>
            <div ref={bodyRef} className="p-4 overflow-y-auto" style={{ height: 'calc(100vh - 56px)' }} />
          </div>
        </React.Fragment>
      );
    }

    function App() {
      const [activeId, setActiveId] = useState(null);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [expandedParts, setExpandedParts] = useState(
        { I: true, II: true, III: true, IIIB: true, IV: true, V: true, VI: true, VII: true }
      );

      const activeItem = activeId ? findItemById(activeId) : null;

      const navigate = useCallback((id) => {
        setActiveId(id);
        window.location.hash = id;
        if (window.innerWidth < 1024) setSidebarOpen(false);
      }, []);

      useEffect(() => {
        const hash = window.location.hash.slice(1);
        if (hash && findItemById(hash)) setActiveId(hash);
        const onHash = () => {
          const h = window.location.hash.slice(1);
          if (h && findItemById(h)) setActiveId(h);
        };
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      const togglePart = (part) => {
        setExpandedParts(prev => ({ ...prev, [part]: !prev[part] }));
      };

      return (
        <React.Fragment>
        <div className="h-full flex bg-slate-100">

          {sidebarOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-30 z-30 lg:hidden" onClick={() => setSidebarOpen(false)} />
          )}

          <aside className={`
            fixed lg:static z-40 h-full w-72 bg-white border-r border-slate-200 flex flex-col
            transition-transform duration-200
            ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0 lg:w-72'}
          `}>
            <div className="p-4 border-b border-slate-200 shrink-0">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 bg-sky-600 text-white flex items-center justify-center rounded-lg font-bold text-sm">R</div>
                <div>
                  <div className="font-bold text-slate-800 text-sm">React 학습</div>
                  <div className="text-[11px] text-slate-500">{TOTAL}개 시각화</div>
                </div>
              </div>
            </div>

            <nav className="flex-1 overflow-y-auto p-2">
              {SECTIONS.map((section) => (
                <div key={section.part} className="mb-1">
                  <button
                    onClick={() => togglePart(section.part)}
                    className="w-full flex items-center gap-2 px-2 py-2 rounded-lg text-left hover:bg-slate-50 transition"
                  >
                    <span className={`w-5 h-5 rounded text-white text-[10px] flex items-center justify-center font-bold ${section.color}`}>
                      {section.part.length <= 3 ? section.part : section.part.slice(0, 2)}
                    </span>
                    <span className="text-xs font-bold text-slate-700 flex-1 truncate">{section.label}</span>
                    <span className="text-[10px] text-slate-400">{section.items.length}</span>
                    <span className={`text-slate-400 text-xs transition-transform ${expandedParts[section.part] ? 'rotate-90' : ''}`}>&#9654;</span>
                  </button>

                  {expandedParts[section.part] && (
                    <div className="ml-4 border-l border-slate-100 pl-2 space-y-0.5">
                      {section.items.map((item) => {
                        const isActive = activeId === item.id;
                        return (
                          <button
                            key={item.id}
                            onClick={() => navigate(item.id)}
                            className={`w-full text-left px-2 py-1.5 rounded-md text-xs transition-all truncate
                              ${isActive ? PART_ACTIVE[section.part] : `text-slate-600 ${PART_BG[section.part]}`}
                            `}
                          >
                            <span className="font-mono text-[10px] opacity-60 mr-1">{item.id}</span>
                            {item.title}
                          </button>
                        );
                      })}
                    </div>
                  )}
                </div>
              ))}
            </nav>

            <div className="p-3 border-t border-slate-200 shrink-0 text-[10px] text-slate-400 text-center">
              React + Tailwind + Babel CDN
            </div>
          </aside>

          <main className="flex-1 flex flex-col min-w-0">
            <div className="h-12 bg-white border-b border-slate-200 flex items-center px-4 shrink-0 gap-3">
              <button
                onClick={() => setSidebarOpen(prev => !prev)}
                className="lg:hidden p-1.5 rounded-md hover:bg-slate-100 text-slate-600"
                aria-label="사이드바 토글"
              >
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                  <path fillRule="evenodd" d="M3 5h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2z" />
                </svg>
              </button>

              {activeItem ? (
                <div className="flex items-center gap-2 min-w-0">
                  <span className={`w-5 h-5 rounded text-white text-[10px] flex items-center justify-center font-bold shrink-0 ${
                    SECTIONS.find(s => s.part === activeItem.part)?.color || 'bg-slate-600'
                  }`}>{activeItem.part.length <= 3 ? activeItem.part : activeItem.part.slice(0, 2)}</span>
                  <span className="font-mono text-xs text-slate-500 shrink-0">{activeItem.id}</span>
                  <span className="text-sm font-bold text-slate-800 truncate">{activeItem.title}</span>
                </div>
              ) : (
                <span className="text-sm text-slate-500">시각화를 선택하세요</span>
              )}
            </div>

            {activeItem ? (
              <iframe
                key={activeItem.id}
                src={activeItem.file}
                className="flex-1 w-full border-0"
                title={activeItem.title}
              />
            ) : (
              <div className="flex-1 flex items-center justify-center p-8">
                <div className="text-center max-w-md">
                  <div className="w-16 h-16 bg-sky-100 text-sky-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl font-bold">R</div>
                  <h2 className="text-2xl font-bold text-slate-800 mb-3">React 인터랙티브 학습</h2>
                  <p className="text-slate-600 mb-6 leading-relaxed">
                    왼쪽 사이드바에서 시각화를 선택하세요.<br/>
                    Part I부터 순서대로 보거나, 관심 있는 주제를 바로 클릭할 수 있습니다.
                  </p>
                  <div className="grid grid-cols-4 gap-2 mb-6">
                    {SECTIONS.map(s => (
                      <div key={s.part} className="text-center">
                        <div className={`w-8 h-8 rounded-lg text-white text-xs flex items-center justify-center font-bold mx-auto mb-1 ${s.color}`}>
                          {s.part.length <= 3 ? s.part : s.part.slice(0, 2)}
                        </div>
                        <div className="text-[10px] text-slate-500">{s.items.length}개</div>
                      </div>
                    ))}
                  </div>
                  <p className="text-xs text-slate-400">총 {TOTAL}개 시각화 | React + Tailwind CDN | 빌드 도구 없음</p>
                </div>
              </div>
            )}
          </main>
        </div>
        <GiscusPanel term="react" />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
