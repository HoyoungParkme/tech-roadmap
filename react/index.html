    function getPartNum(id) {
      // 'III-B-1' → 'III-B', 'IV-1-1' → 'IV'
      const parts = id.split('-');
      if (parts.length > 1 && isNaN(parts[1])) {
        return parts[0] + '-' + parts[1];
      }
      return parts[0];
    }

    function getPartForChapter(id) {
      return PARTS.find(p => p.num === getPartNum(id));
    }

    function groupByPart(chapters) {
      const groups = [];
      let current = null;
      chapters.forEach(ch => {
        const partNum = getPartNum(ch.id);
        if (!current || current.partNum !== partNum) {
          current = { partNum, chapters: [] };
          groups.push(current);
        }
        current.chapters.push(ch);
      });
      return groups;
    }

        }`}>
          <div className="p-5 flex-1 flex flex-col">
            <div className="flex items-center justify-between mb-2">
              <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full border ${part ? part.badge : 'bg-slate-50 text-slate-600'}`}>
                {chapter.id}
              </span>
              <span className="text-[10px] text-slate-400">{chapter.difficulty}</span>
            </div>
            <h3 className="text-sm font-bold text-slate-800 mb-1 leading-snug">{chapter.title}</h3>
            <p className="text-[11px] text-slate-500 mb-2">{chapter.subtitle}</p>
            <p className="text-xs text-slate-600 leading-relaxed flex-1">{chapter.summary}</p>
          </div>
          <div className="px-5 pb-5">
            {chapter.available ? (
              <a href={chapter.href}
                className={`block w-full text-center px-3 py-2 text-white text-sm font-medium rounded-lg transition shadow-sm ${part ? part.btn : 'bg-sky-600 hover:bg-sky-700'}`}>
                시작하기
              </a>
            ) : (
              <span className="block w-full text-center px-3 py-2 bg-slate-100 text-slate-400 text-sm font-medium rounded-lg">준비 중</span>
            )}
          </div>
        </div>
      );
    }

    // -----------------------------------------
    // 4. 사이드바 컴포넌트
    // -----------------------------------------
    function Sidebar({ groups, totalChapters, availableChapters, onClose, onSelect, selectedHref }) {
      const [openParts, setOpenParts] = useState(() => {
        const init = {};
        PARTS.forEach(p => { init[p.num] = true; });
        return init;
      });

      const togglePart = (num) => {
        setOpenParts(prev => ({ ...prev, [num]: !prev[num] }));
      };

      return (
        <div className="flex flex-col h-full">
          {/* 사이드바 헤더 */}
          <div className="p-4 border-b border-slate-200">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 bg-sky-500 text-white rounded-lg font-bold text-sm flex items-center justify-center select-none">R</div>
                <div>
                  <div className="text-sm font-bold text-slate-800 leading-tight">React 학습</div>
                  <div className="text-[10px] text-slate-400">인터랙티브 시각화</div>
                </div>
              </div>
              {/* 모바일 닫기 버튼 */}
              {onClose && (
                <button onClick={onClose} className="lg:hidden p-1 text-slate-400 hover:text-slate-600" aria-label="사이드바 닫기">
                  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2"><line x1="4" y1="4" x2="16" y2="16"/><line x1="16" y1="4" x2="4" y2="16"/></svg>
                </button>
              )}
            </div>
            {/* 진행률 */}
            <div className="mt-3">
              <div className="flex items-center justify-between text-[10px] text-slate-500 mb-1">
                <span>진행률</span>
                <span className="font-bold text-sky-600">{availableChapters}/{totalChapters}</span>
              </div>
              <div className="w-full h-1.5 bg-slate-200 rounded-full overflow-hidden">
                <div className="h-full bg-sky-500 rounded-full transition-all" style={{width: `${(availableChapters/totalChapters)*100}%`}}></div>
              </div>
            </div>
          </div>

          {/* 목차 리스트 */}
          <nav className="flex-1 overflow-y-auto p-2">
            {groups.map(group => {
              const part = PARTS.find(p => p.num === group.partNum);
              if (!part) return null;
              const isOpen = openParts[part.num];
              return (
                <div key={group.partNum} className="mb-1">
                  <button onClick={() => togglePart(part.num)}
                    className="w-full flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-slate-100 transition text-left">
                    <div className={`w-5 h-5 ${part.color} text-white flex items-center justify-center rounded text-[9px] font-bold select-none shrink-0`}>
                      {part.num.length > 3 ? '...' : part.num}
                    </div>
                    <span className="text-xs font-bold text-slate-700 flex-1 truncate">{part.title}</span>
                    <span className="text-[10px] text-slate-400 shrink-0">{isOpen ? '▾' : '▸'}</span>
                  </button>
                  {isOpen && (
                    <div className="ml-3 pl-4 border-l-2 border-slate-100">
                      {group.chapters.map(ch => (
                        <button key={ch.id} onClick={() => { onSelect(ch.href); if (onClose) onClose(); }}
                          className={`w-full flex items-center gap-1.5 px-2 py-1 rounded text-[11px] transition truncate text-left ${
                            selectedHref === ch.href
                              ? 'bg-sky-100 text-sky-700 font-bold'
                              : 'text-slate-600 hover:bg-sky-50 hover:text-sky-700'
                          }`}>
                          <span className={`w-1.5 h-1.5 rounded-full shrink-0 ${ch.available ? part.color : 'bg-slate-300'}`}></span>
                          <span className="truncate">{ch.title}</span>
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </nav>

          {/* 사이드바 푸터 */}
          <div className="p-3 border-t border-slate-200 text-[10px] text-slate-400 text-center">
            {totalChapters}개 Section | React 18
          </div>
        </div>
      );
    }

    // -----------------------------------------
    // 5. 메인 앱
    // -----------------------------------------
    function App() {
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [selectedHref, setSelectedHref] = useState(null);
      const groups = groupByPart(CHAPTERS);
      const totalChapters = CHAPTERS.length;
      const availableChapters = CHAPTERS.filter(c => c.available).length;
      const selectedChapter = selectedHref ? CHAPTERS.find(c => c.href === selectedHref) : null;

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-800 flex">

          {/* 사이드바 — 데스크톱: 항상 표시 */}
          <aside className="hidden lg:block w-64 shrink-0 bg-white border-r border-slate-200 sticky top-0 h-screen overflow-hidden">
            <Sidebar groups={groups} totalChapters={totalChapters} availableChapters={availableChapters} onSelect={setSelectedHref} selectedHref={selectedHref} />
          </aside>

          {/* 사이드바 — 모바일: 오버레이 */}
          {sidebarOpen && (
            <div className="lg:hidden fixed inset-0 z-50 flex">
              <div className="w-72 bg-white border-r border-slate-200 h-full shadow-xl overflow-hidden">
                <Sidebar groups={groups} totalChapters={totalChapters} availableChapters={availableChapters} onClose={() => setSidebarOpen(false)} onSelect={setSelectedHref} selectedHref={selectedHref} />
              </div>
              <div className="flex-1 bg-black/30" onClick={() => setSidebarOpen(false)}></div>
            </div>
          )}

          {/* 메인 컨텐츠 */}
          <main className="flex-1 min-w-0 flex flex-col">

            {/* 챕터가 선택되면 iframe으로 표시 */}
            {selectedHref ? (
              <div className="flex flex-col h-screen">
                {/* 상단 바 — 챕터 제목 + 돌아가기 */}
                <div className="flex items-center gap-3 px-4 py-2 bg-white border-b border-slate-200 shrink-0">
                  <button onClick={() => setSelectedHref(null)}
                    className="flex items-center gap-1 px-3 py-1.5 bg-slate-100 text-slate-600 text-xs font-bold rounded-lg hover:bg-slate-200 transition">
                    &larr; 목차
                  </button>
                  {selectedChapter && (
                    <div className="flex items-center gap-2 min-w-0">
                      <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full border shrink-0 ${
                        getPartForChapter(selectedChapter.id)?.badge || 'bg-slate-50 text-slate-600'
                      }`}>{selectedChapter.id}</span>
                      <span className="text-sm font-bold text-slate-700 truncate">{selectedChapter.title}</span>
                    </div>
                  )}
                  {/* 모바일 햄버거 */}
                  <button onClick={() => setSidebarOpen(true)}
                    className="lg:hidden ml-auto p-1.5 text-slate-400 hover:text-slate-600"
                    aria-label="목차 열기">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="4" x2="15" y2="4"/><line x1="3" y1="9" x2="15" y2="9"/><line x1="3" y1="14" x2="15" y2="14"/></svg>
                  </button>
                </div>
                {/* iframe */}
                <iframe src={selectedHref} className="flex-1 w-full border-0" title={selectedChapter?.title || '챕터'} />
              </div>
            ) : (
              /* 카드 그리드 (기본 화면) */
              <div className="max-w-5xl mx-auto p-6 space-y-8">

                {/* 모바일 햄버거 버튼 */}
                <div className="lg:hidden">
                  <button onClick={() => setSidebarOpen(true)}
                    className="flex items-center gap-2 px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-600 hover:bg-slate-50 transition shadow-sm"
                    aria-label="목차 열기">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="4" x2="15" y2="4"/><line x1="3" y1="9" x2="15" y2="9"/><line x1="3" y1="14" x2="15" y2="14"/></svg>
                    목차
                  </button>
                </div>

                {/* 헤더 */}
                <header className="text-center pt-4 pb-4">
                  <h1 className="text-3xl font-bold text-slate-800 mb-2">React 인터랙티브 학습 자료</h1>
                  <p className="text-slate-500 text-sm max-w-xl mx-auto leading-relaxed">
                    React 18의 핵심 개념을 <b>단계별 애니메이션 시각화</b>로 체험합니다.
                    기초(Part I)부터 배포(Part VII)까지 <b>{totalChapters}개 챕터</b>를 제공합니다.
                  </p>
                  <p className="mt-3 text-[11px] text-slate-400">
                    CDN + Babel Standalone | 빌드 없이 Live Server로 실행 | React 18 + Hooks 기준
                  </p>
                </header>

                {/* Part별 그룹 */}
                {groups.map(group => {
                  const part = PARTS.find(p => p.num === group.partNum);
                  if (!part) return null;
                  return (
                    <section key={group.partNum} id={`part-${group.partNum}`}>
                      <div className="flex items-center gap-3 mb-4">
                        <div className={`w-8 h-8 ${part.color} text-white flex items-center justify-center rounded-lg font-bold text-sm select-none`}>
                          {part.num}
                        </div>
                        <div>
                          <h2 className="text-lg font-bold text-slate-800">Part {part.num}. {part.title}</h2>
                          <p className="text-[11px] text-slate-400">{part.difficulty} | {group.chapters.length}개 챕터</p>
                        </div>
                      </div>
                      <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">
                        {group.chapters.map(ch => (
                          <ChapterCard key={ch.id} chapter={ch} />
                        ))}
                      </div>
                    </section>
                  );
                })}

                {/* 커리큘럼 링크 */}
                <section className="text-center">
                  <a href="./curriculum.md"
                    className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">
                    커리큘럼 전체 목차 보기 &rarr;
                  </a>
                </section>

                {/* 푸터 */}
                <footer className="text-center text-xs text-slate-400 pb-8 space-y-1">
                  <p>React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN</p>
                  <p>2026-04-21 기준 | {totalChapters}개 Section 완성</p>
                </footer>

              </div>
            )}
          </main>
        </div>
      );
    }

    // -----------------------------------------
    // 4. 마운트
    // -----------------------------------------
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
