<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>환경 변수와 API 키 보호 — Chapter VII-1-3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1 — 환경 변수란?',
        desc: '환경 변수는 코드에 직접 쓰지 않는 설정값입니다. API URL, 디버그 모드 같은 "환경마다 다른 값"을 .env 파일에 분리합니다. 코드는 같지만, 개발/스테이징/프로덕션에서 다른 값을 사용할 수 있습니다.',
        code: '// .env 파일\nVITE_API_URL=https://api.example.com\nVITE_APP_TITLE=My React App\nVITE_DEBUG=true\n\n// 코드에서 사용\nconst apiUrl = import.meta.env.VITE_API_URL;\nfetch(`${apiUrl}/users`);',
        visual: 'concept',
      },
      {
        title: 'Step 2 — VITE_ 접두사 규칙',
        desc: 'Vite에서는 VITE_로 시작하는 변수만 브라우저 코드에서 접근할 수 있습니다. VITE_ 없는 변수는 서버 사이드에서만 사용 가능합니다. 이 규칙이 실수로 비밀 값이 노출되는 것을 방지합니다.',
        code: '// .env\nVITE_API_URL=https://api.example.com  ← 접근 가능\nVITE_APP_NAME=MyApp                   ← 접근 가능\nDB_PASSWORD=secret123                  ← 접근 불가!\nSECRET_KEY=abc123                      ← 접근 불가!\n\n// 코드에서\nimport.meta.env.VITE_API_URL  // ✅ "https://api.example.com"\nimport.meta.env.DB_PASSWORD   // ❌ undefined',
        visual: 'prefix',
      },
      {
        title: 'Step 3 — 환경별 .env 파일',
        desc: '환경마다 다른 .env 파일을 사용할 수 있습니다. .env.development는 개발 시, .env.production은 빌드 시 적용됩니다. Vercel 같은 배포 플랫폼에서는 대시보드에서 환경 변수를 설정합니다.',
        code: '// .env.development (npm run dev)\nVITE_API_URL=http://localhost:3000/api\nVITE_DEBUG=true\n\n// .env.production (npm run build)\nVITE_API_URL=https://api.myapp.com\nVITE_DEBUG=false\n\n// .env.local (git에 포함 안 됨)\nVITE_SECRET_TOKEN=my-dev-token\n\n// .gitignore에 반드시 추가!\n.env.local\n.env.*.local',
        visual: 'environments',
      },
      {
        title: 'Step 4 — 보안 주의사항',
        desc: 'Vite 환경 변수는 빌드 시 번들에 포함됩니다. 즉, 브라우저 개발자 도구에서 볼 수 있습니다! API 시크릿 키, DB 비밀번호 같은 진짜 비밀은 절대 프론트엔드에 두면 안 됩니다.',
        code: '// ❌ 절대 하면 안 되는 것\nVITE_DB_PASSWORD=secret123\nVITE_STRIPE_SECRET=sk_live_xxx\nVITE_JWT_SECRET=my-jwt-secret\n\n// ✅ 프론트엔드에 둬도 되는 것\nVITE_API_URL=https://api.example.com\nVITE_GOOGLE_MAPS_KEY=AIzaSy...  // 공개 키\nVITE_APP_VERSION=1.0.0\n\n// 비밀 값은 → 백엔드 서버에서만 사용!',
        visual: 'security',
      },
      {
        title: 'Step 5 — 환경 변수 체크리스트',
        desc: '프로젝트에서 환경 변수를 안전하게 사용하기 위한 체크리스트입니다. 이 규칙을 지키면 API 키 노출 사고를 예방할 수 있습니다.',
        code: null,
        visual: 'checklist',
      },
    ];

    function ConceptVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">환경별 다른 설정</div>
          <div className="flex gap-3 justify-center">
            {[
              { env: '개발', url: 'localhost:3000', color: 'bg-emerald-50 border-emerald-200 text-emerald-700' },
              { env: '스테이징', url: 'staging-api.com', color: 'bg-amber-50 border-amber-200 text-amber-700' },
              { env: '프로덕션', url: 'api.myapp.com', color: 'bg-sky-50 border-sky-200 text-sky-700' },
            ].map((item) => (
              <div key={item.env} className={`${item.color} border rounded-lg px-3 py-2 text-center flex-1`}>
                <div className="text-xs font-bold">{item.env}</div>
                <div className="text-[9px] mt-1 font-mono">{item.url}</div>
              </div>
            ))}
          </div>
          <div className="mt-2 text-center text-[10px] text-slate-500">같은 코드, 다른 환경 변수 → 다른 동작</div>
        </div>
      );
    }

    function PrefixVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">VITE_ 접두사 필터</div>
          <div className="space-y-2">
            {[
              { name: 'VITE_API_URL', safe: true, access: '브라우저 ✅' },
              { name: 'VITE_APP_NAME', safe: true, access: '브라우저 ✅' },
              { name: 'DB_PASSWORD', safe: false, access: '차단됨 🚫' },
              { name: 'SECRET_KEY', safe: false, access: '차단됨 🚫' },
            ].map((v) => (
              <div key={v.name} className={`flex items-center gap-3 rounded-lg px-3 py-2 ${v.safe ? 'bg-emerald-50 border border-emerald-200' : 'bg-red-50 border border-red-200'}`}>
                <span className={`text-xs font-mono font-bold ${v.safe ? 'text-emerald-700' : 'text-red-700 line-through'}`}>{v.name}</span>
                <span className="text-[10px] text-slate-500 ml-auto">{v.access}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function EnvironmentsVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">.env 파일 우선순위</div>
          <div className="space-y-1.5">
            {[
              { file: '.env', desc: '모든 환경 기본값', priority: '1 (가장 낮음)' },
              { file: '.env.development', desc: 'npm run dev 시 적용', priority: '2' },
              { file: '.env.production', desc: 'npm run build 시 적용', priority: '2' },
              { file: '.env.local', desc: '로컬 전용 (git 제외)', priority: '3 (가장 높음)' },
            ].map((f) => (
              <div key={f.file} className="flex items-center gap-3 bg-slate-50 rounded-lg px-3 py-2">
                <span className="text-xs font-mono font-bold text-orange-600 min-w-[140px]">{f.file}</span>
                <span className="text-[10px] text-slate-600 flex-1">{f.desc}</span>
                <span className="text-[9px] text-slate-400">{f.priority}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function SecurityVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">보안 경고</div>
          <div className="bg-red-50 border-2 border-red-300 rounded-xl p-4 mb-3">
            <div className="text-xs font-bold text-red-700 mb-2">VITE_ 변수는 번들에 포함됩니다!</div>
            <div className="text-[10px] text-red-600 space-y-1">
              <div>브라우저 → 개발자 도구 → Sources → JS 파일 → 검색하면 값이 보임</div>
              <div className="font-bold">즉, VITE_ 환경 변수 = 공개 정보와 같음</div>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-red-50 border border-red-200 rounded-lg p-2">
              <div className="text-[10px] font-bold text-red-600 mb-1">🚫 프론트에 두면 안 됨</div>
              <div className="text-[9px] text-red-500 space-y-0.5">
                <div>DB 비밀번호</div><div>API 시크릿 키</div><div>JWT 서명 키</div>
              </div>
            </div>
            <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-2">
              <div className="text-[10px] font-bold text-emerald-600 mb-1">✅ 프론트에 둬도 됨</div>
              <div className="text-[9px] text-emerald-500 space-y-0.5">
                <div>API 엔드포인트 URL</div><div>공개 API 키</div><div>앱 버전</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ChecklistVisual() {
      const [checked, setChecked] = useState({});
      const items = [
        { id: 'gitignore', text: '.env.local을 .gitignore에 추가했는가?' },
        { id: 'prefix', text: '브라우저용 변수에 VITE_ 접두사를 붙였는가?' },
        { id: 'secret', text: 'API 시크릿/DB 비밀번호를 VITE_로 시작하지 않았는���?' },
        { id: 'commit', text: '.env 파일을 git에 커밋하지 않았는가?' },
        { id: 'vercel', text: '배포 플랫폼에 환경 변수를 설정했는가?' },
        { id: 'example', text: '.env.example 파일로 필요��� 변수 목록을 공유했는가?' },
      ];
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">환경 변수 안전 체크리스트</div>
          <div className="space-y-2">
            {items.map((item) => (
              <button key={item.id} onClick={() => setChecked(p => ({ ...p, [item.id]: !p[item.id] }))}
                className={`w-full text-left flex items-center gap-3 px-3 py-2 rounded-lg transition ${checked[item.id] ? 'bg-emerald-50 border border-emerald-200' : 'bg-slate-50 border border-slate-200 hover:bg-slate-100'}`}>
                <span className={`w-5 h-5 rounded border-2 flex items-center justify-center text-xs ${checked[item.id] ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-300'}`}>
                  {checked[item.id] ? '✓' : ''}
                </span>
                <span className={`text-xs ${checked[item.id] ? 'text-emerald-700 line-through' : 'text-slate-700'}`}>{item.text}</span>
              </button>
            ))}
          </div>
          <div className="mt-2 text-center text-[10px] text-slate-500">{Object.values(checked).filter(Boolean).length} / {items.length} 완료</div>
        </div>
      );
    }

    function CodePanel({ code }) {
      if (!code) return null;
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5"><div className="w-3 h-3 rounded-full bg-red-500"></div><div className="w-3 h-3 rounded-full bg-yellow-500"></div><div className="w-3 h-3 rounded-full bg-emerald-500"></div></div>
            <span className="text-[10px] text-slate-500 ml-2">.env</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;
      const next = () => { setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; }); };
      const nextRef = useRef(next); nextRef.current = next;
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const VISUAL_MAP = { concept: ConceptVisual, prefix: PrefixVisual, environments: EnvironmentsVisual, security: SecurityVisual, checklist: ChecklistVisual };
      const VisualComponent = VISUAL_MAP[step.visual];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-orange-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">VII</div>
                <h1 className="text-2xl font-bold text-slate-800">환경 변수와 API 키 보호</h1>
              </div>
              <p className="text-slate-600 text-sm">Vite <b>.env 파일</b>과 <b>VITE_ 접두사</b> 규칙, 보안 주의사항을 시각화합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter VII-1-3 | ★★★ | 선수 지식 VII-1-2 | 2026-04-21</p>
            </header>
            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.title} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-orange-500' : 'bg-slate-200'}`} aria-label={`Step ${i + 1}`} />
              ))}
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                <CodePanel code={step.code} />
                {VisualComponent && <VisualComponent />}
              </div>
              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-orange-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>
              </div>
            </div>
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }} disabled={idx === 0} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="이전 단계">← 이전</button>
              <button onClick={() => { if (isEnd) { setIdx(0); } setIsPlaying(p => !p); }} className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-orange-500 hover:bg-orange-600 text-white'}`} aria-label={isPlaying ? '정지' : '자동 실행'}>{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }} disabled={isEnd} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="다음 단계">다음 →</button>
            </div>
            <footer className="text-center text-xs text-slate-400 pb-4">React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-21</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
