    // ─────────────────────────────────────────────────────
    // EnvBox — 환경별 박스 (.env / .env.local / Vercel)
    //   color: indigo, sky, amber, emerald, rose
    //   vars[] = { name, value, leak, secret, highlight }
    //     leak = 'public' | 'leak' | 'safe' | 'server' | 'replaced'
    // ─────────────────────────────────────────────────────
    function EnvBox({ box }) {
      const colorMap = {
        indigo:  { bg: 'bg-indigo-50',  border: 'border-indigo-300',  badge: 'bg-indigo-100 text-indigo-700',   title: 'text-indigo-900' },
        sky:     { bg: 'bg-sky-50',     border: 'border-sky-300',     badge: 'bg-sky-100 text-sky-700',         title: 'text-sky-900' },
        amber:   { bg: 'bg-amber-50',   border: 'border-amber-300',   badge: 'bg-amber-100 text-amber-700',     title: 'text-amber-900' },
        emerald: { bg: 'bg-emerald-50', border: 'border-emerald-300', badge: 'bg-emerald-100 text-emerald-700', title: 'text-emerald-900' },
        rose:    { bg: 'bg-rose-50',    border: 'border-rose-300',    badge: 'bg-rose-100 text-rose-700',       title: 'text-rose-900' },
      };
      const c = colorMap[box.color] || colorMap.indigo;

      const leakIcon = (leak, secret) => {
        if (secret) return { icon: '🔒', text: 'text-rose-700', bg: 'bg-rose-100', label: 'SECRET' };
        if (leak === 'leak') return { icon: '⚠', text: 'text-rose-700', bg: 'bg-rose-100', label: 'LEAK' };
        if (leak === 'public') return { icon: '🌐', text: 'text-indigo-700', bg: 'bg-indigo-100', label: 'PUBLIC' };
        if (leak === 'server') return { icon: '🛡', text: 'text-emerald-700', bg: 'bg-emerald-100', label: 'SERVER' };
        if (leak === 'replaced') return { icon: '↻', text: 'text-sky-700', bg: 'bg-sky-100', label: 'BUILD' };
        if (leak === 'safe') return { icon: '✓', text: 'text-emerald-700', bg: 'bg-emerald-100', label: 'SAFE' };
        return { icon: '·', text: 'text-slate-600', bg: 'bg-slate-100', label: 'VAR' };
      };

      return (
        <div className={`rounded-lg border-2 ${c.border} ${c.bg} overflow-hidden`}>
          <div className="flex items-center justify-between px-2.5 py-1 border-b border-slate-200/60">
            <div className={`text-[11px] font-bold ${c.title} font-mono`}>{box.label}</div>
            <span className={`text-[8px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded ${c.badge}`}>{box.badge}</span>
          </div>
          <div className="p-2 space-y-1">
            {box.vars.map((v, i) => {
              const li = leakIcon(v.leak, v.secret);
              return (
                <div key={i} className={`flex items-center gap-1.5 px-1.5 py-0.5 rounded text-[10.5px] font-mono ${v.highlight ? 'ring-2 ring-indigo-400 bg-white/70' : 'bg-white/40'}`}>
                  <span className={`${li.bg} ${li.text} px-1 py-0.5 rounded text-[8px] font-bold flex-shrink-0`}>{li.icon} {li.label}</span>
                  <span className="text-slate-800 font-bold">{v.name}</span>
                  <span className="text-slate-400">=</span>
                  <span className={`${v.secret ? 'text-rose-600 font-bold' : 'text-slate-600'} truncate`}>{v.value}</span>
                </div>
              );
            })}
          </div>
          {box.note && (
            <div className="px-2.5 py-1 text-[10px] text-slate-600 bg-white/50 border-t border-slate-200/60 leading-snug">{box.note}</div>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────

    function BundleBox({ bundle }) {

    // ─────────────────────────────────────────────────────

    // ─────────────────────────────────────────────────────
    // FlowArrow — 단계 화살표
    // ─────────────────────────────────────────────────────
    function FlowArrow({ label, danger }) {
      const colorClass = danger ? 'text-rose-600' : 'text-indigo-600';
      const arrowClass = danger ? 'text-rose-400' : 'text-indigo-400';
      return (
        <div className="flex items-center justify-center my-1">

            <div className={`text-[9px] font-mono font-bold tracking-wider uppercase ${colorClass}`}>{label}</div>
            <div className={`text-lg leading-none ${arrowClass}`}>↓</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    //   환경별 박스 → (옵션) 빌드 번들 노출 → (옵션) 백엔드 보호
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🔐 환경 변수 위치 + 노출 위험 시각화</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-2">

              <React.Fragment key={box.id}>

                    <span className="text-slate-300 text-xs">·  ·  ·</span>
                  </div>
                )}
              </React.Fragment>

            {step.bundle && step.bundle.visible && (
              <>
                <FlowArrow label="npm run build" danger />

              </>
            )}

            {step.backend && (
              <>
                <FlowArrow label="비밀은 백엔드로" />

              </>
            )}
          </div>

          {/* 핵심 포인트 */}
          <div className="mt-3 bg-indigo-50 border-l-4 border-indigo-400 px-3 py-2 rounded-r">
            <div className="text-[9px] font-bold text-indigo-600 uppercase tracking-wider mb-0.5">핵심 포인트</div>
            <p className="text-[11px] text-indigo-900 leading-snug">{step.keyPoint}</p>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1"><span className="bg-indigo-100 text-indigo-700 px-1 rounded text-[8px] font-bold">🌐 PUBLIC</span>공개 OK</span>
            <span className="flex items-center gap-1"><span className="bg-rose-100 text-rose-700 px-1 rounded text-[8px] font-bold">🔒 SECRET</span>비밀 — 노출 위험</span>
            <span className="flex items-center gap-1"><span className="bg-emerald-100 text-emerald-700 px-1 rounded text-[8px] font-bold">🛡 SERVER</span>백엔드 전용</span>
            <span className="flex items-center gap-1"><span className="bg-sky-100 text-sky-700 px-1 rounded text-[8px] font-bold">↻ BUILD</span>빌드 시 치환</span>
          </div>
        </div>
      );

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — 5 탭 + highlight.js + atom-one-dark
    //   탭 클릭으로 자유 이동, 단계 진행 시 자동 활성화
    // ─────────────────────────────────────────────────────
    function CodeViewer({ tabs, activeTabIdx, onTabClick, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);
      const code = tabs[activeTabIdx];

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [activeTabIdx]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 탭 바 */}
          <div className="bg-[#21252b] flex items-center border-b border-slate-700">
            <div className="flex gap-1.5 px-4 py-2 border-r border-slate-700">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <div className="flex overflow-x-auto flex-1">
              {tabs.map((tab, i) => (
                <button key={tab.filename} onClick={() => onTabClick(i)} className={`px-3 py-2 text-[11px] font-mono whitespace-nowrap border-r border-slate-700 transition ${i === activeTabIdx ? 'bg-[#282c34] text-indigo-300 border-b-2 border-b-indigo-400' : 'text-slate-500 hover:text-slate-300 hover:bg-[#2c313a]'}`}>
                  {tab.filename}
                </button>
              ))}
            </div>
            <span className="px-3 text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-indigo-500/15 border-l-2 border-indigo-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines · tab {activeTabIdx + 1}/{tabs.length}</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    //   - 단계 변경 시 codeIdx 로 탭 자동 활성화
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [activeTabIdx, setActiveTabIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      // 단계 변경 시 해당 탭 자동 활성화
      useEffect(() => {
        setActiveTabIdx(step.codeIdx);
      }, [stepIdx]);

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="./index.html" className="text-indigo-700 hover:text-indigo-900 font-medium">&larr; 목차로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter VII-1-3</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VII. 배포와 운영 &gt; Chapter 1. 환경 설정</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VII-1-3. 환경 변수 + API 키 보호</h1>
                  <p className="text-sm text-slate-500 mt-0.5">.env / VITE_ prefix / .env.local / 클라이언트 노출 / Vercel — 5단계로 안전한 설정 분리</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer tabs={CODE_TABS} activeTabIdx={activeTabIdx} onTabClick={setActiveTabIdx} stepIdx={stepIdx} total={STEPS.length} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-indigo-50 border-2 border-indigo-300 rounded-xl p-3 text-sm text-indigo-900">
                💡 정리: <strong>VITE_</strong> prefix = 클라이언트 노출 허용 명시. 의심되면 무조건 백엔드. 배포는 <strong>Vercel/Netlify 대시보드</strong>로 환경 분리(Prod/Preview/Dev) + Server-only 격리. <strong>.env.local</strong>은 항상 <strong>.gitignore</strong>. 다음(VII-1-4)에서는 빌드 최적화와 정적 호스팅을 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-indigo-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-indigo-600 text-white hover:bg-indigo-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['.env', 'VITE_ prefix', 'import.meta.env', '.env.local', '.gitignore', 'client bundle', 'API key', 'Vercel', 'Server-only', 'rotate'].map((kw) => (
                <span key={kw} className="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-xs font-medium border border-indigo-200">{kw}</span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-07-02-build-deploy.html" className="text-indigo-700 hover:text-indigo-900 font-medium">&larr; VII-1-2 빌드와 배포</a>
              <a href="./chapter-07-04-monitoring.html" className="text-indigo-700 hover:text-indigo-900 font-medium">VII-1-4 모니터링 &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
