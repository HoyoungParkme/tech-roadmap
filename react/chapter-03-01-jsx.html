<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSX — HTML처럼 생긴 JavaScript — Chapter III-1-3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter III-1-3 — JSX: HTML처럼 생긴 JavaScript -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // =========================================================
    // 1. STEPS 정의 — JSX 핵심 개념 5단계
    // =========================================================
    const STEPS = [
      {
        title: 'Step 1 — JSX란?',
        desc: 'JSX는 JavaScript 안에 HTML처럼 생긴 문법을 쓸 수 있게 해주는 확장 문법입니다. 겉보기엔 HTML이지만, 실제로는 JavaScript입니다. Babel이라는 도구가 JSX를 일반 JS로 변환합니다.',
        left: {
          label: 'JSX (우리가 작성하는 코드)',
          code: 'function Hello() {\n  return <h1>안녕하세요!</h1>;\n}',
        },
        right: {
          label: 'JavaScript (브라우저가 실행하는 코드)',
          code: 'function Hello() {\n  return React.createElement(\n    "h1",\n    null,\n    "안녕하세요!"\n  );\n}',
        },
        arrow: 'Babel 변환',
      },
      {
        title: 'Step 2 — className과 htmlFor',
        desc: 'JSX에서는 HTML 속성 이름이 약간 다릅니다. `class` 대신 `className`, `for` 대신 `htmlFor`를 씁니다. 이유: `class`와 `for`는 JavaScript의 예약어이기 때문입니다.',
        left: {
          label: '❌ HTML (브라우저 직접)',
          code: '<div class="box">\n  <label for="email">이메일</label>\n  <input id="email" />\n</div>',
        },
        right: {
          label: '✅ JSX (React)',
          code: '<div className="box">\n  <label htmlFor="email">이메일</label>\n  <input id="email" />\n</div>',
        },
        arrow: '속성 이름 변경',
        highlights: [
          { from: 'class', to: 'className', reason: 'class는 JS 예약어' },
          { from: 'for', to: 'htmlFor', reason: 'for는 JS 예약어' },
        ],
      },
      {
        title: 'Step 3 — 중괄호 {} 표현식',
        desc: 'JSX 안에서 JavaScript 값을 쓰려면 중괄호 {}로 감쌉니다. 변수, 계산, 함수 호출 — JS 표현식이면 뭐든 넣을 수 있습니다. 단, if문이나 for문은 표현식이 아니라 사용 불가합니다.',
        left: {
          label: 'JSX 코드',
          code: 'const name = "React";\nconst year = 2013;\n\nfunction Info() {\n  return (\n    <div>\n      <h1>{name} 학습</h1>\n      <p>출시: {year}년</p>\n      <p>나이: {2026 - year}살</p>\n      <p>대문자: {name.toUpperCase()}</p>\n    </div>\n  );\n}',
        },
        right: {
          label: '렌더링 결과',
          code: null,
        },
        arrow: '{}로 JS 삽입',
        renderResult: [
          { id: 'r1', tag: 'h1', text: 'React 학습', bold: true },
          { id: 'r2', tag: 'p', text: '출시: 2013년' },
          { id: 'r3', tag: 'p', text: `나이: ${new Date().getFullYear() - 2013}살` },
          { id: 'r4', tag: 'p', text: '대문자: REACT' },
        ],
      },
      {
        title: 'Step 4 — Fragment <>...</>',
        desc: 'JSX에서는 반드시 하나의 루트 요소로 감싸야 합니다. 불필요한 <div>를 추가하고 싶지 않을 때 Fragment(<>...</>)를 씁니다. Fragment는 DOM에 아무 흔적도 남기지 않습니다.',
        left: {
          label: '❌ 에러 (루트 요소 없음)',
          code: 'function Bad() {\n  return (\n    <h1>제목</h1>\n    <p>내용</p>\n  );\n  // 에러! 형제 요소가 2개\n}',
        },
        right: {
          label: '✅ Fragment 사용',
          code: 'function Good() {\n  return (\n    <>         {/* Fragment */}\n      <h1>제목</h1>\n      <p>내용</p>\n    </>\n  );\n  // OK! Fragment가 감싸줌\n}',
        },
        arrow: 'Fragment로 해결',
        fragmentDemo: true,
      },
      {
        title: 'Step 5 — JSX → createElement 전체 변환',
        desc: 'JSX가 Babel에 의해 React.createElement()로 변환되는 전체 과정을 봅니다. 복잡한 JSX도 결국 함수 호출의 중첩입니다. 이 과정을 이해하면 JSX가 "마법"이 아님을 알게 됩니다.',
        left: {
          label: 'JSX',
          code: '<div className="card">\n  <h2>제목</h2>\n  <p>내용입니다</p>\n  <button onClick={handleClick}>\n    클릭\n  </button>\n</div>',
        },
        right: {
          label: 'React.createElement()',
          code: 'React.createElement(\n  "div",\n  { className: "card" },\n  React.createElement("h2", null, "제목"),\n  React.createElement("p", null, "내용입니다"),\n  React.createElement(\n    "button",\n    { onClick: handleClick },\n    "클릭"\n  )\n)',
        },
        arrow: 'Babel 변환',
      },
    ];

    // =========================================================
    // 2. 코드 비교 패널 컴포넌트
    // =========================================================
    function CodeComparePanel({ left, right, arrow, renderResult }) {
      return (
        <div className="space-y-3">
          <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
            <div className="text-[10px] text-slate-400 font-bold uppercase mb-2">{left.label}</div>
            <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{left.code}</pre>
          </div>

          <div className="text-center text-xs text-teal-500 font-bold">↓ {arrow} ↓</div>

          {right.code !== null ? (
            <div className="bg-slate-800 rounded-xl p-4 border border-slate-600">
              <div className="text-[10px] text-emerald-400 font-bold uppercase mb-2">{right.label}</div>
              <pre className="text-sm font-mono text-emerald-300 leading-relaxed whitespace-pre-wrap">{right.code}</pre>
            </div>
          ) : (
            <div className="bg-white rounded-xl p-4 border border-slate-200">
              <div className="text-[10px] text-slate-500 font-bold uppercase mb-2">{right.label}</div>
              <div className="border-2 border-dashed border-teal-300 rounded-lg p-4">
                {renderResult && renderResult.map((item) => {
                  if (item.bold) return <h1 key={item.id} className="text-lg font-bold text-slate-800 mb-1">{item.text}</h1>;
                  return <p key={item.id} className="text-sm text-slate-600">{item.text}</p>;
                })}
              </div>
            </div>
          )}
        </div>
      );
    }

    // =========================================================
    // 3. 메인 App
    // =========================================================
    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => {
        setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      };
      const nextRef = useRef(next);
      nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-teal-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">III</div>
                <h1 className="text-2xl font-bold text-slate-800">JSX — HTML처럼 생긴 JavaScript</h1>
              </div>
              <p className="text-slate-600 text-sm">JSX 문법 규칙과 <b>Babel 변환 과정</b>을 단계별로 시각화합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter III-1-3 | ★★☆ | 선수 지식 III-1-2 | 2026-04-20</p>
            </header>

            {/* 진행 표시 */}
            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.title} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-teal-500' : 'bg-slate-200'}`}
                  aria-label={`Step ${i + 1}`}
                />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              {/* 좌: 코드 비교 + 부가 시각화 */}
              <div className="space-y-4">
                <CodeComparePanel left={step.left} right={step.right} arrow={step.arrow} renderResult={step.renderResult} />

                {/* Step 2: 속성 변환 하이라이트 */}
                {step.highlights && (
                  <div className="bg-white rounded-xl p-4 border border-slate-200">
                    <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">변경되는 속성</div>
                    <div className="space-y-2">
                      {step.highlights.map((h) => (
                        <div key={h.from} className="flex items-center gap-3 bg-slate-50 rounded-lg px-3 py-2">
                          <span className="text-xs font-mono bg-red-100 text-red-700 px-2 py-0.5 rounded line-through">{h.from}</span>
                          <span className="text-slate-400">→</span>
                          <span className="text-xs font-mono bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded font-bold">{h.to}</span>
                          <span className="text-[10px] text-slate-500 ml-auto">{h.reason}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Step 4: Fragment 데모 */}
                {step.fragmentDemo && (
                  <div className="bg-white rounded-xl p-4 border border-slate-200">
                    <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">DOM 결과 비교</div>
                    <div className="grid grid-cols-2 gap-3">
                      <div className="bg-amber-50 border border-amber-200 rounded-lg p-3">
                        <div className="text-[10px] font-bold text-amber-700 mb-1">div로 감쌌을 때</div>
                        <div className="font-mono text-[11px] text-slate-600">
                          <div>{'<div>'}</div>
                          <div className="ml-3">{'<h1>제목</h1>'}</div>
                          <div className="ml-3">{'<p>내용</p>'}</div>
                          <div>{'</div>'} <span className="text-amber-600">← 불필요한 div!</span></div>
                        </div>
                      </div>
                      <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3">
                        <div className="text-[10px] font-bold text-emerald-700 mb-1">Fragment 사용 시</div>
                        <div className="font-mono text-[11px] text-slate-600">
                          <div>{'<h1>제목</h1>'}</div>
                          <div>{'<p>내용</p>'}</div>
                          <div className="text-emerald-600 mt-1">← 깔끔! DOM에 흔적 없음</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {/* 우: 설명 패널 */}
              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-teal-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>

                <div className="mt-4 bg-teal-50 border border-teal-200 rounded-lg p-3">
                  <div className="text-[10px] text-teal-600 font-bold uppercase mb-1">핵심 포인트</div>
                  <p className="text-xs text-teal-700">
                    {idx === 0 && 'JSX는 HTML이 아닙니다. Babel이 React.createElement()로 변환하는 "문법 설탕(Syntactic Sugar)"입니다.'}
                    {idx === 1 && 'class → className, for → htmlFor. JS 예약어와 충돌을 피하기 위한 규칙입니다.'}
                    {idx === 2 && '중괄호 {} 안에는 JS "표현식"만 가능합니다. if/for문은 불가하고, 삼항 연산자(?:)나 map()을 씁니다.'}
                    {idx === 3 && 'Fragment(<>...</>)는 DOM에 아무 요소도 추가하지 않으면서 여러 요소를 감쌀 수 있습니다.'}
                    {idx === 4 && 'JSX가 마법이 아님을 이해하면, 디버깅이 쉬워집니다. 결국 함수 호출입니다.'}
                  </p>
                </div>
              </div>
            </div>

            {/* 컨트롤 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }}
                disabled={idx === 0}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="이전 단계"
              >← 이전</button>
              <button onClick={() => { if (isEnd) setIdx(0); setIsPlaying(p => !p); }}
                className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${
                  isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-teal-500 hover:bg-teal-600 text-white'
                }`}
                aria-label={isPlaying ? '정지' : '자동 실행'}
              >{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }}
                disabled={isEnd}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="다음 단계"
              >다음 →</button>
            </div>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-20
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
