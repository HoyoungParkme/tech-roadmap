<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인증(Auth) 흐름 구현 — Chapter VI-1-3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter VI-1-3 — 인증(Auth) 흐름 구현 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1 — 인증이란?',
        desc: '인증(Authentication)은 "이 사람이 누구인지" 확인하는 과정입니다. 현실 세계의 신분증 확인과 같습니다. 웹에서는 ID/비밀번호를 서버에 보내고, 서버가 "맞다"고 확인하면 "통행증(토큰)"을 발급합니다.',
        code: '// 인증의 핵심 질문\n// "당신이 정말 김철수인가요?"\n\n// 1. 사용자: ID와 비밀번호 제출\n// 2. 서버: DB에서 확인\n// 3. 서버: 맞으면 토큰(JWT) 발급\n// 4. 사용자: 이후 모든 요청에 토큰 첨부\n\n// 비유: 호텔 체크인\n// 1. 여권 보여주기 (로그인)\n// 2. 카드키 받기 (JWT 토큰)\n// 3. 카드키로 방 출입 (API 요청)',
        visual: 'concept',
      },
      {
        title: 'Step 2 — JWT 로그인 흐름',
        desc: 'JWT(JSON Web Token)는 서버가 발급하는 "서명된 통행증"입니다. 로그인 성공 시 서버가 JWT를 반환하고, 클라이언트가 저장합니다. 이후 API 요청 시 Authorization 헤더에 토큰을 포함합���다.',
        code: '// 1. 로그인 요청\nconst response = await fetch("/api/login", {\n  method: "POST",\n  body: JSON.stringify({ email, password }),\n});\n\n// 2. 토큰 받기\nconst { token, user } = await response.json();\n// token = "eyJhbGciOiJIUzI1NiIs..."\n\n// 3. 저장\nlocalStorage.setItem("token", token);\n\n// 4. 이후 API 요청에 토큰 포함\nfetch("/api/profile", {\n  headers: {\n    Authorization: `Bearer ${token}`,\n  },\n});',
        visual: 'jwt-flow',
      },
      {
        title: 'Step 3 — 토큰 저장 위치',
        desc: 'JWT를 어디에 저장하느냐에 따라 보안 수준이 달라집니다. localStorage는 사용이 간편하지만 XSS 공격에 취약합니다. httpOnly 쿠키는 JS로 접근할 수 없어 더 안전하지만, 설정이 복잡합니다.',
        code: '// 방법 1: localStorage\nlocalStorage.setItem("token", token);\nconst token = localStorage.getItem("token");\n// ⚠️ XSS 공격 시 JS로 토큰 탈취 가능\n\n// 방법 2: httpOnly Cookie\n// 서버가 Set-Cookie 헤더로 설정\n// Set-Cookie: token=eyJ...; HttpOnly; Secure\n// ✅ JS로 접근 불가 → XSS에 안전\n// ⚠️ CSRF 공격 대비 필요',
        visual: 'storage',
      },
      {
        title: 'Step 4 — PrivateRoute 보호 라우트',
        desc: '인증이 필요한 페이지를 보호하는 PrivateRoute 컴포넌트입니다. 토큰이 없으면 로그인 페이지로 리다이렉트하고, 있으면 자식 컴포넌트를 렌더링합니다.',
        code: 'function PrivateRoute({ children }) {\n  const token = localStorage.getItem("token");\n\n  if (!token) {\n    // 미인증 → 로그인 페이지로\n    return <Navigate to="/login" />;\n  }\n\n  return children; // 인증됨 → 페이지 표시\n}\n\n// 사용\n<Routes>\n  <Route path="/login" element={<Login />} />\n  <Route path="/dashboard" element={\n    <PrivateRoute>\n      <Dashboard />\n    </PrivateRoute>\n  } />\n</Routes>',
        visual: 'private-route',
      },
      {
        title: 'Step 5 — 인증 흐름 시뮬레이션',
        desc: '로그인부터 보호 라우트 접근까지 전체 흐름을 체험합니다. 로그인 버튼을 누르면 토큰이 발급되고, 대시보드에 접근할 수 있습니다. 로그아웃하면 토큰이 삭제되어 대시보드가 차단���니다.',
        code: null,
        visual: 'simulation',
      },
    ];

    function ConceptVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">호텔 체크인 비유</div>
          <div className="flex items-center gap-3 justify-center">
            {[
              { icon: '🛂', label: '여권 확인', sub: '로그인' },
              { icon: '→', label: '', sub: '' },
              { icon: '🔑', label: '카드키 발급', sub: 'JWT 토큰' },
              { icon: '→', label: '', sub: '' },
              { icon: '🚪', label: '방 출입', sub: 'API 요청' },
            ].map((item, i) => (
              <div key={`auth-${i}`} className="text-center">
                <div className="text-2xl">{item.icon}</div>
                {item.label && <div className="text-[10px] font-bold text-slate-700 mt-1">{item.label}</div>}
                {item.sub && <div className="text-[9px] text-slate-400">{item.sub}</div>}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function JwtFlowVisual() {
      const steps = [
        { label: '로그인 요청', from: '브라우저', to: '서버', color: 'bg-sky-100 border-sky-300' },
        { label: 'JWT 발급', from: '서버', to: '브��우저', color: 'bg-emerald-100 border-emerald-300' },
        { label: '토큰 저장', from: '브라우저', to: 'Storage', color: 'bg-amber-100 border-amber-300' },
        { label: 'API + 토큰', from: '브라우저', to: '서버', color: 'bg-violet-100 border-violet-300' },
      ];
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">JWT 로그인 흐름</div>
          <div className="space-y-2">
            {steps.map((s) => (
              <div key={s.label} className={`${s.color} border-2 rounded-lg px-3 py-2 flex items-center gap-3`}>
                <span className="text-xs font-bold text-slate-600 min-w-[60px]">{s.from}</span>
                <span className="text-slate-400">→</span>
                <span className="text-xs font-bold text-slate-600 min-w-[60px]">{s.to}</span>
                <span className="text-[10px] text-slate-500 ml-auto">{s.label}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function StorageVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">토큰 저장 위치 비교</div>
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-amber-50 border border-amber-200 rounded-lg p-3">
              <div className="text-[10px] font-bold text-amber-700 mb-2">localStorage</div>
              <div className="space-y-1 text-[10px]">
                <div className="text-emerald-600">✓ 사용 간편</div>
                <div className="text-emerald-600">✓ 서버 설정 불필요</div>
                <div className="text-red-600">✗ XSS 취약</div>
                <div className="text-red-600">✗ JS로 접근 가능</div>
              </div>
              <div className="mt-2 text-[9px] text-amber-600 font-bold">학습/프로토타입용</div>
            </div>
            <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3">
              <div className="text-[10px] font-bold text-emerald-700 mb-2">httpOnly Cookie</div>
              <div className="space-y-1 text-[10px]">
                <div className="text-emerald-600">✓ XSS 안전</div>
                <div className="text-emerald-600">✓ JS 접근 불가</div>
                <div className="text-red-600">✗ 서버 설정 필요</div>
                <div className="text-red-600">✗ CSRF 대비 ���요</div>
              </div>
              <div className="mt-2 text-[9px] text-emerald-600 font-bold">프로덕션 권장</div>
            </div>
          </div>
        </div>
      );
    }

    function PrivateRouteVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">PrivateRoute 동작</div>
          <div className="space-y-3">
            <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3">
              <div className="text-[10px] font-bold text-emerald-700 mb-1">토큰 있음 (인증됨)</div>
              <div className="text-[10px] text-slate-600">PrivateRoute → children (Dashboard) 렌더링</div>
            </div>
            <div className="bg-red-50 border border-red-200 rounded-lg p-3">
              <div className="text-[10px] font-bold text-red-700 mb-1">토큰 없음 (미인증)</div>
              <div className="text-[10px] text-slate-600">PrivateRoute → Navigate to="/login" 리다이렉트</div>
            </div>
          </div>
        </div>
      );
    }

    function SimulationVisual() {
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [currentPage, setCurrentPage] = useState('home');
      const [token, setToken] = useState(null);

      const handleLogin = () => {
        setToken('eyJhbGciOiJIUzI1NiIs...');
        setIsLoggedIn(true);
        setCurrentPage('dashboard');
      };

      const handleLogout = () => {
        setToken(null);
        setIsLoggedIn(false);
        setCurrentPage('home');
      };

      return (
        <div className="space-y-3">
          <div className="bg-slate-900 rounded-xl overflow-hidden border border-slate-700">
            <div className="bg-slate-800 px-3 py-2 flex items-center justify-between">
              <div className="flex gap-1"><div className="w-2.5 h-2.5 rounded-full bg-red-500"></div><div className="w-2.5 h-2.5 rounded-full bg-yellow-500"></div><div className="w-2.5 h-2.5 rounded-full bg-emerald-500"></div></div>
              <div className="text-[10px] text-slate-400">{isLoggedIn ? '🟢 인증됨' : '🔴 미인증'}</div>
            </div>
            <div className="bg-white">
              <div className="flex border-b">
                {['home', 'dashboard', 'profile'].map((page) => (
                  <button key={page} onClick={() => setCurrentPage(page)}
                    className={`flex-1 text-xs py-2 font-bold transition ${currentPage === page ? 'bg-rose-50 text-rose-700 border-b-2 border-rose-500' : 'text-slate-500 hover:bg-slate-50'}`}>
                    {page === 'home' ? '홈' : page === 'dashboard' ? '대시보드 🔒' : '프로필 🔒'}
                  </button>
                ))}
              </div>
              <div className="p-4 min-h-[100px]">
                {currentPage === 'home' && (
                  <div className="text-center">
                    <div className="text-sm text-slate-700 mb-3">공개 페이지 — 누구나 접근 가능</div>
                    {!isLoggedIn && (
                      <button onClick={handleLogin} className="px-4 py-2 bg-rose-500 hover:bg-rose-600 text-white font-bold rounded-lg text-sm transition">로그인</button>
                    )}
                  </div>
                )}
                {currentPage === 'dashboard' && (
                  isLoggedIn ? (
                    <div className="text-center">
                      <div className="text-sm font-bold text-emerald-700 mb-2">대시보드 — 인증 성공!</div>
                      <div className="text-xs text-slate-500">JWT 토큰으로 접근 허용됨</div>
                      <button onClick={handleLogout} className="mt-3 px-3 py-1.5 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg text-xs font-bold transition">로그아웃</button>
                    </div>
                  ) : (
                    <div className="text-center">
                      <div className="text-sm font-bold text-red-600 mb-2">접근 거부!</div>
                      <div className="text-xs text-slate-500">토큰 없음 → 로그인 페이지로 리다이렉트</div>
                      <button onClick={() => setCurrentPage('home')} className="mt-2 text-xs text-rose-600 underline">로그인하러 가기</button>
                    </div>
                  )
                )}
                {currentPage === 'profile' && (
                  isLoggedIn ? (
                    <div className="text-center">
                      <div className="text-sm font-bold text-emerald-700">프로필 페이지</div>
                      <div className="text-xs text-slate-500 mt-1">인증된 사용자만 볼 수 있습니다</div>
                    </div>
                  ) : (
                    <div className="text-center">
                      <div className="text-sm font-bold text-red-600 mb-2">접근 거부!</div>
                      <button onClick={() => setCurrentPage('home')} className="text-xs text-rose-600 underline">로그인하러 가기</button>
                    </div>
                  )
                )}
              </div>
            </div>
          </div>
          {token && (
            <div className="bg-slate-900 rounded-lg p-3 border border-slate-700">
              <div className="text-[10px] text-slate-400 font-bold mb-1">JWT Token (localStorage)</div>
              <div className="text-[10px] font-mono text-emerald-400 break-all">{token}</div>
            </div>
          )}
        </div>
      );
    }

    function CodePanel({ code }) {
      if (!code) return null;
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5"><div className="w-3 h-3 rounded-full bg-red-500"></div><div className="w-3 h-3 rounded-full bg-yellow-500"></div><div className="w-3 h-3 rounded-full bg-emerald-500"></div></div>
            <span className="text-[10px] text-slate-500 ml-2">auth.js</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => { setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; }); };
      const nextRef = useRef(next); nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const VISUAL_MAP = { concept: ConceptVisual, 'jwt-flow': JwtFlowVisual, storage: StorageVisual, 'private-route': PrivateRouteVisual, simulation: SimulationVisual };
      const VisualComponent = VISUAL_MAP[step.visual];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">VI</div>
                <h1 className="text-2xl font-bold text-slate-800">인증(Auth) 흐름 구현</h1>
              </div>
              <p className="text-slate-600 text-sm">JWT 기반 <b>로그인→토큰→보호 라우트</b> 전체 흐름을 시뮬레이션합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter VI-1-3 | ★★★ | 선수 지식 VI-1-2 | 2026-04-21</p>
            </header>

            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.title} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-rose-500' : 'bg-slate-200'}`} aria-label={`Step ${i + 1}`} />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                <CodePanel code={step.code} />
                {VisualComponent && <VisualComponent />}
              </div>
              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-rose-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>
              </div>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }} disabled={idx === 0} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="이전 단계">← 이전</button>
              <button onClick={() => { if (isEnd) { setIdx(0); } setIsPlaying(p => !p); }} className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-rose-500 hover:bg-rose-600 text-white'}`} aria-label={isPlaying ? '정지' : '자동 실행'}>{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }} disabled={isEnd} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="다음 단���">다음 →</button>
            </div>
            <footer className="text-center text-xs text-slate-400 pb-4">React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-21</footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
