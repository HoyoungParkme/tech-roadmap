<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>빌드 결과물 이해하기 — Chapter VII-1-1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter VII-1-1 — 빌드 결과물 이해하기 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        id: 'step-build-process',
        title: 'Step 1 — npm run build가 하는 일',
        desc: 'npm run build를 실행하면 빌드 도구(Vite, Webpack 등)가 소스 코드를 브라우저가 바로 실행할 수 있는 형태로 변환합니다. JSX → JS 변환, 타입스크립트 제거, 여러 파일 합치기(번들링), 코드 압축(최소화)을 거쳐 dist/ 폴더에 최종 결과물을 생성합니다.',
        code: '# 빌드 명령 실행\n$ npm run build\n\n# 내부적으로 일어나는 일 (순서대로)\n1. 소스 코드 읽기     (src/*.jsx, src/*.ts)\n2. JSX/TS 변환       (JSX → React.createElement)\n3. 번들링            (여러 파일 → 하나로 합침)\n4. 최소화            (변수명 축소, 공백 제거)\n5. dist/ 폴더 생성   (배포 가능한 정적 파일들)',
        visual: 'build-process',
      },
      {
        id: 'step-dist-structure',
        title: 'Step 2 — dist/ 폴더 구조 시각화',
        desc: '빌드가 끝나면 dist/ 폴더가 생성됩니다. index.html은 앱의 진입점이고, JS와 CSS 파일명에는 해시(랜덤 문자열)가 붙습니다. 해시 덕분에 파일 내용이 바뀔 때마다 이름도 바뀌어 브라우저 캐시 문제를 방지합니다.',
        code: 'dist/\n├── index.html          (진입점)\n├── assets/\n│   ├── index-a1b2c3d4.js    (앱 전체 JS 번들)\n│   ├── index-e5f6g7h8.css   (앱 전체 CSS 번들)\n│   └── vendor-i9j0k1l2.js   (라이브러리 번들)\n└── favicon.ico\n\n// index.html 내부에 포함되는 태그:\n// <scr' + 'ipt type="module" src="...">\n// <link rel="stylesheet" href="...">',
        visual: 'dist-folder',
      },
      {
        id: 'step-bundling',
        title: 'Step 3 — 번들링이란?',
        desc: '번들링은 여러 개의 소스 파일을 하나(또는 소수)의 파일로 합치는 과정입니다. 브라우저가 100개 파일을 각각 요청하면 네트워크 오버헤드가 크지만, 1~3개 파일로 합치면 요청 횟수가 줄어 로딩이 빨라집니다. import/export 의존성 그래프를 분석해서 순서를 정리합니다.',
        code: '// 번들링 전: 파일 5개\n// App.jsx → Header.jsx → Logo.jsx\n//         → Content.jsx → Button.jsx\n\n// 번들링 후: 파일 1개\n// index-a1b2c3d4.js (모든 코드가 하나로 합쳐짐)\n\n// 의존성 그래프 분석\nimport App from "./App";\n  └── import Header from "./Header";\n       └── import Logo from "./Logo";\n  └── import Content from "./Content";\n       └── import Button from "./Button";\n\n// 결과: 올바른 순서로 합쳐진 단일 파일',
        visual: 'bundling',
      },
      {
        id: 'step-csr-flow',
        title: 'Step 4 — CSR 동작 흐름',
        desc: 'CSR(Client-Side Rendering)에서는 서버가 거의 빈 HTML을 보냅니다. 브라우저가 이 HTML을 받으면 script 태그의 JS 파일을 다운로드하고, JS가 실행되면서 비로소 화면이 그려집니다. 그래서 JS 파일 크기가 클수록 첫 화면이 늦게 나타납니다.',
        code: '// CSR 동작 순서\n\n1. 브라우저 → 서버 요청: GET /\n2. 서버 → 브라우저: index.html (거의 빈 HTML)\n\n   <div id="root"></div>  ← 여기엔 아무것도 없음!\n   ' + '<scr' + 'ipt src="/assets/index-a1b2c3d4.js">' + '</scr' + 'ipt>\n\n3. 브라우저: JS 파일 다운로드 (1~3MB)\n4. 브라우저: JS 실행 → React 초기화\n5. React: 컴포넌트 렌더링 → DOM에 삽입\n6. 사용자: 드디어 화면이 보임!',
        visual: 'csr-flow',
      },
      {
        id: 'step-optimization',
        title: 'Step 5 — 빌드 최적화 팁',
        desc: '빌드 결과물의 크기를 줄이면 사용자 경험이 개선됩니다. 코드 분할(필요한 코드만 로드), 트리 셰이킹(사용하지 않는 코드 제거), 이미지 최적화(WebP 변환, 리사이즈)가 대표적인 최적화 기법입니다.',
        code: '// 1. 코드 분할 (React.lazy)\nconst AdminPage = React.lazy(() => import("./AdminPage"));\n// → 관리자 페이지는 접속할 때만 다운로드\n\n// 2. 트리 셰이킹 (Tree Shaking)\nimport { debounce } from "lodash-es";\n// → lodash 전체가 아닌 debounce만 번들에 포함\n\n// 3. 이미지 최적화\n// hero.png (2MB) → hero.webp (200KB)\n// Vite: vite-plugin-imagemin 사용\n\n// 결과 비교\n// 최적화 전: bundle 1.8MB\n// 최적화 후: bundle 450KB + lazy chunks',
        visual: 'optimization',
      },
    ];

    /* ── 시각화 컴포넌트들 ── */

    function BuildProcessVisual() {
      const [activeStep, setActiveStep] = useState(0);

      useEffect(() => {
        const timer = setInterval(() => setActiveStep(p => (p + 1) % 5), 1800);
        return () => clearInterval(timer);
      }, []);

      const stages = [
        { label: '소스 코드', icon: '📝', color: 'bg-blue-100 border-blue-300 text-blue-700' },
        { label: 'JSX 변환', icon: '🔄', color: 'bg-purple-100 border-purple-300 text-purple-700' },
        { label: '번들링', icon: '📦', color: 'bg-amber-100 border-amber-300 text-amber-700' },
        { label: '최소화', icon: '🗜️', color: 'bg-rose-100 border-rose-300 text-rose-700' },
        { label: 'dist/ 출력', icon: '🚀', color: 'bg-emerald-100 border-emerald-300 text-emerald-700' },
      ];

      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">빌드 파이프라인</div>
          <div className="space-y-2">
            {stages.map((stage, i) => (
              <div key={stage.label} className={`flex items-center gap-3 p-2.5 rounded-lg border-2 transition-all duration-300 ${i === activeStep ? stage.color + ' scale-[1.02]' : 'bg-slate-50 border-slate-200 opacity-60'}`}>
                <span className="text-lg">{stage.icon}</span>
                <span className="text-xs font-bold">{i + 1}. {stage.label}</span>
                {i === activeStep && <span className="ml-auto text-[10px] font-bold animate-pulse">진행 중...</span>}
                {i < activeStep && <span className="ml-auto text-[10px] text-emerald-600 font-bold">완료</span>}
              </div>
            ))}
          </div>
          <div className="mt-3 text-center text-[10px] text-slate-500">
            각 단계를 순서대로 거쳐 배포 가능한 정적 파일을 생성합니다
          </div>
        </div>
      );
    }

    function DistFolderVisual() {
      const [hoveredFile, setHoveredFile] = useState(null);

      const files = [
        { name: 'index.html', size: '1.2 KB', role: '진입점 - 스크립트/스타일 링크 포함', color: 'bg-orange-100 text-orange-700' },
        { name: 'index-a1b2c3d4.js', size: '145 KB', role: '앱 로직 번들 (해시로 캐시 무효화)', color: 'bg-blue-100 text-blue-700' },
        { name: 'index-e5f6g7h8.css', size: '23 KB', role: '스타일 번들', color: 'bg-pink-100 text-pink-700' },
        { name: 'vendor-i9j0k1l2.js', size: '89 KB', role: '라이브러리(React 등) 번들', color: 'bg-purple-100 text-purple-700' },
      ];

      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">dist/ 폴더 구조</div>
          <div className="bg-slate-900 rounded-lg p-3 mb-3">
            <div className="text-[11px] font-mono text-amber-300 mb-2">dist/</div>
            {files.map((file) => (
              <div key={file.name}
                onMouseEnter={() => setHoveredFile(file.name)}
                onMouseLeave={() => setHoveredFile(null)}
                className={`flex items-center gap-2 px-3 py-1.5 rounded transition cursor-pointer ${hoveredFile === file.name ? 'bg-slate-700' : ''}`}>
                <span className="text-[10px] text-slate-500">├──</span>
                <span className="text-[11px] font-mono text-slate-200">{file.name}</span>
                <span className="ml-auto text-[9px] text-slate-500">{file.size}</span>
              </div>
            ))}
          </div>
          {hoveredFile && (
            <div className={`p-2 rounded-lg text-[10px] font-bold ${files.find(f => f.name === hoveredFile).color}`}>
              {files.find(f => f.name === hoveredFile).role}
            </div>
          )}
          {!hoveredFile && (
            <div className="p-2 rounded-lg text-[10px] text-slate-400 bg-slate-50">
              파일 위에 마우스를 올려보세요
            </div>
          )}
        </div>
      );
    }

    function BundlingVisual() {
      const [isBundled, setIsBundled] = useState(false);

      useEffect(() => {
        const timer = setInterval(() => setIsBundled(p => !p), 3000);
        return () => clearInterval(timer);
      }, []);

      const sourceFiles = [
        { name: 'App.jsx', color: 'bg-blue-200' },
        { name: 'Header.jsx', color: 'bg-emerald-200' },
        { name: 'Content.jsx', color: 'bg-amber-200' },
        { name: 'Button.jsx', color: 'bg-rose-200' },
        { name: 'utils.js', color: 'bg-purple-200' },
      ];

      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">번들링 시각화</div>
          <div className="flex items-center justify-between gap-4">
            <div className={`flex-1 space-y-1.5 transition-all duration-500 ${isBundled ? 'opacity-30 scale-95' : 'opacity-100'}`}>
              <div className="text-[10px] font-bold text-slate-600 mb-2">소스 파일 (5개)</div>
              {sourceFiles.map((file) => (
                <div key={file.name} className={`${file.color} rounded px-2 py-1 text-[10px] font-mono`}>
                  {file.name}
                </div>
              ))}
              <div className="text-[9px] text-slate-500 mt-1">HTTP 요청 5회 필요</div>
            </div>

            <div className="text-2xl text-slate-300 transition-transform duration-500" style={{ transform: isBundled ? 'scale(1.3)' : 'scale(1)' }}>
              {isBundled ? '→' : '⋯'}
            </div>

            <div className={`flex-1 transition-all duration-500 ${isBundled ? 'opacity-100 scale-100' : 'opacity-30 scale-95'}`}>
              <div className="text-[10px] font-bold text-slate-600 mb-2">번들 (1개)</div>
              <div className="rounded-lg border-2 border-emerald-300 bg-emerald-50 p-3">
                <div className="text-[10px] font-bold text-emerald-700 mb-1">index-a1b2c3d4.js</div>
                <div className="flex flex-wrap gap-1">
                  {sourceFiles.map((file) => (
                    <span key={file.name} className={`${file.color} rounded px-1 py-0.5 text-[8px] font-mono`}>
                      {file.name.replace('.jsx', '').replace('.js', '')}
                    </span>
                  ))}
                </div>
              </div>
              <div className="text-[9px] text-emerald-600 mt-1">HTTP 요청 1회로 충분!</div>
            </div>
          </div>
          <div className="mt-3 text-center text-[10px] text-slate-500">
            {isBundled ? '합쳐진 번들 → 네트워크 요청 감소' : '개별 파일 → 요청 횟수 많음'}
          </div>
        </div>
      );
    }

    function CsrFlowVisual() {
      const [flowStep, setFlowStep] = useState(0);

      useEffect(() => {
        const timer = setInterval(() => setFlowStep(p => (p + 1) % 5), 2000);
        return () => clearInterval(timer);
      }, []);

      const stages = [
        { label: 'GET / 요청', from: '브라우저', to: '서버', color: 'bg-blue-100 border-blue-300' },
        { label: '빈 HTML 응답', from: '서버', to: '브라우저', color: 'bg-purple-100 border-purple-300' },
        { label: 'JS 다운로드', from: '서버', to: '브라우저', color: 'bg-amber-100 border-amber-300' },
        { label: 'React 실행', from: '브라우저', to: '브라우저', color: 'bg-rose-100 border-rose-300' },
        { label: '화면 렌더링!', from: '브라우저', to: '사용자', color: 'bg-emerald-100 border-emerald-300' },
      ];

      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">CSR 동작 흐름</div>
          <div className="flex justify-center gap-6 mb-4">
            <div className="text-center">
              <div className={`w-12 h-12 rounded-full flex items-center justify-center text-lg border-2 transition ${flowStep >= 3 ? 'border-emerald-400 bg-emerald-50' : 'border-slate-200 bg-slate-50'}`}>🌐</div>
              <div className="text-[9px] text-slate-600 mt-1">브라우저</div>
            </div>
            <div className="text-center">
              <div className={`w-12 h-12 rounded-full flex items-center justify-center text-lg border-2 transition ${flowStep <= 2 ? 'border-blue-400 bg-blue-50' : 'border-slate-200 bg-slate-50'}`}>🖥️</div>
              <div className="text-[9px] text-slate-600 mt-1">서버</div>
            </div>
          </div>
          <div className="space-y-1.5">
            {stages.map((stage, i) => (
              <div key={stage.label} className={`flex items-center gap-2 px-3 py-2 rounded-lg border-2 transition-all duration-300 ${i === flowStep ? stage.color + ' scale-[1.02]' : i < flowStep ? 'bg-slate-50 border-slate-200 opacity-50' : 'bg-slate-50 border-slate-100 opacity-30'}`}>
                <span className="text-[10px] font-bold text-slate-500 w-4">{i + 1}.</span>
                <span className="text-[11px] font-bold">{stage.label}</span>
                {i === flowStep && <span className="ml-auto text-[9px] animate-pulse">◀</span>}
              </div>
            ))}
          </div>
          <div className="mt-3 bg-amber-50 border border-amber-200 rounded-lg p-2 text-[10px] text-amber-700">
            JS 파일이 클수록 3번(다운로드)이 오래 걸려 화면이 늦게 나타남
          </div>
        </div>
      );
    }

    function OptimizationVisual() {
      const [selectedTip, setSelectedTip] = useState('code-split');

      const TIPS = {
        'code-split': {
          label: '코드 분할',
          desc: '필요한 페이지의 코드만 로드합니다. React.lazy + Suspense로 구현합니다.',
          before: '번들 1개: 1.8MB (전체)',
          after: '초기 번들: 200KB + 페이지별 청크',
          saving: '첫 로딩 70% 감소',
        },
        'tree-shake': {
          label: '트리 셰이킹',
          desc: '사용하지 않는 export를 번들에서 제거합니다. ES Module(import/export) 필수입니다.',
          before: 'lodash 전체: 72KB',
          after: 'debounce만: 3KB',
          saving: '불필요한 코드 96% 제거',
        },
        'image-opt': {
          label: '이미지 최적화',
          desc: 'PNG/JPG를 WebP로 변환하고, 적절한 크기로 리사이즈합니다.',
          before: 'hero.png: 2MB',
          after: 'hero.webp: 200KB',
          saving: '이미지 용량 90% 감소',
        },
      };

      const tip = TIPS[selectedTip];

      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">빌드 최적화 기법</div>
          <div className="flex gap-2 mb-3">
            {Object.entries(TIPS).map(([key, t]) => (
              <button key={key} onClick={() => setSelectedTip(key)}
                className={`flex-1 px-2 py-2 rounded-lg text-[10px] font-bold border-2 transition ${
                  selectedTip === key ? 'bg-orange-100 border-orange-400 text-orange-700' : 'bg-slate-50 border-slate-200 text-slate-600'
                }`}>
                {t.label}
              </button>
            ))}
          </div>
          <div className="text-[11px] text-slate-700 mb-3">{tip.desc}</div>
          <div className="grid grid-cols-2 gap-2 mb-2">
            <div className="bg-red-50 border border-red-200 rounded-lg p-2">
              <div className="text-[9px] font-bold text-red-600 mb-1">최적화 전</div>
              <div className="text-[10px] text-red-700">{tip.before}</div>
            </div>
            <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-2">
              <div className="text-[9px] font-bold text-emerald-600 mb-1">최적화 후</div>
              <div className="text-[10px] text-emerald-700">{tip.after}</div>
            </div>
          </div>
          <div className="bg-orange-50 border border-orange-200 rounded-lg px-3 py-2 text-center">
            <span className="text-[10px] font-bold text-orange-700">{tip.saving}</span>
          </div>
        </div>
      );
    }

    /* ── 코드 패널 ── */

    function CodePanel({ code }) {
      if (!code) return null;
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5"><div className="w-3 h-3 rounded-full bg-red-500"></div><div className="w-3 h-3 rounded-full bg-yellow-500"></div><div className="w-3 h-3 rounded-full bg-emerald-500"></div></div>
            <span className="text-[10px] text-slate-500 ml-2">build-output</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    /* ── 메인 앱 ── */

    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => { setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; }); };
      const nextRef = useRef(next); nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const VISUAL_MAP = {
        'build-process': BuildProcessVisual,
        'dist-folder': DistFolderVisual,
        'bundling': BundlingVisual,
        'csr-flow': CsrFlowVisual,
        'optimization': OptimizationVisual,
      };
      const VisualComponent = VISUAL_MAP[step.visual];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-orange-600 transition">&larr; 목차로</a>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-orange-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">VII</div>
                <h1 className="text-2xl font-bold text-slate-800">빌드 결과물 이해하기</h1>
              </div>
              <p className="text-slate-600 text-sm"><b>npm run build</b>가 만드는 결과물의 구조, 번들링 원리, CSR 동작 흐름, 그리고 빌드 최적화 기법을 시각적으로 학습합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter VII-1-1 | ★★★ | 선수 지식 VI-1-4 | 2026-04-21</p>
            </header>

            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-orange-500' : 'bg-slate-200'}`} aria-label={`Step ${i + 1}`} />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                <CodePanel code={step.code} />
                {VisualComponent && <VisualComponent />}
              </div>
              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-orange-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>
              </div>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }} disabled={idx === 0} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="이전 단계">&larr; 이전</button>
              <button onClick={() => { if (isEnd) { setIdx(0); } setIsPlaying(p => !p); }} className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-orange-500 hover:bg-orange-600 text-white'}`} aria-label={isPlaying ? '정지' : '자동 실행'}>{isPlaying ? '\u23F8 정지' : '\u25B6 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }} disabled={isEnd} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="다음 단계">다음 &rarr;</button>
            </div>
            <footer className="text-center text-xs text-slate-400 pb-4">React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-21</footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
