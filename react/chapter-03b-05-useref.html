<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>useRef Hook — DOM 참조 + 렌더링 없는 값 저장 — Chapter III-B-5</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter III-B-5 — useRef Hook: DOM 참조 + 렌더링 없는 값 저장 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // =========================================================
    // 1. STEPS 정의 — useRef 핵심 5단계
    // =========================================================
    const STEPS = [
      {
        id: 'step-concept',
        title: 'Step 1 — useRef란?',
        desc: 'useRef는 렌더링을 트리거하지 않는 "기억 상자"입니다. useState는 값이 바뀌면 화면을 다시 그리지만, useRef는 값을 바꿔도 화면이 변하지 않습니다. DOM 요소에 접근하거나, 렌더링 사이에 값을 유지할 때 사용합니다.',
        code: '// useRef = 렌더링 없는 기억 상자\nconst myRef = useRef(초기값);\n\n// 값 읽기\nconsole.log(myRef.current);\n\n// 값 쓰기 (리렌더링 안 됨!)\nmyRef.current = 새로운값;\n\n// useState와 차이점:\n// useState → 값 변경 → 리렌더링 O\n// useRef   → 값 변경 → 리렌더링 X',
        mode: 'concept',
      },
      {
        id: 'step-dom',
        title: 'Step 2 — DOM 참조',
        desc: 'useRef의 가장 흔한 용도는 DOM 요소에 직접 접근하는 것입니다. ref 속성으로 연결하면 .current에 실제 DOM 노드가 담깁니다. 포커스 이동, 스크롤, 크기 측정 등에 활용합니다.',
        code: 'function FocusInput() {\n  const inputRef = useRef(null);\n\n  const handleClick = () => {\n    // DOM 요소에 직접 접근\n    inputRef.current.focus();\n  };\n\n  return (\n    <>\n      <input ref={inputRef} />\n      <button onClick={handleClick}>\n        입력란 포커스\n      </button>\n    </>\n  );\n}',
        mode: 'dom-demo',
      },
      {
        id: 'step-render-count',
        title: 'Step 3 — 렌더링 없는 값 저장',
        desc: '렌더링 횟수를 세고 싶을 때 useState를 쓰면 무한 루프에 빠집니다 (값 변경 → 리렌더링 → 값 변경 → ...). useRef는 값을 바꿔도 리렌더링이 발생하지 않으므로 안전하게 카운트할 수 있습니다.',
        code: 'function RenderCounter() {\n  const [name, setName] = useState("");\n  const renderCount = useRef(0);\n\n  // 렌더링될 때마다 +1\n  // (리렌더링을 유발하지 않음)\n  renderCount.current += 1;\n\n  return (\n    <div>\n      <input value={name}\n        onChange={e => setName(e.target.value)}\n      />\n      <p>렌더링 횟수:\n        {renderCount.current}\n      </p>\n    </div>\n  );\n}',
        mode: 'render-count-demo',
      },
      {
        id: 'step-prev-value',
        title: 'Step 4 — 이전 값 기억하기',
        desc: 'useRef로 이전 state 값을 저장하는 패턴입니다. useEffect 안에서 현재 값을 ref에 저장하면, 다음 렌더링에서 "이전 값"으로 사용할 수 있습니다.',
        code: 'function PreviousValue() {\n  const [count, setCount] = useState(0);\n  const prevCountRef = useRef(0);\n\n  useEffect(() => {\n    // 렌더링 후 현재 값을 저장\n    prevCountRef.current = count;\n  });\n\n  return (\n    <div>\n      <p>현재: {count}</p>\n      <p>이전: {prevCountRef.current}</p>\n      <button onClick={\n        () => setCount(c => c + 1)\n      }>+1</button>\n    </div>\n  );\n}',
        mode: 'prev-value-demo',
      },
      {
        id: 'step-comparison',
        title: 'Step 5 — useState vs useRef 비교',
        desc: '두 카운터를 나란히 비교해 보세요. 왼쪽 useState는 클릭할 때마다 화면이 갱신됩니다. 오른쪽 useRef는 클릭해도 화면이 변하지 않고, "값 확인" 버튼을 눌러야 현재 값을 볼 수 있습니다.',
        code: '// useState — 화면에 즉시 반영\nconst [count, setCount] = useState(0);\nsetCount(c => c + 1); // 리렌더링!\n\n// useRef — 화면에 반영 안 됨\nconst countRef = useRef(0);\ncountRef.current += 1; // 리렌더링 없음\n\n// 선택 기준:\n// 화면에 보여줄 값 → useState\n// 내부 추적용 값   → useRef\n// DOM 접근         → useRef',
        mode: 'comparison',
      },
    ];

    // =========================================================
    // 2. 시각화 컴포넌트들
    // =========================================================

    // --- 개념 다이어그램 ---
    function ConceptDiagram() {
      const [stateVal, setStateVal] = useState(0);
      const refVal = useRef(0);
      const [renderFlag, setRenderFlag] = useState(0);

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-4 uppercase tracking-wider">useState vs useRef 비교</div>
          <div className="grid grid-cols-2 gap-4">
            <div className="border-2 border-sky-300 bg-sky-50 rounded-xl p-4 text-center">
              <div className="text-xs font-bold text-sky-600 mb-2">useState 상자</div>
              <div className="text-3xl font-bold text-sky-700 mb-3">{stateVal}</div>
              <button onClick={() => setStateVal(p => p + 1)}
                className="px-3 py-1.5 bg-sky-500 text-white text-xs font-bold rounded-lg hover:bg-sky-600 transition">
                +1 (리렌더링 O)
              </button>
              <div className="mt-2 text-[10px] text-sky-500">값 변경 → 화면 갱신</div>
            </div>
            <div className="border-2 border-amber-300 bg-amber-50 rounded-xl p-4 text-center">
              <div className="text-xs font-bold text-amber-600 mb-2">useRef 상자</div>
              <div className="text-3xl font-bold text-amber-700 mb-3">{renderFlag > 0 ? refVal.current : '?'}</div>
              <button onClick={() => { refVal.current += 1; }}
                className="px-3 py-1.5 bg-amber-500 text-white text-xs font-bold rounded-lg hover:bg-amber-600 transition">
                +1 (리렌더링 X)
              </button>
              <div className="mt-2">
                <button onClick={() => setRenderFlag(p => p + 1)}
                  className="text-[10px] text-amber-600 underline">값 확인 (강제 렌더)</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // --- DOM 참조 데모 ---
    function DomDemo() {
      const input1Ref = useRef(null);
      const input2Ref = useRef(null);
      const input3Ref = useRef(null);
      const inputs = [
        { ref: input1Ref, label: '이름', placeholder: '이름을 입력하세요' },
        { ref: input2Ref, label: '이메일', placeholder: 'email@example.com' },
        { ref: input3Ref, label: '전화번호', placeholder: '010-1234-5678' },
      ];
      const [focused, setFocused] = useState(-1);

      const focusInput = (index) => {
        inputs[index].ref.current.focus();
        setFocused(index);
      };

      const FOCUS_CLASSES = {
        active: 'bg-emerald-500 text-white',
        inactive: 'bg-slate-100 text-slate-600 hover:bg-slate-200',
      };

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">DOM 포커스 이동 데모</div>
          <div className="flex gap-2 mb-4">
            {inputs.map((inp, i) => (
              <button key={inp.label} onClick={() => focusInput(i)}
                className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${focused === i ? FOCUS_CLASSES.active : FOCUS_CLASSES.inactive}`}>
                {inp.label} 포커스
              </button>
            ))}
          </div>
          <div className="space-y-2">
            {inputs.map((inp, i) => (
              <div key={inp.label} className="flex items-center gap-2">
                <span className="text-xs text-slate-500 w-16">{inp.label}</span>
                <input ref={inp.ref} placeholder={inp.placeholder}
                  onFocus={() => setFocused(i)}
                  className="flex-1 px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-emerald-300 focus:border-emerald-400 outline-none transition" />
              </div>
            ))}
          </div>
          <div className="mt-3 bg-emerald-50 border border-emerald-200 rounded-lg p-2 text-[10px] text-emerald-700">
            inputRef.current.focus() — ref로 연결된 DOM 요소에 직접 메서드를 호출합니다.
          </div>
        </div>
      );
    }

    // --- 렌더링 카운터 데모 ---
    function RenderCountDemo() {
      const [name, setName] = useState('');
      const renderCount = useRef(0);
      renderCount.current += 1;

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">렌더링 카운터 데모</div>
          <div className="space-y-3">
            <div>
              <label className="text-xs text-slate-500 block mb-1">이름을 입력해 보세요:</label>
              <input value={name} onChange={e => setName(e.target.value)}
                className="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-emerald-300 focus:border-emerald-400 outline-none" />
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div className="bg-sky-50 border border-sky-200 rounded-lg p-3 text-center">
                <div className="text-[10px] text-sky-500 font-bold">입력값 (useState)</div>
                <div className="text-sm font-bold text-sky-700 mt-1 break-all">{name || '(비어있음)'}</div>
                <div className="text-[10px] text-sky-400 mt-1">값 변경 → 화면 갱신</div>
              </div>
              <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 text-center">
                <div className="text-[10px] text-amber-500 font-bold">렌더 횟수 (useRef)</div>
                <div className="text-2xl font-bold text-amber-700 mt-1">{renderCount.current}</div>
                <div className="text-[10px] text-amber-400 mt-1">리렌더링 유발 안 함</div>
              </div>
            </div>
          </div>
          <div className="mt-3 bg-amber-50 border border-amber-200 rounded-lg p-2 text-[10px] text-amber-700">
            renderCount를 useState로 관리하면 값 변경 → 리렌더링 → 값 변경 → 무한 루프!
          </div>
        </div>
      );
    }

    // --- 이전 값 기억 데모 ---
    function PrevValueDemo() {
      const [count, setCount] = useState(0);
      const prevCountRef = useRef(0);

      useEffect(() => {
        prevCountRef.current = count;
      });

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">이전 값 기억 패턴</div>
          <div className="flex items-center justify-center gap-6 mb-4">
            <div className="text-center">
              <div className="text-[10px] text-slate-500 font-bold">이전 값</div>
              <div className="text-3xl font-bold text-slate-400">{prevCountRef.current}</div>
            </div>
            <div className="text-2xl text-slate-300">→</div>
            <div className="text-center">
              <div className="text-[10px] text-emerald-500 font-bold">현재 값</div>
              <div className="text-3xl font-bold text-emerald-600">{count}</div>
            </div>
          </div>
          <div className="flex justify-center gap-2">
            <button onClick={() => setCount(c => c + 1)}
              className="px-4 py-2 bg-emerald-500 text-white text-sm font-bold rounded-lg hover:bg-emerald-600 transition">
              +1
            </button>
            <button onClick={() => setCount(c => c + 5)}
              className="px-4 py-2 bg-violet-500 text-white text-sm font-bold rounded-lg hover:bg-violet-600 transition">
              +5
            </button>
            <button onClick={() => setCount(0)}
              className="px-4 py-2 bg-slate-200 text-slate-600 text-sm font-bold rounded-lg hover:bg-slate-300 transition">
              초기화
            </button>
          </div>
          <div className="mt-4 bg-slate-50 border border-slate-200 rounded-lg p-3 text-xs text-slate-600">
            <div className="font-bold mb-1">흐름:</div>
            <ol className="list-decimal list-inside space-y-0.5">
              <li>버튼 클릭 → setCount로 값 변경</li>
              <li>컴포넌트 리렌더링 → prevCountRef.current는 아직 이전 값</li>
              <li>화면 그려진 후 useEffect 실행 → ref에 현재 값 저장</li>
            </ol>
          </div>
        </div>
      );
    }

    // --- useState vs useRef 비교 데모 ---
    function ComparisonDemo() {
      const [stateCount, setStateCount] = useState(0);
      const refCount = useRef(0);
      const [refDisplay, setRefDisplay] = useState('?');

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-4 uppercase tracking-wider">나란히 비교: useState vs useRef</div>
          <div className="grid grid-cols-2 gap-4">
            <div className="border-2 border-sky-300 rounded-xl p-4">
              <div className="text-xs font-bold text-sky-600 text-center mb-2">useState</div>
              <div className="text-4xl font-bold text-sky-700 text-center mb-3">{stateCount}</div>
              <button onClick={() => setStateCount(c => c + 1)}
                className="w-full px-3 py-2 bg-sky-500 text-white text-sm font-bold rounded-lg hover:bg-sky-600 transition">
                +1
              </button>
              <div className="mt-2 text-[10px] text-sky-500 text-center">클릭할 때마다 화면 갱신</div>
            </div>
            <div className="border-2 border-amber-300 rounded-xl p-4">
              <div className="text-xs font-bold text-amber-600 text-center mb-2">useRef</div>
              <div className="text-4xl font-bold text-amber-700 text-center mb-3">{refDisplay}</div>
              <button onClick={() => { refCount.current += 1; }}
                className="w-full px-3 py-2 bg-amber-500 text-white text-sm font-bold rounded-lg hover:bg-amber-600 transition mb-2">
                +1
              </button>
              <button onClick={() => setRefDisplay(refCount.current)}
                className="w-full px-3 py-2 bg-amber-100 text-amber-700 text-xs font-bold rounded-lg hover:bg-amber-200 transition">
                값 확인 (alert 대신)
              </button>
              <div className="mt-2 text-[10px] text-amber-500 text-center">클릭해도 화면 불변</div>
            </div>
          </div>
          <div className="mt-4 bg-emerald-50 border border-emerald-200 rounded-lg p-3">
            <div className="text-[10px] text-emerald-600 font-bold mb-1">언제 useRef를 쓸까?</div>
            <ul className="text-xs text-emerald-700 space-y-0.5">
              <li>• DOM 요소에 접근 (포커스, 스크롤, 크기 측정)</li>
              <li>• 렌더링 횟수, 이전 값 등 내부 추적용 데이터</li>
              <li>• setInterval/setTimeout의 ID 저장</li>
              <li>• 외부 라이브러리 인스턴스 보관</li>
            </ul>
          </div>
        </div>
      );
    }

    // =========================================================
    // 3. 코드 패널
    // =========================================================
    function CodePanel({ code }) {
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-emerald-500"></div>
            </div>
            <span className="text-[10px] text-slate-500 ml-2">UseRefDemo.jsx</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    // =========================================================
    // 4. 메인 App
    // =========================================================
    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => {
        setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      };
      const nextRef = useRef(next);
      nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-emerald-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-500 text-white flex items-center justify-center rounded-full font-bold text-sm select-none">III-B</div>
                <h1 className="text-2xl font-bold text-slate-800">useRef Hook — DOM 참조 + 렌더링 없는 값 저장</h1>
              </div>
              <p className="text-slate-600 text-sm">렌더링을 트리거하지 않는 기억 상자, useRef의 4가지 활용법을 학습합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter III-B-5 | ★★☆ | 선수 지식 IV-1-2 | 2026-04-21</p>
            </header>

            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-emerald-500' : 'bg-slate-200'}`}
                  aria-label={`Step ${i + 1}`}
                />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                <CodePanel code={step.code} />
                {step.mode === 'concept' && <ConceptDiagram />}
                {step.mode === 'dom-demo' && <DomDemo />}
                {step.mode === 'render-count-demo' && <RenderCountDemo />}
                {step.mode === 'prev-value-demo' && <PrevValueDemo />}
                {step.mode === 'comparison' && <ComparisonDemo />}
              </div>

              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-emerald-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>

                <div className="mt-4 bg-emerald-50 border border-emerald-200 rounded-lg p-3">
                  <div className="text-[10px] text-emerald-600 font-bold uppercase mb-1">핵심 포인트</div>
                  <p className="text-xs text-emerald-700">
                    {idx === 0 && 'useRef({초기값})는 { current: 초기값 } 객체를 반환합니다. 이 객체는 컴포넌트 전체 수명 동안 유지됩니다.'}
                    {idx === 1 && 'ref={inputRef}로 DOM 요소를 연결하면 inputRef.current에 실제 DOM 노드가 담깁니다.'}
                    {idx === 2 && 'useRef는 렌더링 사이에 값을 유지하면서도 변경 시 리렌더링을 유발하지 않습니다. 렌더링 카운터에 이상적!'}
                    {idx === 3 && 'useEffect 안에서 ref에 현재 값을 저장하면, 다음 렌더링에서 "이전 값"으로 활용할 수 있습니다.'}
                    {idx === 4 && '화면에 보여줄 데이터는 useState, 내부 추적용 데이터나 DOM 접근은 useRef를 사용하세요.'}
                  </p>
                </div>
              </div>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }}
                disabled={idx === 0}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="이전 단계"
              >&larr; 이전</button>
              <button onClick={() => { if (isEnd) setIdx(0); setIsPlaying(p => !p); }}
                className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${
                  isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-emerald-500 hover:bg-emerald-600 text-white'
                }`}
                aria-label={isPlaying ? '정지' : '자동 실행'}
              >{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }}
                disabled={isEnd}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="다음 단계"
              >다음 &rarr;</button>
            </div>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-21
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
