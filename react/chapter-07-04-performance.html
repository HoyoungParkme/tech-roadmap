          label: 'Lighthouse — After',
          counts: {},
          note: '4가지 최적화 적용 후',

        },
        bundle: {

        code: {

            '',
            '- 설치: 크롬 확장 "React Developer Tools"',
            '- **Profiler 탭** → 녹화 → 인터랙션 → 정지',
            '- 각 컴포넌트의 **렌더 횟수**와 **소요 시간**이 막대로 표시',
            '- 노란/빨간 막대 = 의심 대상 → 그곳부터 `memo` / `useMemo`',
            '',

            '- 측정 없이 "느낄 것 같아서" 최적화 (시간 낭비)',

          ],
          highlight: [1, 3, 5, 6, 7, 8, 9, 11, 13, 14, 15, 16, 17, 18, 19, 21, 23, 24, 25, 26, 27, 28, 29, 31, 33, 34, 35, 36, 38, 40, 41, 42, 43, 45, 47, 48, 49, 50, 51, 52, 54, 55],
        },
      },
    ];

    // ─────────────────────────────────────────────────────
    // ComponentTree — 좌측 상단: 컴포넌트 트리 + 리렌더 카운트
    //   color: dim 이면 회색, count 가 작으면 emerald, 크면 rose
    // ─────────────────────────────────────────────────────
    function ComponentTree({ title, data }) {
      const counts = data.counts || {};
      const dimList = data.dimList || [];
      const entries = Object.entries(counts);
      const max = Math.max(...entries.map(([, v]) => Number(v) || 0), 1);

      const colorOf = (name, n) => {
        if (dimList.includes(name)) return { bg: 'bg-slate-100', text: 'text-slate-400', border: 'border-slate-200', label: 'lazy' };
        if (n === 0) return { bg: 'bg-slate-100', text: 'text-slate-400', border: 'border-slate-200', label: '0' };
        const ratio = n / max;
        if (ratio >= 0.9) return { bg: 'bg-rose-100',    text: 'text-rose-700',    border: 'border-rose-300',    label: `×${n}` };
        if (ratio >= 0.5) return { bg: 'bg-amber-100',   text: 'text-amber-800',   border: 'border-amber-300',   label: `×${n}` };
        return                  { bg: 'bg-emerald-100', text: 'text-emerald-700', border: 'border-emerald-300', label: `×${n}` };
      };

      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">
          <div className="bg-slate-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-slate-600 flex items-center justify-between">
            <span>{title}</span>
            <span className="text-[9px] font-mono text-slate-500">re-render count</span>
          </div>
          <div className="p-2.5">
            <div className="text-[11px] font-mono text-slate-700 leading-tight mb-2 px-1">{data.label}</div>

            {entries.length > 0 && (
              <div className="space-y-1">
                {entries.map(([name, n], idx) => {
                  const c = colorOf(name, Number(n) || 0);
                  return (
                    <div key={name} className="flex items-center gap-1.5" style={{ marginLeft: `${idx === 0 ? 0 : 14}px` }}>
                      <span className="text-slate-400 text-[10px]">{idx === 0 ? '┌' : (idx === entries.length - 1 ? '└' : '├')}</span>
                      <span className={`text-[10px] font-mono px-1.5 py-0.5 rounded ${c.bg} ${c.text} border ${c.border} font-bold flex-shrink-0`}>
                        {c.label}
                      </span>
                      <span className="text-[11px] font-mono text-slate-700">{name}</span>
                    </div>
                  );
                })}
              </div>
            )}

            {data.metrics && (
              <div className="mt-2 grid grid-cols-2 gap-1">
                {Object.entries(data.metrics).map(([k, v]) => {
                  const isPerf = k === 'Performance';
                  const num = Number(v);
                  let pillCls = 'bg-emerald-50 text-emerald-700 border-emerald-200';
                  if (isPerf) {
                    if (num < 50)      pillCls = 'bg-rose-50 text-rose-700 border-rose-200';
                    else if (num < 90) pillCls = 'bg-amber-50 text-amber-700 border-amber-200';
                  }
                  return (
                    <div key={k} className={`flex justify-between items-center px-2 py-0.5 rounded border ${pillCls}`}>
                      <span className="text-[10px] font-mono font-bold">{k}</span>
                      <span className="text-[10px] font-mono">{v}</span>
                    </div>
                  );
                })}
              </div>
            )}

            {data.extra && (
              <div className="mt-2 text-[10px] font-mono text-slate-500 px-1">
                {Object.entries(data.extra).map(([k, v]) => (
                  <div key={k}>{k}: <span className="text-slate-700 font-bold">{v}</span></div>
                ))}
              </div>
            )}

            <div className="mt-2 text-[10px] text-slate-500 italic px-1">{data.note}</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // BundleBar — 번들 크기 막대 (before vs after, chunks)
    // ─────────────────────────────────────────────────────
    function BundleBar({ bundle }) {
      const { before, after, chunks } = bundle;
      const max = Math.max(before, after, 240);
      const pct = (n) => `${Math.max(2, Math.round((n / max) * 100))}%`;
      const reduced = before > after;
      const palette = ['bg-indigo-500', 'bg-fuchsia-400', 'bg-amber-400', 'bg-emerald-400', 'bg-sky-400'];

      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">
          <div className="bg-slate-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-slate-600 flex items-center justify-between">
            <span>📦 번들 크기</span>
            <span className="text-[9px] font-mono text-slate-500">KB (initial)</span>
          </div>
          <div className="p-2.5 space-y-2">
            {/* Before bar */}
            <div>
              <div className="flex justify-between text-[10px] font-mono mb-0.5">
                <span className="text-slate-600">Before</span>
                <span className="text-rose-600 font-bold">{before} KB</span>
              </div>
              <div className="h-3 bg-slate-100 rounded overflow-hidden">
                <div className="h-full bg-rose-400 rounded" style={{ width: pct(before) }}></div>
              </div>
            </div>

            {/* After bar — chunks 분리 */}
            <div>
              <div className="flex justify-between text-[10px] font-mono mb-0.5">
                <span className="text-slate-600">After (initial)</span>
                <span className={`font-bold ${reduced ? 'text-emerald-600' : 'text-slate-600'}`}>{after} KB</span>
              </div>
              <div className="h-3 bg-slate-100 rounded overflow-hidden flex">
                {chunks.map((c, i) => (
                  <div
                    key={c.name}
                    className={`${palette[i % palette.length]} h-full`}
                    style={{ width: pct(c.size) }}
                    title={`${c.name} ${c.size}KB`}
                  ></div>
                ))}
              </div>
              {/* chunks 범례 */}
              <div className="flex flex-wrap gap-1.5 mt-1.5">
                {chunks.map((c, i) => (
                  <span key={c.name} className="flex items-center gap-1 text-[9px] font-mono text-slate-600">
                    <span className={`w-2 h-2 rounded ${palette[i % palette.length]}`}></span>
                    {c.name} ({c.size}KB)
                  </span>
                ))}
              </div>
            </div>

            {reduced && (
              <div className="text-[10px] text-emerald-700 font-mono font-bold pt-0.5">
                ↓ {Math.round((1 - after / before) * 100)}% 감소 (initial chunk 기준)
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // FlowArrow — Before → After 화살표
    // ─────────────────────────────────────────────────────
    function FlowArrow({ label }) {
      return (
        <div className="flex items-center justify-center my-1">
          <div className="flex flex-col items-center">
            <div className="text-[9px] text-indigo-600 font-mono font-bold tracking-wider uppercase">{label}</div>
            <div className="text-indigo-400 text-lg leading-none">↓</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    //   상단 : Before 트리 (리렌더 카운트)
    //   ↓ 최적화 적용
    //   중간 : After 트리 (감소된 카운트)
    //   하단 : 번들 막대 (Step 4·5에서 chunk 분할 표시)
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">⚡ 컴포넌트 트리 + 리렌더 카운트 + 번들</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-1">
            <ComponentTree title="Before — 최적화 전" data={step.treeBefore} />
            <FlowArrow label="optimize" />
            <ComponentTree title="After — 최적화 후" data={step.treeAfter} />
            <div className="pt-1">
              <BundleBar bundle={step.bundle} />
            </div>
          </div>

          {/* 핵심 포인트 박스 */}
          <div className="mt-3 bg-indigo-50 border-l-4 border-indigo-400 px-3 py-2 rounded-r">
            <div className="text-[9px] font-bold text-indigo-600 uppercase tracking-wider mb-0.5">핵심 포인트</div>
            <p className="text-[11px] text-indigo-900 leading-snug">{step.keyPoint}</p>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-400"></span>리렌더 많음
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-amber-400"></span>중간
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-400"></span>적음 / 최적화
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-slate-300"></span>스킵 / lazy
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   파일명 탭 + 윈도우 dot + 라인 번호 + 강조 라인
    //   탭바: 5개 파일 (단계 클릭으로 전환)
    // ─────────────────────────────────────────────────────
    function CodeViewer({ steps, stepIdx, onSelect }) {
      const code = steps[stepIdx].code;
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 탭바 (5개 파일) */}
          <div className="bg-[#21252b] border-b border-slate-700">
            <div className="px-4 py-2 flex items-center gap-2 border-b border-slate-700/60">
              <div className="flex gap-1.5">
                <span className="w-3 h-3 rounded-full bg-red-500"></span>
                <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
                <span className="w-3 h-3 rounded-full bg-green-500"></span>
              </div>
              <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
            </div>
            <div className="flex overflow-x-auto">
              {steps.map((s, i) => {
                const active = i === stepIdx;
                return (
                  <button
                    key={s.code.filename}
                    onClick={() => onSelect(i)}
                    className={`px-3 py-1.5 text-[11px] font-mono whitespace-nowrap border-r border-slate-700/60 transition ${
                      active
                        ? 'bg-[#282c34] text-indigo-300 border-t-2 border-t-indigo-400 -mt-px'
                        : 'bg-[#1d2027] text-slate-500 hover:text-slate-300'
                    }`}
                  >
                    {s.code.filename}
                  </button>
                );
              })}
            </div>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[42rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-indigo-500/15 border-l-2 border-indigo-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {steps.length}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="./index.html" className="text-indigo-700 hover:text-indigo-900 font-medium">&larr; 목차로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter VII-1-4</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">VII</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part VII. 실전 React &gt; Chapter 1. 성능과 품질</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">VII-1-4. 성능 최적화 기초 — memo · useMemo · useCallback · code splitting</h1>
                  <p className="text-sm text-slate-500 mt-0.5">불필요한 리렌더와 큰 번들을 단계적으로 줄이는 4가지 도구 + 측정</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer steps={STEPS} stepIdx={stepIdx} onSelect={setStepIdx} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-indigo-50 border-2 border-indigo-300 rounded-xl p-3 text-sm text-indigo-900">
                💡 정리: <strong>memo</strong>로 자식 리렌더를 줄이고, <strong>useMemo/useCallback</strong>으로 값과 함수를 안정화하고, <strong>lazy + Suspense</strong>로 번들을 쪼갠 뒤, <strong>Lighthouse</strong>로 측정한다. "측정 먼저, 최적화 나중"이 핵심이다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-indigo-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-indigo-600 text-white hover:bg-indigo-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['React.memo', 'useMemo', 'useCallback', 'lazy', 'Suspense', 'code splitting', 'Lighthouse', 'Web Vitals', 'Profiler'].map((kw) => (
                <span key={kw} className="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-xs font-medium border border-indigo-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-07-03-error-boundary.html" className="text-indigo-700 hover:text-indigo-900 font-medium">&larr; VII-1-3 Error Boundary</a>
              <a href="./chapter-07-05-testing.html" className="text-indigo-700 hover:text-indigo-900 font-medium">VII-1-5 테스팅 기초 &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
