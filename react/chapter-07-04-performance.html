<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>성능 최적화 기초 — Chapter VII-1-4</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1 — 리렌더링 이해하기',
        desc: 'React는 state나 props가 바뀌면 해당 컴포넌트와 모든 자식을 리렌더링합니다. 대부분은 빠르게 처리되지만, 불필요한 리렌더링이 쌓이면 성능 문제가 됩니다.',
        code: '// Parent의 state가 바뀌면\nfunction Parent() {\n  const [count, setCount] = useState(0);\n  return (\n    <div>\n      <p>{count}</p>\n      <ChildA />  ← 리렌더링! (count 안 씀)\n      <ChildB />  ← 리렌더링! (count 안 씀)\n      <ChildC />  ← 리렌더링! (count 안 씀)\n    </div>\n  );\n}',
        visual: 'rerender',
      },
      {
        title: 'Step 2 — React.memo',
        desc: 'React.memo는 ��포넌트를 감싸서 props가 바뀌지 않으면 리렌더링을 건너뜁니다. "이전 props와 같으면 다시 그리지 마" 라고 말하는 것입니다.',
        code: '// Before: 매번 리렌더링\nfunction ExpensiveList({ items }) {\n  return items.map(item => <Item key={item.id} {...item} />);\n}\n\n// After: props 같으면 스킵!\nconst ExpensiveList = React.memo(function({ items }) {\n  return items.map(item => <Item key={item.id} {...item} />);\n});\n\n// items가 바뀌지 않으면 → 리렌더링 스킵!',
        visual: 'memo',
      },
      {
        title: 'Step 3 — useMemo',
        desc: 'useMemo는 무거운 계산 결과를 캐싱합니다. 의존성이 바뀌지 않으면 이전 결과를 재사용합니다. 정렬, 필터링, 복잡한 계산에 유용합니다.',
        code: '// Before: 매 렌더링마다 정렬 실행\nfunction ProductList({ products, sortBy }) {\n  const sorted = products.sort(...);\n  // 10,000개 상품 매번 정렬 → 느림!\n}\n\n// After: sortBy가 바뀔 때만 정렬\nfunction ProductList({ products, sortBy }) {\n  const sorted = useMemo(\n    () => products.sort(...),\n    [products, sortBy]  // 이것들이 바뀔 때만 재계산\n  );\n}',
        visual: 'usememo',
      },
      {
        title: 'Step 4 — useCallback',
        desc: 'useCallback은 함수 참조를 캐싱합니다. React.memo된 자식에 함수를 전달할 때, 매 렌더링마다 새 함수가 생성되면 memo가 무효화됩니다. useCallback으로 같은 함수 참조를 유지합니다.',
        code: '// 문제: 매 렌더링마다 새 함수 생성\nfunction Parent() {\n  const [count, setCount] = useState(0);\n  const handleClick = () => console.log("click");\n  // handleClick이 매번 새로 만들어짐!\n  return <MemoChild onClick={handleClick} />;\n}\n\n// 해결: useCallback으로 함수 캐싱\nfunction Parent() {\n  const [count, setCount] = useState(0);\n  const handleClick = useCallback(\n    () => console.log("click"),\n    []  // 의존성 없음 → 항상 같은 참조\n  );\n  return <MemoChild onClick={handleClick} />;\n}',
        visual: 'usecallback',
      },
      {
        title: 'Step 5 — 최적화 가이드',
        desc: '메모이제이션은 "성능 문제가 실제로 측정됐을 때만" 적용합니다. 과도한 최적화는 코드 복잡도만 높이고 실제 성능 향상은 미미합니다. "측정 먼저, 최적화 나중" 원칙을 지킵니다.',
        code: null,
        visual: 'guide',
      },
    ];

    function RerenderVisual() {
      const [count, setCount] = useState(0);
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">리렌더링 시각화</div>
          <div className="text-center mb-3">
            <button onClick={() => setCount(p => p + 1)} className="px-3 py-1.5 bg-orange-500 hover:bg-orange-600 text-white rounded-lg text-xs font-bold transition">
              Parent state 변경 ({count})
            </button>
          </div>
          <div className="space-y-1.5">
            <div className="bg-orange-100 border-2 border-orange-300 rounded-lg px-3 py-2 text-xs font-bold text-orange-700 animate-pulse">
              Parent (state 변경됨) → 리렌더링!
            </div>
            {['ChildA', 'ChildB', 'ChildC'].map((name) => (
              <div key={name} className="ml-4 bg-red-50 border border-red-200 rounded-lg px-3 py-1.5 text-[10px] text-red-600">
                {name} — props 안 바뀌었는데 리렌더링됨 😢
              </div>
            ))}
          </div>
        </div>
      );
    }

    function MemoVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">React.memo 효과</div>
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-red-50 border border-red-200 rounded-lg p-3">
              <div className="text-[10px] font-bold text-red-600 mb-2">memo 없음</div>
              <div className="space-y-1">
                <div className="bg-red-100 rounded px-2 py-0.5 text-[10px] text-red-700">🔄 ChildA</div>
                <div className="bg-red-100 rounded px-2 py-0.5 text-[10px] text-red-700">🔄 ChildB</div>
                <div className="bg-red-100 rounded px-2 py-0.5 text-[10px] text-red-700">🔄 ChildC</div>
              </div>
              <div className="mt-1 text-[9px] text-red-500">3번 리렌더링</div>
            </div>
            <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3">
              <div className="text-[10px] font-bold text-emerald-600 mb-2">memo 적용</div>
              <div className="space-y-1">
                <div className="bg-slate-100 rounded px-2 py-0.5 text-[10px] text-slate-400">⏸ ChildA (스킵)</div>
                <div className="bg-emerald-100 rounded px-2 py-0.5 text-[10px] text-emerald-700">🔄 ChildB (props 변경)</div>
                <div className="bg-slate-100 rounded px-2 py-0.5 text-[10px] text-slate-400">⏸ ChildC (스킵)</div>
              </div>
              <div className="mt-1 text-[9px] text-emerald-500">1번만 리렌더링!</div>
            </div>
          </div>
        </div>
      );
    }

    function UseMemoVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">useMemo 동작</div>
          <div className="flex items-center gap-2 justify-center text-xs">
            {[
              { label: '입력', sub: '[products, sortBy]', color: 'bg-sky-50 border-sky-200' },
              { label: '변경?', sub: '의존성 비교', color: 'bg-amber-50 border-amber-200' },
              { label: '결과', sub: '캐시 or 재계산', color: 'bg-emerald-50 border-emerald-200' },
            ].map((item, i, arr) => (
              <React.Fragment key={item.label}>
                <div className={`${item.color} border rounded-lg px-3 py-2 text-center flex-1`}>
                  <div className="font-bold text-slate-700">{item.label}</div>
                  <div className="text-[9px] text-slate-500 mt-0.5">{item.sub}</div>
                </div>
                {i < arr.length - 1 && <span className="text-slate-300">→</span>}
              </React.Fragment>
            ))}
          </div>
          <div className="mt-3 text-center text-[10px] text-slate-500">의존성이 같으면 → 이전 결과 재사용 (재계산 X)</div>
        </div>
      );
    }

    function UseCallbackVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">useCallback이 필요한 이유</div>
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-red-50 border border-red-200 rounded-lg p-3">
              <div className="text-[10px] font-bold text-red-600 mb-1">useCallback 없음</div>
              <div className="text-[9px] text-slate-600 space-y-0.5">
                <div>렌더링 #1: fn = <span className="text-red-600">0x001</span></div>
                <div>렌더링 #2: fn = <span className="text-red-600">0x002</span> ← 새 참조!</div>
                <div>렌더링 #3: fn = <span className="text-red-600">0x003</span> ← 새 참조!</div>
              </div>
              <div className="mt-1 text-[9px] text-red-500">매번 새 함수 → memo 무효화</div>
            </div>
            <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3">
              <div className="text-[10px] font-bold text-emerald-600 mb-1">useCallback 적용</div>
              <div className="text-[9px] text-slate-600 space-y-0.5">
                <div>렌더링 #1: fn = <span className="text-emerald-600">0x001</span></div>
                <div>렌더링 #2: fn = <span className="text-emerald-600">0x001</span> ← 같은 참조!</div>
                <div>렌더링 #3: fn = <span className="text-emerald-600">0x001</span> ← 같은 참조!</div>
              </div>
              <div className="mt-1 text-[9px] text-emerald-500">같은 함수 → memo 유효!</div>
            </div>
          </div>
        </div>
      );
    }

    function GuideVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">최적화 원칙</div>
          <div className="space-y-2">
            {[
              { rule: '측정 먼저', desc: 'React DevTools Profiler로 실제 병목을 찾는다', icon: '📊' },
              { rule: '필요할 때만', desc: '체감 성능 문제가 없으면 최적화하지 않는다', icon: '⚖️' },
              { rule: 'memo는 선택적', desc: '모든 컴포넌트에 memo를 붙이지 않는다', icon: '🎯' },
              { rule: '상태 올바르게', desc: '불필요한 상태 끌어올리기를 피한다', icon: '📐' },
            ].map((item) => (
              <div key={item.rule} className="flex items-center gap-3 bg-slate-50 rounded-lg px-3 py-2">
                <span className="text-lg">{item.icon}</span>
                <div>
                  <div className="text-xs font-bold text-slate-800">{item.rule}</div>
                  <div className="text-[10px] text-slate-500">{item.desc}</div>
                </div>
              </div>
            ))}
          </div>
          <div className="mt-3 bg-amber-50 border border-amber-200 rounded-lg p-3 text-center">
            <div className="text-[10px] text-amber-700 font-bold">"Premature optimization is the root of all evil" — Donald Knuth</div>
          </div>
        </div>
      );
    }

    function CodePanel({ code }) {
      if (!code) return null;
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5"><div className="w-3 h-3 rounded-full bg-red-500"></div><div className="w-3 h-3 rounded-full bg-yellow-500"></div><div className="w-3 h-3 rounded-full bg-emerald-500"></div></div>
            <span className="text-[10px] text-slate-500 ml-2">App.jsx</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;
      const next = () => { setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; }); };
      const nextRef = useRef(next); nextRef.current = next;
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const VISUAL_MAP = { rerender: RerenderVisual, memo: MemoVisual, usememo: UseMemoVisual, usecallback: UseCallbackVisual, guide: GuideVisual };
      const VisualComponent = VISUAL_MAP[step.visual];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-orange-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">VII</div>
                <h1 className="text-2xl font-bold text-slate-800">성능 최적화 기초</h1>
              </div>
              <p className="text-slate-600 text-sm"><b>React.memo, useMemo, useCallback</b>의 동작 원리와 적절한 사용 시점을 시각화합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter VII-1-4 | ★★★ | 선수 지식 VII-1-3 | 2026-04-21</p>
            </header>
            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.title} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-orange-500' : 'bg-slate-200'}`} aria-label={`Step ${i + 1}`} />
              ))}
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                <CodePanel code={step.code} />
                {VisualComponent && <VisualComponent />}
              </div>
              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-orange-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>
              </div>
            </div>
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }} disabled={idx === 0} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="이전 단계">← 이전</button>
              <button onClick={() => { if (isEnd) { setIdx(0); } setIsPlaying(p => !p); }} className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-orange-500 hover:bg-orange-600 text-white'}`} aria-label={isPlaying ? '정지' : '자동 실행'}>{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }} disabled={isEnd} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="다음 단계">다음 →</button>
            </div>
            <footer className="text-center text-xs text-slate-400 pb-4">React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-21</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
