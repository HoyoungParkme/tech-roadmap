  <!-- Chapter III-B-6 — useReducer: dispatch 흐름과 복잡한 상태 관리 -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useReducer } = React;

    // =========================================================
    // 1. STEPS 정의 — useReducer 핵심 5단계
    // =========================================================
    const STEPS = [
      {
        id: 'step-concept',
        title: 'Step 1 — useReducer란?',
        desc: 'useReducer는 useState의 대안입니다. "은행 창구" 비유로 이해하세요: dispatch(요청서)를 reducer(은행원)에게 보내면, 은행원이 규칙대로 state(잔고)를 업데이트합니다. 상태 변경 로직이 복잡할 때 유용합니다.',
        code: '// useReducer 기본 구조\nconst [state, dispatch] = useReducer(\n  reducer,  // 상태 변경 규칙 (함수)\n  초기값     // 초기 상태\n);\n\n// reducer 함수\nfunction reducer(state, action) {\n  switch (action.type) {\n    case "INCREMENT":\n      return { count: state.count + 1 };\n    case "DECREMENT":\n      return { count: state.count - 1 };\n    default:\n      return state;\n  }\n}\n\n// 사용: dispatch({ type: "INCREMENT" })',

      },

        id: 'step-vs-usestate',

        code: '// --- useState 버전 ---\nconst [count, setCount] = useState(0);\nsetCount(c => c + 1);\nsetCount(c => c - 1);\nsetCount(0);\n\n// --- useReducer 버전 ---\nfunction reducer(state, action) {\n  switch (action.type) {\n    case "INC": return { count: state.count + 1 };\n    case "DEC": return { count: state.count - 1 };\n    case "RESET": return { count: 0 };\n  }\n}\nconst [state, dispatch] = useReducer(\n  reducer, { count: 0 }\n);\ndispatch({ type: "INC" });',
        mode: 'vs-demo',
      },
      {
        id: 'step-reducer',
        title: 'Step 3 — reducer 함수 작성',
        desc: 'reducer는 (현재상태, 액션) → 새 상태 를 반환하는 순수 함수입니다. switch-case로 액션 타입별 처리를 분기합니다. 액션에는 type 외에 payload(추가 데이터)를 함께 보낼 수 있습니다.',
        code: 'function todoReducer(state, action) {\n  switch (action.type) {\n    case "ADD":\n      return [\n        ...state,\n        {\n          id: Date.now(),\n          text: action.payload,\n          done: false\n        }\n      ];\n    case "TOGGLE":\n      return state.map(todo =>\n        todo.id === action.payload\n          ? { ...todo, done: !todo.done }\n          : todo\n      );\n    case "DELETE":\n      return state.filter(\n        todo => todo.id !== action.payload\n      );\n    default:\n      return state;\n  }\n}',
        mode: 'reducer-demo',
      },
      {
        id: 'step-todo',
        title: 'Step 4 — Todo 앱 실전',
        desc: '미니 Todo 앱으로 useReducer를 실전 적용합니다. 추가·삭제·토글 3가지 액션이 reducer를 거쳐 상태를 변경하는 흐름을 dispatch 로그에서 확인하세요.',
        code: '// 사용하는 3가지 dispatch\n\n// 할 일 추가\ndispatch({\n  type: "ADD",\n  payload: "새 할 일"\n});\n\n// 완료 토글\ndispatch({\n  type: "TOGGLE",\n  payload: todoId\n});\n\n// 할 일 삭제\ndispatch({\n  type: "DELETE",\n  payload: todoId\n});',

        code: '// 선택 가이드\n//\n// useState를 쓸 때:\n// - 단순한 값 (숫자, 문자열, boolean)\n// - 독립적인 상태 업데이트\n// - 상태 변경 로직이 단순\n//\n// useReducer를 쓸 때:\n// - 객체/배열 형태의 복잡한 상태\n// - 여러 종류의 액션이 필요\n// - 다음 상태가 이전 상태에 의존\n// - 상태 변경 로직을 한 곳에서 관리',

    // =========================================================
    // 2. 시각화 컴포넌트들
    // =========================================================

    // --- 개념 다이어그램 ---
    function ConceptDiagram() {
      const [animStep, setAnimStep] = useState(0);

      useEffect(() => {
        const timer = setInterval(() => setAnimStep(p => (p + 1) % 4), 1500);
        return () => clearInterval(timer);
      }, []);

      const ANIM_CLASSES = {
        0: { dispatch: 'ring-2 ring-sky-400 scale-105', reducer: '', state: '' },
        1: { dispatch: '', reducer: 'ring-2 ring-violet-400 scale-105', state: '' },
        2: { dispatch: '', reducer: '', state: 'ring-2 ring-emerald-400 scale-105' },
        3: { dispatch: '', reducer: '', state: '' },
      };
      const classes = ANIM_CLASSES[animStep];

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-4 uppercase tracking-wider">useReducer 흐름 (자동 애니메이션)</div>
          <div className="flex items-center justify-between gap-3">
            <div className={`flex-1 bg-sky-50 border-2 border-sky-300 rounded-xl p-3 text-center transition-all duration-300 ${classes.dispatch}`}>
              <div className="text-[10px] font-bold text-sky-500">1. dispatch</div>
              <div className="text-xs text-sky-700 font-bold mt-1">요청서 보내기</div>
              <div className="text-[9px] text-sky-500 mt-1">{'{ type: "INC" }'}</div>
            </div>
            <div className="text-slate-300 text-lg">→</div>
            <div className={`flex-1 bg-violet-50 border-2 border-violet-300 rounded-xl p-3 text-center transition-all duration-300 ${classes.reducer}`}>
              <div className="text-[10px] font-bold text-violet-500">2. reducer</div>
              <div className="text-xs text-violet-700 font-bold mt-1">규칙 적용</div>
              <div className="text-[9px] text-violet-500 mt-1">switch(type)</div>
            </div>
            <div className="text-slate-300 text-lg">→</div>
            <div className={`flex-1 bg-emerald-50 border-2 border-emerald-300 rounded-xl p-3 text-center transition-all duration-300 ${classes.state}`}>
              <div className="text-[10px] font-bold text-emerald-500">3. new state</div>
              <div className="text-xs text-emerald-700 font-bold mt-1">상태 갱신</div>
              <div className="text-[9px] text-emerald-500 mt-1">{'{ count: 1 }'}</div>
            </div>
          </div>
          <div className="mt-3 text-center text-[10px] text-slate-400">
            dispatch → reducer → 새 상태 → 리렌더링
          </div>
        </div>
      );
    }

    // --- counterReducer (모듈 스코프) ---
    function counterReducer(state, action) {
      switch (action.type) {
        case 'INC': return { count: state.count + 1 };
        case 'DEC': return { count: state.count - 1 };
        case 'RESET': return { count: 0 };
        default: return state;
      }
    }

    // --- useState vs useReducer 비교 데모 ---
    function VsDemo() {
      const [stateCount, setStateCount] = useState(0);
      const [reducerState, dispatch] = useReducer(counterReducer, { count: 0 });

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-4 uppercase tracking-wider">동일 카운터, 두 가지 구현</div>
          <div className="grid grid-cols-2 gap-4">
            <div className="border-2 border-sky-300 rounded-xl p-4">
              <div className="text-xs font-bold text-sky-600 text-center mb-1">useState 버전</div>
              <div className="text-3xl font-bold text-sky-700 text-center mb-3">{stateCount}</div>
              <div className="flex gap-1">
                <button onClick={() => setStateCount(c => c - 1)} className="flex-1 px-2 py-1.5 bg-sky-100 text-sky-700 text-xs font-bold rounded-lg hover:bg-sky-200 transition">-1</button>
                <button onClick={() => setStateCount(c => c + 1)} className="flex-1 px-2 py-1.5 bg-sky-500 text-white text-xs font-bold rounded-lg hover:bg-sky-600 transition">+1</button>
                <button onClick={() => setStateCount(0)} className="flex-1 px-2 py-1.5 bg-slate-100 text-slate-600 text-xs font-bold rounded-lg hover:bg-slate-200 transition">초기화</button>
              </div>
              <div className="mt-2 text-[10px] text-sky-500">setCount(c =&gt; c + 1)</div>
            </div>
            <div className="border-2 border-violet-300 rounded-xl p-4">
              <div className="text-xs font-bold text-violet-600 text-center mb-1">useReducer 버전</div>
              <div className="text-3xl font-bold text-violet-700 text-center mb-3">{reducerState.count}</div>
              <div className="flex gap-1">
                <button onClick={() => dispatch({ type: 'DEC' })} className="flex-1 px-2 py-1.5 bg-violet-100 text-violet-700 text-xs font-bold rounded-lg hover:bg-violet-200 transition">-1</button>
                <button onClick={() => dispatch({ type: 'INC' })} className="flex-1 px-2 py-1.5 bg-violet-500 text-white text-xs font-bold rounded-lg hover:bg-violet-600 transition">+1</button>
                <button onClick={() => dispatch({ type: 'RESET' })} className="flex-1 px-2 py-1.5 bg-slate-100 text-slate-600 text-xs font-bold rounded-lg hover:bg-slate-200 transition">초기화</button>
              </div>
              <div className="mt-2 text-[10px] text-violet-500">dispatch({'{ type: "INC" }'})</div>
            </div>
          </div>
          <div className="mt-3 bg-amber-50 border border-amber-200 rounded-lg p-2 text-[10px] text-amber-700">
            간단한 카운터는 useState가 충분합니다. 액션 종류가 3개 이상이면 useReducer를 고려하세요.
          </div>
        </div>
      );
    }

    // --- reducer 함수 시각화 ---
    function ReducerDemo() {
      const [activeCase, setActiveCase] = useState(null);
      const cases = [
        { type: 'ADD', desc: '새 할 일 추가', color: 'emerald' },
        { type: 'TOGGLE', desc: '완료 상태 토글', color: 'sky' },
        { type: 'DELETE', desc: '할 일 삭제', color: 'red' },
      ];

      const CASE_COLORS = {
        emerald: { bg: 'bg-emerald-100 border-emerald-300', text: 'text-emerald-700', btn: 'bg-emerald-500 text-white' },
        sky: { bg: 'bg-sky-100 border-sky-300', text: 'text-sky-700', btn: 'bg-sky-500 text-white' },
        red: { bg: 'bg-red-100 border-red-300', text: 'text-red-700', btn: 'bg-red-500 text-white' },
      };

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">switch-case 분기 시각화</div>
          <div className="flex gap-2 mb-4">
            {cases.map(c => (
              <button key={c.type} onClick={() => setActiveCase(c.type)}
                className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${activeCase === c.type ? CASE_COLORS[c.color].btn : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                {c.type}
              </button>
            ))}
          </div>
          <div className="bg-slate-900 rounded-lg p-4 font-mono text-xs text-slate-400">
            <div>{'function todoReducer(state, action) {'}</div>
            <div className="pl-3">{'switch (action.type) {'}</div>
            {cases.map(c => {
              const isActive = activeCase === c.type;
              return (
                <div key={c.type} className={`pl-6 py-1 rounded transition-all ${isActive ? `${CASE_COLORS[c.color].bg} border` : ''}`}>
                  <span className={isActive ? CASE_COLORS[c.color].text : 'text-slate-400'}>
                    case "{c.type}": {'//'} {c.desc}
                  </span>
                  {isActive && <span className="ml-2 text-[10px]">← 현재 실행</span>}
                </div>
              );
            })}
            <div className="pl-3">{'}'}</div>
            <div>{'}'}</div>
          </div>
          {activeCase && (
            <div className="mt-3 bg-slate-50 border border-slate-200 rounded-lg p-3 text-xs text-slate-600">
              dispatch({'{ type: "' + activeCase + '"' + (activeCase !== 'ADD' ? ', payload: id' : ', payload: "텍스트"') + ' }'}) → reducer가 "{activeCase}" 케이스를 실행
            </div>
          )}
        </div>
      );
    }

    // --- Todo 앱 데모 ---
    function todoReducer(state, action) {
      switch (action.type) {
        case 'ADD':
          return { ...state, todos: [...state.todos, { id: Date.now(), text: action.payload, done: false }], logs: [...state.logs, { type: 'ADD', text: action.payload }] };
        case 'TOGGLE':
          return { ...state, todos: state.todos.map(t => t.id === action.payload ? { ...t, done: !t.done } : t), logs: [...state.logs, { type: 'TOGGLE', id: action.payload }] };
        case 'DELETE':
          return { ...state, todos: state.todos.filter(t => t.id !== action.payload), logs: [...state.logs, { type: 'DELETE', id: action.payload }] };
        default:
          return state;
      }
    }

    function TodoDemo() {
      const [state, dispatch] = useReducer(todoReducer, { todos: [
        { id: 1, text: 'useReducer 배우기', done: false },
        { id: 2, text: 'dispatch 이해하기', done: true },
      ], logs: [] });
      const [input, setInput] = useState('');

      const handleAdd = () => {
        if (!input.trim()) return;
        dispatch({ type: 'ADD', payload: input.trim() });
        setInput('');
      };

      const LOG_COLORS = {
        ADD: 'text-emerald-600',
        TOGGLE: 'text-sky-600',
        DELETE: 'text-red-600',
      };

      return (
        <div className="space-y-4">
          <div className="bg-white rounded-xl p-5 border border-slate-200">
            <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">미니 Todo 앱 (useReducer)</div>
            <div className="flex gap-2 mb-3">
              <input value={input} onChange={e => setInput(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && handleAdd()}
                placeholder="할 일을 입력하세요"
                className="flex-1 px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-emerald-300 focus:border-emerald-400 outline-none" />
              <button onClick={handleAdd}
                className="px-4 py-2 bg-emerald-500 text-white text-sm font-bold rounded-lg hover:bg-emerald-600 transition">
                추가
              </button>
            </div>
            <ul className="space-y-1">
              {state.todos.map(todo => (
                <li key={todo.id} className="flex items-center gap-2 bg-slate-50 rounded-lg px-3 py-2">
                  <button onClick={() => dispatch({ type: 'TOGGLE', payload: todo.id })}
                    className={`w-5 h-5 rounded border-2 flex items-center justify-center text-xs transition ${todo.done ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-300'}`}>
                    {todo.done && '✓'}
                  </button>
                  <span className={`flex-1 text-sm ${todo.done ? 'line-through text-slate-400' : 'text-slate-700'}`}>{todo.text}</span>
                  <button onClick={() => dispatch({ type: 'DELETE', payload: todo.id })}
                    className="text-red-400 hover:text-red-600 text-xs font-bold transition">삭제</button>
                </li>
              ))}
              {state.todos.length === 0 && <li className="text-sm text-slate-400 text-center py-4">할 일이 없습니다</li>}
            </ul>
          </div>
          {state.logs.length > 0 && (
            <div className="bg-slate-900 rounded-xl p-4 border border-slate-700 max-h-32 overflow-y-auto">
              <div className="text-[10px] text-slate-500 font-bold mb-2">DISPATCH 로그</div>
              {state.logs.map((log, i) => (
                <div key={i} className={`text-xs font-mono ${LOG_COLORS[log.type]}`}>
                  [{i + 1}] dispatch({'{ type: "' + log.type + '"' + (log.text ? `, payload: "${log.text}"` : log.id ? `, payload: ${log.id}` : '') + ' }'})
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // --- 선택 가이드 ---
    function GuideDemo() {
      const [answers, setAnswers] = useState([null, null, null]);
      const questions = [
        { q: '상태가 2개 이상의 하위값(객체/배열)을 가지나요?', yes: '복잡', no: '단순' },
        { q: '액션의 종류가 3개 이상인가요?', yes: '많음', no: '적음' },
        { q: '다음 상태가 이전 상태에 의존하나요?', yes: '의존', no: '독립' },
      ];

      const yesCount = answers.filter(a => a === true).length;
      const allAnswered = answers.every(a => a !== null);

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-4 uppercase tracking-wider">의사결정 가이드</div>
          <div className="space-y-3">
            {questions.map((q, i) => (
              <div key={i} className="bg-slate-50 rounded-lg p-3">
                <div className="text-sm text-slate-700 mb-2">{q.q}</div>
                <div className="flex gap-2">
                  <button onClick={() => setAnswers(p => p.map((a, j) => j === i ? true : a))}
                    className={`px-3 py-1 rounded text-xs font-bold transition ${answers[i] === true ? 'bg-violet-500 text-white' : 'bg-white border border-slate-200 text-slate-600'}`}>
                    예
                  </button>
                  <button onClick={() => setAnswers(p => p.map((a, j) => j === i ? false : a))}
                    className={`px-3 py-1 rounded text-xs font-bold transition ${answers[i] === false ? 'bg-sky-500 text-white' : 'bg-white border border-slate-200 text-slate-600'}`}>
                    아니오
                  </button>
                </div>
              </div>
            ))}
          </div>
          {allAnswered && (
            <div className={`mt-4 p-4 rounded-xl border-2 text-center ${yesCount >= 2 ? 'border-violet-300 bg-violet-50' : 'border-sky-300 bg-sky-50'}`}>
              <div className={`text-lg font-bold ${yesCount >= 2 ? 'text-violet-700' : 'text-sky-700'}`}>
                {yesCount >= 2 ? 'useReducer 추천!' : 'useState로 충분!'}
              </div>
              <div className={`text-xs mt-1 ${yesCount >= 2 ? 'text-violet-500' : 'text-sky-500'}`}>
                {yesCount >= 2
                  ? '복잡한 상태 로직을 reducer 한 곳에서 관리하세요.'
                  : '간단한 상태는 useState가 더 직관적입니다.'}
              </div>
            </div>
          )}
          <button onClick={() => setAnswers([null, null, null])}
            className="mt-3 text-xs text-slate-500 underline">다시 하기</button>
        </div>
      );
    }

    // =========================================================
    // 3. 코드 패널
    // =========================================================
    function CodePanel({ code }) {
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-emerald-500"></div>
            </div>
            <span className="text-[10px] text-slate-500 ml-2">UseReducerDemo.jsx</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>

    // =========================================================
    // 4. 메인 App
    // =========================================================
    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => {
        setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      };
      const nextRef = useRef(next);
      nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-emerald-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-500 text-white flex items-center justify-center rounded-full font-bold text-sm select-none">III-B</div>
                <h1 className="text-2xl font-bold text-slate-800">useReducer — dispatch 흐름과 복잡한 상태 관리</h1>
              </div>
              <p className="text-slate-600 text-sm">useState의 대안, useReducer로 복잡한 상태를 체계적으로 관리하는 방법을 학습합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter III-B-6 | ★★☆ | 선수 지식 IV-1-2 | 2026-04-21</p>
            </header>

            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-emerald-500' : 'bg-slate-200'}`}
                  aria-label={`Step ${i + 1}`}
                />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                <CodePanel code={step.code} />
                {step.mode === 'concept' && <ConceptDiagram />}
                {step.mode === 'vs-demo' && <VsDemo />}
                {step.mode === 'reducer-demo' && <ReducerDemo />}
                {step.mode === 'todo-demo' && <TodoDemo />}
                {step.mode === 'guide' && <GuideDemo />}
              </div>

              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-emerald-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>

                <div className="mt-4 bg-emerald-50 border border-emerald-200 rounded-lg p-3">
                  <div className="text-[10px] text-emerald-600 font-bold uppercase mb-1">핵심 포인트</div>
                  <p className="text-xs text-emerald-700">
                    {idx === 0 && 'useReducer는 (state, action) → newState 패턴으로 상태를 관리합니다. Redux와 같은 원리입니다.'}
                    {idx === 1 && '간단한 상태는 useState, 여러 액션이 필요한 복잡한 상태는 useReducer를 선택하세요.'}
                    {idx === 2 && 'reducer는 순수 함수여야 합니다. API 호출, 타이머 등 사이드 이펙트는 reducer 밖에서 처리하세요.'}
                    {idx === 3 && 'dispatch는 "무엇을 했는지(type)"와 "추가 데이터(payload)"를 담은 액션 객체를 보냅니다.'}
                    {idx === 4 && '상태가 객체/배열이고, 업데이트 방법이 3가지 이상이면 useReducer가 코드를 더 깔끔하게 만듭니다.'}
                  </p>
                </div>
              </div>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }}
                disabled={idx === 0}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="이전 단계"
              >&larr; 이전</button>
              <button onClick={() => { if (isEnd) setIdx(0); setIsPlaying(p => !p); }}
                className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${
                  isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-emerald-500 hover:bg-emerald-600 text-white'
                }`}
                aria-label={isPlaying ? '정지' : '자동 실행'}
              >{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }}
                disabled={isEnd}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="다음 단계"
              >다음 &rarr;</button>
            </div>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-21
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
