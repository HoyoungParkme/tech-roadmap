<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>번들러 지도 — Chapter II-1-4</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter II-1-4 — 번들러 지도: Vite / Webpack / esbuild -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1 — 왜 번들러가 필요한가',
        desc: '프론트엔드 코드는 수십~수백 개의 JS 파일로 나뉩니다. 브라우저는 이 파일들을 하나씩 요청해야 해서 느립니다. 번들러는 파일들을 묶어(bundle) 하나 또는 소수의 파일로 만듭니다.',
        visual: 'why',
      },
      {
        title: 'Step 2 — Webpack: 오랜 표준',
        desc: 'Webpack(2014~)은 JS 번들링의 사실상 표준이었습니다. 강력하고 유연하지만, 설정이 복잡하고 프로젝트가 커질수록 빌드가 느려집니다.',
        visual: 'webpack',
      },
      {
        title: 'Step 3 — esbuild: 100배 빠른 빌드',
        desc: 'esbuild(2020)는 Go 언어로 작성되어 Webpack보다 10~100배 빠릅니다. 하지만 기능이 제한적이라 단독으로 쓰기보다 다른 도구의 엔진으로 사용됩니다.',
        visual: 'esbuild',
      },
      {
        title: 'Step 4 — Vite: 속도 + 편의성',
        desc: 'Vite(2021, Evan You)는 개발 중에는 esbuild로 빠르게 변환하고, 프로덕션 빌드에는 Rollup을 사용합니다. React 공식 가이드도 2024년부터 Vite를 권장합니다.',
        visual: 'vite',
      },
      {
        title: 'Step 5 — 번들러 비교 & 선택',
        desc: '새 프로젝트라면 Vite를 선택하세요. 기존 프로젝트가 Webpack이면 무리해서 옮길 필요는 없습니다. 이 학습 자료는 번들러 없이(CDN) 동작하지만, 실무에서는 Vite가 표준입니다.',
        visual: 'comparison',
      },
    ];

    function VisualPanel({ type }) {
      if (type === 'why') {
        return (
          <div className="bg-slate-800 rounded-xl p-5 border border-slate-700">
            <div className="text-xs text-slate-400 uppercase tracking-wider mb-4 font-bold">번들링이 필요한 이유</div>
            <div className="grid grid-cols-2 gap-4">
              <div className="bg-red-900/20 p-3 rounded-lg">
                <div className="text-xs font-bold text-red-400 mb-2">번들링 전</div>
                <div className="space-y-1">
                  {['App.js', 'Header.js', 'Footer.js', 'api.js', 'utils.js', 'Button.js', 'Modal.js', '...50개'].map(f => (
                    <div key={f} className="bg-slate-700 px-2 py-0.5 rounded text-[10px] text-slate-300 font-mono">{f}</div>
                  ))}
                </div>
                <div className="mt-2 text-[10px] text-red-400">50개 HTTP 요청 → 느림!</div>
              </div>
              <div className="bg-emerald-900/20 p-3 rounded-lg">
                <div className="text-xs font-bold text-emerald-400 mb-2">번들링 후</div>
                <div className="space-y-1">
                  <div className="bg-emerald-800 px-2 py-2 rounded text-xs text-emerald-200 font-mono font-bold text-center">bundle.js (합쳐짐)</div>
                  <div className="bg-emerald-800 px-2 py-1 rounded text-[10px] text-emerald-200 font-mono text-center">style.css</div>
                </div>
                <div className="mt-2 text-[10px] text-emerald-400">2개 요청 → 빠름!</div>
              </div>
            </div>
          </div>
        );
      }

      if (type === 'webpack') {
        return (
          <div className="bg-slate-800 rounded-xl p-5 border border-slate-700">
            <div className="text-xs text-slate-400 uppercase tracking-wider mb-4 font-bold">Webpack</div>
            <div className="text-center mb-3"><span className="text-4xl">📦</span></div>
            <div className="grid grid-cols-2 gap-3">
              <div className="bg-emerald-900/20 p-2 rounded text-[11px] text-emerald-300 space-y-1">
                <div className="font-bold">장점</div>
                <div>✓ 풍부한 플러그인</div>
                <div>✓ 코드 스플리팅</div>
                <div>✓ 레거시 호환</div>
              </div>
              <div className="bg-red-900/20 p-2 rounded text-[11px] text-red-300 space-y-1">
                <div className="font-bold">단점</div>
                <div>✗ 설정 복잡</div>
                <div>✗ 느린 빌드</div>
                <div>✗ HMR 느림</div>
              </div>
            </div>
            <div className="mt-3 bg-slate-700/50 rounded p-2 text-[10px] text-slate-300 text-center">빌드 속도: ████████░░ 보통</div>
          </div>
        );
      }

      if (type === 'esbuild') {
        return (
          <div className="bg-slate-800 rounded-xl p-5 border border-slate-700">
            <div className="text-xs text-slate-400 uppercase tracking-wider mb-4 font-bold">esbuild</div>
            <div className="text-center mb-3"><span className="text-4xl">⚡</span></div>
            <div className="grid grid-cols-2 gap-3">
              <div className="bg-emerald-900/20 p-2 rounded text-[11px] text-emerald-300 space-y-1">
                <div className="font-bold">장점</div>
                <div>✓ Go 언어 → 극강 속도</div>
                <div>✓ 10~100배 빠름</div>
                <div>✓ 설정 간단</div>
              </div>
              <div className="bg-red-900/20 p-2 rounded text-[11px] text-red-300 space-y-1">
                <div className="font-bold">단점</div>
                <div>✗ 플러그인 제한적</div>
                <div>✗ CSS 모듈 미지원</div>
                <div>✗ 단독 사용 어려움</div>
              </div>
            </div>
            <div className="mt-3 bg-emerald-700/30 rounded p-2 text-[10px] text-emerald-300 text-center">빌드 속도: ██████████ 초고속!</div>
          </div>
        );
      }

      if (type === 'vite') {
        return (
          <div className="bg-slate-800 rounded-xl p-5 border border-slate-700">
            <div className="text-xs text-slate-400 uppercase tracking-wider mb-4 font-bold">Vite (현재 표준)</div>
            <div className="text-center mb-3"><span className="text-4xl">🚀</span></div>
            <div className="bg-sky-900/20 p-3 rounded-lg mb-3">
              <div className="text-xs text-sky-300 space-y-2">
                <div className="flex items-center gap-2"><span className="bg-sky-700 px-2 py-0.5 rounded text-[10px]">개발</span> esbuild 엔진 → 즉시 변환</div>
                <div className="flex items-center gap-2"><span className="bg-violet-700 px-2 py-0.5 rounded text-[10px]">빌드</span> Rollup 엔진 → 최적화 번들</div>
                <div className="flex items-center gap-2"><span className="bg-emerald-700 px-2 py-0.5 rounded text-[10px]">HMR</span> 파일 저장 → 즉시 반영</div>
              </div>
            </div>
            <div className="text-center text-[11px] text-sky-300 font-bold">React 공식 권장 (2024~)</div>
          </div>
        );
      }

      // comparison
      return (
        <div className="bg-slate-800 rounded-xl p-5 border border-slate-700">
          <div className="text-xs text-slate-400 uppercase tracking-wider mb-4 font-bold">번들러 비교</div>
          <table className="w-full text-[11px]">
            <thead><tr className="text-slate-400 border-b border-slate-600">
              <th className="py-1 text-left">항목</th><th>Webpack</th><th>esbuild</th><th className="text-sky-400">Vite</th>
            </tr></thead>
            <tbody className="text-slate-300">
              <tr className="border-b border-slate-700"><td className="py-1.5 font-bold">속도</td><td className="text-center">보통</td><td className="text-center">초고속</td><td className="text-center text-sky-300">빠름</td></tr>
              <tr className="border-b border-slate-700"><td className="py-1.5 font-bold">설정</td><td className="text-center">복잡</td><td className="text-center">간단</td><td className="text-center text-sky-300">간단</td></tr>
              <tr className="border-b border-slate-700"><td className="py-1.5 font-bold">생태계</td><td className="text-center">풍부</td><td className="text-center">제한적</td><td className="text-center text-sky-300">성장 중</td></tr>
              <tr className="border-b border-slate-700"><td className="py-1.5 font-bold">권장</td><td className="text-center">기존 프로젝트</td><td className="text-center">엔진 역할</td><td className="text-center text-sky-300 font-bold">새 프로젝트</td></tr>
            </tbody>
          </table>
        </div>
      );
    }

    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => {
        setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      };
      const nextRef = useRef(next);
      nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 3500); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">II</div>
                <h1 className="text-2xl font-bold text-slate-800">번들러 지도 — Vite / Webpack / esbuild</h1>
              </div>
              <p className="text-slate-600 text-sm">번들러가 왜 필요하고, 어떤 것을 선택해야 하는지 비교합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter II-1-4 | ★★☆ | 선수 지식 II-1-3 | 2026-04-20</p>
            </header>

            <div className="bg-violet-600 text-white p-5 rounded-xl shadow-sm">
              <div className="text-xs font-bold text-violet-200 mb-1 uppercase tracking-wider">{step.title}</div>
              <p className="text-base font-medium leading-relaxed">{step.desc}</p>
            </div>

            <VisualPanel type={step.visual} />

            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex items-center justify-between">
              <div className="flex items-center space-x-2">
                <button onClick={() => { if(idx>0){setIdx(p=>p-1);setIsPlaying(false);} }} disabled={idx===0} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                <button onClick={() => { if(isEnd) setIdx(0); setIsPlaying(p=>!p); }} className="px-4 py-2 rounded bg-violet-600 hover:bg-violet-700 text-white font-medium transition w-32 text-center">{isPlaying ? '정지' : '자동 실행'}</button>
                <button onClick={() => { next(); setIsPlaying(false); }} disabled={isEnd} className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 transition"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">Step {idx+1} / {STEPS.length}</div>
            </div>

            <div className="bg-white border border-slate-200 rounded-xl p-4 text-xs text-slate-500 space-y-1">
              <div className="font-bold text-slate-700 mb-2">기술 참고</div>
              <div><b>HMR (Hot Module Replacement)</b>: 코드 변경 시 전체 새로고침 없이 변경 모듈만 교체. Vite의 HMR은 거의 즉시 반영된다.</div>
              <div><b>코드 스플리팅</b>: 번들을 페이지별로 나눠 필요할 때만 로드. 초기 로딩 속도를 개선한다.</div>
              <div><b>이 학습 자료</b>: CDN으로 React를 직접 로드하므로 번들러가 없다. 실무에서는 반드시 Vite/Webpack을 사용한다.</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
