  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // =========================================================
    // 1. STEPS 정의 — CSS 스타일링 핵심 5단계
    // =========================================================
    const STEPS = [
      {
        id: 'step-inline',
        title: 'Step 1 — 인라인 스타일',
        desc: 'React에서 가장 기본적인 스타일링 방법입니다. style 속성에 JavaScript 객체를 전달합니다. CSS 속성명은 camelCase로 작성합니다 (background-color → backgroundColor). 간단한 동적 스타일에 적합하지만, hover나 미디어 쿼리를 쓸 수 없는 한계가 있습니다.',
        code: '// 인라인 스타일 — JS 객체로 작성\nfunction Card() {\n  const cardStyle = {\n    backgroundColor: "#f0f9ff",\n    border: "2px solid #0ea5e9",\n    borderRadius: "12px",\n    padding: "16px",\n    // camelCase 주의!\n    // background-color ✕\n    // backgroundColor  ✓\n  };\n\n  return (\n    <div style={cardStyle}>\n      <h3 style={{ fontSize: "18px",\n        fontWeight: "bold" }}>\n        인라인 스타일 카드\n      </h3>\n    </div>\n  );\n}',

      {

        code: '/* Button.module.css */\n.button {\n  background: #0ea5e9;\n  color: white;\n  padding: 8px 16px;\n  border-radius: 8px;\n}\n.button:hover {\n  background: #0284c7;\n}\n\n// Button.jsx\nimport styles from "./Button.module.css";\n\nfunction Button() {\n  return (\n    <button className={styles.button}>\n      CSS Modules 버튼\n    </button>\n  );\n}\n// 실제 클래스: .Button_button_x7k2z',
        mode: 'modules-demo',
      },
      {
        id: 'step-styled',
        title: 'Step 3 — Styled Components',
        desc: 'CSS-in-JS 라이브러리로, JavaScript 안에서 CSS를 작성합니다. 템플릿 리터럴로 스타일을 정의하고, props를 받아 동적으로 변경할 수 있습니다. hover, 미디어 쿼리도 지원합니다. (CDN 환경에서는 시뮬레이션)',
        code: '// styled-components 방식\nimport styled from "styled-components";\n\nconst Button = styled.button`\n  background: ${props =>\n    props.primary ? "#0ea5e9" : "#e2e8f0"\n  };\n  color: ${props =>\n    props.primary ? "white" : "#334155"\n  };\n  padding: 8px 16px;\n  border-radius: 8px;\n  border: none;\n\n  &:hover {\n    opacity: 0.9;\n  }\n`;\n\n// 사용\n<Button primary>Primary</Button>\n<Button>Secondary</Button>',

        '#ecfdf5': 'bg-emerald-100 text-emerald-700',
        '#f5f3ff': 'bg-violet-100 text-violet-700',

      };

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">

                    className={`px-2 py-1 rounded text-[10px] font-bold transition ${bg === c.value ? COLOR_CLASSES[c.value] : 'bg-slate-50 text-slate-500'}`}>
                    {c.label}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <label className="text-[10px] text-slate-500 block mb-1">borderRadius: {radius}px</label>
              <input type="range" min="0" max="30" value={radius}
                onChange={e => setRadius(Number(e.target.value))}
                className="w-full" />
            </div>
            <div>
              <label className="text-[10px] text-slate-500 block mb-1">fontSize: {fontSize}px</label>
              <input type="range" min="12" max="28" value={fontSize}
                onChange={e => setFontSize(Number(e.target.value))}
                className="w-full" />

          </div>

          </div>

    // --- CSS Modules 시뮬레이션 ---

      const modules = [
        { file: 'Header.module.css', className: '.title', hash: 'Header_title_a3x9k', style: { fontSize: '20px', fontWeight: 'bold', color: '#1e40af' } },

    // --- Styled Components 시뮬레이션 ---
    function StyledDemo() {
      const [variant, setVariant] = useState('primary');

      const VARIANT_STYLES = {
        primary: { bg: '#0ea5e9', color: 'white', label: 'Primary' },
        secondary: { bg: '#e2e8f0', color: '#334155', label: 'Secondary' },

        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Styled Components 시뮬레이션</div>
          <div className="flex gap-2 mb-4">

\`;`}</pre>

          </div>

      );
    }

    // --- Tailwind 인터랙티브 데모 ---
    function TailwindDemo() {
      const [classes, setClasses] = useState(['bg-sky-50', 'border-2', 'border-sky-300', 'rounded-xl', 'p-4']);
      const allClasses = [
        { group: '배경', options: ['bg-sky-50', 'bg-emerald-50', 'bg-violet-50', 'bg-rose-50'] },
        { group: '테두리', options: ['border-2', 'border-4', 'border-0'] },
        { group: '테두리색', options: ['border-sky-300', 'border-emerald-300', 'border-violet-300', 'border-rose-300'] },
        { group: '모서리', options: ['rounded-none', 'rounded-lg', 'rounded-xl', 'rounded-3xl'] },
        { group: '패딩', options: ['p-2', 'p-4', 'p-6', 'p-8'] },
        { group: '그림자', options: ['shadow-none', 'shadow-sm', 'shadow-md', 'shadow-lg'] },
      ];

      const toggleClass = (group, cls) => {
        setClasses(prev => {
          const groupOptions = allClasses.find(g => g.group === group).options;
          const filtered = prev.filter(c => !groupOptions.includes(c));
          return [...filtered, cls];
        });
      };

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Tailwind 실시간 편집기</div>
          <div className="space-y-2 mb-4">
            {allClasses.map(group => (
              <div key={group.group} className="flex items-center gap-1">
                <span className="text-[10px] text-slate-500 w-14 shrink-0">{group.group}</span>
                <div className="flex gap-1 flex-wrap">
                  {group.options.map(cls => (
                    <button key={cls} onClick={() => toggleClass(group.group, cls)}
                      className={`px-1.5 py-0.5 rounded text-[9px] font-mono transition ${classes.includes(cls) ? 'bg-emerald-500 text-white' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}>
                      {cls}
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </div>
          <div className={classes.join(' ') + ' transition-all duration-300'}>
            <h3 className="text-lg font-bold text-slate-800">Tailwind 카드</h3>
            <p className="text-sm text-slate-600 mt-1">유틸리티 클래스만으로 완성!</p>
          </div>
          <div className="mt-3 bg-slate-900 rounded-lg p-2">
            <code className="text-[10px] font-mono text-emerald-400">className="{classes.join(' ')}"</code>
          </div>
        </div>
      );
    }

    // =========================================================
    // 4. 메인 App
    // =========================================================
    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => {
        setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      };
      const nextRef = useRef(next);
      nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-emerald-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-500 text-white flex items-center justify-center rounded-full font-bold text-sm select-none">III-B</div>
                <h1 className="text-2xl font-bold text-slate-800">CSS 스타일링 비교 — 4가지 방식</h1>
              </div>
              <p className="text-slate-600 text-sm">인라인·CSS Modules·Styled Components·Tailwind — 같은 UI를 4가지로 스타일링하는 방법을 비교합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter III-B-8 | ★★☆ | 선수 지식 III-1-3 | 2026-04-21</p>
            </header>

            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-emerald-500' : 'bg-slate-200'}`}
                  aria-label={`Step ${i + 1}`}
                />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                <CodePanel code={step.code} />
                {step.mode === 'inline-demo' && <InlineDemo />}
                {step.mode === 'modules-demo' && <ModulesDemo />}
                {step.mode === 'styled-demo' && <StyledDemo />}
                {step.mode === 'tailwind-demo' && <TailwindDemo />}
                {step.mode === 'comparison' && <ComparisonDemo />}
              </div>

              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-emerald-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>

                <div className="mt-4 bg-emerald-50 border border-emerald-200 rounded-lg p-3">
                  <div className="text-[10px] text-emerald-600 font-bold uppercase mb-1">핵심 포인트</div>
                  <p className="text-xs text-emerald-700">
                    {idx === 0 && 'style={{}} 안에 JS 객체를 전달합니다. CSS 속성명은 camelCase로 작성하세요 (font-size → fontSize).'}
                    {idx === 1 && 'CSS Modules는 클래스명에 자동 해시를 붙여 충돌을 방지합니다. .module.css 확장자가 핵심!'}
                    {idx === 2 && 'Styled Components는 CSS-in-JS 방식으로, props에 따라 스타일을 동적으로 변경할 수 있습니다.'}
                    {idx === 3 && 'Tailwind는 "유틸리티 클래스 조합"이라는 다른 사고 방식을 요구합니다. 익숙해지면 가장 빠릅니다.'}
                    {idx === 4 && '정답은 없습니다. 팀 상황, 프로젝트 규모, 기존 CSS 자산에 따라 선택하세요.'}
                  </p>
                </div>
              </div>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }}
                disabled={idx === 0}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="이전 단계"
              >&larr; 이전</button>
              <button onClick={() => { if (isEnd) setIdx(0); setIsPlaying(p => !p); }}
                className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${
                  isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-emerald-500 hover:bg-emerald-600 text-white'
                }`}
                aria-label={isPlaying ? '정지' : '자동 실행'}
              >{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }}
                disabled={isEnd}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="다음 단계"
              >다음 &rarr;</button>
            </div>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-21
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
