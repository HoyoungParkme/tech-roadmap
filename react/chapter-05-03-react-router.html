<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React Router — 클라이언트 사이드 라우팅 — Chapter V-1-3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter V-1-3 — React Router: 클라이언트 사이드 라우팅 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1 — 서버 vs 클라이언트 라우팅',
        desc: '전통적 웹(MPA)은 URL이 바뀔 때마다 서버에 요청해 새 HTML을 받습니다. SPA에서는 브라우저의 History API를 이용해 서버 요청 없이 JS로 화면을 전환합니다. 이것이 "클라이언트 사이드 라우팅"입니다.',
        code: '// 서버 라우팅 (MPA)\n// /about → 서버가 about.html 전송\n// /products → 서버가 products.html 전송\n// 매번 전체 페이지 새로 로드 (깜빡임)\n\n// 클라이언트 라우팅 (SPA)\n// /about → JS가 About 컴포넌트 렌더링\n// /products → JS가 Products 컴포넌트 렌더링\n// 페이지 새로 로드 없음 (부드러운 전환)',
        visual: 'comparison',
      },
      {
        title: 'Step 2 — React Router 기본 구조',
        desc: 'React Router v6는 BrowserRouter(라우터 감싸기), Routes(경로 목록), Route(URL↔컴포넌트 매핑) 3가지 컴포넌트로 구성됩니다. URL이 바뀌면 매칭되는 Route의 컴포넌트만 렌더링됩니다.',
        code: 'import { BrowserRouter, Routes, Route } from "react-router-dom";\n\nfunction App() {\n  return (\n    <BrowserRouter>\n      <Routes>\n        <Route path="/" element={<Home />} />\n        <Route path="/about" element={<About />} />\n        <Route path="/products" element={<Products />} />\n        <Route path="/products/:id" element={<ProductDetail />} />\n        <Route path="*" element={<NotFound />} />\n      </Routes>\n    </BrowserRouter>\n  );\n}',
        visual: 'structure',
      },
      {
        title: 'Step 3 — 중첩 라우트 + Outlet',
        desc: '중첩 라우트(Nested Routes)를 사용하면 공통 레이아웃(헤더, 사이드바)을 공유하면서 내용만 바꿀 수 있습니다. 부모 Route의 element에 <Outlet />을 두면, 자식 Route가 그 자리에 렌더링됩니다.',
        code: '// 레이아웃 공유\n<Route path="/" element={<Layout />}>\n  <Route index element={<Home />} />\n  <Route path="about" element={<About />} />\n  <Route path="products" element={<Products />} />\n</Route>\n\n// Layout 컴포넌트\nfunction Layout() {\n  return (\n    <div>\n      <Header />        ← 모든 페이지에 공통\n      <Outlet />         ← 여기에 자식 Route 렌더링!\n      <Footer />        ← 모든 페이지에 공통\n    </div>\n  );\n}',
        visual: 'nested',
      },
      {
        title: 'Step 4 — useNavigate + useParams',
        desc: 'useNavigate()로 코드에서 페이지를 이동하고, useParams()로 URL 파라미터를 읽습니다. Link 컴포넌트는 <a> 태그 대신 사용합니다.',
        code: '// 프로그래밍 방식 이동\nfunction LoginButton() {\n  const navigate = useNavigate();\n  const handleLogin = () => {\n    // 로그인 성공 후 홈으로 이동\n    navigate("/");\n  };\n  return <button onClick={handleLogin}>로그인</button>;\n}\n\n// URL 파라미터 읽기\n// /products/42 → id = "42"\nfunction ProductDetail() {\n  const { id } = useParams();\n  return <h1>상품 #{id}</h1>;\n}\n\n// Link 컴포넌트\n<Link to="/about">소개</Link>  // <a href="/about"> 대신',
        visual: 'hooks',
      },
      {
        title: 'Step 5 — 미니 라우터 시뮬레이터',
        desc: 'URL을 클릭하면 매칭되는 컴포넌트가 바뀝니다. 실제 React Router는 History API를 사용하지만, 원리는 동일합니다 — URL 패턴과 컴포넌트를 매핑하고, URL이 바뀌면 해당 컴포넌트를 렌더링합니다.',
        code: null,
        visual: 'simulator',
      },
    ];

    function ComparisonVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">서버 vs 클라이언트 라우팅</div>
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-red-50 border border-red-200 rounded-lg p-3">
              <div className="text-[10px] font-bold text-red-600 mb-2">서버 라우팅 (MPA)</div>
              <div className="space-y-1 text-[10px]">
                <div className="flex items-center gap-1"><span className="text-red-400">🌐</span><span className="text-slate-600">URL 변경</span></div>
                <div className="flex items-center gap-1"><span className="text-red-400">📡</span><span className="text-slate-600">서버에 요청</span></div>
                <div className="flex items-center gap-1"><span className="text-red-400">📄</span><span className="text-slate-600">새 HTML 수신</span></div>
                <div className="flex items-center gap-1"><span className="text-red-400">⚡</span><span className="text-slate-600">전체 페이지 새로고침</span></div>
              </div>
            </div>
            <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3">
              <div className="text-[10px] font-bold text-emerald-600 mb-2">클라이언트 라우팅 (SPA)</div>
              <div className="space-y-1 text-[10px]">
                <div className="flex items-center gap-1"><span className="text-emerald-400">🌐</span><span className="text-slate-600">URL 변경</span></div>
                <div className="flex items-center gap-1"><span className="text-emerald-400">⚛️</span><span className="text-slate-600">JS가 매칭 확인</span></div>
                <div className="flex items-center gap-1"><span className="text-emerald-400">🔄</span><span className="text-slate-600">컴포넌트만 교체</span></div>
                <div className="flex items-center gap-1"><span className="text-emerald-400">✨</span><span className="text-slate-600">부드러운 전환!</span></div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function StructureVisual() {
      const routes = [
        { path: '/', component: '<Home />', desc: '메인 페이지' },
        { path: '/about', component: '<About />', desc: '소개 페이지' },
        { path: '/products', component: '<Products />', desc: '상품 목록' },
        { path: '/products/:id', component: '<ProductDetail />', desc: '상품 상세' },
        { path: '*', component: '<NotFound />', desc: '404 페이지' },
      ];
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">URL ↔ 컴포넌트 매핑</div>
          <div className="space-y-1.5">
            {routes.map((r) => (
              <div key={r.path} className="flex items-center gap-2 bg-slate-50 rounded-lg px-3 py-1.5">
                <span className="text-xs font-mono text-indigo-600 font-bold min-w-[120px]">{r.path}</span>
                <span className="text-slate-300">→</span>
                <span className="text-xs font-mono text-emerald-600">{r.component}</span>
                <span className="text-[10px] text-slate-400 ml-auto">{r.desc}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function NestedVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">중첩 라우트 구조</div>
          <div className="border-2 border-indigo-300 rounded-xl overflow-hidden">
            <div className="bg-indigo-100 px-4 py-2 text-xs font-bold text-indigo-700">Header (공통)</div>
            <div className="p-4 bg-white min-h-[60px] flex items-center justify-center border-y-2 border-dashed border-indigo-200">
              <div className="text-sm text-indigo-600 font-bold">{'<Outlet />'} — 여기에 자식 Route 렌더링</div>
            </div>
            <div className="bg-indigo-100 px-4 py-2 text-xs font-bold text-indigo-700">Footer (공통)</div>
          </div>
          <div className="mt-2 flex gap-2 justify-center">
            {['Home', 'About', 'Products'].map((name) => (
              <span key={name} className="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-bold">{name}</span>
            ))}
          </div>
          <div className="text-center text-[10px] text-slate-500 mt-1">↑ Outlet 자리에 번갈아 렌더링</div>
        </div>
      );
    }

    function HooksVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">React Router Hooks</div>
          <div className="space-y-2">
            {[
              { name: 'useNavigate()', desc: '코드에서 페이지 이동', example: 'navigate("/home")' },
              { name: 'useParams()', desc: 'URL 파라미터 읽기', example: '{ id } = useParams()' },
              { name: 'useLocation()', desc: '현재 URL 정보', example: '{ pathname, search }' },
              { name: '<Link to="...">', desc: '<a> 태그 대체', example: '<Link to="/about">' },
            ].map((h) => (
              <div key={h.name} className="flex items-center gap-3 bg-slate-50 rounded-lg px-3 py-2">
                <span className="text-xs font-mono text-indigo-600 font-bold min-w-[130px]">{h.name}</span>
                <span className="text-[10px] text-slate-600 flex-1">{h.desc}</span>
                <span className="text-[9px] font-mono text-slate-400">{h.example}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function SimulatorVisual() {
      const [currentPath, setCurrentPath] = useState('/');
      const routes = [
        { path: '/', label: '홈', content: '🏠 메인 페이지입니다. React로 만든 SPA!' },
        { path: '/about', label: '소개', content: '📋 이 사이트는 React Router 데모입니다.' },
        { path: '/products', label: '상품', content: '🛍️ 상품 목록: React 책, Hooks 가이드, TypeScript 입문' },
        { path: '/contact', label: '연락', content: '📧 이메일: hello@react-demo.com' },
      ];
      const matched = routes.find(r => r.path === currentPath);

      return (
        <div className="space-y-3">
          <div className="bg-slate-900 rounded-xl overflow-hidden border border-slate-700">
            <div className="bg-slate-800 px-3 py-2 flex items-center gap-2">
              <div className="flex gap-1"><div className="w-2.5 h-2.5 rounded-full bg-red-500"></div><div className="w-2.5 h-2.5 rounded-full bg-yellow-500"></div><div className="w-2.5 h-2.5 rounded-full bg-emerald-500"></div></div>
              <div className="bg-slate-700 rounded px-2 py-0.5 text-[10px] text-slate-300 flex-1 font-mono">
                localhost:3000{currentPath}
              </div>
            </div>
            <div className="bg-white">
              <div className="flex border-b">
                {routes.map((r) => (
                  <button key={r.path} onClick={() => setCurrentPath(r.path)}
                    className={`flex-1 text-xs py-2 transition font-bold ${
                      currentPath === r.path ? 'bg-indigo-50 text-indigo-700 border-b-2 border-indigo-500' : 'text-slate-500 hover:bg-slate-50'
                    }`}>{r.label}</button>
                ))}
              </div>
              <div className="p-4 min-h-[80px]">
                <div className="text-sm text-slate-700">{matched ? matched.content : '404 — 페이지를 찾을 수 없습니다'}</div>
              </div>
            </div>
          </div>
          <div className="text-center text-[10px] text-slate-500">
            탭을 클릭하면 URL이 바뀌고, 매칭되는 컴포넌트가 렌더링됩니다 (페이지 새로고침 없음!)
          </div>
        </div>
      );
    }

    function CodePanel({ code }) {
      if (!code) return null;
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5"><div className="w-3 h-3 rounded-full bg-red-500"></div><div className="w-3 h-3 rounded-full bg-yellow-500"></div><div className="w-3 h-3 rounded-full bg-emerald-500"></div></div>
            <span className="text-[10px] text-slate-500 ml-2">App.jsx</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => { setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; }); };
      const nextRef = useRef(next); nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const VISUAL_MAP = { comparison: ComparisonVisual, structure: StructureVisual, nested: NestedVisual, hooks: HooksVisual, simulator: SimulatorVisual };
      const VisualComponent = VISUAL_MAP[step.visual];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-indigo-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">V</div>
                <h1 className="text-2xl font-bold text-slate-800">React Router — 클라이언트 사이드 라우팅</h1>
              </div>
              <p className="text-slate-600 text-sm">URL과 컴포넌트를 매핑하는 <b>React Router v6</b>를 시각화하고, 미니 라우터를 체험합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter V-1-3 | ★★★ | 선수 지식 V-1-2 | 2026-04-21</p>
            </header>

            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.title} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-indigo-500' : 'bg-slate-200'}`} aria-label={`Step ${i + 1}`} />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                <CodePanel code={step.code} />
                {VisualComponent && <VisualComponent />}
              </div>
              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-indigo-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>
              </div>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }} disabled={idx === 0} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="이전 단계">← 이전</button>
              <button onClick={() => { if (isEnd) { setIdx(0); } setIsPlaying(p => !p); }} className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-indigo-500 hover:bg-indigo-600 text-white'}`} aria-label={isPlaying ? '정지' : '자동 실행'}>{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }} disabled={isEnd} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="다음 단계">다음 →</button>
            </div>
            <footer className="text-center text-xs text-slate-400 pb-4">React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-21</footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
