<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>에러 경계와 로딩 상태 처리 — Chapter VI-1-4</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter VI-1-4 — 에러 경계와 로딩 상태 처리 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1 — 에러가 전체 앱을 멈추는 문제',
        desc: 'React 컴포넌트에서 에러가 발생하면 전체 컴포넌트 트리가 언마운트되어 흰 화면이 됩니다. 하나의 작은 컴포넌트 버그가 앱 전체를 멈추는 것은 사용자 경험에 치명적입니다.',
        code: '// 하나의 컴포넌트에서 에러 발생\nfunction BuggyWidget() {\n  // undefined.map() → TypeError!\n  const data = undefined;\n  return <ul>{data.map(x => <li>{x}</li>)}</ul>;\n}\n\n// 결과: 전체 앱이 흰 화면으로!\n// Header, Sidebar, 다른 모든 컴포넌트도 사라짐\n<App>\n  <Header />      ← 사라짐!\n  <BuggyWidget /> ← 에러 발생\n  <Footer />      ← 사라짐!',
        visual: 'crash',
      },
      {
        title: 'Step 2 — Error Boundary',
        desc: 'Error Boundary는 하위 컴포넌트의 에러를 잡아서 대체 UI를 보여주는 특수 컴포넌트입니다. try/catch의 React 버전입니다. 현재 Class 컴포넌트로만 구현할 수 있습니다 (함수형 Hook 미지원).',
        code: 'class ErrorBoundary extends React.Component {\n  state = { hasError: false, error: null };\n\n  static getDerivedStateFromError(error) {\n    return { hasError: true, error };\n  }\n\n  render() {\n    if (this.state.hasError) {\n      return (\n        <div className="error-fallback">\n          <h2>문제가 발생했습니다</h2>\n          <p>{this.state.error?.message}</p>\n          <button onClick={() => this.setState({ hasError: false })}>\n            다시 시도\n          </button>\n        </div>\n      );\n    }\n    return this.props.children;\n  }\n}',
        visual: 'boundary',
      },
      {
        title: 'Step 3 — Suspense로 로딩 처리',
        desc: 'React 18의 Suspense는 비동기 작업이 완료될 때까지 fallback UI를 보여줍니다. 데이터 로딩 중 스피너나 스켈레톤을 표시하는 공식 패턴입니다.',
        code: 'import { Suspense, lazy } from "react";\n\n// lazy로 코드 분할\nconst Dashboard = lazy(() => import("./Dashboard"));\n\nfunction App() {\n  return (\n    <Suspense fallback={<LoadingSpinner />}>\n      <Dashboard />\n    </Suspense>\n  );\n}\n\nfunction LoadingSpinner() {\n  return (\n    <div className="flex items-center justify-center h-40">\n      <div className="animate-spin w-8 h-8 border-4\n        border-blue-500 border-t-transparent rounded-full" />\n    </div>\n  );\n}',
        visual: 'suspense',
      },
      {
        title: 'Step 4 — 로딩 스켈레톤',
        desc: '스켈레톤(Skeleton)은 콘텐츠의 레이아웃을 미리 그려놓은 빈 껍데기입니다. 흰 화면이나 스피너보다 사용자가 "곧 콘텐츠가 나타날 것"을 직관적으로 예상할 수 있어 체감 속도를 높입니다.',
        code: '// 스켈레톤 컴포넌트\nfunction CardSkeleton() {\n  return (\n    <div className="animate-pulse">\n      <div className="h-4 bg-gray-200 rounded w-3/4 mb-2" />\n      <div className="h-3 bg-gray-200 rounded w-1/2 mb-4" />\n      <div className="h-20 bg-gray-200 rounded" />\n    </div>\n  );\n}\n\n// 사용\nfunction CardList() {\n  const { data, isLoading } = useQuery(...);\n  if (isLoading) return <CardSkeleton />;\n  return <Card data={data} />;\n}',
        visual: 'skeleton',
      },
      {
        title: 'Step 5 — 조합 패턴',
        desc: 'Error Boundary + Suspense를 조합하면 에러와 로딩을 모두 우아하게 처리할 수 있습니다. Error Boundary가 Suspense를 감싸면, 로딩 중 에러가 발생해도 전체 앱이 멈추지 않습니다.',
        code: '// Error Boundary + Suspense 조합\n<ErrorBoundary fallback={<ErrorFallback />}>\n  <Suspense fallback={<Skeleton />}>\n    <AsyncComponent />\n  </Suspense>\n</ErrorBoundary>\n\n// 결과:\n// 1. 로딩 중 → Skeleton 표시\n// 2. 로딩 완료 → AsyncComponent 표시\n// 3. 에러 발생 → ErrorFallback 표시\n// 4. 나머지 앱은 정상 동작!',
        visual: 'combined',
      },
    ];

    function CrashVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">에러 → 전체 앱 멈춤</div>
          <div className="border-2 border-red-300 rounded-xl overflow-hidden">
            <div className="bg-red-100 px-3 py-1.5 text-[10px] font-bold text-red-600">App (전체 앱)</div>
            <div className="p-3 bg-red-50 text-center space-y-2">
              <div className="bg-slate-200 rounded px-2 py-1 text-[10px] text-slate-400 line-through">Header ← 사라짐</div>
              <div className="bg-red-200 border-2 border-red-400 rounded px-2 py-2 text-[10px] text-red-700 font-bold">BuggyWidget — TypeError! 💥</div>
              <div className="bg-slate-200 rounded px-2 py-1 text-[10px] text-slate-400 line-through">Footer ← 사라짐</div>
            </div>
          </div>
          <div className="mt-2 text-center text-[10px] text-red-500 font-bold">결과: 흰 화면 😱</div>
        </div>
      );
    }

    function BoundaryVisual() {
      const [hasError, setHasError] = useState(false);
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Error Boundary 동작</div>
          <div className="border-2 border-emerald-300 rounded-xl overflow-hidden">
            <div className="bg-emerald-100 px-3 py-1.5 text-[10px] font-bold text-emerald-600">App</div>
            <div className="p-2 space-y-1.5">
              <div className="bg-slate-50 rounded px-2 py-1 text-[10px] text-slate-600">Header ← 정상!</div>
              <div className="border-2 border-dashed border-rose-300 rounded-lg p-2">
                <div className="text-[9px] font-bold text-rose-500 mb-1">ErrorBoundary</div>
                {hasError ? (
                  <div className="bg-rose-50 rounded px-2 py-2 text-center">
                    <div className="text-[10px] text-rose-600 font-bold">대체 UI 표시</div>
                    <button onClick={() => setHasError(false)} className="mt-1 text-[9px] text-rose-500 underline">복구</button>
                  </div>
                ) : (
                  <div className="bg-emerald-50 rounded px-2 py-1 text-[10px] text-emerald-600 flex items-center justify-between">
                    <span>Widget — 정상 동작 중</span>
                    <button onClick={() => setHasError(true)} className="bg-red-500 text-white text-[8px] px-1.5 py-0.5 rounded font-bold">에러 발생!</button>
                  </div>
                )}
              </div>
              <div className="bg-slate-50 rounded px-2 py-1 text-[10px] text-slate-600">Footer ← 정상!</div>
            </div>
          </div>
        </div>
      );
    }

    function SuspenseVisual() {
      const [loading, setLoading] = useState(true);
      useEffect(() => {
        const timer = setInterval(() => setLoading(p => !p), 2000);
        return () => clearInterval(timer);
      }, []);
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Suspense 동작</div>
          <div className="border-2 border-sky-300 rounded-xl overflow-hidden">
            <div className="bg-sky-100 px-3 py-1.5 text-[10px] font-bold text-sky-600">{'<Suspense fallback={<Spinner />}>'}</div>
            <div className="p-4">
              {loading ? (
                <div className="flex items-center justify-center gap-2">
                  <div className="w-5 h-5 border-2 border-sky-500 border-t-transparent rounded-full animate-spin"></div>
                  <span className="text-sm text-sky-600">로딩 중...</span>
                </div>
              ) : (
                <div className="text-center">
                  <div className="text-sm font-bold text-emerald-700">Dashboard 로드 완료!</div>
                  <div className="text-xs text-slate-500 mt-1">비동기 컴포넌트가 표시됨</div>
                </div>
              )}
            </div>
          </div>
          <div className="mt-2 text-center text-[10px] text-slate-500">{loading ? 'fallback UI 표시 중...' : '컴포넌트 렌더링 완료!'}</div>
        </div>
      );
    }

    function SkeletonVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">스켈레톤 vs 스피너</div>
          <div className="grid grid-cols-2 gap-3">
            <div className="border border-slate-200 rounded-lg p-3">
              <div className="text-[10px] font-bold text-slate-500 mb-2">스피너</div>
              <div className="flex items-center justify-center h-20">
                <div className="w-6 h-6 border-2 border-sky-500 border-t-transparent rounded-full animate-spin"></div>
              </div>
              <div className="text-[9px] text-slate-400 text-center mt-1">레이아웃 정보 없음</div>
            </div>
            <div className="border border-slate-200 rounded-lg p-3">
              <div className="text-[10px] font-bold text-slate-500 mb-2">스켈레톤</div>
              <div className="animate-pulse space-y-2">
                <div className="h-3 bg-slate-200 rounded w-3/4"></div>
                <div className="h-2 bg-slate-200 rounded w-1/2"></div>
                <div className="h-12 bg-slate-200 rounded"></div>
              </div>
              <div className="text-[9px] text-emerald-500 text-center mt-1">레이아웃 미리보기!</div>
            </div>
          </div>
        </div>
      );
    }

    function CombinedVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">조합 패턴 구조</div>
          <div className="border-2 border-rose-300 rounded-xl p-2">
            <div className="text-[9px] font-bold text-rose-500 mb-1">ErrorBoundary</div>
            <div className="border-2 border-sky-300 rounded-lg p-2 ml-2">
              <div className="text-[9px] font-bold text-sky-500 mb-1">Suspense</div>
              <div className="bg-emerald-50 border border-emerald-200 rounded p-2 ml-2 text-[10px] text-emerald-700">
                AsyncComponent
              </div>
            </div>
          </div>
          <div className="mt-3 space-y-1">
            {[
              { state: '로딩 중', result: 'Skeleton/Spinner (Suspense fallback)', color: 'text-sky-600' },
              { state: '로딩 완료', result: 'AsyncComponent 렌더링', color: 'text-emerald-600' },
              { state: '에러 발생', result: 'ErrorFallback (Error Boundary)', color: 'text-rose-600' },
            ].map((item) => (
              <div key={item.state} className="flex items-center gap-2 text-[10px]">
                <span className={`font-bold ${item.color} min-w-[60px]`}>{item.state}</span>
                <span className="text-slate-400">→</span>
                <span className="text-slate-600">{item.result}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function CodePanel({ code }) {
      if (!code) return null;
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5"><div className="w-3 h-3 rounded-full bg-red-500"></div><div className="w-3 h-3 rounded-full bg-yellow-500"></div><div className="w-3 h-3 rounded-full bg-emerald-500"></div></div>
            <span className="text-[10px] text-slate-500 ml-2">ErrorBoundary.jsx</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => { setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; }); };
      const nextRef = useRef(next); nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const VISUAL_MAP = { crash: CrashVisual, boundary: BoundaryVisual, suspense: SuspenseVisual, skeleton: SkeletonVisual, combined: CombinedVisual };
      const VisualComponent = VISUAL_MAP[step.visual];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-rose-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">VI</div>
                <h1 className="text-2xl font-bold text-slate-800">에러 경계와 로딩 상태 처리</h1>
              </div>
              <p className="text-slate-600 text-sm"><b>Error Boundary</b>와 <b>Suspense</b>로 에러와 로딩을 우아하게 처리합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter VI-1-4 | ★★★ | 선수 지식 VI-1-3 | 2026-04-21</p>
            </header>

            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.title} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-rose-500' : 'bg-slate-200'}`} aria-label={`Step ${i + 1}`} />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                <CodePanel code={step.code} />
                {VisualComponent && <VisualComponent />}
              </div>
              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-rose-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>
              </div>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }} disabled={idx === 0} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="이전 단계">← 이전</button>
              <button onClick={() => { if (isEnd) { setIdx(0); } setIsPlaying(p => !p); }} className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-rose-500 hover:bg-rose-600 text-white'}`} aria-label={isPlaying ? '정지' : '자동 실행'}>{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }} disabled={isEnd} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="다음 단계">다음 →</button>
            </div>
            <footer className="text-center text-xs text-slate-400 pb-4">React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-21</footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
