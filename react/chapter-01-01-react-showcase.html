<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React로 만든 것들 — Chapter I-1-5</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    Chapter I-1-5 — React로 만든 것들: 세상에서 쓰이는 곳
    학습 목표: React가 어떤 제품에 사용되는지 구체적 예시를 들 수 있다.
  -->
  <script type="text/babel">
    const { useState } = React;

    // =========================================================
    // 데이터
    // =========================================================
    const PRODUCTS = [
      {
        name: 'Facebook / Instagram',
        company: 'Meta',
        category: 'SNS',
        desc: 'React를 만든 회사. Facebook 뉴스피드, Instagram 웹 버전이 React로 구동됩니다. React는 이 거대한 앱의 UI 일관성 문제를 해결하기 위해 태어났습니다.',
        tech: 'React + React Native (모바일)',
        color: 'bg-blue-50 border-blue-200',
        icon: '📱',
      },
      {
        name: 'Netflix',
        company: 'Netflix',
        category: '스트리밍',
        desc: '가입 페이지, 검색, 콘텐츠 브라우징 등 주요 인터페이스에 React를 사용합니다. 빠른 렌더링이 사용자 이탈률을 줄이는 데 핵심적 역할을 합니다.',
        tech: 'React + Node.js (SSR)',
        color: 'bg-red-50 border-red-200',
        icon: '🎬',
      },
      {
        name: 'Airbnb',
        company: 'Airbnb',
        category: '여행/숙박',
        desc: '검색 결과, 숙소 상세 페이지, 예약 흐름 등 복잡한 UI를 React로 관리합니다. Airbnb는 React 생태계에도 많은 오픈소스를 기여했습니다.',
        tech: 'React + TypeScript',
        color: 'bg-pink-50 border-pink-200',
        icon: '🏠',
      },
      {
        name: 'Notion',
        company: 'Notion Labs',
        category: '생산성',
        desc: '에디터, 데이터베이스 뷰, 칸반 보드 등 복잡한 인터랙션이 모두 React 컴포넌트로 구성됩니다. 드래그 앤 드롭, 실시간 협업까지 React 위에서 동작합니다.',
        tech: 'React + Electron (데스크톱)',
        color: 'bg-slate-50 border-slate-200',
        icon: '📝',
      },
      {
        name: 'Discord',
        company: 'Discord',
        category: '커뮤니케이션',
        desc: '채팅, 음성 채널 UI, 서버 목록 등 실시간 업데이트가 빈번한 인터페이스를 React로 처리합니다.',
        tech: 'React + Electron',
        color: 'bg-indigo-50 border-indigo-200',
        icon: '💬',
      },
      {
        name: 'Shopify',
        company: 'Shopify',
        category: '이커머스',
        desc: '상점 관리 대시보드, 상품 편집기, 주문 관리 등 판매자용 어드민 인터페이스가 React(Polaris 디자인 시스템)로 구축되어 있습니다.',
        tech: 'React + Polaris + React Native',
        color: 'bg-green-50 border-green-200',
        icon: '🛍️',
      },
    ];

    const CROSS_PLATFORM = [
      { platform: 'Web', tech: 'React', desc: '브라우저에서 실행되는 웹 앱', icon: '🌐' },
      { platform: 'iOS / Android', tech: 'React Native', desc: '같은 JS 코드로 네이티브 모바일 앱', icon: '📱' },
      { platform: 'Desktop', tech: 'Electron + React', desc: 'Windows/Mac/Linux 데스크톱 앱', icon: '🖥️' },
      { platform: 'VR', tech: 'React 360 (실험적)', desc: 'VR 환경의 UI (Meta Quest 등)', icon: '🥽' },
    ];

    // =========================================================
    // 컴포넌트
    // =========================================================
    function ProductCard({ product, isSelected, onClick }) {
      return (
        <button
          onClick={onClick}
          className={`w-full text-left p-4 rounded-xl border-2 transition-all duration-300 ${
            isSelected
              ? `${product.color} shadow-md scale-[1.02]`
              : 'bg-white border-slate-200 hover:border-slate-300 hover:shadow-sm'
          }`}
        >
          <div className="flex items-center gap-3">
            <span className="text-2xl">{product.icon}</span>
            <div>
              <div className="font-bold text-slate-800 text-sm">{product.name}</div>
              <div className="text-[11px] text-slate-500">{product.company} · {product.category}</div>
            </div>
          </div>
        </button>
      );
    }

    function ProductDetail({ product }) {
      if (!product) {
        return (
          <div className="bg-slate-800 rounded-xl p-6 border border-slate-700 flex items-center justify-center min-h-[250px]">
            <p className="text-slate-500 text-sm">← 왼쪽에서 제품을 선택하세요</p>
          </div>
        );
      }

      return (
        <div className="bg-slate-800 rounded-xl p-6 border border-slate-700 min-h-[250px]">
          <div className="flex items-center gap-3 mb-4">
            <span className="text-4xl">{product.icon}</span>
            <div>
              <h3 className="text-lg font-bold text-white">{product.name}</h3>
              <span className="text-xs text-slate-400">{product.company}</span>
            </div>
          </div>
          <p className="text-sm text-slate-300 leading-relaxed mb-4">{product.desc}</p>
          <div className="bg-slate-700/50 rounded-lg px-3 py-2">
            <span className="text-[11px] text-slate-400 font-bold">기술 스택: </span>
            <span className="text-[11px] text-emerald-400 font-mono">{product.tech}</span>
          </div>
        </div>
      );
    }

    function App() {
      const [selectedIdx, setSelectedIdx] = useState(null);
      const [showCrossPlatform, setShowCrossPlatform] = useState(false);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">

            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">I</div>
                <h1 className="text-2xl font-bold text-slate-800">React로 만든 것들</h1>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                React가 실제로 어떤 제품에 쓰이는지 살펴봅니다.
                <b> 글로벌 서비스부터 개인 프로젝트까지</b> — React를 배우면 이 모든 것을 만들 수 있습니다.
              </p>
              <p className="mt-2 text-[11px] text-slate-400 italic">
                Chapter I-1-5 | 난이도 ★☆☆ | 선수 지식 I-1-4 | 2026-04-20
              </p>
            </header>

            <div className="bg-amber-600 text-white p-4 rounded-xl shadow-sm">
              <p className="text-sm font-medium">카드를 클릭하면 해당 제품이 React를 어떻게 사용하는지 상세 정보를 볼 수 있습니다.</p>
            </div>

            {/* 제품 그리드 + 상세 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-2">
                {PRODUCTS.map((p, i) => (
                  <ProductCard
                    key={p.name}
                    product={p}
                    isSelected={selectedIdx === i}
                    onClick={() => setSelectedIdx(i)}
                  />
                ))}
              </div>
              <ProductDetail product={selectedIdx !== null ? PRODUCTS[selectedIdx] : null} />
            </div>

            {/* 크로스 플랫폼 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
              <button
                onClick={() => setShowCrossPlatform(p => !p)}
                className="w-full text-left px-5 py-4 flex items-center justify-between hover:bg-slate-50 transition"
              >
                <span className="text-sm font-bold text-slate-700">React 하나로 여러 플랫폼?</span>
                <span className={`text-slate-400 transition-transform ${showCrossPlatform ? 'rotate-180' : ''}`}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
                </span>
              </button>
              {showCrossPlatform && (
                <div className="px-5 pb-5">
                  <p className="text-xs text-slate-500 mb-3">React의 핵심 개념(컴포넌트, state, props)을 익히면 다양한 플랫폼에 응용할 수 있습니다.</p>
                  <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                    {CROSS_PLATFORM.map(cp => (
                      <div key={cp.platform} className="bg-sky-50 border border-sky-200 rounded-lg p-3 text-center">
                        <div className="text-2xl mb-1">{cp.icon}</div>
                        <div className="text-xs font-bold text-slate-800">{cp.platform}</div>
                        <div className="text-[10px] text-sky-600 font-mono">{cp.tech}</div>
                        <div className="text-[10px] text-slate-500 mt-1">{cp.desc}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>

            <div className="bg-white border border-slate-200 rounded-xl p-4 text-xs text-slate-500 space-y-1">
              <div className="font-bold text-slate-700 mb-2">기술 참고</div>
              <div><b>React Native</b>: React 문법으로 iOS/Android 네이티브 앱을 만드는 프레임워크. 2015년 공개.</div>
              <div><b>Electron</b>: Chromium + Node.js 기반. React로 데스크톱 앱을 만들 수 있다. VS Code, Slack도 Electron 기반.</div>
              <div><b>SSR (Server-Side Rendering)</b>: Next.js 등을 통해 서버에서 React를 미리 렌더링. 초기 로딩 속도와 SEO를 개선한다.</div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
