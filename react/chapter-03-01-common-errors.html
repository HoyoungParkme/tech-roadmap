<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>처음 만나는 에러와 해결법 — Chapter III-1-5</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter III-1-5 — 처음 만나는 에러와 해결법 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // =========================================================
    // 1. STEPS 정의 — 대표 에러 5단계
    // =========================================================
    const STEPS = [
      {
        title: 'Step 1 — key prop 누락',
        error: 'Warning: Each child in a list should have a unique "key" prop.',
        desc: '배열을 map()으로 렌더링할 때, 각 요소에 고유한 key를 줘야 합니다. key가 없으면 React가 어떤 항목이 바뀌었는지 효율적으로 추적할 수 없습니다.',
        badCode: '// ❌ key 없음\nfunction TodoList({ todos }) {\n  return (\n    <ul>\n      {todos.map(todo => (\n        <li>{todo.text}</li>\n      ))}\n    </ul>\n  );\n}',
        goodCode: '// ✅ key 추가\nfunction TodoList({ todos }) {\n  return (\n    <ul>\n      {todos.map(todo => (\n        <li key={todo.id}>{todo.text}</li>\n      ))}\n    </ul>\n  );\n}',
        tip: 'key에는 데이터의 고유 ID를 씁니다. 배열 인덱스(i)는 비추천 — 순서가 바뀌면 버그 발생!',
        severity: 'warning',
      },
      {
        title: 'Step 2 — undefined 접근',
        error: "TypeError: Cannot read properties of undefined (reading 'name')",
        desc: 'state나 props가 아직 준비되지 않은 상태에서 속성에 접근하면 발생합니다. API 응답을 기다리는 동안 자주 만납니다.',
        badCode: '// ❌ user가 null일 수 있음\nfunction Profile({ user }) {\n  return (\n    <div>\n      <h1>{user.name}</h1>\n      <p>{user.email}</p>\n    </div>\n  );\n}\n\n// user가 undefined → 에러!',
        goodCode: '// ✅ 안전한 접근 (옵셔널 체이닝)\nfunction Profile({ user }) {\n  if (!user) return <p>로딩 중...</p>;\n\n  return (\n    <div>\n      <h1>{user.name}</h1>\n      <p>{user.email}</p>\n    </div>\n  );\n}',
        tip: '옵셔널 체이닝(?.)도 유용합니다: user?.name. 하지만 early return이 더 명확합니다.',
        severity: 'error',
      },
      {
        title: 'Step 3 — Hooks 규칙 위반',
        error: "Error: React Hook 'useState' is called conditionally. React Hooks must be called in the exact same order in every component render.",
        desc: 'Hooks(useState, useEffect 등)는 조건문, 반복문, 중첩 함수 안에서 호출할 수 없습니다. 항상 컴포넌트의 최상위 레벨에서 호출해야 합니다.',
        badCode: '// ❌ 조건문 안에서 Hook 호출\nfunction Counter({ show }) {\n  if (show) {\n    const [count, setCount] = useState(0);\n  }\n  // 에러! Hook 호출 순서가 바뀜\n}',
        goodCode: '// ✅ 최상위에서 Hook 호출\nfunction Counter({ show }) {\n  const [count, setCount] = useState(0);\n\n  if (!show) return null;\n\n  return <p>{count}</p>;\n}',
        tip: 'Hook은 항상 함수 컴포넌트의 맨 위에 선언합니다. 조건부 렌더링은 Hook 호출 "이후"에!',
        severity: 'error',
      },
      {
        title: 'Step 4 — 콘솔 에러 읽는 법',
        error: null,
        desc: '브라우저 콘솔(F12 → Console 탭)은 에러의 원인과 위치를 알려줍니다. 에러 메시지 → 파일명:줄번호 → 호출 스택 순서로 읽으면 대부분 해결할 수 있습니다.',
        badCode: null,
        goodCode: null,
        tip: '에러가 나면 콘솔을 먼저 봅니다. 90%의 문제는 에러 메시지에 답이 있습니다.',
        severity: 'info',
        consoleDemo: true,
      },
      {
        title: 'Step 5 — 디버깅 체크리스트',
        error: null,
        desc: 'React 개발 중 에러를 만났을 때 이 순서대로 확인하면 대부분 해결됩니다. 에러 메시지를 먼저 읽고, 해당 줄을 확인하고, 검색합니다.',
        badCode: null,
        goodCode: null,
        tip: '에러 메시지를 그대로 구글에 검색하면 Stack Overflow 답변이 나옵니다. 이 습관이 개발자의 핵심 기술입니다.',
        severity: 'info',
        checklist: true,
      },
    ];

    // =========================================================
    // 2. 가상 콘솔 컴포넌트
    // =========================================================
    function ConsolePanel({ error, severity }) {
      if (!error) return null;
      const colors = {
        warning: { bg: 'bg-amber-900/30', border: 'border-amber-700', text: 'text-amber-300', icon: '⚠️' },
        error: { bg: 'bg-red-900/30', border: 'border-red-700', text: 'text-red-300', icon: '❌' },
      };
      const style = colors[severity] || colors.error;

      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-emerald-500"></div>
            </div>
            <span className="text-[10px] text-slate-500 ml-2">Console</span>
          </div>
          <div className={`${style.bg} border ${style.border} rounded-lg p-3`}>
            <div className="flex items-start gap-2">
              <span>{style.icon}</span>
              <div className={`text-xs font-mono ${style.text} leading-relaxed break-all`}>{error}</div>
            </div>
            <div className="text-[10px] text-slate-500 mt-2 font-mono">at App.jsx:12:5</div>
          </div>
        </div>
      );
    }

    // =========================================================
    // 3. 코드 비교 패널
    // =========================================================
    function CodeCompare({ badCode, goodCode }) {
      if (!badCode && !goodCode) return null;
      return (
        <div className="space-y-3">
          {badCode && (
            <div className="bg-red-950 rounded-xl p-4 border border-red-800">
              <div className="text-[10px] text-red-400 font-bold uppercase mb-2">❌ 잘못된 코드</div>
              <pre className="text-sm font-mono text-red-300 leading-relaxed whitespace-pre-wrap">{badCode}</pre>
            </div>
          )}
          {badCode && goodCode && <div className="text-center text-xs text-teal-500 font-bold">↓ 수정 ↓</div>}
          {goodCode && (
            <div className="bg-emerald-950 rounded-xl p-4 border border-emerald-800">
              <div className="text-[10px] text-emerald-400 font-bold uppercase mb-2">✅ 수정된 코드</div>
              <pre className="text-sm font-mono text-emerald-300 leading-relaxed whitespace-pre-wrap">{goodCode}</pre>
            </div>
          )}
        </div>
      );
    }

    // =========================================================
    // 4. 콘솔 데모 패널
    // =========================================================
    function ConsoleDemoPanel() {
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-emerald-500"></div>
            </div>
            <span className="text-[10px] text-slate-500 ml-2">Console (F12)</span>
          </div>
          <div className="space-y-2">
            <div className="bg-red-900/30 border border-red-700 rounded-lg p-2">
              <div className="text-xs font-mono text-red-300">
                ❌ TypeError: Cannot read properties of undefined
              </div>
              <div className="text-[10px] text-red-500 mt-1 font-mono">
                at UserProfile (App.jsx:<span className="text-red-300 font-bold underline">15</span>:8)
              </div>
            </div>
            <div className="mt-2 space-y-1 text-[10px] text-slate-400">
              <div className="flex items-center gap-2">
                <span className="bg-sky-800 text-sky-300 px-1.5 py-0.5 rounded text-[9px] font-bold">1</span>
                <span>에러 종류: TypeError</span>
              </div>
              <div className="flex items-center gap-2">
                <span className="bg-sky-800 text-sky-300 px-1.5 py-0.5 rounded text-[9px] font-bold">2</span>
                <span>원인: undefined의 속성을 읽으려 함</span>
              </div>
              <div className="flex items-center gap-2">
                <span className="bg-sky-800 text-sky-300 px-1.5 py-0.5 rounded text-[9px] font-bold">3</span>
                <span>위치: App.jsx 15번째 줄</span>
              </div>
              <div className="flex items-center gap-2">
                <span className="bg-sky-800 text-sky-300 px-1.5 py-0.5 rounded text-[9px] font-bold">4</span>
                <span>컴포넌트: UserProfile 안에서 발생</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // =========================================================
    // 5. 체크리스트 패널
    // =========================================================
    function ChecklistPanel() {
      const [checked, setChecked] = useState({});
      const items = [
        { id: 'console', text: '브라우저 콘솔(F12)에서 에러 메시지 확인', icon: '🔍' },
        { id: 'line', text: '에러가 가리키는 파일명:줄번호 확인', icon: '📍' },
        { id: 'message', text: '에러 메시지를 영어 그대로 구글 검색', icon: '🌐' },
        { id: 'typo', text: '오타 확인 (대소문자, 세미콜론, 괄호)', icon: '✏️' },
        { id: 'import', text: 'import/export 빠진 것 없는지 확인', icon: '📦' },
        { id: 'hooks', text: 'Hook이 조건문/반복문 안에 있지 않은지 확인', icon: '🪝' },
        { id: 'key', text: 'map() 사용 시 key prop 확인', icon: '🔑' },
        { id: 'null', text: 'undefined/null 접근 시 안전장치(?.  || if) 확인', icon: '🛡️' },
      ];

      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">디버깅 체크리스트</div>
          <div className="space-y-2">
            {items.map((item) => (
              <button key={item.id}
                onClick={() => setChecked(prev => ({ ...prev, [item.id]: !prev[item.id] }))}
                className={`w-full text-left flex items-center gap-3 px-3 py-2 rounded-lg transition ${
                  checked[item.id] ? 'bg-emerald-50 border border-emerald-200' : 'bg-slate-50 border border-slate-200 hover:bg-slate-100'
                }`}>
                <span className={`w-5 h-5 rounded border-2 flex items-center justify-center text-xs transition ${
                  checked[item.id] ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-300'
                }`}>
                  {checked[item.id] ? '✓' : ''}
                </span>
                <span className="text-sm">{item.icon}</span>
                <span className={`text-xs ${checked[item.id] ? 'text-emerald-700 line-through' : 'text-slate-700'}`}>{item.text}</span>
              </button>
            ))}
          </div>
          <div className="mt-3 text-center text-[11px] text-slate-500">
            체크한 항목: {Object.values(checked).filter(Boolean).length} / {items.length}
          </div>
        </div>
      );
    }

    // =========================================================
    // 6. 메인 App
    // =========================================================
    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => {
        setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      };
      const nextRef = useRef(next);
      nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-teal-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">III</div>
                <h1 className="text-2xl font-bold text-slate-800">처음 만나는 에러와 해결법</h1>
              </div>
              <p className="text-slate-600 text-sm">React 개발 중 자주 만나는 <b>3가지 대표 에러</b>와 콘솔 활용법, 디버깅 체크리스트를 배웁니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter III-1-5 | ★★☆ | 선수 지식 III-1-4 | 2026-04-20</p>
            </header>

            {/* 진행 표시 */}
            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.title} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-teal-500' : 'bg-slate-200'}`}
                  aria-label={`Step ${i + 1}`}
                />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              {/* 좌: 에러 시각화 */}
              <div className="space-y-4">
                {step.consoleDemo ? (
                  <ConsoleDemoPanel />
                ) : step.checklist ? (
                  <ChecklistPanel />
                ) : (
                  <>
                    <ConsolePanel error={step.error} severity={step.severity} />
                    <CodeCompare badCode={step.badCode} goodCode={step.goodCode} />
                  </>
                )}
              </div>

              {/* 우: 설명 패널 */}
              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-teal-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>

                {step.tip && (
                  <div className="mt-4 bg-amber-50 border border-amber-200 rounded-lg p-3">
                    <div className="text-[10px] text-amber-600 font-bold uppercase mb-1">팁</div>
                    <p className="text-xs text-amber-700">{step.tip}</p>
                  </div>
                )}
              </div>
            </div>

            {/* 컨트롤 */}
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }}
                disabled={idx === 0}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="이전 단계"
              >← 이전</button>
              <button onClick={() => { if (isEnd) setIdx(0); setIsPlaying(p => !p); }}
                className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${
                  isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-teal-500 hover:bg-teal-600 text-white'
                }`}
                aria-label={isPlaying ? '정지' : '자동 실행'}
              >{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }}
                disabled={isEnd}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="다음 단계"
              >다음 →</button>
            </div>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-20
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
