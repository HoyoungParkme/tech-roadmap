<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React 렌더링 파이프라인 시각화 — Chapter IV-1-1</title>

  <!-- Tailwind CSS Play CDN: 학습 자료용. 프로덕션에서는 PostCSS 빌드를 권장. -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 (development 버전: 학습용이므로 에러 메시지 상세 버전 사용) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel Standalone 7.x: 브라우저에서 JSX를 실시간 변환 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    ─────────────────────────────────────────────────────────────
    React Chapter IV-1-1 — 렌더링 파이프라인 (State → Real DOM)
    ─────────────────────────────────────────────────────────────
    학습 목표 : 버튼 클릭 → setState → Virtual DOM 재구성 → Diffing → Real DOM 패치
               까지 이어지는 React 렌더링 파이프라인을 단계별로 체험한다.
    조작법   : "자동 실행" 버튼으로 재생, 이전/다음 버튼으로 수동 전환.
    확장 방법 : 새 챕터를 추가할 때는 STEPS / JSX_CODE / 헤더 텍스트만 교체한다.

    [참고] 이 시각화 페이지 자체도 React로 동작한다.
    즉, "시각화를 그리는 React(이 페이지)"와 "시각화의 내용인 React(Counter 예제)"는
    개념적으로 구분된다. 둘 다 같은 React 18이지만, 역할이 다르다.
    ─────────────────────────────────────────────────────────────
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // -----------------------------------------
    // 1. 교육용 JSX 코드 (Counter 컴포넌트)
    //    React 18 + Hooks 기반. import/export 없음:
    //    CDN UMD 방식은 전역 React 객체로 접근한다.
    // -----------------------------------------
    const JSX_CODE = [
      "import { useState } from 'react';",
      "",
      "// Counter: 클릭할 때마다 숫자가 올라가는 컴포넌트",
      "export default function Counter() {",
      "  // useState: 상태(state)를 선언한다",
      "  const [count, setCount] = useState(0);",
      "",
      "  // 버튼 클릭 시 setCount로 state 업데이트 예약",
      "  function handleClick() {",
      "    setCount(count + 1);",
      "  }",
      "",
      "  // JSX: React가 Virtual DOM으로 변환하는 UI 선언",
      "  return (",
      "    <div>",
      "      <p>현재 카운트: {count}</p>",
      "      <button onClick={handleClick}>",
      "        +1 클릭",
      "      </button>",
      "    </div>",
      "  );",
      "}",
    ];

    // -----------------------------------------
    // 2. 렌더링 파이프라인 5 STEPS 정의
    //    각 step은 codeLine(0-based), desc, 각 노드 상태를 갖는다.
    // -----------------------------------------
    const STEPS = [
      {
        codeLine: 16,       // <button onClick={handleClick}>
        title: "Step 1 — 사용자 이벤트 발생",
        desc: "[사용자 이벤트] 브라우저에서 버튼을 클릭합니다. onClick 이벤트 핸들러(handleClick)가 호출될 준비를 합니다. 아직 state는 변경되지 않았습니다.",
        userState: 'active',
        setStateState: 'idle',
        vdomState: 'idle',
        diffState: 'idle',
        realDomState: 'idle',
        dataObj: { event: 'click', count: 0 },
      },
      {
        codeLine: 9,        // setCount(count + 1)
        title: "Step 2 — setState 호출",
        desc: "[setState 호출] handleClick 내부에서 setCount(count + 1)가 실행됩니다. React는 새 state 값(1)을 즉시 반영하지 않고 '업데이트 예약(schedule)'을 합니다. React 18의 Automatic Batching은 연속 setState를 한 번에 묶어 처리합니다.",
        userState: 'done',
        setStateState: 'active',
        vdomState: 'idle',
        diffState: 'idle',
        realDomState: 'idle',
        dataObj: { scheduled: 'setCount(0 + 1)' },
      },
      {
        codeLine: 13,       // return ( — JSX 반환 시작
        title: "Step 3 — Virtual DOM 재구성",
        desc: "[Virtual DOM 재구성] React가 Counter 함수를 다시 실행(re-render)합니다. JSX가 React.createElement() 호출로 변환되어 새로운 Virtual DOM 트리(메모리 안의 가상 UI 설명서)가 만들어집니다. Fiber reconciler가 이 과정을 관리합니다.",
        userState: 'done',
        setStateState: 'done',
        vdomState: 'active',
        diffState: 'idle',
        realDomState: 'idle',
        dataObj: { vdom: '<div><p>count:1</p><button>...</button></div>' },
      },
      {
        codeLine: 4,        // const [count, setCount] = useState(0);
        title: "Step 4 — Diffing (변경 지점 계산)",
        desc: "[Diffing] React는 이전 Virtual DOM(count=0)과 새 Virtual DOM(count=1)을 비교합니다. 두 트리를 처음부터 비교하면 느리므로, React는 '같은 위치의 같은 타입 노드'라는 전제로 빠르게 차이를 찾아냅니다. 여기서는 <p> 안의 텍스트 노드만 바뀌었음을 감지합니다.",
        userState: 'done',
        setStateState: 'done',
        vdomState: 'done',
        diffState: 'active',
        realDomState: 'idle',
        dataObj: { changed: '<p> 텍스트: "0" → "1"' },
      },
      {
        codeLine: 14,       // <div>
        title: "Step 5 — Real DOM 패치",
        desc: "[Real DOM 패치] Diffing에서 찾아낸 변경 부분만 실제 DOM에 반영합니다. <p> 안의 텍스트 노드만 업데이트하고, <button>은 건드리지 않습니다. 이것이 React가 직접 DOM 전체를 다시 그리지 않고 성능을 유지하는 핵심 원리입니다.",
        userState: 'done',
        setStateState: 'done',
        vdomState: 'done',
        diffState: 'done',
        realDomState: 'active',
        dataObj: { patch: 'textNode: "현재 카운트: 1"' },
      },
    ];

    // -----------------------------------------
    // 3. JSX 구문 강조(Syntax Highlighting) 헬퍼
    //    React/JSX 키워드 기준으로 색상을 분류한다.
    // -----------------------------------------
    const KEYWORDS = new Set([
      'import', 'export', 'default', 'function', 'const', 'return',
      'useState', 'useEffect',
    ]);
    // JSX 태그 패턴: <div>, </div>, <button>, </button>, <p>, </p>, /> 등
    const JSX_TAG_PATTERN = /^(<\/?\w[\w.]*\/?>|<>|<\/>|\/>)$/;
    const STRING_CONTENT_PATTERN = /^'[^']*'$/;
    const NUMBER_PATTERN = /^\d+$/;

    const highlightLine = (line) => {
      // 주석 분리
      const commentIdx = line.indexOf('//');
      let codePart = line;
      let commentPart = '';
      if (commentIdx !== -1) {
        // JSX 내부 문자열의 // 는 제외 (간단 처리: 따옴표 앞의 // 만 주석 처리)
        const beforeComment = line.slice(0, commentIdx);
        const quotesBefore = (beforeComment.match(/'/g) || []).length;
        if (quotesBefore % 2 === 0) {
          codePart = beforeComment;
          commentPart = line.slice(commentIdx);
        }
      }

      if (!codePart.trim() && commentPart) {
        return <span className="text-slate-500 italic">{commentPart}</span>;
      }

      // 토큰 분리: 공백, 괄호, 구두점, JSX 꺾쇠, 따옴표 등
      const tokens = codePart.split(/(\s+|[{}()\[\]<>/,;=+!?:"|'`])/g);

      const highlightedTokens = tokens.map((token, i) => {
        if (!token) return null;
        if (KEYWORDS.has(token)) {
          return <span key={i} className="text-pink-400 font-semibold">{token}</span>;
        }
        if (JSX_TAG_PATTERN.test(token)) {
          return <span key={i} className="text-sky-400 font-semibold">{token}</span>;
        }
        if (STRING_CONTENT_PATTERN.test(token)) {
          return <span key={i} className="text-emerald-400">{token}</span>;
        }
        if (NUMBER_PATTERN.test(token)) {
          return <span key={i} className="text-orange-300">{token}</span>;
        }
        if (token === '{' || token === '}') {
          return <span key={i} className="text-yellow-300">{token}</span>;
        }
        return <span key={i} className="text-slate-200">{token}</span>;
      });

      return (
        <>
          {highlightedTokens}
          {commentPart && <span className="text-slate-500 italic">{commentPart}</span>}
        </>
      );
    };

    // -----------------------------------------
    // 4. 파이프라인 노드 상태별 스타일 헬퍼
    // -----------------------------------------
    const getNodeClass = (state, base) => {
      if (state === 'active') {
        return `${base} bg-sky-100 border-sky-500 ring-2 ring-sky-300 shadow-lg scale-105 transition-all duration-500 text-sky-900`;
      }
      if (state === 'done') {
        return `${base} bg-slate-100 border-emerald-500 text-emerald-700 transition-all duration-500`;
      }
      return `${base} bg-white border-slate-200 text-slate-400 transition-all duration-500`;
    };

    // -----------------------------------------
    // 5. 파이프라인 다이어그램 컴포넌트
    //    User → Event → setState → Virtual DOM → Diff → Real DOM
    // -----------------------------------------
    function PipelineDiagram({ stepData }) {
      const nodes = [
        { key: 'userState',    label: 'User\n이벤트',        sub: 'onClick' },
        { key: 'setStateState', label: 'setState\n호출',     sub: 'setCount(n+1)' },
        { key: 'vdomState',    label: 'Virtual DOM\n재구성', sub: 'Fiber re-render' },
        { key: 'diffState',    label: 'Diffing\n비교',       sub: '변경 지점 탐색' },
        { key: 'realDomState', label: 'Real DOM\n패치',      sub: '최소 업데이트' },
      ];

      return (
        <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
          <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">렌더링 파이프라인</h3>
          <div className="flex flex-wrap items-center justify-between gap-2">
            {nodes.map((node, i) => {
              const state = stepData[node.key];
              return (
                <div key={node.key} className="flex items-center gap-1">
                  <div className={getNodeClass(state, "px-3 py-2 rounded-lg border-2 font-bold text-center min-w-[90px]")}>
                    <div className="text-[11px] leading-tight whitespace-pre-line">{node.label}</div>
                    <div className="text-[9px] mt-1 opacity-60 font-normal">{node.sub}</div>
                    {state === 'active' && (
                      <div className="mt-1 text-[9px] bg-sky-500 text-white px-1 py-0.5 rounded-full">진행 중</div>
                    )}
                    {state === 'done' && (
                      <div className="mt-1 text-[9px] bg-emerald-500 text-white px-1 py-0.5 rounded-full">완료</div>
                    )}
                  </div>
                  {i < nodes.length - 1 && (
                    <div className="text-slate-300 font-bold text-lg select-none">&rarr;</div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // -----------------------------------------
    // 6. Counter 미리보기 컴포넌트
    //    파이프라인 완료 step에서 실제 숫자가 올라가는 시뮬레이션
    // -----------------------------------------
    function CounterPreview({ stepIdx }) {
      const count = stepIdx >= 4 ? 1 : 0; // Step 5(Real DOM 패치)에서만 반영
      const patching = stepIdx === 4;

      return (
        <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
          <div className="text-xs text-slate-400 uppercase tracking-wider mb-3 font-bold">Counter 컴포넌트 미리보기</div>
          <div className={`bg-white rounded-lg p-4 text-center transition-all duration-500 ${patching ? 'ring-2 ring-sky-400 shadow-lg' : ''}`}>
            <p className={`text-2xl font-bold mb-3 transition-all duration-300 ${patching ? 'text-sky-600 scale-110' : 'text-slate-800'}`}>
              현재 카운트: {count}
            </p>
            <button
              className={`px-4 py-2 rounded font-medium transition-all duration-300 ${
                stepIdx === 0 ? 'bg-sky-500 text-white scale-105 shadow-md' : 'bg-slate-100 text-slate-600'
              }`}
            >
              +1 클릭
            </button>
          </div>
          <div className="mt-2 text-[10px] text-slate-400 text-center">
            {patching ? '실제 DOM이 업데이트되었습니다' : stepIdx === 0 ? '버튼 클릭 이벤트 발생' : 'Real DOM은 아직 변경 전'}
          </div>
        </div>
      );
    }

    // -----------------------------------------
    // 7. 메인 앱 컴포넌트
    // -----------------------------------------
    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      // handleNext: setInterval 콜백에서 호출되므로 Ref 패턴으로 최신 함수를 유지한다.
      // useCallback + deps 조합 시 스텝 전환마다 타이머가 재설정되어 간격이 불안정해진다.
      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false);
          return prev;
        });
      };

      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => {
        if (currentStepIdx > 0) {
          setCurrentStepIdx(prev => prev - 1);
          setIsPlaying(false);
        }
      };

      const togglePlay = () => {
        if (isEnd) setCurrentStepIdx(0);
        setIsPlaying(prev => !prev);
      };

      useEffect(() => {
        if (isPlaying) {
          playIntervalRef.current = setInterval(() => handleNextRef.current(), 2800);
        } else {
          clearInterval(playIntervalRef.current);
        }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 목차로 돌아가기 */}
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition mb-[-8px]">
              &larr; 목차로
            </a>

            {/* 헤더 */}
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">R</div>
                <h1 className="text-2xl font-bold text-slate-800">React 렌더링 파이프라인 시각화</h1>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                버튼 클릭 한 번이 React 내부에서 어떤 단계를 거쳐 실제 화면 변경으로 이어지는지,
                <b> state → Virtual DOM → Diffing → Real DOM 패치</b>의 5단계를 시뮬레이션합니다.
              </p>
              <p className="mt-2 text-[11px] text-slate-400 italic">
                Chapter IV-1-1 | React 18 + Fiber reconciler 기준 | 2026-04-20
              </p>
            </header>

            {/* 현재 단계 설명 배너 */}
            <div className="bg-sky-700 text-white p-5 rounded-xl shadow-sm border border-sky-800 min-h-[90px] flex flex-col justify-center">
              <div className="text-xs font-bold text-sky-200 mb-1 uppercase tracking-wider">
                {stepData.title}
              </div>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 파이프라인 다이어그램 */}
            <PipelineDiagram stepData={stepData} />

            {/* 좌우 레이아웃 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5 items-stretch">

              {/* 왼쪽: Counter 미리보기 + 데이터 패킷 + 컨트롤 */}
              <div className="flex flex-col space-y-4">

                {/* Counter 미리보기 */}
                <CounterPreview stepIdx={currentStepIdx} />

                {/* 현재 step의 데이터 패킷 */}
                <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
                  <div className="text-xs text-slate-400 uppercase tracking-wider mb-2 font-bold">데이터 / 상태 스냅샷</div>
                  <div className="font-mono text-emerald-400 text-sm">
                    {JSON.stringify(stepData.dataObj, null, 2)}
                  </div>
                </div>

                {/* 컨트롤 바 */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-3">
                  <div className="flex items-center space-x-2">
                    <button
                      aria-label="이전 단계"
                      onClick={handlePrev}
                      disabled={currentStepIdx === 0}
                      className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 transition"
                    >
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true">
                        <path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/>
                      </svg>
                    </button>
                    <button
                      aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                      onClick={togglePlay}
                      className="flex items-center px-4 py-2 rounded bg-sky-600 hover:bg-sky-700 text-white font-medium transition shadow-sm w-32 justify-center"
                    >
                      {isPlaying ? (
                        <>
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true">
                            <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
                          </svg>
                          정지
                        </>
                      ) : (
                        <>
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2" aria-hidden="true">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                          </svg>
                          자동 실행
                        </>
                      )}
                    </button>
                    <button
                      aria-label="다음 단계"
                      onClick={handleNext}
                      disabled={isEnd}
                      className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 transition"
                    >
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true">
                        <path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/>
                      </svg>
                    </button>
                  </div>
                  <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                    Step {currentStepIdx + 1} / {STEPS.length}
                  </div>
                </div>
              </div>

              {/* 오른쪽: JSX 코드 뷰어 */}
              <div className="relative min-h-[420px] lg:min-h-0 rounded-xl shadow-sm border border-slate-800 overflow-hidden">
                <div className="lg:absolute lg:inset-0 w-full h-full bg-slate-900 flex flex-col">
                  {/* 코드 파일 탭 */}
                  <div className="flex items-center gap-2 px-4 py-2 bg-slate-800 border-b border-slate-700">
                    <div className="flex gap-1.5">
                      <div className="w-3 h-3 rounded-full bg-red-500 opacity-70"></div>
                      <div className="w-3 h-3 rounded-full bg-yellow-400 opacity-70"></div>
                      <div className="w-3 h-3 rounded-full bg-emerald-500 opacity-70"></div>
                    </div>
                    <span className="text-xs text-slate-400 font-mono ml-2">Counter.jsx</span>
                  </div>
                  <div className="p-4 overflow-y-auto flex-1 text-sm font-mono text-slate-300 scroll-smooth leading-relaxed">
                    {JSX_CODE.map((line, idx) => {
                      const isActive = stepData.codeLine === idx;
                      return (
                        <div
                          key={idx}
                          className={`flex px-2 py-0.5 rounded transition-colors duration-300 ${
                            isActive
                              ? 'bg-sky-900/60 text-white font-bold border-l-4 border-sky-400 shadow-inner'
                              : 'border-l-4 border-transparent'
                          }`}
                        >
                          <span className="text-slate-600 select-none mr-4 w-5 text-right inline-block shrink-0 tabular-nums">
                            {idx + 1}
                          </span>
                          <span className="whitespace-pre">{line ? highlightLine(line) : ' '}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

            </div>

            {/* 푸터: React 18 기술 메모 */}
            <div className="bg-white border border-slate-200 rounded-xl p-4 text-xs text-slate-500 space-y-1">
              <div className="font-bold text-slate-700 mb-2">기술 참고 (React 18 기준)</div>
              <div>
                <b>Fiber reconciler</b>: React 16에서 도입. 렌더링 작업을 잘게 쪼개(fiber unit)
                우선순위에 따라 중단/재개할 수 있어 UI 응답성을 높인다.
              </div>
              <div>
                <b>Automatic Batching</b>: React 18에서 강화. setTimeout/Promise 안의 setState도
                자동으로 묶어 한 번만 렌더링해 성능을 개선한다.
              </div>
              <div>
                <b>이 페이지 자체</b>도 React 18로 동작한다. 위에서 시각화하는 Counter 예제와
                이 페이지를 그리는 React는 개념적으로 구분된다 — 같은 라이브러리, 다른 역할.
              </div>
            </div>

          </div>
        </div>
      );
    }

    // -----------------------------------------
    // 8. 마운트
    // -----------------------------------------
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
