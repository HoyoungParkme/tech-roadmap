              Commit / Cleanup+Effects)를 단계별로 시각화한다.

              엄격히 분리한다. 그래서 Render는 순수해야 하고, DOM 변경은 Commit 단계에서만 일어난다.
    패턴: fastapi v1 — 좌(LiveDataPane: 5단계 파이프라인 박스 + Virtual DOM 트리)

    // ─────────────────────────────────────────────────────

    // ─────────────────────────────────────────────────────
    // VDomTree — Virtual DOM 트리 (변경된 노드 강조)
    //   kind 별 색상
    //     comp    → fuchsia (사용자 컴포넌트)
    //     elem    → sky     (HTML 요소)
    //     real    → emerald (실제 DOM)
    //     effect  → indigo  (effect 함수)
    //     cleanup → amber   (cleanup 함수)
    //   changed 별 강조
    //     trigger → indigo ring
    //     updated → indigo bg + dot
    //     same    → 회색
    //     patched → emerald + ✓
    //     fired   → indigo + ▶
    //     queued  → amber  + ⏳
    //     new     → indigo + + 표시
    //     removed → 회색 strikethrough
    // ─────────────────────────────────────────────────────
    function VDomTree({ label, nodes, accent }) {
      const kindMap = {
        comp:    { bg: 'bg-fuchsia-50', text: 'text-fuchsia-800', border: 'border-fuchsia-300', tag: 'comp' },
        elem:    { bg: 'bg-sky-50',     text: 'text-sky-800',     border: 'border-sky-300',     tag: 'elem' },
        real:    { bg: 'bg-emerald-50', text: 'text-emerald-800', border: 'border-emerald-300', tag: 'dom'  },
        effect:  { bg: 'bg-indigo-50',  text: 'text-indigo-800',  border: 'border-indigo-300',  tag: 'eff'  },
        cleanup: { bg: 'bg-amber-50',   text: 'text-amber-800',   border: 'border-amber-300',   tag: 'clean'},
      };
      const changedStyle = (c) => {
        switch (c) {
          case 'trigger': return 'bg-indigo-50 border-indigo-300 ring-1 ring-indigo-300';
          case 'updated': return 'bg-indigo-100 border-indigo-400';
          case 'same':    return 'bg-slate-50 border-slate-200';
          case 'patched': return 'bg-emerald-100 border-emerald-400';
          case 'fired':   return 'bg-indigo-100 border-indigo-400';
          case 'queued':  return 'bg-amber-50 border-amber-300';
          case 'new':     return 'bg-indigo-50 border-indigo-300';
          case 'removed': return 'bg-slate-100 border-slate-300 opacity-50 line-through';
          default:        return 'bg-white border-slate-200';
        }
      };
      const changedBadge = (c) => {
        switch (c) {
          case 'trigger': return { txt: '🚨 trig', cls: 'text-indigo-700 bg-indigo-100' };
          case 'updated': return { txt: '● upd',   cls: 'text-indigo-700 bg-indigo-100' };
          case 'same':    return { txt: '= same',  cls: 'text-slate-500 bg-slate-100' };
          case 'patched': return { txt: '✓ patch', cls: 'text-emerald-700 bg-emerald-100' };
          case 'fired':   return { txt: '▶ fire',  cls: 'text-indigo-700 bg-indigo-100' };
          case 'queued':  return { txt: '⏳ wait', cls: 'text-amber-700 bg-amber-100' };
          case 'new':     return { txt: '+ new',   cls: 'text-indigo-700 bg-indigo-100' };
          case 'removed': return { txt: '− rm',    cls: 'text-slate-500 bg-slate-100' };
          default:        return null;
        }
      };
      return (
        <div className={`rounded-lg border-2 overflow-hidden ${
          accent === 'after' ? 'border-indigo-300' : 'border-slate-200'
        }`}>
          <div className={`px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider flex items-center justify-between ${
            accent === 'after' ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-100 text-slate-600'
          }`}>
            <span>{label}</span>
            <span className="text-[9px] font-mono opacity-70">virtual DOM</span>
          </div>
          <div className="p-2.5 space-y-1 bg-white min-h-[140px]">
            {nodes.map((n) => {
              const c = kindMap[n.kind] || kindMap.elem;
              const badge = changedBadge(n.changed);
              return (
                <div
                  key={n.id}
                  className={`flex items-center gap-1.5 rounded px-1.5 py-1 border transition-all ${changedStyle(n.changed)}`}
                  style={{ marginLeft: `${n.depth * 14}px` }}
                >
                  <span className={`text-[8px] font-mono px-1.5 py-0.5 rounded ${c.bg} ${c.text} border ${c.border} font-bold uppercase tracking-wide flex-shrink-0`}>
                    {c.tag}
                  </span>
                  <span className="text-[11px] font-mono text-slate-700 leading-tight flex-1">
                    <span className="text-rose-600 font-bold">&lt;{n.tag}&gt;</span>
                    {n.text && <span className="text-slate-600 ml-1">{n.text}</span>}
                  </span>
                  {badge && (
                    <span className={`text-[8px] font-mono px-1.5 py-0.5 rounded font-bold whitespace-nowrap ${badge.cls}`}>
                      {badge.txt}
                    </span>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

            </span>

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark

    function CodeViewer({ code, stepIdx, total, onTabClick }) {
      const codeRef = useRef(null);

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      const handleTabClick = (idx) => {
        setStepIdx(idx);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="./index.html" className="text-indigo-700 hover:text-indigo-900 font-medium">&larr; 목차로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter IV-1-1</span>
            </nav>

            {/* 헤더 */}
            <header className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-indigo-600 text-white flex items-center justify-center rounded-full font-bold text-sm">IV</div>
                <div>
                  <div className="text-xs text-slate-500 font-medium">Part IV. React 동작 원리 &gt; Chapter 1. 렌더링</div>
                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-1-1. React 렌더링 파이프라인 (Trigger → Render → Commit)</h1>
                  <p className="text-sm text-slate-500 mt-0.5">setState 한 줄이 어떻게 실제 DOM 변경으로 이어지는가 — 5단계 풀파이프라인</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <LiveDataPane step={step} />
              <CodeViewer code={step.code} stepIdx={stepIdx} total={STEPS.length} onTabClick={handleTabClick} />
            </div>

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-indigo-50 border-2 border-indigo-300 rounded-xl p-3 text-sm text-indigo-900">
                💡 정리: <strong>setState → Render(VDOM 생성) → Reconciliation(diff) → Commit(DOM 패치) → Effects</strong>. Render는 순수해야 하고, DOM 변경은 Commit, 외부 세계와의 다리는 useEffect. 다음(IV-1-2)에서는 이 파이프라인을 좌우하는 <strong>Reconciliation 알고리즘과 key</strong>를 더 깊이 다룬다.
              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-indigo-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-indigo-600 text-white hover:bg-indigo-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['Trigger', 'Render', 'Reconciliation', 'Commit', 'useEffect', 'Virtual DOM', 'Fiber', 'setState'].map((kw) => (
                <span key={kw} className="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-xs font-medium border border-indigo-200">
                  {kw}
                </span>
              ))}
            </div>

            {/* 이전/다음 자료 네비 */}
            <nav className="flex justify-between text-sm pt-2">
              <a href="./chapter-03-04-conditional-list.html" className="text-indigo-700 hover:text-indigo-900 font-medium">&larr; III-1-6 조건부/리스트</a>
              <a href="./chapter-04-02-reconciliation.html" className="text-indigo-700 hover:text-indigo-900 font-medium">IV-1-2 Reconciliation &rarr;</a>
            </nav>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone + Tailwind CSS Play CDN + highlight.js 11.9.0
            </footer>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
