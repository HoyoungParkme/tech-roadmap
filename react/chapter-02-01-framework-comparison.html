<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React / Vue / Svelte / Angular 비교 — Chapter II-1-2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    Chapter II-1-2 — React / Vue / Svelte / Angular 비교
    학습 목표: 4가지 주요 프론트엔드 프레임워크·라이브러리의 차이점을 표로 정리할 수 있다.
  -->
  <script type="text/babel">
    const { useState } = React;

    const FRAMEWORKS = [
      {
        name: 'React',
        company: 'Meta (Facebook)',
        year: 2013,
        type: '라이브러리',
        approach: 'Virtual DOM + JSX',
        icon: '⚛️',
        color: 'sky',
        pros: ['거대한 생태계·커뮤니티', '채용 시장에서 가장 높은 수요', 'React Native로 모바일 확장', '자유로운 아키텍처 선택'],
        cons: ['상태 관리·라우팅 별도 선택 필요', 'JSX 진입 장벽', '공식 "정답 구조" 없음'],
        code: 'function Counter() {\n  const [count, setCount] = useState(0);\n  return (\n    <button onClick={() => setCount(count + 1)}>\n      count: {count}\n    </button>\n  );\n}',
        share: '국내 스타트업 70%+',
        learning: '★★☆',
      },
      {
        name: 'Vue',
        company: 'Evan You (독립)',
        year: 2014,
        type: '프레임워크 (점진적)',
        approach: 'Virtual DOM + SFC',
        icon: '💚',
        color: 'emerald',
        pros: ['학습 곡선 완만', 'Single File Component (.vue)', 'Options API → Composition API 점진적 전환', '공식 라우터/상태 관리 존재'],
        cons: ['React 대비 채용 시장 작음', '대규모 앱 사례 상대적 적음', 'TypeScript 지원이 React보다 늦었음'],
        code: '<scr' + 'ipt setup>\nimport { ref } from "vue";\nconst count = ref(0);\n</scr' + 'ipt>\n\n<template>\n  <button @click="count++">\n    count: {{ count }}\n  </button>\n</template>',
        share: '국내 중소·공공 프로젝트',
        learning: '★☆☆',
      },
      {
        name: 'Svelte',
        company: 'Rich Harris',
        year: 2016,
        type: '컴파일러',
        approach: '빌드 시 컴파일 (No Virtual DOM)',
        icon: '🔥',
        color: 'orange',
        pros: ['Virtual DOM 없이 직접 DOM 조작 → 빠름', '번들 크기 매우 작음', '코드량 적음 (적은 보일러플레이트)', '반응성 시스템 직관적'],
        cons: ['생태계·커뮤니티 작음', '채용 시장 거의 없음', '대규모 프로젝트 사례 부족', '서드파티 라이브러리 적음'],
        code: '<scr' + 'ipt>\n  let count = 0;\n</scr' + 'ipt>\n\n<button on:click={() => count++}>\n  count: {count}\n</button>',
        share: '개인 프로젝트·실험적',
        learning: '★☆☆',
      },
      {
        name: 'Angular',
        company: 'Google',
        year: 2016,
        type: '풀 프레임워크',
        approach: 'TypeScript 강제 + DI + RxJS',
        icon: '🅰️',
        color: 'red',
        pros: ['모든 것 내장 (라우팅, HTTP, 폼, DI)', 'TypeScript 네이티브', '대규모 팀·엔터프라이즈에 적합', '일관된 프로젝트 구조'],
        cons: ['학습 곡선 매우 가파름', '큰 번들 크기', 'RxJS 필수 → 추가 학습 비용', '보일러플레이트 많음'],
        code: '@Component({\n  selector: "app-counter",\n  template: `\n    <button (click)="count = count + 1">\n      count: {{count}}\n    </button>\n  `,\n})\nexport class CounterComponent {\n  count = 0;\n}',
        share: '국내 대기업 내부 시스템',
        learning: '★★★',
      },
    ];

    function FrameworkCard({ fw, isSelected, onClick }) {
      const colors = {
        sky: 'border-sky-400 bg-sky-50',
        emerald: 'border-emerald-400 bg-emerald-50',
        orange: 'border-orange-400 bg-orange-50',
        red: 'border-red-400 bg-red-50',
      };
      return (
        <button onClick={onClick} className={`w-full p-4 rounded-xl border-2 text-left transition-all ${isSelected ? `${colors[fw.color]} shadow-md scale-[1.02]` : 'bg-white border-slate-200 hover:border-slate-300'}`}>
          <div className="flex items-center gap-2">
            <span className="text-xl">{fw.icon}</span>
            <div>
              <div className="font-bold text-sm text-slate-800">{fw.name}</div>
              <div className="text-[10px] text-slate-500">{fw.company} · {fw.year}</div>
            </div>
          </div>
          <div className="mt-1 text-[10px] text-slate-500">{fw.type}</div>
        </button>
      );
    }

    function FrameworkDetail({ fw }) {
      if (!fw) return (
        <div className="bg-slate-800 rounded-xl p-6 border border-slate-700 flex items-center justify-center min-h-[400px]">
          <p className="text-slate-500 text-sm">← 프레임워크를 선택하세요</p>
        </div>
      );

      return (
        <div className="bg-slate-800 rounded-xl p-5 border border-slate-700 space-y-4 min-h-[400px]">
          <div className="flex items-center gap-3">
            <span className="text-3xl">{fw.icon}</span>
            <div>
              <h3 className="text-lg font-bold text-white">{fw.name}</h3>
              <div className="text-xs text-slate-400">{fw.approach} | 학습 난이도 {fw.learning}</div>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-3">
            <div className="bg-emerald-900/20 p-2 rounded-lg">
              <div className="text-[10px] font-bold text-emerald-400 mb-1">장점</div>
              {fw.pros.map((p) => <div key={p} className="text-[11px] text-emerald-300">✓ {p}</div>)}
            </div>
            <div className="bg-red-900/20 p-2 rounded-lg">
              <div className="text-[10px] font-bold text-red-400 mb-1">단점</div>
              {fw.cons.map((c) => <div key={c} className="text-[11px] text-red-300">✗ {c}</div>)}
            </div>
          </div>

          <div>
            <div className="text-[10px] text-slate-400 font-bold mb-1">Counter 예제 코드</div>
            <div className="bg-slate-900 rounded-lg p-3 text-xs font-mono text-slate-300 leading-relaxed">
              <pre className="whitespace-pre-wrap">{fw.code}</pre>
            </div>
          </div>

          <div className="bg-slate-700/50 rounded-lg px-3 py-2 text-[11px] text-slate-300">
            <span className="text-slate-400 font-bold">국내 채용 시장: </span>{fw.share}
          </div>
        </div>
      );
    }

    function App() {
      const [selectedIdx, setSelectedIdx] = useState(0);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-violet-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">II</div>
                <h1 className="text-2xl font-bold text-slate-800">React / Vue / Svelte / Angular 비교</h1>
              </div>
              <p className="text-slate-600 text-sm">4가지 주요 프론트엔드 도구의 <b>접근 방식, 장단점, 코드 스타일</b>을 비교합니다. 각 카드를 클릭해 보세요.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter II-1-2 | ★★☆ | 선수 지식 II-1-1 | 2026-04-20</p>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
              <div className="space-y-2">
                {FRAMEWORKS.map((fw, i) => (
                  <FrameworkCard key={fw.name} fw={fw} isSelected={selectedIdx === i} onClick={() => setSelectedIdx(i)} />
                ))}
              </div>
              <div className="lg:col-span-2">
                <FrameworkDetail fw={selectedIdx !== null ? FRAMEWORKS[selectedIdx] : null} />
              </div>
            </div>

            {/* 비교 표 */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-x-auto">
              <table className="w-full text-xs">
                <thead><tr className="bg-slate-50 border-b">
                  <th className="px-3 py-2 text-left text-slate-600">항목</th>
                  {FRAMEWORKS.map(fw => <th key={fw.name} className="px-3 py-2 text-left text-slate-600">{fw.icon} {fw.name}</th>)}
                </tr></thead>
                <tbody>
                  {[
                    ['유형', ...FRAMEWORKS.map(f => f.type)],
                    ['접근 방식', ...FRAMEWORKS.map(f => f.approach)],
                    ['학습 난이도', ...FRAMEWORKS.map(f => f.learning)],
                    ['출시', ...FRAMEWORKS.map(f => String(f.year))],
                    ['국내 시장', ...FRAMEWORKS.map(f => f.share)],
                  ].map((row) => (
                    <tr key={row[0]} className="border-b hover:bg-slate-50">
                      <td className="px-3 py-2 font-bold text-slate-700">{row[0]}</td>
                      {row.slice(1).map((cell, j) => <td key={FRAMEWORKS[j].name} className="px-3 py-2 text-slate-600">{cell}</td>)}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div className="bg-white border border-slate-200 rounded-xl p-4 text-xs text-slate-500 space-y-1">
              <div className="font-bold text-slate-700 mb-2">기술 참고</div>
              <div><b>Virtual DOM</b>: React와 Vue가 사용. 메모리 상의 가상 트리로 변경점을 계산한 뒤 실제 DOM에 반영한다.</div>
              <div><b>SFC (Single File Component)</b>: Vue의 .vue 파일. HTML + CSS + JS를 한 파일에 모아 컴포넌트 단위로 관리한다.</div>
              <div><b>Svelte 컴파일러</b>: 빌드 시점에 최적화된 순수 JS로 변환. 런타임 프레임워크 코드가 거의 없어 번들이 작다.</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
