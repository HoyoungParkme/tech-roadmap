<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>조건부 렌더링 — 보여줄까 말까 — Chapter III-B-1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter III-B-1 — 조건부 렌더링: 보여줄까 말까 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // =========================================================
    // 1. STEPS 정의 — 조건부 렌더링 핵심 5단계
    // =========================================================
    const STEPS = [
      {
        id: 'step-concept',
        title: 'Step 1 — 조건부 렌더링이란?',
        desc: '조건부 렌더링은 상황에 따라 다른 UI를 보여주는 것입니다. JavaScript의 조건문처럼, React에서도 조건에 따라 다른 컴포넌트나 요소를 렌더링할 수 있습니다.',
        code: '// 상황에 따라 다른 UI를 보여준다\nfunction Greeting({ isLoggedIn }) {\n  if (isLoggedIn) {\n    return <h1>환영합니다!</h1>;\n  }\n  return <h1>로그인해 주세요.</h1>;\n}',
        mode: 'concept',
      },
      {
        id: 'step-and',
        title: 'Step 2 — && 연산자',
        desc: '조건이 참일 때만 렌더링하고 싶다면 && 연산자를 사용합니다. 왼쪽이 true이면 오른쪽을 렌더링하고, false이면 아무것도 렌더링하지 않습니다.',
        code: 'function Dashboard({ isLoggedIn }) {\n  return (\n    <div>\n      <h1>대시보드</h1>\n      {isLoggedIn && <Profile />}\n      {/* isLoggedIn이 true일 때만\n         Profile을 보여준다 */}\n    </div>\n  );\n}',
        mode: 'and-demo',
      },
      {
        id: 'step-ternary',
        title: 'Step 3 — 삼항 연산자',
        desc: '참일 때와 거짓일 때 각각 다른 UI를 보여주고 싶다면 삼항 연산자를 사용합니다. if/else의 JSX 버전이라고 생각하면 됩니다.',
        code: 'function UserPanel({ isAdmin }) {\n  return (\n    <div>\n      {isAdmin\n        ? <AdminPanel />\n        : <UserPanel />\n      }\n      {/* isAdmin이 true면 AdminPanel,\n         false면 UserPanel */}\n    </div>\n  );\n}',
        mode: 'ternary-demo',
      },
      {
        id: 'step-early-return',
        title: 'Step 4 — early return 패턴',
        desc: '조건이 충족되지 않으면 함수를 먼저 빠져나가는 패턴입니다. 로딩 상태, 에러 상태, 빈 데이터 등을 처리할 때 코드를 깔끔하게 만들어 줍니다.',
        code: 'function UserProfile({ user, isLoading }) {\n  // 조건 불충족 시 먼저 반환\n  if (isLoading) return <Loading />;\n  if (!user) return <p>유저 없음</p>;\n\n  // 여기서부터는 user가\n  // 반드시 존재함을 보장\n  return (\n    <div>\n      <h2>{user.name}</h2>\n      <p>{user.email}</p>\n    </div>\n  );\n}',
        mode: 'early-return-demo',
      },
      {
        id: 'step-interactive',
        title: 'Step 5 — 인터랙티브 데모',
        desc: '아래 토글 버튼으로 3가지 조건부 렌더링 패턴을 실시간으로 비교해 보세요. 로그인 상태, 관리자 여부, 로딩 상태를 직접 제어할 수 있습니다.',
        code: '// && 연산자\n{isLoggedIn && <Profile />}\n\n// 삼항 연산자\n{isAdmin ? <Admin /> : <User />}\n\n// early return\nif (isLoading) return <Spinner />;\nif (!data) return <Empty />;',
        mode: 'interactive',
      },
    ];

    // =========================================================
    // 2. 시각화 컴포넌트들
    // =========================================================

    // --- 개념 다이어그램 ---
    function ConceptDiagram() {
      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-4 uppercase tracking-wider">조건부 렌더링 흐름</div>
          <div className="flex flex-col items-center gap-3">
            <div className="bg-amber-100 border-2 border-amber-300 rounded-xl px-5 py-3 text-center">
              <div className="text-sm font-bold text-amber-700">조건 확인</div>
              <div className="text-[10px] text-amber-600 mt-1">isLoggedIn?</div>
            </div>
            <div className="text-slate-300 text-lg">↓</div>
            <div className="grid grid-cols-2 gap-4 w-full">
              <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl px-4 py-3 text-center">
                <div className="text-xs font-bold text-emerald-600">true</div>
                <div className="text-sm font-bold text-emerald-700 mt-1">환영합니다!</div>
              </div>
              <div className="bg-red-50 border-2 border-red-300 rounded-xl px-4 py-3 text-center">
                <div className="text-xs font-bold text-red-600">false</div>
                <div className="text-sm font-bold text-red-700 mt-1">로그인해 주세요</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // --- && 연산자 데모 ---
    function AndDemo() {
      const [isLoggedIn, setIsLoggedIn] = useState(false);

      return (
        <div className="space-y-4">
          <div className="bg-white rounded-xl p-5 border border-slate-200">
            <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">&amp;&amp; 연산자 시뮬레이션</div>
            <div className="flex items-center gap-3 mb-4">
              <button onClick={() => setIsLoggedIn(prev => !prev)}
                className={`px-4 py-2 rounded-lg text-sm font-bold transition ${isLoggedIn ? 'bg-emerald-500 text-white' : 'bg-slate-200 text-slate-600'}`}>
                isLoggedIn: {isLoggedIn ? 'true' : 'false'}
              </button>
            </div>
            <div className="bg-slate-100 rounded-lg p-4 min-h-[80px] flex items-center justify-center">
              {isLoggedIn && (
                <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl px-6 py-4 text-center animate-pulse">
                  <div className="text-lg font-bold text-emerald-700">Profile 컴포넌트</div>
                  <div className="text-xs text-emerald-600 mt-1">안녕하세요, 사용자님!</div>
                </div>
              )}
              {!isLoggedIn && (
                <div className="text-sm text-slate-400 italic">isLoggedIn이 false → 아무것도 렌더링하지 않음</div>
              )}
            </div>
          </div>
          <div className="bg-amber-50 border border-amber-200 rounded-lg p-3">
            <div className="text-[10px] text-amber-600 font-bold uppercase mb-1">주의</div>
            <p className="text-xs text-amber-700">&amp;&amp; 왼쪽에 0이 오면 0이 화면에 표시됩니다. 조건은 반드시 boolean으로 변환하세요. (예: <code className="bg-amber-100 px-1 rounded">{'count > 0 && ...'}</code>)</p>
          </div>
        </div>
      );
    }

    // --- 삼항 연산자 데모 ---
    function TernaryDemo() {
      const [isAdmin, setIsAdmin] = useState(false);

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">삼항 연산자 시뮬레이션</div>
          <div className="flex items-center gap-3 mb-4">
            <button onClick={() => setIsAdmin(prev => !prev)}
              className={`px-4 py-2 rounded-lg text-sm font-bold transition ${isAdmin ? 'bg-violet-500 text-white' : 'bg-slate-200 text-slate-600'}`}>
              isAdmin: {isAdmin ? 'true' : 'false'}
            </button>
          </div>
          <div className="bg-slate-100 rounded-lg p-4">
            {isAdmin ? (
              <div className="bg-violet-50 border-2 border-violet-300 rounded-xl px-6 py-4 text-center">
                <div className="text-lg font-bold text-violet-700">AdminPanel</div>
                <div className="text-xs text-violet-600 mt-1">관리자 전용 기능이 표시됩니다</div>
              </div>
            ) : (
              <div className="bg-sky-50 border-2 border-sky-300 rounded-xl px-6 py-4 text-center">
                <div className="text-lg font-bold text-sky-700">UserPanel</div>
                <div className="text-xs text-sky-600 mt-1">일반 사용자 화면이 표시됩니다</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- Early Return 데모 ---
    function EarlyReturnDemo() {
      const [state, setState] = useState('loading');

      const STATE_CLASSES = {
        loading: 'bg-amber-500 text-white',
        empty: 'bg-red-500 text-white',
        loaded: 'bg-emerald-500 text-white',
      };

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Early Return 시뮬레이션</div>
          <div className="flex gap-2 mb-4">
            {['loading', 'empty', 'loaded'].map(s => (
              <button key={s} onClick={() => setState(s)}
                className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${state === s ? STATE_CLASSES[s] : 'bg-slate-100 text-slate-500'}`}>
                {s}
              </button>
            ))}
          </div>
          <div className="bg-slate-100 rounded-lg p-4 min-h-[80px] flex items-center justify-center">
            {state === 'loading' && (
              <div className="text-center">
                <div className="text-2xl mb-2 animate-spin inline-block">&#9881;</div>
                <div className="text-sm text-amber-600 font-bold">로딩 중...</div>
                <div className="text-[10px] text-amber-500 mt-1">if (isLoading) return {'<Loading />'}</div>
              </div>
            )}
            {state === 'empty' && (
              <div className="text-center">
                <div className="text-2xl mb-2">&#128683;</div>
                <div className="text-sm text-red-600 font-bold">유저 없음</div>
                <div className="text-[10px] text-red-500 mt-1">if (!user) return {'<p>유저 없음</p>'}</div>
              </div>
            )}
            {state === 'loaded' && (
              <div className="text-center">
                <div className="text-2xl mb-2">&#128100;</div>
                <div className="text-sm text-emerald-700 font-bold">김철수</div>
                <div className="text-xs text-emerald-600">cs.kim@email.com</div>
                <div className="text-[10px] text-emerald-500 mt-1">조건 통과 → 정상 렌더링</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- 인터랙티브 종합 데모 ---
    function InteractiveDemo() {
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [isAdmin, setIsAdmin] = useState(false);
      const [isLoading, setIsLoading] = useState(false);

      return (
        <div className="space-y-4">
          <div className="bg-white rounded-xl p-5 border border-slate-200">
            <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">3가지 패턴 실시간 비교</div>
            <div className="flex flex-wrap gap-2 mb-4">
              <button onClick={() => setIsLoggedIn(prev => !prev)}
                className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${isLoggedIn ? 'bg-emerald-500 text-white' : 'bg-slate-200 text-slate-600'}`}>
                isLoggedIn: {isLoggedIn ? 'true' : 'false'}
              </button>
              <button onClick={() => setIsAdmin(prev => !prev)}
                className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${isAdmin ? 'bg-violet-500 text-white' : 'bg-slate-200 text-slate-600'}`}>
                isAdmin: {isAdmin ? 'true' : 'false'}
              </button>
              <button onClick={() => setIsLoading(prev => !prev)}
                className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${isLoading ? 'bg-amber-500 text-white' : 'bg-slate-200 text-slate-600'}`}>
                isLoading: {isLoading ? 'true' : 'false'}
              </button>
            </div>

            <div className="grid grid-cols-1 gap-3">
              {/* && 패턴 */}
              <div className="bg-slate-50 rounded-lg p-3 border border-slate-200">
                <div className="text-[10px] font-bold text-slate-500 mb-2">&amp;&amp; 패턴: {'{isLoggedIn && <Profile />}'}</div>
                <div className="min-h-[40px] flex items-center">
                  {isLoggedIn && (
                    <span className="bg-emerald-100 text-emerald-700 text-xs font-bold px-3 py-1.5 rounded-lg">Profile 렌더링됨</span>
                  )}
                  {!isLoggedIn && (
                    <span className="text-xs text-slate-400 italic">렌더링 안 함 (null)</span>
                  )}
                </div>
              </div>

              {/* 삼항 패턴 */}
              <div className="bg-slate-50 rounded-lg p-3 border border-slate-200">
                <div className="text-[10px] font-bold text-slate-500 mb-2">{'삼항: {isAdmin ? <Admin /> : <User />}'}</div>
                <div className="min-h-[40px] flex items-center">
                  {isAdmin ? (
                    <span className="bg-violet-100 text-violet-700 text-xs font-bold px-3 py-1.5 rounded-lg">AdminPanel 렌더링</span>
                  ) : (
                    <span className="bg-sky-100 text-sky-700 text-xs font-bold px-3 py-1.5 rounded-lg">UserPanel 렌더링</span>
                  )}
                </div>
              </div>

              {/* early return 패턴 */}
              <div className="bg-slate-50 rounded-lg p-3 border border-slate-200">
                <div className="text-[10px] font-bold text-slate-500 mb-2">{'early return: if (isLoading) return <Spinner />'}</div>
                <div className="min-h-[40px] flex items-center">
                  {isLoading ? (
                    <span className="bg-amber-100 text-amber-700 text-xs font-bold px-3 py-1.5 rounded-lg">Spinner 렌더링 (early return)</span>
                  ) : (
                    <span className="bg-emerald-100 text-emerald-700 text-xs font-bold px-3 py-1.5 rounded-lg">정상 컨텐츠 렌더링</span>
                  )}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // =========================================================
    // 3. 코드 패널
    // =========================================================
    function CodePanel({ code }) {
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-emerald-500"></div>
            </div>
            <span className="text-[10px] text-slate-500 ml-2">ConditionalRendering.jsx</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    // =========================================================
    // 4. 메인 App
    // =========================================================
    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => {
        setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      };
      const nextRef = useRef(next);
      nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-emerald-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-500 text-white flex items-center justify-center rounded-full font-bold text-sm select-none">III-B</div>
                <h1 className="text-2xl font-bold text-slate-800">조건부 렌더링 — 보여줄까 말까</h1>
              </div>
              <p className="text-slate-600 text-sm">상황에 따라 다른 UI를 보여주는 3가지 핵심 패턴을 학습합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter III-B-1 | ★★☆ | 선수 지식 III-1-4 | 2026-04-21</p>
            </header>

            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-emerald-500' : 'bg-slate-200'}`}
                  aria-label={`Step ${i + 1}`}
                />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                <CodePanel code={step.code} />
                {step.mode === 'concept' && <ConceptDiagram />}
                {step.mode === 'and-demo' && <AndDemo />}
                {step.mode === 'ternary-demo' && <TernaryDemo />}
                {step.mode === 'early-return-demo' && <EarlyReturnDemo />}
                {step.mode === 'interactive' && <InteractiveDemo />}
              </div>

              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-emerald-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>

                <div className="mt-4 bg-emerald-50 border border-emerald-200 rounded-lg p-3">
                  <div className="text-[10px] text-emerald-600 font-bold uppercase mb-1">핵심 포인트</div>
                  <p className="text-xs text-emerald-700">
                    {idx === 0 && 'JavaScript의 if/else가 JSX 안에서는 &&, 삼항 연산자, early return으로 표현됩니다.'}
                    {idx === 1 && '&& 연산자는 "조건이 참일 때만 보여줘"를 간결하게 표현합니다. 왼쪽이 falsy면 아무것도 렌더링하지 않습니다.'}
                    {idx === 2 && '삼항 연산자는 "참이면 A, 거짓이면 B"를 한 줄로 표현합니다. 중첩은 피하는 게 좋습니다.'}
                    {idx === 3 && 'early return은 예외 상황을 먼저 처리하여 메인 로직을 깔끔하게 유지합니다. Guard Clause라고도 부릅니다.'}
                    {idx === 4 && '세 가지 패턴을 상황에 맞게 선택하세요. 단일 조건 → &&, 양자택일 → 삼항, 복잡한 분기 → early return.'}
                  </p>
                </div>
              </div>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }}
                disabled={idx === 0}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="이전 단계"
              >&larr; 이전</button>
              <button onClick={() => { if (isEnd) setIdx(0); setIsPlaying(p => !p); }}
                className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${
                  isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-emerald-500 hover:bg-emerald-600 text-white'
                }`}
                aria-label={isPlaying ? '정지' : '자동 실행'}
              >{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }}
                disabled={isEnd}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="다음 단계"
              >다음 &rarr;</button>
            </div>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-21
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
