<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>전역 상태 관리 — Context API — Chapter V-1-1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter V-1-1 — 전역 상태 관리: Props Drilling → Context API -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1 — Props Drilling 문제',
        desc: '컴포넌트 계층이 깊어지면 데이터를 "부모→자식→손자→증손자"로 계속 전달해야 합니다. 중간 컴포넌트는 자기가 쓰지도 않는 props를 받아서 넘기기만 합니다. 이것이 "Props Drilling"입니다.',
        code: '// 5단계 Props Drilling\n<App theme="dark">\n  <Layout theme="dark">        ← 안 씀, 전달만\n    <Sidebar theme="dark">      ← 안 씀, 전달만\n      <Menu theme="dark">       ← 안 씀, 전달만\n        <MenuItem theme="dark"> ← 여기서 사용!\n        </MenuItem>\n      </Menu>\n    </Sidebar>\n  </Layout>\n</App>',
        visual: 'drilling',
      },
      {
        title: 'Step 2 — Props 택배 릴레이',
        desc: '마치 택배를 5명이 릴레이로 전달하는 것과 같습니다. 중간 사람들은 내용물을 열어보지도 않고 다음 사람에게 넘깁니다. 사람이 늘어날수록 실수(누락, 타입 변경)가 생기기 쉽습니다.',
        code: '// 문제 1: 중간 컴포넌트가 불필요하게 복잡해짐\nfunction Layout({ theme, user, lang, notifications }) {\n  // Layout은 이것들을 안 쓰지만 자식에게 전달해야 함\n  return <Sidebar theme={theme} user={user}\n    lang={lang} notifications={notifications} />;\n}\n\n// 문제 2: prop 이름 바꾸면 모든 중간 단계 수정\n// 문제 3: 어디서 어디로 흐르는지 추적 어려움',
        visual: 'relay',
      },
      {
        title: 'Step 3 — Context API 등장',
        desc: 'Context API는 중간 단계를 건너뛰고, 필요한 컴포넌트가 직접 값을 꺼내 쓸 수 있게 합니다. createContext로 만들고, Provider로 감싸고, useContext로 읽습니다.',
        code: '// 1. Context 만들기\nconst ThemeContext = createContext("light");\n\n// 2. Provider로 감싸기 (앱 상단)\nfunction App() {\n  return (\n    <ThemeContext.Provider value="dark">\n      <Layout />\n    </ThemeContext.Provider>\n  );\n}\n\n// 3. useContext로 꺼내 쓰기 (아무 깊이에서나)\nfunction MenuItem() {\n  const theme = useContext(ThemeContext);\n  return <div className={theme}>메뉴</div>;\n}',
        visual: 'context',
      },
      {
        title: 'Step 4 — Context로 해결',
        desc: 'Context를 사용하면 중간 컴포넌트(Layout, Sidebar, Menu)는 theme을 전혀 알 필요가 없습니다. MenuItem이 직접 ThemeContext에서 값을 꺼냅니다. "택배 릴레이" 대신 "직배송"입니다.',
        code: '// Before: 5단계 전달\nApp → Layout → Sidebar → Menu → MenuItem\n(theme→ theme→  theme→  theme→  사용)\n\n// After: Context로 직배송\nApp (Provider)\n  └ Layout        ← theme 모름\n    └ Sidebar      ← theme 모름\n      └ Menu       ← theme 모름\n        └ MenuItem ← useContext로 직접 읽기!',
        visual: 'solved',
      },
      {
        title: 'Step 5 — Context 사용 가이드',
        desc: 'Context는 만능이 아닙니다. 자주 바뀌는 값(카운터, 입력값)에 쓰면 Provider 아래 모든 컴포넌트가 리렌더링됩니다. 테마, 로그인 사용자, 언어 설정처럼 "드물게 바뀌는 전역 값"에 적합합니다.',
        code: null,
        visual: 'guide',
      },
    ];

    // =========================================================
    // 시각화 컴포넌트들
    // =========================================================
    function DrillingVisual() {
      const nodes = ['App', 'Layout', 'Sidebar', 'Menu', 'MenuItem'];
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Props Drilling 시각화</div>
          <div className="space-y-1">
            {nodes.map((name, i) => (
              <div key={name} className="flex items-center gap-2" style={{ paddingLeft: i * 24 }}>
                <div className={`px-3 py-1.5 rounded-lg text-xs font-bold border-2 ${
                  i === 0 ? 'bg-violet-100 border-violet-300 text-violet-700' :
                  i === nodes.length - 1 ? 'bg-emerald-100 border-emerald-300 text-emerald-700' :
                  'bg-red-50 border-red-200 text-red-600'
                }`}>
                  {name}
                  {i > 0 && i < nodes.length - 1 && <span className="ml-1 text-[9px]">(전달만)</span>}
                  {i === nodes.length - 1 && <span className="ml-1 text-[9px]">(사용!)</span>}
                </div>
                {i < nodes.length - 1 && <span className="text-red-400 text-xs font-bold">← theme</span>}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function RelayVisual() {
      const people = [
        { name: '발신자', icon: '📦', action: 'theme 생성' },
        { name: '중간1', icon: '🏃', action: '전달만...' },
        { name: '중간2', icon: '🏃', action: '전달만...' },
        { name: '중간3', icon: '🏃', action: '전달만...' },
        { name: '수신자', icon: '🎯', action: '드디어 사용!' },
      ];
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">택배 릴레이 비유</div>
          <div className="flex items-center gap-1 justify-center">
            {people.map((p, i) => (
              <React.Fragment key={p.name}>
                <div className={`text-center ${i === 0 || i === people.length - 1 ? '' : 'opacity-60'}`}>
                  <div className="text-2xl">{p.icon}</div>
                  <div className="text-[9px] font-bold text-slate-600 mt-0.5">{p.name}</div>
                  <div className="text-[8px] text-slate-400">{p.action}</div>
                </div>
                {i < people.length - 1 && <span className="text-red-300 text-xs">→</span>}
              </React.Fragment>
            ))}
          </div>
        </div>
      );
    }

    function ContextVisual() {
      const nodes = ['App', 'Layout', 'Sidebar', 'Menu', 'MenuItem'];
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Context API 구조</div>
          <div className="flex gap-4">
            <div className="flex-1 space-y-1">
              {nodes.map((name, i) => (
                <div key={name} className="flex items-center gap-2" style={{ paddingLeft: i * 20 }}>
                  <div className={`px-2 py-1 rounded-lg text-[10px] font-bold border-2 ${
                    i === 0 ? 'bg-violet-100 border-violet-300 text-violet-700' :
                    i === nodes.length - 1 ? 'bg-emerald-100 border-emerald-300 text-emerald-700' :
                    'bg-slate-50 border-slate-200 text-slate-500'
                  }`}>
                    {name}
                    {i === 0 && <span className="ml-1 text-[8px]">(Provider)</span>}
                    {i === nodes.length - 1 && <span className="ml-1 text-[8px]">(useContext)</span>}
                  </div>
                </div>
              ))}
            </div>
            <div className="flex flex-col items-center justify-center">
              <div className="w-0.5 h-full bg-emerald-300 relative">
                <div className="absolute top-0 left-1/2 -translate-x-1/2 bg-emerald-500 text-white text-[8px] font-bold px-1.5 py-0.5 rounded whitespace-nowrap">직배송!</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function SolvedVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Before vs After</div>
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-red-50 border border-red-200 rounded-lg p-3">
              <div className="text-[10px] font-bold text-red-600 mb-2">Before: Props Drilling</div>
              <div className="space-y-0.5 text-[10px] font-mono text-red-700">
                <div>App <span className="text-red-400">→theme→</span></div>
                <div className="ml-3">Layout <span className="text-red-400">→theme→</span></div>
                <div className="ml-6">Sidebar <span className="text-red-400">→theme→</span></div>
                <div className="ml-9">Menu <span className="text-red-400">→theme→</span></div>
                <div className="ml-12 font-bold">MenuItem ✓</div>
              </div>
            </div>
            <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3">
              <div className="text-[10px] font-bold text-emerald-600 mb-2">After: Context</div>
              <div className="space-y-0.5 text-[10px] font-mono text-emerald-700">
                <div>App <span className="text-emerald-400">(Provider)</span></div>
                <div className="ml-3 text-slate-400">Layout</div>
                <div className="ml-6 text-slate-400">Sidebar</div>
                <div className="ml-9 text-slate-400">Menu</div>
                <div className="ml-12 font-bold">MenuItem ← useContext ✓</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function GuideVisual() {
      const cases = [
        { label: '✅ 적합', items: ['테마 (dark/light)', '로그인 사용자 정보', '언어(i18n) 설정', '라우터 정보'], wrapper: 'bg-emerald-50 border-emerald-200', title: 'text-emerald-700', text: 'text-emerald-600' },
        { label: '⚠️ 주의', items: ['자주 바뀌는 폼 입력값', '실시간 카운터', '드래그 좌표', '타이머 값'], wrapper: 'bg-amber-50 border-amber-200', title: 'text-amber-700', text: 'text-amber-600' },
      ];
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Context 사용 가이드</div>
          <div className="grid grid-cols-2 gap-3">
            {cases.map((c) => (
              <div key={c.label} className={`${c.wrapper} border rounded-lg p-3`}>
                <div className={`text-[10px] font-bold ${c.title} mb-2`}>{c.label}</div>
                {c.items.map((item) => (
                  <div key={item} className={`text-[11px] ${c.text} mb-0.5`}>• {item}</div>
                ))}
              </div>
            ))}
          </div>
          <div className="mt-3 text-[10px] text-slate-500 text-center">
            자주 바뀌는 값 → Zustand / Redux Toolkit (다음 섹션)
          </div>
        </div>
      );
    }

    function CodePanel({ code }) {
      if (!code) return null;
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-emerald-500"></div>
            </div>
            <span className="text-[10px] text-slate-500 ml-2">App.jsx</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => {
        setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      };
      const nextRef = useRef(next);
      nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const VISUAL_MAP = { drilling: DrillingVisual, relay: RelayVisual, context: ContextVisual, solved: SolvedVisual, guide: GuideVisual };
      const VisualComponent = VISUAL_MAP[step.visual];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-indigo-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">V</div>
                <h1 className="text-2xl font-bold text-slate-800">전역 상태 관리 — Props Drilling과 Context API</h1>
              </div>
              <p className="text-slate-600 text-sm">Props Drilling 문제를 이해하고 <b>Context API</b>로 해결하는 과정을 시각화합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter V-1-1 | ★★★ | 선수 지식 IV-1-4 | 2026-04-21</p>
            </header>

            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.title} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-indigo-500' : 'bg-slate-200'}`}
                  aria-label={`Step ${i + 1}`} />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                <CodePanel code={step.code} />
                {VisualComponent && <VisualComponent />}
              </div>

              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-indigo-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>
              </div>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }}
                disabled={idx === 0} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="이전 단계">← 이전</button>
              <button onClick={() => { if (isEnd) { setIdx(0); } setIsPlaying(p => !p); }}
                className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-indigo-500 hover:bg-indigo-600 text-white'}`}
                aria-label={isPlaying ? '정지' : '자동 실행'}>{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }}
                disabled={isEnd} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="다음 단계">다음 →</button>
            </div>

            <footer className="text-center text-xs text-slate-400 pb-4">React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-21</footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
