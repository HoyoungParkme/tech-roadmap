<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>순수 컴포넌트와 Strict Mode — Chapter III-B-7</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter III-B-7 — 순수 컴포넌트와 Strict Mode -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // =========================================================
    // 1. STEPS 정의 — 순수 컴포넌트 핵심 5단계
    // =========================================================
    const STEPS = [
      {
        id: 'step-pure-fn',
        title: 'Step 1 — 순수 함수란?',
        desc: '순수 함수는 같은 입력에 항상 같은 출력을 반환하고, 외부 상태를 변경하지 않는 함수입니다. 수학의 f(x) = x + 1처럼, 언제 몇 번 호출해도 결과가 동일합니다. React 컴포넌트도 이 원칙을 따라야 합니다.',
        code: '// 순수 함수 — 같은 입력, 같은 출력\nfunction add(a, b) {\n  return a + b; // 항상 동일한 결과\n}\nadd(2, 3); // → 항상 5\nadd(2, 3); // → 항상 5\n\n// 불순 함수 — 외부 상태에 의존\nlet count = 0;\nfunction increment() {\n  count += 1;  // 외부 변수 변경!\n  return count;\n}\nincrement(); // → 1\nincrement(); // → 2 (다른 결과!)',
        mode: 'pure-fn-demo',
      },
      {
        id: 'step-pure-component',
        title: 'Step 2 — 순수 컴포넌트',
        desc: 'React 컴포넌트도 순수 함수여야 합니다. 같은 props → 같은 JSX를 반환해야 합니다. 렌더링 중에 외부 변수를 변경하거나, 렌더링 전에 존재하던 변수를 수정하면 안 됩니다.',
        code: '// ✅ 순수 컴포넌트\nfunction Greeting({ name }) {\n  return <h1>안녕, {name}!</h1>;\n  // 같은 name → 항상 같은 결과\n}\n\n// ❌ 불순 컴포넌트\nlet callCount = 0;\nfunction BadCounter({ name }) {\n  callCount += 1; // 렌더링 중 외부 변경!\n  return (\n    <h1>{name} (호출: {callCount})</h1>\n  );\n  // 호출할 때마다 다른 결과\n}',
        mode: 'pure-comp-demo',
      },
      {
        id: 'step-side-effects',
        title: 'Step 3 — 사이드 이펙트 분리',
        desc: '렌더링 중에는 계산만 하세요! DOM 조작, API 호출, 타이머 설정은 이벤트 핸들러나 useEffect에서 처리합니다. "렌더링 = 요리 레시피 읽기, 이벤트/Effect = 실제 요리"라고 생각하면 됩니다.',
        code: '// ❌ 렌더링 중 사이드 이펙트\nfunction BadComponent() {\n  // 렌더링할 때마다 API 호출!\n  fetch("/api/data");\n  // DOM 직접 조작!\n  document.title = "변경!";\n  return <div>...</div>;\n}\n\n// ✅ 올바른 위치\nfunction GoodComponent() {\n  // 이벤트 핸들러에서\n  const handleClick = () => {\n    fetch("/api/data");\n  };\n  // useEffect에서\n  useEffect(() => {\n    document.title = "변경!";\n  }, []);\n  return <button onClick={handleClick} />;\n}',
        mode: 'side-effects-demo',
      },
      {
        id: 'step-strict-mode',
        title: 'Step 4 — Strict Mode',
        desc: 'React.StrictMode는 개발 모드에서 컴포넌트를 2번 렌더링합니다. 순수하지 않은 컴포넌트의 버그를 일찍 발견하기 위한 장치입니다. 불순 컴포넌트는 2번 렌더링되면 결과가 달라집니다.',
        code: '// Strict Mode 적용\nimport { StrictMode } from "react";\n\n// index.jsx\ncreateRoot(document.getElementById("root"))\n  .render(\n    <StrictMode>\n      <App />\n    </StrictMode>\n  );\n\n// 개발 모드에서:\n// 1. 컴포넌트를 2번 렌더링\n// 2. Effect를 2번 실행\n// 3. 불순 로직 발견에 도움\n//\n// 프로덕션에서는 1번만 실행\n// (성능에 영향 없음)',
        mode: 'strict-mode-demo',
      },
      {
        id: 'step-checklist',
        title: 'Step 5 — 자가진단 체크리스트',
        desc: '"내 컴포넌트가 순수한가?" 아래 체크리스트로 확인하세요. 모든 항목에 "아니오"라면 순수 컴포넌트입니다!',
        code: '// 순수 컴포넌트 체크리스트\n//\n// □ 렌더링 전 선언된 변수를 수정하는가?\n//   → let x = 0; 후 렌더링에서 x++\n//\n// □ 같은 props에 다른 결과가 나오는가?\n//   → Math.random(), Date.now() 사용\n//\n// □ 렌더링 중 DOM을 직접 조작하는가?\n//   → document.title = "..."\n//\n// □ 렌더링 중 API를 호출하는가?\n//   → fetch() 직접 호출\n//\n// 전부 "아니오"면 순수 컴포넌트!',
        mode: 'checklist',
      },
    ];

    // =========================================================
    // 2. 시각화 컴포넌트들
    // =========================================================

    // --- 순수 함수 vs 불순 함수 데모 ---
    function PureFnDemo() {
      const [pureResults, setPureResults] = useState([]);
      const [impureResults, setImpureResults] = useState([]);
      const impureCount = useRef(0);

      const callPure = () => {
        const result = 2 + 3;
        setPureResults(p => [...p, result]);
      };

      const callImpure = () => {
        impureCount.current += 1;
        setImpureResults(p => [...p, impureCount.current]);
      };

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-4 uppercase tracking-wider">순수 함수 vs 불순 함수</div>
          <div className="grid grid-cols-2 gap-4">
            <div className="border-2 border-emerald-300 bg-emerald-50 rounded-xl p-4">
              <div className="text-xs font-bold text-emerald-600 text-center mb-2">순수 함수: add(2, 3)</div>
              <button onClick={callPure}
                className="w-full px-3 py-2 bg-emerald-500 text-white text-sm font-bold rounded-lg hover:bg-emerald-600 transition mb-2">
                호출하기
              </button>
              <div className="space-y-1 max-h-24 overflow-y-auto">
                {pureResults.map((r, i) => (
                  <div key={i} className="text-xs text-emerald-700 bg-emerald-100 rounded px-2 py-1">
                    호출 {i + 1}: <b>{r}</b> (항상 동일)
                  </div>
                ))}
              </div>
            </div>
            <div className="border-2 border-red-300 bg-red-50 rounded-xl p-4">
              <div className="text-xs font-bold text-red-600 text-center mb-2">불순 함수: increment()</div>
              <button onClick={callImpure}
                className="w-full px-3 py-2 bg-red-500 text-white text-sm font-bold rounded-lg hover:bg-red-600 transition mb-2">
                호출하기
              </button>
              <div className="space-y-1 max-h-24 overflow-y-auto">
                {impureResults.map((r, i) => (
                  <div key={i} className="text-xs text-red-700 bg-red-100 rounded px-2 py-1">
                    호출 {i + 1}: <b>{r}</b> {i > 0 && '(달라짐!)'}
                  </div>
                ))}
              </div>
            </div>
          </div>
          <button onClick={() => { setPureResults([]); setImpureResults([]); impureCount.current = 0; }}
            className="mt-3 text-xs text-slate-500 underline">초기화</button>
        </div>
      );
    }

    // --- 순수 컴포넌트 (바깥에 정의) ---
    function PureGreeting({ name }) {
      return (
        <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3">
          <div className="text-sm font-bold text-emerald-700">안녕, {name}!</div>
          <div className="text-[10px] text-emerald-500 mt-1">항상 같은 결과</div>
        </div>
      );
    }

    // --- 순수 vs 불순 컴포넌트 데모 ---
    function PureCompDemo() {
      const [renderCount, setRenderCount] = useState(0);
      const impureCallCount = useRef(0);

      const triggerRender = () => setRenderCount(p => p + 1);

      // 불순 컴포넌트 시뮬레이션
      impureCallCount.current += 1;
      const impureText = `안녕, 철수! (호출: ${impureCallCount.current})`;

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">순수 vs 불순 컴포넌트</div>
          <button onClick={triggerRender}
            className="px-4 py-2 bg-slate-700 text-white text-sm font-bold rounded-lg hover:bg-slate-800 transition mb-4">
            리렌더링 트리거 ({renderCount}번)
          </button>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="text-[10px] font-bold text-emerald-600 mb-1">✅ 순수 컴포넌트</div>
              <PureGreeting name="철수" />
            </div>
            <div>
              <div className="text-[10px] font-bold text-red-600 mb-1">❌ 불순 컴포넌트</div>
              <div className="bg-red-50 border border-red-200 rounded-lg p-3">
                <div className="text-sm font-bold text-red-700">{impureText}</div>
                <div className="text-[10px] text-red-500 mt-1">호출마다 다른 결과!</div>
              </div>
            </div>
          </div>
          <div className="mt-3 bg-amber-50 border border-amber-200 rounded-lg p-2 text-[10px] text-amber-700">
            리렌더링할 때마다 불순 컴포넌트의 callCount가 증가합니다. Strict Mode에서는 2배로 증가!
          </div>
        </div>
      );
    }

    // --- 사이드 이펙트 분리 시각화 ---
    function SideEffectsDemo() {
      const zones = [
        { name: '렌더링 중 (❌)', items: ['fetch() 호출', 'document.title 변경', '외부 변수 수정', 'console.log (괜찮음)'], color: 'red' },
        { name: '이벤트 핸들러 (✅)', items: ['onClick에서 fetch()', 'onClick에서 setState()', '사용자 입력 처리'], color: 'emerald' },
        { name: 'useEffect (✅)', items: ['API 데이터 로딩', 'document.title 설정', '타이머/구독 설정', '외부 라이브러리 초기화'], color: 'sky' },
      ];

      const ZONE_COLORS = {
        red: { border: 'border-red-300', bg: 'bg-red-50', title: 'text-red-600', item: 'bg-red-100 text-red-700' },
        emerald: { border: 'border-emerald-300', bg: 'bg-emerald-50', title: 'text-emerald-600', item: 'bg-emerald-100 text-emerald-700' },
        sky: { border: 'border-sky-300', bg: 'bg-sky-50', title: 'text-sky-600', item: 'bg-sky-100 text-sky-700' },
      };

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-4 uppercase tracking-wider">사이드 이펙트 올바른 위치</div>
          <div className="space-y-3">
            {zones.map(zone => {
              const c = ZONE_COLORS[zone.color];
              return (
                <div key={zone.name} className={`border-2 ${c.border} ${c.bg} rounded-xl p-3`}>
                  <div className={`text-xs font-bold ${c.title} mb-2`}>{zone.name}</div>
                  <div className="flex flex-wrap gap-1">
                    {zone.items.map(item => (
                      <span key={item} className={`${c.item} text-[10px] font-bold px-2 py-0.5 rounded-full`}>{item}</span>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // --- Strict Mode 데모 ---
    function StrictModeDemo() {
      const [strictOn, setStrictOn] = useState(true);
      const pureLog = useRef([]);
      const impureCounter = useRef(0);
      const impureLog = useRef([]);
      const [tick, setTick] = useState(0);

      const simulate = () => {
        const times = strictOn ? 2 : 1;

        // 순수 컴포넌트 시뮬레이션
        const pureResults = [];
        for (let i = 0; i < times; i++) {
          pureResults.push('안녕, 철수!');
        }
        pureLog.current = pureResults;

        // 불순 컴포넌트 시뮬레이션
        const impureResults = [];
        for (let i = 0; i < times; i++) {
          impureCounter.current += 1;
          impureResults.push(`안녕, 철수! (${impureCounter.current})`);
        }
        impureLog.current = impureResults;

        setTick(p => p + 1);
      };

      const reset = () => {
        pureLog.current = [];
        impureLog.current = [];
        impureCounter.current = 0;
        setTick(0);
      };

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Strict Mode 시뮬레이션</div>
          <div className="flex items-center gap-3 mb-4">
            <button onClick={() => { setStrictOn(p => !p); reset(); }}
              className={`px-4 py-2 rounded-lg text-sm font-bold transition ${strictOn ? 'bg-violet-500 text-white' : 'bg-slate-200 text-slate-600'}`}>
              StrictMode: {strictOn ? 'ON' : 'OFF'}
            </button>
            <button onClick={simulate}
              className="px-4 py-2 bg-emerald-500 text-white text-sm font-bold rounded-lg hover:bg-emerald-600 transition">
              렌더링 실행
            </button>
            <button onClick={reset}
              className="px-3 py-2 bg-slate-100 text-slate-600 text-xs font-bold rounded-lg hover:bg-slate-200 transition">
              초기화
            </button>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="text-[10px] font-bold text-emerald-600 mb-1">✅ 순수 컴포넌트</div>
              <div className="bg-slate-900 rounded-lg p-3 min-h-[60px]">
                {pureLog.current.map((r, i) => (
                  <div key={i} className="text-xs font-mono text-emerald-400">
                    [{i + 1}] {r}
                  </div>
                ))}
                {pureLog.current.length > 1 && (
                  <div className="text-[10px] text-emerald-300 mt-1">→ 결과 동일! 문제 없음</div>
                )}
              </div>
            </div>
            <div>
              <div className="text-[10px] font-bold text-red-600 mb-1">❌ 불순 컴포넌트</div>
              <div className="bg-slate-900 rounded-lg p-3 min-h-[60px]">
                {impureLog.current.map((r, i) => (
                  <div key={i} className="text-xs font-mono text-red-400">
                    [{i + 1}] {r}
                  </div>
                ))}
                {impureLog.current.length > 1 && (
                  <div className="text-[10px] text-red-300 mt-1">→ 결과 다름! 버그 발견!</div>
                )}
              </div>
            </div>
          </div>
          {strictOn && (
            <div className="mt-3 bg-violet-50 border border-violet-200 rounded-lg p-2 text-[10px] text-violet-700">
              StrictMode ON → 컴포넌트를 2번 렌더링합니다. 불순 컴포넌트의 결과가 달라지는 것을 확인하세요!
            </div>
          )}
        </div>
      );
    }

    // --- 체크리스트 ---
    function Checklist() {
      const items = [
        { text: '렌더링 전 선언된 변수를 수정하는가?', tip: 'let 대신 컴포넌트 내부의 state를 사용하세요' },
        { text: '같은 props에 다른 결과가 나오는가?', tip: 'Math.random()이나 Date.now()는 useEffect로 이동' },
        { text: '렌더링 중 DOM을 직접 조작하는가?', tip: 'useRef + useEffect 조합으로 변경하세요' },
        { text: '렌더링 중 API를 호출하는가?', tip: 'useEffect 또는 이벤트 핸들러에서 호출하세요' },
      ];
      const [checked, setChecked] = useState(items.map(() => false));

      const allNo = checked.every(c => !c);
      const anyYes = checked.some(c => c);

      return (
        <div className="bg-white rounded-xl p-5 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-4 uppercase tracking-wider">순수 컴포넌트 자가진단</div>
          <div className="space-y-2">
            {items.map((item, i) => (
              <div key={i} className={`rounded-lg p-3 border transition ${checked[i] ? 'bg-red-50 border-red-200' : 'bg-slate-50 border-slate-200'}`}>
                <div className="flex items-center gap-2">
                  <button onClick={() => setChecked(p => p.map((c, j) => j === i ? !c : c))}
                    className={`w-5 h-5 rounded border-2 flex items-center justify-center text-xs font-bold transition ${checked[i] ? 'bg-red-500 border-red-500 text-white' : 'border-slate-300'}`}>
                    {checked[i] && '✓'}
                  </button>
                  <span className="text-sm text-slate-700">{item.text}</span>
                </div>
                {checked[i] && (
                  <div className="mt-2 ml-7 text-[10px] text-red-600 bg-red-100 rounded px-2 py-1">
                    해결: {item.tip}
                  </div>
                )}
              </div>
            ))}
          </div>
          <div className={`mt-4 p-3 rounded-xl border-2 text-center ${anyYes ? 'border-red-300 bg-red-50' : 'border-emerald-300 bg-emerald-50'}`}>
            <div className={`text-lg font-bold ${anyYes ? 'text-red-700' : 'text-emerald-700'}`}>
              {anyYes ? '불순 컴포넌트입니다!' : '순수 컴포넌트입니다!'}
            </div>
            <div className={`text-xs mt-1 ${anyYes ? 'text-red-500' : 'text-emerald-500'}`}>
              {anyYes ? '체크된 항목을 수정하세요.' : '모든 항목이 "아니오" — 안전합니다.'}
            </div>
          </div>
        </div>
      );
    }

    // =========================================================
    // 3. 코드 패널
    // =========================================================
    function CodePanel({ code }) {
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-emerald-500"></div>
            </div>
            <span className="text-[10px] text-slate-500 ml-2">PureComponent.jsx</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    // =========================================================
    // 4. 메인 App
    // =========================================================
    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => {
        setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      };
      const nextRef = useRef(next);
      nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-emerald-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-500 text-white flex items-center justify-center rounded-full font-bold text-sm select-none">III-B</div>
                <h1 className="text-2xl font-bold text-slate-800">순수 컴포넌트와 Strict Mode</h1>
              </div>
              <p className="text-slate-600 text-sm">같은 입력 → 같은 출력, React 컴포넌트의 순수성 원칙과 Strict Mode 디버깅을 학습합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter III-B-7 | ★★☆ | 선수 지식 III-1-2 | 2026-04-21</p>
            </header>

            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.id} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-emerald-500' : 'bg-slate-200'}`}
                  aria-label={`Step ${i + 1}`}
                />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                <CodePanel code={step.code} />
                {step.mode === 'pure-fn-demo' && <PureFnDemo />}
                {step.mode === 'pure-comp-demo' && <PureCompDemo />}
                {step.mode === 'side-effects-demo' && <SideEffectsDemo />}
                {step.mode === 'strict-mode-demo' && <StrictModeDemo />}
                {step.mode === 'checklist' && <Checklist />}
              </div>

              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-emerald-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>

                <div className="mt-4 bg-emerald-50 border border-emerald-200 rounded-lg p-3">
                  <div className="text-[10px] text-emerald-600 font-bold uppercase mb-1">핵심 포인트</div>
                  <p className="text-xs text-emerald-700">
                    {idx === 0 && '순수 함수: 같은 입력 → 같은 출력 + 외부 상태 변경 없음. React 컴포넌트의 기본 원칙입니다.'}
                    {idx === 1 && 'React 컴포넌트는 렌더링 중 외부 변수를 변경하면 안 됩니다. state로 관리하세요.'}
                    {idx === 2 && '렌더링 = 계산만! 사이드 이펙트(API, DOM, 타이머)는 이벤트 핸들러 또는 useEffect에서 처리합니다.'}
                    {idx === 3 && 'StrictMode는 개발 환경에서만 동작합니다. 불순 컴포넌트를 일찍 발견하는 안전장치입니다.'}
                    {idx === 4 && '체크리스트 4개 항목이 모두 "아니오"면 순수 컴포넌트입니다. 순수성을 유지하면 버그가 줄어듭니다.'}
                  </p>
                </div>
              </div>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }}
                disabled={idx === 0}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="이전 단계"
              >&larr; 이전</button>
              <button onClick={() => { if (isEnd) setIdx(0); setIsPlaying(p => !p); }}
                className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${
                  isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-emerald-500 hover:bg-emerald-600 text-white'
                }`}
                aria-label={isPlaying ? '정지' : '자동 실행'}
              >{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }}
                disabled={isEnd}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="다음 단계"
              >다음 &rarr;</button>
            </div>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-21
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
