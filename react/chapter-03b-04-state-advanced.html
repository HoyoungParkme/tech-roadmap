<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>State 고급 — 객체/배열 불변 업데이트 — Chapter III-B-4</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STEPS = [
      {
        title: 'Step 1 — 왜 불변성이 중요한가',
        desc: 'React는 state가 "바뀌었는지"를 Object.is()로 비교합니다. 같은 객체를 직접 수정(mutation)하면 참조가 같으므로 React가 변경을 감지하지 못합니다. 항상 새 객체/배열을 만들어서 setState에 전달해야 합니다.',
        code: '// ❌ 직접 수정 — React 감지 못함\nconst user = { name: "철수", age: 25 };\nuser.name = "영희";   // 같은 객체 수정\nsetUser(user);        // 참조 동일 → 리렌더링 X!\n\n// ✅ 새 객체 생성 — React 감지 가능\nsetUser({ ...user, name: "영희" });\n// 새 객체 → 참조 다름 → 리렌더링 O!',
        visual: 'immutability',
      },
      {
        title: 'Step 2 — 객체 업데이트 (스프레드)',
        desc: '스프레드 연산자(...)로 기존 객체를 복사하고, 변경할 속성만 덮어씁니다. 전화번호부 비유: 기존 페이지를 복사한 후, 바꿀 항목만 수정하는 것입니다.',
        code: 'const [user, setUser] = useState({\n  name: "김철수",\n  age: 25,\n  email: "kim@email.com"\n});\n\n// 이름만 변경\nsetUser({ ...user, name: "김영희" });\n// → { name: "김영희", age: 25, email: "kim@email.com" }\n\n// 여러 속성 동시 변경\nsetUser({ ...user, name: "박지수", age: 30 });\n// → { name: "박지수", age: 30, email: "kim@email.com" }',
        visual: 'object-demo',
      },
      {
        title: 'Step 3 — 배열 업데이트',
        desc: '배열도 직접 수정(push, splice 등)하면 안 됩니다. 추가는 [...arr, newItem], 삭제는 filter(), 수정은 map()을 사용합니다.',
        code: 'const [todos, setTodos] = useState([\n  { id: 1, text: "React 학습", done: false },\n  { id: 2, text: "프로젝트 시작", done: false },\n]);\n\n// 추가\nsetTodos([...todos, { id: 3, text: "배포", done: false }]);\n\n// 삭제 (id=1 제거)\nsetTodos(todos.filter(t => t.id !== 1));\n\n// 수정 (id=2의 done을 true로)\nsetTodos(todos.map(t =>\n  t.id === 2 ? { ...t, done: true } : t\n));',
        visual: 'array-demo',
      },
      {
        title: 'Step 4 — 중첩 객체와 Immer',
        desc: '객체가 깊게 중첩되면 스프레드가 지옥이 됩니다. Immer 라이브러리를 쓰면 직접 수정하는 것처럼 코드를 쓰되, 내부적으로 불변성을 유지합니다.',
        code: '// 중첩 객체 — 스프레드 지옥 😵\nsetUser({\n  ...user,\n  address: {\n    ...user.address,\n    city: "서울"\n  }\n});\n\n// Immer (useImmerReducer) — 직접 수정처럼 작성!\nimport { produce } from "immer";\n\nsetUser(produce(user, draft => {\n  draft.address.city = "서울";  // 직접 수정처럼 보이지만\n}));                            // 실제로는 새 객체 생성!',
        visual: 'immer',
      },
      {
        title: 'Step 5 — 실전 데모',
        desc: '아래에서 객체와 배열 state를 직접 수정해 보세요. 사용자 프로필(객체)과 할 일 목록(배열)을 인터랙티브하게 업데이트합니다.',
        code: null,
        visual: 'playground',
      },
    ];

    function ImmutabilityVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">불변성 원리</div>
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-red-50 border border-red-200 rounded-lg p-3">
              <div className="text-[10px] font-bold text-red-600 mb-2">❌ 직접 수정 (Mutation)</div>
              <div className="space-y-1 text-[10px] font-mono text-red-700">
                <div>obj.name = "영희"</div>
                <div className="text-red-400">참조: 0x001 → 0x001 (같음!)</div>
                <div className="text-red-500 font-bold">React: "안 바뀌었네" → 무시</div>
              </div>
            </div>
            <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3">
              <div className="text-[10px] font-bold text-emerald-600 mb-2">✅ 새 객체 (Immutable)</div>
              <div className="space-y-1 text-[10px] font-mono text-emerald-700">
                <div>{'{ ...obj, name: "영희" }'}</div>
                <div className="text-emerald-400">참조: 0x001 → 0x002 (다름!)</div>
                <div className="text-emerald-500 font-bold">React: "바뀌었다!" → 리렌더링</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ObjectDemo() {
      const [user, setUser] = useState({ name: '김철수', age: 25, hobby: '독서' });
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">객체 업데이트 데모</div>
          <div className="space-y-2 mb-3">
            <div className="flex items-center gap-2">
              <label className="text-[10px] text-slate-500 font-bold min-w-[40px]">이름</label>
              <input value={user.name} onChange={e => setUser({ ...user, name: e.target.value })}
                className="flex-1 px-2 py-1 border border-slate-300 rounded text-sm" aria-label="이름" />
            </div>
            <div className="flex items-center gap-2">
              <label className="text-[10px] text-slate-500 font-bold min-w-[40px]">나이</label>
              <input type="number" value={user.age} onChange={e => setUser({ ...user, age: Number(e.target.value) })}
                className="flex-1 px-2 py-1 border border-slate-300 rounded text-sm" aria-label="나이" />
            </div>
            <div className="flex items-center gap-2">
              <label className="text-[10px] text-slate-500 font-bold min-w-[40px]">취미</label>
              <input value={user.hobby} onChange={e => setUser({ ...user, hobby: e.target.value })}
                className="flex-1 px-2 py-1 border border-slate-300 rounded text-sm" aria-label="취미" />
            </div>
          </div>
          <div className="bg-emerald-50 rounded-lg p-3 font-mono text-xs text-emerald-700">
            {'{ name: "' + user.name + '", age: ' + user.age + ', hobby: "' + user.hobby + '" }'}
          </div>
        </div>
      );
    }

    function ArrayDemo() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">배열 업데이트 패턴</div>
          <div className="space-y-2">
            {[
              { op: '추가', bad: 'arr.push(item)', good: '[...arr, item]', icon: '➕' },
              { op: '삭제', bad: 'arr.splice(i, 1)', good: 'arr.filter(x => x.id !== id)', icon: '🗑️' },
              { op: '수정', bad: 'arr[i].done = true', good: 'arr.map(x => x.id === id ? {...x, done: true} : x)', icon: '✏️' },
              { op: '정렬', bad: 'arr.sort()', good: '[...arr].sort()', icon: '🔄' },
            ].map((item) => (
              <div key={item.op} className="bg-slate-50 rounded-lg px-3 py-2">
                <div className="flex items-center gap-2 mb-1">
                  <span>{item.icon}</span>
                  <span className="text-xs font-bold text-slate-700">{item.op}</span>
                </div>
                <div className="flex items-center gap-2 text-[10px]">
                  <span className="font-mono text-red-500 line-through">{item.bad}</span>
                  <span className="text-slate-300">→</span>
                  <span className="font-mono text-emerald-600 font-bold">{item.good}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function ImmerVisual() {
      return (
        <div className="bg-white rounded-xl p-4 border border-slate-200">
          <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">스프레드 vs Immer</div>
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-amber-50 border border-amber-200 rounded-lg p-3">
              <div className="text-[10px] font-bold text-amber-700 mb-2">스프레드 (깊은 중첩)</div>
              <pre className="text-[9px] font-mono text-amber-800 whitespace-pre-wrap">{'setUser({\n  ...user,\n  address: {\n    ...user.address,\n    city: "서울"\n  }\n})'}</pre>
              <div className="mt-1 text-[9px] text-amber-600">7줄 — 깊어질수록 복잡</div>
            </div>
            <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3">
              <div className="text-[10px] font-bold text-emerald-700 mb-2">Immer</div>
              <pre className="text-[9px] font-mono text-emerald-800 whitespace-pre-wrap">{'produce(user, draft => {\n  draft.address.city = "서울";\n})'}</pre>
              <div className="mt-1 text-[9px] text-emerald-600">3줄 — 깊이 무관하게 간결</div>
            </div>
          </div>
        </div>
      );
    }

    function PlaygroundVisual() {
      const [todos, setTodos] = useState([
        { id: 'todo-1', text: 'React 학습', done: true },
        { id: 'todo-2', text: '프로젝트 시작', done: false },
      ]);
      const [input, setInput] = useState('');
      const nextId = useRef(3);

      const addTodo = () => {
        if (!input.trim()) return;
        setTodos(prev => [...prev, { id: `todo-${nextId.current++}`, text: input, done: false }]);
        setInput('');
      };
      const toggleTodo = (id) => {
        setTodos(prev => prev.map(t => t.id === id ? { ...t, done: !t.done } : t));
      };
      const deleteTodo = (id) => {
        setTodos(prev => prev.filter(t => t.id !== id));
      };

      return (
        <div className="space-y-3">
          <div className="bg-white rounded-xl p-4 border border-slate-200">
            <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">Todo 리스트 (불변 업데이트 실전)</div>
            <div className="flex gap-2 mb-3">
              <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && addTodo()}
                placeholder="할 일 입력" className="flex-1 px-3 py-1.5 border border-slate-300 rounded-lg text-sm" aria-label="할 일 입력" />
              <button onClick={addTodo} className="px-4 py-1.5 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg text-sm font-bold transition">추가</button>
            </div>
            <div className="space-y-1">
              {todos.map((t) => (
                <div key={t.id} className="flex items-center gap-2 bg-slate-50 rounded-lg px-3 py-2">
                  <button onClick={() => toggleTodo(t.id)} className={`w-5 h-5 rounded border-2 flex items-center justify-center text-xs ${t.done ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-300'}`} aria-label={t.done ? '완료 취소' : '완료 처리'}>
                    {t.done ? '✓' : ''}
                  </button>
                  <span className={`flex-1 text-sm ${t.done ? 'line-through text-slate-400' : 'text-slate-700'}`}>{t.text}</span>
                  <button onClick={() => deleteTodo(t.id)} className="text-red-400 hover:text-red-600 text-xs font-bold transition" aria-label="삭제">삭제</button>
                </div>
              ))}
            </div>
          </div>
          <div className="bg-slate-900 rounded-lg p-3">
            <div className="text-[10px] text-slate-400 mb-1">현재 state</div>
            <pre className="text-[10px] font-mono text-emerald-400">{JSON.stringify(todos, null, 2)}</pre>
          </div>
        </div>
      );
    }

    function CodePanel({ code }) {
      if (!code) return null;
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5"><div className="w-3 h-3 rounded-full bg-red-500"></div><div className="w-3 h-3 rounded-full bg-yellow-500"></div><div className="w-3 h-3 rounded-full bg-emerald-500"></div></div>
            <span className="text-[10px] text-slate-500 ml-2">App.jsx</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;
      const next = () => { setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; }); };
      const nextRef = useRef(next); nextRef.current = next;
      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      const VISUAL_MAP = { immutability: ImmutabilityVisual, 'object-demo': ObjectDemo, 'array-demo': ArrayDemo, immer: ImmerVisual, playground: PlaygroundVisual };
      const VisualComponent = VISUAL_MAP[step.visual];

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>
            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-emerald-500 text-white flex items-center justify-center rounded-full font-bold text-xs select-none">III-B</div>
                <h1 className="text-2xl font-bold text-slate-800">State 고급 — 객체/배열 불변 업데이트</h1>
              </div>
              <p className="text-slate-600 text-sm"><b>불변성 원칙</b>과 객체/배열 업데이트 패턴, <b>Immer</b>를 시각화합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter III-B-4 | ★★☆ | 선수 지식 III-B-3 | 2026-04-21</p>
            </header>
            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.title} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-emerald-500' : 'bg-slate-200'}`} aria-label={`Step ${i + 1}`} />
              ))}
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                <CodePanel code={step.code} />
                {VisualComponent && <VisualComponent />}
              </div>
              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-emerald-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>
              </div>
            </div>
            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }} disabled={idx === 0} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="이전 단계">← 이전</button>
              <button onClick={() => { if (isEnd) { setIdx(0); } setIsPlaying(p => !p); }} className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-emerald-500 hover:bg-emerald-600 text-white'}`} aria-label={isPlaying ? '정지' : '자동 실행'}>{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }} disabled={isEnd} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition" aria-label="다음 단계">다음 →</button>
            </div>
            <footer className="text-center text-xs text-slate-400 pb-4">React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-21</footer>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
