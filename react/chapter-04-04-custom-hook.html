      },
      useLocalStorage: {

        lines: [
          '// Step 5. useLocalStorage — useState 와 똑같이 쓰는 영구 상태',
          '// 페이지 새로고침에도 살아남는다. [value, setValue] 시그니처로 맞춤.',

    // ─────────────────────────────────────────────────────
    // ComponentCard — 좌측에 표시하는 컴포넌트 코드 카드 (다크)
    //   accent: 'before' (반복 / 빨강) | 'after' (압축 / 에메랄드) | 'hook' (인디고)
    // ─────────────────────────────────────────────────────
    function ComponentCard({ card, accent }) {
      if (!card) return null;
      const palette = {
        before: { border: 'border-rose-300',   chipBg: 'bg-rose-100',    chipText: 'text-rose-700',    badge: 'bg-rose-500'    },
        after:  { border: 'border-emerald-300',chipBg: 'bg-emerald-100', chipText: 'text-emerald-700', badge: 'bg-emerald-500' },
        hook:   { border: 'border-indigo-400', chipBg: 'bg-indigo-100',  chipText: 'text-indigo-700',  badge: 'bg-indigo-500'  },
      };
      const p = palette[accent] || palette.before;
      return (
        <div className={`rounded-lg border-2 ${p.border} bg-slate-50 overflow-hidden`}>
          <div className={`flex items-center justify-between px-2.5 py-1 ${p.chipBg}`}>
            <span className={`text-[10px] font-bold uppercase tracking-wider ${p.chipText} font-mono truncate`}>
              {card.file}
            </span>
            <span className={`text-[9px] font-mono text-white px-1.5 py-0.5 rounded ${p.badge} flex-shrink-0`}>
              {card.lineCount} L
            </span>
          </div>
          <pre className="text-[10.5px] font-mono text-slate-800 leading-snug p-2.5 m-0 whitespace-pre overflow-x-auto">{card.code}</pre>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // FlowArrow — 변환 흐름 화살표 (수직)
    // ─────────────────────────────────────────────────────
    function FlowArrow({ label }) {
      return (
        <div className="flex items-center justify-center my-1">
          <div className="flex flex-col items-center">
            <div className="text-[9px] text-indigo-600 font-mono font-bold tracking-wider uppercase">{label}</div>
            <div className="text-indigo-400 text-lg leading-none">↓</div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LineCounter — 추출 전/후 라인 수 비교 바
    //   before(빨강) → after(에메랄드) 시각화
    // ─────────────────────────────────────────────────────
    function LineCounter({ counter }) {
      const before = typeof counter.before === 'number' ? counter.before : null;
      const after = typeof counter.after === 'number' ? counter.after : null;
      const ratio = before && after ? Math.max(8, Math.round((after / before) * 100)) : 100;
      return (
        <div className="bg-white rounded-lg border-2 border-slate-200 overflow-hidden">
          <div className="bg-slate-100 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-slate-600 flex justify-between items-center">
            <span>📏 라인 수 변화</span>
            <span className="text-[9px] font-mono text-slate-500 normal-case tracking-normal">{counter.label}</span>
          </div>
          <div className="p-3 space-y-2">
            <div className="flex items-center gap-2">
              <span className="text-[10px] font-bold text-rose-600 w-14 flex-shrink-0">BEFORE</span>
              <div className="flex-1 h-4 bg-rose-100 rounded relative overflow-hidden">
                <div className="absolute inset-y-0 left-0 bg-rose-400 rounded" style={{ width: '100%' }}></div>
                <span className="absolute inset-0 flex items-center justify-end pr-2 text-[10px] font-mono font-bold text-white">{counter.before} 줄</span>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <span className="text-[10px] font-bold text-emerald-600 w-14 flex-shrink-0">AFTER</span>
              <div className="flex-1 h-4 bg-emerald-100 rounded relative overflow-hidden">
                <div className="absolute inset-y-0 left-0 bg-emerald-400 rounded transition-all duration-700" style={{ width: `${ratio}%` }}></div>
                <span className="absolute inset-0 flex items-center justify-end pr-2 text-[10px] font-mono font-bold text-white">{counter.after} 줄</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // LiveDataPane — 좌측 전체
    //   상단 : 비포 컴포넌트 카드 (1~2개)
    //   ↓ 추출
    //   중간 : 추출된 useXxx Hook 카드 (있을 때만)
    //   하단 : 라인 수 카운터 + 핵심 포인트
    // ─────────────────────────────────────────────────────
    function LiveDataPane({ step }) {
      const hasTwo = !!(step.beforeLeft && step.beforeRight);
      const isStep1 = step.codeKey === 'duplicate';
      const isStep3 = step.codeKey === 'useDebounce';
      // accent 결정: Step1 둘 다 before / Step3,4,5 둘 다 after / Step2 left=before
      const leftAccent  = isStep1 ? 'before' : (step.codeKey === 'extract' ? 'before' : 'after');
      const rightAccent = isStep1 ? 'before' : 'after';

      return (
        <div className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">🪝 반복 로직 → 커스텀 Hook 추출 흐름</h2>
            <span className="text-[10px] text-slate-400 font-mono">live</span>
          </div>

          <div className="space-y-1">
            {/* 1) 비포 컴포넌트 — 1개 또는 2개 */}
            {hasTwo ? (
              <div className="grid grid-cols-2 gap-2">
                <ComponentCard card={step.beforeLeft} accent={leftAccent} />
                <ComponentCard card={step.beforeRight} accent={rightAccent} />
              </div>
            ) : (
              step.beforeLeft && <ComponentCard card={step.beforeLeft} accent={leftAccent} />
            )}

            {/* 2) Hook 카드가 있으면 화살표 + Hook */}
            {step.hookCard && (
              <>
                <FlowArrow label={isStep3 ? '한 줄 호출' : '추출'} />
                <ComponentCard card={step.hookCard} accent="hook" />
              </>
            )}

            {/* 3) 라인 카운터 */}
            <FlowArrow label="라인 수 측정" />
            <LineCounter counter={step.counter} />
          </div>

          {/* 핵심 포인트 */}
          <div className="mt-3 bg-indigo-50 border-l-4 border-indigo-400 px-3 py-2 rounded-r">
            <div className="text-[9px] font-bold text-indigo-600 uppercase tracking-wider mb-0.5">핵심 포인트</div>
            <p className="text-[11px] text-indigo-900 leading-snug">{step.keyPoint}</p>
          </div>

          {/* 범례 */}
          <div className="flex flex-wrap gap-2 text-[9px] mt-3 pt-2 border-t border-slate-100 text-slate-500">
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-rose-400"></span>before (반복)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-indigo-500"></span>useXxx (추출 Hook)
            </span>
            <span className="flex items-center gap-1">
              <span className="w-2 h-2 rounded bg-emerald-400"></span>after (한 줄 호출)
            </span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // VSCode 스타일 CodeViewer — highlight.js + atom-one-dark
    //   파일명 탭 + 윈도우 dot + 라인 번호 + 강조 라인
    // ─────────────────────────────────────────────────────
    function CodeViewer({ code, stepIdx, total }) {
      const codeRef = useRef(null);
      const [renderedLines, setRenderedLines] = useState(null);

      useEffect(() => {
        if (codeRef.current && window.hljs) {
          codeRef.current.removeAttribute('data-highlighted');
          codeRef.current.className = `language-${code.lang}`;
          window.hljs.highlightElement(codeRef.current);
          const html = codeRef.current.innerHTML;
          setRenderedLines(html.split('\n'));
        }
      }, [code]);

      return (
        <div className="bg-[#282c34] rounded-xl overflow-hidden border border-slate-700 shadow-lg">
          {/* 윈도우 dot + 파일 탭 */}
          <div className="bg-[#21252b] px-4 py-2 flex items-center gap-2 border-b border-slate-700">
            <div className="flex gap-1.5">
              <span className="w-3 h-3 rounded-full bg-red-500"></span>
              <span className="w-3 h-3 rounded-full bg-yellow-500"></span>
              <span className="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
            <span className="text-xs text-slate-400 ml-2 font-mono">{code.filename}</span>
            <span className="ml-auto text-[10px] text-slate-500 font-mono uppercase">{code.lang}</span>
          </div>

          {/* hljs 토큰화용 hidden code */}
          <pre className="hidden">
            <code ref={codeRef} className={`language-${code.lang}`}>{code.lines.join('\n')}</code>
          </pre>

          {/* 실제 렌더링 — 라인 번호 + 강조 라인 */}
          <div className="overflow-auto max-h-[40rem] text-xs font-mono leading-5">
            <pre className="p-0 m-0">
              <code className="block">
                {(renderedLines || code.lines).map((lineHtml, i) => {
                  const highlighted = code.highlight && code.highlight.includes(i + 1);
                  return (
                    <div
                      key={i}
                      className={`flex hover:bg-slate-800/50 ${
                        highlighted ? 'bg-indigo-500/15 border-l-2 border-indigo-400' : ''
                      }`}
                    >
                      <span className="select-none text-slate-500 text-right pr-3 pl-3 border-r border-slate-700 w-12 flex-shrink-0">
                        {i + 1}
                      </span>
                      <span
                        className="pl-3 pr-3 whitespace-pre text-slate-200 flex-1"
                        dangerouslySetInnerHTML={{ __html: lineHtml || ' ' }}
                      />
                    </div>
                  );
                })}
              </code>
            </pre>
          </div>

          {/* 푸터 */}
          <div className="bg-[#21252b] px-4 py-1.5 text-[10px] text-slate-500 font-mono flex justify-between border-t border-slate-700">
            <span>{code.lines.length} lines</span>
            <span>Step {stepIdx + 1} / {total}</span>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────
    // App — 메인 컨테이너
    //   - 4 버튼 (처음 / 이전 / 재생 / 다음)
    //   - 키보드 ←/→
    //   - 자동재생 3000ms
    // ─────────────────────────────────────────────────────
    function App() {
      const [stepIdx, setStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const intervalRef = useRef(null);
      const nextRef = useRef(null);
      const prevRef = useRef(null);

      const step = STEPS[stepIdx];
      const code = CODE_FILES[step.codeKey];

      const handleNext = () => {
        setStepIdx((i) => {
          if (i >= STEPS.length - 1) {
            setIsPlaying(false);
            return i;
          }
          return i + 1;
        });
      };
      const handlePrev = () => setStepIdx((i) => Math.max(0, i - 1));
      nextRef.current = handleNext;
      prevRef.current = handlePrev;

      const togglePlay = () => {
        if (stepIdx >= STEPS.length - 1) setStepIdx(0);
        setIsPlaying((p) => !p);
      };

      const handleReset = () => {
        setStepIdx(0);
        setIsPlaying(false);
      };

      useEffect(() => {
        if (!isPlaying) return;
        intervalRef.current = setInterval(() => nextRef.current(), 3000);
        return () => clearInterval(intervalRef.current);
      }, [isPlaying]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowRight') { e.preventDefault(); nextRef.current(); }
          if (e.key === 'ArrowLeft')  { e.preventDefault(); prevRef.current(); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            {/* 상단 네비 */}
            <nav className="flex items-center justify-between text-sm">
              <a href="./index.html" className="text-indigo-700 hover:text-indigo-900 font-medium">&larr; 목차로</a>
              <span className="font-mono bg-slate-100 px-2 py-1 rounded border border-slate-200 text-xs">chapter IV-1-4</span>
            </nav>

            {/* 헤더 */}

                <div>

                  <h1 className="text-xl md:text-2xl font-bold text-slate-800">IV-1-4. 커스텀 Hook — 로직 재사용</h1>
                  <p className="text-sm text-slate-500 mt-0.5">반복되는 state + effect 묶음을 useXxx 함수로 추출하기</p>
                </div>
              </div>
            </header>

            {/* 좌/우 2-pane */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">

              <CodeViewer code={code} stepIdx={stepIdx} total={STEPS.length} />

            {/* 마지막 단계 alert */}
            {stepIdx === STEPS.length - 1 && (
              <div className="bg-indigo-50 border-2 border-indigo-300 rounded-xl p-3 text-sm text-indigo-900">

              </div>
            )}

            {/* 설명 패널 */}
            <div className="p-4 rounded-xl bg-indigo-700 text-white shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-xs font-bold uppercase tracking-wider text-indigo-200">
                  Step {stepIdx + 1} / {STEPS.length} · {step.title}
                </h3>
                <span className="text-xs text-indigo-200">키보드 &larr;/&rarr;</span>
              </div>
              <p className="text-sm leading-relaxed">{step.desc}</p>
            </div>

            {/* 컨트롤 4 버튼 */}
            <div className="flex items-center justify-center gap-3">
              <button
                onClick={handleReset}
                disabled={stepIdx === 0 && !isPlaying}
                aria-label="처음으로"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                처음
              </button>
              <button
                onClick={handlePrev}
                disabled={stepIdx === 0}
                aria-label="이전 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                &larr; 이전
              </button>
              <button
                onClick={togglePlay}
                aria-pressed={isPlaying}
                aria-label={isPlaying ? '자동 재생 정지' : '자동 재생 시작'}
                className="px-4 py-1.5 rounded-lg text-sm font-bold bg-indigo-600 text-white hover:bg-indigo-700 transition min-w-[100px]"
              >
                {isPlaying ? '⏸ 정지' : (stepIdx >= STEPS.length - 1 ? '↻ 다시보기' : '▶ 자동재생')}
              </button>
              <button
                onClick={handleNext}
                disabled={stepIdx >= STEPS.length - 1}
                aria-label="다음 단계"
                className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed transition"
              >
                다음 &rarr;
              </button>
            </div>

            {/* 키워드 태그 */}
            <div className="flex flex-wrap gap-2 justify-center">
              {['커스텀 Hook', 'useDebounce', 'useFetch', 'useLocalStorage', 'use*', '재사용', 'state+effect', 'rules-of-hooks'].map((kw) => (
                <span key={kw} className="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-xs font-medium border border-indigo-200">
                  {kw}
                </span>
              ))}
            </div>
