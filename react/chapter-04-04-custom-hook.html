<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>커스텀 Hook — 로직 재사용 — Chapter IV-1-4</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter IV-1-4 — 커스텀 Hook: 로직 재사용 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // =========================================================
    // 1. STEPS 정의 — 커스텀 Hook 5단계
    // =========================================================
    const STEPS = [
      {
        title: 'Step 1 — 반복되는 패턴',
        desc: '두 컴포넌트에서 "데이터 로딩 → loading/error/data 상태 관리"가 똑같이 반복됩니다. 코드가 거의 복사-붙여넣기입니다. 이런 중복은 버그의 원인이 됩니다.',
        codeLeft: 'function UserList() {\n  const [data, setData] = useState(null);\n  const [loading, setLoading] = useState(true);\n  const [error, setError] = useState(null);\n\n  useEffect(() => {\n    fetch("/api/users")\n      .then(r => r.json())\n      .then(d => { setData(d); setLoading(false); })\n      .catch(e => { setError(e); setLoading(false); });\n  }, []);\n\n  if (loading) return <p>로딩 중...</p>;\n  if (error) return <p>에러!</p>;\n  return <ul>{data.map(...)}</ul>;\n}',
        codeRight: 'function ProductList() {\n  const [data, setData] = useState(null);\n  const [loading, setLoading] = useState(true);\n  const [error, setError] = useState(null);\n\n  useEffect(() => {\n    fetch("/api/products")\n      .then(r => r.json())\n      .then(d => { setData(d); setLoading(false); })\n      .catch(e => { setError(e); setLoading(false); });\n  }, []);\n\n  if (loading) return <p>로딩 중...</p>;\n  if (error) return <p>에러!</p>;\n  return <ul>{data.map(...)}</ul>;\n}',
        labelLeft: 'UserList.jsx',
        labelRight: 'ProductList.jsx',
        mode: 'duplicate',
      },
      {
        title: 'Step 2 — 커스텀 Hook이란?',
        desc: '커스텀 Hook은 "use"로 시작하는 함수입니다. 내부에서 useState, useEffect 등 다른 Hook을 호출할 수 있습니다. 반복되는 상태 로직을 하나의 함수로 추출하는 패턴입니다.',
        code: '// 커스텀 Hook의 3가지 규칙\n\n// 1. 이름이 "use"로 시작\nfunction useFetch(url) { ... }\nfunction useToggle(initial) { ... }\n\n// 2. 내부에서 Hook 호출 가능\nfunction useFetch(url) {\n  const [data, setData] = useState(null);\n  useEffect(() => { ... }, [url]);\n  return { data, loading, error };\n}\n\n// 3. 일반 함수처럼 호출\nconst { data, loading } = useFetch("/api/users");',
        mode: 'rules',
      },
      {
        title: 'Step 3 — useFetch 추출',
        desc: 'Step 1의 중복 코드에서 공통 로직을 useFetch Hook으로 추출합니다. URL만 다르고 나머지는 동일했으니, URL을 매개변수로 받으면 됩니다.',
        codeHook: 'function useFetch(url) {\n  const [data, setData] = useState(null);\n  const [loading, setLoading] = useState(true);\n  const [error, setError] = useState(null);\n\n  useEffect(() => {\n    fetch(url)\n      .then(r => r.json())\n      .then(d => { setData(d); setLoading(false); })\n      .catch(e => { setError(e); setLoading(false); });\n  }, [url]);\n\n  return { data, loading, error };\n}',
        codeUsage: '// 사용 — 한 줄!\nfunction UserList() {\n  const { data, loading, error } = useFetch("/api/users");\n  if (loading) return <p>로딩 중...</p>;\n  if (error) return <p>에러!</p>;\n  return <ul>{data.map(...)}</ul>;\n}\n\nfunction ProductList() {\n  const { data, loading, error } = useFetch("/api/products");\n  // 같은 패턴!\n}',
        mode: 'extraction',
      },
      {
        title: 'Step 4 — 독립적 상태',
        desc: '같은 커스텀 Hook을 여러 컴포넌트에서 사용해도, 각각 독립적인 상태를 가집니다. Hook은 로직만 공유하고, 상태는 공유하지 않습니다. 아래 두 카운터가 독립적으로 동작하는 것을 확인하세요.',
        code: '// useCounter Hook\nfunction useCounter(initial = 0) {\n  const [count, setCount] = useState(initial);\n  const increment = () => setCount(prev => prev + 1);\n  const decrement = () => setCount(prev => prev - 1);\n  const reset = () => setCount(initial);\n  return { count, increment, decrement, reset };\n}',
        mode: 'independent',
      },
      {
        title: 'Step 5 — 실무 커스텀 Hook 패턴',
        desc: '실무에서 자주 쓰이는 커스텀 Hook 패턴입니다. 이 패턴들은 npm 라이브러리(usehooks-ts 등)로도 제공되지만, 직접 만들어 보면 Hook의 원리를 더 깊이 이해할 수 있습니다.',
        mode: 'gallery',
      },
    ];

    // =========================================================
    // 2. 커스텀 Hook 데모용 — useCounter
    // =========================================================
    function useCounter(initial = 0) {
      const [count, setCount] = useState(initial);
      const increment = () => setCount(prev => prev + 1);
      const decrement = () => setCount(prev => prev - 1);
      const reset = () => setCount(initial);
      return { count, increment, decrement, reset };
    }

    const COLOR_CLASSES = {
      sky: {
        wrapper: 'bg-sky-50 border-sky-300',
        text: 'text-sky-600',
        btn: 'bg-sky-500 hover:bg-sky-600',
        label: 'text-sky-500',
      },
      violet: {
        wrapper: 'bg-violet-50 border-violet-300',
        text: 'text-violet-600',
        btn: 'bg-violet-500 hover:bg-violet-600',
        label: 'text-violet-500',
      },
    };

    function CounterBox({ label, color, initial }) {
      const { count, increment, decrement, reset } = useCounter(initial);
      const cls = COLOR_CLASSES[color];
      return (
        <div className={`${cls.wrapper} border-2 rounded-xl p-4 text-center`}>
          <div className={`text-xs font-bold ${cls.text} uppercase mb-2`}>{label}</div>
          <div className={`text-4xl font-bold ${cls.text} mb-3`}>{count}</div>
          <div className="flex gap-2 justify-center">
            <button onClick={decrement} className={`px-3 py-1 ${cls.btn} text-white rounded-lg text-sm font-bold transition`}>-1</button>
            <button onClick={reset} className="px-3 py-1 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg text-sm font-bold transition">리셋</button>
            <button onClick={increment} className={`px-3 py-1 ${cls.btn} text-white rounded-lg text-sm font-bold transition`}>+1</button>
          </div>
          <div className={`mt-2 text-[10px] ${cls.label} font-mono`}>useCounter({initial})</div>
        </div>
      );
    }

    // =========================================================
    // 3. Hook 패턴 갤러리
    // =========================================================
    const HOOK_PATTERNS = [
      {
        name: 'useToggle',
        desc: 'boolean 상태 토글',
        code: 'function useToggle(initial = false) {\n  const [value, setValue] = useState(initial);\n  const toggle = () => setValue(prev => !prev);\n  return [value, toggle];\n}',
        usage: 'const [isOpen, toggleOpen] = useToggle();',
      },
      {
        name: 'useLocalStorage',
        desc: '로컬 스토리지 동기화',
        code: 'function useLocalStorage(key, initial) {\n  const [value, setValue] = useState(\n    () => JSON.parse(localStorage.getItem(key)) ?? initial\n  );\n  useEffect(() => {\n    localStorage.setItem(key, JSON.stringify(value));\n  }, [key, value]);\n  return [value, setValue];\n}',
        usage: 'const [theme, setTheme] = useLocalStorage("theme", "light");',
      },
      {
        name: 'useDebounce',
        desc: '입력 디바운스',
        code: 'function useDebounce(value, delay = 300) {\n  const [debounced, setDebounced] = useState(value);\n  useEffect(() => {\n    const timer = setTimeout(() => setDebounced(value), delay);\n    return () => clearTimeout(timer);\n  }, [value, delay]);\n  return debounced;\n}',
        usage: 'const debouncedSearch = useDebounce(searchTerm, 500);',
      },
    ];

    function HookGallery() {
      const [selectedHook, setSelectedHook] = useState(0);
      const hook = HOOK_PATTERNS[selectedHook];

      return (
        <div className="space-y-4">
          <div className="flex gap-2">
            {HOOK_PATTERNS.map((h, i) => (
              <button key={h.name} onClick={() => setSelectedHook(i)}
                className={`flex-1 px-3 py-2 rounded-xl text-xs font-bold transition ${
                  selectedHook === i ? 'bg-sky-500 text-white shadow-md' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'
                }`}>
                {h.name}
              </button>
            ))}
          </div>

          <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
            <div className="flex items-center justify-between mb-2">
              <span className="text-[10px] text-slate-400 font-bold uppercase">{hook.name}</span>
              <span className="text-[10px] text-slate-500">{hook.desc}</span>
            </div>
            <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{hook.code}</pre>
          </div>

          <div className="bg-sky-50 border border-sky-200 rounded-xl p-3">
            <div className="text-[10px] text-sky-600 font-bold uppercase mb-1">사용법</div>
            <div className="font-mono text-xs text-sky-700">{hook.usage}</div>
          </div>
        </div>
      );
    }

    // =========================================================
    // 4. 코드 패널
    // =========================================================
    function CodePanel({ code, label }) {
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-emerald-500"></div>
            </div>
            <span className="text-[10px] text-slate-500 ml-2">{label || 'hooks.js'}</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    // =========================================================
    // 5. 메인 App
    // =========================================================
    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => {
        setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      };
      const nextRef = useRef(next);
      nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">IV</div>
                <h1 className="text-2xl font-bold text-slate-800">커스텀 Hook — 로직 재사용</h1>
              </div>
              <p className="text-slate-600 text-sm">반복되는 상태 로직을 <b>커스텀 Hook</b>으로 추출하고 재사용하는 방법을 배웁니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter IV-1-4 | ★★★ | 선수 지식 IV-1-3 | 2026-04-20</p>
            </header>

            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.title} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-sky-500' : 'bg-slate-200'}`}
                  aria-label={`Step ${i + 1}`}
                />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                {step.mode === 'duplicate' && (
                  <>
                    <CodePanel code={step.codeLeft} label={step.labelLeft} />
                    <div className="text-center text-xs text-red-500 font-bold">↕ 거의 동일한 코드 반복! ↕</div>
                    <CodePanel code={step.codeRight} label={step.labelRight} />
                  </>
                )}

                {step.mode === 'rules' && <CodePanel code={step.code} label="Hook 규칙" />}

                {step.mode === 'extraction' && (
                  <>
                    <CodePanel code={step.codeHook} label="useFetch.js (커스텀 Hook)" />
                    <div className="text-center text-xs text-emerald-500 font-bold">↓ 사용하는 곳 ↓</div>
                    <CodePanel code={step.codeUsage} label="Components.jsx" />
                  </>
                )}

                {step.mode === 'independent' && (
                  <>
                    <CodePanel code={step.code} label="useCounter.js" />
                    <div className="grid grid-cols-2 gap-3">
                      <CounterBox label="카운터 A" color="sky" initial={0} />
                      <CounterBox label="카운터 B" color="violet" initial={10} />
                    </div>
                    <div className="text-center text-[11px] text-slate-500">
                      같은 useCounter Hook이지만 각각 독립적인 상태!
                    </div>
                  </>
                )}

                {step.mode === 'gallery' && <HookGallery />}
              </div>

              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-sky-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>

                <div className="mt-4 bg-sky-50 border border-sky-200 rounded-lg p-3">
                  <div className="text-[10px] text-sky-600 font-bold uppercase mb-1">핵심 포인트</div>
                  <p className="text-xs text-sky-700">
                    {idx === 0 && '코드 중복은 버그의 원인입니다. 한 곳을 수정하면 다른 곳도 수정해야 하는데, 잊기 쉽습니다.'}
                    {idx === 1 && '커스텀 Hook의 이름은 반드시 "use"로 시작해야 합니다. 이것이 React에게 "이건 Hook이야"라고 알려줍니다.'}
                    {idx === 2 && '커스텀 Hook은 "관심사 분리(Separation of Concerns)"의 핵심 도구입니다. UI와 로직을 분리합니다.'}
                    {idx === 3 && 'Hook은 로직(코드)만 공유합니다. 상태(값)는 각 컴포넌트마다 독립적입니다.'}
                    {idx === 4 && 'usehooks-ts, ahooks 같은 라이브러리에 수백 가지 검증된 커스텀 Hook이 있습니다.'}
                  </p>
                </div>
              </div>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }}
                disabled={idx === 0}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="이전 단계"
              >← 이전</button>
              <button onClick={() => { if (isEnd) setIdx(0); setIsPlaying(p => !p); }}
                className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${
                  isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-sky-500 hover:bg-sky-600 text-white'
                }`}
                aria-label={isPlaying ? '정지' : '자동 실행'}
              >{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }}
                disabled={isEnd}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="다음 단계"
              >다음 →</button>
            </div>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-20
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
