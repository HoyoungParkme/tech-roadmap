<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>useState — 상태 선언과 업데이트 — Chapter IV-1-2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Chapter IV-1-2 — useState: 상태 선언과 업데이트 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // =========================================================
    // 1. STEPS 정의 — useState 핵심 5단계
    // =========================================================
    const STEPS = [
      {
        title: 'Step 1 — useState란?',
        desc: 'useState는 컴포넌트에 "기억"을 부여합니다. `const [count, setCount] = useState(0)`은 "count라는 상자(초기값 0)와, 상자를 업데이트하는 함수 setCount"를 만듭니다.',
        code: 'const [count, setCount] = useState(0);\n\n// count    → 현재 값 (읽기)\n// setCount → 값을 바꾸는 함수 (쓰기)\n// 0        → 초기값',
        mode: 'concept',
      },
      {
        title: 'Step 2 — state가 바뀌면 재렌더링',
        desc: 'setCount()를 호출하면 React가 컴포넌트를 다시 실행합니다. 함수 전체가 다시 호출되고, 새로운 JSX를 반환합니다. 아래 카운터를 직접 클릭해 보세요!',
        code: 'function Counter() {\n  const [count, setCount] = useState(0);\n  console.log("렌더링!", count);\n\n  return (\n    <div>\n      <p>클릭: {count}번</p>\n      <button onClick={() => setCount(count + 1)}>\n        +1\n      </button>\n    </div>\n  );\n}',
        mode: 'interactive-counter',
      },
      {
        title: 'Step 3 — 직접 vs 함수형 업데이트',
        desc: '`setCount(count + 1)`은 현재 렌더링 시점의 count를 참조합니다. `setCount(prev => prev + 1)`은 최신 state를 받아 계산합니다. 대부분의 경우 함수형 업데이트가 더 안전합니다.',
        code: '// 방법 1: 직접 업데이트\nsetCount(count + 1);\n// → 현재 렌더링의 count 값 사용\n\n// 방법 2: 함수형 업데이트 (권장!)\nsetCount(prev => prev + 1);\n// → 최신 state 값 사용',
        mode: 'comparison',
      },
      {
        title: 'Step 4 — 연속 호출의 함정',
        desc: '같은 렌더링에서 setCount(count + 1)을 3번 호출하면? 3이 아니라 1만 증가합니다! 세 번 다 같은 count 값을 참조하기 때문입니다. 함수형 업데이트로 해결됩니다.',
        code: '// ❌ 결과: 1만 증가\nfunction handleClick() {\n  setCount(count + 1); // 0 + 1 = 1\n  setCount(count + 1); // 0 + 1 = 1\n  setCount(count + 1); // 0 + 1 = 1\n}  // → 최종: 1\n\n// ✅ 결과: 3 증가\nfunction handleClick() {\n  setCount(prev => prev + 1); // 0→1\n  setCount(prev => prev + 1); // 1→2\n  setCount(prev => prev + 1); // 2→3\n}  // → 최종: 3',
        mode: 'trap-demo',
      },
      {
        title: 'Step 5 — 객체/배열 state와 불변성',
        desc: 'state가 객체나 배열일 때, 직접 수정(mutation)하면 React가 변경을 감지하지 못합니다. 항상 새 객체/배열을 만들어서 set 함수에 전달해야 합니다. 스프레드 연산자(...)가 핵심 도구입니다.',
        code: '// ❌ 직접 수정 — React 감지 못함\nuser.name = "새이름";\nsetUser(user);\n\n// ✅ 새 객체 생성 — React 감지 가능\nsetUser({ ...user, name: "새이름" });\n\n// 배열도 마찬가지\n// ❌ todos.push(newTodo);\n// ✅ setTodos([...todos, newTodo]);',
        mode: 'immutability',
      },
    ];

    // =========================================================
    // 2. 인터랙티브 카운터 데모
    // =========================================================
    function CounterDemo() {
      const [count, setCount] = useState(0);
      const [renderCount, setRenderCount] = useState(1);
      const [logs, setLogs] = useState(['렌더링 #1 — count: 0']);

      const handleClick = () => {
        const newCount = count + 1;
        const newRenderCount = renderCount + 1;
        setCount(newCount);
        setRenderCount(newRenderCount);
        setLogs(prev => [...prev, `렌더링 #${newRenderCount} — count: ${newCount}`].slice(-6));
      };

      return (
        <div className="space-y-4">
          <div className="bg-white rounded-xl p-6 border border-slate-200 text-center">
            <div className="text-6xl font-bold text-sky-600 mb-4">{count}</div>
            <button onClick={handleClick}
              className="px-6 py-3 bg-sky-500 hover:bg-sky-600 text-white font-bold rounded-xl transition shadow-lg text-lg">
              +1 클릭
            </button>
            <div className="mt-3 text-xs text-slate-500">렌더링 횟수: {renderCount}번</div>
          </div>

          <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
            <div className="text-[10px] text-slate-400 font-bold uppercase mb-2">Console (렌더링 로그)</div>
            <div className="space-y-1">
              {logs.map((log) => (
                <div key={log} className="text-xs font-mono text-slate-300">{log}</div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // =========================================================
    // 3. 연속 호출 함정 데모
    // =========================================================
    function TrapDemo() {
      const [countA, setCountA] = useState(0);
      const [countB, setCountB] = useState(0);

      const handleDirect = () => {
        setCountA(countA + 1);
        setCountA(countA + 1);
        setCountA(countA + 1);
      };

      const handleFunctional = () => {
        setCountB(prev => prev + 1);
        setCountB(prev => prev + 1);
        setCountB(prev => prev + 1);
      };

      return (
        <div className="grid grid-cols-2 gap-4">
          <div className="bg-red-50 border-2 border-red-200 rounded-xl p-4 text-center">
            <div className="text-xs font-bold text-red-600 uppercase mb-2">❌ 직접 업데이트 x3</div>
            <div className="text-4xl font-bold text-red-600 mb-3">{countA}</div>
            <button onClick={handleDirect}
              className="px-4 py-2 bg-red-500 hover:bg-red-600 text-white font-bold rounded-lg text-sm transition">
              setCount(count+1) x3
            </button>
            <div className="mt-2 text-[10px] text-red-500">매번 같은 count를 참조 → 1만 증가</div>
          </div>
          <div className="bg-emerald-50 border-2 border-emerald-200 rounded-xl p-4 text-center">
            <div className="text-xs font-bold text-emerald-600 uppercase mb-2">✅ 함수형 업데이트 x3</div>
            <div className="text-4xl font-bold text-emerald-600 mb-3">{countB}</div>
            <button onClick={handleFunctional}
              className="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-lg text-sm transition">
              setCount(prev=&gt;prev+1) x3
            </button>
            <div className="mt-2 text-[10px] text-emerald-500">최신 prev를 참조 → 3 증가</div>
          </div>
        </div>
      );
    }

    // =========================================================
    // 4. 불변성 데모
    // =========================================================
    function ImmutabilityDemo() {
      const [user, setUser] = useState({ name: '김철수', age: 25 });
      const [todos, setTodos] = useState(['React 학습', 'useState 이해']);

      return (
        <div className="space-y-4">
          <div className="bg-white rounded-xl p-4 border border-slate-200">
            <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">객체 state — 스프레드로 업데이트</div>
            <div className="flex items-center gap-3 mb-3">
              <input value={user.name} onChange={e => setUser({ ...user, name: e.target.value })}
                className="flex-1 px-3 py-1.5 border border-slate-300 rounded-lg text-sm" />
              <input type="number" value={user.age} onChange={e => setUser({ ...user, age: Number(e.target.value) })}
                className="w-20 px-3 py-1.5 border border-slate-300 rounded-lg text-sm" />
            </div>
            <div className="bg-sky-50 rounded-lg p-3 text-xs font-mono text-sky-700">
              {'{ name: "' + user.name + '", age: ' + user.age + ' }'}
            </div>
          </div>

          <div className="bg-white rounded-xl p-4 border border-slate-200">
            <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">배열 state — 스프레드로 추가</div>
            <div className="space-y-1 mb-3">
              {todos.map((todo) => (
                <div key={todo} className="flex items-center gap-2 text-sm text-slate-700">
                  <span className="text-emerald-500">✓</span> {todo}
                </div>
              ))}
            </div>
            <button onClick={() => setTodos([...todos, `할 일 ${todos.length + 1}`])}
              className="px-3 py-1.5 bg-sky-500 hover:bg-sky-600 text-white text-xs font-bold rounded-lg transition">
              + 할 일 추가
            </button>
          </div>
        </div>
      );
    }

    // =========================================================
    // 5. 코드 패널
    // =========================================================
    function CodePanel({ code }) {
      return (
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex gap-1.5">
              <div className="w-3 h-3 rounded-full bg-red-500"></div>
              <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div className="w-3 h-3 rounded-full bg-emerald-500"></div>
            </div>
            <span className="text-[10px] text-slate-500 ml-2">Counter.jsx</span>
          </div>
          <pre className="text-sm font-mono text-slate-300 leading-relaxed whitespace-pre-wrap">{code}</pre>
        </div>
      );
    }

    // =========================================================
    // 6. 메인 App
    // =========================================================
    function App() {
      const [idx, setIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);
      const step = STEPS[idx];
      const isEnd = idx === STEPS.length - 1;

      const next = () => {
        setIdx(p => { if (p < STEPS.length - 1) return p + 1; setIsPlaying(false); return p; });
      };
      const nextRef = useRef(next);
      nextRef.current = next;

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => nextRef.current(), 6000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-5xl mx-auto space-y-5">
            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-sky-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">IV</div>
                <h1 className="text-2xl font-bold text-slate-800">useState — 상태 선언과 업데이트</h1>
              </div>
              <p className="text-slate-600 text-sm">useState로 상태를 관리하고, <b>함수형 업데이트</b>와 <b>불변성</b>을 체험합니다.</p>
              <p className="mt-2 text-[11px] text-slate-400 italic">Chapter IV-1-2 | ★★☆ | 선수 지식 IV-1-1 | 2026-04-20</p>
            </header>

            <div className="flex items-center gap-1">
              {STEPS.map((s, i) => (
                <button key={s.title} onClick={() => { setIdx(i); setIsPlaying(false); }}
                  className={`flex-1 h-2 rounded-full transition ${i <= idx ? 'bg-sky-500' : 'bg-slate-200'}`}
                  aria-label={`Step ${i + 1}`}
                />
              ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
              <div className="space-y-4">
                <CodePanel code={step.code} />
                {step.mode === 'interactive-counter' && <CounterDemo />}
                {step.mode === 'trap-demo' && <TrapDemo />}
                {step.mode === 'immutability' && <ImmutabilityDemo />}

                {step.mode === 'concept' && (
                  <div className="bg-white rounded-xl p-4 border border-slate-200">
                    <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">useState 구조</div>
                    <div className="flex items-center gap-3 justify-center">
                      <div className="bg-sky-50 border-2 border-sky-300 rounded-xl px-4 py-3 text-center">
                        <div className="text-2xl font-bold text-sky-600">0</div>
                        <div className="text-[10px] text-sky-500 mt-1 font-bold">count (상태 값)</div>
                      </div>
                      <div className="text-slate-300 text-lg">+</div>
                      <div className="bg-violet-50 border-2 border-violet-300 rounded-xl px-4 py-3 text-center">
                        <div className="text-lg font-bold text-violet-600">set</div>
                        <div className="text-[10px] text-violet-500 mt-1 font-bold">setCount (업데이트 함수)</div>
                      </div>
                    </div>
                  </div>
                )}

                {step.mode === 'comparison' && (
                  <div className="bg-white rounded-xl p-4 border border-slate-200">
                    <div className="text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">비교</div>
                    <div className="space-y-2">
                      <div className="bg-red-50 rounded-lg p-3 border border-red-200">
                        <div className="text-[10px] font-bold text-red-600 mb-1">직접 업데이트</div>
                        <div className="font-mono text-xs text-red-700">setCount(count + 1)</div>
                        <div className="text-[10px] text-red-500 mt-1">현재 렌더링 시점의 값 사용. 연속 호출 시 문제 가능</div>
                      </div>
                      <div className="bg-emerald-50 rounded-lg p-3 border-2 border-emerald-300">
                        <div className="text-[10px] font-bold text-emerald-600 mb-1">함수형 업데이트 (권장!)</div>
                        <div className="font-mono text-xs text-emerald-700">setCount(prev =&gt; prev + 1)</div>
                        <div className="text-[10px] text-emerald-500 mt-1">항상 최신 state 기반. 안전하고 예측 가능</div>
                      </div>
                    </div>
                  </div>
                )}
              </div>

              <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col">
                <div className="text-xs text-sky-600 font-bold uppercase tracking-wider mb-2">{step.title}</div>
                <p className="text-sm text-slate-700 leading-relaxed flex-1">{step.desc}</p>

                <div className="mt-4 bg-sky-50 border border-sky-200 rounded-lg p-3">
                  <div className="text-[10px] text-sky-600 font-bold uppercase mb-1">핵심 포인트</div>
                  <p className="text-xs text-sky-700">
                    {idx === 0 && 'useState는 [값, 업데이트함수] 쌍을 반환합니다. 배열 구조 분해로 이름을 자유롭게 지정합니다.'}
                    {idx === 1 && 'state가 바뀌면 컴포넌트 함수 전체가 다시 실행됩니다. 이것이 React의 "재렌더링"입니다.'}
                    {idx === 2 && '이벤트 핸들러 안에서 여러 번 setState를 호출하면, 함수형 업데이트가 더 안전합니다.'}
                    {idx === 3 && 'React 18의 Automatic Batching이 여러 setState를 한 번의 렌더링으로 묶어줍니다.'}
                    {idx === 4 && 'React는 Object.is()로 이전/이후 state를 비교합니다. 같은 객체 참조면 변경으로 인식하지 않습니다.'}
                  </p>
                </div>
              </div>
            </div>

            <div className="flex items-center justify-center gap-3">
              <button onClick={() => { setIdx(p => Math.max(0, p - 1)); setIsPlaying(false); }}
                disabled={idx === 0}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="이전 단계"
              >← 이전</button>
              <button onClick={() => { if (isEnd) setIdx(0); setIsPlaying(p => !p); }}
                className={`px-5 py-2 rounded-lg text-sm font-bold transition shadow-sm ${
                  isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-sky-500 hover:bg-sky-600 text-white'
                }`}
                aria-label={isPlaying ? '정지' : '자동 실행'}
              >{isPlaying ? '⏸ 정지' : '▶ 자동 실행'}</button>
              <button onClick={() => { next(); setIsPlaying(false); }}
                disabled={isEnd}
                className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:opacity-40 transition"
                aria-label="다음 단계"
              >다음 →</button>
            </div>

            <footer className="text-center text-xs text-slate-400 pb-4">
              React 18 UMD + Babel Standalone 7.x + Tailwind CSS Play CDN | 2026-04-20
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
