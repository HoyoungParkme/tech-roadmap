<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>선언형 UI — Chapter I-1-3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!--
    Chapter I-1-3 — 선언형 UI: "어떻게"가 아니라 "무엇"을
    학습 목표: 명령형(Imperative)과 선언형(Declarative)의 차이를 비유로 설명할 수 있다.
  -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // =========================================================
    // STEPS — 명령형 vs 선언형 비교 시나리오
    // =========================================================
    const STEPS = [
      {
        title: 'Step 1 — 요리 주문 비유',
        desc: '같은 결과(라면 한 그릇)를 얻는 두 가지 방법이 있습니다.',
        imperative: '1. 냄비를 꺼내라\n2. 물 500ml를 부어라\n3. 가스불을 켜라\n4. 물이 끓을 때까지 기다려라\n5. 면을 넣어라\n6. 3분 타이머를 맞춰라\n7. 스프를 넣어라\n8. 그릇에 옮겨라',
        declarative: '라면 한 그릇 주세요.',
        highlight: 'concept',
        result: null,
      },
      {
        title: 'Step 2 — 명령형 DOM 조작',
        desc: '"어떻게 바꿀지" 한 단계씩 지시합니다. 개발자가 DOM 변경의 모든 과정을 직접 관리합니다.',
        imperative: '// 명령형: 어떻게(How) 바꿀지 지시\nconst list = document.getElementById("todo-list");\nconst li = document.createElement("li");\nli.textContent = "장보기";\nli.className = "todo-item";\nlist.appendChild(li);\n\n// 완료 처리\nli.addEventListener("click", function() {\n  li.style.textDecoration = "line-through";\n  li.style.color = "gray";\n});',
        declarative: null,
        highlight: 'imperative',
        result: { todos: ['장보기'], action: 'createElement → appendChild' },
      },
      {
        title: 'Step 3 — 선언형 React 방식',
        desc: '"무엇을 보여줄지"만 선언합니다. DOM을 어떻게 바꿀지는 React가 알아서 처리합니다.',
        imperative: null,
        declarative: '// 선언형: 무엇(What)을 보여줄지 선언\nfunction TodoList() {\n  const [todos, setTodos] = useState([\n    { text: "장보기", done: false }\n  ]);\n\n  return (\n    <ul>\n      {todos.map(todo =>\n        <li\n          style={{\n            textDecoration: todo.done\n              ? "line-through" : "none"\n          }}\n          onClick={() => toggle(todo)}\n        >\n          {todo.text}\n        </li>\n      )}\n    </ul>\n  );\n}',
        highlight: 'declarative',
        result: { todos: ['장보기'], action: 'state → UI 자동 반영' },
      },
      {
        title: 'Step 4 — 항목 추가: 명령형',
        desc: '새 할 일을 추가할 때, 명령형은 "DOM 요소를 만들어 → 속성 설정 → 이벤트 바인딩 → 부모에 추가"를 모두 직접 합니다.',
        imperative: '// 새 항목 추가 — 명령형\nfunction addTodo(text) {\n  const list = document.getElementById("todo-list");\n  const li = document.createElement("li");\n  li.textContent = text;\n  li.className = "todo-item";\n  li.addEventListener("click", function() {\n    li.style.textDecoration = "line-through";\n  });\n  list.appendChild(li);\n  // 카운터도 직접 업데이트\n  const counter = document.getElementById("count");\n  counter.innerText = list.children.length;\n}',
        declarative: null,
        highlight: 'imperative',
        result: { todos: ['장보기', '운동하기'], action: '6줄의 DOM 조작 코드 필요' },
      },
      {
        title: 'Step 5 — 항목 추가: 선언형',
        desc: '선언형은 데이터(state)만 바꿉니다. UI는 React가 자동으로 다시 그립니다. 카운터도 별도로 업데이트할 필요 없습니다.',
        imperative: null,
        declarative: '// 새 항목 추가 — 선언형\nfunction addTodo(text) {\n  setTodos(prev => [\n    ...prev,\n    { text, done: false }\n  ]);\n  // 끝! UI는 React가 알아서 다시 그림\n  // 카운터? todos.length로 자동 계산\n}',
        highlight: 'declarative',
        result: { todos: ['장보기', '운동하기'], action: 'state 1줄 변경 → UI 자동' },
      },
      {
        title: 'Step 6 — 핵심 차이 정리',
        desc: '명령형은 "과정"을 기술하고, 선언형은 "결과"를 기술합니다. React는 선언형 UI 라이브러리입니다.',
        imperative: '명령형 (Imperative)\n━━━━━━━━━━━━━━━━━━\n✗ DOM을 직접 조작\n✗ 변경 과정을 하나하나 지시\n✗ 상태와 UI 동기화를 개발자가 관리\n✗ 코드가 길어질수록 버그 위험 증가\n\n예: jQuery, Vanilla JS',
        declarative: '선언형 (Declarative)\n━━━━━━━━━━━━━━━━━━\n✓ "이 데이터면 UI는 이렇게"\n✓ 결과만 선언, 과정은 프레임워크가\n✓ 상태 → UI 자동 동기화\n✓ 예측 가능하고 디버깅 쉬움\n\n예: React, Vue, SwiftUI',
        highlight: 'both',
        result: null,
      },
    ];

    // =========================================================
    // 비교 패널
    // =========================================================
    function ComparisonPanel({ imperative, declarative, highlight }) {
      if (highlight === 'concept') {
        return (
          <div className="grid grid-cols-2 gap-4">
            <div className="bg-red-50 border-2 border-red-200 rounded-xl p-4">
              <div className="text-xs font-bold text-red-600 mb-2">명령형 (HOW)</div>
              <pre className="text-xs text-red-800 whitespace-pre-wrap font-mono leading-relaxed">{imperative}</pre>
            </div>
            <div className="bg-emerald-50 border-2 border-emerald-200 rounded-xl p-4">
              <div className="text-xs font-bold text-emerald-600 mb-2">선언형 (WHAT)</div>
              <pre className="text-sm text-emerald-800 whitespace-pre-wrap font-mono leading-relaxed font-bold">{declarative}</pre>
            </div>
          </div>
        );
      }

      if (highlight === 'both') {
        return (
          <div className="grid grid-cols-2 gap-4">
            <div className="bg-red-50 border-2 border-red-300 rounded-xl p-4">
              <pre className="text-xs text-red-800 whitespace-pre-wrap font-mono leading-relaxed">{imperative}</pre>
            </div>
            <div className="bg-emerald-50 border-2 border-emerald-300 rounded-xl p-4">
              <pre className="text-xs text-emerald-800 whitespace-pre-wrap font-mono leading-relaxed">{declarative}</pre>
            </div>
          </div>
        );
      }

      const code = imperative || declarative;
      const isImp = highlight === 'imperative';
      return (
        <div className={`relative min-h-[350px] lg:min-h-0 rounded-xl shadow-sm border overflow-hidden ${
          isImp ? 'border-red-300' : 'border-emerald-300'
        }`}>
          <div className="lg:absolute lg:inset-0 w-full h-full bg-slate-900 flex flex-col">
            <div className={`flex items-center gap-2 px-4 py-2 border-b ${
              isImp ? 'bg-red-900/50 border-red-800' : 'bg-emerald-900/50 border-emerald-800'
            }`}>
              <div className="flex gap-1.5">
                <div className="w-3 h-3 rounded-full bg-red-500 opacity-70"></div>
                <div className="w-3 h-3 rounded-full bg-yellow-400 opacity-70"></div>
                <div className="w-3 h-3 rounded-full bg-emerald-500 opacity-70"></div>
              </div>
              <span className={`text-xs font-mono ml-2 ${isImp ? 'text-red-400' : 'text-emerald-400'}`}>
                {isImp ? '명령형 (Imperative)' : '선언형 (Declarative — React)'}
              </span>
            </div>
            <div className="p-4 overflow-y-auto flex-1 text-sm font-mono text-slate-300 leading-relaxed">
              <pre className="whitespace-pre-wrap">{code}</pre>
            </div>
          </div>
        </div>
      );
    }

    // =========================================================
    // 메인 앱
    // =========================================================
    function App() {
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const playIntervalRef = useRef(null);

      const stepData = STEPS[currentStepIdx];
      const isEnd = currentStepIdx === STEPS.length - 1;

      const handleNext = () => {
        setCurrentStepIdx(prev => {
          if (prev < STEPS.length - 1) return prev + 1;
          setIsPlaying(false); return prev;
        });
      };
      const handleNextRef = useRef(handleNext);
      handleNextRef.current = handleNext;

      const handlePrev = () => { if (currentStepIdx > 0) { setCurrentStepIdx(p => p-1); setIsPlaying(false); } };
      const togglePlay = () => { if (isEnd) setCurrentStepIdx(0); setIsPlaying(p => !p); };

      useEffect(() => {
        if (isPlaying) { playIntervalRef.current = setInterval(() => handleNextRef.current(), 4000); }
        else { clearInterval(playIntervalRef.current); }
        return () => clearInterval(playIntervalRef.current);
      }, [isPlaying]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans p-6 text-slate-800">
          <div className="max-w-6xl mx-auto space-y-5">

            <a href="./index.html" className="inline-flex items-center text-sm text-slate-500 hover:text-sky-600 transition">&larr; 목차로</a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex items-center gap-3 mb-2">
                <div className="w-9 h-9 bg-amber-500 text-white flex items-center justify-center rounded-full font-bold text-lg select-none">I</div>
                <h1 className="text-2xl font-bold text-slate-800">선언형 UI — "어떻게"가 아니라 "무엇"을</h1>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">
                <b>명령형(Imperative)</b>과 <b>선언형(Declarative)</b> UI의 차이를
                같은 기능을 두 가지 방식으로 만들면서 비교합니다.
              </p>
              <p className="mt-2 text-[11px] text-slate-400 italic">
                Chapter I-1-3 | 난이도 ★☆☆ | 선수 지식 I-1-2 | 2026-04-20
              </p>
            </header>

            <div className="bg-amber-600 text-white p-5 rounded-xl shadow-sm min-h-[80px]">
              <div className="text-xs font-bold text-amber-200 mb-1 uppercase tracking-wider">{stepData.title}</div>
              <p className="text-base font-medium leading-relaxed">{stepData.desc}</p>
            </div>

            {/* 비교 또는 코드 패널 */}
            {(stepData.highlight === 'concept' || stepData.highlight === 'both') ? (
              <ComparisonPanel imperative={stepData.imperative} declarative={stepData.declarative} highlight={stepData.highlight} />
            ) : (
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-5 items-stretch">
                <div className="flex flex-col space-y-4">
                  {/* Todo 미리보기 */}
                  {stepData.result && (
                    <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
                      <div className="text-xs text-slate-400 uppercase tracking-wider mb-3 font-bold">결과 미리보기</div>
                      <div className="bg-white rounded-lg p-4">
                        <div className="text-sm font-bold text-slate-700 mb-2">할 일 목록 ({stepData.result.todos.length}개)</div>
                        <ul className="space-y-1">
                          {stepData.result.todos.map((t) => (
                            <li key={t} className="flex items-center gap-2 text-sm text-slate-600">
                              <span className="w-4 h-4 border-2 border-slate-300 rounded"></span>{t}
                            </li>
                          ))}
                        </ul>
                        <div className={`mt-3 text-[11px] px-2 py-1 rounded font-mono ${
                          stepData.highlight === 'imperative' ? 'bg-red-50 text-red-600' : 'bg-emerald-50 text-emerald-600'
                        }`}>{stepData.result.action}</div>
                      </div>
                    </div>
                  )}

                  {/* 컨트롤 */}
                  <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-3">
                    <div className="flex items-center space-x-2">
                      <button onClick={handlePrev} disabled={currentStepIdx === 0}
                        className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 transition">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                      </button>
                      <button onClick={togglePlay}
                        className="flex items-center px-4 py-2 rounded bg-amber-600 hover:bg-amber-700 text-white font-medium transition shadow-sm w-32 justify-center">
                        {isPlaying ? '정지' : '자동 실행'}
                      </button>
                      <button onClick={() => { handleNext(); setIsPlaying(false); }} disabled={isEnd}
                        className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 transition">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                      </button>
                    </div>
                    <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                      Step {currentStepIdx + 1} / {STEPS.length}
                    </div>
                  </div>
                </div>

                <ComparisonPanel imperative={stepData.imperative} declarative={stepData.declarative} highlight={stepData.highlight} />
              </div>
            )}

            {/* 풀 너비 컨트롤 (비교 모드용) */}
            {(stepData.highlight === 'concept' || stepData.highlight === 'both') && (
              <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-3">
                <div className="flex items-center space-x-2">
                  <button onClick={handlePrev} disabled={currentStepIdx === 0}
                    className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 transition">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                  </button>
                  <button onClick={togglePlay}
                    className="flex items-center px-4 py-2 rounded bg-amber-600 hover:bg-amber-700 text-white font-medium transition shadow-sm w-32 justify-center">
                    {isPlaying ? '정지' : '자동 실행'}
                  </button>
                  <button onClick={() => { handleNext(); setIsPlaying(false); }} disabled={isEnd}
                    className="p-2 rounded bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-700 transition">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                  </button>
                </div>
                <div className="text-sm font-medium text-slate-500 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                  Step {currentStepIdx + 1} / {STEPS.length}
                </div>
              </div>
            )}

            <div className="bg-white border border-slate-200 rounded-xl p-4 text-xs text-slate-500 space-y-1">
              <div className="font-bold text-slate-700 mb-2">기술 참고</div>
              <div><b>선언형(Declarative)</b>: "UI가 어떤 모습이어야 하는지"만 기술하면, 프레임워크가 실제 DOM 조작을 처리한다.</div>
              <div><b>명령형(Imperative)</b>: "DOM을 어떻게 변경할지" 모든 단계를 개발자가 직접 작성한다.</div>
              <div><b>React의 핵심 아이디어</b>: UI = f(state). 상태(state)가 주어지면 UI는 그 함수의 결과물이다.</div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
